- fmt: "#### Guidance\n\nJust because you have the ability to write parallel MapReduce\
    \ algorithms in PL/SQL doesn't always mean you should use them. In many cases,\
    \ it would take less code to accomplish the same result (including using parallelism)\
    \ in a single SQL statement. Your entire example could be written as follows:\n\
    \n```sql\nselect    /*+ parallel */\n          letter key_item,\n          count(*)\
    \ value_item\nfrom\n(\nselect    substr(d.text,c.i,1) letter\nfrom      documents\
    \ d,\n          (select level i from dual connect by level <= 30) c\n)\nwhere\
    \     letter is not null\ngroup by  letter\norder by  letter;\n```\n\nThe point\
    \ is that not all solutions require implementation in terms of programming primitives\
    \ like MapReduce. The real value in understanding this approach comes when you\
    \ are trying to move back and forth from other parallel programming environments.\
    \ By understanding how to implement a parallel algorithm in PL/SQL you can more\
    \ easily translate concepts from other languages and systems.\n\n#### Parallel\
    \ Pipelined Table Functions Summary\n\nYou've seen how you can write PL/SQL functions\
    \ that act like tables, producing rows programmatically and how these functions\
    \ can be invoked in a parallel fashion. It's important to note that these functions\
    \ can pass data to other PL/SQL table functions that can also be run in parallel,\
    \ building a chain of parallel transformations and operations on data, similar\
    \ to many MapReduce cycles.\n\n### Summary\n\nOracle provides many different ways\
    \ to use PL/SQL to implement parallel programming algorithms. However, as noted,\
    \ careful consideration must be given to whether or not parallel constructs will\
    \ provide you with the benefit you're looking for. Parallel options `always` consume\
    \ more system resources than their serial counterparts, but in situations where\
    \ you have available capacity, they provide ways to both speed up long-running\
    \ activities or give you an ability to handle very large data sets. These capabilities\
    \ may also serve you well when translating parallel algorithms from other systems.\n\
    \nAs of 11gR2, the parallel pipelined table functions provide you with the most\
    \ flexible and mature method for dividing up work among independent processors\
    \ and across clusters in a clustered database environment. The `DBMS_PARALLEL_EXECUTE`\
    \ framework new in 11gR2 is also an intriguing option that Standard Edition users\
    \ can take advantage of for a higher degree of programmatic control—at the cost\
    \ of flexibility with regard to dividing and sorting data for parallelization.\n\
    \n## CHAPTER 4\n\n## Warnings and Conditional Compilation\n\nby Torben Holm\n\n\
    When Oracle implemented Java in the RDBMS kernel, it was thought to be the end\
    \ of PL/SQL. However, in version 10.2, Oracle rewrote the PL/SQL compiler and\
    \ implemented various new features, proving that there is a future for PL/SQL.\
    \ This chapter will cover two features that were first seen in Oracle 10.2: PL/SQL\
    \ warnings and PL/SQL conditional compilation.\n\n### PL/SQL Warnings\n\nIn Oracle\
    \ 10.2, Oracle implemented PL/SQL warnings. The feature gives the ability to compile\
    \ PL/SQL and get warnings if some of the code implements poor practices or conflicts\
    \ with reserved words or Oracle functions. Prior to Oracle 10.2, your PL/SQL would\
    \ sometimes compile—only to throw errors at runtime. The purpose of PL/SQL warnings\
    \ is to warn of potential mistakes at compile time when they are easier to fix,\
    \ thereby ensuring that code being applied to the database is as robust and optimal\
    \ as possible.\n\n#### Basics\n\nBefore you start looking at what you gain from\
    \ the PL/SQL warnings, first look at some basic aspects of the feature. By default,\
    \ PL/SQL warnings are disabled. PL/SQL warnings can be enabled at the system,\
    \ session, or procedure level. PL/SQL warnings are divided into three categories:\n\
    \n> `Severe`: These are warnings about code that contains a conflict with functions\
    \ in SYS.STANDARD or SQL functions.\n>\n> `Performance`: These are warnings about\
    \ code that may have a performance impact, such as the use of wrong data types\
    \ in queries and the lack of use of NOCOPY compile directive when appropriate.\n\
    >\n> `Informational`: These are warnings relating to code that does no harm and/or\
    \ may even be removed.\n\nWhen you create or compile a stored procedure, it inherits\
    \ the settings in the session you are running by default. The PL/SQL warning level\
    \ is determined by the value of the parameter `plsql_warnings`. You can show the\
    \ current parameter value as follows:\n\n```sql\nSQL@V112> show parameter plsql_warnings\n\
    \nNAME                             TYPE        VALUE\n--------------------------------\
    \ ----------- ------------------------------\nplsql_warnings                 \
    \  string      DISABLE:ALL\n\nThe default value is DISABLE:ALL\n```\n\nIf you\
    \ are not allowed to execute a SHOW PARAMETER command, the value of `plsql_warnings`\
    \ can be examined with the following query:\n\n```sql\nSQL@V112> SELECT DBMS_WARNING.GET_WARNING_SETTING_STRING\
    \ FROM DUAL;\n\nGET_WARNING_SETTING_STRING\n----------------------------------------------------------------\n\
    DISABLE:ALL\n```\n\nTo enable all warnings for the current session, execute the\
    \ following:\n\n```sql\nSQL@V112> alter session set plsql_warnings='ENABLE:ALL';\n\
    \nSession altered.\n```\n\n![images](images/square.jpg) `Note` In most cases,\
    \ you need the `ALTER SESSION` privilege to alter your session parameters. This\
    \ is not the case when it comes to altering the `plsql_warnings` parameter.\n\n\
    Furthermore, the `plsql_warnings` string is not case sensitive.\n\nTo enable severe\
    \ and performance warnings and disable informational warnings in one go, execute\
    \ the following statement:\n\n```sql\nSQL@V112> alter session set plsql_warnings='ENABLE:SEVERE,ENABLE:PERFORMANCE,\n\
    DISABLE:INFORMATIONAL';\n\nSession altered.\n```\n\nThe parameter setting is not\
    \ cumulative. If you first set `plsql_warnings` to `ENABLE:SEVERE` and afterwards\
    \ `ENABLE:PERFORMANCE`, then only warnings regarding performance is enabled.\n\
    \nShould you want to set the parameter from within PL/SQL, you can do so by calling\
    \ `DBMS_WARNINGS.SET_WARNING_SETTING_STRING`. Enabling only setting one will disable\
    \ others. This example will enable severe warnings only and at the session level:\n\
    \n```sql\nSQL@V112> EXEC DBMS_WARNING.SET_WARNING_SETTING_STRING('ENABLE:SEVERE',\
    \ 'SESSION');\n\nPL/SQL procedure successfully completed.\n```\n\nEnabling warnings\
    \ does not affect execution time, but it may affect compilation time a bit. Should\
    \ you compile a procedure 1,000 times, you'd find the difference between compiling\
    \ with warnings and compiling without warnings will be about one second in favor\
    \ of the one not having warnings enabled.\n\nIf a procedure is compiled and compilation\
    \ warnings occur, the procedure can still be executed. The warnings are there\
    \ to give you a heads-up that you might have a problem in your code. But the compiler\
    \ doesn't know everything. Not all warnings are problems. You are always free\
    \ to execute your code.\n\n![images](images/square.jpg) `Tip` If you want to examine\
    \ what type of warnings you can get and you have access to the Oracle binaries\
    \ on the database server, you can examine the file `$ORACLE_HOME/plsql/mesg/plw<LANG>.msg`.\
    \ This file contains the all the warning messages."
  raw: "#### Guidance\n\nJust because you have the ability to write parallel MapReduce\
    \ algorithms in PL/SQL doesn't always mean you should use them. In many cases,\
    \ it would take less code to accomplish the same result (including using parallelism)\
    \ in a single SQL statement. Your entire example could be written as follows:\n\
    \n`select    /*+ parallel */`\n`          letter key_item,`\n`          count(*)\
    \ value_item`\n`from`\n`(`\n`select    substr(d.text,c.i,1) letter`\n`from      documents\
    \ d,`\n`          (select level i from dual connect by level <= 30) c`\n`)`\n\
    `where     letter is not null`\n`group by  letter`\n`order by  letter;`\n\nThe\
    \ point is that not all solutions require implementation in terms of programming\
    \ primitives like MapReduce. The real value in understanding this approach comes\
    \ when you are trying to move back and forth from other parallel programming environments.\
    \ By understanding how to implement a parallel algorithm in PL/SQL you can more\
    \ easily translate concepts from other languages and systems.\n\n#### Parallel\
    \ Pipelined Table Functions Summary\n\nYou've seen how you can write PL/SQL functions\
    \ that act like tables, producing rows programmatically and how these functions\
    \ can be invoked in a parallel fashion. It's important to note that these functions\
    \ can pass data to other PL/SQL table functions that can also be run in parallel,\
    \ building a chain of parallel transformations and operations on data, similar\
    \ to many MapReduce cycles.\n\n### Summary\n\nOracle provides many different ways\
    \ to use PL/SQL to implement parallel programming algorithms. However, as noted,\
    \ careful consideration must be given to whether or not parallel constructs will\
    \ provide you with the benefit you're looking for. Parallel options *always* consume\
    \ more system resources than their serial counterparts, but in situations where\
    \ you have available capacity, they provide ways to both speed up long-running\
    \ activities or give you an ability to handle very large data sets. These capabilities\
    \ may also serve you well when translating parallel algorithms from other systems.\n\
    \nAs of 11gR2, the parallel pipelined table functions provide you with the most\
    \ flexible and mature method for dividing up work among independent processors\
    \ and across clusters in a clustered database environment. The DBMS_PARALLEL_EXECUTE\
    \ framework new in 11gR2 is also an intriguing option that Standard Edition users\
    \ can take advantage of for a higher degree of programmatic control—at the cost\
    \ of flexibility with regard to dividing and sorting data for parallelization.\n\
    \n## C H A P T E R  4\n\n## Warnings and Conditional Compilation\n\nby Torben\
    \ Holm\n\nWhen Oracle implemented Java in the RDBMS kernel, it was thought to\
    \ be the end of PL/SQL. However, in version 10.2, Oracle rewrote the PL/SQL compiler\
    \ and implemented various new features, proving that there is a future for PL/SQL.\
    \ This chapter will cover two features that were first seen in Oracle 10.2: PL/SQL\
    \ warnings and PL/SQL conditional compilation.\n\n### PL/SQL Warnings\n\nIn Oracle\
    \ 10.2, Oracle implemented PL/SQL warnings. The feature gives the ability to compile\
    \ PL/SQL and get warnings if some of the code implements poor practices or conflicts\
    \ with reserved words or Oracle functions. Prior to Oracle 10.2, your PL/SQL would\
    \ sometimes compile—only to throw errors at runtime. The purpose of PL/SQL warnings\
    \ is to warn of potential mistakes at compile time when they are easier to fix,\
    \ thereby ensuring that code being applied to the database is as robust and optimal\
    \ as possible.\n\n#### Basics\n\nBefore you start looking at what you gain from\
    \ the PL/SQL warnings, first look at some basic aspects of the feature. By default,\
    \ PL/SQL warnings are disabled. PL/SQL warnings can be enabled at the system,\
    \ session, or procedure level. PL/SQL warnings are divided into three categories:\n\
    \n> **Severe**: These are warnings about code that contains a conflict with functions\
    \ in SYS.STANDARD or SQL functions.\n> \n> **Performance**: These are warnings\
    \ about code that may have a performance impact, such as the use of wrong data\
    \ types in queries and the lack of use of NOCOPY compile directive when appropriate.\n\
    > \n> **Informational**: These are warnings relating to code that does no harm\
    \ and/or may even be removed.\n\nWhen you create or compile a stored procedure,\
    \ it inherits the settings in the session you are running by default. The PL/SQL\
    \ warning level is determined by the value of the parameter `plsql_warnings`.\
    \ You can show the current parameter value as follows:\n\n`SQL@V112> show parameter\
    \ plsql_warnings`\n\n`NAME                                 TYPE        VALUE`\n\
    `------------------------------------ ----------- ------------------------------`\n\
    `plsql_warnings                       string      DISABLE:ALL`\n\n`The default\
    \ value is DISABLE:ALL`\n\nIf you are not allowed to execute a SHOW PARAMETER\
    \ command, the value of `plsql_warnings` can be examined with the following query:\n\
    \n`SQL@V112> SELECT DBMS_WARNING.GET_WARNING_SETTING_STRING FROM DUAL;`\n\n`GET_WARNING_SETTING_STRING`\n\
    `----------------------------------------------------------------`\n`DISABLE:ALL`\n\
    \nTo enable all warnings for the current session, execute the following:\n\n`SQL@V112>\
    \ alter session set plsql_warnings='ENABLE:ALL';`\n\n`Session altered.`\n\n![images](images/square.jpg)\
    \ **Note** In most cases, you need the ALTER SESSION privilege to alter your session\
    \ parameters. This is not the case when it comes to altering the `plsql_warnings`\
    \ parameter.\n\nFurthermore, the `plsql_warnings` string is not case sensitive.\n\
    \nTo enable severe and performance warnings and disable informational warnings\
    \ in one go, execute the following statement:\n\n`SQL@V112> alter session set\
    \ plsql_warnings='ENABLE:SEVERE,ENABLE:PERFORMANCE,`\n`DISABLE:INFORMATIONAL';`\n\
    \n`Session altered.`\n\nThe parameter setting is not cumulative. If you first\
    \ set `plsql_warnings` to ENABLE:SEVERE and afterwards ENABLE:PERFORMANCE, then\
    \ only warnings regarding performance is enabled.\n\nShould you want to set the\
    \ parameter from within PL/SQL, you can do so by calling DBMS_WARNINGS.SETWARNING_SETTING_STRING.\
    \ Enabling only setting one will disable others. This example will enable severe\
    \ warnings only and at the session level:\n\n`SQL@V112> EXEC DBMS_WARNING.SET_WARNING_SETTING_STRING('ENABLE:SEVERE',\
    \ 'SESSION');`\n\n`PL/SQL procedure successfully completed.`\n\nEnabling warnings\
    \ does not affect execution time, but it may affect compilation time a bit. Should\
    \ you compile a procedure 1,000 times, you'd find the difference between compiling\
    \ with warnings and compiling without warnings will be about one second in favor\
    \ of the one not having warnings enabled.\n\nIf a procedure is compiled and compilation\
    \ warnings occur, the procedure can still be executed. The warnings are there\
    \ to give you a heads-up that you might have a problem in your code. But the compiler\
    \ doesn't know everything. Not all warnings are problems. You are always free\
    \ to execute your code.\n\n![images](images/square.jpg) **Tip** If you want to\
    \ examine what type of warnings you can get and you have access to the Oracle\
    \ binaries on the database server, you can examine the file `$ORACLE_HOME/plsql/mesg/plw<LANG>.msg`.\
    \ This file contains the all the warning messages."
  trans: "\n#### 指导\n\n仅仅因为您有能力在 PL/SQL 中编写并行 MapReduce 算法，并不总是意味着您应该使用它们。在许多情况下，使用单个\
    \ SQL 语句（包括使用并行性）来完成相同的结果所需的代码更少。您的整个示例可以写成如下形式：\n\n```sql\nselect    /*+ parallel\
    \ */\n          letter key_item,\n          count(*) value_item\nfrom\n(\nselect\
    \    substr(d.text,c.i,1) letter\nfrom      documents d,\n          (select level\
    \ i from dual connect by level <= 30) c\n)\nwhere     letter is not null\ngroup\
    \ by  letter\norder by  letter;\n```\n\n关键点在于，并非所有解决方案都需要通过像 MapReduce 这样的编程原语来实现。理解这种方法的真正价值在于，当您试图在其他并行编程环境之间来回转换时。通过理解如何在\
    \ PL/SQL 中实现并行算法，您可以更轻松地从其他语言和系统转换概念。\n\n#### 并行管道表函数总结\n\n您已经了解了如何编写像表一样工作的 PL/SQL\
    \ 函数，这些函数以编程方式生成行，以及如何以并行方式调用这些函数。值得注意的是，这些函数可以将数据传递给其他也可以并行运行的 PL/SQL 表函数，从而构建一个数据并行转换和操作链，类似于许多\
    \ MapReduce 循环。\n\n### 总结\n\nOracle 提供了许多不同的方法来使用 PL/SQL 实现并行编程算法。然而，如前所述，必须仔细考虑并行结构是否能为您提供所需的收益。并行选项`总是`比其串行对应版本消耗更多的系统资源，但在您有可用容量的情况下，它们提供了加速长时间运行活动或处理非常大数据集的能力。在将其他系统的并行算法进行转换时，这些功能也可能对您大有裨益。\n\
    \n截至 11gR2，并行管道表函数为您提供了最灵活和最成熟的方法，用于在独立的处理器之间以及在集群数据库环境中的集群节点之间分配工作。11gR2 中新增的\
    \ `DBMS_PARALLEL_EXECUTE` 框架也是一个引人注目的选项，标准版用户可以利用它来获得更高程度的编程控制——代价是在为并行化划分和排序数据方面灵活性有所降低。\n\
    \n## 第 4 章\n\n## 警告和条件编译\n\n作者：Torben Holm\n\n当 Oracle 在 RDBMS 内核中实现 Java 时，人们认为这将是\
    \ PL/SQL 的终结。然而，在 10.2 版本中，Oracle 重写了 PL/SQL 编译器并实现了各种新功能，证明了 PL/SQL 是有未来的。本章将介绍首次出现在\
    \ Oracle 10.2 中的两个特性：PL/SQL 警告和 PL/SQL 条件编译。\n\n### PL/SQL 警告\n\n在 Oracle 10.2\
    \ 中，Oracle 实现了 PL/SQL 警告功能。此功能可以在编译 PL/SQL 时获得警告，如果某些代码实现了不良实践或与保留字或 Oracle 函数冲突。在\
    \ Oracle 10.2 之前，您的 PL/SQL 有时会编译通过——却在运行时抛出错误。PL/SQL 警告的目的是在编译时更容易修复潜在错误时发出警告，从而确保应用于数据库的代码尽可能健壮和最优。\n\
    \n#### 基础知识\n\n在您开始了解从 PL/SQL 警告中能获得什么之前，先来看一下该功能的一些基本方面。默认情况下，PL/SQL 警告是禁用的。PL/SQL\
    \ 警告可以在系统、会话或过程级别启用。PL/SQL 警告分为三类：\n\n> `Severe`（严重）：这些警告针对与 SYS.STANDARD 或 SQL\
    \ 函数中的函数存在冲突的代码。\n>\n> `Performance`（性能）：这些警告针对可能对性能产生影响的代码，例如在查询中使用错误的数据类型以及在适当情况下未使用\
    \ NOCOPY 编译指令。\n>\n> `Informational`（信息性）：这些警告与无害和/或甚至可能被移除的代码相关。\n\n当您创建或编译存储过程时，它默认继承您运行时所在会话的设置。PL/SQL\
    \ 警告级别由参数 `plsql_warnings` 的值决定。您可以按如下方式显示当前参数值：\n\n```sql\nSQL@V112> show parameter\
    \ plsql_warnings\n\nNAME                             TYPE        VALUE\n--------------------------------\
    \ ----------- ------------------------------\nplsql_warnings                 \
    \  string      DISABLE:ALL\n\n默认值是 DISABLE:ALL\n```\n\n如果您无权执行 SHOW PARAMETER\
    \ 命令，可以使用以下查询检查 `plsql_warnings` 的值：\n\n```sql\nSQL@V112> SELECT DBMS_WARNING.GET_WARNING_SETTING_STRING\
    \ FROM DUAL;\n\nGET_WARNING_SETTING_STRING\n----------------------------------------------------------------\n\
    DISABLE:ALL\n```\n\n要为当前会话启用所有警告，请执行以下操作：\n\n```sql\nSQL@V112> alter session set\
    \ plsql_warnings='ENABLE:ALL';\n\nSession altered.\n```\n\n![images](img/square.jpg)\
    \ `注意` 在大多数情况下，您需要 `ALTER SESSION` 权限才能更改会话参数。但在更改 `plsql_warnings` 参数时并非如此。\n\
    \n此外，`plsql_warnings` 字符串不区分大小写。\n\n要一次启用严重和性能警告并禁用信息性警告，请执行以下语句：\n\n```sql\n\
    SQL@V112> alter session set plsql_warnings='ENABLE:SEVERE,ENABLE:PERFORMANCE,\n\
    DISABLE:INFORMATIONAL';\n\nSession altered.\n```\n\n参数设置不是累积的。如果您先将 `plsql_warnings`\
    \ 设置为 `ENABLE:SEVERE`，然后再设置 `ENABLE:PERFORMANCE`，那么只有与性能相关的警告会被启用。\n\n如果您想从 PL/SQL\
    \ 内部设置参数，可以通过调用 `DBMS_WARNINGS.SET_WARNING_SETTING_STRING` 来实现。启用一个设置将会禁用其他设置。此示例将在会话级别仅启用严重警告：\n\
    \n```sql\nSQL@V112> EXEC DBMS_WARNING.SET_WARNING_SETTING_STRING('ENABLE:SEVERE',\
    \ 'SESSION');\n\nPL/SQL procedure successfully completed.\n```\n\n启用警告不会影响执行时间，但可能会稍微影响编译时间。如果您编译一个过程\
    \ 1000 次，您会发现启用警告编译和未启用警告编译之间的差异大约是一秒，未启用的编译更快。\n\n如果一个过程在编译时出现编译警告，该过程仍然可以执行。警告是为了提醒您，您的代码中可能存在问题。但编译器并非全知全能。并非所有警告都是问题。您始终可以自由执行您的代码。\n\
    \n![images](img/square.jpg) `提示` 如果您想检查可能遇到的警告类型，并且可以访问数据库服务器上的 Oracle 二进制文件，可以查看文件\
    \ `$ORACLE_HOME/plsql/mesg/plw<LANG>.msg`。此文件包含所有的警告信息。\n"
- fmt: "#### Using Warnings\n\nLet's have a look at some examples. First, create a\
    \ simple table called `T1` with a column named `KEY` of type `VARCHAR2` and a\
    \ column called `VALUE` of `VARCHAR2`. Assume that the column `KEY`, although\
    \ defined as `VARCHAR2`, only contains numbers. Sadly, you will sometimes see\
    \ this approach in real-world production systems. Here is the code to create the\
    \ table:\n\n```sql\nSQL@V112> CREATE TABLE T1 (\n2 KEY VARCHAR2(10) CONSTRAINT\
    \ PK_T1 PRIMARY KEY,\n3 VALUE VARCHAR2(10))\n4 /\n\nTable Created.\n```\n\nNow,\
    \ load the table with test data.\n\n```sql\nSQL@V112> insert into t1 select rownum,\
    \ substr(text,1,10) from all_source where rownum < 10000;\n\n9999 rows created.\n\
    ```\n\nNow enable severe and performance PL/SQL warnings.\n\n```sql\nSQL@V112>\
    \ alter session set plsql_warnings='ENABLE:SEVERE, ENABLE:PERFORMANCE';\n\nSession\
    \ altered.\n```\n\nNext, create a function that will return the `VALUE` for a\
    \ given key.\n\n```sql\nSQL@V112> CREATE OR REPLACE FUNCTION GET_T1_KEY (P_KEY\
    \ NUMBER) RETURN VARCHAR2 IS\n2   l_value T1.VALUE%TYPE;\n3  BEGIN\n4     SELECT\
    \ VALUE INTO l_value FROM T1 WHERE KEY = P_KEY;\n5     RETURN l_value;\n6    \
    \ EXCEPTIONS\n7     WHEN NO_ROWS_FOUND THEN\n8       RETURN 'No value found';\n\
    9  END;\n10 /\n\nSP2-0804 Procedure created with compilation warnings.\n```\n\n\
    The procedure compiles with warnings. To show the warnings in SQL*Plus, simply\
    \ do a `show error`, like so:\n\n```sql\nSQL@V112> show err\nLINE/COL ERROR\n\
    -------- -----------------------------------------------------------------\n1/1\
    \      PLW-05018: unit GET_T1_KEY omitted optional AUTHID clause;\n         default\
    \ value DEFINER used\n\n4/45     PLW-07204: conversion away from column type may\
    \ result in\n         sub-optimal query plan\n```\n\n![images](images/square.jpg)\
    \ **Note** If you examine `ATTRIBUTE` and `MESSAGE_NUMBER` in the `USER_ERRORS`\
    \ table, you'll see that `ATTRIBUTE` holds either `ERROR` or `WARNING` and the\
    \ error/warning number is in `MESSAGE_NUMBER` column.\n\nEven though the function\
    \ is compiled with warnings, you will still be able to execute it.\n\n```sql\n\
    SQL@V112> var txt varchar2(10);\nSQL@V112> exec :txt := GET_T1_KEY(1);\n\nPL/SQL\
    \ procedure successfully completed.\n\nElapsed: 00:00:00.14\n```\n\nWhether or\
    \ not the `KEY` column should or should not be changed to `NUMBER` is not the\
    \ question for now. In this case, you need to change the function. So change the\
    \ `P_KEY` parameter to `VARCHAR2` and get rid of warning `PLW-05018` by adding\
    \ `AUTHID DEFINER` to the function. Here's the new version of the function:\n\n\
    ```sql\nSQL@V112> CREATE OR REPLACE FUNCTION GET_T1_KEY (P_KEY VARCHAR2) RETURN\
    \ VARCHAR2\n2  AUTHID DEFINER\n3  IS\n4    L_value T1.VALUE%TYPE;\n5  BEGIN\n\
    6     SELECT VALUE INTO l_value FROM T1 WHERE KEY = P_KEY;\n7     RETURN l_value;\n\
    8     EXCEPTIONS\n9     WHEN NO_ROWS_FOUND THEN\n10      RETURN 'No value found';\n\
    11 END;\n12 /\n\nFunction created\n```\n\nThis new version of the function is\
    \ created without errors or warnings. Notice that it executes faster (twice as\
    \ fast, in this case) now that the correct data type is being used and the function\
    \ uses the index to look up the key. Here's an example execution:\n\n```sql\n\
    SQL@V112> exec :txt := GET_T1_KEY('1');\n\nPL/SQL procedure successfully completed.\n\
    \nElapsed: 00:00:00.07\nSQL@V112>\n```\n\nThe `PLW-7204` warning tells you that\
    \ when selecting from the table `T1`, Oracle will have to do data type conversion.\
    \ When using the parameter values, Oracle will have to do a data type conversion\
    \ because the parameter data type is `NUMBER` and the data type for the column\
    \ is `VARCHAR2`. When Oracle does a data type conversion (such as `to_number`,\
    \ `to_char`, `to_date`, etc.), it may happen that indexes, if such exist on the\
    \ queried column, will be ignored. That ignoring of indexes accounts for the time\
    \ variance between the preceding two examples.\n\nYou could do a profiling of\
    \ the code to examine where the code uses more time in the first example compared\
    \ to the second, but because the code is simple, you'll just examine what happens\
    \ by looking at the `SELECT` statement. Start by setting `AUTOTRACE ON` for the\
    \ session and then use the `KEY` value correctly—as a character—according to the\
    \ data type of the column in the table.\n\n```sql\nSQL@V112> select value from\
    \ T1 where key = '1';\n\nVALUE\n----------\npackage ST\n\nElapsed: 00:00:00.01\n\
    SQL@V112>\n```\n\nExamining the execution plan shows that the index `PK_T1` is\
    \ used.\n\n```sql\n-------------------------------------------------------------------------------------\n\
    | Id  | Operation                   | Name  | Rows  | Bytes | Cost (%CPU)| Time\
    \     |\n-------------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT            |       |     1 |    14 |     1   (0)| 00:00:01\
    \ |\n|   1 |  TABLE ACCESS BY INDEX ROWID| T1    |     1 |    14 |     1   (0)|\
    \ 00:00:01 |\n|*  2 |   INDEX UNIQUE SCAN         | PK_T1 |     1 |       |  \
    \   1   (0)| 00:00:01 |\n-------------------------------------------------------------------------------------\n\
    \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
    \n   2 - access(\"KEY\"='1')\n```\n\nIn the next example, the `KEY` value is not\
    \ correctly used according to the data type of the column in the table, but it\
    \ would have been used in the first place, had I ignored the warning.\n\n```sql\n\
    SQL@V112> select value from t1 where key = 1;\n\nVALUE\n----------\npackage ST\n\
    \nElapsed: 00:00:00.20\n```\n\nThe execution plan for the statement now shows\
    \ that the index is not used and that Oracle does a full table scan. Notice the\
    \ filter in the Predicate Information; Oracle has added a `TO_NUMBER` to the `KEY`\
    \ column, and therefore the index is not being used. Should there be characters\
    \ in the `KEY` column, as the definition allows, the function would have failed\
    \ with an `ORA-01722: invalid number`. Here is the plan output:\n\n```sql\n--------------------------------------------------------------------------\n\
    | Id  | Operation         | Name | Rows  | Bytes | Cost (%CPU)| Time     |\n--------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT  |      |     1 |    14 |     2   (0)| 00:00:01 |\n|*\
    \  1 |  TABLE ACCESS FULL| T1   |     1 |    14 |     2   (0)| 00:00:01 |\n--------------------------------------------------------------------------\n\
    \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
    \n   1 - filter(TO_NUMBER(\"KEY\")=1)\n\nSQL@V112>\n```\n\nAs you see in this\
    \ example, the correct defined function is approximately 20 times faster than\
    \ the function with the parameter with the wrong data type. If warnings had not\
    \ been enabled, you might not have noticed the wrong parameter data type and therefore\
    \ not corrected the function. As you might notice, you can't at first distinguish\
    \ whether a warning is an informational, performance, or severe warning. The way\
    \ to determine the warning's category is to execute the `dbms_warning.get_category`\
    \ function, like so:\n\n```sql\nSQL@V112> SELECT DBMS_WARNING.GET_CATEGORY(7204)\
    \ FROM DUAL;\n    DBMS_WARNING.GET_CATEGORY(7204)\n    -----------------------------------------------------------------------\n\
    \    PERFORMANCE\n```\n\nAs you work with warnings, you'll learn that severe warnings\
    \ are in the range 5000 to 5999, informational are in the range 6000 to 6249,\
    \ and performance in the range 7000 to 7249. Once you know the ranges, it becomes\
    \ easy to classify the warnings by their numbers."
  raw: '#### Using Warnings


    Let''s have a look at some examples. First, create a simple table called T1 with
    a column named KEY of type VARCHAR2 and a column called VALUE of VARCHAR2\. Assume
    that the column KEY, although defined as VARCHAR2, only contains numbers. Sadly,
    you will sometimes see this approach in real-world production systems. Here is
    the code to create the table:


    `SQL@V112> CREATE TABLE T1 (`

    `2 KEY VARCHAR2(10) CONSTRAINT PK_T1 PRIMARY KEY,`

    `3 VALUE VARCHAR2(10))`

    `4 /`


    `Table Created.`


    Now, load the table with test data.


    `SQL@V112> insert into t1 select rownum, substr(text,1,10) from all_source where
    rownum < 10000;`


    `9999 rows created.`


    Now enable severe and performance PL/SQL warnings.


    `SQL@V112> alter session set plsql_warnings=''ENABLE:SEVERE, ENABLE:PERFORMANCE'';`


    `Session altered.`


    Next, create a function that will return the VALUE for a given key.


    `SQL@V112> CREATE OR REPLACE FUNCTION GET_T1_KEY (P_KEY NUMBER) RETURN VARCHAR2
    IS`

    `2   l_value T1.VALUE%TYPE;`

    `3  BEGIN`

    `4     SELECT VALUE INTO l_value FROM T1 WHERE KEY = P_KEY;`

    `5     RETURN l_value;`

    `6     EXCEPTIONS`

    `7     WHEN NO_ROWS_FOUND THEN`

    `8       RETURN ''No value found'';`

    `9  END;`

    `10 /`


    `SP2-0804 Procedure created with compilation warnings.`


    The procedure compiles with warnings. To show the warnings in SQL*Plus, simply
    do a show error, like so:


    `SQL@V112> show err`

    `LINE/COL ERROR`

    `-------- -----------------------------------------------------------------`

    `1/1      PLW-05018: unit GET_T1_KEY omitted optional AUTHID clause;`

    `         default value DEFINER used`


    `4/45     PLW-07204: conversion away from column type may result in`

    `         sub-optimal query plan`


    ![images](images/square.jpg) **Note** If you examine ATTRIBUTE and MESSAGE_NUMBER
    in the USER_ERRORS table, you''ll see that ATTRIBUTE holds either ERROR or WARNING
    and the error/warning number is in MESSAGE_NUMBER column.


    Even though the function is compiled with warnings, you will still be able to
    execute it.


    `SQL@V112> var txt varchar2(10);`

    `SQL@V112> exec :txt := GET_T1_KEY(1);`


    `PL/SQL procedure successfully completed.`


    `Elapsed: 00:00:00.14`


    Whether or not the KEY column should or should not be changed to NUMBER is not
    the question for now. In this case, you need to change the function. So change
    the P_KEY parameter to VARCHAR2 and get rid of warning PLW-05018 by adding AUTHID
    DEFINER to the function. Here''s the new version of the function:


    `SQL@V112> CREATE OR REPLACE FUNCTION GET_T1_KEY (P_KEY VARCHAR2) RETURN VARCHAR2`

    `2  AUTHID DEFINER`

    `3  IS`

    `4    L_value T1.VALUE%TYPE;`

    `5  BEGIN`

    `6     SELECT VALUE INTO l_value FROM T1 WHERE KEY = P_KEY;`

    `7     RETURN l_value;`

    `8     EXCEPTIONS`

    `9     WHEN NO_ROWS_FOUND THEN`

    `10      RETURN ''No value found'';`

    `11 END;`

    `12 /`


    `Function created`


    This new version of the function is created without errors or warnings. Notice
    that it executes faster (twice as fast, in this case) now that the correct data
    type is being used and the function uses the index to look up the key. Here''s
    an example execution:


    `SQL@V112> exec :txt := GET_T1_KEY(''1'');`


    `PL/SQL procedure successfully completed.`


    `Elapsed: 00:00:00.07`

    `SQL@V112>`


    The PLW-7204 warning tells you that when selecting from the table T1, Oracle will
    have to do data type conversion. When using the parameter values, Oracle will
    have to do a data type conversion because the parameter data type is NUMBER and
    the data type for the column is VARCHAR2\. When Oracle does a data type conversion
    (such as to_number, to_char, to_date, etc.), it may happen that indexes, if such
    exist on the queried column, will be ignored. That ignoring of indexes accounts
    for the time variance between the preceding two examples.


    You could do a profiling of the code to examine where the code uses more time
    in the first example compared to the second, but because the code is simple, you''ll
    just examine what happens by looking at the SELECT statement. Start by setting
    AUTOTRACE ON for the session and then use the KEY value correctly—as a character—according
    to the data type of the column in the table.


    `SQL@V112> select value from T1 where key = ''1'';`


    `VALUE`

    `----------`

    `package ST`


    `Elapsed: 00:00:00.01`

    `SQL@V112>`


    Examining the execution plan shows that the index PK_T1 is used.


    `-------------------------------------------------------------------------------------`

    `| Id  | Operation                   | Name  | Rows  | Bytes | Cost (%CPU)| Time     |`

    `-------------------------------------------------------------------------------------`

    `|   0 | SELECT STATEMENT            |       |     1 |    14 |     1   (0)| 00:00:01
    |`

    `|   1 |  TABLE ACCESS BY INDEX ROWID| T1    |     1 |    14 |     1   (0)| 00:00:01
    |`

    `|*  2 |   INDEX UNIQUE SCAN         | PK_T1 |     1 |       |     1   (0)| 00:00:01
    |`

    `-------------------------------------------------------------------------------------`


    `Predicate Information (identified by operation id):`

    `---------------------------------------------------`


    `   2 - access("KEY"=''1'')`


    In the next example, the KEY value is not correctly used according to the data
    type of the column in the table, but it would have been used in the first place,
    had I ignored the warning.


    `SQL@V112> select value from t1 where key = 1;`


    `VALUE`

    `----------`

    `package ST`


    `Elapsed: 00:00:00.20`


    The execution plan for the statement now shows that the index is not used and
    that Oracle does a full table scan. Notice the filter in the Predicate Information;
    Oracle has added a TO_NUMBER to the KEY column, and therefore the index is not
    being used. Should there be characters in the KEY column, as the definition allows,
    the function would have failed with an ORA-01722: invalid number. Here is the
    plan output:


    `--------------------------------------------------------------------------`

    `| Id  | Operation         | Name | Rows  | Bytes | Cost (%CPU)| Time     |`

    `--------------------------------------------------------------------------`

    `|   0 | SELECT STATEMENT  |      |     1 |    14 |     2   (0)| 00:00:01 |`

    `|*  1 |  TABLE ACCESS FULL| T1   |     1 |    14 |     2   (0)| 00:00:01 |`

    `--------------------------------------------------------------------------`


    `Predicate Information (identified by operation id):`

    `---------------------------------------------------`


    `   1 - filter(TO_NUMBER("KEY")=1)`


    `SQL@V112>`


    As you see in this example, the correct defined function is approximately 20 times
    faster than the function with the parameter with the wrong data type. If warnings
    had not been enabled, you might not have noticed the wrong parameter data type
    and therefore not corrected the function. As you might notice, you can''t at first
    distinguish whether a warning is an informational, performance, or severe warning.
    The way to determine the warning''s category is to execute the `dbms_warning.get_category`
    function, like so:


    `SQL@V112> SELECT DBMS_WARNING.GET_CATEGORY(7204) FROM DUAL;`

    `    DBMS_WARNING.GET_CATEGORY(7204)`

    `    -----------------------------------------------------------------------`

    `    PERFORMANCE`


    As you work with warnings, you''ll learn that severe warnings are in the range
    5000 to 5999, informational are in the range 6000 to 6249, and performance in
    the range 7000 to 7249\. Once you know the ranges, it becomes easy to classify
    the warnings by their numbers.'
  trans: "#### 使用警告\n\n让我们来看几个例子。首先，创建一个名为 `T1` 的简单表，其中包含一个类型为 `VARCHAR2` 的 `KEY`\
    \ 列和一个名为 `VALUE` 的 `VARCHAR2` 列。假设 `KEY` 列虽然定义为 `VARCHAR2`，但只包含数字。不幸的是，你在现实世界的生产系统中有时会看到这种做法。以下是创建表的代码：\n\
    \n```sql\nSQL@V112> CREATE TABLE T1 (\n2 KEY VARCHAR2(10) CONSTRAINT PK_T1 PRIMARY\
    \ KEY,\n3 VALUE VARCHAR2(10))\n4 /\n\nTable Created.\n```\n\n现在，向表中加载测试数据。\n\n\
    ```sql\nSQL@V112> insert into t1 select rownum, substr(text,1,10) from all_source\
    \ where rownum < 10000;\n\n9999 rows created.\n```\n\n然后启用严重和性能相关的 PL/SQL 警告。\n\
    \n```sql\nSQL@V112> alter session set plsql_warnings='ENABLE:SEVERE, ENABLE:PERFORMANCE';\n\
    \nSession altered.\n```\n\n接下来，创建一个函数，该函数将根据给定的键返回对应的 `VALUE`。\n\n```sql\nSQL@V112>\
    \ CREATE OR REPLACE FUNCTION GET_T1_KEY (P_KEY NUMBER) RETURN VARCHAR2 IS\n2 \
    \  l_value T1.VALUE%TYPE;\n3  BEGIN\n4     SELECT VALUE INTO l_value FROM T1 WHERE\
    \ KEY = P_KEY;\n5     RETURN l_value;\n6     EXCEPTIONS\n7     WHEN NO_ROWS_FOUND\
    \ THEN\n8       RETURN 'No value found';\n9  END;\n10 /\n\nSP2-0804 Procedure\
    \ created with compilation warnings.\n```\n\n该过程编译时带有警告。要在 SQL*Plus 中显示警告，只需执行\
    \ `show error`，如下所示：\n\n```sql\nSQL@V112> show err\nLINE/COL ERROR\n-------- -----------------------------------------------------------------\n\
    1/1      PLW-05018: unit GET_T1_KEY omitted optional AUTHID clause;\n        \
    \ default value DEFINER used\n\n4/45     PLW-07204: conversion away from column\
    \ type may result in\n         sub-optimal query plan\n```\n\n![images](img/square.jpg)\
    \ **注意** 如果你检查 `USER_ERRORS` 表中的 `ATTRIBUTE` 和 `MESSAGE_NUMBER`，你会发现 `ATTRIBUTE`\
    \ 要么是 `ERROR` 要么是 `WARNING`，而错误/警告编号则在 `MESSAGE_NUMBER` 列中。\n\n尽管函数编译时带有警告，你仍然可以执行它。\n\
    \n```sql\nSQL@V112> var txt varchar2(10);\nSQL@V112> exec :txt := GET_T1_KEY(1);\n\
    \nPL/SQL procedure successfully completed.\n\nElapsed: 00:00:00.14\n```\n\n现在，`KEY`\
    \ 列是否应该或不应该更改为 `NUMBER` 并不是当前的问题。在本例中，你需要修改函数。因此，将 `P_KEY` 参数更改为 `VARCHAR2`，并通过向函数添加\
    \ `AUTHID DEFINER` 来消除 `PLW-05018` 警告。以下是函数的新版本：\n\n```sql\nSQL@V112> CREATE OR\
    \ REPLACE FUNCTION GET_T1_KEY (P_KEY VARCHAR2) RETURN VARCHAR2\n2  AUTHID DEFINER\n\
    3  IS\n4    L_value T1.VALUE%TYPE;\n5  BEGIN\n6     SELECT VALUE INTO l_value\
    \ FROM T1 WHERE KEY = P_KEY;\n7     RETURN l_value;\n8     EXCEPTIONS\n9     WHEN\
    \ NO_ROWS_FOUND THEN\n10      RETURN 'No value found';\n11 END;\n12 /\n\nFunction\
    \ created\n```\n\n这个新版本的函数创建时没有错误或警告。请注意，由于现在使用了正确的数据类型，并且函数使用索引来查找键，因此执行速度更快（在此例中快了一倍）。以下是一个执行示例：\n\
    \n```sql\nSQL@V112> exec :txt := GET_T1_KEY('1');\n\nPL/SQL procedure successfully\
    \ completed.\n\nElapsed: 00:00:00.07\nSQL@V112>\n```\n\n`PLW-7204` 警告告诉你，当从表 `T1`\
    \ 中选择时，Oracle 将不得不进行数据类型转换。当使用参数值时，Oracle 将不得不进行数据类型转换，因为参数的数据类型是 `NUMBER`，而列的数据类型是\
    \ `VARCHAR2`。当 Oracle 进行数据类型转换时（例如 `to_number`、`to_char`、`to_date` 等），可能会导致索引（如果查询列上存在索引的话）被忽略。这种忽略索引的情况解释了前面两个示例之间的时间差异。\n\
    \n你可以对代码进行性能分析，以检查在第一个示例中代码相对于第二个示例在哪些地方花费了更多时间，但由于代码很简单，你只需通过查看 `SELECT` 语句来了解发生了什么。首先为会话设置\
    \ `AUTOTRACE ON`，然后根据表中列的数据类型正确地将 `KEY` 值作为字符使用。\n\n```sql\nSQL@V112> select value\
    \ from T1 where key = '1';\n\nVALUE\n----------\npackage ST\n\nElapsed: 00:00:00.01\n\
    SQL@V112>\n```\n\n检查执行计划显示索引 `PK_T1` 被使用了。\n\n```sql\n-------------------------------------------------------------------------------------\n\
    | Id  | Operation                   | Name  | Rows  | Bytes | Cost (%CPU)| Time\
    \     |\n-------------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT            |       |     1 |    14 |     1   (0)| 00:00:01\
    \ |\n|   1 |  TABLE ACCESS BY INDEX ROWID| T1    |     1 |    14 |     1   (0)|\
    \ 00:00:01 |\n|*  2 |   INDEX UNIQUE SCAN         | PK_T1 |     1 |       |  \
    \   1   (0)| 00:00:01 |\n-------------------------------------------------------------------------------------\n\
    \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
    \n   2 - access(\"KEY\"='1')\n```\n\n在下一个例子中，`KEY` 值没有根据表中列的数据类型正确使用，但如果我当初忽略了警告，它本应被正确使用。\n\
    \n```sql\nSQL@V112> select value from t1 where key = 1;\n\nVALUE\n----------\n\
    package ST\n\nElapsed: 00:00:00.20\n```\n\n该语句的执行计划现在显示索引未被使用，Oracle 进行了全表扫描。注意谓词信息中的过滤器；Oracle\
    \ 向 `KEY` 列添加了一个 `TO_NUMBER`，因此索引未被使用。如果 `KEY` 列中存在字符（正如定义所允许的），该函数将因 `ORA-01722:\
    \ invalid number` 错误而失败。以下是计划输出：\n\n```sql\n--------------------------------------------------------------------------\n\
    | Id  | Operation         | Name | Rows  | Bytes | Cost (%CPU)| Time     |\n--------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT  |      |     1 |    14 |     2   (0)| 00:00:01 |\n|*\
    \  1 |  TABLE ACCESS FULL| T1   |     1 |    14 |     2   (0)| 00:00:01 |\n--------------------------------------------------------------------------\n\
    \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
    \n   1 - filter(TO_NUMBER(\"KEY\")=1)\n\nSQL@V112>\n```\n\n正如你在此示例中看到的，正确定义的函数比参数数据类型错误的函数大约快\
    \ 20 倍。如果警告没有被启用，你可能不会注意到错误的参数数据类型，因此也不会修正该函数。你可能会注意到，一开始你无法区分一个警告是信息性、性能性还是严重性警告。确定警告类别的方法是执行\
    \ `dbms_warning.get_category` 函数，如下所示：\n\n```sql\nSQL@V112> SELECT DBMS_WARNING.GET_CATEGORY(7204)\
    \ FROM DUAL;\n    DBMS_WARNING.GET_CATEGORY(7204)\n    -----------------------------------------------------------------------\n\
    \    PERFORMANCE\n```\n\n当你使用警告时，你会发现严重警告的范围是 5000 到 5999，信息性警告的范围是 6000 到 6249，性能性警告的范围是\
    \ 7000 到 7249。一旦你知道了这些范围，根据编号对警告进行分类就变得容易了。"
- fmt: "#### Promoting Warnings to Errors\n\nAs stated earlier, even though your functions\
    \ or procedures are compiled with warnings, you are still able to execute them.\
    \ If you want to ensure that stored procedures with specific warnings do not make\
    \ it to you production system, you can promote these warnings to become errors.\n\
    \nThe following code is what it looks like to compile the `GET_T1_KEY` function\
    \ with the parameter as a `NUMBER`. Notice the warning that is generated.\n\n\
    ```\nSQL@V112> CREATE OR REPLACE FUNCTION GET_T1_KEY (P_KEY NUMBER) RETURN VARCHAR2\n\
    \  2  AUTHID DEFINER\n  3  IS\n  4     L_value T1.VALUE%TYPE;\n  5  BEGIN\n  6\
    \      SELECT VALUE INTO l_value FROM T1 WHERE KEY = P_KEY;\n  7      RETURN l_value;\n\
    \  8  EXCEPTIONS\n  9  WHEN NO_ROWS_FOUND THEN\n  10    RETURN 'No value found';\n\
    \ 11 END;\n 12 /\nSP2-0806: Function created with compilation warnings\n\nSQL@V112>\
    \ show err\nLINE/COL ERROR\n-------- -----------------------------------------------------------------\n\
    6/49     PLW-07204: conversion away from column type may result in\n         sub-optimal\
    \ query plan\n```\n\nTo ensure that this kind of code is not being deployed—at\
    \ least not without errors—you can promote this warning to become an error. First,\
    \ alter the session disabling all warnings (I do it in this example to concentrate\
    \ on the warning I want to promote). In the same statement, promote the `PLW-07204`\
    \ warning to become an error instead of a warning, like so:\n\n```\nSQL@V112>\
    \ alter session set plsql_warnings='DISABLE:ALL, ERROR:7204';\n\nSession altered.\n\
    ```\n\nThen recompile the `GET_T1_KEY` function.\n\n```\nSQL@V112> alter function\
    \ GET_T1_KEY compile;\n\nWarning: Function altered with compilation errors.\n\n\
    SQL@V112> show err\nErrors for FUNCTION GET_T1_KEY:\n\nLINE/COL ERROR\n--------\
    \ -----------------------------------------------------------------\n6/45    \
    \ PLS-07204: conversion away from column type may result in\n         sub-optimal\
    \ query plan\n```\n\nNow try to execute the function. It will result in errors.\n\
    \n```\nSQL@V112> exec :txt := get_t1_key(1);\nBEGIN :txt := get_t1_key(1); END;\n\
    \n            *\nERROR at line 1:\nORA-06550: line 1, column 13:\nPLS-00905: object\
    \ ACME.GET_T1_KEY is invalid\nORA-06550: line 1, column 7:\nPL/SQL: Statement\
    \ ignored\n```\n\nNotice that `PLW-07204` became `PLS-07204`. The warning is now\
    \ an error, and you are unable to execute the function. To be able to execute\
    \ the function, you will have to get rid of the error by changing the parameter\
    \ type to `VARCHAR2`.\n\nIf you have an existing application with PL/SQL, and\
    \ you enable warnings and recompile the PL/SQL code, you will probably get many\
    \ warnings. Even though it feels good not to get any warnings, it may still, for\
    \ one reason or another, be impossible to get rid of all of the warnings. Should\
    \ warnings exist that you can't get rid of, you are free to ignore them.\n\n![images](images/square.jpg)\
    \ **Caution** It can be tempting to make the elimination of all warnings a hard\
    \ and fast goal. Non-technical managers especially can fall prey to that temptation,\
    \ because they often don't understand the subtle difference between a warning\
    \ and an error. Remember that warning messages come from a machine attempting\
    \ to interpret your code against someone else's set of best practices. Warnings\
    \ thus point to code that deserves to be examined more closely. However, sometimes\
    \ you really do need to perform a certain action, and it would be a *worst practice*\
    \ indeed to allow a compiler to coerce you into blindly following someone else's\
    \ best practice.\n\nAnother small issue with warnings is that they clutter the\
    \ `USER_ERRORS` view. Warnings are logged in the same view as errors. That may\
    \ be annoying if you are used to checking whether the `USER_ERRORS` view is empty\
    \ as a way to see whether you have errors in a give piece of PL/SQL code that\
    \ you have just compiled. You can't eliminate this minor irritation. You must\
    \ live with it, but it's a small price to pay for the value returned by the warnings\
    \ feature.\n\n#### Ignoring Warnings\n\nYou may want to ignore specific warnings\
    \ for some reason. In the next example, all warnings are enabled. But one of the\
    \ warnings can't be removed by changing the code, as the warning regards a column\
    \ name conflicting with a reserved word, and you want to ignore this specific\
    \ informational warning. To enable all warnings, set `plsql_warnings` to `ENABLE:ALL`,\
    \ like so:\n\n```\nSQL@V112> alter session set plsql_warnings='ENABLE:ALL';\n\
    ```\n\nNext, create the following version of the `GET_T1_KEY` function:\n\n```\n\
    SQL@V112>CREATE OR REPLACE FUNCTION GET_T1_KEY (P_KEY NUMBER) RETURN VARCHAR2\n\
    2  AUTHID DEFINER\n3  IS\n       l_value T1.VALUE%TYPE;\n       l_1 NUMBER :=1;\n\
    \       l_2 NUMBER :=2;\n5  BEGIN\n        IF l_1 = l_2 THEN\n          SELECT\
    \ VALUE INTO l_value FROM T1 WHERE KEY = P_KEY;\n          RETURN l_value;\n \
    \      END IF;\n12  END;\n13  /\nSP2-0806: Function created with compilation warnings\n\
    \nSQL@V112> show err\nErrors for FUNCTION GET_T1_KEY:\n\n0/0      PLW-06010: keyword\
    \ \"VALUE\" used as a defined name\n1/1      PLW-05005: subprogram GET_T1_KEY\
    \ returns without value at line 11\n9/11     PLW-06002: Unreachable code\n9/51\
    \     PLW-07204: conversion away from column type may result in\n         sub-optimal\
    \ query plan\n```\n\nLet's look at the warnings one at a time.\n\n*   `PLW-06010`:\
    \ A PL/SQL or SQL word has been used as a defined name. This is legal but not\
    \ recommended. Reserved words can be examined in the `V$RESERVED_WORDS` view.\n\
    *   `PLW-05005`: Oracle discovers that you never enter the `IF` statement and\
    \ therefore will not return a value from the function.\n*   `PLW-06002`: Again,\
    \ Oracle discovers that you never enter the `IF` statement and therefore will\
    \ have unreachable code. Unreachable code does no harm as such, but this could\
    \ indicate inappropriate code. Having too much unreachable code will take up memory\
    \ when you execute PL/SQL.\n*   `PLW-07204`: Well, you know what do with that\
    \ by now.\n\nSo, fix the code and get rid of the warnings. Let's say that for\
    \ some reason, you're unable to change the column name `VALUE`, which is the cause\
    \ for `PLW-06010`; for example, your application might be old, with too much code\
    \ to be fixed if you change the column name.\n\nThe first thing to do is to prepare\
    \ the session.\n\n```\nSQL@V112> alter session set plsql_warnings='ENABLE:ALL,\
    \ ERROR:7204, DISABLE:6010';\n```\n\nIn this case, all warnings are enabled, warning\
    \ `7204` is still promoted to be an error, and warning `6010` is disabled. The\
    \ function can now be reapplied and compiled without errors or warnings.\n\nIf\
    \ you want to examine the PL/SQL warnings that a stored procedure has been compiled\
    \ with, you can issue the following query:\n\n```\nSQL@V112> col plsql_warnings\
    \ for a40\nSQL@V112> SELECT NAME, PLSQL_WARNINGS FROM USER_PLSQL_OBJECT_SETTINGS;\n\
    \nNAME                         PLSQL_WARNINGS\n------------------------------\
    \ ----------------------------------------\nGET_T1_KEY                     ENABLE:ALL,DISABLE:\
    \  6010,ERROR:  7204\n```\n\nThese results show the `PLSQL_WARNINGS` parameter\
    \ value that was in effect when `GET_T1_KEY` was compiled."
  raw: '#### Promoting Warnings to Errors


    As stated earlier, even though your functions or procedures are compiled with
    warnings, you are still able to execute them. If you want to ensure that stored
    procedures with specific warnings do not make it to you production system, you
    can promote these warnings to become errors.


    The following code is what it looks like to compile the `GET_T1_KEY` function
    with the parameter as a NUMBER. Notice the warning that is generated.


    `  SQL@V112> CREATE OR REPLACE FUNCTION GET_T1_KEY (P_KEY NUMBER) RETURN VARCHAR2`

    `  2  AUTHID DEFINER`

    `  3  IS`

    `  4     L_value T1.VALUE%TYPE;`

    `  5  BEGIN`

    `  6      SELECT VALUE INTO l_value FROM T1 WHERE KEY = P_KEY;`

    `  7      RETURN l_value;`

    `  8  EXCEPTIONS`

    `  9  WHEN NO_ROWS_FOUND THEN`

    `  10    RETURN ''No value found'';`

    `  11 END;`

    `  12 /`


    `SP2-0806: Function created with compilation warnings`


    `SQL@V112> show err`


    `LINE/COL ERROR`

    `-------- -----------------------------------------------------------------`

    `6/49     PLW-07204: conversion away from column type may result in`

    `         sub-optimal query plan`


    To ensure that this kind of code is not being deployed—at least not without errors—you
    can promote this warning to become an error. First, alter the session disabling
    all warnings (I do it in this example to concentrate on the warning I want to
    promote). In the same statement, promote the PLW-07204 warning to become an error
    instead of a warning, like so:


    `SQL@V112> alter session set plsql_warnings=''DISABLE:ALL, ERROR:7204'';`


    `Session altered.`


    Then recompile the `GET_T1_KEY` function.


    `SQL@V112> alter function GET_T1_KEY compile;`


    `Warning: Function altered with compilation errors.`


    `SQL@V112> show err`

    `Errors for FUNCTION GET_T1_KEY:`


    `LINE/COL ERROR`

    `-------- -----------------------------------------------------------------`

    `6/45     PLS-07204: conversion away from column type may result in`

    `         sub-optimal query plan`


    Now try to execute the function. It will result in errors.


    `SQL@V112> exec :txt := get_t1_key(1);`

    `BEGIN :txt := get_t1_key(1); END;`


    `            *`

    `ERROR at line 1:`

    `ORA-06550: line 1, column 13:`

    `PLS-00905: object ACME.GET_T1_KEY is invalid`

    `ORA-06550: line 1, column 7:`

    `PL/SQL: Statement ignored`


    Notice that PLW-07204 became PLS-07204\. The warning is now an error, and you
    are unable to execute the function. To be able to execute the function, you will
    have to get rid of the error by changing the parameter type to VARCHAR2.


    If you have an existing application with PL/SQL, and you enable warnings and recompile
    the PL/SQL code, you will probably get many warnings. Even though it feels good
    not to get any warnings, it may still, for one reason or another, be impossible
    to get rid of all of the warnings. Should warnings exist that you can''t get rid
    of, you are free to ignore them.


    ![images](images/square.jpg) **Caution** It can be tempting to make the elimination
    of all warnings a hard and fast goal. Non-technical managers especially can fall
    prey to that temptation, because they often don''t understand the subtle difference
    between a warning and an error. Remember that warning messages come from a machine
    attempting to interpret your code against someone else''s set of best practices.
    Warnings thus point to code that deserves to be examined more closely. However,
    sometimes you really do need to perform a certain action, and it would be a *worst
    practice* indeed to allow a compiler to coerce you into blindly following someone
    else''s best practice.


    Another small issue with warnings is that they clutter the USER_ERRORS view. Warnings
    are logged in the same view as errors. That may be annoying if you are used to
    checking whether the USER_ERRORS view is empty as a way to see whether you have
    errors in a give piece of PL/SQL code that you have just compiled. You can''t
    eliminate this minor irritation. You must live with it, but it''s a small price
    to pay for the value returned by the warnings feature.


    #### Ignoring Warnings


    You may want to ignore specific warnings for some reason. In the next example,
    all warnings are enabled. But one of the warnings can''t be removed by changing
    the code, as the warning regards a column name conflicting with a reserved word,
    and you want to ignore this specific informational warning. To enable all warnings,
    set `plsql_warnings` to ENABLE:ALL, like so:


    `SQL@V112> alter session set plsql_warnings=''ENABLE:ALL'';`


    Next, create the following version of the `GET_T1_KEY` function:


    `SQL@V112>CREATE OR REPLACE FUNCTION GET_T1_KEY (P_KEY NUMBER) RETURN VARCHAR2`

    `2  AUTHID DEFINER`

    `3  IS`

    `4       l_value T1.VALUE%TYPE;`

    `5       l_1 NUMBER :=1;`

    `6       l_2 NUMBER :=2;`

    `7  BEGIN`

    `8        IF l_1 = l_2 THEN`

    `9          SELECT VALUE INTO l_value FROM T1 WHERE KEY = P_KEY;`

    `10         RETURN l_value;`

    `11       END IF;`

    `12  END;`

    `13  /`


    `SP2-0806: Function created with compilation warnings`


    `SQL@V112> show err`

    `Errors for FUNCTION GET_T1_KEY:`


    `0/0      PLW-06010: keyword "VALUE" used as a defined name`

    `1/1      PLW-05005: subprogram GET_T1_KEY returns without value at line 11`

    `9/11     PLW-06002: Unreachable code`

    `9/51     PLW-07204: conversion away from column type may result in`

    `         sub-optimal query plan`


    Let''s look at the warnings one at a time.


    *   PLW-06010: A PL/SQL or SQL word has been used as a defined name. This is legal
    but not recommended. Reserved words can be examined in the V$RESERVED_WORDS view.

    *   PLW-05005: Oracle discovers that you never enter the IF statement and therefore
    will not return a value from the function.

    *   PLW-06002: Again, Oracle discovers that you never enter the IF statement and
    therefore will have unreachable code. Unreachable code does no harm as such, but
    this could indicate inappropriate code. Having too much unreachable code will
    take up memory when you execute PL/SQL.

    *   PLW-07204: Well, you know what do with that by now.


    So, fix the code and get rid of the warnings. Let''s say that for some reason,
    you''re unable to change the column name VALUE, which is the cause for PLW-06010;
    for example, your application might be old, with too much code to be fixed if
    you change the column name.


    The first thing to do is to prepare the session.


    `SQL@V112> alter session set plsql_warnings=''ENABLE:ALL, ERROR:7204, DISABLE:6010'';`


    In this case, all warnings are enabled, warning 7204 is still promoted to be an
    error, and warning 6010 is disabled. The function can now be reapplied and compiled
    without errors or warnings.


    If you want to examine the PL/SQL warnings that a stored procedure has been compiled
    with, you can issue the following query:


    `SQL@V112> col plsql_warnings for a40`

    `SQL@V112> SELECT NAME, PLSQL_WARNINGS FROM USER_PLSQL_OBJECT_SETTINGS;`


    `NAME                           PLSQL_WARNINGS`

    `------------------------------ ----------------------------------------`

    `GET_T1_KEY                     ENABLE:ALL,DISABLE:  6010,ERROR:  7204`


    These results show the PLSQL_WARNINGS parameter value that was in effect when
    `GET_T1_KEY` was compiled.'
  trans: "\n#### 将警告提升为错误\n\n如前所述，即使您的函数或过程是在有警告的情况下编译的，您仍然可以执行它们。如果您希望确保包含特定警告的存储过程不会进入您的生产系统，您可以将这些警告提升为错误。\n\
    \n以下代码展示了将 `GET_T1_KEY` 函数的参数类型编译为 `NUMBER` 时的情况。请注意生成的警告。\n\n```\nSQL@V112> CREATE\
    \ OR REPLACE FUNCTION GET_T1_KEY (P_KEY NUMBER) RETURN VARCHAR2\n  2  AUTHID DEFINER\n\
    \  3  IS\n  4     L_value T1.VALUE%TYPE;\n  5  BEGIN\n  6      SELECT VALUE INTO\
    \ l_value FROM T1 WHERE KEY = P_KEY;\n  7      RETURN l_value;\n  8  EXCEPTIONS\n\
    \  9  WHEN NO_ROWS_FOUND THEN\n 10    RETURN 'No value found';\n 11 END;\n 12\
    \ /\nSP2-0806: Function created with compilation warnings\n\nSQL@V112> show err\n\
    LINE/COL ERROR\n-------- -----------------------------------------------------------------\n\
    6/49     PLW-07204: conversion away from column type may result in\n         sub-optimal\
    \ query plan\n```\n\n为确保此类代码不被部署——至少不是在无错误的情况下部署——您可以将此警告提升为错误。首先，更改会话以禁用所有警告（在本例中这样做是为了专注于要提升的那个警告）。在同一语句中，将\
    \ `PLW-07204` 警告提升为错误而非警告，如下所示：\n\n```\nSQL@V112> alter session set plsql_warnings='DISABLE:ALL,\
    \ ERROR:7204';\n\nSession altered.\n```\n\n然后重新编译 `GET_T1_KEY` 函数。\n\n```\nSQL@V112>\
    \ alter function GET_T1_KEY compile;\n\nWarning: Function altered with compilation\
    \ errors.\n\nSQL@V112> show err\nErrors for FUNCTION GET_T1_KEY:\n\nLINE/COL ERROR\n\
    -------- -----------------------------------------------------------------\n6/45\
    \     PLS-07204: conversion away from column type may result in\n         sub-optimal\
    \ query plan\n```\n\n现在尝试执行该函数。这将导致错误。\n\n```\nSQL@V112> exec :txt := get_t1_key(1);\n\
    BEGIN :txt := get_t1_key(1); END;\n\n            *\nERROR at line 1:\nORA-06550:\
    \ line 1, column 13:\nPLS-00905: object ACME.GET_T1_KEY is invalid\nORA-06550:\
    \ line 1, column 7:\nPL/SQL: Statement ignored\n```\n\n请注意 `PLW-07204` 变成了 `PLS-07204`。该警告现在已成为错误，您将无法再执行该函数。要能够执行该函数，您必须通过将参数类型更改为\
    \ `VARCHAR2` 来消除此错误。\n\n如果您有一个现有的包含 PL/SQL 的应用程序，并且启用了警告并重新编译了 PL/SQL 代码，您可能会得到许多警告。尽管没有任何警告感觉很好，但由于这样或那样的原因，可能仍然无法消除所有警告。对于无法消除的警告，您可以自由选择忽略它们。\n\
    \n![images](img/square.jpg) **注意** 很容易将消除所有警告设定为一个硬性目标。非技术经理尤其容易陷入这种诱惑，因为他们常常不理解警告和错误之间的微妙区别。请记住，警告消息来自机器试图根据他人制定的一套最佳实践来解释您的代码。因此，警告指向的是值得更仔细检查的代码。然而，有时您确实需要执行某个特定操作，如果让编译器迫使您盲目遵循他人的最佳实践，那才真正是*糟糕的做法*。\n\
    \n警告的另一个小问题是它们会弄乱 `USER_ERRORS` 视图。警告和错误记录在同一个视图中。如果您习惯于通过检查 `USER_ERRORS` 视图是否为空来判断您刚刚编译的一段\
    \ PL/SQL 代码是否有错误，这可能会令人烦恼。您无法消除这种小困扰。您必须忍受它，但这是为警告功能带来的价值所付出的小小代价。\n\n#### 忽略警告\n\
    \n您可能由于某种原因希望忽略特定的警告。在下一个例子中，启用了所有警告。但其中一个警告无法通过更改代码来消除，因为该警告涉及列名与保留字冲突，并且您希望忽略这个特定的信息性警告。要启用所有警告，请将\
    \ `plsql_warnings` 设置为 `ENABLE:ALL`，如下所示：\n\n```\nSQL@V112> alter session set\
    \ plsql_warnings='ENABLE:ALL';\n```\n\n接下来，创建以下版本的 `GET_T1_KEY` 函数：\n\n```\nSQL@V112>CREATE\
    \ OR REPLACE FUNCTION GET_T1_KEY (P_KEY NUMBER) RETURN VARCHAR2\n2  AUTHID DEFINER\n\
    3  IS\n       l_value T1.VALUE%TYPE;\n       l_1 NUMBER :=1;\n       l_2 NUMBER\
    \ :=2;\n5  BEGIN\n        IF l_1 = l_2 THEN\n          SELECT VALUE INTO l_value\
    \ FROM T1 WHERE KEY = P_KEY;\n          RETURN l_value;\n       END IF;\n12  END;\n\
    13  /\nSP2-0806: Function created with compilation warnings\n\nSQL@V112> show\
    \ err\nErrors for FUNCTION GET_T1_KEY:\n\n0/0      PLW-06010: keyword \"VALUE\"\
    \ used as a defined name\n1/1      PLW-05005: subprogram GET_T1_KEY returns without\
    \ value at line 11\n9/11     PLW-06002: Unreachable code\n9/51     PLW-07204:\
    \ conversion away from column type may result in\n         sub-optimal query plan\n\
    ```\n\n让我们逐一查看这些警告。\n\n*   `PLW-06010`：一个 PL/SQL 或 SQL 单词被用作定义的名称。这是合法的，但不推荐。可以在\
    \ `V$RESERVED_WORDS` 视图中查看保留字。\n*   `PLW-05005`：Oracle 发现您从未进入 `IF` 语句，因此不会从函数中返回值。\n\
    *   `PLW-06002`：同样，Oracle 发现您从未进入 `IF` 语句，因此将存在不可达代码。不可达代码本身无害，但这可能表明代码不当。执行 PL/SQL\
    \ 时，过多的不可达代码会占用内存。\n*   `PLW-07204`：嗯，您现在已经知道该怎么处理它了。\n\n那么，修复代码并消除这些警告。假设由于某种原因，您无法更改导致\
    \ `PLW-06010` 的列名 `VALUE`；例如，您的应用程序可能很旧，如果更改列名，将有太多代码需要修复。\n\n首先要做的是准备会话。\n\n\
    ```\nSQL@V112> alter session set plsql_warnings='ENABLE:ALL, ERROR:7204, DISABLE:6010';\n\
    ```\n\n在这种情况下，启用了所有警告，警告 `7204` 仍被提升为错误，而警告 `6010` 被禁用。现在可以重新应用该函数并进行编译，不再出现错误或警告。\n\
    \n如果您想检查某个存储过程编译时使用了哪些 PL/SQL 警告，可以发出以下查询：\n\n```\nSQL@V112> col plsql_warnings\
    \ for a40\nSQL@V112> SELECT NAME, PLSQL_WARNINGS FROM USER_PLSQL_OBJECT_SETTINGS;\n\
    \nNAME                         PLSQL_WARNINGS\n------------------------------\
    \ ----------------------------------------\nGET_T1_KEY                     ENABLE:ALL,DISABLE:\
    \  6010,ERROR:  7204\n```\n\n这些结果显示了 `GET_T1_KEY` 编译时生效的 `PLSQL_WARNINGS` 参数值。\n"
- fmt: "## Compilation and Warnings\n\nWhenever you create or recompile stored procedures,\
    \ they inherit the settings from the current session. So should you by accident\
    \ compile a stored procedure in a session where warnings have not been set up,\
    \ the stored procedure will just compile and settings will be lost. If your database\
    \ is configured with system wide warnings (`ALTER SYSTEM SET PLSQL_WARNINGS='ENABLE:ALL,\
    \ ERROR:7204'`) and some of them have been promoted to be an error, the result\
    \ may be more troublesome, as the recompiled procedure will fail. To recompile\
    \ a procedure with its current settings, execute the following:\n\n```\nSQL@V112>\
    \ ALTER FUNCTION GET_T1_KEY COMPILE REUSE SETTINGS;\n\nFunction Compiled.\n```\n\
    \nInstead of having to execute an `ALTER SESSION` each time you want to compile\
    \ a stored procedure with specific `PL/SQL` warnings, you can specify the warning\
    \ setting at compile time.\n\n```\nSQL@V112> ALTER FUNCTION GET_T1_KEY COMPILE\
    \ PLSQL_WARNINGS='ENABLE:ALL,\nDISABLE:6010,ERROR: 7204';\n\nFunction Compiled.\n\
    ```\n\nIf you have common warning settings for all stored procedures, you could\
    \ add a login trigger to set `PLSQL_WARNINGS` at log in time. It's not uncommon\
    \ that developers share the same database user to develop an application. In this\
    \ case, the trigger could be quite simple and limited to that user only.\n\nThe\
    \ trigger should, in this case, fire after login to the `ACME` schema. What the\
    \ trigger does is an `ALTER SESSION` and thereby set the `PLSQL_WARNINGS` parameter.\n\
    \nCreate the trigger connected as `SYS`.\n\n```\nSQL@V112> CREATE OR REPLACE TRIGGER\
    \ dev_logon_trigger\n  2  AFTER LOGON ON ACME.SCHEMA\n  3  BEGIN\n  4    EXECUTE\
    \ IMMEDIATE q'\"ALTER SESSION SET PLSQL_WARNINGS='ENABLE:SEVERE,ENABLE:PERFORMANCE,ERROR:7204'\"\
    ';\n  5  END;\n  6  /\n\nTrigger created.\n```\n\nThen connect as the `Acme` user.\n\
    \n```\nSQL@V112> conn ACME/acme\nConnected.\n```\n\nCheck that the parameter has\
    \ been set.\n\n```\nSQL@V112> SELECT DBMS_WARNING.GET_WARNING_SETTING_STRING FROM\
    \ DUAL;\n\nGET_WARNING_SETTING_STRING\n------------------------------------------------------------------------\n\
    DISABLE:INFORMATIONAL,ENABLE:PERFORMANCE,ENABLE:SEVERE,ERROR:  7204\n```\n\nIf\
    \ your application has many stored procedures and they have different settings,\
    \ it may be a good idea to build a framework that will help you remember their\
    \ individual settings and can be used for recompilation (see the small framework\
    \ example in the upcoming section “Conditional Compilation”).\n\nIf you want to\
    \ compile all stored procedures in a schema with the `DBMS_UTILITY.COMPILE_SCHEMA`\
    \ procedure, you should be aware that the parameter `reuse_settings` is by default\
    \ set to `FALSE`. The following is the description of the `DBMS_UTILITY.COMPILE_SCHEMA`\
    \ procedure:\n\n```\nPROCEDURE COMPILE_SCHEMA\n Argument Name                \
    \  Type                    In/Out Default?\n ------------------------------ -----------------------\
    \ ------ --------\n SCHEMA                         VARCHAR2                IN\n\
    \ COMPILE_ALL                    BOOLEAN                 IN     DEFAULT\n REUSE_SETTINGS\
    \                 BOOLEAN                 IN     DEFAULT\n```\n\nIf you don't\
    \ apply the `reuse_settings` parameter and set it to `TRUE`, all compiled packages\
    \ will lose any warning settings. Therefore, when executing `DBMS_UTILITY.COMPILE_SCHEMA`,\
    \ remember to set `reuse_settings` to `TRUE`, like so:\n\n```\nSQL@V112> exec\
    \ DBMS_UTILITY.COMPILE_SCHEMA (schema=>'ACME', reuse_settings=>true);\n\nPL/SQL\
    \ procedure successfully completed.\n```\n\n![images](images/square.jpg) 注意 You\
    \ should use caution if setting `plsql_warnings` on the `SYSTEM` level. Even though\
    \ you can't compile `SYS` with `DBMS_UTILITY.COMPILE_SCHEMA`, you can still compile\
    \ individual packages. Setting `plsql_warnings` at `SYSTEM` level, and then compiling\
    \ just a few packages may result in hundreds of warnings or, should you have promoted\
    \ some warnings to errors, in errors being thrown.\n\nAs `SYS` or `SYSTEM` you\
    \ can run the utility `utlrp` (`@?/rdbms/admin/utlrp`), that will compile all\
    \ invalid stored procedures. `Utlrp` calls `UTL_RECOMP.RECOMP_PARALLEL` to compile\
    \ stored procedures in parallel. When doing this, warnings promoted to errors\
    \ or warnings that are ignored get striped off, as you shall see in the following\
    \ example. This is a bug.\n\nFirst, set session `plsql_warnings`\n\n```\nSQL@V112>\
    \ alter session set plsql_warnings='Enable:all, ERROR:7204, DISABLE:6010';\n\n\
    Session altered.\n```\n\nand compile a selected function.\n\n```\nSQL@V112> alter\
    \ function GET_T1_KEY compile;\n\nWarning: Function altered with compilation errors.\n\
    ```\n\nNext, take a look on the function settings.\n\n```\nSQL@V112> SELECT NAME,\
    \ PLSQL_WARNINGS FROM USER_PLSQL_OBJECT_SETTINGS WHERE NAME =\n'GET_T1_KEY';\n\
    \nNAME                         PLSQL_WARNINGS\n---------------------------- -------------------------------------------------------------\n\
    ---------------------------------------\nGET_T1_KEY                   ENABLE:ALL,DISABLE:\
    \  6010,ERROR:  7204\n```\n\nNow, connect as `SYS`\n\n```\nSQL@V112> conn / as\
    \ sysdba\nConnected.\n```\n\nand execute the recompilation, either by calling\
    \ `utlrp.sql` or as here by executing `UTL_RECOMP.RECOMP_PARALLEL` directly.\n\
    \n```\nSQL@V112> exec utl_recomp.recomp_parallel(1,'ACME');\n\nPL/SQL procedure\
    \ successfully completed.\n```\n\nNow reconnect\n\n```\nSQL@V112> conn ACME/ACME\n\
    Connected.\n```\n\nand examine the object settings.\n\n```\nSQL@V112> SELECT NAME,\
    \ PLSQL_WARNINGS FROM USER_PLSQL_OBJECT_SETTINGS\nWHERE NAME = 'GET_T1_KEY';\n\
    \nNAME                         PLSQL_WARNINGS\n---------------------------- -------------------------------------------------------------\n\
    ---------------------------------------\nGET_T1_KEY                   ENABLE:ALL\n\
    \nACME@V112>\n```\n\nNotice that specific warning settings have been removed;\
    \ this must be a bug. It's not a disaster, as everything still works, but it's\
    \ irritating because you now don't know if special warnings were set up.\n\nIf\
    \ you export and import schemas using `exp` and `imp`, any stored code will be\
    \ imported with the exported settings.\n\n### Final Words on Warnings\n\nOther\
    \ types of warnings you might encounter are warnings for not using the `NOCOPY`\
    \ compiler directive when you will benefit from that. In Oracle 11g, there is\
    \ a new, very useful warning for situations in which the exception `WHEN OTHERS`\
    \ does not result in either `RAISE` or `RAISE_APPLICATION_ERROR`. I have personally\
    \ spent hours wondering why I did not get an error in certain situations, just\
    \ to experience that somebody did a `WHEN OTHERS THEN NULL`.\n\n## Conditional\
    \ Compilation\n\nConditional compilation is not related to `PL/SQL` warnings,\
    \ but it was implemented at the same time as `PL/SQL` warnings. Conditional compilation\
    \ is done by preprocessing the source code, as you might know from other coding\
    \ languages. In short, it gives you the ability to turn code on or off at compilation\
    \ time, without having to edit the code. This could be turning on or off debug\
    \ options or enabling code that has to do with this or that version of `Oracle`\
    \ or perhaps two different editions of your application, such as a Standard Edition\
    \ and Enterprise Edition.\n\n![images](images/square.jpg) 注意 Conditional compilation\
    \ has been back-ported to Oracle 10.1.0.4 and 9.2.0.6 and can be enabled by setting\
    \ the `parameter _conditional_compilation`."
  raw: '#### Compilation and Warnings


    Whenever you create or recompile stored procedures, they inherit the settings
    from the current session. So should you by accident compile a stored procedure
    in a session where warnings have not been set up, the stored procedure will just
    compile and settings will be lost. If your database is configured with system
    wide warnings (`ALTER SYSTEM SET PLSQL_WARNINGS=''ENABLE:ALL, ERROR:7204''`) and
    some of them have been promoted to be an error, the result may be more troublesome,
    as the recompiled procedure will fail. To recompile a procedure with its current
    settings, execute the following:


    `SQL@V112> ALTER FUNCTION GET_T1_KEY COMPILE REUSE SETTINGS;`


    `Function Compiled.`


    Instead of having to execute an ALTER SESSION each time you want to compile a
    stored procedure with specific PL/SQL warnings, you can specify the warning setting
    at compile time.


    `SQL@V112> ALTER FUNCTION GET_T1_KEY COMPILE PLSQL_WARNINGS=''ENABLE:ALL,`

    `DISABLE:6010,ERROR: 7204'';`


    `Function Compiled.`


    If you have common warning settings for all stored procedures, you could add a
    login trigger to set `PLSQL_WARNINGS` at log in time. It''s not uncommon that
    developers share the same database user to develop an application. In this case,
    the trigger could be quite simple and limited to that user only.


    The trigger should, in this case, fire after login to the ACME schema. What the
    trigger does is an ALTER SESSION and thereby set the `PLSQL_WARNINGS` parameter.


    Create the trigger connected as SYS.


    `SQL@V112> CREATE OR REPLACE TRIGGER dev_logon_trigger`

    `  2  AFTER LOGON ON ACME.SCHEMA`

    `  3  BEGIN`

    `  4    EXECUTE IMMEDIATE q''"ALTER SESSION SET PLSQL_WARNINGS=''ENABLE:SEVERE,ENABLE:PERFORMANCE,ERROR:7204''"'';`

    `  5  END;`

    `  6  /`


    `Trigger created.`


    Then connect as the Acme user.


    `SQL@V112> conn ACME/acme`

    `Connected.`


    Check that the parameter has been set.


    `SQL@V112> SELECT DBMS_WARNING.GET_WARNING_SETTING_STRING FROM DUAL;`


    `GET_WARNING_SETTING_STRING`

    `------------------------------------------------------------------------`

    `DISABLE:INFORMATIONAL,ENABLE:PERFORMANCE,ENABLE:SEVERE,ERROR:  7204`


    If your application has many stored procedures and they have different settings,
    it may be a good idea to build a framework that will help you remember their individual
    settings and can be used for recompilation (see the small framework example in
    the upcoming section “Conditional Compilation”).


    If you want to compile all stored procedures in a schema with the DBMS_UTILITY.COMPILE_SCHEMA
    procedure, you should be aware that the parameter reuse_settings is by default
    set to FALSE. The following is the description of the DBMS_UTILITY.COMPILE_SCHEMA
    procedure:


    `PROCEDURE COMPILE_SCHEMA`

    ` Argument Name                  Type                    In/Out Default?`

    ` ------------------------------ ----------------------- ------ --------`

    ` SCHEMA                         VARCHAR2                IN`

    ` COMPILE_ALL                    BOOLEAN                 IN     DEFAULT`

    ` REUSE_SETTINGS                 BOOLEAN                 IN     DEFAULT`


    If you don''t apply the reuse_settings parameter and set it to TRUE, all compiled
    packages will lose any warning settings. Therefore, when executing DBMS_UTILITY.COMPILE_SCHEMA,
    remember to set reuse_settings to TRUE, like so:


    `SQL@V112> exec DBMS_UTILITY.COMPILE_SCHEMA (schema=>''ACME'', reuse_settings=>true);`


    `PL/SQL procedure successfully completed.`


    ![images](images/square.jpg) **Caution** You should use caution if setting `plsql_warnings`
    on the SYSTEM level. Even though you can''t compile SYS with DBMS_UTILITY.COMPILE_SCHEMA,
    you can still compile individual packages. Setting `plsql_warnings` at SYSTEM
    level, and then compiling just a few packages may result in hundreds of warnings
    or, should you have promoted some warnings to errors, in errors being thrown.


    As SYS or SYSTEM you can run the utility utlrp (@?/rdbms/admin/utlrp), that will
    compile all invalid stored procedures. Utlrp calls UTL_RECOMP.RECOMP_PARALLEL
    to compile stored procedures in parallel. When doing this, warnings promoted to
    errors or warnings that are ignored get striped off, as you shall see in the following
    example. This is a bug.


    First, set session `plsql_warnings`


    `SQL@V112> alter session set plsql_warnings=''Enable:all, ERROR:7204, DISABLE:6010'';`


    `Session altered.`


    and compile a selected function.


    `SQL@V112> alter function GET_T1_KEY compile;`


    `Warning: Function altered with compilation errors.`


    Next, take a look on the function settings.


    `SQL@V112> SELECT NAME, PLSQL_WARNINGS FROM USER_PLSQL_OBJECT_SETTINGS WHERE NAME
    =`![images](images/U003.jpg)

    ` ''GET_T1_KEY'';`


    `NAME                           PLSQL_WARNINGS`

    `------------------------------ -------------------------------------------------------------`

    `---------------------------------------`

    `GET_T1_KEY                     ENABLE:ALL,DISABLE:  6010,ERROR:  7204`


    Now, connect as SYS


    `SQL@V112> conn / as sysdba`

    `Connected.`


    and execute the recompilation, either by calling `utlrp.sql` or as here by executing
    UTL_RECOMP.RECOMP_PARALLEL directly.


    `SQL@V112> exec utl_recomp.recomp_parallel(1,''ACME'');`


    `PL/SQL procedure successfully completed.`


    Now reconnect


    `SQL@V112> conn ACME/ACME`

    `Connected.`


    and examine the object settings.


    `SQL@V112> SELECT NAME, PLSQL_WARNINGS FROM USER_PLSQL_OBJECT_SETTINGS`

    `WHERE NAME = ''GET_T1_KEY'';`


    `NAME                           PLSQL_WARNINGS`

    `------------------------------ -------------------------------------------------------------`

    `---------------------------------------`

    `GET_T1_KEY                     ENABLE:ALL`


    `ACME@V112>`


    Notice that specific warning settings have been removed; this must be a bug. It''s
    not a disaster, as everything still works, but it''s irritating because you now
    don''t know if special warnings were set up.


    If you export and import schemas using exp and imp, any stored code will be imported
    with the exported settings.


    #### Final Words on Warnings


    Other types of warnings you might encounter are warnings for not using the NOCOPY
    compiler directive when you will benefit from that. In Oracle 11g, there is a
    new, very useful warning for situations in which the exception WHEN OTHERS does
    not result in either RAISE or RAISE_APPLICATION_ERROR. I have personally spent
    hours wondering why I did not get an error in certain situations, just to experience
    that somebody did a WHEN OTHERS THEN NULL.


    ### Conditional Compilation


    Conditional compilation is not related to PL/SQL warnings, but it was implemented
    at the same time as PL/SQL warnings. Conditional compilation is done by preprocessing
    the source code, as you might know from other coding languages. In short, it gives
    you the ability to turn code on or off at compilation time, without having to
    edit the code. This could be turning on or off debug options or enabling code
    that has to do with this or that version of Oracle or perhaps two different editions
    of your application, such as a Standard Edition and Enterprise Edition.


    ![images](images/square.jpg) **Note** Conditional compilation has been back-ported
    to Oracle 10.1.0.4 and 9.2.0.6 and can be enabled by setting the `parameter _conditional_compilation`.'
  trans: "## 编译与警告\n\n每当您创建或重新编译存储过程时，它们会继承当前会话的设置。因此，如果您在未设置警告的会话中意外编译了存储过程，该过程将正常编译，但设置会丢失。如果您的数据库配置了系统范围的警告（`ALTER\
    \ SYSTEM SET PLSQL_WARNINGS='ENABLE:ALL, ERROR:7204'`），并且其中一些警告已被提升为错误，结果可能会更麻烦，因为重新编译的过程将会失败。要使用当前设置重新编译过程，请执行以下命令：\n\
    \n```\nSQL@V112> ALTER FUNCTION GET_T1_KEY COMPILE REUSE SETTINGS;\n\nFunction\
    \ Compiled.\n```\n\n您无需在每次想用特定`PL/SQL`警告编译存储过程时都执行一次`ALTER SESSION`，而是可以在编译时直接指定警告设置。\n\
    \n```\nSQL@V112> ALTER FUNCTION GET_T1_KEY COMPILE PLSQL_WARNINGS='ENABLE:ALL,\n\
    DISABLE:6010,ERROR: 7204';\n\nFunction Compiled.\n```\n\n如果您对所有存储过程有通用的警告设置，可以添加一个登录触发器在登录时设置`PLSQL_WARNINGS`。开发者共享同一个数据库用户来开发应用程序的情况并不少见。在这种情况下，触发器可以相当简单，并且仅限于该用户。\n\
    \n在这种情况下，触发器应在登录到`ACME`模式后触发。触发器的作用是执行`ALTER SESSION`，从而设置`PLSQL_WARNINGS`参数。\n\
    \n以`SYS`身份连接并创建触发器。\n\n```\nSQL@V112> CREATE OR REPLACE TRIGGER dev_logon_trigger\n\
    \  2  AFTER LOGON ON ACME.SCHEMA\n  3  BEGIN\n  4    EXECUTE IMMEDIATE q'\"ALTER\
    \ SESSION SET PLSQL_WARNINGS='ENABLE:SEVERE,ENABLE:PERFORMANCE,ERROR:7204'\"';\n\
    \  5  END;\n  6  /\n\nTrigger created.\n```\n\n然后以`Acme`用户身份连接。\n\n```\nSQL@V112>\
    \ conn ACME/acme\nConnected.\n```\n\n检查参数是否已设置。\n\n```\nSQL@V112> SELECT DBMS_WARNING.GET_WARNING_SETTING_STRING\
    \ FROM DUAL;\n\nGET_WARNING_SETTING_STRING\n------------------------------------------------------------------------\n\
    DISABLE:INFORMATIONAL,ENABLE:PERFORMANCE,ENABLE:SEVERE,ERROR:  7204\n```\n\n如果您的应用程序有许多存储过程且它们有不同的设置，构建一个框架来帮助您记住各自的设置并用于重新编译可能是个好主意（请参阅即将在“条件编译”一节中的小框架示例）。\n\
    \n如果您想使用`DBMS_UTILITY.COMPILE_SCHEMA`过程编译模式中的所有存储过程，您应该注意参数`reuse_settings`默认设置为`FALSE`。以下是`DBMS_UTILITY.COMPILE_SCHEMA`过程的描述：\n\
    \n```\nPROCEDURE COMPILE_SCHEMA\n Argument Name                  Type        \
    \            In/Out Default?\n ------------------------------ -----------------------\
    \ ------ --------\n SCHEMA                         VARCHAR2                IN\n\
    \ COMPILE_ALL                    BOOLEAN                 IN     DEFAULT\n REUSE_SETTINGS\
    \                 BOOLEAN                 IN     DEFAULT\n```\n\n如果您不应用`reuse_settings`参数并将其设置为`TRUE`，所有已编译的包将丢失任何警告设置。因此，在执行`DBMS_UTILITY.COMPILE_SCHEMA`时，请记得将`reuse_settings`设置为`TRUE`，如下所示：\n\
    \n```\nSQL@V112> exec DBMS_UTILITY.COMPILE_SCHEMA (schema=>'ACME', reuse_settings=>true);\n\
    \nPL/SQL procedure successfully completed.\n```\n\n![images](img/square.jpg) 注意\
    \ 如果在`SYSTEM`级别设置`plsql_warnings`，您应谨慎行事。尽管您不能使用`DBMS_UTILITY.COMPILE_SCHEMA`编译`SYS`，但您仍然可以编译单独的包。在`SYSTEM`级别设置`plsql_warnings`，然后只编译几个包，可能会导致数百条警告，或者，如果您已将某些警告提升为错误，则会引发错误。\n\
    \n作为`SYS`或`SYSTEM`，您可以运行实用程序`utlrp`（`@?/rdbms/admin/utlrp`），它将编译所有无效的存储过程。`Utlrp`调用`UTL_RECOMP.RECOMP_PARALLEL`并行编译存储过程。执行此操作时，被提升为错误的警告或被忽略的警告将被剥离，如下例所示。这是一个错误。\n\
    \n首先，设置会话`plsql_warnings`\n\n```\nSQL@V112> alter session set plsql_warnings='Enable:all,\
    \ ERROR:7204, DISABLE:6010';\n\nSession altered.\n```\n\n并编译选定的函数。\n\n```\nSQL@V112>\
    \ alter function GET_T1_KEY compile;\n\nWarning: Function altered with compilation\
    \ errors.\n```\n\n接下来，看看函数设置。\n\n```\nSQL@V112> SELECT NAME, PLSQL_WARNINGS FROM\
    \ USER_PLSQL_OBJECT_SETTINGS WHERE NAME =\n'GET_T1_KEY';\n\nNAME             \
    \            PLSQL_WARNINGS\n---------------------------- -------------------------------------------------------------\n\
    ---------------------------------------\nGET_T1_KEY                   ENABLE:ALL,DISABLE:\
    \  6010,ERROR:  7204\n```\n\n现在，以`SYS`身份连接\n\n```\nSQL@V112> conn / as sysdba\n\
    Connected.\n```\n\n并执行重新编译，通过调用`utlrp.sql`或直接执行`UTL_RECOMP.RECOMP_PARALLEL`。\n\
    \n```\nSQL@V112> exec utl_recomp.recomp_parallel(1,'ACME');\n\nPL/SQL procedure\
    \ successfully completed.\n```\n\n现在重新连接\n\n```\nSQL@V112> conn ACME/ACME\nConnected.\n\
    ```\n\n并检查对象设置。\n\n```\nSQL@V112> SELECT NAME, PLSQL_WARNINGS FROM USER_PLSQL_OBJECT_SETTINGS\n\
    WHERE NAME = 'GET_T1_KEY';\n\nNAME                         PLSQL_WARNINGS\n----------------------------\
    \ -------------------------------------------------------------\n---------------------------------------\n\
    GET_T1_KEY                   ENABLE:ALL\n\nACME@V112>\n```\n\n请注意，特定的警告设置已被删除；这一定是个错误。这不是灾难，因为一切仍然正常运行，但这很烦人，因为您现在不知道是否设置了特殊的警告。\n\
    \n如果您使用`exp`和`imp`导出和导入模式，任何存储的代码都将带着导出时的设置被导入。\n\n### 关于警告的最后说明\n\n您可能遇到的其他类型警告包括：当您将受益于`NOCOPY`编译器指令时，却没有使用它的警告。在\
    \ Oracle 11g 中，对于异常`WHEN OTHERS`没有导致`RAISE`或`RAISE_APPLICATION_ERROR`的情况，有一个新的、非常有用的警告。我个人曾花费数小时疑惑为什么在某些情况下没有得到错误，结果却发现有人写了`WHEN\
    \ OTHERS THEN NULL`。\n\n## 条件编译\n\n条件编译与`PL/SQL`警告无关，但它与`PL/SQL`警告在同一时间实现。条件编译是通过预处理源代码完成的，您可能从其他编程语言中了解这一点。简而言之，它使您能够在编译时打开或关闭代码，而无需编辑代码。这可能是打开或关闭调试选项，或者启用与某个`Oracle`版本相关的代码，或者您应用程序的两个不同版本，例如标准版和企业版。\n\
    \n![images](img/square.jpg) 注意 条件编译已向后移植到 Oracle 10.1.0.4 和 9.2.0.6，可以通过设置参数`_conditional_compilation`来启用。"
- fmt: '## Basics


    条件编译仅包含少量指令。指令以 `$`（美元符号）开头，用于控制程序流程或引发错误。


    系统定义的指令包括：`$IF`、`$THEN`、`$ELSIF`、`$ELSE` 和 `$END`。可以使用 `$ERROR … $END` 指令引发自定义的编译错误。可以查询静态布尔表达式或静态常量。除了创建自定义的查询变量外，Oracle
    还提供了一些可用的内置查询变量，后续将会看到。


    入门条件编译最简单的方法是从一个例子开始。此示例将展示如何为存储过程启用计时信息日志记录，该过程用于测量运行过程所需的时间以及过程运行的时间。以下是示例代码（行号已标出以便后续引用）：


    ```sql

    1 CREATE OR REPLACE PROCEDURE LEVEL2 AS

    2 $IF $$TIMING_ON $THEN

    3 $ELSIF NOT $$TIMING_ON $THEN

    4 $ELSE

    5    $ERROR '' The PLSQL_CCFLAG TIMING_ON, Must be set to either FALSE or TRUE
    before

    compileing procedure '' ||  $$PLSQL_UNIT||''.''

    6    $END

    7 $END

    8 $IF $$TIMING_ON $THEN

    9    L_start_time TIMESTAMP;

    10 $END

    11 BEGIN

    12 DBMS_APPLICATION_INFO.SET_MODULE($$PLSQL_UNIT, ''RUN'');

    13 $IF $$TIMING_ON $THEN

    14    L_START_TIME:=CURRENT_TIMESTAMP;

    15 $END

    16 -- -----------------------------------------------

    17 -- Application logic is left out

    18 -- -----------------------------------------------

    19 $IF $$TIMING_ON $THEN

    20   LOGIT (P_PG=>$$PLSQL_UNIT, P_START_TIME=>l_start_time, P_STOP_TIME=>CURRENT_TIMESTAMP);

    21 $END

    22 DBMS_APPLICATION_INFO.SET_MODULE(NULL,NULL);

    23 END LEVEL2;

    24 /

    ```


    以下是对代码清单的解释：


    *   第 2-7 行：如果查询变量 `$$TIMING_ON` 在编译时未设置（即既不是 `FALSE` 也不是 `TRUE`），则将引发错误，并指出存储过程的名称以及发生错误的位置。注意，允许使用空语句——一个
    `$IF … $THEN` 后面可以没有任何操作。

    *   第 8 行：如果查询变量 `$$TIMING_ON` 等于 `TRUE`，则声明变量 `l_start_time`。注意，`$END` 后面没有像
    PL/SQL 中的 `END IF` 那样的 `IF`，也没有分号。

    *   第 12 行：这里调用 `DBMS_APPLICATION_INFO.SET_MODULE` 过程，该过程将设置 `V$SESSION` 视图中的
    `MODULE` 列；你使用 Oracle 查询变量 `$$PLSQL_UNIT` 来保存存储过程的名称，或者如果它在包（`PACKAGE`）中被引用，则保存包的名称。在之前的
    Oracle 版本中，你必须创建一个函数来执行 `OWA_UTIL.WHO_CALLED_ME` 过程（该过程返回调用者的名称），然后调用该函数来获取名称。调用
    `DBMS_APPLICATION_INFO.SET_MODULE` 非常有用，如果你需要查询 `V$SESSION` 来定位你的会话，或者你使用扩展跟踪（Extended
    Trace）以便在过程启动时开始跟踪。


    **注意**：如果使用 SQL*Developer 开发存储过程，可以修改保存 `CREATE PROCEDURE/FUNCTION` 模板的模板，以包含对
    `DBMS_APPLICATION_INFO.SET_MODULE($$PLSQL_UNIT, ''<action>'')` 的调用，确保其始终被包含。这可以通过菜单
    “Tools” -> “Preferences” -> “Database:SQL Code Editor Templates” 来完成。


    *   第 13 行：如果查询变量 `$$TIMING_ON` 等于 `TRUE`，则在变量 `l_start_time` 中注册开始时间戳。

    *   第 16-18 行：这里将是 PL/SQL 代码。

    *   第 19 行：如果查询变量 `$$TIMING_ON` 等于 `TRUE`，则调用第 20 行的 `LOGIT` 过程。`LOGIT` 过程是记录计时信息的日志过程。该过程在此不描述，因为它并不重要。

    *   第 22 行：清除 `DBMS_APPLICATION_INFO` 的调用。


    在将过程添加到数据库之前，需要设置编译器标志 `TIMING_ON`。可以在系统、会话或程序级别设置此标志。在此示例中，它在会话级别设置。在设置标志之前，尝试将代码添加到数据库以触发
    `$ERROR` 错误（假设代码保存在名为 `level2.sql` 的文件中）。


    `SQL@V112> @level2`


    `Warning: Procedure created with compilation errors.`


    执行 `show error` 来显示错误，如下所示：


    `SQL@V102> show error`


    `Errors for PROCEDURE LEVEL2:`


    `LINE/COL ERROR`

    `-------- -----------------------------------------------------------------`

    `5/4      PLS-00179: $ERROR:  The PLSQL_CCFLAG TIMING_ON, Must be set to`

    `         either FALSE or TRUE before compileing procedure LEVEL2.`


    现在设置标志，如下所示：


    `SQL@V112> ALTER SESSION SET plsql_ccflags=''TIMING_ON:TRUE'';`


    `plsql_ccflags` 的数据类型可以是布尔静态表达式、`PLS_INTEGER` 静态表达式或 `VARCHAR2` 静态表达式，具体取决于你分配给它的值。注意，设置
    `plsql_ccflags` 不会强制重新编译任何代码；必须发出 `ALTER PROCEDURE … COMPILE` 命令。


    `SQL@V102> ALTER PROCEDURE LEVEL2 COMPILE;`


    `Procedure altered.`


    **注意**：请记住，在设置了会话 `plsql_ccflags` 之后编译的每个存储过程都将继承该 `plsql_ccflags` 设置。


    要检查在存储过程编译期间 `plsql_ccflags` 被设置为什么，请执行以下查询：


    `SQL@V102> col plsql_ccflags for a80 wrap`

    `SQL@V102> select NAME, PLSQL_CCFLAGS FROM USER_PLSQL_OBJECT_SETTINGS;`


    `NAME                         PLSQL_CCFLAGS`

    `------------------------------ --------------------------------------------`

    `LEVEL1`

    `LEVEL2                       TIMING_ON:TRUE`

    `LOGIT`

    `…`


    如下例所示，如果一次设置了多个 `plsql_ccflag`，它们必须用逗号分隔。`plsql_ccflag` 值不区分大小写。


    `SQL@V112> ALTER SESSION SET plsql_ccflags=''TIMING_ON:TRUE,Standard:True'';`'
  raw: '#### Basics


    Conditional compilation consists of a small number of directives. The directives
    starts with a $ (Dollar) sign. You use the directives to control the flow in the
    program or raise errors.


    The system defined directives are: $IF, $THEN, $ELSIF, $ELSE and $END. You can
    raise your own compilation errors with the directive $ERROR … $END. You can inquire
    on static Boolean expressions or static constants. Besides creating your own inquire
    variables, Oracle has a few you can inquire, which you will see later.


    The easiest way to get started with conditional compilation is to start with an
    example. This example will show you how to enable logging of timing information
    for a stored procedure, which measures how long it takes to run the procedure
    and when the procedure was running. The following is the example code (the lines
    are numbered for later reference):


    ` 1 CREATE OR REPLACE PROCEDURE LEVEL2 AS`

    ` 2 $IF $$TIMING_ON $THEN`

    ` 3 $ELSIF NOT $$TIMING_ON $THEN`

    ` 4 $ELSE`

    ` 5    $ERROR '' The PLSQL_CCFLAG TIMING_ON, Must be set to either FALSE or TRUE
    before`

    `compileing procedure '' ||  $$PLSQL_UNIT||''.''`

    ` 6    $END`

    ` 7 $END`

    ` 8 $IF $$TIMING_ON $THEN`

    ` 9    L_start_time TIMESTAMP;`

    `10 $END`

    `11 BEGIN`

    `12 DBMS_APPLICATION_INFO.SET_MODULE($$PLSQL_UNIT, ''RUN'');`

    `13 $IF $$TIMING_ON $THEN`

    `14    L_START_TIME:=CURRENT_TIMESTAMP;`

    `15 $END`

    `16 -- -----------------------------------------------`

    `17 -- Application logic is left out`

    `18 -- -----------------------------------------------`

    `19 $IF $$TIMING_ON $THEN`

    `20   LOGIT (P_PG=>$$PLSQL_UNIT, P_START_TIME=>l_start_time, P_STOP_TIME=>CURRENT_TIMESTAMP);`

    `21 $END`

    `22 DBMS_APPLICATION_INFO.SET_MODULE(NULL,NULL);`

    `23 END LEVEL2;`

    `24 /`


    The following is an explanation of the listing:


    *   Line 2-7: If the inquiry variable `$$TIMING_ON` is not set at compile time
    (in other words, it''s neither FALSE nor TRUE), then an error will be thrown,
    telling the name of the stored procedure and line where the error occurred. Notice
    that you are allowed to have empty statements—an $IF … $THEN without any action.

    *   Line 8: If the inquiry variable `$$TIMING_ON` equals to TRUE, then you declare
    the variable `l_start_time.` Notice that the $END has no $IF as in PL/SQL END
    IF; and no semicolon.

    *   Line 12: Here you call DBMS_APPLICATION_INFO.SET_MODULE procedure, which will
    set the MODULE column in the V$SESSION view; you use the Oracle inquiry variable
    `$$PLSQL_UNIT` to hold the name of the stored procedure or, in case it is referenced
    in a PACKAGE, the name of the package. In prior Oracle versions, you would have
    had to create a function that executed the OWA_UTIL.WHO_CALLED_ME procedure that
    returns the name of the caller, then call that function to get the name. Calling
    the DBMS_APPLICATION_INFO.SET_MODULE is very helpful if you need to query V$SESSION
    to locate you session or if you are using Extended Trace in order to start tracing
    when the procedure starts.


    ![images](images/square.jpg) **Note** If you are using SQL*Developer to develop
    your stored procedures, you can modify the template holding the CREATE PROCEDURE/FUNCTION
    template to include call to `DBMS_APPLICATION_INFO.SET_MODULE($$PLSQL_UNIT, ''<action>'')`,
    to ensure that it is always included. This is done from the menu Tools ![images](images/U001.jpg)
    Preferences ![images](images/U001.jpg) Database:SQL Code Editor Templates.


    *   Line 13: If the inquiry variable `$$TIMING_ON` equals TRUE, then register
    the start timestamp in the variable `l_start_time`.

    *   Line 16-18: This would be the PL/SQL code.

    *   Line 19: If the inquiry variable `$$TIMING_ON` equals TRUE, then call the
    LOGIT procedure in line 20\. The LOGIT procedure is the logging procedure that
    will log timing information. The procedure is not described here as it isn''t
    important.

    *   Line 22: Clear the DBMS_APPLICATION_INFO call.


    Before the procedure is added to the database, the compiler flag TIMING_ON needs
    to be set. You can set that flag either at the system, session, or program level.
    In this example, it''s set at the session level. Before you set the flag, try
    to add the code to the database to provoke the $ERROR error (assume that the code
    is saved in a file called `level2.sql).`


    `SQL@V112> @level2`


    `Warning: Procedure created with compilation errors.`


    Do a show error to reveal the error, like so:


    `SQL@V102> show error`


    `Errors for PROCEDURE LEVEL2:`


    `LINE/COL ERROR`

    `-------- -----------------------------------------------------------------`

    `5/4      PLS-00179: $ERROR:  The PLSQL_CCFLAG TIMING_ON, Must be set to`

    `         either FALSE or TRUE before compileing procedure LEVEL2.`


    Now set the flag, like so:


    `SQL@V112> ALTER SESSION SET plsql_ccflags=''TIMING_ON:TRUE'';`


    The data type of the plsql_ccflags is either a Boolean static expression, PLS_INTEGER
    static expression, or VARCHAR2 static expression, depending on what you assign
    to it. Notice that setting plsql_ccflags will not enforce recompilation of any
    code; an ALTER PROCEDURE … COMPILE would have to be issued.


    `SQL@V102> ALTER PROCEDURE LEVEL2 COMPILE;`


    `Procedure altered.`


    ![images](images/square.jpg) **Note** Remember that every stored procedure that
    is compiled after the session plsql_ccflags has been set will inherit the plsql_ccflags
    setting.


    To examine what plsql_ccflags was set to during a stored procedure compilation,
    execute the following query:


    `SQL@V102> col plsql_ccflags for a80 wrap`

    `SQL@V102> select NAME, PLSQL_CCFLAGS FROM USER_PLSQL_OBJECT_SETTINGS;`


    `NAME                           PLSQL_CCFLAGS`

    `------------------------------ --------------------------------------------`

    `LEVEL1`

    `LEVEL2                         TIMING_ON:TRUE`

    `LOGIT`

    `…`


    As shown in the example below, if you have more than one plsql_ccflag set at a
    time, they must be separated by commas. The plsql_ccflag value is case insensitive.


    `SQL@V112> ALTER SESSION SET plsql_ccflags=''TIMING_ON:TRUE,Standard:True'';`'
