    \ where to focus your attention.\n\nInstrumentation makes your code faster, easier\
    \ to maintain, and cheaper to write. Instrumentation makes your code faster because\
    \ it shows you all of your opportunities for making your code more efficient,\
    \ both while you're writing it and after you're done. Instrumentation makes your\
    \ code easier to maintain because it shows you exactly what your analysts are\
    \ talking about when they say that your code is too slow. Instrumentation makes\
    \ your code cheaper to write because it focuses your tuning efforts only upon\
    \ the parts of your code where performance really matters. Good instrumentation\
    \ is your proof that the performance requirements for your code have been met.\n\
    \n#### Measurement Intrusion\n\nNotice in my short example that the elapsed time\
    \ after adding instrumentation was 3:07.75 seconds, 0.33 seconds longer than the\
    \ original 3:07.42 seconds. Imagine that those measurements had been computed\
    \ as an average over the course of a thousand executions. Instrumentation is code,\
    \ and all code contributes to the overall response time of a unit of work. Smart\
    \ developers know that removing extraneous and unnecessary code is critical to\
    \ performance optimization.\n\nSo should you consider this instrumentation code\
    \ extraneous and unnecessary? Absolutely not! Code must not only fulfill the requirements\
    \ of the task but also perform well throughout the life of the software.\n\nTom\
    \ Kyte, the “Tom” behind [`http://asktom.oracle.com/`](http://asktom.oracle.com/),\
    \ was once asked at a conference how much the measurement intrusion effect was\
    \ for all of the instrumentation built into the Oracle database (the data published\
    \ through the various V$ and X$ fixed views, the extended SQL trace data, and\
    \ so on). He paused thoughtfully and then responded confidently that the measurement\
    \ intrusion amounted to *negative* ten percent or possibly less. He went on to\
    \ explain that without the instrumentation coded in the Oracle Database kernel,\
    \ the developers in Oracle Server Technologies would have been unable to optimize\
    \ their code effectively. As a direct result of having the level of detail their\
    \ instrumentation provides, the developers are able to improve the performance\
    \ of the code in every release.\n\n#### Identification\n\nIn addition to code\
    \ that provides response time values for individual program units, instrumentation\
    \ can also be used to identify application code in the database. The ability to\
    \ associate resources consumed in the database directly with specific business\
    \ tasks is a critical component of performance optimization. Oracle provides many\
    \ different ways to accomplish this goal."
  trans: "\n#### 为何此程序运行缓慢？\n\n从理论转向实践，我们来审视程序 `p`。为什么程序 `p` 运行缓慢？\n\n```\nSQL> exec\
    \ p\nPL/SQL procedure successfully completed.\nSQL>\n```\n\n显然，我缺少一个关键要素。没有更多信息，我只能猜测程序\
    \ `p` 运行缓慢的原因。在办公室里，我无数次听到类似我们公司信条的话。\n\n> 当你能知道时，何必去猜？\n>\n> ——凯里·米勒萨\n\n我当然能知道——我只需要测量。“慢”是以时间单位来衡量的，因此我需要测量程序\
    \ `p` 的**已用时间**。\n\n```\nSQL> set timing on\nSQL> exec p\nPL/SQL procedure successfully\
    \ completed.\nElapsed 00:03:07.42\nSQL>\n```\n\n现在我知道程序 `p` 执行了 3 分 7.42 秒。这是个好的开始，但要想了解程序\
    \ `p` 中哪些代码部分需要改进，我需要详细测量所有代码部分。（这是方法 R 的第二步，我稍后会详细说明）。详细的测量结果最好以性能剖析文件的形式呈现。那么，我如何获取正确的测量数据来创建剖析文件呢？我需要*插桩*。插桩就是你添加到代码中的东西，以使生成剖析文件成为可能。\n\
    \n首先，这是代码现在的样子：\n\n```\nCREATE OR REPLACE PROCEDURE p AS\nBEGIN\n  q;\n  r;\n\
    \  s;\nEND;\n```\n\n现在我添加插桩。\n\n```\nCREATE OR REPLACE PROCEDURE p AS\n  t0 NUMBER;\n\
    \  t1 NUMBER;\n  t2 NUMBER;\n  t3 NUMBER;\nBEGIN\n  t0 := DBMS_UTILITY.GET_TIME;\n\
    \  q;\n  t1 := DBMS_UTILITY.GET_TIME;\n  DBMS_OUTPUT.PUT_LINE ('Procedure q: '\
    \ || (t1 - t0)/100 || ' seconds');\n  r;\n  t2 := DBMS_UTILITY.GET_TIME;\n  DBMS_OUTPUT.PUT_LINE\
    \ ('Procedure r: ' || (t2 - t1)/100 || ' seconds');\n  s;\n  t3 := DBMS_UTILITY.GET_TIME;\n\
    \  DBMS_OUTPUT.PUT_LINE ('Procedure s: ' || (t3 - t2)/100 || ' seconds');\n  DBMS_OUTPUT.PUT_LINE\
    \ ('Total Elapsed: ' || (t3 - t0)/100 || ' seconds');\nEND;\n```\n\n这是执行此插桩代码后的结果：\n\
    \n```\nSQL> set timing on serveroutput on\nSQL> exec p\nProcedure q: 1.05 seconds\n\
    Procedure r: 172.59 seconds\nProcedure s: 14.11 seconds\nTotal Elapsed: 187.75\
    \ seconds\nElapsed 00:03:07.75\nSQL>\n```\n\n我现在知道了一个非常重要的信息，这是没有某种插桩就无法得知的。这些结果提供了一个*剖析文件*，一份时间花费明细，显示了我的时间在代码中被用在了哪里。我承认这里展示的插桩方式很笨拙，我不会建议将这样的代码称为“成品”，但即便如此笨拙的插桩也是强大的。我将在下一节讨论如何改进插桩方法。\n\
    \n现在我知道，花时间优化过程 `q` 将收益甚微——最多不超过 1.05 秒（占总时间 187.75 秒的 0.56%）。同样地，优化过程 `s` 最多也只能获得\
    \ 14.11 秒（7.52%）的提升。我的大部分时间花在了过程 `r` 上，所以我应该把优化的时间和精力集中在那里。如果我决定从过程 `q` 或 `s`\
    \ 开始优化会怎样？我也许能极大地改进这些过程的个别响应时间，但如果我的目标是将整体响应时间减少 1 分钟，我的努力将会是失败的。为何要*猜测*？你可以*知道*应该专注于哪里。\n\
    \n插桩让你的代码更快、更易于维护、编写成本更低。插桩让代码更快，因为它向你展示了所有让代码更高效的机会，无论是在编写时还是完成后。插桩让代码更易于维护，因为它在你的分析人员说你的代码太慢时，确切地向他们展示了代码在做什么。插桩让编写代码成本更低，因为它让你的调优努力只集中在真正影响性能的代码部分。良好的插桩就是你的代码性能要求已得到满足的证明。\n\
    \n### 测量侵入性\n\n注意在我这个简短的例子中，添加插桩后的已用时间是 3 分 07.75 秒，比原来的 3 分 07.42 秒长了 0.33 秒。想象一下，如果这些测量是在一千次执行过程中计算的平均值。插桩也是代码，而所有代码都会影响一个工作单元的整体响应时间。聪明的开发者知道，移除多余和不必要的代码对于性能优化至关重要。\n\
    \n那么，你是否应该认为这段插桩代码是多余且不必要的？绝对不是！代码不仅必须满足任务的要求，还必须在软件的整个生命周期内表现良好。\n\n汤姆·凯特（Tom\
    \ Kyte），`http://asktom.oracle.com/` 背后的“汤姆”，曾在一次会议上被问及，Oracle 数据库中内置的所有插桩（通过各种\
    \ V$ 和 X$ 固定视图发布的数据、扩展的 SQL 跟踪数据等）的测量侵入效应有多大。他若有所思地停顿了一下，然后自信地回答说，测量侵入相当于*负*百分之十，甚至可能更少。他接着解释说，如果没有在\
    \ Oracle 数据库内核中编写的插桩，Oracle 服务器技术部门的开发者将无法有效地优化他们的代码。由于拥有了他们的插桩所提供的详细程度，开发者们能够在每个版本中改进代码的性能。\n\
    \n### 标识\n\n除了为单个程序单元提供响应时间值的代码外，插桩还可用于标识数据库中的应用程序代码。能够将数据库中消耗的资源直接与特定的业务任务关联起来，是性能优化的关键组成部分。Oracle\
    \ 提供了许多不同的方法来实现这一目标。\n"
- fmt: "## DBMS_SESSION.SET_IDENTIFIER\n\n`DBMS_SESSION.SET_IDENTIFIER` should be\
    \ used to make performance analysis easier at runtime. Using this command lets\
    \ the instance know which end user is associated with each session. Oracle introduced\
    \ this “End to End Application Tracing” feature in version 10. For example, if\
    \ your application authenticates users at the database level with unique accounts,\
    \ you could set the identifier to the user name and IP address in a logon trigger.\n\
    \n```\nCREATE OR REPLACE TRIGGER LOGON_TRIGGER\nAFTER LOGON ON DATABASE\nDECLARE\n\
    \  l_identifier VARCHAR2(64);\n\nBEGIN\n  L_identifier := SYS_CONTEXT('USERENV',\
    \ 'OS_USER') || ':' ||\n                  SYS_CONTEXT('USERENV', 'IP_ADDRESS');\n\
    \  DBMS_SESSION.SET_IDENTIFIER(l_identifier);\nEND;\n/\n```\n\nThe end user identifying\
    \ information is now visible in the column `V$SESSION.CLIENT_IDENTIFIER`, in dozens\
    \ of other views, and in any extended SQL trace files generated for that session.\
    \ To enable tracing for a known end user identifier, call the Oracle built-in\
    \ procedure, like so:\n\n```\nDBMS_MONITOR.CLIENT_ID_TRACE_ENABLE(client_id=>'HR:Claire:425542',\n\
    \                                    waits=>TRUE,\n                          \
    \          binds => TRUE,\n                                    plan_stat => 'ALL_EXECUTIONS'\
    \      -- 11g and later\n                                    );\n```\n\nThe trace\
    \ file will contain a line formatted like\n\n```\n*** CLIENT ID:(HR:Claire:425542)\
    \ 2011-03-16 01:59:13.317\n```\n\nIf your application shares sessions among end\
    \ users, then this information needs to be set from the application layer instead\
    \ of the database. Instead of IP address, use an application level session ID\
    \ or user name. The key is to use the information necessary to identify the end\
    \ user responsible for the work being done in the database session.\n\nEnabling\
    \ tracing for the end user identifier will now output data to multiple trace files,\
    \ since your application is sharing sessions. The Oracle utility `trcsess` can\
    \ be used to consolidate information from multiple trace files containing the\
    \ same `CLIENT ID`. For example:\n\n```\ntrcsess output=425542.trc clientid=HR:Claire:425542\
    \ *.trc\n```\n\n![images](images/square.jpg) `Caution` Don't confuse `V$SESSION.CLIENT_IDENTIFIER`\
    \ with `V$SESSION.CLIENT_INFO`, which is set using the `DBMS_APPLICATION_INFO.SET_CLIENT_INFO`\
    \ procedure. Although `DBMS_MONITOR` has procedures for enabling and disabling\
    \ extended SQL tracing based on `MODULE` and `ACTION` set from `DBMS_APPLICATION_INFO`,\
    \ the `CLIENT_INFO` column has no counterpart in `DBMS_MONITOR`.\n\n## DBMS_APPLICATION_INFO.SET_SESSION_LONGOPS\n\
    \nIf you have a task that you know in advance will be long-running, identify the\
    \ task with `DBMS_APPLICATION_INFO.SET_SESSION_LONGOPS`. This procedure populates\
    \ a row in the `V$SESSION_LONGOPS` view that can be used to monitor the progress\
    \ of your long-running task. The procedure parameters loosely correspond to columns\
    \ in the view, so visibility of application-specific details is easily achieved,\
    \ and in an extremely lightweight way.\n\nNote that Oracle automatically populates\
    \ this view during tasks like statistics gathering, parallel query execution,\
    \ and Server Managed Recovery, so your data will be interspersed with that data.\
    \ The following code shows an example of using this procedure:\n\n```\nDECLARE\n\
    \  l_rindex      BINARY_INTEGER;\n  l_slno        BINARY_INTEGER; -- Oracle internal\
    \ use\n  l_op_name     VARCHAR2(64)    := 'Month end posting';\n  l_target   \
    \   BINARY_INTEGER; -- Object ID being worked on\n  l_target_desc VARCHAR2(32);\
    \   -- Description of target\n  l_context     BINARY_INTEGER; -- A number relevant\
    \ to task, amount processed, etc.\n  l_sofar       NUMBER(6,2);    -- The amount\
    \ of work done so far\n  l_totalwork   NUMBER := 100;  -- An estimate of the amount\
    \ of work to be done\n  l_units       VARCHAR2(32)    := 'records';\nBEGIN\n \
    \ -- rindex is used to identify the row in V$SESSION_LONGOPS\n  -- the _nohint\
    \ call will create a new row and rindex for us to use\n  l_rindex := DBMS_APPLICATION_INFO.SET_SESSION_LONGOPS_NOHINT;\n\
    \n  FOR i IN 1 .. l_totalwork LOOP\n\n    -- In practice, this would be a more\
    \ complex calculation.\n    -- This simple example assumes uniform processing\
    \ time for each sub task\n    l_sofar := i;\n\n    DBMS_APPLICATION_INFO.SET_SESSION_LONGOPS(rindex\
    \      => l_rindex,\n                                              slno      \
    \  => l_slno,\n                                              op_name     => l_op_name,\n\
    \                                              target      => l_target,\n    \
    \                                          target_desc => l_target_desc,\n   \
    \                                           context     => l_context,\n      \
    \                                        sofar       => l_sofar,\n           \
    \                                   totalwork   => l_totalwork,\n            \
    \                                  units       => l_units);\n\n    -- processing\
    \ occurs here\n\n    COMMIT;\n  END LOOP;\nEND;\n/\n```\n\n![images](images/square.jpg)\
    \ `Tip` Oracle doesn't currently provide a procedure for removing the row in `V$SESSION_LONGOPS`.\
    \ This view represents data from one of Oracle's fixed-size underlying tables,\
    \ so rows aren't really deleted anyway. New rows replace older rows after the\
    \ maximum number of rows is reached. For rows inserted by Oracle features like\
    \ statistics gathering, the `TIME_REMAINING` column will be set to 0 when the\
    \ operation completes. For your own data, ensure that you set `SOFAR` and `TOTALWORK`\
    \ to the same value when your task is complete, since the `TIME_REMAINING` column\
    \ is not accessible through the procedure."
  raw: '##### DBMS_SESSION.SET_IDENTIFIER


    DBMS_SESSION.SET_IDENTIFIER should be used to make performance analysis easier
    at runtime. Using this command lets the instance know which end user is associated
    with each session. Oracle introduced this “End to End Application Tracing” feature
    in version 10\. For example, if your application authenticates users at the database
    level with unique accounts, you could set the identifier to the user name and
    IP address in a logon trigger.


    `CREATE OR REPLACE TRIGGER LOGON_TRIGGER`

    `AFTER LOGON ON DATABASE`

    `DECLARE`

    `  l_identifier VARCHAR2(64);`


    `BEGIN`

    `  L_identifier := SYS_CONTEXT(''USERENV'', ''OS_USER'') || '':'' ||`

    `                  SYS_CONTEXT(''USERENV'', ''IP_ADDRESS'');`

    `  DBMS_SESSION.SET_IDENTIFIER(l_identifier);`

    `END;`


    The end user identifying information is now visible in the column V$SESSION.CLIENT_IDENTIFIER,
    in dozens of other views, and in any extended SQL trace files generated for that
    session. To enable tracing for a known end user identifier, call the Oracle built-in
    procedure, like so:


    `DBMS_MONITOR.CLIENT_ID_TRACE_ENABLE(client_id=>''HR:Claire:425542'',`

    `                                    waits=>TRUE,`

    `                                    binds => TRUE,`

    `                                    plan_stat => ''ALL_EXECUTIONS''     -- 11g
    and later`

    `                                    );`


    The trace file will contain a line formatted like


    `*** CLIENT ID:(HR:Claire:425542) 2011-03-16 01:59:13.317`


    If your application shares sessions among end users, then this information needs
    to be set from the application layer instead of the database. Instead of IP address,
    use an application level session ID or user name. The key is to use the information
    necessary to identify the end user responsible for the work being done in the
    database session.


    Enabling tracing for the end user identifier will now output data to multiple
    trace files, since your application is sharing sessions. The Oracle utility `trcsess`
    can be used to consolidate information from multiple trace files containing the
    same CLIENT ID. For example:


    `trcsess output=425542.trc clientid=HR:Claire:425542 *.trc`


    ![images](images/square.jpg) **Caution** Don''t confuse V$SESSION.CLIENT_IDENTIFIER
    with V$SESSION.CLIENT_INFO, which is set using the DBMS_APPLICATION_INFO.SET_CLIENT_INFO
    procedure. Although DBMS_MONITOR has procedures for enabling and disabling extended
    SQL tracing based on MODULE and ACTION set from DBMS_APPLICATION_INFO, the CLIENT_INFO
    column has no counterpart in DBMS_MONITOR.


    ##### DBMS_APPLICATION_INFO.SET_SESSION_LONGOPS


    If you have a task that you know in advance will be long-running, identify the
    task with DBMS_APPLICATION_INFO.SET_SESSION_LONGOPS. This procedure populates
    a row in the V$SESSION_LONGOPS view that can be used to monitor the progress of
    your long-running task. The procedure parameters loosely correspond to columns
    in the view, so visibility of application-specific details is easily achieved,
    and in an extremely lightweight way.


    Note that Oracle automatically populates this view during tasks like statistics
    gathering, parallel query execution, and Server Managed Recovery, so your data
    will be interspersed with that data. The following code shows an example of using
    this procedure:


    `DECLARE`

    `  l_rindex      BINARY_INTEGER;`

    `  l_slno        BINARY_INTEGER; -- Oracle internal use`

    `  l_op_name     VARCHAR2(64)    := ''Month end posting'';`

    `  l_target      BINARY_INTEGER; -- Object ID being worked on`

    `  l_target_desc VARCHAR2(32);   -- Description of target`

    `  l_context     BINARY_INTEGER; -- A number relevant to task, amount processed,
    etc.`

    `  l_sofar       NUMBER(6,2);    -- The amount of work done so far`

    `  l_totalwork   NUMBER := 100;  -- An estimate of the amount of work to be done`

    `  l_units       VARCHAR2(32)    := ''records'';`

    `BEGIN`

    `  -- rindex is used to identify the row in V$SESSION_LONGOPS`

    `  -- the _nohint call will create a new row and rindex for us to use`

    `  l_rindex := DBMS_APPLICATION_INFO.SET_SESSION_LONGOPS_NOHINT;`


    `  FOR i IN 1 .. l_totalwork LOOP`


    `    -- In practice, this would be a more complex calculation.`

    `    -- This simple example assumes uniform processing time for each sub task`

    `    l_sofar := i;`


    `    DBMS_APPLICATION_INFO.SET_SESSION_LONGOPS(rindex      => l_rindex,`

    `                                              slno        => l_slno,`

    `                                              op_name     => l_op_name,`

    `                                              target      => l_target,`

    `                                              target_desc => l_target_desc,`

    `                                              context     => l_context,`

    `                                              sofar       => l_sofar,`

    `                                              totalwork   => l_totalwork,`

    `                                              units       => l_units);`


    `    -- processing occurs here`


    `    COMMIT;`

    `  END LOOP;`

    `END;`

    `/`


    ![images](images/square.jpg) **Tip** Oracle doesn''t currently provide a procedure
    for removing the row in V$SESSION_LONGOPS. This view represents data from one
    of Oracle''s fixed-size underlying tables, so rows aren''t really deleted anyway.
    New rows replace older rows after the maximum number of rows is reached. For rows
    inserted by Oracle features like statistics gathering, the TIME_REMAINING column
    will be set to 0 when the operation completes. For your own data, ensure that
    you set SOFAR and TOTALWORK to the same value when your task is complete, since
    the TIME_REMAINING column is not accessible through the procedure.'
  trans: "\n\n## DBMS_SESSION.SET_IDENTIFIER\n\n应使用 `DBMS_SESSION.SET_IDENTIFIER`\
    \ 以简化运行时的性能分析。使用此命令可让数据库实例知道每个会话关联的是哪个最终用户。Oracle 在版本 10 中引入了这种“端到端应用跟踪”功能。例如，如果你的应用在数据库层面通过唯一账户验证用户，可以在登录触发器中将标识符设置为用户名和\
    \ IP 地址。\n\n```\nCREATE OR REPLACE TRIGGER LOGON_TRIGGER\nAFTER LOGON ON DATABASE\n\
    DECLARE\n  l_identifier VARCHAR2(64);\n\nBEGIN\n  L_identifier := SYS_CONTEXT('USERENV',\
    \ 'OS_USER') || ':' ||\n                  SYS_CONTEXT('USERENV', 'IP_ADDRESS');\n\
    \  DBMS_SESSION.SET_IDENTIFIER(l_identifier);\nEND;\n/\n```\n\n最终用户的标识信息现在可见于\
    \ `V$SESSION.CLIENT_IDENTIFIER` 列、其他数十个视图以及为该会话生成的任何扩展 SQL 跟踪文件中。要为已知的最终用户标识符启用跟踪，请调用\
    \ Oracle 内置过程，如下所示：\n\n```\nDBMS_MONITOR.CLIENT_ID_TRACE_ENABLE(client_id=>'HR:Claire:425542',\n\
    \                                    waits=>TRUE,\n                          \
    \          binds => TRUE,\n                                    plan_stat => 'ALL_EXECUTIONS'\
    \      -- 11g 及以后版本\n                                    );\n```\n\n跟踪文件将包含一行格式如下的内容：\n\
    \n```\n*** CLIENT ID:(HR:Claire:425542) 2011-03-16 01:59:13.317\n```\n\n如果你的应用在最终用户之间共享会话，则此信息需要从应用层而非数据库层设置。应使用应用级会话\
    \ ID 或用户名，而非 IP 地址。关键是要利用必要的信息来识别对数据库会话中执行的工作负责的最终用户。\n\n为最终用户标识符启用跟踪现在将把数据输出到多个跟踪文件，因为你的应用正在共享会话。Oracle\
    \ 实用工具 `trcsess` 可用于整合来自包含相同 `CLIENT ID` 的多个跟踪文件的信息。例如：\n\n```\ntrcsess output=425542.trc\
    \ clientid=HR:Claire:425542 *.trc\n```\n\n![images](img/square.jpg) `注意` 不要将 `V$SESSION.CLIENT_IDENTIFIER`\
    \ 与 `V$SESSION.CLIENT_INFO` 混淆，后者是使用 `DBMS_APPLICATION_INFO.SET_CLIENT_INFO` 过程设置的。尽管\
    \ `DBMS_MONITOR` 提供了基于从 `DBMS_APPLICATION_INFO` 设置的 `MODULE` 和 `ACTION` 来启用和禁用扩展\
    \ SQL 跟踪的过程，但 `CLIENT_INFO` 列在 `DBMS_MONITOR` 中没有对应项。\n\n## DBMS_APPLICATION_INFO.SET_SESSION_LONGOPS\n\
    \n如果你有一个预先可知将长时间运行的任务，请使用 `DBMS_APPLICATION_INFO.SET_SESSION_LONGOPS` 来标识该任务。此过程会在\
    \ `V$SESSION_LONGOPS` 视图中填充一行，该行可用于监视你的长时任务的进度。该过程的参数与视图中的列大致对应，因此可以轻松实现对应用程序特定细节的可见性，而且方式极其轻量。\n\
    \n请注意，Oracle 会在统计信息收集、并行查询执行和服务器管理恢复等任务期间自动填充此视图，因此你的数据将与那些数据交错在一起。以下代码展示了使用此过程的示例：\n\
    \n```\nDECLARE\n  l_rindex      BINARY_INTEGER;\n  l_slno        BINARY_INTEGER;\
    \ -- Oracle 内部使用\n  l_op_name     VARCHAR2(64)    := 'Month end posting';\n  l_target\
    \      BINARY_INTEGER; -- 正在处理的对象 ID\n  l_target_desc VARCHAR2(32);   -- 目标描述\n\
    \  l_context     BINARY_INTEGER; -- 与任务相关的数字，如已处理数量等\n  l_sofar       NUMBER(6,2);\
    \    -- 迄今已完成的工作量\n  l_totalwork   NUMBER := 100;  -- 预估的总工作量\n  l_units     \
    \  VARCHAR2(32)    := 'records';\nBEGIN\n  -- rindex 用于标识 V$SESSION_LONGOPS 中的行\n\
    \  -- 使用 _nohint 调用将为我们创建一个新的行和 rindex\n  l_rindex := DBMS_APPLICATION_INFO.SET_SESSION_LONGOPS_NOHINT;\n\
    \n  FOR i IN 1 .. l_totalwork LOOP\n\n    -- 在实践中，这将是一个更复杂的计算。\n    -- 这个简单示例假设每个子任务的处理时间是均匀的\n\
    \    l_sofar := i;\n\n    DBMS_APPLICATION_INFO.SET_SESSION_LONGOPS(rindex   \
    \   => l_rindex,\n                                              slno        =>\
    \ l_slno,\n                                              op_name     => l_op_name,\n\
    \                                              target      => l_target,\n    \
    \                                          target_desc => l_target_desc,\n   \
    \                                           context     => l_context,\n      \
    \                                        sofar       => l_sofar,\n           \
    \                                   totalwork   => l_totalwork,\n            \
    \                                  units       => l_units);\n\n    -- 处理在此处发生\n\
    \n    COMMIT;\n  END LOOP;\nEND;\n/\n```\n\n![images](img/square.jpg) `提示` Oracle\
    \ 目前没有提供用于删除 `V$SESSION_LONGOPS` 中行的过程。此视图代表 Oracle 底层固定大小表之一的数据，因此行实际上并不会被删除。达到最大行数后，旧行会被新行替换。对于由\
    \ Oracle 功能（如统计信息收集）插入的行，操作完成时 `TIME_REMAINING` 列将被设置为 0。对于你自己的数据，请确保在任务完成时将 `SOFAR`\
    \ 和 `TOTALWORK` 设置为相同的值，因为无法通过该过程访问 `TIME_REMAINING` 列。\n\n"
- fmt: "## DBMS_APPLICATION_INFO.SET_MODULE\n\nWhile the `DBMS_APPLICATION_INFO.SET_SESSION_LONG_OPS`\
    \ procedure is intended specifically for the identification of long running tasks,\
    \ Oracle does provide a lightweight method for identifying all of your application\
    \ tasks currently executing in the database. The values of `module` and `action`\
    \ are visible in `V$SESSION` and in many of the dynamic performance views. `DBMS_MONITOR.SERV_MOD_ACT_STAT_ENABLE`\
    \ can be used to see real-time statistics for any module and action in the view\
    \ `V$SERV_MOD_ACT_STATS`.\n\nSetting the values of `module` and `action` correctly\
    \ is absolutely the best way to correlate performance statistics in the database\
    \ with your business tasks. For example:\n\n```\nCREATE OR REPLACE PROCEDURE p\
    \ AS\nBEGIN\n  DBMS_APPLICATION_INFO.SET_MODULE(module_name => 'Month End Posting',\n\
    \                                   action_name => 'p');\n  q;\n  r;\n  s;\n \
    \ DBMS_APPLICATION_INFO.SET_MODULE(module_name => NULL,\n                    \
    \               action_name => NULL);\nEND;\n```\n\nNote that like `DBMS_SESSION.SET_IDENTIFIER`,\
    \ Oracle provides (in 10g and later) the ability to turn on extended SQL tracing\
    \ based on module and action values with the `DBMS_MONITOR` package. To enable\
    \ tracing for a known module and action, call the Oracle procedure, like so:\n\
    \n```\nDBMS_MONITOR.SERV_MOD_ACT_TRACE_ENABLE(service_name => 'V11202',\n    \
    \                                   module_name => 'Month End Posting',\n    \
    \                                   action_name => 'p',\n                    \
    \                   waits => TRUE,\n                                       binds\
    \ => TRUE,\n                                       plan_stat => 'ALL_EXECUTIONS'\
    \     -- 11g and later\n                                       );\n```\n\nThe\
    \ trace file will contain lines formatted like this:\n\n```\n*** SERVICE NAME:(V11202)\
    \ 2011-05-13 20:26:22.919\n*** MODULE NAME:(Month End Posting) 2011-05-13 20:26:22.919\n\
    *** ACTION NAME:(p) 2011-05-13 20:26:22.919\n```\n\nWhat values should be used\
    \ for `module` and `action`? The module name should uniquely identify a part of\
    \ your application. The action name should represent a logical unit of work that\
    \ is being executed within the module. Both module and action should mimic business\
    \ terminology as closely as possible.\n\n![images](images/square.jpg) `Note` Oracle\
    \ provides hooks into the `module` and `action` identifiers for other languages\
    \ in addition to PL/SQL. In OCI, use the procedure `OCIAttrSet` to set the `OCI_ATTR_MODULE`\
    \ and `OCI_ATTR_ACTION` values. See [`http://download.oracle.com/docs/cd/E11882_01/appdev.112/e10646/ociaahan.htm`](http://download.oracle.com/docs/cd/E11882_01/appdev.112/e10646/ociaahan.htm)\
    \ for details.\n\nIn Java, use the JDBC method `OracleConnection.setEndToEndMetrics()`,\
    \ provided first in Oracle 10g. See [`http://download.oracle.com/docs/cd/E11882_01/java.112/e16548/dmsmtrc.htm`](http://download.oracle.com/docs/cd/E11882_01/java.112/e16548/dmsmtrc.htm)\
    \ for details.\n\nIn Perl, use the `DBI->connect` function (in `DBD::Oracle`)\
    \ to set attributes `ora_module_name` and `ora_action`. See [`http://kobesearch.cpan.org/htdocs/DBD-Oracle/DBD/Oracle.html`](http://kobesearch.cpan.org/htdocs/DBD-Oracle/DBD/Oracle.html)\
    \ for details.\n\nThese languages, as well as any other language with access to\
    \ the database layer, can also use PL/SQL calls to set the values directly with\
    \ `DBMS_APPLICATION_INFO`. Unlike the OCI, Java, and Perl examples, this method\
    \ does incur an additional network round trip, so consider carefully before making\
    \ these PL/SQL calls inside code loops.\n\nThe `DBMS_APPLICATION_INFO` package\
    \ doesn't keep track of nested actions. When you use the `SET_MODULE` procedure,\
    \ the former values of `module` and `action` are lost, so you're responsible for\
    \ handling this problem correctly in your code. Unsetting them at the end of the\
    \ procedure makes sense at the highest level of the code, but how should `SET_MODULE`\
    \ be used in the inner procedures `q()`, `r()`, and `s()`? One option is to avoid\
    \ setting `module` and `action` in called procedures and only setting them in\
    \ the highest level procedure. For example:\n\n```\nCREATE OR REPLACE PROCEDURE\
    \ p AS\nBEGIN\n  DBMS_APPLICATION_INFO.SET_MODULE(module_name => 'Month End Posting',\n\
    \                                   action_name => 'q');\n  q;\n  DBMS_APPLICATION_INFO.SET_MODULE(module_name\
    \ => 'Month End Posting',\n                                   action_name => 'r');\n\
    \  r;\n  DBMS_APPLICATION_INFO.SET_MODULE(module_name => 'Month End Posting',\n\
    \                                   action_name => 's');\n  s;\n  DBMS_APPLICATION_INFO.SET_MODULE(module_name\
    \ => NULL,\n                                   action_name => NULL);\nEND;\n```\n\
    \nA better option is to handle the nesting by storing the prior values before\
    \ calling `set_module` and then restoring them at completion. Instead of instrumenting\
    \ only the highest level code, each called procedure should have similar code.\
    \ Each exit point of the procedure will need to reset the `module` and `action`,\
    \ including the exception handling section. For example:\n\n```\nCREATE OR REPLACE\
    \ PROCEDURE p AS\n  l_module VARCHAR2(48);\n  l_action VARCHAR2(32);\n  l_sqlcode\
    \ NUMBER;\n  l_sqlerrm VARCHAR2(512);\nBEGIN\n  DBMS_APPLICATION_INFO.READ_MODULE(module_name\
    \ => l_module,\n                                    action_name => l_action);\n\
    \  DBMS_APPLICATION_INFO.SET_MODULE(module_name => 'Month End Posting',\n    \
    \                               action_name => 'p');\n  q;\n  r;\n  s;\n  DBMS_APPLICATION_INFO.SET_MODULE(module_name\
    \ => l_module,\n                                   action_name => l_action);\n\
    EXCEPTION WHEN OTHERS THEN\n  l_sqlcode := SQLCODE;\n  l_sqlerrm := SQLERRM;\n\
    \  DBMS_APPLICATION_INFO.SET_MODULE(module_name => l_module,\n               \
    \                    action_name => l_action);\n  -- handle exceptions here\n\
    END;\n```\n\nI can't overstate the value of incorporating the use of `DBMS_APPLICATION_INFO`\
    \ in your application. Keeping track of the `module`/`action` stack is troublesome,\
    \ but I'll soon discuss a way to simplify that.\n\n### Conditional Compilation\n\
    \n[Chapter 4](#Chapter04.html#ch4) describes instrumenting PL/SQL code with timing\
    \ information using the Conditional Compilation feature of PL/SQL. This method\
    \ can be used in cases where performance analysts have control over the runtime\
    \ application and the performance problems are easily reproducible.\n\nIf the\
    \ problem is reproducible in a test environment, then the PL/SQL code can be recompiled\
    \ with the Timing instrumentation turned on. If the production environment must\
    \ be used (and let's face it, this happens all too frequently), there are ways\
    \ to minimize the intrusion. Instead of recompiling the PL/SQL in the active schema,\
    \ duplicate the PL/SQL in a separate schema. Then the code can be recompiled in\
    \ the new schema without affecting production users.\n\nTo redirect a specific\
    \ user to the newly created schema, either modify the application or create a\
    \ login trigger. Then reproduce the problem. Finally, based on the data provided\
    \ by the timing code, construct a profile of the response time for the problem\
    \ task and amaze your friends by solving the performance problem."
  raw: '##### DBMS_APPLICATION_INFO.SET_MODULE


    While the DBMS_APPLICATION_INFO.SET_SESSION_LONG_OPS procedure is intended specifically
    for the identification of long running tasks, Oracle does provide a lightweight
    method for identifying all of your application tasks currently executing in the
    database. The values of module and action are visible in V$SESSION and in many
    of the dynamic performance views. DBMS_MONITOR.SERV_MOD_ACT_STAT_ENABLE can be
    used to see real-time statistics for any module and action in the view V$SERV_MOD_ACT_STATS.


    Setting the values of module and action correctly is absolutely the best way to
    correlate performance statistics in the database with your business tasks. For
    example:


    `CREATE OR REPLACE PROCEDURE p AS`

    `BEGIN`

    `  DBMS_APPLICATION_INFO.SET_MODULE(module_name => ''Month End Posting'',`

    `                                   action_name => ''p'');`

    `  q;`

    `  r;`

    `  s;`

    `  DBMS_APPLICATION_INFO.SET_MODULE(module_name => NULL,`

    `                                   action_name => NULL);`

    `END;`


    Note that like DBMS_SESSION.SET_IDENTIFIER, Oracle provides (in 10g and later)
    the ability to turn on extended SQL tracing based on module and action values
    with the DBMS_MONITOR package. To enable tracing for a known module and action,
    call the Oracle procedure, like so:


    `DBMS_MONITOR.SERV_MOD_ACT_TRACE_ENABLE(service_name => ''V11202'',`

    `                                       module_name => ''Month End Posting'',`

    `                                       action_name => ''p'',`

    `                                       waits => TRUE,`

    `                                       binds => TRUE,`

    `                                       plan_stat => ''ALL_EXECUTIONS''     --
    11g and later`

    `                                       );`


    The trace file will contain lines formatted like this:


    `*** SERVICE NAME:(V11202) 2011-05-13 20:26:22.919`

    `*** MODULE NAME:(Month End Posting) 2011-05-13 20:26:22.919`

    `*** ACTION NAME:(p) 2011-05-13 20:26:22.919`


    What values should be used for module and action? The module name should uniquely
    identify a part of your application. The action name should represent a logical
    unit of work that is being executed within the module. Both module and action
    should mimic business terminology as closely as possible.


    ![images](images/square.jpg) **Note** Oracle provides hooks into the module and
    action identifiers for other languages in addition to PL/SQL. In OCI, use the
    procedure OCIAttrSet to set the OCI_ATTR_MODULE and OCI_ATTR_ACTION values. See
    [`http://download.oracle.com/docs/cd/E11882_01/appdev.112/e10646/ociaahan.htm`](http://download.oracle.com/docs/cd/E11882_01/appdev.112/e10646/ociaahan.htm)
    for details.


    In Java, use the JDBC method `OracleConnection.setEndToEndMetrics()`, provided
    first in Oracle 10g. See [`http://download.oracle.com/docs/cd/E11882_01/java.112/e16548/dmsmtrc.htm`](http://download.oracle.com/docs/cd/E11882_01/java.112/e16548/dmsmtrc.htm)
    for details.


    In Perl, use the `DBI->connect` function (in `DBD::Oracle`) to set attributes
    `ora_module_name` and `ora_action`. See [`http://kobesearch.cpan.org/htdocs/DBD-Oracle/DBD/Oracle.html`](http://kobesearch.cpan.org/htdocs/DBD-Oracle/DBD/Oracle.html)
    for details.


    These languages, as well as any other language with access to the database layer,
    can also use PL/SQL calls to set the values directly with DBMS_APPLICATION_INFO.
    Unlike the OCI, Java, and Perl examples, this method does incur an additional
    network round trip, so consider carefully before making these PL/SQL calls inside
    code loops.


    The DBMS_APPLICATION_INFO package doesn''t keep track of nested actions. When
    you use the SET_MODULE procedure, the former values of module and action are lost,
    so you''re responsible for handling this problem correctly in your code. Unsetting
    them at the end of the procedure makes sense at the highest level of the code,
    but how should SET_MODULE be used in the inner procedures `q`, `r`, and `s`? One
    option is to avoid setting module and action in called procedures and only setting
    them in the highest level procedure. For example:


    `CREATE OR REPLACE PROCEDURE p AS`

    `BEGIN`

    `  DBMS_APPLICATION_INFO.SET_MODULE(module_name => ''Month End Posting'',`

    `                                   action_name => ''q'');`

    `  q;`

    `  DBMS_APPLICATION_INFO.SET_MODULE(module_name => ''Month End Posting'',`

    `                                   action_name => ''r'');`

    `  r;`

    `  DBMS_APPLICATION_INFO.SET_MODULE(module_name => ''Month End Posting'',`

    `                                   action_name => ''s'');`

    `  s;`

    `  DBMS_APPLICATION_INFO.SET_MODULE(module_name => NULL,`

    `                                   action_name => NULL);`

    `END;`


    A better option is to handle the nesting by storing the prior values before calling
    set_module and then restoring them at completion. Instead of instrumenting only
    the highest level code, each called procedure should have similar code. Each exit
    point of the procedure will need to reset the module and action, including the
    exception handling section. For example:


    `CREATE OR REPLACE PROCEDURE p AS`

    `  l_module VARCHAR2(48);`

    `  l_action VARCHAR2(32);`

    `  l_sqlcode NUMBER;`

    `  l_sqlerrm VARCHAR2(512);`

    `BEGIN`

    `  DBMS_APPLICATION_INFO.READ_MODULE(module_name => l_module,`

    `                                    action_name => l_action);`

    `  DBMS_APPLICATION_INFO.SET_MODULE(module_name => ''Month End Posting'',`

    `                                   action_name => ''p'');`

    `  q;`

    `  r;`

    `  s;`

    `  DBMS_APPLICATION_INFO.SET_MODULE(module_name => l_module,`

    `                                   action_name => l_action);`

    `EXCEPTION WHEN OTHERS THEN`

    `  l_sqlcode := SQLCODE;`

    `  l_sqlerrm := SQLERRM;`

    `  DBMS_APPLICATION_INFO.SET_MODULE(module_name => l_module,`

    `                                   action_name => l_action);`

    `  -- handle exceptions here`

    `END;`


    I can''t overstate the value of incorporating the use of DBMS_APPLICATION_INFO
    in your application. Keeping track of the module/action stack is troublesome,
    but I''ll soon discuss a way to simplify that.


    #### Conditional Compilation


    [Chapter 4](#Chapter04.html#ch4) describes instrumenting PL/SQL code with timing
    information using the Conditional Compilation feature of PL/SQL. This method can
    be used in cases where performance analysts have control over the runtime application
    and the performance problems are easily reproducible.


    If the problem is reproducible in a test environment, then the PL/SQL code can
    be recompiled with the Timing instrumentation turned on. If the production environment
    must be used (and let''s face it, this happens all too frequently), there are
    ways to minimize the intrusion. Instead of recompiling the PL/SQL in the active
    schema, duplicate the PL/SQL in a separate schema. Then the code can be recompiled
    in the new schema without affecting production users.


    To redirect a specific user to the newly created schema, either modify the application
    or create a login trigger. Then reproduce the problem. Finally, based on the data
    provided by the timing code, construct a profile of the response time for the
    problem task and amaze your friends by solving the performance problem.'
  trans: "\n## DBMS_APPLICATION_INFO.SET_MODULE\n\n虽然`DBMS_APPLICATION_INFO.SET_SESSION_LONG_OPS`过程专门用于识别长时间运行的任务，但\
    \ Oracle 确实提供了一种轻量级方法来识别当前在数据库中执行的所有应用程序任务。`module`和`action`的值可在`V$SESSION`及许多动态性能视图中查看。`DBMS_MONITOR.SERV_MOD_ACT_STAT_ENABLE`可用于查看视图`V$SERV_MOD_ACT_STATS`中任何模块和操作的实时统计信息。\n\
    \n正确设置`module`和`action`的值是将数据库中的性能统计信息与业务任务关联起来的**最佳方式**。例如：\n\n```\nCREATE OR\
    \ REPLACE PROCEDURE p AS\nBEGIN\n  DBMS_APPLICATION_INFO.SET_MODULE(module_name\
    \ => 'Month End Posting',\n                                   action_name => 'p');\n\
    \  q;\n  r;\n  s;\n  DBMS_APPLICATION_INFO.SET_MODULE(module_name => NULL,\n \
    \                                  action_name => NULL);\nEND;\n```\n\n请注意，就像`DBMS_SESSION.SET_IDENTIFIER`一样，Oracle（在\
    \ 10g 及更高版本中）提供了使用`DBMS_MONITOR`包根据模块和操作值开启扩展 SQL 跟踪的功能。要为已知的模块和操作启用跟踪，请调用 Oracle\
    \ 过程，如下所示：\n\n```\nDBMS_MONITOR.SERV_MOD_ACT_TRACE_ENABLE(service_name => 'V11202',\n\
    \                                       module_name => 'Month End Posting',\n\
    \                                       action_name => 'p',\n                \
    \                       waits => TRUE,\n                                     \
    \  binds => TRUE,\n                                       plan_stat => 'ALL_EXECUTIONS'\
    \     -- 11g 及更高版本\n                                       );\n```\n\n跟踪文件将包含格式如下的行：\n\
    \n```\n*** SERVICE NAME:(V11202) 2011-05-13 20:26:22.919\n*** MODULE NAME:(Month\
    \ End Posting) 2011-05-13 20:26:22.919\n*** ACTION NAME:(p) 2011-05-13 20:26:22.919\n\
    ```\n\n`module`和`action`应该使用什么值呢？模块名称应能唯一标识应用程序的一部分。操作名称应表示在该模块内正在执行的逻辑工作单元。模块和操作的名称都应尽可能贴近业务术语。\n\
    \n![images](img/square.jpg) `注意` Oracle 除了为 PL/SQL 提供钩子外，也为其他语言提供了对`module`和`action`标识符的挂钩。在\
    \ OCI 中，使用过程`OCIAttrSet`来设置`OCI_ATTR_MODULE`和`OCI_ATTR_ACTION`值。详情请参见[`http://download.oracle.com/docs/cd/E11882_01/appdev.112/e10646/ociaahan.htm`](http://download.oracle.com/docs/cd/E11882_01/appdev.112/e10646/ociaahan.htm)。\n\
    \n在 Java 中，使用 JDBC 方法`OracleConnection.setEndToEndMetrics()`，该方法首次在 Oracle 10g\
    \ 中提供。详情请参见[`http://download.oracle.com/docs/cd/E11882_01/java.112/e16548/dmsmtrc.htm`](http://download.oracle.com/docs/cd/E11882_01/java.112/e16548/dmsmtrc.htm)。\n\
    \n在 Perl 中，使用`DBI->connect`函数（在`DBD::Oracle`中）来设置属性`ora_module_name`和`ora_action`。详情请参见[`http://kobesearch.cpan.org/htdocs/DBD-Oracle/DBD/Oracle.html`](http://kobesearch.cpan.org/htdocs/DBD-Oracle/DBD/Oracle.html)。\n\
    \n这些语言，以及任何其他可以访问数据库层的语言，也可以通过 PL/SQL 调用直接使用`DBMS_APPLICATION_INFO`来设置值。与 OCI、Java\
    \ 和 Perl 示例不同，这种方法会带来额外的网络往返开销，因此在代码循环内部进行这些 PL/SQL 调用之前需要仔细考虑。\n\n`DBMS_APPLICATION_INFO`包不跟踪嵌套的操作。当你使用`SET_MODULE`过程时，之前的`module`和`action`值会丢失，因此你需要在代码中正确处理这个问题。在代码的最高层级结束时将它们设置为`NULL`是合理的，但在内部过程`q()`、`r()`和`s()`中应如何使用`SET_MODULE`呢？一种选择是在被调用的过程中避免设置`module`和`action`，仅在最高层级的过程中设置它们。例如：\n\
    \n```\nCREATE OR REPLACE PROCEDURE p AS\nBEGIN\n  DBMS_APPLICATION_INFO.SET_MODULE(module_name\
    \ => 'Month End Posting',\n                                   action_name => 'q');\n\
    \  q;\n  DBMS_APPLICATION_INFO.SET_MODULE(module_name => 'Month End Posting',\n\
    \                                   action_name => 'r');\n  r;\n  DBMS_APPLICATION_INFO.SET_MODULE(module_name\
    \ => 'Month End Posting',\n                                   action_name => 's');\n\
    \  s;\n  DBMS_APPLICATION_INFO.SET_MODULE(module_name => NULL,\n             \
    \                      action_name => NULL);\nEND;\n```\n\n一个更好的选择是通过在对`set_module`进行调用前存储先前的值，并在完成时恢复它们来处理嵌套问题。每个被调用的过程都应包含类似的代码，而不仅仅在最高层级的代码中进行检测。过程的每个退出点，包括异常处理部分，都需要重置`module`和`action`。例如：\n\
    \n```\nCREATE OR REPLACE PROCEDURE p AS\n  l_module VARCHAR2(48);\n  l_action\
    \ VARCHAR2(32);\n  l_sqlcode NUMBER;\n  l_sqlerrm VARCHAR2(512);\nBEGIN\n  DBMS_APPLICATION_INFO.READ_MODULE(module_name\
    \ => l_module,\n                                    action_name => l_action);\n\
    \  DBMS_APPLICATION_INFO.SET_MODULE(module_name => 'Month End Posting',\n    \
    \                               action_name => 'p');\n  q;\n  r;\n  s;\n  DBMS_APPLICATION_INFO.SET_MODULE(module_name\
    \ => l_module,\n                                   action_name => l_action);\n\
    EXCEPTION WHEN OTHERS THEN\n  l_sqlcode := SQLCODE;\n  l_sqlerrm := SQLERRM;\n\
    \  DBMS_APPLICATION_INFO.SET_MODULE(module_name => l_module,\n               \
    \                    action_name => l_action);\n  -- 在此处处理异常\nEND;\n```\n\n我**无法过分强调**在您的应用程序中结合使用`DBMS_APPLICATION_INFO`的价值。维护`module`/`action`堆栈虽然麻烦，但我很快就会讨论一种简化它的方法。\n\
    \n### 条件编译\n\n第 4 章描述了如何使用 PL/SQL 的条件编译功能为 PL/SQL 代码添加计时信息检测。在性能分析师能够控制运行时应用程序并且性能问题易于重现的情况下，可以使用此方法。\n\
    \n如果问题可以在测试环境中重现，那么可以重新编译 PL/SQL 代码并开启计时检测。如果必须使用生产环境（让我们面对现实，这种情况发生得太频繁了），有办法将侵入性降至最低。不要在活动模式中重新编译\
    \ PL/SQL，而是将 PL/SQL 复制到一个单独的模式中。然后可以在新模式中重新编译代码，而不影响生产用户。\n\n要将特定用户重定向到新创建的模式，可以修改应用程序或创建一个登录触发器。然后重现问题。最后，根据计时代码提供的数据，构建问题任务的响应时间概况，并通过解决性能问题让您的朋友们惊叹不已。\n"
- fmt: "#### Built-in Profilers\n\n[Chapter 7](#Chapter07.html#ch7) 鼓励你借助 Oracle 数据库随附的几个包来了解你的代码：`DBMS_HPROF`、`DBMS_TRACE`\
    \ 和 `DBMS_PROFILER`。这些包提供了分析你的 PL/SQL 代码的功能，每个包的关注点略有不同。我在此只作简要介绍，因为我更感兴趣的是能够覆盖整个软件生命周期的解决方案。\n\
    \n在开发过程中了解你的代码至关重要，因此能够轻松在代码行或子程序级别进行分析的工具是非常宝贵的。但是，这些工具能否轻松集成到你的应用程序中？测量的侵入性有多大？性能分析师能否在不招致对所有其他业务任务的侵入性惩罚的情况下，轻松获取特定业务任务的响应时间数据？\n\
    \n使用这些内置包可能正是你想要的，但我发现它们未能很好地回答这些问题。幸运的是，我找到了一个更好的答案：一个提供 `DBMS_APPLICATION_INFO`\
    \ 插桩标准并启用 Oracle 内部插桩的 PL/SQL 库。在我详细介绍这个库之前，我需要先介绍这种插桩。\n\n#### Extended SQL Trace\
    \ Data (Event 10046)\n\nOracle 的内核插桩，即扩展 SQL 跟踪数据，最初被称为“伪错误调试事件 10046”。此插桩被添加到\
    \ Oracle 代码中，用于优化数据库应用程序以及内核本身。此插桩生成的跟踪文件恰好提供了开发人员想要的：其代码花费时间的线性顺序记录。\n\n跟踪文件中包含的详细程度允许分析师深入了解数据库会话的内部工作方式。与内置分析器非常相似，有时这种细节程度可能令人难以招架。在正确级别进行插桩是真正的关键。Oracle\
    \ 的 `tkprof` 聚合数据以便理解细节，但这样做时，它隐藏了重要的关系。真正需要的是以配置文件格式聚合数据，以一种将你的注意力集中在特定业务任务中最大响应时间消耗点的方式来总结细节。\n\
    \n构建性能不佳的业务任务的配置文件是成功优化的关键。我使用 Method R Profiler 软件来生成配置文件，识别响应时间的最大贡献者，并解决性能问题。有时问题在于糟糕的\
    \ SQL，有时在于糟糕的 PL/SQL，有时在于配置问题，有时在于更复杂的情况。但在每种情况下，配置文件都是最佳的起点。有时，DBA 团队对启用跟踪或向开发团队提供访问权限有抵触情绪。\n\
    \n> *即使需要国会法案和医生的信才能让 DBA 给我必要的权限，我也会运行跟踪。*\n> \n> ——受挫的客户\n\n但是，获取那些跟踪文件是非常值得的。插桩非常好的应用程序可能会报告足够的详细计时信息来解决大多数问题。但在某些情况下，真正的性能问题隐藏在应用程序的数据库层中。在这些情况下，性能分析师需要插桩的关联性：包含所执行业务任务细节的扩展\
    \ SQL 跟踪文件。更好的是，智能应用程序应在需要时生成包含此关联信息的跟踪文件。\n\n#### Instrumentation Library for\
    \ Oracle (ILO)\n\n`ILO`，即 Oracle 插桩库，是一个开源项目。我是当前的维护者，但其创建的荣誉属于 Eric Evans。`ILO`\
    \ 由 PL/SQL 包组成，包含用于使用 Oracle 扩展 SQL 跟踪识别和测量任务的过程，以及用于收集和存储特定业务任务响应时间数据的过程。这些包被安装并编译在目标\
    \ Oracle 实例中，并且可以由任何能够访问 Oracle 数据库层的编写的代码调用。`ILO` 与 Method R `SLA Manager` 完全集成，允许你组织和分析整个应用程序系统的响应时间数据。\n\
    \n![images](images/square.jpg) **Note** `ILO` 是在 SourceForge 上提供的开源软件，[`http://sourceforge.net/projects/ilo/`](http://sourceforge.net/projects/ilo/)。它需要\
    \ Oracle Database 9.2.0.1 或更高版本。它在 GNU 宽松通用公共许可证（LGPL）下免费发布，[`http://gnu.org/copyleft/lgpl.html`](http://gnu.org/copyleft/lgpl.html)。`SLA\
    \ Manager` 是来自 Method R Corporation [`http://method-r.com/software/slam`](http://method-r.com/software/slam)\
    \ 的商业软件。\n\n##### Why Should You Use ILO?\n\n使用 `ILO` 插桩代码的好处包括以下几点：\n\n*   对于运行\
    \ `ILO` 插桩应用程序的操作员和分析师来说，分析指定业务任务的确切持续时间非常容易。想象一下，用户抱怨人力资源系统中“添加员工”操作太慢。借助 `ILO`\
    \ 插桩，性能分析师可以轻松获取其诊断和修复用户特定问题所需的 Oracle 扩展 SQL 跟踪数据。\n*   开发人员不再需要担心何时或为何使用 `DBMS_APPLICATION_INFO`\
    \ 或 `DBMS_SESSION` 将其应用程序的部分注册到 Oracle 数据库。业务任务现在通过 `Module` 和 `Action` 在 `V$`\
    \ 视图中可见。\n*   开发人员不再需要担心在应用程序中插入代码行来管理 Oracle 的“扩展 SQL 跟踪”功能（也称为 10046 跟踪、`DBMS_SUPPORT`\
    \ 跟踪或 `DBMS_MONITOR` 跟踪）。\n*   使用 `ILO`，你的 Oracle 跟踪文件将被正确地限定时间范围，并将*仅*包含属于你响应时间的耗时描述。\n\
    *   `ILO` 包含钩子，允许你存储特定任务的响应时间历史记录。然后，你将能够报告性能趋势或违反服务级别协议的情况。\n*   `ILO` 经过真实世界测试。它轻量且可靠。"
  raw: "#### Built-in Profilers\n\n[Chapter 7](#Chapter07.html#ch7) encourages you\
    \ to know your code with the assistance of several packages included with the\
    \ Oracle database: DBMS_HPROF, DBMS_TRACE, and DBMS_PROFILER. These packages provide\
    \ functionality for profiling your PL/SQL code, each with slightly different area\
    \ of focus. I will only mention them quickly here, since I am really more interested\
    \ in solutions that will span the entire software life cycle.\n\nKnowing your\
    \ code during development is crucial, so tools that easily profile code at the\
    \ line or subprogram level are invaluable. But how easily can these tools be integrated\
    \ into your application? How heavy is the measurement intrusion? Can a performance\
    \ analyst easily get response time data for a specific business task without incurring\
    \ the penalty of intrusion on all other business tasks?\n\nUsing these built-in\
    \ packages may be just what you're looking for, but I have not found them to answer\
    \ these questions well enough. Fortunately, I have found a better answer: a PL/SQL\
    \ library that provides a standard for instrumenting with DBMS_APPLICATION_INFO\
    \ and enabling Oracle's internal instrumentation. Before I cover the library in\
    \ detail, I need to introduce this instrumentation.\n\n#### Extended SQL Trace\
    \ Data (Event 10046)\n\nOracle's kernel instrumentation, extended SQL trace data,\
    \ was originally known as “pseudo error debugging event number 10046.” This instrumentation\
    \ was added to Oracle's code for the optimization of database applications as\
    \ well as optimization of the kernel itself. The trace files generated by this\
    \ instrumentation provide exactly what developers want: a linear sequential record\
    \ of how their code spends time.\n\nThe level of detail included in the trace\
    \ files allows analysts an intimate view of the inner workings of a database session.\
    \ Much like the built-in profilers, sometimes this level of detail can be overwhelming.\
    \ Instrumentation *at the right level* is the real key. Oracle's tkprof aggregates\
    \ the data to make some sense of the details, but in doing so, it hides important\
    \ relationships. What's really needed is aggregation of the data in the format\
    \ of a profile, summarizing the details in a way that focuses your attention on\
    \ where the largest amounts of response time for a specific business task were\
    \ spent.\n\nConstructing profiles of slow performing business tasks is critical\
    \ to successful optimization. I use the Method R Profiler software to generate\
    \ a profile, identify the top contributors to response time, and resolve performance\
    \ problems. Sometimes the problems are in poor SQL, sometimes in poor PL/SQL,\
    \ sometimes in configuration issues, and sometimes in more complex situations.\
    \ But in every case, the profile is the best place to start. Sometimes DBA staff\
    \ are resistant to enabling tracing or to providing access to their development\
    \ teams.\n\n> *I will run trace, even if it does take an act of Congress and a\
    \ letter from my doctor to get the DBAs to give me the necessary privileges.*\n\
    > \n> —Frustrated Client\n\nBut getting those trace files is well worth the effort.\
    \ Applications that are instrumented really well may report enough detailed timing\
    \ information to resolve most issues. But in some cases, the real performance\
    \ problem is hidden from the application at the database layer. In those cases,\
    \ performance analysts need the correlation of instrumentation: extended SQL trace\
    \ files that include details of the business tasks being executed. And better\
    \ yet, smart applications should generate trace files when needed with this correlated\
    \ information included.\n\n#### Instrumentation Library for Oracle (ILO)\n\nILO,\
    \ the Instrumentation Library for Oracle, is an open source project. I'm the current\
    \ caretaker, but the credit for its creation belongs to Eric Evans. ILO consists\
    \ of PL/SQL packages with procedures for identifying and measuring tasks using\
    \ Oracle extended SQL trace and procedures for collecting and storing response\
    \ time data for specific business tasks. The packages are installed and compiled\
    \ in the target Oracle instance and can be called by code written in any language\
    \ that has access to the Oracle database tier. ILO is fully integrated with the\
    \ Method R SLA Manager, which allows you to organize and analyze response time\
    \ data for your entire application system.\n\n![images](images/square.jpg) **Note**\
    \ ILO is open source software available at SourceForge, [`http://sourceforge.net/projects/ilo/`](http://sourceforge.net/projects/ilo/).\
    \ It requires Oracle Database version 9.2.0.1 or newer. It is released free of\
    \ charge under the GNU Lesser General Public License (LGPL), [`http://gnu.org/copyleft/lgpl.html`](http://gnu.org/copyleft/lgpl.html).\
    \ SLA Manager is commercial software from Method R Corporation, [`http://method-r.com/software/slam`](http://method-r.com/software/slam).\n\
    \n##### Why Should You Use ILO?\n\nThe benefits of instrumenting code with ILO\
    \ include the following:\n\n*   It's very easy for operators and analysts running\
    \ ILO-instrumented applications to profile the exact duration of a specified business\
    \ task. Imagine that a user complains that “adding an employee” in an HR system\
    \ is too slow. With ILO instrumentation, it's trivially easy for a performance\
    \ analyst to obtain exactly the Oracle-extended SQL trace data he needs to diagnose\
    \ and repair the user's specific problem.\n*   Developers no longer need to worry\
    \ about understanding when or why to use DBMS_APPLICATION_INFO or DBMS_SESSION\
    \ to register parts of their applications with the Oracle database. Business tasks\
    \ are now visible in `V$` views identified by Module and Action.\n*   Developers\
    \ no longer need to worry about inserting lines of code into their applications\
    \ to manage Oracle's “extended SQL tracing” feature (also known as 10046 tracing,\
    \ `DBMS_SUPPORT` tracing, or `DBMS_MONITOR` tracing).\n*   With ILO, your Oracle\
    \ trace files will be properly time-scoped and will contain *only* descriptions\
    \ of elapsed time that are part of your response time.\n*   ILO contains hooks\
    \ that allow you to store response time histories for specific tasks. You'll then\
    \ be able to report on performance trends or violations of service level agreements.\n\
    *   ILO is real-world tested. It's lightweight and trustworthy."
