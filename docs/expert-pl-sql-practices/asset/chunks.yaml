    As expected, the direct path load operation was faster and used much less redo.
    So while it’s always important to be aware of the memory consumption with collections,
    when it comes to using bulk bind for direct load inserts, you may find yourself
    using larger-than-normal collection sizes if the memory on your database server
    permits.


    ### The Real Benefit: Client Bulk Processing


    As I mentioned at the start of the chapter, my repeated meanderings within the
    hardware store are hurting my efficiency. However, sometimes things are much,
    much worse: I pay for an item, drive home, and *then* realize I need to get back
    in the car, drive back to the hardware store, and purchase something else. (For
    the sake of sensitive readers, I won’t include the term of “endearment” my wife
    uses when this happens!)


    This chapter has described the efficiency of using bulk operations in PL/SQL to
    access data, but that is equivalent to *already being* at the hardware store.
    The cost of coming from an external client application to the database (network
    trip) and processing data in a row-at-a-time basis is equivalent to driving back
    and forth to the store in a car. The cost of this can be quantified with some
    simple demos. First, I’ll build (using PL/SQL, of course!) a replica of what many
    client applications implement in 3GL code, namely a routine to open a cursor on
    the table and a routine a fetch a single row. Here is the code, which you’ll find
    in `bulk_network_1.sql`:


    `SQL> create or replace`

