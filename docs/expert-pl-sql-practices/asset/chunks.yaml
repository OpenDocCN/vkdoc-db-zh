    T\".\"CALENDAR_YEAR\"[NUMBER,22]\n   9 - \"S\".\"PROD_ID\"[NUMBER,22], \"S\".\"\
    TIME_ID\"[DATE,7],\n       \"S\".\"QUANTITY_SOLD\"[NUMBER,22], \"S\".\"AMOUNT_SOLD\"\
    [NUMBER,22]\n  10 - \"S\".\"PROD_ID\"[NUMBER,22], \"S\".\"TIME_ID\"[DATE,7],\n\
    \       \"S\".\"QUANTITY_SOLD\"[NUMBER,22], \"S\".\"AMOUNT_SOLD\"[NUMBER,22]\n\
    ```\n\n这突显了一个事实：视图可以是 PL/SQL 函数的一种更高性能的替代方案，而不会损害封装和集中化的需求。作为最后的考虑，你可以重命名基表，并允许视图采用其名称。通过这些操作，你将业务逻辑列“插入”到\
    \ `SALES` “表”中，并且你的 DML 语句不会受到影响，如 [清单 9-30](#Chapter09.html#list_9_30) 所示。\n\n\
    ### 通过带有标量子查询的视图对表执行 DML\n\n```sql\nSQL> RENAME sales TO sales_t;\n\nTable renamed.\n\
    \nSQL> CREATE VIEW sales\n  2  AS\n     SELECT s.prod_id, s.cust_id, s.time_id,\
    \ s.channel_id,\n            s.promo_id, s.quantity_sold, s.amount_sold,\n   \
    \         s.amount_sold * (SELECT r.exchange_rate\n                          \
    \   FROM   rates r\n                             WHERE  r.base_ccy   = 'USD'\n\
    \                             AND    r.target_ccy = 'GBP'\n                  \
    \           AND    r.rate_date  = s.time_id) AS amount_sold_gbp\n     FROM   sales_t\
    \  s;\n\nView created.\n\nSQL> INSERT INTO sales\n     ( prod_id, cust_id, time_id,\
    \ channel_id, promo_id,\n       quantity_sold, amount_sold )\n  2  VALUES\n  \
    \   ( 13, 987, DATE '1998-01-10', 3, 999, 1, 1232.16 );\n\n1 row created.\n\n\
    SQL> UPDATE sales\n  2  SET    amount_sold = 10000\n  3  WHERE  ROWNUM = 1;\n\n\
    1 row updated.\n\nSQL> DELETE\n  2  FROM   sales\n  3  WHERE  amount_sold = 10000;\n\
    \n1 row deleted.\n```\n\n要使用此方法，需要考虑任何现有的代码库，例如 `%ROWTYPE` 声明、基于 PL/SQL 记录的 DML、未限定的\
    \ `INSERT` 或 `SELECT` 列表（即那些没有显式列引用的列表）等。幸运的是，视图中的派生列无法被修改，正如本节最后一个示例在 [清单 9-31](#Chapter09.html#list_9_31)\
    \ 中演示的那样。\n\n### 通过带有标量子查询的视图对表执行 DML\n\n```sql\nSQL> INSERT INTO sales\n    \
    \ ( prod_id, cust_id, time_id, channel_id, promo_id,\n       quantity_sold, amount_sold,\
    \ amount_sold_gbp )\n  2  VALUES\n     ( 13, 987, DATE '1998-01-10', 3, 999, 1,\
    \ 1232.16, 1000 );\n     quantity_sold, amount_sold, amount_sold_gbp )\n     \
    \                    *\nERROR at line 3:\nORA-01733: virtual column not allowed\
    \ here\n```"
  raw: 'I’ve highlighted the critical parts of the output. There is slightly more
    logical I/O than with a simple join to RATES, but this is minor compared with
    the I/O generated by the PL/SQL function. The sales report is still much quicker
    than the version with the PL/SQL function and the business logic is encapsulated.


    [Listing 9-28](#Chapter09.html#list_9_28) demonstrates column-elimination. I’ve
    excluded the AMOUNT_SOLD_GBP column from the report and captured the statistics
    again.


    ***Listing 9-28.** Exploiting Column-Elimination in Views (Column-Elimination)*


    `SQL> SELECT t.calendar_year`

    `  2  ,      p.prod_name`

    `  3  ,      SUM(s.quantity_sold)   AS qty_sold`

    `  4  ,      SUM(s.amount_sold)     AS amt_sold_usd`

    `  5  FROM   sales_rates_view s`

    `  6  ,      times            t`

    `  7  ,      products         p`

    `  8  WHERE  s.time_id    = t.time_id`

    `  9  AND    s.prod_id    = p.prod_id`

    ` 10  GROUP  BY`

    ` 11         t.calendar_year`

    ` 12  ,      p.prod_name;`


    `272 rows selected.`


    **`Elapsed: 00:00:00.61`**


    `Statistics`

    `----------------------------------------------------------`

    `          8  recursive calls`

    `          0  db block gets`

    **`       1736  consistent gets`**

    `          0  physical reads`

    `          0  redo size`

