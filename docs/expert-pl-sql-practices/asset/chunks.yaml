    ## Lew Cunningham


    **Lew Cunningham** has been working in IT for over 20 years and has worked with
    `Oracle` databases since 1993. His specialties are application design, database
    design, and coding of high volume, `VLDB` databases. He is currently a Senior
    Database Architect at a financial services company in St Petersburg, `FL` working
    on very large, high transaction rate analytical databases and applications. He
    spends an inordinate amount of time keeping up with current technology and trends
    and speaking at user groups and doing webinars. Lewis is also an `Oracle ACE Director`
    and `Oracle Certified Professional`. He has written several articles for the `Oracle
    Technology Network` and maintains an `Oracle` technology blog at <http://it.toolbox.com/blogs/oracle-guide>.
    Lewis has written two books: `EnterpriseDB: The Definitive Reference` (`Rampant
    Techpress`, 2007) and `SQL DML: The SQL Starter Series` (`CreateSpace`, 2008).
    He lives in `Florida` with his wife and two sons. You can contact him at <lewisc@databasewisdom.com>.


    ![images](images/square.jpg)

    ## Dominic Delmolino


    **Dominic Delmolino** is the Lead `Oracle` and Database Technologist for `Agilex
    Technologies`, a consulting firm specializing in assisting government and private
    enterprises to realize the value of their information. Dominic has over 24 years
    of database experience, including more than 20 years as an `Oracle Database` Engineering
    and Development professional. He is a member of the `Oak Table Network` and regularly
    presents at conferences, seminars, and user group meetings in `Europe` and the
    `US`. He also maintains <http://www.oraclemusings.com>, a site focused on database
    coding and design practices related to database application development. Dominic
    holds a `Bachelor of Science` degree in computer science from `Cornell University`,
    `Ithaca`, `NY`.


    ![images](images/square.jpg)

    ## Sue Harper


    **Sue Harper** is a Product Manager for `Oracle SQL Developer` and `SQL Developer
    Data Modeler` in the Database Development Tools group. She has been at `Oracle`
    since 1992 and is currently based in `London`. Sue is a regular contributor to
    magazines, maintains a technical blog, and speaks at many conferences around the
    world. She has authored the technical book `Oracle SQL Developer 2.1` (`Packt
    Publishing`, 2009) When not at work, Sue is a keen walker and photographer. Sue
    takes time out to work with a charity in the slums of `New Delhi`, where she works
    with the women and children.


    ![images](images/square.jpg)

    ## Torben Holm


    **Torben Holm** has been in the computer business as a developer since 1987. He
    has been working with `Oracle` since 1992; his first four years as system analyst
    and application developer (`Oracle 7` and `Forms 4.0/Reports 2.0` and `DBA`),
    then two years as developer (`Oracle 6/7`, `Forms 3.0` and `RPT`, and `DBA`).
    He spent several years working for `Oracle Denmark` in the `Premium Services`
    group as a Senior Principal Consultant performing application development and
    `DBA` tasks. He also worked as an instructor in `PL/SQL`, `SQL`, and `DBA` courses.
    Torben now works for `Miracle A/S` (<http://www.miracleas.dk>) as a consultant
    with a focus in application development (`PLSQL`, `mod_plsql`, `Forms`, `ADF`)
    and database administration. He has been at `Miracle A/S` 10 years. He is an `Oracle
    Certified Developer` and a member of <http://OakTable.net>.


    ![images](images/square.jpg)

    ## Connor McDonald


    **Connor McDonald** has worked with `Oracle` since the early 1990s, cutting his
    teeth on `Oracle` versions `6.0.36` and `7.0.12`. Over the past 11 years, Connor
    has worked with systems in `Australia`, the `U.K.`, `Southeast Asia`, `Western
    Europe`, and the `United States`. He has come to realize that although the systems
    and methodologies around the world are very diverse, there tend to be two common
    themes in the development of systems running on `Oracle`: either to steer away
    from the `Oracle`-specific functions or to use them in a haphazard or less-than-optimal
    fashion. It was this observation that led to the creation of a personal hints
    and tips web site (<http://www.oracledba.co.uk>) and more presenting on the `Oracle`
    speaker circuit in an endeavor to improve the perception and usage of `PL/SQL`
    in the industry.


    ![images](images/square.jpg)

    ## Arup Nanda


    **Arup Nanda** has been an `Oracle DBA` since 1993, which has exposed him to all
    facets of database administration, from modeling to disaster recovery. He currently
    leads the global `DBA` team at `Starwood Hotels`, the parent of chains such as
    `Sheraton` and `Westin`, in `White Plains`, `NY`. He serves as a contributing
    editor of `SELECT Journal`, the publication of `Independent Oracle Users Group`
    (`IOUG`); speaks at many `Oracle` Technology events such as `Oracle World` and
    local user groups such as `New York Oracle User Group`; and has written many articles
    for both print publications such as `Oracle Magazine` and online publications
    such as `Oracle Technology Network`. Arup has coauthored two books: `Oracle Privacy
    Security Auditing` (`Rampant`, 2003) and `Oracle PL/SQL for DBAs` (`O''Reilly`,
    2005). Recognizing his professional accomplishments and contributions to user
    community, `Oracle` chose him as the `DBA of the Year` in 2003. Arup lives in
    `Danbury`, `Connecticut`, with his wife `Anindita` and son `Anish`. He can be
    reached at <arup@proligence.com>.


    ![images](images/square.jpg)

    ## Stephan Petit


    **Stephan Petit** began his career in 1995 at `CERN`, the European Laboratory
    for Particle Physics, located in `Geneva`, `Switzerland`. He is now in charge
    of a team of software engineers and students delivering applications and tools
    to the laboratory and beyond. One of these tools is the `Engineering and Equipment
    Data Management System`, also known as the `CERN EDMS`. Projects like `CERN`''s
    `Large Hadron Collider` (`LHC`) have a lifetime of 40 years or more. The `EDMS`
    is the digital engineering memory of the laboratory. More than a million documents
    relating to more than a million pieces of equipment are stored in the `EDMS`,
    which is also used as `CERN`''s `Product Lifecycle Management` (`PLM`) and `Asset
    Tracking` system. `EDMS` is based almost entirely on `PL/SQL` and is intended
    to have a lifetime at least as long as the `LHC`.


    Stephan and his team have been polishing coding conventions and best practices
    in `PL/SQL` in order to meet their very interesting mix of challenges: maintainability
    over decades, reliability, efficient error handling, scalability, and reusability
    of the modules. These challenges are compounded by the frequent rotation of team
    members, most of whom are students only temporarily at `CERN`. The oldest piece
    of code was written in 1995 and is still in use – with success! Apart from polishing
    `PL/SQL`, Stephan also enjoys being on stage from time to time as rock band singer
    at the `CERN`''s rock & roll summer festival and as actor in various plays.'
