- fmt: "##### Use a Virtual Column\n\nTo wrap up this section on using SQL expressions\
    \ in place of PL/SQL functions, I’m going to demonstrate how to replace a PL/SQL\
    \ function with a virtual column.\n\nA feature of Oracle Database 11g, virtual\
    \ columns are expressions stored as column metadata in tables (they don’t use\
    \ any storage as such). They are logically similar to columns in views but are\
    \ far more flexible as they can have statistics gathered for them or be indexed.\
    \ Virtual columns are an excellent tool for encapsulating simple business rules\
    \ and, because they are stored as metadata against tables, they are also self-documenting\
    \ declarations of your data logic.\n\nTo demonstrate virtual columns as an alternative\
    \ to PL/SQL functions, I’ve converted the sales report from [Listing 9-6](#Chapter09.html#list_9_6).\
    \ To recap, this used the `FORMAT_CUSTOMER_NAME` function to format a customer\
    \ name and took almost 7 seconds to execute (compared with just 1 second as a\
    \ SQL-only query). To begin the conversion, I’ve added a virtual column to the\
    \ `CUSTOMERS` table, as shown in [Listing 9-32](#Chapter09.html#list_9_32).\n\n\
    **Listing 9-32.** Converting a PL/SQL Function to a Virtual Column (Syntax)\n\n\
    ```\nSQL> ALTER TABLE customers ADD\n  2  ( cust_name VARCHAR2(100) GENERATED\
    \ ALWAYS AS (cust_first_name||' '||cust_last_name) )\n  3  ;\n\nTable altered.\n\
    ```\n\nThe `GENERATED ALWAYS AS (expression)` syntax is specific to virtual columns\
    \ (I’ve omitted an optional `VIRTUAL` keyword to keep the display on a single\
    \ line). The `CUSTOMERS` table now looks as follows in [Listing 9-33](#Chapter09.html#list_9_33).\n\
    \n**Listing 9-33.** Converting a PL/SQL Function to a Virtual Column (Table Description)\n\
    \n```\nSQL> SELECT column_name\n  2  ,      data_type\n  3  ,      data_default\n\
    \  4  FROM   user_tab_columns\n  5  WHERE  table_name = 'CUSTOMERS'\n  6  ORDER\
    \  BY\n  7         column_id;\n\nCOLUMN_NAME                    DATA_TYPE    \
    \   DATA_DEFAULT\n------------------------------ --------------- -----------------------------------------\n\
    CUST_ID                        NUMBER\nCUST_FIRST_NAME                VARCHAR2\n\
    CUST_LAST_NAME                 VARCHAR2\nCUST_GENDER                    CHAR\n\
    <...output removed...>\nCUST_VALID                     VARCHAR2\nCUST_NAME   \
    \                   VARCHAR2        \"CUST_FIRST_NAME\"||' '||\"CUST_LAST_NAME\"\
    \n```\n\nUsing the virtual column in a SQL statement is no different from any\
    \ other table, view, or other column. The converted sales report is shown in [Listing\
    \ 9-34](#Chapter09.html#list_9_34).\n\n**Listing 9-34.** Converting a PL/SQL Function\
    \ to a Virtual Column (Usage)\n\n```\nSQL> SELECT t.calendar_year\n  2  ,    \
    \  c.cust_name\n  3  ,      SUM(s.quantity_sold) AS qty_sold\n  4  ,      SUM(s.amount_sold)\
    \   AS amt_sold\n  5  FROM   sales     s\n  6  ,      customers c\n  7  ,    \
    \  times     t\n  8  WHERE  s.cust_id = c.cust_id\n  9  AND    s.time_id = t.time_id\n\
    \ 10  GROUP  BY\n 11         t.calendar_year\n 12  ,      c.cust_name;\n\n11604\
    \ rows selected.\n\nElapsed: 00:00:01.20\n```\n\nAs you can see from the elapsed\
    \ time of this query, by moving the customer name formatting to a virtual column,\
    \ I’ve eliminated the overhead of the PL/SQL function while retaining the encapsulation\
    \ of the business logic with the very data to which it applies.\n\n#### Reducing\
    \ Executions\n\nEarlier in this chapter, I described the fact that you can’t reliably\
    \ predict the number calls to a PL/SQL function that a SQL statement will make.\
    \ Further, each execution carries a context-switching penalty in addition to the\
    \ work the PL/SQL function has to do. There are, however, techniques you can use\
    \ to reliably *reduce* the function calls and I will demonstrate some of these\
    \ next.\n\n##### Pre/Post-Computing with SQL Hints\n\nI gave an example of the\
    \ CBO’s cost-based query transformation in [Listings 9-8](#Chapter09.html#list_9_8)\
    \ to [9-10](#Chapter09.html#list_9_10), where my attempt to pre-compute formatted\
    \ customer names in an inline view was negated by view merging. The result was\
    \ 918,000 PL/SQL function executions (i.e. once per row in the larger `SALES`\
    \ table) instead of an intended 55,500 calls (i.e. once per row in the `CUSTOMERS`\
    \ table). For some queries, such an order of magnitude or more function executions\
    \ can be disastrous.\n\nI’ve repeated the customer sales report in [Listing 9-35](#Chapter09.html#list_9_35).\
    \ This time, however, I’ve used a couple of hints to ensure that the pre-computation\
    \ of the customer names in an inline view “sticks” and the CBO doesn’t merge the\
    \ query blocks.\n\n**Listing 9-35.** Reducing Function Calls through SQL\n\n```\n\
    SQL> SELECT /*+ NO_MERGE(@customers) */\n  2         t.calendar_year\n  3  , \
    \     c.cust_name\n  4  ,      SUM(s.quantity_sold) AS qty_sold\n  5  ,      SUM(s.amount_sold)\
    \   AS amt_sold\n  6  FROM   sales     s\n  7  ,     (\n  8         SELECT /*+\
    \ QB_NAME(customers) */\n  9                cust_id\n 10         ,      format_customer_name\
    \ (\n 11                   cust_first_name, cust_last_name\n 12              \
    \     ) AS cust_name\n 13         FROM   customers\n 14        )          c\n\
    \ 15  ,      times     t\n 16  WHERE  s.cust_id = c.cust_id\n 17  AND    s.time_id\
    \ = t.time_id\n 18  GROUP  BY\n 19         t.calendar_year\n 20  ,      c.cust_name\n\
    \ 21  ;\n\n11604 rows selected.\n\nElapsed: 00:00:01.49\n\nSQL> exec counter.show('Function\
    \ calls');\n\nFunction calls: 55500\n```\n\nYou can see that this time, I’ve used\
    \ hints to instruct the CBO to leave my inline view unmerged. The aim is to ensure\
    \ that my PL/SQL function only executes against the `CUSTOMERS` dataset and not\
    \ the larger `SALES` set. I’ve done this by using the `NO_MERGE` hint, adopting\
    \ the query block naming syntax introduced in Oracle Database 10g. The `QB_NAME`\
    \ hint is used to label the inline view query block; I’m therefore able to reference\
    \ the inline view from the main query block, as you can see in the `NO_MERGE`\
    \ hint.\n\nI can go one step further with this query, however. In this particular\
    \ example, the `FORMAT_CUSTOMER_NAME` function only needs to be applied to the\
    \ final resultset of just 11,604 rows (far fewer than the 55,500 customer records).\
    \ I can therefore pre-group the entire resultset using the same hints as previously,\
    \ but only call the PL/SQL function at the very last stage. [Listing 9-36](#Chapter09.html#list_9_36)\
    \ shows the impact of this.\n\n**Listing 9-36.** Reducing Function Calls through\
    \ SQL (Restructured Query)\n\n```\nSQL> SELECT /*+ NO_MERGE(@pregroup) */\n  2\
    \         calendar_year\n  3  ,      format_customer_name(\n  4            cust_first_name,\
    \ cust_last_name\n  5            ) AS cust_name\n  6  ,      qty_sold\n  7  ,\
    \      amt_sold\n  8  FROM  (\n  9           SELECT /*+ QB_NAME(pregroup) */\n\
    \ 10                  t.calendar_year\n 11           ,      c.cust_first_name\n\
    \ 12           ,      c.cust_last_name\n 13           ,      SUM(s.quantity_sold)\
    \ AS qty_sold\n 14           ,      SUM(s.amount_sold)   AS amt_sold\n 15    \
    \       FROM   sales     s\n 16           ,      customers c\n 17           ,\
    \      times     t\n 18           WHERE  s.cust_id = c.cust_id\n 19          \
    \ AND    s.time_id = t.time_id\n 20           GROUP  BY\n 21                 \
    \ t.calendar_year\n 22           ,      c.cust_first_name\n 23           ,   \
    \   c.cust_last_name\n 24        );\n11604 rows selected.\n\nElapsed: 00:00:01.14\n\
    \nSQL> exec counter.show('Function calls');\n\nFunction calls: 11604\n```\n\n\
    This is better still, because I have managed to pre-aggregate all the data prior\
    \ to calling the PL/SQL function, reducing its number of calls to 11,604 and saving\
    \ more time on the report."
  raw: '##### Use a Virtual Column


    To wrap up this section on using SQL expressions in place of PL/SQL functions,
    I’m going to demonstrate how to replace a PL/SQL function with a virtual column.


    A feature of Oracle Database 11*g*, virtual columns are expressions stored as
    column metadata in tables (they don’t use any storage as such). They are logically
    similar to columns in views but are far more flexible as they can have statistics
    gathered for them or be indexed. Virtual columns are an excellent tool for encapsulating
    simple business rules and, because they are stored as metadata against tables,
    they are also self-documenting declarations of your data logic.


    To demonstrate virtual columns as an alternative to PL/SQL functions, I’ve converted
    the sales report from [Listing 9-6](#Chapter09.html#list_9_6). To recap, this
    used the `FORMAT_CUSTOMER_NAME` function to format a customer name and took almost
    7 seconds to execute (compared with just 1 second as a SQL-only query). To begin
    the conversion, I’ve added a virtual column to the CUSTOMERS table, as shown in
    [Listing 9-32](#Chapter09.html#list_9_32).


    ***Listing 9-32.** Converting a PL/SQL Function to a Virtual Column (Syntax)*


    `SQL> ALTER TABLE customers ADD`

    `  2  ( cust_name VARCHAR2(100) GENERATED ALWAYS AS (cust_first_name||'' ''||cust_last_name)
    )`

    `  3  ;`


    `Table altered.`


    The `GENERATED ALWAYS AS (expression)` syntax is specific to virtual columns (I’ve
    omitted an optional VIRTUAL keyword to keep the display on a single line). The
    CUSTOMERS table now looks as follows in [Listing 9-33](#Chapter09.html#list_9_33).


    ***Listing 9-33.** Converting a PL/SQL Function to a Virtual Column (Table Description)*


    `SQL> SELECT column_name`

    `  2  ,      data_type`

    `  3  ,      data_default`

    `  4  FROM   user_tab_columns`

    `  5  WHERE  table_name = ''CUSTOMERS''`

    `  6  ORDER  BY`

    `  7         column_id;`


    `COLUMN_NAME                    DATA_TYPE       DATA_DEFAULT`

    `------------------------------ --------------- -----------------------------------------`

    `CUST_ID                        NUMBER`

    `CUST_FIRST_NAME                VARCHAR2`

    `CUST_LAST_NAME                 VARCHAR2`

    `CUST_GENDER                    CHAR`

    `<...output removed...>`

    `CUST_VALID                     VARCHAR2`

    **`CUST_NAME                      VARCHAR2        "CUST_FIRST_NAME"||'' ''||"CUST_LAST_NAME`**


    Using the virtual column in a SQL statement is no different from any other table,
    view, or other column. The converted sales report is shown in [Listing 9-34](#Chapter09.html#list_9_34).


    ***Listing 9-34.** Converting a PL/SQL Function to a Virtual Column (Usage)*


    `SQL> SELECT t.calendar_year`

    **`  2  ,      c.cust_name`**

    `  3  ,      SUM(s.quantity_sold) AS qty_sold`

    `  4  ,      SUM(s.amount_sold)   AS amt_sold`

    `  5  FROM   sales     s`

    `  6  ,      customers c`

    `  7  ,      times     t`

    `  8  WHERE  s.cust_id = c.cust_id`

    `  9  AND    s.time_id = t.time_id`

    ` 10  GROUP  BY`

    `11         t.calendar_year`

    **` 12  ,      c.cust_name;`**


    `11604 rows selected.`


    **`Elapsed: 00:00:01.20`**


    As you can see from the elapsed time of this query, by moving the customer name
    formatting to a virtual column, I’ve eliminated the overhead of the PL/SQL function
    while retaining the encapsulation of the business logic with the very data to
    which it applies.


    #### Reducing Executions


    Earlier in this chapter, I described the fact that you can’t reliably predict
    the number calls to a PL/SQL function that a SQL statement will make. Further,
    each execution carries a context-switching penalty in addition to the work the
    PL/SQL function has to do. There are, however, techniques you can use to reliably
    *reduce* the function calls and I will demonstrate some of these next.


    ##### Pre/Post-Computing with SQL Hints


    I gave an example of the CBO’s cost-based query transformation in [Listings 9-8](#Chapter09.html#list_9_8)
    to [9-10](#Chapter09.html#list_9_10), where my attempt to pre-compute formatted
    customer names in an inline view was negated by view merging. The result was 918,000
    PL/SQL function executions (i.e. once per row in the larger SALES table) instead
    of an intended 55,500 calls (i.e. once per row in the CUSTOMERS table). For some
    queries, such an order of magnitude or more function executions can be disastrous.


    I’ve repeated the customer sales report in [Listing 9-35](#Chapter09.html#list_9_35).
    This time, however, I’ve used a couple of hints to ensure that the pre-computation
    of the customer names in an inline view “sticks” and the CBO doesn’t merge the
    query blocks.


    ***Listing 9-35.** Reducing Function Calls through SQL*


    `SQL> SELECT` **`/*+ NO_MERGE(@customers) */`**

    `  2         t.calendar_year`

    `  3  ,      c.cust_name`

    `  4  ,      SUM(s.quantity_sold) AS qty_sold`

    `  5  ,      SUM(s.amount_sold)   AS amt_sold`

    `  6  FROM   sales     s`

    `  7  ,     (`

    `8         SELECT` **`/*+ QB_NAME(customers) */`**

    `  9                cust_id`

    ` 10         ,      format_customer_name (`

    ` 11                   cust_first_name, cust_last_name`

    ` 12                   ) AS cust_name`

    ` 13         FROM   customers`

    ` 14        )          c`

    ` 15  ,      times     t`

    ` 16  WHERE  s.cust_id = c.cust_id`

    ` 17  AND    s.time_id = t.time_id`

    ` 18  GROUP  BY`

    `19         t.calendar_year`

    ` 20  ,      c.cust_name`

    ` 21  ;`


    `11604 rows selected.`


    **`Elapsed: 00:00:01.49`**


    `SQL> exec counter.show(''Function calls'');`


    **`Function calls: 55500`**


    You can see that this time, I’ve used hints to instruct the CBO to leave my inline
    view unmerged. The aim is to ensure that my PL/SQL function only executes against
    the CUSTOMERS dataset and not the larger SALES set. I’ve done this by using the
    NO_MERGE hint, adopting the query block naming syntax introduced in Oracle Database
    10*g*. The QB_NAME hint is used to label the inline view query block; I’m therefore
    able to reference the inline view from the main query block, as you can see in
    the NO_MERGE hint.


    I can go one step further with this query, however. In this particular example,
    the `FORMAT_CUSTOMER_NAME` function only needs to be applied to the final resultset
    of just11,604 rows (far fewer than the 55,500 customer records). I can therefore
    pre-group the entire resultset using the same hints as previously, but only call
    the PL/SQL function at the very last stage. [Listing 9-36](#Chapter09.html#list_9_36)
    shows the impact of this.


    ***Listing 9-36.** Reducing Function Calls through SQL (Restructured Query)*


    `SQL> SELECT /*+ NO_MERGE(@pregroup) */`

    `  2         calendar_year`

    `  3  ,      format_customer_name(`

    `  4            cust_first_name, cust_last_name`

    `  5            ) AS cust_name`

    `  6  ,      qty_sold`

    `  7  ,      amt_sold`

    `  8  FROM  (`

    `  9           SELECT /*+ QB_NAME(pregroup) */`

    ` 10                  t.calendar_year`

    ` 11           ,      c.cust_first_name`

    ` 12           ,      c.cust_last_name`

    ` 13           ,      SUM(s.quantity_sold) AS qty_sold`

    ` 14           ,      SUM(s.amount_sold)   AS amt_sold`

    ` 15           FROM   sales     s`

    ` 16           ,      customers c`

    ` 17           ,      times     t`

    ` 18           WHERE  s.cust_id = c.cust_id`

    ` 19           AND    s.time_id = t.time_id`

    ` 20           GROUP  BY`

    ` 21                  t.calendar_year`

    ` 22           ,      c.cust_first_name`

    ` 23           ,      c.cust_last_name`

    ` 24        );`

    `11604 rows selected.`


    **`Elapsed: 00:00:01.14`**


    `SQL> exec counter.show(''Function calls'');`


    **`Function calls: 11604`**


    This is better still, because I have managed to pre-aggregate all the data prior
    to calling the PL/SQL function, reducing its number of calls to 11,604 and saving
    more time on the report.'
  trans: "##### 使用虚拟列\n\n为了总结本节关于使用 SQL 表达式替代 PL/SQL 函数的内容，我将演示如何用虚拟列替换 PL/SQL 函数。\n\
    \n虚拟列是 Oracle Database 11g 的一项功能，它们是作为列元数据存储在表中的表达式（本身不占用任何存储空间）。它们在逻辑上类似于视图中的列，但灵活性要高得多，因为可以为其收集统计信息或创建索引。虚拟列是封装简单业务规则的绝佳工具，而且由于它们作为元数据存储在表旁，因此也是数据逻辑的自我文档化声明。\n\
    \n为了演示虚拟列作为 PL/SQL 函数的替代方案，我转换了清单 9-6 中的销售报告。回顾一下，该清单使用了 `FORMAT_CUSTOMER_NAME`\
    \ 函数来格式化客户名称，执行时间接近 7 秒（而纯 SQL 查询只需 1 秒）。为了开始转换，我向 `CUSTOMERS` 表添加了一个虚拟列，如清单 9-32\
    \ 所示。\n\n**清单 9-32.** 将 PL/SQL 函数转换为虚拟列（语法）\n\n```\nSQL> ALTER TABLE customers\
    \ ADD\n  2  ( cust_name VARCHAR2(100) GENERATED ALWAYS AS (cust_first_name||'\
    \ '||cust_last_name) )\n  3  ;\n\nTable altered.\n```\n\n`GENERATED ALWAYS AS\
    \ (expression)` 语法是虚拟列特有的（我省略了可选的 `VIRTUAL` 关键字以使显示保持在一行）。`CUSTOMERS` 表现在如清单 9-33\
    \ 所示。\n\n**清单 9-33.** 将 PL/SQL 函数转换为虚拟列（表描述）\n\n```\nSQL> SELECT column_name\n\
    \  2  ,      data_type\n  3  ,      data_default\n  4  FROM   user_tab_columns\n\
    \  5  WHERE  table_name = 'CUSTOMERS'\n  6  ORDER  BY\n  7         column_id;\n\
    \nCOLUMN_NAME                    DATA_TYPE       DATA_DEFAULT\n------------------------------\
    \ --------------- -----------------------------------------\nCUST_ID         \
    \               NUMBER\nCUST_FIRST_NAME                VARCHAR2\nCUST_LAST_NAME\
    \                 VARCHAR2\nCUST_GENDER                    CHAR\n<...output removed...>\n\
    CUST_VALID                     VARCHAR2\nCUST_NAME                      VARCHAR2\
    \        \"CUST_FIRST_NAME\"||' '||\"CUST_LAST_NAME\"\n```\n\n在 SQL 语句中使用虚拟列与使用任何其他表、视图或其他列没有区别。转换后的销售报告如清单\
    \ 9-34 所示。\n\n**清单 9-34.** 将 PL/SQL 函数转换为虚拟列（用法）\n\n```\nSQL> SELECT t.calendar_year\n\
    \  2  ,      c.cust_name\n  3  ,      SUM(s.quantity_sold) AS qty_sold\n  4  ,\
    \      SUM(s.amount_sold)   AS amt_sold\n  5  FROM   sales     s\n  6  ,     \
    \ customers c\n  7  ,      times     t\n  8  WHERE  s.cust_id = c.cust_id\n  9\
    \  AND    s.time_id = t.time_id\n 10  GROUP  BY\n 11         t.calendar_year\n\
    \ 12  ,      c.cust_name;\n\n11604 rows selected.\n\nElapsed: 00:00:01.20\n```\n\
    \n从这个查询的执行时间可以看出，通过将客户名称格式化移至虚拟列，我消除了 PL/SQL 函数的开销，同时将业务逻辑的封装性与它所应用的实际数据保留在了一起。\n\
    \n#### 减少执行次数\n\n在本章前面，我描述了无法可靠预测一条 SQL 语句将调用 PL/SQL 函数的次数这一事实。此外，每次执行除了 PL/SQL\
    \ 函数本身要完成的工作外，还会带来上下文切换的开销。不过，有一些技术可以用来可靠地*减少*函数调用，接下来我将演示其中一些。\n\n##### 使用 SQL\
    \ 提示进行预/后计算\n\n我在清单 9-8 到清单 9-10 中给出了一个 CBO（基于成本的优化器）进行查询转换的例子，在该例中，我试图在内联视图中预计算格式化的客户名称，但因视图合并而被否定了。结果是\
    \ 918,000 次 PL/SQL 函数执行（即在较大的 `SALES` 表中每行执行一次），而不是预期的 55,500 次调用（即在 `CUSTOMERS`\
    \ 表中每行执行一次）。对于某些查询，这种数量级甚至更多的函数执行可能是灾难性的。\n\n我在清单 9-35 中重复了客户销售报告。然而，这次我使用了几个提示来确保在内联视图中对客户名称的预计算能够“坚持”，并且\
    \ CBO 不会合并查询块。\n\n**清单 9-35.** 通过 SQL 减少函数调用\n\n```\nSQL> SELECT /*+ NO_MERGE(@customers)\
    \ */\n  2         t.calendar_year\n  3  ,      c.cust_name\n  4  ,      SUM(s.quantity_sold)\
    \ AS qty_sold\n  5  ,      SUM(s.amount_sold)   AS amt_sold\n  6  FROM   sales\
    \     s\n  7  ,     (\n  8         SELECT /*+ QB_NAME(customers) */\n  9     \
    \           cust_id\n 10         ,      format_customer_name (\n 11          \
    \         cust_first_name, cust_last_name\n 12                   ) AS cust_name\n\
    \ 13         FROM   customers\n 14        )          c\n 15  ,      times    \
    \ t\n 16  WHERE  s.cust_id = c.cust_id\n 17  AND    s.time_id = t.time_id\n 18\
    \  GROUP  BY\n 19         t.calendar_year\n 20  ,      c.cust_name\n 21  ;\n\n\
    11604 rows selected.\n\nElapsed: 00:00:01.49\n\nSQL> exec counter.show('Function\
    \ calls');\n\nFunction calls: 55500\n```\n\n你可以看到，这次我使用了提示来指示 CBO 不要合并我的内联视图。目的是确保我的\
    \ PL/SQL 函数只在 `CUSTOMERS` 数据集上执行，而不是在更大的 `SALES` 集上执行。我通过使用 `NO_MERGE` 提示，并采用\
    \ Oracle Database 10g 引入的查询块命名语法来实现了这一点。`QB_NAME` 提示用于标记内联视图查询块；因此，我可以从主查询块引用该内联视图，正如你在\
    \ `NO_MERGE` 提示中看到的那样。\n\n然而，对于这个查询，我还可以更进一步。在这个特定例子中，`FORMAT_CUSTOMER_NAME` 函数只需要应用到最终的\
    \ 11,604 行结果集上（远少于 55,500 条客户记录）。因此，我可以使用与之前相同的提示对整个结果集进行预分组，但只在最后阶段才调用 PL/SQL\
    \ 函数。清单 9-36 展示了这一做法的影响。\n\n**清单 9-36.** 通过 SQL 减少函数调用（重构后的查询）\n\n```\nSQL> SELECT\
    \ /*+ NO_MERGE(@pregroup) */\n  2         calendar_year\n  3  ,      format_customer_name(\n\
    \  4            cust_first_name, cust_last_name\n  5            ) AS cust_name\n\
    \  6  ,      qty_sold\n  7  ,      amt_sold\n  8  FROM  (\n  9           SELECT\
    \ /*+ QB_NAME(pregroup) */\n 10                  t.calendar_year\n 11        \
    \   ,      c.cust_first_name\n 12           ,      c.cust_last_name\n 13     \
    \      ,      SUM(s.quantity_sold) AS qty_sold\n 14           ,      SUM(s.amount_sold)\
    \   AS amt_sold\n 15           FROM   sales     s\n 16           ,      customers\
    \ c\n 17           ,      times     t\n 18           WHERE  s.cust_id = c.cust_id\n\
    \ 19           AND    s.time_id = t.time_id\n 20           GROUP  BY\n 21    \
    \              t.calendar_year\n 22           ,      c.cust_first_name\n 23  \
    \         ,      c.cust_last_name\n 24        );\n11604 rows selected.\n\nElapsed:\
    \ 00:00:01.14\n\nSQL> exec counter.show('Function calls');\n\nFunction calls:\
    \ 11604\n```\n\n这效果更好，因为我设法在调用 PL/SQL 函数之前对所有数据进行了预聚合，将其调用次数减少到 11,604 次，并在报告上节省了更多时间。"
- fmt: "This technique can be applied in targeted cases where `PL/SQL` function calls\
    \ absolutely must be kept to a minimum. For example, by adopting this technique\
    \ for the earlier sales report with the `GET_RATE` function, I managed to reduce\
    \ 918,000 function executions to just 36,000, which decreased the overall response\
    \ time from 66 seconds to just 4 seconds.\n\nA more strategic method for reducing\
    \ function calls, however, is to exploit a caching solution, which I’ll now describe.\n\
    \n## Caching to Reduce Function Calls\n\nThere are several options for caching\
    \ data in Oracle Database, depending on your version. I’m going to briefly describe\
    \ two caching techniques for reducing function calls that you might wish to investigate\
    \ and/or apply to your application. These are:\n\n*   Scalar-subquery caching\n\
    *   Cross-session `PL/SQL` function result cache\n\n### Scalar-Subquery Caching\n\
    \nThis caching feature is an internal optimization designed to reduce the number\
    \ of executions of `SQL` statements or `PL/SQL` functions embedded in scalar subqueries.\
    \ Although the efficiency of this internal cache can’t be reliably predicted,\
    \ it can be used to reduce `PL/SQL` function calls to some extent. In [Listing\
    \ 9-37](#Chapter09.html#list_9_37), I’ve converted the sales report with the `GET_RATES`\
    \ lookup function to exploit the scalar subquery cache.\n\n**Listing 9-37.** Using\
    \ Scalar-Subquery Caching to Reduce `PL/SQL` Function Calls\n\n```sql\nSQL> SELECT\
    \ t.calendar_year\n  2  ,      p.prod_name\n  3  ,      SUM(s.amount_sold)   \
    \                                          AS amt_sold_usd\n  4  ,      SUM(s.amount_sold\
    \ * (SELECT get_rate(s.time_id, 'USD', 'GBP')\n  5                           \
    \     FROM   dual))                           AS amt_sold_gbp\n  6  FROM   sales\
    \     s\n  7  ,      products  p\n  8  ,      times     t\n  9  WHERE  s.prod_id\
    \ = p.prod_id\n 10  AND    s.time_id = t.time_id\n 11  GROUP  BY\n 12        \
    \ t.calendar_year\n 13  ,      p.prod_name\n 14  ;\n\n272 rows selected.\n\nElapsed:\
    \ 00:00:02.54\n\nStatistics\n----------------------------------------------------------\n\
    \      19451  recursive calls\n          0  db block gets\n      40634  consistent\
    \ gets\n          0  physical reads\n          0  redo size\n      16688  bytes\
    \ sent via SQL*Net to client\n        437  bytes received via SQL*Net from client\n\
    \          2  SQL*Net roundtrips to/from client\n          0  sorts (memory)\n\
    \          0  sorts (disk)\n        272  rows processed\n\nSQL> exec counter.show('Function\
    \ calls');\n\nFunction calls: 19450\n```\n\nBy encapsulating the call to `GET_RATE`\
    \ in a scalar subquery, I’ve managed to reduce the query’s elapsed time from 66\
    \ seconds to just under 3 seconds. The counter shows that the `PL/SQL` function\
    \ calls have dropped to just 19,450 (from over 918,000), resulting in an enormous\
    \ saving in time and logical I/O (over 1.8 million consistent gets were prevented\
    \ by the caching).\n\nAs noted earlier, the cache’s efficiency is dependent on\
    \ a range of factors, including the order of the input data. With this in mind,\
    \ I know that the range of input-values to the `GET_RATE` function in my `SALES`\
    \ data is quite small, so in [Listing 9-38](#Chapter09.html#list_9_38), I have\
    \ attempted to reduce the function calls further still by ordering the inputs\
    \ into the scalar subquery.\n\n**Listing 9-38.** Using Scalar Subquery Caching\
    \ to Reduce `PL/SQL` Function Calls (Effect of Sorted Data)\n\n```sql\nSQL> SELECT\
    \ /*+ NO_MERGE(@inner) */\n  2         calendar_year\n  3  ,      prod_name\n\
    \  4  ,      SUM(amount_sold)                                              AS\
    \ amt_sold_usd\n  5  ,      SUM(amount_sold * (SELECT get_rate(time_id, 'USD',\
    \ 'GBP')\n  6                              FROM   dual))                     \
    \       AS amt_sold_gbp\n  7  FROM  (\n  8         SELECT /*+ QB_NAME(inner) NO_ELIMINATE_OBY\
    \ */\n  9                t.calendar_year\n 10         ,      s.time_id\n 11  \
    \       ,      p.prod_name\n 12         ,      s.amount_sold\n 13         FROM\
    \   sales     s\n 14         ,      products  p\n 15         ,      times    \
    \ t\n 16         WHERE  s.prod_id = p.prod_id\n 17         AND    s.time_id =\
    \ t.time_id\n 18         ORDER  BY\n 19                s.time_id\n 20        )\n\
    \ 21  GROUP  BY\n 22         calendar_year\n 23  ,      prod_name\n 24  ;\n\n\
    272 rows selected.\n\nElapsed: 00:00:02.14\n\nStatistics\n----------------------------------------------------------\n\
    \       1461  recursive calls\n          0  db block gets\n       4662  consistent\
    \ gets\n          8  physical reads\n          0  redo size\n      16688  bytes\
    \ sent via SQL*Net to client\n        437  bytes received via SQL*Net from client\n\
    \          2  SQL*Net roundtrips to/from client\n          2  sorts (memory)\n\
    \          0  sorts (disk)\n        272  rows processed\n\nSQL> exec counter.show('Function\
    \ calls: ordered inputs');\n\nFunction calls: ordered inputs: 1460\n```\n\nBy\
    \ ordering the inputs to the scalar subquery cache, I’ve reduced the `PL/SQL`\
    \ function calls further to just 1,460 (and therefore reduced the logical I/O\
    \ by an order of magnitude and trimmed the overall elapsed time by a small margin).\
    \ This demonstrates that ordering (or clustering) of calls into the subquery cache\
    \ can make a difference to its efficiency. In my case, the savings I made through\
    \ the further reduction in `PL/SQL` function calls “paid for” the cost of pre-sorting\
    \ the `SALES` data."
  raw: 'This technique can be applied in targeted cases where PL/SQL function calls
    absolutely must be kept to a minimum. For example, by adopting this technique
    for the earlier sales report with the `GET_RATE` function, I managed to reduce
    918,000 function executions to just 36,000, which decreased the overall response
    time from 66 seconds to just 4 seconds.


    A more strategic method for reducing function calls, however, is to exploit a
    caching solution, which I’ll now describe.


    ##### Caching to Reduce Function Calls


    There are several options for caching data in Oracle Database, depending on your
    version. I’m going to briefly describe two caching techniques for reducing function
    calls that you might wish to investigate and/or apply to your application. These
    are:


    *   Scalar-subquery caching

    *   Cross-session PL/SQL function result cache


    ###### Scalar-Subquery Caching


    This caching feature is an internal optimization designed to reduce the number
    of executions of SQL statements or PL/SQL functions embedded in scalar subqueries.
    Although the efficiency of this internal cache can’t be reliably predicted, it
    can be used to reduce PL/SQL function calls to some extent. In [Listing 9-37](#Chapter09.html#list_9_37),
    I’ve converted the sales report with the `GET_RATES` lookup function to exploit
    the scalar subquery cache.


    ***Listing 9-37.** Using Scalar-Subquery Caching to Reduce PL/SQL Function Calls*


    `SQL> SELECT t.calendar_year`

    `  2  ,      p.prod_name`

    `  3  ,      SUM(s.amount_sold)                                             AS
    amt_sold_usd`

    **`  4  ,      SUM(s.amount_sold * (SELECT get_rate(s.time_id, ''USD'', ''GBP'')`**

    **`  5                              FROM   dual))                            
    AS amt_sold_gbp`**

    `  6  FROM   sales     s`

    `  7  ,      products  p`

    `  8  ,      times     t`

    `  9  WHERE  s.prod_id = p.prod_id`

    ` 10  AND    s.time_id = t.time_id`

    ` 11  GROUP  BY`

    `12         t.calendar_year`

    ` 13  ,      p.prod_name`

    ` 14  ;`


    `272 rows selected.`


    **`Elapsed: 00:00:02.54`**


    `Statistics`

    `----------------------------------------------------------`

    `      19451  recursive calls`

    `          0  db block gets`

    **`      40634  consistent gets`**

    `          0  physical reads`

    `          0  redo size`

    `      16688  bytes sent via SQL*Net to client`

    `        437  bytes received via SQL*Net from client`

    `          2  SQL*Net roundtrips to/from client`

    `          0  sorts (memory)`

    `          0  sorts (disk)`

    `        272  rows processed`


    `SQL> exec counter.show(''Function calls'');`


    **`Function calls: 19450`**


    By encapsulating the call to `GET_RATE` in a scalar subquery, I’ve managed to
    reduce the query’s elapsed time from 66 seconds to just under 3 seconds. The counter
    shows that the PL/SQL function calls have dropped to just 19,450 (from over 918,000),
    resulting in an enormous saving in time and logical I/O (over 1.8 million consistent
    gets were prevented by the caching).


    As noted earlier, the cache’s efficiency is dependent on a range of factors, including
    the order of the input data. With this in mind, I know that the range of input-values
    to the `GET_RATE` function in my SALES data is quite small, so in [Listing 9-38](#Chapter09.html#list_9_38),
    I have attempted to reduce the function calls further still by ordering the inputs
    into the scalar subquery.


    ***Listing 9-38.** Using Scalar Subquery Caching to Reduce PL/SQL Function Calls
    (Effect of Sorted Data)*


    `SQL> SELECT /*+ NO_MERGE(@inner) */`

    `  2         calendar_year`

    `  3  ,      prod_name`

    `  4  ,      SUM(amount_sold)                                          AS amt_sold_usd`

    `  5  ,      SUM(amount_sold * (SELECT get_rate(time_id, ''USD'', ''GBP'')`

    `  6                            FROM   dual))                          AS amt_sold_gbp`

    `  7  FROM  (`

    `  8         SELECT /*+ QB_NAME(inner) NO_ELIMINATE_OBY */`

    `  9                t.calendar_year`

    ` 10         ,      s.time_id`

    ` 11         ,      p.prod_name`

    ` 12         ,      s.amount_sold`

    ` 13         FROM   sales     s`

    ` 14         ,      products  p`

    ` 15         ,      times     t`

    `16         WHERE  s.prod_id = p.prod_id`

    ` 17         AND    s.time_id = t.time_id`

    ` 18         ORDER  BY`

    ` 19                s.time_id`

    ` 20        )`

    ` 21  GROUP  BY`

    ` 22         calendar_year`

    ` 23  ,      prod_name`

    ` 24  ;`


    `272 rows selected.`


    **`Elapsed: 00:00:02.14`**


    `Statistics`

    `----------------------------------------------------------`

    `       1461  recursive calls`

    `          0  db block gets`

    **`       4662  consistent gets`**

    `          8  physical reads`

    `          0  redo size`

    `      16688  bytes sent via SQL*Net to client`

    `        437  bytes received via SQL*Net from client`

    `          2  SQL*Net roundtrips to/from client`

    `          2  sorts (memory)`

    `          0  sorts (disk)`

    `        272  rows processed`


    `SQL> exec counter.show(''Function calls: ordered inputs'');`


    **`Function calls: ordered inputs: 1460`**


    By ordering the inputs to the scalar subquery cache, I’ve reduced the PL/SQL function
    calls further to just 1,460 (and therefore reduced the logical I/O by an order
    of magnitude and trimmed the overall elapsed time by a small margin). This demonstrates
    that ordering (or clustering) of calls into the subquery cache can make a difference
    to its efficiency. In my case, the savings I made through the further reduction
    in PL/SQL function calls “paid for” the cost of pre-sorting the SALES data.'
  trans: "\n这项技术可以应用于那些必须尽可能减少`PL/SQL`函数调用的特定场景。例如，通过对之前带有`GET_RATE`函数的销售报告采用此技术，我成功地将\
    \ 918,000 次函数执行减少到仅 36,000 次，从而使总体响应时间从 66 秒大幅缩短至 4 秒。\n\n然而，一种更策略性的减少函数调用的方法是利用缓存方案，我将在下文进行描述。\n\
    \n## 通过缓存减少函数调用\n\n根据您使用的 Oracle 数据库版本，有几种缓存数据的选项。我将简要描述两种您可能希望研究并/或应用到您应用程序中的、用于减少函数调用的缓存技术。它们是：\n\
    \n*   标量子查询缓存\n*   跨会话`PL/SQL`函数结果缓存\n\n### 标量子查询缓存\n\n此缓存功能是一项旨在减少嵌入在标量子查询中的`SQL`语句或`PL/SQL`函数执行次数的内部优化。尽管无法可靠预测此内部缓存的效率，但它可以在一定程度上用于减少`PL/SQL`函数调用。在清单\
    \ 9-37 中，我将包含`GET_RATES`查找函数的销售报告进行了转换，以利用标量子查询缓存。\n\n**清单 9-37.** 使用标量子查询缓存减少`PL/SQL`函数调用\n\
    \n```sql\nSQL> SELECT t.calendar_year\n  2  ,      p.prod_name\n  3  ,      SUM(s.amount_sold)\
    \                                             AS amt_sold_usd\n  4  ,      SUM(s.amount_sold\
    \ * (SELECT get_rate(s.time_id, 'USD', 'GBP')\n  5                           \
    \     FROM   dual))                           AS amt_sold_gbp\n  6  FROM   sales\
    \     s\n  7  ,      products  p\n  8  ,      times     t\n  9  WHERE  s.prod_id\
    \ = p.prod_id\n 10  AND    s.time_id = t.time_id\n 11  GROUP  BY\n 12        \
    \ t.calendar_year\n 13  ,      p.prod_name\n 14  ;\n\n272 rows selected.\n\nElapsed:\
    \ 00:00:02.54\n\nStatistics\n----------------------------------------------------------\n\
    \      19451  recursive calls\n          0  db block gets\n      40634  consistent\
    \ gets\n          0  physical reads\n          0  redo size\n      16688  bytes\
    \ sent via SQL*Net to client\n        437  bytes received via SQL*Net from client\n\
    \          2  SQL*Net roundtrips to/from client\n          0  sorts (memory)\n\
    \          0  sorts (disk)\n        272  rows processed\n\nSQL> exec counter.show('Function\
    \ calls');\n\nFunction calls: 19450\n```\n\n通过将对`GET_RATE`的调用封装在标量子查询中，我成功地将查询的耗时从\
    \ 66 秒减少到不到 3 秒。计数器显示`PL/SQL`函数调用次数已降至仅 19,450 次（从超过 918,000 次），从而在时间和逻辑 I/O 上实现了巨大的节省（缓存阻止了超过\
    \ 180 万次的一致性读取）。\n\n如前所述，缓存的效率取决于多种因素，包括输入数据的顺序。考虑到这一点，我知道我的`SALES`数据中`GET_RATE`函数的输入值范围相当小，因此在清单\
    \ 9-38 中，我尝试通过排序输入到标量子查询的数据来进一步减少函数调用。\n\n**清单 9-38.** 使用标量子查询缓存减少`PL/SQL`函数调用（排序数据的效果）\n\
    \n```sql\nSQL> SELECT /*+ NO_MERGE(@inner) */\n  2         calendar_year\n  3\
    \  ,      prod_name\n  4  ,      SUM(amount_sold)                            \
    \                  AS amt_sold_usd\n  5  ,      SUM(amount_sold * (SELECT get_rate(time_id,\
    \ 'USD', 'GBP')\n  6                              FROM   dual))              \
    \              AS amt_sold_gbp\n  7  FROM  (\n  8         SELECT /*+ QB_NAME(inner)\
    \ NO_ELIMINATE_OBY */\n  9                t.calendar_year\n 10         ,     \
    \ s.time_id\n 11         ,      p.prod_name\n 12         ,      s.amount_sold\n\
    \ 13         FROM   sales     s\n 14         ,      products  p\n 15         ,\
    \      times     t\n 16         WHERE  s.prod_id = p.prod_id\n 17         AND\
    \    s.time_id = t.time_id\n 18         ORDER  BY\n 19                s.time_id\n\
    \ 20        )\n 21  GROUP  BY\n 22         calendar_year\n 23  ,      prod_name\n\
    \ 24  ;\n\n272 rows selected.\n\nElapsed: 00:00:02.14\n\nStatistics\n----------------------------------------------------------\n\
    \       1461  recursive calls\n          0  db block gets\n       4662  consistent\
    \ gets\n          8  physical reads\n          0  redo size\n      16688  bytes\
    \ sent via SQL*Net to client\n        437  bytes received via SQL*Net from client\n\
    \          2  SQL*Net roundtrips to/from client\n          2  sorts (memory)\n\
    \          0  sorts (disk)\n        272  rows processed\n\nSQL> exec counter.show('Function\
    \ calls: ordered inputs');\n\nFunction calls: ordered inputs: 1460\n```\n\n通过排序输入到标量子查询缓存的数据，我将`PL/SQL`函数调用次数进一步减少到仅\
    \ 1,460 次（从而将逻辑 I/O 降低了一个数量级，并略微缩短了总体耗时）。这表明，对输入到子查询缓存的调用进行排序（或聚类）可以影响其效率。在我的案例中，通过进一步减少`PL/SQL`函数调用所实现的节省，“抵消”了预排序`SALES`数据的成本。\n"
- fmt: "# Cross-Session PL/SQL Function Result Cache\n\nThe cross-session PL/SQL function\
    \ Result Cache was introduced in Oracle Database 11*g*. The principle behind result\
    \ caching is simple. First, a PL/SQL function is flagged for caching (using the\
    \ `RESULT_CACHE` directive). Thereafter, each time the function is invoked with\
    \ new parameters, Oracle Database executes the function, adds the return value(s)\
    \ to the Result Cache, and returns the result(s) to the calling context. If a\
    \ call is repeated, Oracle Database retrieves the results from the cache rather\
    \ than re-execute the function. Under certain circumstances, this caching behavior\
    \ can result in significant performance gains. It also has the benefit of requiring\
    \ very little re-factoring (just a small function change, in fact).\n\nI’ll demonstrate\
    \ the effect of the Result Cache on the `GET_RATE` function. First, I need to\
    \ re-compile the function with the cache directive, as shown in [Listing 9-39](#Chapter09.html#list_9_39).\n\
    \n**Listing 9-39. Preparing a Function for the PL/SQL Function Result Cache**\n\
    \n```sql\nSQL> CREATE OR REPLACE FUNCTION get_rate(\n  2                     p_rate_date\
    \ IN rates.rate_date%TYPE,\n  3                     p_from_ccy  IN rates.base_ccy%TYPE,\n\
    \  4                     p_to_ccy    IN rates.target_ccy%TYPE\n  5           \
    \          ) RETURN rates.exchange_rate%TYPE\n6 RESULT_CACHE RELIES_ON (rates)\
    \ AS\n  7     v_rate rates.exchange_rate%TYPE;\n  8  BEGIN\n     <...snip...>\n\
    \ 15  END get_rate;\n 16  /\n\nFunction created.\n```\n\nI’ve added two pieces\
    \ of syntax specific to the Result Cache, as highlighted above. The `RESULT_CACHE`\
    \ keyword is self-explanatory and tells Oracle Database to enable this function\
    \ for the Result Cache. The `RELIES_ON (rates)` syntax is required only in Oracle\
    \ Database 11*g* Release 1 and declares the fact that the function is dependent\
    \ on the data in the `RATES` table (Oracle Database 11*g* Release 2 automatically\
    \ recognizes such dependencies). Therefore, any transaction against `RATES` will\
    \ cause Oracle Database to invalidate the cached results and suspend caching this\
    \ function until the transaction is complete (at which point the cache will commence\
    \ a new refresh cycle).\n\nNow that I have cache-enabled this function, I can\
    \ re-execute my original sales query, as demonstrated in [Listing 9-40](#Chapter09.html#list_9_40).\n\
    \n**Listing 9-40. Query Performance with a Result-Cached PL/SQL Function**\n\n\
    ```sql\nSQL> SELECT t.calendar_year\n  2  ,      p.prod_name\n  3  ,      SUM(s.amount_sold)\
    \                     AS amt_sold_usd\n  4  ,      SUM(s.amount_sold *\n  5  \
    \            get_rate(s.time_id, 'USD', 'GBP')) AS amt_sold_gbp\n  6  FROM   sales\
    \     s\n  7  ,      products  p\n  8  ,      times     t\n  9  WHERE  s.prod_id\
    \ = p.prod_id\n 10  AND    s.time_id = t.time_id\n 11  GROUP  BY\n         t.calendar_year\n\
    \ 12  ,      p.prod_name\n 13  ;\n\n272 rows selected.\n\nElapsed: 00:00:08.74\n\
    \nStatistics\n----------------------------------------------------------\n   \
    \    1481  recursive calls\n          0  db block gets\n       4683  consistent\
    \ gets\n          0  physical reads\n          0  redo size\n      16688  bytes\
    \ sent via SQL*Net to client\n        437  bytes received via SQL*Net from client\n\
    \          2  SQL*Net roundtrips to/from client\n          0  sorts (memory)\n\
    \          0  sorts (disk)\n        272  rows processed\n```\n\nBy caching the\
    \ function results, the elapsed time of this query has dropped by 57 seconds.\
    \ This isn’t quite as quick as the SQL-only implementation (that completed in\
    \ 1 second) or the scalar subquery version (that completed in 2 seconds), but\
    \ you might consider this to be an acceptable performance gain, given that no\
    \ SQL needed to be re-written to achieve it and its behavior is predictable.\n\
    \nAnother issue with the original query was the I/O generated by the encapsulated\
    \ `RATES` lookup. With the Result Cache, the logical I/O has reduced to a more\
    \ acceptable level.\n\nTo quantify the reduction in function executions, I traced\
    \ the query with the PL/SQL Hierarchical Profiler. The profile report is provided\
    \ in [Listing 9-41](#Chapter09.html#list_9_41).\n\n**Listing 9-41. PL/SQL Hierarchical\
    \ Profiler Session Report for a Query with a Result-Cached PL/SQL Function**\n\
    \n```sql\nFUNCTION                                      LINE#      CALLS SUB_ELA_US\
    \ FUNC_ELA_US\n------------------------------------ ---------- ---------- ----------\
    \ -----------\n__plsql_vm                                        0     918846\
    \    3777356     3651587\nGET_RATE                                          1\
    \       1460     125433       25731\nGET_RATE.__static_sql_exec_line9        \
    \          9       1460      99702       99702\n__anonymous_block            \
    \                     0          3        336         276\nDBMS_OUTPUT.GET_LINES\
    \                           180          2         60          57\nDBMS_OUTPUT.GET_LINE\
    \                            129          2          3           3\nDBMS_HPROF.STOP_PROFILING\
    \                        59          1          0           0\n```\n\nYou can\
    \ see that the cache-enabled `GET_RATES` function was executed just 1,460 times\
    \ (the same result as the best scalar subquery cache example). Interestingly,\
    \ context-switching into the PL/SQL VM is *not* reduced by using the Result Cache,\
    \ so Oracle Database therefore passed control to the PL/SQL engine once for each\
    \ of the 918,000 rows the query needed to process. For this reason, it rarely\
    \ pays to convert a PL/SQL-only function (i.e. one without any embedded SQL) to\
    \ use the Result Cache. First, there is no reduction in context-switching and\
    \ second, you’ll possibly find that diverting a function call to the Result Cache\
    \ and acquiring the `RC` latch that protects it will take longer than an execution\
    \ of the function itself.\n\nTo wrap up, Oracle Database also provides several\
    \ performance views for the Result Cache. For example, the `V$RESULT_CACHE_STATISTICS`\
    \ view can provide a useful overview of the cache’s efficiency. [Listing 9-40](#Chapter09.html#list_9_40)\
    \ ran with an empty cache, so the statistics in [Listing 9-42](#Chapter09.html#list_9_42)\
    \ are entirely attributed to this query.\n\n**Listing 9-42. Investigating Result\
    \ Cache Hits with V$RESULT_CACHE_STATISTICS**\n\n```sql\nSQL> SELECT name, value\n\
    \  2  FROM   v$result_cache_statistics\n  3  WHERE  name IN ('Find Count','Create\
    \ Count Success');\n\nNAME                    VALUE\n----------------------- ----------\n\
    Create Count Success    1460\nFind Count              917383\n```\n\nThese statistics\
    \ demonstrate a very efficient cache. The `GET_RATE` function was executed just\
    \ 1,460 times to load the cache (as demonstrated by the `Create Count Success`\
    \ statistic, which also corresponds to the `GET_RATE` statistics in the Hierarchical\
    \ Profiler report in [Listing 9-41](#Chapter09.html#list_9_41)). Once cached,\
    \ the results were heavily reused (the `Find Count` statistic shows that the cached\
    \ results were used over 917,000 times). If I were to repeat the sales query at\
    \ this point, the PL/SQL function would not be executed at all (assuming the cached\
    \ results were not invalidated) and the response time would be further reduced,\
    \ albeit by a small margin.\n\n**Note** If you’re not running Oracle Database\
    \ 11*g*, you can simulate the Result Cache (to a degree) by creating your own\
    \ session-based PL/SQL cache with associative arrays. While this will not reduce\
    \ function executions in the same way, it will dramatically reduce the impact\
    \ of the SQL lookups embedded inside the function. See the *“Tuning PL/SQL”* section\
    \ at the end of this chapter for an example that converts the `GET_RATE` function\
    \ from the result-cached version to a user-defined array-cached implementation.\
    \ However, make sure that you consider the potential shortcomings of such an approach,\
    \ as described in that section."
