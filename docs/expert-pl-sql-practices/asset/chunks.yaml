    \ `EXECUTE` 权限。此外，对于 `DBMS_PROFILER`，它需要对要剖析的任何程序单元拥有 `CREATE` 访问权限。最后，`DBMS_TRACE`\
    \ 要求程序单元必须使用 `DEBUG=TRUE` 编译。\n\n你需要对你连接的用户账户授予 `SELECT` 权限，以便查询 `DBMS_TRACE`\
    \ 表。如果你连接的数据库用户是 `DBMS_PROFILER` 表的所有者，则不需要额外的授权。如果一个通用的剖析器用户拥有这些表，则该模式需要向你的模式授予\
    \ `SELECT` 权限。\n\n配置就到此为止。完成这些设置步骤后，你就可以开始收集一些信息了。"
- fmt: "# DBMS_PROFILER and DBMS_TRACE Example Session\n\nThis section provides an\
    \ example profiling and tracing session using both `DBMS_PROFILER` and `DBMS_TRACE`.\
    \ All of the resultant trace and profiling information displayed in this section\
    \ was generated using the code presented here:\n\n```sql\nDECLARE\n  v_employee_id\
    \ employees.employee_id%TYPE;\nBEGIN\n  -- Start the profiling session\n  dbms_profiler.start_profiler;\n\
    \  dbms_trace.set_plsql_trace(\n                   DBMS_TRACE.trace_enabled_calls\n\
    \                   +\n                   DBMS_TRACE.trace_enabled_exceptions\n\
    \                   +\n                   DBMS_TRACE.trace_all_sql\n         \
    \          +\n                   DBMS_TRACE.trace_all_lines);\n\n  -- call the\
    \ top level procedure to be profiled\n  v_employee_id := employee_api.create_employee(\n\
    \        p_first_name => 'Lewis',\n        p_last_name => 'Cunningham',\n    \
    \    p_email => 'lewisc@yahoo.com',\n        p_phone_number => '888-555-1212',\n\
    \        p_job_title => 'Programmer',\n        p_department_name => 'IT',\n  \
    \      p_salary => 99999.99,\n        p_commission_pct => 0 );\n  -- Stop the\
    \ profiling session\n  dbms_trace.clear_plsql_trace;\n  dbms_profiler.stop_profiler;\n\
    \nEND;\n```\n\n`DBMS_PROFILER.start_profiler` begins the profiling session and\
    \ `DBMS_TRACE.set_plsql_trace` starts the event tracing. Both procedures take\
    \ optional parameters as input. The `DBMS_TRACE` parameter `TRACE_LEVEL` identifies\
    \ how much information to gather. In this case, I wanted a record created for\
    \ all enabled calls (calls to program units compiled with `DEBUG`), all enabled\
    \ exceptions, all SQL calls, and for all lines. This is really overkill for the\
    \ most part. The output is shown next.\n\n## DBMS_PROFILER and DBMS_TRACE Output\n\
    \nWhen run, `DBMS_TRACE` compiles data into two tables. These tables are as follows:\n\
    \n*   `PLSQL_TRACE_RUNS` – `DBMS_TRACE`: The top-level table that identifies each\
    \ individual run.\n*   `PLSQL_TRACE_EVENTS` – `DBMS_TRACE`: A very useful table\
    \ that can log every line executed in a trace session, can quickly get very large\
    \ very, and requires monitoring.\n\nWhen run, `DBMS_TRACE` compiles data into\
    \ the following tables:\n\n*   `PLSQL_PROFILER_RUNS` – `DBMS_PROFILER`: The top-level\
    \ table that identifies each individual profiler session.\n*   `PLSQL_PROFILER_UNITS`\
    \ – `DBMS_PROFILER`: Describes the program units executed during a profiling session.\n\
    *   `PLSQL_PROFILER_DATA` – `DBMS_PROFILER`: Timing and execution statistics for\
    \ each unit run during a session.\n\nYou can identify a `DBMS_PROFILER` run by\
    \ the `RUN_DATE` and `RUN_COMMENT` (optional; defaults to the `SYSDATE` of the\
    \ run initiation). The following query shows the data stored in the `PLSQL_PROFILER_RUNS`\
    \ table after two profiler sessions:\n\n```sql\nselect runid, run_date, run_comment,\
    \ run_total_time\nfrom plsql_profiler_runs;\n```\n\n```\nRUNID     RUN_DATE  \
    \             RUN_COMMENT      RUN_TOTAL_TIME\n---------- ---------------------\
    \ ---------------- ----------------------\n2          13-MAR-2011 11:56:54  13-MAR-11\
    \        133000000\n3          13-MAR-2011 12:30:18  13-MAR-11        80000000\n\
    ```\n\nFrom this output, you can identify the run you are looking for. When analyzing\
    \ for performance, you will often average over many runs of the same program code.\
    \ For the needs of this example, I will use a distinct program run.\n\nIdentifying\
    \ a trace sessions is much the same as identifying a profiler session. The session\
    \ is identified by a `RUNID` and a `RUN_DATE`. The following query shows the data\
    \ stored in the `PLSQL_TRACE_RUNS` table after a tracing session:\n\n```sql\n\
    SELECT runid, run_date\nFROM plsql_trace_runs;\n```\n\n```\nRUNID            \
    \      RUN_DATE\n---------------------- -------------------------\n10        \
    \             26-MAR-2011 11:04:35\n```\n\n`DBMS_PROFILER` provides timing information\
    \ about the executable lines in a run. You gather the information and then analyze\
    \ that information to determine if there is a bottleneck in the code. Code that\
    \ runs for a long time may be okay; then again, it may not. That determination\
    \ comes from your analysis. The profiler can't tell you where you have a performance\
    \ problem. The profiler can only give you a performance profile for your analysis.\
    \ Once you have analyzed the output and made any changes, you would then run another\
    \ profiling session to validate your changes.\n\nThe following query lists the\
    \ timing gathered by the profiler line by line. I have removed many lines of output\
    \ to keep the size down. I'm ignoring the `ANONYMOUS BLOCK` entries as they are\
    \ noise from the run itself.\n\n```sql\nSELECT unit_name, unit_type, line#, total_occur,\
    \ ppd.total_time, max_time\n  FROM plsql_profiler_units ppu\n  JOIN plsql_profiler_data\
    \ ppd\n    ON (ppu.runid = ppd.runid\n       AND\n       ppu.unit_number = ppd.unit_number)\n\
    WHERE ppu.runid = :RUNID\n  AND unit_type != 'ANONYMOUS BLOCK'  ;\n```\n\n```\n\
    UNIT_NAME           UNIT_TYPE      LINE#    TOTAL_OCCUR   TOTAL_TIME    MAX_TIME\n\
    ------------------- -------------- -------- ------------- ------------- -------------\n\
    EMPLOYEE_API        PACKAGE BODY   3        1             11982         9985\n\
    EMPLOYEE_API        PACKAGE BODY   20       1             1997          1997\n\
    EMPLOYEE_API        PACKAGE BODY   21       1             2995          2995\n\
    DEPARTMENTS_API     PACKAGE BODY   3        1             7988          6989\n\
    DEPARTMENTS_API     PACKAGE BODY   8        1             0             0\nJOBS_API\
    \            PACKAGE BODY   3        1             7988          6989\nJOBS_API\
    \            PACKAGE BODY   7        1             0             0\n.\n.\n.\n\
    80 rows selected\n```"
  raw: '##### DBMS_PROFILER and DBMS_TRACE Example Session


    This section provides an example profiling and tracing session using both DBMS_PROFILER
    and DBMS_TRACE. All of the resultant trace and profiling information displayed
    in this section was generated using the code presented here:


    `DECLARE`

    `  v_employee_id employees.employee_id%TYPE;`

    `BEGIN`

    `  -- Start the profiling session`

    `  dbms_profiler.start_profiler;`

    `  dbms_trace.set_plsql_trace(`

    `                   DBMS_TRACE.trace_enabled_calls`

    `                   +`

    `                   DBMS_TRACE.trace_enabled_exceptions`

    `                   +`

    `                   DBMS_TRACE.trace_all_sql`

    `                   +`

    `                   DBMS_TRACE.trace_all_lines);`


    `  -- call the top level procedure to be profiled`

    `  v_employee_id := employee_api.create_employee(`

    `        p_first_name => ''Lewis'',`

    `        p_last_name => ''Cunningham'',`

    `        p_email => ''lewisc@yahoo.com'',`

    `        p_phone_number => ''888-555-1212'',`

    `        p_job_title => ''Programmer'',`

    `        p_department_name => ''IT'',`

    `        p_salary => 99999.99,`

    `        p_commission_pct => 0 );`

    `  -- Stop the profiling session`

    `  dbms_trace.clear_plsql_trace;`

    `  dbms_profiler.stop_profiler;`


    `END;`


    DBMS_PROFILER.start_profiler begins the profiling session and DBMS_TRACE.set_plsql_trace
    starts the event tracing. Both procedures take optional parameters as input. The
    DBMS_TRACE parameter TRACE_LEVEL identifies how much information to gather. In
    this case, I wanted a record created for all enabled calls (calls to program units
    compiled with DEBUG), all enabled exceptions, all SQL calls, and for all lines.
    This is really overkill for the most part. The output is shown next.


    ##### DBMS_PROFILER and DBMS_TRACE Output


    When run, DBMS_TRACE compiles data into two tables. These tables are as follows:


    *   PLSQL_TRACE_RUNS – DBMS_TRACE: The top-level table that identifies each individual
    run.

    *   PLSQL_TRACE_EVENTS – DBMS_TRACE: A very useful table that can log every line
    executed in a trace session, can quickly get very large very, and requires monitoring.


    When run, DBMS_TRACE compiles data into the following tables:


    *   PLSQL_PROFILER_RUNS – DBMS_PROFILER: The top-level table that identifies each
    individual profiler session.

    *   PLSQL_PROFILER_UNITS – DBMS_PROFILER: Describes the program units executed
    during a profiling session.

    *   PLSQL_PROFILER_DATA – DBMS_PROFILER: Timing and execution statistics for each
    unit run during a session.


    You can identify a DBMS_PROFILER run by the RUN_DATE and RUN_COMMENT (optional;
    defaults to the SYSDATE of the run initiation). The following query shows the
    data stored in the PLSQL_PROFILER_RUNS table after two profiler sessions:


    `select runid, run_date, run_comment, run_total_time`

    `from plsql_profiler_runs;`


    `RUNID     RUN_DATE               RUN_COMMENT      RUN_TOTAL_TIME`

    `---------- --------------------- ---------------- ----------------------`

    `2          13-MAR-2011 11:56:54  13-MAR-11        133000000`

    `3          13-MAR-2011 12:30:18  13-MAR-11        80000000`


    From this output, you can identify the run you are looking for. When analyzing
    for performance, you will often average over many runs of the same program code.
    For the needs of this example, I will use a distinct program run.


    Identifying a trace sessions is much the same as identifying a profiler session.
    The session is identified by a RUNID and a RUN_DATE. The following query shows
    the data stored in the PLSQL_TRACE_RUNS table after a tracing session:


    `SELECT runid, run_date`

    `FROM plsql_trace_runs;`


    `RUNID                  RUN_DATE`

    `---------------------- -------------------------`

    `10                     26-MAR-2011 11:04:35`


    DBMS_PROFILER provides timing information about the executable lines in a run.
    You gather the information and then analyze that information to determine if there
    is a bottleneck in the code. Code that runs for a long time may be okay; then
    again, it may not. That determination comes from your analysis. The profiler can''t
    tell you where you have a performance problem. The profiler can only give you
    a performance profile for your analysis. Once you have analyzed the output and
    made any changes, you would then run another profiling session to validate your
    changes.


    The following query lists the timing gathered by the profiler line by line. I
    have removed many lines of output to keep the size down. I''m ignoring the ANONYMOUS
    BLOCK entries as they are noise from the run itself.


    `SELECT unit_name, unit_type, line#, total_occur, ppd.total_time, max_time`

    `  FROM plsql_profiler_units ppu`

    `  JOIN plsql_profiler_data ppd`

    `    ON (ppu.runid = ppd.runid`

    `       AND`

    `       ppu.unit_number = ppd.unit_number)`

    `WHERE ppu.runid = :RUNID`

    `  AND unit_type != ''ANONYMOUS BLOCK''  ;`


    `UNIT_NAME           UNIT_TYPE      LINE#    TOTAL_OCCUR   TOTAL_TIME    MAX_TIME`

    `------------------- -------------- -------- ------------- ------------- -------------`

    `EMPLOYEE_API        PACKAGE BODY   3        1             11982         9985`

    `EMPLOYEE_API        PACKAGE BODY   20       1             1997          1997`

    `EMPLOYEE_API        PACKAGE BODY   21       1             2995          2995`

    `DEPARTMENTS_API     PACKAGE BODY   3        1             7988          6989`

    `DEPARTMENTS_API     PACKAGE BODY   8        1             0             0`

    `JOBS_API            PACKAGE BODY   3        1             7988          6989`

    `JOBS_API            PACKAGE BODY   7        1             0             0`

