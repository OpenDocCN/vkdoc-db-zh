    *   `$$PLSQL_OPTIMIZE_LEVEL` holds the PLSQL_OPTIMIZE_LEVEL parameter value.

    *   `$$PLSQL_LINE` holds the line number where the $$PLSQL_LINE variable is located.

    *   `$$PLSCOPE_SETTING` holds the current value of the session PLSCOPE_SETTINGS
    parameter.

    *   `$$PLSQL_CODE_TYPE` holds the current value of the parameter `plsql_code_type`.
    Either NATIVE or INTERPRETED.

    *   `$$NLS_LENGTH_SEMANTICS` holds the NLS lengths semantics is BYTE or CHAR.


    As a “normal” user, you''re not able to execute the command `show parameter <parameter>`
    to show the value of the parameters such as plsql_ccflags or plsql_warnings. Therefore,
    these enquiry variables may come in handy. Create a script with an anonymous PL/SQL
    block and execute the script to show the value of inquiry variables in the current
    session, like so:


    `set serveroutput on`

    `BEGIN`

    `  dbms_output.put_line(''PLSQL Unit     : '' ||$$PLSQL_UNIT);`

    `  dbms_output.put_line(''PLSQL CCFLAGS  : '' ||$$PLSQL_CCFLAGS);`

    `  dbms_output.put_line(''PLSQL Warnings : '' ||$$PLSQL_Warnings);`

    `  dbms_output.put_line(''Optimize Level : '' ||$$PLSQL_OPTIMIZE_LEVEL);`

    `  dbms_output.put_line(''Line: '' ||$$PLSQL_LINE);`

    `  dbms_output.put_line(''PLSCOPE setting: '' ||$$PLSCOPE_SETTING);`

    `  dbms_output.put_line(''PLSQL code type: '' ||$$PLSQL_CODE_TYPE);`

    `  dbms_output.put_line(''NLS length semantics: '' ||$$NLS_LENGTH_SEMANTICS);`

    ` END;`

    `/`


    Execute the script to see the value of the inquiry variables.


    `SQL@V112> @plsql_inqvar.sql`

    `PLSQL Unit    :`

    `PLSQL CCFLAGS : TIMING_ON:TRUE`

    `PLSQL Warnings : DISABLE:INFORMATIONAL,ENABLE:PERFORMANCE,ENABLE:SEVERE,ERROR:  7204`

    `Optimize Level: 2`

    `Line          : 6`

    `PLSCOPE setting:`

    `PLSQL code type: INTERPRETED`

    `NLS length semantics: BYTE`


    `PL/SQL procedure successfully completed.`


    With this small script you are able to see the current value of the inquiry variables.
    The `$$PLSQL_UNIT` inquiry variable is empty, as its value is being queried from
    an anonymous block.


    ![images](images/square.jpg) **Note** The PL/SQL inquiry variables are evaluated
    and translated at compilation time, so having this in a stored procedure would
    require a recompilation of the procedure if any of the flags have changed, in
    order to show the correct value.


    You could issue the following command to show the current value of `$$PLSQL_CCFLAGS`:


    `SQL@V112> exec dbms_output.put_line($$PLSQL_CCFLAGS);`


    `TIMING_ON:TRUE`


    One common use of conditional compilation is to enable specific code, depending
    on the Oracle version; in other words, to define variables as either NUMBER or
    BINARY_FLOAT, like so:


    `...`

    `$IF DBMS_DB_VERSION.VERSION >=11 $THEN`

    `   VAR BINARY_FLOAT;`

    `$ELSE`

    `  VAR NUMBER;`

    `$END;`

    `...`


    In the Package specification of DBMS_DB_VERSION, there are a number of Boolean
    “version” constants that can be used to include or exclude code.


    `…`

    `$IF DBMS_DB_VERSION.VER_LE_11_2 $THEN`

    `  …`

    `$ELSE`

    `  …`

    `$END`

    `…`


    Putting it a bit to the extreme you can make parameters to stored procedures conditional
    as shown in the example here.


    `SQL@V112> CREATE PROCEDURE EXTREME (P_PARAM VARCHAR2 $IF $$INQ_FLAG $THEN, P_PARAM2
    VARCHAR2 $END) IS`

    `   2   BEGIN`

    `   3     NULL;`

    `   4   END;`

    `   5   /`


    So depending on the `$INQ_FLAG` you would have either one or two parameters -
    it can be done, but not advisable.


    ### Summary


    In this chapter, you learned what you may gain from enabling warnings. You looked
    into how to enable warnings at the session, system, or procedure level. You have
    explored how to either promote warnings to become errors or how to ignore them
    by disabling them. You saw that PL/SQL warnings would certainly help you to make
    your code perform better and make it more robust. It will, though, give you an
    extra administrative task, especially if you have too many exceptions for which
    warnings should be enabled, disabled, or promoted to be errors.


    ![images](images/square.jpg) **Note** You will not necessarily have to enable
    PL/SQL warnings on your production system if your code is checked in the development
    environment.


    In looking at conditional compilation, you saw that using conditional compilation
    can limit the size of memory used by PL/SQL by only enabling logging or debugging
    information when required. You also saw that by using conditional compilation
    and setting a flag and performing a recompile, you were able to enable or disable
    code without having to edit the code. Conditional compilation is widely used in
    languages such as C++. Now you can have it as part of your PL/SQL toolbox, too.


    ## C H A P T E R  5


    ## PL/SQL Unit Testing


    **by Sue Harper**


    Any developer accessing the Oracle Database uses SQL whether running SQL reports
    and queries developed personally or provided by another developer. While it may
    not be true to say that every developer runs and uses PL/SQL when working with
    the Oracle Database, the number is no doubt very high as any procedural access
    to the Oracle Database is best done using PL/SQL. As a developer, if you create
    and work with PL/SQL, you should be debugging and testing the PL/SQL to ensure
    accurate and efficient code.


    In this chapter, you’ll look at PL/SQL unit testing: what is meant by unit testing,
    why it’s important in the development lifecycle, and how to build tests. There
    are a few tools and utilities available to help you build tests. It doesn’t matter
    which you use. What does matter is that you get into the habit of building and
    running tests against your code. I use Oracle SQL Developer to do any testing
    and so that is the tool I’ll use to illustrate an approach to building and running
    PL/SQL unit tests.


    ### Why Test Your Code?


    Software and application developers all write code; some write better code than
    others, but everyone tries to write code that does what it is meant to do and
    hopes it does that well. That is hardly a vote of confidence for writing good
    code! Not only is it essential your code is accurate and performs well, it is
    also important to know that it is robust and able to stand the test of time. This
    means that the code should perform in the same way, producing the same results
    over time regardless of changes made to the environment around it.


    How can you guarantee this? Perhaps you can’t because you can’t be 100 percent
    certain of all the changes that may happen in the future, but if you write regression
    tests that can be run whenever you want or need to, then you can determine whether
    a program unit performs as expected and continues to do so. The more tests you
    write, with more variations, the closer you get to ensuring that the program units
    are robust and still working as intended.


    It is crucial that not only do you know that your code is working today, but also
    that you can *prove* that it works—and that at any time in the future you can
    prove the same results. Depending on the requirements of the program unit, your
    code may have to support a range of scenarios or use cases, and you should be
    able to test a wide range of use cases. If you can show numerically that you have
    tested a broad spectrum of these use cases and rerun these test cases, you come
    closer to empirically proving that the code is robust. If you are able to rerun
    tests at any time and once again verify the results, you can quickly determine
    the points of failure and address them.


    Without regression tests, you can’t know if your code is working or when it stopped
    working. Even the best code may be unreliable, but you can’t prove it one way
    or the other.'
  trans: "\n#### 关于条件编译的最后说明\n\nOracle 提供了许多查询变量。除了 `$$PLSQL_UNIT` 查询变量外，`$$PLSQL_LINE`\
    \ 正逐渐成为我最喜欢的变量之一，因为它可以用于调试。\n\n*   `$$PLSQL_CCFLAGS` 保存当前的 `PLSQL_CCFLAGS` 设置。\n\
    *   `$$PLSQL_WARNINGS` 保存当前的 `plsql_warnings` 设置。\n*   `$$PLSQL_OPTIMIZE_LEVEL`\
    \ 保存 `PLSQL_OPTIMIZE_LEVEL` 参数值。\n*   `$$PLSQL_LINE` 保存 `$$PLSQL_LINE` 变量所在的行号。\n\
    *   `$$PLSCOPE_SETTING` 保存会话 `PLSCOPE_SETTINGS` 参数的当前值。\n*   `$$PLSQL_CODE_TYPE`\
    \ 保存参数 `plsql_code_type` 的当前值，值为 `NATIVE` 或 `INTERPRETED`。\n*   `$$NLS_LENGTH_SEMANTICS`\
    \ 保存 `NLS` 长度语义，值为 `BYTE` 或 `CHAR`。\n\n作为一名“普通”用户，你可能无法执行 `show parameter <parameter>`\
    \ 命令来显示诸如 `plsql_ccflags` 或 `plsql_warnings` 等参数的值。因此，这些查询变量可能会派上用场。创建一个包含匿名 PL/SQL\
    \ 块的脚本并执行它，即可显示当前会话中查询变量的值，如下所示：\n\n```sql\nset serveroutput on\nBEGIN\n  dbms_output.put_line('PLSQL\
    \ Unit      : ' ||$$PLSQL_UNIT);\n  dbms_output.put_line('PLSQL CCFLAGS   : '\
    \ ||$$PLSQL_CCFLAGS);\n  dbms_output.put_line('PLSQL Warnings  : ' ||$$PLSQL_Warnings);\n\
    \  dbms_output.put_line('Optimize Level  : ' ||$$PLSQL_OPTIMIZE_LEVEL);\n  dbms_output.put_line('Line:\
    \ ' ||$$PLSQL_LINE);\n  dbms_output.put_line('PLSCOPE setting: ' ||$$PLSCOPE_SETTING);\n\
    \  dbms_output.put_line('PLSQL code type: ' ||$$PLSQL_CODE_TYPE);\n  dbms_output.put_line('NLS\
    \ length semantics: ' ||$$NLS_LENGTH_SEMANTICS);\n END;\n/\n```\n\n执行该脚本以查看查询变量的值。\n\
    \n```sql\nSQL@V112> @plsql_inqvar.sql\nPLSQL Unit     :\nPLSQL CCFLAGS  : TIMING_ON:TRUE\n\
    PLSQL Warnings : DISABLE:INFORMATIONAL,ENABLE:PERFORMANCE,ENABLE:SEVERE,ERROR:\
    \  7204\nOptimize Level: 2\nLine           : 6\nPLSCOPE setting:\nPLSQL code type:\
    \ INTERPRETED\nNLS length semantics: BYTE\n\nPL/SQL procedure successfully completed.\n\
    ```\n\n通过这个小程序，你就可以看到查询变量的当前值。`$$PLSQL_UNIT` 查询变量为空，因为它的值是从一个匿名块中查询的。\n\n![images](img/square.jpg)\
    \ `注意` PL/SQL 查询变量在编译时被评估和转换，因此，如果任何标志发生了更改，将其放在存储过程中将需要重新编译该过程才能显示正确的值。\n\n你可以执行以下命令来显示\
    \ `$$PLSQL_CCFLAGS` 的当前值：\n\n```sql\nSQL@V112> exec dbms_output.put_line($$PLSQL_CCFLAGS);\n\
    \nTIMING_ON:TRUE\n```\n\n条件编译的一个常见用途是根据 Oracle 版本来启用特定代码；换句话说，将变量定义为 `NUMBER`\
    \ 或 `BINARY_FLOAT`，如下所示：\n\n```sql\n...\n$IF DBMS_DB_VERSION.VERSION >=11 $THEN\n\
    \   VAR BINARY_FLOAT;\n$ELSE\n  VAR NUMBER;\n$END;\n...\n```\n\n在 `DBMS_DB_VERSION`\
    \ 的包规范中，有许多布尔型“版本”常量，可用于包含或排除代码。\n\n```sql\n…\n$IF DBMS_DB_VERSION.VER_LE_11_2\
    \ $THEN\n  …\n$ELSE\n  …\n$END\n…\n```\n\n稍微极端一点，你可以让存储过程的参数成为条件化的，如下面的示例所示。\n\
    \n```sql\nSQL@V112> CREATE PROCEDURE EXTREME (P_PARAM VARCHAR2 $IF $$INQ_FLAG\
    \ $THEN, P_PARAM2 VARCHAR2 $END) IS\n   2   BEGIN\n   3     NULL;\n   4   END;\n\
    \   5   /\n```\n\n因此，根据 `$INQ_FLAG` 的值，过程将有一个或两个参数——这可以实现，但并不推荐。\n\n### 总结\n\n\
    在本章中，你了解了启用警告可能带来的好处。你研究了如何在会话、系统或过程级别启用警告。你探索了如何将警告升级为错误，或者如何通过禁用它们来忽略它们。你看到了\
    \ PL/SQL 警告确实能帮助你提升代码性能并使其更加健壮。不过，它也会给你带来额外的管理任务，特别是如果你有太多需要启用、禁用或升级为错误的警告例外情况。\n\
    \n![images](img/square.jpg) `注意` 如果你的代码已经在开发环境中检查过，你不一定非要在生产系统上启用 PL/SQL 警告。\n\
    \n在研究条件编译时，你看到使用条件编译可以通过仅在需要时启用日志或调试信息来限制 PL/SQL 使用的内存大小。你还看到，通过使用条件编译、设置标志并执行重新编译，你可以在不编辑代码的情况下启用或禁用代码。条件编译在诸如\
    \ C++ 等语言中被广泛使用。现在，你也可以将它纳入你的 PL/SQL 工具箱中。\n\n## PL/SQL 单元测试\n\n**作者：Sue Harper**\n\
    \n任何访问 Oracle 数据库的开发人员都会使用 SQL，无论是运行自己开发的 SQL 报表和查询，还是运行其他开发人员提供的。虽然未必可以说每个开发人员在使用\
    \ Oracle 数据库时都会运行和使用 PL/SQL，但这个比例无疑非常高，因为任何对 Oracle 数据库的过程化访问最好都使用 PL/SQL 来完成。作为一名开发人员，如果你创建并使用\
    \ PL/SQL，那么你应该调试和测试 PL/SQL，以确保代码的准确性和效率。\n\n在本章中，你将学习 PL/SQL 单元测试：单元测试的含义、它在开发生命周期中的重要性，以及如何构建测试。有几种工具和实用程序可以帮助你构建测试。使用哪一个并不重要，重要的是你要养成针对代码构建和运行测试的习惯。我使用\
    \ Oracle SQL Developer 进行任何测试，因此我将使用该工具来说明构建和运行 PL/SQL 单元测试的方法。\n\n### 为什么要测试你的代码？\n\
    \n软件和应用程序开发人员都会编写代码；有些人编写的代码比其他人更好，但每个人都试图编写出能实现预期功能的代码，并希望它能很好地做到这一点。这对于编写好代码来说，几乎算不上是充满信心的表态！不仅你的代码必须准确且性能良好，知道它稳健且能经得起时间的考验也很重要。这意味着代码应该以相同的方式执行，随着时间的推移产生相同的结果，而不受其周围环境变化的影响。\n\
    \n你如何保证这一点？也许你无法保证，因为你无法 100% 确定未来可能发生的所有变化，但如果你编写了可以在你想要或需要时随时运行的回归测试，那么你就可以确定一个程序单元是否按预期运行并持续如此。你编写的测试越多，变化越多，你就越能确保程序单元是稳健的，并且仍然按预期工作。\n\
    \n至关重要的是，你不仅要知道你的代码今天能正常工作，还要能够*证明*它有效果——并且在未来任何时间你都能证明同样的效果。根据程序单元的需求，你的代码可能必须支持一系列场景或用例，你应该能够测试广泛的用例。如果你能通过数据表明你已经测试了广泛的用例，并重新运行这些测试用例，你就更接近于经验证明代码的稳健性。如果你能够随时重新运行测试并再次验证结果，你就可以快速确定故障点并加以解决。\n\
    \n没有回归测试，你无法知道你的代码是否在工作，或者它何时停止了工作。即使是最好的代码也可能不可靠，但你无法证明它是好是坏。\n"
- fmt: '### What Is Unit Testing?


    Often used by the Java and Agile development communities, *unit testing* is a
    generic term for writing small repeatable tests where you are testing a “unit
    of work” or an area of responsibility. Writing unit tests is common in the Java
    development community where the developers write tests as they write their code.
    Many in the Java community use `JUnit`, a development framework for writing unit
    tests. Most serious Java developers will write unit tests alongside the code they’re
    developing. Some even write tests before they start to write the code. They know
    the input types the code is expecting and they know the expected outcomes or expected
    results, so they can build up the tests before they begin. The general thinking
    in the Java world is “write a little, test a little, write a little, test a little...”
    and it is wise advice.


    While `PL/SQL` developers have been developing `PL/SQL` program units for years,
    creating paper-based tests or using `SQL*Plus`, there are very few unit test frameworks
    available that support building up suites of tests to support and test the code.
    Some developers do build regression tests but without a framework, building unit
    tests costs time and it’s hard to justify the extra time to management, so most
    have not ventured into this territory. When presenting on this topic at conferences
    and training events, the norm is that one or two people in the audience are writing
    unit tests for their `PL/SQL` regression testing.


    As `PL/SQL` developers, you should see unit tests as part of the development cycle,
    part of the set of deliverables. Write your unit tests while writing the `PL/SQL`
    code and store the tests with the program units. You should be able to run and
    rerun tests at any point to verify the code still works as required and desired.


    #### Debugging or Testing?


    What’s the difference between debugging a piece of code and building a unit test
    for it? This is not an either/or situation: you do need to debug your code to
    make sure it is doing what it needs to do or to find out why it is not doing what
    you thought it should do. However, if you want to consider differences, then one
    difference is the repeatability. If you have written a `PL/SQL` program unit and
    want to verify that it’s doing what you want it to do, once it has compiled successfully,
    you can then instrument the code to verify the status at various points in the
    code, what the variable values are, which procedures call which procedure, and
    so on. You can pass in various sets of parameters and verify that the outcome
    is correct. However, if in a month’s time you want to verify the same, you have
    to run through the same process. Martin Fowler, author of many books on agile
    development, refactoring, and extreme programming sums it it perfectly:


    > Whenever you are tempted to type something into a print statement or a debugger
    expression, write it as a test instead.


    #### When Should You Build Tests?


    Consider the lifecycle of your `PL/SQL` code. You have a problem to solve and
    you know what the code needs to do. You either write the code using paper and
    pen, text editor, or graphical `SQL` development tool with a more sophisticated
    editor. Once you have written the `PL/SQL`, you compile it to verify that the
    syntax is correct. If the code compiles successfully, you can then execute it
    against the schema in the `Oracle Database`. It may be that the code works as
    required immediately and the outcome is successful. If not, you need to debug
    the code to determine where the problem arises. This edit/compile/run/edit/compile/debug/compile/run
    cycle can continue until you are satisfied with the program unit and you are ready
    to ship the code.


    Many advocates of unit testing say that you should write your tests before you
    start to write the code, and that you should see this as part of the complete
    process. The idea is that you already know what the outcome of your code should
    be and you know the results, so you can build the tests to suit the results, then
    you write the code to ensure the test passes! I think it is a combination of writing
    and planning and building tests, so I urge you see writing tests as part of the
    process, whether you start writing the code and then add a few tests and then
    fine tune the code and tests at the same time.


    ### Tools for Building Unit Tests


    There are a limited number of tools on the market for writing `PL/SQL` unit tests;
    as a result, many users have written their own testing mechanisms. I have listed
    three of the more popular options here; each have much to recommend them. If you
    are new to the world of testing, it is worth investing some time researching what
    is available.


    #### utPLSQL: Working with Command Line Code


    `utPLSQL` is possibly the earliest known unit test framework available for `PL/SQL`
    unit testing. Written by Steven Feuerstein, it has been available for some years.
    It is an open source `PL/SQL` testing framework for building unit tests. You install
    `utPLSQL` by running a script that installs all necessary tables, packages, procedures,
    and other objects required for the tests. You create and build all your tests
    in `SQL*Plus` or from the command line, so there is no tool or additional client
    required. `utPLSQL` is hosted on Sourceforge, [`http://utplsql.sourceforge.net`](http://utplsql.sourceforge.net),
    and has a wide variety of resources, documentation, and examples on how to install
    the software, build tests, and make good use of the framework.


    #### Quest Code Tester for Oracle


    Quest Code Tester for Oracle is a commercial product for defining and running
    tests. You can build tests for single programs or packages, and you can build
    individual tests or suites. The great advantage you gain by using a product like
    this is that you can build tests and then rerun them whenever needed, thus supporting
    the argument that you need to build up a full regression suite of tests for your
    project.


    The Code Tester differs from other products in that it allows you to describe
    the expected behavior of your `PL/SQL` program units and store that in a repository.
    The tool then generates test code based on these definitions. It provides a set
    of possible expected outcomes based on the code you provide, which you can accept
    and include or exclude. This code generation is a useful and powerful feature
    in the tool. As you start building up the tests, you can use the Quick Build option
    to add test cases to your tests.


    Code Tester is an independent product (not integrated into any editing environment),
    allowing you to build up and run tests independently of your development environment.
    The downside is that you need to take your code into a separate `PL/SQL` environment
    to debug it, if required. However, you can run the tests from Quest’s Toad for
    Oracle and switch from the product to the Code Tester to do further work.'
