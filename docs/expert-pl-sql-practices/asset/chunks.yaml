    timer to record the timings.


    ***Listing 9-25.** Validating Numeric Data (PL/SQL Function vs. SQL Built-in)*


    `SQL> SELECT *`

    `  2  FROM   external_table`

    `  3  WHERE  is_number(field_07) = 1;`


