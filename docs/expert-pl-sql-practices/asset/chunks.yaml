    Now two variables (`IND_N` and `IND_Y`) are defined and will hold the index values
    of the appropriate rows in SRC. In this way, rather than copying the source data
    into separate collections (one for status = NEW and one for status = UPD), a record
    of just the index entries is retained. Avoiding the need to copy is of particular
    importance if the source data is large.


    ` 13`

    ` 14    type t_target_indices is`

    ` 15       table of pls_integer`

    ` 16       index by pls_integer;`

    ` 17`

    ` 18    ind_new  t_target_indices;`

    ` 19    ind_upd  t_target_indices;`

    ` 20`

    ` 21  begin`


    Now the source data is seeded with some fictitious values (80 rows of status =
    UPD, and 20 rows of status = NEW). In a real world example, the data would probably
    be initialized elsewhere and passed into the application for processing.


    ` 22    for i in 1 .. 100 loop`

    ` 23       src(i).item   := i;`

    ` 24       src(i).descr  := ''Item ''||i;`

    ` 25       src(i).status :=  case when mod(i,5) = 0 then ''NEW'' else ''UPD''
    end;`

    ` 26    end loop;`

    ` 27`


    Now the data is scanned and the indices arrays are populated with the indices
    that correspond to the two different status values.


    ` 28`

    ` 29    for i in 1 .. 100 loop`

    ` 30       if src(i).status = ''NEW'' then`

    ` 31          ind_new(ind_new.count) := i;`

    ` 32       else`

    ` 33          ind_upd(ind_upd.count) := i;`

    ` 34       end if;`

    ` 35    end loop;`


    And finally, the VALUES OF syntax is used to transfer the changes into the HARDWARE
    table. Even though the rows relevant to each table are sparsely distributed throughout
    the ‘src’ collection, the `VALUES OF` syntax gives direct access to them for bulk
    binding.


    ` 36`

    `37    forall i in` ***`values of ind_new`***

    ` 38       insert into hardware ( aisle, item)`

    ` 39       values (1, src(i).item);`

    ` 40    dbms_output.put_line(sql%rowcount||'' rows inserted'');`

    ` 41`

    `42    forall i in` ***`values of ind_upd`***

    ` 43       update hardware`

    ` 44       set descr = src(i).descr`

    ` 45       where aisle = 1`

    ` 46       and item = src(i).item;`

    ` 47    dbms_output.put_line(sql%rowcount||'' rows updated'');`

    ` 48`

    ` 49  end;`

    ` 50  /`

    `20 rows inserted`

    `80 rows updated`


    The `VALUES OF` and `INDICES OF` syntax completes the bulk bind implementation.
    Any permutation of entries within an array can be manipulated and bound into a
    database table.


    ##### Earlier Versions of Oracle


    If you own Oracle 10.1 or below, then your version of Oracle does not yet support
    the `VALUES OF` or `INDICES OF` extensions, but all is not lost. If a collection
    is possibly sparse, then transferring that collection to one that is dense will
    solve the problem. This is not something to done lightly, because if the collection
    is large in size, then you will be holding two copies of the collection in memory
    while you densify the data. I’ll return to the first example in this section where
    the input array did not contain contiguous entries and solve the problem without
    using `VALUES OF` (`bulk_bind_scenario_oldver.sql`).


    First, here is the code to declare the first collection val, which will be the
    sparse collection:


    `SQL> declare`

    `  2    type t_num_list is table of hardware.item%type`

    `  3      index by pls_integer;`

    `  4`

    `  5    val t_num_list;`


    Now a second array is defined, which will contain the entries from the sparse
    collection val:


    `  6`

    `  7    dense_val t_num_list;`

    `  8    idx       pls_integer;`

    `  9`

    ` 10  begin`

    ` 11`

    ` 12    val(10) := 10;`

    ` 13    val(12) := 20;`

    ` 14`


    Population of the `dense_val` array is performed by walking along the entries
    of the `val` collection, using the collection attributes .`FIRST` and .`NEXT`.
    The collection `dense_val` will start at 0 (because `dense_val.count` is initially
    zero) and grows up to the number of elements in `val`.


    ` 15    idx := val.first;`

    ` 16    while idx is not null loop`

    ` 17       dense_val(dense_val.count) := val(idx);`

    ` 18       idx := val.next(idx);`

    ` 19    end loop;`


    The `dense_val` collection is then used rather than sparse `val` to perform the
    bulk bind:


    ` 20`

    ` 21    FORALL i IN dense_val.first .. dense_val.last`

    ` 22       insert into hardware ( item )`

    ` 23       values (dense_val(i));`

    ` 24`

    ` 25  end;`

    ` 26  /`


    `PL/SQL procedure successfully completed.`'
  trans: "##### 场景二：元素不连续\n\n让我们对前面的例子稍作修改：数组中缺少一个条目。以下是该示例以及因缺失条目导致的错误 (`bulk_bind_scenario2a.sql`)：\n\
    \n```sql\nSQL> declare\n  2    type t_num_list is table of hardware.item%type\
    \ index by pls_integer;\n  3\n  4    val t_num_list;\n  5  begin\n  6\n  7   \
    \ val(10) := 10;\n  8  --  val(11) := 20;\n  9    val(12) := 20;\n 10\n 11   \
    \ FORALL i IN val.first .. val.last\n 12       insert into hardware ( item ) values\
    \ (val(i));\n 13\n 14  end;\n 15  /\ndeclare\n*\nERROR at line 1:\nORA-22160:\
    \ element at index [11] does not exist\nORA-06512: at line 11\n```\n\n一旦集合变得稀疏，批量绑定将无法自动使用高低边界索引值进行工作。然而，从版本\
    \ 10.2 开始，`FORALL` 语法被扩展，包含了 `INDICES OF` 和 `VALUES OF` 规范。使用 `INDICES OF` 可以解决上面遇到的\
    \ ORA-22160 问题，如下所示 (`bulk_bind_scenario2b.sql`)：\n\n```sql\nSQL> declare\n  2\
    \    type t_num_list is table of hardware.item%type index by pls_integer;\n  3\n\
    \  4    val t_num_list;\n  5  begin\n  6\n  7    val(10) := 10;\n  8  --  val(11)\
    \ := 20;\n  9    val(12) := 20;\n 10\n 11    FORALL i IN INDICES OF val\n 12 \
    \      insert into hardware ( item ) values (val(i));\n 13\n 14  end;\n 15  /\n\
    ```\n\n```\nPL/SQL procedure successfully completed.\n```\n\n我非常喜欢这个语法。它不依赖于数组属性，并且代码独立于数据在数组中的分布方式。我建议采用一个标准：每当您想要处理整个集合时，就使用\
    \ `INDICES OF` 子句，并且在您的 PL/SQL 代码中应弃用 `.FIRST`、`.LAST` 和 `.COUNT` 的使用。遗憾的是，`INDICES\
    \ OF` 扩展只能在 `FORALL` 语句中使用，而不能在标准的 `FOR` 循环中使用。\n\n然而，如果您需要执行的批量绑定更像是对现有集合进行切割和切片，那么\
    \ `VALUES OF` 语法就派上用场了。`VALUES OF` 子句允许一定程度的间接寻址，有点类似于指针，使您能够对较大集合的选定子集进行批量绑定。\n\
    \n在下一个示例中 (`bulk_bind_values_of.sql`)，将填充一个包含 `STATUS` 属性的集合：状态标记为 `NEW` 的行将被插入到\
    \ `HARDWARE` 表中，而状态标记为 `UPD` 的行将更新其在 `HARDWARE` 表中的匹配行。因此，该示例模拟了一个 `MERGE` 语句。将检查该集合以确定哪些索引应用于更新，哪些应用于插入。然后，`VALUES\
    \ OF` 子句将用于处理这些行。\n\n首先，我将创建一些表示输入数据的结构。变量 `src` 将是输入数据，包含 100 行，每行状态为 `NEW` 或\
    \ `UPD`。\n\n```sql\nSQL> set serverout on\nSQL> declare\n  2    type t_input_row\
    \ is record (\n  3       item   hardware.item%type,\n  4       descr  hardware.descr%type,\n\
    \  5       status varchar2(3)\n  6       );\n  7\n  8    type t_input_list is\n\
    \  9       table of t_input_row\n 10       index by pls_integer;\n 11\n 12   \
    \ src t_input_list;\n```\n\n现在定义了两个变量 (`ind_new` 和 `ind_upd`)，它们将保存 `src` 中相应行的索引值。通过这种方式，不是将源数据复制到单独的集合中（一个用于\
    \ status = `NEW`，另一个用于 status = `UPD`），而是仅保留索引条目的记录。如果源数据量很大，避免复制尤为重要。\n\n```sql\n\
    \ 13\n 14    type t_target_indices is\n 15       table of pls_integer\n 16   \
    \    index by pls_integer;\n 17\n 18    ind_new  t_target_indices;\n 19    ind_upd\
    \  t_target_indices;\n 20\n 21  begin\n```\n\n现在，源数据被植入一些虚构的值（80 行状态为 `UPD`，20\
    \ 行状态为 `NEW`）。在真实世界的例子中，数据可能在其他地方初始化并传递给应用程序进行处理。\n\n```sql\n 22    for i in 1\
    \ .. 100 loop\n 23       src(i).item   := i;\n 24       src(i).descr  := 'Item\
    \ '||i;\n 25       src(i).status :=  case when mod(i,5) = 0 then 'NEW' else 'UPD'\
    \ end;\n 26    end loop;\n 27\n```\n\n现在扫描数据，并用与两个不同状态值对应的索引来填充索引数组。\n\n```sql\n\
    \ 28\n 29    for i in 1 .. 100 loop\n 30       if src(i).status = 'NEW' then\n\
    \ 31          ind_new(ind_new.count) := i;\n 32       else\n 33          ind_upd(ind_upd.count)\
    \ := i;\n 34       end if;\n 35    end loop;\n```\n\n最后，使用 `VALUES OF` 语法将更改传输到\
    \ `HARDWARE` 表中。即使与每个表相关的行在 `src` 集合中稀疏分布，`VALUES OF` 语法也提供了对它们进行批量绑定的直接访问。\n\n\
    ```sql\n 36\n 37    forall i in values of ind_new\n 38       insert into hardware\
    \ ( aisle, item)\n 39       values (1, src(i).item);\n 40    dbms_output.put_line(sql%rowcount||'\
    \ rows inserted');\n 41\n 42    forall i in values of ind_upd\n 43       update\
    \ hardware\n 44       set descr = src(i).descr\n 45       where aisle = 1\n 46\
    \       and item = src(i).item;\n 47    dbms_output.put_line(sql%rowcount||' rows\
    \ updated');\n 48\n 49  end;\n 50  /\n```\n\n```\n20 rows inserted\n80 rows updated\n\
    ```\n\n`VALUES OF` 和 `INDICES OF` 语法完善了批量绑定的实现。数组内的任何条目排列都可以被操作并绑定到数据库表中。\n\n\
    ##### Oracle 的早期版本\n\n如果您使用的是 Oracle 10.1 或更低版本，那么您的 Oracle 版本尚不支持 `VALUES OF`\
    \ 或 `INDICES OF` 扩展，但并非没有解决办法。如果一个集合可能是稀疏的，那么将其转换为密集集合即可解决问题。这并非可以轻率为之的事情，因为如果集合很大，那么在对数据进行密集化处理时，您将在内存中持有该集合的两个副本。我将回到本节的第一个示例，其中输入数组不包含连续条目，并在不使用\
    \ `VALUES OF` 的情况下解决该问题 (`bulk_bind_scenario_oldver.sql`)。\n\n首先，这里是声明第一个集合 `val`\
    \ 的代码，它将是一个稀疏集合：\n\n```sql\nSQL> declare\n  2    type t_num_list is table of hardware.item%type\n\
    \  3      index by pls_integer;\n  4\n  5    val t_num_list;\n```\n\n现在定义第二个数组，它将包含来自稀疏集合\
    \ `val` 的条目：\n\n```sql\n  6\n  7    dense_val t_num_list;\n  8    idx       pls_integer;\n\
    \  9\n 10  begin\n 11\n 12    val(10) := 10;\n 13    val(12) := 20;\n 14\n```\n\
    \n通过遍历 `val` 集合的条目（使用集合属性 `.FIRST` 和 `.NEXT`）来执行 `dense_val` 数组的填充。集合 `dense_val`\
    \ 将从 0 开始（因为 `dense_val.count` 初始为零），并增长到 `val` 中的元素数量。\n\n```sql\n 15    idx\
    \ := val.first;\n 16    while idx is not null loop\n 17       dense_val(dense_val.count)\
    \ := val(idx);\n 18       idx := val.next(idx);\n 19    end loop;\n```\n\n然后使用\
    \ `dense_val` 集合而不是稀疏的 `val` 来执行批量绑定：\n\n```sql\n 20\n 21    FORALL i IN dense_val.first\
    \ .. dense_val.last\n 22       insert into hardware ( item )\n 23       values\
    \ (dense_val(i));\n 24\n 25  end;\n 26  /\n```\n\n```\nPL/SQL procedure successfully\
    \ completed.\n```"
- fmt: "### A Justification for Massive Collections\n\nAs seen throughout this chapter,\
    \ once you start working with collections, you need to be aware of the implications\
    \ with regard to memory consumption. However, sometimes your performance requirements\
    \ have their motivation in other parts of the database infrastructure.\n\nMany\
    \ of the examples you have seen involve inserting large amounts of rows into a\
    \ table. While bulk binding is dramatically faster than single row inserts, it\
    \ will still consume large amounts of redo because the inserts are still DML issued\
    \ via the conventional path, so performance may still compromised to a slight\
    \ degree. For example, performance may be compromised due to freelist or segment\
    \ space bitmap management, or due to advancing the high watermark of the table.\n\
    \nOracle Database 11.2 introduces the `APPEND_VALUES` hint, which will convert\
    \ a conventional path insert statement into a direct path load. Here’s an example\
    \ of the hint in use (`bulk_bind_append_values_1.sql`):\n\n```\nSQL> insert /*+\
    \ APPEND_VALUES */\n  2  into HARDWARE ( item ) values (1);\n\n1 row created.\n\
    \nSQL> select item from HARDWARE;\nselect item from HARDWARE\n               \
    \  *\nERROR at line 1:\nORA-12838: cannot read/modify an object after modifying\
    \ it in parallel\n\nSQL> commit;\n\nCommit complete.\n\nSQL> select item from\
    \ HARDWARE;\n\n      ITEM\n----------\n         1\n```\n\nWhen the `APPEND_VALUES`\
    \ hint was announced, its usefulness was questioned. After all, who would want\
    \ to lock a table, advance its high watermark, and be bound to end the transaction\
    \ immediately all to insert just a `single` row? However, when combined with bulk\
    \ bind, the usefulness of the feature becomes more apparent. In the next example\
    \ (`bulk_bind_append_values_2.sql`), the session level statistics are measured\
    \ to compare the difference in redo consumption between a conventional insert\
    \ and a direct load insert via a bulk bind:\n\n```\nSQL> declare\n  2    type\
    \ t_list is table of hardware.descr%type;\n  3    l_rows t_list := t_list();\n\
    \  4    l_now timestamp;\n  5    l_redo1 int;\n  6    l_redo2 int;\n  7    l_redo3\
    \ int;\n  8  begin\n  9\n 10    select value\n 11    into   l_redo1\n 12    from\
    \   v$mystat m, v$statname s\n 13    where  s.statistic# = m.statistic#\n 14 \
    \   and    s.name = 'redo size';\n 15\n\n    -- An array of 1,000,000 rows to\
    \ be inserted via a standard bulk bind is prepared,\n    -- and the before and\
    \ after redo consumption by this session is captured.\n 16    for i in 1 .. 1000000\
    \ loop\n 17       l_rows.extend;\n 18       l_rows(i) := i;\n 19    end loop;\n\
    \ 20\n 21    l_now := systimestamp;\n 22    forall i in 1 .. l_rows.count\n 23\
    \      insert into hardware ( descr )  values (l_rows(i));\n 24    dbms_output.put_line('Elapsed\
    \ = '||(systimestamp-l_now));\n 25\n 26    select value\n 27    into   l_redo2\n\
    \ 28    from   v$mystat m, v$statname s\n 29    where  s.statistic# = m.statistic#\n\
    \ 30    and    s.name = 'redo size';\n 31\n\n    -- Then the table is truncated,\
    \ and the load is re-performed using APPEND_VALUES for direct path load.\n 32\
    \    execute immediate 'truncate table hardware';\n 33\n 34    dbms_output.put_line('Redo\
    \ conventional = '||(l_redo2-l_redo1));\n 35\n 36    l_now := systimestamp;\n\
    \ 37    forall i in 1 .. l_rows.count\n 38      insert /*+ APPEND_VALUES */ into\
    \ hardware ( descr ) values (l_rows(i));\n 39    dbms_output.put_line('Elapsed\
    \ = '||(systimestamp-l_now));\n 40\n 41    select value\n 42    into   l_redo3\n\
    \ 43    from   v$mystat m, v$statname s\n 44    where  s.statistic# = m.statistic#\n\
    \ 45    and    s.name = 'redo size';\n 46\n 47    dbms_output.put_line('Redo direct\
    \ load = '||(l_redo3-l_redo2));\n 48\n 49  end;\n 50  /\nElapsed = +000000000\
    \ 00:00:03.057000000\nRedo conventional = 67599300\nElapsed = +000000000 00:00:02.668000000\n\
    Redo direct load = 146912\n\nPL/SQL procedure successfully completed.\n```\n\n\
    As expected, the direct path load operation was faster and used much less redo.\
    \ So while it’s always important to be aware of the memory consumption with collections,\
    \ when it comes to using bulk bind for direct load inserts, you may find yourself\
    \ using larger-than-normal collection sizes if the memory on your database server\
    \ permits.\n\n### The Real Benefit: Client Bulk Processing\n\nAs I mentioned at\
    \ the start of the chapter, my repeated meanderings within the hardware store\
    \ are hurting my efficiency. However, sometimes things are much, much worse: I\
    \ pay for an item, drive home, and *then* realize I need to get back in the car,\
    \ drive back to the hardware store, and purchase something else. (For the sake\
    \ of sensitive readers, I won’t include the term of “endearment” my wife uses\
    \ when this happens!)\n\nThis chapter has described the efficiency of using bulk\
    \ operations in PL/SQL to access data, but that is equivalent to *already being*\
    \ at the hardware store. The cost of coming from an external client application\
    \ to the database (network trip) and processing data in a row-at-a-time basis\
    \ is equivalent to driving back and forth to the store in a car. The cost of this\
    \ can be quantified with some simple demos. First, I’ll build (using PL/SQL, of\
    \ course!) a replica of what many client applications implement in 3GL code, namely\
    \ a routine to open a cursor on the table and a routine a fetch a single row.\
    \ Here is the code, which you’ll find in `bulk_network_1.sql`:\n\n```\nSQL> create\
    \ or replace\n  2  package PKG1 is\n  3\n  4   procedure open_cur(rc in out sys_refcursor);\n\
    \  5\n  6   procedure fetch_cur(rc in out sys_refcursor, p_row out hardware.item%type);\n\
    \  7\n  8  end;\n  9  /\n\nPackage created.\n\nSQL> create or replace\n  2  package\
    \ body PKG1 is\n  3\n  4   procedure open_cur(rc in out sys_refcursor) is\n  5\
    \   begin\n  6     open rc for select item from hardware;\n  7   end;\n  8\n \
    \ 9   procedure fetch_cur(rc in out sys_refcursor, p_row out hardware.item%type)\
    \ is\n 10   begin\n 11     fetch rc into p_row;\n 12   end;\n 13\n 14  end;\n\
    \ 15  /\n\nPackage body created.\n```\n\nSQL Plus will suffice as the client application\
    \ calling this package. SQL Plus is, of course, a genuine SQL client in its own\
    \ right, and the number of rows it will fetch per fetch call is a preference you\
    \ have explicit control over, so the demo above could be written just as\n\n```\n\
    set arraysize n  (n=1 for single row fetch, n=1000 for multirow fetch)\nselect\
    \ item from HARDWARE;\n```\n\nbut I want to mimic what a 3GL application will\
    \ do, namely, contain explicit calls to open the cursor, fetch from it repeatedly,\
    \ and then close it. To open the cursor, and then repeatedly fetch rows until\
    \ the resultset is exhausted, I can use the script `bulk_single_fetch_100000.sql`,\
    \ which performs the following:\n\n```\nvariable rc refcursor\nexec pkg1.open_cur(:rc)\n\
    variable n number\nexec     pkg1.fetch_cur(:rc,:n);\nexec     pkg1.fetch_cur(:rc,:n);\n\
    [repeat 100000 times]\n```\n\nIn order to view the elapsed time for the demo,\
    \ without scrolling through 100,000 lines of output, I switch off terminal output\
    \ and record before and after timestamps.\n\n```\nSQL> variable rc refcursor\n\
    SQL> exec pkg1.open_cur(:rc)\nSQL> select to_char(systimestamp,'HH24:MI:SS.FF')\
    \ started from dual;\n\nSTARTED\n------------------\n12:11:18.779000\n\nSQL> set\
    \ termout off\nSQL> @bulk_single_fetch_1000.sql   -- contains 1000 fetch calls\n\
    [repeated 100 times]\n\nSQL> set termout on\nSQL> select to_char(systimestamp,'HH24:MI:SS.FF')\
    \ ended from dual;\n\nENDED\n------------------\n12:12:47.270000\n```\n\nYou can\
    \ see that 100,000 trips to the database took approximately 90 seconds. I repeated\
    \ that demo with a session trace enabled and examined the resultant tkprof-formatted\
    \ file. Here are the results:\n\n```\nSELECT ITEM\nFROM   HARDWARE\n```"
  raw: '### A Justification for Massive Collections


    As seen throughout this chapter, once you start working with collections, you
    need to be aware of the implications with regard to memory consumption. However,
    sometimes your performance requirements have their motivation in other parts of
    the database infrastructure.


    Many of the examples you have seen involve inserting large amounts of rows into
    a table. While bulk binding is dramatically faster than single row inserts, it
    will still consume large amounts of redo because the inserts are still DML issued
    via the conventional path, so performance may still compromised to a slight degree.
    For example, performance may be compromised due to freelist or segment space bitmap
    management, or due to advancing the high watermark of the table.


    Oracle Database 11.2 introduces the `APPEND_VALUES` hint, which will convert a
    conventional path insert statement into a direct path load. Here’s an example
    of the hint in use (`bulk_bind_append_values_1.sql`):


    `SQL> insert /*+ APPEND_VALUES */`

    `  2  into HARDWARE ( item ) values (1);`


    `1 row created.`


    `SQL> select item from HARDWARE;`

    `select item from HARDWARE`

    `                 *`

    `ERROR at line 1:`

    `ORA-12838: cannot read/modify an object after modifying it in parallel`


    `SQL> commit;`


    `Commit complete.`


    `SQL> select item from HARDWARE;`


    `      ITEM`

    `----------`

    `         1`


    When the APPEND_VALUES hint was announced, its usefulness was questioned. After
    all, who would want to lock a table, advance its high watermark, and be bound
    to end the transaction immediately all to insert just a ***single*** row? However,
    when combined with bulk bind, the usefulness of the feature becomes more apparent.
    In the next example (`bulk_bind_append_values_2.sql`), the session level statistics
    are measured to compare the difference in redo consumption between a conventional
    insert and a direct load insert via a bulk bind:


    `SQL> declare`

    `  2    type t_list is table of hardware.descr%type;`

    `  3    l_rows t_list := t_list();`

