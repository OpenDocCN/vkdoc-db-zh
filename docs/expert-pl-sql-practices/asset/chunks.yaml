- fmt: "## Dynamic Cursors Example #1\n\nThe first case of using dynamic cursors has\
    \ to do with environments using a lot of variables of type `REF CURSOR` as communication\
    \ mechanisms between different layers of applications. Unfortunately, in most\
    \ cases, such variables are created from the middle-tier layer and developed usually\
    \ with a very little involvement of database-side experts. I have seen too many\
    \ cases where the business case was 100% valid, but the implementation by solving\
    \ a direct functional problem created a maintenance, debugging, and even a security\
    \ nightmare!\n\nThe right way to fix this is to push the process of building `REF\
    \ CURSOR`s down to the database where all created logic is much easier to control\
    \ (although, it will still be the responsibility of middle-tier developers to\
    \ correctly close all opened cursors; otherwise the system will be prone to “cursor\
    \ leaking”). On a basic level the wrapper function should look as follows:\n\n\
    ```sql\nCREATE FUNCTION f_getRefCursor_REF (i_type_tx VARCHAR2)\nRETURN SYS_REFCURSOR\n\
    IS\n  v_out_ref SYS_REFCURSOR;\n  v_sql_tx VARCHAR2(32767);\nBEGIN\n    if i_type_tx\
    \ = 'A' then\n        v_sql_tx:=<some code to build query A>;  \n    elsif i_type_tx\
    \ = 'B' then\n        v_sql_tx:=<some other code to build query B>;  \n  ...\n\
    \    END IF;\n    OPEN v_out_ref FOR v_sql_tx;\n    RETURN v_out_ref;\nEND;\n\
    ```\n\nLife becomes slightly more interesting when the task is not just to build\
    \ and execute the query, but also pass some bind variables into it. There are\
    \ different ways of solving this problem. The simplest one is to create a package\
    \ with a number of global variables and the corresponding functions to return\
    \ them. As a result, the whole process of getting the correct result consists\
    \ of setting all of the appropriate variables and immediately calling `F_GETREFCURSOR_REF`\
    \ in the same session. However, the solution I've just described is not perfect,\
    \ since the middle-tier often talks to the database in a purely stateless way.\
    \ In that case, it's impossible to use `PL/SQL` package variables.\n\n![images](images/square.jpg)\
    \ Note: By stateless implementation of the middle-tier, I mean an environment\
    \ where each database call gets a separate database session (even in the context\
    \ of the same logical operation). This session could be either selected from the\
    \ existing connection pool or opened on the fly, but in practical terms, all session-level\
    \ resources should be considered “lost” between two calls, since there is no way\
    \ of ensuring that the following call would hit the same session as the preceding\
    \ one.\n\nStill, Oracle provides enough additional options to overcome even that\
    \ restriction using either object collections or `XMLType` (the latter is even\
    \ more flexible). Of course, either of these methods requires some non-trivial\
    \ changes to queries (as shown in the following example), but the outcome is a\
    \ 100% abstract query-builder.\n\n```sql\nCREATE FUNCTION f_getRefCursor_ref\n\
    \        (i_type_tx VARCHAR2:='EMP',\n        i_param_xml XMLTYPE:= XMLTYPE(\n\
    \                '<param col1_tx=\"DEPTNO\" value1_tx=\"20\" col2_tx=\"ENAME\"\
    \ value2_tx=\"KING\"/>')\n        )\nRETURN SYS_REFCURSOR\nIS\n    v_out_ref SYS_REFCURSOR;\n\
    \    v_sql_tx VARCHAR2(32767);\nBEGIN\n    IF i_type_tx = 'EMP' THEN\n       \
    \ SELECT              \n            'WITH param AS  ('||\n            '    SELECT\
    \   TO_NUMBER(EXTRACTVALUE (in_xml, ''/param/@value1_tx'') value1, '||\n     \
    \       '                       EXTRACTVALUE (in_xml, ''/param/@value2_tx'') value2\
    \ '||\n            '    FROM (SELECT :1 in_xml FROM DUAL) '||\n            ' \
    \                            ) '||\n            ' SELECT count(*)'||\n       \
    \     ' FROM scott.emp, '||\n            '             param '||\n           \
    \ ' WHERE emp.'|| dbms_assert.simple_sql_name(\n                             \
    \       EXTRACTVALUE (i_param_xml, '/param/@col1_tx')\n                      \
    \                      )||'=param.value1 '||\n            'OR emp.'|| dbms_assert.simple_sql_name(\n\
    \                                   EXTRACTVALUE (i_param_xml, '/param/@col2_tx')\n\
    \                                    )||'=param.value2'\n        INTO v_sql_tx\
    \  FROM DUAL;\n\n    ELSIF i_type_tx = 'B' THEN\n        v_sql_tx:='<queryB>';\
    \  \n  ...\n    END IF;\nOPEN v_out_ref FOR v_sql_tx USING i_param_xml;\n    RETURN\
    \ v_out_ref;\nEND;\n```\n\nIn this example, the parameters of a single `XML` variable\
    \ represent a group of pairs where, in each group, the first parameter defines\
    \ what columns should be filtered (`EMP.DEPTNO` and `EMP.ENAME`) and the second\
    \ one sets the value of this filter (`20` and `KING`). Columns (`COL1_TX` and\
    \ `COL2_TX`) are evaluated when the query is being built since they are structural\
    \ elements, while values are passed into the created query as a single input parameter\
    \ of `XMLType`. Although the resulting syntax looks slightly convoluted, the example\
    \ above proves that it's possible to put all database-related system elements\
    \ where they belong, namely in the database.\n\n## Dynamic Cursors Example #2\n\
    \nAnother case of effective utilization of dynamic cursors becomes self-evident\
    \ if we accept the major limitation of `EXECUTE IMMEDIATE`. It is a single `PARSE/EXECUTE/FETCH`\
    \ sequence of events that cannot be stopped or paused. As a result, in cases of\
    \ multi-row fetching via `BULK COLLECT`, there is always a serious risk of trying\
    \ to load too many elements into the output collection. Of course, this risk can\
    \ be mitigated by adding `WHERE ROWNUM <=:1`, as shown in the initial example.\
    \ But this option is also not perfect because it does not allow continuation of\
    \ reading from the same source. Dynamic cursors can solve this problem.\n\nFor\
    \ this example, assume that you need to write a module that would read the first\
    \ N values from the table and stop if it does not reach the middle of the alphabet\
    \ or continue until the end otherwise. The solution would look as follows:\n\n\
    ```sql\nCREATE FUNCTION f_getlov_tt  (\n        i_table_tx    VARCHAR2,\n    \
    \    i_id_tx          VARCHAR2,\n        i_display_tx VARCHAR2,\n        i_order_nr\
    \   VARCHAR2,\n        i_limit_nr     NUMBER:=50)\nRETURN lov_tt\nIS\n    v_out1_tt\
    \ lov_tt := lov_tt();\n    v_out2_tt lov_tt := lov_tt();\n    v_sql_tx VARCHAR2(32767);\n\
    \    v_cur SYS_REFCURSOR;\nBEGIN\n    v_sql_tx:='SELECT lov_t(' ||\n         \
    \                      dbms_assert.simple_sql_name(i_id_tx)||','||\n         \
    \         dbms_assert.simple_sql_name(i_display_tx)||')'||\n\n      ' FROM '||dbms_assert.simple_sql_name(i_table_tx)||\n\
    \      ' ORDER BY '||dbms_assert.simple_sql_name(i_order_nr);\n\n    OPEN v_cur\
    \ FOR v_sql_tx;\n    FETCH v_cur BULK COLLECT INTO v_out1_tt LIMIT i_limit_nr;\n\
    \    IF v_out1_tt.count=i_limit_nr AND UPPER(v_out1_tt(i_limit_nr).display_tx)>'N'\
    \ then\n           FETCH v_cur BULK COLLECT INTO v_out2_tt;\n           SELECT\
    \ v_out1_tt MULTISET UNION v_out2_tt INTO v_out1_tt FROM DUAL;\n    END IF;\n\
    \    CLOSE v_cur;\n\n    RETURN v_out1_tt;\nEND;\n```\n\nThis implementation allows\
    \ the program to fetch the first group of records (`V_OUT1_TT`), stop, and apply\
    \ logical rules in the middle of fetching data from an already opened cursor:\
    \ the second group of records (`V_OUT2_TT`) will be populated only if the defined\
    \ rules succeed, but it will be populated from the same query by just continuation\
    \ of fetching at no additional cost. That “stop-and-go” is what makes such an\
    \ example valuable."
  raw: '##### Dynamic Cursors Example #1


    The first case of using dynamic cursors has to do with environments using a lot
    of variables of type REF CURSOR as communication mechanisms between different
    layers of applications. Unfortunately, in most cases, such variables are created
    from the middle-tier layer and developed usually with a very little involvement
    of database-side experts. I have seen too many cases where the business case was
    100% valid, but the implementation by solving a direct functional problem created
    a maintenance, debugging, and even a security nightmare!


    The right way to fix this is to push the process of building REF CURSORs down
    to the database where all created logic is much easier to control (although, it
    will still be the responsibility of middle-tier developers to correctly close
    all opened cursors; otherwise the system will be prone to “cursor leaking”). On
    a basic level the wrapper function should look as follows:


    `CREATE FUNCTION f_getRefCursor_REF (i_type_tx VARCHAR2)`

    `RETURN SYS_REFCURSOR`

    `IS`

    `  v_out_ref SYS_REFCURSOR;`

    `  v_sql_tx VARCHAR2(32767);`

    `BEGIN`

    `    if i_type_tx = ''A'' then`

    `        v_sql_tx:=<some code to build query A>;  `

    `    elsif i_type_tx = ''B'' then`

    `        v_sql_tx:=<some other code to build query B>;  `

    `  ...`

    `    END IF;`

    `    OPEN v_out_ref FOR v_sql_tx;`

    `    RETURN v_out_ref;`

    `END;`


    Life becomes slightly more interesting when the task is not just to build and
    execute the query, but also pass some bind variables into it. There are different
    ways of solving this problem. The simplest one is to create a package with a number
    of global variables and the corresponding functions to return them. As a result,
    the whole process of getting the correct result consists of setting all of the
    appropriate variables and immediately calling F_GETREFCURSOR_REF in the same session.
    However, the solution I''ve just described is not perfect, since the middle-tier
    often talks to the database in a purely stateless way. In that case, it''s impossible
    to use PL/SQL package variables.


    ![images](images/square.jpg) **Note** By stateless implementation of the middle-tier,
    I mean an environment where each database call gets a separate database session
    (even in the context of the same logical operation). This session could be either
    selected from the existing connection pool or opened on the fly, but in practical
    terms, all session-level resources should be considered “lost” between two calls,
    since there is no way of ensuring that the following call would hit the same session
    as the preceding one.


    Still, Oracle provides enough additional options to overcome even that restriction
    using either object collections or XMLType (the latter is even more flexible).
    Of course, either of these methods requires some non-trivial changes to queries
    (as shown in the following example), but the outcome is a 100% abstract query-builder.


    `CREATE FUNCTION f_getRefCursor_ref`

    `        (i_type_tx VARCHAR2:=''EMP'',`

    **`        i_param_xml XMLTYPE:= XMLTYPE(`**

    `                ''<param col1_tx="DEPTNO" value1_tx="20" col2_tx="ENAME" value2_tx="KING"/>'')`

    `        )`

    `RETURN SYS_REFCURSOR`

    `IS`

    `    v_out_ref SYS_REFCURSOR;`

    `    v_sql_tx VARCHAR2(32767);`

    `BEGIN`

    `    IF i_type_tx = ''EMP'' THEN`

    `        SELECT              `

    `            ''WITH param AS  (''||`

    `            ''    SELECT   TO_NUMBER(`**`EXTRACTVALUE (in_xml, ''''/param/@value1_tx'''')`**`)
    value1, ''||`

    **`            ''                     EXTRACTVALUE (in_xml, ''''/param/@value2_tx''''`**`)
    value2 ''||`

    `            ''    FROM (SELECT :1 in_xml FROM DUAL) ''||`

    `            ''                             ) ''||`

    `            '' SELECT count(*)''||`

    `            '' FROM scott.emp, ''||`

    `            ''             param ''||`

    `            '' WHERE emp.''|| dbms_assert.simple_sql_name(`

    `                                        EXTRACTVALUE (i_param_xml, ''/param/@col1_tx'')`

    `                                                    )||''=param.value1 ''||`

    `            ''OR emp.''|| dbms_assert.simple_sql_name(`

    `                                       EXTRACTVALUE (i_param_xml, ''/param/@col2_tx'')`

    `                                        )||''=param.value2''`

    `        INTO v_sql_tx  FROM DUAL;`


    `    ELSIF i_type_tx = ''B'' THEN`

    `        v_sql_tx:=''<queryB>'';  `

    `  ...`

    `    END IF;`

    `OPEN v_out_ref FOR v_sql_tx` **`USING i_param_xml;`**

    `    RETURN v_out_ref;`

    `END;`


    In this example, the parameters of a single XML variable represent a group of
    pairs where, in each group, the first parameter defines what columns should be
    filtered (EMP.DEPTNO and EMP.ENAME) and the second one sets the value of this
    filter (20 and KING). Columns (COL1_TX and COL2_TX) are evaluated when the query
    is being built since they are structural elements, while values are passed into
    the created query as a single input parameter of XMLType. Although the resulting
    syntax looks slightly convoluted, the example above proves that it''s possible
    to put all database-related system elements where they belong, namely in the database.


    ##### Dynamic Cursors Example #2


    Another case of effective utilization of dynamic cursors becomes self-evident
    if we accept the major limitation of EXECUTE IMMEDIATE. It is a single PARSE/EXECUTE/FETCH
    sequence of events that cannot be stopped or paused. As a result, in cases of
    multi-row fetching via BULK COLLECT, there is always a serious risk of trying
    to load too many elements into the output collection. Of course, this risk can
    be mitigated by adding `WHERE ROWNUM <=:1`, as shown in the initial example. But
    this option is also not perfect because it does not allow continuation of reading
    from the same source. Dynamic cursors can solve this problem.


    For this example, assume that you need to write a module that would read the first
    N values from the table and stop if it does not reach the middle of the alphabet
    or continue until the end otherwise. The solution would look as follows:


    `CREATE FUNCTION f_getlov_tt  (`

    `        i_table_tx    VARCHAR2,`

    `        i_id_tx         VARCHAR2,`

    `        i_display_tx VARCHAR2,`

    `        i_order_nr   VARCHAR2,`

    `        i_limit_nr     NUMBER:=50)`

    `RETURN lov_tt`

    `IS`

    `    v_out1_tt lov_tt := lov_tt();`

    **`    v_out2_tt lov_tt := lov_tt();`**

    `    v_sql_tx VARCHAR2(32767);`

    **`    v_cur SYS_REFCURSOR;`**

    `BEGIN`

    `    v_sql_tx:=''SELECT lov_t('' ||`

    `                               dbms_assert.simple_sql_name(i_id_tx)||'',''||`

    `                  dbms_assert.simple_sql_name(i_display_tx)||'')''||`


    `      '' FROM ''||dbms_assert.simple_sql_name(i_table_tx)||`

    `      '' ORDER BY ''||dbms_assert.simple_sql_name(i_order_nr);`


    **`    OPEN v_cur FOR v_sql_tx;`**

    **`    FETCH v_cur BULK COLLECT INTO v_out1_tt LIMIT i_limit_nr;`**

    **`    IF v_out1_tt.count=i_limit_nr AND UPPER(v_out1_tt(i_limit_nr).display_tx)>''N''
    then`**

    **`           FETCH v_cur BULK COLLECT INTO v_out2_tt;`**

    **`           SELECT v_out1_tt MULTISET UNION v_out2_tt INTO v_out1_tt FROM DUAL;`**

    **`    END IF;`**

    **`    CLOSE v_cur;`**


    `    RETURN v_out1_tt;`

    `END;`


    This implementation allows the program to fetch the first group of records (V_OUT1_TT),
    stop, and apply logical rules in the middle of fetching data from an already opened
    cursor: the second group of records (V_OUT2_TT) will be populated only if the
    defined rules succeed, but it will be populated from the same query by just continuation
    of fetching at no additional cost. That “stop-and-go” is what makes such an example
    valuable.'
  trans: "## 动态游标示例 #1\n\n使用动态游标的第一个案例与那些大量使用 `REF CURSOR` 类型变量作为不同应用层之间通信机制的场景有关。不幸的是，在大多数情况下，这类变量是由中间层创建的，而数据库端专家的参与度往往极低。我见过太多案例，业务逻辑\
    \ 100%有效，但为了解决直接功能问题而进行的实现，却造成了维护、调试甚至安全方面的噩梦！\n\n修复此问题的正确方法是将构建 `REF CURSOR`\
    \ 的过程下沉到数据库层，因为所有创建的逻辑在那里更容易控制（尽管，正确关闭所有打开的游标仍然是中间层开发人员的责任；否则系统容易发生“游标泄漏”）。基础层面的包装函数应如下所示：\n\
    \n```sql\nCREATE FUNCTION f_getRefCursor_REF (i_type_tx VARCHAR2)\nRETURN SYS_REFCURSOR\n\
    IS\n  v_out_ref SYS_REFCURSOR;\n  v_sql_tx VARCHAR2(32767);\nBEGIN\n    if i_type_tx\
    \ = 'A' then\n        v_sql_tx:=<some code to build query A>;  \n    elsif i_type_tx\
    \ = 'B' then\n        v_sql_tx:=<some other code to build query B>;  \n  ...\n\
    \    END IF;\n    OPEN v_out_ref FOR v_sql_tx;\n    RETURN v_out_ref;\nEND;\n\
    ```\n\n当任务不仅仅是构建和执行查询，还要向其中传入一些绑定变量时，事情就变得稍微有趣一些了。解决这个问题有几种不同的方法。最简单的是创建一个包含多个全局变量和相应返回函数的包。因此，获取正确结果的整个过程包括：设置所有适当的变量，并在同一会话中立即调用\
    \ `F_GETREFCURSOR_REF`。然而，我刚才描述的解决方案并不完美，因为中间层通常以纯粹的无状态方式与数据库通信。在这种情况下，就不可能使用\
    \ `PL/SQL` 包变量。\n\n![images](img/square.jpg) 注意：我所说的中间层无状态实现，是指每次数据库调用都获得一个独立的数据库会话（即使是在同一个逻辑操作的上下文中）。这个会话可以是从现有连接池中选取的，也可以是即时打开的，但实际来说，所有会话级资源在两次调用之间都应被视为“丢失”，因为无法确保后续调用会命中与前一次调用相同的会话。\n\
    \n尽管如此，Oracle 提供了足够的额外选项，可以使用对象集合或 `XMLType`（后者更加灵活）来克服这个限制。当然，这些方法都需要对查询进行一些不平凡的改动（如下面的示例所示），但结果是一个\
    \ 100%抽象的查询构建器。\n\n```sql\nCREATE FUNCTION f_getRefCursor_ref\n        (i_type_tx\
    \ VARCHAR2:='EMP',\n        i_param_xml XMLTYPE:= XMLTYPE(\n                '<param\
    \ col1_tx=\"DEPTNO\" value1_tx=\"20\" col2_tx=\"ENAME\" value2_tx=\"KING\"/>')\n\
    \        )\nRETURN SYS_REFCURSOR\nIS\n    v_out_ref SYS_REFCURSOR;\n    v_sql_tx\
    \ VARCHAR2(32767);\nBEGIN\n    IF i_type_tx = 'EMP' THEN\n        SELECT     \
    \         \n            'WITH param AS  ('||\n            '    SELECT   TO_NUMBER(EXTRACTVALUE\
    \ (in_xml, ''/param/@value1_tx'') value1, '||\n            '                 \
    \      EXTRACTVALUE (in_xml, ''/param/@value2_tx'') value2 '||\n            '\
    \    FROM (SELECT :1 in_xml FROM DUAL) '||\n            '                    \
    \         ) '||\n            ' SELECT count(*)'||\n            ' FROM scott.emp,\
    \ '||\n            '             param '||\n            ' WHERE emp.'|| dbms_assert.simple_sql_name(\n\
    \                                    EXTRACTVALUE (i_param_xml, '/param/@col1_tx')\n\
    \                                            )||'=param.value1 '||\n         \
    \   'OR emp.'|| dbms_assert.simple_sql_name(\n                               \
    \    EXTRACTVALUE (i_param_xml, '/param/@col2_tx')\n                         \
    \           )||'=param.value2'\n        INTO v_sql_tx  FROM DUAL;\n\n    ELSIF\
    \ i_type_tx = 'B' THEN\n        v_sql_tx:='<queryB>';  \n  ...\n    END IF;\n\
    OPEN v_out_ref FOR v_sql_tx USING i_param_xml;\n    RETURN v_out_ref;\nEND;\n\
    ```\n\n在此示例中，单个 `XML` 变量的参数代表一组对，其中在每组中，第一个参数定义应过滤哪些列（`EMP.DEPTNO` 和 `EMP.ENAME`），第二个参数设置此过滤器的值（`20`\
    \ 和 `KING`）。列（`COL1_TX` 和 `COL2_TX`）在查询构建时进行评估，因为它们是结构元素，而值则作为 `XMLType` 的单个输入参数传递到创建的查询中。尽管最终的语法看起来有些复杂，但上面的示例证明，将所有与数据库相关的系统元素放在它们所属的位置（即数据库中）是可能的。\n\
    \n## 动态游标示例 #2\n\n如果我们接受 `EXECUTE IMMEDIATE` 的主要限制，那么动态游标的另一个有效利用案例就变得不言自明了。它是一个单一的\
    \ `PARSE/EXECUTE/FETCH` 事件序列，无法停止或暂停。因此，在通过 `BULK COLLECT` 进行多行提取的情况下，总是存在尝试将过多元素加载到输出集合中的严重风险。当然，可以通过添加\
    \ `WHERE ROWNUM <=:1` 来缓解此风险，如初始示例所示。但这个选项也不完美，因为它不允许从同一个源继续读取。动态游标可以解决这个问题。\n\
    \n对于此示例，假设你需要编写一个模块，该模块将从表中读取前 N 个值，如果未到达字母表中间则停止，否则继续直到末尾。解决方案如下所示：\n\n```sql\n\
    CREATE FUNCTION f_getlov_tt  (\n        i_table_tx    VARCHAR2,\n        i_id_tx\
    \          VARCHAR2,\n        i_display_tx VARCHAR2,\n        i_order_nr   VARCHAR2,\n\
    \        i_limit_nr     NUMBER:=50)\nRETURN lov_tt\nIS\n    v_out1_tt lov_tt :=\
    \ lov_tt();\n    v_out2_tt lov_tt := lov_tt();\n    v_sql_tx VARCHAR2(32767);\n\
    \    v_cur SYS_REFCURSOR;\nBEGIN\n    v_sql_tx:='SELECT lov_t(' ||\n         \
    \                      dbms_assert.simple_sql_name(i_id_tx)||','||\n         \
    \         dbms_assert.simple_sql_name(i_display_tx)||')'||\n\n      ' FROM '||dbms_assert.simple_sql_name(i_table_tx)||\n\
    \      ' ORDER BY '||dbms_assert.simple_sql_name(i_order_nr);\n\n    OPEN v_cur\
    \ FOR v_sql_tx;\n    FETCH v_cur BULK COLLECT INTO v_out1_tt LIMIT i_limit_nr;\n\
    \    IF v_out1_tt.count=i_limit_nr AND UPPER(v_out1_tt(i_limit_nr).display_tx)>'N'\
    \ then\n           FETCH v_cur BULK COLLECT INTO v_out2_tt;\n           SELECT\
    \ v_out1_tt MULTISET UNION v_out2_tt INTO v_out1_tt FROM DUAL;\n    END IF;\n\
    \    CLOSE v_cur;\n\n    RETURN v_out1_tt;\nEND;\n```\n\n此实现允许程序获取第一组记录（`V_OUT1_TT`），然后暂停，并在从已打开的游标提取数据的过程中应用逻辑规则：只有当定义的规则成功时，才会填充第二组记录（`V_OUT2_TT`），并且它只需通过继续提取即可从同一查询中填充，无需额外成本。这种“停走式”正是使此示例有价值的原因。"
- fmt: "# DBMS_SQL\n\nDBMS_SQL 内置包是动态 SQL 思想的最初形态。尽管有传言称它可能被弃用，但该包随着 RDBMS 版本的更新持续进化。显然，保留\
    \ DBMS_SQL 有其充分理由，因为它提供了对执行时定义的语句所能达到的最低级别的控制。你可以将解析、执行、获取结果、定义输出以及处理绑定变量作为独立的命令随意执行。当然，这种粒度控制的代价是性能（但\
    \ Oracle 正在不断缩小这一差距）和复杂性。通常的经验法则是，除非你确定无法避免使用 DBMS_SQL，否则不要使用它。\n\n以下是除了使用 DBMS_SQL\
    \ 外别无选择的几种情况：\n\n*   你需要超过 `EXECUTE IMMEDIATE` 的 32K 限制（在 Oracle 10g 及更低版本中）。\n\
    *   你有未知数量或类型的输入/输出参数（在所有版本中）。\n*   你需要对流程进行细粒度控制（在所有版本中，但在 11g 中有更多可能性）。\n\n\
    第一种情况非常直接。你要么触及了限制，要么没有。然而，从开发角度看，后两种情况要有趣得多。本节接下来将通过示例说明，通过低级别访问系统逻辑可以实现什么。\n\
    \n在大量使用 REF CURSOR 变量的环境中，迟早会有人问这个问题：如何知道某个游标变量传递的确切查询是什么？在 Oracle 11g 之前，答案要么在源代码中，要么需要在\
    \ DBA 级别检查 SGA 的 v$ 视图。但从 Oracle 11g 开始，可以双向转换 DBMS_SQL 游标和 REF CURSOR。这一特性使得以下解决方案成为可能：\n\
    \n```\nCREATE PROCEDURE p_explainCursor (io_ref_cur IN OUT SYS_REFCURSOR)\nIS\n\
    \    v_cur      INTEGER := dbms_sql.open_cursor;\n    v_cols_nr NUMBER := 0;\n\
    \    v_cols_tt dbms_sql.desc_tab;\nBEGIN\n    v_cur:=dbms_sql.to_cursor_number(io_ref_cur);\n\
    \    dbms_sql.describe_columns (v_cur, v_cols_nr, v_cols_tt);\n    FOR i IN 1\
    \ .. v_cols_nr LOOP\n        dbms_output.put_line(v_cols_tt (i).col_name);\n \
    \   END LOOP;      \n    io_ref_cur:=dbms_sql.to_refcursor(v_cur);\nEND;\n```\n\
    \n```\nSQL> DECLARE\n  2    v_tx VARCHAR2(256):='SELECT * FROM dept';\n  3   \
    \ v_cur SYS_REFCURSOR;\n  4  BEGIN\n  5    OPEN v_cur FOR v_tx;\n  6    p_explainCursor(v_cur);\n\
    \  7    CLOSE v_cur;\n  8  END;\n  9  /\nDEPTNO\nDNAME\nLOC\nPL/SQL procedure\
    \ successfully completed.\nSQL>\n```\n\n此示例利用了过程 `DBMS_SQL.DESCRIBE_COLUMNS`，它接受任意已打开的游标并分析其结构。如果游标是为\
    \ SQL 查询打开的，信息包括输出中的列数、列名和列数据类型等。这让我们回到了管理 `UNKNOWN` 的概念。我们获取一些未知的内容，通过应用适当的工具，将这些潜在有用信息的原始材料转换为可用于解决实际业务需求的可靠数据。\n\
    \n### 动态思维示例\n\n在正式介绍了本章的主角之后，现在有必要展示一个恰当应用动态思维的“黄金标准”案例。本节的示例来自一个实际的生产问题，完美地说明了高级数据库开发人员当前面临的问题概念级别。从一开始，这个任务就极具挑战性。\n\
    \n*   存在大约 100 个表，以层次结构描述一个人：客户 A 有电话 B，由参考人 C 确认，而 C 又有地址 D，等等。\n*   整个客户及其相关子数据偶尔需要被克隆。\n\
    *   所有表都有一个从共享序列 (`OBJECT_SEQ`) 生成的单列合成主键；所有表通过外键链接。\n*   数据模型会相当频繁地更改，因此不允许硬编码。请求必须即时处理，因此无法禁用约束或使用任何其他数据转换变通方法。\n\
    \n在这种情况下，克隆过程涉及什么？很明显，克隆根元素（客户）将需要一些硬编码，但其他所有内容在概念上代表沿着依赖树的分层遍历。克隆过程肯定需要某种快速访问存储（本例中是关联数组），用于保存旧/新\
    \ ID 对的信息（使用旧 ID 查找新 ID）。此外，还需要一个嵌套表数据类型来保存要传递到下一层级的主键列表。因此，除了主过程的声明外，还创建了以下类型：\n\
    \n```\nCREATE PACKAGE clone_pkg\nIS\n    TYPE pair_tt IS TABLE OF NUMBER INDEX\
    \ BY BINARY_INTEGER;\n    v_Pair_t pair_tt;\n\n    PROCEDURE p_clone (in_table_tx\
    \ VARCHAR2, in_pk_tx VARCHAR2, in_id NUMBER);\nEND;\n```\n\n```\nCREATE TYPE id_tt\
    \ IS TABLE OF NUMBER;\n```\n\n注意，第二个类型 (`ID_TT`) 应创建为数据库对象，因为它将在 SQL 中被积极使用。第一个类型\
    \ (`PAIR_TT`) 仅在 PL/SQL 代码上下文中用于存储旧/新值；这就是为什么我在包 (`CLONE_PKG`) 中创建它并立即声明一个该类型的变量。\n\
    \n由于我试图识别潜在模式，我将忽略克隆客户的根过程（因为它将与其他所有过程不同）。同时，我将忽略向下第一层（属于客户的电话），因为它只涵盖了一个子情况（单个父级的多个子项）。让我们从向下两层开始，弄清楚如何克隆确认现有电话号码的参考人（假设新电话已经创建）。从逻辑上讲，操作流程如下：\n\
    \n1.  查找确认所有现有电话的所有参考人。\n    1.  现有电话作为电话 ID 集合 (`V_OLDPHONE_TT`) 传递。\n    2.\
    \  所有检测到的参考人被加载到暂存的 PL/SQL 集合 (`V_ROWS_TT`) 中。\n2.  处理每个检测到的参考人。\n    1.  存储所有检测到的参考人\
    \ ID (`V_PARENT_TT`)，这些 ID 将在层次树的后续层级中使用。\n    2.  从序列中检索一个新的 ID，并在全局包变量中记录旧/新\
    \ ID 对。\n    3.  在暂存集合 (`V_ROWS_TT`) 中，用新值替换主键（参考人 ID）和外键（电话 ID）。\n3.  遍历暂存集合，并将新行插入到参考人表中。\n\
    \n实现这些步骤的代码如下：\n\n```\nDECLARE\nTYPE rows_tt IS TABLE of REF%ROWTYPE;\n    v_rows_tt\
    \ rows_tt;\n    v_new_id NUMBER;\n    v_parent_tt id_tt:=id_tt();\nBEGIN\n   \
    \ SELECT * BULK COLLECT INTO v_rows_tt\nFROM REF t WHERE PHONE_ID in\n       \
    \ (SELECT column_value FROM TABLE (CAST (v_oldPhone_tt AS id_tt)));\n\n    FOR\
    \ i IN v_rows_tt.first..v_rows_tt.last LOOP\n      v_parent_tt.extend;\n     \
    \ v_parent_tt(v_parent_tt.last):=v_rows_tt(i).REF_ID;\n```"
  raw: "#### DBMS_SQL\n\nThe DBMS_SQL built-in package was the original incarnation\
    \ of the dynamic SQL idea. Despite rumors of its potential abandonment, the package\
    \ continues to evolve from one version of the RDBMS to another. Evidently, there\
    \ is a very good reason to keep DBMS_SQL around since it provides the lowest possible\
    \ level of control on the execution of runtime-defined statements. You can parse,\
    \ execute, fetch, define output, and process bind variables as independent commands\
    \ at will. Of course, the costs of this granularity are performance (but Oracle\
    \ continues to close this gap) and complexity. Usually, the rule of thumb is that\
    \ unless you know that you can't avoid DBMS_SQL, don't use it.\n\nFollowing are\
    \ some cases in which there are no other options but to use DBMS_SQL:\n\n*   You\
    \ need to exceed the 32K restriction of EXECUTE IMMEDIATE (in Oracle 10g and below).\n\
    *   You have an unknown number or type of input/output parameters (in all versions).\n\
    *   You need granular control over the process (in all versions, but in 11g there\
    \ are additional possibilities).\n\nThe first case is pretty straightforward.\
    \ You either hit the limit or you don't. However, the latter two are much more\
    \ interesting from the development point of view. What follows in this section\
    \ is an illustration of what is doable by having low-level access to the system\
    \ logic.\n\nIn every environment that heavily uses REF CURSOR variables, sooner\
    \ or later someone asks the question: How do I know what exact query is being\
    \ passed by such-and-such cursor variable? Up to Oracle 11g, the answer was either\
    \ in the source code or at DBA-level SGA examination of v$-views. But starting\
    \ with Oracle 11g, it became possible to bi-directionally convert DBMS_SQL cursors\
    \ and REF CURSORs. This feature allows the following solution to exist:\n\n`CREATE\
    \ PROCEDURE p_explainCursor (`**`io_ref_cur IN OUT SYS_REFCURSOR`**`)`\n`IS`\n\
    **`    v_cur      INTEGER := dbms_sql.open_cursor;`**\n`    v_cols_nr NUMBER :=\
    \ 0;`\n`    v_cols_tt dbms_sql.desc_tab;`\n`BEGIN`\n`    v_cur:=`**`dbms_sql.to_cursor_number(io_ref_cur);`**\n\
    **`    dbms_sql.describe_columns`** `(v_cur, v_cols_nr, v_cols_tt);`\n`    FOR\
    \ i IN 1 .. v_cols_nr LOOP`\n`        dbms_output.put_line(`**`v_cols_tt (i).col_name`**`);`\n\
    `    END LOOP;      `\n`    io_ref_cur:=`**`dbms_sql.to_refcursor(v_cur);`**\n\
    `END;`\n\n`SQL> DECLARE`\n`  2    v_tx VARCHAR2(256):='SELECT * FROM dept';`\n\
    `  3    v_cur SYS_REFCURSOR;`\n`  4  BEGIN`\n`  5    OPEN v_cur FOR v_tx;`\n`  6    p_explainCursor(v_cur);`\n\
    `  7    CLOSE v_cur;`\n`  8  END;`\n`  9  /`\n`DEPTNO`\n`DNAME`\n`LOC`\n`PL/SQL\
    \ procedure successfully completed.`\n`SQL>`\n\nThis example utilizes the procedure\
    \ DBMS_SQL.DESCRIBE_COLUMNS that takes any opened cursor and analyzes its structure.\
    \ In the case of a cursor opened for a SQL query, the information includes the\
    \ number of columns in the output, the column names, and the column datatypes\
    \ etc. That brings us back to the concept of managing the UNKNOWN. We take something\
    \ that we don't know and, by applying the appropriate tools, we convert the raw\
    \ material of potentially useful information into solid data that can be used\
    \ to solve real business needs.\n\n### Sample of Dynamic Thinking\n\nAfter the\
    \ formal introduction of the hero of this chapter, it now makes sense to show\
    \ a “gold standard” case of the appropriate application of dynamic thinking. The\
    \ example in this section comes from an actual production problem and perfectly\
    \ illustrates the conceptual level of problem currently faced by senior database\
    \ developers. From the very beginning, the task was challenging.\n\n*   There\
    \ were about 100 tables in a hierarchical structure describing a person: Customer\
    \ A has phone B, confirmed by reference person C, who has an address D, etc.\n\
    *   The whole customer with related child data occasionally has to be cloned.\n\
    *   All tables have a single-column synthetic primary key generated from the shared\
    \ sequence (OBJECT_SEQ); all tables are linked by foreign keys.\n*   The data\
    \ model changes reasonably often, so hardcoding is not allowed. Requests must\
    \ be processed on the spot so there is no way to disable constraints or use any\
    \ other data transformation workarounds.\n\nWhat is involved in the cloning process\
    \ in this case? It is clear that cloning the root element (customer) will require\
    \ some hardcoding, but everything else conceptually represents a hierarchical\
    \ walk down the dependency tree. The process of cloning definitely requires some\
    \ kind of fast-access storage (associative array in this case) that will keep\
    \ the information about old/new pairs (find the new ID using the old ID). Also,\
    \ a nested table data type is needed to keep a list of primary keys to be passed\
    \ to the next level. As a result, the following types are created in addition\
    \ to the declaration of a main procedure:\n\n`CREATE PACKAGE clone_pkg`\n`IS`\n\
    `    TYPE pair_tt IS TABLE OF NUMBER INDEX BY BINARY_INTEGER;`\n`    v_Pair_t\
    \ pair_tt;`\n\n`    PROCEDURE p_clone (in_table_tx VARCHAR2, in_pk_tx VARCHAR2,\
    \ in_id NUMBER);`\n`END;`\n\n`CREATE TYPE id_tt IS TABLE OF NUMBER;`\n\nNote that\
    \ the second type (ID_TT) should be created as database object because it will\
    \ be actively used in SQL. The first type (PAIR_TT) is needed only in the context\
    \ of PL/SQL code to store old/new values; that is why I created it in the package\
    \ (CLONE_PKG) and immediately made a variable of this type.\n\nSince I am trying\
    \ to identify potential patterns, I will ignore the root procedure that would\
    \ clone the customer (because it will be different from everything else). Also,\
    \ I will ignore the first level down (phones belonging to customer) since it covers\
    \ only a sub-case (multiple children of a single parent). Let's start two levels\
    \ down and figure out how to clone reference people confirming existing phone\
    \ number (assuming that new phones already were created). Logically, the flow\
    \ of actions is the following:\n\n1.  Find all references confirming all existing\
    \ phones.\n    1.  Existing phones are passed as a collection of phone IDs (V_OLDPHONE_TT).\n\
    \    2.  All detected references are loaded into staging PL/SQL collection (V_ROWS_TT).\n\
    2.  Process each detected reference.\n    1.  Store all detected reference IDs\
    \ (V_PARENT_TT) that will be used further down the hierarchical tree.\n    2.\
    \  Retrieve a new ID from the sequence and record old/new pair in the global package\
    \ variable.\n    3.  In the staging collection (V_ROWS_TT), substitute the primary\
    \ key (reference ID) and foreign key (phone ID) with new values.\n3.  Spin through\
    \ the staging collection and insert new rows to the reference table.\n\nThe code\
    \ to accomplish these steps is as follows:\n\n`DECLARE`\n`TYPE rows_tt IS TABLE\
    \ of` **`REF`**`%ROWTYPE;`\n`    v_rows_tt rows_tt;`\n`    v_new_id NUMBER;`\n\
    `    v_parent_tt id_tt:=id_tt();`\n`BEGIN`\n`    SELECT * BULK COLLECT INTO v_rows_tt`\n\
    `FROM` **`REF`** `t WHERE` **`PHONE_ID`** `in`\n`        (SELECT column_value\
    \ FROM TABLE (CAST (v_oldPhone_tt AS id_tt)));`\n\n`    FOR i IN v_rows_tt.first..v_rows_tt.last\
    \ LOOP`\n`      v_parent_tt.extend;`\n`      v_parent_tt(v_parent_tt.last):=v_rows_tt(i)`**`.REF_ID;`**"
  trans: "\n# DBMS_SQL\n\n`DBMS_SQL` 内置包是动态 SQL 思想的最初形态。尽管有传言称它可能被弃用，但该包随着 RDBMS 版本的更新持续进化。显然，保留\
    \ `DBMS_SQL` 有其充分理由，因为它提供了对**执行时定义的语句**所能达到的最低级别的控制。你可以将解析、执行、获取结果、定义输出以及处理绑定变量作为独立的命令随意执行。当然，这种粒度控制的代价是性能（但\
    \ Oracle 正在不断缩小这一差距）和复杂性。通常的经验法则是，除非你确定无法避免使用 `DBMS_SQL`，否则不要使用它。\n\n以下是除了使用 `DBMS_SQL`\
    \ 外别无选择的几种情况：\n\n*   你需要超过 `EXECUTE IMMEDIATE` 的 32K 限制（在 Oracle 10g 及更低版本中）。\n\
    *   你有未知数量或类型的输入/输出参数（在所有版本中）。\n*   你需要对流程进行细粒度控制（在所有版本中，但在 11g 中有更多可能性）。\n\n\
    第一种情况非常直接。你要么触及了限制，要么没有。然而，从开发角度看，后两种情况要有趣得多。本节接下来将通过示例说明，通过低级别访问系统逻辑可以实现什么。\n\
    \n在大量使用 `REF CURSOR` 变量的环境中，迟早会有人问这个问题：如何知道某个游标变量传递的确切查询是什么？在 Oracle 11g 之前，答案要么在源代码中，要么需要在\
    \ DBA 级别检查 SGA 的 `v$` 视图。但从 Oracle 11g 开始，可以双向转换 `DBMS_SQL` 游标和 `REF CURSOR`。这一特性使得以下解决方案成为可能：\n\
    \n```\nCREATE PROCEDURE p_explainCursor (io_ref_cur IN OUT SYS_REFCURSOR)\nIS\n\
    \    v_cur      INTEGER := dbms_sql.open_cursor;\n    v_cols_nr NUMBER := 0;\n\
    \    v_cols_tt dbms_sql.desc_tab;\nBEGIN\n    v_cur:=dbms_sql.to_cursor_number(io_ref_cur);\n\
    \    dbms_sql.describe_columns (v_cur, v_cols_nr, v_cols_tt);\n    FOR i IN 1\
    \ .. v_cols_nr LOOP\n        dbms_output.put_line(v_cols_tt (i).col_name);\n \
    \   END LOOP;      \n    io_ref_cur:=dbms_sql.to_refcursor(v_cur);\nEND;\n```\n\
    \n```\nSQL> DECLARE\n  2    v_tx VARCHAR2(256):='SELECT * FROM dept';\n  3   \
    \ v_cur SYS_REFCURSOR;\n  4  BEGIN\n  5    OPEN v_cur FOR v_tx;\n  6    p_explainCursor(v_cur);\n\
    \  7    CLOSE v_cur;\n  8  END;\n  9  /\nDEPTNO\nDNAME\nLOC\nPL/SQL procedure\
    \ successfully completed.\nSQL>\n```\n\n此示例利用了过程 `DBMS_SQL.DESCRIBE_COLUMNS`，它接受任意已打开的游标并分析其结构。如果游标是为\
    \ SQL 查询打开的，信息包括输出中的列数、列名和列数据类型等。这让我们回到了管理 `UNKNOWN` 的概念。我们获取一些未知的内容，通过应用适当的工具，将这些潜在有用信息的原始材料转换为可用于解决实际业务需求的可靠数据。\n\
    \n### 动态思维示例\n\n在正式介绍了本章的主角之后，现在有必要展示一个恰当应用动态思维的“黄金标准”案例。本节的示例来自一个实际的生产问题，完美地说明了高级数据库开发人员当前面临的问题概念级别。从一开始，这个任务就极具挑战性。\n\
    \n*   存在大约 100 个表，以层次结构描述一个人：客户 A 有电话 B，由参考人 C 确认，而 C 又有地址 D，等等。\n*   整个客户及其相关子数据偶尔需要被克隆。\n\
    *   所有表都有一个从共享序列 (`OBJECT_SEQ`) 生成的单列合成主键；所有表通过外键链接。\n*   数据模型会相当频繁地更改，因此不允许硬编码。请求必须即时处理，因此无法禁用约束或使用任何其他数据转换变通方法。\n\
    \n在这种情况下，克隆过程涉及什么？很明显，克隆根元素（客户）将需要一些硬编码，但其他所有内容在概念上代表沿着依赖树的分层遍历。克隆过程肯定需要某种快速访问存储（本例中是关联数组），用于保存旧/新\
    \ ID 对的信息（使用旧 ID 查找新 ID）。此外，还需要一个嵌套表数据类型来保存要传递到下一层级的主键列表。因此，除了主过程的声明外，还创建了以下类型：\n\
    \n```\nCREATE PACKAGE clone_pkg\nIS\n    TYPE pair_tt IS TABLE OF NUMBER INDEX\
    \ BY BINARY_INTEGER;\n    v_Pair_t pair_tt;\n\n    PROCEDURE p_clone (in_table_tx\
    \ VARCHAR2, in_pk_tx VARCHAR2, in_id NUMBER);\nEND;\n```\n\n```\nCREATE TYPE id_tt\
    \ IS TABLE OF NUMBER;\n```\n\n注意，第二个类型 (`ID_TT`) 应创建为数据库对象，因为它将在 SQL 中被积极使用。第一个类型\
    \ (`PAIR_TT`) 仅在 PL/SQL 代码上下文中用于存储旧/新值；这就是为什么我在包 (`CLONE_PKG`) 中创建它并立即声明一个该类型的变量。\n\
    \n由于我试图识别潜在模式，我将忽略克隆客户的根过程（因为它将与其他所有过程不同）。同时，我将忽略向下第一层（属于客户的电话），因为它只涵盖了一个子情况（单个父级的多个子项）。让我们从向下两层开始，弄清楚如何克隆确认现有电话号码的参考人（假设新电话已经创建）。从逻辑上讲，操作流程如下：\n\
    \n1.  查找确认所有现有电话的所有参考人。\n    1.  现有电话作为电话 ID 集合 (`V_OLDPHONE_TT`) 传递。\n    2.\
    \  所有检测到的参考人被加载到暂存的 PL/SQL 集合 (`V_ROWS_TT`) 中。\n2.  处理每个检测到的参考人。\n    1.  存储所有检测到的参考人\
    \ ID (`V_PARENT_TT`)，这些 ID 将在层次树的后续层级中使用。\n    2.  从序列中检索一个新的 ID，并在全局包变量中记录旧/新\
    \ ID 对。\n    3.  在暂存集合 (`V_ROWS_TT`) 中，用新值替换主键（参考人 ID）和外键（电话 ID）。\n3.  遍历暂存集合，并将新行插入到参考人表中。\n\
    \n实现这些步骤的代码如下：\n\n```\nDECLARE\nTYPE rows_tt IS TABLE of REF%ROWTYPE;\n    v_rows_tt\
    \ rows_tt;\n    v_new_id NUMBER;\n    v_parent_tt id_tt:=id_tt();\nBEGIN\n   \
    \ SELECT * BULK COLLECT INTO v_rows_tt\nFROM REF t WHERE PHONE_ID in\n       \
    \ (SELECT column_value FROM TABLE (CAST (v_oldPhone_tt AS id_tt)));\n\n    FOR\
    \ i IN v_rows_tt.first..v_rows_tt.last LOOP\n      v_parent_tt.extend;\n     \
    \ v_parent_tt(v_parent_tt.last):=v_rows_tt(i).REF_ID;\n```\n"
- fmt: "# Using Dynamic SQL for Generic Cloning\n\nInterestingly enough, if you closely\
    \ examine the created code, it becomes clear that it contains three kinds of elements:\n\
    \n*   An incoming list of parent primary keys (`V_OLDPHONE_TT`).\n*   A main logical\
    \ process.\n*   Functional identifiers that define objects the process should\
    \ be applied to:\n    *   Child table name (`REF`).\n    *   Primary key column\
    \ name of the child table (`REF_ID`).\n    *   Foreign key column name of the\
    \ child table (`PHONE_ID`).\n\nTechnically, I am trying to build a module that\
    \ has structural parameters (table names, column names) and data parameters (parent\
    \ IDs), which is a perfect case of utilizing Dynamic SQL because it can handle\
    \ both of these kinds.\n\nSince each level of hierarchy could be completely represented\
    \ by examining foreign key relationships, it is obvious that the Oracle data dictionary\
    \ may be used to walk down through the parent-child tree (for now, I will assume\
    \ that there are no circular dependencies in the system). The idea is very straightforward:\
    \ take a table name as input and return a list of its children (with corresponding\
    \ child primary key column and foreign key column pointing to the parent). Although\
    \ the following code does not contain any dynamic SQL, it is useful enough to\
    \ be shown (also extract from `CLONE_PKG`):\n\n```sql\nTYPE list_rec IS RECORD\n\
    \        (table_tx VARCHAR2(50), fk_tx VARCHAR2(50), pk_tx VARCHAR2(50));\nTYPE\
    \ list_rec_tt IS TABLE OF list_rec;\n\nFUNCTION f_getChildrenRec (in_tablename_tx\
    \ VARCHAR2)\nRETURN list_rec_tt\nIS\n    v_out_tt list_rec_tt;\nBEGIN\n    SELECT\
    \ fk_tab.table_name, fk_tab.column_name fk_tx, pk_tab.column_name pk_tx\n    BULK\
    \ COLLECT INTO v_Out_tt\n    FROM\n        (SELECT ucc.column_name, uc.table_name\n\
    \         FROM user_cons_columns ucc,\n              user_constraints uc\n   \
    \      WHERE ucc.constraint_name = uc.constraint_name\n         AND   constraint_type\
    \ = 'P') pk_tab,\n         (SELECT ucc.column_name, uc.table_name\n          FROM\
    \   user_cons_columns ucc,\n                (SELECT constraint_name, table_name\n\
    \                FROM user_constraints\n                WHERE r_constraint_name\
    \ = (SELECT constraint_name\n                                           FROM user_constraints\n\
    \                                           WHERE table_name = in_tablename_tx\n\
    \                                           AND constraint_type = 'P'\n      \
    \                                     )\n                   ) uc\n          WHERE\
    \ ucc.constraint_name = uc.constraint_name ) fk_tab\n    WHERE pk_tab.table_name\
    \ = fk_tab.table_name;\n    RETURN v_out_tt;\nEND;\n```\n\nNow I have all of the\
    \ pieces of information necessary to build generic processing module that would\
    \ call itself recursively until it reaches the end of the parent-child chains,\
    \ as shown next. As defined, the module will take as input a collection of parent\
    \ primary key IDs and a single object of type `CLONE_PKG.LIST_REC` that will describe\
    \ the parent-child link to be processed.\n\n```sql\nPROCEDURE p_process (in_list_rec\
    \ clone_pkg.list_rec, in_parent_list id_tt)\nIS\n    v_execute_tx VARCHAR2(32767);\n\
    BEGIN\n    v_execute_tx:=\n        'DECLARE '||\n        '    TYPE rows_tt IS\
    \ TABLE OF '||in_list_rec.table_tx||'%rowtype;'||\n        '    v_rows_tt rows_tt;'||\n\
    \        '    v_new_id number;'||\n        '    v_list clone_pkg.list_rec_tt;'||\n\
    \        '    v_parent_list id_tt:=id_tt();'||\n        'BEGIN '||\n        '\
    \    SELECT * BULK COLLECT INTO v_rows_tt '||\n        '    FROM '||in_list_rec.table_tx||'\
    \ t WHERE '||in_list_rec.fk_tx||\n        '       IN  (SELECT column_value FROM\
    \ TABLE (CAST (:1 as id_tt)));'||\n        '    IF v_rows_tt.count()=0 THEN RETURN;\
    \ END IF;'||\n        '    FOR i IN v_rows_tt.first..v_rows_tt.last LOOP '||\n\
    \        '       SELECT object_Seq.nextval INTO v_new_id FROM DUAL;'||\n     \
