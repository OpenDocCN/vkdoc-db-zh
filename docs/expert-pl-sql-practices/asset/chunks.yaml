    \ = t.time_id\n 10  GROUP  BY\n         t.calendar_year\n 11  ,      c.cust_first_name\
    \ || ' ' || c.cust_last_name\n 12  ;\n\n11604 rows selected.\n```\n\n**耗时: 00:00:01.40**\n\
    ```\nStatistics\n----------------------------------------------------------\n\
    \       3189  consistent gets\n          0  physical reads\n```\n\n通过移除函数而使用 `SQL`\
    \ 表达式，报告的运行时间减少到 1.5 秒以下。因此你可以看到，即使在访问和连接多个行源时，`PL/SQL` 函数的存在仍然会影响查询的整体响应时间。\n\
    \n##### 其他 PL/SQL 函数类型\n\n上下文切换的惩罚适用于任何从 `SQL` 调用的 `PL/SQL` 源（包括用户定义的聚合函数、类型方法或表函数）。一个很好的例子是\
    \ Tom Kyte 多年前编写的 `STRAGG` 函数，用于演示用户定义的聚合函数（当时是 Oracle 9*i*的新特性）。直到 Oracle 数据库\
    \ 11*g*，都没有与 `STRAGG` 等效的内置函数，因此这个实用函数作为 Oracle 论坛上解决字符串聚合问题的方案变得极其流行。\n\n`LISTAGG`\
    \ 内置函数的发布，通过简单地移除 `SQL` 引擎执行上下文切换的需要，提供了相对于 `STRAGG` 显著的性能提升。我在清单 9-7 中用一个简单的例子展示了这一点，该例子聚合了提供的\
    \ `SH.CUSTOMERS` 表中每个客户的 ID 范围。\n\n**清单 9-7.** 内置聚合函数 vs. 用户定义聚合函数\n```\nSQL>\
    \ SELECT cust_first_name\n  2  ,      cust_last_name\n  3  ,      LISTAGG(cust_id)\
    \ WITHIN GROUP (ORDER BY NULL)\n  4  FROM   customers\n  5  GROUP  BY\n      \
    \   cust_first_name\n  6  ,      cust_last_name;\n\n5601 rows selected.\n```\n\
    \n**耗时: 00:00:00.23**\n```\nSQL> SELECT cust_first_name\n  2  ,      cust_last_name\n\
    \  3  ,      STRAGG(cust_id)\n  4  FROM   customers\n  5  GROUP  BY\n        \
    \ cust_first_name\n  6  ,      cust_last_name;\n\n5601 rows selected.\n```\n\n\
    **耗时: 00:00:01.40**\n\n我抑制了 `Autotrace` 输出，但两种方法都没有产生物理 I/O，且逻辑 I/O 是相同的。然而，用户定义的聚合函数耗时是内置等效函数的六倍以上。\n\
    \n总而言之，我已经证明了仅仅从 `SQL` 调用 `PL/SQL` 函数就可能是昂贵的，这与函数本身的性质无关。稍后，我将展示各种你可以应用的方法，以减少或完全消除\
    \ `SQL` 查询中的这部分成本。\n"
- fmt: "# Executions\n\nIt is often said that the fastest way to do something is not\
    \ to do it at all. It’s also commonly said that even when something is nanoseconds-fast,\
    \ if you execute it enough times, its elapsed time will start to mount up. This\
    \ is what commonly happens with PL/SQL functions that are executed from SQL. It\
    \ follows that the more times a PL/SQL function is executed from a SQL statement,\
    \ the greater the time and resources that are spent in both the function itself\
    \ and the associated context-switching.\n\nWhen a PL/SQL function is included\
    \ in a SQL statement, how many times should that function be executed? There are\
    \ a number of factors to be considered when attempting to answer this question;\
    \ even assuming that you have some knowledge of the function’s usage in the query,\
    \ you can’t be certain.\n\nSQL is a non-procedural language, yet trying to predict\
    \ the number of times that a PL/SQL function is executed by a SQL query is a decidedly\
    \ procedural way of thinking. You have no way of controlling the innermost workings\
    \ of the SQL engine and therefore no absolute control over how many times a PL/SQL\
    \ function is called. (I say absolute because there are techniques you can use\
    \ to reduce a function’s executions, but you can’t reliably predict the number\
    \ of calls that you ultimately reduce it to.) If you don’t attempt to control\
    \ the number of executions, then it follows that you won’t have any influence\
    \ over the contribution that your function makes to the response time of your\
    \ SQL statement.\n\n## Query Rewrite and the CBO\n\nThere are also the effects\
    \ of the Cost Based Optimizer (CBO) to consider. With every release of Oracle\
    \ Database, the CBO becomes more sophisticated (read complex); in particular,\
    \ it finds more ways to optimize queries through transformation techniques. This\
    \ means that the query block you call your PL/SQL function from might not exist\
    \ in the final version of the query that the CBO generates.\n\nThis can easily\
    \ be demonstrated with a small example of the CBO’s view-merging transformation.\
    \ [Listing 9-8](#Chapter09.html#list_9_8) contains a mock report that aggregates\
    \ product sales by customer and calendar year. The PL/SQL function in this example\
    \ maintains a counter to trace the number of executions. It is called from an\
    \ in-line view of the CUSTOMERS table in an attempt to pre-compute and also limit\
    \ the number of function calls.\n\n**Listing 9-8.** CBO Query Transformation and\
    \ Function Executions\n\n```sql\nSQL> SELECT t.calendar_year\n  2  ,      c.cust_name\n\
    \  3  ,      SUM(s.quantity_sold) AS qty_sold\n  4  ,      SUM(s.amount_sold)\
    \   AS amt_sold\n  5  FROM   sales     s\n  6  ,     (\n  7         SELECT cust_id\n\
    \  8         ,      format_customer_name (\n  9                   cust_first_name,\
    \ cust_last_name\n 10                   ) AS cust_name\n 11         FROM   customers\n\
    \ 12        )          c\n 13  ,      times     t\n 14  WHERE  s.cust_id = c.cust_id\n\
    \ 15  AND    s.time_id = t.time_id\n 16  GROUP  BY\n 17         t.calendar_year\n\
    \ 18  ,      c.cust_name\n 19  ;\n```\n\n```\n11604 rows selected.\n```\n\nHaving\
    \ executed the report, I can retrieve the latest counter to see how many times\
    \ the function was executed, as demonstrated in [Listing 9-9](#Chapter09.html#list_9_9).\
    \ Note that you can refer to the source code on the Apress web site for implementation\
    \ details of the `COUNTER` package and its use in the `FORMAT_CUSTOMER_NAME` function.\n\
    \n**Listing 9-9.** CBO Query Transformation and Function Executions (Displaying\
    \ Function Calls)\n\n```sql\nSQL> exec counter.show('Function calls');\n```\n\n\
    ```\nFunction calls: 918843\n\nPL/SQL procedure successfully completed.\n```\n\
    \nThe PL/SQL function has been executed over 918,000 times, although my intention\
    \ was that the in-line view would limit the function executions to just 55,500\
    \ (i.e. once per row in the CUSTOMERS table). This hasn’t worked, however, because\
    \ the CBO has simply merged the inline view with the outer query block, and as\
    \ a result, my PL/SQL function has been applied to a much larger rowsource than\
    \ I intended. The execution plan in [Listing 9-10](#Chapter09.html#list_9_10)\
    \ shows that the inline view has been factored out (i.e. merged) and the projection\
    \ information clearly shows that the function calls have been applied at the very\
    \ last step in the plan.\n\n**Listing 9-10.** CBO Query Transformation and Function\
    \ Executions (Projection of the PL/SQL Function)\n\n```text\n----------------------------------------------------\n\
    | Id  | Operation                     | Name       |\n----------------------------------------------------\n\
    |   0 | SELECT STATEMENT              |            |\n|   1 |   HASH GROUP BY\
    \               |            |\n|   2 |    HASH JOIN                  |      \
    \      |\n|   3 |     PART JOIN FILTER CREATE   | :BF0000    |\n|   4 |      TABLE\
    \ ACCESS FULL        | TIMES      |\n|   5 |     HASH JOIN                 | \
    \           |\n|   6 |      TABLE ACCESS FULL        | CUSTOMERS  |\n|   7 | \
    \     PARTITION RANGE JOIN-FILTER|            |\n|   8 |       TABLE ACCESS FULL\
    \       | SALES      |\n----------------------------------------------------\n\
    \nColumn Projection Information (identified by operation id):\n-----------------------------------------------------------\n\
    \n   1 - \"T\".\"CALENDAR_YEAR\"[NUMBER,22],\n       \"FORMAT_CUSTOMER_NAME\"\
    (\"CUST_FIRST_NAME\",\"CUST_LAST_NAME\")[4000],\n       SUM(\"S\".\"AMOUNT_SOLD\"\
    )[22], SUM(\"S\".\"QUANTITY_SOLD\")[22]\n   2 - (#keys=1) \"T\".\"CALENDAR_YEAR\"\
    [NUMBER,22],\n       \"CUST_LAST_NAME\"[VARCHAR2,40], \"CUST_FIRST_NAME\"[VARCHAR2,20],\n\
    \       \"S\".\"AMOUNT_SOLD\"[NUMBER,22], \"S\".\"QUANTITY_SOLD\"[NUMBER,22]\n\
    \   3 - \"T\".\"TIME_ID\"[DATE,7], \"T\".\"TIME_ID\"[DATE,7],\n       \"T\".\"\
    CALENDAR_YEAR\"[NUMBER,22]\n   4 - \"T\".\"TIME_ID\"[DATE,7], \"T\".\"CALENDAR_YEAR\"\
    [NUMBER,22]\n   5 - (#keys=1) \"CUST_LAST_NAME\"[VARCHAR2,40],\n       \"CUST_FIRST_NAME\"\
    [VARCHAR2,20], \"S\".\"AMOUNT_SOLD\"[NUMBER,22],\n       \"S\".\"TIME_ID\"[DATE,7],\
    \ \"S\".\"QUANTITY_SOLD\"[NUMBER,22]\n   6 - \"CUST_ID\"[NUMBER,22], \"CUST_FIRST_NAME\"\
    [VARCHAR2,20],\n       \"CUST_LAST_NAME\"[VARCHAR2,40]\n   7 - \"S\".\"CUST_ID\"\
    [NUMBER,22], \"S\".\"TIME_ID\"[DATE,7],\n       \"S\".\"QUANTITY_SOLD\"[NUMBER,22],\
    \ \"S\".\"AMOUNT_SOLD\"[NUMBER,22]\n   8 - \"S\".\"CUST_ID\"[NUMBER,22], \"S\"\
    .\"TIME_ID\"[DATE,7],\n       \"S\".\"QUANTITY_SOLD\"[NUMBER,22], \"S\".\"AMOUNT_SOLD\"\
    [NUMBER,22]\n```\n\nView-merging, subquery unnesting, and other complex query\
    \ transformations are not the only CBO-related issues that can affect the number\
    \ of executions of your PL/SQL function. The CBO is also free to ignore the order\
    \ that your tables or predicates are listed (although with the latter there is\
    \ a notable exception, specific to PL/SQL functions, and I’ll be describing it\
    \ later). The ordering of joins and predicates can have a dramatic effect on the\
    \ cardinality of each step of an execution plan; this, in turn, will probably\
    \ cause your PL/SQL function to be executed more, or less perhaps, than you expect."
  raw: '#### Executions


    It is often said that the fastest way to do something is not to do it at all.
    It’s also commonly said that even when something is nanoseconds-fast, if you execute
    it enough times, its elapsed time will start to mount up. This is what commonly
    happens with PL/SQL functions that are executed from SQL. It follows that the
    more times a PL/SQL function is executed from a SQL statement, the greater the
    time and resources that are spent in both the function itself and the associated
    context-switching.


    When a PL/SQL function is included in a SQL statement, how many times should that
    function be executed? There are a number of factors to be considered when attempting
    to answer this question; even assuming that you have some knowledge of the function’s
    usage in the query, you can’t be certain.


    SQL is a non-procedural language, yet trying to predict the number of times that
    a PL/SQL function is executed by a SQL query is a decidedly procedural way of
    thinking. You have no way of controlling the innermost workings of the SQL engine
    and therefore no absolute control over how many times a PL/SQL function is called.
    (I say absolute because there are techniques you can use to reduce a function’s
    executions, but you can’t reliably predict the number of calls that you ultimately
    reduce it to.) If you don’t attempt to control the number of executions, then
    it follows that you won’t have any influence over the contribution that your function
    makes to the response time of your SQL statement.


    ##### Query Rewrite and the CBO


    There are also the effects of the Cost Based Optimizer (CBO) to consider. With
    every release of Oracle Database, the CBO becomes more sophisticated (read complex);
    in particular, it finds more ways to optimize queries through transformation techniques.
    This means that the query block you call your PL/SQL function from might not exist
    in the final version of the query that the CBO generates.


    This can easily be demonstrated with a small example of the CBO’s view-merging
    transformation. [Listing 9-8](#Chapter09.html#list_9_8) contains a mock report
    that aggregates product sales by customer and calendar year. The PL/SQL function
    in this example maintains a counter to trace the number of executions. It is called
    from an in-line view of the CUSTOMERS table in an attempt to pre-compute and also
    limit the number of function calls.


    ***Listing 9-8.** CBO Query Transformation and Function Executions*


    `SQL> SELECT t.calendar_year`

    `  2  ,      c.cust_name`

    `  3  ,      SUM(s.quantity_sold) AS qty_sold`

    `  4  ,      SUM(s.amount_sold)   AS amt_sold`

    `  5  FROM   sales     s`

    `  6  ,     (`

    `  7         SELECT cust_id`

    **`  8         ,      format_customer_name (`**

    **`  9                   cust_first_name, cust_last_name`**

    **` 10                   ) AS cust_name`**

    ` 11         FROM   customers`

    ` 12        )          c`

    ` 13  ,      times     t`

    ` 14  WHERE  s.cust_id = c.cust_id`

    ` 15  AND    s.time_id = t.time_id`

    `16  GROUP  BY`

    ` 17         t.calendar_year`

    ` 18  ,      c.cust_name`

    ` 19  ;`


    `11604 rows selected.`


    Having executed the report, I can retrieve the latest counter to see how many
    times the function was executed, as demonstrated in [Listing 9-9](#Chapter09.html#list_9_9).
    Note that you can refer to the source code on the Apress web site for implementation
    details of the `COUNTER` package and its use in the `FORMAT_CUSTOMER_NAME` function.


    ***Listing 9-9.** CBO Query Transformation and Function Executions (Displaying
    Function Calls)*


    `SQL> exec counter.show(''Function calls'');`


    `Function calls:` **`918843`**


    `PL/SQL procedure successfully completed.`


    The PL/SQL function has been executed over 918,000 times, although my intention
    was that the in-line view would limit the function executions to just 55,500 (i.e.
    once per row in the CUSTOMERS table). This hasn’t worked, however, because the
    CBO has simply merged the inline view with the outer query block, and as a result,
    my PL/SQL function has been applied to a much larger rowsource than I intended.
    The execution plan in [Listing 9-10](#Chapter09.html#list_9_10) shows that the
    inline view has been factored out (i.e. merged) and the projection information
    clearly shows that the function calls have been applied at the very last step
    in the plan.


    ***Listing 9-10.** CBO Query Transformation and Function Executions (Projection
    of the PL/SQL Function)*


    `----------------------------------------------------`

    `| Id  | Operation                      | Name      |`

    `----------------------------------------------------`

    `|   0 | SELECT STATEMENT               |           |`

    `|   1 |  HASH GROUP BY                 |           |`

    `|   2 |   HASH JOIN                    |           |`

    `|   3 |    PART JOIN FILTER CREATE     | :BF0000   |`

    `|   4 |     TABLE ACCESS FULL          | TIMES     |`

    `|   5 |    HASH JOIN                   |           |`

    `|   6 |     TABLE ACCESS FULL          | CUSTOMERS |`

    `|   7 |     PARTITION RANGE JOIN-FILTER|           |`

    `|   8 |      TABLE ACCESS FULL         | SALES     |`

    `----------------------------------------------------`


    `Column Projection Information (identified by operation id):`

    `-----------------------------------------------------------`


    `   1 - "T"."CALENDAR_YEAR"[NUMBER,22],`

    **`       "FORMAT_CUSTOMER_NAME"("CUST_FIRST_NAME","CUST_LAST_NAME")[4000],`**

    `       SUM("S"."AMOUNT_SOLD")[22], SUM("S"."QUANTITY_SOLD")[22]`

    `2 - (#keys=1) "T"."CALENDAR_YEAR"[NUMBER,22],`

    `       "CUST_LAST_NAME"[VARCHAR2,40], "CUST_FIRST_NAME"[VARCHAR2,20],`

    `       "S"."AMOUNT_SOLD"[NUMBER,22], "S"."QUANTITY_SOLD"[NUMBER,22]`

    `   3 - "T"."TIME_ID"[DATE,7], "T"."TIME_ID"[DATE,7],`

    `       "T"."CALENDAR_YEAR"[NUMBER,22]`

    `   4 - "T"."TIME_ID"[DATE,7], "T"."CALENDAR_YEAR"[NUMBER,22]`

    `   5 - (#keys=1) "CUST_LAST_NAME"[VARCHAR2,40],`

    `       "CUST_FIRST_NAME"[VARCHAR2,20], "S"."AMOUNT_SOLD"[NUMBER,22],`

    `       "S"."TIME_ID"[DATE,7], "S"."QUANTITY_SOLD"[NUMBER,22]`

    `   6 - "CUST_ID"[NUMBER,22], "CUST_FIRST_NAME"[VARCHAR2,20],`

    `       "CUST_LAST_NAME"[VARCHAR2,40]`

    `   7 - "S"."CUST_ID"[NUMBER,22], "S"."TIME_ID"[DATE,7],`

    `       "S"."QUANTITY_SOLD"[NUMBER,22], "S"."AMOUNT_SOLD"[NUMBER,22]`

    `   8 - "S"."CUST_ID"[NUMBER,22], "S"."TIME_ID"[DATE,7],`

    `       "S"."QUANTITY_SOLD"[NUMBER,22], "S"."AMOUNT_SOLD"[NUMBER,22]`


    View-merging, subquery unnesting, and other complex query transformations are
    not the only CBO-related issues that can affect the number of executions of your
    PL/SQL function. The CBO is also free to ignore the order that your tables or
    predicates are listed (although with the latter there is a notable exception,
    specific to PL/SQL functions, and I’ll be describing it later). The ordering of
    joins and predicates can have a dramatic effect on the cardinality of each step
    of an execution plan; this, in turn, will probably cause your PL/SQL function
    to be executed more, or less perhaps, than you expect.'
  trans: "\n# 执行\n\n常言道，最快完成某事的方式就是不去做它。同样普遍认为，即使某事快如纳米级，但只要执行次数足够多，其累积耗时就会开始攀升。这正是从\
    \ SQL 中调用 PL/SQL 函数时常见的情况。因此，PL/SQL 函数被 SQL 语句调用的次数越多，在函数本身以及相关的上下文切换上所耗费的时间和资源就越多。\n\
    \n当一个 PL/SQL 函数被包含在 SQL 语句中时，该函数应该执行多少次呢？回答这个问题需要考虑诸多因素；即使你对该函数在查询中的使用有所了解，也无法确定。\n\
    \nSQL 是一种非过程化语言，但试图预测 PL/SQL 函数被 SQL 查询执行的次数，却是一种典型的过程化思维方式。你无法控制 SQL 引擎的内部工作方式，因此也无法绝对控制\
    \ PL/SQL 函数被调用的次数。（我说“绝对”是因为有一些技术可以用来减少函数的执行次数，但你无法可靠地预测最终将其减少到的调用次数。）如果你不去尝试控制执行次数，那么随之而来的就是，你无法影响你的函数对\
    \ SQL 语句响应时间所做的贡献。\n\n## 查询重写与 CBO\n\n还需要考虑基于成本的优化器的影响。随着 Oracle 数据库的每个版本发布，CBO\
    \ 变得越来越复杂；特别是，它发现了更多通过转换技术来优化查询的方法。这意味着，你调用 PL/SQL 函数所在的查询块，可能不会出现在 CBO 生成的最终查询版本中。\n\
    \n这可以通过 CBO 的视图合并转换的一个小例子轻松证明。清单 9-8 包含一个模拟报告，该报告按客户和日历年汇总产品销售情况。此示例中的 PL/SQL\
    \ 函数维护一个计数器来追踪执行次数。它从 CUSTOMERS 表的一个内联视图中被调用，旨在预计算并限制函数调用的次数。\n\n**清单 9-8.** CBO\
    \ 查询转换与函数执行\n\n```sql\nSQL> SELECT t.calendar_year\n  2  ,      c.cust_name\n\
    \  3  ,      SUM(s.quantity_sold) AS qty_sold\n  4  ,      SUM(s.amount_sold)\
    \   AS amt_sold\n  5  FROM   sales     s\n  6  ,     (\n  7         SELECT cust_id\n\
    \  8         ,      format_customer_name (\n  9                   cust_first_name,\
    \ cust_last_name\n 10                   ) AS cust_name\n 11         FROM   customers\n\
    \ 12        )          c\n 13  ,      times     t\n 14  WHERE  s.cust_id = c.cust_id\n\
    \ 15  AND    s.time_id = t.time_id\n 16  GROUP  BY\n 17         t.calendar_year\n\
    \ 18  ,      c.cust_name\n 19  ;\n```\n\n```\n11604 rows selected.\n```\n\n执行完该报告后，我可以检索最新的计数器来查看函数执行了多少次，如清单\
    \ 9-9 所示。请注意，你可以参考 Apress 网站上的源代码，了解 `COUNTER` 包的实现细节及其在 `FORMAT_CUSTOMER_NAME`\
    \ 函数中的使用。\n\n**清单 9-9.** CBO 查询转换与函数执行（显示函数调用次数）\n\n```sql\nSQL> exec counter.show('Function\
    \ calls');\n```\n\n```\nFunction calls: 918843\n\nPL/SQL procedure successfully\
    \ completed.\n```\n\nPL/SQL 函数已被执行超过 918,000 次，尽管我的本意是内联视图会将函数执行次数限制在仅 55,500\
    \ 次（即 CUSTOMERS 表每行一次）。然而，这并未奏效，因为 CBO 直接将内联视图与外部查询块合并了，结果我的 PL/SQL 函数被应用到了比我预期大得多的行源上。清单\
    \ 9-10 中的执行计划显示，内联视图已被分解（即被合并），并且投影信息清楚地表明函数调用被应用在计划的最后一步。\n\n**清单 9-10.** CBO\
    \ 查询转换与函数执行（PL/SQL 函数的投影）\n\n```text\n----------------------------------------------------\n\
    | Id  | Operation                     | Name       |\n----------------------------------------------------\n\
    |   0 | SELECT STATEMENT              |            |\n|   1 |   HASH GROUP BY\
    \               |            |\n|   2 |    HASH JOIN                  |      \
    \      |\n|   3 |     PART JOIN FILTER CREATE   | :BF0000    |\n|   4 |      TABLE\
    \ ACCESS FULL        | TIMES      |\n|   5 |     HASH JOIN                 | \
    \           |\n|   6 |      TABLE ACCESS FULL        | CUSTOMERS  |\n|   7 | \
    \     PARTITION RANGE JOIN-FILTER|            |\n|   8 |       TABLE ACCESS FULL\
    \       | SALES      |\n----------------------------------------------------\n\
    \nColumn Projection Information (identified by operation id):\n-----------------------------------------------------------\n\
    \n   1 - \"T\".\"CALENDAR_YEAR\"[NUMBER,22],\n       \"FORMAT_CUSTOMER_NAME\"\
    (\"CUST_FIRST_NAME\",\"CUST_LAST_NAME\")[4000],\n       SUM(\"S\".\"AMOUNT_SOLD\"\
    )[22], SUM(\"S\".\"QUANTITY_SOLD\")[22]\n   2 - (#keys=1) \"T\".\"CALENDAR_YEAR\"\
    [NUMBER,22],\n       \"CUST_LAST_NAME\"[VARCHAR2,40], \"CUST_FIRST_NAME\"[VARCHAR2,20],\n\
    \       \"S\".\"AMOUNT_SOLD\"[NUMBER,22], \"S\".\"QUANTITY_SOLD\"[NUMBER,22]\n\
    \   3 - \"T\".\"TIME_ID\"[DATE,7], \"T\".\"TIME_ID\"[DATE,7],\n       \"T\".\"\
    CALENDAR_YEAR\"[NUMBER,22]\n   4 - \"T\".\"TIME_ID\"[DATE,7], \"T\".\"CALENDAR_YEAR\"\
    [NUMBER,22]\n   5 - (#keys=1) \"CUST_LAST_NAME\"[VARCHAR2,40],\n       \"CUST_FIRST_NAME\"\
    [VARCHAR2,20], \"S\".\"AMOUNT_SOLD\"[NUMBER,22],\n       \"S\".\"TIME_ID\"[DATE,7],\
    \ \"S\".\"QUANTITY_SOLD\"[NUMBER,22]\n   6 - \"CUST_ID\"[NUMBER,22], \"CUST_FIRST_NAME\"\
    [VARCHAR2,20],\n       \"CUST_LAST_NAME\"[VARCHAR2,40]\n   7 - \"S\".\"CUST_ID\"\
    [NUMBER,22], \"S\".\"TIME_ID\"[DATE,7],\n       \"S\".\"QUANTITY_SOLD\"[NUMBER,22],\
    \ \"S\".\"AMOUNT_SOLD\"[NUMBER,22]\n   8 - \"S\".\"CUST_ID\"[NUMBER,22], \"S\"\
    .\"TIME_ID\"[DATE,7],\n       \"S\".\"QUANTITY_SOLD\"[NUMBER,22], \"S\".\"AMOUNT_SOLD\"\
    [NUMBER,22]\n```\n\n视图合并、子查询非嵌套以及其他复杂的查询转换并不是唯一可能影响 PL/SQL 函数执行次数的 CBO 相关问题。CBO\
    \ 也可以自由忽略你的表或谓词列出的顺序（尽管对于后者有一个显著的例外，专门针对 PL/SQL 函数，我稍后会描述）。连接和谓词的排序会对执行计划每一步的基数产生巨大影响；这反过来可能会导致你的\
    \ PL/SQL 函数执行次数比你预期的更多，或者更少。\n"
- fmt: "##### 内部优化\n\n除了众多的 CBO 优化之外，Oracle 数据库还具有一系列在运行时应用的内部优化，试图揣测这些优化的行为往往徒劳无功。它们不仅可能随着数据库版本而变化，还可能取决于多种因素，其中一些您可以推导出来，而另一些则对您隐藏。\n\
    \nOracle 数据库对 `DETERMINISTIC` 函数的优化就是这样一个例子。因为根据定义，确定性函数对于特定的输入值总是返回相同的结果，所以如果遇到相同的输入，Oracle\
    \ 数据库可以避免重新执行 PL/SQL 函数。然而，这种优化的效率取决于其他因素，例如数据类型、数据长度、基数（即不同值的数量）、数据库版本，甚至环境设置（如数组提取大小）。关于这些因素如何导致函数执行次数大幅变化的精彩讨论，请参阅\
    \ Dom Brooks 在 [`http://orastory.wordpress.com`](http://orastory.wordpress.com)\
    \ 上的“*Determining Deterministic*”系列文章。\n\n当 PL/SQL 函数调用被封装在标量子查询中时（一种减少函数在 SQL\
    \ 中影响的常用技术，我将在本章后面演示），也会看到类似的行为。虽然标量子查询缓存似乎比确定性函数的优化更有效，但它仍然依赖于一些相同的因素（如数据类型、长度和顺序），此外还取决于内部缓存的大小（因数据库版本而异）。更深入地描述支持标量子查询缓存的内部哈希表，请参阅\
    \ Jonathan Lewis 的 *Cost-Based Oracle Fundamentals* (Apress, 2005)。这个哈希表相当小的事实意味着，除了最简单的输入值集合外，冲突（即缓存“未命中”）几乎不可避免。由于您无法预测这些冲突何时发生，因此您应该接受这样一个事实：使用标量子查询缓存通常可以获得*一些*好处，但无法精确量化其程度。\n\
    \n#### 次优数据访问\n\n当 PL/SQL 函数包含 SQL 语句时会发生什么？在大多数大型数据库应用程序中都可以找到一种极其常见的设计模式，即将\
    \ SQL 查询包装在 PL/SQL 函数中。通常，此类“getter”函数背后的原则是合理的（即封装常见查找、可重用的数据访问方法等），但此类设计决策的性能影响可能是毁灭性的，尤其是当\
    \ PL/SQL 函数从 SQL 语句中调用时。\n\n当 SQL 语句被包装在 PL/SQL 函数中并从 SQL 查询调用时，上下文切换的成本会自动加倍——现在在函数内部和外部都会发生。然而，更关键的是，通过将\
    \ SQL 查询包装在函数中，如果查询位于调用 SQL 语句的主体中，CBO 本可以拥有的优化选择实际上被禁用了。这对您的查询经过时间可能产生严重影响（可以说，在这些场景下，上下文切换的成本相形见绌）。\n\
    \n考虑 [清单 9-11](#Chapter09.html#list_9_11) 中的示例。我有一个 PL/SQL 函数，它返回给定日期两种货币之间的汇率。请注意，为了示例的目的，我故意保持了简单性。\n\
    \n***清单 9-11.** 将 SQL 查询封装在 PL/SQL 函数中（创建 PL/SQL 函数）*\n\n```sql\nSQL> CREATE FUNCTION\
    \ get_rate(\n  2                    p_rate_date IN rates.rate_date%TYPE,\n  3\
    \                    p_from_ccy  IN rates.base_ccy%TYPE,\n  4                \
    \    p_to_ccy    IN rates.target_ccy%TYPE\n  5                    ) RETURN rates.exchange_rate%TYPE\
    \ AS\n  6     v_rate rates.exchange_rate%TYPE;\n  7  BEGIN\n  8     SELECT exchange_rate\
    \ INTO v_rate\n  9     FROM   rates\n 10     WHERE  base_ccy   = p_from_ccy\n\
    \ 11     AND    target_ccy = p_to_ccy\n 12     AND    rate_date  = p_rate_date;\n\
    \ 13     RETURN v_rate;\n 14  END get_rate;\n 15  /\nFunction created.\n```\n\n\
    在[清单 9-12](#Chapter09.html#list_9_12) 所示的按产品和日历年份的销售报告中，我使用了此函数来计算以 GBP 和 USD\
    \ 计价的收入。请注意，我使用了 Autotrace 来抑制结果集，并启用了 SQL*Plus 计时器。\n\n***清单 9-12.** 将 SQL 查询封装在\
    \ PL/SQL 函数中（使用 PL/SQL 的 SQL）*\n\n```sql\nSQL> SELECT t.calendar_year\n  2  ,\
    \      p.prod_name\n  3  ,      SUM(s.amount_sold)                           \
    \           AS amt_sold_usd\n  4  ,      SUM(s.amount_sold * get_rate(s.time_id,\
    \ 'USD', 'GBP')) AS amt_sold_gbp\n  5  FROM   sales     s\n  6  ,      products\
    \  p\n  7  ,      times     t\n  8  WHERE  s.prod_id = p.prod_id\n  9  AND   \
    \ s.time_id = t.time_id\n 10  GROUP  BY\n 11         t.calendar_year\n 12  , \
    \     p.prod_name\n 13  ;\n\n272 rows selected.\n\nElapsed: 00:01:05.71\n```\n\
    \n这个查询的经过时间大约是 66 秒——对于一个少于 100 万行的聚合查询来说，这是一个糟糕的响应时间。此语句的 Autotrace 输出见[清单 9-13](#Chapter09.html#list_9_13)。\n\
    \n***清单 9-13.** 将 SQL 查询封装在 PL/SQL 函数中（使用 PL/SQL 的 SQL 的 Autotrace 输出）*\n\n```sql\n\
    Statistics\n----------------------------------------------------------\n     918848\
    \  recursive calls\n         12  db block gets\n    1839430  consistent gets\n\
