  trans: '### 何时进行分析？


    分析代码的整个目的，是为了理解你的代码。绝大多数使用这些分析工具的人（至少那些向我询问如何使用这些工具的人），都是在紧要关头才使用：一次升级失败、用户抱怨数据库缓慢、一个似乎隐藏起来的棘手逻辑错误。


    如同性能调优一样，代码分析可以在出问题时被召唤。但您难道不认为，一个为性能而设计的系统，更少可能在半夜把您吵醒吗？对于一个经过良好分析、符合标准的系统也是如此：无论是静态（人工或自动化）还是动态分析。这两种分析都应该建立基线。


    分析应该在编写应用程序时（或在您接手它时）进行。我毫不怀疑每个人都熟悉代码评审。如前所述，代码评审（或同行评审）是一种人力驱动的静态分析。而 Oracle
    提供的自动化分析（尤其是 `PL/Scope`）应被视为代码评审的延伸。


    这种生产前分析/评审应当被记录、进行版本控制并保留。自动化分析作为数据字典视图中的数据，非常容易存档，并且可以在需要时随时召回（尽管您需要自己构建该功能）。随着每一次变更，都需要收集并保存分析的新版本。除了保存分析结果，您还需要查看它。您真的应该研究它。


    通过静态分析（正如在讨论数据字典和 `PL/SCOPE` 时所提到的），您将理解代码的依赖关系、代码使用的标识符，以及这些标识符在何处/如何被使用。通过动态分析，您可以看到代码中的瓶颈（可修复或不可修复）；您可以了解不同的输入数据如何改变代码的执行轮廓；您可以验证代码覆盖率；等等。


    使用各种工具提供的报告（或您自己用 SQL 编写的），您将为调试任何可能在半夜出现的问题打下良好基础。您还将拥有可以与新开发人员共享的文档（或用来说服管理层您确实在做工作）。


    一旦您的代码投入生产，您将能够利用旧信息来验证一切是否仍按预期运行。在开发过程中，您将使用性能分析器持续验证您的代码是否工作正确，无论是从代码路径角度还是性能角度。无需将每次分析器运行都保存到版本控制系统，但您应该保存在每次实施或升级前运行的版本。


    ### 代码分析与插桩


    有时会在分析与插桩之间产生混淆。术语 `插桩` 指的是为支持分析（特别是动态分析）而添加到系统中的代码。插桩使分析成为可能，但它本身并不是分析。


    要决定应用程序需要哪种插桩（以及它是否需要插桩）或进行任何性能调优，您都必须（在某种程度上）分析代码。性能分析器是一种插桩，对于调优很有价值。同样地，理解应用程序或代码库的性能轮廓对于真正理解您的代码至关重要。应用程序将如何处理各种负载、数据输入等等？这些问题的答案是您在分析过程中想要捕捉的一些东西。


    我讲这些是为了说明，没有哪种分析是在真空中完成的。执行代码分析是为了确保符合您想要遵循或被迫遵循的标准。一个无法运行的程序毫无价值。一个无法维护的程序同样毫无价值。在程序的生命周期中，绝大多数时间（和金钱）都将花在维护上。可维护性是在设计时决定的。


    插桩是一种工具，在应用程序的整个生命周期中使用，用于记录有趣的信息。代码分析是一种工具，在程序投入生产运行之前，提供关于程序的有趣信息。两者对于成功、高性能、可维护的应用程序都至关重要。


    ### 执行静态分析


    您可以使用两种资源来执行静态分析。首先，您可以使用数据字典。每个数据库，无论版本如何，都实现了一个数据字典，您可以从中获得的信息对于分析您的代码非常有帮助。字典是您的第一道防线，并且它始终可用。


    如果您运行的是 Oracle Database 11g 或更高版本，您还可以使用一个名为 `PL/Scope` 的功能。它使您能够看到原本无法从数据字典获得的编译时数据。我将在接下来的两个小节中讨论这两种资源——数据字典和
    `PL/Scope`。


    #### 数据字典


    既然您在阅读本书，我假设您至少对 Oracle 的数据字典有些了解。如果不是，您可能在职业生涯的这个阶段阅读本章还为时过早。我不打算解释数据字典是什么；有很多其他书籍涵盖了这个主题。


    但是，我将讨论与理解您的代码相关的视图。我不讨论 `DBA_*`、`ALL_*` 和 `USER_*` 的区别。在本次讨论中我将使用 `USER_*`，但您可以假定对应的
    `ALL` 和 `DBA` 版本也存在。同样，我不会对这些视图做大量的 describe 操作。我将仅涵盖与本次讨论相关的列。


    ![images](img/square.jpg) `注意` 我提供的示例使用了部分字符串和字符串格式。在真实场景中，实现这些示例所示概念时，诸如 select
    条件、where 子句中的内容、格式字符串等，应该存在于表中，而不是硬编码。为简洁起见，我将这些值硬编码到示例中。此外，在真实实现中，您可能会使用正则表达式来缩小查询结果范围。然而，我坚持使用常规的
    PL/SQL 函数，因为大多数读者会更熟悉它们。


    如果您编译了本章提供的示例代码（可从本书在 `apress.com` 的目录页面获取），您将拥有我将作为示例结果展示的基本程序集。如果您拥有该代码，将更容易跟随正文。不过，如果您在自己的模式上运行它，看看会得到什么结果，可能会更有趣。'
- fmt: "## USER_SOURCE\n\n自PL/SQL还只是石刻的时代就已存在，`USER_SOURCE`视图非常简单，就是你的代码的逐行列表。如果你想浏览或导出代码（有点像手动查看），`USER_SOURCE`就是适合你的视图。我曾使用这些数据对一段代码进行逆向工程（现在`DBMS_METADATA`是更好的方法），并且我经常使用它来快速分析某个对象在何处被使用。它非常简单，就是源代码的逐行副本。\n\
    \n以下是一个使用`USER_SOURCE`提取包含特定内容（本例中为“`jobs_api.validate_job`”）的代码行的示例：\n\n```sql\n\
    SELECT name, line\n  FROM user_source\n  WHERE lower(text) like '%jobs_api.validate_job%';\n\
    ```\n\n```\nNAME                           LINE\n------------------------------\
    \ ----------------------\nEMPLOYEE_API                   40\nTEST_CALLS_FNC  \
    \                5\nTEST_CALLS_PRC                  4\nTEST_CALLS_PRC        \
    \          8\n```\n\n这个查询曾经是数据库中代码分析的基本方法。它仍然适用于对数据库进行快速查找，但如果你看看这种查询的用例，你会发现通过使用其他视图可以获得更好的信息。\n\
    \n示例中的查询试图查找所有调用`JOBS_API.VAIDATE_JOB`程序单元的程序。不幸的是，该查询也会返回所有在注释中包含“`jobs_api.validate_job`”的调用。`USER_SOURCE`的主要问题在于它只是一个列表。我需要解析代码以丢弃注释（当你逐行查看代码时，注释可能隐藏在`/*\
    \ */`中），而且我需要解析和分离各种类型的变量、可执行语句等，以便从结果中获得任何真正的信息。我个人不想维护自己的PL/SQL解析器。\n\n## USER_DEPENDENCIES\n\
    \n当你想查看谁调用了谁时，`USER_DEPENDENCIES`是更好的方法。不幸的是，该视图粒度不够细，并且不允许动态依赖关系，例如`DBMS_SQL`或本地动态SQL。分析人员必须具备特定的代码知识或手动审查代码。以下查询和结果显示了当前模式中的代码在何处引用了`JOBS_API`包：\n\
    \n```sql\nSELECT name, type\nFROM user_dependencies\nWHERE referenced_name = 'JOBS_API';\n\
    ```\n\n```\nNAME                           TYPE\n------------------------------\
    \ ------------------\nTEST_CALLS_PRC                 PROCEDURE\nTEST_CALLS_FNC\
    \                 FUNCTION\nJOBS_API                       PACKAGE BODY\nEMPLOYEE_API\
    \                   PACKAGE BODY\n```\n\n通过这些结果，你可以确切地看到哪些程序单元真正在调用`JOBS_API`，但该视图只在包级别提供。你不知道包内的哪个过程发出了调用，也不知道程序单元被调用了多少次。\n\
    \n![images](images/square.jpg) **注意** Oracle正在添加细粒度依赖关系，未来可能会提供一个视图来给我们缺失的细粒度详细信息。\n\
    \n我讨论的其余视图都是使用存储在`USER_SOURCE`视图中的源代码（由编译器在编译时）创建的。要查看实际代码（在分析代码时经常需要），你可以回连到这个视图。\n\
    \n## USER_PROCEDURES\n\n对于许多目的，`USER_PROCEDURES`视图是比`USER_SOURCE`更好的了解一段代码的视图。该视图将提供有关代码的编译详细信息，例如它是何种类型的程序（函数、过程、包等），以及它是否是聚合的、确定性的等。可以说，与代码分析相关的最重要特性是，你可以将`USER_PROCEDURES`与下一节讨论的字典视图`USER_ARGUMENTS`结合起来，以获取程序所用参数的详细信息。\n\
    \n`USER_PROCEDURES`视图是分层的，因此你不仅可以识别所有程序，还可以识别包中存在哪些过程和函数。你还可以在此视图中看到实现方法的对象类型（关于对象和方法稍后详述）。\n\
    \n与`USER_ARGUMENTS`一样，`USER_PROCEDURES`包含与数据库中任何代码对象相关的信息。这意味着你可以找到与包、过程、函数、触发器和类型相关的信息。我将这些代码对象统称为程序和程序单元。我后面介绍的其他数据字典视图也是如此。\n\
    \n`USER_PROCEDURES`一开始可能有点令人困惑。`OBJECT_NAME`列标识对象。除非你查看的是存在于另一个对象（`PACKAGE`或`TYPE`）命名空间内的对象，否则`PROCEDURE_NAME`为空。例如，当你从`USER_PROCEDURES`中选择数据时，对于独立过程或函数，`PROCEDURE_NAME`将为空，而`OBJECT_NAME`将是该过程或函数的名称。对于包或类型，`PROCEDURE_NAME`将为空（对于包或类型对象），而`OBJECT_NAME`将是包或类型的名称。但是，每个包或类型在视图中还会有另一个条目，对应于每个函数、过程或方法。在这种情况下，`OBJECT_NAME`将是包的名称，`PROCEDURE_NAME`将是过程或函数（对于对象类型是方法）的名称。\n\
    \n以下查询显示，即使对象是一个过程，`PROCEDURE_NAME`列也为空。这是因为过程名称仅对包含多个程序单元（如包和类型）的对象进行填充。\n\n\
    ```sql\nselect object_name, procedure_name, object_type\n  from user_procedures\n\
    \  where object_name = 'SECURE_DML';\n```\n\n```\nOBJECT_NAME     PROCEDURE_NAME\
    \    OBJECT_TYPE\n--------------- ----------------- -------------------\nSECURE_DML\
    \                        PROCEDURE\n```\n\n另一方面，下一个查询显示，如果一个对象是包或类型，`OBJECT_NAME`是包的名称，`PROCEDURE_NAME`将包含包内过程或函数的名称：\n\
    \n```sql\nselect object_name, procedure_name, object_type\n  from user_procedures\n\
    \  where object_name = 'DEPARTMENTS_API';\n```\n\n```\nOBJECT_NAME      PROCEDURE_NAME\
    \          OBJECT_TYPE\n---------------- ----------------------- -------------------\n\
    DEPARTMENTS_API  DEPARTMENT_EXISTS       PACKAGE\nDEPARTMENTS_API  DEPARTMENT_MANAGER_ID\
    \   PACKAGE\nDEPARTMENTS_API  DEPARTMENT_MANAGER_ID   PACKAGE\nDEPARTMENTS_API\
    \                          PACKAGE\n```\n\n如果一个对象是用户定义聚合或管道函数的实现，`IMPLTYPEOWNER`和`IMPLTYPENAME`将是其底层基类型。下一个查询显示，内置聚合函数`SYS_NT_COLLECT`是实现一个类型的函数示例，而内置的`DM_CL_BUILD`是实现一个类型的管道函数。\n\
    \n```sql\nselect object_type, aggregate, pipelined, impltypeowner, impltypename\n\
    \  from all_procedures\n  where owner = 'SYS'\n    and (object_name = 'SYS_NT_COLLECT'\n\
    \        or\n        object_name = 'DM_CL_BUILD');\n```"
  raw: '##### USER_SOURCE


    Around since PL/SQL was just a carving in stone, the USER_SOURCE view is very
    simply a line-by-line listing of your code. If you want to browse or export your
    code (kind of like that manual eyeballing), USER_SOURCE is the view for you. I
    have used this data for reversing engineering a piece of code (DBMS_METADATA is
    a better way now) and I frequently use it for a quick analysis of where an object
    is used. It is, very simply, a line-by-line copy of the course code.


    The following is an example of using USER_SOURCE to extract lines of code that
    contain specific content, in this case “jobs_api.validate_job”:


    `SELECT name, line`

    `  FROM user_source`

    `  WHERE lower(text) like ''%jobs_api.validate_job%'';`


    `NAME                           LINE`

    `------------------------------ ----------------------`

    `EMPLOYEE_API                   40`

    `TEST_CALLS_FNC                 5`

    `TEST_CALLS_PRC                 4`

    `TEST_CALLS_PRC                 8`


    This query was once the basic method of code analysis in the database. It still
    works for a fast lookup against the database but if you look at the use case of
    a query like this, you''ll see that you can get even better information by using
    other views.


    The query in the example is an attempt to find all programs that invoke the JOBS_API.VAIDATE_JOB
    program unit. Unfortunately, the query will also return all calls that include
    “jobs_api.validate_job” in a comment. The primary problem with USER_SOURCE is
    that it is just a listing. I would need to parse the code to throw away comments
    (which can be hidden within /* */ when you look at the code line by line), and
    I would need to parse and separate the various type of variables, executable statements,
    and more to get any real intelligence from the results. I personally don''t want
    to maintain my own PL/SQL parser.


    ##### USER_DEPENDENCIES


    USER_DEPENDENCIES is a better approach when you want to see who is calling whom.
    Unfortunately, the view is not at a very granular level and does not allow for
    dynamic dependencies such as DBMS_SQL or native dynamic SQL. An analyst would
    have to have specific knowledge of the code or review the code manually. The following
    query and results show where the JOBS_API package is being reference by the code
    in the current schema:


    `SELECT name, type`

    `FROM user_dependencies`

    `WHERE referenced_name = ''JOBS_API'';`


    `NAME                           TYPE`

    `------------------------------ ------------------`

    `TEST_CALLS_PRC                 PROCEDURE`

    `TEST_CALLS_FNC                 FUNCTION`

    `JOBS_API                       PACKAGE BODY`

    `EMPLOYEE_API                   PACKAGE BODY`


    With these results, you see exactly which program units are really calling the
    JOBS_API, but the view only provides it at the package level. You have no idea
    which procedure within the package is making the call nor do you know how many
    times the program unit is being called.


    ![images](images/square.jpg) **Note** Oracle is adding fine-grained dependencies
    and may, in the future, make a view available to give us the missing granular
    level details that we would like.


    The rest of the views that I discuss have been created using the source that is
    stored in the USER_SOURCE view (by the compiler at compile time). To see the actual
    code, which is required frequently when analyzing the code, you can join back
    to this view.


    ##### USER_PROCEDURES


    For many purposes, a view that is better than USER_SOURCE for getting to know
    a piece of code is the USER_PROCEDURES view. This view will give you compilation
    details about your code, such as what type of program it is (function, procedure,
    package, etc.), and if it is an aggregate, deterministic, etc. Arguably the most
    important feature related to code analysis is that you can combine USER_PROCEDURES
    with the dictionary view USER_ARGUMENTS discussed in the next section to get detailed
    information about the parameters used by a program.


    The USER_PROCEDURES view is hierarchical so that not only can you identify all
    of your programs, you can identify which procedures and functions exist within
    a package. You can also see object types that implement methods in this view (more
    on objects and methods later).


    USER_PROCEDURES, like USER_ARGUMENTS, contains information related to any code
    objects in the database. That means you can find information related to packages,
    procedures, functions, triggers, and types. I refer to these code objects generically
    as programs and program units. The same is true of the additional data dictionary
    views that I cover later.


    USER_PROCEDURES can be a little confusing at first. The OBJECT_NAME column identifies
    the object. PROCEDURE_NAME is null unless you are looking at an object that exists
    within the namespace of another object (PACKAGE or TYPE). For example, when you
    select data from USER_PROCEDURES, PROCEDURE_NAME will be null for a standalone
    procedure or function while OBJECT_NAME will be the name of the procedure or function.
    For a package or a type, PROCEDURE NAME will be null (for the package or type
    object) and OBJECT_NAME will be the name of the package or type. However, each
    package or type will have another entry in the view for each function, procedure,
    or method. In this case, the OBJECT_NAME will be the name of the package and the
    PROCEDURE_NAME will be the name of the procedure or function (method for an object
    type).


    The following query shows that the PROCEDURE_NAME column is null even though the
    object is a procedure. This is due to the fact that procedure name is only populated
    for objects containing multiple program units (such as packages and types).


    `select object_name, procedure_name, object_type`

    `  from user_procedures`

    `  where object_name = ''SECURE_DML'';`


    `OBJECT_NAME     PROCEDURE_NAME    OBJECT_TYPE`

    `--------------- ----------------- -------------------`

    `SECURE_DML                        PROCEDURE`


    On the other hand, the next query shows that if an object is a package or type,
    OBJECT_NAME is the name of the package and PROCEDURE_NAME will have the name of
    the packaged procedure or function:


    `select object_name, procedure_name, object_type`

    `  from user_procedures`

    `  where object_name = ''DEPARTMENTS_API'';`


    `OBJECT_NAME      PROCEDURE_NAME          OBJECT_TYPE`

    `---------------- ----------------------- -------------------`

    `DEPARTMENTS_API  DEPARTMENT_EXISTS       PACKAGE`

    `DEPARTMENTS_API  DEPARTMENT_MANAGER_ID   PACKAGE`

    `DEPARTMENTS_API  DEPARTMENT_MANAGER_ID   PACKAGE`

    `DEPARTMENTS_API                          PACKAGE`


    If an object is an implementation of a user defined aggregate or a pipelined function,
    the IMPLTYPEOWNER and IMPLTYPENAME will be of the base type below the aggregate.
    The next query shows that the built-in aggregate function SYS_NT_COLLECT is an
    example of a function that is an implementation of a type while the built-in DM_CL_BUILD
    is a pipelined function that implements a type.


    `select object_type, aggregate, pipelined, impltypeowner, impltypename`

    `  from all_procedures`

    `  where owner = ''SYS''`

    `    and (object_name = ''SYS_NT_COLLECT''`

    `        or`

    `        object_name = ''DM_CL_BUILD'');`'
