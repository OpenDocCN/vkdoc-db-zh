- fmt: "## How It Works\n\nILO is very easy to use. You mark the beginning and end\
    \ of each task with a single line of code, giving each task a module and action\
    \ name. Think of the action as the name of the task itself and the module as the\
    \ part of the application that the task represents.\n\nMarking the beginning of\
    \ any task is as simple as making a procedure call and including the values for\
    \ module, action, and comment. When marking the end of a task, you again make\
    \ a simple procedure call. Be sure to include all possible exit points of the\
    \ marked task including any EXCEPTION sections in your code. For example:\n\n\
    ```sql\nDECLARE\n  l_sqlcode NUMBER;\n  l_sqlerrm VARCHAR2(512);\nBEGIN\n   ilo_task.begin_task(module\
    \  => 'Load Transaction Tables',\n                       action  => 'Begin overall\
    \ load',\n                       comment => 'Execution of procedure all_trx_table_loads');\n\
    \n   ... code for your task goes here\n\n   ilo_task.end_task;\nEXCEPTION\n  \
    \ WHEN ex_insert_problem THEN\n      l_sqlcode := SQLCODE;\n      l_sqlerrm :=\
    \ SQLERRM;\n      ilo_task.end_task(error_num => l_sqlcode);\n      ... handle\
    \ the exception\n   WHEN others THEN\n      l_sqlcode := SQLCODE;\n      l_sqlerrm\
    \ := SQLERRM;\n      ilo_task.end_task(error_num => l_sqlcode);\n      … handle\
    \ the exception\nEND;\n```\n\n![images](images/square.jpg) **Tip** `SQLCODE` and\
    \ `SQLERRM` are active at all times in the EXCEPTION section of your code. If\
    \ your exception handling raises another exception, the original `SQLCODE` will\
    \ be replaced by the new error. Note that almost any line of code can cause an\
    \ exception to be raised. Before referencing these built-ins, save the contents\
    \ in local variables. Your logging and instrumentation procedures should then\
    \ use the local variables to document the correct error. Also note that ILO exception\
    \ handling is configurable. By default, ILO procedures will suppress their own\
    \ exceptions to avoid affecting production code negatively.\n\nThe enabling and\
    \ disabling of extended SQL tracing should be performed at application runtime,\
    \ long after the developer's involvement in the project has completed. The `ilo_task.begin_task`\
    \ call checks to see whether someone has expressed the intent to trace a specific\
    \ module/action pair by calling `ilo_timer.get_config`. This procedure determines\
    \ which tasks should be traced, and is usually customized at each ILO installation.\n\
    \nA developer who wishes to unit test his code can call the special procedure\
    \ `ilo_timer.set_mark_all_tasks_interesting(TRUE,TRUE);` to override the normal\
    \ `ilo_timer.get_config` processing, but calls to this procedure are typically\
    \ not going to be present in production code unless they are implemented as menu\
    \ options (for example, Help ![images](images/U001.jpg) Debug ![images](images/U001.jpg)\
    \ Trace All). The greatest benefit of using ILO is that the choice of tracing\
    \ is a precisely controlled runtime decision. Instead of manual intervention by\
    \ a DBA to turn on trace for a session, ILO provides the mechanism for expressing\
    \ the intent to turn on trace from the application and task specific tracing to\
    \ occur without intervention.\n\n## Example\n\nA common use for PL/SQL code is\
    \ in DML triggers that handle multiple code paths. In the following example, the\
    \ trigger performs different actions depending on whether the originating DML\
    \ was an insert or an update. Good instrumentation should not only inform you\
    \ of code coverage but also help you to measure the right thing.\n\n```sql\nCREATE\
    \ OR REPLACE TRIGGER insert_or_update_example\n    INSTEAD OF INSERT OR UPDATE\
    \ ON table_abc\nDECLARE\n  v_storage_value VARCHAR2(32000);\n  l_sqlcode     \
    \  NUMBER;\nBEGIN\n  IF INSERTING THEN\n    ilo_task.begin_task(module => 'Table_ABC',\n\
    \                        action => 'Instead of insert',\n                    \
    \    comment => 'Insert or Update Trigger on Table_ABC');\n    example_package.create_value\n\
    \    (p_value_name     => :NEW.value_name\n     ,p_value         => :NEW.value\n\
    \     ,p_description   => :NEW.description\n     ,p_storage_value => v_storage_value\n\
    \    );\n    example_package.setup_something_else\n    (p_storage_value => v_storage_value\n\
    \    );        \n  ELSIF UPDATING THEN\n    example_package.update_value\n   \
    \ (p_value_name     => :NEW.value_name\n     ,p_value         => :NEW.value\n\
    \     ,p_description   => :NEW.description\n     ,p_storage_value => v_storage_value\n\
    \    );        \n  ENDIF;\n  ilo_task.end_task;\nEXCEPTION WHEN OTHERS THEN\n\
    \  l_sqlcode := SQLCODE;\n  ilo_task.end_task(error_num => l_sqlcode);\n  ...\
    \ handle the exception\nEND;\n```\n\nAssuming that you have already instrumented\
    \ the individual program units in the `example_package`, you might think further\
    \ instrumentation is overkill in this trigger. But if your goal for instrumentation\
    \ is to provide the right performance metric for testing and for diagnosing performance\
    \ problems, then this instrumentation is critical.\n\nOne of the many benefits\
    \ of using ILO is that the library correctly handles nesting of module/action\
    \ pairs. Imagine what would happen to the module and action if that weren't the\
    \ case. The last procedure or function that sets the values gets the blame for\
    \ all the time spent until the values are set again, and you lose visibility to\
    \ the actual response time of that task.\n\n## Problem Diagnosis\n\nHow should\
    \ you solve performance problems? When something takes too long, ask one question:\
    \ “Where did my time go?” That's Method R.\n\n### Method R\n\n“Method R” is the\
    \ name that Cary Millsap and Jeff Holt unassumingly called their four-step method\
    \ for diagnosing and repairing performance problems, documented in the book *Optimizing\
    \ Oracle Performance* (O'Reilly, 2003). The “R” stands for response time, in contrast\
    \ to the conventional approach, which they called “Method C.”\n\nMethod R prescribes\
    \ four simple steps.\n\n*   Identify the task that's most important to you.\n\
    *   Measure its response time in detail.\n*   Optimize that response time in the\
    \ most economically efficient way.\n*   Repeat until your system is economically\
    \ optimal.\n\nIt's the act of optimizing software like you optimize anything else\
    \ in life.\n\n#### Step 1: Identify\n\n***Identify*** the task that's the most\
    \ important to you. Ask the business stakeholder of your software the following\
    \ questions:\n\n*   What slowly performing business task is most negatively impacting\
    \ the business?\n*   Which task would be nicest to fix first?\n\nInevitably, you\
    \ will get an answer of many tasks that are all of utmost priority. Don't panic,\
    \ though, this is not unexpected. Simply ask this follow-up question: “If all\
    \ of these tasks are of equal priority, then can we start with task X?”\n\nYou\
    \ will either get agreement or clarification. Maybe task Y really does need to\
    \ be addressed first. In either case, the key is to pick ***one*** task and move\
    \ on to the next step of Method R. If the entire system really is slow, and a\
    \ single underlying cause exists, then addressing any slow task will quickly lead\
    \ to that underlying cause. Fixing the performance problems for that task will\
    \ then benefit the rest of the system as well.\n\nIf, instead, that task has a\
    \ unique underlying cause, then you'll waste no time in solving the problem, since\
    \ you started with a task known to be important to the business. The key to any\
    \ process or method is getting started correctly. As Mary Poppins said, quoting\
    \ Aristotle:\n\n> *Well begun is half done.*\n>\n> —Aristotle"
  raw: "##### How It Works\n\nILO is very easy to use. You mark the beginning and\
    \ end of each task with a single line of code, giving each task a module and action\
    \ name. Think of the action as the name of the task itself and the module as the\
    \ part of the application that the task represents.\n\nMarking the beginning of\
    \ any task is as simple as making a procedure call and including the values for\
    \ module, action, and comment. When marking the end of a task, you again make\
    \ a simple procedure call. Be sure to include all possible exit points of the\
    \ marked task including any EXCEPTION sections in your code. For example:\n\n\
    `DECLARE`\n`  l_sqlcode NUMBER;`\n`  l_sqlerrm VARCHAR2(512);`\n`BEGIN`\n`   ilo_task.begin_task(module  =>\
    \ 'Load Transaction Tables',`\n`                       action  => 'Begin overall\
    \ load',`\n`                       comment => 'Execution of procedure all_trx_table_loads');`\n\
    \n`   ... code for your task goes here`\n\n`   ilo_task.end_task;`\n`EXCEPTION`\n\
    `   WHEN ex_insert_problem THEN`\n`      l_sqlcode := SQLCODE;`\n`      l_sqlerrm\
    \ := SQLERRM;`\n`      ilo_task.end_task(error_num => l_sqlcode);`\n`      ...\
    \ handle the exception`\n`   WHEN others THEN`\n`      l_sqlcode := SQLCODE;`\n\
    `      l_sqlerrm := SQLERRM;`\n`      ilo_task.end_task(error_num => l_sqlcode);`\n\
    `      … handle the exception`\n`END;`\n\n![images](images/square.jpg) **Tip**\
    \ `SQLCODE` and `SQLERRM` are active at all times in the EXCEPTION section of\
    \ your code. If your exception handling raises another exception, the original\
    \ `SQLCODE` will be replaced by the new error. Note that almost any line of code\
    \ can cause an exception to be raised. Before referencing these built-ins, save\
    \ the contents in local variables. Your logging and instrumentation procedures\
    \ should then use the local variables to document the correct error. Also note\
    \ that ILO exception handling is configurable. By default, ILO procedures will\
    \ suppress their own exceptions to avoid affecting production code negatively.\n\
    \nThe enabling and disabling of extended SQL tracing should be performed at application\
    \ runtime, long after the developer's involvement in the project has completed.\
    \ The ilo_task.begin_task call checks to see whether someone has expressed the\
    \ intent to trace a specific module/action pair by calling ilo_timer.get_config.\
    \ This procedure determines which tasks should be traced, and is usually customized\
    \ at each ILO installation.\n\nA developer who wishes to unit test his code can\
    \ call the special procedure ilo_timer.set_mark_all_tasks_interesting(TRUE,TRUE);\
    \ to override the normal ilo_timer.get_config processing, but calls to this procedure\
    \ are typically not going to be present in production code unless they are implemented\
    \ as menu options (for example, Help ![images](images/U001.jpg) Debug ![images](images/U001.jpg)\
    \ Trace All). The greatest benefit of using ILO is that the choice of tracing\
    \ is a precisely controlled runtime decision. Instead of manual intervention by\
    \ a DBA to turn on trace for a session, ILO provides the mechanism for expressing\
    \ the intent to turn on trace from the application and task specific tracing to\
    \ occur without intervention.\n\n##### Example\n\nA common use for PL/SQL code\
    \ is in DML triggers that handle multiple code paths. In the following example,\
    \ the trigger performs different actions depending on whether the originating\
    \ DML was an insert or an update. Good instrumentation should not only inform\
    \ you of code coverage but also help you to measure the right thing.\n\n`CREATE\
    \ OR REPLACE TRIGGER insert_or_update_example`\n`    INSTEAD OF INSERT OR UPDATE\
    \ ON table_abc`\n`DECLARE`\n`  v_storage_value VARCHAR2(32000);`\n`  l_sqlcode       NUMBER;`\n\
    `BEGIN`\n`  IF INSERTING THEN`\n**`ilo_task.begin_task(module => 'Table_ABC',`**\n\
    **`action => 'Instead of insert',`**\n**`comment => 'Insert or Update Trigger\
    \ on Table_ABC');`**\n`    example_package.create_value`\n`    (p_value_name     =>\
    \ :NEW.value_name`\n`     ,p_value         => :NEW.value`\n`     ,p_description   =>\
    \ :NEW.description`\n`     ,p_storage_value => v_storage_value`\n`    );`\n`    example_package.setup_something_else`\n\
    `    (p_storage_value => v_storage_value`\n`    );        `\n`  ELSIF UPDATING\
    \ THEN`\n`    example_package.update_value`\n`    (p_value_name     => :NEW.value_name`\n\
    `     ,p_value         => :NEW.value`\n`     ,p_description   => :NEW.description`\n\
    `     ,p_storage_value => v_storage_value`\n`    );        `\n`  ENDIF;`\n**`ilo_task.end_task;`**\n\
    `EXCEPTION WHEN OTHERS THEN`\n`  l_sqlcode := SQLCODE;`\n**`ilo_task.end_task(error_num\
    \ => l_sqlcode);`**\n`  ... handle the exception`\n`END;`\n\nAssuming that you\
    \ have already instrumented the individual program units in the example_package,\
    \ you might think further instrumentation is overkill in this trigger. But if\
    \ your goal for instrumentation is to provide the right performance metric for\
    \ testing and for diagnosing performance problems, then this instrumentation is\
    \ critical.\n\nOne of the many benefits of using ILO is that the library correctly\
    \ handles nesting of module/action pairs. Imagine what would happen to the module\
    \ and action if that weren't the case. The last procedure or function that sets\
    \ the values gets the blame for all the time spent until the values are set again,\
    \ and you lose visibility to the actual response time of that task.\n\n### Problem\
    \ Diagnosis\n\nHow should you solve performance problems? When something takes\
    \ too long, ask one question: “Where did my time go?” That's Method R.\n\n####\
    \ Method R\n\n“Method R” is the name that Cary Millsap and Jeff Holt unassumingly\
    \ called their four-step method for diagnosing and repairing performance problems,\
    \ documented in the book *Optimizing Oracle Performance* (O'Reilly, 2003). The\
    \ “R” stands for response time, in contrast to the conventional approach, which\
    \ they called “Method C.”\n\nMethod R prescribes four simple steps.\n\n*   Identify\
    \ the task that's most important to you.\n*   Measure its response time in detail.\n\
    *   Optimize that response time in the most economically efficient way.\n*   Repeat\
    \ until your system is economically optimal.\n\nIt's the act of optimizing software\
    \ like you optimize anything else in life.\n\n##### Step 1: Identify\n\n***Identify***\
    \ the task that's the most important to you. Ask the business stakeholder of your\
    \ software the following questions:\n\n*   What slowly performing business task\
    \ is most negatively impacting the business?\n*   Which task would be nicest to\
    \ fix first?\n\nInevitably, you will get an answer of many tasks that are all\
    \ of utmost priority. Don't panic, though, this is not unexpected. Simply ask\
    \ this follow-up question: “If all of these tasks are of equal priority, then\
    \ can we start with task X?”\n\nYou will either get agreement or clarification.\
    \ Maybe task Y really does need to be addressed first. In either case, the key\
    \ is to pick ***one*** task and move on to the next step of Method R. If the entire\
    \ system really is slow, and a single underlying cause exists, then addressing\
    \ any slow task will quickly lead to that underlying cause. Fixing the performance\
    \ problems for that task will then benefit the rest of the system as well.\n\n\
    If, instead, that task has a unique underlying cause, then you'll waste no time\
    \ in solving the problem, since you started with a task known to be important\
    \ to the business. The key to any process or method is getting started correctly.\
    \ As Mary Poppins said, quoting Aristotle:\n\n> *Well begun is half done.*\n>\
    \ \n> —Aristotle"
  trans: "## 工作原理\n\nILO 非常易于使用。你用一行代码标记每个任务的开始和结束，为每个任务分配一个模块和操作名称。可以将操作视为任务本身的名称，而模块则代表该任务所对应的应用程序部分。\n\
    \n标记任何任务的开始，就像进行一次过程调用并包含模块、操作和注释的值一样简单。标记任务结束时，再次进行一次简单的过程调用。务必包含被标记任务的所有可能退出点，包括代码中的任何\
    \ `EXCEPTION` 部分。例如：\n\n```sql\nDECLARE\n  l_sqlcode NUMBER;\n  l_sqlerrm VARCHAR2(512);\n\
    BEGIN\n   ilo_task.begin_task(module  => '加载事务表',\n                       action\
    \  => '开始整体加载',\n                       comment => '执行过程 all_trx_table_loads');\n\
    \n   ... 你的任务代码放在这里\n\n   ilo_task.end_task;\nEXCEPTION\n   WHEN ex_insert_problem\
    \ THEN\n      l_sqlcode := SQLCODE;\n      l_sqlerrm := SQLERRM;\n      ilo_task.end_task(error_num\
    \ => l_sqlcode);\n      ... 处理异常\n   WHEN others THEN\n      l_sqlcode := SQLCODE;\n\
    \      l_sqlerrm := SQLERRM;\n      ilo_task.end_task(error_num => l_sqlcode);\n\
    \      … 处理异常\nEND;\n```\n\n![images](img/square.jpg) **提示** `SQLCODE` 和 `SQLERRM`\
    \ 在代码的 `EXCEPTION` 部分始终处于活动状态。如果你的异常处理引发了另一个异常，原始的 `SQLCODE` 将被新错误替换。请注意，几乎任何一行代码都可能引发异常。在引用这些内置函数之前，请将内容保存到局部变量中。然后，你的日志记录和插桩过程应使用这些局部变量来记录正确的错误。另请注意，ILO\
    \ 的异常处理是可配置的。默认情况下，ILO 过程会抑制自身异常，以避免对生产代码产生负面影响。\n\n扩展 SQL 跟踪的启用和禁用应在应用程序运行时执行，此时开发人员参与项目早已结束。`ilo_task.begin_task`\
    \ 调用会检查是否有人通过调用 `ilo_timer.get_config` 表达了跟踪特定模块/操作对的意图。该过程确定应跟踪哪些任务，通常在每个 ILO\
    \ 安装中都会进行定制。\n\n希望进行单元测试的开发人员可以调用特殊过程 `ilo_timer.set_mark_all_tasks_interesting(TRUE,TRUE);`\
    \ 来覆盖正常的 `ilo_timer.get_config` 处理，但对此过程的调用通常不会出现在生产代码中，除非它们是作为菜单选项实现的（例如，帮助 ![images](img/U001.jpg)\
    \ 调试 ![images](img/U001.jpg) 跟踪所有）。使用 ILO 的最大好处在于，跟踪的选择是一个精确控制的运行时决策。无需 DBA 手动干预来为会话开启跟踪，ILO\
    \ 提供了一种机制，可以从应用程序表达开启跟踪的意图，并在无需干预的情况下实现任务特定的跟踪。\n\n## 示例\n\nPL/SQL 代码的一个常见用途是处理多代码路径的\
    \ DML 触发器。在以下示例中，触发器根据原始 DML 是 `INSERT` 还是 `UPDATE` 执行不同的操作。良好的插桩不仅应告知你代码覆盖率，还应帮助你衡量正确的事务。\n\
    \n```sql\nCREATE OR REPLACE TRIGGER insert_or_update_example\n    INSTEAD OF INSERT\
    \ OR UPDATE ON table_abc\nDECLARE\n  v_storage_value VARCHAR2(32000);\n  l_sqlcode\
    \       NUMBER;\nBEGIN\n  IF INSERTING THEN\n    ilo_task.begin_task(module =>\
    \ 'Table_ABC',\n                        action => 'Instead of insert',\n     \
    \                   comment => 'Table_ABC 上的插入或更新触发器');\n    example_package.create_value\n\
    \    (p_value_name     => :NEW.value_name\n     ,p_value         => :NEW.value\n\
    \     ,p_description   => :NEW.description\n     ,p_storage_value => v_storage_value\n\
    \    );\n    example_package.setup_something_else\n    (p_storage_value => v_storage_value\n\
    \    );        \n  ELSIF UPDATING THEN\n    example_package.update_value\n   \
    \ (p_value_name     => :NEW.value_name\n     ,p_value         => :NEW.value\n\
    \     ,p_description   => :NEW.description\n     ,p_storage_value => v_storage_value\n\
    \    );        \n  ENDIF;\n  ilo_task.end_task;\nEXCEPTION WHEN OTHERS THEN\n\
    \  l_sqlcode := SQLCODE;\n  ilo_task.end_task(error_num => l_sqlcode);\n  ...\
    \ 处理异常\nEND;\n```\n\n假设你已经对 `example_package` 中的各个程序单元进行了插桩，你可能会认为在此触发器中进行进一步插桩是多余的。但如果你的插桩目标是为测试和诊断性能问题提供正确的性能指标，那么这个插桩就至关重要。\n\
    \n使用 ILO 的众多好处之一是，该库能正确处理模块/操作对的嵌套。想象一下如果情况并非如此，模块和操作会发生什么。最后一个设置值的过程或函数将承担直到值被再次设置之前所花费的所有时间的全部责任，从而导致你无法看到该任务的实际响应时间。\n\
    \n## 问题诊断\n\n你应如何解决性能问题？当某件事耗时过长时，问一个问题：“我的时间去哪儿了？”这就是方法 R。\n\n### 方法 R\n\n“方法\
    \ R”是 Cary Millsap 和 Jeff Holt 谦逊地命名的他们用于诊断和修复性能问题的四步方法，记录在《*优化 Oracle 性能*》（O'Reilly,\
    \ 2003）一书中。“R”代表响应时间，与他们称为“方法 C”的传统方法形成对比。\n\n方法 R 规定了四个简单的步骤。\n\n*   识别对你最重要的任务。\n\
    *   详细测量其响应时间。\n*   以经济高效的方式优化该响应时间。\n*   重复，直到你的系统达到经济最优。\n\n这就像优化生活中任何其他事物一样来优化软件。\n\
    \n#### 步骤 1：识别\n\n***识别***对你最重要的任务。向你的软件业务利益相关者提出以下问题：\n\n*   哪个执行缓慢的业务任务对业务的负面影响最大？\n\
    *   首先修复哪个任务会最令人满意？\n\n不可避免地，你会得到许多任务都极其重要的答案。不过别慌，这并非意料之外。只需接着问这个问题：“如果所有这些任务的优先级都相同，那么我们可以从任务\
    \ X 开始吗？”\n\n你会得到同意或进一步的澄清。也许任务 Y 确实需要先解决。无论哪种情况，关键是选择 ***一个*** 任务，然后继续方法 R 的下一步。如果整个系统确实很慢，并且存在一个根本原因，那么处理任何一个缓慢的任务都会迅速导向那个根本原因。修复该任务的性能问题也将有益于系统的其余部分。\n\
    \n相反，如果该任务有一个独特的根本原因，那么你解决这个问题也不会浪费时间，因为你从一个已知对业务重要的任务开始。任何流程或方法的关键在于正确地开始。正如玛丽·波平斯引用亚里士多德的话：\n\
    \n> *良好的开端是成功的一半。*\n>\n> ——亚里士多德"
- fmt: '## Step 2: Measure


    `Measure` the task''s response time in detail. Measurement should be the primary
    focus of your attention during any performance analysis activity. Accurate measurement
    can point clearly to the root problem. Inaccurate measurement can send you on
    fruitless hunts down ratholes.


    When I say “response time,” I mean the response time of that top priority task
    from the moment the end user makes the request for the work to be done until the
    moment the end user receives the information requested or notification of completed
    processing. Getting those measurements is sometimes difficult but always worth
    the trouble.


    When I say “in detail,” I mean in the form of a profile. Know where every moment
    of the response time was spent and focus on the largest consumers of time. The
    profile can detail program code units or resource utilization, but the total at
    the bottom `must` be 100% of the response time you measured. If not, you need
    to measure again, more accurately, or you need to reconsider how you are building
    the profile.


    Software performance analysis is often portrayed as art rather than science, but
    I disagree with that portrayal. Good performance analysis is all about measurement.


    > *There are two possible outcomes: if the result confirms the hypothesis, then
    you''ve made a measurement. If the result is contrary to the hypothesis, then
    you''ve made a discovery.*

    >

    > —Enrico Fermi


    ## Step 3: Optimize


    `Optimize` that response time in the most economically efficient way. First, find
    and eliminate unnecessary work. I repeatedly find this to be the best starting
    point when assessing a new performance issue. Is that 600-page report that runs
    every morning at 8 a.m. absolutely necessary? Does someone actually read it? Has
    the job that runs every night to rebuild indexes been evaluated recently? Asking
    the right question at the business task level is the best place to start.


    If it''s really needed, then maybe the report could it be run at 2 a.m. instead?
    Perhaps it could be executed in `SQL*Plus` in the data center rather than in `Excel`
    2,000 miles away. If you can''t eliminate all the work, the next best thing is
    to reduce the amount of work being done. Moving business rules from mid-tier applications
    to the database tier is a great way of accomplishing this. [Chapter 11](#Chapter11.html#ch11)
    provides an extensive case study showing the benefits of code in the database.


    If you have a critical task that depends heavily on a resource, consider rescheduling
    other work competing for that resource at the same time. Load management is a
    very effective tool that is often overlooked. Including the business stakeholders
    in performance optimization is crucial. If you take your pickup truck to the shop
    and ask the technician to tune your vehicle, how will they tune? Each technician
    will have his own interpretation of what “tuned” means. Do you want to use your
    pickup truck to haul a bed full of steel rods up a steep incline for 2 hours?
    Do you want to win a 200-mile race at the local dirt track on Friday night? The
    technician that knows the answer to these questions will get the job done right.
    The performance analyst that knows the business expectations for workload will
    also get the job done right.


    Reduction of work is also the goal when optimizing code path in your application
    or optimizing individual SQL statements. The key is to focus on efficiency, accomplishing
    the right amount of work with the last amount of resource utilization. With the
    right measurements at hand, you `know` where the improvements are needed.


    > *The fastest way to do anything is to not do it at all.*

    >

    > —Cary Millsap


    ![images](images/square.jpg) **Tip** Moving business rules to the database tier
    is a hotly debated subject, but Toon Koppelaars argues for the case better than
    anyone else I have heard. If you desire the performance benefits of moving code
    to the lowest tier possible, check out Toon''s vision and his explanation of “The
    Helsinki Declaration (IT Version)” at [`http://thehelsinkideclaration.blogspot.com/`](http://thehelsinkideclaration.blogspot.com/).


    ## Step 4: Repeat


    `Repeat` until your system is economically optimal. A system''s performance can
    always be improved, but at ever increasing cost. By measuring response time of
    a business task accurately, you can predict the improvement associated with a
    given change to the software or hardware resources. That quantified improvement
    can then be weighed against the cost needed to achieve the improvement. The tuning
    process finishes when the cost of the improvement exceeds the business value gained.
    When the ball is in the hole—stop.


    > *Go play golf. Go to the golf course. Hit the ball. Find the ball. Repeat until
    the ball is in the hole. Have fun. The end.*

    >

    > —Chuck Hogan'
