  trans: "# 退出循环\n\n当使用传统的逐行机制在游标循环中执行提取时，结果集中没有更多行时会隐式退出。你发出一个提取调用；如果失败，就表示已完成。而当你进行批量提取时，情况会稍微复杂一些——一次提取调用可能检出足以填满数组的行，可能检出零行，也可能检出一些行但不足以完全填满数组。这导致在使用\
    \ `LIMIT` 子句时出现一个常见的程序错误。\n\n首先，这是本章前面展示的逐行代码 (`bulk_limit_exit_1.sql`)：\n\n```sql\n\
    SQL> set serverout on\nSQL> declare\n  2    cursor c_tool_list is\n  3      select\
    \ descr\n  4      from   hardware\n  5      where  aisle = 1\n  6      and   \
    \ item between 1 and 25;\n  7\n  8    l_descr hardware.descr%type;\n  9  begin\n\
    \ 10    open c_tool_list;\n 11    loop\n 12      fetch c_tool_list into l_descr;\n\
    \ 13      exit when c_tool_list%notfound;\n 14      dbms_output.put_line('Fetched\
    \ '||l_descr);\n 15    end loop;\n 16    close c_tool_list;\n 17  end;\n 18  /\n\
    Fetched Description 1\nFetched Description 2\nFetched Description 3\n[snip]\n\
    Fetched Description 23\nFetched Description 24\nFetched Description 25\n\nPL/SQL\
    \ procedure successfully completed.\n```\n\n注意，提取了 25 行并显示在屏幕上。现在代码被转换为使用 `LIMIT`\
    \ 子句的批量收集，看起来是直观的方式，但结果证明是错误的方式。这是不正确的解决方案 (`bulk_limit_exit_2.sql`) 及其输出：\n\n\
    ```sql\nSQL> set serverout on\nSQL> declare\n  2    cursor c_tool_list is\n  3\
    \      select descr\n  4      from   hardware\n  5      where  aisle = 1\n  6\
    \      and    item between 1 and 25;\n  7\n  8    type t_descr_list is table of\
    \ c_tool_list%rowtype;\n  9    l_descr_list t_descr_list;\n 10\n 11  begin\n 12\
    \    open c_tool_list;\n 13    loop\n 14      fetch c_tool_list\n 15      bulk\
    \ collect into l_descr_list limit 10;\n 16      exit when c_tool_list%notfound;\n\
    \ 17\n 18      for i in 1 .. l_descr_list.count loop\n 19        dbms_output.put_line('Fetched\
    \ '||l_descr_list(i).descr);\n 20      end loop;\n 21    end loop;\n 22\n 23 \
    \   close c_tool_list;\n 24  end;\n 25  /\nFetched Description 1\nFetched Description\
    \ 2\nFetched Description 3\n[snip]\nFetched Description 18\nFetched Description\
    \ 19\nFetched Description 20\n\nPL/SQL procedure successfully completed.\n```\n\
    \n注意，游标循环过早退出了：应该输出 25 行（与逐行示例完全相同），但代码在输出 20 行后就停止了。问题出在第 16 行：`exit when c_tool_list%notfound`。`LIMIT`\
    \ 子句指定了每次提取调用获取 10 行。在第三次循环时，只剩下 5 行可供提取。因为所有行都已被提取，`%NOTFOUND` 属性变为真，循环在 `没有`\
    \ 处理数组中剩余 5 行的情况下退出。\n\n解决方案很简单：要么将游标属性的检查推迟到处理完提取数组中找到的任何行之后，要么将退出条件改为 `<array>.count\
    \ = 0`（这也意味着需要额外遍历一次提取循环）。\n\n以下是第一种解决方案的示例，代码将游标属性的检查推迟到处理完数组中的任何行之后 (`bulk_limit_exit_3.sql`)：\n\
    \n```sql\nSQL> set serverout on\nSQL> declare\n  2    cursor c_tool_list is\n\
    \  3      select descr\n  4      from   hardware\n  5      where  aisle = 1\n\
    \  6      and    item between 1 and 25;\n  7\n  8    type t_descr_list is table\
    \ of c_tool_list%rowtype;\n  9    l_descr_list t_descr_list;\n 10\n 11  begin\n\
    \ 12    open c_tool_list;\n 13    loop\n 14      fetch c_tool_list\n 15      bulk\
    \ collect into l_descr_list limit 10;\n 16\n```\n注意，因为有可能没有提取到行，所以不能对数组中是否存在行做任何假设。所有处理都必须考虑到这一事实，并且必须遵守数组的\
    \ `count` 属性的值，否则可能会因非法引用数组索引而出现错误。在以下代码中，使用 `l_descr_list.count` 确保如果数组中没有条目，甚至不会进入循环：\n\
    \n```sql\n 17      for i in 1 .. l_descr_list.count loop\n 18        dbms_output.put_line('Fetched\
    \ '||l_descr_list(i).descr);\n 19      end loop;\n 20      exit when c_tool_list%notfound;\n\
    \ 21    end loop;\n 22\n 23    close c_tool_list;\n 24  end;\n 25  /\nFetched\
    \ Description 1\nFetched Description 2\nFetched Description 3\n[snip]\nFetched\
    \ Description 23\nFetched Description 24\nFetched Description 25\n\nPL/SQL procedure\
    \ successfully completed.\n```"
- fmt: "\n## 过度批量处理\n\n这种情况虽然罕见，但有时批量处理（bulking up）*并非*从数据库检索数据的合适方式。回到五金店的比喻，假设我口袋里只有几美元就开车去商店。我的购买能力会受限于现金，只有几美元显然买不了多少东西。如果我盲目遵循“一定要推购物车（即批量收集）”的建议，直到结账才停止，结果会怎样？\n\
    \n*   我需要先花时间在商店入口取一辆购物车。\n*   我的购物车只装了几件商品，我就不得不停止——因为我超出了消费限额。\n*   我为商品付款。\n\
    *   我需要花更多时间将商品从购物车卸到袋子里，然后把购物车还回商店入口。\n\n在数据库术语中也是一样。如果你事先知道某些情况下可能不会处理获取到的整批数据，那么费力去获取它们实际上可能会损害而非提升性能。一个非常常见的原因是处理结果集时可能需要提前退出。考虑以下示例（`bulk_early_exit_1.sql`）。首先，我定义一个游标，从`HARDWARE`表中获取一些行，如下所示：\n\
    \n```\nSQL> set timing on\nSQL> declare\n  2    cursor c_might_exit_early is\n\
    \  3      select aisle, item\n  4      from   hardware\n  5      where  item between\
    \ 400000 and 400050\n  6        or   descr like '%10000%';\n  7  begin\n```\n\n\
    根据`HARDWARE`表中的数据，这个游标将返回72行。这里使用了隐式获取（fetch）结构，以自动获取批量收集的抓取大小，即100行。但是，这个游标被命名为`c_might_exit_early`是有原因的。\n\
    \n```\n  8    for i in c_might_exit_early\n  9    loop\n 10      `if c_might_exit_early%rowcount\
    \ = 40 then`\n 11         `exit;`\n 12      `end if;`\n```\n\n一旦获取了40行，游标循环就会退出。当然，可以在定义游标的SQL中添加`rownum\
    \ <= 40`的谓词，但在现实世界场景中，条件可能更复杂。例如，每获取一行，都可能将其传递给一个网络服务，该服务可能返回一个标志，指示不应再发送更多行。这里的关键是，游标循环存在提前退出的可能性，而这个退出条件不容易整合回游标SQL语句中。\n\
    \n```\n 13    end loop;\n 14  end;\n 15  /\n```\n\n```\nPL/SQL procedure successfully\
    \ completed.\n\nElapsed: 00:00:00.38\n```\n\n这个例程运行得相当快，但0.38秒对于仅处理40行来说显得有些迟缓，这归因于自动批量收集。代码实际上执行了检索全部72行的工作，因为第一次获取调用试图检索100行。PL/SQL编译器并不知道游标处理可能会提前结束。一个会话跟踪证实所有72行都被检索了。\n\
    \n```\nSELECT AISLE, ITEM\nFROM\n HARDWARE WHERE ITEM BETWEEN 400000 AND 400050\
    \ OR DESCR LIKE '%10000%'\n\ncall     count       cpu    elapsed       disk  \
    \    query    current        rows\n------- ------  -------- ---------- ----------\
    \ ---------- ----------  ----------\nParse        1      0.00       0.00     \
    \     0          0          0           0\nExecute      1      0.00       0.00\
    \          0          0          0           0\nFetch        1      0.17     \
    \  0.17          0      10100          0          72\n------- ------  --------\
    \ ---------- ---------- ---------- ----------  ----------\ntotal        3    \
    \  0.17       0.17          0      10100          0          72\n```\n\n识别这类情况并相应编码是开发者的责任；PL/SQL编译器并不能未卜先知。在上面的例子中，事实证明根本不使用批量收集效率更高。例如（`bulk_early_exit_2.sql`）是使用更传统的逐行方法编写的相同例程。\n\
    \n```\nSQL> set timing on\nSQL> declare\n  2    cursor c_might_exit_early is\n\
    \  3      select aisle, item\n  4      from   hardware\n  5      where  item between\
    \ 400000 and 400050\n  6        or   descr like '%10000%';\n  7    l_row c_might_exit_early%rowtype;\n\
    \  8  begin\n  9    open c_might_exit_early;\n 10    loop\n 11      fetch c_might_exit_early\n\
    \ 12      into l_row;\n 13      exit when c_might_exit_early%notfound;\n 14\n\
    \ 15      if c_might_exit_early%rowcount = 40 then\n 16         exit;\n 17   \
    \   end if;\n 18\n 19    end loop;\n 20    close c_might_exit_early;\n 21  end;\n\
    \ 22  /\n```\n\n```\nPL/SQL procedure successfully completed.\n\nElapsed: 00:00:00.17\n\
    ```\n\n即使有40次单独获取调用的开销，性能也提升了一倍。原因在于本例中的SQL被设计成最后几行很难找到；也就是说，它们很可能位于表的高水位标记附近。因此，虽然这是一个稍微有些人工的例子，但它确实表明你不能简单地假设批量收集总会带来好处。对于这个特定的例子，精明的开发者会意识到，通过一些额外的编码，你可以通过明确指定获取大小，而不是交给PL/SQL编译器，来兼顾两者的优点。\n\
    \n下面的例子来自`bulk_early_exit_3.sql`；它明确指定了一个获取大小，作为逐行获取和100行自动批量收集获取大小之间的折中方案：\n\n\
    ```\nSQL> set timing on\nSQL> declare\n  2    cursor c_might_exit_early is\n \
    \ 3      select aisle, item\n  4      from   hardware\n  5      where  item between\
    \ 400000 and 400050\n  6        or   descr like '%10000%';\n  7    type t_rows\
    \ is table of c_might_exit_early%rowtype;\n  8    l_rows t_rows;\n  9\n 10   \
    \ l_row_cnt pls_integer := 0;\n 11\n 12  begin\n 13    open c_might_exit_early;\n\
    \ 14    <<cursor_loop>>\n 15    loop\n 16      fetch c_might_exit_early\n```\n\
    \n显然，对于这个演示，我们知道处理会在40行后停止，因此40的获取大小是最优的。然而，我选择了20的获取大小来反映一个现实世界的场景，即无法精确知道处理何时会提前终止，因此开发者会在“从每次获取调用中获得良好价值”和“不获取可能最终不需要的过多行”之间寻求一个折中方案。\n\
    \n```\n 17      bulk collect into l_rows `limit 20;`\n 18\n 19      for i in 1\
    \ .. l_rows.count\n 20      loop\n 21         l_row_cnt := l_row_cnt + 1;\n 22\
    \         if l_row_cnt = 40 then\n 23            exit cursor_loop;\n 24      \
    \   end if;\n 25      end loop;\n 26\n 27      exit when c_might_exit_early%notfound;\n\
    \ 28    end loop;\n 29    close c_might_exit_early;\n 30  end;\n 31  /\n```\n\n\
    ```\nPL/SQL procedure successfully completed.\n\nElapsed: 00:00:00.09\n```\n\n\
    对于这个例子，仅仅通过在代码中加入一些我自己的智慧，而不是依赖PL/SQL编译器的智慧，周转时间就从0.38秒减少到了0.09秒。\n"
  raw: '##### Over Bulking


    It’s rare but sometimes bulking up is *not* the appropriate way to retrieve way
    data from the database. Returning to the hardware store metaphor, consider the
    case where I drive down the store with only a few dollars in my pocket. I’ll only
    be able to buy things until I run out of cash which, with only a few dollars,
    will not be much. Let’s say I blindly follow the advice of always getting a trolley
    (a.k.a. bulk collect) to hold my items until I get to the cash register. What
    will be the result ?


    *   It will take time to initially get a shopping trolley from the front of the
    store.

    *   My trolley gets loaded with just a couple of items and then I have to stop—I’ve
    gone over my spending limit.

    *   I pay for my items.

    *   It takes more time to unload the items from the trolley into a bag, and then
    return the trolley back to the front of the store.


    It is the same in database terms. If you know in advance that there may be some
    circumstance where you are not going to process an entire array of fetched rows,
    then going to the effort of trying to fetch them might actually hurt your performance
    rather than improve it. A very common cause of this is when processing a resultset
    that may need to prematurely exit. Consider the following example (`bulk_early_exit_1.sql`).
    First, I define a cursor to fetch some rows from the HARDWARE table, like so:


    `SQL> set timing on`

    `SQL> declare`

    `  2    cursor c_might_exit_early is`

    `  3      select aisle, item`

    `  4      from   hardware`

    `  5      where  item between 400000 and 400050`

    `  6        or   descr like ''%10000%'';`

    `  7  begin`


    With the data in the HARDWARE table, this cursor will return 72 rows. The implicit
    fetch construct has been used in order to automatically get the bulk collect fetch
    size of 100 rows. However, the cursor is called `c_might_exit_early` for a reason.


    `  8    for i in c_might_exit_early`

    `  9    loop`

    ` 10      `***`if c_might_exit_early%rowcount = 40 then`***

    ` 11         `***`exit;`***

    ` 12      `***`end if;`***


    Once 40 rows have been fetched, the cursor loop will be exited. Of course, a `rownum
    <= 40` predicate could have been added to the SQL defining the cursor, but in
    a real world scenario, the condition is likely to be more complicated. For example,
    with each row being fetched, it could be passed to a web service that may return
    a flag indicating that no more rows should be sent to it. The key thing here is
    that there is a likelihood that the cursor loop may be prematurely exited with
    a condition that can’t be easily folded back into the cursor SQL statement.


    ` 13    end loop;`

    ` 14  end;`

    ` 15  /`


    `PL/SQL procedure successfully completed.`


    `Elapsed: 00:00:00.38`


    The routine ran reasonably quickly, but 0.38 seconds seems sluggish for only 40
    rows, and this is due to the automatic bulk collect. The code actually did the
    work of retrieving all of the 72 rows, because the first fetch call tried to retrieve
    100 rows. The PL/SQL compiler did not know that the cursor processing may end
    prematurely. A session trace confirms that all 72 rows were retrieved.


    `SELECT AISLE, ITEM`

    `FROM`

    ` HARDWARE WHERE ITEM BETWEEN 400000 AND 400050 OR DESCR LIKE ''%10000%''`


    `call     count       cpu    elapsed       disk      query    current        rows`

    `------- ------  -------- ---------- ---------- ---------- ----------  ----------`

    `Parse        1      0.00       0.00          0          0          0           0`

    `Execute      1      0.00       0.00          0          0          0           0`

    `Fetch        1      0.17       0.17          0      10100          0          72`

    `------- ------  -------- ---------- ---------- ---------- ----------  ----------`

    `total        3      0.17       0.17          0      10100          0          72`


    It is the responsibility of the developer to recognize these types of situations
    and code accordingly; the PL/SQL compiler is not a mind reader. In the previous
    example, it turns out to be more efficient to not use bulk collect at all. For
    example (`bulk_early_exit_2.sql`) is the same routine coded in a more traditional
    row-by-row method.


    `SQL> set timing on`

    `SQL> declare`

    `  2    cursor c_might_exit_early is`

    `  3      select aisle, item`

    `  4      from   hardware`

    `  5      where  item between 400000 and 400050`

    `  6        or   descr like ''%10000%'';`

    `  7    l_row c_might_exit_early%rowtype;`

    `  8  begin`

    `  9    open c_might_exit_early;`

    ` 10    loop`

    ` 11      fetch c_might_exit_early`

    ` 12      into l_row;`

    ` 13      exit when c_might_exit_early%notfound;`

    ` 14`

    ` 15      if c_might_exit_early%rowcount = 40 then`

    ` 16         exit;`

    ` 17      end if;`

    ` 18`

    ` 19    end loop;`

    ` 20    close c_might_exit_early;`

    ` 21  end;`

    ` 22  /`


    `PL/SQL procedure successfully completed.`


    `Elapsed: 00:00:00.17`


    Even with the overhead of 40 individual fetch calls, the performance is twice
    as good. The reason for this is that the SQL in this example has been crafted
    so that the last few rows are hard to find; that is, they are likely to be near
    the high water mark of the table. So while this is a slightly artificial example,
    it does demonstrate that you can’t just assume the bulk collect will always yield
    benefits. For this particular example, savvy developers will realize that with
    some extra coding, you can have the best of both worlds by explicitly nominating
    the fetch size rather than leaving it to the PL/SQL compiler.


    The following example comes from `bulk_early_exit_3.sql`; it explicitly nominates
    a fetch size as a compromise between row-by-row fetches and the automatic bulk
    collect fetch size of 100:


    `SQL> set timing on`

    `SQL> declare`

    `  2    cursor c_might_exit_early is`

    `  3      select aisle, item`

    `  4      from   hardware`

    `  5      where  item between 400000 and 400050`

    `  6        or   descr like ''%10000%'';`

    `  7    type t_rows is table of c_might_exit_early%rowtype;`

    `  8    l_rows t_rows;`

    `  9`

    ` 10    l_row_cnt pls_integer := 0;`

    ` 11`

    ` 12  begin`

    ` 13    open c_might_exit_early;`

    ` 14    <<cursor_loop>>`

    ` 15    loop`

    ` 16      fetch c_might_exit_early`


    Obviously, for this demo, it’s known that processing will stop after 40 rows,
    and thus a fetch size of 40 would be optimal. However, I’ve chosen a fetch size
    of 20 to reflect a real-world scenario where it’s not known precisely when the
    processing would prematurely terminate, so a developer would opt for a compromise
    between getting good value from each fetch call and not fetching an excessive
    amount of rows that may not ultimately be required.


    `17      bulk collect into l_rows` ***`limit 20;`***

    ` 18`

    ` 19      for i in 1 .. l_rows.count`

    ` 20      loop`

    ` 21         l_row_cnt := l_row_cnt + 1;`

    ` 22         if l_row_cnt = 40 then`

    ` 23            exit cursor_loop;`

    ` 24         end if;`

    ` 25      end loop;`

    ` 26`

    ` 27      exit when c_might_exit_early%notfound;`

    ` 28    end loop;`

    ` 29    close c_might_exit_early;`

    ` 30  end;`

    ` 31  /`


    `PL/SQL procedure successfully completed.`


    `Elapsed: 00:00:00.09`


    For this example, the turnaround time has been reduced from 0.38 seconds down
    to 0.09 seconds just by applying some of my own intelligence into the code rather
    than relying on the PL/SQL compiler’s.'
  trans: "## 过度批量处理\n\n这种情况虽然罕见，但有时批量处理（bulking up）*并非*从数据库检索数据的合适方式。回到五金店的比喻，假设我口袋里只有几美元就开车去商店。我的购买能力会受限于现金，只有几美元显然买不了多少东西。如果我盲目遵循“一定要推购物车（即批量收集）”的建议，直到结账才停止，结果会怎样？\n\
    \n*   我需要先花时间在商店入口取一辆购物车。\n*   我的购物车只装了几件商品，我就不得不停止——因为我超出了消费限额。\n*   我为商品付款。\n\
    *   我需要花更多时间将商品从购物车卸到袋子里，然后把购物车还回商店入口。\n\n在数据库术语中也是一样。如果你事先知道某些情况下可能不会处理获取到的整批数据，那么费力去获取它们实际上可能会损害而非提升性能。一个非常常见的原因是处理结果集时可能需要提前退出。考虑以下示例（`bulk_early_exit_1.sql`）。首先，我定义一个游标，从`HARDWARE`表中获取一些行，如下所示：\n\
    \n```\nSQL> set timing on\nSQL> declare\n  2    cursor c_might_exit_early is\n\
    \  3      select aisle, item\n  4      from   hardware\n  5      where  item between\
    \ 400000 and 400050\n  6        or   descr like '%10000%';\n  7  begin\n```\n\n\
    根据`HARDWARE`表中的数据，这个游标将返回 72 行。这里使用了隐式获取（fetch）结构，以自动获取批量收集的抓取大小，即 100 行。但是，这个游标被命名为`c_might_exit_early`是有原因的。\n\
    \n```\n  8    for i in c_might_exit_early\n  9    loop\n 10      `if c_might_exit_early%rowcount\
    \ = 40 then`\n 11         `exit;`\n 12      `end if;`\n```\n\n一旦获取了 40 行，游标循环就会退出。当然，可以在定义游标的\
    \ SQL 中添加`rownum <= 40`的谓词，但在现实世界场景中，条件可能更复杂。例如，每获取一行，都可能将其传递给一个网络服务，该服务可能返回一个标志，指示不应再发送更多行。这里的关键是，游标循环存在提前退出的可能性，而这个退出条件不容易整合回游标\
    \ SQL 语句中。\n\n```\n 13    end loop;\n 14  end;\n 15  /\n```\n\n```\nPL/SQL procedure\
    \ successfully completed.\n\nElapsed: 00:00:00.38\n```\n\n这个例程运行得相当快，但 0.38 秒对于仅处理\
    \ 40 行来说显得有些迟缓，这归因于自动批量收集。代码实际上执行了检索全部 72 行的工作，因为第一次获取调用试图检索 100 行。PL/SQL 编译器并不知道游标处理可能会提前结束。一个会话跟踪证实所有\
    \ 72 行都被检索了。\n\n```\nSELECT AISLE, ITEM\nFROM\n HARDWARE WHERE ITEM BETWEEN 400000\
    \ AND 400050 OR DESCR LIKE '%10000%'\n\ncall     count       cpu    elapsed  \
    \     disk      query    current        rows\n------- ------  -------- ----------\
    \ ---------- ---------- ----------  ----------\nParse        1      0.00     \
    \  0.00          0          0          0           0\nExecute      1      0.00\
    \       0.00          0          0          0           0\nFetch        1    \
    \  0.17       0.17          0      10100          0          72\n------- ------\
    \  -------- ---------- ---------- ---------- ----------  ----------\ntotal   \
    \     3      0.17       0.17          0      10100          0          72\n```\n\
    \n识别这类情况并相应编码是开发者的责任；PL/SQL 编译器并不能未卜先知。在上面的例子中，事实证明根本不使用批量收集效率更高。例如（`bulk_early_exit_2.sql`）是使用更传统的逐行方法编写的相同例程。\n\
    \n```\nSQL> set timing on\nSQL> declare\n  2    cursor c_might_exit_early is\n\
    \  3      select aisle, item\n  4      from   hardware\n  5      where  item between\
    \ 400000 and 400050\n  6        or   descr like '%10000%';\n  7    l_row c_might_exit_early%rowtype;\n\
    \  8  begin\n  9    open c_might_exit_early;\n 10    loop\n 11      fetch c_might_exit_early\n\
    \ 12      into l_row;\n 13      exit when c_might_exit_early%notfound;\n 14\n\
    \ 15      if c_might_exit_early%rowcount = 40 then\n 16         exit;\n 17   \
    \   end if;\n 18\n 19    end loop;\n 20    close c_might_exit_early;\n 21  end;\n\
    \ 22  /\n```\n\n```\nPL/SQL procedure successfully completed.\n\nElapsed: 00:00:00.17\n\
    ```\n\n即使有 40 次单独获取调用的开销，性能也提升了一倍。原因在于本例中的 SQL 被设计成最后几行很难找到；也就是说，它们很可能位于表的高水位标记附近。因此，虽然这是一个稍微有些人工的例子，但它确实表明你不能简单地假设批量收集总会带来好处。对于这个特定的例子，精明的开发者会意识到，通过一些额外的编码，你可以通过明确指定获取大小，而不是交给\
    \ PL/SQL 编译器，来兼顾两者的优点。\n\n下面的例子来自`bulk_early_exit_3.sql`；它明确指定了一个获取大小，作为逐行获取和\
    \ 100 行自动批量收集获取大小之间的折中方案：\n\n```\nSQL> set timing on\nSQL> declare\n  2    cursor\
    \ c_might_exit_early is\n  3      select aisle, item\n  4      from   hardware\n\
    \  5      where  item between 400000 and 400050\n  6        or   descr like '%10000%';\n\
    \  7    type t_rows is table of c_might_exit_early%rowtype;\n  8    l_rows t_rows;\n\
    \  9\n 10    l_row_cnt pls_integer := 0;\n 11\n 12  begin\n 13    open c_might_exit_early;\n\
    \ 14    <<cursor_loop>>\n 15    loop\n 16      fetch c_might_exit_early\n```\n\
    \n显然，对于这个演示，我们知道处理会在 40 行后停止，因此 40 的获取大小是最优的。然而，我选择了 20 的获取大小来反映一个现实世界的场景，即无法精确知道处理何时会提前终止，因此开发者会在“从每次获取调用中获得良好价值”和“不获取可能最终不需要的过多行”之间寻求一个折中方案。\n\
    \n```\n 17      bulk collect into l_rows `limit 20;`\n 18\n 19      for i in 1\
    \ .. l_rows.count\n 20      loop\n 21         l_row_cnt := l_row_cnt + 1;\n 22\
    \         if l_row_cnt = 40 then\n 23            exit cursor_loop;\n 24      \
    \   end if;\n 25      end loop;\n 26\n 27      exit when c_might_exit_early%notfound;\n\
    \ 28    end loop;\n 29    close c_might_exit_early;\n 30  end;\n 31  /\n```\n\n\
    ```\nPL/SQL procedure successfully completed.\n\nElapsed: 00:00:00.09\n```\n\n\
    对于这个例子，仅仅通过在代码中加入一些我自己的智慧，而不是依赖 PL/SQL 编译器的智慧，周转时间就从 0.38 秒减少到了 0.09 秒。"
- fmt: "### Bulk Binding\n\n使用`BULK COLLECT`批量获取数据完成了优化PL/SQL与数据库交互的一半图景。另一半则是尽可能高效地处理从PL/SQL发送到数据库表的数据。每当PL/SQL程序需要向数据库插入、更新或删除数据时，在大多数情况下，最好通过单次数据库访问来完成。对于某些应用需求（例如，更新已知主键的属性），修改将只针对单行。然而，当需要操作数据库中的多行时，PL/SQL仍然可以在单次访问中完成该工作。这被称为“批量绑定”，与批量收集一样，都是从逐行处理转向集合处理（通过PL/SQL集合）。\n\
    \n![images](images/square.jpg) **注意** 我的妻子慷慨地提出扩展这个比喻：“批量绑定是不是指这一章中你把所有不需要且本不该买的垃圾带回五金店的部分？”如果这有助于你理解批量绑定，那就这样吧。\n\
    \n一个常见的误解是，如果应用需求是修改单行，那么批量绑定就一定不合适。然而，编写高效PL/SQL的艺术部分就在于能够识别出看似单行处理的过程可能并非如此。例如，考虑一个显示员工表格列表的网页，操作员可以在其中更新每位员工的详细信息。虽然从操作员的角度来看，每位员工的更新是独立于其他所有人的，但这并不能成为将其实现为一系列单行更新SQL语句的理由（无论是直接调用还是在PL/SQL块中调用）。\n\
    \n变更后的记录集可以存储在一个数组中，并通过单次调用传递给PL/SQL程序，然后执行适当的批量绑定。请始终留意应用程序中可能受益于此方法的部分。\n\n\
    #### 批量绑定入门\n\n与批量收集类似，将现有的常规DML代码转换为其等效的批量绑定DML是简单而直接的。在常规DML中，通常会有一个填充了值的变量，该变量在DML语句中使用。以下示例\
    \ (`bulk_bind_1.sql`) 展示了一个简单的插入，其中PL/SQL变量通过`FOR`循环重复100次：\n\n```sql\nSQL> declare\n\
    \  2    l_row hardware%rowtype;\n  3  begin\n  4    for i in 1 .. 100 loop\n \
    \ 5      l_row.aisle := 1;\n  6      l_row.item  := i;\n  7      insert into hardware\
    \ values l_row;\n  8    end loop;\n  9  end;\n 10  /\n\nPL/SQL procedure successfully\
    \ completed.\n```\n\n在批量绑定DML中，仍然有一个填充了值的变量，但该变量现在是一个数组，并且DML操作被延迟到数组被填满用于批量绑定的值之后才执行。`FORALL`关键字表明这是一个批量绑定DML。例如\
    \ (`bulk_bind_2.sql`) 等效于上面逐行插入的示例，但它通过一次调用插入100行，而不是100次调用：\n\n```sql\nSQL> declare\n\
    \  2    type t_row_list is table of hardware%rowtype;\n  3    l_row t_row_list\
    \ := t_row_list();\n  4  begin\n  5    for i in 1 .. 100 loop\n  6      l_row.extend;\n\
    \  7      l_row(i).aisle := 1;\n  8      l_row(i).item  := i;\n  9    end loop;\n\
    \ 10\n 11    forall i in 1 .. 100\n 12      insert into hardware values l_row(i);\n\
    \ 13  end;\n 14  /\n\nPL/SQL procedure successfully completed.\n```\n\n![images](images/square.jpg)\
    \ **注意** 尽管`FORALL`看起来暗示某种循环处理，但它实际上是对数据库执行DML的单次调用。这可以通过会话级别的跟踪轻松确认。\n\n```sql\n\
    INSERT INTO HARDWARE\nVALUES  (:B1 ,:B2 ,:B3 ,:B4 )\n\ncall     count       cpu\
    \    elapsed       disk      query    current        rows\n------- ------  --------\
    \ ---------- ---------- ---------- ----------  ----------\nParse        1    \
    \  0.00       0.00          0          0          0           0\nExecute     \
    \ 1      0.00       0.00          0          1          6         100\nFetch \
    \       0      0.00       0.00          0          0          0           0\n\
    ------- ------  -------- ---------- ---------- ---------- ----------  ----------\n\
    total        2      0.00       0.00          0          1          6         100\n\
    ```"
  raw: '### Bulk Binding


    ***Fetching*** data in bulk using `BULK COLLECT` completes half the picture of
    optimizing the interaction between PL/SQL and the database. The other half is
    the ability to ***manipulate*** data dispatched from PL/SQL to database tables
    as efficiently as possible. Every time a PL/SQL program needs to insert, update,
    or delete data within the database, in most circumstances, it’s best to achieve
    that in a single trip to the database. For some application requirements (for
    example, update attributes for a known primary key), the modification will be
    for a single row. However, when the requirement is to touch multiple rows in the
    database, PL/SQL can still perform that job in a single trip. This is known as
    “bulk binding,” and just like bulk collect, is all about moving from a metaphor
    of row processing to set processing (via a PL/SQL collection).


    ![images](images/square.jpg) **Note** My wife generously offered to extend the
    metaphor by observing: “Is bulk bind the part of the chapter where you take all
    the junk you didn’t need and should not have bought back to the hardware store?”
    If that helps your understanding of bulk bind, then so be it.


    It’s a common misconception that if the application requirement is modification
    of a single row, then bulk binding must not be appropriate. However, part of the
    art of writing efficient PL/SQL is the ability to recognize when what appears
    to be single-row process is perhaps not. For example, consider a web page that
    displays a tabular list of the employees, where each employee’s details can be
    updated by the operator. While it’s true that from the operator’s viewpoint, each
    employee is being updated in isolation from all of the others, this is not a justification
    to map this a series of single row update SQL statements, called either directly
    or within a PL/SQL block.


    The set of altered records can be stored in an array and passed down to a PL/SQL
    program in a single call and the appropriate bulk binding performed. Always be
    on the lookout for parts of your application that might benefit from such an approach.


    #### Getting Started with Bulk Bind


    Like bulk collect, converting existing conventional DML code into its bulk bind
    DML equivalent is easy and straightforward. In conventional DML, it’s common to
    have a variable populated with values, and that variable is used within a DML
    statement. The following example (`bulk_bind_1.sql`) demonstrates a simple insert
    with PL/SQL variables repeated 100 times with a FOR loop:


    `SQL> declare`

    `  2    l_row hardware%rowtype;`

    `  3  begin`

    `  4    for i in 1 .. 100 loop`

    `  5      l_row.aisle := 1;`

    `  6      l_row.item  := i;`

    `  7      insert into hardware values l_row;`

    `  8    end loop;`

    `  9  end;`

    ` 10  /`


    `PL/SQL procedure successfully completed.`


    In bulk bind DML, there is still a variable populated with values, but the variable
    is now an array, and DML is deferred until the array is filled with the values
    that will be used for the bulk binding. The `FORALL` keyword indicates that this
    is a bulk bind DML. For example (`bulk_bind_2.sql`) is equivalent to the row-at-a-time
    insert example above, but inserts 100 rows with a single call rather than 100:


    `SQL> declare`

    `  2    type t_row_list is table of hardware%rowtype;`

    `  3    l_row t_row_list := t_row_list();`

    `  4  begin`

    `  5    for i in 1 .. 100 loop`

    `  6      l_row.extend;`

    `  7      l_row(i).aisle := 1;`

    `  8      l_row(i).item  := i;`

    `  9    end loop;`

    ` 10`

    ` 11    forall i in 1 .. 100`

    ` 12      insert into hardware values l_row(i);`

    ` 13  end;`

    ` 14  /`


    `PL/SQL procedure successfully completed.`


    ![images](images/square.jpg) **Note** Although FORALL seems to suggest some sort
    of loop processing, it is a single call to the database to perform the DML. This
    is easily confirmed with a session level trace.


    `INSERT INTO HARDWARE`

    `VALUES  (:B1 ,:B2 ,:B3 ,:B4 )`


    `call     count       cpu    elapsed       disk      query    current        rows`

    `------- ------  -------- ---------- ---------- ---------- ----------  ----------`

    `Parse        1      0.00       0.00          0          0          0           0`

    `Execute      1      0.00       0.00          0          1          6         100`

    `Fetch        0      0.00       0.00          0          0          0           0`

    `------- ------  -------- ---------- ---------- ---------- ----------  ----------`

    `total        2      0.00       0.00          0          1          6         100`'
