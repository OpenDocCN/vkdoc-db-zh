    \        '    END LOOP;'||\n        '    FORALL i IN v_rows_tt.first..v_rows_tt.last\
    \ '||\n        '    INSERT INTO '||in_list_rec.table_tx||' VALUES v_rows_tt(i);'||\n\
    \        '    v_list:=clone_pkg.f_getchildrenRec('''||in_list_rec.table_tx||''');'||\n\
    \        '    IF v_list.count()=0 THEN RETURN; END IF;'||\n        '    FOR l\
    \ IN v_list.first..v_list.last LOOP '||\n        '        clone_pkg.p_process(v_list(l),v_parent_list);'||\n\
    \        '    END LOOP;'||\n        'END;';\n    EXECUTE IMMEDIATE v_execute_tx\
    \ USING in_parent_list;\nEND;\n```\n\nThe last piece needed is an entry point\
    \ that will take a root object and clone it. To start the whole process, you need\
    \ to know the starting table, its primary key column and the primary key of the\
    \ root element to be cloned.\n\n```sql\nPROCEDURE p_clone (in_table_tx VARCHAR2,\
    \ in_pk_tx VARCHAR2, in_id NUMBER)\nIS\n    v_new_id NUMBER;    \n    PROCEDURE\
    \ p_processRoot is\n        v_sql_tx VARCHAR2(32767);\n    BEGIN\n      v_sql_tx:=\n\
    \      'DECLARE '||\n      '   v_row '||in_table_tx||'%ROWTYPE; '||\n      ' \
    \  v_listDirectChildren_t clone_pkg.list_rec_tt; '||\n      '   v_parent_list\
    \ id_tt:=id_tt(); '||\n      '   v_old_id NUMBER:=:1; '||\n      '   v_new_id\
    \ NUMBER:=:2; '||\n      'BEGIN '||\n      '  SELECT * INTO v_row FROM '||in_table_tx||\n\
    \      '    WHERE '||in_pk_tx||'=v_old_id;'||\n      '    v_row.'||in_pk_tx||':=v_new_id;'||\n\
    \      '    clone_pkg.v_Pair_t(v_old_id):=v_new_id;'||\n      '    v_parent_list.extend;'||\n\
    \      '    v_parent_list(v_parent_list.last):=v_old_id;'||\n      '    INSERT\
    \ INTO '||in_table_tx||' VALUES v_row;'||\n      '    v_listDirectChildren_t:=clone_pkg.f_getChildrenRec(:3);'||\n\
    \      '    FOR i IN v_listDirectChildren_t.first..v_listDirectChildren_t.last'||\n\
    \      '    LOOP'||\n      '        clone_pkg.p_process(v_listDirectChildren_t(i),v_parent_list);\
    \ '||\n      '     END LOOP;'||\n      'END; ';\n      EXECUTE IMMEDIATE v_sql_tx\
    \ USING in_id,v_new_id,UPPER(in_table_tx);\n    END;\nBEGIN\n    clone_pkg.v_Pair_t.delete;\n\
    \    SELECT object_seq.nextval INTO v_new_id FROM DUAL;\n    p_processRoot;\n\
    END;\n```\n\nThe only step left is to assemble all of these pieces into a single\
    \ package to create a completely generic cloning module. (A complete set of code\
    \ snippets is available for download at this book's catalog page at Apress.com).\n\
    \nWhy is the preceding example considered a “gold standard”? Mainly because the\
    \ example is based upon the analysis of repeated patterns in the code that could\
    \ be made generic. Recognizing these patterns is one of the key skills in becoming\
    \ very efficient in applying Dynamic SQL to solving day-to-day problems."
  raw: "`      SELECT object_Seq.nextval INTO v_new_id FROM DUAL;`\n`      clone_pkg.v_Pair_t(v_rows_tt(i)`**`.REF_ID`**`):=v_new_id;`\n\
    \n`      v_rows_tt(i)`**`.REF_ID`** `:=v_new_id;`\n`      v_rows_tt(i)`**`.PHONE_ID`**`:=clone_pkg.v_Pair_t(v_rows_tt(i)`**`.PHONE_ID`**`);`\n\
    `    END LOOP;`\n\n`    FORALL i IN v_rows_tt.first..v_rows_tt.last`\n`INSERT\
    \ INTO` **`REF`** `VALUES v_rows_tt(i);`\n`END;`\n\nInterestingly enough, if you\
    \ closely examine the created code, it becomes clear that it contains three kinds\
    \ of elements:\n\n*   An incoming list of parent primary keys (V_OLDPHONE_TT).\n\
    *   A main logical process.\n*   Functional identifiers that define objects the\
    \ process should be applied to (marked bold):\n    *   child table name (REF).\n\
    \    *   primary key column name of the child table (REF_ID).\n    *   foreign\
    \ key column name of the child table (PHONE_ID).\n\nTechnically, I am trying to\
    \ build a module that has structural parameters (table names, column names) and\
    \ data parameters (parent IDs), which is a perfect case of utilizing Dynamic SQL\
    \ because it can handle both of these kinds.\n\nSince each level of hierarchy\
    \ could be completely represented by examining foreign key relationships, it is\
    \ obvious that the Oracle data dictionary may be used to walk down through the\
    \ parent-child tree (for now, I will assume that there are no circular dependencies\
    \ in the system). The idea is very straightforward: take a table name as input\
    \ and return a list of its children (with corresponding child primary key column\
    \ and foreign key column pointing to the parent). Although the following code\
    \ does not contain any dynamic SQL, it is useful enough to be shown (also extract\
    \ from CLONE_PKG):\n\n`TYPE list_rec IS RECORD`\n`        (table_tx VARCHAR2(50),\
    \ fk_tx VARCHAR2(50), pk_tx VARCHAR2(50));`\n`TYPE list_rec_tt IS TABLE OF list_rec;`\n\
    \n`FUNCTION f_getChildrenRec (in_tablename_tx VARCHAR2)`\n`RETURN list_rec_tt`\n\
    `IS`\n`    v_out_tt list_rec_tt;`\n`BEGIN`\n`    SELECT fk_tab.table_name, fk_tab.column_name\
    \ fk_tx, pk_tab.column_name pk_tx`\n`    BULK COLLECT INTO v_Out_tt`\n`    FROM`\n\
    `        (SELECT ucc.column_name, uc.table_name`\n`         FROM user_cons_columns\
    \ ucc,`\n`              user_constraints uc`\n`         WHERE ucc.constraint_name\
    \ = uc.constraint_name`\n`         AND   constraint_type = 'P') pk_tab,`\n`         (SELECT\
    \ ucc.column_name, uc.table_name`\n`          FROM   user_cons_columns ucc,`\n\
    `                (SELECT constraint_name, table_name`\n`                FROM user_constraints`\n\
    `                WHERE r_constraint_name = (SELECT constraint_name`\n`                                           FROM\
    \ user_constraints`\n`                                           WHERE table_name\
    \ = in_tablename_tx`\n`                                           AND constraint_type\
    \ = 'P'`\n`                                           )`\n`                   )\
    \ uc`\n`         WHERE ucc.constraint_name = uc.constraint_name ) fk_tab`\n`    WHERE\
    \ pk_tab.table_name = fk_tab.table_name;`\n`    RETURN v_out_tt;`\n`END;`\n\n\
    Now I have all of the pieces of information necessary to build generic processing\
    \ module that would call itself recursively until it reaches the end of the parent-child\
    \ chains, as shown next. As defined, the module will take as input a collection\
    \ of parent primary key IDs and a single object of type CLONE_PKG.LIST_REC that\
    \ will describe the parent-child link to be processed.\n\n`PROCEDURE p_process\
    \ (in_list_rec clone_pkg.list_rec, in_parent_list id_tt)`\n`IS`\n`    v_execute_tx\
    \ VARCHAR2(32767);`\n`BEGIN`\n`    v_execute_tx:=`\n`        'DECLARE '||`\n`        '    TYPE\
    \ rows_tt IS TABLE OF '||`**`in_list_rec.table_tx`**`||'%rowtype;'||`\n`        '    v_rows_tt\
    \ rows_tt;'||`\n`        '    v_new_id number;'||`\n`        '    v_list clone_pkg.list_rec_tt;'||`\n\
    `        '    v_parent_list id_tt:=id_tt();'||`\n`        'BEGIN '||`\n`        '    SELECT\
    \ * BULK COLLECT INTO v_rows_tt '||`\n`        '    FROM '||`**`in_list_rec.table_tx`**`||'\
    \ t WHERE '||`**`in_list_rec.fk_tx`**`||`\n`        '       IN  (SELECT column_value\
    \ FROM TABLE (CAST (:1 as id_tt)));'||`\n`        '    IF v_rows_tt.count()=0\
    \ THEN RETURN; END IF;'||`\n`        '    FOR i IN v_rows_tt.first..v_rows_tt.last\
    \ LOOP '||`\n`        '       SELECT object_Seq.nextval INTO v_new_id FROM DUAL;'||`\n\
    `        '       v_parent_list.extend;'||`\n`        '       v_parent_list(v_parent_list.last):=v_rows_tt(i).'||`**`in_list_rec.pk_tx`**`||';'||`\n\
    `        '       clone_pkg.v_Pair_t(v_rows_tt(i).'||`**`in_list_rec.pk_tx`**`||'):=v_new_id;'||`\n\
    `        '       v_rows_tt(i).'||`**`in_list_rec.pk_tx`**`||':=v_new_id;'||`\n\
    `        '       v_rows_tt(i).'||`**`in_list_rec.fk_tx`**`||`\n`                        ':=clone_pkg.v_Pair_t(v_rows_tt(i).'||`**`in_list_rec.fk_tx`**`||');'||`\n\
    `        '    END LOOP;'||`\n`        '    FORALL i IN v_rows_tt.first..v_rows_tt.last\
    \ '||`\n`        '    INSERT INTO '||`**`in_list_rec.table_tx`**`||' VALUES v_rows_tt(i);'||`\n\
    `        '    v_list:=clone_pkg.f_getchildrenRec('''||`**`in_list_rec.table_tx`**`||''');'||`\n\
    `        '    IF v_list.count()=0 THEN RETURN; END IF;'||`\n`        '    FOR\
    \ l IN v_list.first..v_list.last LOOP '||`\n`        '        clone_pkg.p_process(v_list(l),v_parent_list);'||`\n\
    `        '    END LOOP;'||`\n`        'END;';`\n`    EXECUTE IMMEDIATE v_execute_tx\
    \ USING in_parent_list;`\n`END;`\n\nThe last piece needed is an entry point that\
    \ will take a root object and clone it. To start the whole process, you need to\
    \ know the starting table, its primary key column and the primary key of the root\
    \ element to be cloned.\n\n`PROCEDURE p_clone (in_table_tx VARCHAR2, in_pk_tx\
    \ VARCHAR2, in_id NUMBER)`\n`IS`\n`    v_new_id NUMBER;    `\n`    PROCEDURE p_processRoot\
    \ is`\n`        v_sql_tx VARCHAR2(32767);`\n`    BEGIN`\n`      v_sql_tx:=`\n\
    `      'DECLARE '||`\n`      '   v_row '||in_table_tx||'%ROWTYPE; '||`\n`      '   v_listDirectChildren_t\
    \ clone_pkg.list_rec_tt; '||`\n`      '   v_parent_list id_tt:=id_tt(); '||`\n\
    `      '   v_old_id NUMBER:=:1; '||`\n`      '   v_new_id NUMBER:=:2; '||`\n`      'BEGIN\
    \ '||`\n`      '  SELECT * INTO v_row FROM '||in_table_tx||`\n`      '    WHERE\
    \ '||in_pk_tx||'=v_old_id;'||`\n`      '    v_row.'||in_pk_tx||':=v_new_id;'||`\n\
    `      '    clone_pkg.v_Pair_t(v_old_id):=v_new_id;'||`\n`      '    v_parent_list.extend;'||`\n\
    `      '    v_parent_list(v_parent_list.last):=v_old_id;'||`\n`      '    INSERT\
    \ INTO '||in_table_tx||' VALUES v_row;'||`\n`      '    v_listDirectChildren_t:=clone_pkg.f_getChildrenRec(:3);'||`\n\
    `      '    FOR i IN v_listDirectChildren_t.first..v_listDirectChildren_t.last'||`\n\
    `      '    LOOP'||`\n`      '        clone_pkg.p_process(v_listDirectChildren_t(i),v_parent_list);\
    \ '||`\n`      '     END LOOP;'||`\n`      'END; ';`\n`      EXECUTE IMMEDIATE\
    \ v_sql_tx USING in_id,v_new_id,UPPER(in_table_tx);`\n`    END;`\n`BEGIN`\n`    clone_pkg.v_Pair_t.delete;`\n\
    `    SELECT object_seq.nextval INTO v_new_id FROM DUAL;`\n`    p_processRoot;`\n\
    `END;`\n\nThe only step left is to assemble all of these pieces into a single\
    \ package to create a completely generic cloning module. (A complete set of code\
    \ snippets is available for download at this book's catalog page at Apress.com).\n\
    \nWhy is the preceding example considered a “gold standard”? Mainly because the\
    \ example is based upon the analysis of repeated patterns in the code that could\
    \ be made generic. Recognizing these patterns is one of the key skills in becoming\
    \ very efficient in applying Dynamic SQL to solving day-to-day problems."
  trans: "# 使用动态 SQL 实现通用克隆\n\n有趣的是，如果仔细检查所生成的代码，会发现它包含三种元素：\n\n*   传入的父主键列表（`V_OLDPHONE_TT`）。\n\
    *   一个主要的逻辑处理过程。\n*   定义处理过程应作用对象的功能标识符：\n    *   子表名称（`REF`）。\n    *   子表的主键列名（`REF_ID`）。\n\
    \    *   子表的外键列名（`PHONE_ID`）。\n\n从技术角度讲，我试图构建一个具有结构化参数（表名、列名）和数据参数（父 ID）的模块，这正是利用动态\
    \ SQL 的完美案例，因为它能同时处理这两类参数。\n\n由于层级结构的每一层都可以通过检查外键关系来完整表示，因此显然可以使用 Oracle 数据字典来遍历父-子树（目前，我将假设系统中不存在循环依赖）。思路非常直接：以表名作为输入，返回其子表列表（包含相应的子表主键列和指向父表的外键列）。虽然以下代码不包含任何动态\
    \ SQL，但它足够有用，值得展示（同样摘自`CLONE_PKG`包）：\n\n```sql\nTYPE list_rec IS RECORD\n    \
    \    (table_tx VARCHAR2(50), fk_tx VARCHAR2(50), pk_tx VARCHAR2(50));\nTYPE list_rec_tt\
    \ IS TABLE OF list_rec;\n\nFUNCTION f_getChildrenRec (in_tablename_tx VARCHAR2)\n\
    RETURN list_rec_tt\nIS\n    v_out_tt list_rec_tt;\nBEGIN\n    SELECT fk_tab.table_name,\
    \ fk_tab.column_name fk_tx, pk_tab.column_name pk_tx\n    BULK COLLECT INTO v_Out_tt\n\
    \    FROM\n        (SELECT ucc.column_name, uc.table_name\n         FROM user_cons_columns\
    \ ucc,\n              user_constraints uc\n         WHERE ucc.constraint_name\
    \ = uc.constraint_name\n         AND   constraint_type = 'P') pk_tab,\n      \
    \   (SELECT ucc.column_name, uc.table_name\n          FROM   user_cons_columns\
    \ ucc,\n                (SELECT constraint_name, table_name\n                FROM\
    \ user_constraints\n                WHERE r_constraint_name = (SELECT constraint_name\n\
    \                                           FROM user_constraints\n          \
    \                                 WHERE table_name = in_tablename_tx\n       \
    \                                    AND constraint_type = 'P'\n             \
    \                              )\n                   ) uc\n          WHERE ucc.constraint_name\
    \ = uc.constraint_name ) fk_tab\n    WHERE pk_tab.table_name = fk_tab.table_name;\n\
    \    RETURN v_out_tt;\nEND;\n```\n\n现在，我拥有了构建通用处理模块所需的所有信息片段，该模块将递归调用自身，直到达到父-子链的末端，如下所示。如定义所示，该模块将接收一个父主键\
    \ ID 集合和一个`CLONE_PKG.LIST_REC`类型的单一对象作为输入，该对象将描述要处理的父-子链接。\n\n```sql\nPROCEDURE\
    \ p_process (in_list_rec clone_pkg.list_rec, in_parent_list id_tt)\nIS\n    v_execute_tx\
    \ VARCHAR2(32767);\nBEGIN\n    v_execute_tx:=\n        'DECLARE '||\n        '\
    \    TYPE rows_tt IS TABLE OF '||in_list_rec.table_tx||'%rowtype;'||\n       \
    \ '    v_rows_tt rows_tt;'||\n        '    v_new_id number;'||\n        '    v_list\
    \ clone_pkg.list_rec_tt;'||\n        '    v_parent_list id_tt:=id_tt();'||\n \
    \       'BEGIN '||\n        '    SELECT * BULK COLLECT INTO v_rows_tt '||\n  \
    \      '    FROM '||in_list_rec.table_tx||' t WHERE '||in_list_rec.fk_tx||\n \
    \       '       IN  (SELECT column_value FROM TABLE (CAST (:1 as id_tt)));'||\n\
    \        '    IF v_rows_tt.count()=0 THEN RETURN; END IF;'||\n        '    FOR\
    \ i IN v_rows_tt.first..v_rows_tt.last LOOP '||\n        '       SELECT object_Seq.nextval\
    \ INTO v_new_id FROM DUAL;'||\n        '       v_parent_list.extend;'||\n    \
    \    '       v_parent_list(v_parent_list.last):=v_rows_tt(i).'||in_list_rec.pk_tx||';'||\n\
    \        '       clone_pkg.v_Pair_t(v_rows_tt(i).'||in_list_rec.pk_tx||'):=v_new_id;'||\n\
    \        '       v_rows_tt(i).'||in_list_rec.pk_tx||':=v_new_id;'||\n        '\
    \       v_rows_tt(i).'||in_list_rec.fk_tx||\n                        ':=clone_pkg.v_Pair_t(v_rows_tt(i).'||in_list_rec.fk_tx||');'||\n\
    \        '    END LOOP;'||\n        '    FORALL i IN v_rows_tt.first..v_rows_tt.last\
    \ '||\n        '    INSERT INTO '||in_list_rec.table_tx||' VALUES v_rows_tt(i);'||\n\
    \        '    v_list:=clone_pkg.f_getchildrenRec('''||in_list_rec.table_tx||''');'||\n\
    \        '    IF v_list.count()=0 THEN RETURN; END IF;'||\n        '    FOR l\
    \ IN v_list.first..v_list.last LOOP '||\n        '        clone_pkg.p_process(v_list(l),v_parent_list);'||\n\
    \        '    END LOOP;'||\n        'END;';\n    EXECUTE IMMEDIATE v_execute_tx\
    \ USING in_parent_list;\nEND;\n```\n\n最后一块需要的是一个入口点，它将接收一个根对象并克隆它。要启动整个过程，你需要知道起始表、其主键列以及要克隆的根元素的主键。\n\
    \n```sql\nPROCEDURE p_clone (in_table_tx VARCHAR2, in_pk_tx VARCHAR2, in_id NUMBER)\n\
    IS\n    v_new_id NUMBER;    \n    PROCEDURE p_processRoot is\n        v_sql_tx\
    \ VARCHAR2(32767);\n    BEGIN\n      v_sql_tx:=\n      'DECLARE '||\n      ' \
    \  v_row '||in_table_tx||'%ROWTYPE; '||\n      '   v_listDirectChildren_t clone_pkg.list_rec_tt;\
    \ '||\n      '   v_parent_list id_tt:=id_tt(); '||\n      '   v_old_id NUMBER:=:1;\
    \ '||\n      '   v_new_id NUMBER:=:2; '||\n      'BEGIN '||\n      '  SELECT *\
    \ INTO v_row FROM '||in_table_tx||\n      '    WHERE '||in_pk_tx||'=v_old_id;'||\n\
    \      '    v_row.'||in_pk_tx||':=v_new_id;'||\n      '    clone_pkg.v_Pair_t(v_old_id):=v_new_id;'||\n\
    \      '    v_parent_list.extend;'||\n      '    v_parent_list(v_parent_list.last):=v_old_id;'||\n\
    \      '    INSERT INTO '||in_table_tx||' VALUES v_row;'||\n      '    v_listDirectChildren_t:=clone_pkg.f_getChildrenRec(:3);'||\n\
    \      '    FOR i IN v_listDirectChildren_t.first..v_listDirectChildren_t.last'||\n\
    \      '    LOOP'||\n      '        clone_pkg.p_process(v_listDirectChildren_t(i),v_parent_list);\
    \ '||\n      '     END LOOP;'||\n      'END; ';\n      EXECUTE IMMEDIATE v_sql_tx\
    \ USING in_id,v_new_id,UPPER(in_table_tx);\n    END;\nBEGIN\n    clone_pkg.v_Pair_t.delete;\n\
    \    SELECT object_seq.nextval INTO v_new_id FROM DUAL;\n    p_processRoot;\n\
    END;\n```\n\n剩下的唯一步骤就是将所有这些片段组装到一个包中，以创建一个完全通用的克隆模块。（完整的代码片段集可以在 Apress.com 上本书的目录页面下载）。\n\
    \n为什么前面的例子被认为是“黄金标准”？主要是因为该示例基于对代码中重复模式的分析，这些模式可以被泛化。识别这些模式是应用动态 SQL 解决日常问题并变得非常高效的关键技能之一。"
- fmt: "# Security Issues\n\n## Security Philosophy\n\nFrom the security point of\
    \ view, “handling the unknown” has to do with a bit of healthy paranoia. Any good\
    \ developer should assume that if something *could* be misused, there is a good\
    \ chance that it eventually *will* be misused. Also, very often, the consequences\
    \ of “pilot errors” are more devastating than any imaginable intentional attack,\
    \ which leads to the conclusion that a system should not only be protected against\
    \ criminals, but against any unfortunate combinations of events.\n\nIn terms of\
    \ using Dynamic SQL, the abovementioned concept should be translated into the\
    \ following idea: under no circumstances should it be possible to generate any\
    \ code on the fly that was not intended to be generated. Considering that code\
    \ consists of both structural elements (tables, columns etc) and data, the following\
    \ rules apply:\n\n*   Structural elements cannot be passed instead of data.\n\
    *   Only allowed structural elements can be passed.\n\n## Two Guiding Rules\n\n\
    The solution that satisfies both of these conditions can be implemented by following\
    \ just two rules:\n\n*   When an application user inputs pure data elements (such\
    \ as values of columns, etc.), these values must be passed to the dynamic SQL\
    \ using bind variables. No value concatenation to structural parts of the code\
    \ should be allowed.\n*   When the whole structure of the code has to be changed\
    \ as a result of actions made by application user, such actions must be limited\
    \ to known repository elements. The overall system security should be enforced\
    \ by the following separation of roles:\n    *   Regular users have no ability\
    \ to alter the repository.\n    *   People who can change the repository are specially\
    \ assigned administrators.\n    *   No administrators can also have the role of\
    \ regular user.\n\n### The First Rule: Bind Variables\n\nIt's very easy to explain\
    \ the first rule. Because bind variables are evaluated only after the structure\
    \ of the query is resolved, an unexpected value (like famous `NULL OR 1=1`) cannot\
    \ impact anything at all, as shown here:\n\n```sql\nSQL> DECLARE\n  2     v_tx\
    \ VARCHAR2(256):='NULL OR 1=1';\n  3     v_count_nr NUMBER:=0;\n  4  BEGIN\n \
    \ 5     EXECUTE IMMEDIATE 'SELECT count(*) FROM emp WHERE ename = :1'\n  6   \
    \  INTO v_count_nr USING v_tx ;\n  7     dbms_output.put_line('Bind: '||v_count_nr);\n\
    \  8 \n  9     EXECUTE IMMEDIATE 'select count(*) FROM emp WHERE ename = '||v_tx\n\
    \ 10     INTO v_count_nr;\n 11     dbms_output.put_line('Inject: '||v_count_nr);\n\
    \ 12  END;\n 13  /\nBind: 0\nInject: 14\nPL/SQL procedure successfully completed.\n\
    SQL>\n```\n\n### The Second Rule: Repository-Based Configuration\n\nThe second\
    \ rule implying the usage of a repository may go against the grain for the majority\
    \ of contemporary developers, but it provides a unique opportunity for role separation\
    \ between people who enter available options and people who really use them. Another\
    \ advantage of such a repository-based solution is deployment cost. Since all\
    \ required changes could be handled by DML against repository tables, there is\
    \ no stoppage of service and no downtime. These considerations can sometimes be\
    \ real project-savers as evidenced by the following real world example.\n\n##\
    \ Real-World Case Study\n\nOnce upon a time there was a classical 3-tier IT system\
    \ that usually took about 4-6 hours of downtime to deploy even the smallest change\
    \ to the front end (plus at least a day of preparations). Requests for new modules\
    \ were coming in at least twice a week. These requests were very simple, such\
    \ as take a small number of inputs, fire the associated routine, and report the\
    \ results. Unfortunately, each request originally had to be coded separately as\
    \ a new screen and deployed via the regular mechanism. As a result, there was\
    \ always a group of unhappy people in the company made up of either users who\
    \ could not get the needed data on time or the maintenance team who had to go\
    \ through the pains of bringing the whole system down to add just a simple screen\
    \ several times each week.\n\nApplying the concept of handling the unknown to\
    \ the problem should make the available alternatives more visible. Let's split\
    \ the information into two groups:\n\n*   Known:\n    *   Each screen has to be\
    \ deployed to the web.\n    *   Each screen is based on a single request.\n  \
    \  *   Each request takes up to five simple parameters.\n    *   Each request\
    \ returns a summary in textual form.\n*   Unknown:\n    *   Header information\
    \ (name of the screen, remarks, names of parameters)\n    *   Data type of parameters\
    \ (including nullability and possible format masks)\n    *   Formatting of the\
    \ summary\n\nBy articulating the problem in the proposed structure, the format\
    \ of the proposed solution is now clear:\n\n*   Each screen is represented by\
    \ a single row in the repository with the following set of properties:\n    *\
    \   A generic name (header of the pop-up screen)\n    *   Up to 5 parameters,\
    \ each including:\n        *   Header\n        *   Mandatory/not mandatory identification\n\
    \        *   Data type (`NUMBER`/`DATE`/`TEXT`/`LOV`)\n        *   Optional conversion\
    \ expression (e.g. default date format in the UI since everything on the Web is\
    \ text-based)\n        *   Value list name (for `LOV` datatypes)\n    *   Name\
    \ of corresponding function in the following format:\n        *   Order (and count)\
    \ of input parameters must match the order of on-screen parameters\n        *\
    \   Function should return a `CLOB`\n*   All `CLOB`s returned by registered functions\
    \ must be fully formatted HTML pages, immediately available for display in the\
    \ front end.\n*   All activities in the repository are accessible only by administrators\
    \ and not visible to end users.\n\nAs a result, from the system point of view,\
    \ the logical flow of actions now becomes very simple.\n\n1.  The user sees the\
    \ list of available modules from the repository and selects one.\n2.  The front\
    \ end application reads the repository and builds a pop-up screen on the fly with\
    \ appropriate input fields and mandatory indicators. If the data type of the input\
    \ field is a value list, the utility requests the generic `LOV` mechanism to provide\
    \ existing `ID`/`DISPLAY` pairs.\n3.  The user enters whatever is needed and presses\
    \ `SUBMIT`. The front end fires the main (umbrella) procedure by passing a repository\
    \ ID of the module being used and all user-entered values into it.\n4.  The umbrella\
    \ procedure builds a real function call, passes the entered values, and returns\
    \ the generated `CLOB` to the front end (already formatted as HTML).\n5.  The\
    \ front end displays the generated HTML.\n\nNow all teams will be happy, since\
    \ it will take only seconds from the moment any new module was declared production-ready\
    \ to the moment when it is accessible from the front end. There is no downtime\
    \ and no deployment—just one new function to be copied and one `INSERT` statement\
    \ to register the function in the repository.\n\n## Implementation Example\n\n\
    To illustrate how all of these “miracles” look, the preparatory part of the example\
    \ is to build a function that satisfies all of the formatting requirements, to\
    \ create a repository table, and to register the function in the repository:\n\
    \n```sql\nCREATE FUNCTION f_getEmp_CL (i_job_tx VARCHAR2, i_hiredate_dt DATE)\n\
    RETURN CLOB\nIS\n    v_out_cl CLOB;\n    PROCEDURE p_add(pi_tx VARCHAR2) IS\n\
    \    BEGIN\n        dbms_lob.writeappend(v_out_cl,length(pi_tx),pi_tx);\n    END;\n\
    BEGIN\n    dbms_lob.createtemporary(v_out_cl,true,dbms_lob.call);\n    p_add('<html><table>');\
    \    \n    FOR c IN (SELECT '<tr>'||'<td>'||empno||'</td>'||'<td>'||ename||'</td>'||'</tr>'\
    \ row_tx\n                     FROM emp\n                     WHERE job = i_job_tx\n\
    \                     AND hiredate >= NVL(i_hiredate_dt,add_months(sysdate,-36))\n\
    \                     )\n    LOOP\n        p_add(c.row_tx);\n    END LOOP;\n \
    \   p_add('</table></html>');\n    RETURN v_out_cl;\nEND;\n```"
  raw: "### Security Issues\n\nFrom the security point of view, “handling the unknown”\
    \ has to do with a bit of healthy paranoia. Any good developer should assume that\
    \ if something *could* be misused, there is a good chance that it eventually *will*\
    \ be misused. Also, very often, the consequences of “pilot errors” are more devastating\
    \ than any imaginable intentional attack, which leads to the conclusion that a\
    \ system should not only be protected against criminals, but against any unfortunate\
    \ combinations of events.\n\nIn terms of using Dynamic SQL, the abovementioned\
    \ concept should be translated into the following idea: under no circumstances\
    \ should it be possible to generate any code on the fly that was not intended\
    \ to be generated. Considering that code consists of both structural elements\
    \ (tables, columns etc) and data, the following rules apply:\n\n*   Structural\
    \ elements cannot be passed instead of data.\n*   Only allowed structural elements\
    \ can be passed.\n\nThe solution that satisfies both of these conditions can be\
    \ implemented by following just two rules:\n\n*   When an application user inputs\
    \ pure data elements (such as values of columns, etc.), these values must be passed\
    \ to the dynamic SQL using bind variables. No value concatenation to structural\
    \ parts of the code should be allowed.\n*   When the whole structure of the code\
    \ has to be changed as a result of actions made by application user, such actions\
    \ must be limited to known repository elements. The overall system security should\
    \ be enforced by the following separation of roles:\n    *   Regular users have\
    \ no ability to alter the repository.\n    *   People who can change the repository\
    \ are specially assigned administrators.\n    *   No administrators can also have\
    \ the role of regular user.\n\nIt's very easy to explain the first rule. Because\
