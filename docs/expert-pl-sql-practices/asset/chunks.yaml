- fmt: "#### What Part of the Code is Running?\n\nIn the simple procedure just shown\
    \ in the “Basics” section, it's easy to get the overview of what code is actually\
    \ running whether the `TIMING_ON` flag is set to `TRUE` or `FALSE`. The `USER_SOURCE`\
    \ view reveals all the code in the stored procedure. The conditional compilation\
    \ code you create may be very complex, so to see what code is actually compiled\
    \ or not, you should call the `DBMS_PREPROCESSOR.PRINT_POST_PROCESSED_SOURCE`\
    \ procedure. This procedure generates the code that is actually compiled (remember\
    \ to set `serveroutput on`).\n\n```sql\nSQL@V112> CALL DBMS_PREPROCESSOR.PRINT_POST_PROCESSED_SOURCE('PROCEDURE',\
    \ 'ACME','LEVEL2');\nPROCEDURE LEVEL2 AS\nL_start_time TIMESTAMP;\nBEGIN\nDBMS_APPLICATION_INFO.SET_MODULE(\
    \ 'LEVEL2'          , 'RUN');\nL_start_time:=CURRENT_TIMESTAMP;\n-- -----------------------------------------------\n\
    -- Application logic is left out\n-- -----------------------------------------------\n\
    LOGIT (P_PG=> 'LEVEL2'         , P_START_TIME=>l_start_time, P_STOP_TIME=>CURRENT_TIMESTAMP);\n\
    DBMS_APPLICATION_INFO.SET_MODULE(NULL,NULL);\nEND LEVEL2;\n\nCall completed.\n\
    ```\n\nThe code presented is without any of the formatting you may have applied\
    \ to the code. Database objects in code that are not present in the preprocessed\
    \ code will not be visible in the `USER_DEPENDENCIES` view. Wrapped code remains\
    \ wrapped and you can't unwrap code using this procedure. (You can read more about\
    \ dependencies in [Chapter 15](#Chapter15.html#ch15).)\n\nIf you want to process\
    \ the pre-processed code yourself, you can call the `DBMS_PREPROCESSOR.GET_POST_PROCESSED_SOURCE`\
    \ function, which will return a table of `VARCHAR2` containing the code. The reason\
    \ that formatting is lost it is because the package uses `DBMS_OUTPUT.PUT_LINE`.\
    \ The `PUT_LINE` procedure removes leading spaces. If you create a procedure like\
    \ the one below, adding a line number (or any character) to the left of the code\
    \ will ensure that formatting is not lost. The following procedure—`PRINT_SOURCE`—will\
    \ print the preprocessed code with formatting and line numbers, based on the parameters\
    \ given:\n\n```sql\nSQL@V112> CREATE OR REPLACE PROCEDURE PRINT_SOURCE (P_OBJECT_TYPE\
    \ VARCHAR2, P_SCHEMA_NAME\n  VARCHAR2, P_OBJECT_NAME VARCHAR2)  IS\n2   l_source_lines\
    \ DBMS_PREPROCESSOR.source_lines_t;\n3  BEGIN\n4    l_source_lines := DBMS_PREPROCESSOR.GET_POST_PROCESSED_SOURCE(P_OBJECT_TYPE,\n\
    P_SCHEMA_NAME, P_OBJECT_NAME);\n5    FOR I IN l_source_lines.FIRST .. l_source_lines.LAST\
    \ LOOP\n6        IF TRIM(SUBSTR(l_source_lines (i),1, length(l_source_lines (i))-1))\
    \ IS NOT NULL\nTHEN\n7          DBMS_OUTPUT.PUT_LINE(RPAD(I,4, ' ')||REPLACE(l_source_lines(i),\
    \ CHR(10),''));\n8        END IF;\n9    END LOOP;\n10  END;\n11  /\n```\n\nExecuting\
    \ the procedure with the given parameters results in the following output:\n\n\
    ```sql\nSQL@V112> set serveroutput on\nSQL@V112> exec PRINT_SOURCE ('PROCEDURE','ACME','LEVEL2');\n\
    \n1   PROCEDURE LEVEL2 AS\n8      l_start_time TIMESTAMP;\n10  BEGIN\n11  DBMS_APPLICATION_INFO.SET_MODULE(\
    \ 'LEVEL2'          , 'RUN');\n13      l_start_time:=CURRENT_TIMESTAMP;\n15  --\
    \ -----------------------------------------------\n16  -- Application logic is\
    \ left out\n17  -- -----------------------------------------------\n19    LOGIT\
    \ (P_PG=> 'LEVEL2'         , P_START_TIME=> l_start_time,\nP_STOP_TIME=>CURRENT_TIMESTAMP);\n\
    21  DBMS_APPLICATION_INFO.SET_MODULE(NULL,NULL);\n22  END LEVEL2;\n```\n\n####\
    \ Benefits of Preprocessing Code\n\nOne of the benefits you gain by excluding\
    \ code with preprocessed code is that the amount of memory used by the executing\
    \ code may be reduced, thus less memory is used in the shared pool. Suppose, for\
    \ example, that the procedure `LEVEL2` was coded as follows:\n\n```sql\nSQL@V112>\
    \ CREATE OR REPLACE PROCEDURE LEVEL2 (TIMING_ON BOOLEAN := FALSE) AS\n2  l_start_time\
    \ TIMESTAMP;\n3  BEGIN\n4  DBMS_APPLICATION_INFO.SET_MODULE('LEVEL2' ,NULL);\n\
    5     IF TIMING_ON THEN\n6        l_start_time:=CURRENT_TIMESTAMP;\n7     END\
    \ IF;\n8     -- -----------------------------------------------\n9   -- Application\
    \ logic is left out\n10  -- -----------------------------------------------\n\
    11  IF TIMING_ON THEN\n12     LOGIT (P_PG=>'LEVEL2', P_START_TIME=>l_start_time,\n\
    P_STOP_TIME=>CURRENT_TIMESTAMP);\n13  END IF;\n14  DBMS_APPLICATION_INFO.SET_MODULE(NULL,NULL);\n\
    15  END LEVEL2;\n16  /\n```\n\nThis example shows how you might code a normal\
    \ stored procedure, in which you would enable some timing measurements. The view\
    \ `USER_OBJECT_SIZE` will show an estimate of how much memory in bytes a given\
    \ program will require. However, you can't see how much memory the program requires\
    \ at runtime, as runtime memory usage is dependent on how you write the code,\
    \ whether you do bulk collects, and other such things. The following is the memory\
    \ usage estimation for `LEVEL2`:\n\n```sql\nSQL@V112> SELECT * FROM USER_OBJECT_SIZE\
    \ WHERE NAME = 'LEVEL2';\n\nNAME           TYPE          SOURCE_SIZE PARSED_SIZE\
    \  CODE_SIZE ERROR_SIZE\n-------------- ------------- ----------- -----------\
    \ ---------- ----------\nLEVEL2         PROCEDURE               521         996\
    \        510          0\n```\n\nThe column `SOURCE_SIZE` shows the size of the\
    \ source code for the given procedure. Source code must fit in memory during compilation.\
    \ `PARSED_SIZE` is how much memory the given program requires when other programs\
    \ that are compiled reference it. `CODE_SIZE` is the amount of memory that the\
    \ program requires in order to execute— as a start. And finally, the column `ERROR_SIZE`\
    \ is the number of bytes in memory for error messages during compilation. In this\
    \ case, `ERROR_SIZE` is 0 because no errors occurred during compilation.\n\nSuppose\
    \ you create the same procedure, but let a PL/SQL compiler flag control the timing\
    \ measurement call, so that the code looks like this:\n\n```sql\nSQL@V112> CREATE\
    \ OR REPLACE PROCEDURE LEVEL2 AS\n2  $IF $$TIMING_ON $THEN\n3     l_start_time\
    \ TIMESTAMP;\n4  $END\n5  BEGIN\n6  DBMS_APPLICATION_INFO.SET_MODULE($$PLSQL_UNIT\
    \ ,NULL);\n7     $IF $$TIMING_ON $THEN\n8       l_start_time:=CURRENT_TIMESTAMP;\n\
    9     $END\n10     -- -----------------------------------------------\n11    \
    \ -- Application logic is left out\n12     -- -----------------------------------------------\n\
    13     $IF $$TIMING_ON $THEN\n14       LOGIT (P_PG=>$$PLSQL_UNIT, P_START_TIME=>l_start_time,\n\
    P_STOP_TIME=>CURRENT_TIMESTAMP);\n15     $END\n16  DBMS_APPLICATION_INFO.SET_MODULE(NULL,NULL);\n\
    17  END LEVEL2;\n18  /\nProcedure created.\n```\n\nSetting the PL/SQL flag `TIMING_ON`\
    \ to `FALSE` results in the following code sizes:\n\n```sql\nSQL@V112> SELECT\
    \ * FROM USER_OBJECT_SIZE WHERE NAME = 'LEVEL2';\n\nNAME          TYPE       \
    \   SOURCE_SIZE PARSED_SIZE  CODE_SIZE ERROR_SIZE\n------------- -------------\
    \ ----------- ----------- ---------- ----------\nLEVEL2        PROCEDURE     \
    \          530         857        364          0\n```\n\nThe `SOURCE_SIZE` is\
    \ almost the same size as in the first example, even though `$IF` constructions\
    \ have been added to control definition and reference of the variable `l_start_time`.\
    \ The first example also has the parameter parsing in the code, so there's not\
    \ much difference there either. But the `PARSED_SIZE` and `CODE_SIZE` values have\
    \ both been reduced.\n\nNow let's look at the case when timing is enabled. Compiling\
    \ the procedure `LEVEL2` with the compiler flag `TIMING_ON` set to `TRUE` gives\
    \ the following result:\n\n```sql\nSQL@V112> SELECT * FROM USER_OBJECT_SIZE WHERE\
    \ NAME = 'LEVEL2';\n```"
  raw: '#### What Part of the Code is Running?


    In the simple procedure just shown in the “Basics” section, it''s easy to get
    the overview of what code is actually running whether the TIMING_ON flag is set
    to TRUE or FALSE. The USER_SOURCE view reveals all the code in the stored procedure.
    The conditional compilation code you create may be very complex, so to see what
    code is actually compiled or not, you should call the DBMS_PREPROCESSOR.PRINT_POST_PROCESSED_SOURCE
    procedure. This procedure generates the code that is actually compiled (remember
    to set serveroutput on).


    `SQL@V112> CALL DBMS_PREPROCESSOR.PRINT_POST_PROCESSED_SOURCE(''PROCEDURE'', ''ACME'',''LEVEL2'');`

    `PROCEDURE LEVEL2 AS`

    `L_start_time TIMESTAMP;`

    `BEGIN`

    `DBMS_APPLICATION_INFO.SET_MODULE( ''LEVEL2''          , ''RUN'');`

    `L_start_time:=CURRENT_TIMESTAMP;`

    `-- -----------------------------------------------`

    `-- Application logic is left out`

    `-- -----------------------------------------------`

    `LOGIT (P_PG=> ''LEVEL2''         , P_START_TIME=>l_start_time, P_STOP_TIME=>CURRENT_TIMESTAMP);`

    `DBMS_APPLICATION_INFO.SET_MODULE(NULL,NULL);`

    `END LEVEL2;`


    `Call completed.`


    The code presented is without any of the formatting you may have applied to the
    code. Database objects in code that are not present in the preprocessed code will
    not be visible in the USER_DEPENDENCIES view. Wrapped code remains wrapped and
    you can''t unwrap code using this procedure. (You can read more about dependencies
    in [Chapter 15](#Chapter15.html#ch15).)


    If you want to process the pre-processed code yourself, you can call the `DBMS_PREPROCESSOR.GET_POST_PROCESSED_SOURCE`
    function, which will return a table of VARCHAR2 containing the code. The reason
    that formatting is lost it is because the package uses DBMS_OUTPUT.PUT_LINE. The
    PUT_LINE procedure removes leading spaces. If you create a procedure like the
    one below, adding a line number (or any character) to the left of the code will
    ensure that formatting is not lost. The following procedure—PRINT_SOURCE—will
    print the preprocessed code with formatting and line numbers, based on the parameters
    given:


    `SQL@V112> CREATE OR REPLACE PROCEDURE PRINT_SOURCE (P_OBJECT_TYPE VARCHAR2, P_SCHEMA_NAME`![images](images/U003.jpg)

    `  VARCHAR2, P_OBJECT_NAME VARCHAR2)  IS`

    `2   l_source_lines DBMS_PREPROCESSOR.source_lines_t;`

    `3  BEGIN`

    `4    l_source_lines := DBMS_PREPROCESSOR.GET_POST_PROCESSED_SOURCE(P_OBJECT_TYPE,`

    `P_SCHEMA_NAME, P_OBJECT_NAME);`

    `5    FOR I IN l_source_lines.FIRST .. l_source_lines.LAST LOOP`

    `6        IF TRIM(SUBSTR(l_source_lines (i),1, length(l_source_lines (i))-1))
    IS NOT NULL`

    `THEN`

    `7          DBMS_OUTPUT.PUT_LINE(RPAD(I,4, '' '')||REPLACE(l_source_lines(i),
    CHR(10),''''));`

    `8        END IF;`

    `9    END LOOP;`

    `10  END;`

    `11  /`


    Executing the procedure with the given parameters results in the following output:


    `SQL@V112> set serveroutput on`

    `SQL@V112> exec PRINT_SOURCE (''PROCEDURE'',''ACME'',''LEVEL2'');`


    `1   PROCEDURE LEVEL2 AS`

    `8      l_start_time TIMESTAMP;`

    `10  BEGIN`

    `11  DBMS_APPLICATION_INFO.SET_MODULE( ''LEVEL2''          , ''RUN'');`

    `13     l_start_time:=CURRENT_TIMESTAMP;`

    `15  -- -----------------------------------------------`

    `16  -- Application logic is left out`

    `17  -- -----------------------------------------------`

    `19    LOGIT (P_PG=> ''LEVEL2''         , P_START_TIME=> l_start_time,`![images](images/U003.jpg)

    ` P_STOP_TIME=>CURRENT_TIMESTAMP);`

    `21  DBMS_APPLICATION_INFO.SET_MODULE(NULL,NULL);`

    `22  END LEVEL2;`


    #### Benefits of Preprocessing Code


    One of the benefits you gain by excluding code with preprocessed code is that
    the amount of memory used by the executing code may be reduced, thus less memory
    is used in the shared pool. Suppose, for example, that the procedure LEVEL2 was
    coded as follows:


    `SQL@V112> CREATE OR REPLACE PROCEDURE LEVEL2 (TIMING_ON BOOLEAN := FALSE) AS`

    `2  l_start_time TIMESTAMP;`

    `3  BEGIN`

    `4  DBMS_APPLICATION_INFO.SET_MODULE(''LEVEL2'' ,NULL);`

    `5     IF TIMING_ON THEN`

    `6        l_start_time:=CURRENT_TIMESTAMP;`

    `7     END IF;`

    `8     -- -----------------------------------------------`

    `9   -- Application logic is left out`

    `10  -- -----------------------------------------------`

    `11  IF TIMING_ON THEN`

    `12     LOGIT (P_PG=>''LEVEL2'', P_START_TIME=>l_start_time,`

    `P_STOP_TIME=>CURRENT_TIMESTAMP);`

    `13  END IF;`

    `14  DBMS_APPLICATION_INFO.SET_MODULE(NULL,NULL);`

    `15  END LEVEL2;`

    `16  /`


    This example shows how you might code a normal stored procedure, in which you
    would enable some timing measurements. The view USER_OBJECT_SIZE will show an
    estimate of how much memory in bytes a given program will require. However, you
    can''t see how much memory the program requires at runtime, as runtime memory
    usage is dependent on how you write the code, whether you do bulk collects, and
    other such things. The following is the memory usage estimation for LEVEL2:


    `SQL@V112> SELECT * FROM USER_OBJECT_SIZE WHERE NAME = ''LEVEL2'';`


    `NAME           TYPE          SOURCE_SIZE PARSED_SIZE  CODE_SIZE ERROR_SIZE`

    `-------------- ------------- ----------- ----------- ---------- ----------`

    `LEVEL2         PROCEDURE             521         996        510          0`


    The column SOURCE_SIZE shows the size of the source code for the given procedure.
    Source code must fit in memory during compilation. PARSED_SIZE is how much memory
    the given program requires when other programs that are compiled reference it.
    CODE_SIZE is the amount of memory that the program requires in order to execute—
    as a start. And finally, the column ERROR_SIZE is the number of bytes in memory
    for error messages during compilation. In this case, ERROR_SIZE is 0 because no
    errors occurred during compilation.


    Suppose you create the same procedure, but let a PL/SQL compiler flag control
    the timing measurement call, so that the code looks like this:


    `SQL@V112> CREATE OR REPLACE PROCEDURE LEVEL2 AS`

    `2  $IF $$TIMING_ON $THEN`

    `3     l_start_time TIMESTAMP;`

    `4  $END`

    `5  BEGIN`

    `6  DBMS_APPLICATION_INFO.SET_MODULE($$PLSQL_UNIT ,NULL);`

    `7     $IF $$TIMING_ON $THEN`

    `8       l_start_time:=CURRENT_TIMESTAMP;`

    `9     $END`

    `10     -- -----------------------------------------------`

    `11     -- Application logic is left out`

    `12     -- -----------------------------------------------`

    `13     $IF $$TIMING_ON $THEN`

    `14       LOGIT (P_PG=>$$PLSQL_UNIT, P_START_TIME=>l_start_time,`

    `P_STOP_TIME=>CURRENT_TIMESTAMP);`

    `15     $END`

    `16  DBMS_APPLICATION_INFO.SET_MODULE(NULL,NULL);`

    `17  END LEVEL2;`

    `18  /`

    `Procedure created.`


    Setting the PL/SQL flag TIMING_ON to FALSE results in the following code sizes:


    `SQL@V112> SELECT * FROM USER_OBJECT_SIZE WHERE NAME = ''LEVEL2'';`


    `NAME          TYPE          SOURCE_SIZE PARSED_SIZE  CODE_SIZE ERROR_SIZE`

    `------------- ------------- ----------- ----------- ---------- ----------`

    `LEVEL2        PROCEDURE             530         857        364          0`


    The SOURCE_SIZE is almost the same size as in the first example, even though $IF
    constructions have been added to control definition and reference of the variable
    `l_start_time`. The first example also has the parameter parsing in the code,
    so there''s not much difference there either. But the PARSED_SIZE and CODE_SIZE
    values have both been reduced.


    Now let''s look at the case when timing is enabled. Compiling the procedure `LEVEL2`
    with the compiler flag `TIMING_ON` set to `TRUE` gives the following result:


    `SQL@V112> SELECT * FROM USER_OBJECT_SIZE WHERE NAME = ''LEVEL2'';`'
  trans: "\n#### 代码的哪一部分正在运行？\n\n在“基础”部分刚刚展示的简单过程中，无论 `TIMING_ON` 标志是设置为 `TRUE` 还是\
    \ `FALSE`，都很容易了解实际运行的是哪些代码的概览。`USER_SOURCE` 视图会显示存储过程中的所有代码。您创建的条件编译代码可能非常复杂，因此要查看实际编译或未编译的代码，您应该调用\
    \ `DBMS_PREPROCESSOR.PRINT_POST_PROCESSED_SOURCE` 过程。此过程会生成实际编译的代码（请记住设置 `serveroutput\
    \ on`）。\n\n```sql\nSQL@V112> CALL DBMS_PREPROCESSOR.PRINT_POST_PROCESSED_SOURCE('PROCEDURE',\
    \ 'ACME','LEVEL2');\nPROCEDURE LEVEL2 AS\nL_start_time TIMESTAMP;\nBEGIN\nDBMS_APPLICATION_INFO.SET_MODULE(\
    \ 'LEVEL2'          , 'RUN');\nL_start_time:=CURRENT_TIMESTAMP;\n-- -----------------------------------------------\n\
    -- 应用逻辑部分已省略\n-- -----------------------------------------------\nLOGIT (P_PG=>\
    \ 'LEVEL2'         , P_START_TIME=>l_start_time, P_STOP_TIME=>CURRENT_TIMESTAMP);\n\
    DBMS_APPLICATION_INFO.SET_MODULE(NULL,NULL);\nEND LEVEL2;\n\n调用完成。\n```\n\n呈现的代码不包含您可能应用于代码的任何格式。在预处理后的代码中不存在的数据库对象，在\
    \ `USER_DEPENDENCIES` 视图中将不可见。经过包装的代码保持包装状态，您无法使用此过程解包代码。（您可以在第 15 章中阅读更多关于依赖关系的内容。）\n\
    \n如果您想自己处理预处理后的代码，可以调用 `DBMS_PREPROCESSOR.GET_POST_PROCESSED_SOURCE` 函数，该函数将返回一个包含代码的\
    \ `VARCHAR2` 类型表。格式丢失的原因是该包使用了 `DBMS_OUTPUT.PUT_LINE`。`PUT_LINE` 过程会移除前导空格。如果您创建一个类似下面这样的过程，在代码左侧添加行号（或任何字符）将确保格式不会丢失。以下过程——`PRINT_SOURCE`——将根据给定的参数，打印带有格式和行号的预处理后代码：\n\
    \n```sql\nSQL@V112> CREATE OR REPLACE PROCEDURE PRINT_SOURCE (P_OBJECT_TYPE VARCHAR2,\
    \ P_SCHEMA_NAME\n  VARCHAR2, P_OBJECT_NAME VARCHAR2)  IS\n2   l_source_lines DBMS_PREPROCESSOR.source_lines_t;\n\
    3  BEGIN\n4    l_source_lines := DBMS_PREPROCESSOR.GET_POST_PROCESSED_SOURCE(P_OBJECT_TYPE,\n\
