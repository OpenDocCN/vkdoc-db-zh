- fmt: "## Measuring Bulk Binding Performance\n\nAs with bulk collect, the motivation\
    \ for bulk binding is performance, which can be quantified with simple benchmarks.\
    \ I will start with a simple PL/SQL program that inserts a large number of rows\
    \ into a table via single row inserts. The following example (`bulk_insert_conventional.sql`)\
    \ adds 100,000 rows to the `HARDWARE` table, one row at a time:\n\n```\nSQL> set\
    \ timing on\nSQL> declare\n  2    l_now date := sysdate;\n  3  begin\n  4   for\
    \ i in 1 .. 100000 loop\n  5     insert into HARDWARE\n  6     values (i/1000,\
    \ i, to_char(i), l_now);\n  7   end loop;\n  8  end;\n  9  /\n\nPL/SQL procedure\
    \ successfully completed.\n\nElapsed: 00:00:04.52\n```\n\nBefore moving into the\
    \ bulk binding version, it’s worth nothing that Oracle insertion performance,\
    \ even single row at a time, is exceptional. But the database can do better. Let’s\
    \ move on to the bulk binding version (`bulk_insert_bind.sql`) and insert those\
    \ 100,000 rows with a single call.\n\n```\nSQL> set timing on\nSQL> declare\n\
    \  2    l_now date := sysdate;\n  3\n  4    type t_rows is table of hardware%rowtype;\n\
    \  5\n  6    l_rows t_rows := t_rows();\n  7  begin\n  8   l_rows.extend(100000);\n\
    \  9   for i in 1 .. 100000 loop\n 10     l_rows(i).aisle := i/1000;\n 11    \
    \ l_rows(i).item := i;\n 12     l_rows(i).descr := to_char(i);\n 13     l_rows(i).stocked\
    \ := l_now;\n 14   end loop;\n 15\n 16   forall i in 1 .. 100000\n 17     insert\
    \ into hardware values l_rows(i);\n 18\n 19  end;\n 20  /\n\nPL/SQL procedure\
    \ successfully completed.\n\nElapsed: 00:00:00.31\n```\n\nFrom 4.52 seconds down\
    \ to just 0.31 seconds! Just like bulk collect, migrating your code to a bulk\
    \ bind approach for modifying sets of data gives dramatic performance improvements.\
    \ But there are other not-so-obvious benefits occurring here as well. Every time\
    \ you commence a new DML statement, undo structures must be allocated by the database\
    \ to ensure that the DML statement can be rolled back if required, either due\
    \ to error or explicit request. Using bulk binding issues less DML calls, which\
    \ means less stress on your undo infrastructure. The following example (`bulk_bind_undo.sql`)\
    \ examines the session level statistics to compare the undo required when using\
    \ a row-by-row insert versus a bulk bind on insert:\n\n```\nSQL> set serverout\
    \ on\nSQL> declare\n  2    type t_row_list is table of hardware.descr%type\n \
    \ 3       index by pls_integer;\n  4    l_rows t_row_list;\n  5\n  6    l_stat1\
    \ int;\n  7    l_stat2 int;\n  8    l_stat3 int;\n  9\n 10  begin\n 11    select\
    \ value\n 12    into   l_stat1\n 13    from   v$mystat m, v$statname s\n 14  \
    \  where  s.statistic# = m.statistic#\n 15    and    s.name = 'undo change vector\
    \ size';\n 16\n 17    for i in 1 .. 1000 loop\n 18       l_rows(i) := rpad('x',50);\n\
    \ 19       insert into hardware ( descr )  values ( l_rows(i) );\n 20    end loop;\n\
    \ 21\n 22    select value\n 23    into   l_stat2\n 24    from   v$mystat m, v$statname\
    \ s\n 25    where  s.statistic# = m.statistic#\n 26    and    s.name = 'undo change\
    \ vector size';\n 27\n 28    forall i in 1 .. l_rows.count\n 29       insert into\
    \ hardware ( descr )  values ( l_rows(i) );\n 30\n 31    select value\n 32   \
    \ into   l_stat3\n 33    from   v$mystat m, v$statname s\n 34    where  s.statistic#\
    \ = m.statistic#\n 35    and    s.name = 'undo change vector size';\n 36\n 37\
    \    dbms_output.put_line('Row at a time: '||(l_stat2-l_stat1));\n 38    dbms_output.put_line('Bulk\
    \ bind:     '||(l_stat3-l_stat2));\n 39\n 40  end;\n 41  /\nRow at a time: 64556\n\
    Bulk bind:     3296\n\nPL/SQL procedure successfully completed.\n```\n\nSo bulk\
    \ bind gives a lot less undo. Similarly, those undo structures need to be protected\
    \ by redo log entries so that the database instance is recoverable. If the previous\
    \ example is repeated, but instead collects the `redo size` statistic instead\
    \ of the `undo change vector size` (`bulk_bind_redo.sql`) then the output also\
    \ shows a reduction in redo.\n\n```\nRow at a time: 295448\nBulk bind:     69552\n\
    \nPL/SQL procedure successfully completed.\n```\n\n![images](images/square.jpg)\
    \ **Tip** When producing examples for benchmarking, you need to ensure that you\
    \ are isolating your code to purely examine the test at hand. When I was first\
    \ performing the benchmark above, I explicitly referenced `sysdate` for each of\
    \ the 100,000 rows being processed, namely:\n\n```\nfor i in 1 .. 100000 loop\n\
    \  insert into DEMO values (i, sysdate, to_char(i));\nend loop;\n\nfor i in 1\
    \ .. 100000 loop\n   l_rows(i).x := i;\n   l_rows(i).y := sysdate;\n   l_rows(i).z\
    \ := to_char(i);\n```\n\n![images](images/square.jpg) **Note** Both tests ran\
    \ very slowly, and the bulk binding results did not outperform the single row\
    \ test by the order magnitude I had expected. Some more careful experimenting\
    \ showed that it was in fact the 100,000 calls to `sysdate` that was the dominant\
    \ factor in the test. In fact, had I performed the test on earlier versions of\
    \ Oracle, where references to the ‘sysdate’ would silently issue a ‘select sysdate\
    \ from dual’, then the tests would suggest bulk binding was of no benefit at all.\
    \ Always examine your tests carefully before concluding what the results might\
    \ mean."
  raw: '#### Measuring Bulk Binding Performance


    As with bulk collect, the motivation for bulk binding is performance, which can
    be quantified with simple benchmarks. I will start with a simple PL/SQL program
    that inserts a large number of rows into a table via single row inserts. The following
    example (`bulk_insert_conventional.sql`) adds 100,000 rows to the HARDWARE table,
    one row at a time:


    `SQL> set timing on`

