    \    1\nY                            1\nS                            1\nT    \
    \                        1\nA                            1\nT                \
    \            1\nE                            1\n\n63 rows selected\n```\n\nRunning\
    \ this against the entire data set produces over 1 million rows.\n\n```sql\ndrop\
    \ table documents;\ncreate table documents\nas\nselect rownum doc_id, column_name\
