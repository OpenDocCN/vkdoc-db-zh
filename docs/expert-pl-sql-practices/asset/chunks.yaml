  trans: '

    #### 指定参数


    使用`测试实现`部分中的`参数网格`来添加或更新过程或函数预期的输入参数。您可以在逐步完成`单元测试向导`的过程中添加这些输入值，也可以在运行测试前于`详细信息选项卡`中手动添加。向导会创建参数列表，这些参数派生自过程或函数中列出的输入参数。


    图 5-5 展示了`单元测试向导`的参数页面。在这里，您可以看到可以使用静态输入值或`动态值查询`。通过`动态值查询`，您可以使用或查询一个值表，而不是硬编码一个值。单元测试会查询该表，并将结果传递回过程，依次使用每个值或值集合作为过程的输入参数。像本例中那样添加一个单一值来验证测试是否正常工作，是一个有用的起点，但您并未充分利用自动化测试的强大功能。再次强调构建单元测试的优势：您不仅可以自动化该过程，还可以使用`动态值查询`为单次测试运行传入更广泛的测试值集。此外，通过使用值表，您可以更改和更新表中的值，从而为测试传入一组不同的值，而无需更新测试本身。


    过程执行的`预期结果`可能是成功或失败，您可以针对任一结果进行测试。在本例中，您期望成功的结果。如果您测试的是失败，那么预期结果就是失败，您可以在此处添加失败或错误编号。这种情况下，当您运行测试并遇到预期的错误时，测试即视为成功，最终报告将返回成功！


    ![images](img/0505.jpg)


    **图 5-5.** 向测试实现添加参数


    #### 添加过程验证


    测试详细信息页面的最后部分是过程验证。过程的执行通常会导致状态变更，无论您是更新表中的记录还是计算一个值。在这些情况下，您可以提供对预期结果的验证。图 5-6
    提供了可能的过程验证类型列表。例如，如果您正在更新表中的列值，您可能希望验证没有任何值超过某个特定金额。您可以通过针对该表编写一个 `select` 语句并使用“查询不返回任何行”选项来验证这一点。在传入一组参数的情况下（允许过程为每个参数运行多次），您可能希望验证每次过程运行都通过所需的条件。


    ![images](img/0506.jpg)


    **图 5-6.** 选择过程验证


    #### 保存测试


    一旦您运行了`单元测试向导`，测试及其实施即被保存到`单元测试存储库`中。您所做的任何更改，例如更改输入参数或从静态值切换到动态查询值，都需要在运行测试前保存到存储库中。如果您进行了更改然后尝试运行测试，`SQL
    Developer`会提示您保存这些更改。


    #### 调试和运行测试


    您可以通过两种方式运行测试：从命令行，或使用图 5-7 所示的`单元测试详细信息`窗口。要在工具内部运行测试，请点击绿色的运行按钮或使用 `F9`。


    ![images](img/0507.jpg)


    **图 5-7.** 运行测试


    测试结果会发送到`结果选项卡`；您可以先在那里进行初步查看，之后再查看测试报告。


    我发现先调试测试再运行它很有用，因为这可以暴露在运行测试前您可能忽略的任何问题。例如，如果您忘记添加任何输入参数，这会在调试窗口中被标记出来，如图 5-8
    所示。


    ![images](img/0508.jpg)


    **图 5-8.** 调试窗口


    ### 扩展测试范围


    构建单元测试的另一个优势是，一旦构建了一个测试，您可以轻松扩展它以测试各种各样的输入参数。您可以通过运行相同的测试实现并手动更改输入值来做到这一点；或者，您可以为要测试的每个值创建新的实现。如果只需要测试少数几个案例，那么向测试中添加几个额外的实现是可以的，但如果您要测试的值随时间变化，或者您想测试一长串值，那么手动添加实现就不是一个实际可行的方法了。`Oracle
    SQL Developer`的单元测试接受来自静态值列表和动态查询的参数值。您可以使用以下任何一种机制来添加输入参数：


    *   静态查找值列表，使用下拉列表为您创建的每个测试实现填充内容。

    *   静态查找值列表，根据可用值的排列动态生成实现。

    *   动态查询以填充单个实现，使用查询返回的每个值作为输入参数。


    接下来的章节将展示每种方式的示例，以及它们如何为您的测试增添价值。

    '
- fmt: "#### Creating Lookup Values\n\nUse a static list of lookup values when you\
    \ have a small known set of data or if you have a standard set of values that\
    \ you can use in many different tests. Typically, you test a range of values,\
    \ including a few extreme values and the middle ground. So you might test high\
    \ values, low values, and mid-range values in a set of numbers; or extreme length\
    \ strings; or turn of the century dates. In each case, consider the edge case\
    \ in addition to the set of expected values.\n\nTo see this static value list\
    \ in action, you can create a set of lookup values to use with the same procedure,\
    \ `simple_parameter`, used in the earlier example. This procedure expects a number\
    \ as an input parameter, so you need to create a static list of numbers. To create\
    \ the lookup values, expand the `Lookups` node in the Unit Test navigator. You\
    \ can create a new lookup category or use the existing `DEFAULT` category. For\
    \ this example, I recommend you create a new category, as it is easy to see the\
    \ impact of a list other than the default category. With the new category selected,\
    \ right-click to invoke the context menu, click `Add Datatype`, and select `Number`\
    \ from the `DataType` drop-down list in the dialog. You can now add a list of\
    \ numbers. There is an example of a set of values in [Figure 5-9](#Chapter05.html#fig_5_9).\
    \ Once you have added the values, save the changes.\n\n![images](images/0509.jpg)\n\
    \n`Figure 5-9.` Adding static lookup values\n\nBefore you can use the new static\
    \ list, you need to ensure that SQL Developer is aware of your list and to make\
    \ sure this is the default used to input parameters for new implementations. To\
    \ do this, you need to set the Unit Test parameter preference. Select the `Tools`\
    \ ![images](images/U001.jpg) `Preferences` menu and then click `Unit Test Parameters`\
    \ to reveal the option for setting the configuration used in lookups. Using the\
    \ drop-down list, select the new category. There is no need to do this step if\
    \ you added the static values to the `DEFAULT` category, as this is displayed\
    \ in the list by default. The preference is useful for those situations when you\
    \ have many different categories. Select the category and close the preference\
    \ dialog.\n\nYou can now return to the test you created, select the test, and\
    \ right-click to select `Add Implementation`. Expand the test and select the new\
    \ implementation to display the detail in the test screen. Using the `Lookup Category`\
    \ drop-down list, change the value to display your new lookup category. You can\
    \ now run and rerun the implementation using the static list to populate the parameter\
    \ input values, as shown in [Figure 5-10](#Chapter05.html#fig_5_10).\n\n![images](images/0510.jpg)\n\
    \n`Figure 5-10.` Using a static drop-down list\n\n#### Seeding Test Implementations\n\
    \nYou have seen that you can manually change the input parameters by either entering\
    \ them or selecting them from a static drop-down list. You can also use the static\
    \ list to seed multiple implementations in a test.\n\nTo learn this approach,\
    \ you need to create a new test for your procedure. Select the `Tests` node in\
    \ the Unit Test navigator, right-click to invoke the context menu, and select\
    \ `Create Test`. This invokes the Unit Test wizard a stage earlier than you saw\
    \ previously and is an alternative approach to creating a test. Select the connection\
    \ and procedure you worked with earlier. Provide a new test name and select `“Seed/Create\
    \ implementations using lookup values.”` You can click `Finish` at this point\
    \ or skip through the steps to review the `Specify Parameters` screen. Note that\
    \ you can’t modify or add any parameters here, but you should see the name of\
    \ the lookup you created displayed in the lookup category; the wizard creates\
    \ a new implementation using the values in the lookup. Finish the wizard and expand\
    \ the new test. Notice that there are as many implementations created as there\
    \ are values in your lookup.\n\nTo see the real impact of this, return to your\
    \ procedure, add another input parameter such as `p_y IN NUMBER`, and compile\
    \ the code. Your procedure now looks as follows:\n\n```\nCREATE OR REPLACE PROCEDURE\
    \ simple_parameter\n(\n p_x IN NUMBER,\n p_y IN NUMBER\n)\n AS\nBEGIN\n   NULL;\n\
    \   -- Add PL/SQL code to do something useful here\nEND simple_parameter;\n```\n\
    \nReturn to the Unit Test navigator and follow the same process you have just\
    \ completed: create a new test, select `“Seed/Create implementations using lookup\
    \ values”` and finish the Unit Test wizard. When you expand the new test, notice\
    \ that the lookup list has been used to populate both parameters, so instead of\
    \ 6 implementations created, as happened with the single parameter, there are\
    \ now 6 × 6 implementations created. The advantage here is that you can test a\
    \ vast range of values using a small static list of values.\n\nWhen you run the\
    \ unit test, each implementation is run. To run the test with all the implementations,\
    \ select the test in the Unit Test navigator and use the right-click context menu\
    \ to run the test. Switch to the `Results` tab to see the outcome, as shown in\
    \ [Figure 5-11](#Chapter05.html#fig_5_11). Notice how the input parameters used\
    \ are combinations of the static values created in the lookup list.\n\n![images](images/0511.jpg)\n\
    \n`Figure 5-11.` Reviewing seeded implementation results\n\n#### Creating a Dynamic\
    \ Query\n\nUsing a static lookup list to seed multiple implementations is a useful\
    \ way of expanding the scope of what you test. However, the dynamic query mentioned\
    \ earlier offers even greater flexibility. Using a query to provide the values\
    \ that populate an implementation means that the set of values can change, increasing\
    \ or decreasing over time.\n\nTo create a dynamic query, you need to have a table\
    \ of values against which you run the query. For example, create the table and\
    \ data as follows:\n\n```\nCREATE TABLE double_param_val\n(p_val1 NUMBER(2),\n\
    p_val2 Number(5));\n\nINSERT INTO double_param_val VALUES (2, 0);\nINSERT INTO\
    \ double_param_val VALUES (99, 20000);\nINSERT INTO double_param_val values (0,\
    \ 99999);\n```\n\nOnce you have created the table, you can add a new implementation\
    \ to the test. Instead of using the static list or manually adding a parameter,\
    \ select the `Dynamic Value Query` option. This opens a dialog with a sample query,\
    \ `“select ? as P_X, ? as P_Y from ? where ?”`. Rewrite the query to query the\
    \ new table of values as follows `“select p_val1 as P_X, p_val2 as P_Y from double_param_val;”`\
    \ then save and run the test. Notice that you only need a single implementation\
    \ for the dynamic query, even though the table itself may hold a number of values.\
    \ Each value or set of values is passed to the procedure in turn. When you run\
    \ the test, a full set of results, displaying an implementation for each set of\
    \ input values, is displayed in the `Results` tab.\n\nThe advantage of using dynamic\
    \ queries is that the values in the table can change, and you can continue to\
    \ add and update them to test further options without having to add extra implementations.\
    \ Compare this to the static lookup values where an implementation is created\
    \ for each value in the list. If you want to test additional values, you have\
    \ to add additional implementations.\n\n### Supporting Unit Test Features\n\n\
    SQL Developer also provides a number of additional features that support creating\
    \ and running unit tests. A few of these are addressed in the following sections."
  raw: '#### Creating Lookup Values


    Use a static list of lookup values when you have a small known set of data or
    if you have a standard set of values that you can use in many different tests.
    Typically, you test a range of values, including a few extreme values and the
    middle ground. So you might test high values, low values, and mid-range values
    in a set of numbers; or extreme length strings; or turn of the century dates.
    In each case, consider the edge case in addition to the set of expected values.


    To see this static value list in action, you can create a set of lookup values
    to use with the same procedure, simple_parameter, used in the earlier example.
    This procedure expects a number as an input parameter, so you need to create a
    static list of numbers. To create the lookup values, expand the Lookups node in
    the Unit Test navigator. You can create a new lookup category or use the existing
    DEFAULT category. For this example, I recommend you create a new category, as
    it is easy to see the impact of using a list other than the default category.
    With the new category selected, right-click to invoke the context menu, click
    Add Datatype, and select Number from the DataType drop-down list in the dialog.
    You can now add a list of numbers. There is an example of a set of values in [Figure
    5-9](#Chapter05.html#fig_5_9). Once you have added the values, save the changes.


    ![images](images/0509.jpg)


    ***Figure 5-9.** Adding static lookup values*


    Before you can use the new static list, you need to ensure that SQL Developer
    is aware of your list and to make sure this is the default used to input parameters
    for new implementations. To do this, you need to set the Unit Test parameter preference.
    Select the Tools ![images](images/U001.jpg) Preferences menu and then click Unit
    Test Parameters to reveal the option for setting the configuration used in lookups.
    Using the drop-down list, select the new category. There is no need to do the
    step if you added the static values to the DEFAULT category, as this is displayed
    in the list by default. The preference is useful for those situations when you
    have many different categories. Select the category and close the preference dialog.


    You can now return to the test you created, select the test, and right-click to
    select Add Implementation. Expand the test and select the new implementation to
    display the detail in the test screen. Using the Lookup Category drop-down list,
    change the value to display your new lookup category. You can now run and rerun
    the implementation using the static list to populate the parameter input values,
    as shown in [Figure 5-10](#Chapter05.html#fig_5_10).


    ![images](images/0510.jpg)


    ***Figure 5-10.** Using a static drop-down list*


    #### Seeding Test Implementations


    You have seen that you can manually change the input parameters by either entering
    them or selecting them from a static drop-down list. You can also use the static
    list to seed multiple implementations in a test.


    To learn this approach, you need to create a new test for your procedure. Select
    the Tests node in the Unit Test navigator, right-click to invoke the context menu,
    and select Create Test. This invokes the Unit Test wizard a stage earlier than
    you saw previously and is an alternative approach to creating a test. Select the
    connection and procedure you worked with earlier. Provide a new test name and
    select “Seed/Create implementations using lookup values.” You can click Finish
    at the point or skip through the steps to review the Specify Parameters screen.
    Note that you can’t modify or add any parameters here, but you should see the
    name of the lookup you created displayed in the lookup category; the wizard creates
    a new implementation using the values in the lookup. Finish the wizard and expand
    the new test. Notice that there are as many implementations created as there are
    values in your lookup.


    To see the real impact of this, return to your procedure, add another input parameter
    such as p_y IN NUMBER, and compile the code. Your procedure now looks as follows:


    `CREATE OR REPLACE PROCEDURE simple_parameter`

    `(`

    ` p_x IN NUMBER,`

    ` p_y IN NUMBER`

    `)`

    ` AS`

    `BEGIN`

    `   NULL;`

    `   -- Add PL/SQL code to do something useful here`

    `END simple_parameter;`


    Return to the Unit Test navigator and follow the same process you have just completed:
    create a new test, select “Seed/Create implementations using lookup values” and
    finish the Unit Test wizard. When you expand the new test, notice that the lookup
    list has been used to populate both parameters, so instead of 6 implementations
    created, as happened with the single parameter, there are now 6 × 6 implementations
    created. The advantage here is that you can test a vast range of values using
    a small static list of values.


    When you run the unit test, each implementation is run. To run the test with all
    the implementations, select the test in the Unit Test navigator and use the right-click
    context menu to run the test. Switch to the Results tab to see the outcome, as
    shown in [Figure 5-11](#Chapter05.html#fig_5_11). Notice how the input parameters
    used are combinations of the static values created in the lookup list.


    ![images](images/0511.jpg)


    ***Figure 5-11.** Reviewing seeded implementation results*


    #### Creating a Dynamic Query


    Using a static lookup list to seed multiple implementations is a useful way of
    expanding the scope of what you test. However, the dynamic query mentioned earlier
    offers even greater flexibility. Using a query to provide the values that populate
    an implementation means that the set of values can change, increasing or decreasing
    over time.


    To create a dynamic query, you need to have a table of values against which you
    run the query. For example, create the table and data as follows:


    `CREATE TABLE double_param_val`

    `(p_val1 NUMBER(2),`

    `p_val2 Number(5));`


    `INSERT INTO double_param_val VALUES (2, 0);`

    `INSERT INTO double_param_val VALUES (99, 20000);`

    `INSERT INTO double_param_val values (0, 99999);`


    Once you have created the table, you can add a new implementation to the test.
    Instead of using the static list or manually adding a parameter, select the Dynamic
    Value Query option. This opens a dialog with a sample query, “`select ? as P_X,
    ? as P_Y from ? where ?`”. Rewrite the query to query the new table of values
    as follows “`select p_val1 as P_X, p_val2 as P_Y from double_param_val;`” then
    save and run the test. Notice that you only need a single implementation for the
    dynamic query, even though the table itself may hold a number of values. Each
    value or set of values is passed to the procedure in turn. When you run the test,
    a full set of results, displaying an implementation for each set of input values,
    is displayed in the Results tab.


    The advantage of using dynamic queries is that the values in the table can change,
    and you can continue to add and update them to test further options without having
    to add extra implementations. Compare this to the static lookup values where an
    implementation is created for each value in the list. If you want to test additional
    values, you have to add additional implementations.


    ### Supporting Unit Test Features


    SQL Developer also provides a number of additional features that support creating
    and running unit tests. A few of these are addressed in the following sections.'
  trans: "\n#### 创建查找值\n\n当你有一个小型已知数据集，或者有一套标准值集可在多个不同测试中使用时，可以使用静态查找值列表。通常，你会测试一个值的范围，包括几个极端值和中间值。因此，你可能会测试一组数字中的高值、低值和中值；或测试极端长度的字符串；或世纪之交的日期。在每种情况下，除了预期值集外，还要考虑边界情况。\n\
    \n要查看此静态值列表的实际应用，你可以创建一组查找值，用于与之前示例中使用的相同过程 `simple_parameter`。此过程期望一个数字作为输入参数，因此你需要创建一个静态数字列表。要创建查找值，请在单元测试导航器中展开\
    \ `Lookups` 节点。你可以创建一个新的查找类别，或使用现有的 `DEFAULT` 类别。对于本例，我建议你创建一个新类别，因为这样更容易看到非默认类别列表的影响。选中新类别后，右键单击以调用上下文菜单，单击\
    \ `Add Datatype`，然后在对话框的 `DataType` 下拉列表中选择 `Number`。现在你可以添加数字列表了。图 5-9 中有一组值的示例。添加值后，保存更改。\n\
    \n![images](img/0509.jpg)\n\n`图 5-9.` 添加静态查找值\n\n在使用新的静态列表之前，你需要确保 SQL Developer\
    \ 知晓你的列表，并确保这是新实现输入参数时默认使用的列表。为此，你需要设置单元测试参数首选项。选择 `Tools` ![images](img/U001.jpg)\
    \ `Preferences` 菜单，然后单击 `Unit Test Parameters` 以显示用于设置查找配置选项。使用下拉列表，选择新类别。如果你将静态值添加到了\
    \ `DEFAULT` 类别，则无需执行此步骤，因为该类别默认显示在列表中。当你拥有许多不同类别时，此首选项非常有用。选择类别并关闭首选项对话框。\n\n\
    现在，你可以返回到创建的测试，选择测试，然后右键单击选择 `Add Implementation`。展开测试并选择新的实现，以在测试屏幕中显示详细信息。使用\
    \ `Lookup Category` 下拉列表，将值更改为你新的查找类别。现在，你可以使用静态列表来填充参数输入值来运行和重新运行实现，如 图 5-10\
    \ 所示。\n\n![images](img/0510.jpg)\n\n`图 5-10.` 使用静态下拉列表\n\n#### 播种测试实现\n\n你已经看到，可以通过手动输入或从静态下拉列表中选择来更改输入参数。你还可以使用静态列表在测试中播种多个实现。\n\
    \n要学习这种方法，你需要为你的过程创建一个新的测试。在单元测试导航器中选择 `Tests` 节点，右键单击调用上下文菜单，然后选择 `Create Test`。这将调用单元测试向导，比你之前看到的阶段更早，是创建测试的另一种方法。选择连接和你之前使用的过程。提供一个新的测试名称，并选择\
    \ `“Seed/Create implementations using lookup values.”`。此时你可以单击 `完成`，或跳过步骤以查看 `Specify\
    \ Parameters` 屏幕。请注意，你无法在此处修改或添加任何参数，但你应该会看到你创建的查找名称显示在查找类别中；该向导使用查找中的值创建一个新的实现。完成向导并展开新测试。注意，创建的实现数量与你查找列表中的值一样多。\n\
    \n要看到其真正效果，请返回你的过程，添加另一个输入参数，例如 `p_y IN NUMBER`，并编译代码。你的过程现在如下所示：\n\n```\nCREATE\
    \ OR REPLACE PROCEDURE simple_parameter\n(\n p_x IN NUMBER,\n p_y IN NUMBER\n\
    )\n AS\nBEGIN\n   NULL;\n   -- Add PL/SQL code to do something useful here\nEND\
    \ simple_parameter;\n```\n\n返回单元测试导航器，并按照你刚刚完成的相同过程操作：创建一个新测试，选择 `“Seed/Create\
    \ implementations using lookup values”` 并完成单元测试向导。当你展开新测试时，注意查找列表已被用于填充两个参数，因此不是像单个参数那样创建\
    \ 6 个实现，而是创建了 6 × 6 个实现。这样做的好处是，你可以使用少量的静态值列表来测试广泛的数值范围。\n\n当你运行单元测试时，每个实现都会被执行。要使用所有实现运行测试，请在单元测试导航器中选择测试，并使用右键上下文菜单来运行测试。切换到\
    \ `Results` 选项卡以查看结果，如 图 5-11 所示。注意使用的输入参数是如何组合自查找列表中创建的静态值的。\n\n![images](img/0511.jpg)\n\
    \n`图 5-11.` 查看播种的实现结果\n\n#### 创建动态查询\n\n使用静态查找列表来播种多个实现是扩展测试范围的有用方法。然而，前面提到的动态查询提供了更大的灵活性。使用查询来提供填充实现的值，意味着值集可以随时间而变化，增加或减少。\n\
    \n要创建动态查询，你需要有一个可以针对其运行查询的值表。例如，创建表和数据如下：\n\n```\nCREATE TABLE double_param_val\n\
    (p_val1 NUMBER(2),\np_val2 Number(5));\n\nINSERT INTO double_param_val VALUES\
    \ (2, 0);\nINSERT INTO double_param_val VALUES (99, 20000);\nINSERT INTO double_param_val\
    \ values (0, 99999);\n```\n\n创建表后，你可以向测试添加一个新的实现。不要使用静态列表或手动添加参数，而是选择 `Dynamic\
    \ Value Query` 选项。这将打开一个包含示例查询的对话框：`“select ? as P_X, ? as P_Y from ? where ?”`。重写查询以查询新的值表，如下所示：`“select\
    \ p_val1 as P_X, p_val2 as P_Y from double_param_val;”`，然后保存并运行测试。请注意，对于动态查询，你只需要一个实现，即使表本身可能包含许多值。每个值或值集会依次传递给过程。当你运行测试时，`Results`\
    \ 选项卡中将显示一套完整的结果，为每组输入值显示一个实现。\n\n使用动态查询的优势在于表中的值可以变化，你可以继续添加和更新它们以测试更多选项，而无需添加额外的实现。这与静态查找值形成对比，静态查找值是为列表中的每个值创建一个实现。如果你想测试其他值，则必须添加额外的实现。\n\
    \n### 支持的单元测试功能\n\nSQL Developer 还提供了许多支持创建和运行单元测试的附加功能。以下部分将介绍其中一些。\n"
- fmt: "## 运行报告\n\n创建并开始运行单元测试后，你可以运行为所有已运行测试创建的报告。报告包括以下内容：\n\n*   用户测试运行：所有运行过测试的用户的报告。\n\
    *   代码覆盖率：运行的套件中的代码覆盖率报告和单个测试的代码覆盖率报告。覆盖率报告包括总行数以及测试覆盖的行数。\n*   测试实现运行：测试和套件中运行的实现的报告。\n\
    \n[图 5-12](#Chapter05.html#fig_5_12) 展示了一组所有已运行的测试。通过选择单个报告，可以查看运行详情和代码覆盖率。\n\n\
    ![images](images/0512.jpg)\n\n*图 5-12. 运行测试报告*\n\n![images](images/square.jpg)\
    \ **注意** 这些报告查询单元测试存储库中的结果，因此清除测试运行结果也会从报告中清除它们。\n\n## 创建组件库\n\n我之前谈到过单元测试的优势在于可重复性。如果能构建一套可重用的组件，就开始为组装更多测试建立资源。可以使用\
    \ Library 节点作为起点并在库中创建一组组件，但在创建测试时同步构建组件会容易得多。\n\n仍然坚持使用最基础的 PL/SQL 程序，使用以下示例来构建测试，同时创建一组库组件。使用以下代码，它创建了两个表（其中一个包含数据）以及一个过程：\n\
    \n```\nCREATE TABLE cities\n  (city_id NUMBER(4,0),\n   city VARCHAR2(30),\n \
    \  country_abrv VARCHAR2(2)\n  ) ;\n```\n\n```\nCREATE OR REPLACE PROCEDURE insert_cities\
    \ (\n    city_id NUMBER,\n    city       VARCHAR2,\n    country_abrv VARCHAR2)\n\
    \  IS\n  BEGIN\n    INSERT INTO cities (city_id, city,country_abrv)\n    VALUES\
    \ (city_id, city, country_abrv);\n  END;\n/\n```\n\n```\nCREATE TABLE places\n\
    \  (\n    location_id NUMBER(4,0),\n    city VARCHAR2(30),\n    country_id  CHAR(2)\n\
    \  ) ;\n```\n\n```\nINSERT INTO places  VALUES (1000,'Roma','IT');\nINSERT INTO\
    \ places  VALUES (1100,'Venice','IT');\nINSERT INTO places  VALUES (1200,'Tokyo','JP');\n\
    INSERT INTO places  VALUES (1300,'Hiroshima','JP');\nINSERT INTO places  VALUES\
    \ (1400,'Southlake','US');\nINSERT INTO places  VALUES (1500,'South San Francisco','US');\n\
    INSERT INTO places  VALUES (1600,'South Brunswick','US');\nINSERT INTO places\
    \  VALUES (1700,'Seattle','US');\nINSERT INTO places  VALUES (1800,'Toronto','CA');\n\
    INSERT INTO places  VALUES (1900,'Whitehorse','CA');\n```\n\n为过程 `insert_cities`\
    \ 创建一个新的单元测试。你可以从连接导航器中操作（选择该过程，右键打开上下文菜单，然后选择“创建单元测试”），或者从单元测试菜单中操作（选择测试 ![images](images/U001.jpg)\
    \ 从上下文菜单中选择“创建测试”）。打开向导后，给测试起个名字并选择“使用单个虚拟实现创建”。\n\n在启动过程中，你有一个选择：可以留空启动，插入记录，然后在拆卸时删除插入的记录；或者可以复制现有表，使用过程插入行，然后在拆卸中恢复状态。在本例中，添加一个新的启动，并从下拉列表中选择“表或行复制”。这将调用一个新对话框。浏览找到并选择要复制的表（本例中是\
    \ `CITIES`），然后单击“确定”返回到“启动过程”对话框。如果你只是构建单元测试而不将代码添加到库中，你会直接继续完成向导，但既然正在构建组件库，就在“发布到库”字段中添加一个名称，如[图\
    \ 5-13](#Chapter05.html#fig_5_13)所示，然后单击“发布”。\n\n![images](images/0513.jpg)\n\n\
    *图 5-13. 创建库组件*\n\n发布组件后，对话框会发生变化，你将无法再编辑值。只要你选择了“订阅”复选框，这状态就一直保持。只要单元测试仍订阅此库组件，对组件进行的任何更改都会反映在使用它的测试中。一旦构建了一组组件，你就可以使用同一个对话框从库中选择它们。如果库组件完成了大部分你需要的功能，但不是全部，你可以创建一个副本然后进行修改。这些修改由你正在处理的测试使用，不会影响任何其他使用该库组件的测试。\n\
    \n将启动发布到库后，继续到向导的下一页。你已经看到了处理参数的不同可用选项，因此选择“动态值查询”，因为此参数选项也提供了将详细信息作为组件保存到库中的机会。添加以下查询：\n\
    \n```\nSELECT LOCATION_ID AS CITY_ID,  CITY AS CITY,  COUNTRY_ID AS COUNTRY_ABRV\n\
    FROM PLACES\n```\n\n为了将查询发布到库中，像之前一样在“发布到库”字段中输入名称并单击“发布”。继续到“过程验证”屏幕并添加一个新的过程验证。在本例中，你需要检查是否已将行插入表中。有多种方法可以做到这一点，一种方法是查询更新后的表。在添加新的过程验证时，从下拉列表中选择**返回多行的查询**。输入以下代码：\n\
    \n```\nSELECT CITY FROM CITIES WHERE  CITY_ID IN    \n(SELECT  LOCATION_ID FROM\
    \ PLACES);\n```\n\n输入查询后，给新的过程验证起个名字并将其发布到库。[图 5-14](#Chapter05.html#fig_5_14)\
    \ 显示了将详细信息发布到库后的对话框。\n\n![images](images/0514.jpg)\n\n*图 5-14. 添加过程验证*\n\n向导的最后阶段是拆卸过程。在启动过程中，你将表复制到了临时表，所以现在你需要反向操作并恢复表。重置环境的另一种方法可能是删除插入的记录。从下拉列表中选择“表或行恢复”。向导会根据你在启动过程中做出的决定，用详细信息填充拆卸过程中的字段。你也可以将这个最终组件发布到库中。通过查看摘要页面来完成向导，然后单击“完成”关闭对话框。\n\
    \n现在测试已完成，你可以运行它并查看结果。`CITIES` 测试表应该保持为空，因为你的测试插入了新记录然后恢复了表。你的验证过程验证了 `PLACES`\
    \ 表中的记录已插入到 `CITIES` 表中。如果你想测试该过程是否确实在执行插入操作，只需删除启动和拆卸过程，重新运行测试，然后查询 `CITIES`\
    \ 表。你应该会看到新插入的记录。\n\n通过展开单元测试导航器中的 Library 节点来查看库组件，如[图 5-15](#Chapter05.html#fig_5_15)所示。每个组件区域现在都有一段可重用的代码。你可以编辑和更新这些组件；你所做的任何更改都会反映在任何使用它们的测试中。\n\
    \n![images](images/0515.jpg)\n\n*图 5-15. 库的展开视图*"
  raw: '#### Running Reports


    Once you have created and started running your unit tests, you can run the reports
    created for all the tests run. The reports include the following:


    *   User Test Runs: A report of all users who have run tests.

    *   Code Coverage: Reports of the code coverage in suites run and code coverage
    in individual tests. The coverage reports include the total number of lines and
    the number of lines covered by the test.

    *   Test Implementation Runs: Reports for the implementations run in a test and
    in a suite.


    [Figure 5-12](#Chapter05.html#fig_5_12) illustrates a set of all tests run. By
    selecting a single report, you can see the run details and code coverage.


    ![images](images/0512.jpg)


    ***Figure 5-12.** Running test reports*


    ![images](images/square.jpg) **Caution** The reports query the results in the
    Unit Test repository, so purging test run results also purges them from the reports.


    #### Creating a Library of Components


    I have talked about the strength of unit tests being about repeatability. If you
    can build up a set of reusable components, you start building up a resource for
    putting together more tests. You can use the Library node as the starting point
    and create a selection of components in the library, but it is much easier to
    build up the components as you are creating your tests.


    Still keeping to the most basic of PL/SQL programs, use the next example to build
    a test and create a set of library components at the same time. Use the following
    code, which creates two tables, one with data, as well as a procedure:


    `CREATE TABLE cities`

    `  (city_id NUMBER(4,0),`

    `   city VARCHAR2(30),`

    `   country_abrv VARCHAR2(2)`

    `  ) ;`


    `CREATE OR REPLACE  PROCEDURE insert_cities (`

    `    city_id NUMBER,`

    `    city       VARCHAR2,`

    `    country_abrv VARCHAR2)`

    `  IS`

    `  BEGIN`

    `    INSERT INTO cities (city_id, city,country_abrv)`

    `    VALUES (city_id, city, country_abrv);`

    `  END;`

    `/`


    `CREATE TABLE places`

    `  (`

    `    location_id NUMBER(4,0),`

    `    city VARCHAR2(30),`

    `    country_id  CHAR(2)`

    `  ) ;`


    `INSERT INTO places  VALUES (1000,''Roma'',''IT'');`

    `INSERT INTO places  VALUES (1100,''Venice'',''IT'');`

    `INSERT INTO places  VALUES (1200,''Tokyo'',''JP'');`

    `INSERT INTO places  VALUES (1300,''Hiroshima'',''JP'');`

    `INSERT INTO places  VALUES (1400,''Southlake'',''US'');`

    `INSERT INTO places  VALUES (1500,''South San Francisco'',''US'');`

    `INSERT INTO places  VALUES (1600,''South Brunswick'',''US'');`

    `INSERT INTO places  VALUES (1700,''Seattle'',''US'');`

    `INSERT INTO places  VALUES (1800,''Toronto'',''CA'');`

    `INSERT INTO places  VALUES (1900,''Whitehorse'',''CA'');`


    Create a new unit test for the procedure insert_cities. You can either do this
    from the Connection navigator (select the procedure, right-click for the Context
    menu, and select Create Unit Test) or from the Unit Test menu (select Tests ![images](images/U001.jpg)
    Create Test from the Context menu). Once you have the wizard open, give the test
    a name and select “Create with single Dummy implementation.”


    In the startup process, you have a choice: you can leave the startup empty, insert
    the records, and then delete the inserted records on teardown, or you can copy
    the existing table, insert the rows with the procedure and then restore the state
    in the teardown. In this example, add a new startup and select “Table or Row copy”
    from the drop-down list. This invokes a new dialog. Browse to find and select
    the table you want to copy (in this case CITIES) and click OK to return the Startup
    Process dialog. If you are just building the unit test without also adding the
    code to the library, you would just continue through the wizard, but you are building
    up a library of components, so add a name to the Publish to Library field, as
    shown in [Figure 5-13](#Chapter05.html#fig_5_13), and click Publish.


    ![images](images/0513.jpg)


    ***Figure 5-13.** Creating a library Component*


    After you publish the component, the dialog changes and you can no longer edit
    the values. This remains true while you have the Subscribe checkbox selected.
    While the unit test remains subscribed to this library component, any changes
    made to the component are reflected in the tests that consume it. Once you have
    built up a set of components, you can select them from the library using this
    same dialog. If the library component does most of what you need, but not everything,
    you can create a copy and then modify it. The modifications are used by the test
    you are working on and don’t affect any other test using the library component.


    When you have published the startup to the library, continue to the next page
    of the wizard. You have already seen the different choices available for working
    with parameters, so select the Dynamic Value Query as this parameter option also
    provides the opportunity of saving the detail to the Library as a component. Add
    the following query:


    `SELECT LOCATION_ID AS CITY_ID,  CITY AS CITY,  COUNTRY_ID AS COUNTRY_ABRV`

    `FROM PLACES`


    In order to publish the query to the library, enter a name in the Publish to Library
    field and click Publish as before. Continue to the Process Validation screen and
    add a new process validation. In this example, you need to check to see if the
    rows are inserted into the table. There are different approaches to doing this,
    one way is to query the updated table. Select **Query returning row(s)** from
    the drop-down list when you add the new process validation. Enter the following
    code:


    `SELECT CITY FROM CITIES WHERE  CITY_ID IN    `

    `(SELECT  LOCATION_ID FROM PLACES);`


    When you have entered the query, give the new process validation a name and publish
    it to the library. [Figure 5-14](#Chapter05.html#fig_5_14) shows the dialog after
    the details are published to the library.


    ![images](images/0514.jpg)


    ***Figure 5-14.** Adding process validations*


    The final stage of the wizard is the teardown process. In the startup process,
    you copied the table to a temporary table, so now you need to reverse the process
    and restore the table. An alternative approach to resetting the environment might
    be to delete the records inserted. Select Table or Row Restore from the drop-down
    list. The wizard populates the field in the teardown process with the details
    based on the startup process decisions you made. You can also publish this final
    component to the library. Complete the wizard by reviewing the summary page and
    click Finish to close the dialog.


    Now that that test is complete, you can run it and review the results. The CITIES
    test table should remain empty because your test inserts the new records and then
    restores the table. Your validation process verifies that the records in the PLACES
    tables were inserted into the CITIES. If you want to test that the procedure is
    actually doing the inserts, just delete the startup and teardown processes, rerun
    the tests, and query the CITIES table. You should see the new records inserted.


    Review the library components by expanding the Library node in the Unit Test navigator,
    as shown in [Figure 5-15](#Chapter05.html#fig_5_15). Each of the component areas
    now has a reusable piece of code. You can edit and update these components; any
    changes you make are reflected in any tests consuming them.


    ![images](images/0515.jpg)


    ***Figure 5-15.** Expanded view of the library*'
  trans: "## 运行报告\n\n创建并开始运行单元测试后，你可以运行为所有已运行测试创建的报告。报告包括以下内容：\n\n*   用户测试运行：所有运行过测试的用户的报告。\n\
    *   代码覆盖率：运行的套件中的代码覆盖率报告和单个测试的代码覆盖率报告。覆盖率报告包括总行数以及测试覆盖的行数。\n*   测试实现运行：测试和套件中运行的实现的报告。\n\
    \n图 5-12 展示了一组所有已运行的测试。通过选择单个报告，可以查看运行详情和代码覆盖率。\n\n![images](img/0512.jpg)\n\n\
    *图 5-12. 运行测试报告*\n\n![images](img/square.jpg) **注意** 这些报告查询单元测试存储库中的结果，因此清除测试运行结果也会从报告中清除它们。\n\
    \n## 创建组件库\n\n我之前谈到过单元测试的优势在于可重复性。如果能构建一套可重用的组件，就开始为组装更多测试建立资源。可以使用 Library 节点作为起点并在库中创建一组组件，但在创建测试时同步构建组件会容易得多。\n\
    \n仍然坚持使用最基础的 PL/SQL 程序，使用以下示例来构建测试，同时创建一组库组件。使用以下代码，它创建了两个表（其中一个包含数据）以及一个过程：\n\
    \n```\nCREATE TABLE cities\n  (city_id NUMBER(4,0),\n   city VARCHAR2(30),\n \
    \  country_abrv VARCHAR2(2)\n  ) ;\n```\n\n```\nCREATE OR REPLACE PROCEDURE insert_cities\
    \ (\n    city_id NUMBER,\n    city       VARCHAR2,\n    country_abrv VARCHAR2)\n\
    \  IS\n  BEGIN\n    INSERT INTO cities (city_id, city,country_abrv)\n    VALUES\
    \ (city_id, city, country_abrv);\n  END;\n/\n```\n\n```\nCREATE TABLE places\n\
    \  (\n    location_id NUMBER(4,0),\n    city VARCHAR2(30),\n    country_id  CHAR(2)\n\
    \  ) ;\n```\n\n```\nINSERT INTO places  VALUES (1000,'Roma','IT');\nINSERT INTO\
    \ places  VALUES (1100,'Venice','IT');\nINSERT INTO places  VALUES (1200,'Tokyo','JP');\n\
    INSERT INTO places  VALUES (1300,'Hiroshima','JP');\nINSERT INTO places  VALUES\
    \ (1400,'Southlake','US');\nINSERT INTO places  VALUES (1500,'South San Francisco','US');\n\
    INSERT INTO places  VALUES (1600,'South Brunswick','US');\nINSERT INTO places\
    \  VALUES (1700,'Seattle','US');\nINSERT INTO places  VALUES (1800,'Toronto','CA');\n\
    INSERT INTO places  VALUES (1900,'Whitehorse','CA');\n```\n\n为过程 `insert_cities`\
    \ 创建一个新的单元测试。你可以从连接导航器中操作（选择该过程，右键打开上下文菜单，然后选择“创建单元测试”），或者从单元测试菜单中操作（选择测试 ![images](img/U001.jpg)\
    \ 从上下文菜单中选择“创建测试”）。打开向导后，给测试起个名字并选择“使用单个虚拟实现创建”。\n\n在启动过程中，你有一个选择：可以留空启动，插入记录，然后在拆卸时删除插入的记录；或者可以复制现有表，使用过程插入行，然后在拆卸中恢复状态。在本例中，添加一个新的启动，并从下拉列表中选择“表或行复制”。这将调用一个新对话框。浏览找到并选择要复制的表（本例中是\
    \ `CITIES`），然后单击“确定”返回到“启动过程”对话框。如果你只是构建单元测试而不将代码添加到库中，你会直接继续完成向导，但既然正在构建组件库，就在“发布到库”字段中添加一个名称，如图\
    \ 5-13 所示，然后单击“发布”。\n\n![images](img/0513.jpg)\n\n*图 5-13. 创建库组件*\n\n发布组件后，对话框会发生变化，你将无法再编辑值。只要你选择了“订阅”复选框，这状态就一直保持。只要单元测试仍订阅此库组件，对组件进行的任何更改都会反映在使用它的测试中。一旦构建了一组组件，你就可以使用同一个对话框从库中选择它们。如果库组件完成了大部分你需要的功能，但不是全部，你可以创建一个副本然后进行修改。这些修改由你正在处理的测试使用，不会影响任何其他使用该库组件的测试。\n\
    \n将启动发布到库后，继续到向导的下一页。你已经看到了处理参数的不同可用选项，因此选择“动态值查询”，因为此参数选项也提供了将详细信息作为组件保存到库中的机会。添加以下查询：\n\
    \n```\nSELECT LOCATION_ID AS CITY_ID,  CITY AS CITY,  COUNTRY_ID AS COUNTRY_ABRV\n\
    FROM PLACES\n```\n\n为了将查询发布到库中，像之前一样在“发布到库”字段中输入名称并单击“发布”。继续到“过程验证”屏幕并添加一个新的过程验证。在本例中，你需要检查是否已将行插入表中。有多种方法可以做到这一点，一种方法是查询更新后的表。在添加新的过程验证时，从下拉列表中选择**返回多行的查询**。输入以下代码：\n\
    \n```\nSELECT CITY FROM CITIES WHERE  CITY_ID IN    \n(SELECT  LOCATION_ID FROM\
    \ PLACES);\n```\n\n输入查询后，给新的过程验证起个名字并将其发布到库。图 5-14 显示了将详细信息发布到库后的对话框。\n\n![images](img/0514.jpg)\n\
    \n*图 5-14. 添加过程验证*\n\n向导的最后阶段是拆卸过程。在启动过程中，你将表复制到了临时表，所以现在你需要反向操作并恢复表。重置环境的另一种方法可能是删除插入的记录。从下拉列表中选择“表或行恢复”。向导会根据你在启动过程中做出的决定，用详细信息填充拆卸过程中的字段。你也可以将这个最终组件发布到库中。通过查看摘要页面来完成向导，然后单击“完成”关闭对话框。\n\
    \n现在测试已完成，你可以运行它并查看结果。`CITIES` 测试表应该保持为空，因为你的测试插入了新记录然后恢复了表。你的验证过程验证了 `PLACES`\
    \ 表中的记录已插入到 `CITIES` 表中。如果你想测试该过程是否确实在执行插入操作，只需删除启动和拆卸过程，重新运行测试，然后查询 `CITIES`\
    \ 表。你应该会看到新插入的记录。\n\n通过展开单元测试导航器中的 Library 节点来查看库组件，如图 5-15 所示。每个组件区域现在都有一段可重用的代码。你可以编辑和更新这些组件；你所做的任何更改都会反映在任何使用它们的测试中。\n\
    \n![images](img/0515.jpg)\n\n*图 5-15. 库的展开视图*"
- fmt: '### Exporting, Importing, and Synchronizing Tests


    You can share your tests with other users through the `Unit Test Repository`.
    This means that any users who have access to the `Unit Test Repository` can see
    the tests and run them. Not only can other users see the tests, everyone who has
    access can run the tests against the database connections of their choice. In
    other words, where it makes sense, you might run a test in the development environment
    and in a separate bug-testing environment. An alternative to this is to export
    the tests and share them on a central server. Other users can then import the
    tests.


    When you initially create a test for a procedure, the procedure owner details
    are stored in the test details. You can see this in the `Unit Test Details` screen
    shown in [Figure 5-16](#Chapter05.html#fig_5_16), which lists the fully qualified
    procedure name.


    ![images](images/0516.jpg)


    Figure 5-16. Showing the unit test details


    The procedure name is also visible in the XML file created when you export tests.
    If you export and import the unit test, either you need to import it into a database
    with the same user and procedure or you need to point the test to the correct
    procedure in a new schema. So for the situation where you want to test the same
    procedure in different databases against different users and for different repositories,
    you can do so by exporting and then importing the test.


    To export a test, simply right-click the test and select `Export to File`. For
    importing tests, you need to use the main `Tools` > `Unit Test` menu and select
    `Import from File`.


    Once you have imported the test, you may need to synchronise it with the new environment.
    Synchronizing tests is not only useful when moving tests to a different environment,
    but also if the procedures or functions you are working with in your own scenario
    change. For example, you may add or update the input parameters. There are a few
    alternatives as to why you might need to perform a synchronization.


    *   The procedure the test executes has the same parameters but in a different
    order.

    *   The procedure has different parameters from the one for which the test was
    originally built.

    *   The procedure exists in a schema different from that for which it was originally
    created.


    To do the synchronization, select the test, right-click and select `Synchronize
    Test`. You can now browse to select the correct procedure, as shown in [Figure
    5-17](#Chapter05.html#fig_5_17).


    ![images](images/0517.jpg)


    Figure 5-17. Synchronizing a unit test


    Where the test requires changes, they are listed in the summary screen, as shown
    in [Figure 5-18](#Chapter05.html#fig_5_18). In this example, the procedure needs
    to point to the procedure in the new schema and there is a change in the input
    parameter.


    ![images](images/square.jpg) **Tip** After you have synchronized a test, make
    sure you refresh the test details to reflect the changes. You may need to update
    any dynamic queries to match the new parameter changes.


    ![images](images/0518.jpg)


    Figure 5–18. Synchronize unit test summary


    ### Building Suites


    Ultimately, you want to build up a suite of regression tests that you can run
    outside of the `SQL Developer` environment. To create a suite of tests, select
    the `Suites` node, invoke the Context menu, and select `Create Suite`. You can
    select and add as many tests to the suite as you like. The useful thing about
    a suite is that you only need to select the suite to run it, and you can move
    all the startup and teardown processes to the top level and then have them execute
    at the start of the testing. You can review the suite results in the reports in
    the same way you can review the reports for individual tests.


    ### Running Tests from the Command Line


    Once you have built your tests or suite of tests, you can run them from the command
    line and ultimately include them into your build process. To run `SQL Developer`
    Unit Tests from the command line, start a command line session and navigate to
    the `\sqldeveloper\sqldeveloper\bin` directory.


    To get help and details about the unit test command line commands, enter `ututil`
    at the command prompt, without any additional parameters. The tool will return
    the three available command options: to run, import, or export unit tests. To
    see the parameters each of these expects, enter the command query `ututil –exp
    ?`


    Once you know the expected parameters, you can enter the complete command, for
    example:


    ```

    D:\Builds\SQL Dev\3.0\3.0.04.34\sqldeveloper\sqldeveloper\bin>ututil -exp -test
    -name SIMPLE_PARAMETER -repo UNIT_TEST_30 -file d:\working\myexptest.xml

    ```


    You can build the full command to run, export, or import tests, as shown in [Figure
    5-19](#Chapter05.html#fig_5_19), into your batch files and schedule them to run
    if and when you need them.


    ![images](images/0519.jpg)


    Figure 5-19. Exporting a unit test from the command line


    The results of the test runs are written to the repository as before, so you can
    review the reports in the `Tests` or `Suites` sections.


    ### Summary


    Unit testing is key to building applications. Java developers have been building
    unit tests as part of their development process for some years now, while PL/SQL
    developers have been slower to make this a formal part of the development process.
    Unit tests can form part of a regression suite of tests and run from the command
    line to support a batch process. This chapter reviewed the reasons why you should
    build unit tests as well as when and why you need to see them as part of the full
    PL/SQL development cycle. Using Oracle `SQL Developer` 3.0 as a basis for the
    examples, the concepts of preparing the test environment through adding startup
    processes and resetting the environment through teardown process were introduced.
    Procedures and functions typically expect one or more input parameters, and so
    one section addressed the different options available for providing static or
    dynamic input parameters and the importance of validating the test process and
    outcome. Automating the testing process through running tests from the command
    line means that tests and test suites can be incorporated into the general application
    build cycle. By introducing unit testing and illustrating the advantages gained
    by using a testing framework, I hope you will be able to build tests quickly and
    easily, and develop robust code as part of your development cycle.


    # Bulk SQL Operations


    *by Connor McDonald*


    This chapter is about the bulk SQL operations available in PL/SQL. Bulk operations
    in PL/SQL enable you to manipulate and process many rows at once, rather than
    one row at a time. In this chapter, you’ll learn about bulk fetching and bulk
    binding. Bulk fetching refers to the ability to retrieve a set of rows from the
    database into PL/SQL structures with a single call, rather than making a call
    to the database for each row to be retrieved. Bulk binding lets you perform the
    converse: to take those sets of rows stored in PL/SQL structures and save them
    to the database in an efficient manner.


    You’ll see the tremendous performance benefits possible with bulk SQL operations.
    To achieve these benefits requires a little extra complexity in your code, especially
    in the area of error handling, but I’ll show you how to manage that complexity
    so that you will achieve performance benefits without compromising the manageability
    of your code.'
  raw: '#### Exporting, Importing, and Synchronizing Tests


    You can share your tests with other users through the Unit Test Repository. This
    means that any users who have access to the Unit Test Repository can see the tests
    and run them. Not only can other users see the tests, everyone who has access
    can run the tests against the database connections of their choice. In other words,
    where it makes sense, you might run a test in the development environment and
    in a separate bug-testing environment. An alternative to this is to export the
    tests and share them on a central server. Other users can then import the tests.


    When you initially create a test for a procedure, the procedure owner details
    are stored in the test details. You can see this in the Unit Test Details screen
    shown in [Figure 5-16](#Chapter05.html#fig_5_16), which lists the fully qualified
    procedure name.


    ![images](images/0516.jpg)


    ***Figure 5-16.** Showing the unit test details*


    The procedure name is also visible in the XML file created when you export tests.
    If you export and import the unit test, either you need to import it into a database
    with the same user and procedure or you need to point the test to the correct
    procedure in a new schema. So for the situation where you want to test the same
    procedure in different databases against different users and for different repositories,
    you can do so by exporting and then importing the test.


    To export a test, simply right-click the test and select Export to File. For importing
    tests, you need to use the main Tools ![images](images/U001.jpg) Unit Test menu
    and select Import from File.


    Once you have imported the test, you may need to synchronise it with the new environment.
    Synchronizing tests is not only useful when moving tests to a different environment,
    but also if the procedures or functions you are working with in your own scenario
    change. For example, you may add or update the input parameters. There are a few
    alternatives as to why you might need to perform a synchronization.


    *   The procedure the test executes has the same parameters but in a different
    order.

    *   The procedure has different parameters from the one for which the test was
    originally built.

    *   The procedure exists in a schema different from that for which it was originally
    created.


    To do the synchronization, select the test, right-click and select Synchronize
    Test. You can now browse to select the correct procedure, as shown in [Figure
    5-17](#Chapter05.html#fig_5_17).


    ![images](images/0517.jpg)


    ***Figure 5-17.** Synchronizing a unit test*


    Where the test requires changes, they are listed in the summary screen, as shown
    in [Figure 5-18](#Chapter05.html#fig_5_18). In this example, the procedure needs
    to point to the procedure in the new schema and there is a change in the input
    parameter.


    ![images](images/square.jpg) **Tip** After you have synchronized a test, make
    sure you refresh the test details to reflect the changes. You may need to update
    any dynamic queries to match the new parameter changes.


    ![images](images/0518.jpg)


    ***Figure 5–18.** Synchronize unit test summary*


    #### Building Suites


    Ultimately, you want to build up a suite of regression tests that you can run
    outside of the SQL Developer environment. To create a suite of tests, select the
    Suites node, invoke the Context menu, and select Create Suite. You can select
    and add as many tests to the suite as you like. The useful thing about a suite
    is that you only need to select the suite to run it, and you can move all the
    startup and teardown processes to the top level and then have them execute at
    the start of the testing. You can review the suite results in the reports in the
    same way you can review the reports for individual tests.


    ### Running Tests from the Command Line


    Once you have built your tests or suite of tests, you can run them from the command
    line and ultimately include them into your build process. To run SQL Developer
    Unit Tests from the command line, start a command line session and navigate to
    the `\sqldeveloper\sqldeveloper\bin` directory.


    To get help and details about the unit test command line commands, enter `ututil`
    at the command prompt, without any additional parameters. The tool will return
    the three available command options: to run, import, or export unit tests. To
    see the parameters each of these expects, enter the command query


    ` ututil –exp ?`


    Once you know the expected parameters, you can enter the complete command, for
    example:


    `D:\Builds\SQL Dev\3.0\3.0.04.34\sqldeveloper\sqldeveloper\bin>ututil -exp -test`

    `-name SIMPLE_PARAMETER -repo UNIT_TEST_30 -file d:\working\myexptest.xml`


    You can build the full command to run, export, or import tests, as shown in [Figure
    5-19](#Chapter05.html#fig_5_19), into your batch files and schedule them to run
    if and when you need them.


    ![images](images/0519.jpg)


    ***Figure 5-19.** Exporting a unit test from the command line*


    The results of the test runs are written to the repository as before, so you can
    review the reports in the Tests or Suites sections.


    ### Summary


    Unit testing is key to building applications. Java developers have been building
    unit tests as part of their development process for some years now, while PL/SQL
    developers have been slower to make this a formal part of the development process.
    Unit tests can form part of a regression suite of tests and run from the command
    line to support a batch process. This chapter reviewed the reasons why you should
    build unit tests as well as when and why you need to see them as part of the full
    PL/SQL development cycle. Using Oracle SQL Developer 3.0 as a basis for the examples,
    the concepts of preparing the test environment through adding startup processes
    and resetting the environment through teardown process were introduced. Procedures
    and functions typically expect one or more input parameters, and so one section
    addressed the different options available for providing static or dynamic input
    parameters and the importance of validating the test process and outcome. Automating
    the testing process through running tests from the command line means that tests
    and test suites can be incorporated into the general application build cycle.
    By introducing unit testing and illustrating the advantages gained by using a
    testing framework, I hope you will be able to build tests quickly and easily,
    and develop robust code as part of your development cycle.


    ## C H A P T E R  6


    ## Bulk SQL Operations


    **by Connor McDonald**


    This chapter is about the bulk SQL operations available in PL/SQL. Bulk operations
    in PL/SQL enable you to manipulate and process many rows at once, rather than
    one row at a time. In this chapter, you’ll learn about bulk fetching and bulk
    binding. Bulk fetching refers to the ability to retrieve a set of rows from the
    database into PL/SQL structures with a single call, rather than making a call
    to the database for each row to be retrieved. Bulk binding lets you perform the
    converse: to take those sets of rows stored in PL/SQL structures and save them
    to the database in an efficient manner.


    You’ll see the tremendous performance benefits possible with bulk SQL operations.
    To achieve these benefits requires a little extra complexity in your code, especially
    in the area of error handling, but I’ll show you how to manage that complexity
    so that you will achieve performance benefits without compromising the manageability
    of your code.'
  trans: '### 导出、导入和同步测试


    您可以通过 `单元测试存储库` 与其他用户共享您的测试。这意味着任何有权访问 `单元测试存储库` 的用户都可以查看测试并运行它们。其他用户不仅可以查看测试，每个有权访问的用户还可以针对他们选择的数据库连接运行测试。换句话说，在有意义的情况下，您可以在开发环境和单独的缺陷测试环境中运行同一个测试。另一种方法是导出测试并在中央服务器上共享。然后其他用户可以导入这些测试。


    当您最初为某个过程创建测试时，该过程所有者的详细信息会存储在测试详情中。您可以在如 图 5-16 所示的 `单元测试详情` 屏幕中看到这一点，其中列出了完全限定的过程名称。


    ![images](img/0516.jpg)


    图 5-16. 显示单元测试详情


    过程名称在导出测试时创建的 XML 文件中也可见。如果您导出并导入单元测试，则需要将其导入具有相同用户和过程的数据库，或者需要将测试指向新模式下的正确过程。因此，对于您想在不同数据库中针对不同用户和不同存储库测试同一过程的情况，您可以通过导出然后导入测试来实现。


    要导出测试，只需右键单击测试并选择 `导出到文件`。对于导入测试，您需要使用主菜单中的 `工具` > `单元测试`，然后选择 `从文件导入`。


    导入测试后，您可能需要将其与新环境同步。同步测试不仅在将测试移动到不同环境时有用，而且在您自己场景中使用的过程或函数发生变化时也很有用。例如，您可能添加或更新了输入参数。您可能需要执行同步的原因有几种。


    *   测试执行的过程具有相同的参数，但顺序不同。

    *   该过程与最初构建测试时所针对的过程具有不同的参数。

    *   该过程存在于与最初创建时不同的模式中。


    要执行同步，请选择测试，右键单击并选择 `同步测试`。现在您可以浏览以选择正确的过程，如 图 5-17 所示。


    ![images](img/0517.jpg)


    图 5-17. 同步单元测试


    如果测试需要更改，这些更改会列在摘要屏幕中，如 图 5-18 所示。在此示例中，测试需要指向新模式中的过程，并且输入参数发生了变化。


    ![images](img/square.jpg) **提示** 同步测试后，请确保刷新测试详情以反映更改。您可能需要更新任何动态查询以匹配新的参数更改。


    ![images](img/0518.jpg)


    图 5–18. 同步单元测试摘要


    ### 构建测试套件


    最终，您会希望建立一套回归测试，以便在 `SQL Developer` 环境之外运行。要创建测试套件，请选择 `套件` 节点，调用上下文菜单，然后选择 `创建套件`。您可以根据需要选择并添加任意多的测试到套件中。套件的好处在于，您只需选择套件即可运行它，并且可以将所有启动和拆解过程移动到顶层，让它们在测试开始时执行。您可以像审查单个测试的报告一样，在报告中查看套件的结果。


    ### 从命令行运行测试


    一旦您构建了测试或测试套件，就可以从命令行运行它们，并最终将其纳入您的构建过程。要从命令行运行 `SQL Developer` 单元测试，请启动命令行会话并导航到
    `\sqldeveloper\sqldeveloper\bin` 目录。


    要获取有关单元测试命令行命令的帮助和详细信息，请在命令提示符下输入 `ututil`，不带任何附加参数。该工具将返回三个可用的命令选项：运行、导入或导出单元测试。要查看每个命令预期的参数，请输入查询命令
    `ututil –exp ?`


    一旦您知道预期的参数，就可以输入完整的命令，例如：


    ```

    D:\Builds\SQL Dev\3.0\3.0.04.34\sqldeveloper\sqldeveloper\bin>ututil -exp -test
    -name SIMPLE_PARAMETER -repo UNIT_TEST_30 -file d:\working\myexptest.xml

    ```


    您可以将完整的运行、导出或导入测试的命令构建到批处理文件中，如 图 5-19 所示，并根据需要安排它们运行。


    ![images](img/0519.jpg)


    图 5-19. 从命令行导出单元测试


    测试运行的结果像之前一样写入存储库，因此您可以在 `测试` 或 `套件` 部分查看报告。


    ### 总结


    单元测试是构建应用程序的关键。Java 开发人员多年来一直将单元测试作为开发过程的一部分，而 PL/SQL 开发人员则较慢地将其作为开发过程的正式组成部分。单元测试可以构成回归测试套件的一部分，并从命令行运行以支持批处理过程。本章回顾了您应该构建单元测试的原因，以及何时和为何需要将它们视为整个
    PL/SQL 开发周期的一部分。以 Oracle `SQL Developer` 3.0 作为示例基础，介绍了通过添加启动过程来准备测试环境以及通过拆解过程重置环境的概念。过程和函数通常期望一个或多个输入参数，因此有一节讨论了提供静态或动态输入参数的不同可用选项，以及验证测试过程和结果的重要性。通过从命令行运行测试来自动化测试过程，意味着测试和测试套件可以被纳入通用的应用程序构建周期。通过介绍单元测试并说明使用测试框架所获得的优势，我希望您能够快速轻松地构建测试，并在开发周期中开发出健壮的代码。


    # 批量 SQL 操作


    *作者：Connor McDonald*


    本章介绍 PL/SQL 中可用的批量 SQL 操作。PL/SQL 中的批量操作使您能够一次操作和处理多行数据，而不是一次处理一行。在本章中，您将学习批量提取和批量绑定。批量提取是指通过单次调用将一组行从数据库检索到
    PL/SQL 结构中的能力，而不是为要检索的每一行都调用数据库。批量绑定则允许您执行相反的操作：将存储在 PL/SQL 结构中的那些行集以高效的方式保存到数据库中。


    您将看到使用批量 SQL 操作可能带来的巨大性能优势。要实现这些优势需要您的代码增加一点复杂性，尤其是在错误处理方面，但我会向您展示如何管理这种复杂性，以便在获得性能优势的同时不损害代码的可管理性。'
- fmt: "## The Hardware Store\n\n我的五金店之旅开启了我对批量操作益处的认识——不是计算机硬件店，而是那种DIY风格的商店，你在其中购买工具、配件、油漆等物品来为家庭住宅进行手工项目和维护。\n\
    \n我**爱**五金店。当然，作为一名信息技术专业人士，我对任何与体力劳动稍微沾边的东西的了解几乎为零。所以，每次我到收银台支付一个新工具或一罐新油漆后，大约5秒钟内，我就会回到过道去拿一个配套物品；例如，一罐新油漆如果没有油漆刷就没什么用！当我真正拥有完成手头工作所需的所有工具时，我可能已经来回收银台六七次了，每次去收银台时，收银员的脏话水平都在不断升级。我妻子观察到我这样做——一次只买一件东西——她想出了一个昵称，那就是“白痴”。她说得对；我应该直接推一辆购物车，收集我需要的所有物品，然后一次性付清！\n\
    \n这就是最大的矛盾之处。出于某种奇怪的原因，那些在应对“挑战”（比如去五金店）时能应用简单常识的IT专业人士，在处理数据库时却难以应用同样的常识。就像五金店一样，如果你要拿多个（数据）项，使用购物车的编码等价物来收集这些数据会合理得多。\n\
    \n在本章中，我将经常回顾并扩展五金店购物的这个比喻，因为这对构建示例很有用，但也是为了强调一个事实：本章讨论的一切仍然仅仅是我们远离技术的日常生活中所用常识原则的反映。\n\
    \n## 本章示例的设置\n\n本章中的所有示例都可以从Apress网站上本书的目录页面下载，每个示例都标注了相应的文件名。对于每个示例，你会看到一个对脚本的初始调用，像这样：\n\
    \n`@@bulk_setup.sql [populate | empty]`\n\n这将创建一个代表“五金店”的表，所有示例都将使用它。\n\n```\n\
    SQL> desc HARDWARE\n Name                                      Null?    Type\n\
    \ ----------------------------------------- -------- ----------------------------\n\
    \ AISLE                                              NUMBER(5)\n ITEM        \
    \                                       NUMBER(12)\n DESCR                   \
    \                           CHAR(50)\n```\n\n该表创建时为空，除非传递了'populate'关键字，之后将通过以下SQL向表中添加1,000,000行：\n\
    \n```\nSQL> insert /*+ APPEND */ into  HARDWARE\n  2  select trunc(rownum/1000)+1\
    \ aisle,\n  3         rownum item,\n  4         'Description '||rownum descr\n\
    \  5  from\n  6    ( select 1 from dual connect by level <= 1000),\n  7    ( select\
    \ 1 from dual connect by level <= 1000);\n\n1000000 rows created.\n```\n\n该脚本会删除并重新创建表，以便示例能在你的数据库上运行，并得到与你在本章中看到的相似的结果。显然，硬件平台和软件版本有如此多的变体，你的结果可能会有所不同，但这些示例都在最常见的默认设置上运行过，即位于ASSM表空间中的8k块大小。\n\
    \n![images](images/square.jpg) **提示** 使用`DUAL`生成任意行数的技巧可以追溯到多年前Mikito Harakiri在`asktom.oracle.com`网站上的一篇帖子。从那时起，它几乎成为新闻组、书籍等中快速合成数据演示的实际标准。在推向极端时，必须注意不要过度消耗内存。详情请参考[`http://blog.tanelpoder.com/2008/06/08/generating-lots-of-rows-using-connect-by-safely/`](http://blog.tanelpoder.com/2008/06/08/generating-lots-of-rows-using-connect-by-safely/)。\n\
    \n## PL/SQL中的批量操作\n\nOracle中的批处理早于PL/SQL，只是名称不同，即“数组处理”。从我接触Oracle开始（大约在1990年代初的版本6），数组处理的概念就已经可用。不是从数据库中获取单行数据，而是将一组行获取到缓冲区中，然后将该缓冲区作为数组传递回客户端。同样地，不是在数据库中修改或创建单行数据，而是填充一个包含行数组的缓冲区并传递给数据库。应用程序程序员可以通过OCI原生地进行数组处理，或者当时许多流行的Oracle工具（如Forms）会透明地处理该任务。你很快就会看到这种策略在性能和可扩展性方面的好处。\n\
    \nOracle的PL/SQL团队在版本8.1中引入原生数组处理时，大概面临了一个命名问题。到那时，“数组”一词在PL/SQL中已经根深蒂固，指的是`INDEX\
    \ BY`数组数据结构，也许正是由于这种冲突，才产生了“批量”这个术语。事实上，PL/SQL中的数组处理甚至早于8.1版本；它早在Oracle 7中就可以通过`DBMS_SQL`包实现。下一个示例展示了来自版本7的PL/SQL数组处理（我不会详细讲解代码，因为我很快会介绍更简单的机制）。\n\
    \n以下示例（`bulk_dbms_sql_array.sql`）展示了如何在8.0及以下版本中执行数组处理。它一次从`HARDWARE`表中获取500行。\n\
    \n```\nSQL> set serverout on\nSQL> declare\n  2    l_cursor   int  := dbms_sql.open_cursor;\n\
    \  3    l_num_row  dbms_sql.number_table;\n  4    l_exec     int;\n  5    l_fetched_rows\
    \    int;\n  6  begin\n  7   dbms_sql.parse(\n  8           l_cursor,\n  9   \
    \        'select item from hardware where item <= 1200',\n 10           dbms_sql.native);\n\
    \ 11   dbms_sql.define_array(l_cursor,1,l_num_row,500,1);\n 12   l_exec := dbms_sql.execute(l_cursor);\n\
    \ 13   loop\n 14       l_fetched_rows := dbms_sql.fetch_rows(l_cursor);\n 15 \
    \      dbms_sql.column_value(l_cursor, 1, l_num_row);\n 16       dbms_output.put_line('Fetched\
    \ '||l_fetched_rows||' rows');\n 17       exit when l_fetched_rows < 500;\n 18\
    \    end loop;\n 19    dbms_sql.close_cursor(l_cursor);\n 20  end;\n 21  /\nFetched\
    \ 500 rows\nFetched 500 rows\nFetched 200 rows\n\nPL/SQL procedure successfully\
    \ completed.\n```\n\n遗憾的是，即使在它们被引入十年后，PL/SQL中的批量操作在现代以PL/SQL为中心的应用程序中仍然是一种未被充分利用的功能。许多生产环境中的PL/SQL程序仍然以逐行方式处理数据库中的数据。特别是，由于我的大部分工作是在调优领域，我使用集合的主要动机是它鼓励开发者更多地从集合的角度思考，而不是从行的角度思考。虽然从功能上讲，没有理由禁止开发者一次处理一个结果集行，但从效率和性能的角度来看，这通常是坏消息。\n\
    \n同样，PL/SQL在性能方面经常受到批评，但最常见的原因是逐行处理，而不是PL/SQL引擎本身固有的任何问题。PL/SQL并非唯一受到这种错误指责的对象。开发者未能利用Pro*C中的宿主数组，促使Oracle添加了`PREFETCH`编译选项，该选项将运行时Pro*C代码转换为数组获取，即使开发者是以传统的逐行方式编写的代码。类似地，ODP.NET通过其`FetchSize`参数，默认情况下对大多数查询使用数组处理。"
  raw: '### The Hardware Store


    My journey toward the benefit of bulk operations began at the hardware store—not
    the computer hardware store, but the DIY-style store where you purchase tools,
    fixings, paint and the like to perform handyman projects and maintenance on the
    family home.


    I ***love*** the hardware store. Of course, being an Information Technology professional,
    my knowledge about anything that remotely resembles manual labor is pretty much
    zero. So every time I arrive at the cash register to pay for a new tool or a new
    tin of paint, within about 5 seconds I am back in the aisles to pick up an accompanying
    item; for example, a new tin of paint is not much use without a paint brush! By
    the time I actually have all of the tools required to perform the job at hand,
    I’ve probably been back and forth to the cash register six or seven times, each
    trip accompanied by an increasing level of profanity from the person at the till.
    There’s a term of endearment my wife came up with when she observed me doing this—picking
    up a single item at a time— and that term is *idiot*. She’s right; I should just
    grab a trolley, collect ***all*** of the items I need, and pay for them all at
    once!


    And that’s the great hypocrisy. For some strange reason, the same IT professionals
    that apply simple common sense to tackling “challenges” like going to the hardware
    store, struggle to apply that same common sense when it comes to working with
    the database. Much like the hardware store, if you are going to pick up a number
    of items (of data), it makes a lot more sense to use the coding equivalent of
    a trolley to collect that data.


    Throughout this chapter, I’ll often refer back to and expand upon this metaphor
    of purchasing items from the hardware store because it’s useful for the sake of
    building examples, but also to reinforce the fact that everything discussed in
    this chapter is still merely a reflection of the common sense principles we use
    in our everyday lives away from technology.


    ### Setting for the Examples in this Chapter


    All of the examples in this chapter are downloadable from the book’s catalog page
    on the Apress website, and each example is annotated with the appropriate file
    name. For each example, you will see an initial call to a script, like so:


    `@@bulk_setup.sql [populate | empty]`


    This creates a table representing the “hardware store” that all of the examples
    will use.


    `SQL> desc HARDWARE`

    ` Name                          Null?    Type`

    ` ----------------------------- -------- -------------`

    ` AISLE                                  NUMBER(5)`

    ` ITEM                                   NUMBER(12)`

    ` DESCR                                  CHAR(50)`


    The table is created empty unless the ‘populate’ keyword is passed, upon which
    1,000,000 rows will be added to the table via the following SQL:


    `SQL> insert /*+ APPEND */ into  HARDWARE`

    `  2  select trunc(rownum/1000)+1 aisle,`

    `  3         rownum item,`

    `  4         ''Description ''||rownum descr`

    `  5  from`

    `  6    ( select 1 from dual connect by level <= 1000),`^(`**`)

    `  7    ( select 1 from dual connect by level <= 1000);`


    `1000000 rows created.`


    The script drops and recreates the table so that examples should run on your database
    with similar results to what you see in this chapter. Obviously with so many variants
    in terms of hardware platform and software versions, your mileage may vary, but
    the examples have all been run on the most common defaults, namely 8k block size
    residing within an ASSM tablespace.


    ![images](images/square.jpg) **Tip** The trick of using DUAL to generate an arbitrary
    number of rows dates back to a post by Mikito Harakiri on the `asktom.oracle.com`
    site many years ago. Since then, it has almost become the de facto standard in
    demos on newsgroups, books, and the like for quickly synthesizing data. When pushed
    to extremes, care must be taken in order not to excessively consume memory. Refer
    to [`http://blog.tanelpoder.com/2008/06/08/generating-lots-of-rows-using-connect-by-safely/`](http://blog.tanelpoder.com/2008/06/08/generating-lots-of-rows-using-connect-by-safely/)
    for details.


    ### Bulk Operations in PL/SQL


    Bulk processing in Oracle pre-dates PL/SQL, just via a different name, namely
    *array processing*. For as a long as I have worked with Oracle (circa version
    6 in the early 1990s), the concept of array processing has been available. Rather
    than fetch a single row of data from the database, a ***set*** of rows is fetched
    into a buffer, and that buffer is passed back to the client as an array. Similarly,
    rather than modify or create a single row of data in the database, a buffer with
    an array of rows is populated and passed to the database. Application programmers
    could do array processing natively via OCI, or many of the popular Oracle tools
    of the time (such as Forms) would transparently take care of the task. You will
    soon see the performance and scalability benefits of such a strategy.


    Presumably the PL/SQL team at Oracle faced a nomenclature problem in version 8.1
    when they introduced native array processing. By that stage, the term “array”
    was already entrenched in PL/SQL, referring to the INDEX BY array data structure,
    and perhaps from this conflict, the term “bulk” arose. In fact, array processing
    in PL/SQL pre-dates even version 8.1; it was available via the DBMS_SQL package
    way back in Oracle 7\. An example of PL/SQL array processing from version 7 is
    presented next (I will not step through the code in detail, since I’ll be covering
    simpler mechanisms shortly).


    The following example (`bulk_dbms_sql_array.sql`) shows how to perform array processing
    in version 8.0 and below. It fetches 500 rows at a time from the HARDWARE table.


    `SQL> set serverout on`

    `SQL> declare`

    `  2    l_cursor   int  := dbms_sql.open_cursor;`

    `  3    l_num_row  dbms_sql.number_table;`

    `  4    l_exec     int;`

    `  5    l_fetched_rows    int;`

    `  6  begin`

    `  7   dbms_sql.parse(`

    `  8           l_cursor,`

    `  9           ''select item from hardware where item <= 1200'',`

    ` 10           dbms_sql.native);`

    ` 11   dbms_sql.define_array(l_cursor,1,l_num_row,500,1);`

    ` 12   l_exec := dbms_sql.execute(l_cursor);`

    ` 13   loop`

    ` 14       l_fetched_rows := dbms_sql.fetch_rows(l_cursor);`

    ` 15       dbms_sql.column_value(l_cursor, 1, l_num_row);`

    ` 16       dbms_output.put_line(''Fetched ''||l_fetched_rows||'' rows'');`

    ` 17       exit when l_fetched_rows < 500;`

    ` 18    end loop;`

    ` 19    dbms_sql.close_cursor(l_cursor);`

    ` 20  end;`

    ` 21  /`

    `Fetched 500 rows`

    `Fetched 500 rows`

    `Fetched 200 rows`


    `PL/SQL procedure successfully completed.`


    Sadly, even a decade after they were introduced, the bulk operations in PL/SQL
    are still an underused feature in modern PL/SQL-centric applications. Many a production
    PL/SQL program still processes data from the database in a row-by-row fashion.
    In particular, because most of my work is in the tuning arena, my primary motivation
    for the use of collections is that it encourages the developer to think more in
    terms of sets, rather than rows. While there is no functional reason that should
    prohibit developers from processing resultsets one row at a time, from an efficiency
    and performance perspective, it is generally bad news.


    Similarly, criticism is often aimed at PL/SQL in terms of performance, but the
    most common cause of this is row-at-a-time processing rather than anything inherent
    in the PL/SQL engine. PL/SQL is not alone in misplaced criticism of this kind.
    Developers not taking advantage of host-based arrays in Pro*C led Oracle to add
    a `PREFETCH` compiler option, which converts the runtime Pro*C code into array
    fetching even though the developer has coded it in a conventional row-at-a-time
    manner. Similarly, ODP.NET defaults to array processing for most queries via its
    `FetchSize` parameter.'
  trans: "## 五金店之旅\n\n我对批量操作益处的认识，始于一次五金店之旅——不是指计算机硬件店，而是那种可以购买工具、配件、油漆等物品，用于家庭住宅手工项目和维护的\
    \ DIY 风格商店。\n\n我**爱**五金店。当然，作为一名信息技术专业人士，我对任何与体力劳动稍微沾边的东西几乎一无所知。所以，每次我到收银台支付一个新工具或一罐新油漆后，大约\
    \ 5 秒钟内，我就会回到过道去拿一个配套物品；例如，一罐新油漆如果没有油漆刷就没什么用！当我真正拥有完成手头工作所需的所有工具时，我可能已经来回收银台六七次了，每次去收银台时，收银员的脏话都在不断升级。我妻子观察到我这样做——一次只买一件东西——她想出了一个昵称，那就是“白痴”。她说得对；我应该直接推一辆购物车，收集我需要的所有物品，然后一次性付清！\n\
    \n这就是最大的矛盾之处。出于某种奇怪的原因，那些在应对“挑战”（比如去五金店）时能应用简单常识的 IT 专业人士，在处理数据库时却难以应用同样的常识。就像五金店一样，如果你要拿多个（数据）项，使用购物车的编码等价物来收集这些数据会合理得多。\n\
    \n在本章中，我将经常回顾并扩展五金店购物的这个比喻，因为这对构建示例很有用，但也是为了强调一个事实：本章讨论的一切仍然仅仅是我们远离技术的日常生活中所用常识原则的反映。\n\
    \n## 本章示例的设置\n\n本章中的所有示例都可以从 Apress 网站上本书的目录页面下载，每个示例都标注了相应的文件名。对于每个示例，你会看到一个对脚本的初始调用，像这样：\n\
    \n`@@bulk_setup.sql [populate | empty]`\n\n这将创建一个代表“五金店”的表，所有示例都将使用它。\n\n```\n\
    SQL> desc HARDWARE\n Name                                      Null?    Type\n\
    \ ----------------------------------------- -------- ----------------------------\n\
    \ AISLE                                              NUMBER(5)\n ITEM        \
    \                                       NUMBER(12)\n DESCR                   \
    \                           CHAR(50)\n```\n\n该表创建时为空，除非传递了'populate'关键字，之后将通过以下\
    \ SQL 向表中添加 1,000,000 行：\n\n```\nSQL> insert /*+ APPEND */ into  HARDWARE\n  2\
    \  select trunc(rownum/1000)+1 aisle,\n  3         rownum item,\n  4         'Description\
    \ '||rownum descr\n  5  from\n  6    ( select 1 from dual connect by level <=\
    \ 1000),\n  7    ( select 1 from dual connect by level <= 1000);\n\n1000000 rows\
    \ created.\n```\n\n该脚本会删除并重新创建表，以便示例能在你的数据库上运行，并得到与你在本章中看到的相似的结果。显然，硬件平台和软件版本有如此多的变体，你的结果可能会有所不同，但这些示例都在最常见的默认设置上运行过，即位于\
    \ ASSM 表空间中的 8k 块大小。\n\n![images](img/square.jpg) **提示** 使用`DUAL`生成任意行数的技巧可以追溯到多年前\
    \ Mikito Harakiri 在`asktom.oracle.com`网站上的一篇帖子。从那时起，它几乎成为新闻组、书籍等中快速合成数据演示的实际标准。在推向极端时，必须注意不要过度消耗内存。详情请参考[`http://blog.tanelpoder.com/2008/06/08/generating-lots-of-rows-using-connect-by-safely/`](http://blog.tanelpoder.com/2008/06/08/generating-lots-of-rows-using-connect-by-safely/)。\n\
    \n## PL/SQL 中的批量操作\n\nOracle 中的批处理早于 PL/SQL，只是名称不同，即“数组处理”。从我接触 Oracle 开始（大约在\
    \ 1990 年代初的版本 6），数组处理的概念就已经可用。不是从数据库中获取单行数据，而是将一组行获取到缓冲区中，然后将该缓冲区作为数组传递回客户端。同样地，不是在数据库中修改或创建单行数据，而是填充一个包含行数组的缓冲区并传递给数据库。应用程序程序员可以通过\
    \ OCI 原生地进行数组处理，或者当时许多流行的 Oracle 工具（如 Forms）会透明地处理该任务。你很快就会看到这种策略在性能和可扩展性方面的好处。\n\
    \nOracle 的 PL/SQL 团队在版本 8.1 中引入原生数组处理时，大概面临了一个命名问题。到那时，“数组”一词在 PL/SQL 中已经根深蒂固，指的是`INDEX\
    \ BY`数组数据结构，也许正是由于这种冲突，才产生了“批量”这个术语。事实上，PL/SQL 中的数组处理甚至早于 8.1 版本；它早在 Oracle 7\
    \ 中就可以通过`DBMS_SQL`包实现。下一个示例展示了来自版本 7 的 PL/SQL 数组处理（我不会详细讲解代码，因为我很快会介绍更简单的机制）。\n\
    \n以下示例（`bulk_dbms_sql_array.sql`）展示了如何在 8.0 及以下版本中执行数组处理。它一次从`HARDWARE`表中获取 500\
    \ 行。\n\n```\nSQL> set serverout on\nSQL> declare\n  2    l_cursor   int  := dbms_sql.open_cursor;\n\
    \  3    l_num_row  dbms_sql.number_table;\n  4    l_exec     int;\n  5    l_fetched_rows\
    \    int;\n  6  begin\n  7   dbms_sql.parse(\n  8           l_cursor,\n  9   \
    \        'select item from hardware where item <= 1200',\n 10           dbms_sql.native);\n\
    \ 11   dbms_sql.define_array(l_cursor,1,l_num_row,500,1);\n 12   l_exec := dbms_sql.execute(l_cursor);\n\
    \ 13   loop\n 14       l_fetched_rows := dbms_sql.fetch_rows(l_cursor);\n 15 \
    \      dbms_sql.column_value(l_cursor, 1, l_num_row);\n 16       dbms_output.put_line('Fetched\
    \ '||l_fetched_rows||' rows');\n 17       exit when l_fetched_rows < 500;\n 18\
    \    end loop;\n 19    dbms_sql.close_cursor(l_cursor);\n 20  end;\n 21  /\nFetched\
    \ 500 rows\nFetched 500 rows\nFetched 200 rows\n\nPL/SQL procedure successfully\
    \ completed.\n```\n\n遗憾的是，即使在它们被引入十年后，PL/SQL 中的批量操作在现代以 PL/SQL 为中心的应用程序中仍然是一种未被充分利用的功能。许多生产环境中的\
    \ PL/SQL 程序仍然以逐行方式处理数据库中的数据。特别是，由于我的大部分工作是在调优领域，我使用集合的主要动机是它鼓励开发者更多地从集合的角度思考，而不是从行的角度思考。虽然从功能上讲，没有理由禁止开发者一次处理一个结果集行，但从效率和性能的角度来看，这通常是坏消息。\n\
    \n同样，PL/SQL 在性能方面经常受到批评，但最常见的原因是逐行处理，而不是 PL/SQL 引擎本身固有的任何问题。PL/SQL 并非唯一受到这种错误指责的对象。开发者未能利用\
    \ Pro*C 中的宿主数组，促使 Oracle 添加了`PREFETCH`编译选项，该选项将运行时 Pro*C 代码转换为数组获取，即使开发者是以传统的逐行方式编写的代码。类似地，ODP.NET\
    \ 通过其`FetchSize`参数，默认情况下对大多数查询使用数组处理。"
- fmt: "#### Getting Started with BULK Fetch\n\nOne of the great things about transitioning\
    \ your code to take advantage of bulk operations in PL/SQL, is that it’s easy\
    \ to do and has a direct mapping to your existing code. Before bulk operations\
    \ arrived in version 8.1, you could use one of the following three constructs\
    \ to retrieve a row of data in PL/SQL\n\n##### 1. Implicit Cursor\n\nA standard\
    \ SQL query (`SELECT-INTO`) is used to retrieve a single row of data, or columns\
    \ from that single row from a table into target variables. If no rows are retrieved\
    \ or more than a single row is retrieved, an exception is raised. Here’s an example\
    \ (`bulk_implicit_1.sql`):\n\n```sql\nSQL> declare\n  2    l_descr hardware.descr%type;\n\
    \  3  begin\n  4    select descr\n  5    into   l_descr\n  6    from   hardware\n\
    \  7    where  aisle = 1\n  8    and    item = 1;\n  9  end;\n 10  /\n```\n`PL/SQL\
    \ procedure successfully completed.`\n\n##### 2. Explicit Fetch Calls\n\nA cursor\
    \ is explicitly defined within the PL/SQL declaration section. The cursor is then\
    \ opened and fetched from, typically within a loop until the available rows are\
    \ exhausted, at which point the cursor is closed. Here’s an example (`bulk_explicit_1.sql`):\n\
    \n```sql\nSQL> declare\n  2    cursor c_tool_list is\n  3      select descr\n\
    \  4      from   hardware\n  5      where  aisle = 1\n  6      and    item between\
    \ 1 and 500;\n  7\n  8    l_descr hardware.descr%type;\n  9  begin\n 10    open\
    \ c_tool_list;\n 11    loop\n 12      fetch c_tool_list into l_descr;\n 13   \
    \   exit when c_tool_list%notfound;\n 14    end loop;\n 15    close c_tool_list;\n\
    \ 16  end;\n 17  /\n```\n`PL/SQL procedure successfully completed.`\n\n##### 3.\
    \ Implicit Fetch Calls\n\nThe third type is a hybrid between the two approaches.\
    \ A `FOR` loop takes care of the cursor management, the cursor being either explicitly\
    \ defined in advance or the directly coded within the `FOR`-loop itself. Here’s\
    \ an example (`bulk_implicit_fetch_1.sql`):\n\n```sql\nSQL> begin\n  2    for\
    \ i in (\n  3      select descr\n  4      from   hardware\n  5      where  aisle\
    \ = 1\n  6      and    item between 1 and 500 )\n  7    loop\n  8       `<processing\
    \ code for each row>`\n  9    end loop;\n 10  end;\n 11  /\n```\n`PL/SQL procedure\
    \ successfully completed.`\n\nConverting each of those constructs to a bulk collection\
    \ model is easy and straightforward. The following are the three bulk processing\
    \ constructs that are the analogs of the non-bulk constructs just shown.\n\n#####\
    \ 1. Implicit Cursor BULK Mode\n\nA standard SQL query (`SELECT-INTO`) can now\
    \ be used to retrieve multiple rows of data into a collection type simply by adding\
    \ the `BULK COLLECT` keywords. Here’s an example (`bulk_implicit_2.sql`):\n\n\
    ```sql\nSQL> declare\n  2    `type t_descr_list is table of hardware.descr%type;`\n\
    \  3    l_descr_list t_descr_list;\n  4  begin\n  5    select descr\n  6    `bulk\
    \ collect`\n  7    into   l_descr_list\n  8    from   hardware\n  9    where \
    \ aisle = 1\n 10    and    item between 1 and 100;\n 11  end;\n 12  /\n```\n`PL/SQL\
    \ procedure successfully completed.`\n\n##### 2. Explicit Fetch Calls BULK Mode\n\
    \nThe only changes required are to define a collection type to hold the results\
    \ and to add the `BULK COLLECT` clause to the `FETCH` command. All of the rows\
    \ in the cursor resultset will be fetched into the collection type variable in\
    \ a single call. Here’s an example (`bulk_explicit_2.sql`):\n\n```sql\nSQL> declare\n\
    \  2    cursor c_tool_list is\n  3      select descr\n  4      from   hardware\n\
    \  5      where  aisle = 1\n  6      and    item between 1 and 500;\n  7\n  8\
    \    type t_descr_list is table of c_tool_list%rowtype;\n  9    l_descr_list t_descr_list;\n\
    \ 10\n 11  begin\n 12    open c_tool_list;\n 13    fetch c_tool_list `bulk collect`\
    \ into l_descr_list;\n 14    close c_tool_list;\n 15  end;\n 16  /\n```\n`PL/SQL\
    \ procedure successfully completed.`\n\n##### 3. Implicit Fetch Calls BULK mode\n\
    \nThings gets even easier when converting the hybrid approach to bulk collect\
    \ because there are `no` code changes to make. One of the best features to arrive\
    \ in Oracle 10g was the “automatic bulk collect” enhancement for `FOR` loops.\
    \ Because a `FOR` loop on a cursor will, by definition, fetch `all` of the rows\
    \ in the cursor (unless an explicit `EXIT` command is present within the loop),\
    \ the PL/SQL compiler can safely employ a bulk collect optimization to retrieve\
    \ those rows as efficiently as possible. You will automatically get this optimization\
    \ if you are on at least version 10 of Oracle, and the database parameter `plsql_optimize_level`\
    \ is set to at least 2 (the default). The following example (`bulk_implicit_fetch_2.sql`)\
    \ shows the database optimization level followed by a `FOR` loop that is automatically\
    \ implemented for you using the bulk processing features:\n\n```sql\nSQL> select\
    \ banner from v$version where rownum = 1;\n\nBANNER\n----------------------------------------------------------------------------\n\
    Oracle Database 11g Enterprise Edition Release 11.2.0.2.0 - 64bit Production\n\
    \nSQL> select value from v$parameter where name = 'plsql_optimize_level';\n\n\
    VALUE\n----------------------------------------------------------------------------\n\
    2\n\nSQL> begin\n  2    for i in (\n  3      select descr\n  4      from   hardware\n\
    \  5      where  aisle = 1\n  6      and    item between 1 and 500 )\n  7    loop\n\
    \  8       null;\n  9    end loop;\n 10  end;\n 11  /\n```\n`PL/SQL procedure\
    \ successfully completed.`\n\nIt’s not immediately apparent that bulk collection\
    \ is taking place in the previous code. You’ll soon see how you can verify that\
    \ the code is indeed fetching multiple rows with a single call."
