    \ 依赖于表 `ORDERS`，这符合我们的预期。如果该过程代码中引用了其他对象，它们也会在此列出。\n\n![images](img/square.jpg)\
    \ `注意` 有关此特定依赖关系的解释，请参见即将出现的侧栏“`SYS_STUB_FOR_PARITY_ANALYSIS` 是什么？”。\n\n每当表 `ORDERS`\
    \ 的结构发生改变时，过程的有效性就变得存疑，Oracle 会将其标记为无效。然而，存疑并不一定意味着无效。例如，当你向表中添加一个列时，这从技术上讲是对表的更改。这会使过程无效吗？\n\
    \n```sql\nSQL> alter table orders add (store_id number(10));\n```\n\n```\nTable\
    \ altered.\n```\n\n如果你检查 `UPD_QTY` 过程的状态，是的，它会无效。\n\n```sql\nSQL> select status\
    \ from user_objects where object_name = 'UPD_QTY';\n```\n\n```\nSTATUS\n-------\n\
    INVALID\n```\n\n但该过程实际上并未引用新列，因此本不应受到影响。然而，Oracle 不一定知道这一点。为了安全起见，它会抢先将该过程标记为无效。此时，你可以重新编译该过程；它会编译成功。否则，下次调用该过程时，Oracle\
    \ 会自动重新编译它。\n\n让我们看看新的过程如何运作，包括自动重新编译。\n\n```sql\nSQL> exec upd_qty (1,1)\n```\n\
    \n```\nPL/SQL procedure successfully completed.\n```\n\n该过程执行成功，尽管它被标记为无效。这是如何做到的？它之所以能成功执行，是因为执行操作强制了过程的重新编译（和重新验证）。重新编译之所以成功，是因为该过程实际上并未引用底层表中已更改的组件——新列\
    \ `STORE_ID`。该过程编译成功并被标记为有效。你可以通过再次检查状态来确认这一点。\n\n```sql\nSQL> select status from\
    \ user_objects\n  2  where object_name = 'UPD_QTY';\n```\n\n```\nSTATUS\n-------\n\
    VALID\n```\n\n到目前为止，这些事件似乎相当无害；这些强制重新编译处理了任何不影响程序有效性的更改，一切照常运行。你为什么应该关心？你应该非常关心。\n\
    \n### EXECUTED IMMEDIATE 是一种特殊情况\n\n如果一个表是在 `execute immediate` 字符串内被引用的，那么依赖性检查不会捕获该表作为引用对象。例如，考虑以下代码：\n\
    \n```sql\ncreate or replace procedure upd_qty as\nbegin\n   execute immediate\
    \ 'update orders set quantity = ...';\nend;\n```\n\n在这种情况下，`ORDERS` 表将不会显示为 `UP_QTY`\
    \ 的引用对象，这是不使用动态 SQL 的又一个理由（或者，根据你的观点，也是使用它的理由）。\n\n存储代码的编译（以及依赖于它的其他对象，例如基于表的视图）会强制数据库中进行另一个称为解析的过程。解析类似于源代码的编译。当你执行一条\
    \ SQL 语句，例如 `select order_id from orders` 时，Oracle 不能直接执行该语句。它必须询问很多问题，其中一些是：\n\
    \n*   `orders` 是什么？是表、视图还是同义词？\n*   表中是否确实存在名为 `order_id` 的*列*？\n*   是否存在名为 `order_id`\
    \ 的*函数*？\n*   你是否有从该表（或函数）进行选择的*权限*？\n\n在确保你具备所有必要的先决条件后，Oracle 会生成该 SQL 语句的可执行版本，并将其放入库缓存中。这个过程被称为*解析*。随后对\
    \ SQL 的执行将仅使用已解析的版本，而不再经历解析过程。在执行阶段，Oracle 必须确保组件（表 `ORDERS`、过程 `UPD_QTY` 等）没有被更改。它通过在这些对象以及其他结构（如游标）上放置一个*解析锁*来实现这一点。\n\
    \n解析非常消耗 CPU。频繁的解析和重新编译会占用服务器的 CPU 周期，剥夺其他有用进程应得的 CPU 资源。你可以通过检查一个名为 `v$mystat`\
    \ 的视图中与解析相关的统计信息来审视其影响，该视图显示当前会话的统计信息。该视图仅以 `statistic#` 形式显示统计信息；它们的名称在另一个名为\
    \ `v$statname` 的视图中提供。以下是一个连接两个视图并显示解析相关统计信息的查询。将该查询保存为 `ps.sql` 以检查重新解析和重新编译的影响。\n\
    \n```sql\nselect name, value\nfrom v$mystat s, v$statname n\nwhere s.statistic#\
    \ = n.statistic#\nand n.name like '%parse%';\n```\n\n视图 `v$mystat` 是一个累积视图，因此其中的数值不显示当前数据；它们是累加的。要了解某段时间内的统计信息，你必须从该视图中选择两次并获取差值。要找出解析相关的统计信息，首先通过运行\
    \ `ps.sql` 收集统计信息，然后执行过程 `upd_qty()`，再次运行 `ps.sql` 收集统计信息，如下所示：\n\n```sql\nSQL>\
    \ @ps\n```\n\n```\nNAME                                VALUE\n------------------------------\
    \ ----------\nparse time cpu                           20\nparse time elapsed\
    \                       54\nparse count (total)                     206\nparse\
    \ count (hard)                       16\nparse count (failures)              \
    \      1\n```\n\n```sql\nSQL> exec upd_qty(1,1)\n```\n\n```\nPL/SQL procedure\
    \ successfully completed.\n```\n\n```sql\nSQL> @ps\n```\n\n```\nNAME         \
    \                       VALUE\n------------------------------ ----------\nparse\
    \ time cpu                           20\nparse time elapsed                  \
    \     54\nparse count (total)                     208\nparse count (hard)    \
    \                   16\nparse count (failures)                    1\n```\n\n注意这些数值。没有任何增加；换句话说，执行过程\
    \ `upd_qty` 并未导致解析。在一个*不同的*会话中，通过添加列来更改表，如下所示：\n\n```sql\nSQL> alter table orders\
    \ add (amount number(10,2));\n```\n\n```\nTable altered.\n```\n\n现在，在第一个会话中执行该过程并收集统计信息。\n\
    \n```sql\nSQL> exec upd_qty(1,1)\n```\n\n```\nPL/SQL procedure successfully completed.\n\
    ```\n\n```sql\nSQL> @ps\n```\n\n```\nNAME                                VALUE\n\
    ------------------------------ ----------\nparse time cpu                    \
    \       26\nparse time elapsed                       60\nparse count (total) \
    \                    279\nparse count (hard)                       19\nparse count\
    \ (failures)                    1\n```\n\n注意解析相关统计信息是如何增加的。硬解析（意味着 SQL 语句未在库缓存中找到，或者找到的任何版本不可用，因此必须重新解析）从\
    \ 16 跳升到 19——表明发生了 3 次硬解析。总解析次数从 208 跳升到 279，增加了 71。由于有 3 次硬解析，另外 68 次是软解析，这意味着在库缓存中找到了结构并进行了重新验证，而不是从头开始解析。解析的\
    \ CPU 时间从 20 跳升到 26，表明解析消耗了 6 厘秒的 CPU 时间。如果没有解析的需求，这些 CPU 周期本可以用于执行其他有用的工作。这听起来可能不多，但考虑一下在正常的数据库系统中发生成千上万次此类情况，导致大量\
    \ CPU 消耗的场景。\n"
- fmt: "# Oracle RAC 数据库中的解析与依赖管理\n\n![images](images/square.jpg) **Note** 在一个 RAC\
    \ 数据库中，这种解析效果更为显著。由于存在多个实例，每个实例都有自己独立的库缓存，因此解析和失效过程必须被仔细协调。例如，当实例 `INST1` 中的表\
    \ `ORDERS` 被修改时，`UPD_QTY` 过程不仅需要在实例 `INST1` 中被失效；在 `INST2` 中也同样需要（假设是一个双节点的 RAC\
    \ 数据库）。实例 `INST1` 会向 `INST2` 发送一条消息，立即标记 `UPD_QTY` 的已加载版本为无效。由于存在其他人可能错误访问 `UPD_QTY`\
    \ 过程的可能性，这条消息以高优先级作为**直接消息**发送。因为直接消息优先于其他类型的消息（例如请求一个数据块，这被称为**间接消息**），其他消息可能没有机会被传输。这导致获取数据块出现延迟；请求数据块的会话必须等待，从而加剧了性能问题。\n\
    \n问题不止于此。正如你所见，过程在执行时会自动重新编译。它被验证，然后该消息立即传输到 `INST2`。RAC 互联网络被此类消息淹没，影响了其他消息和数据块的流动，从而导致性能问题。随着实例数量的增加，这个问题会变得更加严重，因为需要协调的工作量呈指数级增长。与数据块不同，库缓存中的对象（游标、表、包等）没有“主实例”概念，因此\
    \ RAC 必须通知集群中的所有实例来失效（并验证）该对象。\n\n在一个典型的应用程序中，你可能有很多过程，这些过程又调用很多其他过程。假设过程 `P1`\
    \ 调用过程 `P2`，`P2` 又调用 `P3`，而 `P3` 访问表 `T1`。我们可以用下图表示这种情况，其中 ![images](images/U002.jpg)\
    \ 表示“依赖于”：\n\n`P1` ![images](images/U002.jpg) `P2` ![images](images/U002.jpg)\
    \ `P3` ![images](images/U002.jpg) `T1`\n\n这被称为`依赖链`。如果 `T1` 被修改，链中位于其左侧的所有依赖对象都可能被失效，并且必须在使用前重新编译。重新编译必须按照依赖顺序进行，例如先编译\
    \ `P3`，然后是 `P2`，最后是 `P1`。这种重新编译可以是自动的，但它无论如何都会消耗解析所需的 CPU 周期，并且需要解析锁。`依赖链`越长，对解析的需求就越大，从而导致更多的\
    \ CPU 消耗和对解析锁的需求。在 RAC 数据库中，控制这一成本变得极其重要；否则，其影响将失控。因此，你的目标应该是减少重新验证的循环并缩短`依赖链`。\n\
    \n## 关于 SYS_STUB_FOR_PURITY_ANALYSIS?\n\n你注意到输出中那个命名奇怪的包 `SYS_STUB_FOR_PURITY_ANALYSIS`\
    \ 了吗？我很确定你没有创建它，而且你肯定没有在过程中使用它。如果你检查数据字典，你会看到只有包的规范（Specification），而没有包体。无论如何，你甚至没有引用这个包，那为什么它被列为\
    \ `UPD_QTY` 过程的父对象呢？\n\n这又是解析机制的另一个隐藏工作原理。还记得 PL/SQL 代码段的纯净度模型吗？总的来说，它规定了存储代码改变数据库和包状态的可能性，例如“不写数据库状态”（WNDS）或“不读包状态”（RNPS）。这些被称为存储代码的纯净度级别。在编译存储代码时，Oracle\
    \ 会假定其处于这些纯净状态之一。然而，考虑这个复杂的情况：有一个名为 `ORDERS` 的公共同义词。当你创建这个过程时，解析必须假定你指的是*你自己的*对象\
    \ `ORDERS`，而不是公共同义词 `ORDERS`。但假设另一个用户正在创建一个同名过程（使用相同的代码），而他没有名为 `ORDERS` 的表？在这种情况下，解析将指向公共同义词。这给解析器带来了一个有趣的问题——必须考虑对象的作用域和纯净度。Oracle\
    \ 通过访问一个特殊的包来解决这个问题，该包中定义了针对纯净度状态的过程。以下是该包的定义：\n\n```sql\nCreate or replace package\
    \ sys_stub_for_purity_analysis as\n  procedure prds;\n  pragma restrict_references(prds,\
    \ wnds, rnps, wnps);\n\n  procedure pwds;\n  pragma restrict_references(pwds,\
    \ rnds, rnps, wnps);\n\n  procedure prps;\n  pragma restrict_references(prps,\
    \ rnds, wnds, wnps);\n\n  procedure pwps;\n  pragma restrict_references(pwps,\
    \ rnds, wnds, rnps);\nend sys_stub_for_purity_analysis;\n```\n\n由于这些过程仅仅是为了提供指向纯净度级别的指针，没有其他用途，因此包体不存在。为什么依赖树可以只针对包规范而没有包体存在？这个有趣的话题将在本章后面讨论。就目前而言，我们希望你对这个奇怪引用的包\
    \ `sys_stub_for_purity_analysis` 的解释感到满意。"
  raw: '![images](images/square.jpg) **Note** In a RAC database, this parsing effect
    is even more pronounced. Since there are multiple instances, each with a library
    cache of its own, the parsing and invalidation must be carefully coordinated.
    For instance, when a table ORDERS is modified in instance INST1, the UPD_QTY procedure
    must be invalidated not only in the instance INST1; but in INST2 as well (assuming
    a two-node RAC database). The instance INST1 sends a message to INST2 to immediately
    mark the loaded versions of UPD_QTY invalid. Since there is a possibility someone
    may access the UPD_QTY procedure incorrectly, this message is sent with the high
    priority as a type of message known as a Direct Message. Since direct messages
    supersede the other types of messages, such as request for a block (which is called
    an Indirect Message), the other messages may not get their chance to be transmitted.
    That results in a lag in getting the blocks; the session that requested the blocks
    must wait, adding to the performance problems.


    The problem does not stop there. As you saw, the procedure is recompiled automatically
    when executed. It''s validated, and that message is transmitted to INST2 immediately.
    The RAC interconnect is flooded with the messages like this, affecting the flow
    of other messages and blocks, and thus causing performance problems. The problem
    is exacerbated when the number of instances goes up since the amount of coordination
    goes up exponentially. Unlike blocks, there is no “master instance” of an object
    (cursor, table, package, etc.) in a library cache, so RAC must notify all the
    instances in the cluster to invalidate (and validate) the object.


    In a typical application, you probably have a lot of procedures, which call a
    lot of other procedures. Suppose procedure P1 calls procedure P2, which in turn
    calls P3, which accesses the table T1\. Diagrammatically, we can represent this
    situation as follows, with ![images](images/U002.jpg) signifying “depends on,”
    like so:


    `P1` ![images](images/U002.jpg) `P2` ![images](images/U002.jpg) `P3` ![images](images/U002.jpg)
    `T1`


    This is known as a *dependency chain*. If T1 is modified, all the dependent objects
    in the chain left of it (the ones that depend on it) could be invalidated and
    must be recompiled before being used. The recompilation must be in the order of
    dependency, e.g. first P3, then P2 followed by P1.This recompilation could be
    automatic, but it consumes CPU cycles in parsing and needs parse locks in any
    case. The longer the dependency chain, the more the demand for parsing, and the
    more the CPU consumption and need for parse locks. In a RAC database, it becomes
    extremely important that this cost be controlled; otherwise, the effects will
    spiral out of control. Therefore, your objective should be to reduce the cycle
    of revalidations and shorten the dependency chains.


    **WHAT ABOUT SYS_STUB_FOR_PURITY_ANALYSIS?**


    Did you notice the strangely named package in the output, SYS_STUB_FOR_PURITY_ANALYSIS?
    I''m pretty sure you didn''t create it and you surely didn''t use it in the procedure.
    If you check the data dictionary, you will see specification but not the body
    of the package. In any case, you haven''t even referenced the package, so why
    is that listed as a parent of the procedure UPD_QTY?


    This is yet another hidden working of the parsing mechanism. Remember the purity
    model of the PL/SQL code segments? In summary, it specifies the possibility of
    stored code to change database and package state, such as Write No Database State
    (WNDS) or Read No Package State (RNPS). These are known as the purity level of
    the stored code. While compiling a stored code, Oracle assumes one of these purity
    states. However, consider this complex case: there was a public synonym called
    ORDERS. When you create this procedure, the parsing must assume you are referring
    to *your* object ORDERS; not the public synonym ORDERS. But suppose another user
    is creating a procedure with the same name (with the same code) but does not have
    a table called ORDERS? In that case, parsing will point to the public synonym.
    This creates an interesting problem for the parser—the object''s scope and purity
    must be considered. Oracle addresses this problem by accessing a special package
    that has procedures defined for the purity states. Here is how the package is
    defined:


    `Create or replace package sys_stub_for_purity_analysis as`

    `  procedure prds;`

    `  pragma restrict_references(prds, wnds, rnps, wnps);`


    `  procedure pwds;`

    `  pragma restrict_references(pwds, rnds, rnps, wnps);`


    `  procedure prps;`

    `  pragma restrict_references(prps, rnds, wnds, wnps);`


    `  procedure pwps;`

    `  pragma restrict_references(pwps, rnds, wnds, rnps);`

    `end sys_stub_for_purity_analysis;`


    Since the procedures are merely there to provide a pointer to the purity levels,
    there is no other purpose, thus the body does not exist. How can the dependency
    tree exist for a package only and not the body? This interesting topic is discussed
    later in this chapter. For the time being, we hope you are satisfied with this
    explanation of the strangely referenced package sys_stub_for_purity_analysis.'
