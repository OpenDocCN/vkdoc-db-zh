    \n### 清单 12-10. 创建 `GetEmployeeData_MultiPhoneNo` 过程\n```sql\nSQL>  CREATE OR\
    \ REPLACE PROCEDURE GetEmployeeData_MultiPhoneNo(\n             p_dept_id    \
    \      IN NUMBER,\n             p_emp_cursor      OUT SYS_REFCURSOR,\n       \
    \      p_status_code     OUT NUMBER,\n             p_status_message  OUT VARCHAR2)\
    \ IS\n\n/***************************************************************************************\n\
    \     NAME: GetEmployeeData_MultiPhoneNo\n  PURPOSE: This procedure returns contact\
    \ information for employees by department\n\n    NOTES:\n\n   p_status_code  status_message\n\
    \   =============  ============================================================\n\
    \               0  Success\n          -20102  Input parameter p_dept_id must not\
    \ be null.\n\n***************************************************************************************/\n\
    BEGIN -- GetEmployeeData_MultiPhoneNo\n\n       --validate parameters\nIF ((p_dept_id)\
    \ IS NULL ) THEN\n   RAISE_APPLICATION_ERROR(-20102, 'Input parameter p_dept_id\
    \ must not be null.', TRUE);\n\nEND IF;\n\n   OPEN p_emp_cursor FOR\n     SELECT\n\
    \            dept.department_id,\n            dept.department_name,\n        \
    \    loc.street_address,\n            loc.city,\n            loc.state_province,\n\
    \            loc.postal_code,\n            cty.country_name,\n     CURSOR (select\
    \ emp.employee_id,\n                    emp.last_name,\n                    emp.first_name,\n\
    \                    emp.email,\n                    eph.preferred,\n        \
    \            eph.phone_type,\n                    eph.phone_number\n         \
    \      from employees emp, emp_phone_numbers eph\n              where emp.department_id\
    \ = dept.department_id\n                and emp.employee_id = eph.employee_id\n\
    \              order by emp.employee_id) emp_cursor\n       FROM\n           \
    \ departments dept, locations loc, countries cty\n      WHERE dept.department_id\
    \ = p_dept_id\n        AND dept.location_id = loc.location_id\n        AND loc.country_id\
    \ = cty.country_id ;\n\np_status_code:= 0;\np_status_message:= NULL;\n\nEXCEPTION\n\
    \   WHEN OTHERS THEN\n     p_status_code:= SQLCODE;\n     p_status_message:= SQLERRM;\n\
    \nEND GetEmployeeData_MultiPhoneNo;\n/\n```\n\n```sql\n---- Create new test script\
    \ to execute this procedure\n---- only the procedure name is changed\n\nset serveroutput\
    \ on\n\n  var p_main_cursor      REFCURSOR\n\nDECLARE\n  v_dept_id        departments.department_id%TYPE;\n\
    \n  v_status_code    NUMBER;\n  v_status_message VARCHAR2(200);\n\n  t0 timestamp;\n\
    \  t1 timestamp;\n\nBEGIN\n  t0:= systimestamp;\n\n  v_dept_id := &Department_ID;\n\
    \n  GetEmployeeData_MultiPhoneNo\n     (v_dept_id, :p_main_cursor, v_status_code,\
    \ v_status_message);\n\n  t1:= systimestamp;\n  DBMS_OUTPUT.PUT_LINE('code=' ||\
    \ v_status_code || 'message=' || v_status_message);\n  DBMS_OUTPUT.PUT_LINE('ela='\
    \ || (t0 - t1) );\n\nEND;\n/\n   print :p_main_cursor\n```\n\n此时，新过程的结果集看起来与旧过程完全一样，因为系统中没有任何员工拥有多个电话号码。在清单\
    \ 12-11 中，您将为一名员工添加多个电话号码，并确认原始测试脚本返回了正确的结果。您将为其中一名高管 Steven King 先生添加两个电话号码。他现在将有三个电话号码：办公室、手机和家庭电话。您还将把他的手机号码切换为他的首选号码，并确认他的手机号码将从原始的\
    \ `GetEmployeeData` 过程返回。\n\n### 清单 12-11. 扩展的电话号码功能测试\n```sql\nSQL>  select *\
