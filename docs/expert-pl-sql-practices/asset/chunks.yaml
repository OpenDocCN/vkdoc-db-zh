    ![images](images/square.jpg) **Note** Associative arrays are allocated in the
    Program Global Area (PGA) of the dedicated server process in the database server.
    If there are thousands of connections caching intermediate results in the array,
    then there will be a noticeable increase in memory usage. You should measure memory
    usage increase per process and design the database server to accommodate memory
    increase.


    Array-based techniques can be used to eliminate unnecessary work in other scenarios,
    too. For example, executions of costly function calls can be reduced via this
    technique by storing the function results in an associative array. (The “Excessive
    Function Calls” section later in this chapter discusses another technique to reduce
    the number of executions.)


    ![images](images/square.jpg) **Note** Storing the function results in an associative
    array will work only if the function is a deterministic function, meaning that
    for a given set of input(s), the function will always return the same output.


    ### Excessive Access to DUAL


    It is not uncommon for code to access the DUAL table excessively. You should avoid
    overusing DUAL table access. Accessing DUAL from PL/SQL causes context switching,
    which hurts performance. This section reviews some common reasons for accessing
    DUAL excessively and discusses mitigation plans.


    #### Arithmetics with Date


    There is no reason to access DUAL table to perform arithmetic operations or `DATE`
    manipulations, as most operations can be performed using PL/SQL language constructs.
    Even `SYSDATE` can be accessed directly in PL/SQL without accessing SQL engine.
    In [Listing 1-7](#Chapter01.html#list_1_7), the highlighted SQL statement is calculating
    the UNIX epoch time (epoch time is defined as number of seconds elapsed from January
    1, 1970 Midnight) using a `SELECT.. from DUAL` syntax. While access to the DUAL
    table is fast, execution of the statement still results in a context switch between
    the SQL and PL/SQL engines.


    ***Listing 1-7.** Excessive Access to DUAL—Arithmetics*


    `DECLARE`

    `  l_epoch INTEGER;`

    `BEGIN`

    **`  SELECT ((SYSDATE-TO_DATE(''01-JAN-1970 00:00:00'', ''DD-MON-YYYY HH24:MI:SS''))`**

    **`          * 24 *60 *60 )`**

    **`  INTO l_epoch`**

    **`  FROM DUAL;`**

    `  dbms_output.put_line(l_epoch);`

    `END;`


    You can avoid the unnecessary access to DUAL table by performing the arithmetic
    calculation using PL/SQL constructs like this:


    `l_epoch := (SYSDATE- TO_DATE(''01-JAN-1970 00:00:00'', ''DD-MON-YYYY HH24:MI:SS''))`

    `          * 24 *60 *60 ;`


    There''s simply no need to invoke SQL to execute numeric operations. Simply do
    the work from PL/SQL. Your code will be easier to read, and it will perform better.


    Excessive access to query the current date or timestamp is another reason for
    increased access to DUAL table. Consider coding a call to `SYSDATE` in the SQL
    statement directly instead of selecting `SYSDATE` into a variable and then passing
    that value back to the SQL engine. If you need to access the column value after
    inserting a row, then use `returning` clause to fetch the column value. If you
    need to access `SYSDATE` in PL/SQL itself, use PL/SQL construct to fetch the current
    date in to a variable.


    #### Access to Sequences


    Another common reason for unnecessary access to DUAL table is to retrieve the
    next value from a sequence. [Listing 1-8](#Chapter01.html#list_1_8) shows a code
    fragment selecting the next value from cust_id_seq in to a variable and then inserting
    into customers table using that variable.


    ***Listing 1-8.** Excessive Access to DUAL— Sequences*


    `DECLARE`

    `  l_cust_id NUMBER;`

    `BEGIN`

    `  FOR c1 in (SELECT cust_first_name, cust_last_name FROM customers`

    `             WHERE cust_marital_status!=''married'')`

    `  LOOP`

    **`    SELECT cust_hist_id_seq.nextval INTO l_cust_id FROM dual;`**

    `    INSERT INTO customers_hist`

    `      (cust_hist_id, first_name, last_name )`

    `    VALUES`

    `      (l_cust_id, c1.cust_first_name, c1.cust_last_name)`

    `      ;`

    `  END LOOP;`

    `END;`

    `/`

    `PL/SQL procedure successfully completed.`


    `Elapsed: 00:00:01.89`


    A better approach is to avoid retrieving the value to a variable and retrieve
    the value from the sequence directly in the `INSERT` statement itself. The following
    code fragment illustrates an `INSERT` statement inserting rows into customers
    using a sequence-generated value. With this coding practice, you can avoid accessing
    the DUAL table, and thus avoid context switches between the engines.


    `Insert into customers (cust_id, ...)`

    `Values (cust_id_seq.nextval,...);`


    Better yet, rewrite the PL/SQL block as a SQL statement. For example, the following
    rewritten statement completes in 0.2 seconds compared to a run time of 1.89 seconds
    with PL/SQL loop-based processing:


    `INSERT INTO customers_hist`

    `SELECT`

    `   cust_hist_id_seq.nextval, cust_first_name, cust_last_name`

    `FROM customers  `

    `WHERE cust_marital_status!=''married'';`


    `23819 rows created.`

    `Elapsed: 00:00:00.20`


    #### Populating Master-Detail Rows


    Another common reason for excessive access to DUAL table is to insert rows into
    tables involved in a master-detail relationship. Typically, in this coding practice,
    the primary key value for the master table is fetched from the sequence into a
    local variable. Then that local variable is used while inserting into master *and*
    detail tables. The reason this approach developed is that the primary key value
    of the master table is needed while inserting into the detail table(s).


    A new SQL feature introduced in Oracle Database version 9i provides a better solution
    by allowing you to return the values from an inserted row. You can retrieve the
    key value from a newly-inserted master row by using the `DML RETURNING` clause.
    Then you can use that key value while inserting in to the detail table. For example:


    `INSERT INTO customers (cust_id, ...)`

    `VALUES (cust_id_seq.nextval,...)`

    `RETURNING cust_id into l_cust_id;`

    `...`

    `INSERT INTO customer_transactions (cust_id, ...)`

    `VALUES (l_cust_id,...)`

    `...`


    ### Excessive Function Calls


    It is important to recognize that well designed applications will use functions,
    procedures, and packages. This section is not a discussion about those well designed
    programs using modular code practices. Rather, this section is specifically directed
    towards the coding practice of calling functions unnecessarily.'
  trans: "\n# 过度访问 DUAL\n\n代码过度访问 `DUAL` 表的情况并不少见。您应避免过度使用 `DUAL` 表访问。从 PL/SQL 访问\
    \ `DUAL` 会导致上下文切换，从而影响性能。本节将回顾一些过度访问 `DUAL` 的常见原因，并讨论相应的缓解方案。\n\n## 日期算术运算\n\n\
    没有理由为了执行算术运算或 `DATE` 操作而访问 `DUAL` 表，因为大多数操作都可以使用 PL/SQL 语言结构完成。甚至 `SYSDATE` 也可以在\
    \ PL/SQL 中直接访问，无需访问 SQL 引擎。在代码清单 1-7 中，高亮显示的 SQL 语句使用 `SELECT.. from DUAL` 语法计算\
    \ UNIX 纪元时间（纪元时间定义为自 1970 年 1 月 1 日午夜以来经过的秒数）。虽然访问 `DUAL` 表很快，但执行该语句仍然会导致 SQL\
    \ 和 PL/SQL 引擎之间的上下文切换。\n\n***代码清单 1-7.** 过度访问 DUAL — 算术运算*\n\n```\nDECLARE\n \
    \ l_epoch INTEGER;\nBEGIN\n  SELECT ((SYSDATE-TO_DATE('01-JAN-1970 00:00:00',\
    \ 'DD-MON-YYYY HH24:MI:SS'))\n          * 24 *60 *60 )\n  INTO l_epoch\n  FROM\
    \ DUAL;\n  dbms_output.put_line(l_epoch);\nEND;\n```\n\n您可以使用 PL/SQL 结构执行算术计算来避免不必要的\
    \ `DUAL` 表访问，就像这样：\n\n```\nl_epoch := (SYSDATE- TO_DATE('01-JAN-1970 00:00:00',\
    \ 'DD-MON-YYYY HH24:MI:SS'))\n          * 24 *60 *60 ;\n```\n\n根本没有必要调用 SQL 来执行数值运算。直接在\
    \ PL/SQL 中完成工作即可。您的代码将更易于阅读，性能也会更好。\n\n过度访问以查询当前日期或时间戳是导致 `DUAL` 表访问增加的另一个原因。考虑直接在\
    \ SQL 语句中编码调用 `SYSDATE`，而不是将 `SYSDATE` 选择到变量中，然后将该值传回 SQL 引擎。如果需要在插入行后访问列值，请使用\
    \ `returning` 子句获取列值。如果需要在 PL/SQL 本身中访问 `SYSDATE`，请使用 PL/SQL 结构将当前日期获取到变量中。\n\n\
    ## 访问序列\n\n不必要访问 `DUAL` 表的另一个常见原因是从序列中检索下一个值。代码清单 1-8 展示了一个代码片段，它从 `cust_id_seq`\
    \ 中选择下一个值到一个变量中，然后使用该变量插入到 `customers` 表中。\n\n***代码清单 1-8.** 过度访问 DUAL — 序列*\n\
    \n```\nDECLARE\n  l_cust_id NUMBER;\nBEGIN\n  FOR c1 in (SELECT cust_first_name,\
    \ cust_last_name FROM customers\n             WHERE cust_marital_status!='married')\n\
    \  LOOP\n    SELECT cust_hist_id_seq.nextval INTO l_cust_id FROM dual;\n    INSERT\
    \ INTO customers_hist\n      (cust_hist_id, first_name, last_name )\n    VALUES\n\
    \      (l_cust_id, c1.cust_first_name, c1.cust_last_name)\n      ;\n  END LOOP;\n\
    END;\n/\nPL/SQL 过程已成功完成。\n\n已用时间: 00:00:01.89\n```\n\n更好的方法是避免将值检索到变量中，而是直接在 `INSERT`\
    \ 语句本身中从序列获取值。以下代码片段演示了一个 `INSERT` 语句，它使用序列生成的值将行插入到 `customers` 表中。通过这种编码实践，您可以避免访问\
    \ `DUAL` 表，从而避免引擎之间的上下文切换。\n\n```\nInsert into customers (cust_id, ...)\nValues\
    \ (cust_id_seq.nextval,...);\n```\n\n更好的做法是将 PL/SQL 块重写为 SQL 语句。例如，下面的重写语句在 0.2\
    \ 秒内完成，而基于 PL/SQL 循环的处理运行时间为 1.89 秒：\n\n```\nINSERT INTO customers_hist\nSELECT\n\
    \   cust_hist_id_seq.nextval, cust_first_name, cust_last_name\nFROM customers\
    \  \nWHERE cust_marital_status!='married';\n\n已创建 23819 行。\n已用时间: 00:00:00.20\n\
    ```\n\n## 填充主从关系行\n\n过度访问 `DUAL` 表的另一个常见原因是向涉及主从关系的表中插入数据。通常，在这种编码实践中，主表的主键值从序列获取到局部变量中。然后，在向主表*和*从表插入数据时使用该局部变量。之所以形成这种方法，是因为在向从表插入数据时需要用到主表的主键值。\n\
    \nOracle 数据库版本 9i 引入的一项新 SQL 功能通过允许您返回插入行的值提供了更好的解决方案。您可以使用 `DML RETURNING` 子句从新插入的主行中检索键值。然后，您可以在向从表插入时使用该键值。例如：\n\
    \n```\nINSERT INTO customers (cust_id, ...)\nVALUES (cust_id_seq.nextval,...)\n\
    RETURNING cust_id into l_cust_id;\n...\nINSERT INTO customer_transactions (cust_id,\
    \ ...)\nVALUES (l_cust_id,...)\n...\n```\n"
- fmt: "### Unnecessary Function Execution\n\nExecuting a function call usually means\
    \ that a different part of the instruction set must be loaded into the CPU. The\
    \ execution jumps from one part of instruction to another part of instruction.\
    \ This execution jump adds to performance issues because it entails a dumping\
    \ and refilling of the instruction pipeline. The result is additional CPU usage.\n\
    \nBy avoiding unnecessary function execution, you avoid unneeded flushing and\
    \ refilling of the instruction pipeline, thus minimizing demands upon your CPU.\
    \ Again, I am not arguing against modular coding practices. I argue only against\
    \ excessive and unnecessary execution of function calls. I can best explain by\
    \ example.\n\nIn [Listing 1-9](#Chapter01.html#list_1_9), `log_entry` is a debug\
    \ function and is called for every validation. But that function itself has a\
    \ check for `v_debug`, and messages are inserted only if the debug flag is set\
    \ to true. Imagine a program with hundreds of such complex business validations\
    \ performed in a loop. Essentially, the `log_entry` function will be called millions\
    \ of times unnecessarily even if the `v_debug` flag is set to false.\n\n**Listing\
    \ 1-9. Unnecessary Function Calls**\n\n```sql\ncreate table log_table ( message_seq\
    \ number, message varchar2(512));\ncreate sequence message_id_seq;\n\nDECLARE\n\
    \ l_debug BOOLEAN := FALSE;\n r1 integer;\n FUNCTION log_entry( v_message IN VARCHAR2,\
    \ v_debug in boolean)\n  RETURN number\n  IS\n  BEGIN\n    IF(v_debug) THEN\n\
    \      INSERT INTO log_table\n        (message_seq, MESSAGE)\n        VALUES\n\
    \        (message_id_seq.nextval, v_message\n        );\n    END IF;\n    return\
    \ 0;\n  END;\nBEGIN\n FOR c1 IN (\n        SELECT s.prod_id, s.cust_id,s.time_id,\n\
    \               c.cust_first_name, c.cust_last_name,\n               s.amount_sold\n\
    \        FROM sales s,\n             customers c\n        WHERE s.cust_id    =\
    \ c.cust_id and\n        s.amount_sold> 100)\n  LOOP\n    IF c1.cust_first_name\
    \ IS NOT NULL THEN\n      r1 := log_entry ('first_name is not null ', l_debug\
    \ );\n    END IF;\n\n    IF c1.cust_last_name IS NOT NULL THEN\n      r1 := log_entry\
    \ ('Last_name is not null ', l_debug);\n    END IF;\n  END LOOP;\nEND;\n/\n\n\
    PL/SQL procedure successfully completed.\nElapsed: 00:00:00.54\n```\n\nThe code\
    \ in [Listing 1-9](#Chapter01.html#list_1_9) can be rewritten to call the `log_entry`\
    \ function only if the variable `l_debug` flag is set to true. This rewrite reduces\
    \ unnecessary executions of `log_entry` function. The rewritten program completes\
    \ in 0.43 seconds. The performance improvement will be noticeable with higher\
    \ number of executions.\n\n```sql\n...\nIF first_name IS NULL AND l_debug=TRUE\
    \ THEN\n  log_entry('first_name is null ');\nEND IF;\n...\n/\nPL/SQL procedure\
    \ successfully completed.\nElapsed: 00:00:00.43\n```\n\nFor a better approach,\
    \ consider the conditional compilation constructs to avoid the execution of this\
    \ code fragment completely. In [Listing 1-10](#Chapter01.html#list_1_10), the\
    \ highlighted code uses `$IF-$THEN` construct with a conditional variable `$$debug_on`.\
    \ If the conditional variable `$$debug_on` is true, then the code block is executed.\
    \ In a production environment, `$$debug_on` variable will be FALSE, eliminating\
    \ function execution. Note that the elapsed time of the program reduces further\
    \ to 0.34 seconds.\n\n**Listing 1-10. Avoiding Unnecessary Function Calls with\
    \ Conditional Compilation**\n\n```sql\nDECLARE\n l_debug BOOLEAN := FALSE;\n r1\
    \ integer;\n FUNCTION log_entry( v_message IN VARCHAR2, v_debug in boolean)\n\
    \  RETURN number\n  IS\n  BEGIN\n    IF(v_debug) THEN\n      INSERT INTO log_table\n\
    \        (message_seq, MESSAGE)\n        VALUES\n        (message_id_seq.nextval,\
    \ v_message\n        );\n    END IF;\n    return 0;\n  END;\n\nBEGIN\nFOR c1 IN\
    \ (\n        SELECT s.prod_id, s.cust_id,s.time_id,\n               c.cust_first_name,\
    \ c.cust_last_name,\n               s.amount_sold\n        FROM sales s,\n   \
    \          customers c\n        WHERE s.cust_id    = c.cust_id and\n        s.amount_sold>\
    \ 100)\n  LOOP\n   $IF $$debug_on $THEN\n    IF c1.cust_first_name IS NOT NULL\
    \  THEN\n      r1 := log_entry ('first_name is not null ', l_debug );\n    END\
    \ IF;\n    IF c1.cust_last_name IS NOT NULL   THEN\n      r1 := log_entry ('Last_name\
    \ is not null ', l_debug);\n    END IF;\n   $END\n    null;\n  END LOOP;\nEND;\n\
    /\nPL/SQL procedure successfully completed.\nElapsed: 00:00:00.34\n```\n\nThe\
    \ problem of invoking functions unnecessarily tends to occur frequently in programs\
    \ copied from another template program and then modified. Watch for this problem.\
    \ If a function doesn't need to be called, avoid calling it.\n\n### INTERPRETED\
    \ VS. NATIVE COMPILATION\n\nPL/SQL code, by default, executes as an interpreted\
    \ code. During PL/SQL compilation, code is converted to an intermediate format\
    \ and stored in the data dictionary. At execution time, that intermediate code\
    \ is executed by the engine.\n\nOracle Database version 9i introduces a new feature\
    \ known as native compilation. PL/SQL code is compiled into machine instruction\
    \ and stored as a shared library. Excessive function execution might have less\
    \ impact with native compilation as modern compilers can inline the subroutine\
    \ and avoid the instruction jump."
  raw: '#### Unnecessary Function Execution


    Executing a function call usually means that a different part of the instruction
    set must be loaded into the CPU. The execution jumps from one part of instruction
    to another part of instruction. This execution jump adds to performance issues
    because it entails a dumping and refilling of the instruction pipeline. The result
    is additional CPU usage.


    By avoiding unnecessary function execution, you avoid unneeded flushing and refilling
    of the instruction pipeline, thus minimizing demands upon your CPU. Again, I am
    not arguing against modular coding practices. I argue only against excessive and
    unnecessary execution of function calls. I can best explain by example.


    In [Listing 1-9](#Chapter01.html#list_1_9), `log_entry` is a debug function and
    is called for every validation. But that function itself has a check for `v_debug`,
    and messages are inserted only if the debug flag is set to true. Imagine a program
    with hundreds of such complex business validations performed in a loop. Essentially,
    the `log_entry` function will be called millions of times unnecessarily even if
    the `v_debug` flag is set to false.


    ***Listing 1-9.** Unnecessary Function Calls*


    `create table log_table ( message_seq number, message varchar2(512));`

    `create sequence message_id_seq;`


    `DECLARE`

    ` l_debug BOOLEAN := FALSE;`

    ` r1 integer;`

    ` FUNCTION log_entry( v_message IN VARCHAR2, v_debug in boolean)`

    `  RETURN number`

    `  IS`

    `  BEGIN`

    `    IF(v_debug) THEN`

    `      INSERT INTO log_table`

    `        (message_seq, MESSAGE)`

    `        VALUES`

    `        (message_id_seq.nextval, v_message`

    `        );`

    `    END IF;`

    `    return 0;`

    `  END;`

    `BEGIN`

    ` FOR c1 IN (`

    `        SELECT s.prod_id, s.cust_id,s.time_id,`

    `               c.cust_first_name, c.cust_last_name,`

    `               s.amount_sold`

    `        FROM sales s,`

    `             customers c`

    `        WHERE s.cust_id    = c.cust_id and`

    `        s.amount_sold> 100)`

    `  LOOP`

    **`    IF c1.cust_first_name IS NOT NULL THEN`**

    **`      r1 := log_entry (''first_name is not null '', l_debug );`**

    **`    END IF;`**


    **`    IF c1.cust_last_name IS NOT NULL THEN`**

    **`      r1 := log_entry (''Last_name is not null '', l_debug);`**

    **`    END IF;`**

    `  END LOOP;`

    `END;`

    `/`


    `PL/SQL procedure successfully completed.`

    `Elapsed: 00:00:00.54`


    The code in [Listing 1-9](#Chapter01.html#list_1_9) can be rewritten to call the
    `log_entry` function only if the variable `l_debug` flag is set to true. This
    rewrite reduces unnecessary executions of `log_entry` function. The rewritten
    program completes in 0.43 seconds. The performance improvement will be noticeable
    with higher number of executions.


    `...`

    `IF first_name IS NULL AND l_debug=TRUE THEN`

    `  log_entry(''first_name is null '');`

    `END IF;`

    `...`

    `/`

    `PL/SQL procedure successfully completed.`

    `Elapsed: 00:00:00.43`


    For a better approach, consider the conditional compilation constructs to avoid
    the execution of this code fragment completely. In [Listing 1-10](#Chapter01.html#list_1_10),
    the highlighted code uses `$IF-$THEN` construct with a conditional variable `$debug_on`.
    If the conditional variable `debug_on` is true, then the code block is executed.
    In a production environment, `debug_on` variable will be FALSE, eliminating function
    execution. Note that the elapsed time of the program reduces further to 0.34 seconds.


    ***Listing 1-10.** Avoiding Unnecessary Function Calls with Conditional Compilation*


    `DECLARE`

    ` l_debug BOOLEAN := FALSE;`

    ` r1 integer;`

    ` FUNCTION log_entry( v_message IN VARCHAR2, v_debug in boolean)`

    `  RETURN number`

    `  IS`

    `  BEGIN`

    `    IF(v_debug) THEN`

    `      INSERT INTO log_table`

    `        (message_seq, MESSAGE)`

    `        VALUES`

    `        (message_id_seq.nextval, v_message`

    `        );`

    `    END IF;`

    `    return 0;`

    `  END;`


    `BEGIN`

    `FOR c1 IN (`

    `        SELECT s.prod_id, s.cust_id,s.time_id,`

    `               c.cust_first_name, c.cust_last_name,`

    `               s.amount_sold`

    `        FROM sales s,`

    `             customers c`

    `        WHERE s.cust_id    = c.cust_id and`

    `        s.amount_sold> 100)`

    `  LOOP`

    **`   $IF $$debug_on $THEN`**

    **`    IF c1.cust_first_name IS NOT NULL  THEN`**

    **`      r1 := log_entry (''first_name is not null '', l_debug );`**

    **`    END IF;`**

    **`    IF c1.cust_last_name IS NOT NULL   THEN`**

    **`      r1 := log_entry (''Last_name is not null '', l_debug);`**

    **`    END IF;`**

    **`   $END`**

    `    null;`

    `  END LOOP;`

    `END;`

    `/`

    `PL/SQL procedure successfully completed.`

    `Elapsed: 00:00:00.34`


    The problem of invoking functions unnecessarily tends to occur frequently in programs
    copied from another template program and then modified. Watch for this problem.
    If a function doesn''t need to be called, avoid calling it.


    **INTERPRETED VS. NATIVE COMPILATION**


    PL/SQL code, by default, executes as an interpreted code. During PL/SQL compilation,
    code is converted to an intermediate format and stored in the data dictionary.
    At execution time, that intermediate code is executed by the engine.


    Oracle Database version 9i introduces a new feature known as native compilation.
    PL/SQL code is compiled into machine instruction and stored as a shared library.
    Excessive function execution might have less impact with native compilation as
    modern compilers can inline the subroutine and avoid the instruction jump.'
  trans: "\n### 不必要的函数执行\n\n执行函数调用通常意味着必须将指令集的不同部分加载到 CPU 中。执行会从指令的一部分跳转到另一部分。这种执行跳转会引发性能问题，因为它需要清空并重新填充指令流水线。其结果是额外的\
    \ CPU 使用率。\n\n通过避免不必要的函数执行，你可以避免指令流水线无谓的清空与重填，从而最小化对 CPU 的需求。重申一下，我并非反对模块化的编码实践。我只反对过度和不必要的函数调用执行。我最好通过例子来解释。\n\
    \n在清单 1-9 中，`log_entry` 是一个调试函数，每次验证时都会被调用。但该函数本身会检查 `v_debug`，并且仅在调试标志设置为 true\
    \ 时才插入消息。想象一个程序，在循环中执行数百个这样复杂的业务验证。本质上，即使 `v_debug` 标志设置为 false，`log_entry` 函数也会被不必要地调用数百万次。\n\
    \n**清单 1-9. 不必要的函数调用**\n\n```sql\ncreate table log_table ( message_seq number,\
    \ message varchar2(512));\ncreate sequence message_id_seq;\n\nDECLARE\n l_debug\
    \ BOOLEAN := FALSE;\n r1 integer;\n FUNCTION log_entry( v_message IN VARCHAR2,\
    \ v_debug in boolean)\n  RETURN number\n  IS\n  BEGIN\n    IF(v_debug) THEN\n\
    \      INSERT INTO log_table\n        (message_seq, MESSAGE)\n        VALUES\n\
    \        (message_id_seq.nextval, v_message\n        );\n    END IF;\n    return\
    \ 0;\n  END;\nBEGIN\n FOR c1 IN (\n        SELECT s.prod_id, s.cust_id,s.time_id,\n\
    \               c.cust_first_name, c.cust_last_name,\n               s.amount_sold\n\
    \        FROM sales s,\n             customers c\n        WHERE s.cust_id    =\
    \ c.cust_id and\n        s.amount_sold> 100)\n  LOOP\n    IF c1.cust_first_name\
    \ IS NOT NULL THEN\n      r1 := log_entry ('first_name is not null ', l_debug\
    \ );\n    END IF;\n\n    IF c1.cust_last_name IS NOT NULL THEN\n      r1 := log_entry\
    \ ('Last_name is not null ', l_debug);\n    END IF;\n  END LOOP;\nEND;\n/\n\n\
    PL/SQL procedure successfully completed.\nElapsed: 00:00:00.54\n```\n\n清单 1-9\
    \ 中的代码可以重写，以仅在变量 `l_debug` 标志设置为 true 时才调用 `log_entry` 函数。此重写减少了 `log_entry` 函数不必要的执行。重写后的程序在\
    \ 0.43 秒内完成。执行次数越多，性能提升越明显。\n\n```sql\n...\nIF first_name IS NULL AND l_debug=TRUE\
    \ THEN\n  log_entry('first_name is null ');\nEND IF;\n...\n/\nPL/SQL procedure\
    \ successfully completed.\nElapsed: 00:00:00.43\n```\n\n对于一个更好的方法，可以考虑使用条件编译结构来完全避免执行此代码片段。在清单\
    \ 1-10 中，高亮显示的代码使用了 `$IF-$THEN` 结构和一个条件变量 `$$debug_on`。如果条件变量 `$$debug_on` 为 true，则执行代码块。在生产环境中，`$$debug_on`\
    \ 变量将为 FALSE，从而消除函数执行。注意，程序的耗时进一步减少到 0.34 秒。\n\n**清单 1-10. 使用条件编译避免不必要的函数调用**\n\
    \n```sql\nDECLARE\n l_debug BOOLEAN := FALSE;\n r1 integer;\n FUNCTION log_entry(\
    \ v_message IN VARCHAR2, v_debug in boolean)\n  RETURN number\n  IS\n  BEGIN\n\
    \    IF(v_debug) THEN\n      INSERT INTO log_table\n        (message_seq, MESSAGE)\n\
    \        VALUES\n        (message_id_seq.nextval, v_message\n        );\n    END\
    \ IF;\n    return 0;\n  END;\n\nBEGIN\nFOR c1 IN (\n        SELECT s.prod_id,\
    \ s.cust_id,s.time_id,\n               c.cust_first_name, c.cust_last_name,\n\
    \               s.amount_sold\n        FROM sales s,\n             customers c\n\
    \        WHERE s.cust_id    = c.cust_id and\n        s.amount_sold> 100)\n  LOOP\n\
    \   $IF $$debug_on $THEN\n    IF c1.cust_first_name IS NOT NULL  THEN\n      r1\
    \ := log_entry ('first_name is not null ', l_debug );\n    END IF;\n    IF c1.cust_last_name\
    \ IS NOT NULL   THEN\n      r1 := log_entry ('Last_name is not null ', l_debug);\n\
    \    END IF;\n   $END\n    null;\n  END LOOP;\nEND;\n/\nPL/SQL procedure successfully\
    \ completed.\nElapsed: 00:00:00.34\n```\n\n不必要地调用函数的问题往往在从另一个模板程序复制并修改的程序中频繁出现。请注意这个问题。如果一个函数不需要被调用，就避免调用它。\n\
    \n### 解释型与原生编译\n\n默认情况下，PL/SQL 代码作为解释型代码执行。在 PL/SQL 编译期间，代码被转换为中间格式并存储在数据字典中。在执行时，该中间代码由引擎执行。\n\
    \nOracle Database 9i 版本引入了一个名为原生编译的新特性。PL/SQL 代码被编译成机器指令，并作为共享库存储。由于现代编译器可以内联子程序并避免指令跳转，使用原生编译时，过度的函数执行可能影响较小。\n"
- fmt: "#### Costly Function Calls\n\nIf the execution of a function consumes a few\
    \ seconds of elapsed time, then calling that function in a loop will result in\
    \ poorly performing code. You should optimize frequently executed functions to\
    \ run as efficiently as possible.\n\nIn [Listing 1-11](#Chapter01.html#list_1_11),\
    \ if the function `calculate_epoch` is called in a loop millions of times. Even\
    \ if the execution of that function consumes just 0.01 seconds, one million executions\
    \ of that function call will result in an elapsed time of 2.7 hours. One option\
    \ to resolve this performance issue is to optimize the function to execute in\
    \ a few milliseconds, but that much optimization is not always possible.\n\n***Listing\
    \ 1-11.** Costly Function Calls*\n\n```sql\nCREATE OR REPLACE FUNCTION calculate_epoch\
    \ (d in date)\n RETURN NUMBER DETERMINISTIC IS\n l_epoch number;\nBEGIN\nl_epoch\
    \ := (d - TO_DATE('01-JAN-1970 00:00:00', 'DD-MON-YYYY HH24:MI:SS'))\n       \
    \   * 24 *60 *60 ;\n RETURN l_epoch;\nEND calculate_epoch;\n/\n\nSELECT  /*+ cardinality\
    \ (10) */ max( calculate_epoch (s.time_id))  epoch\nFROM sales s\n WHERE s.amount_sold>\
    \ 100 and\n       calculate_epoch (s.time_id) between 1000000000 and 1100000000;\n\
    \n     EPOCH\n----------\n1009756800\n\nElapsed: 00:00:01.39\n```\n\nAnother option\
    \ is to pre-store the results of the function execution, thus avoiding function\
    \ execution in a query. You can do this by employing a function-based index. In\
    \ [Listing 1-12](#Chapter01.html#list_1_12), a function-based index on the function\
    \ `calculate_epoch` is created. Performance of the SQL statement improves from\
    \ 1.39 seconds to 0.06 seconds.\n\n***Listing 1-12.** Costly Function Call with\
    \ Function-Based Index*\n\n```sql\nCREATE INDEX compute_epoch_fbi ON sales\n(calculate_epoch(time_id))\n\
    Parallel (degree 4);\n\nSELECT  /*+ cardinality (10) */ max( calculate_epoch (s.time_id))\
    \  epoch\nFROM sales s\n WHERE s.amount_sold> 100 and\n       calculate_epoch\
    \ (s.time_id) between 1000000000 and 1100000000;\n     EPOCH\n----------\n1009756800\n\
    \nElapsed: 00:00:00.06\n```\n\nYou should also understand that function-based\
    \ indexes have a cost. `INSERT` statements and `UPDATE` statements (that update\
    \ the `time_id` column) will incur the cost of calling the function and maintaining\
    \ the index. Carefully weigh the cost of function execution in DML operations\
    \ against the cost of function execution in `SELECT` statement to choose the cheaper\
    \ option.\n\n![images](images/square.jpg) **Note** From Oracle Database version\
    \ 11g onwards, you can create a virtual column, and then create an index on that\
    \ virtual column. The effect of an indexed virtual column is the same as that\
    \ of a function-based index. An advantage of virtual columns over function-based\
    \ index is that you can partition the table using a virtual column, which is not\
    \ possible with the use of just function based indexes.\n\nThe function `result_cache`,\
    \ available from Oracle Database version 11g, is another option to tune the execution\
    \ of costly PL/SQL functions. Results from function execution are remembered in\
    \ the result cache allocated in the Shared Global Area (SGA) of an instance. Repeated\
    \ execution of a function with the same parameter will fetch the results from\
    \ the function cache without repeatedly executing the function. [Listing 1-13](#Chapter01.html#list_1_13)\
    \ shows an example of functions utilizing `result_cache` to improve performance:\
    \ the SQL statement completes in 0.81 seconds.\n\n***Listing 1-13.** Functions\
    \ with Result_cache*\n\n```sql\nDROP INDEX compute_epoch_fbi;\nCREATE OR REPLACE\
    \ FUNCTION calculate_epoch (d in date)\n RETURN NUMBER  DETERMINISTIC RESULT_CACHE\
    \ IS\n l_epoch number;\nBEGIN\n l_epoch := (d - TO_DATE('01-JAN-1970 00:00:00',\
    \ 'DD-MON-YYYY HH24:MI:SS'))\n          * 24 *60 *60 ;\n RETURN l_epoch;\nEND\
    \ calculate_epoch;\n/\n\nSELECT  /*+ cardinality (10) */ max( calculate_epoch\
    \ (s.time_id))  epoch\nFROM sales s\n WHERE s.amount_sold> 100 and\n       calculate_epoch\
    \ (s.time_id) between 1000000000 and 1100000000;\n\n     EPOCH\n----------\n1009756800\n\
    \nElapsed: 00:00:00.81\n```\n\nIn summary, excessive function execution leads\
    \ to performance issues. If you can't reduce or eliminate function execution,\
    \ you may be able to employ function-based indexes or `result_cache` as a short\
    \ term fix in order to minimize the impact from function invocation.\n\n### Database\
    \ Link Calls\n\nExcessive database link-based calls can affect application performance.\
    \ Accessing a remote table or modifying a remote table over a database link within\
    \ a loop is not a scalable approach. For each access to a remote table, several\
    \ SQL*Net packets are exchanged between the databases involved in the database\
    \ link. If the databases are located in geographically separated datacenters or,\
    \ worse, across the globe, then the waits for SQL*Net traffic will result in program\
    \ performance issues.\n\nIn [Listing 1-14](#Chapter01.html#list_1_14), for every\
    \ row returned from the cursor, the `customer` table in the remote database is\
    \ accessed. Let's assume that the round trip network call takes 100ms, so 1 million\
    \ round trip calls will take 27 hours approximately to complete. A response time\
    \ of 100ms between the databases located in different parts of the country is\
    \ not uncommon.\n\n***Listing 1-14.** Excessive Database Link Calls*\n\n```sql\n\
    DECLARE\n  V_customer_name VARCHAR2(32);\nBEGIN\n  ...\n  FOR c1 IN (SELECT …)\n\
    \  LOOP\n    ...\n    SELECT customer_name\n    INTO v_customer_name\n    FROM\
    \ customers@remotedb\n    WHERE account_id = c1.account_id;\n    ...\n  END LOOP;\n\
    END;\n```\n\nJudicial use of materialized views can be used to reduce network\
    \ round trip calls during program execution. In the case of [Listing 1-14](#Chapter01.html#list_1_14),\
    \ the `customer` table can be created as a materialized view. Refresh the materialized\
    \ view before program execution and access that materialized view in the program.\
    \ Materializing the table locally reduces the number of SQL*Net round trip calls.\
    \ Of course, as an Application Designer, you need to compare the cost of materializing\
    \ the whole table versus the cost of accessing a remote table in a loop, and choose\
    \ an optimal solution.\n\nRewriting the program as a SQL statement with a join\
    \ to a remote table is another option. The query optimizer in Oracle Database\
    \ can optimize such statements so as to reduce the SQL*Net trip overhead. For\
    \ this technique to work, you should rewrite the program so that SQL statement\
    \ is executed once and probably not in a loop.\n\nMaterializing the data locally\
    \ or rewriting the code as a SQL statement with a remote join are the initial\
    \ steps to tune the program in [Listing 1-14](#Chapter01.html#list_1_14). However,\
    \ if you are unable to do even these things, there is a workaround. As an interim\
    \ measure, you can convert the program to use a multi-process architecture. For\
    \ example, process #1 will process the customers in the range of 1 to 100,000,\
    \ process #2 will process the customers in the range of 100,001 to 200,000, and\
    \ so on. Apply this logic to the example program by creating 10 processes, and\
    \ you can reduce the total run time of the program to 2.7 hours approximately.\
    \ Use of `DBMS_PARALLEL_EXECUTE` is another option to consider for splitting the\
    \ code in to parallel processing."
  raw: '#### Costly Function Calls


    If the execution of a function consumes a few seconds of elapsed time, then calling
    that function in a loop will result in poorly performing code. You should optimize
    frequently executed functions to run as efficiently as possible.


    In [Listing 1-11](#Chapter01.html#list_1_11), if the function `calculate_epoch`
    is called in a loop millions of times. Even if the execution of that function
    consumes just 0.01 seconds, one million executions of that function call will
    result in an elapsed time of 2.7 hours. One option to resolve this performance
    issue is to optimize the function to execute in a few milliseconds, but that much
    optimization is not always possible.


    ***Listing 1-11.** Costly Function Calls*


    `CREATE OR REPLACE FUNCTION calculate_epoch (d in date)`

    ` RETURN NUMBER DETERMINISTIC IS`

    ` l_epoch number;`

    `BEGIN`

    `l_epoch := (d - TO_DATE(''01-JAN-1970 00:00:00'', ''DD-MON-YYYY HH24:MI:SS''))`

    `          * 24 *60 *60 ;`

    ` RETURN l_epoch;`

    `END calculate_epoch;`

    `/`


    `SELECT  /*+ cardinality (10) */ max( calculate_epoch (s.time_id))  epoch`

    `FROM sales s`

    ` WHERE s.amount_sold> 100 and`

    `       calculate_epoch (s.time_id) between 1000000000 and 1100000000;`


    `     EPOCH`

    `----------`

    `1009756800`


    `Elapsed: 00:00:01.39`


    Another option is to pre-store the results of the function execution, thus avoiding
    function execution in a query. You can do this by employing a function-based index.
    In [Listing 1-12](#Chapter01.html#list_1_12), a function-based index on the function
    `calculate_epoch` is created. Performance of the SQL statement improves from 1.39
    seconds to 0.06 seconds.


    ***Listing 1-12.** Costly Function Call with Function-Based Index*


    `CREATE INDEX compute_epoch_fbi ON sales`

    `(calculate_epoch(time_id))`

    `Parallel (degree 4);`


    `SELECT  /*+ cardinality (10) */ max( calculate_epoch (s.time_id))  epoch`

    `FROM sales s`

    ` WHERE s.amount_sold> 100 and`

    `       calculate_epoch (s.time_id) between 1000000000 and 1100000000;`

    `     EPOCH`

    `----------`

    `1009756800`


    `Elapsed: 00:00:00.06`


    You should also understand that function-based indexes have a cost. `INSERT` statements
    and `UPDATE` statements (that update the time_id column) will incur the cost of
    calling the function and maintaining the index. Carefully weigh the cost of function
    execution in DML operations against the cost of function execution in `SELECT`
    statement to choose the cheaper option.


    ![images](images/square.jpg) **Note** From Oracle Database version 11g onwards,
    you can create a virtual column, and then create an index on that virtual column.
    The effect of an indexed virtual column is the same as that of a function-based
    index. An advantage of virtual columns over function-based index is that you can
    partition the table using a virtual column, which is not possible with the use
    of just function based indexes.


    The function `result_cache`, available from Oracle Database version 11g, is another
    option to tune the execution of costly PL/SQL functions. Results from function
    execution are remembered in the result cache allocated in the Shared Global Area
    (SGA) of an instance. Repeated execution of a function with the same parameter
    will fetch the results from the function cache without repeatedly executing the
    function. [Listing 1-13](#Chapter01.html#list_1_13) shows an example of functions
    utilizing `result_cache` to improve performance: the SQL statement completes in
    0.81 seconds.


    ***Listing 1-13.** Functions with Result_cache*


    `DROP INDEX compute_epoch_fbi;`

    `CREATE OR REPLACE FUNCTION calculate_epoch (d in date)`

    ` RETURN NUMBER  DETERMINISTIC RESULT_CACHE IS`

    ` l_epoch number;`

    `BEGIN`

    ` l_epoch := (d - TO_DATE(''01-JAN-1970 00:00:00'', ''DD-MON-YYYY HH24:MI:SS''))`

    `          * 24 *60 *60 ;`

    ` RETURN l_epoch;`

    `END calculate_epoch;`

    `/`


    `SELECT  /*+ cardinality (10) */ max( calculate_epoch (s.time_id))  epoch`

    `FROM sales s`

    ` WHERE s.amount_sold> 100 and`

    `       calculate_epoch (s.time_id) between 1000000000 and 1100000000;`


    `     EPOCH`

    `----------`

    `1009756800`


    `Elapsed: 00:00:00.81`


    In summary, excessive function execution leads to performance issues. If you can''t
    reduce or eliminate function execution, you may be able to employ function-based
    indexes or `result_cache` as a short term fix in order to minimize the impact
    from function invocation.


    ### Database Link Calls


    Excessive database link-based calls can affect application performance. Accessing
    a remote table or modifying a remote table over a database link within a loop
    is not a scalable approach. For each access to a remote table, several SQL*Net
    packets are exchanged between the databases involved in the database link. If
    the databases are located in geographically separated datacenters or, worse, across
    the globe, then the waits for SQL*Net traffic will result in program performance
    issues.


    In [Listing 1-14](#Chapter01.html#list_1_14), for every row returned from the
    cursor, the customer table in the remote database is accessed. Let''s assume that
    the round trip network call takes 100ms, so 1 million round trip calls will take
    27 hours approximately to complete. A response time of 100ms between the databases
    located in different parts of the country is not uncommon.


    ***Listing 1-14.** Excessive Database Link Calls*


    `DECLARE`

    `  V_customer_name VARCHAR2(32);`

    `BEGIN`

    `  ...`

    `  FOR c1 IN (SELECT …)`

    `  LOOP`

    `    ...`

    `    SELECT customer_name`

    `    INTO v_customer_name`

    `    FROM customers@remotedb`

    `    WHERE account_id = c1.account_id;`

    `    ...`

    `  END LOOP;`

    `END;`


    Judicial use of materialized views can be used to reduce network round trip calls
    during program execution. In the case of [Listing 1-14](#Chapter01.html#list_1_14),
    the customer table can be created as a materialized view. Refresh the materialized
    view before program execution and access that materialized view in the program.
    Materializing the table locally reduces the number of SQL*Net round trip calls.
    Of course, as an Application Designer, you need to compare the cost of materializing
    the whole table versus the cost of accessing a remote table in a loop, and choose
    an optimal solution.


    Rewriting the program as a SQL statement with a join to a remote table is another
    option. The query optimizer in Oracle Database can optimize such statements so
    as to reduce the SQL*Net trip overhead. For this technique to work, you should
    rewrite the program so that SQL statement is executed once and probably not in
    a loop.


    Materializing the data locally or rewriting the code as a SQL statement with a
    remote join are the initial steps to tune the program in [Listing 1-14](#Chapter01.html#list_1_14).
    However, if you are unable to do even these things, there is a workaround. As
    an interim measure, you can convert the program to use a multi-process architecture.
    For example, process #1 will process the customers in the range of 1 to 100,000,
    process #2 will process the customers in the range of 100,001 to 200,000, and
    so on. Apply this logic to the example program by creating 10 processes, and you
    can reduce the total run time of the program to 2.7 hours approximately. Use of
    `DBMS_PARALLEL_EXECUTE` is another option to consider for splitting the code in
    to parallel processing.'
  trans: "\n#### 昂贵的函数调用\n\n如果执行一个函数会消耗几秒钟的实际时间，那么在循环中调用该函数将导致代码性能低下。你应该对频繁执行的函数进行优化，使其尽可能高效地运行。\n\
    \n在清单 1-11 中，如果函数 `calculate_epoch` 在循环中被调用数百万次。即使该函数的执行仅消耗 0.01 秒，一百万次执行也会导致\
    \ 2.7 小时的耗时。解决此性能问题的一个选项是优化函数使其能在几毫秒内执行，但如此大幅度的优化并非总能实现。\n\n***清单 1-11.** 昂贵的函数调用*\n\
    \n```sql\nCREATE OR REPLACE FUNCTION calculate_epoch (d in date)\n RETURN NUMBER\
    \ DETERMINISTIC IS\n l_epoch number;\nBEGIN\nl_epoch := (d - TO_DATE('01-JAN-1970\
    \ 00:00:00', 'DD-MON-YYYY HH24:MI:SS'))\n          * 24 *60 *60 ;\n RETURN l_epoch;\n\
    END calculate_epoch;\n/\n\nSELECT  /*+ cardinality (10) */ max( calculate_epoch\
    \ (s.time_id))  epoch\nFROM sales s\n WHERE s.amount_sold> 100 and\n       calculate_epoch\
    \ (s.time_id) between 1000000000 and 1100000000;\n\n     EPOCH\n----------\n1009756800\n\
    \nElapsed: 00:00:01.39\n```\n\n另一个选项是预先存储函数执行的结果，从而避免在查询中执行函数。你可以通过使用基于函数的索引来实现这一点。在清单\
    \ 1-12 中，创建了一个基于函数 `calculate_epoch` 的函数索引。SQL 语句的性能从 1.39 秒提升到了 0.06 秒。\n\n***清单\
    \ 1-12.** 使用函数索引的昂贵函数调用*\n\n```sql\nCREATE INDEX compute_epoch_fbi ON sales\n\
    (calculate_epoch(time_id))\nParallel (degree 4);\n\nSELECT  /*+ cardinality (10)\
    \ */ max( calculate_epoch (s.time_id))  epoch\nFROM sales s\n WHERE s.amount_sold>\
    \ 100 and\n       calculate_epoch (s.time_id) between 1000000000 and 1100000000;\n\
    \     EPOCH\n----------\n1009756800\n\nElapsed: 00:00:00.06\n```\n\n你也应该理解函数索引是有成本的。`INSERT`语句和`UPDATE`语句（更新`time_id`列时）将产生调用函数和维护索引的成本。需要仔细权衡\
    \ DML 操作中函数执行的成本与`SELECT`语句中函数执行的成本，以选择成本更低的方案。\n\n![images](img/square.jpg) **注意**\
    \ 从 Oracle Database 11g 版本开始，你可以创建一个虚拟列，然后在该虚拟列上创建索引。索引虚拟列的效果与函数索引相同。虚拟列相对于函数索引的一个优势是，你可以使用虚拟列对表进行分区，而仅使用函数索引是无法做到这一点的。\n\
    \n从 Oracle Database 11g 版本开始可用的`result_cache`函数，是调优昂贵 PL/SQL 函数执行的另一个选项。函数执行的结果会被记录在实例的共享全局区（SGA）中分配的结果缓存中。使用相同参数重复执行函数时，将直接从函数缓存中获取结果，而无需重复执行函数。清单\
    \ 1-13 展示了利用`result_cache`来提升性能的函数示例：SQL 语句在 0.81 秒内完成。\n\n***清单 1-13.** 使用 Result_cache\
    \ 的函数*\n\n```sql\nDROP INDEX compute_epoch_fbi;\nCREATE OR REPLACE FUNCTION calculate_epoch\
    \ (d in date)\n RETURN NUMBER  DETERMINISTIC RESULT_CACHE IS\n l_epoch number;\n\
    BEGIN\n l_epoch := (d - TO_DATE('01-JAN-1970 00:00:00', 'DD-MON-YYYY HH24:MI:SS'))\n\
    \          * 24 *60 *60 ;\n RETURN l_epoch;\nEND calculate_epoch;\n/\n\nSELECT\
    \  /*+ cardinality (10) */ max( calculate_epoch (s.time_id))  epoch\nFROM sales\
    \ s\n WHERE s.amount_sold> 100 and\n       calculate_epoch (s.time_id) between\
    \ 1000000000 and 1100000000;\n\n     EPOCH\n----------\n1009756800\n\nElapsed:\
    \ 00:00:00.81\n```\n\n总之，过度的函数执行会导致性能问题。如果你无法减少或消除函数执行，可以考虑采用函数索引或`result_cache`作为短期解决方案，以最小化函数调用带来的影响。\n\
    \n### 数据库链接调用\n\n过多的数据库链接调用会影响应用程序性能。在循环中通过数据库链接访问远程表或修改远程表并不是一种可扩展的方法。对于每次访问远程表，数据库链接所涉及的数据库之间会交换多个\
    \ SQL*Net 数据包。如果数据库位于地理位置上分离的数据中心，或者更糟，遍布全球，那么对 SQL*Net 流量的等待将导致程序性能问题。\n\n在清单\
    \ 1-14 中，对于游标返回的每一行，都访问了远程数据库中的`customer`表。假设网络往返调用需要 100 毫秒，那么 100 万次往返调用大约需要\
    \ 27 小时才能完成。位于国内不同地区的数据库之间 100 毫秒的响应时间并不少见。\n\n***清单 1-14.** 过多的数据库链接调用*\n\n```sql\n\
    DECLARE\n  V_customer_name VARCHAR2(32);\nBEGIN\n  ...\n  FOR c1 IN (SELECT …)\n\
    \  LOOP\n    ...\n    SELECT customer_name\n    INTO v_customer_name\n    FROM\
    \ customers@remotedb\n    WHERE account_id = c1.account_id;\n    ...\n  END LOOP;\n\
    END;\n```\n\n明智地使用物化视图可以减少程序执行期间的网络往返调用。对于清单 1-14 的情况，可以将`customer`表创建为物化视图。在程序执行前刷新物化视图，并在程序中访问该物化视图。将表物化在本地减少了\
    \ SQL*Net 往返调用的次数。当然，作为应用程序设计者，你需要比较将整张表物化的成本与在循环中访问远程表的成本，并选择最优解决方案。\n\n将程序重写为与远程表连接的\
    \ SQL 语句是另一个选项。Oracle Database 中的查询优化器可以优化此类语句，以减少 SQL*Net 往返的开销。要使用此技术，你应该重写程序，使得\
    \ SQL 语句只执行一次，很可能不在循环中执行。\n\n将数据物化在本地或重写为带有远程连接的 SQL 语句，是调优清单 1-14 程序的初步步骤。然而，如果你连这些都无法做到，还有一个变通方法。作为临时措施，你可以将程序转换为使用多进程架构。例如，进程#1\
    \ 处理 1 到 100,000 号客户，进程#2 处理 100,001 到 200,000 号客户，以此类推。通过创建 10 个进程将此逻辑应用到示例程序中，你可以将程序的总运行时间减少到大约\
    \ 2.7 小时。使用`DBMS_PARALLEL_EXECUTE`是考虑将代码拆分为并行处理的另一个选项。\n"
- fmt: "### Excessive Use of Triggers\n\nTriggers are usually written in PL/SQL, although\
    \ you can write trigger code in Java as well. Excessive triggers are not ideal\
    \ for performance reasons. Row changes are performed in the SQL engine and triggers\
    \ are executed in the PL/SQL engine. Once again, you encounter the dreaded context-switch\
    \ problem.\n\nIn some cases, triggers are unavoidable. For example, complex business\
    \ validation in a trigger can't be avoided. In those scenarios, you should write\
    \ that type of complex validation in PL/SQL code. You should avoid overusing triggers\
    \ for simple validation. For example, use check constraints rather than a trigger\
    \ to check the list of valid values for a column.\n\nFurther, avoid using multiple\
    \ triggers for the same trigger action. Instead of writing two different triggers\
    \ for the same action, you should combine them into one so as to minimize the\
    \ number of context switches.\n\n### Excessive Commits\n\nIt is a not uncommon\
    \ to see commits after every row inserted or modified (or deleted) in a PL/SQL\
    \ loop. The coding practice of committing after every row will lead to slower\
    \ program execution. Frequent commits generate more redo, require Log Writer to\
    \ flush the contents of log buffer to log file frequently, can lead to data integrity\
    \ issues, and consume more resources. The PL/SQL engine is optimized to reduce\
    \ the effect of frequent commits, but there is no substitute for a well written\
    \ code when it comes to reducing commits.\n\nYou should commit only at the completion\
    \ of a business transaction. If you commit earlier than your business transaction\
    \ boundary, you can encounter data integrity issues. If you must commit to improve\
    \ restartability, consider batch commits. For example, rather than commit after\
    \ each row, it's better to do batch commit every 1000 or 5000 rows (the choice\
    \ of batch size depends upon your application). Fewer commits will reduce the\
    \ elapsed time of the program. Furthermore, fewer commits from the application\
    \ will also improve the performance of the database.\n\n### Excessive Parsing\n\
    \nDon't use dynamic SQL statements in a PL/SQL loop as doing so will induce excessive\
    \ parsing issues. Instead, reduce amount of hard parsing through the use of bind\
    \ variables.\n\nIn [Listing 1-15](#Chapter01.html#list_1_15), the `customers`\
    \ table is accessed to retrieve customer details, passing `cust_id` from cursor\
    \ `c1`. A SQL statement with literal values is constructed and then executed using\
    \ the native dynamic SQL `EXECUTE IMMEDIATE` construct. The problem is that for\
    \ every unique row retrieved from cursor `c1`, a new SQL statement is constructed\
    \ and sent to the SQL engine for execution.\n\nStatements that don't exist in\
    \ the shared pool when you execute them will incur a hard parse. Excessive hard\
    \ parsing stresses the library cache, thereby reducing the application's scalability\
    \ and concurrency. As the number of rows returned from cursor `c1` increases,\
    \ the number of hard parses will increase linearly. This program might work in\
    \ a development database with a small number of rows to process, but the approach\
    \ could very well become a problem in a production environment.\n\n`Listing 1-15.\
    \ Excessive Parsing`\n\n```sql\nDECLARE\n  ...\nBEGIN\n FOR c1_rec IN c1\n LOOP\n\
    \  -- Query customer details\n  EXECUTE IMMEDIATE\n   'SELECT cust_first_name,\
    \ cust_last_name, country_id\n    FROM customers\n    WHERE cust_id= ' || c1_rec.cust_id\
    \  INTO l_cust_first_name, l_cust_last_name,\nl_country_id;\n  ...\n END LOOP;\n\
    COMMIT;\nEND;\n/\n```\n\nYou should reduce hard parses as much as possible. Dynamic\
    \ SQL statements in a loop tend to increase the effect of hard parse and the effect\
    \ is amplified if the concurrency of execution increases.\n\n### Summary\n\nThis\
    \ chapter reviewed various scenarios in which the use of few PL/SQL constructs\
    \ was not appropriate. Keeping in mind that SQL is a set language and PL/SQL is\
    \ a procedural language, the following recommendations should be considered as\
    \ guidelines while designing a program:\n\n*   Solve query problems using SQL.\
    \ Think in terms of sets! It's easier to tune queries written in SQL than to tune,\
    \ say, PL/SQL programs having nested loops to essentially execute queries using\
    \ row-at-a-time processing.\n*   If you must code your program in PL/SQL, try\
    \ offloading work to the SQL engine as much as possible. This becomes more and\
    \ more important with new technologies such as Exadata. Smart scan facilities\
    \ available in an Exadata database machine can offload work to the storage nodes\
    \ and improve the performance of a program written in SQL. PL/SQL constructs do\
    \ not gain such benefits from Exadata database machines (at least not as of version\
    \ 11gR2).\n*   Use bulk processing facilities available in PL/SQL if you must\
    \ use loop-based processing. Reduce unnecessary work in PL/SQL such as unnecessary\
    \ execution of functions or excessive access to `DUAL` by using the techniques\
    \ discussed in this chapter.\n*   Use single-row, loop-based processing only as\
    \ a last resort.\n\nIndeed, use PL/SQL for all your data and business processing.\
    \ Use Java or other language for presentation logic and user validation. You can\
    \ write highly scalable PL/SQL language programs using the techniques outlined\
    \ in this chapter.\n\n## C H A P T E R 2"
  raw: '### Excessive Use of Triggers


    Triggers are usually written in PL/SQL, although you can write trigger code in
    Java as well. Excessive triggers are not ideal for performance reasons. Row changes
    are performed in the SQL engine and triggers are executed in the PL/SQL engine.
    Once again, you encounter the dreaded context-switch problem.


    In some cases, triggers are unavoidable. For example, complex business validation
    in a trigger can''t be avoided. In those scenarios, you should write that type
    of complex validation in PL/SQL code. You should avoid overusing triggers for
    simple validation. For example, use check constraints rather than a trigger to
    check the list of valid values for a column.


    Further, avoid using multiple triggers for the same trigger action. Instead of
    writing two different triggers for the same action, you should combine them into
    one so as to minimize the number of context switches.


    ### Excessive Commits


    It is a not uncommon to see commits after every row inserted or modified (or deleted)
    in a PL/SQL loop. The coding practice of committing after every row will lead
    to slower program execution. Frequent commits generate more redo, require Log
    Writer to flush the contents of log buffer to log file frequently, can lead to
    data integrity issues, and consume more resources. The PL/SQL engine is optimized
    to reduce the effect of frequent commits, but there is no substitute for a well
    written code when it comes to reducing commits.


    You should commit only at the completion of a business transaction. If you commit
    earlier than your business transaction boundary, you can encounter data integrity
    issues. If you must commit to improve restartability, consider batch commits.
    For example, rather than commit after each row, it''s better to do batch commit
    every 1000 or 5000 rows (the choice of batch size depends upon your application).
    Fewer commits will reduce the elapsed time of the program. Furthermore, fewer
    commits from the application will also improve the performance of the database.


    ### Excessive Parsing


    Don''t use dynamic SQL statements in a PL/SQL loop as doing so will induce excessive
    parsing issues. Instead, reduce amount of hard parsing through the use of bind
    variables.


    In [Listing 1-15](#Chapter01.html#list_1_15), the customers table is accessed
    to retrieve customer details, passing cust_id from cursor c1\. A SQL statement
    with literal values is constructed and then executed using the native dynamic
    SQL `EXECUTE IMMEDIATE` construct. The problem is that for every unique row retrieved
    from cursor c1, a new SQL statement is constructed and sent to the SQL engine
    for execution.


    Statements that don''t exist in the shared pool when you execute them will incur
    a hard parse. Excessive hard parsing stresses the library cache, thereby reducing
    the application''s scalability and concurrency. As the number of rows returned
    from cursor c1 increases, the number of hard parses will increase linearly. This
    program might work in a development database with a small number of rows to process,
    but the approach could very well become a problem in a production environment.


    ***Listing 1-15.** Excessive Parsing*


    `DECLARE`

    `  ...`

    `BEGIN`

    ` FOR c1_rec IN c1`

    ` LOOP`

    `  -- Query customer details`

    **`  EXECUTE IMMEDIATE  `**

    **`   ''SELECT cust_first_name, cust_last_name, country_id`**

    **`    FROM customers`**

    **`    WHERE cust_id= '' || c1_rec.cust_id  INTO l_cust_first_name, l_cust_last_name,`![images](images/U003.jpg)**

    **`l_country_id;`**

    `  ...`

    ` END LOOP;`

    `COMMIT;`

    `END;`

    `/`


    You should reduce hard parses as much as possible. Dynamic SQL statements in a
    loop tend to increase the effect of hard parse and the effect is amplified if
    the concurrency of execution increases.


    ### Summary


    This chapter reviewed various scenarios in which the use of few PL/SQL constructs
    was not appropriate. Keeping in mind that SQL is a set language and PL/SQL is
    a procedural language, the following recommendations should be considered as guidelines
    while designing a program:


    *   Solve query problems using SQL. Think in terms of sets! It''s easier to tune
    queries written in SQL than to tune, say, PL/SQL programs having nested loops
    to essentially execute queries using row-at-a-time processing.

    *   If you must code your program in PL/SQL, try offloading work to the SQL engine
    as much as possible. This becomes more and more important with new technologies
    such as Exadata. Smart scan facilities available in an Exadata database machine
    can offload work to the storage nodes and improve the performance of a program
    written in SQL. PL/SQL constructs do not gain such benefits from Exadata database
    machines (at least not as of version 11gR2).

    *   Use bulk processing facilities available in PL/SQL if you must use loop-based
    processing. Reduce unnecessary work in PL/SQL such as unnecessary execution of
    functions or excessive access to DUAL by using the techniques discussed in this
    chapter.

    *   Use single-row, loop-based processing only as a last resort.


    Indeed, use PL/SQL for all your data and business processing. Use Java or other
    language for presentation logic and user validation. You can write highly scalable
    PL/SQL language programs using the techniques outlined in this chapter.


    ## C H A P T E R  2'
  trans: "\n### 过度使用触发器\n\n触发器通常用 PL/SQL 编写，但你也可以用 Java 编写触发器代码。从性能角度看，过度使用触发器并不理想。行变更在\
    \ SQL 引擎中执行，而触发器在 PL/SQL 引擎中执行。你又一次遇到了可怕的**上下文切换**问题。\n\n在某些情况下，触发器是不可避免的。例如，无法避免触发器中的复杂业务验证。在这些场景中，你应该将那种复杂的验证逻辑用\
    \ PL/SQL 代码编写。应避免对简单的验证过度使用触发器。例如，使用检查约束（check constraints）而不是触发器来检查列的有效值列表。\n\
    \n此外，避免对同一触发操作使用多个触发器。与其为同一操作编写两个不同的触发器，不如将它们合并为一个，以最小化上下文切换的次数。\n\n### 过度提交\n\
    \n在 PL/SQL 循环中，每插入、修改（或删除）一行后都进行提交，这种情况并不少见。在每行后都提交的编码习惯会导致程序执行变慢。频繁提交会产生更多重做日志（redo），要求日志写入器（Log\
    \ Writer）频繁地将日志缓冲区内容刷新到日志文件，可能导致数据完整性问题，并消耗更多资源。PL/SQL 引擎经过优化以减少频繁提交的影响，但在减少提交方面，编写良好的代码是无可替代的。\n\
    \n你应该只在业务事务完成时提交。如果你在业务事务边界之前提交，可能会遇到数据完整性问题。如果你必须提交以提高可重启性，请考虑批量提交。例如，与其每行都提交，不如每\
    \ 1000 或 5000 行进行一次批量提交（具体批处理大小的选择取决于你的应用）。更少的提交将减少程序的运行时间。此外，应用提交次数减少也将提升数据库的性能。\n\
    \n### 过度解析\n\n不要在 PL/SQL 循环中使用动态 SQL 语句，因为这样做会导致过度解析问题。相反，应通过使用绑定变量来减少硬解析的数量。\n\
    \n在清单 1-15 中，访问 `customers` 表以检索客户详情，通过游标 `c1` 传递 `cust_id`。构造了一条带有字面值的 SQL 语句，然后使用原生动态\
    \ SQL 的 `EXECUTE IMMEDIATE` 结构来执行。问题在于，对于从游标 `c1` 检索到的每一行唯一值，都会构造一条新的 SQL 语句并发送到\
    \ SQL 引擎执行。\n\n执行时不存在于共享池中的语句会引发硬解析。过度的硬解析会给库缓存（library cache）带来压力，从而降低应用的可扩展性和并发性。随着从游标\
    \ `c1` 返回的行数增加，硬解析的数量会线性增长。这个程序在开发数据库中处理少量行时可能有效，但在生产环境中，这种方法很可能成为问题。\n\n`清单 1-15.\
    \ 过度解析`\n\n```sql\nDECLARE\n  ...\nBEGIN\n FOR c1_rec IN c1\n LOOP\n  -- 查询客户详情\n\
    \  EXECUTE IMMEDIATE\n   'SELECT cust_first_name, cust_last_name, country_id\n\
    \    FROM customers\n    WHERE cust_id= ' || c1_rec.cust_id  INTO l_cust_first_name,\
    \ l_cust_last_name,\nl_country_id;\n  ...\n END LOOP;\nCOMMIT;\nEND;\n/\n```\n\
    \n你应该尽可能减少硬解析。循环中的动态 SQL 语句往往会增加硬解析的影响，如果执行的并发度增加，这种影响会被放大。\n\n### 小结\n\n本章回顾了使用某些\
    \ PL/SQL 结构不当的各种情况。请记住，SQL 是一种集合语言，而 PL/SQL 是一种过程化语言，在设计程序时，应考虑以下建议作为指导原则：\n\n\
    *   使用 SQL 解决查询问题。**以集合的方式思考！** 调优用 SQL 编写的查询比调优（比如）具有嵌套循环的 PL/SQL 程序更容易，后者本质上是以逐行处理的方式执行查询。\n\
    *   如果你必须用 PL/SQL 编写程序，尽量将工作**卸载到 SQL 引擎**。随着 Exadata 等新技术的出现，这一点变得越来越重要。Exadata\
    \ 数据库一体机提供的智能扫描（Smart Scan）功能可以将工作卸载到存储节点，从而提高用 SQL 编写的程序的性能。PL/SQL 结构无法从 Exadata\
    \ 数据库一体机中获得此类益处（至少截至 11gR2 版本）。\n*   如果你必须使用基于循环的处理，请使用 PL/SQL 中提供的**批量处理**机制。通过本章讨论的技术，减少\
    \ PL/SQL 中不必要的工作，例如不必要的函数执行或对 `DUAL` 表的过度访问。\n*   仅在最后手段时才使用基于单行、循环的处理。\n\n确实，用\
    \ PL/SQL 处理你所有的数据和业务逻辑。用 Java 或其他语言处理表示逻辑和用户验证。通过本章概述的技术，你可以编写出高度可扩展的 PL/SQL 语言程序。\n\
    \n## 第 2 章\n"
- fmt: "# Dynamic SQL: Handling the Unknown\n\nBy Michael Rosenblum\n\nFor the past\
    \ ten years, I have attended a number of Oracle conferences all over the United\
    \ States. Time after time, I have listened to presenters talking about building\
    \ systems “better, faster, cheaper” But when these same people come down off the\
    \ stage and discuss the same issues with you one-on-one, the message is much less\
    \ optimistic. The often cited 75% failure rate of all major IT projects is still\
    \ a reality. Adding in the cases of “failures declared successes” (i.e. nobody\
    \ was brave enough to admit the wrongdoing), it becomes even more clear that there\
    \ is a crisis in our contemporary software development process.\n\nFor the purposes\
    \ of this chapter, I will assume that we live in a slightly better universe where\
    \ there is no corporate political in-fighting, system architects know what they\
    \ are doing, and developers at least have an idea what OTN means. Even in this\
    \ improved world, there are the some risks inherent in the systems development\
    \ process that cannot be avoided:\n\n*   It is challenging to clearly state the\
    \ requirements of a system that is expected to be built.\n*   It is difficult\
    \ to build a system that actually meets all of the stated requirements.\n*   It\
    \ is very difficult to build a system that does not require numerous changes within\
    \ a short period of time.\n*   It is impossible to build a system that will not\
    \ be obsolete sooner or later.\n\nIf the last bullet can be considered common\
    \ knowledge, many of my colleagues would strongly disagree with the first three.\
    \ However, in reality, there will never be 100% perfect analysis, 100% complete\
    \ set of requirements, 100% adequate hardware that will never need to be upgraded,\
    \ etc. In the IT industry, we need to accept the fact that, at any time, we must\
    \ expect the unexpected.\n\n![images](images/square.jpg) `Developer's Credo` The\
    \ focus of the whole development process should be shifted from what we know to\
    \ what we don't know.\n\nUnfortunately, there are many things that you don't know:\n\
    \n*   What elements are involved? For example, the system requires a quarterly\
    \ reporting mechanism, but there are no quarterly summary tables.\n*   How should\
    \ you proceed? The DBA's nightmare: How to make sure that a global search screen\
    \ performs adequately if it contains dozens of potential criteria from different\
    \ tables?\n*   Can you proceed at all? For each restriction, you usually have\
    \ at least one workaround or “backdoor.” But what if the location of that backdoor\
    \ changes in the next release or version update?\n\nFortunately, there are different\
    \ ways of answering these (and similar) questions. This chapter will discuss how\
    \ a feature called Dynamic SQL can help solve some of the problems mentioned previously\
    \ and how you can avoid some of the major pitfalls that contribute to system failure\
    \ and obsolescence.\n\n### The Hero\n\nThe concept of Dynamic SQL is reasonably\
    \ straightforward. This feature allows you to build your code (both SQL and PL/SQL)\
    \ as text and process it at runtime—nothing more and nothing less. Dynamic SQL\
    \ provides the ability of a program to write another program while it is being\
    \ executed. That said, it is critical to understand the potential implications\
    \ and possibilities introduced by such a feature. These issues will be discussed\
    \ in this chapter.\n\n![images](images/square.jpg) `Note` By “process” I mean\
    \ the entire chain of events required to fire a program in any programming language—parse/execute/[fetch]\
    \ (the last step is optional). A detailed discussion of this topic is beyond the\
    \ scope of this chapter, but knowing the basics of each of the steps is crucial\
    \ to proper usage of Dynamic SQL.\n\nIt is important to recognize that there are\
    \ different ways of doing Dynamic SQL that should be discussed:\n\n*   Native\
    \ Dynamic SQL\n*   Dynamic Cursors\n*   `DBMS_SQL` package\n\nThere are many good\
    \ reference materials that explain the syntactic aspects of each of these ways,\
    \ both online and in the published press. The purpose of this book is to demonstrate\
    \ best practices rather than providing a reference guide, but it is useful to\
    \ emphasize the key points of each kind of Dynamic SQL as a common ground for\
    \ further discussion.\n\n![images](images/square.jpg) `Technical Note #1` Although\
    \ the term “Dynamic SQL” was accepted by the whole Oracle community, it is not\
    \ 100% complete, since it covers building both SQL statements and PL/SQL blocks.\
    \ But “Dynamic SQL and PL/SQL” sounds too clumsy, so Dynamic SQL will be used\
    \ throughout.\n\n![images](images/square.jpg) `Technical Note #2` As of this writing,\
    \ both Oracle 10g and 11g are more or less equally in use. The examples used here\
    \ are 10g-compatible, unless the described feature exists only in 11g (such cases\
    \ will be mentioned explicitly).\n\n#### Native Dynamic SQL\n\nAbout 95% of all\
    \ implementations using any variation of Dynamic SQL are covered by one of the\
    \ following variations of the `EXECUTE IMMEDIATE` command:\n\n```\nDECLARE\n \
    \  v_variable_tx VARCHAR2(<Length>)|CLOB;\nBEGIN\n   v_variable_tx:='whatever_you_want';\n\
    \   EXECUTE IMMEDIATE v_variable_tx [additional options];\nEND;\n```\n\nor\n\n\
    ```\nBEGIN\n   EXECUTE IMMEDIATE 'whatever_you_want' [additional options];\nEND;\n\
    ```\n\nor\n\n```\nBEGIN\n   EXECUTE IMMEDIATE 'whatever_you_want1'||'whatever_you_want2'||…\
    \ [additional options];\nEND;\n```\n\nUp to and including Oracle 10g, the overall\
    \ length of the code that could be processed by `EXECUTE IMMEDIATE` (including\
    \ the concatenation result) was 32KB (larger code sets were handled by `DBMS_SQL`\
    \ package). Starting with 11g, a `CLOB` can be passed as an input parameter. A\
    \ good question for architects might be why anyone would try to dynamically process\
    \ more than 32KB using a single statement, but from my experience such cases do\
    \ indeed exist."
  raw: '## Dynamic SQL: Handling the Unknown


    **By Michael Rosenblum**


    For the past ten years, I have attended a number of Oracle conferences all over
    the United States. Time after time, I have listened to presenters talking about
    building systems “better, faster, cheaper” But when these same people come down
    off the stage and discuss the same issues with you one-on-one, the message is
    much less optimistic. The often cited 75% failure rate of all major IT projects
    is still a reality. Adding in the cases of “failures declared successes” (i.e.
    nobody was brave enough to admit the wrongdoing), it becomes even more clear that
    there is a crisis in our contemporary software development process.


    For the purposes of this chapter, I will assume that we live in a slightly better
    universe where there is no corporate political in-fighting, system architects
    know what they are doing, and developers at least have an idea what OTN means.
    Even in this improved world, there are the some risks inherent in the systems
    development process that cannot be avoided:


    *   It is challenging to clearly state the requirements of a system that is expected
    to be built.

    *   It is difficult to build a system that actually meets all of the stated requirements.

    *   It is very difficult to build a system that does not require numerous changes
    within a short period of time.

    *   It is impossible to build a system that will not be obsolete sooner or later.


    If the last bullet can be considered common knowledge, many of my colleagues would
    strongly disagree with the first three. However, in reality, there will never
    be 100% perfect analysis, 100% complete set of requirements, 100% adequate hardware
    that will never need to be upgraded, etc. In the IT industry, we need to accept
    the fact that, at any time, we must expect the unexpected.


    ![images](images/square.jpg) **Developer''s Credo** The focus of the whole development
    process should be shifted from what we know to what we don''t know.


    Unfortunately, there are many things that you don''t know:


    *   What elements are involved? For example, the system requires a quarterly reporting
    mechanism, but there are no quarterly summary tables.

    *   How should you proceed? The DBA''s nightmare: How to make sure that a global
    search screen performs adequately if it contains dozens of potential criteria
    from different tables?

    *   Can you proceed at all? For each restriction, you usually have at least one
    workaround or “backdoor.” But what if the location of that backdoor changes in
    the next release or version update?


    Fortunately, there are different ways of answering these (and similar) questions.
    This chapter will discuss how a feature called *Dynamic SQL* can help solve some
    of the problems mentioned previously and how you can avoid some of the major pitfalls
    that contribute to system failure and obsolescence.


    ### The Hero


    The concept of Dynamic SQL is reasonably straightforward. This feature allows
    you to build your code (both SQL and PL/SQL) *as* *text* and *process it at runtime*—nothing
    more and nothing less. Dynamic SQL provides the ability of a program to write
    another program while it is being executed. That said, it is critical to understand
    the potential implications and possibilities introduced by such a feature. These
    issues will be discussed in this chapter.


    ![images](images/square.jpg) **Note** By “process” I mean the entire chain of
    events required to fire a program in any programming language—parse/execute/[fetch]
    (the last step is optional). A detailed discussion of this topic is beyond the
    scope of this chapter, but knowing the basics of each of the steps is crucial
    to proper usage of Dynamic SQL.


    It is important to recognize that there are different ways of doing Dynamic SQL
    that should be discussed:


    *   Native Dynamic SQL

    *   Dynamic Cursors

    *   DBMS_SQL package


    There are many good reference materials that explain the syntactic aspects of
    each of these ways, both online and in the published press. The purpose of this
    book is to demonstrate best practices rather than providing a reference guide,
    but it is useful to emphasize the key points of each kind of Dynamic SQL as a
    common ground for further discussion.


    ![images](images/square.jpg) **Technical Note #1** Although the term “Dynamic
    SQL” was accepted by the whole Oracle community, it is not 100% complete, since
    it covers building both SQL statements **and PL/SQL blocks**. But “Dynamic SQL
    **and PL/SQL**” sounds too clumsy, so Dynamic SQL will be used throughout.


    ![images](images/square.jpg) **Technical Note #2** As of this writing, both Oracle
    10g and 11g are more or less equally in use. The examples used here are10g-compatible,
    unless the described feature exists only in 11g (such cases will be mentioned
    explicitly).


    #### Native Dynamic SQL


    About 95% of all implementations using any variation of Dynamic SQL are covered
    by one of the following variations of the EXECUTE IMMEDIATE command:


    `DECLARE`

    `   v_variable_tx VARCHAR2(<Length>)|CLOB;`

    `BEGIN`

    `   v_variable_tx:=''whatever_you_want'';`

    `   EXECUTE IMMEDIATE v_variable_tx [additional options];`

    `END;`


    or


    `BEGIN`

    `   EXECUTE IMMEDIATE ''whatever_you_want'' [additional options];`

    `END;`


    or


    `BEGIN`

    `   EXECUTE IMMEDIATE ''whatever_you_want1''||''whatever_you_want2''||… [additional
    options];`

    `END;`


    Up to and including Oracle 10g, the overall length of the code that could be processed
    by EXECUTE IMMEDIATE (including the concatenation result) was 32KB (larger code
    sets were handled by DBMS_SQL package). Starting with 11g, a CLOB can be passed
    as an input parameter. A good question for architects might be why anyone would
    try to dynamically process more than 32KB using a single statement, but from my
    experience such cases do indeed exist.'
  trans: "\n# 动态 SQL：应对未知\n\n作者：Michael Rosenblum\n\n过去十年，我参加了在美国各地举办的众多 Oracle 会议。一次又一次，我听到演讲者们谈论如何“更好、更快、更经济”地构建系统。但当这些演讲者走下讲台，与你一对一讨论同样问题时，他们传递的信息却远没有那么乐观。经常被引用的、约\
    \ 75%的大型 IT 项目失败率至今仍是现实。再加上那些“将失败宣布为成功”的案例（即没人有勇气承认错误），情况就更加明显：我们当代的软件开发流程正面临一场危机。\n\
    \n本章中，我将假设我们生活在一个稍好一点的世界：这里没有企业内部政治斗争，系统架构师清楚自己在做什么，开发者至少明白 OTN 的含义。但即使在这个改善后的世界里，系统开发过程中仍存在一些无法避免的固有风险：\n\
    \n*   清晰阐述待建系统的需求具有挑战性。\n*   构建一个真正满足所有既定需求的系统很困难。\n*   构建一个在短期内不需要大量修改的系统非常困难。\n\
    *   构建一个不会过时（迟早会过时）的系统是不可能的。\n\n如果最后一点可以被视作常识，那么我的许多同事会对前三点强烈反对。然而，现实情况是，永远不会有\
    \ 100%完美的分析、100%完整的需求集、100%足够且永远不需要升级的硬件，等等。在 IT 行业，我们必须接受一个事实：我们随时都必须预料到意外情况。\n\
    \n![images](img/square.jpg) `开发者信条` 整个开发过程的重点应该从我们已知的内容转向我们未知的内容。\n\n不幸的是，未知的事情很多：\n\
    \n*   涉及哪些元素？例如，系统需要一个季度报告机制，但没有季度汇总表。\n*   你该如何着手？这是 DBA 的噩梦：如果一个全局搜索屏幕包含来自不同表的数十个潜在条件，如何确保其性能足够好？\n\
    *   你能否继续？对于每一个限制，你通常至少有一个变通方案或“后门”。但如果这个后门的位置在下一个版本或更新中发生了变化呢？\n\n幸运的是，回答这些（以及类似）问题有多种不同的方法。本章将讨论一种名为动态\
    \ SQL 的功能如何帮助解决前面提到的一些问题，以及你如何避免导致系统失败和过时的一些主要陷阱。\n\n### 英雄登场\n\n动态 SQL 的概念相当直接。这个功能允许你将代码（包括\
    \ SQL 和 PL/SQL）作为文本来构建，并在运行时处理它——仅此而已。动态 SQL 提供了一个程序在执行过程中编写另一个程序的能力。也就是说，理解这个功能所带来的潜在影响和可能性至关重要。这些问题将在本章中讨论。\n\
    \n![images](img/square.jpg) `注` 我所说的“处理”是指在任何编程语言中启动一个程序所需的整个事件链——解析/执行/[获取]（最后一步是可选的）。详细讨论这个主题超出了本章的范围，但了解每个步骤的基础知识对于正确使用动态\
    \ SQL 至关重要。\n\n重要的是要认识到，有不同方式可以实现动态 SQL，需要讨论的有：\n\n*   原生动态 SQL\n*   动态游标\n* \
    \  `DBMS_SQL`包\n\n线上和出版物中有许多优秀的参考资料解释了这些方法各自的语法方面。本书的目的是展示最佳实践，而非提供参考指南，但强调每种动态\
    \ SQL 的关键点作为进一步讨论的共同基础是很有用的。\n\n![images](img/square.jpg) `技术说明 #1` 尽管“动态 SQL”这个术语已被整个\
    \ Oracle 社区接受，但它并非百分之百精确，因为它涵盖了构建 SQL 语句和 PL/SQL 块。但“动态 SQL 和 PL/SQL”听起来太拗口，因此全文将使用动态\
    \ SQL。\n\n![images](img/square.jpg) `技术说明 #2` 截至本文撰写时，Oracle 10g 和 11g 的使用大致相当。除非所描述的功能仅存在于\
    \ 11g（此类情况会明确提及），否则此处使用的示例均与 10g 兼容。\n\n#### 原生动态 SQL\n\n大约 95%的动态 SQL 实现都涉及以下`EXECUTE\
    \ IMMEDIATE`命令的变体：\n\n```\nDECLARE\n   v_variable_tx VARCHAR2(<Length>)|CLOB;\n\
    BEGIN\n   v_variable_tx:='whatever_you_want';\n   EXECUTE IMMEDIATE v_variable_tx\
    \ [additional options];\nEND;\n```\n或\n\n```\nBEGIN\n   EXECUTE IMMEDIATE 'whatever_you_want'\
    \ [additional options];\nEND;\n```\n或\n\n```\nBEGIN\n   EXECUTE IMMEDIATE 'whatever_you_want1'||'whatever_you_want2'||…\
    \ [additional options];\nEND;\n```\n\n在 Oracle 10g 及之前版本中，`EXECUTE IMMEDIATE`可以处理的代码总长度（包括拼接结果）是\
    \ 32KB（更大的代码集由`DBMS_SQL`包处理）。从 11g 开始，可以将`CLOB`作为输入参数传递。对架构师来说，一个很好的问题是：为什么会有人试图使用单个语句动态处理超过\
    \ 32KB 的代码？但根据我的经验，这种情况确实存在。\n"
- fmt: "##### Native Dynamic SQL Example #1\n\n具体的语法细节可能需要另写30页来解释，但既然本书是为更有经验的用户编写的，可以合理地期望读者知道如何使用文档。与其深入探讨\
    \ PL/SQL，不如提供一个关于**为什么**需要动态 SQL 的典型示例。为此，假设以下需求：\n\n*   系统预计会有许多带有相关 LOV（值列表）查找表的查找字段，这些字段很可能在后续过程中扩展。与其单独构建每个\
    \ LOV，不如有一个集中式解决方案来处理所有内容。\n*   所有 LOV 都应遵循相同的格式，即两列（ID/DISPLAY），第一列是查找键，第二列是文本。\n\
    \n这些需求非常适合使用动态 SQL：在运行时定义操作的重复模式，其中一些在初始编码时可能未知。以下代码在此场景中很有用：\n\n```sql\nCREATE\
    \ TYPE lov_t IS OBJECT (id_nr NUMBER, display_tx VARCHAR2(256));\n```\n\n```sql\n\
    CREATE TYPE lov_tt AS TABLE OF lov_t;\n```\n\n```sql\nCREATE FUNCTION f_getlov_tt\
    \ (\n          i_table_tx    VARCHAR2,\n          i_id_tx       VARCHAR2,\n  \
    \        i_display_tx  VARCHAR2,\n          i_order_nr    VARCHAR2,\n        \
    \  i_limit_nr    NUMBER:=100)\nRETURN lov_tt\nIS\n    v_out_tt lov_tt := lov_tt();\n\
    \    v_sql_tx VARCHAR2(32767);\nBEGIN\n    v_sql_tx:='SELECT lov_item_t '||\n\
    \                    '(SELECT lov_t(' ||\n                                dbms_assert.simple_sql_name(i_id_tx)||',\
    \ '||\n                      dbms_assert.simple_sql_name(i_display_tx)||') lov_item_t\
    \ '||\n                    ' FROM '||dbms_assert.simple_sql_name(i_table_tx)||\n\
    \                       ' order by '||dbms_assert.simple_sql_name(i_order_nr)||\n\
    \                ')' ||\n             ' WHERE ROWNUM <= :limit';\n    EXECUTE\
    \ IMMEDIATE v_sql_tx BULK COLLECT INTO v_out_tt USING i_limit_nr;\n    RETURN\
    \ v_out_tt;\nEND;\n```\n\n```sql\nSELECT * FROM TABLE(CAST(f_getlov_tt(:1,:2,:3,:4,:5)\
    \ AS lov_tt))\n```\n\n这个示例包含了动态 SQL 的所有核心语法元素：\n\n*   要执行的代码由 PL/SQL 字符串变量表示。\n\
    *   通过绑定变量传入或传出其他参数。绑定变量是逻辑占位符，在执行步骤与实际参数关联。\n*   绑定变量用于值，而非结构元素。这就是为什么表名和列名被连接到语句中。\n\
    *   `DBMS_ASSERT` 包有助于防止代码注入（因为你必须使用连接），它强制要求表名和列名是“简单的 SQL 名称”（没有空格，没有分隔符等）。\n\
    *   由于 SQL 语句有输出，输出被返回到匹配类型的 PL/SQL 变量（原生动态 SQL 允许用户定义的数据类型，包括集合）。\n\n示例中的最后一条语句（调用\
    \ `F_GETLOV_TT` 的 SELECT 语句）应该提供给前端开发人员。这是他们集成到应用程序中所需的唯一信息。其他所有内容都可以由数据库开发人员处理，包括优化、权限、特殊处理逻辑等。对于这些项目中的每一项，都有一个单一的修改点和单一的控制点。这种“单点”概念是帮助最大限度地减少未来开发、调试和审计工作量的最关键特性之一。\n\
    \n##### Native Dynamic SQL Example #2\n\n示例 #1 针对的是构建新系统的开发人员。示例 #2 适用于维护现有系统的人员。\n\
    \n在某个时候，Oracle 决定更改删除基于函数的索引时的默认行为：所有引用拥有此类索引的表的 PL/SQL 对象都会自动失效。正如预期的那样，这一改变在许多批处理例程中造成了严重破坏。因此，Oracle\
    \ 提供了一个通过设置跟踪事件来解决的变通方法。删除任何基于函数的索引的例程采用以下形式：\n\n```sql\nCREATE PROCEDURE p_dropFBIndex\
    \ (i_index_tx VARCHAR2) is\nBEGIN\n    EXECUTE IMMEDIATE\n        'ALTER SESSION\
    \ SET EVENTS ''10624 trace name context forever, level 12''';\n    EXECUTE IMMEDIATE\
    \ 'drop index '||i_index_tx;\n    EXECUTE IMMEDIATE\n        'ALTER SESSION SET\
    \ EVENTS ''10624 trace name context off''';\nEND;\n```\n\n这个示例说明了动态 SQL 的另一个关键元素。你不仅限于\
    \ DML。任何有效的 PL/SQL 匿名块或 SQL 语句，包括 DDL 或 `ALTER SESSION`，都可以在运行时操作中执行。因此，DBA 不再需要他们最喜欢的脚本生成脚本的脚本，因为所有这些情况都可以在数据库中直接处理。\n\
    \n#### 动态游标\n\n动态游标的想法与执行动态 SQL 类似。但不是运行整个语句，而是打开一个游标并将 SELECT 语句作为参数传递。例如：\n\n\
    ```sql\nDECLARE\n    v_cur SYS_REFCURSOR;\n    v_sql_tx VARCHAR2(<长度>)|CLOB:='有效的_SQL_查询';\n\
    \    v_rec ...<记录类型>;\n        或\n    v_tt ...<记录集合>;\nBEGIN\n    OPEN v_cur FOR\
    \ v_sql_tx [<附加参数>];\n\n    FETCH v_cur INTO v_rec;\n          或\n    FETCH v_cur\
    \ BULK COLLECT INTO v_tt [<限制 N>];\n\n   CLOSE v_cur;\nEND;\n```\n\n根据我之前的经验，有两种情况动态游标可能派上用场。两个示例如下。"
  raw: '##### Native Dynamic SQL Example #1


    The specific syntax details would require another 30 pages of explanation, but
    since this book is written for more experienced users, it is fair to expect that
    the reader knows how to use documentation. Instead of going into PL/SQL in depth,
    it is much more efficient to provide a quintessential example of **why** Dynamic
    SQL is needed. To that end, assume the following requirements:


    *   The system is expected to have many lookup fields with associated LOV (list
    of values) lookup tables that are likely to be extended later in the process.
    Instead of building each of these LOVs separately, there should be a centralized
    solution to handle everything.

    *   All LOVs should comply with the same format, namely two columns (ID/DISPLAY)
    where the first one is a lookup and the second one is text.


    These requirements are a perfect fit for using Dynamic SQL: repeated patterns
    of runtime-defined operations where some may not be known at the moment of initial
    coding. The following code is useful in this situation:


    `CREATE TYPE lov_t IS OBJECT (id_nr NUMBER, display_tx VARCHAR2(256));`


    `CREATE TYPE lov_tt AS TABLE OF lov_t;`


    `CREATE FUNCTION f_getlov_tt  (`

    `         i_table_tx    VARCHAR2,`

    `         i_id_tx         VARCHAR2,  `

    `         i_display_tx VARCHAR2,`

    `         i_order_nr   VARCHAR2,`

    `         i_limit_nr   NUMBER:=100)`

    `RETURN lov_tt`

    `IS`

    `    v_out_tt lov_tt := lov_tt();`

    `    v_sql_tx VARCHAR2(32767);`

    `BEGIN`

    `    v_sql_tx:=''SELECT lov_item_t ''||`

    `                    ''FROM (SELECT lov_t('' ||`

    `                                   dbms_assert.simple_sql_name(i_id_tx)||'',
    ''||`

    `                      dbms_assert.simple_sql_name(i_display_tx)||'') lov_item_t
    ''||`

    `                    '' FROM ''||dbms_assert.simple_sql_name(i_table_tx)||`

    `                       '' order by ''||dbms_assert.simple_sql_name(i_order_nr)||`

    `                '')'' ||`

    `             '' WHERE ROWNUM <= :limit'';`

    `    EXECUTE IMMEDIATE v_sql_tx BULK COLLECT INTO v_out_tt USING i_limit_nr;`

    `    RETURN v_out_tt;`

    `END;`


    `SELECT * FROM TABLE(CAST(f_getlov_tt(:1,:2,:3,:4,:5) AS lov_tt))`


    This example includes all of the core syntax elements of dynamic SQL:


    *   The code to be executed is represented as string PL/SQL variable.

    *   Additional parameters are passed in or out of the statement using bind variables.
    Bind variables are logical placeholders and linked to actual parameters at the
    execution step.

    *   Bind variables are used for values and not structural elements. This is why
    table and column names are concatenated to the statement.

    *   The DBMS_ASSERT package helps prevent code injections (since you have to use
    concatenation) by enforcing the rule that table and column names are “simple SQL
    names” (no spaces, no separation symbols, etc.)

    *   Since the SQL statement has an output, the output is returned to PL/SQL variable
    of matching type (Native Dynamic SQL allows user-defined datatypes, including
    collections).


    The last statement in the example (the SELECT statement invoking F_GETLOV_TT)
    is what should be given to front end developers. It is the only piece of information
    they need to integrate into the application. Everything else can be handled by
    database developers, including tuning, grants, special processing logic, etc.
    For each of these items, there is a single point of modification and a single
    point of control. This “single-point” concept is one of the most critical features
    in helping to minimize future development/debugging/audit efforts.


    ##### Native Dynamic SQL Example #2


    Example #1 is targeted at developers building new systems. Example #2 is for those
    maintaining existing systems.


    At some point Oracle decided to change the default behavior when dropping function-based
    indexes: all PL/SQL objects referencing a table that owned such an index were
    automatically invalidated. As expected, this change wreaked havoc in a lot of
    batch routines. As a result, Oracle came up with a workaround via setting a trace
    event. The routine to drop any function-based index took the following form:


    `CREATE PROCEDURE p_dropFBIndex (i_index_tx VARCHAR2) is`

    `BEGIN`

    `    EXECUTE IMMEDIATE`

    `        ''ALTER SESSION SET EVENTS ''''10624 trace name context forever, level
    12'''''';`

    `    EXECUTE IMMEDIATE ''drop index ''||i_index_tx;`

    `    EXECUTE IMMEDIATE`

    `        ''ALTER SESSION SET EVENTS ''''10624 trace name context off'''''';`

    `END;`


    This example illustrates another key element of Dynamic SQL. You are not limited
    by just DML. Any valid PL/SQL anonymous block or SQL statement, including DDL
    or ALTER SESSION, can be executed during runtime operations. As a result, DBAs
    no longer need their favorite scripts-generating-scripts-generating-scripts since
    all of these cases can be handled directly in the database.


    #### Dynamic Cursors


    The idea of dynamic cursors is similar to that of executing dynamic SQL. But instead
    of running an entire statement, you open a cursor and pass a SELECT statement
    as a parameter. For example:


    `DECLARE`

    `    v_cur SYS_REFCURSOR;`

    `    v_sql_tx VARCHAR2(<length>)|CLOB:=''valid_SQL_query'';`

    `    v_rec ...<record type>;`

    `        or`

    `    v_tt ...<record collection>;`

    `BEGIN`

    `    OPEN v_cur FOR v_sql_tx [<additional parameters>];`


    `    FETCH v_cur INTO v_rec;`

    `          or`

    `    FETCH v_cur BULK COLLECT INTO v_tt [<limit N>];`


    `   CLOSE v_cur;`

    `END;`


    From my previous experience, there are two cases when dynamic cursors may come
    in handy. Both examples follow.'
