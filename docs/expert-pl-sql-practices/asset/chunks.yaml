  trans: "\n\n#### 监控内存使用\n\n与批量收集类似，如果你有大量行需要进行批量绑定，这并不一定意味着你应该在将它们传递给数据库之前，将它们全部预存储在数组中。随着绑定行数的增加，性能收益会递减，同时\
    \ PGA 内存的成本也在不断增加。你可以分批进行批量绑定，以确保不会耗尽会话内存。下面是一个示例（`bulk_bind_pga.sql`），它与批量收集内存演示类似，展示了随着批量绑定大小的增加，PGA\
    \ 消耗的情况：\n\n```\nSQL> set serverout on\nSQL> declare\n  2    type t_row_list is\
    \ table of hardware.descr%type;\n  3    l_rows t_row_list;\n  4\n  5    l_start_of_run\
    \ timestamp;\n  6\n  7    l_pga_ceiling  number(10);\n  8\n  9    type t_bulk_sizes\
    \ is table of pls_integer;\n 10    l_bulk_sizes t_bulk_sizes := t_bulk_sizes(10,100,1000,10000,100000,1000000);\n\
    \ 11\n 12    tot_rows pls_integer := 10000000;\n 13\n 14  begin\n 15    select\
    \ value\n 16    into   l_pga_ceiling\n 17    from   v$mystat m, v$statname s\n\
    \ 18    where  s.statistic# = m.statistic#\n 19    and    s.name = 'session pga\
    \ memory max';\n 20\n 21    dbms_output.put_line('Initial PGA: '||l_pga_ceiling);\n\
    \ 22\n 23    for i in 1 .. l_bulk_sizes.count\n 24    loop\n 25\n 26      execute\
    \ immediate 'truncate table hardware';\n 27\n 28      l_start_of_run := systimestamp;\n\
    \ 29\n 30      l_rows := t_row_list();\n 31      l_rows.extend(l_bulk_sizes(i));\n\
    \ 32      for j in 1 .. l_bulk_sizes(i)\n 33      loop\n 34         l_rows(j)\
    \ := rpad('x',50);\n 35      end loop;\n 36\n 37      for iter in 1 .. tot_rows\
    \ / l_bulk_sizes(i) loop\n 38        forall j in 1 .. l_bulk_sizes(i)\n 39   \
    \       insert into hardware ( descr )  values (l_rows(j));\n 40      end loop;\n\
    \ 41\n 42      select value\n 43      into   l_pga_ceiling\n 44      from   v$mystat\
    \ m, v$statname s\n 45      where  s.statistic# = m.statistic#\n 46      and \
    \   s.name = 'session pga memory max';\n 47\n 48      dbms_output.put_line('Bulk\
    \ size: '||l_bulk_sizes(i));\n 49      dbms_output.put_line('- Elapsed: '||( systimestamp\
    \ - l_start_of_run));\n 50      dbms_output.put_line('- PGA Max: '||l_pga_ceiling);\n\
    \ 51\n 52    end loop;\n 53\n 54  end;\n 55  /\nInitial PGA: 3470120\nBulk size:\
    \ 10\n- Elapsed: +000000000 00:00:53.478000000\n- PGA Max: 4042888\nBulk size:\
    \ 100\n- Elapsed: +000000000 00:00:14.760000000\n- PGA Max: 4042888\nBulk size:\
    \ 1000\n- Elapsed: +000000000 00:00:10.588000000\n- PGA Max: 4042888\nBulk size:\
    \ 10000\n- Elapsed: +000000000 00:00:11.872000000\n- PGA Max: 4108424\nBulk size:\
    \ 100000\n- Elapsed: +000000000 00:00:16.431000000\n- PGA Max: 12890248\nBulk\
    \ size: 1000000\n- Elapsed: +000000000 00:00:17.507000000\n- PGA Max: 99266696\n\
    \nPL/SQL procedure successfully completed.\n```\n\n与批量收集类似，一旦每个数组绑定的行数超过 1000\
    \ 行，其好处就微不足道了。如果你的应用程序由成百上千个会话组成，并且每个会话都在服务器上消耗大量内存，那么内存消耗的增加肯定会对可扩展性构成威胁。在这个例子中，当批量绑定大小超过\
    \ 1000 时，性能实际上变得更差了。\n\n#### 11g 中的改进\n\n本章中的示例代码是针对 11 版本的数据库编写的。如果你在更早的版本上运行批量绑定示例，可能会看到如下错误：\n\
    \n```\nSQL> create table DEMO ( x int, y int);\n\nTable created.\n\nSQL> declare\n\
    \  2    type t_rows is\n  3      table of demo%rowtype\n  4      index by pls_integer;\n\
    \  5    l_rows t_rows;\n  6  begin\n  7    l_rows(1).x := 1;\n  8    l_rows(1).y\
    \ := 1;\n  9\n 10    l_rows(2).x := 2;\n 11    l_rows(2).y := 2;\n 12\n 13   \
    \ forall i in 1 .. l_rows.count\n 14       insert into DEMO\n 15       values\
    \ ( l_rows(i).x, l_rows(i).y );\n 16  end;\n 17  /\n\nPL/SQL procedure successfully\
    \ completed.\n\n values ( l_rows(i).x, l_rows(i).y );\n              *\nERROR\
    \ at line 15:\nPLS-00436: implementation restriction: cannot reference\n     \
    \         fields of BULK In-BIND table of records\n```\n\n在 Oracle 11g 之前的版本中，批量绑定操作无法访问关联数组内记录或对象类型的单个元素。然而，并非无计可施——只是需要多写一点代码。你仍然可以对简单数据类型的数组进行批量绑定，因此可以为需要批量绑定的*每个*属性使用一个关联数组。前面的例子可以改写成一个适用于早期\
    \ Oracle 版本的版本。\n\n```\nSQL>  declare\n  2    type t_x_list is table of demo.x%type\n\
    \  3      index by pls_integer;\n  4\n  5    type t_y_list is table of demo.y%type\n\
    \  6      index by pls_integer;\n  7\n  8    l_x_rows t_x_list;\n  9    l_y_rows\
    \ t_y_list;\n 10  begin\n 11    l_x_rows(1) := 1;\n 12    l_x_rows(2) := 2;\n\
    \ 13\n 14    l_y_rows(1) := 1;\n 15    l_y_rows(2) := 2;\n 16\n 17    forall i\
    \ in 1 .. l_x_rows.count\n 18       insert into DEMO\n 19       values ( l_x_rows(i),\
    \ l_y_rows(i) );\n 20  end;\n 21  /\n\nPL/SQL procedure successfully completed.\n\
    ```\n\n![images](img/square.jpg) 提示：关于在早期 Oracle 版本上规避此限制的其他技术，请参见 `www.oracle-developer.net/display.php?id=410`\n\
    \n"
- fmt: "# Error Handling with Bulk Bind\n\nThere are large benefits to had from bulk\
    \ binding. But one area where extra care is required is in error handling. In\
    \ a development model where rows are modified on a row-at-a-time basis, when a\
    \ SQL statement fails with an error, the erroneous row in question is implicit—it’s\
    \ the row you are working with.\n\n## Row-at-a-Time vs. Bulk Error Ambiguity\n\
    \nFor example, in the following simple PL/SQL block (`bulk_error_1.sql`) with\
    \ two insert statements, it is obvious which insert statement is the problem one:\n\
    \n```sql\nSQL> alter table hardware\n  2    add constraint\n  3    hardware_chk\
    \ check ( item > 0 );\n\nTable altered.\n\nSQL> begin\n  2    insert into hardware\
    \ ( item )  values (1);\n  3    insert into hardware ( item ) values (-1);\n \
    \ 4    insert into hardware ( item ) values (2);\n  5    insert into hardware\
    \ ( item ) values (3);\n  6    insert into hardware ( item ) values (4);\n  7\
    \    insert into hardware ( item ) values (-2);\n  8  end;\n  9  /\nbegin\n*\n\
    ERROR at line 1:\nORA-02290: check constraint (MCDONAC.HARDWARE_CHK) violated\n\
    ORA-06512: at line 3\n```\n\nWhen you make the transition to modifying rows in\
    \ bulk, things get a little more complicated, so more care is needed. A single\
    \ `FORALL` statement might be canvassing hundreds rows. When the previous example\
    \ is repeated in bulk mode (`bulk_error_2.sql`), it’s not immediately obvious\
    \ where row caused the error.\n\n```sql\nSQL> declare\n  2    type t_list is table\
    \ of hardware.item%type;\n  3    l_rows t_list := t_list(1,-1,2,3,4,-2);\n  4\
    \  begin\n  5    forall i in 1 .. l_rows.count\n  6      insert into hardware\
    \ ( item ) values (l_rows(i));\n  7  end;\n  8  /\ndeclare\n*\nERROR at line 1:\n\
    ORA-02290: check constraint (MCDONAC.HARDWARE_CHK) violated\nORA-06512: at line\
    \ 5\n```\n\nAs per normal statement level operations, the default is for the entire\
    \ bulk bind operation, so even though one of the rows in the array was valid,\
    \ there will be no rows present in the target table.\n\n```sql\nSQL> select count(*)\
    \ from HARDWARE;\n\nno rows selected.\n```\n\n## Implicit Rollback Behavior in\
    \ PL/SQL\n\nNote that rollback of changes is not a property of the bulk bind per\
    \ se; it’s a standard part of the PL/SQL transactional management. A common misconception\
    \ with PL/SQL is that it is just a wrapper around a series of independent SQL\
    \ statements. Thus, in the first example where the second insert statement failed\n\
    \n```sql\nbegin\n  insert into DEMO values (1);\n  insert into DEMO values (-1);\n\
    end;\n```\n\ndevelopers then feel the need to take reparative action to undo the\
    \ first insert. It is common to see exception handling code like the following\
    \ in PL/SQL modules:\n\n```sql\nbegin\n  insert into DEMO values (1);\n  insert\
    \ into DEMO values (-1);\nexception\n  when others then\n    rollback;\n    raise;\n\
    end;\n```\n\nThere is no requirement to perform such a rollback. Moreover, such\
    \ a rollback will typically result in data corruption within your application.\
    \ PL/SQL blocks implicitly create a savepoint into the code. Thus, independent\
    \ of where an error occurs in a PL/SQL block, all changes in the block are automatically\
    \ rolled back to a point as if the PL/SQL routine was never called. This behavior\
    \ is one of the truly great features in PL/SQL. Very few other languages make\
    \ transaction management so easy.\n\n## Using the SAVE EXCEPTIONS Clause\n\nNow\
    \ returning to the bulk bind example, simple code inspection shows that the second\
    \ array entry with a value of -1 is the problem row. However, this is because\
    \ the example is so trivial. There is no information from the actual error message\
    \ that reveals which array entry was the cause—just that one or more of the entries\
    \ have violated the constraint.\n\nIn Oracle 9, this was addressed by extending\
    \ the bulk bind syntax to add the `SAVE EXCEPTIONS` clause. The error still occurs,\
    \ but additional information to allow diagnosis of which array entries are in\
    \ error. Let’s amend the example as follows (`bulk_error_3.sql`) to demonstrate\
    \ how to use `SAVE EXCEPTIONS`:\n\n```sql\nSQL> declare\n  2    type t_list is\
    \ table of hardware.item%type;\n  3    l_rows t_list := t_list(1,-1,2,3,4,-2);\n\
    \  4  begin\n  5    forall i in 1 .. l_rows.count save exceptions\n  6      insert\
    \ into hardware ( item ) values (l_rows(i));\n  7  end;\n  8  /\nERROR:\nORA-24381:\
    \ error(s) in array DML\nORA-06512: at line 5\n```\n\nAt first glance, it appears\
    \ not much has been achieved, but this example demonstrates that a new exception\
    \ is raised (`ORA-24381`) rather than the previous constraint violation (`ORA-02290`).\
    \ By handling this particular bulk bind exception, I gain access to a number of\
    \ special attributes that allow drilling down into the errors.\n\n## Accessing\
    \ the Error Collection\n\nFor example, the following code (`bulk_error_4.sql`)\
    \ introduces more code into the exception handler to reveal the true cause of\
    \ the error:\n\n```sql\nSQL> set serverout on\nSQL> declare\n  2    type t_list\
    \ is table of hardware.item%type;\n  3    l_rows t_list := t_list(1,-1,2,3,4,-2);\n\
    \  4\n  5    bulk_bind_error exception;\n  6    pragma exception_init(bulk_bind_error,-24381);\n\
    \  7\n  8  begin\n  9    forall i in 1 .. l_rows.count save exceptions\n 10  \
    \    insert into hardware ( item ) values (l_rows(i));\n 11\n 12  exception\n\
    \ 13    when bulk_bind_error then\n 14      dbms_output.put_line(\n 15       \
    \   'There were '||sql%bulk_exceptions.count||' errors in total');\n 16      for\
    \ i in 1 .. sql%bulk_exceptions.count loop\n 17         dbms_output.put_line(\n\
    \ 18            'Error '||i||' occurred at array index:'||\n 19             sql%bulk_exceptions(i).error_index);\n\
    \ 20         dbms_output.put_line('- error code:'||\n 21             sql%bulk_exceptions(i).error_code);\n\
    \ 22         dbms_output.put_line('- error text:'||\n 23             sqlerrm(-sql%bulk_exceptions(i).error_code));\n\
    \ 24      end loop;\n 25\n 26  end;\n 27  /\nThere were 2 errors in total\nError\
    \ 1 occurred at array index:2\n- error code:2290\n- error text:ORA-02290: check\
    \ constraint (.) violated\nError 2 occurred at array index:6\n- error code:2290\n\
    - error text:ORA-02290: check constraint (.) violated\n\nPL/SQL procedure successfully\
    \ completed.\n```\n\nWhen the `SAVE EXCEPTIONS` syntax is used within a `FORALL`,\
    \ any errors become available within a new collection named `SQL%BULK_EXCEPTIONS`\
    \ that contains a row for each error. Each row in that new collection contains\
    \ the following:\n\n*   `error_index:` The index from the collection used in the\
    \ `FORALL`\n*   `error_code:` The oracle error code; note that the error code\
    \ is positive (unlike the `SQLCODE` built-in function in PL/SQL).\n\n> **Tip**\
    \ Take care with older versions of the Oracle documentation. Some code examples\
    \ position the `SQL%BULK_EXCEPTIONS` inline within the code, directly under the\
    \ `FORALL` statement, thus suggesting that an exception will not be raised. As\
    \ seen from the previous demo, you must code the references to `SQL%BULK_EXCEPTIONS`\
    \ collection within your exception handler code section.\n\nAlso, since the `SQL%BULK_EXCEPTIONS`\
    \ attribute is a collection, multiple errors can be caught and handled. In the\
    \ previous example, because the exception handler did not re-raise the error back\
    \ to the calling environment, the successfully inserted rows are still retained\
    \ within the table.\n\n```sql\nSQL> select item from HARDWARE;\n\n         X\n\
    ----------\n         1\n         2\n         3\n         4\n```"
