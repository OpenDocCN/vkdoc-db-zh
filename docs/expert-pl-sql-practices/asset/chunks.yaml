  trans: '

    #### 契约的基本要素


    定义软件契约条款时使用三种基本形式要素：`前置条件`、`后置条件`和`不变式`。这些抽象的契约要素通过通常称为`断言`的软件机制在代码中被记录和强制执行。


    ##### 前置条件


    `前置条件`是指为了使模块能计算出正确结果而必须为真的条件或状态。它们代表了在契约下调用方对模块的义务，并为模块本身带来益处。前置条件对模块有益，因为它们代表了模块算法可以依赖的确凿事实。前置条件对调用方构成了约束，因为确保在调用模块之前满足前置条件是调用方的责任。


    未能满足前置条件而调用模块属于违反契约；因此，前置条件违规表明调用代码中存在错误。在这种情况下，模块甚至没有义务计算结果，因为“交易条款”并未得到满足。


    在代码层面，理想情况下，前置条件应在模块入口处由执行环境本身进行检查。由于`PL/SQL`不提供对契约要素的原生支持，建议所有模块在进入模块后立即强制执行其前置条件，特别是那些管理输入变量值有效性的条件。


    ##### 后置条件


    `后置条件`规定了输出或计算结果的条件，只要前置条件得到满足，模块保证在其计算完成时这些条件为真。它们代表了模块计算正确结果的根本义务。后置条件对调用方的好处恰恰在于它们允许调用方信任模块的输出。


    未能满足后置条件是模块本身的契约违反行为，并表明模块中存在缺陷。在代码层面的实际操作中，要断言模块输出的完全正确性可能非常困难，无论是在模块内部还是外部进行，因为这可能意味着需要独立实现模块的计算需求，并相互比较其相等性。


    然而，通常可以对模块的输出施加有限或部分后置条件，这些条件足以表明契约违反。例如，如果一个函数旨在计算某个应始终为正数的结果，那么返回负数就是契约违反，这可以作为对该模块的后置条件来强制实施。


    单元测试和回归测试可以看作是在已知前置条件和输入值下验证后置条件。


    ##### 不变式


    `不变式`规定了应始终成立的状态或条件。例如，一个`PL/SQL`包可能会使用由该包模块访问（可能还会修改）的私有共享数据结构。可能存在针对这些数据结构的各种一致性或完整性要求，这些要求可以被定义并视为施加在整个包上的共享契约要素。


    执行完成后导致不变式失效的模块存在错误。不变式可能难以通过编程方式识别和表达，并且强制执行它们的代价通常很高。


    ### 断言


    `断言`是在代码中表达和强制执行软件契约要素的基本机制。断言基本上封装了关于系统状态必须为真的陈述，否则就是存在错误。也就是说，当断言测试结果为假时，已知系统处于错误状态；这应该被传达出去，通常以异常的形式。


    从技术上讲，`前置条件`、`后置条件`和`不变式`都是不同类型的断言，因为它们捕获了不同的契约要素。在将契约设计应用于`PL/SQL`编程时，我建议构建一个简单且一致的断言机制，并使用该机制来表达和强制执行前置条件、后置条件以及（可能时）不变式。


    断言本质上是直接内置于软件中的正确性测试，它们在运行时发现并发出错误信号，因此是确保软件可靠性的强大手段。


    ## 实施 PL/SQL 契约


    在建立了契约设计的概念框架之后，下一步是设计并实现一个（或多个）`PL/SQL`断言机制，用以强制执行`PL/SQL`程序之间的软件契约。

    '
- fmt: "### Basic ASSERT Procedure\n\nA very simple assertion mechanism can be implemented\
    \ in PL/SQL as a procedure that accepts a Boolean input argument and either exits\
    \ silently when it tests `TRUE` or complains loudly by raising an exception when\
    \ it tests `FALSE`. The simple procedure in `Listing 8-1` implements exactly this\
    \ logic.\n\n`Listing 8-1.` Basic Assert Procedure\n\n```sql\nPROCEDURE assert\
    \ (condition_in IN BOOLEAN)\nIS\nBEGIN\n   IF NOT NVL(condition_in,FALSE)\n  \
    \ THEN\n      RAISE_APPLICATION_ERROR(-20999,'ASSERT FAILURE');\n   END IF;\n\
    END assert;\n```\n\nAs simple as it is, there are a couple of points to note about\
    \ this procedure. First and very importantly, the procedure takes the position\
    \ that a `NULL` input value will test as `FALSE` and raise the exception. This\
    \ means that the procedure expects an actual value to be passed in or the assertion\
    \ itself is invalid—in other words, the procedure has been improperly called.\
    \ In contract terms, the procedure has a precondition that the input parameter\
    \ (`condition_in`) is `NOT NULL`.\n\nAnother thing to note is that while the procedure\
    \ provides a message indicating the exception signals an assertion failure, this\
    \ message does not communicate anything about the failing condition itself. Since\
    \ assertion failures always indicate bugs, it would be useful to have additional\
    \ information specific to the condition that failed for debugging purposes.\n\n\
    The assertion procedure can be improved by adding parameters to supply contextual\
    \ information along with the Boolean condition for use in creating a more informative\
    \ error message to return with the `ASSERTFAIL` exception. `Listing 8-2` provides\
    \ an example.\n\n`Listing 8-2.` Improved Basic Assert Implemented as a Public\
    \ Procedure\n\n```sql\nCREATE OR REPLACE\nPROCEDURE assert (condition_IN IN BOOLEAN\n\
    \                 ,msg_IN  IN VARCHAR2 := null\n                 ,module_IN IN\
    \ VARCHAR2 := null)\nIS\n  ASSERTFAIL_C CONSTANT INTEGER := -20999;\n  BEGIN\n\
    \    IF NOT NVL(condition_IN,FALSE) -- assertfail on null\n    THEN\n      RAISE_APPLICATION_ERROR\
    \      -- per doc accepts 2048\n              ( ASSERTFAIL_C, 'ASSERTFAIL:'||SUBSTR(module_IN,1,30)||':'||\n\
    \                SUBSTR (msg_IN,1,2046) ); -- fill 2048 with msg\nEND IF;\nEND\
    \ assert;\n/\nCREATE OR REPLACE PUBLIC SYNONYM assert FOR assert;\nGRANT EXECUTE\
    \ ON assert TO PUBLIC;\n```\n\nHere the `assert` procedure is made globally available\
    \ via public synonym and execute privileges. In this example, the `ASSERTFAIL`\
    \ error number is provided to `RAISE_APPLICATION_ERROR` via reference to a local\
    \ constant (`ASSERTFAIL_C`) in the example but that could also reference a package-level\
    \ constant. Using the constant avoids hardcoding a literal number in the call\
    \ to `RAISE_APPLICATION_ERROR` and affords better maintainability should there\
    \ be a need to change its value.\n\nThe signature of this `assert` includes two\
    \ new parameters: `module_IN` and `msg_IN`. The `module_IN` parameter allows the\
    \ assertion-calling code to identify its source module. The second parameter,\
    \ `msg_IN`, permits the calling code to provide some diagnostic detail about the\
    \ contract element.\n\nWhen the `condition_IN` parameter tests `FALSE`, there\
    \ is a contract violation and `ASSERTFAIL` exception is raised. The actual message\
    \ returned with an `ASSERTFAIL` exception is constructed as a colon-delimited\
    \ composite of the string `\"ASSERTFAIL\"`, the program name (`module_IN`), and\
    \ finally a message passed in the call to `assert` (`msg_IN`.) In this way, the\
    \ `ASSERTFAIL` exception can provide very specific information about location\
    \ and cause of the contract violation, greatly assisting bug isolation and diagnosis.\n\
    \nI can execute a simple test of the procedure in SQL*Plus as follows:\n\n```sql\n\
    SQL> l\n  1  declare\n  2  procedure my_proc(i number)\n  3  is\n  4  begin\n\
    \  5    assert(i>3,'i>3','my_proc');\n  6  end;\n  7  begin\n  8  my_proc(1);\n\
    \  9* end;\nSQL> /\ndeclare\n*\nERROR at line 1:\nORA-20999: ASSERTFAIL:my_proc:i>3\n\
    ORA-06512: at \"APPL01.ASSERT\", line 9\nORA-06512: at line 5\nORA-06512: at line\
    \ 8\n```\n\nNote how the exception message tells us where and why the `ASSERTFAIL`\
    \ was raised: the condition that the parameter `i` must be greater than 3 failed\
    \ in module `my_proc`. This is incredibly useful; the `ASSERTFAIL` indicates a\
    \ bug in the code and the exception message helps isolate and triage the bug.\
    \ The call stack indicates the initiating line of code is number 8 of the anonymous\
    \ PL/SQL block, which calls `my_proc`, which calls `APPL01.ASSERT` at its line\
    \ number 5 to assert the contract condition on the input parameter (namely `i>3`).\
    \ The specific module and failing condition are exposed in the `ASSERTFAIL` error\
    \ message by making good use of the `module_IN` and `msg_IN` parameters of `assert`.\
    \ If the assertion is enforcing a precondition, it will be important to diagnose\
    \ the caller of the module failing the assertion, as precondition bugs implicate\
    \ the calling code."
  raw: '#### Basic ASSERT Procedure


    A very simple assertion mechanism can be implemented in PL/SQL as a procedure
    that accepts a Boolean input argument and either exits silently when it tests
    TRUE or complains loudly by raising an exception when it tests FALSE. The simple
    procedure in [Listing 8-1](#Chapter08.html#list_8_1) implements exactly this logic.


    ***Listing 8-1.** Basic Assert Procedure*


    `PROCEDURE assert (condition_in IN BOOLEAN)`

    `IS`

    `BEGIN`

    `   IF NOT NVL(condition_in,FALSE)`

    `   THEN`

    `      RAISE_APPLICATION_ERROR(-20999,''ASSERT FAILURE'');`

    `   END IF;`

    `END assert;`


    As simple as it is, there are a couple of points to note about this procedure.
    First and very importantly, the procedure takes the position that a NULL input
    value will test as FALSE and raise the exception. This means that the procedure
    expects an actual value to be passed in or the assertion itself is invalid—in
    other words, the procedure has been improperly called. In contract terms, the
    procedure has a precondition that the input parameter (condition_in) is NOT NULL.


    Another thing to note is that while the procedure provides a message indicating
    the exception signals an assertion failure, this message does not communicate
    anything about the failing condition itself. Since assertion failures always indicate
    bugs, it would be useful to have additional information specific to the condition
    that failed for debugging purposes.


    The assertion procedure can be improved by adding parameters to supply contextual
    information along with the Boolean condition for use in creating a more informative
    error message to return with the ASSERTFAIL exception. [Listing 8-2](#Chapter08.html#list_8_2)
    provides an example.


    ***Listing 8-2.** Improved Basic Assert Implemented as a Public Procedure*


    `CREATE OR REPLACE`

    `PROCEDURE assert (condition_IN IN BOOLEAN`

    `                 ,msg_IN  IN VARCHAR2 := null`

    `                 ,module_IN IN VARCHAR2 := null)`

    `IS`

    `  ASSERTFAIL_C CONSTANT INTEGER := -20999;`

    `  BEGIN`

    `    IF NOT NVL(condition_IN,FALSE) -- assertfail on null`

    `    THEN`

    `      RAISE_APPLICATION_ERROR      -- per doc accepts 2048`

    `              ( ASSERTFAIL_C, ''ASSERTFAIL:''||SUBSTR(module_IN,1,30)||'':''||`

    `                SUBSTR (msg_IN,1,2046) ); -- fill 2048 with msg`

    `END IF;`

    `END assert;`

    `/`

    `CREATE OR REPLACE PUBLIC SYNONYM assert FOR assert;`

    `GRANT EXECUTE ON assert TO PUBLIC;`


    Here the assert procedure is made globally available via public synonym and execute
    privileges. In this example, the ASSERTFAIL error number is provided to RAISE_APPLICATION_ERROR
    via reference to a local constant (ASSERTFAIL_C) in the example but that could
    also reference a package-level constant. Using the constant avoids hardcoding
    a literal number in the call to RAISE_APPLICATION_ERROR and affords better maintainability
    should there be a need to change its value.


    The signature of this assert includes two new parameters: module_IN and msg_IN.
    The module_IN parameter allows the assertion-calling code to identify its source
    module. The second parameter, msg_IN, permits the calling code to provide some
    diagnostic detail about the contract element.


    When the condition_IN parameter tests FALSE, there is a contract violation and
    ASSERTFAIL exception is raised. The actual message returned with an ASSERTFAIL
    exception is constructed as a colon-delimited composite of the string “ASSERTFAIL”,
    the program name (module_IN), and finally a message passed in the call to assert
    (msg_IN.) In this way, the ASSERTFAIL exception can provide very specific information
    about location and cause of the contract violation, greatly assisting bug isolation
    and diagnosis.


    I can execute a simple test of the procedure in SQL*Plus as follows:


    `SQL> l`

    `  1  declare`

    `  2  procedure my_proc(i number)`

    `  3  is`

    `  4  begin`

    `  5    assert(i>3,''i>3'',''my_proc'');`

    `  6  end;`

    `  7  begin`

    `  8  my_proc(1);`

    `  9* end;`

    `SQL> /`

    `declare`

    `*`

    `ERROR at line 1:`

    `ORA-20999: ASSERTFAIL:my_proc:i>3`

    `ORA-06512: at "APPL01.ASSERT", line 9`

    `ORA-06512: at line 5`

    `ORA-06512: at line 8`


    Note how the exception message tells us where and why the ASSERTFAIL was raised:
    the condition that the parameter `i` must be greater than 3 failed in module my_proc.
    This is incredibly useful; the ASSERTFAIL indicates a bug in the code and the
    exception message helps isolate and triage the bug. The call stack indicates the
    initiating line of code is number 8 of the anonymous PL/SQL block, which calls
    my_proc, which calls `APPL01.ASSERT` at its line number 5 to assert the contract
    condition on the input parameter (namely i>3). The specific module and failing
    condition are exposed in the ASSERTFAIL error message by making good use of the
    module_IN and msg_IN parameters of assert. If the assertion is enforcing a precondition,
    it will be important to diagnose the caller of the module failing the assertion,
    as precondition bugs implicate the calling code.'
  trans: "### 基本断言过程\n\n一个非常简单的断言机制可以在 PL/SQL 中实现为一个过程：它接受一个布尔型输入参数，当测试结果为 `TRUE`\
    \ 时静默退出，或者当测试结果为 `FALSE` 时通过引发异常来大声报错。`代码清单 8-1` 中的简单过程正好实现了这一逻辑。\n\n`代码清单 8-1.`\
    \ 基本断言过程\n\n```sql\nPROCEDURE assert (condition_in IN BOOLEAN)\nIS\nBEGIN\n  \
    \ IF NOT NVL(condition_in,FALSE)\n   THEN\n      RAISE_APPLICATION_ERROR(-20999,'ASSERT\
    \ FAILURE');\n   END IF;\nEND assert;\n```\n\n尽管这个过程非常简单，但有几点需要注意。首先，也是非常重要的一点是，该过程将\
    \ `NULL` 输入值视为 `FALSE` 并引发异常。这意味着过程期望传入一个实际值，否则断言本身是无效的——换句话说，该过程被不正确地调用了。用契约术语来说，该过程有一个前置条件：输入参数\
    \ (`condition_in`) 不能为 `NULL` (`NOT NULL`)。\n\n另一件需要注意的事情是，虽然该过程提供了一条消息表明异常指示断言失败，但这条消息并未传达有关失败条件本身的任何信息。由于断言失败总是指示存在缺陷（bug），因此若能获得特定于失败条件的附加信息用于调试将会很有帮助。\n\
    \n可以通过添加参数来改进该断言过程，在提供布尔条件的同时，提供上下文信息，用于创建更详尽的错误消息并与 `ASSERTFAIL` 异常一起返回。`代码清单\
    \ 8-2` 提供了一个示例。\n\n`代码清单 8-2.` 作为公共过程实现的改进版基本断言\n\n```sql\nCREATE OR REPLACE\n\
    PROCEDURE assert (condition_IN IN BOOLEAN\n                 ,msg_IN  IN VARCHAR2\
    \ := null\n                 ,module_IN IN VARCHAR2 := null)\nIS\n  ASSERTFAIL_C\
    \ CONSTANT INTEGER := -20999;\n  BEGIN\n    IF NOT NVL(condition_IN,FALSE) --\
    \ 空值时断言失败\n    THEN\n      RAISE_APPLICATION_ERROR      -- 根据文档接受 2048 字节\n  \
    \            ( ASSERTFAIL_C, 'ASSERTFAIL:'||SUBSTR(module_IN,1,30)||':'||\n  \
    \              SUBSTR (msg_IN,1,2046) ); -- 用消息填满 2048 字节\nEND IF;\nEND assert;\n\
    /\nCREATE OR REPLACE PUBLIC SYNONYM assert FOR assert;\nGRANT EXECUTE ON assert\
    \ TO PUBLIC;\n```\n\n在这里，`assert` 过程通过公共同义词和执行权限实现了全局可用。在此示例中，`ASSERTFAIL` 错误号通过引用示例中的局部常量\
    \ (`ASSERTFAIL_C`) 提供给 `RAISE_APPLICATION_ERROR`，但也可以引用包级别的常量。使用常量避免了在调用 `RAISE_APPLICATION_ERROR`\
    \ 时硬编码字面数字，并且如果需要更改其值，可提供更好的可维护性。\n\n此 `assert` 的签名包含两个新参数：`module_IN` 和 `msg_IN`。`module_IN`\
    \ 参数允许调用断言的代码标识其来源模块。第二个参数 `msg_IN` 允许调用代码提供有关契约元素的诊断细节。\n\n当 `condition_IN` 参数测试为\
    \ `FALSE` 时，即发生契约违反，并引发 `ASSERTFAIL` 异常。随 `ASSERTFAIL` 异常一起返回的实际消息被构建为由冒号分隔的复合字符串，包含字符串\
    \ `\"ASSERTFAIL\"`、程序名 (`module_IN`)，以及最后在调用 `assert` 时传入的消息 (`msg_IN`)。通过这种方式，`ASSERTFAIL`\
    \ 异常可以提供关于契约违反的位置和原因的非常具体的信息，极大地有助于缺陷的隔离和诊断。\n\n我可以在 SQL*Plus 中执行对该过程的简单测试，如下所示：\n\
    \n```sql\nSQL> l\n  1  declare\n  2  procedure my_proc(i number)\n  3  is\n  4\
    \  begin\n  5    assert(i>3,'i>3','my_proc');\n  6  end;\n  7  begin\n  8  my_proc(1);\n\
    \  9* end;\nSQL> /\ndeclare\n*\nERROR at line 1:\nORA-20999: ASSERTFAIL:my_proc:i>3\n\
    ORA-06512: at \"APPL01.ASSERT\", line 9\nORA-06512: at line 5\nORA-06512: at line\
    \ 8\n```\n\n请注意异常消息如何告诉我们 `ASSERTFAIL` 被引发的位置和原因：参数 `i` 必须大于 3 的条件在模块 `my_proc`\
    \ 中失败了。这非常有用；`ASSERTFAIL` 表明代码中存在缺陷，而异常消息有助于隔离和分类该缺陷。调用栈显示起始代码行是匿名 PL/SQL 块的第\
    \ 8 行，该行调用了 `my_proc`，后者又在第 5 行调用了 `APPL01.ASSERT` 以断言输入参数的契约条件（即 `i>3`）。通过充分利用\
    \ `assert` 的 `module_IN` 和 `msg_IN` 参数，具体的模块和失败条件在 `ASSERTFAIL` 错误消息中得以显露。如果断言强制执行的是一个前置条件，那么诊断未能通过断言的模块调用者将非常重要，因为前置条件缺陷会牵连到调用代码。"
- fmt: "# Standard Package-Local ASSERT\n\nMost substantive programming in PL/SQL\
    \ takes place inside packages, so deciding how to enforce contracts within the\
    \ context of an package is an important consideration. I developed simple, standardized\
    \ package-local assertion implementation to use in all my PL/SQL packages. Using\
    \ only this relatively simple construct and associated coding discipline, significant\
    \ progress can be made in defining and enforcing PL/SQL software contracts rigidly.\n\
    \nThe first thing to standardize relative to contract enforcement is the mechanism\
    \ and meaning for signaling contract violations. The mechanism adopted is to raise\
    \ a specific exception (called `ASSERTFAIL`) using the `RAISE_APPLICATION_ERROR`\
    \ built-in procedure. The specification for package `DBC_example` in [Listing\
    \ 8-3](#Chapter08.html#list_8_3) illustrates declaring the `ASSERTFAIL` exception\
    \ and associating it to a specific exception number using the `PRAGMA` compiler\
    \ directive.\n\n### Listing 8-3. Standardized Package Specification Template\n\
    ```sql\nCREATE OR REPLACE PACKAGE DBC_example\nAS\n  ----------------------------------------------------------\n\
    \  -- SLPA declarations (standard local packaged assertion)\n  ----------------------------------------------------------\n\
    \  ASSERTFAIL     EXCEPTION;\n  ASSERTFAIL_C   CONSTANT INTEGER := -20999;\n \
    \ PRAGMA EXCEPTION_INIT(ASSERTFAIL, -20999);\n  ----------------------------------------------------------\n\
    END DBC_example;\n/\n```\n\nAll packages within an application scope should standardize\
    \ on a single error number to use for the `ASSERTFAIL` exception to avoid confusion.\
    \ In this way, `ASSERTFAIL` obtains a common meaning across the entire application.\
    \ This is important, as clear contract enforcement requires unambiguous and common\
    \ interpretation of contract violations, the whole purpose of `ASSERTFAIL`. Finally,\
    \ the exception number for `ASSERTFAIL` (`-20999`) is also assigned to a package\
    \ constant for referencing inside the assert procedure itself. Similarly, begin\
    \ all packages with a standardized implementation as shown in [Listing 8-4](#Chapter08.html#list_8_4),\
    \ taken from the body for the `DBC_example` package.\n\n### Listing 8-4. Standardized\
    \ Package Body Example\n```sql\nCREATE OR REPLACE PACKAGE BODY DBC_example\nAS\n\
    \  -- package name for assertfail msg\n  PKGNAME_C      CONSTANT VARCHAR2(20)\
    \ := $$PLSQL_UNIT;  -- NOTE 10g construct  \n  -- forward declare assert so all\
    \ module implementations can reference it\n  PROCEDURE assert (condition_IN IN\
    \ BOOLEAN\n                   ,msg_IN       IN VARCHAR2 := NULL\n            \
    \       ,module_IN    IN VARCHAR2 := NULL);\n  ----------------------------------------------------------\n\
    \  -- standard local packaged assertion procedure\n  ----------------------------------------------------------\n\
    \  PROCEDURE assert (condition_IN IN BOOLEAN\n                   ,msg_IN     \
    \  IN VARCHAR2 := NULL\n                   ,module_IN    IN VARCHAR2 := NULL)\n\
    IS\n    l_assertmsg VARCHAR2(2048) := 'ASSERTFAIL:'||SUBSTR(PKGNAME_C,1,30)||'.';\
    \ -- assertmsg\n  BEGIN\n    -- test the asserted condition\n    IF NOT NVL(condition_IN,FALSE)\
    \   -- fail on null input\n    THEN\n      -- finish initializing assertmsg\n\
    \      l_assertmsg := l_assertmsg || SUBSTR(NVL(module_IN,'?MODULE?')||':'||msg_IN,1,2046);\n\
    \      -- raise the standardized exception\n      RAISE_APPLICATION_ERROR (ASSERTFAIL_C,\
    \ l_assertmsg, FALSE); -- FALSE\n    END IF;\n  END assert;\n\nBEGIN\n  assert(TRUE);\
    \ -- pkg initialization token\nEND DBC_example;\n/\n```\n\nThe assert in [Listing\
    \ 8-4](#Chapter08.html#list_8_4) closely resembles the one presented earlier as\
    \ a public procedure in [Listing 8-2](#Chapter08.html#list_8_2) with the slight\
    \ change that it uses the Oracle 10g inquiry directive `$$PLSQL_UNIT` to identify\
    \ the package rather than rely on a separately declared (and potentially erroneously\
    \ initialized) constant. The call to `RAISE_APPLICATION_ERROR` will trim a long\
    \ message to just fit into 2048 characters, allowing up to 30 characters for the\
    \ package name. In practice, messages that challenge this limit would not necessarily\
    \ be so helpful but the use of substrings helps correctness and robustness of\
    \ the code.\n\n[Listing 8-4](#Chapter08.html#list_8_4) does not represent much\
    \ code penalty to pay for having a local assert available in all packages independent\
    \ of other procedures. I prefer the idea of packages that can compile completely\
    \ independently, at least at inception (and even somewhat resent `RAISE_APPLICATION_ERROR`\
    \ for this reason.)\n\nSo my personal preference is to begin all PL/SQL packages\
    \ using standard specification and body templates like these, such that standardized\
    \ usages for contract enforcement can be adopted within and across packages.\n\
    \nAlternatively, you could adopt a simple, standardized `PUBLIC` assert procedure\
    \ as in [Listing 8-2](#Chapter08.html#list_8_2) and have all contract enforcement\
    \ depend on it.\n\nFinally, I could suggest you create a really slick shared package\
    \ implementation of assert with fancy call stack processing to assist bug diagnosis,\
    \ but will not recommend it. The purpose of this chapter is to educate and convince\
    \ you to enforce contracts with simplicity in your code, not to impress with fancy\
    \ assertion mechanisms.\n\n## LOCAL OR GLOBAL ASSERT?\n\nAstute readers steeped\
    \ in conventional PL/SQL wisdom will likely question my recommendation to embed\
    \ a standardized assertion construct into all packages rather than to create a\
    \ single shared mechanism using either standalone procedure or a dedicated assertion\
    \ package.\n\nTo be honest, the reasons I prefer a package-local assertion are\
    \ less technical than they are emotional and political, but I will try to make\
    \ the case anyway.\n\nFor one thing, taking a contract-oriented approach has been\
    \ for me much more than adopting a new technique. It is rather more like a religious\
    \ conversion and as such can meet with heavy resistance among the unconverted.\
    \ So the political headwinds to getting agreement over deploying and using a common\
    \ mechanism may be considerable, and religious battles are never won anyway. It\
    \ is far easier to worship privately within the safe confines of your local package,\
    \ at least until the masses are converted.\n\nSecondly, I like to pretend and\
    \ use assert as if it were a PL/SQL language primitive, and so always using a\
    \ package-qualified reference would be a constant reminder that this is not the\
    \ case. Having local asserts with identical implementations everywhere helps preserve\
    \ my illusion.\n\nThird, another personal preference is to always begin new packages\
    \ without any external dependencies (even though almost no packages I have developed\
    \ remained truly standalone).\n\nFinally, there is a slight technical advantage\
    \ to having every package locally declare the `ASSERTFAIL` exception, which is\
    \ that exceptions are distinguishable between packages. So, for instance, if some\
    \ code block makes calls to modules from two different packages, it can distinguish\
    \ which `ASSERTFAIL` was raised. This is rarely of consequence, however, since\
    \ `ASSERTFAIL` should really never be handled but rather allowed to propagate\
    \ all the way out.\n\nSo there you have it: four truly uncompelling reasons for\
    \ preferring and recommending a package-local assertion mechanism over shared\
    \ global constructs. But as mentioned already, although the reasoning is weak,\
    \ the preference is strong.\n\nLucky for me, Oracle 11g introduced the optimizing\
    \ PL/SQL compiler that actually provides a new and reasonably strong performance\
    \ argument in favor of my recommendation, namely code inlining. The topic and\
    \ its implications for favoring a package-local assert are discussed briefly near\
    \ the end of the chapter."
  raw: '#### Standard Package-Local ASSERT


    Most substantive programming in PL/SQL takes place inside packages, so deciding
    how to enforce contracts within the context of a package is an important consideration.
    I developed simple, standardized package-local assertion implementation to use
    in all my PL/SQL packages. Using only this relatively simple construct and associated
    coding discipline, significant progress can be made in defining and enforcing
    PL/SQL software contracts rigidly.


    The first thing to standardize relative to contract enforcement is the mechanism
    and meaning for signaling contract violations. The mechanism adopted is to raise
    a specific exception (called ASSERTFAIL) using the RAISE_APPLICATION_ERROR built-in
    procedure. The specification for package DBC_example in [Listing 8-3](#Chapter08.html#list_8_3)
    illustrates declaring the ASSERTFAIL exception and associating it to a specific
    exception number using the PRAGMA compiler directive.


    ***Listing 8-3.** Standardized Package Specification Template*


    `CREATE OR REPLACE PACKAGE DBC_example`

    `AS`

    `  ----------------------------------------------------------`

    `  -- SLPA declarations (standard local packaged assertion)`

    `  ----------------------------------------------------------`

    `  ASSERTFAIL     EXCEPTION;`

    `  ASSERTFAIL_C   CONSTANT INTEGER := -20999;`

    `  PRAGMA EXCEPTION_INIT(ASSERTFAIL, -20999);`

    `  ----------------------------------------------------------`

    `END DBC_example;`

    `/`


    All packages within an application scope should standardize on a single error
    number to use for the ASSERTFAIL exception to avoid confusion. In this way, ASSERTFAIL
    obtains a common meaning across the entire application. This is important, as
    clear contract enforcement requires unambiguous and common interpretation of contract
    violations, the whole purpose of ASSERTFAIL. Finally, the exception number for
    ASSERTFAIL (-20999) is also assigned to a package constant for referencing inside
    the assert procedure itself. Similarly, begin all packages with a standardized
    implementation as shown in [Listing 8-4](#Chapter08.html#list_8_4), taken from
    the body for the DBC_example package.


    ***Listing 8-4.** Standardized Package Body Example*


    `CREATE OR REPLACE PACKAGE BODY DBC_example`

    `AS`

    `  -- package name for assertfail msg`

    `  PKGNAME_C      CONSTANT VARCHAR2(20) := $$PLSQL_UNIT;  -- NOTE 10g construct  `

    `  -- foreward declare assert so all module implementations can reference it`

    `  PROCEDURE assert (condition_IN IN BOOLEAN`

    `                   ,msg_IN       IN VARCHAR2 := NULL`

    `                   ,module_IN    IN VARCHAR2 := NULL);`

    `  ----------------------------------------------------------`

    `  -- standard local packaged assertion procedure`

    `  ----------------------------------------------------------`

    `  PROCEDURE assert (condition_IN IN BOOLEAN`

    `                   ,msg_IN       IN VARCHAR2 := NULL`

    `                   ,module_IN    IN VARCHAR2 := NULL)`

    `IS`

    `    l_assertmsg VARCHAR2(2048) := ''ASSERTFAIL:''||SUBSTR(PKGNAME_C,1,30)||''.'';
    -- assertmsg`

    `  BEGIN`

    `    -- test the asserted condition`

    `    IF NOT NVL(condition_IN,FALSE)   -- fail on null input`

    `    THEN`

    `      -- finish initializing assertmsg`

    `      l_assertmsg := l_assertmsg || SUBSTR(NVL(module_IN,''?MODULE?'')||'':''||msg_IN,1,2046);`

    `      -- raise the standardized exception`

    `      RAISE_APPLICATION_ERROR (ASSERTFAIL_C, l_assertmsg, FALSE); -- FALSE`

    `    END IF;`

    `  END assert;`


    `BEGIN`

    `  assert(TRUE); -- pkg initilization token`

    `END DBC_example;`

    `/`


    The assert in [Listing 8-4](#Chapter08.html#list_8_4) closely resembles the one
    presented earlier as a public procedure in [Listing 8-2](#Chapter08.html#list_8_2)
    with the slight change that it uses the Oracle 10g inquiry directive $$PLSQL_UNIT
    to identify the package rather than rely on a separately declared (and potentially
    erroneously initialized) constant. The call to RAISE_APPLICATION_ERROR will trim
    a long message to just fit into 2048 characters, allowing up to 30 characters
    for the package name. In practice, messages that challenge this limit would not
    necessarily be so helpful but the use of substrings helps correctness and robustness
    of the code.


    [Listing 8-4](#Chapter08.html#list_8_4) does not represent much code penalty to
    pay for having a local assert available in all packages independent of other procedures.
    I prefer the idea of packages that can compile completely independently, at least
    at inception (and even somewhat resent RAISE_APPLICATION_ERROR for this reason.)


    So my personal preference is to begin all PL/SQL packages using standard specification
    and body templates like these, such that standardized usages for contract enforcement
    can be adopted within and across packages.


    Alternatively, you could adopt a simple, standardized PUBLIC assert procedure
    as in [Listing 8-2](#Chapter08.html#list_8_2) and have all contract enforcement
    depend on it.


    Finally, I could suggest you create a really slick shared package implementation
    of assert with fancy call stack processing to assist bug diagnosis, but will not
    recommend it. The purpose of this chapter is to educate and convince you to enforce
    contracts with simplicity in your code, not to impress with fancy assertion mechanisms.


    **LOCAL OR GLOBAL ASSERT?**


    Astute readers steeped in conventional PL/SQL wisdom will likely question my recommendation
    to embed a standardized assertion construct into all packages rather than to create
    a single shared mechanism using either standalone procedure or a dedicated assertion
    package.


    To be honest, the reasons I prefer a package-local assertion are less technical
    than they are emotional and political, but I will try to make the case anyway.


    For one thing, taking a contract-oriented approach has been for me much more than
    adopting a new technique. It is rather more like a religious conversion and as
    such can meet with heavy resistance among the unconverted. So the political headwinds
    to getting agreement over deploying and using a common mechanism may be considerable,
    and religious battles are never won anyway. It is far easier to worship privately
    within the safe confines of your local package, at least until the masses are
    converted.


    Secondly, I like to pretend and use assert as if it were a PL/SQL language primitive,
    and so always using a package-qualified reference would be a constant reminder
    that this is not the case. Having local asserts with identical implementations
    everywhere helps preserve my illusion.


    Third, another personal preference is to always begin new packages without any
    external dependencies (even though almost no packages I have developed remained
    truly standalone).


    Finally, there is a slight technical advantage to having every package locally
    declare the ASSERTFAIL exception, which is that exceptions are distinguishable
    between packages. So, for instance, if some code block makes calls to modules
    from two different packages, it can distinguish which ASSERTFAIL was raised. This
    is rarely of consequence, however, since ASSERTFAIL should really never be handled
    but rather allowed to propagate all the way out.


    So there you have it: four truly uncompelling reasons for preferring and recommending
    a package-local assertion mechanism over shared global constructs. But as mentioned
    already, although the reasoning is weak, the preference is strong.


    Lucky for me, Oracle 11g introduced the optimizing PL/SQL compiler that actually
    provides a new and reasonably strong performance argument in favor of my recommendation,
    namely code inlining. The topic and its implications for favoring a package-local
    assert are discussed briefly near the end of the chapter.'
  trans: "# 标准包-本地断言\n\nPL/SQL 中的大多数实质性编程都发生在包内部，因此决定如何在包的上下文中强制执行契约是一个重要的考量。我开发了一个简单、标准化的包本地断言实现，用于我所有的\
    \ PL/SQL 包中。仅使用这个相对简单的结构和相关的编码规范，就可以在定义和严格执行 PL/SQL 软件契约方面取得显著进展。\n\n首先需要标准化的是关于契约强制执行的机制和信号含义。所采用的机制是使用`RAISE_APPLICATION_ERROR`内置过程引发一个特定的异常（称为`ASSERTFAIL`）。代码清单\
    \ 8-3 中的 `DBC_example` 包规范展示了如何声明 `ASSERTFAIL` 异常，并使用 `PRAGMA` 编译器指令将其关联到一个特定的异常编号。\n\
    \n### 代码清单 8-3. 标准化的包规范模板\n```sql\nCREATE OR REPLACE PACKAGE DBC_example\nAS\n\
    \  ----------------------------------------------------------\n  -- SLPA 声明（标准化的本地包断言）\n\
    \  ----------------------------------------------------------\n  ASSERTFAIL  \
    \   EXCEPTION;\n  ASSERTFAIL_C   CONSTANT INTEGER := -20999;\n  PRAGMA EXCEPTION_INIT(ASSERTFAIL,\
    \ -20999);\n  ----------------------------------------------------------\nEND\
    \ DBC_example;\n/\n```\n\n应用程序作用域内的所有包都应标准化使用一个单一的错误编号作为 `ASSERTFAIL` 异常，以避免混淆。这样，`ASSERTFAIL`\
    \ 在整个应用程序中就具有了共同的含义。这一点很重要，因为清晰的契约强制要求对契约违规有明确且普遍的解释，这正是 `ASSERTFAIL` 的全部目的。最后，`ASSERTFAIL`\
    \ 的异常编号 (`-20999`) 也被分配给一个包常量，以便在断言过程内部引用。类似地，所有包都应以如 代码清单 8-4 所示的标准化实现开头，该清单取自\
    \ `DBC_example` 包的主体。\n\n### 代码清单 8-4. 标准化的包主体示例\n```sql\nCREATE OR REPLACE PACKAGE\
    \ BODY DBC_example\nAS\n  -- 用于 assertfail 消息的包名\n  PKGNAME_C      CONSTANT VARCHAR2(20)\
    \ := $$PLSQL_UNIT;  -- 注意：10g 构造\n  -- 前置声明 assert，以便所有模块实现都能引用它\n  PROCEDURE\
    \ assert (condition_IN IN BOOLEAN\n                   ,msg_IN       IN VARCHAR2\
    \ := NULL\n                   ,module_IN    IN VARCHAR2 := NULL);\n  ----------------------------------------------------------\n\
    \  -- 标准的本地包断言过程\n  ----------------------------------------------------------\n\
    \  PROCEDURE assert (condition_IN IN BOOLEAN\n                   ,msg_IN     \
    \  IN VARCHAR2 := NULL\n                   ,module_IN    IN VARCHAR2 := NULL)\n\
    IS\n    l_assertmsg VARCHAR2(2048) := 'ASSERTFAIL:'||SUBSTR(PKGNAME_C,1,30)||'.';\
    \ -- 断言消息\n  BEGIN\n    -- 测试被断言的条件\n    IF NOT NVL(condition_IN,FALSE)   -- 输入为空时视为失败\n\
    \    THEN\n      -- 完成断言消息的初始化\n      l_assertmsg := l_assertmsg || SUBSTR(NVL(module_IN,'?MODULE?')||':'||msg_IN,1,2046);\n\
    \      -- 抛出标准化的异常\n      RAISE_APPLICATION_ERROR (ASSERTFAIL_C, l_assertmsg,\
    \ FALSE); -- FALSE\n    END IF;\n  END assert;\n\nBEGIN\n  assert(TRUE); -- 包初始化标记\n\
    END DBC_example;\n/\n```\n\n代码清单 8-4 中的断言与之前在代码清单 8-2 中作为公共过程呈现的断言非常相似，略有不同的是，它使用了\
    \ Oracle 10g 查询指令 `$$PLSQL_UNIT` 来标识包，而不是依赖于单独声明（并且可能被错误初始化）的常量。对 `RAISE_APPLICATION_ERROR`\
    \ 的调用会将长消息截短至恰好适合 2048 个字符，其中为包名留出最多 30 个字符的空间。在实践中，挑战此限制的消息不一定那么有帮助，但使用子字符串有助于代码的正确性和健壮性。\n\
    \n代码清单 8-4 并不代表为了在所有包中提供本地断言（独立于其他过程）而需要付出太多代码代价。我更倾向于包在初始时能够完全独立编译的理念（并且甚至因此有点反感\
    \ `RAISE_APPLICATION_ERROR`）。\n\n因此，我个人的偏好是，所有 PL/SQL 包都使用像这样的标准规范和主体模板开始，以便在包内部和跨包采用标准化的契约强制用法。\n\
    \n或者，你也可以采用一个简单、标准化的 `PUBLIC` 断言过程，如代码清单 8-2 所示，并让所有契约强制都依赖于它。\n\n最后，我可以建议你创建一个真正精妙的共享包断言实现，带有花哨的调用栈处理来辅助错误诊断，但我不推荐这样做。本章的目的是教育和说服你在代码中以简单的方式强制执行契约，而不是用花哨的断言机制来让人印象深刻。\n\
    \n## 本地还是全局断言？\n\n熟悉传统 PL/SQL 智慧的精明读者很可能会质疑我推荐将标准化断言结构嵌入所有包，而不是创建一个使用独立过程或专用断言包的单一共享机制。\n\
    \n老实说，我更喜欢包本地断言的原因，与其说是技术性的，不如说是情感和政治上的，但我还是会尝试说明理由。\n\n首先，对我来说，采取面向契约的方法不仅仅是采用一项新技术。它更像是一种宗教皈依，因此可能会在未皈依者中遇到强烈的抵制。因此，在就部署和使用通用机制达成一致方面，可能会遇到相当大的政治阻力，而且宗教战争从来都是赢不了的。在本地包的安全范围内私下进行崇拜要容易得多，至少在群众皈依之前是如此。\n\
    \n其次，我喜欢假装并使用 assert，就好像它是 PL/SQL 语言原语一样，因此总是使用包限定的引用会不断提醒我事实并非如此。到处都拥有相同实现的本地断言有助于维持我的这种错觉。\n\
    \n第三，另一个个人偏好是总是从没有任何外部依赖项开始新包（尽管我开发的几乎没有几个包真正保持独立）。\n\n最后，让每个包都本地声明 `ASSERTFAIL`\
    \ 异常有一个微小的技术优势，那就是异常在包之间是可以区分的。所以，例如，如果某个代码块调用来自两个不同包的模块，它可以区分是哪个 `ASSERTFAIL`\
    \ 被引发。然而，这很少有影响，因为 `ASSERTFAIL` 实际上永远不应该被处理，而应允许其一路向外传播。\n\n所以，情况就是这样：偏好并推荐包本地断言机制而非共享全局结构的四个真正不充分的理由。但正如已经提到的，尽管推理薄弱，偏好却很强烈。\n\
    \n幸运的是，Oracle 11g 引入了优化的 PL/SQL 编译器，这实际上为我的推荐提供了一个新的、相当有力的性能论据，即代码内联。本章末尾简要讨论了该主题及其支持包本地断言的含义。"
- fmt: "# Enforcing Contracts Using ASSERT\n\nHaving decided to standardize on an\
    \ assertion mechanism and embed it in every package, the question now becomes\
    \ how to put it into use enforcing contracts? For this a little discipline is\
    \ required; however, in my experience, the extra investment in coding up front\
    \ is far more than paid back by the assurance that an entire class of important\
    \ bugs is either not present or will be immediately detected by the code itself.\n\
    \nThe procedure in [Listing 8-5](#Chapter08.html#list_8_5) illustrates using the\
    \ standardized `assert` to enforce a good singular: precondition and silly postcondition\
    \ directly in code. The precondition is that the single input parameter be not\
    \ null, which is not declaratively enforceable and is often a very important requirement\
    \ to demand, as discussed later. The postcondition illustrates by contrast the\
    \ value of adopting calling discipline when using `assert` in code. The assertion\
    \ fails to make use of `module_IN` or `msg_IN` parameters and thus provides little\
    \ to go on relative to debugging the issue.\n\n## Listing 8-5. An Example Procedure\
    \ Making Good and Bad Use of Assert\n\n```\nPACKAGE BODY DBC_example\n…\n  ----------------------------------------------------------\n\
    \  -- test/example procedures and functions\n  ----------------------------------------------------------\n\
    \  PROCEDURE proc01 (p1 varchar2)\n  IS\n    --  local module name for assert\
    \ calls\n    l_module VARCHAR2(30) := 'PROC01';\n  BEGIN\n    -- enforce NOT NULL\
    \ inputs precondition\n    assert(p1 IS NOT NULL,'p1 NOT NULL', l_module);\n\n\
    \    -- procedure logic\n    null;\n\n    -- a very bad postcondition!\n    assert(FALSE,'Boo\
    \ hoo on you');  -- assertfail w/out passing module\n  END proc01;\n```\n\n`Proc01`\
    \ takes a single input parameter `p1` and asserts the contract precondition that\
    \ it be `NOT NULL` using this line of code:\n\n```\nassert(p1 IS NOT NULL,'p1\
    \ NOT NULL',l_module);\n```\n\nNote that this precondition is tested in the very\
    \ first line of the module’s main code block. Remember that under software contracts\
    \ modules are not obliged to compute outputs if preconditions are not met, so\
    \ testing them immediately allows modules to fail early and not waste compute\
    \ cycles unnecessarily.\n\nAlso note the conventions adopted for passing extra\
    \ information to `assert` through the parameters `msg_IN` and `module_IN`. In\
    \ the first case, the message is simply a string literal of the Boolean expression\
    \ constituting the contract condition to be asserted. In the second, the module\
    \ declares a local variable `l_module` and initializes it with its own name, which\
    \ is also passed to `assert`.\n\nIn addition to asserting the contract precondition\
    \ against `NULL` inputs, `proc01` implements some illustrative buggy logic: it\
    \ asserts a final postcondition that will always throw the `ASSERTFAIL` exception\
    \ but without passing any useful diagnostic information to include in the error\
    \ message.\n\nTesting `proc01` by calling it using a `NULL` input value spools\
    \ the following results from SQL*Plus:\n\n```\nBEGIN DBC_example.proc01(null);\
    \ END;\n*\nERROR at line 1:\nORA-20999: ASSERTFAIL:DBC_EXAMPLE.PROC01:p1 NOT NULL\n\
    ORA-06512: at \"APPL01.DBC_EXAMPLE\", line 104\nORA-06512: at \"APPL01.DBC_EXAMPLE\"\
    , line 25\nORA-06512: at line 1\n```\n\nAt first glance, these results may not\
    \ seem all that impressive, but to me they are pure gold. For example, the first\
    \ `ORA-20999` error indicates the following:\n\n*   There is a contract violation\
    \ bug in the code, indicated by the `ASSERTFAIL`.\n*   The bug was caught in module\
    \ `PROC01` of the `DBC_EXAMPLE` package.\n*   The contract violation was that\
    \ input variable `p1` failed the `NOT NULL` check.\n*   Call stack indicates the\
    \ assertion check in line 25 of the `DBC_EXAMPLE` package failed.\n\nA bug has\
    \ been identified for certain, the code location where bug was caught is known,\
    \ and the nature of the bug is also revealed. Think for a minute about the last\
    \ time you tried to chase down a bug involving unexpected run-time data values,\
    \ and then tell me this is not totally cool.\n\nReading the call stack is not\
    \ intuitive and requires some knowledge of the implementation. Beginning with\
    \ the `ORA-20999` error, which is the call to `RAISE_APPLICATION_ERROR` inside\
    \ the local `assert`, the next in the stack must be the `assert` procedure itself,\
    \ so the third entry on stack is the code location that called `assert`. This\
    \ is important in that the next entry on the stack is the caller of the module\
    \ making the call to `assert`. When the assertion is a precondition then this\
    \ caller violated the contract condition, so the calling code has a bug exposed\
    \ at the line indicated (line 1 in the trivial example here.) Executing a second\
    \ test of `proc01` that passes the non-`NULL` input precondition but trips on\
    \ the bad assertion gives the following output:\n\n```\nBEGIN DBC_example.proc01('VALUE');\
    \ END;\n*\nERROR at line 1:\nORA-20999: ASSERTFAIL:DBC_EXAMPLE.?MODULE?:Boo hoo\
    \ on you\nORA-06512: at \"APPL01.DBC_EXAMPLE\", line 104\nORA-06512: at \"APPL01.DBC_EXAMPLE\"\
    , line 29\nORA-06512: at line 1\n```\n\nThis second `ASSERTFAIL` helps illustrate\
    \ the value of adopting the extra discipline required to pass in informative values\
    \ for the module name and message parameters to `assert`. In this case, it is\
    \ still known there is a contract violation bug and in which package the bug was\
    \ caught, but the lack of additional diagnostic information is clearly disadvantageous.\n\
    \nMy strong recommendation is that you take the time to always include both the\
    \ module name and an informative description of the failing condition in your\
    \ calls to `assert`. Many modules may have multiple input parameters, and each\
    \ of them may be subject to one or even more than one contract preconditions.\
    \ It will seem like a lot of extra typing to do without furthering the computational\
    \ goals of the module. Believe me, the first time an `ASSERTFAIL` exception jumps\
    \ out at runtime and informs you exactly the where and what of a previously undiscovered\
    \ bug, you will be extremely glad you invested the effort.\n\n# An Additional\
    \ Improvement\n\nAs noted already, precondition violations indicate bugs in calling\
    \ modules while postcondition violations are bugs in the called module. Therefore,\
    \ it is vitally important for assigning responsibility for contract violation\
    \ bugs to know whether an `ASSERTFAIL` issued from a precondition or postcondition\
    \ assertion.\n\nThe improvement in [Listing 8-6](#Chapter08.html#list_8_6) was\
    \ suggested by my friend Steven Feuerstein as a means of distinguishing between\
    \ pre- and postcondition violations.\n\n## Listing 8-6. Distinguishing between\
    \ Pre- and Postconditions\n\n```\n-- assert for preconditions\n  PROCEDURE assertpre\
    \ (condition_IN IN BOOLEAN\n                       ,msg_IN      IN VARCHAR2 :=\
    \ NULL\n                       ,module_IN    IN VARCHAR2 := NULL)\n  IS\n  BEGIN\n\
    \     assert (condition_IN,'Pre:'||msg_IN,module_IN);\n  END assertpre;\n-- assert\
    \ for postconditions\n  PROCEDURE assertpost(condition_IN IN BOOLEAN\n       \
    \                ,msg_IN       IN VARCHAR2 := NULL\n                       ,module_IN\
    \    IN VARCHAR2 := NULL)\n  IS\n  BEGIN\n     assert (condition_IN,'Post:'||msg_IN,module_IN);\n\
    \  END assertpost;\n```\n\nThe idea is simply to have separately named procedures\
    \ to assert preconditions and postconditions that call the original `assert` but\
    \ add either “Pre:” or “Post:” to the message. These extra routines do not add\
    \ much code baggage and significantly improve bug diagnostics, so I have added\
    \ them to the standardized package template. Of course, they must be called in\
    \ the right context to avoid confusion: never call `assertpost` to check preconditions\
    \ nor `assertpre` for postconditions."
  raw: '#### Enforcing Contracts Using ASSERT


    Having decided to standardize on an assertion mechanism and embed it in every
    package, the question now becomes how to put it into use enforcing contracts?
    For this a little discipline is required; however, in my experience, the extra
    investment in coding up front is far more than paid back by the assurance that
    an entire class of important bugs is either not present or will be immediately
    detected by the code itself.


    The procedure in [Listing 8-5](#Chapter08.html#list_8_5) illustrates using the
    standardized assert to enforce a good singular: precondition and silly postcondition
    directly in code. The precondition is that the single input parameter be not null,
    which is not declaratively enforceable and is often a very important requirement
    to demand, as discussed later. The postcondition illustrates by contrast the value
    of adopting calling discipline when using assert in code. The assertion fails
    to make use of module_IN or msg_IN parameters and thus provides little to go on
    relative to debugging the issue.


    ***Listing 8-5.** An Example Procedure Making Good and Bad Use of Assert*


    `PACKAGE BODY DBC_example`

    `…`

    `  ----------------------------------------------------------`

    `  -- test/example procedures and functions`

    `  ----------------------------------------------------------`

    `  PROCEDURE proc01 (p1 varchar2)`

    `  IS`

    `    --  local module name for assert calls`

    `l_module VARCHAR2(30) := ''PROC01'';`

    `  BEGIN`

    `    -- enforce NOT NULL inputs precondition`

    `    assert(p1 IS NOT NULL,''p1 NOT NULL'', l_module);`


    `    -- procedure logic`

    `    null;`


    `    -- a very bad postcondition!`

    `    assert(FALSE,''Boo hoo on you'');  -- assertfail w/out passing module`

    `  END proc01;`


    Proc01 takes a single input parameter p1 and asserts the contract precondition
    that it be NOT NULL using this line of code:


    `assert(p1 IS NOT NULL,''p1 NOT NULL'',l_module);`


    Note that this precondition is tested in the very first line of the module’s main
    code block. Remember that under software contracts modules are not obliged to
    compute outputs if preconditions are not met, so testing them immediately allows
    modules to fail early and not waste compute cycles unnecessarily.


    Also note the conventions adopted for passing extra information to assert through
    the parameters msg_IN and module_IN. In the first case, the message is simply
    a string literal of the Boolean expression constituting the contract condition
    to be asserted. In the second, the module declares a local variable `l_module`
    and initializes it with its own name, which is also passed to assert.


    In addition to asserting the contract precondition against NULL inputs, proc01
    implements some illustrative buggy logic: it asserts a final postcondition that
    will always throw the ASSERTFAIL exception but without passing any useful diagnostic
    information to include in the error message.


    Testing proc01 by calling it using a NULL input value spools the following results
    from SQL*Plus:


    `BEGIN DBC_example.proc01(null); END;`


    `*`

    `ERROR at line 1:`

    `ORA-20999: ASSERTFAIL:DBC_EXAMPLE.PROC01:p1 NOT NULL`

    `ORA-06512: at "APPL01.DBC_EXAMPLE", line 104`

    `ORA-06512: at "APPL01.DBC_EXAMPLE", line 25`

    `ORA-06512: at line 1`


    At first glance, these results may not seem all that impressive, but to me they
    are pure gold. For example, the first ORA-20999 error indicates the following:


    *   There is a contract violation bug in the code, indicated by the ASSERTFAIL.

    *   The bug was caught in module PROC01 of the DBC_EXAMPLE package.

    *   The contract violation was that input variable `p1` failed the NOT NULL check.

    *   Call stack indicates the assertion check in line 25 of the DBC_EXAMPLE package
    failed.


    A bug has been identified for certain, the code location where bug was caught
    is known, and the nature of the bug is also revealed. Think for a minute about
    the last time you tried to chase down a bug involving unexpected run-time data
    values, and then tell me this is not totally cool.


    Reading the call stack is not intuitive and requires some knowledge of the implementation.
    Beginning with the ORA-20999 error, which is the call to RAISE_APPLICATION_ERROR
    inside the local assert, the next in the stack must be the assert procedure itself,
    so the third entry on stack is the code location that called assert. This is important
    in that the next entry on the stack is the caller of the module making the call
    to assert. When the assertion is a precondition then this caller violated the
    contract condition, so the calling code has a bug exposed at the line indicated
    (line 1 in the trivial example here.) Executing a second test of proc01 that passes
    the non-NULL input precondition but trips on the bad assertion gives the following
    output:


    `BEGIN DBC_example.proc01(''VALUE''); END;`


    `*`

    `ERROR at line 1:`

    `ORA-20999: ASSERTFAIL:DBC_EXAMPLE.?MODULE?:Boo hoo on you`

    `ORA-06512: at "APPL01.DBC_EXAMPLE", line 104`

    `ORA-06512: at "APPL01.DBC_EXAMPLE", line 29`

    `ORA-06512: at line 1`


    This second ASSERTFAIL helps illustrate the value of adopting the extra discipline
    required to pass in informative values for the module name and message parameters
    to assert. In this case, it is still known there is a contract violation bug and
    in which package the bug was caught, but the lack of additional diagnostic information
    is clearly disadvantageous.


    My strong recommendation is that you take the time to always include both the
    module name and an informative description of the failing condition in your calls
    to assert. Many modules may have multiple input parameters, and each of them may
    be subject to one or even more than one contract preconditions. It will seem like
    a lot of extra typing to do without furthering the computational goals of the
    module. Believe me, the first time an ASSERTFAIL exception jumps out at runtime
    and informs you exactly the where and what of a previously undiscovered bug, you
    will be extremely glad you invested the effort.


    #### An Additional Improvement


    As noted already, precondition violations indicate bugs in calling modules while
    postcondition violations are bugs in the called module. Therefore, it is vitally
    important for assigning responsibility for contract violation bugs to know whether
    an ASSERTFAIL issued from a precondition or postcondition assertion.


    The improvement in [Listing 8-6](#Chapter08.html#list_8_6) was suggested by my
    friend Steven Feuerstein as a means of distinguishing between pre- and postcondition
    violations.


    ***Listing 8-6.** Distinguishing between Pre- and Postconditions*


    `-- assert for preconditions`

    `  PROCEDURE assertpre (condition_IN IN BOOLEAN`

    `                       ,msg_IN      IN VARCHAR2 := NULL`

    `                       ,module_IN    IN VARCHAR2 := NULL)`

    `  IS`

    `  BEGIN`

    `     assert (condition_IN,''Pre:''||msg_IN,module_IN);`

    `  END assertpre;`

    `-- assert for postconditions`

    `  PROCEDURE assertpost(condition_IN IN BOOLEAN`

    `                       ,msg_IN       IN VARCHAR2 := NULL`

    `                       ,module_IN    IN VARCHAR2 := NULL)`

    `  IS`

    `  BEGIN`

    `     assert (condition_IN,''Post:''||msg_IN,module_IN);`

    `  END assertpost;`


    The idea is simply to have separately named procedures to assert preconditions
    and postconditions that call the original assert but add either “Pre:” or “Post:”
    to the message. These extra routines do not add much code baggage and significantly
    improve bug diagnostics, so I have added them to the standardized package template.
    Of course, they must be called in the right context to avoid confusion: never
    call assertpost to check preconditions nor assertpre for postconditions.'
  trans: "# 使用 ASSERT 实现契约\n\n在决定标准化断言机制并将其嵌入每个程序包后，现在的问题是如何将其用于实现契约？为此需要一点规范；不过，根据我的经验，前期在编码上投入的额外精力，会因确保了一大类重要错误要么不存在、要么会被代码本身立即检测到而获得远超投入的回报。\n\
    \nListing 8-5 中的流程展示了如何在代码中直接使用标准化的 `assert` 来实现良好的前置条件和糟糕的后置条件。前置条件是输入参数不为 `NULL`，这无法以声明方式强制实现，并且往往是一个非常重要的要求，具体原因将在后文讨论。相比之下，后置条件则说明了在代码中使用\
    \ `assert` 时遵循调用规范的价值。该断言未能利用 `module_IN` 或 `msg_IN` 参数，因此在调试相关问题时几乎无法提供有效信息。\n\
    \n## Listing 8-5. 正确与错误使用 Assert 的示例过程\n\n```\nPACKAGE BODY DBC_example\n…\n \
    \ ----------------------------------------------------------\n  -- 测试/示例过程和函数\n\
    \  ----------------------------------------------------------\n  PROCEDURE proc01\
    \ (p1 varchar2)\n  IS\n    -- 用于 assert 调用的本地模块名称\n    l_module VARCHAR2(30) :=\
    \ 'PROC01';\n  BEGIN\n    -- 强制非空输入前置条件\n    assert(p1 IS NOT NULL,'p1 NOT NULL',\
    \ l_module);\n\n    -- 过程逻辑\n    null;\n\n    -- 一个非常糟糕的后置条件！\n    assert(FALSE,'Boo\
    \ hoo on you');  -- 未传递 module 参数的 assert 失败\n  END proc01;\n```\n\n`Proc01` 接受一个输入参数\
    \ `p1`，并通过以下代码行断言契约前置条件，即它必须为 `NOT NULL`：\n\n```\nassert(p1 IS NOT NULL,'p1 NOT\
    \ NULL',l_module);\n```\n\n请注意，该前置条件是在模块主代码块的第一行进行测试的。请记住，在软件契约下，如果前置条件未满足，模块没有义务计算输出，因此立即测试它们可以让模块尽早失败，避免不必要地浪费计算周期。\n\
    \n另请注意通过参数 `msg_IN` 和 `module_IN` 向 `assert` 传递额外信息所采用的约定。对于第一个参数，消息仅仅是构成待断言契约条件的布尔表达式的字符串字面量。对于第二个参数，模块声明一个局部变量\
    \ `l_module`，并用其自身名称初始化它，该名称也会传递给 `assert`。\n\n除了针对 `NULL` 输入断言契约前置条件外，`proc01`\
    \ 还实现了一些有缺陷的说明性逻辑：它断言了一个最终的后置条件，该条件总是会抛出 `ASSERTFAIL` 异常，但没有传递任何有用的诊断信息以包含在错误消息中。\n\
    \n通过使用 `NULL` 输入值调用 `proc01` 进行测试，会从 SQL*Plus 中输出以下结果：\n\n```\nBEGIN DBC_example.proc01(null);\
    \ END;\n*\nERROR at line 1:\nORA-20999: ASSERTFAIL:DBC_EXAMPLE.PROC01:p1 NOT NULL\n\
    ORA-06512: at \"APPL01.DBC_EXAMPLE\", line 104\nORA-06512: at \"APPL01.DBC_EXAMPLE\"\
    , line 25\nORA-06512: at line 1\n```\n\n乍一看，这些结果似乎并不那么令人印象深刻，但对我来说，它们是纯金。例如，第一个\
    \ `ORA-20999` 错误表明：\n\n*   代码中存在契约违规错误，由 `ASSERTFAIL` 指示。\n*   该错误在 `DBC_EXAMPLE`\
    \ 包的 `PROC01` 模块中被捕捉到。\n*   契约违规是输入变量 `p1` 未能通过 `NOT NULL` 检查。\n*   调用堆栈表明 `DBC_EXAMPLE`\
    \ 包中第 25 行的断言检查失败。\n\n一个错误已被确定无疑地识别出来，捕捉到错误的代码位置已知，错误的性质也已揭示。回想一下你上次试图追踪涉及意外运行时数据值的错误的经历，然后告诉我这难道不酷毙了吗？\n\
    \n阅读调用堆栈并不直观，需要一些实现知识。从 `ORA-20999` 错误开始，这是本地 `assert` 中调用 `RAISE_APPLICATION_ERROR`\
    \ 的地方，堆栈中的下一个条目必定是 `assert` 过程本身，因此堆栈中的第三个条目是调用 `assert` 的代码位置。这一点很重要，因为堆栈中的下一个条目是调用\
    \ `assert` 的模块的调用者。当断言是前置条件时，表明这个调用者违反了契约条件，因此调用代码存在错误，错误位置在指示的行（在此简单示例中是第 1 行）暴露出来。执行\
    \ `proc01` 的第二次测试，这次传递了非 `NULL` 输入以满足前置条件，但在糟糕的断言上出错，得到以下输出：\n\n```\nBEGIN DBC_example.proc01('VALUE');\
    \ END;\n*\nERROR at line 1:\nORA-20999: ASSERTFAIL:DBC_EXAMPLE.?MODULE?:Boo hoo\
    \ on you\nORA-06512: at \"APPL01.DBC_EXAMPLE\", line 104\nORA-06512: at \"APPL01.DBC_EXAMPLE\"\
    , line 29\nORA-06512: at line 1\n```\n\n第二个 `ASSERTFAIL` 有助于说明为 `assert` 的模块名称和消息参数传递信息值所需的额外规范的价值。在这种情况下，仍然知道存在契约违规错误以及错误发生在哪个包中，但缺乏额外的诊断信息明显是不利的。\n\
    \n我强烈建议你花时间，在调用 `assert` 时始终包含模块名称和失败条件的信息性描述。许多模块可能有多个输入参数，其中每个参数都可能受一个甚至多个契约前置条件约束。如果不进一步考虑模块的计算目标，这看起来会像是大量的额外输入。相信我，第一次\
    \ `ASSERTFAIL` 异常在运行时跳出，并准确告知你先前未发现的错误的位置和内容时，你会非常高兴自己投入了这些精力。\n\n# 一项额外的改进\n\n\
    如前所述，前置条件违规表明调用模块中存在错误，而后置条件违规则是被调用模块中的错误。因此，对于确定契约违规错误的责任归属，了解 `ASSERTFAIL` 是来自前置条件还是后置条件断言至关重要。\n\
    \nListing 8-6 中的改进是由我的朋友 Steven Feuerstein 提出的，作为区分前置和后置条件违规的一种方法。\n\n## Listing\
    \ 8-6. 区分前置与后置条件\n\n```\n-- 用于前置条件的 assert\n  PROCEDURE assertpre (condition_IN\
    \ IN BOOLEAN\n                       ,msg_IN      IN VARCHAR2 := NULL\n      \
    \                 ,module_IN    IN VARCHAR2 := NULL)\n  IS\n  BEGIN\n     assert\
    \ (condition_IN,'Pre:'||msg_IN,module_IN);\n  END assertpre;\n-- 用于后置条件的 assert\n\
    \  PROCEDURE assertpost(condition_IN IN BOOLEAN\n                       ,msg_IN\
    \       IN VARCHAR2 := NULL\n                       ,module_IN    IN VARCHAR2\
    \ := NULL)\n  IS\n  BEGIN\n     assert (condition_IN,'Post:'||msg_IN,module_IN);\n\
    \  END assertpost;\n```\n\n这个想法很简单：使用单独命名的过程来断言前置和后置条件，这些过程调用原始的 `assert`，但在消息中添加“Pre:”或“Post:”。这些额外的例程不会增加太多代码负担，并且显著改进了错误诊断，因此我已将它们添加到标准化的包模板中。当然，必须在正确的上下文中调用它们以避免混淆：切勿使用\
    \ `assertpost` 检查前置条件，也切勿使用 `assertpre` 检查后置条件。"
- fmt: "#### Contract-Oriented Function Prototype\n\nPL/SQL functions offer additional\
    \ opportunity to impose more contract discipline into code. Consider the function\
    \ in [Listing 8-7](#Chapter08.html#list_8_7) as a prototype for all PL/SQL functions.\n\
    \n***Listing 8-7.** Prototype PL/SQL Function*\n\n```sql\nFUNCTION  func01 (p1\
    \ varchar2) RETURN NUMBER\n  IS\n    l_return NUMBER;\n    l_module VARCHAR2(30)\
    \ := 'FUNC01';\n  BEGIN\n    -- preconditions\n    assertpre(p1 IS NOT NULL,'p1\
    \ NOT NULL',l_module);\n\n    -- function logic\n    null;\n\n    -- postcondition\
    \ check and return\n    assertpost(l_return IS NOT NULL, 'RETURN NOT NULL',l_module);\n\
    \n    RETURN l_return;\n  END func01;\n```\n\nNote the following key points about\
    \ this function:\n\n*   It returns results through a local variable declared with\
    \ a standardized name (and proper type of course).\n*   It asserts preconditions\
    \ using module identifier and message conventions at the beginning.\n*   It exits\
    \ using `RETURN` in exactly one place: the last line of code.\n*   It asserts\
    \ postconditions using standard conventions immediately preceding the `RETURN`\
    \ statement.\n\nSince functions will always have a single return value, they can\
    \ and should be coded such that there is a single exit point at which this value\
    \ is returned to the calling module. Following this convention allows postcondition\
    \ checks to be specified in exactly one place, immediately preceding the `RETURN`\
    \ statement.\n\nThe use of a local variable with a standard name to always use\
    \ for the `RETURN` statement allows me to know whenever the return value is being\
    \ manipulated by the function logic. Clever functions with complex expressions\
    \ computing outputs directly in the `RETURN` statement may seem elegant but they\
    \ compromise the level of control over postcondition assertions that following\
    \ my simple convention provides.\n\nAdhering to the function prototype’s coding\
    \ conventions greatly benefits code reliability, as functions can enforce contract\
    \ terms at well-defined entry and exit points. Functions (or procedures) with\
    \ multiple possible exit points may introduce the need for postcondition assertions\
    \ to be duplicated, which can itself be a source of bugs should contract terms\
    \ need to be altered.\n\n### Example: Testing Odd and Even Integers\n\nThe examples\
    \ so far have been trivial showcases for calling precondition and postcondition\
    \ assertions without any real computational requirements. This section will present\
    \ a pair of functions with actual computational requirements, albeit very modest\
    \ and perhaps not very practical ones.\n\nImagine an application with logic that\
    \ depends critically on whether specific data values are odd or even integers.\
    \ In such an application, it may be useful to have modules that conform to the\
    \ following contractual agreements:\n\n*   A function that accepts a non-NULL\
    \ integer as input and returns the Boolean `TRUE` if the integer is an odd integer\
    \ and `FALSE` otherwise.\n*   A function that similarly accepts a non-NULL integer\
    \ and returns `TRUE` when the input integer is even and `FALSE` otherwise.\n\n\
    These two functions are clearly related in that for any given integer they should\
    \ return exactly opposite results since the integer can only be either even or\
    \ odd and must be one of these two. The code in [Listing 8-8](#Chapter08.html#list_8_8)\
    \ uses the function prototype and coding conventions presented earlier to meet\
    \ the first requirement.\n\n***Listing 8-8.** A Function to Test a Number for\
    \ Oddity*\n\n```sql\nFUNCTION  odd (p1 number) RETURN BOOLEAN\n  IS\n    l_return\
    \ BOOLEAN;\n    l_module VARCHAR2(30) := 'ODD';\n  BEGIN\n    -- preconditions\n\
    \    assertpre(p1 IS NOT NULL,'p1 NOT NULL',l_module);\n    assertpre(p1 = TRUNC(p1),\
    \ 'p1 INTEGER',l_module);\n\n    -- function logic: returns TRUE if p1 ODD\n \
    \   l_return := MOD(p1,2)=1;\n    -- postcondition check and return\n    assertpost(l_return\
    \ IS NOT NULL, 'RETURN NOT NULL',l_module);\n\n    RETURN l_return;\n  END odd;\n\
    ```\n\n[Listing 8-8](#Chapter08.html#list_8_8)’s function is almost identical\
    \ to the function prototype in [Listing 8-7](#Chapter08.html#list_8_7). The function\
    \ in [Listing 8-8](#Chapter08.html#list_8_8) asserts preconditions and postconditions\
    \ at the beginning and end of the function respectively, returning the computational\
    \ result in the final line of code.\n\nThe function asserts two preconditions:\
    \ that the input is non-NULL and additionally that it is an integer. Clever readers\
    \ may observe that the second assertion implies the first, in the sense that if\
    \ the input value for `p1` is `NULL` then this second assertion will fail as well\
    \ and the first can be considered redundant in some sense. It may be tempting\
    \ in such instances to only assert the second condition; however, this represents\
    \ a shortcut that obfuscates the fact that there really are two separate preconditions:\
    \ that the input be non-NULL and that it be an integer-valued number. Part of\
    \ the motivation for adopting a contract-oriented approach to coding is the desire\
    \ to be very explicit about contract requirements in the code itself, so compound\
    \ assertions should be preceded by any simpler assertions on their components,\
    \ even if these are implied by the compound expression. This illustrates an important\
    \ added benefit of assertions in code: they document as well as enforce software\
    \ contracts.\n\nThe computational requirements of the `odd` function are met in\
    \ a single line of code, yet the function itself contains five lines of executable\
    \ code. A minimal implementation of our functional requirements could be met by\
    \ the function in [Listing 8-9](#Chapter08.html#list_8_9).\n\n***Listing 8-9.**\
    \ Minimal Implementation of the Test for Oddity*\n\n```sql\nFUNCTION  odd2 (p1\
    \ number) RETURN BOOLEAN\n  IS\n  BEGIN\n    RETURN MOD(p1,2)=1;\n  END odd2;\n\
    ```"
  raw: '#### Contract-Oriented Function Prototype


    PL/SQL functions offer additional opportunity to impose more contract discipline
    into code. Consider the function in [Listing 8-7](#Chapter08.html#list_8_7) as
    a prototype for all PL/SQL functions.


    ***Listing 8-7.** Prototype PL/SQL Function*


    `FUNCTION  func01 (p1 varchar2) RETURN NUMBER`

    `  IS`

    `    l_return NUMBER;`

    `    l_module VARCHAR2(30) := ''FUNC01'';`

    `  BEGIN`

    `    -- preconditions`

    `    assertpre(p1 IS NOT NULL,''p1 NOT NULL'',l_module);`


    `    -- function logic`

    `    null;`


    `    -- postcondition check and return`

    `    assertpost(l_return IS NOT NULL, ''RETURN NOT NULL'',l_module);`


    `    RETURN l_return;`

    `  END func01;`


    Note the following key points about this function:


    *   It returns results through a local variable declared with a standardized name
    (and proper type of course).

    *   It asserts preconditions using module identifier and message conventions at
    the beginning.

    *   It exits using RETURN in exactly one place: the last line of code.

    *   It asserts postconditions using standard conventions immediately preceding
    the RETURN statement.


    Since functions will always have a single return value, they can and should be
    coded such that there is a single exit point at which this value is returned to
    the calling module. Following this convention allows postcondition checks to be
    specified in exactly one place, immediately preceding the RETURN statement.


    The use of a local variable with a standard name to always use for the RETURN
    statement allows me to know whenever the return value is being manipulated by
    the function logic. Clever functions with complex expressions computing outputs
    directly in the RETURN statement may seem elegant but they compromise the level
    of control over postcondition assertions that following my simple convention provides.


    Adhering to the function prototype’s coding conventions greatly benefits code
    reliability, as functions can enforce contract terms at well-defined entry and
    exit points. Functions (or procedures) with multiple possible exit points may
    introduce the need for postcondition assertions to be duplicated, which can itself
    be a source of bugs should contract terms need to be altered.


    ### Example: Testing Odd and Even Integers


    The examples so far have been trivial showcases for calling precondition and postcondition
    assertions without any real computational requirements. This section will present
    a pair of functions with actual computational requirements, albeit very modest
    and perhaps not very practical ones.


    Imagine an application with logic that depends critically on whether specific
    data values are odd or even integers. In such an application, it may be useful
    to have modules that conform to the following contractual agreements:


    *   A function that accepts a non-NULL integer as input and returns the Boolean
    TRUE if the integer is an odd integer and FALSE otherwise.

    *   A function that similarly accepts a non-NULL integer and returns TRUE when
    the input integer is even and FALSE otherwise.


    These two functions are clearly related in that for any given integer they should
    return exactly opposite results since the integer can only be either even or odd
    and must be one of these two. The code in [Listing 8-8](#Chapter08.html#list_8_8)
    uses the function prototype and coding conventions presented earlier to meet the
    first requirement.


    ***Listing 8-8.** A Function to Test a Number for Oddity*


    `FUNCTION  odd (p1 number) RETURN BOOLEAN`

    `  IS`

    `    l_return BOOLEAN;`

    `    l_module VARCHAR2(30) := ''ODD'';`

    `  BEGIN`

    `    -- preconditions`

    `    assertpre(p1 IS NOT NULL,''p1 NOT NULL'',l_module);`

    `    assertpre(p1 = TRUNC(p1), ''p1 INTEGER'',l_module);`


    `    -- function logic: returns TRUE if p1 ODD`

    `    l_return := MOD(p1,2)=1;`

    `-- postcondition check and return`

    `    assertpost(l_return IS NOT NULL, ''RETURN NOT NULL'',l_module);`


    `    RETURN l_return;`

    `  END odd;`


    [Listing 8-8](#Chapter08.html#list_8_8)’s function is almost identical to the
    function prototype in [Listing 8-7](#Chapter08.html#list_8_7). The function in
    [Listing 8-8](#Chapter08.html#list_8_8) asserts preconditions and postconditions
    at the beginning and end of the function respectively, returning the computational
    result in the final line of code.


    The function asserts two preconditions: that the input is non-NULL and additionally
    that it is an integer. Clever readers may observe that the second assertion implies
    the first, in the sense that if the input value for `p1` is NULL then this second
    assertion will fail as well and the first can be considered redundant in some
    sense. It may be tempting in such instances to only assert the second condition;
    however, this represents a shortcut that obfuscates the fact that there really
    are two separate preconditions: that the input be non-NULL and that it be an integer-valued
    number. Part of the motivation for adopting a contract-oriented approach to coding
    is the desire to be very explicit about contract requirements in the code itself,
    so compound assertions should be preceded by any simpler assertions on their components,
    even if these are implied by the compound expression. This illustrates an important
    added benefit of assertions in code: they document as well as enforce software
    contracts.


    The computational requirements of the odd function are met in a single line of
    code, yet the function itself contains five lines of executable code. A minimal
    implementation of our functional requirements could be met by the function in
    [Listing 8-9](#Chapter08.html#list_8_9).


    ***Listing 8-9.** Minimal Implementation of the Test for Oddity*


    `FUNCTION  odd2 (p1 number) RETURN BOOLEAN`

    `  IS`

    `  BEGIN`

    `    RETURN MOD(p1,2)=1;`

    `  END odd2;`'
  trans: "#### 面向契约的函数原型\n\nPL/SQL 函数提供了额外的机会，可以将更多的契约规范引入代码中。请将清单 8-7 中的函数视为所有 PL/SQL\
    \ 函数的原型。\n\n***清单 8-7.** PL/SQL 函数原型*\n\n```sql\nFUNCTION  func01 (p1 varchar2)\
    \ RETURN NUMBER\n  IS\n    l_return NUMBER;\n    l_module VARCHAR2(30) := 'FUNC01';\n\
    \  BEGIN\n    -- 前置条件\n    assertpre(p1 IS NOT NULL,'p1 NOT NULL',l_module);\n\
    \n    -- 函数逻辑\n    null;\n\n    -- 后置条件检查与返回\n    assertpost(l_return IS NOT NULL,\
    \ 'RETURN NOT NULL',l_module);\n\n    RETURN l_return;\n  END func01;\n```\n\n\
    关于此函数，请注意以下关键点：\n\n*   它通过一个使用标准化名称（当然还有恰当类型）声明的局部变量来返回结果。\n*   它在开始处使用模块标识符和消息约定来断言前置条件。\n\
    *   它仅在代码的最后一行使用 `RETURN` 语句退出。\n*   它在 `RETURN` 语句之前立即使用标准约定来断言后置条件。\n\n由于函数总是有一个返回值，因此可以并且应该将其编码为只有一个返回此值给调用模块的出口点。遵循这一约定，使得后置条件检查可以精确地在\
    \ `RETURN` 语句之前的一个地方指定。\n\n使用一个标准名称的局部变量专用于 `RETURN` 语句，这使得我能够知道函数逻辑何时正在操作返回值。那些在\
    \ `RETURN` 语句中直接使用复杂表达式计算输出的“聪明”函数，看起来可能很优雅，但它们削弱了通过遵循我的简单约定所能提供的对后置条件断言的控制级别。\n\
    \n遵守函数原型的编码约定对代码可靠性大有裨益，因为函数可以在明确定义的入口和出口点强制执行契约条款。具有多个可能出口点的函数（或过程）可能导致需要在多个地方重复后置条件断言，这本身在契约条款需要更改时就可能成为错误的来源。\n\
    \n### 示例：测试奇数和偶数整数\n\n到目前为止的例子都是简单的演示，用于调用前置和后置条件断言，而没有任何实际的计算需求。本节将提出一对具有实际计算需求的函数，尽管需求非常小，也许不太实用。\n\
    \n想象一个应用程序，其逻辑关键取决于特定数据值是奇数还是偶数整数。在此类应用程序中，拥有符合以下契约协议的模块可能是有用的：\n\n*   一个函数，接受一个非\
    \ NULL 整数作为输入，如果该整数是奇数则返回布尔值 `TRUE`，否则返回 `FALSE`。\n*   一个函数，类似地接受一个非 NULL 整数，当输入整数是偶数时返回\
    \ `TRUE`，否则返回 `FALSE`。\n\n这两个函数显然是相关的，因为对于任何给定的整数，它们应该返回完全相反的结果，因为整数只能是偶数或奇数，并且必须是两者之一。清单\
    \ 8-8 中的代码使用了前面介绍的函数原型和编码约定来满足第一个需求。\n\n***清单 8-8.** 用于测试数字是否为奇数的函数*\n\n```sql\n\
    FUNCTION  odd (p1 number) RETURN BOOLEAN\n  IS\n    l_return BOOLEAN;\n    l_module\
    \ VARCHAR2(30) := 'ODD';\n  BEGIN\n    -- 前置条件\n    assertpre(p1 IS NOT NULL,'p1\
    \ NOT NULL',l_module);\n    assertpre(p1 = TRUNC(p1), 'p1 INTEGER',l_module);\n\
    \n    -- 函数逻辑：如果 p1 是奇数则返回 TRUE\n    l_return := MOD(p1,2)=1;\n    -- 后置条件检查与返回\n\
    \    assertpost(l_return IS NOT NULL, 'RETURN NOT NULL',l_module);\n\n    RETURN\
    \ l_return;\n  END odd;\n```\n\n清单 8-8 中的函数几乎与清单 8-7 中的函数原型完全相同。清单 8-8 中的函数分别在函数的开始和结束处断言前置和后置条件，在代码的最后一行返回计算结果。\n\
    \n该函数断言了两个前置条件：输入非 NULL，并且它还是一个整数。聪明的读者可能会观察到，第二个断言隐含了第一个断言，因为如果 `p1` 的输入值是 `NULL`，那么这第二个断言也会失败，因此第一个断言在某种意义上可能是多余的。在这种情况下，可能诱人只断言第二个条件；然而，这代表了一种捷径，它模糊了实际上有两个独立前置条件的事实：输入必须非\
    \ NULL 并且它必须是一个整数值的数字。采用面向契约编码方式的部分动机是希望在代码本身中对契约要求非常明确，因此即使复合表达式隐含了这些简单断言，也应在复合断言之前加上对其组成部分的任何简单断言。这说明了代码中断言的一个重要附加好处：它们既记录又强制执行软件契约。\n\
    \n`odd` 函数的计算需求仅用一行代码就满足了，但函数本身包含了五行可执行代码。我们功能需求的最简实现可以由清单 8-9 中的函数满足。\n\n***清单\
    \ 8-9.** 测试奇数的最简实现*\n\n```sql\nFUNCTION  odd2 (p1 number) RETURN BOOLEAN\n  IS\n\
    \  BEGIN\n    RETURN MOD(p1,2)=1;\n  END odd2;\n```"
- fmt: "While the implementation in [Listing 8-9](#Chapter08.html#list_8_9) meets\
    \ the basic computational requirement to return TRUE when `p1` is an odd integer,\
    \ it does not enforce the contractual requirements to accept only non-NULL integers\
    \ and return only TRUE or FALSE. If a NULL value for `p1` is passed, the function\
    \ will return NULL as output even though it purports to be a Boolean. This obliges\
    \ calling modules to either assert non-NULL on input values themselves or to accommodate\
    \ NULL outputs using `NVL` or other special-case constructs. So, the extra code\
    \ required to ensure correctness has not disappeared, rather it is moved into\
    \ the calling applications, all of which must get it right.\n\nSimilarly, the\
    \ minimal implementation does not check that `p1` is an integer, and the `MOD`\
    \ function will happily return results for non-integer values of its arguments\
    \ so the function will not fail in this case; however, it is very unlikely that\
    \ a system that depends on oddness or evenness of integers will be satisfied with\
    \ routines that accept non-integer inputs and makes statements about whether they\
    \ are odd or not.\n\nNow consider the implementation in [Listing 8-10](#Chapter08.html#list_8_10)\
    \ of the complementary function `even` that computes whether an input integer\
    \ is an even number.\n\n**Listing 8-10.** A Function to Test for Evenness\n\n\
    ```sql\nFUNCTION  even (p1 number) RETURN BOOLEAN\n  IS\n    l_return BOOLEAN;\n\
    \    l_module VARCHAR2(30) := 'EVEN';\n  BEGIN\n    -- preconditions\n    assertpre(p1\
    \ IS NOT NULL,'p1 NOT NULL',l_module);\n    assertpre(p1 = TRUNC(p1), 'p1 INTEGER',l_module);\n\
    \n    -- function logic: returns TRUE if p1 EVEN\n    l_return := p1/2 = TRUNC(p1/2);\n\
    \n    -- postcondition check and return\n    assertpost(l_return IS NOT NULL,\
    \ 'RETURN NOT NULL',l_module);\n    assertpost(NOT(l_return AND odd(p1)),'NOT(EVEN\
    \ AND ODD)',l_module);\n    assertpost(l_return OR odd(p1),'EVEN OR ODD',l_module);\n\
    \n    RETURN l_return;\n  END even;\n```\n\n[Listing 8-10](#Chapter08.html#list_8_10)'s\
    \ function looks very similar to the `odd` function ([Listing 8-8](#Chapter08.html#list_8_8))\
    \ in that it closely follows the contract-oriented function prototype, yet there\
    \ are some important differences to note. For one thing, the function logic could\
    \ easily have used modulo logic just as the `odd` function did by using `l_return\
    \ := MOD(p1,2)=0` but instead uses simple division by 2 and the `TRUNC` function:\n\
    \n```sql\nl_return := p1/2 = TRUNC(p1/2);\n```\n\nThis introduces the most interesting\
    \ feature to note about `even`, which is the extensive assertion of postconditions.\
    \ First the simple expectation that `l_return` is non-NULL is asserted, followed\
    \ by these logic puzzles:\n\n```sql\nassertpost(NOT(l_return AND odd(p1)),'NOT(EVEN\
    \ AND ODD)',l_module);\nassertpost(l_return OR odd(p1),'EVEN OR ODD',l_module);\n\
    ```\n\nThese two complex assertions actually test the correctness of the value\
    \ about to be returned by `even` using the complementary `odd` function. The first\
    \ asserts that the two functions `even` and `odd` cannot both agree about `p1`,\
    \ if one is FALSE the other is TRUE and vice versa. The second asserts that at\
    \ least one of them must be FALSE for any given `p1`.\n\nThe assertions test the\
    \ correctness of the function results by checking them against results of a computationally\
    \ independent function with a different algorithmic strategy. This is one of those\
    \ rare cases when the correctness of computational results can actually be asserted\
    \ as a postcondition.\n\nOf course, nothing comes entirely for free and in this\
    \ case asserting the complex postcondition really amounts to performing the computational\
    \ logic three times - once in the `even` function itself and twice again in calling\
    \ the `odd` function in postcondition assertions. Tight coupling with the `odd`\
    \ function also means that if there is a bug in that function it will extend as\
    \ a bug into the `even` function as well.\n\n### Useful Contract Patterns\n\n\
    There are several useful contract patterns that I have come to recognize and appreciate\
    \ in my own code, described in the following subsections. Adopting well-understood\
    \ and agreed patterns like these for modules promotes code correctness and clarity\
    \ in that certain contracts are understood to apply based on the pattern and do\
    \ not require module-by-module specification or analysis.\n\n#### Not-NULL IN\
    \ / Not-NULL OUT\n\nPerhaps the most basic and useful software contracts in a\
    \ PL/SQL context are those that eliminate the problematic and often ambiguous\
    \ circumstances that surround the handling of NULL values. Most algorithms expect\
    \ to compute over actual data and may need to special case or provide alternate\
    \ computational results in the presence of missing or NULL data values. This can\
    \ introduce unnecessary ambiguity or complexity into APIs, much better to simply\
    \ outlaw NULL values wherever possible.\n\nFiguring out bugs due to NULL values\
    \ can be very difficult, especially when computations do not explicitly fail as\
    \ a result. Computer program logic is by its very nature binary, and NULL is an\
    \ unwelcome third wheel.\n\nSo one of my favorite contracts can be simply described\
    \ (from the called module’s point of view) as follows: if you agree NOT to pass\
    \ me NULL input values, you will certainly receive non-NULL output values back.\
    \ This contract agreement is almost universally valuable whenever it can be imposed.\
    \ In practice, a large majority of contract enforcement is validating input preconditions\
    \ and this often means accepting only non-NULL values. Of course, the module must\
    \ then also adhere to and enforce wherever possible its obligation under the postcondition\
    \ that only non-NULL outputs will be generated. There is also an inherent fairness\
    \ in this contract pattern: both parties are held to the same obligation and accrue\
    \ similar benefits of certainty.\n\n#### FUNCTION RETURN Not-NULL\n\nThis pattern\
    \ is a specialization of the previous one that recognizes the significant advantages\
    \ of using functions instead of procedures when a module must return output to\
    \ callers. The function-based programming model lends itself to disciplined contract\
    \ enforcement as illustrated in the function prototype discussed previously. In\
    \ addition, functions that reliably return non-NULL values can be referenced in\
    \ calling code in place of constants or variables. For instance, imagine a function\
    \ called `my_function` that takes a single input parameter `p1` and guarantees\
    \ to return a non-NULL number as output. This allows me to safely write code like\
    \ the following:\n\n```sql\nIF my_function(p1=>'X') > my_function(p1=>'Y')\nTHEN\
    \ do_something;\nEND IF;\n```\n\nThe intent here is clear, unambiguous, and reads\
    \ directly from the code: compare `my_function` results over the parameter values\
    \ ‘X’ and ‘Y’ and take action if the former is greater than the latter.\n\nNow\
    \ suppose that `my_function` does not guarantee non-NULL output values. Now any\
    \ code that calls it must itself make decisions about what to do in that case,\
    \ for example:\n\n```sql\nIF NVL(my_function(p1=>'X'), 0) > NVL(my_function(p1=>'Y'),\
    \ 1)\nTHEN do_something;\nEND IF;\n```\n\nThis code is much more difficult to\
    \ read due to the distracting syntax clutter introduced by the pair of `NVL` function\
    \ calls. In addition, the intent is far less obvious, especially given that NULL\
    \ output from `my_function` is cast to 0 when the input value is ‘X’ and to 1\
    \ when the input value is ‘Y’. Why is this the case? Is it a bug in this code\
    \ or some mysterious consequence of the inner purpose of `my_function`? This is\
    \ what happens when function contracts are weak and callers must adapt to ambiguous\
    \ outputs."
  raw: 'While the implementation in [Listing 8-9](#Chapter08.html#list_8_9) meets
    the basic computational requirement to return TRUE when `p`1 is an odd integer,
    it does not enforce the contractual requirements to accept only non-NULL integers
    and return only TRUE or FALSE. If a NULL value for `p1` is passed, the function
    will return NULL as output even though it purports to be a Boolean. This obliges
    calling modules to either assert non-NULL on input values themselves or to accommodate
    NULL outputs using NVL or other special-case constructs. So, the extra code required
    to ensure correctness has not disappeared, rather it is moved into the calling
    applications, all of which must get it right.


    Similarly, the minimal implementation does not check that `p1` is an integer,
    and the `MOD` function will happily return results for non-integer values of its
    arguments so the function will not fail in this case; however, it is very unlikely
    that a system that depends on oddness or evenness of integers will be satisfied
    with routines that accept non-integer inputs and makes statements about whether
    they are odd or not.


    Now consider the implementation in [Listing 8-10](#Chapter08.html#list_8_10) of
    the complementary function `even` that computes whether an input integer is an
    even number.


    ***Listing 8-10.** A Function to Test for Evenness*


    `FUNCTION  even (p1 number) RETURN BOOLEAN`

    `  IS`

    `    l_return BOOLEAN;`

    `l_module VARCHAR2(30) := ''EVEN'';`

    `  BEGIN`

    `    -- preconditions`

    `    assertpre(p1 IS NOT NULL,''p1 NOT NULL'',l_module);`

    `    assertpre(p1 = TRUNC(p1), ''p1 INTEGER'',l_module);`


    `    -- function logic: returns TRUE if p1 EVEN`

    `    l_return := p1/2 = TRUNC(p1/2);`


    `    -- postcondition check and return`

    `    assertpost(l_return IS NOT NULL, ''RETURN NOT NULL'',l_module);`

    `    assertpost(NOT(l_return AND odd(p1)),''NOT(EVEN AND ODD)'',l_module);`

    `    assertpost(l_return OR odd(p1),''EVEN OR ODD'',l_module);`


    `    RETURN l_return;`

    `  END even;`


    [Listing 8-10](#Chapter08.html#list_8_10)’s function looks very similar to the
    `odd` function ([Listing 8-8](#Chapter08.html#list_8_8)) in that it closely follows
    the contract-oriented function prototype, yet there are some important differences
    to note. For one thing, the function logic could easily have used modulo logic
    just as the `odd` function did by using `l_return := MOD(p1,2)=0` but instead
    uses simple division by 2 and the `TRUNC` function:


    `l_return := p1/2 = TRUNC(p1/2);`


    This introduces the most interesting feature to note about `even`, which is the
    extensive assertion of postconditions. First the simple expectation that `l_return`
    is non-NULL is asserted, followed by these logic puzzles:


    `assertpost(NOT(l_return AND odd(p1)),''NOT(EVEN AND ODD)'',l_module);`

    `assertpost(l_return OR odd(p1),''EVEN OR ODD'',l_module);`


    These two complex assertions actually test the correctness of the value about
    to be returned by `even` using the complementary `odd` function. The first asserts
    that the two functions `even` and `odd` cannot both agree about `p1`, if one is
    FALSE the other is TRUE and vice versa. The second asserts that at least one of
    them must be FALSE for any given `p1`.


    The assertions test the correctness of the function results by checking them against
    results of a computationally independent function with a different algorithmic
    strategy. This is one of those rare cases when the correctness of computational
    results can actually be asserted as a postcondition.


    Of course, nothing comes entirely for free and in this case asserting the complex
    postcondition really amounts to performing the computational logic three times
    - once in the `even` function itself and twice again in calling the `odd` function
    in postcondition assertions. Tight coupling with the `odd` function also means
    that if there is a bug in that function it will extend as a bug into the `even`
    function as well.


    ### Useful Contract Patterns


    There are several useful contract patterns that I have come to recognize and appreciate
    in my own code, described in the following subsections. Adopting well-understood
    and agreed patterns like these for modules promotes code correctness and clarity
    in that certain contracts are understood to apply based on the pattern and do
    not require module-by-module specification or analysis.


    #### Not-NULL IN / Not-NULL OUT


    Perhaps the most basic and useful software contracts in a PL/SQL context are those
    that eliminate the problematic and often ambiguous circumstances that surround
    the handling of NULL values. Most algorithms expect to compute over actual data
    and may need to special case or provide alternate computational results in the
    presence of missing or NULL data values. This can introduce unnecessary ambiguity
    or complexity into APIs, much better to simply outlaw NULL values wherever possible.


    Figuring out bugs due to NULL values can be very difficult, especially when computations
    do not explicitly fail as a result. Computer program logic is by its very nature
    binary, and NULL is an unwelcome third wheel.


    So one of my favorite contracts can be simply described (from the called module’s
    point of view) as follows: if you agree NOT to pass me NULL input values, you
    will certainly receive non-NULL output values back. This contract agreement is
    almost universally valuable whenever it can be imposed. In practice, a large majority
    of contract enforcement is validating input preconditions and this often means
    accepting only non-NULL values. Of course, the module must then also adhere to
    and enforce wherever possible its obligation under the postcondition that only
    non-NULL outputs will be generated. There is also an inherent fairness in this
    contract pattern: both parties are held to the same obligation and accrue similar
    benefits of certainty.


    #### FUNCTION RETURN Not-NULL


    This pattern is a specialization of the previous one that recognizes the significant
    advantages of using functions instead of procedures when a module must return
    output to callers. The function-based programming model lends itself to disciplined
    contract enforcement as illustrated in the function prototype discussed previously.
    In addition, functions that reliably return non-NULL values can be referenced
    in calling code in place of constants or variables. For instance, imagine a function
    called `my_function` that takes a single input parameter `p1` and guarantees to
    return a non-NULL number as output. This allows me to safely write code like the
    following:


    `IF my_function(p1=>''X'') > my_function(p1=>''Y'')`

    `THEN do_something;`

    `END IF;`


    The intent here is clear, unambiguous, and reads directly from the code: compare
    `my_function` results over the parameter values ‘X’ and ‘Y’ and take action if
    the former is greater than the latter.


    Now suppose that `my_function` does not guarantee non-NULL output values. Now
    any code that calls it must itself make decisions about what to do in that case,
    for example:


    `IF NVL(my_function(p1=>''X''), 0) > NVL(my_function(p1=>''Y''), 1)`

    `THEN do_something;`

    `END IF;h`


    This code is much more difficult to read due to the distracting syntax clutter
    introduced by the pair of `NVL` function calls. In addition, the intent is far
    less obvious, especially given that NULL output from `my_function` is cast to
    0 when the input value is ‘X’ and to 1 when the input value is ‘Y’. Why is this
    the case? Is it a bug in this code or some mysterious consequence of the inner
    purpose of `my_function`? This is what happens when function contracts are weak
    and callers must adapt to ambiguous outputs.'
  trans: "\n虽然列表 8-9 中的实现满足了基本的计算要求，即当`p1`为奇数时返回`TRUE`，但它并未强制执行契约要求，即只接受非`NULL`的整数并且只返回`TRUE`或`FALSE`。如果传入`p1`为`NULL`，该函数将返回`NULL`作为输出，尽管它声称返回的是布尔值。这迫使调用模块要么自行对输入值断言非`NULL`，要么使用`NVL`或其他特殊情况结构来处理`NULL`输出。因此，为确保正确性所需的额外代码并未消失，而是被转移到了调用应用程序中，所有这些应用程序都必须正确实现它。\n\
    \n同样，该最小实现并未检查`p1`是否为整数，而`MOD`函数会欣然接受其参数的非整数值并返回结果，因此函数在此情况下不会失败；然而，一个依赖于整数奇偶性的系统不太可能满足于接受非整数输入并判断其奇偶性的例程。\n\
    \n现在，考虑列表 8-10 中互补函数`even`的实现，该函数用于计算输入整数是否为偶数。\n\n**列表 8-10.** 一个测试偶数性的函数\n\n\
    ```sql\nFUNCTION  even (p1 number) RETURN BOOLEAN\n  IS\n    l_return BOOLEAN;\n\
    \    l_module VARCHAR2(30) := 'EVEN';\n  BEGIN\n    -- 前置条件\n    assertpre(p1\
    \ IS NOT NULL,'p1 NOT NULL',l_module);\n    assertpre(p1 = TRUNC(p1), 'p1 INTEGER',l_module);\n\
    \n    -- 函数逻辑：如果 p1 是偶数则返回 TRUE\n    l_return := p1/2 = TRUNC(p1/2);\n\n    --\
    \ 后置条件检查和返回\n    assertpost(l_return IS NOT NULL, 'RETURN NOT NULL',l_module);\n\
    \    assertpost(NOT(l_return AND odd(p1)),'NOT(EVEN AND ODD)',l_module);\n   \
    \ assertpost(l_return OR odd(p1),'EVEN OR ODD',l_module);\n\n    RETURN l_return;\n\
    \  END even;\n```\n\n列表 8-10 的函数看起来与`odd`函数（列表 8-8）非常相似，因为它紧密遵循了面向契约的函数原型，但仍有一些重要区别值得注意。一方面，该函数逻辑本可以轻松地使用取模逻辑，就像`odd`函数那样，使用`l_return\
    \ := MOD(p1,2)=0`，但它却使用了简单的除以 2 和`TRUNC`函数：\n\n```sql\nl_return := p1/2 = TRUNC(p1/2);\n\
    ```\n\n这引出了关于`even`函数最值得注意的一个特性，即对后置条件的广泛断言。首先是简单的期望，即`l_return`非`NULL`，随后是这些逻辑谜题：\n\
    \n```sql\nassertpost(NOT(l_return AND odd(p1)),'NOT(EVEN AND ODD)',l_module);\n\
    assertpost(l_return OR odd(p1),'EVEN OR ODD',l_module);\n```\n\n这两个复杂的断言实际上通过互补的`odd`函数来测试`even`函数即将返回值的正确性。第一个断言这两个函数`even`和`odd`不能同时对`p1`做出相同判断，如果一个为`FALSE`，则另一个必为`TRUE`，反之亦然。第二个断言对于任何给定的`p1`，它们中至少有一个必须为`FALSE`。\n\
    \n这些断言通过将计算结果与采用不同算法策略且计算上独立的函数的结果进行比对，来测试函数结果的正确性。这是极少数可以将计算结果的正确性作为后置条件进行断言的案例之一。\n\
    \n当然，没有什么是完全免费的，在这种情况下，断言复杂的后置条件实际上相当于将计算逻辑执行了三次——一次在`even`函数本身中，另外两次在调用`odd`函数进行后置条件断言时。与`odd`函数的紧密耦合也意味着，如果该函数存在错误，该错误也会延伸到`even`函数中。\n\
    \n### 有用的契约模式\n\n在我自己的代码中，我认识到并欣赏几种有用的契约模式，将在以下小节中描述。采用这些经过充分理解和商定的模式，可以提升代码的正确性和清晰度，因为某些契约根据模式被理解为适用，无需逐模块进行规范或分析。\n\
    \n#### 非空输入 / 非空输出\n\n在 PL/SQL 上下文中，最基本和最有用的软件契约也许是那些消除了围绕`NULL`值处理的问题性和通常模棱两可情况的契约。大多数算法期望基于实际数据进行计算，并且可能需要在数据缺失或为`NULL`值时提供特殊情况或替代的计算结果。这可能会给\
    \ API 引入不必要的歧义或复杂性，更好的做法是在可能的情况下简单地禁止`NULL`值。\n\n找出由`NULL`值导致的错误可能非常困难，特别是当计算因此并未显式失败时。计算机程序逻辑本质上是二元的，而`NULL`是一个不受欢迎的第三者。\n\
    \n因此，我最喜欢的契约之一可以简单地描述（从被调用模块的角度看）如下：如果你同意不传给我`NULL`输入值，你肯定将收到非`NULL`的输出值作为回报。只要能够实施，这种契约协议几乎普遍有价值。在实践中，大部分契约执行是验证输入前置条件，而这通常意味着只接受非`NULL`值。当然，模块随后也必须遵守并尽可能强制执行其在后置条件下的义务，即只生成非`NULL`输出。这种契约模式还具有内在的公平性：双方承担相同的义务，并获得相似的确定性收益。\n\
    \n#### 函数返回非空\n\n这种模式是前一种模式的特化，它认识到在模块必须向调用者返回输出时，使用函数而不是过程具有显著优势。基于函数的编程模型有助于实施有纪律的契约执行，如前面讨论的函数原型所示。此外，可靠地返回非`NULL`值的函数可以在调用代码中引用，以代替常量或变量。例如，想象一个名为`my_function`的函数，它接受一个输入参数`p1`，并保证返回一个非`NULL`的数字作为输出。这使我能够安全地编写如下代码：\n\
    \n```sql\nIF my_function(p1=>'X') > my_function(p1=>'Y')\nTHEN do_something;\n\
    END IF;\n```\n\n这里的意图是清晰、明确的，并且可以直接从代码中读懂：比较`my_function`在参数值'X'和'Y'上的结果，如果前者大于后者则采取行动。\n\
    \n现在假设`my_function`不保证输出非`NULL`值。那么任何调用它的代码都必须自行决定在此情况下该怎么做，例如：\n\n```sql\nIF\
    \ NVL(my_function(p1=>'X'), 0) > NVL(my_function(p1=>'Y'), 1)\nTHEN do_something;\n\
    END IF;\n```\n\n这段代码由于引入了`NVL`函数调用对的干扰性语法噪音而变得难以阅读。此外，意图远不那么明显，特别是考虑到当输入值为'X'时`my_function`的`NULL`输出被转换为\
    \ 0，而当输入值为'Y'时转换为 1。为什么会这样？这是此代码中的错误，还是`my_function`内在目的的某种神秘后果？当函数契约薄弱且调用者必须适应模棱两可的输出时，就会发生这种情况。\n"
- fmt: "# FUNCTION RETURN BOOLEAN Not-NULL\n\nA specific case of the non-NULL function\
    \ pattern occurs when the function’s `RETURN` datatype is `BOOLEAN`. Such functions\
    \ can safely be referenced in conditional statements to implement powerful and\
    \ expressive logic.\n\nFor instance, suppose there is a procedure to perform some\
    \ complex processing on records of some type `my_rectype`, but these must pass\
    \ some sophisticated criteria in order to be successfully processed. These criteria\
    \ may actually be preconditions to the processing procedure, or perhaps they are\
    \ additional criteria that are not required by that procedure but which the program\
    \ logic wishes to impose. These criteria can be encapsulated in a function whose\
    \ contract is to test these criteria and unambiguously return `TRUE` or `FALSE`.\n\
    \n```sql\nFUNCTION ready_to_process (rec1 my_rectype) RETURN BOOLEAN;\n```\n\n\
    The code that performs processing of records might look like this:\n\n```sql\n\
    IF ready_to_process(rec1=>local_rec)\nTHEN\n  process_record(rec1=>local_rec);\n\
    ELSE\n  log_error;\nEND IF;\n```\n\nAgain, not having to deal with `NULL` function\
    \ output combined with expressive function names makes the intent of such code\
    \ clear.\n\n# Check Functions: RETURN TRUE OR ASSERTFAIL\n\nThe previous example\
    \ leads to an interesting consideration regarding asserting the truth-value of\
    \ functions that return `BOOLEAN`. For instance, should the `process_record` procedure\
    \ assert the `ready_to_process` function as a precondition?\n\n```sql\nPROCEDURE\
    \ process_record (rec1 my_rectype)\nIS\n    l_module VARCHAR2(30) := 'PROCESS_RECORD';\n\
    BEGIN\n  -- precondition: test that record ready to process\n  assertpre(ready_to_process(rec1),\
    \ 'REC1 ready to process', l_module);\n```\n\nThe answer as to whether this is\
    \ OK or not is, it depends. Bertrand Meyer has this to say about it:\n\n> *If\
    \ you exert the proper care by sticking to functions that are simple and self-evidently\
    \ correct, the use of function routines in assertions can provide you with a powerful\
    \ means of abstraction.*\n>\n> Bertrand Meyer, *Object-Oriented Software Construction*,\
    \ Second Edition\n\nI love the phrase “simple and self-evidently correct” as it\
    \ succinctly captures the essence of bug-free code. In my own programming, I have\
    \ sometimes found that multiple modules within the same package may all reference\
    \ and manipulate some private global data structures and all need to assert a\
    \ common set of preconditions over these structures to guarantee correctness.\
    \ In this case, implementing a function that combines these assertions together\
    \ can eliminate significant code duplication.\n\n```sql\nFUNCTION check_all_ok(module_IN\
    \ VARCHAR2) RETURN BOOLEAN\nIS\nBEGIN\n  assert(condition1, 'condition1', module_IN);\n\
    \  assert(condition2, 'condition2', module_IN);\n  …\n  assert(conditionN, 'conditionN',\
    \ module_IN);\n\n  RETURN TRUE;\nEND check_all_ok;\n```\n\nAs long as the conditions\
    \ tested are themselves simple expressions limited to package variables or data\
    \ structures and `PL/SQL` language primitives, such “check functions,” can be\
    \ considered “simple and self-evidently correct” in that they can clearly only\
    \ return `TRUE` or throw an `ASSERTFAIL` exception, the `check_all_ok` function\
    \ can safely be asserted in the various modules that depend on it.\n\n```sql\n\
    assertpre(check_all_ok(l_module), 'check_all_ok', l_module);\n```\n\nNote that\
    \ the local module name of the caller is passed into the `check_all_ok` function\
    \ so that any `ASSERTFAIL` exceptions generated will be correctly tagged with\
    \ the module name in which the check failed.\n\n## Principles For Bug-Free Code\n\
    \nThis chapter has actually covered a considerable amount of material rapidly\
    \ and with brevity. The references cited earlier near the beginning of the chapter\
    \ can give you a much fuller treatment of the depth and richness of Design by\
    \ Contract. I mentioned my attraction to contract-oriented programming is rooted\
    \ in an abhorrence of bugs, especially those in my own code. Software contracts\
    \ are purposed to eliminating ambiguity at software interfaces by being explicit\
    \ about assumptions and expectations, and enforcing these directly in the code\
    \ itself. Through these means an entire class of bugs can be pre-engineered out\
    \ of programs—or at least exposed and dispatched quickly.\n\nThe mechanism and\
    \ techniques presented here do not by any means represent full support for Design\
    \ by Contract in `PL/SQL`. In fact, Bertrand Meyer created an entire programming\
    \ language called Eiffel and a development environment to support it, precisely\
    \ because existing languages and tools were not entirely capable of fully supporting\
    \ this paradigm. However, we must live with `PL/SQL` and do the best we can, and\
    \ I have tried to present a practical approach to adopting the Design by Contract\
    \ philosophy within a `PL/SQL` context.\n\nIn wrapping up, I will briefly discuss\
    \ a few contract-oriented principles for developing bug-free code.\n\n### Assert\
    \ Preconditions Rigorously\n\n`PL/SQL` programs typically execute their algorithms\
    \ on simple or complex data structures passed to them via input parameter values\
    \ or available to them as package global variables. They are no different than\
    \ programs written in any other language in this respect. Program algorithms typically\
    \ have very specific requirements about the data on which they execute and may\
    \ very well fail or give unreliable results when those requirements are not met.\
    \ These requirements are precisely what Design by Contract refers to as preconditions\
    \ and enforcing precondition requirements rigorously is the first and best step\
    \ that you can take to insuring that your algorithms will execute successfully\
    \ every time. This probably sounds obvious, yet how many programs are written\
    \ with detailed attention to identifying each and every assumption about the inputs\
    \ that its algorithms make and documents them explicitly? And of these, how many\
    \ actually enforce those requirements in the code itself, such that invalid inputs\
    \ cannot get past the front door, so to speak?\n\nAs mentioned several times already,\
    \ many algorithms are not designed to operate on `NULL` inputs, or they employ\
    \ special case code producing special case outputs where they are. Why not simply\
    \ excise `NULL` values altogether and limit such programs to the straightforward\
    \ cases they are designed for? This is not to say that `NULL` inputs can always\
    \ be outlawed, but perhaps that is where contract negotiations should begin. If\
    \ clients absolutely cannot comply then perhaps the precondition will need to\
    \ be relaxed and the program adapted appropriately, but at least then you will\
    \ know why it is the case.\n\nIt is also good practice to tease out and explicitly\
    \ enforce each separate precondition rather than overload multiple preconditions\
    \ into one assertion. For instance, if two input parameters `x` and `y` are required\
    \ to have non-`NULL` values and `x` must be greater than `y`, all three preconditions\
    \ can be enforced with\n\n```sql\nassertpre(x > y,'x > y', l_module)\n```\n\n\
    This assertion will fail if either `x` or `y` (or both) is `NULL`; however, these\
    \ requirements are not explicit in the assertion and must be inferred. Contract-orientation\
    \ is about being explicit and precise, with no tolerance for inference and innuendo.\
    \ So there should be three precondition assertions in this example.\n\nThe previous\
    \ example also illustrates a major benefit of assertions I have not emphasized\
    \ so much, which is that they not only enforce but also document software contracts.\
    \ If programmers writing code to use your modules can read the source, requirements\
    \ for proper usage can be read directly from the preconditions.\n\nRequire good\
    \ inputs explicitly, and good outputs are much easier to guarantee."
