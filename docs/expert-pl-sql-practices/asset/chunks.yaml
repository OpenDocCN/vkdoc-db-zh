    ## Michael Rosenblum

    ![images](images/square.jpg) `Michael Rosenblum` 是 Dulcian, Inc. 的软件架构师/开发 DBA，负责系统调优和应用架构。Michael
    通过编写复杂的 PL/SQL 例程和研究新功能来支持 Dulcian 的开发人员。他是《`PL/SQL for Dummies`》（Wiley Press,
    2006）的合著者，并撰写了多篇与数据库相关的文章（IOUG Select Journal, ODTUG Tech Journal）。Michael 是 Oracle
    ACE，经常在各种地区和国家 Oracle 用户组会议（Oracle OpenWorld, ODTUG, IOUG Collaborate, RMOUG,
    NYOUG 等）上演讲，并获得了 ODTUG Kaleidoscope 2009 年最佳演讲者奖。在他的祖国乌克兰，他获得了乌克兰总统奖学金、信息系统硕士学位，并以优异成绩从基辅国立经济大学毕业。


    ## Robyn Sands

    ![images](images/square.jpg) `Robyn Sands` 是思科系统公司的软件工程师，为思科客户设计和开发嵌入式 Oracle
    数据库产品。她从 1996 年起就开始使用 Oracle，在应用开发、大型系统实施和性能测量方面拥有丰富的经验。Robyn 的职业生涯始于工业和质量工程领域，她将之前的教育和经验与对数据的热爱相结合，不断寻找构建具有稳定性能和最低维护要求的数据库系统的新方法。她是
    OakTable Network 的成员，并合著了两本关于 Oracle 的书籍：`Expert Oracle Practices` 和 `Pro Oracle
    SQL`（均为 Apress, 2010）。Robyn 偶尔会在 [http://adhdocddba.blogspot.com](http://adhdocddba.blogspot.com)
    上发布一些随机博客。


    ## Riyaj Shamsudeen

    ![images](images/square.jpg) `Riyaj Shamsudeen` 是 OraInternals 的首席数据库管理员兼总裁，这是一家专注于性能/恢复/EBS11i
    的咨询公司。他专精于真正应用集群、性能调优和数据库内部机制。他也经常在其博客 [http://orainternals.wordpress.com](http://orainternals.wordpress.com)
    上就这些技术领域发表文章。他还是许多国际会议（如 HOTSOS, COLLABORATE, RMOUG, SIOUG, UKOUG 等）的常驻演讲者。他是
    OakTable Network 的骄傲成员。他在使用 Oracle 技术产品方面拥有超过 16 年的经验，并有超过 15 年担任 Oracle/Oracle
    应用数据库管理员的经验。


    # 技术审稿人介绍


    ## Chris Beck

    ![images](images/square.jpg) `Chris Beck` 拥有罗格斯大学的计算机科学学位，并使用多种 DBMS 超过 20 年。过去
    16 年他一直在 Oracle 公司工作，目前是一名专注于核心数据库技术的首席技术专家。他是两项美国专利的共同发明人，这些软件方法学是现在被称为 Oracle
    Application Express 的基础。Chris 曾审阅过其他 Oracle 书籍，包括 Tom Kyte 的《`Expert One-On-One`》（Peer
    Information Inc., 2001）和《`Expert Oracle Database Architecture`》（Apress, 2005），他本人也是两本书的合著者：《`Beginning
    Oracle Programming`》（Wrox Press, 2005）和《`Mastering Oracle PL/SQL`》（Apress, 2005）。他与妻子
    Marta 和四个孩子居住在北弗吉尼亚州；不与家人共度时光时，他通常要么在浪费时间玩电子游戏，要么在看意甲足球。


    ## Mike Gangler

    ![images](images/square.jpg) `Mike Gangler` 是一名数据库专家和基础设施架构师，在数据处理行业拥有超过 30 年的经验，主要在大型企业信息系统项目中担任数据库技术负责人、系统分析师和
    DBA。作为底特律 Oracle 用户组和安娜堡 Oracle 用户组的前任主席，以及国际 Oracle 用户组董事会的创始成员，Mike 作为一位成就卓著且经过认证的
    Oracle DBA 和关系数据库专家获得了全球认可。


    ## Toon Koppelaars

    ![images](images/square.jpg) `Toon Koppelaars` 是 Oracle 技术的长期用户，自 1987 年（Oracle
    版本 4）起就开始使用 Oracle 数据库和工具软件。在此期间，他一直参与应用开发和数据库管理。他是一名 ACE 总监（数据库开发），并经常在 Oracle
    相关活动上演讲。他也是“赫尔辛基宣言（IT 版）”的提出者，该宣言描述了一种以数据库为中心的现代应用开发方法。他与 Lex de Haan 合著了《`Applied
    Mathematics for Database Professionals`》（Apress, 2007）。'
