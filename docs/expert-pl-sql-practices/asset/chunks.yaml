    `  -- precondition: test that record ready to process`

    `  assertpre(ready_to_process(rec1), ''REC1 ready to process'', l_module);`


    The answer as to whether this is OK or not is, it depends. Bertrand Meyer has
    this to say about it:


    > *If you exert the proper care by sticking to functions that are simple and self-evidently
    correct, the use of function routines in assertions can provide you with a powerful
    means of abstraction.*


    Bertrand Meyer, *Object-Oriented Software Construction*, Second Edition


    I love the phrase “simple and self-evidently correct” as it succinctly captures
    the essence of bug-free code. In my own programming, I have sometimes found that
    multiple modules within the same package may all reference and manipulate some
    private global data structures and all need to assert a common set of preconditions
    over these structures to guarantee correctness. In this case, implementing a function
    that combines these assertions together can eliminate significant code duplication.


    `FUNCTION check_all_ok(module_IN VARCHAR2) RETURN BOOLEAN`

    `IS`

    `BEGIN`

    `  assert(condition1, ''condition1'', module_IN);`

    `  assert(condition2, ''condition2'', module_IN);`

    `  …`

    `  assert(conditionN, ''conditionN'', module_IN);`


    `  RETURN TRUE;`

    `END check_all_ok;`


    As long as the conditions tested are themselves simple expressions limited to
    package variables or data structures and PL/SQL language primitives, such “check
    functions,” can be considered “simple and self-evidently correct” in that they
    can clearly only return TRUE or throw an ASSERTFAIL exception, the `check_all_ok`
    function can safely be asserted in the various modules that depend on it.


    `assertpre(check_all_ok(l_module), ''check_all_ok'', l_module);`


    Note that the local module name of the caller is passed into the `check_all_ok`
    function so that any ASSERTFAIL exceptions generated will be correctly tagged
    with the module name in which the check failed.


    ### Principles For Bug-Free Code


    This chapter has actually covered a considerable amount of material rapidly and
    with brevity. The references cited earlier near the beginning of the chapter can
    give you a much fuller treatment of the depth and richness of Design by Contract.
    I mentioned my attraction to contract-oriented programming is rooted in an abhorrence
    of bugs, especially those in my own code. Software contracts are purposed to eliminating
    ambiguity at software interfaces by being explicit about assumptions and expectations,
    and enforcing these directly in the code itself. Through these means an entire
    class of bugs can be pre-engineered out of programs—or at least exposed and dispatched
    quickly.


    The mechanism and techniques presented here do not by any means represent full
    support for Design by Contract in PL/SQL. In fact, Bertrand Meyer created an entire
    programming language called Eiffel and a development environment to support it,
    precisely because existing languages and tools were not entirely capable of fully
    supporting this paradigm. However, we must live with PL/SQL and do the best we
    can, and I have tried to present a practical approach to adopting the Design by
    Contract philosophy within a PL/SQL context.


    In wrapping up, I will briefly discuss a few contract-oriented principles for
    developing bug-free code.


    #### Assert Preconditions Rigorously


    PL/SQL programs typically execute their algorithms on simple or complex data structures
    passed to them via input parameter values or available to them as package global
    variables. They are no different than programs written in any other language in
    this respect. Program algorithms typically have very specific requirements about
    the data on which they execute and may very well fail or give unreliable results
    when those requirements are not met. These requirements are precisely what Design
    by Contract refers to as preconditions and enforcing precondition requirements
    rigorously is the first and best step that you can take to insuring that your
    algorithms will execute successfully every time. This probably sounds obvious,
    yet how many programs are written with detailed attention to identifying each
    and every assumption about the inputs that its algorithms make and documents them
    explicitly? And of these, how many actually enforce those requirements in the
    code itself, such that invalid inputs cannot get past the front door, so to speak?


    As mentioned several times already, many algorithms are not designed to operate
    on NULL inputs, or they employ special case code producing special case outputs
    where they are. Why not simply excise NULL values altogether and limit such programs
    to the straightforward cases they are designed for? This is not to say that NULL
    inputs can always be outlawed, but perhaps that is where contract negotiations
    should begin. If clients absolutely cannot comply then perhaps the precondition
    will need to be relaxed and the program adapted appropriately, but at least then
    you will know why it is the case.


    It is also good practice to tease out and explicitly enforce each separate precondition
    rather than overload multiple preconditions into one assertion. For instance,
    if two input parameters x and y are required to have non-NULL values and x must
    be greater than y, all three preconditions can be enforced with


    `assertpre(x > y,''x > y'', l_module)`


    This assertion will fail if either x or y (or both) is NULL; however, these requirements
    are not explicit in the assertion and must be inferred. Contract-orientation is
    about being explicit and precise, with no tolerance for inference and innuendo.
    So there should be three precondition assertions in this example.


    The previous example also illustrates a major benefit of assertions I have not
    emphasized so much, which is that they not only enforce but also document software
    contracts. If programmers writing code to use your modules can read the source,
    requirements for proper usage can be read directly from the preconditions.


    Require good inputs explicitly, and good outputs are much easier to guarantee.'
  trans: "\n# 函数返回布尔值且非空\n\n非空函数模式的一种特定情况是函数的 `RETURN` 数据类型为 `BOOLEAN`。这类函数可以安全地在条件语句中被引用，以实现强大且富有表现力的逻辑。\n\
    \n例如，假设存在一个过程，用于对某种类型 `my_rectype` 的记录执行某些复杂处理，但这些记录必须通过一些复杂的准则才能成功处理。这些准则实际上是处理过程的前置条件，或者可能是该过程不要求但程序逻辑希望强加的附加准则。这些准则可以封装在一个函数中，该函数的契约是测试这些准则并明确返回\
    \ `TRUE` 或 `FALSE`。\n\n```sql\nFUNCTION ready_to_process (rec1 my_rectype) RETURN\
    \ BOOLEAN;\n```\n\n执行记录处理的代码可能如下所示：\n\n```sql\nIF ready_to_process(rec1=>local_rec)\n\
    THEN\n  process_record(rec1=>local_rec);\nELSE\n  log_error;\nEND IF;\n```\n\n\
    再次强调，无需处理 `NULL` 函数输出，再加上富有表现力的函数名，使得此类代码的意图清晰明了。\n\n# 检查函数：返回真值或断言失败\n\n前面的例子引出了一个关于断言返回\
    \ `BOOLEAN` 值的函数真值的有趣考量。例如，`process_record` 过程是否应该将 `ready_to_process` 函数断言为一个前置条件？\n\
    \n```sql\nPROCEDURE process_record (rec1 my_rectype)\nIS\n    l_module VARCHAR2(30)\
    \ := 'PROCESS_RECORD';\nBEGIN\n  -- 前置条件：测试记录是否准备好处理\n  assertpre(ready_to_process(rec1),\
    \ 'REC1 ready to process', l_module);\n```\n\n这样做到底行不行，答案是“视情况而定”。Bertrand Meyer\
    \ 对此有如下论述：\n\n> *如果你通过坚持使用简单且不言自明的正确函数来施加适当的注意，那么在断言中使用函数例程可以为你提供一种强大的抽象手段。*\n\
    >\n> Bertrand Meyer, *《面向对象的软件构造》*, 第二版\n\n我非常喜欢“简单且不言自明的正确”这个短语，因为它精辟地抓住了无缺陷代码的本质。在我自己的编程实践中，我有时发现同一个包中的多个模块可能都引用并操作某些私有的全局数据结构，并且都需要对这些结构断言一组共同的前置条件以保证正确性。在这种情况下，实现一个将这些断言组合在一起的函数可以消除大量的代码重复。\n\
    \n```sql\nFUNCTION check_all_ok(module_IN VARCHAR2) RETURN BOOLEAN\nIS\nBEGIN\n\
    \  assert(condition1, 'condition1', module_IN);\n  assert(condition2, 'condition2',\
    \ module_IN);\n  …\n  assert(conditionN, 'conditionN', module_IN);\n\n  RETURN\
    \ TRUE;\nEND check_all_ok;\n```\n\n只要被测试的条件本身是局限于包变量或数据结构以及 `PL/SQL` 语言原语的简单表达式，那么这类“检查函数”就可以被认为是“简单且不言自明的正确”的，因为它们显然只能返回\
    \ `TRUE` 或抛出 `ASSERTFAIL` 异常。因此，`check_all_ok` 函数可以安全地在依赖它的各个模块中被断言。\n\n```sql\n\
    assertpre(check_all_ok(l_module), 'check_all_ok', l_module);\n```\n\n请注意，调用者的本地模块名称被传递给\
    \ `check_all_ok` 函数，这样生成的任何 `ASSERTFAIL` 异常都将被正确地标记上检查失败所在的模块名称。\n\n## 无缺陷代码的原则\n\
    \n本章实际上已经快速而简洁地涵盖了大量内容。本章开头附近引用的参考文献可以让你更全面地了解契约式设计的深度和丰富性。我提到自己对契约式编程的吸引力植根于对缺陷（尤其是我自己代码中的缺陷）的厌恶。软件契约的目的是通过明确假设和期望，并在代码本身中直接强制执行这些假设和期望，来消除软件接口的歧义。通过这些手段，一整类缺陷可以在程序中预先设计排除——或者至少被迅速暴露和处理。\n\
    \n这里介绍的机制和技术绝不意味着在 `PL/SQL` 中提供了对契约式设计的完整支持。事实上，Bertrand Meyer 创造了一种名为 Eiffel\
    \ 的完整编程语言及其开发环境来支持它，正是因为现有的语言和工具不能完全支持这种范式。然而，我们必须与 `PL/SQL` 共存并尽力而为，我尝试提出了一种在\
    \ `PL/SQL` 环境中采用契约式设计哲学的实用方法。\n\n在结束之际，我将简要讨论几个用于开发无缺陷代码的契约式原则。\n\n### 严格断言前置条件\n\
    \n`PL/SQL` 程序通常在通过输入参数值传递给它们的或作为包全局变量可用的简单或复杂数据结构上执行其算法。在这方面，它们与其他任何语言编写的程序并无不同。程序算法通常对它们所操作的数据有非常具体的要求，当这些要求未得到满足时，算法很可能会失败或给出不可靠的结果。这些要求正是契约式设计所指的前置条件，严格强制执行前置条件要求是确保你的算法每次都能成功执行的首要且最佳步骤。这听起来可能显而易见，但是，有多少程序在编写时会详细关注识别其算法对输入的每一个假设，并明确地将它们记录下来？而在这些程序中，又有多少会在代码本身中实际强制执行这些要求，使得无效输入无法进入核心部分，可以这么说？\n\
    \n正如已经多次提到的，许多算法并非设计为在 `NULL` 输入上运行，或者当遇到 `NULL` 输入时，它们会采用特殊情形代码产生特殊情形输出。为什么不干脆完全排除\
    \ `NULL` 值，将这些程序限制在它们所设计的简单情形中呢？这并不是说 `NULL` 输入总是可以禁止的，但这也许正是契约谈判应该开始的地方。如果客户端确实无法遵守，那么可能需要放宽前置条件，并相应地调整程序，但至少那样你会知道原因所在。\n\
    \n另一个好的实践是梳理并明确强制执行每一个单独的前置条件，而不是将多个前置条件叠加在一个断言中。例如，如果两个输入参数 `x` 和 `y` 被要求具有非\
    \ `NULL` 值，并且 `x` 必须大于 `y`，那么所有这三个前置条件都可以用\n\n```sql\nassertpre(x > y,'x > y',\
    \ l_module)\n```\n\n来强制执行。如果 `x` 或 `y`（或两者都是）为 `NULL`，此断言将失败；然而，这些要求在断言中并不明确，必须被推断出来。契约式设计的核心在于明确和精确，不容忍推断和影射。因此，在这个例子中应该有三个前置断言。\n\
    \n前面的例子也说明了断言的一个我尚未强调的主要好处，即它们不仅强制执行，而且记录了软件契约。编写代码使用你的模块的程序员如果能够阅读源代码，就可以直接从前置条件中读取正确使用的要求。\n\
    \n明确要求良好的输入，那么良好的输出就更容易保证。\n"
- fmt: '#### Modularize Ruthlessly


    Having required of callers that they provide good inputs and enforced these requirements
    in your code, your modules are obliged to produce correct outputs. Programs with
    hundreds or thousands of lines of code making many transformations to data structures
    are difficult or impossible to verify for correctness. However, compact computational
    units with very specific algorithms over well understood and verified data structures
    may actually have the property of being “self-evidently correct.” This can only
    be achieved through modularization, which is to say breaking large and complex
    computations down into smaller and smaller self-contained computational sub-components,
    and then stringing these together to achieve the larger goals. Each sub-component
    should be algorithmically as simple as possible, such that confidence in its correctness
    can be gained through inspection and a minimum of mental gymnastics.


    Note that modularizing code may not always mean breaking it into independent executable
    modules; it could be organizing a single large program into a set of sub-transformations
    that progressively develop intended outputs from supplied inputs. In these cases,
    you will want to make assertions on intermediate computational states as one sub-transformation
    ends and another begins.


    By modularizing your code into more and smaller components, you create more interfaces
    and more opportunities to express contracts. If you adhere to the first principle
    of rigorous precondition testing, this means there will be more and more assertions
    built into your code, protecting the contractual requirements of all these interfaces.
    Each of these assertions is a correctness test executed at runtime: your code
    becomes hardened like tempered steel in the fire of assertions. How can bugs possibly
    survive?


    Simple and self-evidently correct algorithms operating on trusted data is the
    virtuous path to bug-free code.


    #### Adopt Function-Based Interfaces


    Having adopted the first two principles, what should your simple and self-evidently
    correct modules look like? Functions offer distinct advantages to enforcing contracts
    whenever modules must pass computational results back to callers. These advantages
    were alluded to earlier but are worth reiterating.


    *   Functions provide a single output and are thus consistent with singularity
    of purpose.

    *   Functions can be written such that postcondition assertions can be located
    precisely, immediately preceding the `RETURN` statement.

    *   Functions can be used interchangeably with variables or conditional tests
    such that highly compact and expressive code is possible, especially when they
    assert `NON NULL` postconditions.


    This is not to say procedures do not have their place and that you should avoid
    them. However, much of the PL/SQL code I have seen is procedure-heavy and function-light.
    When requirements are such that specific input data is computationally transformed
    and some output data returned, function-based interfaces offer better opportunities
    to adopt a rigorous contract orientation.


    #### Crash on ASSERTFAIL


    In Design by Contract, assertion failures signal bugs, period. Programs that catch
    `ASSERTFAIL` exceptions and handle them in some way that masks or hides their
    occurrence are effectively lying about what is going on: a correctness bug has
    been identified yet it is not being reported. Better to allow the program to crash
    and use the diagnostic information provided in the exception message to find and
    fix the bug.


    In the words of Andy Hunt and Dave Thomas (see References above):


    > *Dead Programs Tell No Lies*


    If you do find yourself compelled to catch and handle `ASSERTFAIL` because correct
    computation can proceed in spite of it, then perhaps there are contract issues
    to iron out. Contract-orientation does not mean exercising dictatorial control
    over client modules through non-negotiable preconditions. Contracts are an agreement
    between two parties, and the terms need to be acceptable on both sides. So, rather
    than catching and handling `ASSERTFAIL`, it is much better to renegotiate contracts
    wherever possible.


    #### Regression Test Your Postconditions


    Much emphasis has been placed on rigorous assertion of preconditions and far less
    on postconditions. The requirement to absolutely guarantee output correctness
    given the preconditions can be difficult at best in most cases, and in some almost
    impossible. The example provided by the function `even` is unusual, where having
    an alternative algorithm for the complementary function `odd` provides a means
    of asserting output correctness. And even when possible, the computational cost
    of asserting complete postcondition correctness is likely to effectively double
    the cost of computing the output itself.


    However, there is a common case in which correct outputs for given inputs is well
    known, and that is unit testing. Typical unit testing consists of matching program
    outputs to well-known expected results under specific sets of inputs. This effectively
    amounts to asserting that the program has met postconditions given these inputs.
    So hopefully if you are doing production-level PL/SQL programming, you have a
    testing framework in place and are validating correctness of your modules through
    regular regression testing.


    One caveat here is that only externally declared modules can be regression tested.
    A possible workaround is to have two versions of the package specification: one
    that exposes only the modules intended for external use and another that exposes
    internal modules as well for regression tests. Both versions should, of course,
    use the same package body, and great care must be taken not to diverge the specifications
    except in the modules declared. It’s not ideal, but it is possible.'
