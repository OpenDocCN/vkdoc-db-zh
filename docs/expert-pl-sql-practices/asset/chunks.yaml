    the truth-value of functions that return BOOLEAN. For instance, should the process_record
    procedure assert the `ready_to_process` function as a precondition?


    `PROCEDURE process_record (rec1 my_rectype)`

    `IS`

    `    l_module VARCHAR2(30) := ''PROCESS_RECORD'';`

