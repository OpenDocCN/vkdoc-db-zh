    \ statement and reusing it multiple times.\n\nBecause the majority of templates\
    \ included multiple types of INSERT statements, Oracle 11g unfortunately would\
    \ not help at all in this case. However, switching from EXECUTE IMMEDIATE to DBMS_SQL\
    \ sounded promising and I made the appropriate changes.\n\nThe first step was\
    \ to prepare INSERT statements, assign each one its own DBMS_SQL cursor (already\
    \ parsed), and store these cursors in the associative array for future access\
    \ as shown here:\n\n`DECLARE`\n`    TYPE integer_tt IS TABLE OF integer;`\n`    v_cur_tt\
    \ integer_tt;`\n`    ...`\n`BEGIN`\n`    ...`\n`    FOR r IN v_groupRow_tt.first..v_groupRow_tt.last\
    \ LOOP`\n**`        v_cur_tt(r):=dbms_sql.open_cursor;`**\n`        FOR c IN c_cols(v_groupRow_tt(r))\
    \ LOOP`\n`            FOR i IN v_header_tt.first..v_header_tt.last LOOP`\n`                IF\
    \ v_header_tt(i).text=c.name_tx THEN`\n`                    v_col_tt(i):=c;`\n\
    `                    v_columnRow_tt(r||'|'||v_col_tt(i).name_tx):=v_col_tt(i).viewcol_tx;`\n\
    `                    v_col_tx:=v_col_tx||','||v_col_tt(i).viewcol_tx;`\n`                    v_val_tx:=v_val_tx||',:'||v_col_tt(i).viewcol_tx;`\n\
    `                END IF;`\n`            END LOOP;`\n`        END LOOP;`\n`        v_sql_tx:='INSERT\
    \ INTO '||v_map_rec.view_tx||                        '('||v_col_tx||') VALUES('||v_val_tx||')';`\n\
    **`        dbms_sql.parse(v_cur_tt(r),v_sql_tx,dbms_sql.native);`**\n`    END\
    \ LOOP;`\n\nNow it is only necessary to spin through all of the rows of the uploaded\
    \ file, find the appropriate row type (from the array) and bind variables, and\
    \ fire the INSERT statement.\n\n`    FOR i IN 2..v_row_tt.count LOOP -- first\
    \ row is a header`\n`        FOR r IN v_groupRow_tt.first..v_groupRow_tt.last\
    \ LOOP`\n`            FOR c IN v_col_tt.first..v_col_tt.last LOOP`\n`                IF\
    \ v_columnRow_tt.exists(r||'|'||v_col_tt(c).name_tx)THEN`\n**`                    dbms_sql.bind_variable`**\n\
    **`                         (v_cur_tt(r),':'||v_col_tt(c).viewcol_tx, v_data_tt(c).text);`**\n\
    `                END IF;`\n`            END LOOP;`\n**`            v_nr:=dbms_sql.execute(v_cur_tt(r));`**\n\
    `        END LOOP;`\n`    END LOOP;`\n`    …`\n`END;`\n\nImagine my surprise when\
    \ the total processing time for a set of 60,000 rows dropped by a factor of 50!\
    \ This definitely made the users happy.\n\nThis example perfectly illustrates\
    \ the complexity of system tuning. It can't simply be narrowed down to low-level\
    \ technical analysis, but must always include a global vision of what is expected\
    \ to happen. Only this approach to performance optimization can guarantee that\
    \ the selected options will be valid here and now. There is just no such thing\
    \ as a general best approach—only special cases.\n\n### Object Dependencies\n\n\
    The third major concern (after security and performance) when using Dynamic SQL\
    \ is based on the fact that converting a hardcoded solution into a dynamic one\
    \ causes Oracle to lose track of object dependencies between different database\
    \ objects. This argument is very hard to dispute since there is a significant\
    \ piece of “free” information automatically collected at the compilation state\
    \ that is just not there anymore. The real question remains: What exactly is the\
    \ impact of not having such information about the system development process?\n\
    \n#### Negative Effects\n\nIt is clear that less available data is not good. But\
    \ in a lot of cases, it's possible to get the same information from slightly different\
    \ sources. Let's examine what options are available. The following are some negative\
    \ effects from losing the record of object dependencies in your code.\n\n#####\
    \ There is No Dependency Path to Follow Up\n\nThe only clean way to be able to\
    \ document object dependencies is to use repository-based solutions with one (and\
    \ only one) way of generating code from them. Also, I strongly recommended that\
    \ you model a repository in a similar way to that of Oracle's data dictionary.\
    \ It is nice to have tables, columns, and PL/SQL objects explicitly referenced\
    \ and not hidden deep in the text. Now the whole dependency problem is limited\
    \ to comparing the Oracle data dictionary with your own, which should not be a\
    \ big problem.\n\nThe requirement to use a single method of code generation is\
    \ also critical because this provides 100% predictability. Since there is one\
    \ and only one way of transforming a repository into code, everything follows\
    \ the same pattern and it is impossible to encounter unexpected dependencies.\n\
    \n##### There is No Way to Determine Exactly What Will be Executed\n\nSince many\
    \ parameters are either user-entered or constructed on the fly, it's very difficult\
    \ to predict possible syntax errors without actually encountering them. This problem\
    \ is much more difficult to solve, but the concept of *samplers* can be very efficient.\
    \ Here are some approaches you can take to get a grip on what exactly will be\
    \ executed:\n\n*   Generate all possible (or as many as possible) permutations\
    \ of the code to be executed and create PL/SQL modules with that code. This approach\
    \ can help to identify any initial code problems.\n*   Record all dependencies\
    \ and keep a simple module that references the same set of objects.\n*   If the\
    \ sample becomes invalid, this is an indication of code problems.\n\n#### Positive\
    \ Effects\n\nAny feature (including losing object dependencies) can be used in\
    \ a good way. A few examples follow showing how the lack of dependency information\
    \ can actually work to your advantage."
  trans: "\n\n#### 比较动态 SQL 的不同实现\n\n由于动态 SQL 存在不同的实现方式，哪种类型会更高效呢？接下来这个实际案例将说明为什么你需要了解\
    \ `DBMS_SQL` 包。这个任务的起因是终端用户希望系统能够根据一系列预定义的模板上传 CSV 文件。以下是该系统的一些需求和特点：\n\n*   文件前缀定义了模板类型。列标题直接映射到表列（如果标题未注册，则将被忽略）。\n\
    *   文件中的一行代表一个包含 1 到 N 行的逻辑组。例如，一行可能同时包含操作记录和修正记录（你可以将其视为销售交易和取消交易——两者关联但独立）。\n\
    *   必须支持组级别验证。规则适用于整组行，而非每一次插入。\n\n该解决方案最初的实现方式非常直接：读取一行，使用标题信息构建一个文本字符串形式的 `INSERT`\
    \ 语句，然后执行 `EXECUTE IMMEDIATE` 命令。但当面对真实的数据量（单个文件超过 1 万行）时，数据库管理员开始抱怨 CPU 负载过高。同时，早期采用者也抱怨该模块的性能远低于最初预期（并且随着文件增大而恶化）。经过详细的数据库追踪，问题变得清晰：所有额外耗费的时间都源于解析\
    \ `INSERT` 语句。\n\n请记住以下关于解析的信息：\n\n*   不带绑定变量的 `EXECUTE IMMEDIATE`：N 次调用对应 N 次硬解析\n\
    *   带绑定变量的 `EXECUTE IMMEDIATE`：\n    *   10g 及以下版本：N 次调用对应 1 次硬解析 + N-1 次软解析\n\
    \    *   11g：仅当重复执行相同语句时，才进行一次硬解析。这是一种内部优化（不可见），并且如果存在多种调用类型，则不会生效。\n*   `DBMS_SQL`\
    \ 将解析和执行阶段分离：对于每种调用类型仅需一次硬解析，因为 `DBMS_SQL` 允许存储已解析的语句并多次复用。\n\n由于大多数模板包含多种类型的\
    \ `INSERT` 语句，不幸的是 Oracle 11g 在这种情况下完全帮不上忙。然而，从 `EXECUTE IMMEDIATE` 切换到 `DBMS_SQL`\
    \ 看起来很有希望，于是我进行了相应的修改。\n\n第一步是准备 `INSERT` 语句，为每条语句分配自己的 `DBMS_SQL` 游标（已解析），并将这些游标存储在关联数组中以便后续访问，如下所示：\n\
    \n```\nDECLARE\n    TYPE integer_tt IS TABLE OF integer;\n    v_cur_tt integer_tt;\n\
    \    ...\nBEGIN\n    ...\n    FOR r IN v_groupRow_tt.first..v_groupRow_tt.last\
    \ LOOP\n        v_cur_tt(r):=dbms_sql.open_cursor;\n        FOR c IN c_cols(v_groupRow_tt(r))\
    \ LOOP\n            FOR i IN v_header_tt.first..v_header_tt.last LOOP\n      \
    \          IF v_header_tt(i).text=c.name_tx THEN\n                    v_col_tt(i):=c;\n\
    \                    v_columnRow_tt(r||'|'||v_col_tt(i).name_tx):=v_col_tt(i).viewcol_tx;\n\
    \                    v_col_tx:=v_col_tx||','||v_col_tt(i).viewcol_tx;\n      \
    \              v_val_tx:=v_val_tx||',:'||v_col_tt(i).viewcol_tx;\n           \
    \     END IF;\n            END LOOP;\n        END LOOP;\n        v_sql_tx:='INSERT\
    \ INTO '||v_map_rec.view_tx||'('||v_col_tx||') VALUES('||v_val_tx||')';\n    \
    \    dbms_sql.parse(v_cur_tt(r),v_sql_tx,dbms_sql.native);\n    END LOOP;\n```\n\
    \n现在只需遍历上传文件的所有行，找到对应的行类型（从数组中），绑定变量，然后执行 `INSERT` 语句。\n\n```\n    FOR i IN 2..v_row_tt.count\
    \ LOOP -- first row is a header\n        FOR r IN v_groupRow_tt.first..v_groupRow_tt.last\
    \ LOOP\n            FOR c IN v_col_tt.first..v_col_tt.last LOOP\n            \
    \    IF v_columnRow_tt.exists(r||'|'||v_col_tt(c).name_tx)THEN\n             \
    \       dbms_sql.bind_variable\n                         (v_cur_tt(r),':'||v_col_tt(c).viewcol_tx,\
    \ v_data_tt(c).text);\n                END IF;\n            END LOOP;\n      \
    \      v_nr:=dbms_sql.execute(v_cur_tt(r));\n        END LOOP;\n    END LOOP;\n\
    \    …\nEND;\n```\n\n想象一下，当处理 6 万行数据集的总时间降低了 50 倍时，我是多么惊讶！这无疑让用户们非常高兴。\n\n这个例子完美地说明了系统调优的复杂性。它不能简单地归结为底层技术分析，而必须始终包含对预期结果的全局视角。只有这种性能优化方法才能保证所选方案在此时此地是有效的。根本不存在普遍适用的最佳方法——只有特定情况下的最优解。\n\
    \n### 对象依赖性\n\n使用动态 SQL 时，第三个主要顾虑（仅次于安全性和性能）源于将硬编码解决方案转换为动态方案会导致 Oracle 无法追踪不同数据库对象之间的依赖关系。这个论点很难反驳，因为在编译阶段自动收集的大量“免费”信息确实不复存在了。真正的问题在于：缺少这种信息对系统开发过程究竟有何具体影响？\n\
    \n#### 负面影响\n\n显然，可用数据减少并非好事。但在许多情况下，可以从略有不同的来源获取相同信息。让我们看看有哪些可用选项。以下是代码中丢失对象依赖记录可能导致的一些负面影响。\n\
    \n##### 没有依赖路径可追踪\n\n能够清晰记录对象依赖性的唯一可靠方法是使用基于代码库的解决方案，并且只使用一种（且唯一一种）从其生成代码的方式。此外，我强烈建议你以类似于\
    \ Oracle 数据字典的方式对代码库进行建模。将表、列和 PL/SQL 对象显式引用，而不是深埋在文本中，是很好的做法。这样一来，整个依赖性问题就简化为将\
    \ Oracle 数据字典与你自己的进行比较，这应该不是什么大问题。\n\n使用单一代码生成方法的需求也至关重要，因为它提供了 100% 的可预测性。由于将代码库转换为代码只有一种且唯一一种方式，所有操作都遵循相同的模式，不可能遇到意外的依赖关系。\n\
    \n##### 无法确定实际执行内容\n\n由于许多参数要么由用户输入，要么是动态构建的，如果不实际遇到，很难预测可能的语法错误。这个问题更难解决，但“采样器”概念可能非常有效。以下是一些你可以采取的方法来掌控实际将执行的内容：\n\
    \n*   生成所有可能（或尽可能多）的待执行代码排列组合，并用这些代码创建 PL/SQL 模块。此方法有助于识别初始代码问题。\n*   记录所有依赖关系，并保留一个引用相同对象集的简单模块。\n\
    *   如果采样模块变为无效状态，则表明代码存在问题。\n\n#### 正面影响\n\n任何特性（包括丢失对象依赖性）都可以被善用。以下是一些例子，说明缺乏依赖信息实际上如何能为你所用。\n\
    \n"
- fmt: "# PL/SQL and Parallel Processing\n\n## You Can Reference Objects Not Yet in\
    \ the Database\n\nIf you have a separate generated procedure for each month (i.e.\
    \ the year and the month are parts of the procedure name), it's easier to create\
    \ a universal wrapper instead of writing a huge case statement. The following\
    \ is an example of such a wrapper:\n\n```sql\nCREATE PROCEDURE p_runMonthly(i_dt\
    \ date)\nis\n    v_sql_tx VARCHAR2(256):='BEGIN p_run_'||to_char(i_dt,'YYYYMM')||';\
    \ END;';\nBEGIN\n    EXECUTE IMMEDIATE v_sql_tx;\nEND;\n```\n\nEven better, this\
    \ universal caller does not require any maintenance when you have to add yet another\
    \ table to the list of existing ones. Of course, one could argue about the safety\
    \ of building the logic on uniform naming patterns, but I have seen implementations\
    \ of this type too often. Each time, creating a new object causes significant\
    \ stress for the personnel involved, unless all references are wrapped into Dynamic\
    \ SQL.\n\n## Insulate Your Code from Invalidated Dependencies\n\nSometimes having\
    \ dependencies is not a good thing for a number of reasons:\n\n*   `Code generators`:\
    \ If you wrap a call to the generated modules into Dynamic SQL, you can refresh\
    \ these modules without invalidating all dependencies. This can be critical when\
    \ using JDBC connections to the database, since they are significantly less forgiving\
    \ (in comparison to Net8 calls).\n*   `Remote objects`: Since your maintenance\
    \ cycle may not be the same as that of other teams involved in your project, there\
    \ is a chance that you could reference objects via database links while they are\
    \ inaccessible or invalid. In that case, the only safe way out is to wrap all\
    \ remote calls into dynamic SQL.\n*   `Logical loops`: Even though it is very\
    \ difficult, you could create a case where a chain of object references cycles\
    \ itself. In that case, the only solution is to make one step a Dynamic SQL module.\n\
    \n### Summary\n\nOverall, the material covered in this chapter shows that you\
    \ should not be scared to depart from the tried and tested ways of server-side\
    \ application development. Of course, there will still be a reasonable learning\
    \ curve and hidden traps, but the gains from applying more advanced techniques\
    \ (such as Dynamic SQL) are enormous and include the following:\n\n*   Developers\
    \ can achieve better code flexibility and sustainability.\n*   Architects can\
    \ build solutions requiring higher level of abstractions, including repositories\
    \ and code generators.\n*   Administrators can get more detailed control over\
    \ existing systems and improve code manageability.\n\nAll of these positive effects\
    \ ultimately lead to the conclusion that it is possible to build contemporary\
    \ IT projects “better, faster, cheaper” (and now I promise to repeat the same\
    \ story even off-stage!). You just need to have the right tools and accept the\
    \ fact that unless you handle the unknown, it will handle you—against your will.\n\
    \n# C H A P T E R  3\n\n## PL/SQL and Parallel Processing\n\nby `Dominic Delmolino`\n\
    \nImagine if you went to the grocery store and only one person was allowed in\
    \ at a time. Everyone else had to wait outside in a long line until each individual\
    \ completed their trip before entering the store. Even worse, image if you were\
    \ only allowed to buy one item while inside the store. If you needed multiple\
    \ items, you were required to get back in line outside of the store for each one.\n\
    \nThis example of one-at-a-time activity is called `serial processing`, and while\
    \ it's possible to speed this activity up, perhaps by giving each shopper roller\
    \ skates so they move through the store faster, or by allowing them to take a\
    \ cart inside and pick out multiple items, it's still constrained by the design\
    \ of only letting one person shop at a time.\n\nThank goodness most stores use\
    \ `parallel processing`—the ability to let more than one activity happen at the\
    \ same time. By allowing many people to shop at the same time, stores process\
    \ many more orders in every given day. As long as each shopper is buying a different\
    \ item, their activities are unique and independent—which makes them perfect for\
    \ parallel processing. In fact, there are only a few times where this activity\
    \ needs to be serialized—usually when two or more people want to buy the same\
    \ item off of a shelf. At that point the shoppers need to `coordinate` their activities\
    \ by negotiating who gets the item.\n\nParallel processing activities are common\
    \ in nature and society; we've all see armies of insects and schools of fish divide\
    \ and conquer amazingly large tasks. Large data processing tasks are becoming\
    \ more common as the cost of collecting and storing information keeps getting\
    \ less and less expensive. As companies start to accumulate vast amounts of data,\
    \ they are turning to parallel processing options as ways to analyze and deal\
    \ with data across many processors and machines. A parallel programming technique\
    \ called `MapReduce` has gained popularity as a method for generically building\
    \ programs that can run in parallel. In this chapter, you'll explore these divide\
    \ and conquer techniques and apply them to database activities using PL/SQL. By\
    \ the end of this chapter, you'll be able to write your own parallel `MapReduce`\
    \ programs using PL/SQL and parallel pipelined functions. But first let's dive\
    \ into the history of parallel processing.\n\n### Why Parallel Processing?\n\n\
    In a word: speed. All of us want things to go faster, jobs to complete more quickly,\
    \ to get answers on demand. And while computers have been getting faster and faster,\
    \ doubling their number of circuits, increasing their clock speeds, and adding\
    \ more and more on-chip capabilities, we're still not satisfied. As we encounter\
    \ physical limitations on how fast individual processors can be, we start to look\
    \ for other ways to speed up our programs.\n\nIt would be nice if computers could\
    \ automatically figure out ways to divide problems into smaller parts and run\
    \ procedures on those smaller parts in parallel. There has been significant research\
    \ in automatic identification of parallelism, but it turns out that it's really\
    \ hard for computers to understand where opportunities for parallelism can be\
    \ applied. Attempts have been made to write compliers that can take high-level\
    \ programming languages and generate explicitly parallel instruction streams for\
    \ CPUs, but there hasn't been much success in this area, leaving us with the need\
    \ to manually design parallel processing strategies on our own.\n\nThe good news\
    \ is that when properly implemented, parallel processing techniques provide us\
    \ with several benefits beyond simple speedup, including the following:\n\n* \
    \  Better system utilization in that all processors within a multi-processor system\
    \ can be applied to a task.\n*   Removal of an all-or-nothing procedure, allowing\
    \ for partial completion in case some sub-tasks fail.\n*   Ability to handle larger\
    \ and larger data sets in a fixed amount of time, as opposed to simply speeding\
    \ up a fixed data set into a smaller amount of time.\n\nIt turns out that these\
    \ benefits are often worth the overhead and hard work required to design and implement\
    \ parallel procedures."
