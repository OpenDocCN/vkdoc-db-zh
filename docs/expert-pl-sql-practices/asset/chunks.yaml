    you the number of occurrences and the total time spent on that line (including
    calls to called program units). The max time is the longest time spent on any
    particular call. Using this information, you should be able to get a good feel
    of where you would begin your investigation into any performance issues.


    While the performance metrics are great, it would be better if you knew the context,
    or call hierarchy, of the times. DBMS_TRACE does not quite give you that, but
    it does give you the call structure. To view the executed code hierarchy (remember
    that this is the actual execution, not the expected or possible execution), you
    can run the following very simple query:


    `SELECT event_unit, event_proc_name,`

    `       CASE`

    `         WHEN proc_unit IS NOT NULL and proc_name IS NOT NULL`

    `           THEN proc_unit || ''.'' || proc_name || ''('' || proc_line || '')''`

    `         WHEN proc_unit IS NULL and proc_name IS NOT NULL`

    `           THEN proc_name || ''('' || proc_line || '')''`

    `         ELSE`

    `           substr(event_comment,1,30)`

    `       END executed_code`

    `FROM plsql_trace_events pse`

    `WHERE runid = :RUNID`

    ` AND event_unit NOT IN (''<anonymous>'', ''DBMS_TRACE'')`

    ` AND event_kind NOT IN (50, 51)`

    `ORDER BY event_seq;`


    `EVENT_UNIT        EVENT_PROC_NAME                 EXECUTED_CODE`

    `---------------- ------------------------------- ------------------------------------------`

    `EMPLOYEE_API      CREATE_EMPLOYEE                 DEPARTMENTS_API.DEPARTMENT_EXISTS(3)`

    `DEPARTMENTS_API   DEPARTMENT_EXISTS               SELECT DEPARTMENT_ID FROM DEPA`

    `EMPLOYEE_API      CREATE_EMPLOYEE                 JOBS_API.JOB_EXISTS(3)`

    `JOBS_API          JOB_EXISTS                      SELECT JOB_ID FROM JOBS WHERE`

    `EMPLOYEE_API      CREATE_EMPLOYEE                 JOBS_API.VALIDATE_JOB(21)`

    `EMPLOYEE_API      CREATE_EMPLOYEE                 DEPARTMENTS_API.DEPARTMENT_MANAGER_ID(29)`

    `DEPARTMENTS_API   DEPARTMENT_MANAGER_ID           SELECT MANAGER_ID FROM DEPARTM`

    `EMPLOYEE_API      CREATE_EMPLOYEE                 Select EMPLOYEES_SEQ.NEXTVAL
    f`

    `EMPLOYEE_API      CREATE_EMPLOYEE                 INSERT INTO EMPLOYEES (EMPLOYE`

    `EMPLOYEE_API      CREATE_EMPLOYEE                 EMPLOYEE_API.ASSIGN_SALARY(74)`

    `EMPLOYEE_API      ASSIGN_SALARY                   UPDATE EMPLOYEES SET SALARY
    =`


    ` 11 rows selected`


    This listing (and query) provides the order of execution from the run. EMLOYEE_API.CREATE_EMPLOYEE
    called DEPARTMENTS_API.DEPARTMENT_EXISTS (which is defined on line 3 in the DEPARTMENTS_API
    package body). The called program unit then ran a query before returning.


    DBMS_TRACE can be very verbose. The examples I am using in this section are fairly
    simple and back office-ish. When you have very large applications or applications
    that run for a while and call the same program units over and over, the value
    of DBMS_TRACE starts to drop off as the complexity increases. For example, there
    is a demo procedure provided for this chapter called TEST_CALLS_PRC. It is a simple
    `for` loop (100 iterations) that calls two procedures for each iteration. Using
    DBMS_TRACE and DBMS_PROFILER with the same options that I used earlier, compare
    the differences in number of rows (the lower RUNID is the trace seen earlier for
    both counts). The following query compares the number of output lines produced
    between the two runs by DBMS_PROFILER:


    `SELECT ppd.runid, count(*)`

    `  FROM plsql_profiler_units ppu`

    `  JOIN plsql_profiler_data ppd`

    `    ON(ppu.runid = ppd.runid`

    `    AND ppu.unit_number = ppd.unit_number)`

    `  WHERE ppu.runid IN (9,10)`

    `    AND ppd.total_time != 0`

    `    AND unit_type != ''ANONYMOUS BLOCK''`

    `  GROUP BY ppd.runid;`


    `RUNID                  COUNT(*)`

    `---------------------- ----------------------`

    `9                      29`

    `10                     15`


    The next query produces the same line counts but for two DBMS_TRACE sessions:


    `  SELECT runid, count(*)`

    `    FROM plsql_trace_events`

    `    WHERE runid IN (12,13)`

    `    GROUP BY runid;`


    `RUNID                  COUNT(*)`

    `---------------------- ----------------------`

    `12                     100`

    `13                     5545`


    DBMS_PROFILER has fewer rows for the less complex code but DBMS_TRACE has many,
    many more rows. When writing queries against the DBMS_TRACE tables, you need to
    account for that. Use the options to gather only the data you really want and
    then plan to be creative on filtering out those things you don''t want but can''t
    option out of.'
  trans: "\n此列表显示了每个被分析程序单元中执行的代码行。它提供了该行的执行次数以及在该行花费的总时间（包括对被调用程序单元的调用）。`max time`\
    \ 是在任何特定调用上花费的最长时间。利用这些信息，你应该能够很好地了解从何处开始调查任何性能问题。\n\n## 使用 DBMS_TRACE 查看调用层次\n\
    \n虽然性能指标很棒，但如果你能知道这些时间数据的上下文或调用层次结构，那将会更好。`DBMS_TRACE` 并不能完全提供这个，但它确实提供了调用结构。要查看已执行代码的层次结构（请记住，这是实际的执行，而非预期的或可能的执行），你可以运行以下这个非常简单的查询：\n\
    \n```sql\nSELECT event_unit, event_proc_name,\n       CASE\n         WHEN proc_unit\
    \ IS NOT NULL and proc_name IS NOT NULL\n           THEN proc_unit || '.' || proc_name\
    \ || '(' || proc_line || ')'\n         WHEN proc_unit IS NULL and proc_name IS\
    \ NOT NULL\n           THEN proc_name || '(' || proc_line || ')'\n         ELSE\n\
    \           substr(event_comment,1,30)\n       END executed_code\nFROM plsql_trace_events\
    \ pse\nWHERE runid = :RUNID\n  AND event_unit NOT IN ('<anonymous>', 'DBMS_TRACE')\n\
    \  AND event_kind NOT IN (50, 51)\nORDER BY event_seq;\n```\n\n```\nEVENT_UNIT\
    \        EVENT_PROC_NAME                 EXECUTED_CODE\n---------------- -------------------------------\
    \ ------------------------------------------\nEMPLOYEE_API      CREATE_EMPLOYEE\
    \                 DEPARTMENTS_API.DEPARTMENT_EXISTS(3)\nDEPARTMENTS_API   DEPARTMENT_EXISTS\
    \               SELECT DEPARTMENT_ID FROM DEPA\nEMPLOYEE_API      CREATE_EMPLOYEE\
    \                 JOBS_API.JOB_EXISTS(3)\nJOBS_API          JOB_EXISTS       \
    \               SELECT JOB_ID FROM JOBS WHERE\nEMPLOYEE_API      CREATE_EMPLOYEE\
    \                 JOBS_API.VALIDATE_JOB(21)\nEMPLOYEE_API      CREATE_EMPLOYEE\
    \                 DEPARTMENTS_API.DEPARTMENT_MANAGER_ID(29)\nDEPARTMENTS_API \
    \  DEPARTMENT_MANAGER_ID           SELECT MANAGER_ID FROM DEPARTM\nEMPLOYEE_API\
    \      CREATE_EMPLOYEE                 Select EMPLOYEES_SEQ.NEXTVAL f\nEMPLOYEE_API\
    \      CREATE_EMPLOYEE                 INSERT INTO EMPLOYEES (EMPLOYE\nEMPLOYEE_API\
    \      CREATE_EMPLOYEE                 EMPLOYEE_API.ASSIGN_SALARY(74)\nEMPLOYEE_API\
    \      ASSIGN_SALARY                   UPDATE EMPLOYEES SET SALARY =\n\n 11 rows\
    \ selected\n```\n\n此列表（以及查询）提供了从本次运行中得到的执行顺序。`EMLOYEE_API.CREATE_EMPLOYEE` 调用了\
    \ `DEPARTMENTS_API.DEPARTMENT_EXISTS`（它在 `DEPARTMENTS_API` 包体中定义于第 3 行）。被调用的程序单元在返回前运行了一个查询。\n\
    \n## 可扩展性考量：DBMS_TRACE 与 DBMS_PROFILER\n\n`DBMS_TRACE` 可能会产生非常冗长的输出。本节中我使用的示例相当简单，属于后台办公类应用。当你拥有非常庞大的应用程序，或者需要运行较长时间并反复调用相同程序单元的应用程序时，随着复杂性的增加，`DBMS_TRACE`\
    \ 的价值就开始下降。\n\n例如，本章提供了一个名为 `TEST_CALLS_PRC` 的演示过程。它是一个简单的 `for` 循环（100 次迭代），每次迭代调用两个过程。使用与之前相同的选项运行\
    \ `DBMS_TRACE` 和 `DBMS_PROFILER`，比较两者输出行数的差异（较小的 `RUNID` 是之前两者计数的追踪记录）。以下查询比较了由\
    \ `DBMS_PROFILER` 产生的两次运行之间的输出行数：\n\n```sql\nSELECT ppd.runid, count(*)\n  FROM\
    \ plsql_profiler_units ppu\n  JOIN plsql_profiler_data ppd\n    ON(ppu.runid =\
    \ ppd.runid\n    AND ppu.unit_number = ppd.unit_number)\n  WHERE ppu.runid IN\
    \ (9,10)\n    AND ppd.total_time != 0\n    AND unit_type != 'ANONYMOUS BLOCK'\n\
    \  GROUP BY ppd.runid;\n```\n\n```\nRUNID                  COUNT(*)\n----------------------\
    \ ----------------------\n9                      29\n10                     15\n\
    ```\n\n下一个查询对两次 `DBMS_TRACE` 会话产生相同的行数统计：\n\n```sql\n  SELECT runid, count(*)\n\
    \    FROM plsql_trace_events\n    WHERE runid IN (12,13)\n    GROUP BY runid;\n\
    ```\n\n```\nRUNID                  COUNT(*)\n---------------------- ----------------------\n\
    12                     100\n13                     5545\n```\n\n对于不太复杂的代码，`DBMS_PROFILER`\
    \ 的行数较少，但 `DBMS_TRACE` 的行数却多得多。在针对 `DBMS_TRACE` 表编写查询时，你需要考虑到这一点。使用选项只收集你真正想要的数据，然后计划创造性地过滤掉那些你不想要但无法通过选项排除的内容。\n"
- fmt: "## Code Coverage Testing and Performance Metrics\n\nCode coverage testing\
    \ is a method of testing in which you verify that each line of a program that\
    \ `can be` executed is actually executed. This kind of testing is regression testing\
    \ as opposed to functional testing. Just because a piece of code was executed\
    \ does not mean it was executed correctly. However, if it was executed at least\
    \ once, then you know it will in fact, under certain circumstances, execute without\
    \ error.\n\nCode coverage testing is fairly meaningless by itself. However, as\
    \ part of an automated build process or as one component of an overall test plan,\
    \ it does have its uses. I like using code coverage for the same reason I like\
    \ compiler errors. It catches plenty of oopsy. Without the proper tools though,\
    \ this is very difficult testing to accomplish. Fortunately, Oracle has given\
    \ us most of what we need.\n\nI'm not particularly concerned with performance\
    \ metrics here (although there is no reason not to include them). What I want\
    \ to see is that all of the code that can be executed is executed.\n\nIt is possible\
    \ to combine the output from `DBMS_TRACE` and `DBMS_PROFILER` to get a nice trace\
    \ of each line that executed along with some context. To do so requires creating\
    \ a funky query and some knowledge of individual runs that are related by being\
    \ run together or very close together. If you combine a run of the profiler with\
    \ a run of the trace from different versions of the code, you will get a very\
    \ ugly mess. However, if you know that you have matching runs, the information\
    \ is highly useful.\n\nThe following query joins the `DBMS_PROFILER` output and\
    \ the `DBMS_TRACE` output. To simplify the query, I am leaving out the `PLSQL_TRACE_RUNS`\
    \ and the `PLSQL_PROFILER_RUNS` tables, which is really where you would start.\
    \ I'm just manually picking a run from each. I'm dropping certain event types,\
    \ specifically SQL calls (54) and returns from procedure calls (50). You can get\
    \ a list of all of the event kinds from the documentation or from the `tracetab.sql`\
    \ install code. When looking at the `total_time`, I like to see who is being called,\
    \ from where, and exactly what the code is doing. The who and where comes from\
    \ the `DBMS_TRACE` data and the what comes from `USER_SOURCE`. Here is the query:\n\
    \n```sql\nBREAK ON event_unit ON event_proc_name\nSELECT event_unit, event_proc_name,\
    \ line# line,\n       total_time time, pse.proc_unit, pse.proc_name,\n       substr(ltrim(rtrim(text)),1,30)\
    \ source_text\nFROM (\n  (SELECT ppu.runid, ppu.unit_type, ppu.unit_name,\n  \
    \        ppd.line#, ppd.total_time\n     FROM plsql_profiler_units ppu\n     JOIN\
    \ plsql_profiler_data ppd\n       ON(ppu.runid = ppd.runid\n       AND ppu.unit_number\
    \ = ppd.unit_number)\n     WHERE ppu.runid = :PROF_RUNID\n       AND ppd.total_time\
    \ != 0)) prof_data\nJOIN (\n    SELECT event_unit, event_proc_name, event_line,\n\
    \           proc_unit, proc_name, event_unit_kind,\n           event_kind, min(event_seq)\
    \ event_seq\n    FROM plsql_trace_events trace_data\n    WHERE runid = :TRACE_RUNID\n\
    \      AND event_kind NOT IN (50, 54)\n    GROUP BY  event_unit, event_proc_name,\
    \ event_line,\n           proc_unit, proc_name, event_unit_kind,\n           event_kind)\
    \ pse\n  ON (pse.event_unit = prof_data.unit_name\n  AND pse.event_line = prof_data.line#)\n\
    JOIN user_source us\n  ON (us.name = pse.event_unit\n  AND us.type = pse.event_unit_kind\n\
    \  AND us.line = pse.event_line)\nORDER BY event_seq;\n```\n\n```\nEVENT_UNIT\
    \         EVENT_PROC_NAME          LINE    TIME PROC_UNIT\n------------------\
    \ ----------------------- ----- ------- -----------------\nPROC_NAME         \
    \      SOURCE_TEXT\n----------------------- ------------------------------\nEMPLOYEE_API\
    \       CREATE_EMPLOYEE             3   12933\n                        FUNCTION\
    \ create_employee(\n\n                                             20    2984\n\
    \                        v_exception BOOLEAN := FALSE;\n\n                   \
    \                          21    3979\n                        v_exception_message\
    \ CHAR(2048)\n\n                                             24  247720\n    \
    \                    v_department_id := departments\n\n                      \
    \                       24  247720 DEPARTMENTS_API\nDEPARTMENT_EXISTS       v_department_id\
    \ := departments\n\nDEPARTMENTS_API    DEPARTMENT_EXISTS           3    7958\n\
    \                        FUNCTION department_exists(\n\n                     \
    \                          9  185044\n                        SELECT department_id\n\
    \n                                              14    1989\n                 \
    \       RETURN v_department_id;\n\nEMPLOYEE_API       CREATE_EMPLOYEE        \
    \    24  247720\n                        v_department_id := departments\n.\n.\n\
    .\n38 rows selected.\n```\n\nIt was fairly difficult to format this output to\
    \ fit the page, but hopefully you can see what is going on. The output starts\
    \ at `EMPLOYEE_API.CREATE_EMPLOYEE` on line 3 of the package body. The time for\
    \ that line is 12,933 and the actual code that is being executed (at least the\
    \ first 30 bytes of it) is `FUNCTION create_employee`.\n\nThe second row of output\
    \ corresponds to line 20 of the package body and is an assignment that had an\
    \ elapsed time of 2,984. You can compare the code in this output to the actual\
    \ source and see that line 20 is the first executable line. Everything before\
    \ it was parameters and declarations. The assignment (while being declared) makes\
    \ it an executable line. Line 20 is followed by 21, which is another assignment.\n\
    \nFinally, at line 24, an assignment is made by making a call to `DEPARTMENTS_API.DEPARTMENT_EXISTS`.\
    \ That moves the `EVENT_UNIT` from `EMPLOYEE_API` to `DEPARTMENTS_API`. The next\
    \ few lines are the executable lines in that program unit until it hits the return\
    \ at line 14 (of the `DEPARTMENTS_API` package body). The last line displayed\
    \ returns control to `EMPLOYEE_API`. The rest of the lines were suppressed to\
    \ save space.\n\nIn a single report/query, you have a code coverage report, a\
    \ code analysis report (by including executable code, line number, timing, and\
    \ the actual source code), and performance metrics. If this report is saved to\
    \ a table (your own user-created table), you can rerun this query after any changes\
    \ to the code and compare output. You just need to be careful how you compare\
    \ individual lines as they will change over time."
  raw: '##### Code Coverage Testing and Performance Metrics


    Code coverage testing is a method of testing in which you verify that each line
    of a program that *can be* executed is actually executed. This kind of testing
    is regression testing as opposed to functional testing. Just because a piece of
    code was executed does not mean it was executed correctly. However, if it was
    executed at least once, then you know it will in fact, under certain circumstances,
    execute without error.


    Code coverage testing is fairly meaningless by itself. However, as part of an
    automated build process or as one component of an overall test plan, it does have
    its uses. I like using code coverage for the same reason I like compiler errors.
    It catches plenty of oopsy. Without the proper tools though, this is very difficult
    testing to accomplish. Fortunately, Oracle has given us most of what we need.


    I''m not particularly concerned with performance metrics here (although there
    is no reason not to include them). What I want to see is that all of the code
    that can be executed is executed.


    It is possible to combine the output from DBMS_TRACE and DBMS_PROFILER to get
    a nice trace of each line that executed along with some context. To do so requires
    creating a funky query and some knowledge of individual runs that are related
    by being run together or very close together. If you combine a run of the profiler
    with a run of the trace from different versions of the code, you will get a very
    ugly mess. However, if you know that you have matching runs, the information is
    highly useful.


    The following query joins the DBMS_PROFILER output and the DBMS_TRACE output.
    To simplify the query, I am leaving out the PLSQL_TRACE_RUNS and the PLSQL_PROFILER_RUNS
    tables, which is really where you would start. I''m just manually picking a run
    from each. I''m dropping certain event types, specifically SQL calls (54) and
    returns from procedure calls (50). You can get a list of all of the event kinds
    from the documentation or from the `tracetab.sql` install code. When looking at
    the total_time, I like to see who is being called, from where, and exactly what
    the code is doing. The who and where comes from the DBMS_TRACE data and the what
    comes from USER_SOURCE. Here is the query:


    `BREAK ON event_unit ON event_proc_name`

    `SELECT event_unit, event_proc_name, line# line,`

    `       total_time time, pse.proc_unit, pse.proc_name,`

    `       substr(ltrim(rtrim(text)),1,30) source_text`

    `FROM (`

    `  (SELECT ppu.runid, ppu.unit_type, ppu.unit_name,`

    `          ppd.line#, ppd.total_time`

    `     FROM plsql_profiler_units ppu`

    `     JOIN plsql_profiler_data ppd`

    `       ON(ppu.runid = ppd.runid`

    `       AND ppu.unit_number = ppd.unit_number)`

    `     WHERE ppu.runid = :PROF_RUNID`

    `       AND ppd.total_time != 0)) prof_data`

    `JOIN (`

    `    SELECT event_unit, event_proc_name, event_line,`

    `           proc_unit, proc_name, event_unit_kind,`

    `           event_kind, min(event_seq) event_seq`

    `    FROM plsql_trace_events trace_data`

    `    WHERE runid = :TRACE_RUNID`

    `      AND event_kind NOT IN (50, 54)`

    `    GROUP BY  event_unit, event_proc_name, event_line,`

    `           proc_unit, proc_name, event_unit_kind,`

    `           event_kind) pse`

    `  ON (pse.event_unit = prof_data.unit_name`

    `  AND pse.event_line = prof_data.line#)`

    `JOIN user_source us`

    `  ON (us.name = pse.event_unit`

    `  AND us.type = pse.event_unit_kind`

    `  AND us.line = pse.event_line)`

    `ORDER BY event_seq;`


    `EVENT_UNIT         EVENT_PROC_NAME          LINE    TIME PROC_UNIT`

    `------------------ ----------------------- ----- ------- -----------------`

    `PROC_NAME               SOURCE_TEXT`

    `----------------------- ------------------------------`

    `EMPLOYEE_API       CREATE_EMPLOYEE             3   12933`

    `                        FUNCTION create_employee(`


