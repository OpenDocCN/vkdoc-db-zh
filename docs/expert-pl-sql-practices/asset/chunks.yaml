    What does the process of profiling look like in practice? Here''s an example that
    I executed in SQL*Plus to answer the same question I asked earlier: Why is program
    `p` slow? This time I''ll use ILO for instrumentation instead of DBMS_OUTPUT.PUT_LINE.


    `CREATE OR REPLACE PROCEDURE q AS`

    `  l_sqlcode NUMBER;`

    `  l_sqlerrm VARCHAR2(512);`

    `BEGIN`

    `  ilo_task.begin_task(module => ''Procedure P'',`

    `                      action => ''q'');`

    `  FOR rec IN (SELECT * FROM V$SESSION) LOOP`

    `    NULL;`

    `  END LOOP;`

    `  ilo_task.end_task;`

    `EXCEPTION WHEN OTHERS THEN`

    `  l_sqlcode := SQLCODE;`

    `  l_sqlerrm := SQLERRM;`

