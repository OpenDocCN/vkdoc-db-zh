- fmt: "### View for Table Alterations\n\nOne of the tricks to avoid or lessen the\
    \ chances of cascading invalidations as a result of table modifications as you\
    \ saw earlier is to use a view inside your stored code in place of a table. The\
    \ view adds another layer of abstraction and will insulate the changes on the\
    \ table from the dependent code. Let's see this benefit in action with an example.\
    \ Let's assume there is a table called `TRANS`, which you can create as follows:\n\
    \n```sql\ncreate table trans\n(\n    trans_id        number(10),\n    trans_amt\
    \       number(12,2),\n    store_id        number(2),\n    trans_type      varchar2(1)\n\
    );\n```\n\nNow build the following package to manipulate the data in this table:\n\
    \n```sql\ncreate or replace package pkg_trans\nis\n        procedure upd_trans_amt\n\
    \        (\n                p_trans_id      trans.trans_id%type,\n           \
    \     p_trans_amt     trans.trans_amt%type\n        );\nend;\n/\ncreate or replace\
    \ package body pkg_trans\nis\n        procedure upd_trans_amt\n        (\n   \
    \             p_trans_id      trans.trans_id%type,\n                p_trans_amt\
    \     trans.trans_amt%type\n        ) is\n        begin\n                update\
    \ trans\n                set trans_amt = p_trans_amt\n                where trans_id\
    \ = p_trans_id;\n        end;\nend;\n/\n```\n\nYou now want to write several other\
    \ business code units using this package. One such unit is a function called `ADJUST`\
    \ that updates the transaction amounts by a certain amount. Here is the code to\
    \ create this function:\n\n```sql\ncreate or replace function adjust\n(\n    \
    \    p_trans_id      trans.trans_id%type,\n        p_percentage    number\n)\n\
    return boolean\nis\n        l_new_trans_amt number(12);\nbegin\n        select\
    \ trans_amt * (1 + p_percentage/100)\n        into l_new_trans_amt\n        from\
    \ trans\n        where trans_id = p_trans_id;\n        pkg_trans.upd_trans_amt\
    \ (\n                p_trans_id,\n                l_new_trans_amt\n        );\n\
    \        return TRUE;\nexception\n        when OTHERS then\n                return\
    \ FALSE;\nend;\n/\n```\n\n![images](images/square.jpg) Note: Proponents of a school\
    \ of a certain coding practices will argue to place all the code to manipulate\
    \ a specific table in a single package instead of spreading that code among many\
    \ stored code segments, while others will argue that such a practice would have\
    \ made the package long and unmanageable. I think the right answer is situation\
    \ specific and therefore best left as a decision made at design time. In this\
    \ example, I am not endorsing either approach but resorting to a separate procedure\
    \ merely for illustration purposes.\n\nWith the new objects in place, let's add\
    \ a column in the view.\n\n```sql\nSQL> alter table trans add (vendor_id number);\n\
    \nTable altered.\n```\n\nNow check the status of the objects.\n\n```sql\nOBJECT_NAME\
    \     OBJECT_TYPE          STATUS\n--------------- -------------------- -------\n\
    PKG_TRANS       PACKAGE BODY         INVALID\nPKG_TRANS       PACKAGE        \
    \      INVALID\nADJUST          FUNCTION             INVALID\n```\n\nIt shouldn't\
    \ be a surprise that the function got invalidated. It was invalidated because\
    \ the components it depends on (the package specification and body of `PKG_TRANS`)\
    \ were invalidated. Those invalidations were caused by the modification of the\
    \ table `TRANS`. The next time these invalid components are executed, they will\
    \ be automatically recompiled, but that will result in parsing, leading to increased\
    \ CPU consumption and the placing of parse locks.\n\nTo avoid this scenario, you\
    \ can build a view on the table.\n\n```sql\ncreate or replace view vw_trans\n\
    as\nselect trans_id, trans_amt, store_id, trans_type\nfrom trans\n/\n```\n\nUse\
    \ this view in the package and function instead:\n\n```sql\ncreate or replace\
    \ package pkg_trans\nis\n        procedure upd_trans_amt\n        (\n        \
    \        p_trans_id      vw_trans.trans_id%type,\n                p_trans_amt\
    \     vw_trans.trans_amt%type\n        );\nend;\n/\ncreate or replace package\
    \ body pkg_trans\nis\n        procedure upd_trans_amt\n        (\n           \
    \     p_trans_id      vw_trans.trans_id%type,\n                p_trans_amt   \
    \  vw_trans.trans_amt%type\n        ) is\n        begin\n                update\
    \ vw_trans\n                set trans_amt = p_trans_amt\n                where\
    \ trans_id = p_trans_id;\n        end;\nend;\n/\ncreate or replace function adjust\n\
    (\n        p_trans_id      vw_trans.trans_id%type,\n        p_percentage    number\n\
    )\nreturn boolean\nis\n        l_new_trans_amt number(12);\nbegin\n        select\
    \ trans_amt * (1 + p_percentage/100)\n        into l_new_trans_amt\n        from\
    \ vw_trans\n        where trans_id = p_trans_id;\n        pkg_trans.upd_trans_amt\
    \ (\n                p_trans_id,\n                l_new_trans_amt\n        );\n\
    \        return TRUE;\nexception\n        when OTHERS then\n                return\
    \ FALSE;\nend;\n/\n```\n\nNow add a column and then check the status of the objects.\n\
    \n```sql\nSQL> alter table trans add (vendor_id number);\n\nTable altered.\n\n\
    OBJECT_NAME     OBJECT_TYPE          STATUS\n--------------- --------------------\
    \ -------\nPKG_TRANS       PACKAGE BODY         VALID\nPKG_TRANS       PACKAGE\
    \              VALID\nADJUST          FUNCTION             VALID\nVW_TRANS   \
    \     VIEW                 VALID\n```\n\nAll the objects are valid. This is because\
    \ the package body depends on the view, not the table. The new column was not\
    \ referenced in the view, so the view itself was not affected by the change in\
    \ the table and was not invalidated, thanks to the fine grained dependency implemented\
    \ in Oracle 11g.\n\n![images](images/square.jpg) Note: The view will be invalidated\
    \ in Oracle 10g because in that version the fine-grained dependency control was\
    \ not implemented. In 10g, the dependency is of the view on the table and any\
    \ change in the table, even if it is a column addition that is not even referenced\
    \ in the view, will invalidate the view.\n\nThe power of fine-grained dependency\
    \ is such that it not only looks at named columns, it applies to implicit columns\
    \ as well. For instance, had you defined the view as `create or replace view vw_trans\
    \ as select * from trans` (note the `*`; it means all columns instead of named\
    \ columns earlier), the dependency wouldn't have mattered and view would not have\
    \ been invalidated. However, if you recreate the view, the new column will be\
    \ added to the view and makes the dependent object (the function) invalid. However,\
    \ had you used a packaged function instead of a standalone function, it would\
    \ not have been invalidated, as you observed earlier."
  raw: '### View for Table Alterations


    One of the tricks to avoid or lessen the chances of cascading invalidations as
    a result of table modifications as you saw earlier is to use a view inside your
    stored code in place of a table. The view adds another layer of abstraction and
    will insulate the changes on the table from the dependent code. Let''s see this
    benefit in action with an example. Let''s assume there is a table called TRANS,
    which you can create as follows:


    `create table trans`

    `(`

    `    trans_id        number(10),`

    `    trans_amt       number(12,2),`

    `    store_id        number(2),`

    `    trans_type      varchar2(1)`

    `);`


    Now build the following package to manipulate the data in this table:


    `create or replace package pkg_trans`

    `is`

    `        procedure upd_trans_amt`

    `        (`

    `                p_trans_id      trans.trans_id%type,`

    `                p_trans_amt     trans.trans_amt%type`

    `        );`

    `end;`

    `/`

    `create or replace package body pkg_trans`

    `is`

    `        procedure upd_trans_amt`

    `        (`

    `                p_trans_id      trans.trans_id%type,`

    `                p_trans_amt     trans.trans_amt%type`

    `        ) is`

    `        begin`

    `                update trans`

    `                set trans_amt = p_trans_amt`

    `                where trans_id = p_trans_id;`

    `        end;`

    `end;`

    `/`


    You now want to write several other business code units using this package. One
    such unit is a function called ADJUST that updates the transaction amounts by
    a certain amount. Here is the code to create this function:


    `create or replace function adjust`

    `(`

    `        p_trans_id      trans.trans_id%type,`

    `        p_percentage    number`

    `)`

    `return boolean`

    `is`

    `        l_new_trans_amt number(12);`

    `begin`

    `        select trans_amt * (1 + p_percentage/100)`

    `        into l_new_trans_amt`

    `        from trans`

    `        where trans_id = p_trans_id;`

    `        pkg_trans.upd_trans_amt (`

    `                p_trans_id,`

    `                l_new_trans_amt`

    `        );`

    `        return TRUE;`

    `exception`

    `        when OTHERS then`

    `                return FALSE;`

    `end;`

    `/`


    ![images](images/square.jpg) **Note** Proponents of a school of a certain coding
    practices will argue to place all the code to manipulate a specific table in a
    single package instead of spreading that code among many stored code segments,
    while others will argue that such a practice would have made the package long
    and unmanageable. I think the right answer is situation specific and therefore
    best left as a decision made at design time. In this example, I am not endorsing
    either approach but resorting to a separate procedure merely for illustration
    purposes.


    With the new objects in place, let''s add a column in the view.


    `SQL> alter table trans add (vendor_id number);`


    `Table altered.`


    Now check the status of the objects.


    `OBJECT_NAME     OBJECT_TYPE         STATUS`

    `--------------- ------------------- -------`

    `PKG_TRANS       PACKAGE BODY        INVALID`

    `PKG_TRANS       PACKAGE             INVALID`

    `ADJUST          FUNCTION            INVALID`


    It shouldn''t be a surprise that the function got invalidated. It was invalidated
    because the components it depends on (the package specification and body of PKG_TRANS)
    were invalidated. Those invalidations were caused by the modification of the table
    TRANS. The next time these invalid components are executed, they will be automatically
    recompiled, but that will result in parsing, leading to increased CPU consumption
    and the placing of parse locks.


    To avoid this scenario, you can build a view on the table.


    `create or replace view vw_trans`

    `as`

    `select trans_id, trans_amt, store_id, trans_type`

    `from trans`

    `/`


    Use this view in the package and function instead:


    `create or replace package pkg_trans`

    `is`

    `        procedure upd_trans_amt`

    `        (`

    **`p_trans_id      vw_trans.trans_id%type,`**

    **`p_trans_amt     vw_trans.trans_amt%type`**

    `        );`

    `end;`

    `/`

    `create or replace package body pkg_trans`

    `is`

    `        procedure upd_trans_amt`

    `        (`

    **`p_trans_id      vw_trans.trans_id%type,`**

    **`p_trans_amt     vw_trans.trans_amt%type`**

    `        ) is`

    `        begin`

    `                update vw_trans`

    `                set trans_amt = p_trans_amt`

    `                where trans_id = p_trans_id;`

    `        end;`

    `end;`

    `/`

    `create or replace function adjust`

    `(`

    **`p_trans_id      vw_trans.trans_id%type,`**

    `        p_percentage    number`

    `)`

    `return boolean`

    `is`

    `        l_new_trans_amt number(12);`

    `begin`

    `        select trans_amt * (1 + p_percentage/100)`

    `        into l_new_trans_amt`

    **`from vw_trans`**

    `        where trans_id = p_trans_id;`

    `        pkg_trans.upd_trans_amt (`

    `                p_trans_id,`

    `                l_new_trans_amt`

    `        );`

    `        return TRUE;`

    `exception`

    `        when OTHERS then`

    `                return FALSE;`

    `end;`

    `/`


    Now add a column and then check the status of the objects.


    `SQL> alter table trans add (vendor_id number);`


    `Table altered.`


    `OBJECT_NAME     OBJECT_TYPE         STATUS`

    `--------------- ------------------- -------`

    `PKG_TRANS       PACKAGE BODY        VALID`

    `PKG_TRANS       PACKAGE             VALID`

    `ADJUST          FUNCTION            VALID`

    `VW_TRANS        VIEW                VALID`


    All the objects are valid. This is because the package body depends on the view,
    not the table. The new column was not referenced in the view, so the view itself
    was not affected by the change in the table and was not invalidated, thanks to
    the fine grained dependency implemented in Oracle 11g.


    ![images](images/square.jpg) **Note** The view will be invalidated in Oracle 10g
    because in that version the fine-grained dependency control was not implemented.
    In 10g, the dependency is of the view on the table and any change in the table,
    even if it is a column addition that is not even referenced in the view, will
    invalidate the view.


    The power of fine-grained dependency is such that it not only looks at named columns,
    it applies to implicit columns as well. For instance, had you defined the view
    as `create or replace view vw_trans as select * from trans` (note the *; it means
    *all columns* instead of *named columns earlier*), the dependency wouldn''t have
    mattered and view would not have been invalidated. However, if you recreate the
    view, the new column will be added to the view and makes the dependent object
    (the function) invalid. However, had you used a packaged function instead of a
    standalone function, it would not have been invalidated, as you observed earlier.'
  trans: "### 视图用于表修改\n\n正如你之前所见，避免或减少因表修改而导致级联失效机会的技巧之一，是在你的存储代码中使用视图来代替直接使用表。视图增加了另一层抽象，可以将表的变更与依赖代码隔离开来。让我们通过一个例子来看看这个好处的实际效果。假设有一个名为\
    \ `TRANS` 的表，你可以按如下方式创建：\n\n```sql\ncreate table trans\n(\n    trans_id      \
    \  number(10),\n    trans_amt       number(12,2),\n    store_id        number(2),\n\
    \    trans_type      varchar2(1)\n);\n```\n\n现在构建以下包来操作此表中的数据：\n\n```sql\ncreate\
    \ or replace package pkg_trans\nis\n        procedure upd_trans_amt\n        (\n\
    \                p_trans_id      trans.trans_id%type,\n                p_trans_amt\
    \     trans.trans_amt%type\n        );\nend;\n/\ncreate or replace package body\
    \ pkg_trans\nis\n        procedure upd_trans_amt\n        (\n                p_trans_id\
    \      trans.trans_id%type,\n                p_trans_amt     trans.trans_amt%type\n\
    \        ) is\n        begin\n                update trans\n                set\
    \ trans_amt = p_trans_amt\n                where trans_id = p_trans_id;\n    \
    \    end;\nend;\n/\n```\n\n你现在想使用这个包来编写其他几个业务代码单元。其中一个单元是一个名为 `ADJUST` 的函数，它用于按特定金额更新交易额。以下是创建此函数的代码：\n\
    \n```sql\ncreate or replace function adjust\n(\n        p_trans_id      trans.trans_id%type,\n\
    \        p_percentage    number\n)\nreturn boolean\nis\n        l_new_trans_amt\
    \ number(12);\nbegin\n        select trans_amt * (1 + p_percentage/100)\n    \
    \    into l_new_trans_amt\n        from trans\n        where trans_id = p_trans_id;\n\
    \        pkg_trans.upd_trans_amt (\n                p_trans_id,\n            \
    \    l_new_trans_amt\n        );\n        return TRUE;\nexception\n        when\
    \ OTHERS then\n                return FALSE;\nend;\n/\n```\n\n![images](img/square.jpg)\
    \ 注意：某一编码实践流派的支持者会主张将所有操作特定表的代码放在一个单独的包中，而不是分散在许多存储代码段中，而另一些人则认为这种做法会使包变得冗长且难以管理。我认为正确的答案取决于具体情况，因此最好留待设计时决定。在这个例子中，我并非认可任何一种方法，而仅仅是出于说明目的才使用了一个单独的过程。\n\
    \n在添加了新对象后，让我们在表中添加一个列。\n\n```sql\nSQL> alter table trans add (vendor_id number);\n\
    \nTable altered.\n```\n\n现在检查对象的状态。\n\n```sql\nOBJECT_NAME     OBJECT_TYPE   \
    \       STATUS\n--------------- -------------------- -------\nPKG_TRANS      \
    \ PACKAGE BODY         INVALID\nPKG_TRANS       PACKAGE              INVALID\n\
    ADJUST          FUNCTION             INVALID\n```\n\n函数失效并不令人意外。它失效是因为它所依赖的组件（包\
    \ `PKG_TRANS` 的声明和主体）失效了。而这些失效是由表 `TRANS` 的修改引起的。下次执行这些无效组件时，它们将被自动重新编译，但这会导致解析，从而增加\
    \ CPU 消耗并放置解析锁。\n\n为了避免这种情况，你可以基于该表创建一个视图。\n\n```sql\ncreate or replace view vw_trans\n\
    as\nselect trans_id, trans_amt, store_id, trans_type\nfrom trans\n/\n```\n\n改为在包和函数中使用此视图：\n\
    \n```sql\ncreate or replace package pkg_trans\nis\n        procedure upd_trans_amt\n\
    \        (\n                p_trans_id      vw_trans.trans_id%type,\n        \
    \        p_trans_amt     vw_trans.trans_amt%type\n        );\nend;\n/\ncreate\
    \ or replace package body pkg_trans\nis\n        procedure upd_trans_amt\n   \
    \     (\n                p_trans_id      vw_trans.trans_id%type,\n           \
    \     p_trans_amt     vw_trans.trans_amt%type\n        ) is\n        begin\n \
    \               update vw_trans\n                set trans_amt = p_trans_amt\n\
    \                where trans_id = p_trans_id;\n        end;\nend;\n/\ncreate or\
    \ replace function adjust\n(\n        p_trans_id      vw_trans.trans_id%type,\n\
    \        p_percentage    number\n)\nreturn boolean\nis\n        l_new_trans_amt\
    \ number(12);\nbegin\n        select trans_amt * (1 + p_percentage/100)\n    \
    \    into l_new_trans_amt\n        from vw_trans\n        where trans_id = p_trans_id;\n\
    \        pkg_trans.upd_trans_amt (\n                p_trans_id,\n            \
    \    l_new_trans_amt\n        );\n        return TRUE;\nexception\n        when\
    \ OTHERS then\n                return FALSE;\nend;\n/\n```\n\n现在添加一列，然后检查对象的状态。\n\
    \n```sql\nSQL> alter table trans add (vendor_id number);\n\nTable altered.\n\n\
    OBJECT_NAME     OBJECT_TYPE          STATUS\n--------------- --------------------\
    \ -------\nPKG_TRANS       PACKAGE BODY         VALID\nPKG_TRANS       PACKAGE\
    \              VALID\nADJUST          FUNCTION             VALID\nVW_TRANS   \
    \     VIEW                 VALID\n```\n\n所有对象都是有效的。这是因为包主体依赖于视图，而不是表。新增的列没有在视图中被引用，因此视图本身不受表变更的影响，也未被失效，这要归功于\
    \ Oracle 11g 中实现的细粒度依赖。\n\n![images](img/square.jpg) 注意：在 Oracle 10g 中，视图会被失效，因为该版本没有实现细粒度依赖控制。在\
    \ 10g 中，依赖关系是视图对表的依赖，表的任何更改，即使是在视图中甚至未被引用的列添加，都会导致视图失效。\n\n细粒度依赖的强大之处在于，它不仅查看命名列，也适用于隐式列。例如，如果你将视图定义为\
    \ `create or replace view vw_trans as select * from trans`（注意 `*`；它表示所有列，而不是之前的命名列），依赖关系也不会有影响，视图不会被失效。然而，如果你重新创建视图，新列将被添加到视图中，并使依赖对象（函数）失效。但是，如果你使用的是包函数而不是独立函数，它就不会被失效，正如你之前观察到的那样。"
- fmt: "### Adding Components into Packages\n\nNow that you understand how packages\
    \ are extremely valuable in shortening the dependency chain and reducing the cascading\
    \ invalidations, you should always use packages, not standalone code segments\
    \ in your applications. You should create packages as logical groups around functionalities.\
    \ When you enhance the functionality of the applications, you may need to add\
    \ new functions and procedures to the existing packages instead of creating new\
    \ ones. That leads to a question. Since you altered existing packages, will doing\
    \ so affect the dependent objects?\n\n### Examining Dependency with an Example\n\
    \nLet's examine the issue using the earlier example involving the table `TRANS`,\
    \ the view `VW_TRANS`, the package `PKG_TRANS`, and the function `ADJUST`. Suppose\
    \ with the revised requirements you need to add a new procedure to the package\
    \ (`upd_trans_type`) to update the transaction type. Here is the package altering\
    \ script that you would need to execute:\n\n```sql\ncreate or replace package\
    \ pkg_trans\nis\n        procedure upd_trans_amt\n        (\n                p_trans_id\
    \      vw_trans.trans_id%type,\n                p_trans_amt     vw_trans.trans_amt%type\n\
    \        );\n        procedure upd_trans_type\n        (\n                p_trans_id\
    \      vw_trans.trans_id%type,\n                p_trans_type    vw_trans.trans_type%type\n\
    \        );\nend;\n/\ncreate or replace package body pkg_trans\nas\n        procedure\
    \ upd_trans_amt\n        (\n                p_trans_id      vw_trans.trans_id%type,\n\
    \                p_trans_amt     vw_trans.trans_amt%type\n        ) is\n     \
    \   begin\n                update vw_trans\n                set trans_amt = p_trans_amt\n\
    \                where trans_id = p_trans_id;\n        end;\n        procedure\
    \ upd_trans_type\n        (\n                p_trans_id      vw_trans.trans_id%type,\n\
    \                p_trans_type    vw_trans.trans_type%type\n        ) is\n    \
    \    begin\n            update vw_trans\n            set trans_type = p_trans_type\n\
    \            where trans_id = p_trans_id;\n        end;\nend;\n/\n```\n\nAfter\
    \ altering the package, take time to examine the status of the objects.\n\n```\n\
    OBJECT_TYPE          OBJECT_NAME                      STATUS\n--------------------\
    \ ------------------------------ -------\nVIEW                 VW_TRANS      \
    \                   VALID\nTABLE                TRANS                        \
    \    VALID\nPACKAGE BODY         PKG_TRANS                        VALID\nPACKAGE\
    \              PKG_TRANS                        VALID\nFUNCTION             ADJUST\
    \                           VALID\n```\n\nEverything is valid. (Please note, in\
    \ pre-11g versions, you will find some objects invalidated, due to the absence\
    \ of fine-grained dependency tracking). Even though the package was altered by\
    \ adding a new procedure, the function `ADJUST` itself does not call that procedure\
    \ and therefore doesn't need to be invalidated—a fact recognized by fine-grained\
    \ dependency checking in 11g. As you can see, the fine-grained dependency model\
    \ not only tracks the column references but components in the stored code as well.\n\
    \n### When Placement Matters: Stub Numbering\n\nAlthough Oracle 11g and above\
    \ seems to take care of the invalidation issue automatically, be aware that it\
    \ is not always so. Consider another case where you want to have a new procedure\
    \ to update the `store_id`.\n\n```sql\ncreate or replace package pkg_trans\nis\n\
    procedure upd_store_id\n(\np_trans_id      vw_trans.trans_id%type,\np_store_id\
    \      vw_trans.store_id%type\n);\n        procedure upd_trans_amt\n        (\n\
    \                p_trans_id      vw_trans.trans_id%type,\n                p_trans_amt\
    \     vw_trans.trans_amt%type\n        );\nend;\n/\ncreate or replace package\
    \ body pkg_trans\nis\nprocedure upd_store_id\n(\np_trans_id      vw_trans.trans_id%type,\n\
    p_store_id      vw_trans.store_id%type\n) is\nbegin\nupdate vw_trans\nset store_id\
    \ = p_store_id\nwhere trans_id = p_trans_id;\nend;\n        procedure upd_trans_amt\n\
    \        (\n                p_trans_id      vw_trans.trans_id%type,\n        \
    \        p_trans_amt     vw_trans.trans_amt%type\n        ) is\n        begin\n\
    \                update vw_trans\n                set trans_amt = p_trans_amt\n\
    \                where trans_id = p_trans_id;\n        end;\nend;\n/\n```\n\n\
    Notice that the new procedure is inserted at the beginning of the package instead\
    \ of at the end. If you check for the validity, you get the following:\n\n```sql\n\
    SQL> select status from user_objects where object_name = 'ADJUST';\n```\n\n```\n\
    STATUS\n-------\nINVALID\n```\n\nWhy was the function `ADJUST` invalidated? Interestingly,\
    \ had you placed that procedure at the end, you wouldn't have invalidated the\
    \ function. The reason for this seemingly odd behavior is the placement of stubs\
    \ in the parsed version of the package. Each function is represented in the package\
    \ as a stub and the stubs are ordered in the way they are defined in the package.\
    \ The dependent components reference the stub by their stub number. When you add\
    \ a function or procedure at the end, the new component is given a new stub number;\
    \ the stubs of the existing components are not disturbed, so the dependent objects\
    \ are not invalidated. When you add the component at the top, the order of components\
    \ inside the package changes, which affects the stub numbers of the existing components.\
    \ Since the dependent components refer to the stub numbers, they need to be reparsed\
    \ and are therefore invalidated immediately.\n\n![images](images/square.jpg)\n\
    \n**Tip:** To avoid invalidations in dependent objects when new code segments\
    \ are added to the package, add new components such as functions and procedures\
    \ to the end of a package specification and body—not in the middle. This will\
    \ retain the stub numbering of existing components inside the package and will\
    \ not invalidate its dependents.\n\n### Avoiding Invalidation with Explicit Column\
    \ References\n\nI'll close the discussion on the dependency model with another\
    \ very important property that should affect your coding. Dependency tracking\
    \ checks for changes in columns. If a newly added column is not used, the dependent\
    \ is not invalidated. For instance, consider the cases where the following constructs\
    \ are used inside a stored code.\n\n```sql\nselect * into ... from test where\
    \ ...;\ninsert into test1 values (...);\n```\n\nNote that there are no column\
    \ names. In the first case, the `*` implicitly selects all the columns. When you\
    \ alter the table to add a column, the `*` implicitly refers to that new column,\
    \ even if you do not use it in the code, and so it invalidates the stored code.\
    \ In the second case, the `insert` does not specify a column list, so all the\
    \ columns are assumed and addition of a new column in `test1` will force the statement\
    \ to check for the value for the new column, forcing the invalidation of the stored\
    \ code. Therefore, you must avoid constructs like this. You should use named columns\
    \ in the stored code.\n\nAnother cause of invalidation in this scenario is all-inclusive\
    \ implicitly defined column lists. In their quest to write agile code, some developers\
    \ use a declaration like this:\n\n```sql\ndeclare l_test1_rec test1%rowtype;\n\
    ```\n\nSince the column list is not named, all the columns of `test1` are assumed.\
    \ So when you add a column, it invalidates the variable `l_test1_rec`, which invalidates\
    \ the stored code. Do not use declarations like this. Instead, use explicitly\
    \ named columns such as the following:\n\n```sql\nl_trans_id      test1.trans_id%type;\n\
    l_trans_amt     test1.trans_amt%type;\n```\n\nIn this way, if a new column is\
    \ added, it will not affect any of the declared variables and will not invalidate\
    \ that stored code. However, please understand a very important point before you\
    \ make that leap: using `%rowtype` may make the maintenance of the code easier\
    \ since you do not have to explicitly name the variables. On the other hand, doing\
    \ so makes the code more vulnerable to invalidations. You should make the decision\
    \ to go either way using your best judgment."
  raw: '### Adding Components into Packages


    Now that you understand how packages are extremely valuable in shortening the
    dependency chain and reducing the cascading invalidations, you should always use
    packages, not standalone code segments in your applications. You should create
    packages as logical groups around functionalities. When you enhance the functionality
    of the applications, you may need to add new functions and procedures to the existing
    packages instead of creating new ones. That leads to a question. Since you altered
    existing packages, will doing so affect the dependent objects?


    Let''s examine the issue using the earlier example involving the table TRANS,
    the view VW_TRANS, the package PKG_TRANS, and the function ADJUST. Suppose with
    the revised requirements you need to add a new procedure to the package (`upd_trans_type`)
    to update the transaction type. Here is the package altering script that you would
    need to execute:


    `create or replace package pkg_trans`

    `is`

    `        procedure upd_trans_amt`

    `        (`

    `                p_trans_id      vw_trans.trans_id%type,`

    `                p_trans_amt     vw_trans.trans_amt%type`

    `        );`

    `        procedure upd_trans_type`

    `        (`

    `                p_trans_id      vw_trans.trans_id%type,`

    `                p_trans_type    vw_trans.trans_type%type`

    `        );`

    `end;`

    `/`

    `create or replace package body pkg_trans`

    `as`

    `        procedure upd_trans_amt`

    `        (`

    `                p_trans_id      vw_trans.trans_id%type,`

    `                p_trans_amt     vw_trans.trans_amt%type`

    `        ) is`

    `        begin`

    `                update vw_trans`

    `                set trans_amt = p_trans_amt`

    `                where trans_id = p_trans_id;`

    `        end;`

    `        procedure upd_trans_type`

    `        (`

    `                p_trans_id      vw_trans.trans_id%type,`

    `                p_trans_type    vw_trans.trans_type%type`

    `        ) is`

    `        begin`

    `            update vw_trans`

    `            set trans_type = p_trans_type`

    `            where trans_id = p_trans_id;`

    `        end;`

    `end;`

    `/`


    After altering the package, take time to examine the status of the objects.


    `OBJECT_TYPE         OBJECT_NAME                    STATUS`

    `------------------- ------------------------------ -------`

    `VIEW                VW_TRANS                       VALID`

    `TABLE               TRANS                          VALID`

    `PACKAGE BODY        PKG_TRANS                      VALID`

    `PACKAGE             PKG_TRANS                      VALID`

    `FUNCTION            ADJUST                         VALID`


    Everything is valid. (Please note, in pre-11g versions, you will find some objects
    invalidated, due to the absence of fine-grained dependency tracking). Even though
    the package was altered by adding a new procedure, the function ADJUST itself
    does not call that procedure and therefore doesn''t need to be invalidated—a fact
    recognized by fine-grained dependency checking in 11g. As you can see, the fine-grained
    dependency model not only tracks the column references but components in the stored
    code as well.


    Although Oracle 11g and above seems to take care of the invalidation issue automatically,
    be aware that it is not always so. Consider another case where you want to have
    a new procedure to update the store_id.


    `create or replace package pkg_trans`

    `is`

    **`procedure upd_store_id`**

    **`(`**

    **`p_trans_id      vw_trans.trans_id%type,`**

    **`p_store_id      vw_trans.store_id%type`**

    **`);`**

    `        procedure upd_trans_amt`

    `        (`

    `                p_trans_id      vw_trans.trans_id%type,`

    `                p_trans_amt     vw_trans.trans_amt%type`

    `        );`

    `end;`

    `/`

    `create or replace package body pkg_trans`

    `is`

    **`procedure upd_store_id`**

    **`(`**

    **`p_trans_id      vw_trans.trans_id%type,`**

    **`p_store_id      vw_trans.store_id%type`**

    **`) is`**

    **`begin`**

    **`update vw_trans`**

    **`set store_id = p_store_id`**

    **`where trans_id = p_trans_id;`**

    **`end;`**

    `        procedure upd_trans_amt`

    `        (`

    `                p_trans_id      vw_trans.trans_id%type,`

    `                p_trans_amt     vw_trans.trans_amt%type`

    `        ) is`

    `        begin`

    `                update vw_trans`

    `                set trans_amt = p_trans_amt`

    `                where trans_id = p_trans_id;`

    `        end;`

    `end;`

    `/`


    Notice that the new procedure is inserted at the beginning of the package instead
    of at the end. If you check for the validity, you get the following:


    `SQL> select status from user_objects where object_name = ''ADJUST'';`


    `STATUS`

    `-------`

    `INVALID`


    Why was the function invalidated? Interestingly, had you placed that procedure
    at the end, you wouldn''t have invalidated the function. The reason for this seemingly
    odd behavior is the placement of stubs in the parsed version of the package. Each
    function is represented in the package as a stub and the stubs are ordered in
    the way they are defined in the package. The dependent components reference the
    stub by their stub number. When you add a function or procedure at the end, the
    new component is given a new stub number; the stubs of the existing components
    are not disturbed, so the dependent objects are not invalidated. When you add
    the component at the top, the order of components inside the package changes,
    which affects the stub numbers of the existing components. Since the dependent
    components refer to the stub numbers, they need to be reparsed and are therefore
    invalidated immediately.


    ![images](images/square.jpg) **Tip** To avoid invalidations in dependent objects
    when new code segments are added to the package, add new components such as functions
    and procedures to the end of a package specification and body—not in the middle.
    This will retain the stub numbering of existing components inside the package
    and will not invalidate its dependents.


    I''ll close the discussion on the dependency model with another very important
    property that should affect your coding. Dependency tracking checks for changes
    in columns. If a newly added column is not used, the dependent is not invalidated.
    For instance, consider the cases where the following constructs are used inside
    a stored code.


    `select * into ... from test where ...;`

    `insert into test1 values (...);`


    Note that there are no column names. In the first case, the * implicitly selects
    all the columns. When you alter the table to add a column, the * implicitly refers
    to that new column, even if you do not use it in the code, and so it invalidates
    the stored code. In the second case, the insert does not specify a column list,
    so all the columns are assumed and addition of a new column in test1 will force
    the statement to check for the value for the new column, forcing the invalidation
    of the stored code. Therefore, you must avoid constructs like this. You should
    use named columns in the stored code.


    Another cause of invalidation in this scenario is all-inclusive implicitly defined
    column lists. In their quest to write agile code, some developers use a declaration
    like this:


    `declare l_test1_rec test1%rowtype;`


    Since the column list is not named, all the columns of test1 are assumed. So when
    you add a column, it invalidates the variable l_test1_rec, which invalidates the
    stored code. Do not use declarations like this. Instead, use explicitly named
    columns such as the following:


    `l_trans_id      test1.trans_id%type;`

    `l_trans_amt     test1.trans_amt%type;`


    In this way, if a new column is added, it will not affect any of the declared
    variables and will not invalidate that stored code. However, please understand
    a very important point before you make that leap: using %rowtype may make the
    maintenance of the code easier since you do not have to explicitly name the variables.
    On the other hand, doing so makes the code more vulnerable to invalidations. You
    should make the decision to go either way using your best judgment.'
  trans: "\n### 将组件添加到包中\n\n既然你已经理解了包在缩短依赖链和减少级联失效方面的巨大价值，你就应该始终在应用程序中使用**包**，而不是独立的代码段。你应该围绕功能逻辑地创建包。当你增强应用程序功能时，可能需要向现有包中添加新的函数和过程，而不是创建新包。这就引出了一个问题：既然你修改了现有包，这样做会影响依赖对象吗？\n\
    \n### 通过示例检查依赖性\n\n让我们用之前涉及表 `TRANS`、视图 `VW_TRANS`、包 `PKG_TRANS` 和函数 `ADJUST`\
    \ 的例子来检验这个问题。假设根据修订后的需求，你需要向该包中添加一个新的过程 (`upd_trans_type`) 来更新交易类型。以下是你需要执行的包修改脚本：\n\
    \n```sql\ncreate or replace package pkg_trans\nis\n        procedure upd_trans_amt\n\
    \        (\n                p_trans_id      vw_trans.trans_id%type,\n        \
    \        p_trans_amt     vw_trans.trans_amt%type\n        );\n        procedure\
    \ upd_trans_type\n        (\n                p_trans_id      vw_trans.trans_id%type,\n\
    \                p_trans_type    vw_trans.trans_type%type\n        );\nend;\n\
    /\ncreate or replace package body pkg_trans\nas\n        procedure upd_trans_amt\n\
    \        (\n                p_trans_id      vw_trans.trans_id%type,\n        \
    \        p_trans_amt     vw_trans.trans_amt%type\n        ) is\n        begin\n\
    \                update vw_trans\n                set trans_amt = p_trans_amt\n\
    \                where trans_id = p_trans_id;\n        end;\n        procedure\
    \ upd_trans_type\n        (\n                p_trans_id      vw_trans.trans_id%type,\n\
    \                p_trans_type    vw_trans.trans_type%type\n        ) is\n    \
    \    begin\n            update vw_trans\n            set trans_type = p_trans_type\n\
    \            where trans_id = p_trans_id;\n        end;\nend;\n/\n```\n\n修改包后，请花时间检查对象的状态。\n\
    \n```\nOBJECT_TYPE          OBJECT_NAME                      STATUS\n--------------------\
    \ ------------------------------ -------\nVIEW                 VW_TRANS      \
    \                   VALID\nTABLE                TRANS                        \
    \    VALID\nPACKAGE BODY         PKG_TRANS                        VALID\nPACKAGE\
    \              PKG_TRANS                        VALID\nFUNCTION             ADJUST\
    \                           VALID\n```\n\n所有对象都是有效的。（请注意，在 11g 之前的版本中，由于缺乏细粒度依赖跟踪，你会发现某些对象会失效）。尽管包是通过添加一个新过程来修改的，但函数\
    \ `ADJUST` 本身并不调用该过程，因此无需失效——这是 11g 中细粒度依赖检查所识别出的一个事实。正如你所见，细粒度依赖模型不仅跟踪列引用，还跟踪存储代码中的组件。\n\
    \n### 当顺序很重要时：存根编号\n\n尽管 Oracle 11g 及以上版本似乎会自动处理失效问题，但请注意情况并非总是如此。考虑另一个场景，你想添加一个新过程来更新\
    \ `store_id`。\n\n```sql\ncreate or replace package pkg_trans\nis\nprocedure upd_store_id\n\
    (\np_trans_id      vw_trans.trans_id%type,\np_store_id      vw_trans.store_id%type\n\
    );\n        procedure upd_trans_amt\n        (\n                p_trans_id   \
    \   vw_trans.trans_id%type,\n                p_trans_amt     vw_trans.trans_amt%type\n\
    \        );\nend;\n/\ncreate or replace package body pkg_trans\nis\nprocedure\
    \ upd_store_id\n(\np_trans_id      vw_trans.trans_id%type,\np_store_id      vw_trans.store_id%type\n\
    ) is\nbegin\nupdate vw_trans\nset store_id = p_store_id\nwhere trans_id = p_trans_id;\n\
    end;\n        procedure upd_trans_amt\n        (\n                p_trans_id \
    \     vw_trans.trans_id%type,\n                p_trans_amt     vw_trans.trans_amt%type\n\
    \        ) is\n        begin\n                update vw_trans\n              \
    \  set trans_amt = p_trans_amt\n                where trans_id = p_trans_id;\n\
    \        end;\nend;\n/\n```\n\n请注意，新过程被插入到包的开头，而不是末尾。如果你检查有效性，会得到以下结果：\n\n```sql\n\
    SQL> select status from user_objects where object_name = 'ADJUST';\n```\n\n```\n\
    STATUS\n-------\nINVALID\n```\n\n为什么函数 `ADJUST` 被失效了？有趣的是，如果你将该过程放在末尾，就不会使函数失效。这种看似奇怪行为的原因在于包解析版本中存根的放置位置。每个函数在包中都以一个存根的形式表示，并且存根的顺序与它们在包中的定义顺序一致。依赖组件通过其存根编号引用存根。当你在末尾添加函数或过程时，新组件会被赋予一个新的存根编号；现有组件的存根不受干扰，因此依赖对象不会失效。当你在顶部添加组件时，包内部的组件顺序发生变化，这会影响现有组件的存根编号。由于依赖组件引用的是存根编号，它们需要重新解析，因此会立即失效。\n\
    \n![images](img/square.jpg)\n\n**提示：** 为了避免在向包中添加新代码段时依赖对象失效，请将函数和过程等新组件添加到包规范和包体的**末尾**——而不是中间。这将保留包内部现有组件的存根编号，并且不会使其依赖项失效。\n\
    \n### 通过显式列引用避免无效化\n\n我将以另一个应影响你编码方式的重要特性来结束关于依赖模型的讨论。依赖跟踪检查列的更改。如果新添加的列未被使用，则依赖项不会失效。例如，考虑在存储代码中使用以下结构的情况。\n\
    \n```sql\nselect * into ... from test where ...;\ninsert into test1 values (...);\n\
    ```\n\n注意，这里没有列名。在第一种情况中，`*` 隐式选择了所有列。当你修改表添加新列时，即使你未在代码中使用该列，`*` 也会隐式引用那个新列，从而使存储代码失效。在第二种情况中，`insert`\
    \ 未指定列列表，因此默认认为所有列都被包含，在 `test1` 中添加新列将迫使该语句检查新列的值，从而强制存储代码失效。因此，你必须避免使用此类结构。你应该在存储代码中使用命名列。\n\
    \n此场景下导致失效的另一个原因是全包含的隐式定义列列表。一些开发人员在追求编写敏捷代码时，会使用这样的声明：\n\n```sql\ndeclare l_test1_rec\
    \ test1%rowtype;\n```\n\n由于未命名列列表，因此默认认为包含了 `test1` 的所有列。所以当你添加列时，会使变量 `l_test1_rec`\
    \ 失效，进而使存储代码失效。不要使用这样的声明。相反，应使用显式命名的列，如下所示：\n\n```sql\nl_trans_id      test1.trans_id%type;\n\
    l_trans_amt     test1.trans_amt%type;\n```\n\n这样，如果添加了新列，它不会影响任何已声明的变量，也不会使该存储代码失效。然而，在你做出决定之前，请理解非常重要的一点：使用\
    \ `%rowtype` 可能使代码维护更容易，因为你无需显式命名变量。另一方面，这样做会使代码更容易受到失效的影响。你应该根据自己的最佳判断来决定采用哪种方式。\n"
- fmt: "## Synonyms in Dependency Chains\n\nMost databases use synonyms, for good\
    \ reasons. Instead of using a fully qualified name like *`<SchemaName>.<TableName>`*,\
    \ it's always easier to create a synonym and use it instead. However, bear in\
    \ mind that a synonym is yet another object in the dependency chain and affects\
    \ the cascading invalidation. Suppose that synonym S1 is in the dependency chain,\
    \ as shown here:\n\n`P2` ![images](images/U002.jpg) `P1` ![images](images/U002.jpg)\
    \ `PACK1` ![images](images/U002.jpg) `PACK2` ![images](images/U002.jpg) `S1` ![images](images/U002.jpg)\
    \ `VW1` ![images](images/U002.jpg) `T1`\n\nIn almost all cases, synonyms do not\
    \ break the chain; they simply pass on the invalidations from their referenced\
    \ objects downstream, with one important exception. When you alter a synonym,\
    \ you have two choices.\n\n*   *Drop and recreate*: You would issue `drop synonym\
    \ s1; create synonym s1 as …`\n*   *Replace*: You would issue `create or replace\
    \ synonym s1 as …`\n\nThe difference may seem trivial, but the first approach\
    \ is a killer. When you drop a synonym, the downstream objects reference an invalid\
    \ object. In the dependency chain, all the objects starting with `PACK2` all the\
    \ way to `P2` will be invalidated. When you recreate the synonym, these objects\
    \ will be automatically recompiled at their next invocation, but not without consuming\
    \ some valuable CPU cycles and obtaining parse locks. The second approach does\
    \ not invalidate any of the dependents. When you change a synonym, never drop\
    \ and recreate it—replace it.\n\n![images](images/square.jpg) `Note` The `OR REPLACE`\
    \ syntax was introduced in recent versions of Oracle. Some of your application\
    \ scripts may still implement the older approach. You should actively seek and\
    \ change such scripts, modifying them to use the newer `CREATE OR REPLACE` syntax.\n\
    \n## Resource Locking\n\nChanges are a fact of life. Applications do change in\
    \ requirement and scope, forcing changes in stored code. The alteration of the\
    \ stored code needs an exclusive lock. If any session is currently executing that\
    \ object or another object that the changed object references, this exclusive\
    \ lock will not be available. Let's examine this with an example table and a procedure\
    \ that accesses this table:\n\n`create table test1 (col1 number, col2 number);`\n\
    \n`create or replace procedure p1`\n`(`\n`     p1_in in number,`\n`     p2_in\
    \ in number`\n`) as`\n`begin`\n`     update test1 set col2 = p2_in where col1\
    \ = p1_in;`\n`end;`\n`/`\n\nOnce created, execute the procedure. Do not exit from\
    \ the session.\n\n`SQL> exec p1 (1,1)`\n\n`PL/SQL procedure successfully completed.`\n\
    \nOn a different session, try to add a new column to the table.\n\n`SQL> alter\
    \ table test1 add (col3 number);`\n\nThe earlier update statement will have put\
    \ a transactional lock on the row of the table. The lock would be present even\
    \ if there is not a single row in the table `test1`. This lock will prevent the\
    \ alteration of the table. In Oracle 10g, this will error immediately with:\n\n\
    `alter table test1 add (col3 number)`\n`*`\n`ERROR at line 1:`\n`ORA-00054: resource\
    \ busy and acquire with NOWAIT specified`\n\nOn Oracle 11g, the `ALTER TABLE`\
    \ statement will not error out immediately; it will likely wait for a specified\
    \ time. If you check what the session is waiting on, you should get results like\
    \ the following:\n\n`SQL> select event from v$session where sid = <Sid>;`\n\n\
    `EVENT`\n`-----------------------`\n`blocking txn id for DDL`\n\nThis parameter\
    \ `ddl_lock_timeout` is very handy in busy databases where the tables are being\
    \ accessed by applications constantly so there is little or no downtime for the\
    \ altering command to complete. Rather than just exiting immediately with the\
    \ `ORA-54` message, an `ALTER TABLE` statement will wait until it gets the lock.\
    \ In the first session, if you issue a `rollback` or `commit`, which will end\
    \ the transaction and effectively release the locks, the second session will get\
    \ the lock on the table and will be able to alter the table. In the 10g case,\
    \ the statement will have to be reissued.\n\n## Forcing Dependency in Triggers\n\
    \nTriggers are an integral part of any application code. Since they are in the\
    \ domain of database, they are often considered outside of the application. Nothing\
    \ can be farther from truth; triggers that support business functionality are\
    \ application code and must be evaluated in the context of the overall application.\
    \ Triggers are automatically executed and associated with certain events such\
    \ as before insert or after alteration of table. When used properly, they offer\
    \ an excellent extension to the functionality of the application not controlled\
    \ by the user's action.\n\nBest practices in code design suggests that you modularize\
    \ your code (build small chunks of code that can be called multiple times instead\
    \ of creating a monolithic code). This accomplishes a lot of things, such as readability,\
    \ reusability of the code, ability to unit test, and much more. However, in the\
    \ case of triggers, this strategy poses a unique problem. You can define multiple\
    \ triggers on the table, but Oracle does not guarantee the execution order of\
    \ the triggers. The triggers of the same type can be fired at any order. If they\
    \ are truly independent of each other, it may not be a problem, but what if they\
    \ do depend on the data and one trigger may update the data used by the other\
    \ trigger? In that case, the order of execution is extremely important. If the\
    \ data-changing trigger fires after the trigger that consumes that data, then\
    \ the execution will not be as expected, resulting in potentially incorrect results.\
    \ Let's examine that scenario with an example. Consider the following table named\
    \ `PAYMENTS`:\n\n`Name              Null? Type`\n`  -------------- -------- --------------`\n\
    `PAY_ID                  NUMBER(10)`\n`CREDIT_CARD_NO          VARCHAR2(16)`\n\
    `AMOUNT                  NUMBER(13,2)`\n`PAY_MODE                VARCHAR2(1)`\n\
    `RISK_RATING             VARCHAR2(6)`\n`FOLLOW_UP               VARCHAR2(1)`\n\
    \nAssume there is only one row.\n\n`SQL> select * from payments;`\n\n`    PAY_ID\
    \ CREDIT_CARD_NO   AMOUNT P RISK_R F`\n`    ------ ---------------- ------ - ------\
    \ -`\n`         1`\n\nThe columns are all empty at first. The column `RISK_RATING`\
    \ is self explanatory; it shows the type of risk of that particular payment being\
    \ processed with valid values being `LOW` (payment amount less than 1,000), `MEDIUM`\
    \ (between 1,001 and 10,000) and `HIGH` (more than 10,000). Payments with higher\
    \ risks are meant to be followed up later by a manager. The company uses a standard\
    \ logic in defining the risk. Since this risk rating is meant to be assigned automatically,\
    \ a before update row trigger does the job well, as shown:\n\n```\ncreate or replace\
    \ trigger tr_pay_risk_rating\nbefore update\non payments\nfor each row\nbegin\n\
    \        dbms_output.put_line ('This is tr_pay_risk_rating');\n        if (:new.amount)\
    \ < 1000 then\n                :new.risk_rating := 'LOW';\n        elsif (:new.amount\
    \ < 10000) then\n                if (:new.pay_mode ='K') then\n              \
    \          :new.risk_rating := 'MEDIUM';\n                else\n             \
    \           :new.risk_rating := 'HIGH';\n                end if;\n        else\n\
    \                :new.risk_rating := 'HIGH';\n        end if;\nend;\n/\n```\n\n\
    The high risk payments were meant to be followed up, but with high workload of\
    \ managers, the company decides to follow up only certain types of high risk.\
    \ The follow-up should occur for `HIGH` risk payments to be paid with a credit\
    \ card or `MEDIUM` risk payments to be paid with cash. Also, credit cards from\
    \ a specific bank (which is showed by the second to sixth digit of the number)\
    \ are also to be followed up. A trigger is set up that automatically sets `FOLLOW_UP`\
    \ column to `Y` under those conditions, as shown:"
  raw: '### Synonyms in Dependency Chains


    Most databases use synonyms, for good reasons. Instead of using a fully qualified
    name like *`<SchemaName>.<TableName>`*, it''s always easier to create a synonym
    and use it instead. However, bear in mind that a synonym is yet another object
    in the dependency chain and affects the cascading invalidation. Suppose that synonym
    S1 is in the dependency chain, as shown here:


    `P2` ![images](images/U002.jpg) `P1` ![images](images/U002.jpg) `PACK1` ![images](images/U002.jpg)
    `PACK2` ![images](images/U002.jpg) `S1` ![images](images/U002.jpg) `VW1` ![images](images/U002.jpg)
    `T1`


    In almost all cases, synonyms do not break the chain; they simply pass on the
    invalidations from their referenced objects downstream, with one important exception.
    When you alter a synonym, you have two choices.


    *   *Drop and recreate*: You would issue `drop synonym s1; create synonym s1 as
    …`

    *   *Replace*: You would issue `create or replace synonym s1 as …`


    The difference may seem trivial, but the first approach is a killer. When you
    drop a synonym, the downstream objects reference an invalid object. In the dependency
    chain, all the objects starting with PACK2 all the way to P2 will be invalidated.
    When you recreate the synonym, these objects will be automatically recompiled
    at their next invocation, but not without consuming some valuable CPU cycles and
    obtaining parse locks. The second approach does not invalidate any of the dependents.
    When you change a synonym, never drop and recreate it—replace it.


    ![images](images/square.jpg) **Note** The OR REPLACE syntax was introduced in
    recent versions of Oracle. Some of your application scripts may still implement
    the older approach. You should actively seek and change such scripts, modifying
    them to use the newer CREATE OR REPLACE syntax.


    ### Resource Locking


    Changes are a fact of life. Applications do change in requirement and scope, forcing
    changes in stored code. The alteration of the stored code needs an exclusive lock.
    If any session is currently executing that object or another object that the changed
    object references, this exclusive lock will not be available. Let''s examine this
    with an example table and a procedure that accesses this table:


    `create table test1 (col1 number, col2 number);`


    `create or replace procedure p1`

    `(`

    `     p1_in in number,`

    `     p2_in in number`

    `) as`

    `begin`

    `     update test1 set col2 = p2_in where col1 = p1_in;`

    `end;`

    `/`


    Once created, execute the procedure. Do not exit from the session.


    `SQL> exec p1 (1,1)`


    `PL/SQL procedure successfully completed.`


    On a different session, try to add a new column to the table.


    `SQL> alter table test1 add (col3 number);`


    The earlier update statement will have put a transactional lock on the row of
    the table. The lock would be present even if there is not a single row in the
    table test1\. This lock will prevent the alteration of the table. In Oracle 10g,
    this will error immediately with:


    `alter table test1 add (col3 number)`

    `*`

    `ERROR at line 1:`

    `ORA-00054: resource busy and acquire with NOWAIT specified`


    On Oracle 11g, the ALTER TABLE statement will not error out immediately; it will
    likely wait for a specified time. If you check what the session is waiting on,
    you should get results like the following:


    `SQL> select event from v$session where sid = <Sid>;`


    `EVENT`

    `-----------------------`

    `blocking txn id for DDL`


    This parameter ddl_lock_timeout is very handy in busy databases where the tables
    are being accessed by applications constantly so there is little or no downtime
    for the altering command to complete. Rather than just exiting immediately with
    the ORA-54 message, an ALTER TABLE statement will wait until it gets the lock.
    In the first session, if you issue a rollback or commit, which will end the transaction
    and effectively release the locks, the second session will get the lock on the
    table and will be able to alter the table. In the 10g case, the statement will
    have to be reissued.


    ### Forcing Dependency in Triggers


    Triggers are an integral part of any application code. Since they are in the domain
    of database, they are often considered outside of the application. Nothing can
    be farther from truth; triggers that support business functionality are application
    code and must be evaluated in the context of the overall application. Triggers
    are automatically executed and associated with certain events such as before insert
    or after alteration of table. When used properly, they offer an excellent extension
    to the functionality of the application not controlled by the user''s action.


    Best practices in code design suggests that you modularize your code (build small
    chunks of code that can be called multiple times instead of creating a monolithic
    code). This accomplishes a lot of things, such as readability, reusability of
    the code, ability to unit test, and much more. However, in the case of triggers,
    this strategy poses a unique problem. You can define multiple triggers on the
    table, but Oracle does not guarantee the execution order of the triggers. The
    triggers of the same type can be fired at any order. If they are truly independent
    of each other, it may not be a problem, but what if they do depend on the data
    and one trigger may update the data used by the other trigger? In that case, the
    order of execution is extremely important. If the data-changing trigger fires
    after the trigger that consumes that data, then the execution will not be as expected,
    resulting in potentially incorrect results. Let''s examine that scenario with
    an example. Consider the following table named PAYMENTS:


    `Name              Null? Type`

    ` -------------- -------- --------------`

    `PAY_ID                  NUMBER(10)`

    `CREDIT_CARD_NO          VARCHAR2(16)`

    `AMOUNT                  NUMBER(13,2)`

    `PAY_MODE                VARCHAR2(1)`

    `RISK_RATING             VARCHAR2(6)`

    `FOLLOW_UP               VARCHAR2(1)`


    Assume there is only one row.


    `SQL> select * from payments;`


    `    PAY_ID CREDIT_CARD_NO   AMOUNT P RISK_R F`

    `    ------ ---------------- ------ - ------ -`

    `         1`


    The columns are all empty at first. The column RISK_RATING is self explanatory;
    it shows the type of risk of that particular payment being processed with valid
    values being LOW (payment amount less than 1,000), MEDIUM (between 1,001 and 10,000)
    and HIGH (more than 10,000). Payments with higher risks are meant to be followed
    up later by a manager. The company uses a standard logic in defining the risk.
    Since this risk rating is meant to be assigned automatically, a before update
    row trigger does the job well, as shown:


    `create or replace trigger tr_pay_risk_rating`

    `before update`

    `on payments`

    `for each row`

    `begin`

    `        dbms_output.put_line (''This is tr_pay_risk_rating'');`

    `        if (:new.amount) < 1000 then`

    `                :new.risk_rating := ''LOW'';`

    `        elsif (:new.amount < 10000) then`

    `                if (:new.pay_mode =''K'') then`

    `                        :new.risk_rating := ''MEDIUM'';`

    `                else`

    `                        :new.risk_rating := ''HIGH'';`

    `                end if;`

    `        else`

    `                :new.risk_rating := ''HIGH'';`

    `        end if;`

    `end;`

    `/`


    The high risk payments were meant to be followed up, but with high workload of
    managers, the company decides to follow up only certain types of high risk. The
    follow-up should occur for HIGH risk payments to be paid with a credit card or
    MEDIUM risk payments to be paid with cash. Also, credit cards from a specific
    bank (which is showed by the second to sixth digit of the number) are also to
    be followed up. A trigger is set up that automatically sets FOLLOW_UP column to
    Y under those conditions, as shown:'
  trans: "## Synonyms in Dependency Chains\n\n大多数数据库都使用同义词，这是有充分理由的。与其使用完全限定名称如 *`<SchemaName>.<TableName>`*，创建一个同义词并使用它总是更简单。但请记住，同义词是依赖链中的另一个对象，并会影响级联失效。假设同义词\
    \ S1 位于依赖链中，如下所示：\n\n`P2` ![图片](img/U002.jpg) `P1` ![图片](img/U002.jpg) `PACK1`\
    \ ![图片](img/U002.jpg) `PACK2` ![图片](img/U002.jpg) `S1` ![图片](img/U002.jpg) `VW1`\
    \ ![图片](img/U002.jpg) `T1`\n\n在几乎所有情况下，同义词不会中断链条；它们只是简单地将其引用的对象的失效信息向下游传递，但有一个重要的例外。当你修改一个同义词时，你有两种选择。\n\
    \n*   *删除并重新创建*：你会执行 `drop synonym s1; create synonym s1 as …`\n*   *替换*：你会执行\
    \ `create or replace synonym s1 as …`\n\n这两种方式的区别可能看起来微不足道，但第一种方法是致命的。当你删除一个同义词时，下游对象引用的就是一个无效对象。在依赖链中，从\
    \ `PACK2` 一直到 `P2` 的所有对象都将被失效。当你重新创建同义词时，这些对象将在下次调用时自动重新编译，但这并非没有代价——会消耗一些宝贵的\
    \ CPU 周期并获取解析锁。第二种方法不会使任何依赖对象失效。当你修改同义词时，切勿删除并重新创建它——请替换它。\n\n![图片](img/square.jpg)\
    \ `注意` `OR REPLACE` 语法是在 Oracle 的近期版本中引入的。你的一些应用程序脚本可能仍在使用旧的方法。你应该主动寻找并修改这些脚本，将其改为使用更新的\
    \ `CREATE OR REPLACE` 语法。\n\n## Resource Locking\n\n变化是生活的常态。应用程序的需求和范围会发生变化，从而迫使存储代码发生改变。修改存储代码需要独占锁。如果当前有任何会话正在执行该对象或该更改对象所引用的另一个对象，这个独占锁将不可用。让我们用一个示例表和一个访问该表的存储过程来检验这一点：\n\
    \n`create table test1 (col1 number, col2 number);`\n\n`create or replace procedure\
    \ p1`\n`(`\n`     p1_in in number,`\n`     p2_in in number`\n`) as`\n`begin`\n\
    `     update test1 set col2 = p2_in where col1 = p1_in;`\n`end;`\n`/`\n\n创建完成后，执行该过程。不要退出该会话。\n\
    \n`SQL> exec p1 (1,1)`\n\n`PL/SQL procedure successfully completed.`\n\n在另一个会话中，尝试向该表添加一个新列。\n\
    \n`SQL> alter table test1 add (col3 number);`\n\n之前的 update 语句会对表中的一行施加一个事务锁。即使表\
    \ `test1` 中没有任何一行数据，这个锁也会存在。这个锁将阻止表的修改操作。在 Oracle 10g 中，这会立即报错：\n\n`alter table\
    \ test1 add (col3 number)`\n`*`\n`ERROR at line 1:`\n`ORA-00054: resource busy\
    \ and acquire with NOWAIT specified`\n\n在 Oracle 11g 中，`ALTER TABLE` 语句不会立即报错；它很可能会等待指定的时间。如果你检查该会话正在等待什么，你应该会得到类似以下的结果：\n\
    \n`SQL> select event from v$session where sid = <Sid>;`\n\n`EVENT`\n`-----------------------`\n\
    `blocking txn id for DDL`\n\n这个 `ddl_lock_timeout` 参数在繁忙的数据库中非常方便，这些数据库中的表被应用程序持续访问，因此几乎没有停机时间让修改命令完成。`ALTER\
    \ TABLE` 语句不会立即以 `ORA-54` 错误退出，而是会等待直到获取到锁。在第一个会话中，如果你执行 `rollback` 或 `commit`，这将结束事务并有效地释放锁，第二个会话将获取到表上的锁，并能够修改该表。在\
    \ 10g 的情况下，该语句必须重新发出。\n\n## Forcing Dependency in Triggers\n\n触发器是任何应用程序代码中不可或缺的一部分。由于它们属于数据库范畴，因此常被视为应用程序之外的东西。但事实绝非如此；支持业务功能的触发器就是应用程序代码的一部分，必须在整个应用程序的上下文中进行评估。触发器会自动执行，并与某些事件相关联，例如在插入前或表更改后。如果使用得当，它们为应用程序的功能提供了一种极好的扩展，而这些功能不受用户操作的控制。\n\
    \n代码设计的最佳实践建议你将代码模块化（构建可以被多次调用的小代码块，而不是创建一个庞大的单体代码）。这能实现许多目标，例如可读性、代码的可重用性、单元测试的能力等等。然而，对于触发器来说，这种策略带来了一个独特的问题。你可以在表上定义多个触发器，但\
    \ Oracle 不保证触发器的执行顺序。相同类型的触发器可以按任何顺序触发。如果它们彼此之间完全独立，这可能不是问题，但如果它们确实依赖于数据，并且一个触发器可能更新另一个触发器使用的数据呢？在这种情况下，执行顺序就极其重要。如果更改数据的触发器在使用该数据的触发器之后触发，那么执行结果将不如预期，可能导致不正确的结果。让我们用一个例子来检验这种情况。考虑以下名为\
    \ `PAYMENTS` 的表：\n\n`Name              Null? Type`\n`  -------------- --------\
    \ --------------`\n`PAY_ID                  NUMBER(10)`\n`CREDIT_CARD_NO     \
    \     VARCHAR2(16)`\n`AMOUNT                  NUMBER(13,2)`\n`PAY_MODE       \
    \         VARCHAR2(1)`\n`RISK_RATING             VARCHAR2(6)`\n`FOLLOW_UP    \
    \           VARCHAR2(1)`\n\n假设其中只有一行数据。\n\n`SQL> select * from payments;`\n\n\
    `    PAY_ID CREDIT_CARD_NO   AMOUNT P RISK_R F`\n`    ------ ----------------\
    \ ------ - ------ -`\n`         1`\n\n这些列最初都是空的。`RISK_RATING` 列的含义不言自明；它显示了处理该特定支付时的风险类型，有效值为\
    \ `LOW`（支付金额低于 1,000）、`MEDIUM`（介于 1,001 和 10,000 之间）和 `HIGH`（超过 10,000）。风险较高的支付需要由经理稍后跟进。公司使用标准逻辑来定义风险。由于此风险评级需要自动分配，一个\
    \ `before update row` 触发器可以很好地完成这项工作，如下所示：\n\n```\ncreate or replace trigger tr_pay_risk_rating\n\
    before update\non payments\nfor each row\nbegin\n        dbms_output.put_line\
    \ ('This is tr_pay_risk_rating');\n        if (:new.amount) < 1000 then\n    \
    \            :new.risk_rating := 'LOW';\n        elsif (:new.amount < 10000) then\n\
    \                if (:new.pay_mode ='K') then\n                        :new.risk_rating\
    \ := 'MEDIUM';\n                else\n                        :new.risk_rating\
    \ := 'HIGH';\n                end if;\n        else\n                :new.risk_rating\
    \ := 'HIGH';\n        end if;\nend;\n/\n```\n\n高风险支付原本需要被跟进，但由于经理工作量大，公司决定只跟进某些类型的高风险支付。跟进应针对使用信用卡支付的\
    \ `HIGH` 风险支付，或使用现金支付的 `MEDIUM` 风险支付。此外，来自特定银行（由卡号的第二到第六位数字表示）的信用卡支付也需要被跟进。现在设置了一个触发器，在这些条件下自动将\
    \ `FOLLOW_UP` 列设置为 `Y`，如下所示："
- fmt: "# 触发器执行顺序的重要性\n\n## 问题再现\n\n考虑以下触发器 `tr_pay_follow_up`：\n\n```sql\ncreate\
    \ or replace trigger tr_pay_follow_up\nbefore update\non payments\nfor each row\n\
    begin\n        dbms_output.put_line ('This is tr_pay_follow_up');\n        if\
    \ (\n                (:new.risk_rating = 'HIGH' and :new.pay_mode = 'C')\n   \
    \             or (:new.risk_rating = 'MEDIUM' and :new.pay_mode = 'K')\n     \
    \           or (substr(:new.credit_card_no,2,5) = '23456')\n        ) then\n \
    \               :new.follow_up := 'Y';\n        else\n                :new.follow_up\
    \ := 'N';\n        end if;\nend;\n/\n```\n\n我特意放置了 `dbms_output` 行来显示触发器的执行情况。创建这两个触发器后，对表执行更新操作。\n\
    \n```sql\nupdate payments\nset credit_card_no = '1234567890123456',\n    amount\
    \ = 100000,\n    pay_mode = 'K';\n```\n\n输出如下：\n\n```\nThis is tr_pay_follow_up\n\
    This is tr_pay_risk_rating\n1 row updated.\n```\n\n之后，从表中查询数据。\n\n```sql\nSQL>\
    \ select * from payments;\n```\n\n```\n    PAY_ID CREDIT_CARD_NO   AMOUNT P RISK_R\
    \ F\n    ------ ---------------- ------ - ------ -\n         1 1234567890123456\
    \ 100000 K HIGH   N\n```\n\n检查上述输出，您会注意到付款金额超过了10,000——这是 `RISK_RATING` 为 `HIGH`\
    \ 的条件。触发器计算了该条件并正确设置了值。付款方式是现金（`PAY_MODE` 设置为 `K`），金额是100,000，信用卡号也匹配了模式“23456”——这些都是\
    \ `FOLLOW_UP` 应为“Y”的条件；但结果却是“N”。难道触发器没有触发吗？不，它触发了，您在执行更新语句后的输出中看到了“`This is tr_pay_follow_up`”。如果触发器触发了，为什么没有正确设置值呢？\n\
    \n答案在于触发器的执行顺序。请注意执行更新语句后的输出。第一个触发的是 `tr_pay_follow_up`；而不是 `tr_pay_risk_rating`。当触发器触发时，所有列的值都满足\
    \ `follow_up` 的条件，但 `RISK_RATING` 是 `NULL`。因此，触发器没有找到满足 `follow-up` 条件的行。当另一个触发器触发后，它正确设置了\
    \ `RISK_RATING` 列，但此时前一个触发器已经执行完毕，不会再次执行。然而，如果触发器的执行顺序相反（风险评级触发器在前，跟进触发器在后），情况就会如您所预期的那样。\n\
    \n这是一个很好的例子，说明了触发器执行顺序对应用程序逻辑至关重要。显然，当前示例会被视为应用程序代码中的一个错误。更糟糕的是，这个场景无法随意重现；有时执行顺序符合预期，有时则相反。如果您有大量的此类触发器，出现错误的可能性会更高。\n\
    \n您可以通过将所有代码放在单个更新前行触发器中来控制执行代码，从而解决此问题。您可以为每个触发器逻辑创建单独的过程，并在单个更新前行触发器中调用它们。这可能有效，但并不建议，因为您只有一个触发器。如果您想禁用其中一个触发器的功能怎么办？如果有多个触发器，您只需禁用该触发器，并在需要时重新启用。\n\
