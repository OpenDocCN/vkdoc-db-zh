    \ 20  /\n\nPL/SQL procedure successfully completed.\n\nSQL> exec dbms_hprof.stop_profiling\n\
    \nPL/SQL procedure successfully completed.\n```\n\n要分析生成的配置文件，你可以在 `DBMS_HPROF.ANALYZE`\
    \ 中使用相同的未文档化参数（它将字节输出存储在 `DBMSHP_PARENT_CHILD_INFO` 的 `_TIME` 列中），或者将参数 `-pga`\
    \ 或 `-uga` 传递给 `plshprof`。\n\n```sql\noracle@af230d:af230d > $ORACLE_HOME/bin/plshprof\
    \ -uga -output hprofuga hprofuga\nPLSHPROF: Oracle Database 11g Enterprise Edition\
    \ Release 11.2.0.2.0 - 64bit Production\n[10 symbols processed]\n[Report written\
    \ to 'hprofuga.html']\n```\n\n这会生成一个 HTML 报告，如 图 11-5 所示。\n\n![images](img/1105.jpg)\n\
    \n*图 11-5. UGA 分配与释放内存分析*\n\n该配置文件显示了 UGA 内存的分配和释放，而不是 UGA 内部的分配和释放。通过使用 `truss`\
    \ 或类似工具跟踪 OS 调用可以收集到可比较的信息。请记住，层次分析器的这种用法是未文档化的，并且不受 Oracle 支持。\n\n我遇到过几次 Oracle\
    \ 动态性能视图报告的内存与操作系统报告的数字不对应的情况。如果你遇到内存问题，也值得检查一下操作系统。分析进程内存错误的帮助可以在 MOS Notes 1088267.1\
    \ 和 396940.1 中找到。\n\n`V$SYSSTAT` 和 `V$SESSTAT` 的历史 PGA 和 UGA 快照值可以在工作负载仓库和 Statspack\
    \ 视图 `DBA_HIST_SYSSTAT`、`PERFSTAT.STATS$SESSTAT` 和 `PERFSTAT.STATS$SYSSTAT` 中找到。根据我的经验，这些信息不足以分析问题。因此，值得在外部循环中检查长时间运行的进程的内存使用情况，如果超过指定的阈值，则记录详细信息。如果可能，进程应定期重新启动自身，以从内存泄漏和未释放的锁中恢复。"
- fmt: "#### Collections\n\nBecause collections usually consume the majority of the\
    \ PL/SQL memory, it is important to understand how memory is allocated for them\
    \ and how to reduce their footprint. Oracle does not document the implementation\
    \ of collections to allow for modifications in future releases. Therefore, you\
    \ must measure the memory allocation yourself and be aware that information gathered\
    \ this way may be rendered obsolete by a future Oracle release.\n\nMany data types\
    \ use up to double the space on 64bit versions of Oracle as compared to the 32bit\
    \ versions. My measurements were made on Solaris 10 x86-64.\n\nI illustrate the\
    \ following points that may be relevant for your coding with associative arrays\
    \ indexed by `pls_integer`:\n\n*   Associative arrays have an overhead of roughly\
    \ 27 bytes for the key. This overhead is significant for an array of `pls_integer`\
    \ or `Boolean`, but not for a larger payload (such as a complex record or a large\
    \ string). In most cases it is better in terms of memory usage, performance, and\
    \ conceptual clarity to use an associative array of a record instead of several\
    \ associative arrays of basic types as in `dbms_session.get_package_memory_utilization`.\
    \ With out-of-line allocation of the payload, the total overhead per element may\
    \ be significantly larger than the 30 bytes for the key.\n*   Space for roughly\
    \ 20 consecutive indices is allocated at once. Thus, in terms of memory usage\
    \ and performance, it is better to use consecutive indices.\n*   As of 11.2.0.2,\
    \ memory is freed for other usage or returned to the OS only upon deletion of\
    \ the last element of an array. This holds true for the keys and small payloads\
    \ stored inline. Memory for large payloads that are stored out of line is usually\
    \ freed immediately.\n*   There may be a benefit in defining elements, such as\
    \ `varchar2`, only as large as needed to avoid overallocation.\n\nAssociative\
    \ arrays indexed by `varchar2` differ in all but the last point. The overhead\
    \ of the key is larger and depends on the actual length of the string. Space is\
    \ allocated for only one element at a time and, in some cases, freed immediately\
    \ upon deletion. Furthermore, arrays indexed by `varchar2` are significantly slower\
    \ than their counterparts indexed by `pls_integer`.\n\nIn terms of memory usage\
    \ and performance, there is no benefit in using other collection types (namely\
    \ `varrays` and nested tables).\n\nSo let me prove the above claims with the following\
    \ procedure. I use conditional compilation to vary the length of the strings in\
    \ the collection and to use the procedure with different collection types.\n\n\
    ```sql\ncreate or replace procedure coll_mem_usage(\n  i_step                \
    \         pls_integer := 1\n ,i_elem_cnt                     pls_integer := 1000000\n\
    )\nis\n  $IF $$COLL_TYPE = 0 $THEN\n  type t_char_tab is table of varchar2($$string_len)\
    \ index by pls_integer;\n  $ELSIF $$COLL_TYPE = 1 $THEN\n  type t_char_tab is\
    \ table of varchar2($$string_len) index by varchar2(10);\n  $ELSIF $$COLL_TYPE\
    \ = 2 $THEN\n  type t_char_tab is table of varchar2($$string_len);\n  $ELSIF $$COLL_TYPE\
    \ = 3 $THEN\n  type t_char_tab is varray(2147483647) of varchar2($$string_len);\n\
    \  $END\n  c_string_len      constant pls_integer := $$string_len;\n  l_str  \
    \           constant varchar2($$string_len) := lpad('x', c_string_len, 'x');\n\
    \  l_list                     t_char_tab;\n\n  ------------------------------------------------------------------------------\n\
    \  procedure print_plsql_used_session_mem(\n    i_label                  varchar2\n\
    \  )\n  is\n    l_used                   number;\n  begin\n    $IF DBMS_DB_VERSION.VERSION\
    \ < 11 $THEN\n    select pr.pga_used_mem\n    $ELSE\n    select pm.used\n    $END\n\
    \    into   l_used\n    from   v$session        se\n          ,v$process     \
    \   pr\n          ,v$process_memory pm\n    where  se.sid      = sys_context('userenv',\
    \ 'sid')\n       and se.paddr    = pr.addr\n       and pr.pid      = pm.pid\n\
    \       and pm.category = 'PL/SQL';\n    dbms_output.put_line(rpad(i_label, 18)\
    \ || ' PL/SQL used '\n                         || to_char(round(l_used / 1024),\
    \ '999G999G999') || ' KB');\n  end print_plsql_used_session_mem;\nbegin\n  --\
    \ INIT --\n  dbms_output.put_line(i_elem_cnt || ' elements of length ' || c_string_len\
    \ || ' step '\n                       || i_step || ' type ' || $$coll_type);\n\
    \  print_plsql_used_session_mem('Init');\n\n  -- ALLOCATE ELEMENTS --\n  $IF $$COLL_TYPE\
    \ = 2 OR $$COLL_TYPE = 3 $THEN /* NESTED TABLE, VARRAY */\n  l_list := t_char_tab();\n\
    \  l_list.extend(i_elem_cnt * i_step);\n  $END\n  for i in 1..i_elem_cnt loop\n\
    \    l_list(i * i_step) := l_str;\n  end loop;\n  print_plsql_used_session_mem('Allocated');\n\
    \n  -- REMOVE ALL BUT 1 ELEMENT --\n  for i in 2..i_elem_cnt loop\n    $IF $$COLL_TYPE\
    \ != 3 $THEN /* ASSOCIATIVE ARRAYS, NESTED TABLE */\n    l_list.delete(i * i_step);\n\
    \    $ELSE /* NO SINGLE ELEMENT DELETE IN VARRAY */\n    l_list(i * i_step) :=\
    \ null;\n    $END\n  end loop;\n  print_plsql_used_session_mem('1 element left');\n\
    \n  -- ADD ANOTHER c_element_cnt ELEMENTS --\n  $IF $$COLL_TYPE = 2 OR $$COLL_TYPE\
    \ = 3 $THEN /* NESTED TABLE, VARRAY */\n  l_list.extend(i_elem_cnt * i_step);\n\
    \  $END\n  for i in (i_elem_cnt + 1)..(2 * i_elem_cnt) loop\n    l_list(i * i_step)\
    \ := l_str;\n  end loop;\n  print_plsql_used_session_mem('Allocated on top');\n\
    \n  -- DELETE ALL --\n  l_list.delete;\n  print_plsql_used_session_mem('All deleted');\
    \  \nend coll_mem_usage;\n```\n\nThe procedure is invalid upon creation. It needs\
    \ to be compiled with valid conditional compilation flags, such as collection\
    \ type \"associative array index by pls_integer\", denoted by `coll_type` equal\
    \ to 0, and `string_len` 10.\n\n```sql\nSQL> alter procedure coll_mem_usage compile\
    \ plsql_ccflags='coll_type:0,string_len:10';\n\nProcedure altered.\n```\n\nThe\
    \ valid procedure can be executed.\n\n```sql\nSQL> exec coll_mem_usage\n1000000\
    \ elements of length 10 step 1 type 0\nInit               PL/SQL used        \
    \    0 KB\nAllocated          PL/SQL used       36,144 KB\n1 element left    \
    \ PL/SQL used       36,144 KB\nAllocated on top   PL/SQL used       72,272 KB\n\
    All deleted        PL/SQL used           16 KB\n\nPL/SQL procedure successfully\
    \ completed.\n```\n\nThis output shows that the overhead for the key is 27 bytes.\
    \ 36,144 KB divided by 1,000,000 entries gives 37 bytes per entry, of which 10\
    \ bytes are used by the string array element. Deleting all but one element doesn't\
    \ free up any space, as shown by the column “1 element left” being unchanged from\
    \ the column “Allocated.” New elements cannot reuse the space of deleted elements,\
    \ as show by “Allocated on top” doubling the used memory.\n\n[Table 11-2](#Chapter11.html#tab_11_2)\
    \ summarizes the results of running the procedure with different parameters. The\
    \ second row shows that by using only every tenth index, ten times as much memory\
    \ is used. Increasing the step further would show that space for about twenty\
    \ consecutive elements is allocated at once.\n\nWith a string length of 100, the\
    \ strings are allocated out of line and the freed memory of the strings, but not\
    \ the indices, can be reused as shown on the third row. In this case, there is\
    \ an overhead and alignment loss of 37 bytes per entry for the out-of-line storage.\n\
    \nFor consecutive indices, associative arrays indexed by `varchar2` are six times\
    \ slower and use more than double the memory than their `pls_integer` counterparts.\
    \ On the other hand, their memory usage is independent of the step.\n\nThe memory\
    \ usage and performance of nested table and varrays is roughly the same as for\
    \ associative arrays index by `pls_integer`.\n\n![images](images/t1102.jpg)"
  raw: '#### Collections


    Because collections usually consume the majority of the PL/SQL memory, it is important
    to understand how memory is allocated for them and how to reduce their footprint.
    Oracle does not document the implementation of collections to allow for modifications
    in future releases. Therefore, you must measure the memory allocation yourself
    and be aware that information gathered this way may be rendered obsolete by a
    future Oracle release.


    Many data types use up to double the space on 64bit versions of Oracle as compared
    to the 32bit versions. My measurements were made on Solaris 10 x86-64.


    I illustrate the following points that may be relevant for your coding with associative
    arrays indexed by pls_integer:


    *   Associative arrays have an overhead of roughly 27 bytes for the key. This
    overhead is significant for an array of pls_integer or Boolean, but not for a
    larger payload (such as a complex record or a large string). In most cases it
    is better in terms of memory usage, performance, and conceptual clarity to use
    an associative array of a record instead of several associative arrays of basic
    types as in dbms_session.get_package_memory_utilization. With out-of-line allocation
    of the payload, the total overhead per element may be significantly larger than
    the 30 bytes for the key.

    *   Space for roughly 20 consecutive indices is allocated at once. Thus, in terms
    of memory usage and performance, it is better to use consecutive indices.

    *   As of 11.2.0.2, memory is freed for other usage or returned to the OS only
    upon deletion of the last element of an array. This holds true for the keys and
    small payloads stored inline. Memory for large payloads that are stored out of
    line is usually freed immediately.

    *   There may be a benefit in defining elements, such as varchar2, only as large
    as needed to avoid overallocation.


    Associative arrays indexed by varchar2 differ in all but the last point. The overhead
    of the key is larger and depends on the actual length of the string. Space is
    allocated for only one element at a time and, in some cases, freed immediately
    upon deletion. Furthermore, arrays indexed by varchar2 are significantly slower
    than their counterparts indexed by pls_integer.


    In terms of memory usage and performance, there is no benefit in using other collection
    types (namely varrays and nested tables).


    So let me prove the above claims with the following procedure. I use conditional
    compilation to vary the length of the strings in the collection and to use the
    procedure with different collection types.


    `create or replace procedure coll_mem_usage(`

    `  i_step                     pls_integer := 1`

    ` ,i_elem_cnt                 pls_integer := 1000000`

    `)`

    `is`

    `  $IF $$COLL_TYPE = 0 $THEN`

    `  type t_char_tab is table of varchar2($$string_len) index by pls_integer;`

    `  $ELSIF $$COLL_TYPE = 1 $THEN`

    `  type t_char_tab is table of varchar2($$string_len) index by varchar2(10);`

    `  $ELSIF $$COLL_TYPE = 2 $THEN`

    `  type t_char_tab is table of varchar2($$string_len);`

    `  $ELSIF $$COLL_TYPE = 3 $THEN`

    `  type t_char_tab is varray(2147483647) of varchar2($$string_len);`

    `  $END`

    `  c_string_len      constant pls_integer := $$string_len;`

    `  l_str             constant varchar2($$string_len) := lpad(''x'', c_string_len,
    ''x'');`

    `  l_list                     t_char_tab;`


    `  ------------------------------------------------------------------------------`

    `  procedure print_plsql_used_session_mem(`

    `    i_label                  varchar2`

    `  )`

    `  is`

    `    l_used                   number;`

    `  begin`

    `    $IF DBMS_DB_VERSION.VERSION < 11 $THEN`

    `    select pr.pga_used_mem`

    `    $ELSE`

    `    select pm.used`

    `    $END`

    `    into   l_used`

    `    from   v$session        se`

    `          ,v$process        pr`

    `          ,v$process_memory pm`

    `    where  se.sid      = sys_context(''userenv'', ''sid'')`

    `       and se.paddr    = pr.addr`

    `       and pr.pid      = pm.pid`

    `       and pm.category = ''PL/SQL'';`

    `    dbms_output.put_line(rpad(i_label, 18) || '' PL/SQL used ''`

    `                         || to_char(round(l_used / 1024), ''999G999G999'') ||
    '' KB'');`

    `  end print_plsql_used_session_mem;`

    `begin`

    `  -- INIT --`

    `  dbms_output.put_line(i_elem_cnt || '' elements of length '' || c_string_len
    || '' step ''`

    `                       || i_step || '' type '' || $$coll_type);`

    `  print_plsql_used_session_mem(''Init'');`


    `  -- ALLOCATE ELEMENTS --`

    `  $IF $$COLL_TYPE = 2 OR $$COLL_TYPE = 3 $THEN /* NESTED TABLE, VARRAY */`

    `  l_list := t_char_tab();`

    `  l_list.extend(i_elem_cnt * i_step);`

    `  $END`

    `  for i in 1..i_elem_cnt loop`

    `    l_list(i * i_step) := l_str;`

    `  end loop;`

    `  print_plsql_used_session_mem(''Allocated'');`


    `  -- REMOVE ALL BUT 1 ELEMENT --`

    `  for i in 2..i_elem_cnt loop`

    `    $IF $$COLL_TYPE != 3 $THEN /* ASSOCIATIVE ARRAYS, NESTED TABLE */`

    `    l_list.delete(i * i_step);`

    `    $ELSE /* NO SINGLE ELEMENT DELETE IN VARRAY */`

    `    l_list(i * i_step) := null;`

    `    $END`

    `  end loop;`

    `  print_plsql_used_session_mem(''1 element left'');`


    `  -- ADD ANOTHER c_element_cnt ELEMENTS --`

    `  $IF $$COLL_TYPE = 2 OR $$COLL_TYPE = 3 $THEN /* NESTED TABLE, VARRAY */`

    `  l_list.extend(i_elem_cnt * i_step);`

    `  $END`

    `  for i in (i_elem_cnt + 1)..(2 * i_elem_cnt) loop`

    `    l_list(i * i_step) := l_str;`

    `  end loop;`

    `  print_plsql_used_session_mem(''Allocated on top'');`


    `  -- DELETE ALL --`

    `  l_list.delete;`

    `  print_plsql_used_session_mem(''All deleted'');  `

    `end coll_mem_usage;`


    The procedure is invalid upon creation. It needs to be compiled with valid conditional
    compilation flags, such as collection type “associative array index by pls_integer”,
    denoted by coll_type equal to 0, and string_len 10.


    `SQL> alter procedure coll_mem_usage compile plsql_ccflags=''coll_type:0,string_len:10'';`


    `Procedure altered.`


    The valid procedure can be executed.


    `SQL> exec coll_mem_usage`

    `1000000 elements of length 10 step 1 type 0`

    `Init               PL/SQL used            0 KB`

    `Allocated          PL/SQL used       36,144 KB`

    `1 element left     PL/SQL used       36,144 KB`

    `Allocated on top   PL/SQL used       72,272 KB`

    `All deleted        PL/SQL used           16 KB`


    `PL/SQL procedure successfully completed.`


    This output shows that the overhead for the key is 27 bytes. 36,144 KB divided
    by 1,000,000 entries gives 37 bytes per entry, of which 10 bytes are used by the
    string array element. Deleting all but one element doesn''t free up any space,
    as shown by the column “1 element left” being unchanged from the column “Allocated.”
    New elements cannot reuse the space of deleted elements, as show by “Allocated
    on top” doubling the used memory.


    [Table 11-2](#Chapter11.html#tab_11_2) summarizes the results of running the procedure
    with different parameters. The second row shows that by using only every tenth
    index, ten times as much memory is used. Increasing the step further would show
    that space for about twenty consecutive elements is allocated at once.


    With a string length of 100, the strings are allocated out of line and the freed
    memory of the strings, but not the indices, can be reused as shown on the third
    row. In this case, there is an overhead and alignment loss of 37 bytes per entry
    for the out-of-line storage.


    For consecutive indices, associative arrays indexed by varchar2 are six times
    slower and use more than double the memory than their pls_integer counterparts.
    On the other hand, their memory usage is independent of the step.


    The memory usage and performance of nested table and varrays is roughly the same
    as for associative arrays index by pls_integer.


    ![images](images/t1102.jpg)'
  trans: "\n#### 集合\n\n由于集合通常消耗大部分 PL/SQL 内存，因此了解如何为其分配内存以及如何减少其内存占用至关重要。Oracle 并未公开集合的实现细节，以便在未来版本中进行修改。因此，您必须自行测量内存分配情况，并注意通过这种方式收集的信息可能会因未来的\
    \ Oracle 版本而过时。\n\n许多数据类型在 Oracle 的 64 位版本上使用的空间比 32 位版本多出近一倍。我的测量是在 Solaris 10\
    \ x86-64 系统上进行的。\n\n我阐述以下几点，它们可能与您使用以 `pls_integer` 索引的关联数组进行编码时相关：\n\n*   关联数组的键（key）有大约\
    \ 27 字节的开销。对于 `pls_integer` 或 `Boolean` 数组来说，这个开销很显著，但对于更大的有效载荷（例如复杂记录或大字符串）则不然。在大多数情况下，就内存使用、性能和概念清晰度而言，使用记录的关联数组比使用多个基本类型的关联数组（如\
    \ `dbms_session.get_package_memory_utilization` 中那样）更好。对于行外分配的有效载荷，每个元素的总开销可能显著大于键的\
    \ 30 字节。\n*   空间是按大约 20 个连续索引一次性分配的。因此，就内存使用和性能而言，使用连续索引更好。\n*   从 11.2.0.2 版本开始，内存仅在删除数组的最后一个元素时才会被释放以供其他用途或返回给操作系统。这对于键和行内存储的小有效载荷都成立。行外存储的大有效载荷的内存通常立即释放。\n\
    *   将元素（例如 `varchar2`）定义得仅满足所需大小可能有好处，以避免过度分配。\n\n以 `varchar2` 索引的关联数组在除最后一点外的所有方面都不同。键的开销更大，并且取决于字符串的实际长度。空间一次只为一个元素分配，并且在某些情况下，删除后会立即释放。此外，以\
    \ `varchar2` 索引的数组比以 `pls_integer` 索引的对应数组慢得多。\n\n就内存使用和性能而言，使用其他集合类型（即 `varrays`\
    \ 和 嵌套表）并无优势。\n\n那么，让我通过以下过程来证明上述论断。我使用条件编译来改变集合中字符串的长度，并使用具有不同集合类型的过程。\n\n```sql\n\
    create or replace procedure coll_mem_usage(\n  i_step                        \
    \ pls_integer := 1\n ,i_elem_cnt                     pls_integer := 1000000\n\
    )\nis\n  $IF $$COLL_TYPE = 0 $THEN\n  type t_char_tab is table of varchar2($$string_len)\
    \ index by pls_integer;\n  $ELSIF $$COLL_TYPE = 1 $THEN\n  type t_char_tab is\
    \ table of varchar2($$string_len) index by varchar2(10);\n  $ELSIF $$COLL_TYPE\
    \ = 2 $THEN\n  type t_char_tab is table of varchar2($$string_len);\n  $ELSIF $$COLL_TYPE\
    \ = 3 $THEN\n  type t_char_tab is varray(2147483647) of varchar2($$string_len);\n\
    \  $END\n  c_string_len      constant pls_integer := $$string_len;\n  l_str  \
    \           constant varchar2($$string_len) := lpad('x', c_string_len, 'x');\n\
    \  l_list                     t_char_tab;\n\n  ------------------------------------------------------------------------------\n\
    \  procedure print_plsql_used_session_mem(\n    i_label                  varchar2\n\
    \  )\n  is\n    l_used                   number;\n  begin\n    $IF DBMS_DB_VERSION.VERSION\
    \ < 11 $THEN\n    select pr.pga_used_mem\n    $ELSE\n    select pm.used\n    $END\n\
    \    into   l_used\n    from   v$session        se\n          ,v$process     \
    \   pr\n          ,v$process_memory pm\n    where  se.sid      = sys_context('userenv',\
    \ 'sid')\n       and se.paddr    = pr.addr\n       and pr.pid      = pm.pid\n\
    \       and pm.category = 'PL/SQL';\n    dbms_output.put_line(rpad(i_label, 18)\
    \ || ' PL/SQL used '\n                         || to_char(round(l_used / 1024),\
    \ '999G999G999') || ' KB');\n  end print_plsql_used_session_mem;\nbegin\n  --\
    \ INIT --\n  dbms_output.put_line(i_elem_cnt || ' elements of length ' || c_string_len\
    \ || ' step '\n                       || i_step || ' type ' || $$coll_type);\n\
    \  print_plsql_used_session_mem('Init');\n\n  -- ALLOCATE ELEMENTS --\n  $IF $$COLL_TYPE\
    \ = 2 OR $$COLL_TYPE = 3 $THEN /* NESTED TABLE, VARRAY */\n  l_list := t_char_tab();\n\
    \  l_list.extend(i_elem_cnt * i_step);\n  $END\n  for i in 1..i_elem_cnt loop\n\
    \    l_list(i * i_step) := l_str;\n  end loop;\n  print_plsql_used_session_mem('Allocated');\n\
    \n  -- REMOVE ALL BUT 1 ELEMENT --\n  for i in 2..i_elem_cnt loop\n    $IF $$COLL_TYPE\
    \ != 3 $THEN /* ASSOCIATIVE ARRAYS, NESTED TABLE */\n    l_list.delete(i * i_step);\n\
    \    $ELSE /* NO SINGLE ELEMENT DELETE IN VARRAY */\n    l_list(i * i_step) :=\
    \ null;\n    $END\n  end loop;\n  print_plsql_used_session_mem('1 element left');\n\
    \n  -- ADD ANOTHER c_element_cnt ELEMENTS --\n  $IF $$COLL_TYPE = 2 OR $$COLL_TYPE\
    \ = 3 $THEN /* NESTED TABLE, VARRAY */\n  l_list.extend(i_elem_cnt * i_step);\n\
    \  $END\n  for i in (i_elem_cnt + 1)..(2 * i_elem_cnt) loop\n    l_list(i * i_step)\
    \ := l_str;\n  end loop;\n  print_plsql_used_session_mem('Allocated on top');\n\
    \n  -- DELETE ALL --\n  l_list.delete;\n  print_plsql_used_session_mem('All deleted');\
    \  \nend coll_mem_usage;\n```\n\n该过程在创建时是无效的。它需要使用有效的条件编译标志进行编译，例如集合类型“以 pls_integer\
    \ 索引的关联数组”，由 `coll_type` 等于 0 表示，以及 `string_len` 为 10。\n\n```sql\nSQL> alter procedure\
    \ coll_mem_usage compile plsql_ccflags='coll_type:0,string_len:10';\n\nProcedure\
    \ altered.\n```\n\n有效的过程可以被执行。\n\n```sql\nSQL> exec coll_mem_usage\n1000000 elements\
    \ of length 10 step 1 type 0\nInit               PL/SQL used            0 KB\n\
    Allocated          PL/SQL used       36,144 KB\n1 element left     PL/SQL used\
    \       36,144 KB\nAllocated on top   PL/SQL used       72,272 KB\nAll deleted\
    \        PL/SQL used           16 KB\n\nPL/SQL procedure successfully completed.\n\
    ```\n\n此输出显示键的开销为 27 字节。36,144 KB 除以 1,000,000 个条目得出每个条目 37 字节，其中 10 字节由字符串数组元素使用。删除除一个元素外的所有元素并不会释放任何空间，如“1\
    \ element left”列与“Allocated”列相比未发生变化所示。新元素无法重用已删除元素的空间，如“Allocated on top”使已用内存翻倍所示。\n\
    \n表 11-2 总结了使用不同参数运行该过程的结果。第二行显示，通过仅使用每第十个索引，内存使用量增加了十倍。进一步增加步长（step）将显示，大约二十个连续元素的空间是被一次性分配的。\n\
    \n当字符串长度为 100 时，字符串被行外分配，字符串（但不是索引）的已释放内存可以被重用，如第三行所示。在这种情况下，行外存储每个条目有 37 字节的开销和对齐损失。\n\
    \n对于连续索引，以 `varchar2` 索引的关联数组比以 `pls_integer` 索引的对应数组慢六倍，并且使用的内存是其两倍多。另一方面，它们的内存使用与步长无关。\n\
    \n嵌套表和变长数组的内存使用和性能与以 `pls_integer` 索引的关联数组大致相同。\n\n![images](img/t1102.jpg)\n"
- fmt: '# Summary


    Business logic of data-centric applications belongs in the database. This claim
    is supported by both technical reasons and successful practical examples. There
    are plenty of technical benefits for this practice, such as simplicity of the
    design, high performance, and increased security. Furthermore, many concrete examples
    of ERP systems that use this design have been successful for many years, and new
    systems are built based on this design.


    Business logic in PL/SQL in the database leads to a large PL/SQL code base. Naturally,
    the question arises of how to deliver to users an initial version that meets time,
    budget, and external product quality parameters and that can be maintained in
    the future. On an abstract level, the answers are the same for any architecture.
    The concrete implementation in PL/SQL is unique in four areas that I covered in
    this chapter.


    *   Uniformity allows developers to understand each other’s code more quickly
    and thoroughly. Uniformity is more important than the concrete convention. Still,
    there are good reasons to incorporate certain aspects into your PL/SQL coding
    conventions.

    *   Modularization is the foundation for scalability of the development team and
    maintainability of an application. Modularization brings the benefits of divide
    and conquer to software engineering. PL/SQL provides strong modularization constructs
    in the form of subprograms, packages, and schemas as well as excellent analysis
    capabilities based on dependency views and PL/Scope.

    *   Object-oriented programming allows for increased reuse, which is key to reducing
    cost and time to market and improving quality in programming in the large. Whereas
    reuse as-is has a limited applicability, reuse with adaptations as provided by
    object-oriented programming enables reuse in more cases. PL/SQL is not an object-oriented
    language but can be used to program in an object-oriented way via the set of described
    patterns.

    *   The memory requirements of large applications must be measured and optimized
    using the described techniques. There are many good resources on design for scalability
    and performance, including several chapters of this book.


    # Evolutionary Data Modeling


    ## by Robyn Sands


    I worked for Lockheed right after college. In my first year, I was part of a team
    assigned to evaluate Manufacturing Resources Planning (MRP) methods and tools.
    I was familiar with MRP; it had been part of the required curriculum for my bachelor''s
    degree, plus I had some prior experience with MRP systems. However, MRP was a
    very new idea at Lockheed, and it was the antithesis of the philosophy behind
    the existing systems. My boss and mentor, Skip Christopherson, had been at Lockheed
    more years than I''d been on the planet and he knew every aspect of Lockheed''s
    scheduling system, down to the very smallest detail. You attended classes in MRP
    together after work and it was like a classic comedy scene with the smart-mouthed
    rookie breezing through the material while the grizzled older employee who actually
    knows how things work struggles to grasp the point of this new fangled technology
    with all its bells and whistles. At the end of the class each night, you''d walk
    back to our windowless office while Skip talked about all that was wrong with
    this inane idea that a system could process changes and regenerate the schedule
    every night without throwing the assembly line into utter chaos. I''d been learning
    about how Lockheed approached scheduling at the same time you were taking the
    MRP class and I''d begun to understand and appreciate how it worked. Skip was
    right: MRP was exactly opposite our process flow model, which was based on math,
    statistics, and learning curves. Using the knowledge gained from decades of successful
    aircraft programs, you calculated the boundaries for the specific phases of the
    assembly process and tied them to positions on the shop floor. These positions
    and dates created a window in time for each crew to contain their contribution
    to the assembly. Within those boundaries, parts and schedules might shuffle madly
    while the crew worked insane hours, but the men on line knew that meeting the
    scheduled move date for the next position was critical and they''d learned to
    make it happen no matter what. The plane always moved forward, even if an assembly
    crew three positions further down the line had to rip out four positions worth
    of work to add a fabricated part that hadn''t been available when it was needed.


    As our class got more intense, Skip''s concerns about MRP heightened and his after-class
    rants got more animated. He knew everything the assembly line went through to
    make their schedules now. If the schedules changed nightly, how could workers
    possibly keep up with the influx of information, much less the actual parts and
    planes? One night, I considered my words carefully before I expressed what I was
    thinking to my mentor. Once I had worked up my courage, I said, “Skip, the schedule
    is already changing every day. The only difference is that you''ll be able to
    see it if it''s it the system.” He suddenly got very quiet and that was the last
    time I ever heard him complain about MRP. Later he went on to champion the MRP
    system implementation and became an expert in both the technology and the implementation
    process.


    Change happens, whether you''re building airplanes or software. You have a choice:
    you either manage it or you get blindsided.'
