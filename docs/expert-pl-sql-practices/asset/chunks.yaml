    to open the cursor, fetch from it repeatedly, and then close it. To open the cursor,
    and then repeatedly fetch rows until the resultset is exhausted, I can use the
    script `bulk_single_fetch_100000.sql`, which performs the following:


    `variable rc refcursor`

