    ## 性能分析


    **作者：罗恩·克里斯科**


    *性能*和*性能分析*是我办公室日常交流、与客户互动以及教学中的关键词。这两个词同样适用于生活的方方面面，包括软件工程和我们当前的主题：`PL/SQL`。


    我第一次接触`PL/SQL`是在其诞生之初，当时它是 Oracle 基于字符的交互式应用开发工具`SQL*Forms 3`的测试版。多年来，我学到了很多关于编写高性能`PL/SQL`代码的知识，我很高兴能与大家分享我的所学。


    在`PL/SQL`的语境中，性能究竟意味着什么？本章结束时，我的目标是为你提供战胜性能低下代码所需的知识和理解。


    > *业余者练到做对为止。专业人士练到不会做错为止。*

    >

    > ——佚名


    除了我的软件开发与教育职业生涯外，我还是一名古典音乐演奏家，演奏最富英雄气概的乐器——`圆号`。任何领域的专家都有许多共同点。音乐和软件工程也不例外——我思考得越多，发现的共同点就越多。例如，这两个领域共享一个共同的词：performance（演奏/性能）。尽管乍一看它在两种语境中的含义似乎大相径庭，但这个词暗示了关于我们如何进行音乐和软件开发工作的一些非常重要的事情。


    在音乐中，performance（演奏）被定义为对音乐作品的诠释，并在观众面前呈现。在软件开发中，performance（性能）被定义为软件实现其预期目的的方式或效率。这两个定义都将
    performance 解释为一种最终结果。在音乐中，准备工作的最终结果包括学习音乐家所选乐器的基本技巧、学习通用乐谱、学习所选作品的特定记谱法、练习该作品所需的特定技巧，然后为实际演奏进行心理和生理上的准备。但作为一名专业音乐家，我知道演奏并不仅仅是这个过程结束时的一个单一事件。


    > *永远不要“练习”，永远要“演奏”！*

    >

    > ——巴德·赫瑟斯，芝加哥交响乐团


    换句话说，我意识到我的演奏听起来总会像我的练习一样，这是一个可怕的想法，除非我练习“演奏”。为了预先发现我的演奏听起来会怎样，我需要在练习时仿佛观众就在那里聆听一样去演奏音乐。只有通过这种方式练习，我才能评估作品中需要我集中精力改进的部分。


    这一切如何与软件性能相关联，特别是`PL/SQL`代码的软件性能？真正的关键在于，能够在将软件投入生产之前，使用人们将在生产环境中看待它的相同视角来审视你的软件。专家的视角需要理解这些重要概念：性能、性能分析、插桩和问题诊断。


    **一个音乐注记**


    许多英语使用者用*Horn*这个词来泛指包括小号、萨克斯管和长号在内的一类乐器。通常被称为*French Horn*（法国号）的乐器，其起源和设计均非法国，正确名称应为`圆号`。更多信息请参见
    [`http://en.wikipedia.org/wiki/Corno`](http://en.wikipedia.org/wiki/Corno)。这可能看起来微不足道，但对许多`圆号`演奏者，包括我在内，这是一件大事。


    我将`圆号`描述为最富英雄气概的乐器。当伟大的作曲家为`圆号`创作音乐时，他们会充分利用这种乐器所能实现的广泛多样的音乐表现力。音乐史上有一个模式不断重复——当英雄登场时，`圆号`最常被选来提供音乐主题。在古典曲目中，理查德·瓦格纳、理查德·施特劳斯、彼得·伊里奇·柴可夫斯基和古斯塔夫·马勒等作曲家创作出激动人心、栩栩如生的英雄主题。在二十世纪的电影音乐中，约翰·威廉姆斯、埃里希·科恩戈尔德和霍华德·肖继承并拓展了这一传统。


    ### 什么是性能？


    在软件语境中，*performance*这个词确实有几种不同的含义，因此我首先澄清一下我的用法。特别是在`PL/SQL`代码的语境下——实际上也适用于任何代码——性能可以从四个方面来考虑。


    #### 功能需求


    Performance 有时可用于描述软件执行满足所谓功能规格和定义的需求的程度。如果软件程序运行至完成而没有任何错误，准确地处理输入，并产生正确的输出，那么人们可能会说该软件性能良好。有多少次，你希望自己购买使用的软件能达到这个标准？这似乎是一个正常的期望，当然，但重要的是要看到这个定义的基本部分。


    #### 响应时间


    需求撰写者已经意识到，性能远不止于此。性能还关乎时间。软件完成了你期望的工作——但却在你期望几分钟内完成的情况下用了 34 小时才完成——它就未能通过“性能良好”的定性描述。当我们描述性能良好的软件时，必须在描述中引入时间因素。软件需求通常以单个工作单元、一个业务任务来表述。因此，需求必须说明该任务的预期功能，以及软件完成该任务所需的预期时间。这通常被称为*响应时间*：以时间单位衡量的业务任务单次执行的持续时间。


    #### 吞吐量


    但有时，以不同的方式衡量性能更有意义。*吞吐量*是指在指定持续时间内完成的业务任务执行次数。一个订单录入应用软件的需求可能会规定每小时至少录入 1,000
    个订单的最小吞吐量。该需求当然暗示了对任何一个特定订单响应时间的某种限制，但对于负责订单录入应用的业务经理来说，这个指标更有意义。


    对经理来说，只要达到了吞吐量目标，每个录入订单的单独响应时间就无关紧要。对于订单录入员和电话那头的客户来说，吞吐量则不予考虑。他们只关心一个特定的订单录入任务——他们自己的那个任务的响应时间。


    优化响应时间是优化吞吐量的必要先决条件，但还不够充分。将每个订单的响应时间优化到 1/1,000 秒，并不能保证达到每秒 1,000 个订单的吞吐量。优化吞吐量还需要关注排队延迟和一致性延迟，但对这些内容的满意讨论超出了本章的范围。关于清晰的解释，我推荐
    Cary Millsap 的论文《清晰思考性能问题》，可从 [`http://method-r.com/downloads/doc_download/44-thinking-clearly-about-performance`](http://method-r.com/downloads/doc_download/44-thinking-clearly-about-performance)
    下载。

    '
- fmt: '#### Resource Utilization


    Another way to consider performance is with the measurement of resources used
    during the execution of the software to complete the business task. Common metrics
    include CPU utilization, memory usage, and I/O latency. Typical diagnoses discuss
    these metrics only in the aggregate form—in other words, separated from the execution
    of a single business task. While these metrics are useful in describing system
    health overall, I have not found them to be useful as the starting point for performance
    problem diagnosis. Instead, I see these as far more useful when tightly coupled
    with the measurement of response time. Consider the following examples.


    Nathan complains that the month-end sales report is far too slow. Last month it
    took only 5 minutes to complete. For this month, he started the report 15 minutes
    ago and it''s still not finished. System monitoring shows that the CPU utilization
    is running at 95%. Average disk I/O latency looks great at 4 ms, and the network
    administrator tells us the throughput is well under capacity at 9,000 tx/s. [Table
    13-1](#Chapter13.html#tab_13_1) shows a summary of this information.


    ![images](images/t1301.jpg)


    Matt complains that the month-end payroll report is far too slow. Last month it
    took only 5 minutes to complete. Of the 5 minutes, 20% was spent on the CPU, 70%
    was spent on disk I/O operations, and 10% was spent on network calls. For this
    month, he started the report 15 minutes ago and it''s still not finished. Response
    time metrics show that of the 15 minutes, 5% was spent on CPU, 25% on I/O operations,
    and 70% on network calls. [Table 13-2](#Chapter13.html#tab_13_2) shows a summary
    of this information.


    ![images](images/t1302.jpg)


    I would much rather respond to Matt''s situation, given the information provided.
    The tables are visually similar but convey completely different information. When
    trying to diagnose Nathan''s problem with [Table 13-1](#Chapter13.html#tab_13_1),
    I can only *guess* whether or not CPU utilization is a problem for the sales report,
    because aggregation of data hides the detail that I need. I certainly know that
    CPU is high for the entire system, but in order to solve the problem for the sales
    report, I need to know if that task is actually waiting on CPU resources in order
    to finish.


    In Matt''s example, I have valuable information about resource utilization applied
    to his task alone. With [Table 13-2](#Chapter13.html#tab_13_2), I can *know* where
    to look, and with great confidence start investigating how and why the payroll
    report is spending time in the network layer.


    #### Performance Is a Feature


    You should think of performance as a feature. It''s not a serendipitous result
    of your work; rather it''s something you approach with intent as you design and
    deliver a product. Karen Morton really captures the importance of this concept
    when she says:


    > So, first and foremost, I think managing performance is about integrating one
    simple principle into your mindset: **I am responsible for the performance of
    the code I write or maintain.**

    >

    > —Karen Morton, *Expert Oracle Practices* (Apress 2010)


    Regardless of your adherence to Agile or Waterfall, XP or RAD, Prototyping or
    Spiral, performance should be a prominent feature at the beginning of the process,
    during the process, and after the process has “completed.”


    Functional requirements should be accompanied by performance expectations, and
    in some business cases those expectations are formal requirements expressed as
    a Service Level Agreement (SLA). These expectations can''t be forced onto the
    software after delivery. That seems like such an obvious statement, but in practice
    that''s exactly what happens in the real world. Karen Morton''s quote describes
    the essential mindset for every person in every role in the software development
    team. From the very start, performance must include the concepts of function and
    time.


    When Matt calls and complains about the performance of the payroll report, who
    will he call? Probably the DBA responsible for the application. That DBA was probably
    never involved in the software development process. Will the software application
    documentation lead the DBA by the hand through the problem diagnosis? Probably
    not. Should it? Absolutely! Will the software itself provide adequate information
    to point the DBA to the probable cause? Probably not. Should it? Of course! Why
    is it that performance problems are considered a defect in production implementations
    but not during development and testing?


    Whatever the reasons, the DBAs or performance analysts end up with the problem
    to solve. Their ability to resolve the problem will depend on the quality of information
    they can gather about the problem. If Matt complains, that “the whole system is
    slow” without identifying a specific problem, solving Matt''s problem can be agonizing.
    System-wide aggregated, usually sampled, data may or may not surface the problems
    that are affecting Matt''s report. Analysts can spend endless time and money chasing
    the wrong problems if they depend solely on aggregated data. They may improve
    some parts of the system, but they aren''t really finished until they fix the
    root problem that is causing Matt''s slow report.


    That''s not meant to imply that good DBAs and performance analysts don''t solve
    problems like Matt''s all the time—of course they do. They ask good questions
    that lead to resolutions of the problems, such as the following:


    *   What exactly were you doing while the system was slow?

    *   Which business task will you execute immediately after I tell you that the
    system is no longer slow, in order to test my assertion?


    Performance analysts use various tools for measuring the critical details—where
    the time was spent and on what resources during the execution of that business
    task. So how should you write code that actually helps performance analysts—code
    that provides performance information beyond the functional requirements?


    ### What Is Profiling?


    Profiling is emitting a log of code steps as they execute. In some cases, profiling
    is done without emphasis on time, but focused more on the sequence of events and
    the number of iterations. In other cases, each code step is logged with an elapsed
    time measurement.


    Profiling is a common activity, even a daily practice, for many software developers.
    Profiling is a great way to know your code during development. [Chapter 7](#Chapter07.html#ch7)
    describes how to profile PL/SQL code with Oracle provided packages. You might
    recognize these profilers from other software languages:


    ```

    gcc –pg …; gprof …

    ```


    ```

    java –prof …; java ProfilerViewer …

    ```


    ```

    perl –d:Dprof …; dprofpp …

    ```


    Each of these tools displays the results of profiling in different ways. In able
    to more clearly describe profiling results that work best, specifically for performance,
    I''ll start with a quick explanation of a tool that can help developers understand
    the passage of time more clearly: the sequence diagram.'
