    d*[.]?\\d+)|(d+[.]?\\d*)){1}(e(\\+|-)?\\d+)?(f|d)?$',\n  6             'i');\n\
    \n已选择 918752 行。\n\n已用时间: 00:00:28.25\n```\n\n你可以看到`PL/SQL`函数的实现比正则表达式快得多（几乎快三倍）。当反过来查找少量非数字记录时，效果仍然更好。正则表达式非常消耗`CPU`；比较`V$SQL`中两个`SQL`语句的`CPU`时间，或者使用`DBMS_UTILITY.GET_CPU_TIME`跟踪这两个查询，你就能亲眼看到差异。\n\
    \n这个例子表明，在`SQL`语句中使用`PL/SQL`函数的有效性不能一概而论地否定。你的需求、你对所开发系统的了解以及你的测试将帮助你判断一个`PL/SQL`函数是否可行。如果可行，那么我在本章剩余部分描述的技术应该能帮助你从实现中获得更多收益。\n"
- fmt: "#### Using SQL Alternatives\n\nIt is, however, quite rare that a PL/SQL function\
    \ will be quicker than a SQL-only expression or built-in function. You should\
    \ consider whether it is possible or desirable to change some of your application’s\
    \ critical queries (that use PL/SQL functions) to use SQL-only alternatives. If\
    \ you are developing new applications, you have a good opportunity to build-in\
    \ performance from the outset.\n\nSome considerations will be required here, of\
    \ course, and if any of the following are true, you might decide to favour some\
    \ PL/SQL functions over a SQL implementation:\n\n*   A PL/SQL function is not\
    \ heavily used.\n*   A PL/SQL function is too complicated to be easily expressed\
    \ in SQL.\n*   A SQL statement is not displaying any of the issues I’ve described.\n\
    *   You have simply too much SQL to change or regression-testing would be too\
    \ prohibitive.\n\nI’ll demonstrate the performance benefits of using SQL and offer\
    \ some alternative techniques that you can use to refactor those critical SQL\
    \ statements (or even consider as a standard for new applications).\n\n##### Use\
    \ SQL\n\nIn [Listing 9-12](#Chapter09.html#list_9_12), I ran a sales report that\
    \ generated over 918,000 executions of a `GET_RATE` PL/SQL function. I demonstrated\
    \ that a SQL-only implementation of the same report (i.e. a simple join to the\
    \ `RATES` table) reduced the runtime of that query from 66 seconds to just 1 second\
    \ (there was also a massive reduction in logical I/O). The SQL-only technique\
    \ can also make a difference to the elapsed time of queries that use quicker PL/SQL\
    \ functions, such as those that don’t contain any SQL.\n\nSQL is an extremely\
    \ flexible and rich language for processing sets of data quickly. Assuming that\
    \ performance is your goal, you can use SQL such as analytic functions, subquery\
    \ factoring, and a wide range of applications of the built-in functions to refactor\
    \ your PL/SQL functions to SQL (visit the OTN SQL and PL/SQL forum or [`http://oraqa.com/`](http://oraqa.com/)\
    \ for examples of innovative uses for SQL).\n\n##### Use a View\n\nAn argument\
    \ in favour of retaining PL/SQL functions is that they encapsulate and centralize\
    \ application logic, preventing a proliferation of the same rules throughout the\
    \ code base. There are alternative encapsulation methods, such as using views,\
    \ which have the added benefits of also providing the performance of SQL. In [Listing\
    \ 9-26](#Chapter09.html#list_9_26), I’ve converted the sales report by calendar\
    \ year and product from using the `GET_RATE` PL/SQL function to using a view,\
    \ where the logic is encapsulated in a SQL expression.\n\n**Listing 9-26.** Encapsulating\
    \ Function Logic in a View\n\n```sql\nSQL> CREATE VIEW sales_rates_view\n  2 \
    \ AS\n  3     SELECT s.*\n  4     ,      s.amount_sold * (SELECT r.exchange_rate\n\
    \  5                             FROM   rates r\n  6                         \
    \    WHERE  r.base_ccy   = 'USD'\n  7                             AND    r.target_ccy\
    \ = 'GBP'\n  8                             AND    r.rate_date  = s.time_id) AS\
    \ amount_sold_gbp\n  9     FROM   sales     s;\n\nView created.\n```\n\nWith this\
    \ view, I’ve converted the `GET_RATE` PL/SQL function to a scalar subquery lookup.\
    \ The entire rates conversion is now projected as a single column. I’ve used a\
    \ scalar subquery instead of a simple join to `RATES` to take advantage of an\
    \ optimization with views known as column-elimination. With this optimization,\
    \ the scalar subquery will only be executed when the `AMOUNT_SOLD_GBP` column\
    \ is referenced in a query. This means that queries that don’t need the converted\
    \ rate can also take advantage of this view without penalty, widening the scope\
    \ for re-use. The timing and statistics for the sales report when using this view\
    \ are shown in [Listing 9-27](#Chapter09.html#list_9_27).\n\n**Listing 9-27.**\
    \ Exploiting Column-Elimination in Views (No Column-Elimination)\n\n```sql\nSQL>\
    \ SELECT t.calendar_year\n  2  ,      p.prod_name\n  3  ,      SUM(s.quantity_sold)\
    \   AS qty_sold\n  4  ,      SUM(s.amount_sold)     AS amt_sold_usd\n  5  ,  \
    \    SUM(s.amount_sold_gbp) AS amt_sold_gbp\n  6  FROM   sales_rates_view s\n\
    \  7  ,      times            t\n  8  ,      products         p\n  9  WHERE  s.time_id\
    \    = t.time_id\n 10  AND    s.prod_id    = p.prod_id\n 11  GROUP  BY\n     \
    \    t.calendar_year\n 12  ,      p.prod_name;\n\n272 rows selected.\n\nElapsed:\
    \ 00:00:01.29\n\nExecution Plan\n----------------------------------------------------------\n\
    Plan hash value: 625253124\n\n------------------------------------------------------------\n\
    | Id  | Operation                     | Name     | Rows  |\n------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT              |          |   252 |\n|*  1 |  INDEX UNIQUE\
    \ SCAN            | RATES_PK |     1 |\n|   2 |  HASH GROUP BY               \
    \ |          |   252 |\n|*  3 |   HASH JOIN                   |          |   918K|\n\
    |   4 |    PART JOIN FILTER CREATE    | :BF0000  |  1826 |\n|   5 |     TABLE\
