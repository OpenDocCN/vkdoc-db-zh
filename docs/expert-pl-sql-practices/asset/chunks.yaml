  raw: '#### Error Recovery


    Following the black box paradigm, a procedure that inserts, updates, or deletes
    information should leave the database in a consistent state. Should the procedure
    fail, it has to rollback to the state the system was in when entering the procedure.
    Use upper case to name savepoints and make sure to include rollback calls in the
    global exceptions of the procedure, like so:


    `PROCEDURE EXE$REGISTER_NEW_BOOK (`

    `                 p_title                IN      VARCHAR2`

    `                ,p_author               IN      VARCHAR2`

    `                ,p_book_id                 OUT  NUMBER`

    `                ,p_exitcode                OUT  NUMBER`

    `                ,p_exittext                OUT  VARCHAR2`

    `                ) IS`


    `  L_PB_FATAL                                    EXCEPTION;`


    `BEGIN`

    `  -- Init`

    `  p_exitcode := 0;`

    `  p_exittext := NULL;`


    `  SAVEPOINT BEFORE_REGISTER_NEW_BOOK;`


    `  IF p_title IS NULL OR p_author IS NULL THEN`

    `    p_exitcode := 12345;  -- Error code for invalid new book data`

    `    p_exittext := ''Missing title or author information'';`

    `    RAISE L_PB_FATAL;`

    `  END IF;`


    `  ...`


    `EXCEPTION`

    `  WHEN L_PB_FATAL THEN`

    `    ROLLBACK TO BEFORE_REGISTER_NEW_BOOK;`

    `    IF p_exitcode = 0 THEN -- To avoid a forgotten value`

    `      p_exitcode := -1;`

    `    END IF;`

    `  WHEN OTHERS THEN`

    `    ROLLBACK TO BEFORE_REGISTER_NEW_BOOK;`

    `    p_exitcode := SQLCODE;`

    `    p_exittext := SUBSTR(''Error in KNL_BOOKS.EXE$REGISTER_NEW_BOOK: ''||SQLERRM,
    1, 500);`

    `END; -- EXE$REGISTER_NEW_BOOK`


    #### Test First. Display Second.


    If you are writing a module to drive a user interface, it is better to first check
    and get all the required data first, then to display the interface. That way,
    all the possible errors are trapped before anything is displayed. You can then
    easily avoid having a message like “An error occurred” appear in a middle of a
    page or a screen for the user to see. Also, if you do need to display an error
    message, you can do so without confusing the user. If you begin display data only
    to interrupt with an error, users can become flustered and frustrated.


    ### Summary


    Coding conventions are not intended to solve all the problems you may encounter
    while implementing a system or maintaining software. However, they are very handy
    in order to standardize large source code bases and to ease the maintenance and
    sharing of modules. Following coding standards is a sign of respect for your fellow
    programmers and project leaders. As a programmer, you may find them difficult
    to use in the beginning, because they may not match your own style. Believe me;
    it takes only a short time before a given set of standards become your natural
    way of coding. Moreover, once you start managing a large set of modules, what
    a pleasure it is to “plug and play” them in a consistent way in order to build
    complex mechanisms! As a project leader, you may find difficult to impose standards
    upon a whole team, but the gain in quality is worth it.


    The following is one final template. It summarizes in one place many of the conventions
    described in this chapter.


    `/*-----------------------------------------------------------------------*/`

    `/*                                                                       */`

    `/* Module   : MODULE_NAME                                                */`

    `/* Goal     : Short description of the module.                           */`

    `/* Keywords : Few keywords describing what the module does.              */`

    `/*                                                                       */`

    `/*-----------------------------------------------------------------------*/`

    `/* Description:                                                          */`

    `/*                                                                       */`

    `/* Long description of the module: its goal.                             */`

    `/* Explanation about parameters (Input and Output).                      */`

    `/* How the procedure works, the "tricks", etc.                           */`

    `/*                                                                       */`

    `/*-----------------------------------------------------------------------*/`

    `/* History:                                                              */`

    `/*                                                                       */`

    `/* YYYY-MM-DD : First name and Name - Creation.                          */`

    `/*                                                                       */`

    `/* YYYY-MM-DD : First name and Name - Review.                            */`

    `/*                                                                       */`

    `/* YYYY-MM-DD : First name and Name                                      */`

    `/*              Description of the modification.                         */`

    `/*                                                                       */`

    `/*-----------------------------------------------------------------------*/`

    `PROCEDURE TYPE$MODULE_NAME(`

    `                 p_param1              IN      VARCHAR2 -- Here comment on p_param1`

    `                ,p_param2              IN      NUMBER   := NULL`

    `                ,p_exitcode               OUT  NUMBER`

    `                ,p_exittext               OUT  VARCHAR2`

    `                ) IS`


    `-- DECLARE Section`


    `CURSOR one_cursor IS`

    `  SELECT *`

    `    FROM table`

    `   WHERE condition;`


    `  L_PB_FATAL                                    EXCEPTION;`

    `  l_variable                                    VARCHAR2(1);`


    `BEGIN`

    `  -- Init`

    `  p_exitcode := 0;`

    `  p_exittext := NULL;`


    `  SAVEPOINT BEFORE_TYPE$MODULE_NAME;`


    `  -- Check the input`

    `  PACKAGE.CHK$PARAM1 (`

    `                 p_value    => p_param1`

    `                ,p_exitcode => p_exitcode`

    `                ,p_exittext => p_exittext`

    `                );`

    `  IF p_exittext <> 0 THEN`

    `     RAISE L_PB_FATAL;`

    `  END IF;`


    `  -- Gather the required data`

    `  BEGIN`

    `    SELECT col`

    `      INTO l_variable`

    `      FROM table`

    `     WHERE condition1`

    `       AND condition2;`

    `  EXCEPTION`

    `     WHEN OTHERS THEN`

    `       p_exitcode := 123456;`

    `       p_exittext := ''Error in getting information in TYPE$MODULE_NAME`

    `       RAISE L_PB_FATAL;`

    `  END;`


    `  -- Get data from cursor`

    `  FOR l_one_rec FROM one_cursor LOOP`

    `    IF l_one_rec.col <> PACKAGE.C_CONSTANT THEN`

    `      -- Explanation about the test above`

    `      ...`

    `    ELSE`

    `      ...`

    `    END IF;`

    `  END LOOP; -- One cursor`


    `  -- Display`

    `  ...`


    `EXCEPTION`

    `  WHEN L_PB_FATAL THEN`

    `    ROLLBACK TO BEFORE_TYPE$MODULE_NAME;`

    `    IF p_exitcode = 0 THEN         -- To avoid a forgotten exitcode`

    `      p_exitcode := -1;            -- Return something <> 0 indicating an error`

    `    END IF;`

    `  WHEN OTHERS THEN`

    `    ROLLBACK TO BEFORE_TYPE$MODULE_NAME;`

    `    p_exitcode := SQLCODE;`

    `    p_exittext := SUBSTR(''Error in PACKAGE.TYPE$MODULE_NAME: ''||SQLERRM, 1,
    500);`

    `END TYPE$MODULE_NAME;`


