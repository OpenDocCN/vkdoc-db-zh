    If you have a separate generated procedure for each month (i.e. the year and the
    month are parts of the procedure name), it''s easier to create a universal wrapper
    instead of writing a huge case statement. The following is an example of such
    a wrapper:


    `CREATE PROCEDURE p_runMonthly(i_dt date)`

    `is`

    `    v_sql_tx VARCHAR2(256):=''BEGIN p_run_''||to_char(i_dt,''YYYYMM'')||''; END;'';`

    `BEGIN`

    `    EXECUTE IMMEDIATE v_sql_tx;`

    `END;`


    Even better, this universal caller does not require any maintenance when you have
    to add yet another table to the list of existing ones. Of course, one could argue
    about the safety of building the logic on uniform naming patterns, but I have
    seen implementations of this type too often. Each time, creating a new object
    causes significant stress for the personnel involved, unless all references are
    wrapped into Dynamic SQL.


    ##### Insulate Your Code from Invalidated Dependencies


    Sometimes having dependencies is not a good thing for a number of reasons:


    *   *Code generators*: If you wrap a call to the generated modules into Dynamic
    SQL, you can refresh these modules without invalidating all dependencies. This
    can be critical when using JDBC connections to the database, since they are significantly
    less forgiving (in comparison to Net8 calls).

    *   *Remote objects*: Since your maintenance cycle may not be the same as that
    of other teams involved in your project, there is a chance that you could reference
    objects via database links while they are inaccessible or invalid. In that case,
    the only safe way out is to wrap all remote calls into dynamic SQL.

    *   *Logical loops*: Even though it is very difficult, you could create a case
    where a chain of object references cycles itself. In that case, the only solution
    is to make one step a Dynamic SQL module.


    ### Summary


    Overall, the material covered in this chapter shows that you should not be scared
    to depart from the tried and tested ways of server-side application development.
    Of course, there will still be a reasonable learning curve and hidden traps, but
    the gains from applying more advanced techniques (such as Dynamic SQL) are enormous
    and include the following:


    *   Developers can achieve better code flexibility and sustainability.

    *   Architects can build solutions requiring higher level of abstractions, including
    repositories and code generators.

    *   Administrators can get more detailed control over existing systems and improve
    code manageability.


    All of these positive effects ultimately lead to the conclusion that it is possible
    to build contemporary IT projects “better, faster, cheaper” (and now I promise
    to repeat the same story even off-stage!). You just need to have the right tools
    and accept the fact that unless you handle the unknown, it will handle you—against
    your will.


    ## C H A P T E R  3


    ## PL/SQL and Parallel Processing


    **by Dominic Delmolino**


    Imagine if you went to the grocery store and only one person was allowed in at
    a time. Everyone else had to wait outside in a long line until each individual
    completed their trip before entering the store. Even worse, image if you were
    only allowed to buy one item while inside the store. If you needed multiple items,
    you were required to get back in line outside of the store for each one.


    This example of one-at-a-time activity is called *serial processing*, and while
    it''s possible to speed this activity up, perhaps by giving each shopper roller
    skates so they move through the store faster, or by allowing them to take a cart
    inside and pick out multiple items, it''s still constrained by the design of only
    letting one person shop at a time.


    Thank goodness most stores use *parallel processing*—the ability to let more than
    one activity happen at the same time. By allowing many people to shop at the same
    time, stores process many more orders in every given day. As long as each shopper
    is buying a different item, their activities are unique and independent—which
    makes them perfect for parallel processing. In fact, there are only a few times
    where this activity needs to serialize—usually when two or more people want to
    buy the same item off of a shelf. At that point the shoppers need to *coordinate*
    their activities by negotiating who gets the item.


    Parallel processing activities are common in nature and society; we''ve all see
    armies of insects and schools of fish divide and conquer amazingly large tasks.
    Large data processing tasks are becoming more common as the cost of collecting
    and storing information keeps getting less and less expensive. As companies start
    to accumulate vast amounts of data, they are turning to parallel processing options
    as ways to analyze and deal with data across many processors and machines. A parallel
    programming technique called MapReduce has gained popularity as a method for generically
    building programs that can run in parallel. In this chapter, you''ll explore these
    divide and conquer techniques and apply them to database activities using PL/SQL.
    By the end of this chapter, you''ll be able to write your own parallel MapReduce
    programs using PL/SQL and parallel pipelined functions. But first let''s dive
    into the history of parallel processing.


    ### Why Parallel Processing?


    In a word: speed. All of us want things to go faster, jobs to complete more quickly,
    to get answers on demand. And while computers have been getting faster and faster,
    doubling their number of circuits, increasing their clock speeds, and adding more
    and more on-chip capabilities, we''re still not satisfied. As we encounter physical
    limitations on how fast individual processors can be, we start to look for other
    ways to speed up our programs.


    It would be nice if computers could automatically figure out ways to divide problems
    into smaller parts and run procedures on those smaller parts in parallel. There
    has been significant research in automatic identification of parallelism, but
    it turns out that it''s really hard for computers to understand where opportunities
    for parallelism can be applied. Attempts have been made to write compliers that
    can take high-level programming languages and generate explicitly parallel instruction
    streams for CPUs, but there hasn''t been much success in this area, leaving us
    with the need to manually design parallel processing strategies on our own.


    The good news is that when properly implemented, parallel processing techniques
    provide us with several benefits beyond simple speedup, including the following:


    *   Better system utilization in that all processors within a multi-processor
    system can be applied to a task.

    *   Removal of an all-or-nothing procedure, allowing for partial completion in
    case some sub-tasks fail.

    *   Ability to handle larger and larger data sets in a fixed amount of time, as
    opposed to simply speeding up a fixed data set into a smaller amount of time.


    It turns out that these benefits are often worth the overhead and hard work required
    to design and implement parallel procedures.'
  trans: "\n# PL/SQL 与并行处理\n\n## 你可以引用尚未存在于数据库中的对象\n\n如果你为每个月都有一个独立的生成过程（即年份和月份是过程名称的一部分），那么创建一个通用包装器比编写一个巨大的\
    \ CASE 语句更容易。以下是这样一个包装器的示例：\n\n```sql\nCREATE PROCEDURE p_runMonthly(i_dt date)\n\
    is\n    v_sql_tx VARCHAR2(256):='BEGIN p_run_'||to_char(i_dt,'YYYYMM')||'; END;';\n\
    BEGIN\n    EXECUTE IMMEDIATE v_sql_tx;\nEND;\n```\n\n甚至更好的是，当你必须向现有列表中添加另一个表时，这个通用调用器不需要任何维护。当然，有人可能会质疑在统一的命名模式上构建逻辑的安全性，但我见过太多这种类型的实现了。每次创建一个新对象都会给相关人员带来巨大的压力，除非所有引用都被包装进动态\
    \ SQL。\n\n## 让你的代码与失效的依赖项隔离开来\n\n有时，存在依赖关系并非好事，原因有很多：\n\n*   `代码生成器`：如果你将对生成模块的调用包装进动态\
    \ SQL，你就可以刷新这些模块而不会使所有依赖项失效。在使用 JDBC 连接数据库时，这可能是至关重要的，因为它们（与 Net8 调用相比）的容错性要低得多。\n\
    *   `远程对象`：因为你的维护周期可能与你项目中涉及的其他团队的维护周期不同，所以有可能当你通过数据库链接引用对象时，它们是不可访问或无效的。在这种情况下，唯一安全的方法是将所有远程调用包装进动态\
    \ SQL。\n*   `逻辑循环`：尽管非常困难，但你可能会创建一个对象引用链自身循环的情况。在这种情况下，唯一的解决方案是让其中一个步骤成为一个动态 SQL\
    \ 模块。\n\n### 总结\n\n总的来说，本章涵盖的材料表明，你不应该害怕偏离服务器端应用开发中那些久经考验的方法。当然，仍然会存在合理的学习曲线和隐藏的陷阱，但应用更高级技术（如动态\
    \ SQL）所带来的收益是巨大的，包括：\n\n*   开发人员可以实现更好的代码灵活性和可持续性。\n*   架构师可以构建需要更高级别抽象的解决方案，包括代码库和代码生成器。\n\
    *   管理员可以获得对现有系统更详细的控制，并提高代码的可管理性。\n\n所有这些积极影响最终都指向一个结论：有可能“更好、更快、更便宜”地构建现代 IT\
    \ 项目（现在我保证在台下也会重复同样的故事！）。你只需要拥有合适的工具，并接受这样一个事实：除非你处理未知，否则它将违背你的意愿反过来处理你。\n\n#\
    \ 第 3 章\n\n## PL/SQL 与并行处理\n\n作者：`Dominic Delmolino`\n\n想象一下，如果你去杂货店，一次只允许一个人进去。其他所有人都必须在外面排长队等待，直到每个人完成购物才能进入商店。更糟糕的是，想象一下你在店内只允许购买一件商品。如果你需要多件商品，你必须为每一件商品重新到店外排队。\n\
    \n这种一次只进行一项活动的例子被称为 `串行处理`，虽然有可能加快这个活动，比如给每个购物者穿上轮滑鞋让他们在店里移动得更快，或者允许他们带购物车进去挑选多件商品，但它仍然受限于每次只让一个人购物的设计。\n\
    \n谢天谢地，大多数商店都使用 `并行处理`——允许同时发生多个活动的能力。通过允许多人同时购物，商店在每一天能处理更多的订单。只要每个购物者购买的是不同的商品，他们的活动就是独特且独立的——这使它们非常适合并行处理。事实上，只有少数几次需要将这个活动串行化——通常是当两个或更多人想要购买货架上的同一件商品时。这时，购物者需要通过协商谁得到这件商品来\
    \ `协调` 他们的活动。\n\n并行处理活动在自然界和社中很常见；我们都见过昆虫大军和鱼群将庞大的任务分而治之。随着收集和存储信息的成本持续降低，大型数据处理任务变得越来越普遍。随着公司开始积累海量数据，他们转向并行处理选项，作为在多个处理器和机器上分析和应对数据的方式。一种名为\
    \ `MapReduce` 的并行编程技术作为一种通用构建可并行运行程序的方法而广受欢迎。在本章中，你将探索这些分而治之的技术，并使用 PL/SQL 将它们应用于数据库活动。在本章结束时，你将能够使用\
    \ PL/SQL 和并行管道化函数编写你自己的并行 `MapReduce` 程序。但首先，让我们深入了解并行处理的历史。\n\n### 为何需要并行处理？\n\
    \n一言以蔽之：速度。我们所有人都希望事情进展得更快，工作完成得更迅速，能够按需获得答案。尽管计算机的速度越来越快，其电路数量成倍增加，时钟速度不断提高，片上能力也越来越多，我们仍然不满足。随着我们遇到单个处理器速度提升的物理限制，我们开始寻找其他加速程序的方法。\n\
    \n如果计算机能自动找出将问题分解成更小部分并在这些更小的部分上并行运行程序的方法，那就太好了。自动识别并行性已经有了大量的研究，但事实证明，计算机很难理解哪里可以应用并行机会。人们曾尝试编写编译器，将高级编程语言转换为\
    \ CPU 的显式并行指令流，但在这方面并没有太大成功，这使得我们需要自己手动设计并行处理策略。\n\n好消息是，如果实施得当，并行处理技术除了简单的加速之外，还为我们提供了若干好处，包括：\n\
    \n*   更好的系统利用率，因为多处理器系统内的所有处理器都可以应用于一个任务。\n*   消除了“全有或全无”的过程，在部分子任务失败时允许部分完成。\n\
    *   能够在固定时间内处理越来越大的数据集，而不是简单地将固定数据集加速到更短的时间内完成。\n\n事实证明，这些好处往往值得设计和实现并行程序所需的开销和艰苦工作。\n"
- fmt: '# 并行处理和大数据相关概念


    ## 影响并行处理的定律


    解决问题的技术（或`算法`）由计算机科学家研究和编码，常常导致所谓的`计算定律`。其中一些定律与过去几年计算机架构和数据增长的趋势相互作用，影响了我们对并行处理的思考。


    *   `摩尔定律`（1965）指出，可以容纳在集成电路上的晶体管数量每两年翻一番，并暗示计算机微处理器的速度和性能也会随之翻倍。从1980年代中期到大约2004年，这种`加速`基本成立，因为处理器频率扩展保持了步伐。然而，功耗开始成为问题，导致了需要并行才能充分利用该定律的`多核`处理器的出现。

    *   `阿姆达尔定律`（1967）指出，在并行计算中使用多个处理器的程序的加速受程序顺序部分所需时间的限制。阿姆达尔定律对并行处理产生了冷却效应，因为它指出程序不可能比其顺序组件的速度更快。这暗示了通过并行化程序所能获得的加速量是有限的，通常只能让程序比它们的串行对应物快10到20倍。

    *   `古斯塔夫森定律`（1988）指出，具有非常大、重复数据集的问题可以有效地并行化，几乎是尴尬地并行（具有极小的顺序组件且易于划分为小的、独立单元的问题正式称为`尴尬并行`）。


    这些定律之间的紧张关系在2000年代中期与另一个行业趋势——所谓的“大数据”的兴起——相遇。


    ## 大数据的兴起


    直到大约2007年，数据增长保持相当稳定和线性。然而，随着技术使捕获、存储和发送信息变得更容易，数据增长曲线出现了加速。2011年，世界产生的数据量将是2006年的十倍。其中大部分数据实际上是机器生成的，因为传感器和基于网络活动的捕获成本已经下降。我们过去可能认为千兆字节的数据是巨大的，而现在我们则以太字节、拍字节和艾字节的数据来衡量。


    淹没在数据海洋中，我们开始看到，试图以串行方式利用这些数据是不可行的。一天只有86，400秒，如果我们一次处理一个比特，就需要极高的速度来处理这种数据。阿姆达尔定律旨在预测固定问题大小和顺序部分占比5%到10%的加速情况，根本无法为处理这种以新速率增长的大型问题提供一个框架。10到20倍的加速根本不够；我们需要超越串行加速，寻找处理越来越大的数据集的方法。古斯塔夫森定律包含了人们希望在相对较短的时间内解决越来越大的问题的观点，再加上2004年处理器频率加速的衰退，导致了人们对并行编程重新产生了兴趣。


    ## 并行处理与分布式处理


    在这一点上，你可能想知道如何在数据库环境中实现并行处理。你可能接触过一些较新的数据处理框架，它们使用许多通过网络连接在一起的廉价独立计算机来执行数据分析任务，听起来像是并行处理。毕竟，我们从自然中得到的例子似乎是这种架构的完美匹配。


    这类环境通常被归类为分布式计算环境，其特点是缺乏对共享内存区域的访问，因此需要通过某种网络进行消息传递来通信。在分布式环境中，由于系统需要通过这种（与本地处理速度相比）缓慢的网络协调它们的活动，因此存在显著的开销。此外，在分布式系统中，假定每个进程只能看到一部分数据——没有一个进程可以访问整个数据集。这限制了分布式算法的适用性。当数据已经分布在节点之间，或者数据集如此之大以至于分割和分发数据的开销任务（包括节点间通信开销）与整个数据集大小相比微不足道时，它们工作良好。即便如此，并行处理和分布式处理之间存在显著重叠。一个并行系统可以被描述为紧耦合的分布式系统，而一个分布式系统可以被描述为松耦合的并行系统。


    好消息是，大多数分布式算法很容易转化为并行过程，因此如果你遇到一个听起来很有前景的分布式过程，你应该能够修改它以在并行架构上运行。


    ## 并行硬件架构


    有几种硬件架构可能适用于并行处理。了解哪些架构特性使得系统不太适合并行过程的要求也是有用的。


    *   `单计算机，单处理器，单核`：作为基本情况，这种计算机很少遇到，但值得注意的是，单核、单处理器、独立的计算机一次只能做一件事。无法在此类系统上实现并行过程。

    *   `单计算机，单处理器，多核`：如果系统将多个内核作为独立处理器暴露给操作系统，那么就有可能并行利用这些内核。通常，这些内核共享对芯片上高速内存缓存的访问，因此可以轻松共享协调信息。

    *   `单计算机，多处理器，单核或多核`：通常称为对称多处理系统（SMP），这类计算机一直是开放系统的主力。这些系统的处理器可能不共享本地高速内存，但所有处理器都通过内存总线共享对主计算机内存的访问。这种共享内存访问使处理器能够协调它们的活动。在其中一些系统中，处理器被分组在包含大量内存的处理器板上。如果该内存是在处理器板之间共享的，则这种访问可能是`非均匀`的，导致内存访问时间不均。

    *   `SMP计算机的集群系统`：集群系统通常采用某种高速专用系统互连网络来促进计算机节点之间的通信。这类计算机集群可能共享也可能不共享磁盘访问。当它们共享磁盘访问时，它们被称为`共享一切`架构。当它们不共享时，则被称为`无共享`架构，更类似于分布式系统。在某些集群变体中，高速互连实际上允许从所有其他节点远程访问每个单独计算机节点的内存。虽然这种远程内存访问比本地内存访问慢得多，但它比使用磁盘子系统在节点之间传输信息要快得多。从版本9开始，使用缓存融合的`Oracle
    Real Application Clustering`技术就利用了这一功能。

    *   `SMP计算机的分布式或网络化系统`：这种架构的共享资源有限，因为每台计算机都被设计为独立的。虽然这种架构比集群系统具有更高的容错能力，但它依赖于消息传递进行活动协调，更适用于分布式算法。'
  raw: '### Laws Affecting Parallel Processing


    Techniques (or *algorithms*) for solving problems with computers are studied and
    codified by computer scientists, often in resulting in so-called *laws of computing.*
    Several of these laws have interacted with trends in computer architecture and
    data growth over the past few years to influence our thinking about parallel processing.


    *   Moore''s Law (1965) states that the number of transistors that can fit on
    an integrated circuit doubles every two years and has implied that the speed and
    performance of computer microprocessors doubles as well. From the mid 1980''s
    to approximately 2004, this *speedup* remained fairly true as processor frequency
    scaling kept pace. However, power consumption started to become a problem, leading
    to *multi-core* processors which require parallelism to take full advantage of
    the law.

    *   Amdahl''s Law (1967) states that the speedup of a program using multiple processors
    in parallel computing is limited by the time needed for the sequential fraction
    of the program. Amdahl''s Law had a chilling effect on parallel processing since
    it states that programs could not be any faster than the speed of their sequential
    component. This implies a limit on the amount of speedup you can gain by parallelizing
    your programs, often getting programs that are only 10 to 20 times faster than
    their serial counterparts.

    *   Gustafson''s Law (1988) states that problems with very large, repetitive datasets
    can be efficiently parallelized, almost embarrassingly so (problems that have
    extremely small serial components and are easy to divide into small, independent
    units are formally called *embarrassingly parallel*).


    Tension between these laws met up with one other industry trend in the mid 2000''s—the
    rise of so-called “Big Data.”


    ### The Rise of Big Data


    Up until roughly 2007, data growth remained fairly steady and linear. However,
    as technology has made it easier to capture, store, and send information, there
    has been an acceleration in the data growth curve. In 2011, the world will generate
    ten times the amount of data generated in 2006\. Much of this data is actually
    machine generated, as the cost of sensors and data capture from web-based activities
    has come down. Where we once might have referred to gigabytes of data as being
    immense, we now look at terabytes, petabytes, and exabytes of data.


    Awash in this sea of data, we start to see that attempting to put this data to
    work in a serial fashion just isn''t feasible. With only 86,400 seconds in a day,
    we have to achieve extreme speeds to process this kind of data if we process one
    bit at time. Amdahl''s Law, designed to predict the speedup of fixed problems
    sizes and serial portions ranging from 5 to 10%, simply doesn''t provide a framework
    for dealing with problem sizes this large that are growing at this new rate. Ten
    to twenty times speedups just aren''t enough; we need to look beyond serial speedup
    at ways to handle larger and larger data sets. Gustafson''s Law, which includes
    the idea that people would like solve ever larger problems within a relatively
    fixed time, coupled with the decline in processor frequency speedups in 2004,
    has led to the renewed interest in parallel programming.


    ### Parallel vs. Distributed Processing


    At this point, you may be wondering about how to achieve parallel processing in
    a database environment. You may have had exposure to some of the newer data processing
    frameworks that use many inexpensive individual computers networked together to
    perform data analysis tasks in a way that sounds like parallel processing. After
    all, our examples from nature seem like perfect matches for this kind of architecture.


    These kinds of environments are usually classified as distributed computing environments,
    which are distinguished by a lack of access to a shared memory area and consequently
    the need to communicate via message passing over some kind of network. In a distributed
    environment, there is significant overhead due to the need for systems to coordinate
    their activities over this slow (compared to local processing speed) network.
    Also, in distributed systems, it''s assumed that each process can only see a portion
    of the data—none of the processes has access to the entire data set. This limits
    the applicability of distributed algorithms. They work well when the data is already
    distributed among the nodes, or if the data set is so large that the overhead
    tasks of splitting and distributing the data (including the inter-node communication
    overhead) are minuscule when compared to the overall data set size. Even so, there
    is significant overlap between parallel and distributed processing. A parallel
    system may be described as a tightly coupled distributed system, while a distributed
    system may be described as a loosely coupled parallel system.


    The good news is that most distributed algorithms are easily translated to parallel
    procedures, so if you come across a distributed procedure that sounds promising,
    you should be able to modify it to run on a parallel architecture.


    ### Parallel Hardware Architectures


    There are several kinds of hardware architectures that may be suitable for parallel
    processing. It''s also useful to understand which architectural features make
    a system less suitable for the requirements of a parallel procedure.


    *   *Single computer, single processor, single core*: As a base case, this kind
    of computer is rarely encountered, but it''s useful to note that a single core,
    single processor, isolated computer can only do one thing at a time. There is
    no way to implement a parallel procedure on such a system.

    *   *Single computer, single processor, multi-core*: If the system exposes the
    multiple cores as separate processors to the operating system, then it''s possible
    to exploit those cores in parallel. Generally, these cores share access to a high-speed
    memory cache on the chip and therefore can easily share coordination information.

    *   *Single computer, multi-processor, single or multi-core*: Often called symmetric
    multiprocessing systems (SMP), these kinds of computers have been the mainstay
    of open systems. These systems have processors that may not share a local high-speed
    memory, but all of them share access to the main computer memory through a memory
    bus. This shared memory access enables the processors to coordinate their activities.
    In some of these systems, the processors are grouped together on processor boards
    including a large amount of memory. If that memory is shared across processor
    boards, such access may be *non-uniform,* resulting in uneven memory access times.

    *   *Clustered systems of SMP computers*: Clustered systems usually employ some
    kind of high-speed dedicated system interconnection network to facilitate communication
    between the computer nodes. These kinds of computer clusters may or may not share
    access to disks. When they share access to disks, they are called *shared everything*
    architectures. When they don''t, they are called *shared nothing* architectures
    and more closely resemble distributed systems. In some variants of clusters, the
    high-speed interconnect actually enables remote access to the memory of each individual
    computer node from all other nodes. While such remote memory access is much slower
    than local memory access, it is much faster than using the disk subsystem to transfer
    information between nodes. Oracle Real Application Clustering technology using
    Cache Fusion has taken advantage of this capability since version 9.

    *   *Distributed or networked systems of SMP computers*: This architecture has
    limited shared resources as each computer is designed to be independent. While
    this architecture has more fault tolerance than a clustered set of systems, it
    relies on message passing for activity coordination and is much more suitable
    for distributed algorithms.'
  trans: '

    # 并行处理与大数据相关概念


    ## 影响并行处理的定律


    解决问题的技术（或`算法`）由计算机科学家研究和实现，常常引出所谓的`计算定律`。其中一些定律与过去几年计算机架构和数据增长的趋势相互作用，影响了我们对并行处理的思考。


    *   `摩尔定律`（1965）指出，可以容纳在集成电路上的晶体管数量每两年翻一番，并意味着计算机微处理器的速度和性能也将随之翻倍。从 1980 年代中期到大约
    2004 年，这种`加速`基本成立，因为处理器频率扩展保持了步伐。然而，功耗开始成为问题，导致了需要并行才能充分利用该定律的`多核`处理器的出现。

    *   `阿姆达尔定律`（1967）指出，在并行计算中使用多个处理器的程序，其加速受程序中顺序部分所需时间的限制。阿姆达尔定律对并行处理产生了冷却效应，因为它指出程序不可能比其顺序组件的执行速度更快。这意味着通过并行化程序所能获得的加速量是有限的，通常只能让程序比它们的串行对应物快
    10 到 20 倍。

    *   `古斯塔夫森定律`（1988）指出，具有非常大、重复数据集的问题可以有效地并行化，几乎是尴尬地并行（具有极小的顺序组件且易于划分为小的、独立单元的问题正式称为`尴尬并行`）。


    这些定律之间的紧张关系在 2000 年代中期与另一个行业趋势——所谓“大数据”的兴起——相遇。


    ## 大数据的兴起


    直到大约 2007 年，数据增长保持相当稳定和线性。然而，随着技术使捕获、存储和发送信息变得更容易，数据增长曲线出现了加速。2011 年，世界产生的数据量将是
    2006 年的十倍。其中大部分数据实际上是机器生成的，因为传感器和基于网络活动的捕获成本已经下降。我们过去可能认为千兆字节的数据是巨大的，而现在我们则以太字节、拍字节和艾字节的数据来衡量。


    淹没在数据海洋中，我们开始看到，试图以串行方式利用这些数据是不可行的。一天只有 86，400 秒，如果我们一次处理一个比特，就需要极高的速度来处理这种数据。阿姆达尔定律旨在预测固定问题大小和顺序部分占比
    5%到 10%的加速情况，根本无法为处理这种以新速率增长的大型问题提供一个框架。10 到 20 倍的加速根本不够；我们需要超越串行加速，寻找处理越来越大的数据集的方法。古斯塔夫森定律包含了人们希望在相对较短的时间内解决越来越大的问题的观点，再加上
    2004 年处理器频率加速的衰退，导致了人们对并行编程重新产生了兴趣。


    ## 并行处理与分布式处理


    在这一点上，你可能想知道如何在数据库环境中实现并行处理。你可能接触过一些较新的数据处理框架，它们使用许多通过网络连接在一起的廉价独立计算机来执行数据分析任务，听起来像是并行处理。毕竟，我们从自然中得到的例子似乎是这种架构的完美匹配。


    这类环境通常被归类为分布式计算环境，其特点是缺乏对共享内存区域的访问，因此需要通过某种网络进行消息传递来通信。在分布式环境中，由于系统需要通过这种（与本地处理速度相比）缓慢的网络协调它们的活动，因此存在显著的开销。此外，在分布式系统中，假定每个进程只能看到一部分数据——没有一个进程可以访问整个数据集。这限制了分布式算法的适用性。当数据已经分布在节点之间，或者数据集如此之大以至于分割和分发数据的开销任务（包括节点间通信开销）与整个数据集大小相比微不足道时，它们工作良好。即便如此，并行处理和分布式处理之间存在显著重叠。一个并行系统可以被描述为紧耦合的分布式系统，而一个分布式系统可以被描述为松耦合的并行系统。


    好消息是，大多数分布式算法很容易转化为并行过程，因此如果你遇到一个听起来很有前景的分布式过程，你应该能够修改它以在并行架构上运行。


    ## 并行硬件架构


    有几种硬件架构可能适用于并行处理。了解哪些架构特性使得系统不太适合并行过程的要求也是有用的。


    *   `单计算机，单处理器，单核`：作为基本情况，这种计算机很少遇到，但值得注意的是，单核、单处理器、独立的计算机一次只能做一件事。无法在此类系统上实现并行过程。

    *   `单计算机，单处理器，多核`：如果系统将多个内核作为独立处理器暴露给操作系统，那么就有可能并行利用这些内核。通常，这些内核共享对芯片上高速内存缓存的访问，因此可以轻松共享协调信息。

    *   `单计算机，多处理器，单核或多核`：通常称为对称多处理系统（SMP），这类计算机一直是开放系统的主力。这些系统的处理器可能不共享本地高速内存，但所有处理器都通过内存总线共享对主计算机内存的访问。这种共享内存访问使处理器能够协调它们的活动。在其中一些系统中，处理器被分组在包含大量内存的处理器板上。如果该内存是在处理器板之间共享的，则这种访问可能是`非均匀`的，导致内存访问时间不均。

    *   `SMP 计算机的集群系统`：集群系统通常采用某种高速专用系统互连网络来促进计算机节点之间的通信。这类计算机集群可能共享也可能不共享磁盘访问。当它们共享磁盘访问时，它们被称为`共享一切`架构。当它们不共享时，则被称为`无共享`架构，更类似于分布式系统。在某些集群变体中，高速互连实际上允许从所有其他节点远程访问每个单独计算机节点的内存。虽然这种远程内存访问比本地内存访问慢得多，但它比使用磁盘子系统在节点之间传输信息要快得多。从版本
    9 开始，使用缓存融合的`Oracle Real Application Clustering`技术就利用了这一功能。

    *   `SMP 计算机的分布式或网络化系统`：这种架构的共享资源有限，因为每台计算机都被设计为独立的。虽然这种架构比集群系统具有更高的容错能力，但它依赖于消息传递进行活动协调，更适用于分布式算法。

