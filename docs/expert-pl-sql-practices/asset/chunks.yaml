  trans: "# 安全问题\n\n## 安全理念\n\n从安全角度来看，“处理未知情况”需要一定程度的**健康的偏执**。任何优秀的开发者都应该假设，如果某样东西*可能*被滥用，那么它*终将*被滥用的几率就很大。同时，非常常见的情况是，“操作者失误”的后果比任何可想象的蓄意攻击都更具破坏性，这导向一个结论：一个系统不仅需要防范犯罪分子，还需要防范任何不幸的事件组合。\n\
    \n在使用动态 SQL 时，上述概念应转化为以下思想：在任何情况下，都不应该能动态生成任何非预期生成的代码。考虑到代码既包含结构元素（表、列等）也包含数据，适用以下规则：\n\
    \n*   结构元素不能替代数据被传入。\n*   只能传入允许的结构元素。\n\n## 两条指导原则\n\n满足这两个条件的解决方案可以通过遵循以下两条规则来实现：\n\
    \n*   当应用用户输入纯数据元素（如列的值等）时，这些值必须通过绑定变量传递给动态 SQL。不应允许将任何值拼接到代码的结构部分。\n*   当由于应用用户的操作需要更改代码的整体结构时，此类操作必须限于已知的存储库元素。整体系统安全性应通过以下角色分离来强制执行：\n\
    \    *   普通用户无权更改存储库。\n    *   能够更改存储库的人员是特别指定的管理员。\n    *   任何管理员不能同时担任普通用户角色。\n\
    \n### 第一条规则：绑定变量\n\n第一条规则很容易解释。因为绑定变量仅在查询结构解析后才被评估，意外的值（如著名的 `NULL OR 1=1`）根本无法影响任何事情，如下所示：\n\
    \n```sql\nSQL> DECLARE\n  2     v_tx VARCHAR2(256):='NULL OR 1=1';\n  3     v_count_nr\
    \ NUMBER:=0;\n  4  BEGIN\n  5     EXECUTE IMMEDIATE 'SELECT count(*) FROM emp\
    \ WHERE ename = :1'\n  6     INTO v_count_nr USING v_tx ;\n  7     dbms_output.put_line('Bind:\
    \ '||v_count_nr);\n  8 \n  9     EXECUTE IMMEDIATE 'select count(*) FROM emp WHERE\
    \ ename = '||v_tx\n 10     INTO v_count_nr;\n 11     dbms_output.put_line('Inject:\
    \ '||v_count_nr);\n 12  END;\n 13  /\nBind: 0\nInject: 14\nPL/SQL procedure successfully\
    \ completed.\nSQL>\n```\n\n### 第二条规则：基于存储库的配置\n\n第二条规则意味着使用存储库，这可能与大多数当代开发者的习惯相悖，但它为输入可用选项的人员和实际使用这些选项的人员之间提供了一个独特的角色分离机会。这种基于存储库的解决方案的另一个优势是部署成本。由于所有需要的更改都可以通过对存储库表执行\
    \ DML 来处理，因此没有服务中断，也没有停机时间。这些考虑有时可以真正挽救项目，如下文的真实世界案例所示。\n\n## 真实案例研究\n\n从前有一个经典的\
    \ 3 层 IT 系统，即使是对前端进行最小的更改，通常也需要大约 4-6 小时的停机时间来部署（外加至少一天的准备工作）。新模块的需求至少每周来两次。这些需求非常简单，例如获取少量输入，执行相关例程，并报告结果。不幸的是，每个需求最初都必须作为一个新的屏幕单独编码，并通过常规机制部署。结果，公司里总是有一群不开心的人，要么是无法及时获得所需数据的用户，要么是每周都要经历数次为了添加一个简单屏幕而让整个系统停机的痛苦的维护团队。\n\
    \n将处理未知的概念应用到这个问题中，应该能使可用的替代方案更加清晰。让我们将信息分成两组：\n\n*   已知：\n    *   每个屏幕都必须部署到\
    \ Web。\n    *   每个屏幕都基于一个单一的请求。\n    *   每个请求最多接受五个简单参数。\n    *   每个请求以文本形式返回一个摘要。\n\
    *   未知：\n    *   标题信息（屏幕名称、备注、参数名称）\n    *   参数的数据类型（包括可空性和可能的格式掩码）\n    *   摘要的格式\n\
    \n通过以建议的结构阐明问题，现在所提议解决方案的格式就清晰了：\n\n*   每个屏幕由存储库中的一行表示，具有以下属性集：\n    *   通用名称（弹出屏幕的标题）\n\
    \    *   最多 5 个参数，每个包括：\n        *   标题\n        *   必填/非必填标识\n        *   数据类型（`NUMBER`/`DATE`/`TEXT`/`LOV`）\n\
    \        *   可选的转换表达式（例如 UI 中的默认日期格式，因为 Web 上的所有内容都是基于文本的）\n        *   值列表名称（用于\
    \ `LOV` 数据类型）\n    *   相应函数的名称，格式如下：\n        *   输入参数的顺序（和数量）必须与屏幕参数的顺序匹配\n \
    \       *   函数应返回一个 `CLOB`\n*   所有注册函数返回的 `CLOB` 必须是完全格式化的 HTML 页面，可立即在前端显示。\n\
    *   存储库中的所有活动只能由管理员访问，终端用户不可见。\n\n因此，从系统的角度来看，操作的逻辑流程现在变得非常简单。\n\n1.  用户从存储库中看到可用模块列表并选择一个。\n\
    2.  前端应用程序读取存储库，并动态构建一个弹出屏幕，包含适当的输入字段和必填指示器。如果输入字段的数据类型是值列表，该实用程序会请求通用的 `LOV`\
    \ 机制提供现有的 `ID`/`DISPLAY` 对。\n3.  用户输入所需内容并按下 `SUBMIT`。前端通过将正在使用的模块的存储库 ID 和所有用户输入的值传递给它，来触发主（伞形）过程。\n\
    4.  伞形过程构建一个真实的函数调用，传入输入的值，并将生成的 `CLOB` 返回给前端（已经格式化为 HTML）。\n5.  前端显示生成的 HTML。\n\
    \n现在所有团队都会很高兴，因为从任何新模块被宣布为生产就绪，到它可从前端访问，只需要几秒钟。没有停机，也没有部署——只需复制一个新函数并在存储库中用一个\
    \ `INSERT` 语句注册该函数。\n\n## 实现示例\n\n为了说明所有这些“奇迹”是什么样子，示例的准备部分是构建一个满足所有格式要求的函数，创建一个存储库表，并在存储库中注册该函数：\n\
    \n```sql\nCREATE FUNCTION f_getEmp_CL (i_job_tx VARCHAR2, i_hiredate_dt DATE)\n\
    RETURN CLOB\nIS\n    v_out_cl CLOB;\n    PROCEDURE p_add(pi_tx VARCHAR2) IS\n\
    \    BEGIN\n        dbms_lob.writeappend(v_out_cl,length(pi_tx),pi_tx);\n    END;\n\
    BEGIN\n    dbms_lob.createtemporary(v_out_cl,true,dbms_lob.call);\n    p_add('<html><table>');\
    \    \n    FOR c IN (SELECT '<tr>'||'<td>'||empno||'</td>'||'<td>'||ename||'</td>'||'</tr>'\
    \ row_tx\n                     FROM emp\n                     WHERE job = i_job_tx\n\
    \                     AND hiredate >= NVL(i_hiredate_dt,add_months(sysdate,-36))\n\
    \                     )\n    LOOP\n        p_add(c.row_tx);\n    END LOOP;\n \
    \   p_add('</table></html>');\n    RETURN v_out_cl;\nEND;\n```"
- fmt: "# Dynamic SQL in Oracle\n\n## Performance and Resource Utilization\n\nIn addition\
    \ to security risks, there is one more bogeyman that prevents people from effectively\
    \ using Dynamic SQL: it is considered too costly performance-wise. The problem\
    \ is that this statement is never completed: costly in comparison to what? It\
    \ is true that running the same statement directly is faster than wrapping it\
    \ into an `EXECUTE IMMEDIATE` command. But this is like comparing apples to oranges.\
    \ It is absolutely irrelevant how much time it takes for an individual task to\
    \ run, because the only critical thing to be tuned is the overall performance\
    \ of the module.\n\nTake another look at the example from the previous section\
    \ using Dynamic SQL to work with the repository. Of course this leads to some\
    \ overhead, namely pre-formatting results as HTML, using an umbrella module, dynamic\
    \ calls to underlying functions, etc. Each of these elements decreases the speed\
    \ of request processing compared to a screen built by hand. But the key question\
    \ remains: Does anyone notice the slowdown? The answer is “No,” because all of\
    \ the listed “overhead” causes, at most, a millisecond of time, which is negligible\
    \ compared to the total processing time.\n\nThis means that the actual factor\
    \ to be evaluated is whether or not it is worthwhile to pay the price of using\
    \ Dynamic SQL. Each time, the answer will depend upon detailed analysis of the\
    \ specific business cases. There will be some instances where the price is acceptable\
    \ (such as the one just reviewed) and other cases where the price will be too\
    \ steep. The following example illustrates such a case.\n\n### Anti-Patterns\n\
    \nOccasionally end users ask for a multi-select option in the application. Usually\
    \ it means that there should be an operation to be performed against an undefined\
    \ list of elements. Since the length of the list is not known, it is very tempting\
    \ to use a text string as communication mechanism, as in the following process:\n\
    \n1.  Front-end code concatenates all selected IDs as a comma-separated string.\n\
    2.  This string is passed to the PL/SQL function.\n3.  PL/SQL function utilizes\
    \ Dynamic SQL to build the `IN`-clause.\n\nThe following is the necessary PL/SQL\
    \ function for last step of the process:\n\n```sql\nCREATE FUNCTION f_getSumSal_nr\
    \ (i_empno_tx VARCHAR2)\nRETURN NUMBER\nIS\n    v_out_nr NUMBER:=0;\n    v_sql_tx\
    \ VARCHAR2(2000);\nBEGIN\n    IF i_empno_tx IS NOT NULL THEN\n        v_sql_tx:='SELECT\
    \ sum(sal) FROM emp WHERE empno IN ('||i_empno_tx||')';\n        EXECUTE IMMEDIATE\
    \ v_sql_tx INTO v_out_nr;\n    END IF;\n    RETURN v_out_nr;\nEND;\n```\n\nUnfortunately,\
    \ this seemingly clean solution has a number of drawbacks that usually surface\
    \ only after the application has been deployed to production for some time. Here\
    \ are a few:\n\n*   There is a restriction on the total number of objects that\
    \ can be passed: `32K/(lenth_of_id+1)` or `4K/(lenth_of_id+1)` depending upon\
    \ whether the function is used in PL/SQL only or as a part of SQL statement. Converting\
    \ the whole module to `CLOB` instead of `VARCHAR2` is very expensive because of\
    \ the `CLOB` overhead, especially on the physical `I/O`.\n*   If the list of values\
    \ is not just made up of IDs, but some kind of text, this poses the question of\
    \ having the correct number of quotes in the text.\n*   Because of the unknown\
    \ number of items in the list, it's possible to get different Explain Plans. Also,\
    \ this code will be very susceptible to changes in column-level statistics.\n\
    *   It's not secure (passing `SELECT empno FROM emp` will immediately provide\
    \ a different level of data access), but making this module injection-proof would\
    \ require very nontrivial string parsing.\n\nOverall, from my experience, the\
    \ effect of Dynamic SQL in this case is negative. The alternative option will\
    \ look like this:\n\n```sql\nCREATE TYPE id_tt IS TABLE OF NUMBER;\n\nCREATE FUNCTION\
    \ f_getSumSal_nr (i_tt id_tt)\nRETURN NUMBER IS\n    v_out_nr NUMBER:=0;\nBEGIN\n\
    \    IF i_tt IS NOT NULL AND i_tt.count>0 THEN\n        SELECT sum(sal) INTO v_out_nr\n\
    \        FROM emp\n        WHERE empno IN (SELECT t.column_value FROM TABLE(CAST(i_tt\
    \ as id_tt)) t);\n    END IF;\n    RETURN v_out_nr;\nEND;\n```\n\nThis solution\
    \ uses an object collection to pass the list. The overhead of such a collection\
    \ is well compensated for by firing regular instead of Dynamic SQL and by not\
    \ worrying about the data length/data structure."
  raw: '`CREATE TABLE t_extra_ui`

    `(id_nr                  NUMBER PRIMARY KEY,`

    ` displayName_tx VARCHAR2(256),`

    ` function_tx         VARCHAR2(50),`

    ` v1_label_tx        VARCHAR2(100),`

    ` v1_type_tx         VARCHAR2(50),`

    ` v1_required_yn  VARCHAR2(1),`

    ` v1_lov_tx           VARCHAR2(50),`

    ` v1_convert_tx    VARCHAR2(50),`

    `...  – and 4 more groups of the same structure);`


    `INSERT INTO t_extra_ui ( id_nr,displayName_tx,function_tx,`

    `                      v1_label_tx, v1_type_tx, v1_required_yn, v1_lov_tx, v1_convert_tx,`

    `                      v2_label_tx, v2_type_tx, v2_required_yn, v2_lov_tx, v2_convert_tx
    )`

    `VALUES (100, ''Filter Employees'', ''f_getEmp_cl'',`

    `        ''Job'',''TEXT'',''Y'',null,null,`

    `        ''Hire Date'',''DATE'',''N'',null,''TO_DATE(:2,''''YYYYMMDD'''')'');`


    This example includes a function that generates a list of employees with defined
    job titles and were hired after a defined date (or at least three years ago if
    such date was not provided). Dynamic SQL allows the assembly of all of these pieces
    in the following umbrella function


    `CREATE FUNCTION f_umbrella_cl (i_id_nr NUMBER,`

    `                                       v1_tx VARCHAR2:=null,...,v5_tx VARCHAR2:=null)`

    `RETURN CLOB`

    `IS`

    `    v_out_cl CLOB;`

    `    v_sql_tx VARCHAR2(32767);`

    `    v_rec t_extra_ui%ROWTYPE;`

    `BEGIN`

    `    SELECT * INTO v_rec FROM t_extra_ui WHERE id_nr=i_id_nr;`


    `    IF v_rec.v1_label_tx IS NOT NULL THEN`

    `        v_sql_tx:=nvl(v_rec.v1_convert_tx,'':1'');`

    `    END IF;`

    `      ...`

    `    IF v_rec.v5_label_tx IS NOT NULL THEN`

    `        v_sql_tx:=v_sql_tx||'',''||nvl(v_rec.v5_convert_tx,'':5'');`

    `    END IF;`


    `    v_sql_tx:=''BEGIN :out:=''||v_rec.function_tx||''(''||v_sql_tx||''); END;'';`


    `    IF v5_tx IS NOT NULL THEN`

    `        EXECUTE IMMEDIATE v_sql_tx USING OUT v_out_cl, v1_tx,…,v5_tx;`

    `      ...`

    `    ELSIF v1_tx IS NOT NULL THEN`

    `        EXECUTE IMMEDIATE v_sql_tx USING OUT v_out_cl, v1_tx;`

    `    ELSE`

    `        EXECUTE IMMEDIATE v_sql_tx USING OUT v_out_cl;`

    `    END IF;`


    `    RETURN v_out_cl;`

    `END;`


    This function is the crux of the proposed solution, since it is the only part
    of the existing code visible outside of the database. From a code injection point
    of view, everything is completely safe, even allowing user-defined input to influence
    structural elements of the underlying calls. But all of these structural elements
    are declared in the repository table and the application user can only communicate
    to the system something like “run routine #N” (where N is selected from the value
    list) without any way of controlling how #N transforms into F_GETEMP_CL. This
    allows the system to be flexible enough without creating a security breach.


    Overall, the biggest security risk nowadays is laziness. Everyone knows what should
    be done and how to write protected code, but not all development environments
    enforce enough discipline to make this a reality. Oracle provides enough options
    to keep all of the doors and windows safely locked.


    ### Performance and Resource Utilization


    In addition to security risks, there is one more bogeyman that prevents people
    from effectively using Dynamic SQL: it is considered too costly performance-wise.
    The problem is that this statement is never completed: costly in comparison to
    what? It is true that running the same statement directly is faster than wrapping
    it into an EXECUTE IMMEDIATE command. But this is like comparing apples to oranges.
    It is absolutely irrelevant how much time it takes for an individual task to run,
    because the only critical thing to be tuned is the overall performance of the
    module.


    Take another look at the example from the previous section using Dynamic SQL to
    work with the repository. Of course this leads to some overhead, namely pre-formatting
    results as HTML, using an umbrella module, dynamic calls to underlying functions,
    etc. Each of these elements decreases the speed of request processing compared
    to a screen built by hand. But the key question remains: Does anyone notice the
    slowdown? The answer is “No,” because all of the listed “overhead” causes, at
    most, a millisecond of time, which is negligible compared to the total processing
    time.


    This means that the actual factor to be evaluated is whether or not it is worthwhile
    to pay the price of using Dynamic SQL. Each time, the answer will depend upon
    detailed analysis of the specific business cases. There will be some instances
    where the price is acceptable (such as the one just reviewed) and other cases
    where the price will be too steep. The following example illustrates such a case.


    #### Anti-Patterns


    Occasionally end users ask for a multi-select option in the application. Usually
    it means that there should be an operation to be performed against an undefined
    list of elements. Since the length of the list is not known, it is very tempting
    to use a text string as communication mechanism, as in the following process:


    1.  Front-end code concatenates all selected IDs as a comma-separated string.

    2.  This string is passed to the PL/SQL function.

    3.  PL/SQL function utilizes Dynamic SQL to build the IN-clause.


    The following is the necessary PL/SQL function for last step of the process:


    `CREATE FUNCTION f_getSumSal_nr (i_empno_tx VARCHAR2)`

    `RETURN NUMBER`

    `IS`

    `    v_out_nr NUMBER:=0;`

    `    v_sql_tx VARCHAR2(2000);`

    `BEGIN`

    `    IF i_empno_tx IS NOT NULL THEN`

    `        v_sql_tx:=''SELECT sum(sal) FROM emp WHERE empno IN (''||i_empno_tx||'')'';`

    `        EXECUTE IMMEDIATE v_sql_tx INTO v_out_nr;`

    `    END IF;`

    `    RETURN v_out_nr;`

    `END;`


    Unfortunately, this seemingly clean solution has a number of drawbacks that usually
    surface only after the application has been deployed to production for some time.
    Here are a few:


    *   There is a restriction on the total number of objects that can be passed:
    32K/(lenth_of_id+1) or 4K/(lenth_of_id+1) depending upon whether the function
    is used in PL/SQL only or as a part of SQL statement. Converting the whole module
    to CLOB instead of VARCHAR2 is very expensive because of the CLOB overhead, especially
    on the physical I/O.

    *   If the list of values is not just made up of IDs, but some kind of text, this
    poses the question of having the correct number of quotes in the text.

    *   Because of the unknown number of items in the list, it''s possible to get
    different Explain Plans. Also, this code will be very susceptible to changes in
    column-level statistics.

    *   It''s not secure (passing `SELECT empno FROM emp` will immediately provide
    a different level of data access), but making this module injection-proof would
    require very nontrivial string parsing.


    Overall, from my experience, the effect of Dynamic SQL in this case is negative.
    The alternative option will look like this:


    `CREATE TYPE id_tt IS TABLE OF NUMBER;`


    `CREATE FUNCTION f_getSumSal_nr (i_tt id_tt)`

    `RETURN NUMBER IS`

    `    v_out_nr NUMBER:=0;`

    `BEGIN`

    `    IF i_tt IS NOT NULL AND i_tt.count>0 THEN`

    `        SELECT sum(sal) INTO v_out_nr`

    `        FROM emp`

    `        WHERE empno IN (SELECT t.column_value FROM TABLE(CAST(i_tt as id_tt))
    t);`

    `    END IF;`

    `    RETURN v_out_nr;`

    `END;`


    This solution uses an object collection to pass the list. The overhead of such
    a collection is well compensated for by firing regular instead of Dynamic SQL
    and by not worrying about the data length/data structure.'
  trans: "# Oracle 中的动态 SQL\n\n## 性能与资源利用\n\n除了安全风险，还有一个阻碍人们有效使用动态 SQL 的“拦路虎”：人们认为它在性能上代价过高。问题在于这种说法从未被完整阐述：所谓“代价高”是与什么相比？确实，直接运行同一条语句比将其包装在\
    \ `EXECUTE IMMEDIATE` 命令中要快。但这就像拿苹果和橘子作比较。单个任务运行所需的时间绝对无关紧要，因为唯一需要调优的关键点是模块的整体性能。\n\
    \n请再看一下上一节中使用动态 SQL 与仓库交互的示例。当然，这会带来一些开销，例如将结果预格式化为 HTML、使用封装模块、对底层函数进行动态调用等等。与手工构建的界面相比，这些因素中的每一个都会降低请求处理的速度。但关键问题依然存在：有人注意到这个减速吗？答案是“没有”，因为所有列出的“开销”最多只会导致毫秒级的时间消耗，相对于总处理时间而言可以忽略不计。\n\
    \n这意味着，实际需要评估的因素是，为使用动态 SQL 所付出的代价是否值得。每次的答案都将取决于对特定业务场景的详细分析。会有一些场景中这个代价是可以接受的（比如刚刚回顾的那个），而在另一些场景中代价会过高。下面的例子说明了后一种情况。\n\
    \n### 反模式\n\n有时，最终用户会在应用程序中要求一个多选选项。这通常意味着需要对一个未定义的元素列表执行某项操作。由于列表的长度未知，使用文本字符串作为通信机制就显得非常诱人，如以下流程所示：\n\
    \n1.  前端代码将所有选中的 ID 连接成一个逗号分隔的字符串。\n2.  该字符串被传递给 PL/SQL 函数。\n3.  PL/SQL 函数利用动态\
    \ SQL 来构建 `IN` 子句。\n\n以下是该流程最后一步所需的 PL/SQL 函数：\n\n```sql\nCREATE FUNCTION f_getSumSal_nr\
    \ (i_empno_tx VARCHAR2)\nRETURN NUMBER\nIS\n    v_out_nr NUMBER:=0;\n    v_sql_tx\
    \ VARCHAR2(2000);\nBEGIN\n    IF i_empno_tx IS NOT NULL THEN\n        v_sql_tx:='SELECT\
    \ sum(sal) FROM emp WHERE empno IN ('||i_empno_tx||')';\n        EXECUTE IMMEDIATE\
    \ v_sql_tx INTO v_out_nr;\n    END IF;\n    RETURN v_out_nr;\nEND;\n```\n\n不幸的是，这个看似干净的解决方案存在一些缺点，通常只在应用程序部署到生产环境一段时间后才会显现。以下列举几点：\n\
    \n*   对可传递对象的总数有限制：`32K/(ID 长度+1)` 或 `4K/(ID 长度+1)`，取决于该函数是仅在 PL/SQL 中使用还是作为 SQL\
    \ 语句的一部分。将整个模块转换为 `CLOB` 而不是 `VARCHAR2` 代价非常高，因为 `CLOB` 的开销，特别是在物理 `I/O` 方面。\n\
    *   如果值的列表不只是由 ID 构成，而是某种文本，这就引出了文本中引号数量是否正确的问题。\n*   由于列表中项目数量未知，可能会得到不同的执行计划。此外，此代码会非常容易受到列级统计信息变更的影响。\n\
    *   它不安全（传递 `SELECT empno FROM emp` 会立即提供不同级别的数据访问权限），但要使此模块防注入，需要进行非常复杂的字符串解析。\n\
    \n总的来说，根据我的经验，动态 SQL 在这种情况下产生的效果是负面的。替代方案如下所示：\n\n```sql\nCREATE TYPE id_tt IS\
    \ TABLE OF NUMBER;\n\nCREATE FUNCTION f_getSumSal_nr (i_tt id_tt)\nRETURN NUMBER\
    \ IS\n    v_out_nr NUMBER:=0;\nBEGIN\n    IF i_tt IS NOT NULL AND i_tt.count>0\
    \ THEN\n        SELECT sum(sal) INTO v_out_nr\n        FROM emp\n        WHERE\
    \ empno IN (SELECT t.column_value FROM TABLE(CAST(i_tt as id_tt)) t);\n    END\
    \ IF;\n    RETURN v_out_nr;\nEND;\n```\n\n这个解决方案使用一个对象集合来传递列表。这种集合的开销，通过执行常规 SQL\
    \ 而非动态 SQL，并且无需担心数据长度/数据结构，得到了很好的补偿。"
- fmt: "#### Comparing Implementations of Dynamic SQL\n\nSince there are different\
    \ implementations of Dynamic SQL, what type of Dynamic SQL would be more efficient?\
    \ The next real-life story illustrates why you need to know about `DBMS_SQL` package.\
    \ The task started as a request from end users to be able to upload CSV-files\
    \ based on a number of predefined templates to the system. Here are some of the\
    \ requirements and characteristics of the system:\n\n*   The file prefix defines\
    \ the template type. Column headers map directly to table columns (if the header\
    \ is not registered, it will be ignored).\n*   One row of the file represents\
    \ one logical group of from 1 to N rows. For example, one row could include both\
    \ action and correction records (you can think of it as sale transaction and cancellation\
    \ transaction—linked, but separate).\n*   Group-level validation must be supported.\
    \ Rules are applicable to the whole set of rows rather than to each insert.\n\n\
    The original implementation of the solution was straightforward: read a row, build\
    \ an `INSERT` statement as a text string using headers, fire the `EXECUTE IMMEDIATE`\
    \ command. But with real volumes of data (10k+ rows in a single file), DBAs started\
    \ to complain that the CPU workload became too high. Also, early-adopters were\
    \ complaining that the performance of the module was significantly worse compared\
    \ with the original estimates (and worsened with increased file sizes). After\
    \ detailed database tracing, it became clear that all of the extra time spent\
    \ was the result of parsing `INSERT` statements.\n\nKeep in mind the following\
    \ information about parsing:\n\n*   `EXECUTE IMMEDIATE` without bind variables:\
    \ N hard parses for N calls\n*   `EXECUTE IMMEDIATE` with bind variables:\n  \
    \  *   10g and below: one hard parse + N-1 soft parse for N calls\n    *   11:\
    \ one hard parse only if the same statement is being executed over and over again.\
    \ This is an internal optimization (invisible) and it doesn't work if there is\
    \ more than one type of call.\n*   `DBMS_SQL` with separation of parsing and execution\
    \ stage: only one hard parse for each type of call because `DBMS_SQL` allows storage\
    \ of a parsed statement and reusing it multiple times.\n\nBecause the majority\
    \ of templates included multiple types of `INSERT` statements, Oracle 11g unfortunately\
    \ would not help at all in this case. However, switching from `EXECUTE IMMEDIATE`\
    \ to `DBMS_SQL` sounded promising and I made the appropriate changes.\n\nThe first\
    \ step was to prepare `INSERT` statements, assign each one its own `DBMS_SQL`\
    \ cursor (already parsed), and store these cursors in the associative array for\
    \ future access as shown here:\n\n```\nDECLARE\n    TYPE integer_tt IS TABLE OF\
    \ integer;\n    v_cur_tt integer_tt;\n    ...\nBEGIN\n    ...\n    FOR r IN v_groupRow_tt.first..v_groupRow_tt.last\
    \ LOOP\n        v_cur_tt(r):=dbms_sql.open_cursor;\n        FOR c IN c_cols(v_groupRow_tt(r))\
    \ LOOP\n            FOR i IN v_header_tt.first..v_header_tt.last LOOP\n      \
    \          IF v_header_tt(i).text=c.name_tx THEN\n                    v_col_tt(i):=c;\n\
    \                    v_columnRow_tt(r||'|'||v_col_tt(i).name_tx):=v_col_tt(i).viewcol_tx;\n\
    \                    v_col_tx:=v_col_tx||','||v_col_tt(i).viewcol_tx;\n      \
    \              v_val_tx:=v_val_tx||',:'||v_col_tt(i).viewcol_tx;\n           \
    \     END IF;\n            END LOOP;\n        END LOOP;\n        v_sql_tx:='INSERT\
    \ INTO '||v_map_rec.view_tx||'('||v_col_tx||') VALUES('||v_val_tx||')';\n    \
    \    dbms_sql.parse(v_cur_tt(r),v_sql_tx,dbms_sql.native);\n    END LOOP;\n```\n\
    \nNow it is only necessary to spin through all of the rows of the uploaded file,\
    \ find the appropriate row type (from the array) and bind variables, and fire\
    \ the `INSERT` statement.\n\n```\n    FOR i IN 2..v_row_tt.count LOOP -- first\
    \ row is a header\n        FOR r IN v_groupRow_tt.first..v_groupRow_tt.last LOOP\n\
    \            FOR c IN v_col_tt.first..v_col_tt.last LOOP\n                IF v_columnRow_tt.exists(r||'|'||v_col_tt(c).name_tx)THEN\n\
    \                    dbms_sql.bind_variable\n                         (v_cur_tt(r),':'||v_col_tt(c).viewcol_tx,\
    \ v_data_tt(c).text);\n                END IF;\n            END LOOP;\n      \
    \      v_nr:=dbms_sql.execute(v_cur_tt(r));\n        END LOOP;\n    END LOOP;\n\
    \    …\nEND;\n```\n\nImagine my surprise when the total processing time for a\
    \ set of 60,000 rows dropped by a factor of 50! This definitely made the users\
    \ happy.\n\nThis example perfectly illustrates the complexity of system tuning.\
    \ It can't simply be narrowed down to low-level technical analysis, but must always\
    \ include a global vision of what is expected to happen. Only this approach to\
    \ performance optimization can guarantee that the selected options will be valid\
    \ here and now. There is just no such thing as a general best approach—only special\
    \ cases.\n\n### Object Dependencies\n\nThe third major concern (after security\
    \ and performance) when using Dynamic SQL is based on the fact that converting\
    \ a hardcoded solution into a dynamic one causes Oracle to lose track of object\
    \ dependencies between different database objects. This argument is very hard\
    \ to dispute since there is a significant piece of \"free\" information automatically\
    \ collected at the compilation state that is just not there anymore. The real\
    \ question remains: What exactly is the impact of not having such information\
    \ about the system development process?\n\n#### Negative Effects\n\nIt is clear\
    \ that less available data is not good. But in a lot of cases, it's possible to\
    \ get the same information from slightly different sources. Let's examine what\
    \ options are available. The following are some negative effects from losing the\
    \ record of object dependencies in your code.\n\n##### There is No Dependency\
    \ Path to Follow Up\n\nThe only clean way to be able to document object dependencies\
    \ is to use repository-based solutions with one (and only one) way of generating\
    \ code from them. Also, I strongly recommended that you model a repository in\
    \ a similar way to that of Oracle's data dictionary. It is nice to have tables,\
    \ columns, and PL/SQL objects explicitly referenced and not hidden deep in the\
    \ text. Now the whole dependency problem is limited to comparing the Oracle data\
    \ dictionary with your own, which should not be a big problem.\n\nThe requirement\
    \ to use a single method of code generation is also critical because this provides\
    \ 100% predictability. Since there is one and only one way of transforming a repository\
    \ into code, everything follows the same pattern and it is impossible to encounter\
    \ unexpected dependencies.\n\n##### There is No Way to Determine Exactly What\
    \ Will be Executed\n\nSince many parameters are either user-entered or constructed\
    \ on the fly, it's very difficult to predict possible syntax errors without actually\
    \ encountering them. This problem is much more difficult to solve, but the concept\
    \ of *samplers* can be very efficient. Here are some approaches you can take to\
    \ get a grip on what exactly will be executed:\n\n*   Generate all possible (or\
    \ as many as possible) permutations of the code to be executed and create PL/SQL\
    \ modules with that code. This approach can help to identify any initial code\
    \ problems.\n*   Record all dependencies and keep a simple module that references\
    \ the same set of objects.\n*   If the sample becomes invalid, this is an indication\
    \ of code problems.\n\n#### Positive Effects\n\nAny feature (including losing\
    \ object dependencies) can be used in a good way. A few examples follow showing\
    \ how the lack of dependency information can actually work to your advantage."
