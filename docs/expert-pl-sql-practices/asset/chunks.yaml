- fmt: "### Refactoring the Database\n\nYou will use the Human Resources (HR) schema\
    \ from Oracle's sample schemas to illustrate a simple change to a database schema\
    \ and demonstrate how those changes can have an unexpected impact on other functionality\
    \ within the application. The default HR schema as delivered by Oracle contains\
    \ one phone number field in the employee table. The customer has requested that\
    \ the application be modified to store and display both an office and a mobile\
    \ phone number for each employee. Screens and reports will need to be changed,\
    \ as some will continue to require one specific phone number while others will\
    \ need to utilize both phone numbers. For example, the company directory may show\
    \ both the employees' desk and mobile numbers, while a facilities report only\
    \ needs the desk numbers.\n\nThe original structure of the HR schema is shown\
    \ in [Figure 12-1](#Chapter12.html#fig_12_1). You need to determine where to store\
    \ the new data and how to present the information to the user. You should consider\
    \ multiple plausible solutions and decide which one (or ones) should be tested.\n\
    \n![images](images/1201.jpg)\n\n**Figure 12-1.** Human Resourse schema, unchanged\n\
    \nA common solution to this kind of request would be to add an additional column\
    \ to the `EMPLOYEES` table (`EMPLOYEES.MOBILE_NUMBER`). While this may resolve\
    \ the initial requirement, there are better ways to solve the problem as this\
    \ approach only addresses the immediate need. What happens when HR decides they\
    \ need the employee's home number as well? You could continue to add columns but\
    \ if you solve every request for new data by adding a column to the end of the\
    \ `EMPLOYEES` table, your table will soon be very wide with sparsely distributed\
    \ data. This first option is also a relatively limited solution. What if an employee\
    \ works from two different offices and has two different office numbers? What\
    \ if one employee prefers to be reached on their mobile while another is easier\
    \ to contact at the office, and the department administrator needs a report of\
    \ all the employees and the best way to reach them? You could add another column\
    \ to store an indicator of the kind of phone the employee prefers and then have\
    \ the application loop through the data pulling the office number for some employees\
    \ and the mobile number for others. This type of design process is a good example\
    \ of how performance problems get started. Columns continue to get tacked on to\
    \ tables and more application code is needed to process the data in those columns.\
    \ Eventually, the tables grow very wide, code to access the data becomes increasingly\
    \ complex as code outside the database does more of the sorting and grouping that\
    \ should be in the `DBMS`, and performance starts its downward spiral.\n\nA better\
    \ solution is to create another table that will store multiple phones number and\
    \ use the `EMPLOYEE_ID` to link back to the `EMPLOYEES` table. This approach offers\
    \ a few advantages over the first proposal: the database will not artificially\
    \ limit the number of phone numbers that can be stored for each employee, plus\
    \ you can store additional attributes about the phone numbers such as phone type\
    \ and preferred phone.\n\n[Listing 12-1](#Chapter12.html#list_12_1) shows how\
    \ to add a table to store the employee ID, phone numbers, phone types, and an\
    \ indicator of which phone number is the employee's preferred method of contact.\
    \ This code will create the new table and populate it from the existing table.\
    \ All phone numbers will be set to a default type “Office” and the preferred indicator\
    \ is set to “Y”.\n\nThen you'll populate the new table using the data from the\
    \ `EMPLOYEES` table. Since all employees have had only one phone in the system,\
    \ you can set the default phone type and the preferred indicator to the same values\
    \ for all employees.\n\n**Listing 12-1.** Create Table and Populate `EMP_PHONE_NUMBER`\n\
    \n```sql\nSQL>  CREATE TABLE emp_phone_numbers\n        (employee_id    NUMBER(6)\
    \                  NOT NULL,\n         phone_number   VARCHAR2(20)           \
    \    NOT NULL,\n         preferred      VARCHAR2(1)   DEFAULT 'N' NOT NULL,\n\
    \         phone_type     VARCHAR2(10)               NOT NULL,\n            CONSTRAINT\
    \  emp_phone_numbers_pk\n            PRIMARY KEY (employee_id, phone_number)\n\
    \         ) ;\n\nTable created.\n\nSQL>  alter table EMP_PHONE_NUMBERS add constraint\
    \ emp_phone_numbers_fk1\n        foreign key (employee_id)\n        references\
    \ EMPLOYEES (employee_id) ;\n\nTable altered.\n\nSQL>  insert into emp_phone_numbers\
    \ (\n        select employee_id, phone_number, 'Y', 'Office' from employees) ;\n\
    \n107 rows created.\n\nSQL>  commit;\n\nCommit complete.\n```\n\nSome approaches\
    \ to database refactoring suggest that you should keep the old column in the database,\
    \ populating both data points until you are certain all references to the old\
    \ column have been resolved. Anytime you store the same data in multiple places\
    \ in a database, you run the risk that the data will get out of sync. Then you\
    \ need to reconcile it, determine which values are correct, and repair the data.\
    \ In a real HR database, data reconciliation and repair can be a huge effort.\
    \ There are options to minimize the risk of such issues, but they usually involve\
    \ duplicating the data from one source to the other, which may not prevent the\
    \ target column from being updated independently. If all of the changes to the\
    \ database require maintaining multiple data sources, even temporarily, the net\
    \ result is a development environment that is very difficult to manage. This approach\
    \ becomes even more complex when you realize that the typical development team\
    \ is responding to multiple change requests at any given time. As the developers\
    \ are making other change requests, will they have to build their new code to\
    \ support both the old and the new field? And how long might these leftover data\
    \ values remain in the system? The key to good performance is to eliminate unnecessary\
    \ work: this is as true for processes as it is for systems. If the development\
    \ team is going to be agile, you must minimize the amount of work they need to\
    \ do. Maintaining multiple code paths for weeks, months, or years is not the best\
    \ use of your development resources.\n\nThe changes required to update a query\
    \ to use the new table are simple: you add another table to the from clause and\
    \ connect the `EMPLOYEES` table and the `EMP_PHONE_NUMBERS` table via the `EMPLOYEE_ID`\
    \ in the where clause. If the application has been written with `SQL` calls directly\
    \ in the application code layer (`Java`, `PHP`, etc) then queries like the first\
    \ one shown in [Listing 12-2](#Chapter12.html#list_12_2) could be found throughout\
    \ the application code in every module that references basic employee information.\
    \ [Listing 12-2](#Chapter12.html#list_12_2) shows a query to get employee information\
    \ including the employee's phone number before the change to the table design,\
    \ and how that query would be changed to request the same data after the table\
    \ changes were complete.\n\n**Listing 12-2.** Employee Data Request\n\n```sql\n\
    SQL>  select dept.department_name,\n             loc.street_address,\n       \
    \      loc.city,\n             loc.state_province,\n             loc.postal_code,\n\
    \             cty.country_name ,\n             emp.employee_id ,\n           \
    \  emp.last_name,\n             emp.first_name,\n             emp.email,\n   \
    \          emp.phone_number\n        from departments dept,\n             locations\
    \ loc,\n             countries cty,\n             employees emp\n       where\
    \ dept.department_id = &DepartmentID\n         and dept.location_id = loc.location_id\n\
    \         and loc.country_id = cty.country_id\n         and dept.department_id\
    \ = emp.department_id\n       order by dept.department_name, emp.last_name, emp.first_name\
    \ ;\n```"
  raw: '### Refactoring the Database


    You will use the Human Resources (HR) schema from Oracle''s sample schemas to
    illustrate a simple change to a database schema and demonstrate how those changes
    can have an unexpected impact on other functionality within the application. The
    default HR schema as delivered by Oracle contains one phone number field in the
    employee table. The customer has requested that the application be modified to
    store and display both an office and a mobile phone number for each employee.
    Screens and reports will need to be changed, as some will continue to require
    one specific phone number while others will need to utilize both phone numbers.
    For example, the company directory may show both the employees'' desk and mobile
    numbers, while a facilities report only needs the desk numbers.


    The original structure of the HR schema is shown in [Figure 12-1](#Chapter12.html#fig_12_1).
    You need to determine where to store the new data and how to present the information
    to the user. You should consider multiple plausible solutions and decide which
    one (or ones) should be tested.


    ![images](images/1201.jpg)


    ***Figure 12-1.** Human Resourse schema, unchanged*


    A common solution to this kind of request would be to add an additional column
    to the EMPLOYEES table (EMPLOYEES.MOBILE_NUMBER). While this may resolve the initial
    requirement, there are better ways to solve the problem as this approach only
    addresses the immediate need. What happens when HR decides they need the employee''s
    home number as well? You could continue to add columns but if you solve every
    request for new data by adding a column to the end of the EMPLOYEES table, your
    table will soon be very wide with sparsely distributed data. This first option
    is also a relatively limited solution. What if an employee works from two different
    offices and has two different office numbers? What if one employee prefers to
    be reached on their mobile while another is easier to contact at the office, and
    the department administrator needs a report of all the employees and the best
    way to reach them? You could add another column to store an indicator of the kind
    of phone the employee prefers and then have the application loop through the data
    pulling the office number for some employees and the mobile number for others.
    This type of design process is a good example of how performance problems get
    started. Columns continue to get tacked on to tables and more application code
    is needed to process the data in those columns. Eventually, the tables grow very
    wide, code to access the data becomes increasingly complex as code outside the
    database does more of the sorting and grouping that should be in the DBMS, and
    performance starts its downward spiral.


    A better solution is to create another table that will store multiple phones number
    and use the EMPLOYEE_ID to link back to the EMPLOYEES table. This approach offers
    a few advantages over the first proposal: the database will not artificially limit
    the number of phone numbers that can be stored for each employee, plus you can
    store additional attributes about the phone numbers such as phone type and preferred
    phone.


    [Listing 12-1](#Chapter12.html#list_12_1) shows how to add a table to store the
    employee ID, phone numbers, phone types, and an indicator of which phone number
    is the employee''s preferred method of contact. This code will create the new
    table and populate it from the existing table. All phone numbers will be set to
    a default type “Office” and the preferred indicator is set to “Y”.


    Then you''ll populate the new table using the data from the EMPLOYEES table. Since
    all employees have had only one phone in the system, you can set the default phone
    type and the preferred indicator to the same values for all employees.


    ***Listing 12-1.** Create Table and Populate EMP_PHONE_NUMBER*


    `SQL>  CREATE TABLE emp_phone_numbers`

    `        (employee_id    NUMBER(6)                 NOT NULL,`

    `         phone_number   VARCHAR2(20)              NOT NULL,`

    `         preferred      VARCHAR2(1)   DEFAULT ''N'' NOT NULL,`

    `         phone_type     VARCHAR2(10)              NOT NULL,`

    `            CONSTRAINT  emp_phone_numbers_pk`

    `            PRIMARY KEY (employee_id, phone_number)`

    `         ) ;`


    `Table created.`


    `SQL>  alter table EMP_PHONE_NUMBERS add constraint emp_phone_numbers_fk1`

    `        foreign key (employee_id)`

    `        references EMPLOYEES (employee_id) ;`


    `Table altered.`


    `SQL>  insert into emp_phone_numbers (`

    `        select employee_id, phone_number, ''Y'', ''Office'' from employees) ;`


    `107 rows created.`


    `SQL>  commit;`


    `Commit complete.`


    Some approaches to database refactoring suggest that you should keep the old column
    in the database, populating both data points until you are certain all references
    to the old column have been resolved. Anytime you store the same data in multiple
    places in a database, you run the risk that the data will get out of sync. Then
    you need to reconcile it, determine which values are correct, and repair the data.
    In a real HR database, data reconciliation and repair can be a huge effort. There
    are options to minimize the risk of such issues, but they usually involve duplicating
    the data from one source to the other, which may not prevent the target column
    from being updated independently. If all of the changes to the database require
    maintaining multiple data sources, even temporarily, the net result is a development
    environment that is very difficult to manage. This approach becomes even more
    complex when you realize that the typical development team is responding to multiple
    change requests at any given time. As the developers are making other change requests,
    will they have to build their new code to support both the old and the new field?
    And how long might these leftover data values remain in the system? The key to
    good performance is to eliminate unnecessary work: this is as true for processes
    as it is for systems. If the development team is going to be agile, you must minimize
    the amount of work they need to do. Maintaining multiple code paths for weeks,
    months, or years is not the best use of your development resources.


    The changes required to update a query to use the new table are simple: you add
    another table to the from clause and connect the EMPLOYEES table and the EMP_PHONE_NUMBERS
    table via the EMPLOYEE_ID in the where clause. If the application has been written
    with SQL calls directly in the application code layer (Java, PHP, etc) then queries
    like the first one shown in [Listing 12-2](#Chapter12.html#list_12_2) could be
    found throughout the application code in every module that references basic employee
    information. [Listing 12-2](#Chapter12.html#list_12_2) shows a query to get employee
    information including the employee''s phone number before the change to the table
    design, and how that query would be changed to request the same data after the
    table changes were complete.


    ***Listing 12-2.** Employee Data Request*


    `SQL>  select dept.department_name,`

    `             loc.street_address,`

    `             loc.city,`

    `             loc.state_province,`

    `             loc.postal_code,`

    `             cty.country_name ,`

    `             emp.employee_id ,`

    `             emp.last_name,`

    `             emp.first_name,`

    `             emp.email,`

    `             emp.phone_number`

    `        from departments dept,`

    `             locations loc,`

    `             countries cty,`

    `             employees emp`

    `       where dept.department_id = &DepartmentID`

    `         and dept.location_id = loc.location_id`

    `         and loc.country_id = cty.country_id`

    `         and dept.department_id = emp.department_id`

    `       order by dept.department_name, emp.last_name, emp.first_name ;`'
  trans: "### 重构数据库\n\n你将使用 Oracle 示例数据库中的人力资源（HR）模式，来演示对数据库模式进行的一项简单变更，并展示这些变更可能如何对应用程序内的其他功能产生意外影响。Oracle\
    \ 提供的默认 HR 模式在员工表中包含一个电话号码字段。客户要求修改应用程序，以存储并显示每位员工的办公电话和移动电话号码。界面和报告将需要相应修改，因为有些仍需要特定的一个电话号码，而另一些则需要同时使用两个电话号码。例如，公司通讯录可能同时显示员工的座机和手机号码，而一份设施报告则只需要座机号码。\n\
    \nHR 模式的原始结构如图 12-1 所示。你需要确定新数据的存储位置以及如何向用户呈现信息。你应该考虑多种合理的解决方案，并决定哪一种（或哪几种）方案需要进行测试。\n\
    \n![图片](img/1201.jpg)\n\n**图 12-1.** 未变更的人力资源模式\n\n对于此类需求，一个常见的解决方案是向`EMPLOYEES`表中添加一个额外的列（`EMPLOYEES.MOBILE_NUMBER`）。虽然这可能解决了最初的需求，但解决该问题有更好的方法，因为这种方法只满足了眼前的需求。当人力资源部门决定还需要员工的家庭电话号码时怎么办？你可以继续添加列，但如果每个新增数据的需求都通过向`EMPLOYEES`表末尾添加一列来解决，你的表很快就会变得非常宽，且数据分布稀疏。这第一种方案也是一个相对局限的解决方案。如果一个员工在两个不同的办公室工作并拥有两个不同的办公电话号码怎么办？如果一位员工更倾向于通过手机联系，而另一位则更容易通过办公室电话联系，并且部门管理员需要一份包含所有员工及其最佳联系方式的报告怎么办？你可以再添加一列来存储员工偏好的电话类型指示符，然后让应用程序遍历数据，为一些员工提取办公电话号码，为另一些提取手机号码。这种类型的设计过程是性能问题如何产生的一个典型例子。列不断地被拼接到表上，并且需要更多的应用程序代码来处理这些列中的数据。最终，表变得非常宽，访问数据的代码因为数据库外部要做更多本应在`DBMS`中完成的排序和分组操作而变得越来越复杂，性能开始螺旋式下降。\n\
    \n更好的解决方案是创建另一个表来存储多个电话号码，并使用`EMPLOYEE_ID`关联回`EMPLOYEES`表。与第一种方案相比，这种方法有几个优点：数据库不会人为限制每个员工可存储的电话号码数量，而且你可以存储关于电话号码的额外属性，例如电话类型和首选电话。\n\
    \n清单 12-1 展示了如何添加一个表来存储员工 ID、电话号码、电话类型以及一个指示哪个电话号码是员工首选联系方式的标识。这段代码将创建新表并从现有表中填充数据。所有电话号码将被设置为默认类型“Office”（办公），首选标识将被设置为“Y”（是）。\n\
    \n然后，你将使用`EMPLOYEES`表中的数据填充新表。由于系统中所有员工之前都只有一个电话号码，你可以为所有员工设置默认的电话类型和首选标识为相同的值。\n\
    \n**清单 12-1.** 创建表并填充`EMP_PHONE_NUMBER`\n\n```sql\nSQL>  CREATE TABLE emp_phone_numbers\n\
    \        (employee_id    NUMBER(6)                  NOT NULL,\n         phone_number\
    \   VARCHAR2(20)               NOT NULL,\n         preferred      VARCHAR2(1)\
    \   DEFAULT 'N' NOT NULL,\n         phone_type     VARCHAR2(10)              \
    \ NOT NULL,\n            CONSTRAINT  emp_phone_numbers_pk\n            PRIMARY\
    \ KEY (employee_id, phone_number)\n         ) ;\n\nTable created.\n\nSQL>  alter\
    \ table EMP_PHONE_NUMBERS add constraint emp_phone_numbers_fk1\n        foreign\
    \ key (employee_id)\n        references EMPLOYEES (employee_id) ;\n\nTable altered.\n\
    \nSQL>  insert into emp_phone_numbers (\n        select employee_id, phone_number,\
    \ 'Y', 'Office' from employees) ;\n\n107 rows created.\n\nSQL>  commit;\n\nCommit\
    \ complete.\n```\n\n一些数据库重构方法建议，你应该在数据库中保留旧列，在确定所有对旧列的引用都已解决之前，同时填充新旧两个数据点。任何时候，如果你在数据库的多个地方存储相同的数据，就存在数据不同步的风险。然后你就需要对其进行协调，确定哪些值是正确的，并修复数据。在一个真实的人力资源数据库中，数据协调和修复可能是一项巨大的工作。有一些选项可以最小化此类问题的风险，但它们通常涉及将数据从一个源复制到另一个源，而这可能无法防止目标列被独立更新。如果对数据库的所有更改都需要维护多个数据源（即使是临时的），最终结果将是一个非常难以管理的开发环境。当你意识到典型的开发团队在任何时候都在响应多个变更请求时，这种方法会变得更加复杂。当开发人员在处理其他变更请求时，他们是否必须构建新的代码来同时支持旧字段和新字段？这些遗留的数据值可能在系统中保留多久？良好性能的关键在于消除不必要的工作：这对于流程和系统同样适用。如果开发团队要保持敏捷，你必须尽量减少他们需要完成的工作量。维护多个代码路径数周、数月或数年，并不是对开发资源的最佳利用。\n\
    \n更新查询以使用新表所需的变更很简单：你在 from 子句中添加另一个表，并在 where 子句中通过`EMPLOYEE_ID`连接`EMPLOYEES`表和`EMP_PHONE_NUMBERS`表。如果应用程序是在应用程序代码层（如`Java`、`PHP`等）中直接使用`SQL`调用编写的，那么类似清单\
    \ 12-2 中显示的第一个查询可能会出现在应用程序中每个引用基本员工信息的模块代码中。清单 12-2 展示了一个在表设计变更前获取包含员工电话号码的员工信息的查询，以及该查询在表变更完成后如何被修改以请求相同的数据。\n\
    \n**清单 12-2.** 员工数据请求\n\n```sql\nSQL>  select dept.department_name,\n        \
    \     loc.street_address,\n             loc.city,\n             loc.state_province,\n\
    \             loc.postal_code,\n             cty.country_name ,\n            \
    \ emp.employee_id ,\n             emp.last_name,\n             emp.first_name,\n\
    \             emp.email,\n             emp.phone_number\n        from departments\
    \ dept,\n             locations loc,\n             countries cty,\n          \
    \   employees emp\n       where dept.department_id = &DepartmentID\n         and\
    \ dept.location_id = loc.location_id\n         and loc.country_id = cty.country_id\n\
    \         and dept.department_id = emp.department_id\n       order by dept.department_name,\
    \ emp.last_name, emp.first_name ;\n```"
- fmt: "# SQL 查询与模式变更分析\n\n`SQL> select dept.department_name,\n             loc.street_address,\n\
    \             loc.city,\n             loc.state_province,\n             loc.postal_code,\n\
    \             cty.country_name,\n             emp.employee_id EMP_ID,\n      \
    \       emp.last_name,\n             emp.first_name,\n             emp.email,\n\
    \             epn.phone_number\n      from departments dept,\n           locations\
    \ loc,\n           countries cty,\n           employees emp,\n           emp_phone_numbers\
    \ epn\n     where dept.department_id = &DepartmentID\n       and dept.location_id\
    \ = loc.location_id\n       and loc.country_id = cty.country_id\n       and dept.department_id\
    \ = emp.department_id\n       and emp.employee_id = epn.employee_id\n     order\
    \ by dept.department_name, emp.last_name, emp.first_name;`\n\nSince only one phone\
    \ number is currently populated for each employee, the result sets for the Purchasing\
    \ Department are exactly the same for both queries. At this point, either query\
    \ will return the data shown in [Listing 12-3](#Chapter12.html#list_12_3).\n\n\
    ### Listing 12-3. Abbreviated Employee Data for Department 30 (Purchasing)\n\n\
    ```\nDEPT_NAME   EMP_ID LAST_NAME    FIRST_NAME    EMAIL       PHONE_NO\nPurchasing\
    \  114    Raphaely     Den           DRAPHEAL    515.127.4561\nPurchasing  115\
    \    Khoo         Alexander     AKHOO       515.127.4562\nPurchasing  116    Baida\
    \        Shelli        SBAIDA      515.127.4563\nPurchasing  117    Tobias   \
    \    Sigal         STOBIAS     515.127.4564\nPurchasing  118    Himuro       Guy\
    \           GHIMURO     515.127.4565\nPurchasing  119    Colmenares   Karen  \
    \       KCOLMENA    515.127.4566\n```\n\n![images](images/square.jpg) **Note**\
    \ To keep the examples readable, results sets may be edited to shorten column\
    \ names and/or to remove data that is not significant to the example. Results\
    \ that are not critical to the example may not be shown.\n\n## 潜在问题与疑问\n\nThe\
    \ changes in the table structure create several potential problems for your application,\
    \ problems that are likely to impact the user interface and generate new bug reports.\
    \ Resolving these issues will require feedback from the functional side of the\
    \ business, as you need to know how the customer wants the application to behave.\
    \ The following are a few questions you need answered:\n\n*   How does the customer\
    \ expect to input employee phone number data? The answer to this question will\
    \ help you determine your options for keeping the two data sources synchronized\
    \ until you are sure it is safe to remove the original column.\n*   Should you\
    \ add the phone type and preferred flag to the queries in question? Having this\
    \ information in the query will give you more options for your screens and reports.\n\
    *   Which queries need to return one phone number per employee, and which queries\
    \ should return multiple phone numbers? Once the employee's mobile numbers are\
    \ in the system, the results sets from the queries in [Listing 12-2](#Chapter12.html#list_12_2)\
    \ will NOT be identical, as the original query would only return one row, while\
    \ the new query could return multiple rows for one employee.\n*   If there are\
    \ views built on queries like these, will adding additional fields to the views\
    \ break the application? If someone has used a `Select * from EMPLOYEES_BY_DEPT_VW`\
    \ to request the data, it will.\n\n## 后续步骤与挑战\n\nOnce you've answered these questions,\
    \ you need to confirm the same information for all queries or updates that reference\
    \ the `EMPLOYEES` table and use the phone number data. Otherwise, your small change\
    \ may impact the application front end in places not intended by the customer's\
    \ initial request.\n\nThere may be many similar but slightly different queries\
    \ within your application: a different column order, different result sets due\
    \ to different `where` clauses, different selections of included columns. Every\
    \ piece of code that uses the original phone number field needs to be found, updated,\
    \ and tested. Keeping the old column and synchronizing the data will give you\
    \ more time to find all the code that needs correction, but all that work still\
    \ needs to be done.\n\nThe single, biggest challenge in refactoring a database\
    \ schema is finding and changing all of the components that reference the tables\
    \ you alter. If the developers have been diligent, perhaps they've built reusable\
    \ modules to handle requesting `EMPLOYEE` data and you will have less code to\
    \ find. But can you really be sure that someone hasn't written a small but unknown\
    \ query or update that will fail when the table structure changes? In this example,\
    \ you've only considered one `select` statement. In a real HR system, there will\
    \ be extensive application code to add employees, change employee data, and produce\
    \ reports that use the phone number data. Looking at the schema diagram in [Figure\
    \ 12-1](#Chapter12.html#fig_12_1), you'll notice there is a circular reference,\
    \ as the employee's manager is identified in the employee record by the manager's\
    \ employee ID. Queries, updates, and reports that include employee and manager\
    \ phone numbers may require more complex changes. And just to make things really\
    \ interesting, the Order Entry schema also makes use of the `EMPLOYEES` table,\
    \ using the `EMPLOYEE_ID` to indicate the sales representative that made the sale\
    \ so your very small changes now impact multiple schemas and multiple application\
    \ modules. When you think of how simple this schema is, and imagine how complex\
    \ most data stores can be, the fear created by the mention of a schema change\
    \ becomes a little more understandable."
  raw: '`SQL>  select dept.department_name,`

    `             loc.street_address,`

    `             loc.city,`

    `             loc.state_province,`

    `             loc.postal_code,`

    `             cty.country_name ,`

    `             emp.employee_id EMP_ID,`

    `             emp.last_name,`

    `             emp.first_name,`

    `             emp.email,`

    `             epn.phone_number`

    `        from departments dept,`

    `             locations loc,`

    `             countries cty,`

    `             employees emp,`

    `             emp_phone_numbers epn`

    `       where dept.department_id = &DepartmentID`

    `         and dept.location_id = loc.location_id`

    `         and loc.country_id = cty.country_id`

    `         and dept.department_id = emp.department_id`

    `         and emp.employee_id = epn.employee_id`

    `       order by dept.department_name, emp.last_name, emp.first_name ;`


    Since only one phone number is currently populated for each employee, the result
    sets for the Purchasing Department are exactly the same for both queries. At this
    point, either query will return the data shown in [Listing 12-3](#Chapter12.html#list_12_3).


    ***Listing 12-3.** Abbreviated Employee Data for Department 30 (Purchasing)*


    `DEPT_NAME   EMP_ID LAST_NAME    FIRST_NAME    EMAIL       PHONE_NO`

    `Purchasing  114    Raphaely     Den           DRAPHEAL    515.127.4561`

    `Purchasing  115    Khoo         Alexander     AKHOO       515.127.4562`

    `Purchasing  116    Baida        Shelli        SBAIDA      515.127.4563`

    `Purchasing  117    Tobias       Sigal         STOBIAS     515.127.4564`

    `Purchasing  118    Himuro       Guy           GHIMURO     515.127.4565`

    `Purchasing  119    Colmenares   Karen         KCOLMENA    515.127.4566`


    ![images](images/square.jpg) **Note** To keep the examples readable, results sets
    may be edited to shorten column names and/or to remove data that is not significant
    to the example. Results that are not critical to the example may not be shown.


    The changes in the table structure create several potential problems for your
    application, problems that are likely to impact the user interface and generate
    new bug reports. Resolving these issues will require feedback from the functional
    side of the business, as you need to know how the customer wants the application
    to behave. The following are a few questions you need answered:


    *   How does the customer expect to input employee phone number data? The answer
    to this question will help you determine your options for keeping the two data
    sources synchronized until you are sure it is safe to remove the original column.

    *   Should you add the phone type and preferred flag to the queries in question?
    Having this information in the query will give you more options for your screens
    and reports.

    *   Which queries need to return one phone number per employee, and which queries
    should return multiple phone numbers? Once the employee''s mobile numbers are
    in the system, the results sets from the queries in [Listing 12-2](#Chapter12.html#list_12_2)
    will NOT be identical, as the original query would only return one row, while
    the new query could return multiple rows for one employee.

    *   If there are views built on queries like these, will adding additional fields
    to the views break the application? If someone has used a `Select * from EMPLOYEES_BY_DEPT_VW`
    to request the data, it will.


    Once you''ve answered these questions, you need to confirm the same information
    for all queries or updates that reference the EMPLOYEES table and use the phone
    number data. Otherwise, your small change may impact the application front end
    in places not intended by the customer''s initial request.


    There may be many similar but slightly different queries within your application:
    a different column order, different result sets due to different where clauses,
    different selections of included columns. Every piece of code that uses the original
    phone number field needs to be found, updated, and tested. Keeping the old column
    and synchronizing the data will give you more time to find all the code that needs
    correction, but all that work still needs to be done.


    The single, biggest challenge in refactoring a database schema is finding and
    changing all of the components that reference the tables you alter. If the developers
    have been diligent, perhaps they''ve built reusable modules to handle requesting
    EMPLOYEE data and you will have less code to find. But can you really be sure
    that someone hasn''t written a small but unknown query or update that will fail
    when the table structure changes? In this example, you''ve only considered one
    select statement. In a real HR system, there will be extensive application code
    to add employees, change employee data, and produce reports that use the phone
    number data. Looking at the schema diagram in [Figure 12-1](#Chapter12.html#fig_12_1),
    you''ll notice there is a circular reference, as the employee''s manager is identified
    in the employee record by the manager''s employee ID. Queries, updates, and reports
    that include employee and manager phone numbers may require more complex changes.
    And just to make things really interesting, the Order Entry schema also makes
    use of the EMPLOYEES table, using the EMPLOYEE_ID to indicate the sales representative
    that made the sale so your very small changes now impact multiple schemas and
    multiple application modules. When you think of how simple this schema is, and
    imagine how complex most data stores can be, the fear created by the mention of
    a schema change becomes a little more understandable.'
  trans: "# SQL 查询与模式变更分析\n\n`SQL> select dept.department_name,\n             loc.street_address,\n\
    \             loc.city,\n             loc.state_province,\n             loc.postal_code,\n\
    \             cty.country_name,\n             emp.employee_id EMP_ID,\n      \
    \       emp.last_name,\n             emp.first_name,\n             emp.email,\n\
    \             epn.phone_number\n      from departments dept,\n           locations\
    \ loc,\n           countries cty,\n           employees emp,\n           emp_phone_numbers\
    \ epn\n     where dept.department_id = &DepartmentID\n       and dept.location_id\
    \ = loc.location_id\n       and loc.country_id = cty.country_id\n       and dept.department_id\
    \ = emp.department_id\n       and emp.employee_id = epn.employee_id\n     order\
    \ by dept.department_name, emp.last_name, emp.first_name;`\n\n由于目前每个员工只填充了一个电话号码，采购部的两个查询的结果集是完全相同的。此时，任一查询都将返回如\
    \ 清单 12-3 所示的数据。\n\n### 清单 12-3. 部门 30（采购部）的简略员工数据\n\n```\nDEPT_NAME   EMP_ID\
    \ LAST_NAME    FIRST_NAME    EMAIL       PHONE_NO\n采购部      114    Raphaely  \
    \   Den           DRAPHEAL    515.127.4561\n采购部      115    Khoo         Alexander\
    \     AKHOO       515.127.4562\n采购部      116    Baida        Shelli        SBAIDA\
    \      515.127.4563\n采购部      117    Tobias       Sigal         STOBIAS     515.127.4564\n\
    采购部      118    Himuro       Guy           GHIMURO     515.127.4565\n采购部     \
    \ 119    Colmenares   Karen         KCOLMENA    515.127.4566\n```\n\n![images](img/square.jpg)\
    \ **注意** 为保持示例可读性，结果集可能经过编辑，以缩短列名和/或移除对示例不重要的数据。对示例不关键的结果可能不会显示。\n\n## 潜在问题与疑问\n\
    \n表结构的更改为您的应用程序带来了几个潜在问题，这些问题很可能影响用户界面并产生新的错误报告。解决这些问题将需要从业务的功能侧获得反馈，因为您需要了解客户希望应用程序如何行为。以下是您需要弄清楚的几个问题：\n\
    \n*   客户期望如何输入员工电话号码数据？这个问题的答案将帮助您确定在确保可以安全删除原始列之前，保持两个数据源同步的方案。\n*   您是否应该将电话类型和首选标志添加到相关查询中？在查询中包含此信息将为您处理界面和报告提供更多选择。\n\
    *   哪些查询需要为每个员工返回一个电话号码，哪些查询应返回多个电话号码？一旦员工的手机号码进入系统，清单 12-2 中查询的结果集将**不再相同**，因为原始查询只会返回一行，而新查询可能为一个员工返回多行。\n\
    *   如果存在基于此类查询构建的视图，向视图中添加额外字段是否会破坏应用程序？如果有人使用 `Select * from EMPLOYEES_BY_DEPT_VW`\
    \ 来请求数据，那么会的。\n\n## 后续步骤与挑战\n\n一旦您回答了这些问题，您需要为所有引用 `EMPLOYEES` 表并使用电话号码数据的查询或更新确认相同的信息。否则，您的微小更改可能会在客户初始请求未预期的地方影响应用程序前端。\n\
    \n在您的应用程序中可能存在许多相似但略有不同的查询：不同的列顺序、由于不同的 `where` 子句导致不同的结果集、所选列的不同组合。每一段使用了原始电话号码字段的代码都需要被找到、更新和测试。保留旧列并同步数据将为您争取更多时间来找到所有需要修正的代码，但所有这些工作仍然需要完成。\n\
    \n重构数据库模式的**最大**挑战是找到并更改所有引用您所修改表的组件。如果开发人员一直很尽职，也许他们已经构建了可重用模块来处理 `EMPLOYEE`\
    \ 数据的请求，那么您需要查找的代码就会更少。但是，您真的能确定没有人编写过一个虽小但未知、会在表结构更改时失败的查询或更新吗？在这个例子中，您只考虑了一个\
    \ `select` 语句。在一个人力资源系统中，将会有大量的应用程序代码用于添加员工、更改员工数据以及生成使用电话号码数据的报告。查看图 12-1 中的模式图，您会注意到存在循环引用，因为员工的经理是通过经理的员工\
    \ ID 在员工记录中标识的。包含员工和经理电话号码的查询、更新和报告可能需要更复杂的更改。而且，为了使事情真正有趣起来，订单录入模式也使用了 `EMPLOYEES`\
    \ 表，使用 `EMPLOYEE_ID` 来指示完成销售的销售代表，因此您这个非常小的更改现在影响了多个模式和多个应用程序模块。当您想到这个模式是多么简单，并想象大多数数据存储可以有多复杂时，由提及模式变更所产生的恐惧就变得稍微可以理解一些了。"
- fmt: "# Creating an Access Layer via PL/SQL\n\nWhat if you created your modular,\
    \ reusable code in the database itself, so that all access to your application\
    \ data was encapsulated within PL/SQL packages, procedures, and functions? The\
    \ query referenced in [Listing 12-2](#Chapter12.html#list_12_2) would instead\
    \ be incorporated into a procedure as shown in [Listing 12-4](#Chapter12.html#list_12_4).\
    \ [Listing 12-5](#Chapter12.html#list_12_5) shows the code to execute that procedure,\
    \ and [Listing 12-6](#Chapter12.html#list_12_6) shows the results from an example\
    \ execution. This exercise creates a procedure that can be called by components\
    \ outside the database to return the same data that is returned by the first query\
    \ in [Listing 12-2](#Chapter12.html#list_12_2).\n\n## Listing 12-4. Procedure\
    \ to Return Employee Data by Department\n\n```sql\nCREATE OR REPLACE PROCEDURE\
    \ GetEmployeeData(\n       p_dept_id        IN  NUMBER,\n       p_emp_cursor \
    \       OUT SYS_REFCURSOR,\n       p_status_code       OUT NUMBER,\n       p_status_message\
    \ OUT VARCHAR2) IS\n/********************************************************************************\n\
    \    NAME: GetEmployeeData\nPURPOSE: This procedure returns contact information\
    \ for employees by department\n\n  NOTES:\n\n      p_status_code  status_message\n\
    \      ==============  ======================================================\n\
    \                  0  Success\n             -20102  Input parameter p_dept_id\
    \ must not be null.\n\n***************************************************************************************/\n\
    BEGIN -- GetEmployeeData\n\n--validate parameters\nIF ((p_department_id) IS NULL\
    \ ) THEN\n   RAISE_APPLICATION_ERROR(-20102, Input parameter p_dept_id must not\
    \ be null.',TRUE);\nEND IF;\n\nOPEN p_emp_cursor FOR\n   SELECT\n         dept.department_id,\n\
    \         dept.department_name,\n         loc.street_address,\n         loc.city,\n\
    \         loc.state_province,\n         loc.postal_code,\n         cty.country_name,\n\
    \  CURSOR (select emp.employee_id,\n                 emp.last_name,\n        \
    \         emp.first_name,\n                 emp.email,\n                 emp.phone_number\n\
    \            from employees emp\n           where emp.department_id = dept.department_id)\
    \ emp_cursor\n      FROM\n           departments dept, locations loc, countries\
    \ cty\n     WHERE\n           dept.department_id = p_dept_id\n       AND dept.location_id\
    \ = loc.location_id\n       AND loc.country_id = cty.country_id\n     ORDER BY\
    \ 2,3;\n\n  p_status_code:= 0;\n  p_status_message:= NULL;\n\nEXCEPTION\n  WHEN\
    \ OTHERS THEN\n    p_status_code:= SQLCODE;\n    p_status_message:= SQLERRM;\n\
    \nEND GetEmployeeData;\n/\n```\n\n## Listing 12-5. Procedure Execution Script\n\
    \n```sql\nset serveroutput on\n\n         var p_main_cursor REFCURSOR\n\nDECLARE\n\
    \         v_dept_id         departments.department_id%TYPE;\n         v_status_code\
    \     NUMBER;\n         v_status_message  VARCHAR2(200);\n\n         t0 timestamp;\n\
    \         t1 timestamp;\n\nBEGIN\n         t0:= systimestamp;\n\n         v_dept_id\
    \ := &Department_ID;\n\n  GetEmployeeData\n          (v_dept_id, :p_main_cursor,\
    \ v_status_code, v_status_message);\n\n  t1:= systimestamp;\n\nDBMS_OUTPUT.PUT_LINE('Code='\
    \ || v_status_code || 'Message=' || v_status_message);\nDBMS_OUTPUT.PUT_LINE('ela='\
    \ || (t0 - t1) );\n\nEND;\n/\n\n   print :p_main_cursor\n```\n\n## Listing 12-6.\
    \ Procedure Execution and Results Set\n\n```sql\nSQL> @exec_GetEmployeeData.prc\n\
    \nEnter value for department_id: 30\n  old  13:   v_dept_id := &Department_ID;\n\
    \  new  13:   v_dept_id := 30;\n  status_code=0  status_message\n  ela=-000000000\
    \ 00:00:00.000091000\n\nPL/SQL procedure successfully completed.\n\nDEPT_ID DEPT_NAME\
    \      STREET_ADDRESS    CITY       STATE         EMP_CURSOR\n30      Purchasing\
    \     2004 Charade Rd   Seattle    Washington    CURSOR STATEMENT : 8\n\nCURSOR\
    \ STATEMENT : 8\n\nEMPLOYEE_ID     LAST_NAME     FIRST_NAME   EMAIL      PHONE_NUMBER\n\
    \        114     Raphaely      Den          DRAPHEAL   515.127.4561\n        115\
    \     Khoo          Alexander    AKHOO      515.127.4562\n        116     Baida\
    \         Shelli       SBAIDA     515.127.4563\n        117     Tobias       \
    \ Sigal        STOBIAS    515.127.4564\n        118     Himuro        Guy    \
    \      GHIMURO    515.127.4565\n        119     Colmenares    Karen        COLMENA\
    \    515.127.4566\n\n6 rows selected.\n```\n\nWith a procedure in place, your\
    \ refactoring exercise changes and becomes more complete. This time you can create\
    \ and populate the new table, and once you are sure the data has been correctly\
    \ populated, drop the old column, removing the duplicate data and the potential\
    \ for inconsistent entries. You can also use your execution script to complete\
    \ the first round of testing, verifying that the procedure executes and returns\
    \ the expected results set. While you can always test a query in the database,\
    \ that test is of limited value if the application can contain its own version\
    \ of the code. Later in this chapter you learn how to use schema permissions to\
    \ ensure that the procedures have been used consistently throughout the application\
    \ so you can remain confident that refactoring the database will not impact the\
    \ application layer. For now, execute the code in [Listing 12-7](#Chapter12.html#list_12_7).\n\
    \n## Listing 12-7. Refactoring Exercise Using a PL/SQL API\n\n```sql\nSQL>  CREATE\
    \ TABLE emp_phone_numbers\n        (employee_id    NUMBER(6)                 \
    \  NOT NULL,\n         phone_number   VARCHAR2(20)                NOT NULL,\n\
    \         preferred      VARCHAR2(1)   DEFAULT 'N'   NOT NULL,\n         phone_type\
    \     VARCHAR2(10)                NOT NULL,\n            CONSTRAINT  emp_phone_numbers_pk\n\
    \            PRIMARY KEY (employee_id, phone_number)\n         ) ;\n\nTable created.\n\
    \nSQL>  alter table EMP_PHONE_NUMBERS add constraint emp_phone_numbers_fk1\n \
    \       foreign key (employee_id)\n        references EMPLOYEES (employee_id)\
    \ ;\n\nTable altered.\n\nSQL> insert into emp_phone_numbers (\n     select employee_id,\
    \ phone_number, 'Y', 'Office'\n      from employees) ;\n\n107 rows created.\n\n\
    SQL> commit;\n\nCommit complete.\n\nSQL> alter table employees drop column phone_number;\n\
    \nTable altered.\n```\n\nWith the changes shown in [Listing 12-7](#Chapter12.html#list_12_7)\
    \ complete, you achieved your target design immediately. The new table has been\
    \ created and populated and the old data column as been removed. There is no need\
    \ to code to keep duplicate values synchronized or to revisit this change later\
    \ to remove the old column and the code built to support it. You've reduced the\
    \ work that must be done by both the application and by the development team.\
    \ [Figure 12-2](#Chapter12.html#fig_12_2) shows your new schema design.\n\n![images](images/1202.jpg)\n\
    \n## Figure 12-2. Human Resourse schema, target design\n\nOnce you've populated\
    \ the new table and dropped the old column, be sure to check for any objects in\
    \ the application schema that have been invalidated by your changes. [Listing\
    \ 12-8](#Chapter12.html#list_12_8) will show that not only is your `GetEmployeeData`\
    \ procedure invalid, as expected, but two triggers have been invalidated. The\
    \ first thing you need to do is see what these triggers do and how they are associated\
    \ to the `EMPLOYEES` table."
