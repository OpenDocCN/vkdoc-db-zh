    \      Resp_io: 5.00  Resp_cpu: 3285657\n  Best:: AccessPath: TableScan\n```\n\
    \n我在这个跟踪文件中高亮了一些重要信息。它指出，对于 PL/SQL 函数的成本或选择率，没有定义默认的统计信息或统计信息类型。这向你表明，为 PL/SQL\
    \ 函数提供统计信息是可能的；我将在后文演示如何做到这一点。\n\n"
- fmt: "## Predicate Ordering\n\n当 PL/SQL 函数的统计信息缺失时，由于谓词编码顺序的原因，可能会引发其他潜在问题。例如，如果你编写了一个包含两个\
    \ PL/SQL 函数谓词的 WHERE 子句，在缺乏统计信息的情况下，函数将仅仅按照它们在 SQL 中出现的顺序执行。\n\n我在[Listing 9-19](#Chapter09.html#list_9_19)中展示了这一点，其中有一个\
    \ SQL 语句，它通过两个 PL/SQL 函数进行过滤：`SLOW_FUNCTION`和`QUICK_FUNCTION`。顾名思义，一个函数比另一个成本更高，因此我使用\
    \ Autotrace 和 SQL*Plus 计时器，以不同的谓词顺序执行了两次该 SQL 语句来比较结果。\n\n***Listing 9-19.** PL/SQL\
    \ 函数与谓词顺序*\n\n```sql\nSQL> CREATE FUNCTION quick_function (\n  2             \
    \     p_id IN INTEGER\n  3                  ) RETURN INTEGER AS\n  4  BEGIN\n\
    \  5     RETURN MOD(p_id, 1000);\n  6  END quick_function;\n  7  /\n\nFunction\
    \ created.\n\nSQL> CREATE FUNCTION slow_function (\n  2                  p_id\
    \ IN INTEGER\n  3                  ) RETURN INTEGER AS\n  4  BEGIN\n  5     DBMS_LOCK.SLEEP(0.005);\n\
    \  6     RETURN MOD(p_id, 2);\n  7  END slow_function;\n  8  /\n\nFunction created.\n\
    \nSQL> set autotrace traceonly\n\nSQL> SELECT *\n  2  FROM   thousand_rows\n \
    \ 3  WHERE  quick_function(n1) = 0\n  4  AND    slow_function(n1) = 0;\n\n1 row\
    \ selected.\n\nElapsed: 00:00:00.02\n\nExecution Plan\n----------------------------------------------------------\n\
    Plan hash value: 4012467810\n\n-----------------------------------------------------------------------------------\n\
    | Id  | Operation         | Name          | Rows  | Bytes | Cost (%CPU)| Time\
    \     |\n-----------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT  |               |     1 |    55 |     5   (0)| 00:00:01\
    \ |\n|*  1 |  TABLE ACCESS FULL| THOUSAND_ROWS |     1 |    55 |     5   (0)|\
    \ 00:00:01 |\n-----------------------------------------------------------------------------------\n\
    \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
    \   1 - filter(\"QUICK_FUNCTION\"(\"N1\")=0 AND \"SLOW_FUNCTION\"(\"N1\")=0)\n\
    \nSQL> SELECT *\n  2  FROM   thousand_rows\n  3  WHERE  slow_function(n1) = 0\n\
    \  4  AND    quick_function(n1) = 0;\n\n1 row selected.\n\nElapsed: 00:00:11.09\n\
    \nExecution Plan\n----------------------------------------------------------\n\
    Plan hash value: 4012467810\n\n-----------------------------------------------------------------------------------\n\
    | Id  | Operation         | Name          | Rows  | Bytes | Cost (%CPU)| Time\
    \     |\n-----------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT  |               |     1 |    55 |     5   (0)| 00:00:01\
    \ |\n|*  1 |  TABLE ACCESS FULL| THOUSAND_ROWS |     1 |    55 |     5   (0)|\
    \ 00:00:01 |\n-----------------------------------------------------------------------------------\n\
    \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
    \   1 - filter(\"SLOW_FUNCTION\"(\"N1\")=0 AND \"QUICK_FUNCTION\"(\"N1\")=0)\n\
    ```\n\n我移除了 Autotrace 统计信息，但保留了 Explain Plan 部分，以展示每个 SQL 语句中 PL/SQL 函数的执行顺序。你可以看到，这与它们被编码的顺序相匹配，并且这对两个语句的相对性能产生了显著影响。这就是关键所在。CBO\
    \ 不知道`SLOW_FUNCTION`具有较低的选择性，或者它比`QUICK_FUNCTION`执行时间更长。在缺乏所提供的统计信息的情况下，它怎么可能知道呢？CBO\
    \ 没有理由重新排序谓词，因为它没有这样做的依据。\n\n好消息是，有几种方法可以为 PL/SQL 函数生成或设置统计信息来缓解此问题。这些方法在标题为*“Assisting\
    \ the CBO.”*的章节中进行了描述。\n\n#### The Read-Consistency Trap\n\n[Listing 9-13](#Chapter09.html#list_9_13)清楚地展示了将\
    \ SQL 查找放入 PL/SQL 函数中的资源成本（并且这些成本很容易量化）。然而，使用这种设计还存在另一个重要的陷阱，尽管它更难量化其对你的应用程序可能产生的潜在影响。那就是，PL/SQL\
    \ 函数内部的 SQL 与调用该函数的主 SQL 语句不是读一致的。\n\n来自[Listing 9-12](#Chapter09.html#list_9_12)的\
    \ TKProf 报告（如[Listing 9-16](#Chapter09.html#list_9_16)所示）证明，PL/SQL 函数内部的 SQL 被视为一个单独的语句。这意味着在\
    \ READ COMMITTED 隔离级别下，它有自己的读一致性，而不是调用它的 SQL 语句的读一致性。\n\n在[Listings 9-20](#Chapter09.html#list_9_20)到[9-23](#Chapter09.html#list_9_23)中，我演示了这个读一致性陷阱。我有两个会话；第一个（*Session\
    \ One*）执行一个长时间运行的查询，该查询包含对 PL/SQL 查找函数的调用。第二个会话（*Session Two*）在随机时间点更新了一条查找记录，但重要的是，这是在第一个会话的查询仍在运行时发生的。\n\
    \n我将从[Listing 9-20](#Chapter09.html#list_9_20)中的 PL/SQL 查找函数开始。\n\n***Listing\
    \ 9-20.** 读一致性陷阱（创建 PL/SQL 函数）*\n\n```sql\nSQL> CREATE FUNCTION get_customer_name\
    \ (\n  2                  p_cust_id IN customers.cust_id%TYPE\n  3           \
    \       ) RETURN VARCHAR2 AS\n  4     v_customer_name VARCHAR2(200);\n  5  BEGIN\n\
    \  6     SELECT cust_first_name || ' ' || cust_last_name\n  7     INTO   v_customer_name\n\
    \  8     FROM   customers\n  9     WHERE  cust_id = p_cust_id;\n 10     RETURN\
    \ v_customer_name;\n 11  END get_customer_name;\n 12  /\n\nFunction created.\n\
    ```\n\n你可以看到，该查找函数通过主键获取客户名称。此外，我创建了一个小的`SLEEPER`函数，以便减慢*Session One*的查询速度，模拟一个长时间运行的\
    \ SQL 语句（该函数只是调用`DBMS_LOCK.SLEEP`并返回常数 0）。\n\n继续这个例子，*Session One* 发出了[Listing\
    \ 9-21](#Chapter09.html#list_9_21)中所示的查询。\n\n***Listing 9-21.** 读一致性陷阱（Session\
    \ One 的长时间运行查询）*\n\n**`Session One`**\n```sql\n22:47:23 SQL> SELECT s.cust_id\n\
    22:47:23   2  ,      get_customer_name(s.cust_id) AS cust_name\n22:47:23   3 \
    \ ,      sleeper(1)                   AS sleep_time\n22:47:23   4  FROM   sales\
    \ s\n22:47:23   5  WHERE  ROWNUM <= 10;\n```\n\n请注意*Session One*发出此 SQL 的时间。返回\
    \ 10 行结果集且每行睡眠 1 秒意味着这个查询应该在 10 秒多一点的时间内完成。当它在执行时，*Session Two*更新了*Session One*正在重复查询的一个客户名称，如[Listing\
    \ 9-22](#Chapter09.html#list_9_22)所示。\n\n***Listing 9-22.** 读一致性陷阱（Session Two\
    \ 的客户更新）*\n\n**`Session Two`**\n```sql\n22:47:26 SQL> UPDATE customers\n22:47:26\
    \   2  SET    cust_last_name = 'Smith'\n22:47:26   3  WHERE  cust_id = 2;\n\n\
    1 row updated.\n\n22:47:26 SQL> COMMIT;\n\nCommit complete.\n```\n\n再次注意此更新被提交的时间（大约在*Session\
    \ One*的长时间运行查询开始后 3 秒）。[Listing 9-23](#Chapter09.html#list_9_23)显示了这对*Session\
    \ One*报告的影响。\n\n***Listing 9-23.** 读一致性陷阱（Session One 的结果集）*"
  raw: '##### Predicate Ordering


    When statistics for PL/SQL functions are missing, other potential issues can arise
    as a result of the order in which the predicates are coded. For example, if you
    write a WHERE clause that contains two PL/SQL function predicates, in the absence
    of statistics the functions will be executed simply in the order in which they
    appear in the SQL.


    I’ve demonstrated this in [Listing 9-19](#Chapter09.html#list_9_19), where I have
    a SQL statement that filters on two PL/SQL functions, `SLOW_FUNCTION` and `QUICK_FUNCTION`.
    As their names suggest, one function is more costly than the other, so I’ve executed
    the SQL statement twice with the predicates in different orders, using Autotrace
    and a SQL*Plus timer to compare the results.


    ***Listing 9-19.** PL/SQL Functions and Predicate Ordering*


    `SQL> CREATE FUNCTION quick_function (`

    `  2                  p_id IN INTEGER`

    `  3                  ) RETURN INTEGER AS`

    `  4  BEGIN`

    `  5     RETURN MOD(p_id, 1000);`

    `  6  END quick_function;`

    `  7  /`


    `Function created.`


    `SQL> CREATE FUNCTION slow_function (`

    `  2                  p_id IN INTEGER`

    `  3                  ) RETURN INTEGER AS`

    `  4  BEGIN`

    `  5     DBMS_LOCK.SLEEP(0.005);`

    `  6     RETURN MOD(p_id, 2);`

    `  7  END slow_function;`

    `  8  /`


    `Function created.`


    `SQL> set autotrace traceonly`


    `SQL> SELECT *`

    `2  FROM   thousand_rows`

    `  3  WHERE  quick_function(n1) = 0`

    `  4  AND    slow_function(n1) = 0;`


    `1 row selected.`


    **`Elapsed: 00:00:00.02`**


    `Execution Plan`

    `----------------------------------------------------------`

    `Plan hash value: 4012467810`


    `-----------------------------------------------------------------------------------`

    `| Id  | Operation         | Name          | Rows  | Bytes | Cost (%CPU)| Time    
    |`

    `-----------------------------------------------------------------------------------`

    `|   0 | SELECT STATEMENT  |               |     1 |    55 |     5   (0)| 00:00:01
    |`

    `|*  1 |  TABLE ACCESS FULL| THOUSAND_ROWS |     1 |    55 |     5   (0)| 00:00:01
    |`

    `-----------------------------------------------------------------------------------`


    `Predicate Information (identified by operation id):`

    `---------------------------------------------------`


    **`   1 - filter("QUICK_FUNCTION"("N1")=0 AND "SLOW_FUNCTION"("N1")=0)`**


    `SQL> SELECT *`

    `  2  FROM   thousand_rows`

    `  3  WHERE  slow_function(n1) = 0`

    `  4  AND    quick_function(n1) = 0;`


    `1 row selected.`


    **`Elapsed: 00:00:11.09`**


    `Execution Plan`

    `----------------------------------------------------------`

    `Plan hash value: 4012467810`


    `-----------------------------------------------------------------------------------`

    `| Id  | Operation         | Name          | Rows  | Bytes | Cost (%CPU)| Time    
    |`

    `-----------------------------------------------------------------------------------`

    `|   0 | SELECT STATEMENT  |               |     1 |    55 |     5   (0)| 00:00:01
    |`

    `|*  1 |  TABLE ACCESS FULL| THOUSAND_ROWS |     1 |    55 |     5   (0)| 00:00:01
    |`

    `-----------------------------------------------------------------------------------`


    `Predicate Information (identified by operation id):`

    `---------------------------------------------------`


    **`   1 - filter("SLOW_FUNCTION"("N1")=0 AND "QUICK_FUNCTION"("N1")=0)`**


    I’ve removed the Autotrace statistics but kept the Explain Plan sections to show
    the order in which the PL/SQL functions were executed for each SQL statement.
    You can see that this matches the order in which they were coded and that this
    made quite a difference to the relative performance of the two statements. This
    is the point. The CBO has no idea that `SLOW_FUNCTION` has a lower selectivity
    or that it takes longer to execute than `QUICK_FUNCTION`. In the absence of supplied
    statistics, how can it? It makes no sense for the CBO to re-order the predicates,
    because it has no basis for doing so.


    The good news is that there are several methods for generating or setting statistics
    for PL/SQL functions to mitigate this issue. These are described in the section
    entitled *“Assisting the CBO.”*


    #### The Read-Consistency Trap


    [Listing 9-13](#Chapter09.html#list_9_13) clearly demonstrates the resource-cost
    of putting SQL lookups into PL/SQL functions (and these costs are easy to quantify).
    However, there is another important pitfall of using such a design, although it
    is much harder to quantify the potential impact that this might have on your application(s).
    That is, the SQL inside the PL/SQL function is not read-consistent with the main
    SQL statement that is calling the function.


    The TKProf report from [Listing 9-12](#Chapter09.html#list_9_12) (shown in [Listing
    9-16](#Chapter09.html#list_9_16)) demonstrated that the SQL inside the PL/SQL
    function was treated as a separate statement. This means that under the READ COMMITTED
    isolation level, it has its own read-consistency and not that of the SQL statement
    that calls the function.


    In [Listings 9-20](#Chapter09.html#list_9_20) through [9-23](#Chapter09.html#list_9_23),
    I’ve demonstrated this read-consistency trap. I have two sessions; the first of
    which (*Session One*) executes a long-running query that includes a call to a
    PL/SQL lookup function. The second session (*Session Two*) updates one of the
    lookup records at a random point in time, but importantly, this is while the first
    session’s query is still running.


    I’ll begin with the PL/SQL lookup function in [Listing 9-20](#Chapter09.html#list_9_20).


    ***Listing 9-20.** The Read-Consistency Trap (Create PL/SQL Function)*


    `SQL> CREATE FUNCTION get_customer_name (`

    `  2                  p_cust_id IN customers.cust_id%TYPE`

    `  3                  ) RETURN VARCHAR2 AS`

    `  4     v_customer_name VARCHAR2(200);`

    `  5  BEGIN`

    `  6     SELECT cust_first_name || '' '' || cust_last_name`

    `  7     INTO   v_customer_name`

    `  8     FROM   customers`

    `  9     WHERE  cust_id = p_cust_id;`

    ` 10     RETURN v_customer_name;`

    ` 11  END get_customer_name;`

    ` 12  /`


    `Function created.`


    You can see that the lookup function fetches a customer name by primary key. In
    addition, I have created a small `SLEEPER` function to enable me to slow down
    *Session One’s* query and simulate a long-running SQL statement (this function
    simply calls `DBMS_LOCK.SLEEP` and returns a constant 0).


    Continuing with the example, *Session One* issues the following query shown in
    [Listing 9-21](#Chapter09.html#list_9_21).


    ***Listing 9-21.** The Read-Consistency Trap (Session One’s Long-Running Query)*


    **`Session One`**

    `-----------`

    `22:47:23 SQL> SELECT s.cust_id`

    `22:47:23   2  ,      get_customer_name(s.cust_id) AS cust_name`

    `22:47:23   3  ,      sleeper(1)                   AS sleep_time`

    `22:47:23   4  FROM   sales s`

    `22:47:23   5  WHERE  ROWNUM <= 10;`


    Note the time at which *Session One* issues this SQL. The 10-row resultset and
    the 1 second sleep for each row means that this query should complete in just
    over 10 seconds. While this is executing, *Session Two* updates one of the customer
    names that *Session One* is repeatedly querying, as shown in [Listing 9-22](#Chapter09.html#list_9_22).


    ***Listing 9-22.** The Read-Consistency Trap (Session Two’s Customer Update)*


    **`Session Two`**

    `-----------`

    `22:47:26 SQL> UPDATE customers`

    `22:47:26   2  SET    cust_last_name = ''Smith''`

    `22:47:26   3  WHERE  cust_id = 2;`


    `1 row updated.`


    **`22:47:26 SQL> COMMIT;`**


    `Commit complete.`


    Again, note the time that this update is committed (approximately 3 seconds into
    *Session One’s* long-running query). [Listing 9-23](#Chapter09.html#list_9_23)
    shows the effect of this on *Session One’s* report.


    ***Listing 9-23.** The Read-Consistency Trap (Session One’s Resultset)*'
