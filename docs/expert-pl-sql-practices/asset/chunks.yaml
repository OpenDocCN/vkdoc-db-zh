  trans: "\n## 未引发异常\n\n传统的隐式游标在结果集中没有行时会引发 `no_data_found` 异常，你的应用程序可能依赖这一事实来采取补救措施。在以下示例\
    \ (`bulk_ndf_1.sql`) 中，`no_data_found` 用于指示查询谓词无效：\n\n```sql\nSQL> set serverout\
    \ on\nSQL> declare\n  2    l_descr hardware.descr%type;\n  3  begin\n  4    select\
    \ descr\n  5    into   l_descr\n  6    from   hardware\n  7    where  aisle =\
    \ 0\n  8    and    item = 0;\n  9    dbms_output.put_line('Item was found');\n\
    \ 10  exception\n 11    when no_data_found then\n 12      dbms_output.put_line('Invalid\
    \ item specified');\n 13  end;\n 14  /\nInvalid item specified\n\nPL/SQL procedure\
    \ successfully completed.\n```\n\n然而，当此示例转换为使用批量收集时（若不加以适当注意），代码中就会引入一个错误。请执行以下版本\
    \ (`bulk_ndf_2.sql`) 并在你自己的系统上检查结果：\n\n```sql\nSQL> set serverout on\nSQL> declare\n\
    \  2    type t_descr_list is table of hardware.descr%type;\n  3    l_descr_list\
    \ t_descr_list;\n  4  begin\n  5    select descr\n  6    bulk collect\n  7   \
    \ into   l_descr_list\n  8    from   hardware\n  9    where  aisle = 0\n 10  \
    \  and    item = 0;\n 11    dbms_output.put_line('Item was found');\n 12  exception\n\
    \ 13    when no_data_found then\n 14      dbms_output.put_line('Invalid item specified');\n\
    \ 15  end;\n 16  /\nItem was found  <==== 错误！\n\nPL/SQL procedure successfully\
    \ completed.\n```\n\n该过程运行成功但返回了错误的结果！这是因为一个批量收集获取调用将 **不会** 引发 `no_data_found`\
    \ 异常。你可以将这种异常的缺失解释为 PL/SQL 声明它已成功地将可用行（本例中为零行）填充到了目标数组中。即使目标数组不包含任何数据，它也确实被初始化了。这一最终结果与目标数组完全未被初始化有细微差别。\n\
    \n以下示例 (`bulk_ndf_3.sql`) 展示了批量收集将零行返回到集合中，与完全在批量收集调用中不使用集合，这两者之间存在重要区别：\n\n```sql\n\
    SQL> set serverout on\nSQL> declare\n  2    type t_descr_list is table of hardware.descr%type;\n\
    \  3    l_descr_list t_descr_list;\n  4  begin\n  5    select descr\n  6    bulk\
    \ collect\n  7    into   l_descr_list\n  8    from   hardware\n  9    where  aisle\
    \ = 0\n 10    and    item = 0;\n 11    dbms_output.put_line(l_descr_list.count||'\
    \ rows found');\n 12  end;\n 13  /\n0 rows found\n\nPL/SQL procedure successfully\
    \ completed.\n```\n\n注释掉 `SELECT` 语句并再次执行相同的代码。批量收集永远不会运行。因此，目标数组永远不会被初始化。这种未初始化会导致错误。例如，`bulk_ndf_4.sql`\
    \ 现在会在尝试引用集合内容时崩溃。\n\n```sql\nSQL> declare\n  2    type t_descr_list is table\
    \ of hardware.descr%type;\n  3    l_descr_list t_descr_list;\n  4  begin\n  5\
    \  --  select descr\n  6  --  bulk collect\n  7  --  into   l_descr_list\n  8\
    \  --  from   hardware\n  9  --  where  aisle = 0\n 10  --  and    item = 0;\n\
    \ 11    dbms_output.put_line(l_descr_list.count||' rows found');\n 12  end;\n\
    \ 13  /\ndeclare\n*\nERROR at line 1:\nORA-06531: Reference to uninitialized collection\n\
    ORA-06512: at line 11\n```\n\n了解到即使没有返回行，批量收集操作也会初始化目标数组，这使得你可以重构现有代码而不会有太大困难。只需检查数组中的记录数，并在集合为空时显式引发\
    \ `no_data_found` 异常，即可保持其余代码像以前一样工作。例如，以下代码 (`bulk_ndf_5.sql`) 添加了一个条件检查，当集合为空时引发\
    \ `no_data_found`：\n\n```sql\nSQL> set serverout on\nSQL> declare\n  2    type\
    \ t_descr_list is table of hardware.descr%type;\n  3    l_descr_list t_descr_list;\n\
    \  4  begin\n  5    select descr\n  6    bulk collect\n  7    into   l_descr_list\n\
    \  8    from   hardware\n  9    where  aisle = 0\n 10    and    item = 0;\n 11\n\
    \ 12    if l_descr_list.count = 0 then\n 13       raise no_data_found;\n 14  \
    \  end if;\n 15\n 16    dbms_output.put_line('Item was found');\n 17  exception\n\
    \ 18    when no_data_found then\n 19      dbms_output.put_line('Invalid item specified');\n\
