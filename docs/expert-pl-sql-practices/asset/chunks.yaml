  trans: "#### 错误恢复\n\n遵循黑盒范式，一个执行插入、更新或删除信息的操作，应使数据库保持在一致状态。如果该操作失败，则必须回滚到进入该操作时系统所处的状态。请使用大写字母为保存点命名，并确保在操作的全局异常处理中包含回滚调用，如下所示：\n\
    \n```sql\nPROCEDURE EXE$REGISTER_NEW_BOOK (\n                     p_title    \
    \            IN      VARCHAR2\n                    ,p_author               IN\
    \      VARCHAR2\n                    ,p_book_id                  OUT  NUMBER\n\
    \                    ,p_exitcode                 OUT  NUMBER\n               \
    \     ,p_exittext                 OUT  VARCHAR2\n                    ) IS\n\n\
    \  L_PB_FATAL                                    EXCEPTION;\n\nBEGIN\n  -- 初始化\n\
    \  p_exitcode := 0;\n  p_exittext := NULL;\n\n  SAVEPOINT BEFORE_REGISTER_NEW_BOOK;\n\
    \n  IF p_title IS NULL OR p_author IS NULL THEN\n    p_exitcode := 12345;  --\
    \ 无效新书数据的错误代码\n    p_exittext := '缺少书名或作者信息';\n    RAISE L_PB_FATAL;\n  END IF;\n\
    \n  ...\n\nEXCEPTION\n  WHEN L_PB_FATAL THEN\n    ROLLBACK TO BEFORE_REGISTER_NEW_BOOK;\n\
    \    IF p_exitcode = 0 THEN -- 为避免值被遗漏\n      p_exitcode := -1;\n    END IF;\n\
    \  WHEN OTHERS THEN\n    ROLLBACK TO BEFORE_REGISTER_NEW_BOOK;\n    p_exitcode\
    \ := SQLCODE;\n    p_exittext := SUBSTR('KNL_BOOKS.EXE$REGISTER_NEW_BOOK 中出错:\
    \ '||SQLERRM, 1, 500);\nEND; -- EXE$REGISTER_NEW_BOOK\n```\n\n#### 测试优先，显示其次\n\
    \n如果你正在编写一个驱动用户界面的模块，最好先检查并获取所有必需的数据，然后再显示界面。这样，所有可能的错误在显示任何内容之前就被捕获了。你便可以轻松地避免在页面或屏幕中间出现“发生错误”之类的提示让用户看到。此外，如果你确实需要显示错误信息，你也可以在不使用户感到困惑的情况下进行。如果你开始显示数据，却中途被一个错误打断，用户可能会变得慌乱和沮丧。\n\
    \n### 总结\n\n编码规范并非旨在解决你在实现系统或维护软件时可能遇到的所有问题。然而，为了标准化大型源代码库以及简化模块的维护和共享，它们非常方便。遵循编码标准是对你作为同行的程序员和项目负责人的尊重。作为一名程序员，你可能在开始时觉得使用它们很困难，因为它们可能与你自己的风格不匹配。相信我；只需要很短的时间，给定的一套标准就会成为你自然的编码方式。此外，一旦你开始管理大量模块，能够以一致的方式“即插即用”它们来构建复杂的机制，是多么令人愉快！作为一名项目负责人，你可能会发现将标准强加给整个团队很困难，但质量上的提升是值得的。\n\
    \n以下是一个最终模板。它将许多本章描述的规范总结在一个地方。\n\n```sql\n/*-----------------------------------------------------------------------*/\n\
    /*                                                                       */\n\
    /* 模块     : MODULE_NAME                                                */\n/*\
    \ 目标     : 模块的简短描述。                                           */\n/* 关键词   : 描述模块功能的几个关键词。\
    \                                 */\n/*                                     \
    \                                  */\n/*-----------------------------------------------------------------------*/\n\
    /* 描述:                                                                 */\n/*\
    \                                                                       */\n/*\
    \ 模块的长描述：其目标。                                                */\n/* 关于参数的解释（输入和输出）。\
    \                                        */\n/* 操作如何工作，“技巧”等。                \
    \                              */\n/*                                        \
    \                               */\n/*-----------------------------------------------------------------------*/\n\
    /* 历史:                                                                 */\n/*\
    \                                                                       */\n/*\
    \ YYYY-MM-DD : 名和姓 - 创建。                                          */\n/*     \
    \                                                                  */\n/* YYYY-MM-DD\
    \ : 名和姓 - 审查。                                          */\n/*                \
    \                                                       */\n/* YYYY-MM-DD : 名和姓\
    \                                                   */\n/*              修改描述。\
    \                                                */\n/*                      \
    \                                                 */\n/*-----------------------------------------------------------------------*/\n\
    PROCEDURE TYPE$MODULE_NAME(\n                     p_param1              IN   \
    \   VARCHAR2 -- 此处为 p_param1 添加注释\n                    ,p_param2             \
    \ IN      NUMBER   := NULL\n                    ,p_exitcode               OUT\
    \  NUMBER\n                    ,p_exittext               OUT  VARCHAR2\n     \
    \               ) IS\n\n-- 声明部分\n\nCURSOR one_cursor IS\n  SELECT *\n    FROM\
    \ table\n   WHERE condition;\n\n  L_PB_FATAL                                 \
    \   EXCEPTION;\n  l_variable                                    VARCHAR2(1);\n\
    \nBEGIN\n  -- 初始化\n  p_exitcode := 0;\n  p_exittext := NULL;\n\n  SAVEPOINT BEFORE_TYPE$MODULE_NAME;\n\
    \n  -- 检查输入\n  PACKAGE.CHK$PARAM1 (\n                     p_value    => p_param1\n\
    \                    ,p_exitcode => p_exitcode\n                    ,p_exittext\
    \ => p_exittext\n                    );\n  IF p_exitcode <> 0 THEN     -- 原文为\
    \ p_exittext，此处根据上下文逻辑调整为 p_exitcode\n     RAISE L_PB_FATAL;\n  END IF;\n\n  --\
    \ 收集所需数据\n  BEGIN\n    SELECT col\n      INTO l_variable\n      FROM table\n \
    \    WHERE condition1\n       AND condition2;\n  EXCEPTION\n     WHEN OTHERS THEN\n\
    \       p_exitcode := 123456;\n       p_exittext := '在 TYPE$MODULE_NAME 中获取信息时出错';\n\
    \       RAISE L_PB_FATAL;\n  END;\n\n  -- 从游标获取数据\n  FOR l_one_rec IN one_cursor\
    \ LOOP    -- 原文为 FROM，应为 IN\n    IF l_one_rec.col <> PACKAGE.C_CONSTANT THEN\n\
    \      -- 关于上述测试的解释\n      ...\n    ELSE\n      ...\n    END IF;\n  END LOOP;\
    \ -- One cursor\n\n  -- 显示\n  ...\n\nEXCEPTION\n  WHEN L_PB_FATAL THEN\n    ROLLBACK\
    \ TO BEFORE_TYPE$MODULE_NAME;\n    IF p_exitcode = 0 THEN          -- 为避免遗漏退出代码\n\
    \      p_exitcode := -1;             -- 返回非 0 值表示错误\n    END IF;\n  WHEN OTHERS\
    \ THEN\n    ROLLBACK TO BEFORE_TYPE$MODULE_NAME;\n    p_exitcode := SQLCODE;\n\
    \    p_exittext := SUBSTR('PACKAGE.TYPE$MODULE_NAME 中出错: '||SQLERRM, 1, 500);\n\
    END TYPE$MODULE_NAME;\n```\n\n## 第 15 章"
- fmt: "## Dependencies and Invalidations\n\n**by Arup Nanda**\n\nDependencies between\
    \ PL/SQL packages can a perplexing source of application errors. Database administrators\
    \ and developers unacquainted with how dependencies work can find themselves scratching\
    \ their heads over sporadic and unrepeatable errors that are seemingly without\
    \ cause. For example, while executing a procedure in a package you are responsible\
    \ for, an application throws the following error:\n\n`ORA-04068: existing state\
    \ of package has been discarded`\n\nThis particular procedure has been executed\
    \ a million times before. You can swear on your great grandmother's grave that\
    \ you haven't changed the package in a long time, definitely not in the last few\
    \ seconds and yet the application gets this error, the customer orders fail, and\
    \ the organization loses money.\n\nNot finding an obvious explanation, you blame\
    \ a coworker for messing with this package, resulting in a heated argument which\
    \ you regret instantly. Your manager intervenes and calmly asks you to show her\
    \ the error. You manually re-execute the procedure in the package and (surprise,\
    \ surprise) it executes without any error! Amidst that glaring from your accused\
    \ coworker and the oh-you-need-help look from your manager, you are now thoroughly\
    \ perplexed as to what happened. Sabotage, Oracle bug, bad karma, or none of the\
    \ above?\n\nWhat is this error? And why did it get resolved immediately afterwards\
    \ without your intervention? The problem is not voodoo, but how PL/SQL code dependencies\
    \ work. Some object referenced in the package was altered, which caused the package\
    \ to be invalidated. Then the package revalidated (or, recompiled) later and had\
    \ to be reinitialized.\n\nUnderstanding the dependency chain and causes of invalidation\
    \ is very important when you develop an application. The preceding scenario is\
    \ an example of how poorly designed application code can cause an outage. This\
    \ chapter explains dependencies and how you can code to reduce invalidations,\
    \ thus reducing and possibly eliminating interruptions to the application during\
    \ runtime.\n\n### Dependency Chains\n\nFirst, you must understand dependency chains\
    \ and their impact upon PL/SQL code. Suppose you have a table `ORDERS` and a procedure\
    \ `UPD_QTY` that updates the column `QUANTITY`. Their definitions are as follows\
    \ (note the dependency of the procedure upon the table; the two objects form a\
    \ dependency chain):\n\n```sql\nSQL> desc orders\n Name                      \
    \                Null?    Type\n ----------------------------------------- --------\
    \ ----------------------------\n ORDER_ID                                  NOT\
    \ NULL NUMBER(5)\n CUST_ID                                   NOT NULL NUMBER(10)\n\
    \ QUANTITY                                           NUMBER(10,2)\n\ncreate or\
    \ replace procedure upd_qty (\n        p_order_id in orders.order_id%type,\n \
    \       p_quantity in orders.quantity%type\n) as\nbegin\n     update orders\n\
    \     set quantity = p_quantity\n     where order_id = p_order_id;\nend;\n```\n\
    \nWhat happens if you drop the column `QUANTITY`? The procedure will become meaningless,\
    \ of course, so Oracle rightfully makes it invalid. Later you make another modification,\
    \ either by adding the column back to the table or by removing that column from\
    \ the procedure and replacing it with another in such a way that the procedure\
    \ is now syntactically valid. If you added the column back into the table, you\
    \ can recompile the procedure by executing:\n\n```sql\nSQL> alter procedure upd_qty\
    \ compile reuse settings;\n```\n\n![images](images/square.jpg) **Tip** The `REUSE\
    \ SETTINGS` clause in the recompilation is a handy and powerful tool. Any special\
    \ compile time parameter such as `plsql_optimize_level` or `warning_level` set\
    \ earlier for the procedure will remain the same after the recompilation. If you\
    \ didn't use that clause, the settings for the current sessions would have taken\
    \ effect. So, unless you want to change those settings, it's a good idea to use\
    \ that clause every time.\n\nThe compilation will check the existence of all the\
    \ components referenced in the procedure. This establishment of validity occurs\
    \ only when the procedure is compiled—not at runtime. Why? Imagine the contents\
    \ of a typical stored code base: thousands of lines long with hundreds of tables,\
    \ columns, and synonyms, views, sequences, and other stored code trying to validate\
    \ every object at every execution. The performance will be terrible, making the\
    \ process infeasible. Therefore, the validation is done at compilation time, which\
    \ is likely a one-time act. When an object (such as this table) changes, Oracle\
    \ can't immediately determine whether the changes will affect the dependent objects\
    \ (such as this procedure), so it reacts by marking it as invalid. The dependency\
    \ among objects is clearly shown in the data dictionary view `DBA_DEPENDENCIES`\
    \ (or, its counterpart – `USER_DEPENDENCIES`).\n\n```sql\nSQL> desc dba_dependencies\n\
    \ Name                                      Null?    Type\n -----------------------------------------\
    \ -------- ----------------------------\n OWNER                              \
    \       NOT NULL VARCHAR2(30)\n NAME                                      NOT\
    \ NULL VARCHAR2(30)\n TYPE                                               VARCHAR2(18)\n\
    \ REFERENCED_OWNER                                   VARCHAR2(30)\n REFERENCED_NAME\
    \                                    VARCHAR2(64)\n REFERENCED_TYPE          \
    \                          VARCHAR2(18)\n REFERENCED_LINK_NAME               \
    \                VARCHAR2(128)\n DEPENDENCY_TYPE                             \
    \       VARCHAR2(4)\n```\n\nThe `REFERENCED_NAME` shows the object being referenced—the\
    \ other object that the current object is dependent on. The following query against\
    \ the table lists dependencies for `UPD_QTY`. Each such dependency represents\
    \ an object upon which `UPD_QTY` is dependent.\n\n```sql\nselect referenced_owner,\
    \ referenced_name, referenced_type\nfrom dba_dependencies\nwhere owner = 'ARUP'\n\
    and name = 'UPD_QTY'\n/\n```"
  raw: '## Dependencies and Invalidations


    **by Arup Nanda**


    Dependencies between PL/SQL packages can a perplexing source of application errors.
    Database administrators and developers unacquainted with how dependencies work
    can find themselves scratching their heads over sporadic and unrepeatable errors
    that are seemingly without cause. For example, while executing a procedure in
    a package you are responsible for, an application throws the following error:


    `ORA-04068: existing state of package has been discarded`


    This particular procedure has been executed a million times before. You can swear
    on your great grandmother''s grave that you haven''t changed the package in a
    long time, definitely not in the last few seconds and yet the application gets
    this error, the customer orders fail, and the organization loses money.


    Not finding an obvious explanation, you blame a coworker for messing with this
    package, resulting in a heated argument which you regret instantly. Your manager
    intervenes and calmly asks you to show her the error. You manually re-execute
    the procedure in the package and (surprise, surprise) it executes without any
    error! Amidst that glaring from your accused coworker and the oh-you-need-help
    look from your manager, you are now thoroughly perplexed as to what happened.
    Sabotage, Oracle bug, bad karma, or none of the above?


    What is this error? And why did it get resolved immediately afterwards without
    your intervention? The problem is not voodoo, but how PL/SQL code dependencies
    work. Some object referenced in the package was altered, which caused the package
    to be invalidated. Then the package revalidated (or, recompiled) later and had
    to be reinitialized.


    Understanding the dependency chain and causes of invalidation is very important
    when you develop an application. The preceding scenario is an example of how poorly
    designed application code can cause an outage. This chapter explains dependencies
    and how you can code to reduce invalidations, thus reducing and possibly eliminating
    interruptions to the application during runtime.


    ### Dependency Chains


    First, you must understand dependency chains and their impact upon PL/SQL code.
    Suppose you have a table ORDERS and a procedure UPD_QTY that updates the column
    QUANTITY. Their definitions are as follows (note the dependency of the procedure
    upon the table; the two objects form a dependency chain):


    `SQL> desc orders`

    ` Name                                      Null?    Type`

    ` ----------------------------------------- -------- ----------------------------`

    ` ORDER_ID                                  NOT NULL NUMBER(5)`

    ` CUST_ID                                   NOT NULL NUMBER(10)`

    ` QUANTITY                                           NUMBER(10,2)`


    `create or replace procedure upd_qty (`

    `        p_order_id in orders.order_id%type,`

    `        p_quantity in orders.quantity%type`

    `) as`

    `begin`

    `     update orders`

    `     set quantity = p_quantity`

    `     where order_id = p_order_id;`

    `end;`


    What happens if you drop the column QUANTITY? The procedure will become meaningless,
    of course, so Oracle rightfully makes it invalid. Later you make another modification,
    either by adding the column back to the table or by removing that column from
    the procedure and replacing it with another in such a way that the procedure is
    now syntactically valid. If you added the column back into the table, you can
    recompile the procedure by executing:


    `SQL> alter procedure upd_qty compile reuse settings;`


    ![images](images/square.jpg) **Tip** The RESUSE SETTINGS clause in the recompilation
    is a handy and powerful tool. Any special compile time parameter such as plsql_optimize_level
    or warning_level set earlier for the procedure will remain the same after the
    recompilation. If you didn''t use that clause, the settings for the current sessions
    would have taken effect. So, unless you want to change those settings, it''s a
    good idea to use that clause every time.


    The compilation will check the existence of all the components referenced in the
    procedure. This establishment of validity occurs only when the procedure is compiled—not
    at runtime. Why? Imagine the contents of a typical stored code base: thousands
    of lines long with hundreds of tables, columns, and synonyms, views, sequences,
    and other stored code trying to validate every object at every execution. The
    performance will be terrible, making the process infeasible. Therefore, the validation
    is done at compilation time, which is likely a one-time act. When an object (such
    as this table) changes, Oracle can''t immediately determine whether the changes
    will affect the dependent objects (such as this procedure), so it reacts by marking
    it as invalid. The dependency among objects is clearly shown in the data dictionary
    view DBA_DEPENDENCIES (or, its counterpart – USER_DEPENDENCIES).


    `SQL> desc dba_dependencies`

    ` Name                                      Null?    Type`

    ` ----------------------------------------- -------- ----------------------------`

    ` OWNER                                     NOT NULL VARCHAR2(30)`

    ` NAME                                      NOT NULL VARCHAR2(30)`

    ` TYPE                                               VARCHAR2(18)`

    ` REFERENCED_OWNER                                   VARCHAR2(30)`

    ` REFERENCED_NAME                                    VARCHAR2(64)`

    ` REFERENCED_TYPE                                    VARCHAR2(18)`

    ` REFERENCED_LINK_NAME                               VARCHAR2(128)`

    ` DEPENDENCY_TYPE                                    VARCHAR2(4)`


    The REFERENCED_NAME shows the object being referenced—the other object that the
    current object is dependent on. The following query against the table lists dependencies
    for UPD_QTY. Each such dependency represents an object upon which UPD_QTY is dependent.


    `select referenced_owner, referenced_name, referenced_type`

    `from dba_dependencies`

    `where owner = ''ARUP''`

    `and name = ''UPD_QTY''`

    `/`'
  trans: "## 依赖关系与失效机制\n\n**作者：Arup Nanda**\n\nPL/SQL 包之间的依赖关系常常是应用程序错误的棘手来源。不熟悉依赖关系工作原理的数据库管理员和开发人员，可能会对一些偶发且无法复现、看似无因的错误感到困惑不解。例如，在执行你负责的一个包中的过程时，应用程序抛出以下错误：\n\
    \n`ORA-04068: 包的现有状态已被丢弃`\n\n这个特定的过程之前已经成功执行过无数次。你完全可以发誓保证，自己很久没修改过这个包，最近几秒钟内肯定没有，但应用程序却报了这个错，客户订单失败，公司因此蒙受损失。\n\
    \n找不到明显的原因，你便责怪同事乱动了这个包，引发了一场激烈的争吵，事后立刻感到后悔。你的经理介入，冷静地让你给她重现错误。你手动重新执行了包中的过程，然后（惊喜，惊喜）它竟然毫无错误地执行成功了！在被你指责的同事那怒目而视的目光，以及经理那“你需要帮助”的眼神注视下，你此刻对究竟发生了什么感到彻底困惑。是蓄意破坏，Oracle\
    \ Bug，运气不佳，还是都不是？\n\n这个错误是什么？为什么你没做什么它自己就好了？问题并非源于玄学，而在于 PL/SQL 代码的依赖关系工作机制。包中引用的某个对象被修改了，导致该包失效。随后包被重新验证（或重新编译），并且必须重新初始化。\n\
    \n在开发应用程序时，理解依赖链和失效原因至关重要。前述情景就是一个设计不佳的应用程序代码如何导致服务中断的实例。本章将解释依赖关系，以及如何通过编码来减少失效，从而在运行时减少甚至可能消除对应用程序的干扰。\n\
    \n### 依赖链\n\n首先，你必须理解依赖链及其对 PL/SQL 代码的影响。假设你有一个表 `ORDERS` 和一个用于更新 `QUANTITY` 列的过程\
    \ `UPD_QTY`。它们的定义如下（注意过程对表的依赖；这两个对象形成了一个依赖链）：\n\n```sql\nSQL> desc orders\n Name\
    \                                      Null?    Type\n -----------------------------------------\
    \ -------- ----------------------------\n ORDER_ID                           \
    \       NOT NULL NUMBER(5)\n CUST_ID                                   NOT NULL\
    \ NUMBER(10)\n QUANTITY                                           NUMBER(10,2)\n\
    \ncreate or replace procedure upd_qty (\n        p_order_id in orders.order_id%type,\n\
    \        p_quantity in orders.quantity%type\n) as\nbegin\n     update orders\n\
    \     set quantity = p_quantity\n     where order_id = p_order_id;\nend;\n```\n\
    \n如果你删除了 `QUANTITY` 列会怎样？当然，这个过程将失去意义，因此 Oracle 合理地将其标记为无效。之后，你可能进行了另一项修改，要么将该列添加回表中，要么从过程中移除该列并替换为其他内容，使得该过程在语法上重新有效。如果你将列添加回了表中，可以通过执行以下命令重新编译该过程：\n\
    \n```sql\nSQL> alter procedure upd_qty compile reuse settings;\n```\n\n![images](img/square.jpg)\
    \ **提示** 重新编译时的 `REUSE SETTINGS` 子句是一个便捷且强大的工具。之前为过程设置的任何特殊编译时参数，如 `plsql_optimize_level`\
    \ 或 `warning_level`，在重新编译后将保持不变。如果不使用该子句，则当前会话的设置将会生效。因此，除非你想更改这些设置，否则每次使用该子句都是一个好主意。\n\
    \n编译将检查过程中引用的所有组件是否存在。这种有效性确认仅在编译过程时进行——而不是在运行时。为什么？想象一下典型的存储代码库内容：长达数千行，包含数百个表、列、同义词、视图、序列和其他存储代码，如果在每次执行时都尝试验证每个对象，性能将会非常糟糕，使得此过程不可行。因此，验证在编译时完成，这很可能是一次性的操作。当一个对象（比如这个表）发生变化时，Oracle\
    \ 无法立即确定变更是否会影响依赖对象（比如这个过程），因此它通过将该对象标记为失效来做出反应。对象之间的依赖关系在数据字典视图 `DBA_DEPENDENCIES`（或其对应视图\
    \ `USER_DEPENDENCIES`）中清晰可见。\n\n```sql\nSQL> desc dba_dependencies\n Name    \
    \                                  Null?    Type\n -----------------------------------------\
    \ -------- ----------------------------\n OWNER                              \
    \       NOT NULL VARCHAR2(30)\n NAME                                      NOT\
    \ NULL VARCHAR2(30)\n TYPE                                               VARCHAR2(18)\n\
    \ REFERENCED_OWNER                                   VARCHAR2(30)\n REFERENCED_NAME\
    \                                    VARCHAR2(64)\n REFERENCED_TYPE          \
    \                          VARCHAR2(18)\n REFERENCED_LINK_NAME               \
    \                VARCHAR2(128)\n DEPENDENCY_TYPE                             \
    \       VARCHAR2(4)\n```\n\n`REFERENCED_NAME` 显示被引用的对象——当前对象所依赖的另一个对象。以下针对该表的查询列出了\
    \ `UPD_QTY` 的依赖项。每个这样的依赖项都代表 `UPD_QTY` 所依赖的一个对象。\n\n```sql\nselect referenced_owner,\
    \ referenced_name, referenced_type\nfrom dba_dependencies\nwhere owner = 'ARUP'\n\
    and name = 'UPD_QTY'\n/\n```"
- fmt: "`REFERENCED_OWNER               REFERENCED_NAME                REFERENCED_TYPE`\n\
    `------------------------------ ------------------------------ ------------------`\n\
    `SYS                            SYS_STUB_FOR_PURITY_ANALYSIS   PACKAGE`\n`ARUP\
    \                           ORDERS                         TABLE`\n\nThis output\
    \ shows that the procedure `UPD_QTY` depends on the table `ORDERS`, as we expected.\
    \ Had there been another object in the procedure's code, it would have been listed\
    \ here as well.\n\n![images](images/square.jpg) `Note` See the upcoming sidebar\
    \ “What About `SYS_STUB_FOR_PARITY_ANALYSIS`?” for an explanation of this particular\
    \ dependency.\n\nWhenever the structure of the table `ORDERS` is changed, the\
    \ procedure's validity becomes questionable and Oracle makes it invalid. However,\
    \ being questionable does not necessarily mean invalid. For instance, when you\
    \ add a column to the table, it is technically a change to the table. Will it\
    \ make the procedure invalid?\n\n```sql\nSQL> alter table orders add (store_id\
    \ number(10));\n```\n\n```\nTable altered.\n```\n\nIf you examine the status of\
    \ the `UPD_QTY` procedure, yes.\n\n```sql\nSQL> select status from user_objects\
    \ where object_name = 'UPD_QTY';\n```\n\n```\nSTATUS\n-------\nINVALID\n```\n\n\
    But the procedure does not actually reference the new column, so it shouldn't\
    \ have been affected. However, Oracle does not necessarily know that. It preemptively\
    \ marks the procedure invalid just to be safe. You can, at this point, recompile\
    \ the procedure; it will compile fine. Otherwise, Oracle will recompile the procedure\
    \ automatically when it is invoked next time.\n\nLet's see the new procedure,\
    \ including the automatic recompilation, in action.\n\n```sql\nSQL> exec upd_qty\
    \ (1,1)\n```\n\n```\nPL/SQL procedure successfully completed.\n```\n\nThe procedure\
    \ executed just fine, even though it was marked invalid. How was that possible?\
    \ It was executed successfully because the execution forced a recompile (and re-validation)\
    \ of the procedure. The recompile succeeded because the procedure does not actually\
    \ have any referenced to the component in the underlying table that changed—the\
    \ new column `STORE_ID`. The procedure compiled fine and was marked valid. You\
    \ can confirm that by checking the status once again.\n\n```sql\nSQL> select status\
    \ from user_objects\n  2  where object_name = 'UPD_QTY';\n```\n\n```\nSTATUS\n\
    -------\nVALID\n```\n\nSo far the events seem pretty benign; these forced recompilations\
    \ take care of any changes that do not affect the validity of the program and\
    \ the world just goes on as usual. Why should you care? You should care a lot.\n\
    \n### EXECUTED IMMEDIATE IS A SPECIAL CASE\n\nIf a table is referenced inside\
    \ of an `execute immediate` string, then dependency checking does not capture\
    \ that table as a referenced object. For instance, consider the following code:\n\
    \n```sql\ncreate or replace procedure upd_qty as\nbegin\n   execute immediate\
    \ 'update orders set quantity = ...';\nend;\n```\n\nIn this case, `ORDERS` table\
    \ will not be shown as referenced object for `UP_QTY`, which is yet another reason\
    \ for not using dynamic SQL (or, using it, based on your perspective).\n\nThe\
    \ compilation of stored code (and for that matter other dependent objects such\
    \ as views on a table) forces another process in the database called parsing.\
    \ Parsing is akin to compilation of source code. When you execute an SQL statement\
    \ such as `select order_id from orders`, Oracle can't just execute the statement\
    \ as is. It must ask a lot of questions, some which are:\n\n*   *What* is `orders`?\
    \ Is it a table, a view, a synonym?\n*   Is there indeed a *column* in the table\
    \ called `order_id`?\n*   Is there a *function* called `order_id`?\n*   Do you\
    \ have *privileges* to select from this table (or the function, as is the case)?\n\
    \nAfter making sure you have all the necessary pre-conditions, Oracle makes an\
    \ executable version of that SQL statement and puts it in the library cache. This\
    \ process is known as *parsing*. Subsequent execution of the SQL will use the\
    \ parsed version only and not go through the process of parsing. During the execution\
    \ phase, Oracle must ensure that the components (the table `ORDERS`, the procedure\
    \ `UPD_QTY`, etc.) are not changed. It does that by placing a *parse lock* on\
    \ those objects and other structures such as cursors.\n\nParsing is very CPU intensive.\
    \ Frequent parsing and recompilation rob the server of CPU cycles, starving other\
    \ useful processes from getting their share of CPU power. You can examine the\
    \ effect by checking the statistics related to parsing in a view called `v$mystat`\
    \ which shows statistics for your current session. The view shows the stats as\
    \ `statistic#` only; their names are available in another view called `v$statname`.\
    \ The following is a query that joins both views and shows stats on parsing. Save\
    \ the query as `ps.sql` to examine the effect of reparsing and recompilation.\n\
    \n```sql\nselect name, value\nfrom v$mystat s, v$statname n\nwhere s.statistic#\
    \ = n.statistic#\nand n.name like '%parse%';\n```\n\nThe view `v$mystat` is a\
    \ cumulative view, so the values in there do not show the current data; they are\
    \ incremented. To know the stats for a period of time, you have to select from\
    \ the view twice and get the difference. To find out the parse-related stats,\
    \ collect the stats first by running `ps.sql`, execute the procedure `upd_qty()`,\
    \ and collect the stats once again by running `ps.sql`, like so:\n\n```sql\nSQL>\
    \ @ps\n```\n\n```\nNAME                                VALUE\n------------------------------\
    \ ----------\nparse time cpu                           20\nparse time elapsed\
    \                       54\nparse count (total)                     206\nparse\
    \ count (hard)                       16\nparse count (failures)              \
    \      1\n```\n\n```sql\nSQL> exec upd_qty(1,1)\n```\n\n```\nPL/SQL procedure\
    \ successfully completed.\n```\n\n```sql\nSQL> @ps\n```\n\n```\nNAME         \
    \                       VALUE\n------------------------------ ----------\nparse\
    \ time cpu                           20\nparse time elapsed                  \
    \     54\nparse count (total)                     208\nparse count (hard)    \
    \                   16\nparse count (failures)                    1\n```\n\nNote\
    \ the values. Nothing has increased; in other words, there was no parsing as a\
    \ result of executing the procedure `upd_qty`. On a *different* session, alter\
    \ the table by adding a column, like so:\n\n```sql\nSQL> alter table orders add\
    \ (amount number(10,2));\n```\n\n```\nTable altered.\n```\n\nNow, in the first\
    \ session execute the procedure and collect the statistics.\n\n```sql\nSQL> exec\
    \ upd_qty(1,1)\n```\n\n```\nPL/SQL procedure successfully completed.\n```\n\n\
    ```sql\nSQL> @ps\n```\n\n```\nNAME                                VALUE\n------------------------------\
    \ ----------\nparse time cpu                           26\nparse time elapsed\
    \                       60\nparse count (total)                     279\nparse\
    \ count (hard)                       19\nparse count (failures)              \
    \      1\n```\n\nNotice how the parse-related statistics have increased. Hard\
    \ parsing, which means the SQL statement was either not found in the library cache\
    \ or whatever version was found was not usable and therefore had to be parsed\
    \ fresh, jumped from 16 to 19—indicating 3 hard parses. Total parse count jumped\
    \ from 208 to 279, a jump of 71. Since there are 3 hard parses, the other 68 are\
    \ soft parses, which means the structures were found in the library cache and\
    \ were revalidated rather than being parsed from scratch. The CPU time for parsing\
    \ jumped from 20 to 26, indicating that the parsing consumed 6 centi-seconds of\
    \ CPU. These CPU cycles could have been used for doing some otherwise useful work\
    \ had there been not a need for parsing. It may not sound like much, but consider\
    \ situations where thousands of such cases occur in a normal database system causing\
    \ significant CPU consumption."
