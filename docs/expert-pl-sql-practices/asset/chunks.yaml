  raw: '##### Internal Optimizations


    In addition to the numerous CBO optimizations, Oracle Database also has a range
    of internal optimizations that are applied at runtime, and trying to second-guess
    the behavior of these can often be an exercise in futility. Not only will they
    probably change with database version, they can also be dependent on a wide range
    of factors, some of which you can derive and others that are hidden from you.


    Oracle Database’s optimization for DETERMINISTIC functions is one such example.
    Because a deterministic function will, by definition, always return the same result
    for a particular input value, Oracle Database can avoid re-executing the PL/SQL
    function if it encounters the same inputs. The efficiency of this optimization
    is, however, dependant on other factors, such as data type, data length, cardinality
    (i.e. the number of distinct values), the database version, and even environmental
    settings such as array fetch size. For a good discussion of how these factors
    can result in a wildly varying reduction in function executions, see Dom Brooks’
    “*Determining Deterministic”* series of articles on [`http://orastory.wordpress.com`](http://orastory.wordpress.com).


    Similar behavior is seen when PL/SQL function calls are encapsulated in scalar-subqueries
    (a commonly-used technique to reduce the impact of functions in SQL and one that
    I demonstrate later in this chapter). While the scalar subquery cache appears
    to be a more effective optimization than that for deterministic functions, it
    is still dependant on some of the same factors (such as data type, length, and
    order) in addition to the size of the internal cache (which varies by database
    version). See *Cost-Based Oracle Fundamentals by* Jonathan Lewis *(Apress, 2005)*
    for a more in-depth description of the internal hash table that supports the scalar
    subquery cache. The fact that this hash table is quite small means that collisions
    (i.e. cache “misses”) are almost inevitable on all but the more trivial set of
    input values. Because you can’t predict when these collisions will occur, you
    should accept that you can usually derive *some* benefit by using the scalar subquery
    cache, but not of a precisely quantifiable amount.


    #### Suboptimal Data Access


    What happens when a PL/SQL function contains a SQL statement? An extremely common
    design pattern that can be found in most large database applications is that of
    SQL lookups wrapped in PL/SQL functions. In general, the principles behind such
    “getter” functions are sound (i.e. the encapsulation of common lookups, reusable
    data access methods, etc.), but the performance implications of such design decisions
    can be devastating, especially when the PL/SQL functions are called from SQL statements.


    When a SQL statement is wrapped in a PL/SQL function and called from SQL queries,
    the cost of context-switching is automatically doubled—it now occurs both inside
    and outside the function. Far more critical, however, is the fact that by wrapping
    SQL lookups in functions, the optimization choices that the CBO would otherwise
    have had if the lookup were in the main body of the calling SQL statement are
    effectively disabled. The impact that this can have on your queries’ elapsed times
    can be severe (it’s fair to say that the cost of context-switching pales into
    insignificance in these scenarios).


    Consider the example in [Listing 9-11](#Chapter09.html#list_9_11). I have a PL/SQL
    function that returns an exchange rate between two currencies for a given date.
    Note that I’ve kept this deliberately simple for the purposes of the example.


    ***Listing 9-11.** Encapsulating SQL Lookups in PL/SQL Functions (Create PL/SQL
    Function)*


    `SQL> CREATE FUNCTION get_rate(`

    `  2                  p_rate_date IN rates.rate_date%TYPE,`

    `  3                  p_from_ccy  IN rates.base_ccy%TYPE,`

    `  4                  p_to_ccy    IN rates.target_ccy%TYPE`

    `  5                  ) RETURN rates.exchange_rate%TYPE AS`

    `  6     v_rate rates.exchange_rate%TYPE;`

    `  7  BEGIN`

    `  8     SELECT exchange_rate INTO v_rate`

    `  9     FROM   rates`

    ` 10     WHERE  base_ccy   = p_from_ccy`

    ` 11     AND    target_ccy = p_to_ccy`

    ` 12     AND    rate_date  = p_rate_date;`

    ` 13     RETURN v_rate;`

    ` 14  END get_rate;`

    ` 15  /`


    `Function created.`


    In the report of sales by product and calendar year shown in [Listing 9-12](#Chapter09.html#list_9_12),
    I’ve used this function to calculate revenue in GBP as well as USD. Note that
    I’ve used Autotrace to suppress the resultset and enabled the SQL*Plus timer.


    ***Listing 9-12.** Encapsulating SQL Lookups in PL/SQL Functions (SQL with PL/SQL)*


    `SQL> SELECT t.calendar_year`

    `  2  ,      p.prod_name`

    `  3  ,      SUM(s.amount_sold)                                     AS amt_sold_usd`

    `4  ,      SUM(s.amount_sold *` **`get_rate(s.time_id, ''USD'', ''GBP'')`**`)
    AS amt_sold_gbp`

    `  5  FROM   sales     s`

    `  6  ,      products  p`

    `  7  ,      times     t`

    `  8  WHERE  s.prod_id = p.prod_id`

    `9  AND    s.time_id = t.time_id`

    ` 10  GROUP  BY`

    ` 11         t.calendar_year`

    ` 12  ,      p.prod_name`

    ` 13  ;`


    `272 rows selected.`


    **`Elapsed: 00:01:05.71`**


    The elapsed time of this query is roughly 66 seconds—a poor response time for
    an aggregate query over less than 1 million rows. The Autotrace output for this
    statement is provided in [Listing 9-13](#Chapter09.html#list_9_13).


    ***Listing 9-13.** Encapsulating SQL Lookups in PL/SQL Functions (Autotrace Output
    for SQL with PL/SQL)*


    `Statistics`

    `----------------------------------------------------------`

    **`     918848  recursive calls`**

    `         12  db block gets`

    **`    1839430  consistent gets`**

    `          0  physical reads`

    `       3196  redo size`

    `      16584  bytes sent via SQL*Net to client`

    `        449  bytes received via SQL*Net from client`

    `          2  SQL*Net roundtrips to/from client`

    `          0  sorts (memory)`

    `          0  sorts (disk)`

    `        272  rows processed`'
  trans: "\n##### 内部优化\n\n除了众多的 CBO 优化之外，Oracle 数据库还具有一系列在运行时应用的内部优化，试图揣测这些优化的行为往往徒劳无功。它们不仅可能随着数据库版本而变化，还可能取决于多种因素，其中一些您可以推导出来，而另一些则对您隐藏。\n\
    \nOracle 数据库对 `DETERMINISTIC` 函数的优化就是这样一个例子。因为根据定义，确定性函数对于特定的输入值总是返回相同的结果，所以如果遇到相同的输入，Oracle\
    \ 数据库可以避免重新执行 PL/SQL 函数。然而，这种优化的效率取决于其他因素，例如数据类型、数据长度、基数（即不同值的数量）、数据库版本，甚至环境设置（如数组提取大小）。关于这些因素如何导致函数执行次数大幅变化的精彩讨论，请参阅\
    \ Dom Brooks 在 [`http://orastory.wordpress.com`](http://orastory.wordpress.com)\
    \ 上的“[*确定性判定*]”系列文章。\n\n当 PL/SQL 函数调用被封装在标量子查询中时（一种减少函数在 SQL 中影响的常用技术，我将在本章后面演示），也会看到类似的行为。虽然标量子查询缓存似乎比确定性函数的优化更有效，但它仍然依赖于一些相同的因素（如数据类型、长度和顺序），此外还取决于内部缓存的大小（因数据库版本而异）。更深入地描述支持标量子查询缓存的内部哈希表，请参阅\
    \ Jonathan Lewis 的 *Cost-Based Oracle Fundamentals* (Apress, 2005)。这个哈希表相当小的事实意味着，除了最简单的输入值集合外，冲突（即缓存“未命中”）几乎不可避免。由于您无法预测这些冲突何时发生，因此您应该接受这样一个事实：使用标量子查询缓存通常可以获得*一些*好处，但无法精确量化其程度。\n\
    \n#### 次优数据访问\n\n当 PL/SQL 函数包含 SQL 语句时会发生什么？在大多数大型数据库应用程序中都可以找到一种极其常见的设计模式，即将\
    \ SQL 查询包装在 PL/SQL 函数中。通常，此类“getter”函数背后的原则是合理的（即封装常见查找、可重用的数据访问方法等），但此类设计决策的性能影响可能是毁灭性的，尤其是当\
    \ PL/SQL 函数从 SQL 语句中调用时。\n\n当 SQL 语句被包装在 PL/SQL 函数中并从 SQL 查询调用时，上下文切换的成本会自动加倍——现在在函数内部和外部都会发生。然而，更关键的是，通过将\
    \ SQL 查询包装在函数中，如果查询位于调用 SQL 语句的主体中，CBO 本可以拥有的优化选择实际上被禁用了。这对您的查询经过时间可能产生严重影响（可以说，在这些场景下，上下文切换的成本相形见绌）。\n\
    \n考虑 清单 9-11 中的示例。我有一个 PL/SQL 函数，它返回给定日期两种货币之间的汇率。请注意，为了示例的目的，我故意保持了简单性。\n\n***清单\
    \ 9-11.** 将 SQL 查询封装在 PL/SQL 函数中（创建 PL/SQL 函数）*\n\n```sql\nSQL> CREATE FUNCTION\
    \ get_rate(\n  2                    p_rate_date IN rates.rate_date%TYPE,\n  3\
    \                    p_from_ccy  IN rates.base_ccy%TYPE,\n  4                \
    \    p_to_ccy    IN rates.target_ccy%TYPE\n  5                    ) RETURN rates.exchange_rate%TYPE\
    \ AS\n  6     v_rate rates.exchange_rate%TYPE;\n  7  BEGIN\n  8     SELECT exchange_rate\
    \ INTO v_rate\n  9     FROM   rates\n 10     WHERE  base_ccy   = p_from_ccy\n\
    \ 11     AND    target_ccy = p_to_ccy\n 12     AND    rate_date  = p_rate_date;\n\
    \ 13     RETURN v_rate;\n 14  END get_rate;\n 15  /\nFunction created.\n```\n\n\
    在清单 9-12 所示的按产品和日历年份的销售报告中，我使用了此函数来计算以 GBP 和 USD 计价的收入。请注意，我使用了 Autotrace 来抑制结果集，并启用了\
    \ SQL*Plus 计时器。\n\n***清单 9-12.** 将 SQL 查询封装在 PL/SQL 函数中（使用 PL/SQL 的 SQL）*\n\n\
    ```sql\nSQL> SELECT t.calendar_year\n  2  ,      p.prod_name\n  3  ,      SUM(s.amount_sold)\
    \                                      AS amt_sold_usd\n  4  ,      SUM(s.amount_sold\
    \ * get_rate(s.time_id, 'USD', 'GBP')) AS amt_sold_gbp\n  5  FROM   sales    \
    \ s\n  6  ,      products  p\n  7  ,      times     t\n  8  WHERE  s.prod_id =\
    \ p.prod_id\n  9  AND    s.time_id = t.time_id\n 10  GROUP  BY\n 11         t.calendar_year\n\
    \ 12  ,      p.prod_name\n 13  ;\n\n272 rows selected.\n\nElapsed: 00:01:05.71\n\
    ```\n\n这个查询的经过时间大约是 66 秒——对于一个少于 100 万行的聚合查询来说，这是一个糟糕的响应时间。此语句的 Autotrace 输出见清单\
    \ 9-13。\n\n***清单 9-13.** 将 SQL 查询封装在 PL/SQL 函数中（使用 PL/SQL 的 SQL 的 Autotrace 输出）*\n\
    \n```sql\nStatistics\n----------------------------------------------------------\n\
    \     918848  recursive calls\n         12  db block gets\n    1839430  consistent\
    \ gets\n          0  physical reads\n       3196  redo size\n      16584  bytes\
    \ sent via SQL*Net to client\n        449  bytes received via SQL*Net from client\n\
    \          2  SQL*Net roundtrips to/from client\n          0  sorts (memory)\n\
    \          0  sorts (disk)\n        272  rows processed\n```\n"
- fmt: "## **Listing 9-14.** Encapsulating SQL Lookups in PL/SQL Functions (SQL-only\
    \ Solution)\n\n```sql\nSQL> SELECT t.calendar_year\n  2  ,      p.prod_name\n\
    \  3  ,      SUM(s.amount_sold)                 AS amt_sold_usd\n  4  ,      SUM(s.amount_sold*r.exchange_rate)\
    \ AS amt_sold_gbp\n  5  FROM   sales      s\n  6  ,      times      t\n  7  ,\
    \      products   p\n  8  ,      rates      r\n  9  WHERE  s.time_id        =\
    \ t.time_id\n 10  AND    s.prod_id        = p.prod_id\n 11  AND    r.rate_date\
    \  (+) = s.time_id\n 12  AND    r.base_ccy   (+) = 'USD'\n 13  AND    r.target_ccy\
    \ (+) = 'GBP'\n 14  GROUP  BY\n 15         t.calendar_year\n 16  ,      p.prod_name\n\
    \ 17  ;\n```\n```text\n272 rows selected.\n\nElapsed: 00:00:00.97\n```\n\nThe\
    \ performance difference is staggering! By removing the PL/SQL function and joining\
    \ directly to the `RATES` table, the response time has dropped from 66 seconds\
    \ to just 1 second.\n\n**Note:** An unusual “feature” of PL/SQL functions called\
    \ from SQL is that unhandled `NO_DATA_FOUND` exceptions silently return `NULL`\
    \ rather than propagate the error. I haven’t explicitly handled the `NO_DATA_FOUND`\
    \ exception in the `GET_RATE` function in [Listing 9-11](#Chapter09.html#list_9_11),\
    \ so my query in [Listing 9-12](#Chapter09.html#list_9_12) won’t fail, even if\
    \ the exchange rate I’m looking up doesn’t exist. Rather, the function will return\
    \ `NULL` and my query will be lossless (in terms of rows). To emulate this in\
    \ the SQL-only version of the query in [Listing 9-14](#Chapter09.html#list_9_14),\
    \ I’ve simply used an outer join to the `RATES` table.\n\nThe Autotrace statistics\
    \ for the SQL-only report are shown in [Listing 9-15](#Chapter09.html#list_9_15).\n\
    \n## **Listing 9-15.** Encapsulating SQL Lookups in PL/SQL Functions (Autotrace\
    \ Output for SQL-only Report)\n\n```text\nStatistics\n----------------------------------------------------------\n\
    \          0  recursive calls\n          0  db block gets\n       1758  consistent\
    \ gets\n          0  physical reads\n          0  redo size\n      16584  bytes\
    \ sent via SQL*Net to client\n        425  bytes received via SQL*Net from client\n\
    \          2  SQL*Net roundtrips to/from client\n          0  sorts (memory)\n\
    \          0  sorts (disk)\n        272  rows processed\n```\n\nThe Autotrace\
    \ output highlights a striking difference in the logical I/O required to satisfy\
    \ the two SQL statements. The PL/SQL function incurs a penalty of over 1.8 million\
    \ `consistent gets`. The TKProf report in [Listing 9-16](#Chapter09.html#list_9_16)\
    \ clearly shows the cost of encapsulating the rates lookup in a function.\n\n\
    ## **Listing 9-16.** Encapsulating SQL Lookups in PL/SQL Functions (tkprof Output)\n\
    \n```sql\nSELECT t.calendar_year\n,      p.prod_name\n,      SUM(s.amount_sold)\
    \                                     AS amt_sold_usd\n,      SUM(s.amount_sold\
    \ * get_rate(s.time_id, 'USD', 'GBP')) AS amt_sold_gbp\nFROM   sales      s\n\
    ,      products   p\n,      times      t\nWHERE  s.prod_id = p.prod_id\nAND  \
    \  s.time_id = t.time_id\nGROUP  BY\n       t.calendar_year\n,      p.prod_name\n\
    ```\n```text\ncall     count       cpu    elapsed       disk      query    current\
    \        rows\n------- ------  -------- ---------- ---------- ---------- ----------\
    \  ----------\nParse        1      0.00       0.00          0          0     \
    \     0           0\nExecute      1      0.00       0.00          0          0\
    \          0           0\nFetch        2    105.53     106.38          0     \
    \  1734          0         272\n------- ------  -------- ---------- ----------\
    \ ---------- ----------  ----------\n<snipped output>\n\n********************************************************************************\n\
    SQL ID: ajp04ks60kqx9 Plan Hash: 139684570\n\nSELECT EXCHANGE_RATE\nFROM\n RATES\
    \ WHERE BASE_CCY = :B3 AND TARGET_CCY = :B2 AND RATE_DATE = :B1\n\ncall     count\
    \       cpu    elapsed       disk      query    current        rows\n------- ------\
    \  -------- ---------- ---------- ---------- ----------  ----------\nParse   \
    \     0      0.00       0.00          0          0          0           0\nExecute\
    \ 918843     12.50      13.85          0          0          0           0\nFetch\
    \   918843      9.74      10.86          0    1837686          0      918843\n\
    ------- ------  -------- ---------- ---------- ---------- ----------  ----------\n\
    ```\n\nThe TKProf report shows that the SQL inside the PL/SQL function is treated\
    \ as a separate query; in this case it has accounted for all of the additional\
    \ logical I/O that the sales query generated and almost half of the additional\
    \ runtime (if you’re wondering where the remaining runtime was spent for this\
    \ example, a Hierarchical Profiler report showed that almost 59 seconds were spent\
    \ in the PL/SQL engine overall. Some 47 seconds of this PL/SQL time was accounted\
    \ for by the rates-lookup SQL itself—double that reported by the SQL trace above—meaning\
    \ that approximately 23 seconds was PL/SQL overhead). The base query itself has\
    \ incurred very little logical I/O and is in fact comparable to the SQL-only implementation.\n\
    \nThis separation highlights an important point. If the embedded SQL is treated\
    \ as a query in its own right, the CBO cannot optimize it in the context of the\
    \ outer query. The CBO is completely ignorant of what the function actually does,\
    \ so the `RATES` table does not even feature in the CBO’s decision-making. The\
    \ results, as you can see, can be catastrophic.\n\nYou can see, therefore, that\
    \ it makes good sense (from a performance perspective) to convert PL/SQL lookup\
    \ functions to SQL. If performance is critical and such lookup functions are heavily\
    \ used in your application, you are encouraged to remove them wherever possible.\
    \ There are alternative encapsulation methods that I’ll demonstrate later in this\
    \ chapter that can help you with this.\n\nHowever, I recognize that it’s not always\
    \ possible to “sweep” a legacy application to convert its SQL (it might be embedded\
    \ in many different application tiers and technologies, or the regression testing\
    \ overhead might be too prohibitive). In such cases, there are methods you can\
    \ use to reduce the costs of the PL/SQL functions and again I’ll show some of\
    \ these later.\n\n### Optimizer Difficulties\n\nMany of the examples so far have\
    \ shown PL/SQL functions called from the `SELECT` block (projection) of SQL statements\
    \ but it is equally common to see user-written functions being used in predicates.\
    \ This can give rise to a range of issues. Firstly, as I demonstrated earlier,\
    \ a PL/SQL function used in a predicate will be executed an unpredictable number\
    \ of times. Secondly, a PL/SQL function (or indeed any function) applied to an\
    \ indexed column will prevent the use of the index. Thirdly, the CBO knows very\
    \ little about PL/SQL functions as it usually has no statistics with which to\
    \ work. This can lead to suboptimal execution plans. I will concentrate on the\
    \ third issue here, as I described the first issue earlier and the second is well\
    \ understood by the Oracle DBA/developer community."
