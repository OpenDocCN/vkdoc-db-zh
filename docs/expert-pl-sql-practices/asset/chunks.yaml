- fmt: "# ILO Example\n\nWhat does the process of a diagnosing a performance problem\
    \ look like when your code is properly instrumented? Here I present a case study\
    \ from our own application development at Method R Corporation. The example comes\
    \ from work we're doing for a client that contracted us specifically because of\
    \ our commitment to delivering code that is fast now and fast later.\n\nIn many\
    \ cases, ILO is implemented through calls from an application written in Java\
    \ or another language external to the database. In this example, the application\
    \ is written in Java, but all database access is done through a PL/SQL API. Each\
    \ of the API procedures is instrumented with appropriate module and action names\
    \ using ILO.\n\nFollowing the Method R approach, the first step is identification\
    \ of the task most in need of performance improvement. Based on end user feedback,\
    \ the task in question was identified by module name: `assignment`.\n\nBecause\
    \ the code was already instrumented with ILO, the second step of measurement was\
    \ trivial. When we encountered the performance problem, there was no need to add\
    \ any sort of debugging or logging code. We used ILO to emit performance data\
    \ and turn on extended SQL tracing for the `assignment` task. After execution\
    \ of the production code in a load test, we analyzed the response time data provided\
    \ by ILO, using the following query:\n\n```sql\nSELECT\n  ilo_module,\n  ilo_action,\n\
    \  SUM(elapsed_seconds)                                    total_duration,\n \
    \ AVG(elapsed_seconds)                                    avg_duration,\n  COUNT(*)\
    \                                                cnt\nFROM ilo_run_vw\nGROUP by\
    \ ilo_module,\n         ilo_action\nORDER BY SUM(elapsed_seconds) DESC;\n```\n\
    \n```\n                                            TOTAL DURATION   AVG DURATION\
    \      \nILO_MODULE      ILO_ACTION                    (SECONDS)      (SECONDS)\
    \ COUNT\n--------------  ---------------------- -------------- --------------\
    \ -----\nassignment      SetLocationData              9.064287     0.09064287\
    \   100\nSetLocationData get_device                   8.315280     0.08315280\
    \   100\nSetLocationData get_location                 0.502014     0.00502014\
    \   100\nSetLocationData update_location              0.036686     0.00036686\
    \   100\nSetLocationData insert_reservation           0.035895     0.00035895\
    \   100\nSetLocationData update_device                0.034592     0.00034592\
    \   100\nSetLocationData merge_device                 0.031978     0.00031978\
    \   100\n```\n\nThe information provided is exactly what we need to pinpoint the\
    \ performance issue. In the results of the query, you can see that the `get_device`\
    \ procedure was the largest contributor to the response time, over 8 seconds of\
    \ a 9 second task, `SetLocationData`. With the extended SQL trace data for this\
    \ task, a profile was generated that led to `optimization` of the procedure. The\
    \ details of the optimization are omitted here to emphasize the importance of\
    \ the method.\n\nIn many cases, examining the variance in executions can be a\
    \ powerful performance analysis technique. The response time of the `get_device`\
    \ procedure was our primary concern in this case, but what if this had not been\
    \ a current performance issue? We can use Oracle's statistical analysis functions\
    \ to find tasks with the most variance, like so:\n\n```sql\nSELECT\n  ilo_module,\n\
    \  ilo_action,\n  VARIANCE(elapsed_seconds)                               variance,\n\
    \  STDDEV(elapsed_seconds)                                 standard_deviation,\n\
    \  ROUND(VARIANCE(elapsed_seconds)/AVG(elapsed_seconds),3) variance_to_mean_ratio,\n\
    \  ROUND(STDDEV(elapsed_seconds)/AVG(elapsed_seconds),3)   coefficient_of_variation\n\
    FROM ilo_run_vw\nGROUP by ilo_module,\n         ilo_action\nORDER BY 5 DESC, 3\
    \ DESC;\n```\n\n```\n                                                    STANDARD\
    \ VARIANCE TO  COEFFICIENT\nILO_MODULE      ILO_ACTION               VARIANCE\
    \  DEVIATION  MEAN RATIO OF VARIATION\n--------------  ----------------------\
    \ ---------- ---------- ----------- ------------\nSetLocationData get_location\
    \           0.00004253 0.00652182       0.008        1.299\nSetLocationData get_device\
    \             0.00033352 0.01826257       0.004        0.243\nassignment     \
    \ SetLocationData        0.00013663 0.01168871       0.002        0.129\nSetLocationData\
    \ update_location        5.8995E-09 0.00007680       0.000        0.209\nSetLocationData\
    \ insert_reservation     5.3832E-09 0.00007337       0.000        0.204\nSetLocationData\
    \ update_device          3.7374E-09 0.00006113       0.000        0.177\nSetLocationData\
    \ merge_device           7.8088E-09 0.00008837       0.000        0.276\n```\n\
    \nThe query results show that both `get_location` and `get_device` have a high\
    \ variance to mean ratio (VMR) and coefficient of variation. If these procedures\
    \ do the same amount of processing each time they are called, then the variation\
    \ in response times is an issue worth pursuing. For further explanation of statistical\
    \ analysis techniques in performance problem diagnosis, I highly recommend Robyn\
    \ Sands's work in [Chapter 13](#Chapter13.html#ch13) of *Expert Oracle Practices*\
    \ (Apress, 2010). There she explains the significance of the coefficient of variation\
    \ and variance to mean ratio calculations shown in the output above.\n\nThe following\
    \ code excerpt is just a small sample from the application that generated the\
    \ ILO data above. I have included the code here to more clearly show the simplicity\
    \ of the instrumentation.\n\n```sql\nPROCEDURE SetLocationData(…) IS\n-- code\
    \ omitted  \n\nPROCEDURE get_location(…) IS\nBEGIN\n  ilo_wrapper.begin_task(module\
    \ => 'assignment',\n                         action => 'get_location',\n     \
    \                    comment => 'P_ID=' || p_id || ' p_key=' || p_key);\n\n  \
    \  -- code omitted\n\n    ilo_wrapper.end_task(widget_count => p_data_count);\n\
    \  EXCEPTION WHEN OTHERS THEN\n    ilo_wrapper.end_task(error_num => SQLCODE);\n\
    \  END get_location;\n\n  PROCEDURE get_device() IS\n  BEGIN --get_device\n  \
    \  ilo_wrapper.begin_task(module => 'assignment', action => 'get_device');\n\n\
    \    -- code omitted\n\n    ilo_wrapper.end_task;\n  EXCEPTION WHEN OTHERS THEN\n\
    \    ilo_wrapper.end_task(error_num => SQLCODE);\n  END get_device;\n\nilo_wrapper.end_task(error_num\
    \ => status_code, widget_count => v_cnt);\n\nEXCEPTION WHEN OTHERS THEN\n  ilo_wrapper.end_task(error_num\
    \ => SQLCODE);\nEND SetLocationData;\n```\n\nThe real take-away here is that performance\
    \ optimization in general and instrumentation specifically need to become foremost\
    \ in your mindset during development. By instrumenting the code, we were able\
    \ to eliminate all the portions of the code that were irrelevant to the problem.\
    \ Knowing the true problem is the first and most important step in the solution.\n\
    \n![images](images/square.jpg) **Tip** Notice that the calls to ILO are wrapped\
    \ in an application-specific package called `ilo_wrapper`. This is a good idea.\
    \ If you use ILO or any other external library, it makes sense to abstract that\
    \ code. If changes to the API of ILO happen, then only your wrapper package needs\
    \ to change to match."
  raw: '#### ILO Example


    What does the process of a diagnosing a performance problem look like when your
    code is properly instrumented? Here I present a case study from our own application
    development at Method R Corporation. The example comes from work we''re doing
    for a client that contracted us specifically because of our commitment to delivering
    code that is fast now and fast later.


    In many cases, ILO is implemented through calls from an application written in
    Java or another language external to the database. In this example, the application
    is written in Java, but all database access is done through a PL/SQL API. Each
    of the API procedures is instrumented with appropriate module and action names
    using ILO.


    Following the Method R approach, the first step is *identification* of the task
    most in need of performance improvement. Based on end user feedback, the task
    in question was identified by module name: `assignment`.


    Because the code was already instrumented with ILO, the second step of *measurement*
    was trivial. When we encountered the performance problem, there was no need to
    add any sort of debugging or logging code. We used ILO to emit performance data
    and turn on extended SQL tracing for the `assignment` task. After execution of
    the production code in a load test, we analyzed the response time data provided
    by ILO, using the following query:


    `SELECT`

    `  ilo_module,`

    `  ilo_action,`

    `  SUM(elapsed_seconds)                                    total_duration,`

    `  AVG(elapsed_seconds)                                    avg_duration,`

    `  COUNT(*)                                                cnt`

    `FROM ilo_run_vw`

    `GROUP by ilo_module,`

    `         ilo_action`

    `ORDER BY SUM(elapsed_seconds) DESC;`


    `                                       TOTAL DURATION   AVG DURATION      `

    `ILO_MODULE      ILO_ACTION                  (SECONDS)      (SECONDS) COUNT`

    `--------------  ---------------------- -------------- -------------- -----`

    `assignment      SetLocationData              9.064287     0.09064287   100`

    `SetLocationData get_device                   8.315280     0.08315280   100`

    `SetLocationData get_location                 0.502014     0.00502014   100`

    `SetLocationData update_location              0.036686     0.00036686   100`

    `SetLocationData insert_reservation           0.035895     0.00035895   100`

    `SetLocationData update_device                0.034592     0.00034592   100`

    `SetLocationData merge_device                 0.031978     0.00031978   100`


    The information provided is exactly what we need to pinpoint the performance issue.
    In the results of the query, you can see that the get_device procedure was the
    largest contributor to the response time, over 8 seconds of a 9 second task, SetLocationData.
    With the extended SQL trace data for this task, a profile was generated that led
    to ***optimization*** of the procedure. The details of the optimization are omitted
    here to emphasize the importance of the method.


    In many cases, examining the variance in executions can be a powerful performance
    analysis technique. The response time of the get_device procedure was our primary
    concern in this case, but what if this had not been a current performance issue?
    We can use Oracle''s statistical analysis functions to find tasks with the most
    variance, like so:


    `SELECT`

    `  ilo_module,`

    `  ilo_action,`

    `  VARIANCE(elapsed_seconds)                               variance,`

    `  STDDEV(elapsed_seconds)                                 standard_deviation,`

    `  ROUND(VARIANCE(elapsed_seconds)/AVG(elapsed_seconds),3) variance_to_mean_ratio,`

    `  ROUND(STDDEV(elapsed_seconds)/AVG(elapsed_seconds),3)   coefficient_of_variation`

    `FROM ilo_run_vw`

    `GROUP by ilo_module,`

    `         ilo_action`

    `ORDER BY 5 DESC, 3 DESC;`


    `                                                    STANDARD VARIANCE TO  COEFFICIENT`

    `ILO_MODULE      ILO_ACTION               VARIANCE  DEVIATION  MEAN RATIO OF VARIATION`

    `--------------  ---------------------- ---------- ---------- ----------- ------------`

    `SetLocationData get_location           0.00004253 0.00652182       0.008        1.299`

    `SetLocationData get_device             0.00033352 0.01826257       0.004        0.243`

    `assignment      SetLocationData        0.00013663 0.01168871       0.002        0.129`

    `SetLocationData update_location        5.8995E-09 0.00007680       0.000        0.209`


    `SetLocationData insert_reservation     5.3832E-09 0.00007337       0.000        0.204`

    `SetLocationData update_device          3.7374E-09 0.00006113       0.000        0.177`

    `SetLocationData merge_device           7.8088E-09 0.00008837       0.000        0.276`


    The query results show that both get_location and get_device have a high variance
    to mean ratio (VMR) and coefficient of variation. If these procedures do the same
    amount of processing each time they are called, then the variation in response
    times is an issue worth pursuing. For further explanation of statistical analysis
    techniques in performance problem diagnosis, I highly recommend Robyn Sands''s
    work in [Chapter 13](#Chapter13.html#ch13) of *Expert Oracle Practices* (Apress,
    2010). There she explains the significance of the coefficient of variation and
    variance to mean ratio calculations shown in the output above.


    The following code excerpt is just a small sample from the application that generated
    the ILO data above. I have included the code here to more clearly show the simplicity
    of the instrumentation.


    `PROCEDURE SetLocationData(…) IS`


    `-- code omitted  `


    `PROCEDURE get_location(…) IS`

    `BEGIN`

    `  ilo_wrapper.begin_task(module => ''assignment'',`

    `                         action => ''get_location'',`

    `                         comment => ''P_ID='' || p_id || '' p_key='' || p_key);`


    `    -- code omitted`


    `    ilo_wrapper.end_task(widget_count => p_data_count);`

    `  EXCEPTION WHEN OTHERS THEN`

    `    ilo_wrapper.end_task(error_num => SQLCODE);`

    `  END get_location;`


    `  PROCEDURE get_device() IS`

    `  BEGIN --get_device`

    `    ilo_wrapper.begin_task(module => ''assignment'', action => ''get_device'');`


    `    -- code omitted`


    `    ilo_wrapper.end_task;`

    `  EXCEPTION WHEN OTHERS THEN`

    `    ilo_wrapper.end_task(error_num => SQLCODE);`

    `  END get_device;`


    `ilo_wrapper.end_task(error_num => status_code, widget_count => v_cnt);`


    `EXCEPTION WHEN OTHERS THEN`

    `  ilo_wrapper.end_task(error_num => SQLCODE);`

    `END SetLocationData;`


    The real take-away here is that performance optimization in general and instrumentation
    specifically need to become foremost in your mindset during development. By instrumenting
    the code, we were able to eliminate all the portions of the code that were irrelevant
    to the problem. Knowing the true problem is the first and most important step
    in the solution.


    ![images](images/square.jpg) **Tip** Notice that the calls to ILO are wrapped
    in an application-specific package called ilo_wrapper. This is a good idea. If
    you use ILO or any other external library, it makes sense to abstract that code.
    If changes to the API of ILO happen, then only your wrapper package needs to change
    to match.'
  trans: "\n# ILO 示例\n\n当你的代码被正确插桩时，诊断性能问题的过程是怎样的？这里我展示一个来自我们在 Method R 公司自身应用开发中的案例研究。这个例子源于我们正在为一个客户所做的工作，该客户专门因为我们承诺交付现在和未来都快速的代码而与我们签约。\n\
    \n在许多情况下，ILO 是通过用 Java 或其他数据库外部语言编写的应用程序调用来实现的。在这个例子中，应用程序是用 Java 编写的，但所有数据库访问都是通过一个\
    \ PL/SQL API 完成的。每个 API 过程都使用 ILO，通过适当的模块和操作名称进行了插桩。\n\n遵循 Method R 的方法，第一步是确定最需要性能改进的任务。根据最终用户的反馈，相关任务通过模块名称`assignment`被确定。\n\
    \n因为代码已经用 ILO 进行了插桩，所以第二步的测量变得微不足道。当我们遇到性能问题时，无需添加任何调试或日志记录代码。我们使用 ILO 为`assignment`任务发出性能数据并开启扩展\
    \ SQL 跟踪。在负载测试中执行生产代码后，我们使用以下查询分析了由 ILO 提供的响应时间数据：\n\n```sql\nSELECT\n  ilo_module,\n\
    \  ilo_action,\n  SUM(elapsed_seconds)                                    total_duration,\n\
    \  AVG(elapsed_seconds)                                    avg_duration,\n  COUNT(*)\
    \                                                cnt\nFROM ilo_run_vw\nGROUP by\
    \ ilo_module,\n         ilo_action\nORDER BY SUM(elapsed_seconds) DESC;\n```\n\
    \n```\n                                            TOTAL DURATION   AVG DURATION\
    \      \nILO_MODULE      ILO_ACTION                    (SECONDS)      (SECONDS)\
    \ COUNT\n--------------  ---------------------- -------------- --------------\
    \ -----\nassignment      SetLocationData              9.064287     0.09064287\
    \   100\nSetLocationData get_device                   8.315280     0.08315280\
    \   100\nSetLocationData get_location                 0.502014     0.00502014\
    \   100\nSetLocationData update_location              0.036686     0.00036686\
    \   100\nSetLocationData insert_reservation           0.035895     0.00035895\
    \   100\nSetLocationData update_device                0.034592     0.00034592\
    \   100\nSetLocationData merge_device                 0.031978     0.00031978\
    \   100\n```\n\n所提供的信息正是我们定位性能问题所需要的。在查询结果中，你可以看到`get_device`过程是响应时间的最大贡献者，在 9\
    \ 秒的`SetLocationData`任务中占了超过 8 秒。借助此任务的扩展 SQL 跟踪数据，生成了一个性能剖析，进而导向了该过程的`优化`。此处省略优化的细节，以强调该方法的重要性。\n\
    \n在许多情况下，检查执行时间的差异可能是一种强大的性能分析技术。`get_device`过程的响应时间是本案例中我们主要关注点，但如果这不是一个当前的性能问题呢？我们可以使用\
    \ Oracle 的统计分析函数来查找差异最大的任务，如下所示：\n\n```sql\nSELECT\n  ilo_module,\n  ilo_action,\n\
    \  VARIANCE(elapsed_seconds)                               variance,\n  STDDEV(elapsed_seconds)\
    \                                 standard_deviation,\n  ROUND(VARIANCE(elapsed_seconds)/AVG(elapsed_seconds),3)\
    \ variance_to_mean_ratio,\n  ROUND(STDDEV(elapsed_seconds)/AVG(elapsed_seconds),3)\
    \   coefficient_of_variation\nFROM ilo_run_vw\nGROUP by ilo_module,\n        \
    \ ilo_action\nORDER BY 5 DESC, 3 DESC;\n```\n\n```\n                         \
    \                           STANDARD VARIANCE TO  COEFFICIENT\nILO_MODULE    \
    \  ILO_ACTION               VARIANCE  DEVIATION  MEAN RATIO OF VARIATION\n--------------\
    \  ---------------------- ---------- ---------- ----------- ------------\nSetLocationData\
    \ get_location           0.00004253 0.00652182       0.008        1.299\nSetLocationData\
    \ get_device             0.00033352 0.01826257       0.004        0.243\nassignment\
    \      SetLocationData        0.00013663 0.01168871       0.002        0.129\n\
    SetLocationData update_location        5.8995E-09 0.00007680       0.000     \
    \   0.209\nSetLocationData insert_reservation     5.3832E-09 0.00007337      \
    \ 0.000        0.204\nSetLocationData update_device          3.7374E-09 0.00006113\
    \       0.000        0.177\nSetLocationData merge_device           7.8088E-09\
    \ 0.00008837       0.000        0.276\n```\n\n查询结果显示，`get_location`和`get_device`两者都具有较高的方差与均值比率(VMR)和变异系数。如果这些过程每次调用执行的工作量相同，那么响应时间的差异就是一个值得深究的问题。关于在性能问题诊断中统计分析技术的进一步解释，我强烈推荐\
    \ Robyn Sands 在*Expert Oracle Practices*（Apress，2010）一书第 13 章中的工作。她在其中解释了上述输出中所示的变异系数和方差与均值比率计算的重要性。\n\
    \n以下代码摘录只是生成上述 ILO 数据的应用程序中的一小部分样本。我将代码放在这里是为了更清楚地展示插桩的简洁性。\n\n```sql\nPROCEDURE\
    \ SetLocationData(…) IS\n-- code omitted  \n\nPROCEDURE get_location(…) IS\nBEGIN\n\
    \  ilo_wrapper.begin_task(module => 'assignment',\n                         action\
    \ => 'get_location',\n                         comment => 'P_ID=' || p_id || '\
    \ p_key=' || p_key);\n\n    -- code omitted\n\n    ilo_wrapper.end_task(widget_count\
    \ => p_data_count);\n  EXCEPTION WHEN OTHERS THEN\n    ilo_wrapper.end_task(error_num\
    \ => SQLCODE);\n  END get_location;\n\n  PROCEDURE get_device() IS\n  BEGIN --get_device\n\
    \    ilo_wrapper.begin_task(module => 'assignment', action => 'get_device');\n\
    \n    -- code omitted\n\n    ilo_wrapper.end_task;\n  EXCEPTION WHEN OTHERS THEN\n\
    \    ilo_wrapper.end_task(error_num => SQLCODE);\n  END get_device;\n\nilo_wrapper.end_task(error_num\
    \ => status_code, widget_count => v_cnt);\n\nEXCEPTION WHEN OTHERS THEN\n  ilo_wrapper.end_task(error_num\
    \ => SQLCODE);\nEND SetLocationData;\n```\n\n这里真正的关键点是，性能优化，尤其是插桩，需要在你开发过程中的思维方式里占据首要位置。通过对代码进行插桩，我们能够排除所有与问题无关的代码部分。了解真正的问题是解决方案中最首要也是最重要的一步。\n\
    \n![images](img/square.jpg) **提示** 注意，对 ILO 的调用被包裹在一个名为`ilo_wrapper`的特定于应用程序的包中。这是一个好主意。如果你使用\
    \ ILO 或任何其他外部库，将该代码抽象出来是合理的。如果 ILO 的 API 发生变化，那么只需要更改你的包装器包即可与之匹配。\n"
- fmt: "#### Profiling Example\n\nWhat does the process of profiling look like in\
    \ practice? Here's an example that I executed in SQL*Plus to answer the same question\
    \ I asked earlier: Why is program `p` slow? This time I'll use ILO for instrumentation\
    \ instead of `DBMS_OUTPUT.PUT_LINE`.\n\n```sql\nCREATE OR REPLACE PROCEDURE q\
    \ AS\n  l_sqlcode NUMBER;\n  l_sqlerrm VARCHAR2(512);\nBEGIN\n  ilo_task.begin_task(module\
    \ => 'Procedure P',\n                      action => 'q');\n  FOR rec IN (SELECT\
    \ * FROM V$SESSION) LOOP\n    NULL;\n  END LOOP;\n  ilo_task.end_task;\nEXCEPTION\
    \ WHEN OTHERS THEN\n  l_sqlcode := SQLCODE;\n  l_sqlerrm := SQLERRM;\n  ilo_task.end_task(error_num\
    \ => l_sqlcode);\n  -- handle exceptions here\nEND;\n/\n```\n\n```sql\nCREATE\
    \ OR REPLACE PROCEDURE r AS\n  l_sqlcode NUMBER;\n  l_sqlerrm VARCHAR2(512);\n\
    BEGIN\n  ilo_task.begin_task(module => 'Procedure P',\n                      action\
    \ => 'r');\n  FOR rec IN (SELECT * FROM ALL_OBJECTS) LOOP\n    NULL;\n  END LOOP;\n\
    \  ilo_task.end_task;\nEXCEPTION WHEN OTHERS THEN\n  l_sqlcode := SQLCODE;\n \
    \ l_sqlerrm := SQLERRM;\n  ilo_task.end_task(error_num => l_sqlcode);\n  -- handle\
    \ exceptions here\nEND;\n/\n```\n\n```sql\nCREATE OR REPLACE PROCEDURE s AS\n\
    \  l_sqlcode NUMBER;\n  l_sqlerrm VARCHAR2(512);\nBEGIN\n  ilo_task.begin_task(module\
    \ => 'Procedure P',\n                      action => 's');\n  FOR rec IN (SELECT\
    \ * FROM USER_TABLES) LOOP\n    NULL;\n  END LOOP;\n  ilo_task.end_task;\nEXCEPTION\
    \ WHEN OTHERS THEN\n  l_sqlcode := SQLCODE;\n  l_sqlerrm := SQLERRM;\n  ilo_task.end_task(error_num\
    \ => l_sqlcode);\n  -- handle exceptions here\nEND;\n/\n```\n\n```sql\nCREATE\
    \ OR REPLACE PROCEDURE p AS\n  l_sqlcode NUMBER;\n  l_sqlerrm VARCHAR2(512);\n\
    BEGIN\n  ilo_task.begin_task(module => 'Month End Posting',\n                \
    \      action => 'p');\n  q;\n  r;\n  s;\n  ilo_task.end_task;\nEXCEPTION WHEN\
    \ OTHERS THEN\n  l_sqlcode := SQLCODE;\n  l_sqlerrm := SQLERRM;\n  ilo_task.end_task(error_num\
    \ => l_sqlcode);\n  -- handle exceptions here\n  raise;\nEND;\n/\n```\n\n```sql\n\
    DELETE FROM ilo_run WHERE ilo_module IN ('Month End Posting', 'Procedure P');\n\
    ```\n\n```sql\nEXEC ilo_timer.set_mark_all_tasks_interesting(true,true);\n```\n\
    \n```sql\nEXEC p;\n```\n\n```sql\nEXEC ilo_timer.flush_ilo_runs;\n```\n\n```sql\n\
    set pages 1000\nCOLUMN ILO_MODULE FORMAT A20\nCOLUMN ILO_ACTION FORMAT A10\nSELECT\
    \ ILO_MODULE, ILO_ACTION, ELAPSED_SECONDS\nFROM ilo_run_vw WHERE ilo_module IN\
    \ ('Month End Posting', 'Procedure P') ORDER BY 3 DESC;\n```\n\n```\nILO_MODULE\
    \           ILO_ACTION ELAPSED_SECONDS\n-------------------- ---------- ---------------\n\
    Month End Posting    p                 8.566376\nProcedure P          r      \
    \           8.418068\nProcedure P          s                  .135682\nProcedure\
    \ P          q                  .005708\n```\n\nThe results of the query in the\
    \ SQL*Plus script show me exactly where my time was spent, associated with each\
    \ business task, identified by module and action name. The query results are a\
    \ profile (assuming that I know the hierarchical relationship of the procedures\
    \ and the first row returned represents the total line that usually displays at\
    \ the bottom instead), so I can easily see that if my goal is optimizing response\
    \ time, procedure `r` needs my attention.\n\nIn addition to storing the elapsed\
    \ time information in the database, ILO turned on extended SQL tracing so a trace\
    \ file was generated. Oracle's trace data stream allows me to drill down into\
    \ procedure `p` to see all of the database and system calls made that comprised\
    \ the response time. Since the module and action names are emitted in the trace\
    \ file as well, I'm also able to drill down specifically into calls corresponding\
    \ just to procedure `r`.\n\nFirst, I would like to see where my response time\
    \ went for each module/action pair. Summarizing the response time data in the\
    \ trace file looks like this:\n\n```\nModule:Action        DURATION       %  CALLS\
    \      MEAN       MIN       MAX\n-------------------  --------  ------  -----\
    \  --------  --------  --------\nProcedure P:r        8.332521   98.4%    545\
    \  0.015289  0.000000  1.968123\nProcedure P:s        0.132008    1.6%      4\
    \  0.033002  0.000000  0.132008\nProcedure P:q        0.000000    0.0%     16\
    \  0.000000  0.000000  0.000000\nMonth End Posting:p  0.000000    0.0%     66\
    \  0.000000  0.000000  0.000000\nSQL*Plus:            0.000000    0.0%      2\
    \  0.000000  0.000000  0.000000\n-------------------  --------  ------  -----\
    \  --------  --------  --------\nTOTAL (5)            8.464529  100.0%    633\
    \  0.013372  0.000000  1.968123\n```\n\nIn this profile, the data shown for parent\
    \ procedure `p` does not include any of the response time contributions of the\
    \ children. The total elapsed time represented in the trace file is about 8.46\
    \ seconds. That doesn't exactly match the values shown in my ILO query, but that's\
    \ not a problem because the numbers are close enough for my analysis. For more\
    \ information about the reasons for the difference, see `Optimizing Oracle Performance`\
    \ (O'Reilly, 2003).\n\n![images](images/square.jpg) **Note** In this example I\
    \ am using `mrskew` from the MR Tools suite sold by Method R Corporation to generate\
    \ the summary information. Oracle's `tkprof` and Trace Analyzer tools do provide\
    \ some aggregation, but they don't provide the profile that you need.\n\nNext,\
    \ I would like to see where the time was spent while executing just procedure\
    \ `r`. To do this, I'll drill down into the trace file data, summarizing only\
    \ the calls executed while module and action were set to Month End Posting and\
    \ `r` respectively:\n\n```\nCall        DURATION       %  CALLS      MEAN    \
    \   MIN       MAX\n----------  --------  ------  -----  --------  --------  --------\n\
    FETCH       8.332521  100.0%    542  0.015374  0.000000  1.968123\nPARSE     \
    \  0.000000    0.0%      1  0.000000  0.000000  0.000000\nCLOSE       0.000000\
    \    0.0%      1  0.000000  0.000000  0.000000\nEXEC        0.000000    0.0% \
    \     1  0.000000  0.000000  0.000000\n----------  --------  ------  -----  --------\
    \  --------  --------\nTOTAL (4)   8.332521  100.0%    545  0.015289  0.000000\
    \  1.968123\n```\n\nNow I see clearly what the database is doing during the 8.33\
    \ seconds of time spent. All of the time was spent in the `FETCH` database call.\
    \ That's not really surprising, since all `r` does is execute a single query of\
    \ `ALL_OBJECTS`. But the value is still here—I know where the time is spent. But\
    \ the trace file contains a lot more detail than this, so drilling down further\
    \ can provide valuable insight. I would like to know which lines in the trace\
    \ file represent the largest time contributions to my `r` procedure. Are all the\
    \ `FETCH` calls the same duration? Here's the answer to that question (again provided\
    \ by `mrskew`):\n\n```\nLine Number  DURATION       %  CALLS      MEAN       MIN\
    \       MAX\n-----------  --------  ------  -----  --------  --------  --------\n\
    \       4231  1.968123   23.6%      1  1.968123  1.968123  1.968123\n       2689\
    \  0.380023    4.6%      1  0.380023  0.380023  0.380023\n       4212  0.316020\
    \    3.8%      1  0.316020  0.316020  0.316020\n       4233  0.304019    3.6%\
    \      1  0.304019  0.304019  0.304019\n       2695  0.156010    1.9%      1 \
    \ 0.156010  0.156010  0.156010\n        281  0.144009    1.7%      1  0.144009\
    \  0.144009  0.144009\n        362  0.100007    1.2%      1  0.100007  0.100007\
    \  0.100007\n        879  0.064004    0.8%      1  0.064004  0.064004  0.064004\n\
    \       1348  0.056003    0.7%      1  0.056003  0.056003  0.056003\n       2473\
    \  0.052003    0.6%      1  0.052003  0.052003  0.052003\n 532 others  4.792300\
    \   57.5%    532  0.009008  0.000000  0.044003\n-----------  --------  ------\
    \  -----  --------  --------  --------\nTOTAL (542)  8.332521  100.0%    542 \
    \ 0.015374  0.000000  1.968123\n```"
