    cursor(select doc_id, text from documents)\n)\n)\n);\n```\n\n```\nCOUNT(*)\n----------------------\n\
    1132707\n```\n\n```sql\nselect * from v$pq_sesstat;\n```\n\n```\nSTATISTIC   \
    \                   LAST_QUERY             SESSION_TOTAL\n------------------------------\
    \ ---------------------- ----------------------\nQueries Parallelized        \
    \   0                      0\nDML Parallelized               0               \
    \       0\nDDL Parallelized               0                      0\nDFO Trees\
    \                      0                      0\nServer Threads              \
    \   0                      0\nAllocation Height              0               \
    \       0\nAllocation Width               0                      0\nLocal Msgs\
    \ Sent                0                      0\nDistr Msgs Sent              \
    \  0                      0\nLocal Msgs Recv'd              0                \
    \      0\nDistr Msgs Recv'd              0                      0\n```\n\nSo now\
    \ that you have your Map function, how do you get it to run in parallel using\
    \ PL/SQL pipelined functions? The answer is the `PARALLEL_ENABLE` construct on\
    \ the function declaration.\n\n```sql\ncreate or replace package map_letter_count\
    \ as\n  function result_set (p_documents in sys_refcursor)\n    return map_reduce_type.key_value_pairs\
    \ pipelined\n      parallel_enable (partition p_documents by any);\nend map_letter_count;\n\
    /\n```\n\n`PARALLEL_ENABLE` tells Oracle that the PL/SQL function can be run in\
    \ parallel against chunks of data. In order to provide those chunks to the parallel\
    \ instances of the function, you need to define a data set in the form of a cursor\
    \ (here, you use a generic `sys_refcursor`). You tell the database to “shard”\
    \ or “split” the data by using the `PARTITION` option for the `PARALLEL_ENABLE`\
    \ parameter. The `BY ANY` clause tells the database that you don't care how the\
    \ data is split up, just to pick reasonably equal sized subsets of the data.\n\
    \nYou then modify your Map function to retrieve each item from its assigned subset\
    \ (by `FETCH`ing from the cursor) and the process each item into the target key/value\
    \ pair.\n\n```sql\ncreate or replace package body map_letter_count as\n\n  function\
    \ result_set (p_documents in sys_refcursor)\n    return map_reduce_type.key_value_pairs\
    \ pipelined\n    parallel_enable (partition p_documents by any) is\n\n    type\
    \ document_type is record (\n      doc_id number,\n      text   varchar2(4000)\n\
    \    );\n    l_document       document_type;\n    l_key_value_pair map_reduce_type.key_value_pair;\n\
    \n    begin\n\n      fetch p_documents into l_document;\n      loop\n        exit\
    \ when p_documents%notfound;\n\n        for i in 1..length(l_document.text) loop\n\
