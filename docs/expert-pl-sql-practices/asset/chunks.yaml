    \ `GetEmployeeData` 过程所做的唯一更改确保了它将继续保持其一贯的行为。下一步是合并请求的功能更改，并通过部门提供具有多个电话号码的员工数据。为此，您将创建一个新过程\
    \ `GetEmployeeData_MultiPhoneNo`，如清单 12-10 所示。清单 12-11 随后展示了如何测试这个新过程。\n\n![images](images/square.jpg)\
