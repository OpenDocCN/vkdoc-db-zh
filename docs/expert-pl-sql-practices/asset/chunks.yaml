    `Photo                                    10        13.9`

    `Electronics                              13        18.1`

    `Peripherals and Accessories              21        29.2`

    `Software/Other                           26        36.1`


    You can see a range of selectivity in this data, so a default statistics solution
    wouldn’t be flexible enough to cover all categories. Therefore, you can use the
    Extensible Optimizer to build a dynamic statistics parser for this function predicate.
    As stated earlier, this is implemented using an object type, the specification
    for which is provided in [Listing 9-54](#Chapter09.html#list_9_54).


    ***Listing 9-54.** Creating a Statistics Type for the Extensible Optimiser*


    `SQL> CREATE TYPE prod_stats_ot AS OBJECT (`

    `  2  `

    `  3     dummy_attribute NUMBER,`

    `  4`

    `5     STATIC FUNCTION ODCIGetInterfaces (`

    `  6                     p_interfaces OUT SYS.ODCIObjectList`

    `  7                     ) RETURN NUMBER,`

    `  8  `

    `  9     STATIC FUNCTION ODCIStatsSelectivity (`

    ` 10                     p_pred_info      IN  SYS.ODCIPredInfo,`

    ` 11                     p_selectivity    OUT NUMBER,`

    ` 12                     p_args           IN  SYS.ODCIArgDescList,`

    ` 13                     p_start          IN  VARCHAR2,`

    ` 14                     p_stop           IN  VARCHAR2,`

    **` 15                     p_prod_category  IN  VARCHAR2,`**

    ` 16                     p_env            IN  SYS.ODCIEnv`

    ` 17                     ) RETURN NUMBER,`

    ` 18  `

    ` 19     STATIC FUNCTION ODCIStatsFunctionCost (`

    ` 20                     p_func_info      IN  SYS.ODCIFuncInfo,`

    ` 21                     p_cost           OUT SYS.ODCICost,`

    ` 22                     p_args           IN  SYS.ODCIArgDescList,`

    **` 23                     p_prod_category  IN  VARCHAR2,`**

    ` 24                     p_env            IN  SYS.ODCIEnv`

    ` 25                     ) RETURN NUMBER`

    ` 26  );`

    ` 27  /`


    `Type created.`


    The Extensible Optimizer uses well-defined interface methods and [Listing 9-54](#Chapter09.html#list_9_54)
    uses the three that are needed to generate selectivity and cost statistics. You
    must use the exact method names that Oracle prescribes, as I have done.


    The parameter data types and order are also prescribed by the Extensible Optimizer,
    although you can use parameter names of your own choosing, with one notable exception.
    You must include the same parameter names in your type methods that you have in
    the PL/SQL function(s) that will eventually be associated with the statistics
    type. In my case, the `FORMAT_PROD_CATEGORY` function that I am building this
    statistics type for has a single parameter named p_prod_category (so I’ve included
    this in the relevant methods).


    The type body implements the statistics type and can include any logic you like
    that enables the CBO to determine the selectivity and cost of your associated
    PL/SQL function(s). The type body for the `PROD_STATS_OT.ODCIStatsSelectivity`
    method is provided in [Listing 9-55](#Chapter09.html#list_9_55) (the remaining
    methods are available from the Apress web site).


