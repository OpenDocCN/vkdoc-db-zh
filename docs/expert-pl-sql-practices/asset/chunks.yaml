  trans: "\n### 动态代码\n\n动态 SQL 可能为 SQL 或语句注入敞开大门。使用编码模板有助于强制使用绑定变量，这是应对此类威胁的解决方案之一。下面的示例展示了通过拼接字符串（其中一个是最终用户提供的，例如作为参数）来构建并执行语句可能存在危险。\n\
    \n假设有一个在图书馆注册图书预约的模块。它可能包含一些动态代码，例如因为数据要插入的表取决于图书的类型。它可能如下所示：\n\n```sql\nl_statement\
    \ := 'BEGIN'\n             ||'  INSERT INTO book_reservations ('\n           \
    \  ||'              res_date'\n             ||'             ,res_book_id'\n  \
    \           ||'              )'\n             ||'      VALUES ('\n           \
    \  ||               SYSDATE\n             ||'             ,'\n             ||\
    \               p_book_id\n             ||'             );'\n             ||'END;'\n\
    \             ;\nEXECUTE IMMEDIATE l_statement;\n```\n\n系统只是要求用户输入请求的图书 ID。对于一个善意且规范的用户，生成的语句将如下所示，其中\
    \ \"123456\" 是给定的输入：\n\n```sql\nBEGIN\n  INSERT INTO book_reservations (\n   \
    \           res_date\n             ,res_book_id\n              )\n\n      VALUES\
    \ (\n              SYSDATE\n             ,123456\n              );\nEND;\n```\n\
    \n但是，如果最终用户怀有恶意，他或她可以利用相同的输入注入恶意代码。输入 \"123456); delete from books where (1=1\"\
    ，生成的语句就变成了这样：\n\n```sql\nBEGIN\n  INSERT INTO book_reservations (\n          \
    \    res_date\n             ,res_book_id\n              )\n      VALUES (\n  \
    \            SYSDATE\n             ,123456\n              );\n  DELETE FROM books\
    \ where (1=1);\nEND;\n```\n\n那么要执行的操作就会由两条语句组成：一条无害的语句，后面跟着一条清空表的极其恶意的指令。\n\n\
    以下是使用绑定变量重写的代码。使用绑定变量可以防止任何用户输入的字符串被解释为语句本身的一部分。SQL 或语句注入的风险得以消除。\n\n```sql\n\
    l_statement := 'BEGIN'\n             ||'  INSERT INTO book_reservations ('\n \
    \            ||'              res_date'\n             ||'             ,res_book_id'\n\
    \             ||'              )'\n             ||'      VALUES (:p_date'\n  \
    \           ||'             ,:p_book_id'\n             ||'             );'\n \
    \            ||'END;'\n             ;\nEXECUTE IMMEDIATE l_statement\n  USING\
    \ IN SYSDATE\n       ,IN p_requested_book_id\n       ;\n```\n\n### 包\n\n尽管可以在数据库中编译独立的存储过程和函数，但在一个庞大、扁平的列表中搜索单个模块很快会变成一场噩梦。相反，使用包（package）按语义字段或用途对过程和函数进行分组。扫描一个命名正确且很可能包含你所需内容的包，比扫描整个方案中所有函数和过程的列表要快得多。\n\
    \n将直接处理数据的 `内核` 包与负责 `用户界面` 的包分开。这不仅有助于管理和使用，还能让你精细调整执行权限，例如对接口包拥有广泛访问权限，对用作 API\
    \ 的内核包拥有更受限的访问权限，而对应用程序的核心部分则完全没有访问权限。\n\n使用大写字母（避免使用双引号包围对象名，使其区分大小写）和有意义的名称来命名你的包。使用前缀来指示包包含的模块类型。例如，你可以使用以下前缀：\n\
    \n> `KNL_` 用于包含内核模块的包。\n> \n> `GUI_` 用于包含处理用户界面的模块的包。\n\n你的包名可能如下所示：\n\n> `PACKAGE\
    \ KNL_BOOKS;` 用于包含处理图书的模块的包。\n> \n> `PACKAGE GUI_LIBRARY;` 用于包含处理图书馆用户界面的模块的包。\n\
    \n### 存储过程\n\n存储过程（独立的或在包中的）应被视为执行给定任务的黑盒子。术语“黑盒子”意味着它们应该能处理任何类型的输入（有效或无效的），然后完成其工作，或者在出错时使数据库保持与调用时相同的状态。通常你希望过程能报告在完成工作的过程中遇到的任何问题。\n\
    \n最好让一个过程专注于一项单一任务。这是应用程序良好模块化的基础。拥有多个可以当作基础构件来使用和重用的小模块，比拥有少数庞大而笨重、难以重用的大模块要好。\n\
    \n不同类型的任务可以分离如下：检索记录、检查信息、插入或修改数据，由内核或 API 包处理；为用户界面生成显示内容，由接口包处理。\n\n接下来，我将向你展示一种根据存储过程所执行的任务类型为其命名的方法。这种过程命名策略，结合包分离命名策略，将确保源代码更易于理解。此外，它还可以作为良好模块化的指南。\n\
    \n#### 命名\n\n使用大写字母和有意义的名称。使用一个表示过程类型的前缀（这里的 `$` 符号是一个装饰性元素，用于在视觉上与包名区分开，并将类型前缀与名称分开）。例如，以下是一些前缀示例：\n\
    \n> `CHK$` 用于检查数据的过程。\n> \n> `GET$` 用于从数据库检索信息或进行计算的过程。\n> \n> `EXE$` 用于插入、修改或删除数据的过程。\n\
    > \n> `DSP$` 用于在用户界面中显示信息的过程。\n\n以下是一些使用上述前缀列表开发的实际过程名称：\n\n> `PROCEDURE CHK$BOOK_AVAILABITLIY;`\
    \ 用于检查图书可用性的过程。\n> \n> `PROCEDURE GET$BOOK_AUTHOR;` 用于检索图书作者的过程。\n> \n> `PROCEDURE\
    \ EXE$STORE_BOOK;` 用于存储图书数据的过程。\n> \n> `PROCEDURE DSP$BOOK_INFO;` 用于在用户界面中显示图书信息的过程。\n\
    \n同时，养成在声明结束的 `END` 之后添加一个重复过程名称的注释的习惯。这样做可以简化阅读包含长模块列表的包的任务，正如你在这里看到的：\n\n```sql\n\
    PROCEDURE CHK$TITLE_LENGTH (\n                      p_title                  \
    \    IN          VARCHAR2\n                     ) IS\nBEGIN\n  ...\nEND; -- CHK$TITLE_LENGTH\n\
    ```\n"
- fmt: "## Parameters\n\nUse lower case and the prefix `p_` to name parameters. It\
    \ is then easier to distinguish them from local variables within the body of the\
    \ procedure. Use one line per parameter and a fixed distance between the names,\
    \ the in/out attribute, type, and the default assignment value, like so:\n\n```sql\n\
    PROCEDURE GET$BOOK_AUTHOR (\n                      p_book_id              IN \
    \     NUMBER   := NULL\n                    , p_book_title           IN      VARCHAR2\
    \ := NULL\n                    , p_author               OUT     VARCHAR2\n   \
    \                 );\n```\n\nNotice how using one line per parameter makes the\
    \ code easy to read. It is also easy add or remove one parameter if necessary,\
    \ specially when the comma is at the beginning of each line.\n\n![images](images/square.jpg)\
    \ `Note` I also recommend that you specify `NULL`s as your default parameter values.\
    \ Otherwise, it can be difficult to know whether a given parameter value was actually\
    \ passed or whether it was left at its default. If a parameter defaults to `X`,\
    \ and the value in a given procedure call is indeed `X`, your code has no way\
    \ to know whether that value `X` was passed to the procedure or whether the parameter\
    \ defaulted. Should you need a non null default value, there's always time to\
    \ use a good old `NVL` later on when using the parameter.\n\n## Calls\n\nAlways\
    \ prefix the procedure name with its package name, even when calling a procedure\
    \ within the same package. It eases reading and debugging and makes the relocation\
    \ of a piece of code into another package a piece of cake.\n\nAlways use the `=>`\
    \ syntax to pass parameter values. List parameters one value to the line. The\
    \ `=>` syntax makes the call unambiguous regarding the ordering of parameters;\
    \ each parameter receives the value it is intended to receive. Moreover, the syntax\
    \ also avoids any ambiguity when calling overloaded modules (some call them polymorphic\
    \ modules). Here's an example:\n\n```sql\nKNL_BOOKS.GET$BOOK_AUTHOR (\n      \
    \                p_book_id    => 123456\n                    , p_author     =>\
    \ l_author\n                    );\n```\n\n## Local Variables\n\nUse lower case\
    \ and the prefix `l_` to name local variables. It is then easier to distinguish\
    \ them from parameters within the body of the procedure. Use one line per declaration\
    \ and a fixed distance between the names and the types, like so:\n\n```sql\nl_author\
    \                                                VARCHAR2(50);\n```\n\n## Constants\n\
    \nUse upper case and the prefix `C_` to name your constants, like so:\n\n```sql\n\
    C_TITLE_HEADER                                          CONSTANT VARCHAR2(50)\
    \ := 'Title';\n```\n\nCreate a constant as soon as a value (a string or a number)\
    \ is used at more than one place in the code. In other words, avoid hardcoded\
    \ values. Using constants instead of hardcoded values multiple times will avoid\
    \ typos and hours spent trying to understand why a module is not behaving as expected.\
    \ For instance, imagine that you want to check that a button is pressed in a user\
    \ interface. Using a constant for the name of the button and for checking what\
    \ was clicked ensures consistency between the interface and the behavior of the\
    \ application. Here's an example:\n\n```sql\nIF p_button = 'Ok' THEN -- Bad if\
    \ the button is named 'OK' (in upper case)\n```\n\n```sql\nC_OK_BUTTON       \
    \                                 CONSTANT VARCHAR2(50) := 'OK';\nIF p_button\
    \ = C_OK_BUTTON THEN -- Far better !\n```\n\n![images](images/square.jpg) `Note`\
    \ It is possible to dimension a constant string with a length that is too short\
    \ (such as `VARCHAR2(1) := 'Hello'`) without triggering a compilation error. The\
    \ code fails only when the given constant is called. Debugging this is very difficult,\
    \ as the origin of the problem is not in the body of any module. Therefore, I\
    \ always declare constant strings with a good length, like 50, even for very short\
    \ values (`VARCHAR2(50) := 'Y'`).\n\n## Types\n\nUse upper case and the prefix\
    \ `T_` to name your types, like so:\n\n```sql\nTYPE T_SEARCH_RESULT IS TABLE OF\
    \ NUMBER\n     INDEX BY BINARY_INTEGER;\n```\n\n## Global Variables\n\nUse lower\
    \ case and the prefix `g_` to name global variables, as in the following example:\n\
    \n```sql\ng_book_record                                          BOOKS%ROWTYPE;\n\
    ```\n\n## Local Procedures and Functions\n\nIt is possible to declare procedures\
    \ or functions that are local to a given procedure. Use upper case and the prefix\
    \ `LOCAL$` in their names. A local procedure would look like this:\n\n```sql\n\
    PROCEDURE KNL$REGISTER_AUTHOR (\n                         p_name             \
    \          IN      VARCHAR2\n                        ) IS\n\n  PROCEDURE LOCAL$COMPUTE_CODE_NAME(\n\
    \                         p_local_name                 IN      VARCHAR2\n    \
    \                    ) IS\n  BEGIN\n    ...\n  END; -- LOCAL$COMPUTE_CODE_NAME\n\
    \n  l_code_name                                             VARCHAR2(80);\n\n\
    BEGIN\n      l_code_name := LOCAL$COMPUTE_CODE_NAME(\n                       \
    \  p_local_name => p_name\n                        );\n  ...\n    END; -- KNL$REGISTER_AUTHOR\n\
    ```\n\n## Procedure Metadata\n\nEven if you use software version management tools\
    \ (such as Subversion), it can be useful to keep some dates and names in your\
    \ source code. Other in-code documentation is also helpful. I suggest adding a\
    \ block of comments such as the following before the declaration of each module.\
    \ Having the name of who did what change and for what reason can help when it\
    \ comes to modifying a module. It also acts as part of the technical documentation\
    \ of the system.\n\n```sql\n/*-----------------------------------------------------------------------*/\n\
    /*                                                                       */\n\
    /* Module   : MODULE_NAME                                                */\n\
    /* Goal     : Short description of the module.                           */\n\
    /* Keywords : Few keywords describing what the module does.              */\n\
    /*                                                                       */\n\
    /*-----------------------------------------------------------------------*/\n\
    /* Description:                                                          */\n\
    /*                                                                       */\n\
    /* Long description of the module: its goal.                             */\n\
    /* Explanation about parameters (Input and Output).                      */\n\
    /* How the procedure works, the \"tricks\", etc.                           */\n\
    /*                                                                       */\n\
    /*-----------------------------------------------------------------------*/\n\
    /* History:                                                              */\n\
    /*                                                                       */\n\
    /* YYYY-MM-DD : First name and Name - Creation.                          */\n\
    /*                                                                       */\n\
    /* YYYY-MM-DD : First name and Name - Review.                            */\n\
    /*                                                                       */\n\
    /* YYYY-MM-DD : First name and Name                                      */\n\
    /*              Description of the modification.                         */\n\
    /*                                                                       */\n\
    /*-----------------------------------------------------------------------*/\n\
    ```\n\n## Functions\n\nMy coding conventions for functions are the same as for\
    \ procedures. Only the naming is different. I name my functions using the prefix\
    \ `STF$` (standing for Stored Function), like the following:\n\n```sql\nFUNCTION\
    \ STF$IS_BOOK_AVAILABLE (\n                      p_book_id              IN   \
    \   NUMBER\n                    ) RETURN BOOLEAN;\n```\n\nFunctions are usually\
    \ designed to return a single value. It may be useful to define one constant meaning\
    \ that something went wrong. Note that functions can also have `OUT` parameters\
    \ but I think it is mixing with the role of procedures. Therefore, I usually limit\
    \ my use of functions to very safe processes or to cases that absolutely require\
    \ them."
  raw: '#### Parameters


    Use lower case and the prefix *p_* to name parameters. It is then easier to distinguish
    them from local variables within the body of the procedure. Use one line per parameter
    and a fixed distance between the names, the in/out attribute, type, and the default
    assignment value, like so:


    `PROCEDURE GET$BOOK_AUTHOR (`

    `                 p_book_id              IN      NUMBER   := NULL`

    `                ,p_book_title           IN      VARCHAR2 := NULL`

    `                ,p_author                  OUT  VARCHAR2`

    `                );`


    Notice how using one line per parameter makes the code easy to read. It is also
    easy add or remove one parameter if necessary, specially when the comma is at
    the beginning of each line.


    ![images](images/square.jpg) **Note** I also recommend that you specify NULLs
    as your default parameter values. Otherwise, it can be difficult to know whether
    a given parameter value was actually passed or whether it was left at its default.
    If a parameter defaults to X, and the value in a given procedure call is indeed
    X, your code has no way to know whether that value X was passed to the procedure
    or whether the parameter defaulted. Should you need a non null default value,
    there''s always time to use a good old NVL later on when using the parameter.


    #### Calls


    Always prefix the procedure name with its package name, even when calling a procedure
    within the same package. It eases reading and debugging and makes the relocation
    of a piece of code into another package a piece of cake.


    Always use the `=>` syntax to pass parameter values. List parameters one value
    to the line. The => syntax makes the call unambiguous regarding the ordering of
    parameters; each parameter receives the value it is intended to receive. Moreover,
    the syntax also avoids any ambiguity when calling overloaded modules (some call
    them *polymorphic* modules). Here''s an example:


    `KNL_BOOKS.GET$BOOK_AUTHOR (`

    `                 p_book_id    => 123456`

    `                ,p_author     => l_author`

    `                );`


    #### Local Variables


    Use lower case and the prefix *l_* to name local variables. It is then easier
    to distinguish them from parameters within the body of the procedure. Use one
    line per declaration and a fixed distance between the names and the types, like
    so:


    `l_author                                        VARCHAR2(50);`


    #### Constants


    Use upper case and the prefix *C_* to name your constants, like so:


    `C_TITLE_HEADER                                  CONSTANT VARCHAR2(50) := ''Title'';`


    Create a constant as soon as a value (a string or a number) is used at more than
    one place in the code. In other words, avoid hardcoded values. Using constants
    instead of hardcoded values multiple times will avoid typos and hours spent trying
    to understand why a module is not behaving as expected. For instance, imagine
    that you want to check that a button is pressed in a user interface. Using a constant
    for the name of the button and for checking what was clicked ensures consistency
    between the interface and the behavior of the application. Here''s an example:


    `IF p_button = ''Ok'' THEN -- Bad if the button is named ''OK'' (in upper case)`


    `C_OK_BUTTON                             CONSTANT VARCHAR2(50) := ''OK'';`

    `IF p_button = C_OK_BUTTON THEN -- Far better !`


    ![images](images/square.jpg) **Note** It is possible to dimension a constant string
    with a length that is too short (such as VARCHAR2(1) := ‘Hello'') without triggering
    a compilation error. The code fails only when the given constant is called. Debugging
    this is very difficult, as the origin of the problem is not in the body of any
    module. Therefore, I always declare constant strings with a good length, like
    50, even for very short values (VARHCAR2(50) := ‘Y'').


    #### Types


    Use upper case and the prefix *T_* to name your types, like so:


    `TYPE T_SEARCH_RESULT IS TABLE OF NUMBER`

    `     INDEX BY BINARY_INTEGER;`


    #### Global Variables


    Use lower case and the prefix *g_* to name global variables, as in the following
    example:


    `g_book_record                                  BOOKS%ROWTYPE;`


    #### Local Procedures and Functions


    It is possible to declare procedures or functions that are local to a given procedure.
    Use upper case and the prefix *LOCAL$* in their names. A local procedure would
    look like this:


    `PROCEDURE KNL$REGISTER_AUTHOR (`

    `                     p_name                     IN      VARCHAR2`

    `                    ) IS`


    `  PROCEDURE LOCAL$COMPUTE_CODE_NAME(`

    `                     p_local_name               IN      VARCHAR2`

    `                    ) IS`

    `  BEGIN`

    `    ...`

    `  END; -- LOCAL$COMPUTE_CODE_NAME`


    `  l_code_name                                       VARHCAR2(80);`


    `BEGIN`

    `      l_code_name := LOCAL$COMPUTE_CODE_NAME(`

    `                         p_local_name => p_name`

    `                        );`

    `  ...`

    `    END; -- KNL$REGISTER_AUTHOR`


    #### Procedure Metadata


    Even if you use software version management tools (such as Subversion), it can
    be useful to keep some dates and names in your source code. Other in-code documentation
    is also helpful. I suggest adding a block of comments such as the following before
    the declaration of each module. Having the name of who did what change and for
    what reason can help when it comes to modifying a module. It also acts as part
    of the technical documentation of the system.


    `/*-----------------------------------------------------------------------*/`

    `/*                                                                       */`

    `/* Module   : MODULE_NAME                                                */`

    `/* Goal     : Short description of the module.                           */`

    `/* Keywords : Few keywords describing what the module does.              */`

    `/*                                                                       */`

    `/*-----------------------------------------------------------------------*/`

    `/* Description:                                                          */`

    `/*                                                                       */`

    `/* Long description of the module: its goal.                             */`

    `/* Explanation about parameters (Input and Output).                      */`

    `/* How the procedure works, the "tricks", etc.                           */`

    `/*                                                                       */`

    `/*-----------------------------------------------------------------------*/`

    `/* History:                                                              */`

    `/*                                                                       */`

    `/* YYYY-MM-DD : First name and Name - Creation.                          */`

    `/*                                                                       */`

    `/* YYYY-MM-DD : First name and Name - Review.                            */`

    `/*                                                                       */`

    `/* YYYY-MM-DD : First name and Name                                      */`

    `/*              Description of the modification.                         */`

    `/*                                                                       */`

    `/*-----------------------------------------------------------------------*/`


    ### Functions


    My coding conventions for functions are the same as for procedures. Only the naming
    is different. I name my functions using the prefix *STF$* (standing for Stored
    Function), like the following:


    `FUNCTION STF$IS_BOOK_AVAILABLE (`

    `                 p_book_id              IN      NUMBER`

    `                ) RETURN BOOLEAN;`


    Functions are usually designed to return a single value. It may be useful to define
    one constant meaning that something went wrong. Note that functions can also have
    OUT parameters but I think it is mixing with the role of procedures. Therefore,
    I usually limit my use of functions to very safe processes or to cases that absolutely
    require them.'
  trans: "\n## 参数\n\n使用小写字母并以 `p_` 为前缀来命名参数。这样可以更容易地将其与过程体内的局部变量区分开来。每个参数占用一行，并且名称、输入/输出属性、类型和默认赋值值之间保持固定的间距，如下所示：\n\
    \n```sql\nPROCEDURE GET$BOOK_AUTHOR (\n                      p_book_id       \
    \       IN      NUMBER   := NULL\n                    , p_book_title         \
    \  IN      VARCHAR2 := NULL\n                    , p_author               OUT\
    \     VARCHAR2\n                    );\n```\n\n请注意，每个参数使用一行使得代码易于阅读。在必要时添加或删除一个参数也很容易，特别是当逗号位于每行的开头时。\n\
    \n![images](img/square.jpg) `注意` 我还建议您将默认参数值指定为 `NULL`。否则，很难确定某个参数值是实际传递的，还是保留了其默认值。如果一个参数的默认值是\
    \ `X`，并且在给定的过程调用中传递的值也确实是 `X`，您的代码将无法知道该值 `X` 是传递给了过程，还是参数使用了默认值。如果您确实需要一个非空的默认值，在使用该参数时，总会有时间使用一个好用的\
    \ `NVL` 函数。\n\n## 调用\n\n始终在过程名前加上其包名，即使在同一个包内调用过程也是如此。这有助于阅读和调试，并将代码片段重新定位到另一个包中变得轻而易举。\n\
    \n始终使用 `=>` 语法来传递参数值。每行列出一个参数值。`=>` 语法使调用在参数顺序方面清晰无误；每个参数接收到它预期接收的值。此外，该语法在调用重载模块（有些人称之为多态模块）时也避免了任何歧义。这是一个例子：\n\
    \n```sql\nKNL_BOOKS.GET$BOOK_AUTHOR (\n                      p_book_id    => 123456\n\
    \                    , p_author     => l_author\n                    );\n```\n\
    \n## 局部变量\n\n使用小写字母并以 `l_` 为前缀来命名局部变量。这样可以更容易地将其与过程体内的参数区分开来。每个声明占用一行，名称和类型之间保持固定的间距，如下所示：\n\
    \n```sql\nl_author                                                VARCHAR2(50);\n\
    ```\n\n## 常量\n\n使用大写字母并以 `C_` 为前缀来命名您的常量，如下所示：\n\n```sql\nC_TITLE_HEADER     \
    \                                     CONSTANT VARCHAR2(50) := 'Title';\n```\n\
    \n当某个值（字符串或数字）在代码中多次使用时，立即创建一个常量。换句话说，避免使用硬编码的值。使用常量代替多次出现的硬编码值可以避免拼写错误以及花费数小时试图理解模块行为不如预期的原因。例如，假设您想检查用户界面中是否按下了某个按钮。为按钮名称使用一个常量并用于检查被点击的内容，可以确保界面和应用程序行为之间的一致性。这是一个例子：\n\
    \n```sql\nIF p_button = 'Ok' THEN -- 糟糕的做法，如果按钮的名称是 'OK'（大写）\n```\n\n```sql\n\
    C_OK_BUTTON                                        CONSTANT VARCHAR2(50) := 'OK';\n\
    IF p_button = C_OK_BUTTON THEN -- 好得多！\n```\n\n![images](img/square.jpg) `注意`\
    \ 为常量字符串指定过短的长度（例如 `VARCHAR2(1) := 'Hello'`）是可能的，且不会触发编译错误。该错误只有在调用给定的常量时才会发生。调试这一点非常困难，因为问题的根源不在任何模块的主体中。因此，我总是为常量字符串声明一个足够长的长度，比如\
    \ 50，即使对于非常短的值也是如此（`VARCHAR2(50) := 'Y'`）。\n\n## 类型\n\n使用大写字母并以 `T_` 为前缀来命名您的类型，如下所示：\n\
    \n```sql\nTYPE T_SEARCH_RESULT IS TABLE OF NUMBER\n     INDEX BY BINARY_INTEGER;\n\
    ```\n\n## 全局变量\n\n使用小写字母并以 `g_` 为前缀来命名全局变量，如下例所示：\n\n```sql\ng_book_record   \
    \                                       BOOKS%ROWTYPE;\n```\n\n## 局部过程和函数\n\n\
    可以声明属于给定过程局部的过程或函数。在其名称中使用大写字母并以 `LOCAL$` 为前缀。一个局部过程看起来像这样：\n\n```sql\nPROCEDURE\
    \ KNL$REGISTER_AUTHOR (\n                         p_name                     \
    \  IN      VARCHAR2\n                        ) IS\n\n  PROCEDURE LOCAL$COMPUTE_CODE_NAME(\n\
    \                         p_local_name                 IN      VARCHAR2\n    \
    \                    ) IS\n  BEGIN\n    ...\n  END; -- LOCAL$COMPUTE_CODE_NAME\n\
    \n  l_code_name                                             VARCHAR2(80);\n\n\
    BEGIN\n      l_code_name := LOCAL$COMPUTE_CODE_NAME(\n                       \
    \  p_local_name => p_name\n                        );\n  ...\n    END; -- KNL$REGISTER_AUTHOR\n\
    ```\n\n## 过程元数据\n\n即使您使用软件版本管理工具（如 Subversion），在源代码中保留一些日期和姓名也可能是有用的。其他代码内文档也很有帮助。我建议在每个模块声明之前添加一个注释块，如下所示。记录谁进行了什么更改以及出于什么原因，可以在修改模块时提供帮助。它也作为系统技术文档的一部分。\n\
    \n```sql\n/*-----------------------------------------------------------------------*/\n\
    /*                                                                       */\n\
    /* 模块     : MODULE_NAME                                                */\n/*\
    \ 目标     : 模块的简要描述。                                           */\n/* 关键词   : 描述模块功能的一些关键词。\
    \                                 */\n/*                                     \
    \                                  */\n/*-----------------------------------------------------------------------*/\n\
    /* 描述:                                                                 */\n/*\
    \                                                                       */\n/*\
    \ 模块的详细描述：其目标。                                              */\n/* 关于参数（输入和输出）的解释。\
    \                                        */\n/* 过程如何工作，“技巧”等。                \
    \                              */\n/*                                        \
    \                               */\n/*-----------------------------------------------------------------------*/\n\
    /* 历史:                                                                 */\n/*\
    \                                                                       */\n/*\
    \ YYYY-MM-DD : 名和姓 - 创建。                                         */\n/*      \
    \                                                                 */\n/* YYYY-MM-DD\
    \ : 名和姓 - 审查。                                         */\n/*                 \
    \                                                      */\n/* YYYY-MM-DD : 名和姓\
    \                                                  */\n/*              修改描述。 \
    \                                              */\n/*                        \
    \                                               */\n/*-----------------------------------------------------------------------*/\n\
    ```\n\n## 函数\n\n我的函数编码约定与过程相同。只有命名方式不同。我使用前缀 `STF$`（代表存储函数）来命名我的函数，如下所示：\n\n```sql\n\
    FUNCTION STF$IS_BOOK_AVAILABLE (\n                      p_book_id            \
    \  IN      NUMBER\n                    ) RETURN BOOLEAN;\n```\n\n函数通常设计为返回单个值。定义一个表示出错的常量可能很有用。请注意，函数也可以有\
    \ `OUT` 参数，但我认为这混淆了函数与过程的角色。因此，我通常将函数的使用限制在非常安全的过程或绝对需要它们的情况。\n"
- fmt: "### Error Handling\n\nOne of the key elements of robust, maintainable, and\
    \ scalable software is modularity and avoidance of logic duplication. A strong\
    \ system relies on a series of elementary bricks, each one having a unique function.\
    \ Put together, these bricks implement more complex functionalities. Should a\
    \ module fail, it must not crash the module that calls it. The first step of error\
    \ handling, then, is to create a confinement hull that is designed to prevent\
    \ any damage outside the procedure that fails. The second step is to report this\
    \ error to the caller, so it can be nicely taken into account and propagated to\
    \ the highest level without harm. The third step is to make sure that the state\
    \ of the system remains consistent after an error; in other words, that no action\
    \ was partially done.\n\n#### Error Trapping\n\nPL/SQL has a powerful error trapping\
    \ mechanism in the form of `exceptions`. The one with the widest spectrum is called\
    \ `OTHERS`. As its name says, it is designed to catch everything that was not\
    \ otherwise trapped. I strongly recommend protecting all stored procedures by\
    \ an exception handler for `OTHERS`. Doing so is the chance to log or output any\
    \ valuable information for later debugging, such as which module failed with which\
    \ parameter values. It won't prevent the application from crashing but you will\
    \ know where and how. See the “Error Reporting” section for more details.\n\n\
    Should you need to add a user defined exception, use upper case, a meaningful\
    \ name, and the prefix `L_*`. You can use a different prefix if you prefer. My\
    \ own convention here is to use `L_*`.\n\nThe following is a skeleton procedure\
    \ showing how I typically structure the error handling logic:\n\n```\nPROCEDURE\
    \ GET$BOOK_AUTHOR (\n                   p_book_id              IN      NUMBER\
    \   := NULL\n                  ,p_book_title           IN      VARCHAR2 := NULL\n\
    \                  ,p_author                  OUT  VARCHAR2\n                \
    \  ) IS\n\n  L_MY_EXCEPTION                                EXCEPTION;\n\nBEGIN\n\
    \   ...\nEXCEPTION\n  WHEN L_MY_EXCEPTION THEN\n    -- Handling of the specific\
    \ error\n    ...\n  WHEN OTHERS THEN\n    -- Handling of the generic error\n \
    \   ...\nEND; -- GET$BOOK_AUTHOR\n```\n\nAlso, while not a coding convention per\
    \ se, do give thought to checking all input parameters. At least be sure not to\
    \ fully trust them. Just because a module has a parameter called `p_book_id` does\
    \ not mean the value passed into that parameter will always be a genuine book\
    \ ID.\n\n#### Error Reporting\n\nOnce you have built a system of modules, you\
    \ want to know when one of them fails in order to correctly treat the problem.\
    \ Transmitting error messages becomes vital towards having a stable architecture.\n\
    \nError messaging can have two aspects: one for machines and one for humans. Error\
    \ messaging for machines is based upon codes that can be easily interpreted, like\
    \ `(ORA-)01403` standing for “No data found.” Error messaging for humans is based\
    \ on clear text explaining the given error. I recommend creating your own set\
    \ of errors (codes and explanations) in a specific table. Make your errors specific\
    \ to your application. For example, create a message such as “No book with such\
    \ a title” and associate that message with a code of your choosing. Such a list\
    \ of errors is useful to programmers and to end users. Make sure your messages\
    \ are clear and friendly.\n\nIn order to propagate errors from one module to another,\
    \ I use two output parameters called `p_exitcode` and `p_exittext`. The first\
    \ is for machines; the second one is for humans. I ensure those parameters are\
    \ present in every single stored procedure that I write. By convention, an exit\
    \ code equal to `0` means that the execution of the procedure went fine. A code\
    \ different from `0` indicates that an error occurred, with the code number indicating\
    \ just which error that was.\n\nStop the execution as soon as a problem is detected;\
    \ it's not worth going further. You may want to use a generic exception called\
    \ `L_PB_FATAL` (standing for *Local Problem Fatal*, but you may choose any dramatic\
    \ name you wish) that is raised as soon as there is no reason to carry on.\n\n\
    The following is an enhanced version of the procedure skeleton from the previous\
    \ section. This version of the skeleton implements the additional parameters,\
    \ and also the exception, that I've just described.\n\n```\nPROCEDURE GET$BOOK_AUTHOR\
    \ (\n                   p_book_id              IN      NUMBER   := NULL\n    \
    \              ,p_book_title           IN      VARCHAR2 := NULL\n            \
    \      ,p_author                  OUT  VARCHAR2\n                  ,p_exitcode\
    \                 OUT  NUMBER\n                  ,p_exittext                 OUT\
    \  VARCHAR2\n                  ) IS\n\n  L_PB_FATAL                          \
    \        EXCEPTION;\n\nBEGIN\n  -- Init\n  p_exitcode := 0;\n  p_exittext := NULL;\n\
    \  ...\nEXCEPTION\n  WHEN L_PB_FATAL THEN\n    IF p_exitcode = 0 THEN -- To avoid\
    \ forgotten values\n      p_exitcode := -1;    -- Return something <> 0 indicating\
    \ an error\n    END IF;\n  WHEN OTHERS THEN\n    p_exitcode := SQLCODE;\n    p_exittext\
    \ := SUBSTR('Error in GET$BOOK_AUTHOR: '||SQLERRM, 1, 500);\nEND; -- GET$BOOK_AUTHOR\n\
    ```\n\nAny call to a procedure following the convention illustrated in this skeleton\
    \ should be followed by a check on the exit code and an appropriate action in\
    \ case of problem. Then you can decide whether to take the appropriate emergency\
    \ action or to stop the execution and propagate the error using the same mechanism,\
    \ like so:\n\n```\nPROCEDURE GET$BOOK_DATA (\n                   p_book_id   \
    \           IN      NUMBER\n                  ,p_book_author              OUT\
    \  VARCHAR2\n                  ,p_book_editor              OUT  VARCHAR2\n   \
    \               ,p_exitcode                 OUT  NUMBER\n                  ,p_exittext\
    \                 OUT  VARCHAR2\n                  ) IS\n\n  L_PB_FATAL      \
    \                            EXCEPTION;\n\nBEGIN\n  -- Init\n  p_exitcode := 0;\n\
    \  p_exittext := NULL;\n\n  -- Get the author of the book\n  KNL_BOOKS.GET$BOOK_AUTHOR\
    \ (\n                   p_book_id  => p_book_id\n                  ,p_author \
    \  => p_book_author\n                  ,p_exitcode => p_exitcode  -- The values\
    \ of error code and text\n                  ,p_exittext => p_exittext  -- are\
    \ propagated to the caller\n                  );\n  IF p_exitcode <> 0 THEN\n\
    \    RAISE L_PB_FATAL;\n  END IF;\n\n  -- Get the editor of the book\n  KNL_BOOKS.GET$BOOK_EDITOR\
    \ (\n  ...    \nEXCEPTION\n  WHEN L_PB_FATAL THEN\n    IF p_exitcode = 0 THEN\
    \ -- To avoid forgotten values\n      p_exitcode := -1;    -- Return something\
    \ <> 0 indicating an error\n    END IF;\n  WHEN OTHERS THEN\n    p_exitcode :=\
    \ SQLCODE;\n    p_exittext := SUBSTR('Error in GET$BOOK_DATA: '||SQLERRM, 1, 500);\n\
    END; -- GET$BOOK_DATA\n```"
  raw: '### Error Handling


    One of the key elements of robust, maintainable, and scalable software is modularity
    and avoidance of logic duplication. A strong system relies on a series of elementary
    bricks, each one having a unique function. Put together, these bricks implement
    more complex functionalities. Should a module fail, it must not crash the module
    that calls it. The first step of error handling, then, is to create a confinement
    hull that is designed to prevent any damage outside the procedure that fails.
    The second step is to report this error to the caller, so it can be nicely taken
    into account and propagated to the highest level without harm. The third step
    is to make sure that the state of the system remains consistent after an error;
    in other words, that no action was partially done.


    #### Error Trapping


    PL/SQL has a powerful error trapping mechanism in the form of *exceptions*. The
    one with the widest spectrum is called `OTHERS`. As its name says, it is designed
    to catch everything that was not otherwise trapped. I strongly recommend protecting
    all stored procedures by an exception handler for `OTHERS`. Doing so is the chance
    to log or output any valuable information for later debugging, such as which module
    failed with which parameter values. It won''t prevent the application from crashing
    but you will know where and how. See the “Error Reporting” section for more details.


    Should you need to add a user defined exception, use upper case, a meaningful
    name, and the prefix *L_*. You can use a different prefix if you prefer. My own
    convention here is to use *L_*.


    The following is a skeleton procedure showing how I typically structure the error
    handling logic:


    `PROCEDURE GET$BOOK_AUTHOR (`

    `                 p_book_id              IN      NUMBER   := NULL`

    `                ,p_book_title           IN      VARCHAR2 := NULL`

    `                ,p_author                  OUT  VARCHAR2`

    `                ) IS`


    `  L_MY_EXCEPTION                                EXCEPTION;`


    `BEGIN`

    `   ...`

    `EXCEPTION`

    `  WHEN L_MY_EXCEPTION THEN`

    `    -- Handling of the specific error`

    `    ...`

    `  WHEN OTHERS THEN`

    `    -- Handling of the generic error`

    `    ...`

    `END; -- GET$BOOK_AUTHOR`


    Also, while not a coding convention per se, do give thought to checking all input
    parameters. At least be sure not to fully trust them. Just because a module has
    a parameter called p_book_id does not mean the value passed into that parameter
    will always be a genuine book ID.


    #### Error Reporting


    Once you have built a system of modules, you want to know when one of them fails
    in order to correctly treat the problem. Transmitting error messages becomes vital
    towards having a stable architecture.


    Error messaging can have two aspects: one for machines and one for humans. Error
    messaging for machines is based upon codes that can be easily interpreted, like
    (ORA-)01403 standing for “No data found.” Error messaging for humans is based
    on clear text explaining the given error. I recommend creating your own set of
    errors (codes and explanations) in a specific table. Make your errors specific
    to your application. For example, create a message such as “No book with such
    a title” and associate that message with a code of your choosing. Such a list
    of errors is useful to programmers *and* to end users. Make sure your messages
    are clear and friendly.


    In order to propagate errors from one module to another, I use two output parameters
    called `p_exitcode` and `p_exittext`. The first is for machines; the second one
    is for humans. I ensure those parameters are present in every single stored procedure
    that I write. By convention, an exit code equal to 0 means that the execution
    of the procedure went fine. A code different from 0 indicates that an error occurred,
    with the code number indicating just which error that was.


    Stop the execution as soon as a problem is detected; it''s not worth going further.
    You may want to use a generic exception called `L_PB_FATAL` (standing for *Local
    Problem Fatal*, but you may choose any dramatic name you wish) that is raised
    as soon as there is no reason to carry on.


    The following is an enhanced version of the procedure skeleton from the previous
    section. This version of the skeleton implements the additional parameters, and
    also the exception, that I''ve just described.


    `PROCEDURE GET$BOOK_AUTHOR (`

    `                 p_book_id              IN      NUMBER   := NULL`

    `                ,p_book_title           IN      VARCHAR2 := NULL`

    `                ,p_author                  OUT  VARCHAR2`

    `                ,p_exitcode                OUT  NUMBER`

    `                ,p_exittext                OUT  VARCHAR2`

    `                ) IS`


    `  L_PB_FATAL                                    EXCEPTION;`


    `BEGIN`

    `  -- Init`

    `  p_exitcode := 0;`

    `  p_exittext := NULL;`

    `  ...`

    `EXCEPTION`

    `  WHEN L_PB_FATAL THEN`

    `    IF p_exitcode = 0 THEN -- To avoid forgotten values`

    `      p_exitcode := -1;    -- Return something <> 0 indicating an error`

    `    END IF;`

    `  WHEN OTHERS THEN`

    `    p_exitcode := SQLCODE;`

    `    p_exittext := SUBSTR(''Error in GET$BOOK_AUTHOR: ''||SQLERRM, 1, 500);`

    `END; -- GET$BOOK_AUTHOR`


    Any call to a procedure following the convention illustrated in this skeleton
    should be followed by a check on the exit code and an appropriate action in case
    of problem. Then you can decide whether to take the appropriate emergency action
    or to stop the execution and propagate the error using the same mechanism, like
    so:


    `PROCEDURE GET$BOOK_DATA (`

    `                 p_book_id              IN      NUMBER`

    `                ,p_book_author             OUT  VARCHAR2`

    `                ,p_book_editor             OUT  VARCHAR2`

    `                ,p_exitcode                OUT  NUMBER`

    `                ,p_exittext                OUT  VARCHAR2`

    `                ) IS`


    `  L_PB_FATAL                                    EXCEPTION;`


    `BEGIN`

    `  -- Init`

    `  p_exitcode := 0;`

    `  p_exittext := NULL;`


    `  -- Get the author of the book`

    `  KNL_BOOKS.GET$BOOK_AUTHOR (`

    `                 p_book_id  => p_book_id`

    `                ,p_author   => p_book_author`

    `                ,p_exitcode => p_exitcode  -- The values of error code and text`

    `                ,p_exittext => p_exittext  -- are propagated to the caller`

    `                );`

    `  IF p_exitcode <> 0 THEN`

    `    RAISE L_PB_FATAL;`

    `  END IF;`


    `  -- Get the editor of the book`

    `  KNL_BOOKS.GET$BOOK_EDITOR (`

    `  ...    `

    `EXCEPTION`

    `  WHEN L_PB_FATAL THEN`

    `    IF p_exitcode = 0 THEN -- To avoid forgotten values`

    `      p_exitcode := -1;    -- Return something <> 0 indicating an error`

    `    END IF;`

    `  WHEN OTHERS THEN`

    `    p_exitcode := SQLCODE;`

    `    p_exittext := SUBSTR(''Error in GET$BOOK_DATA: ''||SQLERRM, 1, 500);`

    `END; -- GET$BOOK_DATA`'
  trans: "### 错误处理\n\n健壮、可维护且可扩展的软件的关键要素之一是模块化和避免逻辑重复。一个强大的系统依赖于一系列基本的构件，每个构件都具有独特的功能。将这些构件组合在一起，便能实现更复杂的功能。如果一个模块失败，它不应导致调用它的模块崩溃。因此，错误处理的第一步是创建一个隔离舱，旨在防止任何损害扩散到失败的程序之外。第二步是向调用者报告此错误，以便其能被妥善处理并安全地传播到最高层级。第三步是确保在错误发生后系统状态保持一致；换句话说，就是没有操作被部分执行。\n\
    \n#### 错误捕获\n\nPL/SQL 拥有一个强大的错误捕获机制，其形式为 `异常`。其中适用范围最广的是 `OTHERS`。正如其名，它旨在捕获所有未被其他方式捕获的错误。我强烈建议使用针对\
    \ `OTHERS` 的异常处理器来保护所有存储过程。这样做有机会记录或输出任何有价值的调试信息，例如哪个模块在哪些参数值下失败。这虽不能阻止应用程序崩溃，但你将知晓问题发生的位置和方式。更多细节请参见“错误报告”部分。\n\
    \n如果需要添加用户自定义异常，请使用大写字母、有意义的名称以及前缀 `L_*`。如果你愿意，也可以使用不同的前缀。我个人的约定是使用 `L_*`。\n\n\
    以下是一个展示我典型错误处理逻辑结构的框架过程：\n\n```\nPROCEDURE GET$BOOK_AUTHOR (\n               \
    \    p_book_id              IN      NUMBER   := NULL\n                  ,p_book_title\
    \           IN      VARCHAR2 := NULL\n                  ,p_author            \
    \      OUT  VARCHAR2\n                  ) IS\n\n  L_MY_EXCEPTION             \
    \                   EXCEPTION;\n\nBEGIN\n   ...\nEXCEPTION\n  WHEN L_MY_EXCEPTION\
    \ THEN\n    -- 特定错误的处理\n    ...\n  WHEN OTHERS THEN\n    -- 通用错误的处理\n    ...\n\
    END; -- GET$BOOK_AUTHOR\n```\n\n此外，虽然这本身不是编码约定，但请务必考虑检查所有输入参数。至少要确保不要完全信任它们。仅仅因为一个模块有一个名为\
    \ `p_book_id` 的参数，并不意味着传递给该参数的值总是一个有效的书籍 ID。\n\n#### 错误报告\n\n一旦你建立了一个模块系统，你就会希望在其中一个模块失败时能够知晓，以便正确处理问题。传输错误信息对于构建稳定的架构至关重要。\n\
    \n错误信息可以有两个方面：一个面向机器，一个面向人类。面向机器的错误信息基于易于解释的代码，例如 `(ORA-)01403` 代表“未找到数据”。面向人类的错误信息则基于解释特定错误的明文。我建议在特定表中创建你自己的错误集（代码和解释）。让你的错误特定于你的应用程序。例如，创建一条诸如“没有此标题的书籍”的消息，并将其与你选择的代码关联。这样的错误列表对程序员和最终用户都很有用。确保你的消息清晰且友好。\n\
    \n为了将错误从一个模块传播到另一个模块，我使用两个名为 `p_exitcode` 和 `p_exittext` 的输出参数。第一个用于机器；第二个用于人类。我确保在我编写的每一个存储过程中都存在这些参数。按照约定，退出代码等于\
    \ `0` 表示过程执行顺利。不同于 `0` 的代码表示发生了错误，其中的代码数字指示了具体是哪种错误。\n\n一旦检测到问题就立即停止执行；继续下去不值得。你可能想使用一个名为\
    \ `L_PB_FATAL` 的通用异常（代表 *Local Problem Fatal*，但你可以选择任何戏剧性的名称），只要没有理由继续，就引发此异常。\n\
    \n以下是上一节中过程框架的增强版本。此版本的框架实现了我刚才描述的附加参数以及异常。\n\n```\nPROCEDURE GET$BOOK_AUTHOR\
    \ (\n                   p_book_id              IN      NUMBER   := NULL\n    \
    \              ,p_book_title           IN      VARCHAR2 := NULL\n            \
    \      ,p_author                  OUT  VARCHAR2\n                  ,p_exitcode\
    \                 OUT  NUMBER\n                  ,p_exittext                 OUT\
    \  VARCHAR2\n                  ) IS\n\n  L_PB_FATAL                          \
    \        EXCEPTION;\n\nBEGIN\n  -- 初始化\n  p_exitcode := 0;\n  p_exittext := NULL;\n\
    \  ...\nEXCEPTION\n  WHEN L_PB_FATAL THEN\n    IF p_exitcode = 0 THEN -- 避免遗留值\n\
    \      p_exitcode := -1;    -- 返回非零值表示错误\n    END IF;\n  WHEN OTHERS THEN\n  \
    \  p_exitcode := SQLCODE;\n    p_exittext := SUBSTR('Error in GET$BOOK_AUTHOR:\
    \ '||SQLERRM, 1, 500);\nEND; -- GET$BOOK_AUTHOR\n```\n\n任何调用遵循此框架所示约定的程序，都应随后检查退出代码，并在出现问题时采取适当行动。然后，你可以决定是采取适当的紧急措施，还是停止执行并使用相同机制传播错误，如下所示：\n\
    \n```\nPROCEDURE GET$BOOK_DATA (\n                   p_book_id              IN\
    \      NUMBER\n                  ,p_book_author              OUT  VARCHAR2\n \
    \                 ,p_book_editor              OUT  VARCHAR2\n                \
    \  ,p_exitcode                 OUT  NUMBER\n                  ,p_exittext    \
    \             OUT  VARCHAR2\n                  ) IS\n\n  L_PB_FATAL          \
    \                        EXCEPTION;\n\nBEGIN\n  -- 初始化\n  p_exitcode := 0;\n \
    \ p_exittext := NULL;\n\n  -- 获取书籍的作者\n  KNL_BOOKS.GET$BOOK_AUTHOR (\n       \
    \            p_book_id  => p_book_id\n                  ,p_author   => p_book_author\n\
    \                  ,p_exitcode => p_exitcode  -- 错误代码和文本的值\n                 \
    \ ,p_exittext => p_exittext  -- 传播给调用者\n                  );\n  IF p_exitcode\
    \ <> 0 THEN\n    RAISE L_PB_FATAL;\n  END IF;\n\n  -- 获取书籍的编辑者\n  KNL_BOOKS.GET$BOOK_EDITOR\
    \ (\n  ...    \nEXCEPTION\n  WHEN L_PB_FATAL THEN\n    IF p_exitcode = 0 THEN\
    \ -- 避免遗留值\n      p_exitcode := -1;    -- 返回非零值表示错误\n    END IF;\n  WHEN OTHERS\
    \ THEN\n    p_exitcode := SQLCODE;\n    p_exittext := SUBSTR('Error in GET$BOOK_DATA:\
    \ '||SQLERRM, 1, 500);\nEND; -- GET$BOOK_DATA\n```"
- fmt: "#### Error Recovery\n\nFollowing the black box paradigm, a procedure that\
    \ inserts, updates, or deletes information should leave the database in a consistent\
    \ state. Should the procedure fail, it has to rollback to the state the system\
    \ was in when entering the procedure. Use upper case to name savepoints and make\
    \ sure to include rollback calls in the global exceptions of the procedure, like\
    \ so:\n\n```sql\nPROCEDURE EXE$REGISTER_NEW_BOOK (\n                     p_title\
    \                IN      VARCHAR2\n                    ,p_author             \
    \  IN      VARCHAR2\n                    ,p_book_id                  OUT  NUMBER\n\
    \                    ,p_exitcode                 OUT  NUMBER\n               \
    \     ,p_exittext                 OUT  VARCHAR2\n                    ) IS\n\n\
    \  L_PB_FATAL                                    EXCEPTION;\n\nBEGIN\n  -- Init\n\
    \  p_exitcode := 0;\n  p_exittext := NULL;\n\n  SAVEPOINT BEFORE_REGISTER_NEW_BOOK;\n\
    \n  IF p_title IS NULL OR p_author IS NULL THEN\n    p_exitcode := 12345;  --\
    \ Error code for invalid new book data\n    p_exittext := 'Missing title or author\
    \ information';\n    RAISE L_PB_FATAL;\n  END IF;\n\n  ...\n\nEXCEPTION\n  WHEN\
    \ L_PB_FATAL THEN\n    ROLLBACK TO BEFORE_REGISTER_NEW_BOOK;\n    IF p_exitcode\
    \ = 0 THEN -- To avoid a forgotten value\n      p_exitcode := -1;\n    END IF;\n\
    \  WHEN OTHERS THEN\n    ROLLBACK TO BEFORE_REGISTER_NEW_BOOK;\n    p_exitcode\
    \ := SQLCODE;\n    p_exittext := SUBSTR('Error in KNL_BOOKS.EXE$REGISTER_NEW_BOOK:\
    \ '||SQLERRM, 1, 500);\nEND; -- EXE$REGISTER_NEW_BOOK\n```\n\n#### Test First.\
    \ Display Second.\n\nIf you are writing a module to drive a user interface, it\
    \ is better to first check and get all the required data first, then to display\
    \ the interface. That way, all the possible errors are trapped before anything\
    \ is displayed. You can then easily avoid having a message like “An error occurred”\
    \ appear in a middle of a page or a screen for the user to see. Also, if you do\
    \ need to display an error message, you can do so without confusing the user.\
    \ If you begin display data only to interrupt with an error, users can become\
    \ flustered and frustrated.\n\n### Summary\n\nCoding conventions are not intended\
    \ to solve all the problems you may encounter while implementing a system or maintaining\
    \ software. However, they are very handy in order to standardize large source\
    \ code bases and to ease the maintenance and sharing of modules. Following coding\
    \ standards is a sign of respect for your fellow programmers and project leaders.\
    \ As a programmer, you may find them difficult to use in the beginning, because\
    \ they may not match your own style. Believe me; it takes only a short time before\
    \ a given set of standards become your natural way of coding. Moreover, once you\
    \ start managing a large set of modules, what a pleasure it is to “plug and play”\
    \ them in a consistent way in order to build complex mechanisms! As a project\
    \ leader, you may find difficult to impose standards upon a whole team, but the\
    \ gain in quality is worth it.\n\nThe following is one final template. It summarizes\
    \ in one place many of the conventions described in this chapter.\n\n```sql\n\
    /*-----------------------------------------------------------------------*/\n\
    /*                                                                       */\n\
    /* Module   : MODULE_NAME                                                */\n\
    /* Goal     : Short description of the module.                           */\n\
    /* Keywords : Few keywords describing what the module does.              */\n\
    /*                                                                       */\n\
    /*-----------------------------------------------------------------------*/\n\
    /* Description:                                                          */\n\
    /*                                                                       */\n\
    /* Long description of the module: its goal.                             */\n\
    /* Explanation about parameters (Input and Output).                      */\n\
