  raw: '##### No Exception Raised


    A conventional implicit cursor will raise the `no_data_found` exception if there
    are no rows in the resultset, and your application may depend upon this fact to
    take reparative actions. In the following example (`bulk_ndf_1.sql`), `no_data_found`
    is used to indicate that the query predicates are not valid:


    `SQL> set serverout on`

    `SQL> declare`

    `  2    l_descr hardware.descr%type;`

    `  3  begin`

    `  4    select descr`

    `  5    into   l_descr`

    `  6    from   hardware`

    `  7    where  aisle = 0`

    `  8    and    item = 0;`

    `  9    dbms_output.put_line(''Item was found'');`

    ` 10  exception`

    ` 11    when no_data_found then`

    ` 12      dbms_output.put_line(''Invalid item specified'');`

    ` 13  end;`

    ` 14  /`

    `Invalid item specified`


    `PL/SQL procedure successfully completed.`


    However, when this example is converted to use bulk collect (without appropriate
    care), a bug is introduced into the code. Execute the following version (`bulk_ndf_2.sql`)
    and check the results on your own system:


    `SQL> set serverout on`

    `SQL> declare`

    `  2    type t_descr_list is table of hardware.descr%type;`

    `  3    l_descr_list t_descr_list;`

    `  4  begin`

    `  5    select descr`

    `  6    bulk collect`

    `  7    into   l_descr_list`

    `  8    from   hardware`

    `  9    where  aisle = 0`

    ` 10    and    item = 0;`

    ` 11    dbms_output.put_line(''Item was found'');`

    ` 12  exception`

    ` 13    when no_data_found then`

    ` 14      dbms_output.put_line(''Invalid item specified'');`

    ` 15  end;`

    ` 16  /`

    `Item was found  `*`<==== wrong !`*


    `PL/SQL procedure successfully completed.`


    The procedure runs successfully but returns the wrong result! This is because
    a bulk collect fetch call will ***not*** raise the `no_data_found` exception.
    You can interpret that lack of an exception as PL/SQL saying that it has successfully
    populated the target array with all of the available rows (in this case, none).
    The target array is indeed initialized even though it contains no data. This end
    result is subtly different to the target array not being initialized at all


    The following example (`bulk_ndf_3.sql`) shows there is an important difference
    between a bulk collect returning no rows into a collection versus a collection
    not being used within a bulk collect call at all:


    `SQL> set serverout on`

    `SQL> declare`

    `  2    type t_descr_list is table of hardware.descr%type;`

    `  3    l_descr_list t_descr_list;`

    `  4  begin`

    `  5    select descr`

    `  6    bulk collect`

    `  7    into   l_descr_list`

    `  8    from   hardware`

    `  9    where  aisle = 0`

    ` 10    and    item = 0;`

    ` 11    dbms_output.put_line(l_descr_list.count||'' rows found'');`

    ` 12  end;`

    ` 13  /`

    `0 rows found`


    `PL/SQL procedure successfully completed.`


    Comment out the SELECT statement and execute the same code again. The bulk collect
    never runs. Thus, the target array is never initialized. That lack of initialization
    leads to an error. For example, `bulk_ndf_4.sql` now crashes when attempting to
    reference the content of the collection.


    `SQL> declare`

    `  2    type t_descr_list is table of hardware.descr%type;`

    `  3    l_descr_list t_descr_list;`

    `  4  begin`

    `  5  --  select descr`

    `  6  --  bulk collect`

    `  7  --  into   l_descr_list`

    `  8  --  from   hardware`

    `  9  --  where  aisle = 0`

    ` 10  --  and    item = 0;`

    ` 11    dbms_output.put_line(l_descr_list.count||'' rows found'');`

    ` 12  end;`

    ` 13  /`

    `declare`

