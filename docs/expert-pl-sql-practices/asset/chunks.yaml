  trans: '

    # 总结


    以数据为中心的应用程序的业务逻辑应属于数据库。这一主张有技术原因和成功的实践案例作为支撑。这种做法有许多技术优势，例如设计简单、高性能和安全性提升。此外，许多使用此设计的企业资源规划系统已成功运行多年，且新系统也基于此设计构建。


    数据库中的 PL/SQL 业务逻辑会导致庞大的 PL/SQL 代码库。自然会产生一个问题：如何向用户交付一个满足时间、预算和外部产品质量要求，并能在未来进行维护的初始版本。在抽象层面上，任何架构的答案都是相同的。而
    PL/SQL 的具体实现则在四个方面独具特色，我将在本章中阐述。


    *   **一致性**使得开发者能够更快、更透彻地理解彼此的代码。一致性比具体的约定更重要。尽管如此，仍有充分的理由将某些方面纳入您的 PL/SQL 编码规范中。

    *   **模块化**是开发团队可扩展性和应用程序可维护性的基础。模块化将分而治之的优势带入了软件工程。PL/SQL 以子程序、包和模式的形式提供了强大的模块化构造，并提供了基于依赖视图和
    PL/Scope 的出色分析能力。

    *   **面向对象编程**允许增加复用性，这是在大型编程中降低成本和上市时间、提高质量的关键。虽然原样复用适用性有限，但面向对象编程提供的可适配复用能在更多情况下实现复用。PL/SQL
    不是一种面向对象语言，但可以通过所述模式集以面向对象的方式进行编程。

    *   大型应用程序的内存需求必须使用所述技术进行测量和优化。关于可扩展性和性能的设计有许多优秀资源，包括本书的若干章节。


    # 演进式数据建模


    ## 罗宾·桑兹


    大学刚毕业时，我为洛克希德公司工作。第一年，我所在的小组负责评估制造资源规划方法与工具。我对 MRP 很熟悉；它是我学士学位必修课程的一部分，而且我之前也有一些
    MRP 系统的经验。然而，在洛克希德，MRP 是个非常新的概念，并且它与现有系统背后的理念截然相反。我的老板兼导师，斯基普·克里斯托弗森，在洛克希德工作的时间比我年纪还大，他了解洛克希德排程系统的方方面面，甚至是最微小的细节。我们下班后一起上
    MRP 课程，那情景就像一个经典喜剧场景：伶牙俐齿的新手轻松掌握材料，而那位经验丰富、真正知道事物如何运作的老员工却费力地理解这种所有花哨功能的时髦技术的意义。每晚课程结束，我们走回那间没有窗户的办公室时，斯基普会谈论所有他认为这个愚蠢想法的错误之处——一个系统每晚都能处理变更并重新生成排程，而不会把装配线搞得一团糟。我在学习洛克希德如何处理排程的同时，也在上
    MRP 课程，并开始理解并欣赏它的工作原理。斯基普是对的：MRP 与我们的流程模型完全相反，我们的模型是基于数学、统计和学习曲线的。利用数十年成功飞机项目积累的知识，你计算出装配过程特定阶段的边界，并将其与车间位置关联起来。这些位置和日期为每个工作组创造了一个时间窗口，以容纳他们对装配的贡献。在这些边界内，零件和排程可能会疯狂地调整，工作组也会疯狂加班，但流水线上的人都知道，满足下一个位置的计划移动日期至关重要，他们已经学会无论如何都要实现它。飞机总是向前移动，即使装配线上三个位置之后的工作组不得不拆掉四个位置的工作，以添加一个当时需要时还无法获得的预制零件。


    随着课程的深入，斯基普对 MRP 的担忧加剧了，他课后的抱怨也更加激动。他现在知道装配线为了让排程得以执行所经历的一切。如果排程每晚都变，工人如何能跟上信息的涌入，更不用说跟上实际的零件和飞机了？一天晚上，我仔细斟酌了措辞，然后向我的导师说出了我的想法。鼓起勇气后，我说：“斯基普，排程现在已经在每天变化了。唯一的区别是，如果它在系统里，你就能看见了。”他突然变得非常安静，那是我最后一次听到他抱怨
    MRP。后来，他成为了 MRP 系统实施的倡导者，并在该技术和实施过程中都成为了专家。


    变化总会发生，无论你是在制造飞机还是编写软件。你有一个选择：要么管理它，要么被它弄得措手不及。

    '
- fmt: '# Lessons from Two Decades of System Development


    I met Skip in 1989 when he interviewed me on recruitment trip to my college and
    he taught me many things in the time I worked for him. Since that first post-college
    job, I''ve been a contributor on many different kinds of software system projects.
    Some of them were small enough that I could design and build the entire application
    myself, while others involved global teams with hundreds of people. Most of the
    projects I''ve been involved with were complex, and every one of them was expected
    to meet an expedited design and implementation schedule. In spite of the differences,
    there have been some basic realities of system development that were always the
    same.


    ## Customers Don''t Know What They Want (Until They See It)


    Customers don''t know what they want until they see it. Only once they see what
    can be done with their data will they begin to understand the real possibilities
    of a new application. This is also the point in time when they will begin to shower
    the project with change requests. If you want to build an exceptional product,
    the last thing you want to do is shut down their ideas by refusing to change.


    ## Customers Lie (Without Meaning To)


    To paraphrase Gregory House, MD, customers lie. Ask a customer to describe their
    process, and most of the time, they will answer with the documented version of
    the process. Customers don''t intend to mislead us, but the ISO certification
    process has taught them to answer questions about process by describing the currently
    documented steps. However, many processes are flawed and there are likely to be
    additional steps that may not be included in the written documentation. **Watch
    what a customer does** and you will see the real process. When you see the steps
    that are not in the documentation, that''s where you will find the best opportunities
    to build an innovative product.


    ## The System Must Make the User''s Job Easier


    If you build a system that makes a user''s job easier, they will use it and demand
    more: more options, more functionality, and more performance. Build an application
    that creates work without providing sufficient benefit, and users will work around
    the application, using it in ways that were never intended or avoiding it all
    together. This is a perfectly reasonable way for them to react: users have a job
    to do and the application and code that is so important to us as the creators
    of the application may only be a small part of the users'' workday. When users
    have to work around an application to get their job done, more bugs will be reported
    and data will become inaccurate over time. You need to remember as database and
    software developers that your customers are not as fascinated with the details
    of the technology as you are. Users need tools that work consistently and predictably.


    ## Speed is Essential


    If you cannot provide a tool or a product quickly, someone else will. This applies
    to both the end product and the development environment it is built in. If a product
    is late to market, potential customers will find another solution and another
    vendor. If the database is not available to support the application developers,
    they will find another solution to get their job done. Even if that solution does
    not work as well as it might have using the database, it can be very difficult
    to remove or optimize it later. Usually, such solutions have long ranging repercussions
    in application functionality, performance, or both.


    ## The Database Design Challenge


    Database management systems excel at storing, searching, and transforming data.
    When combined with a well-designed data model, they will perform each of these
    tasks faster than any application method. Here is the challenge: a database system
    must be well designed to perform and to continue to perform even as it is placed
    under increasing demands of more users or more data. It takes time to design a
    database system that will scale to support these demands. When shortcuts are taken
    in the design process, the database system will fail to meet performance requirements;
    this usually leads to a major redesign or hardware expenditure. Both of these
    options represent waste and inefficiency: the redesign requires extra time and
    effort, and even if the hardware is able to bring the system up to acceptable
    performance levels, think of how much more capable the system could have been
    with a good design AND powerful hardware.


    ## The Path Forward: Embrace Change


    This all sounds quite discouraging: if customers don''t know what they want, don''t
    accurately describe their processes, and will misuse a tool to minimize their
    workload, software developers and the applications they build seem doomed to fail.
    You can''t create a good design up front because you don''t have a complete picture
    of what the application and data will eventually become, and even if you did have
    complete and accurate information about the final requirements at the beginning
    of the project, you don''t have time for data modeling and system design when
    the competition is aiming for the same customer base. Yet if the database design
    is flawed, your users will be unhappy with system response time and your project
    will be plagued with slow response time and system crashes.


    There is another option. You can do something revolutionary: you can recognize
    that change is inevitable, prepare for it and manage it. If you expect change,
    or better yet, encourage it and learn from it, you open up the possibility that
    you will create exactly what the customer needs. If you watch the end user perform
    their work rather than ask them to describe it, you will find the pain points
    in the current process and you may be able to remove those pain points easily.
    This gives you an opportunity to truly innovate and build tools your users need
    but no one has thought of. If you build your applications with customer involvement,
    getting new functionality in their hands early in the process, requesting feedback
    and then using that feedback to improve the application early in the development
    process, the result is a collaborative process and a better product. If you watch
    the customer use the tools you build, you will find even more ways to improve
    your products. This is called *iterative design* and I believe it leads to better
    products, happier customers, and a more satisfying work environment for software
    developers.'
