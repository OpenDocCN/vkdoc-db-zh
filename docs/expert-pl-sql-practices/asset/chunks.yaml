    ## 关于作者


    ![images](images/square.jpg) **John Beresniewicz** 是 Oracle 位于加州红木城总部的技术员工顾问成员。他于
    2002 年加入 Oracle，从事数据库性能领域的企业管理器工作，并在诊断与调优包、真实应用测试、支持工作台和 Exadata 的设计中扮演了重要角色。多年来，他经常在
    Oracle Openworld 和其他会议上就数据库性能和 PL/SQL 编程发表演讲。他是 *Oracle Built-in Packages*（O''Reilly
    & Associates, 1998）的合著者之一，与 Steven Feuerstein 合作，并且是 OakTable 网络的创始成员。


    ![images](images/square.jpg) **Adrian Billington** 是一名从事应用设计、开发和性能调优的顾问，自 1999
    年以来一直使用 Oracle 数据库。他是 [www.oracle-developer.net](http://www.oracle-developer.net)
    网站的创建者，该网站为 Oracle 开发人员提供了大量关于 SQL 和 PL/SQL 特性、实用程序和技术的资源。Adrian 也是 Oracle ACE
    和 OakTable 网络的成员。他与妻子 Anji 以及三个孩子 Georgia、Oliver 和 Isabella 居住在英国。


    ![images](images/square.jpg) **Martin Büchi** 自 2004 年起担任 Avaloq 的首席软件架构师。Avaloq
    是一家基于 Oracle RDBMS 构建标准化银行软件的供应商，其代码库包含 1100 万行 PL/SQL。他与两位同事一起定义系统架构，并审查 170
    名全职 PL/SQL 开发人员的构架和代码，追求简洁、高效和健壮性。Martin 定期在 Oracle 会议上发表演讲。2009 年，他被 *Oracle
    Magazine* 评为年度 PL/SQL 开发者。在接触 Oracle 数据库之前，Martin 从事面向对象系统、形式化方法和近似记录匹配方面的工作。他拥有瑞士联邦理工学院的硕士学位和芬兰图尔库计算机科学中心的博士学位。闲暇时，Martin
    喜欢与家人进行各种户外运动。


    ![images](images/square.jpg) **Melanie Caffrey** 是 Oracle 公司的高级开发经理，为不同客户的业务需求提供前端和后端
    Oracle 解决方案。她是多本技术出版物的合著者，包括 *Oracle Web Application Programming for PL/SQL Developers,
    Oracle DBA Interactive Workbook,* 以及 *Oracle Database Administration: The Complete
    Video Course*，均由 Prentice Hall 出版。她曾在纽约市哥伦比亚大学的计算机技术与应用项目中授课，教授高级 Oracle 数据库管理和
    PL/SQL 开发课程。她也是 Oracle 会议上的常客。


    ![images](images/square.jpg) **Ron Crisco** 28 年来一直担任软件设计师、开发人员和项目负责人，并有 21 年使用
    Oracle 数据库的经验。他在 Method R Corporation 工作，负责设计和开发软件、管理软件产品（如 Method R Profiler,
    MR Tools, 和 MR Trace）、提供咨询和授课。他的专长是简化复杂工作，这在帮助周围的人完成非凡任务时尤其有价值。'
