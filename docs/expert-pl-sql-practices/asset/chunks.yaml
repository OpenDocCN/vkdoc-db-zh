  trans: "\n\n#### 使用 SQL 替代方案\n\n然而，PL/SQL 函数比纯 SQL 表达式或内置函数更快的情况相当罕见。你应该考虑是否可能或值得将应用程序中一些关键的（使用了\
    \ PL/SQL 函数的）查询更改为使用纯 SQL 替代方案。如果你正在开发新应用程序，那么你有一个很好的机会从一开始就内置高性能。\n\n当然，这里需要考虑一些因素，如果以下任何一项为真，你可能会决定倾向于使用某些\
    \ PL/SQL 函数而不是 SQL 实现：\n\n*   一个 PL/SQL 函数并不被频繁使用。\n*   一个 PL/SQL 函数过于复杂，难以用 SQL\
    \ 轻松表达。\n*   一个 SQL 语句并未展现出我描述的任何问题。\n*   你需要修改的 SQL 量太大，或者回归测试的成本过高。\n\n我将演示使用\
    \ SQL 带来的性能优势，并提供一些你可以用来重构那些关键 SQL 语句（甚至可以考虑作为新应用程序的标准）的替代技术。\n\n##### 使用 SQL\n\
    \n在清单 9-12 中，我运行了一个销售报告，该报告导致 `GET_RATE` PL/SQL 函数被执行了超过 918,000 次。我演示了同一报告的纯\
    \ SQL 实现（即与 `RATES` 表的一个简单连接）将该查询的运行时间从 66 秒减少到了仅 1 秒（逻辑 I/O 也大幅减少）。纯 SQL 技术对于使用更快的\
    \ PL/SQL 函数（例如那些不包含任何 SQL 的函数）的查询的运行时间也能产生影响。\n\nSQL 是一种极其灵活且功能丰富的语言，用于快速处理数据集。假设性能是你的目标，你可以使用诸如分析函数、子查询分解以及内置函数的广泛运用等\
    \ SQL 技术来将你的 PL/SQL 函数重构为 SQL（有关 SQL 创新用法的示例，请访问 OTN SQL 和 PL/SQL 论坛或 [`http://oraqa.com/`](http://oraqa.com/)）。\n\
    \n##### 使用视图\n\n支持保留 PL/SQL 函数的一个论点是，它们封装并集中了应用程序逻辑，防止相同的规则在代码库中扩散。也存在其他的封装方法，例如使用视图，它额外提供了\
    \ SQL 性能的优势。在清单 9-26 中，我通过将按日历年和产品的销售报告从使用 `GET_RATE` PL/SQL 函数改为使用视图进行了转换，其中逻辑被封装在\
    \ SQL 表达式中。\n\n**清单 9-26.** 在视图中封装函数逻辑\n\n```sql\nSQL> CREATE VIEW sales_rates_view\n\
    \  2  AS\n  3     SELECT s.*\n  4     ,      s.amount_sold * (SELECT r.exchange_rate\n\
    \  5                             FROM   rates r\n  6                         \
    \    WHERE  r.base_ccy   = 'USD'\n  7                             AND    r.target_ccy\
    \ = 'GBP'\n  8                             AND    r.rate_date  = s.time_id) AS\
    \ amount_sold_gbp\n  9     FROM   sales     s;\n\n视图已创建。\n```\n\n通过这个视图，我将 `GET_RATE`\
    \ PL/SQL 函数转换成了一个标量子查询查找。整个汇率转换现在被投影为单个列。我使用了标量子查询而不是与 `RATES` 的简单连接，以利用视图的一个称为“列消除”的优化。有了这个优化，标量子查询只会在查询中引用\
    \ `AMOUNT_SOLD_GBP` 列时才会执行。这意味着不需要转换后汇率的查询也可以利用这个视图而没有性能损失，从而扩大了其重用范围。使用此视图时销售报告的计时和统计信息如清单\
    \ 9-27 所示。\n\n**清单 9-27.** 利用视图中的列消除（未使用列消除）\n\n```sql\nSQL> SELECT t.calendar_year\n\
    \  2  ,      p.prod_name\n  3  ,      SUM(s.quantity_sold)   AS qty_sold\n  4\
    \  ,      SUM(s.amount_sold)     AS amt_sold_usd\n  5  ,      SUM(s.amount_sold_gbp)\
    \ AS amt_sold_gbp\n  6  FROM   sales_rates_view s\n  7  ,      times         \
    \   t\n  8  ,      products         p\n  9  WHERE  s.time_id    = t.time_id\n\
    \ 10  AND    s.prod_id    = p.prod_id\n 11  GROUP  BY\n         t.calendar_year\n\
    \ 12  ,      p.prod_name;\n\n已选择 272 行。\n\n已用时间: 00:00:01.29\n\n执行计划\n----------------------------------------------------------\n\
    Plan hash value: 625253124\n\n------------------------------------------------------------\n\
