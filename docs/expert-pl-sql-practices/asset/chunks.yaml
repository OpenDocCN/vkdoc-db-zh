    `  7   end loop;`

    `  8  end;`

    `  9  /`


    `PL/SQL procedure successfully completed.`


    `Elapsed: 00:00:04.52`


    Before moving into the bulk binding version, it’s worth nothing that Oracle insertion
    performance, even single row at a time, is exceptional. But the database can do
    better. Let’s move on to the bulk binding version (`bulk_insert_bind.sql`) and
    insert those 100,000 rows with a single call.


