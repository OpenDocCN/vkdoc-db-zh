- fmt: "### Identify Your Goals\n\nNow that you have a basic understanding of what\
    \ parallel processing, how it differs from distributed processing, and what underlying\
    \ computer architectures may be available to support parallel procedures, you'll\
    \ need to understand your problem set and what you are trying to achieve with\
    \ parallel procedures. One of the first things you should consider is whether\
    \ or not you are trying to speed up an existing process or deal with varying size\
    \ data sets of an ever increasing nature.\n\n#### Speedup\n\nSpeedup is the concept\
    \ of taking a process that runs in a serial fashion, modifying it to run in parallel,\
    \ and assessing how much faster it runs. It is defined as the ratio of the time\
    \ to run serially vs. the time to run in parallel.\n\n`SpeedUp = Time to Run Serially\
    \ / Time to Run in Parallel`\n\nIdeally, you'd like your parallelization effort\
    \ to be as efficient as possible. As an example, if you write your parallel process\
    \ to use five processors instead of one, you'd expect to see the process finish\
    \ in 1/5^(th) the time of the serial process. Unfortunately, there are overheads\
    \ associated with partitioning the data set and tasks into pieces that can be\
    \ processed by the parallel procedures, as well as activities to assemble the\
    \ result. These tasks add to the time required by the parallel procedure, resulting\
    \ in speedups that are not 100% efficient with regard to the number of processors\
    \ applied to the problem. If those tasks represent 10% of the serial runtime,\
    \ then the maximum possible speedup is only 10 times. This is the basis of Amdahl's\
    \ Law.\n\n#### Scaling Up\n\nScaling up is the concept of processing larger and\
    \ larger tasks within a relatively constant time window. It can be defined as\
    \ the ratio of the task size that can be handled within a time window for the\
    \ parallel process vs. the serial process.\n\n`Scale = Size of Overall Task Accomplished\
    \ in Parallel / Size of Task Accomplished in Serial`\n\nIdeally, you'd like to\
    \ be able to increase the size of the task you want to process with every addition\
    \ of a processor. As an example, if you write a parallel procedure that can perform\
    \ 100 task items with four processors, you'd like that procedure to be able to\
    \ perform 125 task items if you add a fifth processor. 100% scalability would\
    \ mean that there is no decrease in the incremental number of task items you can\
    \ accomplish when adding every new processor or computing node; this typically\
    \ only applies when the incremental set of task items is purely independent of\
    \ all other task items. If that's not the case, you'll achieve somewhat less than\
    \ 100% scalability. However, there are many instances where task item independence\
    \ is possible, and you should challenge yourself to identify those cases. This\
    \ is particularly useful when considering how to design your system to handle\
    \ an increase in the order of magnitude for the data it needs to process. Thinking\
    \ about how to process a multifold increase in dataset sizes within a reasonably\
    \ fixed amount of time will force you to consider ways to parallelize your processing.\
    \ This is the basis of Gustafson's Law.\n\n#### Degree of Parallelism\n\nWhen\
    \ taking a serial task and splitting into parallel task items, you can make decisions\
    \ about how many task items you'd like to have running at the same time. This\
    \ level of concurrency is called the `degree of parallelism` and is often referred\
    \ to by the acronym `DOP`.\n\nYou'd think that it would be a good idea to simply\
    \ set the `DOP` to the number of parallel task items; for example, if you can\
    \ divide a serial process into 12 tasks, you'd like to run all 12 at once. However,\
    \ there may be situations where you'd like to only run three tasks at a time in\
    \ four batches, perhaps to reduce the resource consumption of the system while\
    \ the parallel task is running. You should carefully consider how busy you want\
    \ your system to be when handling parallel tasks. If you decide to set the `DOP`\
    \ to less than the number of task items, the remaining items will wait—a situation\
    \ known as `parallel queuing`.\n\n### Candidate Workloads for Parallel Processing\n\
    \nNow that you've got a handle on what your goals are for particular processes\
    \ (speed up or scaling up), it's time to look at what kinds of workload you are\
    \ dealing with and what will be the overall system impact of converting them to\
    \ parallel processes.\n\nIt's important to understand that converting any serial\
    \ process to a parallel process increases the resource consumption of your system\
    \ during the time that the parallel processes are running. This is easy to picture\
    \ in your mind if you use the example of the grocery store from the introduction.\
    \ If you image a store that only allows one person in at a time, you can see that\
    \ for any given time period, the store isn't very busy. But if you allow shoppers\
    \ to shop in parallel, you can see that the store is much more busy during a specific\
    \ time window. Another way to look at this is by measuring something like the\
    \ CPU utilization of your system while the serial process is running and multiply\
    \ that by the degree of parallelism you're considering for your tasks; you'll\
    \ need to make sure that you have enough CPU to handle your desired parallel workload.\
    \ This is particularly important when considering introducing parallelism into\
    \ an already running system.\n\n#### Parallelism and OLTP\n\nOnline transaction\
    \ processing systems are usually characterized by high-volume, high-concurrency,\
    \ short transactions that perform minimal amounts of work. These work units are\
    \ typically independent, such as orders placed by individual customers. For the\
    \ most part, customers' activities are independent from each other and therefore\
    \ can run in parallel.\n\nWhile not strictly parallel processing in that you're\
    \ not taking a large task and breaking it down into smaller independent task units,\
    \ OLTP activity does achieve higher system resource utilization by allowing multiple\
    \ tasks to run concurrently at the same time. Well designed OLTP systems fully\
    \ utilize all CPUs and CPU cores on SMP and clustered database servers, leaving\
    \ little excess idle CPU. However, you may be tempted to further break down individual\
    \ OLTP transactions into sub-tasks that can be parallelized.\n\nFor example, let's\
    \ say you have an online shopping web site and some of your customers buy from\
    \ you in bulk; perhaps they act as wholesalers. These customers may have shopping\
    \ carts that contain thousands of items—many more than the average casual consumer.\
    \ Processing the items in these carts (perhaps to calculate the taxable nature\
    \ of each item) may take longer than you'd like; you want the experience to be\
    \ similar to the ones for your casual customers. If possible, you may want to\
    \ process the cart items in parallel, perhaps with a small degree of parallelism\
    \ into order to make the cart “feel” like it's 4-5 times smaller than it really\
    \ is. This is certainly possible, but you'll need to be careful not to swamp your\
    \ system with extra concurrent workload. Examine your system's CPU utilization\
    \ to see if you can handle the extra concurrency associated with your parallel\
    \ algorithm. It may be possible to engage a small degree of parallelism for extra\
    \ large carts.\n\n```pseudo\nif (cart.size() > threshold) {\n    parallel_process(cart.items,\
    \ degree_of_parallelism=4);\n}\n```"
  raw: '### Identify Your Goals


    Now that you have a basic understanding of what parallel processing, how it differs
    from distributed processing, and what underlying computer architectures may be
    available to support parallel procedures, you''ll need to understand your problem
    set and what you are trying to achieve with parallel procedures. One of the first
    things you should consider is whether or not you are trying to speed up an existing
    process or deal with varying size data sets of an ever increasing nature.


    #### Speedup


    Speedup is the concept of taking a process that runs in a serial fashion, modifying
    it to run in parallel, and assessing how much faster it runs. It is defined as
    the ratio of the time to run serially vs. the time to run in parallel.


    `SpeedUp = Time to Run Serially / Time to Run in Parallel`


    Ideally, you''d like your parallelization effort to be as efficient as possible.
    As an example, if you write your parallel process to use five processors instead
    of one, you''d expect to see the process finish in 1/5^(th) the time of the serial
    process. Unfortunately, there are overheads associated with partitioning the data
    set and tasks into pieces that can be processed by the parallel procedures, as
    well as activities to assemble the result. These tasks add to the time required
    by the parallel procedure, resulting in speedups that are not 100% efficient with
    regard to the number of processors applied to the problem. If those tasks represent
    10% of the serial runtime, then the maximum possible speedup is only 10 times.
    This is the basis of Amdahl''s Law.


    #### Scaling Up


    Scaling up is the concept of processing larger and larger tasks within a relatively
    constant time window. It can be defined as the ratio of the task size that can
    be handled within a time window for the parallel process vs. the serial process.


    `Scale = Size of Overall Task Accomplished in Parallel / Size of Task Accomplished
    in Serial`


    Ideally, you''d like to be able to increase the size of the task you want to process
    with every addition of a processor. As an example, if you write a parallel procedure
    that can perform 100 task items with four processors, you''d like that procedure
    to be able to perform 125 task items if you add a fifth processor. 100% scalability
    would mean that there is no decrease in the incremental number of task items you
    can accomplish when adding every new processor or computing node; this typically
    only applies when the incremental set of task items is purely independent of all
    other task items. If that''s not the case, you''ll achieve somewhat less than
    100% scalability. However, there are many instances where task item independence
    is possible, and you should challenge yourself to identify those cases. This is
    particularly useful when considering how to design your system to handle an increase
    in the order of magnitude for the data it needs to process. Thinking about how
    to process a multifold increase in dataset sizes within a reasonably fixed amount
    of time will force you to consider ways to parallelize your processing. This is
    the basis of Gustafson''s Law.


    #### Degree of Parallelism


    When taking a serial task and splitting into parallel task items, you can make
    decisions about how many task items you''d like to have running at the same time.
    This level of concurrency is called the *degree of parallelism* and is often referred
    to by the acronym DOP.


    You''d think that it would be a good idea to simply set the DOP to the number
    of parallel task items; for example, if you can divide a serial process into 12
    tasks, you''d like to run all 12 at once. However, there may be situations where
    you''d like to only run three tasks at a time in four batches, perhaps to reduce
    the resource consumption of the system while the parallel task is running. You
    should carefully consider how busy you want your system to be when handling parallel
    tasks. If you decide to set the DOP to less than the number of task items, the
    remaining items will wait—a situation known as *parallel queuing.*


    ### Candidate Workloads for Parallel Processing


    Now that you''ve got a handle on what your goals are for particular processes
    (speed up or scaling up), it''s time to look at what kinds of workload you are
    dealing with and what will be the overall system impact of converting them to
    parallel processes.


    It''s important to understand that converting any serial process to a parallel
    process increases the resource consumption of your system during the time that
    the parallel processes are running. This is easy to picture in your mind if you
    use the example of the grocery store from the introduction. If you image a store
    that only allows one person in at a time, you can see that for any given time
    period, the store isn''t very busy. But if you allow shoppers to shop in parallel,
    you can see that the store is much more busy during a specific time window. Another
    way to look at this is by measuring something like the CPU utilization of your
    system while the serial process is running and multiply that by the degree of
    parallelism you''re considering for your tasks; you''ll need to make sure that
    you have enough CPU to handle your desired parallel workload. This is particularly
    important when considering introducing parallelism into an already running system.


    #### Parallelism and OLTP


    Online transaction processing systems are usually characterized by high-volume,
    high-concurrency, short transactions that perform minimal amounts of work. These
    work units are typically independent, such as orders placed by individual customers.
    For the most part, customers'' activities are independent from each other and
    therefore can run in parallel.


    While not strictly parallel processing in that you''re not taking a large task
    and breaking it down into smaller independent task units, OLTP activity does achieve
    higher system resource utilization by allowing multiple tasks to run concurrently
    at the same time. Well designed OLTP systems fully utilize all CPUs and CPU cores
    on SMP and clustered database servers, leaving little excess idle CPU. However,
    you may be tempted to further break down individual OLTP transactions into sub-tasks
    that can be parallelized.


    For example, let''s say you have an online shopping web site and some of your
    customers buy from you in bulk; perhaps they act as wholesalers. These customers
    may have shopping carts that contain thousands of items—many more than the average
    casual consumer. Processing the items in these carts (perhaps to calculate the
    taxable nature of each item) may take longer than you''d like; you want the experience
    to be similar to the ones for your casual customers. If possible, you may want
    to process the cart items in parallel, perhaps with a small degree of parallelism
    into order to make the cart “feel” like it''s 4-5 times smaller than it really
    is. This is certainly possible, but you''ll need to be careful not to swamp your
    system with extra concurrent workload. Examine your system''s CPU utilization
    to see if you can handle the extra concurrency associated with your parallel algorithm.
    It may be possible to engage a small degree of parallelism for extra large carts.'
  trans: "\n### 明确目标\n\n现在，你已经对并行处理有了基本了解，知道它与分布式处理的区别，以及可能支持并行程序的底层计算机架构，接下来你需要理解你的问题集，以及你希望通过并行处理实现什么。首先需要考虑的事情之一是，你是想加快现有流程的处理速度，还是想处理规模不断增长的、多变的数据集。\n\
    \n#### 加速\n\n加速的概念是：将一个以串行方式运行的过程修改为并行运行，并评估其运行速度提升了多少。它的定义是串行运行时间与并行运行时间的比值。\n\
    \n`加速比 = 串行运行时间 / 并行运行时间`\n\n理想情况下，你希望并行化工作的效率尽可能高。例如，如果你编写的并行程序使用了五个处理器而不是一个，你可能期望该程序的完成时间是串行程序的\
    \ 1/5。不幸的是，将数据集和任务分割成可由并行程序处理的片段，以及汇总结果的活动，都会带来开销。这些任务增加了并行程序所需的时间，导致加速比相对于应用于该问题的处理器数量而言，并非\
    \ 100% 高效。如果这些任务占串行运行时间的 10%，那么最大可能的加速比就只有 10 倍。这就是阿姆达尔定律的基础。\n\n#### 扩展\n\n扩展的概念是在相对恒定的时间窗口内处理越来越大的任务。它可以定义为并行进程在时间窗口内可处理的任务规模与串行进程可处理的任务规模之比。\n\
    \n`扩展度 = 并行完成的任务总规模 / 串行完成的任务规模`\n\n理想情况下，你希望每增加一个处理器，就能增加需要处理的任务规模。例如，如果你编写了一个使用四个处理器可以处理\
    \ 100 个任务项的并行程序，那么你希望该程序在增加第五个处理器时能够处理 125 个任务项。100% 的可扩展性意味着，每增加一个新的处理器或计算节点，你能完成的增量任务项数量不会减少；这通常只适用于增量任务集完全独立于所有其他任务项的情况。如果情况并非如此，你将获得略低于\
    \ 100% 的可扩展性。然而，在许多情况下，任务项独立是可能的，你应该努力识别这些情况。这对于考虑如何设计系统以处理所需处理数据量级的增长特别有用。思考如何在合理固定的时间内处理数据集规模成倍增加的问题，将迫使你考虑如何将处理过程并行化。这就是古斯塔夫森定律的基础。\n\
    \n#### 并行度\n\n当将串行任务拆分为并行任务项时，你可以决定希望同时运行多少个任务项。这种并发级别被称为 `并行度`，通常缩写为 `DOP`。\n\
    \n你可能会认为，直接将 `DOP` 设置为并行任务项的数量是个好主意；例如，如果你可以将一个串行进程划分为 12 个任务，你可能希望一次性运行所有 12\
    \ 个任务。然而，在某些情况下，你可能希望一次只运行三个任务，分四批进行，也许是为了在并行任务运行时减少系统的资源消耗。你应该仔细考虑希望系统在处理并行任务时达到多繁忙的程度。如果你决定将\
    \ `DOP` 设置为小于任务项的数量，那么剩余的任务项将会等待——这种情况被称为 `并行排队`。\n\n### 并行处理的候选工作负载\n\n现在你已经掌握了特定进程的目标（加速或扩展），是时候看看你正在处理何种工作负载，以及将它们转换为并行进程将对系统整体产生什么影响。\n\
    \n重要的是要理解，将任何串行进程转换为并行进程都会在并行进程运行期间增加系统的资源消耗。这很容易通过引言中杂货店的例子想象出来。想象一个商店一次只允许一个人进入，你会发现任何给定时间段内，商店都不太繁忙。但如果你允许购物者并行购物，你可以看到在特定的时间窗口内，商店要繁忙得多。另一种看待这个问题的方式是，在串行进程运行时测量系统的\
    \ CPU 利用率等指标，并将其乘以你为任务考虑的并行度；你需要确保有足够的 CPU 来处理你期望的并行工作负载。在考虑将并行性引入已运行的系统时，这一点尤其重要。\n\
    \n#### 并行性与 OLTP\n\n联机事务处理系统通常具有高吞吐量、高并发性、执行最小工作量的短事务的特点。这些工作单元通常是独立的，例如单个客户下的订单。在大多数情况下，客户的活动彼此独立，因此可以并行运行。\n\
    \n虽然这并非严格意义上的并行处理——因为你不是将一个大任务分解成更小的独立任务单元——但 OLTP 活动确实通过允许多个任务同时并发运行，实现了更高的系统资源利用率。设计良好的\
    \ OLTP 系统能充分利用 SMP 和集群数据库服务器上的所有 CPU 及 CPU 核心，几乎没有闲置的 CPU。然而，你可能会倾向于进一步将单个 OLTP\
    \ 事务分解为可并行化的子任务。\n\n例如，假设你有一个在线购物网站，部分客户向你批量采购；他们可能是批发商。这些客户的购物车中可能包含成千上万的商品——远多于普通消费者。处理这些购物车中的商品（例如计算每件商品的应税性质）可能需要比你期望更长的时间；你希望他们的体验与普通客户的体验相似。如果可能，你可能希望并行处理购物车中的商品，或许采用较低的并行度，以使购物车“感觉”比实际小\
    \ 4-5 倍。这当然是可能的，但你需要小心，不要让额外的并发工作负载压垮你的系统。检查你系统的 CPU 利用率，看看是否能处理与你的并行算法相关的额外并发量。对于超大型购物车，采用较低的并行度可能是可行的。\n\
    \n```pseudo\nif (cart.size() > threshold) {\n    parallel_process(cart.items,\
    \ degree_of_parallelism=4);\n}\n```\n"
- fmt: '#### Parallelism and Non-OLTP Workloads


    Non-OLTP workloads like large reports, statistical analysis (perhaps to measure
    something like customer churn), or period full-scale data processing activities
    (like producing a periodic invoice for every customer or mass-mailing specific
    customers) generally lend themselves well to parallel processing activities.


    These kinds of activities may include examining large amounts of data in parallel
    to identify particular items for processing, building interim summary results,
    or updating batches of rows. They also may perform activities like transforming
    large amounts of data in parallel. Generally these kinds of activities are run
    on system or time windows specifically set aside for this kind of processing,
    so that there is plenty of CPU available. You''ll know that these systems are
    ripe for parallel exploitation if the serial job takes a long time to run, but
    the system''s overall CPU utilization remains low or shows that very few of the
    available processors are actually being used.


    ### The MapReduce Programming Model


    MapReduce is a programming model for processing large data sets in parallel. The
    programming model is simple in that primitives are defined in such a way as to
    process `chunks` of data in an independent fashion, leading to the ability to
    process those chunks in parallel. The model begins by "sharding" or splitting
    the data into sets that are passed to map functions. A `map` function typically
    takes a set of input data and produces sets of key/value pairs which can then
    be handed to a set of `reduce` functions which perform aggregation of the mapped
    lists. The model has become popular due to its generic primitives, which have
    been used to perform a wide variety of tasks related to text scanning and filtering.


    Many new database systems support MapReduce primitives as a way to perform large-scale
    aggregation and filtering tasks. If you''re familiar with the paradigm, I''ll
    take you through how to implement it in PL/SQL over the next few pages.


    ### Before Looking to PL/SQL


    It''s often good to remember that the database can automatically parallelize many
    SQL DML and DDL operations without requiring any special PL/SQL programming. You
    may want to examine these options before attempting to manually parallelize your
    procedures to see if the automatic parallelism gives you the benefit you''re looking
    for. You''ll exploit some of the architectural underpinnings of the automatic
    parallelism in the examples, but first it might be useful for you to become familiar
    with what''s available. Oracle calls this architecture `parallel execution` and
    it can be applied to several different kinds of operations.


    - `Parallel Query`: Large queries involving scans across full tables and partitions
    can have those scans performed in parallel, including table scans, index fast
    full scans, and partitioned index range scans. Join methods such as nested loops,
    sort merge joins, hash joins, and star transformations can also be parallelized.
    Aggregation and set processing methods including `GROUP BY`, `NOT IN`, `UNION`,
    `UNION ALL`, `CUBE`, and `ROLLUP` can be parallelized, too.

    - `Parallel DML`: `INSERT AS SELECT`, `UPDATE`, `DELETE`, and `MERGE` operations
    all can be performed in parallel, including the ability to insert into multiple
    tables with a single DML statement.

    - `Parallel DDL`: `CREATE TABLE AS SELECT`, `CREATE INDEX`, `REBUILD INDEX`, `REBUILD
    INDEX PARTITION`, and `MOVE`, `SPLIT`, or `COALESCE PARTITION` can all be run
    in parallel.


    As always, you should spend the time to make sure your serial operation is as
    efficient as possible before looking to parallel alternatives. While parallel
    execution may result in faster execution time, you should be wary of the efficiencies
    associated with speedup and scaling up, as covered earlier in this chapter. Since
    most parallelization techniques are less than 100% efficient, you''ll be introducing
    extra resource consumption into your system, so you''ll want to make sure that
    the extra consumption is worth the benefits. This is especially important for
    systems that tend to run near 100% utilization; you may want to see if you can
    recoup the overhead of parallelization by running more efficient serial-type operations.


    ### Processes Available for Parallel Activities


    Now that you''ve decided to try to implement a parallel process in PL/SQL, it''s
    useful to understand your execution options. Since the database enables concurrent
    activity to occur through sessions that usually map to individual connections
    and operating system processes, you''ll need to become familiar with which operating
    system processes can support your procedure. There are three options available.


    - `Parallel Execution Servers`: These processes are sometimes called parallel
    query slaves and are automatically configured by the database to support parallel
    execution of SQL statements. Generally set by the parameters `parallel_min_servers`
    and `parallel_max_servers` to set up a pool of operating system processes for
    each database instance.

    - `Job Queue Processes`: Using the `DBMS_JOB` or `DBMS_SCHEDULER` package, you
    can submit PL/SQL routines to be run by server job queue processes in an asynchronous
    manner. While there is no guarantee how many processes will be available at any
    time, the maximum number is controlled by the `job_queue_processes` parameter.

    - `User Session Processes`: By manually creating your own operating system processes
    that establish connections to the database, you can create your own parallel processing
    support framework. You would need to control the degree of parallelism and task
    management outside of the database or by using database data structures.


    In this chapter, you''re only going to examine the use of the `parallel execution
    servers` (through the use of parallel pipelined functions) to support your parallel
    PL/SQL routines.


    ### Using Parallel Execution Servers for MapReduce


    So far you''ve seen that Oracle (specifically the Enterprise Edition) has several
    different options for parallel operations against tables, specifically in the
    areas of parallel query, where table data is divided among parallel execution
    servers for filtering, joining, and sorts. While that option appears attractive,
    how can you use it with PL/SQL?


    The answer lies in the ability for the database to treat a PL/SQL function that
    returns values as a pseudo-table; this ability is called PL/SQL `pipelined functions`
    and first appeared Oracle 9i*.* Prior to Oracle9i, it was possible to `CAST` a
    PL/SQL function as a collection type and select from it, but that process required
    instantiating the entire result set in memory prior to returning any data from
    it. The memory needed for holding the full result set made it infeasible for the
    large problems you''re considering for parallelization. The answer to that issue
    is the pipelined function.'
