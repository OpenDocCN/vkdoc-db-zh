    second array entry with a value of -1 is the problem row. However, this is because
    the example is so trivial. There is no information from the actual error message
    that reveals which array entry was the cause—just that one or more of the entries
    have violated the constraint. In Oracle 9, this was addressed by extending the
    bulk bind syntax to add the `SAVE EXCEPTIONS` clause. The error still occurs,
    but additional information to allow diagnosis of which array entries are in error.
    Let’s amend the example as follows (`bulk_error_3.sql`) to demonstrate how to
    use `SAVE EXCEPTIONS`:


    `SQL> declare`

    `  2    type t_list is table of hardware.item%type;`

    `  3    l_rows t_list := t_list(1,-1,2,3,4,-2);`

    `  4  begin`

    `5    forall i in 1 .. l_rows.count` ***`save exceptions`***

    `  6      insert into hardware ( item ) values (l_rows(i));`

    `  7  end;`

    `  8  /`

    `ERROR:`

    `ORA-24381: error(s) in array DML`

    `ORA-06512: at line 5`


    At first glance, it appears not much has been achieved, but this example demonstrates
    that a new exception is raised (`ORA-24381`) rather than the previous constraint
    violation (`ORA-02290`). By handling this particular bulk bind exception, I gain
    access to a number of special attributes that allow drilling down into the errors.
    For example, the following code (`bulk_error_4.sql`) introduces more code into
    the exception handler to reveal the true cause of the error:


    `SQL> set serverout on`

    `SQL> declare`

    `  2    type t_list is table of hardware.item%type;`

    `  3    l_rows t_list := t_list(1,-1,2,3,4,-2);`

    `  4`

    `  5    bulk_bind_error exception;`

    `  6    pragma exception_init(bulk_bind_error,-24381);`

    `  7`

    `  8  begin`

    `  9    forall i in 1 .. l_rows.count save exceptions`

    ` 10      insert into hardware ( item ) values (l_rows(i));`

    ` 11`

    ` 12  exception`

    ` 13    when bulk_bind_error then`

    ` 14      dbms_output.put_line(`

    ` 15         ''There were ''||sql%bulk_exceptions.count||'' errors in total'');`

    ` 16      for i in 1 .. sql%bulk_exceptions.count loop`

    ` 17         dbms_output.put_line(`

    ` 18            ''Error ''||i||'' occurred at array index:''||`

    ` 19             sql%bulk_exceptions(i).error_index);`

    ` 20         dbms_output.put_line(''- error code:''||`

    ` 21             sql%bulk_exceptions(i).error_code);`

    ` 22         dbms_output.put_line(''- error text:''||`

    ` 23             sqlerrm(-sql%bulk_exceptions(i).error_code));`

    ` 24      end loop;`

    ` 25`

    ` 26  end;`

    ` 27  /`

    `There were 2 errors in total`

    `Error 1 occurred at array index:2`

    `- error code:2290`

    `- error text:ORA-02290: check constraint (.) violated`

    `Error 2 occurred at array index:6`

    `- error code:2290`

    `- error text:ORA-02290: check constraint (.) violated`


    `PL/SQL procedure successfully completed.`


    When the `SAVE EXCEPTIONS` syntax is used within a `FORALL`, any errors become
    available within a new collection named `SQL%BULK_EXCEPTIONS` that contains a
    row for each error. Each row in that new collection contains the following:


    *   `error_index:` The index from the collection used in the FORALL

    *   `error_code:` The oracle error code; note that the error code is positive
    (unlike the `SQLCODE` built-in function in PL/SQL).


    ![images](images/square.jpg) **Tip** Take care with older versions of the Oracle
    documentation. Some code examples position the SQL%BULK_EXCEPTIONS inline within
    the code, directly under the FORALL statement, thus suggesting that an exception
    will not be raised. As seen from the previous demo, you must code the references
    to SQL%BULK_EXCEPTIONS collection within your exception handler code section.


    Also, since the `SQL%BULK_EXCEPTIONS` attribute is a collection, multiple errors
    can be caught and handled. In the previous example, because the exception handler
    did not re-raise the error back to the calling environment, the successfully inserted
    rows are still retained within the table.


    `SQL> select item from HARDWARE;`


    `         X`

    `----------`

    `         1`

    `         2`

    `         3`

    `         4`'
  trans: "\n# 使用批量绑定时的错误处理\n\n使用批量绑定能带来巨大的好处。但在一个需要格外注意的方面是错误处理。在逐行修改行的开发模型中，当某条 SQL\
    \ 语句执行失败时，有问题的行是隐含的——它就是你正在处理的那一行。\n\n## 逐行处理 vs. 批量错误的模糊性\n\n例如，在下面这个包含两条 `insert`\
    \ 语句的简单 PL/SQL 块 (`bulk_error_1.sql`) 中，很容易看出是哪条 `insert` 语句出了问题：\n\n```sql\n\
    SQL> alter table hardware\n  2    add constraint\n  3    hardware_chk check (\
    \ item > 0 );\n\nTable altered.\n\nSQL> begin\n  2    insert into hardware ( item\
    \ )  values (1);\n  3    insert into hardware ( item ) values (-1);\n  4    insert\
    \ into hardware ( item ) values (2);\n  5    insert into hardware ( item ) values\
    \ (3);\n  6    insert into hardware ( item ) values (4);\n  7    insert into hardware\
    \ ( item ) values (-2);\n  8  end;\n  9  /\nbegin\n*\nERROR at line 1:\nORA-02290:\
    \ check constraint (MCDONAC.HARDWARE_CHK) violated\nORA-06512: at line 3\n```\n\
    \n当你转向以批量方式修改行时，情况会变得稍微复杂一些，因此需要更加谨慎。单个 `FORALL` 语句可能涉及处理数百行数据。当将前面的例子用批量模式重复时\
    \ (`bulk_error_2.sql`)，就无法立即看出是哪一行导致了错误。\n\n```sql\nSQL> declare\n  2    type\
    \ t_list is table of hardware.item%type;\n  3    l_rows t_list := t_list(1,-1,2,3,4,-2);\n\
    \  4  begin\n  5    forall i in 1 .. l_rows.count\n  6      insert into hardware\
    \ ( item ) values (l_rows(i));\n  7  end;\n  8  /\ndeclare\n*\nERROR at line 1:\n\
    ORA-02290: check constraint (MCDONAC.HARDWARE_CHK) violated\nORA-06512: at line\
    \ 5\n```\n\n与正常的语句级操作一样，默认行为是回滚整个批量绑定操作。因此，即使数组中的一行数据是有效的，目标表中也不会有任何行存在。\n\n```sql\n\
    SQL> select count(*) from HARDWARE;\n\nno rows selected.\n```\n\n## PL/SQL 中的隐式回滚行为\n\
    \n请注意，更改的回滚本身并不是批量绑定的属性；它是 PL/SQL 事务管理的一个标准部分。关于 PL/SQL 的一个常见误解是，它只是一系列独立 SQL\
    \ 语句的包装器。因此，在第一个例子中，当第二条 `insert` 语句失败时，\n\n```sql\nbegin\n  insert into DEMO\
    \ values (1);\n  insert into DEMO values (-1);\nend;\n```\n\n开发者会感到有必要采取补救措施来撤销第一条\
    \ `insert`。在 PL/SQL 模块中，经常可以看到类似下面这样的异常处理代码：\n\n```sql\nbegin\n  insert into DEMO\
    \ values (1);\n  insert into DEMO values (-1);\nexception\n  when others then\n\
    \    rollback;\n    raise;\nend;\n```\n\n**没有要求执行这样的回滚**。此外，这种回滚通常会导致应用程序中的数据损坏。PL/SQL\
    \ 块会隐式创建一个保存点。因此，无论错误发生在 PL/SQL 块中的哪个位置，块中的所有更改都会自动回滚到一个点，就好像这个 PL/SQL 例程从未被调用过一样。这种行为是\
    \ PL/SQL 真正强大的特性之一。很少有其他语言能让事务管理变得如此简单。\n\n## 使用 `SAVE EXCEPTIONS` 子句\n\n现在回到批量绑定的例子，通过简单的代码检查可以看出是值为\
    \ -1 的第二个数组条目导致了问题。然而，这是因为这个例子非常简单。错误信息本身并没有揭示是哪个数组条目引起的——只说明有一个或多个条目违反了约束。\n\n\
    在 Oracle 9 中，通过扩展批量绑定语法来添加 `SAVE EXCEPTIONS` 子句解决了这个问题。错误仍然会发生，但会提供额外的信息，以便诊断出哪些数组条目出错。让我们如下修改示例\
    \ (`bulk_error_3.sql`) 来演示如何使用 `SAVE EXCEPTIONS`：\n\n```sql\nSQL> declare\n  2\
    \    type t_list is table of hardware.item%type;\n  3    l_rows t_list := t_list(1,-1,2,3,4,-2);\n\
    \  4  begin\n  5    forall i in 1 .. l_rows.count save exceptions\n  6      insert\
    \ into hardware ( item ) values (l_rows(i));\n  7  end;\n  8  /\nERROR:\nORA-24381:\
    \ error(s) in array DML\nORA-06512: at line 5\n```\n\n乍一看，似乎没取得什么进展，但这个例子表明，现在抛出的是一个新的异常\
    \ (`ORA-24381`)，而不是之前的约束违反错误 (`ORA-02290`)。通过处理这个特定的批量绑定异常，我可以访问一些特殊的属性，从而深入探究错误原因。\n\
    \n## 访问错误集合\n\n例如，下面的代码 (`bulk_error_4.sql`) 在异常处理器中引入了更多代码，以揭示错误的真正原因：\n\n```sql\n\
    SQL> set serverout on\nSQL> declare\n  2    type t_list is table of hardware.item%type;\n\
    \  3    l_rows t_list := t_list(1,-1,2,3,4,-2);\n  4\n  5    bulk_bind_error exception;\n\
    \  6    pragma exception_init(bulk_bind_error,-24381);\n  7\n  8  begin\n  9 \
    \   forall i in 1 .. l_rows.count save exceptions\n 10      insert into hardware\
    \ ( item ) values (l_rows(i));\n 11\n 12  exception\n 13    when bulk_bind_error\
    \ then\n 14      dbms_output.put_line(\n 15          'There were '||sql%bulk_exceptions.count||'\
    \ errors in total');\n 16      for i in 1 .. sql%bulk_exceptions.count loop\n\
    \ 17         dbms_output.put_line(\n 18            'Error '||i||' occurred at\
    \ array index:'||\n 19             sql%bulk_exceptions(i).error_index);\n 20 \
    \        dbms_output.put_line('- error code:'||\n 21             sql%bulk_exceptions(i).error_code);\n\
    \ 22         dbms_output.put_line('- error text:'||\n 23             sqlerrm(-sql%bulk_exceptions(i).error_code));\n\
    \ 24      end loop;\n 25\n 26  end;\n 27  /\nThere were 2 errors in total\nError\
    \ 1 occurred at array index:2\n- error code:2290\n- error text:ORA-02290: check\
    \ constraint (.) violated\nError 2 occurred at array index:6\n- error code:2290\n\
    - error text:ORA-02290: check constraint (.) violated\n\nPL/SQL procedure successfully\
    \ completed.\n```\n\n当在 `FORALL` 中使用 `SAVE EXCEPTIONS` 语法时，任何错误都会在一个名为 `SQL%BULK_EXCEPTIONS`\
    \ 的新集合中可用，该集合为每个错误包含一行。该新集合中的每一行包含以下内容：\n\n*   `error_index:` 在 `FORALL` 中使用的集合的索引\n\
    *   `error_code:` Oracle 错误代码；请注意错误代码是正数（与 PL/SQL 中的 `SQLCODE` 内置函数不同）。\n\n> **提示**\
    \ 注意 Oracle 文档的旧版本。一些代码示例将 `SQL%BULK_EXCEPTIONS` 的引用直接内联在代码中，紧接在 `FORALL` 语句下面，这暗示着不会引发异常。如前一个演示所示，你必须在异常处理代码部分编写对\
    \ `SQL%BULK_EXCEPTIONS` 集合的引用。\n\n此外，由于 `SQL%BULK_EXCEPTIONS` 属性是一个集合，可以捕获和处理多个错误。在前面的例子中，因为异常处理器没有将错误重新抛回调用环境，所以成功插入的行仍然保留在表中。\n\
    \n```sql\nSQL> select item from HARDWARE;\n\n         X\n----------\n        \
    \ 1\n         2\n         3\n         4\n```\n"
- fmt: "#### SAVE EXCEPTIONS with Batches\n\nAs described earlier, when bulk binding\
    \ a large number of rows, you will be processing the rows in smaller size chunks\
    \ to avoid consuming excessive session PGA memory. But if you are bulk binding\
    \ in batches, then each `FORALL` call will re-initialize the `SQL%BULK_EXCEPTIONS`\
    \ structure. So, in this circumstance, the structure can’t be used to house the\
    \ entire set of rejected rows during a series of bulk bind calls. One possible\
    \ workaround is to catch any errors out of each bulk bind call, save them to a\
    \ table, then process the next batch of 1,000 rows. An example (`bulk_error_5.sql`)\
    \ of this approach is presented below:\n\n```sql\nSQL> create table ERRS\n  2\
    \    ( error_index   number(6),\n  3      error_code    number(6),\n  4      item\
    \          number );\n\nTable created.\n\nSQL> set serverout on\nSQL> declare\n\
    \  2    type t_list is table of hardware.item%type;\n  3    l_rows t_list := t_list(1,-1,2,3,4,-2);\n\
    \  4\n  5    bulk_bind_error exception;\n  6    pragma exception_init(bulk_bind_error,-24381);\n\
    \  7\n  8    type t_err_list is table of ERRS%rowtype index by pls_integer;\n\
    \  9    l_err_list t_err_list;\n 10\n 11  begin\n 12    forall i in 1 .. l_rows.count\
    \ save exceptions\n 13      insert into hardware ( item ) values (l_rows(i));\n\
    \ 14\n 15  exception\n 16    when bulk_bind_error then\n```\n\nIf there are rows\
    \ in error, then a new structure (`l_err_list`) is populated with all of the information\
    \ from the `sql%bulk_exceptions` collection.\n\n```sql\n 17      for i in 1 ..\
    \ sql%bulk_exceptions.count loop\n 18         l_err_list(i).error_index := sql%bulk_exceptions(i).error_index;\n\
    \ 19         l_err_list(i).error_code := sql%bulk_exceptions(i).error_code;\n\
    \ 20         l_err_list(i).item := l_rows(sql%bulk_exceptions(i).error_index);\n\
    \ 21      end loop;\n```\n\nThen these will saved into the `ERRS` table, using\
    \ bulk bind, of course!\n\n```sql\n 22      forall i in 1 .. l_err_list.count\n\
    \ 23         insert into ERRS values l_err_list(i);\n 24\n 25  end;\n 26  /\n\n\
    PL/SQL procedure successfully completed.\n\nSQL> select * from errs;\n\nERROR_INDEX\
    \ ERROR_CODE       ITEM\n----------- ---------- ----------\n          2      \
    \ 2290          -1\n          6       2290          -2\n```\n\n#### LOG ERRORS\
    \ Clause\n\nAlternatively, you can achieve something similar by converting your\
    \ code to a pure SQL approach and take advantage of the `LOG ERRORS` clause. From\
    \ 10g onwards, if the DML operation you were planning to use bulk bind for can\
    \ be expressed natively in SQL, you can catch errors in a similar fashion to the\
    \ `SAVE EXCEPTIONS` clause. The DDL and code below are contained in `bulk_log_errors.sql`.\n\
    \nFirst, create a table to catch any errors using the supplied `DBMS_ERRLOG` package.\n\
    \n```sql\nSQL> exec DBMS_ERRLOG.CREATE_ERROR_LOG('HARDWARE');\n\nPL/SQL procedure\
    \ successfully completed.\n```\n\nThis execution creates a table with the columns\
    \ from the `HARDWARE` table, plus additional columns to indicate what kind of\
    \ error has occurred. Here’s what the resulting table will look like:\n\n```sql\n\
    SQL> desc err$_HARDWARE\n Name                       Null?    Type\n --------------------------\
    \ -------- ----------------\n ORA_ERR_NUMBER$                     NUMBER\n ORA_ERR_MESG$\
    \                       VARCHAR2(2000)\n ORA_ERR_ROWID$                      ROWID\n\
    \ ORA_ERR_OPTYP$                      VARCHAR2(2)\n ORA_ERR_TAG$             \
    \           VARCHAR2(2000)\n AISLE                               VARCHAR2(4000)\n\
    \ ITEM                                VARCHAR2(4000)\n DESCR                 \
    \              VARCHAR2(4000)\n STOCKED                             VARCHAR2(4000)\n\
    ```\n\nThen execute the SQL statement with the additional log error clause to\
    \ capture errors, like so:\n\n```sql\nSQL> insert\n  2  into HARDWARE ( item )\n\
    \  3  with SRC_ROWS as\n  4    ( select -3 + rownum     x from dual\n  5     \
    \ connect by level <= 6 )\n  6  select x\n  7  from SRC_ROWS\n  8  log errors\
    \ reject limit unlimited;\n```\n\n3 rows created.\n\nYou’ll find that, similar\
    \ to the bulk bind example (`bulk_bind_error_5.sql`), the erroneous rows have\
    \ been captured along with the reason for the error.\n\n```sql\nSQL> select\n\
    \  2   item\n  3  ,ora_err_number$\n  4  ,ora_err_mesg$\n  5  from err$_HARDWARE;\n\
    \nITEM  ORA_ERR_NUMBER$ ORA_ERR_MESG$\n----- --------------- ------------------------------------------------------------\n\
    -2               2290 ORA-02290: check constraint (MCDONAC.HARDWARE_CHK) violated\n\
    -1               2290 ORA-02290: check constraint (MCDONAC.HARDWARE_CHK) violated\n\
    0                2290 ORA-02290: check constraint (MCDONAC.HARDWARE_CHK) violated\n\
    ```\n\nA complete coverage of the `LOG ERRORS` extension is beyond the scope of\
    \ this book, but the previous example demonstrates how it can be used in a very\
    \ similar fashion to the `SAVE EXCEPTIONS` feature in PL/SQL, with the added benefit\
    \ of having the erroneous data readily available within a table for further processing.\n\
    \n#### Robust Bulk Bind\n\nWhen you bulk collect into a collection, the array\
    \ is populated from index 1. Almost all of the examples in the standard documentation\
    \ make this assumption, the code typically being along the lines of:\n\n```sql\n\
    begin\n  select ...\n  bulk collect into <array>\n  from ...\n\n  for i in 1 ..\
    \ <array>.count loop\n    <processing>\n  end loop;\nend;\n```\n\nIt is very unlikely\
    \ that Oracle will ever change this behavior, so its reasonably safe to assume\
    \ that any collection initialized with `bulk collect` will always start at an\
    \ array index of 1. However, collections don’t fall solely under the domain of\
    \ the `bulk collect`/`bulk bind` feature in PL/SQL. In fact, collections pre-date\
    \ bulk operations, going all the way back to Oracle 7. Once data has been fetched\
    \ into a collection, the developer is free to do whatever they like to the contents\
    \ of a collection. So what happens to a bulk bind operation if the collection\
    \ no longer contains a set of elements starting from `index=1`. Let’s explore\
    \ some scenarios.\n\n##### Scenario 1: Elements Do Not Start at 1\n\nAs long as\
    \ an array’s indices are contiguous, you can use the attributes of the array itself\
    \ to continue to use bulk bind. Consider the following example (`bulk_bind_scenario1.sql`)\
    \ where the array starts from 10. The array attributes `FIRST` and `LAST` can\
    \ be used to define the extrema of the array for bulk binding.\n\n```sql\nSQL>\
    \ declare\n  2    type t_num_list is table of hardware.item%type index by pls_integer;\n\
    \  3\n  4    val t_num_list;\n  5  begin\n  6\n  7    val(10) := 10;\n  8    val(11)\
    \ := 20;\n  9    val(12) := 20;\n 10\n 11    FORALL i IN val.first .. val.last\n\
    \ 12       insert into hardware ( item ) values (val(i));\n 13\n 14  end;\n 15\
    \  /\n\nPL/SQL procedure successfully completed.\n```\n\nIn fact, it’s probably\
    \ reasonable to adopt a standard that `.FIRST` and `.LAST` attributes should be\
    \ used in preference to `1` and `.COUNT`. However, the next scenario demonstrates\
    \ that doing so does not provide a total safeguard."
