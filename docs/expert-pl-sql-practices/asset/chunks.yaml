    # 演化式数据建模


    ## 理念阐述


    尽管前面描绘的图景充满挑战，但我相信你的目标是可以实现的——关键不是减少在数据库管理系统（DBMS）中的工作。要创建一个敏捷的开发环境和一个真正敏捷的应用程序数据库，最好的方法是在数据库内部编码更多功能，并充分利用
    DBMS 最擅长的工作类型。你的数据库设计需要随着开发团队、客户和最终用户不断变化的需求而演进和适应。你需要在一条精细的线上行走：构建当前所需，同时放眼未来并为之准备。这就是为什么我更喜欢“演化式数据建模”这个术语，而非“迭代式数据建模”。“迭代”意味着设计周期在整个开发过程中重复：这是一个好的开始，但还不够。“演化”也意味着持续的变化，但伴随演化，每一次变化都建立在迄今已创建的基础之上。当设计演进时，你认识到它应该能够扩展以满足尚未完全定义的需求。你仍然不想在需求出现之前就构建功能，但也不应该以“你不会需要它”（YGANI）的名义做出限制未来选项的选择。你做出的一些设计决策会为后续设计阶段创造更多选项，而另一些则会移除选项，并限制下一轮开发中的潜在解决方案。在你确定接下来要发生什么之前，请做出尽可能保留更多开放选项的选择。


    ![images](img/square.jpg) `Note` 据我所知，“演化式数据建模”这个术语起源于 Scott W. Ambler 在其网站 `agiledata.org`
    上的内容。他还合著了一本书《重构数据库：演化式数据库设计》，其中包含了一些适用于敏捷开发的优秀方法论。本章描述的实现易于重构数据库的方法，与迄今为止我所看到的
    Ambler 先生提出的任何建议都不同。


    ## 案例分析


    例如，一个开发项目的数据库是从客户提供的 .csv 文件加载的。该文件中大约一半的列在第一轮功能规范中没有明确的用途。开发团队对于如何处理这些多余字段分成了两种观点。一方认为，所有不需要的列都应该被移除，因为它们没有被积极使用。另一方则认识到，尽管这些字段未被使用，但其值与应用程序核心数据值有明确的关系。他们认为这些字段可能有助于团队更好地理解所需数据以及最终用户如何处理这些数据。


    这些不必要的字段被保留了下来。虽然它们看起来像是核心表中数据的父值，但解决方案是将这些字段保留为属性，以便可以进一步评估关系，而不会给数据库开发人员带来额外的工作（以及后续的返工）。这个决定打破了传统数据建模的几条规则：表中包含了不必要的数据，并且模式中的某些数据未被规范化。由于核心表仍然很小且宽度合理，违反规则的影响微乎其微。几个版本之后，客户开始提及这些未使用的字段，这证实了先前怀疑的关系。随着新功能的请求，这些数据值逐渐被整合到应用程序中，有些数据值移动到了父表，而另一些则作为属性保留下来。过早移除数据会限制团队的选择。如果过早地将数据正式整合到模式中，保留数据则可能造成返工。在这种情况下，以对影响最小化的形式保留数据，同时为日后使用敞开大门，是更好的决策。


    ## 后续内容预告


    在下一节，你将看到演示简单模式变更的代码，以及此类变更如何在典型的开发环境中产生连锁反应。接下来，你将研究为什么使用 PL/SQL 作为 API 通过使得在不影响其他应用程序组件的情况下更轻松地重构数据库设计，从而支持演化式设计。之后，你将回顾一些敏捷开发概念，并讨论演化式数据建模和
    PL/SQL API 如何支持敏捷开发的价值观和原则。

