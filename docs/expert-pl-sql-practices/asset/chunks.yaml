    ''TYPE BODY'')`

    `      CONNECT BY PRIOR usage_id = usage_context_id`

    `         AND PRIOR name = p_object`

    `         AND name = p_unit`

    `         AND prior usage_context_id != 0 )  cnctby_vw`

    `  WHERE ai.usage_id = cnctby_vw.prior_usagectx_id`

