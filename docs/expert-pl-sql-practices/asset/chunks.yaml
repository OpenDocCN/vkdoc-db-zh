    \ It was opened with a REF cursor, and PL/SQL can’t cache such cursors. The output\
    \ also demonstrates one hard parse and (therefore) 1,999 soft parses. The second\
    \ parse was done by finding the already existing plan in the shared pool’s library\
    \ cache. Optimally, you should see `parse =1` but it is not unusual to see `parse\
    \ = execute = N`.\n\n### Dynamic REF Cursors\n\nDynamic REF cursors are, for all\
    \ practical purposes, very similar to static REF cursors, except for a few notable\
    \ differences. The query for a dynamic REF cursor is not known until runtime *and*\
    \ is also built dynamically. You may ask how this is different from static REF\
    \ cursors, since a static REF cursor’s query is also not known until runtime.\
    \ Strongly-typed REF cursors cannot be dynamically opened. Weakly-typed REF cursors\
    \ can be dynamically opened.\n\n#### Example and Best Use\n\nConsider the example\
    \ in [Listing 10-11](#Chapter10.html#list_10_11) that outlines a procedure that\
    \ uses a dynamic REF cursor:\n\n`Listing 10-11.` A Procedure That Uses a Dynamic\
    \ REF Cursor (11.2.0.1)\n\n```\nPROCEDURE get_concepts (ip_input      IN  NUMBER,\n\
                            ip_con_type   IN  VARCHAR2,\n                        ip_con_dt     IN  DATE,\n\
                            ip_con_cat    IN  VARCHAR2,\n                        op_rc        OUT  my_cv)\n\
    IS\n    lv_query VARCHAR2 (512) DEFAULT 'SELECT * FROM prod_concepts';\n    BEGIN\n\
             IF ( ip_con_type IS NOT NULL )\n            lv_query := lv_query ||\n\
                '  WHERE concept_type LIKE ''%''||:ip_con_type||''%'' ';\n         ELSE\n\
                lv_query := lv_query ||\n            ' WHERE (1 = 1 OR :ip_con_type\
    \ IS NULL) ';\n         END IF;\n         IF ( ip_con_dt IS NOT NULL )\n            lv_query\
    \ := lv_query ||\n            '  AND concept_dt < :ip_con_dt ';\n         ELSE\n\
                lv_query := lv_query ||\n            ' AND (1 = 1 OR :ip_con_dt IS\
    \ NULL) ';\n         END IF;\n         IF ( ip_con_cat IS NOT NULL )\n            lv_query\
    \ := lv_query ||\n            '  AND concept_category LIKE ''%''||:ip_con_cat||''%''\
    \ ';\n         ELSE\n            lv_query := lv_query ||\n            ' AND (1\
    \ = 1 OR :ip_con_cat IS NULL) ';\n         END IF;\n            OPEN op_rc FOR\n\
                    lv_query USING ip_con_type, ip_con_dt, ip_con_cat;\n\n    END\
    \ get_concepts;\n```\n\nSo, how is this version of the `get_concepts` procedure\
    \ different from the one illustrated in [Listing 10-9](#Chapter10.html#list_10_9)?\
    \ To begin with, unlike the static `OPEN-FOR` version, the dynamic version has\
    \ an *optional* `USING` clause—*optional* because it would also be possible to\
    \ code this procedure using literals, as opposed to bind variables, similar to\
    \ the following:\n\n```\n'SELECT * FROM prod_concepts\n  WHERE concept_type  =\
    \ ''||COLLATERAL||''\n    AND concept_dt    < ''||TO_CHAR(''''01-JAN-2003''',\
    \ '''DD-MON-YYYY''')||''';'\n```\n\nObviously, this appears to be a non-ideal\
    \ and cumbersome way to build your query. It would also lead to the dreaded hard\
    \ parse since all queries would be unique, which would *kill* performance. If\
    \ it is necessary to build a dynamic query of any kind, ask the reasons for doing\
    \ so. You need dynamic SQL in the following situations:\n\n*   You want to execute\
    \ a SQL data definition statement (such as `CREATE`), a data control statement\
    \ (such as `GRANT`), or a session control statement (such as `ALTER SESSION`).\
    \ In PL/SQL, such statements cannot be executed via static SQL.\n*   You want\
    \ more flexibility. For example, you might want to wait until runtime to choose\
    \ which schema objects you use. Or, you might want your program to build different\
    \ search conditions for the `WHERE` clause of a `SELECT` statement as is being\
    \ done in [Listing 10-11](#Chapter10.html#list_10_11). Dynamically building a\
    \ `WHERE` clause is a very common reason to use dynamic SQL. A more complex program\
    \ might choose from various SQL operations, clauses, etc.\n\nIf you don’t need\
    \ to perform any of the above, but you do need a REF cursor, then you should definitely\
    \ use a static REF cursor. If you *do* need to use any of the above, ensure that\
    \ you are using bind variables, as with the first example in [Listing 10-11](#Chapter10.html#list_10_11)."
