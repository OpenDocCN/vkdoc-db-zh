    ### Dynamic REF Cursors


    Dynamic REF cursors are, for all practical purposes, very similar to static REF
    cursors, except for a few notable differences. The query for a dynamic REF cursor
    is not known until runtime *and* is also built dynamically. You may ask how this
    is different from static REF cursors, since a static REF cursor’s query is also
    not known until runtime. Strongly-typed REF cursors cannot be dynamically opened.
    Weakly-typed REF cursors can be dynamically opened.


    #### Example and Best Use


    Consider the example in [Listing 10-11](#Chapter10.html#list_10_11) that outlines
    a procedure that uses a dynamic REF cursor:


    ***Listing 10-11.** A Procedure That Uses a Dynamic REF Cursor (11.2.0.1)*


    `PROCEDURE get_concepts (ip_input      IN  NUMBER,`

    `                        ip_con_type   IN  VARCHAR2,`

    `                        ip_con_dt     IN  DATE,`

    `                        ip_con_cat    IN  VARCHAR2,`

    `                        op_rc        OUT  my_cv)`

    `IS`

    `    lv_query VARCHAR2 (512) DEFAULT ''SELECT * FROM prod_concepts'';`

    `    BEGIN`

    `         IF ( ip_con_type IS NOT NULL )`

    `            lv_query := lv_query ||`

    `            ''  WHERE concept_type LIKE ''''%''''||:ip_con_type||''''%'''' '';`

    `         ELSE`

    `            lv_query := lv_query ||`

    `            '' WHERE (1 = 1 OR :ip_con_type IS NULL) '';`

    `         END IF;`

    `         IF ( ip_con_dt IS NOT NULL )`

    `            lv_query := lv_query ||`

    `            ''  AND concept_dt < :ip_con_dt '';`

    `         ELSE`

    `            lv_query := lv_query ||`

    `            '' AND (1 = 1 OR :ip_con_dt IS NULL) '';`

    `         END IF;`

    `         IF ( ip_con_cat IS NOT NULL )`

    `            lv_query := lv_query ||`

    `            ''  AND concept_category LIKE ''''%''''||:ip_con_cat||''''%'''' '';`

    `         ELSE`

    `            lv_query := lv_query ||`

    `            '' AND (1 = 1 OR :ip_con_cat IS NULL) '';`

    `         END IF;`

    `            OPEN op_rc FOR`

    `                lv_query USING ip_con_type, ip_con_dt, ip_con_cat;`


    `    END get_concepts;`


    So, how is this version of the `get_concepts` procedure different from the one
    illustrated in [Listing 10-9](#Chapter10.html#list_10_9)? To begin with, unlike
    the static `OPEN-FOR` version, the dynamic version has an *optional* `USING` clause—*optional*
    because it would also be possible to code this procedure using literals, as opposed
    to bind variables, similar to the following:


    `''SELECT * FROM prod_concepts`

    `  WHERE concept_type  = ''''||COLLATERAL||''''`

    `    AND concept_dt    < ''''||TO_CHAR(''''''''01-JAN-2003'''''', ''''''DD-MON-YYYY'''''')||'''''';`


    Obviously, this appears to be a non-ideal and cumbersome way to build your query.
    It would also lead to the dreaded hard parse since all queries would be unique,
    which would *kill* performance. If it is necessary to build a dynamic query of
    any kind, ask the reasons for doing so. You need dynamic SQL in the following
    situations:


    *   You want to execute a SQL data definition statement (such as `CREATE`), a
    data control statement (such as `GRANT`), or a session control statement (such
    as `ALTER SESSION`). In PL/SQL, such statements cannot be executed via static
    SQL.

    *   You want more flexibility. For example, you might want to wait until runtime
    to choose which schema objects you use. Or, you might want your program to build
    different search conditions for the `WHERE` clause of a `SELECT` statement as
    is being done in [Listing 10-11](#Chapter10.html#list_10_11). Dynamically building
    a `WHERE` clause is a very common reason to use dynamic SQL. A more complex program
    might choose from various SQL operations, clauses, etc.


    If you don’t need to perform any of the above, but you do need a REF cursor, then
    you should definitely use a static REF cursor. If you *do* need to use any of
    the above, ensure that you are using bind variables, as with the first example
    in [Listing 10-11](#Chapter10.html#list_10_11).'
