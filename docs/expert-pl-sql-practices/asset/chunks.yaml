- fmt: "## Profiling for Performance\n\n**by Ron Crisco**\n\n*Performance* and *profiling*\
    \ are critical words in our everyday conversations in the office where I work,\
    \ in our engagements with clients, and in our teaching. Both words apply equally\
    \ well to all aspects of life, including software engineering and the topic at\
    \ hand, `PL/SQL`.\n\nI first encountered `PL/SQL` at its inception in the beta\
    \ release of `SQL*Forms 3`, Oracle's character-based interactive application development\
    \ tool. Over the years, I have learned much about writing high performance `PL/SQL`\
    \ code, and I am excited to share what I have learned with you.\n\nWhat exactly\
    \ does performance mean in the context of `PL/SQL`? By the end of this chapter,\
    \ my goal is to arm you with the knowledge and understanding needed to win the\
    \ battle against poorly performing code.\n\n> *Amateurs practice until they get\
    \ it right. Professionals practice until they can't get it wrong.*\n> \n> —Anonymous\n\
    \nIn addition to my career in software development and education, I perform professionally\
    \ as a classical musician on the most heroic instrument, the `Horn`. Experts in\
    \ any field share many things in common. Music and software engineering are no\
    \ exception—the more I think about it, the more I find. For example, these two\
    \ fields share a common word: performance. Although at first glance it appears\
    \ to have very different meanings in the two contexts, the word implies some really\
    \ important things about how we go about the business of music and software development.\n\
    \nIn music, performance is defined as an interpretation of a musical composition\
    \ presented before an audience. In software development, performance is defined\
    \ as the manner in which or the efficiency with which software fulfills its intended\
    \ purpose. Both of these definitions explain performance as an end result. In\
    \ music, as the end result of preparation includes learning the fundamental techniques\
    \ of the musician's chosen instrument, learning musical notation in general, learning\
    \ the specific notations of the chosen composition, practicing the specific techniques\
    \ needed for that composition, and then preparing mentally and physically for\
    \ the actual performance. But as a professional musician, I know that performance\
    \ is not simply a single event at the end of this process.\n\n> *Never practice,\
    \ always perform!*\n> \n> —Bud Herseth, Chicago Symphony Orchestra\n\nIn other\
    \ words, I realize that my performance will always sound just like my practice,\
    \ and that's a scary thought unless I practice performing. In order to discover\
    \ ahead of time what my performance will sound like, I need to perform the music\
    \ as if my audience were right there listening as I practice. Only by practicing\
    \ in this way will I be able to assess the parts of the composition on which I\
    \ need to focus improvement efforts.\n\nHow does all of this relate to software\
    \ performance, specifically for software performance of `PL/SQL` code? The real\
    \ key is to be able to look at your software before you put it into production\
    \ using the same perspective as people will use to see it in production. An expert's\
    \ perspective requires understanding of these important concepts: performance,\
    \ profiling, instrumentation, and problem diagnosis.\n\n**A MUSICAL NOTE**\n\n\
    Many English speakers use the word *Horn* to refer to a general category of instruments\
    \ including trumpets, saxophones, and trombones. What is commonly called a *French\
    \ Horn* is neither French in origin or design, and is correctly called the `Horn`.\
    \ See [`http://en.wikipedia.org/wiki/Corno`](http://en.wikipedia.org/wiki/Corno)\
    \ for more information. This may seem insignificant, but to many `Horn` players,\
    \ including me, it's a big deal.\n\nI described the `Horn` as the most heroic\
    \ instrument. When great composers write music for the `Horn`, they take advantage\
    \ of the wide variety of musical expression possible with the instrument. One\
    \ pattern repeats throughout musical history—when the hero enters, the `Horn`\
    \ is most often chosen to provide the musical theme. In the classical repertoire,\
    \ composers like Richard Wagner, Richard Strauss, Pyotr Ilyich Tchaikovsky, and\
    \ Gustav Mahler produced exciting and vivid heroic themes. In the movie music\
    \ of the twentieth century, John Williams, Erich Korngold, and Howard Shore continued\
    \ and expanded the tradition.\n\n### What Is Performance?\n\nThe word *performance*\
    \ in the software context does have a few different meanings, so I'll begin by\
    \ clarifying my use of the word. In the context of `PL/SQL` code specifically—and\
    \ really any code in general—performance can be thought of in four ways.\n\n####\
    \ Functional Requirements\n\nPerformance can sometimes be used to describe the\
    \ extent to which software execution meets the so-called functional specifications\
    \ and requirements defined. If the software program runs to completion without\
    \ any errors, processes input accurately, and produces correct output, then one\
    \ might say that the software performed well. How many times have you wished for\
    \ software that you purchased for your own use to live up to that standard? It\
    \ seems to be a normal expectation, of course, but it's important to see this\
    \ basic part of the definition.\n\n#### Response Time\n\nWriters of requirements\
    \ have learned that there's more to it than that. Performance is also about time.\
    \ Software that completes the work that you expect—but completes in 34 hours when\
    \ you expect completion in minutes—fails the qualitative description of “performs\
    \ well.” When we describe software that performs well, we must introduce the element\
    \ of time in the description. Software requirements are usually expressed in terms\
    \ of a single unit of work, a business task. So the requirement must state the\
    \ expected function of that task and also the expected time it should take for\
    \ the software to complete that task. This is usually referred to as *response\
    \ time*: the duration of an execution of a business task measured in units of\
    \ time.\n\n#### Throughput\n\nBut sometimes it makes more sense to measure performance\
    \ in a different way. *Throughput* is the number of executions of the business\
    \ task that complete within a specified duration. The software requirement for\
    \ an order entry application might state a minimum throughput of 1,000 orders\
    \ entered per hour. That requirement certainly implies some limits on the response\
    \ time of any one specific order, but the metric makes more sense to the business\
    \ manager responsible for the order entry application.\n\nTo the manager, the\
    \ individual response times of each order entered are irrelevant as long as the\
    \ throughput goal is met. To the order entry clerks and the customers on the phone,\
    \ throughput is of no consideration. They only care about the response time of\
    \ one specific order entry task, their own.\n\nOptimizing response time is a necessary\
    \ prerequisite to optimizing throughput, but not sufficient. Getting a response\
    \ time of 1/1,000 second per order doesn't guarantee a throughput of 1,000 orders\
    \ per second. Optimizing throughput also requires attention to queuing delay and\
    \ coherency delay, but a satisfactory treatment of these is beyond the scope of\
    \ this chapter. For a clear explanation, I recommend Cary Millsap's paper called\
    \ “Thinking Clearly About Performance,” which can be downloaded from [`http://method-r.com/downloads/doc_download/44-thinking-clearly-about-performance`](http://method-r.com/downloads/doc_download/44-thinking-clearly-about-performance)."
