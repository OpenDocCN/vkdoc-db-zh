  trans: "\n# 通过 PL/SQL 创建访问层\n\n如果您将模块化、可重用的代码直接创建在数据库本身中，使得对应用数据的所有访问都封装在 PL/SQL\
    \ 包、过程和函数中，会怎么样？清单 12-2 中引用的查询将被整合到一个过程中，如清单 12-4 所示。清单 12-5 展示了执行该过程的代码，而清单 12-6\
    \ 则展示了一次示例执行的结果。此练习创建了一个可由数据库外部组件调用的过程，以返回与清单 12-2 中第一个查询相同的数据。\n\n## 清单 12-4.\
    \ 按部门返回员工数据的过程\n\n```sql\nCREATE OR REPLACE PROCEDURE GetEmployeeData(\n     \
    \  p_dept_id        IN  NUMBER,\n       p_emp_cursor        OUT SYS_REFCURSOR,\n\
    \       p_status_code       OUT NUMBER,\n       p_status_message OUT VARCHAR2)\
    \ IS\n/********************************************************************************\n\
    \    NAME: GetEmployeeData\nPURPOSE: This procedure returns contact information\
    \ for employees by department\n\n  NOTES:\n\n      p_status_code  status_message\n\
    \      ==============  ======================================================\n\
    \                  0  Success\n             -20102  Input parameter p_dept_id\
    \ must not be null.\n\n***************************************************************************************/\n\
    BEGIN -- GetEmployeeData\n\n--validate parameters\nIF ((p_department_id) IS NULL\
    \ ) THEN\n   RAISE_APPLICATION_ERROR(-20102, Input parameter p_dept_id must not\
    \ be null.',TRUE);\nEND IF;\n\nOPEN p_emp_cursor FOR\n   SELECT\n         dept.department_id,\n\
    \         dept.department_name,\n         loc.street_address,\n         loc.city,\n\
    \         loc.state_province,\n         loc.postal_code,\n         cty.country_name,\n\
    \  CURSOR (select emp.employee_id,\n                 emp.last_name,\n        \
    \         emp.first_name,\n                 emp.email,\n                 emp.phone_number\n\
    \            from employees emp\n           where emp.department_id = dept.department_id)\
    \ emp_cursor\n      FROM\n           departments dept, locations loc, countries\
    \ cty\n     WHERE\n           dept.department_id = p_dept_id\n       AND dept.location_id\
    \ = loc.location_id\n       AND loc.country_id = cty.country_id\n     ORDER BY\
    \ 2,3;\n\n  p_status_code:= 0;\n  p_status_message:= NULL;\n\nEXCEPTION\n  WHEN\
    \ OTHERS THEN\n    p_status_code:= SQLCODE;\n    p_status_message:= SQLERRM;\n\
    \nEND GetEmployeeData;\n/\n```\n\n## 清单 12-5. 过程执行脚本\n\n```sql\nset serveroutput\
    \ on\n\n         var p_main_cursor REFCURSOR\n\nDECLARE\n         v_dept_id  \
    \       departments.department_id%TYPE;\n         v_status_code     NUMBER;\n\
    \         v_status_message  VARCHAR2(200);\n\n         t0 timestamp;\n       \
    \  t1 timestamp;\n\nBEGIN\n         t0:= systimestamp;\n\n         v_dept_id :=\
    \ &Department_ID;\n\n  GetEmployeeData\n          (v_dept_id, :p_main_cursor,\
    \ v_status_code, v_status_message);\n\n  t1:= systimestamp;\n\nDBMS_OUTPUT.PUT_LINE('Code='\
    \ || v_status_code || 'Message=' || v_status_message);\nDBMS_OUTPUT.PUT_LINE('ela='\
    \ || (t0 - t1) );\n\nEND;\n/\n\n   print :p_main_cursor\n```\n\n## 清单 12-6. 过程执行及结果集\n\
    \n```sql\nSQL> @exec_GetEmployeeData.prc\n\nEnter value for department_id: 30\n\
    \  old  13:   v_dept_id := &Department_ID;\n  new  13:   v_dept_id := 30;\n  status_code=0\
    \  status_message\n  ela=-000000000 00:00:00.000091000\n\nPL/SQL procedure successfully\
    \ completed.\n\nDEPT_ID DEPT_NAME      STREET_ADDRESS    CITY       STATE    \
    \     EMP_CURSOR\n30      Purchasing     2004 Charade Rd   Seattle    Washington\
    \    CURSOR STATEMENT : 8\n\nCURSOR STATEMENT : 8\n\nEMPLOYEE_ID     LAST_NAME\
    \     FIRST_NAME   EMAIL      PHONE_NUMBER\n        114     Raphaely      Den\
    \          DRAPHEAL   515.127.4561\n        115     Khoo          Alexander  \
    \  AKHOO      515.127.4562\n        116     Baida         Shelli       SBAIDA\
    \     515.127.4563\n        117     Tobias        Sigal        STOBIAS    515.127.4564\n\
    \        118     Himuro        Guy          GHIMURO    515.127.4565\n        119\
    \     Colmenares    Karen        COLMENA    515.127.4566\n\n6 rows selected.\n\
    ```\n\n一旦过程就位，您的重构工作就会改变并变得更加完整。这次您可以创建并填充新表，一旦确定数据已正确填充，就可以删除旧列，移除重复数据以及可能导致不一致条目的隐患。您还可以使用您的执行脚本来完成第一轮测试，验证过程是否执行并返回了预期的结果集。虽然您总能在数据库中测试一个查询，但如果应用程序可能包含自己版本的代码，该测试的价值就有限了。本章稍后，您将学习如何使用模式权限来确保整个应用程序中一致地使用这些过程，从而让您有信心，重构数据库不会影响应用层。现在，请执行清单\
    \ 12-7 中的代码。\n\n## 清单 12-7. 使用 PL/SQL API 的重构练习\n\n```sql\nSQL>  CREATE TABLE\
    \ emp_phone_numbers\n        (employee_id    NUMBER(6)                   NOT NULL,\n\
    \         phone_number   VARCHAR2(20)                NOT NULL,\n         preferred\
    \      VARCHAR2(1)   DEFAULT 'N'   NOT NULL,\n         phone_type     VARCHAR2(10)\
    \                NOT NULL,\n            CONSTRAINT  emp_phone_numbers_pk\n   \
    \         PRIMARY KEY (employee_id, phone_number)\n         ) ;\n\nTable created.\n\
    \nSQL>  alter table EMP_PHONE_NUMBERS add constraint emp_phone_numbers_fk1\n \
    \       foreign key (employee_id)\n        references EMPLOYEES (employee_id)\
    \ ;\n\nTable altered.\n\nSQL> insert into emp_phone_numbers (\n     select employee_id,\
    \ phone_number, 'Y', 'Office'\n      from employees) ;\n\n107 rows created.\n\n\
    SQL> commit;\n\nCommit complete.\n\nSQL> alter table employees drop column phone_number;\n\
    \nTable altered.\n```\n\n随着清单 12-7 中所示的更改完成，您立即实现了目标设计。新表已被创建和填充，旧的数据列已被移除。无需编写代码来保持重复值同步，也无需稍后重新审视此更改以删除旧列及其支持代码。您减少了应用程序和开发团队必须完成的工作。图\
    \ 12-2 展示了您的新模式设计。\n\n![images](img/1202.jpg)\n\n## 图 12-2. 人力资源模式，目标设计\n\n在填充新表并删除旧列后，请务必检查应用程序模式中是否有任何对象因您的更改而失效。清单\
    \ 12-8 将显示，不仅您预期的 `GetEmployeeData` 过程无效，而且有两个触发器也已失效。您需要做的第一件事是查看这些触发器的作用以及它们与\
    \ `EMPLOYEES` 表的关联方式。\n"
- fmt: "## Listing 12-8. 验证并重新编译相关对象\n作为验证更改的一部分，为每个无效的触发器选择源文本，并评估它们如何使用 `EMPLOYEES`\
    \ 表。在 [`Listing 12-8`](#Chapter12.html#list_12_8) 中，您将使用数据字典来查看 [`Listing 12-7`](#Chapter12.html#list_12_7)\
    \ 中的更改如何影响了模式中的其他对象。您将重新编译无效对象并确保所有对象都有效。`UPDATE_JOB_HISTORY` 触发器引用了 `EMPLOYEES`\
    \ 表，但没有引用您移动到另一个表的列。`SECURE_EMPLOYEES` 触发器引用了另一个过程。您将检查 `SECURE_DML` 过程，并验证它也没有使用电话号码数据。这意味着两个触发器都可以按原样重新编译以恢复到有效状态。\n\
    \n```sql\nSQL> select object_type, object_name, status\n       from user_objects\n\
    \      where status = 'INVALID'\n      order by object_type, object_name ;\n\n\
    OBJECT_TYPE   OBJECT_NAME           STATUS\n------------- ---------------------\
    \ -------\nPROCEDURE     GETEMPLOYEEDATA       INVALID\nTRIGGER       SECURE_EMPLOYEES\
    \      INVALID\nTRIGGER       UPDATE_JOB_HISTORY    INVALID\n\n3 rows selected.\n\
    \nSQL> select text\n       from user_source\n      where name = 'UPDATE_JOB_HISTORY'\n\
    \        and type = 'TRIGGER'\n      order by line ;\n\nTEXT\n-------------------------------------------------------------------------\n\
    TRIGGER update_job_history\n       AFTER UPDATE OF job_id, department_id ON employees\n\
    \          FOR EACH ROW\nBEGIN\n  add_job_history(:old.employee_id,\n        \
    \          :old.hire_date,\n                   sysdate,\n                  :old.job_id,\n\
    \                  :old.department_id);\nEND;\n\n7 rows selected.\n\nSQL> alter\
    \ trigger update_job_history compile ;\n\nTrigger altered.\n\nSQL> select text\n\
    \       from user_source\n      where name = 'SECURE_EMPLOYEES'\n        and type\
    \ = 'TRIGGER'\n      order by line ;\n\nTEXT\n--------------------------------------------------------------------------\n\
    TRIGGER secure_employees\n      BEFORE INSERT OR UPDATE OR DELETE ON employees\n\
    BEGIN\n      secure_dml;\nEND secure_employees;\n\n5 rows selected.\n\nSQL> select\
    \ object_type, object_name, status\n             from user_objects\n         \
    \ where object_name = 'SECURE_DML' ;\n\nOBJECT_TYPE  OBJECT_NAME        STATUS\n\
    ------------------- ----------------------- -------\nPROCEDURE    SECURE_DML \
    \         VALID\n\n1 row selected.\n\nSQL> select text\n       from user_source\n\
    \      where name = 'SECURE_DML'\n      order by line ;\n\nTEXT\n-------------------------------------------------------------------------\n\
    PROCEDURE secure_dml\n  IS\nBEGIN\n  IF TO_CHAR (SYSDATE, 'HH24:MI') NOT BETWEEN\
    \ '08:00' AND '18:00'\n  OR TO_CHAR (SYSDATE, 'DY') IN ('SAT', 'SUN') THEN\n \
    \   RAISE_APPLICATION_ERROR (-20205,\n      'You may only make changes during\
    \ normal office hours');\n  END IF;\nEND secure_dml;\n\n9 rows selected.\n\nSQL>\
    \ alter trigger secure_employees compile;\n\nTrigger altered.\n\nSQL> select object_type,\
    \ object_name, status\n       from user_objects\n      where status = 'INVALID'\n\
    \      order by object_type, object_name ;\n\nOBJECT_TYPE   OBJECT_NAME      \
    \ STATUS\n------------- ----------------- ------------\nPROCEDURE     GETEMPLOYEEDATA\
    \   INVALID\n\n1 row selected.\n```\n\n现在，您已经准备好更新 `GetEmployeeData` 过程以使用 `EMP_PHONE_NUMBERS`\
    \ 表；再次强调，使用过程为您提供了在将 SQL 直接编码到应用程序层时所没有的选项。您不会更改此过程以提供客户要求的新功能，而是更改 `select` 语句，使过程返回与过去相同的结果集，但来自新的数据源。这是通过向\
    \ `where` 子句添加一个额外的限制因子来实现的，该子句现在将指定您希望接收每位员工的首选电话号码。另一种选择是指定该过程始终返回员工的办公电话号码。做出此决定的最佳方式是向客户提供行为选择。\n\
    \n请在此处暂停片刻，思考您已完成的工作。您重构了数据库，更改了表定义和数据位置，而没有以任何方式影响前端应用程序。每次应用程序代码调用 `GetEmployeeData`\
    \ 过程时，它的行为都将与以往完全相同。如果应用程序仅使用过程，那么您就知道在分析和测试过程中没有遗漏任何未发现的 `select` 语句片段。更好的是，由于您能够在将更改交付给开发之前测试数据库中的执行情况和结果，因此您可以确信开发人员可以立即高效地完成他们需要完成的实际工作，即整合新功能。\n\
    \n## Listing 12-9. 更改 GetEmployeeData 过程\n现在是进行应用程序更改的时候了，或者至少是更改应用程序调用的过程。[`Listing\
    \ 12-9`](#Chapter12.html#list_12_9) 展示了如何修改 `GetEmployeeData` 过程以使用新表。您将把 `GetEmployeeData`\
    \ 过程更改为使用新的 `EMP_PHONE_NUMBERS` 表来返回员工的首选电话号码。然后，您将执行 [`Listing 12-5`](#Chapter12.html#list_12_5)\
    \ 中的测试脚本，以确认该过程按预期工作。\n\n```sql\nSQL>  CREATE OR REPLACE PROCEDURE GetEmployeeData(\n\
    \             p_dept_id          IN NUMBER,\n             p_emp_cursor       OUT\
    \ SYS_REFCURSOR,\n             p_status_code      OUT NUMBER,\n             p_status_message\
    \   OUT VARCHAR2) IS\n\n/**********************************************************************************\n\
    \    NAME:  GetEmployeeData\nPURPOSE:  This procedure returns contact information\
    \ for employees by department\n\n   NOTES:\n\n  p_status_code  status_message\n\
    \  =============  ============================================================\n\
    \              0  Success\n         -20102  'Input parameter p_dept_id must not\
    \ be null.'\n\n***********************************************************************************/\n\
    BEGIN -- GetEmployeeData\n\n      --validate parameters\n\nIF ((p_dept_id) IS\
    \ NULL ) THEN\n  RAISE_APPLICATION_ERROR(-20102, 'Input parameter p_dept_id must\
    \ not be null.', TRUE);\n    END IF;\n\nOPEN p_emp_cursor FOR\n     SELECT\n \
    \           dept.department_id, dept.department_name,\n            loc.street_address,\n\
    \            loc.city, loc.state_province, loc.postal_code,\n            cty.country_name,\n\
    \     CURSOR (select emp.employee_id,\n                    emp.last_name,\n  \
    \                  emp.first_name,\n                    emp.email,\n         \
    \           eph.phone_number\n               from employees emp, emp_phone_numbers\
    \ eph\n              where emp.department_id = dept.department_id\n          \
    \      and emp.employee_id = eph.employee_id\n                and eph.preferred\
    \ = 'Y'\n              order by emp.employee_id) emp_cursor\n       FROM\n   \
    \          departments dept, locations loc, countries cty\n      WHERE dept.department_id\
    \ = p_dept_id\n        AND dept.location_id = loc.location_id\n        AND loc.country_id\
    \ = cty.country_id ;\n\n  p_status_code:= 0;\n  p_status_message:= NULL;\n```"
  raw: 'As part of verifying your changes, select the source text for each invalid
    trigger and evaluate how they are using the EMPLOYEES table. In [Listing 12-8](#Chapter12.html#list_12_8),
    you''ll use the data dictionary to see how the changes made in [Listing 12-7](#Chapter12.html#list_12_7)
    impacted other objects in the schema. You will recompile the invalid objects and
    ensure all objects are valid. The UPDATE_JOB_HISTORY trigger references the EMPLOYEES
    table, but not the column you''ve moved to another table. The SECURE_EMPLOYEES
    trigger references another procedure. You''ll check the SECURE_DML procedure and
    verify that it is not using the phone number data either. This means both triggers
    can be recompiled as is to restore them to a valid state.


    ***Listing 12-8.** Verifying and Recompiling Related Objects*


    `SQL> select object_type, object_name, status`

    `       from user_objects`

    `      where status = ''INVALID''`

    `      order by object_type, object_name ;`


    `OBJECT_TYPE   OBJECT_NAME           STATUS`

    `------------- --------------------- -------`

    `PROCEDURE     GETEMPLOYEEDATA       INVALID`

    `TRIGGER       SECURE_EMPLOYEES      INVALID`

    `TRIGGER       UPDATE_JOB_HISTORY    INVALID`


    `3 rows selected.`


    `SQL> select text`

    `       from user_source`

    `      where name = ''UPDATE_JOB_HISTORY''`

    `        and type = ''TRIGGER''`

    `      order by line ;`


    `TEXT`

    `-------------------------------------------------------------------------`

    `TRIGGER update_job_history`

    `       AFTER UPDATE OF job_id, department_id ON employees`

    `          FOR EACH ROW`

    `BEGIN`

    `  add_job_history(:old.employee_id,`

    `                  :old.hire_date,`

    `                   sysdate,`

    `                  :old.job_id,`

    `                  :old.department_id);`

    `END;`


    `7 rows selected.`


    `SQL> alter trigger update_job_history compile ;`


    `Trigger altered.`


    `SQL> select text`

    `       from user_source`

    `      where name = ''SECURE_EMPLOYEES''`

    `        and type = ''TRIGGER''`

    `      order by line ;`


    `TEXT`

    `--------------------------------------------------------------------------`

    `TRIGGER secure_employees`

    `      BEFORE INSERT OR UPDATE OR DELETE ON employees`

    `BEGIN`

    `      secure_dml;`

    `END secure_employees;`


    `5 rows selected.`


    `SQL> select object_type, object_name, status`

    `             from user_objects`

    `          where object_name = ''SECURE_DML'' ;`


    `OBJECT_TYPE  OBJECT_NAME        STATUS`

    `------------------- ----------------------- -------`

    `PROCEDURE    SECURE_DML          VALID`


    `1 row selected.`


    `SQL> select text`

    `       from user_source`

    `      where name = ''SECURE_DML''`

    `      order by line ;`


    `TEXT`

    `-------------------------------------------------------------------------`

    `PROCEDURE secure_dml`

    `  IS`

    `BEGIN`

    `  IF TO_CHAR (SYSDATE, ''HH24:MI'') NOT BETWEEN ''08:00'' AND ''18:00''`

    `  OR TO_CHAR (SYSDATE, ''DY'') IN (''SAT'', ''SUN'') THEN`

    `    RAISE_APPLICATION_ERROR (-20205,`

    `      ''You may only make changes during normal office hours'');`

    `  END IF;`

    `END secure_dml;`


    `9 rows selected.`


    `SQL> alter trigger secure_employees compile;`


    `Trigger altered.`


    `SQL> select object_type, object_name, status`

    `       from user_objects`

    `      where status = ''INVALID''`

    `      order by object_type, object_name ;`


    `OBJECT_TYPE   OBJECT_NAME       STATUS`

    `------------- ----------------- ------------`

    `PROCEDURE     GETEMPLOYEEDATA   INVALID`


    `1 row selected.`


    Now you are ready to update the GetEmployeeData procedure to use the EMP_PHONE_NUMBERS
    table; here again, using procedures gives you options that you don''t have when
    you code SQL directly into your application layer. Instead of altering this procedure
    to provide the new functionality requested by your customer, you will change the
    select statement so the procedure returns the same results set as in the past
    but from the new data source. This is accomplished by adding an additional limiting
    factor to the where clause, which will now specify that you wish to receive the
    preferred phone number for each employee. An alternative would be to specify that
    the procedure always return the office number for the employee. The best way to
    make this determination is to offer the customer a choice in behavior.


    Pause here for a moment and consider what you have accomplished. You refactored
    the database, changing the table definitions and the location of the data without
    impacting the front-end application in any way. Every time the application code
    calls the GetEmployeeData procedure, it will behave exactly as it always has.
    If the application uses only procedures, then you know there are no unfound bits
    of select statements missed during your analysis and testing. Even better, since
    you are able to test the execution and the results in the database before you
    deliver the changes to development, you can be certain that development can be
    immediately productive with the real work they need to complete, which is incorporating
    the new functionality.


    Now it''s time to make an application change, or at least to change the procedure
    that the application invokes. [Listing 12-9](#Chapter12.html#list_12_9) shows
    how to modify the GetEmployeeData procedure to use the new table. You''ll change
    the GetEmployeeData procedure to use the new EMP_PHONE_NUMBERS table to return
    the employees preferred phone number. You''ll then execute the test script from
    [Listing 12-5](#Chapter12.html#list_12_5) to confirm the procedure works as expected.


