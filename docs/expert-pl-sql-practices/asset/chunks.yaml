    If you compare this results set to the one just above it, you''ll notice that
    phone number listed for Mr. King is his mobile number. Your goal in any refactoring
    exercise should be to identify the desired behavior in the majority of existing
    application screens and reports, and code the original procedure to return those
    results. The unique cases can be dealt with by adding new procedures or by adding
    additional parameters set to default to the commonly requested value. This will
    minimize the number of application code changes needed to incorporate the changes.


    By approaching the database design and refactor steps to minimize the impact on
    front-end application development, you have truly decoupled the database from
    the application. There is a clean line between database development and application
    development; for the database, this line can be verified and tested in the schema
    or schemas containing application objects. This allows the application developers
    to incorporate new functionality at their own pace, prioritizing their tasks independent
    of the database changes. The database changes will have no impact on the application
    until the developer chooses to call the procedure that returns the new version
    of the data.


    Does this mean that application developers, database developers, and DBAs no longer
    need to work together and communicate? Far from it. In the next section, you''ll
    take a look at the values behind agile and consider some guidelines for making
    the most of PL/SQL in an agile database development environment.


    ## The Agile Manifesto


    A few years ago, I found myself very puzzled by the phrase *agile development*.
    I heard many new terms like *scrum* and *sprint*, bumped into groups of people
    standing in hallways (usually blocking access to wherever I was trying to go),
    and noticed a steady deluge of e-mail about build candidates. At the same time,
    copies of a Dilbert comic strips explaining that specifications, documentation,
    and training were no longer needed because everyone had been trained to be *agile*
    appeared throughout cubicle land. All of this was vaguely entertaining to me until
    I noticed that the Entity Relationship Diagram (ERD) and well-designed database
    schemas had also gone missing in this new world. At that point, I decided it was
    time to learn something about agile.


    Unfortunately, most of my reading turned up very little information about databases.
    The few sources I did find seemed very limited in their understanding of all the
    options available in modern database products and how the use of those options
    impacted database performance. I wondered if the lack of attention to database
    design had been intended by the creators of the agile movement because they did
    not consider it necessary, or if database design had been overlooked because the
    typical use cases in most books dealt with building an application on pre-existing
    databases.


    So I started at the beginning by looking at The Agile Manifesto, shown in Figure
    12-3. I found that I agreed wholeheartedly with both the Manifesto and every one
    of The Twelve Principles supporting it. I also found no reference to scrum, sprints,
    standup meetings, or any desire to obliterate database design. I''ve copied The
    Agile Manifesto below, you can find The Twelve Principles at `agilemanifesto.org`.


    ![images](images/1203.jpg)


    **Figure 12-3.** The Agile Manifesto


    The Agile Manifesto lists four values: *Individuals and Interaction*, *Working
    Software*, *Customer Collaboration*, and *Response to Change*. These first four
    values are comparable to four traditional values: *Processes and Tools*, *Comprehensive
    Documentation*, *Contract Negotiation*, and *Following a Plan*. Notice the phrasing
    of each line. The Manifesto doesn''t state that the second set of values is no
    longer necessary; it simply says that the first set of values are more important.
    Nor does the Manifesto tell you exactly how to achieve agile and there is a reason
    for that. Teams are different, and what works well for one may be detrimental
    to another. Since individuals and interactions are more important than tools and
    processes and are the first value pair listed, you need to recognize that tools
    and processes should support the individuals on the team and encourage interaction
    among the team members. When existing tools and processes do not meet this goal,
    the tools and processes should be changed.'
