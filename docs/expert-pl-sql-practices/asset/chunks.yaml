    headaches by seriously limiting your application’s concurrency and performance.


    #### Other Issues


    I’ve described in some detail the major issues you need to be aware of when using
    PL/SQL functions in SQL. Needless to say, there are others and perhaps you’ve
    encountered a particular corner-case that I haven’t thought of. I’ll complete
    this section with a very brief mention of other issues that you might encounter
    at some stage.


    ##### Parallel Query


    PL/SQL functions can be enabled to work with Oracle Database’s parallel query
    option (PQ). While many PL/SQL functions can be executed by PQ slaves without
    issue, it is sometimes possible to disable PQ by referencing a PL/SQL function
    that is not explicitly parallel-enabled. If you are having trouble parallelizing
    a SQL statement and it contains a PL/SQL function, check to see if the function
    is parallel-enabled. Assuming your PQ hints, session PQ settings, and PQ system
    parameters are valid for parallel query yet it’s simply not “taking,” re-create
    your PL/SQL function to include the PARALLEL_ENABLE clause and try again. Note
    that for a PL/SQL function to be parallel-enabled, it should not reference session
    state variables that a PQ-slave might not be able to access (such as package state).


    ##### NO_DATA_FOUND


    I described this earlier in the commentary for [Listing 9-12](#Chapter09.html#list_9_12)
    but it’s worth reiterating for completeness. A NO_DATA_FOUND exception raised
    in a PL/SQL function called from a SQL statement will not propagate the exception!
    Instead, the function will return NULL.


    ### Reducing the Cost of PL/SQL Functions


    I’ve just spent several pages describing many of the difficulties, costs, and
    pitfalls that you might encounter when using PL/SQL functions. Yet this is a book
    for PL/SQL professionals, so I’m going to spend the remainder of this chapter
    describing a range of techniques to reduce the impact of using PL/SQL functions.


    #### A Sense of Perspective


    Before I continue, I think it is important to give a sense of perspective. Nothing
    in the world of Oracle development and performance is absolute and, fortunately,
    there are times when a basic implementation of a PL/SQL function will be more
    than adequate. [Listings 9-24](#Chapter09.html#list_9_24) and [9-25](#Chapter09.html#list_9_25)
