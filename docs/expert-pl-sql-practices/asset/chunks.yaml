  trans: "\n# 可扩展优化器\n\n我将通过简要概述可扩展优化器，来结束本次向 CBO 提供统计信息的讲解。此功能（Oracle Data Cartridge\
    \ 工具集的一部分）将默认统计信息提升到了一个新的阶段，它通过一种对象类型来关联选择率和成本，而不是像前面提到的那些硬编码的默认值。\n\n要用许多页的篇幅来描述可扩展优化器是可能的，因此我只提供对该技术的概览，向您展示如何构建一个用于估算您的\
    \ PL/SQL 函数统计信息的方法，该方法能够适应您的数据模式。\n\n请看代码清单 9-52。我有一个简单的函数，用于返回大写的产品代码。在没有统计信息的情况下，CBO\
    \ 会假定任何使用此函数的谓词都具有 1% 的选择率，如下所示。\n\n**代码清单 9-52.** PL/SQL 函数谓词的默认选择率\n\n```sql\n\
    SQL> CREATE FUNCTION format_prod_category(\n  2                    p_prod_category\
    \ IN VARCHAR2\n  3                    ) RETURN VARCHAR2 DETERMINISTIC IS\n  4\
    \  BEGIN\n  5     RETURN UPPER(p_prod_category);\n  6  END format_prod_category;\n\
    \  7  /\n\nFunction created.\n\nSQL> SELECT *\n  2  FROM   products\n  3  WHERE\
    \  format_prod_category(prod_category) = 'SOFTWARE/OTHER';\n\nExecution Plan\n\
    ----------------------------------------------------------\nPlan hash value: 1954719464\n\
    \n------------------------------------------------\n| Id  | Operation        \
    \ | Name     | Rows  |\n------------------------------------------------\n|  \
    \ 0 | SELECT STATEMENT  |          |     1 |\n|*  1 |  TABLE ACCESS FULL| PRODUCTS\
    \ |     1 |\n------------------------------------------------\n```\n\nCBO 估计此谓词的基数仅为\
    \ 1 行，但我确切地知道，Software/Other 类别有更多的行，正如代码清单 9-53 中显示的数据概况所示。\n\n**代码清单 9-53.**\
    \ PRODUCTS 表的数据概况\n\n```sql\nSQL> SELECT prod_category\n  2  ,      c        \
    \                                   AS num_rows\n  3  ,      ROUND(RATIO_TO_REPORT(c)\
    \ OVER () * 100, 1) AS selectivity\n  4  FROM   (\n  5         SELECT prod_category\n\
    \  6         ,      COUNT(*) AS c\n  7         FROM   products\n  8         GROUP\
    \  BY\n  9                prod_category\n 10        )\n 11  ORDER  BY\n 12   \
    \      num_rows;\n\nPROD_CATEGORY                     NUM_ROWS SELECTIVITY\n--------------------------------\
    \ ---------- -----------\nHardware                                 2         2.8\n\
    Photo                                   10        13.9\nElectronics          \
    \                   13        18.1\nPeripherals and Accessories             21\
    \        29.2\nSoftware/Other                          26        36.1\n```\n\n\
    您可以看到此数据中的选择率范围很广，因此默认的统计信息解决方案不够灵活，无法覆盖所有类别。因此，您可以使用可扩展优化器为此函数谓词构建一个动态统计信息解析器。如前所述，这是使用一个对象类型实现的，其规范在代码清单\
    \ 9-54 中提供。\n\n**代码清单 9-54.** 为可扩展优化器创建统计信息类型\n\n```sql\nSQL> CREATE TYPE prod_stats_ot\
    \ AS OBJECT (\n  2  \n  3     dummy_attribute NUMBER,\n  4\n  5     STATIC FUNCTION\
    \ ODCIGetInterfaces (\n  6                      p_interfaces OUT SYS.ODCIObjectList\n\
    \  7                      ) RETURN NUMBER,\n  8  \n  9     STATIC FUNCTION ODCIStatsSelectivity\
    \ (\n 10                      p_pred_info       IN  SYS.ODCIPredInfo,\n 11   \
    \                   p_selectivity     OUT NUMBER,\n 12                      p_args\
    \            IN  SYS.ODCIArgDescList,\n 13                      p_start      \
    \     IN  VARCHAR2,\n 14                      p_stop            IN  VARCHAR2,\n\
    \ 15                      p_prod_category   IN  VARCHAR2,\n 16               \
    \       p_env             IN  SYS.ODCIEnv\n 17                      ) RETURN NUMBER,\n\
    \ 18  \n 19     STATIC FUNCTION ODCIStatsFunctionCost (\n 20                 \
    \     p_func_info       IN  SYS.ODCIFuncInfo,\n 21                      p_cost\
    \            OUT SYS.ODCICost,\n 22                      p_args            IN\
    \  SYS.ODCIArgDescList,\n 23                      p_prod_category   IN  VARCHAR2,\n\
    \ 24                      p_env             IN  SYS.ODCIEnv\n 25             \
    \         ) RETURN NUMBER\n 26  );\n 27  /\n\nType created.\n```\n\n可扩展优化器使用定义良好的接口方法，代码清单\
    \ 9-54 使用了生成选择率和成本统计信息所需的三种方法。您必须使用 Oracle 规定的确切方法名称，就像我这样。\n\n参数数据类型和顺序也由可扩展优化器规定，但您可以选择自己的参数名称，只有一个显著的例外。您必须在类型方法中使用与最终将与统计信息类型关联的\
    \ PL/SQL 函数中相同的参数名称。在本例中，我为其构建此统计信息类型的 `FORMAT_PROD_CATEGORY` 函数只有一个名为 `p_prod_category`\
    \ 的参数（因此我在相关方法中包含了它）。\n\n类型主体实现了统计信息类型，可以包含您喜欢的任何逻辑，以使 CBO 能够确定关联的 PL/SQL 函数的选择率和成本。`PROD_STATS_OT.ODCIStatsSelectivity`\
    \ 方法的类型主体在代码清单 9-55 中提供（其余方法可从 Apress 网站获取）。\n\n**代码清单 9-55.** 为可扩展优化器创建统计信息类型（类型主体节选）\n\
    \n```sql\nSQL> CREATE TYPE BODY prod_stats_ot AS\n  2  \n  3     STATIC FUNCTION\
    \ ODCIGetInterfaces ...\n<snip>\n 13     STATIC FUNCTION ODCIStatsSelectivity\
    \ (\n 14                      p_pred_info         IN  SYS.ODCIPredInfo,\n 15 \
    \                     p_selectivity       OUT NUMBER,\n 16                   \
    \   p_args              IN  SYS.ODCIArgDescList,\n 17                      p_start\
    \             IN  VARCHAR2,\n 18                      p_stop              IN \
    \ VARCHAR2,\n 19                      p_prod_category     IN  VARCHAR2,\n 20 \
    \                     p_env               IN  SYS.ODCIEnv\n 21               \
    \       ) RETURN NUMBER IS\n 22     BEGIN\n 23  \n 24        /* Calculate selectivity\
    \ of predicate... */\n 25        SELECT (COUNT(CASE\n 26                     \
    \    WHEN UPPER(prod_category) = p_start\n 27                         THEN 0\n\
    \ 28                      END) / COUNT(*)) * 100 AS selectivity\n 29        INTO\
    \   p_selectivity\n 30        FROM   sh.products;\n 31  \n 32        RETURN ODCIConst.success;\n\
    \ 33     END ODCIStatsSelectivity;\n 34\n 35     STATIC FUNCTION ODCIStatsFunctionCost\
    \ ...\n<snip>\n 76  \n 77  END;\n 78  /\n```\n"
- fmt: "As its name suggests, the `ODCIStatsSelectivity` method is used to calculate\
    \ the selectivity for the associated PL/SQL function predicate for a given set\
    \ of values. How it does this is the interesting part. Imagine that I have a predicate\
    \ of the form `WHERE format_prod_category(p.prod_category) = 'SOFTWARE/OTHER'`.\
    \ When the CBO optimizes this predicate, it invokes the `ODCIStatsSelectivity`\
    \ method and passes the value ‘SOFTWARE/OTHER’ on to the statistics method in\
    \ the `p_start` and `p_stop` parameters. (If you have a range predicate, `p_start`\
    \ and `p_stop` will contain the lower and upper bounds, respectively.) This means,\
    \ therefore, that I can specifically count the number of occurrences of ‘SOFTWARE/OTHER’\
    \ in the `PRODUCTS` table to determine the selectivity, as above.\n\n## Listing\
    \ 9-56. Associating and Using the Statistics Type for Dynamic PL/SQL Function\
    \ Statistics\n\nOnce the statistics type is created, it can be associated with\
    \ the PL/SQL function. [Listing 9-56](#Chapter09.html#list_9_56) demonstrates\
    \ the syntax for associating the statistics type and a couple of small queries\
    \ to show its dynamic nature.\n\n```sql\nSQL> ASSOCIATE STATISTICS WITH FUNCTIONS\
    \ format_prod_category USING prod_stats_OT;\n\nStatistics associated.\n\nSQL>\
    \ SELECT *\n  2  FROM   products\n  3  WHERE  format_prod_category(prod_category)\
    \ = 'SOFTWARE/OTHER';\n\nExecution Plan\n----------------------------------------------------------\n\
    Plan hash value: 1954719464\n\n-----------------------------------------------\n\
    | Id  | Operation         | Name     | Rows  |\n-----------------------------------------------\n\
    |   0 | SELECT STATEMENT  |          |    26 |\n|*  1 |  TABLE ACCESS FULL| PRODUCTS\
    \ |    26 |\n-----------------------------------------------\n\nSQL> SELECT *\n\
    \  2  FROM   products\n  3  WHERE  format_prod_category(prod_category) = 'HARDWARE';\n\
    \nExecution Plan\n----------------------------------------------------------\n\
    Plan hash value: 1954719464\n\n-----------------------------------------------\n\
    | Id  | Operation         | Name     | Rows  |\n-----------------------------------------------\n\
    |   0 | SELECT STATEMENT  |          |     2 |\n|*  1 |  TABLE ACCESS FULL| PRODUCTS\
    \ |     2 |\n-----------------------------------------------\n```\n\nYou can see\
    \ that by using the Extensible Optimizer, I’ve provided accurate and dynamic statistics\
    \ on my PL/SQL function to the CBO (in this example, these match the data profile\
    \ of the `PRODUCTS` table perfectly). Note that the `ODCI*` methods are called\
    \ *once* during the SQL optimization phase (i.e. the “hard parse”) and bind variables\
    \ are also supported (as long as bind-variable peeking is enabled). However, you\
    \ should give some consideration to the time it takes to execute your statistics\
    \ methods and ensure that this is more than offset by the performance improvements\
    \ they provide or by the fact that you reuse the shared cursor many times over.\n\
    \n![images](images/square.jpg) **Note** If you want to see how the CBO invokes\
    \ the statistics type methods to extract the selectivity and costs, you can run\
    \ a 10053 trace and view the resulting trace file.\n\n# Tuning PL/SQL\n\nI’ve\
    \ described many techniques for improving the performance of queries that use\
    \ PL/SQL functions. Unless you are going to eliminate or dramatically reduce your\
    \ PL/SQL function calls, however, you should also consider tuning the functions\
    \ themselves.\n\nYou have a range of tuning options at your disposal (especially\
    \ with later versions of Oracle Database), such as native compilation, subprogram-inlining,\
    \ new integer data types, array fetching, associative array caching, and so on.\
    \ For your critical queries and/or heavily-executed PL/SQL functions, you should\
    \ find that you can reduce their elapsed time by using some of the wide range\
    \ of PL/SQL tuning techniques available to you.\n\nThat said, I’m only going to\
    \ demonstrate a tuning technique involving array-caching here, because it’s closely\
    \ related to the Result Cache option I demonstrated earlier and can have dramatic\
    \ results.\n\n## User-Defined PL/SQL Session Cache\n\nI mentioned earlier that\
    \ caching lookup data in associative arrays is an alternative to the Cross-Session\
    \ PL/SQL Function Result Cache when the built-in feature is not available. There\
    \ are several ways to do this and in [Listing 9-57](#Chapter09.html#list_9_57),\
    \ I have provided one such method. I’ve created a PL/SQL array cache for the rates\
    \ data (using a private global associative array) and provided a single `GET_RATES`\
    \ function to load and access the cached data.\n\n### Listing 9-57. A User-Defined\
    \ PL/SQL Cache for Rates\n\n```sql\nSQL> CREATE OR REPLACE PACKAGE BODY rates_pkg\
    \ AS\n  2  \n  3     /* Index subtype for cache... */\n  4     SUBTYPE key_st\
    \ IS VARCHAR2(128);\n  5  \n  6     /* Rates cache... */\n  7     TYPE rates_aat\
    \ IS TABLE OF rates.exchange_rate%TYPE\n  8        INDEX BY key_st;\n  9     rates_cache\
    \ rates_aat;\n 10  \n 11     /* Cache-enabled function... */\n 12     FUNCTION\
    \ get_rate (\n 13              p_rate_date IN rates.rate_date%TYPE,\n 14     \
    \         p_from_ccy  IN rates.base_ccy%TYPE,\n 15              p_to_ccy    IN\
    \ rates.target_ccy%TYPE\n 16              ) RETURN rates.exchange_rate%TYPE IS\n\
    \ 17  \n 18        v_rate rates.exchange_rate%TYPE;\n 19        v_key  key_st\
    \ := TO_CHAR(p_rate_date, 'YYYYMMDD')\n 20                         || '~' || p_from_ccy\
    \ || '~' || p_to_ccy;\n 21  \n 22     BEGIN\n 23  \n 24        IF rates_cache.EXISTS(v_key)\
    \ THEN\n 25  \n 26           /* Cache hit... */\n 27           v_rate := rates_cache(v_key);\n\
    \ 28  \n 29        ELSE\n 30  \n 31           /* Cache miss. Fetch and cache...\
    \ */\n 32           SELECT exchange_rate INTO v_rate\n 33           FROM   rates\n\
    \ 34           WHERE  rate_date  = p_rate_date\n 35           AND    base_ccy\
    \   = p_from_ccy\n 36           AND    target_ccy = p_to_ccy;\n 37           rates_cache(v_key)\
    \ := v_rate;\n 38\n 39        END IF;\n 40\n 41        RETURN v_rate;\n 42\n 43\
    \     END get_rate;\n 44\n 45  END rates_pkg;\n 46  /\n```\n\nI’ve omitted the\
    \ package specification (it only has the `GET_RATES` function signature) and listed\
    \ just the package body. To keep the example short, I’ve excluded the exception-handling\
    \ that would be needed to cater for `NO_DATA_FOUND`, among others. Some other\
    \ points to note about the implementation are as follows:\n\n> *Lines 7-9:* I’ve\
    \ created a private global associative array type and variable to store the cached\
    \ data.\n> \n> *Lines 19-20:* The index of the array is a string representation\
    \ of the primary key for the `RATES` table. I’ve assigned this key directly in\
    \ the function’s declaration to save space, but for best practice, any assignments\
    \ should be performed in the executable block of the PL/SQL program.\n> \n> *Lines\
    \ 24-27:* I test to see if the rate is already cached. If it is, I simply return\
    \ it directly from the cache.\n> \n> *Lines 32-37:* If the rate is not already\
    \ in the cache, I fetch it from the `RATES` table and add it to the cache. I’ve\
    \ decided to cache only what is needed to reduce the potential PGA memory footprint\
    \ (as an alternative, you might prefer to pre-load small lookup tables into associative\
    \ arrays on instantiation).\n\n## Listing 9-58. Query Performance with a User-Defined\
    \ PL/SQL Session Cache Function\n\nIn [Listing 9-58](#Chapter09.html#list_9_58),\
    \ I’ve repeated the sales report that I used in [Listing 9-40](#Chapter09.html#list_9_40)\
    \ (when demonstrating the Result Cache) but replaced the call to the result-cached\
    \ `GET_RATES` function with my new user-defined cache equivalent."
