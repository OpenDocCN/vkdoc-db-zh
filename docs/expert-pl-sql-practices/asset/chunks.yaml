    \n`USER_IDENTIFIERS` 视图中的所有列都很重要。表 7-1 包含了视图中的列及其简要描述。\n\n![images](img/t0701.jpg)\n\
    \n为了更好地理解用法列，你需要查看视图中的原始数据。以下是对该视图的一个示例查询。输出结果是你在自己的查询中会看到的典型情况。请注意，在你使用 PL/Scope\
    \ 编译代码（下一节“配置 PL/Scope”将解释）之前，该视图将为空。\n\n```sql\nSELECT * FROM (\n  SELECT object_name,\
    \ name, type, usage, usage_id, usage_context_id\n    FROM user_identifiers\n \
    \   WHERE object_name = 'JOBS_API'\n      AND object_type = 'PACKAGE BODY'\n \
    \   ORDER BY line, col, usage_id)\nWHERE rownum < 6; -- 保持小巧\n```\n\n```\nOBJECT_NAME\
    \  NAME          TYPE         USAGE       USAGE_ID   USAGE_CONTEXT_ID\n------------\
    \ ------------- ------------ ----------- ---------- ----------------------\nJOBS_API\
    \     JOBS_API      PACKAGE      DEFINITION  1          0\nJOBS_API     JOB_EXISTS\
    \    FUNCTION     DEFINITION  2          1\nJOBS_API     JOB_TITLE     FORMAL\
    \ IN    DECLARATION 3          2\nJOBS_API     V_JOB_ID      VARIABLE     DECLARATION\
    \ 4          2\nJOBS_API     V_JOB_ID      VARIABLE     ASSIGNMENT  5        \
    \  2\n```\n\n第一个用法（`USAGE_ID = 1`）是包定义。这个程序单元的上下文是 0。它是程序单元中的第一个用法，所以 `USAGE_CONTEXT_ID`\
    \ 是 0。你不能在程序单元之间混合匹配用法或上下文，甚至在规范和包体之间也不行。\n\n第二行是一个函数定义。`USAGE_ID` 是 2，上下文是 1。这意味着\
    \ `USAGE_ID` 2 是 `USAGE_ID` 1 的子项。该函数属于这个包。\n\n第三行是一个参数，第四行是一个变量声明，第五行是对第四行定义的变量的赋值。所有这些用法都是该函数的子项，因此\
    \ `USAGE_CONTEXT_ID` 是 2（它们都位于函数体内）。\n\n如果你有一个重载的程序单元，`SIGNATURE` 列将唯一标识正在调用的是哪个版本。签名始终是所引用标识符的签名，不一定是对象中的当前标识符。\n\
    \n以下查询显示，重载的过程即使名称相同，也会有不同的签名：\n\n```sql\nSELECT name, usage, signature\nFROM\
    \ user_identifiers\nWHERE object_name = 'PLSCOPE_SUPPORT_PKG'\n  AND object_type\
    \ = 'PACKAGE'\n  AND name = 'SOURCE_LOOKUP'\nORDER BY line, col, usage_id;\n```\n\
    \n```\nNAME                       USAGE       SIGNATURE\n------------------------------\
    \ ----------- --------------------------------\nSOURCE_LOOKUP              DECLARATION\
    \ A633B1818ABD9AE3739E5A0B6D86EBB8\nSOURCE_LOOKUP              DECLARATION 3ED2FA822BD27B5B10F44226DCB93E0E\n\
    ```\n\n##### 配置 PL/Scope\n\nOracle 文档指出，PL/Scope 面向应用开发人员，通常用于开发阶段。我对此持保留态度。它应该被任何编译\
    \ PL/SQL 的人使用，并且应该在你工作的任何数据库（开发、测试和生产）中使用。PL/Scope 将其数据存储在 `SYSAUX` 表空间中，占用空间非常小（所以这不应该成为问题）。运行\
    \ PL/Scope 也是一项编译时活动，而不是运行时活动，因此没有性能损失（不像开启调试编译那样）。它可能会稍微增加编译时间，但我自己并未察觉到。\n\n\
    PL/Scope 非常容易配置。如前所述，它是一项编译时活动，因此在编译程序单元之前启用。使用的编译器设置称为 `PLSCOPE_SETTINGS`。用户，或者更可能是用户的\
    \ IDE，将使用 `ALTER SESSION` 命令来开启 PL/Scope。你也可以通过 `ALTER SYSTEM` 全局设置，或使用 `ALTER\
    \ COMPILE` 语句针对单个程序单元进行设置。下面我将展示每种方法的示例。\n\n目前，它只有一个开启（ALL）或关闭（NONE）的开关，但将来可能会允许一些粒度控制。在\
    \ 11.2 及更低版本中，默认值是 NONE。我预计随着时间的推移，ALL 会成为默认值，但这只是我的个人偏好。\n\n要在会话级别开启 PL/Scope\
    \ 收集，请使用以下命令：\n\n```sql\nALTER SESSION SET PLSCOPE_SETTINGS = 'IDENTIFIERS:ALL';\n\
    ```\n\n要关闭标识符收集，请使用以下命令：\n\n```sql\nALTER SESSION SET PLSCOPE_SETTINGS = 'IDENTIFIERS:NONE';\n\
    ```\n\n在系统级别开启和关闭类似。我不打算详细介绍 `ALTER SYSTEM` 命令及其存储值的方式，但一个例子可能是：\n\n```sql\nALTER\
    \ SYSTEM SET PLSCOPE_SETTINGS = 'IDENTIFIERS:ALL';\n```\n\n要编译一个带有标识符收集的对象，请使用相应的\
    \ `ALTER` 命令（`PROCEDURE`、`PACKAGE`、`TRIGGER`、`FUNCTION`、`TYPE` 等），如下所示：\n\n```sql\n\
    ALTER PACKAGE batch_overlord COMPILE PLSCOPE_SETTINGS = 'IDENTIFIERS:ALL';\n```\n\
    \n编译程序单元后，你可以使用视图 `USER_PLSQL_OBJECT_SETTINGS` 来查看设置，如下所示：\n\n```sql\nSQL> SELECT\
    \ type, plscope_settings\n     FROM user_plsql_object_settings\n    WHERE name\
    \ = 'EMPLOYEE_API';\n```\n\n```\nTYPE         PLSCOPE_SETTINGS\n------------ ---------------------------------------------------------------------\n\
    PACKAGE      IDENTIFIERS:ALL\nPACKAGE BODY IDENTIFIERS:ALL\n```\n\n就是这么简单。一旦设置完成，你就可以开始使用它了。别忘了在开启\
    \ PL/Scope 的情况下重新编译你的代码。"
- fmt: '# Change Impact Analysis


    变更影响分析允许开发人员或分析师评估代码中计划变更对其他代码区域的影响。根据我的经验，影响分析非常罕见。通常的做法似乎是进行变更，然后事后才发现影响。这在时间、金钱和声誉方面可能代价高昂。提前了解要好得多，这样可以分析和规划影响，而不是在将代码移动到测试（或更糟的生产）环境后才遇到问题。


    当完成影响分析时，您或进行分析的人员应该对需要更改的对象有相当深入的了解。您不仅会知道哪些对象需要更改，还可以为每个要更改的对象创建测试用例，并为所有已更改的对象规划和估算回归测试。通过提前知道要测试哪些对象，您还能安排时间进行适当的性能测试，以确保变更不会对应用程序性能产生负面影响。


    影响分析的问题在于，确实没有一种适用于所有情况的分析方法。在数据库应用程序中，可能发生多种类型的变更：数据变更（数据类型或数量的更改，例如添加新来源）、模式变更（数据库结构的更改）和代码变更。PL/SQL
    书籍无法为您提供太多处理数据变更的方法；这非常特定于应用程序。对于模式变更，`USER_DEPENDENCIES` 视图仍然是查看模式中哪些对象引用其他对象的最佳选择。本节的其余部分将讨论代码变更（这可能与数据或模式变更相关，或是其结果）。


    在我工作过的大多数组织中，进行影响分析的方式要么是假设你对应用程序及其所有使用情况拥有全知知识，要么是更改一个对象并查看它在下游对象中使哪些对象无效。这两种方法都很糟糕。首先，如果你已经在更改对象，那么你已经过了估算阶段，而这正是你真正想要开始这个过程的时候。其次，无法确切指示是什么导致了失效。这是一种高度繁琐且容易出错的方法。


    使用数据字典中的可用数据来运行报告并获取与变更相关的精确数据列表，这不是更好的方法吗？然后，人类可以利用这种（大部分，希望是）自动化的数据收集。


    开始进行影响变更分析的方法是将需求分解为组成部分。每个部分包含一个变更，该变更（通常）对应用程序有一些影响。下一步是确定所有将受到影响的单元。


    这种分解可以在对象级别（例如包级别）进行。然而，在那个高度上，你会遇到如前面在 `USER_SOURCE` 和 `USER_DEPENDENCIES` 部分中描述的所有问题。理想情况下，你可以在不依赖代码逐行扫描的情况下，对源代码有一个非常细粒度的视图。`PL/Scope`
    可以提供程序单元被其他程序单元调用的非常细粒度的视图。请注意，`PL/Scope` 对外部代码或从视图调用的代码没有帮助。对于视图支持，你会使用依赖视图；对于外部代码和
    Java，你会使用数据库外部的工具。


    我没有在本书中包含它，但我还经常提取相关信息并将其存储在我自己的表中。我会将父/子记录折叠为单条记录（例如，折叠行以组合 `package.function`
    调用）。这样，我有一个多遍系统，允许使用更易于维护的查询来处理更大范围的程序。在这里解释我使用的完整系统超出了范围，但当你开始编写自己的查询时，请记住，你可以编写查询的一部分，保存这些结果，然后针对保存的数据编写查询。


    本章提供的演示代码中有一个名为 `PLSCOPE_SUPPORT_PKG` 的包。这个包包含一些用于处理 `PL/Scope` 各个方面的有用代码。我将从过程
    `PRINT_IMPACTS` 开始，它是一个重载过程。我首先使用的版本接受程序单元所有者（`P_OWNER`）、名称（`P_OBJECT`）和子单元名称（`P_UNIT`）作为参数。


    让我们看一个例子。假设你计划更改 `HR.JOBS_API.VALIDATE_JOB` 过程，使其接受一个额外的参数或更改返回数据类型。你会想知道该函数的所有调用位置。对支持包的示例调用如下所示：


    ```sql

    SQL> exec plscope_support_pkg.print_impacts(''HR'', ''JOBS_API'', ''VALIDATE_JOB'');

    ```


    ```

    Impact to PACKAGE BODY HR.EMPLOYEE_API.CREATE_EMPLOYEE at line 40 and column 12

    Impact to PROCEDURE HR.TEST_CALLS_PRC at line 8 and column 8

    Impact to PROCEDURE HR.TEST_CALLS_PRC at line 4 and column 6

    Impact to FUNCTION HR.TEST_CALLS_FNC at line 5 and column 10


    PL/SQL procedure successfully completed.

    ```


    从这个视图中，你可以看到三个对象受到影响，其中一个对象（`HR.TEST_CALLS_PRC`）被影响了两次。在这个小的应用程序中，查询 `USER_SOURCE`
    或使用 `grep` 搜索代码仓库并目测结果可能同样容易。然而，在非常大的系统中，这种简洁性使分析变得容易得多。


    如果你想在输出中看到源文本，你可以向 `PRINT_IMPACTS` 调用传递一个可选的 `BOOLEAN` 参数，如下所示：


    ```sql

    SQL> set serveroutput on format wrapped

    SQL> exec plscope_support_pkg.print_impacts(''HR'', ''JOBS_API'', ''VALIDATE_JOB'',
    TRUE);

    ```


    ```

    Impact to PACKAGE BODY HR.EMPLOYEE_API.CREATE_EMPLOYEE at line 40 and column 12

        TEXT:

                  IF NOT jobs_api.validate_job(p_job_t

              tle, p_department_name)


    Impact to PROCEDURE HR.TEST_CALLS_PRC at line 8 and column 8

        TEXT:

                  IF JOBS_API.VALIDATE_JOB(''a'', ''b'')


    Impact to PROCEDURE HR.TEST_CALLS_PRC at line 4 and column 6

        TEXT:

                IF JOBS_API.VALIDATE_JOB(''a'', ''b'')


    Impact to FUNCTION HR.TEST_CALLS_FNC at line 5 and column 10

        TEXT:

                RETURN JOBS_API.VALIDATE_JOB(''a'', ''b'')


    PL/SQL procedure successfully completed.

    ```


    这段代码只是一个演示，但它展示了如何使用 `PL/Scope` 遍历标识符的层次结构，以找到关于你的代码的许多宝贵信息。这些影响分析过程的核心是来自 `PLSCOPE_SUPPORT_PKG.GET_IMPACT_INFO`
    的这个查询。（注意，我简化了过程和主要查询，以便它们能更好地作为示例。一个可以处理嵌套块的示例会稍微复杂一些，对于本节的目的来说是不必要的。只需知道此代码是一个演示和起点，而不是一个完整的影响分析程序。）以下代码来自
    `PLSCOPE_SUPPORT_PKG.GET_IMPACT_INFO`，是起始于第 54 行的 `FOR LOOP` 查询：'
  raw: '##### Change Impact Analysis


    Change impact analysis allows a developer or analyst to assess the impact of intended
    changes in code to other areas of the code. In my experience, impact analysis
    is very rare. The norm seems to be to make changes and discover the repercussions
    after the fact. This can be very expensive in terms of time, money, and reputation.
    It is far better to know ahead of time, so that impacts can be analyzed and planned
    for instead of running into issues after moving code to test (or worse, production)
    environments.


    When impact analysis is completed, you, or the person doing the analysis, should
    have a fairly deep understanding of the objects that will require changes. Not
    only will you know which objects require changes but test cases can be created
    for each object to be changed, and regression tests can be planned and estimated
    for all changed objects. By knowing ahead of time which objects to test, you will
    also be able to schedule time for appropriate performance testing to ensure the
    changes do not negatively affect application performance.


    The problem with impact analysis is that there are really no one-size-fits-all
    approaches to the analysis. In a database application, multiple types of changes
    are possible: data change (changes to types or volumes of data, such as adding
    new sources), schema changes (changes to database structures), and code changes.
    There''s not much a PL/SQL book can give you to handle data changes; that''s very
    application specific. For schema changes, the USER_DEPENDENCIES view is still
    your best bet to see which objects have references to other objects in the schema.
    The rest of this section will deal with code changes (which may be related to,
    or a result of, data or schema changes).


    The way impact analysis has been done in most organizations where I have worked
    is to either assume you have omniscient knowledge of the application and everything
    that uses it or to change an object and see where it invalidates downstream objects.
    Both approaches are just ugly. For one thing, if you are already changing objects,
    then you are past the estimation phase, which is where you really want to start
    this process. For another, there''s no indication of exactly what caused the invalidation.
    This is a highly tedious and error-prone approach.


    Isn''t it a better approach to use the data available in the data dictionary to
    run a report and get a listing of exactly the data related to a change? A human
    being can then use this (mostly, hopefully) automated data gathering.


    The way to begin an impact change analysis is to break down the requirements into
    component parts. Each part contains a change and that change has some impact (normally)
    to the application. The next step is to identify all of the units that will be
    impacted.


    This breaking down can be done at an object level (such as at the package level).
    At that high of a level, though, you are hit with all of the issues as described
    earlier in the sections on USER_SOURCE and USER_DEPENDENCIES. Ideally, you would
    have a very granular view of the source code without resorting to a line-by-line
    scan of the code. PL/Scope can provide a very fine-grained view of the program
    units called by other program units. Note that PL/Scope does not help with external
    code or code called from views. You would use the dependency views for view support
    and tools external to the database for external code and Java.


    I don''t include it in this book but I also frequently pull out related information
    and store it in my own tables. I will collapse parent/child records into a single
    record (for example, collapse rows to combine a package.function call). In this
    way, I have a multi-pass system that allows for a greater range of programs that
    use easier-to-maintain queries. Explaining the full system I use is way out of
    scope here but when you start writing your own queries, remember that you can
    write parts of the query, save those results, and then write queries against the
    saved data.


    In the demo code provided for this chapter is a package called PLSCOPE_SUPPORT_PKG.
    This package contains some useful code for dealing with various aspects of PL/Scope.
    I''ll start with the procedure PRINT_IMPACTS, which is an overloaded procedure.
    The version I will use first takes as parameters a program unit owner (P_OWNER),
    name (P_OBJECT), and sub unit name (P_UNIT).


    Let''s take an example. Suppose you planned to change the HR.JOBS_API.VALIDATE_JOB
    procedure so that it took an extra parameter or changed the return data type.
    You would want to know where all calls to that function are. The example call
    to the support package would look like this:


    `SQL> exec plscope_support_pkg.print_impacts(''HR'', ''JOBS_API'', ''VALIDATE_JOB'');`


    `Impact to PACKAGE BODY HR.EMPLOYEE_API.CREATE_EMPLOYEE at line 40 and column
    12`

    `Impact to PROCEDURE HR.TEST_CALLS_PRC at line 8 and column 8`

    `Impact to PROCEDURE HR.TEST_CALLS_PRC at line 4 and column 6`

    `Impact to FUNCTION HR.TEST_CALLS_FNC at line 5 and column 10`


    `PL/SQL procedure successfully completed.`


    From this view, you can see that three objects are impacted and one of those objects
    (HR.TEST_CALLS_PRC) is impacted twice. In an application this small, it is probably
    just as easy to query USER_SOURCE or grep your code repository and eyeball the
    results. However, in a very large system, this kind of conciseness makes analysis
    much easier.


    If you wanted to see the source text with your output, you could pass in an optional
    BOOLEAN with the call to PRINT_IMPACTS, like so:


    `SQL> set serveroutput on format wrapped`

    `SQL> exec plscope_support_pkg.print_impacts(''HR'', ''JOBS_API'', ''VALIDATE_JOB'',
    TRUE);`


    `Impact to PACKAGE BODY HR.EMPLOYEE_API.CREATE_EMPLOYEE at line 40 and column
    12`

    `    TEXT:`

    `              IF NOT jobs_api.validate_job(p_job_t`

    `          tle, p_department_name)`


    `Impact to PROCEDURE HR.TEST_CALLS_PRC at line 8 and column 8`

    `    TEXT:`

    `              IF JOBS_API.VALIDATE_JOB(''a'', ''b'')`


    `Impact to PROCEDURE HR.TEST_CALLS_PRC at line 4 and column 6`

    `    TEXT:`

    `            IF JOBS_API.VALIDATE_JOB(''a'', ''b'')`


    `Impact to FUNCTION HR.TEST_CALLS_FNC at line 5 and column 10`

    `    TEXT:`

    `            RETURN JOBS_API.VALIDATE_JOB(''a'', ''b'')`


    `PL/SQL procedure successfully completed.`


    This code is just a demo but it shows how you can use PL/Scope to walk through
    the hierarchy of identifiers to find so much valuable information about your code.
    The meat of these impact analysis procedures is this query from PLSCOPE_SUPPORT_PKG.GET_IMPACT_INFO.
    (Note that I simplified both the procedures and the main query so that they would
    better serve as an example. An example that can handle nested blocks is a bit
    more complex, needlessly so for the purpose of this section. Just know that this
    code is a demo and a starting point, not a complete impact analysis program.)
    The following code is from PLSCOPE_SUPPORT_PKG.GET_IMPACT_INFO and is the FOR
    LOOP query starting at line 54:'
