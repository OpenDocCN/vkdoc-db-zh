- fmt: "`OBJECT_TYPE  AGGREGATE PIPELINED IMPLTYPEOWNER   IMPLTYPENAME`\n`------------\
    \ --------- --------- --------------- ------------------------------`\n`FUNCTION\
    \     YES       NO        SYS             SYS_NT_COLLECT_IMP`\n`FUNCTION     NO\
    \        YES       SYS             DMCLBIMP`\n\nEach object in this view has an\
    \ `OBJECT_ID` and a `SUBPROGRAM_ID`. `OBJECT_ID` can be considered the primary\
    \ key of this view (of the object in the dictionary, actually). When joining to\
    \ other dictionary objects (as I will do later with `USER_ARGUMENTS`, `OBJECT_ID`\
    \ is the unique ID I will use to join). If the code is standalone, such as a procedure\
    \ or function, `SUBPROGRAM_ID` is always a 1. If the code is a package, the `subprogram_id`\
    \ will be 0, and each procedure and function in the package will increment the\
    \ `subprogram_id` by 1.\n\nOne feature that can be incredibly useful in understanding\
    \ a piece of code is the `OVERLOAD` column. If a procedure or function is overloaded\
    \ within a package, `OVERLOAD` will start with 1 and will increment by 1 for each\
    \ iteration of the overloaded subprogram. The `SUBPROGRAM_ID` always increments\
    \ so an overloaded procedure will have a different `SUBPROGRAM_ID` from an overloaded\
    \ version of the procedure.\n\nWhen combined with the `USER_ARGUMENTS` view, you\
    \ can query exactly how overloaded procedures differ. I will provide an example\
    \ of this in the next section. By itself, the `USER_PROCEDURES` view can be used\
    \ for naming standards and to check compilation information that might interest\
    \ you, such as `PIPELINED`, `AUTHID`, or `DETERMINISTIC`.\n\n### USER_ARGUMENTS\n\
    \nWhen you add `USER_ARGUMENTS` into the mix, you can start finding some fine-grained\
    \ details about the code and the arguments to that code. Querying this data can\
    \ be confusing when you first start using it. The object naming is distinctly\
    \ different from the `USER_PROCEDURES` view.\n\nIn this view, the `OBJECT_NAME`\
    \ is the name of the program that owns the arguments. Whether the program is standalone\
    \ or inside of a package or type, the procedure or function name will be in the\
    \ `OBJECT_NAME` field. If the `PROCEDURE` or `FUNCTION` is in a package, `PACKAGE_NAME`\
    \ will have a value—it will be `NULL` otherwise. The `ARGUMENT_NAME` is the actual\
    \ name of the argument.\n\nNote that in `USER_PROCEDURES`, the `object_name` is\
    \ the top-level object. In the case of a package, it will be the package or type\
    \ name. For standalone code, it will be the procedure name, trigger name, or function\
    \ name. In `USER_ARGUMENTS`, `object_name` is the sub-program name. It is always\
    \ the name of a procedure, function, or trigger. In the case of a package, `object\
    \ name` will be the sub-programs, and `package name` will be the name of the package.\
    \ This is very important for joining the two tables (see the next query example).\n\
    \nIf an argument is an anchored type (`EMPLOYEES.EMPLOYEE_ID%TYPE`) you will not\
    \ see the anchor type. You will see the underlying data type (`NUMBER`, for example)\
    \ as the argument type. However, if the code is created with anchored types, you\
    \ will see, along with the data type, the scale and precision of that anchored\
    \ value. Normally you can't include scale or precision in an argument but since\
    \ Oracle is aware of the base objects scale and precision, it can keep track of\
    \ that information. That doesn't really help if you want to know *which* anchored\
    \ type. Still, the information is useful when available.\n\nOne of the big objects\
    \ that I am concerned with as a database architect is standards compliance. Are\
    \ things being named correctly? Are the correct data types being used? The following\
    \ example is a query I used until PL/Scope became available. It was an easy way\
    \ to ensure naming standard compliance for program unit parameters.\n\n```sql\n\
    select package_name, object_name, argument_name,\n          position, in_out,\
    \ data_type\n  from user_arguments\n  where argument_name not like 'P_%';\n```\n\
    \n```\nPACKAGE_NAME  OBJECT_NAME  ARGUMENT_NAME  POSITION  IN_OUT DATA_TYPE\n\
    ------------- ------------ -------------- --------- ----------- -----------------------\n\
    JOBS_API      JOB_EXISTS   JOB_TITLE      1         IN         VARCHAR2\n```\n\
    \nThe next example is a query that shows the differences in arguments for an overloaded\
    \ procedure. I could have written it against only the `USER_ARGUMENTS` view but\
    \ I wanted to show an example of joining the two views.\n\n```sql\nselect ua.package_name,\
    \ up.procedure_name, ua.argument_name, up.overload, position, IN_OUT\n  from user_procedures\
    \ up\n  join user_arguments ua\n  on (ua.object_name = up.procedure_name\n  and\
    \ ua.subprogram_id = up.subprogram_id)\n  where up.overload is not null\n  order\
    \ by overload, position;\n```\n\n```\nPACKAGE_NAME     PROCEDURE_NAME        \
    \  ARGUMENT_NAME       OVERLOAD   POSITION IN_OUT\n---------------- -----------------------\
    \ ------------------- ---------- --------\nDEPARTMENTS_API  DEPARTMENT_MANAGER_ID\
    \                       1          0        OUT\nDEPARTMENTS_API  DEPARTMENT_MANAGER_ID\
    \   P_DEPARTMENT_NAME   1          1        IN\nDEPARTMENTS_API  DEPARTMENT_MANAGER_ID\
    \                       2          0        OUT\nDEPARTMENTS_API  DEPARTMENT_MANAGER_ID\
    \   P_DEPARTMENT_ID     2          1        IN\n```\n\nNotice the `POSITION` and\
    \ `IN_OUT` columns. The procedure, `DEPARTMENT_MANAGER_ID`, is actually a function.\
    \ The `IN_OUT` column is “OUT” and the position is 0. For a function, position\
    \ 0 is the return value (a function must always have a return value). You can\
    \ infer that a program unit is a function by looking at position. Function return\
    \ values also do not have an argument name. If you have a record in the `USER_ARGUMENTS`\
    \ table that does not have a name, it is the `RETURN`. If a program unit has no\
    \ parameters, it will not have a record in the `USER_ARGUMENTS` view.\n\nThe following\
    \ query shows that the procedure `SECURE_DML` exists in the `USER_PROCEDURES`\
    \ view:\n\n```sql\nSELECT count(*) FROM user_procedures\nWHERE object_name = 'SECURE_DML';\n\
    ```\n\n```\nCOUNT(*)\n----------------------\n1\n```\n\nThe next query, however,\
    \ shows that even though the procedure `SECURE_DML` exists as a procedure, it\
    \ has no parameters so it will not have any records in the `USER_ARGUMENTS` view:\n\
    \n```sql\nSELECT count(*) FROM user_arguments\nWHERE object_name = 'SECURE_DML';\n\
    ```\n\n```\nCOUNT(*)\n----------------------\n0\n```\n\nAnother standard that\
    \ is worth checking, especially since it can be so easily automated, is validating\
    \ the data types that your standards prohibit (`CHAR`, `LONG`, `VARCHAR`, etc)\
    \ can be easily queried and questioned. Even though `LONG` in PL/SQL is just a\
    \ sub-type of `VARCHAR2` now (as opposed to a `LONG` in a table), I have seen\
    \ many standards require that PL/SQL code use `VARCHAR2(32767)` instead.\n\nYou\
    \ can validate data type information for parameters fairly easily by using the\
    \ following query:\n\n```sql\nSELECT object_name, argument_name, data_type\n \
    \ FROM user_arguments\n  WHERE data_type IN ('CHAR', 'LONG', 'VARCHAR');\n```\n\
    \n```\nOBJECT_NAME                    ARGUMENT_NAME                  DATA_TYPE\n\
    ------------------------------ ------------------------------ ------------------------------\n\
    BAD_DATA_TYPES_PRC             P_DATA_IN                      CHAR\nBAD_DATA_TYPES_PRC\
    \             P_DATA_OUT                     LONG\n```\n\nUnfortunately, you can\
    \ *only* get this for parameters from this view. When you validate this kind of\
    \ information, you really want to validate variables as well as parameters. The\
    \ section on PL/Scope shows you how to do this."
