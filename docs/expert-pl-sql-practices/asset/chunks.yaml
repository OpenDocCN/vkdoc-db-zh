    Since only one hundred lines of PL/SQL code are needed to build the checker, there
    is no excuse not to build one. PL/Scope makes this process much easier than trying
    to parse your source from user_source or your source code repository.


    ![images](images/square.jpg) **Note** Oracle does not use abbreviations consistently
    in the data dictionary. For example, the term “index” is spelled out once and
    abbreviated differently twice in the views user_indexes and user_ind_columns and
    the column idx of user_policies. Presumably, Oracle doesn''t fix this because
    backward compatibility in public APIs is more important than consistent abbreviations.


    #### Pre- and Suffixes for PL/SQL Identifiers


    Many PL/SQL developers add prefixes to identifiers to indicate their scope or
    type. For example, local variables are prefixed with l_, constants with c_, input
    parameters with i_, and types with t_. There are two good reasons to add a prefix
    or a suffix to every PL/SQL identifier. Both have to do with avoiding scope capture.


    PL/SQL automatically turns PL/SQL variables in static SQL statements into bind
    variables. Consider the following function, which should return the employee name
    for the specified employee number from the emp table of the SCOTT schema created
    by `demobld.sql` script from Oracle. In this example, I don''t use any prefixes
    for the parameter empno and the local variable `ename`.


    `create or replace function emp#ename(empno emp.empno%type)`

    `return emp.ename%type`

    `is`

    `  ename                      emp.ename%type;`

    `begin`

    `  select ename`

    `  into   ename`

    `  from   emp`

    `  where  empno = empno;`


    `  return ename;`

    `end emp#ename;`


    The function doesn''t do what I would like it to do. Both occurrences of empno
    in the where clause refer to the table column empno rather than to the input parameter
    because every identifier is resolved to the most local declaration. In this case,
    the most local scope is the SQL statement with the table emp. Hence, the where
    condition is equivalent to `emp.empno = emp.empno`, which is the same as `emp.empno
    is not null`. Unless I have exactly one entry in the table emp, the function will
    throw an exception.


    `SQL> truncate table emp;`


    `Table truncated.`


    `SQL> insert into emp(empno, ename) values (7369, ''SMITH'');`


    `1 row created.`


    With exactly one row in the table, the function returns the name of this row independent
    of the actual parameter. I ask for the name of the employee with empno 21 and
    get the name of the employee with empno 7369.


    `SQL> select emp#ename(21) from dual;`


    `EMP#ENAME(21)`

    `-----------------------------------------------------------------`

    `SMITH`


    `1 row selected.`


    With two or more rows in the table, the function always returns an ORA-01422.


    `SQL> insert into emp(empno, ename) values (7499, ''ALLEN'');`


    `1 row created.`


    `SQL> select emp#ename(7369) from dual;`

    `select emp#ename(7369) from dual`

    `       *`

    `ERROR at line 1:`

    `ORA-01422: exact fetch returns more than requested number of rows`

    `ORA-06512: at "K.EMP#ENAME", line 5`


    You can avoid scope capture by adding a prefix or a suffix to the input parameter
    empno, such as i_empno. Let’s generalize this rule to say that every PL/SQL identifier
    should have a prefix or a suffix that is not used in column names. The minimum
    length for the prefix or suffix is two bytes—that is, a letter and an underscore
    as separator. You can use this prefix to convey additional semantics, such as
    the scope of a variable or the mode of a parameter without wasting another precious
    one of the thirty bytes.


    An alternative to the prefix is to qualify all PL/SQL variables inside SQL statements
    with the name of the declaring block, e.g., `empno = emp#ename.empno`. The advantage
    of this approach is that it prevents unnecessary invalidation when a column is
    added to the table because the compiler knows that no scope capture can occur.
    Bryn Llewellyn describes this aspect of Oracle 11g fine-grained dependency tracking
    in `http://bit.ly/dSMfto`. I don''t use this approach because edition-based redefinition
    is the better solution to prevent invalidation during online upgrades and because
    I find the syntax clumsy.


    Of course, adding an l_ prefix to every local variable does not avoid scope capture
    in nested PL/SQL blocks. Fully qualified notation for all PL/SQL identifiers in
    all nested blocks would solve this at the cost of wordiness.'
  trans: "\n# PL/SQL 标识符命名规范与作用域捕获\n\n## chk_ident 过程\n\n```plsql\n------------------------------------------------------------------------------\n\
    procedure chk_ident(\n  i_ident          varchar2\n ,i_loc            varchar2\n\
    )\nis\n  l_start_pos      pls_integer := 1;\n  l_end_pos        pls_integer :=\
    \ 1;\n  l_abbr_cnt       pls_integer;\n  l_part           varchar2(30);\n  c_ident_len\
    \ constant pls_integer := length(i_ident);\nbegin\n  while l_start_pos < c_ident_len\
    \ loop\n    -- 确定下一个部分 --\n    while     l_end_pos <= c_ident_len\n          and\
    \ substr(i_ident, l_end_pos, 1) not in ('_', '#', '$')\n    loop\n      l_end_pos\
    \ := l_end_pos + 1;\n    end loop;\n    l_part := upper(substr(i_ident, l_start_pos,\
    \ l_end_pos - l_start_pos));\n\n    -- 检查该部分是否为已注册的缩写 --\n    select count(*)\n\
    \    into   l_abbr_cnt\n    from   abbr_reg\n    where  abbr = l_part;\n\n   \
    \ if l_abbr_cnt = 0 then\n      dbms_output.put_line('标识符 ' || i_ident || ' 中存在未注册的部分\
    \ ' || l_part\n                           || '，位置：' || i_loc || '。');\n    end\
    \ if;\n\n    -- 初始化下一次循环的变量 --\n    l_end_pos := l_end_pos + 1;\n    l_start_pos\
    \ := l_end_pos;\n  end loop;\nend chk_ident;\n\n------------------------------------------------------------------------------\n\
    procedure chk_abbr\nis\nbegin\n  -- 使用 PL/Scope 的 PL/SQL --\n  for c in (\n  \
    \  select name\n          ,object_type\n          ,object_name\n          ,line\n\
    \    from   user_identifiers\n    where  usage = 'DECLARATION'\n    order by object_name,\
    \ object_type, line\n  ) loop\n    chk_ident(\n      i_ident => c.name\n     ,i_loc\
    \   => c.object_type || ' ' || c.object_name || '，行 ' || c.line\n    );\n  end\
    \ loop;\n  -- 其他项目：USER_OBJECTS, USER_TAB_COLUMNS 等 --\n  -- ...\nend chk_abbr;\n\
    \nend abbr_reg#;\n```\n\n由于构建这个检查器只需要大约一百行 PL/SQL 代码，因此没有理由不去构建一个。PL/Scope 使得这个过程比尝试从\
    \ `user_source` 或你的源代码存储库中解析源代码要容易得多。\n\n![images](img/square.jpg) **注意** Oracle\
    \ 在数据字典中对缩写的使用并不一致。例如，“index”这个术语在视图 `user_indexes` 和 `user_ind_columns` 以及 `user_policies`\
    \ 的列 `idx` 中被完整拼写了一次，却被以两种不同的方式缩写。Oracle 不修复这个问题大概是因为公共 API 的向后一致性比缩写的一致性更重要。\n\
    \n### PL/SQL 标识符的前后缀\n\n许多 PL/SQL 开发人员会给标识符添加前缀，以指示其作用域或类型。例如，局部变量以 `l_` 为前缀，常量以\
    \ `c_` 为前缀，输入参数以 `i_` 为前缀，类型以 `t_` 为前缀。为每个 PL/SQL 标识符添加前缀或后缀有两个很好的理由。两者都与避免作用域捕获有关。\n\
    \nPL/SQL 会自动将静态 SQL 语句中的 PL/SQL 变量转换为绑定变量。考虑以下函数，它应该从 Oracle 的 `demobld.sql` 脚本创建的\
    \ SCOTT 模式的 `emp` 表中返回指定员工编号的员工姓名。在这个例子中，我没有对参数 `empno` 和局部变量 `ename` 使用任何前缀。\n\
    \n```plsql\ncreate or replace function emp#ename(empno emp.empno%type)\nreturn\
    \ emp.ename%type\nis\n  ename            emp.ename%type;\nbegin\n  select ename\n\
    \  into   ename\n  from   emp\n  where  empno = empno;\n\n  return ename;\nend\
    \ emp#ename;\n```\n\n这个函数并没有实现我想要的功能。`where` 子句中 `empno` 的两个出现都指的是表列 `empno`，而不是输入参数，因为每个标识符都被解析为最局部的声明。在这种情况下，最局部的作用域是包含表\
    \ `emp` 的 SQL 语句。因此，`where` 条件等价于 `emp.empno = emp.empno`，这与 `emp.empno is not\
    \ null` 相同。除非表 `emp` 中恰好有一条记录，否则该函数将抛出一个异常。\n\n```sql\nSQL> truncate table emp;\n\
    表已截断。\nSQL> insert into emp(empno, ename) values (7369, 'SMITH');\n已创建 1 行。\n\
    ```\n\n当表中只有一行时，该函数会返回该行的姓名，而不管实际的参数如何。我请求 `empno` 为 21 的员工姓名，却得到了 `empno` 为 7369\
    \ 的员工的姓名。\n\n```sql\nSQL> select emp#ename(21) from dual;\nEMP#ENAME(21)\n-----------------------------------------------------------------\n\
    SMITH\n已选择 1 行。\n```\n\n当表中有两行或更多行时，该函数总是返回 ORA-01422 错误。\n\n```sql\nSQL> insert\
    \ into emp(empno, ename) values (7499, 'ALLEN');\n已创建 1 行。\nSQL> select emp#ename(7369)\
    \ from dual;\nselect emp#ename(7369) from dual\n       *\n第 1 行出现错误:\nORA-01422:\
    \ 实际提取的行数超出请求的行数\nORA-06512: 在 \"K.EMP#ENAME\", 第 5 行\n```\n\n你可以通过为输入参数 `empno`\
    \ 添加前缀或后缀（例如 `i_empno`）来避免作用域捕获。让我们将此规则推广为：每个 PL/SQL 标识符都应该有一个在列名中未使用的前缀或后缀。前缀或后缀的最小长度是两个字节——即一个字母和一个作为分隔符的下划线。你可以使用这个前缀来传达额外的语义，例如变量的作用域或参数的模式，而无需浪费宝贵的三十字节限制中的另一个字节。\n\
    \n另一种替代前缀的方法是，在 SQL 语句中用声明块的名字来限定所有 PL/SQL 变量，例如 `empno = emp#ename.empno`。这种方法的优点是，当表中添加了列时，它可以防止不必要的失效，因为编译器知道不会发生作用域捕获。Bryn\
    \ Llewellyn 在 `http://bit.ly/dSMfto` 中描述了 Oracle 11g 细粒度依赖跟踪的这个方面。我不使用这种方法，因为基于版本的重定义是防止在线升级期间失效的更好解决方案，而且我觉得语法很笨拙。\n\
    \n当然，为每个局部变量添加 `l_` 前缀并不能避免嵌套 PL/SQL 块中的作用域捕获。对所有嵌套块中的所有 PL/SQL 标识符使用完全限定符号可以解决这个问题，但代价是冗长。\n"
- fmt: "## 避免PL/SQL标识符与关键字冲突\n\n在PL/SQL标识符中包含前缀或后缀的第二个原因，是为了避免与SQL和PL/SQL中大量的关键字以及在`standard`和`dbms_standard`中声明的内置函数产生混淆。截至Oracle\
    \ 11gR2，有1,844个SQL关键字，例如`table`，以及内置函数的名称，例如`upper`，这些都列在`v$reserved_words`中。\n\
    \n```sql\nSQL> select count(distinct keyword)\n  2  from   v$reserved_words;\n\
    \nCOUNT(DISTINCTKEYWORD)\n----------------------\n                  1844\n\n1\
    \ row selected.\n```\n\nPL/SQL关键字列在《PL/SQL语言参考》的附录D中，但无法通过视图查看。如果不小心选择自己的标识符，就会遮蔽（shadow）Oracle的实现。在下面的例子中，`upper`的实现（它返回小写参数而不是Oracle提供的同名标准函数）被执行了：\n\
    \n```sql\ncreate or replace procedure test\n  authid definer\nis\n  function upper(i_text\
    \ varchar2) return varchar2\n  is\n  begin\n    return lower(i_text);\n  end upper;\n\
    begin\n  dbms_output.put_line(upper('Hello, world!'));\nend test;\n\nSQL> exec\
    \ test\nhello, world!\n\nPL/SQL procedure successfully completed.\n```\n\n这个小例子中显得有些人为的情况，在实际中很可能发生在一个由非原作者维护的大型包中。例如，当应用程序还在10g下运行时，原作者可能实现了一个函数`regexp_count`。在升级到11gR2后，新的维护者可能在包的某个其他地方添加了对`regexp_count`的调用，期望调用同名（但语义可能不同）的新增SQL内置函数。\n\
    \nOracle提供了警告来防止滥用关键字。不幸的是，警告通常处于禁用状态。如果你启用所有警告并重新编译测试过程，你会得到期望的错误或警告，这取决于你将`plsql_warnings`设置为`error:all`还是`enable:all`。\n\
    \n```sql\nSQL> alter session set plsql_warnings='error:all';\n\nSession altered.\n\
    \nSQL> alter procedure test compile;\n\nWarning: Procedure altered with compilation\
    \ errors.\n\nSQL> show error\nErrors for PROCEDURE TEST:\n\nLINE/COL ERROR\n--------\
    \ -------------------------------------------------------------------------------\n\
    4/12      PLS-05004: identifier UPPER is also declared in STANDARD or is a SQL\
    \ built-in\n```\n\n总之，为每个PL/SQL标识符添加前缀或后缀可以解决作用域捕获（scope capture）的问题。我使用变量和参数的前缀来避免静态SQL中的作用域捕获，但我不费心为函数或过程添加前缀或后缀，因为与关键字的冲突很少见，而且带有参数的SQL函数不会发生作用域捕获。\n\
    \n为了区分列表及其元素，通常为列表（如关联数组）添加复数后缀。或者，使用后缀来指示类型，例如`_rec`表示记录，`_tab`表示关联数组类型，以此来区分元素和列表，同时以几个字符为代价传达额外的语义信息。我在本章中使用类型后缀表示法是为了清晰，因为我将比较使用不同类型的实现。我使用井号（#）作为包的后缀，以避免与同名表发生名称冲突。\n\
    \n**注意**：前缀和后缀的正确使用也可以通过PL/Scope轻松检查。Lucas Jellema在 [`http://technology.amis.nl/blog/?p=2584`](http://technology.amis.nl/blog/?p=2584)\
    \ 上有一个这方面的例子。\n\n### 代码与数据的模块化\n\n正确的模块化是开发团队可扩展性和应用程序可维护性的基础。模块化将“分而治之”的益处带入了软件工程。模块化的关键方面如下：\n\
    \n*   *可分解性*：必须能够将每个复杂问题分解为少量不太复杂的子问题，这些子问题可以分开处理。\n*   *模块可理解性*：在一个大型应用程序中，必须能够独立理解任何部分，而无需了解其余应用程序的太多或全部信息。这种特性称为模块可理解性。“大规模编程”通常意味着一个人加入公司时，需要处理一个已有数百万行代码的应用程序。显然，只有应用程序满足模块可理解性，才能以高效的方式完成这项工作。\n\
    *   *模块连续性*：连续性有两个方面。首先，对规范的小改动必须仅导致一个或几个模块的改动。其次，模块中的改动必须易于证明不会在其他模块中引起回归。模块连续性对于临时补丁尤其重要，由于其频率和紧迫性，可能无法像主要版本那样经过充分测试。\n\
    *   *可重用性*：应用程序某部分问题的解决方案必须能在另一部分重用。更通用的可组合性目标（即用现有组件构建新的、可能非常不同的系统）通常只对基础框架有要求。\n\
    \n**注意**：可分解性和可组合性通常是相互冲突的目标。可分解性是通过自顶向下设计实现的。它导致特定的模块，这些模块通常不适合通用的组合。另一方面，可组合性基于自底向上设计，这导致通用设计，但这些设计对于特殊情况通常效率低下且成本过高（除非一个模块可以被重用多次，从而证明大的投入是合理的）。\n\
    \n通过遵守以下规则，可以用模块实现模块化的这些方面：\n\n*   *信息隐藏（抽象）*：每个模块都明确地将其公共接口与其实现细节分离。这可以比作一台电视机：它的接口是带有几个按钮的遥控器，它的实现由复杂的电路和软件组成。电视观众不需要理解电视的实现。\n\
    *   *小接口*：接口尽可能小，以不限制实现的未来改进。\n*   *少量接口和分层*：每个模块尽可能少地使用来自其他模块的接口，以减少接口需要以不兼容方式更改时的连带损害，并普遍提高模块连续性。大多数架构是分层的，其中较高层（如业务逻辑）的模块可以调用较低层（如数据访问）的模块，反之则不行。\n\
    *   *直接映射*：每个模块代表一个专门的业务概念，并包含执行单个任务及其相关数据和操作，并力求做好该任务。\n\n这些通用需求和设计原则如何转化为PL/SQL？模块在不同的粒度级别上映射到子程序、包、模式（schema）或它们中任何一项的集合。作为抽象单元的子程序在PL/SQL和大多数其他过程语言中是相同的，因此这里不作更详细的讨论。\n\
    \n我将讨论限制在技术模块化上，并忽略源代码版本控制、部署、定制、营销和许可方面的模块化，技术模块化通常是这些方面的前提条件。我从包开始，然后描述如何实现包含模式和不包含模式的更大模块。"
  raw: 'The second reason for including prefixes or suffixes in PL/SQL identifiers
    is to avoid confusion with the large number of keywords in SQL and PL/SQL and
    the built-in functions declared in standard and dbms_standard. As of Oracle 11gR2,
    there are 1,844 SQL keywords such as *table* and names of built-in functions such
    as *upper*, which are listed in v$reserved_words.


    `SQL> select count(distinct keyword)`

    `  2  from   v$reserved_words;`


    `COUNT(DISTINCTKEYWORD)`

    `----------------------`

    `                  1844`


    `1 row selected.`


    The PL/SQL keywords are listed in appendix D of the *PL/SQL Language Reference*,
    but not available in a view. If you’re not careful in the selection of your own
    identifiers, you shadow the Oracle implementation. In the following example, the
    implementation of upper, which returns the argument in lowercase rather than the
    Oracle-provided standard function with the same name, is executed:


    `create or replace procedure test`

    `  authid definer`

    `is`

    `  function upper(i_text varchar2) return varchar2`

    `  is`

    `  begin`

    `    return lower(i_text);`

    `  end upper;`

    `begin`

    `  dbms_output.put_line(upper(''Hello, world!''));`

    `end test;`


    `SQL> exec test`

    `hello, world!`


    `PL/SQL procedure successfully completed.`


    What appears artificial in this small example may well occur in practice in a
    large package maintained by someone other than the original author. For example,
    the original author may have implemented a function `regexp_count` when the application
    still ran under 10g. After the upgrade to 11gR2, the new maintainer may have added
    a call to `regexp_count` somewhere else in the package, expecting the newly added
    SQL built-in function with the same name (but possibly different semantics) to
    be invoked.


    Oracle provides warnings to prevent the abuse of keywords. Unfortunately, warnings
    are usually disabled. If you enable all and recompile the test procedure, you
    get the desired error or warning, depending upon whether you set `plsql_warnings`
    to `error:all` or `enable:all`.


    `SQL> alter session set plsql_warnings=''error:all'';`


    `Session altered.`


    `SQL> alter procedure test compile;`


    `Warning: Procedure altered with compilation errors.`


    `SQL> show error`

    `Errors for PROCEDURE TEST:`


    `LINE/COL ERROR`

    `-------- ----------------------------------------------------------------------------`

    `4/12     PLS-05004: identifier UPPER is also declared in STANDARD or is a SQL
    built-in`


    In summary, adding a prefix or a suffix to every PL/SQL identifier can solve problems
    with scope capture. I use prefixes for variables and parameters to avoid scope
    capture in static SQL, but I don''t bother to add prefixes or suffixes to functions
    or procedures because clashes with keywords are rare and because scope capture
    cannot occur in SQL with functions with parameters.


    To differentiate between lists and elements thereof, it is common to add a plural
    suffix to lists such as associative arrays. Alternatively, suffixes to indicate
    the type, such as _rec for record and _tab for associative array types, are used
    to distinguish between elements and lists and at the same time convey additional
    semantic information at the cost of several characters. I use the type suffix
    notation in this chapter for clarity because I will be comparing implementations
    using different types. I use the hash sign as suffix for packages to avoid name
    clashes with tables of the same name.


    ![images](images/square.jpg) **Note** The proper usage of prefixes and suffixes
    can also easily be checked with PL/Scope. Lucas Jellema has an example of this
    at [`http://technology.amis.nl/blog/?p=2584`](http://technology.amis.nl/blog/?p=2584).


    ### Modularization of Code and Data


    Proper modularization is the foundation for scalability of the development team
    and maintainability of an application. Modularization brings the benefits of “divide
    and conquer” to software engineering. The key aspects of modularization are the
    following:


    *   *Decomposability*: It must be possible to decompose every complex problem
    into a small number of less complex subproblems that can be worked on separately.

    *   *Modular understandability*: In a large application, it must be possible to
    understand any part in isolation without knowing much or anything at all about
    the rest of the application. This property is called modular understandability.
    Programming in the large often means that a person works on an application with
    several million lines of code that already existed before she or he joined the
    company. Clearly, this can be done in an efficient manner only if the application
    satisfies modular understandability.

    *   *Modular continuity*: Continuity has two aspects. First, a small change to
    the specification must lead to a change in only one or a few modules. Second,
    a change in a module must easily be shown not to cause a regression in other modules.
    Modular continuity is especially important for interim patches that, due to their
    frequency and urgency, may not be as well tested as major releases.

    *   *Reusability*: A solution to a problem in one part of an application must
    be reusable in another part. The more general goal of composability (that is,
    the construction of new, possibly very different systems out of existing components)
    is commonly required only for basis frameworks.


    ![images](images/square.jpg) **Note** Decomposability and composability are often
    conflicting goals. Decomposability is achieved by top-down design. It leads to
    specific modules, which may be unsuitable for composition in general. Composability,
    on the other hand, is based on bottom-up design, which leads to general designs
    that are often inefficient and too costly for special cases (unless a module can
    be reused many times, justifying a large investment).


    These aspects of modularization can be achieved with modules by adhering to the
    following rules:


    *   *Information hiding (abstraction)*: Every module explicitly separates the
    public interface for its clients from its private implementation. This can be
    compared to a TV: its interface is a remote control with a few buttons and its
    implementation consists of complex circuits and software. TV viewers don''t need
    to understand the implementation of the TV.

    *   *Small interfaces*: The interfaces are as small as possible in order not to
    restrict future improvements of the implementation.

    *   *Few interfaces and layering*: Every module uses as few interfaces from other
    modules as possible to reduce collateral damage if an interface needs to be changed
    in an incompatible way and to generally improve modular continuity. Most architectures
    are layered, where modules from higher layers, such as the business logic, may
    call modules from lower layers, such as data access, but not vice versa.

    *   *Direct mapping*: Each module represents a dedicated business concept and
    encompasses the data and operations necessary to do a single task and to do it
    well.


    How do these general requirements and design principles translate to PL/SQL? A
    module maps on different levels of granularity to a subprogram, a package, a schema,
    or sets of any of the previous items. Subprograms as units of abstraction are
    the same in PL/SQL and most other procedural language and therefore not discussed
    here in more detail.


    I restrict the discussion to technical modularization and ignore modularization
    in source code versioning, deployment, customization, marketing, and licensing,
    for which the technical modularization is often a precondition. I start with packages
    and then describe how to implement larger modules with and without schemas.'
  trans: "\n## 避免 PL/SQL 标识符与关键字冲突\n\n在 PL/SQL 标识符中包含前缀或后缀的第二个原因，是为了避免与 SQL 和 PL/SQL\
    \ 中大量的关键字以及在`standard`和`dbms_standard`中声明的内置函数产生混淆。截至 Oracle 11gR2，有 1,844 个 SQL\
    \ 关键字，例如`table`，以及内置函数的名称，例如`upper`，这些都列在`v$reserved_words`中。\n\n```sql\nSQL>\
    \ select count(distinct keyword)\n  2  from   v$reserved_words;\n\nCOUNT(DISTINCTKEYWORD)\n\
    ----------------------\n                  1844\n\n1 row selected.\n```\n\nPL/SQL\
    \ 关键字列在《PL/SQL 语言参考》的附录 D 中，但无法通过视图查看。如果不小心选择自己的标识符，就会遮蔽（shadow）Oracle 的实现。在下面的例子中，`upper`的实现（它返回小写参数而不是\
    \ Oracle 提供的同名标准函数）被执行了：\n\n```sql\ncreate or replace procedure test\n  authid\
    \ definer\nis\n  function upper(i_text varchar2) return varchar2\n  is\n  begin\n\
    \    return lower(i_text);\n  end upper;\nbegin\n  dbms_output.put_line(upper('Hello,\
    \ world!'));\nend test;\n\nSQL> exec test\nhello, world!\n\nPL/SQL procedure successfully\
    \ completed.\n```\n\n这个小例子中显得有些人为的情况，在实际中很可能发生在一个由非原作者维护的大型包中。例如，当应用程序还在 10g 下运行时，原作者可能实现了一个函数`regexp_count`。在升级到\
    \ 11gR2 后，新的维护者可能在包的某个其他地方添加了对`regexp_count`的调用，期望调用同名（但语义可能不同）的新增 SQL 内置函数。\n\
    \nOracle 提供了警告来防止滥用关键字。不幸的是，警告通常处于禁用状态。如果你启用所有警告并重新编译测试过程，你会得到期望的错误或警告，这取决于你将`plsql_warnings`设置为`error:all`还是`enable:all`。\n\
    \n```sql\nSQL> alter session set plsql_warnings='error:all';\n\nSession altered.\n\
    \nSQL> alter procedure test compile;\n\nWarning: Procedure altered with compilation\
    \ errors.\n\nSQL> show error\nErrors for PROCEDURE TEST:\n\nLINE/COL ERROR\n--------\
    \ -------------------------------------------------------------------------------\n\
    4/12      PLS-05004: identifier UPPER is also declared in STANDARD or is a SQL\
    \ built-in\n```\n\n总之，为每个 PL/SQL 标识符添加前缀或后缀可以解决作用域捕获（scope capture）的问题。我使用变量和参数的前缀来避免静态\
    \ SQL 中的作用域捕获，但我不费心为函数或过程添加前缀或后缀，因为与关键字的冲突很少见，而且带有参数的 SQL 函数不会发生作用域捕获。\n\n为了区分列表及其元素，通常为列表（如关联数组）添加复数后缀。或者，使用后缀来指示类型，例如`_rec`表示记录，`_tab`表示关联数组类型，以此来区分元素和列表，同时以几个字符为代价传达额外的语义信息。我在本章中使用类型后缀表示法是为了清晰，因为我将比较使用不同类型的实现。我使用井号（#）作为包的后缀，以避免与同名表发生名称冲突。\n\
    \n**注意**：前缀和后缀的正确使用也可以通过 PL/Scope 轻松检查。Lucas Jellema 在 [`http://technology.amis.nl/blog/?p=2584`](http://technology.amis.nl/blog/?p=2584)\
    \ 上有一个这方面的例子。\n\n### 代码与数据的模块化\n\n正确的模块化是开发团队可扩展性和应用程序可维护性的基础。模块化将“分而治之”的益处带入了软件工程。模块化的关键方面如下：\n\
    \n*   *可分解性*：必须能够将每个复杂问题分解为少量不太复杂的子问题，这些子问题可以分开处理。\n*   *模块可理解性*：在一个大型应用程序中，必须能够独立理解任何部分，而无需了解其余应用程序的太多或全部信息。这种特性称为模块可理解性。“大规模编程”通常意味着一个人加入公司时，需要处理一个已有数百万行代码的应用程序。显然，只有应用程序满足模块可理解性，才能以高效的方式完成这项工作。\n\
    *   *模块连续性*：连续性有两个方面。首先，对规范的小改动必须仅导致一个或几个模块的改动。其次，模块中的改动必须易于证明不会在其他模块中引起回归。模块连续性对于临时补丁尤其重要，由于其频率和紧迫性，可能无法像主要版本那样经过充分测试。\n\
    *   *可重用性*：应用程序某部分问题的解决方案必须能在另一部分重用。更通用的可组合性目标（即用现有组件构建新的、可能非常不同的系统）通常只对基础框架有要求。\n\
    \n**注意**：可分解性和可组合性通常是相互冲突的目标。可分解性是通过自顶向下设计实现的。它导致特定的模块，这些模块通常不适合通用的组合。另一方面，可组合性基于自底向上设计，这导致通用设计，但这些设计对于特殊情况通常效率低下且成本过高（除非一个模块可以被重用多次，从而证明大的投入是合理的）。\n\
    \n通过遵守以下规则，可以用模块实现模块化的这些方面：\n\n*   *信息隐藏（抽象）*：每个模块都明确地将其公共接口与其实现细节分离。这可以比作一台电视机：它的接口是带有几个按钮的遥控器，它的实现由复杂的电路和软件组成。电视观众不需要理解电视的实现。\n\
    *   *小接口*：接口尽可能小，以不限制实现的未来改进。\n*   *少量接口和分层*：每个模块尽可能少地使用来自其他模块的接口，以减少接口需要以不兼容方式更改时的连带损害，并普遍提高模块连续性。大多数架构是分层的，其中较高层（如业务逻辑）的模块可以调用较低层（如数据访问）的模块，反之则不行。\n\
    *   *直接映射*：每个模块代表一个专门的业务概念，并包含执行单个任务及其相关数据和操作，并力求做好该任务。\n\n这些通用需求和设计原则如何转化为 PL/SQL？模块在不同的粒度级别上映射到子程序、包、模式（schema）或它们中任何一项的集合。作为抽象单元的子程序在\
    \ PL/SQL 和大多数其他过程语言中是相同的，因此这里不作更详细的讨论。\n\n我将讨论限制在技术模块化上，并忽略源代码版本控制、部署、定制、营销和许可方面的模块化，技术模块化通常是这些方面的前提条件。我从包开始，然后描述如何实现包含模式和不包含模式的更大模块。\n"
- fmt: "# Packages and Associated Tables as Modules\n\nPL/SQL explicitly provides\
    \ packages to be used as modules that meet the previously mentioned requirements.\
    \ Information hiding is supported by separating the package specification from\
    \ its implementation. To ensure that the clients need to consult only the specification\
    \ and don't rely on implementation details that may change, the package specification\
    \ must be properly documented. A brief description of the semantics and intended\
    \ usage of the overall package and each interface element (such as subprograms\
    \ and types) suffices. The fact that there is no standard HTML API generation\
    \ tool similar to `JavaDoc` available for `PL/SQL` is no excuse not to document\
    \ package specifications. Users won't mind reading the documentation in the package\
    \ specification. In fact, in an ad-hoc survey, most `Java` developers told me\
    \ that they look at `JavaDoc` in the `Java` sources rather than the generated\
    \ `HTML`.\n\nInformation hiding can even be implemented literally by wrapping\
    \ the body but not the specification. Oracle does this for most public APIs, such\
    \ as `dbms_sql`. Be aware, though, that wrapped code can be unwrapped, losing\
    \ only comments in the process.\n\nEvery element exposed in a package specification\
    \ can be used by any other program in the same schema and in another schema that\
    \ has been granted `execute` privilege on the package. `PL/SQL` does not support\
    \ protected export like `Java` or read-only export of variables like `Oberon-2`.\
    \ This is not needed: APIs for different types of clients can be implemented by\
    \ different packages.\n\nPackages also provide for efficient development with\
    \ separate, type-safe compilation. Clients can be compiled against the package\
    \ specification and are never invalidated if only the body is modified. With the\
    \ introduction of fine-grained dependency tracking in `11g`, clients are invalidated\
    \ only if the package specification changes in a relevant way. The drawback of\
    \ this approach is that without a just-in-time compiler (which `PL/SQL` doesn't\
    \ have) no cross-unit inlining is possible (except for standalone procedures,\
    \ which `PL/SQL` doesn't currently support either).\n\n![images](images/square.jpg)\
    \ **Note** To keep the interface small, most procedures should be declared only\
    \ in the package body and not exported through the specification in production\
    \ code. To test them, they can be exported in test builds using conditional compilation,\
    \ as described by Bryn Llewellyn at `http://bit.ly/eXxJ9Q`.\n\nTo extend modularization\
    \ from `PL/SQL` code to table data, every table should be modified by only a single\
    \ package. Likewise, all select statements referencing only a single table should\
    \ be contained in this single package. On the other hand, select statements referencing\
    \ multiple tables associated with different packages are allowed to break the\
    \ one-to-one mapping. Views may be used to introduce an additional layer of abstraction.\
    \ However, it is usually not practical to introduce a view for every join between\
    \ two tables associated with different packages.\n\nThere are multiple approaches\
    \ to detect violations of the previously mentioned rules for table accesses. All\
    \ approaches described here must be viewed as software engineering tools to find\
    \ bugs during testing and not as means to enforce security. Except for the trigger\
    \ and the fine-grained auditing approaches, a transitive closure (e.g., with a\
    \ hierarchical query) is required to drill down through views to the underlying\
    \ tables.\n\nI describe two compile-time approaches in summary form in a single\
    \ section and three runtime approaches in detail under separate headings. The\
    \ runtime approaches are more complex and contain techniques of interest beyond\
    \ the specific cases. The main problem with the runtime approaches is that they\
    \ require test cases that trigger the execution of all relevant `SQL` statements.\n\
    \n### Detecting Table Accesses by Static Analysis\n\nThere are two compile-time\
    \ approaches based on static analysis:\n\n*   Searching in the source text: This\
    \ approach is usually surprisingly quick with a good tool, unless there are lots\
    \ of views whose occurrences also need to be searched. However, this approach\
    \ requires a `PL/SQL` parser to be automated.\n*   Dependencies: The view `user_dependencies`\
    \ lists only static dependencies and does not distinguish between `DML` and read-only\
    \ access. `PL/Scope` does not contain information on `SQL` statements.\n\n###\
    \ Detecting Table Accesses by Probing the Shared Pool\n\nThe view `v$sql` contains\
    \ recently executed `SQL` that is still in the shared pool. The column `program_id`\
    \ references the `PL/SQL` unit that caused the hard parse. For example, the following\
    \ statement shows all `PL/SQL` sources that issued `DML` against the above table\
    \ `abbr_reg`. To also see select statements, simply remove the condition on `command_type`.\n\
    \n```sql\nSQL> select ob.object_name\n  2        ,sq.program_line#\n  3      \
    \  ,sq.sql_text\n  4  from   v$sql       sq\n  5        ,all_objects ob\n  6 \
    \ where  sq.command_type in (2 /*insert*/, 6 /*update*/, 7 /*delete*/, 189 /*merge*/)\n\
    \  7     and sq.program_id = ob.object_id (+)\n  8     and upper(sq.sql_fulltext)\
    \ like '%ABBR_REG%';\n```\n\n```\nOBJECT_NAME          PROGRAM_LINE# SQL_TEXT\n\
    -------------------- ------------- ------------------------------------------------------\n\
    ABBR_REG#                       10 INSERT INTO ABBR_REG(ABBR, TEXT, DESCN) VALUES(UPPER(:\n\
    \n1 row selected.\n```\n\nThe shared pool probing approach has several shortcomings.\n\
    \n*   Only the `PL/SQL` unit that caused the hard parse is returned. If the same\
    \ `SQL` occurs in multiple units (even though it shouldn't in hand-written code),\
    \ you won't find the others. If the hard parse is triggered by an anonymous block,\
    \ you don't get any relevant information.\n*   You have to catch the `SQL` before\
    \ it is flushed out of the shared pool. The `Statspack`, `ASH`, and `AWR` views\
    \ on `SQL` don't contain the column `program_id`.\n*   You need to use an approximate\
    \ string match, which may return too much data, because the target table of a\
    \ `DML` is visible only in the `SQL` text. Tables from a select clause can be\
    \ matched exactly by joining `v$sql_plan`. Alternatively, you can create on-the-fly\
    \ wrapper procedures containing the `SQL` texts, get the references from `all_dependencies`,\
    \ and drop the wrapper procedures again.\n*   Truncates are listed as generic\
    \ lock table in the `SQL` text.\n\n### Detecting Table Accesses with Triggers\n\
    \nTriggers are another option to log or block access. The following trigger checks\
    \ that all `DML` to the table `abbr_reg` is made from the package `abbr_reg#`\
    \ or a subprogram called from it:\n\n```sql\ncreate or replace trigger abbr_reg#b\n\
    before update or insert or delete or merge\non abbr_reg\nbegin\n  if dbms_utility.format_call_stack\
    \ not like\n       '%package body% K.ABBR_REG#' || chr(10) /*UNIX EOL*/|| '%'\
    \ then\n    raise_application_error(-20999,'Table abbr_reg may only be modified\
    \ by abbr_reg#.');\n  end if;\nend;\n```\n\nAs expected, `DML` from `abbr_reg#`\
    \ is tolerated, but direct `DML` or `DML` from another package is not.\n\n```sql\n\
    SQL> exec abbr_reg#.ins_abbr('descn', 'description')\n\nPL/SQL procedure successfully\
    \ completed.\n\nSQL> insert into abbr_reg(abbr, text) values('reg', 'registry');\n\
    insert into abbr_reg(abbr, text) values('reg', 'registry')\n            *\nERROR\
    \ at line 1:\nORA-20999: Table abbr_reg may only be modified by abbr_reg#.\nORA-06512:\
    \ at \"K.ABBR_REG#B\", line 3\nORA-04088: error during execution of trigger 'K.ABBR_REG#B'\n\
    ```\n\nInstead of calling the expensive `dbms_utility.format_call stack`, you\
    \ can use a package body global variable in `abbr_reg#`, set the variable to `true`\
    \ before accesses to the table `abbr_reg` and `false` after, and call from the\
    \ trigger a procedure in `abbr_reg#` that checks whether the variable is `true`\
    \ or not."
  raw: '#### Packages and Associated Tables as Modules


    PL/SQL explicitly provides packages to be used as modules that meet the previously
    mentioned requirements. Information hiding is supported by separating the package
    specification from its implementation. To ensure that the clients need to consult
    only the specification and don''t rely on implementation details that may change,
    the package specification must be properly documented. A brief description of
    the semantics and intended usage of the overall package and each interface element
    (such as subprograms and types) suffices. The fact that there is no standard HTML
    API generation tool similar to JavaDoc available for PL/SQL is no excuse not to
    document package specifications. Users won''t mind reading the documentation in
    the package specification. In fact, in an ad-hoc survey, most Java developers
    told me that they look at JavaDoc in the Java sources rather than the generated
    HTML.


    Information hiding can even be implemented literally by wrapping the body but
    not the specification. Oracle does this for most public APIs, such as dbms_sql.
    Be aware, though, that wrapped code can be unwrapped, losing only comments in
    the process.


    Every element exposed in a package specification can be used by any other program
    in the same schema and in another schema that has been granted execute privilege
    on the package. PL/SQL does not support protected export like Java or read-only
    export of variables like Oberon-2\. This is not needed: APIs for different types
    of clients can be implemented by different packages.


    Packages also provide for efficient development with separate, type-safe compilation.
    Clients can be compiled against the package specification and are never invalidated
    if only the body is modified. With the introduction of fine-grained dependency
    tracking in 11g, clients are invalidated only if the package specification changes
    in a relevant way. The drawback of this approach is that without a just-in-time
    compiler (which PL/SQL doesn''t have) no cross-unit inlining is possible (except
    for standalone procedures, which PL/SQL doesn''t currently support either).


    ![images](images/square.jpg) **Note** To keep the interface small, most procedures
    should be declared only in the package body and not exported through the specification
    in production code. To test them, they can be exported in test builds using conditional
    compilation, as described by Bryn Llewellyn at [`http://bit.ly/eXxJ9Q`](http://bit.ly/eXxJ9Q).


    To extend modularization from PL/SQL code to table data, every table should be
    modified by only a single package. Likewise, all select statements referencing
    only a single table should be contained in this single package. On the other hand,
    select statements referencing multiple tables associated with different packages
    are allowed to break the one-to-one mapping. Views may be used to introduce an
    additional layer of abstraction. However, it is usually not practical to introduce
    a view for every join between two tables associated with different packages.


    There are multiple approaches to detect violations of the previously mentioned
    rules for table accesses. All approaches described here must be viewed as software
    engineering tools to find bugs during testing and not as means to enforce security.
    Except for the trigger and the fine-grained auditing approaches, a transitive
    closure (e.g., with a hierarchical query) is required to drill down through views
    to the underlying tables.


    I describe two compile-time approaches in summary form in a single section and
    three runtime approaches in detail under separate headings. The runtime approaches
    are more complex and contain techniques of interest beyond the specific cases.
    The main problem with the runtime approaches is that they require test cases that
    trigger the execution of all relevant SQL statements.


    ##### Detecting Table Accesses by Static Analysis


    There are two compile-time approaches based on static analysis:


    *   *Searching in the source text*: This approach is usually surprisingly quick
    with a good tool, unless there are lots of views whose occurrences also need to
    be searched. However, this approach requires a PL/SQL parser to be automated.

    *   *Dependencies*: The view user_dependencies lists only static dependencies
    and does not distinguish between DML and read-only access. PL/Scope does not contain
    information on SQL statements.


    ##### Detecting Table Accesses by Probing the Shared Pool


    The view v$sql contains recently executed SQL that is still in the shared pool.
    The column program_id references the PL/SQL unit that caused the hard parse. For
    example, the following statement shows all PL/SQL sources that issued DML against
    the above table abbr_reg. To also see select statements, simply remove the condition
    on command_type.


    `SQL> select ob.object_name`

    `  2        ,sq.program_line#`

    `  3        ,sq.sql_text`

    `  4  from   v$sql       sq`

    `  5        ,all_objects ob`

    `  6  where  sq.command_type in (2 /*insert*/, 6 /*update*/, 7 /*delete*/, 189
    /*merge*/)`

    `  7     and sq.program_id = ob.object_id (+)`

    `  8     and upper(sq.sql_fulltext) like ''%ABBR_REG%'';`


    `OBJECT_NAME          PROGRAM_LINE# SQL_TEXT`

    `-------------------- ------------- ------------------------------------------------------`

    `ABBR_REG#                       10 INSERT INTO ABBR_REG(ABBR, TEXT, DESCN) VALUES(UPPER(:`


    `1 row selected.`


    The shared pool probing approach has several shortcomings.


    *   Only the PL/SQL unit that caused the hard parse is returned. If the same SQL
    occurs in multiple units (even though it shouldn''t in hand-written code), you
    won''t find the others. If the hard parse is triggered by an anonymous block,
    you don''t get any relevant information.

    *   You have to catch the SQL before it is flushed out of the shared pool. The
    Statspack, ASH, and AWR views on SQL don''t contain the column program_id.

    *   You need to use an approximate string match, which may return too much data,
    because the target table of a DML is visible only in the SQL text. Tables from
    a select clause can be matched exactly by joining v$sql_plan. Alternatively, you
    can create on-the-fly wrapper procedures containing the SQL texts, get the references
    from all_dependencies, and drop the wrapper procedures again.

    *   Truncates are listed as generic lock table in the SQL text.


    ##### Detecting Table Accesses with Triggers


    Triggers are another option to log or block access. The following trigger checks
    that all DML to the table abbr_reg is made from the package abbr_reg# or a subprogram
    called from it:


    `create or replace trigger abbr_reg#b`

    `before update or insert or delete or merge`

    `on abbr_reg`

    `begin`


    `  if dbms_utility.format_call_stack not like`

    `       ''%package body% K.ABBR_REG#'' || chr(10) /*UNIX EOL*/|| ''%'' then`

    `    raise_application_error(-20999,''Table abbr_reg may only be modified by abbr_reg#.'');`

    `  end if;`

    `end;`


    As expected, DML from abbr_reg# is tolerated, but direct DML or DML from another
    package is not.


    `SQL> exec abbr_reg#.ins_abbr(''descn'', ''description'')`


    `PL/SQL procedure successfully completed.`


    `SQL> insert into abbr_reg(abbr, text) values(''reg'', ''registry'');`

    `insert into abbr_reg(abbr, text) values(''reg'', ''registry'')`

    `            *`

    `ERROR at line 1:`

    `ORA-20999: Table abbr_reg may only be modified by abbr_reg#.`

    `ORA-06512: at "K.ABBR_REG#B", line 3`

    `ORA-04088: error during execution of trigger ''K.ABBR_REG#B''`


    Instead of calling the expensive dbms_utility.format_call stack, you can use a
    package body global variable in abbr_reg#, set the variable to true before accesses
    to the table abbr_reg and false after, and call from the trigger a procedure in
    abbr_reg# that checks whether the variable is true or not.'
  trans: "\n# 作为模块的包及相关表\n\nPL/SQL 明确地提供了包，可将其用作满足前述要求的模块。通过将包规范与其实施分离，支持信息隐藏。为确保客户端只需查阅规范，而不依赖于可能改变的实施细节，必须对包规范进行恰当的文档编写。对整个包以及每个接口元素（如子程序和类型）的语义和预期用途进行简要描述便已足够。目前没有类似于\
    \ `JavaDoc` 的标准 HTML API 生成工具可用于 `PL/SQL`，这不能成为不为包规范编写文档的借口。用户不会介意阅读包规范中的文档。事实上，在一项非正式调查中，大多数\
    \ `Java` 开发者告诉我，他们更倾向于查看 `Java` 源码中的 `JavaDoc`，而不是生成的 `HTML`。\n\n信息隐藏甚至可以通过字面意义上地封装主体而非规范来实现。Oracle\
    \ 对大多数公共 API 都采用此做法，例如 `dbms_sql`。不过要注意，封装的代码可以被反封装，在此过程中只会丢失注释。\n\n包规范中暴露的每个元素都可以被同一模式中的任何其他程序使用，也可以被另一个已获得该包\
    \ `execute` 权限的模式中的程序使用。`PL/SQL` 不支持像 `Java` 那样的受保护导出，也不支持像 `Oberon-2` 那样的变量只读导出。这没有必要：可以通过不同的包来实现针对不同类型客户端的\
    \ API。\n\n包还通过分离的、类型安全的编译来支持高效开发。客户端可以针对包规范进行编译，并且仅当包主体被修改时，它们也永远不会失效。随着 `11g`\
    \ 中引入细粒度依赖跟踪，只有当包规范发生相关变更时，客户端才会失效。这种方法的缺点是，由于没有即时编译器（`PL/SQL` 没有），无法进行跨单元内联（除了独立过程，而\
    \ `PL/SQL` 目前也不支持独立过程）。\n\n![images](img/square.jpg) **注意** 为保持接口精简，生产代码中的大多数过程应只在包主体中声明，而不通过规范导出。为了测试它们，可以使用条件编译在测试构建中将它们导出，正如\
    \ Bryn Llewellyn 在 `http://bit.ly/eXxJ9Q` 中所描述的那样。\n\n要将模块化从 `PL/SQL` 代码扩展到表数据，每个表都应仅由单个包修改。同样，所有仅引用单个表的\
    \ `select` 语句都应包含在此单一包中。另一方面，引用与不同包相关联的多个表的 `select` 语句则允许打破这种一对一映射。可以使用视图来引入额外的抽象层。然而，为与不同包关联的两个表之间的每个连接都引入一个视图通常是不切实际的。\n\
    \n有多种方法可以检测违反前述表访问规则的情况。此处描述的所有方法都必须视为在测试期间发现错误的软件工程工具，而不是执行安全性的手段。除了触发器和细粒度审计方法外，都需要传递闭包（例如使用层次查询）来通过视图深入到底层表。\n\
    \n我将在一个章节中以摘要形式描述两种编译时方法，并在单独的小节下详细描述三种运行时方法。运行时方法更复杂，并且包含超出特定案例的令人感兴趣的技术。运行时方法的主要问题是它们需要能够触发所有相关\
    \ `SQL` 语句执行的测试用例。\n\n### 通过静态分析检测表访问\n\n有两种基于静态分析的编译时方法：\n\n*   在源文本中搜索：如果工具良好，此方法通常出奇地快，除非存在大量视图，这些视图的出现也需要被搜索。然而，此方法需要\
    \ `PL/SQL` 解析器来实现自动化。\n*   依赖关系：视图 `user_dependencies` 仅列出静态依赖关系，不区分 `DML` 和只读访问。`PL/Scope`\
    \ 不包含关于 `SQL` 语句的信息。\n\n### 通过探测共享池检测表访问\n\n视图 `v$sql` 包含仍在共享池中最近执行的 `SQL`。`program_id`\
    \ 列引用导致硬解析的 `PL/SQL` 单元。例如，以下语句显示所有对上述表 `abbr_reg` 发出过 `DML` 的 `PL/SQL` 源码。要同时看到\
    \ `select` 语句，只需移除对 `command_type` 的条件即可。\n\n```sql\nSQL> select ob.object_name\n\
    \  2        ,sq.program_line#\n  3        ,sq.sql_text\n  4  from   v$sql    \
    \   sq\n  5        ,all_objects ob\n  6  where  sq.command_type in (2 /*insert*/,\
    \ 6 /*update*/, 7 /*delete*/, 189 /*merge*/)\n  7     and sq.program_id = ob.object_id\
    \ (+)\n  8     and upper(sq.sql_fulltext) like '%ABBR_REG%';\n```\n\n```\nOBJECT_NAME\
    \          PROGRAM_LINE# SQL_TEXT\n-------------------- ------------- ------------------------------------------------------\n\
    ABBR_REG#                       10 INSERT INTO ABBR_REG(ABBR, TEXT, DESCN) VALUES(UPPER(:\n\
    \n1 row selected.\n```\n\n共享池探测方法有几个缺点。\n\n*   只返回导致硬解析的 `PL/SQL` 单元。如果相同的 `SQL`\
    \ 出现在多个单元中（尽管在手写代码中不应出现），你将找不到其他的。如果硬解析是由匿名块触发的，你将得不到任何相关信息。\n*   你必须在 `SQL` 从共享池中刷出之前捕获它。关于\
    \ `SQL` 的 `Statspack`、`ASH` 和 `AWR` 视图不包含 `program_id` 列。\n*   你需要使用近似的字符串匹配，这可能返回过多数据，因为\
    \ `DML` 的目标表仅在 `SQL` 文本中可见。来自 `select` 子句的表可以通过连接 `v$sql_plan` 来精确匹配。或者，你可以动态创建包含\
    \ `SQL` 文本的包装过程，从 `all_dependencies` 获取引用，然后再次删除包装过程。\n*   `Truncate` 在 `SQL`\
    \ 文本中被列为通用的 `lock table`。\n\n### 使用触发器检测表访问\n\n触发器是记录或阻止访问的另一种选择。以下触发器检查对表 `abbr_reg`\
    \ 的所有 `DML` 操作是否来自包 `abbr_reg#` 或其调用的子程序：\n\n```sql\ncreate or replace trigger\
    \ abbr_reg#b\nbefore update or insert or delete or merge\non abbr_reg\nbegin\n\
    \  if dbms_utility.format_call_stack not like\n       '%package body% K.ABBR_REG#'\
    \ || chr(10) /*UNIX EOL*/|| '%' then\n    raise_application_error(-20999,'Table\
    \ abbr_reg may only be modified by abbr_reg#.');\n  end if;\nend;\n```\n\n正如预期的那样，来自\
    \ `abbr_reg#` 的 `DML` 被允许，但直接的 `DML` 或来自另一个包的 `DML` 则不允许。\n\n```sql\nSQL> exec\
    \ abbr_reg#.ins_abbr('descn', 'description')\n\nPL/SQL procedure successfully\
    \ completed.\n\nSQL> insert into abbr_reg(abbr, text) values('reg', 'registry');\n\
    insert into abbr_reg(abbr, text) values('reg', 'registry')\n            *\nERROR\
    \ at line 1:\nORA-20999: Table abbr_reg may only be modified by abbr_reg#.\nORA-06512:\
    \ at \"K.ABBR_REG#B\", line 3\nORA-04088: error during execution of trigger 'K.ABBR_REG#B'\n\
    ```\n\n代替调用开销大的 `dbms_utility.format_call_stack`，你可以在 `abbr_reg#` 中使用一个包主体全局变量，在访问表\
    \ `abbr_reg` 之前将该变量设置为 `true`，之后设置为 `false`，并在触发器中调用 `abbr_reg#` 中的一个过程来检查该变量是否为\
    \ `true`。\n"
- fmt: "# Detecting Table Accesses with Fine-Grained Auditing\n\nSince Oracle doesn't\
    \ provide on-select triggers, you have to use a workaround to detect read access.\
    \ The three options are fine-grained auditing, RLS predicates, and Database Vault.\
    \ All require the Enterprise Edition. Database Vault is an additionally priced\
    \ option. Here is the approach with fine-grained auditing. I log all distinct\
    \ callers into the table `call_log`.\n\n```sql\ncreate table call_log(\n   object_schema\
    \             varchar2(30)\n  ,object_name               varchar2(30)\n  ,policy_name\
    \               varchar2(30)\n  ,caller                    varchar2(200)\n  ,sql_text\
    \                  varchar2(2000 byte)\n  ,constraint call_log#p primary key(object_schema,\
    \ object_name, policy_name\n                                    ,caller, sql_text)\n\
    ) organization index;\n```\n\n![images](images/square.jpg) **Note** Oracle puts\
    \ a limit onto the maximum size of an index entry based on the block size as described\
    \ in My Oracle Support (MOS) Note 136158.1. I ran this example on a database with\
    \ 8K block size and AL32UTF8 character set, in which each character can occupy\
    \ up to 4 bytes. To get the most information into the index, which is used to\
    \ avoid duplicate entries upon creation, I specify the length semantics of the\
    \ column `sql_text` to be byte.\n\nThe table gets filled by the procedure `call_log_ins`,\
    \ which is called by the fine-grained auditing framework for every SQL statement\
    \ execution, corresponding roughly to a statement-level trigger.\n\n```sql\ncreate\
    \ or replace procedure call_log_ins(\n  i_object_schema            varchar2\n\
    \ ,i_object_name              varchar2\n ,i_policy_name              varchar2\n\
    )\nis\n  pragma autonomous_transaction;\n  l_caller                   call_log.caller%type;\n\
    \  l_current_sql              call_log.sql_text%type;\n\n  ----------------------------------------------------------------------------------\n\
    \  -- Returns the call stack below the trigger down to the first non-anonymous\
    \ block.\n  ----------------------------------------------------------------------------------\n\
    \  function caller(\n    i_call_stack             varchar2\n  ) return varchar2\n\
    \  as\n    c_lf            constant varchar2(1) := chr(10);\n    c_pfx_len   \
    \    constant pls_integer := 8;\n    c_head_line_cnt constant pls_integer := 5;\n\
    \    l_sol                    pls_integer;\n    l_eol                    pls_integer;\n\
    \    l_res                    varchar2(32767);\n    l_line                   varchar2(256);\n\
    \  begin\n    l_sol := instr(i_call_stack, c_lf, 1, c_head_line_cnt) + 1 + c_pfx_len;\n\
    \    l_eol := instr(i_call_stack, c_lf, l_sol);\n    l_line := substr(i_call_stack,\
    \ l_sol, l_eol - l_sol);\n    l_res := l_line;\n    while instr(l_line, 'anonymous\
    \ block') != 0 loop\n      l_sol := l_eol + 1 + c_pfx_len;\n      l_eol := instr(i_call_stack,\
    \ c_lf, l_sol);\n      l_line := substr(i_call_stack, l_sol, l_eol - l_sol);\n\
    \      l_res := l_res || c_lf || l_line;  \n    end loop;\n    return l_res;\n\
    \  end caller;\n\nbegin\n  l_caller := nvl(substr(caller(dbms_utility.format_call_stack),\
    \ 1, 200), 'external');\n  l_current_sql := substrb(sys_context('userenv','current_sql'),\
    \ 1, 2000);\n  insert into call_log(\n    object_schema\n   ,object_name\n   ,policy_name\n\
    \   ,caller\n   ,sql_text\n  ) values (\n    i_object_schema\n   ,i_object_name\n\
    \   ,i_policy_name\n   ,l_caller\n   ,l_current_sql\n  );\n  commit;\nexception\n\
    \  when dup_val_on_index then\n    rollback;\nend call_log_ins;\n```\n\nFinally,\
    \ I need to add the policy. I want the procedure `call_log_ins` to be called for\
    \ every access to the table `abbr_reg` in a `select` statement. To audit DML as\
    \ well, I must add the parameter `statement_types => 'select,insert,update,delete'`\
    \ to the call or create separate policies for `select` and for DML.\n\n```sql\n\
    begin\n  dbms_fga.add_policy(\n    object_name     => 'ABBR_REG'\n   ,policy_name\
    \     => 'ABBR_REG#SELECT'\n   ,handler_module  => 'CALL_LOG_INS'\n  );\nend;\n\
    /\n```\n\nI test the implementation by calling `abbr_reg#.chk_abbr` from my running\
    \ example, like so:\n\n```sql\nSQL> exec abbr_reg#.chk_abbr\n\nPL/SQL procedure\
    \ successfully completed.\n\nSQL> select object_name, policy_name, caller, sql_text\
    \ from call_log;\n\nOBJECT_NAME POLICY_NAME     CALLER                       \
    \  SQL_TEXT\n----------- --------------- ------------------------------ ---------------------------------\n\
    ABBR_REG    ABBR_REG#SELECT 35  package body K.ABBR_REG#   SELECT COUNT(*) FROM\
    \ ABBR_REG WHE\n\n1 row selected.\n```\n\nNeither the DML trigger nor the fine-grained\
    \ auditing fires on `truncate` of a table or partition. To log or block these,\
    \ a DDL trigger is required."
