  trans: '## 包含多个包或子模块的模块


    子程序和包是必要的构建块。然而，在大型程序中，需要更高层级的模块来对成千上万的包进行分组。例如，Avaloq 银行系统在功能上划分为核心银行、执行与运营以及前台模块。每个模块又被进一步细分，例如将执行与运营细分为财务和支付。在每个模块化层级上，都会声明可接受的依赖关系。


    正交地，系统在技术上被划分为数据访问层、业务逻辑层和表示层。这两种模块化方式可以分开处理，也可以组合起来，如图 11-3 左侧所示。原子模块，例如财务用户界面，被定义为这两种模块化的交集。技术模块以包围框的形式展示，一级功能模块则通过相同的底色和属于同一模块的原子模块的名称前缀来标识。


    ![images](img/1103.jpg)


    **图 11-3.** 嵌套的层与模块架构，以及采用模式的平面化实现


    作为包和其他对象类型集合的模块，可以在 Oracle 中用模式和权限来表示。模式和权限都非常灵活，但层级较低。例如，模式不能嵌套。因此，图 11-3 左侧概念上的层级架构，必须映射到一组平面的模式，如右侧所示。此外，接口必须实现为对每个客户模式的单独权限授予。


    因此，引入一种比 Oracle 模式和权限抽象层级更高的模块化模型，可以通过减少条目数量来提高可理解性。如果需要，可以从这个模型生成 Oracle 模式和权限，或者使用该模型来检查模式内的模块化情况。


    元模型的精确要求取决于所选的模块化方式。通常，模型必须满足以下要求：


    1.  表示系统的模块，例如图 11-3 中的`支付逻辑`和`业务框架`。

    2.  将每个数据库对象精确映射到一个模块，例如将 PL/SQL 包`pay_trx#`映射到`支付逻辑`模块。

    3.  声明模块之间的依赖关系，例如`支付逻辑`使用`业务框架`，但反之则不行。只应允许无环依赖。

    4.  声明每个模块的接口（API）——即哪些对象可以被依赖模块引用。

    5.  提供一个扩展/向上调用机制，允许一个模块被依赖它的另一个模块扩展。例如，`表示框架`可以声明一个用于菜单项的扩展点，而`支付用户界面`可以创建一个菜单项。当该菜单项被选中时，`表示框架`必须对`支付用户界面`进行`向上调用`。此调用被称为`向上调用`，因为它与依赖链方向相反：`支付用户界面`依赖于`表示框架`，而非相反。


    在 PL/SQL 中，`向上调用`通常通过生成的分发器或动态 SQL 来实现，如面向对象编程部分所述。如果模块是用模式实现的，则必须授予适当的`执行`对象权限。


    通过将生成的代码（例如`向上调用`分发器）放入单独的模式中，可以将源自依赖关系的权限和为`向上调用`所需的权限分离开来。


    如果`向上调用`是使用用户定义类型提供的动态分发来实现的，则根本不需要额外的权限。


    可选地，元模型还可以提供以下功能：


    6.  支持模块沿一个或多个维度（例如功能性和技术分层）的层级嵌套。或者，可以引入专用实体，如层和功能组件。专用实体可以用特定的语义来定义，例如层只允许向下的依赖关系。

    7.  允许存在友元模块，它们可以使用普通客户端模块无法访问的额外 API。例如，`支付逻辑`模块可以只为`支付用户界面`模块提供额外的 API。同样，出于性能原因，可能需要拓宽选定模块之间的接口。友元关系可以单独声明，也可以从其他实体（例如功能域模块）派生。

    8.  管理异常。在引入（新的）目标模块化方案时，可能无法立即移除所有非法依赖，但未来绝不能创建额外的非法依赖。因此，必须管理暂时容忍的非法依赖。


    应用程序的目标架构模型可以集中定义在一个文件中，也可以按模块定义。集中定义适用于全局的高层级实体，例如层。按模块的配置更具可扩展性，并且对于多个独立的模块提供者是必需的。OSGi
    模块（在 OSGi 术语中称为捆绑包）的清单文件就是按模块声明的示例。


    图 11-4 以实体关系图的形式展示了一个可能的元模型。我在满足该要求的元素后面的括号中列出了先前提到的要求。图 11-4 顶部是模块（要求 1）和模块类型。下面是模块的层次结构（要求
    6）和模块之间的依赖关系（要求 3）。利用这些实体，你可以对图 11-3 左侧描绘的架构进行建模。


    接下来是对象（例如 PL/SQL 单元、表和视图）。每个对象恰好属于一个模块（要求 2）。每个对象要么对其所属模块是私有的，要么是某种类型的接口（要求 4）。在这个例子中有几种接口类型：供具有相同功能模块父级的其他原子模块使用的接口、供同一应用程序中其他模块使用的接口，以及可供外部应用程序使用的公共接口。额外的代码表`code_object_intf_mode`用于区分对表的只读访问和读写访问。


    ![images](img/1104.jpg)


    **图 11-4.** 目标模块化的元模型


    在图 11-4 的底部是表示两种异常类型的结构，如右下角的两个值所述。


    *   待修复的遗留缺陷（要求 8）。如果应用程序是新模块化的，或者目标模块化方案发生变更，这些缺陷应只会暂时存在。

    *   可接受的`向上调用`异常（要求 5）。


    友元模块（要求 7）仅由功能模块隐式支持。可以通过引入不同的模块依赖类型，或将友元建模为额外的异常类型，来支持显式的友元模块。


    作为 PL/SQL 包和其他对象类型组的模块，可以用数据库模式或在模式内部实现。这两种方法可以结合使用，例如，为顶层模块使用模式，并在模式内为子模块进行分组。


    ## 将模式作为模块


    模式为所有类型的对象（从 PL/SQL 单元到表）提供了一种比包粒度更高的通用模块化方式。每个对象都属于一个模式。模式可用于将应用程序划分为多个部分。例如，一个应用程序可以划分为三个模式，分别包含数据访问层、业务逻辑层和表示层。


    在 Oracle 中，模式与用户是同义词。我为三层架构创建模式的方式如下：


    ```

    SQL> create user data_access identified by pwd account lock;


    用户已创建。


    SQL> create user business_logic identified by pwd account lock;


    用户已创建。


    SQL> create user presentation identified by pwd account lock;


    用户已创建。

    ```'
- fmt: "# Grants for Object Privileges\n\nTo access objects in another schema, the\
    \ respective object privilege needs to be granted. I first create a table and\
    \ a procedure in the `data_access` schema to have a concrete example.\n\n```\n\
    SQL> create table data_access.t(x number);\nTable created.\n\nSQL> create or replace\
    \ procedure data_access.d(\n  2    i_x                        number\n  3  )\n\
    \  4  is\n  5  begin\n  6    insert into t(x) values (abs(i_x));\n  7  end d;\n\
    \  8  /\n```\n\n![images](images/square.jpg) Note: To create these objects, you\
    \ must log on with a user that has the “Create any table” and “Create any procedure”\
    \ privileges or grant `create session`, `table`, and `procedure` to `data_access`.\n\
    \nWithout an explicit grant, the procedure `data_access.d` cannot be accessed\
    \ from a subprogram in the schema `business_logic`:\n\n```\nSQL> create or replace\
    \ procedure business_logic.b(\n  2    i_x                        number\n  3 \
    \ )\n  4  is\n  5  begin\n  6    data_access.d(trunc(i_x));\n  7  end b;\n  8\
    \  /\nWarning: Procedure created with compilation errors.\n\nSQL> show error\n\
    Errors for PROCEDURE BUSINESS_LOGIC.B:\n\nLINE/COL ERROR\n-------- ------------------------------------------------------\n\
    6/3      PL/SQL: Statement ignored\n6/3      PLS-00201: identifier 'DATA_ACCESS.D'\
    \ must be declared\n```\n\nAfter granting the execute privilege, I can successfully\
    \ compile the procedure.\n\n```\nSQL> grant execute on data_access.d to business_logic;\n\
    Grant succeeded.\n\nSQL> alter procedure data_access.d compile;\nProcedure altered.\n\
    ```\n\nGrants are a flexible, yet low-level construct:\n\n*   Grants are always\
    \ on individual items. A separate grant is required for each of the interface\
    \ packages.\n*   Grants are always to a specific schema. Just because `business_logic`\
    \ can access `data_access.d` doesn’t mean that `presentation` can access `data_access.d`.\
    \ By granting `presentation` privileges only on `business_logic` and not on `data_access`,\
    \ you could enforce a strict layering in which all calls from `presentation` to\
    \ `data_access` must go through `business_logic`. Grants provide selective information\
    \ hiding whereas a package exports an item either for all clients or for none.\n\
    *   If two schemas should be granted the same privileges on a set of objects (such\
    \ as `Finance Logic` and `Payment Logic` on `Business Framework` in [Figure 11-3](#Chapter11.html#fig_11_3)),\
    \ the grants must be made individually because roles are not considered in definer\
    \ rights procedures.\n*   It is not possible to grant a schema (for example, one\
    \ containing generated code) access to all objects of another schema. Separate\
    \ grants for each object are required.\n*   For tables, the `select`, `insert`,\
    \ `update`, and `delete` privileges can be granted separately. Thus, schemas make\
    \ it possible to enforce data consistency by restricting DML to a single schema\
    \ and allowing other modules direct read access for optimal performance. There\
    \ is no performance overhead for accessing object in other schemas with definer\
    \ rights procedures.\n\nBecause grants are so low level and because a large application\
    \ may require thousands of grants, it is best to generate the grants from a metamodel,\
    \ as in [Figure 11-4](#Chapter11.html#fig_11_4).\n\n![images](images/square.jpg)\
    \ Note: All privileges on individual objects are visible in the view `all_tab_privs`.\
    \ System, role, and column privileges can be found in `all_sys_privs`, `all_role_privs`,\
    \ and `all_column_privs`, respectively.\n\n# Accessing Objects in Other Schemas\n\
    \nLike packages, schemas introduce namespaces. There are two options to reference\
    \ an object in another schema. The fully-qualified notation requires the schema\
    \ name in each reference (such as `data_access.d` in the previous example). Alternatively,\
    \ you can create a synonym for the procedure `d` in the schema `business_logic`\
    \ and then access the procedure directly as `d`.\n\n```\nSQL> create or replace\
    \ synonym business_logic.d for data_access.d;\nSynonym created.\n```\n\nSome developers\
    \ prefer the synonym approach to reduce the amount of typing and to avoid strong\
    \ coupling. Because interfaces should be few and explicit, I prefer the fully-qualified\
    \ notation, which prevents name clashes.\n\n![images](images/square.jpg) Note:\
    \ If a schema contains an object of the same name as another schema, it becomes\
    \ impossible to reference objects in this other schema using the fully-qualified\
    \ notation because the scoping rules of PL/SQL resolve the reference to the object.\
    \ For example, if you add a table `data_access` to the schema `business_logic`,\
    \ you can no longer reference any objects in PL/SQL from `data_access` in `business_logic`\
    \ except through synonyms.\n\n# Optimal Usage of Schemas\n\nThe ideal number of\
    \ schemas for an application depends upon the architecture. For hand-written code,\
    \ 20–100 packages might be a desirable average size for a schema. With fewer packages,\
    \ the number of modules as well as the sizes and number of interfaces may become\
    \ too high, which violates the aforementioned rules for modularization and causes\
    \ administration overhead for grants and structural changes. With more packages,\
    \ the units of modular understandability are too big.\n\nSchemas have several\
    \ additional features that should be considered during design. They are useful\
    \ for deploying third-party components because their namespaces prevent name clashes.\
    \ Schemas can be used to enforce security because the security is checked in all\
    \ cases (including dynamic SQL) by the database. Beyond the object privileges\
    \ described previously, schemas can be used to centralize critical operations\
    \ into a small, “micro-kernel”-like schema with many system privileges. Furthermore,\
    \ schemas have various properties (such as quotas on tablespaces) and are units\
    \ of enabling editioning.\n\n# The Road to Modularization with Schemas\n\nIn spite\
    \ of all these benefits, most large applications that I know use only one or a\
    \ handful of schemas. The reasons seem to be nontechnical or historic and unrelated\
    \ to any problems with schemas in current versions of Oracle. The aforementioned\
    \ synonym approach for referencing objects in other schemas provides a relatively\
    \ simple migration path to using schemas for modularization. Only DDL statements\
    \ and queries against the data dictionary might have to be adapted, and dynamic\
    \ SQL needs to be checked to find missing grants. Of course, such a migration\
    \ provides only a starting point for future cleanup and yields no magic modularization\
    \ improvement.\n\nAfter the migration to schemas, no additional modularization\
    \ violations referencing previously unreferenced schema private objects are possible.\
    \ For example, if there is no reference from the new schema `business_logic` to\
    \ the table `data_access.t` before the migration, no object privilege needs to\
    \ be granted for the migration. If a developer later tries to reference `data_access.t`\
    \ in a package in `business_logic`, the PL/SQL compiler will catch the error.\
    \ On the other hand, additional references to already-used schema private objects\
    \ are possible because grants are to schemas rather than to individual objects\
    \ therein. If, in this example, an existing package body of `business_logic` accessed\
    \ `data_access.t` before the migration, the grant would have been required for\
    \ the one-to-one migration, and additional violations would not be flagged by\
    \ the compiler. It is therefore necessary keep a list of pre-existing violations\
    \ and check for new violations. The check can be fine granular using `all_identifiers`\
    \ for references between PL/SQL units and using `all_dependencies` for references\
    \ involving other object types.\n\nModularizing an existing application is very\
    \ expensive because if the modularization was not enforced in the past, the application\
    \ is full of illegal references to non-referenceable modules and to non-interface\
    \ objects. The high cost of changing these reference is attributed to past sins\
    \ and not to any shortcomings of schemas. The lessons to be learned are that new\
    \ applications must be modular from the beginning and that modularity must be\
    \ enforced."
  raw: '##### Grants for Object Privileges


    To access objects in another schema, the respective object privilege needs to
    be granted. I first create a table and a procedure in the data_access schema to
    have a concrete example.


    `SQL> create table data_access.t(x number);`


    `Table created.`


    `SQL> create or replace procedure data_access.d(`

    `  2    i_x                        number`

    `  3  )`

    `  4  is`

    `  5  begin`

    `  6    insert into t(x) values (abs(i_x));`

    `  7  end d;`

    `  8  /`


    ![images](images/square.jpg) **Note** To create these objects, you must log on
    with a user that has the “Create any table” and “Create any procedure” privileges
    or grant create session, table, and procedure to data_access.


    Without an explicit grant, the procedure data_access.d cannot be accessed from
    a subprogram in the schema business_logic:


    `SQL> create or replace procedure business_logic.b(`

    `  2    i_x                        number`

    `  3  )`

    `  4  is`

    `  5  begin`

    `  6    data_access.d(trunc(i_x));`

    `  7  end b;`

    `  8  /`


    `Warning: Procedure created with compilation errors.`


    `SQL> show error`

    `Errors for PROCEDURE BUSINESS_LOGIC.B:`


    `LINE/COL ERROR`

    `-------- ------------------------------------------------------`

    `6/3      PL/SQL: Statement ignored`

    `6/3      PLS-00201: identifier ''DATA_ACCESS.D'' must be declared`


    After granting the execute privilege, I can successfully compile the procedure.


    `SQL> grant execute on data_access.d to business_logic;`


    `Grant succeeded.`


    `SQL> alter procedure data_access.d compile;`


    `Procedure altered.`


    Grants are a flexible, yet low-level construct:


    *   Grants are always on individual items. A separate grant is required for each
    of the interface packages.

    *   Grants are always to a specific schema. Just because business_logic can access
    data_access.d doesn''t mean that presentation can access data_access.d. By granting
    presentation privileges only on business_logic and not on data_access, you could
    enforce a strict layering in which all calls from presentation to data_access
    must go through business_logic. Grants provide selective information hiding whereas
    a package exports an item either for all clients or for none.

    *   If two schemas should be granted the same privileges on a set of objects (such
    as Finance Logic and Payment Logic on Business Framework in [Figure 11-3](#Chapter11.html#fig_11_3)),
    the grants must be made individually because roles are not considered in definer
    rights procedures.

    *   It is not possible to grant a schema (for example, one containing generated
    code) access to all objects of another schema. Separate grants for each object
    are required.

    *   For tables, the select, insert, update, and delete privileges can be granted
    separately. Thus, schemas make it possible to enforce data consistency by restricting
    DML to a single schema and allowing other modules direct read access for optimal
    performance. There is no performance overhead for accessing object in other schemas
    with definer rights procedures.


    Because grants are so low level and because a large application may require thousands
    of grants, it is best to generate the grants from a metamodel, as in [Figure 11-4](#Chapter11.html#fig_11_4).


    ![images](images/square.jpg) **Note** All privileges on individual objects are
    visible in the view all_tab_privs. System, role, and column privileges can be
    found in all_sys_privs, all_role_privs, and all_column_privs, respectively.


    ##### Accessing Objects in Other Schemas


    Like packages, schemas introduce namespaces. There are two options to reference
    an object in another schema. The fully-qualified notation requires the schema
    name in each reference (such as data_access.d in the previous example). Alternatively,
    you can create a synonym for the procedure d in the schema business_logic and
    then access the procedure directly as d.


    `SQL> create or replace synonym business_logic.d for data_access.d;`


    `Synonym created.`


    Some developers prefer the synonym approach to reduce the amount of typing and
    to avoid strong coupling. Because interfaces should be few and explicit, I prefer
    the fully-qualified notation, which prevents name clashes.


    ![images](images/square.jpg) **Note** If a schema contains an object of the same
    name as another schema, it becomes impossible to reference objects in this other
    schema using the fully-qualified notation because the scoping rules of PL/SQL
    resolve the reference to the object. For example, if you add a table data_access
    to the schema business_logic, you can no longer reference any objects in PL/SQL
    from data_access in business_logic except through synonyms.


    ##### Optimal Usage of Schemas


    The ideal number of schemas for an application depends upon the architecture.
    For hand-written code, 20–100 packages might be a desirable average size for a
    schema. With fewer packages, the number of modules as well as the sizes and number
    of interfaces may become too high, which violates the aforementioned rules for
    modularization and causes administration overhead for grants and structural changes.
    With more packages, the units of modular understandability are too big.


    Schemas have several additional features that should be considered during design.
    They are useful for deploying third-party components because their namespaces
    prevent name clashes. Schemas can be used to enforce security because the security
    is checked in all cases (including dynamic SQL) by the database. Beyond the object
    privileges described previously, schemas can be used to centralize critical operations
    into a small, “micro-kernel”-like schema with many system privileges. Furthermore,
    schemas have various properties (such as quotas on tablespaces) and are units
    of enabling editioning.


    ##### The Road to Modularization with Schemas


    In spite of all these benefits, most large applications that I know use only one
    or a handful of schemas. The reasons seem to be nontechnical or historic and unrelated
    to any problems with schemas in current versions of Oracle. The aforementioned
    synonym approach for referencing objects in other schemas provides a relatively
    simple migration path to using schemas for modularization. Only DDL statements
    and queries against the data dictionary might have to be adapted, and dynamic
    SQL needs to be checked to find missing grants. Of course, such a migration provides
    only a starting point for future cleanup and yields no magic modularization improvement.


    After the migration to schemas, no additional modularization violations referencing
    previously unreferenced schema private objects are possible. For example, if there
    is no reference from the new schema business_logic to the table data_access.t
    before the migration, no object privilege needs to be granted for the migration.
    If a developer later tries to reference data_access.t in a package in business_logic,
    the PL/SQL compiler will catch the error. On the other hand, additional references
    to already-used schema private objects are possible because grants are to schemas
    rather than to individual objects therein. If, in this example, an existing package
    body of business_logic accessed data_access.t before the migration, the grant
    would have been required for the one-to-one migration, and additional violations
    would not be flagged by the compiler. It is therefore necessary keep a list of
    pre-existing violations and check for new violations. The check can be fine granular
    using all_identifiers for references between PL/SQL units and using all_dependencies
    for references involving other object types.


    Modularizing an existing application is very expensive because if the modularization
    was not enforced in the past, the application is full of illegal references to
    non-referenceable modules and to non-interface objects. The high cost of changing
    these reference is attributed to past sins and not to any shortcomings of schemas.
    The lessons to be learned are that new applications must be modular from the beginning
    and that modularity must be enforced.'
  trans: "# 对象权限的授予\n\n要访问另一个方案中的对象，需要授予相应的对象权限。首先，我在`data_access`方案中创建了一个表和一个过程，以便有一个具体的示例。\n\
    \n```\nSQL> create table data_access.t(x number);\nTable created.\n\nSQL> create\
    \ or replace procedure data_access.d(\n  2    i_x                        number\n\
    \  3  )\n  4  is\n  5  begin\n  6    insert into t(x) values (abs(i_x));\n  7\
    \  end d;\n  8  /\n```\n\n![images](img/square.jpg) 注意：要创建这些对象，你必须使用具有“Create\
    \ any table”和“Create any procedure”权限的用户登录，或者将`create session`、`table`和`procedure`权限授予`data_access`。\n\
    \n如果没有显式的授权，过程`data_access.d`无法从方案`business_logic`中的子程序访问：\n\n```\nSQL> create\
    \ or replace procedure business_logic.b(\n  2    i_x                        number\n\
    \  3  )\n  4  is\n  5  begin\n  6    data_access.d(trunc(i_x));\n  7  end b;\n\
    \  8  /\nWarning: Procedure created with compilation errors.\n\nSQL> show error\n\
    Errors for PROCEDURE BUSINESS_LOGIC.B:\n\nLINE/COL ERROR\n-------- ------------------------------------------------------\n\
    6/3      PL/SQL: Statement ignored\n6/3      PLS-00201: identifier 'DATA_ACCESS.D'\
    \ must be declared\n```\n\n在授予执行权限后，我可以成功编译该过程。\n\n```\nSQL> grant execute on\
    \ data_access.d to business_logic;\nGrant succeeded.\n\nSQL> alter procedure data_access.d\
    \ compile;\nProcedure altered.\n```\n\n授权是一种灵活但属于底层的结构：\n\n*   授权总是针对单个对象。每个接口包都需要单独授权。\n\
    *   授权总是授予特定的方案。仅仅因为`business_logic`可以访问`data_access.d`，并不意味着`presentation`也可以访问`data_access.d`。通过仅将`presentation`的权限授予`business_logic`而不授予`data_access`，你可以强制实施严格的分层，其中所有从`presentation`到`data_access`的调用都必须通过`business_logic`。授权提供了选择性的信息隐藏，而包要么将某个项导出给所有客户端，要么不导出给任何客户端。\n\
    *   如果两个方案需要在一组对象上获得相同的权限（例如，图 11-3 中的`Finance Logic`和`Payment Logic`对于`Business\
    \ Framework`），则必须分别进行授权，因为在定义者权限过程中不考虑角色。\n*   不可能授予一个方案（例如，包含生成代码的方案）访问另一个方案所有对象的权限。每个对象都需要单独授权。\n\
    *   对于表，`select`、`insert`、`update`和`delete`权限可以分别授予。因此，通过将 DML 限制在单个方案内，并允许其他模块直接读取以获得最佳性能，方案可以强制实施数据一致性。使用定义者权限过程访问其他方案中的对象没有性能开销。\n\
    \n由于授权是如此底层，并且一个大型应用程序可能需要成千上万的授权，因此最好从元模型生成授权，如图 11-4 所示。\n\n![images](img/square.jpg)\
    \ 注意：单个对象的所有权限可在视图`all_tab_privs`中查看。系统权限、角色权限和列权限可分别在`all_sys_privs`、`all_role_privs`和`all_column_privs`中找到。\n\
    \n# 访问其他方案中的对象\n\n与包类似，方案引入了命名空间。引用另一个方案中的对象有两种选择。完全限定表示法要求在每次引用时都指定方案名称（例如前面示例中的`data_access.d`）。或者，你可以在方案`business_logic`中为过程`d`创建一个同义词，然后直接作为`d`访问该过程。\n\
    \n```\nSQL> create or replace synonym business_logic.d for data_access.d;\nSynonym\
    \ created.\n```\n\n一些开发者更喜欢使用同义词的方法，以减少输入量并避免紧密耦合。由于接口应该少而明确，我更喜欢完全限定表示法，这可以防止名称冲突。\n\
    \n![images](img/square.jpg) 注意：如果一个方案包含与另一个方案同名的对象，那么使用完全限定表示法将无法引用该另一个方案中的对象，因为\
    \ PL/SQL 的作用域规则会将引用解析为该对象。例如，如果在方案`business_logic`中添加了一个名为`data_access`的表，那么除了通过同义词之外，你将无法在`business_logic`中从\
    \ PL/SQL 引用`data_access`中的任何对象。\n\n# 方案的优化使用\n\n一个应用程序的理想方案数量取决于架构。对于手写代码，每个方案包含\
    \ 20-100 个包可能是一个理想的平均大小。包太少，模块数量以及接口的大小和数量可能会过多，这违反了上述模块化规则，并导致授权和结构更改的管理开销。包太多，则可理解的模块化单元又太大。\n\
    \n方案有几个附加特性，在设计时应予以考虑。它们对于部署第三方组件很有用，因为它们的命名空间可以防止名称冲突。方案可用于强制实施安全性，因为在所有情况下（包括动态\
    \ SQL）都会由数据库检查安全性。除了前面描述的对象权限外，方案还可以用于将关键操作集中到一个具有许多系统权限的小型、“微内核”式方案中。此外，方案具有各种属性（例如，表空间上的配额），并且是启用版本控制的单元。\n\
    \n# 通过方案实现模块化的途径\n\n尽管有这些好处，我所知的大多数大型应用程序仅使用一个或少数几个方案。原因似乎是技术无关的或历史性的，与当前版本 Oracle\
    \ 中的方案问题无关。前面提到的用于引用其他方案中对象的同义词方法，提供了一个相对简单的迁移路径，以使用方案进行模块化。可能只需要适配 DDL 语句和对数据字典的查询，并且需要检查动态\
    \ SQL 以发现缺失的授权。当然，这样的迁移仅为未来的清理提供了一个起点，并不能神奇地立即改善模块化。\n\n迁移到方案后，不可能再出现引用先前未引用的方案私有对象的额外模块化违规。例如，如果迁移前新方案`business_logic`没有引用表`data_access.t`，则迁移不需要授予任何对象权限。如果开发人员后来试图在`business_logic`的一个包中引用`data_access.t`，PL/SQL\
    \ 编译器将捕获此错误。另一方面，对已使用的方案私有对象的额外引用是可能的，因为授权是授予方案而非其中的单个对象。如果在此示例中，`business_logic`的一个现有包体在迁移前访问了`data_access.t`，那么为了进行一对一的迁移，该授权是必须的，而编译器不会标记出额外的违规。因此，有必要维护一个预先存在的违规列表，并检查新的违规。可以使用`all_identifiers`检查\
    \ PL/SQL 单元之间的引用，并使用`all_dependencies`检查涉及其他对象类型的引用，从而进行细粒度的检查。\n\n对现有应用程序进行模块化非常昂贵，因为如果过去没有强制实施模块化，应用程序中将充满对不可引用模块和非接口对象的非法引用。更改这些引用的高成本归咎于过去的“罪过”，而非方案的任何缺点。应吸取的教训是：新应用程序必须从一开始就是模块化的，并且必须强制实施模块化。"
- fmt: "## Modularization within Schemas\n\nIf an application is confined to a single\
    \ schema for backward compatibility or organizational reasons or if schemas are\
    \ only to be used for top-level modules, the application can still be subdivided\
    \ into logical modules inside a schema.\n\nModules within schemas are often implicitly\
    \ represented by name prefixes, such as `da_` for objects in the data access layer.\
    \ The correct usage of module prefixes can be checked as previously described\
    \ for scope prefixes.\n\nSince modularization without enforcement is worthless\
    \ and because the database doesn't help with enforcement of modularization within\
    \ schemas, you need to create your own checks. For the checks you need the target\
    \ and the actual modularization. The target modularization is given by an instance\
    \ of the metamodel of [Figure 11-4](#Chapter11.html#fig_11_4) (shown earlier).\
    \ The actual modularization is in the code. Static dependencies are listed in\
    \ `all_dependencies` and `all_identifiers`. I have already discussed the detection\
    \ of references to tables in dynamic SQL. For references to PL/SQL in dynamic\
    \ SQL and PL/SQL, you can use the SQL area or Database Vault.\n\nDatabase Vault\
    \ is a security option that restricts access to specific areas in an Oracle database\
    \ from any user, including users who have administrative access. You use access\
    \ restrictions to catch modularization violations—that is, direct accesses of\
    \ non-interface units of other modules. In the example, I assume that every PL/SQL\
    \ unit has a module prefix in its name and that interface units have a `_intf#`\
    \ suffix. Database Vault provides the option to execute a custom PL/SQL function\
    \ to check the validity of each PL/SQL call (or other object usage) in a rule.\
    \ The function gets the call stack and verifies that the topmost caller/callee\
    \ pair of units in the schema to be checked (in the example `k`) satisfies the\
    \ modular reference requirements. To avoid checks for the checking function, I\
    \ create the latter in a separate schema `x`.\n\n```sql\ncreate or replace function\
    \ x.valid_call\nreturn pls_integer\nis\n  c_lf               constant varchar2(1)\
    \    := chr(10);    -- UNIX\n  c_intf_like        constant varchar2(8)    := '%\\\
    _INTF#'; -- Interface unit suffix\n  c_owner_like       constant varchar2(5) \
    \   := '% K.%';    -- Schema to be checked\n  c_module_sep       constant varchar2(1)\
    \    := '_';        -- Separator of module prefix\n  c_head_line_cnt    constant\
    \ pls_integer    := 4;          -- Ignored lines in call stack\n  l_call_stack\
    \                varchar2(4000);               -- Call stack\n  l_sol        \
    \               pls_integer;                  -- Start pos of current line\n \
    \ l_eol                       pls_integer;                  -- End pos of current\
    \ line\n  l_callee                    varchar2(200);                -- Called\
    \ unit\n  l_caller                    varchar2(200);                -- Calling\
    \ unit\n  l_res                       boolean;                      -- Valid call?\n\
    begin\n  l_call_stack := dbms_utility.format_call_stack;\n  l_sol := instr(l_call_stack,\
    \ c_lf, 1, c_head_line_cnt);\n  l_eol := instr(l_call_stack, c_lf, l_sol + 1);\n\
    \  l_callee := substr(l_call_stack, l_sol, l_eol - l_sol);\n  -- ONLY CALLS TO\
    \ NON INTERFACE UNITS OF K MAY BE INVALID --\n  if l_callee like c_owner_like\
    \ and l_callee not like c_intf_like escape '\\' then\n    l_callee := substr(l_callee,\
    \ instr(l_callee, '.') + 1);\n    -- FIND TOPMOST CALLER OF SCHEMA K, IF ANY,\
    \ AND CHECK FOR SAME MODULE PREFIX --\n    loop\n      l_sol := l_eol + 1;\n \
    \     l_eol := instr(l_call_stack, c_lf, l_sol + 1);\n      l_caller := substr(l_call_stack,\
    \ l_sol, l_eol - l_sol);\n      if l_caller like c_owner_like then\n        l_caller\
    \ := substr(l_caller, instr(l_caller, '.') + 1);\n        l_res := substr(l_callee,\
    \ 1, instr(l_callee, c_module_sep))\n                 = substr(l_caller, 1, instr(l_caller,\
    \ c_module_sep));\n      end if;\n      exit when l_eol = 0 or l_res is not null;\n\
    \    end loop;\n  end if;\n  return case when not l_res then 0 else 1 end;\nend\
    \ valid_call;\n```\n\nThe Database Vault schema needs to be granted the execute\
    \ privilege on this function so it can be used in rules.\n\n```sql\nSQL> grant\
    \ execute on x.valid_call to dvsys;\n\nGrant succeeded.\n```\n\nThen I create\
    \ the rule set, rule, and command rule to execute the function `valid_call` on\
    \ the execution of each PL/SQL unit logged in as Database Vault Owner.\n\n```sql\n\
    declare\n  c_rule_set_name  varchar2(90)  := 'Modularization within schema check';\n\
    \  c_rule_name      varchar2(90)  := 'CHKUSER';\nbegin\n  -- RULE SET: CHECK RULES\
    \ AND FLAG VIOLATIONS\n  dvsys.dbms_macadm.create_rule_set(\n    rule_set_name\
    \   => c_rule_set_name\n   ,description     => null\n   ,enabled         => dvsys.dbms_macutl.g_yes\n\
    \   ,eval_options    => dvsys.dbms_macutl.g_ruleset_eval_all\n   ,audit_options\
    \   => dvsys.dbms_macutl.g_ruleset_audit_off\n   ,fail_options    => dvsys.dbms_macutl.g_ruleset_fail_show\n\
    \   ,fail_message    => 'Modularization check failed'\n   ,fail_code       =>\
    \ -20002\n   ,handler_options => dvsys.dbms_macutl.g_ruleset_handler_off\n   ,handler\
    \         => null\n  );\n  -- RULE: CHECK WHETHER CALL IS VALID\n  dvsys.dbms_macadm.create_rule(\n\
    \    rule_name => c_rule_name\n   ,rule_expr => 'X.VALID_CALL = 1'\n  );\n  --\
    \ ADD RULE TO RULE SET\n  dvsys.dbms_macadm.add_rule_to_rule_set(\n    rule_set_name\
    \ => c_rule_set_name\n   ,rule_name     => c_rule_name\n  );\n  -- MATCH CRITERIA:\
    \ EXECUTE RULE SET ON PL/SQL EXECUTE OF OBJECTS OWNED BY USER K\n  dvsys.dbms_macadm.create_command_rule(\n\
    \    command         => 'EXECUTE'\n   ,rule_set_name   => c_rule_set_name\n  \
    \ ,object_owner    => 'K'\n   ,object_name     => '%'\n   ,enabled         =>\
    \ dvsys.dbms_macutl.g_yes\n  );\n  commit;\nend;\n/\n```\n\nWith this in place,\
    \ a call from `k.m1_2` to `k.m1_1` is legal because both units have the same module\
    \ prefix of `m1`. On the other hand, a call from `k.m2_3` to `k.m1_1` is blocked\
    \ because the caller belongs to module `m2` and the callee to module `m1`.\n\n\
    ```sql\nSQL> create or replace procedure k.m1_1 is begin null; end;\n  2  /\n\n\
    Procedure created.\n\nSQL> create or replace procedure k.m1_2 is begin execute\
    \ immediate 'begin m1_1; end;'; end;\n  2  /\n\nProcedure created.\n\nSQL> exec\
    \ k.m1_2\n\nPL/SQL procedure successfully completed.\n\nSQL> create or replace\
    \ procedure k.m2_3 is begin execute immediate 'begin m1_1; end;'; end;\n  2  /\n\
    \nProcedure created.\n\nSQL> exec k.m2_3\nBEGIN k.m2_3; END;\n\n*\nERROR at line\
    \ 1:\nORA-01031: insufficient privileges\nORA-06512: at \"K.M1_1\", line 1\nORA-06512:\
    \ at \"K.M2_3\", line 1\nORA-06512: at line 1\n```\n\nThis approach works for\
    \ both static and dynamic SQL (native and `dbms_sql`). Instead of blocking violations,\
    \ they could also be permitted and logged.\n\n![images](images/square.jpg) **Note**\
    \ To install Database Vault you must relink the binaries, as explained in appendix\
    \ B of the *Database Vault Administrator's Guide*, and add the Oracle Label Security\
    \ (precondition) and Oracle Database Vault options with the Database Creation\
    \ Assistant `dbca`. As of 11.2.0.2, there are few gotchas with the installation.\
    \ The option must be installed with `dbca` as the SQL*Plus scripts don't install\
    \ NLS properly. The required special character in the password for the DV Owner\
    \ must not be the last character. If you use deferred constraints, patch 10330971\
    \ is required. With `AL32UTF8` as database character set, a tablespace with 16K\
    \ or bigger block size is required because of the aforementioned maximum size\
    \ of an index entry based on the block size. If your default block size is smaller,\
    \ set `db_16k_cache_size` and create a tablespace with 16 K block size for Database\
    \ Vault. Furthermore, Database Vault purposely introduces some restrictions, which\
    \ you may need to lift again for your application to work properly."
  raw: '#### Modularization within Schemas


    If an application is confined to a single schema for backward compatibility or
    organizational reasons or if schemas are only to be used for top-level modules,
    the application can still be subdivided into logical modules inside a schema.


    Modules within schemas are often implicitly represented by name prefixes, such
    as da_ for objects in the data access layer. The correct usage of module prefixes
    can be checked as previously described for scope prefixes.


    Since modularization without enforcement is worthless and because the database
    doesn''t help with enforcement of modularization within schemas, you need to create
    your own checks. For the checks you need the target and the actual modularization.
    The target modularization is given by an instance of the metamodel of [Figure
    11-4](#Chapter11.html#fig_11_4) (shown earlier). The actual modularization is
    in the code. Static dependencies are listed in all_dependencies and all_identifiers.
    I have already discussed the detection of references to tables in dynamic SQL.
    For references to PL/SQL in dynamic SQL and PL/SQL, you can use the SQL area or
    Database Vault.


    Database Vault is a security option that restricts access to specific areas in
    an Oracle database from any user, including users who have administrative access.
    You use access restrictions to catch modularization violations—that is, direct
    accesses of non-interface units of other modules. In the example, I assume that
    every PL/SQL unit has a module prefix in its name and that interface units have
    a _intf# suffix. Database Vault provides the option to execute a custom PL/SQL
    function to check the validity of each PL/SQL call (or other object usage) in
    a rule. The function gets the call stack and verifies that the topmost caller/callee
    pair of units in the schema to be checked (in the example k) satisfies the modular
    reference requirements. To avoid checks for the checking function, I create the
    latter in a separate schema x.


    `create or replace function x.valid_call`

    `return pls_integer`

    `is`

    `  c_lf              constant varchar2(1)    := chr(10);    -- UNIX`

    `  c_intf_like       constant varchar2(8)    := ''%\_INTF#''; -- Interface unit
    suffix`

    `  c_owner_like      constant varchar2(5)    := ''% K.%'';    -- Schema to be
    checked`

    `  c_module_sep      constant varchar2(1)    := ''_'';        -- Separator of
    module prefix`

    `  c_head_line_cnt   constant pls_integer    := 4;          -- Ignored lines in
    call stack`

    `  l_call_stack               varchar2(4000);               -- Call stack`

    `  l_sol                      pls_integer;                  -- Start pos of current
    line`

    `  l_eol                      pls_integer;                  -- End pos of current
    line`

    `  l_callee                   varchar2(200);                -- Called unit`

    `  l_caller                   varchar2(200);                -- Calling unit`

    `  l_res                      boolean;                      -- Valid call?`

    `begin`

    `  l_call_stack := dbms_utility.format_call_stack;`

    `  l_sol := instr(l_call_stack, c_lf, 1, c_head_line_cnt);`

    `  l_eol := instr(l_call_stack, c_lf, l_sol + 1);`

    `  l_callee := substr(l_call_stack, l_sol, l_eol - l_sol);`

    `  -- ONLY CALLS TO NON INTERFACE UNITS OF K MAY BE INVALID --`

    `  if l_callee like c_owner_like and l_callee not like c_intf_like escape ''\''
    then`

    `    l_callee := substr(l_callee, instr(l_callee, ''.'') + 1);`

    `    -- FIND TOPMOST CALLER OF SCHEMA K, IF ANY, AND CHECK FOR SAME MODULE PREFIX
    --`

    `    loop`

    `      l_sol := l_eol + 1;`

    `      l_eol := instr(l_call_stack, c_lf, l_sol + 1);`

    `      l_caller := substr(l_call_stack, l_sol, l_eol - l_sol);`

    `      if l_caller like c_owner_like then`

    `        l_caller := substr(l_caller, instr(l_caller, ''.'') + 1);`

    `        l_res := substr(l_callee, 1, instr(l_callee, c_module_sep))`

    `                 = substr(l_caller, 1, instr(l_caller, c_module_sep));`

    `      end if;`

    `      exit when l_eol = 0 or l_res is not null;`

    `    end loop;`

    `  end if;`

    `  return case when not l_res then 0 else 1 end;`

    `end valid_call;`


    The Database Vault schema needs to be granted the execute privilege on this function
    so it can be used in rules.


    `SQL> grant execute on x.valid_call to dvsys;`


    `Grant succeeded.`


    Then I create the rule set, rule, and command rule to execute the function valid
    call on the execution of each PL/SQL unit logged in as Database Vault Owner.


    `declare`

    `  c_rule_set_name  varchar2(90)  := ''Modularization within schema check'';`

    `  c_rule_name      varchar2(90)  := ''CHKUSER'';`

    `begin`

    `  -- RULE SET: CHECK RULES AND FLAG VIOLATIONS`

    `  dvsys.dbms_macadm.create_rule_set(`

    `    rule_set_name   => c_rule_set_name`

    `   ,description     => null`

    `   ,enabled         => dvsys.dbms_macutl.g_yes`

    `   ,eval_options    => dvsys.dbms_macutl.g_ruleset_eval_all`

    `   ,audit_options   => dvsys.dbms_macutl.g_ruleset_audit_off`

    `   ,fail_options    => dvsys.dbms_macutl.g_ruleset_fail_show`

    `   ,fail_message    => ''Modularization check failed''`

    `   ,fail_code       => -20002`

    `   ,handler_options => dvsys.dbms_macutl.g_ruleset_handler_off`

    `   ,handler         => null`

    `  );`

    `  -- RULE: CHECK WHETHER CALL IS VALID`

    `  dvsys.dbms_macadm.create_rule(`

    `    rule_name => c_rule_name`

    `   ,rule_expr => ''X.VALID_CALL = 1''`

    `  );`

    `  -- ADD RULE TO RULE SET`

    `  dvsys.dbms_macadm.add_rule_to_rule_set(`

    `    rule_set_name => c_rule_set_name`

    `   ,rule_name     => c_rule_name`

    `  );`

    `  -- MATCH CRITERIA: EXECUTE RULE SET ON PL/SQL EXECUTE OF OBJECTS OWNED BY USER
    K`

    `  dvsys.dbms_macadm.create_command_rule(`

    `    command         => ''EXECUTE''`

    `   ,rule_set_name   => c_rule_set_name`

    `   ,object_owner    => ''K''`

    `   ,object_name     => ''%''`

    `   ,enabled         => dvsys.dbms_macutl.g_yes`

    `  );`

    `  commit;`

    `end;`

    `/`


    With this in place, a call from k.m1_2 to k.m1_1 is legal because both units have
    the same module prefix of m1\. On the other hand, a call from k.m2_3 to k.m1_1
    is blocked because the caller belongs to module m2 and the callee to module m1.


    `SQL> create or replace procedure k.m1_1 is begin null; end;`

    `  2  /`


    `Procedure created.`


    `SQL> create or replace procedure k.m1_2 is begin execute immediate ''begin m1_1;
    end;''; end;`

    `  2  /`


    `Procedure created.`


    `SQL> exec k.m1_2`


    `PL/SQL procedure successfully completed.`


    `SQL> create or replace procedure k.m2_3 is begin execute immediate ''begin m1_1;
    end;''; end;`

    `  2  /`


    `Procedure created.`


    `SQL> exec k.m2_3`

    `BEGIN k.m2_3; END;`


    `*`

    `ERROR at line 1:`

    `ORA-01031: insufficient privileges`

    `ORA-06512: at "K.M1_1", line 1`

    `ORA-06512: at "K.M2_3", line 1`

    `ORA-06512: at line 1`


    This approach works for both static and dynamic SQL (native and dbms_sql). Instead
    of blocking violations, they could also be permitted and logged.


    ![images](images/square.jpg) **Note** To install Database Vault you must relink
    the binaries, as explained in appendix B of the *Database Vault Administrator''s
    Guide*, and add the Oracle Label Security (precondition) and Oracle Database Vault
    options with the Database Creation Assistant dbca. As of 11.2.0.2, there are few
    gotchas with the installation. The option must be installed with dbca as the SQL*Plus
    scripts don''t install NLS properly. The required special character in the password
    for the DV Owner must not be the last character. If you use deferred constraints,
    patch 10330971 is required. With AL32UTF8 as database character set, a tablespace
    with 16K or bigger block size is required because of the aforementioned maximum
    size of an index entry based on the block size. If your default block size is
    smaller, set db_16k_cache_size and create a tablespace with 16 K block size for
    database vault. Furthermore, Database Vault purposely introduces some restrictions,
    which you may need to lift again for your application to work properly.'
  trans: "\n## 模式（Schema）内的模块化\n\n如果一个应用程序由于向后兼容性或组织原因而局限于单一模式，或者模式仅用于顶层模块，该应用程序仍然可以在模式内细分为逻辑模块。\n\
    \n模式内的模块通常通过名称前缀隐式表示，例如数据访问层对象使用 `da_` 前缀。如之前针对作用域前缀所述，可以检查模块前缀的正确使用方式。\n\n由于没有强制性的模块化毫无价值，且数据库无法帮助实现模式内的模块化强制，因此你需要创建自己的检查机制。进行检查需要目标模块化和实际模块化。目标模块化由图\
    \ 11-4（先前已展示）的元模型实例给出。实际模块化存在于代码中。静态依赖关系列在 `all_dependencies` 和 `all_identifiers`\
    \ 中。我已经讨论过动态 SQL 中对表的引用的检测。对于动态 SQL 和 PL/SQL 中对 PL/SQL 的引用，你可以使用 SQL 区域或 Database\
    \ Vault。\n\nDatabase Vault 是一种安全选件，它限制对 Oracle 数据库中特定区域的访问，任何用户，包括拥有管理访问权限的用户，都无法访问。你利用访问限制来捕获模块化违规——即直接访问其他模块的非接口单元。在示例中，我假设每个\
    \ PL/SQL 单元在其名称中都有模块前缀，并且接口单元具有 `_intf#` 后缀。Database Vault 提供了一个选项，可以在规则中执行自定义的\
    \ PL/SQL 函数来检查每个 PL/SQL 调用（或其他对象使用）的有效性。该函数获取调用栈，并验证在要检查的模式（示例中为 `k`）中，最顶层的调用者/被调用单元对是否满足模块化引用要求。为了避免对检查函数进行检查，我在一个单独的模式\
    \ `x` 中创建它。\n\n```sql\ncreate or replace function x.valid_call\nreturn pls_integer\n\
    is\n  c_lf               constant varchar2(1)    := chr(10);    -- UNIX\n  c_intf_like\
    \        constant varchar2(8)    := '%\\_INTF#'; -- Interface unit suffix\n  c_owner_like\
    \       constant varchar2(5)    := '% K.%';    -- Schema to be checked\n  c_module_sep\
    \       constant varchar2(1)    := '_';        -- Separator of module prefix\n\
    \  c_head_line_cnt    constant pls_integer    := 4;          -- Ignored lines\
    \ in call stack\n  l_call_stack                varchar2(4000);               --\
    \ Call stack\n  l_sol                       pls_integer;                  -- Start\
    \ pos of current line\n  l_eol                       pls_integer;            \
    \      -- End pos of current line\n  l_callee                    varchar2(200);\
    \                -- Called unit\n  l_caller                    varchar2(200);\
    \                -- Calling unit\n  l_res                       boolean;     \
    \                 -- Valid call?\nbegin\n  l_call_stack := dbms_utility.format_call_stack;\n\
    \  l_sol := instr(l_call_stack, c_lf, 1, c_head_line_cnt);\n  l_eol := instr(l_call_stack,\
    \ c_lf, l_sol + 1);\n  l_callee := substr(l_call_stack, l_sol, l_eol - l_sol);\n\
    \  -- ONLY CALLS TO NON INTERFACE UNITS OF K MAY BE INVALID --\n  if l_callee\
    \ like c_owner_like and l_callee not like c_intf_like escape '\\' then\n    l_callee\
    \ := substr(l_callee, instr(l_callee, '.') + 1);\n    -- FIND TOPMOST CALLER OF\
    \ SCHEMA K, IF ANY, AND CHECK FOR SAME MODULE PREFIX --\n    loop\n      l_sol\
    \ := l_eol + 1;\n      l_eol := instr(l_call_stack, c_lf, l_sol + 1);\n      l_caller\
    \ := substr(l_call_stack, l_sol, l_eol - l_sol);\n      if l_caller like c_owner_like\
    \ then\n        l_caller := substr(l_caller, instr(l_caller, '.') + 1);\n    \
    \    l_res := substr(l_callee, 1, instr(l_callee, c_module_sep))\n           \
    \      = substr(l_caller, 1, instr(l_caller, c_module_sep));\n      end if;\n\
    \      exit when l_eol = 0 or l_res is not null;\n    end loop;\n  end if;\n \
    \ return case when not l_res then 0 else 1 end;\nend valid_call;\n```\n\n需要向 Database\
    \ Vault 模式授予此函数的执行特权，以便在规则中使用。\n\n```sql\nSQL> grant execute on x.valid_call to\
    \ dvsys;\n\nGrant succeeded.\n```\n\n然后，我创建规则集、规则和命令规则，以便在作为 Database Vault 所有者登录时，对每个\
    \ PL/SQL 单元的执行执行 `valid_call` 函数。\n\n```sql\ndeclare\n  c_rule_set_name  varchar2(90)\
    \  := 'Modularization within schema check';\n  c_rule_name      varchar2(90) \
    \ := 'CHKUSER';\nbegin\n  -- RULE SET: CHECK RULES AND FLAG VIOLATIONS\n  dvsys.dbms_macadm.create_rule_set(\n\
    \    rule_set_name   => c_rule_set_name\n   ,description     => null\n   ,enabled\
    \         => dvsys.dbms_macutl.g_yes\n   ,eval_options    => dvsys.dbms_macutl.g_ruleset_eval_all\n\
    \   ,audit_options   => dvsys.dbms_macutl.g_ruleset_audit_off\n   ,fail_options\
    \    => dvsys.dbms_macutl.g_ruleset_fail_show\n   ,fail_message    => 'Modularization\
    \ check failed'\n   ,fail_code       => -20002\n   ,handler_options => dvsys.dbms_macutl.g_ruleset_handler_off\n\
    \   ,handler         => null\n  );\n  -- RULE: CHECK WHETHER CALL IS VALID\n \
    \ dvsys.dbms_macadm.create_rule(\n    rule_name => c_rule_name\n   ,rule_expr\
    \ => 'X.VALID_CALL = 1'\n  );\n  -- ADD RULE TO RULE SET\n  dvsys.dbms_macadm.add_rule_to_rule_set(\n\
    \    rule_set_name => c_rule_set_name\n   ,rule_name     => c_rule_name\n  );\n\
    \  -- MATCH CRITERIA: EXECUTE RULE SET ON PL/SQL EXECUTE OF OBJECTS OWNED BY USER\
    \ K\n  dvsys.dbms_macadm.create_command_rule(\n    command         => 'EXECUTE'\n\
    \   ,rule_set_name   => c_rule_set_name\n   ,object_owner    => 'K'\n   ,object_name\
    \     => '%'\n   ,enabled         => dvsys.dbms_macutl.g_yes\n  );\n  commit;\n\
    end;\n/\n```\n\n设置完成后，从 `k.m1_2` 到 `k.m1_1` 的调用是合法的，因为这两个单元具有相同的模块前缀 `m1`。另一方面，从\
    \ `k.m2_3` 到 `k.m1_1` 的调用被阻止，因为调用者属于模块 `m2`，而被调用者属于模块 `m1`。\n\n```sql\nSQL> create\
    \ or replace procedure k.m1_1 is begin null; end;\n  2  /\n\nProcedure created.\n\
    \nSQL> create or replace procedure k.m1_2 is begin execute immediate 'begin m1_1;\
    \ end;'; end;\n  2  /\n\nProcedure created.\n\nSQL> exec k.m1_2\n\nPL/SQL procedure\
    \ successfully completed.\n\nSQL> create or replace procedure k.m2_3 is begin\
    \ execute immediate 'begin m1_1; end;'; end;\n  2  /\n\nProcedure created.\n\n\
    SQL> exec k.m2_3\nBEGIN k.m2_3; END;\n\n*\nERROR at line 1:\nORA-01031: insufficient\
    \ privileges\nORA-06512: at \"K.M1_1\", line 1\nORA-06512: at \"K.M2_3\", line\
    \ 1\nORA-06512: at line 1\n```\n\n这种方法适用于静态和动态 SQL（原生和 `dbms_sql`）。除了阻止违规行为，也可以选择允许并记录它们。\n\
    \n![images](img/square.jpg) **注意** 要安装 Database Vault，必须重新链接二进制文件，如《Database Vault\
    \ 管理员指南》附录 B 所述，并使用数据库配置助理 `dbca` 添加 Oracle Label Security（前提条件）和 Oracle Database\
    \ Vault 选件。从 11.2.0.2 开始，安装过程中的易错点很少。该选件必须使用 `dbca` 安装，因为 SQL*Plus 脚本无法正确安装 NLS。DV\
    \ 所有者密码中所需的特殊字符不能是最后一个字符。如果使用延迟约束，则需要补丁 10330971。如果数据库字符集是 `AL32UTF8`，则由于前述基于块大小的索引条目最大尺寸，需要\
    \ 16K 或更大块大小的表空间。如果默认块大小较小，请设置 `db_16k_cache_size` 并为 Database Vault 创建一个具有 16K\
    \ 块大小的表空间。此外，Database Vault 有意引入了一些限制，你可能需要解除这些限制才能使你的应用程序正常工作。\n"
- fmt: "#### 模式内与跨模式的模块化\n\n[表 11-1](#Chapter11.html#tab_11_1) 总结了跨模式和模式内模块化的优缺点。在这两种情况下，都需要一个目标模块化的抽象模型。\n\
    \n![images](images/t1101.jpg)\n\n### PL/SQL 中的面向对象编程\n\n通过模块化，你仍然缺少两个重要部分来高效创建大型程序。首先，你所有的内存结构都局限于单例的表示。然而，大多数应用程序必须支持同类型的多个实例，例如多个银行交易。其次，重用仅限于完全不变的重用。但在实践中，重用通常需要调整——而无需复制源代码并维护多个副本。例如，银行系统中的支付和证券交易有许多共同点，但在其他方面（如记账逻辑）又有所不同。目标是让共享功能只有一个实现，而不仅仅是重用想法和开发人员。面向对象编程解决了这些问题。\n\
    \n重用带来许多好处：它减少了上市时间、实施成本和维护工作，因为只有一个实现需要维护。由于只有一个实现，可以投入更多的专家资源来使其正确和高效。\n\n面向对象编程通过两种方式增加重用：\n\
    \n*   *带调整的重用*：继承和子类型多态允许你扩展一个数据类型，并将其子类型的实例视为超类型的实例。例如，你可以定义一个通用的银行交易类型作为超类型，以及支付和证券交易的子类型。动态绑定（也称为后期绑定、动态分派和虚拟方法）为此增添了最后一块拼图。你可以在超类型银行交易上声明一个过程\
    \ `book`（可能是没有实现的抽象过程），并为两个子类型对其进行适配。通用框架调用 `book` 过程，每个银行交易执行与其实际子类型相对应的逻辑。\n\
    *   *数据及相关功能的重用*：面向对象分析提倡基于数据而非功能进行分解。因为数据比提供在其上的特定功能寿命更长，这通常能提供更好的重用。\n\nBertrand\
    \ Meyer 在其著作《*面向对象软件构造*》中总结了这两个方面：“面向对象软件构造是将软件系统构建为可能部分的抽象数据类型实现的结构化集合。”\n\n\
    ![images](images/square.jpg) **注意** 泛型（F 有界多态）有时被错误地认为是面向对象编程的必备条件，尤其是在 Java 5\
    \ 添加了泛型之后。然而，泛型是一个正交的概念，例如在非面向对象的 Ada 原始版本中也存在。泛型最常用于集合。PL/SQL 支持强类型集合，如关联数组，作为内置语言结构。这在大多数情况下已足够。\n\
    \n虽然 PL/SQL 本身不是面向对象编程语言，但可以使用用户定义类型（UDT）或 PL/SQL 记录以面向对象的方式进行编程。实例和带调整的重用实现如下：\n\
    \n*   PL/SQL 不直接支持内存引用（指针）。在运行时创建任意数量对象实例的唯一方法是将实例存储在集合（如关联数组）中。引用表示为集合索引。\n*\
    \   UDT 原生支持动态绑定。使用记录时，你可以使用动态 SQL 或静态分派器自己实现动态分派。\n\n我首先介绍 UDT，因为它们的别名“对象类型”表明它们是面向对象编程的自然选择，然后解释为什么在大多数情况下记录是更好的选择。\n\
    \n#### 使用用户定义类型进行面向对象编程\n\nOracle 在 Oracle 8 中的面向对象热潮中添加了用户定义类型（UDT），主要解决存储方面的问题，省略了一些有用的编程特性。UDT\
    \ 是模式级别的对象。我可以如下创建一个银行交易的基类型：\n\n![images](images/square.jpg) **注意** Oracle 对用户定义类型（UDT）使用两个同义词。在《*数据库对象关系开发者指南*》中，它们被称为\
    \ *对象类型*，因为 Oracle 想要支持数据库中的面向对象。同一个术语 *对象类型* 更早就被用作 `all_objects` 中条目的类型，例如包和表。第二个同义词\
    \ *抽象数据类型*（ADT）用于《*PL/SQL 语言参考*》，因为 UDT 可用于实现 ADT 的数学概念——即由一系列操作和这些操作的属性定义的数据结构。我在本章中使用明确的术语\
    \ *UDT*。UDT 包括 varrays 和嵌套表，这里不作讨论。UDT 作为外部调用的子程序参数类型很有用。\n\n```sql\ncreate or\
    \ replace type t_bank_trx_obj is object (\n  s_id                  integer\n ,s_amount\
    \              number\n\n  ------------------------------------------------------------------------------\n\
    \  -- Returns the amount of the transaction.\n  ------------------------------------------------------------------------------\n\
    \ ,final member function p_amount return number\n\n  ------------------------------------------------------------------------------\n\
    \  -- Books the transaction.\n  ------------------------------------------------------------------------------\n\
    \ ,not instantiable member procedure book(\n   i_text               varchar2\n\
    \  )\n) not instantiable not final;\n```\n\n类型 `t_bank_trx_obj` 有两个属性 `s_id` 和\
    \ `s_amount` 来保存状态。此外，它有两个方法。函数 `p_amount` 被声明为 `final`，意味着它不能在子类型中被覆盖。过程 `book`\
    \ 被声明为不可实例化（抽象），意味着它只被声明和指定，但没有实现。类型体的语法是 PL/SQL 扩展了子程序的修饰符，如下所示：\n\n```sql\n\
    create or replace type body t_bank_trx_obj is\n  final member function p_amount\
    \ return number\n  is\n  begin\n    return s_amount;\n  end p_amount;\nend;\n\
    ```"
  raw: '#### Modularization with Schemas vs. within Schemas


    [Table 11-1](#Chapter11.html#tab_11_1) summarizes the pros and cons of modularization
    with and within schemas. An abstract model of the target modularization is required
    in both cases.


    ![images](images/t1101.jpg)


    ### Object-Oriented Programming with PL/SQL


    With modularization you are still missing two important pieces to efficiently
    create large programs. First, all your memory structures have been restricted
    to the representation of singletons. However, most applications must support multiple
    instances of a kind, such as multiple banking transactions. Second, reuse has
    been restricted to reuse exactly as is. In practice, though, reuse commonly requires
    adaptations—without having to duplicate the source code and maintain multiple
    copies going forward. For example, payment and stock-exchange transactions in
    a banking system share many commonalities but differ in other aspects, such as
    their booking logic. The goal is to have only a single implementation of the shared
    functionality rather than just reuse of ideas and developers. Object-oriented
    programming addresses these issues.


    Reuse brings many benefits: it reduces the time to market, the implementation
    cost, and the maintenance effort because there is only one implementation to maintain.
    Because there is only one implementation, more expert resources can be spent on
    making it correct and efficient.


    Object-oriented programming increases reuse in two ways.


    *   *Reuse with adaptations*: Inheritance and subtype polymorphism allow you to
    extend a data type and treat instances of its subtypes as if they were instances
    of the supertype. In the example, you can define a generic banking transaction
    type as supertype and subtypes for payment and stock exchange transactions. Dynamic
    binding (also called late binding, dynamic dispatch, and virtual methods) adds
    the final piece to the puzzle. You can declare, possibly abstract without an implementation,
    a procedure book on the supertype banking transaction and adapt it for the two
    subtypes. The generic framework calls the procedure book, and each banking transaction
    executes the logic corresponding to its actual subtype.

    *   *Reuse of data and associated functionality*: Object-oriented analysis promotes
    decomposition based on data rather than functionality. Because data is longer
    lived than the particular functionality provided on it, this typically provides
    for better reuse.


    Bertrand Meyer summarizes both aspects in his book *Object-Oriented Software Construction*:
    “Object-oriented software construction is the building of software systems as
    structured collections of possibly partial abstract data type implementations.”


    ![images](images/square.jpg) **Note** Generic types (F-bounded polymorphism) are
    sometimes mistakenly considered to be a requirement for object-oriented programming,
    especially since their addition to Java 5\. However, generic types are an orthogonal
    concept that is, for example, also present in the original version of Ada, which
    is not object-oriented. Generic types are most commonly used for collections.
    PL/SQL supports strongly typed collections, such as associative arrays, as built-in
    language construct. This suffices in most cases.


    Whereas PL/SQL is not an object-oriented programming language per se, it is possible
    to program in an object-oriented way using user-defined types (UDT) or PL/SQL
    records. Multiple instances and reuse with adaptations are implemented as follows:


    *   PL/SQL does not support in-memory references (pointers) directly. The only
    way to create an arbitrary number of instances of an object at runtime is to store
    the instances in collections, such as associative arrays. References are represented
    as collection indexes.

    *   UDTs support dynamic binding out of the box. With records, you can implement
    dynamic dispatch yourself using dynamic SQL or a static dispatcher.


    I start with UDTs because their alternate name object types suggests that they
    are the natural choice for object-oriented programming and then explain why records
    are the better option in most cases.


    #### Object-Oriented Programming with User-Defined Types


    Oracle added user-defined types (UDT) in Oracle 8 amid the object hype, addressing
    mostly storage aspects and leaving out some useful programming features. UDTs
    are schema-level objects. I can create a base type for banking transactions as
    follows:


    ![images](images/square.jpg) **Note** Oracle uses two synonymous terms for user-defined
    types (UDT). In the *Database Object-Relational Developer''s Guide*, they are
    called *object types* because Oracle wanted to support object orientation in the
    database. The same term *object type* has been used for much longer as the type
    of an entry in all_objects, such as packages and tables. The second synonym *abstract
    data type* (ADT) is used in the *PL/SQL Language Reference*, because UDTs can
    be used to implement the mathematical concept of an ADT—that is, a data structure
    defined by a list of operations and properties of these operations. I use the
    unambiguous term *UDT* in this chapter. UDTs include varrays and nested tables,
    which I don''t discuss here. UDTs are useful as types of parameters for subprograms
    called externally.


    `create or replace type t_bank_trx_obj is object (`

    `  s_id                  integer`

    ` ,s_amount              number`


    `  ------------------------------------------------------------------------------`

    `  -- Returns the amount of the transaction.`

    `  ------------------------------------------------------------------------------`

    ` ,final member function p_amount return number`


    `  ------------------------------------------------------------------------------`

    `  -- Books the transaction.`

    `  ------------------------------------------------------------------------------`

    ` ,not instantiable member procedure book(`

    `   i_text               varchar2`

    `  )`

    `) not instantiable not final;`


    The type t_bank_trx_obj has two attributes `s_id` and `s_amount` to hold the state.
    In addition, it has two methods. The function `p_amount` is declared as final,
    meaning that it cannot be overridden in subtypes. The procedure book is declared
    as non-instantiable (abstract), meaning that it just declared and specified, but
    not implemented. The syntax for the type body is PL/SQL extended by the modifiers
    for subprograms, like so:


    `create or replace type body t_bank_trx_obj is`

    `  final member function p_amount return number`

    `  is`

    `  begin`

    `    return s_amount;`

    `  end p_amount;`

    `end;`'
