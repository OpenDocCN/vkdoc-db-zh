  raw: '##### Extended Statistics


    Statistics are one of the benefits of function-based indexes. These can be invaluable
    to the CBO (even if it chooses not to use the index, it can make use of the statistics
    in deciding join or predicate orders). However, indexing a PL/SQL function predicate
    might not always be possible. In such cases, Oracle Database 11*g* provides an
    alternative known as extended statistics.


    Extended statistics can be created on expressions without requiring a supporting
    index. Such statistics are known as *extensions* and they have an added benefit
    over function-based indexes of being applicable to *all* PL/SQL function expressions
    in a query (i.e. not just those in predicates).


    To demonstrate this, I have re-executed the sales report by customer with extended
    statistics in place. [Listing 9-46](#Chapter09.html#list_9_46) is a reminder of
    the query without extended statistics, together with its execution plan and function
    call output from [Listing 9-5](#Chapter09.html#list_9_5).


    ***Listing 9-46.** Using Extended Statistics on a Projected PL/SQL Function (Plan
    without Statistics from [Listing 9-5](#Chapter09.html#list_9_5))*


    `SQL> SELECT t.calendar_year`

    `  2  ,      format_customer_name(`

    `  3            c.cust_first_name, c.cust_last_name`

    `  4            )                 AS cust_name`

    `  5  ,      SUM(s.quantity_sold) AS qty_sold`

    `  6  ,      SUM(s.amount_sold)   AS amt_sold`

    `  7  FROM   sales     s`

    `  8  ,      customers c`

    `  9  ,      times     t`

    ` 10  WHERE  s.cust_id = c.cust_id`

    `11  AND    s.time_id = t.time_id`

    ` 12  GROUP  BY`

    ` 13         t.calendar_year`

    ` 14  ,      format_customer_name(`

    ` 15            c.cust_first_name, c.cust_last_name`

    ` 16            )`

    ` 17  ;`


    `11604 rows selected.`


    **`Elapsed: 00:00:06.94`**


    `Execution Plan`

    `----------------------------------------------------------`

    `Plan hash value: 3113689673`


    `-------------------------------------------------------------`

    `| Id  | Operation                      | Name      | Rows  |`

    `-------------------------------------------------------------`

    `|   0 | SELECT STATEMENT               |           |   918K|`

    `|   1 |  HASH GROUP BY                 |           |   918K|`

    `|*  2 |   HASH JOIN                    |           |   918K|`

    `|   3 |    PART JOIN FILTER CREATE     | :BF0000   |  1826 |`

    `|   4 |     TABLE ACCESS FULL          | TIMES     |  1826 |`

    `|*  5 |    HASH JOIN                   |           |   918K|`

    `|   6 |     TABLE ACCESS FULL          | CUSTOMERS | 55500 |`

    `|   7 |     PARTITION RANGE JOIN-FILTER|           |   918K|`

    `|   8 |      TABLE ACCESS FULL         | SALES     |   918K|`

    `------------------------------------------------------------`


    `Statistics`

    `----------------------------------------------------------`

    `       3189  consistent gets`

    `          0  physical reads`


    `SQL> exec counter.show(''Function calls'');`


    **`Function calls: 918843`**


    `PL/SQL procedure successfully completed.`


    As you can see, this performs over 918,000 function calls and completes in roughly
    7 seconds. In [Listing 9-47](#Chapter09.html#list_9_47), I’ve used `DBMS_STATS`
    to generate extended statistics on the PL/SQL function call and show the execution
    plan from the re-executed query.


    ***Listing 9-47.** Generating and Using Extended Statistics*


    `SQL> BEGIN`

    `  2     DBMS_STATS.GATHER_TABLE_STATS(`

    `  3        ownname    => USER,`

    `  4        tabname    => ''CUSTOMERS'',`

    `5        method_opt => ''FOR COLUMNS (format_customer_name(cust_first_name,cust_last_name))`

    `SIZE AUTO''`

    `  6        );`

    `  7  END;`

    `  8  /`


    `PL/SQL procedure successfully completed.`


    `SQL> SELECT t.calendar_year...`


    `11604 rows selected.`


    **`Elapsed: 00:00:00.90`**


    `Execution Plan`

    `----------------------------------------------------------`

    `Plan hash value: 833790846`


    `---------------------------------------------------------------`

    `| Id  | Operation                        | Name      | Rows  |`

    `---------------------------------------------------------------`

    `|   0 | SELECT STATEMENT                 |           | 19803 |`

    `|   1 |  HASH GROUP BY                   |           | 19803 |`

    `|*  2 |   HASH JOIN                      |           | 24958 |`

    **`|   3 |    VIEW                          | VW_GBC_9  | 24958 |`**

    `|   4 |     HASH GROUP BY                |           | 24958 |`

    `|*  5 |      HASH JOIN                   |           |   918K|`

    `|   6 |       PART JOIN FILTER CREATE    | :BF0000   |  1826 |`

    `|   7 |        TABLE ACCESS FULL         | TIMES     |  1826 |`

    `|   8 |       PARTITION RANGE JOIN-FILTER|           |   918K|`

    `|   9 |        TABLE ACCESS FULL         | SALES     |   918K|`

    `|  10 |    TABLE ACCESS FULL             | CUSTOMERS | 55500 |`

    `---------------------------------------------------------------`


    `SQL> exec counter.show(''Extended stats'');`


    **`Extended stats: 237917`**


    `PL/SQL procedure successfully completed.`


    With the benefit of the extended statistics for the PL/SQL function, the CBO has
    made an informed decision to rewrite the query and pre-group the SALES and TIMES
    data. This is represented by Step 3 of the execution plan. Because this pre-groups
    and therefore reduces the resultset, the PL/SQL function calls are reduced to
    below 238,000\. Overall, the effect on the response time is dramatic.


    Extended statistics are a good alternative to the NO_MERGE hint demonstrated earlier.
    Without extended statistics, the query shown in [Listing 9-48](#Chapter09.html#list_9_48)
    was merged into the main query block by the CBO, resulting in 918,000 function
    executions. Fortunately, generating the extended statistics works nicely to prevent
    this transformation, again with good results.


    ***Listing 9-48.** Extended Statistics and Impact on Cost-Based Query Transformation*


    `SQL> SELECT t.calendar_year`

    `  2  ,      c.cust_name`

    `  3  ,      SUM(s.quantity_sold) AS qty_sold`

    `  4  ,      SUM(s.amount_sold)   AS amt_sold`

    `  5  FROM   sales     s`

    **`  6  ,     (`**

    **`  7         SELECT cust_id`**

    **`  8         ,      format_customer_name (`**

    **`  9                   cust_first_name, cust_last_name`**

    **` 10                   ) AS cust_name`**

    **` 11         FROM   customers`**

    **` 12        )          c`**

    ` 13  ,      times     t`

    ` 14  WHERE  s.cust_id = c.cust_id`

    ` 15  AND    s.time_id = t.time_id`

    ` 16  GROUP  BY`

    ` 17         t.calendar_year`

    ` 18  ,      c.cust_name`

    ` 19  ;`


    `11604 rows selected.`


    **`Elapsed: 00:00:00.94`**


    `Execution Plan`

    `----------------------------------------------------------`

    `Plan hash value: 833790846`


    `---------------------------------------------------------------`

    `| Id  | Operation                        | Name      | Rows  |`

    `---------------------------------------------------------------`

    `|   0 | SELECT STATEMENT                 |           | 19803 |`

    `|   1 |  HASH GROUP BY                   |           | 19803 |`

    `|*  2 |   HASH JOIN                      |           | 24958 |`

    `|   3 |    VIEW                          | VW_GBC_9  | 24958 |`

    `|   4 |     HASH GROUP BY                |           | 24958 |`

    `|*  5 |      HASH JOIN                   |           |   918K|`

    `|   6 |       PART JOIN FILTER CREATE    | :BF0000   |  1826 |`

    `|   7 |        TABLE ACCESS FULL         | TIMES     |  1826 |`

    `|   8 |       PARTITION RANGE JOIN-FILTER|           |   918K|`

    `|   9 |        TABLE ACCESS FULL         | SALES     |   918K|`

    `|  10 |    TABLE ACCESS FULL             | CUSTOMERS | 55500 |`

    `---------------------------------------------------------------`


    `SQL> exec counter.show(''Extended stats + inline view'');`


    **`Extended stats + inline view: 17897`**'
  trans: "\n# 扩展统计\n\n统计信息是基于函数的索引的优势之一。这些信息对于 CBO（基于成本的优化器）来说可能非常宝贵（即使它选择不使用该索引，也可以利用这些统计信息来决定连接或谓词的顺序）。然而，为\
    \ PL/SQL 函数谓词创建索引可能并不总是可行。在这种情况下，Oracle 数据库 11g 提供了一种替代方案，称为**扩展统计**。\n\n扩展统计可以在无需支持性索引的情况下，基于表达式创建。此类统计信息被称为**扩展**，它们相对于基于函数的索引有一个额外好处：可应用于查询中的所有\
    \ PL/SQL 函数表达式（即不仅限于谓词中的表达式）。\n\n为了演示这一点，我重新执行了按客户分类的销售报告，并启用了扩展统计。清单 9-46 重温了未使用扩展统计时的查询，以及来自清单\
    \ 9-5 的执行计划和函数调用输出。\n\n## 清单 9-46. 在投影的 PL/SQL 函数上使用扩展统计（无统计信息的执行计划，来自清单 9-5）\n\
    \n```sql\nSQL> SELECT t.calendar_year\n  2  ,      format_customer_name(\n  3\
    \            c.cust_first_name, c.cust_last_name\n  4            )           \
    \      AS cust_name\n  5  ,      SUM(s.quantity_sold) AS qty_sold\n  6  ,    \
    \  SUM(s.amount_sold)   AS amt_sold\n  7  FROM   sales     s\n  8  ,      customers\
    \ c\n  9  ,      times     t\n 10  WHERE  s.cust_id = c.cust_id\n 11  AND    s.time_id\
    \ = t.time_id\n 12  GROUP  BY\n 13         t.calendar_year\n 14  ,      format_customer_name(\n\
    \ 15            c.cust_first_name, c.cust_last_name\n 16            )\n 17  ;\n\
    \n11604 rows selected.\n```\n\n耗时: 00:00:06.94\n\n```\n执行计划\n----------------------------------------------------------\n\
    Plan hash value: 3113689673\n\n-------------------------------------------------------------\n\
    | Id  | Operation                      | Name      | Rows  |\n-------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT               |           |   918K|\n|   1 |  HASH GROUP\
    \ BY                 |           |   918K|\n|*  2 |   HASH JOIN              \
    \      |           |   918K|\n|   3 |    PART JOIN FILTER CREATE     | :BF0000\
    \   |  1826 |\n|   4 |     TABLE ACCESS FULL          | TIMES     |  1826 |\n\
    |*  5 |    HASH JOIN                   |           |   918K|\n|   6 |     TABLE\
    \ ACCESS FULL          | CUSTOMERS | 55500 |\n|   7 |     PARTITION RANGE JOIN-FILTER|\
    \           |   918K|\n|   8 |      TABLE ACCESS FULL         | SALES     |  \
    \ 918K|\n-------------------------------------------------------------\n\n统计信息\n\
    ----------------------------------------------------------\n       3189  一致读\n\
    \          0  物理读\n\nSQL> exec counter.show('Function calls');\n```\n\n函数调用次数:\
    \ 918843\n\n```\nPL/SQL 过程已成功完成。\n```\n\n如你所见，这执行了超过 918,000 次函数调用，并在大约 7 秒内完成。在清单\
    \ 9-47 中，我使用了`DBMS_STATS`在 PL/SQL 函数调用上生成扩展统计，并展示了重新执行查询后的执行计划。\n\n## 清单 9-47.\
    \ 生成并使用扩展统计\n\n```sql\nSQL> BEGIN\n  2     DBMS_STATS.GATHER_TABLE_STATS(\n  3\
    \        ownname    => USER,\n  4        tabname    => 'CUSTOMERS',\n  5     \
    \   method_opt => 'FOR COLUMNS (format_customer_name(cust_first_name,cust_last_name))\
    \ SIZE AUTO'\n  6        );\n  7  END;\n  8  /\n\nPL/SQL 过程已成功完成。\n\nSQL> SELECT\
    \ t.calendar_year...\n\n11604 rows selected.\n```\n\n耗时: 00:00:00.90\n\n```\n\
    执行计划\n----------------------------------------------------------\nPlan hash value:\
    \ 833790846\n\n---------------------------------------------------------------\n\
    | Id  | Operation                        | Name      | Rows  |\n---------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT                 |           | 19803 |\n|   1 |  HASH\
    \ GROUP BY                   |           | 19803 |\n|*  2 |   HASH JOIN      \
    \                |           | 24958 |\n|   3 |    VIEW                      \
    \    | VW_GBC_9  | 24958 |\n|   4 |     HASH GROUP BY                |       \
    \    | 24958 |\n|*  5 |      HASH JOIN                   |           |   918K|\n\
    |   6 |       PART JOIN FILTER CREATE    | :BF0000   |  1826 |\n|   7 |      \
    \  TABLE ACCESS FULL         | TIMES     |  1826 |\n|   8 |       PARTITION RANGE\
    \ JOIN-FILTER|           |   918K|\n|   9 |        TABLE ACCESS FULL         |\
    \ SALES     |   918K|\n|  10 |    TABLE ACCESS FULL             | CUSTOMERS |\
    \ 55500 |\n---------------------------------------------------------------\n\n\
    SQL> exec counter.show('Extended stats');\n```\n\n扩展统计调用次数: 237917\n\n```\nPL/SQL\
    \ 过程已成功完成。\n```\n\n得益于 PL/SQL 函数的扩展统计信息，CBO 做出了明智的决策来重写查询并预先对 SALES 和 TIMES 数据进行分组。这体现在执行计划的步骤\
    \ 3 中。由于这种预分组减少了结果集，PL/SQL 函数调用次数减少到 238,000 次以下。总体而言，对响应时间的影响是显著的。\n\n扩展统计是前面演示的`NO_MERGE`提示的一个良好替代方案。若没有扩展统计，清单\
    \ 9-48 中显示的查询会被 CBO 合并到主查询块中，导致 918,000 次函数执行。幸运的是，生成扩展统计可以很好地阻止这种转换，同样取得了良好效果。\n\
    \n## 清单 9-48. 扩展统计及对基于成本的查询转换的影响\n\n```sql\nSQL> SELECT t.calendar_year\n  2 \
    \ ,      c.cust_name\n  3  ,      SUM(s.quantity_sold) AS qty_sold\n  4  ,   \
    \   SUM(s.amount_sold)   AS amt_sold\n  5  FROM   sales     s\n  6  ,      (\n\
    \  7         SELECT cust_id\n  8         ,      format_customer_name (\n  9  \
    \                 cust_first_name, cust_last_name\n 10                   ) AS\
    \ cust_name\n 11         FROM   customers\n 12        )          c\n 13  ,   \
    \   times     t\n 14  WHERE  s.cust_id = c.cust_id\n 15  AND    s.time_id = t.time_id\n\
    \ 16  GROUP  BY\n 17         t.calendar_year\n 18  ,      c.cust_name\n 19  ;\n\
    \n11604 rows selected.\n```\n\n耗时: 00:00:00.94\n\n```\n执行计划\n----------------------------------------------------------\n\
    Plan hash value: 833790846\n\n---------------------------------------------------------------\n\
    | Id  | Operation                        | Name      | Rows  |\n---------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT                 |           | 19803 |\n|   1 |  HASH\
    \ GROUP BY                   |           | 19803 |\n|*  2 |   HASH JOIN      \
    \                |           | 24958 |\n|   3 |    VIEW                      \
    \    | VW_GBC_9  | 24958 |\n|   4 |     HASH GROUP BY                |       \
    \    | 24958 |\n|*  5 |      HASH JOIN                   |           |   918K|\n\
    |   6 |       PART JOIN FILTER CREATE    | :BF0000   |  1826 |\n|   7 |      \
    \  TABLE ACCESS FULL         | TIMES     |  1826 |\n|   8 |       PARTITION RANGE\
    \ JOIN-FILTER|           |   918K|\n|   9 |        TABLE ACCESS FULL         |\
    \ SALES     |   918K|\n|  10 |    TABLE ACCESS FULL             | CUSTOMERS |\
    \ 55500 |\n---------------------------------------------------------------\n\n\
    SQL> exec counter.show('Extended stats + inline view');\n```\n\n扩展统计 + 内联视图调用次数:\
    \ 17897\n"
- fmt: "Interestingly, the CBO has generated the same execution plan for this re-arranged\
    \ query, although the function executions have dropped dramatically from 234,000\
    \ to just 18,000. This is another excellent example of the function executions\
    \ being unpredictable—I have the same execution plan yet more than an order of\
    \ magnitude difference in function calls. Nevertheless, these listings clearly\
    \ highlight how important statistics on PL/SQL functions are for the CBO and that\
    \ extended statistics are an excellent mechanism for supplying them.\n\n![images](images/square.jpg)\
    \ Note: Extended statistics, or extensions, are implemented using system-generated\
    \ virtual columns (similar to function-based indexes). To investigate more about\
    \ this feature, query dictionary views such as `USER_TAB_COLS` and `USER_STAT_EXTENSIONS`.\n\
    \n## Default Statistics\n\nUnlike extended statistics, default statistics are\
    \ user-generated and only apply to PL/SQL functions in predicates. Furthermore,\
    \ the CBO will not use default statistics to inform cost-based query transformations,\
    \ but it will use them to determine predicate ordering in the event that you have\
    \ more than one function call in your WHERE clause.\n\nDefault statistics are\
    \ supplied using the `ASSOCIATE STATISTICS` SQL command and with these you can\
    \ define statistics on selectivity, CPU, and I/O costs for your PL/SQL functions\
    \ (thereby improving on the defaults that the CBO otherwise adopts).\n\nIn [Listing\
    \ 9-19](#Chapter09.html#list_9_19), I highlighted the impact of default predicate\
    \ ordering when I referenced two functions in a query (these were appropriately\
    \ named `QUICK_FUNCTION` and `SLOW_FUNCTION`). [Listing 9-49](#Chapter09.html#list_9_49)\
    \ demonstrates how applying default statistics can ensure that the CBO applies\
    \ the function predicates in the most efficient order.\n\n**Listing 9-49.** Setting\
    \ Default Statistics for PL/SQL Function Predicates\n```sql\nSQL> ASSOCIATE STATISTICS\
    \ WITH FUNCTIONS quick_function DEFAULT SELECTIVITY 0.1;\n\nStatistics associated.\n\
    \nSQL> ASSOCIATE STATISTICS WITH FUNCTIONS slow_function DEFAULT SELECTIVITY 50;\n\
    \nStatistics associated.\n\nSQL> SELECT *\n  2  FROM   thousand_rows\n  3  WHERE\
    \  slow_function(n1) = 0\n  4  AND    quick_function(n1) = 0;\n\n1 row selected.\n\
    \nElapsed: 00:00:00.02\nExecution Plan\n----------------------------------------------------------\n\
    Plan hash value: 4012467810\n\n-----------------------------------------------------------------------------------\n\
    | Id  | Operation         | Name          | Rows  | Bytes | Cost (%CPU)| Time\
    \     |\n-----------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT  |               |     1 |    55 |     5   (0)| 00:00:01\
    \ |\n|*  1 |  TABLE ACCESS FULL| THOUSAND_ROWS |     1 |    55 |     5   (0)|\
    \ 00:00:01 |\n-----------------------------------------------------------------------------------\n\
    \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
    \n   1 - filter(\"QUICK_FUNCTION\"(\"N1\")=0 AND \"SLOW_FUNCTION\"(\"N1\")=0)\n\
    ```\n\nBecause of the selectivity statistics associated with `SLOW_FUNCTION` and\
    \ `QUICK_FUNCTION`, you can see that the CBO has chosen to re-order the predicates\
    \ to good effect. I have told Oracle Database that an equality predicate against\
    \ `QUICK_FUNCTION` will only be true 1 in 1,000 times, whereas the `SLOW_FUNCTION`\
    \ predicate will be true 1 in 2 times. It clearly made sense to apply `QUICK_FUNCTION`\
    \ first to reduce the rowsource as soon as possible. An excerpt from the 10053\
    \ trace file in [Listing 9-50](#Chapter09.html#list_9_50) shows the workings of\
    \ the CBO for this query.\n\n**Listing 9-50.** 10053 Trace File Excerpt for Default\
    \ Selectivity Statistics\n```text\n***************************************\nBASE\
    \ STATISTICAL INFORMATION\n***********************\nTable Stats::\n  Table: THOUSAND_ROWS\
    \  Alias: THOUSAND_ROWS\n    #Rows: 1000  #Blks:  12  AvgRowLen:  55.00  ChainCnt:\
    \  0.00\nAccess path analysis for THOUSAND_ROWS\n***************************************\n\
    SINGLE TABLE ACCESS PATH\n  Single Table Cardinality Estimation for THOUSAND_ROWS[THOUSAND_ROWS]\n\
    \  No statistics type defined for function SLOW_FUNCTION\n  No default cost defined\
    \ for function SLOW_FUNCTION\n  No statistics type defined for function SLOW_FUNCTION\n\
    \  Default selectivity for function SLOW_FUNCTION: 50.00000000%\n  No statistics\
    \ type defined for function QUICK_FUNCTION\n  No default cost defined for function\
    \ QUICK_FUNCTION\n  No statistics type defined for function QUICK_FUNCTION\n \
    \ Default selectivity for function QUICK_FUNCTION: 0.10000000%\n  Table: THOUSAND_ROWS\
    \  Alias: THOUSAND_ROWS\n    Card: Original: 1000.000000  Rounded: 1  Computed:\
    \ 0.50  Non Adjusted: 0.50\n  Access Path: TableScan\n    Cost:  5.10  Resp: 5.10\
    \  Degree: 0\n      Cost_io: 5.00  Cost_cpu: 3288527\n      Resp_io: 5.00  Resp_cpu:\
    \ 3288527\n  Best:: AccessPath: TableScan\n         Cost: 5.10  Degree: 1  Resp:\
    \ 5.10  Card: 0.50  Bytes: 0\n```\n\nThe `ASSOCIATE STATISTICS` command can also\
    \ be used to supply cost information for PL/SQL functions and this has a similar\
    \ impact to the selectivity statistics above. [Listing 9-51](#Chapter09.html#list_9_51)\
    \ shows how to set default cost statistics for the `GET_RATE` PL/SQL function:\n\
    \n**Listing 9-51.** Setting Default Cost Statistics for a PL/SQL Function\n```sql\n\
    SQL> ASSOCIATE STATISTICS WITH FUNCTIONS get_rate DEFAULT COST (403416, 2, 0);\n\
    \nStatistics associated.\n```\n\nI calculated these cost statistics as follows\
    \ (in parameter order):\n\n*   CPU cost (403416): Calculated by the `DBMS_ODCI.ESTIMATE_CPU_UNITS(<ms>)`\
    \ function, where `<ms>` is the number of milliseconds it takes to execute the\
    \ `GET_RATE` function once (as reported by the Hierarchical Profiler).\n*   I/O\
    \ cost (2): The sum of logical and physical I/Os of one execution of `GET_RATE`\
    \ (reported by Autotrace).\n*   Network cost (0): This is not yet implemented\
    \ so it can be left at 0.\n\nIt is possible to set both selectivity and costs\
    \ in a single `ASSOCIATE STATISTICS` command and it makes sense to supply both\
    \ when using this strategy."
  raw: 'Interestingly, the CBO has generated the same execution plan for this re-arranged
    query, although the function executions have dropped dramatically from 234,000
    to just 18,000\. This is another excellent example of the function executions
    being unpredictable—I have the same execution plan yet more than an order of magnitude
    difference in function calls. Nevertheless, these listings clearly highlight how
    important statistics on PL/SQL functions are for the CBO and that extended statistics
    are an excellent mechanism for supplying them.


    ![images](images/square.jpg) **Note** Extended statistics, or extensions, are
    implemented using system-generated virtual columns (similar to function-based
    indexes). To investigate more about this feature, query dictionary views such
    as USER_TAB_COLS and USER_STAT_EXTENSIONS.


    ##### Default Statistics


    Unlike extended statistics, default statistics are user-generated and only apply
    to PL/SQL functions in predicates. Furthermore, the CBO will not use default statistics
    to inform cost-based query transformations, but it will use them to determine
    predicate ordering in the event that you have more than one function call in your
    WHERE clause.


    Default statistics are supplied using the ASSOCIATE STATISTICS SQL command and
    with these you can define statistics on selectivity, CPU, and I/O costs for your
    PL/SQL functions (thereby improving on the defaults that the CBO otherwise adopts).


    In [Listing 9-19](#Chapter09.html#list_9_19), I highlighted the impact of default
    predicate ordering when I referenced two functions in a query (these were appropriately
    named `QUICK_FUNCTION` and `SLOW_FUNCTION`). [Listing 9-49](#Chapter09.html#list_9_49)
    demonstrates how applying default statistics can ensure that the CBO applies the
    function predicates in the most efficient order.


    ***Listing 9-49.** Setting Default Statistics for PL/SQL Function Predicates*


    `SQL> ASSOCIATE STATISTICS WITH FUNCTIONS quick_function DEFAULT SELECTIVITY 0.1;`


    `Statistics associated.`


    `SQL> ASSOCIATE STATISTICS WITH FUNCTIONS slow_function DEFAULT SELECTIVITY 50;`


    `Statistics associated.`


    `SQL> SELECT *`

    `  2  FROM   thousand_rows`

    `  3  WHERE  slow_function(n1) = 0`

    `  4  AND    quick_function(n1) = 0;`


    `1 row selected.`


    **`Elapsed: 00:00:00.02`**

    `Execution Plan`

    `----------------------------------------------------------`

    `Plan hash value: 4012467810`


    `-----------------------------------------------------------------------------------`

    `| Id  | Operation         | Name          | Rows  | Bytes | Cost (%CPU)| Time    
    |`

    `-----------------------------------------------------------------------------------`

    `|   0 | SELECT STATEMENT  |               |     1 |    55 |     5   (0)| 00:00:01
    |`

    `|*  1 |  TABLE ACCESS FULL| THOUSAND_ROWS |     1 |    55 |     5   (0)| 00:00:01
    |`

    `-----------------------------------------------------------------------------------`


    `Predicate Information (identified by operation id):`

    `---------------------------------------------------`


    **`   1 - filter("QUICK_FUNCTION"("N1")=0 AND "SLOW_FUNCTION"("N1")=0)`**


    Because of the selectivity statistics associated with `SLOW_FUNCTION` and `QUICK_FUNCTION`,
    you can see that the CBO has chosen to re-order the predicates to good effect.
    I have told Oracle Database that an equality predicate against `QUICK_FUNCTION`
    will only be true 1 in 1,000 times, whereas the `SLOW_FUNCTION` predicate will
    be true 1 in 2 times. It clearly made sense to apply `QUICK_FUNCTION` first to
    reduce the rowsource as soon as possible. An excerpt from the 10053 trace file
    in [Listing 9-50](#Chapter09.html#list_9_50) shows the workings of the CBO for
    this query.


    ***Listing 9-50.** 10053 Trace File Excerpt for Default Selectivity Statistics*


    `***************************************`

    `BASE STATISTICAL INFORMATION`

    `***********************`

    `Table Stats::`

    `  Table: THOUSAND_ROWS  Alias: THOUSAND_ROWS`

    `    #Rows: 1000  #Blks:  12  AvgRowLen:  55.00  ChainCnt:  0.00`

    `Access path analysis for THOUSAND_ROWS`

    `***************************************`

    `SINGLE TABLE ACCESS PATH`

    `  Single Table Cardinality Estimation for THOUSAND_ROWS[THOUSAND_ROWS]`

    `  No statistics type defined for function SLOW_FUNCTION`

    `  No default cost defined for function SLOW_FUNCTION`

    `  No statistics type defined for function SLOW_FUNCTION`

    **`  Default selectivity for function SLOW_FUNCTION: 50.00000000%`**

    `  No statistics type defined for function QUICK_FUNCTION`

    `  No default cost defined for function QUICK_FUNCTION`

    `  No statistics type defined for function QUICK_FUNCTION`

    **`  Default selectivity for function QUICK_FUNCTION: 0.10000000%`**

    `  Table: THOUSAND_ROWS  Alias: THOUSAND_ROWS`

    `    Card: Original: 1000.000000  Rounded: 1  Computed: 0.50  Non Adjusted: 0.50`

    `  Access Path: TableScan`

    `    Cost:  5.10  Resp: 5.10  Degree: 0`

    `      Cost_io: 5.00  Cost_cpu: 3288527`

    `      Resp_io: 5.00  Resp_cpu: 3288527`

    `  Best:: AccessPath: TableScan`

    `         Cost: 5.10  Degree: 1  Resp: 5.10  Card: 0.50  Bytes: 0`


    The ASSOCIATE STATISTICS command can also be used to supply *cost* information
    for PL/SQL functions and this has a similar impact to the selectivity statistics
    above. [Listing 9-51](#Chapter09.html#list_9_51) shows how to set default cost
    statistics for the `GET_RATE` PL/SQL function:


    ***Listing 9-51.** Setting Default Cost Statistics for a PL/SQL Function*


    `SQL> ASSOCIATE STATISTICS WITH FUNCTIONS get_rate DEFAULT COST (403416, 2, 0);`


    `Statistics associated.`


    I calculated these cost statistics as follows (in parameter order):


    *   *CPU cost* (403416): Calculated by the `DBMS_ODCI.ESTIMATE_CPU_UNITS(<ms>)`
    function, where `<ms>` is the number of milliseconds it takes to execute the `GET_RATE`
    function once (as reported by the Hierarchical Profiler).

    *   *I/O cost* (2): The sum of logical and physical I/Os of one execution of `GET_RATE`
    (reported by Autotrace).

    *   *Network cost* (0): This is not yet implemented so it can be left at 0.


    It is possible to set both selectivity and costs in a single ASSOCIATE STATISTICS
    command and it makes sense to supply both when using this strategy.'
  trans: "\n有趣的是，对于这个重新排列的查询，CBO 生成了相同的执行计划，尽管函数执行次数已从 234,000 次大幅下降到仅 18,000 次。这是函数执行具有不可预测性的又一个绝佳例证——我得到了相同的执行计划，但函数调用次数却存在超过一个数量级的差异。尽管如此，这些清单清晰地突显了针对\
    \ PL/SQL 函数的统计信息对于 CBO 而言是多么重要，以及扩展统计信息是一种为其提供信息的绝佳机制。\n\n![images](img/square.jpg)\
    \ 注意：扩展统计信息（或简称扩展）是通过系统生成的虚拟列（类似于基于函数的索引）实现的。要研究此功能的更多细节，请查询数据字典视图，如 `USER_TAB_COLS`\
    \ 和 `USER_STAT_EXTENSIONS`。\n\n## 默认统计信息\n\n与扩展统计信息不同，默认统计信息是由用户生成的，并且仅适用于谓词中的\
    \ PL/SQL 函数。此外，CBO 不会使用默认统计信息来指导基于成本的查询转换，但如果你的 WHERE 子句中有多个函数调用，它将使用它们来确定谓词的排序。\n\
    \n默认统计信息使用 `ASSOCIATE STATISTICS` SQL 命令提供，通过这些命令，你可以为你的 PL/SQL 函数定义选择性、CPU 和\
    \ I/O 成本的统计信息（从而改进 CBO 否则会采用的默认值）。\n\n在清单 9-19 中，当我引用查询中的两个函数（它们被恰当地命名为 `QUICK_FUNCTION`\
    \ 和 `SLOW_FUNCTION`）时，我强调了默认谓词排序的影响。清单 9-49 展示了应用默认统计信息如何确保 CBO 以最高效的顺序应用函数谓词。\n\
    \n**清单 9-49.** 为 PL/SQL 函数谓词设置默认统计信息\n```sql\nSQL> ASSOCIATE STATISTICS WITH FUNCTIONS\
    \ quick_function DEFAULT SELECTIVITY 0.1;\n\nStatistics associated.\n\nSQL> ASSOCIATE\
    \ STATISTICS WITH FUNCTIONS slow_function DEFAULT SELECTIVITY 50;\n\nStatistics\
    \ associated.\n\nSQL> SELECT *\n  2  FROM   thousand_rows\n  3  WHERE  slow_function(n1)\
    \ = 0\n  4  AND    quick_function(n1) = 0;\n\n1 row selected.\n\nElapsed: 00:00:00.02\n\
    Execution Plan\n----------------------------------------------------------\nPlan\
    \ hash value: 4012467810\n\n-----------------------------------------------------------------------------------\n\
    | Id  | Operation         | Name          | Rows  | Bytes | Cost (%CPU)| Time\
    \     |\n-----------------------------------------------------------------------------------\n\
    |   0 | SELECT STATEMENT  |               |     1 |    55 |     5   (0)| 00:00:01\
    \ |\n|*  1 |  TABLE ACCESS FULL| THOUSAND_ROWS |     1 |    55 |     5   (0)|\
    \ 00:00:01 |\n-----------------------------------------------------------------------------------\n\
    \nPredicate Information (identified by operation id):\n---------------------------------------------------\n\
    \n   1 - filter(\"QUICK_FUNCTION\"(\"N1\")=0 AND \"SLOW_FUNCTION\"(\"N1\")=0)\n\
    ```\n\n由于与 `SLOW_FUNCTION` 和 `QUICK_FUNCTION` 相关的选择性统计信息，你可以看到 CBO 已选择重新排序谓词，效果良好。我已告知\
    \ Oracle 数据库，针对 `QUICK_FUNCTION` 的相等性谓词只有千分之一的几率为真，而 `SLOW_FUNCTION` 谓词则有二分之一的几率为真。显然，先应用\
    \ `QUICK_FUNCTION` 以尽早减少数据源是有意义的。清单 9-50 中 10053 跟踪文件的摘录显示了 CBO 对此查询的处理过程。\n\n\
    **清单 9-50.** 默认选择性统计信息的 10053 跟踪文件摘录\n```text\n***************************************\n\
    BASE STATISTICAL INFORMATION\n***********************\nTable Stats::\n  Table:\
    \ THOUSAND_ROWS  Alias: THOUSAND_ROWS\n    #Rows: 1000  #Blks:  12  AvgRowLen:\
    \  55.00  ChainCnt:  0.00\nAccess path analysis for THOUSAND_ROWS\n***************************************\n\
    SINGLE TABLE ACCESS PATH\n  Single Table Cardinality Estimation for THOUSAND_ROWS[THOUSAND_ROWS]\n\
    \  No statistics type defined for function SLOW_FUNCTION\n  No default cost defined\
    \ for function SLOW_FUNCTION\n  No statistics type defined for function SLOW_FUNCTION\n\
    \  Default selectivity for function SLOW_FUNCTION: 50.00000000%\n  No statistics\
    \ type defined for function QUICK_FUNCTION\n  No default cost defined for function\
    \ QUICK_FUNCTION\n  No statistics type defined for function QUICK_FUNCTION\n \
    \ Default selectivity for function QUICK_FUNCTION: 0.10000000%\n  Table: THOUSAND_ROWS\
    \  Alias: THOUSAND_ROWS\n    Card: Original: 1000.000000  Rounded: 1  Computed:\
    \ 0.50  Non Adjusted: 0.50\n  Access Path: TableScan\n    Cost:  5.10  Resp: 5.10\
    \  Degree: 0\n      Cost_io: 5.00  Cost_cpu: 3288527\n      Resp_io: 5.00  Resp_cpu:\
    \ 3288527\n  Best:: AccessPath: TableScan\n         Cost: 5.10  Degree: 1  Resp:\
    \ 5.10  Card: 0.50  Bytes: 0\n```\n\n`ASSOCIATE STATISTICS` 命令也可用于为 PL/SQL 函数提供成本信息，这与上述选择性统计信息具有类似的影响。清单\
    \ 9-51 展示了如何为 `GET_RATE` PL/SQL 函数设置默认成本统计信息：\n\n**清单 9-51.** 为 PL/SQL 函数设置默认成本统计信息\n\
    ```sql\nSQL> ASSOCIATE STATISTICS WITH FUNCTIONS get_rate DEFAULT COST (403416,\
    \ 2, 0);\n\nStatistics associated.\n```\n\n我按如下方式计算这些成本统计信息（按参数顺序）：\n\n*   CPU\
    \ 成本 (403416)：由 `DBMS_ODCI.ESTIMATE_CPU_UNITS(<ms>)` 函数计算，其中 `<ms>` 是执行一次 `GET_RATE`\
    \ 函数所需的毫秒数（由分层分析器报告）。\n*   I/O 成本 (2)：执行一次 `GET_RATE` 的逻辑和物理 I/O 总和（由 Autotrace\
    \ 报告）。\n*   网络成本 (0)：此功能尚未实现，因此可以保留为 0。\n\n可以在单个 `ASSOCIATE STATISTICS` 命令中同时设置选择性和成本，并且在使用此策略时同时提供两者是有意义的。\n"
- fmt: "# Extensible Optimizer\n\nI’ll finish this walkthrough of supplying statistics\
    \ to the CBO with a brief overview of the Extensible Optimizer. This feature (part\
    \ of the Oracle Data Cartridge toolset), takes default statistics one stage further\
    \ by associating selectivity and cost by means of an object type, rather than\
    \ by hardcoded defaults such as those previously mentioned.\n\nIt is possible\
    \ to spend many pages describing the Extensible Optimizer so I’ll just provide\
    \ a flavor of the technology to show you how to build a method for estimating\
    \ statistics for your PL/SQL functions that can adapt to your data patterns.\n\
    \nConsider [Listing 9-52](#Chapter09.html#list_9_52). I have a simple function\
    \ that returns a product code in uppercase. Without statistics, the CBO will assume\
    \ that any predicate using this function will have a 1% selectivity as follows.\n\
    \n**Listing 9-52.** Default Selectivity for a PL/SQL Function Predicate\n\n```sql\n\
    SQL> CREATE FUNCTION format_prod_category(\n  2                    p_prod_category\
    \ IN VARCHAR2\n  3                    ) RETURN VARCHAR2 DETERMINISTIC IS\n  4\
    \  BEGIN\n  5     RETURN UPPER(p_prod_category);\n  6  END format_prod_category;\n\
    \  7  /\n\nFunction created.\n\nSQL> SELECT *\n  2  FROM   products\n  3  WHERE\
    \  format_prod_category(prod_category) = 'SOFTWARE/OTHER';\n\nExecution Plan\n\
    ----------------------------------------------------------\nPlan hash value: 1954719464\n\
    \n------------------------------------------------\n| Id  | Operation        \
    \ | Name     | Rows  |\n------------------------------------------------\n|  \
    \ 0 | SELECT STATEMENT  |          |     1 |\n|*  1 |  TABLE ACCESS FULL| PRODUCTS\
    \ |     1 |\n------------------------------------------------\n```\n\nThe CBO\
    \ has estimated a cardinality of just 1 row for this predicate, but I know for\
    \ a fact that there are more rows for the Software/Other category as the data\
    \ profile in [Listing 9-53](#Chapter09.html#list_9_53) shows.\n\n**Listing 9-53.**\
    \ Data Profile for PRODUCTS Table\n\n```sql\nSQL> SELECT prod_category\n  2  ,\
    \      c                                           AS num_rows\n  3  ,      ROUND(RATIO_TO_REPORT(c)\
    \ OVER () * 100, 1) AS selectivity\n  4  FROM   (\n  5         SELECT prod_category\n\
    \  6         ,      COUNT(*) AS c\n  7         FROM   products\n  8         GROUP\
    \  BY\n  9                prod_category\n 10        )\n 11  ORDER  BY\n 12   \
    \      num_rows;\n\nPROD_CATEGORY                     NUM_ROWS SELECTIVITY\n--------------------------------\
    \ ---------- -----------\nHardware                                 2         2.8\n\
    Photo                                   10        13.9\nElectronics          \
    \                   13        18.1\nPeripherals and Accessories             21\
    \        29.2\nSoftware/Other                          26        36.1\n```\n\n\
    You can see a range of selectivity in this data, so a default statistics solution\
    \ wouldn’t be flexible enough to cover all categories. Therefore, you can use\
    \ the Extensible Optimizer to build a dynamic statistics parser for this function\
    \ predicate. As stated earlier, this is implemented using an object type, the\
    \ specification for which is provided in [Listing 9-54](#Chapter09.html#list_9_54).\n\
    \n**Listing 9-54.** Creating a Statistics Type for the Extensible Optimiser\n\n\
    ```sql\nSQL> CREATE TYPE prod_stats_ot AS OBJECT (\n  2  \n  3     dummy_attribute\
    \ NUMBER,\n  4\n  5     STATIC FUNCTION ODCIGetInterfaces (\n  6             \
    \         p_interfaces OUT SYS.ODCIObjectList\n  7                      ) RETURN\
    \ NUMBER,\n  8  \n  9     STATIC FUNCTION ODCIStatsSelectivity (\n 10        \
    \              p_pred_info       IN  SYS.ODCIPredInfo,\n 11                  \
    \    p_selectivity     OUT NUMBER,\n 12                      p_args          \
    \  IN  SYS.ODCIArgDescList,\n 13                      p_start           IN  VARCHAR2,\n\
    \ 14                      p_stop            IN  VARCHAR2,\n 15               \
    \       p_prod_category   IN  VARCHAR2,\n 16                      p_env      \
    \       IN  SYS.ODCIEnv\n 17                      ) RETURN NUMBER,\n 18  \n 19\
    \     STATIC FUNCTION ODCIStatsFunctionCost (\n 20                      p_func_info\
    \       IN  SYS.ODCIFuncInfo,\n 21                      p_cost            OUT\
    \ SYS.ODCICost,\n 22                      p_args            IN  SYS.ODCIArgDescList,\n\
    \ 23                      p_prod_category   IN  VARCHAR2,\n 24               \
    \       p_env             IN  SYS.ODCIEnv\n 25                      ) RETURN NUMBER\n\
    \ 26  );\n 27  /\n\nType created.\n```\n\nThe Extensible Optimizer uses well-defined\
    \ interface methods and [Listing 9-54](#Chapter09.html#list_9_54) uses the three\
    \ that are needed to generate selectivity and cost statistics. You must use the\
    \ exact method names that Oracle prescribes, as I have done.\n\nThe parameter\
    \ data types and order are also prescribed by the Extensible Optimizer, although\
    \ you can use parameter names of your own choosing, with one notable exception.\
    \ You must include the same parameter names in your type methods that you have\
    \ in the PL/SQL function(s) that will eventually be associated with the statistics\
    \ type. In my case, the `FORMAT_PROD_CATEGORY` function that I am building this\
    \ statistics type for has a single parameter named `p_prod_category` (so I’ve\
    \ included this in the relevant methods).\n\nThe type body implements the statistics\
    \ type and can include any logic you like that enables the CBO to determine the\
    \ selectivity and cost of your associated PL/SQL function(s). The type body for\
    \ the `PROD_STATS_OT.ODCIStatsSelectivity` method is provided in [Listing 9-55](#Chapter09.html#list_9_55)\
    \ (the remaining methods are available from the Apress web site).\n\n**Listing\
    \ 9-55.** Creating a Statistics Type for the Extensible Optimiser (Excerpt of\
    \ the Type Body)\n\n```sql\nSQL> CREATE TYPE BODY prod_stats_ot AS\n  2  \n  3\
    \     STATIC FUNCTION ODCIGetInterfaces ...\n<snip>\n 13     STATIC FUNCTION ODCIStatsSelectivity\
    \ (\n 14                      p_pred_info         IN  SYS.ODCIPredInfo,\n 15 \
    \                     p_selectivity       OUT NUMBER,\n 16                   \
    \   p_args              IN  SYS.ODCIArgDescList,\n 17                      p_start\
    \             IN  VARCHAR2,\n 18                      p_stop              IN \
    \ VARCHAR2,\n 19                      p_prod_category     IN  VARCHAR2,\n 20 \
    \                     p_env               IN  SYS.ODCIEnv\n 21               \
    \       ) RETURN NUMBER IS\n 22     BEGIN\n 23  \n 24        /* Calculate selectivity\
    \ of predicate... */\n 25        SELECT (COUNT(CASE\n 26                     \
    \    WHEN UPPER(prod_category) = p_start\n 27                         THEN 0\n\
    \ 28                      END) / COUNT(*)) * 100 AS selectivity\n 29        INTO\
    \   p_selectivity\n 30        FROM   sh.products;\n 31  \n 32        RETURN ODCIConst.success;\n\
    \ 33     END ODCIStatsSelectivity;\n 34\n 35     STATIC FUNCTION ODCIStatsFunctionCost\
    \ ...\n<snip>\n 76  \n 77  END;\n 78  /\n```"
