    `        foreign key (employee_id)`

    `        references EMPLOYEES (employee_id) ;`


    `Table altered.`


    `SQL> insert into emp_phone_numbers (`

    `     select employee_id, phone_number, ''Y'', ''Office''`

    `      from employees) ;`


