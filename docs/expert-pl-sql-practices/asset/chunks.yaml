    `    AND ai.object_type = cnctby_vw.prior_object_type  )`


    The inner query (cnctby_vw) is a hierarchical query that gets the changed program
    unit information. This query is specifically looking for packaged calls. It''s
    easily modified to find any kind of calls; I leave that exercise to you. Modifying
    it to find procedure or function calls is easier than finding packaged calls or
    object methods.


    The outer query ties the changed unit (the CALLED program unit) to the sub-unit
    (procedure or function in a package) or, if standalone, to the standalone unit.


    Before creating your own impact analysis queries using this query as a basis,
    I suggest that you start with the inner query and play with that for a while.
    That basic query can be modified to return almost any two related items that PL/Scope
    provides.


    ##### Validating Naming Standards Compliance


    Like USER_PROCEDURES, USER_ARGUMENTS and the USER_TYPE family of views, PL/Scope
    can provide intelligence on naming standards compliance. PL/Scope is even better,
    though, because you can verify the naming of variables internal to packages as
    well as in the body of procedures and functions, as opposed to just parameters
    and program unit naming.


    The following query will find all variables that don''t begin with ‘V_'' and parameters
    that don''t begin with ‘P_''. It could be extended using a hierarchical query
    like the one in the code analysis section to validate globals and sub-types.


    `SELECT  ui_var.name, type, usage, line, col`

    `  FROM user_identifiers ui_var`

    `  WHERE ui_var.object_name = ''JOBS_API''`

    `    AND ui_var.object_type = ''PACKAGE BODY''`

    `    AND (`

    `          (ui_var.type = ''VARIABLE'' AND name NOT LIKE ''V_%'')`

    `      OR`

    `          (ui_var.type IN (''FORMAL IN'', ''FORMAL OUT'', ''FORMAL IN OUT'')`

    `             AND name NOT LIKE ''P_%'')`

    `        )`

    `    AND ui_var.usage = ''DECLARATION''`

    `  ORDER BY line, col;`


    `NAME                TYPE               USAGE       LINE       COL`

    `------------------- ------------------ ----------- ---------- -------`

    `JOB_TITLE           FORMAL IN          DECLARATION 4          5`


    If you look at the code in JOBS_API starting at line 4, you will find the following
    code:


    `  FUNCTION job_exists(`

    `    job_title  IN jobs.job_title%TYPE )`

    `  RETURN jobs.job_id%TYPE AS`

    `    v_job_id jobs.job_id%TYPE;`

    `  BEGIN`

    `    SELECT job_id`

    `      INTO v_job_id`

    `      FROM jobs`

    `      WHERE UPPER(job_title) = upper(job_title);`


    From this code, you can see that it does indeed have a parameter named JOB_TITLE.
    Looking at the query in the code, you will find that the query has a problem.
    The problem lies in the WHERE clause where the same column name is referenced
    twice. The person writing the function intended to compare the table column to
    the parameter, but that''s not the comparison that will happen. Here is the offending
    comparison:


    `WHERE UPPER(job_title) = UPPER(job_title);`


    If someone were to run that select, every record in the table would match (the
    SQL parser will use job_title from the table instead of the job_title parameter).
    The fix is to rewrite the function specification as follows, adding a p_ to the
    parameter name:


    `FUNCTION job_exists(`

    `    p_job_title  IN jobs.job_title%TYPE )`

    `  RETURN jobs.job_id%TYPE;`


    Modify the filter criteria in the WHERE clause to add the p_ that was added to
    the parameter, like so:


    `WHERE UPPER(job_title) = upper(p_job_title);`


    The reason the query would not run successfully is that, as far as Oracle is concerned,
    the filter was comparing the value in the column job_title to the value in the
    column job_title. That would be the same as the criteria WHERE 1=1\. The result
    is that every row in the table would be returned—obviously not what was intended.
    By adding the p_ prefix to both the parameter and its usage, the filter will only
    return the row where the job title in the table matches the job_title passed into
    the function.'
