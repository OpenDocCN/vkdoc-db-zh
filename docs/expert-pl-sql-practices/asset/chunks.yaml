    `Procedure P          q                  .005708`


    The results of the query in the SQL*Plus script show me exactly where my time
    was spent, associated with each business task, identified by module and action
    name. The query results are a profile (assuming that I know the hierarchical relationship
    of the procedures and the first row returned represents the total line that usually
    displays at the bottom instead), so I can easily see that if my goal is optimizing
