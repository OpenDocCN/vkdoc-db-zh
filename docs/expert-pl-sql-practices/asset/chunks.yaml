  trans: "\n## 测量批量绑定性能\n\n与批量收集一样，使用批量绑定的动机是为了提升性能，这可以通过简单的基准测试来量化。我将从一个简单的 PL/SQL\
    \ 程序开始，该程序通过逐行插入的方式向表中插入大量行。以下示例 (`bulk_insert_conventional.sql`) 逐行向 `HARDWARE`\
    \ 表添加了 100,000 行数据：\n\n```\nSQL> set timing on\nSQL> declare\n  2    l_now date\
    \ := sysdate;\n  3  begin\n  4   for i in 1 .. 100000 loop\n  5     insert into\
    \ HARDWARE\n  6     values (i/1000, i, to_char(i), l_now);\n  7   end loop;\n\
    \  8  end;\n  9  /\n\nPL/SQL procedure successfully completed.\n\nElapsed: 00:00:04.52\n\
    ```\n\n在转向批量绑定版本之前，值得注意的是，即使是一行一行地插入，Oracle 的插入性能也相当出色。但数据库可以做得更好。让我们看看批量绑定版本\
    \ (`bulk_insert_bind.sql`)，它通过一次调用插入那 100,000 行数据。\n\n```\nSQL> set timing on\n\
    SQL> declare\n  2    l_now date := sysdate;\n  3\n  4    type t_rows is table\
    \ of hardware%rowtype;\n  5\n  6    l_rows t_rows := t_rows();\n  7  begin\n \
    \ 8   l_rows.extend(100000);\n  9   for i in 1 .. 100000 loop\n 10     l_rows(i).aisle\
    \ := i/1000;\n 11     l_rows(i).item := i;\n 12     l_rows(i).descr := to_char(i);\n\
    \ 13     l_rows(i).stocked := l_now;\n 14   end loop;\n 15\n 16   forall i in\
    \ 1 .. 100000\n 17     insert into hardware values l_rows(i);\n 18\n 19  end;\n\
    \ 20  /\n\nPL/SQL procedure successfully completed.\n\nElapsed: 00:00:00.31\n\
    ```\n\n从 4.52 秒降到了仅仅 0.31 秒！就像批量收集一样，将代码迁移到批量绑定方法来处理数据集合，能带来显著的性能提升。但这里还有其他一些不那么明显的好处。每次开始一个新的\
    \ DML 语句时，数据库都必须分配撤销结构，以确保在需要时（无论是由于错误还是显式请求）可以回滚该 DML 语句。使用批量绑定会减少 DML 调用次数，这意味着对撤销基础设施的压力更小。以下示例\
    \ (`bulk_bind_undo.sql`) 检查了会话级别的统计信息，以比较使用逐行插入与批量绑定插入时所需的撤销量：\n\n```\nSQL> set\
    \ serverout on\nSQL> declare\n  2    type t_row_list is table of hardware.descr%type\n\
    \  3       index by pls_integer;\n  4    l_rows t_row_list;\n  5\n  6    l_stat1\
    \ int;\n  7    l_stat2 int;\n  8    l_stat3 int;\n  9\n 10  begin\n 11    select\
    \ value\n 12    into   l_stat1\n 13    from   v$mystat m, v$statname s\n 14  \
    \  where  s.statistic# = m.statistic#\n 15    and    s.name = 'undo change vector\
    \ size';\n 16\n 17    for i in 1 .. 1000 loop\n 18       l_rows(i) := rpad('x',50);\n\
    \ 19       insert into hardware ( descr )  values ( l_rows(i) );\n 20    end loop;\n\
    \ 21\n 22    select value\n 23    into   l_stat2\n 24    from   v$mystat m, v$statname\
    \ s\n 25    where  s.statistic# = m.statistic#\n 26    and    s.name = 'undo change\
    \ vector size';\n 27\n 28    forall i in 1 .. l_rows.count\n 29       insert into\
    \ hardware ( descr )  values ( l_rows(i) );\n 30\n 31    select value\n 32   \
    \ into   l_stat3\n 33    from   v$mystat m, v$statname s\n 34    where  s.statistic#\
    \ = m.statistic#\n 35    and    s.name = 'undo change vector size';\n 36\n 37\
    \    dbms_output.put_line('Row at a time: '||(l_stat2-l_stat1));\n 38    dbms_output.put_line('Bulk\
    \ bind:     '||(l_stat3-l_stat2));\n 39\n 40  end;\n 41  /\nRow at a time: 64556\n\
    Bulk bind:     3296\n\nPL/SQL procedure successfully completed.\n```\n\n因此，批量绑定产生的撤销量少得多。类似地，这些撤销结构需要由重做日志条目保护，以使数据库实例可恢复。如果重复前面的示例，但收集的是\
    \ `redo size` 统计信息而非 `undo change vector size` (`bulk_bind_redo.sql`)，输出也显示重做量有所减少。\n\
    \n```\nRow at a time: 295448\nBulk bind:     69552\n\nPL/SQL procedure successfully\
    \ completed.\n```\n\n![images](img/square.jpg) **提示** 在制作用于基准测试的示例时，你需要确保隔离你的代码，以纯粹检查当前测试。当我最初执行上述基准测试时，我为正在处理的\
    \ 100,000 行中的每一行都显式引用了 `sysdate`，即：\n\n```\nfor i in 1 .. 100000 loop\n  insert\
    \ into DEMO values (i, sysdate, to_char(i));\nend loop;\n\nfor i in 1 .. 100000\
    \ loop\n   l_rows(i).x := i;\n   l_rows(i).y := sysdate;\n   l_rows(i).z := to_char(i);\n\
    ```\n\n![images](img/square.jpg) **注意** 两个测试运行得都非常慢，而且批量绑定测试的结果并没有像我预期的那样，以数量级优势超越单行测试。更仔细的实验表明，事实上，对\
    \ `sysdate` 的 100,000 次调用是测试中的主导因素。实际上，如果我在更早版本的 Oracle 上执行该测试（其中对 ‘sysdate’ 的引用会静默地发出\
    \ ‘select sysdate from dual’ 语句），那么测试结果可能表明批量绑定毫无益处。在得出结论之前，请务必仔细检查你的测试。\n"
- fmt: "#### Monitoring Memory Usage\n\nJust like bulk collect, if you have a large\
    \ number of rows that you need to bulk bind, this does not necessarily mean that\
    \ you should be pre-storing all of them in array before passing them to the database.\
    \ There are diminishing returns on performance as the number of rows you bind\
    \ goes up, at the ever increasing cost of PGA memory. You can bulk bind in batches\
    \ to ensure that you do not exhaust session memory. Here is an example (`bulk_bind_pga.sql`)\
    \ similar to that of the bulk collect memory demo demonstrating the PGA consumption\
    \ with increasing bulk bind sizes:\n\n```\nSQL> set serverout on\nSQL> declare\n\
    \  2    type t_row_list is table of hardware.descr%type;\n  3    l_rows t_row_list;\n\
    \  4\n  5    l_start_of_run timestamp;\n  6\n  7    l_pga_ceiling  number(10);\n\
    \  8\n  9    type t_bulk_sizes is table of pls_integer;\n 10    l_bulk_sizes t_bulk_sizes\
    \ := t_bulk_sizes(10,100,1000,10000,100000,1000000);\n 11\n 12    tot_rows pls_integer\
    \ := 10000000;\n 13\n 14  begin\n 15    select value\n 16    into   l_pga_ceiling\n\
    \ 17    from   v$mystat m, v$statname s\n 18    where  s.statistic# = m.statistic#\n\
    \ 19    and    s.name = 'session pga memory max';\n 20\n 21    dbms_output.put_line('Initial\
    \ PGA: '||l_pga_ceiling);\n 22\n 23    for i in 1 .. l_bulk_sizes.count\n 24 \
    \   loop\n 25\n 26      execute immediate 'truncate table hardware';\n 27\n 28\
    \      l_start_of_run := systimestamp;\n 29\n 30      l_rows := t_row_list();\n\
    \ 31      l_rows.extend(l_bulk_sizes(i));\n 32      for j in 1 .. l_bulk_sizes(i)\n\
    \ 33      loop\n 34         l_rows(j) := rpad('x',50);\n 35      end loop;\n 36\n\
    \ 37      for iter in 1 .. tot_rows / l_bulk_sizes(i) loop\n 38        forall\
    \ j in 1 .. l_bulk_sizes(i)\n 39          insert into hardware ( descr )  values\
    \ (l_rows(j));\n 40      end loop;\n 41\n 42      select value\n 43      into\
    \   l_pga_ceiling\n 44      from   v$mystat m, v$statname s\n 45      where  s.statistic#\
    \ = m.statistic#\n 46      and    s.name = 'session pga memory max';\n 47\n 48\
    \      dbms_output.put_line('Bulk size: '||l_bulk_sizes(i));\n 49      dbms_output.put_line('-\
    \ Elapsed: '||( systimestamp - l_start_of_run));\n 50      dbms_output.put_line('-\
    \ PGA Max: '||l_pga_ceiling);\n 51\n 52    end loop;\n 53\n 54  end;\n 55  /\n\
    Initial PGA: 3470120\nBulk size: 10\n- Elapsed: +000000000 00:00:53.478000000\n\
    - PGA Max: 4042888\nBulk size: 100\n- Elapsed: +000000000 00:00:14.760000000\n\
    - PGA Max: 4042888\nBulk size: 1000\n- Elapsed: +000000000 00:00:10.588000000\n\
    - PGA Max: 4042888\nBulk size: 10000\n- Elapsed: +000000000 00:00:11.872000000\n\
    - PGA Max: 4108424\nBulk size: 100000\n- Elapsed: +000000000 00:00:16.431000000\n\
    - PGA Max: 12890248\nBulk size: 1000000\n- Elapsed: +000000000 00:00:17.507000000\n\
    - PGA Max: 99266696\n\nPL/SQL procedure successfully completed.\n```\n\nSimilar\
    \ to bulk collect, once you are binding above 1,000 rows per array, the benefits\
    \ are negligible and the increase in memory consumption will certainly become\
    \ a scalability threat if your application consists of hundreds or thousands of\
    \ sessions all consuming large amounts of memory on the server. In this example,\
    \ performance actually got worse as the bulk bind sizes got larger than 1,000.\n\
    \n#### Improvements in 11g\n\nThe sample code in this chapter has been written\
    \ assuming version 11 of the database. If you are running the bulk bind samples\
    \ on an earlier version, then you may see an error like this:\n\n```\nSQL> create\
    \ table DEMO ( x int, y int);\n\nTable created.\n\nSQL> declare\n  2    type t_rows\
    \ is\n  3      table of demo%rowtype\n  4      index by pls_integer;\n  5    l_rows\
    \ t_rows;\n  6  begin\n  7    l_rows(1).x := 1;\n  8    l_rows(1).y := 1;\n  9\n\
    \ 10    l_rows(2).x := 2;\n 11    l_rows(2).y := 2;\n 12\n 13    forall i in 1\
    \ .. l_rows.count\n 14       insert into DEMO\n 15       values ( l_rows(i).x,\
    \ l_rows(i).y );\n 16  end;\n 17  /\n\nPL/SQL procedure successfully completed.\n\
    \n values ( l_rows(i).x, l_rows(i).y );\n              *\nERROR at line 15:\n\
    PLS-00436: implementation restriction: cannot reference\n              fields\
    \ of BULK In-BIND table of records\n```\n\nIn versions of Oracle prior to 11g,\
    \ bulk bind operations were not able to access the individual elements of a record\
    \ or object type within an associative array. However, all is not lost—it just\
    \ takes a little more coding. You can still bulk bind arrays of simple datatypes,\
    \ thus you can use an associative array for `each` attribute that you need to\
    \ bulk bind. The previous example can be recast into a version that will work\
    \ on earlier versions of Oracle.\n\n```\nSQL>  declare\n  2    type t_x_list is\
    \ table of demo.x%type\n  3      index by pls_integer;\n  4\n  5    type t_y_list\
    \ is table of demo.y%type\n  6      index by pls_integer;\n  7\n  8    l_x_rows\
    \ t_x_list;\n  9    l_y_rows t_y_list;\n 10  begin\n 11    l_x_rows(1) := 1;\n\
    \ 12    l_x_rows(2) := 2;\n 13\n 14    l_y_rows(1) := 1;\n 15    l_y_rows(2) :=\
    \ 2;\n 16\n 17    forall i in 1 .. l_x_rows.count\n 18       insert into DEMO\n\
    \ 19       values ( l_x_rows(i), l_y_rows(i) );\n 20  end;\n 21  /\n\nPL/SQL procedure\
    \ successfully completed.\n```\n\n![images](images/square.jpg) Tip: For other\
    \ techniques to avoid this restriction on earlier versions of Oracle, see `www.oracle-developer.net/display.php?id=410`"
