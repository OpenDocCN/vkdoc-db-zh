    \  0                      0\nDistr Msgs Recv'd              0                \
    \      0\n\n11 rows selected\n```\n\nTrying to force it to run in parallel doesn't\
    \ work, as you can see:"
  raw: '#### Pipelined Table Functions


    A pipelined table function enables you to use PL/SQL to generate data in a programmatic
    fashion, specifying what you want in each row and enabling the database to select
    from your function just like any other table. You do this by declaring the structure
    of your record using a database object type or a PL/SQL record type, and then
    creating a collection type that describes a “table” of your records


    For your MapReduce example, you''ll define a key/value pair record and then a
    collection type that describes a list of such records, like so:


    `create or replace package map_reduce_type as`

    `  type key_value_pair is record (`

    `    key_item    varchar2(32),`

    `    value_item  number`

    `  );`

    `  type key_value_pairs is table of key_value_pair;`

    `end map_reduce_type;`

    `/`


    The particular problem you''re going to try to solve using your parallel pipelined
    functions will be to count the occurrences of letters in a list of strings. For
    your list of strings, you''ll use the over 100,000 column names within a standard
    installation of the Oracle database; from that list you''ll try to determine which
    letter is the most popular.


    In a MapReduce model, you''d begin by breaking down each string into its component
    letters, and “emitting” a list of letters in each string with a count of 1 (your
    Map function). Once you have the letters mapped, you''ll hand them to a Reduce
    function to count them up. Let''s dive into the example and see how this works:


    Start by declaring your Map function, indicating that it will return a list of
    key/value pairs using a pipelined function. Your function will take one input
    parameter: a string to break up into its individual letters. Here''s the code:


    `create or replace package map_letter_count as`

    `  function result_set (p_input in varchar2)`

    `    return map_reduce_type.key_value_pairs pipelined;`

    `end map_letter_count;`

    `/`


    Your function simply takes the input string, goes through it character by character
    and “pipes” the output as a row for each letter with a value of one, like so:


    `create or replace package body map_letter_count as`


    `  function result_set (p_input in varchar2)`

    `    return map_reduce_type.key_value_pairs pipelined is`


    `    l_key_value_pair map_reduce_type.key_value_pair;`


    `    begin`


    `      for i in 1..length(p_input) loop`


    `        l_key_value_pair.key_item := substr(p_input,i,1);`

    `        l_key_value_pair.value_item := 1;`


    `        pipe row(l_key_value_pair);`


    `      end loop;`


    `      return;`


    `    end result_set;`


    `end map_letter_count;`

    `/`


    Now you can retrieve the results from this function by using it in a SELECT statement
    and casting it as a table.


    `select * from table(`

    `map_letter_count.result_set(''Hello, world!'')`

    `);`


    `KEY_ITEM                         VALUE_ITEM`

    `-------------------------------- ----------------------`

    `H                                1`

    `e                                1`

    `l                                1`

    `l                                1`

    `o                                1`

    `,                                1`

    `                                 1`

    `w                                1`

    `o                                1`

    `r                                1`

    `l                                1`

    `d                                1`

    `!                                1`


    `13 rows selected`


    So far you''ve seen how to use a pipelined function to take an input parameter
    and turn it into a list of MapReduce key/value pairs using the “pipe row” construct.
    This is nice, but right now your function is limited to a single string. Let''s
    see how to extend it to handle a large set of strings.


    To do that, you can modify your Map function to take as input a list of strings
    or documents in the form of a data cursor, like so:


    `create or replace package map_letter_count as`

    `  function result_set (p_documents in sys_refcursor)`

    `    return map_reduce_type.key_value_pairs pipelined;`

    `end map_letter_count;`

    `/`


    To set up your list of strings, create a documents table based on DBA_TAB_COLUMNS;
    to keep your testing manageable, limit it to 10 rows.


    `create table documents`

    `as`

    `select rownum doc_id, column_name text`

    `from dba_tab_columns`

    `where rownum <= 10;`


    Now your Map function will go through each document in turn to perform its mapping
    function.


    `create or replace package body map_letter_count as`


    `  function result_set (p_documents in sys_refcursor)`

    `    return map_reduce_type.key_value_pairs pipelined is`


    `    type document_type is record (`

    `      doc_id number,`

    `      text   varchar2(4000)`

    `    );`

    `    l_document       document_type;`

    `    l_key_value_pair map_reduce_type.key_value_pair;`


    `    begin`


    `      fetch p_documents into l_document;`

    `      loop`

    `        exit when p_documents%notfound;`


    `        for i in 1..length(l_document.text) loop`


    `           l_key_value_pair.key_item := substr(l_document.text,i,1);`

    `           l_key_value_pair.value_item := 1;`


    `           pipe row(l_key_value_pair);`


    `        end loop;`


    `        fetch p_documents into l_document;`


    `      end loop;`


    `      return;`


    `    end result_set;`


    `end map_letter_count;`

    `/`


    Now selecting from your Map function returns the mapped keys and values for all
    of the documents in the table.


    `select * from table(`

    `map_letter_count.result_set(`

    `cursor(select doc_id, text from documents)`

    `)`

    `);`

    `KEY_ITEM                         VALUE_ITEM`

    `-------------------------------- ----------------------`

    `D                                1`

    `_                                1`

    `O                                1`

    `B                                1`

    `J                                1`

    `#                                1`

    `O                                1`

    `R                                1`

    `D                                1`

    `E                                1`

    `R                                1`

    `#                                1`

    `C                                1`

    `…snip…`

    `O                                1`

    `L                                1`

    `U                                1`

    `D                                1`

    `P                                1`

    `R                                1`

    `I                                1`

    `O                                1`

    `R                                1`

    `I                                1`

    `T                                1`

    `Y                                1`

    `S                                1`

    `T                                1`

    `A                                1`

    `T                                1`

    `E                                1`


    `63 rows selected`


    Running this against the entire data set produces over 1 million rows.


    `drop table documents;`

    `create table documents`

    `as`

    `select rownum doc_id, column_name text from dba_tab_columns;`


    `select count(*)`

    `from`

    `(`

    `select * from table(`

    `map_letter_count.result_set(`

    `cursor(select doc_id, text from documents)`

    `)`

    `)`

    `);`


    `COUNT(*)`

    `----------------------`

    `1132707`


    However, this entire process has been run serially.


    `select * from v$pq_sesstat;`


    `STATISTIC                      LAST_QUERY             SESSION_TOTAL`

    `------------------------------ ---------------------- ----------------------`

    `Queries Parallelized           0                      0`

    `DML Parallelized               0                      0`

    `DDL Parallelized               0                      0`

    `DFO Trees                      0                      0`

    `Server Threads                 0                      0`

    `Allocation Height              0                      0`

    `Allocation Width               0                      0`

    `Local Msgs Sent                0                      0`

    `Distr Msgs Sent                0                      0`

    `Local Msgs Recv''d              0                      0`

    `Distr Msgs Recv''d              0                      0`


    `11 rows selected`


    Trying to force it to run in parallel doesn''t work, as you can see:'
  trans: "\n## 管道化表函数\n\n管道化表函数使你能够使用 `PL/SQL` 以编程方式生成数据，指定你希望在每一行中获得的内容，并使数据库能够像查询任何其他表一样从你的函数中进行选择。你是通过使用数据库对象类型或\
    \ `PL/SQL` 记录类型来声明记录的结构，然后创建一个描述该记录“表”的集合类型来实现这一点的。\n\n对于你的 `MapReduce` 示例，你将定义一个键/值对记录，然后定义一个描述此类记录列表的集合类型，如下所示：\n\
    \n```sql\ncreate or replace package map_reduce_type as\n  type key_value_pair\
    \ is record (\n    key_item    varchar2(32),\n    value_item  number\n  );\n \
    \ type key_value_pairs is table of key_value_pair;\nend map_reduce_type;\n/\n\
    ```\n\n你将尝试使用并行管道化函数解决的具体问题是统计字符串列表中字母的出现次数。对于你的字符串列表，你将使用标准 Oracle 数据库安装中的超过\
    \ 100,000 个列名；从该列表中，你将尝试确定哪个字母是最常见的。\n\n在 `MapReduce` 模型中，你将首先将每个字符串分解为其组成字母，并“发出”每个字符串中的字母列表，每个字母的计数为\
    \ 1（你的 `Map` 函数）。一旦你完成了字母的映射，你将把它们交给一个 `Reduce` 函数进行计数。让我们深入这个例子，看看它是如何工作的：\n\n\
    首先声明你的 `Map` 函数，表明它将使用管道化函数返回一个键/值对列表。你的函数将接受一个输入参数：一个要分解成单个字母的字符串。代码如下：\n\n```sql\n\
    create or replace package map_letter_count as\n  function result_set (p_input\
    \ in varchar2)\n    return map_reduce_type.key_value_pairs pipelined;\nend map_letter_count;\n\
    /\n```\n\n你的函数简单地接收输入字符串，逐个字符遍历它，并为每个字母“管道传输”一个值为 1 的行作为输出，像这样：\n\n```sql\ncreate\
    \ or replace package body map_letter_count as\n\n  function result_set (p_input\
    \ in varchar2)\n    return map_reduce_type.key_value_pairs pipelined is\n\n  \
    \  l_key_value_pair map_reduce_type.key_value_pair;\n\n    begin\n\n      for\
    \ i in 1..length(p_input) loop\n\n        l_key_value_pair.key_item := substr(p_input,i,1);\n\
    \        l_key_value_pair.value_item := 1;\n\n        pipe row(l_key_value_pair);\n\
    \n      end loop;\n\n      return;\n\n    end result_set;\n\nend map_letter_count;\n\
    /\n```\n\n现在，你可以通过在 `SELECT` 语句中使用此函数并将其转换为表来检索结果。\n\n```sql\nselect * from table(\n\
    map_letter_count.result_set('Hello, world!')\n);\n```\n\n```\nKEY_ITEM       \
    \              VALUE_ITEM\n---------------------------- ----------------------\n\
    H                            1\ne                            1\nl            \
    \                1\nl                            1\no                        \
    \    1\n,                            1\n                             1\nw    \
    \                        1\no                            1\nr                \
    \            1\nl                            1\nd                            1\n\
    !                            1\n\n13 rows selected\n```\n\n到目前为止，你已经看到了如何使用管道化函数接收输入参数，并使用\
    \ `pipe row` 构造将其转换为 `MapReduce` 键/值对列表。这很好，但目前你的函数仅限于处理单个字符串。让我们看看如何扩展它以处理大量的字符串集合。\n\
    \n为此，你可以修改你的 `Map` 函数，使其以数据游标的形式接受字符串或文档列表作为输入，如下所示：\n\n```sql\ncreate or replace\
    \ package map_letter_count as\n  function result_set (p_documents in sys_refcursor)\n\
    \    return map_reduce_type.key_value_pairs pipelined;\nend map_letter_count;\n\
    /\n```\n\n要设置你的字符串列表，基于 `DBA_TAB_COLUMNS` 创建一个 `documents` 表；为了使你的测试易于管理，将其限制为\
    \ 10 行。\n\n```sql\ncreate table documents\nas\nselect rownum doc_id, column_name\
    \ text\nfrom dba_tab_columns\nwhere rownum <= 10;\n```\n\n现在你的 `Map` 函数将依次遍历每个文档以执行其映射函数。\n\
    \n```sql\ncreate or replace package body map_letter_count as\n\n  function result_set\
    \ (p_documents in sys_refcursor)\n    return map_reduce_type.key_value_pairs pipelined\
    \ is\n\n    type document_type is record (\n      doc_id number,\n      text \
    \  varchar2(4000)\n    );\n    l_document       document_type;\n    l_key_value_pair\
    \ map_reduce_type.key_value_pair;\n\n    begin\n\n      fetch p_documents into\
    \ l_document;\n      loop\n        exit when p_documents%notfound;\n\n       \
    \ for i in 1..length(l_document.text) loop\n\n           l_key_value_pair.key_item\
    \ := substr(l_document.text,i,1);\n           l_key_value_pair.value_item := 1;\n\
    \n           pipe row(l_key_value_pair);\n\n        end loop;\n\n        fetch\
    \ p_documents into l_document;\n\n      end loop;\n\n      return;\n\n    end\
    \ result_set;\n\nend map_letter_count;\n/\n```\n\n现在从你的 `Map` 函数中进行选择，会返回表中所有文档的映射键和值。\n\
    \n```sql\nselect * from table(\nmap_letter_count.result_set(\ncursor(select doc_id,\
    \ text from documents)\n)\n);\n```\n\n```\nKEY_ITEM                     VALUE_ITEM\n\
    ---------------------------- ----------------------\nD                       \
    \     1\n_                            1\nO                            1\nB   \
    \                         1\nJ                            1\n#               \
    \             1\nO                            1\nR                           \
    \ 1\nD                            1\nE                            1\nR       \
    \                     1\n#                            1\nC                   \
    \         1\n…snip…\nO                            1\nL                       \
    \     1\nU                            1\nD                            1\nP   \
    \                         1\nR                            1\nI               \
    \             1\nO                            1\nR                           \
    \ 1\nI                            1\nT                            1\nY       \
    \                     1\nS                            1\nT                   \
    \         1\nA                            1\nT                            1\n\
    E                            1\n\n63 rows selected\n```\n\n针对整个数据集运行此操作会产生超过 100\
    \ 万行。\n\n```sql\ndrop table documents;\ncreate table documents\nas\nselect rownum\
    \ doc_id, column_name text from dba_tab_columns;\n\nselect count(*)\nfrom\n(\n\
    select * from table(\nmap_letter_count.result_set(\ncursor(select doc_id, text\
    \ from documents)\n)\n)\n);\n```\n\n```\nCOUNT(*)\n----------------------\n1132707\n\
    ```\n\n然而，这整个过程是以串行方式运行的。\n\n```sql\nselect * from v$pq_sesstat;\n```\n\n```\n\
    STATISTIC                      LAST_QUERY             SESSION_TOTAL\n------------------------------\
    \ ---------------------- ----------------------\nQueries Parallelized        \
    \   0                      0\nDML Parallelized               0               \
    \       0\nDDL Parallelized               0                      0\nDFO Trees\
    \                      0                      0\nServer Threads              \
    \   0                      0\nAllocation Height              0               \
