    \ Sent                0                      0\nDistr Msgs Sent              \
    \  0                      0\nLocal Msgs Recv'd              0                \
    \      0\nDistr Msgs Recv'd              0                      0\n\n11 rows selected\n\
    ```\n\n试图强制它并行运行并不奏效，正如你所看到的：\n"
