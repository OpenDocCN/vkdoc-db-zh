  trans: '#### 作为基于 PL/SQL 的应用服务器的数据库的局限性


    如果你只有一把锤子，那么所有问题看起来都像钉子。而作为软件工程师，另一方面，你应该意识到架构蓝图的适用范围限制。所描述的数据库解决方案中使用`PL/SQL`的业务逻辑，非常适用于以数据为中心的`ERP`应用程序。然而，它不太适用于计算密集且数据交互需求少的应用程序。


    此外，对于以下任务，`PL/SQL`并非我的首选：


    *   `CPU`密集型任务：`PL/SQL`的算法性能低于`C`和`Java`。此外，`Oracle`许可证费用也适用于`PL/SQL`。商业应用服务器中的`Java`会产生类似的许可证费用，而运行`C`或独立的`Java`程序则不需要运行时许可证。在`Avaloq
    Banking System`中，`CPU`使用率中不到 50%是`PL/SQL`；其余的是`SQL`。

    *   使用内存中非常大的集合的程序：`PL/SQL`集合可能比其`C`语言对应物需要显著更多的内存。我将在本章后面深入探讨内存使用问题。

    *   非常复杂的数据结构：`PL/SQL`集合和记录对于大多数任务来说已经足够。然而，其他语言（具有泛型类型、内存引用和自动垃圾回收的语言）可以更轻松地表达这些结构。


    ![images](img/square.jpg) 注意：供应商无关性有时被引用为反对专有存储过程语言的理由。这个论点是无效的，因为大多数应用程序从未被移植到其他数据库，而且在不同数据库上实现良好性能和正确的并发处理需要多个特定的实现，而不是一个通用的实现。Tom
    Kyte 在*Expert Oracle Database Architectures* (Apress, 2005)一书中详细论证了这一点。我完全支持他在这本书中关于这个主题的每句话（而且我的薪水不是来自`Oracle`）。如果你不喜欢某个特定的数据库供应商，那是另一回事。但你应该充分利用你选择的数据库。


    #### 软性因素


    尽管`Java`可能比`PL/SQL`更有吸引力，但我发现，招聘`PL/SQL`程序员并不比招聘`Java`程序员更难（而且不幸的是，也不更容易）。学习曲线没有太大不同。`PL/SQL`很容易学习。大的挑战，尤其是对新毕业生来说，在于理解业务需求、学习大规模编程、掌握特定于应用程序的框架和模式，以及编写高效的`SQL`。


    如果业务逻辑是用`Java`编写的，`SQL`也是一个问题。当然，简单的`SQL`语句可以由对象关系映射器生成。但是，遵循一些简单模式的`SQL`语句在`PL/SQL`中也不是问题——问题在于那些必须手动编码以获得最佳性能的复杂语句。


    对于一个拥有数百万行应用程序的公司来说，让新员工轻松上手是成功的大规模编程的主要要求之一。


    ### 大规模编程的要求


    既然已经确立了在数据库中处理业务逻辑的理由，让我们看看如何最好地掌握你将要编写的所有`PL/SQL`。大规模编程可能涉及由更庞大的人群进行编程，或者由较小的群体在更长的时间段内进行编程。通常，维护软件解决方案的人员会发生变化。一个典型的例子是，`Oracle
    6`中`PL/SQL`的创建者现在没有一个人还在`PL/SQL`小组工作。因为软件生命周期成本的三分之二以上通常用于维护，所以维护效率是一个关键要求。


    大规模编程需要一种方法，能够在软件的初始创建和未来维护期间，及时、在预算内、并以外部产品质量交付给用户。忽略与架构和编程语言在很大程度上独立的过程方面，你需要高水平的内部产品质量来实现外部目标。内部产品质量的主要因素是简单性、易于理解性、可扩展性和可重用性。业务逻辑位于数据库中的架构是实现简单性的基石。其他目标则通过命名和编码约定、模块化和面向对象编程来实现。这些方面的实现方式因编程语言而异。在本章中，我将解释如何在`PL/SQL`中实现这些方面。由于篇幅限制，我将省略大规模编程的其他相关方面，例如工具，以及通常与之相关的处理海量数据的方法，例如信息生命周期管理以及为性能和可扩展性而进行的设计。


    成功的大规模编程需要成功的小规模编程。如果别人五年前编写的代码崩溃了，如果他遵循了适当的异常处理和错误日志记录实践（为了简洁，我在本章中省略了这些内容），你会感到庆幸。同样，如果你修改的代码包含单元测试或以断言形式存在的契约，你也会很高兴，这样你就知道在更改子程序以修复
    bug 时，不太可能破坏其 200 个调用者中的任何一个。任何类型的编程都需要逻辑思维和一丝不苟的严谨性。'
- fmt: "### Uniformity through Conventions\n\nUniformity is a necessity for programming\
    \ in the large because it allows developers to understand each other’s code quickly\
    \ and thoroughly. For example, if the primary key column of every table is called\
    \ `id` and every reference to it is `<table>_id`, anybody who comes across a `foo_id`\
    \ knows immediately that it references `foo.id`. Uniformity also ensures that\
    \ developers don't constantly reformat someone else’s code and thereby waste time,\
    \ introduce regressions, and create diffs in which it is hard to distinguish the\
    \ semantic changes from the cosmetic changes.\n\nUniformity can be achieved through\
    \ conventions. In most cases, no conventions are better or worse than others;\
    \ their sole value lies in providing the foundation for uniformity. For example,\
    \ driving on the right-hand side of the road is as good as driving on the left-hand\
    \ side. The choice is arbitrary. But every country must adopt one of the two conventions\
    \ to avoid chaos. Likewise, there is no advantage in using trailing commas rather\
    \ than leading commas to separate parameters. However, mixing the two in a single\
    \ program impedes readability.\n\nUnfortunately, there are no standard naming\
    \ and formatting conventions for PL/SQL as there are for Java. [Chapter 14](#Chapter14.html#ch14)\
    \ provides a set of coding conventions and Steven Feuerstein has three sets of\
    \ PL/SQL coding conventions at `http://bit.ly/8WPRiy`. Whether you adopt one of\
    \ the aforementioned conventions or make up your own is unimportant as long as\
    \ you have a convention to which everybody in your organization adheres.\n\nThere\
    \ are three ways to guarantee adherence to a convention. The best is to use an\
    \ IDE that automatically establishes the convention either as you type or upon\
    \ selecting auto format. Whatever cannot be handled in this manner must be enforced—ideally,\
    \ through automatic tools rather than reliance on manual reviews. The last option\
    \ to guarantee adherence is hope, which might work with a small project but not\
    \ when programming in the large.\n\nSometimes large applications contain sources\
    \ that, for historical reasons, adhere to different conventions. In this case,\
    \ you must decide whether it is worth the effort to make all sources comply with\
    \ one standard; if you want to keep multiple standards for different, clearly\
    \ separated parts of the application; or if all new sources should adhere to a\
    \ single standard. In any case, every source must consistently follow a single\
    \ convention. If the chosen approach is to move to a single convention, complete\
    \ sources must be adapted at once. Syntactic adaptations to adhere to a different\
    \ convention must not be mixed with semantic changes, such as bug fixes, in a\
    \ single repository check in. Otherwise, code auditing becomes very difficult.\n\
    \nThe rationale behind a convention can be rendered obsolete by a new Oracle release\
    \ or other changes. For example, before Oracle 10g, the PL/SQL compiler accepted\
    \ different default values for input parameters in the package specification and\
    \ body and just used the values provided in the package specification. To avoid\
    \ wrong assumptions, the Avaloq convention was not to specify any default values\
    \ for exported subprograms in the package body. Starting in 10g, the compiler\
    \ checks that the default values are the same if listed in both the specification\
    \ and the body. Thus, you can duplicate the default values without risk so that\
    \ the developer doesn't have to open the specification when working in the body.\
    \ The moral of the story is that you should periodically check the rationale behind\
    \ every convention, especially if the convention also has disadvantages.\n\nFor\
    \ most aspects regulated by conventions, it doesn't matter what the convention\
    \ says because the sole benefit of the convention is the resulting uniformity.\
    \ There are, however, aspects for which good reasons exist to go one way rather\
    \ than another. For example, if your IDE supports only auto-formatting with leading\
    \ commas, it doesn't make sense if your convention prescribes trailing commas.\
    \ I present here selected aspects specific to PL/SQL for which there is a strong\
    \ rationale to follow a particular practice.\n\n#### Abbreviations\n\nIdentifiers\
    \ in SQL and PL/SQL can be only 30 bytes long. To make a descriptive name fit\
    \ these requirements, you need to omit unnecessary words (such as “get”) and abbreviate\
    \ long words. You can achieve consistency in abbreviations by maintaining a list\
    \ of abbreviations and checking all names against that list. You must also add\
    \ to that list those words which you specifically choose never to abbreviate.\
    \ You can even add a synonym list against which you check new entries to avoid\
    \ multiple entries for the same concept.\n\nTo check consistent abbreviation usage,\
    \ all identifiers must be split into their parts and checked against the abbreviation\
    \ registry. The identifiers to be checked can be found in the Oracle data dictionary,\
    \ in views such as `user_objects` and `user_tab_columns`. From Oracle 11g onward,\
    \ all identifiers used in PL/SQL programs are stored in `user_identifiers` if\
    \ the unit is compiled with `plscope_settings=\"identifiers:all\"`. You may want\
    \ to enable this new feature called PL/Scope at the system level by issuing `SQL>\
    \ alter system set plscope_settings=\"identifiers:all\";` and recompiling all\
    \ user PL/SQL units. The view `user_plsql_object_settings` shows for which objects\
    \ this setting is in effect.\n\nBecause lower-case and mixed-case identifiers\
    \ require double quotes in SQL and PL/SQL, they are not used. Instead, identifier\
    \ parts are usually separated by an underscore.\n\nThe following code listing\
    \ shows a simplified version of an abbreviation checker. The table `abbr_reg`\
    \ holds the registered abbreviations. The package `abbr_reg#` provides a procedure\
    \ `ins_abbr` to insert a new abbreviation and `chk_abbr` to check whether only\
    \ registered abbreviations are used as identifier parts. You can populate the\
    \ registry with calls such as `abbr_reg#.ins_abbr('abbr', 'abbreviation')` and\
    \ check consistent usage with `abbr_reg#.chk_abbr`.\n\n```sql\ncreate table abbr_reg(\n\
    \  abbr                    varchar2(30)  primary key  -- Abbreviation, e.g., ABBR\n\
    \ ,text                    varchar2(100) not null     -- Abbreviated text, e.g.,\
    \ ABBREVIATION\n ,descn                   varchar2(400)              -- Description,\
    \ explain concept\n) organization index;\n\ncreate unique index abbr_reg#u#1 on\
    \ abbr_reg(text);\n\ncreate or replace package abbr_reg#\nis\n  ------------------------------------------------------------------------------\n\
    \  -- Registry of abbreviations for SQL and PL/SQL identifier parts, such as\n\
    \  -- ABBR for ABBREVIATION and REG for REGISTRY. All identifiers must be made\
    \ up\n  -- of registered abbreviations separated by underscores, e.g. abbr_reg.\n\
    \  -- Contains also terms not to be abbreviated.\n  ------------------------------------------------------------------------------\n\
    \n  ------------------------------------------------------------------------------\n\
    \  -- Insert an abbreviation into the registry.\n  ------------------------------------------------------------------------------\n\
    \  procedure ins_abbr(\n    i_abbr                    varchar2\n   ,i_text   \
    \                 varchar2\n   ,i_descn                   varchar2 := null\n \
    \ );\n\n  ------------------------------------------------------------------------------\n\
    \  -- Check whether only registered abbreviations are used as identifier parts.\n\
    \  ------------------------------------------------------------------------------\n\
    \  procedure chk_abbr;\nend abbr_reg#;\n\ncreate or replace package body abbr_reg#\n\
    is\n  procedure ins_abbr(\n    i_abbr                    varchar2\n   ,i_text\
    \                    varchar2\n   ,i_descn                   varchar2\n  )\n \
    \ is\n  begin\n    insert into abbr_reg(abbr, text, descn)\n    values(upper(trim(i_abbr)),\
    \ upper(trim(i_text)), i_descn);\n  end ins_abbr;\n```"
  raw: '### Uniformity through Conventions


    Uniformity is a necessity for programming in the large because it allows developers
    to understand each other’s code quickly and thoroughly. For example, if the primary
    key column of every table is called id and every reference to it is <table>_id,
    anybody who comes across a foo_id knows immediately that it references foo.id.
    Uniformity also ensures that developers don''t constantly reformat someone else’s
    code and thereby waste time, introduce regressions, and create diffs in which
    it is hard to distinguish the semantic changes from the cosmetic changes.


    Uniformity can be achieved through conventions. In most cases, no conventions
    are better or worse than others; their sole value lies in providing the foundation
    for uniformity. For example, driving on the right-hand side of the road is as
    good as driving on the left-hand side. The choice is arbitrary. But every country
    must adopt one of the two conventions to avoid chaos. Likewise, there is no advantage
    in using trailing commas rather than leading commas to separate parameters. However,
    mixing the two in a single program impedes readability.


    Unfortunately, there are no standard naming and formatting conventions for PL/SQL
    as there are for Java. [Chapter 14](#Chapter14.html#ch14) provides a set of coding
    conventions and Steven Feuerstein has three sets of PL/SQL coding conventions
    at `http://bit.ly/8WPRiy`. Whether you adopt one of the aforementioned conventions
    or make up your own is unimportant as long as you have a convention to which everybody
    in your organization adheres.


    There are three ways to guarantee adherence to a convention. The best is to use
    an IDE that automatically establishes the convention either as you type or upon
    selecting auto format. Whatever cannot be handled in this manner must be enforced—ideally,
    through automatic tools rather than reliance on manual reviews. The last option
    to guarantee adherence is hope, which might work with a small project but not
    when programming in the large.


    Sometimes large applications contain sources that, for historical reasons, adhere
    to different conventions. In this case, you must decide whether it is worth the
    effort to make all sources comply with one standard; if you want to keep multiple
    standards for different, clearly separated parts of the application; or if all
    new sources should adhere to a single standard. In any case, every source must
    consistently follow a single convention. If the chosen approach is to move to
    a single convention, complete sources must be adapted at once. Syntactic adaptations
    to adhere to a different convention must not be mixed with semantic changes, such
    as bug fixes, in a single repository check in. Otherwise, code auditing becomes
    very difficult.


    The rationale behind a convention can be rendered obsolete by a new Oracle release
    or other changes. For example, before Oracle 10g, the PL/SQL compiler accepted
    different default values for input parameters in the package specification and
    body and just used the values provided in the package specification. To avoid
    wrong assumptions, the Avaloq convention was not to specify any default values
    for exported subprograms in the package body. Starting in 10g, the compiler checks
    that the default values are the same if listed in both the specification and the
    body. Thus, you can duplicate the default values without risk so that the developer
    doesn''t have to open the specification when working in the body. The moral of
    the story is that you should periodically check the rationale behind every convention,
    especially if the convention also has disadvantages.


    For most aspects regulated by conventions, it doesn''t matter what the convention
    says because the sole benefit of the convention is the resulting uniformity. There
    are, however, aspects for which good reasons exist to go one way rather than another.
    For example, if your IDE supports only auto-formatting with leading commas, it
    doesn''t make sense if your convention prescribes trailing commas. I present here
    selected aspects specific to PL/SQL for which there is a strong rationale to follow
    a particular practice.


    #### Abbreviations


    Identifiers in SQL and PL/SQL can be only 30 bytes long. To make a descriptive
    name fit these requirements, you need to omit unnecessary words (such as “get”)
    and abbreviate long words. You can achieve consistency in abbreviations by maintaining
    a list of abbreviations and checking all names against that list. You must also
    add to that list those words which you specifically choose never to abbreviate.
    You can even add a synonym list against which you check new entries to avoid multiple
    entries for the same concept.


    To check consistent abbreviation usage, all identifiers must be split into their
    parts and checked against the abbreviation registry. The identifiers to be checked
    can be found in the Oracle data dictionary, in views such as user_objects and
    user_tab_columns. From Oracle 11g onward, all identifiers used in PL/SQL programs
    are stored in user_identifiers if the unit is compiled with `plscope_settings="identifiers:all"`.
    You may want to enable this new feature called PL/Scope at the system level by
    issuing


    `SQL> alter system set plscope_settings="identifiers:all";`


    and recompiling all user PL/SQL units. The view user_plsql_object_settings shows
    for which objects this setting is in effect.


    Because lower-case and mixed-case identifiers require double quotes in SQL and
    PL/SQL, they are not used. Instead, identifier parts are usually separated by
    an underscore.


    The following code listing shows a simplified version of an abbreviation checker.
    The table abbr_reg holds the registered abbreviations. The package abbr_reg# provides
    a procedure ins_abbr to insert a new abbreviation and chk_abbr to check whether
    only registered abbreviations are used as identifier parts. You can populate the
    registry with calls such as abbr_reg#.ins_abbr(''abbr'', ''abbreviation'') and
    check consistent usage with abbr_reg#.chk_abbr.


    `create table abbr_reg(`

    `  abbr                    varchar2(30)  primary key  -- Abbreviation, e.g., ABBR`

    ` ,text                    varchar2(100) not null     -- Abbreviated text, e.g.,
    ABBREVIATION`

    ` ,descn                   varchar2(400)              -- Description, explain
    concept`

    `) organization index;`

    `create unique index abbr_reg#u#1 on abbr_reg(text);`


    `create or replace package abbr_reg#`

    `is`

    `  ------------------------------------------------------------------------------`

    `  -- Registry of abbreviations for SQL and PL/SQL identifier parts, such as`

    `  -- ABBR for ABBREVIATION and REG for REGISTRY. All identifiers must be made
    up`

    `  -- of registered abbreviations separated by underscores, e.g. abbr_reg.`

    `  -- Contains also terms not to be abbreviated.`

    `  ------------------------------------------------------------------------------`


    `  ------------------------------------------------------------------------------`

    `  -- Insert an abbreviation into the registry.`

    `  ------------------------------------------------------------------------------`

    `  procedure ins_abbr(`

    `    i_abbr                    varchar2`

    `   ,i_text                    varchar2`

    `   ,i_descn                   varchar2 := null`

    `  );`


    `  ------------------------------------------------------------------------------`

    `  -- Check whether only registered abbreviations are used as identifier parts.`

    `  ------------------------------------------------------------------------------`

    `  procedure chk_abbr;`

    `end abbr_reg#;`


    `create or replace package body abbr_reg#`

    `is`

    `  procedure ins_abbr(`

    `    i_abbr                    varchar2`

    `   ,i_text                    varchar2`

    `   ,i_descn                   varchar2`

    `  )`

    `  is`

    `  begin`

    `    insert into abbr_reg(abbr, text, descn)`

    `    values(upper(trim(i_abbr)), upper(trim(i_text)), i_descn);`

    `  end ins_abbr;`'
  trans: "\n### 通过约定实现统一性\n\n统一性是大型编程所必需的，因为它能让开发者快速且彻底地理解彼此的代码。例如，如果每张表的主键列都称为 `id`，且所有对它的引用格式都是\
    \ `<table>_id`，那么任何人看到 `foo_id` 就能立即明白它引用的是 `foo.id`。统一性也确保开发者不会频繁地重新格式化他人的代码，从而避免浪费时间、引入回归问题，以及在代码差异中难以区分语义变更和格式变更。\n\
    \n统一性可以通过约定来实现。在大多数情况下，没有哪种约定天生优于其他约定；它们的唯一价值在于为统一性提供基础。例如，靠右行驶和靠左行驶同样合理，选择是任意的。但每个国家都必须采用其中一种约定以避免混乱。同理，使用尾逗号还是首逗号来分隔参数并无优劣之分，但在同一个程序中混合使用两者会损害可读性。\n\
    \n不幸的是，对于 PL/SQL，并没有像 Java 那样标准的命名和格式约定。第 14 章 提供了一套编码约定，Steven Feuerstein 在 `http://bit.ly/8WPRiy`\
    \ 提供了三套 PL/SQL 编码约定。无论你采用前述约定之一还是自创一套，这都不重要，只要你的组织内每个人遵循同一套约定即可。\n\n有三种方法可以保证对约定的遵守。最佳方法是使用一个\
    \ IDE，在你键入时或选择自动格式化时自动建立约定。任何无法通过此方式处理的情况都必须强制执行——理想情况下，通过自动化工具而非依赖人工审查。保证遵守的最后一个选项是希望，这在小项目中可能有效，但在大型编程中则行不通。\n\
    \n有时大型应用程序包含因历史原因遵循不同约定的源代码。在这种情况下，你必须决定是否值得努力使所有源代码符合一个标准；或者你是否希望为应用程序不同且清晰分隔的部分保留多个标准；或者所有新源代码是否都应遵循单一标准。无论如何，每个源代码文件必须始终遵循单一约定。如果选择的方法是过渡到单一约定，则必须一次性调整完整的源文件。为符合不同约定而进行的语法调整，不能与语义更改（如错误修复）混在同一个代码库提交中。否则，代码审计将变得非常困难。\n\
    \n约定背后的原理可能会因为 Oracle 新版本发布或其他变更而过时。例如，在 Oracle 10g 之前，PL/SQL 编译器接受包规范和包体中输入参数的不同默认值，并且只使用包规范中提供的值。为了避免错误的假设，Avaloq\
    \ 约定是在包体中不为导出的子程序指定任何默认值。从 10g 开始，编译器会检查如果规范和体中都列出了默认值，它们是否相同。因此，你可以无风险地复制默认值，这样开发者在处理包体时就不需要打开包规范了。这个故事的寓意是，你应该定期检查每个约定背后的原理，特别是当该约定也有缺点时。\n\
    \n对于约定规范的大多数方面，约定具体怎么规定并不重要，因为约定的唯一好处就是由此产生的统一性。然而，对于某些方面，有充分的理由选择一种方式而非另一种。例如，如果你的\
    \ IDE 只支持首逗号自动格式化，那么你的约定规定使用尾逗号就毫无意义。我在此列出一些 PL/SQL 特有的选定方面，这些方面有强有力的理由遵循特定实践。\n\
    \n#### 缩写词\n\nSQL 和 PL/SQL 中的标识符长度只能为 30 字节。要使一个描述性名称符合这些要求，你需要省略不必要的词（例如 “get”）并对长词进行缩写。你可以通过维护一个缩写词列表并对照该列表检查所有名称来实现缩写的一致性。你还必须在该列表中添加那些你特别选择永不缩写的词。你甚至可以添加一个同义词列表，在新增条目时进行检查，以避免同一概念出现多个条目。\n\
    \n为了检查缩写使用的 Consistency，所有标识符必须拆分成组成部分，并对照缩写词注册表进行检查。要检查的标识符可以在 Oracle 数据字典中找到，例如在\
    \ `user_objects` 和 `user_tab_columns` 等视图中。从 Oracle 11g 开始，如果单元是使用 `plscope_settings=\"\
    identifiers:all\"` 编译的，那么 PL/SQL 程序中使用的所有标识符都存储在 `user_identifiers` 中。你可能希望在系统级别启用这个名为\
    \ PL/Scope 的新功能，通过执行 `SQL> alter system set plscope_settings=\"identifiers:all\"\
    ;` 并重新编译所有用户 PL/SQL 单元。视图 `user_plsql_object_settings` 显示哪些对象对此设置生效。\n\n因为小写和混合大小写的标识符在\
    \ SQL 和 PL/SQL 中需要用双引号括起来，所以通常不使用。相反，标识符部分通常用下划线分隔。\n\n以下代码清单显示了一个简化版的缩写词检查器。表\
    \ `abbr_reg` 保存已注册的缩写词。包 `abbr_reg#` 提供了一个过程 `ins_abbr` 用于插入新缩写词，以及 `chk_abbr`\
    \ 用于检查标识符部分是否只使用了已注册的缩写词。你可以通过调用如 `abbr_reg#.ins_abbr('abbr', 'abbreviation')`\
    \ 来填充注册表，并使用 `abbr_reg#.chk_abbr` 检查一致性使用。\n\n```sql\ncreate table abbr_reg(\n\
    \  abbr                    varchar2(30)  primary key  -- Abbreviation, e.g., ABBR\n\
    \ ,text                    varchar2(100) not null     -- Abbreviated text, e.g.,\
    \ ABBREVIATION\n ,descn                   varchar2(400)              -- Description,\
    \ explain concept\n) organization index;\n\ncreate unique index abbr_reg#u#1 on\
    \ abbr_reg(text);\n\ncreate or replace package abbr_reg#\nis\n  ------------------------------------------------------------------------------\n\
    \  -- Registry of abbreviations for SQL and PL/SQL identifier parts, such as\n\
    \  -- ABBR for ABBREVIATION and REG for REGISTRY. All identifiers must be made\
    \ up\n  -- of registered abbreviations separated by underscores, e.g. abbr_reg.\n\
    \  -- Contains also terms not to be abbreviated.\n  ------------------------------------------------------------------------------\n\
    \n  ------------------------------------------------------------------------------\n\
    \  -- Insert an abbreviation into the registry.\n  ------------------------------------------------------------------------------\n\
    \  procedure ins_abbr(\n    i_abbr                    varchar2\n   ,i_text   \
    \                 varchar2\n   ,i_descn                   varchar2 := null\n \
    \ );\n\n  ------------------------------------------------------------------------------\n\
    \  -- Check whether only registered abbreviations are used as identifier parts.\n\
    \  ------------------------------------------------------------------------------\n\
    \  procedure chk_abbr;\nend abbr_reg#;\n\ncreate or replace package body abbr_reg#\n\
    is\n  procedure ins_abbr(\n    i_abbr                    varchar2\n   ,i_text\
    \                    varchar2\n   ,i_descn                   varchar2\n  )\n \
    \ is\n  begin\n    insert into abbr_reg(abbr, text, descn)\n    values(upper(trim(i_abbr)),\
    \ upper(trim(i_text)), i_descn);\n  end ins_abbr;\n```\n"
- fmt: "# PL/SQL 标识符命名规范与作用域捕获\n\n## chk_ident 过程\n\n```plsql\n------------------------------------------------------------------------------\n\
    procedure chk_ident(\n  i_ident          varchar2\n ,i_loc            varchar2\n\
    )\nis\n  l_start_pos      pls_integer := 1;\n  l_end_pos        pls_integer :=\
    \ 1;\n  l_abbr_cnt       pls_integer;\n  l_part           varchar2(30);\n  c_ident_len\
    \ constant pls_integer := length(i_ident);\nbegin\n  while l_start_pos < c_ident_len\
    \ loop\n    -- DETERMINE NEXT PART --\n    while     l_end_pos <= c_ident_len\n\
    \          and substr(i_ident, l_end_pos, 1) not in ('_', '#', '$')\n    loop\n\
    \      l_end_pos := l_end_pos + 1;\n    end loop;\n    l_part := upper(substr(i_ident,\
    \ l_start_pos, l_end_pos - l_start_pos));\n\n    -- CHECK WHETHER THE PART IS\
    \ A REGISTERED ABBREVIATION --\n    select count(*)\n    into   l_abbr_cnt\n \
    \   from   abbr_reg\n    where  abbr = l_part;\n\n    if l_abbr_cnt = 0 then\n\
    \      dbms_output.put_line('Unregistered part ' || l_part || ' in ident ' ||\
    \ i_ident\n                           || ' at ' || i_loc || '.');\n    end if;\n\
    \n    -- INIT VARIABLES FOR NEXT LOOP --\n    l_end_pos := l_end_pos + 1;\n  \
    \  l_start_pos := l_end_pos;\n  end loop;\nend chk_ident;\n\n------------------------------------------------------------------------------\n\
    procedure chk_abbr\nis\nbegin\n  -- PL/SQL USING PL/SCOPE --\n  for c in (\n \
    \   select name\n          ,object_type\n          ,object_name\n          ,line\n\
    \    from   user_identifiers\n    where  usage = 'DECLARATION'\n    order by object_name,\
    \ object_type, line\n  ) loop\n    chk_ident(\n      i_ident => c.name\n     ,i_loc\
    \   => c.object_type || ' ' || c.object_name || ' at line ' || c.line\n    );\n\
    \  end loop;\n  -- OTHER ITEMS: USER_OBJECTS, USER_TAB_COLUMNS, ... --\n  -- ...\n\
    end chk_abbr;\n\nend abbr_reg#;\n```\n\n由于构建这个检查器只需要大约一百行 PL/SQL 代码，因此没有理由不去构建一个。PL/Scope\
    \ 使得这个过程比尝试从 `user_source` 或你的源代码存储库中解析源代码要容易得多。\n\n![images](images/square.jpg)\
    \ **Note** Oracle 在数据字典中对缩写的使用并不一致。例如，“index”这个术语在视图 `user_indexes` 和 `user_ind_columns`\
    \ 以及 `user_policies` 的列 `idx` 中被完整拼写了一次，却被以两种不同的方式缩写。Oracle 不修复这个问题大概是因为公共 API\
    \ 的向后一致性比缩写的一致性更重要。\n\n### PL/SQL 标识符的前后缀\n\n许多 PL/SQL 开发人员会给标识符添加前缀，以指示其作用域或类型。例如，局部变量以\
    \ `l_` 为前缀，常量以 `c_` 为前缀，输入参数以 `i_` 为前缀，类型以 `t_` 为前缀。为每个 PL/SQL 标识符添加前缀或后缀有两个很好的理由。两者都与避免作用域捕获有关。\n\
    \nPL/SQL 会自动将静态 SQL 语句中的 PL/SQL 变量转换为绑定变量。考虑以下函数，它应该从 Oracle 的 `demobld.sql` 脚本创建的\
    \ SCOTT 模式的 `emp` 表中返回指定员工编号的员工姓名。在这个例子中，我没有对参数 `empno` 和局部变量 `ename` 使用任何前缀。\n\
    \n```plsql\ncreate or replace function emp#ename(empno emp.empno%type)\nreturn\
    \ emp.ename%type\nis\n  ename            emp.ename%type;\nbegin\n  select ename\n\
    \  into   ename\n  from   emp\n  where  empno = empno;\n\n  return ename;\nend\
    \ emp#ename;\n```\n\n这个函数并没有实现我想要的功能。`where` 子句中 `empno` 的两个出现都指的是表列 `empno`，而不是输入参数，因为每个标识符都被解析为最局部的声明。在这种情况下，最局部的作用域是包含表\
    \ `emp` 的 SQL 语句。因此，`where` 条件等价于 `emp.empno = emp.empno`，这与 `emp.empno is not\
    \ null` 相同。除非表 `emp` 中恰好有一条记录，否则该函数将抛出一个异常。\n\n```sql\nSQL> truncate table emp;\n\
    Table truncated.\nSQL> insert into emp(empno, ename) values (7369, 'SMITH');\n\
    1 row created.\n```\n\n当表中只有一行时，该函数会返回该行的姓名，而不管实际的参数如何。我请求 `empno` 为 21 的员工姓名，却得到了\
    \ `empno` 为 7369 的员工的姓名。\n\n```sql\nSQL> select emp#ename(21) from dual;\nEMP#ENAME(21)\n\
    -----------------------------------------------------------------\nSMITH\n1 row\
    \ selected.\n```\n\n当表中有两行或更多行时，该函数总是返回 ORA-01422 错误。\n\n```sql\nSQL> insert into\
    \ emp(empno, ename) values (7499, 'ALLEN');\n1 row created.\nSQL> select emp#ename(7369)\
    \ from dual;\nselect emp#ename(7369) from dual\n       *\nERROR at line 1:\nORA-01422:\
    \ exact fetch returns more than requested number of rows\nORA-06512: at \"K.EMP#ENAME\"\
    , line 5\n```\n\n你可以通过为输入参数 `empno` 添加前缀或后缀（例如 `i_empno`）来避免作用域捕获。让我们将此规则推广为：每个\
    \ PL/SQL 标识符都应该有一个在列名中未使用的前缀或后缀。前缀或后缀的最小长度是两个字节——即一个字母和一个作为分隔符的下划线。你可以使用这个前缀来传达额外的语义，例如变量的作用域或参数的模式，而无需浪费宝贵的三十字节限制中的另一个字节。\n\
    \n另一种替代前缀的方法是，在 SQL 语句中用声明块的名字来限定所有 PL/SQL 变量，例如 `empno = emp#ename.empno`。这种方法的优点是，当表中添加了列时，它可以防止不必要的失效，因为编译器知道不会发生作用域捕获。Bryn\
    \ Llewellyn 在 `http://bit.ly/dSMfto` 中描述了 Oracle 11g 细粒度依赖跟踪的这个方面。我不使用这种方法，因为基于版本的重定义是防止在线升级期间失效的更好解决方案，而且我觉得语法很笨拙。\n\
    \n当然，为每个局部变量添加 `l_` 前缀并不能避免嵌套 PL/SQL 块中的作用域捕获。对所有嵌套块中的所有 PL/SQL 标识符使用完全限定符号可以解决这个问题，但代价是冗长。"
