  trans: "# DBMS_PROFILER 与 DBMS_TRACE 示例会话\n\n本节提供了一个同时使用 `DBMS_PROFILER` 和 `DBMS_TRACE`\
    \ 进行性能分析和跟踪的示例会话。本节中展示的所有跟踪和性能分析信息均通过此处提供的代码生成：\n\n```sql\nDECLARE\n  v_employee_id\
    \ employees.employee_id%TYPE;\nBEGIN\n  -- 启动性能分析会话\n  dbms_profiler.start_profiler;\n\
    \  dbms_trace.set_plsql_trace(\n                   DBMS_TRACE.trace_enabled_calls\n\
    \                   +\n                   DBMS_TRACE.trace_enabled_exceptions\n\
    \                   +\n                   DBMS_TRACE.trace_all_sql\n         \
    \          +\n                   DBMS_TRACE.trace_all_lines);\n\n  -- 调用要进行性能分析的顶级过程\n\
    \  v_employee_id := employee_api.create_employee(\n        p_first_name => 'Lewis',\n\
    \        p_last_name => 'Cunningham',\n        p_email => 'lewisc@yahoo.com',\n\
    \        p_phone_number => '888-555-1212',\n        p_job_title => 'Programmer',\n\
    \        p_department_name => 'IT',\n        p_salary => 99999.99,\n        p_commission_pct\
    \ => 0 );\n  -- 停止性能分析会话\n  dbms_trace.clear_plsql_trace;\n  dbms_profiler.stop_profiler;\n\
    \nEND;\n```\n\n`DBMS_PROFILER.start_profiler` 开始性能分析会话，`DBMS_TRACE.set_plsql_trace`\
    \ 启动事件跟踪。这两个过程都接受可选参数作为输入。`DBMS_TRACE` 的参数 `TRACE_LEVEL` 决定了收集信息的多少。在本例中，我需要为所有启用的调用（对使用\
    \ `DEBUG` 编译的程序单元的调用）、所有启用的异常、所有 SQL 调用以及所有行创建记录。这在大多数情况下确实有点过度了。输出如下所示。\n\n##\
    \ DBMS_PROFILER 与 DBMS_TRACE 输出\n\n运行时，`DBMS_TRACE` 将数据编译到两个表中。这些表如下：\n\n*   `PLSQL_TRACE_RUNS`\
    \ – `DBMS_TRACE`：标识每个独立运行的顶级表。\n*   `PLSQL_TRACE_EVENTS` – `DBMS_TRACE`：一个非常有用的表，可以记录跟踪会话中执行的每一行，可能迅速变得非常大，需要监控。\n\
    \n运行时，`DBMS_TRACE` 将数据编译到以下表中：\n\n*   `PLSQL_PROFILER_RUNS` – `DBMS_PROFILER`：标识每个独立性能分析会话的顶级表。\n\
    *   `PLSQL_PROFILER_UNITS` – `DBMS_PROFILER`：描述在性能分析会话期间执行的程序单元。\n*   `PLSQL_PROFILER_DATA`\
    \ – `DBMS_PROFILER`：会话期间每个单元运行的计时和执行统计信息。\n\n你可以通过 `RUN_DATE` 和 `RUN_COMMENT`（可选；默认为会话启动时的\
    \ `SYSDATE`）来标识一个 `DBMS_PROFILER` 运行。以下查询显示了两个性能分析会话后存储在 `PLSQL_PROFILER_RUNS`\
    \ 表中的数据：\n\n```sql\nselect runid, run_date, run_comment, run_total_time\nfrom\
    \ plsql_profiler_runs;\n```\n\n```\nRUNID     RUN_DATE               RUN_COMMENT\
    \      RUN_TOTAL_TIME\n---------- --------------------- ---------------- ----------------------\n\
    2          13-MAR-2011 11:56:54  13-MAR-11        133000000\n3          13-MAR-2011\
    \ 12:30:18  13-MAR-11        80000000\n```\n\n从该输出中，你可以识别出你正在寻找的运行。在分析性能时，你通常会对同一程序代码的多次运行取平均值。为了本示例的需要，我将使用一个特定的程序运行。\n\
    \n标识跟踪会话与标识性能分析会话非常相似。会话通过 `RUNID` 和 `RUN_DATE` 来标识。以下查询显示了跟踪会话后存储在 `PLSQL_TRACE_RUNS`\
    \ 表中的数据：\n\n```sql\nSELECT runid, run_date\nFROM plsql_trace_runs;\n```\n\n```\n\
    RUNID                  RUN_DATE\n---------------------- -------------------------\n\
    10                     26-MAR-2011 11:04:35\n```\n\n`DBMS_PROFILER` 提供关于运行中可执行行的计时信息。你收集这些信息，然后分析它以确定代码中是否存在瓶颈。运行时间长的代码可能是没问题的；但也可能不是。这个判断来自你的分析。性能分析器无法告诉你哪里有性能问题。性能分析器只能给你一个用于分析的性能剖析。一旦你分析了输出并进行了任何更改，你就需要运行另一个性能分析会话来验证你的更改。\n\
    \n以下查询逐行列出了性能分析器收集的计时信息。我删除了多行输出以控制篇幅。我忽略了 `ANONYMOUS BLOCK` 条目，因为它们是运行本身的噪声。\n\
    \n```sql\nSELECT unit_name, unit_type, line#, total_occur, ppd.total_time, max_time\n\
    \  FROM plsql_profiler_units ppu\n  JOIN plsql_profiler_data ppd\n    ON (ppu.runid\
    \ = ppd.runid\n       AND\n       ppu.unit_number = ppd.unit_number)\nWHERE ppu.runid\
    \ = :RUNID\n  AND unit_type != 'ANONYMOUS BLOCK'  ;\n```\n\n```\nUNIT_NAME   \
    \        UNIT_TYPE      LINE#    TOTAL_OCCUR   TOTAL_TIME    MAX_TIME\n-------------------\
    \ -------------- -------- ------------- ------------- -------------\nEMPLOYEE_API\
    \        PACKAGE BODY   3        1             11982         9985\nEMPLOYEE_API\
    \        PACKAGE BODY   20       1             1997          1997\nEMPLOYEE_API\
    \        PACKAGE BODY   21       1             2995          2995\nDEPARTMENTS_API\
    \     PACKAGE BODY   3        1             7988          6989\nDEPARTMENTS_API\
    \     PACKAGE BODY   8        1             0             0\nJOBS_API        \
    \    PACKAGE BODY   3        1             7988          6989\nJOBS_API      \
    \      PACKAGE BODY   7        1             0             0\n.\n.\n.\n80 行 已选中\n\
    ```"
- fmt: "This listing shows the line executed for each program unit profiled. It gives\
    \ you the number of occurrences and the total time spent on that line (including\
    \ calls to called program units). The `max time` is the longest time spent on\
    \ any particular call. Using this information, you should be able to get a good\
    \ feel of where you would begin your investigation into any performance issues.\n\
    \n## Viewing Call Hierarchy with DBMS_TRACE\n\nWhile the performance metrics are\
    \ great, it would be better if you knew the context, or call hierarchy, of the\
    \ times. `DBMS_TRACE` does not quite give you that, but it does give you the call\
    \ structure. To view the executed code hierarchy (remember that this is the actual\
    \ execution, not the expected or possible execution), you can run the following\
    \ very simple query:\n\n```sql\nSELECT event_unit, event_proc_name,\n       CASE\n\
    \         WHEN proc_unit IS NOT NULL and proc_name IS NOT NULL\n           THEN\
    \ proc_unit || '.' || proc_name || '(' || proc_line || ')'\n         WHEN proc_unit\
    \ IS NULL and proc_name IS NOT NULL\n           THEN proc_name || '(' || proc_line\
    \ || ')'\n         ELSE\n           substr(event_comment,1,30)\n       END executed_code\n\
    FROM plsql_trace_events pse\nWHERE runid = :RUNID\n  AND event_unit NOT IN ('<anonymous>',\
    \ 'DBMS_TRACE')\n  AND event_kind NOT IN (50, 51)\nORDER BY event_seq;\n```\n\n\
    ```\nEVENT_UNIT        EVENT_PROC_NAME                 EXECUTED_CODE\n----------------\
    \ ------------------------------- ------------------------------------------\n\
    EMPLOYEE_API      CREATE_EMPLOYEE                 DEPARTMENTS_API.DEPARTMENT_EXISTS(3)\n\
    DEPARTMENTS_API   DEPARTMENT_EXISTS               SELECT DEPARTMENT_ID FROM DEPA\n\
    EMPLOYEE_API      CREATE_EMPLOYEE                 JOBS_API.JOB_EXISTS(3)\nJOBS_API\
    \          JOB_EXISTS                      SELECT JOB_ID FROM JOBS WHERE\nEMPLOYEE_API\
    \      CREATE_EMPLOYEE                 JOBS_API.VALIDATE_JOB(21)\nEMPLOYEE_API\
    \      CREATE_EMPLOYEE                 DEPARTMENTS_API.DEPARTMENT_MANAGER_ID(29)\n\
    DEPARTMENTS_API   DEPARTMENT_MANAGER_ID           SELECT MANAGER_ID FROM DEPARTM\n\
    EMPLOYEE_API      CREATE_EMPLOYEE                 Select EMPLOYEES_SEQ.NEXTVAL\
    \ f\nEMPLOYEE_API      CREATE_EMPLOYEE                 INSERT INTO EMPLOYEES (EMPLOYE\n\
    EMPLOYEE_API      CREATE_EMPLOYEE                 EMPLOYEE_API.ASSIGN_SALARY(74)\n\
    EMPLOYEE_API      ASSIGN_SALARY                   UPDATE EMPLOYEES SET SALARY\
    \ =\n\n 11 rows selected\n```\n\nThis listing (and query) provides the order of\
    \ execution from the run. `EMLOYEE_API.CREATE_EMPLOYEE` called `DEPARTMENTS_API.DEPARTMENT_EXISTS`\
    \ (which is defined on line 3 in the `DEPARTMENTS_API` package body). The called\
    \ program unit then ran a query before returning.\n\n## Scalability Considerations:\
    \ DBMS_TRACE vs. DBMS_PROFILER\n\n`DBMS_TRACE` can be very verbose. The examples\
    \ I am using in this section are fairly simple and back office-ish. When you have\
    \ very large applications or applications that run for a while and call the same\
    \ program units over and over, the value of `DBMS_TRACE` starts to drop off as\
    \ the complexity increases.\n\nFor example, there is a demo procedure provided\
    \ for this chapter called `TEST_CALLS_PRC`. It is a simple `for` loop (100 iterations)\
    \ that calls two procedures for each iteration. Using `DBMS_TRACE` and `DBMS_PROFILER`\
    \ with the same options that I used earlier, compare the differences in number\
    \ of rows (the lower `RUNID` is the trace seen earlier for both counts). The following\
    \ query compares the number of output lines produced between the two runs by `DBMS_PROFILER`:\n\
    \n```sql\nSELECT ppd.runid, count(*)\n  FROM plsql_profiler_units ppu\n  JOIN\
    \ plsql_profiler_data ppd\n    ON(ppu.runid = ppd.runid\n    AND ppu.unit_number\
    \ = ppd.unit_number)\n  WHERE ppu.runid IN (9,10)\n    AND ppd.total_time != 0\n\
    \    AND unit_type != 'ANONYMOUS BLOCK'\n  GROUP BY ppd.runid;\n```\n\n```\nRUNID\
    \                  COUNT(*)\n---------------------- ----------------------\n9\
    \                      29\n10                     15\n```\n\nThe next query produces\
    \ the same line counts but for two `DBMS_TRACE` sessions:\n\n```sql\n  SELECT\
    \ runid, count(*)\n    FROM plsql_trace_events\n    WHERE runid IN (12,13)\n \
    \   GROUP BY runid;\n```\n\n```\nRUNID                  COUNT(*)\n----------------------\
    \ ----------------------\n12                     100\n13                     5545\n\
    ```\n\n`DBMS_PROFILER` has fewer rows for the less complex code but `DBMS_TRACE`\
    \ has many, many more rows. When writing queries against the `DBMS_TRACE` tables,\
    \ you need to account for that. Use the options to gather only the data you really\
    \ want and then plan to be creative on filtering out those things you don't want\
    \ but can't option out of."
