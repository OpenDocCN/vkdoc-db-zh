- fmt: "#### Avoid Correctness-Performance Tradeoffs\n\nFinally, a cautionary principle:\
    \ avoid what I call the false correctness-performance tradeoff. If you adopt the\
    \ contract-oriented approaches recommended here, you may find that not only does\
    \ rigorous assertion of contract elements cause you lots of extra typing, each\
    \ call to `assert` is actual code executed and, while extremely inexpensive, is\
    \ not entirely free. Modules that assert long lists of complex preconditions many\
    \ thousands of times (perhaps over many rows of a cursor loop) could see these\
    \ assertions show up as “expensive” when code is profiled.\n\nIn such cases, you\
    \ may be tempted to remove these assertions on the basis of their computational\
    \ cost; my recommendation is to avoid this temptation as much as possible. Assertions\
    \ are about insuring correctness of code; performance is about executing code\
    \ quickly. There is no such thing as a correctness-performance tradeoff: incorrect\
    \ results obtained quickly are still incorrect and therefore useless.\n\nHowever,\
    \ if the performance impact of contract assertions seems too high to tolerate\
    \ and the modules involved are highly trusted, it may become necessary to relax\
    \ this dictum and stop testing some assertions. Rather than removing them altogether\
    \ from the source code, it’s much better to simply comment them out. Remember\
    \ that assertions in source code are also important documentation artifacts of\
    \ the contracts to which a module adheres.\n\nAlternatively, in Oracle 10g and\
    \ higher releases, you can somewhat have your cake and eat it too using the PL/SQL\
    \ conditional compilation feature. Consider the following procedure that conditionally\
    \ includes a precondition assertion whenever compiled with the conditional compilation\
    \ flag `DBC` is set to `TRUE`:\n\n```sql\nPROCEDURE proc02\n  IS\n    l_module\
    \ VARCHAR2(30) := 'PROC02';\n  BEGIN\n    -- conditional precondition assertion\n\
    \    $IF $$DBC $THEN\n    assertpre(FALSE,'Assert FALSE precondition',l_module);\n\
    \    $END\n\n    -- procedure logic\n    null;\n  END proc02;\n```\n\nThe procedure\
    \ can be compiled with the flag set as `TRUE` for testing purposes and recompiled\
    \ with it set as `FALSE` for releasing to production. In production, if program\
    \ issues are suspected, the flag can be set back to `TRUE` and code recompiled\
    \ to re-enable the assertion testing for bug discovery and diagnosis. Again, this\
    \ is not recommended as correctness testing in production is where it matters\
    \ most, but it is possible in situations where the impact on performance is unacceptably\
    \ high.\n\n#### Oracle 11g Optimized Compilation\n\nOracle 11g introduced optimized\
    \ compilation of PL/SQL including subprogram inlining that can gain significant\
    \ performance advantages where small local programs are frequently called. An\
    \ in-depth discussion of the topic is beyond the scope of this chapter, but basically\
    \ inlining can replace calls to modules local to the compilation unit with a copy\
    \ of the called module’s code “inline” with the calling code and thereby eliminating\
    \ call stack overhead.\n\nInlining is preferentially performed for smaller and\
    \ simpler local modules, which exactly describes the package-local assertion mechanism\
    \ I have been using and recommending for years now. Finally, some real vindication\
    \ for my unorthodox preference to localize the assertion inside each package!\
    \ So adopting the package-local assertion and enabling full optimization can minimize\
    \ the cost of enforcing software contracts in your PL/SQL code. Sounds like a\
    \ win to me.\n\nPL/SQL inlining is enabled by setting the `PLSQL_OPTIMIZE_LEVEL`\
    \ parameter to value `3` prior to compilation, as below:\n\n```sql\nALTER SESSION\
    \ SET PLSQL_OPTIMIZE_LEVEL=3;\n```\n\nYou can be informed about inlining optimizations\
    \ and other compiler warnings using the `PLSQL_WARNINGS` parameter, like so:\n\
    \n```sql\nALTER SESSION SET PLSQL_WARNINGS='ENABLE:ALL';\n```\n\nIt will be interesting\
    \ to experiment and measure the performance benefits of PL/SQL inlining on packages\
    \ heavily laden with contract enforcing assertions.\n\n### Summary\n\nDesign by\
    \ Contract is a powerful software engineering paradigm for engineering bugs related\
    \ to module interfaces (APIs) out of your code. Software contracts are specified\
    \ by preconditions representing requirements imposed on calling modules, and postconditions\
    \ representing obligations imposed on the called module. These contract elements\
    \ are enforced by a software mechanism called `assert`. Assertion failures always\
    \ signal bugs in the code in either the calling or called module, depending on\
    \ whether a precondition or postcondition has been violated, respectively.\n\n\
    Adopting a contract-oriented approach to PL/SQL can be achieved using a simple,\
    \ standardized assertion mechanism and adopting disciplined, standardized usage\
    \ across the body of your code. This chapter showed you specific techniques I\
    \ developed for doing just that, and I sincerely hope you find these techniques\
    \ valuable should you choose to adopt them.\n\n## C H A P T E R 9\n\n## PL/SQL\
    \ from SQL\n\nby Adrian Billington\n\nFunctions are an integral part of any well-designed\
    \ PL/SQL application. They are an embodiment of programming best practices, such\
    \ as code modularization, reuse, and the encapsulation of business or application\
    \ logic. When used as simple building-blocks for larger programs, they can be\
    \ an elegant and simple way to extend functionality while reducing code-complexity\
    \ at minimal cost.\n\nConversely, when PL/SQL functions are heavily used, particularly\
    \ in SQL statements, there can be a range of associated costs, most notably for\
    \ performance. Depending on the nature of the function, simply calling PL/SQL\
    \ from SQL and/or excessive I/O can degrade performance of even the most trivial\
    \ of queries.\n\nGiven this, I will describe a variety of costs associated with\
    \ calling PL/SQL functions from SQL and, more importantly, demonstrate a range\
    \ of techniques that you can use to reduce their impact. By the end of this chapter,\
    \ you will have a greater awareness of the costs of using PL/SQL functions in\
    \ your applications. You will therefore be better placed to make good design decisions\
    \ for your new or re-factored applications and improve your performance tuning\
    \ efforts on critical parts of your system.\n\nNote: The examples in this chapter\
    \ have all been run on an 11.2.0.2 Oracle Enterprise Linux database. The code\
    \ listings are available for download in their entirety from the Apress web site.\
    \ In many cases I have reduced the output to the minimum required to convey my\
    \ message and maintain the flow of the chapter. All examples can be executed in\
    \ SQL*Plus and the download pack includes any utilities that I’ve used in addition\
    \ to those provided in the Oracle Database software."
  raw: '#### Avoid Correctness-Performance Tradeoffs


    Finally, a cautionary principle: avoid what I call the false correctness-performance
    tradeoff. If you adopt the contract-oriented approaches recommended here, you
    may find that not only does rigorous assertion of contract elements cause you
    lots of extra typing, each call to assert is actual code executed and, while extremely
    inexpensive, is not entirely free. Modules that assert long lists of complex preconditions
    many thousands of times (perhaps over many rows of a cursor loop) could see these
    assertions show up as “expensive” when code is profiled.


    In such cases, you may be tempted to remove these assertions on the basis of their
    computational cost; my recommendation is to avoid this temptation as much as possible.
    Assertions are about insuring correctness of code; performance is about executing
    code quickly. There is no such thing as a correctness-performance tradeoff: incorrect
    results obtained quickly are still incorrect and therefore useless.


    However, if the performance impact of contract assertions seems too high to tolerate
    and the modules involved are highly trusted, it may become necessary to relax
    this dictum and stop testing some assertions. Rather than removing them altogether
    from the source code, it’s much better to simply comment them out. Remember that
    assertions in source code are also important documentation artifacts of the contracts
    to which a module adheres.


    Alternatively, in Oracle 10g and higher releases, you can somewhat have your cake
    and eat it too using the PL/SQL conditional compilation feature. Consider the
    following procedure that conditionally includes a precondition assertion whenever
    compiled with the conditional compilation flag DBC is set to TRUE:


    `PROCEDURE proc02`

    `  IS`

    `    l_module VARCHAR2(30) := ''PROC02'';`

    `  BEGIN`

    `    -- conditional precondition assertion`

    `    $IF $$DBC $THEN`

    `    assertpre(FALSE,''Assert FALSE precondition'',l_module);`

    `    $END`


    `    -- procedure logic`

    `    null;`

    `  END proc02;`


    The procedure can be compiled with the flag set as TRUE for testing purposes and
    recompiled with it set as FALSE for releasing to production. In production, if
    program issues are suspected, the flag can be set back to TRUE and code recompiled
    to re-enable the assertion testing for bug discovery and diagnosis. Again, this
    is not recommended as correctness testing in production is where it matters most,
    but it is possible in situations where the impact on performance is unacceptably
    high.


    #### Oracle 11g Optimized Compilation


    Oracle 11g introduced optimized compilation of PL/SQL including subprogram inlining
    that can gain significant performance advantages where small local programs are
    frequently called. An in-depth discussion of the topic is beyond the scope of
    this chapter, but basically inlining can replace calls to modules local to the
    compilation unit with a copy of the called module’s code “inline” with the calling
    code and thereby eliminating call stack overhead.


    Inlining is preferentially performed for smaller and simpler local modules, which
    exactly describes the package-local assertion mechanism I have been using and
    recommending for years now. Finally, some real vindication for my unorthodox preference
    to localize the assertion inside each package! So adopting the package-local assertion
    and enabling full optimization can minimize the cost of enforcing software contracts
    in your PL/SQL code. Sounds like a win to me.


    PL/SQL inlining is enabled by setting the `PLSQL_OPTIMIZE_LEVEL` parameter to
    value 3 prior to compilation, as below:


    `ALTER SESSION SET PLSQL_OPTIMIZE_LEVEL=3;`


    You can be informed about inlining optimizations and other compiler warnings using
    the `PLSQL_WARNINGS` parameter, like so:


    `ALTER SESSION SET PLSQL_WARNINGS=''ENABLE:ALL'';`


    It will be interesting to experiment and measure the performance benefits of PL/SQL
    inlining on packages heavily laden with contract enforcing assertions.


    ### Summary


    Design by Contract is a powerful software engineering paradigm for engineering
    bugs related to module interfaces (APIs) out of your code. Software contracts
    are specified by preconditions representing requirements imposed on calling modules,
    and postconditions representing obligations imposed on the called module. These
    contract elements are enforced by a software mechanism called assert. Assertion
    failures always signal bugs in the code in either the calling or called module,
    depending on whether a precondition or postcondition has been violated, respectively.


    Adopting a contract-oriented approach to PL/SQL can be achieved using a simple,
    standardized assertion mechanism and adopting disciplined, standardized usage
    across the body of your code. This chapter showed you specific techniques I developed
    for doing just that, and I sincerely hope you find these techniques valuable should
    you choose to adopt them.


    ## C H A P T E R  9


    ## PL/SQL from SQL


    **by Adrian Billington**


    Functions are an integral part of any well-designed PL/SQL application. They are
    an embodiment of programming best practices, such as code modularization, reuse,
    and the encapsulation of business or application logic. When used as simple building-blocks
    for larger programs, they can be an elegant and simple way to extend functionality
    while reducing code-complexity at minimal cost.


    Conversely, when PL/SQL functions are heavily used, particularly in SQL statements,
    there can be a range of associated costs, most notably for performance. Depending
    on the nature of the function, simply calling PL/SQL from SQL and/or excessive
    I/O can degrade performance of even the most trivial of queries.


    Given this, I will describe a variety of costs associated with calling PL/SQL
    functions from SQL and, more importantly, demonstrate a range of techniques that
    you can use to reduce their impact. By the end of this chapter, you will have
    a greater awareness of the costs of using PL/SQL functions in your applications.
    You will therefore be better placed to make good design decisions for your new
    or re-factored applications and improve your performance tuning efforts on critical
    parts of your system.


    ![images](images/square.jpg) **Note** The examples in this chapter have all been
    run on an 11.2.0.2 Oracle Enterprise Linux database. The code listings are available
    for download in their entirety from the Apress web site. In many cases I have
    reduced the output to the minimum required to convey my message and maintain the
    flow of the chapter. All examples can be executed in SQL*Plus and the download
    pack includes any utilities that I’ve used in addition to those provided in the
    Oracle Database software.'
  trans: "\n#### 避免正确性与性能的权衡陷阱\n\n最后，提出一条警示性原则：避免陷入我所谓的“错误的正确性-性能权衡陷阱”。如果你采纳本文推荐的面向契约的方法，你可能会发现，严格断言契约元素不仅会导致大量额外的键入工作，而且每次`assert`调用都是实际执行的代码，虽然其开销**极其微小**，但并非完全免费。在那些断言了长串复杂前置条件（可能在一个游标循环的数千行中）的模块中，当代码进行性能分析时，这些断言可能会显得“昂贵”。\n\
    \n在这种情况下，你可能会基于其计算成本而倾向于移除这些断言；我的建议是尽可能避免这种诱惑。断言关乎确保代码的正确性；而性能关乎快速执行代码。不存在所谓的“正确性-性能权衡”：快速获得的错误结果仍然是错误的，因此是无用的。\n\
    \n然而，如果契约断言带来的性能影响似乎高到无法容忍，并且所涉及的模块高度受信，那么放宽这条准则并停止测试某些断言可能是必要的。与其从源代码中完全移除它们，不如简单地将它们注释掉。请记住，源代码中的断言也是模块所遵循契约的重要文档工件。\n\
    \n或者，在 Oracle 10g 及更高版本中，你可以使用 PL/SQL 条件编译功能，在某种程度上鱼与熊掌兼得。考虑以下过程，当编译时设置了条件编译标志\
    \ `DBC` 为 `TRUE`，则有条件地包含一个前置条件断言：\n\n```sql\nPROCEDURE proc02\n  IS\n    l_module\
    \ VARCHAR2(30) := 'PROC02';\n  BEGIN\n    -- 条件前置条件断言\n    $IF $$DBC $THEN\n \
    \   assertpre(FALSE,'Assert FALSE precondition',l_module);\n    $END\n\n    --\
    \ 过程逻辑\n    null;\n  END proc02;\n```\n\n该过程可以设置标志为 `TRUE` 进行编译用于测试，并重新编译时将其设置为\
    \ `FALSE` 以发布到生产环境。在生产环境中，如果怀疑程序存在问题，可以将标志重新设为 `TRUE` 并重新编译代码，以重新启用断言测试来发现和诊断错误。再次强调，这并不推荐，因为生产环境中的正确性测试最为重要，但在性能影响高得无法接受的情况下，这是可能的。\n\
    \n#### Oracle 11g 优化编译\n\nOracle 11g 引入了 PL/SQL 的优化编译，包括子程序内联，这在小的局部程序被频繁调用时可以获得显著的性能优势。深入讨论该主题超出了本章范围，但基本上，内联可以用被调用模块代码的副本“内联”地替换对编译单元内局部模块的调用，从而消除调用栈开销。\n\
    \n内联优先针对较小、较简单的局部模块进行，这恰恰描述了我多年来一直使用和推荐的包局部断言机制。最终，我偏爱将断言局部化在每个包内的这种非传统做法得到了一些真正的验证！因此，采用包局部断言并启用完全优化，可以最大限度地降低在\
    \ PL/SQL 代码中强制实施软件契约的成本。在我看来，这听起来像是双赢。\n\n通过在编译前将 `PLSQL_OPTIMIZE_LEVEL` 参数设置为值\
    \ `3` 来启用 PL/SQL 内联，如下所示：\n\n```sql\nALTER SESSION SET PLSQL_OPTIMIZE_LEVEL=3;\n\
    ```\n\n你可以使用 `PLSQL_WARNINGS` 参数获知内联优化和其他编译器警告，如下所示：\n\n```sql\nALTER SESSION\
    \ SET PLSQL_WARNINGS='ENABLE:ALL';\n```\n\n对那些充斥着契约强制断言的包，通过实验来衡量 PL/SQL 内联带来的性能收益将会很有趣。\n\
    \n### 总结\n\n契约式设计是一种强大的软件工程范式，用于从你的代码中消除与模块接口（APIs）相关的缺陷。软件契约由前置条件（表示对调用模块施加的要求）和后置条件（表示对被调用模块施加的义务）来指定。这些契约元素通过一个称为\
    \ `assert` 的软件机制来强制实施。断言失败总是指示调用模块或被调用模块中的代码存在错误，具体取决于违反的是前置条件还是后置条件。\n\n在 PL/SQL\
    \ 中采用面向契约的方法，可以通过一个简单、标准化的断言机制，并在整个代码库中采用规范化、标准化的用法来实现。本章向你展示了我为此开发的具体技术，如果你选择采纳，我真诚地希望你发现这些技术很有价值。\n\
    \n## 第 9 章\n\n## 从 SQL 调用 PL/SQL\n\n作者：Adrian Billington\n\n函数是任何设计良好的 PL/SQL\
    \ 应用程序不可或缺的部分。它们是编程最佳实践的体现，例如代码模块化、重用以及业务或应用逻辑的封装。当用作大型程序的简单构建块时，它们可以是一种优雅而简单的方式，以最低成本扩展功能，同时降低代码复杂度。\n\
    \n反之，当 PL/SQL 函数被大量使用时，特别是在 SQL 语句中，可能会带来一系列相关的成本，其中最显著的是性能成本。根据函数的性质，仅仅从 SQL\
    \ 调用 PL/SQL 和/或过度的 I/O 就可能降低即使是最简单的查询的性能。\n\n鉴于此，我将描述从 SQL 调用 PL/SQL 函数所涉及的各种成本，更重要的是，演示一系列可用于减轻其影响的技术。到本章结束时，你将更清楚地意识到在应用程序中使用\
    \ PL/SQL 函数的成本。因此，你将能更好地为新的或重构的应用程序做出良好的设计决策，并改进对系统关键部分的性能调优工作。\n\n注意：本章中的示例均已在\
    \ Oracle Enterprise Linux 11.2.0.2 数据库上运行。完整的代码清单可从 Apress 网站下载。在许多情况下，我已将输出精简到传达信息和保持章节流畅所需的最低限度。所有示例均可在\
    \ SQL*Plus 中执行，下载包中包含了我使用的除 Oracle 数据库软件自带工具外的任何实用程序。\n"
- fmt: "## The Cost of Using PL/SQL Functions in SQL\n\nThe SQL and PL/SQL languages\
    \ are seamlessly integrated. Since `Oracle Database 9i`, the two languages have\
    \ even shared the same parser. We use this inter-operability to our advantage\
    \ in most of the code that we write, such as SQL cursors in PL/SQL programs or\
    \ PL/SQL functions that are called from SQL. We often do this with little concern\
    \ for what Oracle Database has to do under the covers to run our programs.\n\n\
    Despite this integration, there is a runtime cost to combining them, in particular\
    \ when calling PL/SQL from SQL (the focus of this chapter, of course). I’m going\
    \ to spend the next few pages exploring some of these costs. What is interesting\
    \ is that Oracle has been working hard to reduce the impact of combining SQL and\
    \ PL/SQL code over several versions, so the issues I describe are not necessarily\
    \ in their final state.\n\nMy investigation of the costs of using PL/SQL functions\
    \ in SQL can be broken down into three main areas:\n\n*   Performance\n*   Predictability\
    \ (which is related to performance)\n*   Side effects\n\n![images](images/square.jpg)\
    \ **Note** I do not cover syntactic or operational restrictions (such as DML being\
    \ prohibited in PL/SQL functions called from SQL). These are not runtime costs\
    \ as such and are well-documented elsewhere.\n\n### Context-Switching\n\nContext-switching\
    \ is an almost-irreducible cost of computing that occurs in CPUs, operating systems,\
    \ and software. The mechanics differ depending on where it is occurring, but it\
    \ is often a CPU-intensive operation that designers attempt to tune as much as\
    \ is possible.\n\nWhen we consider “context switching” in relation to Oracle Database,\
    \ we specifically refer to the exchange of processing control between the SQL\
    \ and PL/SQL engines (without necessarily understanding what occurs in such a\
    \ process). These two engines are separate and distinct but we use them interchangeably.\
    \ This means that when we call SQL from PL/SQL or vice versa, the calling context\
    \ needs to store its process state and hand over control and data to its counterpart\
    \ engine (which may or may not be picking up from an earlier switch). This switching\
    \ cycle is computationally intensive and can typically be repeated so many times\
    \ that its effects on response times can become quite noticeable.\n\nFor many,\
    \ the first encounter with context-switching in Oracle Database would have been\
    \ the introduction of the `BULK COLLECT` and `FORALL` PL/SQL features in `Oracle\
    \ Database 8i`, designed *specifically* to reduce context-switching. These performance\
    \ features made it possible to bind arrays of data between the SQL and PL/SQL\
    \ engines in a single context-switch, dramatically reducing the number of context-switches\
    \ that were generated by the row-by-row PL/SQL techniques that were prevalent\
    \ at the time. For several major releases, almost all of the performance benefits\
    \ of these language features could be attributed to the reduction in context-switching\
    \ they facilitated. (In more recent releases, some further benefits such as redo\
    \ optimization for bulk INSERT operations can also be realized when using PL/SQL\
    \ array processing.)\n\n![images](images/square.jpg) **Note** The reduction of\
    \ context-switching is such an effective performance technique that the Oracle\
    \ designers added an implicit `BULK COLLECT` for cursor-for-loops to the PL/SQL\
    \ optimizing compiler introduced in `Oracle Database 10g`.\n\nAll of which is\
    \ good news for PL/SQL programmers, of course, but the effects of excessive context-switching\
    \ are still encountered elsewhere. In particular, context-switching is a performance\
    \ penalty to pay for calling PL/SQL functions from SQL.\n\n#### Measuring Context-Switching\n\
    \nAs good as Oracle Database’s instrumentation is (and it is truly excellent),\
    \ context-switching is not something that can be directly measured; it’s performed\
    \ way down in the depths of the kernel and there is no simple statistic or counter\
    \ available to quantify it. But given that context-switching is a fact of calling\
    \ PL/SQL from SQL (and vice versa, though I shall cease to remind readers of this),\
    \ its impact can be inferred with a simple set of measurements and supplied utilities.\n\
    \n[Listing 9-1](#Chapter09.html#list_9_1) shows a simple comparison between two\
    \ SQL statements, one of which calls a PL/SQL function for every row. The function\
    \ does nothing but return the input parameter and the timings are compared using\
    \ the `SQL*Plus` timer. I’ve used an array size of 500 and `Autotrace` to suppress\
    \ the output.\n\n***Listing 9-1.** The Cost of Calling a PL/SQL Function from\
    \ SQL (Baseline)*\n\n```sql\nSQL> SELECT ROWNUM AS r\n  2  FROM   dual\n  3  CONNECT\
    \ BY ROWNUM <= 1e6;\n\n1000000 rows selected.\n\nElapsed: 00:00:01.74\n\nStatistics\n\
    ----------------------------------------------------------\n          0  recursive\
    \ calls\n          0  db block gets\n          0  consistent gets\n          0\
    \  physical reads\n          0  redo size\n    6290159  bytes sent via SQL*Net\
    \ to client\n      40417  bytes received via SQL*Net from client\n       2001\
    \  SQL*Net roundtrips to/from client\n          1  sorts (memory)\n          0\
    \  sorts (disk)\n    1000000  rows processed\n```\n\nThe baseline SQL statement\
    \ generated 1 million rows in less than 2 seconds. As you can see from the `Autotrace`\
    \ output, a SQL statement of this form is light on resources other than CPU (and\
    \ network transfer and memory at larger rowcounts). Adding a PL/SQL function call\
    \ to the SQL makes quite a difference to the elapsed time, as the [Listing 9-2](#Chapter09.html#list_9_2)\
    \ demonstrates.\n\n***Listing 9-2.** The Cost of Calling a PL/SQL Function from\
    \ SQL (Using the Function)*\n\n```sql\nSQL> CREATE FUNCTION plsql_function(\n\
    \  2                   p_number IN NUMBER\n  3                   ) RETURN NUMBER\
    \ AS\n  4  BEGIN\n  5     RETURN p_number;\n  6  END plsql_function;\n  7  /\n\
    \nFunction created.\n\nSQL> SELECT plsql_function(ROWNUM) AS r\n  2  FROM   dual\n\
    \  3  CONNECT BY ROWNUM <= 1e6;\n\n1000000 rows selected.\n\nElapsed: 00:00:05.61\n\
    ```\n\nI’ve omitted the `Autotrace` output as it is almost identical to that of\
    \ the baseline SQL, but you can see that adding a call to the function has added\
    \ almost 4 seconds to the runtime of this simplest of queries.\n\nAs stated earlier,\
    \ it is not possible to directly measure context-switching as such, but you can\
    \ use tools such as `SQL trace`, the `PL/SQL Hierarchical Profiler` (an `Oracle\
    \ Database 11g` feature), or the `V$SESS_TIME_MODEL` view to measure the time\
    \ spent in the PL/SQL engine overall. [Listing 9-3](#Chapter09.html#list_9_3)\
    \ shows the summary results of a Hierarchical Profiler session for the previous\
    \ SQL.\n\n***Listing 9-3.** The Cost of Calling a PL/SQL Function from SQL (Hierarchical\
    \ Profiler Results)*\n\n```text\nFUNCTION                     LINE#      CALLS\
    \ SUB_ELA_US FUNC_ELA_US\n-------------------------- ------ ---------- ----------\
    \ -----------\n__plsql_vm                      0    1000003    3122985     2006576\n\
    PLSQL_FUNCTION                  1    1000000    1116012     1116012\n__anonymous_block\
    \               0          3        397         311\nDBMS_OUTPUT.GET_LINES   \
    \      180          2         86          82\nDBMS_OUTPUT.GET_LINE          129\
    \          2          4           4\nDBMS_HPROF.STOP_PROFILING      59       \
    \   1          0           0\n```"
  raw: '### The Cost of Using PL/SQL Functions in SQL


    The SQL and PL/SQL languages are seamlessly integrated. Since Oracle Database
    9*i*, the two languages have even shared the same parser. We use this inter-operability
    to our advantage in most of the code that we write, such as SQL cursors in PL/SQL
    programs or PL/SQL functions that are called from SQL. We often do this with little
    concern for what Oracle Database has to do under the covers to run our programs.


    Despite this integration, there is a runtime cost to combining them, in particular
    when calling PL/SQL from SQL (the focus of this chapter, of course). I’m going
    to spend the next few pages exploring some of these costs. What is interesting
    is that Oracle has been working hard to reduce the impact of combining SQL and
    PL/SQL code over several versions, so the issues I describe are not necessarily
    in their final state.


    My investigation of the costs of using PL/SQL functions in SQL can be broken down
    into three main areas:


    *   Performance

    *   Predictability (which is related to performance)

    *   Side effects


    ![images](images/square.jpg) **Note** I do not cover syntactic or operational
    restrictions (such as DML being prohibited in PL/SQL functions called from SQL).
    These are not runtime costs as such and are well-documented elsewhere.


    #### Context-Switching


    Context-switching is an almost-irreducible cost of computing that occurs in CPUs,
    operating systems, and software. The mechanics differ depending on where it is
    occurring, but it is often a CPU-intensive operation that designers attempt to
    tune as much as is possible.


    When we consider “context switching” in relation to Oracle Database, we specifically
    refer to the exchange of processing control between the SQL and PL/SQL engines
    (without necessarily understanding what occurs in such a process). These two engines
    are separate and distinct but we use them interchangeably. This means that when
    we call SQL from PL/SQL or vice versa, the calling context needs to store its
    process state and hand over control and data to its counterpart engine (which
    may or may not be picking up from an earlier switch). This switching cycle is
    computationally intensive and can typically be repeated so many times that its
    effects on response times can become quite noticeable.


    For many, the first encounter with context-switching in Oracle Database would
    have been the introduction of the BULK COLLECT and FORALL PL/SQL features in Oracle
    8*i*, designed *specifically* to reduce context-switching. These performance features
    made it possible to bind arrays of data between the SQL and PL/SQL engines in
    a single context-switch, dramatically reducing the number of context-switches
    that were generated by the row-by-row PL/SQL techniques that were prevalent at
    the time. For several major releases, almost all of the performance benefits of
    these language features could be attributed to the reduction in context-switching
    they facilitated. (In more recent releases, some further benefits such as redo
    optimization for bulk INSERT operations can also be realized when using PL/SQL
    array processing.)


    ![images](images/square.jpg) **Note** The reduction of context-switching is such
    an effective performance technique that the Oracle designers added an implicit
    BULK COLLECT for cursor-for-loops to the PL/SQL optimizing compiler introduced
    in Oracle Database 10*g*.


    All of which is good news for PL/SQL programmers, of course, but the effects of
    excessive context-switching are still encountered elsewhere. In particular, context-switching
    is a performance penalty to pay for calling PL/SQL functions from SQL.


    ##### Measuring Context-Switching


    As good as Oracle Database’s instrumentation is (and it is truly excellent), context-switching
    is not something that can be directly measured; it’s performed way down in the
    depths of the kernel and there is no simple statistic or counter available to
    quantify it. But given that context-switching is a fact of calling PL/SQL from
    SQL (and vice versa, though I shall cease to remind readers of this), its impact
    can be inferred with a simple set of measurements and supplied utilities.


    [Listing 9-1](#Chapter09.html#list_9_1) shows a simple comparison between two
    SQL statements, one of which calls a PL/SQL function for every row. The function
    does nothing but return the input parameter and the timings are compared using
    the SQL*Plus timer. I’ve used an array size of 500 and Autotrace to suppress the
    output.


    ***Listing 9-1.** The Cost of Calling a PL/SQL Function from SQL (Baseline)*


    `SQL> SELECT ROWNUM AS r`

    `  2  FROM   dual`

    `  3  CONNECT BY ROWNUM <= 1e6;`


    `1000000 rows selected.`


    **`Elapsed: 00:00:01.74`**


    `Statistics`

    `----------------------------------------------------------`

    `          0  recursive calls`

    `          0  db block gets`

    `          0  consistent gets`

    `          0  physical reads`

    `          0  redo size`

    `    6290159  bytes sent via SQL*Net to client`

    `      40417  bytes received via SQL*Net from client`

    `       2001  SQL*Net roundtrips to/from client`

    `          1  sorts (memory)`

    `          0  sorts (disk)`

    `    1000000  rows processed`


    The baseline SQL statement generated 1 million rows in less than 2 seconds. As
    you can see from the Autotrace output, a SQL statement of this form is light on
    resources other than CPU (and network transfer and memory at larger rowcounts).
    Adding a PL/SQL function call to the SQL makes quite a difference to the elapsed
    time, as the [Listing 9-2](#Chapter09.html#list_9_2) demonstrates.


    ***Listing 9-2.** The Cost of Calling a PL/SQL Function from SQL (Using the Function)*


    `SQL> CREATE FUNCTION plsql_function(`

    `  2                  p_number IN NUMBER`

    `  3                  ) RETURN NUMBER AS`

    `  4  BEGIN`

    `5     RETURN p_number;`

    `  6  END plsql_function;`

    `  7  /`


    `Function created.`


    `SQL> SELECT plsql_function(ROWNUM) AS r`

    `  2  FROM   dual`

    `  3  CONNECT BY ROWNUM <= 1e6;`


    `1000000 rows selected.`


    **`Elapsed: 00:00:05.61`**


    I’ve omitted the Autotrace output as it is almost identical to that of the baseline
    SQL, but you can see that adding a call to the function has added almost 4 seconds
    to the runtime of this simplest of queries.


    As stated earlier, it is not possible to directly measure context-switching as
    such, but you can use tools such as SQL trace, the PL/SQL Hierarchical Profiler
    (an Oracle Database 11*g* feature), or the V$SESS_TIME_MODEL view to measure the
    time spent in the PL/SQL engine overall. [Listing 9-3](#Chapter09.html#list_9_3)
    shows the summary results of a Hierarchical Profiler session for the previous
    SQL.


    ***Listing 9-3.** The Cost of Calling a PL/SQL Function from SQL (Hierarchical
    Profiler Results)*


    `FUNCTION                    LINE#      CALLS SUB_ELA_US FUNC_ELA_US`

    `-------------------------- ------ ---------- ---------- -----------`

    `__plsql_vm                      0    1000003    3122985     2006576`

    `PLSQL_FUNCTION                  1    1000000    1116012     1116012`

    `__anonymous_block               0          3        397         311`

    `DBMS_OUTPUT.GET_LINES         180          2         86          82`

    `DBMS_OUTPUT.GET_LINE          129          2          4           4`

    `DBMS_HPROF.STOP_PROFILING      59          1          0           0`'
  trans: "\n## 在 SQL 中使用 PL/SQL 函数的成本\n\nSQL 和 PL/SQL 语言是无缝集成的。自 `Oracle Database\
    \ 9i` 起，这两种语言甚至共享同一个解析器。在我们编写的大多数代码中，我们利用这种互操作性来获益，例如在 PL/SQL 程序中使用 SQL 游标，或从\
    \ SQL 调用 PL/SQL 函数。我们这样做时，通常很少关心 Oracle Database 在底层需要做些什么来运行我们的程序。\n\n尽管存在这种集成，但将它们结合起来使用仍会产生运行时成本，特别是在从\
    \ SQL 调用 PL/SQL 时（当然，这也是本章的重点）。在接下来的几页中，我将探讨其中的一些成本。有趣的是，Oracle 一直在努力减少在多个版本中结合\
    \ SQL 和 PL/SQL 代码的影响，因此我所描述的问题可能并非其最终状态。\n\n我对在 SQL 中使用 PL/SQL 函数成本的调查可以分为三个主要领域：\n\
    \n*   性能\n*   可预测性（与性能相关）\n*   副作用\n\n![images](img/square.jpg) **注意** 我不涉及语法或操作限制（例如禁止在从\
    \ SQL 调用的 PL/SQL 函数中使用 DML）。这些本身并非运行时成本，并且在其他地方有详细记载。\n\n### 上下文切换\n\n上下文切换是一种几乎无法减少的计算成本，它发生在\
    \ CPU、操作系统和软件中。其机制根据发生位置而不同，但它通常是一种 CPU 密集型操作，设计人员会尽可能地对其进行优化。\n\n当我们考虑与 Oracle\
    \ Database 相关的“上下文切换”时，我们特指 SQL 引擎和 PL/SQL 引擎之间处理控制的交换（而不必理解在此过程中发生了什么）。这两个引擎是独立且不同的，但我们交替使用它们。这意味着，当从\
    \ PL/SQL 调用 SQL 或反之亦然时，调用上下文需要存储其处理状态，并将控制权和数据移交给对应的引擎（该引擎可能从之前的某个切换点继续，也可能不）。这种切换循环计算密集，并且通常可以重复多次，以至于其对响应时间的影响可能变得相当明显。\n\
    \n对许多人来说，第一次接触 Oracle Database 中的上下文切换可能是在 `Oracle Database 8i` 中引入 `BULK COLLECT`\
    \ 和 `FORALL` PL/SQL 特性时，这些特性 *专门* 旨在减少上下文切换。这些性能特性使得可以在单个上下文切换中在 SQL 和 PL/SQL\
    \ 引擎之间绑定数据数组，极大地减少了当时流行的逐行 PL/SQL 技术所产生的上下文切换次数。在几个主要版本中，这些语言特性带来的几乎所有性能收益都可归因于它们促进的上下文切换减少。（在最近的版本中，当使用\
    \ PL/SQL 数组处理时，也可以实现一些进一步的收益，例如批量 INSERT 操作的重做优化。）\n\n![images](img/square.jpg)\
    \ **注意** 减少上下文切换是一种非常有效的性能技术，以至于 Oracle 设计人员在 `Oracle Database 10g` 引入的 PL/SQL\
    \ 优化编译器中，为游标 FOR 循环添加了隐式的 `BULK COLLECT`。\n\n所有这些对 PL/SQL 程序员来说当然是好消息，但过度上下文切换的影响在其他地方仍然会遇到。特别是，从\
    \ SQL 调用 PL/SQL 函数需要支付性能代价。\n\n#### 测量上下文切换\n\n尽管 Oracle Database 的工具非常出色（确实非常出色），但上下文切换本身无法直接测量；它发生在内核的深处，没有简单的统计信息或计数器可供量化。但鉴于从\
    \ SQL 调用 PL/SQL（反之亦然，虽然我将不再提醒读者这一点）必然导致上下文切换，其影响可以通过一组简单的测量和提供的实用程序推断出来。\n\n代码清单\
    \ 9-1 展示了两个 SQL 语句的简单比较，其中一个语句为每一行调用一个 PL/SQL 函数。该函数除了返回输入参数外不执行任何操作，时间使用 `SQL*Plus`\
    \ 计时器进行比较。我使用了 500 的数组大小和 `Autotrace` 来抑制输出。\n\n***代码清单 9-1.** 从 SQL 调用 PL/SQL\
    \ 函数的成本（基线）*\n\n```sql\nSQL> SELECT ROWNUM AS r\n  2  FROM   dual\n  3  CONNECT\
    \ BY ROWNUM <= 1e6;\n\n1000000 rows selected.\n\nElapsed: 00:00:01.74\n\nStatistics\n\
    ----------------------------------------------------------\n          0  recursive\
    \ calls\n          0  db block gets\n          0  consistent gets\n          0\
    \  physical reads\n          0  redo size\n    6290159  bytes sent via SQL*Net\
    \ to client\n      40417  bytes received via SQL*Net from client\n       2001\
    \  SQL*Net roundtrips to/from client\n          1  sorts (memory)\n          0\
    \  sorts (disk)\n    1000000  rows processed\n```\n\n基线 SQL 语句在不到 2 秒的时间内生成了 100\
    \ 万行数据。从 `Autotrace` 输出可以看出，这种形式的 SQL 语句除了 CPU（以及更大的行数下的网络传输和内存）外，对资源消耗很小。在 SQL\
    \ 中添加 PL/SQL 函数调用对经过时间有很大影响，如代码清单 9-2 所示。\n\n***代码清单 9-2.** 从 SQL 调用 PL/SQL 函数的成本（使用函数）*\n\
    \n```sql\nSQL> CREATE FUNCTION plsql_function(\n  2                   p_number\
    \ IN NUMBER\n  3                   ) RETURN NUMBER AS\n  4  BEGIN\n  5     RETURN\
    \ p_number;\n  6  END plsql_function;\n  7  /\n\nFunction created.\n\nSQL> SELECT\
    \ plsql_function(ROWNUM) AS r\n  2  FROM   dual\n  3  CONNECT BY ROWNUM <= 1e6;\n\
    \n1000000 rows selected.\n\nElapsed: 00:00:05.61\n```\n\n我省略了 `Autotrace` 输出，因为它与基线\
    \ SQL 的输出几乎相同，但你可以看到，添加对这个最简单查询的函数调用几乎增加了 4 秒的运行时间。\n\n如前所述，无法直接测量上下文切换本身，但你可以使用诸如\
    \ `SQL trace`、`PL/SQL Hierarchical Profiler`（`Oracle Database 11g` 特性）或 `V$SESS_TIME_MODEL`\
    \ 视图等工具来测量在 PL/SQL 引擎中花费的总时间。代码清单 9-3 显示了针对先前 SQL 的 Hierarchical Profiler 会话的摘要结果。\n\
    \n***代码清单 9-3.** 从 SQL 调用 PL/SQL 函数的成本（Hierarchical Profiler 结果）*\n\n```text\n\
    FUNCTION                     LINE#      CALLS SUB_ELA_US FUNC_ELA_US\n--------------------------\
    \ ------ ---------- ---------- -----------\n__plsql_vm                      0\
    \    1000003    3122985     2006576\nPLSQL_FUNCTION                  1    1000000\
    \    1116012     1116012\n__anonymous_block               0          3       \
    \ 397         311\nDBMS_OUTPUT.GET_LINES         180          2         86   \
    \       82\nDBMS_OUTPUT.GET_LINE          129          2          4          \
    \ 4\nDBMS_HPROF.STOP_PROFILING      59          1          0           0\n```\n"
- fmt: "This profile clearly shows that the `PL/SQL` function was called 1 million\
    \ times and this accounted for a little over 1 second of elapsed time. What is\
    \ also interesting is the fact that the `PL/SQL` VM (the `PL/SQL` engine) spent\
    \ 2 seconds of processing time outside of the function. Some of this time can\
    \ be attributed to context-switching. Overall, the `PL/SQL` engine accounted for\
    \ over 3 seconds of elapsed time. (Note that the `DBMS_OUTPUT` calls are a consequence\
    \ of the `serveroutput` setting in `SQL*Plus` and are no more than background\
    \ noise in this instance.)\n\n![images](images/square.jpg) Note: For a detailed\
    \ discussion on the `PL/SQL` Hierarchical Profiler, see [Chapter 13](#Chapter13.html#ch13).\n\
    \nThese figures are validated by an extended `SQL` trace of the query, as the\
    \ `TKProf` output in [Listing 9-4](#Chapter09.html#list_9_4) demonstrates.\n\n\
    **Listing 9-4.** The Cost of Calling a PL/SQL Function from SQL (tkprof Output)\n\
    ```\ncall     count       cpu    elapsed       disk      query    current    \
    \    rows\n------- ------  -------- ---------- ---------- ---------- ----------\
    \  ----------\nParse        1      0.00       0.00          0          0     \
    \     0           0\nExecute      1      0.00       0.00          0          0\
    \          0           0\nFetch     2001      4.92       5.08          0     \
    \     0          0     1000000\n------- ------  -------- ---------- ----------\
    \ ---------- ----------  ----------\ntotal     2003      4.92       5.08     \
    \     0          0          0     1000000\n\n<snip>\n\nRows (1st)   Row Source\
    \ Operation\n----------   ---------------------------------------------------\n\
    \   1000000   COUNT  (cr=0 pr=0 pw=0 time=3595520 us)\n   1000000    CONNECT BY\
    \ WITHOUT FILTERING (cr=0 pr=0 pw=0 time=1693263 us)\n         1     FAST DUAL\
    \  (cr=0 pr=0 pw=0 time=28 us cost=2 size=0 card=1)\n```\n\nI’ve removed the Rows\
    \ (max) and Rows (avg) statistics to shrink the output, but you can see from the\
    \ rowsource statistics that it took approximately 3.6 seconds to project the 1\
    \ million rows for the resultset (this includes a small amount of network transfer\
    \ time that was shown in the associated waits summary), yet it took just 1.7 seconds\
    \ to generate the rows in the first place.\n\nThese examples are as simple as\
    \ possible to demonstrate the cost of calling of `PL/SQL` functions from `SQL`.\
    \ Despite their trivial timings, you can clearly see that the `PL/SQL` function\
    \ adds a significant overhead to the response time (over 300%). Of course, `PL/SQL`\
    \ functions that have much longer elapsed times (especially those functions that\
    \ include `SQL`) will cause you far greater performance issues than context-switching\
    \ problem. For `PL/SQL`-only functions (i.e. no `SQL` in the function body), however,\
    \ context-switching can be a major part of the `PL/SQL` VM’s elapsed time.\n\n\
    Context-switching can also have a performance impact on queries that have plenty\
    \ of other work to do, such as accessing and joining sets of data. In [Listing\
    \ 9-5](#Chapter09.html#list_9_5), I have a lightweight `PL/SQL` function and I’ve\
    \ used this to format part of a sales report. As before, I’ve used `Autotrace`\
    \ and `SQL*Plus` timing to record the runtime statistics.\n\n**Listing 9-5.**\
    \ Context-Switching in More Intensive Queries\n```\nSQL> CREATE FUNCTION format_customer_name\
    \ (\n  2                  p_first_name IN VARCHAR2,\n  3                  p_last_name\
    \  IN VARCHAR2\n  4                  ) RETURN VARCHAR2 AS\n  5  BEGIN\n  6   \
    \  RETURN p_first_name || ' ' || p_last_name;\n  7  END format_customer_name;\n\
    \  8  /\nFunction created.\n\nSQL> SELECT t.calendar_year\n  2  ,      format_customer_name(\n\
    \            c.cust_first_name, c.cust_last_name\n            )              \
    \   AS cust_name\n  3  ,      SUM(s.quantity_sold) AS qty_sold\n  4  ,      SUM(s.amount_sold)\
    \   AS amt_sold\n  5  FROM   sales     s\n  6  ,      customers c\n  7  ,    \
    \  times     t\n  8  WHERE  s.cust_id = c.cust_id\n  9  AND    s.time_id = t.time_id\n\
    \ 10  GROUP  BY\n         t.calendar_year\n 11  ,      format_customer_name(\n\
    \            c.cust_first_name, c.cust_last_name\n            )\n 12  ;\n\n11604\
    \ rows selected.\n```\n\n**Elapsed: 00:00:06.94**\n```\nStatistics\n----------------------------------------------------------\n\
    \       3216  consistent gets\n          0  physical reads\n```\n\nNote that I’ve\
    \ trimmed the `Autotrace` output to include just the I/O statistics. The report\
    \ completed in approximately 7 seconds. I’ve compared this to a `SQL`-only implementation\
    \ in [Listing 9-6](#Chapter09.html#list_9_6).\n\n**Listing 9-6.** Context-Switching\
    \ in More Intensive Queries (SQL Implementation)\n```\nSQL> SELECT t.calendar_year\n\
    \  2  ,      c.cust_first_name || ' ' || c.cust_last_name AS cust_name\n  3  ,\
    \      SUM(s.quantity_sold)                          AS qty_sold\n  4  ,     \
    \ SUM(s.amount_sold)                            AS amt_sold\n  5  FROM   sales\
    \     s\n  6  ,      customers c\n  7  ,      times     t\n  8  WHERE  s.cust_id\
    \ = c.cust_id\n  9  AND    s.time_id = t.time_id\n 10  GROUP  BY\n         t.calendar_year\n\
    \ 11  ,      c.cust_first_name || ' ' || c.cust_last_name\n 12  ;\n\n11604 rows\
    \ selected.\n```\n\n**Elapsed: 00:00:01.40**\n```\nStatistics\n----------------------------------------------------------\n\
    \       3189  consistent gets\n          0  physical reads\n```\n\nBy removing\
    \ the function in favor of a `SQL` expression, the runtime of the report reduced\
    \ to less than 1.5 seconds. You can see, therefore, that even when accessing and\
    \ joining multiple rowsources, the presence of a `PL/SQL` function can still impact\
    \ the overall response time of the query.\n\n##### Other PL/SQL Function Types\n\
    \nThe context-switching penalty applies to any `PL/SQL` source that is invoked\
    \ from `SQL` (including user-defined aggregate functions, type methods, or table\
    \ functions). A good example is the `STRAGG` function that Tom Kyte wrote many\
    \ years back to demonstrate user-defined aggregate functions (then a new feature\
    \ of Oracle 9*i*). Until Oracle Database 11*g*, there was no built-in equivalent\
    \ to `STRAGG`, so this utility function became extremely popular as a solution\
    \ to string-aggregation problems on Oracle forums.\n\nThe release of the `LISTAGG`\
    \ built-in function provides a significant performance boost over `STRAGG` by\
    \ simply removing the need for the `SQL` engine to perform context-switching.\
    \ I’ve demonstrated this in [Listing 9-7](#Chapter09.html#list_9_7) with a simple\
    \ example of aggregating the range of IDs for each customer in the supplied `SH.CUSTOMERS`\
    \ table.\n\n**Listing 9-7.** Built-in vs. User-Defined Aggregate Function\n```\n\
    SQL> SELECT cust_first_name\n  2  ,      cust_last_name\n  3  ,      LISTAGG(cust_id)\
    \ WITHIN GROUP (ORDER BY NULL)\n  4  FROM   customers\n  5  GROUP  BY\n      \
    \   cust_first_name\n  6  ,      cust_last_name;\n\n5601 rows selected.\n```\n\
    \n**Elapsed: 00:00:00.23**\n```\nSQL> SELECT cust_first_name\n  2  ,      cust_last_name\n\
    \  3  ,      STRAGG(cust_id)\n  4  FROM   customers\n  5  GROUP  BY\n        \
    \ cust_first_name\n  6  ,      cust_last_name;\n\n5601 rows selected.\n```\n\n\
    **Elapsed: 00:00:01.40**\n\nI’ve suppressed the `Autotrace` output, but neither\
    \ method incurs any physical I/O and the logical I/O is identical. Yet the user-defined\
    \ aggregate function takes over six times longer than the built-in equivalent.\n\
    \nIn summary, I’ve demonstrated that simply calling `PL/SQL` functions from `SQL`\
    \ can be expensive, regardless of the nature of the function itself. Later, I’ll\
    \ demonstrate various methods you can apply to reduce or remove this cost altogether\
    \ from your `SQL` queries."
  raw: 'This profile clearly shows that the PL/SQL function was called 1 million times
    and this accounted for a little over 1 second of elapsed time. What is also interesting
    is the fact that the PL/SQL VM (the PL/SQL engine) spent 2 seconds of processing
    time outside of the function. Some of this time can be attributed to context-switching.
    Overall, the PL/SQL engine accounted for over 3 seconds of elapsed time. (Note
    that the `DBMS_OUTPUT` calls are a consequence of the serveroutput setting in
    SQL*Plus and are no more than background noise in this instance.)


    ![images](images/square.jpg) **Note** For a detailed discussion on the PL/SQL
    Hierarchical Profiler, see [Chapter 13](#Chapter13.html#ch13).


    These figures are validated by an extended SQL trace of the query, as the TKProf
    output in [Listing 9-4](#Chapter09.html#list_9_4) demonstrates.


    ***Listing 9-4.** The Cost of Calling a PL/SQL Function from SQL (tkprof Output)*


    `call     count       cpu    elapsed       disk      query    current        rows`

    `------- ------  -------- ---------- ---------- ---------- ----------  ----------`

    `Parse        1      0.00       0.00          0          0          0          
    0`

    `Execute      1      0.00       0.00          0          0          0          
    0`

    `Fetch     2001      4.92       5.08          0          0          0     1000000`

    `------- ------  -------- ---------- ---------- ---------- ----------  ----------`

    `total     2003      4.92       5.08          0          0          0     1000000`


    `<snip>`


    `Rows (1st)   Row Source Operation`

    `----------   ---------------------------------------------------`

    `   1000000   COUNT  (cr=0 pr=0 pw=0 time=3595520 us)`

    `   1000000    CONNECT BY WITHOUT FILTERING (cr=0 pr=0 pw=0 time=1693263 us)`

    `         1     FAST DUAL  (cr=0 pr=0 pw=0 time=28 us cost=2 size=0 card=1)`


    I’ve removed the Rows (max) and Rows (avg) statistics to shrink the output, but
    you can see from the rowsource statistics that it took approximately 3.6 seconds
    to project the 1 million rows for the resultset (this includes a small amount
    of network transfer time that was shown in the associated waits summary), yet
    it took just 1.7 seconds to generate the rows in the first place.


    These examples are as simple as possible to demonstrate the cost of calling of
    PL/SQL functions from SQL. Despite their trivial timings, you can clearly see
    that the PL/SQL function adds a significant overhead to the response time (over
    300%). Of course, PL/SQL functions that have much longer elapsed times (especially
    those functions that include SQL) will cause you far greater performance issues
    than context-switching problem. For PL/SQL-only functions (i.e. no SQL in the
    function body), however, context-switching can be a major part of the PL/SQL VM’s
    elapsed time.


    Context-switching can also have a performance impact on queries that have plenty
    of other work to do, such as accessing and joining sets of data. In [Listing 9-5](#Chapter09.html#list_9_5),
    I have a lightweight PL/SQL function and I’ve used this to format part of a sales
    report. As before, I’ve used Autotrace and SQL*Plus timing to record the runtime
    statistics.


    ***Listing 9-5.** Context-Switching in More Intensive Queries*


    `SQL> CREATE FUNCTION format_customer_name (`

    `  2                  p_first_name IN VARCHAR2,`

    `  3                  p_last_name  IN VARCHAR2`

    `  4                  ) RETURN VARCHAR2 AS`

    `  5  BEGIN`

    `  6     RETURN p_first_name || '' '' || p_last_name;`

    `  7  END format_customer_name;`

    `  8  /`


    `Function created.`


    `SQL> SELECT t.calendar_year`

    `  2  ,      format_customer_name(`

    `  3            c.cust_first_name, c.cust_last_name`

    `  4            )                 AS cust_name`

    `  5  ,      SUM(s.quantity_sold) AS qty_sold`

    `6  ,      SUM(s.amount_sold)   AS amt_sold`

    `  7  FROM   sales     s`

    `  8  ,      customers c`

    `  9  ,      times     t`

    ` 10  WHERE  s.cust_id = c.cust_id`

    ` 11  AND    s.time_id = t.time_id`

    ` 12  GROUP  BY`

    ` 13         t.calendar_year`

    ` 14  ,      format_customer_name(`

    ` 15            c.cust_first_name, c.cust_last_name`

    ` 16            )`

    ` 17  ;`


    `11604 rows selected.`


    **`Elapsed: 00:00:06.94`**


    `Statistics`

    `----------------------------------------------------------`

    `       3216  consistent gets`

    `          0  physical reads`


    Note that I’ve trimmed the Autotrace output to include just the I/O statistics.
    The report completed in approximately 7 seconds. I’ve compared this to a SQL-only
    implementation in [Listing 9-6](#Chapter09.html#list_9_6).


    ***Listing 9-6.** Context-Switching in More Intensive Queries (SQL Implementation)*


    `SQL> SELECT t.calendar_year`

    `  2  ,      c.cust_first_name || '' '' || c.cust_last_name AS cust_name`

    `  3  ,      SUM(s.quantity_sold)                         AS qty_sold`

    `  4  ,      SUM(s.amount_sold)                           AS amt_sold`

    `  5  FROM   sales     s`

    `  6  ,      customers c`

    `  7  ,      times     t`

    `  8  WHERE  s.cust_id = c.cust_id`

    `  9  AND    s.time_id = t.time_id`

    ` 10  GROUP  BY`

    ` 11         t.calendar_year`

    ` 12  ,      c.cust_first_name || '' '' || c.cust_last_name`

    ` 13  ;`


    `11604 rows selected.`


    **`Elapsed: 00:00:01.40`**


    `Statistics`

    `----------------------------------------------------------`

    `       3189  consistent gets`

    `          0  physical reads`


    By removing the function in favor of a SQL expression, the runtime of the report
    reduced to less than 1.5 seconds. You can see, therefore, that even when accessing
    and joining multiple rowsources, the presence of a PL/SQL function can still impact
    the overall response time of the query.


    ##### Other PL/SQL Function Types


    The context-switching penalty applies to any PL/SQL source that is invoked from
    SQL (including user-defined aggregate functions, type methods, or table functions).
    A good example is the `STRAGG` function that Tom Kyte wrote many years back to
    demonstrate user-defined aggregate functions (then a new feature of Oracle 9*i*).
    Until Oracle Database 11*g*, there was no built-in equivalent to `STRAGG`, so
    this utility function became extremely popular as a solution to string-aggregation
    problems on Oracle forums.


    The release of the `LISTAGG` built-in function provides a significant performance
    boost over `STRAGG` by simply removing the need for the SQL engine to perform
    context-switching. I’ve demonstrated this in [Listing 9-7](#Chapter09.html#list_9_7)
    with a simple example of aggregating the range of IDs for each customer in the
    supplied SH.CUSTOMERS table.


    ***Listing 9-7.** Built-in vs. User-Defined Aggregate Function*


    `SQL> SELECT cust_first_name`

    `  2  ,      cust_last_name`

    **`  3  ,      LISTAGG(cust_id) WITHIN GROUP (ORDER BY NULL)`**

    `  4  FROM   customers`

    `  5  GROUP  BY`

    `  6         cust_first_name`

    `  7  ,      cust_last_name;`


    `5601 rows selected.`


    **`Elapsed: 00:00:00.23`**


    `SQL> SELECT cust_first_name`

    `  2  ,      cust_last_name`

    **`  3  ,      STRAGG(cust_id)`**

    `  4  FROM   customers`

    `  5  GROUP  BY`

    `  6         cust_first_name`

    `  7  ,      cust_last_name;`


    `5601 rows selected.`


    **`Elapsed: 00:00:01.40`**


    I’ve suppressed the Autotrace output, but neither method incurs any physical I/O
    and the logical I/O is identical. Yet the user-defined aggregate function takes
    over six times longer than the built-in equivalent.


    In summary, I’ve demonstrated that simply calling PL/SQL functions from SQL can
    be expensive, regardless of the nature of the function itself. Later, I’ll demonstrate
    various methods you can apply to reduce or remove this cost altogether from your
    SQL queries.'
  trans: "\n此性能剖析文件清晰地显示，`PL/SQL` 函数被调用了 100 万次，这占用了略高于 1 秒的耗时。同样有趣的是，`PL/SQL` 虚拟机（即\
