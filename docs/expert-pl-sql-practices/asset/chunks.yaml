    \    i_bank_trx               t_bank_trx\n   ,i_text                   varchar2\n\
    \  )\n  is\n  begin\n    bank_trx_dsp#.bank_trx#book(\n      i_bank_trx      \
    \    => i_bank_trx\n     ,i_bank_trx_type_id  => b_bank_trx_list(i_bank_trx).bank_trx_type_id\n\
    \     ,i_text              => i_text\n    );\n  end bank_trx#book;\n```\n\n分派器（这里只展示其主体）简单地根据类型调用正确的实现。\n\
    \n```sql\ncreate or replace package body bank_trx_dsp#\nis\n  procedure bank_trx#book(\n\
    \    i_bank_trx               bank_trx#.t_bank_trx\n   ,i_bank_trx_type_id   \
    \    bank_trx#.t_bank_trx_type\n   ,i_text                   varchar2\n  )\n \
    \ is\n  begin\n    if i_bank_trx_type_id = bank_trx_type#.c_pay_trx then\n   \
    \   pay_trx#.bank_trx#book(\n        i_bank_trx => i_bank_trx\n       ,i_text\
    \          => i_text\n      );\n    else\n      raise_application_error(-20000,\
    \ 'Unknown bank_trx_type_id: ' || i_bank_trx_type_id);\n    end if;\n  end bank_trx#book;\n\
    end bank_trx_dsp#;\n```\n\n如果子类型非常多，分派器中的 `if` 语句就会有很多分支。在这种情况下，使用嵌套 `if` 语句的二分查找能提供最佳的运行时性能。如果分派器是手工编码的，它可以实现在\
    \ `bank_trx#` 中，而不是一个单独的包中。\n\n## 子类型中的附加属性和方法\n\n如果支付交易需要普通银行交易中不存在的额外方法，我只需将它们添加到包\
    \ `pay_trx#` 中。如果支付交易需要一个额外的属性（例如，结算类型），我会在 `pay_trx#` 的主体中创建对应的记录类型和关联数组，如下所示：\n\
    \n```sql\ncreate or replace package body pay_trx#\nis\n  type t_pay_trx_rec is\
    \ record (\n    settle_type_id          t_settle_type\n  );\n  type t_pay_trx_tab\
    \ is table of t_pay_trx_rec index by bank_trx#.t_bank_trx;\n  b_pay_trx_list \
    \           t_pay_trx_tab;\n\n  function pay_trx#new(\n    i_amount          \
    \        number\n   ,i_settle_type_id          t_settle_type\n  ) return bank_trx#.t_bank_trx\n\
    \  is\n    l_idx                    bank_trx#.t_bank_trx;\n  begin\n    if nvl(i_amount,\
    \ -1) < 0 then\n      raise_application_error(-20000, 'Negative amount');\n  \
    \  end if;\n    l_idx := bank_trx#.bank_trx#new(\n      i_bank_trx_type_id =>\
    \ bank_trx_type#.c_pay_trx\n     ,i_amount           => i_amount\n    );\n   \
    \ b_pay_trx_list(l_idx).settle_type_id := i_settle_type_id;\n    return l_idx;\n\
    \  end pay_trx#new;\n```\n\n为了释放额外的状态，我还需要 `bank_trx#.bank_trx#remv` 通过分派器调用 `pay_trx#`\
    \ 中的移除方法。"
- fmt: "## Persistence of Objects as Records\n\nTo persist banking transactions implemented\
    \ in memory with the record approach, I create a plain vanilla table with the\
    \ respective columns.\n\n```sql\ncreate table bank_trx(\n  id                \
    \          integer\n ,bank_trx_type_id            integer\n ,amount          \
    \            number\n ,constraint bank_trx#p primary key(id)\n);\n```\n\nThe additional\
    \ attributes of subtypes, such as the settlement type of payment transactions,\
    \ can be stored in supplementary tables.\n\n```sql\ncreate table pay_trx(\n  bank_trx_id\
    \                integer\n ,settle_type_id             integer\n ,constraint pay_trx#p\
    \ primary key(bank_trx_id)\n ,constraint pay_trx#f#1 foreign key(bank_trx_id)\
    \ references bank_trx(id)\n);\n```\n\nThe disadvantage of this approach is that\
    \ multiple tables must be accessed. Alternatively, you can store the additional\
    \ fields in the base table, a fine solution if there are few fields and you don't\
    \ mind the conceptual ugliness. A third approach is to get rid of the base table\
    \ `bank_trx` and store all attributes in `pay_trx`. The disadvantages of this\
    \ form of object-relational mapping are two-fold: you have to create a union-all\
    \ view over all subtypes to find a transaction if you know only its ID, and Oracle\
    \ cannot enforce unique IDs over all types of transactions stored in multiple\
    \ tables using a simple primary key constraint.\n\n### Assessment\n\nThe good\
    \ news is that it is possible to do object-oriented programming in PL/SQL as well\
    \ as in C and most other procedural programming languages. The bad news is that\
    \ getting all the features requires some additional glue code. Fortunately, the\
    \ glue code may largely be generated.\n\nIf an application requires only a handful\
    \ of type hierarchies and if they are just a few levels deep, PL/SQL is suitable.\
    \ If, on the other hand, hundreds of different types with subtypes are required,\
    \ I'd look for a different solution. The Avaloq Banking System described at the\
    \ beginning of this chapter has two type hierarchies: banking transactions and\
    \ static data objects. Each hierarchy has only two levels: a base type and hundreds\
    \ of subtypes. In addition, there are dozens of standalone types without any subtypes.\
    \ For these standalone types, no dispatchers are required, resulting in an implementation\
    \ as simple as in an object-oriented language.\n\n## Memory Management\n\nLarge\
    \ programs commonly require lots of memory, whether objects are stored in collections\
    \ as described earlier or whether other patterns are used. Therefore, you need\
    \ to know how to measure memory usage to detect problems, such as memory leaks.\
    \ Collections consume most of the PL/SQL memory; therefore you need to understand\
    \ how they allocate memory.\n\nMost large PL/SQL applications use dedicated rather\
    \ than shared server processes. Therefore, I focus on dedicated server processes\
    \ and ignore shared server processes, in which the UGA (and, therefore, most PL/SQL\
    \ memory) resides in the SGA.\n\n![images](images/square.jpg) **Note** With PL/SQL\
    \ variables you can allocate more memory than defined by `pga_aggregate_target`,\
    \ which specifies the target aggregate PGA memory available to all server processes\
    \ attached to the instance. PL/SQL memory is considered untunable. Oracle simply\
    \ allocates memory as requested as long as the OS provides it.\n\n### Measuring\
    \ Memory Usage\n\nThere are multiple ways to measure the memory usage of processes,\
    \ corresponding one-to-one to connections and in most cases also sessions. The\
    \ view `v$process` is often used as a starting point.\n\n```sql\nSQL> select se.sid\n\
    \  2        ,se.username\n  3        ,round(pr.pga_used_mem / power(1024, 2))\
    \     pga_used_mb\n  4        ,round(pr.pga_alloc_mem / power(1024, 2))    pga_alloc_mb\n\
    \  5        ,round(pr.pga_freeable_mem / power(1024, 2)) pga_freeable_mb\n  6\
    \        ,round(pr.pga_max_mem / power(1024, 2))      pga_max_mb\n  7  from  \
    \ v$session se\n  8        ,v$process pr\n  9  where  se.paddr = pr.addr\n 10\
    \     and se.type != 'BACKGROUND'\n 11  order by pr.pga_alloc_mem desc;\n```\n\
    ```\n  SID USERNAME PGA_USED_MB PGA_ALLOC_MB PGA_FREEABLE_MB PGA_MAX_MB\n-----\
    \ -------- ----------- ------------ --------------- ----------\n  173 K      \
    \             35           39               3         39\n   91 K            \
    \       16           28              10         28\n   50 K                  \
    \ 19           23               3         24\n  376 K                   13   \
    \        13               0         13\n```\n\nThe first three memory figures\
    \ denote the currently used, allocated, and freeable memory, where used plus freeable\
    \ roughly equals allocated. The column `pga_max_mem` returns the maximum size\
    \ the process ever had. Note that your system may show slightly different values\
    \ for all experiments in this section as memory usage depends upon the exact Oracle\
    \ release and operating system.\n\nThe view `v$process_memory`, introduced in\
    \ 10g but buggy prior to 11g, provides a drill-down. I illustrate this with a\
    \ procedure that prints the current memory usage of the session.\n\n```sql\ncreate\
    \ or replace procedure print_session_mem\nis\nbegin\n  dbms_output.put_line('Category\
    \  Allocated KB     Used KB  Max all KB');\n  dbms_output.put_line('----------------------------------------------');\n\
    \  for c in (\n    select pm.*\n    from   v$session        se\n          ,v$process\
    \        pr\n          ,v$process_memory pm\n    where  se.sid   = sys_context('userenv',\
    \ 'sid')\n       and se.paddr = pr.addr\n       and pr.pid   = pm.pid\n  ) loop\n\
    \    dbms_output.put_line(rpad(c.category, 10)\n                      || to_char(round(c.allocated\
    \     / 1024), '999G999G999')\n                      || to_char(round(c.used \
    \         / 1024), '999G999G999')\n                      || to_char(round(c.max_allocated\
    \ / 1024), '999G999G999'));\n  end loop;\nend print_session_mem;\n```\n\nI then\
    \ print the initial memory usage.\n\n```sql\nSQL> set serveroutput on\nSQL> exec\
    \ print_session_mem\nCategory  Allocated KB     Used KB  Max all KB\n----------------------------------------------\n\
    SQL                   44          38          44\nPL/SQL                38   \
    \       33          38\nOther                982         982\n\nPL/SQL procedure\
    \ successfully completed.\n```\n\nTo allocate memory, I create a package with\
    \ a global associative array.\n\n```sql\ncreate or replace package mem#\nis\n\
    \  type t_char1000_tab is table of varchar2(1000) index by pls_integer;\n  g_list\
    \                         t_char1000_tab;\nend mem#;\n```\n\nNext, I fill the\
    \ global variable with data and print the memory usage again.\n\n```sql\nSQL>\
    \ begin\n  2    select lpad('x', 1000, 'x')\n  3    bulk collect into mem#.g_list\n\
    \  4    from   dual\n  5    connect by level <= 100000;\n  6  end;\n  7  /\n\n\
    PL/SQL procedure successfully completed.\n\nSQL> exec print_session_mem\nCategory\
    \  Allocated KB     Used KB  Max all KB\n----------------------------------------------\n\
    SQL                   58          46       4,782\nPL/SQL           114,052   \
    \  113,766     114,056\nOther              7,594       7,594\n\nPL/SQL procedure\
    \ successfully completed.\n```\n\nThe PL/SQL memory usage jumped from 33 KB to\
    \ 113,766 KB. The category `Other`, which contains miscellaneous structures, also\
    \ increased. Next, I delete the associative array and measure the memory usage\
    \ once more.\n\n```sql\nSQL> exec mem#.g_list.delete\n\nPL/SQL procedure successfully\
    \ completed.\n```"
  raw: '##### Persistence of Objects as Records


    To persist banking transactions implemented in memory with the record approach,
    I create a plain vanilla table with the respective columns.


    `create table bank_trx(`

    `  id                          integer`

    ` ,bank_trx_type_id            integer`

    ` ,amount                      number`

    ` ,constraint bank_trx#p primary key(id)`

    `);`


    The additional attributes of subtypes, such as the settlement type of payment
    transactions, can be stored in supplementary tables.


    `create table pay_trx(`

    `  bank_trx_id                integer`

    ` ,settle_type_id             integer`

    ` ,constraint pay_trx#p primary key(bank_trx_id)`

    ` ,constraint pay_trx#f#1 foreign key(bank_trx_id) references bank_trx(id)`

    `);`


    The disadvantage of this approach is that multiple tables must be accessed. Alternatively,
    you can store the additional fields in the base table, a fine solution if there
    are few fields and you don''t mind the conceptual ugliness. A third approach is
    to get rid of the base table bank_trx and store all attributes in pay_trx. The
    disadvantages of this form of object-relational mapping are two-fold: you have
    to create a union-all view over all subtypes to find a transaction if you know
    only its ID, and Oracle cannot enforce unique IDs over all types of transactions
    stored in multiple tables using a simple primary key constraint.


    #### Assessment


    The good news is that it is possible to do object-oriented programming in PL/SQL
    as well as in C and most other procedural programming languages. The bad news
    is that getting all the features requires some additional glue code. Fortunately,
    the glue code may largely be generated.


    If an application requires only a handful of type hierarchies and if they are
    just a few levels deep, PL/SQL is suitable. If, on the other hand, hundreds of
    different types with subtypes are required, I''d look for a different solution.
    The Avaloq Banking System described at the beginning of this chapter has two type
    hierarchies: banking transactions and static data objects. Each hierarchy has
    only two levels: a base type and hundreds of subtypes. In addition, there are
    dozens of standalone types without any subtypes. For these standalone types, no
    dispatchers are required, resulting in an implementation as simple as in an object-oriented
    language.


    ### Memory Management


    Large programs commonly require lots of memory, whether objects are stored in
    collections as described earlier or whether other patterns are used. Therefore,
    you need to know how to measure memory usage to detect problems, such as memory
    leaks. Collections consume most of the PL/SQL memory; therefore you need to understand
    how they allocate memory.


    Most large PL/SQL applications use dedicated rather than shared server processes.
    Therefore, I focus on dedicated server processes and ignore shared server processes,
    in which the UGA (and, therefore, most PL/SQL memory) resides in the SGA.


    ![images](images/square.jpg) **Note** With PL/SQL variables you can allocate more
    memory than defined by pga_aggregate_target, which specifies the target aggregate
    PGA memory available to all server processes attached to the instance. PL/SQL
    memory is considered untunable. Oracle simply allocates memory as requested as
    long as the OS provides it.


    #### Measuring Memory Usage


    There are multiple ways to measure the memory usage of processes, corresponding
    one-to-one to connections and in most cases also sessions. The view v$process
    is often used as a starting point.


    `SQL> select se.sid`

    `  2        ,se.username`

    `  3        ,round(pr.pga_used_mem / power(1024, 2))     pga_used_mb`

    `  4        ,round(pr.pga_alloc_mem / power(1024, 2))    pga_alloc_mb`

    `  5        ,round(pr.pga_freeable_mem / power(1024, 2)) pga_freeable_mb`

    `  6        ,round(pr.pga_max_mem / power(1024, 2))      pga_max_mb`

    `  7  from   v$session se`

    `  8        ,v$process pr`

    `  9  where  se.paddr = pr.addr`

    ` 10     and se.type != ''BACKGROUND''`

    ` 11  order by pr.pga_alloc_mem desc;`


    `  SID USERNAME PGA_USED_MB PGA_ALLOC_MB PGA_FREEABLE_MB PGA_MAX_MB`

    `----- -------- ----------- ------------ --------------- ----------`

    `  173 K                 35           39               3         39`

    `   91 K                 16           28              10         28`

    `   50 K                 19           23               3         24`

    `  376 K                 13           13               0         13`


    The first three memory figures denote the currently used, allocated, and freeable
    memory, where used plus freeable roughly equals allocated. The column pga_max_mem
    returns the maximum size the process ever had. Note that your system may show
    slightly different values for all experiments in this section as memory usage
    depends upon the exact Oracle release and operating system.


    The view v$process_memory, introduced in 10g but buggy prior to 11g, provides
    a drill-down. I illustrate this with a procedure that prints the current memory
    usage of the session.


    `create or replace procedure print_session_mem`

    `is`

    `begin`

    `  dbms_output.put_line(''Category  Allocated KB     Used KB  Max all KB'');`

    `  dbms_output.put_line(''----------------------------------------------'');`

    `  for c in (`

    `    select pm.*`

    `    from   v$session        se`

    `          ,v$process        pr`

    `          ,v$process_memory pm`

    `    where  se.sid   = sys_context(''userenv'', ''sid'')`

    `       and se.paddr = pr.addr`

    `       and pr.pid   = pm.pid`

    `  ) loop`

    `    dbms_output.put_line(rpad(c.category, 10)`

    `                      || to_char(round(c.allocated     / 1024), ''999G999G999'')`

    `                      || to_char(round(c.used          / 1024), ''999G999G999'')`

    `                      || to_char(round(c.max_allocated / 1024), ''999G999G999''));`

    `  end loop;`

    `end print_session_mem;`


    I then print the initial memory usage.


    `SQL> set serveroutput on`

    `SQL> exec print_session_mem`

    `Category  Allocated KB     Used KB  Max all KB`

    `----------------------------------------------`

    `SQL                 44          38          44`

    `PL/SQL              38          33          38`

    `Other              982         982`


    `PL/SQL procedure successfully completed.`


    To allocate memory, I create a package with a global associative array.


    `create or replace package mem#`

    `is`

    `  type t_char1000_tab is table of varchar2(1000) index by pls_integer;`

    `  g_list                     t_char1000_tab;`

    `end mem#;`


    Next, I fill the global variable with data and print the memory usage again.


    `SQL> begin`

    `  2    select lpad(''x'', 1000, ''x'')`

    `  3    bulk collect into mem#.g_list`

    `  4    from   dual`

    `  5    connect by level <= 100000;`

    `  6  end;`

    `  7  /`


    `PL/SQL procedure successfully completed.`


    `SQL> exec print_session_mem`

    `Category  Allocated KB     Used KB  Max all KB`

    `----------------------------------------------`

    `SQL                 58          46       4,782`

    `PL/SQL         114,052     113,766     114,056`

    `Other            7,594       7,594`


    `PL/SQL procedure successfully completed.`


    The PL/SQL memory usage jumped from 33 KB to 113,766 KB. The category Other, which
    contains miscellaneous structures, also increased. Next, I delete the associative
    array and measure the memory usage once more.


    `SQL> exec mem#.g_list.delete`


    `PL/SQL procedure successfully completed.`'
  trans: "## 对象作为记录的持久化\n\n若要将内存中使用记录方法实现的银行交易持久化，我创建了一个包含相应列的普通表格。\n\n```sql\ncreate\
    \ table bank_trx(\n  id                          integer\n ,bank_trx_type_id \
    \           integer\n ,amount                      number\n ,constraint bank_trx#p\
    \ primary key(id)\n);\n```\n\n子类型的附加属性，例如支付交易的结算类型，可以存储在补充表中。\n\n```sql\ncreate\
    \ table pay_trx(\n  bank_trx_id                integer\n ,settle_type_id     \
    \        integer\n ,constraint pay_trx#p primary key(bank_trx_id)\n ,constraint\
    \ pay_trx#f#1 foreign key(bank_trx_id) references bank_trx(id)\n);\n```\n\n这种方法的缺点是需要访问多个表。或者，您可以将额外的字段存储在基表中，如果字段数量不多且您不介意概念上的不美观，这是一个不错的解决方案。第三种方法是去掉基表\
    \ `bank_trx`，将所有属性存储在 `pay_trx` 中。这种对象关系映射形式的缺点有两方面：如果您只知道交易 ID，您必须创建一个针对所有子类型的联合视图才能找到交易，并且\
    \ Oracle 无法通过简单的主键约束在存储于多个表中的所有类型交易上强制执行唯一 ID。\n\n### 评估\n\n好消息是，与 C 和大多数其他过程编程语言一样，在\
    \ PL/SQL 中进行面向对象编程是可行的。坏消息是，要获得所有特性需要一些额外的粘合代码。幸运的是，这些粘合代码大部分可以自动生成。\n\n如果一个应用程序只需要少数几个类型层次结构，并且它们只有几层深，那么\
    \ PL/SQL 是合适的。另一方面，如果需要数百种带有子类型的不同类型，我会寻找不同的解决方案。本章开头描述的 Avaloq 银行系统有两个类型层次结构：银行交易和静态数据对象。每个层次结构只有两层：一个基类型和数百个子类型。此外，还有几十个没有任何子类型的独立类型。对于这些独立类型，不需要调度器，其实现可以像在面向对象语言中一样简单。\n\
    \n## 内存管理\n\n大型程序通常需要大量内存，无论对象是否如前所述存储在集合中，或者使用了其他模式。因此，您需要知道如何测量内存使用情况以检测问题，例如内存泄漏。集合消耗了大部分\
    \ PL/SQL 内存；因此您需要了解它们是如何分配内存的。\n\n大多数大型 PL/SQL 应用程序使用专用服务器进程而非共享服务器进程。因此，我将重点放在专用服务器进程上，并忽略共享服务器进程，在共享服务器进程中\
    \ UGA（因此大部分 PL/SQL 内存）驻留在 SGA 中。\n\n![images](img/square.jpg) **注意** 使用 PL/SQL\
    \ 变量，您可以分配比`pga_aggregate_target`定义的更多的内存，该参数指定了实例上所有服务器进程可用的总 PGA 内存目标。PL/SQL\
    \ 内存被认为是不可调整的。只要操作系统提供内存，Oracle 就会按需分配内存。\n\n### 测量内存使用情况\n\n有多种测量进程内存使用情况的方法，这些方法与连接一一对应，并且在大多数情况下也与会话一一对应。视图\
    \ `v$process` 通常用作起点。\n\n```sql\nSQL> select se.sid\n  2        ,se.username\n\
    \  3        ,round(pr.pga_used_mem / power(1024, 2))     pga_used_mb\n  4    \
    \    ,round(pr.pga_alloc_mem / power(1024, 2))    pga_alloc_mb\n  5        ,round(pr.pga_freeable_mem\
    \ / power(1024, 2)) pga_freeable_mb\n  6        ,round(pr.pga_max_mem / power(1024,\
    \ 2))      pga_max_mb\n  7  from   v$session se\n  8        ,v$process pr\n  9\
    \  where  se.paddr = pr.addr\n 10     and se.type != 'BACKGROUND'\n 11  order\
    \ by pr.pga_alloc_mem desc;\n```\n```\n  SID USERNAME PGA_USED_MB PGA_ALLOC_MB\
    \ PGA_FREEABLE_MB PGA_MAX_MB\n----- -------- ----------- ------------ ---------------\
    \ ----------\n  173 K                   35           39               3      \
    \   39\n   91 K                   16           28              10         28\n\
    \   50 K                   19           23               3         24\n  376 K\
    \                   13           13               0         13\n```\n\n前三个内存数字分别表示当前已使用、已分配和可释放的内存，其中已使用加上可释放大致等于已分配。`pga_max_mem`列返回该进程曾达到的最大内存大小。请注意，对于本节中的所有实验，您的系统可能会显示略有不同的值，因为内存使用情况取决于确切的\
    \ Oracle 版本和操作系统。\n\n视图 `v$process_memory` 在 10g 中引入，但在 11g 之前存在错误，它提供了深入分析的功能。我用一个打印当前会话内存使用情况的存储过程来说明这一点。\n\
    \n```sql\ncreate or replace procedure print_session_mem\nis\nbegin\n  dbms_output.put_line('Category\
    \  Allocated KB     Used KB  Max all KB');\n  dbms_output.put_line('----------------------------------------------');\n\
    \  for c in (\n    select pm.*\n    from   v$session        se\n          ,v$process\
    \        pr\n          ,v$process_memory pm\n    where  se.sid   = sys_context('userenv',\
    \ 'sid')\n       and se.paddr = pr.addr\n       and pr.pid   = pm.pid\n  ) loop\n\
    \    dbms_output.put_line(rpad(c.category, 10)\n                      || to_char(round(c.allocated\
    \     / 1024), '999G999G999')\n                      || to_char(round(c.used \
    \         / 1024), '999G999G999')\n                      || to_char(round(c.max_allocated\
    \ / 1024), '999G999G999'));\n  end loop;\nend print_session_mem;\n```\n\n然后我打印初始内存使用情况。\n\
    \n```sql\nSQL> set serveroutput on\nSQL> exec print_session_mem\nCategory  Allocated\
    \ KB     Used KB  Max all KB\n----------------------------------------------\n\
    SQL                   44          38          44\nPL/SQL                38   \
    \       33          38\nOther                982         982\n\nPL/SQL procedure\
    \ successfully completed.\n```\n\n为了分配内存，我创建了一个包含全局关联数组的包。\n\n```sql\ncreate or\
    \ replace package mem#\nis\n  type t_char1000_tab is table of varchar2(1000) index\
    \ by pls_integer;\n  g_list                         t_char1000_tab;\nend mem#;\n\
    ```\n\n接下来，我用数据填充全局变量，并再次打印内存使用情况。\n\n```sql\nSQL> begin\n  2    select lpad('x',\
    \ 1000, 'x')\n  3    bulk collect into mem#.g_list\n  4    from   dual\n  5  \
    \  connect by level <= 100000;\n  6  end;\n  7  /\n\nPL/SQL procedure successfully\
    \ completed.\n\nSQL> exec print_session_mem\nCategory  Allocated KB     Used KB\
    \  Max all KB\n----------------------------------------------\nSQL           \
    \        58          46       4,782\nPL/SQL           114,052     113,766    \
    \ 114,056\nOther              7,594       7,594\n\nPL/SQL procedure successfully\
    \ completed.\n```\n\nPL/SQL 内存使用量从 33 KB 跃升至 113,766 KB。包含杂项结构的类别 `Other` 也有所增加。接下来，我删除关联数组并再次测量内存使用情况。\n\
    \n```sql\nSQL> exec mem#.g_list.delete\n\nPL/SQL procedure successfully completed.\n\
    ```"
- fmt: "\n\n使用 `print_session_mem` 过程可以查看会话的内存分配情况。\n\n```sql\nSQL> exec print_session_mem\n\
    Category  Allocated KB     Used KB  Max all KB\n----------------------------------------------\n\
    SQL                 58          45       4,782\nPL/SQL         114,060       \
    \   45     114,060\nOther            7,586       7,586\n\nPL/SQL procedure successfully\
    \ completed.\n```\n\n使用的 PL/SQL 内存几乎降回了初始值。分配的内存保持不变。可以通过在会话中调用 `dbms_session.free_unused_user_memory`\
    \ 过程将可释放的内存归还给操作系统。由于释放和分配的开销，不应过于频繁地调用它。\n\n```sql\nSQL> exec dbms_session.free_unused_user_memory\n\
    \nPL/SQL procedure successfully completed.\n```\n\n```sql\nSQL> exec print_session_mem\n\
    Category  Allocated KB     Used KB  Max all KB\n----------------------------------------------\n\
    SQL                 50          37       4,782\nPL/SQL              58       \
    \   49     114,068\nFreeable         1,024           0\nOther            1,084\
    \       1,830\n\nPL/SQL procedure successfully completed.\n```\n\n视图 `v$process_memory_detail`\
    \ 可以提供单个进程更详细的信息。通过执行 `alter session set events 'immediate trace name pga_detail_get\
    \ level <pid>'` 可以创建一个快照，其中 `<pid>` 从 `v$process` 获取。该视图对 PL/SQL 开发人员的实用性有限，因为返回的堆名称未完全文档化，并且细分不是按\
    \ PL/SQL 类型或编译单元进行的。详细的描述见 MOS Notes 822527.1 和 1278457.1。\n\n过程 `dbms_session.get_package_memory_utilization`（在\
    \ 10.2.0.5 和 11gR1 中引入）允许你下钻到使用内存的 PL/SQL 单元。这对于查找内存泄漏非常完美。此示例显示了填充 `mem#.g_list`\
    \ 后的内存使用情况：\n\n```sql\nSQL> declare\n  2    l_owner_names             dbms_session.lname_array;\n\
    \  3    l_unit_names              dbms_session.lname_array;\n  4    l_unit_types\
    \              dbms_session.integer_array;\n  5    l_used_amounts            dbms_session.integer_array;\n\
    \  6    l_free_amounts            dbms_session.integer_array;\n  7  begin\n  8\
    \    dbms_session.get_package_memory_utilization(\n  9      owner_names  => l_owner_names\n\
    \ 10     ,unit_names   => l_unit_names  \n 11     ,unit_types   => l_unit_types\
    \  \n 12     ,used_amounts => l_used_amounts\n 13     ,free_amounts => l_free_amounts\n\
    \ 14    );\n 15    for i in 1..l_owner_names.count loop\n 16      dbms_output.put_line(\n\
    \ 17        case l_unit_types(i)\n 18          when  7 then 'PROCEDURE   '\n 19\
    \          when  8 then 'FUNCTION    '\n 20          when  9 then 'PACKAGE   \
    \  '\n 21          when 11 then 'PACKAGE BODY'\n 22          else         'TYPE\
    \     ' || lpad(l_unit_types(i), 3)\n 23        end || ' '\n 24      || rpad(l_owner_names(i)\
    \ || '.' || l_unit_names(i), 26)\n 25      || ' uses ' || to_char(round(l_used_amounts(i)\
    \ / 1024), '999G999G999')\n 26      || ' KB and has ' || to_char(round(l_free_amounts(i)\
    \ / 1024), '999G999G999')\n 27      || ' KB free.');\n 28    end loop;\n 29  end;\n\
    \ 30  /\nPACKAGE BODY SYS.DBMS_SESSION           uses            2 KB and has\
    \            1 KB free.\nPACKAGE      SYS.DBMS_SESSION           uses        \
    \    0 KB and has            1 KB free.\nPACKAGE BODY SYS.DBMS_OUTPUT        \
    \    uses            2 KB and has            1 KB free.\nPACKAGE      SYS.DBMS_OUTPUT\
    \            uses            0 KB and has            1 KB free.\nPACKAGE     \
    \ K.MEM#                     uses      108,035 KB and has        5,414 KB free.\n\
    PACKAGE BODY SYS.DBMS_APPLICATION_INFO  uses            1 KB and has         \
    \   0 KB free.\nPACKAGE      SYS.DBMS_APPLICATION_INFO  uses            0 KB and\
    \ has            1 KB free.\n\nPL/SQL procedure successfully completed.\n```\n\
    \n缺点是该过程只能分析它运行所在会话的内存使用情况。\n\n层次分析器 `dbms_hprof` 在 11g 中提供了一种未文档化的方法来分析内存分配和释放。过程\
    \ `start_profiling` 有两个新参数，`profile_pga` 和 `profile_uga`。以下示例展示了如何使用后者：\n\n```sql\n\
    SQL> create or replace directory hprof_dir as '/tmp';\n\nDirectory created.\n\n\
    SQL> begin\n  2    dbms_hprof.start_profiling(\n  3      location    => 'HPROF_DIR'\n\
    \  4     ,filename    => 'hprofuga'\n  5     ,profile_uga => true\n  6    );\n\
    \  7  end;\n  8  /\n\nPL/SQL procedure successfully completed.\n\nSQL> declare\n\
    \  2    procedure alloc\n  3    is\n  4    begin\n  5      select lpad('x', 1000,\
    \ 'x')\n  6      bulk collect into mem#.g_list\n  7      from   dual\n  8    \
    \  connect by level < 100000;\n  9    end alloc;\n 10    procedure dealloc\n 11\
    \    is\n 12    begin\n 13      mem#.g_list.delete;\n 14      dbms_session.free_unused_user_memory;\n\
    \ 15    end dealloc;\n 16  begin\n 17    alloc;\n 18    dealloc;\n 19  end;\n\
    \ 20  /\n\nPL/SQL procedure successfully completed.\n\nSQL> exec dbms_hprof.stop_profiling\n\
    \nPL/SQL procedure successfully completed.\n```\n\n要分析生成的配置文件，你可以在 `DBMS_HPROF.ANALYZE`\
    \ 中使用相同的未文档化参数（它将字节输出存储在 `DBMSHP_PARENT_CHILD_INFO` 的 `_TIME` 列中），或者将参数 `-pga`\
    \ 或 `-uga` 传递给 `plshprof`。\n\n```sql\noracle@af230d:af230d > $ORACLE_HOME/bin/plshprof\
    \ -uga -output hprofuga hprofuga\nPLSHPROF: Oracle Database 11g Enterprise Edition\
    \ Release 11.2.0.2.0 - 64bit Production\n[10 symbols processed]\n[Report written\
    \ to 'hprofuga.html']\n```\n\n这会生成一个 HTML 报告，如 [Figure 11-5](#Chapter11.html#fig_11_5)\
    \ 所示。\n\n![images](images/1105.jpg)\n\n*Figure 11-5. UGA allocation and deallocation\
    \ memory profile*\n\n该配置文件显示了 UGA 内存的分配和释放，而不是 UGA 内部的分配和释放。通过使用 `truss` 或类似工具跟踪\
    \ OS 调用可以收集到可比较的信息。请记住，层次分析器的这种用法是未文档化的，并且不受 Oracle 支持。\n\n我遇到过几次 Oracle 动态性能视图报告的内存与操作系统报告的数字不对应的情况。如果你遇到内存问题，也值得检查一下操作系统。分析进程内存错误的帮助可以在\
    \ MOS Notes 1088267.1 和 396940.1 中找到。\n\n`V$SYSSTAT` 和 `V$SESSTAT` 的历史 PGA 和 UGA\
    \ 快照值可以在工作负载仓库和 Statspack 视图 `DBA_HIST_SYSSTAT`、`PERFSTAT.STATS$SESSTAT` 和 `PERFSTAT.STATS$SYSSTAT`\
    \ 中找到。根据我的经验，这些信息不足以分析问题。因此，值得在外部循环中检查长时间运行的进程的内存使用情况，如果超过指定的阈值，则记录详细信息。如果可能，进程应定期重新启动自身，以从内存泄漏和未释放的锁中恢复。\n\
    \n"
  raw: '`SQL> exec print_session_mem`

    `Category  Allocated KB     Used KB  Max all KB`

    `----------------------------------------------`

    `SQL                 58          45       4,782`

    `PL/SQL         114,060          45     114,060`

    `Other            7,586       7,586`


    `PL/SQL procedure successfully completed.`


    The used PL/SQL memory decreased almost back to the initial value. The allocated
    memory stayed the same. Freeable memory can be returned to the operating system
    by calling the procedure dbms_session.free_unused_user_memory in the session.
    Because of the cost of deallocation and allocation, it should not be called too
    frequently.


    `SQL> exec dbms_session.free_unused_user_memory`


    `PL/SQL procedure successfully completed.`


    `SQL> exec print_session_mem`

    `Category  Allocated KB     Used KB  Max all KB`

    `----------------------------------------------`

    `SQL                 50          37       4,782`

    `PL/SQL              58          49     114,068`

    `Freeable         1,024           0`

    `Other            1,084       1,830`


    `PL/SQL procedure successfully completed.`


    The view v$process_memory_detail provides even more detail for a single process
    at a time. A snapshot is created by executing `alter session set events ''immediate
    trace name pga_detail_get level <pid>''`, where pid is obtained from v$process.
    The usefulness of v$process_memory_detail for PL/SQL developers is limited, because
    the returned heap names are not fully documented and because the breakdown is
    not by PL/SQL type or compilation unit. A detailed description is given in MOS
    Notes 822527.1 and 1278457.1.


    The procedure dbms_session.get_package_memory_utilization, introduced in 10.2.0.5
    and 11gR1, allows you to drill down to the PL/SQL units using the memory. This
    is perfect for finding memory leaks. This example shows the memory utilization
    after filling mem#.g_list:


    `SQL> declare`

    `  2    l_owner_names             dbms_session.lname_array;`

    `  3    l_unit_names              dbms_session.lname_array;`

    `  4    l_unit_types              dbms_session.integer_array;`

    `  5    l_used_amounts            dbms_session.integer_array;`

    `  6    l_free_amounts            dbms_session.integer_array;`

    `  7  begin`

    `  8    dbms_session.get_package_memory_utilization(`

    `  9      owner_names  => l_owner_names`

    ` 10     ,unit_names   => l_unit_names  `

    ` 11     ,unit_types   => l_unit_types  `

    ` 12     ,used_amounts => l_used_amounts`

    ` 13     ,free_amounts => l_free_amounts`

    ` 14    );`

    ` 15    for i in 1..l_owner_names.count loop`

    ` 16      dbms_output.put_line(`

    ` 17        case l_unit_types(i)`

    ` 18          when  7 then ''PROCEDURE   ''`

    ` 19          when  8 then ''FUNCTION    ''`

    ` 20          when  9 then ''PACKAGE     ''`

    ` 21          when 11 then ''PACKAGE BODY''`

    ` 22          else         ''TYPE     '' || lpad(l_unit_types(i), 3)`

    ` 23        end || '' ''`

    ` 24      || rpad(l_owner_names(i) || ''.'' || l_unit_names(i), 26)`

    ` 25      || '' uses '' || to_char(round(l_used_amounts(i) / 1024), ''999G999G999'')`

    ` 26      || '' KB and has '' || to_char(round(l_free_amounts(i) / 1024), ''999G999G999'')`

    ` 27      || '' KB free.'');`

    ` 28    end loop;`

    ` 29  end;`

    ` 30  /`

    `PACKAGE BODY SYS.DBMS_SESSION           uses            2 KB and has            1
    KB free.`

    `PACKAGE      SYS.DBMS_SESSION           uses            0 KB and has            1
    KB free.`

    `PACKAGE BODY SYS.DBMS_OUTPUT            uses            2 KB and has            1
    KB free.`

    `PACKAGE      SYS.DBMS_OUTPUT            uses            0 KB and has            1
    KB free.`

    `PACKAGE      K.MEM#                     uses      108,035 KB and has        5,414
    KB free.`

    `PACKAGE BODY SYS.DBMS_APPLICATION_INFO  uses            1 KB and has            0
    KB free.`

    `PACKAGE      SYS.DBMS_APPLICATION_INFO  uses            0 KB and has            1
    KB free.`


    `PL/SQL procedure successfully completed.`


    The downside is that the procedure can analyze the memory usage of only the session
    it runs in.


    The hierarchical profiler dbms_hprof provides an undocumented method for profiling
    memory allocation and deallocation in 11g. The procedure start_profiling has two
    new parameters, profile_pga and profile_uga. The following example shows how the
    latter can be used:


    `SQL> create or replace directory hprof_dir as ''/tmp'';`


    `Directory created.`


    `SQL> begin`

    `  2    dbms_hprof.start_profiling(`

    `  3      location    => ''HPROF_DIR''`

    `  4     ,filename    => ''hprofuga''`

    `  5     ,profile_uga => true`

    `  6    );`

    `  7  end;`

    `  8  /`


    `PL/SQL procedure successfully completed.`


    `SQL> declare`

    `  2    procedure alloc`

    `  3    is`

    `  4    begin`

    `  5      select lpad(''x'', 1000, ''x'')`

    `  6      bulk collect into mem#.g_list`

    `  7      from   dual`

    `  8      connect by level < 100000;`

    `  9    end alloc;`

    ` 10    procedure dealloc`

    ` 11    is`

    ` 12    begin`

    ` 13     mem#.g_list.delete;`

    ` 14     dbms_session.free_unused_user_memory;`

    ` 15    end dealloc;`

    ` 16  begin`

    ` 17    alloc;`

    ` 18    dealloc;`

    ` 19  end;`

    ` 20  /`


    `PL/SQL procedure successfully completed.`


    `SQL> exec dbms_hprof.stop_profiling`


    `PL/SQL procedure successfully completed.`


    To analyze the generated profile, you can either use the same undocumented parameters
    in DBMS_HPROF.ANALYZE (which stores the byte output in the _TIME columns of DBMSHP_PARENT_CHILD_INFO)
    or pass the parameter -pga or -uga to plshprof.


    `oracle@af230d:af230d > $ORACLE_HOME/bin/plshprof -uga -output hprofuga hprofuga`

    `PLSHPROF: Oracle Database 11g Enterprise Edition Release 11.2.0.2.0 - 64bit Production`

    `[10 symbols processed]`

    `[Report written to ''hprofuga.html'']`


    This produces a HTML report, as shown in [Figure 11-5](#Chapter11.html#fig_11_5).


    ![images](images/1105.jpg)


    ***Figure 11-5.** UGA allocation and deallocation memory profile*


    The profile shows allocation and deallocation of memory for the UGA rather than
    allocation and deallocation within the UGA. Comparable information can be gathered
    by tracing OS calls with truss or similar utilities. Remember that this usage
    of the hierarchical profiler is undocumented and not supported by Oracle.


    I have seen several cases where the memory reported by Oracle''s dynamic performance
    views did not correspond to the figures reported by the OS. If you experience
    memory issues, it''s always worthwhile to check on the OS as well. Help for analyzing
    out of process memory error can be found in MOS Notes 1088267.1 and 396940.1.


    Historic PGA and UGA snapshot values of V$SYSSTAT and V$SESSTAT can be found in
    the workload repository and in Statspack views DBA_HIST_SYSSTAT, PERFSTAT.STATS$SESSTAT,
    and PERFSTAT.STATS$SYSSTAT. In my experience, this information is insufficient
    to analyze problems. Therefore, it is worthwhile to check the memory usage of
    long-running processes in an outer loop and log detailed information if a specified
    threshold is exceeded. If possible, processes should periodically restart themselves
    to recover from memory leaks and unreleased locks.'
