    \ is contrary to the hypothesis, then you've made a discovery.*\n> \n> —Enrico\
    \ Fermi\n\n##### Step 3: Optimize\n\n*Optimize* that response time in the most\
    \ economically efficient way. First, find and eliminate unnecessary work. I repeatedly\
    \ find this to be the best starting point when assessing a new performance issue.\
    \ Is that 600-page report that runs every morning at 8 a.m. absolutely necessary?\
    \ Does someone actually read it? Has the job that runs every night to rebuild\
    \ indexes been evaluated recently? Asking the right question at the business task\
    \ level is the best place to start.\n\nIf it's really needed, then maybe the report\
    \ could it be run at 2 a.m. instead? Perhaps it could be executed in SQL*Plus\
    \ in the data center rather than in Excel 2,000 miles away. If you can't eliminate\
    \ all the work, the next best thing is to reduce the amount of work being done.\
    \ Moving business rules from mid-tier applications to the database tier is a great\
    \ way of accomplishing this. [Chapter 11](#Chapter11.html#ch11) provides an extensive\
    \ case study showing the benefits of code in the database.\n\nIf you have a critical\
    \ task that depends heavily on a resource, consider rescheduling other work competing\
    \ for that resource at the same time. Load management is a very effective tool\
    \ that is often overlooked. Including the business stakeholders in performance\
    \ optimization is crucial. If you take your pickup truck to the shop and ask the\
    \ technician to tune your vehicle, how will they tune? Each technician will have\
    \ his own interpretation of what “tuned” means. Do you want to use your pickup\
    \ truck to haul a bed full of steel rods up a steep incline for 2 hours? Do you\
    \ want to win a 200-mile race at the local dirt track on Friday night? The technician\
    \ that knows the answer to these questions will get the job done right. The performance\
    \ analyst that knows the business expectations for workload will also get the\
    \ job done right.\n\nReduction of work is also the goal when optimizing code path\
    \ in your application or optimizing individual SQL statements. The key is to focus\
    \ on efficiency, accomplishing the right amount of work with the last amount of\
    \ resource utilization. With the right measurements at hand, you ***know*** where\
    \ the improvements are needed.\n\n> *The fastest way to do anything is to not\
    \ do it at all.*\n> \n> —Cary Millsap\n\n![images](images/square.jpg) **Tip**\
    \ Moving business rules to the database tier is a hotly debated subject, but Toon\
    \ Koppelaars argues for the case better than anyone else I have heard. If you\
    \ desire the performance benefits of moving code to the lowest tier possible,\
    \ check out Toon's vision and his explanation of “The Helsinki Declaration (IT\
    \ Version)” at [`http://thehelsinkideclaration.blogspot.com/`](http://thehelsinkideclaration.blogspot.com/).\n\
    \n##### Step 4: Repeat\n\n*Repeat* until your system is economically optimal.\
    \ A system's performance can always be improved, but at ever increasing cost.\
    \ By measuring response time of a business task accurately, you can predict the\
    \ improvement associated with a given change to the software or hardware resources.\
    \ That quantified improvement can then be weighed against the cost needed to achieve\
    \ the improvement. The tuning process finishes when the cost of the improvement\
    \ exceeds the business value gained. When the ball is in the hole—stop.\n\n> *Go\
    \ play golf. Go to the golf course. Hit the ball. Find the ball. Repeat until\
    \ the ball is in the hole. Have fun. The end.*\n> \n> —Chuck Hogan"
  trans: '

    ## 第 2 步：测量


    详细`测量`任务的响应时间。在任何性能分析活动中，测量都应该是您关注的首要焦点。准确的测量能清晰地指出根本问题。不准确的测量则可能让您陷入徒劳的“兔洞”追猎中。


    当我说“响应时间”时，我指的是最高优先级任务的响应时间，从最终用户发出工作请求开始，到最终用户收到所请求的信息或处理完成的通知为止。获取这些测量值有时很困难，但总是值得的。


    当我说“详细”时，我指的是以性能剖析的形式。了解响应时间的每一刻消耗在何处，并聚焦于最大的时间消耗者。剖析可以详细展示程序代码单元或资源利用情况，但底部的总计`必须`是您所测量响应时间的
    100%。如果不是，您需要更准确地重新测量，或者重新考虑您构建剖析的方式。


    软件性能分析常被描绘成艺术而非科学，但我不同意这种说法。良好的性能分析完全关乎测量。


    > *有两种可能的结果：如果结果证实了假设，那么你完成了一次测量。如果结果与假设相反，那么你完成了一次发现。*

    >

    > —恩里科·费米


    ## 第 3 步：优化


    以最具经济效益的方式`优化`该响应时间。首先，找到并消除不必要的工作。我反复发现，这是评估新性能问题的最佳起点。每天早上 8 点运行的那个 600 页报告是绝对必要的吗？真的有人读它吗？每天晚上重建索引的作业最近评估过吗？从业务任务层面提出正确的问题是最好的起点。


    如果它确实需要，那么也许可以将报告安排到凌晨 2 点运行？也许可以在数据中心用`SQL*Plus`执行，而不是在 2000 英里外的`Excel`中运行。如果您无法消除所有工作，次优选择是减少要完成的工作量。将业务规则从中层应用移到数据库层是实现此目标的一个好方法。第
    11 章提供了一个详细的案例研究，展示了在数据库中编写代码的好处。


    如果您的关键任务严重依赖某个资源，请考虑重新安排在同一时间竞争该资源的其他工作。负载管理是一个非常有效但常被忽视的工具。让业务相关方参与性能优化至关重要。如果您把皮卡车开到修理厂，让技术人员调试您的车辆，他们会如何调校？每位技术人员对“调校”的含义都有自己的理解。您是想开着皮卡车在陡坡上拉着一车床钢材跑
    2 小时？还是想在当地周五晚上的泥地赛道上赢得一场 200 英里的比赛？知道这些问题答案的技术人员会正确完成工作。同样，了解业务工作负载期望的性能分析师也会正确完成工作。


    优化应用程序中的代码路径或优化单个 SQL 语句时，减少工作量也是目标。关键在于专注于效率，以最少的资源消耗完成适量的工作。手头有了正确的测量值，您就`知道`哪里需要改进。


    > *完成任何事情最快的方法，就是完全不去做它。*

    >

    > —卡里·米尔萨普


    ![images](img/square.jpg) **提示** 将业务规则移到数据库层是一个备受争议的话题，但 Toon Koppelaars 对此的论证比我听过的任何人都更有力。如果您渴望通过将代码移到尽可能低的层来获得性能收益，请查看
    Toon 的构想以及他对“赫尔辛基宣言（IT 版）”的解释：[`http://thehelsinkideclaration.blogspot.com/`](http://thehelsinkideclaration.blogspot.com/)。


    ## 第 4 步：重复


    `重复`以上步骤，直到您的系统达到经济最优。系统的性能总是可以提升的，但成本会越来越高。通过准确测量业务任务的响应时间，您可以预测对软件或硬件资源进行给定变更所带来的改进。然后，可以将量化的改进与实现该改进所需的成本进行权衡。当改进的成本超过所获得的业务价值时，调优过程就结束了。当球进洞时——就停止。


    > *去打高尔夫吧。去高尔夫球场。击球。找球。重复直到球进洞。享受乐趣。就这样。*

    >

    > —查克·霍根

