  trans: '#### 并行性与非 OLTP 工作负载


    非 OLTP 工作负载，例如大型报告、统计分析（或许是为了衡量客户流失率等指标）或定期的全量数据处理活动（如为每位客户生成定期账单或向特定客户进行群发邮件），通常都非常适合并行处理活动。


    这类活动可能包括并行检查大量数据以识别待处理的特定项目、构建中间汇总结果或批量更新多行数据。它们也可能执行诸如并行转换大量数据等活动。通常，这类活动会在专门为此类处理保留的系统或时间窗口中运行，因此有充足的
    CPU 可用。如果串行作业运行时间很长，但系统的整体 CPU 利用率仍然很低，或者显示实际使用的可用处理器非常少，那么你就知道这些系统已经具备了并行开发的成熟条件。


    ### MapReduce 编程模型


    MapReduce 是一种用于并行处理大型数据集的编程模型。该编程模型简单明了，其原语被定义为以独立方式处理数据的`块`（chunks），从而能够并行处理这些数据块。该模型首先通过“分片”（sharding）或将数据拆分成集合，传递给
    map 函数。一个 `map` 函数通常接收一组输入数据，并产生一组键/值对，然后这些键/值对可以交给一组 `reduce` 函数，由它们对映射后的列表执行聚合操作。该模型因其通用的原语而广受欢迎，这些原语已被用于执行与文本扫描和过滤相关的各种任务。


    许多新的数据库系统支持 MapReduce 原语，以此作为执行大规模聚合和过滤任务的一种方式。如果你熟悉这种范式，我将在接下来的几页中带你了解如何在 PL/SQL
    中实现它。


    ### 在考虑 PL/SQL 之前


    请务必记住，数据库通常可以自动并行化许多 SQL DML 和 DDL 操作，而无需任何特殊的 PL/SQL 编程。在尝试手动并行化你的存储过程之前，你可能想先研究一下这些选项，看看自动并行化是否就能提供你所期望的收益。在接下来的例子中，你将利用自动并行化的一些架构基础，但首先，让你熟悉一下可用的功能可能会很有帮助。Oracle
    将此架构称为 `并行执行`（parallel execution），它可以应用于几种不同类型的操作。


    -   `并行查询`：涉及全表和分区扫描的大型查询可以让这些扫描并行执行，包括表扫描、索引快速全扫描和分区索引范围扫描。连接方法如嵌套循环、排序合并连接、哈希连接以及星型转换也可以并行化。包括
    `GROUP BY`、`NOT IN`、`UNION`、`UNION ALL`、`CUBE` 和 `ROLLUP` 在内的聚合和集合处理方法同样可以并行化。

    -   `并行 DML`：`INSERT AS SELECT`、`UPDATE`、`DELETE` 和 `MERGE` 操作都可以并行执行，包括使用单个 DML
    语句向多个表插入数据的能力。

    -   `并行 DDL`：`CREATE TABLE AS SELECT`、`CREATE INDEX`、`REBUILD INDEX`、`REBUILD
    INDEX PARTITION` 以及 `MOVE`、`SPLIT` 或 `COALESCE PARTITION` 都可以并行运行。


    一如既往，在考虑并行替代方案之前，你应该花时间确保你的串行操作尽可能高效。虽然并行执行可能会带来更快的执行时间，但你应该警惕与加速和纵向扩展相关的效率问题，正如本章前面所讨论的那样。由于大多数并行化技术的效率都低于
    100%，你会给系统引入额外的资源消耗，因此你需要确保这种额外消耗是值得的。这对于通常以接近 100%利用率运行的系统尤其重要；你可能想看看能否通过运行更高效的串行类型操作来弥补并行化的开销。


    ### 可用于并行活动的进程


    既然你已决定尝试在 PL/SQL 中实现并行流程，那么了解你的执行选项就很有用了。由于数据库通过通常映射到单独连接和操作系统进程的会话来支持并发活动，你需要熟悉哪些操作系统进程可以支持你的存储过程。有三种可用选项。


    -   `并行执行服务器`：这些进程有时被称为并行查询从属进程，由数据库自动配置以支持 SQL 语句的并行执行。通常由参数 `parallel_min_servers`
    和 `parallel_max_servers` 设置，为每个数据库实例建立一组操作系统进程池。

    -   `作业队列进程`：使用 `DBMS_JOB` 或 `DBMS_SCHEDULER` 包，你可以提交 PL/SQL 例程，由服务器作业队列进程以异步方式运行。虽然无法保证任何时间点有多少进程可用，但最大数量由
    `job_queue_processes` 参数控制。

    -   `用户会话进程`：通过手动创建自己的、建立到数据库连接的操作系统进程，你可以创建自己的并行处理支持框架。你将需要在数据库外部或使用数据库数据结构来控制并行度和任务管理。


    在本章中，你将只研究使用 `并行执行服务器`（通过并行流水线函数）来支持你的并行 PL/SQL 例程。


    ### 将并行执行服务器用于 MapReduce


    到目前为止，你已经看到 Oracle（特别是企业版）为针对表的并行操作提供了几种不同的选项，特别是在并行查询领域，其中表数据被分配到并行执行服务器中进行过滤、连接和排序。虽然这个选项看起来很有吸引力，但如何将其与
    PL/SQL 结合使用呢？


    答案在于数据库能够将返回值的 PL/SQL 函数视为一个伪表；这种能力被称为 PL/SQL `流水线函数`（pipelined functions），首次出现在
    Oracle 9i 中。在 Oracle9i 之前，可以将 PL/SQL 函数 `CAST`（转换）为集合并从中选择，但该过程需要在返回任何数据之前在内存中实例化整个结果集。保存完整结果集所需的内存使得它对于你考虑用于并行化的大型问题而言变得不可行。这个问题的答案就是流水线函数。'
- fmt: "## Pipelined Table Functions\n\nA pipelined table function enables you to\
    \ use `PL/SQL` to generate data in a programmatic fashion, specifying what you\
    \ want in each row and enabling the database to select from your function just\
    \ like any other table. You do this by declaring the structure of your record\
    \ using a database object type or a `PL/SQL` record type, and then creating a\
    \ collection type that describes a “table” of your records.\n\nFor your `MapReduce`\
    \ example, you'll define a key/value pair record and then a collection type that\
    \ describes a list of such records, like so:\n\n```sql\ncreate or replace package\
    \ map_reduce_type as\n  type key_value_pair is record (\n    key_item    varchar2(32),\n\
    \    value_item  number\n  );\n  type key_value_pairs is table of key_value_pair;\n\
    end map_reduce_type;\n/\n```\n\nThe particular problem you're going to try to\
    \ solve using your parallel pipelined functions will be to count the occurrences\
    \ of letters in a list of strings. For your list of strings, you'll use the over\
    \ 100,000 column names within a standard installation of the Oracle database;\
    \ from that list you'll try to determine which letter is the most popular.\n\n\
    In a `MapReduce` model, you'd begin by breaking down each string into its component\
    \ letters, and “emitting” a list of letters in each string with a count of 1 (your\
    \ `Map` function). Once you have the letters mapped, you'll hand them to a `Reduce`\
    \ function to count them up. Let's dive into the example and see how this works:\n\
    \nStart by declaring your `Map` function, indicating that it will return a list\
    \ of key/value pairs using a pipelined function. Your function will take one input\
    \ parameter: a string to break up into its individual letters. Here's the code:\n\
    \n```sql\ncreate or replace package map_letter_count as\n  function result_set\
    \ (p_input in varchar2)\n    return map_reduce_type.key_value_pairs pipelined;\n\
    end map_letter_count;\n/\n```\n\nYour function simply takes the input string,\
    \ goes through it character by character and “pipes” the output as a row for each\
    \ letter with a value of one, like so:\n\n```sql\ncreate or replace package body\
    \ map_letter_count as\n\n  function result_set (p_input in varchar2)\n    return\
    \ map_reduce_type.key_value_pairs pipelined is\n\n    l_key_value_pair map_reduce_type.key_value_pair;\n\
    \n    begin\n\n      for i in 1..length(p_input) loop\n\n        l_key_value_pair.key_item\
    \ := substr(p_input,i,1);\n        l_key_value_pair.value_item := 1;\n\n     \
    \   pipe row(l_key_value_pair);\n\n      end loop;\n\n      return;\n\n    end\
    \ result_set;\n\nend map_letter_count;\n/\n```\n\nNow you can retrieve the results\
    \ from this function by using it in a `SELECT` statement and casting it as a table.\n\
    \n```sql\nselect * from table(\nmap_letter_count.result_set('Hello, world!')\n\
    );\n```\n\n```\nKEY_ITEM                     VALUE_ITEM\n----------------------------\
    \ ----------------------\nH                            1\ne                  \
    \          1\nl                            1\nl                            1\n\
    o                            1\n,                            1\n             \
    \                1\nw                            1\no                        \
    \    1\nr                            1\nl                            1\nd    \
    \                        1\n!                            1\n\n13 rows selected\n\
    ```\n\nSo far you've seen how to use a pipelined function to take an input parameter\
    \ and turn it into a list of `MapReduce` key/value pairs using the `pipe row`\
    \ construct. This is nice, but right now your function is limited to a single\
    \ string. Let's see how to extend it to handle a large set of strings.\n\nTo do\
    \ that, you can modify your `Map` function to take as input a list of strings\
    \ or documents in the form of a data cursor, like so:\n\n```sql\ncreate or replace\
    \ package map_letter_count as\n  function result_set (p_documents in sys_refcursor)\n\
    \    return map_reduce_type.key_value_pairs pipelined;\nend map_letter_count;\n\
    /\n```\n\nTo set up your list of strings, create a `documents` table based on\
    \ `DBA_TAB_COLUMNS`; to keep your testing manageable, limit it to 10 rows.\n\n\
    ```sql\ncreate table documents\nas\nselect rownum doc_id, column_name text\nfrom\
    \ dba_tab_columns\nwhere rownum <= 10;\n```\n\nNow your `Map` function will go\
    \ through each document in turn to perform its mapping function.\n\n```sql\ncreate\
    \ or replace package body map_letter_count as\n\n  function result_set (p_documents\
    \ in sys_refcursor)\n    return map_reduce_type.key_value_pairs pipelined is\n\
    \n    type document_type is record (\n      doc_id number,\n      text   varchar2(4000)\n\
    \    );\n    l_document       document_type;\n    l_key_value_pair map_reduce_type.key_value_pair;\n\
    \n    begin\n\n      fetch p_documents into l_document;\n      loop\n        exit\
    \ when p_documents%notfound;\n\n        for i in 1..length(l_document.text) loop\n\
    \n           l_key_value_pair.key_item := substr(l_document.text,i,1);\n     \
    \      l_key_value_pair.value_item := 1;\n\n           pipe row(l_key_value_pair);\n\
    \n        end loop;\n\n        fetch p_documents into l_document;\n\n      end\
    \ loop;\n\n      return;\n\n    end result_set;\n\nend map_letter_count;\n/\n\
    ```\n\nNow selecting from your `Map` function returns the mapped keys and values\
    \ for all of the documents in the table.\n\n```sql\nselect * from table(\nmap_letter_count.result_set(\n\
    cursor(select doc_id, text from documents)\n)\n);\n```\n\n```\nKEY_ITEM      \
    \               VALUE_ITEM\n---------------------------- ----------------------\n\
    D                            1\n_                            1\nO            \
