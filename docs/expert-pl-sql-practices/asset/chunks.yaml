    |   0 | SELECT STATEMENT              |          |   252 |\n|*  1 |  INDEX UNIQUE\
    \ SCAN            | RATES_PK |     1 |\n|   2 |  HASH GROUP BY               \
    \ |          |   252 |\n|*  3 |   HASH JOIN                   |          |   918K|\n\
    |   4 |    PART JOIN FILTER CREATE    | :BF0000  |  1826 |\n|   5 |     TABLE\
    \ ACCESS FULL         | TIMES    |  1826 |\n|*  6 |    HASH JOIN             \
    \     |          |   918K|\n|   7 |     TABLE ACCESS FULL         | PRODUCTS |\
    \    72 |\n|   8 |     PARTITION RANGE JOIN-FILTER|          |   918K|\n|   9\
    \ |      TABLE ACCESS FULL        | SALES    |   918K|\n------------------------------------------------------------\n\
    \n统计信息\n----------------------------------------------------------\n         \
    \ 8  递归调用\n          0  数据库块读取\n      10639  一致性读取\n          0  物理读取\n      \
    \    0  重做大小\n      17832  通过 SQL*Net 发送给客户端的字节数\n        437  通过 SQL*Net 从客户端接收的字节数\n\
    \          2  SQL*Net 往返次数\n          0  内存排序\n          0  磁盘排序\n        272\
    \  处理的行数\n```"
