    0

    ```


    从`rates`函数内部 SQL 的调用情况可以看出，有 1,460 次缓存未命中，这与之前的标量子查询缓存和结果缓存示例相同。这大大减少了对`RATES`表的查找次数。但是，请记住，结果缓存也消除了对`GET_RATES`
    PL/SQL 函数本身的调用。在这方面，用户定义的缓存效果较差，因为对`RATES_PKG.GET_RATES`函数的调用根本没有减少；事实上，函数调用占用了全部的额外运行时。


    通过使用您自己的 PL/SQL 数组缓存（正如我所做的），您本质上是在优化函数，而不是减少或消除其使用。尽管如此，用户定义的 PL/SQL 会话缓存仍是一种有用的调优技术，用于降低嵌入
    PL/SQL 函数中的 SQL 的成本。


    ![images](img/square.jpg) `注意` 如果您选择自己的 PL/SQL 数组缓存而非结果缓存，您应当意识到三个潜在的缺点。首先，每个数组缓存仅对单个会话可见，不会被共享。其次，每个会话都需要缓存其自己的数据副本，这会消耗私有的
    PGA 内存（相反，结果缓存将其结果的单个共享副本存储在 SGA 中）。第三点，也是最关键的一点是，如果您缓存的是经常更新的表的数据，您将需要某种形式的缓存管理，而这将难以实现。结果缓存“开箱即用”地提供了此功能，但在您的
    PL/SQL 程序中，您将没有这种便利。


    ### 总结


    作为本章的结尾，我演示了在将 PL/SQL 函数设计到您的应用程序和查询中时应考虑的一系列成本。此外，我还演示了您可以用来消除、减少或优化 SQL 语句中
    PL/SQL 函数使用的各种技术。


    ## 第 10 章


    ## 选择正确的游标


    **作者：梅兰妮·卡弗里**


    任何曾编写过执行循环逻辑的 PL/SQL 函数或过程的人都深知选择恰当游标类型的痛苦——或者说选择*错误*游标类型的痛苦。本章旨在教导您如何根据具体的编程情境选择合适的游标类型。选择错误的游标类型可能导致您的用户、同事或管理者（或所有人）对您满足业务需求的技术能力失去信心。选择错误的游标类型还可能导致花费大量时间调试生产环境中的系统减速，而您可能认为最糟糕的情况是收入减少。鉴于这些潜在的陷阱和后果，每位
    PL/SQL 程序员都应努力为所要解决的每个具体技术问题选择最适合的游标类型。


    本章重点介绍四种游标类型——并非因为它们是您唯一可用的四种游标类型，而是因为它们是大多数 PL/SQL 程序员通常实现的*最常见*类型。针对特定的业务需求正确实现它们，是拥有高性能和可扩展
    PL/SQL 代码的关键。本章讨论的四种游标类型是


    *   显式游标

    *   隐式游标

    *   静态 `REF` 游标

    *   动态 `REF` 游标


    您编写的任何用于程序化获取记录集以进行处理（无论是单个处理还是批量处理）的 PL/SQL 程序的目标，都是选择一种能让您和 Oracle 数据库以最少的工作量获得正确答案的游标类型。道理真的就这么简单。当然，在许多情况下，您*可以*使用多种类型的游标。但您*应该*吗？这是您每次编写
    PL/SQL 程序时都需要问自己的问题。明智地选择。首先要弄清楚您试图回答的业务问题是什么，然后根据每个具体情况选择最佳的编程工具来快速、正确地回答它。

