- '# 管理员


  ## 查询历史


  查询历史允许您查看在您的 `Snowflake 实例` 中执行的所有查询。系统提供了多种过滤器来缩小查询范围，其中最有用的是执行查询的`用户`，这有助于更轻松地调试
  API 调用中出现的意外结果。`SQL 文本`会向您展示在 Snowflake 中执行的确切 SQL 语句，这有助于了解您通过 API 传递的 SQL 是否被
  Snowflake 正确接收。您还可以使用`查询 ID`（如果您从 API 结果中获取了 ID）进行额外过滤，以及查看`通过/失败`状态和执行查询的`用户`。Snowflake
  提供了大约十列，您可以根据需要查看的信息配置显示在屏幕上。


  如果您深入查看任何一个查询活动，您将看到有关该查询的更多详细信息，包括完整的 `SQL 文本`以及 Snowflake 针对该查询返回的结果或响应。`查询概况`选项卡可能是查询历史中最有用的部分，它为您提供了查询的完整执行计划。如果某个查询加载结果时间过长，或者根据您的超时设置即将超时，您可以使用此视图来更好地理解查询的执行情况以及查询的每个功能耗时多久。利用这些详细信息，您可以开始缩小查询中可能受益于优化的元素范围，从而获得更好的整体查询性能。


  ## 复制历史


  复制历史为您提供了 Snowflake 中 `COPY` 命令的详细视图。使用这些信息，您可以查看正在复制到数据库或从数据库复制出的任何数据文件的进度，查看过去的加载记录，并深入了解单个加载请求，以了解更多关于进入您
  Snowflake 实例的数据及其来源。


  ## 任务历史


  如果您正在利用 Snowflake 的 `Tasks` 来运行计划或手动的查询、存储过程或函数，`任务历史`页面会为您分解说明了哪些任务已运行、何时运行、运行状态以及其他重要的元数据。深入查看任何任务将带您进入其`运行历史`页面，在那里您可以查看过去的运行记录、运行结果以及下一次任务计划运行的时间（如果您使用的是计划）。


  ## 动态表


  `动态表`允许您物化指定查询的结果，从而无需创建单独的表来处理转换和数据更新功能。相反，您可以将目标表定义为动态表，并指定执行任何转换的查询语句。动态表会执行刷新过程，以定期更新数据，从而取代完整的
  `insert`、`update` 和 `delete` 查询的需要。


  `动态表`选项卡允许您查看已创建的动态表、其上次刷新时间以及其他有价值的元数据，这些信息可以帮助您调试预期数据未出现在表中的原因。


  ## 使用情况


  `使用情况`屏幕允许您详细了解 Snowflake 的支出情况。您可以使用各种过滤器，按仓库、标签、用户、服务等可视化您的支出情况。市面上有许多付费和免费的支出工具可以利用这些数据，为您提供更深入的洞察和支出优化，例如
  Black Diamond ([`https://blackdiamond360.com`](https://blackdiamond360.com))。


  建议您至少每月使用此页面或各种可用工具之一检查您的支出情况，以了解是否存在异常查询或仓库正在消耗大量积分，从而不必要地增加您组织的开销。随着您对 Snowflake
  SQL API 越来越熟悉并开始更深入地使用它，此页面尤其有助于显示您是否正确优化了您的 API 代码，并帮助识别恶意用户可能正在访问您的 API 并无谓地增加积分消耗的领域。


  ## 仓库


  当您首次设置 Snowflake 实例时，您会在 `仓库`部分花费相当多的时间。Snowflake 仓库是 Snowflake 数据库的一组计算资源。这些资源包括
  CPU、内存分配和临时存储。Snowflake 为仓库使用 `T 恤尺码` 大小调整（`x-small`、`small`、`medium`、`large` 等），每个大小使用不同的计算方式来确定其运行时消耗的积分数量。除了仓库大小调整，您还可以配置仓库集群。仓库的这一方面会对您的积分消耗产生额外影响。由于其定价模型，根据当前需求配置每个仓库非常重要。仓库可以随时升级或降级，且不影响下游代码，因此请谨慎行事，并明白“少即是多”。


  配置仓库时，您需要考虑查询的复杂性、仓库将返回的平均数据量以及向仓库提交查询的频率。对于需要很长时间返回的复杂查询或大型数据集，您需要增大仓库大小。更大的仓库可以处理更复杂的
  SQL 查询，并比小仓库更快地返回数据。另一方面，对于接收大量并发 SQL 请求（无论大小）的仓库，更大的仓库并无帮助，因为每个仓库的并发限制由每个查询的大小和复杂性决定。在这种情况下，您需要启用仓库集群。这允许您的仓库扩展出额外的节点来处理可能原本会排队等待的查询。


  在为 Black Diamond 使用 Snowflake SQL API 时，我们采用了跨 API 使用单一共享`仓库`的方法。这是因为我们不会将客户数据存储在自己的
  Snowflake 实例中，并且除了少数例外情况，我们收到的并发请求的复杂性和数量都是低风险，可以通过一个中等大小的仓库和最多两个节点的集群来缓解。相反，在您创建账户时，会在您的
  Snowflake 实例中创建一个专用的仓库，Black Diamond 请求发送到您的实例时，应由 Snowflake SQL API 专门使用此仓库。


  我们创建了一些额外的统计信息来提取有关您仓库的详细信息。利用这些详细信息，我们的团队可以手动审查那些遭受应用速度缓慢困扰的账户，并采取手动操作修改 API 使用的仓库以进一步优化它。此外，工具内的自动化功能可以采取一些有限的自导向操作来缓解性能问题，同时努力保持积分消耗成本较低。


  ## 资源监控器


  如果您选择不为 Snowflake 实例使用第三方工具，`资源监控器`是监控积分消耗的绝佳方式。您可以将资源监控器分配给一个或所有仓库，并为每个仓库指定积分配额。此配额可以设置为按日、周或月触发刷新。此外，您可以提供暂停设置，以防止仓库超过其分配的使用量。当您刚开始使用
  Snowflake SQL API 进行开发时，提供一个带有截止限的低配额很有帮助，可以防止异常代码在无人监管时消耗大量积分，并随着您的应用程序发展和您对 API
  越来越熟悉而逐渐提高该配额。




  ## 用户与角色


  我们在本章前面已经介绍过 `用户与角色`，但本节将让你更深入地了解系统中分配的用户、他们上次登录的时间以及他们被授予的角色。你可以在 `用户` 选项卡中管理用户的所有方面，包括创建和删除用户。`角色`
  选项卡则允许你对组织内的角色执行许多相同的操作。此外，它还提供了一个有用的角色思维导图视图，让你可以快速可视化角色的布局以及为每个角色设置的继承关系。


  ## 安全性


  `安全性` 部分允许你为组织定义 `网络策略`，并查看当前连接到 Snowflake 的开放会话（用户）。`网络策略` 是进一步加固 Snowflake 访问安全的好方法，它提供了通过特定
  IP 地址登录或阻止特别有问题的 IP 地址的能力。我强烈建议你至少要求所有用户使用多因素认证（`MFA`），特别是如果他们不在内部网或专用的 `IP 地址/IP
  范围` 内，而你无法将访问权限限制在这些地址之内。


  由于无法通过 API 支持多因素认证，强烈建议你为服务器的 `IP 地址` 创建一个 `策略` 并将其分配给你的 API 用户。除了你创建的 `公钥/私钥对`
  之外，万一你的密钥泄露，这将提供额外的一层安全保障。


  ## 账单与条款


  `账单与条款` 部分提供了你 Snowflake 合同的完整详情。它概述了你已接受的 `服务条款` 及其接受时间、账单联系人、你的支付方式，以及你所有使用情况声明的可下载版本。请注意，对于与
  Snowflake 签订预付容量合同、向其账户分配大量积分的用户，可能不会看到列出的 `支付方式`。


  ## 联系人


  `联系人` 页面允许你设置将接收来自 Snowflake 通知的电子邮件地址。最重要的是 `安全通知`，我建议将其分配给能够定期审查这些通知并采取相应行动的人。`隐私通知`
  让你了解 Snowflake 发布的最新隐私政策变更或隐私问题。相比之下，`产品通知` 则会让你了解 Snowflake 的行为变更、性能下降、API 变更以及其他主动通知。


  ## 账户


  通常，除非你所在的大型组织有特定的数据需求（包括数据本地化和数据治理策略），否则你不会花太多时间在 `账户` 页面上。当你首次注册 Snowflake 时，会创建一个默认的
  `账户`，该账户同时也作为你 Snowflake 实例的组织管理账户。如果你发现自己需要额外的 `账户`，可以在此处创建和管理它们。


  你可能使用 `账户` 的一个例子是，如果你为多个客户提供服务，并希望按 `账户` 而不是数据库和角色来隔离客户的账户。这样可以让客户更好地控制他们的数据和数据访问权限，而不会冒数据暴露给你可能服务的其他客户的风险。


  另一个例子是，假设你有数据因治理原因必须保留在某些区域。一个很好的用例是澳大利亚的教育数据，政府规定此类数据不能离开澳大利亚国境。你可以轻松设置一个新的 `账户`，该账户位于澳大利亚的服务器上，并将所有特定于澳大利亚的数据存储在那里，从而满足政府法规的要求。你还可以设置一个
  `账户`，该账户从你的主 `账户` 复制一份数据，并将其存储在地理位置靠近你一大群客户的服务器上，这样他们就不必提交需要跨越半个全球才能检索数据的网络请求，从而能够更快地访问他们的数据。


  ## 合作伙伴连接


  `合作伙伴连接`，类似于 `市场`，允许你直接连接到为 Snowflake 构建工具的合作伙伴。一个流行的工具，数据 DevOps，是 `DataOps.Live`。这个工具允许你使用
  `DataOps` 和底层的 `DBT` 功能来管理 Snowflake 实例的 `CI/CD` 管道，为你提供真正的敏捷数据摄取、建模和转换过程。


  因为这些合作伙伴是专门为 `Partner Connect` 构建的，所以你可以快速在 `Partner Connect` 门户内授予对 Snowflake 实例的必要访问权限。这确保你不必将敏感信息（如登录详情）传递给第三方网站，如果该系统未采用适当的安全标准，这些信息可能会被泄露。


  当你利用 `Snowflake SQL API` 来构建你的项目时，你可能希望记住 `Snowflake Partner Connect`。它不仅为你提供了一种更安全的方式，让你的客户将其应用程序连接到他们的
  Snowflake 实例，而且还通过允许你在 `Partner Connect` 门户上列出，提供了另一个推广渠道。


  ### 访问 Snowflake SQL API


  在本节中，我将帮助你开始使用 `Snowflake SQL API`。如前所述，`Snowflake SQL API` 是一个 `REST API`，可用于访问和更新
  Snowflake 数据库中的数据。使用该 API，你可以执行标准的 `SQL` 查询以及大多数 `DDL` 和 `DML` 语句，还可以使用该 API 从 Snowflake
  数据库访问有关你的 Snowflake 实例的 `元数据`。在本节中，我们将使用 `Laravel 10` 来向你展示如何连接到 `Snowflake SQL
  API`。这里假设你已经在 `服务器` 或 `本地主机` 上安装并运行了基础版 `Laravel 10`，并且熟悉 `Laravel` 和 `PHP`。





  ### 创建雪花（Snowflake）服务


  为了确保我们的代码遵循 **DRY（不要自我重复）** 原则，请导航到 `app ➤ Services` 并创建一个名为 `SnowflakeService.php`
  的新文件。在文件开头，你需要包含一些随着深入开发会变得必要的包。


  ```php

  <?php

  namespace App\Services;

  use Carbon\Carbon;

  use Firebase\JWT\JWT;

  use Firebase\JWT\Key;

  use Illuminate\Http\Request;

  use App\Http\Controllers\Controller

  use Illuminate\Support\Facades\Auth;

  use Illuminate\Support\Facades\Http;

  use violuke\RsaSshKeyFingerprint\FingerprintGenerator;

  class SnowflakeService

  {

  // 此处存放未来代码

  }

  ```


  **代码清单 3-1** Laravel 雪花服务


  以上代码定义了我们的命名空间和一些重要包，包括 Firebase JWT 包和由 `` `violuke` `` 提供的 `RsaSsheKeyFingerprint`
  包。现在包已经就位，我们需要创建获取 JWT 令牌的代码，该令牌将用于你的 API 调用头中。你需要为你的账户生成一对公钥和私钥。为此，请下载 SnowSQL
  命令行工具包，然后执行以下命令：


  首先，生成一个未加密版本或一个加密版本。


  ```

  $ openssl genrsa 2048 | openssl pkcs8 -topk8 -inform PEM -out rsa_key.p8 -nocrypt

  ```


  或者


  ```

  $ openssl genrsa 2048 | openssl pkcs8 -topk8 -v2 des3 -inform PEM -out rsa_key.p8

  ```


  此命令会生成一个 PEM 格式的私钥。请确保其外观与下面类似：


  ```

  -----BEGIN ENCRYPTED PRIVATE KEY-----

  MIIE6TAbBgkqhkiG9w0BBQMwDgQILYPyCppzOwECAggABIIEyLiGSpeeGSe3xHP1

  wHLjfCYycUPennlX2bd8yX8xOxGSGfvB+99+PmSlex0FmY9ov1J8H1H9Y3lMWXbL

  ...

  -----END ENCRYPTED PRIVATE KEY-----

  ```


  拿到私钥后，你需要生成一个公钥。使用以下命令：


  ```

  $ openssl rsa -in rsa_key.p8 -pubout -out rsa_key.pub

  ```


  此命令将创建一个文件，其内容应包含类似格式：


  ```

  -----BEGIN PUBLIC KEY-----

  MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAy+Fw2qv4Roud3l6tjPH4

  zxybHjmZ5rhtCz9jppCV8UTWvEXxa88IGRIHbJ/PwKW/mR8LXdfI7l/9vCMXX4mk

  ...

  -----END PUBLIC KEY-----

  ```


  将这两个文件存储在本地计算机上一个安全的私有目录中。完成后，在 Snowflake 中打开一个新的 SQL 工作表，并将公钥分配给你的用户：


  ```

  ALTER USER johndoe SET RSA_PUBLIC_KEY=''MIIBIjANBgkqh...'';

  ```


  既然你已经将公钥分配给了 API 用户，我们就可以开始构建 JWT 令牌生成所需的代码了。回到你的 Laravel 代码，打开我们之前创建的 `SnowflakeService.php`
  文件。按照下面的代码创建一个名为 `generateJWT` 的新函数。


  ```php

  public static function generateJwt()

  {

  $account = ''账户标识符''

  $username = ''snowflake_user_name''

  $qualified_username = $account . ''.'' . $username;

  $now = Carbon::now(''UTC'')->timestamp;

  $lifetime =  Carbon::now(''UTC'')->addMinutes(59)->timestamp;

  $public_key = ''粘贴公钥''

  $private_key = ''粘贴私钥''

  $fingerprint = FingerprintGenerator::getFingerprint($public_key, ''sha256'');

  $payload = [

  ''iss'' => $account . ''.'' . $username . ''.SHA256: '' . $fingerprint,

  ''sub'' => $qualified_username,

  ''iat'' = $now

  ''exp'' = $lifetime

  ];

  $jwt_token = JWT::encode($payload, $private_key, ''RS256'');

  return $jwt_token;

  }

  ```


  **代码清单 3-2** Laravel JWT 生成


  让我们花点时间解析一下上面的代码。我们首先定义了用于生成 JWT 令牌的静态函数，并指定了令牌本身以及指纹所需的几个变量。当我刚开始使用雪花 SQL API 时，我低估了指纹的重要性；我使用了由
  SnowSQL 生成的指纹，并以为那就是我所需要的全部，因为它“正常工作”了大约两周。当它停止工作时，我通过逆向工程应用程序与 SnowSQL 生成的 JWT
  令牌进行了大量调试，才弄清楚指纹有多么重要。此外，当时也没有很多关于如何使用 PHP 甚至 Laravel 获取此指纹的优质文档，所以我希望这能为未来的用户提供他们所需的基础，让他们第一次就能正确完成。


  一旦你从公钥生成了指纹，并定义了其他一些唯一变量，我们就将它们传递到一个负载（payload）数组中。`JWT::encode()` 函数接受该数组作为第一个参数，私钥作为第二个参数，然后我们告诉它使用
  `RS256` 进行加密和验证。如果你正确填写了所有内容，你将获得一个 JWT 令牌，该令牌稍后可以在 `SnowflakeService` 类中使用，或者你可以将其打印到屏幕上并通过
  `snowsql` 命令行进行测试。


  接下来的代码段很小，但它是我创建的一个辅助方法，因为我开始处理多个雪花账户。API URL 实际上随每个雪花**账户**（而非用户）而变化，它是指定你要进行身份验证和执行操作的目标实例的方式。无论你是访问单个账户还是多个账户，我仍然推荐使用这个辅助函数，因为随着应用程序的增长，它可以在代码的其他领域发挥作用。


  ```php

  public static function createBaseURL($account, $region)

  {

  $snowflake_api_base_url = ''https://'' . $account . ''.'' . $region . ''.snowflakecomputing.com'';

  return $snowflake_api_base_url;

  }

  ```


  **代码清单 3-3** Laravel 雪花基础 URL 配置


  这个函数非常直观，它生成了指定代码应向何处发起 API 调用所需的唯一 URL。我们不提供任何 REST 函数路径，例如 `/api/v2/statements`，因为我们实际上可以调用三个函数，我们希望保持灵活性以便动态附加。接下来我们将看到的两个函数是“魔法”发生的地方。第一个是一个基本的执行函数，它处理了大多数
  SQL 语句的 API 头的许多前期配置，第二个函数是我们处理分区数据的方式，因为 API 返回的是“页”数据，你必须以分页的方式请求它们。


  ```php

  public static function execute($account, $region, $database, $schema, $statement)

  {

  $jwt = static::generateJwt();

  $base_url = static::createBaseURL($account, $region);

  $query = Http::withHeaders ([

  ''Content-Type'' => ''application/json'',

  ''User-Agent'' => ''myApplication/1.0'',

  ''X-Snowflake-Authorization-Token-Type'' => ''KEYPAIR_JWT'',

  ])->acceptJson()-withToken($jwt)->post($base_url . ''/api/v2/statements'', [

  ''statement'' = $statement,

  ''database'' = $database,

  ''warehouse'' => ''warehouse_name'',

  ''schema'' => $schema,

  ''role'' => ''role_name'' // 可选择作为函数参数提供

  ''parameters'' => [

  ''query_tag'' => ''my-application-name'',

  ],

  ]);

  return $query;

  }

  ```


  **代码清单 3-4** Laravel 查询执行




  '
- "# 4. 使用 Snowflake SQL API 的 SQL 基础\n\n在本章中，我们将回顾 SQL 在 Snowflake 及其 Snowflake SQL\
  \ API 背景下的一些基本功能。本章很大一部分内容将介绍常见的数据库和 SQL 概念，同时向您介绍 Snowflake 的特定细微差别以及 SQL API 的功能和限制。在数据管理和分析领域中，掌握基本的\
  \ SQL 函数就如同掌握了通往一个强大王国的钥匙。通过在 Snowflake 动态生态系统中提供 SQL 的构建模块，无论您是初涉数据领域的新手，还是寻求精进技能的经验丰富的实践者，本章都将成为您驾驭\
  \ Snowflake SQL API 全部潜力的门户。\n\n我们将从探索关键的 `SELECT` 语句开始，了解其用于精确数据检索和分析的细微差别。随后对\
  \ `INSERT`、`UPDATE` 和 `DELETE` 操作的关注，为您提供了一个在应用程序中塑造和维护数据集的战略视角，这对于战略性的数据治理至关重要。然后，我们将探讨\
  \ `JOIN` 操作，这对于在数据集之间编织复杂关系至关重要。我们将理解 `JOIN` 条件和 `WHERE` 子句如何采用细致入微的条件逻辑方法，以赋能专业人士提取目标数据集，随后介绍数据聚合和分组。\n\
  \n为确保我们执行的是性能优化的查询，我们将探索子查询和公共表表达式（CTE）如何在单个 API 调用中用于快速排序和筛选较大数据集，然后再将其与更精细的数据连接。这种基本的\
  \ SQL 技术是我们在 Black Diamond 采用的关键策略，用于定位可优化的查询，降低运行仓库的计算成本，并减少远程和本地溢出。\n\n最后，我们将探讨\
  \ Snowflake 的绑定变量功能。绑定使处理动态筛选条件更容易，也使处理数据类型转换更便捷。除了使代码更简洁、更易读外，它还减少了代码中冗长的 SQL 查询，选择将这项有时繁琐的任务交给\
  \ Snowflake SQL API 引擎处理，而不是由我们自己处理。\n\n本章不仅仅是一个教程；对于寻求利用 Snowflake SQL API 掌控数据的专业开发人员和管理者来说，它是一份战略指南。当我们深入研究这些基本\
  \ SQL 函数的复杂性时，最终目标是让您掌握所需技能，以编排复杂的数据操作，并为您的应用程序成功获取可操作的见解。\n\n## 注意事项\n\n我们并未涵盖此代码的所有安全影响，因此让我们花点时间来讨论一下。首先，不建议您将公钥和私钥直接存储在代码中。您可以选择将其存储在本地数据库中并为代码加盐，或者安装到第三方工具中，例如\
  \ AWS Secrets Manager。保护私钥的安全对于应用程序的安全至关重要。如果您遵循了本章前面关于网络策略的讨论，您可以通过将 API 用户的登录限制在您的应用程序服务器的\
  \ IP 地址，来进一步限制其通过 UI 或 API 被使用。如果您的私钥被泄露，恶意用户还需要访问您的服务器才能用它进行任何有意义的操作。由于此密钥可能有权访问大量安全数据，还建议您不要重复使用来自任何其他系统的私钥（例如您的\
  \ SSH 密钥或 GitHub 密钥）。\n\n另一个应该指出的风险是，这可能会允许 SQL 注入到您的 Snowflake 实例中。毕竟，我们正在使用 Laravel\
  \ 通过 API 将 SQL 代码注入到 Snowflake，这正是我们想要的，但我们希望防止其被恶意使用。您可以做的一件事是，不允许任何 SQL 直接从应用程序的\
  \ URL 或表单传递给 `execute` 函数。有许多方法可以降低风险，但我认为最重要的是，不要允许您的 `execute` 函数直接接收任何由终端用户通过\
  \ URL、表单或其他方法直接生成的 SQL 查询。\n\n最后，您可能考虑通过 `lifetime` 变量将 JWT 令牌的过期时间降低到小于 59 分钟。这确保了如果有人对您的服务器进行“中间人”攻击，他们无法抓取\
  \ JWT 令牌并在其他地方使用它。同样，如果您既保护了私钥安全，又为 API 用户实施了网络策略，就能进一步缓解此风险。\n\n## 结论\n\n您现在应该对\
  \ Snowflake SQL API 的基础和入门必备步骤有了扎实的理解。您已经学会了如何连接到 Snowflake、导航环境以及执行基本的数据操作。凭借这些基础知识，您已具备深入探索该平台更高级特性和功能的基础。随着您继续前行，本章所获得的技能将成为通向掌握\
  \ Snowflake 强大数据管理和分析能力的关键垫脚石。\n\n让我们来剖析并解释我们在做什么。我们首先定义 `execute` 函数，它带有一些我们可以提供的动态参数，然后生成\
  \ JWT 令牌和 API 的基础 URL。真正的魔法发生在 `$query` 变量中，我们在那里定义了使用 Laravel HTTP 包发送的有效负载。在头部信息中，我们告知\
  \ API 我们正在发送 JSON 主体，并告诉 Snowflake 期望使用 JWT 密钥对进行身份验证。因为我们使用了 JWT，所以需要提供 HTTP 包的\
  \ `withToken()` 方法，它会自动将 JWT 令牌正确地传递给 API，并告知 Snowflake 我们期望返回 JSON 响应（错误、成功消息或查询结果）。在\
  \ `post()` 方法内部，我们将主体定义为我们想要执行的 SQL 语句、它应该针对哪个数据库和模式执行、它应使用哪个仓库以及要使用的用户角色。参数中的 `query\
  \ tag` 是可选的，但当我们在 Snowsight 中使用查询历史选项卡来筛选由我们的 API 特别发送的查询以便更快地进行调试或分析时，这很有帮助。\n\n\
  假设我们收到了单页查询结果，并且存在多页或分区，我们可以使用 JSON 响应获取语句句柄和组中的下一个分区，并将其传递给特定于分区获取的辅助函数。\n\n```php\n\
  public static function getPartition($statementHandle, $partition)\n{\n    $jwt =\
  \ static::generateJwt();\n    $base_url = static::createBaseUrl($account, $region);\n\
  \    $query = Http::withHeaders([\n        'Content-Type' => 'application/json',\n\
  \        'User-Agent' => 'myApplication/1.0',\n        'X-Snowflake-Authorization-Token-Type'\
  \ => 'KEYPAIR_JWT',\n    ])->acceptJson()->withToken($jwt)->get($base_url . '/api/v2/statements/'\
  \ . $statementHandle .\n    '?partition=' . $partition);\n    return $query;\n}\n\
  ```\n代码清单 3-5: Laravel Snowflake 分页\n\n上面的代码与我们的 `execute` 辅助方法非常相似，但需要的数据要少得多。我们实际上没有传递任何\
  \ JSON 主体，甚至没有进行 `POST` 调用，而是进行了一次 `GET` 调用。这将指向我们在先前调用中已生成的结果，由语句句柄引导，并返回指定分区的结果。\n\
  \n现在您拥有了一个功能性的 Laravel 服务，即 `SnowflakeService` 类，您可以将此您的其他代码（例如控制器）中，并使用 `execute()`\
  \ 方法通过 API 快速传递 SQL 查询。\n\n\n\n### SQL 基础：`SELECT`、`INSERT`、`UPDATE` 与 `DELETE`\n\
  \n在本节中，我们将深入探讨 SQL 的核心基础知识，聚焦于四个基础操作：`SELECT`、`INSERT`、`UPDATE` 和 `DELETE`。作为数据探索和操作的支柱，这些操作在从数据集中塑造和提取洞察方面起着至关重要的作用。\n\
  \n#### `SELECT` 语句\n\n`SELECT` 语句用于数据检索和分析。在此，我们将剖析其细节，探索如何构建精确的查询以揭示有价值的洞察。我们将涵盖\
  \ `SELECT` 子句的方方面面，使您能够有效地导航和解读海量数据集。`SELECT` 语句是任何以数据为核心的操作的心脏，也是每位数据专业人员常用工具库中的利器。`SELECT`\
  \ 语句的多功能性，明确了在您应用场景下的目标：赋予您所需的技能，以有效地导航和解读海量数据集——无论您面对的是数百万条还是仅仅几条记录——并将该数据移交给您的应用程序进行进一步处理。\n\
  \n为什么我要从 `SELECT` 语句开始？因为 `SELECT` 语句是最常执行的 SQL 语句。您通过 Snowflake SQL API 执行的查询中，至少有\
  \ 75%使用了 `SELECT` 子句。除此之外，理解 `SELECT` 子句的工作原理，特别是在定义要查询的列集方面，将使您更轻松地处理返回的数据结果集。首先，让我们看看\
  \ Snowflake 中 `SELECT` 语句的技术定义。\n\n```\nSELECT [ { ALL | DISTINCT } ]\n[ TOP <n>\
  \ ]\n[ { <object_name> | <alias> } .* ]*\n[ ILIKE '<pattern>' ]\n[ EXCLUDE\n{\n\
  \   <col_name> | ( <col_name> , <col_name> , . . . )\n}\n]\n[ REPLACE\n{\n   ( <expression>\
  \ AS <col_name> [ , <expression> AS <col_name> , . . . ] )\n}\n]\n[ RENAME\n{\n\
  \   <col_name> AS <new_col_name>\n| ( <col_name> AS <new_col_name> , <col_name>\
  \ AS <new_col_name> , . . . )\n}\n]\n```\n**列表 4-1** Snowflake `SELECT` 语句语法定义\n\
  \n起初这可能看起来很复杂，这也是可以理解的，特别是如果您是 SQL 新手，很少或没有接触过大多数数据库提供商用来解释特定 SQL 功能如何工作的语法定义格式。第一行告诉查询处理引擎我们正在执行一个\
  \ `SELECT` 子句，并指定我们想要返回哪些记录。默认情况下，引擎假定使用 `ALL`，这会返回数据集中的所有记录，如果这是您的目标，则无需指定。`DISTINCT`\
  \ 关键字将从您的结果集中消除重复值。这两者都使用标准的操作顺序来执行。我的意思是，任何 `WHERE` 子句和 `JOIN` 语句将首先被处理，然后如果您指定了\
  \ `DISTINCT` 关键字，结果集将被进一步过滤。在我们的查询窗口中，我们会这样写：`SELECT DISTINCT **` 或 `SELECT **`。\n\
  \n结构中的下一个关键字是 `TOP <n>` 关键字。在较旧的数据库系统中，在查询中使用 `TOP <n>` 关键字有一个明确的用例。Snowflake 包含了它，就像许多其他数据库解决方案一样，以便为您的查询提供跨平台支持。然而，此关键字支持的功能与\
  \ `LIMIT` 子句相同，并且 Snowflake 认为它们是等效的，没有区别。与 `LIMIT` 子句一样，这会限制结果集中返回的行数。根据操作顺序，无论您是否使用了\
  \ `DISTINCT` 关键字，您的结果集都将首先基于您的 `WHERE` 和 `JOIN` 语句（以及我们稍后将探讨的其他子句）进行过滤，然后在特定限制内返回最终结果集。例如，在查询窗口中执行\
  \ `SELECT TOP 100 **` 将仅在结果集中返回 100 条记录。在没有使用 `ORDER BY` 子句或其他查询语法的情况下，具体使用哪 100\
  \ 条记录完全由查询处理引擎决定，并且每次执行可能都不同。除了这个基本功能之外，必须知道的是，如果您在 SQL 语句中利用 `OFFSET` 子句，`OFFSET`\
  \ 子句要求您使用 `LIMIT`，并且不支持 `TOP`。\n\n接下来，`<object_name>` 或 `<alias>` 是一种标识在 `FROM`\
  \ 子句中定义的对象或别名的方法。如果您要将多个数据表连接在一起，您将需要一种方法来引用每个数据集中的列。这可能会限制返回的列数，控制返回列的顺序，或提供一种方法来区分跨多个数据集中同名的多个列。\n\
  \n最后，`ILIKE`、`EXCLUDE`、`REPLACE` 和 `RENAME` 关键字提供了在处理特定列时进一步操作返回列（而非数据本身）的方法。`ILIKE`\
  \ 将查找与模式匹配的列名，并仅返回这些列，使您能够快速从一个宽表中提取满足模式条件的列子集。类似地，如果您正在处理一个非常宽的表，并且需要返回除几列之外的所有列，使用\
  \ `EXCLUDE` 关键字来排除那几列会更容易，而不是指定您确实想要返回的大部分列。最后，`REPLACE` 和 `RENAME` 在更改列名方面提供了非常相似的功能。`RENAME`\
  \ 只是将列从表中的名称更改为指定的名称（例如，将 `AVG_COST_ACCR` 更改为 `AVERAGE_COST_ACCURED`），而 `REPLACE`\
  \ 关键字接受一个表达式以进行动态重命名（例如，将列名中的下划线替换为破折号）。\n\n那么，为什么所有这些都很重要呢？嗯，除了为您提供所需的工具，以便以您能快速理解的格式引用列名，或者在跨多个表或数据集连接时选择特定列之外，这些关键字让您能够做两件事：确保您执行的是优化过的查询，并且不需要您确切知道表的结构或返回数据集的结构（尤其是在跨多个数据集连接时）。\n\
  \n对于前者，使用星号 (`*`) 执行 `SELECT` 查询是一种糟糕的做法。这是因为星号将按列在表结构中出现的顺序返回所有列，而我们并不总是需要所有这些列的数据。这会大大增加计算时间、通过\
  \ API 返回数据集所需的时间，并可能产生其他性能影响。\n\n在后一个例子中，如果您必须知道表结构的确切格式，那么预测在 API 结果集中检索特定数据的难度会大大增加。当您将多个数据集连接在一起时，这种复杂性会成倍增加，您必须预测所有这些列在最终的\
  \ JSON 响应中是如何被赋予序数位置的。让我们看一些真实的例子来说明我的意思。请看以下的 API 调用。\n\n```\n$query = Http::withHeaders([\n\
  \    'Content-Type' => 'application/json',\n    'User-Agent' => 'myApplication/1.0',\n\
  \    'X-Snowflake-Authorization-Token-Type' => 'KEYPAIR_JWT',\n])->acceptJson()->withToken($jwt)->post($snowflake_api_base_url.'/api/v2/statements',\
  \ [\n    'statement' => \"SELECT * FROM customers;\",\n    'database' => $database,\n\
  \    'warehouse' => $connection->warehouse,\n    'schema' => $schema,\n    'role'\
  \ => $connection->role,\n    'parameters' => [\n        'query_tag' => 'black-diamond',\n\
  \    ],\n]);\n```\n**列表 4-2** Laravel REST API 处理程序 — `SELECT` 所有列\n\n具体来说，我们关注带下划线的\
  \ JSON 键。您可以看到我们正在对 `customers` 表执行 `SELECT` 查询，并告诉查询处理引擎返回该表的所有列。现在，如果您不知道该表的确切结构，您将无法轻松地从返回的结果集中提取每一行所需的数据。以下是\
  \ API 返回的结果集示例。\n\n\n## Laravel API 响应处理与 SQL 操作\n\n### API 响应数据处理\n\n```\n{\n\"\
  code\": \"090001\",\n\"statementHandle\": \"536fad38-b564-4dc5-9892-a4543504df6c\"\
  ,\n\"sqlState\": \"00000\",\n\"message\": \"successfully executed\",\n\"createdOn\"\
  : 1597090533987,\n\"statementStatusUrl\": \"/api/v2/statements/536fad38-b564-4dc5-9892-a4543504df6c\"\
  ,\n\"resultSetMetaData\" : {\n\"rowType\": [\n{\n\"name\":\"ROWNUM\",\n\"type\"\
  :\"FIXED\",\n\"length\":0,\n\"precision\":38,\n\"scale\":0,\n\"nullable\":false\n\
  }, {\n\"name\":\"ACCOUNT_NAME\",\n\"type\":\"TEXT\",\n\"length\":1024,\n\"precision\"\
  :0,\n\"scale\":0,\n\"nullable\":false\n}, [. . .]\n\"numRows\" : 50000,\n\"format\"\
  \ : \"jsonv2\",\n\"partitionInfo\" : [ {\n\"rowCount\" : 12288,\n\"uncompressedSize\"\
  \ : 124067,\n\"compressedSize\" : 29591\n}, {\n\"rowCount\" : 37712,\n\"uncompressedSize\"\
  \ : 414841,\n\"compressedSize\" : 84469\n}],\n},\n\"data\": [\n[\"customer1\", \"\
  1234 A Avenue\", \"98765\", \"2021-01-20 12:34:56.03459878\"],\n[\"customer2\",\
  \ \"987 B Street\", \"98765\", \"2020-05-31 01:15:43.765432134\"],\n[\"customer3\"\
  , \"8777 C Blvd\", \"98765\", \"2019-07-01 23:12:55.123467865\"],\n[\"customer4\"\
  , \"64646 D Circle\", \"98765\", \"2021-08-03 13:43:23.0\"]\n]\n}\n```\n**清单 4-3**\
  \ Laravel API 结果响应\n\n请注意，我们最关心的响应键是 `data` 键。通过这个键，我们可以遍历每一行并提取数据，例如：\n\n```\n\
  $row0 = $query_result['data'][0];\n$row1 = $query_result['data'][1];\n```\n\n但如果我们想要每行数据末尾的特定列，比如\
  \ `CREATED_ON` 列，该怎么办呢？如果我们不知道表的确切结构，就必须先遍历 `[resultSetMetaData][rowType][name]`\
  \ 键来获取序号键和对应的值。在这个例子中，那将是第五个键（或者说序号键为四，因为它的行为类似于数组）。你的应用程序代码仅仅为了找出需要做下面这件事，就会变得非常混乱和复杂：\n\
  \n```\n$row0_created = $query_result['data'][0][4];\n$row1_created = $query_result['data'][1][4];\n\
  ```\n\n相反，我们应该在 `SELECT` 语句中明确定义我们的列。这样做的好处是可以通过不拉取我们不计划使用的数据来优化查询，同时也让我们能够控制每一列的序号键位置。观察下面这段重构后的代码：\n\
  \n```\n$query = Http::withHeaders([\n    'Content-Type' => 'application/json',\n\
  \    'User-Agent' => 'myApplication/1.0',\n    'X-Snowflake-Authorization-Token-Type'\
  \ => 'KEYPAIR_JWT',\n])->acceptJson()->withToken($jwt)->post($snowflake_api_base_url.'/api/v2/statements',\
  \ [\n    'statement' => \"SELECT CREATED_ON, ADDRESS, ZIP FROM customers;\",\n \
  \   'database' => $database,\n    'warehouse' => $connection->warehouse,\n    'schema'\
  \ => $schema,\n    'role' => $connection->role,\n    'parameters' => [\n       \
  \ 'query_tag' => 'black-diamond',\n    ],\n]);\n```\n**清单 4-4** 带列指定的 Laravel REST\
  \ API 处理器\n\n因为我们已经在 `SELECT` 语句中定义了列，并且是按照我们想要的顺序定义的，现在我们可以高度准确地预测访问特定列所需的序号键。现在我们的代码看起来像这样：\n\
  \n```\n$row0_address = $query_result['data'][0][1];\n$row1_address= $query_result['data'][1][1];\n\
  ```\n\n我们之所以能做到这一点，是因为我们知道列会按照在 `SELECT` 语句中指定的顺序返回（0 => `CREATED_ON`, 1=> `ADDRESS`,\
  \ 2 => `ZIP`）。在这个例子中，我们消除了让你事先知道表结构或依赖你的应用程序来推导正确键的需要。如果我们必须依赖我们对表的了解，那么如果开发者在表中间添加了一个新列，就会将错误数据引入我们的应用程序。假设我们依赖应用程序来推导键，那么你就是在编写大量不必要的代码，每次都要遍历结果元数据来查找序号键，这既增加了开发时间开销，也增加了应用程序执行开销。\n\
  \n### INSERT 语句\n\n有时，你可能需要将新数据插入到你的 Snowflake 实例中。这些数据可能是你的应用程序生成的、用户输入接收的，或是你的应用程序从第三方处理后必须持久化到数据库的数据。由于我和我的团队围绕\
  \ Snowflake SQL API 构建的应用程序性质——即一个用于 Snowflake 可观测性和性能的多租户解决方案——我们很少使用 API 向数据库插入数据。这是因为驱动我们工具的数据存在于我们内部的\
  \ Snowflake 实例中，我们使用一个 PHP 驱动程序与之交互，但有时我们不得不在应用程序数据库中为每次安装创建的客户实例中创建数据。向 Snowflake\
  \ 插入数据使用 `INSERT` 子句，其语法如下：\n\n```\nINSERT [ OVERWRITE ] INTO <table_name> [ ( <col_name>\
  \ [ , ... ] ) ]\n{\n    VALUES ( { <value> | DEFAULT | NULL } [ , ... ] ) [ , (\
  \ ... ) ] |\n    <query>\n}\n```\n**清单 4-5** Snowflake INSERT 语句语法\n\n这里的语法比我们看到的\
  \ `SELECT` 子句要直接得多。你可以使用 `INSERT` 子句并指定列名以及每条记录的值或数据来插入新数据，或者选择性地覆盖现有数据。API 确实允许你插入多行数据，但这会给你的代码增加一些复杂性，我们将在下文讨论。需要注意的一点是：`OVERWRITE`\
  \ 关键字的行为不像数据的“upsert”。相反，这是一种快速截断表中所有现有数据并用新数据替换的方法，而无需指定多个查询。\n\n当涉及到插入数据时，插入单条数据记录相当直接。在你的\
  \ SQL 语句中，你需要指定列名，然后提供数据的变量作为值，这样你就可以构建动态的 `INSERT` 语句。可能会变得复杂的情况是：你需要填充很多列，或者你正在执行多插入操作。Snowflake（尽管是无意的）确实为此提供了一个简洁的解决方案。\n\
  \n简要触及一个更高级的主题，像大多数数据库解决方案一样，Snowflake 提供了创建存储过程的能力。你可以直接在 Snowflake 中创建这些过程，使用\
  \ SnowSQL 命令行工具，或者让你的应用程序通过 API 运行一次性配置脚本。例如，我的应用程序期望在客户的 Snowflake 实例中存在各种存储过程才能正常运行。当客户首次设置新连接时，系统会提示他们运行一个“部署配置”脚本。\n\
  \n此脚本使用 API 在他们的 Snowflake 实例中创建各种对象、任务和存储过程。我们对这个配置进行版本控制，并将其存储在连接表的一个名为 `config_version_deployed`\
  \ 的列中。如果该值为 `NULL` 或设置为低于当前版本的版本，将向用户显示一个横幅，提示他们运行新的或最新的配置。因为我们必须通过 API 来完成此操作，以减少客户的手动工作，所以配置脚本确实会变得相当长和复杂。然而，权衡之下，应用程序其余部分的代码更简洁，并被认为是一个整体可靠的解决方案。\n\
  \n## SQL 语句的存储过程与动态查询\n\n为什么了解这一点很重要？在需要向表中插入多条记录的场景下，我们为该表构建了一个存储过程来处理数据插入。该函数体就是我们的\
  \ SQL 语句，设置在一个循环中。该函数接受三个参数：表名、列名数组和值数组。由于我们在应用程序中将其编码为每次都以相同方式处理，我们可以确保值的一级数组键与列的顺序键相匹配，从而能够在存储过程中动态构建`INSERT`查询。\n\
  \n这里需要注意的一点是，我们创建了一个允许我们动态处理任何表插入的存储过程。这减少了我们需要创建的存储过程数量——一个动态过程代替了为每个要插入数据的表创建一个过程。这使我们能够遵循\
  \ DRY（不要重复自己）方法，减少了必须运行的可能消耗客户更多额度的配置升级次数，并且总体上是我们选择遵循的设计模式。你可能有一个用例，希望或需要每个表由自己的函数处理，这完全是可行的。处理这个问题没有绝对正确或错误的方式。\n\
  \n#### UPDATE 语句\n\n`UPDATE`子句的工作方式与`INSERT`子句类似，使你能够更新数据库中的一条或多条现有记录。在许多情况下，你都需要更新数据，范围从非常简单到高度复杂，而该语句足够灵活，可以处理这些情况。假设你需要跟踪用户上次登录系统的时间。一个非常简单的`UPDATE`查询可以将`\"\
  last_login_timestamp\"`设置为当前日期/时间，每次用户在应用程序上处理登录请求时执行。一个更复杂的例子可能是，如果你的应用程序执行各种数据计算，无论是按用户要求还是在后台进行，并且需要将这些数据持久化到数据库中。我们可以在下面看到`UPDATE`子句的语法，它相当直接。\n\
  \n```sql\nUPDATE <table_name>\nSET <column1> = <value1> [ , <column2> = <value2>\
  \ , ... ]\n[ FROM <from_clause> ]\n[ WHERE <condition> ]\nListing 4-6\nSnowflake\
  \ UPDATE statement dictionary\n```\n\n由于`UPDATE`语句的简单性，你可能会误以为你的应用程序代码也会同样简单。虽然这对你的许多需求来说可能是真的，但我们必须再次审视查询如何迅速增长并对你的应用程序代码产生巨大需求。类似于`INSERT`语句，拥有一个包含大量列集合的`UPDATE`语句，甚至包含一个支持非结构化数据的列，`UPDATE`查询会迅速增长并产生大量技术债务。\n\
  \n如果你的查询涉及少于五个列，并且不需要处理非结构化数据，你可以将其视为一个经验法则，即可以直接在 API 调用中创建查询。然而，如果你的查询不符合此模式，或者你只是想要更简洁的代码，你可以选择像我们为插入数据那样创建一个动态存储过程。需要记住的一点是，提供至少一个`WHERE`条件非常重要，正如在\
  \ SQL 中进行`UPDATE`操作时应该始终做的那样，以防止你错误地覆盖好数据。由于需要提供这些条件，如果你选择创建一个存储过程供你的代码通过 API 调用，你需要有一个参数来支持`where`条件数组，这些条件可以动态加载到查询中。\n\
  \n### DELETE 语句\n\n四个基础 SQL 子句中的最后一个是`DELETE`子句。与清空表中所有数据的`TRUNCATE`子句不同，`DELETE`子句允许你指定`WHERE`条件来有选择地删除数据，甚至允许你指定其他表或查询来支持你的`WHERE`条件。该子句的语法是四个中最简单的，但在这简单之中蕴含着成为非常强大查询的灵活性。\n\
  \n```sql\nDELETE FROM <table_name>\n[ USING <using_clause> [, <using_clause> ] ]\n\
  [ WHERE <condition> ]\nListing 4-7\nSnowflake DELETE statement dictionary\n```\n\
  \n使用`DELETE`子句时，提供至少一个`WHERE`条件至关重要，以防止你删除所有数据。如果你的意图是真正清空表，建议你使用`TRUNCATE`子句，因为它更快。`DELETE`子句必须在删除前评估每条记录（即使没有提供`WHERE`条件），而`TRUNCATE`子句则简单地清空表，而不在事先评估任何记录。\n\
  \n在我们的应用程序中，并且作为我们遵循的最佳实践，我们不会从数据库中删除数据。相反，我们采用一个`\"is_deleted\"`标志，指示记录不应再被使用，但允许我们保留数据。由于各种原因，这可能不是你应用程序的可行方法，但如果其中一个原因是存储容量，值得注意的是，存储多年来已经有了很大发展，并且在大规模下相当便宜。\n\
  \n你可能选择直接从表中删除数据而不是提供你版本的`\"is_deleted\"`标志的情况包括：遵守政府合规性（如 GDRP）、删除坏数据或清除不应长期保存或在客户流失后保留的敏感客户数据。\n\
  \n如果你预计需要通过 SQL API 执行数据删除，通常可以在应用程序代码中实时构建这些查询。然而，如果你正在处理复杂的`WHERE`条件，特别是涉及使用其他表或查询来细化要删除的目标数据，你可能会选择使用存储过程采用更动态的方法。同样，需要记住的两件事是：防止你的代码变得过于庞大而难以管理，以及在应用程序开发中遵循\
  \ DRY 方法。\n\n## JOIN 操作与 WHERE 子句\n\n既然我们已经涵盖了四个基础查询子句，我们将深入研究连接和过滤子句。这两个主题被归为一类，因为表连接为查询结果提供了附加数据，并增加了过滤数据的功能。像大多数数据库系统一样，Snowflake\
  \ 支持四种常见的连接类型：内连接、外连接、交叉连接和自然连接。\n\n正如我所说，连接可以具有过滤数据的附加功能，无论是通过连接本身的性质，还是通过提供作为过滤器作用于被连接数据的连接条件。其中之一是内连接。在内连接中，一个表中的每一行与另一个表中的一行匹配。当一个表中的一行与另一个表中的行不匹配时，这些行将从查询结果中排除。假设你有一个大学的学生列表，任何注册至少一门课程的学生被认为是活跃学生。通过在`student_id`等键上将学生与课程注册表连接，你只会得到有学生的课程，同样，只会得到有相关课程的学生。如果你将此结果进一步使用`SELECT\
  \ DISTINCT`子句在`student_id`、`first_name`和`last_name`上进行过滤，你将得到一份大学活跃学生的唯一列表。我们这样做是为了考虑注册多门课程的学生，这会因内连接的性质而在结果集中产生重复的学生记录。\n\
  \n让我们探索 Snowflake 中的各种`JOIN`。\n\n#### 自然连接（NATURAL JOIN）或 JOIN\n\n使用`NATURAL JOIN`子句，或简写为`JOIN`，您可以连接两个具有相同名称和对应数据的列的表。继续我们的大学示例，我们可能有一个名为`enrolled_classes`的表和一个`class_grades`表。这两个表都会有一个名为`student_id`的列，以便将学生与其注册的课程关联起来，并将学生与其课程成绩关联起来。\n\
  \n由于两个表都有一个名为`student_id`的列，连接将自动构建`ON`子句并在这些列上进行连接。这意味着您不必编写`ON`条件：`[NATURAL] JOIN\
  \ on enrolled_classes.student_id = class_grades.student_id`。连接的性质已经假定您想要连接这些列并为您处理。如果两个表都有多个匹配列，自然连接将在所有这些列上自动连接。\n\
  \n自然连接将仅包含共享列的一个记录，并省略其他记录。自然连接可以与外连接结合使用，您可以在`WHERE`子句中指定筛选条件，但不能指定自定义的`ON`子句条件。\n\
  \n#### 左外连接（LEFT OUTER JOIN）\n\n左外连接包括主表中的所有行，即使有些行不匹配，以及连接表中的任何匹配行。主表，或称“左表”，是在`FROM`子句中指定的表。连接表，或称“右表”，是在连接子句中指定的表。例如，使用我们的大学示例，我们可能有以下查询：\n\
  \n```sql\nSELECT s.full_name, s.student_id, c.class_name FROM students s\nLEFT OUTER\
  \ JOIN enrolled_classes ec ON ec.student_id = s.student_id\n```\n\n在此示例中，我们将获得所有学生及其学生\
  \ ID 的列表，以及`ON`子句中匹配条件所指示的他们注册的任何课程的课程名称。我们可以通过提供一个`WHERE`子句，如`WHERE c.class_name\
  \ IS NOT NULL`，进一步筛选此结果，仅显示注册了课程的学生。如果我们想显示未注册课程的学生，我们会这样做：`WHERE c.class_name IS\
  \ NULL`。\n\n#### 右外连接（RIGHT OUTER JOIN）\n\n右外连接包括连接表或“右表”中的所有行，以及主表（或“左表”）中的任何匹配行。\n\
  \n```sql\nSELECT s.full_name, s.student_id, c.class_name FROM students s\nRIGHT\
  \ OUTER JOIN enrolled_classes ec ON ec.student_id = s.student_id\n```\n\n在此示例中，我们将获得`enrolled_classes`表中所有`class_name`值的行，以及`ON`子句中指定的任何匹配记录的`full_name`和`student_id`值。\n\
  \n#### 全外连接（FULL OUTER JOIN）\n\n全外连接将包括两个表中的所有行，无论`ON`条件如何，为您提供一个完整的数据集，就好像所有行都在一个表中一样。匹配的行将作为单个行返回，不匹配的行将各自作为自己的行返回。任何不匹配的学生将没有`class_name`值，任何不匹配的`enrolled_classes`将没有`full_name`或`student_id`值。\n\
  \n```sql\nSELECT s.full_name, s.student_id, c.class_name FROM students s\nFULL OUTER\
  \ JOIN enrolled_classes ec ON ec.student_id = s.student_id\n```\n\n#### 内连接（INNER\
  \ JOIN）\n\n在我们左外连接的示例中，我们描述了如何使用`WHERE`子句来过滤掉不匹配的行。一种更简短的写法，也是更优化的方法，是使用内连接。当您使用内连接时，它仅返回那些基于您的`ON`条件存在匹配的行。\n\
  \n```sql\nSELECT s.full_name, s.student_id, c.class_name FROM students s\nINNER\
  \ JOIN enrolled_classes ec ON ec.student_id = s.student_id\n```\n\n在此示例中，仅返回`student_id`匹配的行。因此，您将始终拥有`full_name`、`student_id`和`class_name`的值。由于一个学生可能注册多门课程，您可以预期`full_name`和`student_id`记录将为学生注册的每门课程重复。\n\
  \n#### 交叉连接（CROSS JOIN）\n\n最后，我们有交叉连接。这种连接获取两个表并返回所有可能的行组合（有时称为“笛卡尔积”或“笛卡尔连接”）。这意味着大多数行将包含实际上不相关的行的部分，这可能使交叉连接在许多情况下毫无用处。\n\
  \n使用交叉连接可能导致返回的数据集变得非常大，从而产生更昂贵的查询执行计划。当第一个表有 N 行，第二个表有 Z 行时，结果将是两者的乘积（N x Z）。这意味着第一个表有\
  \ 100 行，第二个表有 100 行，将导致一个包含 100,000 行的数据集。\n\n最后要注意的是，与自然连接一样，交叉连接不支持`ON`子句。这是因为所有可能的连接都被接受，使得`ON`子句的使用本质上无效。\n\
  \n## 聚合、分组与排序数据\n\n既然我们对如何跨多个表连接数据有了很好的理解，让我们看看如何对这些数据进行提炼并赋予混乱以秩序。我们将了解一些聚合函数、分组函数和数据排序。由于这些函数非常广泛且用途多样，尤其是聚合函数，我们不会在本材料中涵盖所有内容。相反，这旨在介绍如何进一步提炼和组织数据以使结果更有意义。\n\
  \n\n### SQL 数据聚合与排序指南\n\n#### GROUP BY\n\n我们首先来看`GROUP BY`子句，因为它对支持聚合函数很重要。`GROUP\
  \ BY`子句将具有相同`group-by-item`表达式的行进行分组，并为结果组计算聚合函数。你可以在分组中指定多个项来进一步细化结果。让我们看一个例子：\n\
  \n```sql\nSELECT  cv.student_id FROM campus_violations cv\nGROUP BY cv.student_id\n\
  ```\n\n这个查询将对两个值进行分组，并为每个唯一的分组返回一行。如果一个学生在校园内有多次违规，它只会返回一次`student_id`。这种方法可用于确定哪些学生自入学以来曾经有过校园违规。\n\
  \n```sql\nSELECT  cv.student_id, cv.type FROM campus_violations cv\nGROUP BY cv.student_id,\
  \ cv.type\n```\n\n进一步细化，我们可以按类型分组。如果一个学生有多个“停车”类型的违规，你将得到一条包含其`student_id`和停车类型的记录。如果该学生有其他违规类型，每种类型都将返回一条该`student_id`和其违规类型的记录，导致你看到该`student_id`因不同类型而出现多次。\n\
  \n```sql\nSELECT  cv.student_id, cv.type FROM campus_violations cv\nGROUP BY cv.student_id,\
  \ cv.type\nHAVING COUNT(cv.student_id) > 1\n```\n\n到这里，也许我们只想看到屡犯者。在这里，我们通过告诉查询仅当`student_id`在校园内有多次违规时，才返回其`student_id`和关联的违规类型，来进一步优化查询。如果某个`student_id`在表中只出现一次，它将不会被返回。`HAVING`子句允许你定义通用表达式来评估`GROUP\
  \ BY`如何返回数据。\n\n```sql\nSELECT  cv.student_id, cv.type, COUNT(cv.full_name) AS violation_count\
  \ FROM campus_violations cv\nGROUP BY cv.student_id, cv.type\nHAVING COUNT(cv.student_id)\
  \ > 1\n```\n\n最后，通过在`SELECT`子句中提供聚合函数`COUNT`，我们可以了解一个学生每种类型的违规次数。如果一个学生有六次停车违规，你将看到一条包含`student_id`、停车类型和数值\
  \ 6 的记录结果。\n\n需要注意的是，当你使用`GROUP BY`子句时，你必须要么匹配你的`SELECT`子句，使`SELECT`子句中出现的任何列也出现在`GROUP\
  \ BY`子句中；要么你必须将不匹配的列包装在聚合函数中。在前面的例子中，你会注意到`full_name`被包装在`COUNT`聚合函数中，但`full_name`没有出现在`GROUP\
  \ BY`子句中。这是因为聚合函数本质上已经将数据分组在一起。\n\n#### 聚合函数\n\n聚合函数是转换数据以便进行更有意义探索的手段。你可以使用`AVG`函数获取所有值的平均值，使用`SUM`函数获取所有值的总和，使用`MIN`函数获取最小值，等等。让我们回到大学的例子，看一个查询示例：\n\
  \n```sql\nSELECT s.full_name, s.student_id, g.grade FROM students s\nINNER JOIN\
  \ grades g ON g.student_id = s.student_id\n```\n\n此示例将返回所有学生及其成绩列表。由于一个学生可能有多个成绩（取决于他们是否选修了多门课程），你会看到`full_name`和`student_id`重复出现多次。我们可以进一步优化此查询，为学生定义一个平均绩点：\n\
  \n```sql\nSELECT s.full_name, s.student_id, AVG(g.grade) AS grade_average FROM students\
  \ s\nINNER JOIN grades g ON g.student_id = s.student_id\nGROUP BY s.full_name, s.student_id\n\
  ```\n\n这个例子引入了我们的第一个聚合函数，平均值函数（`AVG`），并定义了列名（`AS grade_average`）。如果我们没有定义列名，结果集将返回列名为`AVG(g.grade)`。返回的列表将为你提供唯一的`full_name`和`student_id`值列表，以及匹配记录的所有成绩值的平均值。如果我们想知道每个学生收到的最低成绩是什么，我们可以在查询中添加`MIN(g.grade)`，它将返回该学生成绩列表中的最低分。\n\
  \n#### 数据排序\n\n最后，让我们看看如何对数据进行排序。当你返回数据集时，你可能需要它以特定的信息顺序输出。也许你希望所有的`student_id`出现在一起，或者你希望每条记录的最新版本排在前面。当你使用`ORDER\
  \ BY`子句时，你可以指定数据如何返回。\n\n```sql\nSELECT s.full_name, s.student_id, s.enrolled_date\
  \ FROM students s\nORDER BY s.enrolled_date DESC\n```\n\n在这个例子中，我们返回所有曾经在大学注册过的学生列表。`ORDER\
  \ BY`子句表示按`enrolled_date`降序排序。结果集将返回最近入学的学生，然后时间向后推移。如果你将`DESC`标志改为`ASC`，它将返回最老的学生，即最早入学的学生，然后时间向前推移。你也可以为排序指定多个`ORDER\
  \ BY`条件。\n\n```sql\nSELECT s.full_name, s.student_id, s.enrolled_date, s.last_seen_date\
  \ FROM students s\nORDER BY s.last_seen_date DESC, s.enrolled_date DESC\n```\n\n\
  在这个例子中，我们将获得所有曾经在大学注册过的学生的列表。你会首先看到他们在大学系统中最后出现的时间顺序。如果多个学生有相同的`last_seen`日期（比如新学期开始），则会进一步按最近入学的学生排序。\n\
  \n重要的是要知道，如果没有`ORDER BY`子句，查询返回的结果是一个无序集合。这意味着如果你多次运行相同的查询，每次运行的输出排序可能不同。如果顺序很重要，或者你想有更大的机会重用先前查询运行的缓存数据，你应该利用`ORDER\
  \ BY`子句。\n\n\n\n"
- "# 5. 使用 Snowflake SQL API 的高级 SQL 技术\n\n在本章中，我们将超越常规数据查询的边界，深入探索复杂的数据操作。我们将踏上一段旅程，将您的\
  \ SQL 技能提升到新的高度，为您提供工具和技术，以便自信而精确地应对复杂的数据挑战。\n\n## 子查询与公用表表达式 (CTEs)\n\n子查询和 CTE\
  \ 是一种通过在（例如）将数据与其他表连接之前先过滤初始数据集来提升查询性能的方法。想象一下，您的大学数据库中有超过一百万学生，以及超过五百万条课程注册记录。这里假设每个学生只选了五门课，而每门课都有学生注册。众所周知，一所大学很可能远不止五门课，而且如果课程对应不同的学期，可以被视为不同的课程，同时每门课通常会有多个学生注册。数据量可能会迅速膨胀，导致您的查询运行缓慢甚至超时。在\
  \ Snowflake 的世界里，这可能会非常昂贵，因为 Warehouse 必须运行更长时间并消耗更多的信用点。那么，我们如何解决这个问题呢？一种方法是使用子查询。\n\
  \n```sql\nSELECT s.full_name, s.student_id, ec.class_name, ec.class_code FROM students\
  \ s\nINNER JOIN enrolled_classes ec ON ec.student_id = s.student_id\nORDER BY s.student_id\
  \ ASC\n```\n\n这个查询将按 `student_id` 从小到大的顺序返回所有学生，以及他们曾经注册过的任何课程。这可能是一个巨大的数据量。如果我们想过滤学生数量，可以使用\
  \ `WHERE` 子句，但也许我们用于过滤的数据存在于另一个表中。子查询可以解决这个问题：\n\n```sql\nSELECT s.full_name, s.student_id,\
  \ ec.class_name, ec.class_code\nFROM (\n    SELECT sqs.full_name, sqs.student_id\
  \ FROM students sqs\n    INNER JOIN class_grades sqcg ON sqcg.student_id = sqs.student_id\n\
  \    WHERE AVG(sqcg.grade) < 72\n) s\nINNER JOIN enrolled_classes ec ON ec.student_id\
  \ = s.student_id\nORDER BY s.student_id ASC\n```\n\n上面的例子将首先运行 `FROM` 子句内部的查询，为所有平均绩点低于\
  \ 72% 的学生返回一个 `student_name` 和 `student_id` 值的列表。我们认为这些学生有因 GPA 低而退学或失去助学金的风险。一旦我们有了这个学生子集，就返回这些学生及其课程名称和课程代码。我认为我们还可以进一步过滤。\n\
  \n```sql\nSELECT s.full_name, s.student_id, ec.class_name, ec.class_code\nFROM (\n\
  \    SELECT sqs.full_name, sqs.student_id FROM students sqs\n    INNER JOIN class_grades\
  \ sqcg ON sqcg.student_id = sqs.student_id\n    WHERE AVG(sqcg.grade) < 72\n) s\n\
  INNER JOIN (\n    SELECT sqec.class_name, sqec.class_code FROM enrolled_classes\
  \ sqec\n    INNER JOIN class_semesters sqcs ON sqec.class_code = sqcs.class_code\n\
  \    WHERE sqcs.semester_name = 'Fall' AND sqcs.semester_year = '2023'\n) ec ON\
  \ ec.student_id = s.student_id\nORDER BY s.student_id ASC\n```\n\n此查询将首先根据我们已经看过的第一个子查询获取学生列表。然后，第二个子查询将评估并仅返回\
  \ 2023 年秋季学期的课程。两个子查询都评估后，结果数据将被连接，任何不匹配的数据将因 `INNER JOIN` 而被过滤掉，最终返回一个更易于管理的数据集。\n\
  \n## 使用绑定变量\n\n回到 Snowflake SQL API 的主题，使用绑定变量使得编写更清晰、更动态的代码变得更容易。让我们看一个在 API 上下文中使用绑定变量的示例。\n\
  \n```php\n$query = Http::withHeaders([\n    'Content-Type' => 'application/json',\n\
  \    'User-Agent' => 'myApplication/1.0',\n    'X-Snowflake-Authorization-Token-Type'\
  \ => 'KEYPAIR_JWT',\n])->acceptJson()->withToken($jwt)->post($snowflake_api_base_url.'/api/v2/statements',\
  \ [\n    'statement' => \"SELECT CREATED_ON, ADDRESS, ZIP FROM customers WHERE LAST_ORDER_DATE\
  \ BETWEEN ? AND ?;\",\n    'database' => $database,\n    'warehouse' => $connection->warehouse,\n\
  \    'schema' => $schema,\n    'role' => $connection->role,\n    'parameters' =>\
  \ [\n        'query_tag' => 'black-diamond',\n    ],\n    'bindings' => [\n    \
  \    '1' => [\n            'type' => 'TEXT',\n            'value' => '2023-10-01'\n\
  \        ],\n        '2' => [\n            'type' => 'TEXT',\n            'value'\
  \ => '2023-12-31'\n        ],\n    ],\n]);\n```\n*列表 4-8：使用绑定变量的 Laravel API 处理程序*\n\
  \n上面的查询在 `statement` 中使用了 `BETWEEN` 函数，以查找在特定日期范围内有过订单的所有客户。我们使用两个问号 (`?`) 来表示需要绑定变量的位置。第一个问号对应绑定\
  \ `1`，第二个对应绑定 `2`，依此类推，按它们出现的顺序排列。\n\n如果您将两个绑定的值替换为动态代码，例如 `$quarterstartdate` 和\
  \ `$quarterenddate`，那么您的代码就可以基于某些先前的逻辑来指定一个季度的开始和结束日期。通过将这些值移入 `bindings`，意味着 `statement`\
  \ 部分整体上看起来更清晰，并形成一个更整洁的代码块。此外，使用绑定变量还有一个安全优势。通过使用绑定变量，您可以防止来自中间人攻击或用户输入的 SQL 注入攻击。\n\
  \n\n\n## 使用 `CASE` 和 `COALESCE` 进行数据转换\n\n### `CASE` 语句\n\n`CASE` 语句是 SQL 开发人员工具箱中的一款强大工具，为查询中的条件逻辑和值转换提供了一种灵活的机制。在本节中，我们将深入探讨\
  \ `CASE` 语句的细节，揭示其广泛的应用，并展示它如何提升你的 SQL 查询的复杂程度。\n\n从根本上讲，`CASE` 语句提供了一种在 SQL 查询中实现条件逻辑的灵活方式，允许开发人员根据指定条件执行不同的操作。无论你需要对数据进行分类、计算衍生值，还是自定义查询输出，`CASE`\
  \ 语句都提供了简洁直观的语法来实现这些目标。通过掌握 `CASE` 语句的细微差别，你将在 Snowflake 的动态生态系统中，为数据操作和分析开启一片充满可能性的天地。\n\
  \n除了基本功能外，`CASE` 语句在处理复杂的业务逻辑和动态转换数据方面表现出色。对多个条件和嵌套 `CASE` 表达式的支持，使开发人员能够以精确和高效的方式应对各种场景。从数据清洗和标准化，到高级报告和决策制定，`CASE`\
  \ 语句都是推动可操作性见解、提升你的 SQL 查询价值的基石。以下是一个 `CASE` 查询的示例。\n\n```sql\nSELECT\n    s.full_name\n\
  \    , s.student_id\n    , CASE\n        WHEN ec.class_code LIKE 'MATH%' THEN 'Mathematics'\n\
  \        WHEN ec.class_code LIKE 'SCI%' THEN 'Sciences'\n        WHEN ec.class_code\
  \ LIKE 'PSY%' THEN 'Psychologies'\n        ELSE ec.class_code\n    END AS ClassType\n\
  \    , CASE\n        WHEN RIGHT(ec.class_code, 1) = 1 THEN '1 Credit'\n        WHEN\
  \ RIGHT(ec.class_code, 1) = 2 THEN '2 Credits'\n        WHEN RIGHT(ec.class_code,\
  \ 1) = 3 THEN '3 Credits'\n        WHEN RIGHT(ec.class_code, 1) = 4 THEN '4 Credits'\n\
  \    END AS Credits\nFROM students s\nINNER JOIN enrolled_classes ec ON ec.student_id\
  \ = s.student_id\nORDER BY s.student_id ASC\n```\n*清单 5-1: Snowflake `CASE` 查询*\n\
  \n在这个例子中，我们获取 `class_code` 并查看其首字符。大多数课程代码类似于 `MATH 2433` 或 `ARTS 1123`。课程代码的第一部分表示课程类型，而最后一个数字通常表示该课程的学分值。我们看到的第一个\
  \ `CASE` 语句接收 `class_code` 并确定我们的课程类型（数学、科学、化学等）。如果没有匹配项，`ELSE` 语句将显示完整的课程代码（例如\
  \ `ORG 1211`）。`LIKE` 函数对值进行模糊匹配。结合 `%` 符号，我们告诉 `CASE` 语句严格按顺序匹配开头的字符，并接受其后的任何字符，正如\
  \ `%` 符号所表示的那样。\n\n在第二个 `CASE` 语句中，我们使用 `RIGHT()` 函数来获取字符串最右侧的第一个字符。在本例中，即 `class_code`\
  \ 的最后一个数字。使用等于限定符，我们确定最后一个数字，然后将其对应的学分数指定为值。由于我们的大学示例中没有学分小于 1 或大于 4 的课程，因此不存在 `ELSE`\
  \ 语句。这是 `ELSE` 语句可选性的一个很好例证。\n\n### `COALESCE` 语句\n\n`COALESCE` 语句在 SQL 开发中成为一项基础工具，为处理查询中的\
  \ `NULL` 值提供了一种简洁的解决方案。让我们深入探讨 `COALESCE` 语句的多功能性，展示其在各种场景中简化数据操作和增强查询结果的能力。\n\n\
  本质上，`COALESCE` 语句是一种用备选的非 `NULL` 值替换 `NULL` 值的强大机制。无论你是在处理数据导入、连接表，还是执行计算，`COALESCE`\
  \ 语句都提供了一种管理 `NULL` 值的有效直接方法。通过在 SQL 查询中策略性地整合 `COALESCE`，你可以确保数据完整性、提高查询的可读性，并减轻因\
  \ `NULL` 处理而可能产生的错误。\n\n此外，`COALESCE` 语句在处理多个输入值时提供了灵活性，允许开发人员根据预定义的优先级对值进行排序。在数据质量或完整性因来源而异的情况下，此功能非常宝贵，它使开发人员能够无缝地优先选择备用值或默认选项。通过利用\
  \ `COALESCE` 语句的功能，SQL 开发人员可以简化数据处理工作流程，并增强其查询逻辑的稳健性，最终有助于实现更高效、更可靠的数据分析。\n\nSnowflake\
  \ 中的 `COALESCE` 语句返回第一个非 `NULL` 的表达式，如果所有参数都是 `NULL`，则返回 `NULL`。让我们看一个例子。\n\n```sql\n\
  SELECT column1, column2, column3, coalesce(column1, column2, column3)\nFROM (values\n\
  \    (1,    2,    3   ),\n    (null, 2,    3   ),\n    (null, null, 3   ),\n   \
  \ (null, null, null),\n    (1,    null, 3   ),\n    (1,    null, null),\n    (1,\
  \    2,    null)\n) v;\n```\n*清单 5-2: Snowflake `COALESCE` 查询*\n\n![图 5-1: COALESCE\
  \ 结果集](img/615715_1_En_5_Fig1_HTML.jpg)\n\n在上面的例子中，第一行返回的值为 1，因为 `column1` 等于 1。在第三行中，前两列是\
  \ `NULL`，但最后一列等于 3，所以我们返回 3。在第四行中，所有三列都是 `NULL`，因此函数返回 `NULL`。\n\n\n\n## 处理日期与时间数据\n\
  \n处理日期和时间数据是数据管理与分析的一个关键方面，尤其在时间维度洞察至关重要的场景中。本节将探讨在 Snowflake 的 SQL 环境中有效管理日期和时间数据的最佳实践与技术，使开发人员能够提取有意义的洞见并推动数据驱动的决策。\n\
  \n首先，理解日期和时间数据固有的复杂性至关重要。Snowflake 提供了一套强大的函数和运算符，专门用于处理各种与日期和时间相关的任务，从简单的日期运算到复杂的时间计算。通过熟悉这些函数，开发人员可以轻松地操作日期和时间数据、执行趋势分析，并从时间数据集中获取可操作的洞见。\n\
  \n其次，在处理日期和时间数据时，确保数据的一致性和标准化至关重要。Snowflake 对标准化日期和时间格式的支持，以及其全面的转换函数范围，有助于在不同来源之间实现无缝的数据转换和集成。无论是整合来自不同系统的数据，还是使数据与组织标准保持一致，Snowflake\
  \ 都提供了必要的工具来简化流程，并在数据管道的整个过程中维护数据完整性。\n\n最后，利用高级功能（如窗口函数和特定于日期的聚合函数）可以增强时间分析的深度和粒度。窗口函数使开发人员能够在定义的时间间隔上执行计算，便于进行趋势分析、移动平均和其他时间序列操作。同样，特定于日期的聚合函数（例如\
  \ `DATE_TRUNC`）允许在各种时间粒度上汇总数据，使开发人员能够提取所需详细级别的洞见。通过利用这些高级功能，开发人员可以释放 Snowflake 中日期和时间数据的全部潜力，推动可操作的洞见并促进数据驱动的决策。\n\
  \nSnowflake 支持超过 20 个日期和时间函数，您可以在查询中使用它们，同时也支持常用的时间部分。由于 Snowflake 中存在多种可能影响日期和时间显示方式的配置选项（尤其是在处理时区时），建议使用\
  \ Laravel 辅助库进行日期和时间操作，并在您的应用程序和 Snowflake 之间传递数据。如果您采用此方法，在 SQL 中可能最常用的函数之一就是 `TO_TIMESTAMP()`\
  \ 函数。它可以让您将 Snowflake 中的输入和输出数据格式化为易于处理的时间戳值。\n\n需要注意的一点是，Snowflake API 会以 EPOCH\
  \ 格式将数据传回您的应用程序。要在 Laravel 中转换此格式，示例可能如代码清单 5-3 所示。\n\n```php\n$query = Http::withHeaders([\n\
  \    'Content-Type' => 'application/json',\n    'User-Agent' => 'myApplication/1.0',\n\
  \    'X-Snowflake-Authorization-Token-Type' => 'KEYPAIR_JWT',\n])->acceptJson()->withToken($jwt)->post($snowflake_api_base_url.'/api/v2/statements',\
  \ [\n    'statement' => \"SELECT CREATED_ON, ADDRESS, ZIP FROM customers;\",\n \
  \   'database' => $database,\n    'warehouse' => $connection->warehouse,\n    'schema'\
  \ => $schema,\n    'role' => $connection->role,\n    'parameters' => [\n       \
  \ 'query_tag' => 'black-diamond',\n    ],\n]);\n$epoch = $query['data'][0][0];\n\
  $dt = new DateTime(\"@$epoch\");\necho $dt->format('Y-m-d H:i:s');\n```\n代码清单 5-3：处理时间值的\
  \ Laravel API 处理程序\n\n上面的代码将获取第一条记录的第一列（即 `CREATED_ON` 列），并将 epoch 值分配给一个变量。然后，它使用\
  \ `DateTime` 库将其设置为 epoch 日期时间值，接着我们将其格式化为人类可读的格式。\n\n## 动态 SQL 与存储过程\n\n动态 SQL\
  \ 代表了一种构建 SQL 查询的灵活方法，允许开发人员在运行时动态生成和执行 SQL 语句。在查询结构或内容可能根据用户输入、数据条件或应用程序逻辑而变化的场景中，这种能力尤其有价值。在本节中，我们将深入探讨\
  \ Snowflake 背景下动态 SQL 的细节，探索其优势、挑战以及实现的最佳实践。\n\n动态 SQL 的关键优势之一是其适应不断变化的需求和动态数据环境的灵活性。通过动态生成\
  \ SQL 语句，开发人员可以为特定用例、条件或用户偏好量身定制查询。这种灵活性扩展到即席报告、数据驱动的应用程序逻辑和动态过滤等场景，在这些场景中，能够即时构建\
  \ SQL 语句增强了系统的敏捷性和响应能力。然而，动态 SQL 也引入了与安全性、性能和可维护性相关的考虑因素，需要仔细规划并遵循最佳实践，以减轻潜在风险并确保最佳的查询执行。\n\
  \n存储过程是在 Snowflake 中封装 SQL 逻辑的一个强大工具，使开发人员能够在服务器端执行复杂操作、事务和业务逻辑。本质上，存储过程是预编译的 SQL\
  \ 代码块，存储在数据库中并根据需要执行。在本节中，我们将探讨 Snowflake 中存储过程的好处和功能，重点介绍它们在数据驱动应用程序中增强性能、安全性和可维护性方面的作用。\n\
  \n存储过程的主要优势之一是，通过集中化和标准化 SQL 逻辑来简化数据库操作。通过将常用的查询、数据转换和业务规则封装在存储过程中，开发人员可以促进代码重用、最小化冗余并提高整体代码的可维护性。此外，存储过程促进了模块化开发实践，允许开发人员将复杂的任务分解为更小、更易管理的代码单元。这种模块化方法不仅增强了代码组织，还简化了调试、测试和版本控制，从而带来更健壮、更可扩展的数据库应用程序。\n\
  \n假设我们在 `DATAVAULT` 中有一个想要一次性调用的存储过程列表。我们可以向 Snowflake 发送一个动态查询，以获取一个可调用的存储过程列表，如代码清单\
  \ 5-4 所示。\n\n```sql\nSELECT 'CALL ' || PROCEDURE_CATALOG || '.' || PROCEDURE_SCHEMA\
  \ || '.' || PROCEDURE_NAME || '();' cmd\nFROM datavault.information_schema.procedures\n\
  WHERE PROCEDURE_CATALOG = 'DATAVAULT' AND PROCEDURE_SCHEMA = 'SOURCE';\n```\n代码清单\
  \ 5-4：Snowflake 存储过程字典\n\n上面的示例可能会以 `CALL SPROC_NAME();` 的格式输出一个存储过程列表。该列表可能类似于代码清单\
  \ 5-5。\n\n```php\n$sprocs = $query['data'];\nforeach ($sprocs AS $sproc)\n{\n  \
  \  $query2 = Http::withHeaders([\n        'Content-Type' => 'application/json',\n\
  \        'User-Agent' => 'myApplication/1.0',\n        'X-Snowflake-Authorization-Token-Type'\
  \ => 'KEYPAIR_JWT',\n    ])->acceptJson()->withToken($jwt)->post($snowflake_api_base_url.'/api/v2/statements',\
  \ [\n        'statement' => $sproc[0],\n        'database' => $database,\n     \
  \   'warehouse' => $connection->warehouse,\n        'schema' => $schema,\n     \
  \   'role' => $connection->role,\n        'parameters' => [\n            'query_tag'\
  \ => 'black-diamond',\n        ],\n    ]);\n    wait 5;\n}\n```\n代码清单 5-5：用于存储过程的\
  \ Laravel REST API 处理程序\n\n上面的代码将获取存储过程列表并调用每一个。我们在 `foreach` 循环结束时设置了 5 秒的等待时间，以防止过多的查询同时排队，并减轻\
  \ Snowflake Warehouse 的部分负载。\n\n\n\n## 用户自定义函数（UDF）\n\n用户自定义函数（`UDFs`）在扩展`Snowflake`中`SQL`查询的功能方面发挥着**关键作用**，它使开发人员能够实现根据特定需求定制的自定义逻辑和计算。本质上，`UDFs`允许开发人员将复杂的算法或业务逻辑封装成可复用的代码片段，然后可以无缝集成到`SQL`查询中。在本节中，我们将深入探讨`UDFs`在`Snowflake`中的多功能性和实用性，探索它们在各种用例和场景中的应用。\n\
  \n`UDFs`的主要优势之一是，它们能够通过将复杂操作抽象成简洁直观的函数调用来增强查询的表达力和可读性。无论是执行数据转换、计算还是字符串操作，`UDFs`都提供了一种在`SQL`查询中实现自定义逻辑的简化方法。通过将复杂操作封装在可复用的函数中，开发人员可以促进代码重用、提高代码可维护性，并降低跨查询出现错误或不一致的风险。\n\
