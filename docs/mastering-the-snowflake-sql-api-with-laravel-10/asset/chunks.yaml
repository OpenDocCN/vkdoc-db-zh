- fmt: '# Admin


    ## Query History


    Query History allows you to view all of the queries executed in your `Snowflake
    instance`. A number of filters are provided to allow you to narrow down your inquiry,
    the most helpful being the `User` who executed a query, to make it easier to debug
    unexpected results in your API calls. The `SQL Text` will give you the exact SQL
    statement that executed in Snowflake, which can be helpful in understanding if
    the SQL you thought you passed via the API was actually received correctly by
    Snowflake, the `Query ID` to provide additional filtering if you have the ID from
    your API result, a `Pass/Fail` status, and the `User` who executed the query.
    Snowflake provides about ten columns you can configure to display on the screen
    based on the information you want to see.


    If you drill into any one query activity, you’ll see additional details regarding
    the query, including the full `SQL Text` and what results or response was returned
    by Snowflake for the query. The `Query Profile` tab is perhaps the most helpful
    element of Query History, giving you a full execution plan for your query. If
    a query is taking a long time to load results or is timing out based on your timeout
    settings, you can use this view to get a better understanding of what the query
    was doing and how long each function of the query took to run. Using these details,
    you can start to narrow down the elements of your query that could benefit from
    optimization to get better overall performance for the query.


    ## Copy History


    Copy History provides you with a detailed view of the `COPY` command in Snowflake.
    Using this information, you can see the progress of any data file you are copying
    into or out of your database, view past loads, and drill into individual load
    requests to learn more about the data entering your Snowflake instance and where
    it came from.


    ## Task History


    If you are leveraging Snowflake `Tasks` to run scheduled or manual queries, stored
    procedures, or functions, the `Task History` page gives you a breakdown of what
    tasks ran, when they ran, their run status, and other important metadata. Drilling
    into any Task will take you to its `Run History` page where you can see the past
    runs, their run result, and when the next task is scheduled to run (if you are
    using schedules).


    ## Dynamic Tables


    `Dynamic tables` allow you to materialize the results of a query that you specify,
    allowing you to bypass the need to create separate tables to handle transformation
    and data update functionality. Instead, you can define the target table as a dynamic
    table and specify the query statement that performs any transformations. Dynamic
    tables take on a refresh process to keep the data updated at regular intervals
    and replace the need for complete `insert`, `update`, and `delete` queries.


    The `Dynamic Tables` tab allows you to see the Dynamic Tables you’ve created,
    their last refresh, and other valuable metadata that can help debug reasons why
    expected data is not appearing in your table.


    ## Usage


    The `Usage` screen allows you to get a full breakdown of your Snowflake spend.
    You can use various filters to visualize your spend by warehouse, tags, users,
    services, and more. There are many spending tools available, both paid and free,
    that can leverage this data to give you deeper insights and optimization for your
    spend, such as Black Diamond ([`https://blackdiamond360.com`](https://blackdiamond360.com)).


    It is a good idea to use this page or one of the various tools available to check
    your spending on, at minimum, a monthly basis to learn if you have errant queries
    or warehouses that are consuming a large number of credits and needlessly costing
    your organization money. As you get more familiar with the Snowflake SQL API and
    start leveraging it more heavily, this page is especially helpful in showing you
    if you are properly optimizing your API code and helping to identify areas where
    malicious users might be hitting your API and running up your credit consumption
    to no purpose.


    ## Warehouses


    When you first set up your Snowflake instance, you’ll spend a decent amount of
    tab in the `Warehouses` section. A Snowflake warehouse is a cluster of computing
    resources for your Snowflake databases. These resources include CPU, memory allocation,
    and temporary storage. Snowflake uses `t-shire sizing` for warehouses (`x-small`,
    `small`, `medium`, `large`, etc.), and each size uses a different calculation
    to determine how many credits are consumed when it is running. In addition to
    warehouse sizing, you can also configure warehouse clustering. This facet of warehousing
    has an additional impact on your credit consumption. Because of the pricing model,
    it is important that you configure each warehouse based on its needs at the present.
    Warehouses can always be upgraded or downgraded, with no impact on downstream
    code, so err on the side of caution and know that less is more.


    When configuring your warehouse, you need to consider the complexity of your query,
    the average amount of data your warehouse will be returning, and how often queries
    are being submitted to the warehouse. For complex queries or large datasets that
    take a long time to return, you’ll want to increase your warehouse size. Larger
    warehouses can handle more complex SQL queries and return data faster than smaller
    queries. On the other hand, a larger warehouse does nothing to help a warehouse
    that receives a lot of concurrent SQL requests, big or small, as each warehouse
    has a concurrency limit that is determined by the size and complexity of each
    query. In such an instance, you’d want to enable warehouse clustering. This allows
    your warehouse to scale out additional nodes that can handle queries that might
    otherwise be queued.


    When working with the Snowflake SQL API for Black Diamond, we took the approach
    of a single, shared `Warehouse` across. That is because we do not store customer
    data in our own Snowflake instance, and, with few exceptions, the complexity and
    number of concurrent requests we received were a low risk that could be mitigated
    with a medium warehouse and a two-max clustering. Instead, upon creation of your
    account, a dedicated warehouse is created in your Snowflake instance that should
    be exclusively used by the Snowflake SQL API when Black Diamond requests are sent
    to your instance.


    We created some additional statistics that pull details about your warehouse.
    Using this detail, our team can manually review accounts that are suffering from
    slow application speeds and take manual action to modify the warehouse used by
    the API to further optimize it. Additionally, automation within the tool can take
    some limited self-direction actions to mitigate performance issues while still
    working to keep the cost of credit consumption low.


    ## Resource Monitors


    If you have opted not to use a third-party tool for your Snowflake instance, `Resource
    Monitors` are a great way to keep an eye on credit consumption. You can assign
    Resource Monitors to one or all of your warehouses and specify a credit quote
    for each warehouse. This quota can be triggered to refresh on a daily, weekly,
    or monthly basis. Additionally, you can provide suspension settings that prevent
    a warehouse from exceeding its allocated usage. When you first start developing
    with the Snowflake SQL API, it is helpful to supply a low quota with a cutoff
    to prevent errant code from consuming a lot of credits when unsupervised and slowly
    increase that quota as your application grows and you become more comfortable
    with the API.'
  raw: '##### Query History


    Query History allows you to view all of the queries executed in your Snowflake
    instance. A number of filters are provided to allow you to narrow down your inquiry,
    the most helpful being the User who executed a query, to make it easier to debug
    unexpected results in your API calls. The SQL Text will give you the exact SQL
    statement that executed in Snowflake, which can be helpful in understanding if
    the SQL you thought you passed via the API was actually received correctly by
    Snowflake, the Query ID to provide additional filtering if you have the ID from
    your API result, a Pass/Fail status, and the User who executed the query. Snowflake
    provides about ten columns you can configure to display on the screen based on
    the information you want to see.


    If you drill into any one query activity, you’ll see additional details regarding
    the query, including the full SQL Text and what results or response was returned
    by Snowflake for the query. The Query Profile tab is perhaps the most helpful
    element of Query History, giving you a full execution plan for your query. If
    a query is taking a long time to load results or is timing out based on your timeout
    settings, you can use this view to get a better understanding of what the query
    was doing and how long each function of the query took to run. Using these details,
    you can start to narrow down the elements of your query that could benefit from
    optimization to get better overall performance for the query.


    ##### Copy History


    Copy History provides you with a detailed view of the COPY command in Snowflake.
    Using this information, you can see the progress of any data file you are copying
    into or out of your database, view past loads, and drill into individual load
    requests to learn more about the data entering your Snowflake instance and where
    it came from.


    ##### Task History


    If you are leveraging Snowflake Tasks to run scheduled or manual queries, stored
    procedures, or functions, the Task History page gives you a breakdown of what
    tasks ran, when they ran, their run status, and other important metadata. Drilling
    into any Task will take you to its Run History page where you can see the past
    runs, their run result, and when the next task is scheduled to run (if you are
    using schedules).


    ##### Dynamic Tables


    Dynamic tables allow you to materialize the results of a query that you specify,
    allowing you to bypass the need to create separate tables to handle transformation
    and data update functionality. Instead, you can define the target table as a dynamic
    table and specify the query statement that performs any transformations. Dynamic
    tables take on a refresh process to keep the data updated at regular intervals
    and replace the need for complete insert, update, and delete queries.


    The Dynamic Tables tab allows you to see the Dynamic Tables you’ve created, their
    last refresh, and other valuable metadata that can help debug reasons why expected
    data is not appearing in your table.


    #### Admin


