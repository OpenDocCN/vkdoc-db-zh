    type checking within the native language construct to execute SQL statements or,
    optionally, choose to specify the SQL statement they wish to execute. A great
    example of this is the ability to use code constructs provided by the popular
    Python library, DataFrames, to construct SQL select queries.


    Since Snowpark runs natively within Snowflake, all operations are lazy-executed
    on the server, allowing developers to use the library to delay running transformations
    until much later in the pipeline while also providing the flexibility to batch
    multiple operations into a single call. This allows developers to shave down the
    amount of time it takes to transfer data between your client and the Snowflake
    database and offers additional performance improvements.


    Using the toolbox provided by the Snowpark API, developers can create user-defined
    functions (UDFs) directly within the Snowpark app. Snowpark can push your code
    to the server and execute your UDFs at scale on your data. This provides many
    useful and powerful options for working with data, including looping or batching
    functionality, where creating a UDF allows Snowflake to parallelize and apply
    the code at scale within Snowflake.


    By defining custom UDFs within your code, you can write functions in the same
    language that you use to write client code, allowing you to process data directly
    within the Snowflake database. Snowpark magically handles pushing the custom code
    for UDFs to the Snowflake database and can be called within your client code.
    This means you do not need first to transfer data to your local client in order
    to execute the function on the data, saving you time, code, money, and performance.


    #### Snowflake Native App Framework


    The Snowflake Native App Framework allows developers to expand the capabilities
    of other Snowflake features by sharing data and related business logic with other
    Snowflake accounts, allows for the sharing of an application with consumers through
    the Snowflake marketplace as either a free or paid app, and includes feature-rich
    visualizations using Streamlit. Snowflake does this by allowing you to create
    data applications that directly leverage core Snowflake functionality.


    Snowflake has built its Native App Framework to perform along most development
    standards, including an easy way to leverage testing environments within your
    account, a robust developer workflow to manage code within source control while
    maintaining data and related database objects within Snowflake, the ability to
    version and patch your applications as they continue to evolve, incrementally
    release updates to consumers, and support for logging and unstructured events
    that allows your developers to troubleshoot and monitor applications.


    Currently, the Native App Framework has a few limitations that developers should
    keep in mind. These include limited support (no support on Microsoft Azure or
    Google Cloud Platform), cross-cloud auto-fulfillment except within certain AWS
    regions, no support for government cloud–enabled regions, limited single organization
    support for Virtual Private Snowflake (VPS), requiring users to use sequences
    instead of AUTOINCREMENT on newly created tables, not supporting temporary tables
    or stages, limited support of Streamlit, and limitations on references. Snowflake
    has structured its Native App Framework around a provider-consumer model, which
    is also used in features such as Snowflake Collaboration and Secure Data Sharing.


    To support Native Apps, providers, or a user who wants to share data content and
    application logic with other users, must follow a specific architecture to enable
    the code for the application package, assign and maintain licensing and entitlements,
    provide access to proprietary data, and provide access to App events. Once the
    application is ready to publish, providers can push the application to the Snowflake
    Marketplace as a public listing or privately list their application for more controlled
    access.


    A consumer, or a Snowflake user who wants to access the data content and application
    logic shared by providers, can then go to the listing and enable the application.
    The application is installed in the consumers’ Snowflake instance, is able to
    be connected to their local data, and can be integrated with a consumer’s external
    systems.


    ## Key Concepts: Data Warehousing in the Cloud


    ## Snowflake Architecture


    Snowflake, a self-managed data platform service, enables data storage, processing,
    and analytic solutions that are faster, easier to use, and more flexible than
    traditional database offerings. It uses a new, state-of-the-art SQL query engine
    deployed on an innovative architecture that has been natively designed for the
    cloud. Because it is a cloud-based service, there is no hardware to choose from
    or configure and manage and no software to maintain, and ongoing maintenance and
    tuning are handled directly by Snowflake.


    In this section, we will delve into the architectural foundations of Snowflake,
    one of the most innovative and powerful cloud data warehousing platforms available
    today. Understanding the architecture is essential for anyone seeking to harness
    the full potential of Snowflake’s capabilities.'
  trans: '

    # 理解 Snowflake 的演进


    除了 Snowflake SQL API，Snowflake 还支持使用其 `Snowflake Native App Framework` 和 `Snowpark
    API`。理解这些解决方案与 `SQL API` 的区别，将有助于您更好地理解 Snowflake 提供的功能。在本书的高级章节中，我们将简要介绍这两种平台功能。为了提供一个详尽的入门介绍，我们将在此讨论二者的不同之处。


    ## Snowpark API


    `Snowpark` 库为开发者提供了一个直观的库，用于在 Snowflake 中大规模查询和处理数据。该库支持三种流行的 AI 和机器学习编程选项之一，让开发者可以自由选择他们熟悉的工作语言：`Python`、`Scala`
    和 `Java`。`Snowpark API` 可以被视为 Snowflake Connector for Spark 的一次迭代，后者允许开发者将 Snowflake
    引入 Apache Spark 生态系统。这使他们能够使用 Spark 从 Snowflake 读取数据以及向 Snowflake 写入数据。


    从那里开始，比较开始出现分歧。Snowpark 开发者可以选择受益于以下优势：使用为不同语言专门构建的库和模式直接在 Snowflake 中交互数据，同时保持性能和功能；支持大多数代码
    IDE（例如 `Jupyter`、`VS Code` 和 `IntelliJ`）；支持将数据转换和繁重任务（例如 Snowflake `UDF`）卸载到 Snowflake
    数据云；并且不需要您在 Snowflake 之外维护单独的工作集群来运行计算。


    由于其原生支持这些语言的能力，开发者可以使用原生语言结构内的类型检查来执行 `SQL` 语句，或者选择指定他们希望执行的 SQL 语句。一个很好的例子是能够使用流行
    Python 库 `DataFrames` 提供的代码结构来构建 `SQL` select 查询。


    由于 `Snowpark` 在 Snowflake 内原生运行，所有操作都在服务器上延迟执行，这允许开发者使用该库将转换的运行时间推迟到管道更晚的阶段，同时还提供了将多个操作批量处理为单次调用的灵活性。这使得开发者能够减少在客户端和
    Snowflake 数据库之间传输数据所需的时间，并提供额外的性能改进。


    使用 `Snowpark API` 提供的工具箱，开发者可以直接在 Snowpark 应用中创建用户定义函数（`UDF`）。`Snowpark` 可以将您的代码推送到服务器，并在您的数据上大规模执行您的
    `UDF`。这为处理数据提供了许多有用且强大的选项，包括循环或批处理功能，其中创建 `UDF` 允许 Snowflake 在 Snowflake 内大规模并行化和应用代码。


    通过在您的代码中定义自定义 `UDF`，您可以使用编写客户端代码的同一种语言编写函数，从而使您能够直接在 Snowflake 数据库中处理数据。`Snowpark`
    能够神奇地处理将 `UDF` 的自定义代码推送到 Snowflake 数据库，并可以在您的客户端代码中被调用。这意味着您无需先将数据传输到本地客户端就能在数据上执行函数，从而为您节省时间、代码、金钱和性能。


    ## Snowflake Native App Framework


    `Snowflake Native App Framework` 允许开发者通过与其他 Snowflake 账户共享数据和相关业务逻辑来扩展其他 Snowflake
    功能的能力；允许通过 Snowflake 市场将应用程序作为免费或付费应用与消费者共享；并包含使用 `Streamlit` 的功能丰富的可视化。Snowflake
    通过允许您创建直接利用核心 Snowflake 功能的数据应用程序来实现这一点。


    Snowflake 构建其 `Native App Framework` 是为了符合大多数开发标准，包括在您的账户内轻松利用测试环境；一个健壮的开发者工作流，在源代码控制中管理代码，同时在
    Snowflake 内维护数据和相关数据库对象；能够随着应用程序的不断演进对其进行版本控制和打补丁；向消费者增量发布更新；以及支持日志记录和非结构化事件，使您的开发者能够对应用程序进行故障排除和监控。


    目前，`Native App Framework` 存在一些开发者应注意的限制。这些包括有限的支持（在 Microsoft Azure 或 Google Cloud
    Platform 上不支持）；除某些 AWS 区域外，不支持跨云自动履行；不支持政府云启用的区域；对虚拟私有 Snowflake (`VPS`) 的有限单组织支持；要求用户在新建表时使用序列而非
    `AUTOINCREMENT`；不支持临时表或临时阶段；对 `Streamlit` 的有限支持；以及对引用的限制。Snowflake 围绕提供者-消费者模型构建其
    `Native App Framework`，该模型也用于 Snowflake Collaboration 和 Secure Data Sharing 等功能中。


    为了支持原生应用，提供者（即希望与其他用户共享数据内容和应用程序逻辑的用户）必须遵循特定的架构，以启用应用程序包的代码、分配和维护许可证与授权、提供对专有数据的访问以及提供对应用程序事件的访问。一旦应用程序准备好发布，提供者可以将其作为公共列表推送到
    Snowflake Marketplace，或私下列出其应用程序以实现更可控的访问。


    消费者（即希望访问提供者共享的数据内容和应用程序逻辑的 Snowflake 用户）可以前往该列表并启用该应用程序。该应用程序安装在消费者的 Snowflake
    实例中，能够连接到其本地数据，并且可以与消费者的外部系统集成。


    # 关键概念：云中的数据仓库


    # Snowflake 架构


    `Snowflake` 是一个自我管理的数据平台服务，它提供的数据存储、处理和分析解决方案比传统数据库产品更快、更易于使用且更灵活。它采用了一种新的、最先进的
    `SQL` 查询引擎，部署在一个为云原生设计的创新架构上。由于它是一项基于云的服务，因此无需选择或配置管理硬件，也无需维护软件，持续的维护和调优直接由 Snowflake
    处理。


    在本节中，我们将深入探讨 Snowflake 的架构基础，它是当今可用的最具创新性和功能最强大的云数据仓库平台之一。对于任何希望充分利用 Snowflake
    功能潜力的人来说，理解其架构都是至关重要的。

    '
- fmt: '### A Multitiered, Multi-clustered Approach


    At the heart of Snowflake’s architecture is its multitiered, multi-clustered design.
    This unique structure allows Snowflake to seamlessly handle data storage and query
    processing at scale. The Snowflake architecture primarily includes the `storage
    tier`, `compute tier`, and `service tier`.


    The `storage tier` is responsible for managing and storing data efficiently in
    a highly compressed, columnar format. Snowflake’s patented object storage, where
    your data is security stored, can reside in cloud storage services such as Amazon
    Web Services (AWS), Microsoft Azure, and Google Cloud Platform (GCP).


    The `compute tier` consists of clusters of virtual machines (commonly referred
    to as `virtual warehouses` in Snowflake) that handle query processing. Snowflake
    dynamically allocates and scales these clusters to ensure optimal query performance,
    even in the face of varying workloads. The `compute tier` is a consumption-based
    model consisting of `credits`, which are consumed based on the amount of time
    it takes the query to run and the size of the `virtual warehouse`.


    Finally, the `service tier` acts as the control plane for Snowflake, managing
    authentication, query routing, metadata storage, and more. The `service tier`
    coordinates activities between the `storage` and `compute` tiers, ensuring data
    consistency and integrity.


    The Snowflake SQL API allows you to take full advantage of these powerful tiers
    directly within your application, allowing you the customization and flexibility
    to build an application the way you want while still gaining the benefits of the
    Snowflake architecture.


    How does Snowflake achieve such an approach? Through the use of a hybrid combination
    of traditional `shared-disk` and `shared-nothing` database architectures. For
    persisted data that is accessible from the `compute tier`, Snowflake uses a central
    data repository. In addition, each compute cluster in the `compute tier` stores
    a portion of the entire dataset locally which can then process queries using `massively
    parallel processing`. This allows Snowflake users a more simple and familiar form
    of data management but provides more optimal performance in scale-out architecture.


    To handle all of this, Snowflake has three layers unique to their architecture:
    `database storage`, `query processing`, and `cloud services`. As data gets loaded
    into Snowflake, the `database storage` layer converts the data into a compressed
    columnar format which is then stored in cloud storage. These data objects are
    not directly visible or accessible by customers and can only be accessed using
    SQL queries. This includes how the data is organized, the file size of each page
    of data, the structure, metadata, and statistics. The `query execution` layer
    is where all of the data can be accessed by the user, and is run on `virtual warehouses`
    using `massively parallel processing` compute clustering. `Virtual warehouses`
    are not shared resources with other Snowflake customers or other `virtual warehouses`,
    therefore minimizing any performance impact on processing. In the `cloud services`
    layer, orchestration of Snowflake takes place. All of the services offered by
    Snowflake that are used to process requests on behalf of a user occur in the `cloud
    services` layer. This includes authentication, management of Snowflake infrastructure,
    metadata management, query processing, and access controls.


    ### Snowflake SQL API: A Comprehensive Overview


    The Snowflake SQL API, at version 6.3 as of the time of this writing, consists
    of a single resource and three endpoints. The first endpoint, and also the resource
    itself, is used to submit SQL statements for execution: `/api/v2/statements/`.
    The second endpoint supported by the REST API checks the status of the statement
    by passing a unique identifier to `/api/v2/statements/<uuid>`. Finally, statements
    can be canceled if they are hung, in an infinite loop, or taking too long to pass
    the unique identifier to `/api/v2/statements/<uuid>/cancel`. The SQL API has been
    designed to remove concurrency limits, which enables you to retrieve query results
    from multiple threads.


    When executing a new SQL statement, a JSON body is created, including the SQL
    statement, and sent to the endpoint using the `HTTP POST` method. You can optionally
    include a `UUID` in the request; otherwise, Snowflake will automatically generate
    one on your behalf. It is suggested to use a `UUID` generator to create your own
    `UUID` values in order to make it easier for subsequent API calls, including retries
    for failed queries. Snowflake allows you to specify if you want to asynchronously
    execute the statement, both in the request or as a setting within Snowflake.


    All requests sent to the API will return a `202` status code indicating that Snowflake
    has received the request and is processing it. The payload will also include a
    `statement handle` and a `statement status URL`, which can be polled by your code
    for results. This makes it easy for you to structure your application in such
    a way as to lazy load your interface and poll the results to be loaded later using
    functionality such as `AJAX` or some other JavaScript method.


    Polling the results uses the `GET` HTTP method, and it is recommended to provide
    a brief delay between requests for results to allow Snowflake the time it needs
    to fully execute the query and load the results into a response body. Once the
    results are complete, Snowflake will return a `200` status code along with the
    first page of the data from the query, as well as additional information you need
    to pull additional pages (partitions). Because of the flexibility of the API,
    you have the option to pull additional pages sequentially or in parallel.


    ### Getting Started with Snowflake SQL API


    #### Introduction


    This chapter aims to familiarize you with the foundational concepts and essential
    steps required to effectively utilize the SQL API for your data management and
    analytics needs. Whether you are a seasoned SQL developer or new to the world
    of cloud data platforms, this chapter provides the necessary context and hands-on
    instructions to help you get up and running with Snowflake.


    We will begin by exploring the basics of Snowflake’s SQL API, including how to
    connect to the platform and execute your first queries. You will learn how to
    navigate the Snowflake environment, interact with various database objects, and
    understand the key components that make up the Snowflake architecture. Additionally,
    this chapter will guide you through setting up your Snowflake account, configuring
    your workspace, and importing data, ensuring you have a solid foundation to build
    upon. By the end of this chapter, you will be equipped with the knowledge and
    skills to start leveraging Snowflake’s SQL API for efficient and effective data
    analysis.'
