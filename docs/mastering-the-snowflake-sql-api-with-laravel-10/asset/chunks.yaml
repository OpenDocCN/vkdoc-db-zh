    {

    "code": "090001",

    "statementHandle": "536fad38-b564-4dc5-9892-a4543504df6c",

    "sqlState": "00000",

    "message": "successfully executed",

    "createdOn": 1597090533987,

    "statementStatusUrl": "/api/v2/statements/536fad38-b564-4dc5-9892-a4543504df6c",

    "resultSetMetaData" : {

    "rowType": [

    {

    "name":"ROWNUM",

    "type":"FIXED",

    "length":0,

    "precision":38,

    "scale":0,

    "nullable":false

    }, {

    "name":"ACCOUNT_NAME",

    "type":"TEXT",

    "length":1024,

    "precision":0,

    "scale":0,

    "nullable":false

    }, [. . .]

    "numRows" : 50000,

    "format" : "jsonv2",

    "partitionInfo" : [ {

    "rowCount" : 12288,

    "uncompressedSize" : 124067,

    "compressedSize" : 29591

    }, {

    "rowCount" : 37712,

    "uncompressedSize" : 414841,

    "compressedSize" : 84469

    }],

    },

    "data": [

    ["customer1", "1234 A Avenue", "98765", "2021-01-20

    12:34:56.03459878"],

    ["customer2", "987 B Street", "98765", "2020-05-31

    01:15:43.765432134"],

    ["customer3", "8777 C Blvd", "98765", "2019-07-01

    23:12:55.123467865"],

    ["customer4", "64646 D Circle", "98765", "2021-08-03

    13:43:23.0"]

    ]

    }

    Listing 4-3

    Laravel API result response

    ```


    Notice that the response key we care most about is the **data** key. Using this
    key, we can loop over every row and pull out the data using something like:


    ```

    $row0 = $query_result[''data''][0];

    $row1 = $query_result[''data''][1];

    ```


    But what if we want a specific column, such as the CREATED_ON column, at the end
    of each row of data? If we did not know the exact structure of the table, we’d
    have to first loop through the [resultSetMetaData][rowType][name] keys to get
    the ordinal key and the value. In this example, that would be the fifth key (or
    ordinal key four since this behaves like an array). Your application code can
    start to get very messy and complex with all of that looping just to find out
    you need to do the following:


    ```

    $row0_created = $query_result[''data''][0][4];

    $row1_created = $query_result[''data''][1][4];

    ```


    Instead, we should define our columns in the SELECT statement. This gives us the
    advantage of optimizing our query by not pulling data we do not plan to use but
    also gives us control of the ordinal key position of each column. Observe the
    following code refactored from before.


    ```

    $query = Http::withHeaders([

    ''Content-Type'' => ''application/json'',

    ''User-Agent'' => ''myApplication/1.0'',

    ''X-Snowflake-Authorization-Token-Type'' => ''KEYPAIR_JWT'',

    ])->acceptJson()->withToken($jwt)->post($snowflake_api_base_url.''/api/v2/statements'',
    [

    ''statement'' => "SELECT CREATED_ON, ADDRESS, ZIP FROM customers;",

    ''database'' => $database,

    ''warehouse'' => $connection->warehouse,

    ''schema'' => $schema,

    ''role'' => $connection->role,

    ''parameters'' => [

    ''query_tag'' => ''black-diamond'',

    ],

    ]);

    Listing 4-4

    Laravel REST API handler with column specification

    ```


    Because we have defined the columns in the SELECT statement, and in the order
    that we want them, we can now predict with a high level of accuracy the ordinal
    key needed to access a specific column. Now our code looks something like this:


    ```

    $row0_address = $query_result[''data''][0][1];

    $row1_address= $query_result[''data''][1][1];

    ```


    The reason we can do this is because we know that the columns are being returned
    in the order they were specified in the SELECT statement (0 => CREATED_ON, 1=>
    ADDRESS, 2 => ZIP). In this example, we eliminate the need for you to know the
    table structure beforehand or rely on your application to derive the correct key.
    If we had to rely on our knowledge of the table, we would introduce bad data to
    our application if a developer added a new column in the middle of the table.
    Suppose we rely on our application to derive the key. In that case, you are writing
    a lot of unnecessary code to loop through the result metadata to find the ordinal
    keys each time, adding both development time overhead and application execution
    overhead.


    ### INSERT Statements


    From time to time, you might need to insert new data into your Snowflake instance.
    This could be data generated by your application, data received by user input,
    or data your application processes from third parties that then must be persisted
    to your database. Because of the nature of the application my team and I built
    around the Snowflake SQL API, that being a multi-tenant solution for Snowflake
    observability and performance, we only rarely insert data to the database using
    the API. That is because the data that drives our tool lives in our internal instance
    of Snowflake, which we use a PHP Driver to interact with, but there are times
    we have to create data in a customers’ instance within the application database
    that gets created on each install. Inserting data into Snowflake uses the INSERT
    clause with the following syntax.


    ```

    INSERT [ OVERWRITE ] INTO  [ (  [ , ... ] ) ]

    {

    VALUES ( {  | DEFAULT | NULL } [ , ... ] ) [ , ( ... ) ]  |


    }

    Listing 4-5

    Snowflake INSERT statement dictionary

    ```


    The syntax here is much more straightforward than what we saw with the SELECT
    clause. You have the ability to insert new data, or optionally overwrite existing
    data, using the INSERT clause and specifying the column names and the values,
    or data, for each record. The API does allow you to insert multiple rows of data,
    but this adds some complexities to your code that we’ll talk about below. One
    thing to note: the OVERWRITE keyword does not behave like an “upsert” of data.
    Instead, this is a quick way to truncate all of the existing data in a table and
    replace it with the new data without having to specify multiple queries.


    When it comes to inserting data, inserting single records of data is fairly straightforward.
    In your SQL statement, you’ll want to specify the column names and then supply
    variables of your data as the values so that, in this way, you can construct a
    dynamic insert statement. Where this could get complex is in an instance where
    you have a lot of columns that need to be populated or if you are performing multi-insert
    operations. Snowflake, albeit inadvertently, does provide a clean solution for
    this.


    Touching briefly upon a more advanced topic, Snowflake, like most all database
    solutions, provides the ability to create Stored Procedures. You can create these
    directly in Snowflake, using the SnowSQL command line tool, or by having your
    application run a one-time configuration script via the API. For example, my application
    expects various Stored Procedures to exist in a customers’ Snowflake instance
    in order to run properly. When a customer sets up a new connection for the first
    time, they are prompted to run a “Deploy Configuration” script.


    This script uses the API to create the various objects, tasks, and stored procedures
    in their Snowflake instance. We version this configuration and store it in the
    connections table in a column called “config_version_deployed”. If this value
    is NULL or set to a version lower than the current version, the user will be displayed
    a banner prompting them to run the new or latest configuration. Because we must
    do this via the API to take manual effort off of the customer, the configuration
    script does get somewhat long and complex. However, the trade-off is cleaner code
    within the rest of the application and was felt to be an overall solid solution.'
