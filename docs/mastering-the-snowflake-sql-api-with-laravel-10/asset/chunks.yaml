- fmt: '# SQL数据聚合与排序指南


    ## GROUP BY


    我们首先来看`GROUP BY`子句，因为它对支持聚合函数很重要。`GROUP BY`子句将具有相同`group-by-item`表达式的行进行分组，并为结果组计算聚合函数。你可以在分组中指定多个项来进一步细化结果。让我们看一个例子：


    ```sql

    SELECT  cv.student_id FROM campus_violations cv

    GROUP BY cv.student_id

    ```


    这个查询将对两个值进行分组，并为每个唯一的分组返回一行。如果一个学生在校园内有多次违规，它只会返回一次`student_id`。这种方法可用于确定哪些学生自入学以来曾经有过校园违规。


    ```sql

    SELECT  cv.student_id, cv.type FROM campus_violations cv

    GROUP BY cv.student_id, cv.type

    ```


    进一步细化，我们可以按类型分组。如果一个学生有多个“停车”类型的违规，你将得到一条包含其`student_id`和停车类型的记录。如果该学生有其他违规类型，每种类型都将返回一条该`student_id`和其违规类型的记录，导致你看到该`student_id`因不同类型而出现多次。


    ```sql

    SELECT  cv.student_id, cv.type FROM campus_violations cv

    GROUP BY cv.student_id, cv.type

    HAVING COUNT(cv.student_id) > 1

    ```


    到这里，也许我们只想看到屡犯者。在这里，我们通过告诉查询仅当`student_id`在校园内有多次违规时，才返回其`student_id`和关联的违规类型，来进一步优化查询。如果某个`student_id`在表中只出现一次，它将不会被返回。`HAVING`子句允许你定义通用表达式来评估`GROUP
    BY`如何返回数据。


    ```sql

    SELECT  cv.student_id, cv.type, COUNT(cv.full_name) AS violation_count FROM campus_violations
    cv

    GROUP BY cv.student_id, cv.type

    HAVING COUNT(cv.student_id) > 1

    ```


    最后，通过在`SELECT`子句中提供聚合函数`COUNT`，我们可以了解一个学生每种类型的违规次数。如果一个学生有六次停车违规，你将看到一条包含`student_id`、停车类型和数值6的记录结果。


    需要注意的是，当你使用`GROUP BY`子句时，你必须要么匹配你的`SELECT`子句，使`SELECT`子句中出现的任何列也出现在`GROUP BY`子句中；要么你必须将不匹配的列包装在聚合函数中。在前面的例子中，你会注意到`full_name`被包装在`COUNT`聚合函数中，但`full_name`没有出现在`GROUP
    BY`子句中。这是因为聚合函数本质上已经将数据分组在一起。


    ## 聚合函数


    聚合函数是转换数据以便进行更有意义探索的手段。你可以使用`AVG`函数获取所有值的平均值，使用`SUM`函数获取所有值的总和，使用`MIN`函数获取最小值，等等。让我们回到大学的例子，看一个查询示例：


    ```sql

    SELECT s.full_name, s.student_id, g.grade FROM students s

    INNER JOIN grades g ON g.student_id = s.student_id

    ```


    此示例将返回所有学生及其成绩列表。由于一个学生可能有多个成绩（取决于他们是否选修了多门课程），你会看到`full_name`和`student_id`重复出现多次。我们可以进一步优化此查询，为学生定义一个平均绩点：


    ```sql

    SELECT s.full_name, s.student_id, AVG(g.grade) AS grade_average FROM students
    s

    INNER JOIN grades g ON g.student_id = s.student_id

    GROUP BY s.full_name, s.student_id

    ```


    这个例子引入了我们的第一个聚合函数，平均值函数（`AVG`），并定义了列名（`AS grade_average`）。如果我们没有定义列名，结果集将返回列名为`AVG(g.grade)`。返回的列表将为你提供唯一的`full_name`和`student_id`值列表，以及匹配记录的所有成绩值的平均值。如果我们想知道每个学生收到的最低成绩是什么，我们可以在查询中添加`MIN(g.grade)`，它将返回该学生成绩列表中的最低分。


    ## 数据排序


    最后，让我们看看如何对数据进行排序。当你返回数据集时，你可能需要它以特定的信息顺序输出。也许你希望所有的`student_id`出现在一起，或者你希望每条记录的最新版本排在前面。当你使用`ORDER
    BY`子句时，你可以指定数据如何返回。


    ```sql

    SELECT s.full_name, s.student_id, s.enrolled_date FROM students s

    ORDER BY s.enrolled_date DESC

    ```


    在这个例子中，我们返回所有曾经在大学注册过的学生列表。`ORDER BY`子句表示按`enrolled_date`降序排序。结果集将返回最近入学的学生，然后时间向后推移。如果你将`DESC`标志改为`ASC`，它将返回最老的学生，即最早入学的学生，然后时间向前推移。你也可以为排序指定多个`ORDER
    BY`条件。


    ```sql

    SELECT s.full_name, s.student_id, s.enrolled_date, s.last_seen_date FROM students
    s

    ORDER BY s.last_seen_date DESC, s.enrolled_date DESC

    ```


    在这个例子中，我们将获得所有曾经在大学注册过的学生的列表。你会首先看到他们在大学系统中最后出现的时间顺序。如果多个学生有相同的`last_seen`日期（比如新学期开始），则会进一步按最近入学的学生排序。


    重要的是要知道，如果没有`ORDER BY`子句，查询返回的结果是一个无序集合。这意味着如果你多次运行相同的查询，每次运行的输出排序可能不同。如果顺序很重要，或者你想有更大的机会重用先前查询运行的缓存数据，你应该利用`ORDER
    BY`子句。'
  raw: '### GROUP BY


    We will first look at the GROUP BY clause, as it is important in supporting aggregate
    functions. The GROUP BY clause groups rows with the same group-by-item expression
    and computes aggregate functions for the resulting group. You can specify multiple
    items in the grouping to further refine your results. Let’s look at an example:


    ```

    SELECT  cv.student_id FROM campus_violations cv

    GROUP BY cv.student_id

    ```


    This query will group both values and return a single row for each unique grouping.
    If a student has multiple violations on campus, it will only return the student_id
    one time. This method might be used to determine which students have ever had
    a campus violation since being at the school.


    ```

    SELECT  cv.student_id, cv.type FROM campus_violations cv

    GROUP BY cv.student_id, cv.type

    ```


    Taking it one step further, we can group by type. If a student has had multiple
    violations of type “parking” you would get a single record with their student_id
    and the type of parking. If the student has other violation types, each type will
    return a single record of that student_id and the type of violation they had,
    resulting in seeing a record for the student_id multiple times for each type.


    ```

    SELECT  cv.student_id, cv.type FROM campus_violations cv

    GROUP BY cv.student_id, cv.type

    HAVING COUNT(cv.student_id) > 1

    ```


    From here, perhaps we want to only see students who are repeat offenders. Here
    we are further refining the query by telling it to only give us a student_id and
    their associated violation type if they have had more than one violation on campus.
    If a student_id appears in the table only one time, it will not be returned. The
    HAVING clause allows you to define general expressions that can evaluate how the
    GROUP BY returns data.


    ```

    SELECT  cv.student_id, cv.type, COUNT(cv.full_name) AS violation_count FROM campus_violations
    cv

    GROUP BY cv.student_id, cv.type

    HAVING COUNT(cv.student_id) > 1

    ```


    Finally, we can get an idea of how many violations a student has had of each type
    by supplying the aggregate function of COUNT in the SELECT clause. If a student
    had six parking violations, you’d see a record result with the student_id, the
    type of parking, and a value of 6.


    It is important to note that when you use a GROUP BY clause, you must either match
    your SELECT clause so that any column appearing in the SELECT clause also appears
    in the GROUP BY clause or you must wrap unmatched columns in an aggregate function.
    In the previous example, you’ll notice that full_name is wrapped in the COUNT
    aggregate function, but full_name does not appear in the GROUP BY clause. That
    is because, by nature, the aggregate function already groups data together.


    ### Aggregate Functions


    Aggregate functions are means of transforming your data so that they can be used
    for more meaningful exploration. You might use the AVG function to get an average
    of all values, the SUM function to get a summation of all values, the MIN function
    to get the lowest value, and so on. Let’s go back to our university example and
    look at an example query:


    ```

    SELECT s.full_name, s.student_id, g.grade FROM students s

    INNER JOIN grades g ON g.student_id = s.student_id

    ```


    This example will return all students and a list of their grades. Since a student
    could have multiple grades, depending on if they are enrolled in multiple classes,
    you will see the full_name and student_id repeated multiple times. We can take
    this query one step further and define a grade-point average for the student:


    ```

    SELECT s.full_name, s.student_id, AVG(g.grade) AS grade_average FROM students
    s

    INNER JOIN grades g ON g.student_id = s.student_id

    GROUP BY s.full_name, s.student_id

    ```


    This example introduces our first aggregate function, the average function (AVG),
    and defines the column name (*AS grade_average*). If we did not define a column
    name, the result set would return the column name as **AVG(g.grade)**. The returned
    list will give you a unique list of full_name and student_id values, and the average
    of all of the grade values for the matching records. If we wanted to know what
    the lowest grade each student received is, we could add *MIN(g.grade)* to the
    query and it would return the lost grade in the list of grades for that student.


    ### Ordering Data


    Finally, let us look at how to order data. When you return your dataset, you might
    need it to output in a specific ordering of information. Perhaps you want all
    student_ids to appear together or you want the most recent version of each record
    first. When you use an ORDER BY clause, you can specify how the data gets returned.


    ```

    SELECT s.full_name, s.student_id, s.enrolled_date FROM students s

    ORDER BY s.enrolled_date DESC

    ```


    In this example, we are returning a list of all students who have ever enrolled
    at the university. The ORDER BY clause says to take the enrolled_date and order
    it in descending order. The resulting set would return the most recently enrolled
    student and then continue backwards in time. If you were instead to change the
    *DESC* flag to *ASC*, it would return the oldest student, presumably the student
    who enrolled first at the university, and then continue forward in time. You can
    also specify more than one ORDER BY criteria for sorting.


    ```

    SELECT s.full_name, s.student_id, s.enrolled_date, s.last_seen_date FROM students
    s

    ORDER BY s.last_seen_date DESC, s.enrolled_date DESC

    ```


    In this example, we would get a list of all students who ever enrolled at the
    university. You’d see them first in the order of when they were last seen in the
    university systems. If multiple students had the same last_seen date, say the
    start of a new semester, it would then sort it further by the student who enrolled
    most recently.


    It is important to know that without an ORDER BY clause, the results returned
    by a query are an unordered set. This means if you run the same query repeatedly,
    the resulting output could be sorted differently each time it is run. If order
    matters, or if you want a greater chance of reusing cached data from a previous
    run of the query, you should leverage the ORDER BY clause.'
  trans: '

    # SQL 数据聚合与排序指南


    ## GROUP BY


    我们首先来看`GROUP BY`子句，因为它对支持聚合函数很重要。`GROUP BY`子句将具有相同`group-by-item`表达式的行进行分组，并为结果组计算聚合函数。你可以在分组中指定多个项来进一步细化结果。让我们看一个例子：


    ```sql

    SELECT  cv.student_id FROM campus_violations cv

    GROUP BY cv.student_id

    ```


    这个查询将对两个值进行分组，并为每个唯一的分组返回一行。如果一个学生在校园内有多次违规，它只会返回一次`student_id`。这种方法可用于确定哪些学生自入学以来曾经有过校园违规。


    ```sql

    SELECT  cv.student_id, cv.type FROM campus_violations cv

    GROUP BY cv.student_id, cv.type

    ```


    进一步细化，我们可以按类型分组。如果一个学生有多个“停车”类型的违规，你将得到一条包含其`student_id`和停车类型的记录。如果该学生有其他违规类型，每种类型都将返回一条该`student_id`和其违规类型的记录，导致你看到该`student_id`因不同类型而出现多次。


    ```sql

    SELECT  cv.student_id, cv.type FROM campus_violations cv

    GROUP BY cv.student_id, cv.type

    HAVING COUNT(cv.student_id) > 1

    ```


    到这里，也许我们只想看到屡犯者。在这里，我们通过告诉查询仅当`student_id`在校园内有多次违规时，才返回其`student_id`和关联的违规类型，来进一步优化查询。如果某个`student_id`在表中只出现一次，它将不会被返回。`HAVING`子句允许你定义通用表达式来评估`GROUP
    BY`如何返回数据。


    ```sql

    SELECT  cv.student_id, cv.type, COUNT(cv.full_name) AS violation_count FROM campus_violations
    cv

    GROUP BY cv.student_id, cv.type

    HAVING COUNT(cv.student_id) > 1

    ```


    最后，通过在`SELECT`子句中提供聚合函数`COUNT`，我们可以了解一个学生每种类型的违规次数。如果一个学生有六次停车违规，你将看到一条包含`student_id`、停车类型和数值
    6 的记录结果。


    需要注意的是，当你使用`GROUP BY`子句时，你必须要么匹配你的`SELECT`子句，使`SELECT`子句中出现的任何列也出现在`GROUP BY`子句中；要么你必须将不匹配的列包装在聚合函数中。在前面的例子中，你会注意到`full_name`被包装在`COUNT`聚合函数中，但`full_name`没有出现在`GROUP
    BY`子句中。这是因为聚合函数本质上已经将数据分组在一起。


    ## 聚合函数


    聚合函数是转换数据以便进行更有意义探索的手段。你可以使用`AVG`函数获取所有值的平均值，使用`SUM`函数获取所有值的总和，使用`MIN`函数获取最小值，等等。让我们回到大学的例子，看一个查询示例：


    ```sql

    SELECT s.full_name, s.student_id, g.grade FROM students s

    INNER JOIN grades g ON g.student_id = s.student_id

    ```


    此示例将返回所有学生及其成绩列表。由于一个学生可能有多个成绩（取决于他们是否选修了多门课程），你会看到`full_name`和`student_id`重复出现多次。我们可以进一步优化此查询，为学生定义一个平均绩点：


    ```sql

    SELECT s.full_name, s.student_id, AVG(g.grade) AS grade_average FROM students
    s

    INNER JOIN grades g ON g.student_id = s.student_id

    GROUP BY s.full_name, s.student_id

    ```


    这个例子引入了我们的第一个聚合函数，平均值函数（`AVG`），并定义了列名（`AS grade_average`）。如果我们没有定义列名，结果集将返回列名为`AVG(g.grade)`。返回的列表将为你提供唯一的`full_name`和`student_id`值列表，以及匹配记录的所有成绩值的平均值。如果我们想知道每个学生收到的最低成绩是什么，我们可以在查询中添加`MIN(g.grade)`，它将返回该学生成绩列表中的最低分。


    ## 数据排序


    最后，让我们看看如何对数据进行排序。当你返回数据集时，你可能需要它以特定的信息顺序输出。也许你希望所有的`student_id`出现在一起，或者你希望每条记录的最新版本排在前面。当你使用`ORDER
    BY`子句时，你可以指定数据如何返回。


    ```sql

    SELECT s.full_name, s.student_id, s.enrolled_date FROM students s

    ORDER BY s.enrolled_date DESC

    ```


    在这个例子中，我们返回所有曾经在大学注册过的学生列表。`ORDER BY`子句表示按`enrolled_date`降序排序。结果集将返回最近入学的学生，然后时间向后推移。如果你将`DESC`标志改为`ASC`，它将返回最老的学生，即最早入学的学生，然后时间向前推移。你也可以为排序指定多个`ORDER
    BY`条件。


    ```sql

    SELECT s.full_name, s.student_id, s.enrolled_date, s.last_seen_date FROM students
    s

    ORDER BY s.last_seen_date DESC, s.enrolled_date DESC

    ```


    在这个例子中，我们将获得所有曾经在大学注册过的学生的列表。你会首先看到他们在大学系统中最后出现的时间顺序。如果多个学生有相同的`last_seen`日期（比如新学期开始），则会进一步按最近入学的学生排序。


    重要的是要知道，如果没有`ORDER BY`子句，查询返回的结果是一个无序集合。这意味着如果你多次运行相同的查询，每次运行的输出排序可能不同。如果顺序很重要，或者你想有更大的机会重用先前查询运行的缓存数据，你应该利用`ORDER
    BY`子句。

