  trans: '

    ### 多层级、多集群的方法


    Snowflake 架构的核心是其多层级、多集群的设计。这种独特的结构使得 Snowflake 能够无缝地处理大规模数据存储和查询处理。Snowflake
    架构主要包括`存储层`、`计算层`和`服务层`。


    `存储层`负责以高度压缩的列式格式高效管理和存储数据。Snowflake 的专利对象存储（您的数据安全存储于此）可以驻留在云存储服务中，例如 Amazon
    Web Services (AWS)、Microsoft Azure 和 Google Cloud Platform (GCP)。


    `计算层`由虚拟机集群（在 Snowflake 中通常称为`虚拟仓库`）组成，这些集群负责处理查询。Snowflake 会动态分配和扩展这些集群，以确保即使面对变化的工作负载，也能获得最佳的查询性能。`计算层`采用基于消耗的模型，由`信用额度`构成，其消耗基于查询运行所需的时间以及`虚拟仓库`的大小。


    最后，`服务层`作为 Snowflake 的控制平面，管理身份验证、查询路由、元数据存储等。`服务层`协调`存储层`和`计算层`之间的活动，确保数据的一致性和完整性。


    Snowflake SQL API 允许您直接在您的应用程序中充分利用这些强大的层级，为您提供自定义和灵活性，让您能够按照自己的方式构建应用程序，同时还能获得
    Snowflake 架构的优势。


    Snowflake 是如何实现这种方法的？通过结合传统的`共享磁盘`和`无共享`数据库架构的混合方式。对于可从`计算层`访问的持久化数据，Snowflake
    使用一个中央数据存储库。此外，`计算层`中的每个计算集群都在本地存储一部分完整数据集，然后可以使用`大规模并行处理`来处理查询。这使得 Snowflake
    用户能以更简单、更熟悉的形式进行数据管理，同时在横向扩展架构中提供更优的性能。


    为了处理所有这些，Snowflake 的架构有其独特的三层结构：`数据库存储`、`查询处理`和`云服务`。当数据加载到 Snowflake 时，`数据库存储`层将数据转换为压缩的列式格式，然后存储在云存储中。这些数据对象对客户不可见也不可直接访问，只能通过
    SQL 查询来访问。这包括数据的组织方式、每个数据页的文件大小、结构、元数据和统计信息。`查询执行`层是用户访问所有数据的地方，它运行在采用`大规模并行处理`计算集群的`虚拟仓库`上。`虚拟仓库`不是与其他
    Snowflake 客户或其他`虚拟仓库`共享的资源，因此最大限度地减少了任何对处理的性能影响。在`云服务`层中，进行 Snowflake 的编排。Snowflake
    提供的所有用于代表用户处理请求的服务都在`云服务`层中进行。这包括身份验证、Snowflake 基础设施管理、元数据管理、查询处理和访问控制。


    ### Snowflake SQL API：全面概述


    Snowflake SQL API（截至本文撰写时版本为 6.3）由一个资源和三个端点组成。第一个端点，也是资源本身，用于提交 SQL 语句执行：`/api/v2/statements/`。REST
    API 支持的第二个端点通过向`/api/v2/statements/<uuid>`传递一个唯一标识符来检查语句状态。最后，如果语句挂起、陷入无限循环或执行时间过长，可以通过向`/api/v2/statements/<uuid>/cancel`传递唯一标识符来取消语句。SQL
    API 的设计旨在消除并发限制，使您能够从多个线程检索查询结果。


    执行新的 SQL 语句时，会创建一个包含 SQL 语句的 JSON 主体，并使用`HTTP POST`方法将其发送到端点。您可以在请求中选择性地包含一个`UUID`；否则，Snowflake
    将自动为您生成一个。建议使用`UUID`生成器创建自己的`UUID`值，以便于后续的 API 调用，包括对失败查询的重试。Snowflake 允许您指定是否要在请求中或作为
    Snowflake 内的设置异步执行语句。


    所有发送到 API 的请求都将返回一个`202`状态码，表明 Snowflake 已收到请求并正在处理。负载还将包含一个`语句句柄`和一个`语句状态 URL`，您的代码可以轮询这些以获取结果。这使您能够轻松构建应用程序，实现界面的延迟加载，并使用诸如`AJAX`或其他
    JavaScript 方法在之后轮询结果进行加载。


    轮询结果使用`HTTP GET`方法，建议在请求结果之间提供短暂延迟，以便 Snowflake 有足够的时间完全执行查询并将结果加载到响应体中。一旦结果完成，Snowflake
    将返回一个`200`状态码以及查询数据的第一页，还有您需要提取其他页（分区）的额外信息。由于 API 的灵活性，您可以选择顺序或并行提取其他页面。


    ### 开始使用 Snowflake SQL API


    #### 简介


    本章旨在让您熟悉有效利用 SQL API 进行数据管理和分析所需的基本概念和关键步骤。无论您是经验丰富的 SQL 开发人员，还是云数据平台的新手，本章都提供了必要的背景知识和实践指导，帮助您开始使用
    Snowflake。


    我们将从探索 Snowflake SQL API 的基础知识开始，包括如何连接到平台并执行您的第一个查询。您将学习如何导航 Snowflake 环境、与各种数据库对象交互，并理解构成
    Snowflake 架构的关键组件。此外，本章还将指导您完成设置 Snowflake 账户、配置工作区和导入数据的过程，确保您拥有坚实的基础。在本章结束时，您将具备开始利用
    Snowflake SQL API 进行高效有效数据分析的知识和技能。

    '
- fmt: '## Setting Up Your Snowflake Account


    Snowflake uses a browser-based web interface for interacting with the platform,
    as well as a command-line interface (`SnowSQL`), various database drivers, and
    API access. If it is your first time getting started with Snowflake, you’ll want
    to log in using the Snowflake web-based client called `Snowsight` to get started.
    After registering for an account and agreeing to the Terms of Service, you’ll
    be provided with an email with instructions on logging in for the first time.


    Logging into Snowflake uses a unique URL that contains an account identifier.
    The account identifier is a way to identify your Snowflake account within your
    organization uniquely and also separates it from the global network of other Snowflake
    accounts. The account identifier uses your account name along with the organization
    name (e.g., `myorg-account123`) to reference your unique account. You can optionally
    use the Snowflake-assigned account locator as the identifier, but this legacy
    format is discouraged as Snowflake plans to phase it out. You use your Snowflake
    unique account identifier in a variety of ways, including


    1. Accessing the Snowflake web interface via a web browser

    2. Using `SnowSQL` and other clients to connect to Snowflake

    3. Third-party applications and services within the Snowflake ecosystem

    4. Security features that protect your Snowflake account

    5. Global features, such as secure data sharing and replication

    6. Accessing the Snowflake `SQL` and `Snowpark` APIs


    It is important to note that upon initial registration, you’ll be given both an
    account identifier and an organization identifier. Organizations enable administrators
    within your business to manage all aspects of your Snowflake contract as it relates
    to your business entity. An organization can have one or multiple accounts attached
    to it, each with its own unique identifier, giving you the flexibility to set
    up your cloud data center in a way that meets your business’s unique needs. If
    your business did not sign up through the self-service option, Snowflake will
    have already created an organization for you and assigned it to your `ORGADMIN`
    (the owner of your organization). Account identifiers, including legacy identifiers
    and other lesser-used formats, are fully detailed in the Snowflake documentation
    but are outside the scope of this book. We will use the preferred format that
    Snowflake recommends, but you can see all other formats and information regarding
    them here: [`https://docs.snowflake.com/en/user-guide/admin-account-identifier`](https://docs.snowflake.com/en/user-guide/admin-account-identifier)


    ### Configuring and Managing Your Environment


    To get started, you need to log into your Snowflake environment. You can go directly
    to the unique URL that was provided by Snowflake when you registered or go to
    [`https://app.snowflake.com`](https://app.snowflake.com) and log in with your
    account name and Snowflake credentials. Once you are logged into `Snowsight`,
    you’ll want to navigate to the Admin section in the left-hand navigation bar.
    From here, we will create a new user for your API. Because of the power of the
    API, it is not recommended to use a user that has `ACCOUNTADMIN` or `ORGADMIN`
    access.


    We will not define a Default Role or a Default Warehouse for now. Go ahead and
    click Create User and then test that you are able to log in with that user. Once
    you are finished, log back into `Snowsight` using your `ACCOUNTADMIN` credentials,
    and we will move on to creating your first role. Roles provide you with a simple
    method to group users into a single team, department, or set of permissions. When
    you are managing security in Snowflake, you’ll `GRANT` access to Snowflake objects
    directly to a role. Roles work using inheritance, allowing you to create a tree
    structure for your role to inherent permissions and reduce redundant `GRANTS`.
    We will create a basic role and assign it to the User we created previously. Ensure
    the role does not inherit any permissions from other roles unless you need it
    to. In most cases, it is recommended that your API role does not inherit any permissions
    from other roles and that the permissions are custom-tailored to what you need
    your application to perform. This prevents you from opening up too much access
    and mistakenly removing access that could break your application.


    Next, we want to navigate to Warehouses and create a new Warehouse. Based on the
    structure of your application and business logic, you might have multiple Warehouses
    that get called in various areas of your application based on resource needs.
    In large part, however, you should have one Warehouse dedicated to your API user,
    which is the Default Warehouse. This allows you to incrementally scale and increase
    the size of your Warehouse as your application grows while not impacting other
    Snowflake queries. Once you create the new Warehouse, go back to the User we created
    previously, click Edit, and assign the Default Role and Default Warehouse we just
    created.


    ![](images/615715_1_En_3_Chapter/615715_1_En_3_Fig1_HTML.jpg)


    Figure 3-1: New user creation


    ### Navigating the Snowflake Web Interface


    Snowflake provides users two primary ways to interact with the Snowflake cloud
    platform: the `SnowSQL` command-line utility and the web-based Snowflake UI, referred
    to as `Snowsight`. Of the two, the Snowflake Web UI is the most commonly used
    method for interacting with Snowflake, including executing queries and performing
    administrative functions such as managing warehouses, database objects, security,
    and reviewing cost and performance.


    Snowflake provides both the `Snowsight` UI and the Classic UI, but we will focus
    on the former, considering that the Classic UI has a roadmap to be fully phased
    out. You are presented with the Dashboards page and a left-hand navigation when
    logging in. We will discuss each section within that navigation, including submenu
    items and how they are used when working with Snowflake. This information, though
    foundational, is essential to understand so that we can better demonstrate the
    capabilities and communicate the limitations of the Snowflake `SQL` API.


    #### Dashboard


    Dashboards provide Snowflake users with a flexible way to create collections of
    charges, arranged as tiles, that get populated directly by query results from
    your Snowflake data. This allows you to build rapid solutions to monitor your
    Snowflake account as well as derive quick insights into your data that can be
    used repeatedly and shared with other team members. The dashboard metrics are
    fully customizable and support a wide range of filtering options to provide interactive,
    dynamic filtering to the end users. While it is a powerful addition to your arsenal,
    it should be noted that the Dashboards functionality in Snowflake is not intended
    to replace your traditional BI tools. Instead, it should be used as a way to gain
    some quick, high-level insights into your account and data.'
