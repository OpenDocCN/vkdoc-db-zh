  trans: "\n# 4. 使用 Snowflake SQL API 的 SQL 基础\n\n在本章中，我们将回顾 SQL 在 Snowflake 及其 Snowflake\
    \ SQL API 背景下的一些基本功能。本章很大一部分内容将介绍常见的数据库和 SQL 概念，同时向您介绍 Snowflake 的特定细微差别以及 SQL\
    \ API 的功能和限制。在数据管理和分析领域中，掌握基本的 SQL 函数就如同掌握了通往一个强大王国的钥匙。通过在 Snowflake 动态生态系统中提供\
    \ SQL 的构建模块，无论您是初涉数据领域的新手，还是寻求精进技能的经验丰富的实践者，本章都将成为您驾驭 Snowflake SQL API 全部潜力的门户。\n\
    \n我们将从探索关键的 `SELECT` 语句开始，了解其用于精确数据检索和分析的细微差别。随后对 `INSERT`、`UPDATE` 和 `DELETE`\
    \ 操作的关注，为您提供了一个在应用程序中塑造和维护数据集的战略视角，这对于战略性的数据治理至关重要。然后，我们将探讨 `JOIN` 操作，这对于在数据集之间编织复杂关系至关重要。我们将理解\
    \ `JOIN` 条件和 `WHERE` 子句如何采用细致入微的条件逻辑方法，以赋能专业人士提取目标数据集，随后介绍数据聚合和分组。\n\n为确保我们执行的是性能优化的查询，我们将探索子查询和公共表表达式（CTE）如何在单个\
    \ API 调用中用于快速排序和筛选较大数据集，然后再将其与更精细的数据连接。这种基本的 SQL 技术是我们在 Black Diamond 采用的关键策略，用于定位可优化的查询，降低运行仓库的计算成本，并减少远程和本地溢出。\n\
    \n最后，我们将探讨 Snowflake 的绑定变量功能。绑定使处理动态筛选条件更容易，也使处理数据类型转换更便捷。除了使代码更简洁、更易读外，它还减少了代码中冗长的\
    \ SQL 查询，选择将这项有时繁琐的任务交给 Snowflake SQL API 引擎处理，而不是由我们自己处理。\n\n本章不仅仅是一个教程；对于寻求利用\
    \ Snowflake SQL API 掌控数据的专业开发人员和管理者来说，它是一份战略指南。当我们深入研究这些基本 SQL 函数的复杂性时，最终目标是让您掌握所需技能，以编排复杂的数据操作，并为您的应用程序成功获取可操作的见解。\n\
    \n## 注意事项\n\n我们并未涵盖此代码的所有安全影响，因此让我们花点时间来讨论一下。首先，不建议您将公钥和私钥直接存储在代码中。您可以选择将其存储在本地数据库中并为代码加盐，或者安装到第三方工具中，例如\
    \ AWS Secrets Manager。保护私钥的安全对于应用程序的安全至关重要。如果您遵循了本章前面关于网络策略的讨论，您可以通过将 API 用户的登录限制在您的应用程序服务器的\
    \ IP 地址，来进一步限制其通过 UI 或 API 被使用。如果您的私钥被泄露，恶意用户还需要访问您的服务器才能用它进行任何有意义的操作。由于此密钥可能有权访问大量安全数据，还建议您不要重复使用来自任何其他系统的私钥（例如您的\
    \ SSH 密钥或 GitHub 密钥）。\n\n另一个应该指出的风险是，这可能会允许 SQL 注入到您的 Snowflake 实例中。毕竟，我们正在使用\
    \ Laravel 通过 API 将 SQL 代码注入到 Snowflake，这正是我们想要的，但我们希望防止其被恶意使用。您可以做的一件事是，不允许任何\
    \ SQL 直接从应用程序的 URL 或表单传递给 `execute` 函数。有许多方法可以降低风险，但我认为最重要的是，不要允许您的 `execute`\
    \ 函数直接接收任何由终端用户通过 URL、表单或其他方法直接生成的 SQL 查询。\n\n最后，您可能考虑通过 `lifetime` 变量将 JWT 令牌的过期时间降低到小于\
    \ 59 分钟。这确保了如果有人对您的服务器进行“中间人”攻击，他们无法抓取 JWT 令牌并在其他地方使用它。同样，如果您既保护了私钥安全，又为 API 用户实施了网络策略，就能进一步缓解此风险。\n\
    \n## 结论\n\n您现在应该对 Snowflake SQL API 的基础和入门必备步骤有了扎实的理解。您已经学会了如何连接到 Snowflake、导航环境以及执行基本的数据操作。凭借这些基础知识，您已具备深入探索该平台更高级特性和功能的基础。随着您继续前行，本章所获得的技能将成为通向掌握\
    \ Snowflake 强大数据管理和分析能力的关键垫脚石。\n\n让我们来剖析并解释我们在做什么。我们首先定义 `execute` 函数，它带有一些我们可以提供的动态参数，然后生成\
    \ JWT 令牌和 API 的基础 URL。真正的魔法发生在 `$query` 变量中，我们在那里定义了使用 Laravel HTTP 包发送的有效负载。在头部信息中，我们告知\
    \ API 我们正在发送 JSON 主体，并告诉 Snowflake 期望使用 JWT 密钥对进行身份验证。因为我们使用了 JWT，所以需要提供 HTTP\
    \ 包的 `withToken()` 方法，它会自动将 JWT 令牌正确地传递给 API，并告知 Snowflake 我们期望返回 JSON 响应（错误、成功消息或查询结果）。在\
    \ `post()` 方法内部，我们将主体定义为我们想要执行的 SQL 语句、它应该针对哪个数据库和模式执行、它应使用哪个仓库以及要使用的用户角色。参数中的\
    \ `query tag` 是可选的，但当我们在 Snowsight 中使用查询历史选项卡来筛选由我们的 API 特别发送的查询以便更快地进行调试或分析时，这很有帮助。\n\
    \n假设我们收到了单页查询结果，并且存在多页或分区，我们可以使用 JSON 响应获取语句句柄和组中的下一个分区，并将其传递给特定于分区获取的辅助函数。\n\n\
    ```php\npublic static function getPartition($statementHandle, $partition)\n{\n\
    \    $jwt = static::generateJwt();\n    $base_url = static::createBaseUrl($account,\
    \ $region);\n    $query = Http::withHeaders([\n        'Content-Type' => 'application/json',\n\
    \        'User-Agent' => 'myApplication/1.0',\n        'X-Snowflake-Authorization-Token-Type'\
    \ => 'KEYPAIR_JWT',\n    ])->acceptJson()->withToken($jwt)->get($base_url . '/api/v2/statements/'\
    \ . $statementHandle .\n    '?partition=' . $partition);\n    return $query;\n\
    }\n```\n代码清单 3-5: Laravel Snowflake 分页\n\n上面的代码与我们的 `execute` 辅助方法非常相似，但需要的数据要少得多。我们实际上没有传递任何\
    \ JSON 主体，甚至没有进行 `POST` 调用，而是进行了一次 `GET` 调用。这将指向我们在先前调用中已生成的结果，由语句句柄引导，并返回指定分区的结果。\n\
    \n现在您拥有了一个功能性的 Laravel 服务，即 `SnowflakeService` 类，您可以将此您的其他代码（例如控制器）中，并使用 `execute()`\
    \ 方法通过 API 快速传递 SQL 查询。\n"
- fmt: "## SQL Fundamentals: `SELECT`, `INSERT`, `UPDATE`, and `DELETE`\n\nIn this\
    \ section, we delve into the core fundamentals of SQL, focusing on the four foundational\
    \ operations: `SELECT`, `INSERT`, `UPDATE`, and `DELETE`. As the backbone of data\
    \ exploration and manipulation, these operations play a crucial role in shaping\
    \ and extracting insights from datasets.\n\n### `SELECT` Statements\n\nThe `SELECT`\
    \ statement for data retrieval and analysis. Here, we dissect its nuances, exploring\
    \ how to craft precise queries that unveil valuable insights. We will cover the\
    \ spectrum of the `SELECT` clause, empowering you to navigate and interpret vast\
    \ datasets effectively. The `SELECT` statement resides at the heart of any data-centric\
    \ operation and is a commonly used tool in the arsenal of every data professional.\
    \ The versatility of the `SELECT` statement makes our objective clear in the context\
    \ of your application: to empower you with the skill needed to navigate and interpret\
    \ vast datasets effectively, whether you’re dealing with millions or just a few,\
    \ and handing that data off to your application for further processing.\n\nWhy\
    \ do I start with the `SELECT` statement? The `SELECT` statement is the most commonly\
    \ executed SQL statement. At least 75% of the queries you’ll execute using the\
    \ Snowflake SQL API are using the `SELECT` clause. Beyond that, understanding\
    \ how the `SELECT` clause works, especially in defining column sets to be queried,\
    \ will make it easier for you to work with the returned data result set. To start,\
    \ let’s look at the technical definition of the `SELECT` statement for Snowflake.\n\
    \n```\nSELECT [ { ALL | DISTINCT } ]\n[ TOP <n> ]\n[ { <object_name> | <alias>\
    \ } .* ]*\n[ ILIKE '<pattern>' ]\n[ EXCLUDE\n{\n   <col_name> | ( <col_name> ,\
    \ <col_name> , . . . )\n}\n]\n[ REPLACE\n{\n   ( <expression> AS <col_name> [\
    \ , <expression> AS <col_name> , . . . ] )\n}\n]\n[ RENAME\n{\n   <col_name> AS\
    \ <new_col_name>\n| ( <col_name> AS <new_col_name> , <col_name> AS <new_col_name>\
    \ , . . . )\n}\n]\n```\n**Listing 4-1** Snowflake `SELECT` statement dictionary\n\
    \nThis may seem complex at first, and that is understandable, especially if you\
    \ are new to SQL and have had little or no exposure to syntax definition formatting\
    \ used by most database providers to explain how a particular SQL function works.\
    \ The first line tells the query processing engine we are executing a `SELECT`\
    \ clause and specifies what records we want to return. By default, the engine\
    \ assumes the `ALL`, which returns all records in the dataset and does not need\
    \ to be specified if that is your goal. The `DISTINCT` keyword will eliminate\
    \ duplicate values from your result set. Both of these are executed using standard\
    \ order of operations. By this, I mean that any `WHERE` clauses and `JOIN` statements\
    \ will be honored first, and then the result set will be further filtered if you\
    \ have specified the `DISTINCT` keyword. In our query window, we would write this\
    \ like `SELECT DISTINCT **` or `SELECT **`.\n\nThe following keyword in the structure\
    \ is the `TOP <n>` keyword. In older database systems, there was a distinct use\
    \ case for using the `TOP <n>` keyword in your queries. Snowflake included it,\
    \ as do many other database solutions, to provide cross-platform support for your\
    \ queries from other systems. However, this keyword supports the same functionality\
    \ as the `LIMIT` clause, and Snowflake considers them equivalent with no differences.\
    \ Like the `LIMIT` clause, this limits the number of rows returned in the result\
    \ set. Following the order of operations, your result set will be filtered based\
    \ on your `WHERE` and `JOIN` statements, among other clauses we’ll explore later,\
    \ whether or not you used the `DISTINCT` keyword, and then return the final result\
    \ set within the specific limit. For example, executing `SELECT TOP 100 **` in\
    \ your query window will only return 100 records in the result set. Without the\
    \ use of `ORDER BY` clauses or other query syntax, the 100 records to use are\
    \ entirely determined by the query processing engine and could vary with each\
    \ execution. Outside of this basic functionality, it is essential to know that\
    \ if you are leveraging the `OFFSET` clause in your SQL statement, the `OFFSET`\
    \ clause requires you to use `LIMIT` and does not support `TOP`.\n\nMoving forward,\
    \ the `<object_name>` or `<alias>` is a way to identify the object or alias defined\
    \ in the `FROM` clause. If you are joining multiple tables of data together, you\
    \ will need a way to reference columns in each dataset. This might limit the number\
    \ of columns being returned, control the order of the columns returned, or provide\
    \ a way to distinguish between more than one column with the same name across\
    \ multiple datasets.\n\nLast, the `ILIKE`, `EXCLUDE`, `REPLACE`, and `RENAME`\
    \ keywords provide ways to manipulate the columns further returned, not the data\
    \ itself, when working with specific columns. `ILIKE` will look for column names\
    \ that match the pattern and return only those columns, allowing you to quickly\
    \ pull a subset of columns from a wide table that meets the pattern criteria.\
    \ Similarly, if you are working with a very wide table and need to return all\
    \ columns except a few, it is easier to use the `EXCLUDE` keyword to leave those\
    \ few columns out instead of specifying the larger majority of the columns you\
    \ do want to return. Finally, `REPLACE` and `RENAME` offer very similar functionality\
    \ in changing the column’s name. Where `RENAME` simply changes the column from\
    \ what is in the table to the name you specify (changing `AVG_COST_ACCR` to `AVERAGE_COST_ACCURED`),\
    \ the `REPLACE` keyword accepts an expression to do dynamic renaming (e.g., replacing\
    \ an underscore in column names with a dash).\n\nNow, why is all of this important?\
    \ Well, apart from providing you with the tools you need to reference column names\
    \ in a format that you understand quickly or to select specific columns when joining\
    \ across multiple tables or datasets, these keywords give you the tools to do\
    \ two things: ensure you are executing optimized queries and not requiring you\
    \ to know the exact structure of your tables or the structure of returned datasets\
    \ (especially when joining across multiple datasets).\n\nIn the case of the former,\
    \ it is a bad form or practice to execute a `SELECT` query with the asterisks\
    \ (`*`) symbol. That is because the asterisks will return all columns in whatever\
    \ order they appear in the table structure, and we don’t always need all of the\
    \ data for these columns. This can greatly increase compute time, the time it\
    \ takes to return the dataset back across the API, and can have other performance\
    \ impacts.\n\nIn the latter example, if you are required to know the exact format\
    \ of the table structure, it makes retrieving specific data in the API result\
    \ set much harder to predict. This increases by multiples when you are joining\
    \ multiple sets of data together, and you have to anticipate how all those columns\
    \ are given an ordinal position in the resulting JSON response. Let’s look at\
    \ some real examples to illustrate what I mean. Take the following API call.\n\
    \n```\n$query = Http::withHeaders([\n    'Content-Type' => 'application/json',\n\
    \    'User-Agent' => 'myApplication/1.0',\n    'X-Snowflake-Authorization-Token-Type'\
    \ => 'KEYPAIR_JWT',\n])->acceptJson()->withToken($jwt)->post($snowflake_api_base_url.'/api/v2/statements',\
    \ [\n    'statement' => \"SELECT * FROM customers;\",\n    'database' => $database,\n\
    \    'warehouse' => $connection->warehouse,\n    'schema' => $schema,\n    'role'\
    \ => $connection->role,\n    'parameters' => [\n        'query_tag' => 'black-diamond',\n\
    \    ],\n]);\n```\n**Listing 4-2** Laravel REST API handler—`SELECT` all columns\n\
    \nSpecifically, we are focusing on the underlined JSON key. You can see that we\
    \ are executing a `SELECT` query against the `customers` table and telling the\
    \ query processing engine to return all columns for that table. Now, if you do\
    \ not know the exact structure of that table, you are not going to be able to\
    \ easily pull the data you want for each row returned in the result set. Here\
    \ is an example of a result set returned by the API."
