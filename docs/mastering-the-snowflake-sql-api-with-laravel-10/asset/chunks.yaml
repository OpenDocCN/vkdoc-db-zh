    One example of a reason you might use accounts would be if you service multiple
    customers and want to keep your customers’ accounts segregated by account instead
    of databases and roles. This allows your customers to have more control over their
    data and access to their data without risking exposure to other customers you
    might service.


    In another example, suppose you have data that has to stay within certain regions
    for governance reasons. A great use case would be educational data for Australia,
    which the government says cannot leave the confines of the country of Australia.
    You could easily set up a new account that lives on an Australian-based server
    and store all of your data specific to Australia there, thus satisfying the needs
    of the government regulation. You could also set up an account that takes a copy
    of your data from your main account and stores it on a server geographically located
    near a large group of your customers, allowing them to have much faster access
    to their data by not requiring them to have to submit a network request that has
    to travel half-way across the global to retrieve data.


    ##### Partner Connect


    Partner Connect, similar to the Marketplace, allows you to connect directly to
    Snowflake partners who have built tools for Snowflake. One popular tool, DevOps
    for data, is DataOps.Live. This tool allows you to use DataOps and underlying
    DBT functionality to manage CI/CD pipelines for your Snowflake instance, giving
    you a truly agile data ingestion, modeling, and transformation process.


    Because these partners have been built specifically for Partner Connect, you can
    quickly allow the necessary access to your Snowflake instance directly within
    the Partner Connect portal. This ensures you do not have to pass sensitive information
    to a third-party website, such as login details, which could become compromised
    if that system does not employ proper security standards.


    As you leverage the Snowflake SQL API to build out your project, you might want
    to keep the Snowflake Partner Connect in mind. Not only does it provide a more
    secure way for you to allow your customers to connect your application to their
    Snowflake instance, but it also provides another advertisement channel by allowing
    you to be listed on the Partner Connect portal.


    ### Accessing Snowflake SQL API


    In this section, I will help you in getting started with accessing the Snowflake
    SQL API. As stated previously, the Snowflake SQL API is a REST API that you can
    use to access and update data in your Snowflake database. Using the API, you can
    execute standard SQL queries and most DDL and DML statements, as well as use the
    API to access metadata about your Snowflake instance from the Snowflake database.
    In this section, we will use Laravel 10 to show you how to connect to the Snowflake
    SQL API. This assumes you already have a base install of Laravel 10 up and running
    on a server or your local host, and are familiar with Laravel and PHP.'
  trans: '


    ## 用户与角色


    我们在本章前面已经介绍过 `用户与角色`，但本节将让你更深入地了解系统中分配的用户、他们上次登录的时间以及他们被授予的角色。你可以在 `用户` 选项卡中管理用户的所有方面，包括创建和删除用户。`角色`
    选项卡则允许你对组织内的角色执行许多相同的操作。此外，它还提供了一个有用的角色思维导图视图，让你可以快速可视化角色的布局以及为每个角色设置的继承关系。


    ## 安全性


    `安全性` 部分允许你为组织定义 `网络策略`，并查看当前连接到 Snowflake 的开放会话（用户）。`网络策略` 是进一步加固 Snowflake 访问安全的好方法，它提供了通过特定
    IP 地址登录或阻止特别有问题的 IP 地址的能力。我强烈建议你至少要求所有用户使用多因素认证（`MFA`），特别是如果他们不在内部网或专用的 `IP 地址/IP
    范围` 内，而你无法将访问权限限制在这些地址之内。


    由于无法通过 API 支持多因素认证，强烈建议你为服务器的 `IP 地址` 创建一个 `策略` 并将其分配给你的 API 用户。除了你创建的 `公钥/私钥对`
    之外，万一你的密钥泄露，这将提供额外的一层安全保障。


    ## 账单与条款


    `账单与条款` 部分提供了你 Snowflake 合同的完整详情。它概述了你已接受的 `服务条款` 及其接受时间、账单联系人、你的支付方式，以及你所有使用情况声明的可下载版本。请注意，对于与
    Snowflake 签订预付容量合同、向其账户分配大量积分的用户，可能不会看到列出的 `支付方式`。


    ## 联系人


    `联系人` 页面允许你设置将接收来自 Snowflake 通知的电子邮件地址。最重要的是 `安全通知`，我建议将其分配给能够定期审查这些通知并采取相应行动的人。`隐私通知`
    让你了解 Snowflake 发布的最新隐私政策变更或隐私问题。相比之下，`产品通知` 则会让你了解 Snowflake 的行为变更、性能下降、API 变更以及其他主动通知。


    ## 账户


    通常，除非你所在的大型组织有特定的数据需求（包括数据本地化和数据治理策略），否则你不会花太多时间在 `账户` 页面上。当你首次注册 Snowflake 时，会创建一个默认的
    `账户`，该账户同时也作为你 Snowflake 实例的组织管理账户。如果你发现自己需要额外的 `账户`，可以在此处创建和管理它们。


    你可能使用 `账户` 的一个例子是，如果你为多个客户提供服务，并希望按 `账户` 而不是数据库和角色来隔离客户的账户。这样可以让客户更好地控制他们的数据和数据访问权限，而不会冒数据暴露给你可能服务的其他客户的风险。


    另一个例子是，假设你有数据因治理原因必须保留在某些区域。一个很好的用例是澳大利亚的教育数据，政府规定此类数据不能离开澳大利亚国境。你可以轻松设置一个新的 `账户`，该账户位于澳大利亚的服务器上，并将所有特定于澳大利亚的数据存储在那里，从而满足政府法规的要求。你还可以设置一个
    `账户`，该账户从你的主 `账户` 复制一份数据，并将其存储在地理位置靠近你一大群客户的服务器上，这样他们就不必提交需要跨越半个全球才能检索数据的网络请求，从而能够更快地访问他们的数据。


    ## 合作伙伴连接


    `合作伙伴连接`，类似于 `市场`，允许你直接连接到为 Snowflake 构建工具的合作伙伴。一个流行的工具，数据 DevOps，是 `DataOps.Live`。这个工具允许你使用
    `DataOps` 和底层的 `DBT` 功能来管理 Snowflake 实例的 `CI/CD` 管道，为你提供真正的敏捷数据摄取、建模和转换过程。


    因为这些合作伙伴是专门为 `Partner Connect` 构建的，所以你可以快速在 `Partner Connect` 门户内授予对 Snowflake
    实例的必要访问权限。这确保你不必将敏感信息（如登录详情）传递给第三方网站，如果该系统未采用适当的安全标准，这些信息可能会被泄露。


    当你利用 `Snowflake SQL API` 来构建你的项目时，你可能希望记住 `Snowflake Partner Connect`。它不仅为你提供了一种更安全的方式，让你的客户将其应用程序连接到他们的
    Snowflake 实例，而且还通过允许你在 `Partner Connect` 门户上列出，提供了另一个推广渠道。


    ### 访问 Snowflake SQL API


    在本节中，我将帮助你开始使用 `Snowflake SQL API`。如前所述，`Snowflake SQL API` 是一个 `REST API`，可用于访问和更新
    Snowflake 数据库中的数据。使用该 API，你可以执行标准的 `SQL` 查询以及大多数 `DDL` 和 `DML` 语句，还可以使用该 API 从
    Snowflake 数据库访问有关你的 Snowflake 实例的 `元数据`。在本节中，我们将使用 `Laravel 10` 来向你展示如何连接到 `Snowflake
    SQL API`。这里假设你已经在 `服务器` 或 `本地主机` 上安装并运行了基础版 `Laravel 10`，并且熟悉 `Laravel` 和 `PHP`。


