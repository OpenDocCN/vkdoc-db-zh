- fmt: '# Snowpark API


    In addition to the Snowflake SQL API, Snowflake also provides an intuitive API
    for interacting with the Snowpark library. Using this API, you can write Snowpark
    Python code in a local development environment and execute it natively within
    Snowflake. This allows users to create and leverage Python-stored procedures,
    leverage powerful Python libraries (such as `DataFrame` and `Pandas`), create
    `UDF`s and `UDTF`s, and perform machine learning tasks.


    The scope of this book primarily focuses on the Snowflake SQL API, but some chapters
    will touch upon aspects of the Snowpark API so that users may have a better understanding
    of the Snowflake API functionality.


    For more information regarding the Snowpark API, you can refer to the official
    Snowpark Library for Python API reference documentation: [`https://docs.snowflake.com/developer-guide/snowpark/reference/python/latest/index`](https://docs.snowflake.com/developer-guide/snowpark/reference/python/latest/index).


    ## Why Laravel?


    Laravel is a robust PHP framework that provides developers with a lightweight
    codebase, an extensive package and community ecosystem, and the flexibility to
    develop at varying levels of model-view-controller (MVC) adherence. When I first
    started working with the Snowflake SQL API, it was to build our `Black Diamond
    360` ([`https://blackdiamond360.com/`](https://blackdiamond360.com/)) solution
    for managing and monitoring a Snowflake instance. Because the platform was built
    as a multi-tenancy solution, and due to the limited availability of PHP drivers
    or an out-of-the-box Laravel Snowflake package, our team opted to instead leverage
    the Snowflake API. This allowed us to more easily design and develop a multi-tenant
    solution and provided us the additional benefits of the security Snowflake includes
    with the SQL API.


    Most of this book is aimed at providing developers with the knowledge they need
    to work with the Snowflake SQL API. Because the SQL API is a RESTful API, any
    programming language or framework can be used that supports REST API calls.


    ## Snowflake SQL API vs. Drivers


    If you have any advanced level of exposure to Snowflake, or most database solutions
    for that matter, you may already be aware of the existence of database drivers.
    Drivers are a great way to natively support Snowflake within your application.
    While they have fewer limitations than the SQL API, they do have some shortcomings.
    First, as of the writing of this book, Snowflake only supports seven drivers (`GO`,
    `JDBC`, `.NET`, `Node.JS`, `ODBC`, `PHP PDO`, and `Python`). Second, driver upgrades
    can mean more intensive testing and code changes that must be made to your application
    before depreciated versions are enforced.


    While drivers play a definite role in many applications, there may be times where
    you choose to go the route of an API. For example, in our `Black Diamond` tool,
    we run a multi-tenant application that allows the customer to connect one or more
    Snowflake instances to the tool. While doing dynamic configuration loading of
    a Snowflake connection to the supported driver in Laravel, or other languages,
    is possible, it does introduce some complexities and even potential security risks.


    Other use cases where you might use an API instead of a driver are a little more
    straightforward. Building native mobile applications for iOS or Android, where
    the primary application is a web app and the mobile application is a supporting
    interface, the API can allow you to quickly and efficiently connect to your Snowflake
    data to pull, push, update, and even delete data. If you are working with integration
    tools that do not have driver support, or you are working in an environment where
    installing drivers is a limitation, the SQL API can also help overcome this and
    allow you access to your data in Snowflake.


    In general, in any instance where using a driver might create complications or
    limitations, the SQL API really starts to shine. But perhaps one of the things
    I personally like about the API is that Snowflake maintains a Snowflake API status
    page that can be programmatically queried. In this way, my application can quickly
    determine if there is an outage at Snowflake and then handle the outage appropriately.


    ## Understanding the Snowflake SQL API Architecture


    The Snowflake SQL API was created to provide developers with a lighter-weight
    option that doesn’t require them to install heavy packages, libraries, or drivers
    or to use languages not supported with existing Snowflake drivers. The API provides
    a set of endpoints that allow you to issue SQL commands and fetch the results
    of those commands over Transport Level Security (`TLS`) protocols standard with
    `HTTP`. All results are returned in `JSON V2`, providing developers with a simple
    method to build a client from standard libraries available in almost all modern
    programming languages.


    While Snowflake has identified its API as a RESTful API, it does not fit perfectly
    into the standards defined for a traditional `REST` API. `REST` APIs, by definition,
    have resource endpoints in the form of URLs, which are typically acted upon with
    `HTTP` commands (`GET`, `DELETE`, `PATCH`, `PUT`, etc.). Instead, the Snowflake
    SQL API only provides a few endpoint URLs that are meant to act as a medium to
    send SQL statements to Snowflake and retrieve the results over `HTTP`, similar
    to an `RPC` service.


    When a user submits a request to the endpoint, the API first determines if it
    is a valid request. If not, an `HTTP` error code is returned, and the processing
    stops. If the request is valid, it creates an `HTTP` call to the Snowflake instance
    and submits the query to the processor. The processor then begins to execute the
    statement and resides in three states. The first state is a “sleeping state” in
    which the API waits for a set period of time and then checks once again for results.
    The second state is an error state, in which the statement returns a Snowflake
    error and is passed back to the API response body as an `HTTP` error. The final
    state is a success state in which the API response body returns an `HTTP` success
    response and a `JSON` body of the payload.


    In the third state, the successful state, the API response body might also include
    the reference to additional partitions. Because some datasets may be too large
    to transmit all at once, Snowflake breaks them up into partitions. Subsequent
    requests can be made to the Snowflake SQL API to fetch additional partitions,
    or pages, of data and works similar to how pagination works in most modern programming
    languages.


    To execute a new statement, the developer must construct the body of the `HTTP`
    request to pass to the endpoint, including the SQL statement to be executed, and
    send it to the API as a `POST` request. Snowflake provides the option to include
    a custom `UUID` instead of an auto-generated one to help identify duplicate requests
    and make partition fetching easier. We will discuss more about how that works
    later on. You can also indicate if you want to execute the statement asynchronously,
    allowing custom applications to be more flexible in specifying how query responses
    are handled.


    # 2. The Snowflake Data Cloud


    ## Foundations


    Before we get into the details of how to use the Snowflake SQL API, it is important
    to establish some foundational principles for its use. In this book, we sometimes
    use `Snowflake SQL API`, `Snowflake API`, `SQL API`, and `API` interchangeably.
    Unless it is otherwise specified as belonging to another API service, such as
    the `Snowpark API`, all three uses refer specifically to the Snowflake SQL API.
    As Snowflake continues to grow, they have continued to iterate and evolve the
    Snowflake SQL API and introduce new API libraries for users to leverage, allowing
    developers to tap into the robust power of Snowflake more easily. As such, the
    techniques shared in this book may not apply to all products that fall under the
    Snowflake umbrella.'
  raw: '### Snowpark API


    In addition to the Snowflake SQL API, Snowflake also provides an intuitive API
    for interacting with the Snowpark library. Using this API, you can write Snowpark
    Python code in a local development environment and execute it natively within
    Snowflake. This allows users to create and leverage Python-stored procedures,
    leverage powerful Python libraries (such as DataFrame and Pandas), create UDFs
    and UDTFs, and perform machine learning tasks.


    The scope of this book primarily focuses on the Snowflake SQL API, but some chapters
    will touch upon aspects of the Snowpark API so that users may have a better understanding
    of the Snowflake API functionality.


    For more information regarding the Snowpark API, you can refer to the official
    Snowpark Library for Python API reference documentation: [`https://docs.snowflake.com/developer-guide/snowpark/reference/python/latest/index`](https://docs.snowflake.com/developer-guide/snowpark/reference/python/latest/index).


    ## Why Laravel?


    Laravel is a robust PHP framework that provides developers with a lightweight
    codebase, an extensive package and community ecosystem, and the flexibility to
    develop at varying levels of model-view-controller (MVC) adherence. When I first
    started working with the Snowflake SQL API, it was to build our Black Diamond
    360 ([`https://blackdiamond360.com/`](https://blackdiamond360.com/)) solution
    for managing and monitoring a Snowflake instance. Because the platform was built
    as a multi-tenancy solution, and due to the limited availability of PHP drivers
    or an out-of-the-box Laravel Snowflake package, our team opted to instead leverage
    the Snowflake API. This allowed us to more easily design and develop a multi-tenant
    solution and provided us the additional benefits of the security Snowflake includes
    with the SQL API.


    Most of this book is aimed at providing developers with the knowledge they need
    to work with the Snowflake SQL API. Because the SQL API is a RESTful API, any
    programming language or framework can be used that supports REST API calls.


    ## Snowflake SQL API vs. Drivers


    If you have any advanced level of exposure to Snowflake, or most database solutions
    for that matter, you may already be aware of the existence of database drivers.
    Drivers are a great way to natively support Snowflake within your application.
    While they have fewer limitations than the SQL API, they do have some shortcomings.
    First, as of the writing of this book, Snowflake only supports seven drivers (GO,
    JDBC, .NET, Node.JS, ODBC, PHP PDO, and Python). Second, driver upgrades can mean
    more intensive testing and code changes that must be made to your application
    before depreciated versions are enforced.


    While drivers play a definite role in many applications, there may be times where
    you choose to go the route of an API. For example, in our Black Diamond tool,
    we run a multi-tenant application that allows the customer to connect one or more
    Snowflake instances to the tool. While doing dynamic configuration loading of
    a Snowflake connection to the supported driver in Laravel, or other languages,
    is possible, it does introduce some complexities and even potential security risks.


    Other use cases where you might use an API instead of a driver are a little more
    straightforward. Building native mobile applications for iOS or Android, where
    the primary application is a web app and the mobile application is a supporting
    interface, the API can allow you to quickly and efficiently connect to your Snowflake
    data to pull, push, update, and even delete data. If you are working with integration
    tools that do not have driver support, or you are working in an environment where
    installing drivers is a limitation, the SQL API can also help overcome this and
    allow you access to your data in Snowflake.


    In general, in any instance where using a driver might create complications or
    limitations, the SQL API really starts to shine. But perhaps one of the things
    I personally like about the API is that Snowflake maintains a Snowflake API status
    page that can be programmatically queried. In this way, my application can quickly
    determine if there is an outage at Snowflake and then handle the outage appropriately.


