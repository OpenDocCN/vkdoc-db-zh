    represents users in your application.


    ```

    use Illuminate\Database\Eloquent\Model;

    class User extends Model

    {

    //

    }

    Listing 9-2

    Laravel user model

    ```


    You can then use this model to perform database operations, such as querying for
    users:


    ```

    $users = User::where(''status'', ''active'')->get();

    ```


    Moreover, Laravel’s Blade templating engine offers a powerful and intuitive way
    to create dynamic views. Blade templates allow you to write clean and readable
    PHP code within your views, making it easy to work with data and control structures.
    For example, you can use Blade directives such as @foreach to iterate over arrays
    and collections.


    ```

    @foreach ($users as $user)

    {{ $user->name }}

    @endforeach

    Listing 9-3

    Laravel user loop

    ```


    Additionally, Laravel provides a rich ecosystem of built-in features and utilities
    that streamline common web development tasks. For instance, Laravel’s authentication
    system offers pre-built authentication scaffolding, including user registration,
    login, and password reset functionality. By running a single artisan command,
    you can generate all the necessary controllers, views, and routes for authentication:


    ```

    php artisan make:auth

    ```


    Overall, exploring Laravel 10 fundamentals introduces developers to the key concepts
    and tools that empower them to build modern and maintainable web applications.
    By mastering Laravel’s routing system, Eloquent ORM, Blade templating engine,
    and built-in features, developers can leverage the full potential of the framework
    to create elegant and efficient web solutions.'
  trans: '# 9. 使用 Laravel 10


    Laravel 是一个健壮而优雅的 PHP 框架，它通过提供一套丰富的功能、工具和约定，简化了 Web 应用程序的开发。它提供了清晰且富有表现力的语法，以及广泛的内置功能，使其成为构建现代
    Web 应用程序的热门选择。在本章中，我们将探索 Laravel 10 的基础知识，以及如何设置一个开发环境以开始 Laravel 开发。


    要开始使用 Laravel，第一步是在你的本地机器上设置开发环境。Laravel 提供了一个便捷的工具 `Composer`，这是一个 PHP 的依赖管理器，用于安装和管理
    Laravel 项目。如果你尚未安装 `Composer`，请先进行安装，然后使用它通过 Laravel 安装器或 `Composer` 的 `create-project`
    命令来创建一个新的 Laravel 项目。这将生成一个包含必要目录结构和文件的新 Laravel 项目，让你可以立即开始。


    一旦你创建了一个新的 Laravel 项目，你就可以使用 Laravel 的 `artisan` 命令行界面来管理你的应用程序、运行内置开发服务器以及生成样板代码。Laravel
    广泛的文档提供了关于如何使用 `artisan` 命令执行各种任务的详细说明，例如创建控制器、模型、迁移和路由。此外，位于 `config` 目录下的 Laravel
    配置文件允许你自定义应用程序的各个方面，例如数据库连接、缓存和会话管理。


    此外，Laravel 提供了一个强大的 ORM（对象关系映射）工具，称为 `Eloquent`，它通过提供一个流畅的查询构建器和 `ActiveRecord`
    实现来简化数据库交互。使用 `Eloquent`，你可以定义代表应用程序数据实体的数据库模型，并使用它们来执行数据库操作，例如查询、插入、更新和删除记录。Laravel
    的迁移系统允许你使用 PHP 代码来定义和管理数据库结构变更，这使得跨不同环境对数据库变更进行版本控制和部署变得容易。


    总而言之，Laravel 是一个多功能且强大的 PHP 框架，它通过其富有表现力的语法、丰富的功能集和广泛的文档，简化了 Web 应用程序的开发。通过遵循本章概述的步骤来设置
    Laravel 开发环境，并熟悉 Laravel 的关键概念和工具，你将能很好地准备就绪，开始使用 Laravel 10 构建现代 Web 应用程序。


    ## 探索 Laravel 10 基础


    探索 Laravel 10 的基础知识对于理解框架的核心概念和特性至关重要，为构建健壮的 Web 应用程序奠定坚实的基础。Laravel 的核心采用了模型-视图-控制器（MVC）架构模式，该模式将应用程序逻辑分离为不同的层，以提高可维护性和可扩展性。在
    Laravel 中，控制器处理传入的 HTTP 请求，模型与应用程序的数据层交互，视图则负责渲染用户界面。


    Laravel 的一个基本方面是其路由系统，它将 HTTP 请求的 URI 映射到控制器的动作。Laravel 提供了一个简洁而富有表现力的语法，用于通过
    `routes/web.php` 文件定义路由。例如，你可以通过将其与 `UserController` 的一个方法关联，来定义一个处理对 `/users`
    URI 的 GET 请求的路由。


    ```

    Route::get(''/users'', ''App\Http\Controllers\UserController@index'');

    清单 9-1

    Laravel REST API — GET

    ```


    此外，Laravel 的 `Eloquent` ORM 通过提供流畅的查询构建器和 `ActiveRecord` 实现，简化了数据库交互。使用 `Eloquent`，你可以定义代表应用程序数据实体的数据库模型，并使用它们来执行数据库操作。例如，考虑一个代表应用程序中用户的
    `User` 模型。


    ```

    use Illuminate\Database\Eloquent\Model;

    class User extends Model

    {

    //

    }

    清单 9-2

    Laravel 用户模型

    ```


    然后，你可以使用此模型来执行数据库操作，例如查询用户：


    ```

    $users = User::where(''status'', ''active'')->get();

    ```


    此外，Laravel 的 `Blade` 模板引擎提供了一种强大而直观的方式来创建动态视图。`Blade` 模板允许你在视图中编写干净且可读的 PHP 代码，从而轻松处理数据和控制结构。例如，你可以使用
    `@foreach` 这样的 `Blade` 指令来遍历数组和集合。


    ```

    @foreach ($users as $user)

    {{ $user->name }}

    @endforeach

    清单 9-3

    Laravel 用户循环

    ```


    另外，Laravel 提供了一个丰富的内置功能和工具生态系统，以简化常见的 Web 开发任务。例如，Laravel 的认证系统提供了预构建的认证脚手架，包括用户注册、登录和密码重置功能。通过运行一条
    `artisan` 命令，你就可以生成认证所需的所有控制器、视图和路由：


    ```

    php artisan make:auth

    ```


    总的来说，探索 Laravel 10 的基础知识，向开发者介绍了关键概念和工具，这些赋予他们构建现代化、可维护的 Web 应用程序的能力。通过掌握 Laravel
    的路由系统、`Eloquent` ORM、`Blade` 模板引擎和内置功能，开发者可以充分利用该框架的潜力，创造出优雅且高效的 Web 解决方案。'
- fmt: '## Leveraging Laravel 10 Tools and Features


    Leveraging Laravel 10’s tools and features empowers developers to build sophisticated
    and efficient web applications with ease. In this section, we’ll explore some
    of the most powerful tools and features offered by Laravel 10 and how they can
    be used to streamline development workflows and enhance productivity.


    One of the standout features of Laravel 10 is its robust authentication system,
    which provides pre-built scaffolding for user registration, login, and password
    reset functionality. By simply running the artisan command `php artisan make:auth`,
    developers can generate all the necessary controllers, views, and routes for user
    authentication. This saves developers significant time and effort, allowing them
    to focus on building the core features of their application without having to
    reinvent the wheel.


    Another powerful tool in Laravel 10 is its built-in task scheduling capabilities,
    powered by the artisan command `schedule:run`. With Laravel’s task scheduler,
    developers can define scheduled tasks using expressive syntax similar to cron
    jobs. For example, developers can schedule recurring tasks such as sending email
    reminders, generating reports, or clearing cached data. Laravel’s task scheduler
    ensures that these tasks are executed automatically at predefined intervals, helping
    to automate routine maintenance tasks and improve application reliability.


    Furthermore, Laravel’s robust testing support, facilitated by `PHPUnit`, enables
    developers to write comprehensive unit and feature tests for their applications.
    Laravel provides a suite of testing utilities and assertions that make it easy
    to write and execute tests, ensuring that code changes do not introduce regressions
    or break existing functionality. For example, developers can use Laravel’s HTTP
    testing tools to simulate HTTP requests and verify that routes and controllers
    behave as expected.


    Additionally, Laravel’s `artisan` command-line interface offers a wide range of
    utilities for managing application assets, running database migrations, generating
    code scaffolds, and more. For example, developers can use the artisan command
    `php artisan make:model` to generate Eloquent models or `php artisan migrate`
    to run database migrations and synchronize the database schema with changes in
    the application’s codebase. Laravel’s `artisan` commands streamline common development
    tasks, making it easy for developers to perform routine operations and maintain
    code consistency throughout the development lifecycle.


    Overall, leveraging Laravel 10’s tools and features empowers developers to build
    high-quality web applications efficiently and effectively. By harnessing Laravel’s
    authentication system, task scheduler, testing support, and `artisan` command-line
    interface, developers can accelerate development workflows, automate routine tasks,
    and deliver robust and reliable web solutions that meet the needs of modern businesses
    and users.


    ## 10. Architectural Patterns and Solutions


    This chapter delves into the various architectural patterns and best practices
    for designing scalable and efficient data solutions using Snowflake. Snowflake’s
    unique architecture, which separates compute and storage layers, offers unparalleled
    flexibility and scalability, making it ideal for handling diverse data workloads
    and use cases. In this chapter, we’ll explore some common architectural patterns
    and solutions that leverage Snowflake’s capabilities to address different data
    processing challenges.


    One architectural pattern commonly used with Snowflake is the data lakehouse architecture,
    which combines the strengths of data lakes and data warehouses to provide a unified
    platform for storing and analyzing structured and semi-structured data. With Snowflake’s
    native support for semi-structured data formats such as `JSON`, `Avro`, and `Parquet`,
    organizations can ingest and analyze diverse data types within the same data warehouse
    environment. This allows for greater flexibility and agility in data processing,
    as organizations can store raw data in its native format and perform on-the-fly
    transformations and analyses using SQL and other analytics tools.


    Another architectural pattern is the data mart approach, where organizations create
    specialized data marts tailored to specific business units or use cases within
    the larger data warehouse environment. Snowflake’s multi-cluster architecture
    and virtual data sharing capabilities enable organizations to create isolated
    data marts with dedicated compute resources, ensuring optimal performance and
    resource utilization. By partitioning data into separate data marts, organizations
    can streamline data access and analysis for different user groups while maintaining
    centralized governance and control over data assets.


    Additionally, Snowflake’s support for real-time data processing and streaming
    analytics enables organizations to build event-driven architectures that ingest,
    process, and analyze streaming data in real time. With integrations with streaming
    platforms such as `Apache Kafka` and `AWS Kinesis`, Snowflake allows organizations
    to ingest and process high-velocity data streams at scale, enabling real-time
    decision-making and actionable insights. This architectural pattern is particularly
    useful for use cases such as `IoT` (Internet of Things) analytics, fraud detection,
    and real-time monitoring.


    Furthermore, Snowflake’s extensibility and integration capabilities enable organizations
    to integrate with third-party tools and services to enhance their data solutions
    further. For example, organizations can leverage Snowflake’s native integrations
    with `BI` (business intelligence) tools such as `Tableau`, `Looker`, and `Power
    BI` to visualize and analyze data directly within the Snowflake environment. Additionally,
    Snowflake’s support for data sharing and cross-cloud data exchange enables organizations
    to collaborate with external partners and share data securely across organizational
    boundaries, facilitating data-driven decision-making and insights.


    By understanding and leveraging Snowflake’s unique architecture, organizations
    can build data solutions that meet their evolving business needs, drive innovation,
    and unlock the full potential of their data assets. Let’s take a look at a few
    of these patterns.


    In data lakehouse architecture, this pattern allows organizations to leverage
    Snowflake’s capabilities to unify data lakes and data warehouses. Raw data from
    various sources, including structured and semi-structured formats, is ingested
    into Snowflake’s data lake storage layer. Snowflake’s ability to natively handle
    semi-structured data allows for flexible storage and analysis without the need
    for preprocessing. Users can then query and analyze this data using Snowflake’s
    SQL interface, combining the scalability of a data lake with the query performance
    of a data warehouse.'
