    # Apress Pocket Guides


    *Apress Pocket Guides* present concise summaries of cutting-edge developments
    and working practices throughout the tech industry. Shorter in length, books in
    this series aim to deliver quick-to-read guides that are easy to absorb, perfect
    for the time-poor professional.


    This series covers the full spectrum of topics relevant to the modern industry,
    from security, AI, machine learning, cloud computing, web development, product
    design, to programming techniques and business topics too.


    Typical topics might include:


    *   A concise guide to a particular topic, method, function or framework

    *   Professional best practices and industry trends

    *   A snapshot of a hot or emerging topic

    *   Industry case studies

    *   Concise presentations of core concepts suited for students and those interested
    in entering the tech industry

    *   Short reference guides outlining ‘need-to-know’ concepts and practices.


    More information about this series at [`https://link.springer.com/bookseries/17385`](https://link.springer.com/bookseries/17385).


