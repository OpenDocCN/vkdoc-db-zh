    使用`DELETE`子句时，提供至少一个`WHERE`条件至关重要，以防止你删除所有数据。如果你的意图是真正清空表，建议你使用`TRUNCATE`子句，因为它更快。`DELETE`子句必须在删除前评估每条记录（即使没有提供`WHERE`条件），而`TRUNCATE`子句则简单地清空表，而不在事先评估任何记录。


    在我们的应用程序中，并且作为我们遵循的最佳实践，我们不会从数据库中删除数据。相反，我们采用一个`"is_deleted"`标志，指示记录不应再被使用，但允许我们保留数据。由于各种原因，这可能不是你应用程序的可行方法，但如果其中一个原因是存储容量，值得注意的是，存储多年来已经有了很大发展，并且在大规模下相当便宜。


    你可能选择直接从表中删除数据而不是提供你版本的`"is_deleted"`标志的情况包括：遵守政府合规性（如 GDRP）、删除坏数据或清除不应长期保存或在客户流失后保留的敏感客户数据。


    如果你预计需要通过 SQL API 执行数据删除，通常可以在应用程序代码中实时构建这些查询。然而，如果你正在处理复杂的`WHERE`条件，特别是涉及使用其他表或查询来细化要删除的目标数据，你可能会选择使用存储过程采用更动态的方法。同样，需要记住的两件事是：防止你的代码变得过于庞大而难以管理，以及在应用程序开发中遵循
    DRY 方法。


    ## JOIN 操作与 WHERE 子句


    既然我们已经涵盖了四个基础查询子句，我们将深入研究连接和过滤子句。这两个主题被归为一类，因为表连接为查询结果提供了附加数据，并增加了过滤数据的功能。像大多数数据库系统一样，Snowflake
    支持四种常见的连接类型：内连接、外连接、交叉连接和自然连接。


    正如我所说，连接可以具有过滤数据的附加功能，无论是通过连接本身的性质，还是通过提供作为过滤器作用于被连接数据的连接条件。其中之一是内连接。在内连接中，一个表中的每一行与另一个表中的一行匹配。当一个表中的一行与另一个表中的行不匹配时，这些行将从查询结果中排除。假设你有一个大学的学生列表，任何注册至少一门课程的学生被认为是活跃学生。通过在`student_id`等键上将学生与课程注册表连接，你只会得到有学生的课程，同样，只会得到有相关课程的学生。如果你将此结果进一步使用`SELECT
    DISTINCT`子句在`student_id`、`first_name`和`last_name`上进行过滤，你将得到一份大学活跃学生的唯一列表。我们这样做是为了考虑注册多门课程的学生，这会因内连接的性质而在结果集中产生重复的学生记录。


    让我们探索 Snowflake 中的各种`JOIN`。'
- fmt: '### Natural Join or Join


    使用`NATURAL JOIN`子句，或简写为`JOIN`，您可以连接两个具有相同名称和对应数据的列的表。继续我们的大学示例，我们可能有一个名为`enrolled_classes`的表和一个`class_grades`表。这两个表都会有一个名为`student_id`的列，以便将学生与其注册的课程关联起来，并将学生与其课程成绩关联起来。


    由于两个表都有一个名为`student_id`的列，连接将自动构建`ON`子句并在这些列上进行连接。这意味着您不必编写`ON`条件：`[NATURAL] JOIN
    on enrolled_classes.student_id = class_grades.student_id`。连接的性质已经假定您想要连接这些列并为您处理。如果两个表都有多个匹配列，自然连接将在所有这些列上自动连接。


    自然连接将仅包含共享列的一个记录，并省略其他记录。自然连接可以与外连接结合使用，您可以在`WHERE`子句中指定筛选条件，但不能指定自定义的`ON`子句条件。


    ### LEFT OUTER JOIN


    左外连接包括主表中的所有行，即使有些行不匹配，以及连接表中的任何匹配行。主表，或称“左表”，是在`FROM`子句中指定的表。连接表，或称“右表”，是在连接子句中指定的表。例如，使用我们的大学示例，我们可能有以下查询：


    ```sql

    SELECT s.full_name, s.student_id, c.class_name FROM students s

    LEFT OUTER JOIN enrolled_classes ec ON ec.student_id = s.student_id

    ```


    在此示例中，我们将获得所有学生及其学生ID的列表，以及`ON`子句中匹配条件所指示的他们注册的任何课程的课程名称。我们可以通过提供一个`WHERE`子句，如`WHERE
    c.class_name IS NOT NULL`，进一步筛选此结果，仅显示注册了课程的学生。如果我们想显示未注册课程的学生，我们会这样做：`WHERE c.class_name
    IS NULL`。


    ### RIGHT OUTER JOIN


    右外连接包括连接表或“右表”中的所有行，以及主表（或“左表”）中的任何匹配行。


    ```sql

    SELECT s.full_name, s.student_id, c.class_name FROM students s

    RIGHT OUTER JOIN enrolled_classes ec ON ec.student_id = s.student_id

    ```


    在此示例中，我们将获得`enrolled_classes`表中所有`class_name`值的行，以及`ON`子句中指定的任何匹配记录的`full_name`和`student_id`值。


    ### FULL OUTER JOIN


    全外连接将包括两个表中的所有行，无论`ON`条件如何，为您提供一个完整的数据集，就好像所有行都在一个表中一样。匹配的行将作为单个行返回，不匹配的行将各自作为自己的行返回。任何不匹配的学生将没有`class_name`值，任何不匹配的`enrolled_classes`将没有`full_name`或`student_id`值。


    ```sql

    SELECT s.full_name, s.student_id, c.class_name FROM students s

    FULL OUTER JOIN enrolled_classes ec ON ec.student_id = s.student_id

    ```


    ### INNER JOIN


    在我们左外连接的示例中，我们描述了如何使用`WHERE`子句来过滤掉不匹配的行。一种更简短的写法，也是更优化的方法，是使用内连接。当您使用内连接时，它仅返回那些基于您的`ON`条件存在匹配的行。


    ```sql

    SELECT s.full_name, s.student_id, c.class_name FROM students s

    INNER JOIN enrolled_classes ec ON ec.student_id = s.student_id

    ```


    在此示例中，仅返回`student_id`匹配的行。因此，您将始终拥有`full_name`、`student_id`和`class_name`的值。由于一个学生可能注册多门课程，您可以预期`full_name`和`student_id`记录将为学生注册的每门课程重复。


    ### CROSS JOIN


    最后，我们有交叉连接。这种连接获取两个表并返回所有可能的行组合（有时称为“笛卡尔积”或“笛卡尔连接”）。这意味着大多数行将包含实际上不相关的行的部分，这可能使交叉连接在许多情况下毫无用处。


    使用交叉连接可能导致返回的数据集变得非常大，从而产生更昂贵的查询执行计划。当第一个表有N行，第二个表有Z行时，结果将是两者的乘积（N x Z）。这意味着第一个表有100行，第二个表有100行，将导致一个包含100,000行的数据集。


    最后要注意的是，与自然连接一样，交叉连接不支持`ON`子句。这是因为所有可能的连接都被接受，使得`ON`子句的使用本质上无效。


    ## 聚合、分组与排序数据


    既然我们对如何跨多个表连接数据有了很好的理解，让我们看看如何对这些数据进行提炼并赋予混乱以秩序。我们将了解一些聚合函数、分组函数和数据排序。由于这些函数非常广泛且用途多样，尤其是聚合函数，我们不会在本材料中涵盖所有内容。相反，这旨在介绍如何进一步提炼和组织数据以使结果更有意义。'
  raw: '### Natural Join or Join


    Using the *NATURAL JOIN* clause, or *JOIN* for short, you can join two tables
    containing columns with identical names and corresponding data. Continuing with
    our example of a university, we might have a table called **enrolled_classes**
    and **class_grades**. Both of these tables would have a column called **student_id**
    so that a student can be linked to their enrolled class, and a student can be
    linked to their class grade.


    Because both tables have a column called **student_id**, the join will automatically
    construct the ON clause and join on those two columns. This means you do not have
    to write the ON criteria: *[NATURAL] JOIN on enrolled_classes.student_id = class_grades.student_id*.
    The nature of the join already assumes you want to join those two columns and
    handles it for you. If both tables have multiple matching columns, the natural
    join will automatically join on all of those columns.


    The natural join will only include one record for shared columns and will omit
    the other records. Natural joins can be combined with an outer join, and you can
    specify criteria for filtering in the WHERE clause, but you cannot specify custom
    ON clause criteria.


    ### LEFT OUTER JOIN


    A left outer join includes all rows in the primary table, even if there are rows
    that do not match, and any matching rows in the joined table. The primary table,
    or the “left table,” is the table specified in the FROM clause. The joined table,
    or the “right table,” is the one specified in the join clause. For example, using
    our university example we might have the following query:


    ```

    SELECT s.full_name, s.student_id, c.class_name FROM students s

    LEFT OUTER JOIN enrolled_classes ec ON ec.student_id = s.student_id

    ```


    In this example, we would get a list of all students and their student ID, and
    the class name of any class they are enrolled in as indicated by the matching
    criteria in the ON clause. We could further filter this down to show just students
    who are enrolled in a class by supplying a WHERE clause like: *WHERE c.class_name
    IS NOT NULL*. If we wanted to show students who are not enrolled in a class, we
    would do so as follows: *WHERE c.class_name IS NULL*.


    ### RIGHT OUTER JOIN


    A right outer join includes all rows in the joined table, or the “right table”,
    and any matching rows in the primary table (or the “left table”).


    ```

    SELECT s.full_name, s.student_id, c.class_name FROM students s

    RIGHT OUTER JOIN enrolled_classes ec ON ec.student_id = s.student_id

    ```


    In this example, we would get a list of all rows in class_name values in the enrolled_classes
    table, as well as the full_name and student_id values for any matching records
    as specified in the ON clause.


    ### FULL OUTER JOIN


    A full outer join will include all rows from both tables, regardless of the ON
    criteria, giving you a full dataset as if the rows all lived in a single table.
    Rows that match will be returned as a single row and unmatched rows will all return
    as their own row. Any unmatched students will have no class_name value, and any
    unmatched enrolled_classes will have no full_name or student_id values.


    ```

    SELECT s.full_name, s.student_id, c.class_name FROM students s

    FULL OUTER JOIN enrolled_classes ec ON ec.student_id = s.student_id

    ```


    ### INNER JOIN


    In our example of a left outer join, we described how you can use a WHERE clause
    to filter out unmatched rows. A shorter way to write this, and a more optimized
    way, is to use an inner join. When you use an inner join, it returns only those
    rows for which there is a match based on your ON criteria.


    ```

    SELECT s.full_name, s.student_id, c.class_name FROM students s

    INNER JOIN enrolled_classes ec ON ec.student_id = s.student_id

    ```


    In this example, only rows where there is a match of student_id will be returned.
    Therefore, you’ll always have values for full_name, student_id, and class_name.
    Since it is possible that a student could be enrolled in multiple classes, you
    can expect that the full_name and student_id record will be duplicated for each
    class the student is enrolled in.


    ### CROSS JOIN


    Finally, we have a cross join. This join takes both tables and returns every possible
    combination of rows (sometimes referred to as a “Cartesian product” or “Cartesian
    join”). This means that most of the rows will contain parts of rows that are not
    actually related, which can render a cross join useless in many instances.


    Using a cross join can cause your returned dataset to become very large, resulting
    in a more expensive query execution plan. When the first table has N number of
    rows and the second table has Z number of rows, the result would be a product
    of the two (N x Z). This means that the first table having 100 rows and the second
    table having 100 rows would result in a dataset containing 100,000 rows.


    A final thing to note is that, like the natural join, the cross join does not
    support an ON clause. That is because all possible joins are honored, rendering
    the use of the ON clause useless by nature.


    ## Aggregating, Grouping, and Ordering Data


    Now that we have a good understanding of how to join data across multiple tables,
    let’s take a look at how we can refine and give order to chaos on that data. We
    will look at a few aggregate functions, grouping functions, and ordering of data.
    Because these functions are so vast and versatile, especially with the aggregate
    functions, we will not cover them all in this material. Instead, this is meant
    to be an introduction to how you can further refine and organize your data to
    make more sense of the results.'
