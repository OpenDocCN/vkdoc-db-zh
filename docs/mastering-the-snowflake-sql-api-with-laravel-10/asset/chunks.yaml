- fmt: "# 4. SQL Basics in Snowflake Using Snowflake SQL API\n\nIn this chapter, we\
    \ will review some of the fundamental functionality of SQL in the context of Snowflake\
    \ and the Snowflake SQL API. The chapter talks in large part about common database\
    \ and SQL concepts while introducing you to the specific nuances of Snowflake\
    \ and the functionality and limitations of the SQL API. Within the landscape of\
    \ data management and analytics, the mastery of fundamental SQL functions is akin\
    \ to possessing the keys to a powerful kingdom. By providing the building blocks\
    \ of SQL within Snowflake’s dynamic ecosystem, this chapter will be a gateway\
    \ to harnessing the full potential of Snowflake’s SQL API, whether you are a novice\
    \ navigating the data realm or an experienced practitioner seeking to refine your\
    \ skills.\n\nWe will start by exploring the pivotal `SELECT` statement and its\
    \ nuances for precise data retrieval and analysis. The subsequent focus on `INSERT`,\
    \ `UPDATE`, and `DELETE` operations provides a strategic lens for shaping and\
    \ maintaining datasets within your application, which is crucial for strategic\
    \ data governance. We will then look at `JOIN` operations, which are critical\
    \ for weaving intricate relationships between datasets. We understand how `JOIN`\
    \ criteria and `WHERE` clauses take a nuanced approach to conditional logic to\
    \ empower professionals to extract targeted datasets, and follow it with aggregating\
    \ and grouping data.\n\nKey to ensuring we are executing performance-optimized\
    \ querying, we will explore how subqueries and CTEs can be used within a single\
    \ API call to quickly sort through and filter larger datasets before joining it\
    \ to more refined data. This fundamental SQL technique is a key strategy we employ\
    \ at Black Diamond to target queries that can be optimized, reduce compute costs\
    \ for running warehouses, and cut down on remote and local spillage.\n\nFinally,\
    \ we will look at Snowflake’s Bind Variable functionality. Bindings make it easier\
    \ to work with dynamic filtering criteria and make it easier to handle the casting\
    \ of data types. In addition to making for cleaner and easier-to-read code, it\
    \ also cuts down on long SQL queries in your code, opting to pass this off to\
    \ the Snowflake SQL API engine instead of handling this sometimes onerous task\
    \ ourselves.\n\nThis chapter isn’t just a tutorial; it’s a strategic guide for\
    \ professional developers and executives seeking to leverage Snowflake’s SQL API\
    \ for data mastery. As we navigate through the intricacies of these fundamental\
    \ SQL functions, the ultimate goal is to empower you with the skills needed to\
    \ orchestrate complex data operations and derive actionable insights for your\
    \ application success.\n\n## Things to Consider\n\nWe did not go over all of the\
    \ security implications of this code, so let’s take a moment to do so. First,\
    \ it is not recommended you store your public and private key directly in code.\
    \ You can opt to store it in a local database and salt the code, or you can install\
    \ it in a 3rd party tool such as AWS Secrets Manager. Keeping your private key\
    \ secure is very important to the security of your application. If you were following\
    \ earlier in this chapter when we discussed Network Policies, your API user could\
    \ further be restricted from being used either by the UI or the API by restricting\
    \ its login to just the IP Address of your application server. If your private\
    \ key were to then be compromised, the malicious user would need to then have\
    \ access to your server to do anything meaningful with it. Because this key potentially\
    \ has access to a lot of secure data, it is also recommended you not reuse a private\
    \ key from any other system (such as your SSH key or your GitHub key).\n\nThe\
    \ other risk that should be called out is that this could allow SQL injection\
    \ into your Snowflake instance. After all, we are using Laravel to inject SQL\
    \ code to Snowflake via the API, which is what we want, but we want to keep it\
    \ from being maliciously used. One thing you could do is not allow any SQL to\
    \ be passed directly to the `execute` function from a URL or form on your application.\
    \ There are many ways to mitigate the risk, but I’ll say the most important is\
    \ to not allow your `execute` function to directly receive any SQL query that\
    \ was directly generated by an end user via URL, form, or other method.\n\nLast,\
    \ you might consider lowering the JWT expiration token via the `lifetime` variable\
    \ to something that is less than 59 minutes. This ensures that should someone\
    \ perform a “man in the middle” attack on your server, they do not manage to grab\
    \ the JWT token and use it elsewhere. Again, this is further mitigated if you\
    \ are both keeping your private key secure and also implementing a Network Policy\
    \ for the API user.\n\n## Conclusion\n\nYou should now have a solid understanding\
    \ of the fundamentals of the Snowflake SQL API and the essential steps to get\
    \ started. You have learned how to connect to Snowflake, navigate the environment,\
    \ and perform basic data operations. With this foundational knowledge, you are\
    \ well-equipped to delve deeper into the platform’s more advanced features and\
    \ functionalities. As you continue your journey, the skills acquired in this chapter\
    \ will serve as a crucial stepping stone toward mastering Snowflake’s powerful\
    \ data management and analytics capabilities.\n\nLet’s dissect this and explain\
    \ what we are doing. We first define the `execute` function with some dynamic\
    \ parameters we can supply and then generate both the JWT token and the base URL\
    \ for the API. The magic really happens in the `$query` variable where we define\
    \ the payload that gets sent using the Laravel HTTP package. In the headers, we\
    \ are letting the API know we are sending over a JSON body and telling Snowflake\
    \ to expect a JWT key pair for the authentication. Because we are using JWT, we\
    \ need to supply the `withToken()` method of the HTTP package, which automagically\
    \ handles passing the JWT token correctly to the API, and telling Snowflake we\
    \ expect a JSON response in return (an error, a success message, or the query\
    \ results). Within the `post()` method, we are defining the body as the SQL statement\
    \ we want to execute, the database and schema it should execute against, the warehouse\
    \ it should be using, and the user role to use. The parameter’s `query tag` is\
    \ optional, but this is helpful when we are using the Query History tab within\
    \ Snowsight to filter down to the queries specifically sent by our API for faster\
    \ debugging or analysis.\n\nSupposing we received a single page of query results\
    \ and there are multiple pages, or partitions, we can use the JSON response to\
    \ grab the statement handle and the next partition in the group and pass it to\
    \ a helper function specific to partition fetching.\n\n```php\npublic static function\
    \ getPartition($statementHandle, $partition)\n{\n    $jwt = static::generateJwt();\n\
    \    $base_url = static::createBaseUrl($account, $region);\n    $query = Http::withHeaders([\n\
    \        'Content-Type' => 'application/json',\n        'User-Agent' => 'myApplication/1.0',\n\
    \        'X-Snowflake-Authorization-Token-Type' => 'KEYPAIR_JWT',\n    ])->acceptJson()->withToken($jwt)->get($base_url\
    \ . '/api/v2/statements/' . $statementHandle .\n    '?partition=' . $partition);\n\
    \    return $query;\n}\n```\nListing 3-5: Laravel Snowflake pagination\n\nThe\
    \ above is very similar to our `execute` helper method but requires much less\
    \ data. We are not actually passing any JSON body in this, or even making a `POST`\
    \ call, but instead, we are making a `GET` call. This will go to the results we\
    \ already generated in a previous call, directed by the statement handle, and\
    \ return the results of the specified partition.\n\nNow that you have a functional\
    \ Laravel Service, the `SnowflakeService` class, you can include this class in\
    \ your other code, such as Controllers, and quickly pass SQL queries via the API\
    \ using the `execute()` method."
  raw: 'Let’s dissect this and explain what we are doing. We first define the execute
    function with some dynamic parameters we can supply and then generate both the
    JWT token and the base URL for the API. The magic really happens in the $query
    variable where we define the payload that gets sent using the Laravel HTTP package.
    In the headers, we are letting the API know we are sending over a JSON body and
    telling Snowflake to expect a JWT key pair for the authentication. Because we
    are using JWT, we need to supply the withToken() method of the HTTP package, which
    automagically handles passing the JWT token correctly to the API, and telling
    Snowflake we expect a JSON response in return (an error, a success message, or
    the query results). Within the post() method, we are defining the body as the
    SQL statement we want to execute, the database and schema it should execute against,
    the warehouse it should be using, and the user role to use. The parameter’s query
    tag is optional, but this is helpful when we are using the Query History tab within
    Snowsight to filter down to the queries specifically sent by our API for faster
    debugging or analysis.


    Supposing we received a single page of query results and there are multiple pages,
    or partitions, we can use the JSON response to grab the statement handle and the
    next partition in the group and pass it to a helper function specific to partition
    fetching.


    ```

    public static function getPartition($statementHandle, $partition)

    {

    $jwt = static::generateJwt();

    $base_url = static::createBaseUrl($account, $region);

    $query = Http::withHeaders([

    ''Content-Type'' => ''application/json'',

    ''User-Agent'' => ''myApplication/1.0'',

    ''X-Snowflake-Authorization-Token-Type'' => ''KEYPAIR_JWT'',

    ])->acceptJson()->withToken($jwt)->get($base_url . ''/api/v2/statements/'' . $statementHandle
    .

    ''?partition='' . $partition);

    return $query;

    }

    Listing 3-5

    Laravel Snowflake pagination

    ```


    The above is very similar to our execute helper method but requires much less
    data. We are not actually passing any JSON body in this, or even making a POST
    call, but instead, we are making a GET call. This will go to the results we already
    generated in a previous call, directed by the statement handle, and return the
    results of the specified partition.


    Now that you have a functional Laravel Service, the SnowflakeService class, you
    can include this class in your other code, such as Controllers, and quickly pass
    SQL queries via the API using the execute() method.


    #### Things to Consider


    We did not go over all of the security implications of this code, so let’s take
    a moment to do so. First, it is not recommended you store your public and private
    key directly in code. You can opt to store it in a local database and salt the
    code, or you can install it in a 3rd party tool such as AWS Secrets Manager. Keeping
    your private key secure is very important to the security of your application.
    If you were following earlier in this chapter when we discussed Network Policies,
    your API user could further be restricted from being used either by the UI or
    the API by restricting its login to just the IP Address of your application server.
    If your private key were to then be compromised, the malicious user would need
    to then have access to your server to do anything meaningful with it. Because
    this key potentially has access to a lot of secure data, it is also recommended
    you not reuse a private key from any other system (such as your SSH key or your
    GitHub key).


    The other risk that should be called out is that this could allow SQL injection
    into your Snowflake instance. After all, we are using Laravel to inject SQL code
    to Snowflake via the API, which is what we want, but we want to keep it from being
    maliciously used. One thing you could do is not allow any SQL to be passed directly
    to the execute function from a URL or form on your application. There are many
    ways to mitigate the risk, but I’ll say the most important is to not allow your
    execute function to directly receive any SQL query that was directly generated
    by an end user via URL, form, or other method.


    Last, you might consider lowering the JWT expiration token via the lifetime variable
    to something that is less than 59 minutes. This ensures that should someone perform
    a “man in the middle” attack on your server, they do not manage to grab the JWT
    token and use it elsewhere. Again, this is further mitigated if you are both keeping
    your private key secure and also implementing a Network Policy for the API user.


    #### Conclusion


    You should now have a solid understanding of the fundamentals of the Snowflake
    SQL API and the essential steps to get started. You have learned how to connect
    to Snowflake, navigate the environment, and perform basic data operations. With
    this foundational knowledge, you are well-equipped to delve deeper into the platform’s
    more advanced features and functionalities. As you continue your journey, the
    skills acquired in this chapter will serve as a crucial stepping stone toward
    mastering Snowflake’s powerful data management and analytics capabilities.


    # 4. SQL Basics in Snowflake Using Snowflake SQL API


    In this chapter, we will review some of the fundamental functionality of SQL in
    the context of Snowflake and the Snowflake SQL API. The chapter talks in large
    part about common database and SQL concepts while introducing you to the specific
    nuances of Snowflake and the functionality and limitations of the SQL API. Within
    the landscape of data management and analytics, the mastery of fundamental SQL
    functions is akin to possessing the keys to a powerful kingdom. By providing the
    building blocks of SQL within Snowflake’s dynamic ecosystem, this chapter will
    be a gateway to harnessing the full potential of Snowflake’s SQL API, whether
    you are a novice navigating the data realm or an experienced practitioner seeking
    to refine your skills.


    We will start by exploring the pivotal SELECT statement and its nuances for precise
    data retrieval and analysis. The subsequent focus on INSERT, UPDATE, and DELETE
    operations provides a strategic lens for shaping and maintaining datasets within
    your application, which is crucial for strategic data governance. We will then
    look at JOIN operations, which are critical for weaving intricate relationships
    between datasets. We understand how JOIN criteria and WHERE clauses take a nuanced
    approach to conditional logic to empower professionals to extract targeted datasets,
    and follow it with aggregating and grouping data.


    Key to ensuring we are executing performance-optimized querying, we will explore
    how subqueries and CTEs can be used within a single API call to quickly sort through
    and filter larger datasets before joining it to more refined data. This fundamental
    SQL technique is a key strategy we employ at Black Diamond to target queries that
    can be optimized, reduce compute costs for running warehouses, and cut down on
    remote and local spillage.


    Finally, we will look at Snowflake’s Bind Variable functionality. Bindings make
    it easier to work with dynamic filtering criteria and make it easier to handle
    the casting of data types. In addition to making for cleaner and easier-to-read
    code, it also cuts down on long SQL queries in your code, opting to pass this
    off to the Snowflake SQL API engine instead of handling this sometimes onerous
