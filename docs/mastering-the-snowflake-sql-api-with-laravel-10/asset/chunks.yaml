    ```\n\n我们之所以能做到这一点，是因为我们知道列会按照在 `SELECT` 语句中指定的顺序返回（0 => `CREATED_ON`, 1=> `ADDRESS`,\
    \ 2 => `ZIP`）。在这个例子中，我们消除了让你事先知道表结构或依赖你的应用程序来推导正确键的需要。如果我们必须依赖我们对表的了解，那么如果开发者在表中间添加了一个新列，就会将错误数据引入我们的应用程序。假设我们依赖应用程序来推导键，那么你就是在编写大量不必要的代码，每次都要遍历结果元数据来查找序号键，这既增加了开发时间开销，也增加了应用程序执行开销。\n\
    \n## INSERT 语句\n\n有时，你可能需要将新数据插入到你的 Snowflake 实例中。这些数据可能是你的应用程序生成的、用户输入接收的，或是你的应用程序从第三方处理后必须持久化到数据库的数据。由于我和我的团队围绕\
    \ Snowflake SQL API 构建的应用程序性质——即一个用于 Snowflake 可观测性和性能的多租户解决方案——我们很少使用 API 向数据库插入数据。这是因为驱动我们工具的数据存在于我们内部的\
    \ Snowflake 实例中，我们使用一个 PHP 驱动程序与之交互，但有时我们不得不在应用程序数据库中为每次安装创建的客户实例中创建数据。向 Snowflake\
    \ 插入数据使用 `INSERT` 子句，其语法如下：\n\n```\nINSERT [ OVERWRITE ] INTO <table_name> [ (\
    \ <col_name> [ , ... ] ) ]\n{\n    VALUES ( { <value> | DEFAULT | NULL } [ , ...\
    \ ] ) [ , ( ... ) ] |\n    <query>\n}\n```\n**清单 4-5** Snowflake INSERT 语句语法\n\
    \n这里的语法比我们看到的 `SELECT` 子句要直接得多。你可以使用 `INSERT` 子句并指定列名以及每条记录的值或数据来插入新数据，或者选择性地覆盖现有数据。API\
    \ 确实允许你插入多行数据，但这会给你的代码增加一些复杂性，我们将在下文讨论。需要注意的一点是：`OVERWRITE` 关键字的行为不像数据的“upsert”。相反，这是一种快速截断表中所有现有数据并用新数据替换的方法，而无需指定多个查询。\n\
    \n当涉及到插入数据时，插入单条数据记录相当直接。在你的 SQL 语句中，你需要指定列名，然后提供数据的变量作为值，这样你就可以构建动态的 `INSERT`\
    \ 语句。可能会变得复杂的情况是：你需要填充很多列，或者你正在执行多插入操作。Snowflake（尽管是无意的）确实为此提供了一个简洁的解决方案。\n\n\
    简要触及一个更高级的主题，像大多数数据库解决方案一样，Snowflake 提供了创建存储过程的能力。你可以直接在 Snowflake 中创建这些过程，使用\
    \ SnowSQL 命令行工具，或者让你的应用程序通过 API 运行一次性配置脚本。例如，我的应用程序期望在客户的 Snowflake 实例中存在各种存储过程才能正常运行。当客户首次设置新连接时，系统会提示他们运行一个“部署配置”脚本。\n\
    \n此脚本使用 API 在他们的 Snowflake 实例中创建各种对象、任务和存储过程。我们对这个配置进行版本控制，并将其存储在连接表的一个名为 `config_version_deployed`\
    \ 的列中。如果该值为 `NULL` 或设置为低于当前版本的版本，将向用户显示一个横幅，提示他们运行新的或最新的配置。因为我们必须通过 API 来完成此操作，以减少客户的手动工作，所以配置脚本确实会变得相当长和复杂。然而，权衡之下，应用程序其余部分的代码更简洁，并被认为是一个整体可靠的解决方案。"
- fmt: '# SQL语句的存储过程与动态查询


    为什么了解这一点很重要？在需要向表中插入多条记录的场景下，我们为该表构建了一个存储过程来处理数据插入。该函数体就是我们的SQL语句，设置在一个循环中。该函数接受三个参数：表名、列名数组和值数组。由于我们在应用程序中将其编码为每次都以相同方式处理，我们可以确保值的一级数组键与列的顺序键相匹配，从而能够在存储过程中动态构建`INSERT`查询。


    这里需要注意的一点是，我们创建了一个允许我们动态处理任何表插入的存储过程。这减少了我们需要创建的存储过程数量——一个动态过程代替了为每个要插入数据的表创建一个过程。这使我们能够遵循DRY（不要重复自己）方法，减少了必须运行的可能消耗客户更多额度的配置升级次数，并且总体上是我们选择遵循的设计模式。你可能有一个用例，希望或需要每个表由自己的函数处理，这完全是可行的。处理这个问题没有绝对正确或错误的方式。


    ### UPDATE语句


    `UPDATE`子句的工作方式与`INSERT`子句类似，使你能够更新数据库中的一条或多条现有记录。在许多情况下，你都需要更新数据，范围从非常简单到高度复杂，而该语句足够灵活，可以处理这些情况。假设你需要跟踪用户上次登录系统的时间。一个非常简单的`UPDATE`查询可以将`"last_login_timestamp"`设置为当前日期/时间，每次用户在应用程序上处理登录请求时执行。一个更复杂的例子可能是，如果你的应用程序执行各种数据计算，无论是按用户要求还是在后台进行，并且需要将这些数据持久化到数据库中。我们可以在下面看到`UPDATE`子句的语法，它相当直接。


    ```sql

    UPDATE <table_name>

    SET <column1> = <value1> [ , <column2> = <value2> , ... ]

    [ FROM <from_clause> ]

    [ WHERE <condition> ]

    Listing 4-6

    Snowflake UPDATE statement dictionary

    ```


    由于`UPDATE`语句的简单性，你可能会误以为你的应用程序代码也会同样简单。虽然这对你的许多需求来说可能是真的，但我们必须再次审视查询如何迅速增长并对你的应用程序代码产生巨大需求。类似于`INSERT`语句，拥有一个包含大量列集合的`UPDATE`语句，甚至包含一个支持非结构化数据的列，`UPDATE`查询会迅速增长并产生大量技术债务。


    如果你的查询涉及少于五个列，并且不需要处理非结构化数据，你可以将其视为一个经验法则，即可以直接在API调用中创建查询。然而，如果你的查询不符合此模式，或者你只是想要更简洁的代码，你可以选择像我们为插入数据那样创建一个动态存储过程。需要记住的一点是，提供至少一个`WHERE`条件非常重要，正如在SQL中进行`UPDATE`操作时应该始终做的那样，以防止你错误地覆盖好数据。由于需要提供这些条件，如果你选择创建一个存储过程供你的代码通过API调用，你需要有一个参数来支持`where`条件数组，这些条件可以动态加载到查询中。


    ## DELETE语句


    四个基础SQL子句中的最后一个是`DELETE`子句。与清空表中所有数据的`TRUNCATE`子句不同，`DELETE`子句允许你指定`WHERE`条件来有选择地删除数据，甚至允许你指定其他表或查询来支持你的`WHERE`条件。该子句的语法是四个中最简单的，但在这简单之中蕴含着成为非常强大查询的灵活性。


    ```sql

    DELETE FROM <table_name>

    [ USING <using_clause> [, <using_clause> ] ]

    [ WHERE <condition> ]

    Listing 4-7

    Snowflake DELETE statement dictionary

    ```


    使用`DELETE`子句时，提供至少一个`WHERE`条件至关重要，以防止你删除所有数据。如果你的意图是真正清空表，建议你使用`TRUNCATE`子句，因为它更快。`DELETE`子句必须在删除前评估每条记录（即使没有提供`WHERE`条件），而`TRUNCATE`子句则简单地清空表，而不在事先评估任何记录。


    在我们的应用程序中，并且作为我们遵循的最佳实践，我们不会从数据库中删除数据。相反，我们采用一个`"is_deleted"`标志，指示记录不应再被使用，但允许我们保留数据。由于各种原因，这可能不是你应用程序的可行方法，但如果其中一个原因是存储容量，值得注意的是，存储多年来已经有了很大发展，并且在大规模下相当便宜。


    你可能选择直接从表中删除数据而不是提供你版本的`"is_deleted"`标志的情况包括：遵守政府合规性（如GDRP）、删除坏数据或清除不应长期保存或在客户流失后保留的敏感客户数据。


    如果你预计需要通过SQL API执行数据删除，通常可以在应用程序代码中实时构建这些查询。然而，如果你正在处理复杂的`WHERE`条件，特别是涉及使用其他表或查询来细化要删除的目标数据，你可能会选择使用存储过程采用更动态的方法。同样，需要记住的两件事是：防止你的代码变得过于庞大而难以管理，以及在应用程序开发中遵循DRY方法。


    ## JOIN操作与WHERE子句


    既然我们已经涵盖了四个基础查询子句，我们将深入研究连接和过滤子句。这两个主题被归为一类，因为表连接为查询结果提供了附加数据，并增加了过滤数据的功能。像大多数数据库系统一样，Snowflake支持四种常见的连接类型：内连接、外连接、交叉连接和自然连接。


    正如我所说，连接可以具有过滤数据的附加功能，无论是通过连接本身的性质，还是通过提供作为过滤器作用于被连接数据的连接条件。其中之一是内连接。在内连接中，一个表中的每一行与另一个表中的一行匹配。当一个表中的一行与另一个表中的行不匹配时，这些行将从查询结果中排除。假设你有一个大学的学生列表，任何注册至少一门课程的学生被认为是活跃学生。通过在`student_id`等键上将学生与课程注册表连接，你只会得到有学生的课程，同样，只会得到有相关课程的学生。如果你将此结果进一步使用`SELECT
    DISTINCT`子句在`student_id`、`first_name`和`last_name`上进行过滤，你将得到一份大学活跃学生的唯一列表。我们这样做是为了考虑注册多门课程的学生，这会因内连接的性质而在结果集中产生重复的学生记录。


    让我们探索Snowflake中的各种`JOIN`。'
  raw: "Why is this important to know? In an instance where we have to insert multiple\
    \ records to a table, we have constructed a Stored Procedure for that table to\
    \ handle the INSERT of data. The body of the function is our SQL statement set\
    \ up in a loop. The function accepts three parameters: the table name, an array\
    \ of the column names, and an array of the values. Because we have coded this\
    \ into our application to be handled the same way each time, we can ensure that\
    \ the first-level array keys for the values match the ordinal key of the columns,\
    \ and from there, we are able to dynamically construct the INSERT query within\
    \ the Stored Procedure.\n\nOne thing to note here is that we created a procedure\
    \ that allows us to dynamically handle any table insert we are working with. This\
    \ cut down on the number of procedures we had to make—one dynamic procedure instead\
    \ of a procedure for each table we would insert data into. This allows us to follow\
    \ the DRY method (Don’t Repeat Yourself), results in having to run fewer configuration\
    \ upgrades which could consume more credits for our customers, and overall was\
    \ the design pattern we chose to follow. You might have a use case where you want\
    \ or need to have each table handled by its own function, and that is 100% fine\
    \ to do. There is no right or wrong way to handle this.\n\n### UPDATE Statements\n\
    \nThe UPDATE clause works in a similar fashion to the INSERT clause and gives\
    \ you the ability to update an existing record, or multiple records, in a database.\
    \ There will be many instances that you need to update data, ranging from very\
    \ simple to highly complex, and the statement is flexible enough to handle these.\
    \ Suppose for a moment you need to track when a user last logged into the system.\
    \ A very simple UPDATE query can set the “last_login_timestamp” to the current\
    \ date/time, which gets executed each time the user processes a login request\
    \ on the application. A more complex example might be if your application performs\
    \ various data calculations, either on user demand or in the background, and needs\
    \ to persist that data to the database. We can see below the syntax, being fairly\
    \ straightforward, for the UPDATE clause.\n\n```\nUPDATE \nSET  =  [ ,  =  , ...\
    \ ]\n[ FROM  ]\n[ WHERE  ]\nListing 4-6\nSnowflake UPDATE statement dictionary\n\
    ```\n\nBecause of the simplicity of the UPDATE statement, you might be deceived\
    \ into thinking that your application code will be just as simple. While this\
    \ may be true for many of your requirements, we again must look back to how quickly\
    \ the query can grow into a large demand on your application code. Similar to\
    \ the INSERT statement, having an UPDATE statement with a large column set, or\
    \ even having a column that supports unstructured data, the UPDATE query can quickly\
    \ grow and create a lot of technical debt.\n\nIf your query has fewer than five\
    \ columns and does not require handling unstructured data, you can consider it\
    \ a good rule of thumb that you can create the query directly within the API call.\
    \ If, however, your query does not follow this pattern, or you simply want to\
    \ have cleaner code, you can choose to create a dynamic Stored Procedure like\
    \ we did for inserting data. One thing to keep in mind is that it is very important\
    \ that you supply at least one WHERE condition, as should always be the case when\
    \ doing an UPDATE in SQL, to prevent you from erroneously overwriting good data.\
    \ Because of the need to supply these conditions, if you are choosing to create\
    \ a Stored Procedure to be called by your code via the API, you would need to\
    \ have a parameter that supports an array of where conditions that can be dynamically\
    \ loaded into the query.\n\n## DELETE Statements\n\nThe last of the four foundational\
    \ SQL clauses is the DELETE clause. Unlike the TRUNCATE clause, which empties\
    \ all of the data from a table, the DELETE clause allows you to specify WHERE\
    \ conditions to selectively delete data and even allows you to specify additional\
    \ tables or queries to support your WHERE conditions. The syntax for this clause\
    \ is the most simple of the four, but within the simplicity is the flexibility\
    \ to be a very powerful query.\n\n```\nDELETE FROM \n[ USING  [,  ] ]\n[ WHERE\
    \  ]\nListing 4-7\nSnowflake DELETE statement dictionary\n```\n\nWhen working\
    \ with the DELETE clause, it is vital you supply at least one WHERE condition\
    \ to prevent you from deleting all of your data. If your intent is to truly wipe\
    \ the table clean, it is recommended you use the TRUNCATE clause as it is faster.\
    \ Where the DELETE clause must evaluate every record before deleting it, even\
    \ if there are no WHERE conditions supplied, the TRUNCATE clause simply empties\
    \ the table without evaluating any of the records beforehand.\n\nIn our application,\
    \ and as a best practice that we follow, we do not delete data from the database.\
    \ Instead, we employ an “is_deleted” flag that indicates a record should no longer\
    \ be used but allows us to retain the data. This may not be a viable approach\
    \ for your application due to various reasons, but if one of those reasons is\
    \ storage capacity, it is good to note that storage has come a long way over the\
    \ years and is fairly cheap at a large scale.\n\nInstances where you might choose\
    \ to delete data directly from a table instead of supplying your version of an\
    \ “is_deleted” flag might include: following governmental compliance such as GDRP,\
    \ removing bad data, or purging sensitive customer data that should not be kept\
    \ for long periods of time or after the customer has churned.\n\nIf you anticipate\
    \ having to perform data deletions via the SQL API, you can usually get away with\
    \ constructing these queries in real time within your application code. If, however,\
    \ you are dealing with complex WHERE conditions, especially involving the use\
    \ of other tables or queries to refine the targeted data to be deleted, you might\
    \ opt for a more dynamic approach using a Stored Procedure. Again, the two things\
    \ to keep in mind are keeping your code from growing so large it is hard to manage\
    \ and following a DRY approach to your application development.\n\n## JOIN Operations\
    \ and WHERE Clauses\n\nNow that we have covered the four foundational query clauses,\
    \ we will dive into joins and filtering clauses. These two subjects have been\
    \ grouped together because a table join supplies additional data to your query\
    \ results and has the added functionality of filtering data. Like most database\
    \ systems, Snowflake supports the four common join types: inner joins, outer joins,\
    \ cross joins, and natural joins.\n\nAs I stated, joins can have the added functionality\
    \ of filtering your data, whether through the nature of the join itself or by\
    \ supplying join criteria that act as a filter on the data being joined. One of\
    \ these is the inner join. With an inner join, each row in a table matches a row\
    \ in another table. When a row in one table does not match the row in another\
    \ table, those rows are excluded from the query result. Take a situation where\
    \ you have students at a university and an active student is considered any student\
    \ enrolled in at least one class. By joining students to class enrollments on\
    \ a key such as a student_id, you would only get classes that have students in\
    \ them and, similarly, only get students who had an associated class. If you were\
    \ to take this result and further filter it using a SELECT DISTINCT clause on\
    \ student_id, first_name, and last_name, you would get a unique list of students\
    \ who are active at the university. We do this to account for students enrolled\
    \ in multiple classes, which would create duplicate student records in the result\
    \ set by the nature of an inner join.\n\nLet us explore the various JOINs in Snowflake."
