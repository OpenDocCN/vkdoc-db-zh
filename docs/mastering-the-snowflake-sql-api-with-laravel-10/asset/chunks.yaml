  trans: '

    # Snowpark API


    除了 Snowflake SQL API，Snowflake 还提供了一个直观的 API 用于与 Snowpark 库交互。使用此 API，你可以在本地开发环境中编写
    Snowpark Python 代码，并在 Snowflake 中原生执行。这使得用户能够创建和利用 Python 存储过程、强大的 Python 库（如
    `DataFrame` 和 `Pandas`）、创建 `UDF` 和 `UDTF`，以及执行机器学习任务。


    本书的范围主要集中在 Snowflake SQL API 上，但部分章节也会涉及 Snowpark API 的相关方面，以便用户能更全面地理解 Snowflake
    API 的功能。


    关于 Snowpark API 的更多信息，你可以参考官方的 Snowpark Library for Python API 参考文档：[`https://docs.snowflake.com/developer-guide/snowpark/reference/python/latest/index`](https://docs.snowflake.com/developer-guide/snowpark/reference/python/latest/index)。


    ## 为何选择 Laravel？


    Laravel 是一个强大的 PHP 框架，它为开发者提供了轻量级的代码库、广泛的包与社区生态，以及在模型-视图-控制器 (MVC) 遵从度不同层级上开发的灵活性。当我最初开始使用
    Snowflake SQL API 时，是为了构建我们的 `Black Diamond 360` ([`https://blackdiamond360.com/`](https://blackdiamond360.com/))
    解决方案，用于管理和监控 Snowflake 实例。由于该平台是作为一个多租户解决方案构建的，并且由于 PHP 驱动的有限可用性或缺乏开箱即用的 Laravel
    Snowflake 包，我们的团队选择转而利用 Snowflake API。这使我们能更轻松地设计和开发多租户解决方案，并提供了 Snowflake 随 SQL
    API 附带的安全性的额外好处。


    本书的大部分内容旨在为开发者提供使用 Snowflake SQL API 所需的知识。因为 SQL API 是一个 RESTful API，所以任何支持 REST
    API 调用的编程语言或框架都可以使用。


    ## Snowflake SQL API 与驱动程序


    如果你对 Snowflake 或大多数数据库解决方案有高级接触经验，你可能已经知道数据库驱动程序的存在。驱动程序是在你的应用程序中原生支持 Snowflake
    的一种好方法。虽然它们比 SQL API 的限制更少，但它们也有一些缺点。首先，在本书撰写时，Snowflake 仅支持七种驱动程序（`GO`、`JDBC`、`.NET`、`Node.JS`、`ODBC`、`PHP
    PDO` 和 `Python`）。其次，驱动程序升级可能意味着在你的应用程序强制使用废弃版本之前，需要进行更密集的测试和代码更改。


    虽然驱动程序在许多应用程序中扮演着明确的角色，但有时你可能会选择使用 API 的方式。例如，在我们的 `Black Diamond` 工具中，我们运行一个多租户应用程序，允许客户将一个或多个
    Snowflake 实例连接到该工具。虽然在 Laravel 或其他语言中，动态配置加载 Snowflake 连接到支持的驱动程序是可行的，但这确实引入了一些复杂性甚至潜在的安全风险。


    你可能使用 API 而不是驱动程序的其他用例则更直接一些。为 iOS 或 Android 构建原生移动应用程序，其中主要应用程序是 Web 应用，而移动应用程序是支持性接口，API
    可以让你快速高效地连接到你的 Snowflake 数据以拉取、推送、更新甚至删除数据。如果你正在使用没有驱动程序支持的集成工具，或者你处于安装驱动程序受限的环境中，SQL
    API 也能帮助克服这一点，让你访问 Snowflake 中的数据。


    总的来说，在任何使用驱动程序可能造成复杂性或限制的情况下，SQL API 的优势就开始显现。但也许我个人最喜欢 API 的一点是，Snowflake 维护了一个
    Snowflake API 状态页面，该页面可以被程序化地查询。通过这种方式，我的应用程序可以快速判断 Snowflake 是否出现中断，然后适当地处理中断。


    ## 理解 Snowflake SQL API 架构


    创建 Snowflake SQL API 是为了给开发者提供一个更轻量级的选择，无需安装沉重的包、库或驱动程序，也无需使用现有 Snowflake 驱动程序不支持的语言。该
    API 提供了一组端点，允许你通过标准的 `HTTP` 传输层安全 (`TLS`) 协议发出 SQL 命令并获取这些命令的结果。所有结果都以 `JSON V2`
    格式返回，为开发者提供了一种简单的方法，使用几乎所有现代编程语言中可用的标准库来构建客户端。


    虽然 Snowflake 将其 API 标识为 RESTful API，但它并不完全符合传统 `REST` API 定义的标准。`REST` API，根据定义，其资源端点采用
    URL 形式，通常通过 `HTTP` 命令 (`GET`、`DELETE`、`PATCH`、`PUT` 等) 进行操作。相反，Snowflake SQL API
    只提供了几个端点 URL，旨在作为向 Snowflake 发送 SQL 语句并通过 `HTTP` 检索结果的媒介，类似于 `RPC` 服务。


    当用户向端点提交请求时，API 首先判断其是否为有效请求。如果无效，则返回一个 `HTTP` 错误代码，并停止处理。如果请求有效，它会创建一个对 Snowflake
    实例的 `HTTP` 调用，并将查询提交给处理器。然后处理器开始执行语句，并可能处于三种状态。第一种状态是“睡眠状态”，API 在此状态下等待一段设定的时间，然后再次检查结果。第二种状态是错误状态，在此状态下语句返回
    Snowflake 错误，并作为 `HTTP` 错误传递回 API 响应体。最后一种状态是成功状态，在此状态下 API 响应体返回一个 `HTTP` 成功响应以及有效载荷的
    `JSON` 主体。


    在第三种成功状态下，API 响应体还可能包含对额外分区的引用。因为某些数据集可能太大而无法一次性传输，Snowflake 会将它们拆分成多个分区。随后的请求可以发送到
    Snowflake SQL API，以获取额外的分区或数据页，其工作方式类似于大多数现代编程语言中的分页。


    要执行一个新的语句，开发者必须构造要传递给端点的 `HTTP` 请求主体，包括要执行的 SQL 语句，并将其作为 `POST` 请求发送给 API。Snowflake
    提供了包含自定义 `UUID` 的选项，而不是自动生成的 UUID，以帮助识别重复请求并使分区获取更容易。我们稍后将更详细地讨论其工作原理。你还可以指示是否要异步执行语句，允许自定义应用程序在指定如何处理查询响应时更具灵活性。


    # 2. Snowflake 数据云


    ## 基础知识


    在我们深入探讨如何使用 Snowflake SQL API 的细节之前，为其使用建立一些基础原则很重要。在本书中，我们有时会交替使用 `Snowflake
    SQL API`、`Snowflake API`、`SQL API` 和 `API`。除非另有说明属于其他 API 服务（如 `Snowpark API`），否则所有这三种用法都特指
    Snowflake SQL API。随着 Snowflake 的持续发展，他们不断迭代和演进 Snowflake SQL API，并引入新的 API 库供用户利用，使开发者能够更轻松地挖掘
    Snowflake 的强大功能。因此，本书分享的技术可能并不适用于 Snowflake 旗下的所有产品。

    '
- fmt: '# Understanding Snowflake’s Evolution


    In addition to the Snowflake SQL API, Snowflake also supports the use of their
    `Snowflake Native App Framework` and the `Snowpark API`. Understanding how these
    solutions differ from the `SQL API` will allow you to better understand the capabilities
    that Snowflake provides. In the advanced chapters of this book, we will briefly
    touch upon both platform capabilities. In order to provide a verbose primer, we
    will discuss how the two differ here.


    ## Snowpark API


    The `Snowpark` library provides developers with an intuitive library for querying
    and processing data at scale in Snowflake. The library supports one of three popular
    AI and machine learning programming options, giving developers the freedom to
    work in a language they are comfortable with: `Python`, `Scala`, and `Java`. The
    `Snowpark API` might be considered an iteration of the Snowflake Connector for
    Spark, which allows developers to bring Snowflake into the Apache Spark ecosystem.
    This enables them to use Spark to read data from and write data to Snowflake.


    From there, the comparisons start to diverge. Snowpark developers are optionally
    able to take benefit of interacting with data directly in Snowflake using libraries
    and patterns purpose-built for different languages while maintaining performance
    and functionality, support most code IDEs (such as `Jupyter`, `VS Code`, and `IntelliJ`),
    support for offloading data transformation and heavy lifting (such as Snowflake
    `UDF`s) to the Snowflake data cloud, and do not require you to maintain separate
    work clusters outside of the Snowflake for running computations.


    Because of its ability to support these languages natively, developers can use
    type checking within the native language construct to execute `SQL` statements
    or, optionally, choose to specify the SQL statement they wish to execute. A great
    example of this is the ability to use code constructs provided by the popular
    Python library, `DataFrames`, to construct `SQL` select queries.


    Since `Snowpark` runs natively within Snowflake, all operations are lazy-executed
    on the server, allowing developers to use the library to delay running transformations
    until much later in the pipeline while also providing the flexibility to batch
    multiple operations into a single call. This allows developers to shave down the
    amount of time it takes to transfer data between your client and the Snowflake
    database and offers additional performance improvements.


    Using the toolbox provided by the `Snowpark API`, developers can create user-defined
    functions (`UDF`s) directly within the Snowpark app. `Snowpark` can push your
    code to the server and execute your `UDF`s at scale on your data. This provides
    many useful and powerful options for working with data, including looping or batching
    functionality, where creating a `UDF` allows Snowflake to parallelize and apply
    the code at scale within Snowflake.


    By defining custom `UDF`s within your code, you can write functions in the same
    language that you use to write client code, allowing you to process data directly
    within the Snowflake database. `Snowpark` magically handles pushing the custom
    code for `UDF`s to the Snowflake database and can be called within your client
    code. This means you do not need first to transfer data to your local client in
    order to execute the function on the data, saving you time, code, money, and performance.


    ## Snowflake Native App Framework


    The `Snowflake Native App Framework` allows developers to expand the capabilities
    of other Snowflake features by sharing data and related business logic with other
    Snowflake accounts, allows for the sharing of an application with consumers through
    the Snowflake marketplace as either a free or paid app, and includes feature-rich
    visualizations using `Streamlit`. Snowflake does this by allowing you to create
    data applications that directly leverage core Snowflake functionality.


    Snowflake has built its `Native App Framework` to perform along most development
    standards, including an easy way to leverage testing environments within your
    account, a robust developer workflow to manage code within source control while
    maintaining data and related database objects within Snowflake, the ability to
    version and patch your applications as they continue to evolve, incrementally
    release updates to consumers, and support for logging and unstructured events
    that allows your developers to troubleshoot and monitor applications.


    Currently, the `Native App Framework` has a few limitations that developers should
    keep in mind. These include limited support (no support on Microsoft Azure or
    Google Cloud Platform), cross-cloud auto-fulfillment except within certain AWS
    regions, no support for government cloud–enabled regions, limited single organization
    support for Virtual Private Snowflake (`VPS`), requiring users to use sequences
    instead of `AUTOINCREMENT` on newly created tables, not supporting temporary tables
    or stages, limited support of `Streamlit`, and limitations on references. Snowflake
    has structured its `Native App Framework` around a provider-consumer model, which
    is also used in features such as Snowflake Collaboration and Secure Data Sharing.


    To support Native Apps, providers, or a user who wants to share data content and
    application logic with other users, must follow a specific architecture to enable
    the code for the application package, assign and maintain licensing and entitlements,
    provide access to proprietary data, and provide access to App events. Once the
    application is ready to publish, providers can push the application to the Snowflake
    Marketplace as a public listing or privately list their application for more controlled
    access.


    A consumer, or a Snowflake user who wants to access the data content and application
    logic shared by providers, can then go to the listing and enable the application.
    The application is installed in the consumers’ Snowflake instance, is able to
    be connected to their local data, and can be integrated with a consumer’s external
    systems.


    # Key Concepts: Data Warehousing in the Cloud


    # Snowflake Architecture


    `Snowflake`, a self-managed data platform service, enables data storage, processing,
    and analytic solutions that are faster, easier to use, and more flexible than
    traditional database offerings. It uses a new, state-of-the-art `SQL` query engine
    deployed on an innovative architecture that has been natively designed for the
    cloud. Because it is a cloud-based service, there is no hardware to choose from
    or configure and manage and no software to maintain, and ongoing maintenance and
    tuning are handled directly by Snowflake.


    In this section, we will delve into the architectural foundations of Snowflake,
    one of the most innovative and powerful cloud data warehousing platforms available
    today. Understanding the architecture is essential for anyone seeking to harness
    the full potential of Snowflake’s capabilities.'
