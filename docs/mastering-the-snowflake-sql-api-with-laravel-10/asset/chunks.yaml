- fmt: '## Creating A Snowflake Service


    In order to ensure our code is DRY (Don’t Repeat Yourself), navigate to `app ➤
    Services` and create a new file called `SnowflakeService.php`. You’ll want to
    include a few packages at the start of your file that will be necessary as we
    dive deeper.


    ```php

    <?php

    namespace App\Services;

    use Carbon\Carbon;

    use Firebase\JWT\JWT;

    use Firebase\JWT\Key;

    use Illuminate\Http\Request;

    use App\Http\Controllers\Controller

    use Illuminate\Support\Facades\Auth;

    use Illuminate\Support\Facades\Http;

    use violuke\RsaSshKeyFingerprint\FingerprintGenerator;

    class SnowflakeService

    {

    // Future code here

    }

    ```


    Listing 3-1 Laravel Snowflake service


    The above code defines our namespace and some important packages, including the
    Firebase JWT package and the `RsaSsheKeyFingerprint` package by `` `violuke` ``.
    Now that you have your packages in place, we need to create the code that will
    allow you to get a JWT token, which will be used in your API call header. You’ll
    want to generate a public and private key for your account. To do this, download
    the SnowSQL command-line package and then execute the following command:


    First, generate an unencrypted version or an encrypted version.


    ```

    $ openssl genrsa 2048 | openssl pkcs8 -topk8 -inform PEM -out rsa_key.p8 -nocrypt

    ```


    or


    ```

    $ openssl genrsa 2048 | openssl pkcs8 -topk8 -v2 des3 -inform PEM -out rsa_key.p8

    ```


    This command generates a private key in PEM format. Make sure it looks similar
    to the following:


    ```

    -----BEGIN ENCRYPTED PRIVATE KEY-----

    MIIE6TAbBgkqhkiG9w0BBQMwDgQILYPyCppzOwECAggABIIEyLiGSpeeGSe3xHP1

    wHLjfCYycUPennlX2bd8yX8xOxGSGfvB+99+PmSlex0FmY9ov1J8H1H9Y3lMWXbL

    ...

    -----END ENCRYPTED PRIVATE KEY-----

    ```


    Once you have the private key, you’ll need to generate a public key. Use the following
    command:


    ```

    $ openssl rsa -in rsa_key.p8 -pubout -out rsa_key.pub

    ```


    This command will create a file that should contain a similar format:


    ```

    -----BEGIN PUBLIC KEY-----

    MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAy+Fw2qv4Roud3l6tjPH4

    zxybHjmZ5rhtCz9jppCV8UTWvEXxa88IGRIHbJ/PwKW/mR8LXdfI7l/9vCMXX4mk

    ...

    -----END PUBLIC KEY-----

    ```


    Store both of these files in a secure, private directory on your local machine.
    When you are done, open a new SQL Worksheet in Snowflake, and assign the Public
    Key to your users:


    ```

    ALTER USER johndoe SET RSA_PUBLIC_KEY=''MIIBIjANBgkqh...'';

    ```


    Now that you have assigned the public key to your API user, we can start to construct
    the code needed for your JWT token generation. Go back to your Laravel code and
    open the `SnowflakeService.php` file we created earlier. Create a new function
    called `generateJWT` following the code below.


    ```php

    public static function generateJwt()

    {

    $account = ''account identifier''

    $username = ''snowflake_user_name''

    $qualified_username = $account . ''.'' . $username;

    $now = Carbon::now(''UTC'')->timestamp;

    $lifetime =  Carbon::now(''UTC'')->addMinutes(59)->timestamp;

    $public_key = ''Paste Public Key''

    $private_key = ''Paste Private Key''

    $fingerprint = FingerprintGenerator::getFingerprint($public_key, ''sha256'');

    $payload = [

    ''iss'' => $account . ''.'' . $username . ''.SHA256: '' . $fingerprint,

    ''sub'' => $qualified_username,

    ''iat'' = $now

    ''exp'' = $lifetime

    ];

    $jwt_token = JWT::encode($payload, $private_key, ''RS256'');

    return $jwt_token;

    }

    ```


    Listing 3-2 Laravel JTW generation


    Let’s take a moment to go through the above code. We start by defining our static
    function to generate the JWT token and specify a handful of variables that are
    needed for the token itself as well as the fingerprint. When I first started out
    using the Snowflake SQL API, I underestimated how important the fingerprint was;
    I was using a fingerprint generated by SnowSQL and assumed that was all that I
    needed because it “just worked” for around two weeks. When it stopped, it took
    a lot of debugging by reverse engineering the JWT token generated by the application
    vs. by SnowSQL to figure out how important the fingerprint is. There also was
    not a lot of good documentation on how to get this fingerprint using PHP or even
    Laravel, so I hope that this gives future users the jumpstart they need to do
    it correct the first time.


    Once you have your fingerprint generated from the public key, and some other unique
    variables defined, we pass those to a payload array. The `JWT::encode()` function
    accepts the array as its first argument, the private key as the second argument,
    and then we tell it to use `RS256` for the encryption and validation. If you filled
    everything out correctly, you’ll have a JWT token that can be used later in the
    `SnowflakeService` class, or you can print to screen and test it via the `snowsql`
    command-line.


    The next section of code is small, but it was a helper method I created because
    I started working with multiple Snowflake accounts. The API URL actually changes
    with each Snowflake Account, not user, and is how you are able to specify your
    target instance to authenticate and execute against. Regardless as to whether
    you are accessing a single account or multiple accounts, I still recommend this
    helper function as it can be useful in other areas of your code as your application
    grows.


    ```php

    public static function createBaseURL($account, $region)

    {

    $snowflake_api_base_url = ''https://'' . $account . ''.'' . $region . ''.snowflakecomputing.com'';

    return $snowflake_api_base_url;

    }

    ```


    Listing 3-3 Laravel Snowflake base URL configuration


    This function is pretty straightforward and generates the unique URL needed to
    specify where your code should direct the API call. We don’t supply any of the
    REST functions, such as `/api/v2/statements`, because there are actually three
    functions we could call and we want that flexibility to append it on the fly.
    The next two functions we will look at are where the magic happens. The first
    is a basic execution function that handles a lot of upfront configuration of the
    API headers for most of your SQL statements, and the second function is how we
    handle partitioned data since the API returns “pages” of data that you must then
    requested in a paginated manner.


    ```php

    public static function execute($account, $region, $database, $schema, $statement)

    {

    $jwt = static::generateJwt();

    $base_url = static::createBaseURL($account, $region);

    $query = Http::withHeaders ([

    ''Content-Type'' => ''application/json'',

    ''User-Agent'' => ''myApplication/1.0'',

    ''X-Snowflake-Authorization-Token-Type'' => ''KEYPAIR_JWT'',

    ])->acceptJson()-withToken($jwt)->post($base_url . ''/api/v2/statements'', [

    ''statement'' = $statement,

    ''database'' = $database,

    ''warehouse'' => ''warehouse_name'',

    ''schema'' => $schema,

    ''role'' => ''role_name'' // Can optionally be supplied as a function parameter

    ''parameters'' => [

    ''query_tag'' => ''my-application-name'',

    ],

    ]);

    return $query;

    }

    ```


    Listing 3-4 Laravel query execution'
