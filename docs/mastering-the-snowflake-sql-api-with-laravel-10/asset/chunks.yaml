  trans: '

    ## 设置您的 Snowflake 账户


    Snowflake 使用基于浏览器的 Web 界面与平台进行交互，同时也提供命令行界面 (`SnowSQL`)、各种数据库驱动程序和 API 访问。如果您是首次开始使用
    Snowflake，您需要先使用名为 `Snowsight` 的 Snowflake 基于 Web 的客户端登录以开始使用。注册账户并同意服务条款后，您将收到一封包含首次登录说明的电子邮件。


    登录 Snowflake 使用的是一个包含账户标识符的独特 URL。账户标识符是在您的组织内唯一标识您的 Snowflake 账户的一种方式，并将其与其他
    Snowflake 账户的全局网络区分开来。账户标识符使用您的账户名称以及组织名称（例如，`myorg-account123`）来引用您的独特账户。您可以选择使用
    Snowflake 分配的账户定位器作为标识符，但这种旧版格式不推荐使用，因为 Snowflake 计划逐步淘汰它。您可以通过多种方式使用 Snowflake
    独特账户标识符，包括


    1.  通过 Web 浏览器访问 Snowflake Web 界面

    2.  使用 `SnowSQL` 和其他客户端连接到 Snowflake

    3.  Snowflake 生态系统内的第三方应用程序和服务

    4.  保护您 Snowflake 账户的安全功能

    5.  全局功能，例如安全数据共享和复制

    6.  访问 Snowflake `SQL` 和 `Snowpark` API


    需要注意的是，初次注册时，您将同时获得一个账户标识符和一个组织标识符。组织使您业务中的管理员能够管理与您业务实体相关的 Snowflake 合同的各个方面。一个组织可以关联一个或多个账户，每个账户都有自己的唯一标识符，这为您提供了灵活性，可以按照满足业务独特需求的方式设置云数据中心。如果您的业务不是通过自助服务选项注册的，Snowflake
    将已经为您创建了一个组织并将其分配给您的 `ORGADMIN`（您组织的拥有者）。账户标识符，包括旧版标识符和其他较少使用的格式，在 Snowflake 文档中有详细说明，但这超出了本书的范围。我们将使用
    Snowflake 推荐的首选格式，但您可以在以下位置查看所有其他格式及其相关信息：[`https://docs.snowflake.com/en/user-guide/admin-account-identifier`](https://docs.snowflake.com/en/user-guide/admin-account-identifier)


    ### 配置和管理您的环境


    要开始使用，您需要登录您的 Snowflake 环境。您可以直接访问 Snowflake 在您注册时提供的独特 URL，或者访问 [`https://app.snowflake.com`](https://app.snowflake.com)，并使用您的账户名和
    Snowflake 凭证登录。登录 `Snowsight` 后，您需要导航到左侧导航栏中的“管理”部分。在这里，我们将为您的 API 创建一个新用户。由于
    API 的强大功能，不建议使用具有 `ACCOUNTADMIN` 或 `ORGADMIN` 访问权限的用户。


    我们暂时不定义默认角色或默认仓库。继续并点击“创建用户”，然后测试您是否能够使用该用户登录。完成后，使用您的 `ACCOUNTADMIN` 凭证重新登录 `Snowsight`，我们将继续创建您的第一个角色。角色为您提供了一种简单的方法，将用户分组到单个团队、部门或权限集中。当您在
    Snowflake 中管理安全时，您将直接向角色 `GRANT`（授予）对 Snowflake 对象的访问权限。角色使用继承机制工作，允许您为角色创建树状结构以继承权限，并减少冗余的
    `GRANTS`（授权）。我们将创建一个基本角色并将其分配给我们先前创建的用户。确保该角色除非您需要，否则不继承来自其他角色的任何权限。在大多数情况下，建议您的
    API 角色不继承来自其他角色的任何权限，并且权限是根据您希望应用程序执行的操作量身定制的。这可以防止您开放过多访问权限，并错误地移除可能破坏应用程序的访问权限。


    接下来，我们需要导航到“仓库”并创建一个新仓库。根据您的应用程序和业务逻辑的结构，您可能需要根据资源需求，在应用程序的各个区域调用多个仓库。但在很大程度上，您应该有一个专门用于
    API 用户的仓库，即默认仓库。这使您能够在应用程序增长时逐步扩展和增大仓库规模，同时不影响其他 Snowflake 查询。创建新仓库后，回到我们之前创建的用户，点击“编辑”，并分配我们刚创建的默认角色和默认仓库。


    ![](img/615715_1_En_3_Fig1_HTML.jpg)


    图 3-1：新用户创建


    ### 导航 Snowflake Web 界面


    Snowflake 为用户提供了两种主要方式与 Snowflake 云平台交互：`SnowSQL` 命令行实用程序和基于 Web 的 Snowflake UI（称为
    `Snowsight`）。两者中，Snowflake Web UI 是与 Snowflake 交互最常用的方式，包括执行查询以及执行管理功能，如管理仓库、数据库对象、安全性和审查成本与性能。


    Snowflake 同时提供 `Snowsight` UI 和经典 UI，但我们将重点介绍前者，考虑到经典 UI 的路线图是将被完全淘汰。登录后，您会看到仪表板页面和左侧导航。我们将讨论该导航中的每个部分，包括子菜单项以及在
    Snowflake 中工作时如何使用它们。这些信息虽然基础，但对于理解至关重要，以便我们能更好地演示 Snowflake `SQL` API 的功能并传达其限制。


    #### 仪表板


    仪表板为 Snowflake 用户提供了一种灵活的方式来创建查询集合（以磁贴形式排列），这些集合直接由您的 Snowflake 数据的查询结果填充。这使您能够构建快速的解决方案来监控您的
    Snowflake 账户，并从中获取可重复使用并与其他团队成员共享的快速数据洞察。仪表板指标是完全可定制的，并支持广泛的筛选选项，为最终用户提供交互式、动态的筛选功能。虽然它是您工具库中一个强大的补充，但需要指出的是，Snowflake
    中的仪表板功能并非旨在替代您传统的 BI 工具。相反，它应该被用作一种方式，以获得对您账户和数据的一些快速、高层次的洞察。

    '
- fmt: '#### Worksheets


    Snowflake 的 Snowsight UI 支持一个基于 Web 的查询工具，称为 `Worksheets`，其行为类似于 `DBeaver`、`PHPMyAdmin`、`pgAdmin`
    等 SQL 工具。当你首次打开 `Worksheets` 时，你会在屏幕左侧看到一个最近打开文件的列表和一个文件资源管理器。文件资源管理器支持创建和组织文件及文件夹，为你提供了一个基于云的编辑器。点击任何文件都会在新标签页中打开它，这些标签页可以在屏幕顶部管理，同时也允许你导航到其他已打开的标签页。使用
    `Worksheets`，用户可以创建 `SQL` 和 `Python Worksheets`。


    当使用 `SQL Worksheets` 时，你可以像使用桌面工具一样编写和运行 SQL 语句，浏览查询结果，应用过滤器，并为查询结果生成快速的可视化图表。对于你创建的任何
    `Worksheet`，你可以修改一些标准元数据，例如 `Worksheet` 的标题，并与 Snowflake 实例中的其他用户共享设置。


    与 `SQL Worksheets` 类似，`Python Worksheets` 允许你直接在 Snowflake 环境中执行原始的 `Python` 代码。这是一个很棒的工具，不需要像
    `Jupyter notebooks` 那样大量的开销配置，并允许你直接针对数据运行 `Python`，而无需先下载数据和上传结果。`Python Worksheets`
    为你提供了与 Snowflake 的 `Snowpark` 工具的直接集成，释放了 `Python` 的全部潜力，进而支持众多用于人工智能和机器学习编程的包。


    #### Data


    本节介绍导航窗格中的 Data 选项卡，它包含与 Snowflake 实例中数据相关的各种功能区域。除了 `Worksheets`，用户将在 Snowsight
    的这一部分花费大量时间，执行各种数据任务，如数据库管理、数据共享和治理。


    ##### Databases


    Databases 部分允许用户充分利用授予其当前角色的 `GRANTS`。Snowflake 允许你使用屏幕左上角的选项随时更改你的角色，并根据该角色拥有的
    `GRANTS` 更新 Databases 页面。这是在为用户分配角色之前，测试不同角色访问权限的好方法。


    Databases 部分有一个嵌套的导航面板，允许你对授予当前角色的数据库进行分层视图排序。这包括能够下钻到你的角色支持的数据库的最低层级。为了对此部分进行最详尽的解释，我们将假设你使用的是
    `ACCOUNTADMIN` 角色，这让你可以完全访问 Snowflake 实例中的所有数据库对象。除了你在组织中创建的任何数据库外，你很可能会看到另外两个数据库：`SNOWFLAKE`
    和 `SNOWFLAKE_SAMPLE_DATA`。`SNOWFLAKE` 数据库提供了各种视图和函数，允许你检索有关 Snowflake 实例的大量元数据，包括查询历史、访问历史、仓库使用情况、信用消耗等。`SNOWFLAKE_SAMPLE_DATA`
    数据库为你提供了完整的测试数据集，可用于学习更多关于 Snowflake 的知识。这两个数据库都是 Snowflake 的标准配置，不在本文讨论范围内。


    在顶层，点击一个数据库名称将展开该数据库的节点，并更新信息屏幕以显示更多详细信息。Database Details 概述了有权访问该数据库的角色及其显式权限，而
    Schemas 则会列出属于该数据库的当前模式列表。在页面的右上角，你有一些额外的选项，包括删除数据库、克隆数据库、修改数据库和转移数据库所有权。从此屏幕，你还可以使用
    “+ Schema” 按钮创建一个新的 `Schema`。


    点击树中的任何 `Schema` 将带你进入 Schema Details 页面，列出授予该模式的角色和权限。如果你不熟悉角色在 Snowflake 中的工作原理，建议你查阅文档。简而言之，角色具有最高限制性。例如，如果你被授予了对一个
    `Schema` 的访问权限，但没有访问其父数据库的权限，你将无法查看该模式。


    在一个模式内，你还可以看到你的角色有权访问的表、暂存区、文件格式和过程。在右上角，你有几个修改模式的选项，以及一个 “Create” 按钮，允许你通过图形表单编辑器快速创建表、视图、暂存区、存储集成、文件格式、序列、管道、流、任务、函数、过程和动态表。


    随着你继续下钻到表、视图和过程等对象中，你会发现类似的信息和编辑选项。下钻到对象时需要注意的一件重要事情是，信息屏幕现在将开始显示一个定义窗口，其中包含创建该对象所需的完整
    SQL 查询。这对于调试对象或在需要在新数据库中重新创建对象时非常有用。


    ##### Private Sharing


    `Private Sharing` 是一项功能，可让你与 Snowflake 实例中的其他 Snowflake 帐户共享选定数据，并可能将你的数据货币化。Shared
    With You 下的 Direct Shares 会显示共享到你的 Snowflake 帐户的任何数据。Shared By Account 会显示你通过指定直接消费者、发布到
    `Marketplace` 或创建 `Direct Share` 而与其他 Snowflake 客户共享的任何数据。最后一个选项卡 Reader Accounts，允许你指定共享给非
    Snowflake 客户个人的数据，为他们提供对数据的只读访问权限，而无需 Snowflake 帐户。


    ##### Provider Studio


    `Provider Studio` 是一个更高级的主题，超出了本文的范围。它允许你创建 Snowflake 应用程序并将其发布到 Snowflake `Marketplace`，管理你的列表，并查看你列在
    `Marketplace` 上的任何应用程序的分析数据。如果你计划利用 `Marketplace` 发布应用程序，Learn 选项卡中有许多值得阅读的文章。Snowflake
    甚至提供了多种方式来为你发布的应用程序的使用收集付款，包括能够使用 Snowflake 信用额度作为数字货币。


    ##### Governance


    截至撰写本文时，`Governance` 是 Snowsight 中一个相对较新的功能。Dashboard 页面可让你快速查看你拥有多少 Snowflake
    对象、分配给这些对象的任何标签和策略，以及一些统计数据，如最常用的标签和最常用的策略。Tagged Objects 标签显示 Snowflake 实例中的所有对象列表、分配给它们的任何标签以及已分配的任何策略。


    #### Marketplace


    Marketplace 页面允许你探索和搜索已发布的提供者应用程序和数据集，这些资源可在你的 Snowflake 实例中使用。这里有免费、增值和付费列表的混合，你可以在你的组织中探索和启用它们。


    #### Activity


    Activity 选项卡为你提供了几种探索 Snowflake 实例中用户活动的方法。这可能是我 Snowflake 实例中第二常用的部分，尤其是在使用 Snowflake
    SQL API 时，因为它让我更深入地了解我的 API 调用实际执行了哪些活动，并提供了关于我可能遇到的任何错误的丰富细节。'
  raw: '#### Worksheets


    Snowflake’s Snowsight UI supports a web-based querying tool called Worksheets
    that behaves similarly to SQL tools such as DBeaver, PHPMyAdmin, pgAdmin, and
    others. When you first open Worksheets, you’ll see a list of your recently opened
    files and a file explorer on the left-hand of the screen. The file explorer supports
    the creation and organization of both files and folders, giving you a cloud-based
    editor. Clicking any file will open it in a new tab, which can be managed along
    the top of the screen, as well as allowing you to navigate to other open tabs.
    Using Worksheets, a user can create both SQL and Python Worksheets.


    When using SQL Worksheets, you can write and run SQL statements the same as you
    might using a desktop tool, explore the query results, apply filters, and generate
    quick visualizations of the query results. For any Worksheet you create, you can
    modify some standard metadata, such as the title of the Worksheet, and share settings
    with other users within your Snowflake instance.


    Similar to SQL Worksheets, Python Worksheets allows you to execute raw Python
    code directly within the Snowflake environment. This is a great tool to use that
    does not require a lot of overhead configuration, like Juypter notebooks, and
    allows you to run Python directly against your data without first having to download
    the data and upload the results. Python Worksheets provide you with direct integration
    to Snowflakes Snowpark tool, unlocking the full potential of Python and, by extension,
    numerous packages to support artificial intelligence and machine learning programming.


    #### Data


    This section covers the Data tab in the navigation pane, which consists of various
    functional areas specific to the data in your Snowflake instance. Aside from Worksheets,
    users will spend a large part of their time in this section of Snowsight, performing
    various data tasks such as database management, data sharing, and governance.


    ##### Databases


    The Databases section allows a user to take full advantage of the GRANTS given
    to their current role. Snowflake allows you to change your role on the fly using
    the option in the top-left corner of the screen and updates the Databases page
    according to the GRANTS that role has. This is a great way to test what various
    roles have access to before assigning a user to a role.


    The Databases section has a nested navigation panel that allows you to sort through
    a hierarchical view of databases granted to your current role. This includes the
    ability to drill down to the lowest level of the database that your role supports.
    To provide the most verbose explanation of this section, we will assume you are
    using the ACCOUNTADMIN role, giving you full access to all database objects in
    your Snowflake instance. Apart from any database you have created in your organization,
    you’ll most likely see two other databases: SNOWFLAKE and SNOWFLAKE_SAMPLE_DATA.
    The SNOWFLAKE database provides various views and functions that allow you to
    retrieve a plethora of metadata about your Snowflake instance, including query
    history, access history, warehouse usage, credit consumption, and more. The SNOWFLAKE_SAMPLE_DATA
    database provides you with a full dataset of test data that you can use to learn
    more about Snowflake. Both of these databases are standard to Snowflake and are
    outside the scope of this publication.


    At the top level, clicking on a database name will expand the node for that database
    and update the information screen with additional details. Database Details outlines
    any roles that have access to the database along with their explicit privileges,
    while Schemas will give you a list of the current schemas that belong to the database.
    In the top-right of the page, you have some additional options that include dropping
    the database, cloning the database, modifying the database, and transferring database
    ownership. From this screen, you may also create a new Schema using the “+ Schema”
    button.


    Clicking on any schema in the tree will take you to a Schema Details page listing
    the roles and privileges granted to the schema. If you are not familiar with how
    roles work in Snowflake, it is recommended you review the documentation. In short,
    roles are most restrictive first. If you are granted access to a schema but not
    the parent database, as an example, you will be unable to view the schema.


    Within a schema, you can also see the tables, stages, file formats, and procedures
    that your role has access to. In the top-right, you have a few options to modify
    your schema and a “Create” button that allows you to quickly create tables, views,
    stages, storage integrations, file formats, sequences, pipes, streams, tasks,
    functions, procedures, and dynamic table using a graphical form editor.


    As you continue to go further down the tree into objects such as tables, views,
    and procedures, you’ll find similar object information and editing options. One
    important thing to note as you drill further into objects is the information screen
    will now start to show you a definition window, which has the complete SQL query
    needed to create that object. This is great for debugging your objects or if you
    need to re-create an object in a new database.


    ##### Private Sharing


    Private Sharing is a feature that lets you share select data within your Snowflake
    instance with other Snowflake accounts and potentially monetize your data. Direct
    Shares under Shared With You will show you any data that is shared to your Snowflake
    account. Shared By Account will show any data you are currently sharing with other
    Snowflake customers by specifying direct consumers, publishing to the Marketplace,
    or creating a Direct Share. The final tab, Reader Accounts, lets you specify data
    shared to an individual who is not currently a Snowflake customer, giving them
    read-only access to your data without needing a Snowflake account.


    ##### Provider Studio


    Provider Studio is a more advanced topic that is beyond the scope of this publication.
    This allows you to create Snowflake applications and publish them to the Snowflake
    Marketplace, manage your listings, and view analytics about any application you’ve
    listed on the Marketplace. The Learn tab has a number of articles that are great
    to read if you plan to leverage the Marketplace for publishing applications. Snowflake
    even provides various ways to collect payment for the use of your published applications,
    including the ability to use Snowflake credits as digital currency.


    ##### Governance


    As of this writing, Governance is a relatively new feature in Snowsight. The Dashboard
    page lets you quickly see how many Snowflake objects you have, any tags and policies
    assigned to those objects, and some statistical data such as most used tags and
    most used policies. The Tagged Objects tag shows a list of all objects in your
    Snowflake instance, any tags that are assigned to them, and any policies that
    have been assigned.


    #### Marketplace


    The Marketplace page allows you to explore and search for published provider applications
    and datasets that are available to use in your Snowflake instance. There is a
    mixture of both free, freemium, and paid listings that you can explore and enable
    in your organization.


    #### Activity


    The Activity tab provides you with a few methods for exploring user activity within
    your Snowflake instance. This is probably the second-most used section in my Snowflake
    instance, especially working with the Snowflake SQL API, as it gives me a deeper
    insight into what activities my API calls are actually taking and rich detail
    regarding any errors I might encounter.'
