  trans: '# 管理员


    ## 查询历史


    查询历史允许您查看在您的 `Snowflake 实例` 中执行的所有查询。系统提供了多种过滤器来缩小查询范围，其中最有用的是执行查询的`用户`，这有助于更轻松地调试
    API 调用中出现的意外结果。`SQL 文本`会向您展示在 Snowflake 中执行的确切 SQL 语句，这有助于了解您通过 API 传递的 SQL 是否被
    Snowflake 正确接收。您还可以使用`查询 ID`（如果您从 API 结果中获取了 ID）进行额外过滤，以及查看`通过/失败`状态和执行查询的`用户`。Snowflake
    提供了大约十列，您可以根据需要查看的信息配置显示在屏幕上。


    如果您深入查看任何一个查询活动，您将看到有关该查询的更多详细信息，包括完整的 `SQL 文本`以及 Snowflake 针对该查询返回的结果或响应。`查询概况`选项卡可能是查询历史中最有用的部分，它为您提供了查询的完整执行计划。如果某个查询加载结果时间过长，或者根据您的超时设置即将超时，您可以使用此视图来更好地理解查询的执行情况以及查询的每个功能耗时多久。利用这些详细信息，您可以开始缩小查询中可能受益于优化的元素范围，从而获得更好的整体查询性能。


    ## 复制历史


    复制历史为您提供了 Snowflake 中 `COPY` 命令的详细视图。使用这些信息，您可以查看正在复制到数据库或从数据库复制出的任何数据文件的进度，查看过去的加载记录，并深入了解单个加载请求，以了解更多关于进入您
    Snowflake 实例的数据及其来源。


    ## 任务历史


    如果您正在利用 Snowflake 的 `Tasks` 来运行计划或手动的查询、存储过程或函数，`任务历史`页面会为您分解说明了哪些任务已运行、何时运行、运行状态以及其他重要的元数据。深入查看任何任务将带您进入其`运行历史`页面，在那里您可以查看过去的运行记录、运行结果以及下一次任务计划运行的时间（如果您使用的是计划）。


    ## 动态表


    `动态表`允许您物化指定查询的结果，从而无需创建单独的表来处理转换和数据更新功能。相反，您可以将目标表定义为动态表，并指定执行任何转换的查询语句。动态表会执行刷新过程，以定期更新数据，从而取代完整的
    `insert`、`update` 和 `delete` 查询的需要。


    `动态表`选项卡允许您查看已创建的动态表、其上次刷新时间以及其他有价值的元数据，这些信息可以帮助您调试预期数据未出现在表中的原因。


    ## 使用情况


    `使用情况`屏幕允许您详细了解 Snowflake 的支出情况。您可以使用各种过滤器，按仓库、标签、用户、服务等可视化您的支出情况。市面上有许多付费和免费的支出工具可以利用这些数据，为您提供更深入的洞察和支出优化，例如
    Black Diamond ([`https://blackdiamond360.com`](https://blackdiamond360.com))。


    建议您至少每月使用此页面或各种可用工具之一检查您的支出情况，以了解是否存在异常查询或仓库正在消耗大量积分，从而不必要地增加您组织的开销。随着您对 Snowflake
    SQL API 越来越熟悉并开始更深入地使用它，此页面尤其有助于显示您是否正确优化了您的 API 代码，并帮助识别恶意用户可能正在访问您的 API 并无谓地增加积分消耗的领域。


    ## 仓库


    当您首次设置 Snowflake 实例时，您会在 `仓库`部分花费相当多的时间。Snowflake 仓库是 Snowflake 数据库的一组计算资源。这些资源包括
    CPU、内存分配和临时存储。Snowflake 为仓库使用 `T 恤尺码` 大小调整（`x-small`、`small`、`medium`、`large`
    等），每个大小使用不同的计算方式来确定其运行时消耗的积分数量。除了仓库大小调整，您还可以配置仓库集群。仓库的这一方面会对您的积分消耗产生额外影响。由于其定价模型，根据当前需求配置每个仓库非常重要。仓库可以随时升级或降级，且不影响下游代码，因此请谨慎行事，并明白“少即是多”。


    配置仓库时，您需要考虑查询的复杂性、仓库将返回的平均数据量以及向仓库提交查询的频率。对于需要很长时间返回的复杂查询或大型数据集，您需要增大仓库大小。更大的仓库可以处理更复杂的
    SQL 查询，并比小仓库更快地返回数据。另一方面，对于接收大量并发 SQL 请求（无论大小）的仓库，更大的仓库并无帮助，因为每个仓库的并发限制由每个查询的大小和复杂性决定。在这种情况下，您需要启用仓库集群。这允许您的仓库扩展出额外的节点来处理可能原本会排队等待的查询。


    在为 Black Diamond 使用 Snowflake SQL API 时，我们采用了跨 API 使用单一共享`仓库`的方法。这是因为我们不会将客户数据存储在自己的
    Snowflake 实例中，并且除了少数例外情况，我们收到的并发请求的复杂性和数量都是低风险，可以通过一个中等大小的仓库和最多两个节点的集群来缓解。相反，在您创建账户时，会在您的
    Snowflake 实例中创建一个专用的仓库，Black Diamond 请求发送到您的实例时，应由 Snowflake SQL API 专门使用此仓库。


    我们创建了一些额外的统计信息来提取有关您仓库的详细信息。利用这些详细信息，我们的团队可以手动审查那些遭受应用速度缓慢困扰的账户，并采取手动操作修改 API
    使用的仓库以进一步优化它。此外，工具内的自动化功能可以采取一些有限的自导向操作来缓解性能问题，同时努力保持积分消耗成本较低。


    ## 资源监控器


    如果您选择不为 Snowflake 实例使用第三方工具，`资源监控器`是监控积分消耗的绝佳方式。您可以将资源监控器分配给一个或所有仓库，并为每个仓库指定积分配额。此配额可以设置为按日、周或月触发刷新。此外，您可以提供暂停设置，以防止仓库超过其分配的使用量。当您刚开始使用
    Snowflake SQL API 进行开发时，提供一个带有截止限的低配额很有帮助，可以防止异常代码在无人监管时消耗大量积分，并随着您的应用程序发展和您对
    API 越来越熟悉而逐渐提高该配额。'
- fmt: '## Users & Roles


    We covered `Users & Roles` earlier in this chapter, but this section gives you
    insight into what users are allocated in your system, their last login, and what
    roles they have been granted. You can manage all aspects of a user from the `Users`
    tab, including creating and deleting users. The `Roles` tab allows you to do many
    of the same actions for roles within your organization. In addition, it provides
    a helpful mindmap view of your roles so you can quickly visualize how roles are
    laid out and how inheritance is set up for each role.


    ## Security


    The `Security` section allows you to define `Network Policies` for your organization
    and see what open sessions (users) are currently connected to Snowflake. `Network
    Policies` are a great way to further harden your Snowflake access by providing
    the ability to log in via certain IP addresses or blocking IP addresses that are
    particularly problematic. I recommend that all of your users be required to use
    multi-factor authentication (`MFA`), at a minimum, especially if they are not
    on an intranet or dedicated `IP Address/IP Range` where you can restrict access
    to just those addresses.


    Since supporting multi-factor authentication is not possible through the API,
    it is highly recommended you create a `Policy` for your server’s `IP address(es)`
    and assign it to your API user. In addition to the `public/private key pair` you
    created, this will provide an additional layer of security should your keys become
    compromised.


    ## Billing & Terms


    The `Billing & Terms` section provides you with a full detail of your Snowflake
    contract. It outlines what `Terms of Service` you have accepted and when, who
    your contacts are for billing, your payment methods, and a downloading version
    of all of your usage statements. Note that users who are on a prepaid capacity
    contract with Snowflake, allocating a lump sum of credits to their account, might
    not see a `Payment Method` listed.


    ## Contacts


    The `Contacts` page allows you to set what email(s) will receive notifications
    from Snowflake. Most important are the `Security Notifications`, which I recommend
    be assigned to someone who can regularly review these notifications and take action
    upon them. `Privacy notifications` keep you updated on the latest privacy policy
    changes or privacy concerns issued by Snowflake. In contrast, `product notifications`
    will keep you updated on Snowflake behavior changes, degraded performance, API
    changes, and other proactive notifications.


    ## Accounts


    Largely, you will not spend much time on the `Accounts` page unless you are in
    a large organization with specific data needs, including data localization and
    data governance policies. When you first sign up for Snowflake, a default `account`
    is created, which also acts as the organizational admin account for your Snowflake
    instance. If you find yourself needing additional `accounts`, you can create and
    manage these here.


    One example of a reason you might use `accounts` would be if you service multiple
    customers and want to keep your customers’ accounts segregated by `account` instead
    of databases and roles. This allows your customers to have more control over their
    data and access to their data without risking exposure to other customers you
    might service.


    In another example, suppose you have data that has to stay within certain regions
    for governance reasons. A great use case would be educational data for Australia,
    which the government says cannot leave the confines of the country of Australia.
    You could easily set up a new `account` that lives on an Australian-based server
    and store all of your data specific to Australia there, thus satisfying the needs
    of the government regulation. You could also set up an `account` that takes a
    copy of your data from your main `account` and stores it on a server geographically
    located near a large group of your customers, allowing them to have much faster
    access to their data by not requiring them to have to submit a network request
    that has to travel half-way across the global to retrieve data.


    ## Partner Connect


    `Partner Connect`, similar to the `Marketplace`, allows you to connect directly
    to Snowflake partners who have built tools for Snowflake. One popular tool, DevOps
    for data, is `DataOps.Live`. This tool allows you to use `DataOps` and underlying
    `DBT` functionality to manage `CI/CD` pipelines for your Snowflake instance, giving
    you a truly agile data ingestion, modeling, and transformation process.


    Because these partners have been built specifically for `Partner Connect`, you
    can quickly allow the necessary access to your Snowflake instance directly within
    the `Partner Connect` portal. This ensures you do not have to pass sensitive information
    to a third-party website, such as login details, which could become compromised
    if that system does not employ proper security standards.


    As you leverage the `Snowflake SQL API` to build out your project, you might want
    to keep the `Snowflake Partner Connect` in mind. Not only does it provide a more
    secure way for you to allow your customers to connect your application to their
    Snowflake instance, but it also provides another advertisement channel by allowing
    you to be listed on the `Partner Connect` portal.


    ### Accessing Snowflake SQL API


    In this section, I will help you in getting started with accessing the `Snowflake
    SQL API`. As stated previously, the `Snowflake SQL API` is a `REST API` that you
    can use to access and update data in your Snowflake database. Using the API, you
    can execute standard `SQL` queries and most `DDL` and `DML` statements, as well
    as use the API to access `metadata` about your Snowflake instance from the Snowflake
    database. In this section, we will use `Laravel 10` to show you how to connect
    to the `Snowflake SQL API`. This assumes you already have a base install of `Laravel
    10` up and running on a `server` or your `local host`, and are familiar with `Laravel`
    and `PHP`.'
