  1.  对于使用 Excel 2007 或更高版本的临时查询或链接服务器，您必须首先下载 2007/2010 Office System 驱动程序（即本章开头描述的
  ACE 驱动程序）。

  2.  在步骤 4 中，使用 OLEDB 数据流源，而不是 Excel 源。

  3.  将 `Microsoft.ACE.OLEDB.12` 配置为数据源（提供程序：`Microsoft Office 12.0 Access Database
