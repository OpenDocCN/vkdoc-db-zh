  \ = 1 THEN ' IGNORE_DUP_KEY  = ON, ' ELSE ' IGNORE_DUP_KEY  = OFF, ' END + CASE\
  \ WHEN [allow_page_locks] = 1 THEN ' ALLOW_PAGE_LOCKS  = ON, ' ELSE 'ALLOW_PAGE_LOCKS\
  \  = OFF, ' END + CASE WHEN fill_factor IS NOT NULL THEN ' FILLFACTOR  = ' + CAST(fill_factor\
  \ AS VARCHAR(5)) + ',' ELSE '' END + CASE WHEN [allow_row_locks] = 1 THEN ' ALLOW_ROW_LOCKS\
  \  = ON, ' ELSE ' ALLOW_ROW_LOCKS  = OFF, ' END + CASE WHEN @SORT_IN_TEMPDB = 1\
  \ THEN ' SORT_IN_TEMPDB  = ON, ' ELSE ' SORT_IN_TEMPDB  = OFF, ' END + CASE WHEN\
  \ @DROP_EXISTING = 1 THEN ' DROP_EXISTING  = ON, ' ELSE ' DROP_EXISTING  = OFF,\
  \ ' END + CASE WHEN @ONLINE = 1 THEN ' ONLINE  = ON ' ELSE ' ONLINE  = OFF ' END\
  \ + CASE WHEN @MAX_DEGREE_OF_PARALLELISM = 0 THEN '' ELSE ' MAXDOP = ' + CAST(@MAX_DEGREE_OF_PARALLELISM\
  \ AS NVARCHAR(2)) END + ')' + ' ON [' + DataSpace + ']'\nFROM       #Tmp_IndexData\n\
  WHERE      #Tmp_IndexData.is_primary_key = 0\n           AND #Tmp_IndexData.is_unique_constraint\
  \ = 0\n           AND type_desc = 'NONCLUSTERED'  ;\n\n-- 创建并执行 CREATE 脚本\nDECLARE\
  \ @CreateIndex NVARCHAR(MAX)\nDECLARE  CreateIndex_CUR CURSOR\nFOR SELECT ScriptElement\
  \ FROM #ScriptElements ORDER BY ID\n\nOPEN CreateIndex_CUR\nFETCH NEXT FROM CreateIndex_CUR\
  \ INTO @CreateIndex\nWHILE @@FETCH_STATUS <> −1\nBEGIN\n    EXEC (@CreateIndex)\n\
  \    FETCH NEXT FROM CreateIndex_CUR INTO @CreateIndex\nEND ;\n\nCLOSE CreateIndex_CUR\
  \ ;\nDEALLOCATE CreateIndex_CUR ;\n```\n\n\n"
- "# 处理 XML 索引元数据\n\n## 用于填充元数据表的查询\n\n以下是用于填充 `#Metadata_XMLIndexes` 临时表的查询：\n\n\
  ```sql\nSELECT\n    @SERVER_NAME AS SERVER_NAME,\n    @DATABASE_NAME AS DATABASE_NAME,\n\
  \    SCH.name AS SCHEMA_NAME,\n    TBL.name AS TABLE_NAME,\n    SIX.name AS PrimaryIndexName,\n\
  \    TBL.object_id AS TableID,\n    SIX.index_id AS XMLPrimaryIndexID,\n    XIN.index_id\
  \ AS XMLSecondaryaryIndexID,\n    XIN.name AS INDEX_NAME,\n    XIN.secondary_type_desc\
  \ AS SecondaryTypeDescription,\n    DSP.name AS DataSpace,\n    XIN.allow_page_locks\
  \ AS AllowPageLocks,\n    XIN.allow_row_locks AS AllowRowLocks,\n    XIN.is_padded\
  \ AS IsPadded,\n    0,\n    COL.name\nFROM sys.indexes SIX\nINNER JOIN sys.tables\
  \ TBL ON SIX.object_id = TBL.object_id\nINNER JOIN sys.xml_indexes XIN ON SIX.object_id\
  \ = XIN.object_id\n    AND SIX.index_id = XIN.using_xml_index_id\nINNER JOIN sys.schemas\
  \ SCH ON TBL.schema_id = SCH.schema_id\nINNER JOIN sys.data_spaces DSP ON XIN.data_space_id\
  \ = DSP.data_space_id\nINNER JOIN sys.index_columns SIC ON XIN.index_id = SIC.index_id\n\
  \    AND XIN.object_id = SIC.object_id\nINNER JOIN sys.columns COL ON SIC.object_id\
  \ = COL.object_id\n    AND SIC.column_id = COL.column_id\nWHERE XIN.secondary_type_desc\
  \ IS NULL;\n```\n\n## 执行删除 XML 索引的脚本\n\n执行以下代码以在选定的数据库中 `DROP` XML 索引（`C:\\SQL2012DIRecipes\\\
  CH14\\DropXMLIndexes.Sql`）：\n\n```sql\n-- 删除用于保存脚本元素的表\nIF OBJECT_ID('tempdb..#ScriptElements')\
  \ IS NOT NULL\n    DROP TABLE tempdb..#ScriptElements;\n\nCREATE TABLE #ScriptElements\
  \ (ID INT IDENTITY(1,1), ScriptElement NVARCHAR(MAX))\n\n-- 非聚集索引\nIF OBJECT_ID('tempdb..#Tmp_IndexedFields')\
  \ IS NOT NULL\n    DROP TABLE tempdb..#Tmp_IndexedFields;\n\n-- 二级 XML 索引\nINSERT\
  \ INTO #ScriptElements\nSELECT DISTINCT\n    'DROP INDEX '\n    + INDEX_NAME\n \
  \   + ' ON '\n    + DATABASE_NAME + '.' + SCHEMA_NAME + '.' + TABLE_NAME\nFROM Metadata_XMLIndexes\n\
  WHERE IsPrimaryXMLIndex = 0;\n\n-- 主 XML 索引\nINSERT INTO #ScriptElements\nSELECT\
  \ DISTINCT\n    'DROP INDEX '\n    + PrimaryIndexName\n    + ' ON '\n    + DATABASE_NAME\
  \ + '.' + SCHEMA_NAME + '.' + TABLE_NAME\nFROM Metadata_XMLIndexes\nWHERE IsPrimaryXMLIndex\
  \ = 1;\n\n-- 删除并执行 DROP 脚本\nDECLARE @DropIndex NVARCHAR(MAX)\nDECLARE DropIndex_CUR\
  \ CURSOR\nFOR SELECT ScriptElement FROM #ScriptElements ORDER BY ID\n\nOPEN DropIndex_CUR\n\
  FETCH NEXT FROM DropIndex_CUR INTO @DropIndex\n\nWHILE @@FETCH_STATUS <> -1\nBEGIN\n\
  \    EXEC (@DropIndex)\n    FETCH NEXT FROM DropIndex_CUR INTO @DropIndex\nEND;\n\
  \nCLOSE DropIndex_CUR;\nDEALLOCATE DropIndex_CUR;\n```\n\n## 运行 ETL 并重新创建索引\n\n\
  现在，您可以运行您的 ETL 包，将源数据加载到目标或暂存数据库中。运行以下 T-SQL 在暂存数据库中重新创建 XML 索引（`C:\\SQL2012DIRecipes\\\
  CH14\\CreateXMLIndexes.Sql`）：\n\n```sql\nDECLARE @SORT_IN_TEMPDB BIT = 1\nDECLARE\
  \ @DROP_EXISTING BIT = 0\n\n-- 创建表以保存脚本元素\nIF OBJECT_ID('tempdb..#ScriptElements')\
  \ IS NOT NULL\n    DROP TABLE tempdb..#ScriptElements;\n\nCREATE TABLE #ScriptElements\
  \ (ID INT IDENTITY(1,1), ScriptElement NVARCHAR(MAX))\n\n-- 非聚集索引\nIF OBJECT_ID('tempdb..#Tmp_IndexedFields')\
  \ IS NOT NULL\n    DROP TABLE tempdb..#Tmp_IndexedFields;\n\nINSERT INTO #ScriptElements\n\
  SELECT DISTINCT\n    'CREATE PRIMARY XML INDEX '\n    + PrimaryIndexName\n    +\
  \ ' ON '\n    + DATABASE_NAME + '.' + SCHEMA_NAME + '.' + TABLE_NAME\n    + ' ('\
  \ + XMLColumnName + ') '\n    + ' WITH ('\n    + CASE WHEN is_padded = 1 THEN '\
  \ PAD_INDEX = OFF, ' ELSE ' PAD_INDEX = ON, ' END\n    + CASE WHEN [allow_page_locks]\
  \ = 1 THEN ' ALLOW_PAGE_LOCKS = ON, ' ELSE 'ALLOW_PAGE_LOCKS = OFF, ' END\n    +\
  \ CASE WHEN [allow_row_locks] = 1 THEN ' ALLOW_ROW_LOCKS = ON, ' ELSE ' ALLOW_ROW_LOCKS\
  \ = OFF, ' END\n    + CASE WHEN @SORT_IN_TEMPDB = 1 THEN ' SORT_IN_TEMPDB = ON,\
  \ ' ELSE ' SORT_IN_TEMPDB = OFF, ' END\n    + CASE WHEN @DROP_EXISTING = 1 THEN\
  \ ' DROP_EXISTING = ON, ' ELSE ' DROP_EXISTING = OFF ' END\n    + ')'\nFROM Metadata_XMLIndexes\n\
  WHERE IsPrimaryXMLIndex = 1;\n\n-- 二级 XML 索引\nINSERT INTO #ScriptElements\nSELECT\n\
  \    'CREATE XML INDEX '\n    + INDEX_NAME\n    + ' ON '\n    + DATABASE_NAME +\
  \ '.' + SCHEMA_NAME + '.' + TABLE_NAME\n    + ' (' + XMLColumnName + ') '\n    +\
  \ ' USING XML INDEX '\n    + PrimaryIndexName\n    + ' FOR ' + secondarytypedescription\n\
  \    + ' WITH ('\n    + CASE WHEN is_padded = 1 THEN ' PAD_INDEX = OFF, ' ELSE '\
  \ PAD_INDEX = ON, ' END\n    + CASE WHEN [allow_page_locks] = 1 THEN ' ALLOW_PAGE_LOCKS\
  \ = ON, ' ELSE 'ALLOW_PAGE_LOCKS = OFF, ' END\n    + CASE WHEN [allow_row_locks]\
  \ = 1 THEN ' ALLOW_ROW_LOCKS = ON, ' ELSE ' ALLOW_ROW_LOCKS = OFF, ' END\n    +\
  \ CASE WHEN @SORT_IN_TEMPDB = 1 THEN ' SORT_IN_TEMPDB = ON, ' ELSE ' SORT_IN_TEMPDB\
  \ = OFF, ' END\n    + CASE WHEN @DROP_EXISTING = 1 THEN ' DROP_EXISTING = ON, '\
  \ ELSE ' DROP_EXISTING = OFF ' END\n    + ')'\nFROM Metadata_XMLIndexes\nWHERE IsPrimaryXMLIndex\
  \ = 0\nORDER BY SERVER_NAME, DATABASE_NAME, SCHEMA_NAME, TABLE_NAME;\n\n-- 创建并执行\
  \ CREATE 脚本\nDECLARE @CreateIndex NVARCHAR(MAX)\nDECLARE CreateIndex_CUR CURSOR\n\
  FOR SELECT ScriptElement FROM #ScriptElements ORDER BY ID\n\nOPEN CreateIndex_CUR\n\
  FETCH NEXT FROM CreateIndex_CUR INTO @CreateIndex\n\nWHILE @@FETCH_STATUS <> -1\n\
  BEGIN\n    EXEC (@CreateIndex)\n    FETCH NEXT FROM CreateIndex_CUR INTO @CreateIndex\n\
  END;\n\nCLOSE CreateIndex_CUR;\nDEALLOCATE CreateIndex_CUR;\n```\n\n### 工作原理\n\n\
  这个方法类似于配方 14-3、14-4 和 14-5 的总和，但将整个过程的各个部分整合在了一起。它执行以下操作（并且仅在您已经生成了“核心”索引元数据——特别是主键之后才能工作）：\n\
  \n*   首先，它将 `DROP` 和 `CREATE` XML 索引所需的元数据存储在 `Metadata_XMLIndexes` 表中。\n*   其次，它使用此信息生成并执行\
  \ `DROP` 脚本。\n*   最后，它使用此信息生成并执行 `CREATE` 脚本。\n\n这些脚本可以按照配方 14-2 中演示的方式，在 ETL 过程的适当阶段放置。脚本创建的字段描述见\
  \ 表 14-3。\n\n**表 14-3。用于存储 XML 索引元数据的字段**\n\n| 字段名 | 源表 | 描述 |\n| --- | --- | ---\
  \ |\n| `SERVER_NAME` |  | 从当前环境获取服务器名称。 |\n\n\n\n| | DATABASE_NAME |  | 从当前环境中获取数据库名称。\
  \ | | SCHEMA_NAME | sys.schemas | 架构名称。 | | TABLE_NAME | sys.tables | 表名。 | | PrimaryIndexName\
  \ | sys.indexes | 主键的索引名称。 | | TableID | sys.tables | 系统表中的内部表 ID。 | | INDEX_NAME\
  \ | sys.xml_indexes | 主 XML 索引名称。 | | XMLSecondaryaryIndexID | sys.xml_indexes |\
  \ 辅助 XML 索引的内部 ID。 | | XMLPrimaryIndexID | sys.xml_indexes | 主 XML 索引的内部 ID。 | |\
  \ SecondaryTypeDescription | sys.xml_indexes | 辅助索引的类型。 | | DataSpace | sys.dataspaces\
  \ | 索引存储位置。 | | Allow_Page_Locks | sys.xml_indexes | 是否允许页锁？ | | Allow_Row_Locks\
  \ | sys.xml_indexes | 是否允许行锁？ | | Is_Padded | sys.xml_indexes | 索引是否进行填充？ | | IsPrimaryXMLIndex\
  \ | sys.xml_indexes | 这是否是主 XML 索引。 | | XMLColumnName | sys.xml_indexes | 存储 XML\
  \ 数据的表中的列名。 |\n![image](img/sq.jpg)\n\n**注意** 除非表的主键已首先创建，否则无法重新创建 XML 索引。\n\n##\
  \ 提示、技巧和陷阱\n\n*   用于存储 XML 索引元数据的脚本（包括 `DROP` 和随后的 `CREATE` 索引操作）可以转化为存储过程，并在 SSIS\
  \ 包中的 SSIS 执行 SQL 任务中调用。\n*   如果愿意，可以将 XML 索引元数据存储在单独的数据库或单独的架构中。\n\n## 14-7. 查找缺失的索引\n\
  \n### 问题\n你怀疑目标数据库中缺少索引，并希望推断并创建它们。\n\n### 解决方案\n使用缺失索引动态管理视图 (DMV)。这需要你运行以下 T-SQL\
  \ 代码片段：\n\n```sql\nSELECT     TOP (100) PERCENT\n           sys.objects.name AS\
  \ TableName\n          ,COALESCE(sys.dm_db_missing_index_details.equality_columns\
  \ ,\n                    sys.dm_db_missing_index_details.inequality_columns) AS\
  \ IndexCols\n          ,sys.dm_db_missing_index_details.included_columns\n     \
  \     ,user_seeks\n          ,user_scans\nFROM        sys.dm_db_missing_index_details\n\
  \             INNER JOIN sys.objects\n             ON sys.dm_db_missing_index_details.object_id\
  \ = sys.objects.object_id\n             INNER JOIN sys.dm_db_missing_index_groups\n\
  \             ON sys.dm_db_missing_index_details.index_handle =\n              \
  \  sys.dm_db_missing_index_groups.index_handle\n             INNER JOIN sys.dm_db_missing_index_group_stats\n\
  \             ON sys.dm_db_missing_index_groups.index_group_handle =\n         \
  \       sys.dm_db_missing_index_group_stats.group_handle\nORDER BY    TableName,\
  \ IndexCols ;\n```\n\n### 工作原理\n使用 SQL Server 的缺失索引 DMV 来确定是否存在任何缺失的索引——以及这些索引是否有用。缺失索引\
  \ DMV 不仅能提供可用于编写必要 `CREATE INDEX` 语句的核心列和表信息，还能通过 `user_seeks` 和 `user_scans` 列指示索引被进程使用的次数。仅使用一次的索引可能不值得创建。如果使用了多次，则应认真考虑创建。\n\
  \n我的建议是——假设你是在开发服务器上运行 ETL 过程，且只有你连接——重启 SQL Server 实例，然后从头到尾运行你的 ETL 过程。这样，只有你（开发者）可以决定\
  \ ETL 过程中是否需要使用某个索引。SQL Server 提供了许多工具来建议索引；你可以决定是否应用它们。\n\n我不会在此试图详尽描述索引需求——因为纸质和网络上已有成千上万页的相关出版物，这是不必要的。因此，我希望从\
  \ ETL 角度出发的简要概述就足够了。\n\n如果你希望就特定查询获得 SQL Server 关于缺失索引的意见，那么使用 `STATISTICS XML`\
  \ 选项通常是最快速、最简单的途径。你只需将你的查询包裹在 `SET STATISTICS XML ON` 和 `SET STATISTICS XML OFF`\
  \ 之间，如下所示：\n\n```sql\nSET STATISTICS XML ON\n\nSELECT ...\nFROM ...\nWHERE ...\n\
  \nSET STATISTICS XML OFF\nGO\n```\n\n然后，如果存在潜在的缺失索引，你将在 XML 显示计划的顶部看到一个 XML 片段，其中指示了任何缺失的索引。这读起来并不特别困难；对于每个表，它会指示任何等式、不等式和包含列。你可以在\
  \ `SHOWPLAN` 语句之间“嵌套”一系列 SQL 语句，甚至是存储过程列表，并获得一系列 XML 结果，然后你可以独立分析这些结果。\n\n另一种查看潜在缺失索引——以及创建这些索引的脚本——的方法是，在\
  \ SSMS/SSDT 中显示实际或估计的执行计划。除了执行计划，你还会以一种显眼的绿色看到缺失索引。右键单击缺失索引会提供 `Missing Index Details...`（缺失索引详细信息）选项。点击它可以生成\
  \ `CREATE INDEX` 语句脚本。\n\n你需要知道，如果你同时请求，SSMS/SSDT 不会同时输出执行计划和 XML 显示计划。此外，除了工具栏按钮，你还可以使用“查询/显示估计的执行计划”和“包含实际执行计划”来显示执行计划。归根结底，这与输入\
  \ `SHOWPLAN` 语句的输出相同。\n\n如果你更喜欢一种更稳健的方法来调整查询，你可能更愿意使用数据库引擎优化顾问。它提供了超出你所需的信息，但其中大部分是有用的——例如估计的查询大小。要使用数据库引擎优化顾问，请执行以下步骤。\n\
  \n1.  右键单击并在数据库引擎优化顾问中选择“分析查询”。\n2.  连接到数据库引擎优化顾问。“查询”应在“常规”选项卡中被选中。\n3.  选择你将用于查询的数据库。\n\
  4.  单击工具栏中的“开始分析”。\n5.  在“建议”选项卡中，对于“建议目标”列包含“索引”一词的每条建议，在其“定义”列中右键单击以获取 `CREATE\
  \ INDEX` 脚本。\n\n### 提示、技巧和陷阱\n*   再次记住——你不必使用建议的索引。\n*   由于数据库引擎优化顾问的多个选项在联机丛书和网络上的许多优秀文章中都有详细解释，我在此不再赘述。\n\
  \n## 14-8. 管理 CHECK 约束\n\n### 问题\n你希望在加载数据前删除 CHECK 约束，并在数据加载后重新启用它们。\n\n### 解决方案\n\
  使用 SQL Server 元数据创建所需的 `DROP` 和 `CREATE` 脚本。以下过程收集 CHECK 约束的元数据。然后执行 `DROP` 语句。数据加载后，你可以运行脚本来重新创建\
  \ CHECK 约束。\n\n1.  使用如下 DDL 创建用于保存 CHECK 约束持久化元数据的表 (`C:\\SQL2012DIRecipes\\CH14\\\
  tblMetaData_CheckConstraints.Sql`)：\n\n    ```sql\n    IF OBJECT_ID('dbo.MetaData_CheckConstraints')\
  \ IS NOT NULL\n        DROP TABLE dbo.MetaData_CheckConstraints;\n\n    CREATE TABLE\
  \ CarSales_Staging.dbo.MetaData_CheckConstraints\n    (\n        SCHEMA_NAME NVARCHAR\
  \ (128) NOT NULL,\n        TABLE_NAME NVARCHAR (128) NOT NULL,\n        COLUMN_NAME\
  \ NVARCHAR (128) NOT NULL,\n        CheckConstraintName NVARCHAR (128) NOT NULL,\n\
  \        definition NVARCHAR(max) NULL,\n    ) ;\n    GO\n    ```\n\n2.  使用以下代码片段填充外键约束的元数据表\
  \ (`C:\\SQL2012DIRecipes\\CH14\\CheckConstraintMetadata.Sql`)：\n\n    ```sql\n \
  \   INSERT INTO MetaData_CheckConstraints\n    (\n        SCHEMA_NAME\n        ,TABLE_NAME\n\
  \        ,COLUMN_NAME\n        ,CheckConstraintName\n        ,definition\n    )\n\
  \    SELECT\n        SCH.name AS SCHEMA_NAME\n        ,TBL.name AS TABLE_NAME\n\
  \        ,COL.name\n        ,CHK.name AS CheckConstraintName\n        ,CHK.\n  \
  \  ```\n\n\n\n"
- "# 管理检查约束\n\n## 工作原理\n\n在讨论约束管理时，我并非涵盖所有约束。就 ETL 的目的而言，我建议将主键约束和唯一约束视为索引。尽管如此，你可能希望或需要像处理索引一样删除并重新创建检查约束。因此，这里提供了用于获取约束元数据并生成\
  \ `DROP` 和 `ADD` 脚本的脚本，你可以在暂存过程中使用。\n\n它执行以下操作：\n\n*   首先，它将 `DROP` 和 `ADD` 检查约束所需的元数据存储在表\
  \ `MetaData_CheckConstraints` 中。\n*   其次，它利用这些信息生成并执行 `DROP` 脚本。\n*   最后，它利用这些信息生成并执行\
  \ `ADD` 脚本。\n\n这些脚本可以放置在 ETL 过程中的适当阶段，如示例 14-2 所示。\n\n`check_constraints` 表与（不可避免地）来自\
  \ `sys.tables`、`sys.schemas` 和 `sys.columns` 的数据一起，用于获取元数据。然后，该元数据被塑造成用于管理检查约束的\
  \ `DROP` 和 `CREATE` 脚本。\n\n```sql\ndefinition\nFROM       sys.schemas AS SCH\n \
  \          INNER JOIN sys.tables AS TBL\n           ON SCH.schema_id = TBL.schema_id\n\
  \           INNER JOIN sys.check_constraints CHK\n           ON TBL.object_id =\
  \ CHK.parent_object_id\n           INNER JOIN sys.columns COL\n           ON CHK.parent_object_id\
  \ = COL.object_id\n           AND CHK.parent_column_id = COL.column_id\nWHERE  \
  \    CHK.is_disabled = 0 ;\n```\n\n## 3. 通过运行以下 T-SQL 代码段（`C:\\SQL2012DIRecipes\\\
  CH14\\DropCheckConstraints.Sql`）在目标数据库中删除检查约束：\n\n```sql\n-- 创建 DROP 语句\n-- 删除用于保存脚本元素的表\n\
  IF OBJECT_ID('tempdb..#ScriptElements') IS NOT NULL\nDROP TABLE tempdb..#ScriptElements;\n\
  \nCREATE TABLE #ScriptElements (ID INT IDENTITY(1,1), ScriptElement NVARCHAR(MAX))\n\
  \nINSERT INTO #ScriptElements\nSELECT DISTINCT\n'ALTER TABLE '\n+ SCHEMA_NAME\n\
  + '.'\n+ TABLE_NAME\n+ ' DROP CONSTRAINT '\n+ CheckConstraintName\nFROM       MetaData_CheckConstraints\
  \ ;\n\n-- 执行 DROP 脚本\nDECLARE @DropFK NVARCHAR(MAX)\n\nDECLARE  DropFK_CUR CURSOR\n\
  FOR\nSELECT ScriptElement FROM #ScriptElements ORDER BY ID\n\nOPEN DropFK_CUR\n\
  FETCH NEXT FROM DropFK_CUR INTO @DropFK\nWHILE @@FETCH_STATUS <> −1\nBEGIN\nEXEC\
  \ (@DropFK)\nFETCH NEXT FROM DropFK_CUR INTO @DropFK\nEND ;\n\nCLOSE DropFK_CUR;\n\
  DEALLOCATE DropFK_CUR;\n```\n\n## 4. 执行数据加载过程以更新目标数据库。\n\n## 5. 使用类似以下代码，从持久化的元数据重新创建外键（`C:\\\
  SQL2012DIRecipes\\CH14\\CreateCheckConstraints.Sql`）：\n\n```sql\n-- 删除用于保存脚本元素的表\n\
  IF OBJECT_ID('tempdb..#ScriptElements') IS NOT NULL\nDROP TABLE tempdb..#ScriptElements;\n\
  \nCREATE TABLE #ScriptElements (ID INT IDENTITY(1,1), ScriptElement NVARCHAR(MAX));\n\
  \nINSERT INTO #ScriptElements\nSELECT DISTINCT\n'ALTER TABLE '\n+ SCHEMA_NAME\n\
  + '.'\n+ TABLE_NAME\n+ ' ADD CONSTRAINT '\n+ CheckConstraintName\n+ ' CHECK '\n\
  + [definition]\nFROM MetaData_CheckConstraints ;\n\n-- 执行 CREATE 脚本\nDECLARE @CreateFK\
  \ NVARCHAR(MAX)\n\nDECLARE  CreateFK_CUR CURSOR\nFOR\nSELECT ScriptElement FROM\
  \ #ScriptElements ORDER BY ID\n\nOPEN CreateFK_CUR\nFETCH NEXT FROM CreateFK_CUR\
  \ INTO @CreateFK\nWHILE @@FETCH_STATUS <> −1\nBEGIN\nEXEC (@CreateFK)\nFETCH NEXT\
  \ FROM CreateFK_CUR INTO @CreateFK\nEND ;\n\nCLOSE CreateFK_CUR;\nDEALLOCATE CreateFK_CUR;\n\
  ```\n\n"
- "# 14-9. 管理外键约束\n\n## 问题\n\n你希望在加载数据前删除外键约束，并在数据加载后重新启用它们。\n\n## 解决方案\n\n使用 SQL\
  \ Server 元数据创建所需的 `DROP` 和 `CREATE` 脚本。以下脚本收集并存储外键约束的元数据。然后在数据加载前运行 `DROP` 脚本。加载完成后，重新应用外键约束。\n\
  \n### 1. 使用类似以下 DDL 创建用于保存外键约束持久化元数据的表（`C:\\SQL2012DIRecipes\\CH14\\tblTmp_Metadata_ForeignKeys.Sql`）：\n\
  \n```sql\nIF OBJECT_ID('dbo.Tmp_Metadata_ForeignKeys') IS NOT NULL\nDROP TABLE dbo.Tmp_Metadata_ForeignKeys\n\
  \nCREATE TABLE CarSales_Staging.dbo.Tmp_Metadata_ForeignKeys\n(\n SCHEMA_NAME SYSNAME\
  \ NOT NULL,\n TABLE_NAME SYSNAME NOT NULL,\n FOREIGN_KEY_NAME SYSNAME NOT NULL,\n\
  \ COLUMN_NAME SYSNAME NULL,\n REFERENCED_TABLE_SCHEMA_NAME SYSNAME NOT NULL,\n REFERENCED_TABLE_NAME\
  \ SYSNAME NOT NULL,\n REFERENCED_COLUMN_NAME SYSNAME NULL,\n ColumnList NVARCHAR(300)\
  \ NULL\n);\nGO\n```\n\n### 2. 使用以下代码段填充外键约束的元数据表（`C:\\SQL2012DIRecipes\\CH14\\ForeignKeyMetadata.Sql`）：\n\
  \n```sql\nINSERT INTO Tmp_Metadata_ForeignKeys\nSELECT\nSCH.name AS SCHEMA_NAME\n\
  ,OBJ.name AS TABLE_NAME\n,FRK.name AS FOREIGN_KEY_NAME\n,COL.name AS COLUMN_NAME\n\
  ,RefSCH.name AS REFERENCED_TABLE_SCHEMA_NAME\n,RefTBL.name AS REFERENCED_TABLE_NAME\n\
  ,RefCOL.name AS REFERENCED_COLUMN_NAME\n,CAST(NULL AS NVARCHAR(300)) AS ColumnList\n\
  FROM       sys.foreign_keys FRK\n           INNER JOIN sys.objects OBJ\n       \
  \    ON FRK.parent_object_id = OBJ.object_id\n           AND FRK.schema_id = OBJ.schema_id\n\
  \           INNER JOIN sys.schemas SCH\n           ON OBJ.schema_id = SCH.schema_id\n\
  \           INNER JOIN sys.foreign_key_columns FKC\n           ON FRK.object_id\
  \ = FKC.constraint_object_id\n           AND FRK.parent_object_id = FKC.parent_object_id\n\
  \           INNER JOIN sys.columns COL\n           ON FKC.constraint_column_id =\
  \ COL.column_id\n           AND FKC.parent_object_id = COL.object_id\n         \
  \  INNER JOIN sys.columns AS RefCOL\n           ON FKC.referenced_object_id = RefCOL.object_id\n\
  \           AND FKC.referenced_column_id = RefCOL.column_id\n           INNER JOIN\
  \ sys.objects AS RefTBL\n           ON FKC.referenced_object_id = RefTBL.object_id\n\
  \           INNER JOIN sys.schemas AS RefSCH\n           ON RefTBL.schema_id = RefSCH.schema_id\n\
  WHERE      FRK.is_ms_shipped = 0\n           AND FRK.is_not_trusted = 0 ;\n\n--\
  \ 定义（连接）键列列表\nIF OBJECT_ID('TempDB..#Tmp_IndexedFields') IS NOT NULL\nDROP TABLE\
  \ TempDB..#Tmp_IndexedFields\n\n;\nWITH Core_CTE ( FOREIGN_KEY_NAME, Rank, COLUMN_NAME\
  \ )\n             AS ( SELECT FOREIGN_KEY_NAME,\nROW_NUMBER() OVER( PARTITION BY\
  \ FOREIGN_KEY_NAME ORDER BY\nFOREIGN_KEY_NAME),\nCAST( COLUMN_NAME AS VARCHAR(MAX)\
  \ )\nFROM Tmp_Metadata_ForeignKeys),\n\nRoot_CTE ( FOREIGN_KEY_NAME, Rank, COLUMN_NAME\
  \ )\nAS ( SELECT FOREIGN_KEY_NAME, Rank, COLUMN_NAME\nFROM   Core_CTE\nWHERE  Rank\
  \ = 1 ),\n\nRecursion_CTE ( FOREIGN_KEY_NAME, Rank, COLUMN_NAME )\nAS\n  ( SELECT\
  \ FOREIGN_KEY_NAME, Rank, COLUMN_NAME\n    FROM Root_CTE\n    UNION ALL\n    SELECT\
  \ Core_CTE.FOREIGN_KEY_NAME, Core_CTE.Rank,\n    Recursion_CTE.COLUMN_NAME + ',\
  \ ' + Core_CTE.COLUMN_NAME\n    FROM Core_CTE\n    INNER JOIN Recursion_CTE\n  \
  \  ON Core_CTE.FOREIGN_KEY_NAME = Recursion_CTE.FOREIGN_KEY_NAME\n    AND Core_CTE.Rank\
  \ = Recursion_CTE.Rank + 1\n  )\n```\n\n### 3. 删除目标数据库中的外键\n\n运行以下 T-SQL 代码片段 (`C:\\\
  SQL2012DIRecipes\\CH14\\DropForeignKeys.Sql`) 以删除目标数据库中的外键：\n\n```sql\n-- 创建临时表用于存放脚本元素\n\
  IF OBJECT_ID('tempdb..#ScriptElements') IS NOT NULL\n    DROP TABLE tempdb..#ScriptElements;\n\
  \nCREATE TABLE #ScriptElements (ID INT IDENTITY(1,1), ScriptElement NVARCHAR(MAX));\n\
  \nINSERT INTO #ScriptElements\nSELECT DISTINCT\n    'ALTER TABLE '\n    + SCHEMA_NAME\n\
  \    + '.'\n    + TABLE_NAME\n    + ' ADD CONSTRAINT '\n    + FOREIGN_KEY_NAME\n\
  \    + ' FOREIGN KEY ('\n    + ColumnList\n    + ') REFERENCES '\n    + REFERENCED_TABLE_SCHEMA_NAME\n\
  \    + '.'\n    + REFERENCED_TABLE_NAME\n    + ' ('\n    + ColumnList\n    + ')'\n\
  FROM Tmp_Metadata_ForeignKeys;\n\n-- 执行 DROP 脚本\nDECLARE @DropFK NVARCHAR(MAX);\n\
  DECLARE DropIndex_CUR CURSOR\nFOR\nSELECT ScriptElement FROM #ScriptElements ORDER\
  \ BY ID;\n\nOPEN DropIndex_CUR;\nFETCH NEXT FROM DropIndex_CUR INTO @DropFK;\n\n\
  WHILE @@FETCH_STATUS <> -1\nBEGIN\n    EXEC (@DropFK);\n    FETCH NEXT FROM DropIndex_CUR\
  \ INTO @DropFK;\nEND;\n\nCLOSE DropIndex_CUR;\nDEALLOCATE DropIndex_CUR;\n```\n\n\
  ### 4. 执行数据加载过程以更新目标数据库。\n\n### 5. 使用以下代码，根据持久化的元数据重新创建外键 (`C:\\SQL2012DIRecipes\\\
  CH14\\CreateForeignKeys.Sql`)：\n\n```sql\n-- 创建临时表用于存放脚本元素\nIF OBJECT_ID('tempdb..#ScriptElements')\
  \ IS NOT NULL\n    DROP TABLE tempdb..#ScriptElements;\n\nCREATE TABLE #ScriptElements\
  \ (ID INT IDENTITY(1,1), ScriptElement NVARCHAR(MAX));\n\nINSERT INTO #ScriptElements\n\
  SELECT DISTINCT\n    'ALTER TABLE '\n    + SCHEMA_NAME\n    + '.'\n    + TABLE_NAME\n\
  \    + ' ADD CONSTRAINT '\n    + FOREIGN_KEY_NAME\n    + ' FOREIGN KEY ('\n    +\
  \ ColumnList\n    + ') REFERENCES '\n    + REFERENCED_TABLE_SCHEMA_NAME\n    + '.'\n\
  \    + REFERENCED_TABLE_NAME\n    + ' ('\n    + ColumnList\n    + ')'\nFROM Tmp_Metadata_ForeignKeys;\n\
  \n-- 执行 CREATE 脚本\nDECLARE @CreateFK NVARCHAR(MAX);\nDECLARE DropIndex_CUR CURSOR\n\
  FOR\nSELECT ScriptElement FROM #ScriptElements ORDER BY ID;\n\nOPEN DropIndex_CUR;\n\
  FETCH NEXT FROM DropIndex_CUR INTO @CreateFK;\n\nWHILE @@FETCH_STATUS <> -1\nBEGIN\n\
  \    EXEC (@CreateFK);\n    FETCH NEXT FROM DropIndex_CUR INTO @CreateFK;\nEND;\n\
  \nCLOSE DropIndex_CUR;\nDEALLOCATE DropIndex_CUR;\n```\n\n### 工作原理\n`sys.objects`、`sys.foreign_keys`、`sys.schemas`、`sys.foreign_key_columns`\
  \ 和 `sys.columns` 表被用于获取元数据。这比检查约束所需的元数据稍微复杂一些，但它有效！然后基于此元数据编写 `DROP` 和 `CREATE`\
  \ 脚本。你只需要复制并执行生成的脚本即可。它执行以下操作（与配方 14-8 非常相似）：\n\n*   首先，将删除 (`DROP`) 和添加 (`ADD`)\
  \ 外键所需的元数据存储在 `Tmp_Metadata_ForeignKeys` 表中。\n*   其次，使用此信息生成并执行 `DROP` 脚本。\n*  \
  \ 最后，使用此信息生成并执行 `ADD` 脚本。\n\n这些脚本可以像配方 14-2 中演示的那样，放置在 ETL 过程的适当阶段。\n\n### 提示、技巧和陷阱\n\
  *   在删除约束之前，始终对暂存数据库进行脚本编写并制作备份副本。\n*   在 ETL 过程的各个阶段添加外键约束时，你可以使用约束创建脚本，并使用相关的表名进行筛选，以根据需要创建特定的外键约束。\n\
  *   此脚本假设元数据中不需要引号标识符。如果你的数据库命名约定不是这样，则需要处理引号标识符。\n*   你可能更愿意先测试外键是否工作（使用一段 T-SQL\
  \ 来隔离不符合要求的记录）。\n\n### 14-10. 优化批量加载\n\n#### 问题\n你希望批量加载尽可能快地运行。\n\n#### 解决方案\n\
  确保使用 `BulkLoad` API 执行加载。然后验证在数据加载期间是否仅使用了最小日志记录，以及是否适当地处理了索引和约束。以下是使用 SSIS 的示例。\n\
