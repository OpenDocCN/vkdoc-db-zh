  \ Oracle CDC 服务配置。这将运行 Attunity 的 Oracle 变更数据捕获服务配置 MMC 管理单元。\n4.  单击 操作 ![image](img/arrow.jpg)\
  \ 准备 SQL Server。输入或选择一个 SQL Server 实例，并定义身份验证模式和任何必要的参数。对话框应如 图 12-11 所示。\n\n  \
