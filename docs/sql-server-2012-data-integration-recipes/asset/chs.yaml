  \ 分析数据类型\n\n您现在可以运行 SSIS 包了。\n\n工作原理\n数据剖析不仅意味着查看数据源中包含的值。它能够，而且有时应该，涉及查看数据类型。然后，这可以与您拥有的有关源的任何元数据结合使用，以突出差异，并最终允许您更改目标数据表的数据类型。例如，如果您在某个列中有一系列介于\
  \ 10 和 200 之间的整数，且其类型设置为 `BIGINT`，那么您可能需要考虑更改目标数据库中相关表的列类型，并向数据源的 DBA 提出建议。\n\n\
  让我们明确一点，我们这里做的是根据指定列中当前的数据，说明数据类型应该且可能是什么。我们不是在说根据 SSIS、OLEDB 提供程序、.NET 提供程序或源元数据，数据是什么。再次强调，我们正在运行源数据通过一个过程来分析它，并说明在理想情况下它应该是什么\
  \ SQL Server 数据类型。请记住，对于一个明显不适当的数据类型，可能存在很好的理由，因为负责源的 DBA 可能知道一些关于数据未来发展方向的、您所不知道的事情。反之亦然……\n\
  \n因此，这个 SSIS 脚本试图推断源文件中每个源列最合适的数据类型。它并不完美，但希望是在效率、可靠性和复杂性之间可接受的折衷方案。运行该包将创建一个文本文件（在本例中称为\
  \ `C:\\SQL2012DIRecipes\\CH10\\Output.txt`），其中包含四列：\n*   建议的数据类型\n*   字符字段的最大长度\n\
  *   十进制数据类型的十进制精度\n*   十进制数据类型的十进制小数位数\n\n该脚本定义了五个数组：四个用于保存列的数据类型（`DataType`）、数据长度（`DataLength`）、十进制精度（`DecimalPrecision`）和小数位数（`Scale`），另一个用于保存它将要分配的数据类型。接下来，`ProposedDataType`\
  \ 数组在脚本的预执行阶段初始化为 17 种可能的数据类型。脚本的后执行阶段定义为输出最终分析的文本文件。每个要分析的列都会针对源数据中的每一行传递给 `GetDataType`\
  \ 函数。\n\n然后是脚本的核心——`GetDataType` 函数。它接收每个列的源数据，并尝试推断其数据类型和长度。首先尝试各种整数类型，然后是其他数值类型，然后是日期类型，如果所有其他方法都失败，则使用字符类型。\n\
  \n数据类型按偏好顺序排列，因此具有更广泛定义的类型总是会保留，而不是较窄的数据类型，以确保数据可以成功加载。\n\n提示、技巧和陷阱\n*   列的初始长度是个人偏好问题。它越大，加载失败的机会就越小，但过程会越慢。\n\
  *   此脚本将评估数据源中的所有行。如果这太多，只需在数据源和脚本任务之间插入一个“行采样”任务，编辑它以设置相关的采样行数，然后（使用“采样选定的输出”）连接到脚本任务。\n\
  *   此脚本可以进一步扩展，以使用列名代替数字，并自动限定变量的作用域等——但我将此作为对读者的挑战！\n*   数据类型在 附录 B 中有解释。\n\n10-17.\
  \ 通过分析元数据控制数据流\n问题\n您希望使用分析数据向 ETL 过程添加控制流逻辑。\n\n解决方案\n使用 SSIS 脚本任务分析数据并将源数据输出到\
  \ RAW 文件，如果分析测试允许过程继续，该文件将用于未来的处理。以下步骤说明了如何操作。\n\n1.  创建一个新的 SSIS 包。向源数据添加一个名为 **Invoice_Source**\
  \ 的连接管理器（本例中为 `C:\\SQL2012DIRecipes\\CH10\\Invoice.Txt`）。\n2.  在包级别，添加以下变量：\n![image](img/untable10-3.jpg)\n\
