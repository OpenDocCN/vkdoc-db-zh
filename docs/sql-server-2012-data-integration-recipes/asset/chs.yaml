  \ SQL 任务。将其配置为使用`CarSales_Staging_OLEDB`连接管理器。将其连接到先前创建的任务（**DropXMLIndexes**）。将\
  \ SQL 源类型设置为**直接输入**，并将**SQL 语句**设置为配方 14-4 中给出的代码。\n13. 添加一个名为`Set BulkLogged Recovery`的执行\
