- "# 6-11. 导入 Windows 管理规范数据\n\n## 问题\n\n你想将 Windows 管理规范 (WMI) 数据导入 SQL Server。\n\
  \n## 解决方案\n\n在标准数据流中使用 SSIS WMI 数据读取器任务作为数据源。以下说明如何操作。\n\n1.  创建一个新的 SSIS 包（如果你希望隔离该包，可以在新的\
  \ SSIS 项目中创建）。右键单击“任务”窗格。选择“变量”并添加一个变量（我将其称为 `oWMI`），将其数据类型设置为“对象”。确保其作用域为包级别。\n\
  2.  右键单击“连接管理器”选项卡。选择“新建连接”，然后选择“WMI”，如 图 6-27 所示。\n    ![9781430247913_Fig06-27.jpg](img/9781430247913_Fig06-27.jpg)\n\
  \    图 6-27. 添加 WMI 连接管理器\n3.  单击“添加”。输入连接管理器的名称，输入服务器名称（除非默认的 `localhost` 就是你希望查询的），并选中“使用\
  \ Windows 身份验证”（同样，除非你需要以特定用户身份登录）。此时应该会出现一个类似 图 6-28 的对话框。\n    ![9781430247913_Fig06-28.jpg](img/9781430247913_Fig06-28.jpg)\n\
  \    图 6-28. 配置 WMI 连接管理器\n4.  单击“测试”以测试连接。单击“确定”确认。关闭对话框。\n5.  在“控制流”窗格上添加一个 WMI\
  \ 数据读取器任务。双击进行编辑。\n6.  设置以下选项：\n\n    | 选项                   | 值               \
  \              |\n    | ---------------------- | ------------------------------\
  \ |\n    | `WMIConnection`        | WMI 连接管理器                 |\n    | `WQLQuerySourceType`\
  \   | 直接输入                       |\n    | `OutputType`           | 数据表         \
  \                |\n    | `OverwriteDestination` | 覆盖目标                       |\n\
  \    | `Destinationtype`      | 变量                           |\n    | `Destination`\
  \          | `oWMI`（或你选择的变量名）     |\n\n7.  在 `WQLQuerySource` 中，输入以下代码（`C:\\SQL2012DIRecipes\\\
  CH06\\Wmi.wmi`）：\n\n    ```sql\n    SELECT      EventCode, EventIdentifier, EventType,\
  \ Message, TimeGenerated\n    FROM        Win32_NTLogEvent\n    WHERE       Category\
  \ = 2\n    ```\n\n    此时应该会出现一个类似 图 6-29 的对话框。\n    ![9781430247913_Fig06-29.jpg](img/9781430247913_Fig06-29.jpg)\n\
  \    图 6-29. 配置 WMI 数据读取器任务\n8.  单击“确定”确认创建 WMI 任务。\n9.  在“任务”窗格上添加一个数据流任务，并双击进行编辑。在“数据流”窗格中，向工作区添加一个脚本组件。当“选择脚本组件类型”对话框出现时，单击“源”。\n\
  10. 单击“确定”。双击脚本组件进行编辑。单击“输入和输出”。然后展开 `Output0`。\n11. 单击“输出列”，然后单击“添加列”。\n12. 为列命名（第一个将是\
  \ `EventCode`），并设置其数据类型（本例中为 8 字节无符号整数）。\n13. 对 WQL 查询中存在的每个输出列重复步骤 17 和 18。\n14.\
  \ 此时应该会出现如 图 6-30 所示的对话框。\n    ![9781430247913_Fig06-30.jpg](img/9781430247913_Fig06-30.jpg)\n\
  \    图 6-30. 为 WMI 源调整脚本任务\n15. 单击左侧的“脚本”，然后在“只读变量”中的 `WMIDestination` 处输入你之前使用的变量名——`Destination`。\n\
  16. 单击“编辑脚本”。\n17. 将 `Imports System.Xml` 指令添加到 Imports 区域。\n18. 用以下代码片段替换 `CreateNewOutputRows()`\
  \ 方法（`C:\\SQL2012DIRecipes\\CH06\\Wmi.vb`）：\n\n    ```vbnet\n    Public Overrides\
  \ Sub CreateNewOutputRows()\n        Dim WMIdataTable As System.Data.DataTable\n\
  \        Dim WMIdataRow As System.Data.DataRow\n\n        WMIdataTable = CType(Me.Variables.oWMI,\
  \ Data.DataTable)\n\n        For Each WMIdataRow In WMIdataTable.Rows\n        \
  \    Output0Buffer.AddRow()\n            Output0Buffer.EventIdentifier = CULng(WMIdataRow.Item(\"\
  EventIdentifier\"))\n            Output0Buffer.EventCode = CInt(WMIdataRow.Item(\"\
  EventCode\"))\n            Output0Buffer.EventType = CInt(WMIdataRow.Item(\"EventType\"\
  ))\n            Output0Buffer.Message = WMIdataRow.Item(\"Message\").ToString\n\
  \            Output0Buffer.TimeGenerated = WMIdataRow.Item(\"TimeGenerated\").ToString\n\
  \        Next\n\n        Output0Buffer.SetEndOfRowset()\n    End Sub\n    ```\n\
  19. 关闭脚本编辑器，然后单击“确定”关闭脚本任务。\n20. 在“数据流”窗格中添加一个 OLE DB 目标，将脚本任务连接到它，然后双击进行编辑。\n21.\
  \ 选择或创建一个 OLE DB 连接管理器。选择“表或视图”作为数据访问模式。单击“新建”让 SSIS 定义一个新表。将表名从 `OLE DB Destination`\
  \ 更改为更适合你项目的名称，然后单击“确定”。单击“映射”。确保源和目标映射正确。\n22. 单击“确定”关闭 OLE DB 目标任务。\n\n"
- "# 通过 ODBC 导入数据\n\n## 问题\n\n您需要导入数据，但没有可用的 OLEDB 提供程序来连接到数据源。\n\n## 解决方案\n\n假设已有可用的驱动程序，请创建并使用一个\
  \ ODBC 数据源。\n\n由于 ODBC 并非一个可以完全线性处理的主题，我发现将其使用方式的某些特性看作一系列“迷你配方”会更容易理解，这些配方解释了如何为\
  \ SQL Server 配置和使用 ODBC 驱动程序。我总是假设在使用这些配方之前，您已经为您的特定数据源下载并安装了所需的驱动程序。\n\n## SSIS\
  \ 2012 中的 ODBC\n\nSSIS 2012 让事情变得比之前的版本稍微简单一些，因为您可以直接使用 ODBC 连接管理器，而不必使用 ADO.NET\
  \ 连接。以下解释了如何使用它。\n\n1.  在一个新的或现有的 SSIS 包中，右键单击“解决方案资源管理器”中的“连接管理器”。选择“新建连接管理器”。\n\
  2.  从可用连接管理器列表中选择“ODBC”。该列表应类似于 图 6-31。\n    ![9781430247913_Fig06-31.jpg](img/9781430247913_Fig06-31.jpg)\n\
  \    图 6-31. 添加 ODBC 连接管理器\n3.  单击“添加”。\n4.  单击“新建”。然后您必须从可用的 DSN 中选择一个现有 DSN（如下一个迷你配方所述），或者选择“使用连接字符串”并输入用于无\
  \ DSN 连接的相应 ODBC 连接字符串。\n5.  单击“确定”完成配置。\n\n生成 ODBC 连接字符串的方法在本配方的最后一个迷你配方中描述。\n\n\
  ## 配置 ODBC DSN\n\n配置 ODBC DSN 的标准方法如下：\n\n1.  单击“开始”菜单 ![image](img/arrow.jpg) “控制面板”\
  \ ![image](img/arrow.jpg) “管理工具” ![image](img/arrow.jpg) “数据源 (ODBC)”。您可能需要授予 Windows\
  \ 运行它的权限！\n2.  选择“系统 DSN”。“ODBC 数据源管理器”对话框应类似于 图 6-32。\n    ![9781430247913_Fig06-32.jpg](img/9781430247913_Fig06-32.jpg)\n\
  \    图 6-32. ODBC 数据源管理器\n3.  单击“添加”。从可用的（并且根据定义已安装在您的服务器上的）数据源中选择您想要连接的数据源。您应该会看到“创建新数据源”对话框，如\
  \ 图 6-33 所示。\n    ![9781430247913_Fig06-33.jpg](img/9781430247913_Fig06-33.jpg)\n\
  \    图 6-33. 创建新的 ODBC 数据源\n4.  选择驱动程序并单击“完成”。然后您应该会看到特定于您所选 ODBC 驱动程序的对话框，您现在必须对其进行配置。\n\
  5.  创建或打开一个 SSIS 包。\n6.  添加一个新的连接管理器（如果您愿意，可以在包级别添加——如果您使用的是 SSIS 2012）。\n7.  对于\
  \ SSIS 2012，选择“ODBC 连接管理器”并选择您创建的 DSN。（对于 SSIS 2005 和 2008，选择一个 ADO.NET 连接并使用 ODBC\
  \ 数据提供程序。然后选择您创建的 DSN。）\n\n然后，您可以在 SSIS 数据流过程中使用 ODBC 源，或在 `OPENROWSET` 中使用，或者在链接服务器连接中使用。我无法给出这些例子，因为我正努力保持尽可能通用。因此，您必须查阅特定\
  \ ODBC 驱动程序的文档，以获取如何使用这些连接方法的示例。\n\n## 文件 DSN\n\n您也可以使用 ODBC 管理工具创建文件 DSN。该技术与刚才描述的技术几乎完全相同，只是在选择\
  \ ODBC 驱动程序后，您必须单击“下一步”，输入 DSN 的文件名（并可能选择目标目录），然后单击“完成”。\n\n文件 DSN 只是一个文本文件，可能类似于以下内容（`C:\\\
  SQL2012DIRecipes\\CH06\\File.dsn`）：\n\n```\n[ODBC]\nDRIVER = SQL Server Native Client\
  \ 10.0\nUID = Adam\nDATABASE = CarSales\nWSID = ADAM02\nAPP = Microsoft® Windows®\
  \ Operating System\nTrusted_Connection = Yes\nSERVER = ADAM02\n```\n\n文件 DSN 可被\
  \ SSIS 用于为 ODBC 连接管理器（在 SSIS 2012 中）或通过 ADO.NET 的 ODBC 连接管理器（在 SSIS 2005/2008 中）创建连接字符串，如下所示。\n\
  \n### SSIS 2012 中的文件 DSN\n\n文件 DSN 也可用于配置 SSIS 2012 中 ODBC 连接的连接字符串。\n\n1.  遵循上面“SSIS\
  \ 2012 中的 ODBC”迷你配方中的步骤 1 至 3。\n2.  单击“新建”。\n3.  单击“使用连接字符串”。\n4.  单击“生成”。\n5. \
  \ 浏览到您保存文件 DSN 的目录。\n6.  单击“确定”。\n7.  完成任何需要但未由 DSN 提供的参数。\n8.  再单击两次“确定”。\n\n连接字符串将被添加到对话框中。\n\
  \n### ODBC 与 SSIS 2005/2008\n\n“较旧”版本的 SSIS 要求您将通过 ADO.NET 的 ODBC 用作系统和用户 DSN。\n\
  \n1.  在一个新的或现有的 SSIS 包中，右键单击“连接管理器”选项卡，然后选择“新建 ADO.NET 连接”。\n2.  单击“新建”。\n3.  单击提供程序的弹出列表。您应该看到类似\
  \ 图 6-34 的内容。\n    ![9781430247913_Fig06-34.jpg](img/9781430247913_Fig06-34.jpg)\n\
  \    图 6-34. .NET 数据提供程序\n4.  选择 ODBC 数据提供程序。\n5.  单击“确定”。\n6.  确保选中“使用用户或系统数据源名称”单选按钮。展开\
  \ DSN 列表时，从可用的 DSN 中选择一个现有 DSN。您应该看到一个类似 图 6-35 的对话框。\n    ![9781430247913_Fig06-35.jpg](img/9781430247913_Fig06-35.jpg)\n\
  \    图 6-35. 选择 DSN\n7.  如果需要，输入用户名和密码。\n8.  单击“确定”。\n\n## 工作原理\n\n每台 Windows PC\
  \ 或服务器都包含大量的管理数据，可以查询其中包含的信息。WMI（Windows Management Instrumentation）本身就是一个庞大的主题，它可以帮助管理\
  \ Windows 计算机以及许多在 Windows 下运行的应用程序（首先是 IIS 和 SQL Server）。这里我想展示如何使用 WMI 收集数据并将其放入\
  \ SQL Server 表中进行分析。\n\n此过程使用 SSIS，但您需要配置 SSIS WMI 任务，将输出数据发送到 ADO 记录集。然后，这成为在数据流任务中使用的数据源，通过脚本组件访问。\n\
  \n为了使 WMI 部分简单，我们查询了 Windows 事件日志以查找特定类别的事件和关联的消息。当然，使用 WMI 您可以做的远不止于此；但这个主题非常庞大——因此，一本关于\
  \ WMI 查询的好参考书，或者在网上浏览一番，应该能帮助您了解 WMI 如何为您提供帮助。\n\n对于 WMI，源到目标映射有点繁琐。因此，您必须准备好记下您使用的源列，因为您必须将它们定义为脚本任务输出列，以及脚本代码中的\
  \ `outputbuffer`，就像在此脚本任务中完成的那样。\n\n#### 提示、技巧与陷阱\n\n*   您需要牢固掌握列类型，因为您必须将所有 `DataRow.Item`\
  \ 转换为所需的输出类型。这可能涉及一些试错！当然，您可以选择简单的方法，将它们全部定义为大型 `VARCHAR` 类型——至少在开始时可以这样。\n*   在您熟悉\
  \ WMI（和 WQL）之前，您可能会发现先创建一个简单的 WMI 任务（使用文本文件目标）更快，这允许您查看 WQL 查询的结果并调整它以获得您想要的内容（同时更好地了解所需的数据类型）。\n\
  \n\n"
- '# SSIS 2005/2008 中的文件 DSN


  `文件 DSN`也可用于配置`SSIS ODBC`连接管理器。但值得注意的是，文件`DSN`中的配置信息仅被用作来源，并不会与该文件保持链接，因为所有配置信息都存储在`SSIS`中。


  1.  按照“`SSIS 2005/2008`中的`ODBC`”迷你指南中的步骤 1 至 5 操作。

  2.  确保选中`使用连接字符串`单选按钮。点击`构建`。

  3.  浏览到您创建——或被提供的文件`DSN`。

  4.  选择文件`DSN`后，点击`确定`。

  5.  提供任何所需的安全/登录信息。对话框应类似于图 6-31。

  6.  测试连接。点击`确定`。


  '
- "# “无 DSN”的 ODBC 连接\n\n您可以使`SSIS`使用`ODBC`驱动程序，而无需现有的`DSN`。这适用于所有版本的`SSIS`。无论如何，它都会在磁盘上创建一个`.dsn`文件。\n\
  \n1.  使用前述关于文件`DSN`的指南，显示如图 6-36 所示的连接管理器对话框。\n\n    ![9781430247913_Fig06-36.jpg](img/9781430247913_Fig06-36.jpg)\n\
  \    图 6-36. `ODBC`连接管理器对话框\n\n2.  确保选中`使用连接字符串`单选按钮。点击`构建`。\n3.  点击`新建`。选择与您希望使用的数据源对应的`ODBC`驱动程序。\n\
  4.  点击`下一步`。\n5.  保存`文件 DSN`。您可以决定文件名和目录——但`.dsn`扩展名会自动添加。\n6.  点击`下一步`。\n7.  点击`完成`。\n\
  8.  配置`ODBC`驱动程序。\n9.  点击`确定`。\n\n"
- '# 导出与导入系统和用户 DSN


  系统和用户`DSN`存储在注册表中。虽然这使得它们易于使用`ODBC 管理工具`进行调整，但也使得部署变得稍微复杂一些。


  有一个特定的注册表项：—`HKEY_LOCAL_MACHINE\SOFTWARE\ODBC\ODBC.INI`—其中包含了您机器上定义的系统`DSN`源的完整列表。您可以使用`regedit`（或类似实用程序）导出注册表项，然后根据需要复制。这避免了手动重新生成`DSN`。操作如下：


  1.  打开注册表编辑器。

  2.  导航到`ODBC`文件夹（位于`HKEY_LOCAL_MACHINE` > `SOFTWARE`下）。

  3.  以合适的名称导出一个`.reg`文件。

  4.  使用`regedit.exe`——或通过双击`.reg`文件，将该`.reg`文件导入到目标服务器的注册表中。

  5.  重启目标服务器。


  用户`DSN`位于`HKEY_CURRENT_USER\Software\ODBC\ODBC.INI`中。


  假设您已经创建了一个系统或用户`DSN`，那么值得研究一下`SSIS`如何使用它们。


  ![image](img/sq.jpg) **注意** 使用注册表编辑器时要极其小心，确保不会对注册表进行任何不必要或危险的更改。


  '
- '# 工作原理


  好吧，最终，您尝试了所有其他方法，并得出结论：`ODBC`是唯一剩余的解决方案。是的，它可能很慢（至少通过`ADO.NET`提供程序运行时），而且对某些数据类型可能很笨拙，但归根结底，这可能是唯一的出路。有趣的是，微软已表明`ODBC`是未来，因此这种连接被降级为“局外人”地位的时代显然已经过去。


  由于特定的`ODBC`连接（如用于`MySQL`和其他关系型数据源）在其他地方有详细描述，本指南是对如何创建和使用`ODBC`连接管理器的一个简明通用概述。由于每个`ODBC`驱动程序都有其特定的配置选项，您必须了解如何设置每一个；因此请准备好深入研究源文档和您能找到的任何其他有用参考资料。这意味着出于必要，我在解释`ODBC`驱动程序的配置技术时必须保持非常通用。


  我想大多数时候您会使用`ODBC 管理工具`创建`DSN`。


  在 32 位或 64 位系统上，该工具位于`%SystemRoot%\system32\odbcad32.exe`。诚然，这是一个令人惊讶的命名约定。如果您在
  64 位机器上需要 32 位版本，则需要查找`%SystemRoot%\Windows\SysWOW64\odbcad32.exe`。


  我倾向于创建系统`DSN`而不是用户`DSN`。原因如下：


  *   因为它们不特定于运行该进程的用户，所以减少了一个潜在的故障源。

  *   可能更重要的是，因为用户`DSN`没有注册表重定向，并且`ODBC 管理工具`同时显示 32 位和 64 位`DSN`，您最终可能尝试使用一个在您所用环境中无法工作的`DSN`。


  同样值得注意的是，在 64 位服务器上从控制面板运行`odbcad32.exe`将会运行 64 位版本的`ODBC`连接管理器。


  #### 提示、技巧与陷阱


  *   如果您在`SSIS`中创建基于连接字符串的`DSN`，`ODBC 管理工具`无论如何都会在磁盘上创建一个`.dsn`文件。如果您不想将其存储在磁盘上，必须手动删除此文件。

  *   `ODBC 管理工具`显示 32 位和 64 位驱动程序的用户`DSN`。然而，这并不意味着 64 位应用程序会使用 32 位驱动程序，因为用户`DSN`没有注册表重定向。

  *   系统`DSN`提供重定向。因此，32 位驱动程序和 64 位驱动程序的系统`DSN`是分开保存的。64 位`ODBC 管理工具`不显示由 32 位`ODBC
  管理工具`创建的系统`DSN`。同样，32 位`ODBC 管理工具`也不显示由 64 位`ODBC 管理工具`创建的系统`DSN`。

  *   因此，在 64 位系统上，建议您尽可能同时安装 32 位和 64 位版本的驱动程序。

  *   在`SSIS 2005`和`2008`中，不要尝试通过在连接管理器窗格中右键单击，然后选择`新建连接`，再选择`ODBC`来设置`ODBC`连接管理器。这将不起作用，因为它不是“托管”连接！


  '
- "# 6-13. 从 64 位 SQL Server 链接到 32 位数据源\n\n## 问题\n\n您正在 64 位环境中工作，需要实现一个链接服务器，以访问只有\
  \ 32 位提供程序可用的数据。\n\n## 解决方案\n\n安装第二个 32 位`SQL Server`实例，并设置一个（32 位）链接服务器连接到您的源数据。然后，您可以将\
  \ 64 位版本的`SQL Server`链接到此实例。虽然执行起来很痛苦且加载数据缓慢，但以下是操作方法（此处使用`Access`作为示例 32 位数据源）。\n\
  \n1.  安装第二个 32 位`SQL Server`实例。\n2.  将两台服务器都配置为允许即席分布式查询。这在指南 1-4 中有描述。\n3.  在 32\
  \ 位`SQL Server`实例上选择——或者最好创建——一个数据库，用于将来自链接的`Access`数据库的查询路由到 64 位实例。我将该数据库命名为`CarSales32`。\n\
  4.  在 32 位`SQL Server`实例上，创建一个链接服务器以连接到`Access`数据库。以下代码片段可以完成此操作。当然，在这里您需要配置您正在使用的源数据作为链接服务器：\n\
  \    ```sql\n    EXECUTE master.dbo.sp_addlinkedserver @server = N'Access', @srvproduct\
  \ = N'Access', @provider = N'Microsoft.Jet.OLEDB.4.0', @datasrc = C:\\SQL2012DIRecipes\\\
  CH01\\CarSales.mdb';\n    ```\n5.  在 32 位`SQL Server`实例上，在您步骤 3 中创建的数据库中，创建一个视图来查询源数据数据库。可以很简单，如下所示（`C:\\\
  SQL2012DIRecipes\\CH01\\vw_SQL32.Sql`）：\n    ```sql\n    CREATE VIEW vw_SQL32 \n\
  \     AS \n     SELECT theText from Access. . .Client; \n     GO\n    ```\n6.  在`SQL\
  \ Server` 64 位实例上，创建一个链接服务器连接到 32 位`SQL Server`实例。\n    ```sql\n    EXECUTE master.dbo.\n\
  \    ```\n\n\n\n"
- "# 从 SQL Server 导出数据\n\n将数据导入 SQL Server 可能是开发者或 DBA 面临的一项重大挑战。然而，数据需要向相反方向移动——从\
  \ SQL Server 导出到另一个程序或系统——的情况也时常发生。数据集成的这个方面同样有其技巧（你需要了解）和陷阱（你需要知道如何避免）。本章将探讨一些将数据从\
  \ SQL Server 发送到其他环境的主要方法。幸运的是，与导入数据相比，从 SQL Server 导出数据时你有两个主要优势：\n\n*   你完全了解并能控制数据及其结构。\n\
  *   你可以使用你非常熟悉的核心语言（`T-SQL`）来处理数据在目标系统中的转换方式。\n\n事实上，本章中用于导出数据的许多技术与你在前面章节中已经看到的技术相似。\n\
  \n因此，我们只需要一章来探讨导出数据的方式：\n\n*   作为文本（分隔符和固定宽度）文件。\n*   作为 `XML` 文件。\n*   导出到 `Access`\
  \ 和 `Excel`。\n*   作为 SQL Server 原生 `BCP` 文件。\n*   导出到其他 SQL Server 数据库。\n*   导出到其他\
  \ SQL 数据库。\n\n还有许多其他导出目的地我不会涉及，即使它们在其他章节中被讨论为可能的数据源。这是因为显然不可能描述每一种情况，而且我认为有些数据源要么属于“遗留”类别，要么属于“极其罕见”类别，它们不太可能被要求作为数据输出目的地。\n\
  \n如果你从本书的配套网站下载了示例文件，你会在 `C:\\SQL2012DIRecipes\\CH07` 中找到它们。\n\n## 7-1. 以多种格式偶尔导出数据\n\
  \n### 问题\n\n你希望不时地将 SQL Server 数据导出为众多可用格式中的一种——可能是为了满足一个意外的请求。\n\n### 解决方案\n\n\
  使用导入/导出向导，并选择其众多目标格式之一来输出数据。\n\n由于 SQL Server 导入/导出向导可以导出多种格式的数据，我将在这里向你展示如何将数据导出到另一个\
  \ SQL Server 数据库，并在本方法的末尾对其他可能的目标地给出说明。请按照以下步骤操作：\n\n1.  在 `SSMS` 中，右键单击要从中导出数据的数据库（本例中为\
  \ `CarSales`），选择 **任务** → **导出数据**。如果显示欢迎窗格，请单击下一步。\n2.  在“选择数据源”窗格中，检查源数据库（`CarSales`）和身份验证模式/凭据是否正确。单击下一步。\n\
  3.  在“选择目标”窗格中，选择所需的目标。在“目标”下拉列表中，你会看到所有已安装驱动程序的列表。如果你在这里看不到所需的目标，则需要停止该过程并安装所需的驱动程序。在本例中，选择\
  \ `SQL Server Native Client 11.0`。输入所需的身份验证信息，然后是目标数据库。对话框应类似于图 7-1。\n    ![9781430247913_Fig07-01.jpg](img/9781430247913_Fig07-01.jpg)\n\
  \    *图 7-1. SQL Server 导入/导出向导*\n4.  单击下一步。\n5.  在“指定表复制或查询”窗格中，选择是选择多个表或视图（通过单击“复制一个或多个表或视图中的数据”），还是导出由即席查询或存储过程生成的单个表（“编写查询以指定要传输的数据”）。在本例中，选择“复制一个或多个表或视图中的数据”，然后单击下一步。\n\
  6.  在“选择源表和视图”窗格中，选择所有要导出的表和视图，然后单击下一步。\n7.  在“审查数据类型映射”窗格中，审查所有数据类型映射。你需要通过单击对话框上部的表名来检查每个表，然后在对话框下部检查（并可能更改）数据类型映射。幸运的是，向导会使用黄色三角形提醒你注意可能的异常情况，如图\
  \ 7-2 所示。\n    ![9781430247913_Fig07-02.jpg](img/9781430247913_Fig07-02.jpg)\n \
  \   *图 7-2. SQL Server 导入/导出向导中的数据类型映射*\n8.  一旦你对此感到满意，单击下一步。\n9.  在“保存并运行包”窗格中，选择是否将导出过程保存为\
  \ `SSIS` 包——如果保存，保存在哪里。然后单击下一步。\n10. 你现在有最后机会审查所有选项。假设一切似乎都正确无误，单击完成。\n\n如果一切顺利，数据将被导出。\n\
  \n## 原理\n\n那么，如果你在 64 位环境中工作，并且需要在只有 32 位驱动程序（`OLEDB` 或 `ODBC`）存在时实现一个 32 位链接服务器，你能做什么？这里描述的方法是一个可能的变通方案，尽管需要很多的初始工作。\n\
  \n你所做的是：\n\n*   安装第二个 32 位 SQL Server 实例。\n*   将源数据链接到这个 32 位 SQL Server 实例。\n*\
  \   将这第二个实例链接到你的 64 位实例。\n\n我同意，为了实现本应简单的事情需要付出很多努力；但在某些情况下，你可能会发现别无选择。\n\n## 提示、技巧和陷阱\n\
  \n*   你也可以用这种方式在 64 位环境中链接到 32 位 `Excel`。\n*   我假设你对两台服务器都拥有完全的管理员权限。如果情况并非如此，你必须相应地映射本地和远程登录。\n\
  *   视图并不是从源返回数据的唯一方式；你也可以使用 `OPENROWSET`。\n*   对于 `ODBC` 源，你可能需要定义一个 `DSN` 并使用 `MSDASQL`\
  \ 作为 `OLEDB` 提供程序。\n\n![image](img/sq.jpg) `注意` 如果你设置第二个 SQL Server 实例，你将必须遵守任何许可要求。请记住，SQL\
  \ Server Express 可以处理最大 10 GB 的数据库，并且可以使用 1 GB 内存——因此它可以是解决此类问题的一种方案。\n\n#### 总结\n\
  \n在本章中，你已经看到一些你可能较少遇到的数据源。然而，仅仅因为一种数据格式较旧——想想 `dBase` 或 `Visual FoxPro`——并不意味着有一天你不需要将其包含的信息加载到\
  \ SQL Server 中。\n\n在稍微不同的层面上，从 SQL Server 将数据加载到 `SSAS` 并不意味着你不希望 Analysis Services\
  \ 允许你将数据从多维数据集返回到关系表中；因此，我们也看到了如何做到这一点。如果你使用 Microsoft `RDBMS` 作为文件的存储库，你已经看到了如何将文件——单独地或批量地——加载到数据表中。当然，你也发现了如何使用\
  \ Web 服务作为数据源。\n\n此外，还有无数具有 `ODBC` 驱动程序的数据源，你必须使用它们来访问其包含的数据。每一个都不同，但本章试图向你展示如何在\
  \ SQL Server 2012 中使用 `ODBC`，为你提供通往许多其他数据存储库的门户。\n\n总而言之，本章带你游览了数据集成的远方海岸。所使用的技术可能较少被采用，但在面对涉及一个较不传统数据源的\
  \ `ETL` 挑战时，它们可能至关重要。\n\n\n## 工作原理\n\n要将数据快速、简单地导出为多种经典格式，很少有方法能比**导出向导**更简单。只需点击几下，您就可以将\
  \ SQL Server 表或视图导出到：\n- 平面文件（固定宽度和分隔符）。\n- Excel。\n- Access。\n- SQL Server。\n-\
  \ 其他关系型数据库。\n\n实际上，您可以将 SQL Server 数据导出到任何已正确安装 OLEDB 或.NET 提供程序的数据目标。导出时，您可以选择：\n\
  - 多个表或视图。\n- 单个即席 SQL 查询。\n- 创建（并为新目标表或文件定义数据类型）。\n- 将数据添加到现有目标。\n- 替换现有目标中的数据。\n\
  - 将导出定义另存为 SSIS 包。\n\n导出向导的具体功能很大程度上取决于导出格式。为了让您有个概念，表 7-1 简要概述了各种可能性。在所有情况下，只有在创建新目标对象（平面文件、Excel\
  \ 工作表或关系数据库表）时，才能定义目标数据类型，而无法修改现有对象。\n\n表 7-1. 导入/导出向导选项\n\n![image](img/Table7-1.jpg)\n\
  \n导出向导的主要限制在于，它仅用于“原样”导出 SQL Server 数据库中的数据。也就是说，您无法执行以下操作：\n- 数据转换\n- 数据流逻辑\n-\
  \ 聚合\n- 日志记录\n\n导出向导也可以作为一个“SSIS 包生成器”，为您创建初始包，这非常有用。然后您可以在 SSIS 中随心所欲地进一步扩展它们，添加所需的任何过程控制逻辑和其他更复杂的数据流元素。此外，值得注意的是，包含聚合和数据转换的复杂数据源可以准备为视图、脚本或存储过程，用作数据源。\n\
  \n除了列出的数据目标，我将不再探讨其他目标，因为我的经验告诉我，这已经涵盖了相当一部分简单的数据导出需求。毕竟，这就是向导的设计目的！\n\n本方法仅展示了导出向导提供的众多可能性中的一种路径——将数据从一个或多个表复制到源服务器上已配置了适当驱动程序的任何目标。虽然展示每一种组合是一项艰巨的任务（而且完全多余），但导出过程确实存在一些变体。成功导出的前提条件如下：\n\
  - 必须为希望导出数据的目标安装所有 OLEDB 和.NET 驱动程序。\n- 您需要用户账户对所有希望导出数据的目标文件、文件夹和数据库拥有相关权限。\n\n\
  ## 关于导出向导主题的一些变体\n\n现在介绍本方法所阐述主题的一些变体。本章我能做的唯一基本假设是数据源将是 SQL Server。在导出向导的后续步骤中，您可以从许多其他选项中选择。这些包括：\n\
  - 目标的选择。\n- 源数据的选择——包括对象选择和源数据的子集筛选。\n- 导出过程中的数据转换和列映射。\n\n虽然我不想试图涵盖所有可用选项，但接下来是您在使用此实用程序导出数据时可能会用到的一些核心元素。\n\
  \n### SQL 语句\n\n如果您在第 4 步选择了“编写查询以指定要传输的数据”，您将在“提供源查询”窗格中获得键入或从文件插入 SQL 查询的选项。这里值得注意的是：\n\
  - 如果您使用存储过程导出数据，请在“SQL 语句”窗格中输入 `EXECUTE ProcName`。\n- 如果您的数据源是存储过程或复杂查询，则无法从会话范围内的临时表返回数据。不过，在许多情况下，您可以使用公共表表达式（CTE）来规避此限制。\n\
  - 单击“浏览”按钮允许您选择源 SQL 脚本文件。\n- 此路径仅允许导出单个数据集。\n\n### 平面文件\n\n如果您选择了平面文件目标，则必须在“选择目标”窗格中决定以下选项：\n\
  - 文件名和路径\n- Unicode 或代码页\n- 分隔符、固定宽度或右端不齐\n- 文本限定符\n- 是否希望第一行包含列名\n\n在“配置平面文件目标”窗格中，您可以选择行和列分隔符——以及源表或视图。\n\
  \n### Excel\n\n导出到 Excel 时，有几点值得注意：\n- 导出向导可以为您创建 Excel 文件。它也可以使用现有的文件和工作表。\n- 对于\
  \ Excel 2007 或更高版本，您必须使用 ACE 驱动程序，在 64 位系统中则使用 64 位 ACE 驱动程序。\n\n### Access\n\n\
  将数据导出到 Access 时，有几个有趣的要点：\n- 导出向导不会创建 Access 数据库——您必须先创建它。\n- 对于 Access 2007 或更高版本，使用\
  \ ACE 驱动程序，在 64 位系统中则使用 64 位 ACE 驱动程序。\n\n### 关系型数据库\n\n对于所有关系型数据库导出（包括 SQL Server），您需要以下条件：\n\
  - 如果需要客户端软件，则 SQL Server 上已正确设置客户端软件（例如 Oracle）。\n- SQL Server 上已正确安装所有必需的提供程序（OLEDB\
  \ 或 ODBC）。\n- 对目标服务器和数据库具有写入权限，如果要创建目标表，则还需要 DDL 权限。\n\n### 列映射\n\n当您选择源表和视图时，可以为每个表选择列映射。这使您可以通过以下方式微调输出：\n\
  - 指定哪一列是目标（针对现有目标表）。\n- 更改列名和数据类型/大小（创建新表时）。\n- 决定是否删除并重新创建目标表。\n- 在目标表中追加或替换数据。\n\
  - 允许`IDENTITY`插入（针对 SQL Server 目标）。\n\n所有这些操作都在“列映射”对话框中完成（参见图 7-3），该对话框在您单击“编辑映射”时出现。\n\
  \n![9781430247913_Fig07-03.jpg](img/9781430247913_Fig07-03.jpg)\n\n图 7-3. 列映射\n\n\
  此外，如果您单击“编辑 SQL”按钮，导出向导将返回它将在目标服务器上使用的`CREATE TABLE`语句。您可以根据需要编辑此语句（参见图 7-4）。\n\n\
  ![9781430247913_Fig07-04.jpg](img/9781430247913_Fig07-04.jpg)\n\n图 7-4. SQL Server\
  \ 导入/导出向导中的创建表 DDL\n\n## 提示、技巧和陷阱\n\n- 将使用导出向导完成的工作保存为 SSIS 包时，您可以选择像保存任何其他 SSIS\
  \ 包一样保存该 SSIS 包——即保存到 SQL Server 或作为文件保存。\n- 如果您导出多个表，实际的导出过程会将它们分组为每四个表一组。如果您的系统有额外的可用处理器且数据集很大，您可能会发现保存包并对其进行调整以并行运行超过四个导出会更高效。\n\
  - 还有几种其他方法可以运行数据导出向导。这些包括：\n    - 在“开始”菜单上，选择“所有程序”，然后选择“Microsoft SQL Server 2012”，接着选择“导入和导出数据”。\n\
  \    - 在 SQL Server 数据工具（SSDT——如果您使用的是旧版 SQL Server，则为 Business Intelligence Development\
  \ Studio）中，右键单击“SSIS 包”文件夹，然后选择“SSIS 导入和导出向导”。\n\n"
- "# 7-2\\. 将数据导出为分隔文本文件\n\n## 问题 (Problem)\n\n你需要将数据导出为分隔文本文件，并且需要了解平面文件输出的各种细节。\n\
  \n## 解决方案 (Solution)\n\n使用 SQL Server Integration Services (SSIS) 和平面文件目标 (Flat\
  \ File destination) 将数据从表、视图或查询发送到文本文件。\n\n以下步骤说明如何从 SQL Server 表导出分隔文本文件：\n\n1.\
  \  创建一个新的 SSIS 包，并添加一个名为 `CarSales` 的 OLEDB 连接管理器，该管理器连接到你的源数据库（本例中为 `CarSales`）。\n\
  2.  添加一个数据流任务 (Data Flow task)。双击进行编辑。\n3.  添加一个 OLEDB 源 (OLEDB source)，并按如下配置：\n\
  \    *   连接管理器 (Connection Manager): `CarSales`\n    *   数据访问模式 (Data Access Mode):\
  \ `SQL Text`\n    *   SQL 命令文本 (SQL Command Text):\n        ```sql\n        SELECT\
  \  ID, ClientName, Country, Town, County, Address1,\n                Address2, ClientType,\
  \ ClientSize\n        FROM    dbo.Client\n        ```\n4.  确认你的修改。\n5.  向数据流窗格 (Data\
  \ Flow pane) 添加一个平面文件目标 (Flat File destination)，并将 OLEDB 源连接到它。双击进行编辑。点击“新建”(New)\
  \ 创建一个新的平面文件连接管理器 (Flat File connection manager)。在“平面文件格式”(Flat File Format) 对话框中选择“分隔符”(Delimited)，然后点击“确定”(OK)，如图\
  \ 7-5 所示。\n\n    ![9781430247913_Fig07-05.jpg](img/9781430247913_Fig07-05.jpg)\n\
  \n    **图 7-5** 选择平面文件导出格式\n\n6.  按如下配置平面文件连接管理器编辑器 (Flat File Connection Manager\
  \ Editor)（假设你使用本书的示例——否则，请使用你自己的文件路径）：\n    | 选项 | 值 |\n    |---|---|\n    | 名称\
  \ (Name) | `Delimited_Unicode` |\n    | 文件名 (File Name) | `C:\\SQL2012DIRecipes\\\
  CH07\\ClientsDelimited.txt` |\n    | Unicode | 已勾选 (Ticked) |\n    | 列名位于首行数据中 (Column\
  \ Names in First Data Row) | 已勾选 (Ticked) |\n    | 文本限定符 (Text Qualifier) | `<none>`\
  \ |\n    | 要跳过的标题行数 (Header rows to skip) | `0` |\n    | 标题行分隔符 (Header Row delimiter)\
  \ | `<CR><LF>` |\n\n    对话框应如图 7-6 所示。\n\n    ![9781430247913_Fig07-06.jpg](img/9781430247913_Fig07-06.jpg)\n\
  \n    **图 7-6** 将平面文件连接管理器设置为导出到分隔平面文件\n\n7.  点击“确定”(OK) 确认更改。\n8.  点击“映射”(Mappings)\
  \ 并确保所有输出列都映射到了源列。\n\n操作到此就相当简单地完成了。你现在可以导出数据了。\n\n## 工作原理 (How It Works)\n\n根据我的经验，可能最常用的导出类型是文本文件。这很可能是因为大多数数据库或电子表格程序都能接受外部的分隔文本文件。显而易见，文本文件将具有表\
  \ 7-2 所示的特征。\n\n**表 7-2** 文本文件特征\n\n| 选项 | 定义 |\n|---|---|\n| 字符类型 (Character type)\
  \ | ASCII 或 Unicode。对于 ASCII 导出，可以定义代码页。 |\n| 列分隔符 (Column separator) | 由用户选择。默认为逗号\
  \ (,)。 |\n| 行分隔符 (Row Delimiter) | 由用户选择。默认为回车符 + 换行符 (CR/LF)。 |\n| 文本限定符 (Text\
  \ Qualifier) | 可选。可以为每个列定义。 |\n\n你可以选择将数据添加到现有的文本文件，或者删除现有文件的内容。要替换文件内容，请在“平面文件目标编辑器”(Flat\
  \ File Destination Editor) 中勾选“覆盖文件中的数据”(Overwrite data in the file)。值得注意的是，你可以在创建平面文件目标并将其连接到\
  \ OLEDB 源之前创建平面文件连接管理器，但这不会自动为你生成目标列结构。这意味着你必须手动创建所有列，这至少可以说是费力的。\n\n因此，如果源数据发生根本性变化，你可能会发现删除现有的平面文件连接管理器并用一个新的替换它比尝试重新配置目标更容易。不幸的是，由于重新排序列的唯一方法是删除并重新插入它们，这一问题变得更加复杂。\n\
  \n在微调（而不是重新创建）平面文件目标时，你可以使用“新建”(New) 和“删除”(Delete) 按钮添加或删除列。在“高级”(Advanced) 窗格中调整列规格时，可以使用\
  \ `Ctrl` 键选择多个列，使用 `Shift` 键选择列集。\n\n对于导出文本文件（分隔符或固定宽度），有一系列有用的选项。表 7-3 对这个特定主题的主要变体进行了简要说明。\n\
  \n**表 7-3** SSIS 文本目标选项\n\n| 选项 | 对话框页面 | 说明 |\n|---|---|---|\n| 区域设置 (Locale) |\
  \ 常规 (General) 页面 | 货币设置等。 |\n| Unicode | 常规 (General) 页面 | 勾选此项将使用 Unicode 导出文件。\
  \ |\n| 代码页 (Code Page) | 常规 (General) 页面 | 如果你的目标文件必须使用特定的代码页（因此是非 Unicode）。 |\n\
  | 标题行分隔符 (Header Row Delimiter) | 列 (Columns) 页面 | 指定标题行分隔符。这可以与数据行的分隔符不同。 |\n|\
  \ 要跳过的标题行数 (Header Rows to Skip) | 常规 (General) 页面 | 在此处输入一个数字将导致输出跳过前“n”条记录。 |\n\
  | 文本限定符 (Text Qualifier) | 常规 (General) 页面 | 字符——通常是双引号 (\")——用于包裹包含额外列分隔符字符出现的文本字段。\
  \ |\n| 列名位于首行数据中 (Column Names in the First Data Row) | 常规 (General) 页面 | 将列名作为输出文件的第一行添加。\
  \ |\n| 行分隔符 (Row Delimiter) | 列 (Columns) 页面 | 指定默认行分隔符。 |\n| 列分隔符 (Column Delimiter)\
  \ | 列 (Columns) 页面 | 指定默认列分隔符。这可以在“高级”(Advanced) 页面中为每列单独指定。同样，如果你想使用弹出列表中没有的定界符，请使用“高级”(Advanced)\
  \ 页面。 |\n| 名称 (Name) | 高级 (Advanced) 页面 | 允许你重命名列。如果你选择将列名作为输出文件的第一行添加，这将使用的名称。\
  \ |\n| 列分隔符 (Column Delimiter) | 高级 (Advanced) 页面 | 允许你为此列指定列分隔符，并覆盖默认值。如果所需字符不在列表中，你也可以输入一个字符（或多个字符）。\
  \ |\n| 文本限定 (Text Qualified) | 高级 (Advanced) 页面 | 你可以指定此列是否被文本限定符包围。 |\n\n## 提示、技巧和陷阱\
  \ (Hints, Tips, and Traps)\n\n*   以 Unicode 格式导出文本文件会使其大小加倍——因为每个字符将占用两个字节而不是一个字节。对于非常大的文件，避免代码页麻烦的简单性可能会在磁盘空间和网络传输时间上付出相当大的代价。\n\
  *   你可能更愿意在 T-SQL `SELECT` 语句中为列创建别名，而不是在平面文件目标适配器的“高级”(Advanced) 页面中重命名它们。\n* \
  \  当然，你可以选择一个表作为数据源，但这只有在使用所有源列时才是好的做法。如果你在 `SELECT` 语句中只选择所需的列，而不是选择表或视图源然后在数据流中取消选择不需要的列，SSIS\
  \ 将更快地导出数据。\n*   添加文本限定符也会将列标题用引号括起来，对于每个将“高级列属性”(advanced column property) `TextQualified`\
  \ 设置为 True 的列。如果你觉得这很烦人或不可用，那么考虑如配方 7-4 所示，使用 `UNION` 子句作为 `SELECT` 语句的一部分来输出列标题。\n\
  *   你可以自由选择喜欢的文件名和扩展名，但遵守（相当）标准的约定（如逗号分隔值用 `.CSV`，制表符分隔值用 `.TXT`）会让接收你文件的人更容易处理。\n\
  \n\n"
- "# 7-3. 将数据导出为固定宽度文本文件\n\n## 问题\n\n您希望将数据导出到文本文件，但数据的接收方要求使用固定宽度格式，而非通常的分隔符类型。\n\
  \n## 解决方案\n\n使用 SSIS 和平面文件目标，但指定固定宽度文件格式。您可以按以下方式以这种格式导出数据。\n\n1.  执行食谱 7-2 中的步骤\
  \ 1 到 4，但指定平面文件格式为 `Fixed Width`。配置您创建的新平面文件连接管理器，使其看起来如 图 7-7 所示。\n\n    ![9781430247913_Fig07-07.jpg](img/9781430247913_Fig07-07.jpg)\n\
  \n    图 7-7. 固定宽度平面文件输出\n\n2.  检查“高级”页面，您会看到列宽已为您计算好：每个文本列的最大文本宽度，以及每个数值或日期/时间字段类型所需的最宽列。\n\
  \n## 工作原理\n\n导出固定宽度文件的过程与食谱 7-2 中描述的过程大体相似。甚至可以说，它比分隔符文件的导出更简单。使其更简单的一点是，您无需担心列分隔符，因为列是根据行起始字符数来“分隔”的。另一点是，由于没有列分隔符，因此不需要转义任何字符。\n\
  \n## 提示、技巧和陷阱\n\n*   右边缘不齐的导出会在每行末尾包含一个 CR/LF（回车/换行符）；固定宽度导出则不会。\n\n"
- "# 7-4. 从命令行导出文本文件\n\n## 问题\n\n您希望在不使用 SSIS、T-SQL 或导入/导出向导的情况下导出文本文件，可能作为脚本的一部分。\n\
  \n## 解决方案\n\n使用 `BCP` 从命令窗口或命令（`.cmd`）文件将数据导出为文本文件。\n\n要从表中将数据导出为文本文件，请在命令窗口中使用以下代码片段。（请注意，以下所有代码摘录均位于文件\
  \ `C:\\SQL2012DIRecipes\\CH07\\BCPOut1.cmd` 中）：\n\n```\nbcp CarSales.dbo.Client\
  \ OUT C:\\SQL2012DIRecipes\\CH07\\aa1.txt -SAdam_01\\Adam –c -T\n```\n\n类似地，使用 `SELECT`\
  \ 语句：\n\n```\nbcp \"SELECT ID,ClientName FROM CarSales.dbo.Client\" QUERYOUT C:\\\
  SQL2012DIRecipes\\CH07\\aa1.txt -SAdam_01\\Adam –c -T\n```\n\n此命令使用存储过程返回数据（假设我之前已创建了一个名为\
  \ `pr_OutputClients` 的过程，其中包含诸如 `SELECT ID,ClientName FROM CarSales.dbo.Client`\
  \ 的查询）：\n\n```\nbcp \"EXECUTE CarSales.dbo.pr_OutputClients\" QUERYOUT C:\\SQL2012DIRecipes\\\
  CH07\\aa1.txt -SAdam_01\\Adam –c -T\n```\n\n将列数据用引号括起来的最简单方法是在源 T-SQL 中包含它：\n\n\
  ```\nSELECT  ID, + '\"' + ClientName + '\"', Country\nFROM    CarSales.dbo.Client;\n\
  ```\n\n`BCP` 没有包含列标题的选项。\n\n如果需要列标题，则需要调整 SQL 以包含列标题，可能在您的 T-SQL 中使用类似下面这样的 `UNION`\
  \ 子句（`C:\\SQL2012DIRecipes\\CH07\\IncludeHeadersInTextFile.sql`）：\n\n```\nSELECT\
  \ ID, ClientName, Country\nFROM (\n      SELECT 'ID' AS ID, 'ClientName' AS ClientName,\
  \ 'Country' AS Country, 0 AS RowOrder\n      UNION\n      SELECT CAST(ID AS VARCHAR(11)),\
  \ ClientName, Country, 1 AS RowOrder       \n      FROM CarSales.dbo.Client\n  \
  \   ) A\nORDER BY RowOrder,ID;\n```\n\n如果目标数据库需要不同的字段分隔符（诚然，这种情况较少见），那么将这些分隔符作为源\
  \ SQL 的一部分生成可能更容易。\n\n```\nSELECT   CAST(ID AS VARCHAR(11)) + '/' + ClientName +\
  \ ';' + Country\nFROM     CarSales.dbo.Client;\n```\n\n![image](img/sq.jpg) **注意**\
  \ 在所有示例中，我都假定您将使用 `CarSales` 示例数据库以及本书示例的目录结构。如果情况并非如此，则必须将表名、字段名以及文件路径替换为您正在使用的那些。\n\
  \n## 工作原理\n\n当提到 `BCP` 时，您可能会想到“导入”。嗯，这个老牌的批量复制程序在需要从 SQL Server 导出数据为文本文件时，也可以非常高效。不，命令行界面并不是最用户友好的——实际上，它一直被批评笨拙，但这个工具在许多情况下仍然可以帮到您。\n\
  \n由于 `BCP` 的大部分复杂性已在第 2 章和第 5 章中解释过，我将只关注您需要了解的使用此工具从 SQL Server 提取数据的知识。首先，在导出文本数据时，`BCP`\
  \ 至少需要知道六件事。这些在表 7-4 中概述。但是，前三个元素必须按此表所示的顺序提供，其他元素可以按任意顺序添加。\n\n表 7-4. BCP 必需参数\n\
  \n| 元素 | 注释 |\n| --- | --- |\n| 源数据 | 可以是表、存储过程调用、视图或查询。如果使用表、视图或存储过程，应应用三部分名称法以包含数据库名。\
  \ |\n| 提取类型 | 对于表或视图使用 `OUT`，对于查询（select 语句或存储过程）使用 `QUERYOUT`。 |\n| 文件路径 | 完整的路径和文件名，包括扩展名。如果路径包含空格，请记得用双引号括起来。\
  \ |\n| 字符类型 | `-c` 表示 ASCII，`-w` 表示 Unicode。 |\n| 服务器名称 | `-S` 表示服务器名。 |\n| 连接类型\
  \ | 对于可信连接使用 `-T`，对于 SQL Server 连接，使用 `-U` 表示用户名，`–P` 表示密码。 |\n\n使用 `BCP` 时，有几点需要考虑。首先，`BCP`\
  \ 总是会覆盖目标文件的内容。此外，`BCP` 一次只能导出一个表或视图——尽管您可以使用查询来创建非规范化的导出表。同时，如果您怀疑分隔符可能出现在数据字段内的任何位置（例如地址中的逗号），则强烈建议您使用自定义分隔符。只需记住告知您发送数据的对象您使用了什么分隔符。最后，当使用查询或执行存储过程时，务必在\
  \ `BCP` 命令行中将其用引号括起来。\n\n您可能需要转义（或删除）某些字符，以确保目标数据库可以加载您输出的文本文件。例如，如果您（或同事或客户）稍后将使用\
  \ MySQL 的 `LOAD DATA INFILE` 来批量加载您导出的文本文件，您应该使用反斜杠（`\\`）来转义出现在字段值中的制表符、换行符或反斜杠。使用\
  \ T-SQL 的 `REPLACE` 函数最容易做到这一点——尽管这会稍微减慢导出过程。\n\n`BCP` 有一些重要的选项需要您理解。\n\n\n\n例如，默认情况下，`BCP`\
  \ 使用制表符作为列分隔符，使用换行符作为行终止符。您可能需要使用其他字符作为分隔符，在这种情况下，一些常用的变体包括：\n\n*   *逗号分隔符*: `-t,`\n\
  *   *管道分隔符*: `-t¦`\n*   *制表符分隔符*: `-t\\t`\n*   *自定义分隔符*: `-t@@#@@`\n*   *换行符*: `-r\\\
  n`\n*   *回车/换行* (CR/LF): `-r\\r`\n\n![image](img/sq.jpg)\n\n> **注意：** 将文本文件导出为 Unicode\
  \ 格式会使其大小翻倍，因为每个字符将占用两个字节而不是一个。为避免这种情况，对于大文件，如果要导出的数据允许，您可能更愿意指定一个代码页。例如，您可以使用代码页\
  \ `-C nnnn`（其中 `nnnn` 是代码页的四位数字引用）。\n\n#### 提示、技巧与陷阱\n\n*   要将数据导出为 `BCP` 文件，您必须记住不能使用\
  \ `BULK INSERT` 来输出数据，因此不得不借助于命令行 `BCP.exe`，这意味着需要了解其众多参数中的一部分。正如我们将看到的，您也可以使用 `xp_cmdshell`\
  \ 来运行 `BCP`。\n*   您需要对输出文件所用路径拥有读写权限。\n*   如果使用 `UNION` 查询来包含列标题，则必须将任何非字符值 `CAST`\
  \ 或 `CONVERT` 为适当长度的 `VARCHAR`。\n*   在连接源字段时，请记住处理 `NULL` 值，否则如果任何字段包含 `NULL`，您将丢失整个输出记录。\n\
  *   如果需要在数据库之间传输二进制和/或 `CLOB`（**C**haracter **L**arge **OB**ject，字符大对象）值，那么最好使用配方\
  \ 7-24 和 7-25 中描述的技术。\n*   在特别复杂的输出选择中（可能涉及带引号的字段、列标题等），考虑将输出定义创建为视图或存储过程，然后使用 `BCP`\
  \ 将其输出为文本文件。\n\n## 7-5. 不使用命令行利用 BCP 导出数据\n\n### 问题\n\n您希望利用 `BCP` 的所有强大功能来导出数据，但又不想受限于从命令行使用它，因为您希望这是更广泛的脚本化过程的一部分。\n\
  \n### 解决方案\n\n从 T-SQL、SSIS 或 SQL Server 代理中运行 `BCP`。\n\n#### 从 SSIS 运行 BCP\n\n在\
  \ SSIS 中，运行 `BCP` 与运行任何其他操作系统可执行文件类似——使用“执行进程任务”，您可以如 图 7-8 所示进行配置（以使用配方 7-4 中给出的代码）。\n\
  \n![9781430247913_Fig07-08.jpg](img/9781430247913_Fig07-08.jpg)\n\n图 7-8。从 SSIS\
  \ 运行 `BCP`\n\n#### 从 SQL Server 代理运行 BCP\n\n要从 SQL Server 代理运行 `BCP` 导出，请将作业步骤定义为：\n\
  \n*   **类型：** 操作系统 (CmdExec)\n*   **命令：** 任何有效的 `BCP` 命令——例如：\n    ```\n    bcp\
  \ CarSales.dbo.Client OUT C:\\SQL2012DIRecipes\\CH07\\aa1.txt -SAdam_01\\Adam –c\
  \ -T\n    ```\n\n一个用于运行 `BCP` 命令的有效 SQL 代理任务应类似于 图 7-9 所示。\n\n![9781430247913_Fig07-09.jpg](img/9781430247913_Fig07-09.jpg)\n\
  \n图 7-9。从 SQL Server 代理运行 `BCP`\n\n### 工作原理\n\n运行 `BCP` 导出本质上主要有五种方式，因此值得了解所有这些方式及其用途和可能的限制。它们在\
  \ 表 7-5 中展示。\n\n表 7-5. 运行 `BCP` 导出的方法\n\n| 调用方法 | 说明 |\n| --- | --- |\n| 命令提示符 |\
  \ 非常适合临时导出。 |\n| T-SQL | 如果（这可能是一个很大的前提）您的服务器上授权了 `xp_cmdshell`，那么您可以从 SSMS 或存储过程运行\
  \ `BCP`。 |\n| SSIS | 您可以使用“执行进程任务”来运行 `BCP` 导出。 |\n| SQL 代理 | 非常适合计划任务。 |\n| 批处理文件\
  \ | 运行顺序流程的可靠方法。可以使用 `xp_cmdshell` 从操作系统计划程序运行，或使用“执行进程任务”从 SSIS 运行。 |\n\n本配方更详细地探讨了中间的三种方式，因为我们在前面的配方示例中使用了命令提示符，而批处理文件不过是一系列\
  \ `BCP` 命令的串联。从 T-SQL 进行 `BCP` 导出的优势在于，您可以使用动态 SQL 和游标（在此上下文中其开销通常是最小的）来导出多个表、视图或存储过程的输出。\n\
  \n#### 提示、技巧与陷阱\n\n*   要从 T-SQL 运行 `BCP.exe`，您需要使用基于策略的管理、`sp_configure` 或方面/外围应用配置来启用\
  \ `xp_cmdshell`。请注意，它被认为是一个潜在的安全漏洞，应谨慎使用。\n*   从 SSIS 运行 `BCP` 时，您需要用双引号将路径和任何查询括起来，就像在交互式使用\
  \ `BCP` 时一样。\n\n## 7-6. 从 T-SQL 将数据导出为文本文件\n\n### 问题\n\n您希望简单轻松地将数据导出为文本文件，而无需开发\
  \ SSIS 包来从 T-SQL 导出数据的复杂性。\n\n### 解决方案\n\n使用 T-SQL 的 `OPENROWSET` 或 `OPENDATASOURCE`\
  \ 函数。\n\n您可以使用类似于这样的脚本来填充带分隔符的文本文件（`C:\\SQL2012DIRecipes\\CH07\\ExportDelimitedTextWithOpenRowset.sql`）：\n\
  \n```sql\nINSERT INTO OPENROWSET('Microsoft.Jet.OLEDB.4.0',\n    'Text;Database\
  \ = C:\\SQL2012DIRecipes\\CH07\\;',\n    'SELECT ID, ClientName FROM InsertFile.txt')\n\
  SELECT      ID, ClientName\nFROM dbo.Client;\n```\n\n对于 `OPENDATASOURCE`，请使用以下内容（`C:\\\
  SQL2012DIRecipes\\CH07\\ExportDelimitedTextWithOpendatasource.sql`）：\n\n```sql\n\
  INSERT INTO OPENDATASOURCE('Microsoft.Jet.OLEDB.4.0',\n    'Data Source = C:\\SQL2012DIRecipes\\\
  CH07\\;Text; FMT = Delimited')...[InsertFile#Txt]\nSELECT ID, ClientName  FROM dbo.Client;\n\
  ```\n\n### 工作原理\n\n如果您更喜欢从 T-SQL 内部运行文本导出——并避免使用 `BCP` 和 `xp_cmdshell`——那么您可以使用\
  \ `OPENROWSET` 和 `OPENDATASOURCE`。这是从 T-SQL 导出文本文件的一种非常快捷简便的方法，无需过多麻烦。然而，存在一些限制。\n\
  \n*   目标文件必须在运行命令之前创建好。\n*   此过程只会将数据追加到文件。\n*   目标文件中必须存在列标题——即使您使用了 `HDR = YES`\
  \ 扩展属性。\n*   默认情况下，此过程会自动为每列数据添加双引号。\n*   默认情况下，使用逗号作为分隔符。\n*   必须启用即席分布式查询。某些数据库管理员可能认为这是一个安全弱点。\n\
  \n如您所见，使用 `OPENROWSET` 和 `OPENDATASOURCE` 导出数据并没有什么特别之处。它们的使用方式与您在第 2 章 中看到的导入数据的方式几乎相同。尽管如此，值得注意的是，是\
  \ `MS.Jet` OLEDB 驱动程序允许您这样做——而不是 `MSDASQL` 驱动程序。但是，如果您想要一种无需花费 SSIS 或 `BCP` 那样的时间和精力就能快速输出数据的方法，并且如果您能接受这些限制，这可能非常有用。\n\
  \n要添加列标题，您将需要一个包含逗号分隔的列标题集的目标文本文件。如果标题太多无法复制粘贴，请考虑使用 `INFORMATION_SCHEMA` 系统视图来收集列标题列表。文本文件中的列标题不必与源表中的列标题相对应。但是，如果您使用\
  \ `OPENROWSET`，文本文件中的列标题必须与 `OPENROWSET` 命令的 `SELECT` 子句中的列标题完全相同。如果您使用 `OPENDATASOURCE`，那么文本文件中的确切列标题不必与\
  \ `SELECT` 子句中的列标题一一对应——但它们的顺序和数量必须完全对应。\n\n\n\n"
- '# 7-7. 将数据导出到另一个 SQL Server 数据库


  ## 问题

  您需要将数据导出到另一个 SQL Server 数据库。您希望最小化开发时间，并尽可能快地传输数据。


  ## 解决方案

  使用 BCP 以 SQL Server 原生格式导出和导入数据。


  要导出一个完整的表（其中列结构相同），BCP 命令将类似于：


  ```BCP

  BCP CarSales.dbo.Client OUT C:\SQL2012DIRecipes\CH07\SQL2000.bcp -N –SADAM02 –T

  ```


  ## 工作原理

  这本质上是“经典”的 BCP，有一个源表（但也可以是一个查询，如配方 7-4 所示）和一个目标文件。最大的区别在于您指定了 `-N` 标志来告诉 BCP 使用原生格式。其结果是您无需确认列长度和数据类型。


  原生格式导出适用于目标数据库不是不同的系统，而是另一个 SQL Server 数据库的情况。在这些情况下，您可能会发现使用 BCP/SQL Server 原生格式在
  SQL Server 实例之间导出和导入更容易。我意识到这看起来可能是一条复杂的路线，但有时这是唯一实用的解决方案。在众多可能的情况中，一些可能必要的场景包括：


  *   当您需要在数据库之间传输一部分表时。

  *   当您的数据库使用不同版本的 SQL Server 时（即使是 SQL Server 2008 和 SQL Server 2008 R2 也被认为是不同的版本），因此备份和恢复将不起作用。

  *   链接服务器违反了企业安全要求。

  *   只有文件传输是允许的或可行的。


  当需要映射、排除和添加字段时，您有三种选择：


  *   **将整个 `SELECT` 语句添加到 BCP 命令中**，用引号括起来，并使用 `QUERYOUT`。这可能第一次很难做对，所以我总是建议先在 `SSMS`
  中完善 `SELECT` 语句，然后将其复制粘贴到命令窗口中。

  *   **将 `SELECT` 语句包装在视图中**，并从 BCP 调用该视图。对于将频繁导出的表或非规范化数据时，这值得付出努力。

  *   **将 `SELECT` 语句包装在存储过程中**，并使用 `EXECUTE .. QUERYOUT` 从 BCP 调用该存储过程。请记住，会话范围的临时表不能使用。


  原生格式的优缺点详见表 7-6。


  **表 7-6 BCP 原生格式的优缺点**

  | 优点 | 缺点 |

  | --- | --- |

  | 速度快 | 无法使用格式文件——因此输出文件和目标表中的列结构需要完全相同。 |

  | 不需要格式文件 |  |


  还有一些 SQL Server 到 SQL Server 的导出选项——如表 7-7 所示——也值得了解。


  **表 7-7 SQL Server 到 SQL Server 导出选项**

  | 选项 | 说明 |

  | --- | --- |

  | 原生格式 (`-n`) | 只能用于不包含任何扩展/双字节字符集 (DBCS) 字符的数据。要保留任何扩展字符，您必须指定支持您希望传输的字符的代码页。 |

  | Unicode 原生格式 (`-N`) | 防止在使用不同代码页的服务器之间批量传输数据时丢失任何扩展字符。这将应用于所有 `char`、`nchar`、`varchar`、`NVARCHAR`、`text`、`varchar(max)`
  和 `NVARCHAR(max)` 字段。 |

  | `-V70` | SQL Server 版本 7 |

  | `-V80` | SQL Server 2000 |

  | `-V90` | SQL Server 2005 |

  | `-V100` | SQL Server 2008/2008 R2 |


  将表导出到以前版本的 SQL Server 时，唯一真正的小麻烦是可能需要某种形式的字段映射。我建议在输出阶段使用 T-SQL 进行塑形和映射数据，并确保发送到
  BCP 文件的数据能自动映射到目标表。这避免了使用格式文件，并确保任何较新的数据类型以及目标服务器中不存在的字段从文件中省略。


  简单来说，您需要：

  *   通过不将它们添加到 `SELECT` 语句中来删除字段。

  *   通过将 `CAST(NULL AS` 数据类型) `AS FieldName` 插入到 `SELECT` 语句中来添加字段。


  对于在旧版本目标服务器中以另一种数据类型存在的字段，将您可以从较新版本转换的数据类型进行 `CONVERT`。然而，这并非总是可行，因此您可能必须跳过一些字段。


  如果您完成了所有这些操作，并以 SQL Server 原生或宽原生格式（使用 `-n` 或 `-N` 标志）导出，同时使用 `-Vnn` 标志指定 SQL Server
  版本，那么您的输出文件应该能流畅地加载到目标服务器中。


  要导出一个完整的表（其中没有太新而无法转换的数据类型，且列结构相同），BCP 命令将类似于：


  ```BCP

  BCP CarSales.dbo.Client OUT C:\SQL2012DIRecipes\CH07\SQL2000.bcp -N –SADAM02 –T
  –V80

  ```


