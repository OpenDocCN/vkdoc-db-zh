  \ OFF\nGO\n\nALTER DATABASE CarSales_Staging SET RECOVERY SIMPLE\nGO\n\nALTER DATABASE\
  \ CarSales_Staging SET  READ_WRITE\nGO\n```\n\n## CarSales_DW\n\n`CarSales_DW`数据库是一个基于`CarSales`数据库的维度结构，为`CarSales`多维数据集提供数据。它包含以下表:\n\
