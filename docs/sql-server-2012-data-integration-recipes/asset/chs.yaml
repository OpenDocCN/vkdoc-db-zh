- "# 4-4. “临时”导入 Oracle 数据\n\n您想通过网络从 Oracle 将数据导入 SQL Server，而不必麻烦地开发一个基于 SSIS 的解决方案。\n\
  \n使用 T-SQL 和 `OPENROWSET`——或者设置一个链接服务器。\n\n将 Attunity Oracle 源组件添加到数据流窗格中。双击进行编辑。确保选中所需的连接管理器。然后，选择所需的数据访问模式（表或\
  \ SQL 命令）。选择表或视图——或者输入相应的 SQL `SELECT` 语句。单击“确定”。添加一个目标组件，将源连接到它，并映射列。数据流窗格应类似于图\
  \ 4-8。\n\n![9781430247913_Fig04-08.jpg](img/9781430247913_Fig04-08.jpg)\n\n图 4-8.\
  \ 使用 Attunity Oracle 源完成的 SSIS 数据流\n\n现在您可以运行 Oracle 数据导入了。\n\n## 工作原理\n\n如果您使用的是\
  \ SQL Server 企业版，可以下载用于 Oracle 的 Attunity 连接器，并使用 SSIS 实现比使用 Oracle 连接器可能达到的速度快得多的数据加载。您需要在\
  \ SQL Server 上安装 Oracle 客户端。使用设置 Oracle 客户端时配置的 TNS 服务名。否则，无论如何，Attunity 连接器都比 Microsoft\
  \ 或 Oracle 提供程序更简单；并且在我进行的测试中，它加载 Oracle 数据的速度要快数倍。一个有趣的方面是，您必须使用 SSIS 数据流源助手来创建\
  \ Attunity 数据源，而不是直接从 SSIS 工具箱拖放源任务。这里再次说明（本质上是为了避免无意义的重复），我并未深入探讨配置 OLEDB 目标的细节。如果您需要更详细的\
  \ OLEDB 目标示例，配方 1-7 包含一个更详细的示例。\n\n## 提示、技巧和陷阱\n\n*   与 SQL Server 2008 不同，您显然无法将\
  \ Attunity 连接器添加到 SSIS 工具箱。\n*   迁移整个数据库时，您可能会发现以下资源很有用：`www.microsoft.com/sqlserver/en/us/product-info/migration-tool.aspx#Oracle`。\n\
  \n以下代码将使用 `OPENROWSET` 将数据从 Oracle 插入到 SQL Server 表中（`C:\\SQL2012DIRecipes\\CH02\\\
  OpenRowsetOracle.sql`）：\n\n```sql\nSELECT * INTO MyOracleTable\nFROM OPENROWSET\
  \ ('OraOLEDB.Oracle', 'MyOracle';'SCOTT';'Tiger',\n                'select * from\
  \ SCOTT.EMP');\n```\n\n## 工作原理\n\n与第 1 章中描述的 Microsoft Office 产品一样（或者实际上当从其他 SQL\
  \ Server 实例访问数据时），您可以“临时”地从 Oracle 数据源读写数据。首先，让我们看看如何使用 `OPENROWSET` 运行“临时”查询。然而，根据您的环境，这可能有点慢。因此，我建议您彻底测试此方法，以确保如果您选择实施它，能够满足您的服务级别协议（SLA）。\n\
  \n至少，您需要以下条件：\n\n*   Oracle 客户端安装在 SQL Server 上。\n*   与 Oracle 服务器的网络连接（没有防火墙问题！）。\n\
  *   具有您希望检索数据访问权限的 Oracle 用户登录名和密码。\n*   在 SQL Server 上启用临时查询（如配方 1-4 所述）。\n\n`OPENROWSET`\
  \ 函数由三个元素组成：\n\n*   OLEDB 提供程序 (`OraOLEDB.Oracle`)。我使用的是 Oracle 提供程序。\n*   连接字符串\
  \ (`'MyOracle';'SCOTT';'Tiger'`)。\n*   查询 (`'select * from SCOTT.EMP'`)。\n\n需要注意的主要事项是连接字符串包含（按此顺序）：\n\
  \n*   Oracle 实例（前面示例中的 `MyOracle`）。\n*   用户 ID (SCOTT)。\n*   密码 (Tiger)。\n\n请注意，所有这些都用分号分隔，连接字符串和查询之间用逗号分隔。\n\
  \n对于更永久的双向连接到外部数据库（使用 OLEDB），链接服务器通常是最佳答案。要添加 Oracle 链接服务器，请在 SQL Server Management\
  \ Studio 中执行以下代码片段。我将此配方之后的所有代码放在一个示例文件中（`C:\\SQL2012DIRecipes\\CH02\\OracleLinkedServer.sql`）：\n\
  \n```sql\nEXECUTE master.dbo.sp_addlinkedserver\n    @server = 'MyOracleDatabase',\n\
  \    @srvproduct = 'Oracle',\n    @provider = 'OraOLEDB.Oracle',\n    @datasrc =\
  \ 'MyOracle';\n\nEXECUTE master.dbo. sp_addlinkedsvrlogin\n   @rmtsrvname = 'MyOracleDatabase',\n\
  \   @useself = 'false',\n   @locallogin = NULL,\n   @rmtuser = 'SCOTT',  -- Oracle\
  \ 用户名\n   @rmtpassword = 'Tiger'; -- Oracle 用户密码\n```\n\n然后，您可以使用标准的四部分命名约定从链接服务器中的表和视图读取数据（或写入）。\n\
  \n在 SQL Server Management Studio 中执行以下代码片段，读取 Oracle 表的内容并将其导入到 SQL Server 表中：\n\
  \n```sql\nSELECT * INTO dbo.MyOracleTable\nFROM MyOracleDatabase..SCOTT.EMP;\n```\n\
  \n如果您只想导入表结构（或源视图的结构），则可以使用以下代码片段：\n\n```sql\nSELECT * INTO dbo.MyOracleTable\n\
  FROM MyOracleDatabase.. SCOTT.EMP\nWHERE 1 = 0;\n```\n\n这将向您展示 SQL Server 如何映射数据类型，这可能非常有用。\n\
  \n或者，您可以使用 `OPENQUERY` 语法导入数据，如下所示：\n\n```sql\nSELECT * INTO dbo.MyOracleTable\n\
  FROM OPENQUERY(MyOracleDatabase,'select * from SCOTT.EMP');\n```\n\n另一种提取数据的方法是使用\
  \ SQL Server 2005（及更高版本）的功能 `EXEC...AT`。最简单地说，它使用链接服务器执行命令，如下所示：\n\n```sql\nEXEC\
  \ ('SELECT * FROM SCOTT.EMP') AT MyOracleDatabase;\n```\n\n因此，假设您有一个目标表结构，您可以像这样导入数据：\n\
  \n```sql\nINSERT INTO dbo.MyOracleTable\nEXEC ('SELECT * FROM SCOTT.EMP') AT MyOracleDatabase;\n\
  ```\n\n这可以很容易地调整以接受作为 T-SQL 一部分的参数，从而允许您微调数据选择：\n\n```sql\nDECLARE @EMPNO INT =\
  \ 7369;\n\nINSERT INTO dbo.MyOracleTable\nEXEC ('SELECT * FROM SCOTT.EMP WHERE EMPNO\
  \ = ' + @EMPNO ) AT MyOracleDatabase\n```\n\n最后，如果 Oracle DBA 设置了一个 PL/SQL 存储过程来返回数据集，您可以运行：\n\
  \n```sql\nINSERT INTO dbo.SCOTT_EMP\nEXEC (BEGIN SCOTT.MyPLSQLProcedurehere; END)\
  \ AT MyOracleDatabase;\n```\n\n外部服务器可能是大小写敏感的——事实上，我见过的大多数 Oracle 实现都是如此。因此，为了避免潜在问题，在使用链接对象时，建议使用对象所需的大小写。更准确地说，Microsoft\
  \ 联机丛书 (BOL) 指出，如果表名和列名是在 Oracle 中不带引号标识符创建的，则使用全大写名称；否则，使用完全相同的大小写。\n\n## 提示、技巧和陷阱\n\
  \n*   必须将 `'OraOLEDB.Oracle'` 提供程序的 `AllowInProcess` 属性设置为 1（在 SSMS 中右键单击提供程序：服务器对象\
  \ ![image](img/arrow.jpg) 链接服务器 ![image](img/arrow.jpg) 提供程序以更改此设置）。\n*   您需要为链接服务器设置\
  \ `Set RPC OUT` 服务器选项，才能使 `EXEC...AT` 正常工作。在 SSMS 中右键单击链接服务器并选择“属性”以修改此选项。\n*  \
  \ SQL Server 数据导入向导也可以导入 Oracle 数据。由于该工具在配方 1-2 和 2-1 中已相当详尽地描述，我将请您参考第 1 章和第 2\
  \ 章。将其用于 Oracle 源数据时，您需要指定将使用用于 Oracle 的 OLEDB 驱动程序（由 Microsoft 或（优选）Oracle 提供）。\n\
  *   要列出链接服务器中所有可用的表，请参阅第 8 章。\n\n![image](images/sq.\n\n\n**注意**  \n我知道在这个示例中使用\
  \ `SELECT *` 是糟糕的编程习惯。我采用此方法的原因是，在实践中连接到外部数据库时，你并不总是能掌握源数据的详细信息。通过返回所有可用字段，你至少可以对源数据有一个初步的了解，进而仔细查看字段和数据本身。在定义用于生产的最终代码时，你当然应该只\
  \ `SELECT` 那些你希望导入 SQL Server 的字段。\n\n## 4-5. 迁移多个 Oracle 表和视图\n\n### 问题\n你有数十甚至数百个\
  \ Oracle 源表和/或视图，需要作为迁移的一部分加载到 SQL Server 中。\n\n### 解决方案\n使用适用于 Oracle 的 SSMA（SQL\
  \ Server 迁移助手）。以下说明如何准备 SQL Server 对象并从 Oracle 方案加载数据：\n\n1.  下载并安装适用于 Oracle 的\
  \ SSMS。当前版本可在 `www.microsoft.com/en-us/download/confirmation.aspx?id=28766` 获取。\n\
  2.  运行适用于 Oracle 的 SSMA（开始 → 所有程序 → SQL Server Migration Assistant 2012 for Oracle）。\n\
  3.  单击文件 → 新建项目。输入一个名称。然后，输入或浏览到项目将存储的目录。\n4.  单击“连接到 Oracle”工具栏按钮。输入 Oracle 连接信息。你应该会看到类似\
  \ 图 4-9 的内容。\n   ![9781430247913_Fig04-09.jpg](img/9781430247913_Fig04-09.jpg)\n\
  \   图 4-9. SSMA 的 Oracle 连接\n5.  在“Oracle 元数据资源管理器”窗格中，展开方案，然后展开包含你希望迁移的表的方案（或多个方案）。勾选“表”复选框以选择该方案中的所有表（或选择你希望迁移的表）。\n\
  6.  单击“连接到 SQL Server”。输入你的 SQL Server 连接参数。在“SQL Server 元数据资源管理器”窗格中，选择目标数据库。你应该会看到一个类似于\
  \ 图 4-10 的屏幕。\n   ![9781430247913_Fig04-10.jpg](img/9781430247913_Fig04-10.jpg)\n\
  \   图 4-10. 适用于 Oracle 的 SSMA\n7.  在“Oracle 元数据资源管理器”窗格中单击“表”。单击“转换方案”按钮。SSMA 会生成用于定义所选\
  \ Oracle 表的 T-SQL。然后，它会在“SQL Server 元数据资源管理器”窗格右侧的“属性”选项卡中显示已生成元数据的对象数量。\n8.  在“SQL\
  \ Server 元数据资源管理器”窗格中，右键单击“表”。选择“同步”。SSMA 会在 SQL Server 数据库中创建所选的表。\n9.  在“Oracle\
  \ 元数据资源管理器”窗格中单击“表”。然后单击“迁移数据”按钮。SSMA 将要求建立一个新的 Oracle 连接。输入和/或确认连接参数。单击“确定”。SSMA\
  \ 加载数据并打开一个包含转换报告的对话框。\n10. 保存 SSMA 项目。\n\n### 工作原理\n如果你只是从我们正在查看的某个数据库导入少量表或视图，那么概述在示例\
  \ 4-2 中的 SSIS 方法可能就足够了。然而，当你有一个或多个充满表的方案（当然还有其对应的数据）需要导入 SQL Server 时，你可能需要一个能够承担极其繁重工作的工具。幸运的是，适用于\
  \ Oracle 的 SSMA（SQL Server 迁移助手）可以助你一臂之力。它可以帮助你分析源元数据并在 SQL Server 中创建目标表。它还会为 SQL\
  \ Server 对象编写脚本。一个额外的优势是，使用 SSMA，你可以暂停和重启——最重要的是——调整你的工作，这允许你对数据迁移执行多次迭代。\n\nSSMA\
  \ 也可以迁移数据。在其最新版本中，它可以执行客户端迁移，其中迁移的数据不流经 SSMA，而是直接从 Oracle 数据库传输到 SQL Server。这在示例\
  \ 4-13 中有更详细的解释，并且需要安装 SSMS 扩展包。有关下载和安装 SSMS 及扩展包的更多详细信息，请参阅示例 4-13。安装扩展包将在 SQL\
  \ Server 上创建一个数据库来存储有关数据加载的元数据。使用扩展包执行数据迁移需要 SQL Server 代理正在运行。\n\n我不会解释 SSMA 如何转换其他数据库对象；相反，我将讨论仅限于获取元数据和导入数据。\n\
  \n在开始使用 SSMA 世界之前，有几件事需要注意：\n\n-   Oracle 方案对应于 SQL Server 数据库。\n-   当 SSMA 创建 SQL\
  \ Server 数据库方案时，这只是一个元数据视图。你可以看到 SQL Server 方案将是什么样子，但在“SQL Server 元数据资源管理器”窗格中选择“同步”之前，不会向目标\
  \ SQL Server 写入任何内容。\n-   你只能从整个表（而不是视图）导入数据。你无法筛选源记录或执行列选择。\n\n有一些重要的先决条件需要注意：\n\
  \n-   首先，你必须下载并安装适用于 Oracle 的 SSMA。要找到它，只需在你喜欢的搜索引擎中输入 SSMA for Oracle（Sybase 或\
  \ MySQL）（如果前面提供的地址不再有效）。作为安装的一部分，你必须获取（免费的）`oracle-ssma.license` 文件。请务必下载最新版本。\n\
  -   其次，必须在 SQL Server 数据库中启用 CLR。如果尚未启用，请使用“方面”→“表面区域配置”或示例 10-21 中显示的 T-SQL 代码片段来启用\
  \ CLR。\n\n最好在运行 SSMS 之前，在 SQL Server 中创建好数据库，用于容纳来自 Oracle 源方案的对象和数据。虽然你可以在使用 SSMA\
  \ 时完成此操作，但单独的数据库创建让你对数据库配置有更大的控制权。\n\n不幸的是，SSMA 无数的细微差别只有通过使用才会显现，但我希望让你了解到它有多么有用。SSMA\
  \ 确实是一个极好的工具。在我看来，它（成倍地）回报了在初始学习曲线上花费的（诚然很短的）时间。\n\n### 提示、技巧和陷阱\n-   如果用于连接的 Oracle\
  \ 用户拥有扩展权限（例如 DBA 或对多个方案的权限），那么 SSMA 可能需要时间加载数据库中的所有对象。由于这可能包含大型生产数据库中的数千张表，你最好以一个仅对你希望迁移的对象拥有权限的用户身份进行连接。\n\
  -   将方案信息导入到已包含所选方案对象的项目时，你会收到警告，提示现有元数据将被覆盖。SSMA 无法将元数据追加到现有的方案信息中。\n-   将数据导入到包含数据的数据库时，你会收到警告，提示现有数据将被覆盖。\n\
  -   当然，你不必转换和加载整个 Oracle 方案。你可能只希望选择可用表的一个子集，方法是勾选仅那些你希望迁移的对象左侧的复选框。\n-   SSMA 可以为你希望迁移的对象生成脚本。为此，请右键单击要编写脚本的元素，然后选择“另存为脚本”。因此，要为单个表编写脚本，请在“SQL\
  \ Server 元数据资源管理器”窗格中右键单击它。要为一组选定的表编写脚本，请勾选这些表的复选框。然后，在“SQL Server 元数据资源管理器”窗格中右键单击“表”，并选择“另存为脚本”。当然，你必须输入或浏览到所需的目录。然后，这些脚本可以加载到\
  \ SQL Server Management Studio 中，并根据你的需要进行调整。\n\n\n\n## 4-6. 定期加载 DB2 数据\n\n###\
  \ 问题\n你有一个运行在 IBM AS400 服务器上的 DB2 数据库，并且可以通过公司网络连接。因此，你想从 DB2 源提取数据并加载到 SQL Server\
  \ 中。\n\n### 解决方案\n使用 SSIS 通过 OLEDB 连接来加载 DB2 数据。以下是一种实现方法：\n\n1.  从你的 IBM 安装介质安装合适的\
  \ DB2 提供程序。在本示例中，我将使用 `IBM DB2 for I5/OS IBMDA400 OLEDB Provider`。\n2.  创建一个 SSIS\
  \ 包。添加一个新的连接管理器。\n3.  选择 `IBM DB2 for I5/OS IBMDA400 OLEDB Provider`。\n4.  在“服务器或文件名”字段中输入完全限定的服务器名称。\n\
  5.  在“连接管理器”对话框中输入 DB2 登录信息（参见图 4-12）。\n    ![](img/9781430247913_Fig04-12.jpg)\n\
  \    图 4-12. SSIS 中用于 DB2 的 OLEDB 源配置\n6.  从可用列表中选择初始目录（数据库）。\n7.  当使用此连接管理器定义 OLEDB\
  \ 源时，将数据访问模式设置为“SQL 命令”，并编写一条 select 语句来选择数据，使用适当的模式。\n8.  添加一个 OLEDB 目标，将源连接到它，并编辑目标。\n\
  9.  定义目标数据库和表，并映射列。\n\n### 工作原理\n在本示例中，我假设你已经对 SSIS 相当熟悉，并将重点放在有趣的方面——DB2 连接上。实际上，连接到\
  \ DB2 本质上是一个选择正确的 OLEDB 提供程序并通过目录（DB2 中的数据库）深入查找模式和表的问题。DB2 的好处在于它至少在两个方面简化了连接性：\n\
  *   无需安装完整的客户端软件，只需 DB2 提供程序。\n*   无需在外部文件中配置连接信息（如 Oracle 中的 `TNSNames.ora`）。\n\
  \n然而，DB2 用可选的 OLEDB 提供程序（取决于你连接到的环境）和使用 T-SQL 连接时令人麻木的连接字符串复杂性弥补了这种简单性。这还不包括 DB2\
  \ Connect（用于大型机），因为这个主题实在太过庞大。因此，面对 DB2 数据源时，困难的部分可能是选择适当的提供程序。在本示例中，我假设你正在连接到 AS400\
  \ 上的 DB2，并使用了正确安装的 `IBM DB2 for I5/OS IBMDA400 OLEDB Provider`。与 Oracle 连接的情况一样，你很可能会发现一位乐于助人且积极的\
  \ DB2 DBA 可以在帮助你选择适当的驱动程序方面提供宝贵的协助。\n\n> **注意** 许多（如果不是全部）DB2 OLEDB 提供程序不允许使用参数化查询。解决此难题的一种方法是使用脚本任务构建\
  \ SQL，然后将 SQL 传递给 SSIS 变量，该变量在 OLEDB 源中使用。\n\n如果你选择在 SSIS 中使用 `Microsoft OLEDB provider\
  \ for DB2`，你会发现情况与前面使用 `IBM OLEDB provider for DB2` 描述的内容几乎相同。这意味着在第 4 步，你将看到图 4-13\
  \ 所示的“连接管理器”对话框，而不是 IBM 的对话框。\n![](img/9781430247913_Fig04-13.jpg)\n图 4-13. 配置用于\
  \ DB2 的 Microsoft OLEDB 提供程序\n\n如果单击“数据链接”按钮，你可以定义扩展数据链接属性，例如初始目录（数据库）和模式，如图 4-14\
  \ 所示。\n![](img/9781430247913_Fig04-14.jpg)\n图 4-14. 配置用于 DB2 的 MS OLEDB 提供程序的数据链接属性\n\
  \n如果你将使用 IBM OLEDB 提供程序，那么最终可能需要使用 ODBC，因此需要设置一个 ODBC 系统 DSN（数据源名称）。创建 DSN 在配方 4-10\
  \ 中讨论，因此图 4-15 仅显示用于 IBM DB2 ODBC 提供程序的配置面板。\n![](img/9781430247913_Fig04-15.jpg)\n\
  图 4-15. IBM DB2 ODBC 提供程序的配置面板\n\n### 提示、技巧和陷阱\n*   在添加 DB2 SQL `SELECT` 语句时，你可能想使用\
  \ DB2 语句 `FOR READ ONLY`——它大致相当于 T-SQL 的 `WITH (NOLOCK)`。\n*   正如之前针对 Oracle 数据源所述，在使用\
  \ SQL Server 2012 时，在包级别为源和目标定义连接管理器可能更好。\n\n## 4-7. 不使用 SSIS 导入 DB2 数据\n\n### 问题\n\
  你想在不创建 SSIS 包的挑战下导入 DB2 数据。\n\n### 解决方案\n设置到 DB2 的链接服务器连接。以下是执行此操作的代码（`C:\\SQL2012DIRecipes\\\
  CH02\\MSDB2LinkedServer.sql`）：\n```sql\nUSE master;\nGO\nEXECUTE master.dbo.sp_MSset_oledb_prop\
  \ N'IBMDA400', N'AllowInProcess', 1 ;\nGO\nEXECUTE master.dbo.sp_MSset_oledb_prop\
  \ N'IBMDA400', N'DynamicParameters', 1 ;\nGO\nEXECUTE master.dbo.sp_addlinkedserver\n\
  \    @server = 'MyDB2Server'\n    ,@srvproduct = 'IBMDA400'\n    ,@provider = 'MSDASQL'\n\
  \    ,@datasrc = 'MyDB2'  -- DSN, previously defined\n    ,@catalog = 'CALIDRA02'\n\
  \    ,@provstr = 'CMT = 0;SYSTEM = adam.calidra.co.uk' ;\nEXECUTE master.dbo.sp_addlinkedsrvlogin\n\
  \    @rmtsrvname = N'MyDB2Server'\n    ,@locallogin = NULL\n    ,@useself = N'False'\n\
  \    ,@rmtuser = N'Adam'\n    ,@rmtpassword = N'Me4B0ss';\n```\n\n### 工作原理\n假设你将使用一个已正确安装的可用\
  \ OLEDB 提供程序，你可以使用一个相当“经典”的脚本（如本配方中为 IBM DB2 提供程序和先前定义的 ODBC DSN 提供的脚本）来设置链接服务器以从\
  \ DB2 导入数据。\n\n对于 IBM DB2 OLEDB 提供程序，T-SQL 将类似于以下内容（`C:\\SQL2012DIRecipes\\CH02\\\
  IBMDB2LinkedServer.sql`）：\n```sql\nEXECUTE master.dbo.sp_addlinkedserver\n   @server\
  \ = N'DB2',\n   @srvproduct = N'Microsoft OLE DB Provider for DB2',\n   @catalog\
  \ = N'DB2',\n   @provider = N'DB2OLEDB',\n   @provstr = N'Initial Catalog = CarSales;\n\
  \       Data Source = DB2;\n       HostCCSID = 1275;\n       Network Address = 257.257.257.257;\n\
  \       Network Port = 50000;\n       Package Collection = admin;\n       Default\
  \ Schema = admin;';\n```\n\n### 提示、技巧和陷阱\n*   有关如何设置 ODBC DSN 的详细信息，请参见配方 4-10。\n\
  \n## 4-8.\n\n\n\n"
- "# 定期从 MySQL 获取数据\n\n## 问题\n\n您的网络上有一个 MySQL 数据库，并且您希望定期执行从该数据库到目标的数据加载任务。\n\n##\
  \ 解决方案\n\n使用 SSIS，并通过 MySQL ODBC 驱动程序连接到源数据库。以下描述了具体操作步骤。\n\n1.  启动 ODBC 数据源管理器（`odbcad32.exe`\
  \ 或 控制面板 ![image](img/arrow.jpg) 系统和安全 ![image](img/arrow.jpg) 管理工具 ![image](img/arrow.jpg)\
  \ ODBC 数据源）。点击“系统 DSN”选项卡。您应该会看到如图 4-16 所示的对话框。\n\n    ![9781430247913_Fig04-16.jpg](img/9781430247913_Fig04-16.jpg)\n\
  \    图 4-16.  ODBC 数据源管理器\n\n2.  点击“添加”。选择`MySQL ODBC 3.51`驱动程序（参见图 4-17）。\n\n \
  \   ![9781430247913_Fig04-17.jpg](img/9781430247913_Fig04-17.jpg)\n    图 4-17. \
  \ 使用 ODBC 数据源管理器添加新的系统 DSN\n\n3.  点击“完成”。ODBC 连接器对话框将会出现。输入以下信息：\n    *   一个您选择的数据源名称。我使用的是\
  \ `MySQLAdam`。\n    *   描述（如果您想添加的话）\n    *   服务器名称（或 `localhost`）\n    *   您将用来连接的用户。我使用的是\
  \ *root* 用户。\n    *   相应的密码\n    *   要连接的数据库\n\n    您应该看到类似图 4-18 的内容。\n\n    ![9781430247913_Fig04-18.jpg](img/9781430247913_Fig04-18.jpg)\n\
  \    图 4-18.  配置 MySQL ODBC DSN\n\n4.  点击“测试”以测试连接。假设您收到连接已建立的确认信息，点击两次“确定”以完成 DSN\
  \ 的创建。\n5.  在一个新的或现有的 SSIS 包中，在“连接管理器”选项卡中右键单击，然后选择“新建连接...”（或在“解决方案资源管理器”中右键单击“连接管理器”，然后选择“新建连接管理器”）。\n\
  6.  从提供程序列表中选择 ODBC 类型，如图 4-19 所示。\n\n    ![9781430247913_Fig04-19.jpg](img/9781430247913_Fig04-19.jpg)\n\
  \    图 4-19.  在 SSIS 中添加 ODBC 连接管理器\n\n7.  点击“添加”。选择您刚刚创建的系统（或用户）DSN（本例中为`MySQLAdam`）。对话框应如图\
  \ 4-20 所示。\n\n    ![9781430247913_Fig04-20.jpg](img/9781430247913_Fig04-20.jpg)\n\
  \    图 4-20.  在 SSIS 中使用 ODBC 连接管理器\n\n8.  点击“确定”以完成 MySQL 连接管理器的创建。重命名该连接管理器。\n\
  9.  添加一个“数据流任务”。双击进行编辑。\n10. 添加一个“ODBC 源”。双击进行编辑。\n11. 将 ODBC 连接管理器设置为您在步骤 8 中创建的名称。\n\
  12. 将数据访问模式设置为“SQL 命令”。输入用于确定源数据的 SQL。在此示例中，我建议使用 `` `SELECT * FROM INFORMATION_SCHEMA.TABLES`\
  \ ``。\n13. 点击“确定”确认。继续您的包创建，如配方 4-2 和 1-7 等所述。\n\n## 工作原理\n\n在撰写本文时，MySQL 官方并不支持\
  \ OLEDB 提供程序。因此，唯一的解决方案是使用 ODBC 导入数据。显然这并不理想，但有时您别无选择。这种方法的缺点是：\n*   使用 MySQL 提供程序的\
  \ ODBC 可能非常慢。\n*   配置用于 ODBC 驱动程序的 Microsoft OLEDB 提供程序可能很麻烦。\n\n必须安装来自 MySQL 网站的最新版本`MyODBC`驱动程序。目前，它是\
  \ 5.1.1，有 32 位和 64 位版本。在您喜欢的搜索引擎中输入**MySQL ODBC**。您应该能在 MySQL 网站上找到相关页面进行下载。\n\n\
  SSIS 2012 中的一个新功能是 ODBC 连接管理器（感谢 Microsoft 与 Attunity 的合作），这无疑使使用 ODBC 变得稍微简单了一些。一旦配置好\
  \ ODBC DSN，您就可以在 ODBC 连接管理器中将其用作系统 DSN。DSN 的各个元素在表 4-1 中说明。\n\n表 4-1. MySQL ODBC\
  \ DSN\n\n| 参数 | 描述 |\n| --- | --- |\n| 数据源名称 | 您可以选择任何喜欢的名称，但显然越简单、越容易记住越好。 |\n\
  | 描述 | 这不是必需的，但在几个月后您完全忘记它的作用时返回查看 DSN，它会很有用。 |\n| 服务器名称 | 这必须是 MySQL 服务器的确切名称。\
  \ |\n| 您用来连接的用户 | 此用户必须具有源数据的所有必要权限。 |\n| 相应的密码 | |\n| 要连接的数据库 | |\n\n## 提示、技巧和陷阱\n\
  \n*   DSN 仅限于所选的数据库，因此您需要为连接到多个数据库的 ODBC 连接设置多个 DSN。\n*   要保存系统 DSN，您需要以本地系统管理员身份运行\
  \ ODBC 数据源管理工具（右键单击`odbcad32.exe`并选择“以管理员身份运行”）。\n*   当前版本的 MySQL ODBC 驱动程序不会列出可用的表，因此您必须知道要查找的表。如果您没有此信息，可以使用第\
  \ 8 章中给出的技术来发现它。然而，获取源元数据可能是一个漫长的过程。因此，再次强调，获取任何关于源的文档可以节省大量宝贵时间——您自己的时间！\n*   如果\
  \ DSN 包含登录名和密码，则无需在 SSIS 中重复输入它们。\n*   如果在“连接管理器”对话框的列表中看不到 DSN，请选择“使用连接字符串”，并输入类似以下内容：\n\
  \    ```\n    DRIVER = {MySQL ODBC 5.1 Driver};SERVER = localhost;DATABASE = AdamTest;UID\
  \ = root\n    ```\n*   如果您在 64 位环境中工作，但只安装了 32 位驱动程序，则需要在运行包之前将`Run64BitRuntime`设置设置为\
  \ False。\n*   再次考虑在包级别定义连接管理器。\n\n"
- "# 4-9. “按需”导入 MySQL 数据\n\n## 问题\n\n您希望从 MySQL 导入数据，但不想麻烦地使用 SSIS。\n\n## 解决方案\n\n\
  配置一个链接服务器来连接到 MySQL 数据库。我将解释如何操作。\n\n1.  在 SSMS 中，展开“服务器对象”。然后右键单击“链接服务器”并选择“新建链接服务器”。\n\
  2.  输入一个您选择的链接服务器名称。我在这里使用的是 `MySQLLink`。\n3.  点击“其他数据源”单选按钮。选择“Microsoft OLE DB\
  \ Provider for ODBC Drivers”作为提供程序。\n4.  输入一个您选择的产品名称。\n5.  将您在配方 4-8 中创建的系统 DSN（`MySQLAdam`）作为数据源输入。\n\
  \n    您应该看到如图 4-21 所示的内容。\n\n    ![9781430247913_Fig04-21.jpg](img/9781430247913_Fig04-21.jpg)\n\
  \    图 4-21.  配置 MySQL 链接服务器\n\n6.  点击左侧列表中的“安全性”。选择“不使用安全上下文的连接”单选按钮。DSN 中定义的登录名提供了用户\
  \ ID 和密码（参见图 4-22）。\n\n    ![9781430247913_Fig04-22.jpg](img/9781430247913_Fig04-22.jpg)\n\
  \    图 4-22.  MySQL 的链接服务器属性\n\n7.  点击“确定”。\n\n您现在可以使用标准的四部分`SELECT`语句从链接服务器中选择数据，如下所示：\n\
  ```\nSELECT * FROM MYSQLLINK...INFORMATION_SCHEMA.TABLES.\n```\n\n\n\n"
- "# 4. 整合 MySQL 与其他数据源\n\n## 工作原理\n\n通过使用 ODBC，你可以创建一个指向 MySQL 数据库的链接服务器。在我看来，虽然先定义一个\
  \ DSN 并将其作为数据源更简单，但如果你愿意，也可以通过提供完整的提供程序字符串来创建一个“无 DSN”的链接服务器。\n\n如果你在使用某些数据类型时遇到困难，可能需要调整\
  \ `MSDASQL`（用于 ODBC 驱动程序的 Microsoft OLEDB 提供程序）的属性。具体操作如下：\n\n1.  展开“服务器对象” ![image](img/arrow.jpg)\
  \ “链接服务器” ![image](img/arrow.jpg) “提供程序”。然后，右键单击 `MSDASQL` 并选择“属性”。你将看到一个类似 图 4-23\
  \ 所示的对话框。\n\n    ![9781430247913_Fig04-23.jpg](img/9781430247913_Fig04-23.jpg)\n\
  \    图 4-23. 为用于 ODBC 的 Microsoft OLEDB 提供程序配置提供程序选项\n\n2.  勾选 `仅零级别` 和/或 `允许进程内`。点击“确定”。\n\
  \n![image](img/sq.jpg) `注意` 请记住，你修改的是所有 ODBC over OLEDB 连接的 `MSDASQL` 属性——因此要小心，避免因修改提供程序属性而导致其他连接无法工作！\n\
  \n现在链接服务器已设置好，使用 `OPENQUERY` 发送直通查询就变得轻而易举了。使用如下简单的代码片段（`C:\\SQL2012DIRecipes\\\
  CH02\\MySQLOpenQuery.sql`）：\n\n```sql\nSELECT * FROM OPENQUERY(MYSQLLINK, 'SELECT\
  \ * FROM INFORMATION_SCHEMA.TABLES');\n```\n\n你也可以在即席 (`OPENROWSET`) 查询中使用此 DSN——前提是即席查询已如配方\
  \ 1-4 所述启用。这是一个示例（`C:\\SQL2012DIRecipes\\CH02\\MySQLOpenRowset.sql`）：\n\n```sql\n\
  SELECT * FROM OPENROWSET(N'MSDASQL', 'DSN = MySQLAdam',\n                      \
  \   'SELECT * FROM INFORMATION_SCHEMA.TABLES') AS A\n```\n\n#### 提示、技巧与陷阱\n\n* \
  \  好吧，我承认我在数据库安全性方面有些随意。为了获得更高的安全性，请在“安全性”选项卡上选择 `不进行` 单选按钮，然后单击 `添加`。在 SQL Server\
  \ 登录名和 MySQL 用户之间建立登录映射。对话框应如 图 4-24 所示。\n\n    ![9781430247913_Fig04-24.jpg](img/9781430247913_Fig04-24.jpg)\n\
  \    图 4-24. 为 MySQL 链接服务器配置安全上下文\n\n![image](img/sq.jpg) `注意` 再次强调，使用 `SELECT *`\
  \ 不适合生产环境。然而，在初步了解源数据时，它可能非常有用。\n\n## 4-10. 使用 SSIS 2005 和 2008 导入 MySQL 数据\n\n\
  ### 问题\n\n你仍在使用 SQL Server 2008（甚至是 2005），并且需要导入 MySQL 数据。\n\n### 解决方案\n\n使用基于 ADO.NET\
  \ 的 ODBC，而不是使用 Attunity ODBC 连接管理器（该管理器在 SQL Server 2012 中才成为标准配置）。以下说明如何配置它。\n\n\
  1.  在一个新的或现有的 SSIS 包中，右键单击“连接管理器”选项卡。选择 `新建 ADO.NET 连接`。\n2.  单击 `新建`。从弹出的提供程序列表中选择\
  \ `ODBC Data Provider`，如 图 4-25 所示。\n\n    ![9781430247913_Fig04-25.jpg](img/9781430247913_Fig04-25.jpg)\n\
  \    图 4-25. 在 ADO.NET 连接中使用 ODBC 提供程序\n\n3.  单击“确定”。选择你之前创建的系统（或用户）DSN（参见配方 4-8）。\n\
  4.  再次单击“确定”两次，完成 MySQL 连接管理器的创建。\n5.  添加一个“数据流任务”。双击进行编辑。\n6.  添加一个 ADO.NET 数据源。双击进行编辑。\n\
  7.  将 ADO.NET 连接管理器设置为你之前创建的名称。\n8.  将数据访问模式设置为 `SQL 命令`。输入用于确定源数据的 SQL。\n9.  单击“确定”确认。继续创建你的包。\n\
  \n### 工作原理\n\n如果你使用的是 SQL Server 2005 或 2008，那么使用 DSN 的方法略有不同，因为你必须使用基于 ADO.NET\
  \ 的 ODBC。你仍然需要配置一个 DSN，但幸运的是，这在任何版本的 SQL Server 中都是一样的，因为它依赖于 MySQL ODBC 驱动程序。\n\
  \n#### 提示、技巧与陷阱\n\n*   与 SSIS 2012 相同的提示也适用于使用旧版本的 SSIS。这是因为它们都涉及 ODBC 驱动程序，而不是\
  \ SSIS 本身。\n\n## 4-11. 从 MySQL 迁移完整表\n\n### 问题\n\n你希望在一次简单操作中从多个 MySQL 数据库迁移多个完整的表。\n\
  \n### 解决方案\n\n使用针对 MySQL 的 SSMA 一次性从多个表和/或数据库迁移表。\n\n1.  下载最新版本的 SQL Server Migration\
  \ Assistant for Sybase。当前版本为 5.2，可从 `www.microsoft.com/en-us/download/details.aspx?id=28764`\
  \ 获取。\n2.  安装 SSMA 和 SSMA 扩展包。这在配方 4-5 和 4-13 中有描述。\n3.  安装最新版本的 MySQL ODBC 驱动程序。\n\
  4.  运行 SSMS。下载并刷新（免费的）许可证密钥。\n\n你现在可以像配方 4-5 和 4-13 中描述的那样执行数据迁移。为了不重复所有细节（也免去你在配方间跳转），这意味着你需要执行以下操作：\n\
  \n1.  创建一个新项目并保存。\n2.  连接到 MySQL。向下钻取到你希望传输的数据库和表。\n3.  连接到 SQL Server。\n4.  转换源架构。\n\
  5.  将架构与目标数据库同步（如果所需表尚不存在，此操作将创建它们）。\n6.  迁移数据。\n\n### 工作原理\n\n它与针对 Oracle 和 Sybase\
  \ 的 SSMA 差异甚少，我实在无法在不无耻重复的情况下再描述一遍。因此，只要你安装了 MySQL ODBC 驱动程序来处理与 MySQL 的连接，你就可以使用\
  \ SSMA 轻松快速地将多个表迁移到 SQL Server。唯一的注意事项是，根据我的经验，通过 ODBC 进行迁移的吞吐量可能比文本导出和导入慢一些。\n\n\
  针对 Oracle/Sybase 和 MySQL 的 SSMA 之间为数不多的差异之一是 MySQL 连接对话框，其外观如 图 4-26 所示。\n\n![9781430247913_Fig04-26.jpg](img/9781430247913_Fig04-26.jpg)\n\
  图 4-26. SSMA for MySQL 连接对话框\n\n#### 提示、技巧与陷阱\n\n*   你可以在 `www.microsoft.com/sqlserver/en/us/product-info/migration-tool.aspx#MySQL`\
  \ 找到有关迁移整个数据库的有用资源。\n\n## 4-12. 从 Sybase Adaptive Server Enterprise (ASE) 加载数据\n\
  \n### 问题\n\n公司网络上有 Sybase 数据库，你需要从中提取数据加载到 SQL Server 中。\n\n### 解决方案\n\n使用 SSMA\
  \ for Sybase 来传输数据。请遵循以下步骤：\n\n1.  下载最新版本的 SQL Server Migration Assistant for Sybase。当前版本为\
  \ 5.2，可从 `www.microsoft.com/en-us/download/details.aspx?id=28765` 获取。\n2.  安装 SSMA\
  \ 和 SSMA for Sybase 5.2 扩展包。后者会要求你提供一个要连接的服务器，如 图 4-27 所示。\n\n    ![9781430247913_Fig04-27.jpg](img/9781430247913_Fig04-27.jpg)\n\
