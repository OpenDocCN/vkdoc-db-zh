- "# 6-7. 将文件及其属性导入 SQL Server\n\n## 问题\n你想使用 SSIS 将文件及其属性导入并存储到 SQL Server 表中，作为高效文件管理的一个步骤。\n\
  \n## 解决方案\n通过配置一个导入列任务来加载文件，然后添加一个脚本任务来添加所需的文件元数据，从而使用 SSIS 完成此操作。你可以按如下步骤进行。\n\n\
  1.  创建以下目标表 (`C:\\SQL2012DIRecipes\\CH06\\tblCarPhotos.Sql`)：\n    ```sql\n    CREATE\
  \ TABLE CarSales_Staging.dbo.CarPhotos\n    (\n        ID int IDENTITY(1,1) NOT\
  \ NULL,\n        FileName varchar(50) NULL,\n        FileExtension varchar(10) NULL,\n\
  \        DirectoryName varchar(150) NULL,\n        FileSize bigint NULL,\n     \
  \   DateFileCreated datetime2(7) NULL,\n        DateFileModified datetime2(7) NULL,\n\
  \        ItemImage varbinary(max) NULL,\n        UNIQUE NONCLUSTERED (ID ASC )\n\
  \    );\n    GO\n    ```\n2.  创建一个新的 SSIS 包，并添加一个新的数据流任务。单击“数据流”选项卡以编辑该数据流任务。\n\
  3.  为目标数据库 (`CarSales_Staging`) 添加一个新的 OLEDB 连接管理器，并将其命名为 `CarSales_Staging_OLEDB`。\n\
  4.  在数据流窗格中添加一个脚本组件。出现提示时，将其设置为“源”。将其命名为 `Script Component to collect source files`。\n\
  5.  双击脚本组件进行编辑。将脚本语言设置为 Microsoft Visual Basic 2010。\n6.  单击左侧的“输入和输出”。在“输入输出列”列表视图中选择\
  \ Output 0，并将其重命名为 `SourceOutput`。\n7.  在“输入输出列”列表视图中展开 `SourceOutput`，然后展开“输出列”。添加以下列：\n\
  \    | 列名 | 列类型 |\n    | --- | --- |\n    | `FileExtension` | 字符串 - 10 |\n    |\
  \ `FileName` | 字符串 - 50 |\n    | `DirectoryName` | 字符串 - 150 |\n    | `FileSize`\
  \ | 8 字节有符号整数 |\n    | `DateModified` | 日期 |\n    | `DateCreated` | 日期 |\n    |\
  \ `FullPath` | 字符串 - 150 |\n\n    结果应类似于 图 6-11。\n\n    ![9781430247913_Fig06-11.jpg](img/9781430247913_Fig06-11.jpg)\n\
  \    图 6-11. 源列定义\n\n8.  在 Imports 区域中添加以下行：\n    ```vb\n    Imports System.IO\n\
  \    ```\n9.  单击左侧的“脚本”，然后单击“编辑脚本”。用以下内容替换 `CreateNewOutputRows` 方法 (`C:\\SQL2012DIRecipes\\\
  CH06\\FileAttributes.vb`)：\n    ```vb\n    Public Overrides Sub CreateNewOutputRows()\n\
  \        Dim DrInfo As New IO.DirectoryInfo(\"C:\\SQL2012DIRecipes\\CH06\")\n  \
  \      Dim fInfo As IO.FileInfo() = DrInfo.GetFiles(\"*.jpg\")\n\n        For Each\
  \ FI In fInfo\n            SourceOutputBuffer.AddRow()\n            SourceOutputBuffer.FullPath\
  \ = FI.FullName\n            SourceOutputBuffer.FileName = FI.Name\n           \
  \ SourceOutputBuffer.FileExtension = FI.Extension\n            SourceOutputBuffer.DirectoryName\
  \ = FI.DirectoryName\n            SourceOutputBuffer.FileSize = FI.Length\n    \
  \        SourceOutputBuffer.DateCreated = File.GetCreationTime(FI.FullName)\n  \
  \          SourceOutputBuffer.DateModified = File.GetLastWriteTime(FI.FullName)\n\
  \        Next\n    End Sub\n    ```\n10. 关闭脚本窗口。单击“确定”。\n11. 在数据流窗格中添加一个导入列任务，并将脚本任务连接到它。将其命名为\
  \ `Import Files`，然后双击进行编辑。\n12. 选择“输入列”选项卡，然后选择 `FullPath`。这将向 SSIS 指示包含文件位置的列。对话框应类似于\
  \ 图 6-12。\n    ![9781430247913_Fig06-12.jpg](img/9781430247913_Fig06-12.jpg)\n \
  \   图 6-12. 指定包含文件路径的列\n13. 选择“导入和输出属性”选项卡。展开“输入列输出”节点，然后单击“添加列”。将新列重命名为 `ImageColumn`。\n\
  14. 选择 `ImageColumn`。记下该列的 ID（这是内部谱系 ID）。对话框应类似于 图 6-13。\n    ![9781430247913_Fig06-13.jpg](img/9781430247913_Fig06-13.jpg)\n\
  \    图 6-13. 文件的输出列\n15. 展开“导入列输入”节点，然后展开“输入列”。单击“Full Path”。在 `FileDataColumnID`\
  \ 中输入你刚刚记下的 ID。对话框应类似于 图 6-14。\n    ![9781430247913_Fig06-14.jpg](img/9781430247913_Fig06-14.jpg)\n\
  \    图 6-14. 设置 `FileDataColumnID`\n16. 单击“确定”确认。\n17. 在数据流窗格中添加一个 OLEDB 目标。将其命名为\
  \ `Load files and attributes`。将导入列任务连接到它。双击进行配置。选择你在步骤 3 中配置的 OLEDB 连接管理器 (`CarSales_Staging_OLEDB`)。将数据访问模式选择为“表或视图”，然后选择你创建的表（在此示例中为\
  \ `dbo.CarPhotos`）。\n18. 映射列，如下所示：\n    | 源列 | 目标列 |\n    | --- | --- |\n    | `FileName`\
  \ | `FileName` |\n    | `FileExtension` | `FileExtension` |\n    | `DirectoryName`\
  \ | `DirectoryName` |\n    | `FileSize` | `FileSize` |\n    | `FileCreated` | `DateFileCreated`\
  \ |\n    | `FileModified` | `DateFileModified` |\n    | `ImageColumn` | `ItemImage`\
  \ |\n19. 单击“确定”确认。最终的包将如 图 6-15 所示。\n    ![9781430247913_Fig06-15.jpg](img/9781430247913_Fig06-15.jpg)\n\
  \    图 6-15. 用于导入带属性的多个文件的已完成 SSIS 包\n\n你现在可以运行该包了。源目录中所有具有所选扩展名的文件都将被加载到 SQL Server\
  \ 中。\n\n## 工作原理\nSSIS 还有一种“原生”方式将文件（作为文本或二进制文件）导入 SQL Server。这种方法避免了你必须使用存储过程并向其传递变量。它使用一个名为“导入列”任务的\
  \ SSIS 转换。此处使用的过程加载指定目录中的每个文件，并收集各种属性并将其写入同一张表。\n\n然而，在我看来，用它来导入一两个文件太费功夫了，这种方法只有在处理数百甚至数千个文件时才能真正发挥作用。因此，我向你展示了一种使用导入列任务加载整个目录中二进制文件的方法。它展示了如何不仅将\
  \ SSIS 脚本任务用作数据源，还作为利用 `.Net IO` 类的一种方式。\n\n\n## NET IO\n\n`NET IO` 类用于获取每个源文件的所有相关文件属性，这些属性可以与二进制数据一起存储在\
  \ SQL Server 表中。值得注意的是，这种方法并非没有缺点，主要有以下几点：\n\n*   它很慢——比前面描述的 T-SQL 方法慢几个数量级。\n\
  *   它需要大量的服务器资源——特别是内存——并可能导致基于内存的错误。\n*   每个文件限制为最大 2 吉字节。这是因为它使用了 `DT_IMAGE` SSIS\
  \ 数据类型，这是一个最大大小为 2ˆ31^(–1) (2,147,483,647) 字节的二进制值。\n\n#### 提示、技巧与陷阱\n\n*   如果你的数据库启用了\
  \ `FILESTREAM`，你也可以将 `ItemImage` 列定义为 `FILESTREAM` 列，因为 SSIS 可以像加载到 `VARBINARY(MAX)`\
  \ 列一样轻松地将文件加载到 `FILESTREAM` 列中。在这种情况下，表的 DDL 将如下所示（假设你已创建了一个名为 `CarSalesFS` 的文件组）（`C:\\\
  SQL2012DIRecipes\\CH06\\CarPhotosFilestream.Sql`）：\n\n```sql\nCREATE TABLE dbo.CarPhotosFS\n\
  (\n     ID int IDENTITY(1,1) NOT NULL,\n     ItemID uniqueidentifier ROWGUIDCOL\
  \  NOT NULL,\n     FileName varchar(50) NULL,\n     FileExtension varchar(10) NULL,\n\
  \     DirectoryName varchar(150) NULL,\n     FileSize bigint NULL,\n     DateFileCreated\
  \ datetime2(7) NULL,\n     DateFileModified datetime2(7) NULL,\n     ItemImage varbinary(max)\
  \ FILESTREAM  NULL,\n UNIQUE NONCLUSTERED\n (\n ItemID ASC\n )WITH (PAD_INDEX  =\
  \ OFF, STATISTICS_NORECOMPUTE  = OFF, IGNORE_DUP_KEY = OFF, ALLOW_ROW_LOCKS  = ON,\
  \ ALLOW_PAGE_LOCKS  = ON) ON PRIMARY\n ) ON PRIMARY FILESTREAM_ON CarSalesFS\n```\n\
  \n*   当然，你可以将目录和文件过滤器设置为 SSIS 变量，从而使这个包更加用户友好。\n\n## 6-8. 加载 Visual FoxPro 文件\n\n\
  ### 问题\n你需要将数据从 Visual FoxPro 文件加载到 SQL Server 中。\n\n### 解决方案\n使用 SSIS 和 Visual\
  \ FoxPro 的 OLEDB 提供程序，作为数据流任务的一部分加载数据。具体步骤如下：\n\n1.  首先，如果你还没有这样做，需要从 Microsoft\
  \ 网站（目前在 `www.microsoft.com/en-us/download/details.aspx?id=14839`）下载 Visual FoxPro\
  \ OLEDB 驱动程序。下载后，你需要安装它。然后你将能够使用 `VFPOLEDB.1` 提供程序连接到 FoxPro 数据库文件和数据库。\n2.  创建一个新的\
  \ SSIS 包，并在控制流窗格上添加一个数据流任务。双击编辑该任务。\n3.  在连接管理器选项卡中右键单击，添加一个新的 OLEDB 连接。确保选择 Microsoft\
  \ OLEDB Provider for Visual FoxPro。输入（或复制粘贴）包含要导入的表的 FoxPro 文件的路径。你应该得到类似 图 6-16\
  \ 的内容。\n4.  确认连接管理器。向数据流窗格添加一个新的 OLEDB 源并编辑它。选择你刚刚创建的连接管理器。从可用数据表列表中选择所需的表——或者输入\
  \ SQL 以选择你需要的数据子集。\n5.  确认，添加一个 OLEDB 目标，连接这两个任务，并将列映射到目标表（或根据需要创建它）。\n6.  你现在可以运行该包并导入你的数据。\n\
  \n### 工作原理\n是的，外面仍然有大量的 Visual FoxPro 应用程序——毕竟它是 Microsoft 的产品。事实上，一些商业数据提供商仍然使用它作为标准数据格式。\n\
  \n因此，假设你需要将数据从 Visual FoxPro 获取到 SQL Server 中，至少有我知道的四种方法，包括：\n\n*   OLEDB 链接服务器\n\
  *   SSIS over OLEDB\n*   SSIS using ODBC\n*   Visual FoxPro 升级向导\n\n让我们明确一点。我不会在这里详尽地回顾所有这些方法。对我来说，将数据从\
  \ Visual FoxPro 获取到 SQL Server 的最佳和最简单方法是使用 OLEDB 和 SSIS。所以这是我在这个配方中展示的唯一方法。我的推理是，一旦你安装了\
  \ Visual FoxPro 提供程序，整个过程就是一个相当标准的 SSIS 导入过程。\n\n如果你愿意，可以使用 ODBC 和 .NET 提供程序（如配方\
  \ 6-12 中所述），但这比 OLEDB 提供程序设置起来要慢得多且更麻烦。然而，如果你在使用 OLEDB 时遇到无法克服的困难，可能需要使用它。\n\n####\
  \ 提示、技巧与陷阱\n\n*   如果你希望使用升级向导，可以在 CodePlex 上找到 `http://vfpx.codeplex.com/releases/view/10224`。\n\
  *   有趣的是，安装 `VFPOLEDB.1` 提供程序不会注册它（至少不会允许 SQL Server 创建链接服务器）。网上有（不受支持的）解决方法，但如果你需要一个链接服务器，那么通过\
  \ OLEDB 的 ODBC 可能是最安全的解决方案——尽管也是最慢的。\n\n## 6-9. 从 dBase 导入数据\n\n### 问题\n你需要将遗留数据从\
  \ dBase 文件加载到 SQL Server 中。\n\n### 解决方案\n使用 SSIS 和适当配置的 OLEDB 连接管理器，作为 SSIS 数据流的一部分加载\
  \ dBase 文件。\n\ndBase 文件可以像这样加载：\n\n1.  将任何超过八个字符的 dBase 数据文件重命名为旧的 DOS 8.3 格式。\n\
  2.  创建一个新的 SSIS 包。添加一个数据流任务。\n3.  添加一个 OLEDB 连接管理器。将其配置为连接到目标数据库。\n4.  对于 dBase\
  \ 源文件，添加一个 OLEDB 连接管理器。将提供程序设置为 Microsoft Office 12.0 Access Database Engine OLEDB\
  \ Provider。\n5.  将数据库文件名设置为源文件（仅路径）。在此示例中，它是 `C:\\SQL2012DIRecipes\\CH06\\`。\n6.\
  \  在左侧单击“所有”。将“扩展属性”设置为 `dBase III`、`dBase IV` 或 `dBase 5.0`，具体取决于你使用的 dBase 文件版本。\n\
  7.  确认，点击两次“确定”。\n8.  添加一个数据流任务。双击进行编辑。\n9.  添加一个 OLEDB 源。双击进行编辑。选择与步骤 3 中定义的 OLEDB\
  \ 连接管理器相对应的 OLEDB 连接管理器。\n10. 将数据访问模式设置为“表或视图”。\n11. 从表列表中选择 dBase 文件。点击“确定”确认。\n\
  12. 添加一个目标 OLEDB 任务。使用步骤 2 中定义的 OLEDB 连接管理器进行配置。将源任务连接到它。运行该包。\n\n### 工作原理\n可能是所有数据文件格式中最古老的\
  \ dBase，在许多组织中仍然可以找到。考虑到它已经存在了大约三十多年，这很了不起。所以，万一你需要加载 dBase 数据文件，我想向你展示如何操作。我觉得这个配方是不言自明的，因为它本质上是一个标准的数据加载过程——除了一点有趣之处：源数据库文件名是存储\
  \ dBase 文件的目录。\n\n#### 提示、技巧与陷阱\n\n*   要正常工作，此配方假定你已如配方 1-1 中所述安装了 ACE（Access Database\
  \ Engine）驱动程序。如果你在 32 位环境中，那么你可以使用 Jet 提供程序代替 ACE 提供程序（如果你愿意的话）。在 64 位环境中，只有 ACE\
  \ 提供程序有效，除非你以 32 位模式运行包。\n*   确保按照古老的 8.3 格式命名文件，不要包含空格。\n\n## 6-10. 从 Web 服务加载数据\n\
  \n### 问题\n你希望作为 ETL 过程的一部分，访问 Web 服务提供程序提供的参考数据。\n\n\n\n"
- "# 解决方案\n\n使用 SSIS Web 服务任务来获取 ETL 流程中所需的数据。以下步骤说明了如何查找货币转换数据并将其应用于 SSIS 管道中的数据。\n\
  \n## 创建 WSDL 文件\n\n创建一个空白文件，用于后续下载 WSDL（Web 服务描述语言）。在本例中，该文件名为 `C:\\SQL2012DIRecipes\\\
  CH06\\CurrencyConversion.wsdl`。\n\n## 创建数据库表\n\n在 CarSales_Staging 数据库（`C:\\SQL2012DIRecipes\\\
  CH06\\tblStockInDollars.Sql`）中创建下表：\n\n```sql\nCREATE TABLE CarSales_Staging.dbo.StockInDollars\n\
  (\n ID bigint NULL,\n Make varchar(50) NULL,\n Marque nvarchar(50) NULL,\n Mileage\
  \ numeric(32, 4) NULL,\n Cost_PriceGBP numeric(18, 2) NULL,\n Cost_PriceUSD numeric(18,\
  \ 2) NULL,\n ExchangeRate float NULL\n) ;\nGO\n```\n\n## 创建 SSIS 包和连接\n\n创建一个新的\
  \ SSIS 包。\n向 SSIS 包中添加以下两个 OLEDB 连接管理器：\n- `CarSales_OLEDB`，将其配置为连接到 `CarSales`\
  \ 数据库。\n- `CarSales_Staging_OLEDB`，将其配置为连接到 `CarSales_Staging` 数据库。\n右键单击“控制流”窗格，向\
  \ SSIS 包添加以下变量：\n![image](img/untable6-2.jpg)\n“变量”窗格应如 图 6-17 所示。\n![9781430247913_Fig06-17.jpg](img/9781430247913_Fig06-17.jpg)\n\
  图 6-17. Web 服务任务的变量窗格\n\n## 配置 HTTP 连接管理器\n\n在“连接管理器”选项卡中右键单击。选择“新建连接”。您应该会看到如 图\
  \ 6-18 所示的对话框。\n![9781430247913_Fig06-18.jpg](img/9781430247913_Fig06-18.jpg)\n\
  图 6-18. 添加 HTTP 连接管理器\n\n选择 `HTTP`。单击 `添加`。\n右键单击该连接管理器。选择 `重命名` 并将其命名为 `WebServicesConnection`。\n\
  双击 `WebServicesConnection` 连接管理器。通过在 `服务器 URL` 字段中输入所需的 URL，将 HTTP 连接管理器配置为连接到您将使用的\
  \ Web 服务。在本例中，URL 是 `http://www.webservicex.net/CurrencyConvertor.asmx?WSDL`，这是一个用于获取货币转换信息的免费\
  \ Web 服务。您应该会看到一个类似 图 6-19 的对话框。\n![9781430247913_Fig06-19.jpg](img/9781430247913_Fig06-19.jpg)\n\
  图 6-19. 为 Web 服务配置 HTTP 连接管理器\n\n点击 `确定` 确认您的配置。\n\n## 配置 Web 服务任务\n\n在“控制流”窗格上添加一个\
  \ Web 服务任务。将其命名为 `查找美元兑英镑汇率`，然后双击进行编辑。\n确保 HTTP 连接设置为您之前创建的 `WebServicesConnection`。\n\
  将 WSDL 文件连接到您在步骤 1 中创建的空白文件。在本例中，该文件为 `C:\\SQL2012DIRecipes\\CH06\\CurrencyConversion.wsdl`。确保\
  \ `覆盖 WSDL 文件` 设置为 `True`。结果应与 图 6-20 所示接近。\n![9781430247913_Fig06-20.jpg](img/9781430247913_Fig06-20.jpg)\n\
  图 6-20. 配置 Web 服务任务的常规窗格\n\n单击 `下载 WSDL` 以获取 WSDL 文件，该文件允许 Web 服务任务使用 Web 服务。\n\
  单击 `输入` 以查看输入窗格。选择您将使用的服务（本例中为 `CurrencyConvertor`）和您将应用的方法（本例中为 `ConversionRate`）。\n\
  选中 `ToCurrency` 元素的变量，并选择 `User::ConversionCurrency` 变量作为其值。对话框应如 图 6-21 所示。\n![9781430247913_Fig06-21.jpg](img/9781430247913_Fig06-21.jpg)\n\
  图 6-21. 配置 Web 服务任务的输入窗格\n\n单击 `输出` 以查看输出窗格。选择 `变量` 作为 `输出类型` 并选择变量 `XMLOutput`。对话框应如\
  \ 图 6-22 所示。\n![9781430247913_Fig06-22.jpg](img/9781430247913_Fig06-22.jpg)\n图 6-22.\
  \ 配置 Web 服务任务的输出窗格\n\n点击 `确定` 确认您的修改。返回到“控制流”窗格。\n\n## 配置脚本任务\n\n在“控制流”窗格中，添加一个脚本任务。将\
  \ Web 服务任务连接到它。将其命名为 `提取返回值`。双击进行编辑。将 `XMLOutput` 变量添加为只读变量，将 `ConversionRate` 变量添加为读写变量。对话框应如\
  \ 图 6-23 所示。\n![9781430247913_Fig06-23.jpg](img/9781430247913_Fig06-23.jpg)\n图 6-23.\
  \ 配置了变量的脚本任务\n\n单击 `编辑脚本`。\n在 `Imports` 区域，添加以下内容：\n```vbnet\nImports System.Xml\
  \        '作为非基本 SSIS 任务的一部分而添加\n```\n将 `Main` 方法替换为以下内容（`C:\\SQL2012DIRecipes\\\
  CH06\\WebServices.vb`）：\n```vbnet\n   Public Sub Main()\n        Dim xDdoc As New\
  \ Xml.XmlDocument\n        xDdoc.LoadXml(Dts.Variables(\"XMLOutput\").Value.ToString)\n\
  \        Dts.Variables(\"ConversionRate\").Value = _\n            CDbl(xDdoc.SelectSingleNode(\"\
  double[1]\").InnerText)\n        Dts.TaskResult = ScriptResults.Success\n   End\
  \ Sub\n```\n关闭脚本窗口。\n单击 `确定` 关闭脚本任务编辑器。\n\n## 配置数据流任务\n\n向“数据流”窗格添加一个数据流任务，并将其命名为\
  \ `加载数据并转换价格`。将脚本任务连接到它。“控制流”窗格应如 图 6-24 所示。\n![9781430247913_Fig06-24.jpg](img/9781430247913_Fig06-24.jpg)\n\
  图 6-24. 使用 Web 服务的整体流程\n\n双击以编辑数据流任务。\n在“数据流”窗格中，添加一个 OLE DB 源任务。按如下方式配置：\n- **连接管理器：**\
  \ `CarSales_OLEDB`\n- **数据访问模式：** `SQL 命令`\n- **SQL 命令文本：** `SELECT ID, Make, Marque,\
  \ Mileage FROM Stock`\n\n添加一个派生列任务，并将 OLE DB 源任务连接到它。添加两个名为 `Cost_PriceUSD` 和 `ExchangeRate`\
  \ 的新派生列。将 `Cost_PriceUSD` 的表达式设置为 `Cost_Price * @[User::ConversionRate]`，将 `ExchangeRate`\
  \ 的表达式设置为 `@[User::ConversionRate]`。对话框应如 图 6-25 所示。\n![9781430247913_Fig06-25.jpg](img/9781430247913_Fig06-25.jpg)\n\
  图 6-25. 使用变量计算派生列的派生列转换\n\n单击 `确定` 确认您的修改并返回到“数据流”窗格。\n添加一个 OLE DB 目标任务。将派生列任务连接到它，并按如下方式配置：\n\
  - **OLE DB 连接管理器：** `CarSales_Staging_OLEDB`\n- **数据访问模式：** `表或视图 - 快速加载`\n- **表或视图的名称：**\
  \ `Dbo.StockInDollars`\n\n单击 `映射`。确保源列已映射到目标列。\n单击 `确定`。数据流应如 图 6-26 所示。\n![9781430247913_Fig06-26.jpg](img/9781430247913_Fig06-26.jpg)\n\
  图 6-26.\n\n\n"
- '# 最终数据流


  ## 工作原理


  如有必要，你可以使用 SSIS Web 服务任务将数据插入 SSIS 包。这需要满足两个条件：


  *   访问 Web 服务提供商。

  *   理解 Web 服务所需的描述文件。


  这两者都可以从许多免费的 Web 服务提供商处获得。我选择使用 `www.webservicex.net`。当然，你也可以使用任何可用的 Web 服务。


  ![image](img/sq.jpg) **注意** 由于本示例使用的是免费的第三方 Web 服务，无法保证该 Web 服务在未来仍然可用或其方法不会更改。


  首先，我们定义了要调用的 Web 服务，并使用 HTTP 连接管理器与其建立连接。然后，我们将描述该 Web 服务的 Web 服务描述语言文件下载到一个现有的空文件中。有了这些元素后，我们便能够配置
  Web 服务任务来调用我们所用 Web 服务的 `ConversionRate()` 方法。当然，在你自己的环境中，你可能会使用不同的 Web 服务，因此会看到不同的可用
  Web 服务和方法。接着，我们将输出——即从 Web 服务返回的 XML——设置到一个变量。（也可以将其写入磁盘上的文件。）我们将目标货币的选择定义为一个变量，以使任务更易于重用。这个变量以及目标货币都是该特定
  Web 服务所要求的元素。


  配置好 Web 服务任务后，我们就可以使用其输出。每个 Web 服务返回的 XML 各不相同，因此在实际环境中处理输出的具体方式也会有所不同。在本示例中，我们使用了一个脚本任务来接收从
  Web 服务调用返回的“原始” XML 片段，并利用 `.NET System.XML` 类的功能来读取 XML 中的值。然后，该值从脚本任务传递到一个 SSIS
  变量 (`ConversionRate`)，该变量用于将从 `CarSales.Stock` 加载的源数据转换为 `CarSales_Staging.StockInDollars`。这是通过一个派生列转换来完成的，该转换不仅添加了新的美元成本，还添加了汇率。当然，你可以使用
  Web 服务的输出以任何适合你需求的方式进行调用。


  #### 提示、技巧与陷阱


  *   如果需要，你可以将输出设置到变量。

  *   在派生列转换中使用变量和列时，你可以从对话框的左上窗格将变量和列拖放到“表达式”区域。


