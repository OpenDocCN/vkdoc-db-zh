- "# 7-8. 从 T-SQL 定期导出文本文件\n\n## 问题\n您希望定期导出文本文件，但希望使用 T-SQL 而不是其他方式。\n\n## 解决方案\n\
  为目标文本文件设置一个链接服务器，然后使用 T-SQL `INSERT` 将数据导出到该文件。\n\n1.  首先为目录定义一个链接服务器。执行类似以下位于 `C:\\\
  SQL2012DIRecipes\\CH07\\TextFileLinkedServer.sql` 的 T-SQL：\n    ```sql\n    EXECUTE\
  \ Master.dbo.sp_addlinkedserver\n      'srv_Text',                        -- 链接服务器名称\n\
  \      'ACE',                             -- 产品名称\n      'Microsoft.ACE.OLEDB.12.0',\
  \        -- 提供程序名称\n      'C:\\SQL2012DIRecipes\\CH02',        -- 数据源\n      NULL,\
  \                              -- 位置\n      'Text';                            --\
  \ 提供程序字符串\n    GO\n    ```\n\n2.  在 SSMS 中通过展开“服务器对象” -> “链接服务器”，右键单击服务器名称并选择“属性”来设置访问数据目录的安全上下文。单击“安全性”并选择“不使用安全上下文进行”。\n\
  \n3.  使用类似以下的 T-SQL 将数据追加到文件：\n    ```sql\n    INSERT INTO srv_Text...InsertFile#txt\
  \ (IDNo,ClientNameHere)\n      SELECT       ID,ClientName FROM dbo.Client;\n   \
  \ ```\n\n## 工作原理\n对于更定期的文本导出——但其限制与使用 `OPENROWSET` 进行临时导出所述的限制基本相同——您可以设置一个指向文本文件的链接服务器。这是使用\
  \ `sp_addlinkedserver` 存储过程完成的。\n\n## 提示、技巧和陷阱\n*   如果您正在设置链接服务器，配置一个 `Schema.ini`\
  \ 文件绝对值得。这些在配方 2-6 中有描述。\n*   您不能在链接的文本文件中删除行。\n\n\n\n所有为 `OPENROWSET` 指定的注意事项同样适用于链接服务器导出。目标文件必须在运行命令前创建好。此过程只会向文件追加数据。列标题必须存在于目标文件中。\n\
  \n### 7-9. 导出并压缩多个表\n\n#### 问题\n\n你需要从 SQL Server 导出多个表，并在输出过程中将它们压缩。\n\n#### 解决方案\n\
  \n使用 SSIS 调用 BCP 将表导出为文件，然后使用脚本任务压缩输出文件。以下是导出和压缩表的一种方法。\n\n1.  使用以下 DDL 创建一个表，用于存放数据库中需要处理的表名列表：\n\
  \    ```\n    CREATE TABLE CarSales_Staging.dbo.TableList\n    (\n     ID int IDENTITY(1,1)\
  \ NOT NULL,\n     TableName NVARCHAR(50) NULL\n    ) ;\n    GO\n    ```\n2.  将所有要导出的表名添加到此表中。\n\
  3.  创建一个新的 SSIS 包。右键单击“连接管理器”选项卡，选择“新建 OLE DB 连接”。如果已有到数据库的现有连接，则选择它；否则，单击“新建”并选择服务器、安全模式和数据库。单击“确定”两次以完成连接创建。\n\
  4.  添加以下三个新变量：\n    | 变量 | 类型 | 注释 |\n    | --- | --- | --- |\n    | `oTblList`\
  \ | Object | 用于保存表名的 ADO 记录集。 |\n    | `sTableName` | String | 在脚本任务中用于单独处理每个表。\
  \ |\n    | `FilePath` | String | 在脚本任务中用于指定 BCP 和 `.gz`（压缩）文件所在路径。 |\n5.  你还应该将路径指定为\
  \ `FilePath` 变量的值——本例中为 `C:\\SQL2012DIRecipes\\CH07`。\n6.  在“控制流”窗格上添加一个 OLE DB\
  \ 数据源，双击进行编辑。\n7.  在“数据流”窗格中，添加一个 OLE DB 数据源任务，双击进行编辑。选择刚刚创建的 OLE DB 连接管理器，并选择“SQL\
  \ 命令”作为数据访问模式。输入以下 SQL 作为 SQL 命令文本：\n    ```\n    SELECT TableName FROM TableList\n\
  \    ```\n8.  在“任务”窗格上添加一个记录集目标，双击进行编辑。在 `VariableName` 弹出菜单中选择 `User::oTblList`\
  \ 作为将被数据流过程填充的变量。你应该会看到一个类似于 图 7-10 的对话框。\n    ![9781430247913_Fig07-10.jpg](img/9781430247913_Fig07-10.jpg)\n\
  \    图 7-10. 为记录集目标设置对象变量\n9.  单击“确定”，然后单击“控制流”选项卡。\n10. 在“数据流”任务下的“控制流”区域添加一个 Foreach\
  \ 循环容器。将前者连接到 Foreach 循环容器。\n11. 在 Foreach 循环容器中添加一个“执行进程”任务。双击进行编辑。\n12. 单击“进程”（左侧）并输入以下内容：\n\
  \    | 进程 | 参数 | 注释 |\n    | --- | --- | --- |\n    | `Executable` | `C:\\Program\
  \ Files\\Microsoft SQL Server\\110\\Tools\\Binn\\bcp.exe` | SQL Server BCP 可执行文件。对于\
  \ SQL Server 2012，这将是 `C:\\Program Files\\Microsoft SQL Server\\110\\Tools\\Binn\\\
  bcp.exe`。对于 SQL Server 2005 是 90，SQL Server 2008 是 100。 |\n    | `Arguments` | `CarSales.dbo.\
  \ OUT .bcp -N -T` | 核心 BCP 命令（减去表和文件名）。 |\n    | `WorkingDirectory` | `\\\\Server\\\
  Path` | BCP 文件将导出到的目录。 |\n13. 你应该会看到类似 图 7-11 所示的内容。\n    ![9781430247913_Fig07-11.jpg](img/9781430247913_Fig07-11.jpg)\n\
  \    图 7-11. 从 SSIS 执行进程任务导出 BCP 文件\n14. 单击“表达式”，然后单击以显示“属性表达式编辑器”。选择 `Arguments`，如\
  \ 图 7-12 所示。\n    ![9781430247913_Fig07-12.jpg](img/9781430247913_Fig07-12.jpg)\n\
  \    图 7-12. 在 SSIS 中定义表达式\n15. 单击以显示“表达式生成器”。输入以下表达式：\n    ```\n    \"Book_TestData.dbo.\"\
  \ + @[User::sTableName]  + \" OUT \" + @[User::sTableName] + \".bcp -N -T\"\n  \
  \  ```\n16. 你应该会看到一个类似于 图 7-13 的对话框。\n    ![9781430247913_Fig07-13.jpg](img/9781430247913_Fig07-13.jpg)\n\
  \    图 7-13. 构建运行 BCP 的表达式\n17. 测试表达式（通过单击“计算表达式”）。然后单击“确定”三次以确认“执行进程”任务并返回到“数据流”窗格。\n\
  18. 在 Foreach 循环容器内、“执行进程”任务下方，向“数据流”窗格添加一个“脚本任务”。将后者链接到前者。\n19. 双击“脚本任务”进行编辑，然后单击左侧的“脚本”。在右侧的“脚本”窗格中，输入\
  \ `sTableName` 作为只读变量。\n20. 单击“设计脚本”。将 `Main` 方法替换为以下代码（`C:\\SQL2012DIRecipes\\\
  CH07\\CompressFiles.vb`）：\n    ```\n    Public Sub Main()\n\n        Dim fileName\
  \ As String\n        Dim filePath As String\n        Dim streamWriter As StreamWriter\n\
  \        Dim fileData As String\n        Dim WriteBuffer As Byte()\n        Dim\
  \ GZStream As GZipStream\n\n        fileName = Dts.Variables(\"sTableName\").Value.ToString\n\
  \        filePath = Dts.Variables(\"FilePath\").Value.ToString\n\n        Dim fileStream\
  \ As New FileStream(filePath & fileName, FileMode.Open, FileAccess.Read)\n\n   \
  \     WriteBuffer = New Byte(CInt(fileStream.Length)) {}\n\n        fileStream.Read(WriteBuffer,\
  \ 0, WriteBuffer.Length)\n\n        Dim strDestinationFileName As String\n     \
  \   strDestinationFileName = filePath & fileName & \".gz\"\n\n        Dim fileStreamDestination\
  \ As New FileStream(strDestinationFileName, FileMode.OpenOrCreate, FileAccess.Write)\n\
  \n        GZStream = New GZipStream(fileStreamDestination, CompressionMode.Compress,\
  \ True)\n\n        GZStream.Write(WriteBuffer, 0, WriteBuffer.Length)\n\n      \
  \  fileStream.Close()\n        GZStream.Close()\n        fileStreamDestination.Close()\n\
  \n        Dts.TaskResult = Dts.Results.Success\n\n    End Sub\n    ```\n21. 保存并关闭脚本编辑器。单击“确定”关闭“脚本任务”。\n\
  \n你现在可以运行该过程，它将把 `TableList` 表中定义的所有表导出为 BCP 文件和压缩的（`.gz`）文件。\n\n### 工作原理\n\nBCP\
  \ 导出是传输多个表的有效方法——前提是数据库的设计和约束允许以这种方式重新导入数据。这个方法展示了 SSIS 如何真正发挥作用，它不仅能从列表中选择要导出的表，还能压缩导出的文件。\n\
  \n要导出的表集保存在名为 `TableList` 的 SQL Server 表中。当然，这也可以是 Excel 电子表格或文本文件。该表使用“执行 SQL 任务”读取，该任务将表数据加载到\
  \ SSIS 对象变量中。然后，该变量由 SSIS Foreach 循环容器进行迭代，并使用 BCP 命令导出每个单独的表。这里需要注意的一点是，BCP 参数是作为\
  \ SSIS 表达式的一部分定义的。\n\n每个表导出为 BCP 文件后，使用 SSIS 脚本任务调用 `GZipStream` 类来压缩文件。\n\n> **注意**\
  \ 这个方法有趣的一点是，它不需要任何第三方软件来压缩文件。相反，它使用了 .NET 的 `GZipStream` 类来压缩文件。\n\n\n"
- "# SQL Server XML 数据导出技巧\n\n#### 提示、技巧与陷阱\n\n- 可以通过当前最主流的解压工具，或使用 `GZIPStream` 类的\
  \ SSIS 脚本任务来解压文件。\n- BCP 可执行文件的路径通常在安装时被添加到 `PATH` 系统变量中。如果未完成此操作，你可能会发现手动添加它是值得的。\n\
  - 像这样的简单脚本可以通过使用变量来保存表名等方式进行增强。如果你愿意，可以自行扩展它。\n- 此方法不能替代有效的备份策略。\n\n## 7-10. 导出小型数据集为\
  \ XML\n\n### 问题\n你需要将 SQL Server 表中的非常小的数据集导出为 XML 文件，这很可能是为了响应用户完全“临时”的请求。\n\n\
  ### 解决方案\n在 T-SQL `SELECT` 子句中手动构建 XML，然后将输出复制到文本编辑器中保存。\n\n1.  使用以下代码片段，将来自示例 CarSales\
  \ 数据库中 `Client` 表的数据，添加到 XML 文件（`C:\\SQL2012DIRecipes\\CH07\\SimpleXMLExport.sql`）中，生成格式良好的\
  \ XML：\n    ```sql\n    CREATE VIEW CarSales.dbo.vw_XMLTest\n    AS\n        SELECT\
  \ XMLCol, SortKey FROM\n        (\n            SELECT '<Root>' AS XMLCol, 0 AS SortKey\n\
  \            UNION\n            SELECT\n                '<Client>'\n           \
  \     + '<ID>' + ISNULL(CAST(ID AS VARCHAR(12)),'') + '</ID>'\n                +\
  \ '<ClientName>' + ISNULL(ClientName,'') + '</ClientName>'\n                + '</Client>'\
  \ AS XMLCol\n                ,1 AS SortKey\n            FROM dbo.Client\n      \
  \      UNION\n            SELECT '</Root>' AS XMLCol, 2 AS SortKey\n        ) MainXML\
  \ ;\n    GO\n    ```\n\n2.  在 SSMS 查询窗口中运行以下代码：\n    ```sql\n    SELECT * FROM CarSales.dbo.vw_XMLTest;\n\
  \    ```\n3.  将输出复制并粘贴到文本文件中。\n4.  保存文本文件。\n\n### 工作原理\n导出简单 XML 的最简单方法是手工构建，如此配方所示。这仅适用于你导出的\
  \ XML 确实非常简单的情况——本质上，是指你将一个表或视图导出为“扁平化”的 XML，没有层级结构。然而，如果是这种情况——那么你很幸运，因为无需将输出分解成块，你可以快速轻松地输出\
  \ XML，每条数据库记录成为一条输出记录。\n\n在生产环境中，你可能会使用 `FOR XML`，所以我必须承认，这主要是一个理论上的例子。这里我将 XML\
  \ 包装在一个视图中，但这在并非所有情况下都是必要的。将其包装在视图中的原因是为了包含 `<Root>` 元素以形成有效的 XML。通过使用硬编码的 `SortKey`\
  \ 列强制了输出的正确顺序。如果需要对 XML 记录排序，请使用辅助排序键。你可能更喜欢将 XML `SELECT` 子句包装在存储过程中——这也可以从 BCP\
  \ 运行。\n\n这个配方引出了一个问题：“什么是小型数据集？”不幸的是，答案只能是“视情况而定”。对我来说，这里使用的技术仅适用于导出少量列（考虑到手工构建\
  \ XML 很繁琐）的简单 XML 格式，并且行集足够小，可以复制和粘贴。然而，你可以根据你的需求决定何时——或何时不——使用它。由于此方法确实仅为更临时的 XML\
  \ 导出而设计，我假设简单的剪切和粘贴足以将输出保存为文件。关于更完整的导出 XML 数据的方法，请参阅配方 7-11。\n\n## 7-11. 导出较大数据集为\
  \ XML\n\n### 问题\n你希望在单个进程中将中等大小的数据集从 SQL Server 表导出为 XML 文件。如果可能，你想使用 T-SQL。\n\n\
  ### 解决方案\n创建一个 BCP 格式文件，然后与 BCP 一起使用以导出 XML 文件。\n\n以下代码片段将把包含来自 `Client` 表数据的格式良好的\
  \ XML 添加到 XML 文件中。\n\n1.  创建以下 BCP 格式文件（`C:\\SQL2012DIRecipes\\CH07\\XmlExport.Fmt`）：\n\
  \    ```\n    11.0\n    1\n    1       SQLBINARY     0       0       \"\"    1 \
  \    XmlData          \"\"\n    ```\n\n2.  使用以下 T-SQL 将 XML 输出到表中（`C:\\SQL2012DIRecipes\\\
  CH07\\ExportXMLFromTSQL.sql`）：\n    ```sql\n    IF OBJECT_ID('dbo.XMLOutput') IS\
  \ NOT NULL DROP TABLE XMLOutput;\n\n    CREATE TABLE XMLOutput (XMLCol XML);\n\n\
  \    INSERT INTO XMLOutput (XMLCol)\n\n    SELECT XMLOut FROM\n    (\n        SELECT\
  \  C.ID, ClientName, Country, Town\n        FROM    CarSales.dbo.Client C\n    \
  \    FOR XML PATH('Client'), ROOT('RootElement')\n    ) A (XMLOut);\n\n    EXEC\
  \ Master.dbo.xp_cmdshell 'BCP CarSales.dbo.XMLOutput OUT C:\\SQL2012DIRecipes\\\
  CH07\\XMLOut.xml –w –SADAM02 -T'\n    ```\n\n3.  从命令窗口中运行以下命令，以导出你在前面代码片段中创建的表：\n\
  \    ```\n    BCP XMLOutput OUT C:\\SQL2012DIRecipes\\CH07\\Clients.Xml -T -N -f\
  \ C:\\SQL2012DIRecipes\\CH07\\XmlFormat.Fmt\n    ```\n\n4.  使用以下代码行删除包含 XML 的表：\n\
  \    ```sql\n    DROP TABLE XMLOutput;\n    ```\n\n### 工作原理\n自 SQL Server 2005 出现以来，XML\
  \ 已成为 Microsoft 旗舰 DBMS 的组成部分，因此，从 SQL Server 数据库导出 XML 数据相对容易。然而，XML 是一个庞大的概念，导出数据的塑形方式可能相当复杂。因此，在涉及\
  \ XML 输出的配方中，我保持简单的 XML 输出示例，因为形成复杂 XML 本身就是一个足够庞大的主题，值得整章——甚至整本书来讨论。\n\n由于 XML\
  \ 本质上只是文本，你会看到导出除最简单 XML 之外的任何内容时，基本上有两个主要难点：\n\n- 定义（塑形）XML\n- 将通常只是一个大记录的内容导出到文本文件\n\
  \n关于定义 XML，在大多数情况下我使用 `FOR XML` 子句，因为它比尝试手工构建除最简单 XML 之外的所有内容要可取得多。建议阅读配方 7-14，简要介绍基本的\
  \ `FOR XML`。\n\n此技术使用 `FOR XML PATH` 从源表创建 XML，然后使用 BCP 导出它。值得注意的几点是：首先，目标文件不需要存在——如果存在将被覆盖。其次，必须启用\
  \ `xp_CmdShell` 才能从 T-SQL 调用 BCP。最后，不能使用临时表，因此在使用 BCP 时必须使用“真实”表。这是因为临时表对 BCP 不可见——即使你将此代码包装在存储过程中并从\
  \ BCP 调用它。\n\n当涉及到将结果输出到磁盘时，如果 XML 输出很小，通常很容易。当 XML 较大时，情况可能变得更复杂，因为 SSIS 和 BCP\
  \ 会因 `FOR XML` 生成的单记录输出而遇到问题。然而，几乎所有问题都可以通过使用各种“分块”例程来解决，这些例程允许你将 `FOR XML` 生成的单块单记录\
  \ XML 输出分解为多条记录。XML 输出的这个附加要求可能看起来很复杂，但对于大型 XML 文件来说是基础性的。更多内容将在下一个配方中介绍。\n\n####\
  \ 提示、技巧与陷阱\n\n- 如果你将查询在 SSMS 中测试好再复制到 BCP 命令行，可以避免不必要的麻烦。\n- 目标文件不需要存在——如果存在将被覆盖。\n\
  - 你总可以将 BCP 命令创建为 `.cmd` 文本文件，然后通过双击运行它，而不是在命令窗口中操作。\n- 如果你更喜欢使用 CLR 存储过程写入磁盘，请参阅配方\
  \ 10-15。\n\n\n"
- "# 7-12. 将大型数据集导出为 XML\n\n## 问题\n\n你希望将一个大型数据集导出为 XML 文件。\n\n## 解决方案\n\n使用 `BCP`\
  \ 和 `T-SQL`，并将文件分批导出，以避免创建单个庞大的 XML 输出记录。\n\n实现此功能的方法是运行以下 `T-SQL` 代码片段来批量导出 `XML`，这样可以确保处理大型数据集（`C:\\\
  SQL2012DIRecipes\\CH07\\LargeXMLOutput.sql`）：\n\n```sql\n-- 实例化临时表，将顺序 ID 映射到数据源中的唯一键\n\
  IF OBJECT_ID('Tempdb..#IDSet') IS NOT NULL DROP TABLE #IDSet;\nSELECT ID, ROW_NUMBER()\
  \ OVER (ORDER BY ID) AS ROWNO INTO #IDSet FROM dbo.Client;\n\n-- 创建临时表以保存 XML 输出和排序信息\n\
  IF OBJECT_ID('dbo.XMLOutput') IS NOT NULL DROP TABLE XMLOutput;\nCREATE TABLE XMLOutput\
  \ (XMLCol NVARCHAR(MAX), SortID INT);\n\n-- 循环变量\nDECLARE @LowerThreshold INT =\
  \ 0\nDECLARE @UpperThreshold INT\nDECLARE @Range INT = 20000\n\nSELECT @UpperThreshold\
  \ = MAX(ROWNO) FROM #IDSet;\n\n-- 添加根元素\nINSERT INTO XMLOutput (XMLCol, SortID)\
  \ VALUES (' <Root> ', 0);\n\n-- 循环遍历数据并输出 XML\nWHILE @LowerThreshold <= @UpperThreshold\n\
  BEGIN\n    INSERT INTO XMLOutput (XMLCol, SortID)\n    SELECT A.ClientXML, @LowerThreshold\n\
  \    FROM (\n        SELECT C.ID, ClientName, Country, Town\n        FROM CarSales.dbo.Client\
  \ C\n        INNER JOIN #IDSet S ON C.ID = S.ID\n        WHERE ROWNO > @LowerThreshold\
  \ AND ROWNO <= @LowerThreshold + @Range\n        FOR XML PATH('Client')\n    ) A\
  \ (ClientXML);\n\n    SET @LowerThreshold = @LowerThreshold + @Range\nEND;\n\n--\
  \ 添加闭合的根元素\nINSERT INTO XMLOutput (XMLCol, SortID) VALUES ('</ROOT > ', @LowerThreshold\
  \ + 1);\n\n-- 导出数据\nEXEC Master..xp_cmdshell 'BCP \"SELECT XMLCol  FROM CarSales.dbo.XMLOutput\"\
  \ QUERYOUT C:\\SQL2012DIRecipes\\CH07\\XMLOut.xml -w -SADAM_01\\Adam -T'\n\n-- 清理表\n\
  DROP TABLE XMLOutput\n```\n\n## 工作原理\n\n如果你执行带有 `FOR XML` 语句的 `SELECT` 查询，你会发现只输出一条记录。对于较大的数据集，输出唯一的一条记录可能会有问题，因为当使用\
  \ `BCP` 或 `SSIS` 将数据集写入磁盘时，它们可能会导致问题。因此，我们还需要研究一种将查询分解为多条记录，然后使用 `BCP` 导出每条记录的方法，如前一节所述。\n\
  \n本节中的代码工作原理如下：\n\n*   首先，它为源数据的一系列子集创建了 `XML`。\n*   然后，将这些数据添加到数据库中的一个临时表中。\n*\
  \   接着，分别添加开头和结尾的 `ROOT` 元素。\n*   最后，按正确顺序输出临时表的内容，将 `XML` 包裹在 `ROOT` 元素中。\n\n`#IDSet`\
  \ 临时表用于将源 `ID` 映射到一组连续的 `ID`，以便对数据进行分块处理。在所有情况下可能并非绝对必要，但它通常确保提取的子集大小几乎相同，并避免了当使用源\
  \ `ID` 将数据分解为块时，如果源数据中存在许多缺失 `ID` 而导致处理几乎为空的子集的开销。当源数据没有单调递增的 `ID`，和/或是多列唯一 `ID`\
  \ 时，它也至关重要，因为它可以将更复杂的源 `ID` 映射到一个简单的数字 `ID`。\n\n我建议你将 `@Range` 变量设置为一个在速度（即最少的数据库\
  \ `SELECT` 调用次数）和效率（即 `BCP` 不会因输出过大而失败）之间取得最佳平衡的值。只有通过试错，你才能找到一个最优的记录数，使得生成的 `XML`\
  \ 片段可以被 `BCP` 成功导出而不失败。记录集越小，过程越慢（因为会调用多次 `SELECT...FOR XML`）。这将取决于 `XML` 片段的大小，因此请准备好进行一些迭代测试，直到获得一个优化的过程。\n\
  \n如果你想调整此代码以将输出分解为多个 `XML` 文件，你需要：\n\n*   设置一个 `SQL` 变量作为计数器，该计数器在每次游标迭代时递增。\n*\
  \   将 `BCP` 输出脚本设置为一个 `SQL` 变量——并使用先前创建的变量作为文件名的一部分。\n*   在游标内添加头部和尾部的 `<Root>`\
  \ 元素，并在每次游标迭代时执行 `BCP` 输出。\n\n## 提示、技巧和陷阱\n\n*   在测试和调试时，最好注释掉最后的 `DROP TABLE XMLOutput`\
  \ 语句，并检查输出表是否包含你期望找到的数据。\n*   我几乎能听到 `T-SQL` 纯粹主义者对在生产代码中使用游标发出的惊恐喘息，我想补充几句辩解的话。首先，游标并非总是邪恶的——它们可以是一个简单的解决方案，因此偶尔使用它们不一定是立即反感的理由。其次，根据我的经验，在像这样导出\
  \ `XML` 时，即使对于相当大的数据集，游标也只循环几次，因此性能影响可以忽略不计。\n\n"
- "# 7-13. 创建 XML 模式\n\n## 问题\n\n你想根据 `SQL Server` 表中的 `XML` 数据创建一个 `XML` 模式文件并保存以供后用。\n\
  \n## 解决方案\n\n使用 `T-SQL` 和 `FOR XML AUTO, XMLSCHEMA`。\n\n1.  使用以下代码片段从 `SQL Server`\
  \ 表中的 `XML` 数据创建一个 `XML` 模式文件，与数据本身一起保存（`C:\\SQL2012DIRecipes\\CH07\\CreateXMLSchema.sql`）：\n\
  \n```sql\nSELECT\n  [ID]\n  ,[ClientName]\n  ,[Address1]\n  ,[Address2]\n  ,[Town]\n\
  \  ,[County]\n  ,[PostCode]\n  ,[Country]\nFROM [CarSales].[dbo].[Client]\nWHERE\
  \ 1 = 0\nFOR XML AUTO,XMLSCHEMA;\n```\n\n2.  将模式输出到行集后，只需单击它，它就会出现在新的查询窗口中，然后你可以将其保存为\
  \ `.xsd` 文件。\n\n## 工作原理\n\n`XMLSCHEMA` 与 `FOR XML AUTO` 一起使用会自动生成一个 `XML` 模式（`.xsd`）。`WHERE\
  \ 1 = 0` 子句用于防止实际的 `XML` 数据和模式被输出。当然，如果你希望同时获得模式和数据，可以省略此子句。\n\n"
- "# 7-14. 塑造 XML 导出数据\n\n## 问题\n\n你希望在导出数据为 `XML` 时，根据你的要求塑造 `XML` 结构，而不是让 `SQL Server`\
  \ 决定 `XML` 输出。\n\n## 解决方案\n\n学习使用 `FOR XML PATH` 的微妙之处，并在 `SELECT` 子句中用它来塑造 `XML`。\n\
  \n本节内容实际上由几个小节组成，因此我将独立展示几个 `XML` 输出技巧。\n\n### 无最高级元素名\n\n仅添加 `FOR XML PATH` 会给每条创建的记录添加一个\
  \ `<ROW>` 元素。要测试这一点，请运行以下 `T-SQL` 代码片段（`C:\\SQL2012DIRecipes\\CH07\\TopLevelElementXML.sql`）：\n\
  \n```sql\nSELECT\n    C.ID\n    ,C.ClientName\n    ,C.Country\nFROM dbo.Client C\n\
  FOR XML PATH;\n```\n\n这应该会从示例数据中产生以下输出（为发布目的已缩短）：\n\n```xml\n<row>\n  <ID>3</ID>\n\
  \  <ClientName>John Smith</ClientName>\n  <Country>1</Country>\n</row>\n<row>\n\
  \  <ID>4</ID>\n  <ClientName>Bauhaus Motors</ClientName>\n  <Country>2</Country>\n\
  </row>\n```\n\n### 定义最高级元素名\n\n添加要使用的元素名称（代替 `<ROW>`）的方法如下（`C:\\SQL2012DIRecipes\\\
  CH07\\TopLevelElementName.sql`）：\n\n```sql\nSELECT\n    C.ID\n    ,C.ClientName\n\
  \    ,C.Country\nFROM dbo.Client C\nFOR XML PATH('Client');\n```\n\n输出结果为（同样，已大幅缩短）：\n\
  \n```xml\n<Client>\n  <ID>3</ID>\n  <ClientName>John Smith</ClientName>\n  <Country>1</Country>\n\
  </Client>\n<Client>\n  <ID>4</ID>\n  <ClientName>Bauhaus Motors</ClientName>\n \
  \ <Country>2</Country>\n</Client>\n```\n\n### 添加 ROOT 元素\n\n为了生成结构更良好的 `XML`，你可以像下面这样添加一个根元素（`C:\\\
  SQL2012DIRecipes\\CH07\\RootElementXML.sql`）：\n\n```sql\nSELECT\n    C.ID\n    ,C.ClientName\n\
  \    ,C.Country\nFROM dbo.Client C\nFOR XML PATH('Client'), ROOT('Root');\n```\n\
  \n\n\n"
- "# 使用 `FOR XML PATH` 生成 XML\n\n```sql\nSELECT ClientName, C.Country\nFROM dbo.Client\
  \ C\nFOR XML PATH('Client'), ROOT('CarSales');\n```\n结果将会是：\n```xml\n<CarSales>\n\
  <Client>\n<ID> 3</ID>\n<ClientName> John Smith</ClientName>\n<Country> 1</Country>\n\
  </Client>\n```\n（为节省空间，省略了部分记录）\n```xml\n<Client>\n<ID> 7</ID>\n<ClientName> Slow\
  \ Sid</ClientName>\n<Country> 3</Country>\n</Client>\n</CarSales>\n```\n\n## 定义属性\n\
  如果你更倾向于以属性为中心的 XML，那么你可以通过这种方式使用别名来塑造它 (`C:\\SQL2012DIRecipes\\CH07\\AttributeCentricXML.sql`)：\n\
  ```sql\nSELECT C.ID '@ID',\n       C.ClientName '@ClientName',\n       C.Country\
  \ '@Country'\nFROM dbo.Client C\nFOR XML PATH('Client'), ROOT('CarSales');\n```\n\
  你应该会得到：\n```xml\n<CarSales>\n<Client ID=\"3\" ClientName=\"John Smith\" Country=\"\
  1\"/>\n<Client ID=\"4\" ClientName=\"Bauhaus Motors\" Country=\"2\"/>\n<Client ID=\"\
  5\" ClientName=\"Honest Fred\" Country=\"3\"/>\n<Client ID=\"6\" ClientName=\"Fast\
  \ Eddie\" Country=\"2\"/>\n<Client ID=\"7\" ClientName=\"Slow Sid\" Country=\"3\"\
  />\n</CarSales>\n```\n\n## 输出更复杂的嵌套 XML\n最后，为了让你走上生成更复杂输出的道路，你可以使用如下代码通过别名字段来创建嵌套\
  \ XML (`C:\\SQL2012DIRecipes\\CH07\\ComplexNestedXML.sql`)：\n```sql\nSELECT C.ID,\n\
  \       C.ClientName,\n       C.Country,\n       C.Town,\n       I.TotalDiscount\
  \ AS 'Invoice/@TotalDiscount',\n       I.InvoiceNumber AS 'Invoice/InvoiceNumber'\n\
  FROM dbo.Client C\nINNER JOIN dbo.Invoice I ON C.ID = I.ClientID\nFOR XML PATH('Client'),\
  \ ROOT('CarSales');\n```\n这个查询的输出将是\n```xml\n<CarSales>\n<Client>\n<ID> 3</ID>\n\
  <ClientName> John Smith</ClientName>\n<Country> 1</Country>\n<Town> Uttoxeter</Town>\n\
  <Invoice TotalDiscount=\"500.00\">\n<InvoiceNumber> 3A9271EA-FC76-4281-A1ED-714060ADBA30</InvoiceNumber>\n\
  </Invoice>\n</Client>\n<Client>\n<ID> 4</ID>\n<ClientName> Bauhaus Motors</ClientName>\n\
  <Country> 2</Country>\n<Town> Oxford</Town>\n<Invoice TotalDiscount=\"100.00\">\n\
  <InvoiceNumber> C9018CC1-AE67-483B-B1B7-CF404C296F0B</InvoiceNumber>\n</Invoice>\n\
  </Client>\n</CarSales>\n```\n显然，所示的输出只是最终结果的一小部分。\n\n## 工作原理\n在前面的一些方法中，我使用了 `FOR\
  \ XML PATH()` 来“塑造”输出的 XML。现在，不求面面俱到，这里是一个关于使用 `FOR XML PATH()` 来交付你想要导出的 XML 的速成课程。\n\
  需要注意的主要关键字是 `AUTO`，它用于使用源表来定义 XML 层次结构。你需要记住 `SELECT` 子句中列的顺序很重要，因为这会影响 XML 元素的嵌套。\n\
  希望这能说明：\n*   你通过使用从顶层元素开始的 XML 节点树的完整路径为它们设置别名来定义嵌套元素。\n*   你通过在属性名前加上 at 符号 (`@`)，并使用从顶层元素开始的\
  \ XML 节点树的完整路径，来创建属性而非元素。\n*   在定义任何低级别元素之前，你必须先为节点定义属性。\n在定义复杂的多级 XML 模式时，你需要注意拼写错误。很容易就会创建出并行的层级。同时记住模式是区分大小写的。在讨论这一点时，值得注意的是：\n\
  *   在 `SELECT` 子句中，必须先从 `Client` 表选择字段，然后再选择 `Invoice` 表的字段，以获得 XML 中生成的层次结构，其中\
  \ invoice 元素嵌套在 Client 数据内部。\n*   表别名提供元素名称。\n*   列别名提供元素名称。\n在输出 XML 时，可以使用 表 7-8\
  \ 中显示的选项。\n\n### 表 7-8. `FOR XML PATH()` 选项\n| 选项 | 描述 |\n| --- | --- |\n| `TYPE`\
  \ | 将结果作为 SQL Server 的 XML 数据类型输出，而不是 `NVARCHAR(MAX)`。 |\n| `ELEMENTS` | 确保使用 XML\
  \ 元素，而不是（默认的）属性。 |\n| `XSINIL` | 强制输出空元素，而不是完全跳过。 |\n| `ROOT` | 添加一个你选择的根元素。 |\n\
  \n还有一个有点令人畏惧的 `FOR XML EXPLICIT` 命令，当你需要输出的 XML 无法使用 `PATH` 或 `AUTO` 创建时，你可以使用它。`XML\
  \ Explicit` 超出了这些方法的范围。我留给你自己通过其他来源（如联机丛书和互联网）去研究这个选项。\n\n"
- "# 7-15. 定期导出 XML 数据\n\n## 问题\n你想要将数据作为 XML 导出，作为结构化 ETL 包的一部分。\n\n## 解决方案\n使用 SSIS\
  \ 导出 XML 数据。我将解释一种方法。\n\n1.  创建一个新的 SSIS 包并添加三个连接管理器，配置如下：\n    | 名称 | 连接 | 注释 |\n\
  \    | --- | --- | --- |\n    | CarSales_OLEDB | OLEDB | 连接到源数据库（此处为 CarSales）。将属性\
  \ `RetainSameConnection` 设置为 `True`。 |\n    | CarSales_ADONET | ADO.NET | 连接到源数据库（此处为\
  \ CarSales）。 |\n    | XMLOut | 平面文件 | 文件必须是 Unicode 格式，并包含一个目标列（使用“高级”窗格添加）名为 `XMLOut`。此列必须是\
  \ Unicode 文本流。 |\n\n2.  添加以下五个 SSIS 包作用域变量。它们在创建包时将变得显而易见：\n    ![image](img/untable7-1.jpg)\n\
  \n3.  在源数据库中创建以下 SQL 存储过程。它将用于分块创建 XML (`C:\\SQL2012DIRecipes\\CH07\\pr_GetChunkedXML.sql`)：\n\
  \    ```sql\n    CREATE PROCEDURE CarSales.dbo.pr_GetChunkedXML\n    (\n       \
  \ @ChunkID INT\n    )\n    AS\n    SELECT A.XmlOut\n    FROM\n    (\n        SELECT\n\
  \            S.ID,\n            InvoiceID,\n            StockID,\n            SalePrice,\n\
  \            DateUpdated\n        FROM dbo.Invoice_Lines S\n        INNER JOIN ##Tmp_ChunkDef\
  \ Tmp -- 此表在第 6 步中定义\n            ON S.ID = Tmp.ID\n        WHERE Tmp.ChunkID =\
  \ @ChunkID\n        FOR XML PATH('Invoice_Lines'), TYPE\n    ) A (XmlOut);\n   \
  \ ```\n\n4.  添加一个初始的执行 SQL 任务。将其命名为 **获取分块迭代次数**。双击进行编辑并配置如下：\n    | 连接类型: | ADO.NET\
  \ |\n    | --- | --- |\n    | 连接: | CarSales_ADONET |\n    | SQL 语句: | `SELECT @Chunks\
  \ = CAST(COUNT(*) / @ChunkRecordNo AS INT) FROM dbo.Invoice_Lines.` |\n\n5.  在“获取分块迭代次数”任务的“参数映射”窗格中定义以下参数：\n\
  \    ![image](img/untable7-2.jpg)\n\n6.  点击“确定”确认你对“获取分块迭代次数”任务的修改。\n7.  添加一个执行\
  \ SQL 任务。将其命名为 **准备分块分割的临时表**。将“获取分块迭代次数”任务连接到它。双击进行编辑并配置如下：\n    | 连接类型: | OLEDB.NET\
  \ |\n    | --- | --- |\n    | 连接: | CarSales_OLEDB |\n    | SQL 语句: | `IF OBJECT_ID('TempDB..##Tmp_ChunkDef')\
  \ IS NOT NULL DROP TABLE TempDB..##Tmp_ChunkDef` |\n    | `SELECT NTILE(?) OVER\
  \ (ORDER BY AccountID) AS ChunkID, CAST(AccountID AS BIGINT) AS AccountID` |\n \
  \   | `INTO ##Tmp_ChunkDef` |\n    | `FROM dbo.Invoice_Lines` |\n\n8.  在“准备分块分割的临时表”任务的“参数映射”窗格中定义以下参数：\n\
  \    ![image](img/untable7-3.jpg)\n\n9.  点击“确定”确认你对“准备分块分割的临时表”任务的修改。\n10. 向控制流窗格添加一个数据流任务，将前一个任务（准备分块分割的临时表）连接到它，并将其命名为\
  \ **添加起始根元素**。双击进行编辑。\n11. 向数据流窗格添加一个 OLEDB 源任务。\n\n\n\n"
- "# 按如下方式进行配置\n\n**12.** 在控制流窗格中添加一个平面文件目标任务。将 OLEDB 源任务连接到它，并双击进行编辑。将平面文件连接管理器设置为\
  \ `XMLOut`，并勾选“覆盖文件中的数据”。单击“映射”，确保源和目标之间映射了 `XMLOut` 这一单列。数据流窗格应如图 7-14 所示。\n\n\
  ![9781430247913_Fig07-14.jpg](img/9781430247913_Fig07-14.jpg)\n\n图 7-14. 用于为分块导出添加初始\
  \ XML 元素的数据流任务\n\n**13.** 返回控制流选项卡，并添加一个 Foreach 循环容器。将其命名为 `遍历分块计数器`，并将前面的“添加起始根元素”数据流任务连接到它。按如下方式进行配置：\n\
  \n| InitExpression: | `@CurrentChunk` = `1` |\n| :--- | :--- |\n| EvalExpression:\
  \ | `@CurrentChunk <= @Chunks` |\n| AssignExpression: | `@CurrentChunk` = `@CurrentChunk`\
  \ + `1` |\n\n**14.** 在 Foreach 循环容器内，添加一个名为 `定义可执行变量` 的脚本任务。添加以下变量：\n`ReadOnlyVariables`:\
  \ User::CurrentChunk, User::LoadProcedure\n`ReadWriteVariables`: User::SQLProc\n\
  \n**15.** 将 `ScriptLanguage` 设置为 `Microsoft Visual Basic 2010`，然后单击“编辑脚本”按钮以显示脚本编辑器。添加以下方法：\n\
  \n```vb\nPublic Sub Main()\n    Dts.Variables(\"SQLProc\").Value = \"EXECUTE \"\
  \ & Dts.Variables(\"LoadProcedure\").Value.ToString & \" \" & Dts.Variables(\"CurrentChunk\"\
  ).Value.ToString\n    Dts.TaskResult = ScriptResults.Success\nEnd Sub\n```\n\n**16.**\
  \ 关闭脚本窗口，并单击“确定”以完成脚本任务的编辑。\n\n**17.** 在 Foreach 循环容器内添加一个数据流任务。将脚本任务连接到它。将其命名为\
  \ `输出 XML` 并双击进行编辑。\n\n**18.** 在数据流窗格中，添加一个 OLEDB 源并按如下方式配置：\n\n| OLEDB Connection\
  \ Manager: | CarSales_OLEDB |\n| :--- | :--- |\n| Data Access Mode: | 来自变量的 SQL\
  \ 命令 |\n| Variable Name: | User::SQLProc |\n\n**19.** 单击“确定”完成 OLEDB 源的编辑。\n\n**20.**\
  \ 在控制流窗格中添加一个平面文件目标任务。将 OLEDB 源任务连接到它，并双击进行编辑。将平面文件连接管理器设置为 `XMLOut`。确保“覆盖文件中的数据”**未被**勾选。单击“映射”，确保源和目标之间映射了\
  \ `XMLOut` 这一单列。\n\n**21.** 返回控制流窗格。Foreach 循环任务应如图 7-15 所示。\n\n![9781430247913_Fig07-15.jpg](img/9781430247913_Fig07-15.jpg)\n\
  \n图 7-15. 循环遍历 XML 分块输出到文件\n\n**22.** 在控制流窗格中，添加一个数据流任务。将 Foreach 循环容器连接到它，并将其命名为\
  \ `添加闭合根元素`。完全按照前面描述的“添加起始根元素”数据流任务来设置，不同之处在于 SQL 读取：\n\n```sql\nDECLARE @RootClose\
  \ VARCHAR(50) = '</ROOT > '\nSELECT @RootClose AS XmlOut\n```\n\n**23.** 确保脚本目标的“覆盖文件中的数据”未被勾选。\n\
  \n至此，包已创建完成。您可以测试大型 XML 导出。完成的包应如图 7-16 所示。\n\n![9781430247913_Fig07-16.jpg](img/9781430247913_Fig07-16.jpg)\n\
  \n图 7-16. 用于导出大型 XML 数据集的完整 SSIS 包\n\n"
- '# 工作原理


  即使 SSIS 没有 XML 目标组件，您也可以（相当）轻松地从 SQL Server 输出 XML。


  再次强调，唯一的问题将是输出的大小。如果它太大而无法放入 SSIS 缓冲区，那么该过程将失败。因此，真正的技巧在于为大型数据集找到一种高效的分块机制来处理批量
  XML 导出。


  不幸的是，并非所有 XML 导出文件都小到足以放入 SSIS 缓冲区，因此同样有必要定义一个子集化过程，将核心数据输出为足够小的分块以便 SSIS 处理，然后将
  `XML ROOT` 元素添加到输出文件的顶部和底部。


  此处描述的 SSIS 包将源数据分解为“分块”，然后将输出导出为单个 XML 文件。更准确地说，步骤 4 中描述的第一个“获取分块迭代次数”执行 SQL 任务，根据您在
  `@ChunkRecordNo` 变量中指定的分块大小，计算需要处理的分块数量，并相应地设置 SSIS 变量。第二个执行 SQL 任务，“准备分块分段的临时表”，使用要处理的所有记录的
  ID 填充一个全局临时表。步骤 7 中描述的此任务还为每个 `recordID` 分配一个 `ChunkID`，以便每条记录作为指定分块的一部分输出。T-SQL
  `NTILE(?)` 中的问号将在执行时被 `@Chunks` 参数（该参数包含根据您指定的记录大小计算出的分块数）替换。“遍历分块计数器”Foreach 循环任务确保
  XML 导出过程处理先前定义的每个分块。脚本任务确保为分块中的每组记录运行的 SQL 语句传递了适当的输入参数。最后，XML `<ROOT> ...</ROOT>`
  元素被添加到核心过程的数据输出中。


  这个过程相当复杂，并且包含几个依赖项。可以在使用它的全局临时表（`##tmp_ChunkDef`）创建之前创建 `pr_GetChunkedXML` 存储过程，但您不能在创建此表的包上下文之外运行该存储过程。


  '
- '# 提示、技巧和陷阱


  *   如果您愿意，可以只为包使用一个连接管理器（OLEDB 或 ADO.NET）。我发现将变量传递给存储过程时，使用 ADO.NET 连接管理器更容易调试和维护，而对于纯粹的数据传输，OLEDB
  似乎稍快一些。因此，*我的*习惯是使用两个连接管理器，其中一个纯粹是为了方便编写和调试需要为其包含的 T-SQL 传递输入和输出变量的执行 SQL 任务。

  *   与其在步骤 8 中为平面文件目标任务勾选“覆盖文件中的数据”，您也可以选择添加一个初始文件系统任务来删除文件（如果您愿意的话）。

  *   可以在步骤 11 设置 `SQLProc` SSIS 变量而不使用脚本任务——但这又是一个关于清晰度和可维护性的问题；我更喜欢添加一个任务组件来完成此操作。

  *   需要进行一些试错来确定能实现高效处理的最佳源记录数。

  *   有非常、非常多的方法可以对数据集进行分块。这是本书其他地方描述过的方法之外的又一种。当然，您可以自由选择最适合您特定数据结构的方法。


  '
- "# 7-16. 常规导出小型 XML 数据集\n\n## 问题\n\n您需要定期导出小型 XML 数据集。\n\n## 解决方案\n\n使用 SSIS 导出\
  \ XML 数据。以下展示了一种处理小型数据集的特定方法。\n\n1.  创建一个新的 SSIS 包并添加一个 OLEDB 连接管理器。连接到源数据库（本例中为\
  \ CarSales），并将其命名为 `CarSales_OLEDB`。\n2.  添加一个数据流任务。双击进行编辑。\n3.  添加一个 OLEDB 源并双击进行编辑。\n\
  \n\n\n配置如下：\n-   OLEDB 连接管理器：`CarSales_OLEDB`\n-   数据访问模式：`SQL 命令`\n-   SQL 命令文本：\n\
  ```sql\nSELECT XMLCol\nFROM (\n    SELECT  ID, ClientName, Country, Town\n    FROM\
  \    CarSales.dbo.Client\n    FOR XML PATH('Client'), ROOT('RootElement')\n) A (XMLCol)\n\
  ```\n\n4.  对话框应类似于 图 7-17 所示。\n\n    ![9781430247913_Fig07-17.jpg](img/9781430247913_Fig07-17.jpg)\n\
  \n    图 7-17。在 SSIS OLEDB 源任务中定义 `FOR XML` 输出\n\n5.  向数据流窗格添加一个平面文件目标。将 OLEDB 源组件连接到它。双击进行编辑。\n\
  6.  单击“新建”以添加一个新的平面文件连接管理器。为其命名并定义一个输出文件（本例中为 `C:\\SQL2012DIRecipes\\CH07\\ClientExport.Xml`）。确保未选中“列名称位于第一个数据行中”，但选中了“Unicode”。对话框应类似于\
  \ 图 7-18。\n\n    ![9781430247913_Fig07-18.jpg](img/9781430247913_Fig07-18.jpg)\n\
  \n    图 7-18。作为平面文件的 XML 输出\n\n7.  单击“确定”进行确认。\n8.  在“平面文件目标编辑器”中，单击“映射”。确保只有 `XMLCol`\
  \ 列，并且它在源和目标之间已映射。\n\n就是这些！执行此包将导出一个 XML 文件。\n\n### 工作原理\n\n本方法所做的一切就是使用 `FOR XML\
  \ PATH` 从数据源创建 XML 作为单条记录。然后将此记录作为文本文件写入磁盘。数据集**必须**足够小，以能放入 SSIS 缓冲区。\n\n## 7-17.\
  \ 使用 T-SQL 将数据导出到 Excel\n\n### 问题\n\n你想使用 T-SQL 将数据从 SQL Server 导出到 Excel 或 Access。\n\
  \n### 解决方案\n\n使用 `OPENROWSET` 和 `OPENDATASOURCE`。方法如下（`C:\\SQL2012DIRecipes\\CH07\\\
  ExcelExport.sql`）：\n\n```sql\nINSERT INTO OPENROWSET('Microsoft.ACE.OLEDB.12.0','Excel\
  \ 12.0; Database = C:\\SQL2012DIRecipes\\CH07\\InsertFile.xlsx;', 'SELECT ID, ClientName\
  \ FROM [Clients$]')\nSELECT ID, ClientName FROM dbo.Client;\n```\n\n### 工作原理\n\n\
  如果你希望以最小的麻烦将数据集从 SQL Server 导出到 Excel，那么使用 `OPENROWSET` 或 `OPENDATASOURCE` 是一种干净简单的解决方案。你只需运行前面显示的\
  \ T-SQL 片段即可。\n\n导出到 MS Office 套件——我主要指 Access 和 Excel，但偶尔也包括 Word——已成为所有开发和管理 SQL\
  \ Server 数据库人员的基本要求。临时导出最好使用 `OPENROWSET` 和 `OPENDATASOURCE` 来处理。要使其工作，你必须设置一个 Excel\
  \ 工作表，其中第一行包含列名（从 A1 单元格开始），并且列标题下方没有数据。此外，必须在服务器上启用即席查询——如前所述。一旦满足这些先决条件，剩下的就是一段相当简单的\
  \ T-SQL。\n\n要使用 `OPENDATASOURCE`，请尝试以下方法：\n\n```sql\nINSERT INTO OPENDATASOURCE('Microsoft.ACE.OLEDB.12.0',\
  \ 'Data Source = C:\\SQL2012DIRecipes\\CH07\\InsertFile.xls; Extended Properties\
  \ = Excel 12.0')...[Clients$]\nSELECT ID, ClientName  FROM dbo.Client\n```\n\n除了将列标题放在\
  \ Excel 工作表的左上角外，你还可以将它们放在任何工作表的任何位置，并命名包含这些标题的范围。然后，你可以使用此名称代替工作表名称进行导出。一个例子可能是——假设你已将标题命名为\
  \ `DestinationRange`（`C:\\SQL2012DIRecipes\\CH07\\ExcelRangeExport.sql`）：\n\n```sql\n\
  INSERT INTO OPENROWSET(\n    'Microsoft.ACE.OLEDB.12.0','Excel 12.0; Database =\
  \ C:\\SQL2012DIRecipes\\CH07\\InsertFile.xlsx;'\n    , 'SELECT ID, ClientName FROM\
  \ DestinationRange')\nSELECT ID, ClientName FROM dbo.Client\n```\n\n### 提示、技巧和陷阱\n\
  \n-   有关如何查找和安装 OLEDB ACE 驱动程序的信息，请参阅方法 1-1。请记住在 64 位环境中使用 64 位版本。\n-   `OPENROWSET`\
  \ 直通查询的 `SELECT` 子句中使用的列名必须与电子表格中的列名匹配。\n-   数据将附加到任何现有行之后。\n-   你也可以使用 `Microsoft.Jet.OLEDB.4.0`\
  \ 驱动程序，但我建议安装更新的 ACE 驱动程序，即使导出到较旧的 Excel 版本。这可以避免在意外使用较旧的（Jet）驱动程序不支持的 Excel 版本时出现意外情况。另一个优点是，你甚至不必指定正在使用哪个版本的\
  \ Excel（`8.0`、`12.0`），也不必说明你使用的是基于 Office XML 的文件格式还是较旧的二进制格式。\n-   请记住在导出数据之前关闭目标文件。\n\
  -   请注意，Excel 对你可以导出的行数有限制。在 2003 版及之前是 65,536 行，之后是 1,048,576 行。\n\n## 7-18. 使用\
  \ T-SQL 将数据导出到 Access\n\n### 问题\n\n你想使用 T-SQL 将数据从 SQL Server 导出到 Access。\n\n###\
  \ 解决方案\n\n使用 `OPENROWSET` 和 `OPENDATASOURCE`。\n\n要将 SQL Server 数据导出到 Access，请运行以下\
  \ T-SQL 片段（`C:\\SQL2012DIRecipes\\CH07\\AccessExportOPENROWSET.sql`）：\n\n```sql\n\
  INSERT INTO OPENROWSET('Microsoft.ACE.OLEDB.12.0','C:\\SQL2012DIRecipes\\CH07\\\
  TestAccess.mdb'; 'admin';'',ClientExport)\nSELECT ID, ClientName FROM dbo.Client\n\
  ```\n\n### 工作原理\n\n与 Access 的情况一样，`OPENROWSET` 和 `OPENDATASOURCE` 允许你作为 T-SQL 语句的一部分快速轻松地导出部分数据子集。你需要创建一个包含目标表（准备接收数据）的\
  \ Access 数据库。还必须在服务器上启用即席查询。此片段将行插入到 `TestAccess.mdb` 数据库中的 `ClientExport` 表中。数据将附加到目标表中的任何现有行之后。\n\
  \n要使用 `OPENDATASOURCE`，请尝试以下方法（`C:\\SQL2012DIRecipes\\CH07\\AccessExportOpendatasource.sql`）：\n\
  \n```sql\nINSERT INTO OPENDATASOURCE('Microsoft.ACE.OLEDB.12.0', 'Data Source =\
  \ C:\\SQL2012DIRecipes\\CH07\\TestAccess.mdb;')...ClientExport\nSELECT ID, ClientName\
  \  FROM dbo.Client;\n```\n\n### 提示、技巧和陷阱\n\n-   如果你的 Access 数据库受保护，你需要将 `OPENROWSET`\
  \ 命令中的 `'admin';` 和 `'';` 替换为有效的用户名和密码。\n-   你可以将表名替换为 `SELECT` 查询（用单引号括起来，就像 Excel\
  \ 一样）来指定目标表中的列。同样，源和目标中的列名不必完全相同，但列顺序必须匹配。\n-   有关如何使用受 Access 工作组（`.mdw`）文件保护的数据库，请参阅第\
  \ 1 章。\n\n## 7-19. 从 T-SQL 安全地将数据导出到 Excel\n\n### 问题\n\n你想安全地将数据导出到 Excel——即不在 T-SQL\
  \ 代码中暴露安全信息。\n\n### 解决方案\n\n创建一个链接服务器指向 Excel 工作簿。\n\n要使用指向 Excel 的链接服务器导出数据，请执行以下步骤。\n\
  \n1.  设置一个链接服务器。代码大致如下所示：\n\n    ```sql\n    EXECUTE sp_addlinkedserver\n      \
  \  EXCEL_SQL,                            -- 链接服务器名称\n        'Jet 4.0',        \
  \                    -- （纯装饰性的）产品名称\n        'Microsoft.Jet.OLEDB.4.0',        \
  \    -- 已安装的驱动程序\n        'C:\\SQL2012DIRecipes\\CH07\\InsertFile.xls',    -- 目标文件和路径\n\
  \        NULL,                                 -- 位置——未使用\n        'Excel 8.0';\
  \                          -- 提供程序字符串，指定 Excel 版本\n    GO\n    ```\n\n2.\n\n\n\n"
- "# 7-20. 安全导出数据以便从 T-SQL 访问\n\n## 问题\n\n你希望将数据安全地导出到 Access——也就是说，在 T-SQL 代码中不暴露安全信息。\n\
  \n## 解决方案\n\n创建一个指向 Access 数据库的链接服务器，然后从 T-SQL 导出数据。\n\n以下步骤说明了如何使用指向 Excel 的链接服务器来导出数据。\n\
  \n1.  添加一个链接服务器：\n    ```sql\n    EXECUTE master.dbo.sp_addlinkedserver\n    @server\
  \ = N'Access'\n    ,@srvproduct = N'Access'\n    ,@provider = N'Microsoft.ACE.OLEDB.12.0'\n\
  \    ,@datasrc = NC:\\SQL2012DIRecipes\\CH07\\TestAccess.mdb'\n    ```\n2.  设置无安全上下文的数据访问：\n\
  \    ```sql\n    EXECUTE master.dbo.sp_addlinkedsrvlogin\n    @rmtsrvname = N'Access',\
  \ @useself = N'False', @locallogin = NULL,\n    @rmtuser = NULL,@rmtpassword = NULL\n\
  \    ```\n3.  使用四部分名称法导出数据，如下所示：\n    ```sql\n    INSERT INTO   Access...ClientExport\
  \ (ID, ClientName)\n    SELECT        ID,  ClientName FROM dbo.Client\n    ```\n\
  \n#### 提示、技巧与陷阱\n\n*   导出数据时，Access 数据库不必关闭。事实上，表本身可以是打开的。\n*   Access 将强制执行已应用于目标表的任何约束（例如唯一的主键）。\n\
  *   Access 表的数据类型必须能够存储导出的数据类型。\n*   如果 Access 数据库受密码保护，那么你需要设置链接服务器登录，使用类似下面的语句：\n\
  \    ```sql\n    EXECUTE master.dbo.sp_addlinkedsrvlogin @rmtsrvname = N'Access',\
  \ @locallogin = NULL , @useself = N'False', @rmtuser = N'YourAccessUserName', @rmtpassword\
  \ = N'AccessPassword'\n    ```\n    ![image](img/sq.jpg) **注意** 你需要将此处显示的用户名和密码替换为你自己的用户名和密码。\n\
  \n"
- "# 7-21. 使用 SSIS 将数据导出到 Excel\n\n## 问题\n\n你希望定期将数据导出到 Excel。\n\n## 解决方案\n\n使用 Excel\
  \ 目标作为 SSIS 数据流任务的一部分。\n\n要使用 SSIS 将数据导出到 Excel，请执行以下步骤。\n\n1.  创建一个新的 SSIS 包并添加一个\
  \ OLEDB 连接管理器。将其命名为 `CarSales_OLEDB` 并配置它连接到你的源服务器。添加一个数据流任务并双击进行编辑。\n2.  添加一个新的\
  \ OLEDB 源组件，并将其配置为你刚刚添加的 `CarSales_OLEDB` 连接管理器。选择一个源表或输入一个 SQL 查询来定义源列。\n3.  添加一个新的\
  \ Excel 目标任务。将源任务连接到它。双击进行编辑。\n4.  单击“浏览”以创建一个新的 Excel 文件（或选择一个现有的 Excel 文件）——或者甚至可以直接键入文件路径，无论新旧。选择要导出到的\
  \ Excel 版本，然后单击“确定”。\n5.  如果你正在创建一个 Excel 文件——或者你想向现有文件添加一个新的工作表——请单击“新建”，然后单击“确定”以创建工作表。\n\
  6.  如果你创建了一个新工作表，请在出现以下消息时单击“确定”（参见图 7-19）。\n    ![9781430247913_Fig07-19.jpg](img/9781430247913_Fig07-19.jpg)\n\
  \    图 7-19. 新工作表警告\n7.  从“Excel 工作表名称”下拉列表中，选择要用作 Excel 目标的工作表。\n8.  单击“映射”，将所有源列映射到所有目标列。\n\
  9.  单击“确定”。\n\n你的 SQL Server 数据将被导出到 Excel 工作簿中。\n\n## 工作原理\n\n作为可能最常用的导出流程之一，使用\
  \ SSIS 将数据输出到 Excel 简单得令人欣慰。你甚至不必先创建目标文件，只需确保使用 Excel 目标任务即可。你可能更希望——或者需要——使用 ACE\
  \ 提供程序来成功导出数据。如果是这种情况，在创建目标 OLEDB 提供程序时（步骤 2），从弹出列表中选择“Microsoft Office 12.0 Access\
  \ Database Engine OLEDB Provider”。然后，你将需要键入或粘贴 Access 数据库的完整路径作为服务器或文件名。\n\n你会注意到，如果你的源数据包含任何非\
  \ Unicode（即 `VARCHAR`）列，那么目标任务会指出问题。有两种解决方法：\n\n*   使用 SQL 语句选择源数据，并使用 `CAST` 或\
  \ `CONVERT` 将源数据类型更改为 `NVARCHAR`。\n*   在源和目标之间添加一个数据转换任务，并将所有非 Unicode 列转换为 Unicode\
  \ 字符串 [DT_WSTR]。将输出别名也设置为原始列名可能会更方便——类似于图 7-20 中的样子。\n    ![9781430247913_Fig07-20.jpg](img/9781430247913_Fig07-20.jpg)\n\
  \    图 7-20. SSIS 中用于 Excel 导出的数据转换\n\n在映射列时，确保你映射的是**已转换**的列——名为 `Copy of ColumnName`\
  \ 或 `DataConversion.ColumnName`。如果你在添加目标任务之前添加数据转换任务，那么映射会稍微复杂一些，因为源列和目标列都会出现在“创建表”对话框中——而你将必须删除重复的（非\
  \ Unicode）列。此外，这会使 SSIS 更难映射到正确的输出数据类型。\n\n#### 提示、技巧与陷阱\n\n*   与导出到 Office 应用程序一样，你是处于\
  \ 32 位还是 64 位环境的问题可能会产生广泛的影响。这些与配方 1-1 中解释的相同。\n*   如果你愿意，可以在创建新工作表时从 OLEDB 目标重命名\
  \ Excel 工作表。\n*   Excel 数据类型映射的复杂性在配方 1-3 中有解释。\n\n\n\n"
- "# 使用 SSIS 将数据导出到 Access\n\n## 问题\n你需要作为 SSIS 包的一部分，将数据导出到 Access。\n\n## 解决方案\n\
  在 SSIS 数据流中使用 OLEDB 目标任务，步骤如下：\n\n1.  创建一个新的 SSIS 包并添加一个 OLEDB 连接管理器。将其命名为 `CarSales_OLEDB`，并配置它连接到你的源服务器。\n\
  2.  添加第二个 OLEDB 连接管理器。单击“新建”，从对话框顶部的提供程序弹出列表中选择 **Microsoft Jet 4.0 OLEDB Provider**。浏览或输入现有\
  \ Access 数据库的路径。点击“确定”两次。将第二个连接管理器命名为 `Access_OLEDB`。\n3.  添加一个数据流任务并双击进行编辑。\n4.\
  \  添加一个新的 OLEDB 源组件，并将其配置为使用你添加的 `CarSales_OLEDB` 连接管理器。选择一个源表或输入 SQL 查询来定义源列。\n\
  5.  添加一个新的 OLEDB 目标组件。选择 `Access_OLEDB` 连接管理器，并选择一个现有表作为目标，或单击“新建”创建一个新表。\n6.  单击“映射”，将源列映射到目标列。\n\
  7.  单击“确定”。\n\n现在你可以运行该包了。\n\n## 工作原理\n你可能更喜欢——或者需要——使用 ACE 提供程序导出到 Access，尤其是在\
  \ 64 位环境中导出时。在这种情况下，创建目标 OLEDB 提供程序（步骤 2）时，请从弹出列表中选择 **Microsoft Office 12.0 Access\
  \ Database Engine OLEDB Provider**。然后，你将需要手动键入或粘贴 Access 数据库的完整路径作为服务器或文件名。如果你使用\
  \ ACE 提供程序，在创建新表时可能会收到关于数据类型问题的警告消息。在大多数情况下，可以忽略此消息。它的意思是，将使用更通用的 OLEDB 数据类型来创建表，而不是特定的\
  \ Access 限制数据类型。当然，在创建任何新的目标表时，你可以将表名从 `OLEDB Destination` 重命名为你选择的名称。\n\n## 提示、技巧和陷阱\n\
  *   与导出到 Office 应用程序一样，你处于 32 位还是 64 位环境的问题可能会产生广泛的影响。这与**配方 1-1** 中的解释相同。\n*  \
  \ 如果你的 Access 数据库受密码保护，你将需要在 OLEDB 连接管理器配置中输入连接详细信息。\n*   如果你的源数据包含任何非 Unicode（即\
  \ `VARCHAR`）列，那么目标任务会指示存在问题。有两种解决方案：\n    *   使用 SQL 语句选择源数据，并使用 `CAST` 或 `CONVERT`\
  \ 将源数据类型更改为 `NVARCHAR`。\n    *   在源和目标之间添加一个数据转换任务，并将所有非 Unicode 列转换为 Unicode 字符串\
  \ [DT_WSTR]。\n\n"
- "# 7-22. 从 Office 应用程序中拉取数据\n\n## 问题\n你想将 SQL Server 数据“拉取”到 Access、Excel 或 Word\
  \ 中。\n\n## 解决方案\n使用 Access、Excel 和 Word 中的链接和/或导入选项。\n\n由于从 MS Office 应用程序拉取数据有多种方法，我将把各种场景作为独立的小配方来处理。\n\
  \n### 将 Excel 链接到 SQL Server 数据库\n将 Excel 链接到 SQL Server 数据库：\n\n1.  单击“数据”以激活“数据”选项卡。选择“自其他来源”![image](img/arrow.jpg)\
  \ “来自 SQL Server”（参见 图 7-21）。\n\n    ![9781430247913_Fig07-21.jpg](img/9781430247913_Fig07-21.jpg)\n\
  \n    图 7-21.  将 Excel 链接到 SQL Server 数据库\n\n2.  输入服务器名称和凭据（如果未使用受信任连接）。单击“下一步”。\n\
  3.  选择你希望连接的数据库。选择一个表或视图。单击“下一步”。\n4.  输入数据连接文件（以及路径，如果需要）。这将允许你重用该连接。如果需要，可以调整参数。单击“完成”。\n\
  5.  选择或确认数据的左上角目标单元格，然后单击“确定”。如果使用 SQL Server 连接，系统提示时请重新输入密码。\n\n单击“数据”选项卡中的“刷新”按钮，会用\
