  \ 变量拖到“表达式”字段中。你的对话框应如图 13-3 所示。\n    ![9781430247913_Fig13-03.jpg](img/9781430247913_Fig13-03.jpg)\n\
  \    图 13-3。将文件名设置为多文件加载的表达式\n19. 单击“确定”关闭对话框。你将返回到“属性表达式编辑器”对话框，它应如图 13-4 所示。\n\
  \    ![9781430247913_Fig13-04.jpg](img/9781430247913_Fig13-04.jpg)\n    图 13-4。将连接字符串设置为表达式\n\
  20. 单击“确定”关闭对话框。你现在已经告诉 SSIS 使用 `FileName` 变量中找到的文件名，而不是你在设置连接管理器时最初使用的硬编码文件名。你的任务应如图\
  \ 13-5 所示。\n    ![9781430247913_Fig13-05.jpg](img/9781430247913_Fig13-05.jpg)\n\
