- "# 工作原理\n\n你也可以在 SSIS 包中使用变更跟踪信息，以确保只有增量数据更改才会应用到目标数据库。这前提是变更跟踪已为源表启用并配置。\n\n\n\n\
  不幸的是，你必须说服源系统的数据库管理员配置变更跟踪，这可能并不容易。我想提请注意的是，此方法使用了两种“脚手架”技术来帮助更轻松地创建数据包，但这些技术将在处理过程中（或处理之前）被修改：第一，我使用直接引用源表的变量来定义源数据——而无需使用变更跟踪。这些变量将在执行时被替换为仅选择增量数据所需的代码。第二，我首先在目标数据库中使用永久性“临时”表来处理增量删除和更新，最后（在一切测试完毕并准备部署后）切换为使用临时表。\n\
  \n要实现此方法，有几个先决条件。首先（或许不言而喻），必须在源系统上配置变更跟踪。其次，运行过程之前，源表和目标表必须已同步（此处我将使用配方 12-1 中描述的客户端表）。\n\
  \n一旦数据包经过测试并可运行（记得在每次测试之间截断 `Tmp_Deletes` 和 `Tmp_Updates` 表），你可以进行调整以使用会话范围内的临时表，步骤如下：\n\
  \n1.  首先，将 `TMP_Updates` 和 `TMP_Deletes` 变量的值分别更改为 `##TMP_Updates` 和 `##TMP_Deletes`。\n\
  2.  然后，将“删除数据”步骤中的 SQL 语句改为使用 `##Tmp_Deletes` 表而非 `Tmp_Deletes`。\n3.  接着，将“更新数据”步骤中的\
  \ SQL 语句改为使用 `##Tmp_Updates` 表而非 `Tmp_Updates`。\n4.  最后，删除目标数据库中的 `Tmp_Deletes`\
  \ 和 `Tmp_Updates` 表。\n\n## 12-4. 使用 SQL Server 事务日志检测源数据变更\n\n### 问题\n\n你想要检测源表的净变更，而不在源数据库中创建任何额外的对象，并定期将数据变更应用到目标表。\n\
  \n### 解决方案\n\n使用 SQL Server 企业版的变更数据捕获（CDC）功能，通过读取 SQL Server 事务日志来跟踪变更，这种方式无需触发器且相对轻量级。在此示例中，我使用\
  \ `CarSales` 作为源数据库，`CarSales_Staging` 作为目标数据库。\n\n1.  首先（如果尚未完成），必须在数据库级别启用 CDC。以下\
  \ T-SQL 片段将完成此操作（`C:\\SQL2012DIRecipes\\CH11\\EnableCDC.Sql`）：\n\n    ```\n    USE\
  \ CarSales;\n    GO\n    \n    sys.sp_cdc_enable_db;\n    ```\n\n2.  创建一个表来跟踪每次使用\
  \ CDC 的 ETL 加载。你需要使用如下 DDL（`C:\\SQL2012DIRecipes\\CH11\\tblCDCLSN.Sql`）：\n\n   \
  \ ```\n    CREATE TABLE CarSales.dbo.CDCLSN\n    (\n     ID INT IDENTITY NOT NULL\n\
  \     ,FinalLSN BINARY(10)\n     ,TableName VARCHAR(128)\n     ,DateAdded DATETIME\
  \ DEFAULT GETDATE()\n     ,NbInserts INT\n     ,NbUpdates INT\n     ,NbDeletes INT\n\
  \    );\n    GO\n    ```\n\n3.  为你将跟踪的表启用 CDC，使用类似以下的 T-SQL 片段（`C:\\SQL2012DIRecipes\\\
  CH11\\EnableCDC.Sql`）：\n\n    ```\n    USE CarSales;\n    GO\n    \n    sys.sp_cdc_enable_table\n\
  \    @source_schema = 'dbo',\n    @source_name = 'Client',\n    @role_name = 'CDCMainRole',\n\
  \    @supports_net_changes = 1;\n    GO\n    ```\n\n4.  定期运行以下代码以使目标表与源表同步（`C:\\\
  SQL2012DIRecipes\\CH11\\RunCDC.Sql`）：\n\n    ```\n    DECLARE @InitialLSN BINARY(10)\n\
  \    DECLARE @FinalLSN BINARY(10)\n    DECLARE @TmpLSN BINARY(10)\n    DECLARE @NbInserts\
  \ INT = 0\n    DECLARE @NbUpdates INT = 0\n    DECLARE @NbDeletes INT = 0\n\n  \
  \  -- 获取最高 LSN\n    SELECT     @FinalLSN = sys.fn_cdc_get_max_lsn()\n    SELECT\
  \     @TmpLSN = FinalLSN\n    FROM       dbo.CDCLSN\n    WHERE      TableName =\
  \ 'dbo_Clients'\n               AND ID = (SELECT MAX(ID) FROM dbo.CDCLSN WHERE TableName\
  \ ='dbo_Clients')\n\n    -- 获取将使用的最低 LSN 并测试是否有变更\n    IF @FinalLSN = @TmpLSN\n\
  \    RETURN\n\n    SELECT @InitialLSN = ISNULL(@TmpLSN,sys.fn_cdc_get_min_lsn('dbo_Clients'))\n\
  \n    -- 删除操作 (1=删除)，仅需主键\n    DELETE FROM   dbo.Clients_New\n    WHERE        \
  \ CustomerNumber IN (\n                                     SELECT   CustomerNumber\n\
  \                                     FROM     cdc.fn_cdc_get_net_changes_dbo_Clients(\n\
  \                                                       @InitialLSN, @FinalLSN,\
  \ 'all')\n                                     WHERE  __$operation = 1\n       \
  \                              )\n\n    SET @NbDeletes = @@ROWCOUNT\n\n    -- 更新操作\
  \ (4=更新后的值)，需要字段列表\n    UPDATE       D\n    SET          D.CustomerName = S.CustomerName\n\
  \    FROM         dbo.Clients_New D\n    INNER JOIN   (SELECT  CustomerID,CustomerName\n\
  \                  FROM     cdc.fn_cdc_get_net_changes_dbo_Clients(@InitialLSN,\
  \ @FinalLSN, 'all')\n                  WHERE __$operation = 4) S\n             \
  \     ON S.CustomerID = D.CustomerID\n\n    SET @NbUpdates = @@ROWCOUNT\n\n    --\
  \ 插入操作 (2=插入)，需要字段列表\n    INSERT INTO   dbo.Clients_New (CustomerID,CustomerName)\n\
  \    SELECT        CustomerID,CustomerName\n    FROM          cdc.fn_cdc_get_net_changes_dbo_Clients\
  \ ( @InitialLSN,\n               @FinalLSN, 'all')\n    WHERE         __$operation\
  \ = 2\n\n    SET @NbInserts = @@ROWCOUNT\n\n    -- 所有操作完成后，将新的最高 LSN 添加到历史记录表以供下次运行使用\n\
  \    INSERT INTO   dbo.CDCLSN (FinalLSN,TableName, NbInserts, NbUpdates, NbDeletes)\n\
  \    VALUES        (@FinalLSN,'dbo_Clients', @NbInserts, @NbUpdates, @NbDeletes);\n\
  \    ```\n\n### 工作原理\n\nSQL Server 2008 在 ETL 过程的增量数据管理领域引入了一个重要的新特性，即变更数据捕获。虽然这项技术不仅限于帮助在\
  \ SQL Server 数据库和实例之间加载数据的人，但它对数据集成从业者来说无疑是一大助力。\n\nCDC（这是其常用的缩写）有许多用途和应用，并不仅限于\
  \ ETL 场景。实际上，它的使用可能相当复杂。因此，本配方不会是对 CDC 的详尽介绍，而是集中讨论 CDC 如何在 SQL Server 源和目标数据库之间执行插入、更新和删除操作。这些数据库可以是暂存数据库、数据仓库——实际上，它可以用于多种可能的场景。与本书一贯的重点一样，关注点在于\
  \ ETL 过程。\n\nCDC 要求你指定“开始”和“结束”参数，以便告诉它要分析和处理哪一块变更。它可以让你指定时间范围，但在这里我更喜欢使用 SQL Server\
  \ *日志序列号*（LSN），因为它们是事务日志中操作的“自然”指示器——CDC 正是从事务日志中获取其使用的所有信息。这需要一种方法来确定要处理的 LSN 范围的上限和下限。为此，我倾向于将使用的最后一个（上限）LSN\
  \ 保存到跟踪表中，这使得上一次操作的上限成为当前操作的下限。额外的好处是，此表还存储了每次 ETL 加载期间执行的插入、更新和删除操作影响的记录数。\n\n\
  这里，不可避免地，我只展示了如何对一张表进行此操作。对于你希望使用 CDC 的每张表，你都必须复制此操作。哦，还要确保你使用的是 SQL Server 的企业版——如果你在生产环境中只部署标准版或商业智能版本，这是行不通的。\n\
  \n\n\nT-SQL 执行以下操作：\n\n首先，我们需要获取最高的 LSN，这将用作所有增量修改的上限阈值。这有效地为将使用 CDC 处理的操作设定了“上限”。OLTP\
  \ 操作可能在表中继续进行，但它们不会被拾取用于 ETL。\n\n其次，我们需要获取最低的 LSN，这将用作所有增量修改的下限阈值——要么是我们记录操作的表中的最后一个最高\
  \ LSN，要么，如果这是首次运行该过程，则为最小 LSN（这是在为表设置 CDC 时检测到的）。\n\n但是，如果上限和下限范围相同，我们绝不能执行该过程。这是因为\
  \ LSN 范围函数 (`cdc.fn_cdc_get_net_changes_<table>`) 的行为类似于 SQL 的 `BETWEEN` 子句，因此如果上限和下限\
  \ LSN 相同，则总会有一个操作被处理。因此，代码会对此进行测试，如果两个 LSN 相同则退出。\n\n否则，如果至少有一个新操作，该过程将使用 `cdc.fn_cdc_get_net_changes_<table>`\
  \ 函数插入/更新/删除任何新的或更改的数据（以任何顺序）。\n\n![image](img/sq.jpg)\n\n**注意**：尽管变更数据捕获（如同变更跟踪）不会给源服务器增加很多额外开销，但具体开销是多少以及是否可接受，将取决于每种具体情况。对于事务量非常大的服务器，即使是\
  \ CDC 增加的轻微开销也可能显得过多。你需要在特定环境中进行测试。\n\n## 提示、技巧和陷阱\n\n*   变更数据捕获仅在 SQL Server 的企业版中可用。\n\
  *   在启用表的 CDC 时，`@supports_net_changes` 参数至关重要，因为我们只对 ETL 增量数据的最终“净”更改感兴趣，而不是数据加载之间的中间状态。\n\
  *   如果你需要禁用 CDC，必须先在表级别禁用它：\n    ```\n    sys.sp_cdc_disable_table\n        @source_schema\
  \ = 'dbo',\n        @source_name = 'Clients' ,\n        @capture_instance = 'dbo_Client'\
  \ ;\n    GO\n    ```\n*   你可以使用以下语句检查启用了 CDC 的表：\n    `SELECT name, type, type_desc\
  \ FROM sys.tables WHERE is_tracked_by_cdc = 1;`\n*   然后，一旦所有表都禁用了 CDC，你可以使用以下语句在数据库级别禁用\
  \ CDC 本身：\n    ```\n    sys.sp_cdc_disable_db ;\n    GO\n    ```\n*   如果你确实想查看所有更改，按类型查看\
  \ LSN 范围（假设你已经声明了变量 `@InitialLSN` 和 `@FinalLSN` 并为其赋值）：\n    `SELECT * FROM cdc.fn_cdc_get_net_changes_dbo_Clients(@InitialLSN,\
  \ @FinalLSN, 'all');`\n*   如果你的流程需要，你可以“软删除”记录（通过将其标记为不再活动）而不是在目标表中删除它们。\n*   如果你愿意，可以使用\
  \ `update_mask` 列来推断要更新的字段，并编写一些巧妙的动态 SQL。不过，我认为最好还是坚持使用本方案中定义的更全局的方法。\n*   如果你想使用定义的时间范围，在此范围内必须检测到所有修改的数据，那么你需要\
  \ `sys.fn_cdc_map_time_to_lsn` 函数，以便 SQL Server CDC 找到对应于上限和下限时间阈值的 LSN。\n*   以下代码段，如果添加到\
  \ T-SQL 代码的声明部分（并替换 `@InitialLSN` 和 `@FinalLSN` 的赋值），将获取过去六小时的 LSN 阈值。使用这种方法时应谨慎，因为你可能会遗漏某个范围，因此请在使用时间阈值返回\
  \ LSN 阈值时务必小心。\n    ```\n    DECLARE @LowerTimeThreshold DATETIME2 = DATEADD(hh,-6,GETDATE())\n\
  \    DECLARE @UpperTimeThreshold DATETIME2 = GETDATE()\n\n    SELECT @InitialLSN\
  \ = sys.fn_cdc_map_time_to_lsn('smallest greater than',\n    @LowerTimeThreshold)\n\
  \    SELECT @FinalLSN = sys.fn_cdc_map_time_to_lsn('largest less than or\n    equal',\
  \ @UpperTimeThreshold)\n    ```\n*   当然，你可能更愿意为更改数据窗口设置定义好的时间段——但如何调整 T-SQL 来实现这一点，就交给你来完成了。\n\
  *   如果在表中存储 LSN 过于复杂，你可以总是只存储最后一个（最高的） LSN 作为源表的扩展属性，使用 `sp_AddExtendedProperty`。这类似于方案\
  \ 12-1 中描述的在使用变更跟踪时存储版本号的方法。\n*   定义变更数据捕获要求用户是 sysadmin 固定服务器角色的成员。\n\n## 12-5.\
  \ 在 SSIS 中应用变更数据捕获\n\n### 问题\n\n你正在运行一个结构化的 ETL 包，并希望它以完全与 SSIS 集成的方式使用变更数据捕获。\n\
  \n### 解决方案\n\n使用 SSIS 2012 及其新的变更数据捕获任务。以下步骤展示了如何使用 `CarSales` 数据库中的 Client 表作为源，并使用\
  \ `CarSales_Staging` 数据库作为目标来完成此操作。\n\n1.  使用以下代码在数据库和表级别实现 CDC（如果尚未完成）(`C:\\SQL2012DIRecipes\\\
  CH11\\EnableCDCSSIS.Sql`)：\n    ```\n    USE CarSales;\n    GO\n\n    sys.sp_cdc_enable_db;\n\
  \    GO\n\n    sys.sp_cdc_enable_table\n    @source_schema = 'dbo',\n    @source_name\
  \ = 'Client' ,\n    @role_name = 'CDCMainRole',\n    @supports_net_changes = 1\n\
  \    ```\n2.  使用以下 DDL 创建一个表，用于存储目标表中要删除的记录的 ID (`C:\\SQL2012DIRecipes\\CH11\\tblCDC_Client_Deletes.Sql`)：\n\
  \    ```\n    CREATE TABLE CarSales_Staging.dbo.CDC_Client_Deletes\n    (\n    \
  \ ID INT NOT NULL\n    ) ;\n    GO\n    ```\n3.  使用以下 DDL 创建一个表，用于存储目标表中要更新的记录的数据\
  \ (`C:\\SQL2012DIRecipes\\CH11\\tblCDC_Client_Updates.Sql`)：\n    ```\n    CREATE\
  \ TABLE CarSales_Staging.dbo.CDC_Client_Updates\n    (\n     ID INT NOT NULL,\n\
  \     ClientName NVARCHAR(150) NULL,\n     Address1 VARCHAR(50) NULL,\n     Address2\
  \ VARCHAR(50) NULL,\n     Town VARCHAR(30) NULL,\n     County VARCHAR(30) NULL,\n\
  \     PostCode VARCHAR(10) NULL,\n     Country CHAR(3) NULL,\n     ClientType NCHAR(5)\
  \ NULL,\n     ClientSize VARCHAR(10) NULL,\n     ClientSince SMALLDATETIME NULL,\n\
  \     IsCreditWorthy BIT NULL,\n     DealerGroup HIERARCHYID NULL,\n     MapPosition\
  \ GEOGRAPHY NULL\n    ) ;\n    GO\n    ```\n4.  使用以下 DDL 创建一个目标表：\n    ```\n   \
  \ CREATE TABLE CarSales_Staging.dbo.Client_CDCSSIS\n    (\n     ID INT IDENTITY(1,1)\
  \ NOT NULL,\n     ClientName NVARCHAR(150) NULL,\n     Address1 VARCHAR(50) NULL,\n\
  \     Address2 VARCHAR(50) NULL,\n     Town VARCHAR(50) NULL,\n     County VARCHAR(50)\
  \ NULL,\n     PostCode VARCHAR(10) NULL,\n     Country TINYINT NULL,\n     ClientType\
  \ VARCHAR(20) NULL,\n     ClientSize VARCHAR(10) NULL,\n     ClientSince SMALLDATETIME\
  \ NULL,\n     IsCreditWorthy BIT NULL,\n     DealerGroup HIERARCHYID NULL,\n   \
  \  MapPosition GEOGRAPHY NULL,\n     CONSTRAINT PK_Client PRIMARY KEY CLUSTERED\n\
  \     (\n     ID ASC\n     ) WITH (PAD_INDEX = OFF, STATISTICS_NORECOMPUTE = OFF,\
  \ IGNORE_DUP_KEY = OFF, ALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS = ON)\n    ) ;\n\
  \    GO\n    ```\n    创建一个表来跟踪每次增量加载中使用的 LSN 范围也是必需的——如方案 12-4 所述——但正如你将看到的，CDC\
  \ 控制任务可以为你创建此表，因此我将让它来完成这项工作。\n5.  创建一个新的 SSIS 包。\n\n\n\n5.  在项目级别添加以下三个连接管理器（通过右键单击解决方案资源管理器中的连接管理器文件夹并选择新建连接管理器）。它们在连接管理器文件夹中都将具有\
  \ `.ConnMgr` 扩展名，并在连接管理器选项卡中显示时不带此后缀：\n\n    | 名称 | 类型 | 注释 |\n    | --- | --- |\
  \ --- |\n    | `CarSales_OLEDB` | OLEDB | 到已启用 CDC 的源数据库的连接。 |\n    | `CarSales_Staging_OLEDB`\
  \ | OLEDB | 到目标（已同步）数据库的连接。 |\n    | `CarSales_ADONET` | ADO.NET | 用于 LSN 跟踪的连接。此处将其放置在源数据库中。这\
  \ **必须** 是一个 ADO.NET 连接，否则 CDC 任务无法使用它。 |\n\n6.  在包级别，添加一个名为 `CDCState` 的新 String\
  \ 变量。\n7.  在控制流窗格中添加一个名为 `CDC LSN Start` 的 CDC 控制任务。打开它并设置以下参数：\n\n    | 名称 | 类型\
  \ | 注释 |\n    | --- | --- | --- |\n    | SQL Server CDC Database/ADO.NET Connection\
  \ Manager | `CarSales_ADONET` | 这是先前定义的到已启用 CDC 的源数据库的连接。 |\n    | CDC Control Operation\
  \ | `Mark initial load start` | 这告知任务此为初始加载的开始。 |\n    | Variable containing CDC\
  \ State | `CDCState` | 用于存储 LSN 的变量。 |\n    | Connection Manager where the database\
  \ where the state is stored | `CarSales_ADONET` |  |\n\n8.  为“用于存储状态的表”点击新建。确认默认的表\
  \ DDL（参见 图 12-2）。\n    ![9781430247913_Fig12-02.jpg](img/9781430247913_Fig12-02.jpg)\n\
  \    图 12-2。 在 SSIS 2012 CDC 中定义状态存储表\n\n    其代码为：\n    ```sql\n    CREATE TABLE\
  \ dbo.cdc_states\n    (\n     name NVARCHAR(256) NOT NULL,\n     state NVARCHAR(256)\
  \ NOT NULL\n    ) ;\n    GO\n    CREATE UNIQUE NONCLUSTERED INDEX cdc_states_name\
  \ ON\n     dbo.cdc_states\n     ( name ASC )\n     WITH (PAD_INDEX  = OFF) ;\n \
  \   GO\n    ```\n9.  点击运行以创建表。\n10. 将状态名称设置为 `CDCState`。对话框应如 图 12-3 所示。\n    ![9781430247913_Fig12-03.jpg](img/9781430247913_Fig12-03.jpg)\n\
  \    图 12-3。 CDC 控制任务编辑器\n11. 点击确定以确认更改。\n12. 向控制流窗格添加一个数据流任务，将 CDC 控制任务连接到它，并切换到数据流窗格。\n\
  13. 添加一个 OLEDB 源任务，配置如下：\n    | 名称 | `CarSales` |\n    | OLEDB Connection Manager\
  \ | `CarSales_OLEDB` |\n    | Data Access Mode | `Table or View` |\n    | Name of\
  \ Table or View | `dbo.Client` |\n14. 添加一个 OLEDB 目标任务，链接到源任务并配置如下：\n    | 名称 | `CarSales_Staging`\
  \ |\n    | OLEDB Connection Manager | `CarSales_Staging_OLEDB` |\n    | Data Access\
  \ Mode | `Table or View – fast load` |\n    | Name of Table or View | `dbo.Client_CDCSSIS`\
  \ |\n    | Keep Identity | `Checked` |\n15. 将所有源列映射到目标列。数据流应如 图 12-4 所示。\n    ![9781430247913_Fig12-04.jpg](img/9781430247913_Fig12-04.jpg)\n\
  \    图 12-4。 SSIS 2012 CDC 的处理流程\n16. 返回控制流选项卡。添加一个 CDC 控制任务，命名为 `CDC LSN end`。将数据流任务连接到它，然后双击进行编辑。\n\
  17. 设置与之前（步骤 8）相同的参数，但确保 CDC 控制操作现在为 “`Mark initial load end`”。对话框应如 图 12-5 所示。\n\
  \    ![9781430247913_Fig12-05.jpg](img/9781430247913_Fig12-05.jpg)\n    图 12-5。\
  \ 用于标记初始加载结束的 CDC 控制任务编辑器对话框\n18. 运行包以启动变更数据捕获。整个包应如 图 12-6 所示。\n    ![9781430247913_Fig12-06.jpg](img/9781430247913_Fig12-06.jpg)\n\
  \    图 12-6。 实例化 CDC 时的处理流程\n19. 在同一 SSIS 项目中创建一个新的 SSIS 包（这将允许您使用初始加载中使用的相同连接管理器）。\n\
  20. 在包级别，添加一个名为 `CDCState` 的新 String 变量。\n21. 向控制流窗格添加一个执行 SQL 任务。配置如下：\n    | 名称\
  \ | `Prepare Staging Tables` |\n    | Connection Type | `OLEDB` |\n    | Connection\
