  \n#### 15-13. 从 T-SQL 记录到文本或 XML 文件\n\n### 问题\n\n你希望将过程信息记录到文本或 XML 文件，而不是 SQL Server\
  \ 表中。\n\n### 解决方案\n\n创建一个基于 CLR 的存储过程，将信息记录到磁盘，如下所示。\n\n1.  首先，你需要一个简单的 CLR 例程将日志数据输出到磁盘。这可以通过创建一个名为\
  \ `WriteToDisk` 的 CLR 存储过程来完成，使用以下 C# 代码（有关如何创建和加载 CLR 例程的概述，请参见配方 10-21）：\n\n \
  \   ```csharp\n    using System;\n    using System.Diagnostics;\n    using System.IO;\n\
  \n    public class DiskWriter\n    {\n        [Microsoft.SqlServer.Server.SqlProcedure()]\n\
  \        public static void WriteToDisk(string theData, string theFile)\n      \
  \  {\n            File.WriteAllText(theFile, theData);\n        }\n    }\n    ```\n\
  \n2.  一旦你部署并安装了 CLR 存储过程，你就可以使用它写入文本文件。\n\n```vbnet\nDim StartTime As Date = Now()\n\
  Dim cnMgr As SqlClient.SqlConnection\n\ncnMgr = DirectCast(Dts.Connections(\"CarSales_ADONET\"\
  ).AcquireConnection(Dts.Transaction), SqlClient.SqlConnection)\n\nDim cmd As New\
  \ SqlClient.SqlCommand\n\ncmd.CommandText = \"Log.pr_LogEvents\"\ncmd.CommandType\
  \ = CommandType.StoredProcedure\ncmd.Parameters.AddWithValue(\"Process\", DbType.String).Value\
  \ = Dts.Variables(\"PackageName\").Value\ncmd.Parameters.AddWithValue(\"Step\",\
  \ DbType.String).Value = Dts.Variables(\"TaskName\").Value\ncmd.Parameters.AddWithValue(\"\
  StartTime\", DbType.DateTime).Value = StartTime\ncmd.Parameters.AddWithValue(\"\
  Comments\", DbType.String).Value = \"This seems to have worked!\"\n\ncmd.ExecuteNonQuery()\n\
  \nDts.Connections(\"CarSales_Logging_ADONET\").ReleaseConnection(Nothing)\n\nDts.TaskResult\
  \ = ScriptResults.Success\n```\n\n6. 关闭脚本窗口并单击“确定”以完成你的修改。\n```\n\n\n\n这就像将你希望记录的元素串联起来并传递给\
  \ CLR 存储过程一样简单，如下面的 T-SQL 代码片段所示：\n\n```\nDECLARE @OUTPUT NVARCHAR(MAX)\nDECLARE\
  \ @PackageName VARCHAR(150)\nDECLARE @StepName VARCHAR(150)\nDECLARE @StartTime\
  \ DATETIME\nDECLARE,@MachineName VARCHAR(150)\n\nSET PackageName = 'MyPackage'\n\
  SET StepName = 'FirstStep'\nSET StartTime = CONVERT(VARCHAR(20), @StartTime, 112)\n\
  SET MachineName = 'MyPC'\n\nSET @OUTPUT = @PackageName + ',' + @StepName + ',' +\
  \ @StartTime + ',' + @MachineName\n\nEXECUTE dbo.WriteToDisk @OUTPUT,'C:\\SQL2012DIRecipes\\\
  CH13\\AA_log.Csv'\n```\n\n### 工作原理\n\n如果你倾向于将状态信息写入 SQL Server 外部的文件（作为文本或 XML），那么可以使用相当“经典”的技术来实现。你可能出于以下几个原因希望这样做：\n\
  \n*   将日志写入文件可以减少数据库开销——代价是运行一个 CLR 函数。\n*   你可以轻松地将数据记录到不同的服务器，进一步降低主 SQL Server\
  \ 的负载。\n*   你更喜欢将日志数据保存在数据库之外。\n*   即使发生致命的数据库问题，你仍然拥有日志数据。\n\n首先，你需要一个基于 CLR 的存储过程，该过程接受两个输入参数：\n\
  \n*   要写入文件的数据行。\n*   数据将被写入的文件的完整路径。\n\n此过程仅包含一行代码，该行使用 `WriteAllText` 函数将一行内容添加到指定的文件中。一旦这个\
  \ CLR 程序集被编译并部署到 SQL Server 并创建了程序集，它的调用方式就与其他任何存储过程一样。\n\n编写 XML 日志可能需要对 XML 进行一些准备。在这里，我将格式化从日志表中提取的数据，并使用与\
  \ SSIS 相同的格式导出为 XML：\n\n```\nDECLARE @OUTPUT NVARCHAR(MAX)\n\n; WITH XML_CTE (XMLOUTPUT)\
  \ AS (\n    SELECT ERROR_LOG_ID AS 'record/event',\n           CREATEDATE AS 'record/message',\n\
  \           CREATEUSERNAME AS 'record/computer'\n    FROM CarSales_Logging.Log.EventDetail\n\
  \    FOR XML PATH('dtslog'), ROOT('dtslogs')\n)\n\nSELECT @OUTPUT = XMLOUTPUT FROM\
  \ XML_CTE\n\nEXECUTE dbo.WriteToDisk @OUTPUT,'D:\\AdamProject\\Test\\AA_XML.XML'\n\
  ```\n\n#### 提示、技巧与陷阱\n\n*   你可以在每个事件发生时将其写入磁盘，也可以在过程结束时执行一次写入操作。第一个示例中的文本输出假设采用了前一种方法；XML\
  \ 示例则假设选择了后一种。每一行都写入可确保在发生大规模故障时，你仍然拥有日志记录；而在过程结束时写出数据，可以被视为一种可选操作，作为对数据库日志记录的补充。\n\
  \n#### 15-14. 在 T-SQL 中记录计数器\n\n### 问题\n\n你希望记录计数器（记录数）以跟踪基于 T-SQL 的过程中每个阶段处理的记录数量。\n\
  \n### 解决方案\n\n创建一个自定义的计数器记录框架。\n\n1.  至少，你需要一个存储所记录计数器的存储库。最简单的存储介质是 SQL 表，因此这里提供了\
  \ `Log_ProcessCounters` 表的 DDL（`C:\\SQL2012DIRecipes\\CH15\\tblLog_ProcessCounters.Sql`）：\n\
  \n```\nCREATE TABLE CarSales_Logging.log.Log_ProcessCounters\n(\n    ID INT IDENTITY(1,1)\
  \ NOT NULL,\n    PROCESSID INT NULL,\n    CounterType NVARCHAR(250) NULL,\n    CounterDescription\
