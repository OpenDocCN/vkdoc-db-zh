  \ PK_Dim_Products PRIMARY KEY CLUSTERED (\n ID ASC )WITH (PAD_INDEX = OFF, STATISTICS_NORECOMPUTE\
  \ = OFF, IGNORE_DUP_KEY = OFF, ALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS = ON) ON PRIMARY\n\
  ) ;\nGO\n\nCREATE TABLE dbo.Dim_Geography (\n ID int IDENTITY(1,1) NOT NULL,\n Country\
  \ nvarchar(50) NULL,\n State_County nvarchar(50) NULL,\n Town nvarchar(50) NULL,\n\
  \ CONSTRAINT PK_Dim_Geography PRIMARY KEY CLUSTERED (\n ID ASC )WITH (PAD_INDEX\
  \ = OFF, STATISTICS_NORECOMPUTE = OFF, IGNORE_DUP_KEY = OFF, ALLOW_ROW_LOCKS = ON,\
  \ ALLOW_PAGE_LOCKS = ON) ON PRIMARY\n) ;\nGO\n\nCREATE TABLE dbo.Dim_Clients (\n\
  \ ID int IDENTITY(1,1) NOT NULL,\n Client_Name nvarchar(150) NULL,\n Client_Size\
  \ varchar(10) NULL,\n Client_Type varchar(10) NULL,\n CONSTRAINT PK_Dim_Clients\
  \ PRIMARY KEY CLUSTERED (\n ID ASC )WITH (PAD_INDEX = OFF, STATISTICS_NORECOMPUTE\
  \ = OFF, IGNORE_DUP_KEY = OFF, ALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS = ON) ON PRIMARY\n\
  ) ;\nGO\n```\n\n该数据库包含一个存储过程 (`dbo.pr_FillDW`)，该过程从 `CarSales` 数据库获取数据并用于填充 `CarSales_DW`\
  \ 数据库。相关脚本位于 `C:\\SQLDIRecipes\\Databases\\CarSales_FillDW.Sql`。\n\n```sql\nCREATE\
  \ procedure dbo.pr_FillDW\nAS\n\n-- Geography\nTRUNCATE TABLE dbo.Dim_Geography\n\
  INSERT INTO dbo.Dim_Geography ( Country ,State_County ,Town )\nSELECT DISTINCT C.CountryName_EN\
  \ ,L.County ,L.Town\nFROM               CarSales_Book.dbo.Countries C\n        \
  \           INNER JOIN     CarSales_Book.dbo.Client L\n                   ON   \
  \          C.CountryID = L.Country\n-- Clients\nTRUNCATE TABLE dbo.Dim_Clients\n\
  INSERT INTO dbo.Dim_Clients ( Client_Name ,Client_Size ,Client_Type )\nSELECT DISTINCT\
  \    ClientName, ClientSize, ClientType\nFROM               CarSales_Book.dbo.Client\n\
  \n-- Products\nTRUNCATE TABLE dbo.Dim_Products\nINSERT INTO dbo.Dim_Products ( Product_Type\
  \ ,Make ,Marque ,Model ,Colour ,Vehicle_Type )\nSELECT DISTINCT   S.Product_Type,\
  \ S.Make, S.Marque, S.Model, C.Colour, S.Vehicle_Type\nFROM              CarSales_Book.dbo.Colours\
  \ C\n                  INNER JOIN    CarSales_Book.dbo.Stock S\n               \
  \   ON            C.ColourID = S.Colour\n-- Fact table\nTRUNCATE TABLE dbo.Fact_Sales\n\
  INSERT INTO dbo.Fact_Sales ( Sale_Price ,InvoiceDate ,Total_Discount ,Delivery_Cost\
  \ ,Cost_Price ,Make_X ,Marque_X ,Model_X ,Colour_X ,Product_Type_X ,Vehicle_Type_X\
  \ ,ClientName_X ,Country_X ,Town_X ,County_X )\nSELECT DISTINCT L.SalePrice, I.InvoiceDate,\
  \ I.TotalDiscount, I.DeliveryCharge, S.Cost_Price, S.Make, S.Marque, S.Model, C.Colour,\
  \ S.Product_Type, S.Vehicle_Type, CL.ClientName, CR.CountryName_EN, CL.Town, CL.County\n\
  FROM          CarSales_Book.dbo.Colours C\n              INNER JOIN    CarSales_Book.dbo.Stock\
  \ S\n              ON            C.ColourID = S.Colour\n              INNER JOIN\
  \    CarSales_Book.dbo.Invoice_Lines L\n              ON            S.ID = L.StockID\n\
  \              INNER JOIN    CarSales_Book.dbo.Invoice I\n              ON     \
  \       L.InvoiceID = I.ID\n              INNER JOIN    CarSales_Book.dbo.Client\
  \ CL\n              ON            I.ClientID = CL.ID\n              INNER JOIN \
  \   CarSales_Book.dbo.Countries CR\n              ON            CL.Country = CR.CountryID\n\
  \n-- Set GeographyID\nUPDATE       F\nSET          F.Geography_ID = G.ID\nFROM \
  \        dbo.Fact_Sales F\n             INNER JOIN   dbo.Dim_Geography G\n     \
  \        ON           F.Country_X = G.Country\n             AND          F.County_X\
  \ = G.State_County\n             AND          F.Town_X = G.Town\n-- Set ProductID\n\
  UPDATE F\nSET            F.Product_ID = P.ID\nFROM           dbo.Fact_Sales F\n\
  \               INNER JOIN   dbo.Dim_Products P\n               ON           F.Product_Type_X\
  \ = P.Product_Type\n               AND          F.Make_X = P.Make\n            \
  \   AND          F.Marque_X = P.Marque\n               AND          F.Model_X =\
  \ P.Model\n               AND          F.Vehicle_Type_X = P.Vehicle_Type\n\n-- Set\
  \ Client ID\nUPDATE         F\nSET            F.Client_ID = C.ID\nFROM         \
  \  dbo.Fact_Sales F\n               INNER JOIN   dbo.Dim_Clients C\n           \
  \    ON           F.ClientName_X = C.Client_Name\nGO\n```\n\n## CarSales SSAS 多维数据集\n\
  \n该多维数据集在结构上与 `CarSales_DW` 数据库基本相同。它包含以下部分：\n\n| Sales:     | 核心（也是唯一的）事实表。 |\n\
  |------------|----------------------------|\n| Products:  | 产品维度。              \
  \   |\n| Clients:   | 客户维度。                 |\n| Geography: | 地理维度。            \
  \     |\n\n由于此处的目标是允许数据导出，而不是解释多维数据集开发，因此没有时间维度。\n\n## 还原 CarSales_Cube SSAS 数据库\n\
  \n可以使用脚本 `C:\\SQLDIRecipes\\Databases\\CarSales_CubeDatabaseRestore.Mdx` 还原 `CarSales_Cube`\
  \ 数据库。用于还原此 Analysis Services 数据库的 XMLA 脚本确实太长，无法在此处复制——但你可以在本书的网站上找到它。\n\n## CarSales_Logging\n\
  \n`CarSales_Logging` 数据库是一个非常简单的数据库，用于保存第 15 章中使用的日志和审核表。它最初不包含任何表——你选择使用哪些表取决于你选择遵循的配方。创建该数据库的代码位于\
  \ `C:\\SQLDIRecipes\\Databases\\CarSales_LoggingDatabaseCreation.Sql`：\n\n```sql\n\
  USE master\nGO\n\nIF db_id('CarSales_Logging') IS NOT NULL DROP DATABASE CarSales_Logging';\n\
  GO\n\nCREATE DATABASE CarSales_Logging\n CONTAINMENT = NONE\n ON PRIMARY ( NAME\
  \ = N'CarSales_Logging', FILENAME = N'C:\\SQLDIRecipes\\Databases\\CarSales_Logging.mdf'\
  \ , SIZE = 33792KB , MAXSIZE = UNLIMITED, FILEGROWTH = 1024KB )\n LOG ON ( NAME\
  \ = N'CarSales_Logging_log', FILENAME = N'C:\\SQLDIRecipes\\Databases\\CarSales_Logging_log.ldf'\
  \ , SIZE = 4224KB , MAXSIZE = 2048GB , FILEGROWTH = 10%)\nGO\nALTER DATABASE CarSales_Logging\
  \ SET COMPATIBILITY_LEVEL = 110\nGO\nALTER DATABASE CarSales_Logging SET QUOTED_IDENTIFIER\
  \ OFF\nGO\nALTER DATABASE CarSales_Logging SET RECOVERY SIMPLE\nGO\nALTER DATABASE\
  \ CarSales_Logging SET READ_WRITE\nGO\n```\n\n## 示例文件的目录结构\n\n`SQL2012DIRecipes.Zip`\
  \ 文件中的目录结构见 表 B-1。\n\n[表 B-1。\n\n\n"
