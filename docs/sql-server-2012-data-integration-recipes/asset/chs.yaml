  此数据类型集合包含已弃用但仍可能在较旧的 Oracle 数据库中找到并需要导入 SQL Server 的数据类型。它们列于表 A-36。\n\n### 表 A-36.\
  \ Oracle 到 SQL Server 和 SSIS 数据类型映射\n![TableAppA-36a.jpg](img/TableAppA-36a.jpg)![TableAppA-36b.jpg](img/TableAppA-36b.jpg)\n\
  \n如果你知道所使用的日期或数字范围可以映射到特定的 SQL Server 数据类型，那么你可以将一个 `NUMBER(3)` 映射为 `TINYINT`，例如。如果不确定，则应始终映射到更大的数据类型，以避免加载失败。\n\
  \n### Oracle 到 SQL Server 复制数据类型映射\nOracle 到 SQL Server 的进程使用了略有不同的数据映射。你可能会发现它有用。该映射提供在表\
  \ A-37 中。\n\n### 表 A-37. Oracle 到 SQL Server 复制数据类型映射\n| Oracle 数据类型 | SQL Server\
  \ 数据类型 |\n| --- | --- |\n| `BFILE` | `VARBINARY(MAX)` |\n| `BLOB` | `VARBINARY(MAX)`\
  \ |\n| `CHAR([1–2000])` | `CHAR([1–2000])` |\n| `CLOB` | `VARCHAR(MAX)` |\n| `DATE`\
  \ | `DATETIME` |\n| `FLOAT` | `FLOAT` |\n| `FLOAT([1–53])` | `FLOAT([1–53])` |\n\
  | `FLOAT([54–126])` | `FLOAT` |\n| `INT` | `NUMERIC(38)` |\n| `INTERVAL` | `DATETIME`\
  \ |\n| `LONG` | `VARCHAR(MAX)` |\n| `LONG RAW` | `IMAGE` |\n| `NCHAR([1–1000])`\
  \ | `NCHAR([1–1000])` |\n| `NCLOB` | `NVARCHAR(MAX)` |\n| `NUMBER` | `FLOAT` |\n\
  | `NUMBER([1–38])` | `NUMERIC([1–38])` |\n| `NUMBER([0–38],[1–38])` | `NUMERIC([0–38],[1–38])`\
  \ |\n| `NVARCHAR2([1–2000])` | `NVARCHAR([1–2000])` |\n| `RAW([1–2000])` | `VARBINARY([1–2000])`\
  \ |\n| `REAL` | `FLOAT` |\n| `ROWID` | `CHAR(18)` |\n| `TIMESTAMP` | `DATETIME`\
  \ |\n| `TIMESTAMP(0–7)` | `DATETIME` |\n| `TIMESTAMP(8–9)` | `DATETIME` |\n| `TIMESTAMP(0–7)\
  \ WITH TIME ZONE` | `VARCHAR(37)` |\n| `TIMESTAMP(8–9) WITH TIME ZONE` | `VARCHAR(37)`\
  \ |\n| `TIMESTAMP(0–7) WITH LOCAL TIME ZONE` | `VARCHAR(37)` |\n| `TIMESTAMP(8–9)\
  \ WITH LOCAL TIME ZONE` | `VARCHAR(37)` |\n| `UROWID` | `CHAR(18)` |\n| `VARCHAR2([1–4000])`\
  \ | `VARCHAR([1–4000])` |\n\nMySQL 数据类型\n关于 MySQL 到 SQL Server 数据类型映射的最佳指南是微软的白皮书\
  \ *《从 MySQL 迁移到 SQL Server 2008 指南》* (`www.microsoft.com/en-us/download/details.aspx?id=24662`)。尽管（尚未）针对\
  \ SQL Server 2012 更新，但它是一个非常宝贵的资源。\n\nSybase 到 SQL Server 数据类型转换\n关于 Sybase 到 SQL\
  \ Server 数据类型映射的最佳指南在微软的白皮书 *《从 Sybase ASE 迁移到 SQL Server 2008 指南》* (`www.microsoft.com/en-us/download/details.aspx?id=24662`)中。尽管（尚未）针对\
  \ SQL Server 2012 更新，但它是一个至关重要的资源。\n\n## 附录 B\n![image](img/frontdot.jpg)\n\n##\
  \ 示例数据库与脚本\n\n### 示例数据库与文件\n正如我在引言中所说，我倾向于使用一组不同于经典的 `AdventureWorks` 示例数据库，因为后者可能过于复杂，无法简单清晰地演示数据集成过程。我提议的数据库架构极其简单且非常轻量级。实际上，它将导致你所遇到过的最微小的数据加载。然而，考虑到现实工作很可能对此有所弥补，我希望没有人会介意太多。\n\
  \n示例数据包含五个数据库：\n| 数据库 | 描述 |\n| --- | --- |\n| `CarSales` | 主数据库。有时用作源数据。 |\n| `CarSales_Staging`\
  \ | 用于暂存过程和作为 SQL Server 数据源的数据库。 |\n| `CarSales_DW` | 用于将数据加载到 SSAS 多维数据集中的维度数据库。\
  \ |\n| `CarSales_Logging` | 用于记录和审核 ETL 过程的独立数据库。 |\n| `CarSales_Cube` | 作为维度数据源的\
  \ SSAS 数据库。 |\n\n这些数据库——连同本书中使用的所有其他示例文件——都包含在 `SQL2012DIRecipes.Zip` 文件中，可在 `www.apress.com/9781430247913`\
  \ 获取。只需点击页面中部附近标有“Source Code/Downloads”的标签即可下载该文件。然后使用你首选的工具解压缩。请确保保留底层的目录结构。\n\
  \n### CarSales\n使用的主数据库是 `CarSales` 数据库。它由六张表组成：\n*   `Client` (客户)\n*   `Colors`\
  \ (颜色)\n*   `Countries` (国家)\n*   `Invoice` (发票)\n*   `Invoice_Lines` (发票明细)\n*\
  \   `Stock` (库存)\n\n选择此设计是因为它几乎涵盖了所有 SQL Server 数据类型，并且只有最少的参照完整性约束来模拟真实世界环境。\n\n\
  `C:\\SQLDIRecipes\\Backups` 文件夹（假设你已从本书网站下载了示例）包含以下文件：\n| 文件 | 描述 |\n| --- | ---\
  \ |\n| `CarSales.Bak` | `CarSales` 数据库备份文件。 |\n| `CarSales_Staging.Bak` | `CarSales_Staging`\
  \ 数据库备份文件。 |\n| `CarSales_DW.Bak` | `CarSales_DW` 数据库备份文件。 |\n| `CarSales_Cube.abf`\
  \ | `CarSales_Cube` SSAS 数据库备份文件。 |\n| `CarSales_Logging.Bak` | `CarSales_Logging`\
  \ 数据库备份文件。 |\n\n### 创建 CarSales 数据库\n可以使用以下脚本（`C:\\SQLDIRecipes\\Databases\\CarSalesDatabaseCreation.Sql`）创建\
  \ `CarSales` 数据库：\n```sql\nUSE master\nGO\nCREATE DATABASE CarSales\n CONTAINMENT\
  \ = NONE\n ON PRIMARY\n     (NAME = N'CarSales', FILENAME = N'C:\\SQLDIRecipes\\\
  Databases\\CarSales.mdf',\n       SIZE = 33792KB , MAXSIZE = UNLIMITED, FILEGROWTH\
  \ = 1024KB )\n LOG ON\n     (NAME = N'CarSales_log', FILENAME = N'C:\\SQLDIRecipes\\\
  Databases\\CarSales_log.ldf',\n       SIZE = 4224KB , MAXSIZE = 2048GB , FILEGROWTH\
  \ = 10%)\nGO\n\nALTER DATABASE CarSales SET COMPATIBILITY_LEVEL = 110\nGO\nALTER\
  \ DATABASE CarSales SET QUOTED_IDENTIFIER OFF\nGO\nALTER DATABASE CarSales SET RECOVERY\
  \ SIMPLE\nGO\nALTER DATABASE CarSales SET  READ_WRITE\nGO\n```\n如果数据库已存在，可以使用以下脚本删除它：\
  \ (`C:\\SQLDIRecipes\\Databases\\DropDatabase.Sql`)\n```sql\nIF db_id('CarSales')\
  \ IS NOT NULL\nDROP DATABASE CarSales;\nGO\n```\n![image](img/sq.jpg) **注意** 你只需将此脚本中的数据库名称更改为你希望删除的数据库名称，即可将其用于任何提供的关系型数据库。\n\
  \n可以使用以下脚本创建 `CarSales` 的表。请记住以 `USE DATABASE` 和所需的数据库名称（应为 `CarSales` 或 `CarSales_Staging`）开始\
  \ (`C:\\SQLDIRecipes\\Databases\\.Sql`)：\n```sql\nUSE CarSales;\nGO\n\nIf OBJECT_ID('dbo.Client')\
  \ IS NOT NULL DROP TABLE dbo.Client\n\nCREATE TABLE dbo.Client\n(\n ID int IDENTITY(1,1)\
  \ NOT NULL,\n ClientName NVARCHAR(150) NULL,\n Address1 VARCHAR(50) NULL,\n Address2\
  \ VARCHAR(50) NULL,\n Town VARCHAR(50) NULL,\n County VARCHAR(50) NULL,\n PostCode\
  \ VARCHAR(10) NULL,\n Country TINYINT NULL,\n ClientType VARCHAR(20) NULL,\n ClientSize\
  \ VARCHAR(10) NULL,\n ClientSince SMALLDATETIME NULL,\n IsCreditWorthy BIT NULL,\n\
  \ DealerGroup HIERARCHYID NULL,\n MapPosition GEOGRAPHY NULL\n) ;\nGO\n\nIf OBJECT_ID('dbo.Colours\
  \ ') IS NOT NULL DROP TABLE dbo.Colours\n\nCREATE TABLE dbo.Colours\n(\n ColourID\
  \ TINYINT NOT NULL,\n Colour NVARCHAR(50) NULL\n) ;\nGO\n\nCREATE TABLE dbo.Countries\n\
  (\n CountryID TINYINT NOT NULL,\n CountryName_EN NVARCHAR(50) NULL,\n CountryName_Local\
  \ NVARCHAR(50) NULL\n) ;\nGO\n\nIf OBJECT_ID('dbo.Invoice ') IS NOT NULL DROP TABLE\
  \ dbo.Invoice\n\nCREATE TABLE dbo.Invoice\n(\n ID int IDENTITY(1,1) NOT NULL,\n\
  \ InvoiceNumber NVARCHAR(50) NOT NULL CONSTRAINT DF_Invoice_InvoiceNumber  DEFAULT\
  \ (newid()),\n ClientID INT NULL,\n InvoiceDate DATETIME NULL,\n TotalDiscount NUMERIC(18,\
  \ 2) NULL,\n DeliveryCharge SMALLMONEY NULL\n) ;\nGO\n\nIf OBJECT_ID('dbo.Invoice_Lines\
  \ ') IS NOT NULL DROP TABLE dbo.Invoice_Lines\n\nCREATE TABLE dbo.\n```\n\n\n"
