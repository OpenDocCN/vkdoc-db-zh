  ## 从 MS Office 应用程序中获取数据





  '
- "# 第 1 章 从 Microsoft Office 获取数据\n\n我怀疑许多工业级的 SQL Server 应用程序，最初都是从一个更小的、基于 Microsoft\
  \ Office 的想法开始的，然后不断增长和扩展，最终成为一个强大的 SQL Server 应用程序。无论如何，两个 Microsoft Office 程序——Excel\
  \ 和 Access——是最常用于最终加载到 SQL Server 的数据源。这其中的原因很多，从它们无处不在的特性，到用户可以轻松地将数据输入到 Access\
  \ 数据库和 Excel 电子表格中。因此，难怪我们开发人员和 DBA 花费大量时间将这些来源的数据加载到 SQL Server 中。\n\n有多种方法可以将数据从\
  \ MS Office 来源推送或拉取到 SQL Server 中。这些方法包括：\n\n*   使用 T-SQL（`OPENDATASOURCE` 和 `OPENROWSET`）\n\
  *   链接服务器（是的，Access 数据库甚至 Excel 电子表格都可以成为链接服务器）\n*   SSIS\n*   SQL Server 导入向导\n\
  *   用于 Access 的 SQL Server 迁移助手\n\n本章将探讨所有这些技术，并尝试为你提供关于其最佳用法（以及不可避免的限制）的一些指导。\n\
  \n本章使用的所有示例文件都位于 `C:\\SQL2012DIRecipes\\CH01` 目录中——假设你已经从本书的配套网站下载了示例并按照附录 B 中的描述进行了安装。\n\
  \n## 1-1. 确保连接到 Access 和 Excel\n\n### 问题\n\n你希望能够在 32 位和 64 位环境中导入所有版本的 Excel 和\
  \ Access 数据（包括最新的文件格式）。\n\n### 解决方案\n\n你需要安装 Microsoft Access 可连接性引擎 (ACE) 驱动程序。请按照以下步骤操作：\n\
  \n1.  在相应的网页上单击“下载”。这将把可执行文件下载到你选择的目录。\n\n![image](img/sq.jpg) **注意** ACE 驱动程序可以在\
  \ `www.microsoft.com/en-us/download/details.aspx?id=13255` 找到。这个地址可能会随时间变化——但快速的互联网搜索应该能让你很快找到当前的来源。\n\
  \n2.  双击你下载的 `AccessDatabaseEngine.exe` 文件。对于 64 位版本，文件名将是 `AccessDatabaseEngine_x64.exe`。\n\
  3.  按照说明进行操作。\n4.  在 SSMS 中，展开“服务器对象” ![image](img/arrow.jpg) “链接服务器” ![image](img/arrow.jpg)\
  \ “提供程序”。\n5.  假设驱动程序安装成功，你应该会看到 `Microsoft.ACE.OLEDB.12.0` 提供程序。\n6.  双击该提供程序并勾选“允许进程内”和“动态参数”。\n\
  \n作为步骤 4-6 的替代方案，如果你更喜欢命令行方法，可以运行以下 T-SQL 代码段（位于本书示例的 `C:\\SQL2012DIRecipes\\CH01\\\
  SetACEProperties.Sql` 文件中）：\n\n```sql\nEXECUTE master.dbo.sp_MSset_oledb_prop N'Microsoft.ACE.OLEDB.12.0'\
  \ , N'AllowInProcess' , 1;\nGO\nEXECUTE master.dbo.sp_MSset_oledb_prop N'Microsoft.ACE.OLEDB.12.0'\
  \ , N'DynamicParameters' , 1;\nGO\n```\n\n现在，驱动程序已安装并准备就绪。\n\n### 工作原理\n\n在尝试从 Excel\
  \ 或 Access 读取数据之前，确保服务器上安装了允许读取这些文件的驱动程序至关重要。目前，SQL Server 安装只会附带“旧的”32 位 Jet 驱动程序，而该驱动程序有严重的限制。主要问题在于它无法读取最新版本的\
  \ Access 和 Excel，并且无法在 64 位环境中运行。\n\n使用最新的 ACE 驱动程序通常会让你的工作更轻松，因为最新版本具有旧版本的所有功能，并增加了额外的功能。尽管被称为“AccessDatabaseEngine”，但该驱动程序也可以读取和写入\
  \ Excel 文件以及文本文件。\n\n令人困惑的是，在 SSMS 的链接服务器提供程序列表中，“2007 Office System Driver”和“Microsoft\
  \ Access Engine 2010 可再发行组件包”都被显示为“Microsoft.ACE.OLEDB.12.0”。64 位 SQL Server 应用程序可以通过在\
  \ 64 位 Windows 上使用 32 位 SQL Server Integration Services (SSIS) 来访问 32 位 Jet 和 2007\
  \ Office System 文件。\n\n当前可用的 Office 驱动程序版本列于表 1-1。\n\n表 1-1. MS Office 驱动程序\n\n\
  ![image](img/Table1-1.jpg)\n\n### 提示、技巧和陷阱\n\n*   如果你仍然想使用旧的 32 位 Jet 驱动程序，只要将 Excel\
  \ 源文件保存为 Excel 97–2003 格式，并且在 32 位环境中工作，你就可以使用它。\n*   ACE 驱动程序支持以下系统：Windows 7；Windows\
  \ Server 2003 R2，32 位 x86；Windows Server 2003 R2，x64 版本；Windows Server 2008 R2；Windows\
  \ Server 2008 with Service Pack 2；Windows Vista with Service Pack 1；以及 Windows XP\
  \ with Service Pack 3。\n*   在同一台服务器上，你只能安装 64 位版本或 32 位版本的 ACE 驱动程序之一。这意味着如果你安装了\
  \ 64 位 ACE 驱动程序，就无法在 Business Intelligence development Studio (BIDS) 或 SQL Server\
  \ Development Tools (SSDT) 中进行开发——因为 BIDS/SSDT 是一个 32 位环境。然而，如果你改为安装 32 位 ACE 驱动程序，那么你就无法运行\
  \ 64 位包，而必须使用 32 位的替代方案。理想情况下，你应该在安装有 32 位 ACE 驱动程序的 32 位环境中进行开发（或者在 64 位机器上开发，但不要期望能正常运行该包），然后部署到已准备好\
  \ 64 位驱动程序的 64 位环境中。\n\n## 1-2. 从 Excel 导入数据\n\n### 问题\n\n你希望尽可能快速、简单地从 Excel 电子表格导入数据。\n\
  \n### 解决方案\n\n运行 SQL Server 导入和导出向导，并让它指导你完成导入过程。\n\n以下是需要遵循的步骤：\n\n1.  在 SQL Server\
  \ Management Studio 中，右键单击一个数据库（最好是你希望导入数据的目标数据库），依次点击“任务” ![image](img/arrow.jpg)\
  \ “导入数据”（参见图 1-1）。\n\n![9781430247913_Fig01-01.jpg](img/9781430247913_Fig01-01.jpg)\n\
  \n图 1-1.  从 SSMS 启动导入/导出向导\n\n2.  跳过启动画面。“选择数据源”屏幕出现。\n3.  选择“Microsoft Excel”作为数据源，并输入或浏览要导入的文件。务必从下拉列表中选择与源文件类型对应的\
  \ Excel 版本，并指定你的数据是否包含标题（参见图 1-2）。\n\n![9781430247913_Fig01-02.jpg](img/9781430247913_Fig01-02.jpg)\n\
  \n图 1-2.  在导入/导出向导中选择数据源\n\n4.  单击“下一步”。“选择目标”对话框出现（参见图 1-3）。\n\n![9781430247913_Fig01-03.jpg](img/9781430247913_Fig01-03.jpg)\n\
  \n图 1-3.  在导入/导出向导中选择目标\n\n5.  确保目标是“SQL Server Native Client”，服务器名称正确，并且你已选择了正确的目标数据库（本例中是\
  \ `CarSales_Staging`）以及你正在使用的身份验证模式（对于 SQL Server 身份验证，需提供相应的用户名和密码）。\n6.  单击“下一步”。“指定表复制或查询”对话框出现（参见图\
  \ 1-4）。\n\n![9781430247913_Fig01-04.jpg](img/9781430247913_Fig01-04.jpg)\n\n图 1-4.  在导入/导出向导中指定表复制或查询\n\
  \n7.  接受默认选项“从一个或多个表或视图复制数据”。\n8.  单击“下一步”。“选择源表或视图”对话框出现（参见图 1-5）。\n\n![9781430247913_Fig01-05.jpg](img/9781430247913_Fig01-05.jpg)\n\
  \n\n\n图 1-5. 在导入/导出向导中选择源表\n\n9.  选择要导入的工作表。\n10. 单击“下一步”。将显示“保存并运行包”对话框（参见 图 1-6）。\n\
  \n![9781430247913_Fig01-06.jpg](img/9781430247913_Fig01-06.jpg)\n\n图 1-6. 运行导入/导出向导包\n\
  \n11. 确保选中“立即运行”，且未选中“保存 SSIS 包”。\n12. 单击“下一步”。将显示“完成该向导”对话框（参见 图 1-7）。\n\n![9781430247913_Fig01-07.jpg](img/9781430247913_Fig01-07.jpg)\n\
  \n图 1-7. 完成导入/导出向导\n\n13. 单击“完成”。将显示“执行结果”对话框。如果一切顺利，数据已成功加载（参见 图 1-8）。\n\n![9781430247913_Fig01-08.jpg](img/9781430247913_Fig01-08.jpg)\n\
  \n图 1-8. 使用导入/导出向导成功执行\n\n14. 单击“关闭”以结束该过程。\n\n## 工作原理\n\n有时候，你唯一的目的可能就是尽快将大量数据从\
  \ Excel 电子表格加载到 SQL Server 表中。我这里所说的“快”，不仅意味着加载时间极短，还指设置加载过程所花费的时间最少，并且作业能顺利完成，无需费力地配置\
  \ SSIS 包、定义链接服务器或编写使用 `OPENROWSET` 的 T-SQL 来完成工作。这正是 SQL Server 导入和导出向导（简称 `DtsWizard`）发挥优势的地方。额外的好处是，如果你只是偶尔导入电子表格数据，那么\
  \ `DtsWizard` 应用程序提供的逐步指导可能非常有价值。\n\n由于这是本书中第一次解释导入和导出向导，我尽可能解释得完整一些。其优点在于，你会发现这里解释的许多技术同样适用于其他类型的数据源。\n\
  \n在以下情况下，你应该使用 SQL Server 导入和导出向导：\n\n*   当你需要仅将数据从 Excel 电子表格一次性导入 SQL Server 表时。\n\
  *   当你不打算定期或频繁执行此操作时。\n*   当你很少导入 Excel 数据，不想迷失在 SSIS 和/或很少使用的 SQL 命令的复杂世界中，而只是想快速导入数据时。\n\
  *   当你想从同一工作簿中的多个工作表或区域导入数据时。\n\n假设你的 Excel 数据是干净且结构化的（如同数据表一样），那么数据将被成功加载。它可以被传输到在目标数据库中新建的表中（表名与源工作表相同），或者被传输到现有的\
  \ SQL Server 表中。你可以在步骤 8 中决定更倾向于这两种方案中的哪一种。\n\n## 提示、技巧和陷阱\n\n*   如果你是在 64 位环境中工作，从\
  \ SSMS 运行的导入/导出向导默认是 32 位版本的。要强制运行 64 位版本，请选择“开始”->“所有程序”->“Microsoft SQL Server\
  \ 2012”->“导入和导出数据（64 位）”。如果需要安装向导的 32 位版本，请在安装过程中选择“客户端工具”或“SQL Server 数据工具 (SSDT)”。\n\
  *   如果你计划频繁使用 `DtsWizard.exe`，请将该可执行文件的路径添加到你的系统 PATH 环境变量中——除非它已经被添加。\n*   你还可以通过选择“开始”->“运行”，然后输入\
  \ `DtsWizard.exe`（通常位于 `C:\\Program Files\\Microsoft SQL Server\\110\\DTS\\Binn`）来启动\
  \ SQL Server 导入和导出向导可执行文件，或者在 Windows 资源管理器窗口（甚至是命令窗口）中双击该可执行文件。\n\n### 1-3. 在加载过程中修改\
  \ Excel 数据\n\n**问题**\n\n\n\n你需要从一个 Excel 电子表格中导入数据，但在导入过程中需要进行一些基本的修改。这些修改可能包括更改列映射、改变数据类型或选择目标表等操作。\n\
  \n## 解决方案\n\n应用 SQL Server 导入和 Export 向导的一些可用选项。由于我们正在探讨 SQL Server 导入和 Export 向导的各种选项，我将把它们描述为一系列“小技巧”，作为对前一个技巧的扩展。\n\
  \n![image](img/sq.jpg) `注意` 后续部分中的步骤编号指的是技巧 1-2 中的流程。\n\n### 查询源数据\n\n要筛选源数据，在步骤\
  \ 6，选择`编写查询以指定要传输的数据`选项。你会看到图 1-9 中的对话框。\n\n![9781430247913_Fig01-09.jpg](img/9781430247913_Fig01-09.jpg)\n\
  \n图 1-9. 指定用于选择 Excel 数据的源查询\n\n在这里，你可以输入一个 SQL 查询来选择源数据。如果你有一个保存的 SQL 查询，可以浏览加载它。请注意，你使用的语法与使用`OPENROWSET`时相同，如技巧\
  \ 1-4 所述。编写查询时，请注意工作表数据源带有`\"$\"`后缀，但区域则没有。\n\n### 更改目标表名称\n\n在步骤 8，你可以更改目标表的名称，以覆盖默认的工作表或区域名称。\n\
  \n### 替换目标表中的数据\n\n另一个可用的选项是替换目标表中的所有数据。当然，这只会影响已存在的表——如果表不存在，那么无论选择哪个选项，`DTSWiz`都会创建一个表。\n\
  \n为此，在前面的步骤 8，点击`编辑映射`。将出现“列映射”对话框（参见图 1-10）。\n\n![9781430247913_Fig01-10.jpg](img/9781430247913_Fig01-10.jpg)\n\
  \n图 1-10. 在导入/导出向导中编辑列映射\n\n选择`删除目标表中的行`会在插入新数据之前截断目标表。此选项仅在文件已存在时才可用。\n\n### 启用标识插入\n\
  \n“列映射”对话框（参见图 1-10）还允许你启用标识插入，并将值插入到 SQL Server 标识列中。只需选中`启用标识插入`复选框。\n\n### 调整列映射\n\
  \n“列映射”对话框还允许你指定哪个源列映射到哪个特定的目标列。只需从弹出列表中选择所需的目标列——或者，如果你不希望导入特定列的数据，则选择`<忽略>`。\n\
  \n### 为新表更改字段类型\n\n你可以在数据类型映射允许的范围内，更改字段类型和长度/大小。更改文本字段的大小可以避免默认的 255 个字符的导入文本字段长度。更改字段类型会在数据加载过程中修改字段类型。\n\
  \n如果你正在创建一个新表，那么新表将使用新定义的字段类型和大小创建。但是请注意，更改数据类型不会更改数据，并且你选择的任何类型或数据长度必须与源数据兼容，否则加载将失败。\n\
  \n### 从导入/导出向导创建 SQL Server Integration Services (SSIS) 包\n\n导入/导出向导一个非常有用的功能是，能够根据你配置导入时设置的参数创建一个功能齐全的`SSIS`包。这或许并不奇怪，因为导入/导出向导本质上是一个`SSIS`包生成器。虽然它生成的包并非完美，但它们是`ETL`创建过程的一个良好且快速的起点。\n\
  \n要生成`SSIS`包，只需在“保存和执行包”对话框（参见步骤 9，图 1-6）中勾选`保存 SSIS 包`框。系统会提示你选择文件位置。点击`完成`时，包即被创建。\n\
  \n## 工作原理\n\n在强调（我希望）`DtsWizard`是一个用于快速、简单数据导入的优秀工具之后，我想通过展示`DtsWizard`在更复杂的导入场景中可以被证明是多么通用的工具，来扩展你的理解。这是因为有广泛的选项和参数可供你微调\
  \ Excel 导入。\n\n## 提示、技巧和陷阱\n\n*   如果你使用的是 SQL Server 2005，那么你会在图 1-2 所示的“选择数据源”对话框中发现一些细微差异。\n\
  *   在最终对话框（参见图 1-8）的消息列中点击任何消息，对于获取错误信息（如果出现问题）是无价的。\n\n## 1-4. 在临时导入期间指定要加载的 Excel\
  \ 数据\n\n### 问题\n\n你希望仅通过定义要加载的行或筛选源数据，从 Excel 电子表格中导入特定的数据子集。\n\n### 解决方案\n\n在`SELECT`语句中使用\
  \ SQL Server 的`OPENROWSET`命令。这允许你使用标准的`T-SQL`来对源数据进行子集化。例如，你可以运行以下代码片段：\n\n1.  在`CarSales_Staging`数据库中，创建一个名为`LuxuryCars`的目标表，定义如下\n\
  \    (`C:\\SQL2012DIRecipes\\CH01\\tblLuxuryCars.Sql`):\n\n    ```sql\n    CREATE\
  \ TABLE dbo.LuxuryCars\n    (\n     InventoryNumber int NULL,\n     VehicleType\
  \ nvarchar(50) NULL\n    ) ;\n    GO\n    ```\n\n2.  启用远程查询，可以通过运行“方面/外围应用配置”工具（或在\
  \ SQL Server 2005 中直接运行“外围应用配置”工具），或者运行以下`T-SQL`\n    (`C:\\SQL2012DIRecipes\\CH01\\\
  AllowDistributedQueries.Sql`):\n\n    ```sql\n    EXECUTE master.dbo.sp_configure\
  \ 'show advanced options', 1;\n    GO\n    reconfigure ;\n    GO\n    EXECUTE master.dbo.sp_configure\
  \ 'ad hoc distributed queries', 1 ;\n    GO\n    reconfigure;\n    ```\n\n3.  运行以下\
  \ SQL 代码段\n    (`C:\\SQL2012DIRecipes\\CH01\\OpendatasourceInsertACE.Sql`):\n\n\
  \    ```sql\n    INSERT INTO CarSales_Staging.dbo.LuxuryCars (InventoryNumber, VehicleType)\n\
  \    SELECT CAST(ID AS INT) AS InventoryNumber, LEFT(Marque, 50) AS VehicleType\n\
  \    FROM OPENDATASOURCE(\n    'Microsoft.ACE.OLEDB.12.0',\n    'Data Source = C:\\\
  SQL2012DIRecipes\\CH01\\CarSales.xls;Extended Properties = Excel 12.0')...Stock$\n\
  \    WHERE MAKE LIKE '%royce%'\n    ORDER BY Marque;\n    ```\n\n## 工作原理\n\n有时候，你只需要快速访问\
  \ Excel 工作表中的数据。这可能是因为你需要使用 Excel 作为数据源执行快速的`SELECT...INTO`或`INSERT INTO...SELECT`操作。在这种情况下，启动`SSIS`——甚至运行导入向导（参见技巧\
  \ 1-2）来加载数据，可能显得小题大做。这就是在`SELECT`语句中明智地应用 SQL Server 的`OPENDATASOURCE`和`OPENROWSET`命令可以极其有用的地方。\n\
  \n事实上，正如你将看到的，一旦你知道如何连接到源文件，甚至相当复杂的`T-SQL` `SELECT`语句都可以用于 Excel 源数据。并且，由于你编写的是标准\
  \ SQL 命令，它们可以从查询窗口运行，也可以作为存储过程的一部分运行。这在以下情况下特别有用：\n\n*   你想要读取 Excel 工作表的内容，但不想用额外的信息表来\
  \ clutter up 你的数据库。\n*   数据不常被读取。\n*   你知道文件（工作簿）和工作表的名称，并且对数据结构有很好的了解——换句话说，你可以打开文件来读取它。\n\
  *   当你想执行临时查询，并使用标准 SQL 命令选择列和筛选数据时。\n\n\n\n"
- "# 从 Excel 导入数据到 SQL Server：基础操作与进阶技巧\n\n## 通用说明与注意事项\n\n在实际应用中，可以使用 Jet 驱动或 ACE\
  \ 驱动。所描述的技术适用于 Excel 97–2003 (`.xls`) 和 2007–2010 (`.xlsx`) 等格式。此处不包含 `INSERT INTO`\
  \ 或 `SELECT ... INTO` 的具体代码，但假设在实际场景中你会选择其一。\n\n> **注意**\n> ![image](img/sq.jpg)\n\
  > 在这种临时场景下，你可能需要以“管理员身份”运行 SQL Server Management Studio (SSMS)。具体操作是：从开始菜单右键单击 SQL\
  \ Server Management Studio，然后选择“以管理员身份运行”。这是因为运行 SSMS 的用户必须对 SQL Server 启动账户所使用的\
  \ TEMP 目录拥有读写权限。\n\n## 使用 OPENROWSET 进行基本查询\n\n### 查询命名范围\n\n假设你有一个命名范围（示例文件中的 `TinyRange`），可以使用如下\
  \ T-SQL 返回该范围内的数据：\n\n```sql\nSELECT ID, Marque FROM OPENROWSET('Microsoft.Jet.OLEDB.4.0',\n\
  \   'Excel 8.0;Database = C:\\SQL2012DIRecipes\\CH01\\CarSales.xls', TinyRange);\n\
  ```\n\n### 处理无表头数据\n\n如果数据范围不包含列头，则需要在 T-SQL 中添加 `HDR = NO` 属性。否则，第一行将被假定为列头。\n\n\
  ```sql\nSELECT ID, Marque FROM OPENROWSET('Microsoft.Jet.OLEDB.4.0',\n   'Excel\
  \ 8.0;HDR = NO;Database = C:\\SQL2012DIRecipes\\CH01\\CarSales.xls', TinyRange);\n\
  ```\n\n### 使用单元格范围引用\n\n如果知道要返回数据的 Excel 单元格范围引用，可以使用如下 SQL 片段：\n\n```sql\nSELECT\
  \ ID, Marque FROM OPENROWSET('Microsoft.ACE.OLEDB.12.0',\n   'Excel 12.0;Database\
  \ = C:\\SQL2012DIRecipes\\CH01\\CarSales.xlsx',\n 'SELECT * FROM [Stock$A2:B3]');\n\
  ```\n\n必须同时提供工作表名和范围，因为不假定默认工作表。同样，如果范围不包含列头，请记得添加 `HDR = NO`。\n\n### 高级查询功能\n\n\
  通过 OLEDB 驱动器向 Excel 传递完整的 `SELECT` 语句，可以实现更多功能。\n\n**选择指定列：**\n\n```sql\nSELECT\
  \ ID, Marque FROM OPENROWSET('Microsoft.ACE.OLEDB.12.0',\n   'Excel 12.0;Database\
  \ = C:\\SQL2012DIRecipes\\CH01\\CarSales.xlsx',\n 'SELECT ID, Marque FROM [Stock$A1:C3]');\n\
  ```\n\n**为返回的列指定别名：**\n\n```sql\nSELECT InventoryNumber,VehicleType FROM OPENROWSET('Microsoft.ACE.OLEDB.12.0',\n\
  \   'Excel 12.0;Database = C:\\SQL2012DIRecipes\\CH01\\CarSales.xlsx',\n 'SELECT\
  \ ID AS InventoryNumber, Marque AS VehicleType FROM [Stock$A2:C3]');\n```\n\n**对返回的数据进行排序：**\n\
  \n```sql\nSELECT ID, Marque FROM OPENROWSET('Microsoft.ACE.OLEDB.12.0',\n   'Excel\
  \ 12.0;Database = C:\\SQL2012DIRecipes\\CH01\\CarSales.xlsx',\n 'SELECT ID, Marque\
  \ FROM [Stock$A2:C3] ORDER BY Marque');\n```\n\n**添加 WHERE 子句：**\n\n```sql\nSELECT\
  \ InventoryNumber,VehicleType FROM OPENROWSET('Microsoft.ACE.OLEDB.12.0',\n   'Excel\
  \ 12.0;Database = C:\\SQL2012DIRecipes\\CH01\\CarSales.xlsx',\n 'SELECT ID AS InventoryNumber,\
  \ Marque AS VehicleType\nFROM Stock$ WHERE MAKE LIKE ''%royce%'' ORDER BY Marque');\n\
  ```\n\n> **注意**：要使此类排序生效，需要在提供程序选项中勾选“支持 'Like' 运算符”。同时请注意，如果使用 `LIKE` 运算符，需要重复单引号。\n\
  \n### 为无表头数据添加别名\n\n对于没有数据头的源文件，只需在语法中添加 `HDR = NO;`。在这种情况下，最好使用列别名来提高输出数据的可读性，否则\
  \ OLEDB 提供程序只会将列重命名为 F1、F2 等。\n\n```sql\nSELECT InventoryNumber,VehicleType FROM\
  \ OPENROWSET('Microsoft.ACE.OLEDB.12.0',\n   'Excel 12.0;HDR = NO;Database = C:\\\
  SQL2012DIRecipes\\CH01\\CarSales.xlsx',\n'SELECT F1 AS InventoryNumber, F2 AS VehicleType\
  \ FROM [Stock$A2:C3] WHERE MAKE LIKE ''%royce%'' ORDER BY Marque');\n```\n\n## 扩展属性详解\n\
  \n导入 Excel 数据时，`HDR` 不是唯一需要了解的属性。下表描述了相关选项。理解 `IMEX`（混合数据类型）属性在某些情况下也很有用。\n\n**Jet\
  \ 和 ACE 扩展属性**\n\n| 属性名 | 描述 | 示例 |\n| :--- | :--- | :--- |\n| `HDR` | 指定返回的第一行是否包含标题。\
  \ | `HDR = NO` |\n| `IMEX` | 允许导入单个列中的混合数据类型。 | `IMEX = 1` |\n\n-   **HDR**：该属性仅向驱动程序指示源数据是否包含标题行。由于（至少使用\
  \ Jet 和 ACE 驱动程序时）默认假设有标题行，因此在没有标题时将此属性设置为 `NO`，可以避免将第一条记录显示为列名，以及潜在的数据类型不匹配问题。值得注意的是，无需指定\
  \ Excel 文件类型（`.xls/.xlsx/.xslm/.xlsx/.xlsb`），因为 ACE 驱动程序会自动识别文件类型。\n-   **IMEX**：该属性稍微复杂一些。它不会强制将列中的数据作为文本导入——它强制使用为此\
  \ OLEDB 驱动程序在注册表中定义的混合数据类型。由于该注册表项默认为文本，因此它几乎总是强制将数据作为文本导入。它不会将数据转换为文本。根据驱动程序的不同（即在大多数情况下使用\
  \ Jet 驱动程序时），不设置 `IMEX = 1` 可能导致加载失败，或在包含文本和数字的列中返回 `NULL` 而不是数值。\n\n## 规划未来使用链接服务器\n\
  \n### 问题描述\n\n你只想从 Excel 电子表格导入数据的一个子集，但预计需要重复执行此操作，并最终将其迁移到链接服务器解决方案。你不想在以后重写所有代码。\n\
  \n### 解决方案\n\n在 `SELECT` 语句中使用 SQL Server 的 `OPENDATASOURCE` 命令。例如（`C:\\SQL2012DIRecipes\\\
  CH01\\OpendatasourceSelect.Sql`）：\n\n```sql\nSELECT ID AS InventoryNumber, LEFT(Marque,20)\
  \ AS VehicleType\nINTO RollsRoyce\nFROM OPENDATASOURCE(\n'Microsoft.ACE.OLEDB.12.0',\n\
  'Data Source = C:\\SQL2012DIRecipes\\CH01\\CarSales.xls;Extended Properties = Excel\
  \ 8.0')...Stock$\nWHERE MAKE LIKE '%royce%'\nORDER BY Marque;\n```\n\n### 工作原理\n\
  \n`OPENROWSET` 命令适用于临时查询。然而，你可能正在评估数据连接可能性，以期最终使用链接服务器。在这种情况下，你可能更愿意使用 `OPENDATASOURCE`\
  \ 命令作为通往链接服务器（在下一个配方中描述）的“中间站”。这为你后续将代码中的 `OPENDATASOURCE` 更新为四部分链接服务器引用做好了准备。\n\
  \n不可避免地，这个特定主题（仅从源工作表选择所有数据且仅使用 ACE 驱动程序）有许多变体，以下是其中一些。由于目标是将数据导入 SQL Server，我让你自行选择将此代码包含在\
  \ `SELECT..INTO` 或 `INSERT INTO ...SELECT` 子句中。当然，如果你愿意，也可以使用 Jet 驱动程序。如果你使用的是 Excel\
  \ 2007/2010，必须在 T-SQL 中将扩展属性设置为 Excel 12.0。\n\n**查询整个工作表：**\n\n```sql\nSELECT ID,\
  \ Marque FROM OPENDATASOURCE(\n'Microsoft.ACE.OLEDB.12.0',\n'Data Source = C:\\\
  SQL2012DIRecipes\\CH01\\CarSales.xlsx;Extended Properties = Excel 12.0')...Stock$;\n\
  ```\n\n**查询命名范围：**\n\n```sql\nSELECT ID, Marque\nFROM OPENDATASOURCE(\n'Microsoft.ACE.OLEDB.12.0',\n\
  'Data Source = C:\\SQL2012DIRecipes\\CH01\\CarSales.xls;Extended Properties = Excel\
  \ 8.0')... TinyRange;\n```\n\n\n\n要选择并（如果需要）为 Excel 源数据中的列创建别名，请使用如下所示的 T-SQL。请注意，此操作应用于\
  \ T-SQL，而不是直通查询的一部分。\n\n```\nSELECT ID AS InventoryNumber, Marque AS VehicleType\n\
  FROM OPENDATASOURCE(\n'Microsoft.ACE.OLEDB.12.0',\n'Data Source = C:\\SQL2012DIRecipes\\\
  CH01\\CarSales.xls;Extended Properties = Excel 8.0')...Stock$;\n```\n\n最后，要在返回 Excel\
  \ 数据时使用 `WHERE` 和 `ORDER BY`，只需像这样扩展 T-SQL：\n\n```\nSELECT ID AS InventoryNumber,\
  \ Marque AS VehicleType\nFROM OPENDATASOURCE(\n'Microsoft.ACE.OLEDB.12.0',\n'Data\
  \ Source = C:\\SQL2012DIRecipes\\CH01\\CarSales.xls;Extended Properties = Excel\
  \ 8.0')...Stock$\nWHERE MAKE LIKE '%royce%'\nORDER BY Marque;\n```\n\n在这种情况下，Excel\
  \ 文件不能有密码保护。值得注意的是，`OPENDATASOURCE` 仅在为指定提供程序将 `DisallowAdhocAccess` 注册表选项显式设置为\
  \ `0`，并且启用了 Ad Hoc Distributed Queries 高级配置选项（如配方 1-3 所述）时才有效。`OPENDATASOURCE` 还要求源数据类似于包含标题行的表，因此请确保任何命名范围都有标题行。\n\
  \n无论使用适用于 Office 2007 还是 Office 2010 的 ACE，都必须将 Excel 版本设置为 `12.0`——而不是下载页面建议的 `14.0`。此外，如果您在连接到\
  \ Excel（和 Access）时使用的是 Jet 驱动程序，这些方法在 SQL Server（2005-2012）的 64 位环境中将不起作用，即使 Excel\
  \ 格式是 97-2003。如果您必须使用在列中存在混合数据类型时会导致问题的驱动程序，那么您可以强制驱动程序扫描更多行（默认为 `8`）——或者扫描整个工作表——来测试混合数据类型。为此，请编辑以下注册表设置：\n\
  \n```\nHKEY_LOCAL_MACHINE\\Software\\Microsoft\\Jet\\4.0\\Engines\\Excel\\TypeGuessRows\n\
  ```\n\n将此值设置为 `8` 以外的数字将扫描指定行数。设置为 `0` 则扫描整个工作表。然而，这不可避免地会导致严重的性能损失。\n\n如果您希望更改混合数据类型设置，对于\
  \ Office 2010，它位于以下注册表项中：\n\n```\nHKEY_LOCAL_MACHINE\\Software\\Microsoft\\Office\\\
  14.0\\Access Connectivity Engine\\Engines\\Excel\\ImportMixedTypes\n```\n\n更改注册表设置通常需要注意：先备份您的注册表，并且要非常小心！\n\
  \n## 提示、技巧和陷阱\n\n*   类似于以下内容的错误消息：\"Msg 7314, Level 16, State 1, Line 2 链接服务器 '(null)'\
  \ 的 OLE DB 提供程序 'Microsoft.Jet.OLEDB.4.0' 不包含表 'Sheet1$'。\"该表不存在，或者当前用户没有对该文件或文件夹的权限。这也可能意味着您没有指定正确的文件和/或路径。\n\
  *   类似于以下内容的错误消息：\"Msg 7399, Level 16, State 1, Line 4 链接服务器 '(null)' 的 OLE DB 提供程序\
  \ 'Microsoft.Jet.OLEDB.4.0' 报告了错误。提供程序未提供有关错误的任何信息。Msg 7303, Level 16, State 1,\
  \ Line 4 无法为链接服务器 '(null)' 初始化 OLE DB 提供程序 'Microsoft.Jet.OLEDB.4.0' 的数据源对象。\" 这很可能意味着\
  \ Excel 工作簿文件已打开，因此 SQL Server 无法打开它。您只需关闭该 Excel 工作簿即可。或者，可能存在权限问题——您是否以管理员身份运行\
  \ SSMS？\n*   Excel 文件不能有密码保护。\n*   如果您只返回一个 `NULL` 值（列标题为 `F1`），那么您可能没有指定正确的工作表名称。\n\
  *   您不能在即席查询中使用 UNC 路径。\n*   有关 Jet 所用文件夹的权限，请参见 `http://support.microsoft.com/kb/296711/EN-US`\n\
  \n## 1-6. 自动从 Excel 工作表读取数据\n\n### 问题\n\n您需要能够直接查询或导入 Excel 电子表格中的数据，而无需每次（重新）加载数据。\n\
  \n### 解决方案\n\n将 Excel 电子表格配置为链接服务器。操作方法如下：\n\n1.  使用以下代码片段定义链接服务器 (`C:\\SQL2012DIRecipes\\\
  CH01\\AddExcelLinkedServer.Sql`)：\n\n```\nEXECUTE master.dbo.sp_addlinkedserver\n\
  @SERVER = 'Excel'\n,@SRVPRODUCT = 'ACE 12.0'\n,@PROVIDER = 'Microsoft.ACE.OLEDB.12.0'\n\
  ,@DATASRC = 'C:\\SQL2012DIRecipes\\CH01\\CarSales.xlsx'\n,@PROVSTR = 'Excel 12.0';\n\
  ```\n\n2.  查询源数据，仅在四部分名称中使用链接服务器名称和工作表（或范围）名称，使用如下 T-SQL 片段 (`C:\\SQL2012DIRecipes\\\
  CH01\\SelectEXcelLinkedServer.Sql`)：\n\n```\nSELECT ID, Marque\nINTO XLLinkedLoad\n\
  FROM Excel...Stock$;\n```\n\n### 工作原理\n\n在某些情况下，Excel 工作表中的数据被用作准永久性数据源，但您不想导入数据，而是倾向于将其保留在\
  \ Excel 中。为此，您可能需要设置一个指向 Excel 电子表格的链接服务器。这种方法的好处在于，用于查询数据的语法是任何链接服务器使用的标准四部分名称法\
  \ (`Server.Database.Schema.Table`)，并且所有配置信息都在链接服务器本身定义一次，而不是像 `OPENROWSET` 和 `OPENDATASOURCE`\
  \ 那样在每次使用查询时都定义。这在以下情况下特别有用：\n\n*   当您需要定期从 Excel 电子表格返回数据时。\n*   当您认为电子表格数据足够可信，可以作为应用程序的可靠来源时。\n\
  \n这种方法的风险与您在处理所有电子表格数据时面临的风险相同——由于人为错误将错误数据输入到错误的单元格中，数据常常不连贯、错误或完全错误。因为没有自动化流程可以消除此类错误，所以也没有流程可以缓解此问题。如果\
  \ Excel 文件可以被信任为足够准确，那么这种技术可以成为一种让 SQL Server 读取 Excel 数据的好方法，而无需在文件每次修改后都重新加载，因为只需将\
  \ Excel 工作簿放入所需目录即可。此外，在处理 Excel 链接服务器时，您可能会发现一些有用的技巧。\n\n在使用链接服务器之前，您可以使用以下系统存储过程测试服务器是否工作：\n\
  \n```\nEXECUTE master.dbo.sp_testlinkedserver Excel2\n```\n\n如果一切正常，这将返回“命令成功完成”——如果有问题，则返回错误消息。不幸的是，错误消息可能有些晦涩难懂，因此在破译它们时需要耐心。\n\
  \n要更改到 Excel 链接服务器的连接，在大多数情况下，您最好删除旧的链接服务器并重新创建。以下是删除链接服务器的代码：\n\n```\nIF EXISTS\
  \ (SELECT name FROM sys.servers\nWHERE server_id != 0 AND name = 'Excel')\nEXECUTE\
  \ master.dbo.sp_dropserver @server = 'Excel';\n```\n\n要列出 Excel 链接服务器的可用工作表和命名范围，请使用以下系统存储过程：\n\
  \n```\nEXECUTE master.dbo.sp_tables_ex EXCEL;\n```\n\n对于更直观地表示通过链接服务器可用的数据范围，您可以使用\
  \ SQL Server Management Studio。您只需展开 Server Objects > Linked Servers > (Server Name)\
  \ > Catalogs > Default > Tables，如图 1-11 所示。\n\n![9781430247913_Fig01-11.jpg](img/9781430247913_Fig01-11.jpg)\n\
  \n图 1-11. Excel 链接服务器表\n\n要将数据加载到目标表中，您可以使用 `INSERT INTO...SELECT` 和 `SELECT...INTO`——正如您对标准\
  \ T-SQL 所预期的那样。\n\n\n\n"
- '# 1-7. 作为结构化 ETL 流程的一部分加载 Excel 数据


  ## 问题


  您需要从 Excel 工作簿执行工业级的数据加载。这将作为受控 ETL 流程的一部分定期执行。


  ## 解决方案


  创建一个 SSIS 包来加载 Excel 源数据。这将开启 Microsoft 主要 ETL 工具的全部功能和灵活性，以管理您的数据加载。


  如果您是一位经验丰富的 SSIS 专业人士，您可能已经习惯了本配方中描述的过程，甚至可能拥有自己执行包创建过程的方法。如果是这样，请随意跳过，因为本配方的目标读者是那些可能对
  SSIS 不太熟悉的用户。


  1.  创建一个新的 SSIS 包。

  2.  在`控制流`区域添加一个`数据流`任务。

  3.  双击`数据流`任务跳转到`数据流`窗格。

  4.  在`数据流`区域添加一个`Excel 源`。

  5.  双击`Excel 源`任务打开`Excel 源编辑器`。点击`新建`打开`Excel 连接管理器`对话框。

  6.  点击`浏览`并选择您的 Excel 源文件。

  7.  选择与 Excel 工作簿版本相对应的 Excel 版本（Excel 97-2003 用`.xls`，Excel 2007/2010 用`.xlsx`）。您应该会看到类似图
  1-12 的内容。

  8.  点击`确定`。您将返回到`Excel 源编辑器`对话框。

  9.  从“Excel 工作表名称：”下拉框中选择包含您希望导入数据的 Excel 工作表或区域，如图 1-13 所示。

  10. 点击`确定`返回到`数据流`窗格。

  11. 在`数据流`窗格中添加一个`OLEDB 目标`任务，最好放在`Excel 源`任务下方。

  12. 将绿色的连接线（或称为`优先级约束`）从`Excel 源`任务拖到`OLEDB 目标`任务上。

  13. 双击`OLEDB 目标`任务打开`OLEDB 目标编辑器`。点击`新建`创建一个新的`OLEDB 连接`，然后再次点击`新建`以指定连接管理器。

  14. 选择或输入服务器名称，然后选择或键入数据库名称。本例中我使用的是`CarSales_Staging`。您应该会看到一个如图 1-14 所示的对话框。

  15. 点击两次`确定`返回到`OLEDB 目标编辑器`。然后选择一个现有目标表的名称，或者点击`新建`创建一个新表。您可以更改表名（如果您希望这样做）。如果您创建了新表，点击`确定`完成此步骤。您应该会看到类似图
  1-15 的内容。

  16. 点击`映射`来创建输入到输出的映射。将列从左拖到右进行映射。点击`删除`可移除映射。

  17. 点击`确定`完成配置`OLEDB 目标`。

  18. 按`F5`或点击`标准`工具栏上的绿色`开始调试`三角形来运行该包。或者，从菜单中选择`调试` → `开始调试`。


  ## 工作原理


  对于定期导入或当您需要 ETL 工具的全部功能来调度和处理数据到 SQL Server 时，SSIS 是应使用的工具。本配方使用 SSIS 的`Excel 源`连接到
  Excel 工作簿。然后，使用`OLEDB 目标`组件将所选工作表中的数据加载到 SQL Server 目标表中。


  #### 提示、技巧与陷阱


  *   如果您愿意，可以在添加`OLEDB 目标`之前创建`OLEDB 目标`连接管理器。然后您只需在`OLEDB 目标编辑器`对话框中的可用连接管理器列表中选择它即可。在
  SSIS 2012 中，这可以是一个包级别的连接管理器。

  *   如果您的目标表已存在，您可以从`表或视图的名称`中出现的列表中选择它。

  *   如果您愿意，可以在添加`数据流`任务之前创建`Excel 连接管理器`。您甚至可以创建包级别的连接管理器（在 SSIS 2012 中）。然而，根据我的经验，这对于本质上与电子表格源一起使用的“单次使用”连接管理器来说很少有用。

  *   如果 Excel 工作表经过筛选，那么 SSIS 将只导入筛选后的数据，而不是整个区域或工作表。


  ---


  链接服务器假定数据集包含标题行。但是，Excel 链接服务器（与`OPENDATASOURCE`不同）接受不带标题行的命名区域。如果您的数据集是这种情况，那么请确保在`sp_addlinkedserver`命令的`@PROVSTR`参数中添加`HDR
  = NO`。这将列名设置为`F1`、`F2`等等。因此，如果您的某些源区域有标题行而另一些没有，您将需要设置两个链接服务器，一个带`HDR = NO`，另一个带`HDR
  = YES`。此外，您需要注意，指向 Excel 电子表格的链接服务器速度极慢，如果您在 ETL 流程中重用数据，那么将其加载到暂存表中整体上可能会快得多。


  查询数据使用标准的 T-SQL `SELECT` 查询，您可以使用指定的列名（如果没有标题行，则使用`F1`、`F2`等）、`WHERE`子句、`ORDER BY`等来限制选择。这意味着您也可以使用`CAST`和`CONVERT`来更改数据类型，以及所有常用的文本函数（首先想到的是`LTRIM`、`RTRIM`和`LEFT`）对文本字段进行基本的数据操作。由于我在配方
  1-4 和 1-5 中提供了大量这方面的例子，我请您回顾那些配方以获取更多细节。


  #### 提示、技巧与陷阱


  *   请务必将提供程序设置为`ACE`或`Jet`连接字符串。您还必须将`@PROVSTR`参数设置为`Excel 8.0`（用于`Jet`）或`Excel
  12.0`（用于`ACE`）。

  *   `@SRVPRODUCT`参数纯粹是装饰性的。

  *   定义链接服务器时，Excel 文件无需存在。

  *   您可以通过在 SSMS 中展开`服务器对象/链接服务器`来查看链接服务器。在 SSMS 中双击链接服务器名称可查看您使用`sp_addlinkedserver`命令设置的属性。

  *   您也可以使用 SSMS 定义链接服务器。这在配方 1-13 中有描述（针对 Access）。然而，原理几乎完全相同。

  *   Excel 源文件不能受密码保护。

  *   请注意，在四部分名称表示法中，您不需要架构或数据库引用。只需键入三个句点。

  *   如果 Excel 工作簿包含多个数据集（作为单独的工作表或命名区域），那么实际上，您只需配置一次连接（通过设置链接服务器）。然后，您只需更改`SELECT`查询中四部分名称表示法的最后一个部分（本例中是`Stock$`）所对应的工作表/区域名称，即可查询各种源数据集。


  ---


