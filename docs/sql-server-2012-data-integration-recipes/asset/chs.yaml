  \ NULL,\n    ProcessStep VARCHAR(150) NULL,\n    UserName VARCHAR(150) NULL,\n \
  \   ComputerName VARCHAR(150) NULL,\n    DateCreated DATETIME NULL DEFAULT GETDATE()\n\
