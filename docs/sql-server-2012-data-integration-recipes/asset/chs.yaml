  \             @NoteComment = 'Automated data load FAILED!!'\nEND\n\nUPDATE     \
  \     CarSales_Logging.log.RunHistory\nSET    IsSuccess = @IsProcessSuccess\n  \
  \    ,RunEndTime = GETDATE()\n      ,Notes = @NoteComment\nWHERE    RunID = @RunID\n\
