  \ 22。\n\n### 工作原理\n\n本质上，用于 Oracle CDC 的 Attunity 工具是对 Microsoft 针对 SQL Server 方法的巧妙模仿。与纯\
  \ Microsoft CDC 技术一样，通过读取源数据库日志来检测更改，然后将这些更改写入目标数据库，其格式与 MS CDC 中使用的格式相同。\n\n您可以通过在变更数据捕获设计器中单击实例来监控变更数据捕获过程处理的更改。它将向您显示有关事务数量和状态的有用数据（参见图\
  \ 12-24）。\n![9781430247913_Fig12-24.jpg](img/9781430247913_Fig12-24.jpg)\n图 12-24.\
  \ 监控 Oracle CDC\n\n存储变更数据历史的表是一个名为`cdc. <Schema> _ <TableName> _CT`的系统表。它如图 12-25\
  \ 所示。\n![9781430247913_Fig12-25.jpg](img/9781430247913_Fig12-25.jpg)\n图 12-25. Oracle\
  \ CDC 系统变更表\n\n### 提示、技巧和陷阱\n\n*   这些 Attunity 工具仅适用于 SQL Server 的企业版。\n*   当您安装两个\
  \ Attunity `.msi`包时，您可能觉得好像什么都没发生。点击“开始” > “所有程序”以确保您能看到“Change Data Capture for\
  \ Oracle by Attunity”，其中应包含“Oracle CDC designer configuration”（这也应在开始菜单中）和“Oracle\
  \ CDC service configuration”。\n*   当然，如果您在 32 位版本的 SQL Server 企业版上运行，也可以安装这些工具的\
  \ 32 位版本。我只是推测这种情况不太可能发生。\n*   在步骤 14，您可以输入全部或部分表名以限制搜索源表时返回的表列表。\n\n#### 总结\n\n\
  在本章中，您了解了两种允许在源和目标数据库之间同步数据，同时仅对目标应用所需的插入、更新和删除的技术。第一种技术“变更跟踪”适用于所有版本的 SQL Server。它是一个同步过程，仅跟踪记录已更改的事实。\n\
  \n\n"
- "# 第 13 章\n\n## 组织与优化数据加载\n\n第二种技术是变更数据捕获，它读取 SQL Server 事务日志（甚至 Oracle 重做日志），能够跟踪最细粒度的顺序数据变更——尽管本书以\
  \ ETL 为重点，不需要如此详细的级别。然而，变更数据捕获仅在 SQL Server 的企业版中可用。你选择实现哪一种将取决于你的需求和 SQL Server\
  \ 许可证。两者都稳健高效。我只能敦促你测试两者，从而为你的 ETL 武器库增添两个极其强大的工具。\n\n一旦你成功将一组数据加载到 SQL Server 中，下一个挑战就是如何自动、更快、更顺畅、更轻松地加载它。除此之外，你还希望你的流程尽可能可靠地运行，尽量减少人工干预。这可能涉及多种技术，例如：\n\
  \n*   处理用于串行加载的多个相同源文件。\n*   从一个或多个目录加载多个文件。\n*   排序文件加载（例如，按文件大小加载）。\n*   设置并行文件加载——并将文件分派到多个进程，尽可能实现负载均衡。\n\
  *   从单个 OLEDB 或 ADO.NET 数据源并行加载数据。\n*   使用并行 `Bulk Insert` 减少加载时间。\n*   创建高效的并行读写负载（也称为从多个并发源写入同一张表）。\n\
  *   处理批量加载。\n\n这些技术中有许多方面可以互换，因此我鼓励你在决定最佳方法之前全面考虑它们，以使你的 ETL 挑战不那么成问题，而更成为一个令人满意的解决方案。然后，你可以混合搭配这些方法的相关部分，生成适合你需求的解决方案。\n\
  \n本章仅探讨这些纯粹的“结构性”技术。在现实世界中，你还必须处理索引，以及如何在 ETL 流程中使用索引以及何时使用；在加载数据时如何最好地处理约束和锁；当然，还有日志记录和恢复。这些元素将在下一章中单独讨论。\n\
  \n本章不会深入介绍如何配置源和目标连接管理器。也不会详尽描述如何设置数据流任务、数据源和目标。这些——以及 SSIS 数据加载的其他基础方面——已在前面的章节中有所涉及，特别是第\
  \ 2 章关于平面文件源，以及第 4 章和第 5 章关于 SQL Server 和其他 RDBMS 源。如果你需要这些信息，请查阅相应的章节。\n\n为了避免无谓的重复，除了方法\
  \ 13-1 之外，我不详细说明“经典”多文件加载的所有复杂细节。因此，我建议你在尝试方法 13-2 到 13-6 之前先浏览一下这个方法，它们是加载多个源文件的一些不同扩展方式。\n\
  \n一如既往，本章使用的示例可在本书的配套网站上找到。下载后，它们位于 `C:\\SQL2012DIRecipes\\CH13` 目录中。\n\n### 13-1.\
  \ 加载多个文件\n\n#### 问题\n\n你有一个包含 CSV 格式平面文件的目录需要加载到 SQL Server 中。\n\n#### 解决方案\n\n\
  使用 SSIS 和一个 Foreach 循环容器，步骤如下。\n\n1.  打开 SSIS 并创建一个新包。我建议将其命名为 `MultipleFileLoad`，因为这正是它要做的事情。\n\
