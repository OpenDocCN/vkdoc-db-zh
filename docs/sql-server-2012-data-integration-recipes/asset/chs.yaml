  \ |\n    | | `TRUNCATE TABLE dbo.CDC_Client_Deletes` |\n22. 添加一个 CDC 控制任务，命名为 `Get\
  \ starting LSN`，并将前一个任务（Prepare Staging Tables）连接到它。按照前一个配方中的描述进行完全相同的配置，但将 CDC\
