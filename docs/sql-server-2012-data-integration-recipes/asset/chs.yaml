  \ SQL Server 元数据的 SSIS 包\n\n运行该包，选定的元数据将被加载到 SQL Server 表中。\n\n## 工作原理\n\n另一种获取元数据的方法是使用\
  \ .NET 的 `GetSchema` 类。这种技术比本章到目前为止看到的技术实现起来更复杂，但它比使用 `INFORMATION_SCHEMA` 视图更具可扩展性和强大功能。本示例中的配方返回以下元数据：\n\
  \n- 表\n- 视图\n- 表列\n- 视图列\n- 索引\n- 索引列\n\n每种对象类型的元数据都存储在其特定的输出表中。然后可以连接和查询这些表（有点像\
  \ SQL Server 中的 `INFORMATION_SCHEMA` 视图）以获取源元数据的概览。\n\n这个包看起来比实际更复杂，因为它只是使用脚本从每个元数据模式获取源数据，这需要为每个模式创建多个输出列。对于六个元数据源中的每一个，您都需要创建一个脚本组件数据源，该源将使用\
  \ `GetSchema` 函数查询特定的元数据集。每个脚本任务都将具有一组必需的输出列，这些列映射到 `GetSchema` 函数的输出。添加到数据流的列随后将被发送到\
  \ OLE DB 目标任务，并进入数据库。\n\n为了使 SSIS 包更易于重用，您可能希望将表名和/或连接字符串设置为变量。您还可以专门定义希望存储在 SQL\
  \ Server 中的列。重要的是，在编写执行数据映射的代码之前，确保已定义所有需要的输出列，以将元数据源列映射到这些列。请注意，用于将数据表映射到输出缓冲区的列索引号是源数据的索引号，而不是您在\
  \ SSIS 包中创建的缓冲区列的索引号。\n\n在数据流中添加数据查看器也会有很大帮助。为此，右键单击脚本组件数据源和 OLE DB 目标之间的连接，然后选择“数据查看器”。现在，当您运行包时，查看器将显示数据处理过程。\n\
  \n#### 提示、技巧与陷阱\n\n- 脚本组件可以定义源元数据。具体来说，您可以：\n    - 指定希望使用的连接类型。\n    - 指定希望存储的模式集合。\n\
  \    - 添加所需的任何限制。\n\n#### 总结\n\n本章包含许多使用 SQL Server 分析源数据的方法。为了给您更清晰的概述，表 8-11 描述了我们在本章中研究的各种方法及其优缺点。\n\
  \n表 8-11：本章所用技术的优缺点\n\n| 技术 | 优点 | 缺点 |\n| --- | --- | --- |\n| `sp_columns_ex`\
  \ / `sp_tables_ex` | 使用简单。 | 仅适用于链接服务器。<br>元数据有些有限。 |\n| 系统字典 | 极其完整。 | 查询复杂。<br>需要经验和实践。<br>可能需要临时查询权限。\
  \ |\n| `INFORMATION_SCHEMA` 视图 | 访问简单。<br>易于查询。 | 元数据有限。<br>并非所有数据库都可用。<br>在数据库之间可能有所不同。\
  \ |\n| `GetSchema` | 配置后易于使用。 | 需要编码。<br>最初很复杂。 |\n\n\n"
- "# 第九章\n## 数据转换\n\n众所周知，ETL 中的“T”代表“转换”。是的，你或许能连接到一个数据源，也能够将数据导入 SQL Server 目标数据库。然而，数据从源流动到目标的过程中，通常需要进行大量更改。因此，本章将探讨\
  \ ETL 开发者面临的一些主要数据转换挑战。\n\n不可避免的是，要预见 ETL 流程中数据可能或必须经历的每一个数据转换需求和每一个曲折变化，是不可能的。所以，同样不可避免的是，本章无法预见每一个数据转换需求，也无法提供每一个可能需要的解决方案。尽管如此，本章仍试图概述解决标准数据转换问题的经典方案。这些方案将包括：\n\
  \n*   *数据去重*——或者说移除重复项的技巧。\n*   *数据非规范化*——或将数据列*逆透视*（也称为*转置*）为行。\n*   *透视*数据。\n\
  *   *数据子集化*——从定长和变长数据到多列的转换。\n*   *串联*数据。\n*   *合并*数据。\n*   *字符级数据转换*——应用所需的 UPPER（大写）、lower（小写）或\
  \ TitleCase（首字母大写）。\n*   探讨*SCD（缓慢变化维度）的主要类型*。\n*   以及为你的 ETL 武器库增添的其他一些工具。\n\n\
  其中包含了一些可能显得过于基础的要素。但我认为最好详尽无遗（尽管简要），并借此机会对赋予 SSIS 产品强大功能和多功能性的基本 SSIS 转换集进行快速概述。我还将坚持本书的理念，在适当的时候描述并行的\
  \ T-SQL 解决方案，因为我坚信要为工作选择合适的工具，而不是把所有东西都硬塞进 SSIS。\n\n同样，除了涉及 SQL Server 2012 中的数据质量服务外，我避开了数据清理的内容。数据清理是一个极其复杂的主题，通常超出了简单的数据转换范畴，并且往往需要密集的手动劳动或第三方产品——因此，它确实是一个独立的主题，超出了本书的范围。\n\
  \n本章使用的示例可在本书的配套网站上找到，下载后位于 `C:\\SQL2012DIRecipes\\CH09` 目录中。另请注意，我不会反复解释如何在 SSIS\
  \ 中使用 OLEDB 连接管理器指向源数据，因为这在第 1-7 章的许多教程中已有详细说明。请参考本书第一部分的教程——特别是第 4 章（用于 SQL Server\
  \ 目标）和第 7 章（用于 SQL Server 源），以复习有关 SSIS 数据源和数据目标任务连接的完整细节。\n\n## 9-1. 转换数据类型\n###\
  \ 问题\n作为 ETL 流程的一部分，你需要在数据类型之间进行转换，以确保源数据类型不会导致流程失败。\n\n### 解决方案\n使用 SSIS 数据转换任务在数据流中更改数据类型，并确保目标数据类型能够接受源数据。步骤如下：\n\
  \n1.  创建或打开一个 SSIS 包，并添加一个数据流任务。切换到数据流窗格。\n2.  添加一个 OLEDB 连接管理器，并配置其连接到 CarSales\
  \ 数据库。\n3.  添加一个 OLEDB 源任务，并配置为使用步骤 2 中定义的 OLEDB 连接管理器和 Clients 表。\n4.  向你的 SSIS\
  \ 包中添加一个数据转换任务。\n5.  将数据源任务连接到它。\n6.  选择你希望修改的列。\n7.  对于每个需要更改数据类型的列，在对话框下部的网格中选择新的数据类型，必要时设置其长度。它应该如图\
  \ 9-1 所示。\n8.  添加一个 OLEDB 目标任务，并将数据转换任务连接到它。\n9.  配置目标任务以连接到所需的数据库和表，并映射列。\n\n![9781430247913_Fig09-01.jpg](img/9781430247913_Fig09-01.jpg)\n\
  \n**图 9-1.** SSIS 数据转换任务\n\n### 工作原理\n在 SSIS 中，你可以在数据流任务内部使用数据转换任务来更改数据类型。你将转换为\
  \ SSIS 的内部数据类型之一。这些数据类型在附录 A 中有描述。一旦数据转换任务作为数据流的一部分实现（通常是通过将其连接到数据源），你就可以选择要更改数据的列，然后选择目标数据类型。SSIS\
  \ 将为每个修改的数据类型创建第二个列，因此请确保在目标任务中映射相应的列。\n\n冒着阐述过于明显的风险，你也可以在 T-SQL 中使用两个主要函数进行数据转换：\n\
  \n*   `CAST`\n*   `CONVERT`\n\n这两个函数的微妙之处和局限性（以及`CONVERT`使用的日期和时间样式）自多年前 SQL Server\
  \ 首次发布以来已被详尽讨论，因此我建议你使用自己最熟悉的那个函数。\n\n你只能将一种数据类型转换为另一种支持转换的数据类型，在大多数情况下，这意味着目标数据类型比源数据类型更“长”（例如，一个`VARCHAR(500)`无法放入`VARCHAR(10)`）；或者目标数据类型比源数据类型“更大”（例如，一个`BIGINT`无法放入`TINYINT`）；或者目标类型限制更少（除非文本可以被读取为日期，否则无法将其转换为`DATE`数据类型）。\n\
  \n由于转换错误通常只在运行时出现，因此在开发包时，通过预见数据类型转换错误，可以避免痛苦的调试过程。\n\n## 9-2. 从数据中移除重复项\n### 问题\n\
  你已将数据加载到 SQL Server 表中——可能是一个暂存表——并且希望移除任何重复的记录。\n\n### 解决方案\n使用 `ROW_NUMBER()`\
  \ 窗口函数和 CTE（公用表表达式）来对记录去重。以下展示了如何实现（`C:\\SQL2012DIRecipes\\CH09\\DedupeSmallRecordsets.sql`）：\n\
  \n```sql\nWITH Dedupe_CTE (RowNo, ClientName, Country, Town, County, Address1, Address2,\
  \ ClientType, ClientSize) AS (\n SELECT ROW_NUMBER() OVER (PARTITION BY ClientNameORDER\
  \ BY ClientNameDESC) AS RowNo,\n ClientName, Country, Town, County, Address1, Address2,\
  \ ClientType, ClientSize\n FROM dbo.\n```\n\n\n\n"
- "# 数据去重技术\n\n## 引言\n\n`DELETE FROM Dedupe_CTE WHERE RowNo > 1;`\n\n### 工作原理\n\n\
  当所有加载的数据都完美无缺时，你几乎不会遇到问题。不幸的是，现实世界并非总是如此简单，必须完成的基本——通常是首要——任务之一就是从数据集中移除重复项。重复项不仅会导致下游用户遇到问题（并且这些问题的原因可能难以追溯到源头），还可能导致\
  \ ETL 过程直接失败。如果你使用 T-SQL `MERGE` 命令，这一点会变得非常明显，例如它会在遇到重复键数据时出错。\n\n对于中小型数据集（很难精确定义这意味着什么，因为它取决于表的宽度和行的大小，以及记录数和系统资源），使用\
  \ SQL Server 2005 引入的 `ROW_NUMBER()` 窗口函数是一种可靠且简单的方法来去重数据。需要提供给 `ROW_NUMBER()` 窗口函数的基本信息是用于分区的字段列表——这将定义你认为是重复的元素。虽然并不困难，但移除重复项（也称为去重）必须小心进行。过度热情（即粗心的数据分析）可能导致数据从源中被完全移除，而精度不足（通常也是分析不佳的表现）则可能导致重复项残留。次要关注点是流程效率。根据你正在去重的数据集的大小，你可能需要尝试不同的技术以获得最快且准确的结果。\n\
  \n## 9-3. 对大型记录集进行去重\n\n### 问题\n\n你想使用 T-SQL 从一个大表中删除重复记录。\n\n### 解决方案\n\n使用临时表和\
  \ `ROW_NUMBER()` 来删除重复记录。\n\n对于较大的表，以下技术可能比在配方 9-2 中用于从数据表删除重复项的方法（`C:\\SQL2012DIRecipes\\\
  CH09\\DedupeLargeRecordsets.sql`）执行时间更短：\n\n```sql\nIF OBJECT_ID('TempDB..#Tmp_Client_DUPS')\
  \ IS NOT NULL DROP TABLE TempDB..#Tmp_Client_DUPS;\nIF OBJECT_ID('TempDB..#Tmp_Client_DUPData')\
  \ IS NOT NULL DROP TABLE TempDB..#Tmp_Client_DUPData;\n\n-- 获取重复项\nSELECT      ClientName,Country,Town,County,Address1,Address2,ClientType,ClientSize\n\
  INTO        #Tmp_Client_DUPS\nFROM        CarSales_Staging.dbo.ClientWithDuplicates\n\
  GROUP BY    ClientName,Country,Town,County,Address1,Address2,ClientType,ClientSize\n\
  HAVING      COUNT(*) > 1;\n\n-- 获取要删除的完整数据\nSELECT TD.ClientName,TD.Country,TD.Town,TD.County,TD.Address1,TD.Address2,\n\
  \    TD.ClientType,TD.ClientSize,\n    ROW_NUMBER() OVER (\n        PARTITION BY\
  \ TD.ClientName,TD.Country,TD.Town,TD.County,\n            TD.Address1,TD.Address2,TD.ClientType,TD.ClientSize\n\
  \        ORDER BY TD.ClientName,TD.Country,TD.Town,TD.County,TD.Address1,TD.Address2,\n\
  \            TD.ClientType,TD.ClientSize DESC\n    ) AS RowNo\nINTO        #Tmp_Client_DUPData\n\
  FROM        dbo.Client TD\n            INNER JOIN #Tmp_Client_DUPS DUP\n       \
  \     ON TD.ClientName = DUP.ClientName\n            AND TD.Country = DUP.Country\n\
  \            AND TD.Town = DUP.Town\n            AND TD.County = DUP.County\n  \
  \          AND TD.Address1 = DUP.Address1\n            AND TD.Address2 = DUP.Address2\n\
  \            AND TD.ClientType = DUP.ClientType\n            AND TD.ClientSize =\
  \ DUP.ClientSize;\n\n-- 删除\nDELETE       C\nFROM        dbo.Client C\nINNER JOIN\
  \  #Tmp_Client_DUPData TMP\n            ON C.ClientName = TMP.ClientName\n     \
  \       AND C.Country = TMP.Country\n            AND C.Town = TMP.Town\n       \
  \     AND C.County = TMP.County\n            AND C.Address1 = TMP.Address1\n   \
  \         AND C.Address2 = TMP.Address2\n            AND C.ClientType = TMP.ClientType\n\
  \            AND C.ClientSize = TMP.ClientSize;\n\n-- 重新插入单条记录\nINSERT INTO dbo.Client\
  \ ( ClientName ,Country ,Town ,County ,Address1 ,Address2 ,ClientType ,ClientSize\
  \ )\nSELECT ClientName ,Country ,Town ,County ,Address1 ,Address2 ,ClientType ,ClientSize\n\
  FROM       #Tmp_Client_DUPData\nWHERE RowNo = 1;\n```\n\n### 工作原理\n\n对于较大的记录集，或者当使用列的子集来确定记录是否重复时，基于临时表的方法通常更快，即使它编写起来更长。根据经验，我通常乐于在最多\
  \ 1,000,000 条记录内使用配方 9-2 中的 `ROW_NUMBER()` 方法。超过这个数量，我倾向于测试该方法与其他解决方案，看看哪个表现最佳。\n\
  \n首先，解决方案脚本将所有重复记录加载到名为 `#Tmp_Client_DUPS` 的临时表中。然后，它将重复记录的完整数据整理到 `#Tmp_Client_DUPData`\
  \ 临时表中。最后，从源表中删除所有是重复项的记录，并将每个重复项的一个示例从 `#Tmp_Client_DUPData` 重新加载回源表。\n\n这种方法确实使用\
  \ `ROW_NUMBER()` 来隔离要保留的每个记录的一个示例，但 `ROW_NUMBER` 的使用仅应用于数据的一个子集——那些是重复项的记录。在某些情况下，只有几个组成部分列相同，记录就被视为重复。这个过程很容易适应这种情况，因为你可以在\
  \ `#Tmp_Client_DUPS` 表中定义子集，并使用这些列连接到源数据，将完整记录集传输到 `#Tmp_Client_DUPData` 表。由于此过程实际上会在核心表中删除数据然后重新插入重复项，我强烈建议你将其作为事务的一部分。如果你这样做，那么在过程失败的情况下，源表将恢复到其原始状态。\n\
  \n这种方法经常被忽视的一个优点是，它可以让你轻松计算那些是重复项（或三重项等）的记录并记录计数器。你还可以添加检查和平衡，并将临时表输出到磁盘，如果你想在处理过程中保留重复数据的副本。\n\
  \n这个配方的去重过程可能需要相当长的时间来运行，因此你可能希望在进入完全操作的去重例程之前先测试是否存在重复项。测试重复项可以像下面这样简单（`C:\\SQL2012DIRecipes\\\
  CH09\\TestForDuplicates.sql`）：\n\n```sql\nDECLARE @DupCount INT = 0;\n\nSELECT @DupCount\
  \  = SUM(TotalDups) AS Dups\nFROM (\n      SELECT COUNT(*) AS TotalDups\n      FROM\
  \ dbo.Client\n      GROUP BY ClientName, Country, Town, County, Address1, Address2,\
  \ ClientType, ClientSize\n      HAVING COUNT(*) > 1\n ) A;\n\nIF @DupCount > 0\n\
  BEGIN\n      -- 此处放置来自配方 9-3 的主代码\nEND;\n```\n\n## 9-4. 在 ETL 数据流中去重数据\n\n### 问题\n\
  \n你希望在数据流经 SSIS 加载包时对其去重。\n\n### 解决方案\n\n使用 SSIS 聚合转换在数据流中删除重复项。以下步骤描述了一种方法。\n\n\
  1.  创建一个新的 SSIS 包，并添加两个 OLEDB 连接管理器，分别命名为 `CarSales_OLEDB` 和 `CarSales_Staging_OLEDB`。将它们分别配置为指向\
  \ CarSales 和 CarSales_Staging SQL Server 数据库。\n2.  添加一个数据流任务。双击进行编辑。添加一个 OLEDB 源任务，并配置为使用\
  \ `CarSales_Staging_OLEDB` 连接管理器，使用 `dbo.Client` 表作为其源数据。\n3.  添加一个聚合转换，并将数据源连接到它。双击进行编辑。\n\
  4.  为你希望按其分组的所有列（在此上下文中意味着为这些列去重）勾选列名。确保所有输入列的“操作”列都设置为 **Group By**。对话框应类似于 图 9-2。\n\
  \n![9781430247913_Fig09-02.jpg](img/9781430247913_Fig09-02.jpg)\n\n\n\n\n## 9-5.\
  \ 使用 T-SQL 对列数据进行子集提取\n\n### 问题\n\n你需要将一列的内容分解为更小的、离散的部分。\n\n### 解决方案\n\n应用 SQL\
  \ 的字符串处理函数，将数据切割成固定长度的子集。\n\n图 9-3 展示了一个 25 个字符长度的字符串示例。\n\n![9781430247913_Fig09-03.jpg](img/9781430247913_Fig09-03.jpg)\n\
  \n图 9-3. 一个待拆分的 25 字符固定长度字符串\n\n以下是用于将 图 9-3 中的字符串分解为各个组成部分的 T-SQL 代码 (`C:\\SQL2012DIRecipes\\\
  CH09\\SubsetColumnData.sql`)：\n\n```sql\nSELECT LEFT(ClientDataFixed,4)        \
  \      AS LeftCol\n      ,SUBSTRING(ClientDataFixed,6,7)      AS CentreCol\n   \
  \   ,RIGHT(ClientDataFixed,12)           AS RightCol\nFROM    dbo.ClientSubset;\n\
  ```\n\n结果如 图 9-4 所示。\n\n![9781430247913_Fig09-04.jpg](img/9781430247913_Fig09-04.jpg)\n\
  \n图 9-4. 拆分后的字符串\n\n### 工作原理\n\n一个常见的需求，特别是当你的数据来源于旧系统时，是将一列的内容分解为更小的、离散的部分。想想社会保险号码，其中数据的不同部分具有不同的含义。T-SQL\
  \ 和 SSIS 都可以同样轻松且快速地执行此任务——唯一的区别可能在于如何处理可变长度子字符串的问题。正如你将在配方 9-6 中看到的，SSIS 会给你一个惊喜。\n\
  \n在 T-SQL 中，有三个核心的字符串处理函数可以帮助你分离固定长度字符串中的元素。由于它们几乎无需解释，简述如下：\n\n*   `LEFT`\n*  \
  \ `SUBSTRING`\n*   `RIGHT`\n\n当字符串（以及相应的子集）长度可变时，将它们分解为多个子字符串只会稍微困难一些。\n\n这需要明智地使用以下字符串处理函数：\n\
  \n*   `LEN`：返回字符串中的字符数\n*   `CHARINDEX`：给出一个或多个字符在字符串中的位置\n*   `REPLACE`：替换字符串中的一个或多个字符\n\
  *   `REVERSE`：反转一个字符串\n\n我假设总会有一个特定的字符可用于隔离子字符串，并且这个特定字符不会出现在子集内部。幸运的是，对于这类列，情况很少不是如此。不过，每个子字符串的分隔符可能不同。\n\
  \n假设你有 图 9-5 中给出的源数据。\n\n![9781430247913_Fig09-05.jpg](img/9781430247913_Fig09-05.jpg)\n\
  \n图 9-5. 一个将在 T-SQL 中被拆分的可变长度字符串\n\n以下是用于将其分解为各个组成部分的 T-SQL 代码 (`C:\\SQL2012DIRecipes\\\
  CH09\\VariableLengthSubsetting.sql`)：\n\n```sql\nSELECT ID\n      ,CASE -- 第一列或整列，任意数量的列\n\
  \          WHEN LEN(ClientDataVariable) - LEN(REPLACE(ClientDataVariable, '-', ''))\
  \ <> 0\n          THEN LEFT(ClientDataVariable, CHARINDEX('-',ClientDataVariable)\
  \ - 1)\n          WHEN LEN(ClientDataVariable) - LEN(REPLACE(ClientDataVariable,\
  \ '-', '')) = 0\n          THEN ClientDataVariable\n       END AS ColLeft\n\n  \
  \    ,CASE -- 三列或四列，第二列\n          WHEN LEN(ClientDataVariable) - LEN(REPLACE(ClientDataVariable,\
  \ '-', '')) = 3\n          THEN LEFT(SUBSTRING(ClientDataVariable, CHARINDEX('-',ClientDataVariable)\
  \ + 1,\n                    LEN(ClientDataVariable) - CHARINDEX('-',ClientDataVariable)\
  \ - CHARINDEX('-',REVERSE(ClientDataVariable))),\n                    CHARINDEX('-',SUBSTRING(ClientDataVariable,\
  \ CHARINDEX('-',ClientDataVariable) + 1,\n                    LEN(ClientDataVariable)\
  \ - CHARINDEX('-',ClientDataVariable) - CHARINDEX('-',REVERSE(ClientDataVariable))))\
  \ -1)\n          WHEN LEN(ClientDataVariable) - LEN(REPLACE(ClientDataVariable,\
  \ '-', '')) = 2\n          THEN SUBSTRING(ClientDataVariable, CHARINDEX('-',ClientDataVariable)\
  \ + 1,\n                    CHARINDEX('-',ClientDataVariable, CHARINDEX('-',ClientDataVariable)\
  \ + 1) - CHARINDEX('-',ClientDataVariable) - 1)\n       END AS Col2\n\n      ,CASE\
  \ -- 四列，第三列\n          WHEN LEN(ClientDataVariable) - LEN(REPLACE(ClientDataVariable,\
  \ '-', '')) = 3\n          THEN RIGHT(SUBSTRING(ClientDataVariable, CHARINDEX('-',ClientDataVariable)\
  \ + 1,\n                    LEN(ClientDataVariable) - CHARINDEX('-',ClientDataVariable)\
  \ - CHARINDEX('-',REVERSE(ClientDataVariable))),\n                    CHARINDEX('-',SUBSTRING(REVERSE(ClientDataVariable),\
  \ CHARINDEX('-',ClientDataVariable) + 1,\n                    LEN(ClientDataVariable)\
  \ - CHARINDEX('-',ClientDataVariable) - CHARINDEX('-',REVERSE(ClientDataVariable))))\
  \ -1)\n       END AS Col3\n\n      ,CASE  -- 最后一列，任意数量的列\n          WHEN (LEN(ClientDataVariable)\
  \ - LEN(REPLACE(ClientDataVariable, '-' , ''))) <> 0\n          THEN REVERSE(LEFT(REVERSE(ClientDataVariable),\
  \ CHARINDEX('-',REVERSE(ClientDataVariable)) - 1))\n       END AS ColRight\n\nFROM\
  \    dbo.ClientSubset\n```\n\n图 9-6 显示了结果。\n\n![9781430247913_Fig09-06.jpg](img/9781430247913_Fig09-06.jpg)\n\
  \n图 9-6. 拆分后的可变长度字符串\n\n### 提示、技巧和陷阱\n\n*   此 T-SQL 片段是针对特定列数硬编码的。要扩展列数，可以复制第三列或第四列的\
  \ `CASE` 语句，并进行调整以使模型能够处理更多的列。\n*   执行此操作的方法可能和关于啤酒或葡萄酒的意见一样多。因此，请不要将此视为唯一可行的方法。请进行实验，直到找到适合你需求的解决方案。定义一个\
  \ SQLCLR 函数可能是另一个解决方案，甚至可以是 T-SQL 函数。然而，你需要记住，任何会导致数据从基于集合的处理切换到逐行处理的东西，都会严重削弱此过程的效率。\n\
  \n\n\n"
- "# 9-6. 使用 SSIS 生成定长列数据子集\n\n## 问题\n\n您希望作为 SSIS 数据流的一部分，将一个定长列的内容拆分到多个列中。\n\n##\
  \ 解决方案\n\n使用“衍生列”转换在受控且规则的数据流中对数据进行子集化。以下步骤解释了如何执行此操作。\n\n1.  创建或打开一个包含数据流组件和有效数据源的\
  \ SSIS 包。\n2.  在“数据流”窗格中，从工具箱中添加一个“衍生列数据流转换”，并连接到数据源（或在复杂包中连接到数据流）。\n3.  双击进行编辑。\n\
  4.  在对话框的下半部分添加以下三个元素：\n\n    | 衍生列名称 | 表达式 |\n    | :--- | :--- |\n    | LeftCol\
  \ | `SUBSTRING(ClientDataFixed,1,4)` |\n    | MiddleCol | `SUBSTRING(ClientDataFixed,6,7)`\
  \ |\n    | RightCol | `RIGHT(ClientDataFixed,12)` |\n\n    对话框应类似于图 9-7。\n\n   \
  \ ![9781430247913_Fig09-07.jpg](img/9781430247913_Fig09-07.jpg)\n\n    图 9-7。使用“衍生列”转换拆分字符串\n\
  \n5.  单击“确定”确认修改。然后您可以添加数据流目标或其他转换。\n\n此过程可以编写为动态 SQL 以处理可变数量的列，但此处不会展示。如果您需要此功能，请自行扩展。\n\
  \n对列进行子集化的代码可以作为 T-SQL `UPDATE` 语句的一部分运行，以将数据分配到表中的不同列。\n\n## 工作原理\n\n“衍生列”转换根据源数据子集的长度将列拆分为多个元素。每个新的子集成为一个独立的新列。此处，`SUBSTRING`\
  \ 函数允许您定义要从字符串中提取的字符数（由第二个参数给出）。第一个参数指明从字符串内的哪个位置开始提取。\n\n如果添加数据查看器，它将显示类似于图 9-8\
  \ 的内容（取决于您选择查看的列）。\n\n![9781430247913_Fig09-08.jpg](img/9781430247913_Fig09-08.jpg)\n\
  \n图 9-8。使用数据查看器查看拆分后的字符串\n\n#### 提示、技巧与陷阱\n\n*   为避免在数据流中使用列名时出现拼写错误，您始终可以展开左上角的“列”，并将列名拖到“表达式”字段中。\n\
  *   请记得为新的衍生列赋予一个有意义的名称。\n\n"
- '# 9-7. 生成变长列数据子集


  ## 问题


  您希望作为 SSIS 数据流的一部分，将一个变长列的内容拆分到多个列中。


  ## 解决方案


  使用“衍生列”转换的 `FINDSTRING` 函数将数据切割成较小的定义块。


  变长字符串的处理过程与配方 9-6 中用于定长字符串的过程几乎完全相同。本配方的解决方案是遵循配方 9-6，并修改步骤 3，在对话框的下半部分添加以下四个元素
  (`C:\SQL2012DIRecipes\CH09\SSISSubset.txt`)：


  | 衍生列名称 | 表达式 |

  | :--- | :--- |

  | LeftCol | `FINDSTRING(ClientDataVariable,"-",1) == 0  ? SUBSTRING(Client,1,FINDSTRING(ClientDataVariable,"-",1))
  : SUBSTRING(ClientDataVariable,1,FINDSTRING(ClientDataVariable,"-",1) - 1)` |

  | Col2 | `FINDSTRING(ClientDataVariable,"-",2) == 0 ? "" : SUBSTRING(ClientDataVariable,FINDSTRING(ClientDataVariable,"-",1)
  + 1,FINDSTRING(ClientDataVariable,"-",2) - FINDSTRING(ClientDataVariable,"-",1)
  - 1)` |

  | Col3 | `FINDSTRING(ClientDataVariable,"-",3) == 0 ? "" : SUBSTRING(ClientDataVariable,FINDSTRING(ClientDataVariable,"-",2)
  + 1,FINDSTRING(ClientDataVariable,"-",3) - FINDSTRING(ClientDataVariable,"-",2)
  - 1)` |

  | RightCol | `FINDSTRING(ClientDataVariable,"-",1) == 0 ? "" : RIGHT(ClientDataVariable,FINDSTRING(REVERSE(ClientDataVariable),"-",1)
  - 1)` |


  对话框应类似于图 9-9。


  ![9781430247913_Fig09-09.jpg](img/9781430247913_Fig09-09.jpg)


  图 9-9。用于拆分字符串的“衍生列”转换


  ## 工作原理


  对于变长字符串，SSIS 有一个令人愉快的惊喜。与 T-SQL 不同，您可以告诉它查找字符的第 n 次出现——从而跳过分隔符第一次（或前几次）出现。这是通过 `FINDSTRING`
  函数完成的，该函数允许您指定要查找的分隔符的出现次序。


  `SUBSTRING` 函数看似重复的原因是 SSIS 要求我们处理 `NULL`。一种方法是使用三元运算符（如果...那么...否则），然后为第一个要返回的列添加整个字符串，如果分隔符不存在，则为其他列添加零长度字符串。如果不这样做，并且任何记录中存在没有子集数据的字段，任务将失败。


  由于这是 SSIS，使此过程动态化（即可变数量的子元素检测）相当困难（尽管并非不可能）。因此，这里不会探讨这种可能性。无论如何，SSIS 基于标准化的、重复出现的数据结构，这是预料之中的事。


  如果您在“衍生列”转换后的数据流中添加数据查看器，您可以看到您努力的结果。它应该类似于图 9-10。


  ![9781430247913_Fig09-10.jpg](img/9781430247913_Fig09-10.jpg)


  图 9-10。使用 SSIS 对变长列进行子集化


  '
- "# 9-8. 使用 T-SQL 连接源数据\n\n## 问题\n\n您希望将来自多个列的数据连接到一个列中。数据已加载到 SQL Server 表中。\n\n\
  ## 解决方案\n\n使用 `FOR XML` “黑盒”技术来连接来自两列或多列的数据。\n\n以下代码片段将为 Client 表中的每个客户连接 Invoice\
  \ 表中的所有发票 ID (`C:\\SQL2012DIRecipes\\CH09\\Concatenate.sql`)：\n\n```sql\nSELECT\
  \ ID, LEFT(CA. CnCatLst, LEN(CA. CnCatLst)-1) AS InvoiceIDs\nFROM dbo.Client C\n\
  CROSS APPLY (\n    SELECT          CAST(InvoiceNumber AS VARCHAR(50)) + ',' AS [text()]\n\
  \    FROM            dbo.Invoice I\n    WHERE           I.ClientID = C.ID\n    ORDER\
  \ BY        I.ID\n    FOR XML PATH('')\n) CA (CnCatLst)\nORDER BY        ID;\n```\n\
  \n## 工作原理\n\n有时，您需要将源数据连接成某种形式的列表——很可能是以分隔符分隔的。以这种方式连接数据是 SQL 处理的另一个领域，关于执行此操作的“最佳”方式可能会引发激烈的讨论。事实上，仅这个主题就有一些出色的论文，我强烈建议您查阅。在这里，我不希望继续讨论，因此我将简单地建议一种自多年前首次在互联网上发表以来我一直使用的技术：XML“黑盒”方法。\n\
  \n这种技术似乎是复杂性和效率之间的一个很好的权衡，前提是连接的文本不超过两 GB——但我认为，如果超过，很可能在成为阻碍问题之前就有其他问题需要处理。还有其他方法可以移除连接文本中的最终逗号。如果您愿意，可以使用\
  \ `STUFF` 函数。\n\n"
- "# 9-9. 使用 SSIS 连接数据\n\n## 问题\n\n您希望作为 SSIS ETL 过程的一部分，在数据流期间连接数据。\n\n## 解决方案\n\n\
  使用自定义 SSIS 脚本任务来应用 .NET 进行连接。以下步骤介绍如何完成。\n\n1.  创建一个新的 SSIS 包。\n\n## 9-9. 连接列\n\n\
  ### 问题\n您需要将两列或多列数据合并为一列，或者根据分组将多行数据合并为单行中的字符串。\n\n### 解决方案\n使用 SSIS 脚本任务来连接值。下面是一个连接组内字符串的示例。\n\
  \n1.  添加两个新的 OLEDB 连接管理器——一个名为 ``CarSales_OLEDB``，连接到 CarSales 数据库；另一个名为 ``CarSales_Staging_OLEDB``，连接到\
  \ CarSales_Staging 数据库。如果您愿意，可以重用来自配方 9-4 的连接管理器——或者（更好的是）将它们定义为包级连接管理器。\n2.  添加一个新的数据流任务。双击进行编辑。\n\
  3.  添加一个数据源并按如下方式配置：\n    *   **OLEDB 连接管理器**：``CarSales_OLEDB``\n    *   **数据访问模式**：SQL\
  \ 命令\n    *   **SQL 文本**：\n        ```sql\n        SELECT    ClientID, InvoiceNumber\n\
  \        FROM      dbo.Invoice\n        ORDER BY  ClientID, InvoiceNumber;\n   \
  \     ```\n4.  预览数据以确保一切正常，如果正常，点击“确定”。\n5.  添加一个脚本组件任务，将类型定义为“转换”，并将数据源任务连接到它。双击进行编辑。\n\
  6.  在左侧点击“输入列”，选择 ``ClientID`` 和 ``InvoiceNumber`` 列。对话框应如图 9-11 所示。\n    ![9781430247913_Fig09-11.jpg](img/9781430247913_Fig09-11.jpg)\n\
  \    **图 9-11** 定义脚本转换的输入列\n7.  选择 Output 0。\n8.  在左侧点击“输入和输出”，然后点击“输出列”并添加两个新列——``ListOutput``\
  \ 和 ``GroupOutput``。将两者都设置为 ``DT_STR`` 并具有合适的长度。\n9.  选择 Output 0 并将 ``SynchronousInputID``\
  \ 设置为 **无**。此窗格应如图 9-12 所示。\n    ![9781430247913_Fig09-12.jpg](img/9781430247913_Fig09-12.jpg)\n\
  \    **图 9-12** 配置脚本任务输出为异步\n10. 点击“脚本”，选择 Microsoft Visual Basic 2010 作为脚本语言，然后点击“编辑脚本”。\n\
  11. 在脚本窗口中，向 Imports 区域添加以下指令：\n    ```vbnet\n    Imports System.Text\n    ```\n\
  12. 将 ScriptMain 代码替换为以下脚本（`C:\\SQL2012DIRecipes\\CH09\\SSISConcatenation.vb`）：\n\
  \    ```vbnet\n    Public Class ScriptMain\n        Inherits UserComponent\n\n \
  \       Dim InitValue As String = \"\"\n        Dim ControlValue As String = \"\"\
  \n        Dim CurrentElement As String = \"\"\n        Dim ConcatValue As New StringBuilder\n\
  \        Dim ConcatCharacter As String = \",\"\n\n        Public Overrides Sub PreExecute()\n\
  \            MyBase.PreExecute()\n        End Sub\n\n        Public Overrides Sub\
  \ PostExecute()\n            MyBase.PostExecute()\n        End Sub\n\n        Public\
  \ Overrides Sub Input0_ProcessInput(ByVal Buffer As Input0Buffer)\n\n          \
  \  While Buffer.NextRow()\n                Input0_ProcessInputRow(Buffer)\n    \
  \        End While\n\n            If Buffer.EndOfRowset Then\n\n               \
  \ Output0Buffer.AddRow()\n                Output0Buffer.GroupOutput = ControlValue\n\
  \                Output0Buffer.ListOutput = ConcatValue.Remove(ConcatValue.Length\
  \ - 1, 1).ToString\n                Output0Buffer.SetEndOfRowset()\n\n         \
  \   End If\n\n        End Sub\n\n        Public Overrides Sub Input0_ProcessInputRow(ByVal\
  \ Row As Input0Buffer)\n\n            ' If first record - initialise variables\n\
  \            If InitValue = \"\" Then\n                InitValue = Row.ClientID.ToString\n\
  \                ControlValue = Row.ClientID.ToString\n            End If\n\n  \
  \          CurrentElement = Row.InvoiceNumber.ToString\n            ControlValue\
  \ = Row.ClientID.ToString\n\n            'Process all records\n            If InitValue\
  \ = ControlValue Then\n\n                ConcatValue = ConcatValue.Append(CurrentElement).Append(ConcatCharacter)\n\
  \n            Else\n                ' Write grouping element and concatenated string\
  \ to new outputs\n                Output0Buffer.AddRow()\n                Output0Buffer.ListOutput\
  \ = ConcatValue.Remove(ConcatValue.Length - 1, 1).ToString\n                Output0Buffer.GroupOutput\
  \ = InitValue\n\n                InitValue = Row.ClientID.ToString\n           \
  \     ConcatValue = ConcatValue.Remove(0, ConcatValue.Length).Append(CurrentElement).Append(ConcatCharacter)\n\
  \n            End If\n        End Sub\n\n    End Class\n    ```\n13. 关闭脚本窗口，然后点击“确定”关闭“脚本任务编辑器”。\n\
  14. 添加一个 OLEDB 目标任务，将其配置为使用 ``CarSales_Staging_OLEDB`` 连接管理器。\n15. 点击“新建”以创建目标表，您可以根据需要重命名。点击“确定”确认表创建。接下来，点击“映射”并将源列映射到目标列。点击“确定”完成目标任务。\n\
  \n您现在可以直接将脚本任务中的数据输出到数据流目标，或者继续使用进一步的转换来处理数据。\n\n### 工作原理\n您可能也需要在 SSIS 中连接字符串。这可以通过几种方式完成，但我会坚持解释一个自定义的\
  \ SSIS 脚本任务，它能快速轻松地实现所需的结果。\n\n脚本本质上执行一个任务——它处理输入中的每条记录，并检查“分组”字段（这里是 ``ClientID``）是否与前一条记录相比发生了变化。如果该字段没有改变，那么包含要连接的值的字段（``InvoiceNumber``）就会被添加到\
  \ ``ConcatValue`` 变量中。如果它发生了变化，就会向输出缓冲区添加一条新记录，并将两个字段（包含连接字段的 ``ListOutput`` 和包含“分组”字段的\
  \ ``GroupOutput``）添加到输出缓冲区。\n\n这里我使用了逗号作为分隔符——您可以选择源数据中使用的分隔符，并相应地修改代码。如果数据在脚本任务处理之前没有排序，您将必须添加一个排序任务并确保它至少按“分组”字段（本例中为\
  \ ``ClientID``）排序。\n\n脚本使用了您可能熟悉的 ``ProcessInputRow`` 重写方法，因为它用于处理流经脚本任务的输入缓冲区中的所有记录。您可能对\
  \ ``ProcessInput`` 重写方法不太熟悉。这是异步函数所必需的，它检测正在处理的记录集的结束，然后完成任何所需的处理。\n\n您可能更愿意使用 ``StringBuilder``（因此需要引用\
  \ ``System.Text``）而不是字符串进行连接。但请注意，``StringBuilder`` 可能更快、更高效。这是因为当它被更改时，它不会像字符串那样在内存中被销毁和重新创建。然而，它的效率将取决于连接的次数和结果的长度。所以请随意比较和测试这两种可能性。\n\
  \n![image](img/sq.jpg) **注意** 这是一个异步转换，因此它不仅会在完成前阻塞数据流，还会给整个 SSIS 包增加相当大的内存压力。\n\
  \n## 9-10. 复制列\n\n### 问题\n您需要在数据中创建重复的列。\n\n### 解决方案\n在 T-SQL 中多次别名同一列，或使用 SSIS\
  \ 派生列转换。\n\n在 T-SQL 中，创建重复列可以使用以下代码片段完成：\n```sql\nSELECT ClientName, ClientName\
  \ AS EsteemedVisitor\nFROM CarSales.dbo.Client;\n```\n\n在 SSIS 中，您可以向数据流添加一个派生列转换，并将其连接到源任务（或数据流中的任何任务）。双击派生列转换，并在网格中的“派生列名称”字段中添加一个新列名。然后展开对话框左上角的“列”，并将适当的列名拖到“表达式”字段。然后您可以点击“确定”关闭对话框。\n\
  \n\n## 9-11. 将字符串转换为大写或小写\n\n### 问题\n你希望在数据流中，或在数据加载到 SQL Server 表之后，将字符串的全部或一部分转换为大写或小写。\n\
  \n### 解决方案\n在 T-SQL 和 SSIS 中使用 `UPPER` 和 `LOWER` 函数来执行字符大小写转换。\n\n### 工作原理\n解决方案非常简单。你可以使用以下函数将字符串转换为大写或小写：\n\
  | | T-SQL | SSIS |\n| --- | --- | --- |\n| 大写转换 | `UPPER`(列或列别名) | `UPPER`(数据流中的列名)\
  \ |\n| 小写转换 | `LOWER`(列或列别名) | `LOWER`(数据流中的列名) |\n\n在 SSIS 中，可以使用派生列转换来将文本转换为大写或小写。如果你采用配方\
  \ 9-12 中的例子，可以对你选作表达式的列使用 SSIS 的 `UPPER` 或 `LOWER` 函数。\n\n虽然这可能被视为迈向数据清洗永恒篝火的第一步（这是一个我很大程度上希望避免讨论的主题，因为它很容易成为另一本专著的主题，而我无意尝试去写），但为了澄清基本技术，绕道进入简单字符转换的领域仍然值得一试。以上就是\
  \ `UPPER` 和 `LOWER` 函数的处理方法。\n\n## 9-12. 将字符串转换为标题大小写\n\n### 问题\n你希望将字符串的全部或一部分转换为标题大小写，即每个单词的首字母大写。\n\
  \n### 解决方案\n在 SSIS 中，标题大小写可以作为脚本转换的一部分来生成。在 T-SQL 中，你最好使用 CLR 函数。接下来，我将解释如何使用这两种选项。在此配方中，我假设已经存在一个包含数据源和目标的\
  \ SSIS 包。\n\n### 使用 SSIS 实现标题大小写\n1.  向数据流面板添加一个脚本组件。选择操作类型为“转换”。双击进行编辑。\n2.  在左侧窗格中单击“输入列”。选择要转换为“标题大小写”的列。在此示例中，它将是\
  \ `InvoiceNumber` 列。\n3.  在左侧窗格中单击“输入和输出”。单击“输出列”，然后单击“添加列”以添加一个新列。将其命名为 `ProperOut`。确保数据类型与输入列的类型和长度对应。\n\
  4.  在左侧窗格中单击“脚本”。选择 `Microsoft Visual Basic 2010` 作为脚本语言，然后选择“编辑脚本”。\n5.  添加以下脚本：\n\
  \    ```\n    Public Overrides Sub Input0_ProcessInputRow(ByVal Row As Input0Buffer)\n\
  \        Dim cultureInfo As System.Globalization.CultureInfo = System.Threading.Thread.CurrentThread.CurrentCulture\n\
  \        Dim textInfo As TextInfo = cultureInfo.TextInfo\n\n        If Not Row.InvoiceNumber_IsNull\
  \ Then\n            Row.ProperOut = textInfo.ToTitleCase(Row.InvoiceNumber)\n  \
  \      End If\n    End Sub\n    ```\n6.  通过选择“生成”->“生成（项目引用）”来编译脚本。关闭脚本窗口并单击“确定”以完成脚本任务的创建。\n\
  \n### 使用 T-SQL 实现标题大小写\n由于此解决方案使用 CLR，关于如何创建 CLR 函数的具体细节，请参考配方 10-21。此函数（名为 `FncProperCase`）的代码位于\
  \ `C:\\SQL2012DIRecipes\\CH09\\TitleCase.vb`：\n```\nusing System;\nusing System.Data;\n\
  using System.Collections;\nusing System.Data.SqlTypes;\nusing System.Data.SqlClient;\n\
  using Microsoft.SqlServer.Server;\nusing System.Globalization;\n\npublic partial\
  \ class UserDefinedFunctions {\n    [Microsoft.SqlServer.Server.SqlFunction(IsDeterministic\
  \ = true, IsPrecise = true)]\n    public static SqlString FncProperCase(string inputData)\n\
  \    {\n        System.Globalization.CultureInfo cultureInfo = System.Threading.Thread.CurrentThread.CurrentCulture;\n\
  \        TextInfo textInfo = cultureInfo.TextInfo;\n\n        inputData = textInfo.ToTitleCase(inputData);\n\
  \        return new SqlString(inputData);\n    }\n};\n```\n\n一旦你的 CLR 函数加载到 SQL\
  \ Server 中，调用它的 T-SQL 语句是：\n```\nSELECT dbo.FncProperCase(LOWER(ClientName))\nFROM\
  \ dbo.Clients;\n```\n\n### 工作原理\n在 SSIS 中实现标题大小写并不那么简单——但也并非真的困难，因为 .NET 框架的 `TextInfo`\
  \ 类中包含了 `ToTitleCase` 函数。因此，调用这个函数可以解决许多问题。它并不完美，有一些恼人的转换它无法处理，但如果你能忍受这些缺点，它就非常有用。\n\
  \n在 T-SQL 函数中实现标题大小写可以使用“字符串遍历”代码，但这种方法在 ETL 场景中可能会慢得令人难以置信。编写这种代码也可能极其繁琐。因此，我建议将\
  \ .NET 的 `TextInfo` 调用包装在 SQL Server CLR 函数中。这样做可能会显著减慢你的数据处理速度。然而，由于解决方案的纯粹简单性和可靠性，它非常诱人，因此我尽管知道函数调用带来的逐行处理会造成不可避免的性能损失，还是向你展示了它。\n\
  \n### 提示、技巧和陷阱\n*   另一个选项——仍然使用脚本组件——是正则表达式。如何在脚本组件中使用正则表达式在配方 10-20 中有解释。因此，你需要做的就是找到一段合适的\
  \ Regex 代码来应用良好的标题大小写转换。如果你在你喜欢的搜索引擎中键入 `regex proper case`，可以找到好几个可用的。\n*   你必须首先将字段转换为\
  \ `LOWER`——除非你想让它保持 `UPPER` 大小写——因为这个 .NET 函数不会覆盖大写字符并将其转换为标题大小写。\n*   你当然可以将此函数用作\
  \ T-SQL `UPDATE` 子句的一部分。\n\n## 9-13. 在 T-SQL 中进行数据透视\n\n### 问题\n你希望对已加载到 SQL Server\
  \ 数据库中的数据进行透视。\n\n### 解决方案\n在数据更新过程中使用 T-SQL 的 `PIVOT` 关键字。\n\n### 工作原理\n使用 T-SQL\
  \ 透视数据在技术上并不困难，稍加练习就会变得出奇地容易。以下是使用来自 `CarSales` 数据库的 `CarSales.dbo.Stock` 表（`C:\\\
  SQL2012DIRecipes\\CH09\\PivotData.sql`）进行汽车销售按品牌/每月透视和聚合数据的 T-SQL：\n```\nSELECT\
  \ Marque AS TotalMonthlySalesPerMarque,\n       [January], [February], [March],\
  \ [April], [May],\n       [June], [July], [August], [September], [October], [November],\
  \ [December]\nFROM\n            (\n              SELECT\n              S.Marque\n\
  \              ,DATENAME(month, I.InvoiceDate) AS SaleMonth\n              ,L.SalePrice\n\
  \              FROM   dbo.Stock S\n                      INNER JOIN dbo.Invoice_Lines\
  \ L\n                      ON S.ID = L.StockID\n                      INNER JOIN\
  \ dbo.Invoice I\n                      ON L.InvoiceID = I.ID\n              ) AS\
  \ SRC\nPIVOT\n(\n    SUM(SalePrice)\n    FOR SaleMonth IN ([January], [February],\
  \ [March], [April], [May], [June], [July], [August], [September], [October], [November],\
  \ [December])\n) AS PVT ;\n```\n\n有时，源数据，即使是完美规范化的源数据，就是不符合导入过程的要求。虽然这在创建报表系统时更为常见，但在更传统的数据导入需求中也可能发生。\n\
  \n\n\n因此，能够对源数据进行**枢轴转换**（即将数据从行**转置**为列）是很有帮助的。当然，这是一种数据**反规范化**操作，更糟糕的是，它会导致数据被聚合到无法恢复源数据的程度。然而，只要您意识到其局限性和风险，它在某些情况下就是一种有效且有用的技术。\n\
  \n在详细解释代码之前，可能值得先澄清一下基本概念和词汇。\n\n| **数据类型** | **说明** |\n| --- | --- |\n| 透传数据 |\
  \ 不受转置影响的数据，作为左侧列（一或多列）流经整个过程，既不被修改，也不会修改其他数据。 |\n| 键或设置键 | 用作分组依据、显示为左侧列的数据。 |\n\
  | 透视列 | 其值将被转置为列标题的列中的数据。 |\n| 透视数据 | 来自透视列的数据，将被转置并聚合到相应的透视列与行交叉点处。 |\n\n在此示例中，内部\
  \ `SELECT` 语句返回将用于转置数据的三列：\n\n*   一个键列，将成为左侧列（本例中为 `Marque`）。您可以根据需要使用任意多个此类列。\n\
  *   透视列（从 `InvoiceDate` 列派生的 `SaleMonth`）。\n*   透视数据（或值列），即被聚合和转置的数据（`SalePrice`）。\n\
  \n然后，这个被别名为 `SRC` 的内联查询会被 `PIVOT`（透视）。这意味着要指定：\n\n*   哪一列需要被聚合（`SalePrice`）以及应用哪种聚合函数——本例中是\
  \ `SUM`。\n*   如何将要被转置的列外推为多个列。这意味着要指定列名。\n\n最后，外部 `SELECT` 指定了将返回的透传列（来自内联查询）和转置后的列（来自\
  \ `PIVOT` 语句）。\n\n不可避免的是，这是一种相当**僵化**的方法，因为透视列必须明确指定，语句才能工作。如果您真的愿意（这也是在 SQL Server\
  \ 2005 之前的黑暗日子里所采用的方法），也可以使用多个 `CASE` 语句来转置列。我将把这种方法留给历史书。\n\n大多数透视数据的示例都将转置列显示为日期（年份、年月等）。这绝不是强制性的，任何源数据列都可以被透视。\n\
  \n也可以使 SQL 动态化，从而允许处理可变的输入数据——在某种程度上。这种方法归结为将透视列的列表确定为一个变量，然后在执行数据透视的 T-SQL 代码中使用这个变量——该代码本身也被定义为\
  \ T-SQL 变量。\n\n如果我们沿用前面的例子，动态 T-SQL 透视的代码如下（`C:\\SQL2012DIRecipes\\CH09\\DynamicPivot.sql`）：\n\
  \n```sql\nDECLARE @ColumnList VARCHAR(8000)\nSELECT @ColumnList = LEFT(TR.ColList,\
  \ LEN(TR.ColList)-1)\nFROM\n(\nSELECT QUOTENAME(DATENAME(month, InvoiceDate)) +\
  \ ',' AS [text()]\nFROM   dbo.Invoice\nGROUP BY DATENAME(month, InvoiceDate), MONTH(InvoiceDate)\n\
  ORDER BY MONTH(InvoiceDate)\nFOR XML PATH('')\n) TR (ColList);\n\nDECLARE @TransposeSQL\
  \ VARCHAR(MAX) = '\nSELECT Marque AS TotalMonthlySalesPerMarque, '+ @ColumnList\
  \ + '\nFROM\n(\nSELECT\nS.Marque\n,DATENAME(month, I.InvoiceDate) AS SaleMonth\n\
  ,L.SalePrice\nFROM     dbo.Stock S INNER JOIN dbo.Invoice_Lines L ON S.ID = L.StockID\
  \ INNER JOIN dbo.Invoice I ON L.InvoiceID = I.ID\n) AS SRC\nPIVOT ( SUM(SalePrice)\
  \ FOR SaleMonth IN ('+ @ColumnList + ') ) AS PVT ;'\nEXECUTE CarSales.dbo.sp_executesql\
  \ @statement = @TransposeSQL;\n```\n\n提示、技巧与陷阱\n\n*   尽管这种方法并非不优雅，但它也并非没有问题。具体来说，在输出数据时，您需要能够分析目标表的元数据，并在发现目标表的列与\
  \ `PIVOT` 语句中的转置列列表相比有缺失时，添加新列。虽然这并不困难，但有点繁琐，此处不演示具体做法。\n\n## 9-14. 在 SSIS 中使用 SQL\
  \ Server 2012 进行数据透视\n\n### 问题\n您需要作为 SSIS 数据流的一部分对数据进行透视。\n\n### 解决方案\n使用新的、简化的\
  \ SSIS 2012 透视任务，步骤如下。\n\n1.  新建一个 SSIS 包，并添加一个名为 **CarSales_OLEDB** 的 OLEDB 连接管理器。\n\
  2.  添加一个 OLEDB 源组件，并按如下配置：\n    | OLEDB 连接管理器: | CarSales_OLEDB |\n    | --- | ---\
  \ |\n    | 数据访问模式: | SQL 命令 |\n    | SQL 命令文本: | `SELECT S.Marque, DATENAME(month,\
  \ I.InvoiceDate) AS SaleMonth, L.SalePrice FROM dbo.Stock S INNER JOIN dbo.Invoice_Lines\
  \ L ON S.ID = L.StockID INNER JOIN dbo.Invoice I ON L.InvoiceID = I.ID ORDER BY\
  \ S.Marque, MONTH(I.InvoiceDate);` |\n3.  单击“确定”确认。\n4.  添加一个“透视”任务，并将 OLEDB 源组件连接到该任务。双击进行编辑。\n\
  5.  单击“透视键”弹出列表。选择包含透视键（或者您更愿意称之为透视列）数据的列。这将成为取自源数据列的新列标题。本例中是 `SaleMonth`。\n6.\
  \  单击“设置键”弹出列表，选择将被分组到透视表最左侧列中的数据所在的列。本例中是 `Marque`。\n7.  单击“透视值”弹出列表，选择其数据将被为透视表的每一行进行聚合的列。\n\
  8.  在“根据值生成透视输出列”字段中单击，并将 `[value1],[value2],[value3]` 替换为透视键的新列标题列表。这些应与“设置键”列表中的唯一值相对应。\n\
  9.  单击“立即生成列”。确认列出列名的对话框。该对话框应类似于图 9-13。\n    ![9781430247913_Fig09-13.jpg](img/9781430247913_Fig09-13.jpg)\n\
  \    图 9-13. 在 SSIS 2012 中透视数据\n10. 单击“确定”确认。\n\n现在您可以运行该包，对源数据进行透视。\n\n### 工作原理\n\
  如果您曾受困于 SSIS 透视任务中那些棘手的方面，那么您无疑会感到欣慰，因为 SQL Server 2012 通过一个大幅改进的用户界面，使得这个特定过程变得容易得多，该界面在很大程度上引导您完成透视过程。\n\
  \n必须理解的是以下四个概念：\n\n*   `透传` 元素（不受透视操作影响的数据）。\n*   键或 `设置键`（分组元素）。\n*   `透视列`（从行元素转置为列标题）。\n\
  *   `透视数据`。\n\n一旦您明确了这些，剩下的就是在如图 9-15 所示的对话框中选择相关的列。\n\n另一种返回 `透视键` 值列表的方法是使用 SQL\
  \ 生成连接后的字段名列表，采用 9-8 配方中描述的连接技术的一个变体。可能像这样：\n\n```sql\nSELECT LEFT(CA.CnCatLst,\
  \ LEN(CA.CnCatLst)-1)\nFROM\n(\nSELECT    '[' + DATENAME(month, I.InvoiceDate) +\
  \ '],' AS [text()]\nFROM      CarSales.dbo.Invoice I\nGROUP BY  DATENAME(month,\
  \ I.InvoiceDate)\nFOR XML PATH('')\n) CA (CnCatLst) ;\n```\n\n提示、技巧与陷阱\n\n*   必须承认，这个新的\
  \ SSIS 任务可能并不完美。\n\n\n\n然而，它确实使得在 SSIS 中进行数据透视变得容易得多。\n*   如果你有很长的需要透视的列列表，你可以通过勾选“忽略不匹配的透视键值并在执行后报告它们”复选框来获取它们的名称。然后运行包并选择“视图/输出”。缺失的字段将作为信息列在输出窗口中。你可以从那里复制并粘贴到透视任务编辑器中。不过，你必须首先至少定义一个透视列。`PIVOT`\
  \ 任务将只使用 `SUM` 函数，其他聚合（计数、平均值等）是不可能的。\n*   你必须在源组件 SQL 中（如果使用 SQL 定义源数据）对键列进行 `SORT`，或者使用排序转换（如果无法通过其他方式确保数据已排序），以确保所有相同键的透视出现在同一行上。否则，结果将出乎意料。\n\
  *   如果存在多个直通列，则仅返回第一个值——没有连接。\n*   重复记录将导致失败（“重复行”指在键列和透视列集合中具有相同值的行，仅此而已，不分析其他数据）。使用\
  \ `SELECT DISTINCT`（如果有重复）或 `GROUP BY/SUM`（用于预聚合）在源 SQL 中，或者在 `PIVOT` 转换之前添加一个聚合转换，如果你想避免一个显然莫名其妙（且极其烦人）的明显故障。\n\
  *   最后两点描述的限制在许多情况下可以通过扩展用于获取初始数据的 SQL `SELECT` 语句来克服。\n\n## 9-15. 在 SSIS 中使用 SQL\
  \ Server 2005 和 2008 进行数据透视\n\n### 问题\n你正在使用旧版 SSIS 作为 SSIS ETL 过程的一部分来透视数据。\n\n\
  ### 解决方案\n使用 SSIS 透视任务。以下步骤说明了如何执行此操作。\n1.  由于使用 SQL Server 2012 的前三个步骤与先前版本所需的步骤相同，你需要执行配方\
  \ 9-16 中的步骤 1 到 3。\n2.  单击“输入列”选项卡并选择三个输入列：`Marque`、`SaleMonth` 和 `SalePrice`。\n\
  3.  单击“输入和输出属性”选项卡并展开 `Pivot Default Input/Input Columns`。按如下方式配置输入列的 `PivotUsage`\
  \ 属性：\n    | 列 | PivotUsage |\n    | :--- | :--- |\n    | Marque | 1 |\n    | SaleMonth\
  \ | 2 |\n    | SalePrice | 3 |\n4.  展开 `Pivot Default Output/ Output Columns`。单击“添加列”三次以添加以下三列：`Marque`、`March`\
  \ 和 `May`。\n5.  按如下方式配置输入列的属性：\n    | 列 | SourceColumn | PivotKeyValue |\n    |\
  \ :--- | :--- | :--- |\n    | Marque | SourceColumn (源列 `Marque` 的 LineageID.) |\
  \ |\n    | March | SourceColumn (源列 `SalePrice` 的 LineageID.) | PivotKeyValue (`March`)\
  \ |\n    | May | SourceColumn (源列 `SalePrice` 的 LineageID.) | PivotKeyValue (`May`)\
  \ |\n6.  点击“确定”确认。\n\n### 工作原理\n使用 SQL Server 2005 和 2008 透视数据需要一些手动干预，这要求你理解相关概念和数据。起初这可能看起来有些违反直希望望，但希望随着你配置\
  \ SSIS 透视任务，它会变得更加清晰。\n\n正如我之前所建议的，这是一种相当严格的方法，因为必须为转换工作单独且完整地定义透视列（不能有任何遗漏）。然而，你可以在配置任务时预测未来的列。这些列在源数据可用之前将包含\
  \ `NULL`。\n\n有四种潜在的列类型，其 `PivotUsage` 必须为每个输入列进行设置：\n*   `0` = 直通（不受透视操作影响的数据）\n\
  *   `1` = 键或设置键（分组元素）\n*   `2` = 透视列（从行元素转换为列标题）\n*   `3` = 透视数据\n\n对于每个列（无论其属于四种定义类型中的哪一种），你必须指定源列的\
  \ `LineageID` 并将其放入 `SourceColumn` 属性中。\n\n仅对于透视列，将值的源 `LineageID` 添加为 `SourceColumn`，并将透视列中的元素添加为\
  \ `PivotKeyValue`。将列标题添加为 `Name`。\n\n### 提示、技巧和陷阱\n*   配方 9-14 中适用于在 SSIS 2012 中透视记录的所有注释同样适用于旧版\
  \ SQL Server。\n\n## 9-16. 在 T-SQL 中合并多个相同的数据源\n\n### 问题\n你需要确保来自多个源的数据使用 T-SQL 流入唯一的目标。你的输入源在提供相同的数据列方面是相同的。\n\
  \n### 解决方案\n使用 `UNION`、`UNION ALL` 和 `INTERSECT`。例如，以下代码片段将输出来自相同源表的所有记录 (`C:\\\
  SQL2012DIRecipes\\CH09\\ConsolidateDateSources.sql`)：\n```sql\nSELECT ClientName,\
  \ County, Country FROM dbo.Client\nUNION ALL\nSELECT ClientName, County, Country\
  \ FROM dbo.Client1;\n```\n如果你希望只输出唯一值，则使用：\n```sql\nSELECT ClientName, County, Country\
  \ FROM dbo.Client\nUNION\nSELECT ClientName, County, Country FROM dbo.Client1;\n\
  ```\n要返回仅存在于两个查询中且值不同的记录，请使用：\n```sql\nSELECT ClientName, Country, Country FROM\
  \ dbo.Client\nINTERSECT\nSELECT ClientName, County, Country FROM dbo.Client1;\n\
  ```\n\n### 工作原理\n在很多情况下，你需要确保来自多个源的数据流入唯一的目标。这很可能涉及将来自多个结构相同的源的数据合并到单个目标中，该目标的结构也与源相同。\n\
  \n然而，这三种函数的工作方式存在一些细微差别：\n*   `UNION ALL`：如果多个源中存在重复数据，则允许进入目标。\n*   `UNION`：不允许重复数据进入目标。\n\
  *   `INTERSECT`：仅允许在所有源中都存在且相同的数据进入目标。\n\n### 提示、技巧和陷阱\n*   对于这些运算符的所有 T-SQL 查询，列的数量和顺序必须相同，数据类型必须兼容。\n\
  *   使用 T-SQL 时，你不仅限于来自同一数据库的数据源——你可以使用三部分名称并引用来自另一个数据库的数据源。可能更重要的是，你可以使用四部分名称通过链接服务器使用\
  \ `UNION`/`UNION ALL`/`INTERSECT` 和 `EXCEPT`——或者使用 `OPENDATASOURCE`。\n\n## 9-17.\
  \ 在 SSIS 中合并多个相同的数据源\n\n### 问题\n你需要确保作为 SSIS 数据流的一部分，来自多个源的数据流入唯一的目标。\n\n### 解决方案\n\
  使用 Union All 转换——以及可选地 Merge 转换。以下步骤说明了如何操作。\n1.  在 SSIS 包中，为每个源添加一个数据源控件——无论类型如何——并配置为输出相同的字段。\n\
  2.  向数据流平面添加一个 Union All 任务，并将所有数据源的输出路径连接到 Union All 任务。\n3.  双击 Union All 任务，将来自所有数据源的源字段相互映射。单击“确定”确认更改，并继续数据流。\n\
  \n如果你想删除任何重复项，请执行以下步骤。\n1.  在 SSIS 包中，为两个源各添加一个数据源控件——无论类型如何——并使用 SQL 查询配置为输出相同的字段。确保\
  \ SQL 查询按所有列对数据进行排序。\n2.  右键单击每个源。选择“显示高级编辑器”，然后选择“输入和输出属性”，并单击“源输出”。将 `IsSorted`\
  \ 属性设置为 `True`。然后展开源输出的输出列，并选择数据源控件的 SORT 语句中使用的排序列。将它们的 `SortKeyPosition` 设置为 1、2\
  \ 等——与数据源控件的排序语句相对应。\n\n\n\n## 9-18\\. 使用 T-SQL 在单表内进行数据规范化\n\n### 问题\n\n你需要将一个表中来自多个列的源数据“逆透视”（unpivot）到同一个表内的规范化记录结构中。\n\
  \n### 解决方案\n\n应用 T-SQL `UNPIVOT` 命令在数据表中创建所需的额外记录。以下是如何执行此操作的示例。\n\n1.  创建一个非规范化的数据表，如下所示（`C:\\\
  SQL2012DIRecipes\\CH09\\tblClientList.sql`）：\n\n    ```sql\n    CREATE TABLE dbo.ClientList\n\
  \    (\n     ID INT NULL,\n     PrimaryContact NVARCHAR(50) NULL,\n     SecondaryContact\
  \ NVARCHAR(80) NULL,\n     ThirdContact NVARCHAR(50) NULL\n    );\n    GO\n    ```\n\
  \n2.  应用以下 T-SQL 代码片段，将三个列——`PrimaryContact`、`SecondaryContact` 和 `ThirdContact`——旋转（逆透视）为一个列\
  \ `CliName`。它还将添加一个名为 `NameType` 的列，用于显示每条数据的来源列（`C:\\SQL2012DIRecipes\\CH09\\Unpivot.sql`）。\n\
  \n    ```sql\n    SELECT        ID, NameType, UPV.CliName\n    FROM          CarSales_Staging.dbo.ClientList\n\
  \    UNPIVOT       (CliName FOR NameType in (PrimaryContact, SecondaryContact,\n\
  \                 ThirdContact)) as UPV;\n    ```\n\n### 工作原理\n\n这种情况太常见了——很可能发生在从电子表格、Access\
  \ 数据库或设计不佳的数据源导入数据时——你会发现源数据是非规范化的。因此，对于同一个属性，数据不是分布在多个记录中，而是分布在多个列中。虽然有时这样做完全有合理的理由，但在将此类数据集成到\
  \ SQL Server 时，许多情况下你必须对其进行规范化。这意味着将多个列旋转成一个数据列，并可选地添加一个列来指明数据来自哪个源列。\n\n在 SQL Server\
  \ 2005 之前，这需要通过 `CASE` 语句进行繁琐的苦工。幸运的是，T-SQL 多年前就引入了 `UNPIVOT` 子句，这使得规范化任务变得容易得多。同样的功能在\
  \ SSIS 中也可用，使用 `UNPIVOT` 任务，正如你将在配方 9-19 中看到的那样。\n\n在 T-SQL 中将表值表达式的列旋转为列值，就像在 select\
  \ 语句中添加一个 `UNPIVOT` 子句一样简单。本质上，你需要选择所有不会被旋转的列，然后在 `UNPIVOT` 语句中为新列添加别名——并可选地添加第二个列来包含源列的名称。\n\
  \n我对 `UNPIVOT` 子句唯一真正的批评是它有些死板。我见过（我相信你也见过）包含可变数量列的非规范化数据的 Excel 电子表格。幸运的是，一点动态\
  \ SQL 可以解决这个问题——前提是你能够为非规范化的列名指定一个共同的根或词干。\n\n以下的 T-SQL 将逆透视所有名称包含单词 “contact” 的列——无论有多少列（`C:\\\
  SQL2012DIRecipes\\CH09\\DynamicUnpivot.sql`）：\n\n```sql\nDECLARE @ColList VARCHAR(8000)\
  \ = '';\nDECLARE @SQLCode VARCHAR(8000) = '';\nDECLARE @ColFilter VARCHAR(1000)\
  \ = 'contact';\nDECLARE @KeyCol VARCHAR(1000) = 'ID';\nDECLARE @TableName VARCHAR(1000)\
  \ = 'ClientList';\n\nSELECT   @ColList = @ColList + QUOTENAME(COLUMN_NAME) + ','\n\
  FROM     INFORMATION_SCHEMA.COLUMNS\nWHERE    TABLE_NAME = @TableName\n        \
  \ AND COLUMN_NAME LIKE '%' + @ColFilter + '%';\n\nIF LEN(@ColList) > 1\nBEGIN\n\
  \ SET @ColList = LEFT(@ColList, LEN(@ColList) -1 )\n SET @SQLCode = ' SELECT ' +\
  \ @KeyCol + ', ContactType, UPV.' + @ColFilter + ' FROM ' + @TableName + ' UNPIVOT\
  \ (' + @ColFilter + ' FOR ContactType in (' + @ColList + ')) as UPV ';\n\n EXECUTE\
  \ CarSales_Staging.dbo.sp_executesql @statement =  @SQLCode;\n\n END\nELSE PRINT\
  \ 'No Matching columns';\n```\n\n列过滤器（即指定要旋转的列而不包括任何其他列的列）通常是此操作中最困难的部分。在生产环境中，我建议计算源数据中的列数，计算任何非透视列的数量，并计算那些被透视的列。然后，通过一点非常基础的算术运算，很容易验证所有非规范化的列都已被逆透视。如果你不想输出数据来源的列，你所要做的就是不要在主\
  \ `SELECT` 语句中添加 `NameType` 字段。然而，你必须将其保留在 `PIVOT` 语句中。数据列和源列的列别名可以是任何你想要的名称（当然，在\
  \ SQL Server 对象命名限制范围内）。只需确保它们在 `UNPIVOT` 子句和 `SELECT` 语句之间保持一致。\n\n\n#### 提示、技巧与陷阱\n\
  - 所有适用于`UNPIVOT`标准用法的注意事项（参见配方 9-10）同样适用于此处使用的动态 SQL。\n\n## 9-19. 在单表中使用 SSIS 进行数据规范化\n\
  ### 问题\n你需要作为 SSIS 数据流的一部分，将来自多列的源数据“逆透视”为规范化的记录。\n\n### 解决方案\n使用 SSIS 的逆透视数据流转换在数据流中创建所需的额外记录。\n\
  \n为避免重复说明如何在 SSIS 中连接源数据库，此处假定你已有一个现有的 SSIS 包，并将从`CarSales_Staging.dbo.ClientList`表导入数据。在此前提下，接下来展示操作步骤。\n\
  1.  在数据流窗格中，从工具箱添加一个逆透视数据流转换，并连接到数据源（或在复杂包中连接到数据流）。\n2.  双击进行编辑。\n3.  为所有要逆透视的列勾选左侧的复选框。\n\
  4.  为所有不希望逆透视的列勾选右侧的复选框。\n5.  在对话框下部，为将保存逆透视数据的新列输入目标列名。对每个将被逆透视的输入列都进行此操作。\n6.\
  \  在对话框底部，输入“透视键值列名”。本例中为`NameType`。这将是第二个新列，其中将包含你在非规范化数据源中看到的源数据列的标题。对话框应类似于图\
  \ 9-15。\n\n![`9781430247913_Fig09-15.jpg`](img/9781430247913_Fig09-15.jpg)\n\n图\
  \ 9-15。 在 SSIS 中对数据进行逆透视\n\n7.  单击“确定”确认修改。然后你可以添加数据流目标或进一步的数据转换操作。\n\n### 工作原理\n\
  SSIS 逆透视任务的功能正如其名——对来自源表的数据进行逆透视。首先，你必须指定任何不参与透视的字段，这些字段被设置为直通字段。本例中只有一个，即 ID 字段。然后，你必须选择所有将被透视的列，并最好为它们指定相同的目标列名（此处是联系人字段）。最后，你需要向\
  \ SSIS 指示包含用作数据的值的列标题（本例中是`NameType`）。\n\n#### 提示、技巧与陷阱\n- 若要确认规范化操作已成功，可以在逆透视转换后添加一个数据网格查看器。它可能类似于图\
  \ 9-16。\n\n![`9781430247913_Fig09-16.jpg`](img/9781430247913_Fig09-16.jpg)\n\n图\
  \ 9-16。 在 SSIS 中使用数据查看器检查逆透视后的数据\n- 如果不会在下游数据流或数据加载过程中使用目标列名，则它不是强制要求的。\n\n## 9-20.\
  \ 使用 T-SQL 将数据规范化到多个关系表中\n### 问题\n你有一个非规范化的单一数据源，需要将其规范化为一个关联的表集，作为数据转换的一部分。\n\n\
  ### 解决方案\n使用 T-SQL 来规范化数据。假设你有一个非规范化的数据源（单表），需要将其转换为三个表的关系层次结构：\n- `Clients`：顶级表。\n\
  - `Invoice`：表层次中的第二级，其外键`ClientID`映射到客户端级别。\n- `Invoice_Lines`：表层次中的第三级也是最后一级，其外键`InvoiceID`映射到`Invoice`级别。\n\
  \n你的数据将来自一个源表（`CarSales_Staging.dbo.DenormalisedSales`），顺便说一句，它非常适合进行规范化。你需要运行以下\
  \ T-SQL（位于`C:\\SQL2012DIRecipes\\CH09\\NormaliseData.sql`）：\n```sql\n-- Add Clients\n\
  INSERT INTO         dbo.Client (ClientName, Country, Town)\nSELECT DISTINCT    \
  \ ClientName, Country, Town\nFROM                CarSales_Staging.dbo.DenormalisedSales\
  \ DNS\nWHERE NOT EXISTS    (\n                        SELECT   ID\n            \
  \            FROM     dbo.Client\n                        WHERE    ClientName =\
  \ DNS.ClientName\n                        AND      Country = DNS.Country\n     \
  \                   AND      Town = DNS.Town\n                     );\n\n-- Add\
  \ Order Header\nINSERT INTO         dbo.Invoice (InvoiceNumber, TotalDiscount, DeliveryCharge,\
  \ ClientID)\nSELECT DISTINCT     DS.InvoiceNumber, DS.TotalDiscount, DS.DeliveryCharge,\
  \ CL.ID\nFROM                dbo.DenormalisedSales DS\n                    INNER\
  \ JOIN dbo.Client CL\n                    ON   CL.ClientName = DS.ClientName\n \
  \                   AND  CL.Country = DS.Country\n                    AND  CL.Town\
  \ = DS.Town;\n\n-- Add order detail\nINSERT INTO         dbo.Invoice_Lines (SalePrice,\
  \ StockID, InvoiceID)\nSELECT DISTINCT     DS.SalePrice, DS.StockID, IV.ID\nFROM\
  \                CarSales_Staging.dbo.DenormalisedSales DS\n                   \
  \ INNER JOIN dbo.Invoice IV\n                    ON  IV.InvoiceNumber = DS.InvoiceNumber;\n\
  ```\n\n### 工作原理\n经常会收到单一的非规范化源数据（无论是平面文件还是关系表），需要将其“分解”为多个表的关系结构——即进行规范化。此脚本的作用是解析表层次结构中的每一级。从最高（客户端）级别开始，将客户端数据提取到第一个表中。然后将发票数据分离到`Invoice`表中，最后推导出订单明细数据。需要记住的关键点是这是一种“自顶向下”的方法。这意味着你必须从关系层次中的最高表开始，一直处理到最低的表。每个“较低”的表都包含一个外键，其中存储了关系层次中“上方”表的主键。具体如何在你的数据上下文中工作可能会有很大差异，但这里提供了一个你可以采用并适应具体情况的整体方法。\n\
  \n在本配方中，我特意假设了最小的复杂度——特别是假设源数据中的自然 ID 需要映射到目标数据表中的代理 ID。如果不是这种情况，那么你可以直接在存在的地方使用代理\
  \ ID 作为主键和外键。在此示例中，如果保留`InvoiceNumber`而不是`InvoiceID`作为`Invoice`和`Invoice_Lines`表之间的主键/外键关系，那么就不需要在`OrderDetail`阶段查找`InvoiceID`。需要记住的一点是，你并不总是面对非规范化的源数据，而是可能需要先将数据非规范化，以便使用不同的关系结构重新规范化。还要记住，这种方法可以跨数据库（三部分引用）、跨链接服务器（四部分引用）以及使用`OPENROWSET`或`OPENDATASOURCE`工作。此示例展示了如何使用`WHERE\
  \ NOT EXISTS`避免创建重复的客户端记录。如果你确定源数据中不可能存在重复项，则可以省略此语句，因为它会拖慢处理速度。也可以为规范化过程的所有子级别添加和修改此语句。\n\
  \n#### 提示、技巧与陷阱\n- 对于大表，你不仅需要在目标表的外键列上建立有效的索引，还可能需要针对用于查找外键的列，精心选择非聚集覆盖索引。这里，`INCLUDE`语句必须包含外键（`InvoiceID`和`ClientID`）。\n\
  - 如果数据源是一个表，考虑到它将在多个查询中重复使用，为其建立索引几乎总是值得的。具体的索引结构将取决于数据以及每个规范化表之间的记录比例。\n\n\n"
- "# 在数据识别最高级别元素上创建聚集索引的通用规则\n\n然而，一个经验法则是：在标识数据最高级别（本例中是`Clients`）的元素上创建聚集索引，然后在隔离每个子级别（并映射到相关表）的元素上创建覆盖非聚集索引。本例中是`InvoiceNumber`和`InvoiceID`。\n\
  \n*   如果你将进行数据的插入和更新，那么更安全且更好的做法可能是：首先执行初始规范化到临时表，将这些表与目标表进行交叉引用以查找目标表中的 ID，最后执行任何更新或插入操作。为了加快速度，你可以使用临时表作为中间表，并在必要时为其创建索引。\n\
  *   你可以使用`MERGE`（但在`SQL Server 2005`中不可用）而不是`INSERT INTO`，这样你不仅可以插入新记录，还可以更新旧记录。在大多数情况下，这需要在`ON`子句中包含一个自然\
  \ ID（或不会被更新的列）。关于`MERGE`的更完整示例，请参见配方 9-24。\n\n## 9-21. 使用 SSIS 将数据规范化到多个关系表中\n\n\
  ### 问题\n\n你有一个单一的、非规范化的数据源，需要使用`SSIS`作为数据流的一部分将其规范化。\n\n### 解决方案\n\n使用`SSIS Lookup`转换来规范化数据。以下步骤使用与配方\
  \ 9-20 相同的源表和目标表来说明具体操作。\n\n1.  创建一个新包，并添加两个`OLEDB`连接管理器（`CarSales_OLEDB`和`CarSales_Staging_OLEDB`），分别配置为访问`CarSales`和`CarSales_Staging`数据库。\n\
  2.  删除`CarSales`数据库中`Clients`、`Invoice`和`Invoice_Lines`表中的所有数据。\n3.  添加一个数据流任务，将其命名为`Clients`，然后双击进行编辑。\n\
  4.  添加一个`OLEDB`源任务，并按如下配置：\n    | 配置项 | 值 |\n    | :--- | :--- |\n    | Name | Denormalized\
  \ Source |\n    | OLEDB Connection Manager | CarSales_Staging_OLEDB |\n    | Data\
  \ Access Mode | SQL Command |\n    | SQL Command Text | `SELECT ClientName, Country,\
  \ Town FROM dbo.DenormalisedSales GROUP BY ClientName, Country, Town ORDER BY ClientName,\
  \ Country, Town;` |\n5.  单击“确定”确认修改。\n6.  右键单击`OLEDB`源任务，选择“显示高级编辑器”。选择“输入和输出属性”选项卡。将`OLEDB\
  \ Source Output`的`IsSorted`属性设置为`True`。展开`OLEDB Source Output/Output columns`。为构成唯一键的列（`ClientName`、`Country`、`Town`）将`SortKeyPosition`分别设置为`1`、`2`和`3`。单击“确定”确认更改。\n\
  7.  在数据流窗格上添加一个`Lookup`转换，并将`OLEDB`源任务连接到它。按如下配置：\n    | 配置项 | 值 |\n    | :--- |\
  \ :--- |\n    | **General** | |\n    | Cache Mode | Full Cache |\n    | Connection\
  \ Type | OLEDB Connection |\n    | Rows with no matching entries | Redirect to NoMatch\
  \ output |\n    | **Connection** | |\n    | Connection Manager | CarSales_OLEDB\
  \ |\n    | Use the results of an SQL query | `SELECT ClientName, Country, Town,\
  \ ID FROM dbo.Client ORDER BY ClientName, Country, Town;` |\n    | Columns | Map\
  \ the columns ClientName, Country, Town |\n    | Available Lookup Columns | ID |\n\
  8.  单击“确定”确认更改。\n9.  向数据流窗格添加一个`OLEDB`目标任务。使用`NoMatch`输出将`Lookup`任务连接到它。双击进行编辑，并按如下配置：\n\
  \    | 配置项 | 值 |\n    | :--- | :--- |\n    | OLEDB Connection Manager | CarSales_OLEDB\
  \ |\n    | Data Access Mode | Table or view – Fast Load |\n    | Name of Table or\
  \ View | dbo.Client |\n10. 单击“确定”确认更改。\n11. 返回到控制流窗格，添加第二个数据流任务。将其命名为`Invoice`，然后双击进行编辑。\n\
  12. 重复步骤 3 至 6，但进行以下修改：\n    | 任务与配置项 | 值 |\n    | :--- | :--- |\n    | **OLEDB\
  \ source task (step 3)** | |\n    | SQL Command Text | `SELECT InvoiceNumber, TotalDiscount,\
  \ DeliveryCharge, ClientName, Country, Town FROM dbo.DenormalisedSales GROUP BY\
  \ InvoiceNumber, TotalDiscount, DeliveryCharge, ClientName, Country, Town ORDER\
  \ BY ClientName, Country, Town;` |\n    | **Lookup task (step 6)** | |\n    | Rows\
  \ with no matching entries | Fail Component |\n    | Connection | Use the results\
  \ of an SQL query: `SELECT ClientName, Country, Town, ID FROM dbo.Client ORDER BY\
  \ ClientName, Country, Town;` |\n    | Columns | Map the columns `ClientName, Country,\
  \ Town` |\n    | Available Lookup Columns | ID – output alias `ClientID` |\n   \
  \ | **OLEDB destination task (step 8)** | |\n    | Name of Table or View | `dbo.Invoice`\
  \ |\n13. 返回到控制流窗格，添加第三个数据流任务。将其命名为`Invoice_Lines`，然后双击进行编辑。\n14. 重复步骤 3 至 6，但进行以下修改：\n\
  \    | 任务与配置项 | 值 |\n    | :--- | :--- |\n    | **OLEDB source task (step 3)** |\
  \ |\n    | SQL Command Text | `SELECT InvoiceNumber, SalePrice, StockID FROM dbo.DenormalisedSales\
  \ ORDER BY InvoiceNumber;` |\n    | **Lookup task (step 6)** | |\n    | Rows with\
  \ no matching entries | Fail Component |\n    | Connection | Use the results of\
  \ an SQL query: `SELECT ID, InvoiceNumber FROM dbo.Invoice ORDER BY InvoiceNumber;`\
  \ |\n    | Columns | Map the columns `InvoiceNumber` |\n    | Available Lookup Columns\
  \ | ID – output alias `InvoiceID` |\n    | **OLEDB destination task (step 8)** |\
  \ |\n    | Name of Table or View | `dbo.Invoice_Lines` |\n\n最终的包应如图 9-17 所示。\n\n\
  ![9781430247913_Fig09-17.jpg](img/9781430247913_Fig09-17.jpg)\n\n图 9-17. 一个 SSIS\
  \ 数据规范化包\n\n### 工作原理\n\n`SSIS`本质上可以执行与`T-SQL`相同的序列来规范化非规范化的数据源。这也意味着从最高级别的实体（本例中是客户）开始，逐级处理相关实体（此处通过`Invoice`到`Invoice_Lines`）。规范化总是意味着理解你将如何将源数据分解为关系结构，以及如何在表之间映射关系。使用`SSIS`时，在开始创建包之前，清楚地理解这一点极其重要，因为它决定了你将如何使用`Lookup`转换来查找每个表的外键。\n\
  \n在最高级别（`Client`表），我们通过使用`Lookup`转换读取现有客户端数据，并使用`Lookup`的`NoMatch`输出仅添加尚不存在的客户端，来检测现有客户端。如果你只是在添加新数据，那么这一步是不必要的。\n\
  \n如前面描述的`T-SQL`解决方案一样，此过程从关系层次结构中的最高级别表（`Clients`）开始，逐级向下处理`Invoices`到`Invoice_Lines`。首先，提取客户端数据。这是通过使用`GROUP\
  \ BY`子句选择唯一的客户端数据来完成的（步骤 3）。任何***新***客户端都会被添加到目标表（`Clients`）中。通过使用`Lookup`转换来检测新记录，其中只有未在目标表中找到的记录才被允许进入目标表。第二个数据流任务隔离任何`Invoice`数据，并使用`Lookup`任务来推断`ClientID`。这将是关系模式中的外键。最后，对`Invoice_Lines`应用类似的过程，只是这里使用`Lookup`任务查找的是`InvoiceID`。\n\
  \n#### 提示、技巧与陷阱\n\n*   在检测现有客户端和为发票查找客户端 ID 时，你不能重用客户端 ID 的查找缓存，因为一旦添加了新客户端，数据就会发生变化，这会使缓存过时。\n\
  \n## 9-22. 在 T-SQL 中通过引用查找表实现数据反规范化\n\n### 问题\n\n你希望在将已经加载到`SQL Server`中的表中的数据反规范化时，确保正确使用引用（或查找）表。\n\
  \n\n### 解决方案\n\n谨慎使用基本的 `JOIN` 操作，确保在数据源中正确使用查找表。\n\n这里以方案 9-21 为例。如果你查看第 3 步，并假定必须使用“国家”字段从\
  \ Countries 表中获取该国的 ID，那么可以使用以下 T-SQL 代码片段来替换仅查找客户信息的“简单”`SELECT` 语句 (`C:\\SQL2012DIRecipes\\\
  CH09\\LookupNormalisation.sql`)：\n\n```sql\nSELECT DISTINCT\n    DNS.ClientName,\n\
  \    DNS.Country,\n    DNS.Town,\n    C.ID AS CountryID\nFROM\n    CarSales_Staging.dbo.DenormalisedSales\
  \ DNS\n    INNER JOIN CarSales_Staging.dbo.Countries C\n    ON DNS.Country = C.CountryCode\n\
  WHERE NOT EXISTS (\n    SELECT ID\n    FROM dbo.Client\n    WHERE ClientName = DNS.ClientName\n\
  \    AND Country = DNS.Country\n    AND Town = DNS.Town\n);\n```\n\n### 工作原理\n\n\
  使用这段 T-SQL 而非方案 9-21 中的原始代码，将导入相关的国家名称而非其 ID。考虑到数据架构不需要如此精细的规范化级别，这是一个相当“经典”的需求，以避免过度规范化以及过度使用查找表。\n\
  \n#### 提示、技巧与陷阱\n\n*   如果你需要允许 `NULL` 值，请使用 `LEFT OUTER JOIN` 代替 `INNER JOIN`。\n\
  *   当然，你可以在单个 T-SQL 语句中执行多次查找。但请注意，过多的查找会减慢处理速度。\n\n## 9-23. 在 SSIS 中通过引用查找表对数据进行反规范化\n\
  \n### 问题\n\n你希望在使用 SSIS 的 ETL 过程中确保正确引用查找表，以避免数据过度规范化。\n\n### 解决方案\n\n在数据流中使用“查找”组件，并充分映射数据，以便使用查找数据替代源中的引用代码。以下是一个示例。\n\
  \n1.  创建一个新的 SSIS 包。\n2.  添加两个新的 OLEDB 连接管理器。一个命名为 `CarSales_OLEDB`，配置为连接到 CarSales\
  \ 数据库；另一个命名为 `CarSales_Staging_OLEDB`，配置为连接到 CarSales_Staging 数据库。\n3.  添加一个新的平面文件连接管理器，配置为连接到\
  \ `C:\\SQL2012DIRecipes\\CH09\\ClientList.Csv` 文件。将其命名为 `ClientList`。在“高级”选项卡中，为三列设置数据类型如下：\n\
  \    | ID: | 四字节有符号整数 |\n    | ClientName: | 字符串 [DT_STR] – 长度 50 |\n    | ClientCountry:\
  \ | 单字节无符号整数 |\n4.  创建以下目标表（在 CarSales_Staging 数据库中）：\n    ```sql\n    CREATE TABLE\
  \ dbo.ClientWithCountry\n    (\n        ID numeric(20, 0) NULL,\n        ClientName\
  \ VARCHAR(50) NULL,\n        CountryName_EN NVARCHAR(50) NULL\n    );\n    GO\n\
  \    ```\n5.  添加一个“数据流任务”，并切换到“数据流”选项卡。\n6.  添加一个“平面文件源”组件，将其重命名为 `ClientList`。双击进行编辑。\n\
  7.  配置它指向平面文件连接管理器 `ClientList`。单击“确定”关闭“平面文件源编辑器”。\n8.  添加一个“排序”任务，并将“平面文件源”组件连接到它。将其命名为\
  \ `Sort Clients`。双击进行编辑。在“可用输入列”中，勾选 ID 以按 ID 排序。单击“确定”关闭“排序转换编辑器”。\n9.  添加一个“查找”任务，并将\
  \ `Sort Clients` 任务连接到它。将其命名为 `Lookup Country Name`。双击进行编辑。\n10. 在“常规”选项卡中，设置以下选项：\n\
  \    | 缓存模式: | 完全缓存 |\n    | 连接类型: | OLEDB 连接管理器 |\n    | 指定如何处理没有匹配项的行: | 将行重定向到无匹配输出\
  \ |\n11. 在“连接”选项卡中，设置以下选项：\n    | OLEDB 连接管理器: | `CarSales_OLEDB` |\n    | 使用 SQL\
  \ 查询的结果: | `SELECT CountryID, CountryName_EN FROM Countries ORDER BY CountryID`\
  \ |\n12. 在“列”选项卡中，将 `ClientCountry` 从“可用输入列”拖拽链接到“可用查找列”中的 `CountryID`，如 图 9-18\
  \ 所示。\n    ![9781430247913_Fig09-18.jpg](img/9781430247913_Fig09-18.jpg)\n    图\
  \ 9-18. “查找转换编辑器”中的查找列\n13. 单击“确定”确认修改。\n14. 添加一个“派生列”任务，并将“查找”任务连接到它。出现提示时，选择“查找无匹配输出”。双击编辑“派生列”任务。\n\
  15. 在“派生列转换编辑器”对话框下半部分的网格中，添加一个名为 `CountryName_EN` 的派生列。将其表达式设置为 `N/A`（带双引号）。单击“确定”确认修改。\n\
  16. 在“数据流”选项卡中添加一个“合并”任务。将 `Lookup Country Name` 任务连接到它。出现提示时，确保“输入”是“合并输入 1”，并且“输出”是“查找匹配输出”。单击“确定”确认。\n\
  17. 将“派生列”转换连接到“合并”任务。\n18. 添加一个“OLEDB 目标”任务。将其命名为 `Client With Country`。双击进行编辑并配置如下：\n\
  \    | OLEDB 连接管理器: | CarSales_Staging |\n    | 数据访问模式: | 表或视图 – 快速加载 |\n    | 表或视图的名称:\
  \ | dbo.ClientWithCountry |\n19. 单击左侧的“映射”，确保每个源字段都映射到同名的目标字段。注意 `ClientCountry`（源国家\
  \ ID 字段）未被映射。\n20. 单击“确定”完成修改。数据流应如 图 9-19 所示。\n    ![9781430247913_Fig09-19.jpg](img/9781430247913_Fig09-19.jpg)\n\
  \    图 9-19. 使用查找任务对数据进行反规范化时完成的数据流\n\n你现在可以运行该包，导入并反规范化数据。\n\n### 工作原理\n\n此过程使用一个引用列（源文件中的\
  \ `ClientCountry`），并用它在引用表 (`CarSales.Dbo.Countries`) 中查找相应的国家。由于此方法会排除任何没有对应引用元素的源记录，因此也使用了“无匹配输出”，并将其与“匹配输出”合并，以确保所有记录都发送到目标。实际上，此过程用国家名称替代了国家的\
  \ ID。\n\n#### 提示、技巧与陷阱\n\n*   将 SQL Server 中的 `TINYINT` 数据类型映射到 SSIS 时，必须将 SSIS\
  \ 数据类型设置为单字节无符号整数。\n\n## 9-24. 使用 T-SQL 处理类型 1 缓慢变化维度\n\n### 问题\n\n你需要确保处理过程中的所有源数据都在目标表中更新，并添加任何新记录。\n\
  \n### 解决方案\n\n使用 T-SQL `MERGE` 命令来同时添加新记录和更新现有记录。以下步骤描述了如何操作。\n\n1.  假设你有一个包含所需所有值、业务键（来自源数据的客户\
  \ ID）以及将用于数据仓库的代理键的目标表。该表的 DDL 如下 (`C:\\SQL2012DIRecipes\\CH09\\tblClient_SCD1.sql`)：\n\
  \    ```sql\n    CREATE TABLE CarSales_Staging.dbo.Client_SCD1\n    (\n        ClientID\
  \ INT IDENTITY(1,1) NOT NULL,\n        BusinessKey INT NOT NULL,\n        ClientName\
  \ VARCHAR(150) NULL,\n        Country VARCHAR(50) NULL,\n        Town VARCHAR(50)\
  \ NULL,\n        County VARCHAR(50) NULL,\n        Address1 VARCHAR(50) NULL,\n\
  \        Address2 VARCHAR(50) NULL,\n        ClientType VARCHAR(20) NULL,\n    \
  \    ClientSize VARCHAR(10) NULL\n    ) ;\n    GO\n    ```\n\n\n"
- "# 使用 T-SQL 处理缓慢变化维度\n\n## 1. 处理类型 1 缓慢变化维度\n\n运行以下 T-SQL 代码片段（来自 `CarSales_Staging`\
  \ 数据库，文件路径：`C:\\SQL2012DIRecipes\\CH09\\SCD1.sql`）：\n\n```sql\nUSE CarSales_Staging;\n\
  GO\n\nMERGE CarSales_Staging.dbo.Client_SCD1 AS DST\nUSING CarSales.dbo.Client AS\
  \ SRC\nON (SRC.ID = DST.BusinessKey)\nWHEN NOT MATCHED THEN\n    INSERT (BusinessKey,\
  \ ClientName, Country, Town, County, Address1, Address2, ClientType, ClientSize)\n\
  \    VALUES (SRC.ID, SRC.ClientName, SRC.Country, SRC.Town, SRC.County, SRC.Address1,\
  \ SRC.Address2, SRC.ClientType, SRC.ClientSize)\nWHEN MATCHED\nAND (\n    ISNULL(DST.ClientName,'')\
  \ <> ISNULL(SRC.ClientName,'')\n    OR ISNULL(DST.Country,'') <> ISNULL(SRC.Country,'')\n\
  \    OR ISNULL(DST.Town,'') <> ISNULL(SRC.Town,'')\n    OR ISNULL(DST.Address1,'')\
  \ <> ISNULL(SRC.Address1,'')\n    OR ISNULL(DST.Address2,'') <> ISNULL(SRC.Address2,'')\n\
  \    OR ISNULL(DST.ClientType,'') <> ISNULL(SRC.ClientType,'')\n    OR ISNULL(DST.ClientSize,'')\
  \ <> ISNULL(SRC.ClientSize,'')\n)\nTHEN UPDATE\nSET\n    DST.ClientName = SRC.ClientName\n\
  \    ,DST.Country = SRC.Country\n    ,DST.Town = SRC.Town\n    ,DST.Address1 = SRC.Address1\n\
  \    ,DST.Address2 = SRC.Address2\n    ,DST.ClientType = SRC.ClientType\n    ,DST.ClientSize\
  \ = SRC.ClientSize\n;\n```\n\n### 工作原理\n\n自从 SQL Server 2008 引入 `MERGE` 命令后，就可以使用单个命令执行\
  \ `UPSERT` 操作——即插入、删除和更新。同样值得注意的是，处理缓慢变化维度的更新插入技术并不仅限于数据仓库领域。类型 1 SCD（缓慢变化维度）本质上就是一个\
  \ `UPSERT`，因此在无限多的场景中都很有用。\n\n在所有 SCD 类型中，类型 1 缓慢变化维度是最容易处理的，因为它只是对现有数据进行简单的就地更新，不尝试跟踪变化的历史。\n\
  \n使用的 SQL 代码片段将基于业务键映射两个表。它还会执行以下操作：\n\n*   如果业务键不存在于目标表中（`WHEN NOT MATCHED`），则向目标表插入一条新记录，并添加一个自增代理键。\n\
  *   如果源表和目标表之间的任何字段不同（`WHEN MATCHED AND...`），则更新其他字段。\n\n这里，我以 `CarSales` 数据库中的\
  \ `dbo.Client` 表作为源数据，并在 `CarSales_Staging.dbo.Client` 表中更新经过适当转换的数据。此示例假设业务键是唯一的主键。我们假设不会使用\
  \ `WHEN NOT MATCHED` 来删除维度数据，而只关注 `UPSERT` 数据——即插入和更新维度数据。\n\n#### 提示、技巧与陷阱\n\n\
  *   确保所有在 `WHEN MATCHED ... AND` 子句中用于比较数据的列，也出现在 `THEN UPDATE SET` 子句中。\n*   在此示例中，我对位于同一服务器上的数据库执行更新插入。此技术可应用于同一数据库内的表或跨链接服务器。\n\
  \n## 2. 处理类型 2 缓慢变化维度\n\n### 问题\n\n当源数据在目标表中添加、插入和更新时，你需要随时间跟踪这些变化。\n\n### 解决方案\n\
  \n使用 T-SQL 的 `MERGE` 命令执行作为类型 2 缓慢变化维度的 `UPSERT` 操作，从而随时间跟踪变化，如下所示。\n\n1.  使用以下\
  \ DDL 创建一个表来保存类型 2 SCD 数据（文件路径：`C:\\SQL2012DIRecipes\\CH09\\tblClient_SCD2.sql`）：\n\
  \n    ```sql\n    CREATE TABLE CarSales_Staging.dbo.Client_SCD2\n    (\n     ClientID\
  \ INT IDENTITY(1,1) NOT NULL,\n     BusinessKey INT NOT NULL,\n     ClientName VARCHAR(150)\
  \ NULL,\n     Country VARCHAR(50) NULL,\n     Town VARCHAR(50) NULL,\n     County\
  \ VARCHAR(50) NULL,\n     Address1 VARCHAR(50) NULL,\n     Address2 VARCHAR(50)\
  \ NULL,\n     ClientType VARCHAR(20) NULL,\n     ClientSize VARCHAR(10) NULL,\n\
  \     ValidFrom INT NULL,\n     ValidTo INT NULL,\n     IsCurrent BIT NULL\n   \
  \ ) ;\n    GO\n    ```\n\n2.  运行以下代码以执行类型 2 SCD 更新插入（文件路径：`C:\\SQL2012DIRecipes\\\
  CH09\\SCD2.sql`）：\n\n    ```sql\n    USE CarSales_Staging;\n    GO\n\n    -- 定义有效性使用的日期\
  \ - 假设为完整的 24 小时周期\n    DECLARE @Yesterday INT = CAST(CAST(YEAR(DATEADD(dd,-1,GETDATE()))\
  \ AS CHAR(4)) + RIGHT('0' + CAST(MONTH(DATEADD(dd,-1,GETDATE()))\n    AS VARCHAR(2)),2)\
  \ + RIGHT('0' + CAST(DAY(DATEADD(dd,-1,GETDATE())) AS VARCHAR(2)),2) AS INT)\n \
  \   DECLARE @Today INT = CAST(CAST(YEAR(GETDATE()) AS CHAR(4)) + RIGHT('0' + CAST(MONTH(GETDATE())\n\
  \    AS VARCHAR(2)),2) + RIGHT('0' + CAST(DAY(GETDATE()) AS VARCHAR(2)),2) AS INT);\n\
  \n    -- 用于对现有维度记录进行最新更新的插入语句\n    INSERT INTO dbo.Client_SCD2 (BusinessKey, ClientName,\
  \ Country, Town, Address1, Address2, ClientType, ClientSize, ValidFrom, IsCurrent)\n\
  \    SELECT ID, ClientName, Country, Town, Address1, Address2, ClientType, ClientSize,\
  \ @Today, 1\n    FROM\n    (\n    -- 合并语句\n    MERGE CarSales_Staging.dbo.Client_SCD2\
  \ AS DST\n    USING CarSales.dbo.Client AS SRC\n    ON (SRC.ID = DST.BusinessKey)\n\
  \    WHEN NOT MATCHED THEN\n        INSERT (BusinessKey, ClientName, Country, Town,\
  \ County, Address1, Address2, ClientType, ClientSize, ValidFrom, IsCurrent)\n  \
  \      VALUES (SRC.ID, SRC.ClientName, SRC.Country, SRC.Town, SRC.County, SRC.Address1,\
  \ SRC.Address2, SRC.ClientType, SRC.ClientSize, @Today, 1)\n    WHEN MATCHED\n \
  \   AND (\n        ISNULL(DST.ClientName,'') <> ISNULL(SRC.ClientName,'')\n    \
  \    OR ISNULL(DST.Country,'') <> ISNULL(SRC.Country,'')\n        OR ISNULL(DST.Town,'')\
  \ <> ISNULL(SRC.Town,'')\n        OR ISNULL(DST.Address1,'') <> ISNULL(SRC.Address1,'')\n\
  \        OR ISNULL(DST.Address2,'') <> ISNULL(SRC.Address2,'')\n        OR ISNULL(DST.ClientType,'')\
  \ <> ISNULL(SRC.ClientType,'')\n        OR ISNULL(DST.ClientSize,'') <> ISNULL(SRC.ClientSize,'')\n\
  \    )\n    -- 用于已更改维度记录的更新语句，标记为不再活跃\n    THEN UPDATE\n    SET DST.IsCurrent =\
  \ 0, DST.ValidTo = @Yesterday\n    OUTPUT SRC.ID, SRC.ClientName, SRC.Country, SRC.Town,\
  \ SRC.Address1, SRC.Address2, SRC.ClientType, SRC.ClientSize, $Action AS MergeAction\n\
  \    ) AS MRG\n    WHERE MRG.MergeAction = 'UPDATE'\n    ;\n    ```\n\n目标表将添加新记录，并将更改的记录添加并标记为最新版本。\n\
  \n### 工作原理\n\n这里我们研究一种技术，当需要在 SQL Server 表中更新数据并维护更改历史记录时，该技术非常强大。由于我们处理的是 SCD（缓慢变化维度），我将假设不会使用\
  \ `WHEN NOT MATCHED` 来删除维度数据，而只关注 `UPSERT` 数据——即插入和更新维度数据。类型 2 SCD 是一种使用表中的历史记录进行变更跟踪的技术，同时指示有效日期范围和当前数据。这在数据仓库环境之外也有很多用途。\n\
  \n为了说明这一点，我以 `CarSales` 数据库中的 `dbo.Client` 表作为源数据，并将这些数据经过适当转换后导出到 `CarSales_Staging`\
  \ 数据库。此示例假设业务键是唯一的主键。\n\n处理类型 2 SCD 仅比类型 1 稍微复杂一些。\n\n\n\n\n"
- '# 此过程的功能


  此过程的功能是跟踪维度属性随时间的变化，方式是：

  *   每当维度属性（任何包含描述性数据的列中的值）发生变化时，添加一条新记录。

  *   记录变更发生的日期，从而确保每条新记录的起始日期，以及上一条记录失效的日期，都被保存下来。

  *   为每个业务键标记当前记录，这可以提高报表性能。


  此过程假设目标表包含所有必需的值：一个业务键（来自源数据的客户 ID）和一个将用于数据仓库的代理键。除了这些“核心”字段外，以下字段也是跟踪维度随时间演变所必需的：


  *   `ValidFrom`：记录此维度记录开始有效的日期。

  *   `ValidTo`：记录此维度记录曾经或当前有效的截止日期。

  *   `IsCurrent`：指示这是该维度元素的当前记录（最新数据）。


  前面的 SQL 代码片段基于业务键将两个表进行映射，并在目标表中不存在业务键所引用的记录时（`WHEN NOT MATCHED`），插入一条新记录，同时添加一个自增的代理键，并将今天日期设置为
  `ValidFrom` 日期。


  如果检测到源表和目标表之间存在任何差异（通过 `WHEN MATCHED AND`... 子句），则会触发几个事件。首先，更新一个自增的代理键，并将今天日期设置为
  `ValidFrom` 日期。结果是该记录被标记为当前记录。然后，将昨天日期设置为该业务键的上一条有效记录的 `ValidTo` 日期。


  所有这些可能看起来很复杂，但通过使用 `MERGE` 语句的 `OUTPUT` 子句，它变得极其简单。代码所做的是像之前一样对新记录和现有记录执行 `INSERT`
  和 `UPDATE` 操作，然后（通过 `OUTPUT` 子句传递）将 `UPDATED` 的记录作为单独的 `INSERT` 语句选择出来。这样，源数据的最新修改成为一条新记录——作为单独的
  `INSERT` 处理——并且任何所需的跟踪数据，如 `ValidFrom` 日期和 `IsCurrent` 标志，都在此阶段添加。


  #### 提示、技巧与陷阱


  *   `ValidFrom` 和 `ValidTo` 日期作为 `INT` 数据类型添加，而不是 `DATE` 或 `DATETIME`，这纯粹是考虑到未来加载到
  Analysis Services 的便利性。在那里，数据类型的选择不仅能使日期更易于操作，还可以提高处理时间。如果需要，可以随意使用任何日期数据类型。

  *   为了简单起见，我假设维度日期的有效性是 24 小时周期。如果你的需求更复杂，那么维度记录的有效范围可以是任何有效的日期范围。

  *   你可能不需要检查所有列的数据差异。如果某些列包含的数据不被视为基本属性，那么就不要在 `WHEN MATCHED ... AND` 子句中使用它。


  '
- "# 使用 SSIS 处理类型 2 缓慢变化维度\n\n## 问题\n\n你需要作为 SSIS 数据流过程的一部分，在将源数据添加到目标表时，跟踪其随时间的变化。\n\
  \n## 解决方案\n\n使用一个 SSIS 包，该包利用条件拆分和执行 SQL 任务，将此过程视为类型 2 SCD（缓慢变化维度）进行处理。以下步骤将指导你完成。\n\
  \n1.  在目标数据库 (`CarSales_Staging`) 中，为 `Client_SCDSSIS2` 类型 2 维度创建一个表。此表的 DDL 为 (`C:\\\
  SQL2012DIRecipes\\CH09\\tblClientSCDSSIS2.sql`)：\n\n    ```sql\n    USE CarSales_Staging;\n\
  \    GO\n\n    CREATE TABLE CarSales_Staging.dbo.Client_SCDSSIS2\n    (\n     SurrogateID\
  \ INT IDENTITY(1,1) NOT NULL,\n     BusinessKey INT NOT NULL,\n     ClientName VARCHAR(150)\
  \ NULL,\n     Country VARCHAR(50) NULL,\n     Town VARCHAR(50) NULL,\n     County\
  \ VARCHAR(50) NULL,\n     Address1 VARCHAR(50) NULL,\n     Address2 VARCHAR(50)\
  \ NULL,\n     ClientType VARCHAR(20) NULL,\n     ClientSize VARCHAR(10) NULL,\n\
  \     ValidFrom INT NULL,\n     ValidTo INT NULL,\n     IsCurrent BIT NULL\n   \
  \ );\n    GO\n    ```\n\n2.  创建一个临时表——在暂存数据库中创建和测试包期间存放在磁盘上——该表将用于更新维度表。此表的 DDL\
  \ 为：\n\n    ```sql\n    CREATE TABLE CarSales_Staging.dbo.Tmp_Client_SCDSSIS2\n\
  \    (\n     SurrogateID INT NOT NULL\n    );\n    GO\n    ```\n\n3.  创建一个新的 SSIS\
  \ 包，命名为 `SCD_Type2`。添加两个 OLEDB 连接管理器——一个命名为 `CarSales_OLEDB`，连接到 `CarSales` 数据库；另一个命名为\
  \ `CarSales_Staging_OLEDB`，连接到 `CarSales_Staging` 数据库。将后者的 `RetainSameConnection`\
  \ 属性设置为 True。\n4.  添加以下两个变量：\n\n    | **名称** | **作用域** | **数据类型** | **值** | **注释**\
  \ |\n    |---|---|---|---|---|\n    | `TempTable` | `SCD_Type2` | String | `Tmp_Client_SCD`\
  \ | 用于在数据库表和临时表之间切换。 |\n    | `ValidFrom` | `SCD_Type2` | Int32 |  | 自动获取当前日期。 |\n\
  \n5.  将 `ValidFrom` 变量的 `EvaluateAsExpression` 属性设置为 True。设置表达式（这将获取当前日期作为整数）：\n\
  \n    ```text\n    YEAR( GETDATE()) * 100000 + MONTH( GETDATE()) * 1000 + DAY( GETDATE())\n\
  \    ```\n\n6.  在“控制流”选项卡中，添加一个执行 SQL 任务，并按如下配置：\n\n    | **名称** | **Create Temp\
  \ Table for Session** |\n    |---|---|\n    | 连接： | `CarSales_Staging_OLEDB` |\n\
  \    | SQL 语句： | `CREATE TABLE ##Tmp_Client_SCDSSIS2 (SurrogateID INT NOT NULL)`\
  \ |\n\n7.  即使这个临时表要等到包调试并运行成功后才使用，现在创建它也是有益的。单击“确定”以确认更改。\n8.  添加一个数据流任务，并将其命名为\
  \ `Main SCD Type 2 Process`。将上一个执行 SQL 任务（Create Temp Table for Session）连接到它。双击以进行编辑。\n\
  9.  在数据流窗格中添加一个 OLEDB 源连接，将其命名为 `Source Data`，并按如下配置：\n\n    | OLEDB 连接管理器： | `CarSales_OLEDB`\
  \ |\n    |---|---|\n    | 数据访问模式： | SQL 命令 |\n    | SQL 命令文本： | `SELECT ID, ClientName,\
  \ Country, Town, County, Address1, Address2, ClientType, ClientSize FROM dbo.Client\
  \ ORDER BY ID` |\n\n10. 单击“确定”确认。\n11. 右键单击 `Source Data` OLEDB 源连接，选择“显示高级编辑器”。选择“输入和输出属性”选项卡，单击“OLEDB\
  \ 源输出”，并在对话框右侧将 `IsSorted` 属性设置为 True。\n12. 展开“OLEDB 源输出”并展开“输出列”。单击 `ID` 列，并将 `SortKeyPosition`\
  \ 属性设置为 1。\n13. 添加一个查找转换，并将刚刚创建的源连接到它。双击以进行编辑。在“常规”选项卡中，设置为使用 OLEDB 连接管理器，缓存模式为完全缓存，并将不匹配的行重定向到“NoMatch\
  \ 输出”。在“连接”窗格中，将 OLEDB 连接管理器设置为 `CarSales_Staging_OLEDB`，并使用以下 SQL 查询的结果：\n\n  \
  \  ```sql\n    SELECT     SurrogateID, BusinessKey, ClientName, Country, Town, County,\
  \ Address1,\n               Address2, ClientType, ClientSize, ValidFrom, ValidTo,\
  \ IsCurrent\n    FROM       dbo.Client_SCDSSIS2 WITH (NOLOCK)\n    ORDER BY   BusinessKey\n\
  \    ```\n\n14.\n\n\n"
- "# 在 SSIS 中实现缓慢变化维度\n\n## 操作步骤\n\n14. 在“列”窗格中，将 `ID` 列（可用输入列）映射到 `BusinessKey` 列（可用查找列）。然后，从可用查找列中选择除\
  \ `ValidFrom`、`ValidTo` 和 `IsCurrent` 之外的所有其他列。通过为所有查找列添加 `DIM_` 前缀来为其设置别名。对话框应类似于图\
  \ 9-20。\n    ![9781430247913_Fig09-20.jpg](img/9781430247913_Fig09-20.jpg)\n   \
  \ 图 9-20. SSIS 类型 2 SCD 的查找列\n15. 单击“确定”进行确认。\n16. 添加一个“条件性拆分”转换，并使用“查找匹配输出”将“查找”转换连接到它。双击进行编辑。创建一个名为\
  \ **DataDifference** 的输出，并设置如下条件：\n    ```\n    (ClientSize != DIM_ClientSize) ||\
  \ (ClientName != [ClientName])\n    ```\n17. 为**每个字段**输入比较条件后（此处仅显示一个），单击“确定”完成修改。\n\
  18. 添加一个“多播”转换，并使用 `DataDifference` 输出将“条件性拆分”转换连接到它。\n19. 添加一个“合并”转换，并将“查找”转换连接到它。确保选择“查找无匹配输出”并将其映射到“合并输入\
  \ 1”。然后将“多播”转换连接到“合并”转换。双击进行编辑。确保列已正确映射，如图 9-21 所示。\n    ![9781430247913_Fig09-21.jpg](img/9781430247913_Fig09-21.jpg)\n\
  \    图 9-21. SSIS 中的合并列映射\n20. 添加一个“派生列”转换，将“合并”转换连接到它，并添加两个派生列，如图 9-22 所示。\n  \
  \  ![9781430247913_Fig09-22.jpg](img/9781430247913_Fig09-22.jpg)\n    图 9-22. “派生列”转换\n\
  21. 单击“确定”确认。\n22. 添加一个 `OLEDB` 目标，并将“派生列”转换连接到它。按如下方式配置：\n    | OLEDB 连接管理器 | `CarSales_Staging_OLEDB`\
  \ |\n    | 数据访问模式 | 表或视图 – 快速加载 |\n    | 表或视图的名称 | `dbo.Client_SCDSSIS2` |\n23.\
  \ 确保列已映射——包括将源数据 `ID` 列映射到 SCD 类型 2 表的业务键——之后，单击“确定”确认。\n24. 添加一个 `OLEDB` 目标，并将“多播”转换连接到它。按如下方式配置：\n\
  \    | OLEDB 连接管理器 | `CarSales_Staging_OLEDB` |\n    | 数据访问模式 | 表名或视图名变量 |\n   \
  \ | 变量名称 | `User::TempTable` |\n25. 单击“映射”并确保源数据中的 `ID` 列已映射到目标表的 `SurrogateID`\
  \ 列。确认列映射无误后，单击“确定”。数据流已完成，如图 9-22 所示。\n26. 返回到“控制流”选项卡，添加一个“执行 SQL 任务”。将其命名为 **Update\
  \ SCD Type 2 table**。将之前的数据流任务连接到它，并按如下方式配置：\n    | 连接 | `CarSales_Staging_OLEDB`\
  \ |\n    | SQL 语句 | `UPDATE SCDSSIS2 SET SCDSSIS2.IsCurrent = 0, SCDSSIS2.ValidTo\
  \ = YEAR(DATEADD(d,-1,GETDATE())) * 100000 + MONTH(DATEADD(d,-1,GETDATE())) * 1000\
  \ + DAY(DATEADD(d,-1,GETDATE())) FROM dbo.Client_SCDSSIS2 SCDSSIS2 INNER JOIN Tmp_Client_SCDSSIS2\
  \ TMP ON SCDSSIS2.SurrogateID = TMP.SurrogateID WHERE SCDSSIS2.IsCurrent = 1` |\n\
  \n## 工作原理\n\n不幸的是，在 SSIS 中高效处理缓慢变化维度并不直观，也没有想象中那么简单。\n\n是的，自 SSIS 出现以来，就一直存在一个“缓慢变化维度”转换，但遗憾的是，它更像是一个学习工具，而非适合真实世界的组件。我甚至不建议在这里使用它。\n\
  \n因此，你剩下的是一个不太理想的解决方案：编写自己的 SSIS 包来处理缓慢变化维度。幸运的是，类型 1 SCD 不过是就地更新（或为新数据插入）。然而，当涉及到类型\
  \ 2 SCD 时，这个包就相当复杂了，以下是其功能概述：\n\n*   连接到当前维度表。\n*   连接到源数据表或视图。\n*   检测任何新的维度记录（通过映射两个数据集之间的业务键并检测无匹配的位置）并加载它们。\n\
  *   分析两个数据源中的所有现有记录，并比较属性字段。其中任何一项出现差异时，将发生两件事：\n    *   为维度数据的最新版本添加一条新记录（适当标记为有效）。\n\
  \    *   将之前有效的版本更新为有效性设置为 `false`，并设置其失效日期。\n\n为了使其工作，对现有记录的更新将使用会话范围的临时表来标识要更新的记录。通过这种方式，一组用于后续更新的记录\
  \ ID 可以作为核心数据流过程的一部分存储，并且在该“核心”过程完成后，可以运行更新命令。最初，这个临时表将持久化在磁盘上。一旦所有调试完成，它将被会话范围的临时表\
  \ `##Tmp_Client_SCDSSIS2` 替代。这种方法的主要优点是避免了在数据流中使用 `OLEDB` 命令转换，该转换会为每条记录触发——却应用于整个维度表，给服务器带来大量不必要的工作。\n\
  \n这意味着整体的高级流程如图 9-23 所示。\n![9781430247913_Fig09-23.jpg](img/9781430247913_Fig09-23.jpg)\n\
  图 9-23. SSIS SCD 类型 2 流程\n\n“核心”流程——即图 9-23 中的数据流任务——如图 9-24 所示。\n![9781430247913_Fig09-24.jpg](img/9781430247913_Fig09-24.jpg)\n\
  图 9-24. SSIS SCD 类型 2 流程详情\n\n一旦一切工作正常，可以删除临时表——并使用会话范围的表代替它。然而，在开发阶段使用它是至关重要的。\n\
  \n因此，一旦包运行并调试完成，你可以执行以下操作：\n\n1.  将 `TempTable` 的变量值更改为 `##Tmp_Client_SCDSSIS2`。\n\
  2.  修改任务“Update SCD Type 2 table”中的引用，以便使用的临时表是会话范围的临时表。代码需要调整为使用：\n    ```\n  \
  \  INNER JOIN ##Tmp_Client_SCDSSIS2 TMP\n    ```\n3.  在 `CarSales` 数据库中删除 `dbo.Tmp_Client_SCDSSIS2`\
  \ 表。\n\n现在，你的 SSIS 包将使用会话范围的临时表来更新目标表记录，并避免在数据库中保留一个额外的表。\n\n## 提示、技巧和陷阱\n\n*  \
  \ 在“查找”转换中为维度列设置别名的原因有：(a) 它使跟踪包中具有相同名称的列的使用变得容易得多，(b) 它防止 SSIS 应用两部分或三部分的点表示法名称，这些名称可能很快变得难以操作。\n\
  *   对两个源数据集（源和查找）进行排序并告知 SSIS 它们已排序非常重要。否则，你会从“合并”转换中得到一些非常奇怪的结果。\n*   务必实现 `NULL`\
  \ 处理，否则“条件性拆分”将失败。\n*   如果你处理的是大型维度，那么应将缓存文件放在尽可能快的磁盘阵列上——如果可能，甚至放在固态硬盘上。\n\n\n"
- "# 此处的任何速度提升都将对整个软件包产生显著影响。\n\n## 9-27. 使用 T-SQL 处理第三类缓慢变化维度\n\n### 问题\n你需要使用 T-SQL\
  \ 在目标表的一个非规范化单记录中跟踪一个或多个列的上一个版本。\n\n### 解决方案\n使用 T-SQL 中的 `MERGE` 命令来执行第三类缓慢变化维度操作。以下步骤说明了如何操作。\n\
  \n1.  使用以下 DDL 创建两张表 (`C:\\SQL2012DIRecipes\\CH09\\tblClient_SCD3.sql`):\n    ```sql\n\
  \    CREATE TABLE CarSales_Staging.dbo.Client_SCD3\n    (\n     ClientID INT IDENTITY(1,1)\
  \ NOT NULL,\n     BusinessKey INT NOT NULL,\n     ClientName VARCHAR(150) NULL,\n\
  \     Country VARCHAR(50) NULL,\n     Country_Prev1 VARCHAR(50) NULL,\n     Country_Prev1_ValidTo\
  \ INT NULL,\n     Country_Prev2 VARCHAR(50) NULL,\n     Country_Prev2_ValidTo INT\
  \ NULL,\n    ) ;\n    GO\n    ```\n\n2.  运行以下代码片段 (`C:\\SQL2012DIRecipes\\CH09\\\
  SCD3.sql`):\n    ```sql\n    USE CarSales_Staging;\n    GO\n\n    DECLARE @Yesterday\
  \ INT = CAST(CAST(YEAR(DATEADD(dd,-1,GETDATE())) AS CHAR(4)) + RIGHT('0' + CAST(MONTH(DATEADD(dd,-1,GETDATE()))\
  \ AS VARCHAR(2)),2) + RIGHT('0' + CAST(DAY(DATEADD(dd,-1,GETDATE())) AS VARCHAR(2)),2)\
  \ AS INT)\n\n    MERGE    CarSales_Staging.dbo.Client_SCD3        AS DST\n    USING\
  \    CarSales.dbo.Client                     AS SRC\n    ON       (SRC.ID = DST.BusinessKey)\n\
  \n    WHEN NOT MATCHED THEN\n        INSERT (BusinessKey, ClientName, Country)\n\
  \        VALUES (SRC.ID, SRC.ClientName, SRC.Country)\n\n    WHEN MATCHED\n    \
  \    AND    (DST.Country <> SRC.Country\n                OR DST.ClientName <> SRC.ClientName)\n\
  \n    THEN UPDATE\n\n    SET       DST.Country = SRC.Country\n            , DST.ClientName\
  \ = SRC.ClientName\n            , DST.Country_Prev1 = DST.Country\n            ,\
  \ DST.Country_Prev1_ValidTo = @Yesterday\n            , DST.Country_Prev2 = DST.Country_Prev1\n\
  \            , DST.Country_Prev2_ValidTo = DST.Country_Prev1_ValidTo\n    ;\n  \
  \  ```\n\n### 工作原理\n需要明确的是，第三类缓慢变化维度将非规范化应用于表，使用多个列集来提供版本控制。我发现将其理解为**非规范化数据**有助于理解第三类缓慢变化维度。这使你能够专注于理解这种方法的局限性和缺点。换句话说，只有在别无选择时才使用它！第三类缓慢变化维度是单个表，对于每个你希望跟踪其演变过程的数值，都有一组重复的列，以及数据演变发生的日期。这很不优雅，会导致表变得极其宽，并且在某些时候会涉及丢失历史数据，因为你不可能为所有时间都保留先前的列版本——因为\
  \ SQL Server 最终会耗尽列数。\n\n然而，为了完整起见，了解一下如何应用这项技术是值得的。我在此示例中只展示了如何跟踪一个属性列，并且只跟踪两个先前版本。但是，一旦确立了原则，将模型扩展以处理多个列和多个先前版本就非常容易了。\n\
  \n前面的 SQL 代码片段将根据业务键映射两个表，以及执行以下操作：\n*   如果不存在对应业务键的记录，则插入一条新记录。\n*   如果业务键已存在：\n\
  \    *   将 `Country` 的先前值移动到“前-2”列，并添加移动发生的日期。\n    *   将 `Country` 的值移动到“前-1”列，并添加移动发生的日期。\n\
  \    *   将最新的国家添加到 `Country` 列。\n\n再次强调——如在配方 9-25 和 9-26 中一样——我从一个数据库 (`CarSales`)\
  \ 获取源数据，并更新另一个数据库 (`CarSales_Staging`) 中的数据。\n\n源对象和目标对象可以在同一个数据库中，也可以在跨链接服务器的不同数据库中。\n\
  \n### 提示、技巧和陷阱\n*   再次说明，`ValidTo` 日期被添加为 `INT` 数据类型，而不是 `DATE` 或 `DATETIME`，纯粹是考虑到未来加载到\
  \ Analysis Services 的需要，在那里数据类型的选择不仅可以让日期更易于操作，还可以提高处理时间。如果需要，可以随意使用任何日期数据类型。\n\
  *   此示例不需要 `IsCurrent` 标志，因为根据定义，`Town` 列就是当前版本。\n*   你也可以作为此方法的一部分更新数据，正如我使用 `ClientName`\
  \ 字段所示。\n\n## 9-28. 使用 T-SQL 处理第四类缓慢变化维度\n\n### 问题\n作为 ETL 流程的一部分，你需要将当前数据存储在一个表中，将历史数据存储在第二个表中。\n\
  \n### 解决方案\n使用 `MERGE` 命令在 T-SQL 中执行第四类缓慢变化维度数据流。以下步骤说明了如何操作。\n\n1.  使用以下 DDL 创建两张表\
  \ (`C:\\SQL2012DIRecipes\\CH09\\tblClient_SCD4andHistory.Sql`):\n    ```sql\n  \
  \  CREATE TABLE CarSales_Staging.dbo.Client_SCD4_History\n    (\n     ClientID INT\
  \ IDENTITY(1,1) NOT NULL,\n     BusinessKey INT NOT NULL,\n     ClientName VARCHAR(150)\
  \ NULL,\n     Country VARCHAR(50) NULL,\n     Town VARCHAR(50) NULL,\n     County\
  \ VARCHAR(50) NULL,\n     Address1 VARCHAR(50) NULL,\n     Address2 VARCHAR(50)\
  \ NULL,\n     ClientType VARCHAR(20) NULL,\n     ClientSize VARCHAR(10) NULL,\n\
  \     ValidTo INT,\n     HistoricalVersion INT\n    ) ;\n    GO\n\n    CREATE TABLE\
  \ CarSales_Staging.dbo.Client_SCD4\n    (\n     ClientID INT IDENTITY(1,1) NOT NULL,\n\
  \     BusinessKey INT NOT NULL,\n     ClientName VARCHAR(150) NULL,\n     Country\
  \ VARCHAR(50) NULL,\n    ) ;\n    GO\n    ```\n\n2.  运行以下代码 (`C:\\SQL2012DIRecipes\\\
  CH09\\SCD4.sql`):\n    ```sql\n    USE CarSales_Staging;\n    GO\n\n    -- 定义有效性中使用的日期\
  \ - 假设为完整的 24 小时周期\n    DECLARE @Yesterday INT = CAST(CAST(YEAR(DATEADD(dd,-1,GETDATE()))\
  \ AS CHAR(4)) + RIGHT('0' + CAST(MONTH(DATEADD(dd,-1,GETDATE())) AS VARCHAR(2)),2)\
  \ + RIGHT('0' + CAST(DAY(DATEADD(dd,-1,GETDATE())) AS VARCHAR(2)),2) AS INT)\n \
  \   DECLARE @Today INT = CAST(CAST(YEAR(GETDATE()) AS CHAR(4)) + RIGHT('0' + CAST(MONTH(GETDATE())\
  \ AS VARCHAR(2)),2) + RIGHT('0' + CAST(DAY(GETDATE()) AS VARCHAR(2)),2) AS INT);\n\
  \n    -- 如果存在，则删除临时表\n    IF OBJECT_ID('Tempdb..#Tmp_Client') IS NOT NULL DROP TABLE\
  \ #Tmp_Client;\n\n    CREATE TABLE #Tmp_Client\n    (\n     BusinessKey INT NOT\
  \ NULL,\n     ClientName VARCHAR(150) NULL,\n     Country VARCHAR(50) NULL,\n  \
  \   Town VARCHAR(50) NULL,\n     County VARCHAR(50) NULL,\n     Address1 VARCHAR(50)\
  \ NULL,\n     Address2 VARCHAR(50) NULL,\n     ClientType VARCHAR(20) NULL,\n  \
  \   ClientSize VARCHAR(10) NULL,\n    ) ;\n\n    -- 外部插入，用于处理现有记录更改时的第四类记录，使用从 MERGE\
  \ 输出到临时表的数据\n    INSERT INTO #Tmp_Client (BusinessKey, ClientName, Country, Town,\
  \ Address1, Address2, ClientType, ClientSize)\n        SELECT BusinessKey, ClientName,\
  \ Country, Town, Address1, Address2, ClientType, ClientSize\n    FROM\n        (\n\
  \        -- Merge 语句\n        MERGE    CarSales_Staging.dbo.Client_SCD4        \
  \  AS DST\n        USING    CarSales.dbo.Client                       AS SRC\n \
  \       ON       (SRC.ID = DST.BusinessKey)\n\n        WHEN NOT MATCHED THEN\n \
  \           INSERT (BusinessKey, ClientName, Country, Town, Address1, Address2,\
  \ ClientType, ClientSize)\n            VALUES (SRC.ID, SRC.ClientName, SRC.Country,\
  \ SRC.Town, SRC.Address1, SRC.Address2, SRC.ClientType, SRC.ClientSize)\n\n    \
  \    WHEN MATCHED\n            AND     ISNULL(DST.ClientName,'') <> ISNULL(SRC.ClientName,'')\n\
  \            OR ISNULL(DST.Country,'') <> ISNULL(SRC.Country,'')\n            OR\
  \ ISNULL(DST.Town,'') <> ISNULL(SRC.Town,'')\n            OR ISNULL(DST.Address1,'')\
  \ <> ISNULL(SRC.Address1,'')\n            OR ISNULL(DST.Address2,'') <> ISNULL(SRC.Address2,'')\n\
  \            OR ISNULL(DST.ClientType,'') <> ISNULL(SRC.ClientType,'')\n       \
  \     OR ISNULL(DST.ClientSize,'') <> ISNULL(SRC.ClientSize,'')\n\n        THEN\
  \ UPDATE\n            SET     DST.ClientName = SRC.ClientName\n                ,\
  \   DST.Country = SRC.Country\n                ,   DST.Town = SRC.Town\n       \
  \         ,   DST.Address1 = SRC.Address1\n                ,   DST.Address2 = SRC.Address2\n\
  \                ,   DST.ClientType = SRC.ClientType\n                ,   DST.ClientSize\
  \ = SRC.ClientSize\n\n        OUTPUT $ACTION, SRC.ID, SRC.ClientName, SRC.Country,\
  \ SRC.Town, SRC.Address1, SRC.Address2, SRC.ClientType, SRC.ClientSize\n       \
  \ ) AS Changes (Action, BusinessKey, ClientName, Country, Town, Address1, Address2,\
  \ ClientType, ClientSize)\n    WHERE Action = 'UPDATE';\n    ```\n\n\n### SQL 代码片段\n\
  \n```sql\nAddress2,'')     OR ISNULL(DST.ClientType,'') <> ISNULL(SRC.ClientType,'')\
  \     OR ISNULL(DST.ClientSize,'') <> ISNULL(SRC.ClientSize,'')          THEN UPDATE\
  \          SET             DST.ClientName = SRC.ClientName            ,DST.Country\
  \ = SRC.Country            ,DST.Town = SRC.Town            ,DST.Address1 = SRC.Address1\
  \            ,DST.Address2 = SRC.Address2            ,DST.ClientType = SRC.ClientType\
  \            ,DST.ClientSize = SRC.ClientSize               OUTPUT DELETED.BusinessKey,\
  \ DELETED.ClientName, DELETED.Country, DELETED.Town, DELETED.Address1, DELETED.Address2,\
  \ DELETED.ClientType, DELETED.ClientSize, $Action AS MergeAction     ) AS MRG  \
  \   WHERE MRG.MergeAction = 'UPDATE'     ;\n```\n\n```sql\n-- 更新历史表，设置截止日期和版本号\n\
  UPDATE      TP4\nSET         TP4.ValidFrom = @Yesterday\nFROM        CarSales_Staging.dbo.Client_SCD4_History\
  \ TP4\nINNER JOIN  #Tmp_Client TMP\n            ON TP4.BusinessKey = TMP.BusinessKey\n\
  WHERE       TP4.ValidFrom IS NULL;\n```\n\n```sql\n-- 将最新的历史记录添加到历史表中\nINSERT INTO\
  \ CarSales_Staging.dbo.Client_SCD4_History\n(\n BusinessKey\n ,ClientName\n ,Country\n\
  \ ,Town\n ,County\n ,Address1\n ,Address2\n ,ClientType\n ,ClientSize\n ,ValidFrom\n\
  \ ,HistoricalVersion\n)\nSELECT\n BusinessKey\n ,ClientName\n ,Country\n ,Town\n\
  \ ,County\n ,Address1\n ,Address2\n ,ClientType\n ,ClientSize\n ,@Today\n ,(SELECT\
  \ ISNULL(MAX(HistoricalVersion),0) + 1 AS HistoricalVersion FROM dbo.Client_SCD4_History\
  \ WHERE BusinessKey = Tmp.BusinessKey)\nFROM    #Tmp_Client Tmp;\n```\n\n### 工作原理\n\
  \n我在此向您展示的此主题的最终变体，是类型 4 SCD。它基本上是一个类型 2 表，带有一个用于存储数据先前版本的单独历史表。类型 4 是一种多表拆分，其中最新数据存储在“活动”表中，而较旧数据存储在历史表中。\n\
  \n此方案需要：\n\n*   一个包含所有必需值、一个业务键（源数据中的客户端 ID）和一个用于数据仓库的代理键的目标表。这与之前描述的 `Client_SCD1`\
  \ 表在所有方面都相同。但在此，为了清晰起见，我将其复制并命名为 `Client_SCD4`。再次说明，所有目标表都位于 `CarSales_Staging`\
  \ 数据库中，但也可以与源位于同一数据库，甚至位于另一台服务器上。\n*   一个用于存储维度数据历史版本的目标表。此表与维度表相同，但包含两个附加字段：`ValidTo`\
  \ 和 `HistoricalVersion`。前者存储数据不再为当前的日期，后者提供一个版本号，可帮助跟踪数据演变的频率。\n\nSQL 代码段在业务键上映射源表和主目标表，同时从\
  \ `CarSales_Staging` 数据库获取源数据。它还执行以下操作。\n\n*   如果不存在该业务键的记录，则插入一条新记录。\n*   如果记录存在：\n\
  \    *   将旧记录移至历史表。\n    *   向主目标表添加一条新记录。\n\n请注意使用 `DELETED` 表来获取表 `Client_SCD4`\
  \ 中数据的先前值，而不是默认返回的当前值。此外，不必使用 `OUTPUT` 子句将 `MERGE` 命令的数据返回到会话范围的临时表，您可以在 `MERGE`\
  \ 语句中将数据插入到表变量中。但是，对于较大的数据集，临时表（特别是如果为其创建了索引）使用起来效率可能更高，因此我更喜欢在 ETL 过程中使用它们，除非我非常确信输出记录最多只有几百条。\n\
