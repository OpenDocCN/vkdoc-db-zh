  \ NULL,\n Geography_ID int NULL,\n Product_ID int NULL\n) ;\nGO\n\nCREATE TABLE\
  \ dbo.Dim_Products (\n ID int IDENTITY(1,1) NOT NULL,\n Product_Type nvarchar(50)\
