- "# SQL 数据库\n\n你需要加载到 SQL Server 的大量数据可能已经存储在关系数据库中。虽然你当然可以从目前大多数可用的基于 SQL 的商业数据库导出到文本或\
  \ XML 文件，然后再导入 SQL Server，但也有标准的方法可以直接连接到大多数 RDBMS（关系数据库管理系统），然后将数据从中提取到 Microsoft\
  \ RDBMS 中。\n\n因此，在本章中，我们将研究一些可用的方法，用于摄取和链接来自以下数据库的数据：\n\n-   Oracle\n-   DB2\n-\
  \   MySQL\n-   Sybase\n-   Teradata\n-   PostgreSQL\n\n正如你将看到的，对于我们将涵盖的所有数据库，用于摄取数据的技术非常相似。它们包括（取决于源数据库）：\n\
  \n-   SSIS\n-   即席连接\n-   链接服务器\n\n它们都有一个共同点，即你需要在 SQL Server 目标服务器上安装并配置好用于源数据库的提供程序。在大多数情况下，你可以使用\
  \ OLEDB 或 ODBC 提供程序（或者对于某些情况下的 SSIS，可以使用 .NET 提供程序）。从那时起，差异基本上是次要的。因此，我们将逐一查看每个数据库，并向你展示如何连接到源数据库以及如何将数据从那里加载到\
  \ SQL Server。\n\n一旦我们建立了这些基本方法，还有一些其他有趣的事情值得关注，特别是如何使用适用于 Oracle、MySQL 和 Sybase\
  \ 的 SQL Server 迁移助手 (SSMA)。\n\n你可能已经意识到，现实世界中的数据库间数据连接有其应有的挑战，你将不得不处理以下部分或全部问题：\n\
  \n-   安装和配置 OLEDB 和 ODBC 提供程序\n-   网络和防火墙问题\n-   数据库安全性\n-   数据类型映射\n\n在理想的世界中，这些元素是清晰且文档完善的。在我们大多数人居住的现实中，情况有些模糊，你最终可能需要了解多个\
  \ IT 系统，或者至少需要精确了解几个系统中某些极其具体的方面。这始终是一个挑战，并且可能需要深入研究各种文档。\n\n## 前言：安装和配置 OLEDB 和\
  \ ODBC 提供程序\n\n如果你打算直接从另一个关系数据库导入数据，关键是要有一个正常工作且经过验证的提供程序。这说起来容易，但到目前为止，这可能是数据加载中最困难的部分，原因有几个。考虑以下你必须回答的问题：\n\
  \n-   你安装哪种类型的提供程序，从哪个供应商处获取？\n-   它提供什么级别的数据库兼容性？\n-   它是 64 位还是 32 位？\n-   可获得什么级别的支持？\n\
  \n现在，使用哪个提供程序、哪种类型（OLEDB、ODBC 或 .NET）以及你偏好哪个供应商，完全取决于你。SQL Server 自带以下 OLEDB 提供程序，以方便连接到某些其他关系数据库：\n\
  \n-   用于 Oracle 的 Microsoft OLEDB 提供程序 (`MSDAORA.1`)，它是 SQL Server 安装的一部分。\n-  \
  \ 用于 DB2 的 Microsoft OLEDB 提供程序（随功能包提供，但需要 SQL Server 企业版）。\n-   用于 Oracle 的 Attunity\
  \ OLEDB 提供程序（需要 SQL Server 企业版）。\n-   用于 Teradata 的 Attunity OLEDB 提供程序（需要 SQL Server\
  \ 企业版）。\n\n当然，你还可以使用数据库供应商自己提供的 OLEDB 和 .NET 提供程序。在撰写本文时——针对本章中提到的数据源——以下是一些可用的提供程序：\n\
  \n-   Oracle Corporation 的 Oracle Provider for OLE DB 11.2.0.3.0。\n-   Oracle Corporation\
  \ 的 Oracle Data Provider for .NET 4 11.2.0.3.0。\n-   IBM DB2 for I5/OS `IBMDA400`\
  \ OLEDB Provider\n-   IBM DB2 for I5/OS `IBMDARLA` OLEDB Provider\n-   IBM DB2 for\
  \ I5/OS `IBMDASQL` OLEDB Provider\n-   IBM OLEDB Provider (`IBMDADB2`)\n-   IBM\
  \ OLE DB .NET 7 Data Provider\n-   Sybase ASE OLEDB Provider\n-   Sybase ASE ODBC\
  \ Provider\n-   Sybase ASE .NET Provider\n-   MySQL ODBC Provider\n-   PostgreSQL\
  \ Native OLEDB Provider (`PGNP`)\n\n鉴于该领域的不断发展，我不会指定你应该使用哪个版本。显然，在几乎所有情况下，最新版本都是首选。\n\
  \n\n此外，如果您在生产环境中使用这些驱动程序，您需自行确保遵守任何许可要求。\n\n当然，市面上还有许多其他商业可用的提供程序，我只能建议您自行上网搜索。它们来自许多不同的来源。同样五花八门的是每个提供程序对其所谓优越性的宣称。我在此绝不会做出任何评判。我这里将只解释那些可从\
  \ Microsoft 或我们在本章所探讨的 RDBMS 供应商本身获得的提供程序。这绝非批评或评判，仅仅是本章范围的一种自愿性限制。\n\n下载并安装后，这些提供程序应该在\
  \ SSIS 连接管理器的 `OLEDB` 源列表中可见，并且在您展开 `SQL Server Management Studio` 中的 `Server Objects`\
  \ ![image](img/arrow.jpg) `Linked Servers` ![image](img/arrow.jpg) `Providers` 时也可见。\n\
  \n#### 网络与防火墙问题\n\n务必确保与您组织内的网络架构师搞好关系，因为您将需要他们的帮助。或者，获取关于网络架构的完整文档。读到上一句时，我想大多数开发人员和\
  \ DBA 都会发出一声苦笑，并得出结论：需要施展魅力才能确保他们的 `SQL Server` 至少能看到其他数据库主机，因为这是建立服务器间数据库连接的起点。\n\
  \n#### 数据库安全\n\n一旦与基础设施人员建立了友谊，下一个“魅力攻势”无疑将针对源系统的 DBA。您需要源数据库的登录和 `SELECT` 权限（这是最低要求）——而如果您需要检查源数据库元数据，则需要更广泛的权限。实际上，正如您将看到的，这是使用\
  \ `SSMA` 的先决条件。\n\n#### 数据类型映射\n\n幸运的是，`SQL Server` 开发团队多年来已为各大主流竞争数据库定义了一套稳健的数据类型对应关系。其中许多在附录\
  \ A 中给出。`SSMA` 也有预定义（且可配置）的数据类型映射方案，您不仅可以在使用此工具加载数据时使用，也可以将其作为建议映射的参考。幸运的是，根据我的经验，这些建议非常可靠，使得该领域的难题成为例外而非规则。当问题确实发生时，您可能别无选择，只能参考源系统的文档。\n\
  \n在开始本章的实践指南之前，有一件事我必须立即澄清。我意识到，讨论半打主流数据库及将它们连接到 `SQL Server` 的方法，有可能成为一个庞大的主题。因此，我将极其有选择性地讨论哪些产品和哪些连接方法。由于不可能讨论从已知宇宙中所有关系型数据库加载数据的所有方法的方方面面，我选择在本章刻意保持简洁，并专注于\
  \ RDBMS 市场中的主要参与者——这些产品的数据加载问题我有幸在过去多年中与之“搏斗”过。不可避免地，许多内容将无法涵盖，但我恐怕必须在某个地方划定界限。\n\
  \n此外，我将始终使用我们所探讨的每个 RDBMS 自带的示例数据库。如果某个数据源没有标准的示例数据库，我将使用 `INFORMATION_SCHEMA` 数据或源数据库中作为标准存在的任何表。\n\
  \n![image](img/sq.jpg) **注意** 从其他 `SQL` RDBMS 导入数据的难点在于，在某些情况下，您需要对源数据库具备一定程度的基础知识。在其他情况下，`SQL`\
  \ 知识就足够了。\n\n因此，在本章中，我假定您对外部数据库有基本的了解——或者至少具备一个可以相当快获得的初始理解水平。\n\n我假定您已从本书的配套网站下载了本章的示例文件，并将其安装在\
  \ `C:\\SQL2012DIRecipes\\CH02\\` 目录中。同样地，如果您要跟随示例操作，您需要按照附录 B 中的描述创建 `CarSales`\
  \ 和 `CarSales_Staging` 数据库。\n\n## 4-1. 配置服务器以连接到 Oracle\n\n### 问题\n\n您需要确保您将用于导入\
  \ Oracle 数据的 `SQL Server` 已正确配置，并且能够连接到 Oracle 数据库。\n\n### 解决方案\n\n在 32 位 `SQL Server`\
  \ 上安装 32 位 Oracle 客户端，或在 64 位 `SQL Server` 上安装 64 位 Oracle 客户端。具体操作步骤如下：\n\n1. \
  \ 下载 Oracle 11G 完全客户端。按照 Oracle 指南进行安装。确保安装 Oracle `OLEDB`、`.NET` 和 `ODBC` 提供程序。\n\
  2.  通过编辑 `TNSNames.ora` 文件来配置 Oracle 访问。我将在“工作原理”部分解释这一点。\n3.  重新启动安装了 Oracle 驱动程序的\
  \ `SQL Server`。\n\n### 工作原理\n\n作为全球市场份额最大的数据库，我们将首先探讨如何连接到 Oracle 数据库。尽管本指南中给出的说明假定您仅具备非常基础的\
  \ Oracle 知识，但在建立与 Oracle 服务器的连接时，您可能需要 Oracle DBA 的协助。这仅仅是因为连接到 Oracle 数据库时可能面临各种广泛的潜在场景。这个主题如此庞大，无法在此详细描述，因此我只展示如何使用\
  \ `TNS`（透明网络底层）连接。\n\n请注意，在 `TNSNames.ora` 文件中，`Address` 是连接的首要元素。您稍后连接时将需要它。因此，使用一个纯粹假设的示例，以下\
  \ `TNSNAMES` 条目的 `Address` 名称是 `MyOracle`：\n\n```text\nMyOracle =\n  (DESCRIPTION\
  \ =\n    (ADDRESS_LIST =\n      (ADDRESS = (PROTOCOL = TCP)(HOST = aa.calidra.co.uk)(PORT\
  \ = 1521))\n    )\n    (CONNECT_DATA =\n      (SERVER = DEDICATED)\n      (SERVICE_NAME\
  \ = MyOracleReally)\n    )\n  )\n```\n\n然而，我只能建议您考虑在 64 位服务器上同时安装 32 位和 64 位客户端，因为这不仅允许您在\
  \ 64 位环境中连接到 Oracle，还允许您在 `SSDT`（SQL Server Data Tools）/`BIDS`（Business Intelligence\
  \ Development Studio）中进行开发、调整、最终确定和测试——请记住，这两者都是作为 32 位应用程序运行的。具体步骤如下：\n\n1.  移除任何现有的\
  \ Oracle 客户端。重新启动。\n2.  下载 Oracle 11G 完全客户端。按照 Oracle 指南安装 32 位客户端。确保安装 Oracle `OLEDB`、`.NET`\
  \ 和 `ODBC` 提供程序。仔细定义它使用的 Oracle 主目录和目录路径，例如 `C:\\Oracle\\product\\11.2.0\\Client32`。\n\
  3.  在“可用产品组件”中选择用于 `OLEDB` 的 `Oracle Windows Interfaces 11.x.x` 组件。如果愿意，您也可以添加 `.NET`\
  \ 提供程序。\n4.  重新启动服务器。\n5.  下载 Oracle 11G 完全客户端。按照 Oracle 指南安装 64 位客户端。确保安装 Oracle\
  \ `OLEDB`、`.NET` 和 `ODBC` 提供程序。定义它使用的 Oracle 主目录，目录路径可以是类似 `C:\\Oracle\\product\\\
  11.2.0\\Client64`。\n6.  在“可用产品组件”中选择用于 `OLEDB` 的 `Oracle Windows Interfaces 11.x.x`\
  \ 组件。如果愿意，您也可以添加 `.NET` 提供程序。\n7.  重新启动服务器。\n8.  为 32 位和 64 位环境分别编辑 `TNSNames.ora`\
  \ 文件以配置 Oracle 访问。这意味着要修改 `C:\\Oracle\\product\\11.2.0\\Client32\\Network\\Admin`\
  \ 和 `C:\\Oracle\\product\\11.2.0\\Client64\\Network\\Admin` 这两个目录中的 `TNSNames.ora`\
  \ 文件。\n\n\n\n"
- "# 4-2. 从 Oracle 导入数据作为常规过程\n\n## 问题\n你希望定期导入 Oracle 数据，并且可以通过网络连接到 Oracle 源数据库。\n\
  \n## 解决方案\n实现一个 SSIS 包来加载数据。请按照以下步骤操作：\n\n1.  打开或创建一个 SSIS 包。在控制流窗格中添加一个数据流任务。\n\
  2.  双击数据流任务进行编辑。添加一个 OLEDB 源和一个 OLEDB 目标任务。\n3.  创建一个名为 `CarSales_Staging_OLEDB`\
  \ 的 OLEDB 连接管理器，用于建立到 `CarSales_Staging` 数据库的连接。\n4.  右键单击屏幕底部的“连接管理器”选项卡，选择“新建\
  \ OLEDB 连接”。单击“新建”。在提供程序列表中，选择“Oracle Provider for OLEDB”。你应该会看到类似图 4-1 的内容。\n \
  \   ![9781430247913_Fig04-01.jpg](img/9781430247913_Fig04-01.jpg)\n    图 4-1。选择用于\
  \ OLEDB 的 Oracle 提供程序\n5.  单击“确定”确认提供程序。\n6.  在连接管理器对话框的“服务器或文件名”中，输入 `TNSNames.ora`\
  \ 文件中的地址名称。\n7.  在连接管理器对话框中输入 Oracle 登录信息（参见图 4-2）。\n    ![9781430247913_Fig04-02.jpg](img/9781430247913_Fig04-02.jpg)\n\
  \    图 4-2。Oracle 的 SSIS 连接管理器\n8.  测试连接。如果确认连接成功的消息，则单击“确定”完成连接管理器的创建。将其重命名为 `ORCLAdam`——或适合你要求的名称。\n\
  9.  双击 OLEDB 源任务。选择你刚刚定义的连接管理器（参见图 4-3）。\n    ![9781430247913_Fig04-03.jpg](img/9781430247913_Fig04-03.jpg)\n\
  \    图 4-3。选择 Oracle 连接管理器\n10. 选择源数据库中要使用的表或视图。或者，将数据访问模式设置为“SQL 命令”并编写用于选择数据的\
  \ SQL。源对话框应如图 4-4 所示。\n    ![9781430247913_Fig04-04.jpg](img/9781430247913_Fig04-04.jpg)\n\
  \    图 4-4。SSIS 用于选择 Oracle 数据的 OLEDB 源编辑器\n11. 点击“确定”确认配置。\n12. 将 OLEDB 源任务链接到目标任务。配置其使用\
  \ `CarSales_Staging_OLEDB` 连接管理器。\n13. 点击“新建”以创建新表。点击“确定”确认。\n14. 在目标任务中映射列。确认目标任务是正确的。这方面的完整细节在其他许多地方有描述，例如配方\
  \ 1-7。\n\n现在你可以运行 SSIS 包并导入源数据。\n\n## 工作原理\n幸运的是，使用 SSIS 导入外部数据极其简单。我在这里假设你了解基本的\
  \ SSIS 知识，因为本书中有许多 SSIS 数据导入的例子，所以我没有解释每一个细节。这里的关键点是专注于到 Oracle 数据库的 OLEDB 链接。一旦这部分工作正常，其余部分应该就很容易了。\n\
  \n然而，正如配方 4-1 所述，Oracle 有一套明确的前提条件：\n\n*   你需要在 SQL Server 上安装 Oracle 客户端。\n*  \
  \ 你必须确保到 Oracle 服务器的网络连接正常工作。\n*   你需要一个具有检索所需数据权限的 Oracle 用户登录名和密码。\n\n#### 提示、技巧与陷阱\n\
  \n*   在大型、“真实世界”的 Oracle 数据加载情况下，如果你使用的是 SQL Server 2012，建议你在包级别（在解决方案资源管理器的“连接管理器”文件夹中）创建连接管理器。因为你很可能在多个包中多次使用它来源许许多多的表。\n\
  *   在步骤 11 你可能会遇到列代码页警告。要避免它，请记住可以使用高级编辑器将“组件属性”选项卡的 `AlwaysUseTheDefaultCodePage`\
  \ 属性设置为 True。`DefaultCodePage` 可以设置为 1252，这对于大多数西方语言都适用。如果 Oracle 使用的是其他字符集，你需要确定是哪一种并在\
  \ SSIS 中选择等效项。\n*   由于 BIDS/SSDT（仍然）是一个 32 位工具，只有在同时安装了 32 位和 64 位 Oracle 提供程序的情况下，你才能在\
  \ 64 位计算机上看到 Oracle OLEDB 提供程序，如配方 4-1 所述。\n*   一些 Oracle 源表在使用 `NUMBER` 数据类型时未指定精度。这可能导致\
  \ SSIS 出现问题，你可能需要添加精度。执行此操作的最简单方法是在步骤 9 中用于提取源数据的 SQL 中使用 Oracle 的 `CAST` 或 `CONVERT`\
  \ 函数。\n*   当配置为 Oracle 提供程序时，连接管理器对话框不会列出所有可用的目录。\n*   在生产环境中，你大概会将密码作为包配置的一部分存储。\n\
  *   数据类型映射在附录 A 中讨论。\n\n"
- "# 4-3. 加速 Oracle 数据导入\n\n## 问题\n你需要加载的 Oracle 数据量所需时间超出了你可用的时间。\n\n## 解决方案\n要加速数据加载，请使用随\
  \ SQL Server Enterprise 版提供的 Attunity SSIS Connectors for Oracle。以下说明如何操作：\n\n1.\
  \  下载与你环境（32 位或 64 位）对应的 Attunity SSIS Connector for Oracle。它们当前位于 `www.microsoft.com/en-gb/download/details.aspx?id=29284`。\n\
  2.  双击 `.msi` 文件并安装连接器。你可以修改一些安装参数，但接受默认设置几乎总是更简单。\n3.  在一个 SSIS 包中，右键单击“连接管理器”选项卡内部，在“添加\
  \ SSIS 连接管理器”对话框中选择 `MSORA`。对话框应如图 4-5 所示。\n    ![9781430247913_Fig04-05.jpg](img/9781430247913_Fig04-05.jpg)\n\
