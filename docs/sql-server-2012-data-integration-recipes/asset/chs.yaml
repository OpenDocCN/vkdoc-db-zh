  \ 工作原理\n\n剖析数据然后使用数据配置文件查看器进行分析，在您刚开始了解数据时非常有用，但当您希望将此信息存储以备将来使用时——无论是在数据加载过程完成后，还是作为业务流程的一部分，在允许加载继续之前测试配置文件结果——这种方法就可能显得有局限性。因此，您很可能希望存储配置文件数据，以便将其与可接受的阈值进行比较，并使用一些逻辑来控制数据流。这需要一种两步走的方法：\n\
  \n*   首先，定义剖析任务，并将结果输出到变量。\n*   其次，将变量中的少量 XML 子集加载到 SQL Server 表中，以捕获关键数据。\n\n\
  此技术隐含以下先决条件：\n\n*   一个数据源，您必须将其配置为连接到合适的数据源。\n*   一个数据流任务，配置为使用您已定义的数据源。\n\n如您所见，某些配置文件类型，如列空值比率配置文件和列统计信息配置文件，可以直接分解为单个输出表。其他配置文件类型，如列长度分布配置文件和列值分布配置文件，如果您只需要不同元素的计数，则只需要单个表；但如果您需要每个值的详细信息及其出现次数，则需要另外两个表（一个用于所有单项的表，以及一个用于将单项连接到聚合表的多对多表）。\n\
  \n由于详细展示如何获取每一条可能的配置文件信息过于繁琐，本方案概述了我在将业务规则分析应用于 SSIS 数据加载时发现有用的四种主要配置文件类型。我不会解释使用\
  \ XML 数据源的每一个细节，因为第 3 章中已介绍了许多方法。但是，您应该能够将本方案作为一个示例，在此基础上构建您自己的配置文件输出表。您正在分析的配置文件类型与输出表之间的关系在表\
  \ 10-7 中给出。\n\n表 10-7. 用于配置文件类型的表\n\n| 配置文件类型 | 使用的表 |\n| --- | --- |\n| 列空值比率配置文件\
  \ | `Dbo.DataProfiling_ColumnNulls` |\n| 列统计信息配置文件 | `Dbo.DataProfiling_ColumnStatistics`\
  \ |\n| 列长度分布配置文件 | `Dbo.DataProfiling_ColumnLengthDistribution` <= `Dbo.DataProfiling_Join_LengthDistribution`\
  \ => `Dbo.DataProfiling_LengthDistributionItem` |\n| 列值分布配置文件 | `Dbo.DataProfiling_ColumnValueDistribution`\
  \ <= `Dbo.DataProfiling_Join_ValueDistribution` => `Dbo.DataProfiling_ValueDistributionItem`\
  \ |\n\n#### 提示、技巧与陷阱\n\n*   数据剖析任务生成的 XML 文件有许多许多输出。如果您需要更好地理解该文件，我建议您在 Visual Studio\
  \ 中打开 `MyProfile.Xsd` 文件（在步骤 8 中创建），甚至直接读取 XML 以查看数据的结构。\n*   如果您不希望使用文件来存储 XML\
  \ 数据，那么在包经过测试和调试后，您可以定义一个字符串变量（在包级别），并将其同时用作剖析任务的目标和 XML 数据源的源数据。但是，任何对包的进一步修改都需要在修改和调试期间将这些设置重置为基于文件的数据，然后可以重新应用该字符串变量。\n\
  *   当然，您可以扩展此包以处理其他配置文件类型，例如函数依赖关系或值包含。\n\n# 10-11. 在 SSIS 中定制特定源数据配置文件\n\n## 问题\n\
  您希望以一种针对您的源数据和剖析需求进行定制的方式来剖析您的数据。\n\n## 解决方案\n使用 SSIS 创建一个使用标准 SSIS 任务的自定义剖析包，超越\
  \ SSIS 数据剖析任务中提供的标准选项。\n\n1.  创建一个 SSIS 包。将其命名为 `Profiling.Dtsx`。\n2.  创建 `CarSales_Staging.dbo.DataProfiling`\
  \ 表（其 DDL 在方案 10-5 中给出）以存储配置文件数据（当然，除非您已经创建了它）。\n3.  为此任务创建一个 ADO.NET 连接，连接到目标 (`CarSales_Staging`)\
  \ 数据库。我将其命名为 `CarSales_Staging_ADONET`。\n4.  添加一个平面文件连接管理器并连接到数据源文件，本例中为 `C:\\SQL2012DIRecipes\\\
