- "# 工作原理\n\n如果我说这个方法的替代标题是“史上最短的 Oracle 数据典指南”，我希望我在这里描述的目标将是明确的。虽然有些数据库让您为获取足够的元数据而手忙脚乱，但在\
  \ Oracle 中，情况往往恰恰相反——您会感觉自己淹没在 Oracle 称为*数据字典*的信息海洋中。因此，这个方法提供了您可能获得的关于 Oracle 元数据的最短课程。我只能强调，获取\
  \ Oracle 元数据的方法有很多种。可用的信息如此之多，以至于我专注于一个极其简单的子集，这些是我过去发现有帮助的。我希望您会发现它们作为一个起点很有用，您可以在此基础上扩展和构建。\n\
  \n当然，对于接下来的每种方法，都有另外十几种方法可以获取您想要的东西——所以请继续搜索 Oracle 字典（在所有可用的资源中），因为您肯定会找到其他获取所需元数据的方法。\n\
  \n#### 8-13. 显示 DB2 元数据\n\n## 问题\n\n您需要查询即将从中导入数据的 DB2 数据库的元数据。\n\n## 解决方案\n\n使用\
  \ SSIS 从 DB2 的 `INFORMATION_SCHEMA` 表中捕获和存储 DB2 元数据。以下步骤描述了如何操作。\n\n1.  使用以下 DDL\
  \ 在 SQL Server 中创建表以保存 DB2 元数据：\n\n    ```sql\n    CREATE TABLE dbo.IS_DB2_Views\n\
  \    (\n     TABLE_CATALOG NVARCHAR(50) NULL,\n     TABLE_SCHEMA NVARCHAR(50) NULL,\n\
  \     TABLE_NAME NVARCHAR(50) NULL,\n     VIEW_DEFINITION NVARCHAR(MAX) NULL,\n\
  \     CHECK_OPTION NVARCHAR(10) NULL,\n     IS_UPDATABLE NVARCHAR(5) NULL\n    );\n\
  \    GO\n\n    CREATE TABLE dbo.IS_DB2_Tables\n    (\n     TABLE_CATALOG NVARCHAR(50)\
  \ NULL,\n     TABLE_SCHEMA NVARCHAR(50) NULL,\n     TABLE_NAME NVARCHAR(50) NULL,\n\
  \     TABLE_TYPE NVARCHAR(26) NULL\n    );\n    GO\n\n    CREATE TABLE dbo.IS_DB2_TableConstraints\n\
  \    (\n     CONSTRAINT_CATALOG NVARCHAR(50) NULL,\n     CONSTRAINT_SCHEMA NVARCHAR(50)\
  \ NULL,\n     CONSTRAINT_NAME NVARCHAR(50) NULL,\n     TABLE_CATALOG NVARCHAR(50)\
  \ NULL,\n     TABLE_SCHEMA NVARCHAR(50) NULL,\n     TABLE_NAME NVARCHAR(50) NULL,\n\
  \     CONSTRAINT_TYPE NVARCHAR(50) NULL,\n     IS_DEFERRABLE NVARCHAR(5) NULL,\n\
  \     INITIALLY_DEFERRED NVARCHAR(5) NULL\n    );\n    GO\n\n    CREATE TABLE dbo.IS_DB2_Schemas\n\
  \    (\n     CATALOG_NAME NVARCHAR(50) NULL,\n     SCHEMA_NAME NVARCHAR(50) NULL,\n\
  \     SCHEMA_OWNER NVARCHAR(50) NULL,\n     DEFAULT_CHARACTER_SET_CATALOG NVARCHAR(50)\
  \ NULL,\n     DEFAULT_CHARACTER_SET_SCHEMA NVARCHAR(50) NULL,\n     DEFAULT_CHARACTER_SET_NAME\
  \ NVARCHAR(50) NULL,\n     SQL_PATH VARCHAR(MAX) NULL\n    );\n    GO\n\n    CREATE\
  \ TABLE dbo.IS_DB2_Columns\n    (\n     TABLE_CATALOG NVARCHAR(50) NULL,\n     TABLE_SCHEMA\
  \ NVARCHAR(50) NULL,\n     TABLE_NAME NVARCHAR(50) NULL,\n     COLUMN_NAME NVARCHAR(50)\
  \ NULL,\n     ORDINAL_POSITION INT NULL,\n     COLUMN_DEFAULT NVARCHAR(2002) NULL,\n\
  \     IS_NULLABLE NVARCHAR(5) NULL,\n     DATA_TYPE NVARCHAR(50) NULL,\n     CHARACTER_MAXIMUM_LENGTH\
  \ INT NULL,\n     CHARACTER_OCTET_LENGTH INT NULL,\n     NUMERIC_PRECISION INT NULL,\n\
  \     NUMERIC_PRECISION_RADIX INT NULL,\n     NUMERIC_SCALE INT NULL,\n     DATETIME_PRECISION\
  \ INT NULL,\n     INTERVAL_TYPE NVARCHAR(50) NULL,\n     INTERVAL_PRECISION INT\
  \ NULL,\n     CHARACTER_SET_CATALOG NVARCHAR(50) NULL,\n     CHARACTER_SET_SCHEMA\
  \ NVARCHAR(50) NULL,\n     CHARACTER_SET_NAME NVARCHAR(50) NULL\n    );\n    GO\n\
  \    ```\n\n2.  创建一个新的 SSIS 包。在 Control Flow 选项卡上添加一个 Data Flow Task。双击打开此包并切换到\
  \ Data Flow 选项卡。\n3.  为目标（SQL Server）数据库添加一个 OLEDB 连接管理器。\n4.  在 Providers 列表中添加一个\
  \ ADO.NET 连接管理器。展开 .NET Providers for OleDb。选择 “.NET Providers for OleDb\\IBM DB2\
  \ for i5/OS IBMDA400 OLE DB Provider”（或您正在使用的提供程序）。输入完全限定的服务器名称、用户名和密码。选择 Initial\
  \ Catalog。\n5.  添加一个 Execute SQL Task。将其配置为使用目标（SQL Server OLEDB）连接管理器。将 SQL Statement\
  \ 设置为：\n\n    ```sql\n    TRUNCATE TABLE IS_DB2_Tables;\n    TRUNCATE TABLE IS_DB2_Columns;\n\
  \    TRUNCATE TABLE IS_DB2_Views;\n    TRUNCATE TABLE IS_DB2_Schemas;\n    TRUNCATE\
  \ TABLE IS_DB2_TableConstraints;\n    ```\n\n6.  添加一个 Sequence Container，将 Execute\
  \ SQL Task 连接到它，并在其中添加五个 Data Flow Task。将它们命名为 `Tables`、`Views`、`Columns`、`Schemas`\
  \ 和 `Table Constraints`。将每个任务设置为使用 DB2 连接管理器，并将数据访问模式设置为 SQL Command。\n\n\n"
- "# 获取 DB2 元数据\n\n## 定义命令\n\n定义命令如下：\n\n| 数据流任务 | SQL 代码 |\n| :--- | :--- |\n| **表**\
  \ | `SELECT TABLE_CATALOG, TABLE_SCHEMA, TABLE_NAME, TABLE_TYPE FROM INFORMATION_SCHEMA.TABLES`\
  \ |\n| **视图** | `SELECT TABLE_CATALOG, TABLE_SCHEMA, TABLE_NAME, VIEW_DEFINITION,\
  \ CHECK_OPTION, IS_UPDATABLE FROM INFORMATION_SCHEMA.VIEWS` |\n| **列** | `SELECT\
  \ TABLE_CATALOG, TABLE_SCHEMA, TABLE_NAME, COLUMN_NAME, ORDINAL_POSITION, COLUMN_DEFAULT,\
  \ IS_NULLABLE, DATA_TYPE, CHARACTER_MAXIMUM_LENGTH, CHARACTER_OCTET_LENGTH, NUMERIC_PRECISION,\
  \ NUMERIC_PRECISION_RADIX, NUMERIC_SCALE, DATETIME_PRECISION, INTERVAL_TYPE, INTERVAL_PRECISION,\
  \ CHARACTER_SET_CATALOG, CHARACTER_SET_SCHEMA, CHARACTER_SET_NAME FROM INFORMATION_SCHEMA.COLUMNS`\
  \ |\n| **架构** | `SELECT CATALOG_NAME, SCHEMA_NAME, SCHEMA_OWNER, DEFAULT_CHARACTER_SET_CATALOG,\
  \ DEFAULT_CHARACTER_SET_SCHEMA, DEFAULT_CHARACTER_SET_NAME, SQL_PATH FROM INFORMATION_SCHEMA.SCHEMATA`\
  \ |\n| **表约束** | `SELECT CONSTRAINT_CATALOG, CONSTRAINT_SCHEMA, CONSTRAINT_NAME,\
  \ TABLE_CATALOG, TABLE_NAME, CONSTRAINT_TYPE, IS_DEFERRABLE, INITIALLY_DEFERRED\
  \ FROM INFORMATION_SCHEMA.TABLE_CONSTRAINTS` |\n\n最终的程序包应类似于 图 8-13。\n\n![9781430247913_Fig08-13.jpg](img/9781430247913_Fig08-13.jpg)\n\
  \n图 8-13。 一个用于返回 DB2 元数据的 SSIS 包\n\n## 运行程序包\n\n运行该程序包。当您查询（并连接）这五个元数据表时，可以更清晰地了解\
  \ DB2 元数据。\n\n## 工作原理\n\n能够快速查看数据源背后的元数据可能具有启发性（并且经常可以帮助您调试数据流问题），但在某些情况下这还不够。您需要能够收集元数据并将其存储在本地系统上以供参考。\n\
  \n这在以下情况下非常有用：\n\n*   需要更详细地分析元数据。\n*   需要存储元数据，并针对未来的数据摄取进行验证，以发现变更和/或异常。\n\n本方法展示了如何收集一组基础的\
  \ DB2 元数据。幸运的是，这个特定的数据库使用了 `INFORMATION_SCHEMA` 视图，因此我们可以使用它们来获取元数据。本质上，这不过是一个简单的数据传输——只是源数据不是数据，而是元数据。这使得\
  \ DB2 成为一个很好的示例，您可以将此技术用于任何实现了这些元数据视图的源数据库。您需要在目标 SQL Server 上安装并正常运行 DB2 OLEDB\
  \ 提供程序。\n\n![image](img/sq.jpg) **注意** 由于每个数据库的 `INFORMATION_SCHEMA` 视图在视图数量和内容上可能各不相同，因此此模型不能完全相同地用于所有允许通过此方法发现元数据的\
  \ SQL 数据库。不过，它很容易针对其他数据库进行扩展和修改。\n\n#### 8-14. 使用 .NET 获取 SQL Server 元数据\n\n## 问题\n\
  \n您希望获取完整的元数据，但不使用 `INFORMATION_SCHEMA` 或系统视图。\n\n## 解决方案\n\n使用 .NET 的 `GetSchema`\
  \ 类来查询各种数据源的元数据。\n\n### 步骤\n\n1.  需要以下目标表，可以使用此 DDL (`C:\\SQL2012DIRecipes\\CH08\\\
  DotNetMetadataTables.sql`) 来定义：\n\n    ```sql\n    CREATE TABLE dbo.ADOSQLServerMetadataViews\n\
  \    (\n        ID INT IDENTITY(1,1) NOT NULL,\n        TableCatalog VARCHAR(50)\
  \ NULL,\n        TableName VARCHAR(50) NULL,\n        TableSchema VARCHAR(50) NOT\
  \ NULL,\n        CheckOption VARCHAR(50) NULL,\n        IsUpdatable VARCHAR(5) NULL\n\
  \    );\n\n    CREATE TABLE dbo.ADOSQLServerMetadataViewColumns\n    (\n       \
  \ ID INT IDENTITY(1,1) NOT NULL,\n        ViewCatalog VARCHAR(50) NULL,\n      \
  \  ViewName VARCHAR(50) NULL,\n        ViewSchema VARCHAR(50) NOT NULL,\n      \
  \  TableCatalog VARCHAR(50) NULL,\n        TableName VARCHAR(50) NULL,\n       \
  \ TableSchema VARCHAR(50) NOT NULL,\n        ColumnName VARCHAR(50) NULL\n    );\n\
  \n    CREATE TABLE dbo.ADOSQLServerMetadataTables\n    (\n        ID INT IDENTITY(1,1)\
  \ NOT NULL,\n        TableCatalog VARCHAR(50) NULL,\n        TableName VARCHAR(50)\
  \ NULL,\n        TableSchema VARCHAR(50) NOT NULL,\n        TableType VARCHAR(50)\
  \ NULL\n    );\n\n    CREATE TABLE dbo.ADOSQLServerMetadataIndexes\n    (\n    \
  \    ID INT IDENTITY(1,1) NOT NULL,\n        ConstraintCatalog VARCHAR(50) NULL,\n\
  \        ConstraintSchema VARCHAR(50) NULL,\n        ConstraintName VARCHAR(50)\
  \ NULL,\n        TableCatalog VARCHAR(50) NULL,\n        TableSchema VARCHAR(50)\
  \ NULL,\n        TableName VARCHAR(50) NULL\n    );\n\n    CREATE TABLE dbo.ADOSQLServerMetadataIndexColumns\n\
  \    (\n        ID INT IDENTITY(1,1) NOT NULL,\n        ConstraintCatalog VARCHAR(50)\
  \ NULL,\n        ConstraintSchema VARCHAR(50) NULL,\n        ConstraintName VARCHAR(50)\
  \ NULL,\n        TableCatalog VARCHAR(50) NULL,\n        TableSchema VARCHAR(50)\
  \ NULL,\n        TableName VARCHAR(50) NULL,\n        ColumnName VARCHAR(50) NULL,\n\
  \        OrdinalPosition VARCHAR(50) NULL,\n        KeyType VARCHAR(50) NULL,\n\
  \        IndexName VARCHAR(50) NULL\n    );\n\n    CREATE TABLE dbo.ADOSQLServerMetadataColumns\n\
  \    (\n        ID INT IDENTITY(1,1) NOT NULL,\n        TableCatalog VARCHAR(50)\
  \ NULL,\n        TableName VARCHAR(50) NULL,\n        TableSchema VARCHAR(50) NOT\
  \ NULL,\n        ColumnName VARCHAR(50) NULL,\n        OrdinalPosition INT NULL,\n\
  \        ColumnDefault VARCHAR(50) NULL,\n        IsNullable VARCHAR(5) NULL,\n\
  \        DataType VARCHAR(50) NULL,\n        CharacterMaximumLength VARCHAR(50)\
  \ NULL,\n        CharacterOctetLength VARCHAR(50) NULL,\n        NumericPrecision\
  \ VARCHAR(50) NULL,\n        NumericPrecisionRadix VARCHAR(50) NULL,\n        NumericScale\
  \ VARCHAR(50) NULL,\n        DateTimePresision VARCHAR(50) NULL,\n        CharacterSetCatalog\
  \ VARCHAR(50) NULL,\n        CharacterSetSchema VARCHAR(50) NULL,\n        CharacterSetName\
  \ VARCHAR(50) NULL,\n        CollationCatalog VARCHAR(50) NULL,\n        IsFilestream\
  \ VARCHAR(5) NULL,\n        IsSparse VARCHAR(5) NULL,\n        IsColumnSet VARCHAR(5)\
  \ NULL\n    );\n    ```\n\n2.  创建一个新的 SSIS 包，并配置一个指向源 SQL Server 数据库的 ADO.NET 连接管理器。\n\
  3.  添加一个数据流任务，并切换到数据流窗格。\n4.  在数据流窗格上添加一个脚本组件。\n5.  选择数据流类型为源，然后单击确定。\n6.  双击脚本组件进行编辑。确保在左侧窗格中选择了输入和输出。将输出\
  \ 0 重命名为 **MetadataOutput**。选择输出列。\n7.  单击添加列以添加一个新列。在对话框右侧的属性窗格中，将列重命名为 **TableCatalog**。将其数据类型设置为字符串，长度为\
  \ 0。\n8.  添加以下列，并指定给定的数据类型和长度：\n\n    | 列 | 数据类型和长度 |\n    | :--- | :--- |\n   \
  \ | `TableCatalog` | String, 0 |\n    | `TableSchema` | String, 0 |\n    | `TableName`\
  \ | String, 0 |\n    | `TableType` | String, 0 |\n\n    对话框应类似于 图 8-14。\n\n    ![9781430247913_Fig08-14.jpg](img/9781430247913_Fig08-14.jpg)\n\
  \n    图 8-14。 用于元数据的脚本转换编辑器\n\n9.  单击连接管理器并添加一个名为 **ADONETSource** 的连接管理器。选择您之前创建的\
  \ ADO.NET 连接管理器。\n10. 单击脚本，将脚本语言设置为 Visual Basic 2010，然后单击设计脚本按钮。\n11. 在左侧窗格中右键单击引用。选择添加引用。从可用的\
  \ .NET 组件中选择 `System.Data.SQLClient`。单击确定。\n12. 添加以下代码 (`C:\\SQL2012DIRecipes\\\
  CH08\\GetschemaCode.`)\n\n## 在 SSIS 中使用脚本组件获取元数据\n\n```\nPublic Class ScriptMain\n\
  \    Inherits UserComponent\n\n    Dim ConnMgr As IDTSConnectionManager100\n   \
  \ Dim SQLConn As SqlConnection\n    Dim SQLReader As SqlDataReader\n    Dim DSTable\
  \ As DataTable\n\n    Public Overrides Sub AcquireConnections(ByVal Transaction\
  \ As Object)\n        ConnMgr = Me.Connections.ADONETSource\n        SQLConn = CType(ConnMgr.AcquireConnection(Nothing),\
  \ SqlConnection)\n    End Sub\n\n    Public Overrides Sub PreExecute()\n       \
  \ MyBase.PreExecute()\n        DSTable = SQLConn.GetSchema(\"Tables\")\n    End\
  \ Sub\n\n    Public Overrides Sub PostExecute()\n        MyBase.PostExecute()\n\
  \    End Sub\n\n    Public Overrides Sub CreateNewOutputRows()\n        For Each\
  \ Row In DSTable.Rows\n            MetadataOutputBuffer.AddRow()\n            MetadataOutputBuffer.TableCatalog\
  \ = Row(\"TABLE_CATALOG\").ToString\n            MetadataOutputBuffer.TableSchema\
  \ = Row(\"TABLE_SCHEMA\").ToString\n            MetadataOutputBuffer.TableName =\
  \ Row(\"TABLE_NAME\").ToString\n            MetadataOutputBuffer.TableType = Row(\"\
  TABLE_TYPE\").ToString\n        Next\n    End Sub\nEnd Class\n```\n\n13. 关闭脚本屏幕。\n\
  14. 单击“确定”关闭`Script Component`对话框。\n15. 在数据流窗格中添加一个`OLE DB`目标组件。将`Script Component`链接到该`OLE\
  \ DB`目标，并将其配置为使用`ADOSQLServerMetadataTables`表（该表作为先决条件的一部分已创建）。\n16. 映射列。您会注意到目标表列与添加到`Script\
  \ Component`输出缓冲区的列相对应。\n17. 对其他表重复步骤 3 至 16。列定义见表 8-10。\n\n表 8-10. 在 SSIS 中返回`GetSchema`元数据的列定义\n\
  \n| 表名 | 列名 | 数据类型与长度 |\n| --- | --- | --- |\n| `ADOSQLServerMetadataViews` | `TableCatalog`\
  \ | 字符串, 50 |\n| `ADOSQLServerMetadataViews` | `TableSchema` | 字符串, 50 |\n| `ADOSQLServerMetadataViews`\
  \ | `TableName` | 字符串, 50 |\n| `ADOSQLServerMetadataViews` | `CheckOption` | 字符串,\
  \ 50 |\n| `ADOSQLServerMetadataViews` | `IsUpdatable` | 字符串, 5 |\n| `ADOSQLServerMetadataColumns`\
  \ | `TableCatalog` | 字符串, 50 |\n| `ADOSQLServerMetadataColumns` | `TableSchema`\
  \ | 字符串, 50 |\n| `ADOSQLServerMetadataColumns` | `TableName` | 字符串, 50 |\n| `ADOSQLServerMetadataColumns`\
  \ | `ColumnName` | 字符串, 50 |\n| `ADOSQLServerMetadataColumns` | `OrdinalPosition`\
  \ | 四字节有符号整数 [DT_I4] |\n| `ADOSQLServerMetadataColumns` | `ColumnDefault` | 字符串,\
  \ 50 |\n| `ADOSQLServerMetadataColumns` | `IsNullable` | 字符串, 5 |\n| `ADOSQLServerMetadataColumns`\
  \ | `DataType` | 字符串, 50 |\n| `ADOSQLServerMetadataColumns` | `CharacterMaximumLength`\
  \ | 四字节有符号整数 [DT_I4] |\n| `ADOSQLServerMetadataColumns` | `CharacterOctetLength`\
  \ | 四字节有符号整数 [DT_I4] |\n| `ADOSQLServerMetadataColumns` | `NumericPrecision` | 四字节有符号整数\
  \ [DT_I4] |\n| `ADOSQLServerMetadataColumns` | `NumericPrecisionRadix` | 四字节有符号整数\
  \ [DT_I4] |\n| `ADOSQLServerMetadataColumns` | `NumericScale` | 四字节有符号整数 [DT_I4]\
  \ |\n| `ADOSQLServerMetadataColumns` | `DateTimePrecision` | 字符串, 50 |\n| `ADOSQLServerMetadataColumns`\
  \ | `CharacterSetCatalog` | 字符串, 50 |\n| `ADOSQLServerMetadataColumns` | `CharacterSetSchema`\
  \ | 字符串, 50 |\n| `ADOSQLServerMetadataColumns` | `CharacterSetName` | 字符串, 50 |\n\
  | `ADOSQLServerMetadataColumns` | `CollationCatalog` | 字符串, 50 |\n| `ADOSQLServerMetadataColumns`\
  \ | `IsFilestream` | 字符串, 5 |\n| `ADOSQLServerMetadataColumns` | `IsSparse` | 字符串,\
