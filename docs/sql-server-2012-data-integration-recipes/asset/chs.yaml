  \    *   通过创建链接表链接到数据源。\n3.  选择——或创建一个 DSN（在第 4 章的**配方 4-6** 和 **4-10** 中描述）。\n\
  4.  选择所有你想要链接到——或导入的表。如果未使用受信任连接，请勾选“保存密码”。单击“确定”。\n\n源数据将被导入到 Access 中。\n\n###\
