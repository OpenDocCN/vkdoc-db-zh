  CH13\\MultipleFlatFiles`)。选择其中一个文件（本例中为 `Stock01.Csv`）。确保输入所有相关的配置信息（在本例中，SSIS 会正确猜出所有信息）。单击左侧的“列”以确保列映射正确，然后单击“确定”。\n\
