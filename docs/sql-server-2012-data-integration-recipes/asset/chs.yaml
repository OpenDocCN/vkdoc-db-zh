  \ 数据库的示例如 图 7-25 所示。\n\n    ![9781430247913_Fig07-25.jpg](img/9781430247913_Fig07-25.jpg)\n\
  \n    图 7-25.  从 CarSales 数据库中选择表\n\n8.  单击“完成”。表导入向导的最终窗格将出现，如 图 7-26 所示。\n\n \
  \   ![9781430247913_Fig07-26.jpg](img/9781430247913_Fig07-26.jpg)\n\n    图 7-26.  从\
  \ CarSales 数据库中选择表\n\n9.  数据传输到 PowerPivot 后，单击“关闭”以关闭对话框。\n\n## 工作原理\n尽管到目前为止本章一直在讨论从\
  \ SQL Server 推送数据，但有时你也会需要拉取数据。通常，我会说这是处理目标应用程序的人员的责任。\n\n\n\n然而，在微软 Office 产品的情况下，我做了一个例外，并解释了一些方法，说明\
  \ Excel、Access 甚至 Word 如何将 SQL Server 数据提取到它们各自的工作表、数据库和文档中。我这样做的原因很简单：当数据库管理员（DBA）无法将\
  \ SQL Server 数据导入到他/她的 MySQL 服务器时，这是他们的问题。但当一位微软 Office 用户（甚至是高级用户）无法将 SQL Server\
  \ 数据导入到他/她的应用程序时，这通常也成了 SQL Server 开发人员或 DBA 的问题。\n\n为了避免在面对用户要求他们的数据立即可用时感到尴尬，以下是将\
  \ SQL Server 数据提取到微软 Office 应用程序中的经典方法。在这些方法中，我使用的是 Office 2010。这些技术与 Office 2007\
  \ 或 Office 2013 中的技术几乎相同。对于更早版本的 Office，我只能建议你以此作为模板，因为原理是相同的；变化的只是界面。\n\n请记住，Excel\
  \ 允许你通过 `ODBC` 连接到 SQL Server。它将存储你对数据源建立的所有工作簿连接，你可以通过点击 `数据` 功能区中的 `连接` 按钮来重新使用它们。对于\
  \ `Analysis Services` 链接，请在 `来自其他源` 弹出菜单中选择 `来自 Analysis Services`。\n\nAccess 也允许你通过\
  \ `ODBC` 链接到 SQL Server 或导入数据。自 Access 2007 以来，链接到 SQL Server 表或导入表的过程几乎相同。\n\n\
  无疑，将微软 Word 链接到 SQL Server 数据库有很多理由。可能是因为你有一份需要来自 SQL Server 数据的报告，该数据必须包含并在数据更改时更新；也可能是因为你正在使用\
  \ Word 作为邮件合并（通常称为 mailings 或 mailmerge）的前端。在这里，我再次解释了如何使用 Word 2007 及更高版本，并让你自己调整过程以适应更早的版本。哦，如果你想知道这与\
  \ SQL Server 开发人员到底有什么关系，我只能建议你每次在最终用户想要使用企业数据进行邮件合并时，都要一瓶酒。你很快就会有一个很棒的酒窖！由于解释制作邮件合并的所有微妙之处超出了本书的范围，我建议你从此刻起，利用书籍和网络上一些优秀的资源来帮助你。\n\
  \n不可避免地，新加入的 `PowerPivot` 可以从 SQL Server 和 SQL Server Analysis Services 导入数据。这可以通过\
  \ `PowerPivot` 功能区完成。前提是 `PowerPivot` 已成功安装且 Excel 已打开。\n\n![image](img/sq.jpg)\n\
  \n**注意** 当前版本的 `PowerPivot` 可以在 `www.microsoft.com/en-gb/download/details.aspx?id\
  \ = 29074` 找到。\n\n### 提示、技巧和陷阱\n*   `PowerPivot` 的一个聪明选项是，如果你在第 7 步点击 `选择相关表` 按钮，它会自动选择所有表（包括直接的上下游表，使用所有选定表的外键约束）。\n\
  *   `预览和筛选` 按钮允许你应用数据源筛选器和排序。\n*   虽然微软 Word 邮件合并连接不允许你编写自定义查询，但你始终可以在 SQL Server\
  \ 中创建一个视图来连接表、聚合、筛选和排序数据，为邮件合并过程做好准备。\n*   点击 `编辑收件人列表` 按钮（在 `邮件` 功能区中）会显示 `邮件合并收件人`\
  \ 对话框，该对话框将让你：\n    *   筛选数据集。\n    *   对源数据进行排序。\n    *   查找重复项并选择要使用的记录。\n   \
  \ *   搜索源数据。\n\n## 7-24. 使用 T-SQL 导出存储在 SQL Server 中的文件\n\n### 问题\n你希望作为脚本化 T-SQL\
  \ 过程的一部分，将存储在 SQL Server 表中的二进制文件导出。\n\n### 解决方案\n使用 `BCP`，借助特定格式来处理导出文件，以导出二进制文件。以下步骤展示了如何完成。\n\
  \n1.  创建一个如下所示的格式文件 (`C:\\SQL2012DIRecipes\\CH07\\BinaryExport.fmt`)：\n    ```\n\
  \    11.0\n    1\n    1       SQLBINARY           0       0       \"\"   1     CarPhoto\
  \             \"\"\n    ```\n\n2.  使用以下 T-SQL 从表中导出所有二进制文件 (`C:\\SQL2012DIRecipes\\\
  CH07\\BinaryExport.sql`)：\n    ```\n    DECLARE @SQLTEXT VARCHAR(8000);\n    DECLARE\
  \ @Make VARCHAR(50), @CarPhotoType VARCHAR(5);\n    DECLARE @CarPhoto VARBINARY(MAX);\n\
  \    DECLARE @ID INT;\n\n    DECLARE BCPBinaryOUT_CUR CURSOR\n    FOR\n    SELECT\
  \  ID, Make, CarPhotoType, CarPhoto\n    FROM    dbo.Stock\n    WHERE   CarPhotoType\
  \ IS NOT NULL;\n\n    OPEN BCPBinaryOUT_CUR;\n    FETCH NEXT FROM BCPBinaryOUT_CUR\
  \ INTO @ID, @Make, @CarPhotoType, @CarPhoto\n\n    WHILE @@FETCH_STATUS = 0\n  \
  \  BEGIN\n        SET @SQLTEXT = 'BCP \"SELECT CarPhoto FROM CarSales.dbo.Stock\
  \ WHERE ID = ' + CAST(@ID AS VARCHAR(11)) + '\" QUERYOUT C:\\SQL2012DIRecipes\\\
  CH07\\' + @Make + '.'+ @CarPhotoType + '-fC:\\SQL2012DIRecipes\\CH07\\Binary.Fmt\
  \ -SAdam02 -UAdam –PMe4B0ss';\n        FETCH NEXT FROM BCPBinaryOUT_CUR INTO @ID,\
  \ @Make, @CarPhotoType, @CarPhoto\n        EXECUTE master.dbo.xp_cmdshell @SQLTEXT\n\
  \    END;\n\n    CLOSE BCPBinaryOUT_CUR;\n    DEALLOCATE BCPBinaryOUT_CUR;\n   \
  \ ```\n\n### 工作原理\n如果你正在使用 SQL Server 存储 **L**arge **OB**jects（**大对象**，`LOB`），那么有时你将需要从一个表中导出部分、大部分或全部数据。\n\
  \n如果你正在使用 T-SQL 导出 `BLOB`（**B**inary **L**arge **OB**ject，**二进制大对象**），那么你将需要一个包含定义\
  \ `VARBINARY` 数据类型的单列的格式文件。然后，你在 `BCP` 导出（`BCP OUT`）中使用此格式文件。这里的 SQL 使用游标遍历表中的所有记录，并导出表中所有的\
  \ `BLOB`。\n\n### 提示、技巧和陷阱\n*   确保你使用动态 SQL 创建的文件名是唯一的，否则该过程会愉快地覆盖任何现有文件。使用唯一的 `ID`\
  \ 或保证文件名唯一的字段组合是一种方法。如果所有方法都失败，请使用一个 SQL 变量，每导出一个文件就递增它。\n*   配方 7-5 中提到的所有风险、DBA\
  \ 可能的拒绝以及关于 `xp_cmdshell` 的警告，这里也同样适用。\n*   不幸的是，似乎无法使用较新的 XML 格式文件来完成此操作。\n*  \
  \ 此方法仅适用于“标准” `VARBINARY(MAX)` 字段，而不适用于超过 2 GB 大小的 `FILESTREAM` 或 `FILETABLE` 文件。\n\
  *   如果你使用的是 SQL Server 2008，格式文件必须以 `10.0` 开头；对于 SQL Server 2005，格式文件必须以 `9.0` 开头。\n\
  \n## 7-25. 定期导出存储在 SQL Server 中的文件\n\n### 问题\n你希望作为受控导出过程的一部分，将存储在 SQL Server 表中的二进制文件导出。\n\
  \n### 解决方案\n在 `数据流` 中使用 `SSIS` `导出列` 任务将二进制文件输出到磁盘，如下列步骤所述。\n\n1.  创建一个新的 `SSIS`\
  \ 包并添加一个 `OLEDB` 连接管理器。将其命名为 `CarSales_OLEDB` 并连接到你的源数据库（在此示例中为 `CarSales`）。\n2.\
  \  添加一个 `数据流` 任务，双击进行编辑，并添加一个 `OLEDB` 源组件。配置如下：\n\n    | OLEDB 连接管理器: | `CarSales_OLEDB`\
  \ |\n    | 数据访问模式: | `SQL 命令` |\n    | SQL 命令文本: | `SELECT CarPhoto, 'C:\\SQL2012DIRecipes\\\
  CH07\\' + Make + '.' + CarPhotoType AS FilePath` |\n    | | `FROM dbo.Stock` |\n\
  \    | | `WHERE CarPhotoType IS NOT NULL` |\n\n3.  点击 `确定` 确认你的修改。\n4.  向 `数据流`\
  \ 面板添加一个 `导出列` 任务。将 `OLEDB` 源控制连接到它。双击 `导出列` 任务进行编辑。\n\n\n\n"
- "# SSIS 数据导出与 SSAS 数据访问\n\n## 使用 SSIS 导出存储在 SQL Server 中的文件\n\n配置如下：\n| 提取列： | CarPhoto\
  \ |     | 文件路径列： | FilePath |\n| :--- | :--- | :--- | :--- | :--- |\n\n5.  点击“确定”确认修改。数据流面板应如图\
  \ 7-27 所示。\n    ![9781430247913_Fig07-27.jpg](img/9781430247913_Fig07-27.jpg)\n\
  \    *图 7-27. 使用 SSIS 导出存储在 SQL Server 中的文件*\n\n现在可以执行 SSIS 任务。所有 BLOB 对象都将被提取到目标目录。\n\
  \n### 工作原理\n幸运的是，使用 SSIS 导出任何大型对象（二进制或文本）都非常容易，因为 SSIS 开发团队已经提供了一个专门的 SSIS 数据流转换来实现此功能——即“导出列”任务。由于这是一个数据流，你甚至不需要使用\
  \ `Foreach Loop` 容器来确定要复制到磁盘的文件，只需为源表中的每条记录拼接一个唯一的文件名即可。必须确保创建的文件具有唯一的名称，否则该过程会毫无警告地覆盖任何现有文件。使用唯一\
  \ ID 或字段组合来保证文件名唯一是实现这一点的方法之一。\n\n### 提示、技巧和陷阱\n- 如果你愿意，可以将文件路径列组装为派生列，并使用 SSIS\
  \ 变量和列数据来定义输出路径。\n- 使用此技术时，文件大小不能超过 2 GB。\n- 导出 BLOB（我也用这个来指代字符大型对象）时，SQL 语句可能如下所示：\n\
  \    ```sql\n    SELECT   CarDocumentation, CAST('C:\\SQL2012DIRecipes\\CH07\\'\
  \ + Make + '.txt'\n              AS NVARCHAR(MAX)) AS FilePath\n    FROM     dbo.Stock\n\
  \    WHERE    CarDocumentation IS NOT NULL;\n    ```\n\n## 7-26. 偶尔使用 T-SQL 从 SSAS\
  \ 导出数据\n\n### 问题\n你希望偶尔从 SSAS 多维数据集导出表格数据。\n\n### 解决方案\n使用 `OPENROWSET` 以表格格式导出数据。\n\
  执行此操作的代码如下（`C:\\SQL2012DIRecipes\\CH07\\SSASExport.sql`）：\n```sql\nINSERT INTO OPENROWSET('Microsoft.ACE.OLEDB.12.0','Text;Database\
  \ = C:\\CookBook\\;',\n    'SELECT Client_Name, Sale_Price, Cost_Price FROM InsertMDXFile.txt')\n\
  SELECT CS.[[Dim Clients]].[Client Name]].[Client Name]].[MEMBER_CAPTION]]] AS Client_Name,\n\
  \       CS.[[Measures]].[Sale Price]]] AS Sale_Price,\n       CS.[[Measures]].[Cost\
  \ Price]]] AS Cost_Price\nFROM OPENROWSET(\n    'MSOLAP',\n    'DATASOURCE = localhost;\
  \ Initial Catalog = CarSales_OLAP;',\n    'SELECT {[Measures].[Sale Price], [Measures].[Cost\
  \ Price]} ON COLUMNS,\n           NONEMPTY(EXCEPT([Dim Clients].[Client Name].MEMBERS,\
  \ [Dim Clients].[Client Name].[All])) ON ROWS\n    FROM [Car Sales DW]'\n) AS CS;\n\
  ```\n\n### 工作原理\n在讨论从 SQL Server 导出数据时，很容易忘记 SQL Server 也包含 SQL Server Analysis\
  \ Services (SSAS)，并且有时也需要从这里导出数据。虽然技术上并不困难，但你需要记住多维数据结构与关系型结构有根本不同，并且必须在一定程度上“扁平化”导出的数据。\n\
  \n`OPENROWSET` 允许你向 OLAP 数据源发送传递查询，就像可以向任何受支持的关系型数据源发送一样。查询 Analysis Services 时，这意味着需要确保已安装\
  \ MSOLAP 提供程序。假设已安装，你可以将 MDX 查询作为 `OPENROWSET` 命令的查询部分来编写，并返回一个数据集，然后可以将其导出为文本文件、Excel\
  \ 工作表、Access 数据库或 BCP 文件。\n\n本方法有趣之处在于，你不仅使用 `OPENROWSET` 从 SSAS 返回数据，还将此数据集作为文本文件输出到磁盘。\n\
  \n`OPENROWSET` 命令使用了别名，这没有问题。\n难点在于 MDX 查询返回列标题的方式。按 SQL Server 返回的方式输入列标题会导致类似以下的错误消息：\n\
  ```sql\nMsg 207, Level 16, State 1, Line 3\nInvalid column name 'Dim Clients'.\n\
  Msg 207, Level 16, State 1, Line 4\nInvalid column name 'Measures'.\nMsg 207, Level\
  \ 16, State 1, Line 5\nInvalid column name 'Measures'.\n```\n将整个列名用方括号括起来也无济于事。诀窍在于理解右方括号是一个转义字符。因此，你需要做的是：\n\
  - 为每个现有的右方括号添加一个额外的右方括号。\n- 用方括号括住每个列的整个标题文本。\n- 确保不要重复括住整个列标题的最后一个右方括号——这样你将得到一个可用且可操作的结果集。\n\
  \n导出 SSAS 数据的难点在于编写一个正确且高效的 MDX 查询以传递给 SSAS。我只能向你推荐许多关于 MDX 的优秀书籍和其他可用资源来帮助解决这个问题，因为讨论\
  \ MDX 超出了本书的范围。\n\n### 提示、技巧和陷阱\n- 与所有使用 `OPENROWSET` 的临时导出一样，目标文件必须存在，且列名必须出现在文件中。\n\
  - 然而，你需要记住 MDX 查询和 SQL 查询是非常不同的，并且不是每个返回数据的 MDX 查询都能以你期望的方式（如果能够的话）将数据返回给 T-SQL\
  \ 查询。\n- 要使用 BCP 导出 MDX 数据，我建议先使用 `OPENROWSET` 命令将 SSAS 数据插入数据库表，然后使用 BCP 导出此表。之后可以在数据库中删除该表。\n\
  - 要连贯地输出数据，你需要对 MDX 有不止是浅显的了解，因此如果 MDX 尚未成为你技能集的一部分，请准备好应对陡峭的学习曲线。\n\n## 7-27. 定期使用\
  \ T-SQL 从 SSAS 导出数据\n\n### 问题\n你希望定期使用 T-SQL 从 SSAS 多维数据集导出表格数据。\n\n### 解决方案\n配置一个链接服务器以连接到\
  \ SSAS，然后通过链接服务器连接以表格格式导出数据。我将向你展示如何操作。\n\n1.  创建一个名为 **SSASData** 的目标表，该表已设置为保存源数据，创建语句如下（`C:\\\
  SQL2012DIRecipes\\CH07\\tblSSASData.sql`）：\n    ```sql\n    CREATE TABLE dbo.SSASData(\n\
  \        Client_Name NVARCHAR (250) NULL,\n        Sale_Price INT NULL,\n      \
  \  Cost_Price INT NULL\n    ) ;\n    ```\n2.  添加一个名为 **OLAPSERVER** 的链接服务器，使用以下代码片段（`C:\\\
  SQL2012DIRecipes\\CH07\\SSASExportLinkedServer.sql`）：\n    ```sql\n    EXEC master.dbo.sp_addlinkedserver\
  \ @server = N'OLAPSERVER', @srvproduct = N'Analysis Services', @provider = N'MSOLAP',\
  \ @datasrc = N'localhost'\n    ```\n3.  运行以下代码片段将 SSAS 数据提取到 SQL Server 表中（`C:\\\
  SQL2012DIRecipes\\CH07\\SSASToSQL.Sql`）：\n    ```sql\n    INSERT INTO SSASData (Client_Name,\
  \ Sale_Price, Cost_Price)\n    SELECT\n        CS.[[Dim Clients]].[Client Name]].[Client\
  \ Name]].[MEMBER_CAPTION]]] AS Client_Name,\n        CS.[[Measures]].[Sale Price]]]\
  \ AS Sale_Price,\n        CS.[[Measures]].[Cost Price]]] AS Cost_Price\n    FROM\
  \ OPENQUERY(OLAPSERVER,\n        'SELECT\n            {[Measures].[Sale Price],\
  \ [Measures].[Cost Price]} ON COLUMNS,\n            NONEMPTY(EXCEPT([Dim Clients].[Client\
  \ Name].MEMBERS, [Dim Clients].[Client Name]. [All])) ON ROWS\n        FROM [Car\
  \ Sales DW]\n        WHERE [Dim Products].[ProductVehicleHierarchy].[Product Type].&[Van]'\n\
  \        ) AS CS;\n    ```\n\n### 工作原理\n如果你将定期执行 OLAP 到 SQL 的输出，那么设置一个链接服务器可能是更好的选择。\n\
  \n\n\n#### 提示、技巧与陷阱\n\n*   链接服务器源可以向 `OPENROWSET` 查询或另一个链接服务器传递数据——无论是 SQL Server、Access、Excel、平面文件还是其他关系数据库。这些技术在本章其他地方有所描述。\n\
  \n### 7-28. 使用 SSIS 导出 SSAS 维度\n\n#### 问题\n\n您希望将 SSAS 维度的数据作为定期、受控导出流程的一部分导出。\n\
