  \ | 仅在特定情况下适用。 | 需要学习该工具。 |\n\n增量数据管理是一个极其复杂的挑战，几乎没有简单的解决方案。一些读者可能会觉得本章阐述的技术过于复杂而无法应用。另一些读者可能觉得它们太简单。还有一些读者可能正面临看似无法解决的问题。然而，只要有耐心和正确的分析，大多数增量数据问题都可以解决。关键在于找到正确的方法。所以，不要犹豫去测试各种解决方案，也不要害怕“混合搭配”本章中各种技巧。如果你的源表中没有“标志”列，试着去添加它们。如果无法添加，那么尝试使用哈希技术来识别已更改的行。不要害怕使用临时表或持久化表作为暂存技术。最重要的是——在定义合适的解决方案时要花足够的时间，并进行彻底的测试。\n\
  \n## 第 12 章 变更跟踪与变更数据捕获\n\n本章重点介绍两种核心技术，它们允许你检测源数据的修改，并据此用相应的变化更新目标表。用最简单的定义来说，这些技术是：\n\
  \n*   **变更跟踪**：检测某一行是否已更改。允许进程从源表返回数据的最新版本。\n*   **变更数据捕获**：检测某一行是否已更改。存储所有的中间变更以及记录的最终状态。\n\
  \n前者使用一个跟踪表和简单的版本控制，而后者读取 SQL Server 事务日志并提供复杂的版本跟踪。就其给源系统带来的开销而言，这两种技术都相对轻量，并且很大程度上是自管理的。两者都可以实现为基于\
  \ T-SQL 的解决方案或使用 SSIS。两者都无需对源表进行任何架构更改。两者都允许你决定何时应用目标表的更新，因此可以轻松地集成到常规的 ETL 流程中。根据我的经验，两者都非常健壮可靠。那么，如果这些是相似之处，它们的区别是什么——至少是在适合处理数据集成挑战的简单层面上？\n\
  \n*   **变更跟踪**是一个同步过程，它检测行是否发生了变化，但不检测具体修改了哪些数据。它在所有版本的 SQL Server 中都可用。\n*   **变更数据捕获**是一个异步过程，它读取\
  \ SQL Server 事务日志来检测你正在跟踪的表的变更。它还可以让你查看表中数据所有变更的历史记录。它仅在 SQL Server 企业版中可用。\n\n\
  虽然这两种方法都非常高效，但初次接触时，它们的实现可能看起来有点复杂。花一点时间使用它们之后，我希望你会同意这只是第一印象。为了消除最初的顾虑，我建议你在开始实现解决方案之前，先通读一遍操作步骤，并仔细查看流程图，以清楚了解如何应用该技术。\n\
  \n本章的示例文件可在本书的配套网站上找到，安装后位于 `C:\\SQL2012DIRecipes\\CH11` 文件夹中。\n\n### 12-1. 以低开销和无需自定义框架的方式检测源表变更\n\
  \n**问题**\n\n你需要一个低开销的解决方案，能够检测源数据中的变更并将其应用到目标表，而不使用触发器、不改变源表 DDL 或任何复杂流程。\n\n**解决方案**\n\
  \n在源表上启用变更跟踪，然后隔离变更并将其应用到目标表。以下步骤说明了如何操作。\n\n1.  使用以下 T-SQL 代码段在源数据库（本例中为 CarSales）中启用变更跟踪（`C:\\\
  SQL2012DIRecipes\\CH11\\ActivateChangeTracking.Sql`）：\n    ```sql\n    USE CarSales;\n\
  \    GO\n    \n    ALTER DATABASE CarSales SET ALLOW_SNAPSHOT_ISOLATION ON;\n  \
  \  ALTER DATABASE CarSales SET CHANGE_TRACKING = ON\n    (CHANGE_RETENTION = 3 DAYS,\
  \ AUTO_CLEANUP = ON);\n    ```\n2.  在目标数据库（本例中为 CarSales_Staging）中创建目标表。这是将在本方案中使用变更跟踪进行更新的表。以下是创建该表的\
  \ DDL（`C:\\SQL2012DIRecipes\\CH11\\tblClient_CT.Sql`）：\n    ```sql\n    CREATE TABLE\
  \ CarSales_Staging.dbo.\n\n\n"
- "# 使用变更跟踪进行增量数据管理\n\n## 步骤\n\n1.  创建用于接收变更的目标表。\n    ```sql\n    Client_CT     \
  \ (      \n        ID INT IDENTITY(1,1) NOT NULL,\n        ClientName NVARCHAR(150)\
  \ NULL,\n        Country TINYINT NULL,\n        Town VARCHAR(50) NULL,\n       \
  \ County VARCHAR(50) NULL,\n        Address1 VARCHAR(50) NULL,\n        Address2\
  \ VARCHAR(50) NULL,\n        ClientType VARCHAR(20) NULL,\n        ClientSize VARCHAR(10)\
  \ NULL,\n    ) ;\n    GO\n    ```\n\n2.  启用要跟踪的表的变更跟踪功能，使用以下 T-SQL 代码片段（`C:\\SQL2012DIRecipes\\\
  CH11\\ChangeTrackingClient.Sql`）：\n    ```sql\n    USE CarSales;\n    GO\n    \n\
  \    ALTER TABLE CarSales.dbo.Client\n    ENABLE CHANGE_TRACKING ;\n    GO\n   \
  \ ```\n\n3.  向正在跟踪的表（本例中为 `dbo.Client`）添加扩展属性 `LAST_SYNC_VERSION`，该属性将用于存储上次同步的数据版本号。你可以使用以下\
  \ T-SQL 代码片段完成此操作——此属性只能添加一次（`C:\\SQL2012DIRecipes\\CH11\\LastSynchVersionProperty.Sql`）：\n\
  \    ```sql\n    USE CarSales;\n    GO\n    \n    EXECUTE sys.sp_addextendedproperty\n\
  \        @level0type =  N'SCHEMA'\n        ,@level0name =  dbo\n        ,@level1type\
  \ =  N'TABLE'\n        ,@level1name =  Client\n        ,@name =  LAST_SYNC_VERSION\n\
  \        ,@value =  0\n    ;\n    ```\n\n4.  运行以下 T-SQL 代码以将相关的插入、删除和更新操作应用到目标表（`C:\\\
  SQL2012DIRecipes\\CH11\\ChangeTrackingProcess.Sql`）：\n    ```sql\n    USE CarSales;\n\
  \    GO\n    \n    BEGIN TRY\n    \n        DECLARE @LAST_SYNC_VERSION BIGINT\n\
  \        DECLARE @CURRENT_VERSION BIGINT\n        SET @CURRENT_VERSION =  CHANGE_TRACKING_CURRENT_VERSION()\n\
  \    \n        SELECT    @LAST_SYNC_VERSION =  CAST(value AS BIGINT)\n        FROM\
  \      sys.extended_properties\n        WHERE     major_id =  OBJECT_ID('dbo.Client')\n\
  \                  AND name =  N'LAST_SYNC_VERSION'\n    \n        -- 确保更新不会丢失数据的测试...\n\
  \    \n        DECLARE @MIN_VALID_VERSION BIGINT\n    \n        SELECT @MIN_VALID_VERSION\
  \ =  CHANGE_TRACKING_MIN_VALID_VERSION(OBJECT_ID('dbo.Client'));\n    \n       \
  \ IF @LAST_SYNC_VERSION >= @MIN_VALID_VERSION\n        BEGIN\n    \n           \
  \ -- 插入\n            INSERT INTO   CarSales_Staging.dbo.Client_CT\n            \
  \             (ID,ClientName,Country,Town,County, Address1,Address2, ClientType,ClientSize)\n\
  \            SELECT        SRC.ID,ClientName,Country,Town,County,Address1,Address2,\
  \ ClientType,ClientSize\n            FROM          dbo.Client SRC\n            INNER\
  \ JOIN    CHANGETABLE(CHANGES Client, @LAST_SYNC_VERSION) AS CT\n              \
  \           ON SRC.ID =  CT.ID\n            WHERE         CT.SYS_CHANGE_OPERATION\
  \ =  'I'\n    \n            -- 删除\n            DELETE FROM   DST\n            FROM\
  \           CarSales_Staging.dbo.Client_CT DST\n                         INNER JOIN\
  \    CHANGETABLE(CHANGES Client, @LAST_SYNC_VERSION) AS CT\n                   \
  \      ON CT.ID =  DST.ID\n            WHERE         CT.SYS_CHANGE_OPERATION = \
  \ 'D'\n    \n            -- 更新\n            UPDATE        DST\n            SET \
  \          DST.ClientName =  SRC.ClientName\n                         ,DST.Country\
  \ =  SRC.Country\n                         ,DST.Town =  SRC.Town\n             \
  \            ,DST.County =  SRC.County\n                         ,DST.Address1 =\
  \  SRC.Address1\n                         ,DST.Address2 =  SRC.Address2\n      \
  \                   ,DST.ClientType =  SRC.ClientType\n                        \
  \ ,DST.ClientSize =  SRC.ClientSize\n            FROM          CarSales_Staging.dbo.Client_CT\
  \ DST\n                         INNER JOIN    dbo.Client SRC\n                 \
  \        ON DST.ID =  SRC.ID\n                         INNER JOIN    CHANGETABLE(CHANGES\
  \ Client, @LAST_SYNC_VERSION) AS CT\n                         ON SRC.ID =  CT.ID\n\
  \            WHERE         CT.SYS_CHANGE_OPERATION =  'U'\n        END\n    \n \
  \       -- 在 UPSERT/DELETE 操作后\n        EXECUTE sys.sp_updateextendedproperty\n\
  \            @level0type         = N'SCHEMA'\n            ,@level0name        =\
  \ dbo\n            ,@level1type        = N'TABLE'\n            ,@level1name    \
  \    = Client\n            ,@name              = LAST_SYNC_VERSION\n           \
  \ ,@value             = @CURRENT_VERSION\n        ;\n    \n    END TRY\n    \n \
  \   BEGIN CATCH\n    \n        -- 在此处添加错误日志记录\n    \n    END CATCH\n    ```\n\n\
  ## 工作原理\n\n对于 SQL Server 开发人员和 DBA 来说幸运的是，Microsoft 在 SQL Server 2008 中引入了一个轻量级的解决方案来解决增量数据管理问题。这个解决方案称为变更跟踪，它不需要任何触发器或手工制作的表。唯一的要求是在源表和目标表上有一个主键。\n\
  \n它的优点如下：\n*   它是一个轻量级的解决方案，对服务器的额外开销很小，磁盘空间需求也很少。\n*   不需要更改源表。\n*   它是一个近乎实时的解决方案。\n\
  *   它在很大程度上是自我管理的，因为你可以为要跟踪的增量数据设置一个保留期，SQL Server 会负责清理这些历史数据。然而，这并不意味着数据同步是自动的，只是说管理变更跟踪对象在很大程度上是为你处理的。\n\
  *   它适用于所有版本的 SQL Server。\n\n然而，它有几个限制。主要的一个是变更跟踪不支持从目标“拉取”数据同步——如果你尝试这样做，会收到以下错误消息：\n\
  ```\nMsg 22106, Level 16, State 1, Line 3\nThe CHANGETABLE function does not support\
  \ remote data sources.\n```\n因此，这需要一些调整——具体来说，需要在源服务器上使用存储过程来隔离并提供数据用于插入、删除和更新。其他缺点包括：\n\
  *   必须在源表上删除 `PRIMARY KEY` 约束之前禁用变更跟踪。\n*   非主键列的数据类型更改不会被跟踪。\n*   强制执行主键的索引不能被删除或禁用。\n\
  *   截断源表需要重新初始化变更跟踪。这本质上意味着必须先为源表禁用变更跟踪，然后再重新启用它。\n\n![image](img/sq.jpg) **注意**  \
  \ Microsoft 建议你启用快照隔离，这意味着 TempDB 将被大量使用，因此你需要确保 TempDB 配置正确。然而，也有使用快照隔离的替代方案。有关完整详情，请参阅联机丛书\
  \ (BOL)。\n\n尽管如此，变更跟踪是一个健壮的解决方案，非常适合许多增量数据场景。它在以下情况下使用效果最佳：\n*   你希望在隔离增量数据时避免使用触发器或用户表。\n\
  *   当它添加到源系统的（尽管很低）开销是可接受的。\n\n我不会提供关于使用变更跟踪所能完成的所有工作的详尽描述，也不会详细介绍它在生产环境中是如何管理的。如果你需要这些信息，BOL\
  \ 很好地描述了它，并且在线上和印刷品中都有许多关于这个主题的优秀参考资料。毕竟，这本书是坚定地专注于 ETL 的。\n\n设置变更跟踪很容易。首先，必须在源数据库上设置变更跟踪，然后任何你希望跟踪其\
  \ DML 操作的表都必须启用变更跟踪。一旦完成，SQL Server 就可以检测到更改的记录，以及更改的类型（插入、更新或删除），并根据这些更改的记录执行任何所需的数据集成过程。\n\
  \n设置好变更跟踪后，你就可以开始使用它了。你需要知道的是，你必须：\n*   获取目标数据库中上次成功更新的 DML 操作的版本号。\n*   使用命令 `CHANGE_TRACKING_MIN_VALID_VERSION`\
  \ 检查自该版本号以来在你的变更跟踪历史记录中是否有数据。\n\n\n## 提示、技巧和陷阱\n\n*   存储一个名为 `LAST_SYNC_VERSION`\
  \ 属性的原因是，在检测差异时，你需要告诉 SQL Server，你想从 DML 修改历史中的哪个点开始执行数据的更新插入/删除操作。由于变更跟踪使用顺序编号来标识被跟踪表上的每一个\
  \ DML 操作，因此对于每一个数据提取操作，你都需要知道上一次使用的版本号是多少。我建议将其存储为扩展属性，不过如果你愿意，也可以将其存储在日志表中。\n*\
  \   变更跟踪的版本编号从 0 开始。\n*   指定的保留期必须至少与数据同步之间的最长时间一样长。\n*   如果你将 `AUTO_CLEANUP` 设置为\
  \ `OFF`，那么你必须在某个时候将其重置为 `ON` 以清除变更历史。没有其他方法可以清理变更跟踪。\n*   在差异跟踪的保留期（使用 `CHANGE_RETENTION`\
  \ 设置）和数据库效率之间存在不可避免的权衡。保留期越长，回溯时间检测变更就越容易——但数据库会更大、更慢。\n*   我更倾向于将执行变更跟踪的 DML 操作包装在事务中，因为这将确保\
  \ `Insert`、`Delete` 和 `Update` 命令会自动且完全地执行——或者根本不执行。当然，你应该添加足够的错误捕获和日志记录，以确保任何错误都能及时上报给\
  \ DBA，以便在变更保留期过去之前纠正任何错误。否则，只有对源表和目标表进行完全重新同步，才能确保两个数据集完全一致。然而，在同一服务器的数据库间完美工作的事务，在使用链接服务器实现时将需要\
  \ MSDTC。\n*   要重新同步源表和目标表，只需截断目标表，然后将数据从源表 `INSERT.. SELECT` 到其中（或使用你喜欢的任何其他表加载技术）。这不会对变更跟踪产生任何影响。然后，你必须将\
  \ `Last_Synch_Version` 记录（或设置扩展属性）为变更跟踪的 `Current_Version`，这样当两个源同步时，就只会检测到从此刻开始的\
  \ DML 操作。\n*   要禁用变更跟踪，只需使用以下 T-SQL 代码段：\n    ```sql\n    ALTER TABLE dbo.Client\
  \ DISABLE CHANGE_TRACKING;\n    ```\n    然后\n    ```sql\n    ALTER DATABASE CarSales\
  \ SET CHANGE_TRACKING = OFF;\n    ```\n*   注意，在数据库级别禁用变更跟踪之前，你必须先禁用所有表的变更跟踪。\n\n"
- "# 12-2. 使用变更跟踪将更改拉取到目标表中\n\n## 问题\n\n使用变更跟踪，你希望将检测到的数据变更“拉取”而非“推送”到目标表中。\n\n##\
  \ 解决方案\n\n应用“拉取”差异数据使用变更跟踪。以下 T-SQL 可以实现这一点——其中源数据位于名为 `R2` 的链接服务器上。\n\n1.  运行方案\
  \ 12-1 中的步骤 1 到 4，在源服务器 (`R2`) 上启用变更跟踪，并将目标表放置在本地服务器上。\n2.  运行以下 T-SQL 以将数据从远程服务器同步到本地服务器\
  \ (`C:\\SQL2012DIRecipes\\CH11\\PullChangeTracking.Sql`)：\n\n    ```sql\n    DECLARE\
  \ @LAST_SYNC_VERSION BIGINT\n    DECLARE @CURRENT_VERSION BIGINT\n    DECLARE @MIN_VALID_VERSION\
  \ BIGINT\n\n    -- To get the LAST_SYNC_VERSION\n    SELECT       @LAST_SYNC_VERSION\
  \ = CAST(SEP.value AS BIGINT)\n    FROM         R2.CarSales.sys.tables TBL\n   \
  \              INNER JOIN   R2.CarSales.sys.schemas SCH\n                 ON TBL.schema_id\
  \ = SCH.schema_id\n                 INNER JOIN   R2.CarSales.sys.extended_properties\
  \ SEP\n                 ON TBL.object_id = SEP.major_id\n    WHERE        SCH.name\
  \ = 'dbo'\n    AND          TBL.name = 'client'\n    AND          SEP.name = 'LAST_SYNC_VERSION'\n\
  \n    -- Gets maximum version in CHANGETABLE - so available for updating (use instead\
  \ of CHANGE_TRACKING_CURRENT_VERSION)\n    SELECT @CURRENT_VERSION = MaxValidVersion\n\
  \    FROM OPENQUERY(R2, '\n    SELECT CASE WHEN MAX(SYS_CHANGE_CREATION_VERSION)\
  \ > MAX(SYS_CHANGE_VERSION)\n                THEN MAX(SYS_CHANGE_CREATION_VERSION)\n\
  \                ELSE MAX(SYS_CHANGE_VERSION)\n           END AS MaxValidVersion\n\
  \    FROM   CHANGETABLE(CHANGES Carsales.dbo.Client, 0) AS CT\n    ')\n\n    --\
  \ Gets minimum version This one works over a linked server!\n    SELECT Min_Valid_Version\n\
  \    FROM R2.CarSales.sys.change_tracking_tables\n\n    IF @LAST_SYNC_VERSION >=\
  \ @MIN_VALID_VERSION\n    BEGIN\n    -- Get all data for INSERTS/UPDATES/DELETES\
  \ into temp tables\n    -- Deletes\n    DECLARE @DeleteSQL VARCHAR(8000) =\n   \
  \ 'SELECT ID\n    FROM OPENQUERY(R2, ''SELECT        ID\n                      \
  \ FROM       CHANGETABLE(CHANGES Carsales.dbo.Client,' +\n                     \
  \  CAST(@LAST_SYNC_VERSION AS VARCHAR(20)) + ') AS CT\n                       WHERE\
  \       CT.\n    ```\n\n\n\n"
- "# 使用变更跟踪进行增量数据同步\n\n## SQL 实现代码\n\n```sql\nSYS_CHANGE_OPERATION = ''''D'''''')'\n\
  \nIF OBJECT_ID('tempdb..#ClientDeletes') IS NOT NULL DROP TABLE tempdb..#ClientDeletes\n\
  CREATE TABLE #ClientDeletes (ID INT)\nINSERT INTO #ClientDeletes EXEC (@DeleteSQL)\n\
  \n-- 插入操作\nDECLARE @InsertsSQL VARCHAR(8000) =\n        'SELECT ID,ClientName,Country,Town,County,Address1,Address2,ClientType,ClientSize\n\
