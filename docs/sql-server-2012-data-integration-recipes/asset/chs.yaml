  \ CarSales 数据库\n\n## CarSales_Staging\n\n该数据库本质上是一个用于测试加载技术以及数据库到数据库加载的“暂存区”。其核心表与`CarSales`数据库中的表相同——但没有任何主键或外键。可以根据需要为某个方案创建其他表。可以使用以下脚本\
  \ (`C:\\SQLDIRecipes\\Databases\\CarSales_StagingDatabaseCreation.Sql`) 创建此数据库:\n\
  \n```\nUSE master\nGO\n\nIF db_id('CarSales_Staging') IS NOT NULL\n  DROP DATABASE\
  \ CarSales_Staging';\nGO\n\nCREATE DATABASE CarSales_Staging\n CONTAINMENT = NONE\n\
  \ ON  PRIMARY\n( NAME = N'CarSales_Staging',\n  FILENAME = N'C:\\SQLDIRecipes\\\
  Databases\\CarSales_Staging.mdf' ,\n  SIZE = 33792KB ,\n  MAXSIZE = UNLIMITED,\n\
  \  FILEGROWTH = 1024KB )\n LOG ON\n( NAME = N'CarSales_Staging_log',\n  FILENAME\
  \ = N'C:\\SQLDIRecipes\\Databases\\CarSales_Staging_log.ldf' ,\n  SIZE = 4224KB\
