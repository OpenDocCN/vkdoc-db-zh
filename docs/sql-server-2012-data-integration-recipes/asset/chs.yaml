  \ Analysis Services 提供程序。版本将与安装的 SSAS 版本相对应。\n*   如果您使用旧版本的 SSIS 并将数据导出到关系表，您必须小心指定目标列，尤其是数据类型，因为\
  \ SSAS 没有提供足够的信息让目标组件完美创建表——警告对话框会说明这一点（见 图 7-29）。\n    ![9781430247913_Fig07-29.jpg](img/9781430247913_Fig07-29.jpg)\n\
  \    图 7-29.  SSAS 2005/2008 中的数据类型警告\n\n*   您可能总是需要先仔细考虑目标表，然后在创建 SSIS 包之前在目标服务器上创建它。在这个特定示例中，DDL\
