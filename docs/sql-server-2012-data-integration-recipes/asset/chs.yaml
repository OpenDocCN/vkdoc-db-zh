  您没有使用 SSIS 中的 Excel 数据源，而是选择了 OLEDB 数据源。然后将其配置为使用 ACE 提供程序。


  ### 提示、技巧和陷阱


  *   Excel 2007 不像早期版本那样限制为 65,536 行，因此您可以导入相应更大量的数据。然而，在 BIDS/SSDT 中设计包时，SSIS 验证此数据所花费的时间可能长得令人望而却步——除非您显示
