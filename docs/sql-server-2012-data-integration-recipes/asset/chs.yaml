  \ 和 `OnError`）就足够了。然而，可能需要一些微调才能更进一步，更全面地跟踪事件——以及错误。\n\n如果你的脚本任务复杂或具有迭代性，你可能希望将过程事件作为任务执行的一部分记录下来。你将需要以下内容：\n\
