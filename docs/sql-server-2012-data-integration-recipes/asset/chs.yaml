  图 10-13. 从 SSIS 返回特定配置数据的最终数据流\n\n现在当您运行该包时，源数据将被读取，聚合结果将被写入目标表。数据本身不会被导入。\n\n##\
  \ 工作原理\n\n尽管 SSIS `配置` 任务很好，但很可能在很多情况下，您宁愿不嫌麻烦地用其他方式配置数据——这可能意味着使用一些标准的 `数据流` 组件。这种“自己动手”的\
  \ SSIS 配置方法有一些优点：\n\n*   您可以 `在导入数据的同时` 运行它——因此一旦数据导入过程完成，您就不需要再花时间对导入的数据执行配置分析，无论是使用\
  \ T-SQL 还是 SSIS `数据配置` 任务。\n*   您可以配置 `SSIS 能够连接的任何数据源`——而不仅仅是 ADO.NET SQL Server（2000\
  \ 及以上版本）源。至少您可以不“作弊”地做到（如配方 10-8 所述）——以及随之而来的速度影响。\n\n这个包的作用是收集一小部分配置计数器。有些——比如\
  \ `Mileage_MAX` 和 `Mileage_MIN`——像前面的配方一样作为列添加。其他的（这里是 `RowCount`）则传递给包变量，并在初始配置运行后添加一次。后一种技术是必要的，因为\
  \ `行数` 任务只允许在其数据流完成后使用其变量。\n\n无论如何，您使用 T-SQL 可以执行的大多数基本数值配置也可以使用 SSIS 完成。正如我之前所说（但这一点很重要，所以值得重复），使用\
  \ SSIS 的优势在于，数据配置可以成为现有数据流的一部分，这通常比在初始数据加载后在暂存表上运行 T-SQL 查询更快。\n\n然而，每个优点都有其缺点，对于\
  \ SSIS 和自定义数据配置，有几组问题。首先，SSIS 仅包含 T-SQL 中开箱即用的统计函数的一个子集：最大值、最小值、计数、不同计数和域分析。SSIS\
  \ 不包含计算字段长度和域百分比的函数。\n\n克服这些限制需要在初始处理后运行一些代码。这在配方 10-16 中有描述。此外，组合您可能需要的所有配置（属性配置和域分析）可能需要相对复杂的\
  \ SSIS 操作，并且输出结果有些繁琐，因为这涉及捕获处理的总行数以及捕获列的最大值和最小值。\n\n## 提示、技巧和陷阱\n\n*   确保所有变量都在包级别设定作用域。\n\
  *   如果您使用的是 SQL Server 2005 或 2008，您将不得不使用 `自定义属性` 对话框添加变量名，如图 10-14 所示。\n![9781430247913_Fig10-14.jpg](img/9781430247913_Fig10-14.jpg)\n\
  图 10-14. 在 SSIS 2005/2008 中添加计数器变量\n*   当将变量设置为派生列的源表达式时，请记住，您可以在 `派生列转换编辑器` 对话框的左上窗格中展开\
  \ `变量` 树，并将变量拖动到 `表达式` 列。\n*   SSIS 将只允许应用适当的分析——您不能为非数值数据选择平均值、最大值或最小值。因此，如果您使用的是\
  \ `平面文件` 源，请确保您已将数值数据类型指定为 `高级` 列属性的一部分，或使用 `数据转换` 任务来确保数值数据类型。\n*   要对同一列应用多项分析，请将该列从选项卡的上部拖动到对话框的下部。\n\
  *   要从聚合分析中删除列，请在 `聚合转换编辑器` 的下部右键单击它并选择 `删除`。\n*   如果源数据是平面文件，并且不包含列名，请务必在 `数据源编辑器`\
  \ 的 `高级` 窗格中添加它们。\n*   您可以根据需要向 SSIS 任务添加任意多个 `行计数` 任务。但是，每个任务都需要声明并分配一个单独的变量。\n\
  \n#### 10-12. SSIS 中的域分析\n\n### 问题\n\n您希望在对数据源进行属性分析的同时，为其提供自定义域分析。\n\n### 解决方案\n\
