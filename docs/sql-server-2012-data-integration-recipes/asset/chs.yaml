  10. 在**控制流**窗格中添加一个**For 循环**容器，并将**脚本**任务连接到它。将其命名为`容器 0`。双击进行编辑，并按如下设置 For 循环属性：\n\
  \    | InitExpression: | `@Counter0 = 0` |\n    | --- | --- |\n    | EvalExpression:\
