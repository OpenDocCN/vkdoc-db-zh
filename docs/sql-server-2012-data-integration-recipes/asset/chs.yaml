  ![9781430247913_Fig11-19.jpg](img/9781430247913_Fig11-19.jpg)\n\n图 11-19. 在目标端隔离增量数据并向源端返回查询以获取增量数据的完整流程\n\
  \n## 工作原理\n\n有时，除了对要提取数据的源表拥有读取权限外，源数据库不授予任何其他权限。这实际上排除了使用临时表的可能性，或者可能也排除了如前面方法所述将表值参数传递给存储过程。那么，除了将庞大的数据集提取到暂存表并在暂存数据库中执行增量比较之外，是否还有其他有效的替代方案呢？\n\
  \n幸运的是，有一种可行的替代方案，但我必须强调，它仅在处理相对较小的增量数据时才真正有用。这种技术包括检测增量标识符，然后将它们作为 `SELECT` 子句的一部分传回用于数据提取。\n\
  \n由于这很大程度上是方法 11-6 中描述的技术的延伸，我将在描述在该方法中已充分描述的技术时力求简洁，以便在此专注于将增量 ID 传回源数据库的不同方式。此方法将在目标服务器上使用临时表来保存需要删除的所有记录的\
  \ ID，以及需要更新的所有记录的全部数据。将使用哈希列来检测增量数据。然而，在这一点上，删除的增量 ID 将用于填充 `##Tmp_Deletes` 表，而插入和更新的\
  \ ID 将分别填充一个 ADO 记录集。然后，这些 ID 将作为 SQL `SELECT` 语句的 `WHERE` 子句发送回源服务器，以获取插入的记录（这些记录将直接加载到目标表中）以及更新的记录（这些记录将加载到临时表\
  \ `##Tmp_Updates` 中，用于作为基于集合的单一操作在目标表中执行更新）。\n\n图 11-20 展示了流程概览。\n\n![9781430247913_Fig11-20.jpg](img/9781430247913_Fig11-20.jpg)\n\
  \n图 11-20. 在目标端检测增量数据并向源端返回选择性请求的流程\n\n本方法描述的方法最适合在以下情况下使用：\n\n*   当您对源数据表只有 `SELECT`\
  \ 权限时。\n*   当您预计增量数据集非常小时。\n*   当源数据集很大时。\n\n该方法的核心是，在插入和更新数据过程中，都使用一个 SSIS 对象变量来填充一个\
  \ ADO.NET 数据表。该数据表中的每一行都是一个必须从源数据加载的 ID，因此每个 ID 都会被添加到一个 `stringbuilder` 中，以连接成一个列表，该列表将成为发送到源数据表的\
  \ SQL 语句中 `WHERE` 子句的一部分。\n\n## 提示、技巧和陷阱\n\n*   由于本方法描述的包将使用临时表，因此您必须使用方法 11-5 中描述的“脚手架”方法。即，在创建\
  \ SSIS 包时，在目标数据库中为临时表 `##TMP_Deletes`、`##TMP_Inserts`、`##TMP_Updates` 和 `##Invoice_Lines_Updates`\
  \ 创建普通表。然后，在 SQL 和变量中将对真实表的引用替换为对临时表的引用，并在目标数据库中删除这些表。\n*   使用插入和更新流的计数器很重要，否则将无效的\
  \ SQL 发送回源数据库，导致流程失败。\n*   需要重申的是，此方法不适合处理海量增量数据。然而，尽管 `stringbuilder` 很快且高效（至少与字符串变量相比），但在数据流中它仍然缓慢且开销大。\n\
  \n## 11-8. 当 MERGE 不适用时，使用 T-SQL 和链接服务器检测并加载增量数据\n\n### 问题\n\n您想在链接的源服务器上检测增量数据，并且希望仅在不使用\
  \ `MERGE` 的情况下将增量数据传输到目标。这可能是因为使用 `MERGE` 比基于表的解决方案更慢。\n\n### 解决方案\n\n在源端检测增量标识符，在目标端进行比较，然后仅请求增量数据以进行更新/插入操作。\n\
  \n\n操作方法如下——假设你有一个名为 `ADAMREMOTE` 的链接服务器，其中包含 `CarSales` 数据库和 `dbo.Invoice_Lines`\
  \ 表。代码位于 (`C:\\SQL2012DIRecipes\\CH11\\TableMergeReplacement.Sql`)。\n\n```sql\n\
  IF OBJECT_ID('TempDB..#Upsert') IS NOT NULL DROP TABLE #Upsert\nSELECT    ID, VersionStamp\n\
  INTO      #Upsert\nFROM      ADAMREMOTE.CarSales.dbo.Invoice_Lines\n\n-- 插入\n; WITH\
  \ Inserts_CTE AS (\n    SELECT    ID\n    FROM      #Upsert U\n    WHERE     ID\
  \ NOT IN (\n                  SELECT ID FROM dbo.Invoice_Lines WITH (NOLOCK)\n \
  \             )\n)\nINSERT INTO dbo.Invoice_Lines (\n    ID\n    ,InvoiceID\n  \
  \  ,SalePrice\n    ,StockID\n    ,VersionStamp\n)\nSELECT SRC_I.ID\n    ,InvoiceID\n\
  \    ,SalePrice\n    ,StockID\n    ,VersionStamp\nFROM            ADAMREMOTE.CarSales.dbo.Invoice_Lines\
  \ SRC_I WITH (NOLOCK)\nINNER JOIN      Inserts_CTE CTE_I\n                ON SRC_I.ID\
  \ = CTE_I.ID\n\n-- 更新\n; WITH Updates_CTE AS (\n    SELECT          S_U.ID\n   \
  \ FROM            dbo.Invoice_Lines S_U WITH (NOLOCK)\n                    INNER\
  \ JOIN   #Upsert U WITH (NOLOCK)\n                    ON S_U.ID = U.ID\n    WHERE          \
  \ S_U.VersionStamp<> U.VersionStamp\n)\nUPDATE            DST_U\nSET              \
  \ DST_U.InvoiceID = SRC_U.InvoiceID\n                 ,DST_U.SalePrice = SRC_U.SalePrice\n\
                   ,DST_U.StockID = SRC_U.StockID\n                 ,DST_U.VersionStamp\
  \ = SRC_U.VersionStamp\nFROM            dbo.Invoice_Lines DST_U\n                INNER\
  \ JOIN   ADAMREMOTE.CarSales.dbo.Invoice_Lines SRC_U\n                ON SRC_U.ID\
  \ = DST_U.ID\n                INNER JOIN   Updates_CTE CTE_U\n                ON\
  \ DST_U.ID = CTE_U.ID\n\n-- 删除\nDELETE FROM     dbo.Invoice_Lines\nWHERE          \
  \ ID NOT IN (SELECT ID FROM #Upsert)\n```\n\n### 工作原理\n\n不仅 SSIS 能从在实际执行所需的插入和更新操作之前先检测增量数据中受益——在某些情况下，如果你能通过链接服务器连接到源数据，那么你也可以使用\
  \ T-SQL 采用这种方法。你可以使用与前一个方法描述的类似过程来：\n\n*   从源表收集主键和增量标志列。\n*   将此与目标数据表进行比较。\n*\
  \   返回源以收集新的和已修改的数据。\n\n前面的代码片段应用此逻辑来检测并仅对增量数据进行更新插入/删除。这是一个从目标服务器运行的“拉取”过程。当然，这种方法会使用更多到源服务器的往返行程，但它确实让你有更大的控制权，并且比\
  \ `MERGE` 函数更少“黑盒”特性，也可能更容易理解。它的另一个优点是只需要在目标服务器上使用一个临时表。然而，我必须强调，任何潜在的速度提升都取决于基础设施（源服务器和目标服务器的配置，以及网络链接）以及——关键的是——源表和目标表上任何索引的性质。因此，在假设这种方法适合你之前，你应该测试这种方法并与简单的\
  \ `MERGE` 进行比较。当你的测试显示在两个系统之间选择性传输数据比简单的 `MERGE` 更快时，这个过程效果最佳。\n\n它是这样工作的：首先，主键和增量检测标志列从源服务器传输到目标服务器上的临时表\
  \ `#Upsert` 中。然后，使用源表和目标表中的主键列，识别出任何新记录（通过使用普通的旧 `WHERE NOT IN` 或类似子句）。检测到的任何更新都从源服务器获取并在目标应用。增量检测标志列允许这样做。最后，任何删除——软删除或硬删除——都可以使用另一个\
  \ `WHERE NOT IN` 或类似子句来应用。请记住，如果索引能加快处理速度，你可以为临时表添加索引。\n\n![image](img/sq.jpg) `注意`\
  \ 如果你没有使 `MERGE` 如此高效的索引，那么你可能会发现 `MERGE` 比替代解决方案更慢。不可避免地，这将取决于每种具体情况，因此你必须在你的特定环境中测试任何可能的解决方案。\n\
  \n### 11-9. 检测、记录和加载增量数据\n\n#### 问题\n\n你希望处理增量数据的更新插入，同时能够跟踪更改并按要求执行更新。\n\n####\
  \ 解决方案\n\n使用触发器和触发器元数据表来检测数据更改，并使用 SSIS 定期加载到目标数据库。\n\n1.  在目标数据库 (`CarSales_Staging`)\
  \ 中创建两个表——删除任何你之前已创建的旧版本——用于保存更新和删除操作的数据。对于本例，表结构如下 (`C:\\SQL2012DIRecipes\\CH11\\\
  TriggerTablesSource.Sql`)：\n\n```sql\nCREATE TABLE CarSales_Staging.dbo.Invoice_Lines_Updates\n\
  (\n ID int NOT NULL,\n InvoiceID INT NULL,\n StockID INT NULL,\n SalePrice NUMERIC(18,\
  \ 2) NULL,\n CONSTRAINT PK_Invoice_Lines_Updates PRIMARY KEY CLUSTERED\n (\n ID\
  \ ASC\n ) WITH (PAD_INDEX  = OFF, STATISTICS_NORECOMPUTE  = OFF, IGNORE_DUP_KEY\
  \ = OFF, ALLOW_ROW_LOCKS  = ON, ALLOW_PAGE_LOCKS  = ON)\n) ;\nGO\n\nCREATE TABLE\
  \ CarSales_Staging.dbo.Invoice_Lines_Deletes\n(\n ID INT NOT NULL,\n CONSTRAINT\
  \ PK_Invoice_Lines_Deletes PRIMARY KEY CLUSTERED\n (\n ID ASC\n ) WITH (PAD_INDEX\
  \  = OFF, STATISTICS_NORECOMPUTE  = OFF, IGNORE_DUP_KEY = OFF, ALLOW_ROW_LOCKS \
  \ = ON, ALLOW_PAGE_LOCKS  = ON)\n) ;\nGO\n```\n\n2.  在源数据库中创建一个跟踪表。为了简单起见，我将假设源数据有一个单一的主键列，并且该列是\
  \ `INT` 数据类型 (`C:\\SQL2012DIRecipes\\CH11\\TriggerTablesDestination.Sql`)。\n\n```sql\n\
  CREATE TABLE CarSales.dbo.DeltaTracking\n(\n DeltaID BIGINT IDENTITY(1,1) NOT NULL,\n\
  \ ObjectName NVARCHAR (128) NULL,\n RecordID BIGINT NULL,\n DeltaOperation CHAR(1)\
  \ NULL,\n DateAdded DATETIME NULL DEFAULT (getdate()),\n CONSTRAINT PK_DeltaTracking\
  \ PRIMARY KEY CLUSTERED\n (\n DeltaID ASC\n ) WITH (PAD_INDEX  = OFF, STATISTICS_NORECOMPUTE\
  \  = OFF, IGNORE_DUP_KEY = OFF, ALLOW_ROW_LOCKS  = ON, ALLOW_PAGE_LOCKS  = ON)\n\
  ) ;\nGO\n```\n\n3.  同样为了简单起见，这里是一个（相当）通用的跟踪触发器，可以添加到任何具有单一 `INT` 数据类型主键列的表（在源数据库中）\
  \ (`C:\\SQL2012DIRecipes\\CH11\\tr_DeltaTracking.Sql`)：\n\n```sql\nCREATE TRIGGER\
  \ CarSales.dbo.tr_DeltaTracking\nON dbo.Invoice_Lines FOR INSERT, UPDATE, DELETE\n\
  AS\n    DECLARE @InsertedCount BIGINT\n    DECLARE @DeletedCount BIGINT\n    DECLARE\
  \ @ObjectName   NVARCHAR(128)\n\n    SELECT    @InsertedCount = COUNT(*) FROM INSERTED\n\
  \    SELECT    @DeletedCount = COUNT(*) FROM DELETED\n\n    SELECT    @ObjectName\
  \ = OBJECT_NAME(parent_id)\n    FROM      sys.triggers\n    WHERE     parent_class_desc\
  \ = 'OBJECT_OR_COLUMN'\n          AND object_id = @PROCID\n\n    -- 插入\n    IF @InsertedCount\
  \ >  0 AND @DeletedCount = 0\n    BEGIN\n        INSERT INTO dbo.DeltaTracking (RecordID,\
  \ ObjectName, DeltaOperation)\n        SELECT\n            ID\n            ,@ObjectName\
  \ AS ObjectID\n            ,'I' AS DeltaOperation\n        FROM INSERTED\n    END\n\
  \n    -- 删除\n    IF @InsertedCount = 0 AND @DeletedCount > 0\n    BEGIN\n      \
  \  INSERT INTO dbo.DeltaTracking (RecordID, ObjectName, DeltaOperation)\n      \
  \  SELECT\n            ID\n            ,@ObjectName AS ObjectID\n            ,'D'\
  \ AS DeltaOperation\n        FROM DELETED\n    END\n\n    -- 更新\n    IF @InsertedCount\
  \ > 0 AND @DeletedCount > 0\n    BEGIN\n        INSERT INTO dbo.\n```\n\n\nDeltaTracking\
  \ (记录 ID, 对象名, 增量操作) SELECT ID, @ObjectName AS ObjectID, 'U' AS DeltaOperation FROM\
  \ INSERTED END GO\n\n4.  首先同步源表和目标表之间的数据，之后再允许对源表进行任何数据修改。此步骤很简单，包括：(a) 防止对源数据表进行更新，(b)\
