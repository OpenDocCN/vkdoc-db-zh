- '# 工作原理


  在许多情况下，你可能需要从一个目录中的文件加载数据。这些文件可能是平面文件数据（例如逗号分隔文件）、XML 文件甚至是图像文件。


  现在，加载目录中的所有文件是一种标准技术，之前在食谱 12-1 中已经解释过。然而，正如许多评论者所指出的，标准的 Foreach Loop 容器除了指定文件名和扩展名模式外，不允许你做任何其他事情。有时你可能需要指定加载顺序，或者根据文件系统暴露的属性（如创建日期或文件大小等）来筛选目录中的文件。


  尽管有几种方法可以对源文件（无论它们包含何种类型的数据）进行排序和筛选，但我更喜欢使用 SSIS 和脚本任务来实现。这种方法依赖于 ADO.NET 数据集来执行排序和筛选。这种方法既可靠又易于维护。它将需要创建和使用两个
  .NET 数据集。一个数据集保存你用来存储待加载文件的目录中文件的名称和属性。然后创建此 .NET 数据集的一个克隆——这个克隆将被筛选和排序。此克隆数据集用于迭代要加载的文件。


  为了使此过程更加灵活，我建议将以下项作为变量传入：


  *   要处理的目录的 `name`。

  *   文件 `filter`。

  *   `sort` 列。


  传入这些项目当然不是绝对必要的，但它使程序包更易于重用。你还需要一个字符串变量来保存正在加载的实际文件的文件名，以及一个对象变量来保存排序后的数据表。


  以下是脚本代码的工作原理：为了使脚本更具动态性，声明了两个变量，它们的内容从 SSIS 变量传入。这些（`FileSource` 和 `FileFilter`）将传入要解析的目录和要应用的文件筛选器。声明变量以保存文件的所有必需属性。当然，如果你仅对一个或两个属性进行排序和/或筛选，那么你只需要使用相应的变量即可使代码更易于维护。最初创建一个
  `Main` 数据集。该数据集又包含 `Main` 表，该表将填充来自所选目录的文件列表。定义了 `Main` 表，包含你可能使用的每个文件属性的列。


  脚本的下一部分循环遍历目录（作为变量传入），获取文件名，并根据文件筛选器（作为变量传入）获取属性。每个属性传递给相应的脚本变量。在表中添加一个新行，并使用脚本变量中的属性填充每一列。由于无法直接对
  ADO 数据集进行排序或筛选，因此创建了一个克隆的数据表（`SortedFilteredDS`），该表使用伪代码进行排序和/或筛选：


  ```

  Select

  ```


  `Main` 表中的每个源行都被复制到克隆的 `SortedFilteredTable` 表中。克隆的数据表作为 SSIS 变量传出，该变量将用于 Foreach
  Loop 任务。我添加了一个文件计数器，如果你希望用于审核和日志记录，可以将其传出 SSIS 任务。


  '
- "# 提示、技巧和陷阱\n\n*   记住对服务器和目录名称使用 UNC 路径，以确保可移植性。\n*   你不需要通过基于零的索引来引用数据表中的列（就像我在本食谱的代码中所做的那样）。你可以使用列名，例如：\n\
  \    ```\n    MainRow(\"FileName\") = FileName\n    ```\n*   你选择的变量名不必与列名完全相同——我只是发现这样编码和调试都更简单。\n\
  *   当（或者如果）进行排序时——因为这不是强制性的——请记住使用你作为 ADO.NET 表的一部分定义的列名进行排序。\n*   将排序列作为变量传入意味着你必须小心处理引号字符串。如果你对排序列进行硬编码，那么只需输入\
  \ `FileSize ASC`（按 ado.NET 数据表中的 `FileSize` 列排序）就足够了。\n*   筛选条件可以更复杂，可以包括多个列和标准的比较运算符。一个更复杂的例子可能是：\n\
  \    ```\n    \"FileSize > 10000 AND LastWriteTime <= '2010-12-25'\"\n    ```\n\
  *   请注意，筛选条件中使用的所有文本字符串必须用单引号括起来，并且有几种可能的日期格式。我更喜欢使用 YYYY-MM-DD。\n*   如果你想排序而不筛选，那么你需要运用一些技巧。.NET\
  \ `Select` 方法要求在排序之前先进行筛选；也就是说，没有一个重载允许你仅输入排序参数。因此，一个很好的作弊方法是使用如下代码：\n    ```\n\
  \    Select\n    ```\n    这筛选了所有大小为 1 字节或更大的文件（这意味着在大多数情况下所有有用的文件），但它按文件创建日期排序。\n\
  *   如果你使用的是 SSIS 2005 或 2008，则需要在 `Imports` 指令中添加对 `System.Xml` 的引用。\n\n"
- "# 13-5. 并行加载多个平面文件\n\n问题\n\n你想从单个目录中结构相同的多个平面文件加载数据，希望比严格按顺序加载文件更快。\n\n解决方案\n\n\
  按如下方式并行加载数据。\n\n1.  在 SQL Server 中创建一个表来保存文件名，使用以下 DDL（`C:\\SQL2012DIRecipes\\CH13\\\
  tblSimpleParallelLoad.Sql`）：\n    ```\n    CREATE TABLE CarSales_Staging.dbo.SimpleParallelLoad\n\
  \    (\n     ID INT IDENTITY(1,1) NOT NULL,\n     FileName VARCHAR (250) NULL,\n\
  \     ProcessNumber  AS (ID%(4))\n    ) ;\n    GO\n    ```\n2.  在 SQL Server 中创建一个表来保存加载后的数据，使用以下\
  \ DDL（`C:\\SQL2012DIRecipes\\CH13\\tblParallelStock.Sql`）：\n    ```\n    CREATE\
  \ TABLE CarSales_Staging.dbo.ParallelStock\n    (\n     ID bigint IDENTITY(1,1)\
  \ NOT NULL,\n     Make VARCHAR (50) NULL,\n     Marque NVARCHAR(50) NULL,\n    \
  \ Model VARCHAR (50) NULL,\n     Colour TINYINT NULL,\n     Product_Type VARCHAR\
  \ (50) NULL,\n     Vehicle_Type VARCHAR (20) NULL,\n     Cost_Price NUMERIC(18,\
  \ 2) NULL\n    )\n    ```\n3.\n\n\n## 主要步骤\n\n将源文件列表输入到你在步骤 1 中创建的表（`SimpleParallelLoad`）中。当前示例中的\
  \ DDL 位于（`C:\\SQL2012DIRecipes\\CH13\\PrepSimpleParallelLoad.Sql`）：\n```sql\nUSE\
  \ CarSales_Staging\nGO\nSET IDENTITY_INSERT dbo.SimpleParallelLoad ON\nGO\nINSERT\
  \ dbo.SimpleParallelLoad (ID, FileName)\nVALUES (1, N'C:\\SQL2012DIRecipes\\CH13\\\
  MultipleFlatFiles\\Stock01.Csv')\nGO\nINSERT dbo.SimpleParallelLoad (ID, FileName)\n\
  VALUES (2, N'C:\\SQL2012DIRecipes\\CH13\\MultipleFlatFiles\\Stock02.Csv')\nGO\n\
  INSERT dbo.SimpleParallelLoad (ID, FileName)\nVALUES (3, N'C:\\SQL2012DIRecipes\\\
  CH13\\MultipleFlatFiles\\Stock03.Csv')\nGO\nINSERT dbo.SimpleParallelLoad (ID, FileName)\n\
  VALUES (4, N'C:\\SQL2012DIRecipes\\CH13\\MultipleFlatFiles\\Stock04.Csv')\nGO\n\
  SET IDENTITY_INSERT dbo.SimpleParallelLoad OFF\nGO\n```\n\n4.  创建一个新的 SSIS 包，并将其命名为`SimpleParallelProcessing`。添加两个连接管理器——一个\
  \ OLEDB，一个 ADO.NET——它们将连接到用于加载数据和元数据的数据库（本例中为`CarSales_Staging`）。我将它们分别命名为`CarSales_Staging_OLEDB`和`CarSales_Staging_ADONET`。\n\
  \n5.  在任务级别添加以下变量及其初始值：\n\n    | 变量名称 | 类型 | 值 | 注释 |\n    | --- | --- | --- | ---\
  \ |\n    | `CreateList` | Boolean | String | 指示是否要删除并重新创建列表的标志。 |\n    | `FileFilter`\
  \ | String | *.CSV | 允许指定要使用的文件扩展名。 |\n    | `FileSource` | String | `C:\\SQL2012DIRecipes\\\
  CH13` | 允许指定要使用的文件目录。 |\n\n    当然，如果你不完全遵循此示例，应使用你自己的文件筛选器和源目录。\n\n6.  在“数据流”窗格上添加一个“序列容器”，并将其命名为`Create\
  \ table of files to process`。\n\n7.  在“序列容器”中添加一个“执行 SQL 任务”，并将其命名为`Prepare Table`。双击进行编辑。设置以下元素：\n\
  \    *   **连接类型：** `OLEDB`\n    *   **连接：** `CarSales_Staging_OLEDB`\n    *   **SQL\
  \ 语句：** `TRUNCATE TABLE dbo.SimpleParallelLoad`\n\n    “执行 SQL 任务编辑器”对话框应如图 13-14\
  \ 所示。\n\n    ![9781430247913_Fig13-14.jpg](img/9781430247913_Fig13-14.jpg)\n\n \
  \   图 13-14.  用于截断表的执行 SQL 任务\n\n8.  点击“确定”进行确认。\n\n9.  在刚创建的“执行 SQL 任务”下方的“序列容器”中添加一个“脚本组件”。将其命名为`Loop\
  \ Through Files and Write to table`，并将“执行 SQL 任务”`Prepare Table`连接到它。\n\n10. 双击进行编辑，将“脚本语言”设置为`Microsoft\
  \ Visual Basic 2010`，并添加以下只读变量：\n    *   `User::FileFilter`\n    *   `User::FileSource`\n\
  \n11. 点击“编辑脚本”。\n\n12. 将`Main`方法替换为以下内容（位于`C:\\SQL2012DIRecipes\\CH13\\SimpleParallelLoad.Vb`）：\n\
  \    ```vbnet\n    Public Sub Main()\n            Dim sqlConn As SqlConnection\n\
  \            Dim sqlCommand As SqlCommand\n\n            sqlConn = DirectCast(Dts.Connections(\"\
  CarSales_Staging_ADONET\"). _\n                                 AcquireConnection(Dts.Transaction),\
  \ SqlConnection)\n\n            Dim FileSource As String = Dts.Variables(\"FileSource\"\
  ).Value.ToString\n            Dim FileFilter As String = Dts.Variables(\"FileFilter\"\
  ).Value.ToString\n            Dim dirInfo As New System.IO.DirectoryInfo(FileSource)\n\
  \            Dim fileSystemInfo As System.IO.FileSystemInfo\n            Dim FileName\
  \ As String\n\n            Dim sqlText As String\n\n            For Each fileSystemInfo\
  \ In dirInfo.GetFileSystemInfos(FileFilter)\n\n                FileName = fileSystemInfo.Name\n\
  \                sqlText = \"INSERT INTO dbo.SimpleParallelLoad (FileName) VALUES('\"\
  \ & FileName & \"')\"\n                sqlCommand = New SqlCommand(sqlText, sqlConn)\n\
  \                sqlCommand.CommandType = CommandType.Text\n                sqlCommand.ExecuteNonQuery()\n\
  \n            Next\n\n            Dts.TaskResult = ScriptResults.Success\n\n   \
  \     End Sub\n    ```\n\n13. 关闭 SSIS 脚本任务窗口，然后单击“确定”以确认对“脚本组件”的修改。\n\n14. 在刚创建的“脚本任务”下方的“序列容器”中添加一个“脚本组件”。将其命名为`Reset\
  \ variable`，并将“`Loop Through Files and Write to table`”脚本组件连接到它。双击编辑这第二个“脚本组件”，并添加`CreateList`读/写变量。\n\
  \n15. 单击“编辑脚本”并将`Main`方法替换为以下内容：\n    ```vbnet\n    Public Sub Main()\n        \
  \   Dts.Variables(\"CreateList\").Value = False\n           Dts.TaskResult = ScriptResults.Success\n\
  \    End Sub\n    ```\n\n16. 关闭 SSIS 脚本任务窗口，然后单击“确定”以确认你的修改。现在包的第一部分已完成，它将按需（重新）创建要处理的文件列表。SSIS\
  \ 包应如图 13-15 所示。\n\n    ![9781430247913_Fig13-15.jpg](img/9781430247913_Fig13-15.jpg)\n\
  \n    图 13-15.  并行加载包的初始部分\n\n17. 现在开始实际的并行处理。在包级别添加以下变量：\n\n    | 变量名称 | 类型 | 值\
  \ | 注释 |\n    | --- | --- | --- | --- |\n    | `Batch_0` | Object |  | 四个批次中的第一个。\
  \ |\n    | `Batch_1` | Object |  | 四个批次中的第二个。 |\n    | `Batch_2` | Object |  | 四个批次中的第三个。\
  \ |\n    | `Batch_3` | Object |  | 四个批次中的第四个。 |\n    | `FileName_Batch_0` | String\
  \ |  | 批次一将加载的文件名。 |\n    | `FileName_Batch_1` | String |  | 批次二将加载的文件名。 |\n   \
  \ | `FileName_Batch_2` | String |  | 批次三将加载的文件名。 |\n    | `FileName_Batch_3` | String\
  \ |  | 批次四将加载的文件名。 |\n\n18. 在“序列容器”下方添加一个“执行 SQL 任务”，将后者连接到新任务，并将其重命名为`Prepare destination\
  \ table`。双击进行编辑。设置以下元素：\n    *   **连接类型：** `OLEDB`\n    *   **连接：** `CarSales_Staging_OLEDB`\n\
  \    *   **SQL 语句：** `TRUNCATE TABLE dbo.ParallelStock`\n\n19. 单击“确定”进行确认。\n\n20.\
  \ 添加一个新的“平面文件连接管理器”，将其命名为`Process0`，并将其配置为连接到任一源文件。在此连接管理器的属性中，将其`ConnectionString`的表达式设置为`@[User::FileName_Batch_0]`（如配方\
  \ 13-1，步骤 14 至 20 所述）。\n\n21. 在“准备目标表”任务下方添加一个“执行 SQL 任务”，将后者连接到新任务，并将其重命名为`Get\
  \ Batch 0`。双击进行编辑。设置以下元素：\n    *   **连接类型：** `ADO.NET`\n    *   **连接：** `CarSales_Staging_ADONET`\n\
  \    *   **SQL 语句：**\n        ```sql\n        SELECT   FileName\n        FROM  \
  \   dbo.SimpleParallelLoad\n        WITH (NOLOCK)\n        WHERE    ProcessNumber\
  \ = 0\n        ```\n\n22. 单击“确定”进行确认。\n\n23. 在“准备目标表”任务下方添加一个“Foreach 循环容器”，将后者连接到新任务，并将其重命名为`Load\
  \ all files in Batch 0`。双击进行编辑。设置以下元素：\n    *   **枚举器：** `Foreach ADO Enumerator`\n\
  \    *   **ADO 对象源变量：** `Batch_0`\n    *   **变量：** `FileName_Batch_0`\n\n24. 单击“确定”进行确认。\n\
  \n\n"
- "# 并行加载源文件\n\n在 Foreach Loop 容器内添加一个 Data Flow 任务，并将其配置为使用`CarSales_Staging_OLEDB`连接管理器，将\
  \ Flat File 连接管理器`Process0`连接到目标表`ParallelStock`。确保勾选了`Tablock`选项。\n\n26. 重复步骤 22\
  \ 到 24 三次（为每个额外的并行加载执行一次）。务必为 Flat File 连接管理器命名为`Process1`、`Process2`和`Process3`。将\
  \ Process Loop 容器命名为`Load all files in Batch 1`、`Load all files in Batch 2`和`Load\
  \ all files in Batch 3`。最终的包应如图 13-16 所示。\n    ![9781430247913_Fig13-16.jpg](img/9781430247913_Fig13-16.jpg)\n\
  \    图 13-16。完整的并行加载包\n\n现在可以运行该包了。\n\n## 工作原理\n\n本方案基于这样的场景：你接收到许多格式相同的平面文件，都需要加载到同一张表中。显然你可以如前面的方案所示，顺序处理它们，但在大多数情况下，并行处理应该会更快。速度的提升通常值得为创建更复杂的\
  \ SSIS 包所付出的额外努力。\n\n在本方案中，我们将加载操作分为两个不同的部分进行：\n*   首先，遍历目录中的文件，并将文件路径存储在 SQL Server\
  \ 表中。\n*   其次，使用此表作为文件名的来源来加载文件，其中每个独立的文件加载任务独立地遍历分配给它的文件，而不受其他待加载文件的影响。\n\n将这两部分分开处理，并首先为源文件分配进程号，使得流程的每个分支只加载自己的文件集，这一点很重要，因为每个进程都是独立的。你可以将其想象为给每个文件贴上“旗帜”，告诉它该走哪条路径。\n\
  \n你可以如方案 13-4 所述，使用 ADO.NET 记录集作为此技术的一部分，但我更倾向于引入另一种方法，即使用持久化的数据库表。这似乎更可取，因为使用表可以将列表存储在磁盘上，并且可以为日志记录和批处理提供基础，正如方案\
  \ 13-12 将要描述的那样。\n\n我们必须清楚这个包将实现什么。它将简单地将所有源文件分成批次（这里我使用四个，每个将是一个独立的并行进程）并处理它们。它不会尝试执行任何负载平衡或进程排序。因此，当所有文件大小大致相同，并且你不需要寻找最优顺序时，这种方法很有效。然而，它在概念和实践上都因其简单性而吸引人。用于定义哪个文件分配给哪个进程的技术是使用一个\
  \ SQL Server 标识列，然后应用“% 4”来依次为每个文件创建数字 0 到 3（应用模运算符后的余数）作为单独的`ProcessNumber`列。在此示例中，进程线程分配被定义为一个计算列，以避免额外的步骤。然后，包含文件名和批号的表被用作并行加载的源列表。当然，你不必使用四个并行进程——你可以使用更多或更少。具体需要多少进程才能达到最优的数据加载性能，可能需要你在与生产环境相同的配置中进行大量测试。\n\
  \n为了扩展功能，我将添加一个调整来重用——或截断——待处理文件列表，如果源数据发生变化，这将允许重新处理定义好的文件列表。这就是`CreateList`变量的用途。当包加载时，此变量设置为`True`，因此初始列表在`SimpleParallelLoad`\
  \ SQL Server 表中被截断，然后重新填充。\n\n表填充后，该变量被设置为`False`，因此除非你需要重新创建它，否则表将保持持久化。这允许你从命令行或\
  \ SQL Server 代理作业传入变量，并控制重新处理。\n\n如果这个过程看起来相当复杂，那么我建议你仔细查看图 13-16 中整个作业的截图。这有望使事情更清晰一些。\n\
  \n![image](img/sq.jpg)\n**注意** 在 OLEDB 目标任务中，必须勾选`Tablock`复选框，因为这将允许并行批量加载发生。不这样做将大大减慢加载速度。通常，为了高效的并行加载，目标数据库不能处于\
  \ FULL 恢复模式。此外，不应有任何非聚集索引。这在方案 14-10 中有更深入的讨论。\n\n#### 提示、技巧与陷阱\n\n*   务必测试执行并行处理所需的时间，永远不要假定它自动会更快。测试，测试，再测试！\n\
  *   包含用于隔离待处理文件列表任务的 Sequence 容器并非绝对必要，但它有助于在视觉上隔离流程的初始部分。\n*   你可以在 Script 任务中使用存储过程而不是\
  \ SQL 文本。尽管这稍微复杂一些，但被认为是更好的编码实践。在这种情况下，使用`sqlCommand.CommandType = CommandType.StoredProcedure`，将存储过程的名称添加为`SqlCommand`，并在“参数”窗格中定义任何参数。\n\
  *   为了简单起见，在本方案中，我将`SimpleParallelLoad`控制表放在了与数据加载目标相同的数据库中。在生产环境中，你可能希望将其放在单独的日志记录和监控数据库中。\n\
  *   什么是并行加载任务的最优数量？这是一个好问题，需要明智地使用那个神圣的答案：“视情况而定。”通常，更准确的回答是“不超过可用处理器核心的数量，也不要多到使\
  \ I/O 子系统过载”。因此，再次强调，在尝试生产运行之前，最好在与生产环境相同的测试系统上进行测试和测量。\n\n"
- "# 13-6. 使用负载平衡加载源文件\n\n## 问题\n\n你希望使用可用处理器以最佳效果并行加载多个结构相同的文件。\n\n## 解决方案\n\n使用负载平衡并行加载文件。现在我将向你展示如何执行多个并行文件加载，同时通过跨可用处理器核心平衡负载来优化时间：\n\
  \n1.  创建一个表，用于记录文件加载完成后的情况。创建此表的代码如下（C:\\SQL2012DIRecipes\\CH13\\tblBulkFilesLoaded.Sql）：\n\
  \    ```\n    CREATE TABLE CarSales_Staging.dbo.BulkFilesLoaded\n    (\n     ID\
  \ int IDENTITY(1,1) NOT NULL,\n     DateAdded DATETIME NULL DEFAULT GETDATE(),\n\
  \     FileName NVARCHAR(250) NULL,\n     Source TINYINT NULL\n    ) ;\n    GO\n\
  \    ```\n2.  创建一个新的 SSIS 任务。添加一个指向目标数据库（此例中为`CarSales_Staging`）的 OLEDB 连接管理器，命名为`CarSales_Staging_OLEDB`。创建一个指向`CarSales_Staging`数据库的\
  \ ADO.NET 连接管理器，命名为`CarSales_Staging_ADONET`。这将用于写入`BulkFilesLoaded`表。\n3.  添加以下变量：\n\
  \    | 变量名 | 类型 | 值 | 注释 |\n    | --- | --- | --- | --- |\n    | `FilePath` | String\
  \ | `C:\\SQL2012DIRecipes\\CH13\\ MultipleFlatFiles` | 源文件的路径。 |\n    | `FileType`\
  \ | String | .CSV | 源文件扩展名。 |\n    | `MaxFiles` | Int32 | 1000 | 要处理的最大可能文件数。 |\n\
  \    | `RecordSet` | Object |  | 保存待处理文件列表的 ADO 记录集。 |\n\n\n\n| | `Counter0` | `Int32`\
  \ | | 对应可用处理器的处理器亲合性的最低计数器值。 | | `FileName0` | `String` | | 映射到最低处理器亲合性的文件名变量。 |\
  \ | ... | | | | | `Counter’n’` | | | 对应最高处理器亲合性的最高计数器值。 | | `FileName’n’` | | |\
  \ 映射到最高处理器亲合性的文件名变量。 |\n\n4.  添加一个名为`准备日志表`的**执行 SQL**任务，并双击进行编辑。配置如下：\n    | 连接类型：\
  \ | `ADO.NET` |\n    | --- | --- |\n    | 连接： | `CarSales_Staging_ADONET` |\n  \
  \  | SQL 语句： | `TRUNCATE TABLE dbo.BulkFilesLoaded` |\n\n5.  添加一个**脚本**任务，并将前一个任务连接到它。设置以下变量为读写：`User::FilePath`、`User::FileType`、`User::MaxFiles`、`User::RecordSet`。\n\
  6.  将脚本语言设置为`Microsoft Visual C# 2010`，然后点击**编辑脚本**。\n7.  在`namespaces`区域添加以下引用：\n\
  \    ```\n    using System.IO;\n    ```\n8.  用以下代码替换`Main`方法（`C:\\SQL2012DIRecipes\\\
  CH13\\LoadBalancing1.cs`）：\n    ```\n    public void Main()\n    {\n        // 创建数据集以保存文件名\n\
  \        DataSet ds = new DataSet(\"ds\");\n        DataTable dt = ds.Tables.Add(\"\
  FileList\");\n\n        DataColumn IndexID = new DataColumn(\"IndexID\", typeof(System.Int32));\n\
  \        dt.Columns.Add(IndexID);\n        DataColumn FileName = new DataColumn(\"\
  FileName\", typeof(string));\n        dt.Columns.Add(FileName);\n        DataColumn\
