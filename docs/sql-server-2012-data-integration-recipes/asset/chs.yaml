  \    图 12-7。 CDC 源对话框\n26. 添加一个 CDC 拆分器任务（在 SSIS 工具箱中，位于 Other Transforms 中），并将\
  \ CDC 源任务连接到它。\n27. 添加一个 OLEDB 目标任务，并将 CDC 拆分器连接到它。将其命名为 `Inserts`，并从 CDC 拆分器任务中选择\
  \ `InsertOutput` 作为要使用的输出。\n28. 配置 OLEDB 目标任务如下：\n    | 名称 | `Inserts` |\n    |\
  \ OLEDB Connection Manager | `CarSales_Staging_OLEDB` |\n    | Data Access Mode\
  \ | `Table or view – Fast Load` |\n    | Name of Table or View | `dbo.Client_CDCSSIS`\
  \ |\n29. 映射所有数据列（***不是***那些由 CDC 使用并以 `__` 开头的列）并点击确定。\n30. 添加一个 OLEDB 目标任务，并将 CDC\
  \ 拆分器连接到它。将其命名为 `Deletes`，并从 CDC 拆分器任务中选择 `DeleteOutput` 作为要使用的输出。配置 OLEDB 目标任务如下：\n\
  \    | 名称 | `Deletes` |\n    | OLEDB Connection Manager | `CarSales_Staging_OLEDB`\
  \ |\n    | Data Access Mode | `Table or view – Fast Load` |\n    | Name of Table\
  \ or View | `dbo.CDC_Client_Deletes` |\n31. 仅映射 `ID` 列并点击确定。\n32. 添加一个 OLEDB 目标任务，并将\
  \ CDC 拆分器连接到它。选择 `UpdateOutput` 作为要使用的输出。将其命名为 `Updates`，并配置 OLEDB 目标任务如下：\n   \
  \ | 名称 | `Updates` |\n    | OLEDB Connection Manager | `CarSales_Staging_OLEDB`\
  \ |\n    | Data Access Mode | `Table or view – Fast Load` |\n    | Name of Table\
  \ or View | `dbo.CDC_Client_Updates` |\n33. 映射所有数据列（但不包括 CDC 特定的列——那些以双下划线开头的列）并点击确定。数据流应如\
  \ 图 12-8 所示。\n    ![9781430247913_Fig12-08.jpg](img/9781430247913_Fig12-08.jpg)\n\
  \    图 12-8。 CDC upsert 过程\n34. 返回控制流窗格。添加一个 CDC 控制任务，将其命名为 `Set end LSN`。\n\n\n\
  \n## 在 SSIS 中实现 CDC\n\n将数据流任务连接到它，并像配置“获取起始 LSN” CDC 控制任务一样进行配置，只是要确保选择“标记已处理范围”作为\
  \ CDC 控制操作。\n\n35. 添加一个执行 SQL 任务。将“设置结束 LSN” CDC 控制任务连接到它。按如下配置：\n\n| 名称 | 更新语句\
  \ |\n| --- | --- |\n| 连接类型 | OLEDB |\n| 连接管理器 | `CarSales_Staging_OLEDB` |\n| SQL\
  \ 语句 | `UPDATE D` |\n| | `C:\\SQL2012DIRecipes\\CH11\\SSISCDCUpdates.Sql` |\n| |\
  \ `SET` |\n| | `D.ClientName = S.ClientName` |\n| | `,D.Address1 = S.Address1` |\n\
  | | `,D.Address2 = S.Address2` |\n| | `,D.Town = S.Town` |\n| | `,D.County = S.County`\
  \ |\n| | `,D.PostCode = S.PostCode` |\n| | `,D.Country = S.Country` |\n| | `,D.ClientType\
  \ = S.ClientType` |\n| | `,D.ClientSize = S.ClientSize` |\n| | `,D.ClientSince =\
  \ S.ClientSince` |\n| | `,D.IsCreditWorthy = S.IsCreditWorthy` |\n| | `,D.DealerGroup\
  \ = S.DealerGroup` |\n| | `,D.MapPosition = S.MapPosition` |\n| | `FROM CarSales.dbo.client\
  \ D` |\n| | `INNER JOIN dbo.CDC_Client_Updates S` |\n| | `ON S.ID = D.ID` |\n\n\
  36. 添加一个执行 SQL 任务。将你命名为 `Updates` 的执行 SQL 任务连接到它。按如下配置：\n\n| 名称 | 删除语句 |\n| ---\
  \ | --- |\n| 连接类型 | OLEDB |\n| 连接管理器 | `CarSales_Staging_OLEDB` |\n| SQL 语句 | `DELETE\
  \ D` |\n| | `FROM CarSales.dbo.client D` |\n| | `INNER JOIN dbo.CDC_Client_Deletes\
  \ S` |\n| | `ON S.ID = D.ID` |\n\n现在你可以运行该包了（它看起来应如 图 12-9 所示）。对源数据所做的任何修改都将反映在目标表中。\n\
  \n![9781430247913_Fig12-09.jpg](img/9781430247913_Fig12-09.jpg)\n图 12-9。完整的 CDC\
  \ 流程\n\n### 工作原理\n\nSQL Server 2012 的一个新特性是能够“直接”从 SSIS 使用变更数据捕获（无需将 SSIS 作为包装器来调用纯\
  \ T-SQL 技术）。此方法使用 Attunity 开发的三个 SSIS 任务，如 表 12-1 所示。\n\n表 12-1。用于变更数据捕获的 SSIS 任务\n\
  \n| 元素 | 类型 | 描述 |\n| --- | --- | --- |\n| CDC 控制任务 | 任务 | 使用 LSN 处理要处理的数据范围。 |\n\
  | CDC 源 | 数据源 | 连接到启用了 CDC 的表。 |\n| CDC 分流器 | 转换 | 根据数据修改的类型（插入、更新或删除）拆分数据输出。 |\n\
  \n重要的是要理解，基于 CDC 的流程需要一个初始的“同步”加载，将所有数据从源表复制到目标表，并存储所使用的结束 LSN，这样此后只会将增量数据从源传输到目标。这几乎总是最好作为一个单独的\
  \ SSIS 包来处理。执行初始加载后，你可以使用 SSIS 通过 CDC 保持源表和目标表的同步。\n\n如你所见，SSIS 本质上是底层 CDC 过程的一个接口。由于该过程本身已在配方\
  \ 12-4 中描述，我在此不再赘述，而是请你回看前几页。\n\nCDC 状态表包含的数据类似于 图 12-10。\n\n![9781430247913_Fig12-10.jpg](img/9781430247913_Fig12-10.jpg)\n\
  图 12-10。CDC 状态表\n\n我不建议修改此表，而是建议你别动它。这个存储 CDC 状态的表可以放在任何可用的数据库中，不必与源或目标数据库相同。`CDC_Client_Updates`\
  \ 和 `CDC_Client_Deletes` 表具体放在哪里完全由你决定。\n\n我倾向于将它们放在一个临时表中，以免弄乱最终数据库——但这取决于你选择（或受限）的体系结构。\n\
  \nCDC 分流器任务本质上是一个配置非常巧妙且完全锁定的条件分流任务。你无法向其添加输出或列。但是，如果你愿意，可以在目标表中使用 CDC 特定的列（`__$start_lsn`、`__$operation`\
  \ 和 `$__update_mask`）。在这种情况下，你可能还希望将 `InsertOutput` 发送到临时表以进行进一步处理。\n\n### 提示、技巧和陷阱\n\
  \n*   如果需要，你可以向此包的开始添加一个执行 SQL 任务来截断目标表——以防你需要多次运行它。\n*   我知道最佳实践规定我们使用 SQL 只 `SELECT`\
  \ 将成为数据流一部分的列，但根据我的经验，CDC 几乎总是传输所有列——因此我选择了更简单的源数据选择解决方案，即获取整个表。\n*   在生产环境中，你无疑需要在初始加载前删除索引，并在之后重新创建它们。\n\
  *   如果你在包级别创建连接管理器，那么它们可以在初始加载包和增量数据加载包中重复使用——假设两个包都在同一个项目中。\n\n## 将变更数据捕获与 Oracle\
  \ 源数据结合使用\n\n### 问题\n\n你希望以最小的影响检测 Oracle 源数据库上的数据变更，并仅将修改应用到 SQL Server 目标数据库。\n\
