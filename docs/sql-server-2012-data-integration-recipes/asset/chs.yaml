  \ T-SQL 脚本\n如果你需要目标表的 DDL，SSMA 可以为你创建，步骤如下：\n1.  单击“创建架构”可生成创建表所需的 T-SQL。要使用此代码，请单击右下角窗格中的“SQL”选项卡。向下滚动到\
