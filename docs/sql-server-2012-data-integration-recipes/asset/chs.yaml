- "# 第 2 章\n\n![image](img/frontdot.jpg)\n\n## 平面文件数据源\n\n在大多数人都不愿记起的许多年里，`SQL Server`\
  \ 开发人员或 DBA 面临的最常见的外部数据源是文本文件。\n\n\n“平面”文件近乎无处不在，其必然结果便是催生了一个规模虽小却随时间不断发展的工具与技术生态系统，以帮助我们将所有文本文件数据源加载到\
  \ SQL Server 中。面对如此繁多的解决方案，本章我将重点考察以下几种主要方法：\n\n*   导入/导出向导\n*   SSIS\n*   `OPENROWSET`\
  \ 和 `OPENDATASOURCE`\n*   `BULK INSERT`\n*   链接服务器\n*   `BCP`\n\n正如你所料，它们各有优缺点。本章旨在向你介绍每种方法的用途与实用性，并希望能阐明每种方法如何以及何时可以（并且很可能应该）被使用。此外，由于文本文件往往并不像它们本可以那样简单，我将概述一些技巧来处理它们可能带来的一些更棘手的问题。\n\
  \n然而，在深入探讨从文本文件（或平面文件——我交替使用这两个术语）导入数据的具体细节之前，我们需要澄清几个基本概念。首要问题是：你处理的是真正的 CSV 文件吗？这有关系吗？澄清这一点很重要，因为许多被描述为\
  \ CSV 文件的文本文件实际上并非如此。\n\n假设你接收的文本文件不包含一个文件中多种不同类型的记录，那么你看到的可能是一个分隔文件，其中数据是“表格化”的，但“列”由特定字符分隔，“行”则由另一个（非打印）字符分隔。根据此类文件的布局方式，它可能被视为\
  \ CSV 文件。\n\n关于文本文件何时是 CSV（逗号分隔值）文件，存在大量讨论。得益于几年前的一些出色工作，现在有了一个以 RFC（征求意见稿）形式存在的\
  \ CSV 文件规范（详情参见 `http://tools.ietf.org/html/rfc4180`）。我建议将 CSV 视为大多数平面文件所遵循规范的一个子集，即一种使用列分隔符和记录分隔符的分隔数据格式。RFC\
  \ 规范本质上可归结为以下几点：\n\n*   每条记录独占一行，以换行符（CR/LF）分隔。\n*   文件中的最后一条记录可以有也可以没有最终的换行符。\n\
  *   文件第一行可以出现一个可选的标题行，其格式与普通记录行相同。此标题包含与文件中字段相对应的名称，并且应包含与文件中其余记录相同数量的字段。\n*   在标题和每条记录中，可以有一个或多个由逗号分隔的字段。\n\
  *   整个文件中每行应包含相同数量的字段。\n*   空格被视为字段的一部分，不应被忽略。\n*   记录中的最后一个字段后面不能跟逗号。\n*   每个字段可以用双引号括起来，也可以不用。如果字段没有用双引号括起来，那么字段内部就不能出现双引号。\n\
  *   包含双引号、逗号和换行符（CR/LF）的字段，应用双引号括起来。\n*   如果使用双引号括住字段，那么出现在字段内部的双引号必须通过在其前面添加另一个双引号来进行“转义”。\n\
  \n以上是理论。实践——正如你可能已经发现的——可能完全是另一回事。正如 RFC 所述，“各实现之间存在相当大的差异”。事实上，许多平面文件传输被称为 CSV，但它们其实是\
  \ TSV（制表符分隔）、PSV（管道符分隔）——或者确实是任何你能想到的字符分隔。因此，我的观点是，在现实世界的数据传输场景中，对于分隔数据传输而言，最重要的一点是**一致性**。文件是否符合\
  \ RFC 规范根本不重要。SQL Server 提供的所有用于平面文件加载的工具几乎都能处理（或经过调整后能处理）一致的分隔文件格式。\n\n因此，本质上，如果你需要的是\
  \ CSV、TSV、PSV 或任何其他形式的表格化数据文件，你需要问清楚以下问题：\n\n*   源数据中使用哪个字符作为字段分隔符？\n*   如何标识记录的结束？\n\
  *   文件中用于转义的前两个字符是否会在字段内部使用？\n*   引号的使用是否一致（即，要么每个文件“列”的所有数据都使用引号）——或者完全不用？\n\n\
  一旦你了解了这些信息，你就可以尝试加载文件，并设法处理它可能带来的任何困难。在大多数情况下，如果你收到一个确实符合标准的 CSV 文件，那么你可以认为自己是幸运的。如果你真的足够幸运，可以指定格式。如果是这种情况，那么我刚才列出的四个问题应作为你指定源格式的基本准则。\n\
  \n“经典”的字段分隔符是逗号（CSV 中的“C”）。然而，你可能会经常发现使用制表符、管道符以及许多其他字符——甚至是一小串字符——作为字段分隔符。如果你处理的是来自欧洲大陆（更不用说世界其他地区）的数据，你可能需要使用分号作为分隔符，以便让逗号保留作为小数分隔符。\n\
  \nCSV 规范将记录结束指示符定义为 CR/LF 字符。你也可能发现仅使用回车符（CR）或换行符（LF）。\n\n这正是在实践中可能变得棘手的地方。你可能会发现字段分隔符由反斜杠（`\\\
  `）转义，或者整个字段被引号括起来，字段主体中的所有引号都加倍。这通常是平面文件加载中最棘手的一个方面。本章将描述处理此问题的各种技巧。\n\n有时，你可能需要处理包含不止一种记录类型、并且不像“经典”\
  \ CSV 文件那样简单表格化的文本文件。这些文件不可避免地需要一些自定义处理，将在本章末尾进行探讨。幸运的是，SQL Server 2012 在处理包含不同列（或者如果你愿意这样想，也可以说是多个列分隔符）的文本文件方面取得了长足进步。我们同样会在本章末尾看到这一点。\n\
  \n要跟随本章给出的示例操作，你需要创建示例数据库 `CarSales` 和 `CarSales_Staging`，其描述见附录 B。你还需要从本书的配套网站下载示例文件，并将它们放置在你的\
  \ SQL Server 上的 `C:\\SQL2012DIRecipes\\CH02\\` 目录中。我建议你在不同的操作步骤（Recipe）之间，删除并重新创建目标表（如果它们已存在），以确保目标结构是干净的。\n\
  \n## 2-1. 从文本文件导入数据\n\n### 问题\n\n你想尽可能快速、轻松地导入一个平面文件。\n\n### 解决方案\n\n运行导入/导出向导。\n\
  \n面对分隔文本文件或 CSV 文件时，经典的方法是尝试使用导入/导出向导来导入它。由于本向导已在第 1 章介绍过，这里我将更加简明扼要。更详细的描述请参阅操作步骤（Recipe）1-2。\n\
  \n1.  确保目标数据库中已创建正确的表结构。在此示例中，是 `CarSales_Staging` 中的 `dbo.Invoices` 表。详情见附录 B。\n\
  2.  在 SSMS 中，右键单击目标数据库（此示例中为 `CarSales_Staging`），选择 **任务** ![image](img/arrow.jpg)\
  \ **导入数据**。如果出现欢迎屏幕，请单击 **下一步**。\n3.  选择 **平面文件源** 作为数据源。对话框将切换以提供所有平面文件选项。浏览到你的源文件或输入完整路径和文件名（`C:\\\
  SQL2012DIRecipes\\CH02\\Invoices.Txt`）。\n4.  指定列名位于第一行，并且文本限定符为 `<无>`。\n\n\n\n将行首分隔符定义为`<CR>`\
  \ `<LF>`，并选择格式为“带分隔符”。最终应出现一个类似图 2-1 的对话框。\n![9781430247913_Fig02-01.jpg](img/9781430247913_Fig02-01.jpg)\n\
  图 2-1. 导入/导出向导中的平面文件源\n\n5.  单击“列”，这将显示可用列的列表。如果需要，您可以在此处更改特定的列分隔符。\n6.  单击“高级”。这允许您为每列定义数据类型。您还可以设置长度、精度或小数位数（取决于数据类型）——或者保留默认值，如图\
  \ 2-2 所示。\n![9781430247913_Fig02-02.jpg](img/9781430247913_Fig02-02.jpg)\n图 2-2.\
  \ 在导入/导出向导中定义数据类型\n7.  单击“下一步”。检查目标服务器、数据库和身份验证是否正确。\n8.  单击“下一步”。确保已选择所需的目标表。\n\
  9.  单击“下一步”。确认已选择“立即运行”。\n10. 单击“下一步”，然后单击“完成”，再单击“完成”，最后单击“关闭”。您的数据应被正确导入。\n\n\
  ### 工作原理\n导入/导出向导获取您的平面文件，并协助您定义其主要特征。然后，您可以在列级别指定更高级的属性。如果需要，您可以让此向导猜测源文件中的元数据特征。\n\
  \n### 提示、技巧和注意事项\n*   有关启动导入/导出向导的其他方法，请参阅 `技巧 1-2`。\n*   您可以通过单击“建议类型”按钮，让导入/导出向导为数据的每一列建议数据类型。这在\
  \ `技巧 2-3` 中有更详细的说明。\n\n## 2-2. 导入带分隔符的文本文件\n### 问题\n您需要定期导入平面文件，和/或在结构化的 ETL 流程中应用数据转换。\n\
  \n### 解决方案\n创建一个 SSIS 包来导入文件。具体操作如下：\n1.  创建一个新的 SSIS 项目，或打开现有项目，并添加一个新包。\n2.  在“控制流”窗格上添加一个“数据流任务”。通过执行以下任一操作来编辑此任务：\n\
  \    *   双击。\n    *   右键单击并选择“编辑”。\n    *   单击“数据流”选项卡。\n3.  从工具箱的“数据流源”中添加一个“平面文件源”。双击“平面文件源”进行编辑。您应该会看到如图\
  \ 2-3 所示的对话框。\n![9781430247913_Fig02-03.jpg](img/9781430247913_Fig02-03.jpg)\n图\
  \ 2-3. SSIS 中的平面文件源编辑器\n4.  单击“新建”以指定文件连接，这将打开“文件连接管理器编辑器”。浏览以选择源文件（或者，如果您愿意，也可以直接键入）。在此示例中，它是\
  \ `C:\\SQL2012DIRecipes\\CH02\\Invoices.Txt`。指定列名是否在首行，输入文本限定符，并选择行分隔符（或保留默认值）。您最终应得到类似图\
  \ 2-4 所示的内容。\n![9781430247913_Fig02-04.jpg](img/9781430247913_Fig02-04.jpg)\n图 2-4.\
  \ 在导入/导出向导中定义平面文件的基本参数\n5.  单击“高级”。为每个输出列定义数据类型和长度。对话框应如图 2-5 所示。\n![9781430247913_Fig02-05.jpg](img/9781430247913_Fig02-05.jpg)\n\
  图 2-5. 在 SSIS 中为平面文件定义数据类型\n6.  单击两次“确定”以确认并返回到“数据流”窗格。\n7.  从工具箱中将一个“OLE DB 目标”添加到“数据流”窗格，并将文本源的输出（绿色箭头）连接到“OLE\
  \ DB 目标”。\n8.  双击“OLE DB 目标”进行编辑。单击“新建”以添加一个 OLE DB 连接管理器，您将其配置为连接到目标数据库（在此示例中为\
  \ `CarSales_Staging`）。或者，您可以选择现有的连接管理器。\n9.  选择目标表（在此示例中为 `dbo.Invoice`）。或者，单击“新建”以创建一个新表，该表将自动设计为映射到感知到的源结构。如果您愿意，可以更改\
  \ SSIS 建议的目标表名称。单击“确定”确认。\n10. 在 OLE DB 连接管理器对话框左侧的列表中，单击“映射”。确保源数据映射到目标列。\n11.\
  \ 单击“确定”。\n12. 单击“调试” ![image](img/arrow.jpg) “开始调试”以从文本文件导入数据。SSIS 现在将导入您的数据。\n\
  \n### 工作原理\n在数据导入的实际应用中，SSIS 可能是您使用最多的工具。尽管如此，如果能够打开源文件查看其内容，或者已经获知其内容的足够信息以了解以下几点，总是有帮助的：\n\
  *   它是否包含列标题。\n*   每列数据的数据类型和长度是什么。\n*   文件是否始终包含相同数量的列分隔符。\n\n但是，如果您没有关于文本文件中数据的核心信息，那么您可以通过预览数据并让\
  \ SSIS 猜测数据类型，从 SSIS 中获取源文件的元数据——正如您将在 `技巧 2-3` 中发现的那样。假设您拥有这些信息，SSIS 将帮助您完成导入文本文件的过程。对于不是特别巨大的平面文件，您可以在文本编辑器中打开源文件，并尝试直接推断元数据。\n\
  \n![image](img/sq.jpg) **注意** 如果您在设置“数据流任务”时未指定任何数据类型，SSIS 会假定每列都是 `VARCHAR(50)`。\n\
  \n将数据类型定义和调整作为 SSIS 的直通处理可能意味着大量的工作。幸运的是，SSIS 有办法在这方面帮助您，您将在 `技巧 2-3` 中看到。有趣的是，实际工作是在“平面文件连接管理器”中完成的，而不是在“数据源任务”中。\n\
  \n如果您遇到困难，首先应该查看的可能是基本的文本文件规范。如果您查看本技巧步骤 5 中所示的“平面文件连接管理器”对话框，您将在“常规”窗格中看到表 2-1\
  \ 中列出的项目。\n\n表 2-1. 平面文件连接管理器“常规”窗格选项\n| 窗格 | 元素 | 说明 |\n| --- | --- | --- |\n|\
  \ 常规 | 区域设置 | 允许您为源数据选择区域设置。这在导入和排序日期时间数据类型时使用。 |\n| 常规 | 代码页 | 提供源数据文件的代码页。如果您确定要使用正确的代码页，可以从可用的源代码页中选择。\
  \ |\n| 常规 | Unicode | 指定源文件为 Unicode 格式，这使得指定代码页变得多余。 |\n| 常规 | 文本限定符 | 如果源数据将文本数据括在双引号（或单引号）中，您可以在此处输入文本限定符。列分隔符可以在文件（常规）级别全局设置，如果需要，可以为每个单独的列覆盖。\
  \ |\n| 常规 | 行首分隔符 | 允许您选择行首的分隔符。 |\n| 常规 | 要跳过的行首 | 定义在文件开头要跳过的行数（包括行首）。 |\n| 常规\
  \ | 列名位于第一个数据行 | 允许您指定源文件的第一行数据包含列标题。这些标题随后将被 SSIS 在数据流中使用。 |\n| 列 | 重置列 | 将所有列定义重置为\
  \ SSIS 标准 (`VARCHAR(50)`)。 |\n\n那么您可能会如何使用这些元素呢？根据我的经验，以下是您最可能需要的那些：\n*   `文本限定符`。\n\
  \n\n\n## 2-3. 自动确定数据类型\n\n### 问题\n\n您想要推断源平面文件中数据的结构。\n\n### 解决方案\n\n使用平面文件连接管理器中的\
  \ SSIS `建议类型` 选项。\n\n我将解释一种简单的方法，用于获取源文本文件中实际数据类型和长度的合理近似值。这同样是使用`平面文件连接管理器编辑器`的高级面板完成的。由于本配方建立在配方\
  \ 2-2 的基础上，为避免重复，您需要先阅读前一个配方再使用本配方。\n\n1.  遵循配方 2-2 的步骤 1 至 4。\n2.  点击 `高级`。\n3.\
  \  点击 `建议类型`。将出现 `建议列类型` 对话框，如 图 2-6 所示。\n\n    ![9781430247913_Fig02-06.jpg](img/9781430247913_Fig02-06.jpg)\n\
  \n    图 2-6. 在 SSIS 中自动确定列类型\n\n4.  修改您希望调整的任何选项（例如，对于大文件的准确采样来说，行数可能太少）。点击 `确定`。\n\
  \n您将看到所有数据类型（以及在适当情况下的长度）已在对话框的高级面板中进行了采样和调整（图 2-5）。\n\n### 工作原理\n\n您可能已经注意到，在导入文本文件时，`平面文件`连接管理器假定分隔文本文件中的所有源列都是长度为\
  \ 50 个字符的字符串。这可能因以下几个原因而限制过强：\n\n*   许多字段不是字符串，因此需要在 SSIS 包中作为数据类型转换的一部分。\n*   建议的\
  \ 50 个字符长度对于许多字符串字段来说不足，可能导致包在运行时出错。\n*   即使所有源列都能放入 50 个字符内，这也通常过宽，因为它减少了可放入 SSIS\
  \ 管道缓冲区中的记录数量，从而减慢了加载过程。\n\n当然，提供源文件的人员通常会解决这个问题，他们会体贴地提供文件内容的完整数据类型描述。然而，也可能存在并非如此的情况，您必须推断、发现或猜测源文件中的字段（或您喜欢的列）类型和长度。这可能是一个痛苦的过程，特别是如果它意味着基于试错的加载和重新加载文本文件的循环，直到您最终为每个源列找到可接受的数据类型。因此，一个更简单的解决方案是让\
  \ SSIS 为您猜测数据类型和长度。诚然，您可以打开一些文件查看源数据。但快速浏览很少是准确的分析样本。更重要的是，有些源平面文件非常大，以至于它们要么需要很长时间才能打开，要么会直接导致您喜爱的文本编辑器崩溃。\n\
  \n了解在确定源文件中的数据类型时您的选项会有所帮助，这些选项在 表 2-2 中提供。\n\n表 2-2. 建议列类型选项\n\n| 选项 | 描述 |\n|\
  \ --- | --- |\n| 行数 | 要采样的行数。在 SQL Server 2012 中似乎没有上限。在 SSIS 2008 及之前版本中，限制为 1000\
  \ 条记录。 |\n| 建议最小的整数数据类型 | 对于仅包含整数的列，建议能够容纳数据而不溢出的最小整数类型。 |\n| 建议最小的实数数据类型 | 对于包含实数（numeric\
  \ 数据类型）数字的列，建议能够容纳数据而不溢出的最小数值类型。 |\n| 使用以下值标识布尔列 | 指示哪些值可以被解释为布尔值 |\n| 填充字符串列 /\
  \ 填充百分比 | 获取最长字符串元素（`[n]varchar`, `[n]char`）的长度，并按您指定的百分比扩展该长度，以预期未来源文件中更长的字符串。\
  \ |\n\n假设您知道哪一列需要设置为哪种数据类型，以及为一列或多列设置特定的列分隔符，您可能希望使用 `高级` 面板微调数据类型。表 2-3 描述了可用选项。\n\
  \n表 2-3. 平面文件连接管理器高级面板选项\n\n| 选项 | 描述 |\n| --- | --- |\n| 名称 | 可以在此处设置或覆盖列名。这是从此在\
  \ SSIS 数据流中使用的名称。 |\n| 列分隔符 | 为一列或多列指定的列分隔符。您可以从列表中选择，或输入/粘贴源数据中使用的列分隔符。 |\n| 数据类型\
  \ | 从 SSIS 数据类型列表中选择数据类型。 |\n| 输出列宽度 | 输出列的宽度。此值针对单字节字符。 |\n| 文本限定符 | 允许您指定此列中的文本是否使用\
  \ `常规` 面板中设置的文本限定符进行限定。 |\n\n例如，如果您希望覆盖某列数据类型的当前设置，您可以设置数据类型，如 图 2-5 所示。\n\n如果您的源数据发生变化，您不必从头开始重新执行整个列映射结构，因为\
  \ SSIS 允许您添加或删除列以调整包来适应源数据结构的更改。\n\n要添加列，请执行以下操作：\n\n1.  单击要插入列的前一列（或后一列）。\n2. \
  \ 单击 `新建` 按钮右侧的箭头。选择 `在之前插入`（或在之后）。一个新列将被添加到映射结构中。\n\n单击 `新建` 或 `添加列` 会在现有列之后插入一个新列。\n\
  \n删除列同样简单：\n\n1.  选择要删除的列。\n2.  点击 `删除`。\n\n`平面文件`连接管理器的`高级`面板还允许您为每列指定该列是否用引号括起来。如果是这种情况，您只需将\
  \ `文本限定符` 设置为 `True`；如果没有引号，则设置为 `False`。\n\n指示数据（无论何种类型）被括在引号中。例如，这可能是因为文本数据包含列分隔符（通常是逗号）。这样，此类字符就能被优雅地处理。无论如何，引号会在导入过程中被移除，因此无需在导入后手动删除。\n\
  \n`列名位于第一个数据行中`。指示第一行包含列标题。顾名思义，数据的第一行被视为列名，因此不会被导入。\n\n### 提示、技巧和陷阱\n\n*   SSIS\
  \ 中 OLEDB 连接的细节在配方 1-7 中解释。\n*   您可以使用 SQL Server 2008 中的 .NET 目标。从 SQL Server 2008\
  \ R2 及更高版本开始，您对此目标组件拥有 `尽可能使用批量插入` 选项以加速数据加载。\n*   要让 SSIS 处理不同数量的列分隔符，请参阅配方 2-16。\n\
  *   为现有包调整数据类型会在 `平面文件` 源任务上生成警告三角形。要使警告消失，只需双击此任务并确认您希望 SSIS 重新同步元数据。\n*   如果您未使用\
  \ SSIS 2012，则最大采样行数为 1000；在某些情况下，这不是代表性样本。如果您遇到问题，最好将数据类型设置得较大（整数用 `I8`，字符字段用较大的长度），然后检查导入数据的表中实际的最大数据长度。这种数据长度分析在\
  \ 第 8 章 中描述。\n\n```\nif (condVar > someVal) {console.log(\"xxx\")}\n```\n\n\n\n"
- "# 2-4. 导入固定宽度文本文件\n\n## 问题\n\n你需要将一个固定宽度的文本文件导入到 SQL Server 中。\n\n## 解决方案\n\n创建一个\
  \ SSIS 包，并使用一个配置为接受固定宽度文件的平面文件连接管理器来定义数据流。以下是具体操作步骤。\n\n1.  按照“配方 2-2”中的描述创建一个 SSIS\
  \ 包，准备好一个平面文件源和一个 OLEDB 目标。\n2.  创建一个连接到 `CarSales_Staging` 的 OLEDB 连接管理器，命名为 `CarSales_Staging_OLEDB`。\n\
  3.  为平面文件创建一个连接管理器，可以按照前面“配方 2-2”步骤 3 的描述创建，也可以通过右键单击“连接管理器”选项卡并选择“新建平面文件连接”来创建，如图\
  \ 2-3 所示。\n4.  指定连接名称和源文件（`C:\\SQL2012DIRecipes\\CH02\\StockFixedWidth.Txt`）后，指定格式为固定宽度，如图\
  \ 2-7 所示。\n\n    ![9781430247913_Fig02-07.jpg](img/9781430247913_Fig02-07.jpg)\n\
  \n    图 2-7. 定义固定宽度数据源\n\n5.  通过单击对话框左侧的“列”来显示“列”窗格。你应该看到类似图 2-8 的内容。\n\n    ![9781430247913_Fig02-08.jpg](img/9781430247913_Fig02-08.jpg)\n\
  \n    图 2-8. 为固定宽度平面文件设置行宽\n\n6.  输入行宽。如果不知道，可以尝试一个较大的数字！红色的行标记将跳到你输入的位置。你始终可以根据在平面文件连接管理器编辑器的“列”窗格中预览到的数据来微调长度。\n\
  7.  左右滚动浏览数据。通过单击标尺添加你需要的任何列分隔符。最终应该得到类似图 2-9 的结果。\n\n    ![9781430247913_Fig02-09.jpg](img/9781430247913_Fig02-09.jpg)\n\
  \n    图 2-9. 为固定宽度平面文件设置列宽\n\n8.  单击“确定”确认连接管理器设置。现在可以将此连接管理器添加到平面文件源（除非你是在定义平面文件源时创建的它）。\n\
  9.  将平面文件源连接到 OLEDB 输出。\n10. 配置 OLEDB 输出以使用连接管理器 `CarSales_Staging_OLEDB`。\n11.\
  \ 添加列映射，并选择或创建一个数据表，然后按照“配方 2-2”步骤 7 到 12 的描述运行导入包。\n\n## 工作原理\n\n有时，你可能需要处理需要导入到\
  \ SQL Server 的固定宽度文件。这与分隔文件非常相似，只是你需要告诉 SSIS 列的断点在哪里。\n\n你只知道源文件是完全固定宽度的——也就是说，它具有以下特点：\n\
  \n*   所有行的宽度相同。\n*   所有列的宽度是固定的（当然，每列的宽度可以不同）。\n*   每行末尾没有回车/换行符（CR/LF）。\n\n这与“配方\
  \ 2-2”中描述的导入分隔文件非常相似。与分隔文件一样，你可以设置以下选项：\n\n*   第一行是否包含列名\n*   要跳过的标题行\n*   文本限定符\n\
  *   列名\n*   列的数据类型\n*   输出列宽\n\n所有这些都如“配方 2-2”所述进行设置。\n\n![image](img/sq.jpg) **注意**\
  \ 有时你可能需要导入一个平面文件，其中所有列都是固定宽度，除了最后一列可以是可变长度**或者**每行以 CR/LF 结尾。这也被称为*右侧参差不齐*（ragged\
  \ right）文本文件。这使得右侧参差不齐的文件本质上是一个固定宽度的文本文件，但有一个主要的、根本的区别：每行末尾都有一个 CR/LF。在其他所有方面，导入过程与固定宽度源相同。\n\
  \n"
- "# 2-5. 使用 T-SQL 导入文本文件\n\n## 问题\n\n你希望使用 T-SQL 导入文本文件，因为你正在构建一个脚本化的 ETL 解决方案。\n\
  \n## 解决方案\n\n使用 `OPENROWSET` 导入文本文件。\n\n在以下示例中，我将使用 `C:\\SQL2012DIRecipes\\CH02\\\
  Invoices.Txt` 文件作为源数据。你可以使用以下代码片段仅使用 T-SQL 加载数据（完整代码位于 `C:\\SQL2012DIRecipes\\CH02\\\
  OpenrowsetLoad.sql`）：\n\n```sql\nSELECT\n    CAST(BILLNO AS VARCHAR(5)) AS BILLNO\n\
  INTO\n    MyTextImport\nFROM\n    OPENROWSET('MSDASQL',\n        'Driver = {Microsoft\
  \ Text Driver (*.txt; *.csv)}; DefaultDir = C:\\SQL 2012 DI Recipes\\CH02;',\n \
  \       'SELECT INVOICENUMBER AS BILLNO FROM INVOICES.TXT WHERE CLIENTID = 1');\n\
  ```\n\n如果路径中有空格，则需要使用 `DefaultDir` 参数将路径与实际文件名分开，如下所示：\n\n```sql\nSELECT\n    InvoiceNumber\n\
  INTO\n    MyTextImport2\nFROM\n    OPENROWSET('MSDASQL',\n        'Driver = {Microsoft\
  \ Text Driver (*.txt; *.csv)}; DefaultDir = C:\\SQL2012DIRecipes\\CH02;',\n    \
  \    'select * from Invoices.txt');\n```\n\n而文件名中的空格要求将文件名用方括号括起来才能正常工作：\n\n```sql\n\
  SELECT\n    InvoiceNumber\nINTO\n    MyTextImport3\nFROM\n    OPENROWSET('MSDASQL',\n\
  \        'Driver = {Microsoft Text Driver (*.txt; *.csv)}; DefaultDir = C:\\SQL2012DIRecipes\\\
  CH02;',\n        'SELECT * FROM [In voices.txt]');\n```\n\n如果你愿意（这是另一种说法：“如果你遇到\
  \ Microsoft 文本驱动程序的问题，请尝试将其作为第一个备选方案”），你可以使用 MSDASQL 和 Jet 文本驱动程序，像这样：\n\n```sql\n\
  SELECT\n    InvoiceNumber\nINTO\n    MyTextImport4\nFROM\n    OPENROWSET('MSDASQL',\n\
  \        'Driver = {Microsoft Access Text Driver (*.txt, *.csv)};',\n        'SELECT\
  \ * FROM C:\\SQL2012DIRecipes\\CH02\\Invoices.txt');\n```\n\n请注意，在这种情况下 `(*.txt`,\
  \ `*.csv)` 是用逗号分隔的。同样值得注意的是，你可以直接使用 ACE OLEDB 驱动程序（在“配方 1-1”中描述），而不需要像 MSDASQL 驱动程序那样运行\
  \ ODBC over OLEDB，如下所示：\n\n```sql\nSELECT\n    InvoiceNumber\nINTO\n    MyTextImport5\n\
  FROM\n    OPENROWSET('Microsoft.ACE.OLEDB.12.0',\n        'Text;Database = C:\\\
  SQL2012DIRecipes\\CH02;HDR = Yes',\n        'SELECT * FROM Invoices.txt');\n```\n\
  \n## 工作原理\n\n有时，当你想要导入文本文件时，SSIS 要么大材小用，要么根本就不是你首选的解决方案。这就是 `OPENROWSET` 的用武之地。它既允许你查询源数据文件，又返回一个行集，然后可以将其用作子查询的一部分、在\
  \ `JOIN` 语句中或在公用表表达式（CTE）中插入数据。\n\n\n"
- "# 使用 OPENROWSET 和 Schema.ini 导入文本文件\n\n在以下情况下，您应使用此方法：\n*   当您有一个结构一致的分隔符 CSV 或文本文件时。\n\
  *   当源数据文件不是特别大时——否则，您最好使用 `BULKINSERT`，如配方 2-10 所述。\n*   当已启用即席查询时（参见配方 1-4）。\n\
  *   当源文件结构清晰（所有列都有逗号分隔的标题）时，您应该能够使用类似下面所示的代码片段将源数据返回到 SQL Server。\n\n因为 `OPENROWSET`\
  \ 被设计为 T-SQL 编程的组成部分，用于读取——并加载——分隔符数据文件到 SQL Server，所以您可能期望它允许使用 T-SQL 变量来定义其各种参数。不幸的是，情况并非如此。使用\
  \ T-SQL 变量的唯一方法是结合 `OPENROWSET` 使用动态 SQL。这意味着整个命令将是一个字符串变量，其他 T-SQL 变量在需要的地方插入。这可能很快变得极其笨拙且难以调试（记住所有那些带引号的字符串）。然而，如果您记住\
  \ `OPENROWSET` 本质上是为即席数据请求设计的，那么您可以将这个限制视为对良好编程实践的一种推动。在这些示例中，我使用了 `SELECT...INTO`。没有理由阻止您使用\
  \ `INSERT INTO...SELECT` 代替。\n\n## 提示、技巧和陷阱\n\n*   源数据文件必须完美无瑕（或至少被 Microsoft 文本驱动程序视为无错）才能正常工作。\n\
  *   可以使用 T-SQL 如配方 1-4 所述，对列名进行别名设置，并对数据进行子集筛选。\n*   如果您使用的 `WHERE` 子句涉及文本值，则需要用双引号将文本括起来。\n\
  *   第一行中的列标题是可选的，但如果没有列名，文本驱动程序将使用第一行作为列标题。要解决这个问题，请参阅如何使用 Schema.ini 文件，如配方 2-6\
  \ 所述。\n*   如果需要，`SELECT` 语句可以包含 `ORDER BY`。\n*   必须启用即席查询，如配方 1-4 所述。\n*   ADODB\
  \ 提供程序 MSDASQL 可以正确读取 CSV 文件，这与配方 2-9 中描述的 BCP 实用程序不同。\n*   对于需要指定分隔符和分隔符的复杂源数据文件，您需要使用\
  \ `BULK INSERT`，如配方 2-10 所述。\n*   如果第一行中有任何 `NULL` 字段，您将收到以下错误消息：\n    ```\n   \
  \ Msg 492, Level 16, State 1, Line 1 (更多信息已省略)\n    ```\n*   通过 `OPENQUERY` 和 `OPENROWSET`\
  \ 获得的结果集中不允许有重复的列名。在这种情况下，您必须手动向源文本文件添加列名（对于千兆字节大小的文件，这可能很困难甚至无法实现），或者使用模式信息文件，如配方\
  \ 2-6 所述。\n*   由于 MSDASQL 驱动程序和 ACE 驱动程序都有 64 位版本，因此在 64 位环境中两者都可以工作。\n*   我假设您将在操作系统服务器上运行此类导入——可能使用远程桌面连接。根据我的经验，Vista\
  \ 会导致 MSDASQL 出现权限问题。这些问题的快速解决方案是以管理员身份运行 SSMS。\n\n"
- "# 2-6. 映射源文件\n\n## 问题\n\n您需要对源文件应用复杂的映射，以正确导入并避免因重复列名或数据类型问题而导致的错误。\n\n## 解决方案\n\
  \n创建一个模式信息文件，并将其放在与源数据文件相同的目录中。\n\n一个简单的模式信息文件，设计用于处理 `C:\\SQL2012DIRecipes\\CH02\\\
  Invoices2.Txt` 示例文件——该文件不幸地没有列名——可能如下所示（`C:\\SQL2012DIRecipes\\CH02\\Schema.ini`）：\n\
  ```\n[Invoices2.txt]\nFormat = CSVDelimited\nCharacterSet = OEM\nColNameHeader =\
  \ False\nCol1 = ID Integer\nCol2 = InvoiceNumber Char Width 255\nCol3 = ClientID\
  \ Integer\nCol4 = TotalDiscount Currency\nCol5 = DeliveryCharge Currency\n```\n\n\
  ## 工作原理\n\n如果源数据没有标题记录，或者您希望向文本驱动程序提供数据类型信息，那么您可能需要提供一个模式信息文件，以指示 Microsoft 文本驱动程序如何最好地处理源数据结构。模式信息文件是一个文本文件，始终命名为\
  \ Schema.ini，并且**始终**保存在文本数据源文件所在的同一目录中。它可以包含多个源文件的模式信息，因为必须给出每个文件名。\n\n模式信息文件可以指定以下内容：\n\
  *   文本文件名（因为只有一个可能的 Schema.ini 文件，它可以包含多个源文件的信息，每个文件由方括号中的源文件名标识）\n*   文件格式\n* \
  \  字符集\n*   特殊数据类型转换\n*   列标题指示符\n*   字段名称、宽度和类型\n\n但是，Schema.ini 文件不仅仅用于添加列名。您可以用它来覆盖现有的列名，并在读取源数据时更改数据类型，如下面模式信息文件片段所示。此\
  \ `C:\\SQL2012DIRecipes\\CH02\\Schema.Ini` 模式信息文件的片段覆盖了我们在配方 2-5 中使用的文本文件（`C:\\\
  SQL2012DIRecipes\\CH02\\Invoices.Txt`）的数据类型和列名。\n```\n[Invoices.txt]\nFormat = CSVDelimited\n\
  CharacterSet = OEM\nColNameHeader = True\nCol1 = ID Integer\nCol2 = BillNumber Char\
  \ Width 255\nCol3 = IDClient Integer\nCol4 = TotalDiscount Integer\nCol5 = DeliveryCharge\
  \ Currency\n```\n这些示例仅展示了模式信息文件部分可能性。表 2-4 提供了更多可用参数的完整描述。\n\n表 2-4. Schema.ini\
  \ 文件选项\n\n| 说明符 | 注释 |\n| --- | --- |\n| Format = CSVDelimited | 指示驱动程序正在处理 CSV\
  \ 文件。 |\n| Format = TabDelimited | 指示驱动程序记录采用制表符分隔格式。 |\n| Format = Delimited(分隔符)\
  \ | 允许您指定自定义分隔符。 |\n| Format = FixedLength | 指示驱动程序这是一个固定长度的数据文件。 |\n| CharacterSet\
  \ = ANSI | 告知驱动程序文件由 ANSI 字符组成。 |\n| CharacterSet = OEM | 告知驱动程序文件由非 ANSI 字符组成。\
  \ |\n| ColNameHeader = True | 告知驱动程序第一行包含列标题。 |\n\n还有更多选项可用，但根据我的经验，它们很少使用。如果您需要此信息，可以在\
  \ `http://msdn.microsoft.com/en-us/library/windows/desktop/ms709353(v=vs.85).aspx`\
  \ 找到。\n\n在这个例子中，我将模式信息文件命名为 `C:\\SQL2012DIRecipes\\CH02\\Schema.Ini`。`OPENROWSET`\
  \ 会自动为引用的每个源文件使用模式信息文件中的信息。\n\n与其手工制作模式信息文件，您可以使用 ODBC 管理员创建一个，以节省时间并最大限度地减少出错可能性。这可以在您创建系统\
  \ DSN 时同时完成，如下所示：\n1.  打开 ODBC 数据源管理员（控制面板 > 管理工具 > 数据源）。单击系统 DSN。对话框类似于 图 2-10。\n\
  \    ![9781430247913_Fig02-10.jpg](img/9781430247913_Fig02-10.jpg)\n    图 2-10.  使用\
  \ ODBC 源管理员创建 Schema.ini 文件\n2.  单击添加。选择 Microsoft 文本驱动程序（如 图 2-11 所示）。\n    ![9781430247913_Fig02-11.jpg](img/9781430247913_Fig02-11.jpg)\n\
  \n\n\n"
- "# ODBC 文本驱动程序设置\n\n## 2-6. 配置 ODBC 文本驱动程序\n\n1.  在 ODBC 数据源管理器中，选择“文件 DSN”选项卡，单击“添加”，选择“Microsoft\
  \ Text Driver (*.txt; *.csv)”。\n    ![](img/9781430247913_Fig02-11.jpg)  \n    *图\
  \ 2-11 选择 Microsoft 文本驱动程序*\n2.  单击“完成”，然后在“ODBC Text 设置”对话框中单击“选项”。\n3.  输入数据源名称。\n\
  4.  取消选中“使用当前目录”。\n5.  单击“选择目录”浏览到源文本文件所在的目录。\n6.  取消选中“默认”，如果所需文件扩展名不在现有列表中，则选择或输入它。对话框应类似于图\
  \ 2-12。\n    ![](img/9781430247913_Fig02-12.jpg)  \n    *图 2-12 创建 Schema.ini 文件*\n\
  7.  单击“定义格式”。然后单击您希望为其创建完整架构信息的每个文件，再单击“猜测”。\n8.  单击“确定”。确认任何错误消息。取消退出 ODBC 数据源管理器。\n\
  \n> **注意**\n> 在运行 Microsoft 文本驱动程序 32 位版本的 64 位机器上，您必须运行 32 位版本的 `Odbcad32.exe`（位于\
  \ `%systemdrive%\\Windows\\SysWoW64`）才能使此解决方案生效。否则，您将看不到（32 位的）Microsoft 文本驱动程序。\n\
  \n您将找到一个 `Schema.ini` 文件，其中包含所选类型所有文件的基本元素——以及您请求 ODBC 数据源管理器猜测数据结构的所有文件的完整列规范。您现在可以修改此文件以满足您的精确要求。生成的文件非常密集且通常难以阅读。您可能需要考虑编辑它以删除任何不需要的文件规范，并进行一般清理。\n\
  \n#### 提示、技巧与陷阱\n\n- 无论列标题是否存在于第一行，在 `Schema.ini` 文件中都必须将列引用为 `Col1`、`Col2`…`Col’n’`\
  \ 等形式。\n- 我在网上看到过关于 `Schema.ini` 文件中列数限制为 255 的说法。尽管我尚未使用 `OPENROWSET` 导入过如此宽的文件，因此不能说这对我曾是个问题。\n\
  \n"
- "# 2-7. 使用 T-SQL 导入数据以备使用链接服务器\n\n## 问题\n\n您最终希望使用链接服务器来导入文本文件。在设置完成之前，您希望为（最终的）链接服务器编写\
  \ T-SQL 代码，以便在链接服务器设置好后无需重写太多代码。\n\n## 解决方案\n\n使用 `OPENDATASOURCE`。以下代码展示了如何操作（`C:\\\
  SQL2012DIRecipes\\CH02\\OpendatasourceAndDestinationTable.sql`）。\n\n1.  创建一个结构合适的目标表：\n\
  \    ```sql\n    CREATE TABLE Text_OpenrowsetInsert\n    (\n     ID\n     ,InvoiceNumber\
  \ INT\n     ,ClientID INT\n     ,TotalDiscount NUMERIC (18,2)\n     ,DeliveryCharge\
  \ NUMERIC (18,2)\n    );\n    GO\n    ```\n2.  运行以下代码片段，加载 `C:\\SQL2012DIRecipes\\\
  CH02\\Invoices.Txt` 源文件：\n    ```sql\n    INSERT INTO    Text_OpenrowsetInsert (ID,\
  \ InvoiceNumber, ClientID, TotalDiscount, DeliveryCharge)\n     SELECT         F1,F2,F3,F4,F5\n\
  \     FROM           OpenDataSource('Microsoft.ACE.OLEDB.12.0',\n              \
  \                    'Data Source = C:\\SQL2012DIRecipes\\CH02;\n              \
  \                     Extended Properties = \"Text;HDR = NO;\"'\n              \
  \                    )... Invoices#txt;\n    ```\n\n## 工作原理\n\n如果您正在考虑使用链接服务器连接到文本文件，但想先“试试水”，那么您可能希望使用\
  \ `OPENDATASOURCE` 来读取您的平面文件。\n\n在以下情况下，您可能希望使用 `OPENDATASOURCE`：\n- 当您有一个结构一致的、带分隔符的\
  \ CSV 或文本文件时。\n- 当您希望指定诸如标题行等参数，或者即使没有列名也要指定要选择的列时。\n- 当源数据文件结构可靠且一致（或至少被 Microsoft\
  \ 文本驱动程序认为是无错误的）时。\n\n我尽可能使用 ACE 驱动程序配合 `OPENDATASOURCE`。这有几个很好的理由：\n- 它能优雅地处理第一行没有列标题的情况，将列命名为\
  \ `F1`、`F2`…`F’n’` 等形式。\n- 通常很少有 32 位/64 位问题。\n\n对于 Jet 驱动程序（因此在 32 位环境中定义），代码是：\n\
  ```sql\nINSERT INTO      Text_OpenrowsetInsert (ID, InvoiceNumber, ClientID, TotalDiscount,\
  \ DeliveryCharge)\nSELECT           F1,F2,F3,F4,F5\nFROM             OPENDATASOURCE(\n\
  \                   'Microsoft.Jet.OLEDB.4.0',\n                   'Data Source\
  \ = C:\\SQL2012DIRecipes\\CH02;\n                    Extended Properties = \"Text;HDR\
  \ = YES;\"'\n                  )...Invoices#txt;\n```\n\n通过将扩展属性标志设置为 `\"Text;HDR\
  \ = YES;\"` 或 `\"Text;HDR = NO;\"`，您可以轻松指定是否存在标题行。\n\n> **注意**\n> 您必须在文件名中使用井号 (`#`)\
  \ 而不是点号 (`.`)。\n\n如果第一行中没有列名，ACE 驱动程序会将列命名为 `F1`、`F2` 等。然后可以使用这些名称来查询数据，如下所示。在此情况下，第一行接受\
  \ `NULLS`。\n```sql\nSELECT           F1\nFROM             OPENDATASOURCE(\n    \
  \               'Microsoft.Jet.OLEDB.4.0',\n                   'Data Source = C:\\\
  SQL2012DIRecipes\\CH02;\n                    Extended Properties = \"Text;HDR =\
  \ NO;\"'\n                  )...Invoices#txt\n```\n\n如果您创建了系统 DSN（在配方 4-8 中描述），那么您可以将其与\
  \ `OPENDATASOURCE` 一起使用，如下所示：\n```sql\nSELECT          ID, InvoiceNumber, ClientID,\
  \ TotalDiscount, DeliveryCharge\nFROM            OPENDATASOURCE('SQLOLEDB', 'DSN\
  \ = MyDSN;')...Invoices#txt\n```\n\n#### 提示、技巧与陷阱\n\n- 在 32 位环境中，您可以使用 MS Jet 驱动程序代替\
  \ ACE 驱动程序。\n- 如果文本文件不包含列标题，并且您通过 MSDASQL 使用文本驱动程序，则需要一个 `Schema.ini` 文件（在配方 2-6\
  \ 中描述）。这是因为 `OPENDATASOURCE` 期望具有标题的表格结构，而 MSDASQL 驱动程序不会（不像 Jet 和 ACE）提供“虚拟”列标题。\n\
  - 值得注意的是，如果您使用 MSDASQL 访问古老的文本文件驱动程序，现在可以为旧版本的 64 位 Windows 计算机下载 64 位版本。该驱动程序包含在\
  \ Windows Server 2008 到 Vista SP1 中。您可以在 `www.microsoft.com/en-gb/download/details.aspx?id=20065`\
  \ 找到它。\n- 如果您确实创建了架构信息文件，那么您在那里指定的列名将被 Jet 驱动程序使用，而不是 `F1`、`F2` 等形式——甚至可以覆盖文件包含的列标题。\n\
  - 与 `OPENDATASOURCE` 和 ACE 驱动程序一起使用的 T-SQL 可以使用 `WHERE`、`ORDER BY`、`CAST`、`CONVERT`\
  \ 进行扩展。您也可以为列名指定别名。\n\n"
- "# 2-8. 将文本文件作为链接服务器表访问\n\n## 问题\n\n您希望避免从文本文件导入数据，但仍能在 T-SQL 查询中使用它。\n\n## 解决方案\n\
  \n将文本文件作为链接服务器表访问。以下说明如何操作，使用 `C:\\SQL2012DIRecipes\\CH02\\Invoices.Txt` 文件作为数据源。\n\
  \n1.  运行以下 T-SQL 片段（此代码连同本配方中所有 T-SQL 都可在 `C:\\SQL2012DIRecipes\\CH02\\FlatFileLinkedServer.sql`\
  \ 中找到）：\n    ```sql\n    EXECUTE master.dbo.sp_addlinkedserver TXT_INVOICES, ' ',\
  \ 'Microsoft.ACE.OLEDB.12.0',\n                 'C:\\SQL2012DIRecipes\\CH02', NULL,\
  \ 'Text';\n    ```\n2.  定义安全性——或者更准确地说，定义其缺失：\n    ```sql\n    EXECUTE master.dbo.sp_addlinkedsrvlogin\
  \ 'TXT_INVOICES', false, NULL, 'admin';\n    ```\n3.  创建一个 `Schema`。\n\n\n\n"
- '# 工作原理


  与 Excel、Access 和大多数关系数据源的情况一样，您可以将带分隔符的平面文件数据源用作链接服务器。由于链接服务器需要 OLEDB，因此您必须使用基于
  OLEDB 的 ODBC，或者使用 OLEDB 提供程序。但请注意，这将在您使用的任何驱动程序上运行得**极其缓慢**——而且某些驱动程序（例如 Jet）仅限于
  32 位环境。还需要注意的是，需要 `Schema.ini` 文件。此方法最好在以下情况下使用：


  *   您拥有结构一致的、带分隔符的 CSV 或文本文件时。

  *   您希望经常使用即席查询在 T-SQL 代码中加载平面文件数据，但又不想使用 SSIS 导入数据时。

  *   源数据可能经常变化，因此需要立即访问，无需任何形式的数据导入时。

  *   源数据量不太大，且快速查询不是必需品时。


  我更喜欢使用 ACE 驱动程序来设置指向文本文件的链接服务器，因为它适用于 32 位和 64 位环境，并且对我来说一直有效。


  如果您希望避免使用 T-SQL 来设置链接服务器，可以使用 SSMS 执行此任务。这在配方 1-13 中有说明。链接服务器的安全性对于平面文件来说无关紧要——因此，只要使用链接服务器的
  SQL 帐户能够访问存储平面文件的文件夹，至少在这个层面上没有额外的复杂性。


  '
- "# 提示、技巧和陷阱\n\n有关如何设置 ODBC DSN 的详细信息，请参阅配方 2-6。\n\n*   如果您创建了 `Schema.ini` 文件，链接服务器将使用它。\n\
  *   上一个示例在传递查询中特意使用了 `SELECT *`，以表明传递查询和 T-SQL 可以略有不同。\n*   如果您希望使用稍微冗长但更易于调试的代码来创建链接服务器，可以尝试类似这样的方法——这里是针对\
  \ Jet 的——使用完全参数化的语句：\n\n```sql\nEXECUTE master.dbo.sp_addlinkedserver\n    @SERVER\
  \ = 'TXTACCESS',\n    @PROVIDER = 'Microsoft.Jet.OLEDB.4.0',\n    @SRVPRODUCT =\
  \ 'Jet',\n    @DATASRC = 'C:\\SQL2012DIRecipes\\CH02\\',\n    @PROVSTR = 'Text'\n\
  ```\n\n"
- "# 2-9. 从命令行导入平面文件\n\n## 问题\n\n您需要尽可能快地从命令行加载平面文件。\n\n## 解决方案\n\n使用 `BCP` 加载数据。可以像这样操作：\n\
  \n1.  确保存在目标表，其结构映射到源文件。在此示例中，它是 `CarSales_Staging.dbo.Invoice`。\n2.  打开命令提示符。\n\
  3.  输入以下命令：\n\n```bash\nBCP CarSales_Staging.dbo.Invoices IN C:\\SQL2012DIRecipes\\\
  CH02\\Invoices.txt\n    –T –SADAM02\n```\n\n4.  按 Enter 键从命令提示符运行 `BCP` 命令。\n5.\
  \  系统提示时，确认数据源中每个字段的数据类型、前缀长度和字段终止符。\n\n## 工作原理\n\n`BCP`（大容量复制程序）自 SQL Server 首次出现以来就已存在。虽然没有人会形容它“用户友好”，但它确实名副其实。也就是说，它能以出色的效率将批量数据复制进（以及复制出）SQL\
  \ Server。`BCP` 不仅设计用于复制文本数据（您将在第 5 章中看到）。它还具有大量开关，一开始可能让人望而生畏。然而，尽管学习曲线看似陡峭，但掌握它所付出的努力会获得数倍的回报。\n\
  \n我假设可能有些时候您希望从 SQL Server 外部导入文本文件，无论是从命令行交互式导入，还是从命令（`.cmd`）文件导入。无论您的理由是什么，它肯定能完成与\
  \ `BULK INSERT`（如配方 2-10 所述）相同的工作——只是从命令提示符执行。如果您选择这条路径，那么您可以使用与 `BULK INSERT` 相同的格式文件，并且本质上，您将使用相同的选项，只是作为命令行标志。`BCP`\
  \ 最好在以下情况使用：\n\n*   您希望在不调用 T-SQL 的情况下加载数据时（尽管这是可能的——如果您的 SQL Server 安全考虑允许，您也可以使用\
  \ `xp_cmdshell` 从 T-SQL 脚本运行 `BCP`）。\n*   您想使用批处理文件或基于非 SQL Server 的进程来加载数据时。\n\
  *   源平面文件严格统一且无错误时。\n\n在最简化的情况下，`BCP` 需要四个参数：\n\n*   目标表的完全限定的三部分表名（`database.schema.table`）。\n\
  *   关键字 `IN`，告诉 `BCP` 数据正被导入到 SQL Server。\n*   源数据文件的完整路径。如果路径包含空格，完整路径必须用双引号括起来。\n\
  *   任何所需的开关——特别是使用的 SQL Server 安全性（集成安全性或用户和密码）以及 SQL Server 实例名称。\n\n> **注意**：如果服务器上只有一个活动的\
  \ SQL Server 实例，则无需指定目标服务器。否则，您必须指定要使用的 SQL Server 实例。始终指定服务器和数据库是良好的实践。\n\n格式文件是可选的，但如果没有格式文件，`BCP`\
  \ 将要求确认数据源中每个字段的数据类型、前缀长度和字段终止符。您可能已经发现，我发现这很快就会变得极其烦人。诚然，如果您执行一次，`BCP` 会在过程结束时询问您是否要创建一个格式文件以供重用。我的建议是始终选择“是”。这将是一个较旧的文本类型格式文件，因为您必须使用\
  \ `-x` 开关创建 XML 格式文件，如配方 2-11 所述。\n\n因此，假设您已经创建了如配方 2-11 所定义的格式文件，或者在运行初始导入时要求 `BCP`\
  \ 创建一个，以下是使用它的方法：\n\n```bash\nBCP CarSales_Staging.dbo.Invoices IN C:\\SQL2012DIRecipes\\\
  CH02\\Invoices.txt –T –f\n    C:\\SQL2012DIRecipes\\CH02\\Invoices.Fmt\n```\n\n\
  为了让 `BCP` 有任何正常工作的机会，您需要能够连接到服务器。有两个选项：\n\n*   集成安全性\n*   SQL Server 身份验证\n\n对于前者，只需在任何使用的\
  \ `BCP` 开关中添加 `–T` 开关。\n\n要使用 SQL Server 身份验证，请在任何使用的 `BCP` 开关中添加 `–UyourUserName\
  \ –PyourPassword`。例如：\n\n```bash\nBCP CarSales_Staging.dbo.Invoices IN C:\\SQL2012DIRecipes\\\
  CH02\\Invoices.txt –UAdam –PMe4B0ss\n```\n\n这三个开关必须大写。如果您愿意，可以在开关和名称或密码之间添加空格。\n\
  \n如果您连接的不是服务器本身的单个 SQL Server 实例，则需要指定服务器和/或实例。这是使用 `–S` 开关完成的。\n\n\n例如：\n```\n\
  BCP CarSales_Staging.dbo.Invoices IN C:\\SQL2012DIRecipes\\CH02\\Invoices.txt ←\
  \ –T –SmyServer\\FirstInstance\n```\n此开关也必须使用大写字母。\n\n由于`BCP`拥有大量的命令行参数，表 2-5 总结了您可能会觉得有用的主要参数（也称为标志）。\n\
  \n表 2-5. `BCP` 命令行参数\n\n| BCP 标志 | 描述 | 说明 |\n| --- | --- | --- |\n| `-m` | `最大错误数`\
  \ | 此标志指定在进程停止并引发错误之前，您希望 `BCP` 允许的最大错误数。 |\n| `-f` | `格式文件` | 此标志指定要使用的格式文件（可以是“旧”文本格式或“新”\
  \ XML 格式）。 |\n| `-e` | `错误文件` | 此标志指定错误文件的路径和文件名，错误文件将在该处创建。 |\n| `-F` | `起始行` |\
  \ 此标志指定要导入的第一行。 |\n| `-L` | `结束行` | 此标志指定要导入的最后一行。 |\n| `-b` | `批处理大小` | 此标志指定源文件中每批提交的行数。如果发生失败，这些行可以回滚。\
  \ |\n| `-c` | `字符文件` | 使用此标志可确保 `BCP` 不会提示输入数据类型。它假定所有字段都是文本字段。它还预设制表符为字段终止符，换行符\
  \ (`CHAR(10)`) 为行终止符。 |\n| `-w` | `Unicode 文件` | 使用此标志可确保 `BCP` 不会提示输入数据类型。它假定所有字段都是\
  \ Unicode 格式。它还预设制表符为字段终止符，换行符 (`CHAR(10)`) 为行终止符。 |\n| `-q` | `带引号的标识符` | 如果数据库和/或文件的名称中包含空格或引号，则必须使用此标志。\
  \ |\n| `-t` | `字段终止符` | 如果需要覆盖默认的字段分隔符（`\\t` 制表符），请使用此标志。 |\n| `-r` | `行终止符` | 如果需要覆盖默认的行终止符（`\\\
  n` 换行符），请使用此标志。 |\n| `-T` | `可信连接` | 此标志指定将使用集成安全性连接到 SQL Server。 |\n| `-U` | `用户名`\
  \ | 如果未使用集成安全性，此标志提供用于连接到 SQL Server 的用户登录名。 |\n| `-P` | `密码` | 如果未使用集成安全性，此标志提供用于连接到\
  \ SQL Server 的用户密码。 |\n| `-S` | `服务器名称` | 此标志提供您要连接的服务器的名称。 |\n| `-k` | `保留 NULL\
  \ 值` | 使用此标志可保留源数据中的 `NULL` 值，而不是使用表定义中指定的默认值。 |\n| `-E` | `保留 IDENTITY 值` | 此标志告诉\
  \ `BCP` 使用源数据中的值作为 `IDENTITY` 列的值，而不是继续目标表中现有的序列。 |\n| `-h` | `提示` | 允许您指定将使用 `CHECK_CONSTRAINTS`、`TABLOCK`\
  \ 和 `ORDER`。 |\n\n从 T-SQL 运行 `BCP` 非常简单。以下代码片段也将上一个示例中的数据从同一个源文件加载到同一个目标表中：\n```sql\n\
  DECLARE @BCPVARIABLE VARCHAR(500) = 'BCP CarSales_Staging.dbo.Invoices ← IN C:\\\
  SQL2012DIRecipes\\CH02\\Invoices.txt –T –SADAM02 –f C:\\SQL2012DIRecipes\\CH02\\\
  Invoices.Fmt';\nEXECUTE master.dbo.xp_cmdshell @BCPVARIABLE;\n```\n您需要允许使用 `xp_cmdshell`，这可以通过在\
  \ SSMS 中右键单击服务器/实例，从“方面”![image](img/arrow.jpg)“外围应用配置器”中获得，或者（如果您使用的是旧版本 SQL Server）通过“外围应用配置器”实用程序来完成。当然，我假设\
  \ DBA 会允许这样做，但实际情况可能并非如此。您也可以运行以下 T-SQL 来启用 `xp_cmdshell`：\n```sql\nEXECUTE sp_configure\
  \ 'show advanced options', 1;\nGO\nRECONFIGURE;\nGO\nEXECUTE sp_configure 'xp_cmdshell',\
  \ 1;\nGO\nRECONFIGURE;\nGO\n```\n\n提示、技巧和陷阱\n*   `BCP` 在每处理 1000 行后显示消息“1000 rows\
  \ sent to SQL Server”。此消息仅供参考。无论批处理大小如何，都会出现此消息。\n*   如果您愿意，可以将 `BCP` 命令文本保存在命令文件\
  \ (`.cmd`) 中并执行该文件。\n*   `BCP` 选项区分大小写，输入时请小心。\n*   如果源数据文件包含列标题，请记得将 `–F`（第一行数据）标志设置为\
  \ 2。\n*   `BCP` 也可以导出平面文件，但这在配方 7-4 中处理。它在 SQL Server 之间传输数据时特别高效，您将在第 4 章中看到。\n\
  \n### 2-10. 使用 T-SQL 导入大型文本文件并侧重于速度\n\n问题\n您希望使用基于 T-SQL 的方法尽可能快地导入大型文本文件。\n\n解决方案\n\
  使用 T-SQL 的 `BULK INSERT` 命令加载文件。我将解释如何操作。\n\n1.  创建一个目标表来保存您将导入的数据。对于此示例，DDL 为 (`C:\\\
  SQL2012DIRecipes\\CH02\\tblInvoiceBulkLoad.Sql`)：\n    ```sql\n    CREATE TABLE\
  \ CarSales_Staging.dbo.InvoiceBulkLoad\n    (\n     ID int IDENTITY(1,1) NOT NULL,\n\
  \     InvoiceNumber VARCHAR(50) NULL,\n     ClientID INT NULL,\n     TotalDiscount\
  \ numeric(18, 2) NULL,\n     DeliveryCharge numeric(18, 2) NULL\n    ) ;\n    GO\n\
  \    ```\n\n2.  运行以下代码，将 `C:\\SQL2012DIRecipes\\CH02\\InvoiceBulkLoad.Txt` 文本文件加载到\
  \ `dbo.InvoiceBulkLoad` 表中（该表在加载过程开始前已创建）。\n    ```sql\n    BULK INSERT CarSales_Staging.dbo.InvoiceBulkLoad\n\
  \       FROM 'C:\\SQL2012DIRecipes\\CH02\\InvoiceBulkLoad.Txt'\n       WITH\n  \
  \        (\n             FIELDTERMINATOR = ',',\n             ROWTERMINATOR = '\\\
  n',\n             FIRSTROW = 2\n          );\n    ```\n\n工作原理\n当面对庞大而复杂的源文本文件时，开发基于\
  \ T-SQL 的解决方案只有一个真正的答案：使用 `BULK INSERT` 来完成繁重的工作。在开始之前，您最好忘记围绕这一特定数据集成选项的一些迷思。与普遍看法相反，它不一定复杂，并且具有以下优点：\n\
  *   它是可用的最快解决方案之一。\n*   它可以被参数化以处理复杂的数据源，包括仅加载源数据的某些部分。\n*   它可以进行调整，以最优方式处理非常大的加载任务。\n\
  \n`BULK INSERT` 命令的大部分功能来自于：\n*   您可以设置的多个参数。\n*   您创建的格式文件提供的控制，用于控制加载过程中的数据映射。\n\
  \n多年来，格式文件名声不佳；自从它们与历史悠久的 `BCP` 程序（`BULK INSERT` 是其尊贵的继承者）一起出现以来，它们就被认为过于复杂。然而，在配方\
  \ 2-11 中您会看到，当它们以 XML 文件的形式第二次出现时，它们并不难掌握，并且它们为从文本文件加载大量数据这一潜在艰巨任务带来的可能性，使它们非常值得掌握。\n\
  \n`BULK INSERT` 最适合在以下情况下使用：\n*   当目标表结构存在时。\n*   当您需要指定全局和/或特定的列和行分隔符时。\n*   当速度至关重要时。\n\
  *   对于大型加载任务。\n*   当您需要对加载过程进行最大程度的控制时。\n\n在此示例中，源文件包含标题信息，因此 `BULK INSERT` 从第二行开始加载，以便仅加载数据——并避免在加载数值数据时出现类型冲突，因为字段名几乎总是字符数据。\n\
  \n现在您已经看到 `BULK INSERT` 可以如此简单，让我们看看它提供的选项，如表 2-6 所示。\n\n[表 2-6.](#9781430247913_Ch02.\n\
  \n\n"
- "# BULK INSERT 选项\n\n| 选项 | 说明 |\n| --- | --- |\n| `BATCHSIZE` | 指定在加载失败时，将从源文件加载（提交）或回滚的行数。\
  \ |\n| `CHECK_CONSTRAINTS` | 导致应用用户定义的检查约束。请注意，`UNIQUE`、`PRIMARY KEY`、`FOREIGN KEY`\
  \ 或 `NOT NULL` 约束始终强制执行。 |\n| `CODEPAGE` | 此选项指定数据文件中数据的代码页。仅当数据包含使用扩展字符的 `char`、`varchar`\
  \ 或文本时，此选项才有用。 |\n| `DATAFILETYPE` | 指定数据文件的类型。 |\n| `ERRORFILE` | 给出错误日志文件的路径和名称，错误信息将被记录到该文件中。\
  \ |\n| `FIELDTERMINATOR` | 指定在使用 `char` 和 `widechar` 源数据文件时，用于结束字段（列）的字符。默认的字段终止符是制表符\
  \ (`\\t`)。 |\n| `FIRE_TRIGGERS` | 指示必须为每个导入行触发触发器。 |\n| `FIRSTROW` | 指定导入开始的行号。\
  \ |\n| `KILOBYTES_PER_BATCH` | 指定每批的千字节数。 |\n| `KEEPIDENTITY` | 指示必须使用源数据中 `IDENTITY`\
  \ 列的值，而不是继续使用目标表的 `IDENTITY` 序列。 |\n| `KEEPNULLS` | 保留 `NULLS` —— 而不是加载目标表中指定的任何默认值。\
  \ |\n| `LASTROW` | 从源文件加载的最后一行。 |\n| `MAXERRORS` | 在 `BULK INSERT` 失败之前，加载过程中允许失败的最大行数。默认值为\
  \ 10。 |\n| `ORDER` | 指定源数据的排序顺序。如果定义了此项，则源文件必须事先排好序。 |\n| `TABLOCK` | 锁定目标表，通过防止锁升级来加快数据加载速度。\
  \ |\n| `ROWTERMINATOR` | 定义结束每一行的字符。标准是 `'\\n'` —— 即换行符。 |\n\n更实际地说，你如何使用这些选项？接下来的几段将给出一些例子。这并非详尽无遗，而是为你自己的数据加载解决方案提供一些思路。\n\
  \n## 选择记录子集\n\n选择一定数量的记录允许你以较小的块导入源数据。需要这样做的可能原因有几个，包括：\n- 你需要调试过程，并且必须在非常大的源文件中“逐步逼近”一个错误。\n\
  - 你被要求将批次插入到多个表中。\n\n以下代码片段选择了一个行的子集 (`C:\\SQL2012DIRecipes\\CH02\\BulkInsertSubset.sql`)：\n\
  ```sql\nBULK INSERT dbo.InvoiceBulkLoad\n   FROM 'C:\\SQL2012DIRecipes\\CH02\\InvoiceBulkLoad.Txt'\n\
  \   WITH\n       (\n           FIELDTERMINATOR = ',',\n           ROWTERMINATOR\
  \ = '\\n',\n           FIRSTROW = 2,\n           LASTROW = 5\n       );\n```\n\n\
  ## 设置批大小和错误处理\n\n设置批大小可确保一旦达到最小错误数，整个加载不会失败。以下代码片段展示了如何执行此操作。它还会创建错误文件 `InvoicesErr`\
  \ 和 `InvoicesErr.Error.Txt`。前者让你可以看到加载过程中产生的任何错误；后者包含任何错误消息以及行号和偏移量，以帮助你跟踪错误。将 `MAXERRORS`\
  \ 设置为 0 将导致在数据加载过程中遇到的第一个错误时失败 (`C:\\SQL2012DIRecipes\\CH02\\BulkInsertFailOnError.sql`)。\n\
  ```sql\nBULK INSERT dbo.InvoiceBulkLoad\n   FROM 'C:\\SQL2012DIRecipes\\CH02\\InvoiceBulkLoad.Txt'\n\
  \   WITH\n       (\n         FIELDTERMINATOR = ',',\n         ROWTERMINATOR = '\\\
  n',\n         FIRSTROW = 2,\n         BATCHSIZE = 5,\n         MAXERRORS = 0,\n\
  \         ERRORFILE = 'C:\\SQL2012DIRecipes\\CH02\\InvoicesErr'\n       );\n```\n\
  因此，如果使用以下文本文件（注意最后一行 ID 中的字母字符）：\n```\nID,InvoiceNumber,ClientID,TotalDiscount,DeliveryCharge\n\
  1,a5,1,500.00,250.00\n2,a6,2,50.00,150.00\n3,a5,1,500.00,250.00\n4,a6,2,50.00,150.00\n\
  5,a5,1,500.00,250.00\n6,a6,2,50.00,150.00\n7,a5,1,500.00,250.00\nZ,a6,2,50.00,150.00\n\
  ```\n那么加载将会失败——但前四条记录（表头行计入批大小 5）已成功加载。`InvoicesErr` 文件将如图 2-13 所示。\n\n![9781430247913_Fig02-13.jpg](img/9781430247913_Fig02-13.jpg)\n\
  \n**图 2-13.** 批量加载错误文件\n\n而 `InvoicesErr.Error.Txt` 文件内容如下：\n```\nRow 9 File Offset\
  \ 207 ErrorFile Offset 0 - HRESULT 0x80020005\n```\n所有这些都有助于你快速定位错误。\n\n## 保留 NULL\
  \ 值、标识值并触发触发器\n\n以下代码片段将保留源数据中的 `NULL` 值（而不是使用默认值），应用所有约束，触发触发器，并使用源数据中的 `IDENTITY`\
  \ 值 (`C:\\SQL2012DIRecipes\\CH02\\BulkInsertKeepIdentity.sql`)。\n```sql\nBULK INSERT\
  \ dbo.InvoiceBulkLoad\n   FROM 'C:\\SQL2012DIRecipes\\CH02\\InvoiceBulkLoad.Txt'\n\
  \   WITH\n       (\n         FIELDTERMINATOR = ',',\n         ROWTERMINATOR = '\\\
  n',\n         FIRSTROW = 2,\n         KEEPNULLS,\n         KEEPIDENTITY,\n     \
  \    FIRE_TRIGGERS,\n         CHECK_CONSTRAINTS\n       ) ;\n```\n\n## 最大化导入速度\n\
  \n如果你希望导入尽可能快地执行，那么你需要确保以下几点：\n- 使用最小化日志记录。这将在第 14 章中描述。\n- 表上没有索引。\n- 表有一个聚集索引，并且\
  \ `ORDER` 提示告诉 `BULK INSERT` 源数据中的列是必需的列——并且源数据已经按此键排序。\n- 可以锁定该表（即，在运行 `BULK INSERT`\
  \ 时，该表上没有锁）。\n- 数据以单批次导入。\n- 不应用触发器和约束。\n- 保留 `NULLS` 而不是应用默认值。\n\n以下代码片段使用这些提示来最大化导入速度，并假设目标表的\
  \ ID 列上有一个聚集索引 (`C:\\SQL2012DIRecipes\\CH02\\BulkInsertOrderedSource.sql`)。\n```sql\n\
  BULK INSERT dbo.Invoice\n   FROM 'C:\\SQL2012DIRecipes\\CH02\\Invoices.Txt'\n  \
  \ WITH\n       (\n         FIELDTERMINATOR = ',',\n         ROWTERMINATOR = '\\\
  n',\n         FIRSTROW = 2,\n         TABLOCK,\n         KEEPNULLS,\n         ORDER\
  \ (ID ASC)\n       ) ;\n```\n\n## 使用视图进行列映射\n\n虽然使用 `BULK INSERT` 提供的许多选项可以处理确保成功导入所需的许多调整，但它们无法处理列映射。也就是说，对于一个“普通”的\
  \ `BULK INSERT`，源文件必须包含与目标表相同数量的列，并且列在源文件和目标表中的顺序必须相同。因此，在我们了解如何使用格式文件处理列映射之前，你可能想考虑一个相当简单的替代方案，它允许你加载文本文件——使用视图作为目标。这种方法可以让你避免使用格式文件映射列。它在以下情况下最有效：\n\
  - 源文件中的列数少于目标表中的列数。\n- 源列和目标列的顺序不同。\n- 目标表中没有 `NOT NULL` 列在源文本文件中没有对应的源数据。\n- 你对目标表中的某些列没有插入权限。\n\
  \n你需要一个基于目标表的视图，该视图包含源文件中找到的列。一个示例是将数据加载到与前面示例相同的目标表中，但源文件 (`Invoices2.Txt`) 只有三列数据，如下所示\
  \ (`C:\\SQL2012DIRecipes\\CH02\\BulkInsertView.sql` 包含视图和 `BULK INSERT` 命令)：\n```sql\n\
  CREATE VIEW dbo.vw_Invoice2 AS\nSELECT     ID, InvoiceNumber, ClientID\nFROM   \
  \    dbo.Invoice;\nGO\n```\n一旦视图创建完成，就可以像这样用于 `BULK INSERT`：\n```sql\nBULK INSERT\
  \ dbo.vw_Invoice2\n   FROM 'C:\\SQL2012DIRecipes\\CH02\\Invoices2.Txt'\n   WITH\n\
  \       (\n         FIELDTERMINATOR = ',',\n         ROWTERMINATOR = '\\n',\n  \
  \       FIRSTROW = 2\n       );\n```\n\n\n\nTxt' `WITH` (`FIELDTERMINATOR = ','`,\
  \ `ROWTERMINATOR = '\\n'`);\n\n```\n```\n\n你也可以使用视图来更改列顺序。当源文件结构发生变化（无论是否有提示）而你需要快速修复以允许加载数据时，这可能是一个非常有用的技术。不过，用作数据加载目标的视图必须是可更新的。此外，`INSERT`\
  \ 语句所做的修改不能影响视图 `FROM` 子句中引用的多个基础表。例如，向多表视图执行 `INSERT` 操作时，必须使用仅引用一个基础表列的 `column_list`。还要记住，如果语句中存在与同一视图或任何成员表的自连接，则不允许使用视图。最后，要更新分区视图，用户必须对成员表拥有\
  \ `INSERT`、`UPDATE` 和 `DELETE` 权限。更新分区视图还有其他限制，我建议你查阅在线手册 (`BOL`)。\n\n如果需要加载所有字段都用引号括起来的文件，可以使用如下代码处理\
  \ (`C:\\SQL2012DIRecipes\\CH02\\BulkInsertQuotedFields.sql`)：\n\n```\nBULK INSERT\
  \ dbo.Invoice\n   FROM 'C:\\SQL2012DIRecipes\\CH02\\Invoices.Txt'\n   WITH\n   \
  \    (\n         FIELDTERMINATOR = '\",\"',\n         ROWTERMINATOR = '\"\\n',\n\
  \         FIRSTROW = 2\n       );\n```\n\n此方法要求所有字段都必须加引号。\n\n#### 提示、技巧与陷阱\n\n\
  *   数据类型转换意味着你必须使用格式文件。这些文件在配方 2-11 中描述。\n*   源数据文件可以是本地连接的，也可以使用通用命名约定指定。\n*  \
  \ 标准的行终止符是 '`\\r`' 表示换行符，'`\\n`' 表示回车符，或者 '`\\r\\n`' 表示两者（CR/LF）。\n*   源文本文件中使用的字段和行终止符可以是任何可打印字符（控制字符不可打印——空字符、制表符、换行符和回车符除外）——或者最多\
  \ 10 个可打印字符的字符串，包括前面列出的部分或全部终止符。\n*   如果没有聚集索引却指定了 `ORDER` 提示，则该提示将被忽略。\n*   数据导入后，你可以（重新）应用索引。如果没有聚集索引，请记住先创建聚集索引，然后再创建非聚集索引。\n\
  *   `InvoicesErr` 错误文件特别有用，因为它给出了导致错误的数据。`InvoicesErr.error` 错误文件提供了导致错误的行号。当你希望继续加载而不是重新开始时，这可能极其有用。\n\
  *   在重新运行进程之前，务必删除错误文件，否则会出现错误。\n*   `BULK INSERTS` 可以并行运行——有关可能的并行加载模式的更多详细信息，请参见配方\
  \ 13-10。\n\n## 2-11. 为使用 Bulk Insert 或 BCP 的复杂平面文件加载创建格式文件\n\n### 问题\n\n你希望在源表和目标表之间执行列映射以及其他调整，同时仍使用\
  \ `BULK INSERT` 来利用其速度优势。\n\n### 解决方案\n\n创建一个格式文件来处理列映射——以及更多功能。我将解释如何操作。\n\n1.\
  \  要创建格式文件，请在命令提示符下运行以下命令：\n\n    ```\n    bcp CarSales_Staging.dbo.Invoice format\
  \ nul -c -x -f C:\\SQL2012DIRecipes\\CH02\\Invoicebulkload.Xml -T -SADAM02\n   \
  \ ```\n\n2.  这应该会创建以下 XML 格式文件 (`C:\\SQL2012DIRecipes\\CH02\\Invoicebulkload.Xml`)：\n\
  \n    ```\n    <?xml version = \"1.0\"?>\n    <BCPFORMAT xmlns = \" http://schemas.microsoft.com/sqlserver/2004/bulkload/format\"\
  \n               xmlns:xsi = \" http://www.w3.org/2001/XMLSchema-instance \">\n\
  \      <RECORD>\n       <FIELD ID = \"1\" xsi:type = \"CharTerm\" TERMINATOR = \"\
  \\t\" MAX_LENGTH = \"12\"/>\n       <FIELD ID = \"2\" xsi:type = \"CharTerm\" TERMINATOR\
  \ = \"\\t\" MAX_LENGTH = \"50\"\n              COLLATION = \"Latin1_General_CI_AS\"\
  />\n       <FIELD ID = \"3\" xsi:type = \"CharTerm\" TERMINATOR = \"\\t\" MAX_LENGTH\
  \ = \"12\"/>\n       <FIELD ID = \"4\" xsi:type = \"CharTerm\" TERMINATOR = \"\\\
  t\" MAX_LENGTH = \"41\"/>\n       <FIELD ID = \"5\" xsi:type = \"CharTerm\" TERMINATOR\
  \ = \"\\r\\n\" MAX_LENGTH = \"41\"/>\n      </RECORD>\n      <ROW>\n       <COLUMN\
  \ SOURCE = \"1\" NAME = \"ID\" xsi:type = \"SQLINT\"/>\n       <COLUMN SOURCE =\
  \ \"2\" NAME = \"InvoiceNumber\" xsi:type = \"SQLVARYCHAR\"/>\n       <COLUMN SOURCE\
  \ = \"3\" NAME = \"ClientID\" xsi:type = \"SQLINT\"/>\n       <COLUMN SOURCE = \"\
  4\" NAME = \"TotalDiscount\" xsi:type = \"SQLNUMERIC\" PRECISION = \"18\"\n    \
  \           SCALE = \"2\"/>\n       <COLUMN SOURCE = \"5\" NAME = \"DeliveryCharge\"\
  \ xsi:type = \"SQLNUMERIC\" PRECISION = \"18\"\n               SCALE = \"2\"/>\n\
  \      </ROW>\n    </BCPFORMAT>\n    ```\n\n### 工作原理\n\n如果源数据文件有任何复杂性，那么你可能需要应用格式文件。这些文件相对简单直接——尤其是自\
  \ SQL Server 2005 引入新的 XML 格式文件以来。鉴于 XML 格式是未来的发展方向，我们将不在此处探讨“旧的”非 XML 版本。它们最好在以下情况下使用：\n\
  \n*   当数据文件的列数与目标表不同时。\n*   当数据文件的列顺序与目标表不同时。\n*   当数据文件中的数据元素具有不同的列终止符时。\n*   当你需要从某些字段中移除引号时。\n\
  *   当同一数据文件用作具有不同架构的多个表的源时。\n*   当用户对目标表的某些列没有 `INSERT` 权限时。\n\n格式文件是一个 XML 文档，它遵循简单且定义良好的结构——但最棒的是，你无需从头开始创建\
  \ XML。你可以使用 BCP 实用程序让 SQL Server 完成大部分工作，然后只需微调结果即可获得你所需的内容。\n\n我意识到 XML 格式文件的结构乍一看可能有点复杂，但它理解和使用起来相对简单。让我们从查看格式文件的结构开始。它分为三个部分：\n\
  \n*   **XML 声明**\n*   **RECORD** 元素，描述源数据\n*   **ROW** 元素，描述目标表\n\n由于 XML 声明本质上是静态的，让我们来检查文件的另外两个部分。\n\
  \n首先，我们有 `ROW` 元素。它包含 `FIELD` 元素，这些元素可以包含 表 2-7 中提供的以下属性。\n\n表 2-7. BCP XML 格式文件中的字段元素\n\
  \n| 字段元素 | 描述 |\n| --- | --- |\n| `ID` | 给出源文件中的顺序字段号。 |\n| `TYPE` | 任何数据类型。有关可用数据类型，请参见\
  \ `http://msdn.microsoft.com/en-us/library/ms187833.aspx`。 |\n| `TERMINATOR` | 每个字段的字段终止符。在行的最后一个字段中，指定记录终止符。\
  \ |\n| `MAX_LENGTH` | 用于指定字段的最大可能长度。如果你生成了格式文件，此值源自目标表对应字段的元数据。 |\n| `COLLATION`\
  \ | 处理字符字段时，可以指定必须使用的排序规则。 |\n| `PREFIX_LENGTH` | 用于定义二进制数据表示的前缀长度。如果使用，则必须是 1、2、4\
  \ 或 8。 |\n| `LENGTH` | 固定宽度元素的数据长度。 |\n\n其次，你有描述目标表的 `RECORD` 元素。\n\n#### 提示、技巧与陷阱\n\
  \n*   当然，你可以替换 `Database.Schema.Table` 参数 (`CarSales_Staging.dbo.\n\n\n## 2-12.\
  \ 使用格式文件执行批量插入\n\n### 问题\n\n你希望使用一个格式文件（例如你在配方 2-11 中创建的那个）来确保平稳高效的批量加载过程。\n\n###\
  \ 解决方案\n\n在 `BULK INSERT` 语句中添加 `FORMATFILE` 参数。\n\n以下代码片段展示了如何操作，它使用了与配方 2-10 中相同的源文件和目标表\
  \ (`C:\\SQL2012DIRecipes\\CH02\\BulkInsertWithFormatFile.sql`)：\n\n```sql\nBULK\
  \ INSERT CarSales_Staging.dbo.Invoice\n   FROM 'C:\\SQL2012DIRecipes\\CH02\\Invoices.Txt'\n\
  \   WITH\n       (\n         FIRSTROW = 2,\n         FORMATFILE = 'C:\\SQL2012DIRecipes\\\
  CH02\\Invoicebulkload.Xml'\n       )\n```\n\n### 工作原理\n\n以上述 `BULK INSERT` 过程为例，我们现在可以指定必须使用格式文件来微调数据加载。运行这个\
  \ T-SQL 片段将加载源数据文件并应用格式文件中定义的参数和映射关系。\n\n要理解格式文件的强大之处，最好看一些符合日常数据导入需求（需要格式文件）的示例。在所有示例中，我们将采用前面的格式文件并对其进行调整，以展示格式文件的实用性。\n\
  \n首先，如果你的源文件是逗号分隔的（如此处使用的示例），你需要对格式文件进行微小调整：在 `<RECORD>` 部分将 `TERMINATOR = \"\\\
  t\"` 替换为 `TERMINATOR = \",\"`。幸运的是，使用文本编辑器进行全局替换即可完成。你这样做是在告诉 `BULK INSERT` 字段分隔符是逗号，而不是默认的制表符。\n\
  \n假设源数据的新版本颠倒了最后两列的顺序。以下格式文件将处理这种情况 (`C:\\SQL2012DIRecipes\\CH02\\InvoiceNewColumnOrder.Xml`)：\n\
  \n```xml\n<?xml version = \"1.0\"?>\n<BCPFORMAT xmlns= http://schemas.microsoft.com/sqlserver/2004/bulkload/format\n\
  \           xmlns:xsi = \" http://www.w3.org/2001/XMLSchema-instance \">\n <RECORD>\n\
  \  <FIELD ID = \"1\" xsi:type = \"CharTerm\" TERMINATOR = \",\" MAX_LENGTH = \"\
  12\"/>\n  <FIELD ID = \"2\" xsi:type = \"CharTerm\" TERMINATOR = \",\" MAX_LENGTH\
  \ = \"50\"\n           COLLATION = \"Latin1_General_CI_AS\"/>\n  <FIELD ID = \"\
  3\" xsi:type = \"CharTerm\" TERMINATOR = \",\" MAX_LENGTH = \"12\"/>\n  <FIELD ID\
  \ = \"4\" xsi:type = \"CharTerm\" TERMINATOR = \",\" MAX_LENGTH = \"41\"/>\n  <FIELD\
  \ ID = \"5\" xsi:type = \"CharTerm\" TERMINATOR = \"\\r\\n\" MAX_LENGTH = \"41\"\
  />\n </RECORD>\n <ROW>\n  <COLUMN SOURCE = \"1\" NAME = \"ID\" xsi:type = \"SQLINT\"\
  />\n  <COLUMN SOURCE = \"2\" NAME = \"InvoiceNumber\" xsi:type = \"SQLVARYCHAR\"\
  />\n  <COLUMN SOURCE = \"3\" NAME = \"ClientID\" xsi:type = \"SQLINT\"/>\n  <COLUMN\
  \ SOURCE = \"5\" NAME = \"DeliveryCharge\" xsi:type = \"SQLNUMERIC\" PRECISION =\
  \ \"18\" SCALE = \"2\"/>\n  <COLUMN SOURCE = \"4\" NAME = \"TotalDiscount\" xsi:type\
  \ = \"SQLNUMERIC\" PRECISION = \"18\" SCALE = \"2\"/>\n </ROW>\n</BCPFORMAT>\n```\n\
  \n以下格式文件将只加载源文件中的第一个字段，并忽略其他字段。\n本质上，这个技术允许你垂直子集化源数据，只加载你感兴趣的列 (`C:\\SQL2012DIRecipes\\\
  CH02\\InvoiceSubset.Xml`)。\n\n```xml\n<?xml version = \"1.0\"?>\n<BCPFORMAT xmlns\
  \ = \" http://schemas.microsoft.com/sqlserver/2004/bulkload/format \"\n        \
  \   xmlns:xsi = \" http://www.w3.org/2001/XMLSchema-instance \">\n <RECORD>\n  <FIELD\
  \ ID = \"1\" xsi:type = \"CharTerm\" TERMINATOR = \",\" MAX_LENGTH = \"12\"/>\n\
  \  <FIELD ID = \"2\" xsi:type = \"CharTerm\" TERMINATOR = \",\" MAX_LENGTH = \"\
  50\"\n         COLLATION = \"Latin1_General_CI_AS\"/>\n  <FIELD ID = \"3\" xsi:type\
  \ = \"CharTerm\" TERMINATOR = \",\" MAX_LENGTH = \"12\"/>\n  <FIELD ID = \"4\" xsi:type\
  \ = \"CharTerm\" TERMINATOR = \",\" MAX_LENGTH = \"41\"/>\n  <FIELD ID = \"5\" xsi:type\
  \ = \"CharTerm\" TERMINATOR = \"\\r\\n\" MAX_LENGTH = \"41\"/>\n </RECORD>\n <ROW>\n\
  \  <COLUMN SOURCE = \"1\" NAME = \"ID\" xsi:type = \"SQLINT\"/>\n </ROW>\n</BCPFORMAT>\n\
  ```\n\n即使你只加载源文件中的一个字段，也必须在 `<RECORD />` 部分描述所有源字段。\n\n如果你需要做与上述相反的操作，那么你可以从源文件加载所有（或选定的）字段，而目标表包含更多字段。为此，我们将使用\
  \ `Invoices2.txt` 源文件，它只有三个字段。要使用的格式文件如下所示 (`C:\\SQL2012DIRecipes\\CH02\\Invoices2.Xml`)：\n\
  \n```xml\n<?xml version = \"1.0\"?>\n<BCPFORMAT xmlns = \" http://schemas.microsoft.com/sqlserver/2004/bulkload/format\
  \ \"\n           xmlns:xsi = \" http://www.w3.org/2001/XMLSchema-instance \">\n\
  \ <RECORD>\n  <FIELD ID = \"1\" xsi:type = \"CharTerm\" TERMINATOR = \",\" MAX_LENGTH\
  \ = \"12\"/>\n  <FIELD ID = \"2\" xsi:type = \"CharTerm\" TERMINATOR = \",\" MAX_LENGTH\
  \ = \"50\"\n         COLLATION = \"Latin1_General_CI_AS\"/>\n  <FIELD ID = \"3\"\
  \ xsi:type = \"CharTerm\" TERMINATOR = \"\\r\\n\" MAX_LENGTH = \"12\"/>\n </RECORD>\n\
  \ <ROW>\n  <COLUMN SOURCE = \"1\" NAME = \"ID\" xsi:type = \"SQLINT\"/>\n  <COLUMN\
  \ SOURCE = \"2\" NAME = \"InvoiceNumber\" xsi:type = \"SQLVARYCHAR\"/>\n  <COLUMN\
  \ SOURCE = \"3\" NAME = \"TotalDiscount\" xsi:type = \"SQLNUMERIC\" PRECISION =\
  \ \"18\" SCALE = \"2\"/>\n </ROW>\n</BCPFORMAT>\n```\n\n值得注意的是，源列字段仍然是顺序编号的，但到目标表列的映射已经改变。由于源文件只包含三列，而目标表有五列，格式文件通过“NAME”属性指示\
  \ BCP 使用哪些列并将其映射到目标。当然，你总可以重构目标表，但这为 SQL 纯粹主义者所不取，而且无论如何，如果你现有的目标表包含数亿条（或更多）记录，那么调整格式文件显然是更简单的选择。\n\
  \n由于源文件不包含列标题，`BULK INSERT` 命令看起来像这样 (`C:\\SQL2012DIRecipes\\CH02\\BulkInsertNoColHeaders.Sql`)：\n\
  \n```sql\nBULK INSERT dbo.Invoice\n   FROM 'C:\\SQL2012DIRecipes\\CH02\\Invoices2.Txt'\n\
  \   WITH (FORMATFILE = 'C:\\SQL2012DIRecipes\\CH02\\Invoices2.Xml');\n```\n\n请注意，你可以将源字段映射到任何现有的目标字段，无论目标表中的字段顺序如何，只要数据类型兼容即可。你无需将字段和行终止符指定为\
  \ `BULK INSERT` 参数，因为这些选项已在格式文件中定义。\n\n并非所有源文件对每个字段都使用相同的分隔符。这也可以通过格式文件处理。`C:\\\
  SQL2012DIRecipes\\CH02\\Invoices5` 示例文件对第一个字段分隔符使用逗号；对第二个使用 `@#@`；对第三个使用管道符 (`|`)；对第四个使用制表符。以下显示了处理此问题的格式文件。如果需要，你甚至可以使用多个字符作为字段分隔符\
  \ (`C:\\SQL2012DIRecipes\\CH02\\BulkLoadZanySeparators.Xml`)。\n\n```xml\n<?xml version\
  \ = \"1.0\"?>\n<BCPFORMAT xmlns = \" http://schemas.microsoft.com/sqlserver/2004/bulkload/format\
  \ \"\n           xmlns:xsi = \" http://www.w3.org/2001/XMLSchema-instance \">\n\
  \ <RECORD>\n  <FIELD ID = \"1\" xsi:type = \"CharTerm\" TERMINATOR = \",\" MAX_LENGTH\
  \ = \"12\"/>\n  <FIELD ID = \"2\" xsi:type = \"CharTerm\" TERMINATOR = \"@#@\" MAX_LENGTH\
  \ = \"50\"\n         COLLATION = \"Latin1_General_CI_AS\"/>\n  <FIELD ID = \"3\"\
  \ xsi:type = \"CharTerm\" TERMINATOR = \"|\" MAX_LENGTH = \"12\"/>\n  <FIELD ID\
  \ = \"4\" xsi:type = \"CharTerm\" TERMINATOR = \"\\t\" MAX_LENGTH = \"41\"/>\n \
  \ <FIELD ID = \"5\" xsi:type = \"CharTerm\" TERMINATOR = \"\\r\\n\" MAX_LENGTH =\
  \ \"41\"/>\n </RECORD>\n <ROW>\n  <COLUMN SOURCE = \"1\" NAME = \"ID\" xsi:type\
  \ = \"SQLINT\"/>\n  <COLUMN SOURCE = \"2\" NAME = \"InvoiceNumber\" xsi:type = \"\
  SQLVARYCHAR\"/>\n  <COLUMN SOURCE = \"3\" NAME = \"ClientID\" xsi:type = \"SQLINT\"\
  />\n  <COLUMN SOURCE = \"4\" NAME = \"TotalDiscount\" xsi:type = \"SQLNUMERIC\"\
  \ PRECISION = \"18\" SCALE = \"2\"/>\n  <COLUMN SOURCE = \"5\" NAME = \"DeliveryCharge\"\
  \ xsi:type = \"SQLNUMERIC\" PRECISION = \"18\" SCALE = \"2\"/>\n </ROW>\n</BCPFORMAT>\n\
  ```\n\n`BULK INSERT` 代码本身无需更改，因为所有分隔符信息都包含在格式文件中。\n\n"
- "# 2-13. 通过 T-SQL 快速加载文本文件\n\n## 问题\n\n你需要从文本文件中快速执行数据加载。\n\n## 解决方案\n\n使用 T-SQL\
  \ 中的 `OPENROWSET (BULK)`。以下是实现该操作的代码片段（`C:\\SQL2012DIRecipes\\CH02\\BulkInsertWithOpenrowset.sql`）：\n\
  \n```sql\nINSERT INTO     CarSales_Staging.dbo.Invoices\nSELECT          ID, InvoiceNumber,\
  \ ClientID\nFROM            OPENROWSET(BULK 'C:\\SQL2012DIRecipes\\CH02\\Invoices.Txt',\n\
  \                FORMATFILE = 'C:\\SQL2012DIRecipes\\CH02\\Invoicebulkload.Xml')\
  \ AS MyDATA;\n```\n\n## 工作原理\n\n假设你已掌握格式文件的基本知识，现在可以继续使用 `OPENROWSET (BULK)` T-SQL\
  \ 命令，该命令强制要求使用格式文件。前面的代码片段使用预定义的格式文件加载文本文件。\n\n#### 提示、技巧与陷阱\n\n*   必须提供别名（本例中为\
  \ `MyDATA`），否则会收到错误消息。\n*   与 `OPENROWSET (BULK)` 一起使用的 T-SQL 可以使用 `WHERE`、`ORDER\
  \ BY`、`CAST`、`CONVERT` 和别名进行扩展。这在加载数据时提供了极大的灵活性。\n\n"
- "# 2-14. 从 SSIS 执行 BULK INSERT\n\n## 问题\n\n你希望从 SSIS 进程内部获得 `BULK INSERT` 提供的额外速度。\n\
  \n## 解决方案\n\n使用 SSIS `BULK INSERT` 任务在 SSIS 进程中导入数据。具体方法如下：\n\n1.  在 SSIS 包中，向“控制流”窗格添加一个\
  \ `BULK INSERT` 任务。双击以编辑该任务。\n2.  单击左侧的“连接”以在右侧显示“连接”窗格。\n3.  选择或创建目标连接。在本例中，目标是\
  \ CarSales_Staging 数据库。建立连接后，选择目标表（dbo.Invoices）。定义目标连接在配方 2-2 中有详细描述。\n4.  选择到源文件的连接，或者如果不存在则创建它。\n\
  5.  如果使用格式文件，请创建或选择到格式文件的连接。最终结果应如图 2-14 所示。\n    ![9781430247913_Fig02-14.jpg](img/9781430247913_Fig02-14.jpg)\n\
  \    图 2-14。SSIS 中的批量插入连接详细信息\n6.  在左侧列表中选择“选项”以显示“选项”窗格，如图 2-15 所示。\n    ![9781430247913_Fig02-15.jpg](img/9781430247913_Fig02-15.jpg)\n\
  \    图 2-15。SSIS 中的批量插入连接选项\n7.  在此处，你可以设置 `BULK INSERT` 选项，如配方 2-12 中针对基于 T-SQL\
  \ 的 `BULK INSERT` 所述。\n8.  单击“确定”返回到“控制流”窗格。\n9.  运行导入。\n\n## 工作原理\n\n使用 SSIS 批量插入任务允许你将文本数据极快地插入\
  \ SQL Server，它使用了配方 2-12 中描述的大多数选项。在这里，你实质上是将 SSIS 用作 T-SQL `BULK INSERT` 任务的“封装器”。与\
  \ T-SQL `BULK INSERT` 一样，格式文件不是必需的——除非需要列映射、跳过列、去除引号等操作。\n\n在本配方中，我假设你知道如何创建 SSIS\
  \ 连接管理器。如果不知道，请参考本书中的其他配方。你将需要一个目标表和一个格式文件（如果需要和/或正在使用）。\n\n可以从“选项”下拉菜单中选择以下 `BULK\
  \ INSERT` 选项：\n\n*   保留空值 (`Keep Nulls`)\n*   标识插入 (`Identity Insert`)\n*   表锁 (`Table\
  \ Lock`)\n*   触发器激发 (`Fire Triggers`)\n*   检查约束 (`Check Constraints`)\n\n“排序”选项允许你指定源数据所依据的源列。如果目标表中排序列上存在聚集索引，这将加快导入速度。\n\
  \n#### 提示、技巧与陷阱\n\n*   如果不使用格式文件，请在“连接”窗格中选择“指定”，然后为简单源文件选择行和列分隔符。\n*   有关如何使用“批处理大小”、“首行”和“末行”选项，请参见配方\
  \ 2-9。\n*   由于这不过是对 `BULK INSERT` 命令的接口，因此格式文件的创建和指定与配方 2-11 中描述的完全相同。\n\n"
- "# 2-15. 在 SSIS 中处理具有行前缀的复杂平面文件格式\n\n## 问题\n\n你有一个平面文件，它不是一组简单的伪列，而是包含多个行结构，每种类型都以前缀特定指示符。你需要将此文件加载到\
  \ SQL Server。\n\n## 解决方案\n\n使用 SSIS 识别记录类型并将其分离到不同的数据流中。然后将每种行结构加载到结构独立的目标表中。\n\n\
  假设你收到的文本文件中包含本质上是多种类型的行。\n\n在此示例中，我将文件的复杂性限制为两种不同的行类型。我们可以将它们视为标题行和子行。这是一个（非常小的）示例（`C:\\\
  SQL2012DIRecipes\\CH02\\MultipleSubsets.Txt`）：\n\n```\nHDR:-3,3A9271EA-FC76-4281-A1ED-714060ADBA30,3,2011-04-01\
  \ 00:00:00.000,500.00,250.00\nLNE:-1,3,1,5000.00,0x00000000000007DB,,1\nLNE:-2,3,2,12500.00,0x00000000000007DC,,2\n\
  HDR:-4,C9018CC1-AE67-483B-B1B7-CF404C296F0B,4,2011-09-01 00:00:00.000,0.00,500.00\n\
  LNE:-3,4,3,17250.00,0x00000000000007DD,,1\nLNE:-4,4,4,52000.00,0x00000000000007DE,,2\n\
  LNE:-5,4,5,71000.00,0x00000000000007DF,,3\n```\n\n如你所见，每行都以`HDR:-`或`LNE:-`开头，这使你（和\
  \ SSIS）能够确定该行包含的记录类型。以下解释了如何处理此问题。\n\n## 步骤\n\n1.  创建与源文件中设置的两种记录类型相对应的两个目标表（`C:\\\
  SQL2012DIRecipes\\CH02\\tblMultipleSubsets.sql`）：\n    ```\n    CREATE TABLE InvoiceHeader\n\
  \    (\n        ID INT\n        ,InvoiceNumber VARCHAR(50)\n        ,ClientID INT\n\
  \        ,InvoiceDate DATETIME\n        ,TotalDiscount NUMERIC(18,2)\n        ,DeliveryCharge\n\
  \    ) ;\n    GO\n    CREATE TABLE InvoiceLine\n    (\n        ID INT\n        InvoiceID\
  \ INT\n        StockID INT\n        SalePrice NUMERIC(18,2)\n        Timestamp BIGINT\n\
  \        DateUpdated DATETIME\n        LineItem INT\n    ) ;\n    GO\n    ```\n\n\
  2.  创建一个新的 SSIS 包，并添加一个名为`CarSales_Staging`的 OLEDB 连接管理器以连接到 CarSales_Staging 数据库。如果你使用的是\
  \ SQL Server 2012，可以重用现有的包级连接。\n3.  添加一个平面文件连接管理器，将其配置为连接到源文件（`C:\\SQL2012DIRecipes\\\
  CH02\\MultipleSubsets.Txt`）。编辑连接管理器时，假设行前缀是固定长度的，将文件格式设置为“Ragged Right”。在“列”窗格中，设置列标记以将数据分成两列。第一列将包含行前缀，第二列将包含行数据。这应如图\
  \ 2-16 所示。\n    ![9781430247913_Fig02-16.jpg](img/9781430247913_Fig02-16.jpg)\n\
  \    图 2-16。  复杂文本文件初始分离为两列\n\n4.  在“高级”窗格中，为这两列起更友好的名称（本例中为`ColIdentifier`和`ColData`），并将用于保存数据的列的`OutputColumnWidth`设置为一个较大的值。示例如图\
  \ 2-17 所示。\n    ![9781430247913_Fig02-17.jpg](img/9781430247913_Fig02-17.jpg)\n\
  \    图 2-17。  为复杂文本文件定义列标识符\n\n5.  点击“确定”确认修改。\n6.  添加一个数据流任务。双击进行编辑。\n7.  添加一个平面文件数据源。将其配置为使用你刚创建的平面文件连接管理器。\n\
  8.  在数据流窗格中添加一个条件拆分转换。将平面文件数据源连接到它。双击进行编辑。创建两个新输出，配置如下：\n    | OutputName | Condition\
  \ |\n    | --- | --- |\n    | InvoiceHeader | `ColIdentifier == \"HDR:-\"` |\n \
  \   | InvoiceLine | `ColIdentifier == \"LNE:-\"` |\n\n9.  在数据流窗格中添加一个派生列转换，并将条件拆分连接到它。选择`InvoiceHeader`作为要使用的输出。双击进行编辑。添加以下派生列（此处和步骤\
  \ 11 中使用的表达式代码位于`C:\\SQL2012DIRecipes\\CH02\\ExpressionCode.Txt`）：\n    ![image](img/untable2-1.jpg)\n\
  \n10. 添加一个 OLE DB 目标。将刚创建的派生列转换连接到它。将其命名为**Invoice Header**。将目标任务配置为使用`CarSales_Staging`连接管理器并指向`InvoiceHeader`目标表。将派生列（即不是最初的`ColIdentifier`和`ColData`列）映射到目标表。\n\
  11. 重复步骤 7 和 8，仅使用`InvoiceLine`作为条件拆分转换的输出，并指向`InvoiceLine`表。要创建的派生列是：\n    ![image](img/untable2-2.jpg)\n\
  \n包应类似于图 2-18。\n![9781430247913_Fig02-18.jpg](img/9781430247913_Fig02-18.jpg)\n\
  图 2-18。  处理复杂平面文件的 SSIS 数据流\n\n12. 运行该包。\n你的复杂源文件将被导入到两个目标表中。\n\n## 工作原理\n\n你可能会遇到包含两种或多种非常不同的记录类型的文本文件。在许多情况下，你可以将它们视为在单个文件中发送“规范化”数据的方式，这与标准\
  \ CSV 文件的单表单文件方法相反。例如，我见过由大型机和 ERP 系统生成的此类文件。对于这些“多格式”文本文件，我假设每行都有一个行前缀，以便你识别每行中包含的数据类型。\n\
  \n这种更复杂的方法是必要的，因为本章到目前为止描述的所有技术都适用于标准文本文件，但不适用于更复杂的格式。这里所说的“标准”是指从顶部到底部具有相同行结构的文件，因此可以毫无痛苦地加载到表结构中，因为每行文本中的列分隔符数量相同。现实情况是，文本文件格式的微小变化——或故意的设计决定——常常会使文本文件难以加载。或者至少，需要额外的处理步骤来管理源数据文件的原始结构特征，就像本例一样。\n\
  \n![image](img/sq.jpg) **注意**   此示例仅显示两种记录类型。它可以轻松扩展以容纳多种记录类型。\n\n这里我们使用两阶段方法。\n\
  *   **首先**：将每行拆分为两列，一列包含行前缀，另一列包含实际数据。\n*   **其次**：根据数据类型解析每条记录。\n\n使用派生列转换解析数据看起来比实际更复杂。最后一列使用\
  \ SSIS 中的`RIGHT`函数来获取最右边的列。所有其他列都使用`SUBSTRING`来隔离数据，并使用`FINDSTRING`来识别分隔符字符。这是 SSIS\
  \ 相对于 T-SQL 的一个巨大优势，因为`FINDSTRING`可以指示从查找字符的哪个出现位置开始搜索。此外，在 SSIS 2012 中，4000 字符的限制不再适用，因此你可以处理更长的源记录。请注意，必须在派生列转换中设置数据类型，以使数据摄取过程高效且无错误地运行。\n\
  \n如果你使用的是 SQL Server 2005 或 2008，则必须使用`SUBSTRING(ColData,1,FINDSTRING(ColData,\"\
  ,\",1) - 1)`来隔离第一列。这是因为`LEFT`函数在这些版本的 SSIS 中不可用。本质上，第一列必须使用`SUBSTRING`函数来模拟`LEFT`函数。\n\
  \n## 提示、技巧和陷阱\n\n*   如果行前缀不是固定长度，那么你可以将文件格式设置为“delimited”，并指定分隔符为结束行前缀的任何字符——在本例中是连字符(-)。\n\
  \n\n然后在平面文件连接管理器的“高级”选项卡中，确保只有两列（这通常意味着删除其他所有列），并将第二列的列分隔符指定为行分隔符（大多数情况下会是`{CR}{LF}`）。更多细节请参阅配方\
  \ 2-16。\n\n*   在执行导入过程之前，几乎总是最好移除目标表上的任何引用完整性约束，因为你无法确保头记录会在行记录之前导入。你总可以在导入过程之后重新应用它们。\n\
  *   在 SSIS 2005 和 2008 中，此方法对记录的最大长度限制为 4000 个字符。遗憾的是，试图通过解析文本流来绕过此限制是不可能的，因为`SUBSTRING()`函数不适用于此数据类型。\n\
  *   源文件中任何不以行前缀开头的记录都将被忽略。\n\n## 2-16. 在 SSIS 中预解析和暂存文件子集\n\n### 问题\n\n你需要加载一个由两种或更多不同记录类型组成的复杂文本文件。你想先分离其组成元素，以便能按特定顺序加载组成表。\n\
  \n### 解决方案\n\n使用 SSIS 解析源文件，并将其作为子文件暂存在磁盘上作为过程的一部分。然后在遵守关系完整性约束的情况下加载两个表。\n\n这个配方处理的是包含多种记录类型的扁平“大型机风格”文本文件问题，但使用的方法与配方\
  \ 2-15 不同。不过，它将使用相同的源文件，因此，我建议你在继续以下过程之前先参考配方 2-15。这有助于你理解该解决方案。以下解释了如何在最终数据加载之前将源文件拆分为单独的暂存文件。\n\
  \n1.  创建一个新的 SSIS 包，并添加一个名为`MainFrame`的平面文件连接管理器，将其配置为连接到源文件（本例中为`C:\\SQL2012DIRecipes\\\
  CH02\\MultiFormatSource.Txt`）。\n2.  在平面文件连接管理器编辑器中，将格式设置为“带分隔符”。\n3.  单击“高级”选项卡。删除除两列外的所有列（或添加列直到有两列）。将第一列命名为`ColIdentifier`，第二列命名为`ColData`。将第一列（`ColIdentifier`）的数据类型设置为“字符串”，并将列分隔符设置为连字符（`-`）。（本例中我们使用这个；你必须使用源文件中使用的任何分隔符）。将第二列（`ColData`）的数据类型设置为“Unicode\
  \ 文本流”。对话框应如配方 2-15 中的图 2-17 所示。\n4.  确认你的配置更改。\n5.  创建两个新的平面文件连接管理器，分别命名为`InvoiceHeader`和`InvoiceLine`。将每个都配置为指向一个文本文件（我富有想象力地将我的命名为`InvoiceHeader.Txt`和`InvoiceLine.Txt`）。对于每个连接管理器，单击“高级”窗格并添加一个新列，将其设置为“Unicode\
  \ 文本流”数据类型（或“文本流”数据类型）。将该列命名为`Coldata`。“高级”窗格应如图 2-19 所示。\n\n    ![9781430247913_Fig02-19.jpg](img/9781430247913_Fig02-19.jpg)\n\
  \n    图 2-19. 平面文件连接管理器的“高级”窗格\n\n6.  确认你的配置更改。\n7.  添加一个数据流任务。双击进行编辑。\n8.  添加一个平面文件源。将其配置为使用`MainFrame`连接管理器。它应该只有两列——`ColIdentifier`和`ColData`。\n\
  9.  添加一个条件拆分任务。按照前一个配方中描述的确切方式配置它。\n10. 向数据流窗口添加一个平面文件目标。将条件拆分任务连接到它。使用名为`InvoiceHeader`的输出。配置此目标使用名为`InvoiceHeader`的平面文件连接管理器——并勾选“覆盖文件中的数据”框。\n\
  11. 单击“映射”。在可用输入列和可用目标列之间映射`Coldata`列。\n12. 针对`invoiceLine`输出和平面文件连接管理器重复步骤 10 和\
  \ 11。\n13. 返回到控制流窗口。添加一个名为`Import Headers`的数据流任务。将其连接到前一个数据流任务。\n14. 添加一个名为`Import\
  \ Lines`的数据流任务。将其连接到前一个数据流任务（`Import Headers`）。整个数据流应如图 2-20 所示。\n\n    ![9781430247913_Fig02-20.jpg](img/9781430247913_Fig02-20.jpg)\n\
  \n    图 2-20. 导入复杂源文本文件同时暂存数据\n\n15. 设置你刚刚创建的两个数据流任务，以导入`InvoiceHeader.Txt`和`InvoiceLines.Txt`带分隔符文件。这在配方\
  \ 2-2 中有详细描述。创建两个目标表的脚本是`C:\\SQL2012DIRecipes\\CH02\\tblMultipleSubsets.sql`。\n\n\
  ### 工作原理\n\n有时你可能希望处理来自大型机或某些企业资源规划软件解决方案的文件。这些文件可能包含多种行格式。然而，你希望——或者需要——将数据存储在临时文本文件中，作为过程的第一阶段。我指的是，每种记录类型（本例中的头记录和行记录）将首先从单个源文件中分离到单独的暂存文件中；然后将从产生的暂存文件中加载每种类型。有几种原因使得这种方法更可取甚至必要。其中包括以下几点：\n\
  \n*   记录长度超过 4000 个字符，因此无法使用前一配方中描述的方法。\n*   目标文件上存在关系完整性约束，因此它们必须按正确的顺序（父表后跟子表）加载。\n\
  *   使用派生列转换编写扩展解析代码不切实际。\n*   你希望在加载之前检查、调试、分析或预处理单独的源文件。\n\n这些限制意味着你需要使用本配方给出的方法。本质上，它使用行前缀来分隔每种记录类型，并将其发送到磁盘上的暂存文件。然后，每个生成的文件作为单独的数据流任务加载。\n\
  \n### 提示、技巧和陷阱\n\n*   如果你确定没有记录超过 4000 个字符的最大长度，可以将数据类型（在输入和输出文件的平面文件连接管理器中）设置为字符串或宽字符串数据类型。\n\
  *   由于此方法将文本文件写入磁盘（然后再读回），它会比“纯”SSIS 内存方法慢不少。\n*   如果你要加载多个源文件，请不要勾选“覆盖文件中的数据”框，而是在此过程开始时使用初始文件系统任务删除暂存文件的内容。\n\
  *   源文件中任何不以行前缀开头的记录都将被忽略。\n\n## 2-17. 使用 SQL Server 2012 处理源文件中不规则的列数\n\n### 问题\n\
  \n你需要加载一个具有不规则列数的源文件。\n\n### 解决方案\n\n使用 SQL Server 2012 中的 SSIS。\n\n在导入列数可变的文本文件时，你无需进行任何特殊配置，因为这是\
  \ SQL Server 2012 及更高版本的默认行为。只需创建一个平面文件连接管理器并配置它使用相关源文件即可。\n\n### 工作原理\n\n幸运的是，SQL\
  \ Server 2012 通过 SSIS 包含了处理具有多个列分隔符的平面文件的能力，从而解救了各地的数据集成开发人员。值得注意的是，此行为与早期版本完全不同。\n\
  \n\n\n过去，如果 SSIS 在源文件中遇到不同数量的列分隔符，行终止符将无法被“正确”处理，数据会蛇形延伸到下一条记录中，这经常导致数据加载失败。自 SQL\
  \ Server 2012 起，记录终止符将始终强制开始一条新记录。\n\n#### 提示、技巧与陷阱\n*   要防止 SSIS 处理源文件中不一致的列数，您可以将属性\
  \ `AlwaysCheckForRowDelimiters` 设置为 false。这将导致 SSIS 的行为与旧版本相同。\n*   一条记录中的最大列分隔符数量可以是源文件中任意一行所包含的数量。SSIS\
  \ 会猜测所需的列数并将其应用于整个数据加载过程。\n*   记录终止符（或者您喜欢的行分隔符）绝不能用引号括起来，否则 SSIS 将无法识别它。\n\n##\
  \ 2-18. 在 SQL Server 2012 中处理嵌入式限定符\n**问题**\n您需要从一个包含嵌入式限定符的文本文件加载数据。\n\n**解决方案**\n\
  使用 SQL Server 2012 中的 SSIS。该版本的 SSIS 会自动处理嵌入式限定符，无需您额外操作。\n\n**工作原理**\nSQL Server\
  \ 2012 再次通过扩展 SSIS 来解救数据集成开发人员，使其能够处理嵌入式文本限定符。这意味着，如果某个字符（例如单引号或双引号）被用作列限定符，那么当它要作为字面值使用时，就必须进行转义。这是通过将限定符字符加倍来完成的。因此，平面文件中的引号\
  \ (`\"`) 必须写成双引号 (`\"\"`) 才能被正确导入。换句话说，在一个由限定符包围的字段内，该文本限定符的双实例将被解释为单实例的字面字符串。\n\
  \n#### 提示、技巧与陷阱\n*   处理嵌入式限定符的行为对于带文本限定符的列/文件始终处于活动状态，无法禁用。\n*   这种行为意味着限定符的数量必须符合预期。例如，如果您有一个字段——“Adam\
  \ “Aspin””——那么该字段将无法加载，因为系统预期限定符字段内会有一个转义的双引号。如果这是个问题，那么最佳解决方案是不要使用字段限定符，而是使用脚本组件（扩展前面描述的技术）来处理限定符。\n\
  \n## 2-19. 在 SQL Server 2005 和 2008 中处理源文件中的不规则列数\n**问题**\n您需要加载一个列数不规则的源文件，但您使用的是\
  \ SQL Server 2005 或 2008。\n\n**解决方案**\n使用 SSIS 自定义脚本来解析源文件。\n\n1.  创建一个包含所需列数的目的表——即，至少要有与分隔符最多的行相同数量的列。在此示例中，该文件为\
  \ (`C:\\SQL2012DIRecipes\\CH02\\tblInvoiceLines_Multifield.sql`)：\n    ```sql\n\
  \    CREATE TABLE CarSales_Staging.dbo.InvoiceLines_Multifield\n    (\n     ID INT\
  \ NULL,\n     InvoiceID VARCHAR(25) NULL,\n     StockID INT NULL,\n     Quantity\
  \ INT NULL,\n     SalePrice MONEY NULL,\n     Comment1 VARCHAR(150) NULL,\n    \
  \ Comment2 VARCHAR(500) NULL\n    ) ;\n    GO\n    ```\n2.  创建一个新的 SSIS 包，添加一个平面文件连接管理器，并将其配置为使用“右侧参差不齐”格式连接到源文件\
  \ (`C:\\SQL2012DIRecipes\\CH02\\InvoicesMultifield.Txt`)。不要在“列”窗格中设置任何固定宽度列限制。在“高级”窗格中将唯一的源列命名为\
  \ `SourceData`。在此窗格中，将数据类型设置为“文本流”。确保“常规”窗格中的 Unicode 复选框未被选中（请继续阅读以了解如何处理 Unicode\
  \ 源）。\n3.  添加一个 OLE DB 目的连接管理器。将其配置为连接到目的数据库和表（在此示例中分别为 CarSales_Staging 和 InvoiceLines_Multifield）。\n\
  4.  添加一个“数据流任务”。双击进行编辑。\n5.  在“数据流”窗格中，添加一个“平面文件源”。双击进行编辑。将连接管理器设置为您在步骤 1 中创建的那个。检查唯一的源列\
  \ `SourceData` 是否可用。确认您的修改。\n6.  添加一个“脚本组件”并将其设置为“转换”。将“平面文件源”连接到它。双击进行编辑。\n7. \
  \ 点击“输入和输出”。在窗格中，添加与源列数量相同的输出列（为此，展开“输出 0”，然后展开“输出列”，并点击“添加列”）。将列数据类型和长度设置为与源数据对应。在此示例中，设置如下：\n\
  \    | 列名 | 数据类型 | 长度 |\n    | --- | --- | --- |\n    | `ID` | 4 字节有符号整数 |  |\n\
  \    | `InvoiceID` | 4 字节有符号整数 |  |\n    | `StockID` | 字符串 | 50 |\n    | `Quantity`\
  \ | 4 字节有符号整数 |  |\n    | `SalePrice` | 货币 |  |\n    | `Comment1` | 字符串 | 150 |\n\
  \    | `Comment2` | 字符串 | 500 |\n    “输入和输出”窗格将类似于图 2-21 中所示的那样。\n    ![9781430247913_Fig02-21.jpg](img/9781430247913_Fig02-21.jpg)\n\
  \    图 2-21.  为解析字符串数据创建输出列\n\n8.  点击“脚本”以激活脚本窗格。将“脚本语言”设置为 Microsoft Visual Basic\
  \ 2010。点击“编辑脚本”。\n9.  在脚本编辑器中，为 `Input0_ProcessInputRow` 方法键入或复制以下脚本：\n    ```vb\n\
  \    Public Overrides Sub Input0_ProcessInputRow(ByVal Row As Input0Buffer)\n  \
  \          Dim NbCols As Integer\n            Dim Delimiter As String = \",\"\n\
  \            Dim StartPosition As Integer = 0\n            Dim EndPosition As Integer\
  \ = 0\n            Dim RowContents As String = System.Text.Encoding.UTF8.GetString(Row.SourceData.GetBlobData(0,\
  \ Convert.ToInt32(Row.SourceData.Length)))\n            ' 计算分隔符的数量 - 从而计算列数\n  \
  \          NbCols = (RowContents.Length - RowContents.Replace(Delimiter, \"\").Length)\n\
  \            ' 根据列数设置输出数组\n            Dim OutputCols(NbCols) As String\n      \
  \      ' 解析数据\n            For Ctr = 0 To NbCols + 1\n                If Ctr = 0\
  \ Then\n                    If NbCols = 0 Then\n                        OutputCols(Ctr)\
  \ = RowContents\n                        Exit For\n                    Else\n  \
  \                      StartPosition = 0\n                        EndPosition =\
  \ RowContents.IndexOf(\",\", StartPosition)\n                        OutputCols(Ctr)\
  \ = Left(RowContents, EndPosition)\n                    End If\n               \
  \ Else\n                    StartPosition = RowContents.IndexOf(\",\", StartPosition)\n\
  \                    EndPosition = RowContents.IndexOf(\",\", StartPosition + 1)\n\
  \                    If EndPosition = -1 Then\n                        OutputCols(Ctr)\
  \ = RowContents.Substring(StartPosition + 1)\n                        Exit For\n\
  \                    Else\n                        OutputCols(Ctr) = RowContents.Substring(StartPosition\
  \ + 1, (EndPosition - StartPosition) - 1)\n                    End If\n        \
  \        End If\n                StartPosition = EndPosition\n            Next\n\
  \            ' 将解析后的数据发送到相应的输出列\n            For ColIDOut As Integer = 0 To NbCols\n\
  \                If ColIDOut = 0 Then\n                    Row.ID = OutputCols(0)\n\
  \                End If\n                If ColIDOut = 1 Then\n                \
  \    Row.InvoiceID = OutputCols(1)\n                End If\n                If ColIDOut\
  \ = 2 Then\n                    Row.StockID = OutputCols(2)\n                End\
  \ If\n                If ColIDOut = 3 Then\n                    Row.Quantity = OutputCols(3)\n\
  \                End If\n                If ColIDOut = 4 Then\n                \
  \    Row.SalePrice = OutputCols(4)\n                End If\n                If ColIDOut\
  \ = 5 Then\n                    Row.Comment1 = OutputCols(5)\n                End\
  \ If\n                If ColIDOut = 6 Then\n                    Row.Comment2 = OutputCols(6)\n\
  \                End If\n            Next\n    End Sub\n    ```\n\n\n\n```markdown\n\
  SalePrice = OutputCols(4)\nEnd If\nIf ColIDOut = 5 Then\n    Row.Comment1 = OutputCols(5)\n\
  End If\nIf ColIDOut = 6 Then\n    Row.Comment2 = OutputCols(6)\nEnd If\nNext\nEnd\
  \ Sub\n```\n\n10. 关闭脚本窗口。确认对脚本组件的更改。\n11. 添加一个 OLE DB 目标，并将脚本转换连接到它。选择你在步骤 2 中定义的\
  \ OLE DB 连接管理器。选择目标表。点击“映射”。确保除 `SourceData` 外的所有字段都已映射。\n\n现在你可以运行该进程并导入数据了。\n\n\
  ### 工作原理\n\n你可能需要面对的一种情况是，源文本文件的每行具有可变数量的分隔符——因此每行的列数也各不相同。由于在 SQL Server 2012 出现之前，SSIS\
  \ 不能很好地处理这种情况，如果你使用的是较旧版本的 Microsoft 旗舰数据库，则必须使用 SSIS 脚本组件来解析包含可变数量列的行。\n\n解析每一行的脚本工作原理如下：\n\
  \n*   首先，文本流被转换为文本——否则像 `Replace` 这样的 .NET 字符串函数将不起作用。\n*   然后，通过比较原始行长度与移除所有分隔符后的输入文本长度来确定列数。\n\
  *   接下来，处理最左边的列（或者如果没有其他列，则处理整个记录）并将其放入数组。\n*   然后，确定除最右列之外的所有其他列（使用分隔符之间的起始和结束位置）并将其放入数组。\n\
  *   接下来，处理最右列并将其放入数组。\n*   最后，将数组的所有内容映射到 SSIS 输出列。\n\n尽管如此，这种技术仍然要求你在源文件中定义可能的最大列数，并且只能基于简单的从左到右的基础映射列。如果缺少列分隔符，它无法猜测源列应该映射到哪个输出列。可以将输入解析硬编码到输出列（这是\
  \ SSIS 输出所必须做的），但那可能不太优雅。当然，你可以更改 `Delimiter` 变量使用的分隔符字符。\n\n如果你使用的是 Unicode 文本源，你需要做以下事情：\n\
  \n*   在“平面文件连接管理器编辑器”的“常规”窗格中，勾选 `Unicode` 框。\n*   在“平面文件连接管理器编辑器”的“高级”窗格中，将 `SourceData`\
  \ 列的数据类型设置为 `Unicode String (DT_WSTR)`。\n*   在 SSIS 脚本任务中，将处理 UTF8 编码的行替换为以下内容：\n\
  \n```vbnet\nColText = System.Text.Encoding.Unicode.GetString(Row.SingleCol.GetBlobData(0,\
  \ Convert.ToInt32(Row.SingleCol.Length)))\n```\n\n### 提示、技巧和陷阱\n\n*   请记住（在 2005\
  \ 和 2008 版本中）你可以在包之间复制连接管理器以节省重新定义它们的时间。\n*   如果你的源文件记录非常短，你可以完全避免使用文本流，方法是在“平面文件连接管理器编辑器”的“高级”窗格中，将\
  \ `SourceData` 列的 `DataType` 设置为 `String`（长度 8000）或 `Unicode string`（长度 4000）。然后，你可以将\
  \ `ColText` 变量简单地设置为源列（`ColText` = `Row.SingleCol.ToString`）——或者完全避免使用变量，在脚本中直接引用源列。\n\
  \n### 2-20. 确定源文件中的列数\n\n#### 问题\n\n你想确定一个平面文件中的列数。\n\n#### 解决方案\n\n使用自定义 SSIS 脚本分析源文件。下面解释如何做到这一点。\n\
  \n1.  按照配方 2-2 的描述，使用平面文件连接管理器设置一个 SSIS 包。\n2.  同样按照配方 2-2 的描述，添加一个数据流任务和一个平面文件源。\n\
  3.  按照配方 2-19 描述的技术，添加一个连接到平面文件源的脚本任务。不要创建任何输出列。添加以下脚本：\n\n```vbnet\nPublic Class\
  \ ScriptMain\n    Inherits UserComponent\n    Dim MaxNbCols As Integer = 0\n\n \
  \   Public Overrides Sub PreExecute()\n        MyBase.PreExecute()\n    End Sub\n\
  \n    Public Overrides Sub PostExecute()\n        MyBase.PostExecute()\n       \
  \ MsgBox(MaxNbCols)\n    End Sub\n\n    Public Overrides Sub Input0_ProcessInputRow(ByVal\
  \ Row As Input0Buffer)\n        Dim NbCols As Integer = 0\n        Dim Delimiter\
  \ As String = \",\"\n        Dim ColText As String = \"\"\n        'ANSI text\n\
  \        ColText = System.Text.Encoding.UTF8.GetString(Row.SingleCol.GetBlobData(0,\
  \ Convert.ToInt32(Row.SingleCol.Length)))\n        NbCols = (ColText.Length - ColText.Replace(Delimiter,\
  \ \"\").Length) + 1\n        If NbCols > MaxNbCols Then\n            MaxNbCols =\
  \ NbCols\n        End If\n    End Sub\nEnd Class\n```\n\n4.  关闭脚本任务。点击“确定”确认。\n\n\
  ### 工作原理\n\n这个简单的脚本计算数据流中每条记录的分隔符数量（使用 `Delimiter` 变量设置）。当你运行该包时，一个消息框会显示源文件中的最大列数。显然，这种方法非常“简单粗暴”，因为它使用\
  \ `MessageBox` 来返回列数。所以它更像是一种开发技术，但仍然是一个有用的工具。\n\n![image](img/sq.jpg) **注意** 你永远不会在生产环境中使用带有\
  \ MessageBox 的 SSIS 包。\n\n### 提示、技巧和陷阱\n\n*   或者，你可以使用 LogParser 来完成这个任务，这将在下一个配方中描述。\n\
  *   有关分析源文件的更高级技术，请参阅第 10 章。\n*   为了更严谨，你还应该创建一个整数变量，然后添加一个使用该变量作为目标转换的行计数任务，通过将脚本任务连接到新的行计数任务来实现。\n\
  \n### 2-21. 准备用于导入的 CSV 文件\n\n#### 问题\n\n你有一个棘手的平面文件需要调整，以便可以轻松导入。\n\n#### 解决方案\n\
  \n使用 LogParser 准备平面文件以供导入。\n\n实际上，这个配方是一系列迷你配方，为你提供了一些 LogParser 功能的示例。由于 LogParser\
  \ 在 SQL Server 之外运行，所有以下代码片段都必须从命令窗口运行。此配方中的所有代码都在一个文件中（`C:\\SQL2012DIRecipes\\\
  CH02\\LogParserScripts.Txt`）。\n\n让我们从将 CSV 文件转换为制表符分隔的文件开始。你可以通过运行以下命令来完成：\n\n```cmd\n\
  LogParser \"SELECT ID,InvoiceNumber,ClientID,TotalDiscount,DeliveryCharge INTO C:\\\
  SQL2012DIRecipes\\CH02\\AA1.TSV FROM C:\\SQL2012DIRecipes\\CH02\\Invoices.Txt\"\
  \ -i:CSV -o:TSV\n```\n\n使用 LogParser 将文件转换为 XML 同样容易。命令行是：\n\n```cmd\nLogParser\
  \ \"SELECT ID,InvoiceNumber,ClientID,TotalDiscount,DeliveryCharge INTO C:\\SQL2012DIRecipes\\\
  CH02\\AA1.Xml FROM C:\\SQL2012DIRecipes\\CH02\\Invoices.Txt\" -i:CSV -o:XML\n```\n\
  \n然后，你可以使用第 3 章中描述的一些技术来加载 LogParser 创建的文件。\n\nLogParser 还可以向输出文件添加行号。这在追踪加载错误时很有帮助。这是通过在\
  \ `SELECT` 语句中添加关键字 `Rownumber` 来实现的，如下所示：\n\n```cmd\nLogParser \"SELECT Rownumber,ID,InvoiceNumber,ClientID,TotalDiscount,DeliveryCharge\
  \ INTO C:\\SQL2012DIRecipes\\CH02\\AA1.TSV FROM C:\\SQL2012DIRecipes\\CH02\\Invoices.Txt\"\
  \ -i:CSV -o:TSV\n```\n\n如果速度不是关键，那么你可以使用 LogParser 直接将文本文件加载到 SQL Server 中。然而，这是使用\
  \ 32 位 ODBC——并带有其所有的注意事项。\n\n```cmd\nLogParser \"SELECT * INTO AA1 FROM C:\\SQL2012DIRecipes\\\
  CH02\\Invoices.Txt\" -i:CSV -o:SQL -server:localhost -database:MyDatabase -username:MyUser\
  \ -password:MyPassword\n```\n\n\n\n`Txt` ←-i:CSV -headerRow:OFF -o:SQL -dsn:SQLServer\
  \ -username:Adam -password:Me4B0ss\n\nLogParser 所采用的类 SQL 方法简化了数据子集的加载过程，无论是通过创建\
  \ CSV、TSV 或 XML 格式的中间预处理文件，还是通过 ODBC 直接加载到 SQL Server 中。以下是 `SELECT` 语句如何用于数据子集化的几个示例：\n\
  \n*   你可以像在 T-SQL 中一样，选择要加载或转换的列，以及它们在输出文件中出现的顺序：\n    ```\n    SELECT InvoiceNumber,\
  \ ID DeliveryCharge INTO C:\\SQL2012DIRecipes\\CH02\\AA1.TSV FROM ← C:\\SQL2012DIRecipes\\\
  CH02\\Invoices.Txt\" -i:CSV -o:TSV\n    ```\n*   你可以使用 `WHERE` 子句（与 T-SQL 中一样）来筛选要加载或输出的行：\n\
  \    ```\n    SELECT InvoiceNumber, ID DeliveryCharge INTO C:\\SQL2012DIRecipes\\\
  CH02\\AA1.TSV FROM ← C:\\SQL2012DIRecipes\\CH02\\Invoices.Txt WHERE ID > 4\" -i:CSV\
  \ -o:TSV\n    ```\n*   或者甚至是：\n    ```\n    SELECT InvoiceNumber, ID DeliveryCharge\
  \ INTO C:\\SQL2012DIRecipes\\CH02\\AA1.TSV FROM ← C:\\SQL2012DIRecipes\\CH02\\Invoices.Txt\
  \ WHERE ID BETWEEN 4 AND 6\" -i:CSV -o:TSV\n    ```\n*   以及：\n    ```\n    SELECT\
  \ InvoiceNumber, ID DeliveryCharge INTO C:\\SQL2012DIRecipes\\CH02\\AA1.TSV FROM\
  \ ← C:\\SQL2012DIRecipes\\CH02\\Invoices.Txt WHERE InvoiceNumber LIKE '%A%'\" -i:CSV\
  \ -o:TSV\n    ```\n\n没有什么能阻止你编写相当复杂的 `WHERE` 子句，使用 `<`、`>`、`<=`、`>=` 和括号来确保应用你所需的逻辑。\n\
  \nLogParser 可以在不加载文件的情况下从源文件返回行数——这是一种非常快速且简单的方法，用于验证数据加载是否处理了源文件中的所有行——使用以下命令行语法：\n\
  ```\nLogParser \"SELECT COUNT(*) INTO C:\\SQL2012DIRecipes\\CH02\\AA1.CSV FROM ←\
  \ C:\\SQL2012DIRecipes\\CH02\\Invoices.Txt\" -i:CSV -o:CSV\n```\n\n你可以使用 Execute\
  \ Process 任务来运行 LogParser 作为“预处理”任务（例如，将 CSV 文件转换为制表符分隔的文件）。但是，你首先必须将 LogParser\
  \ 使用的“SQL”放入一个文件中，并在调用 LogParser 时将其作为参数之一引用。\n\n1.  创建一个名为 `AnETLQuery.Txt` 的文件，其中包含以下类\
  \ SQL 命令：\n    ```\n    SELECT ID,InvoiceNumber,ClientID INT O C:\\SQL2012DIRecipes\\\
  CH02\\AA1.Txt ← FROM C:\\SQL2012DIRecipes\\CH02\\Invoices.Txt\n    ```\n2.  创建一个新的\
  \ SSIS 包。添加一个 Execute Process 任务。双击进行编辑。\n3.  单击 Process 窗格。输入以下可执行文件：`C:\\Program\
  \ Files\\Log Parser 2.2\\LogParser.Exe`（或你机器上 LogParser 的正确路径）。\n4.  输入以下参数文件：`C:\\\
  SQL2012DIRecipes\\CH02\\AnETLQuery.Txt -o:TSV -i:CSV`\n\n你现在可以运行该包，它将把一个（可能是顽固的）CSV\
  \ 文件转换成一个易于处理的制表符分隔文件，以便 SSIS 在包的下一步中加载。\n\n## 它是如何工作的\n\n有时你可能别无选择，只能“预解析”一个文本/CSV\
  \ 文件，以使其进入一个可以使用本章前面探讨的标准工具优雅加载的状态。我无意解释各种编程语言准备文本文件的所有方法，因为这可能是另一本书的主题。相反，我想专注于一个稳定且高效的\
  \ Microsoft 实用程序 LogParser，并展示如何用它来重新组织文本文件，使其能被 SSIS、BCP 和 `BULK INSERT` 消化。LogParser\
  \ 是一个命令行工具，它使用类 SQL 语法和一系列参数（与 BCP `QUERYOUT` 命令类似）来实现其目标。\n\n本配方中给出的例子只是触及了这个强大工具的表面，但我希望，它们能为常见问题提供一些解决方案，并作为基础预处理的介绍。\n\
  \n![image](img/sq.jpg) **注意** LogParser 可从 `www.microsoft.com/en-us/download/details.aspx?id=24659`\
  \ 下载。\n\n如果你遇到 SSIS 无法处理一个分隔符出现在带引号字段内部的文件，那么 LogParser 可以通过将文件转换为制表符分隔文件来提供帮助。安装后，你可以在开始菜单中找到\
  \ LogParser。\n\n那么，LogParser 带来了什么？嗯，除其他外，它可以：\n\n*   从大型源文件中选择数据子集（按列和行），并创建可以随后加载的较小暂存文件。\n\
  *   忽略文本文件中带引号字段内的分隔符，并转换为可加载的 TSV（制表符分隔）或 XML。\n\n它还能做更多，但这些是当面对顽固文本文件时，你可以添加到\
  \ ETL 武器库中的几个有用的补充。\n\n调用 LogParser 的命令行提供以下信息：\n\n*   源文件：`FROM C:\\SQL2012DIRecipes\\\
  CH02\\Invoices.Txt`\n*   目标文件：`INTO C:\\SQL2012DIRecipes\\CH02\\AA1.TSV`\n*   源格式：`-i:CSV`\n\
  *   目标格式：`-o:TSV`\n\n有许多 LogParser 参数你可能会觉得有用。表 2-8 简洁地概述了一些在解析文本文件时可能对你有帮助的参数。\n\
  \n表 2-8. LogParser 参数\n\n| 参数 | 示例 | 说明 |\n| --- | --- | --- |\n| `headerRow` |\
  \ `-headerRow:OFF` | 此标志表示文件是否包含行标题。你可以将其设置为 OFF 或 ON。 |\n| `iDQuotes` | `-iDQuotes:Ignore`\
  \ | 如果将此标志设置为 Ignore，则告诉 LogParser 忽略列周围的双引号，并输出带引号的列。如果将此标志设置为 Auto，则告诉 LogParser\
  \ 去除引号。 |\n| `nSkipLines` | `-nSkipLines:5` | 此标志指示 LogParser 在导入数据之前要跳过的标题行数。 |\n\
  | `I` | `-i:CSV` | 此标志指示 LogParser 输入格式是 TSV（制表符分隔）、CSV（逗号分隔）或 XML（对，XML！）。 |\n\
  | `o` | `-o:TSV` | 此标志指示 LogParser 输出格式是 TSV（制表符分隔）、CSV（逗号分隔）或 XML。 |\n| `iSeparator`\
  \ | `-iSeparator:space` | 此标志告诉 LogParser——在读取制表符分隔的源文件时——将使用分隔符（空格或制表符）。 |\n| `iHeaderFile`\
  \ | `-iHeaderFile:\"C:\\SQL2012DIRecipes\\CH02\\header.csv\"` | 如果源文件没有行标题，则此标志指示一个**仅**包含行标题的第二个文件。\
  \ |\n| `fixedFields` | `-fixedFields:OFF` | 此标志说明数据文件中的每一行是否具有相同数量的列（即，设置为 ON）或不是（设置为\
  \ OFF）。 |\n| `nFields` | `-nFields:3` | 如果源文件的字段数可变，此标志说明要扫描源文件中的行数以确定正确的列数。你指定的越多，所需时间就越长。\
  \ |\n| `dtLines` | `-dtLines:50` | 此标志说明要扫描源文件中的行数以发现列数据类型和长度。你指定的越多，所需时间就越长。 |\n\
  | `file` | `file:AnETLQuery.Sql` | 此标志允许你将类 SQL 查询存储在文件中，而不是直接从命令行运行。 |\n\n请注意，文件名前不需要连字符。另请注意，即使源列用引号括起来并包含逗号，该列也将作为整个字段被优雅处理，而不会不必要地拆分。引号将被自动剥离。\n\
  \n#### 提示、技巧与陷阱\n\n*   不可避免地，任何大文件的转换都会给 ETL 过程增加额外时间。只有你能决定这个时间是否是最值得付出的代价，或者你是否需要研究开发一种在\
  \ SSIS 脚本任务中解析“困难”文件的自定义方法。\n*   虽然可以使用 LogParser 直接将数据加载到 SQL Server，但这可能会非常慢，因为它只会使用\
  \ 32 位 ODBC。\n\n\n\n你可能会发现，将其用作预解析器来整理源文件中的异常，并将 LogParser 转换后生成的文件通过 `BULK INSERT`\
  \ 或 SSIS 加载到 SQL Server 中，速度会更快。\n*   要创建系统 DSN，请参阅配方 6-12。\n*   如果愿意，可以打开命令窗口，导航到\
  \ LogParser 目录（当前为 `C:\\Program Files\\Log Parser 2.2`），然后从那里运行 LogParser。\n*  \
  \ 你也可以从 `XP_CmdShell` 或 SSIS 的“执行进程任务”中调用 LogParser。\n\n#### 总结\n\n本章阐述了将文本文件导入\
  \ SQL Server 的多种方法。你最终会采用的技术，不可避免地取决于你面临的具体挑战。这些挑战包括你需要处理的源文件结构、完成任务可用的时间，以及你必须满足的\
  \ SLA（服务级别协议）——它最贴切的解释是“我如何在不耗费数小时编写代码的情况下，尽可能快地加载我拥有的数据？”。然而，可用选项的多样性不必引起困惑。如果你遵循这样的原则：对于未预见的导出使用导入和导出向导，对于临时挑战使用\
  \ T-SQL 解决方案，对于结构化的 ETL 流程使用 SSIS，那么你就有了一个工作的基线。显然，每种情况都会不同，每种环境都有其特定的障碍。但只要坚持不懈并深思熟虑，你应该能够成功地将大多数（即便不是全部）文本文件加载到\
  \ SQL Server 中。\n\n为了给你一个更简洁的概览，表 2-9 展示了我对各种方法及其优缺点的看法。\n\n表 2-9. 本章所用方法的优缺点\n\n\
  | 技术 | 优点 | 缺点 |\n| --- | --- | --- |\n| `OPENROWSET` | 使用直通查询。 | 设置可能较棘手。 |\n|\
  \ `OPENDATASOURCE` | 允许使用 T-SQL 操作源数据。 | 设置可能较棘手。 |\n| `BULK INSERT` | 可能是最快的解决方案。\
  \ | 需要正确的参数化。可能需要格式文件。 |\n| SSIS 批量插入任务 | 非常快。 | 需要正确的参数化。可能需要格式文件。 |\n| 链接服务器 |\
  \ 允许使用 T-SQL 操作源数据。 | 不适合大文件。 |\n| 导入和导出向导 | 易于使用。可以生成 SSIS 包。 | 转换选项有限。 |\n| SSIS\
  \ | 完整的数据转换、修改和操作。增量数据加载。 | 实现时间较长。无法一次性创建所有目标对象。 |\n| BCP | 快速且高效。 | 参数复杂。 |\n\n"
- "# 第三章\n\n![image](img/frontdot.jpg)\n\n## XML 数据源\n\n这已成老生常谈，但 XML 现在是数据交换的通用语言。在四、五年前，分隔文本文件还是常态，如今\
  \ XML 文件正取而代之。XML 当然有其缺点——尤其是与文本文件源数据相比，文件大小绝非小事。但仅就基于 XML 数据加载的可靠性和易于调试而言，我任何时候都倾向于使用\
  \ XML 文件而非平面文件作为源数据。\n\n因此，本章将引导你了解将 XML 数据导入 SQL Server 的经典方法。然而，在开始之前，有几句警告。XML\
  \ 极其复杂，是无数鸿篇巨著的主题——这些著作无疑又将成为其他更多著作的主题。本章绝不会以任何方式介绍 XML 及其所有微妙之处。相反，它将引导你了解将此类源数据加载到\
  \ SQL Server 中的标准方法。\n\n### 3-1. 加载 XML 文件以存储在 SQL Server 中\n\n#### 问题\n\n你希望将一个\
  \ XML 文档——或多个 XML 片段——加载到 SQL Server 表中，并在其中“按原样”存储。\n\n#### 解决方案\n\n从 T-SQL 使用\
  \ `OPENROWSET (BULK)` 将 XML 文件推入 SQL Server，而无需将其“分解”到多个列中。\n\n1.  使用以下代码创建目标表（`C:\\\
  SQL2012DIRecipes\\CH03\\tblXmlImportTest.Sql`）：\n    ```sql\n    CREATE TABLE XmlImportTest\n\
  \    (\n     Keyword NVARCHAR(50),\n     XMLDataStore XML\n    );\n    GO\n    ```\n\
  2.  找到一个 XML 源文件，如下面的简单示例（`C:\\SQL2012DIRecipes\\CH03\\Clients.Xml`）：\n    ```xml\n\
  \    <?xml version = \"1.0\" encoding = \"UTF-8\"?>\n    <CarSales>\n      <Client>\n\
  \        <ID > 3</ID>\n        <ClientName> John Smith</ClientName>\n        <Address1>\
  \ 4, Grove Drive</Address1>\n        <Town> Uttoxeter</Town>\n        <County> Staffs</County>\n\
  \        <Country> 1</Country>\n      </Client>\n    ```\n    . . . 此处为节省空间省略了许多其他元素\
  \ . . .\n    ```xml\n      <Client>\n        <ID> 7</ID>\n        <ClientName> Slow\
  \ Sid</ClientName>\n        <Address1> 2, Rue des Bleues</Address1>\n        <Town>\
  \ Avignon</Town>\n        <County> Vaucluse</County>\n        <Country> 3</Country>\n\
  \      </Client>\n    </CarSales>\n    ```\n3.  运行以下 T-SQL 代码以导入引用的 XML 文件的内容，以及你希望存储在表中的任何其他数据（`C:\\\
  SQL2012DIRecipes\\CH03\\XmlImportTestInsert.Sql`）。\n    ```sql\n    INSERT INTO\
  \ XmlImportTest(XMLDataStore, Keyword);\n    SELECT XMLDATAToStore, 'Attribute-Centric'\
  \ AS ColType\n    FROM\n    (\n       SELECT   CONVERT(XML, XMLCol, 0)\n       FROM\
  \    OPENROWSET (BULK 'C:\\SQL2012DIRecipes\\CH03\\Clients_Simple.Xml',\n      \
  \                     SINGLE_BLOB) AS XMLSource (XMLCol)\n                     \
  \ ) AS XMLFileToImport (XMLDATAToStore);\n    ```\n\n#### 工作原理\n\nXML 文件可以直接作为纯\
  \ XML 数据加载到 SQL Server 表中——也就是说，它们不会被“分解”（或拆解）成行和列。这是通过 `OPENROWSET (BULK)` 完成的，它本质上是将源文件读入\
  \ T-SQL 进程。该文件既可以是一个 XML “片段”——即不强制符合 XML 架构，也可以是一个“格式良好”的 XML 文档，后者符合 XML 架构定义。该技术在以下情况下非常有用：\n\
  *   当你希望将 XML 文档或片段存储在数据库中，而不是文件系统中时。\n*   当你不希望将 XML 数据分解为完全关系型的 SQL Server 表结构时。\n\
  \n这样的数据加载本身可能就是一个目标，即将 XML 加载到数据库后，你可以使用 SQL Server 用来查询 XML 数据类型的 XQuery 语言子集来查询这些\
  \ XML 数据。或者，它可以作为数据暂存过程的一部分，即你希望先将 XML 片段存储在 SQL Server 中，然后再进行其他处理。\n\n该技术同样可以轻松地扩展以更新（或更确切地说，替换）XML\
  \ 片段或文档。所需的代码如下（`C:\\SQL2012DIRecipes\\CH03\\LoadXMLToUpdateInTable.sql`）：\n```sql\n\
  UPDATE XmlImportTest SET XMLDataStore =\n                    (\n               \
  \      SELECT XMLDATAToStore\n                     FROM\n                      \
  \   (\n                          SELECT   CONVERT(XML, XMLCol, 0)\n            \
  \              FROM  OPENROWSET (BULK\n                                        \
  \    'C:\\SQL2012DIRecipes\\CH03\\Clients_Simple.Xml',\n                       \
  \                     SINGLE_BLOB) AS XMLSource (XMLCol)\n                     \
  \    ) AS XMLFileToImport (XMLDATAToStore)\n                    )\nWHERE Keyword\
  \ = 'Attribute-Centric'\n```\n可能你有很多 XML 片段或文档要加载，并且不想开发一个 SSIS 包来执行此任务。幸运的是，只需一点巧思（和一些动态\
  \ SQL），当前配方中使用的脚本就可以扩展为加载多个 XML 片段或文档。加载一系列文件的脚本如下（`C:\\SQL2012DIRecipes\\CH03\\\
  LoadMultiplexmlFiles.\n\n\n\n"
- "# SQL Server 中加载和处理 XML 数据\n\n## 问题\n\n需要使用 T-SQL 从目录加载多个 XML 文件，并将其作为 XML 数据类型存储到\
  \ SQL Server 表中。\n\n## 解决方案\n\n使用 `xp_cmdshell` 和动态 SQL 从文件系统读取文件，并利用 `OPENROWSET`\
  \ 和 `BULK` 选项将整个文件加载为 XML。\n\n```sql\nDECLARE @SQL VARCHAR(8000);\n-- 用于保存文件名的表变量\n\
  DECLARE @FileList TABLE (XMLFile VARCHAR(150));\n-- 用于捕获\"原始\"文件列表的表变量\nDECLARE\
  \ @DirList TABLE (List VARCHAR(250));\n\n-- 将 DIR 命令的输出加载到 @DirList\n-- 表变量中\nINSERT\
  \ INTO @DirList EXEC master.dbo.xp_cmdshell 'Dir D:\\BIProject\\*.Xml';\n\n-- 解析出文件名\
  \ - 注意事项：文件名中不能有空格，\n-- 所有文件必须具有正确且相同的结构...\nINSERT INTO @FileList\nSELECT REVERSE(LEFT(REVERSE(List),\
  \ CHARINDEX(' ', REVERSE(List))))\nFROM @DirList\nWHERE List LIKE '%.Xml%';\n\n\
  -- 游标用于循环遍历文件名并加载 xml 文件\nDECLARE @FileName VARCHAR(150);\n\nDECLARE FileLoad_CUR\
  \ CURSOR FOR\nSELECT XMLFile FROM @FileList\n\nOPEN FileLoad_CUR\nFETCH NEXT FROM\
  \ FileLoad_CUR INTO @FileName\n\nWHILE @@FETCH_STATUS <> -1\nBEGIN\n    -- XML 加载过程\n\
  \    SET @SQL = 'INSERT INTO AA1 (XMLData) SELECT CAST(XMLSource AS XML) AS XMLSource\
  \ FROM OPENROWSET(BULK ''' + @FileName + ''', SINGLE_BLOB) AS X (XMLSource)'\n \
  \   EXEC (@SQL)\n\n    FETCH NEXT FROM FileLoad_CUR INTO @FileName\nEND;\n\nCLOSE\
  \ FileLoad_CUR;\nDEALLOCATE FileLoad_CUR;\n```\n\n用于加载多个文件的 T-SQL 工作原理如下：\n\n* \
  \  首先，使用 `xp_cmdshell` 调用 `Dir`（目录列表）命令来定义待处理文件的列表。\n*   然后，解析此列表以获得可用的文件名。\n* \
  \  一个游标遍历文件列表并加载它们。\n\n此处使用的动态 SQL 做了一些预设：\n\n*   文件具有 `.Xml` 扩展名。\n*   文件名中没有空格。\n\
  \n如果需要，可以扩展脚本以接受多个扩展名或包含空格的文件名。请注意，本方案仅旨在帮助你将 XML 数据作为 XML 加载到 SQL Server 表中。遗憾的是，提取和查询数据的多种方法超出了本书的范围。但是，如果你将\
  \ XML 数据存储为 XML 数据类型，请记住 SQL Server 允许你为 XML 列创建索引，以使用 SQL Server 支持的 XQuery 语言子集进行更快的查询。\n\
  \n这里使用的\"关键字\"当然是可选的，我保留它是为了展示 XML 和\"普通\"数据如何可以一起导入。重要的是要使用 `SINGLE_BLOB` 参数，以便整个文件作为一列的内容处理。此外，任何\
  \ XML 文档都不能大于 2 千兆字节。另请注意，此处使用的 `CONVERT` 参数 `0` 会丢弃无关的空白，并且不允许内部 DTD（文档类型定义）子集。我假设不会使用\
  \ DTD。\n\n要查询 XML 列的内容，你可以使用以下 T-SQL 语法，例如：\n\n```sql\nSELECT XMLDataStore.query('(/ROOT/Customer/CustomerID)')\n\
  FROM XmlImport\n```\n\n## 提示、技巧和陷阱\n\n*   动态 SQL 的前提是拥有使用 `xp_cmdshell` 的权限。许多 DBA\
  \ 不会容忍这一点，因此你需要发掘巨大的魅力储备——或无可辩驳的技术论据——来获得允许。或者，你可以编写一个 CLR（公共语言运行时）例程来列出目录中的文件，并说服\
  \ DBA 这种方法更安全。\n*   通过使用 `SINGLE_BLOB`（相对于 `SINGLE_CLOB` 或 `SINGLE_NCLOB`），你可以避免\
  \ XML 文档的编码（如 XML 编码声明中所给出）与服务器的代码页之间潜在的错配。\n*   方案 3-2 和 3-3 展示了如何从 XML 列获取数据并将其分解到目标表的单独列中。\n\
  *   震惊和恐怖——一个游标！嗯，正如我在本书其他地方所说，游标并非必然是错的，并且在有些场合它们是易于使用和调试的最简单解决方案——而且资源影响可以忽略不计。整个方法的前提是你可能最多只加载几十个\
  \ XML 文件。如果你将加载更多文件，那么一个无游标的方案（方案 6-7）可以适应你的需求。\n\n## 3-2. 将 XML 数据加载到行和列中\n\n###\
  \ 问题\n\n你想将中小型 XML 文件中的数据加载到 SQL Server 表中，并正确地\"分解\"为行和列。\n\n### 解决方案\n\n使用 `OPENXML`\
  \ 将以元素为中心和以属性为中心的 XML 文件加载并分解到 SQL Server 表中。\n\n1.  将（本例中是以元素为中心的）XML 文件放在必需的源目录中。文件如下所示（`C:\\\
  SQL2012DIRecipes\\CH03\\ClientLite.Xml`）：\n    ```xml\n    <CarSales>\n      <Client>\n\
  \        <ID> 3</ID>\n        <ClientName> John Smith</ClientName>\n        <Country>\
  \ 1</Country>\n      </Client>\n    ```\n    为节省空间省略数据...\n    ```xml\n      <Client>\n\
  \        <ID> 7</ID>\n        <ClientName> Slow Sid</ClientName>\n        <Country>\
  \ 3</Country>\n      </Client>\n    </CarSales>\n    ```\n\n2.  使用以下 T-SQL 代码加载\
  \ XML 文件（`C:\\SQL2012DIRecipes\\CH03\\ShredClientLite.Sql`）：\n    ```sql\n    DECLARE\
  \ @DocID INT;\n    DECLARE @DocXML VARCHAR(MAX);\n\n    SELECT @DocXML = CAST(XMLSource\
  \ AS VARCHAR(MAX))\n    FROM OPENROWSET(BULK 'C:\\SQL2012DIRecipes\\CH03\\ClientLite.xml',\
  \ SINGLE_BLOB)\n                    AS X (XMLSource);\n    EXECUTE master.dbo.sp_xml_preparedocument\
  \ @DocID OUTPUT, @DocXML;\n\n    SELECT ID, ClientName, Country\n    INTO XmlTable\n\
  \    FROM OPENXML(@DocID, 'CarSales/Client', 2)\n                    WITH (\n  \
  \                        ID VARCHAR(50)\n                          ,ClientName VARCHAR(50)\n\
  \                          ,Country VARCHAR(10)\n                         );\n \
  \   ```\n    `EXECUTE master.dbo.sp_xml_removedocument @DocID;`\n\n3.  查询 `XmlTable`\
  \ 表，你应该会看到类似以下结果：\n    ```\n     ID     ClientName        Country\n     3      John\
  \ Smith           1\n     4      Bauhaus Motors       2\n     5      Honest Fred\
  \          3\n     6      Fast Eddie           2\n     7      Slow Sid         \
  \    3\n    ```\n\n### 工作原理\n\n自 SQL Server 2000 发布以来，`OPENXML` 一直帮助开发人员和 DBA 加载（或\"\
  分解\"）XML 数据到关系表中。该技术在当前版本的 SQL Server 中仍然受支持，并且易于使用且高效。结果与方案 3-1 中获得的结果完全不同，因为这次源文件被分解为其组成的数据片段，每个元素或属性被加载到一个或多个表中的单独列。\n\
  \n首先，将源文件加载到 `@DocXML` 变量中。然后，对该变量运行 `sp_xml_preparedocument` 存储过程以准备 XML 并返回一个句柄，本例中为\
  \ `@DocID`。该句柄传递给 `OPENXML` 命令，该命令读取 XML 数据并将其分解到目标表的行和列中。然后，在 `OPENXML` 语句中，行模式（'`CarSales/Client`'）标识要处理的\
  \ `<Client>` 节点。\n\n`WITH` 子句是 `ColPattern`，它允许你遍历 XML 的层次结构并选择任何你想要的元素。对于属性，你可以只使用像\
  \ `Invoice/@InvoiceNumber` 这样的 `ColPattern`。你可以使用（例如）`../Invoice` 遍历超出初始节点指定的 XML——假设行模式是\
  \ `'CarSales/Client'/Invoice`。如果未指定 `ColPattern`，则将采用默认映射（指定的以属性为中心或以元素为中心的映射）。\n\
  \n但请注意，尽管简单，`OPENXML` 非常消耗内存。此外，`OPENXML` 使用的是 XPath（而不是 XQuery）。\n\n\n\n"
- "# 3-3. 将 XML 文件分解到 SQL Server 表中\n\n## 问题\n你希望将 XML 数据加载到 SQL Server 表和列中，同时避免\
  \ `sp_xml_preparedocument` 的开销。\n\n## 解决方案\n使用 `OPENROWSET (BULK)` 和 SQL Server\
  \ 的 XQuery 支持来分解并加载源文件。\n\n1.  使用以下代码创建目标表 (`C:\\SQL2012DIRecipes\\CH03\\tblXMLImport_Clients.Sql`)：\n\
  \    ```sql\n    CREATE TABLE dbo.XmlImport_Clients\n    (\n     ID int NULL,\n\
  \     ClientName varchar(50) NULL,\n     Town varchar(50) NULL,\n     County varchar(50)\
  \ NULL,\n     Country int NULL\n    ) ;\n    GO\n    ```\n2.  定位一个 XML 源文件——我将使用\
  \ `C:\\SQL2012DIRecipes\\CH03\\ClientLite.Xml`，这与配方 3-2 中使用的一样。\n3.  使用以下代码片段加载文件\
  \ (`C:\\SQL2012DIRecipes\\CH03\\ShredXMLUsingOPENROWSETBulk.Sql`)：\n    ```sql\n\
  \    DECLARE @XMLSource XML;\n\n    SELECT   @XMLSource = CAST(XMLSource AS XML)\
  \ ;\n    FROM      OPENROWSET(BULK 'C:\\SQL2012DIRecipes\\CH03\\ClientLite.xml',\
  \ SINGLE_BLOB) AS X (XMLSource);\n\n    INSERT INTO XmlImport_Clients (ID, ClientName,\
  \ Town, County, Country)\n\n    SELECT\n      SRC.Client.value('ID[1]', 'INT') AS\
  \ ID\n     ,SRC.Client.value('ClientName[1]', 'VARCHAR(50)') AS ClientName\n   \
  \  ,SRC.Client.value('Town[1]', 'VARCHAR(50)') AS Town\n     ,SRC.Client.value('County[1]',\
  \ 'VARCHAR(50)') AS County\n     ,SRC.Client.value('Country[1]', 'INT') AS Country\n\
  \n    FROM @XMLSource.nodes('CarSales/Client') AS SRC (Client);\n    ```\n\n## 工作原理\n\
  `OPENXML` 是一种经典方法，至今仍能良好工作，但自 SQL Server 2005 起，利用 SQL Server 对 XML 和 XQuery 的支持，已有其他解决方案可用于将\
  \ XML 数据导入 SQL Server。尽管起初可能有点令人不安（或许因为它不太像“T-SQL”而更像 XQuery），但使用 XML 数据类型可以是一种既高效又强大的方式，将\
  \ XML 源数据加载到数据库结构中。与 `OPENXML` 不同，使用 `.nodes()` 方法加载 XML 数据不需要 `sp_xml_preparedocument`\
  \ 来实例化 XML 对象。此技术最好在以下情况下使用：\n\n*   当你想将源文档的全部或部分内容加载到表列中时。\n*   当设置 SSIS 包来分解数据显得大材小用时。\n\
  \n在这个配方中，我们将源文件加载到一个变量中，然后使用 XML 数据类型的 `.nodes()` 方法将其分解到表中。`.value()` 方法从存储为 XML\
  \ 类型的 XML 实例中提取值。\n\n这里使用的“暂存变量”方法对于大文件需要大量内存。因此，如果你觉得使用暂存变量显得有点过时，那么有一个解决方案可以避免使用暂存变量——通过巧妙地应用\
  \ `CROSS APPLY`。\n\n---\n*注意：以下文本似乎来自前面的部分（很可能是配方 3-2），并包含在原始内容中。根据不删除有价值信息的指示，它被保留了下来。*\n\
  \n综合来看，这意味着 `OPENXML` 最好在以下情况下使用：\n*   当你不希望在 T-SQL 查询中使用 XML 数据之前将其导入 SQL Server\
  \ 时。\n*   当你有一个格式正确的 XML 文档时。\n*   当 XML 文档小于 2 GB 时。\n\n为了稍微扩展这个例子，假设你有一个（相当简单的）以属性为中心的\
  \ XML 文件，像这样 (`C:\\SQL2012DIRecipes\\CH03\\ClientLiteAttributeCentric.Xml`)：\n```xml\n\
  <CarSales>\n  <Client ID = \"3\" ClientName = \"John Smith\" Country = \"1\" />\n\
  \  <Client ID = \"4\" ClientName = \"Bauhaus Motors\" Country = \"2\" />\n  <Client\
  \ ID = \"5\" ClientName = \"Honest Fred\" Country = \"3\" />\n  <Client ID = \"\
  6\" ClientName = \"Fast Eddie\" Country = \"2\" />\n  <Client ID = \"7\" ClientName\
  \ = \"Slow Sid\" Country = \"3\" />\n</CarSales>\n```\n\n要加载此文件，只需将 `OPENXML` 的标志参数更改为\
  \ 1，如下例所示 (`C:\\SQL2012DIRecipes\\CH03\\ShredClientLiteAttributeCentric.Sql`)：\n\
  ```sql\nDECLARE @DocID INT;\nDECLARE @DocXML VARCHAR(MAX);\n\nSELECT @DocXML  =\
  \ CAST(XMLSource AS VARCHAR(MAX))\nFROM OPENROWSET(BULK 'C:\\SQL2012DIRecipes\\\
  CH03\\ClientLite.xml', SINGLE_BLOB) AS X (XMLSource);\n\nEXECUTE master.dbo.sp_xml_preparedocument\
  \ @DocID OUTPUT, @DocXML;\n\nSELECT\n       ID, ClientName, Country\nFROM\n    OPENXML(@DocID,\
  \ 'CarSales/Client', 1)\n                     WITH (\n                         \
  \ ID VARCHAR(50)\n                          ,ClientName VARCHAR(50)\n          \
  \                ,Country VARCHAR(10)\n                         );\nEXECUTE master.dbo.sp_xml_removedocument\
  \ @DocID;\n```\n\n显然，无法预测 XML 数据源的所有排列组合。然而，可以公平地说，并非所有源文件都会像我们这里使用的这样简单。幸运的是，`OPENXML`\
  \ 可以处理更复杂的数据源。`OPENXML` 的艺术和科学在于构成 `OPENXML` 命令的两个要素。它们是：\n\n*   `行模式`，用于标识要处理的节点（本配方示例中为\
  \ `'/CarSales/Client'`）。\n*   `架构声明`，即指定列输出的 `WITH` 子句。\n\n作为一个更复杂的例子，这里是一个带有嵌套元素的\
  \ XML 片段 (`C:\\SQL2012DIRecipes\\CH03\\NestedClients.Xml`)：\n```xml\n<CarSales>\n\
  \  <Client>\n    <ID> 3</ID>\n    <ClientName> John Smith</ClientName>\n    <Country>\
  \ 1</Country>\n    <Town> Uttoxeter</Town>\n    <Invoice>\n      <InvoiceNumber>\
  \ 3A9271EA-FC76-4281-A1ED-714060ADBA30</InvoiceNumber>\n      <TotalDiscount> 500.00</TotalDiscount>\n\
  \    </Invoice>\n  </Client>\n  <Client>\n    <ID > 4</ID>\n    <ClientName> Bauhaus\
  \ Motors</ClientName>\n    <Country> 2</Country>\n    <Town> Oxford</Town>\n   \
  \ <Invoice>\n      <InvoiceNumber> C9018CC1-AE67-483B-B1B7-CF404C296F0B</InvoiceNumber>\n\
  \      <TotalDiscount> 0.00</TotalDiscount>\n    </Invoice>\n  </Client>\n</CarSales>\n\
  ```\n\n这里是使用 `OPENXML` 读取它的代码（当然，你需要将其包装在前面用于加载、准备和从内存中移除 XML 文档的代码中——此处为节省空间而省略）(`C:\\\
  SQL2012DIRecipes\\CH03\\ShredNestedClients.Sql`)：\n```sql\nSELECT\n       ID, ClientName,\
  \ Country, TotalDiscount\nFROM\n    OPENXML(@DocID, 'CarSales/Client', 2)\n    \
  \            WITH (\n                      ID VARCHAR(50) 'ID'\n               \
  \       ,ClientName VARCHAR(50) 'ClientName'\n                      ,Country VARCHAR(10)'Country'\n\
  \                      ,TotalDiscount NUMERIC(18,2) 'Invoice/TotalDiscount'\n  \
  \                   )\n```\n\n最后要记住的一点是，无论你使用以属性为中心还是以元素为中心的 XML，你仍然在使用 T-SQL。这意味着你可以使用\
  \ `WHERE` 来过滤输出，使用 `ORDER BY` 来排序。本配方顶部的代码片段可以像这样扩展 (`C:\\SQL2012DIRecipes\\CH03\\\
  ShredNestedClientsFilterAndSort.Sql`)：\n```sql\nDECLARE @DocID INT;\nDECLARE @DocXML\
  \ VARCHAR(MAX);\n\nSELECT @DocXML = CAST(XMLSource AS VARCHAR(MAX))\nFROM OPENROWSET(BULK\
  \ 'C:\\SQL2012DIRecipes\\CH03\\ClientLite.xml', SINGLE_BLOB) AS X (XMLSource);\n\
  \nEXECUTE master.dbo.sp_xml_preparedocument @DocID OUTPUT, @DocXML;\n\nSELECT\n\
  \        ID, ClientName, Country\nINTO\n     XmlTable\nFROM\n    OPENXML(@DocID,\
  \ 'CarSales/Client', 2)\n                      WITH (\n                        \
  \    ID VARCHAR(50)\n                            ,ClientName VARCHAR(50)\n     \
  \                       ,Country VARCHAR(10)\n                          )\nWHERE\n\
  \        Country = 3\nORDER BY  ID\n\nEXECUTE master.dbo.sp_xml_removedocument @DocID;\n\
  ```\n\n**提示、技巧和陷阱**\n*   XML 文档必须是格式良好的——特别是只能有一个顶级（根）元素。\n*   尽管是一项较旧的技术，但在从 T-SQL\
  \ 将 XML 数据加载到关系结构时，`OPENXML` 据称是最快的解决方案。\n\n\n\n因此，使用与本配方前面相同的 XML 源文件，此方法的代码如下（`C:\\\
  SQL2012DIRecipes\\CH03\\ShredXMLUsingOPENROWSETBulkAndCrossApply.Sql`）：\n\n```sql\n\
  INSERT INTO XmlImport_Clients (ID, ClientName, Town, County, Country)\nSELECT SRC.Client.value('ID[1]',\
  \ 'INT') AS ID\n,SRC.Client.value('ClientName[1]', 'VARCHAR(50)') AS ClientName\n\
  ,SRC.Client.value('Town[1]', 'VARCHAR(50)') AS Town\n,SRC.Client.value('County[1]',\
  \ 'VARCHAR(50)') AS County\n,SRC.Client.value('Country[1]', 'INT') AS Country\n\
  FROM\n    (\n      SELECT CAST(XMLSource AS XML)\n      FROM OPENROWSET(BULK 'C:\\\
  SQL2012DIRecipes\\CH03\\Clients_Simple.xml', SINGLE_BLOB) AS X (XMLSource)\n   \
  \ ) AS X (XMLSource)\nCROSS APPLY XMLSource.nodes('CarSales/Client') AS SRC (Client);\n\
  ```\n\n这第二种 `CROSS APPLY` 方法稍微复杂一些，但它能直接将数据分解并加载到目标表中。\n\n再次强调，由于我们使用的是 T-SQL，目前使用的代码可以扩展用于过滤和排序要加载的数据。因此，如果我们基于前面的例子，决定只加载国家为“3”的记录，并且按\
  \ Town 元素排序，那么应使用以下代码（`C:\\SQL2012DIRecipes\\CH03\\ShredXMLUsingOPENROWSETBulkAndCrossApplyWithFilter.Sql`）：\n\
  \n```sql\nINSERT INTO XmlImport_Clients (ID, ClientName, Town, County, Country)\n\
  SELECT SRC.Client.value('ID[1]', 'INT') AS ID\n,SRC.Client.value('ClientName[1]',\
  \ 'VARCHAR(50)') AS ClientName\n,SRC.Client.value('Town[1]', 'VARCHAR(50)') AS Town\n\
  ,SRC.Client.value('County[1]', 'VARCHAR(50)') AS County\n,SRC.Client.value('Country[1]',\
  \ 'INT') AS Country\nFROM\n    (\n      SELECT CAST(XMLSource AS XML)\n      FROM\
  \ OPENROWSET(BULK 'C:\\SQL2012DIRecipes\\CH03\\Clients_Simple.xml', SINGLE_BLOB)\
  \ AS X (XMLSource)\n    ) AS X (XMLSource)\nCROSS APPLY XMLSource.nodes('CarSales/Client')\
  \ AS SRC (Client)\nWHERE SRC.Client.value('Country[1]', 'INT') = 3\nORDER BY SRC.Client.value('Town[1]',\
  \ 'VARCHAR(50)');\n```\n\n这种技术可能比较熟悉，但对于大文件，它可能会变得非常缓慢以至于无法使用。当然，这取决于每个人对“大”的定义，但如果你需要等待\
  \ SQL Server 完成处理几分钟——甚至几小时——那么你或许应该考虑另一种方法。因此，如果你面临需要数小时才能完成的 XML 数据加载，有一种解决方案，它需要一些前期工作，但可以将数小时的处理时间减少到几秒，而且显然还能减轻内存压力。诀窍是在一个暂存表中使用类型化的\
  \ XML 列来保存源文件（或多个文件），然后对其应用 XML 索引。你还必须首先添加主键，否则将无法添加 XML 索引。\n\n![image](img/sq.jpg)\
  \ **注意** 感谢 Stack Overflow 上的 Dan（`http://stackoverflow.com`）描述了如何使用 XML 索引以这种方式加速\
  \ XML 加载。\n\n在这个例子中，我还添加了次级 XML 索引。在许多情况下，这些可能不是完全必要的，但因为即使对于大文件，它们也只需要很短的时间来生成，所以我建议无论如何都应用它们。一旦\
  \ XML 数据加载到暂存表并建立索引，你就可以将索引表用作 XQuery 的源，并使用 `CROSS APPLY` 来分解数据（`C:\\SQL2012DIRecipes\\\
  CH03\\ShredXMLWithIndexes.Sql`）：\n\n```sql\n-- 应用一个 XSD\nDECLARE @XSD XML;\nSELECT\
  \ @XSD = CONVERT(XML, XSDDef)\nFROM OPENROWSET(BULK 'C:\\SQL2012DIRecipes\\CH03\\\
  Clients_Simple.xsd', SINGLE_BLOB) AS XSD (XSDDef)\nCREATE XML SCHEMA COLLECTION\
  \ XML_XSD AS @XSD;\nGO\n\n-- 用于保存 XML 数据的暂存表\nCREATE TABLE dbo.Tmp_XMLLoad(\nID\
  \ int IDENTITY(1,1) NOT NULL,\nXMLData xml(CONTENT dbo.XML_XSD) NULL,\nCONSTRAINT\
  \ PK_Tmp_XMLLoad PRIMARY KEY CLUSTERED ( ID ASC )WITH (PAD_INDEX = OFF, STATISTICS_NORECOMPUTE\
  \ = OFF, IGNORE_DUP_KEY = OFF, ALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS = ON)\n);\n\
  GO\n\n-- XML 索引\nCREATE PRIMARY XML INDEX XX_XMLData ON Tmp_XMLLoad (XMLData)\n\
  CREATE XML INDEX SX_XMLData_Property ON Tmp_XMLLoad (XMLData) USING XML INDEX XX_XMLData\
  \ FOR PROPERTY\nCREATE XML INDEX SX_XMLData_Value ON Tmp_XMLLoad (XMLData) USING\
  \ XML INDEX XX_XMLData FOR VALUE\nCREATE XML INDEX SX_XMLData_Path ON Tmp_XMLLoad\
  \ (XMLData) USING XML INDEX XX_XMLData FOR PATH\n\n-- 将数据加载到表中\nINSERT INTO Tmp_XMLLoad\
  \ (XMLData)\nSELECT CAST(XMLSource AS XML) AS XMLSource\nFROM OPENROWSET(BULK 'C:\\\
  SQL2012DIRecipes\\CH03\\Clients_Simple.xml', SINGLE_BLOB) AS X (XMLSource)\n\n--\
  \ 并输出：\nINSERT INTO XmlImport_Clients (ID, ClientName, Town, Country)\nSELECT SRC.Client.value('ID[1]',\
  \ 'INT') AS ID\n,SRC.Client.value('ClientName[1]', 'VARCHAR(50)') AS ClientName\n\
  ,SRC.Client.value('Town[1]', 'VARCHAR(50)') AS Town\n,SRC.Client.value('Country[1]',\
  \ 'INT') AS Country\nFROM Tmp_XMLLoad\nCROSS APPLY XMLData.nodes('CarSales/Client')\
  \ AS SRC (Client);\n```\n\n最后——并希望引导你开始学习 XQuery——以下是一个如何避免使用 T-SQL `WHERE` 子句来过滤数据的示例：\n\
  \n```sql\nCROSS APPLY XMLSource.nodes('CarSales/Client[ID = 3]') AS SRC (Client);\n\
  ```\n\n是的，如果你懂 XQuery，你可以用它来替代过滤数据。现在，这里不是进行深入 XQuery 教程的时机和地点——但至少你知道这是可以做到的。\n\
  \n### 提示、技巧和陷阱\n\n*   我假设你有一个 XSD 文件可供使用——如果没有，那么你可以使用 SSIS 从数据创建一个，如配方 3-4 所述。\n\
  *   另外，如果你正在测试示例中使用的 `@XMLSource` 变量，不要担心它只显示为截断的形式——例如，如果你使用 `PRINT` 语句。T-SQL 只会显示它所能处理的\
  \ 20 亿字符中的前 8000 个字符。为了让自己放心，你可以输出一个 `DATALENGTH(@XMLSource)` 来确认所有数据都在变量中。顺便说一句，如果你确实希望从\
  \ T-SQL 打印 `@XMLSource` 变量，你需要将其转换回 `VARCHAR` 或 `NVARCHAR`。\n\n## 3-4. 作为 ETL 过程的一部分导入\
  \ XML 数据\n\n### 问题\n你希望作为结构化、受控的 ETL 过程的一部分导入（并分解）XML 数据。\n\n### 解决方案\n使用 SSIS 和\
  \ XML 源任务作为数据源。\n\n1.  打开 SSIS，创建一个新包，并在数据流窗格上添加一个数据流任务。\n2.  双击数据流任务将其打开。在数据流窗格上添加一个\
  \ XML 源任务。双击 XML 源任务将其打开。\n3.  将数据访问模式保留为 XML 文件位置，浏览到 XML 源文件（本配方中为 `C:\\SQL2012DIRecipes\\\
  CH03\\ComplexNested.XML`），然后单击“生成 XSD”。可以保留建议的文件名（将与 XML 文件同名，但扩展名为 XSD），或输入你需要的名称（此处为\
  \ `C:\\SQL2012DIRecipes\\CH03\\ComplexNested.Xsd`）。单击“保存”。对话框应类似于 图 3-1（如果你未使用本书的示例，则文件名会有所不同）。\n\
  \n    ![9781430247913_Fig03-01.jpg](img/9781430247913_Fig03-01.jpg)\n    图 3-1。\
  \ XML 源编辑器对话框\n\n4.  单击“列”。你会看到为 XML 层次结构中的每个节点表示的一个表，类似于 图 3-2。\n\n    ![9781430247913_Fig03-02.jpg](img/9781430247913_Fig03-02.jpg)\n\
  \    图 3-2。在 SSIS XML 源中选择节点\n\n5.  单击“确定”确认源文件选择。返回到数据流窗格。\n6.  向数据流窗格添加一个 OLEDB\
  \ 目标任务。\n\n\n\n将绿色的输出连接线拖动，以将 XML 源链接到 OLEDB 目标。除非只有一个 XML 节点，或者是最后一个节点，否则将出现“输入输出选择”对话框，允许您选择要输出的\
  \ XML 节点——如图 3-3 所示。\n\n![9781430247913_Fig03-03.jpg](img/9781430247913_Fig03-03.jpg)\n\
  \n图 3-3. 在 SSIS 数据流中选择要处理的 XML 节点\n\n7.  有点令人困惑的是，输出是 XML 源，而输入是 OLEDB 目标！点击“确定”返回到数据流窗格。\n\
  8.  双击 OLEDB 目标任务。选择一个现有的 OLEDB 连接管理器（或创建一个新的，如配方 1-2 等所述）。选择一个现有的表，或点击“新建”按钮创建一个新表。点击“确定”返回到数据流窗格。现在必须为\
  \ XML 层次结构中的每个节点重复此步骤。\n9.  运行 SSIS 包（在解决方案资源管理器中右键单击该包并选择“执行包”）。\n\n## 工作原理\n\n\
  对于常规的数据导入，SSIS 可能仍然是最佳工具。它不仅会将 XML 源结构导入到适当的 SQL Server 表中，还会创建执行导入所需的 XSD 文件。\n\
  \n话虽如此，值得注意的是，复杂的 XML 源文件会让 SSIS 建议在 SQL Server 中创建非常多的分解表，并给您留下一个复杂的（甚至可以说是错综复杂的）表层次结构，映射到\
  \ XML 文档中的节点层次结构。因此，对于复杂的源文件，请准备好花费时间重构 SSIS 生成的极其冗长的 XSD 文件，以便：\n*   降低 XSD 文件的复杂性。\n\
  *   降低 SQL Server 中分解表的复杂性。\n*   扁平化 XML 层次结构。\n*   只导入您感兴趣的 XML 层次结构部分。\n\n另一件需要注意的事情是，一旦所有数据都导入到分解表中，您可能需要创建\
  \ T-SQL 代码或视图来连接这些分解表，以便提取导入产生的显著数据。对于复杂的 XML 源，这至少可以说是有挑战性的。然而，这确实让您——数据人员——以关系形式面对您的数据，这对于数据库开发人员和\
  \ DBA 来说可能都更直观。这种方法在以下情况下是最佳选择：\n*   您需要定期将源数据分解到 SQL Server 中。\n*   您希望导入源文件的全部或部分内容。\n\
  *   您希望 SSIS 半自动地创建所有分解表。\n*   您希望以关系结构访问所有 XML 数据。\n*   您想使用 SQL 来定义选择以选取部分 XML\
  \ 数据。\n*   数据文件不是太大。\n\n当然，这个配方只描述了 SSIS 导入包的“核心” XML 部分。您很可能希望在 XML 导入之前先执行一个 SQL\
  \ 任务来截断目标表并删除目标表上的任何索引，然后在数据流任务之后再跟一个 SQL 任务，以在分解表上用于连接的所有字段上重新创建索引。\n\n另一点需要注意的是，在确认源文件时——除非\
  \ XSD 文件定义了数据长度——您很可能会看到如图 3-4 所示的警告。\n\n![9781430247913_Fig03-04.jpg](img/9781430247913_Fig03-04.jpg)\n\
  \n图 3-4. XML 数据类型警告\n\n点击“确定”可移除该警告，然后，如果您愿意，可以通过右键单击 XML 源任务并选择“显示高级编辑器”来调整输出的数据类型。接下来，单击“输入和输出属性”选项卡，并选择不同的数据类型或数据长度。图\
  \ 3-5 所示的对话框给出了一个示例。\n\n![9781430247913_Fig03-05.jpg](img/9781430247913_Fig03-05.jpg)\n\
  \n图 3-5. XML 源高级编辑器\n\n这允许您将字符列的长度扩展到默认的 255 以上，或者通过将输出类型设置为 Unicode 文本流 [DT_NTEXT]\
  \ 来避免在映射到 `VARCHAR(MAX)` 列时发生截断。\n\n考虑在所有分解表的键和外键字段上创建键和索引，以加速查询或重新组装数据。这可能需要一些时间（设置在导入数据前删除所有索引的过程也是如此，至少如果您定期使用该包的话），但如果您正在导入大量的\
  \ XML 源数据，您可能会发现性能提升非常值得这些额外的努力。\n\n#### 提示、技巧与陷阱\n\n*   别忘了，在生产环境中，您需要为 XML 源任务设置错误处理。这至少能让您指定任务如何处理每个\
  \ XML 节点每一列的错误。图 3-6 给出了一个极其简单的方法。\n\n![9781430247913_Fig03-06.jpg](img/9781430247913_Fig03-06.jpg)\n\
  \n图 3-6. SSIS XML 任务中的错误处理\n\n*   您可能会遇到源文件太大而无法处理的情况——因为没有足够的可用内存供 SSIS 加载源的文档对象模型。在这种情况下，您必须使用\
  \ XSLT 转换来将源文件分解为更小的文件（如配方 3-7 所述），或使用 SQLXML 批量加载（如配方 3-8 所述）。\n*   正如我在前面章节中指出的（但值得重复一遍），如果您使用相同的目标连接管理器，并且使用的是\
  \ SQL Server 2012，那么值得在包级别（在解决方案资源管理器的“连接管理器”文件夹中）定义它。对于更早版本的 SQL Server，只需在包之间复制一个有效的连接管理器即可。\n\
  \n## 3-5. 导入复杂的 XML 文件\n\n### 问题\n\n您想从一个复杂的源 XML 文件导入数据。\n\n### 解决方案\n\n使用 SSIS\
  \ 将数据分解到暂存表中，然后通过覆盖视图来提取规范化的记录。\n\n图 3-7 展示了一个视图覆盖在五个表上的例子，该视图是使用 SSIS 进行复杂 XML\
  \ 导入的结果。\n\n![9781430247913_Fig03-07.jpg](img/9781430247913_Fig03-07.jpg)\n\n图 3-7.\
  \ 使用视图扁平化复杂的 XML 导入文件结构\n\n该视图实际上将来自 XML 的多个层次结构表“反规范化”，形成一种更适合后续数据加载的形式。\n\n###\
  \ 工作原理\n\n如配方 3-4 所述，如果您有一个复杂的源文件——这意味着一个复杂的模式文件——那么您需要以以下方式扩展您的包：\n*   创建多个 OLEDB\
  \ 目标任务，SSIS 检测到的每个输出对应一个。\n*   将 SSIS 的初始输出用作暂存表。\n*   在目标数据库中解析暂存表之间的互联关系，并定义视图或存储过程来连接数据——可能将其扁平化成一种更可用的形式，然后输出到更简化的最终表中。\n\
  *   在将较大的暂存表反规范化到最终表之前为其建立索引。\n\n这比设置实际的 SSIS 任务可能更耗时，但通常是导入过程中必要的阶段。\n\n## 3-6.\
  \ 将多个 XML 文件导入 SQL Server\n\n### 问题\n\n您想在一个结构化且受控的 ETL 过程中，将多个 XML 文件导入 SQL Server。\n\
  \n### 解决方案\n\n使用 SSIS 和一个 Foreach 循环容器，将数据访问模式设置为“来自变量的 XML 文件”，以遍历源目录。\n1.  创建一个\
  \ XML 数据流，如配方 3-4 所述。\n2.  添加一个 Foreach 循环容器，并将数据流任务放入其中。将该任务配置为遍历指定目录中的一组文件。\n\n\
  \n\n"
- "# 处理 XML 数据\n\n## 3-7. 扁平化 XML 文件以备导入\n\n### 问题\n\n你需要重构一个源 XML 文件以“扁平化”它——即降低其复杂性——从而简化\
  \ XML 导入过程。\n\n### 解决方案\n\n使用 SSIS 和 XML 任务在导入前处理源文件。以下说明如何将 XSLT 转换应用于源 XML 文件。\n\
  \n1.  将源 XML 文件复制到源目录。本例中是`C:\\SQL2012DIRecipes\\CH03\\XMLToFlatten.Xml`，内容如下：\n\
  \    ```xml\n    <Clients>\n      <Client>\n        <ClientName> John Smith</ClientName>\n\
  \        <ID> 3</ID>\n        <Details Town = \"Uttoxeter\">\n          <County>\
  \ Staffs</County>\n          <Address1> 4, Grove Drive</Address1>\n        </Details>\n\
  \      </Client>\n      . . . Data omitted to save space . . .\n      <Client>\n\
  \        <ClientName> Slow Sid</ClientName>\n        <ID> 7</ID>\n        <Details\
  \ Town = \"Avignon\">\n          <County> Vaucluse</County>\n          <Address1>\
  \ 2, Rue des Bleues</Address1>\n        </Details>\n      </Client>\n    </Clients>\n\
  \    ```\n\n2.  准备一个 XSLT 文件，用于转换 XML 文件。本例中，文件名为`C:\\SQL2012DIRecipes\\CH03\\FlattenedOutput.Xlt`，内容如下：\n\
  \    ```xml\n    <xsl:stylesheet version = \"1.0\" xmlns:xsl = \"http://www.w3.org/1999/XSL/Transform\"\
  \n                                       xmlns = \"http://www.w3.org/TR/xhtml1/strict\"\
  >\n      <xsl:output method = \"xml\" indent = \"yes\"/>\n      <xsl:template match\
  \ = \"/\">\n        <Clients>\n          <xsl:for-each select = \"Clients/Client\"\
  >\n            <Client>\n              <xsl:element name = \"ID\">\n           \
  \     <xsl:value-of select = \"ID\"/>\n              </xsl:element>\n          \
  \    <xsl:element name = \"Name\">\n                <xsl:value-of select = \"ClientName\"\
  />\n              </xsl:element>\n              <xsl:element name = \"Town\">\n\
  \                <xsl:value-of select = \"Details/@Town\"/>\n              </xsl:element>\n\
  \              <xsl:element name = \"County\">\n                <xsl:value-of select\
  \ = \"Details/County\"/>\n              </xsl:element>\n              <xsl:element\
  \ name = \"Address\">\n                <xsl:value-of select = \"Details/Address1\"\
  />\n              </xsl:element>\n            </Client>\n          </xsl:for-each>\n\
  \        </Clients>\n      </xsl:template>\n    </xsl:stylesheet>\n    ```\n\n3.\
  \  打开或创建一个 SSIS 包。在控制流窗格上添加一个`XML Task`。\n4.  双击`XML Task`将其打开。将`OperationType`更改为`XSLT`（这将显著改变“常规”窗格）。\n\
  5.  对于“输入”部分，将`SourceType`设置为`File Connection`。为`Source`创建一个新的连接管理器，指向你的 XML 数据文件。\n\
  6.  对于“第二个操作数”部分，将`SecondOperandType`设置为`File connection`。为`Source`创建一个新的连接管理器，指向你的\
  \ XSD 架构文件。\n7.  在“输出”部分，将`SaveOperationResult`设置为`True`。\n8.  在“操作结果”部分，将`DestinationType`设置为`File\
  \ Connection`。为`Destination`创建一个新的连接管理器，用于生成最终扁平化的 XML 文档。在定义连接管理器时务必选择“创建文件”。务必设置`OverwriteDestination`为`True`。对话框应类似于图\
  \ 3-9。\n    ![9781430247913_Fig03-09.jpg](img/9781430247913_Fig03-09.jpg)\n    图\
  \ 3-9. 使用 XML 任务应用 XSLT 转换\n9.  点击“确定”确认你的更改。\n10. 运行 SSIS 包，如果一切顺利，将创建一个新的目标 XML\
  \ 文件，名为`C:\\SQL2012DIRecipes\\CH03\\FlattenedOutput.Xml`。其内容应如下：\n    ```xml\n \
  \   <?xml version = \"1.0\" encoding = \"utf-8\"?>\n    <Clients xmlns = \"http://www.w3.org/TR/xhtml1/strict\"\
  >\n      <Client>\n        <ID> 3</ID>\n        <Name> John Smith</Name>\n     \
  \   <Town> Uttoxeter</Town>\n        <County> Staffs</County>\n        <Address>\
  \ 4, Grove Drive</Address>\n      </Client>\n      . . . Data omitted to save space\
  \ . . .\n      <Client>\n        <ID> 7</ID>\n        <Name> Slow Sid</Name>\n \
  \       <Town> Avignon</Town>\n        <County> Vaucluse</County>\n        <Address>\
  \ 2, Rue des Bleues</Address>\n      </Client>\n    </Clients>\n    ```\n\n### 工作原理\n\
  \nSSIS 武器库中帮助你处理 XML 数据的另一件武器是`XML 任务`。此任务有多种用途，但我们首先介绍的是用它对 XML 文档应用 XSLT 转换。应用\
  \ XSLT 转换的原因非常多——非常多——但这里我们只讨论如何“扁平化”XML 文档。这意味着降低源文件的复杂性，使其更易于加载。正如你所看到的，得益于 XML\
  \ 样式表的工作，生成的 XML 简单得多。\n\n必然地，应用此类转换需要对 XML 和 XSLT 有合理的了解，或者愿意学习 XSLT 的功能。由于此处的目标并非提供关于\
  \ XSLT 的速成课程，因此示例非常简单。掌握了原理后，你就可以将其应用于你自己的特定业务需求。然而，有许多关于此主题的优秀书籍和文章可供你查阅，如果你需要进一步研究该主题。\n\
  \n在处理源文件时，XSLT 的其他常见用途包括：\n*   将大型源文件切分为更小、更易于管理的文件。\n*   删除数据。\n*   删除对架构的引用。\n\
  \n### 提示、技巧和陷阱\n\n*   与平面文件和电子表格的情况一样，我建议可能不值得为`XML`文件等一次性连接定义包级别的连接管理器。\n\n## 3-8.\
  \ 从非常大的文件导入 XML 数据，优先考虑速度\n\n### 问题\n\n你需要尽可能快地导入大型 XML 数据文件，因为你必须满足具有挑战性的 SLA（服务级别协议）。\n\
  \n### 解决方案\n\n使用`SQLXML Bulk Load`可执行文件来加载数据，因为它几乎总是可用的最快选项。以下说明如何使用它。\n\n1.  下载并安装`SQLXML\
  \ 4.0`，除非它已经安装（参见下文关于此的说明）。\n2.  定位一个 XML 源数据文件。\n\n将每个文件的路径加载到合适的变量中（本例中为`user::FileName`）。此技术在配方\
  \ 13-1 中有详细描述。\n3.  双击 XML 源任务，将数据访问模式定义为`XML File from Variable`。选择你在`Foreach Loop`容器中用于保存文件名的变量，如图\
  \ 3-8 所示。\n    ![9781430247913_Fig03-08.jpg](img/9781430247913_Fig03-08.jpg)\n \
  \   图 3-8. 从变量中选择 XML 源文件\n4.  点击“确定”确认你的更改。\n5.  切换为使用文件名变量会使所有目标任务失效，因此请双击每个任务，然后点击“确定”以移除错误指示器。\n\
  \n### 工作原理\n\n显然，有时你将面临的不是单个，而是需要同时导入多个 XML 文件。只要它们的结构完全相同，那么标准方法就是使用`Foreach Loop`容器。\n\
  \n这里的诀窍是首先使用数据源文件的直接路径来设置流程，只有在包成功运行后，才切换为使用文件名变量。\n\n![image](img/sq.jpg) **注意**\
  \ 对 XML 结构的任何修改都可能涉及将数据访问模式重置为`XML File Location`，重新验证所有目标任务，重新测试单源文件的数据加载，然后切换回文件变量——并再次重新验证所有目标任务！\n\
  \n\n在此示例中，它是 `C:\\SQL2012DIRecipes\\CH03\\Clients_Simple.Xml` 文件。\n\n3.  创建目标表。以下是本示例中要使用的表（`C:\\\
  SQL2012DIRecipes\\CH03\\tbl Client_XMLBulkLoad.Sql`）：\n\n    ```\n    CREATE TABLE\
  \ CarSales_Staging.dbo.Client_XMLBulkLoad\n    (\n     ID int NULL,\n     ClientName\
  \ NVARCHAR(1000) NULL,\n     Address1 NVARCHAR(1000) NULL,\n     Town NVARCHAR(1000)\
  \ NULL,\n     County NVARCHAR(1000) NULL,\n     Country NUMERIC(18, 0) NULL\n  \
  \  );\n    GO\n    ```\n\n4.  创建一个 XML 架构文件。注意作为 Microsoft 映射架构一部分的扩展（`C:\\SQL2012DIRecipes\\\
  CH03\\SQLXMLBulkLoadImport_Simple.Xsd`）：\n\n    ```\n    <xsd:schema xmlns:xsd =\
  \ http://www.w3.org/2001/XMLSchema\n                xmlns:sql = \"urn:schemas-microsoft-com:mapping-schema\"\
  >\n       <xsd:element name = \"CarSales\" sql:is-constant = \"1\" >\n         <xsd:complexType>\n\
  \           <xsd:sequence>\n      <xsd:element name = \"Client\" sql:relation =\
  \ \"Client_XMLBulkLoad\"  maxOccurs = \"unbounded\">\n        <xsd:complexType>\n\
  \           <xsd:sequence>\n             <xsd:element name = \"ID\"          type\
  \ = \"xsd:integer\" sql:field = \"ID\" />\n             <xsd:element name = \"ClientName\"\
  \  type = \"xsd:string\"  sql:field = \"ClientName\" />\n             <xsd:element\
  \ name = \"Address1\"    type = \"xsd:string\"  sql:field = \"Address1\" />\n  \
  \           <xsd:element name = \"Town\"        type = \"xsd:string\"  sql:field\
  \ = \"Town\" />\n             <xsd:element name = \"County\"      type = \"xsd:string\"\
  \  sql:field = \"County\" />\n             <xsd:element name = \"Country\"     type\
  \ = \"xsd:decimal\" sql:field = \"Country\" />\n           </xsd:sequence>\n   \
  \     </xsd:complexType>\n      </xsd:element>\n           </xsd:sequence>\n   \
  \      </xsd:complexType>\n       </xsd:element>\n    </xsd:schema>\n    ```\n\n\
  5.  创建用于调用 SQLXML 批量加载并加载数据的 VBScript，如下所示（将此文件命名为 `C:\\SQL2012DIRecipes\\CH03\\\
  SQLXMLBulkload.vbs`）：\n\n    ```\n    Set objBL = CreateObject(\"SQLXMLBulkLoad.SQLXMLBulkload.4.0\"\
  )\n    objBL.ConnectionString = \"provider = SQLOLEDB;data source = MySQLServer;database\
  \ = CarSales_Staging;\n    integrated security = SSPI\"\n    objBL.ErrorLogFile\
  \ = \"C:\\SQL2012DIRecipes\\CH03\\SQLXMLBulkLoadImporterror.log\"\n    objBL.Execute\
  \ \"C:\\SQL2012DIRecipes\\CH03\\SQLXMLBulkLoadImport_Simple.xsd\",\n    \"C:\\SQL2012DIRecipes\\\
  CH03\\Clients_Simple.xml\"\n    Set objBL = Nothing\n    ```\n\n6.  双击 `C:\\SQL2012DIRecipes\\\
  CH03\\SQLXMLBulkload.vbs` 文件以运行批量加载。如果一切顺利，您应该能够打开 `Client_XMLBulkLoad` 表，并看到来自\
  \ XML 源文件的数据已正确加载。\n\n## 工作原理\n\n尽管在使用 SQL Server 时，`SQLXML 批量加载` 可能不是 XML 工具包的标准组成部分，但它是开发者资源中一颗隐藏的宝石。简而言之，它允许您将极大的数据文件作为多个表导入\
  \ SQL Server，如果需要，还能保留引用完整性——而且速度惊人。它本质上是一个 COM（组件对象模型）对象，允许您将半结构化的 XML 数据加载到 SQL\
  \ Server 表中。\n\n![image](img/sq.jpg) **注意** 虽然 `SQLXML 4.0` 在 SQL Server 2005 及之前版本的默认安装中已包含，但对于\
  \ SQL Server 2008 及之后的版本，需要单独下载并安装（`www.microsoft.com/en-us/download/details.aspx?id=3522`）。\n\
  \n尽管有这些优点，许多 SQL Server 开发者要么忽略了这个出色工具的存在，要么因为其在 SQL Server 文档中解释不清而未能使用它。也许因此，它被不公平地认为是难以实现的。从\
  \ SQL Server 2008 开始，它甚至不再属于标准安装的一部分，必须作为功能包的一部分单独安装。\n\n所以，本方法旨在澄清事实。\n\n该工具在以下情况下使用效果最佳：\n\
  \n*   源 XML 文件很大时。多大算大？嗯，如果您原本计划使用 `OPENXML`，那么就是指超过 2 GB 的文件。对于加载到变量中并使用 XQuery\
  \ 进行分解的 XML，相同的上限也适用。对于 `SSIS`，则取决于可用内存。我曾使用 `SQLXML 批量加载` 加载过几十 GB 的 XML 文件。\n\
  *   XML 源是相对简单的 XML（本质上是表和字段，但不过于复杂）时。源数据不能太复杂（在 XML 术语上），否则将无法加载。这被称为“半结构化”XML\
  \ 数据不是没有原因的。\n*   希望从同一个源文件加载多个表时。\n*   数据加载速度很重要时。在我的测试中，对于没有关系链接的独立表，`SQLXML 批量加载`\
  \ 的数据加载速度大约是（原生）`BCP` 速度的 90%——这按任何标准衡量都算快的！\n\n让 `SQLXML` 加载数据的核心部分在于 XSD 文件。如您所见，它包含（除了\
  \ Microsoft 映射架构之外）一些额外的元素，使其能够如此高效地完成工作。主要的映射元素见 表 3-1。\n\n### 表 3-1. SQLXML 映射属性\n\
  \n| XML 属性 | 解释 | 用途 |\n| --- | --- | --- |\n| `Sql:relation` | 数据被加载到的表。 | 表级别\
  \ |\n| `sql:field` | 数据被加载到的目标表中的字段。 | 字段级别 |\n\n本质上，您必须扩展架构（无论是手工精心制作的，还是使用方法 7-12\
  \ 中描述的方法之一初始创建的），添加允许 `SQLXML` 将源数据引导到正确的表和字段的属性。这是这种 XML 加载技术中较难的部分，很可能也是您花费时间最多的地方，因此在尝试复杂的数据加载之前，值得确保您已理解\
  \ XSD 扩展。您甚至可能会发现，从简单的 XML 文件开始练习会事半功倍。\n\n调用 `SQLXML 批量加载器` 的 `.vbs` 文件可以非常简单，至少需要包含以下内容：\n\
  \n*   对象创建语句——用于调用 `SQLXML 批量加载` COM 对象。\n*   一个连接字符串，至少包含：\n    *   服务器以及（如果需要）实例名称（`Data\
  \ Source`）。\n    *   目标数据库名称（本例中为 `CarSales_Staging`）。\n    *   SQL Server 安全信息（Windows\
  \ 集成安全或 SQL Server 安全）。\n*   `Execute` 命令，提供 XSD 和 XML 文件的路径。\n*   一条 `SET` 命令以释放\
  \ COM 对象。\n*   一个 `ErrorLog` 文件。虽然这并非绝对必要，但它非常有用。\n\n如果成功了，您会知道——因为没有 `ErrorLog`\
  \ 文件——或者旧的 `ErrorLog` 文件被删除了（假设您已请求生成日志文件）。哦，还有数据确实已正确加载这一事实。\n\n如果数据未能加载，那么您的首要检查点就是\
  \ `SQLXML 批量加载` 创建的 `ErrorLog` 文件（假设您使用了 `objBL.ErrorLogFile` = `\"日志文件及路径\"` 参数）。因此，虽然创建此文件不是强制性的，但如果您想使用\
  \ `SQLXML 批量加载` 调试数据加载操作，它几乎是必需的。幸运的是，这些文件非常明确，无疑将成为宝贵的调试信息来源。`ErrorLog` 文件是可选的——但对于调试过程来说，它是无价之宝（除非一切一次成功且每次都能完美运行）。\n\
  \n然而，在创建 XSD 文件时，要避免错误，有一些经典事项需要注意。根据我的经验，架构文件是最常见的问题来源，因为它涉及到一定量的手工制作。潜在问题包括：\n\
  \n*   确保在 `xsd:element` 定义中使用的所有双引号内部没有紧邻的空格。\n\n"
- "# SQLXML 批量加载使用技巧与多表加载\n\n## 注意事项\n\n在编写 XSD 映射文件时，需要特别注意以下几点：\n\n-   确保不会意外关闭诸如\
  \ `xsd:sequence` 和 `xsd:complexType` 之类的元素，甚至是一些 `xsd:element` 定义。\n-   严格区分大小写。因此，在前面的例子中，如果有一个名为\
  \ “Country” 的元素，而模式映射元素名为 “country”，则会导致过程失败。\n\n这个简单的脚本假设目标表已经存在（不过，你也可以在下一部分展示的加载过程中创建表）。它也假定了使用集成安全性。有趣的是，有点反直觉的是，XML\
  \ 模式文件（`.xsd`）作为第一个参数传递给 XML 批量加载器，而 XML 文件本身则作为第二个参数传递。\n\n#### 提示、技巧与陷阱\n\n- \
  \  此示例使用 XML 元素，但以属性为中心的 XML 源数据也可以通过 `SQLXML 批量加载器` 加载。\n-   复杂的 XML 源文件可以使用 XSLT\
  \ 进行“扁平化”，生成适合 `SQLXML` 处理的文件。在 SSIS 中，执行 XSLT 的 XML 任务可以放在批量加载步骤之前。\n-   不支持内联模式。实际上，如果你的源\
  \ XML 文档中有内联模式，`XML 批量加载器` 将忽略它。\n-   XML 文档会检查格式是否良好，但不会进行验证。如果 XML 文档格式不正确，处理将被取消。\n\
  \n## 3-9. 从单个 XML 源文件同时加载多个表\n\n### 问题\n你想从一个包含多个不相关表数据的 XML 源文件中加载数据。\n\n### 解决方案\n\
  使用 `SQLXML 批量加载器` 可执行文件和一个精心制作的 `XSD` 文件。\n\n你可以按照以下方式从单个 XML 文件加载多个表。\n\n1.  定位你的\
  \ XML 文件，该文件包含来自多个表的数据。本例使用 `C:\\SQL2012DIRecipes\\CH03\\SQLXMLSourceDataMultipleTables.xml`，其中包含\
  \ `Invoice` 和 `Invoice_Lines` 表的数据。内容如下：\n\n    ```xml\n    <?xml version = \"1.0\"\
  \ encoding = \"UTF-8\" ?>\n    <ROOT>\n    <Invoice>\n        <ID> 3</ID>\n    \
  \    <InvoiceNumber> AA/1/2014-07-25</InvoiceNumber>\n        <DeliveryCharge> 250</DeliveryCharge->\n\
  \    </Invoice>\n    <Invoice_Lines>\n        <InvoiceID> 3</InvoiceID>\n      \
  \  <SalePrice> 5000</SalePrice>\n    </Invoice_Lines>\n    <Invoice_Lines>\n   \
  \     <InvoiceID>3</InvoiceID>\n        <SalePrice> 12500</SalePrice>\n    </Invoice_Lines>\n\
  \    </ROOT>\n    ```\n\n2.  在 SQL Server 中创建用于保存数据所需的表 `C:\\SQL2012DIRecipes\\\
  CH03\\tblInvoiceMulti.Sql`：\n\n    ```sql\n    CREATE TABLE CarSales_Staging.dbo.Invoice_XML_Multi\n\
  \    (\n     ID INT NULL,\n     InvoiceNumber VARCHAR (50) NULL,\n     DeliveryCharge\
  \ SMALLMONEY NULL\n    ) ;\n    GO\n    CREATE TABLE CarSales_Staging. dbo.Invoice_Lines_XML_Multi\n\
  \    (\n     InvoiceID INT NULL,\n     SalePrice MONEYNULL,\n    ) ;\n    GO\n \
  \   ```\n\n3.  创建一个 XSD 文件（存储为 `C:\\SQL2012DIRecipes\\CH03\\SQLXMLBulkLoadImportMultipleTables.xsd`）：\n\
  \n    ```xml\n    <xsd:schema xmlns:xsd = \" http://www.w3.org/2001/XMLSchema \"\
  \n                xmlns:sql = \"urn:schemas-microsoft-com:mapping-schema\">\n  \
  \  \n      <xsd:element name = \"ROOT\" sql:is-constant = \"1\" >\n        <xsd:complexType>\n\
  \         <xsd:sequence>\n            <!-- Invoice -->\n            <xsd:element\
  \ name = \"Invoice\" sql:relation = \"Invoice_XML_Multi\" >\n             <xsd:complexType>\n\
  \              <xsd:sequence>\n               <xsd:element name = \"ID\"       \
  \       type = \"xsd:integer\"\n                                               \
  \       sql:field = \"ID\" />\n               <xsd:element name = \"InvoiceNumber\"\
  \   type = \"xsd:string\"\n                                                    \
  \  sql:field = \"InvoiceNumber\" />\n               <xsd:element name = \"DeliveryCharge\"\
  \  type = \"xsd:decimal\"\n                                                    \
  \  sql:field = \"DeliveryCharge\" />\n              </xsd:sequence>\n          \
  \   </xsd:complexType>\n            </xsd:element>\n    \n            <!-- Invoice\
  \ Lines -->\n            <xsd:element name = \"Invoice_Lines\" sql:relation = \"\
  Invoice_Lines_XML_Multi\" >\n             <xsd:complexType>\n              <xsd:sequence>\n\
  \               <xsd:element name = \"InvoiceID\"  type = \"xsd:integer\" sql:field\
  \ = \"InvoiceID\" />\n               <xsd:element name = \"SalePrice\"  type = \"\
  xsd:string\"  sql:field = \"SalePrice\" />\n              </xsd:sequence>\n    \
  \         </xsd:complexType>\n            </xsd:element>\n         </xsd:sequence>\n\
  \        </xsd:complexType>\n      </xsd:element>\n    </xsd:schema>\n    ```\n\n\
  4.  创建一个 `.vbs` 脚本，引用相应的 `.XML` 和 `.XSD` 文件，如下所示：\n\n    ```vbscript\n    Set objBL\
  \ = CreateObject(\"SQLXMLBulkLoad.SQLXMLBulkload.4.0\")\n    objBL.ConnectionString\
  \ = \"provider = SQLOLEDB;data source = ADAM02; ←database = CarSales_Staging;\n\
  \    integrated security = SSPI\"\n    objBL.ErrorLogFile = \"C:\\SQL2012DIRecipes\\\
  CH03\\SQLXMLBulkLoadImporterror.log\"\n    objBL.Execute \"C:\\SQL2012DIRecipes\\\
  CH03\\SQLXMLBulkLoadImportMultipleTables.xsd\", ←\n    \"C:\\SQL2012DIRecipes\\\
  CH03\\SQLXMLSourceDataMultipleTables.xml\"\n    Set objBL = Nothing\n    ```\n\n\
  5.  双击 `.vbs` 文件以运行 `SQLXML 批量加载器` 并导入源数据。\n\n### 工作原理\nXML 文件相对于 CSV 或其他平面文件的一个优势是，能够在单个源文件中存储多个不相关的表。这实际上允许你将整个数据子集传输到一个文件中，准备同时加载到目标数据库的多个表中。如果你使用\
  \ `SQLXML 批量加载器` 来执行此过程，数据加载速度会非常快。\n\n此技术基于源 XML 布局非常简单的前提。它假定你本质上是从 XML 文件中的“表转储”加载数据，其中每个表按顺序存储在文件中。为了模拟这种场景，这里使用的数据文件包含两个\
  \ XML 格式的表：`Invoice` 和 `Invoice_Lines`。这个示例文件只有一个 `Invoice` 记录和两个 `Invoice_Lines`\
  \ 记录，但显然现实中可能有数十个表，每个表包含数百万条记录。请注意，XML 中并未假定 `Invoice` 和 `Invoice_Lines` 之间存在任何关系链接。\n\
  \n这种方法唯一可能的问题是，你必须定义的 XSD 文件可能会变得极其复杂。然而，创建它不一定困难，只是繁琐。所以请准备好耐心，并为一些重复的测试做好准备。\n\
  \n如你所见，每个映射到表的 XML 元素都是一个独立的 XML 节点，元素的顺序并不重要。然而，重要的是要有一个单一的根节点——除非 `XMLFragment`\
  \ SQLXML 参数设置为 `true`（默认为 `False`），如配方 3-11 中所述。\n\n#### 提示、技巧与陷阱\n\n-   在加载完成后，通过添加主键和外键约束来强制执行引用完整性，没有任何东西可以阻止你这样做。实际上，这比从“层次化”XML\
  \ 源加载数据（如下一个配方所述）要快得多。\n-   此示例假定目标表没有 `IDENTITY` 字段。与大多数批量加载形式一样，这种情况也可以处理（稍后将解释）。\n\
  -   值得注意的是，XML 文件（数据文件）可以包含比模式（`.xsd`）文件中定义的更多的“表”和“记录”。但是，只有在 XSD 文件中指定的那些才会被加载。\n\
  \n## 3-10. 从 XML 源文件加载和解析关系表\n\n### 问题\n你想加载一个源 XML 文件，该文件包含描述为关系表的 XML 数据。\n\n\
  ### 解决方案\n使用 `SQLXML 批量加载器` 可执行文件和一个精心制作的 `XSD` 文件来维护源文件中假定或定义的外键关系。\n\n"
- "# 使用 SQLXML Bulk Load 加载具有关系数据的 XML 文件\n\n您可以使用 SQLXML Bulk Load 可执行文件来加载存储在 XML\
  \ 文件中的关系型表。\n\n1.  删除前一个配方中使用的两个表，并使用外键约束重新创建它们。此操作需要以下 DDL（存储为`C:\\SQL2012DIRecipes\\\
  CH03\\LoadRelationalXML.Sql`）：\n    ```sql\n    DROP TABLE CarSales_Staging.dbo.Invoice_XML_Multi;\n\
  \    DROP TABLE CarSales_Staging.dbo.Invoice_Lines_XML_Multi;\n    CREATE TABLE\
  \ CarSales_Staging.dbo.Invoice_XML_Multi\n    (\n     ID INT NOT NULL PRIMARY KEY,\n\
  \     InvoiceNumber VARCHAR (50) NULL,\n     DeliveryCharge SMALLMONEY NULL\n  \
  \  ) ;\n    GO\n    CREATE TABLE CarSales_Staging.dbo.Invoice_Lines_XML_Multi\n\
  \    (\n     ID INT NOT NULL PRIMARY KEY,\n     InvoiceID INT NOT NULL FOREIGN KEY\
  \ REFERENCES Invoice_XML_Multi (ID),\n     SalePrice MONEY NULL,\n    ) ;\n    GO\n\
  \    ```\n\n2.  创建一个合适的 XML 模式（以下内容存储为`C:\\SQL2012DIRecipes\\CH03\\SQLXMLBulkLoadImportReferential.xsd`）：\n\
  \    ```xsd\n    <xsd:schema xmlns:xsd = \" http://www.w3.org/2001/XMLSchema\"\n\
  \                xmlns:sql = \"urn:schemas-microsoft-com:mapping-schema\">\n   \
  \     <xsd:annotation>\n            <xsd:appinfo>\n                <sql:relationship\
  \ name = \"InvoiceToLine\"\n                    parent=     \"Invoice_XML_Multi\"\
  \n                    parent-key = \"ID\"\n                    child=      \"Invoice_Lines_XML_Multi\"\
  \n                    child-key=  \"InvoiceID\" />\n            </xsd:appinfo>\n\
  \        </xsd:annotation>\n        <xsd:element name = \"Invoice\" sql:relation\
  \ = \"Invoice_XML_Multi\" >\n            <xsd:complexType>\n                <xsd:sequence>\n\
  \                    <xsd:element name = \"ID\"             type = \"xsd:integer\"\
  \ sql:field = \"ID\" />\n                    <xsd:element name = \"InvoiceNumber\"\
  \  type = \"xsd:string\"  sql:field = \"InvoiceNumber\" />\n                   \
  \ <xsd:element name = \"DeliveryCharge\" type = \"xsd:decimal\" sql:field = \"DeliveryCharge\"\
  \ />\n                    <xsd:element name = \"Invoice_Lines\"\n              \
  \                   sql:relation = \"Invoice_Lines_XML_Multi\"\n               \
  \                  sql:relationship = \"InvoiceToLine\" >\n                    \
  \    <xsd:complexType>\n                            <xsd:sequence>\n           \
  \                     <xsd:element name = \"ID\"        type = \"xsd:integer\" sql:field\
  \ = \"ID\" />\n                                <xsd:element name = \"InvoiceID\"\
  \ type = \"xsd:integer\" sql:field = \"InvoiceID\" />\n                        \
  \        <xsd:element name = \"SalePrice\" type = \"xsd:string\"  sql:field = \"\
  SalePrice\" />\n                            </xsd:sequence>\n                  \
  \      </xsd:complexType>\n                    </xsd:element>\n                </xsd:sequence>\n\
  \            </xsd:complexType>\n        </xsd:element>\n    </xsd:schema>\n   \
  \ ```\n\n3.  定位您的数据文件（此处存储为`C:\\SQL2012DIRecipes\\CH03\\SQLXMLSourceDataRelatedTables.xml`）：\n\
  \    ```xml\n    <?xml version = \"1.0\" encoding = \"UTF-8\" ?>\n    <ROOT>\n \
  \       <Invoice>\n            <ID > 3</ID>\n            <InvoiceNumber > 3A9271EA-FC76-4281-A1ED-714060ADBA30</InvoiceNumber>\n\
  \            <DeliveryCharge > 250</DeliveryCharge>\n            <Invoice_Lines>\n\
  \                <ID > 1</ID>\n                <InvoiceID > 3</InvoiceID>\n    \
  \            <SalePrice > 5000</SalePrice>\n            </Invoice_Lines>\n     \
  \       <Invoice_Lines>\n                <ID > 2</ID>\n                <InvoiceID\
  \ > 5</InvoiceID>\n                <SalePrice > 12500</SalePrice>\n            </Invoice_Lines>\n\
  \        </Invoice>\n    </ROOT>\n    ```\n\n4.  修改 `.vbs` 脚本，通过修改 `objBL.Execute`\
  \ 语句来引用新的 `.xml` 和 `.xsd` 文件，然后运行此示例：\n    ```vbscript\n    objBL.Execute \"C:\\\
  SQL2012DIRecipes\\CH03\\SQLXMLBulkLoadImportReferential.xsd\", _\n    \"C:\\SQL2012DIRecipes\\\
  CH03\\SQLXMLSourceDataRelatedTables.xml\"\n    ```\n\n## 工作原理\n\n本配方的示例建立在前一个配方的方法之上。但是，它需要满足以下先决条件：\n\
  *   具有从主键到外键关系的目标表。这就是我们必须重新创建目标表的原因。\n*   源数据中“父-子”数据关系在 XML 结构中直接表达。在源数据中就是这种情况，其中\
  \ `<Invoice>` 元素包含一个或多个 `<Invoice_Lines>` 元素。\n\n更一般地说，如果源 XML 是层次结构化的，以映射到关系源，那么\
  \ `SQLXML Bulk Load` 可以将数据分解到 SQL Server 表中，同时维护外键关系。在这里，与前一个配方一样，任何潜在的困难都在于 XSD\
  \ 文件的定义和创建。实际上，所有重要的内容都在模式文件中。我将解释其要点。\n\n首先，注意模式文件开头的 `<xsd:annotation>` 和 `<xsd:appinfo>`\
  \ 元素。外键映射在这些元素内指定。它必须存在并正确定义，加载才能工作。\n\n然后，在这些元素内部，有 `sql:relationship name = \"\
  InvoiceToLine\"` 元素。它为每个表之间的关系命名或标识（如果您愿意），作为 `appinfo` 的一部分，随后它将被用作模式文件中“表”的 `sql:element`\
  \ 定义的一部分。关系定义如下：\n*   `parent = \"Invoice_XML_Multi\"`：“父”表。\n*   `parent-key =\
  \ \"ID\"`：“父”表的主键列。\n*   `child = \"Invoice_Lines_XML_Multi\"`：“子”表。\n*   `child-key\
  \ = \"InvoiceID\"`：“子”表的外键列。\n*   `sql:relationship = \"InvoiceToLine\"`：在包含子元素的\
  \ XML 元素内部，此属性指定要使用的关系。\n\n从这些信息中可以看出，`ID` 字段现在被视为 `Invoice_XML_Multi` 表中的主键，而 `InvoiceID`\
  \ 被视为 `Invoice_Lines_XML_Multi` 表中的外键。执行 `.vbs` 脚本会将数据加载到两个表中，同时将 `ID` 保持为 `Invoice_Lines_XML_Multi`\
  \ 的外键约束。\n\n如果您有一个定义了两个表之间主键/外键关系的映射模式（例如 `Invoice` 和 `Invoice_Lines` 之间），则**必须**先在模式中描述具有主键的表。具有外键列的表必须出现在模式的后面部分。\n\
  \n您还需要知道，`SQLXML Bulk Load` 在节点进入作用域时生成记录，并在节点退出作用域时将这些记录发送到 SQL Server。这意味着记录的数据必须存在于节点的作用域内。因此，“子”表的数据不能出现在“父”表的数据之后，就像加载多个（独立的）表时的情况一样。\n\
  \n到目前为止，在所有使用的 `SQLXML Bulk Load` 示例中，我们都在源数据中使用了以元素为中心的 XML。因为我不想给人留下这是唯一可用选项的印象，我想明确指出，您当然也可以使用以属性为中心的\
  \ XML——或者实际上是两者的混合。\n\n所以，总结一下，到目前为止您看到的是：\n```xsd\n<xsd:element name = \"InvoiceID\"\
  \ type = \"xsd:integer\" sql:field = \"InvoiceID\" />\n```\n它同样可以是：\n```xsd\n<xsd:attribute\
  \ name = \"InvoiceID\" type = \"xsd:integer\" sql:field = \"InvoiceID\" />\n```\n\
  \n我没有给出一个仅使用 XML 属性的完整示例，但这里提供的模式文件应该足以让您创建一个源数据完全是基于属性的模式文件。无论如何，只要映射是准确的，您的数据就会被加载。\n\
  \n\n"
- "# 3-10. 在批量加载中混合使用 XML 元素和属性\n\n确实，您不仅限于仅使用 XML 元素或属性，而是可以在 XML 批量加载中混合使用这两者，如下例所示：\n\
  \nXML 模式如下（存储为 `C:\\SQL2012DIRecipes\\CH03\\SQLXMLBulkLoadImportElementAndAttribute.xsd`）。目标表是之前使用过的\
  \ `Client_XMLBulkLoad`：\n\n```xsd\n<xsd:schema xmlns:xsd = \"http://www.w3.org/2001/XMLSchema\"\
  \n            xmlns:sql = \"urn:schemas-microsoft-com:mapping-schema\">\n    <xsd:element\
  \ name = \"Invoice\" sql:relation = \"Client_XMLBulkLoad\" >\n        <xsd:complexType>\n\
  \            <xsd:sequence>\n                <xsd:element name = \"ClientName\"\
  \ type = \"xsd:integer\" sql:field = \"ClientName\"/>\n                <xsd:element\
  \ name = \"County\" type = \"xsd:integer \" sql:field = \"County\"/>\n         \
  \   </xsd:sequence>\n            <xsd:attribute name = \"ID\" type = \"xsd:integer\"\
  \ />\n        </xsd:complexType>\n    </xsd:element>\n</xsd:schema>\n```\n\n以下是数据文件（存储为\
  \ `C:\\SQL2012DIRecipes\\CH03\\SQLXMLSourceDataElementAndAttribute.xml`）：\n\n```xml\n\
  <?xml version = \"1.0\" encoding = \"UTF-8\" ?>\n<Invoice ID = \"3\">\n    <ClientName\
  \ > John Smith</ClientName>\n    <County > Staffs</County>\n</Invoice>\n```\n\n\
  要运行此示例，您需要修改 `.vbs` 脚本以引用新的 `.xml` 和 `.xsd` 文件（`objBL.Execute \"C:\\SQL2012DIRecipes\\\
  CH03\\SQLXMLBulkLoadImportElementAndAttribute.xsd\", \"C:\\SQL2012DIRecipes\\CH03\\\
  SQLXMLSourceDataElementAndAttribute.xml\"`）。运行该脚本将把数据加载到目标表中，同时保持关系完整性。\n\n![image](img/sq.jpg)\n\
  \n**注意** 在保持引用完整性的同时加载表，可能比在没有引用完整性要求的多表加载慢得多。\n\n## 3-11. 克服 XML 文件批量加载的挑战\n\n\
  ### 问题\n\n您希望利用 SQLXML 批量加载器的所有功能，以确保快速、无差错地批量加载 XML 数据。\n\n### 解决方案\n\n应用相关的 SQLXML\
  \ 批量加载选项来加速加载和/或解决潜在的加载问题。\n\n可用选项见 表 3-2。\n\n**表 3-2. SQLXML 批量加载选项**\n\n| 参数 |\
  \ 说明 | 示例 |\n| --- | --- | --- |\n| `BulkLoad` | 不会加载任何数据，但将生成表结构（假设指定了 `SchemaGen`）。\
  \ | =False |\n| `CheckConstraints` | 确保插入表中的数据遵守为表指定的所有约束（例如主键和外键约束）。如果此参数设置为 True\
  \ 且违反了约束，过程将失败。 | =False |\n| `ForceTableLock` | 此属性应用表锁，可减少加载时间。但是，如果无法获取表锁，过程将失败。\
  \ | =True |\n| `IgnoreDuplicateKeys` | 为每一行插入发出一个 `COMMIT`（需要将 `Transaction` 属性设置为\
  \ False）。请注意，这非常慢！ | =False |\n| `KeepIdentity` | 指定使用源 XML 中的 `IDENTITY` 值。SQL\
  \ Server 在加载过程中不会生成 `IDENTITY` 值。 | =True |\n| `KeepNulls` | 源数据中的任何 `NULLS` 将被插入到目标表中。\
  \ | =True |\n| `SchemaGen` | 将此属性设置为 True 将创建目标表。XML 模式文件中定义的映射将作为表结构的基础。表必须不存在，否则整个过程将失败。\
  \ | =True |\n| `SGDropTables` | 将此属性设置为 True 将删除任何现有的目标表——前提是不存在外键约束等情况。 | =False\
  \ |\n| `TempFilePath` | 指定如果过程在事务中时使用的临时文件路径。这允许您指定不同的磁盘阵列以提高速度。 | =\"\\\\TheServer\\\
  TheShare\" |\n| `Transaction` | 保证操作是一个事务——即要么全部加载，要么完全失败。 | =True |\n| `XMLFragment`\
  \ | 此属性指定 XML 数据文件是 XML 片段（没有单一的顶级节点）。对于 XML 片段必须设置此项，否则整个过程将失败。 | =True |\n\n###\
  \ 工作原理\n\nSQLXML 批量加载器的功能远不止前面示例中展示的那些。不利用其强大功能似乎有些可惜，这些功能包括：\n\n*   在源数据中混合使用 XML\
  \ 属性和元素。\n*   使用可用的 XML 数据类型。\n*   自动创建和删除目标表（以及启用或禁用约束和事务）。\n*   使用溢出列来捕获未映射的数据。\n\
  *   在映射数据时应用各种模式调整。\n\n这些选项可以添加到调用 SQLXML 批量加载器的 `.vbs` 文件中。如果使用得当，它们可以显著增强此实用程序的有效性。\n\
  \n重要的是要记住，SQLXML 批量加载器是一种批量加载机制，针对速度进行了优化，而速度意味着简单性——因此其参数与您可能已经从 `BCP` 或 `BULK\
  \ INSERT` 中了解的参数非常相似（或者，如果您还不了解它们，请参阅 第 2 章 中的说明）。\n\n所有参数的使用方式都与我们到目前为止在本章中看到的\
  \ `.vbs` 文件中的方式相同；即：\n\n```\nObject.Parameter = attribute\n```\n\n因此，要强制表锁，命令将是\
  \ `objBL.ForceTableLock = True`。\n\n到目前为止使用的所有示例都假设您使用 Windows 集成安全性。考虑到情况可能并非总是如此，您需要知道替代方案是在\
  \ `ConnectionString` 参数中使用：\n\n```\nUid = UserName; Pwd = ThePasswordTouse\n```\n\
  \n或者\n\n```\nintegrated security = SSPI\n```\n\n您可以使用 SQLXML 创建任何所需的表，然后再选择是否加载数据。例如，在我们一直使用的\
  \ VBScript 文件中，添加以下几行来创建表但不加载数据：\n\n```\nobjBL.SchemaGen = True\nobjBL.BulkLoad\
  \ = False\n```\n\n使用 SQLXML 批量加载器创建表有点粗糙，但在刚开始进行 XML 批量加载过程时可以节省大量时间。您以后总可以微调表。事实上，这正是许多专家建议的做法。\n\
  \n尽管速度会更慢，但 SQLXML 在加载时可以使用事务以确保在失败时回滚。这需要在 VBScript 文件中添加以下几行：\n\n```\nobjBL.Transaction\
  \ = True\nobjBL.TempFilePath = \\\\Server\\Share\n```\n\n在事务中批量加载数据要慢得多——对于大型导入，您必须确保指定临时文件的驱动器上有足够的磁盘空间。这需要\
  \ `TempFilePath` 参数。关于 `TempFilePath` 参数，请记住，临时文件路径必须是一个共享位置，目标 SQL Server 实例的服务帐户以及运行批量加载应用程序的帐户都可以访问。这意味着，除非您在本地服务器上进行批量加载，否则临时文件路径必须是\
  \ UNC 路径（例如 `\\\\servername\\sharename`）。如果速度至关重要，那么将文件加载到空表或分区中（如果出错可以截断）可能是更快的解决方案。\n\
  \n另一个需要考虑的情况是，如果源 XML 中的数据比预期的多，并且这些数据未被映射，会发生什么？除非 SQLXML 批量加载器被告知如何处理这些“溢出”数据，否则它会简单地忽略它们。由于这在实践中可能很危险，这里有一个简单的技术来捕获溢出数据，然后您可以单独处理它们——或者将其作为指示器，表明需要对模式文件进行更多工作。\n\
  \n1.  对于模式文件中的每个表映射，指定哪个列将处理任何（及所有）溢出。\n\n\n\n"
- "# SQLXML 批量加载配置与集成\n\n## 溢出列配置\n上一配方中的示例应写作：\n```xml\n<xsd:element name = \"Invoice\"\
  \ sql:relation = \"Invoice\"\n    sql:overflow-field = \"DataOverflowColumn\">\n\
  ```\n在目标表中添加一列，使用你在模式文件中指定的名称。再次使用上一配方的示例：\n```sql\nALTER TABLE Invoice ADD DataOverflowColumn\
  \ NVARCHAR(MAX)\n```\n当然，你可以根据需要设置溢出列的类型和长度。现在当你运行 SQLXML 导入时，任何在 XML 模式文件中未映射的数据都将被插入到每行的溢出列中。如果模式未通过使用\
  \ `sql:overflow-field` 注解指定溢出列，XML Bulk Load 将忽略 XML 文档中存在但不在映射模式中的数据。\n\n## 数据类型与身份列处理\n\
  与大多数批量加载工具一样，SQLXML 允许你保留源文件中的身份列信息。这是通过在 VBScript 文件中使用以下额外参数完成的：\n```vbscript\n\
  objBL.KeepIdentity = True\n```\n你可以使用的数据类型不仅限于（几乎）无处不在的 `int` 和 `string` 类型。XML\
  \ 模式定义允许以下类型——其对应的 SQL Server 类型在 表 3-3 中给出。\n\n表 3-3. SQLXML 批量加载数据类型\n\n| SQL\
  \ Server 数据类型 | XSD 数据类型 |\n| --- | --- |\n| `bigint` | `long` |\n| `binary` | `base64Binary`\
  \ |\n| `bit` | `boolean` |\n| `char` | `string` |\n| `datetime` | `dateTime` |\n\
  | `decimal` | `decimal` |\n| `float` | `double` |\n| `image` | `base64Binary` |\n\
  | `int` | `int` |\n| `money` | `decimal` |\n| `nchar` | `string` |\n| `ntext` |\
  \ `string` |\n| `nvarchar` | `string` |\n| `numeric` | `decimal` |\n| `real` | `float`\
  \ |\n| `smalldatetime` | `dateTime` |\n| `smallint` | `short` |\n| `smallmoney`\
  \ | `decimal` |\n| `sql_variant` | `string` |\n| `sysname` | `string` |\n| `text`\
  \ | `string` |\n| `timestamp` | `dateTime` |\n| `tinyint` | `unsignedByte` |\n|\
  \ `varbinary` | `base64Binary` |\n| `varchar` | `string` |\n| `uniqueidentifier`\
  \ | `string` |\n\n然而，SQLXML 会忽略模式文件中指定的类型（除了少数稍后提到的情况）。所以你可能会问：“那这个有什么用？”我认为有两个用途：\n\
  *   迫使开发者跟踪外部数据类型。\n*   生成尽可能接近源数据的表（使用 `SchemaGen` 选项）。\n\n因此，在编写模式文件时，你甚至可以指定要使用的精确\
  \ SQL Server 数据类型和长度。例如：\n```xml\nxsd:element name=\"Name\" type=\"xsd:string\"\
  \ sql:field=\"FieldName\" sql:datatype=\"NVARCHAR(15)\"/>\n```\n但是，此参数在导入操作期间会被忽略，仅用于创建表。\n\
  \n## 特殊数据类型处理\n如果类型是 `dateTime` 或 `time`，你必须指定 `sql:datatype`，因为 SQLXML Bulk Load\
  \ 在将数据发送到 SQL Server 之前会进行转换。或者，映射到 `VARCHAR` 字段，并在导入后使用 `CAST` 或 `CONVERT` 转换为日期/时间类型（这也能确保遵循\
  \ SQL Server 的日期范围）。\n\n请记住，当你批量加载到 SQL Server 的 `uniqueidentifier` 类型列，并且 XSD 值是一个包含大括号（`{`\
  \ 和 `}`）的 GUID 时，必须指定 `sql:datatype=\"uniqueidentifier\"`，以便 SQLXML Bulk Loader\
  \ 在值插入目标列之前移除大括号。如果未指定数据类型，则值将带着大括号发送，加载将失败。你可以使用以下语法设置默认值：\n```xml\n<xsd:element\
  \ name=\"Comments\" default=\"N/A\" />\n```\n如果映射模式为属性指定了默认值，而 XML 源数据不包含该属性，XML\
  \ Bulk Load 将使用该默认值。\n\n你可以通过添加 `sql:mapped=\"false\"` 到元素描述来跳过一个元素（除了简单地从模式文件中省略该元素）。这对于临时“注释掉”一个元素很有用。\n\
  \n## 从 T-SQL 调用\n到目前为止，你一直通过执行 VBScript 文件来运行 SQLXML Bulk Load。你也可以从 T-SQL 执行此操作，作为更广泛自动化过程的一部分。要加载配方\
  \ 3-9 中使用的初始 XML 文件，T-SQL 代码如下（`C:\\SQL2012DIRecipes\\CH03\\LoadXMLFromTSQLWithvbs.Sql`）：\n\
  ```sql\nDECLARE @handle INT;\nDECLARE @VBSobject INT;\nEXECUTE @handle = sp_OACreate\
  \ 'SQLXMLBulkLoad.SQLXMLBulkLoad.4.0', @VBSobject OUT;\nEXECUTE @handle = sp_OASetProperty\
  \ @VBSobject, 'ConnectionString',\n    'provider=SQLOLEDB;data source= ADAM02;database=CarSales_Staging;Uid=\
  \ Adam;Pwd = Me4B0ss;';\nEXECUTE @handle = sp_OASetProperty @VBSobject, 'ErrorLogFile',\n\
  \    'C:\\SQL2012DIRecipes\\CH03\\SQLXMLBulkLoadImporterror.log';\nEXECUTE @handle\
  \ = sp_OAMethod @VBSobject, 'Execute', NULL,\n    'C:\\SQL2012DIRecipes\\CH03\\\
  SQLXMLBulkLoadImport_Simple.xsd',\n    'C:\\SQL2012DIRecipes\\CH03\\Clients_Simple.xml';\n\
  EXECUTE @handle = sp_OADestroy @VBSobject;\n```\n这需要启用 `OA_Automation`，可以通过使用 Facets/外围应用配置工具（或在\
  \ SQL Server 2005 中仅为外围应用配置），或通过运行以下命令来实现：\n```sql\nEXECUTE master.dbo.sp_configure\
  \ 'Ole Automation Procedures', 1;\nGO\nreconfigure;\nGO\n```\n当然，在调用 SQLXML Bulk\
  \ Load 时，你可以使用 T-SQL 变量代替硬编码的文件、路径、服务器、数据库和连接字符串元素。\n\n## 集成到 ETL 流程\n### 3-12.\
  \ 作为常规 ETL 过程的一部分运行 SQLXML Bulk Loader\n**问题**\n你希望作为常规 ETL 过程的一部分调用 SQLXML Bulk\
  \ Loader。\n\n**解决方案**\n从 SSIS 调用 `.vbs` 文件来调用 SQLXML Bulk Loader。\n\n1.  创建一个 `.vbs`\
  \ 文件，修改为接受输入参数（并命名为 **C:\\SQL2012DIRecipes\\CH03\\SQLXMLBulkloadSSIS.vbs**），如下所示：\n\
  \    ```vbscript\n    Set InputVars = Wscript.Arguments\n    XMLSource = InputVars.Item(0)\n\
  \    Set objBL = CreateObject(\"SQLXMLBulkLoad.SQLXMLBulkload.4.0\")\n    objBL.ConnectionString\
  \ = \"provider = SQLOLEDB;data source = ADAM02;database= CarSales_Staging;Uid=Adam;Pwd=\
  \ Me4B0ss\"\n    objBL.ErrorLogFile=\"C:\\SQL2012DIRecipes\\CH03\\SQLXMLBulkLoadImporterror.log\"\
  \n    objBL.Execute \"C:\\SQL2012DIRecipes\\CH03\\SQLXMLBulkLoadImportElementAndAttribute.xsd\"\
  ,\n    XMLSource\n    Set objBL = Nothing\n    ```\n2.  创建一个新的 SSIS 包并添加以下变量：\n\
  \    ![image](img/untable3-1.jpg)\n3.  添加一个“执行进程”任务。双击进行编辑。\n4.  在左侧点击“进程”。\n5.\
  \  将“可执行文件”设置为 `C:\\Windows\\System32\\WScript.exe`。\n6.  将“参数”设置为 `C:\\SQL2012DIRecipes\\\
  CH03\\SQLXMLBulkloadSSIS.vbs`。\n7.  将“窗口样式”设置为“隐藏”。\n8.  在左侧点击“表达式”。浏览“属性表达式编辑器”。选择“参数”。浏览到“表达式生成器”。\n\
  9.  展开“变量”并将 `[User::SourceFile]` 变量拖到“表达式”字段中。“表达式生成器”应如 图 3-10 所示。\n    ![9781430247913_Fig03-10.jpg](img/9781430247913_Fig03-10.jpg)\n\
  \    图 3-10. 使用表达式与 SQLXML Bulk Loader 和 SSIS\n10. 点击“确定”确认表达式选择，共两次。\n11. 点击“确定”确认你的修改。\n\
  12. 运行该包将调用 SQLXML Bulk Load 并导入 XML 文件。\n\n**工作原理**\n到目前为止，我们一直将 SQLXML Bulk Loader\
  \ 与 SSIS 分开讨论，仿佛两者注定要分开存在。幸运的是，情况并非如此，两者可以作为 ETL 过程的一部分协同工作。为求简单，我倾向于使用“执行进程”任务来运行\
  \ SQLXML Bulk Loader。\n\n\n\n这看似过于简单，但稍作调整，就能使其运行得极为顺畅。实际上，这个方法的作用是将要导入的文件名作为参数\
  \ `XMLSource` 传递给 `.vbs` (VBscript) 文件——这使你能够将此方法作为使用 `Foreach` 容器进行多文件加载的一部分。\n\
  在 `.vbs` 脚本顶部添加新的一行，可以让你将变量传递到脚本中。变量数量可以根据需要设定，但你必须在脚本中捕获所有这些变量——并按正确顺序传递。这意味着你可以传入多个参数（例如一个架构文件）。只需在\
  \ `.vbs` 文件的顶部再添加一行，如下所示：\n```\nSchemaFile = InputVars.Item(1)\n```\n然后，在 “Execute”\
  \ 命令中使用这个变量，以替代硬编码的 XSD 文件和路径。\n如果你不想使用变量，也可以将文件名放在参数字段中。这将被传递给 `.vbs` VBscript\
  \ 文件。如果这样做，那么创建变量（以及在表达式中使用它）就是多余的。\n\n#### 提示、技巧与陷阱\n*   如果你将此任务放在 `Foreach` Loop\
  \ 容器中（集合设置为 `Foreach File Enumerator`，变量映射设置为输出到 `User::SourceFile` SSIS 变量），你就可以从目录中加载多个文件。\n\
  *   如果你浏览选择 `.vbs` 文件，记得将文件类型设置为 `All Files`。\n\n## 3-13. 在脚本化解决方案中根据架构文件验证 XML\
  \ 文档\n### 问题\n你需要根据 XSD 文件验证一个 XML 数据文件。\n### 解决方案\n创建一个 `.vbs` 文件并使用微软的 `MSXML2`\
  \ XML 解析器。具体操作如下：\n1.  创建一个名为 `C:\\SQL2012DIRecipes\\CH03\\Validate.vbs` 的 `.vbs`\
  \ 文件，内容如下：\n    ```\n    Dim SchemaCache\n    Set SchemaCache = CreateObject(\"\
  MSXML2.XMLSchemaCache.6.0\")\n    SchemaCache.Add \"\", \"C:\\SQL2012DIRecipes\\\
  CH03\\FlattenedOutput.Xsd\"\n\n    Dim XMLDoc\n    Set XMLDoc = CreateObject(\"\
  MSXML2.DOMDocument.6.0\")\n\n    Set XMLDoc.schemas = SchemaCache\n\n    XMLDoc.async\
  \ = False\n    XMLDoc.Load \"C:\\SQL2012DIRecipes\\CH03\\FlattenedOutput.xml\"\n\
  \n    If XMLDoc.parseError.errorCode <> 0 Then\n    wscript.quit 1\n    end if\n\
  \    ```\n2.  在 Windows 资源管理器中双击该文件以运行。\n### 工作原理\n如果你面对的是一个真正庞大的 XML 源文件，没有什么比处理数分钟后加载失败更糟糕的了。因此，首先验证\
  \ XML 数据源文件是否构造正确，以便预先警告潜在的错误，这样会快得多。对于大文件来说，这不是一个即时完成的过程——但它比加载失败后才发现错误要快得多。验证\
  \ XML 文档是否符合架构文件的一种方法是使用 VBScript。然后可以从命令窗口、T-SQL 或 SSIS 运行此脚本。本方法展示了如何创建一个通用的验证例程。它只是简单地确定一个文件是否可以通过验证——并不试图记录错误。\n\
  首先，架构文件被添加到架构缓存中。然后将其设置为 XML 文档的架构，最后加载文档。如果没有错误，脚本返回 0；如果有错误，则返回 1。\n你可以像运行 `SQLXML\
  \ Bulk Load` 任务一样，从 SSIS 中的 `Execute Process` 任务运行此脚本。只需记得检查 `SuccessValue` 字段是否设置为\
  \ 0。实际上，你可以按照前面描述的方式，将 XML 和 XSD 文件作为参数传入。事实上，由于该任务会像其他 SSIS 任务一样成功或失败，然后你可以根据结果分支处理流程，类似于方法\
  \ 3-14 中描述的方式。根据你的包构造方式，你可能需要调整 `FailParentOnFailure` 和 `FailPackageOnFailure` 属性。\n\
  \n#### 提示、技巧与陷阱\n*   如果你从命令窗口或通过双击运行脚本文件，你可能想在 `wscript.quit 1` 行之前添加 `MsgBox(\"\
  Errors encountered\")` 或类似代码。当然，如果脚本是作为自动化流程的一部分运行，则不应使用消息框。\n*   如果你希望验证成功后运行批量加载过程，可以在\
  \ `XMLDoc.parseError.errorCode` 后添加一个 `Else`，然后添加本章前面使用的调用 `SQLXMLBulkLoad` 并加载数据的代码。\n\
  \n## 3-14. 在 SSIS 中根据架构文件验证 XML 文档\n### 问题\n你希望作为 SSIS 流程的一部分，根据 XSD 架构验证源 XML 文件。\n\
  ### 解决方案\n使用 SSIS 脚本任务，通过 .NET 的 `XML.Schema` 类执行 XML 验证。\n1.  创建一个新的 SSIS 包并添加以下变量：\n\
  \    ![image](img/untable3-2.jpg)\n2.  添加一个 `Script` 任务。双击进行编辑。将 `Script Language`\
  \ 设置为 `Microsoft Visual Basic 2010`。将变量 `LogFile`、`XMLFile` 和 `XSDFile` 设置为只读变量。将\
  \ `IsValidateFailure` 设置为读写变量。\n3.  点击 `Edit Script`。\n4.  将以下指令添加到 `Import` 区域：\n\
  \    ```\n    Imports System.IO\n    Imports System.Xml\n    Imports System.Xml.Schema\n\
  \    Imports System.Xml.XPath\n    ```\n5.  用以下代码替换 `Main` 方法 (`C:\\SQL2012DIRecipes\\\
  CH03\\ValidateXML.vbs`)：\n    ```\n        Dim SW As StringWriter = New StringWriter\n\
  \        Dim IsValidateFailure As Boolean = False\n\n        Public Sub Main()\n\
  \n            Dim XSDFile As String = Dts.Variables(\"XSDFile\").Value.ToString\n\
  \            Dim XMLFile As String = Dts.Variables(\"XMLFile\").Value.ToString\n\
  \            Dim LogFile As String = Dts.Variables(\"LogFile\").Value.ToString\n\
  \            Dim XMLDoc As New XmlDocument\n\n            XMLDoc.Load(XMLFile)\n\
  \            XMLDoc.Schemas.Add(\"\", XSDFile)\n            Dim EvtHdl As ValidationEventHandler\
  \ = _\n                New ValidationEventHandler(AddressOf ValidationEventHandler)\n\
  \            XMLDoc.Validate(EvtHdl)\n            If IsValidateFailure Then\n  \
  \              If File.Exists(LogFile) Then\n                    File.Delete(LogFile)\n\
  \                End If\n                Dim FlOut As New System.IO.StreamWriter(LogFile)\n\
  \                FlOut.Write(SW.ToString)\n            End If\n            Dts.Variables(\"\
  IsValidateFailure\").Value = IsValidateFailure\n            Dts.TaskResult =  ScriptResults.Success\n\
  \        End Sub\n\n        Private Sub ValidationEventHandler(ByVal sender As Object,\
  \ _\n                                           ByVal e As ValidationEventArgs)\n\
  \            SW.WriteLine(e.Message.ToString)\n            IsValidateFailure = True\n\
  \        End Sub\n    ```\n6.  关闭脚本窗口，并点击 `OK` 确认你的更改。\n7.  向数据流面板添加一个 `Data Flow`\
  \ 任务（如果你正在使用 SSIS 加载 XML 文件）或一个 `Execute Process` 任务（如果你正在使用 `SQLXML Bulk Load`\
  \ 加载 XML 文件），并将脚本任务连接到它。\n8.  双击约束（连接线）并将其设置为：\n    ```\n    Evaluation Operation:\
  \     Expression And Constraint\n    Value:                    Success\n    Expression:\
  \               @IsValidateFailure == False\n    ```\n9.  按照本章前面方法 3-4 的描述配置 XML\
  \ 加载。\n10. 向数据流面板添加一个 `Send Mail` 任务，并将脚本任务连接到它。\n11. 双击约束（连接线）并将其设置为：\n    ```\n\
  \    Evaluation Operation:     Expression And Constraint\n    Expression:      \
  \                  @IsValidateFailure == True\n    ```\n12. 配置 `Send Mail` 任务，以便在\
  \ XML 无法通过验证时提醒你。该包应类似于 图 3-11。\n\n\n"
- '# 第四章


  图 3-11. SSIS 中的 XML 验证


  ## 工作原理


  这个相当简单的 SSIS 脚本任务根据模式文件验证 XML 文档，并且（在本例中）根据验证结果引导过程流。也就是说，如果验证成功，数据将加载；如果验证失败，流程将停止（并发送电子邮件）。此外，如果验证失败，将创建一个记录所有遇到错误的日志文件。其工作方式如下：


  -   首先，设置对 XML 和 `System.IO` 库的引用。

  -   然后，将要处理的文件（XML 和 XSD）分配给脚本任务中的变量。

  -   读取源文件并进行验证。任何错误都由 `ValidationEventHandler` 检测到，每个错误都写入一个 `StringWriter`。错误标志被设置。

  -   最后，错误标志被返回给 SSIS，错误列表被写入一个文件（如果该文件已存在，则先删除）。


  #### 提示、技巧与陷阱


  -   显然，如果 XML 文件和模式文件严重不同步，那么日志文件不仅会非常大，而且会极其重复。

  -   当然，你不需要使用发送邮件任务——实际上，你可以什么都不做来表示验证 XML 源数据失败。


  #### 总结


  正如本章试图展示的，有多种方法可用于获取 XML 源文件并将其加载到 SQL Server 中。在某些情况下，选择将取决于你的目标——如果你想“原样”加载文件而不将数据分解为其组成部分，那么显然
  `OPENROWSET (BULK)` 可能是最佳解决方案。然而，如果源文件被用作数据传输的媒介，那么你有更广泛的选择。如果你的 ETL 流程基于 T-SQL，你可能会发现使用
  SQL Server 的 XQuery 支持是可行之道。另一方面，如果你更“以 SSIS 为中心”，那么在许多情况下，SSIS XML 任务可以是一个优秀的解决方案。对于非常大的源文件——或者速度至关重要的情况——那么
  SQLXML 批量加载器可能是唯一可行的选择。


  然而，所有这些技术都有其缺点和优点。因此，表 3-4 对这各种方法及其优缺点进行了简明概述。


  **表 3-4. 本章所用方法的优缺点**


  | 技术 | 优点 | 缺点 |

  | --- | --- | --- |

  | 将 XML 文件直接存储到 SQL Server 表中 | 快速且简单。 | 仅为 LOB 存储——未分解。 |

  | XML 可以在 SQL Server 中使用 XQuery 查询。 | | |

  | OPENXML | 使用快速且易于设置。 | 内存消耗大。 |

  | | 处理复杂的 XML 分解。 | 2GB 文件大小限制。 |

  | SQL Server XQuery | 高效，甚至可以处理最复杂的 XML。 | 更多是 XQuery 而非 T-SQL。 |

  | | 使用 `OPENROWSET (BULK)` 时没有内存限制。 | |

  | SSIS XML 任务 | 对于不太复杂的文件容易实现。 | 可能会变得复杂。 |

  | | 需要规范化。 | |

  | SQLXML 批量加载 | 极快。 | 复杂的 XSD 定义。 |

  | | 多并行表加载。 | |

  | | 内置 XML 验证。 | |


