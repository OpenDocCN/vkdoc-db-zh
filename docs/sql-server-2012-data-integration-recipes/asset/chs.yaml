  \ [Measures].[CostPrice]}` |\n    |  | `ON COLUMNS,` |\n    |  | `NONEMPTY(EXCEPT([Dim\
  \ Clients].[Client Name].MEMBERS, [Dim Clients].[Client Name].[All]))` |\n    |\
