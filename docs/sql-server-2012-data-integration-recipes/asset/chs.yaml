  \ + ')' + CASE WHEN IndexFields_Included IS NOT NULL THEN ' INCLUDE ' + ' (' + IndexFields_Included\
  \ + ')' ELSE '' END + CASE WHEN has_filter = 1 THEN ' WHERE ' + filter_definition\
  \ ELSE '' END + ' WITH (' + CASE WHEN is_padded = 1 THEN ' PAD_INDEX  = OFF, ' ELSE\
  \ ' PAD_INDEX  = ON, ' END + CASE WHEN IsNoRecompute = 1 THEN ' STATISTICS_NORECOMPUTE\
