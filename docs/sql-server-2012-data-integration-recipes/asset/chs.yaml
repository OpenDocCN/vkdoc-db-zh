  \ `OnPreExecute`、`OnPostExecute` 和 `OnError` 任务定义三个执行 SQL 日志记录任务——也就是说，在单击“事件处理程序”选项卡之前，单击“控制流”窗格内的任意位置。这意味着此处设置的任何事件处理程序都将为包中的\
