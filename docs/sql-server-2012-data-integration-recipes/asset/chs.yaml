  18. 确保已勾选**表锁定**。\n19. 点击“确定”完成配置。\n20. 返回到数据流窗格。\n21. 添加一个名为`CreateIndexes`的执行\
  \ SQL 任务。将其配置为使用`CarSales_Staging_OLEDB`连接管理器。将其连接到先前创建的数据流任务。将 SQL 源类型设置为**直接输入**，并将**SQL\
  \ 语句**设置为配方 14-5 中给出的代码。\n22. 添加一个名为`CreateXMLIndexes`的执行 SQL 任务。将其配置为使用`CarSales_Staging_OLEDB`连接管理器。将其连接到先前创建的任务（**CreateIndexes**）。将\
  \ SQL 源类型设置为**直接输入**，并将**SQL 语句**设置为配方 14-6 步骤 5 中给出的代码。\n23. 添加一个名为`CreateCheckConstraints`的执行\
  \ SQL 任务。将其配置为使用`CarSales_Staging_OLEDB`连接管理器。将其连接到先前创建的任务（**CreateXMLIndexes**）。将\
  \ SQL 源类型设置为**直接输入**，并将**SQL 语句**设置为配方 14-8 步骤 5 中给出的代码。\n24. 添加一个名为`CreateForeignKeys`的执行\
  \ SQL 任务。将其配置为使用`CarSales_Staging_OLEDB`连接管理器。将其连接到先前创建的任务（**CreateCheckConstraints**）。将\
  \ SQL 源类型设置为**直接输入**，并将**SQL 语句**设置为配方 14-9 步骤 5 中给出的代码。\n25. 添加一个名为`Set BulkLogged\
  \ Recovery`的执行 SQL 任务。将其配置为使用`CarSales_Staging_OLEDB`连接管理器。将其连接到先前创建的任务（**CreateForeignKeys**）。将\
  \ SQL 源类型设置为**直接输入**，并将**SQL 语句**设置为以下代码：\n    ```sql\n    ALTER DATABASE CarSales\n\
  \    SET RECOVERY FULL;\n    ```\n\n现在您可以运行加载过程了。完成后，您应*立即*备份数据库。\n\n## 工作原理\n\n\
  在本配方中，我们的目标是两个有些相互依赖的目标：批量加载和最小化日志记录。尝试实现这些目标的原因很简单：\n\n*   在数据加载过程中使用`SQL Server\
  \ BulkLoad API`将按批次写入数据，而不是逐行写入。这不可避免地会显著缩短过程持续时间，因为使用批量加载 API 总是比“正常”的逐行写入表更快。它总是需要表锁定。\n\
  *   *最小化日志记录的操作*通常比完整日志记录的操作更快，因为其开销更低。这是因为最小化日志记录的操作只跟踪区分配和元数据更改。这意味着更低的内存需求、更少的磁盘\
  \ I/O 以及降低的处理器负载。最小化日志记录的操作还减少了一个潜在的风险领域，即日志空间。即使您的日志优化得非常完美，一次大型数据加载也可能填满日志——或磁盘——从而停止加载过程。如果在加载过程中必须调整日志大小，这将导致加载速度显著减慢，因为需要添加更多日志空间。\n\
  \n然而，许多批量加载操作要求数据库处于`SIMPLE`或`BULK_LOGGED`恢复模式才能使用批量加载 API。一个操作可以是批量加载操作而不进行最小化日志记录，但如果加载速度是主要目标，确保两者结合始终是首选结果。\n\
  \n然而，要达到数据加载的极致速度这一理想状态，并非仅仅是设置恢复模式并确保设置了`TABLOCK`提示那么简单。还需要考虑另外两个基本方面：复制和索引。\n\n\
  第一个方面很简单：如果表上启用了复制，那么根据定义，最小化日志记录是不可能的，因为复制过程会使用事务日志。\n\n索引要复杂得多，因为结果可能取决于索引类型（聚集或非聚集）以及表是否为空。让我们更详细地看看这些可能性。\n\
  \n*   *堆表（无索引）*：这是最简单的情况，数据页被最小化日志记录。\n*   *堆表（带非聚集索引）*：数据页被最小化日志记录。然而，当表为空时，索引页被最小化日志记录；但如果表中有数据，则索引页被完整日志记录。此规则有一个例外——加载到空表中的第一个批次。对于这第一个批次，数据和索引都被最小化日志记录。对于第二个及后续批次，只有数据被最小化日志记录——索引页被完整日志记录。\n\
  *   *聚集索引*：如果表为空，数据和索引页被最小化日志记录。如果表包含数据，则数据和索引页都被完整日志记录。\n\n您会注意到，在本配方中，我在加载期间切换到了**大容量日志恢复模式**。加载完成后我还备份了数据库。这是一个公认简单化的情况，即目标数据库显然是暂存区，并且在加载过程中没有事务运行。我知道这在许多其他情况下可能并非如此，这可能导致这种方法不可行。\n\
  \n> **注意** 高效的批量加载可能比看起来更复杂，因为核心要求可以有许多种组合方式。所有这些都在 Microsoft 白皮书*数据加载性能指南* (`http://msdn.microsoft.com/en-us/library/dd425070(v=sql.100).aspx`)\
  \ 中得到了详尽的描述。这份白皮书可能是为 SQL Server 2008 编写的，但其见解同样适用于 SQL Server 2012。然而，要领会使用 SQL\
  \ Server 进行高性能数据加载的所有细微差别和相互作用，可能需要数月的经验积累。\n\n本配方未涉及（但在第 13 章的许多配方中已详尽涵盖）的一个批量插入方面是数据的并行加载。根据我的经验，并行加载总是比单次加载更快。然而，这意味着要能够执行并行加载，这暗示着：\n\
  \n*   *目标表未被索引*——如此处所示，所有三种批量导入命令都支持并行数据导入：`BCP`、`BULK INSERT`和`INSERT... SELECT\
  \ * FROM OPENROWSET(BULK...)`。这是因为当表上存在索引时，仅通过应用`TABLOCK`提示无法执行并行加载操作。因此，在批量导入操作之前，必须删除索引。\n\
  \n\n"
- "# 批量插入与索引优化注意事项\n\n*   ***必须指定 `TABLOCK` 提示***。这是因为如果未指定 `TABLOCK`，并发线程会相互阻塞。\n\
  *   ***并行化最适合用于非重叠的数据源***——即那些任何“关键”字段在每个源文件中都完全分离的文件。\n    如果你正在使用 `BULK INSERT`、BCP\
  \ 或 `INSERT ... SELECT * FROM OPENROWSET(BULK...)`，并且表为空且具有聚集索引（同时数据文件中的数据按照聚集索引键列的相同方式排序），你还必须执行以下操作：\n\
  \    *   在聚集索引已就位的情况下批量导入数据。\n    *   指定 `ORDER` 提示以及 `TABLOCK` 提示。\n    如果目标表为空，这应该比先删除聚集索引、加载数据，然后再重新生成聚集索引更快，因为不需要排序步骤。\n\
  \n#### 提示、技巧与陷阱\n\n*   创建索引可能相当耗时，并且（特别是创建聚集索引时）可能消耗大量系统资源。因此显而易见的方法是尝试并行运行索引操作。这在\
  \ SSIS 中可以通过使用包含一系列执行 SQL 任务的序列容器轻松处理，每个任务处理一个或多个索引操作。我唯一的建议是不要过度这样做，当然也不要设置太多并行任务，因为磁盘子系统很可能在你获得任何更短的处理时间之前就达到饱和。我的建议是尝试一两个并行任务，一次扩展一个，然后计时结果。实际上，在并行重建或重组索引时，我也建议在单个进程中处理单个表的所有索引，不要使用多个线程重新处理同一个表的索引。\n\
  *   如果你删除了二级索引，可以尝试通过从不同的客户端运行每个二级索引的创建来并行重新创建它们。然而，这可能很棘手。\n*   如果你导入的 ***少量***\
  \ 新数据相对于现有数据量而言，删除并重建索引可能适得其反。重建索引所需的时间可能比在批量操作期间节省的时间更长。\n*   你可以通过使用以下命令来避免锁升级：\n\
  \    ```sql\n    ALTER TABLE CarSales SET (LOCK_ESCALATION = DISABLE)\n    ```\n\
  *   如果启用了跟踪标志 610，对具有索引的表进行插入通常是日志最小化操作。具有聚集索引的表支持多个批量加载流并发插入数据，前提是这些流包含非重叠数据。如果检测到数据重叠，数据流将会阻塞——但不会死锁。\n\
  *   对于具有索引的表，不应使用 `BATCHSIZE = 0`——请设置一个批大小，因为批量导入操作使用大批次大小往往表现更好。唯一的注意事项是，如果目标上有多个索引，由于排序要求，这可能会增加内存压力。此外，在并行加载中（未使用\
  \ `TABLOCK` 提示），大的批大小可能导致阻塞。\n\n#### 总结\n\n我希望本章让你深入了解了用于减少 ETL 过程加载数据时间的众多技术。对效率的探索集中在高效使用\
  \ SQL Server 批量插入 API 上，进而学习以最佳方式管理目标表索引和约束，以确保应用了日志最小化。\n\n然而，优化技术如同需要克服的不同挑战和需要解决的问题一样多。我只能建议你在面临严格的\
  \ SLA 时退后一步，全面评估问题。始终 **aim for** 批量加载，尝试确保日志最小化到位，并使用你能找到的最高效的驱动程序/提供程序。将源数据缩小到\
  \ **essential**，并避免任何多余的列。\n\n如果你确定不会截断源数据，甚至可以缩小数据类型。通常，在源数据库中排序数据，并要求源文件预先排序（然后向\
  \ SSIS、BCP 或 BULK INSERT 指明这一点）更有效。\n\n最重要的是，不要 **anything as a given**——测试，再测试，反复测试。\n\
  \n## ETL 索引策略\n\n在定制 ETL 过程时，值得仔细思考你的索引策略。本章展示了以下方法：\n\n*   禁用除聚集索引外的所有索引。然后在目标表和/或暂存表上重建所有索引。\n\
  *   删除所有索引（聚集、非聚集和任何其他索引）。然后，加载数据，最后重新创建所有索引——以正确的顺序进行，避免浪费时间和服务器资源。\n\n其他潜在策略包括：\n\
  \n*   禁用除聚集索引外的所有索引。然后删除任何聚集索引并加载数据。最后，创建任何聚集索引并重建其他索引。\n*   禁用除聚集索引外的所有索引。然后删除任何聚集索引并加载数据。接着，创建任何聚集索引。可能在更晚的时候，重建对\
  \ ETL 包优化运行至关重要的任何其他索引，留下用户索引以离线方式重建。\n\n"
- '# 第 15 章：日志记录与审核


  设计、开发和实施复杂的数据集成系统始终是对你的知识和创造力的考验。然而，当系统似乎准备投入生产时，挑战并不会停止。由于没有 ETL 系统可以做到完美，任何工业级的
  **process** 都需要能够优雅地处理错误。不仅如此，它还必须能够告诉你发生了错误，并且能够决定是否可以继续进行数据加载。它还必须能够在进程运行时跟踪其进度，并主动返回你需要的所有信息和指标，以便在进程运行期间和（更可能）运行后监控进程。这意味着收集以下数据：


  *   运行了什么，以及何时运行的。

  *   什么成功了，以及何时成功的。

  *   什么失败了，包括何时以及为何失败，大多数时候这包括错误源、错误消息、错误代码和错误的严重性。


  同样重要的是在进程的每个重要阶段保存指标（计数器）——用于错误行和成功处理的行。


  除此之外，你还需要另一个基本指标——进程所有重要部分的耗时。想要这些数据有三个主要原因：


  *   如果进程失败，尽快发现并纠正错误。

  *   在进程运行后，获得一个易于访问的高层次概览，并关注任何潜在的警告信号。

  *   构建进程期间收集的 **essential** 指标随时间变化的比较。这些比较将让你能够看到——在积累的数据的冷酷清晰光线下——进程的哪些部分花费了更多时间或资源。因此，你可以主动解决任何潜在问题。


  然而，在许多情况下，仅仅将进程从头到尾运行是不够的。然后你需要验证结果，并对于最终的数据集，生成以下（以及其他）计数器：


  *   新记录

  *   已更新记录

  *   关键最终数据集中的 `NULLS`

  *   核心数据的计数器


  以及以下任何或所有内容：


  *   在暂存表中添加、删除或更新的记录数计数器，以便与过程计数器进行交叉引用，并确保没有遗漏或多余的内容。

  *   元素比较（如果你从外部供应商获取数据，他们可能会发送有关发送的数据量和类型的信息，你应该将其与实际收到的数据进行比较）。

  *   关键数据项的单元测试（暂用此术语），以验证可接受的数据计数水平以及 **essential** 领域计数器和百分比。



  '
- '# 讨论日志记录的位置与方法


  这些指标以及错误检测指标可用于控制流程并增强数据集成与决策步骤的结合。但在深入技术方案之前，我建议稍微退后一步，从更高的视角审视日志记录过程。到目前为止，本章已经定义了我们记录数据的“原因”。现在，我想从全局上看看“在哪里”以及“如何”记录。


  假设你已经确信记录日志是个好主意，那么下一个问题是——我该在哪里记录所有这些信息？主要有三种可能性（尽管你可能知道或偏好其他方式）：


  *   将信息记录到 `SQL Server` 表中。

  *   将信息记录到文件（文本或 `XML`）中。

  *   将信息记录到系统日志中。


  每种方式都有其优缺点，详见 表 15-1、15-2 和 15-3。


  ## 表 15-1. 记录到 SQL Server 表


  | 优点 | 缺点 |

  | --- | --- |

  | 易于添加到存储过程和 `SSIS` 包中。 | 对数据类型不匹配和长度溢出毫不宽容。 |

  | 易于查询，可用于比较和建立基线。 | 可能与数据库资源竞争。 |


  ## 表 15-2. 记录到文件


  | 优点 | 缺点 |

  | --- | --- |

  | 易于添加到 `SSIS`。 | 可能与服务器资源竞争。 |

  | 相对容易添加到 `T-SQL`。 | 更难阅读、查询和划分子集。 |

  | 在处理过程中处理繁重的日志记录，而不会给数据库增加额外负担。 | 可能过度增长且难以有选择地修剪。 |


  ## 表 15-3. 记录到系统日志


  | 优点 | 缺点 |

  | --- | --- |

  | 易于添加到 `SSIS`。 | 更难从 `T-SQL` 查询。 |

  | 易于使用 `Windows` 工具查看。 | 可能给系统日志增加过多杂乱信息。 |

  | 使用 `LogParser` 非常容易查询。 |  |


  冒一点过于简化的风险，我甚至不建议将指标（记录计数）和审计数据（计数器、计时器和单元测试）存储在数据库表之外的地方。我的理由如下：


  *   存储的数据是数据表的理想选择，因为它类型明确（`INT/BIGINT, DATETIME, BOOLEAN`）。

  *   几乎没有冗长的文本数据，这与错误日志记录的情况不同。因此数据表很窄，系统开销最小。

  *   审计数据在很大程度上是 `T-SQL` 过程，因此将指标存储在数据库中使分析指标变得异常容易。

  *   这些指标的存在是为了建立基线和进行比较——因此将它们放在数据表中，可以直接在此基础上构建监控系统。


  最终，决定使用哪种类型的日志记录，甚至使用哪些日志类型的组合，将取决于你的系统需求。你还需要考虑这些日志将放置在哪里。这里的选择同样简单：


  *   将日志放在 `SQL Server` 和/或 `SSIS` 服务器上。

  *   将日志放在单独的数据库服务器或文件服务器上。


  同样，最终的决定可能不像乍看起来那么明显。表 15-4 和 15-5 概述了每种方式的利弊。


  ## 表 15-4. 将日志放在 SQL Server 上


  | 优点 | 缺点 |

  | --- | --- |

  | 无网络延迟。 | 系统资源竞争。 |

  | 本地可访问性。 | 可能“挤占”磁盘空间。 |


  ## 表 15-5. 将日志放在分布式服务器上


  | 优点 | 缺点 |

  | --- | --- |

  | 本地系统资源竞争少。 | 网络延迟。 |

  |  | 存在网络问题的风险。 |


  你可能会发现日志目标和日志系统的混合方式最适合你的项目。我只想提高你对这些可能性的认识。


  我唯一要提出的建议——也是我在本章示例中将遵循的——是在使用 `SQL Server` 表作为日志目标时，使用一个单独的 **日志记录与审计** 数据库。原因相当明显：


  *   你不会用不相关的数据弄乱暂存区或 `ODS`（操作数据存储）数据库。

  *   你可以将日志数据库的数据库文件放在单独的磁盘上以避免争用。

  *   你正在为一个可扩展的解决方案奠定基础，以防日志最终移动到单独的服务器——或者如果你的企业集中所有 `ETL` 和处理日志及计数器以便于报告。


  此外，为了使这个数据库更清晰，我将对日志和审计过程的不同方面使用 `Log` 和 `Audit` 架构。


  无论日志类型如何，你总是需要在“通过记录所有发生的事情而减慢进程”与“无法快速找到错误原因”之间找到正确的平衡。日志记录与其说是一门科学，不如说是一门艺术，每个系统都有不同的要求。计数器太多，你会只见树木不见森林；计数器太少，你看不到即将发生的事故。知道你是否正确的唯一真正方法是你的进程运行平稳，并且你可以轻松快速地跟踪错误或计数器。


  因此，鉴于没有唯一的解决方案——因为没有单一的需求——本章将展示如何在三个进程级别记录日志：


  *   使用 `T-SQL` 或内置 `SSIS` 日志记录到表和文件的简单日志记录。

  *   从 `T-SQL` 和 `SSIS` 简单记录到集中式日志数据库。

  *   从 `T-SQL` 或 `SSIS` 复杂地记录事件和计数器到集中式自定义日志数据库。


  本章将探讨所有这些技术，为你提供一些想法，如何在严酷的现实世界数据集成环境中增强你的进程，使其更加健壮和有弹性。


  本章所有示例均可在本书的配套网站上找到。安装后，可以在 `C:\SQL2012DIRecipes\CH15` 中找到它们。你还需要按照 附录 B 中的描述创建
  `CarSales_Logging` 数据库。


