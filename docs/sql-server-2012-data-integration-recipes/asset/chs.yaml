  SQL2012DIRecipes\\CH11\\OracleArchivelog.Sql`）：\n\n    ```sql\n    SHUTDOWN IMMEDIATE;\n\
  \    STARTUP MOUNT;\n    ALTER DATABASE ARCHIVELOG;\n    ALTER DATABASE OPEN;\n\
  \    ALTER DATABASE ADD SUPPLEMENTAL LOG DATA;\n    ```\n\n3.  单击 开始 ![image](img/arrow.jpg)\
