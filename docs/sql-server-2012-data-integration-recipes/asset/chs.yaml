  7.  关闭脚本编辑器并单击“确定”确认您的修改。\n8.  添加一个 Raw 文件目标。将其命名为 **Pause Output** 并将脚本任务连接到它。双击进行编辑。\n\
  9.  如下配置 Raw 文件目标：\n    *   访问模式：                     文件名\n    *   文件名：        \
  \                  `C:\\SQL2012DIRecipes\\CH10\\Invoice.Raw`\n    *   写入选项：    \
  \                  始终创建\n10. 确保选择了所有列，然后单击“确定”确认您的修改。\n11. 返回“控制流”选项卡，添加第二个数据流任务。将其命名为\
  \ **Final Load** 并将第一个数据流任务连接到它。双击连接器并在“优先级约束编辑器”中进行设置如下。对话框应如图 10-22 所示。\n    *\
  \   评估操作：            表达式和约束\n    *   值：                        成功\n    *   表达式：\
