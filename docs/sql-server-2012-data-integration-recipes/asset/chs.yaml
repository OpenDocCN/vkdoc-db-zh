  \                          ClientType,ClientSize\n                          FROM\
  \    Carsales.dbo.Client SRC\n                          INNER JOIN  CHANGETABLE(\n\
  \                                         CHANGES Carsales.dbo.Client, ' +\n   \
  \                                      CAST(@LAST_SYNC_VERSION\n               \
  \                          AS VARCHAR(20)) + ') AS CT\n                        \
  \          ON SRC.ID = CT.ID\n                          WHERE       CT.SYS_CHANGE_OPERATION\
  \ = ''''I'''''')'\n\nIF OBJECT_ID('tempdb..#ClientInserts') IS NOT NULL DROP TABLE\
  \ tempdb..#ClientInserts\nCREATE TABLE #ClientInserts (\n    ID INT NOT NULL,\n\
  \    ClientName VARCHAR(150) NULL,\n    Country VARCHAR(50) NULL,\n    Town VARCHAR(50)\
  \ NULL,\n    County VARCHAR(50) NULL,\n    Address1 VARCHAR(50) NULL,\n    Address2\
  \ VARCHAR(50) NULL,\n    ClientType VARCHAR(20) NULL,\n    ClientSize VARCHAR(10)\
  \ NULL\n)\nINSERT INTO #ClientInserts EXEC (@InsertsSQL)\n\n-- 更新操作\nDECLARE @UpdatesSQL\
  \ VARCHAR(8000) =\n                   'SELECT    ID,ClientName,Country,Town,County,Address1,Address2,ClientType,ClientSize\n\
  \                    FROM      OPENQUERY(R2, ''SELECT       SRC.ID,ClientName,Country,Town,\n\
  \                                                        County,Address1,Address2,\n\
  \                                                        ClientType,ClientSize\n\
  \                                              FROM         Carsales.dbo.Client\
  \ SRC\n                                              INNER JOIN   CHANGETABLE(CHANGES\
  \ Carsales.dbo.Client,'\n                                              + CAST(@LAST_SYNC_VERSION\
  \ AS VARCHAR(20))\n                                              + ')  AS CT\n \
  \                                                       ON SRC.ID = CT.ID\n    \
  \                WHERE   CT.SYS_CHANGE_OPERATION = ''''U'''''')' ;\n\nIF OBJECT_ID('tempdb..#ClientUpdates')\
  \ IS NOT NULL DROP TABLE tempdb..#ClientUpdates;\nCREATE TABLE #ClientUpdates (\n\
  \    ID INT NOT NULL,\n    ClientName VARCHAR(150) NULL,\n    Country VARCHAR(50)\
  \ NULL,\n    Town VARCHAR(50) NULL,\n    County VARCHAR(50) NULL,\n    Address1\
  \ VARCHAR(50) NULL,\n    Address2 VARCHAR(50) NULL,\n    ClientType VARCHAR(20)\
  \ NULL,\n    ClientSize VARCHAR(10) NULL\n) ;\n\nINSERT INTO   #ClientUpdates (ID,ClientName,Country,Town,County,Address1,Address2,ClientType,ClientSize)\n\
  EXEC (@UpdatesSQL) ;\n\n-- 执行插入/更新/删除操作\n\n-- 插入\nINSERT INTO      CarSales_Staging.dbo.Client\n\
  \                 (ID, ClientName, Country, Town, County, Address1, Address2,\n\
  \                  ClientType, ClientSize)\nSELECT           ID, ClientName, Country,Town,\
  \ County, Address1, Address2, ClientType, ClientSize\nFROM             #ClientInserts\n\
  \n-- 更新\nUPDATE            DST\nSET               DST.ClientName = UPD.ClientName\n\
  \                    ,DST.Country = UPD.Country\n                    ,DST.Town =\
  \ UPD.Town\n                    ,DST.County = UPD.County\n                    ,DST.Address1\
  \ = UPD.Address1\n                    ,DST.Address2 = UPD.Address2\n           \
  \         ,DST.ClientType = UPD.ClientType\n                    ,DST.ClientSize\
  \ = UPD.ClientSize\nFROM              CarSales_Staging.dbo.Client DST\nINNER JOIN\
  \        #ClientUpdates UPD\n                  ON DST.ID = UPD.ID\n\n-- 删除\nDELETE\
  \ FROM  DST\nFROM         CarSales_Staging.dbo.Client DST\nINNER JOIN   #ClientDeletes\
  \ DLT\n             ON DLT.ID = DST.ID\n\n-- 设置新的 LAST_SYNC_VERSION\nEXEC R2.CarSales.sys.sp_updateextendedproperty\n\
  \    @level0type = N'SCHEMA',\n    @level0name = dbo,\n    @level1type = N'TABLE',\n\
  \    @level1name = Client,\n    @name = LAST_SYNC_VERSION,\n    @value = @CURRENT_VERSION\
  \ ;\nEND\n```\n\n## 工作原理\n\n你可以使用变更跟踪在链接服务器上执行“推送”式数据同步，但能否使用“拉取”方法呢？答案是一个有保留的“可以”。说有保留并非因为存在任何固有困难，而是因为你需要对开箱即用的变更跟踪函数（正如我们在配方\
  \ 12-1 中看到的）的限制应用一系列解决方法。\n\n那么潜在的问题是什么？\n\n*   `CHANGETABLE` 函数无法通过链接（四部分命名）服务器工作。\n\
  *   `CHANGE_TRACKING_MIN_VALID_VERSION` 函数无法通过链接服务器工作。\n*   将 `CHANGETABLE` 函数包装在源服务器上的表值用户定义函数中将不起作用，因为\
  \ UDF 在链接服务器上也有问题。\n*   将 `CHANGETABLE` 函数包装在源服务器上的存储过程可能有效——但提取数据需要 MSDTC（分布式事务协调器）在源服务器上运行，因为它将创建一个隐式事务。此外，你需要为\
  \ RPC 配置链接服务器（你将针对远程服务器执行存储过程）。这两个限制对某些 DBA 来说可能是无法接受的——也是一个相当大的麻烦。因此，由于这些原因，我们将避免这种方法。\n\
  \n这就剩下 `OPENQUERY` 和动态 SQL 作为解决方案。它并不完美，但它允许我们返回所有所需的数据（最小更改版本、最大更改版本，以及所有与插入、更新和删除相关的数据），在服务器级别的配置方面没有任何麻烦。\n\
  \n## 提示、技巧和陷阱\n\n*   如果你愿意，可以使用表变量代替临时表。对于较大的数据集，临时表可能更可取，因为它们可以被索引，这在有些情况下很有用。\n\
  *   这里也可以使用 `COLUMNPROPERTY` 函数进行特定列跟踪，如配方 12-1 的“工作原理”部分所述。\n\n## 12-3. 将变更跟踪作为结构化\
  \ ETL 流程的一部分使用\n\n### 问题\n\n你想将变更跟踪作为结构化 ETL 流程的一部分使用。\n\n### 解决方案\n\n在 SSIS 包中使用变更跟踪信息，以确保源表中的数据修改被应用到目标表。由于这个包有点复杂，我建议你在开始创建之前先通读一遍，了解它的目标。话虽如此，以下步骤说明了如何操作。\n\
  \n1.  运行配方 12-1 中的步骤 1 到 4，在源服务器（R2）上启用变更跟踪，并将目标表放在本地服务器上（当然，除非你已经这样做了）。\n2.  创建一个新的\
  \ SSIS 包，并添加以下三个连接管理器：\n    *   `Source_OLEDB`: 到源数据库的 OLEDB 连接。\n    *   `Source_ADONET`:\
  \ 到源数据库的 ADO.NET 连接。\n    *   `Destination_OLEDB`: 到目标数据库的 OLEDB 连接。将 `RetainSameConnection`\
  \ 属性设置为 `False`。\n3.  添加以下包作用域变量：\n    | 变量名 | 类型 | 值 |\n    | --- | --- | --- |\n\
  \    | `CurrentVersion` | `Int64` | 0 |\n    | `DeleteTable` | `String` | TMP_Deletes\
  \ |\n    | `LastSynchVersion` | `Int64` | 0 |\n    | `MinValidVersion` | `Int64`\
  \ | 0 |\n    | `SQLDelete` | `String` | `SELECT ID FROM dbo.Client` |\n    | `SQLInsert`\
  \ | `String` | `SELECT ID, ClientName, Country, Town, County, Address1, Address2,\
  \ ClientType, ClientSize FROM dbo.Client` |\n    | `SQLUpdate` | `String` | `SELECT\
  \ ID, ClientName, Country, Town, County, Address1, Address2, ClientType, ClientSize\
  \ FROM dbo.Client` |\n    | `UpdateTable` | `String` | TMP_Updates |\n\n\n\n"
