  \n图 10-15. SSIS 中的自定义域分析\n\n5. 双击你刚刚创建的聚合任务。将其命名为 `Domain Analysis`。将你希望用于域分析的列名向下拖动两次到对话框的下半部分。在此示例中，我使用\
