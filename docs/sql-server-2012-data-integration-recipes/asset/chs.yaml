  \ 连接管理器。\n5.  添加一个脚本组件，将其设置为转换，并将平面文件源连接到它。双击进行编辑。添加 `IsSafeToProceed` 变量作为读写变量。单击“输入列”并选择要分析的列（本例中为\
  \ `InvoiceNumber`）。将 `ScriptLanguage` 设置为 `Microsoft Visual Basic 2010`，然后单击“编辑脚本”。\n\
