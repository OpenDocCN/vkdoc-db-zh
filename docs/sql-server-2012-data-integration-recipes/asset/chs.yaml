  2.  单击“选择收件人”，然后单击“使用现有列表”，接着选择“新建源”。\n3.  在数据连接向导中，选择 **Microsoft SQL Server**\
  \ 作为数据源，然后单击“下一步”。\n4.  输入服务器和连接凭据（或确认将使用集成安全性）。单击“下一步”。\n5.  选择源表，然后单击“完成”。\n\n\
  源数据现在可以在 Word 邮件合并中使用了。\n\n### 使用 PowerPivot\n从 PowerPivot 导入数据：\n\n1.  激活 PowerPivot\
