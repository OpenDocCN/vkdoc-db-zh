- '# 工作原理


  尽管这个解决方案更多是为了解决消除数据加载中任何手动干预的问题（而非纯粹的加速技术），但可能会遇到这样的情况：源目录中存在数十甚至数百个结构相同、需要加载到 SQL
  Server 表中的文件。幸运的是，SSIS 可以轻松处理这种情况，这里你可以看到具体操作方法。我意识到在关于 XML 数据源的章节中已经介绍过这个内容，但它有足够多的不同之处（并且非常常用），因此我更倾向于通过一个专门针对文本文件的方案来详细介绍。


  该过程本质上是对目录中所有或选定的文件进行循环。你需要一个字符串变量来保存每个被加载文件的名称，并在进程运行时用于替换创建 SSIS 任务时定义的实际文件。在其他所有方面，这个过程与单个文件加载几乎完全相同。此技术假定所有要加载的文件格式相同，并且将加载到同一个表中。本方案不会深入探讨使用平面文件连接管理器和数据流任务将文本文件映射到
  SQL Server 表的复杂细节。该信息在方案 2-2 中已涵盖。


  ## 提示、技巧与注意事项


  -   文件和/或扩展名过滤器的用法与你在搜索操作或传统的 DOS/命令窗口中使用的完全相同。实际上，你可以在命令窗口中测试打算使用的过滤器（还记得 `DIR
  *.CSV` 吗？）。

  -   在步骤 11 中用于保存文件名的变量始终是变量 0，因此无需更改此设置。

  -   在步骤 18 中，你可以评估表达式以测试其是否有效——但如果没有任何显示，请不要惊讶。只有在变量窗格中为 `FileName` 变量输入值后，变量的内容才会显示。

  -   加载目录中的所有文件时，仅限使用一种搜索模式（例如，`*.Csv`）。如果需要使用多种搜索模式——请继续阅读，因为这在方案 13-2 中有解释。


  '
- '# 13-2. 选择多个文本文件进行导入


  ## 问题


  你希望在一次操作中选择一组特定的、结构相同的平面文件导入到 SQL Server 中。


  ## 解决方案


  使用 `MULTIFLATFILE` 连接管理器从一个或多个不同文件夹中选择一组平面文件，并在一次操作中加载它们。以下步骤说明了如何操作。


  1.  创建一个新的 SSIS 包并添加一个数据流任务。双击以激活数据流窗格。

  2.  创建一个名为 `CarSales_OLEDB` 的 OLEDB 连接管理器，连接到 CarSales 数据库。

  3.  在连接管理器选项卡中右键单击，选择“新建连接”。从可能的连接列表中，选择 `MULTIFLATFILE` 并单击“添加”（或双击 `MULTIFLATFILE`）。将出现“多平面文件连接管理器编辑器”。正如你将看到的，它与“平面文件连接管理器编辑器”有着惊人的相似之处。

  4.  为连接管理器命名（我将其称为 `MultiFileSelection`），然后单击“浏览”。在标准的 Windows “打开”对话框中，你可以按住 Ctrl
  单击（或使用 Shift 单击和 Ctrl 单击的组合）来选择多个文件。在此示例中，你需要导航到目录 `C:\SQL2012DIRecipes\CH13\MoreMultipleFlatFiles`。

  5.  单击“打开”确认你的选择。按照方案 13-1 步骤 5 中的描述，完成平面文件定义的其他选项。

  6.  添加一个平面文件源。使用你在步骤 2 中创建的 MultiFile 平面文件连接管理器（名为 `MultiFileSelection`）作为其连接管理器。

  7.  添加一个目标任务。将源任务连接到目标。通过配置任务使用 `CarSales_OLEDB` 连接管理器连接到 `dbo.Stock` 目标表来完成包的设置。

  8.  映射源列和目标列。


  你现在可以运行该包，并将步骤 3 中选择的文件加载到目标表中。


  ## 工作原理


  导入多个文件（文本或其他类型）的方法有很多，方案 12-1 描述了使用 Foreach 循环容器的“经典”方法。Foreach 循环方法在以下情况下会失效：你想加载源目录中的部分而非所有文件，并且无法使用通配符进行过滤。然而，还有另一种既简单又高效的方法可用于文本文件，它允许你指定要加载的***确切文件***。它涉及使用
  `MULTIFLATFILE` 连接管理器，并且可以配置为加载选定的子集文件，或者基于一个或多个通配符定义加载文件的子集（前提是这些定义不包括你明确不希望加载的文件）。此技术假定所有源文件具有相同的格式。


  > **注意**   你只能从多平面文件连接管理器浏览到一个源文件夹。要扩展选择范围，你必须在“多平面文件连接管理器编辑器”对话框的“文件名”字段中手动输入——或复制粘贴——多个文件夹。每个文件或路径必须用管道符
  (`|`) 分隔。


  ## 提示、技巧与注意事项


  -   要使用通配符进行文件选择，你需要如前所述设置连接管理器，然后选中它并按 F4（或查看 -> 属性窗口）以显示连接管理器的属性。然后，你可以编辑 `ConnectionString`
  属性，在文件名中使用通配符。

  -   使用 `ConnectionString` 属性，你还可以扩展文件源信息以处理多个目录——无论是否使用通配符，方法是键入或粘贴所需的路径和文件名。只需用管道符
  (`|`) 分隔每个源路径/通配符元素。

  -   如果你创建了一个指向多个目录的复杂路径，请避免单击“浏览”按钮（或省略号 `...`），否则你将丢失该路径，因为它会被新路径替换（而不是添加到其中）。

  -   如果你用另一组文件替换现有的待加载文件组，SSIS 会要求你确认是否保留描述平面文件结构的现有元数据。假设文件格式相同，如果出现此对话框，你可以确认。


  '
- "# 13-3. 使用复杂选择标准加载多个文件\n\n## 问题\n\n你有许多包含相同格式平面文件的目录需要加载到 SQL Server 中。更复杂的是，这些文件具有不同的扩展名。你希望能够轻松修改这些参数。\n\
  \n## 解决方案\n\n使用 SSIS 和脚本数组来定义源文件夹和文件扩展名。然后遍历这些数组以指定要加载的文件。以下步骤涵盖了要遵循的过程。\n\n1. \
  \ 创建一个 SSIS 包，并将其命名为 `MultipleFilesFromVariousDirectories`。\n2.  添加以下变量：\n\n   \
  \ | 变量名 | 类型 | 值 | 注释 |\n    | --- | --- | --- | --- |\n    | FileName | String\
  \ | | 保存将要加载的文件的名称。 |\n    | FileExtension | String | | 保存将要加载的文件的扩展名。 |\n    |\
  \ FolderName | String | | 保存将要加载的文件所在的文件夹/目录。 |\n    | MultipleFileExtensions |\
  \ Object | | 将用于过滤文件的各种扩展名的数组。 |\n    | MultipleFolderNames | Object | | 将用于过滤文件的各种文件夹的数组。\
  \ |\n\n3.  在控制流窗格上添加一个脚本任务，并双击进行编辑。将其命名为“设置源文件夹和文件扩展名的数组”，并将脚本语言设置为 Microsoft Visual\
  \ Basic 2010。\n4.\n\n\n\n添加以下读/写变量：`MultipleFileExtensions`、`MultipleFolderNames`。\n\
  \n最简单的方法是点击读/写变量右侧的省略号按钮，并选择所需的变量。这将打开如下对话框（参见图 13-6）。\n\n![9781430247913_Fig13-06.jpg](img/9781430247913_Fig13-06.jpg)\n\
  \n图 13-6. 为脚本任务选择读/写变量\n\n5.  点击确定（OK）确认。\n6.  点击编辑脚本（Edit Script）按钮。\n7.  将`Main`方法替换为以下代码。此脚本的说明在本教程末尾（`C:\\\
  SQL2012DIRecipes\\CH13\\SSISComplexSelection.Vb`）：\n\n    ```\n    Public Sub Main()\n\
  \        ' 声明并填充一个包含文件夹名称的数组\n        Dim MultipleFolderNames As New System.Collections.ArrayList()\n\
  \        MultipleFolderNames.Add(\"C:\\SQL2012DIRecipes\\CH13\\MultipleFlatFiles\"\
  )\n        MultipleFolderNames.Add(\"C:\\SQL2012DIRecipes\\CH13\\MoreMultipleFlatFiles\"\
  )\n\n        ' 声明并填充一个包含文件扩展名的数组\n        Dim MultipleFileExtensions As New System.Collections.ArrayList()\n\
  \        MultipleFileExtensions.Add(\"*.Csv\")\n        MultipleFileExtensions.Add(\"\
  *.txt\")\n\n        ' 将数组传递给 SSIS 变量\n        Dts.Variables(\"MultipleFileExtensions\"\
  ).Value = CObj(MultipleFileExtensions)\n        Dts.Variables(\"MultipleFolderNames\"\
  ).Value = CObj(MultipleFolderNames)\n\n        Dts.TaskResult = ScriptResults.Success\n\
  \    End Sub\n    ```\n\n    当然，您需要输入与您的环境相对应的文件夹名称和文件筛选器及/或扩展名。\n8.  关闭 SSIS 脚本窗口，然后点击确定（OK）关闭脚本任务编辑器（Script\
  \ Task Editor）。\n9.  在控制流（Control Flow）窗格上添加一个 Foreach 循环容器，将其命名为`Loop through all\
  \ folders`，将“Set Arrays of source folders and File extensions”脚本任务连接到此容器，然后双击编辑该\
  \ Foreach 循环容器。\n10. 点击左侧窗格中的集合（Collection）。将枚举器类型选择为 Foreach From Variable Enumerator（从变量枚举）。\n\
  11. 在对话框的下半部分（枚举器配置，Enumerator Configuration），选择`MultipleFolderNames`变量。对话框应如图 13-7\
  \ 所示。\n\n    ![9781430247913_Fig13-07.jpg](img/9781430247913_Fig13-07.jpg)\n\n \
  \   图 13-7. 使用 Foreach 任务遍历对象变量\n12. 点击左侧窗格中的变量映射（Variable Mappings），然后从列表中选择`FolderName`\
  \ SSIS 变量。对话框应如图 13-8 所示。\n\n    ![9781430247913_Fig13-08.jpg](img/9781430247913_Fig13-08.jpg)\n\
  \n    图 13-8. 使用变量来保存要使用的文件夹\n13. 点击确定（OK）确认。\n14. 在控制流（Control Flow）窗格上添加另一个 Foreach\
  \ 循环容器，但这次放在您刚刚创建的 Foreach 循环容器（`Loop through all folders`）内部，将其命名为`Loop through\
  \ multiple file extensions`。双击进行编辑。\n15. 重复步骤 10-14，以定义 Foreach 循环容器如何遍历集合，但这次使用`MultipleFileExtensions`枚举器和`FileExtension`变量。\n\
  16. 在您刚刚创建的 Foreach 循环容器（`Loop through multiple file extensions`）内部添加一个 Foreach\
  \ 循环容器，将其命名为`Load Files`，并像加载单个目录中的所有文件（如教程 12-1 所述）那样进行配置。双击编辑此容器。\n17. 点击左侧窗格中的集合（Collection），然后点击表达式（Expressions）的省略号按钮。\n\
  \    选择以下属性并按如下方式设置：\n    *   目录（Directory）: `User::FolderName`\n    *   文件规范（FileSpec）:\
  \ `User::FileExtension`\n\n    属性表达式编辑器（Property Expressions Editor）应大致如图 13-9 所示。\n\
  \n    ![9781430247913_Fig13-09.jpg](img/9781430247913_Fig13-09.jpg)\n\n    图 13-9.\
  \ 用于从 SSIS 变量获取文件夹和扩展名的属性表达式编辑器\n18. 点击确定（OK）关闭对话框。Foreach 循环编辑器（Foreach Loop Editor）应如图\
  \ 13-10 所示。\n\n    ![9781430247913_Fig13-10.jpg](img/9781430247913_Fig13-10.jpg)\n\
  \n    图 13-10. 在 Foreach 任务中使用表达式\n19. 点击确定（OK）关闭对话框。\n20. 添加一个数据流任务（Data Flow task）（同样如教程\
  \ 13-1 所述），并将其配置为从平面文件源（Flat File source）（`C:\\SQL2012DIRecipes\\CH13\\MultipleFlatFiles\\\
  Stock01.Csv`）加载到`CarSales.dbo.Stock`目标表，如教程 13-1 的步骤 13 所述。SSIS 包的控制流（Control Flow）窗格应如图\
  \ 13-11 所示。\n\n    ![9781430247913_Fig13-11.jpg](img/9781430247913_Fig13-11.jpg)\n\
  \n    图 13-11. 从多个目录加载多个文件的完整包\n\n您现在可以运行该包，加载`C:\\SQL2012DIRecipes\\CH13\\MultipleFlatFiles`和`C:\\\
  SQL2012DIRecipes\\CH13\\MoreMultipleFlatFiles`目录中的所有`.Txt`和`.Csv`文件。\n\n## 工作原理\n\
  \nSSIS“开箱即用”就可以加载目录中的所有文件。十有八九，这将解决您所有的文件加载需求。对于简单的多文件选择，您还可以使用多个平面文件连接管理器（Multiple\
  \ Flat Files Connection manager），如教程 13-2 所述。然而，很可能还有其他情况，源文件位于`几个不同的目录`中（可能在不同的服务器上）；或者具有`不同的文件扩展名`（例如，文本文件，但来自不同的进程或命名人员，可能命名为`.CSV`或`.TXT`），或者需要某些特定类型的文件名而非其他，并且需要多个文件筛选器来确保仅包含您可以处理的文件。\n\
  \n幸运的是，在 SSIS 中只需稍作调整并付出最少的努力，就可以处理多个源文件。在本教程中，我建议使用数组作为硬编码项目列表（如目录名和文件扩展名）的存储库。这正是此方法有趣的地方。之后，只需将文件加载循环嵌套在另外两个循环内即可——一个用于循环遍历文件路径，另一个用于循环遍历文件筛选条件。虽然这看起来可能有些复杂，但它是扩展多文件加载技术以处理多种可能需求的简单方法。实际上，我建议将此处描述的方法作为大多数复杂文件选择过程的基础。\n\
  \n我创建并使用了多个 SSIS 变量，以允许 SSIS 遍历一组文件夹和文件扩展名。首先，您必须有两个字符串变量：一个用于保存目录（SSIS 称之为“文件夹”）名称，另一个用于保存文件扩展名。您还需要一个字符串变量来保存正在加载的实际文件的文件名。最后，您需要两个对象变量：一个用于保存目录名称列表，另一个用于包含文件扩展名列表。\n\
  \n关于脚本代码只有几点需要注意。首先，您使用的是标准的.NET 数组，并使用`.Add`来填充它们。其次，一旦创建了数组，您需要将它们传递给 SSIS 变量，以便可以在脚本任务外部使用它们。\n\
  \n\n\n虽然严格来说，并非必须将它们转换为对象，但我认为在代码中提醒自己——实际上正在发生什么——是更好的实践规范。\n![图片](img/sq.jpg)\n\
  **注意** 您希望加载的这些文件有一个根本的共同点：它们***必须***具有相同的格式。如果源文件的结构不完全相同，那么您将需要为每种源文件格式分别设置一个源组件和目标组件对。\n\
  \n#### 提示、技巧与陷阱\n\n*   不可避免地，从多个文件夹加载文件以及处理多种可能的文件扩展名，会存在多种方法。实际上，可能有多少编码员就有多少种解决方案。因此，请不断调整和测试，直到找到令您满意的解决方案。例如，纯粹主义者可能会反对在脚本组件中硬编码值。一个更灵活（但需要更多工作）的方法是使用一个制表符分隔的参考文件（数据库表或\
  \ XML 文件），其中包含文件夹和文件扩展名。然后将此参考文件或表加载到 SSIS 对象（记录集）中，这样单个 `Foreach Loop` 容器就可以遍历这些元素，同时将它们分配给文件夹和筛选变量。这种方法也消除了对嵌套循环的需求。总之，您可以选择并调整自己觉得最顺手的方法。\n\
  *   由于您已为路径和文件筛选器设置了变量，您会看到 `Load Files` 任务的一个警告。这无需担心。\n*   请记住使用 UNC（通用命名约定）路径作为服务器和目录名称，以确保可移植性。\n\
  *   有一点可能会令人困惑：对于 `Foreach Loop` 容器，您可以通过两种方式访问 SSIS 表达式——而每种方式会给出一组不同的变量。要使用文件路径和文件筛选器的变量，您需要在\
  \ `Foreach Loop Editor` 对话框的 `Collection` 窗格中使用变量——而不是通过单击对话框左侧的 `Expressions` 所进入的\
  \ `Expressions` 窗格。\n*   本配方的方法最终得到的结果与配方 12-2 中解释的 `MULTIFLATFILE` 连接管理器类似。然而，当前配方的方法具有无限的灵活性和可扩展性。\n\
  \n"
- "# 13-4. 对文件加载进行排序和筛选\n\n## 问题\n您需要选择一组特定的文件，并根据它们的属性按定义的顺序加载。\n\n## 解决方案\n使用 `ADO.NET`\
  \ 数据集和 `SSIS 脚本` 任务。\n\n在此示例中，我假定您有一个包含 CSV 格式平面文件的目录需要加载到 `SQL Server` 中，并且按从最旧文件开始的顺序加载非常重要。以下步骤解释了实现此目的的方法。\n\
  \n1.  打开 `SSIS` 并创建一个新的包。我建议将其命名为 `OrderAndFilterFileLoad`，因为这正是它要做的。\n2.  在包级别添加以下变量：\n\
  \n    | 变量名称 | 类型 | 值 | 注释 |\n    | --- | --- | --- | --- |\n    | `ADOFilteredAndSortedTable`\
  \ | Object |  | 保存已排序文件结果列表的 SSIS 对象。 |\n    | `FileName` | String |  | Foreach\
  \ 循环容器用于加载文件（按正确的排序顺序）的变量。 |\n    | `FileFilter` | String |  | 用于保存文件名以获取源文件的系统属性的变量，可用于对最终列表排序。\
  \ |\n    | `SortColumn` | String |  | 充当排序键的列。 |\n    | `FileSource` | String |\
  \  | 源目录。 |\n    | `ADOTable` | Object |  | 保存初始未排序文件列表的 SSIS 对象。 |\n\n3.  在 `Control\
  \ Flow` 选项卡上添加一个 `Script` 任务。将其命名为 `PopulateRecordset`，然后双击进行编辑。添加以下读写变量：\n\n  \
  \  | `ADOFilteredAndSortedTable` |\n    | --- |\n    | `ADOTable` |\n\n4.  单击 `Edit\
  \ Script` 按钮。\n5.  在 `SSIS Script` 窗口中，在 `Imports` 区域添加以下指令：\n    ```\n    Imports\
  \ System.IO\n    ```\n6.  用以下代码替换 `Main` 方法。\n    此脚本在配方末尾有说明 (`C:\\SQL2012DIRecipes\\\
  CH13\\OrderedFilteredFileLoad.Vb`)：\n    ```vb\n    Public Sub Main()\n        '声明所有变量\n\
  \        Dim FileSource As String = Dts.Variables(\"FileSource\").Value.ToString\n\
  \        Dim FileFilter As String = Dts.Variables(\"FileFilter\").Value.ToString\n\
  \        Dim SortColumn As String = Dts.Variables(\"SortColumn\").Value.ToString\n\
  \n        Dim MainDS As New System.Data.DataSet\n        Dim MainTable As New System.Data.DataTable\n\
  \        Dim MainRow As System.Data.DataRow\n        Dim MainCol As New System.Data.DataColumn\n\
  \n        Dim dirInfo As New System.IO.DirectoryInfo(FileSource)\n        Dim fileSystemInfo\
  \ As System.IO.FileSystemInfo\n        Dim FileCounter As Int16 = 0\n        Dim\
  \ FileName As String\n        Dim FileFullName As String\n        Dim FileSize As\
  \ Long\n        Dim FileExtension As String\n        Dim CreationTime As Date\n\
  \        Dim DirectoryName As String\n        Dim LastWriteTime As Date\n\n    \
  \    '定义表结构\n        MainDS.Tables.Add(MainTable)\n        MainTable.Columns.Add(\"\
  FileName\", System.Type.GetType(\"System.String\"))        ' 0\n        MainTable.Columns.Add(\"\
  DateAdded\", System.Type.GetType(\"System.DateTime\"))     ' 1\n        MainTable.Columns.Add(\"\
  DateLoaded\", System.Type.GetType(\"System.DateTime\"))    ' 2\n        MainTable.Columns.Add(\"\
  FileSize\", System.Type.GetType(\"System.Int32\"))         ' 3\n        MainTable.Columns.Add(\"\
  CreationTime\", System.Type.GetType(\"System.DateTime\"))  ' 4\n        MainTable.Columns.Add(\"\
  FileExtension\", System.Type.GetType(\"System.String\"))   ' 5\n        MainTable.Columns.Add(\"\
  DirectoryName\", System.Type.GetType(\"System.String\"))   ' 6\n        MainTable.Columns.Add(\"\
  LastWriteTime\", System.Type.GetType(\"System.DateTime\")) ' 7\n        '遍历目录，并向\
  \ ADO 表添加记录\n        For Each fileSystemInfo In dirInfo.GetFileSystemInfos(FileFilter)\n\
  \            FileName = fileSystemInfo.Name\n            FileFullName = fileSystemInfo.FullName\n\
  \n            Dim fileDetail As New FileInfo(FileFullName)\n\n            FileSize\
  \ = fileDetail.Length\n            CreationTime = fileDetail.CreationTime\n    \
  \        FileExtension = fileDetail.Extension\n            DirectoryName = fileDetail.DirectoryName\n\
  \            LastWriteTime = fileDetail.LastWriteTime\n\n            MainRow = MainTable.NewRow()\n\
  \n            MainRow(0) = FileName\n            MainRow(1) = Now()\n          \
  \  MainRow(2) = CDate(\"01-01-1900\")\n            MainRow(3) = FileSize\n     \
  \       MainRow(4) = CreationTime\n            MainRow(5) = FileExtension\n    \
  \        MainRow(6) = DirectoryName\n            MainRow(7) = LastWriteTime\n\n\
  \            MainTable.Rows.Add(MainRow)\n\n            FileCounter = CShort(FileCounter\
  \ + 1)\n        Next\n\n        '创建 ADOLoopTable - 用于实际的批处理循环\n        Dim SortedFilteredDS\
  \ As System.Data.DataSet = MainDS.Clone\n        Dim SortedFilteredRows As DataRow()\
  \ = _\n            MainDS.Tables(0).Select(\"FileSize > 1\", SortColumn & \" ASC\"\
  )\n        Dim SortedFilteredTable As DataTable = SortedFilteredDS.Tables(0)\n\n\
  \        For Each ClonedFilteredRow As DataRow In SortedFilteredRows\n         \
  \   SortedFilteredTable.ImportRow(ClonedFilteredRow)\n        Next\n\n        '将表转换为\
  \ SSIS 对象：\n        Dts.Variables(\"ADOFilteredAndSortedTable\").Value = CType(SortedFilteredDS,\
  \ Object)\n\n        Dts.TaskResult = ScriptResults.Success\n    End Sub\n    ```\n\
  7.  关闭 `SSIS Script` 窗口，并单击 `OK` 以关闭 `Script` 任务编辑器。\n8.  在 `Control Flow` 选项卡上添加一个\
  \ `Foreach Loop` 容器，并将其命名为 `Load Files`。将 `Populate Recordset` 脚本任务连接到此容器，然后双击以编辑\
  \ `Foreach Loop` 容器。\n9.  在左侧选择 `Collection`，并将枚举器类型选为 `For Each ADO Enumerator`。生成的对话框应如图\
  \ 13-12 所示。\n\n\n\n"
