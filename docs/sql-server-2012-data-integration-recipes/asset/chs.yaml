  \ PROCEDURE CarSales.Log.pr_FinaliseProcess\n(\n@IsProcessSuccess BIT\n)\nAS\n\n\
  DECLARE @RunID INT\nSELECT @RunID = MAX(RunID) FROM BI_Logging.CarSales_Logging.log.RunHistory\n\
  \nDECLARE @NoteComment VARCHAR(250)\n\nIF @IsProcessSuccess = 1\nBEGIN\nSET    \
