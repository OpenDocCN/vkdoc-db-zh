- "# 7-30. 使用 T-SQL 将数据导出到其他关系型数据库\n\n## 问题\n\n你希望使用 T-SQL 将数据导出到第三方关系型数据库管理系统（RDBMS）。\n\
  \n## 解决方案\n\n使用 `OPENROWSET`、`OPENDATASOURCE` 或链接服务器。以下步骤展示了如何使用 `OPENROWSET` 将数据导出到\
  \ Oracle。\n\n1.  按照“配方 4-4”中的脚本配置链接服务器。\n2.  在目标 Oracle 数据库的 `SCOTT` 模式下创建一个名为 `Client_Dest`\
  \ 的表：\n\n```sql\nCREATE TABLE \"SCOTT\".\"Client_Dest\"\n(\n    \"ID\" INTEGER,\n\
  \    \"ClientName\" VARCHAR2(150),\n    \"Country\" VARCHAR2(50),\n    \"Town\"\
  \ VARCHAR2(50),\n    \"County\" VARCHAR2(50),\n    \"Address1\" VARCHAR2(50),\n\
  \    \"Address2\" VARCHAR2(50),\n    \"ClientType\" VARCHAR2(20),\n    \"ClientSize\"\
  \ VARCHAR2(10)\n);\n```\n\n3.  使用以下 SQL 代码片段将数据插入 Oracle 表 `Client_Dest`：\n\n```sql\n\
  INSERT INTO OPENROWSET('OraOLEDB.Oracle', 'ORCL';'SYSTEM';'Me4B0ss', 'select ID,ClientName,Country,Town\
  \ from SCOTT.Client_Dest')\n SELECT      ID,ClientName,Country,Town\n FROM     \
  \   dbo.Client;\n```\n\n## 工作原理\n\n得益于 OLEDB 和 .NET 提供程序对一系列关系型数据库的成熟支持，将数据导出到 Oracle、DB2、Sybase、Informix\
  \ 和 PostgreSQL（仅举几例）变得异常简单——前提是所需的驱动程序以及在必要时所需的客户端软件已正确安装。我认为这一点再怎么强调也不为过。根据我的经验，绝大多数跨数据库导入导出问题都归结于这两个基本要素。一旦它们就位并经过测试，剩下的就是小菜一碟。因此，我鼓励你在进行任何数据导出尝试之前，确保这些链接的基本方面已正确设置。\n\
  \n然而，即使正确建立了链接基础设施，也并非总能保证执行过程万无一失。\n\n你需要扎实了解目标表的数据类型以及关系结构所施加的任何限制——即任何唯一约束、外键、非空字段等等。这能让你确保导出的数据适用于目标数据结构并能成功加载。\n\
  \n`OPENROWSET` 命令需要表 7-9 中所示的参数。\n\n| 描述 | 示例 |\n| --- | --- |\n| Oracle OLEDB 提供程序\
  \ | `OraOLEDB.Oracle` |\n| TNSNames.Ora 文件中的 Oracle 地址 | `ORCL` |\n| Oracle 登录名\
  \ | `SYSTEM` |\n| Oracle 密码 | `Me4B0ss` |\n| 目标字段 | `select ID,ClientName,Country,Town`\
  \ |\n\n在本配方的示例中，我使用 Oracle 作为外部数据目标，因为据我所知，它似乎是从 SQL Server 导出数据时最常使用的数据库。即将描述的技术适用于大多数其他关系型数据源，并且（除了少数罕见例外）只需为目标数据库更改提供程序名称即可。其他数据库提供程序及其一些特性在第\
  \ 4 章中有详细描述。\n\n当使用 Microsoft 或 Oracle 提供程序时，使用 `OPENROWSET` 和 `OPENDATASOURCE`\
  \ 并不困难。这些示例使用的是较新的 Oracle 提供程序。\n\n如果你更喜欢使用 `OPENDATASOURCE`，那么以下 SQL 代码片段将把数据插入\
  \ Oracle 表 `Client_Dest`：\n\n```sql\nSELECT * FROM OPENDATASOURCE('OraOLEDB.Oracle',\
  \ 'Data Source = ORCL;User ID = SYSTEM;Password = Me4B0ss')..SCOTT.EMP;\n```\n\n\
  假设你已经设置了一个名为 `MyOracleDatabase` 的链接服务器（如“配方 4-4”所述），那么将数据插入链接服务器是一个标准的 `INSERT...SELECT`\
  \ 操作，只是使用四部分名称，类似于这样：\n\n```sql\nINSERT INTO MyOracleDatabase.CarSales.dbo.Client_Dest\n\
  (\n    ID ,\n    ClientName ,\n    Country ,\n    Town\n)\nSELECT\n    ID ,\n  \
  \  ClientName ,\n    Country ,\n    Town\nFROM dbo.Client;\n```\n\n## 提示、技巧和陷阱\n\
  \n-   确保源服务器和目标服务器之间的数据类型（和字段长度）兼容是你的责任。这可能意味着使用 `CAST` 和/或 `CONVERT` 来确保数据类型兼容，以及使用\
  \ `LEFT` 来截断字符数据。\n-   在导出数据时，确保数据类型和长度允许你成功完成导出过程是你的责任。第 8 章包含获取链接服务器元数据的信息。附录\
  \ A 提供了数据库间数据类型映射的详细信息。\n\n"
- '# 7-31. 使用 SSIS 将数据导出到其他关系型数据库


  ## 问题


  你希望使用 SSIS 将数据导出到外部关系型数据库管理系统（RDBMS）。


  ## 解决方案


  使用带有 OLEDB 目标组件的 SSIS 数据流，并配置一个针对第三方数据库的 OLEDB 连接管理器。


  以下解释了如何将数据从 SQL Server 导出到 Oracle。


  1.  创建一个新的 SSIS 包。添加一个新的 OLEDB 连接管理器，配置为连接到你的 SQL Server 源。将其命名为 `CarSales_OLEDB`。

  2.  添加一个新的 OLEDB 连接管理器，将其命名为 `Oracle_OLEDB` 并按如下方式配置：


  | 提供程序： | Oracle Provider for OLEDB |

  | --- | --- |

  | 服务器或文件名： | 你的 Oracle 实例 |

  | 用户名： | 你的 Oracle 登录名 |

  | 密码： | 你的 Oracle 密码 |


  3.  添加一个 OLEDB 源组件。将其配置为使用 `CarSales_OLEDB` 连接管理器。选择一个源表或输入一个 SQL 查询。在此示例中，我将使用
  `Clients` 表。

  4.  添加一个 OLEDB 目标组件。将其配置为使用 `Oracle_OLEDB` 连接管理器。将 `AlwaysUseDefaultCodePage` 属性设置为
  `True`。将数据访问模式设置为“表或视图”，然后单击“新建”创建一个新表——或选择一个现有表。


  ### 配置如下


  | | |

  | --- | --- |

  | OLEDB 连接管理器： | `OLEDB_Destination` |

  | 数据访问模式： | 表或视图 – 快速加载 |

  | 表或视图的名称： | `CubeOutput` |


  8.  将（名称特殊的）源列映射到目标列，然后单击“确定”。


  ### 工作原理


  导出 MDX 查询的结果与之前“配方”中描述的过程几乎完全相同，因此我将不再在此重复解释原理。我承认将 MDX 直通查询称为 SQL 命令是反直觉的，但尽管如此它确实有效——这就是你向
  SSAS 多维数据集传递 MDX 的方式。你需要记住，MDX 只能将数据导出为 Unicode 文本流，因此你随后必须在 SQL 中使用 `CAST` 或 `CONVERT`
  将所有字段转换为其他数据类型，或者使用视图覆盖输出表并将字段类型转换为适当的数据类型。在我看来，建议（至少在第一次导出数据时）创建足够大的目标表列，以防止导出失败。


  ### 提示、技巧和陷阱


  -   源组件中会保留一个警告三角形。这是因为驱动程序在处理 MDX 查询输出的度量值时遇到困难。尽管如此，它仍然会工作。

  -   如果你不使用命名成员并将输出转换为字符串，在导出数据时会遇到困难（有时，但不总是）。

  -   如果要导出到文本文件，请手动将列标题添加到目标文件，并取消选中“覆盖文件中的数据”。

  -   如果所需数据转换的复杂性让你太过烦恼，那么你总可以在 OLEDB 源中使用 `OPENROWSET`（使用前面描述的代码）来针对 SQL Server
  源。在实践中，这样做的缺点是权限的复杂性以及需要启用即席查询。



  ### 第 7 章：导出数据


  如果您正在创建一个新表，您会看到 SSIS 尝试将 SQL Server 数据类型转换为对应的 Oracle 数据类型。在此示例中，我将目标表名称设置为 `SCOTT.SQLSERVEREXPORT.`。假设您正在创建一个表，请点击“确定”。将出现以下对话框（参见图
  7-30）。


  ![9781430247913_Fig07-30.jpg](img/9781430247913_Fig07-30.jpg)


  图 7-30. 当表元数据不可用时的 OLEDB 警告


  5.  点击“确定”，然后从弹出的表和视图列表中选择目标表。

  6.  点击“确定”以确认您的修改。


  ## 工作原理


  这个方法表面上很简单。在现实世界中，要使其如此简单地工作，可能需要完成许多棘手的细节。但是，只要 Oracle 客户端软件和 Oracle OLEDB 驱动程序已正确安装——并且您有一个有效的
  Oracle 账户可以使用——那么就没有理由不成功。您必须确保在将要运行 SSIS 包的服务器上正确安装和配置了 Oracle 客户端软件，以及 Microsoft
  Oracle OLEDB 驱动程序——或者最好是 Oracle OLEDB 驱动程序。此外，还需要一个具有足够权限将数据写入 Oracle 目标模式和表的 Oracle
  账户，如果您正在通过 SSIS 创建新表，还需要表创建权限。


  ## 提示、技巧和陷阱


  *   将 `AlwaysUseDefaultCodePage` 属性设置为 True 的原因是，否则您会收到一个恼人且——毫无意义的——代码页警告消息。此外，Oracle
  OLEDB 目标中会包含一个（无意义的）警告三角。

  *   此示例极其简单。当然，您可以在最终导出到 Oracle 之前，对数据执行各种 SSIS 数据转换过程（包括调整数据类型）。


  ### 7-32. 从 SQL Server Azure 导出数据


  #### 问题


  您需要将数据从 SQL Server Azure 导出到文本文件或第三方数据库。


  #### 解决方案


  使用 SSIS、BCP 或导入/导出数据向导，并将 SQL Server Azure 指定为数据源。


  我将用三个小方法来说明 SQL Server Azure 的导出，因为基于云的微软关系数据库管理系统本质上只是另一个 SQL Server 数据库。


  ##### 使用 SSIS


  使用 SSIS 连接到 SQL Server Azure 数据源时，您可以使用 OLEDB 或 ADO.NET 数据源。只需记住使用 SQL Server 身份验证，并指定
  SQL Server Azure 数据库的完全限定域名（如果使用 OLEDB 数据源，还需在用户名后附加 `@Database`）。


  ##### 使用 BCP


  如果您使用的是随 SQL Server 2008 R2 或更高版本附带的 BCP 版本，那么以下命令将从 SQL Server Azure 导出数据：


  ```

  C:\Users\Adam > BCP Carsales.dbo.client OUT C:\SQL2012DIRecipes\CH07\Azure.BCP -U
  MeForPrimeMinister@ETLCookbook -PGubbins –SETLCookbook.database.windows.net -N

  ```


  ##### 使用导入/导出数据向导


  只需使用 .NET Framework Data Provider for SQL Server 作为数据源。按照第 5 章中的描述进行配置。


  #### 工作原理


  无论从哪个角度看，SQL Server Azure 都只是另一个 SQL Server 数据库。因此，只要您使用的是 SQL Server 2008 R2 及以上版本，您就可以使用所有习惯的工具从微软的基于云的
  RDBMS 导出数据。需要记住的基本点是，您必须指定 SQL Server Azure 数据库的完全限定域名。如果使用 OLEDB 数据源，还必须在用户名后附加
  `@Database`。


  #### 提示、技巧和陷阱


  *   使用 BCP 时，必须在用户名中添加 `@ServerName`。

  *   使用 BCP 时，必须使用 SQL Server 身份验证。

  *   必须使用完全限定的 DNS 名称（如在 Azure 管理门户中给出的那样）作为服务器名称。

  *   不必对 BCP 使用 SQL 本机格式。您可以在其他方面将其视为标准的 BCP 命令。

  *   可以使用 SQL Select 语句或存储过程来选择要返回的数据。


  #### 总结


  本章回顾了使用 SQL Server 导出数据的多种方法。为了回顾这些方法，表 7-10 总结了我对各种方法的看法。


  表 7-10. 本章所用方法的优缺点


  | 技术 | 优点 | 缺点 |

  | :--- | :--- | :--- |

  | SSIS | 直观、高效且功能强大。 | 学习曲线较陡。 |

  | BCP | 极其高效。 | 笨拙且绝对不直观。 |

  | `OPENROWSET` | 适用于临时导出。 | 需要目标文件或表已存在。 |

  | `OPENDATASOURCE` | 适用于临时导出。 | 需要目标文件或表已存在。 |

  | 链接服务器 | 一旦设置好并运行，易于使用。 | 配置可能很棘手，速度慢。 |

  | 导入/导出向导 | 易于使用。 | 需要一点学习。 |

  | 使用 SSIS 的 XML | 设置快速。 | 需要大量内存。 |

  | 使用 BCP 的 XML | 速度快。 | 可能需要源数据“分块”。 |


  显然，在导出数据时决定应用哪种技术将完全取决于您环境的要求。基于 T-SQL 的解决方案（`OPENROWSET` 和 `OPENQUERY`）易于部署，但在调试和记录日志方面存在局限。链接服务器可能以难以配置和速度慢而闻名，但一旦投入生产，往往非常可靠。对于计划和定期的导出过程，SSIS
  是首选工具，尽管它可能需要投入开发（和部署）精力。BCP 可能会让你疑惑命令行为何被发明出来——除了作为一种折磨形式——直到使用它导出数据的惊人速度开始让你印象深刻。但如果您需要临时导出几个表，甚至几个表的部分数据，没有什么比导出向导更方便的了。


  '
- '# 第 8 章


  ![image](img/frontdot.jpg)


  ## 元数据


  元数据是关于数据的数据。具体来说，在数据摄取过程的上下文中，它意味着发现并了解有关源数据结构的所有必要知识。这意味着至少需要拥有以下所有详细信息：


  *   使用的表

  *   可用的列

  *   数据类型

  *   列中数据的长度

  *   列的可空性


  对于某些源，您还应了解：


  *   主键和唯一键

  *   索引

  *   触发器


  究竟有多少信息对您正在构建的过程至关重要，将取决于每个单独的项目。其中一些可能仅仅是有用的，但其他方面可能是成功数据加载过程的关键。


  现在，虽然可以在对源元数据了解不多的情况下创建和运行高度成功的 ETL 过程，但拥有对源数据如何结构化和定义的清晰定义可能非常有用，原因包括：


  *   当您定义数据流时，如果能够从一开始就指定正确的数据类型和长度，将使您的流程更加稳健，并避免代码投入生产时出现意外的包失败。

  *   当您将源数据类型映射到目标数据类型时，可以对其兼容性有更大的信心。


  我相信您还能找到其他理由来补充这个简短的列表。因此，在假设获取和理解支撑数据流的元数据是创建和维护稳健高效的数据摄取过程的关键之后，本章将向您展示如何：


  *   获取元数据。

  *   使用元数据调试数据摄取问题。

  *   存储元数据并使用它来检测源数据结构的变化，例如结构修改（新增或删除列）和类型更改。


  '
- "# 获取元数据的主要方式\n\n我们将探讨获取元数据的以下几种主要方式：\n*   通过链接服务器连接获取元数据。\n*   在已用作本书源数据的主流关系数据库中，访问元数据存储库及其所需的技术。\n\
  *   使用 .NET 及其 `GetSchema` 方法，该方法可与数据库连接对象一起使用，以获取 SQL Server、OLEDB 和 ODBC 连接的架构数据。\n\
  \n本质上，本章旨在通过预先了解信息，使您做好准备。您可能在多年内都无需深究源系统元数据也能愉快地管理，或者只需在链接到源数据表时使用 SSIS 或 T-SQL\
  \ 提供的元数据。然而，必定会有这样的时候：深入研究源数据以了解其定义是成功实施 ETL 流程的先决条件。以下示例旨在帮助您完成这个探索过程。\n\n如果您已从本书的配套网站下载了配套文件，您可以在\
  \ `C:\\SQL2012DIRecipes\\CH08\\` 目录中找到本章的示例。\n\n#### 8-1. 列出链接服务器上可用的表\n\n### 问题\n\
  \n您希望发现通过链接服务器连接可用的表。\n\n### 解决方案\n\n使用系统存储过程 `sp_tables_ex` 来列出可通过链接服务器查询的所有表。该存储过程简单有效。最简单的情况下，它只需要链接服务器名称，如下列代码片段（使用\
  \ Oracle 链接服务器）所示：\n```\nEXECUTE master.dbo.sp_tables_ex 'MyOracleDatabase'\n```\n\
  运行此代码片段将返回 `MyOracleDatabase` 链接服务器上用户可见的所有表的列表。\n\n### 工作原理\n\n如果您已建立到外部数据库的链接服务器连接，那么从中获取元数据将非常容易，因为\
  \ SQL Server 提供了存储过程 `sp_tables_ex`，该过程返回可跨链接服务器查询的表的列表。唯一必需的参数是链接服务器名称。链接服务器可以是任何正确配置的链接服务器，无论是\
  \ Excel 电子表格、SQL Server 数据库，还是 SQL Server 允许定义为链接服务器的任何数据源。此外，如果您愿意，可以通过添加架构和表类型来限制此存储过程返回的数据。这里再次演示如何对\
  \ Oracle 链接服务器执行此操作——尽管这适用于所有链接服务器源（`C:\\SQL2012DIRecipes\\CH08\\LinkedServerTables.sql`）：\n\
  ```\nEXECUTE master.dbo.sp_tables_ex @table_server = 'MyOracleDatabase',\n     \
  \                           @table_schema = 'HR',\n                            \
  \    @table_type = 'VIEW'\n```\n\n返回的数据如 表 8-1 所示。\n\n**表 8-1.** sp_tables_ex 系统存储过程返回的元数据\n\
  | 列名 | 数据类型 | 描述 |\n| --- | --- | --- |\n| `TABLE_CAT` | `sysname` | 数据库名称。 |\n\
  | `TABLE_SCHEM` | `sysname` | 表架构。 |\n| `TABLE_NAME` | `sysname` | 表名。 |\n| `TABLE_TYPE`\
  \ | `VARCHAR(32)` | 表类型——用户表、系统表或视图。 |\n| `REMARKS` | `VARCHAR(254)` | SQL Server\
  \ 将此列留空。 |\n\n`sp_tables_ex` 存储过程使用的参数如 表 8-2 所示。这些参数允许您筛选存储过程返回的信息。\n\n**表 8-2.**\
  \ sp_tables_ex 参数\n| 参数 | 说明 |\n| --- | --- |\n| `@table_server` | 链接服务器名称。 |\n\
  | `@table_catalog` | 数据库名称。 |\n| `@table_schema` | 表架构名称。 |\n| `@table_name` | 表名。\
  \ |\n| `@table_type` | 三种真正有用的表类型是 `SYSTEM TABLE`、`TABLE` 和 `VIEW`。 |\n\n![image](img/sq.jpg)\
  \ `Note`：如果链接服务器的 OLEDB 提供程序不支持 `IDBSchemaRowset` 接口的 `TABLES` 行集，`sp_tables_ex`\
  \ 存储过程将返回空结果集。\n\n#### 8-2. 列出使用链接服务器时可用的列\n\n### 问题\n\n您希望列出可通过链接服务器查询的所有列。\n\n\
  ### 解决方案\n\n使用系统存储过程 `sp_columns_ex` 来显示通过链接服务器连接可访问的表中的列。以下是说明此操作的代码片段：\n```\n\
  EXECUTE master.dbo.sp_columns_ex @table_server = 'MyOracleDatabase'\n```\n\n###\
  \ 工作原理\n\n上一个配方中描述的方法可以扩展到返回有关链接服务器中列的数据，如本配方所示，使用 `sp_columns_ex` 存储过程。您可以通过为 Oracle\
  \ 链接服务器添加可选的 `@table_name` 和 `@table_server` 参数来限制存储过程返回的数据，如下所示（`C:\\SQL2012DIRecipes\\\
  CH08\\LinkedServerColumns.sql`）：\n```\nEXEC sp_columns_ex @table_server = 'MyOracleDatabase',\n\
  \                   @table_name = 'Car_Sales'\n```\n\n返回的数据如 表 8-3 所示。\n\n**表 8-3.**\
  \ 使用 sp_columns_ex 系统存储过程返回的元数据\n| 列名 | 数据类型 | 描述 |\n| --- | --- | --- |\n| `TABLE_CAT`\
  \ | `sysname` | 数据库名称。 |\n| `TABLE_SCHEM` | `sysname` | 表架构。 |\n| `TABLE_NAME` |\
  \ `sysname` | 表名。 |\n| `COLUMN_NAME` | `sysname` | 列名。 |\n| `DATA_TYPE` | `smallint`\
  \ | 列数据类型 ID。 |\n| `TYPE_NAME` | `VARCHAR(13)` | 列数据类型的友好名称。 |\n| `COLUMN_SIZE`\
  \ | `int` | 列大小或长度。 |\n| `BUFFER_LENGTH` | `int` | 数据传输大小。 |\n| `DECIMAL_DIGITS`\
  \ | `smallint` | 小数点右边的位数。 |\n| `NUM_PREC_RADIX` | `smallint` | 数值基类型。 |\n| `NULLABLE`\
  \ | `smallint` | 如果为 1，则列可以包含 NULL。否则为 0。 |\n| `REMARKS` | `VARCHAR(254)` | SQL\
  \ Server 将此列留空。 |\n| `COLUMN_DEF` | `VARCHAR(254)` | 任何默认值。 |\n| `SQL_DATA_TYPE`\
  \ | `smallint` | 本质上与 `DATA_TYPE` 相同。 |\n| `SQL_DATETIME_SUB` | `smallint` | 日期时间和\
  \ SQL-92 间隔数据类型的子类型——否则为 `NULL`。 |\n| `CHAR_OCTET_LENGTH` | `int` | 以字节为单位的数据最大长度。\
  \ |\n| `ORDINAL_POSITION` | `int` | 列在表中的基于 1 的位置。 |\n| `IS_NULLABLE` | `VARCHAR(254)`\
  \ | ISO 可空性。如果为 1，则列可以包含 `NULL`。否则为 0。 |\n| `SS_DATA_TYPE` | `TINYINT` | 扩展存储过程数据类型。\
  \ |\n\n`sp_columns_ex` 存储过程使用的参数如 表 8-4 所示。这些参数允许您筛选存储过程返回的信息。\n\n**表 8-4.** sp_columns_ex\
  \ 系统存储过程的可能参数\n| 参数 | 说明 |\n| --- | --- |\n| `@table_server` | 链接服务器名称。 |\n| `@table_name`\
  \ | 表名。 |\n| `@table_schema` | 表架构。 |\n| `@table_catalog` | 数据库名称。 |\n| `@column_name`\
  \ | 数据库列名。 |\n\n### 提示、技巧和陷阱\n*   本配方中的解决方案不适用于 Excel 或 Access 链接服务器。\n\n#### 8-3.\
  \ 发现平面文件元数据\n\n### 问题\n\n您需要获取要导入的平面文件的列定义。\n\n### 解决方案\n\n在 SSIS 中使用平面文件连接管理器来猜测数据类型。\n\
  \n### 工作原理\n\n如果您幸运的话，您收到的文本（平面）文件的提供者也会描述它所包含的数据。如果那天运气不好，您只有几个选项可用。第一个是使用 SSIS。\n\
  \n\n## 8-4. 获取简单的 SQL Server 元数据\n\n### 问题\n\n你需要以一种简单便捷的方式查找关于 SQL Server 表和列的基本元数据。\n\
  \n### 解决方案\n\n查询 `INFORMATION_SCHEMA` 视图，以获得描述源数据库的元数据的合理概览。下面描述了一种实现此目标的方法。\n\n\
  1.  展开“视图” ![image](img/arrow.jpg) “系统视图”，找到你想要返回其元数据的数据库。你应该能看到如 图 8-1 所示的截图。\n\
  \n![9781430247913_Fig08-01.jpg](img/9781430247913_Fig08-01.jpg)\n\n图 8-1. INFORMATION_SCHEMA\
  \ 表\n\n2.  右键单击包含你感兴趣的元数据的视图。选择“选择前 1000 行”。\n\n你选择的元数据将作为 `SELECT` 查询的结果显示。然后，你可以调整查询以返回完全符合你需求的数据集。\n\
  \n### 工作原理\n\n正如你可能知道的，获取基本元数据子集的另一种方法是明智地使用 `INFORMATION_SCHEMA` 视图，该视图自 SQL Server\
  \ 2005 起出现。这些数据可以通过查询任何数据库的系统视图来找到。幸运的是，大多数视图都是不言自明的，省去了记忆系统存储过程名称的麻烦（你也可以使用这些存储过程来返回关于表、视图、列等的元数据）。你所要做的只是运行一个简单的\
  \ `SELECT` 查询。\n\n我最常用的 `INFORMATION_SCHEMA` 视图在 表 8-5 中提供。\n\n表 8-5. 常用的 INFORMATION_SCHEMA\
  \ 视图\n\n| `INFORMATION_SCHEMA` 视图 | 有用的列 | 注释 |\n| --- | --- | --- |\n| `COLUMNS`\
  \ | `COLUMN_NAME` | 确切的列名。 |\n| | `IS_NULLABLE` | 指示该列是否可包含 `NULL`。 |\n| | `DATA_TYPE`\
  \ | 列的数据类型。 |\n| | `CHARACTER_MAXIMUM_LENGTH` | 列中的最大字符数。 |\n| | `CHARACTER_OCTET_LENGTH`\
  \ | 列的最大字节大小。 |\n| | `NUMERIC_PRECISION` | 数值列的精度。 |\n| | `NUMERIC_PRECISION_RADIX`\
  \ | 数值的基本类型。 |\n| | `NUMERIC_SCALE` | 数值列的小数位数。 |\n| | `CHARACTER_SET_NAME` | 对于非\
  \ Unicode 列，所使用的字符集。 |\n| | `DATETIME_PRECISION` | 日期时间精度。 |\n| | `COLLATION` |\
  \ 列的排序规则。 |\n| `CONSTRAINTS` | `CONSTRAINT_NAME` | 约束的名称。 |\n| | `CHECK_CLAUSE`\
  \ | 确切的检查代码。 |\n| `CONSTRAINT_COLUMN_USAGE` | `COLUMN_NAME` | 列出所有带有约束的列——以及约束的名称。\
  \ |\n| | `CONSTRAINT_NAME` | 这允许你确保通过数据流传递的是有效数据，不会被目标表拒绝。 |\n| `CONSTRAINT_TABLE_USAGE`\
  \ | `COLUMN_NAME` | 列出所有带有约束的列——以及约束的名称。 |\n| | `CONSTRAINT_NAME` | 列上任何约束的名称。 |\n\
  | `KEY_COLUMN_USAGE` | `CONSTRAINT_NAME` | 键约束的名称。 |\n| | `TABLE_NAME` | 约束所应用的表。\
  \ |\n| | `COLUMN_NAME` | 约束所应用的列。 |\n| `SCHEMATA` | `SCHEMA_NAME` | 架构名称。 |\n| `TABLES`\
  \ | | 表及其架构。 |\n| `REFERENTIAL_CONSTRAINTS` | `CONSTRAINT_NAME` | 数据库中所有外键约束的列表。\
  \ |\n| | `UNIQUE_CONSTRAINT_NAME` | 数据库中所有唯一键约束的列表。 |\n| | `SCHEMA_OWNER` | 架构所有者。\
  \ |\n| `VIEWS` | | 视图及其架构。 |\n\n#### 提示、技巧与陷阱\n\n*   `INFORMATION_SCHEMA` 视图提供了更多信息，所以花点时间深入探索一下会很有乐趣。花时间学习其可用内容，可以在日后省去调试数据流错误的时间，从而获得真正的回报。\n\
  *   关于 `INFORMATION_SCHEMA` 数据是否有效、是否完全可信，存在一些讨论。我倾向于认为它是准确的，但过于简化，因此更喜欢基于目录视图中包含的信息进行分析。\n\
  \n## 8-5. 获取定制的 SQL Server 元数据\n\n### 问题\n\n你需要获取精确的 SQL Server 表元数据，以验证你的 ETL 数据类型映射。\n\
  \n### 解决方案\n\n使用 SQL Server 的 `INFORMATION_SCHEMA` 视图来返回有关数据类型的选择性表元数据。\n\n以下查询将使用\
  \ `INFORMATION_SCHEMA` 视图，从 SQL Server 数据库中返回用于数据集成目的的基本元数据 (`C:\\SQL2012DIRecipes\\\
  CH08\\EssentialSQLServerMetadata.sql`):\n\n```sql\nSELECT C.TABLE_CATALOG, C.TABLE_SCHEMA,\
  \ C.TABLE_NAME, C.COLUMN_NAME, C.COLUMN_DEFAULT, C.IS_NULLABLE, C.DATA_TYPE, C.CHARACTER_MAXIMUM_LENGTH,\
  \ C.CHARACTER_OCTET_LENGTH, C.NUMERIC_PRECISION, C.NUMERIC_SCALE, A.CONSTRAINT_TYPE,\
  \ A.CHECK_CLAUSE\nFROM       INFORMATION_SCHEMA.COLUMNS C\nLEFT OUTER JOIN (\n \
  \ SELECT     CCU.TABLE_CATALOG,\n    CCU.TABLE_SCHEMA,\n    CCU.TABLE_NAME,\n  \
  \  CCU.COLUMN_NAME,\n    CT.CONSTRAINT_TYPE,\n    CHK.CHECK_CLAUSE\n  FROM\n   \
  \ INFORMATION_SCHEMA.CONSTRAINT_COLUMN_USAGE CCU\n        INNER JOIN INFORMATION_SCHEMA.TABLE_CONSTRAINTS\
  \ CT\n        ON CCU.CONSTRAINT_NAME = CT.CONSTRAINT_NAME\n        LEFT OUTER JOIN\
  \ INFORMATION_SCHEMA.CHECK_CONSTRAINTS CHK\n        ON CT.CONSTRAINT_NAME = CHK.CONSTRAINT_NAME\n\
  ) A\nON A.COLUMN_NAME = C.COLUMN_NAME\nAND A.TABLE_NAME = C.TABLE_NAME\nAND A.TABLE_SCHEMA\
  \ = C.TABLE_SCHEMA;\n```\n\n此脚本可能产生的输出示例如 图 8-2 所示。\n\n![9781430247913_Fig08-02.jpg](img/9781430247913_Fig08-02.jpg)\n\
  \n图 8-2. INFORMATION_SCHEMA 视图的元数据输出\n\n### 工作原理\n\n此脚本连接一组表 (`COLUMNS`, `CONSTRAINT_COLUMN_USAGE`,\
  \ 和 `TABLE_CONSTRAINTS`)，以返回关于可用表的选定元数据子集。如果你愿意，脚本的输出可以使用 `SELECT...INTO` 插入到表中。你可以修改返回的元素以满足你自己的需求。\n\
  \n#### 提示、技巧与陷阱\n\n*   你可以添加 `WHERE` 子句来筛选你想要的表。\n*   返回的结果可用于验证元数据的状态或变更。\n*  \
  \ 查询 `INFORMATION_SCHEMA` 视图时，务必用 `INFORMATION_SCHEMA` 限定视图名称。例如：\n\n```sql\nSELECT\
  \ TABLE_CATALOG, TABLE_SCHEMA, TABLE_NAME\nFROM INFORMATION_SCHEMA.TABLES\nWHERE\
  \ TABLE_TYPE = 'BASE TABLE'\n```\n\n*   你可以连接 `INFORMATION_SCHEMA` 视图来推导你正在查找的信息。\n\
  \n\n\n你可以使用 `INFORMATION_SCHEMA` 视图，在一个 `SSIS` 包中将数据导出到 Excel（例如），以便与你为源数据生成的元数据进行对比——并生成一份电子表格，详细说明数据映射关系以及可能存在的问题。为此，你只需创建一个\
  \ `SSIS` 包，其数据源是使用前述代码作为 `SQL` 命令文本、通过 `OLEDB` 或 `ADO.NET` 连接到你的数据库的连接，然后将此连接链接到一个\
  \ Excel 目标即可。\n\n#### 8-6. 分析 SQL Server 表元数据\n\n### 问题\n\n你需要获取 `SQL Server` 表的元数据以供分析。\n\
  \n### 解决方案\n\n使用 `SQL Server` 系统视图来返回完整的表元数据。\n\n运行以下脚本将为你提供指定数据库中所有 `SQL Server`\
  \ 表的详尽信息。\n\n```sql\nDECLARE @SERVER_NAME NVARCHAR(128) = @@SERVERNAME\nDECLARE\
  \ @DATABASE_NAME NVARCHAR(128) = DB_NAME()\n------------------------------------------\n\
  IF OBJECT_ID('tempdb..#MetaData_Tables') IS NOT NULL\n    DROP TABLE tempdb..#MetaData_Tables;\n\
  -- 表数据\nCREATE TABLE #MetaData_Tables (\n    SCHEMA_NAME sysname NOT NULL,\n   \
  \ TABLE_NAME sysname NOT NULL,\n    object_id INT NOT NULL,\n    TableType NVARCHAR(60)\
  \ NULL,\n    DateCreated datetime NOT NULL,\n    DateModified datetime NOT NULL,\n\
  \    uses_ansi_nulls BIT NULL,\n    text_in_row_limit INT NULL,\n    large_value_types_out_of_row\
  \ BIT NULL,\n    IsCDCTracked BIT NULL,\n    lock_escalation_desc NVARCHAR(60) NULL,\n\
  \    LobDataSpace sysname NULL,\n    FilestreamDataSpace sysname NULL,\n    DataSpace\
  \ VARCHAR(250) NULL,\n    DataSpaceType VARCHAR(250) NULL,\n    NbrColumns  smallint\
  \ NULL,\n    IsHeap BIT NULL,\n    NoIndexes BIT NULL,\n    NoRows BIGINT NULL,\n\
  \    HasAfterTrigger  BIT NULL,\n    HasDeleteTrigger BIT NULL,\n    HasInsertTrigger\
  \ BIT NULL,\n    HasInsteadOfTrigger BIT NULL,\n    HasUpdateTrigger BIT NULL,\n\
  \    IsAnsiNullsOn BIT NULL,\n    IsEncrypted BIT NULL,\n    IsIndexed BIT NULL,\n\
  \    IsIndexable BIT NULL,\n    IsQuotedIdentOn BIT NULL,\n    IsSystemTable BIT\
  \ NULL,\n    IsUserTable BIT NULL,\n    DeleteTriggerCount SMALLINT NULL,\n    FullTextBackgroundUpdateIndexOn\
  \ BIT NULL,\n    FulltextCatalogId SMALLINT NULL,\n    FulltextChangeTrackingOn\
  \ BIT NULL,\n    FulltextKeyColumn SMALLINT NULL,\n    HasActiveFulltextIndex BIT\
  \ NULL,\n    HasCheckCnst BIT NULL,\n    HasClustIndex BIT NULL,\n    HasDefaultCnst\
  \ BIT NULL,\n    HasForeignKey BIT NULL,\n    HasForeignRef BIT NULL,\n    HasIdentity\
  \ BIT NULL,\n    HasIndex BIT NULL,\n    HasNonclustIndex BIT NULL,\n    HasPrimaryKey\
  \ BIT NULL,\n    HasRowGuidCol BIT NULL,\n    HasTextImage BIT NULL,\n    HasTimestamp\
  \ BIT NULL,\n    HasUniqueCnst BIT NULL,\n    HasVarDecimalStorageFormat BIT NULL,\n\
  \    InsertTriggerCount SMALLINT NULL,\n    TextInRowLimit SMALLINT NULL,\n    UpdateTriggerCount\
  \ SMALLINT NULL,\n    HasColumnSet BIT NULL,\n    DataCompression NVARCHAR(60)\n\
  )\n\nINSERT INTO  #MetaData_Tables (\n    SCHEMA_NAME,\n    TABLE_NAME,\n    object_id,\n\
  \    TableType,\n    DateCreated,\n    DAteModified,\n    uses_ansi_nulls,\n   \
  \ text_in_row_limit,\n    large_value_types_out_of_row,\n    IsCDCTracked,\n   \
  \ lock_escalation_desc,\n    LobDataSpace,\n    FilestreamDataSpace,\n    DataSpace,\n\
  \    DataSpaceType,\n    NbrColumns,\n    IsHeap,\n    NoIndexes,\n    NoRows,\n\
  \    HasAfterTrigger,\n    HasDeleteTrigger,\n    HasInsertTrigger,\n    HasInsteadOfTrigger,\n\
  \    HasUpdateTrigger,\n    IsAnsiNullsOn,\n    IsEncrypted,\n    IsIndexed,\n \
  \   IsIndexable,\n    IsQuotedIdentOn,\n    IsSystemTable,\n    IsUserTable,\n \
  \   DeleteTriggerCount,\n    FullTextBackgroundUpdateIndexOn,\n    FulltextCatalogId,\n\
  \    FulltextChangeTrackingOn,\n    FulltextKeyColumn,\n    HasActiveFulltextIndex,\n\
  \    HasCheckCnst,\n    HasClustIndex,\n    HasDefaultCnst,\n    HasForeignKey,\n\
  \    HasForeignRef,\n    HasIdentity,\n    HasIndex,\n    HasNonclustIndex,\n  \
  \  HasPrimaryKey,\n    HasRowGuidCol,\n    HasTextImage,\n    HasTimestamp,\n  \
  \  HasUniqueCnst,\n    HasVarDecimalStorageFormat,\n    InsertTriggerCount,\n  \
  \  TextInRowLimit,\n    UpdateTriggerCount,\n    HasColumnSet\n)\n\nSELECT\n   \
  \ SCH.name AS SCHEMA_NAME,\n    TBL.name AS TABLE_NAME,\n    TBL.object_id,\n  \
  \  TBL.type_desc AS TableType,\n    TBL.create_date AS DateCreated,\n    TBL.modify_date\
  \ AS DAteModified,\n    TBL.uses_ansi_nulls,\n    TBL.text_in_row_limit,\n    TBL.large_value_types_out_of_row,\n\
  \    TBL.is_tracked_by_cdc AS IsCDCTracked,\n    TBL.lock_escalation_desc,\n   \
  \ DSP.name AS LobDataSpace,\n    DSP1.name AS FilestreamDataSpace,\n    CAST(NULL\
  \ AS VARCHAR(250)) AS DataSpace,\n    CAST(NULL AS VARCHAR(250)) AS DataSpaceType,\n\
  \    CAST(NULL AS SMALLINT) AS NbrColumns,\n    CAST(NULL AS BIT) AS IsHeap,\n \
  \   CAST(NULL AS BIT) AS NoIndexes,\n    CAST(NULL AS BIGINT) AS NoRows,\n    OBJECTPROPERTY(TBL.object_id,\
  \ 'HasAfterTrigger') AS HasAfterTrigger,\n    OBJECTPROPERTY(TBL.object_id, 'HasDeleteTrigger')\
  \ AS HasDeleteTrigger,\n    OBJECTPROPERTY(TBL.object_id, 'HasInsertTrigger') AS\
  \ HasInsertTrigger,\n    OBJECTPROPERTY(TBL.object_id, 'HasInsteadOfTrigger') AS\
  \ HasInsteadOfTrigger,\n    OBJECTPROPERTY(TBL.object_id, 'HasUpdateTrigger') AS\
  \ HasUpdateTrigger,\n    OBJECTPROPERTY(TBL.object_id, 'IsAnsiNullsOn') AS IsAnsiNullsOn,\n\
  \    OBJECTPROPERTY(TBL.object_id, 'IsEncrypted') AS IsEncrypted,\n    OBJECTPROPERTY(TBL.object_id,\
  \ 'IsIndexed') AS IsIndexed,\n    OBJECTPROPERTY(TBL.object_id, 'IsIndexable') AS\
  \ IsIndexable,\n    OBJECTPROPERTY(TBL.object_id, 'IsQuotedIdentOn') AS IsQuotedIdentOn,\n\
  \    OBJECTPROPERTY(TBL.object_id, 'IsSystemTable') AS IsSystemTable,\n    OBJECTPROPERTY(TBL.object_id,\
  \ 'IsUserTable') AS IsUserTable,\n    OBJECTPROPERTY(TBL.object_id, 'DeleteTriggerCount')\
  \ AS DeleteTriggerCount,\n    OBJECTPROPERTY(TBL.object_id, 'FullTextBackgroundUpdateIndexOn')\
  \ AS FullTextBackgroundUpdateIndexOn,\n    OBJECTPROPERTY(TBL.object_id, 'FulltextCatalogId')\
  \ AS FulltextCatalogId,\n    OBJECTPROPERTY(TBL.object_id, 'FulltextChangeTrackingOn')\
  \ AS FulltextChangeTrackingOn,\n    OBJECTPROPERTY(TBL.object_id, 'FulltextKeyColumn')\
  \ AS FulltextKeyColumn,\n    OBJECTPROPERTY(TBL.object_id, 'HasActiveFulltextIndex')\
  \ AS HasActiveFulltextIndex,\n    OBJECTPROPERTY(TBL.object_id, 'HasCheckCnst')\
  \ AS HasCheckCnst,\n    OBJECTPROPERTY(TBL.object_id, 'HasClustIndex') AS HasClustIndex,\n\
  \    OBJECTPROPERTY(TBL.object_id, 'HasDefaultCnst') AS HasDefaultCnst,\n    OBJECTPROPERTY(TBL.object_id,\
  \ 'HasForeignKey') AS HasForeignKey,\n    OBJECTPROPERTY(TBL.object_id, 'HasForeignRef')\
  \ AS HasForeignRef,\n    OBJECTPROPERTY(TBL.object_id, 'HasIdentity') AS HasIdentity,\n\
  \    OBJECTPROPERTY(TBL.object_id, 'HasIndex') AS HasIndex,\n    OBJECTPROPERTY(TBL.object_id,\
  \ 'HasNonclustIndex') AS HasNonclustIndex,\n    OBJECTPROPERTY(TBL.object_id, 'HasPrimaryKey')\
  \ AS HasPrimaryKey,\n    OBJECTPROPERTY(TBL.object_id, 'HasRowGuidCol') AS HasRowGuidCol,\n\
  \    OBJECTPROPERTY(TBL.object_id, 'HasTextImage') AS HasTextImage,\n    OBJECTPROPERTY(TBL.object_id,\
  \ 'HasTimestamp') AS HasTimestamp,\n    OBJECTPROPERTY(TBL.object_id, 'HasUniqueCnst')\
  \ AS HasUniqueCnst,\n    OBJECTPROPERTY(TBL.object_id, 'HasVarDecimalStorageFormat')\
  \ AS HasVarDecimalStorageFormat,\n    OBJECTPROPERTY(TBL.object_id, 'InsertTriggerCount')\
  \ AS InsertTriggerCount,\n    OBJECTPROPERTY(TBL.object_id, 'TextInRowLimit') AS\
  \ TextInRowLimit,\n    OBJECTPROPERTY(TBL.object_id, 'UpdateTriggerCount') AS UpdateTriggerCount,\n\
  \    OBJECTPROPERTY(TBL.object_id, 'HasColumnSet') AS HasColumnSet\nFROM       \
  \ sys.schemas AS SCH\n            INNER JOIN sys.tables AS TBL\n            ON SCH.schema_id\
  \ = TBL.schema_id\n            LEFT OUTER JOIN sys.data_spaces DSP1\n          \
  \  ON TBL.filestream_data_space_id = DSP1.data_space_id\n            LEFT OUTER\
  \ JOIN sys.data_spaces DSP\n            ON TBL.lob_data_space_id = DSP.data_space_id\n\
  WHERE TBL.is_ms_shipped = 0\n\n--------------------------------------------------------------------------------\n\
  -- 获取所有次要元素，稍后处理\n--------------------------------------------------------------------------------\n\
  \n-- 文件组\nIF OBJECT_ID('tempdb..#Tmp_FileGroupDetails') IS NOT NULL\n    DROP TABLE\
  \ tempdb..#Tmp_FileGroupDetails;\n\nSELECT DISTINCT\n    DSP.name AS DataSpace,\n\
  \    DSP.type_desc AS DataSpaceType,\n    TBL.name AS TABLE_NAME,\n    TBL.object_id\
  \ AS TableObjectID\nINTO    #Tmp_FileGroupDetails\nFROM    sys.data_spaces DSP\n\
  \        INNER JOIN sys.indexes SIX\n        ON DSP.data_space_id = SIX.data_space_id\n\
  \        INNER JOIN sys.tables TBL\n        ON SIX.object_id = TBL.object_id\n```\n\
  \n\n\n"
- "# SQL Server 元数据查询脚本\n\n## 脚本内容\n\n以下 SQL 脚本用于收集和更新`#MetaData_Tables`临时表中的各种表元数据信息。\n\
  \n```sql\nobject_id\n--------------------------------------------------------------------------------\n\
  -- 处理所有次要元素\n--------------------------------------------------------------------------------\n\
  \n-- FileGroup (文件组)\nUPDATE    D\nSET       D.DataSpace = Tmp.DataSpace\n     \
  \     ,D.DataSpaceType = Tmp.DataSpaceType\nFROM      #MetaData_Tables D\n     \
  \     INNER JOIN #Tmp_FileGroupDetails Tmp\n          ON D.object_id = Tmp.TableObjectID\n\
  \n-- Column Counts (列计数)\n; WITH NoCols_CTE (SCHEMA_NAME, TABLE_NAME, object_id,\
  \ NoCols) AS (\n    SELECT   TOP (100) PERCENT\n             SCH.name AS SCHEMA_NAME,\n\
  \             TBL.name AS TABLE_NAME,\n             COL.object_id,\n           \
  \  COUNT(COL.column_id) AS NoCols\n    FROM     sys.columns COL\n             INNER\
  \ JOIN sys.tables TBL\n             ON COL.object_id = TBL.object_id\n         \
  \    INNER JOIN sys.schemas SCH\n             ON TBL.schema_id = SCH.schema_id\n\
  \    GROUP BY COL.object_id, TBL.name, SCH.name\n)\nUPDATE D\nSET    D.NbrColumns\
  \ = CTE.NoCols\nFROM   #MetaData_Tables D\n       INNER JOIN NoCols_CTE CTE\n  \
  \     ON D.object_id = CTE.object_id\n\n-- Heaps (堆)\nUPDATE #MetaData_Tables\n\
  SET    IsHeap = 1\nWHERE  object_id IN(\n           SELECT DISTINCT TBL.object_id\n\
  \           FROM      sys.tables TBL\n                     INNER JOIN sys.schemas\
  \ SCH\n                     ON TBL.schema_id = SCH.schema_id\n                 \
  \    INNER JOIN sys.indexes SIX\n                     ON TBL.object_id = SIX.object_id\n\
  \           WHERE     SIX.type_desc = N'HEAP'\n       )\n\n-- Rows (行数)\n; WITH\
  \ RowCount_CTE (SCHEMA_NAME, TABLE_NAME, object_id, NoRows) AS (\n    SELECT SCH.name\
  \ AS SCHEMA_NAME,\n           TBL.name AS TABLE_NAME,\n           TBL.object_id,\n\
  \           SSX.rows\n    FROM   sys.tables TBL\n           INNER JOIN sys.schemas\
  \ SCH\n           ON TBL.schema_id = SCH.schema_id\n           INNER JOIN sys.sysindexes\
  \ SSX\n           ON TBL.object_id = SSX.id\n)\nUPDATE D\nSET    D.NoRows = CTE.NoRows\n\
  FROM   #MetaData_Tables D\n       INNER JOIN RowCount_CTE CTE\n       ON D.object_id\
  \ = CTE.object_id\n\n-- Indexes (索引)\n; WITH Indexes_CTE (SCHEMA_NAME, TABLE_NAME,\
  \ object_id, NoIndexes) AS (\n    SELECT SCH.name AS SCHEMA_NAME,\n           TBL.name\
  \ AS TABLE_NAME,\n           TBL.object_id,\n           COUNT(SIX.index_id) AS NoIndexes\n\
  \    FROM      sys.tables TBL\n              INNER JOIN sys.schemas SCH\n      \
  \        ON TBL.schema_id = SCH.schema_id\n              INNER JOIN sys.indexes\
  \ SIX\n              ON TBL.object_id = SIX.object_id\n    GROUP BY  SCH.name, TBL.name,\
  \ TBL.object_id\n)\nUPDATE      D\nSET         D.NoIndexes = CTE.NoIndexes\nFROM\
  \        #MetaData_Tables D\n            INNER JOIN Indexes_CTE CTE\n          \
  \  ON D.object_id = CTE.object_id\n\n-- Compression (压缩)\n; WITH Compression_CTE\
  \ AS (\n    SELECT SCH.name AS SCHEMA_NAME,\n           TBL.name AS TABLE_NAME,\n\
  \           PRT.data_compression_desc,\n           TBL.object_id\n    FROM     \
  \  sys.partitions PRT\n               INNER JOIN sys.tables TBL\n              \
  \ ON PRT.object_id = TBL.object_id\n               INNER JOIN sys.schemas SCH\n\
  \               ON TBL.schema_id = SCH.schema_id\n    WHERE PRT.index_id = 0 OR\
  \ PRT.index_id = 1\n)\nUPDATE       D\nSET          D.DataCompression = CTE.data_compression_desc\n\
  FROM         #MetaData_Tables D\n             INNER JOIN Compression_CTE CTE\n \
  \            ON D.object_id = CTE.object_id\n\nSELECT * FROM #MetaData_Tables; --\
  \ 是的，SELECT * 不好——但在这里它节省了空间！\n```\n\n## 输出示例\n脚本的输出（为方便书籍阅读而分成几个部分）如图 8-3 所示。\n\
  \n![9781430247913_Fig08-03.jpg](img/9781430247913_Fig08-03.jpg)\n\n**图 8-3.** 配方\
  \ 8-6 中脚本返回的元数据\n\n## 原理说明\n了解 SQL Server 元数据主题非常重要，原因如下：\n*   如果你在处理 SQL Server\
  \ 源数据，容易认为这是简单部分，从而急于创建数据流，后来却因数据类型限制或约束导致未预见的意外问题而受挫。当然，这些问题总是你从未预料到的，因此需要花费数小时调试。\n\
  *   当处理 SQL Server 表时（无论是暂存表还是最终数据库表，可能不是你设计的），尽可能多地预先了解是有益的。将 SQL Server 目标元数据与源元数据一样进行隔离和分析，可以让你干净、高效地比较两者。\n\
  \n查询 SQL Server 数据库元数据的方法多种多样。事实上，你可能疑惑为什么需要了解这么多提取源数据的方法。答案是——你永远不知道什么时候会需要用到每一种，因此最好了解它们的存在。\n\
  \n对于源元数据的深入细节，没有什么能比得上系统视图。正如你可能已经发现的那样，正确使用它们需要深入理解其工作原理。由于这并非易事，我提出了两个脚本（本配方和下一个），可以相对深入地分析表（或视图）和列的\
  \ SQL Server 元数据。如果这些脚本提供的信息过多，你可以降低其复杂性并限制其提供的元数据。主要的是要有一个工具来启动你的分析。本配方中使用的脚本有望成为这样的起点，并返回如表\
  \ 8-6 所示的表元数据。\n\n**表 8-6.** 配方 8-6 中脚本返回的表元数据\n\n| 字段名 | 描述 |\n| --- | --- |\n\
  | `SCHEMA_NAME` | 表所属的架构。 |\n| `TABLE_NAME` | 表名。 |\n| `object_id` | 系统元数据使用的内部对象\
  \ ID。 |\n| `TableType` | 表类型（表或视图）。 |\n| `DateCreated` | 表创建的日期。 |\n| `DateModified`\
  \ | 表修改的日期。 |\n| `uses_ansi_nulls` | 该表使用`ANSI NULLS`。 |\n| `text_in_row_limit`\
  \ | 行内存储的 LOB 的上限（以字节为单位）。 |\n| `large_value_types_out_of_row` | 大值存储在行外。 |\n| `IsCDCTracked`\
  \ | 该表使用变更数据捕获跟踪变更。 |\n| `lock_escalation_desc` | 表的锁升级阈值。 |\n| `LobDataSpace` |\
  \ 表的 LOB 列的 LOB 数据空间类型。 |\n| `FilestreamDataSpace` | 表的`FILESTREAM`列的`FILESTREAM`数据空间类型。\
  \ |\n| `DataSpace` | 表数据空间。 |\n| `DataSpaceType` | 表数据空间类型。 |\n| `NbrColumns` |\
  \ 表中的列数。 |\n| `IsHeap` | 该表是堆（没有聚集索引）。 |\n| `NoIndexes` | 表上的索引数量。 |\n| `NoRows`\
  \ | 表中的行数。 |\n| `HasAfterTrigger` | 该表有 After 触发器。 |\n| `HasDeleteTrigger` | 该表有\
  \ Delete 触发器。 |\n| `HasInsertTrigger` | 该表有 Insert 触发器。 |\n| `HasInsteadOfTrigger`\
  \ | 该表有 Instead Of 触发器。 |\n| `HasUpdateTrigger` | 该表有 Update 触发器。 |\n| `IsAnsiNullsOn`\
  \ | `ANSI NULLS`对该表处于活动状态。 |\n| `IsEncrypted` | 该表已加密。 |\n| `IsIndexed` | 该表有索引。\
  \ |\n| `IsIndexable` | 该表可以被索引。 |\n| `IsQuotedIdentOn` | 该表使用引号标识符。 |\n| `IsSystemTable`\
  \ | 该表是系统表。 |\n| `IsUserTable` | 该表是用户表。 |\n| `DeleteTriggerCount` | 与表关联的删除触发器数量。\
  \ |\n| `FullTextBackgroundUpdateIndexOn` | 该表的全文索引的后台索引更新处于活动状态。 |\n| `FulltextCatalogId`\
  \ | 任何全文目录的 ID。 |\n| `FulltextChangeTrackingOn` | 全文索引的变更跟踪处于活动状态。 |\n| `FulltextKeyColumn`\
  \ | 全文索引的关键列。 |\n| `HasActiveFulltextIndex` | 该表有活动的全文索引。 |\n| `HasCheckCnst` |\
  \ 该表有检查约束。 |\n| `HasClustIndex` | 该表有聚集索引。 |\n| `HasDefaultCnst` | 该表有默认约束。 |\n\
  | `HasForeignKey` | 该表包含外键。 |\n\n\n\n#### 提示、技巧与陷阱\n*   我意识到，在这个示例中使用 `SELECT *`\
  \ 返回脚本的最终输出违反了所有已知的最佳实践，但这可以节省书籍的篇幅。你可以——也应该——只选择你需要的列。\n\n#### 8-7. 分析 SQL Server\
  \ 列元数据\n### 问题\n你需要获取 SQL Server 列元数据以进行分析。\n\n### 解决方案\n使用 SQL Server 系统目录视图返回完整的列元数据。\n\
  \n运行以下脚本将为你提供指定数据库中所有 SQL Server 列的详尽信息（`C:\\SQL2012DIRecipes\\CH08\\SQLServerColumnMetadata.sql`）：\n\
  ```sql\nDECLARE @SERVER_NAME NVARCHAR(128) = @@SERVERNAME\nDECLARE @DATABASE_NAME\
  \ NVARCHAR(128) = DB_NAME()\n\n------------------------------------------\n\nIF\
  \ OBJECT_ID('tempdb..#Metadata_ColumnTableType') IS NOT NULL\n    DROP TABLE tempdb..#Metadata_ColumnTableType;\n\
  \nCREATE TABLE #Metadata_ColumnTableType\n(\n    SERVER_NAME VARCHAR(128) NULL,\n\
  \    DATABASE_NAME VARCHAR(128) NULL,\n    TABLE_SCHEMA VARCHAR(8) NULL,\n    TABLE_NAME\
  \ VARCHAR(8) NULL,\n    COLUMN_NAME VARCHAR(8) NULL,\n    column_id INT NULL,\n\
  \    DataType VARCHAR(8) NULL,\n    ColLength INT NULL,\n    precision TINYINT NULL,\n\
  \    scale TINYINT NULL,\n    CollationName VARCHAR(8) NULL,\n    IsNullable BIT\
  \ NULL,\n    IsIdentity BIT NULL,\n    IsComputed BIT NULL,\n    IsFileStream BIT\
  \ NULL,\n    IsSparse BIT NULL,\n    IsColumnSet BIT NULL,\n    object_id INT NULL,\n\
  \    default_object_id INT NULL,\n    ColDefinition VARCHAR(max) NULL,\n    DefaultName\
  \ VARCHAR(250) NULL,\n    DefaultDefinition VARCHAR(max) NULL,\n    IsFulltextIndexed\
  \ BIT NULL,\n    CalcDefinition VARCHAR(4000) NULL,\n    CHARACTER_SET_NAME VARCHAR(250)\
  \ NULL,\n    IsPersisted BIT NULL,\n    IsCharCol INT NULL,\n    IdentitySeedValue\
  \ INT NULL,\n    IdentityIncrementValue INT NULL,\n    IdentityLastValue BIGINT\
  \ NULL,\n    DateCreated datetime NULL,\n    DateModified datetime NULL,\n    FullTextTypeColumn\
  \ INT NULL,\n    IsIndexable INT NULL,\n    IsRowGuidCol INT NULL,\n    IsXmlIndexable\
  \ INT NULL,\n    UsesAnsiTrim INT NULL\n)\n\nINSERT INTO #Metadata_ColumnTableType\n\
  (\n    SERVER_NAME,\n    DATABASE_NAME,\n    TABLE_SCHEMA,\n    TABLE_NAME,\n  \
  \  COLUMN_NAME,\n    column_id,\n    DataType,\n    ColLength,\n    precision,\n\
  \    scale,\n    CollationName,\n    IsNullable,\n    IsIdentity,\n    IsComputed,\n\
  \    IsFileStream,\n    IsSparse,\n    IsColumnSet,\n    object_id,\n    default_object_id,\n\
  \    ColDefinition,\n    DefaultName,\n    DefaultDefinition,\n    IsFulltextIndexed,\n\
  \    CalcDefinition,\n    CHARACTER_SET_NAME,\n    IsPersisted,\n    IsCharCol,\n\
  \    IdentitySeedValue,\n    IdentityIncrementValue,\n    IdentityLastValue,\n \
  \   DateCreated,\n    DateModified,\n    FullTextTypeColumn,\n    IsIndexable,\n\
  \    IsRowGuidCol,\n    IsXmlIndexable,\n    UsesAnsiTrim\n)\n\nSELECT DISTINCT\n\
  \    @SERVER_NAME,\n    @DATABASE_NAME,\n    SCH.name AS TABLE_SCHEMA,\n    TBL.name\
  \ AS TABLE_NAME,\n    COL.name AS COLUMN_NAME,\n    COL.column_id,\n    TYP.name\
  \ AS DataType,\n    CASE WHEN TYP.name IN ('nchar','NVARCHAR') THEN (COL.max_length\
  \ / 2)\n    ELSE COL.max_length\n    END AS ColLength,\n    COL.precision,\n   \
  \ COL.scale,\n    COL.collation_name AS CollationName,\n    COL.is_nullable AS IsNullable,\n\
  \    COL.is_identity AS IsIdentity,\n    COL.is_computed AS IsComputed,\n    COL.is_filestream\
  \ AS IsFileStream,\n    COL.is_sparse AS IsSparse,\n    COL.is_column_set AS IsColumnSet,\n\
  \    COL.object_id,\n    COL.default_object_id,\n    CAST('' AS VARCHAR(MAX)) AS\
  \ ColDefinition,\n    CAST('' AS VARCHAR(250)) AS DefaultName,\n    CAST('' AS VARCHAR(MAX))\
  \ AS DefaultDefinition,\n    CAST(NULL AS BIT) AS IsFulltextIndexed,\n    CAST(''\
  \ AS VARCHAR(4000)) AS CalcDefinition,\n    CAST('' AS VARCHAR(250)) AS CHARACTER_SET_NAME,\n\
  \    CAST(0 AS BIT) AS IsPersisted,\n    CASE WHEN TYP.collation_name IS NOT NULL\
  \ THEN 1\n    ELSE 0\n    END AS IsCharCol,\n    CAST(0 AS INT) AS IdentitySeedValue,\n\
  \    CAST(0 AS INT) AS IdentityIncrementValue,\n    CAST(0 AS BIGINT) AS IdentityLastValue,\n\
  \    OBJ.create_date AS DateCreated,\n    OBJ.modify_date AS DateModified,\n   \
  \ COLUMNPROPERTY(TBL.object_id, COL.name, 'FullTextTypeColumn') AS FullTextTypeColumn,\n\
  \    COLUMNPROPERTY(TBL.object_id, COL.name, 'IsIndexable') AS IsIndexable,\n  \
  \  COLUMNPROPERTY(TBL.object_id, COL.name, 'IsRowGuidCol') AS IsRowGuidCol,\n  \
  \  COLUMNPROPERTY(TBL.object_id, COL.name, 'IsXmlIndexable') AS IsXmlIndexable,\n\
  \    COLUMNPROPERTY(TBL.object_id, COL.name, 'UsesAnsiTrim') AS UsesAnsiTrim\nFROM\
  \ sys.types AS TYP\n    INNER JOIN sys.columns AS COL ON TYP.user_type_id = COL.user_type_id\n\
  \    INNER JOIN sys.tables AS TBL\n    INNER JOIN sys.schemas AS SCH ON TBL.schema_id\
  \ = SCH.schema_id\n    INNER JOIN sys.objects AS OBJ ON TBL.object_id = OBJ.object_id\
  \ ON COL.object_id = TBL.object_id\nWHERE TBL.type_desc = 'USER_TABLE'\n    AND\
  \ TBL.is_ms_shipped = 0\nORDER BY TABLE_SCHEMA, TABLE_NAME, COL.column_id\n\nIF\
  \ OBJECT_ID('tempdb..#Tmp_ColFileStream') IS NOT NULL\n    DROP TABLE tempdb..#Tmp_ColFileStream;\n\
  \nSELECT SCH.name AS TABLE_SCHEMA,\n    TTP.name AS TABLE_NAME,\n    COL.name AS\
  \ COLUMN_NAME,\n    COL.is_filestream AS IsFileStream\nINTO #Tmp_ColFileStream\n\
  FROM sys.columns COL\n    INNER JOIN sys.table_types TTP ON COL.object_id = TTP.\n\
  ```\n\n| | `HasForeignRef` | 表包含外键引用。 |\n|---|---|---|\n| | `HasIdentity` | 表包含\
  \ `IDENTITY` 列。 |\n| | `HasIndex` | 表具有索引。 |\n| | `HasNonclustIndex` | 表具有聚集索引。\
  \ |\n| | `HasPrimaryKey` | 表具有主键。 |\n| | `HasRowGuidCol` | 表具有行 GUID 列。 |\n| | `HasTextImage`\
  \ | 具有 `TEXT`、`IMAGE`、`VARCHAR(MAX)` 或 `VARBINARY(MAX)` 列。 |\n| | `HasTimestamp`\
  \ | 表具有 `Timestamp` 列。 |\n| | `HasUniqueCnst` | 表具有唯一约束。 |\n| | `HasVarDecimalStorageFormat`\
  \ | `VarDecimal` 压缩处于活动状态。 |\n| | `InsertTriggerCount` | 与表关联的插入触发器数量。 |\n| | `UpdateTriggerCount`\
  \ | 与表关联的更新触发器数量。 |\n| | `HasColumnSet` | 表包含列集。 |\n| | `DataCompression` | 此表启用了数据压缩。\
  \ |\n\n该脚本使用 `@SERVER_NAME` 和 `@DATABASE_NAME` 输入参数来定义要分析的服务器和数据库。它们默认为当前服务器和数据库，但你可以修改。然后，它创建一个会话范围的临时表来保存所有必需的元数据。在第一次遍历中，它使用“核心”目录视图（`sys.tables`、`sys.data_spaces`\
  \ 和 `sys.schemas`）以及一系列 `OBJECTPROPERTY` 函数来获取相当完整的元数据集。之后，一系列子进程使用各种系统目录视图（`sys.columns`、`sys.sysindexes`\
  \ 和 `sys.partitions`）来返回和计算其他较难获取的元数据元素。\n\n\ntype_table_object_id   INNER JOIN\
  \ sys.schemas SCH   ON TTP.schema_id = SCH.schema_id\n\nIF OBJECT_ID('tempdb..#Tmp_ColCalculated')\
  \ IS NOT NULL DROP TABLE tempdb..#Tmp_ColCalculated;\n\nSELECT\n    SCH.name AS\
  \ TABLE_SCHEMA,\n    TTP.name AS TABLE_NAME,\n    COL.name AS COLUMN_NAME,\n   \
  \ COL.is_persisted AS IsPersisted,\n    COL.definition AS CalcDefinition\nINTO #Tmp_ColCalculated\n\
  FROM sys.table_types TTP\n    INNER JOIN sys.schemas AS SCH ON TTP.schema_id = SCH.schema_id\n\
  \    INNER JOIN sys.computed_columns COL ON TTP.type_table_object_id = COL.object_id;\n\
  \n-- 列默认值\nIF OBJECT_ID('tempdb..#Tmp_ColDefault') IS NOT NULL DROP TABLE tempdb..#Tmp_ColDefault;\n\
  \nSELECT\n    SCH.name AS TABLE_SCHEMA,\n    TTP.name AS TABLE_NAME,\n    COL.name\
  \ AS COLUMN_NAME,\n    SDC.name AS DefaultName,\n    SDC.definition AS DefaultDefinition\n\
  INTO #Tmp_ColDefault\nFROM sys.default_constraints SDC\n    INNER JOIN sys.columns\
  \ COL ON SDC.parent_object_id = COL.object_id AND SDC.parent_column_id = COL.column_id\n\
  \    INNER JOIN sys.table_types TTP ON COL.object_id = TTP.type_table_object_id\n\
  \    INNER JOIN sys.schemas SCH ON SCH.schema_id = TTP.schema_id;\n\n-- 标识列详细信息\n\
  IF OBJECT_ID('tempdb..#Tmp_IdentityDetails') IS NOT NULL DROP TABLE tempdb..#Tmp_IdentityDetails;\n\
  \nSELECT\n    SCH.name AS TABLE_SCHEMA,\n    TTP.name AS TABLE_NAME,\n    ICL.name\
  \ AS COLUMN_NAME,\n    ICL.column_id,\n    CAST(ICL.seed_value AS INT) AS seed_value,\n\
  \    CAST(ICL.increment_value AS INT) AS increment_value,\n    CAST(ICL.last_value\
  \ AS BIGINT) AS last_value,\n    ICL.object_id\nINTO #Tmp_IdentityDetails\nFROM\
  \ sys.table_types TTP\n    INNER JOIN sys.schemas SCH ON TTP.schema_id = SCH.schema_id\n\
  \    INNER JOIN sys.identity_columns ICL ON TTP.type_table_object_id = ICL.object_id;\n\
  \n-- 使用 FILESTREAM 数据更新\nUPDATE DM\nSET DM.IsFileStream = FS.IsFileStream\nFROM\
  \ #Metadata_ColumnTableType DM\n    INNER JOIN #Tmp_ColFileStream FS ON FS.TABLE_SCHEMA\
  \ = DM.TABLE_SCHEMA\n        AND FS.TABLE_NAME = DM.TABLE_NAME\n        AND FS.COLUMN_NAME\
  \ = DM.COLUMN_NAME;\n\n-- 使用计算列数据更新\nUPDATE DM\nSET DM.CalcDefinition = CC.CalcDefinition,\n\
  \    DM.IsPersisted = CC.IsPersisted\nFROM #Metadata_ColumnTableType DM\n    INNER\
  \ JOIN #Tmp_ColCalculated CC ON DM.TABLE_SCHEMA = CC.TABLE_SCHEMA\n        AND DM.TABLE_NAME\
  \ = CC.TABLE_NAME\n        AND DM.COLUMN_NAME = CC.COLUMN_NAME;\n\n-- 使用默认值更新\n\
  UPDATE DM\nSET DM.DefaultDefinition = CONVERT(VARCHAR(MAX), CD.DefaultDefinition),\n\
  \    DM.DefaultName = CD.DefaultName\nFROM #Metadata_ColumnTableType DM\n    INNER\
  \ JOIN #Tmp_ColDefault CD ON DM.TABLE_SCHEMA = CD.TABLE_SCHEMA\n        AND DM.TABLE_NAME\
  \ = CD.TABLE_NAME\n        AND DM.COLUMN_NAME = CD.COLUMN_NAME;\n\n-- 更新全文索引标识\n\
  UPDATE Tmp\nSET Tmp.IsFulltextIndexed = 1\nFROM #Metadata_ColumnTableType Tmp\n\
  \    INNER JOIN sys.fulltext_index_columns FTI ON Tmp.object_id = FTI.object_id\n\
  \        AND Tmp.Column_id = FTI.Column_id;\n\n-- 更新标识列详细信息\nUPDATE DM\nSET DM.IdentitySeedValue\
  \ = Tmp.seed_value,\n    DM.IdentityIncrementValue = Tmp.increment_value,\n    DM.IdentityLastValue\
  \ = Tmp.last_value\nFROM #Metadata_ColumnTableType DM\n    INNER JOIN #Tmp_IdentityDetails\
  \ TMP ON DM.object_id = Tmp.object_id\n        AND DM.column_id = Tmp.column_id;\n\
  \nSELECT * from #Metadata_ColumnTableType;  -- 我又一次邪恶地使用了 SELECT *\n\n```\n\n输出结果如[图\
  \ 8-4 所示。\n\n![9781430247913_Fig08-04.jpg](img/9781430247913_Fig08-04.jpg)\n\n图\
  \ 8-4. 配方 8-7 中脚本返回的列元数据\n\n## 工作原理\n\n返回列元数据可以通过这个脚本相当简单地完成，我希望你觉得它足够详尽。返回的列元数据显示在表\
  \ 8-7 中。\n\n表 8-7. 列元数据\n\n| 字段名 | 描述 |\n| --- | --- |\n| `SERVER_NAME` | 服务器名称。\
  \ |\n| `DATABASE_NAME` | 数据库名称。 |\n| `TABLE_SCHEMA` | 表所属的架构。 |\n| `TABLE_NAME`\
  \ | 表名。 |\n| `COLUMN_NAME` | 列名。 |\n| `column_id` | 系统元数据使用的内部列 ID。 |\n| `DataType`\
  \ | SQL Server 数据类型。 |\n| `ColLength` | 列长度。 |\n| `precision` | 列的数值精度（总位数）。 |\n\
  | `scale` | 列的数值刻度（小数点后的位数）。 |\n| `CollationName` | SQL Server 排序规则。 |\n| `IsNullable`\
  \ | 该列可以包含 `NULL` 值。 |\n| `IsIdentity` | 该列是 `IDENTITY` 列。 |\n| `IsComputed` | 该列包含计算值。\
  \ |\n| `IsFileStream` | 该列是 `FILESTREAM` 列。 |\n| `IsSparse` | 该列包含稀疏数据。 |\n| `IsColumnSet`\
  \ | 该列是列集的一部分。 |\n| `object_id` | 系统元数据使用的内部对象 ID。 |\n| `default_object_id` | 任何独立默认值的\
  \ ID。 |\n| `ColDefinition` | 列定义。 |\n| `DefaultName` | 列默认值的名称（如果存在）。 |\n| `DefaultDefinition`\
  \ | 列默认值。 |\n| `IsFulltextIndexed` | 该列使用全文索引进行索引。 |\n| `CalcDefinition` | 计算列的列计算公式。\
  \ |\n| `CHARACTER_SET_NAME` | 使用的字符集。 |\n| `IsPersisted` | 列值已持久化存储在表中。 |\n| `IsCharCol`\
  \ | 该列是文本类型。 |\n| `IdentitySeedValue` | `IDENTITY` 的起始值。 |\n| `IdentityIncrementValue`\
  \ | `IDENTITY` 的增量值。 |\n| `IdentityLastValue` | 最后一个 `IDENTITY` 值。 |\n| `DateCreated`\
  \ | 列创建的日期。 |\n| `DateModified` | 列修改的日期。 |\n| `FullTextTypeColumn` | 该列是全文索引的一部分。\
  \ |\n| `IsIndexable` | 该列可以被索引。 |\n| `IsRowGuidCol` | 该列包含行 GUID。 |\n| `IsXmlIndexable`\
  \ | 该列可以支持 XML 索引。 |\n| `UsesAnsiTrim` | 该列使用 ANSI TRIM。 |\n\n与上一个配方中的脚本类似，该脚本接受\
  \ `@SERVER_NAME` 和 `@DATABASE_NAME` 输入参数来定义服务器和分析数据库。变量默认为当前服务器和数据库，但您可以修改。然后，它会创建一个会话范围的临时表来保存列级信息所需的所有元数据。首先遍历元数据，使用\
  \ `sys.tables`、`sys.types`、`sys.schemas` 和 `sys.objects`——以及许多 `COLUMNPROPERTY`\
  \ 函数——来返回一组核心列元数据。然后，一系列后续进程返回 `FILESTREAM` 信息、计算列元数据、默认值和 `IDENTITY` 元数据，以及全文元数据。然后使用这些数据来更新临时表。\n\
  \n## 提示、技巧和陷阱\n\n-   如果需要，可以使用 `SELECT...INTO` 替换脚本末尾的简单 `SELECT`，将此脚本返回的数据输出到磁盘。\n\
  -   您可能会发现此脚本返回的数据对于您的需求来说过于详细。如果不需要，请随意减少返回的信息量。\n-   请记住，您可以使用 SSMS 查看基本元数据。嗯，是的——某种程度上。首先，最显而易见的一点是，让我们记住，如果您可以在\
  \ SSMS 中连接到 SQL Server 数据库（并且如果您有足够的权限），您可以展开一个表以查看列名、数据类型和长度。您还可以展开键、约束、触发器、索引和统计信息。\n\
