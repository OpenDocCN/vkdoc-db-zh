  CH15\\pr_LogCounters.Sql`）：\n\n```\nCREATE PROCEDURE CarSales_Logging.log.\n```\n\
  \n\n\n#### 15-15. 从 SSIS 记录计数器\n\n#### 问题\n\n您希望记录计数器（记录数）以跟踪 SSIS 包所有重要阶段处理的记录数量。\n\
  \n#### 解决方案\n\n使用 SSIS 的`Row Count`任务捕获记录数，然后将其写入您自定义的计数器日志框架。\n\n1.  创建在配方 15-14\
  \ 中描述的`Log_ProcessCounters`表和`pr_LogCounters`存储过程。\n2.  在控制流窗格中右键单击，然后选择“变量”，打开变量窗格。\n\
  3.  单击“添加变量”按钮并为变量命名。确保它是足够大小的整数。在本配方中，我将使用名称`NumberOfRecordsHandled`。\n4.  添加一个数据流任务，双击进行编辑。\n\
  \n```sql\npr_LogCounters     (     @CounterType NVARCHAR(250)     ,@CounterDescription\
  \  NVARCHAR(250)     ,@CounterResult BIGINT     ,@ProcessName NVARCHAR(150) = NULL\
  \     ,@ProcessStep NVARCHAR(150) = NULL     ,@UserName NVARCHAR(150) = NULL   \
  \  ,@ComputerName NVARCHAR(150) =  NULL     )          AS          DECLARE @PROCESSID\
  \ INT     SELECT @PROCESSID = MAX(ID) FROM dbo.ProcessHistory          INSERT INTO\
  \ dbo.Log_ProcessCounters     (     ProcessID     ,CounterType     ,CounterDescription\
  \     ,CounterResult     ,ProcessName     ,ProcessStep     ,UserName     ,ComputerName\
  \          )          VALUES     (     @PROCESSID     ,@CounterType     ,@CounterDescription\
  \     ,@CounterResult     ,@ProcessName     ,@ProcessStep     ,@UserName     ,@ComputerName\
  \     )\n```\n\n5.  添加一个源组件，配置为连接到任何有效源。我将使用`CarSales`数据库和`Clients`表。\n6.  在数据流窗格中添加一个`Row\
  \ Count`任务。将源组件连接到它。\n7.  双击`Row Count`任务进行编辑。\n8.  从“变量”属性的变量列表中选择您刚创建的变量。最终应得到类似图\
  \ 15-7 所示的结果。\n\n![9781430247913_Fig15-07.jpg](img/9781430247913_Fig15-07.jpg)\n\
  \n图 15-7。为`Row Count`任务选择变量\n\n9.  单击“确定”。\n10. 添加一个目标组件，配置为使用任何有效的 SQL Server 目标数据库。我建议使用`CarSales_Staging`数据库和`Client`表，如附录\
  \ B 中所述。\n11. 将`Rowcount`任务连接到目标组件。双击目标组件并映射列。\n12. 选择控制流窗格，在最后一个要执行的任务（本例中是数据流任务）之后的控制流上添加一个“执行\
  \ SQL 任务”。将前一个任务连接到这个新任务。\n13. 双击编辑“执行 SQL 任务”，并添加或创建一个 ADO.NET 连接。将其命名为`LogCounters`。连接到您将记录计数器的服务器和数据库。\n\
  14. 在对话框的左侧窗格中单击“参数映射”，并设置以下参数：\n\n| 变量名 | 方向 | 数据类型 | 参数名 |\n| :--- | :--- | :---\
  \ | :--- |\n| `System::MachineName` | 输入 | 字符串 | `@MachineName` |\n| `System::PackageName`\
  \ | 输入 | 字符串 | `@PackageName` |\n| `System::UserName` | 输入 | 字符串 | `@UserName` |\n\
  | `User::NumberOfRecordsHandled` | 输入 | Int32 | `@Counter` |\n\n15. 将以下内容设置为 SQL\
  \ 语句：\n\n```sql\nEXECUTE CarSales_Logging.log.pr_LogCounters 'SourceData', 'Rows\
  \ added to myTable', @Counter, @PackageName, 'Insert Data', @UserName, @MachineName\n\
  ```\n\n16. 单击“确定”确认您的修改。\n\n运行此包时，存储 SSIS 用户变量记录的行数的计数器将被写入日志表。\n\n#### 工作原理\n\n\
  在运行 SSIS 任务时，您可能需要记录关键计数器，可能包括输入行、输出行和错误行。\n\n计数器可以记录到 SQL Server 表、文本文件或 XML 文件中。它们可以在进程执行过程中记录，也可以在包结束时记录。此方法在进程执行期间捕获行计数，然后将其写入目标表。\n\
  \n计数器记录就像在 SSIS 数据流任务（无论是数据流源、数据流转换等等）内部添加一个`Row Counter`任务一样简单。`Row Counter`将记录在`Row\
  \ Counter`任务所在位置通过数据管道的数据行数。\n\n#### 提示、技巧和陷阱\n\n*   如果希望记录多个计数器，则每个都必须定义为单独的变量。但是，您可以将所有计数器作为单个“执行\
  \ SQL 任务”的一部分写入日志表，在该任务中多次调用`pr_LogCounters`存储过程。在这种情况下，您必须记得在此任务中将所有“计数器”变量设置为参数。\n\
  *   请记住，SSIS 变量作用域可能会困扰疲倦或不小心的程序员。如果您希望避免在调试时浪费大量时间，请最好在包级别设置所有用户定义变量（方法是在定义它们之前单击控制流窗格）。\n\
  *   如果您愿意，可以使用 OLEDB 连接管理器，但这需要使用位置参数，我个人觉得这非常繁琐，因此我只能鼓励您使用 ADO.NET 连接管理器。\n\n###\
  \ 15-14. 从存储过程记录计数器（续）\n\n一旦计数器日志表和存储过程就位，记录任何可以设置内置`@@ROWCOUNT`全局变量的事件就很简单，只需使用以下代码。在存储过程的开头，确保存在以下行：\n\
  \n```sql\nDECLARE @ProcName VARCHAR(128)\nDECLARE @UserName VARCHAR(128)\nSET @ProcName\
  \ = OBJECT_NAME(@@PROCID)\nSELECT @UserName = USER_NAME()\n```\n\n在每个要记录的事件处，添加以下代码片段：\n\
  \n```sql\nEXECUTE CarSales_Logging.log.pr_LogCounters\n'SourceData'\n,'Rows Truncated\
  \ from myTable'\n,@@ROWCOUNT\n,@ProcName\n,'Truncate table'\n,@UserName\n,@@SERVERNAME\n\
  ```\n\n#### 工作原理（针对配方 15-14）\n\n记录计数器是对配方 15-8 中描述的日志记录技术的扩展。我这里建议不要跳过实现计数器记录，因为如果您想跟踪、建立基线和改进任何数据加载过程，它可能非常有用。我假设所有计数器都是由进程步骤生成的，因此我包含了对进程名称和步骤的引用，以便您可以将两者联系起来。`@CounterType`参数是为了便于以后分析和分类计数器。当然，如果您觉得它对您的日志记录要求没有用，可以将其删除。\n\
  \n#### 提示、技巧和陷阱（针对配方 15-14）\n\n*   在进程结束时记录所有计数器（与在每个步骤后记录相反）速度稍快，但与整体处理时间相比，这种差异通常微乎其微，不应影响您的设计决策。此外，将多个计数器变量传递给单个“执行\
  \ SQL 任务”所涉及的工作量也不容小觑。事实上，考虑到这种方法潜在的错误风险，我认为最好避免使用。\n*   请记住，`@@ROWCOUNT`几乎在存储过程中的每个事件中都会被\
  \ SQL Server 更新。这意味着，如果您担心`@@ROWCOUNT`捕获的数字可能不是您想要的，则必须捕获结果并将其传递给用户定义的变量，然后在调用`pr_LogCounters`存储过程时使用该变量。\n\
  *   在`pr_LogCounters`存储过程中将除三个必需参数外的所有参数的默认值定义为`NULL`的原因是，这样如果您对其他日志记录元素不感兴趣，就可以始终使用简化的存储过程调用。\n\
  \n\n#### 15-16. 创建 SSIS 目录\n\n### 问题\n\n您希望利用 SQL Server 2012 提供的功能，从 SQL Server\
  \ 数据库存储并运行 SSIS 包。\n\n### 解决方案\n\n创建一个 SSIS 目录，并将 SSIS 项目部署到其中。\n\n1.  在 SSMS 中，右键单击\
  \ `Integration Services Catalogs`，然后选择 `Create Catalog`。\n2.  为保护数据库的加密密钥添加一个密码。\n\
  3.  单击 `OK`。\n4.  展开 `Integration Services Catalogs`，右键单击 `SSISDB` 并选择 `Create Folder`。\n\
  5.  输入文件夹名称并单击 `OK`。\n\n至此，您已创建了一个 SSIS 目录，因此可以将 SSIS 项目部署到其中。步骤如下：\n\n6.  在 SSDT\
  \ 中，打开一个项目。选择 `Project` -> `<Project name> Properties`。您项目的 `Pages` 属性对话框将出现，如 图\
  \ 15-8 所示。\n\n![9781430247913_Fig15-08.jpg](img/9781430247913_Fig15-08.jpg)\n图 15-8.\
  \ SSIS 项目属性\n\n7.  在左侧窗格中展开 `Configuration Properties` 并单击 `Deployment`。添加您将要部署到的服务器和\
  \ `Server Project Path`。对话框应如 图 15-9 所示。\n\n![9781430247913_Fig15-09.jpg](img/9781430247913_Fig15-09.jpg)\n\
  图 15-9. 用于部署的 SSIS 项目属性\n\n8.  单击 `OK` 完成项目属性配置。\n9.  在 `Solution Explorer` 中右键单击项目并选择\
  \ `Deploy` 来部署您的 SSIS 包。\n10. 如果看到起始页，请单击 `Next`。\n11. 在 `Select Source` 窗格中，确认项目是您希望部署的那个。对话框应如\
  \ 图 15-10 所示。\n\n![9781430247913_Fig15-10.jpg](img/9781430247913_Fig15-10.jpg)\n\
  图 15-10. 选择要部署到 SSIS 目录的源项目\n\n12. 单击 `Next`。\n13. 在 `Select Destination` 窗格中，输入或浏览到您希望部署项目的目标服务器和路径。对话框应如\
  \ 图 15-11 所示。\n\n![9781430247913_Fig15-11.jpg](img/9781430247913_Fig15-11.jpg)\n\
  图 15-11. 选择要部署到 SSIS 目录的目标项目\n\n14. 单击 `Next`。对话框应如 图 15-12 所示。\n\n![9781430247913_Fig15-12.jpg](img/9781430247913_Fig15-12.jpg)\n\
  图 15-12. 项目部署审阅窗格\n\n15. 单击 `Deploy`。项目部署完成后，部署向导的结果窗格将出现。它将类似于 图 15-13。\n\n![9781430247913_Fig15-13.jpg](img/9781430247913_Fig15-13.jpg)\n\
  图 15-13. 成功部署 SSIS 项目后的结果窗格\n\n16. 单击 `Close`。\n\n由于您最多只会向 SQL Server 写入几条记录，因此两种连接管理器之间的速度差异根本不成问题。\n\
  \n*   如果传递给存储过程的所有参数都是 SSIS 变量，那么您可以在名为 `LogCounters` 的 `Execute SQL` 任务中将 `IsQueryStoredProcedure`\
  \ 设置为 `True`。然后，您只需使用存储过程名称 (`log.pr_LogCounters`) 作为 `SQL Statement`。\n\n### 工作原理\n\
  \n本质上，SSIS 目录是一个 SQL Server 数据库，它允许您存储 SSIS 项目。一旦项目被部署到这个数据库（或称为 Catalog）中，您就可以从一个中心位置运行包。您还可以为事件和计数器请求不同级别的日志记录，而无需对已部署到目录的包进行任何修改。\n\
  \n我们使用的过程包括以下四个步骤：\n\n*   创建 SQL Server 用来管理 SSIS 项目的 `SSISDB` 数据库。\n*   创建您想要部署项目的任何文件夹。\n\
  *   准备项目。\n*   部署项目。\n\n就是这么简单。然后，您可以通过展开部署目标服务器的 `Integration Services Catalogs`\
  \ 文件夹来查看任何已部署的项目。您将看到您创建的文件夹、项目以及项目中的所有包——类似于 图 15-14 所示的完全简单的示例。\n\n![9781430247913_Fig15-14.jpg](img/9781430247913_Fig15-14.jpg)\n\
  图 15-14. SSMS 中的 Integration Services 目录\n\n### 提示、技巧和陷阱\n\n*   SSIS 目录数据库名为 `SSISDB`，且此名称无法更改。\n\
  *   重新部署项目时，您会收到警告，提示您将覆盖现有项目。\n*   您可以通过在 SSMS 中右键单击目录中存储的任何包，选择 `Execute ...`，然后单击\
  \ `OK` 来运行它。\n*   必须启用 CLR 集成才能创建 SSIS 目录。如果您的环境不是这种情况，以下是启用它的 T-SQL 代码片段：\n\n \
  \   ```sql\n    sp_configure 'show advanced options', 1;\n    GO\n    RECONFIGURE;\n\
  \    GO\n    sp_configure 'clr enabled', 1;\n    GO\n    RECONFIGURE;\n    GO\n\
  \    ```\n\n#### 15-17. 从 SSIS 目录读取已记录的事件和计数器\n\n### 问题\n\n您想使用 SQL Server 2012\
  \ 快速查看 SSIS 目录中提供的事件和计数器。\n\n### 解决方案\n\n显示 SSMS 提供的内置报告。方法如下：\n\n1.  展开 `Integration\
  \ Services Catalogs` -> `SSISDB` -> `<FolderName>` -> `Projects` -> `<ProjectName>`\
  \ -> `Packages`。\n2.  右键单击要执行的包并选择 `Execute`。\n3.  选择 `Advanced` 窗格并将日志记录级别设置为 `Performance`。\n\
  4.  单击 `OK`。包将运行。将出现如下对话框，如 图 15-15 所示。\n\n![9781430247913_Fig15-15.jpg](img/9781430247913_Fig15-15.jpg)\n\
  图 15-15. 在 SSMS 中打开概览报告\n\n5.  单击 `Yes` 显示 `Overview` 报告。您将看到类似 图 15-16 的内容。\n\n\
  ![9781430247913_Fig15-16.jpg](img/9781430247913_Fig15-16.jpg)\n图 15-16. SSMS 中的概览报告\n\
  \n6.  您可以在基础包仍在运行时刷新报告。事实上，在使用目录报告提供的任何数据之前，您应始终确保包已完成。\n\n### 工作原理\n\n既然您已将项目部署到\
  \ SSIS 目录，那么每次运行包时都可以查看事件和指标。实际上，当您使用 SSMS 从目录运行包时，默认情况下此选项是可用的。\n\n以下是可用的三个基本报告：\n\
  \n*   `Overview` 报告\n*   `Performance` 报告\n*   `Messages` 报告\n\n您可以通过单击每个报告中的超链接在报告之间切换。您还可以通过单击\
  \ `Overview` 报告中的 `Execution Path` 元素来查看包中每个任务的执行详细信息。在 图 15-16 中，这些是 `\\Test` 和\
  \ `\\Test\\CarSalesDataFlow`。\n\nSSIS 目录允许您选择日志记录级别；但是，必须在执行包之前选择。可用的四个级别如 表 15-9\
  \ 所示。\n\n\n"
- "# 15-18. 深入分析 SSIS 目录中的事件和计数器\n\n**问题**\n在 SQL Server 2012 中，您希望深入查看 SSIS 目录中选定的事件和计数器。\n\
  \n**解决方案**\n查询 `SSISDB` 数据库的目录视图。\n\n1.  使用 T-SQL 运行存储在目录中的 SSIS 包（当然，请使用您自己的文件夹名称、项目名称和包名称），使用以下代码片段（`C:\\\
  SQL2012DIRecipes\\CH15\\CatalogExecution.Sql`）：\n\n```sql\nDECLARE @execution_id\
  \ bigint\nEXECUTE SSISDB.catalog.create_execution\n    @package_name=N'Test.dtsx'\n\
  \    ,@execution_id=@execution_id OUTPUT\n    ,@folder_name=N'Logging'\n    ,@project_name=N'Tests'\n\
  \    ,@use32bitruntime=False\n    ,@reference_id=Null\n\nEXECUTE SSISDB.catalog.set_execution_parameter_value\
  \  @execution_id, 50, 'LOGGING_LEVEL', 3 -- Verbose\n\nEXECUTE SSISDB.catalog.start_execution\
  \ @execution_id\n\nSELECT @execution_id  -- Returns the execution ID for later querying\n\
  ```\n\n2.  查询有关包及其运行的任务的信息，使用以下 T-SQL（`C:\\SQL2012DIRecipes\\CH15\\CatalogPackageAndTasks.Sql`）：\n\
  \n```sql\nSELECT\n    project_name\n    ,package_name\n    ,CASE status\n      \
  \  WHEN 1 THEN 'Created'\n        WHEN 2 THEN 'Running'\n        WHEN 3 THEN 'Cancelled'\n\
  \        WHEN 4 THEN 'Failed'\n        WHEN 5 THEN 'Pending'\n        WHEN 6 THEN\
  \ 'Ended unexpectedly'\n        WHEN 7 THEN 'Succeeded'\n        WHEN 8 THEN 'Stopping'\n\
  \        WHEN 9 THEN 'Completed'\n    END AS StatusFullDescription\n    ,CONVERT(VARCHAR(25),start_time,103)\
  \ AS RunDate\n    ,CONVERT(VARCHAR(25),start_time,108) AS RunTime\n    ,DATEDIFF(ss,\
  \ start_time, end_time) AS ExecutionDurationInSeconds\n    ,available_physical_memory_kb\n\
  \    ,total_physical_memory_kb\nFROM   SSISDB.catalog.executions\nWHERE        \
  \  execution_id = @execution_id\n```\n\n输出结果可能类似于 图 15-17。\n\n![9781430247913_Fig15-17.jpg](img/9781430247913_Fig15-17.jpg)\n\
  \n图 15-17。 关于包的目录信息\n\n3.  获取包内可执行文件（任务）的列表，使用以下代码片段（`C:\\SQL2012DIRecipes\\CH15\\\
  CatalogExecutables.Sql`）：\n\n```sql\nSELECT\n    executable_id\n    ,execution_id\n\
  \    ,executable_name\n    ,package_name\n    ,package_path\nFROM SSISDB.catalog.executables\n\
  WHERE   execution_id = @execution_id\n```\n\n输出结果将如 图 15-18 所示。\n\n![9781430247913_Fig15-18.jpg](img/9781430247913_Fig15-18.jpg)\n\
  \n图 15-18。 关于任务的目录信息\n\n4.  现在查看包内可执行文件的更详细信息，使用以下 T-SQL（`C:\\SQL2012DIRecipes\\\
  CH15\\CatalogExecutionDetail.Sql`）：\n\n```sql\nSELECT\n    EX.executable_name\n\
  \    ,EX.package_name\n    ,EX.package_path\n    ,CONVERT(VARCHAR(25),ES.start_time,100)\
  \ AS StartTime\n    ,CONVERT(VARCHAR(25),ES.end_time,100) AS EndTime\n    ,ES.execution_duration\n\
  \    ,CASE ES.execution_result\n        WHEN 0 THEN 'Success'\n        WHEN 1 THEN\
  \ 'Failure'\n        WHEN 2 THEN 'Completion'\n        WHEN 3 THEN 'Cancelled'\n\
  \    END AS ExecutionResultFullDescription\n    ,ES.execution_path\nFROM  SSISDB.catalog.executables\
  \ EX\nINNER JOIN SSISDB.catalog.executable_statistics ES\n    ON EX.executable_id\
  \ = ES.executable_id\n    AND EX.execution_id = ES.execution_id\nWHERE ES.execution_id\
  \ = @execution_id\nORDER BY ES.start_time\n```\n\n输出结果将类似于 图 15-19。\n\n![9781430247913_Fig15-19.jpg](img/9781430247913_Fig15-19.jpg)\n\
  \n图 15-19。 显示可执行文件的 SSIS 目录输出\n\n5.  使用以下 T-SQL 代码片段（`C:\\SQL2012DIRecipes\\CH15\\\
  CatalogRowCounts.Sql`）返回通过每个数据路径发送的行数：\n\n```sql\nSELECT\n    package_name\n   \
  \ ,task_name\n    ,dataflow_path_id_string\n    ,dataflow_path_name\n    ,source_component_name\n\
  \    ,destination_component_name\n    ,SUM(rows_sent) AS RowsSent\n    ,execution_path\n\
  FROM SSISDB.catalog.execution_data_statistics\nWHERE execution_id = @execution_id\n\
  GROUP BY\n    execution_id\n    ,package_name\n    ,task_name\n    ,dataflow_path_id_string\n\
  \    ,dataflow_path_name\n    ,source_component_name\n    ,destination_component_name\n\
  \    ,execution_path\n```\n\n输出结果将如 图 15-20 所示。\n\n![9781430247913_Fig15-20.jpg](img/9781430247913_Fig15-20.jpg)\n\
  \n图 15-20。 从 SSIS 目录返回通过每个数据路径发送的行数\n\n### 提示、技巧和陷阱\n\n*   目录报告仅适用于作为 SSIS 项目的一部分部署到\
  \ Integration Services 目录的 SSIS 包。\n*   记得在重新运行包之前部署任何更改。\n*   目录绝对不是调试工具。在部署之前，请始终彻底调试您的包。\n\
  *   “概述”报告为您提供了 `ExecutionID`，这是对包执行的唯一引用。\n\n表 15-9。 SSIS 目录日志记录的详细级别\n\n| 级别 |\
  \ 包含的事件 | 注释 |\n| :--- | :--- | :--- |\n| 无 | 关闭日志记录。仅记录包执行状态。 | 捕获足够的信息以说明包是否成功，并且不会将任何消息记录到\
  \ [`operation_messages`] 视图。 |\n| 基本 | 记录所有事件，自定义和诊断事件除外。这是默认值。事件包括：`OnPreValidate`\
  \ `OnPostValidate` `OnPreExecute` `OnPostExecute` `OnInformation` `OnWarning` `OnError`\
  \ | 捕获的信息类似于默认情况下使用 `dtexec` 运行包时在控制台上显示的信息。 |\n| 性能 | 仅记录性能统计信息和 `OnError`、`OnWarning`\
  \ 事件。 | 需要此日志级别来跟踪运行的性能信息（运行每个任务/组件所需的时间等），但不会记录基本日志级别捕获的所有事件。 |\n| 详细 | 记录所有事件，包括自定义和诊断事件。自定义事件包括\
  \ Integration Services 任务记录的那些事件。 | 详细日志级别捕获所有日志事件（包括性能和诊断事件）。此日志级别可能会对性能产生一些开销。\
  \ |\n\n**注意** 表 15-9 经许可取自 Matt Masson 的博客文章 [www.mattmasson.com/index.php/2011/12/what-events-are-included-in-the-ssis-catalog-log-levels/](http://www.mattmasson.com/index.php/2011/12/what-events-are-included-in-the-ssis-catalog-log-levels/)。Matt\
  \ 是 *SQL Server 2012 Integration Services Design Patterns* (Apress, 2012) 的合著者。\n\
  \n\n\n"
- "# 获取执行阶段和消息的详细信息\n\n现在，你可以使用如下 T-SQL 来获取执行阶段的详细信息（`C:\\SQL2012DIRecipes\\CH15\\\
  CatalogExecutionPhases.Sql`）：\n\n```sql\nSELECT\n    package_name\n    ,task_name\n\
  \    ,subcomponent_name\n    ,execution_path\n    ,phase\n    ,start_time\n    ,end_time\n\
  \    ,DATEDIFF(ms, start_time, end_time) AS ExecutionDurationInMilliSeconds\nFROM\
  \ SSISDB.catalog.execution_component_phases\nWHERE execution_id = @ExecutionID\n\
  ORDER BY phase_stats_id\n```\n\n输出结果可能类似于 图 15-21。\n\n![9781430247913_Fig15-21.jpg](img/9781430247913_Fig15-21.jpg)\n\
  \n图 15-21. 从 SSIS 目录返回的执行阶段详情\n\n最后，你可以使用如下代码返回包执行期间捕获的任何消息（`C:\\SQL2012DIRecipes\\\
  CH15\\CatalogMessages.Sql`）：\n\n```sql\nSELECT\n    message_time\n    ,CASE message_type\n\
  \        WHEN -1 THEN 'Unknown'\n        WHEN 10 THEN 'Pre-validate'\n        WHEN\
  \ 20 THEN 'Post-validate'\n        WHEN 30 THEN 'Pre-execute'\n        WHEN 40 THEN\
  \ 'Post-execute'\n        WHEN 50 THEN 'StatusChange'\n        WHEN 60 THEN 'Progress'\n\
  \        WHEN 70 THEN 'Information'\n        WHEN 80 THEN 'VariableValueChanged'\n\
  \        WHEN 90 THEN 'Diagnostic'\n        WHEN 100 THEN 'QueryCancel'\n      \
  \  WHEN 110 THEN 'Warning'\n        WHEN 120 THEN 'Error'\n        WHEN 130 THEN\
  \ 'TaskFailed'\n        WHEN 140 THEN 'DiagnosticEx'\n        WHEN 200 THEN 'Custom'\n\
  \        WHEN 400 THEN 'NonDiagnostic'\n    END AS MessageType\n    ,CASE message_source_type\n\
  \        WHEN 10 THEN 'Entry APIs, such as T-SQL and CLR Stored procedures'\n  \
  \      WHEN 20 THEN 'External process used to run package'\n        WHEN 30 THEN\
  \ 'Package-level objects'\n        WHEN 40 THEN 'Control Flow tasks'\n        WHEN\
  \ 60 THEN 'Control Flow containers'\n        WHEN 50 THEN 'Data Flow task'\n   \
  \ END AS MessageSourceType\n    ,message\n    ,extended_info_id\nFROM SSISDB.catalog.operation_messages\n\
  WHERE operation_id = @ExecutionID\nORDER BY operation_message_id\n```\n\n输出结果可能类似于\
  \ 图 15-22。\n\n![9781430247913_Fig15-22.jpg](img/9781430247913_Fig15-22.jpg)\n\n\
  图 15-22. 包执行期间捕获的 SSIS 目录消息\n\n## 工作原理\n\n本方法中的七个步骤对 SSIS 目录视图执行了以下查询：\n\n*   `步骤\
  \ 1` 设置日志记录的详细程度级别并运行包。然后，它返回一个唯一的 ID，你将使用该 ID 来查询与此特定包执行关联的所有事件和度量指标。它使用了 `@ExecutionID`\
  \ 变量，该变量被以下所有查询所使用。\n*   `步骤 2` 提供有关包本身的信息——具体来说，它是否成功。\n*   `步骤 3` 列出包调用的所有任务。\n\
