- "# 15-1. 从 T-SQL 记录事件\n\n## 问题\n\n你想应用一种简单但健壮的方法来记录基于 `T-SQL` 的 `ETL` 例程中的事件（包括成功和失败）。\n\
  \n## 解决方案\n\n创建一个日志表和一个存储过程，用于将事件和事件详细信息（包括错误信息）写入该表。然后，你可以从你的 `ETL` 存储过程或脚本中调用此存储过程。\n\
  \n1.  使用以下 `DDL` 创建用于存储记录事件的表 (`C:\\SQL2012DIRecipes\\CH15\\tblEventDetail_Simple.Sql`)：\n\
  \n    ```sql\n    CREATE TABLE CarSales_Logging.log.EventDetail_Simple\n    (\n\
  \     EventDetailID INT IDENTITY(1,1) NOT NULL,\n     Event VARCHAR(150) NULL,\n\
  \     Comments VARCHAR(MAX) NULL,\n     ErrorNo INT NULL,\n     ErrorDescription\
  \ VARCHAR(MAX) NULL,\n     ErrorLineNo INT NULL,\n     ErrorSeverity INT NULL,\n\
  \     ErrorState INT NULL,\n     StartTime DATETIME NULL,\n     Logtime DATETIME\
  \ DEFAULT GETDATE()\n    ) ;\n    GO\n    ```\n\n2.  使用以下 `DDL` 创建执行日志记录所需的存储过程\
  \ (`C:\\SQL2012DIRecipes\\CH15\\pr_Logging_Simple.Sql`)：\n\n    ```sql\n    CREATE\
  \ PROCEDURE CarSales_Logging.log.pr_Logging_Simple\n    (\n    @Event VARCHAR(150)\n\
  \    ,@Comments VARCHAR(MAX) = NULL\n    ,@ErrorNo INT = NULL\n    ,@ErrorDescription\
  \ VARCHAR(MAX) = NULL\n    ,@ErrorLineNo INT = NULL\n    ,@ErrorSeverity INT = NULL\n\
  \    ,@ErrorState INT  = NULL\n    ,@StartTime DATETIME\n    )\n\n    AS\n\n   \
  \ INSERT INTO CarSales_Logging.log.\n\n\n\n# 15-2. 从 SSIS 记录日志数据\n\n## 问题\n\n你已经构建了一个\
  \ SSIS 包，并想为其添加日志记录功能。\n\n## 解决方案\n\n在你的 SSIS 包内部配置 SSIS 日志记录。\n\n1.  从**SSIS**菜单中选择**日志记录**—或者右键单击“控制流”窗格并单击**日志记录**。**配置\
  \ SSIS 日志：日志记录**对话框将出现。\n2.  当日志记录屏幕显示时，从**提供程序类型**列表中选择类型，并为你希望使用的每种类型单击**添加**。\n\
  3.  确保每个日志提供程序的复选框都被勾选。\n4.  对于每个日志提供程序，通过单击**配置**列中的弹出窗口来选择或添加到日志目标的连接。\n5.  在对话框的左侧**容器**窗格中，勾选你希望记录其事件的每个容器（这些是构成你\
  \ SSIS 包的各种任务）。对话框应类似于 图 15-1。\n\n    ![9781430247913_Fig15-01.jpg](img/9781430247913_Fig15-01.jpg)\n\
  \n    图 15-1. 选择日志目标\n\n6.  单击对话框的**详细信息**选项卡，然后选择你想要选择记录事件的任务。\n7.  勾选**事件**复选框以选择所有事件。\n\
  8.  单击**确定**。\n\n当你运行 SSIS 包时，你选择的所有事件都将被记录到你添加的提供程序中。\n\n## 工作原理\n\nSSIS 配备了高级且完整的日志记录功能，允许你跟踪\
  \ SSIS 包执行期间的进度和状态。实际上，如果你在 BIDS/SSDT 中查看过“进度”或“执行结果”选项卡，你就已经见过 SSIS 日志记录了—因为在这里看到的日志信息与你将在自定义日志中看到的大部分相同。\n\
  \n使用这个内置的日志记录基础设施需要你回答三个基本问题：\n\n*   你打算如何记录事件？\n*   你想要记录 SSIS 包中的哪些步骤？\n*   对于每个包步骤，你想要记录哪些事件？\n\
  \n“如何”的部分意味着你希望将记录的信息存储在哪里—或者用 SSIS 术语来说，你希望使用哪个日志提供程序。这些包括：\n\n*   一个 SQL Server\
  \ 表\n*   一个 XML 文件\n*   一个文本文件\n*   一个 SQL Server Profiler 跟踪文件\n*   Windows 事件日志\n\
  \n这些的任何组合或全部都可以同时使用。当然，每个都必须使用适当的工具来读取。实际上，大多数都可以使用像 LogParser（在技巧 2-21 中描述）这样的工具转换为另一种类型的日志。本质上，SSIS\
  \ 日志记录是一组需要启用的简单选项。\n\n> **注意**\n> 在描述如何从 SSIS 记录事件的同时，我想补充一个简短的说明。这种方法，虽然在 SQL\
  \ Server 2012 中并非完全被弃用，但在很大程度上已被 SSIS 服务器中的 SSIS 目录所取代。你仍然可以在 SQL Server 2012 中使用这种方法（并且在之前的版本中没有其他真正的替代方案），但你需要意识到现在有另一种可用的解决方案。这种新技术在技巧\
  \ 15-16 到 15-18 中解释。\n\n一旦你知道了想要保存日志信息的位置，你就可以决定保存哪些信息以及针对哪个包步骤。这个信息在 SSIS 术语中是“已记录事件”，并在表\
  \ 15-6 中描述。\n\n表 15-6. SSIS 中的已记录事件\n\n| 事件 | 说明 |\n| --- | --- |\n| BufferSizeTuning\
  \ | 缓冲区大小变化的原因和结果大小（仅在数据流任务中）。 |\n| Diagnostic | 返回包诊断信息。 |\n| Error | 显示错误事件。 |\n\
  | ExecStatusChanged | 显示任务执行状态的变化。 |\n| FileSystemOperation | 已执行的文件系统操作（仅在文件系统任务中）。\
  \ |\n| Information | 显示信息事件。这些是任务特定的，并根据为日志记录选择的任务而变化。 |\n\n```sql\nCREATE PROCEDURE\
  \ Log.pr_Logging_Simple\n(\n    @Event           VARCHAR(50),\n    @StartTime  \
  \     DATETIME,\n    @Comments        VARCHAR(2000),\n    @ErrorNo         INT =\
  \ NULL,\n    @ErrorDescription VARCHAR(8000) = NULL,\n    @ErrorLineNo     INT =\
  \ NULL,\n    @ErrorSeverity   INT = NULL,\n    @ErrorState      INT = NULL\n) AS\n\
  \    INSERT INTO Log.EventDetail_Simple\n        (Event, StartTime, Comments, ErrorNo,\
  \ ErrorDescription, ErrorLineNo, ErrorSeverity, ErrorState)\n    VALUES\n      \
  \  (@Event, @StartTime, @Comments, @ErrorNo, @ErrorDescription, @ErrorLineNo, @ErrorSeverity,\
  \ @ErrorState);\nGO\n```\n\n然后，你可以从其他存储过程或脚本内部调用此存储过程，如以下代码所示：\n\n```sql\nBEGIN\
  \ TRY\n    DECLARE @StartTime DATETIME = GETDATE()\n\n    --  你的处理代码在此处\n\n    --\
  \  在此记录成功的处理\n    EXECUTE Log.pr_Logging_Simple '加载销售数据', @StartTime, '销售数据加载成功'\n\
  END TRY\nBEGIN CATCH\n    --  在此记录不成功的处理\n    DECLARE @ErrorNo_TMP INT\n    DECLARE\
  \ @ErrorDescription_TMP VARCHAR(MAX)\n    DECLARE @ErrorLineNo_TMP INT\n    DECLARE\
  \ @ErrorSeverity_TMP INT\n    DECLARE @ErrorState_TMP INT\n\n    SELECT @ErrorNo_TMP\
  \ = ERROR_NUMBER()\n    SELECT @ErrorDescription_TMP = ERROR_MESSAGE()\n    SELECT\
  \ @ErrorLineNo_TMP = ERROR_LINE()\n    SELECT @ErrorSeverity_TMP = ERROR_SEVERITY()\n\
  \    SELECT @ErrorState_TMP = ERROR_STATE()\n\n    EXECUTE Log.pr_Logging_Simple\n\
  \        '加载销售数据',\n        @Comments = '加载销售数据时出错',\n        @StartTime = @STARTTIME,\n\
  \        @ErrorNo = @ErrorNo_TMP,\n        @ErrorDescription = @ErrorDescription_TMP,\n\
  \        @ErrorLineNo = @ErrorNo_TMP,\n        @ErrorSeverity = @ErrorSeverity_TMP,\n\
  \        @ErrorState = @ErrorState_TMP\nEND CATCH\n```\n\n## 提示、技巧和陷阱\n\n*   本技巧的方法没有显式地标记错误，而是让你查询包含错误数据的列来隔离错误记录。当然，你可以基于日志记录表创建视图来隔离错误，如技巧\
  \ 15-19 所示。\n*   记住设置一个变量来记录进程开始的时间。用进程（或进程的一部分）开始的时间来实例化它—而不是你记录结果的时间—否则你将无法通过将开始时间从进程结束和日志记录发生的时间中减去来推断运行时长。这个时刻也可能是错误发生的时间。\n\
  *   记录事件的调用可以在存储过程执行过程中重复多次。它可以在存储过程开始时调用，也可以在存储过程内部的一个工作单元运行后调用。\n\n\n\n# SSIS\
  \ 日志事件与配置\n\n## 可用日志事件\n\n以下是可以记录的 SSIS 事件：\n*   `PipelineBufferLeak`：未完成的（占用内存的）缓冲区消耗内存（仅限于数据流任务）。\n\
  *   `PipelineComponentTime`：关于每个数据流组件验证和执行的信息（仅限于数据流任务）。\n*   `PipelineExecutionPlan`：数据流的执行计划（仅限于数据流任务）。\n\
  *   `PipelineExecutionTrees`：创建执行计划时的调度器输入（仅限于数据流任务）。\n*   `PipelineInitialization`：来自管道初始化的信息（仅限于数据流任务）。\n\
  *   `PipelinePostEndOfRowset`：组件收到行集结束信号。\n*   `PipelinePostPrimeOutput`：组件已从其 `Prime\
  \ Output` 调用返回。\n*   `PipelinePreEndOfRowset`：组件收到行集结束前信号。\n*   `PipelinePrePrimeOutput`：组件收到其\
  \ `Prime Output` 前调用。\n*   `PipelineRowsSent`：行已作为输入提供给数据流组件。\n*   `PostExecute`：显示在后执行阶段发生的\
  \ `PostExecute` 事件。\n*   `PostValidate`：显示在后验证阶段发生的 `PostValidate` 事件。\n*   `PostExecute`：显示在后执行阶段发生的后执行事件。\n\
  *   `PreValidate`：显示在前验证阶段发生的事件。\n*   `Progress`：处理进度通知。\n*   `QueryCancel`：处理取消事件。按轮询间隔确定是否取消包执行。\n\
  *   `TaskFailed`：处理任务失败。指示任务已失败。\n*   `Warning`：显示警告事件。这些事件根据为日志记录选择的任务而异。它们是任务特定的。\n\
  \n再次强调，这些事件中的任何一个或全部都可以记录到所有选定的日志提供程序。\n\n需要注意的是：在记录 SSIS 包时很容易做得过头，从而产生巨大的日志文件（或表），导致无法看清全局。因此，在选择要记录的事件时要谨慎，因为明智的选择与日志记录本身同样重要。同样，将日志事件记录到所有日志提供程序通常是完全多余的，通常一个日志提供程序就足够了。\n\
  \n#### 提示、技巧与陷阱\n\n*   要添加、删除或重新配置日志提供程序，请先单击左侧窗格中的`日志记录`。否则，无论你多么努力并经常单击选择某个日志，都无法选中它。\n\
  *   日志提供程序配置使用标准的 SSIS 连接管理器。这些可以直接从`连接管理器`窗格进行编辑。\n*   配置用于 SQL Server 日志记录的日志提供程序将在目标数据库中创建\
  \ `sysssislog` 表（对于 SQL Server 2005，将是 `sysdtslog90`）。SSIS 还将在目标数据库中创建 `sp_ssis_addlogentry`（在\
  \ SQL Server 2005 中为 `sp_dts_addlogentry`）存储过程，SSIS 使用它将日志信息写入目标表。如果需要，两者都可以按照食谱\
  \ 15-4 中的描述进行调整。\n*   只有经验才能教会你在每种不同情况下真正需要哪些日志信息。通常，在测试开始时尽可能多地记录可消化的日志信息是值得的，然后在进入生产环境时减少记录的事件数量。可用的海量信息可能导致产生从未使用的、适得其反的数据洪水，除非在实践中应用适度的克制。\n\
  \n#### 15-3. 自定义 SSIS 日志记录\n\n## 问题\n\n你需要比食谱 15-2 的解决方案更精确、更细致地选择要记录的 SSIS 事件。\n\
  \n## 解决方案\n\n选择要记录的事件以及每个事件要记录的详细信息。\n\n1.  按照食谱 15-2 的步骤 1 到 5 配置 SSIS 日志记录。\n\
  2.  在`配置 SSIS 日志记录`对话框中，单击`详细信息`选项卡，然后单击`高级`按钮。\n3.  为每个记录的事件选择（或取消选择）要记录的事件详细信息。\n\
  \n你最终应该得到类似图 15-2 的结果。\n![9781430247913_Fig15-02.jpg](img/9781430247913_Fig15-02.jpg)\n\
  *图 15-2. 选择要记录的事件*\n\n4.  单击`确定`以确认并关闭对话框。\n\n## 工作原理\n\n尽管 SSIS 日志记录很简单，但仍有一些可用的调整选项，允许开发人员：\n\
  *   选择记录的详细信息。\n*   加载和保存日志详细信息。\n*   重新应用日志详细信息。\n*   修改日志详细信息文件。\n\n选择触发日志记录的事件只是故事的一部分。所有事件都可以记录：\n\
  *   `Computer`（计算机名称）。\n*   `Operator`（执行包的用户）。\n*   `Source`（包）。\n*   `Sourceid`（包标识符）。\n\
  *   `ExecutionID`（执行上下文的 GUID——父包或子包）。\n*   `MessageText`（返回的任何消息）。\n*   `Databytes`（当前未使用）。\n\
  \n以及：\n*   `Event`（事件名称）。\n*   `StartTime`（事件开始的准确日期和时间）。\n*   `EndTime`（事件结束的准确日期和时间）。\n\
  \n# 15-4. 保存和应用复杂的 SSIS 日志详细信息\n\n## 问题\n\n为 SSIS 任务重新定义相同的日志详细信息集合过于耗时。\n\n## 解决方案\n\
  \n将日志详细信息集合保存到 XML 文件，然后重新应用它们。\n\n1.  在左窗格中，选择要保存其日志详细信息的任务。\n2.  在`配置 SSIS 日志记录`对话框中，单击`详细信息`选项卡，然后单击`保存`按钮。\n\
  3.  选择路径并输入文件名（在此示例中为 `C:\\SQL2012DIRecipes\\CH15\\MyTaskLogDetails.Xml`）。\n4. \
  \ 单击`保存`。\n5.  单击`确定`。\n\n然后 SSIS 允许你保存任务日志的详细信息，然后快速轻松地将它们重新应用于多个包，如下所示：\n\n1.\
  \  选择要修改其日志详细信息的任务。\n2.  在`配置 SSIS 日志记录`对话框中，单击`详细信息`选项卡，然后单击`加载`按钮。\n3.  选择先前保存的日志详细信息文件（`C:\\\
  SQL2012DIRecipes\\CH15\\MyTaskLogDetails.Xml`）。\n4.  单击`打开`。\n5.  单击`确定`。\n\n##\
  \ 工作原理\n\n如果你为任务（例如数据流任务）定义了复杂的日志详细信息集合，为多个类似任务单独重新定义相同的日志事件可能极其繁琐和耗时。如果你已保存了一组要记录的详细信息，可以将它们应用于另一个\
  \ SSIS 包。\n\n由于日志详细信息保存为 XML，你可以在任何文本编辑器或任何 XML 编辑器（例如 Microsoft 的 XML Notepad）中编辑生成的\
  \ XML 文件。如果你希望这些更改应用于你的任务，则需要将任何保存的包重新应用到现有任务。以下是保存文件的简化示例：\n```xml\n<?xml version=\"\
  1.0\" encoding=\"utf-8\"?>\n<DTSLoggingTemplate xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\"\
  \ xmlns:xsd=\"http://www.w3.org/2001/XMLSchema\" Name=\"TaskHost\" xmlns=\"www.microsoft.com/SqlServer/Dts\"\
  >\n  <EventsFilter Name=\"OnError\">\n    <Filter>\n      <Computer>true</Computer>\n\
  \      <Operator>true</Operator>\n      <SourceName>false</SourceName>\n      <SourceID>true</SourceID>\n\
  \      <ExecutionID>true</ExecutionID>\n      <MessageText>true</MessageText>\n\
  \      <DataBytes>true</DataBytes>\n    </Filter>\n  </EventsFilter>\n  ...\n</DTSLoggingTemplate>\n\
  ```\n如你所见，结构非常简单，因此很容易编辑 XML 文件来添加或删除 `EventsFilters` 和 `Filters`。\n\n#### 提示、技巧与陷阱\n\
  \n*   你无法同时加载多个任务的日志详细信息。\n*   要应用某种类型任务的所有日志详细信息，最好加载从类似类型任务保存的日志详细信息文件。例如，文件系统任务包含\
  \ `FileSystemOperation` 的日志详细信息。因此，要应用你对此类日志详细信息的选择，你必须首先从文件系统任务保存日志详细信息。\n\n\n\
  ### 15-5\\. 将 SSIS 日志扩展到 SQL Server 目标\n\n#### 问题\n您希望利用 SSIS 将信息记录到 SQL Server\
  \ 表中的功能，但您希望调整和扩展此过程，以便向日志表添加您自己的元素。\n\n#### 解决方案\n扩展内置的日志表和存储过程以满足您的需求。\n\n1. \
  \ 在您选择用于保存日志信息的数据库中，单击名为 `dbo.sysssislog` 的表（此表通常位于“系统表”文件夹中）。\n2.  右键单击并选择“设计”。\n\
  3.  输入列名（例如 `ProcessID`）和数据类型（例如 `INT`）。\n4.  保存并关闭表。\n5.  在 SQL Server Management\
  \ Studio 中，展开“可编程性”->“存储过程”节点。\n6.  展开“系统存储过程”，右键单击 `sp_ssis_addlogentry`，然后选择“修改”。\n\
  7.  按如下方式修改存储过程的 T-SQL 代码（示例文件路径：`C:\\SQL2012DIRecipes\\CH15\\Modifiedsp_ssis_addlogentry.Sql`）：\n\
  \n    ```sql\n    ALTER PROCEDURE dbo.sp_ssis_addlogentry\n        @event sysname,\n\
  \        @computer NVARCHAR(128),\n        @operator NVARCHAR(128),\n        @source\
  \ NVARCHAR(1024),\n        @sourceid UNIQUEIDENTIFIER,\n        @executionid UNIQUEIDENTIFIER,\n\
  \        @starttime DATETIME,\n        @endtime DATETIME,\n        @datacode int,\n\
  \        @databytes image,\n        @message NVARCHAR(2048),\n        @PROCESSID\
  \ INT = 1 -- NOTE: The added field\n    AS\n        INSERT INTO sysssislog\n   \
  \     (\n            event,\n            computer,\n            operator,\n    \
  \        source,\n            sourceid,\n            executionid,\n            starttime,\n\
  \            endtime,\n            datacode,\n            databytes,\n         \
  \   message,\n            ProcessID -- NOTE: This has been added to extend the logging\
  \ capability\n        )\n        VALUES\n        (\n            @event,\n      \
  \      @computer,\n            @operator,\n            @source,\n            @sourceid,\n\
  \            @executionid,\n            @starttime,\n            @endtime,\n   \
  \         @datacode,\n            @databytes,\n            @message,\n         \
  \   @ProcessID --NOTE: This has been added to extend the logging capability\n  \
  \      )\n        RETURN 0 ;\n    GO\n    ```\n8.  按 F5 或单击“执行”以重新编译存储过程。\n\n####\
  \ 工作原理\n如果您已使用用于 SQL Server 的 SSIS 日志提供程序保存日志数据，您可能已经注意到存储过程 `sp_ssis_addlogentry`\
  \ 及其创建的表 `sysssislog`。这些并非完全固定不变，如果您愿意，可以对日志默认元素进行微小的更改。例如，您可以：\n\n*   添加或删除列。\n\
  *   扩展 `sp_ssis_addlogentry` 存储过程（在 SSIS 2012、2008 和 2008R2 中）或 `sp_dts_addlogentry`（在\
  \ SSIS 2005 中）以向日志记录添加更多元素。\n*   修改表名和/或架构。\n\n您可以根据需要向日志表结构添加更多列，然后扩展 `sp_ssis_addlogentry`\
  \ 日志记录过程以输入任何新数据。您可能想知道为什么或何时需要这样做，以下是一个合理的场景。假设您有一个极其复杂的日常运行的 ETL 过程，并为每个日常过程编号。最终，您将希望存储一个过程标识符。您希望现在使用硬编码标识符为此做准备。这正是我们在本教程中所做的。它涉及修改日志表和日志记录存储过程。\n\
  \n在此示例中，我假设您使用的是 SQL Server 创建的默认对象名称。需要注意几点：\n\n*   您需要找到与您所用 SQL Server 版本对应的表。\n\
  *   如果您愿意，完全可以选择编写任何表更改的脚本，而不是使用 SSMS。\n\n如果您更改了 SSIS 向其记录数据的表的结构，并且希望利用对表的更改，则必须更改\
  \ `sp_ssis_addlogentry` 存储过程。这是一个标准的存储过程，因此修改起来非常简单。在现实世界中，您可能有一个包含过程标识符的表，您希望从中提取最新的过程运行\
  \ ID 并将其添加到日志数据中，而不是像我这里这样硬编码。\n\nSSIS 为 SQL Server 日志创建的表 `dbo.sysssislog` 包含 表\
  \ 15-7 中所示的字段。\n\n**表 15-7** `dbo.sysssislog` 表中的字段\n| 字段名 | 描述 |\n| :--- | :---\
  \ |\n| event | 触发日志记录的事件（例如 OnError）。 |\n| computer | 运行过程的计算机。 |\n| operator |\
  \ 运行过程的操作员。 |\n| source | 触发日志记录的任务。 |\n| sourceid | 引起日志记录发生的任务的 GUID。 |\n| executionid\
  \ | 执行 GUID。 |\n| starttime | 过程开始的日期和时间。 |\n| endtime | 过程结束的日期和时间。 |\n| datacode\
  \ | 内部代码。 |\n| databytes | 处理的字节数。 |\n| message | 从事件发送的消息。 |\n\n您可以根据需要重命名此表，而不会产生任何不良后果。唯一需要注意的是，如果更改了表名，则必须记住修改日志查询\
  \ (`sp_dts_addlogentry`) 使其指向重命名后的表。如果需要这样做，以下是一种方法：\n\n1.  在您选择用于保存日志信息的数据库中，单击名为\
  \ `dbo.sysssislog` 的表。\n2.  右键单击并选择“重命名”。\n3.  用新名称替换旧表名。\n4.  在 SQL Server Management\
  \ Studio 中，展开“可编程性”->“存储过程”节点，然后展开“系统存储过程”。\n5.  右键单击 `sp_ssis_addlogentry` 并选择“修改”。\n\
  6.  在 `INSERT INTO` 语句中，将表名 `dbo.sysssislog` 替换为步骤 3 中的新表名。\n7.  按 F5 或单击“执行”以重新编译存储过程。\n\
  \n#### 提示、技巧与陷阱\n*   如果您愿意，也可以将日志表放在不同的架构中——只需记住在存储过程中指明正确的架构，而不是 “dbo”。\n*   请记住，在\
  \ SQL Server 2008 和 2012 上，表是 `dbo.sysssislog`，而在 2005 版本上，它是 `dbo.sysdtslog90`。\n\
  *   在 SSIS 2005 中，存储过程名为 `sp_dts_addlogentry`，位于“存储过程”文件夹中。\n*   当然，您可以使用 T-SQL\
  \ DDL 来添加任何新列。\n*   请注意，您没有修改传递给存储过程的任何内置参数——这些参数必须保持初始定义。\n\n### 15-6\\. 从 SSIS\
  \ 脚本任务记录信息\n\n#### 问题\n您的 SSIS 包中有一个脚本任务，您希望从中将信息写入标准日志提供程序。\n\n#### 解决方案\n使用 `Dts.Log`\
  \ 方法写入任何常用日志提供程序。\n\n1.  作为脚本任务的一部分，输入以下代码（此处为 Microsoft Visual Basic 2010）以记录事件：\n\
  \    ```vb\n    Dim nullBytes(0) As Byte\n    Dts.Log(\"My script task has done\
  \ something\",0, nullBytes)\n    ```\n2.  将此代码片段包含在脚本代码的 `Try...Catch` 错误捕获块中，如以下示例所示（文件路径：`C:\\\
  SQL2012DIRecipes\\CH15\\SCriptTaskLogging.vb`）：\n    ```vb\n    Public Sub Main()\n\
  \            Try\n                'Some code here\n                Dim nullByte()\
  \ As Byte\n                Dts.Log(\"Write to log that all has worked\", 0, nullByte)\n\
  \            Catch ex As Exception\n                Dts.Log(ex.Message, 0, nullByte)\
  \ 'Log the error message\n            End Try\n            Dts.TaskResult = ScriptResults.Success\n\
  \    End Sub\n    ```\n\n\n# 成功结束子程序\n\n## 工作原理\n\n有一种特定的方式，可以将用户定义的日志信息写入所有启用的日志提供程序，并且可以从\
  \ SSIS 脚本任务中调用。你需要执行以下操作：\n\n*   在“配置 SSIS 日志”对话框的“容器”窗格中，确保选中了脚本任务。\n*   在“配置 SSIS\
  \ 日志”对话框的“详细信息”选项卡中，确保勾选了 `脚本任务日志项`。\n\n现在，此脚本将把过程错误信息记录到为包启用的所有日志提供程序中。\n\n####\
  \ 15-7. 从 T-SQL 记录到 SSIS 日志表\n\n### 问题\n\n你有一个复杂的 SSIS 包，频繁使用存储过程，并且你希望将来自 SSIS\
  \ 和 T-SQL 的过程与错误信息记录到一个集中表中。你更倾向于使用内置的日志表。\n\n### 解决方案\n\n创建一个存储过程，从 T-SQL 代码和存储过程将日志数据写入内置的\
  \ `dbo.sysssislog` 表。\n\n1.  使用以下代码（`C:\\SQL2012DIRecipes\\CH15\\pr_SQLtoSSISLogging.Sql`）创建一个存储过程，用于从你的\
  \ T-SQL 过程执行日志记录：\n\n    ```sql\n    CREATE PROCEDURE dbo.pr_SQLtoSSISLogging\n\
  \    @event sysname,\n    @message NVARCHAR(2048),\n    @datacode int,\n    @starttime\
  \ DATETIME,\n    @source NVARCHAR(1024),\n    @operator NVARCHAR(128)\n    \n  \
  \  AS\n    \n    DECLARE @computer NVARCHAR(128)\n    DECLARE @sourceid UNIQUEIDENTIFIER\n\
  \    DECLARE @endtime DATETIME\n    DECLARE @executionid UNIQUEIDENTIFIER\n    DECLARE\
  \ @databytes VARBINARY(MAX)\n    \n    SET @computer = @@SERVERNAME\n    SELECT\
  \ @operator = USER_NAME()\n    SET @sourceid = NEWID()\n    SET @endtime = GETDATE()\n\
  \    SET @executionid = NEWID()\n    SET @databytes = CONVERT(VARBINARY(MAX),'x')\n\
  \    \n    INSERT INTO dbo.sysssislog\n    (\n    event,\n    computer,\n    operator,\n\
  \    source,\n    sourceid,\n    executionid,\n    starttime,\n    endtime,\n  \
  \  datacode,\n    databytes,\n    message\n    )\n    \n    VALUES\n    (\n    @event,\n\
  \    @computer,\n    @operator,\n    @source,\n    @sourceid,\n    @executionid,\n\
  \    @starttime,\n    @endtime,\n    @datacode,\n    @databytes,\n    @message\n\
  \    )\n    \n    RETURN 0 ;\n    \n    GO\n    ```\n\n2.  在你的存储过程开始处，放置以下代码：\n\n\
  \    ```sql\n    DECLARE @source NVARCHAR(1024)\n    DECLARE @starttime DATETIME\n\
  \    DECLARE @operator NVARCHAR(128)\n    SELECT @source = OBJECT_NAME(@@PROCID)\n\
  \    SELECT @operator = USER_NAME()\n    在你希望记录的每个过程部分之前，在 T-SQL 中放置以下代码：\n    SET\
  \ @StartTime = GETDATE()\n    -- 你的代码在这里\n    EXECUTE pr_SQLtoSSISLogging 'Success',\
  \ 'Log to SSIS Table', 0, @StartTime, @source, @operator\n    ```\n\n3.  按照配方 15-2\
  \ 所述，配置记录到 SQL Server 表。\n\n### 工作原理\n\n你可能更倾向于将日志数据集中到单个表，并使用 SSIS 日志提供程序表。这意味着你所有的日志数据都在一个地方，无论它是由\
  \ SSIS 任务还是 SQL 存储过程触发的。然而，如果你这样做，可能会发现 `dbo.sysssislog` 标准 SSIS 表有点限制，并且可能不理想于记录来自\
  \ T-SQL 存储过程的信息。但作为一个快速而高效的解决方案，这种方法无疑有其优点——尤其是因为你不需要做任何额外的事情来记录来自 SSIS 的信息，只需按照配方\
  \ 15-2 描述配置日志记录即可。执行此操作时，我更倾向于将写入 `dbo.sysssislog` 表的存储过程放在与 `dbo.sysssislog` 表本身相同的数据库中。\n\
  \n### 提示、技巧和陷阱\n\n*   如果你不想插入虚拟数据（`sourceId` 和 `executionID` 的 GUID），你可能更愿意将表类型更改为\
  \ `VARCHAR`，这将允许你存储其他信息。\n*   同样，允许 `dbo.sysssislog` 表中某些（如果不是大多数）列为 `NULL` 将给你更大的灵活性，因为这意味着你可以调整存储过程以写入表，而无需包含多余的数据。\n\
  *   如果你将此方法作为错误捕获 `TRY...CATCH` 块的一部分使用（如前所述），你可以用 `@@ERROR` 返回的错误代码替换 “datacode”。\n\
  *   当然，如果你愿意，可以向存储过程添加更多元素（并向它记录的表添加相应的列）。\n*   虽然我说这通常是从存储过程中运行的，但它可以从大多数 T-SQL\
  \ 片段运行，例如 SSIS 执行 SQL 任务中的代码或从 SQL Server 代理调用的 T-SQL 代码。然而，它可能需要一些调整——例如用硬编码引用替换\
  \ `OBJECT_NAME(@@PROCID)`。\n\n#### 15-8. 在 T-SQL 中处理错误\n\n### 问题\n\n你希望你的存储过程（和\
  \ T-SQL 片段）具有弹性并能优雅地处理错误。\n\n### 解决方案\n\n在存储过程和 T-SQL 片段中使用 `TRY...CATCH` 块来捕获和处理错误。以下是在存储过程中处理错误捕获的“包装器”代码：\n\
  \n```sql\nDECLARE @StartTime DATETIME\nDECLARE @ProcName VARCHAR(150) -- 调用过程\n\
  DECLARE @ProcStep VARCHAR(150) -- 过程中的步骤\nSET @ProcName = OBJECT_NAME(@@PROCID)\n\
  \nBEGIN TRY\nSET @ProcStep = 'My test'\n--你的代码在这里 --\nEND TRY\nBEGIN CATCH\n\nDECLARE\
  \ @Error_Number int\nDECLARE @ErrorDescription VARCHAR(MAX)\nDECLARE @ErrorLine\
  \ INT\nDECLARE @ErrorSeverity INT\nDECLARE @ErrorState INT\nDECLARE @Message VARCHAR(150)\n\
  \nSET @Error_Number = ERROR_NUMBER()\nSET @ErrorDescription = ERROR_MESSAGE()\n\
  SET @ErrorLine = ERROR_LINE()\nSET @ErrorSeverity = ERROR_SEVERITY()\nSET @ErrorState\
  \ = ERROR_STATE()\nSET @Message = 'Error in procedure: ' +  @ProcName + ' - ' +\
  \ @ErrorDescription\n\nRAISERROR(@Message ,16,1)\n\nEND CATCH\n```\n\n### 工作原理\n\
  \n日志记录必须跟踪成功和失败。因此，你需要能够开发出能够优雅地处理失败（而不仅仅是阻塞和停止）的 ETL 包和例程，并能将失败的详细信息传递给所选类型的日志记录。以下是捕获错误并将错误数据返回到日志的主要方法。\n\
  \n关于 T-SQL 中的错误捕获已经有很多著作和章节进行了论述。因此，与其讨论所有可能性，这里介绍的是在你的 ETL 存储过程中处理错误的经过验证的方法——使用\
  \ `TRY...CATCH` 块来收集任何错误详细信息。正如你可能知道的那样，`CATCH` 块可以为错误返回以下内容：\n\n*   错误编号\n*   错误描述\n\
  *   发生错误的行号\n*   错误严重性（按 SQL Server 术语）\n*   错误状态\n\n实际上，它可以很简单。当然，错误捕获中有很多细微之处，对于这些，我只能向你推荐许多优秀的评论员，他们已经对此进行了非常详尽的描述。作为基本原则，你应该始终至少为\
  \ T-SQL 例程添加基本的错误处理。此外，将存储过程的关键部分（或全部）包装在事务中，将允许在发生失败时回滚数据修改。如果复制和粘贴这个样板文本变得有点重复，那么请参阅配方\
  \ 15-12，了解一种将其添加到 SSMS 模板集合的技术。\n\n#### 15-9. 在 SSIS 中处理错误\n\n### 问题\n\n你希望你的 SSIS\
  \ 包具有弹性，并且在执行时能够优雅地处理错误。\n\n### 解决方案\n\n应用 SSIS 的内置错误处理。以下是一个高级示例。\n\n1.  创建一个新的\
  \ SSIS 包。添加以下 OLEDB 源连接管理器（除非它们已在包级别或项目级别可用）：\n\n    | 类型 | 名称 | 数据库 |\n    | ---\
  \ | --- | --- |\n    | OLEDB | Car_Sales_OLEDB | Car_Sales |\n    | OLEDB | Car_Sales_Staging_OLEDB\
  \ | Car_Sales_Staging |\n\n\n\n# 15-10. 创建集中式日志框架\n\n创建以下变量：\n*   `ErrorRowsDestination`：作用域\
  \ Package，数据类型 Integer\n*   `ErrorRowsSource`：作用域 Package，数据类型 Integer\n\n3.  添加一个数据流任务，双击进行编辑。\n\
  4.  添加一个 OLE DB 源组件，编辑它，并选择 `Car_Sales_OLEDB` 连接管理器。选择 `Clients` 表。\n5.  点击左侧的“错误输出”。在主窗格中选择所有单元格，然后从“将此值设置为所选单元格”弹出框中选择“重定向行”。点击“应用”。对话框应如图\
  \ 15-3 所示。\n\n![9781430247913_Fig15-03.jpg](img/9781430247913_Fig15-03.jpg)\n图 15-3\
  \ 在数据流任务中重定向错误行\n\n6.  点击“确定”确认。暂时忽略警告。\n7.  添加一个 OLE DB 目标，将其与 OLE DB 源组件连接。双击并选择\
  \ `Car_Sales_Staging_OLEDB` 连接管理器。创建一个名为 `Clients` 的新表并进行列映射。将任务的“错误输出”设置为“重定向行”。\n\
  8.  向数据流窗格添加两个行计数任务。将它们命名为 `RowCountSource` 和 `RowCountDestination`。将前者连接到 OLE DB\
  \ 源任务，后者连接到 OLE DB 目标任务。当你连接行计数器（使用红色的优先级约束）时，“配置错误输出”对话框会出现。只需点击“确定”。\n9.  将 `ErrorRowsSource`\
  \ 变量添加到名为 `RowCountSource` 的行计数任务中，将 `ErrorRowsDestination` 变量添加到名为 `RowCountDestination`\
  \ 的行计数任务中。\n10. 添加一个脚本组件——选择“转换”选项。将名为 `RowCountSource` 的行计数任务连接到它。双击进行编辑。\n11.\
  \ 点击“输入和输出”，向 `Output 0` 添加一个新的输出列。将该列命名为 `ErrorColumn`。点击左侧的“脚本”，然后点击“编辑脚本”。添加以下代码（假设脚本语言设置为\
  \ Microsoft Visual Basic 2010）：\n\n    ```vbnet\n    Public Overrides Sub Input0_ProcessInputRow(ByVal\
  \ Row As Input0Buffer)\n      Row.ErrorDescription = ComponentMetaData.GetErrorDescription(Row.ErrorCode)\n\
  \    End Sub\n    ```\n\n12. 添加一个平面文件目标任务。将脚本任务连接到它，并配置为分隔文件目标。建议将其命名为`C:\\SQL2012DIRecipes\\\
  CH15\\SSISErrors.Txt`。将所有源列映射到它（包括 SSIS 添加的三列：`ErrorCode`、`ErrorColumn` 和 `ErrorDescription`）。\n\
  13. 添加一个 OLE DB 目标。将 `RowCountDestination` 任务连接到它，双击进行编辑。使用 `Car_Sales_Staging_OLEDB`\
  \ 连接管理器并创建一个新表来存储错误记录。这个表同样包含 `ErrorCode` 和 `ErrorColumn` 字段。数据流应如图 15-4 所示。\n\n\
  ![9781430247913_Fig15-04.jpg](img/9781430247913_Fig15-04.jpg)\n图 15-4 带有错误重定向的数据流\n\
  \n你现在可以运行导入过程了。OLE DB 源中的任何错误都将被发送到平面文件`SSISErrors.Txt`。目标任务中的任何错误都将被捕获到目标数据库中。\n\
  \n## 工作原理\n\n当然，SSIS 也有自己的错误处理。需要进行优雅错误处理的关键地方是在数据流中，当数据无法正确通过 SSIS 管道时。\n\n当数据行包含错误时（通常是数据类型错误或数据长度错误），SSIS\
  \ 提供三个选项：\n\n*   `继续`\n*   丢弃该行。\n*   将该行重定向到文件或数据表。\n\n由于仅仅跳过错误行会导致加载不完整且无法跟踪丢失的记录，这里我只关注重定向选项。这样你就可以隔离任何错误记录。\n\
  \n在实际操作中，你可以将错误记录发送到平面文件、普通目标数据库——或者任何数据库。我发现将源错误输出到平面文件要容易得多，因为它几乎可以处理你抛给它的任何问题。如果你想在这里使用目标表，必须确保它具有足够宽的列来处理因截断导致的溢出——假设你正在处理截断错误。在实践中，这几乎总是意味着将所有列设置为非常宽的\
  \ `NVARCHAR` 类型。\n\n## 提示、技巧和陷阱\n\n*   平面文件目标无法处理某些源列类型，例如图像列。你需要从列映射中删除这些类型。\n\
  *   用于添加错误描述的脚本组件并非绝对必要——但在调试时拥有更完整的错误描述会很有帮助！\n*   你也可以从数据转换任务和派生列任务中重定向错误信息。\n\
  \n## 15-10. 创建集中式日志框架\n\n### 问题\n\n你开发了一个相当复杂的 SSIS 包，其中包含许多对 T-SQL 存储过程的调用，并且你希望将事件记录到单个存储库中。\n\
  \n### 解决方案\n\n开发一个自定义日志框架来处理来自 T-SQL 和 SSIS 的日志事件。以下是一个这样的框架：\n\n1.  创建表（使用以下 DDL）来存储记录的信息\
  \ (`C:\\SQL2012DIRecipes\\CH15\\tblEventDetail.Sql`)：\n\n    ```sql\n    CREATE\
  \ TABLE CarSales_Logging.log.EventDetail\n    (\n     EventDetailID INT IDENTITY(1,1)\
  \ NOT NULL,\n     Process VARCHAR(255) NULL,\n     Step VARCHAR(255) NULL,\n   \
  \  Comments VARCHAR(MAX) NULL,\n     ErrorNo INT NULL,\n     ErrorDescription VARCHAR(MAX)\
  \ NULL,\n     ErrorLineNo INT NULL,\n     ErrorSeverity INT NULL,\n     ErrorState\
  \ INT NULL,\n     StartTime DATETIME NULL,\n     Logtime DATETIME NULL\n    );\n\
  \    GO\n    ```\n\n2.  使用以下 DDL，创建记录任何结果的存储过程 (`C:\\SQL2012DIRecipes\\CH15\\pr_LogEvents.Sql`)：\n\
  \n    ```sql\n    CREATE PROCEDURE CarSales_Logging.log.pr_LogEvents\n    (\n  \
  \  @Process VARCHAR(150)\n    ,@Step VARCHAR(150)\n    ,@StartTime DATETIME\n  \
  \  ,@Comments VARCHAR(MAX) = NULL\n    ,@ErrorNo INT = NULL\n    ,@ErrorDescription\
  \ VARCHAR(MAX) = NULL\n    ,@ErrorLineNo INT = NULL\n    ,@ErrorSeverity INT = NULL\n\
  \    ,@ErrorState INT = NULL\n    )\n\n    AS\n\n    INSERT INTO CarSales_Logging.log.EventDetail\n\
  \    (\n    Process\n    ,Step\n    ,StartTime\n    ,Comments\n    ,ErrorNo\n  \
  \  ,ErrorDescription\n    ,ErrorLineNo\n    ,ErrorSeverity\n    ,ErrorState\n  \
  \  )\n\n    VALUES\n    (\n    @Process\n    ,@Step\n    ,@StartTime\n    ,@Comments\n\
  \    ,@ErrorNo\n    ,@ErrorDescription\n    ,@ErrorLineNo\n    ,@ErrorSeverity\n\
  \    ,@ErrorState\n    ) ;\n    GO\n    ```\n\n3.  为所有基于 T-SQL 的进程添加日志记录，如下所示：\n\
  \n    ```sql\n    -- Start Header -------------------------------------------------------------\n\
  \    DECLARE @StartTime DATETIME\n    DECLARE @ProcName VARCHAR(150) --- 调用过程\n\
  \    DECLARE @ProcStep VARCHAR(150) -- 过程中的步骤\n    SET @ProcName = OBJECT_NAME(@@PROCID)\n\
  \n    BEGIN TRY\n    ---- End Header ------------------------------------------------------------\n\
  \n    SET @ProcStep = '我的测试'\n\n    --你的代码在此处 --\n\n    EXECUTE CarSales_Logging.log.\n\
  \n\n\n```markdown\n# SSIS 中的自定义日志记录\n\n## 存储过程代码\n```sql\npr_Logging_Simple @ProcName,\
  \ @ProcStep, @StartTime, 'Part of the process OK'\n\n-- Start Footer ------------------------------------------------\n\
  BEGIN TRY\n    END TRY\n    BEGIN CATCH\n        IF @@trancount > 0 ROLLBACK TRAN\n\
  \        SET XACT_ABORT OFF;\n\n        DECLARE @Error_Number int;\n        DECLARE\
  \ @ ErrorDescription VARCHAR(MAX);\n        DECLARE @ErrorLine INT;\n        DECLARE\
  \ @ErrorSeverity INT;\n        DECLARE @ErrorState INT;\n        DECLARE @Message\
  \ VARCHAR(150);\n\n        SET @ERROR_NUMBER = ERROR_NUMBER();\n        SET @ErrorDescription\
  \ = ERROR_MESSAGE();\n        SET @ErrorLine = ERROR_LINE();\n        SET @ErrorSeverity\
  \ = ERROR_SEVERITY();\n        SET @ErrorState = ERROR_STATE();\n\n        EXECUTE\
  \ CarSales_Logging.log.pr_Logging_Simple @ProcName, @ProcStep, @StartTime, 'Error\
  \ - Stored Procedure', @ERROR_NUMBER, @ErrorDescription, @ErrorLineNo, @ErrorSeverity,\
  \ @ErrorState;\n\n        SET @Message = 'Error in procedure: ' + @ProcName;\n \
  \       RAISERROR(@Message, 16, 1);\n    END CATCH\n-- End footer -------------------------------------------\n\
  ```\n\n## 配置步骤\n\n1.  创建一个名为`CarSales_Logging_ADONET`的 ADO.NET 连接管理器，用于连接到`CarSales_Logging`数据库。\n\
  2.  按如下方式将日志记录添加到 SSIS 任务。对于一个你希望记录其结果的任务或容器（在此示例中，将是一个数据流任务）。\n3.  在任务的作用域内添加以下两个变量（最安全的方式是先选择任务再创建变量）：\n\
  \n    | 变量名 | 类型 | 值 |\n    | --- | --- | --- |\n    | `IsError` | `Boolean` | `False`\
  \ |\n    | `StartTime` | `DateTime` | |\n\n4.  选择任务，单击“事件处理程序”选项卡，从可用事件处理程序列表中选择`OnPreExecute`。\n\
  5.  单击“单击此处以选择...”，然后在事件处理程序窗格上添加一个执行 SQL 任务。将其命名为**获取开始时间**。将其配置为使用 ADO.NET 连接`CarSales_Logging_ADONET`。\n\
  6.  在“参数映射”窗格中添加以下参数：\n\n    | 变量 | 方向 | 类型 | 参数名 |\n    | --- | --- | --- | ---\
  \ |\n    | `User::TaskStartTime` | `Output` | `DateTime` | `@TaskStartTime` |\n\n\
  7.  添加以下 SQL 作为 SQL 语句：\n    ```sql\n    SELECT @TaskStartTime = GETDATE()\n   \
  \ ```\n8.  关闭并确认任务。这会将任务开始时间传递给作用域在任务级别的 SSIS 变量。\n9.  从事件处理程序列表中选择`OnError`，然后单击“单击此处以选择...”。在事件处理程序窗格上添加一个执行\
  \ SQL 任务。将其命名为**记录失败**。添加用于日志记录的数据库的 ADO.NET 连接。\n10. 对于“记录失败”执行 SQL 任务，添加以下参数：\n\
  \n    | 变量名 | 方向 | 数据类型 | 参数名 |\n    | --- | --- | --- | --- |\n    | `User::ErrorCode`\
  \ | `Input` | `Int32` | `@ErrorNo` |\n    | `User::ErrorDescription` | `Input` |\
  \ `String` | `@ErrorDescription` |\n    | `System::PackageName` | `Input` | `String`\
  \ | `@Process` |\n    | `System::SourceName` | `Input` | `String` | `@Step` |\n\
  \    | `User::StartTime` | `Input` | `DateTime` | `@StartTime` |\n    | `User::IsError`\
  \ | `Input` | `Boolean` | `@IsError` |\n\n11. 在“记录失败”SQL 任务中，添加以下 SQL 作为要执行的 SQL\
  \ 语句：\n    ```sql\n    SET @IsError = 1;\n    EXECUTE dbo.pr_LogEvents @Process,\
  \ @Step, @StartTime, 'SSIS Error', @ErrorNo, @ErrorDescription;\n    ```\n12. 从事件处理程序列表中选择`OnPostExecute`，然后单击“单击此处以选择...”。在事件处理程序窗格上添加一个执行\
  \ SQL 任务。将其命名为**记录成功**。添加用于日志记录的数据库的 ADO.NET 连接。\n13. 添加以下参数：\n\n    | 变量名 | 方向\
  \ | 数据类型 | 参数名 |\n    | --- | --- | --- | --- |\n    | `User::TaskStartTime` | `Input`\
  \ | `DateTime` | `@TaskStartTime` |\n    | `System::PackageName` | `Input` | `String`\
  \ | `@Process` |\n    | `User::IsError` | `Input` | `Boolean` | `@IsError` |\n\n\
  14. 在“记录成功”SQL 任务中，添加以下 SQL 作为要执行的 SQL 语句：\n    ```sql\n    IF @IsError = 0\n  \
  \  BEGIN\n        EXECUTE dbo.pr_LogEvents @Process, @Step, @StartTime;\n    END\n\
  \    ```\n15. 返回到“控制流”选项卡。\n\n## 工作原理\n\n如果你正在构建（或已经构建）一个用于加载数据的中等复杂程度的 SSIS 包，那么你可能还希望将所有相关信息记录到一个中央存储库中。同样可能的是，这个存储库可能是一个\
  \ SQL Server 表，而不是文本文件。这样做的原因是：\n*   一个集中的关注点避免了需要从多个信息源中搜索。\n*   一个 T-SQL 表可以非常快速地被搜索和过滤。\n\
  \n那么，与使用和扩展 SSIS 提出的内置解决方案相比，使用“自己动手”的日志记录将日志记录到 T-SQL 有什么优点和缺点呢？表 15-8 提供了简明的概述。\n\
  \n表 15-8. 创建自定义日志框架的优点和缺点\n\n| 优点 | 缺点 |\n| --- | --- |\n| 对于存储过程的集中记录非常有用——或者简单来说，就是什么工作正常、什么不正常的列表。\
  \ | 实现起来需要更多精力。 |\n| 高度可定制。 | 难以调试。 |\n| 记录高度有针对性和具体的信息不会导致资源争用。 | 容易忘记向任务和代码添加日志调用。\
  \ |\n| 只记录所需的事件和信息。 | 本身可能成为包错误的来源并导致包失败。 |\n| 易于指定数据存储的持续时间。只保留最近的信息。 | |\n| 易于提取高级数据进行基线分析。\
  \ | |\n| 有助于调试。 | |\n\n尽管如此，我坚信将日志记录到中央表非常适合于生产 ETL 作业，而且我已经应用多年了。如果说有什么不同的话，那就是它变成了一种习惯和有价值的辅助工具，不仅在包投入生产之后，在调试它们时也是如此。\n\
  \n你可能会建议，既然 SQL Server 2012 提供了 SSIS 目录来提供日志记录，构建自定义日志框架已经是过去式了。我的回应是，虽然 SSIS 目录是一个用于记录\
  \ SSIS 任务和包日志的绝佳工具，但它（至少目前还不是）一个用于记录所有事件（包括由存储过程生成的事件）的中央存储库。但是，如果 SSIS 处理了整个 ETL\
  \ 过程而没有任何对存储过程的调用，那么 SSIS 目录日志记录当然是可行的方法。SSIS 目录在配方 15-16 到 15-18 中有描述。\n\n我在这里建议的方法是使用一个\
  \ SQL Server 表来记录当 SSIS 任务或 T-SQL 代码片段成功或失败时生成的事件数据。一个存储过程记录结果。这个存储过程从 T-SQL 或从\
  \ SSIS 调用。无论如何，出于本章开头概述的原因，我还强烈建议任何日志记录都使用自己的数据库。\n\n日志表的 DDL 解释了其用途。由于 T-SQL 和\
  \ SSIS 之间的术语不同，为表字段名称做出了一些词汇选择，但我希望它们是自解释的。唯一可能需要进一步解释的字段是`Step`和`Process`。我添加了这些，因为一个包可能记录许多事件，并且这些事件是嵌套的（存储过程调用其他存储过程，SSIS\
  \ 包调用 SSIS 包，而它们又有任务）。这两个字段允许你跟踪哪个进程调用了什么子元素，从而创建一个简单的层次结构来跟踪这种调用嵌套。它意味着始终包含对以下内容的引用：\n\
  *   `Process`：容器（SSIS 包或存储过程）。\n*   `Step`：要记录的元素或任务。\n\n我认为这种方法对于中小型 SSIS 流程很有用，这些流程需要基本（但不过度详细）的日志记录。\n\
  ```\n\n\n\n对于非常复杂的 ETL 系统，您将需要扩展这些表和过程以满足您的特定需求。像这样的集中式方法需要存储三种类型的元素：\n-   SSIS\
  \ 和 T-SQL 的通用数据。\n-   仅特定于 SSIS 或 T-SQL 的数据。\n-   错误详情（同样可以是 SSIS 和 T-SQL 的通用数据或特定于其中之一）。\n\
  \n因此，基于此方法的假设是您希望有相当最少的日志记录，让我们假设每个步骤需要记录以下基本原则：\n-   包进程\n-   包步骤\n-   记录内容的描述\n\
  -   开始时间\n-   结束时间（事件被记录的时间）\n-   如果捕获到错误，记录错误详情\n\n您将需要以下内容：\n-   一个存储成功记录的表。\n\
  -   一个记录事件结果的存储过程。\n-   一个到用于日志记录的数据库的 ADO.NET 连接管理器。我建议使用 ADO.NET 而非 OLEDB，纯粹是因为它处理参数传递的简便性，尤其是在有多个参数时。如果您愿意，可以使用\
  \ OLEDB 连接管理器。\n\n从 T-SQL 进行日志记录是直接日志记录（如“Recipe 15-7”中所述）和错误处理（如“Recipe 15-8”中所述）的组合。这里是一个存储过程模板的示例，我将错误处理包装在标准的页眉和页脚中，并使用相同的存储过程来记录成功的步骤以及任何失败。此存储过程大纲甚至可以成为您\
  \ ETL 流程中所有存储过程的模型。\n\n从 SSIS 记录到集中式表（与从存储过程记录时使用的表相同）需要明智地使用事件处理器才能干净有效地工作。对于大多数任务，您可以使用以下内容：\n\
  -   `OnPreExecute` 事件处理器来设置任务开始的时间。\n-   `OnPostExecute` 事件处理器来记录任务完成。\n-   `OnError`\
  \ 事件处理器来记录任务失败的事实以及任何错误消息。\n\n此外，您需要设置两个任务作用域的变量（作用域很重要），以便可以初始化开始时间，并设置一个错误标志（如果发生错误，这将阻止\
  \ `OnPostExecute` 事件处理器记录事件以及 `OnError` 事件处理器）。换句话说，作为 `OnError` 事件的一部分将 `IsError`\
  \ 变量标记为 True，允许错误状态在 `OnPostExecute` 事件触发时被日志记录过程获取。由于“Log Success”任务在触发时也会测试此变量，它仅在错误***未***发生时调用存储过程来记录事件。\n\
  \n使用指向执行日志记录的服务器的 `Getdate()` 可能很重要，但您不能确保所有服务器都同步返回完全相同的日期和时间。因此，如果您使用脚本包和托管 SSIS\
  \ 的服务器上的 `Now()` 函数，而日志记录发生在另一台服务器上，您最终可能会得到不一致的时间戳。\n\n提示、技巧和陷阱\n-   如果您的 SSIS\
  \ 包非常简单，只包含一个步骤，那么您可以使用 `System::StartTime` 系统变量来记录开始时间，您将不需要使用或设置 `TaskStartTime`\
  \ 变量。\n-   不要试图使用 `ContainerStartTime` 系统变量来记录包开始时间——这将给出执行日志记录的 Execute SQL 任务的开始时间——**而不是**您试图监视的任务。\n\
  -   从 T-SQL 记录时，存储过程输入参数的顺序很重要，因为任何非强制（`NULL`）参数必须跟在强制参数之后。\n\n#### 15-11. 使用 SSIS\
  \ 容器时记录到集中式框架\n\n### 问题\n当使用 SSIS 容器和基于事件处理器的自定义日志框架时，您发现相同的事件被记录了多次。\n\n### 解决方案\n\
  以特定方式将您的自定义日志框架应用于 SSIS 容器，以便只制作一条日志条目。以下是完成方法：\n1.  创建一个 SSIS 包。\n2.  创建一个名为 `CarSales_Logging_ADONET`\
  \ 的 ADO.NET 连接管理器，连接到 CarSales_Logging 数据库——当然，除非它已存在。\n3.  创建以下变量：\n    | 名称 |\
  \ 作用域 | 数据类型 |\n    | --- | --- | --- |\n    | ContainerStart | 包 | DateTime |\n\
  4.  添加一个 Execute SQL 任务。将其命名为 `SetStartTime`。双击进行编辑并按如下配置：\n    | 连接类型 | ADO.NET\
  \ |\n    | --- | --- |\n    | 连接 | CarSales_ADONET |\n    | SQL 源类型 | 直接输入 |\n \
