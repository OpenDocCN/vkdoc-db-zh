  \    *   输出名称：`Correct`\n    *   条件：`[Record Status]==”Correct” || [Record Status]==”Corrected”`\n\
  \    *   注释：为 DQS 接受数据为有效的记录创建输出。\n12. 单击“确定”以确认你的更改。\n13. 向数据流窗格添加一个 OLEDB 目标。将此目标连接到条件拆分任务的“正确”输出，然后按如下配置。之后，将源列映射到目标列。你不需要映射\
  \ DQS 状态列。\n    *   名称：`Correct Records`\n    *   OLEDB 连接管理器：`CarSales_OLEDB`\n\
  \    *   数据访问模式：`表或视图 – 快速加载`\n    *   表或视图名称：`Dbo.stock`\n14. 向数据流窗格添加一个 OLEDB\
  \ 目标。将此目标连接到条件拆分任务的“新建”输出，然后按如下配置。之后，将源列映射到目标列。你不需要映射 DQS 状态列。\n    *   名称：`New\
  \ Records`\n    *   OLEDB 连接管理器：`CarSales_Staging_OLEDB`\n    *   数据访问模式：`表或视图 –\
  \ 快速加载`\n    *   表或视图名称：`Dbo.Stock_FailedCleansing. (使用 SSIS 创建一个“新建”表)`\n\n最终的包应如图\
  \ 9-30 所示。\n\n![图 9-30](img/9781430247913_Fig09-30.jpg)\n*图 9-30. DQS 清洗包概述*\n\n\
  你现在可以运行该包。如果一切顺利，它将把验证通过的数据直接加载到目标表，并将需要进一步处理的数据发送到暂存表。\n\n### 工作原理\n\n正如我在本章引言中提到的，数据清洗有一个方面我会涉及到，那就是\
  \ SQL Server Data Quality Services。遗憾的是，我无法给出 SQL Server Data Quality Services 的完整介绍，因为那本身就需要一章的篇幅。但是，我可以解释如何使用它在\
  \ SSIS 过程中清洗流经的数据，即使用 SSIS DQS 清洗任务。\n\n如果你还不熟悉 Data Quality Services，那么为了本配方的目的，你只需要知道它允许你将加载到\
  \ SQL Server 表中的数据与一组参考数据（包含在知识库中）进行比较。每个知识库可以包含多个域（可以将它们视为一种高级且设计巧妙的查找表）。然后，你可以使用域在数据流入目标表时进行验证，甚至纠正源数据。\n\
  \n\n\n当 DQS 分析源数据并与某个域进行比较时，它会将数据标记为 `New`（即知识库中未知）、`Correct`（源数据与知识库中的数据完全一致）或\
  \ `Corrected`（知识库包含映射，允许 DQS 用应使用的值替换源数据）。\n\n值得注意的是，使用 DQS 清洗任务进行数据清洗可能比本示例中简单的例子复杂得多。每个使用知识库中的域进行清洗的列都会添加一个\
  \ `_Source` 列、一个 `_Output` 列以及一个 `_Status` 列。这使你能够为数据流添加细粒度的逻辑。这种细致之处带来的必然结果是，它可能在数据流中暗示极其复杂的决策逻辑。\n\
  \n必须至少创建一个 DQS 知识库并填充一个功能正常的域。在本例中，我创建了一个 `Colours` 域，用于清洗将被添加到示例数据库 `Stock` 表中的新车的颜色引用。\n\
  \n待验证的源数据——在本例中，我使用一个包含 `Stock` 数据的源表，该表位于 `CarSales_Staging` 数据库中，名为 `CarColoursForDQSInSSIS`。\n\
  \n第二个目标表 `Stock_FailedCleansing` 位于暂存数据库中。此表保存清洗失败以供手动更正的记录，很可能可用于更新 DQS 知识库。\n\n\
  #### 提示、技巧与陷阱\n\n*   数据源可以是 SSIS 能够导入的任何源，不一定非得是数据库表。\n*   此示例仅显示了使用一个域来清洗一个源列。如果需要，你可以选择使用\
  \ DQS 清洗任务一次清洗多个源列。\n*   此示例假设“正确”和“已更正”的数据是相同的。你可能更愿意将它们分成两个数据路径（例如，添加计数器，或者使用\
  \ `Multicast` 任务将已更正的数据输出到单独的暂存表进行分析）。然后，这两个路径可以进行排序并合并到单个目标中。\n*   如何处理新域数据是一个潜在的非常重大的问题。你是在\
  \ ETL 过程完成后将其排除在目标表之外并手动重新处理，还是允许数据加载到目标表中，标记任何异常，并就地更新这些数据（此处未展示）？决策将取决于每个特定过程的细微差别。\n\
  \n#### 总结\n\n本章带你（相当快速地）概览了在你作为 ETL 开发人员的职业生涯中可能需要应用的众多可用数据转换技术中的一部分。希望你已经看到，ETL\
  \ 开发人员面临的大多数“经典”问题（数据类型转换、透视和规范化数据、列的子集划分以及列的连接，仅举几例）都可以在 SSIS 管道中解决，或者在数据导入 SQL\
  \ Server 的暂存表后解决。\n\n我在本章中对缓慢变化维度给予了相当的重视，因为它们似乎正日益成为 ETL 领域的一部分。这可能是由于商业智能（BI）在企业中日益重要。无论如何，处理目标数据会随时间变化的数据加载，现在是许多\
  \ ETL 过程的基本组成部分，因此我希望确保处理此类数据集的核心技术得到解释。\n\n我完全意识到，由于篇幅限制，有许多挑战我未能描述解决方案。我也意识到，对于本章描述的每一种技术，都有许多替代解决方案和变体。\n\
  \n尽管如此，我希望本章提供的配方将帮助你解决一些你可能遇到的更“经典”的 ETL 问题，并且你可以将这些信息作为一个起点，用于构建你自己坚实可靠的数据转换过程，同时使用\
  \ SSIS 和 T-SQL。\n\n## 第 10 章\n\n![image](img/frontdot.jpg)\n\n## 数据剖析\n\n每个从事数据摄取和整合工作的人都想确切地了解他们正在使用的源数据由什么构成。虽然这并不意味着要了解每个表中的每一个数据片段，但它可以且应该意味着对数据列中存在什么（同样重要的是，不存在什么）有一个高层视图。这种知识通常是决定数据源有效性，甚至决定是否继续进行\
  \ ETL 过程的有价值的第一步。确实，自从 SSIS 2008 中引入数据剖析任务以来，数据剖析的重要性似乎已得到 Microsoft 的认可。因此，显而易见，值得深入探讨使用\
  \ SQL Server 进行数据剖析的艺术和科学。因此，本章的目标是帮助你理解什么是数据剖析，以及它在处理数据库时能为你提供什么帮助。实际上，我怀疑许多（如果不是大多数的话）SQL\
  \ Server 开发人员和 DBA 在他们的工作中已经使用了某种数据剖析技术，即使他们当时没有使用“数据剖析”这个术语来描述他们在做的事情。\n\n使用 SQL\
  \ Server 进行数据剖析并不局限于 SSIS 数据剖析任务。在本章中，我将展示许多不同的数据剖析方法，在这些方法中，你使用 T-SQL 和 SSIS——甚至\
  \ CLR（公共语言运行时）——来“定制”你自己的剖析技术。这是为了向你展示数据剖析是一种多样化的艺术形式，并且它可以用许多不同的方式来帮助解决不同的问题。一如既往，我们将从最简单的技术开始，然后逐步进展到更复杂的技术。\n\
  \n由于这个领域使用的术语可能会引起混淆，让我们首先定义我们所说的数据剖析是什么意思。`数据剖析`是指运行一个过程以从数据集中返回度量指标。\n\n第一种——也是主要的一种——你可以执行的数据剖析是`属性分析`。它包括查看单个列中的数据，并提取出以下方面的高层视图：\n\
  \n*   空值计数和空值比率。\n*   域分析（列中每个元素的计数和比率）。\n*   字段长度的最大值和最小值，通常还包括长度分布（主导长度和主导长度百分比）。\n\
  *   数值最大值和最小值。\n*   值分布（域分析、中位数、唯一/不同值和异常值）。\n*   模式概况（文本和数字的格式）以及模式合规百分比。\n*  \
  \ 数据类型剖析。\n\n我们在本章中结合 SSIS 数据剖析任务简要探讨的第二种数据剖析类型是`关系分析`——列和记录如何相互关联（如果有的话）。这包括：\n\
  \n*   孤儿记录——以及孤儿的数量和百分比。\n*   无子记录——以及无子记录的数量和百分比。\n*   键（连接）概况——基数（有多少映射到一个连接）。\n\
  \n有些数据剖析可以应用于任何数据类型；有些是类型特定的。我的意思是，你可能希望在文本或数字字段中寻找 `NULL`，而你只会在数字字段中寻找数值分布，在文本字段中寻找字段长度。\n\
  \n显然，第一个要问的问题是为什么要剖析数据？作为回应，我认为数据剖析可以——并且经常应该——在两种情况下使用：\n\n*   在编写复杂的 ETL 过程之前分析源数据。\n\
  *   作为 ETL 过程的一部分。\n\n\n\n"
- '# 为了更好地理解数据剖析的必要性


  为了更好地理解数据剖析的必要性，请考虑 DBA 或开发人员经常面临的 ETL 场景。一个文件或某个数据的链接出现在你的电子邮件中，你需要“集成它”。可能有一些（有限的）文档，而且文档和数据都可能——也可能根本不可信。对数据进行剖析，进行属性和关系分析，可以为你节省大量时间，因为它使你能够：


  *   **发现数据中的异常和矛盾**。

  *   **向提供数据的人提出更准确、更深入的问题**。

  *   **向你公司或部门的人（他们确信自己刚刚给了你一根解决所有数据需求的魔杖）解释数据可以如何被实际使用，以及它如何（或不能）集成到你的目标数据库和数据仓库中**。


  作为 ETL 过程一部分的数据剖析可能因以下任何原因而至关重要：


  *   维护数据质量指标的跟踪记录。

  *   在数据质量超出定义的阈值时向你发出警报。

  *   使你能够开发更精细的数据质量分析，其中质量的渐变（相对于简单的通过或失败）可以发展。这些分析可以在加载例程期间或之后作为警报发送。


  一旦你有了这些分析，那么下一个问题应该是“这为什么重要？”嗯，答案将取决于你的具体数据集。如果所讨论的列包含对后续处理至关重要的数据（例如客户 ID），那么你可能希望为`NULL`设置一个阈值（绝对值或百分比），超过该阈值就停止处理。或者，如果此列中的`NULL`将导致
  ETL 例程后期的进程失败，那么单个`NULL`可能就足以使数据流无效。关键在于，现在获取数据可能只需要几秒钟。在经过五六个小时的处理后才发现错误，真是浪费时间。


  '
- '# 为什么选择自定义剖析例程


  如果你同意前面的前提，你可能仍然想知道：为什么要费心去开发自己的剖析例程，当已经存在一个相当好的 SSIS 任务时？嗯，你可能更喜欢自定义方法的原因有几个：


  *   数据剖析任务仅适用于 SQL Server 源（2000 及以上版本），而自定义剖析可以适用于许多不同的数据源。

  *   你可能希望执行剖析而不一定使用 SSIS。

  *   数据剖析任务仅从 SQL Server 2008 开始可用。在某些情况下，你可能仍在使用 SQL Server 2005。

  *   为了节省时间，你可能希望在数据摄取期间对现有数据流执行数据剖析，而不是运行一个独立于数据流的任务。

  *   你想要超越 SSIS 中可用的“开箱即用”的剖析请求类型。

  *   你想为剖析结果添加进一步的统计分析。

  *   作为 ETL 过程的一部分，`XML`输出可能需要一些笨拙的变通方法来读取。

  *   你想在运行耗时耗资源的 ETL 过程之前测试数据是否有足够的可能准确性。使用剖析任务时这并不容易。

  *   你希望剖析捕获为统计上可疑的记录从数据流中移出，和/或输出到单独的数据目的地进行分析。

  *   你想执行有针对性的子集分析——也就是说，你已经经历过倾向于引起问题的数据类型，并且你希望剖析具有某些特征的数据以减少剖析时间。


  本章描述的技术不会试图自动化数据清理，因为这是一个我不会详细探讨的主题。然而，我希望表明，有效使用数据剖析技术可以是数据清理中极其有用的第一步（有些人可能会说是必不可少的一步）。


  本章概述的技术都是具体的，而不是通用的。我的意思是，本章描述的每项剖析或分析技术的所有部分都必须组装到一个适应特定数据源的自定义流程中。这些方法不试图适应任何数据源，也不试图自动适应数据源。


  ## 前提条件


  要测试本章中的示例，你必须从本书的配套网站下载示例文件，并将其安装在`C:\SQL2012DIRecipes\CH10`文件夹中。你还需要两个示例数据库`CarSales`和`CarSales_Staging`，它们也在网站上。


  ## 10-1\. 剖析数据属性


  ### 问题


  你想从 SQL Server 数据源获取属性信息（计数、NULL 记录、字段长度和其他基本细节）。


  ### 解决方案


  使用 T-SQL 函数来剖析和返回源数据的属性。这是一个例子：


  ```sql

  SELECT COUNT(*) FROM CarSales.dbo.Stock WHERE Marque IS NULL;

  ```


  ### 工作原理


  我们从使用 T-SQL 进行数据剖析开始。此代码段返回特定列有`NULL`值的记录数。


  为了进一步解释这个概念，我假设你正在分析已经加载到 SQL Server 中的数据。根据我的经验，当你首次将数据加载到暂存数据库，最终将传输到 ODS（操作数据存储）或数据仓库时，这是一个常见的场景。在配方
  10-3 中，你将看到如何使用它们处理尚未进入 SQL Server 的数据。幸运的是，这种方法只需要你应用一系列你可能已经知道的内置函数。它们显示在表 10-1
  中。


  **表 10-1. T-SQL 中的属性剖析函数**


  | 函数 | 在剖析中的用途 |

  | :--- | :--- |

  | `NULL` | 检测`NULL`值。 |

  | `MAX` | 获取最大数值——或者与`LEN`结合使用，获取最大字符串长度。 |

  | `MIN` | 获取最小数值——或者与`LEN`结合使用，获取最小字符串长度。 |

  | `COUNT` | 计算记录数。 |

  | `LEN` | 获取字符字段的长度。 |


  配合明智地使用`GROUP BY`和`DISTINCT`关键字，这些函数可能会覆盖你大多数基本数据属性剖析需求。确实，考虑到这些函数的简单性和易用性，一次性查看所有函数并同时了解核心属性剖析类型，可能比费力地逐一解释每个函数更快。我知道对许多读者来说，这一切可能显得过于简单。然而，为了完整性，表
  10-2 给出了你可能会使用的代码片段。所有示例都假设你使用的是`CarSales.dbo.Stock`表。


  **表 10-2. T-SQL 中的属性剖析示例**


  | 剖析任务 | 代码 | 注释 |

  | :--- | :--- | :--- |

  | `NULL`剖析 | `SELECT COUNT(*) FROM dbo.Stock WHERE Marque IS NULL;` | 特定列中有`NULL`的记录有多少？
  |

  | `NULL`百分比 | `SELECT (SELECT CAST(COUNT(*)AS NUMERIC (18,3)) FROM dbo.Stock WHERE
  Marque IS NULL) / (SELECT COUNT(*) FROM dbo.Stock);` | 这代表总数的百分比。 |

  | 最大值 | `SELECT MAX(ID) FROM dbo.Stock;` | 数值列中的最大值。 |

  | 最小值 | `SELECT MIN(ID) FROM dbo.Stock;` | 数值列中的最小值。 |

  | 最大值计数 | `SELECT COUNT(*) FROM dbo.Stock WHERE ID = (SELECT MAX(ID) FROM dbo.Stock);`
  | 数值列中具有最大值的数量。 |

  | 最小值计数 | `SELECT COUNT(*) FROM dbo.Stock WHERE ID = (SELECT MIN(ID) FROM dbo.Stock);`
  | 数值列中具有最小值的数量。 |



  '
- '# 10-2. 配置域和值分布


  ## 问题

  您希望从 SQL Server 源表中获取域和值分布数据。


  ## 解决方案

  使用 T-SQL 函数返回域和值分布信息。本质上，这意味着发现包含每个值的记录数以及该值在数据集中的百分比。


  表 10-3 中的代码片段为您提供了数据表中域分布的快照。这两个代码示例都对 `CarSales.dbo.Stock` 表进行了配置。


  表 10-3. SQL Server 数据源中的域和值分布


  | 分布 | 代码 | 注释 |

  | --- | --- | --- |

  | 域分布 | `SELECT TOP (100) PERCENT Marque, COUNT(Marque) AS NumberOfMarques,` | 此代码片段结合分析了：
  |

  |  | `COUNT(Marque)/` | 域值； |

  |  | `(SELECT CAST(COUNT(*) AS NUMERIC(18,8))` | 包含每个值的记录数； |

  |  | `FROM CarSales.dbo.Stock)` |  |

  |  | `* 100 AS DomainPercent` | 每个值在数据集中的百分比。 |

  |  | `FROM          CarSales.dbo.Stock` |  |

  |  | `GROUP BY      Marque` |  |

  |  | `ORDER BY      Marque DESC;` |  |

  | 数值分布 | `SELECT      ID, COUNT(ID) AS NumberOfValues` | 此代码片段结合分析了： |

  |  | `FROM        CarSales.dbo.Stock` | 数值； |

  |  | `GROUP BY    ID` |  |

  |  | `ORDER BY    NumberOfValues DESC;` | 包含每个值的记录数。 |


  ## 工作原理

  值分布简单来说就是获取以下指标：

  - 包含指定字段中每个值（文本或数值）的记录数。

  - 包含指定字段中每个值（文本或数值）的记录百分比。


  对包含大量不同值的集合应用值分布分析本身可能不是特别有用。我建议这种方法最适合用于分析包含少量不同值的字段——最常见的是查找或参考值——其中数据分布是数据可靠性的指标。


  ## 提示、技巧和陷阱

  *   此解决方案中的方法也可以应用于非 SQL Server 数据源或链接服务器。

  *   配置链接服务器源可能会非常慢，虽然这对于初步数据分析有用，但作为常规 ETL 流程的一部分可能不实用。

  *   您可以在配方 10-5 中了解如何存储配置请求的输出。


  '
- "# 10-3. 配置外部数据\n\n## 问题\n您希望配置尚未存储在 SQL Server 中的数据。\n\n## 解决方案\n使用 T-SQL 和 `OPENROWSET`\
  \ 通过 OLEDB 访问源数据。\n\n如果您要查看文本文件或 OLEDB 数据源中的数据，则可以使用 `OPENROWSET` 返回 `NULL` 计数（在此示例中，使用示例文件\
  \ `C:\\SQL2012DIRecipes\\CH10\\Stock.Txt`）：\n```sql\nSELECT COUNT(*)\nFROM OPENROWSET('MSDASQL',\n\
  \    'Driver={Microsoft Access Text Driver (*.txt, *.csv)};\n     DefaultDir= C:\\\
  SQL2012DIRecipes\\CH10;',\n    'select * from Stock.Txt')\nWHERE Model IS NULL;\n\
  ```\n\n同样，可以使用以下 T-SQL 计算 `NULL` 的百分比：\n```sql\nSELECT\n    (SELECT CAST(COUNT(*)\
  \ AS NUMERIC (10,3))\n     FROM OPENROWSET('MSDASQL',\n         'Driver={Microsoft\
  \ Access Text Driver (*.txt, *.csv)};\n          DefaultDir= C:\\SQL2012DIRecipes\\\
  CH10;',\n         'SELECT * FROM Stock.txt WHERE Model IS NULL'))\n    /\n    (SELECT\
  \ COUNT(*)\n     FROM OPENROWSET('MSDASQL',\n         'Driver={Microsoft Access\
  \ Text Driver (*.txt, *.csv)};\n          DefaultDir= C:\\SQL2012DIRecipes\\CH10;',\n\
  \         'SELECT * FROM Stock.Txt'));\n```\n\n代码片段位于文件 `C:\\SQL2012DIRecipes\\\
  CH10\\ProfileExternalData.Sql` 中。\n\n## 工作原理\n配方 10-1 和 10-2 中描述的所有用于执行域和数据分析的技术都可以与\
  \ `OPENROWSET` 一起使用。这里的技巧是连接到“外部”（我指的是非 SQL Server）数据源。一旦使用必需的驱动程序完成此操作，您就可以在直通查询中使用适当的\
  \ SQL 代码片段。用于分析数据的函数与前两个配方中使用的函数相同。\n\n`OPENROWSET` 可以访问的不仅仅是文本文件。然而，由于使用此命令从 Microsoft\
  \ Access、Excel 和各种 RDBMS 读取数据的技术分别在 第 1 章 和 第 4 章 中介绍，有关实际外部连接的更多信息，请参阅这些章节。分析代码仍将与此处所示的相同。\n\
  \n> **注意** 在本配方的示例中，我使用 ACE 驱动程序读取文本文件，因为这允许代码在 32 位和 64 位环境中运行。为此，您必须按照配方 1-1 中的说明安装\
  \ ACE 驱动程序。如果您在 32 位环境中，则可以使用 Microsoft Text Driver，并将代码中的“Microsoft Access Text\
  \ Driver (`*.txt`, `*.csv`)”替换为“Microsoft Text Driver (`*.txt`; `*.csv`)”。\n\n"
- "# 10-4. 更快地配置外部数据\n\n## 问题\n您希望在最短时间内配置来自 SQL Server 以外来源的数据。\n\n## 解决方案\n使用 T-SQL\
  \ 和 `OPENROWSET`，同时最小化读取数据集的次数。一种方法是使用临时表，如下面的示例所示 (`C:\\SQL2012DIRecipes\\CH10\\\
  Stock.Txt`)：\n```sql\nDECLARE @Cost_Price             INT\nDECLARE @Registration_Year\
  \      INT\nDECLARE @ROWCOUNT               INT\nDECLARE @Mileage_MAX          \
  \  INT\nDECLARE @Mileage_MIN            INT\nDECLARE @Registration_Year_NULL INT\n\
  DECLARE @Cost_Price_NULL        INT\n\nSELECT\n    CASE WHEN Registration_Year IS\
  \ NULL THEN 1 ELSE 0 END AS Registration_Year,\n    CASE WHEN Cost_Price IS NULL\
  \ THEN 1 ELSE 0 END AS Cost_Price\nINTO   #NullSourceRecords\nFROM   OPENROWSET('MSDASQL',\n\
  \           'Driver={Microsoft Access Text Driver (*.txt, *.csv)};\n           \
  \ DefaultDir= C:\\SQL2012DIRecipes\\CH10;',\n           'select Registration_Year,\
  \ Cost_Price from Stock.txt')\nWHERE  Registration_Year IS NULL OR Cost_Price IS\
  \ NULL\n\nSELECT\n    @ROWCOUNT = COUNT(*),\n    @Mileage_MAX = MAX(Mileage),\n\
  \    @Mileage_MIN = MIN(Mileage)\nFROM OPENROWSET('MSDASQL',\n    'Driver={Microsoft\
  \ Access Text Driver (*.txt, *.csv)};\n     DefaultDir= C:\\SQL2012DIRecipes\\CH10;',\n\
  \    'select Registration_Year, Cost_Price from Stock.')\n```\n\n"
- "# 10-4. 从文本文件进行源数据剖析（续）\n\n```sql\ntxt')  SELECT  @Registration_Year_NULL = SUM(Registration_Year)\
  \  ,@Cost_Price_NULL = SUM(Cost_Price) FROM    #NullSourceRecords  PRINT    @ROWCOUNT\
  \ PRINT    @Mileage_MAX PRINT    @Mileage_MIN PRINT    @Registration_Year_NULL PRINT\
  \    @Cost_Price_NULL PRINT    CAST(@Registration_Year_NULL AS NUMERIC (12,6)) \
  \              / CAST(@ROWCOUNT AS NUMERIC (12,6))\n```\n\n## 工作原理\n\n读完 10-4 节后（或者如果你正在使用自己的大型文本文件作为数据源，你很快就会发现），你可能已经猜到，每次希望剖析某一列时都重新读取整个文件，是一种非常冗长繁琐的数据剖析方法。因此，如果你要剖析多个列，我建议尽可能通过分组剖析数据来最小化数据读取的次数，这样每次读取源文件时就能获取尽可能多的剖析元素。\n\
  \n当前小节中的代码片段只读取了源文本文件两次——且仅两次。第一次遍历文件是为了查找两列（`Registration_Year` 和 `Cost_Price`）中的\
  \ `NULL` 值。它创建一个临时表，其中包含一个狭窄的数据集，仅包含 1 或 0，用以指示每列是否存在 `NULL` 值。然后对这些列进行求和，以得出相关列的\
  \ `NULL` 值总数。第二次解析源文件时不应用 `WHERE` 子句——并返回记录数以及所需列的最大值和最小值。之后就可以进行任何百分比计算。\n\n####\
  \ 提示、技巧与陷阱\n\n*   关于与文本文件一起使用 `OPENROWSET` 的更详细讨论，请参阅 2-5 节。具体来说，请记住 `OPENROWSET`\
  \ 是为临时、偶尔的连接而构建的，对于更常规的连接，链接服务器是推荐的解决方案。\n*   对于链接服务器，你可以使用类似以下的 SQL 来简化操作（其中 `MyOracleDatabase`\
  \ 是链接服务器名称）。请记住使用四部分名称来正确引用表：\n    ```sql\n    SELECT COUNT(*)\n    FROM MyOracleDatabase..HR.EMPLOYEES\n\
  \    WHERE LAST_NAME IS NULL\n    ```\n*   如果你的源数据文件不包含列名，剖析外部数据可能会更费力。在这种情况下，你需要一个\
  \ `Schema.Ini` 文件，如 2-6 节所述。以下是一个数据源文件 (`C:\\SQL2012DIRecipes\\CH10\\StockNoHeaders.Txt`)\
  \ 的 `Schema.Ini` 文件 (`C:\\SQL2012DIRecipes\\CH10\\Schema.Ini`)，该文件不包含标题行：\n    ```ini\n\
  \    [StockNoHeaders.txt]\n    Format=CSVDelimited\n    ColNameHeader=False\n  \
  \  MaxScanRows=0\n    Col1=MAKE Long\n    Col2=MARQUE long Width 20\n    Col3=MODEL\
  \ Text Width 50\n    Col4=PRODUCT_TYPE Text Width 15\n    Col5=REGISTRATION_YEAR\
  \ Text Width 4\n    Col6=MILEAGE Long\n    Col7=COST_PRICE Long\n    CharacterSet=ANSI\n\
  \    ```\n    运行本小节中的代码——并使用传递查询 `SELECT * FROM StockNoHeaders.txt`——将剖析一个不包含标题行的文本文件中的源数据。\n\
  \n"
- "# 10-5. 运行并记录完整的数据剖析\n\n## 问题\n\n你希望对源表进行一次完整的数据剖析，并将使用 10-1 至 10-4 节中描述的基于 T-SQL\
  \ 的技术收集到的剖析结果存储起来。\n\n## 解决方案\n\n设计一个 T-SQL 脚本来剖析所有你认为至关重要的信息，并将输出写入一个 SQL Server\
  \ 表。然后，你就可以运行剖析 T-SQL 并存储返回的剖析数据。下面是一个示例。\n\n1.  使用以下 DDL 创建一个剖析数据日志表 (`C:\\SQL2012DIRecipes\\\
  CH10\\tblDataProfiling.Sql`)：\n    ```sql\n    CREATE TABLE CarSales_Staging.dbo.DataProfiling\n\
  \    (\n     ID int IDENTITY(1,1) NOT NULL,\n     DateExecuted DATETIME NULL CONSTRAINT\
  \ DF_Log_DataProfiling_DateExecuted\n                            DEFAULT (getdate()),\n\
  \     DataSourceObject varchar(250) NULL,\n     DataSourceColumn varchar(250) NULL,\n\
  \     ProfileName varchar(50) NULL,\n     ProfileResult numeric(22, 4) NULL\n  \
  \  ) ;\n    GO\n    ```\n2.  运行以下 T-SQL 来捕获并存储剖析数据 (`C:\\SQL2012DIRecipes\\CH10\\\
  LogProfileData.Sql`)：\n    ```sql\n    DECLARE @Rowcount               INT;\n  \
  \  DECLARE @Model_NULL              INT;\n    DECLARE @Mileage_NULL            INT\n\
  \    DECLARE @Model_PERCENTNULL       NUMERIC(8,4);\n    DECLARE @Mileage_PERCENTNULL\
  \     NUMERIC(8,4);\n    DECLARE @Model_MAXLENGTH         INT;\n    DECLARE @Model_MINLENGTH\
  \         INT;\n    DECLARE @Mileage_MAX             INT;\n    DECLARE @Mileage_MIN\
  \             INT;\n\n    SELECT    @Rowcount = COUNT(*),\n              @Mileage_MAX\
  \ = MAX(Mileage),\n              @Mileage_MIN = MIN(Mileage),\n              @Model_MAXLENGTH\
  \ = MAX(LEN(Model)),\n              @Model_MINLENGTH = MIN(LEN(Model))\n    FROM\
  \      CarSales.dbo.Stock;\n\n    SELECT   @Model_NULL = COUNT(*)\n    FROM    \
  \ CarSales.dbo.Stock\n    WHERE    Model IS NULL;\n    SELECT   @Mileage_NULL =\
  \ COUNT(*)\n    FROM     CarSales.dbo.Stock\n    WHERE    Mileage IS NULL;\n\n \
  \   SET        @Model_PERCENTNULL =\n                 CAST(@Model_NULL AS NUMERIC(5,2))\
  \ / CAST(@Rowcount AS NUMERIC(5,2));\n    SET        @Mileage_PERCENTNULL =\n  \
  \               CAST(@Mileage_NULL AS NUMERIC(5,2)) / CAST(@Rowcount AS NUMERIC(5,2));\n\
  \n    INSERT INTO CarSales_Staging.dbo.DataProfiling (DataSourceObject, DataSourceColumn,\
  \ ProfileName, ProfileResult)\n    VALUES ('CarSales_Staging.dbo.Stock', 'ALL',\
  \ 'NbRows', @Rowcount, 100);\n    INSERT INTO CarSales_Staging.dbo.DataProfiling\
  \ (DataSourceObject, DataSourceColumn, ProfileName, ProfileResult)\n    VALUES ('CarSales_Staging.dbo.Stock',\
  \ 'Mileage', 'MaxMileage', @Mileage_MAX, 100);\n    INSERT INTO CarSales_Staging.dbo.DataProfiling\
  \ (DataSourceObject, DataSourceColumn, ProfileName, ProfileResult)\n    VALUES ('CarSales_Staging.dbo.Stock',\
  \ 'Mileage', 'MinMileage', @Mileage_MIN, 100);\n    INSERT INTO CarSales_Staging.dbo.DataProfiling\
  \ (DataSourceObject, DataSourceColumn, ProfileName, ProfileResult)\n    VALUES ('CarSales_Staging.dbo.Stock',\
  \ 'Model', 'MaxLn_Model', @Model_MAXLENGTH, 100);\n    INSERT INTO CarSales_Staging.dbo.DataProfiling\
  \ (DataSourceObject, DataSourceColumn, ProfileName, ProfileResult)\n    VALUES ('CarSales_Staging.dbo.Stock',\
  \ 'Model', 'MinLn_Model', @Model_MINLENGTH, 100);\n    INSERT INTO CarSales_Staging.dbo.DataProfiling\
  \ (DataSourceObject, DataSourceColumn, ProfileName, ProfileResult)\n    VALUES ('CarSales_Staging.dbo.Stock',\
  \ 'Model', 'NbNulls_Model', @Model_NULL, 100);\n    INSERT INTO CarSales_Staging.dbo.DataProfiling\
  \ (DataSourceObject, DataSourceColumn, ProfileName, ProfileResult)\n    VALUES ('CarSales_Staging.dbo.Stock',\
  \ 'Mileage', 'NbNulls_Mileage', @Mileage_NULL, 100);\n    INSERT INTO CarSales_Staging.dbo.DataProfiling\
  \ (DataSourceObject, DataSourceColumn, ProfileName, ProfileResult)\n    VALUES ('CarSales_Staging.dbo.Stock',\
  \ 'Model', 'PctNulls_Model', @Model_PERCENTNULL, 100);\n    INSERT INTO CarSales_Staging.dbo.DataProfiling\
  \ (DataSourceObject, DataSourceColumn, ProfileName, ProfileResult)\n    VALUES ('CarSales_Staging.dbo.Stock',\
  \ 'Mileage', 'PctNulls_Mileage', @Mileage_PERCENTNULL, 100);\n    ```\n\n## 工作原理\n\
  \n收集剖析数据只是整个过程的一部分。你很可能希望做以下一项或两项事情：\n\n*   将数据存储在数据表中（例如，为确保满足 SLA（服务水平协议）或跟踪数据剖析随时间的变化）。\n\
  *   利用对存储的剖析数据的分析来阻止或允许 ETL 过程运行。\n\n因此，这里为你提供了一个如何使用你所收集数据的实际示例。\n\n\n"
- "# 10-6. 在 SSIS 中快速进行数据剖析\n\n## 问题\n\n你需要尽可能快速地使用 SSIS 对数据进行剖析。\n\n## 解决方案\n\n使用\
  \ SSIS 数据剖析任务来运行快速剖析，从而以最少的时间定义要在表或视图中剖析的元素。你可以执行此任务来分析 `CarSales` 数据库的 `Client`\
  \ 表，步骤如下：\n\n1.  创建一个新的 SSIS 包。添加一个指向 `CarSales` 源数据库的 ADO.NET 连接管理器。将其命名为 `CarSales_ADONET`。\n\
  2.  在“控制流”窗格中添加一个“数据剖析”任务。双击进行编辑。在“常规”选项卡中，选择“文件连接”作为目标类型。\n3.  选择“新建文件连接”作为目标，并配置“文件连接管理器编辑器”以创建一个新文件，例如命名为\
  \ `C:\\SQL2012DIRecipes\\CH10\\SSISProfile.xml`。对话框应类似于 图 10-1。\n    ![9781430247913_Fig10-01.jpg](img/9781430247913_Fig10-01.jpg)\n\
  \    图 10-1. 在 SSIS 数据剖析任务中配置输出目标\n4.  单击“快速剖析”，并从 `ADO.NETConnection` 下拉列表中选择你在步骤\
  \ 1 中创建的 `CarSales_ADONET` 连接。\n5.  选择要分析的表——这里是 `dbo.Client`。\n6.  勾选你希望分析的所有剖析类型。在此示例中，我选择了所有可能的剖析类型。此对话框应类似于\
  \ 图 10-2。\n    ![9781430247913_Fig10-02.jpg](img/9781430247913_Fig10-02.jpg)\n \
  \   图 10-2. 在 SSIS 数据剖析任务中选择要运行的剖析类型\n7.  单击“确定”确认修改。你将看到所选的剖析请求，如 图 10-3 所示。\n\
  \    ![9781430247913_Fig10-03.jpg](img/9781430247913_Fig10-03.jpg)\n    图 10-3.\
  \ SSIS 数据剖析任务编辑器中选定的剖析请求\n8.  在“数据剖析任务编辑器”中单击“确定”以确认你的剖析选择。\n\n现在，你可以运行包含剖析任务的 SSIS\
  \ 包，从而对源数据进行剖析。这将生成你在步骤 3 中指定的 XML 输出文件 (`C:\\SQL2012DIRecipes\\CH10\\SSISProfile.xml`)。\n\
  \n虽然可以直接在 Web 浏览器中读取此 XML 文件，但你可能会发现使用“数据剖析查看器”（如配方 10-9 所述）读取更容易。\n\n## 工作原理\n\n\
  自 SQL Server 2008 以来，SSIS 就提供了一个用于剖析源数据的任务。这个任务与其他 SSIS 任务略有不同，因为（至少根据我的经验）它往往是在初步查看数据时“交互式”运行，而不是作为结构化\
  \ ETL 过程的一部分。话虽如此，如果需要，你也可以将其用作更全面过程的一部分。一旦任务对数据源运行完毕，你就可以检查输出（最简单的方法是使用配方 10-9\
  \ 中描述的“数据剖析查看器”），并决定源数据是否符合你的预期。本配方展示了如何使用 SSIS 剖析任务的“快速剖析”选项获取一个剖析。创建快速剖析后，会生成一系列剖析请求。这些可以在“剖析请求”窗格中进行微调或删除。然后就可以运行剖析任务，并在“剖析查看器”中查看输出，如配方\
  \ 10-9 所述。\n\n在确保对数据源进行良好整体分析的同时，该任务确实存在以下限制：\n\n*   数据源仅限于通过 ADO.NET 连接访问的 SQL\
  \ Server 2000 及更高版本的表和视图。\n*   运行该任务的帐户必须对 `TempDB` 数据库具有读/写权限，包括 `CREATE TABLE`\
  \ 权限。\n*   该任务只能生成 XML 输出文件。此外，此文件必须使用提供的“数据剖析查看器”查看，或者通过加载 XML 数据（使用自定义任务，如配方 10-10\
  \ 所述）来查看。\n\n此任务提供的分析广度和深度不容小觑，涵盖了 表 10-4 中描述的领域。如你所见，SSIS 数据剖析任务——即使采用“快速剖析”选项——也能为你提供一组非常完整的初始剖析数据。\n\
  \n表 10-4. SSIS 数据剖析任务选项\n\n| 元素 | 描述 | 潜在用途 |\n| :--- | :--- | :--- |\n| 候选键 | 指示一列或一组列是否是选定源表的键，或者可能是键。\
  \ | 确定一列（或一组列）作为唯一键的潜力。 |\n| 列长度分布 | 返回选定列中字符串值的所有不同长度以及表中每列长度的行百分比。 | 确定列中数据的长度范围。\
  \ |\n| 列空值比率 | 返回选定列中的空值百分比。 | 确定列中 `NULL` 的百分比。 |\n| 列模式 | 返回一组正则表达式，这些表达式覆盖字符串列中指定百分比的值。\
  \ | 确定列中的文本模式。这包括文本的外观和格式。 |\n| 列统计信息 | 指示数字列的统计信息，如最小值、最大值、平均值和标准差，以及 `DATETIME`\
  \ 列的最小值和最大值。 | 确定列中数据和日期的范围。 |\n| 列值分布 | 指示选定列中的所有不同值以及表中每个值所代表的行百分比。 | 确定列中存在多少不同值，以定义值的分布。\
  \ |\n| 函数依赖关系 | 指示一列（依赖列）中的值在多大程度上依赖于另一列或一组列（决定列）中的值。 | 确定值集是否在列之间对应。 |\n| 值包含 |\
  \ 指示两个列或两组列之间的值重叠。 | 确定一列（或一组列）作为外键的潜力。 |\n\n## 提示、技巧和陷阱\n\n*   你可以根据需要创建任意多个快速剖析，每个剖析来自一个单独的表或视图。\n\
  *   我假设我们希望分析 SQL Server 源表中的数据，并将结果存储到一个剖析数据表中。我将使用 `CarSales_Staging` 数据库来存储此表。\n\
  \    > **注意**\n    >\n    > 在生产环境中，你可能会使用单独的数据库来存储剖析数据。这里我使用与源数据相同的数据库纯粹是为了使示例更简单。\n\
  *   此脚本预设你希望收集以下数据：\n    *   两列的空值计数和空值比率。\n    *   一列的数值最大值和最小值。\n    *   一列的字段长度最大值和最小值。\n\
  \    因此，T-SQL 收集此信息并将其记录到 `dbo.DataProfiling` 表中。一旦信息收集完毕，它就可以用于 ETL 过程中的决策，如配方\
  \ 10-17 所述。\n*   此 T-SQL 显然是硬编码的，用于高度特定的环境和特定的表。我为此代码的刚性辩护的理由是，你可能永远不想对每一列进行剖析，而在大多数情况下，你会希望查看特定的列——因此需要为特定问题编写代码。\n\
  *   为了加快过程，你可以尝试最小化存储过程中的单独查询数量。无论如何，计算任何你会重复使用的值（尤其是行数），并将它们保存在变量中，比每次重新计算要快。\n\
  \n\n## 10-7. 使用 SSIS 创建自定义数据配置文件\n\n### 问题\n您希望使用 SSIS 来分析数据，同时调整配置规范以满足您的精确要求。\n\
  \n### 解决方案\n与其运行快速配置文件，不如使用**数据配置分析**任务来配置可用选项，以返回适合您需求的信息。我将再次使用 `CarSales.dbo.Stock`\
  \ 表作为要分析的数据。\n\n1.  创建一个新的 SSIS 包。向 CarSales 源数据库添加一个 ADO.NET 连接管理器。将其命名为 `CarSales_ADONET`。\n\
  2.  在“连接管理器”选项卡中右键单击，然后选择“新建文件连接”。选择使用类型 `创建文件` 并浏览到选定的文件夹（本示例中为 `C:\\SQL2012DIRecipes\\\
  CH10\\CustomProfile.Xml`）。单击“打开”以创建文件，然后单击“确定”以关闭“新建文件连接”对话框。\n3.  向“控制流”窗格添加一个“数据配置分析”任务。双击进行编辑。在“常规”选项卡中，选择\
  \ `文件连接` 作为目标类型。\n4.  选择您在第 3 步中创建的 `CustomProfile.xml` 连接。\n5.  将 `覆盖目标` 设置为 `True`。\n\
  6.  单击左侧的 `配置文件请求` 以激活“请求”窗格。\n7.  向下滚动到可用配置文件请求的底部（如果存在），单击空白记录，然后从弹出列表中选择一个配置文件请求。在此示例中，我建议从\
  \ `列长度分布配置文件请求` 开始。\n8.  按 Tab 或 Enter 键确认请求创建。SSIS 将为此请求命名（可能是 `LengthDistReq`）。\n\
  9.  在窗格的下半部分——即“请求属性”部分——您现在将配置请求，从源数据库的连接开始。对于名为 `连接管理器` 的属性，选择您在第 1 步中创建的 `CarSales_ADONET`\
  \ 连接管理器。\n10. 选择 `dbo.Stock` 作为 `表或视图` 属性。\n11. 选择 `Make` 作为 `列` 属性。\n12. 单击“确定”。\n\
  \n您现在可以运行该包并分析生成的 XML 配置文件数据。\n\n### 工作原理\n如果您更喜欢直接创建和微调配置文件，则可以通过手动配置 SSIS 数据配置分析任务来实现，而不是使用“快速配置文件”方法。配置选项相当广泛——如表\
  \ 10-6 所示。然而，通过一点练习，它们会变得相当容易使用。\n\n定义一个配置文件将始终包含表 10-5 中的一个元素。这本质上是您要分析的数据库、表和列的核心定义。\n\
  \n**表 10-5. SSIS 数据配置分析任务中的必需元素**\n| 元素 | 说明 |\n| --- | --- |\n| `连接管理器` | 一个现有或新创建的\
  \ ADO.NET 连接管理器。 |\n| `表或视图` | 通过选定连接管理器可用的表或视图。 |\n| `列` | 您希望分析的表中的单个列（或使用星号“*”选择的所有列）。\
  \ |\n| `请求 ID` | 此配置文件元素的用户定义名称。尽管 SSIS 会为每个配置文件请求命名，但您可以使用自己的名称覆盖这些名称。 |\n\n一旦指定了数据库、表和列，您必须指明希望运行哪种类型的配置文件。您还可以指定特定于配置文件类型的某些参数。这些配置中的每一个都构成一个单独的配置文件请求。特定于每种配置文件请求类型的各个选项在表\
  \ 10-6 中进行了解释。\n\n**表 10-6. SSIS 配置分析任务选项**\n| 元素 | 描述 | 潜在用途 |\n| --- | --- | ---\
  \ |\n| `候选键` | 指示列或列集是否为选定表的键或近似键。 | 确定列（或列集）作为唯一键的潜力。 |\n| `列长度分布` | 指示选定列中字符串值的所有不同长度，以及表中每个长度所代表的行的百分比。\
  \ | 确定列长度的范围。 |\n| `列空值比率` | 指示选定列中空值的百分比。 | 确定 `NULL` 的百分比。 |\n| `列模式` | 返回一组正则表达式，这些表达式覆盖字符串列中指定百分比的值。\
  \ | 确定列中的文本模式。 |\n| `列统计信息` | 指示数值列的统计信息，如最小值、最大值、平均值和标准差，以及 `DATETIME` 列的最小值和最大值。\
  \ | 确定值和日期的范围。 |\n| `列值分布` | 指示选定列中的所有不同值，以及表中每个值所代表的行的百分比。 | 确定列中存在多少个不同的值。 |\n\
  | `函数依赖关系` | 指示一列（依赖列）中的值对另一列或列集（决定列）中的值的依赖程度。 | 确定列之间的值集是否准确。 |\n| `值包含` | 指示两列或列集之间值的重叠情况。\
  \ | 确定列（或列集）作为外键的潜力。 |\n\n每个配置文件请求一次只能分析一列。但是，您可以为同一配置文件类型创建多个配置文件请求，从而覆盖多个列。\n\n\
  ### 提示、技巧和陷阱\n*   要删除配置文件，请在“配置文件请求”窗格中单击它，然后按 Delete 键。您可以使用 Ctrl 和 Shift 键选择多个配置文件请求。\n\
  *   SSIS 将为每种配置文件类型自动生成一个 `请求 ID`。您可以使用 `请求 ID` 属性对其进行重命名。\n*   各种 `强度阈值`（`候选键`\
  \ 的 `键强度`，`值包含` 的 `包含强度阈值` 和 `超集列键阈值`，以及 `函数依赖关系` 的 `函数依赖关系强度阈值`）是数据集中唯一元素的百分比。如果相应的\
  \ `阈值设置` 设置为 `指定`，则仅当配置文件分析返回此百分比或更大的唯一记录时，您才会得到结果。否则，您将得到一个空的数据集。要返回无论唯一记录百分比如何的结果，请将\
  \ `阈值设置` 设置为 `无`。或者，您可以为唯一记录设置更低的阈值百分比。\n*   `最大违规次数` 是列中重复元素的计数——这可能是问题的潜在根源。您可以根据需要调整此数字。\n\
  *   通过在分析潜在外键时将 `超集列键阈值` 设置为 `精确`，您可以过滤掉那些超集列由于非唯一值而不适合作为超集表键的组合。\n*   您可以在 .NET\
  \ 数据源中使用 `OPENDATASOURCE` 来绕过 SSIS 对可用数据源的限制。请注意，这将非常慢。\n\n## 10-8. 在非 SQL Server\
  \ 数据源上使用 SSIS 数据配置分析任务\n\n### 问题\n您希望使用 SSIS 数据配置分析任务来分析来自非 SQL Server 数据源的数据。\n\
  \n### 解决方案\n使用链接服务器作为数据源，以克服 SSIS 仅限使用 ADO.NET 连接管理器的限制。以下步骤说明了如何操作。\n\n1.  使用链接服务器连接到另一个数据源（例如，CSV\
  \ 文件或 Oracle 数据库）。\n2.  在 SSMS 中，创建一个使用链接服务器作为数据源的视图。\n3.  将 SSIS 数据配置分析任务连接到该视图，该视图成为数据源（如配方\
  \ 10-6 步骤 4 所述）。\n4.  继续配方 10-6（用于快速配置文件）或 10-7（用于自定义配置文件）以创建 XML 配置文件输出。\n\n###\
  \ 工作原理\n我意识到所有文档都指出，SSIS 数据配置分析任务仅与 ADO.\n```\n\n\n# 10-9. 读取配置文件数据\n\n## 问题\n您想要读取使用\
