  \n图 10-23. SSIS 中受控的数据流\n\n## 工作原理\n\n在加载数据时进行分析，可以让你捕获指定的度量标准，然后这些标准可用于在必要时停止处理。这不可避免地意味着在计数器完成并分析期间，数据流会暂停。因此，关键在于找到一种方法，在等待分析结果的同时高效地暂存数据。我推荐的解决方案是使用`RAW`文件目标临时保存数据，然后如果分析未发现异常，则继续最终加载到目标表中。这会在一定程度上减慢过程，但由于几乎总是\
  \ SSIS 包中最慢的部分是最终加载，因此如果遇到问题，可以避免一次浪费的加载和重新加载。将数据输出到原始文件速度极快——在几乎所有情况下，都应比加载到暂存表中更快。在最理想的情况下，你应该将`RAW`文件放在\
  \ SQL Server 本身，如果可能的话，放在快速的磁盘阵列上。\n\n这里使用的代码是一个非常简单的例子来说明原理。在数据加载过程中，将测试一列中`NULL`的数量，如果超过\
  \ 25%，则过程将停止。这在`PostExecute`方法中设置。如果`NULL`的数量低于此阈值，那么包将继续进入其最后阶段——将数据加载到目标表中。\n\n\
  当然，还有其他解决方案。例如，你可以在数据加载后对其进行分析。这可能是最简单的解决方案，因为你可以结合使用本章描述的任何 T-SQL 技术来生成数据概要文件，该文件应能提醒你数据加载的任何潜在问题。此外，任何存储过程或\
  \ SQL 代码都可以作为执行 SQL 任务在 SSIS 包末尾运行，并可以将警报输出到你的日志记录基础设施，如第 12 章所述。\n\n或者，你可以选择在数据加载时对其进行分析。这里有两种可能性：\n\
  \n*   使用执行 SQL 任务中的 T-SQL 分析任何暂存的数据。\n*   在数据源后插入一个多播任务，并使用本章前面展示的各种 SSIS 脚本中的一些来分析数据。使用单独的数据路径将避免在使用异步转换时减慢处理速度。\n\
  \n## 提示、技巧和注意事项\n\n*   本示例的脚本极其简单，但它旨在让你了解如何在加载过程中分析数据，并利用分析结果来控制包流程。\n*   你可以使用本章前面描述的任何\
  \ SSIS 技术来扩展分析功能。\n\n#### 总结\n\n本章展示了多种使用 SQL Server 分析源数据的方法。问题在于选择哪种方法以及何时使用。显然，答案将取决于你的具体情况和要求。如果你可以连接到尚未进入\
  \ SQL Server 的数据，你也可以对其进行分析。这本质上意味着需要一个 OLEDB 提供程序（必要时通过 ODBC）来对源使用 T-SQL 命令。然而，在实践中，这可能非常慢。\n\
  \n如果你使用 SSIS，那么在任何实际环境中，数据都必须位于 SQL Server 中，或者让 SSIS 数据分析任务读取源的变通方法可能会使其慢到令人无法忍受。\n\
  \n如果你的数据已经暂存到 SQL Server 中，那么你所能开拓的视野（至少在数据分析方面）会宽得多。你可以使用 SSIS 或 T-SQL 来分析数据，而对于快速的数据概要分析，SSIS\
  \ 数据分析任务可以设置为几乎即时运行。你还可以将概要分析输出存储为 XML 或将其分解到 SQL Server 表中。\n\n一旦你分析了数据，就可以使用结果来决定是否继续数据加载。这假设源数据要么是磁盘上的`RAW`文件，要么已加载到暂存表中。无论哪种情况，你的源数据都可以进入\
  \ ETL 过程的下一阶段。\n\n作为一个示意性的概述，表 10-8 是我对各种方法及其优缺点的看法。\n\n### 表 10-8. 本章所述技术的优缺点\n\
  \n| 技术 | 优点 | 缺点 |\n| --- | --- | --- |\n| T-SQL 分析 | 相对简单。 | 需要多个特定的代码片段。 |\n|\
  \ SSIS 分析任务 | 易于使用。 | 有限制。需要 XML 查看器或笨重的输出变通方法。 |\n| 自定义 SSIS 分析 | 易于集成到现有的 SSIS\
  \ 包中。 | 设置复杂。 |\n| T-SQL 分析脚本 | 复制粘贴。 | 可能提供过多信息。 |\n| SSIS 脚本任务分析 | 高度可适应和可扩展。\
  \ | 复杂。 |\n| SSIS 模式分析 | 设置简单。 | |\n| T-SQL 模式分析 | 设置简单。 | 非常慢。 |\n\n# 第 11 章\n\n\
  ## 增量数据管理\n\n幸运的是，数据集成中有很大一部分是相对简单的情况，即将所有数据从源（无论它是什么）传输到目标（希望是 SQL Server）。目标在加载过程之前被清空，目标是将数据从\
  \ A 准确、完整地以尽可能短的时间传输到 B。然而，这个基本场景不可避免地无法随时满足每个人的需求。在开发 ETL 解决方案时，你可能经常被要求确保只有数据的变更部分才从源应用到目标。检测数据变更，并且只（重新）加载已更改数据的子集，将是本章的主题。为了给一个可能相当复杂的主题起一个简单的标题，我建议称之为*增量数据管理*。\n\
  \n### 前言：为什么要处理增量数据？\n\n花时间设置增量数据处理可以带来丰厚回报的原因有几个：\n\n*   **节省时间：** 如果源数据只包含很小比例的插入、更新或删除，那么只应用这些更改而不是重新加载大量数据，速度会快得多。\n\
  *   **降低网络负载：** 如果你能够在源处隔离已修改的数据，那么从源发送到目的地的数据量可以大大减少。\n*   **减轻服务器压力：** 这意味着处理器利用率降低，磁盘活动减少。\n\
  *   **减少阻塞：** 虽然阻塞在报告或分析环境中（尤其是在夜间处理期间）希望不是主要问题，但在某些情况下它可能是个问题，因此最好将其保持在最低限度。\n\n\
  无论如何，你可能会发现更容易考虑这些论点——既包括支持管理增量数据的论点，也包括反对其的论点；它们在表 11-1 中提供。\n\n### 表 11-1. 加载增量数据的优缺点简要概述\n\
  \n| | 优点 | 缺点 |\n| --- | --- | --- |\n| 完全加载 | 简单。 | 可能慢得多。 |\n\n\n\n# ETL 项目中的增量数据加载考量\n\
  \n当面对一个 ETL 项目时，你必须始终问自己这个问题：“投入精力实现增量数据加载技术是否值得？” 与处理这类问题时常见的做法一样，通常不可能立即确定效率提升的阈值在哪里。因此，除非有另一个令人信服的理由让你选择“截断并加载”技术，而不是开发一个（可能相当复杂的）增量数据加载流程，否则请准备好进行一些基础测试来找到你的答案。\n\
  \n# 增量数据方法\n\n简单来说，主要有两种检测数据变化的方式：\n*   **在源头：** 一种标记已更改记录的方法，包括更改类型（插入、删除或更新）的指示。\n\
  *   **在 ETL 加载过程中：** 一种比较源记录和目标记录并隔离出有差异记录的方法。\n\n这个简单的概述很快需要更深入的分析。\n\n## 在源头检测变化\n\
  \n从 ETL 开发人员的角度来看，在源头标记数据变化可能最接近理想的解决方案。原因如下：\n*   只有更改的记录需要在系统之间移动。\n*   无需对两个数据集进行全面比较，因为源系统维护了其自身的变化历史。\n\
  *   增量信息甚至可以保存在单独的表中，避免了为隔离增量子集而对大型源表进行代价高昂的扫描。\n*   这项工作通常由源系统 DBA 完成。\n\n## 在\
  \ ETL 加载过程中检测变化\n\n不幸的是，许多源系统注定对 ETL 开发人员来说是封闭的“黑盒”。这通常是因为源系统 DBA 不会容忍任何被认为会给其数据库增加系统开销的操作。DBA\
  \ 的这种固执甚至可能延伸到低开销的解决方案，例如变更跟踪和变更数据捕获，这些是第 12 章的主题。无法调整源系统的另一个可能原因是，它是一个第三方开发的产品，任何修改在实践上或法律上都是不可能的。因此，如果你不被允许以任何方式接触源系统，你就必须在加载过程中比较数据集并推断变化。\n\
  \n然而，在加载过程中（或者，在某些情况下，在加载之前）执行数据比较仍然可以实现更快的数据加载，并减轻网络和服务器压力。因此，我们这里需要考虑的是如何比较数据。\n\
  \n简单地说，主要有两种记录比较方法：\n*   比较源数据集和目标数据集中每个重要字段的列。这不一定需要是所有列，可以是一个反映目标数据使用需求的子集。\n\
  *   使用一个存储在源数据集和目标数据集中的指示字段。这可以是以下之一：\n    *   一个添加日期和/或更新日期字段。\n    *   一个哈希字段（校验和）。\n\
  \    *   一个 `ROWVERSION` 字段（以前称为 `Timestamp` 字段，即使它与时间或日期无关）。实际上，任何其他在数据更改时递增的计数器字段都可以。\n\
  \n无论哪种情况，你都将寻找三种差异：\n*   存在于源中但不存在于目标中的数据（插入）。\n*   存在于目标中但缺失于源中的数据（删除）。\n*   同时存在于源和目标中，但比较表明有变化的数据（更新）。\n\
  \n那么，让我们开始探讨如何将这些知识应用到实际的数据加载中。\n\n我将从更常见的加载过程中数据比较的情况开始，然后看看在源系统中应用增量标记的方法。请记住，本章中的解决方案旨在解决不同的\
  \ ETL 挑战和情况。每个都有其优点和缺点。在现实世界中，你可能会发现自己需要混合搭配不同解决方案中的技术来应对 ETL 挑战。\n\n按照本书的惯例，如果你想跟随示例操作，必须从本书的配套网站下载示例数据。这意味着需要创建示例数据库\
  \ `CarSales` 和 `CarSales_Staging`，它们几乎用于本章所有示例。在本章示例中，我将使用 `CarSales` 数据库作为数据源，使用\
  \ `CarSales_Staging` 数据库作为目标数据库。\n\n你可以下载的示例数据总是包含一个键列，如果你为自己的数据修改示例，也应该有一个键列。正如你在\
  \ SQL Server 职业生涯中可能已经发现的那样，没有键列加载增量数据极其困难，甚至不可能。还要记住，SQL Server `ROWVERSION` 也是一个唯一的数字，每次修改字段时递增，与日期和时间无关。\n\
  \n在深入本章的解决方案之前，你需要事先被告知，其中一些解决方案比本书其他地方看到的要长。事实上，乍一看，它们可能看起来实现起来很复杂。我能给你的最好建议是：在将它们应用于你自己的\
  \ ETL 挑战之前，彻底阅读几遍。我特别建议你仔细查看给出的控制流和数据流图，以便更清楚地了解每种情况下的流程。此外，当你基于这些想法创建你自己的 ETL 解决方案时，请毫不犹豫地提前查看后续内容，并跳转到“工作原理”部分，以确保你理解了流程的来龙去脉。\n\
  \n最后，由于增量数据管理必须处理一组只有有限解决方案的挑战，本章中的一些解决方案确实有相似的阶段。为了避免一遍又一遍地重复相同的信息，我偶尔会要求你参考本章中其他解决方案的元素，以完成一个流程中的特定步骤。\n\
  \n# 11-1. 作为结构化 ETL 流程一部分加载增量数据\n\n## 问题\n在定期数据加载期间，你只想加载新数据，更新任何已更改的记录，并删除任何已删除的记录。\n\
  \n## 解决方案\n使用 SSIS 并检测源数据的更改方式。然后相应地处理目标数据，以对目标表应用插入、更新和删除操作。我将解释如何完成此操作。\n\n1.\
  \  在目标数据库 (`CarSales_Staging`) 中使用以下 DDL 创建三个表（当然，如果你已为其他解决方案创建了它们，请先删除它们）（`C:\\\
  SQL2012DIRecipes\\CH11\\DeltaInvoiceTables.Sql`）：\n    ```sql\n    CREATE TABLE\
  \ dbo.Invoice_Lines\n    (\n     ID INT NOT NULL,\n     InvoiceID INT NULL,\n  \
  \   StockID INT NULL,\n     SalePrice NUMERIC(18, 2) NULL,\n     VersionStamp VARBINARY(8)\
  \ NULL -- this  field is to hold ROWVERSION data\n    );   -- The destination table\
  \ with no IDENTITY column or referential integrity\n    GO\n\n    CREATE TABLE dbo.Invoice_Lines_Updates\n\
  \    (\n     ID INT NOT NULL,\n     InvoiceID INT NULL,\n     StockID INT NULL,\n\
  \     SalePrice NUMERIC(18, 2) NULL,\n     VersionStamp VARBINARY(8) NULL -- this\
  \  field is to hold ROWVERSION data\n    ) ;  --The \"scratch\" table for updated\
  \ records\n    GO\n\n    CREATE TABLE dbo.Invoice_Lines_Deletes\n    (\n    ID INT\
  \ NULL\n    ) ;  -- The \"scratch\" table for you to deduce deleted records\n  \
  \  GO\n    ```\n\n2.  创建一个 SSIS 包（我将命名为 SSISDeltaLoad。\n\n\n\n# 配置 SSIS 数据流进行增量数据检测\n\
  \n## 初始设置与数据流配置\n\n创建并配置两个`OLEDB`连接管理器：一个用于源数据库（命名为`CarSales_OLEDB`），一个用于目标数据库（命名为`CarSales_Staging_OLEDB`）。\n\
  \n在控制流窗格中添加一个数据流任务，命名为`Inserts and Updates`。双击进入数据流窗格。\n\n添加一个`OLEDB`源适配器。将其配置为使用`CarSales_OLEDB`连接管理器，并使用以下`SQL`片段从`Invoice_Lines`源表中选择所有需要的行：\n\
  ```sql\nSELECT    ID, InvoiceID, StockID, SalePrice\n          ,VersionStamp AS\
  \ VersionStamp_Source\nFROM      dbo.Invoice_Lines WITH (NOLOCK)\n```\n\n在数据流窗格中添加一个多播转换，命名为`Split\
  \ Data`。将`Inserts and Updates`数据源适配器连接到它。\n\n添加一个查找转换，并将多播转换连接到它。命名为`Lookup RowVersions`。在查找转换的“常规”窗格中，按如下方式配置：\n\
  \n| 配置项 | 值 |\n| :--- | :--- |\n| `Cache Mode` | `No Cache` |\n| `Connection Type`\
  \ | `OLEDB Connection Manager` |\n| `Specify how to handle rows with NoMatch entries`\
  \ | `Send rows with no matching entries to the No Match output` |\n\n单击左侧的`Connection`。将连接管理器设置为`CarSales_Staging_OLEDB`，因为你将使用此查找转换，把源数据与你正在查找的目标数据进行比较。\n\
  \n将查找设置为“使用`SQL`查询的结果”，并输入以下`SQL`：\n```sql\nSELECT     ID, VersionStamp\nFROM  \
  \     dbo.Invoice_Lines WITH (NOLOCK)\n```\n\n单击左侧的`Columns`。两个表，源（左侧）和目标（右侧）将出现。将右侧“可用查找列”（或目标）表中的`ID`列拖放到左侧“可用输入列”（源）表中的`ID`列上。这会将两个数据源的唯一`ID`相互映射。\n\
  \n选择右侧“可用查找列”（或目标）表中的`VersionStamp`列，并提供一个输出别名——建议为`VersionStamp_Destination`。这允许你为每条记录比较源和目标的`VersionStamp`。对话框应类似于图\
  \ 11-1。\n\n![9781430247913_Fig11-01.jpg](img/9781430247913_Fig11-01.jpg)\n\n图 11-1.\
  \  用于返回目标`VersionStamp`的查找任务\n\n单击`OK`确认修改。返回到数据流窗格。\n\n在数据流窗格上添加一个`OLEDB`目标转换，并将查找转换连接到它。将出现“输入输出选择”对话框。选择`No\
  \ Match`输出并单击`OK`。\n\n双击`OLEDB`目标适配器进行配置。确保选中了`CarSales_Staging_OLEDB`连接管理器，并且目标表是`dbo.Invoice_Lines`。这将把任何新记录直接插入到目标表中。\n\
  \n单击左侧的`Mappings`。确保所有要导入的列都已正确映射。单击`OK`返回到数据流窗格。\n\n至此，你已完成流程的插入部分。\n\n## 处理更新与删除的检测\n\
  \n现在开始处理更新部分。在数据流窗格上添加一个条件性拆分转换。将查找转换连接到它，命名为`Detect Rowversion Difference`。这会将查找匹配输出发送到条件性拆分。\n\
  \n双击以编辑条件性拆分。添加一个名为`VersionStamp Differences`的输出条件，条件为：\n```sql\n[VersionStamp_Source]\
  \ != (DT_I8) [VersionStamp_Destination]\n```\n\n对话框应类似于图 11-2。\n\n注意，你必须将目标数据类型从`Varbinary`转换为`BigInt`\
  \ (`DT_I8`)，而`SSIS`在从源读取`ROWVERSION`字段时会自动为你完成此操作。\n\n![9781430247913_Fig11-02.jpg](img/9781430247913_Fig11-02.jpg)\n\
  \n图 11-2.  设置条件性拆分\n\n单击`OK`确认并关闭对话框。\n\n向数据流添加一个`OLEDB`目标适配器，命名为`Scratch Table\
  \ for Updates`。将条件性拆分转换连接到它。将出现“输入输出”对话框，你应在其中选择`VersionStamp Differences`输出（它实际上是目标适配器的源）。将`OLEDB`连接管理器设置为`CarSales_Staging_OLEDB`，数据访问模式设置为`表或视图–快速加载`，目标表设置为`Invoice_Lines_Updates`。单击`Mappings`。确保所有列都如图\
  \ 11-3 中那样映射，然后单击`OK`确认修改。这完成了处理更新的初始阶段——将更新数据存储在临时表中。\n\n![9781430247913_Fig11-03.jpg](img/9781430247913_Fig11-03.jpg)\n\
  \n图 11-3.  为更新映射列\n\n现在我们可以处理删除。向数据流添加一个`OLEDB`目标适配器，并将`Split Data`多播转换连接到它。命名为`Scratch\
  \ Table for Deletes`，并将其配置为将行发送到`Invoice_Lines_Deletes`表，如下所示：\n\n| 配置项 | 值 |\n\
  | :--- | :--- |\n| `Connection Manager` | `OLEDB_Destination` |\n| `Data Access\
  \ Mode` | `Table or View – Fast Load` |\n| `Name of the Table or the View` | `Invoice_Lines_Deletes`\
  \ |\n\n单击`Mappings`。确保两个`ID`列已映射。对话框应类似于图 11-4。\n\n![9781430247913_Fig11-04.jpg](img/9781430247913_Fig11-04.jpg)\n\
  \n图 11-4.  为删除映射`ID`列\n\n单击`OK`返回到数据流窗格。\n\n单击“控制流”选项卡返回到控制流窗格。数据流窗格应大致如图 11-5 所示。\n\
  \n![9781430247913_Fig11-05.jpg](img/9781430247913_Fig11-05.jpg)\n\n图 11-5.  SSIS\
  \ 中用于增量数据检测的数据流窗格\n\n## 执行最终数据操作\n\n最后，我们可以应用更新和删除逻辑。单击“控制流”选项卡并添加一个执行`SQL`任务。将其连接到数据流任务。命名为`Update\
  \ Data`。配置此执行`SQL`任务如下（使用`C:\\SQL2012DIRecipes\\CH11\\11-1_Update.Sql`）：\n\n| 配置项\
  \ | 值 |\n| :--- | :--- |\n| `Connection` | `OLEDB_Destination` |\n| `SQL Statement`\
  \ | `UPDATE DST` |\n|  | `SET` |\n|  | `DST.InvoiceID = UPD.InvoiceID` |\n|  | `,DST.SalePrice\
  \ = UPD.SalePrice` |\n|  | `,DST.StockID = UPD.StockID` |\n|  | `,DST.VersionStamp\
  \ = UPD.VersionStamp` |\n|  | `FROM    dbo.Invoice_Lines DST` |\n|  | `INNER JOIN\
  \ dbo.Invoice_Lines_Updates UPD` |\n|  | `ON DST.ID = UPD.ID` |\n\n单击`OK`完成此任务的编辑。\n\
  \n添加一个新的执行`SQL`任务。将`Update Data`执行`SQL`任务连接到它，并命名为`Delete Data`。配置这个新任务如下（使用`C:\\\
  SQL2012DIRecipes\\CH11\\11-1_Delete.Sql`）：\n\n| 配置项 | 值 |\n| :--- | :--- |\n| `Connection`\
  \ | `OLEDB_Destination` |\n| `SQL Statement` | `DELETE` |\n|  | `FROM dbo.Invoice_Lines`\
  \ |\n|  | `WHERE ID IN` |\n|  | `(SELECT dbo.Invoice_Lines.ID` |\n|  | `FROM   dbo.Invoice_Lines`\
  \ |\n|  | `LEFT OUTER JOIN dbo.Invoice_Lines_Deletes` |\n|  | `ON dbo.Invoice_Lines.ID\
  \ = dbo.Invoice_Lines_Deletes.ID` |\n|  | `WHERE (dbo.Invoice_Lines_Deletes.ID IS\
  \ NULL))` |\n\n单击`OK`确认你的更改。\n\n添加最后一个执行`SQL`任务。命名为`Truncate Scratch Tables`。将其连接到前一个执行`SQL`任务（`UpdateData`）。\n\
  \n\n\n## 配置执行 SQL 任务\n\n按如下方式配置执行 SQL 任务：\n*   **名称**：`Truncate Scratch tables`\n\
  *   **连接**：`OLEDB_Destination`\n*   **SQL 语句**：\n    ```sql\n    TRUNCATE TABLE\
  \ dbo.Invoice_Lines_Deletes\n    TRUNCATE TABLE dbo.Invoice_Lines_Updates\n    ```\n\
  \n29. 单击“确定”完成编辑。数据包已准备就绪。数据流窗格应类似于图 11-6。\n    ![9781430247913_Fig11-06.jpg](img/9781430247913_Fig11-06.jpg)\n\
  \    图 11-6. 用于简单增量数据更新的数据流\n\n## 工作原理\n\n此方案针对一个相当常见的场景：你有一个位于源系统上的表，需要加载到暂存数据库中。你希望插入任何新记录、删除已被移除的记录并更新已更改的记录，而非截断整个表并重新加载。源表包含一个\
  \ `VersionStamp` 列，你希望用它来筛选用于更新的增量数据。它还包含一个主键（或唯一 ID），允许你唯一地标识记录。因此，你可以执行任何适当的插入和删除操作来处理新增和移除的数据，并识别出数据需要更新的记录。让我们再假设一下，不幸的是，你无法控制源数据或其驻留的服务器；你只拥有对源数据的读取权限。因此，整个源表——或者，替代方案是，一个包含自上次加载以来所有已修改记录的数据集——已经可用。\n\
  \n此技术的技巧在于，在删除或更新行时避免使用 SSIS 的 `OLEDB Command` 转换；它将对每一行触发，并可能对更新执行数十万次。一个解决方案是使用两个专门的表来保存删除和更新所需的所有数据，并使用\
  \ T-SQL 对这些表处理所有 `DELETE` 和 `UPDATE` 操作。这两个表可以作为数据包的一部分创建——并在之后删除——或者保留在暂存数据库中用于审核目的。\n\
  \n这个过程初看可能有点令人望而生畏。图 11-7 提供了一个示意图来阐明该过程。\n![9781430247913_Fig11-07.jpg](img/9781430247913_Fig11-07.jpg)\n\
  图 11-7. 基本的增量检测流程\n\n当可以确保只有很小比例的数据发生了变化，并且在源表中拥有主键（或唯一 ID）以及一个指示已发生更改的列时，最适合使用此方法。当你无法获得在源数据库中创建和删除持久化临时表的权限时，此方法适用。\n\
  \n该方法能够工作的先决条件如下：\n\n*   在目标数据库中拥有源表的副本，包含你希望 `INSERT` 的所有列，且 `VersionStamp` 列的数据类型更改为\
  \ `VARBINARY(8)`。这允许你存储记录上次加载时的 `VersionStamp` 值。此表包含应用所有插入、删除和更新操作后源数据集的最终副本。目标表中的任何\
  \ `IDENTITY` 列在目标表中必须是简单的 `INT/BIGINT` 数据类型（不带 `IDENTITY` 规范）。\n*   在目标数据库中拥有源表的第二个临时副本，包含你希望加载到最终目标表中的所有列，且\
  \ `VersionStamp` 列的数据类型更改为 `VARBINARY(8)`。此副本将用于保存在源数据集中检测到的 `UPDATE` 操作，然后再将其应用到最终表。\n\
  *   一个单列临时表，用于保存将从最终目标表中 `DELETE` 的所有记录的唯一 ID。此列的数据类型必须与源数据表中的唯一 ID 的数据类型相匹配。\n\n\
  本方案的核心在于它如何处理插入和更新——也称为 `upserts`（更新插入）。\n\n此方法已成为经典，它使用 `Lookup`（查找）转换来检测源数据集和目标数据集之间的差异。不存在于目标表中的记录直接作为数据流的一部分被添加。已修改的记录被添加到一个临时表中，然后使用该表通过\
  \ T-SQL `UPDATE` 命令来更新目标数据表。为了方案的完整性，我还包含了记录删除的处理。这可能意味着物理删除记录，或者应用所谓的“软删除”，即目标表中存在一个额外的布尔字段（例如称为\
  \ `IsDeleted`），当源数据中的记录被删除时，该字段被设置为 True。当然，有些场景可能根本不需要处理删除。\n\n我必须实事求是地承认，这种方法有一个潜在的缺点。它会将所有数据通过网络从源服务器拉取到目标服务器。如果这对您来说是个问题，那么请考虑查阅方案\
  \ 11-4、11-6 和 11-7 中提出的解决方案。\n\n> **注意：** 使用 `Lookup` 转换时，请确保只选择你需要的列。无论你使用哪种缓存模式，返回最小的字段集合只会使过程更快。\n\
  \n## 提示、技巧和陷阱\n\n*   允许你高效删除和更新记录的两个“临时”表（至少在本方案中）必须在此操作期间持久化到磁盘。它们可以与目标数据表位于同一数据库中，也可以位于你仅保存此类“临时”和暂存表的数据库中。你可能更倾向于在过程开始时创建它们并在结束时删除它们，而不是将它们保留在磁盘上并在开始时截断它们。这完全由你选择。\n\
  *   在步骤 9 中，如果你的唯一键由多个列组成，请记住映射所有这些列。\n*   由于 `VersionStamp` 是二进制的，你可能需要将其转换为 `BIGINT`\
  \ 以进行比较。这对于 SSIS 的 `Conditional Split`（条件拆分）任务是成立的，因为它无法比较二进制类型。然而，T-SQL 可以比较二进制类型。另外，我将增量标记列命名为\
  \ `VersionStamp`，以便明确即使它是一个 Timestamp（时间戳）字段——它也与时间无关！\n*   缓存可以加速 `MERGE`（合并）转换的使用，如方案\
  \ 13-16 所述。\n*   除了持久化的“临时”表，你也可以使用会话范围内的临时表，如方案 11-4 所述。\n*   要执行逻辑删除（并假设在 `Invoice_Lines`\
  \ 目标表中存在一个 `IsDeleted` BIT 列），请将“删除数据”执行 SQL 任务中的 SQL 替换为以下内容（`C:\\SQL2012DIRecipes\\\
  CH11\\12-1_LogicalDelete.Sql`）：\n    ```sql\n    UPDATE  dbo.Invoice_Lines\n   \
  \ SET     IsDeleted = 1\n    WHERE   ID IN (\n                SELECT dbo.Invoice_Lines.ID\n\
  \                FROM   dbo.Invoice_Lines\n                LEFT OUTER JOIN dbo.Invoice_Lines_Deletes\n\
  \                       ON dbo.Invoice_Lines.ID = dbo.Invoice_Lines_Deletes.ID\n\
  \                WHERE dbo.Invoice_Lines_Deletes.ID IS NULL\n              )\n \
  \   ```\n*   如果没有一个单一的（`VersionStamp` 或哈希）字段可以让你识别某一行数据是否已更改，你可能只有一个解决方案：将一行中的所有或大部分列与另一个表中的对应列进行比较。这不仅设置起来要繁琐得多，在大多数情况下也更慢。不过，如果它是重新加载整个表的唯一替代方案，那它可能是你唯一的解决方案。关于多字段比较的示例，你可以查看方案\
  \ 11-2 中的 `MERGE...ON` 语句。\n*   不幸的是，当使用 SQL Server 2005 的 SSIS 时，无法像本方案中那样检测新记录（因为没有\
  \ NoMatch 输出）。\n\n\n\n如果您仍在使用 **SSIS 2005**，那么我建议将所有源 ID 并行数据加载到 `Invoice_Lines_Deletes`\
  \ 目标表中。然后，使用 T-SQL `DELETE` 语句将此表与最终目标表进行比较，以删除源系统中不再存在的任何记录（或者，如果您想执行软删除，可以执行 `UPDATE`）。\n\
  \n## 11-2. 使用链接服务器加载数据变化\n\n### 问题\n\n您在链接服务器上有一个源数据库，该服务器连接到本地目标服务器，并且您希望管理增量数据变化，而不是执行完整数据加载。\n\
  \n### 解决方案\n\n使用 T-SQL `MERGE` 函数来管理从链接服务器源到本地服务器目标的数据传输。这将自动处理新记录的插入、现有记录的更新，以及（可选）删除数据源中不再存在的记录。以下步骤说明了如何操作。\n\
  \n1.  确保源数据库和目标数据库中具有相同的源表和目标表结构（至少为此示例目的），例如 (`C:\\SQL2012DIRecipes\\CH11\\tbl12-2_Invoice_Lines.Sql`)：\n\
  \n    ```sql\n    CREATE TABLE CarSales_Staging.dbo.Invoice_Lines\n    (\n    ID\
  \ INT NOT NULL,\n    InvoiceID INT NULL,\n    StockID INT NULL,\n    SalePrice NUMERIC(18,\
  \ 2) NULL\n    ) ;\n    GO\n    ```\n\n2.  确保您有一个正确配置的链接服务器，运行该过程的用户在目标服务器上拥有读取源数据的所有必要权限。在此示例中，链接服务器名为\
  \ `ADAMREMOTE`。设置指向 SQL Server 源数据库的链接服务器在配方 5-2 中有描述。\n\n3.  假设您已具备所有先决条件，以下 T-SQL\
  \ 代码将确保源表和目标表之间的基于增量的同步 (`C:\\SQL2012DIRecipes\\CH11\\LinkedServerMerge.Sql`)。\n\
  \n    ```sql\n    --合并例程\n\n    -- 两个数据集\n    MERGE       CarSales_Staging.dbo.Invoice_Lines\
  \ AS DST\n    USING       ADAMREMOTE.CarSales.dbo.Invoice_Lines AS SRC\n    ON DST.ID\
  \ = SRC.ID\n\n    -- 删除\n    WHEN NOT MATCHED BY SOURCE\n    THEN DELETE\n\n   \
  \ -- 更新\n    WHEN MATCHED AND\n        (\n        ISNULL(SRC.InvoiceID,0) <> ISNULL(DST.InvoiceID,0)\n\
  \        OR ISNULL(SRC.StockID,0) <> ISNULL(DST.StockID,0)\n        OR ISNULL(SRC.SalePrice,0)\
  \ <> ISNULL(DST.SalePrice,0)\n        )\n    THEN UPDATE\n    SET DST.InvoiceID\
  \ = SRC.InvoiceID\n        ,DST.StockID = SRC.StockID\n        ,DST.SalePrice =\
  \ SRC.SalePrice\n\n    -- 插入\n    WHEN NOT MATCHED THEN\n    INSERT\n          \
  \      (\n                 ID\n                 ,InvoiceID\n                 ,StockID\n\
  \                 ,SalePrice\n                )\n    VALUES\n                (\n\
  \                 ID\n                 ,InvoiceID\n                 ,StockID\n \
  \                ,SalePrice\n                )\n    ;\n    ```\n\n### 工作原理\n\n使用链接服务器作为数据源也可以处理插入、更新和删除操作。自\
  \ SQL Server 2008 引入 T-SQL `MERGE` 函数以来，这变得容易多了。需要注意的一点是，当目标服务器与源服务器有链接服务器连接时，您也可以使用\
  \ `MERGE`。\n\n两个数据表被别名如下：\n\n*   源 (`SRC`) 使用四部分表示法，包括链接服务器名称（本例中为 `ADAMREMOTE`）。\n\
  *   目标 (`DST`) 在本地服务器上。\n\n唯一标识符字段用作两个表之间的联接。删除操作使用 `WHEN NOT MATCHED BY SOURCE`\
  \ 子句定义。更新操作使用 `WHEN MATCHED AND` 子句定义——并比较用于检测增量的字段。插入操作使用 `WHEN NOT MATCHED` 子句定义。\n\
  \n您可能会发现一个有用的技术是在代码开头添加以下行：\n\n```sql\nDECLARE @OutputIDs TABLE  (AccountID BIGINT,\
  \ ActionType VARCHAR(40))\n```\n\n并在结尾处（分号之前）添加以下行：\n\n```sql\nOUTPUT COALESCE(INSERTED.ID,\
  \ DELETED.ID), $Action INTO @OutputIDs\n```\n\n这将把所有受操作影响的记录 ID 列表以及每个记录的操作类型存储到\
  \ `@OutputIDs` 表变量中。然后，您可以将此表用作日志记录和/或调试信息的来源。\n\n![image](img/sq.jpg) **注意** 仅当遵守几个基本条件时，使用\
  \ `MERGE` 才真正高效。首先，您需要在源表用于联接的列（`ON` 语句）上创建索引，并在目标表用于联接的列上创建聚集索引。如果您没有这些索引，您可能会发现\
  \ `MERGE` 比其他解决方案更慢。\n\n### 提示、技巧和陷阱\n\n*   这里我比较的是多个字段；当然，如果源和目标数据库中存在此类列类型，您可以使用\
  \ `VersionStamp`、哈希数据或包含更新数据标志的列来检测增量。\n*   记住用分号结束 `MERGE` 例程。\n*   如果目标表的 ID 列是\
  \ `IDENTITY` 列，您将需要使用 `SET IDENTITY_INSERT ON` 来封装执行插入的代码——并在完成后使用 `SET IDENTITY_INSERT\
  \ OFF`。\n\n## 11-3. 作为结构化 ETL 流程的一部分从小型源表加载数据变化\n\n### 问题\n\n您有一个小型的源数据集，并希望作为常规加载过程的一部分管理数据变化。\n\
  \n### 解决方案\n\n在 SSIS 包中使用 T-SQL `MERGE` 函数。\n\n1.  创建一个新的 SSIS 包，并添加两个 OLEDB 连接管理器：一个命名为\
  \ **CarSales_OLEDB**（连接到源 CarSales 数据库），另一个命名为 **CarSales_Staging_OLEDB**（连接到 CarSales_Staging\
  \ 目标数据库）。\n\n2.  在“控制流”窗格中添加一个“执行 SQL 任务”。将其命名为 **Create staging table**。配置如下 (`C:\\\
  SQL2012DIRecipes\\CH11\\11-3_CreateStagingTable.Sql`)：\n\n    | 连接： | CarSales_Staging_OLEDB\
  \ |\n    | SQL 语句： | `IF OBJECT_ID('dbo.Invoice_Lines_STG') IS NOT NULL DROP TABLE\
  \ dbo.Invoice_Lines_STG;` |\n    | `GO` | |\n    | `CREATE TABLE dbo.Invoice_Lines_STG`\
  \ | |\n    | `(` | |\n    | `ID int NOT NULL,` | |\n    | `InvoiceID INT NULL,`\
  \ | |\n    | `StockID INT NULL,` | |\n    | `SalePrice NUMERIC(18, 2) NULL,` | |\n\
  \    | `VersionStamp VARBINARY(8) NULL` | |\n    | `);` | |\n    | `GO` | |\n\n\
  3.  确认您的修改。\n4.  执行该任务以创建 `Invoice_Lines_STG` 表。\n\n5.  添加一个“数据流任务”。将其命名为 **Get\
  \ source data**。双击进行编辑。\n6.  添加一个 OLEDB 源。将其命名为 **CarSales**。配置如下：\n\n    | OLEDB\
  \ 连接管理器： | CarSales_OLEDB |\n    | 数据访问模式： | SQL 命令 |\n    | SQL 命令文本： | `SELECT\
  \ ID, InvoiceID, StockID, SalePrice, VersionStamp` |\n    | `FROM   dbo.Invoice_Lines`\
  \ | |\n\n7.  确认您的更改。\n\n8.  添加一个 OLEDB 目标。将其命名为 **CarSales_Staging_OLEDB**。连接到 OLEDB\
  \ 源并配置如下：\n\n    | OLEDB 连接管理器： | CarSales_Staging_OLEDB |\n    | 数据访问模式： | 表或视图\
  \ - 快速加载 |\n    | 表或视图的名称： | dbo.Invoice_Lines_STG |\n\n9.  映射列并确认您的更改。\n10. 返回到“控制流”窗格。\n\
  \n11. 在“控制流”窗格中添加一个“执行 SQL 任务”。将其命名为 **MERGE Data**。配置如下 (`C:\\SQL2012DIRecipes\\\
  CH11\\11-3_MergeSSISMerge.Sql`)：\n\n    | 连接： | CarSales_Staging_OLEDB |\n    |\
  \ SQL 语句： | `--合并例程` |\n    | `-- 两个数据集` | |\n    | `MERGE   dbo.Invoice_Lines AS\
  \ DST` | |\n    | `USING   dbo.Invoice_Lines_STG AS SRC` | |\n    | `ON DST.ID =\
  \ SRC.ID` | |\n\n\n\n# 工作原理\n\n如果 T-SQL 的 `MERGE` 命令的简洁性吸引到您，您也可以在 SSIS 中调用它。在这个简单的示例中，它从源系统提取所有源数据，并将其写入一个暂存表。这种简洁性无疑是一大吸引力。这种方法最适用于将所有源数据传输到目标服务器上的一个暂存表，并且您有足够的磁盘空间来存放一个重复的表。它要求源表和目标表的结构几乎完全相同（这对于增量数据管理来说几乎总是必要条件）。这里的\
  \ `MERGE` 功能与前一个方法中使用的几乎完全相同，只是因为源和目标在同一台服务器上，所以不需要使用四部分命名法。\n\n我使用一个 `ROWVERSION`\
  \ 列来检测增量变化。如果您的数据包含哈希数据或数据更新列，您也可以使用这些。如果目标表的 ID 列是一个 `IDENTITY` 列，您需要将 `IDENTITY_INSERT`\
  \ 设置为 `ON` 和 `OFF`。\n\n```\nID` |  |     | `-- 删除操作` |  |     | `WHEN NOT MATCHED\
  \ BY SOURCE` |  |     | `THEN DELETE` |  |     | `-- 更新操作` |  |     | `WHEN MATCHED\
  \ AND` |  |     | `(` |  |     | `ISNULL(SRC.VersionStamp,0) <> ISNULL(DST.VersionStamp,0)`\
  \ |  |     |                                         `)` |  |     | `THEN UPDATE`\
  \ |  |     | `SET            DST.InvoiceID` = `SRC.InvoiceID` |  |     | `,DST.StockID`\
  \ = `SRC.StockID` |  |     | `,DST.SalePrice` = `SRC.SalePrice` |  |     | `,DST.VersionStamp`\
  \ = `SRC.VersionStamp` |  |     | `-- 插入操作` |  |     | `WHEN NOT MATCHED THEN` |\
  \  |     | `INSERT` |  |     | `(` |  |     | `ID` |  |     | `,InvoiceID` |  |\
  \     | `,StockID` |  |     | `,SalePrice` |  |     | `,VersionStamp` |  |     |\
  \ `)` |  |     | `VALUES` |  |     | `(` |  |     | `ID` |  |     | `,InvoiceID`\
  \ |  |     | `,StockID` |  |     | `,SalePrice` |  |     | `,VersionStamp` |  |\
  \     | `)` |  |     | `;` |  |\n```\n\n12. 确认您的配置。\n13. 向控制流窗格添加一个“执行 SQL 任务”。将其命名为\
  \ **删除暂存表**。按如下方式配置：\n    - 连接：`CarSales_Staging_OLEDB`\n    - SQL 语句：\n```\nIF\
  \ OBJECT_ID('dbo.Invoice_Lines_STG') IS NOT NULL\nDROP TABLE dbo.Invoice_Lines_STG\n\
  ```\n    这将在流程的其余部分运行完毕后，从目标数据库中移除暂存表。SSIS 包应如图 11-8 所示。\n\n![9781430247913_Fig11-08.jpg](img/9781430247913_Fig11-08.jpg)\n\
  \n图 11-8. 基于 SSIS 的 MERGE 控制流\n\n#### 提示、技巧与陷阱\n\n-   您可以使用会话范围内的临时表代替磁盘上的表。这将需要您为表名和选择语句使用变量（并最初在目标数据库中使用持久化表），同时按照方法\
  \ 11-4 所述，将目标连接管理器设置为保持相同的连接。\n-   对于任何大小的暂存表，建议您在其主键或唯一键（或在 `USING...ON` 子句中使用的任何列）上为暂存表创建索引（聚集或非聚集）。为了使\
  \ `MERGE` 高效运行，您必须为 `MERGE` 语句的联接 (`ON`) 子句中使用的目标表列添加聚集索引。\n-   暂存表可以位于目标服务器上的另一个（暂存）数据库中，并且在任何情况下，将其放在与最终目标表不同的磁盘阵列上都会带来好处。\n\
  -   使用 `MERGE` 而非本章第一个方法中概述的 SSIS 方法来更新大型数据集的速度之快，可能会让您惊喜不已。然而，不可避免的是，流程的速度取决于您所工作的环境。\n\
  -   与方法 11-1 一样，这种方法的缺点在于所有源数据都必须通过网络传输。因此，它可能不适合大型数据集。\n\n# 11-4. 仅检测和加载增量数据\n\n\
  ## 问题\n\n您希望在将更改应用到目标表之前，在源端隔离出已更改的数据，并避免通过网络传输未修改的数据。\n\n## 解决方案\n\n将所有记录的哈希码从目标服务器发送回源服务器。使用它来检测更改，并仅将更改的记录返回到目标服务器。以下解释了如何执行此操作。\n\
  \n1.  创建四个 ETL 元数据表，用于临时保存增量数据信息。对于**源**数据库中的更新，使用以下 DDL：\n```\nCREATE TABLE CarSales.dbo.TMP_Updates\
  \ (ID INT);\n```\n2.  对于**源**数据库中的插入操作，使用以下 DDL：\n```\nCREATE TABLE CarSales.dbo.TMP_Inserts\
  \ (ID INT);\n```\n3.  对于**目标**数据库中的更新数据，使用以下 DDL（如果您已为其他方法创建了此表，请先将其删除）。代码位于 (`C:\\\
  SQL2012DIRecipes\\CH11\\tbl11-4_Invoice_Lines_Updates.Sql`)：\n```\nCREATE TABLE\
  \ CarSales_Staging.dbo.Invoice_Lines_Updates\n(\n ID INT  NOT NULL,\n InvoiceID\
  \ INT  NULL,\n StockID INT  NULL,\n SalePrice NUMERIC(18, 2) NULL,\n DateUpdated\
  \ DATETIME,\n LineItem SMALLINT,\n VersionStamp VARBINARY(8) NULL,\n HashData VARBINARY(256)\
  \ NULL\n) ;\nGO\n```\n4.  对于**目标**数据库中的删除操作，使用以下 DDL：\n```\nCREATE TABLE CarSales_Staging.dbo.TMP_Deletes\
  \ (ID INT);\nGO\n```\n5.  作为本方法的示例目标表，创建以下表。代码位于 (`C:\\SQL2012DIRecipes\\CH11\\\
  tbl11-4_Invoice_Lines.Sql`)：\n```\nCREATE TABLE CarSales_Staging.dbo.Invoice_Lines\n\
  (\n ID INT  NOT NULL,\n InvoiceID INT  NULL,\n StockID INT  NULL,\n SalePrice NUMERIC(18,\
  \ 2) NULL,\n DateUpdated DATETIME,\n LineItem SMALLINT,\n VersionStamp VARBINARY(8)\
  \ NULL,\n HashData VARBINARY(256) NULL\n) ;\nGO\n```\n6.  添加三个包作用域变量。对数据库表的引用稍后将替换为对临时表的引用。目前按如下方式配置这些变量：\n\
  \    - 名称：`DeleteTable`\n    - 数据类型：`String`\n    - 值：`Tmp_Deletes`\n    - 名称：`UpdateTable`\n\
  \    - 数据类型：`String`\n    - 值：`Tmp_Updates`\n    - 名称：`InsertTable`\n    - 数据类型：`String`\n\
  \    - 值：`Tmp_Inserts`\n7.  创建一个新的 SSIS 包，并添加创建两个 OLEDB 连接管理器：一个为源服务器 (`CarSales`)\
  \ 正确配置，一个为目标服务器 (`CarSales_Staging`) 正确配置，分别命名为 **CarSales_OLEDB** 和 **CarSales_Staging_OLEDB**。将源和目标连接管理器的\
  \ `RetainSameConnection` 属性都设置为 `True`。\n8.  向控制流窗格添加一个新的“执行 SQL 任务”。将其命名为 **在源上创建临时表**。此任务创建会话范围内的临时表，这些表将保存来自源数据集的所有要插入和更新记录的\
  \ ID（在生产环境中，如果不是在开发中）。配置如下：\n    - 名称：`Create Temp tables`\n    - 连接：`CarSales_OLEDB`\n\
  \    - SQL 语句：\n```\nCREATE TABLE ##TMP_INSERTS (ID INT);\nCREATE TABLE ##TMP_UPDATES\
  \ (ID INT);\n```\n9.  点击“确定”确认，返回数据流窗格。\n10. 向控制流窗格添加一个新的“执行 SQL 任务”。将上一个“执行 SQL\
  \ 任务”连接到它。将其命名为 **在目标上创建临时表**。此任务创建会话范围内的临时表，该表将保存源数据中的所有 ID（将用于隔离要删除的记录）。\n\n\n\
  \n## 配置流程\n\n配置如下：\n| 名称 | 创建临时表 |\n| :--- | :--- |\n| 连接 | CarSales_Staging_OLEDB\
  \ |\n| SQL 语句 | `CREATE TABLE ##TMP_DELETES (ID INT);` |\n\n11. 确认并点击“确定”以返回到数据流页面。\n\
  12. 在控制流页面添加一个数据流任务。将其命名为 `Delta Detection`。将“在源上创建临时表”执行 SQL 任务连接到它。双击进入数据流页面。\n\
  13. 添加一个 OLE DB 源适配器。配置它使用 SQL 命令从源表 (`Invoice_Lines`) 中选择 ID 和用于增量检测的行，如下所示：\n\n\
  \    | 名称 | 创建临时表 |\n    | :--- | :--- |\n    | 连接 | CarSales_OLEDB |\n    | SQL\
  \ 语句 | `SELECT ID, HashData AS HashData_Source` |\n    | | `FROM dbo.Invoice_Lines\
  \ WITH (NOLOCK)` |\n\n14. 在数据流页面添加一个“多播”转换。将数据源适配器连接到它。\n15. 添加一个“查找”转换，并将“多播”转换连接到它。将其命名为\
  \ `Detect Hash Deltas`。在查找转换的“常规”选项卡上，按如下配置：\n\n    | 缓存模式 | 无缓存 |\n    | :--- |\
  \ :--- |\n    | 连接类型 | OLE DB 连接管理器 |\n    | 指定如何处理具有“无匹配项”的行 | 将没有匹配项的行发送到“无匹配输出”\
  \ |\n\n16. 点击左侧的“连接”。将连接管理器设置为 `CarSales_Staging_OLEDB`，因为您将使用此查找转换将源数据与您正在查找的目标数据进行比较。\n\
  17. 将查找设置为“使用 SQL 查询的结果”，并输入以下 SQL：\n\n    ```sql\n    SELECT ID, HashData\n   \
  \ FROM dbo.Invoice_Lines WITH (NOLOCK)\n    ```\n\n18. 点击左侧的“列”。两个表，源（左侧）和目标（右侧）将出现。将“可用查找列”（或目标）表（右侧）中的\
  \ `ID` 列拖动到“可用输入列”（源）表（左侧）中的 `ID` 列。这将两个数据源的唯一 ID 相互映射。\n19. 选择右侧“可用查找列”（或目标）表中的\
  \ `HashData` 列，并提供一个输出别名——我建议使用 `HashData_Destination`。这允许您为每条记录比较源和目标的哈希值。\n20.\
  \ 点击“确定”确认您的修改。返回到数据流页面。\n21. 在数据流页面添加一个 OLE DB 目标适配器，并将其 `ValidateExternalMetadata`\
  \ 属性设置为 `False`。将查找转换连接到此目标，确保选择查找的“无匹配输出”。配置如下：\n\n    | OLE DB 连接管理器 | CarSales_OLEDB\
  \ |\n    | :--- | :--- |\n    | 数据访问模式 | 表名或视图名变量 |\n    | 变量名 | InsertTable |\n\
  \n22. 点击“映射”并确保 `ID` 列已连接。点击“确定”确认您的修改。您将创建一个包含数据源中所有新 ID 的临时表，稍后将使用它仅传输这些记录（插入）到目标服务器。\n\
  23. 在数据流页面添加一个 OLE DB 目标适配器。将“多播”转换连接到它。将其命名为 `Records to Delete`，并将其 `ValidateExternalMetadata`\
  \ 属性设置为 `False`。双击进行编辑。\n24. 将连接管理器设置为 `CarSales_Staging_OLEDB`，数据访问模式设置为“表名或视图名变量”。选择\
  \ `DeleteTable` 作为表变量名。\n25. 点击“映射”。确保 `ID` 列已连接。然后点击“确定”确认。这样，您就创建了一个临时表，其中包含源数据集中的所有\
  \ ID，可以与目标数据集中的当前 ID 进行比较，以推断出已删除的记录。\n26. 现在，是时候进入流程的“更新”部分了。在数据流页面添加一个“条件性拆分”转换。将其命名为\
  \ `Detect Hash Deltas`。将查找转换连接到它。“查找匹配输出”应自动应用。这会将查找匹配输出发送到条件性拆分。\n27. 双击编辑条件性拆分。添加一个名为\
  \ `HashData Differences` 的输出条件，其条件是：\n\n    ```sql\n    (DT_UI8) HashData_Source\
  \ != (DT_UI8) HashData_Destination\n    ```\n\n28. 点击“确定”确认。关闭对话框。\n29. 向数据流添加一个\
  \ OLE DB 目标适配器，并将条件性拆分转换连接到它。将出现“输入输出”对话框，您应在其中选择“HashData Differences”输出（这实际上是目标适配器的源）。设置如下：\n\
  \n    | OLE DB 连接管理器 | CarSales_OLEDB |\n    | :--- | :--- |\n    | 数据访问模式 | 表名或视图名变量\
  \ |\n    | 变量名 | UpdateTable |\n\n30. 点击“映射”并确保 `ID` 列已正确映射，然后点击“确定”确认您的修改。这将把所有具有不同哈希值的\
  \ ID 的子集发送到作用域为会话的临时表。数据流页面应如 图 11-9 所示。\n\n    ![9781430247913_Fig11-09.jpg](img/9781430247913_Fig11-09.jpg)\n\
  \n    图 11-9. 基于哈希的增量检测数据流\n\n31. 点击“控制流”选项卡返回到控制流页面。\n32. 现在我们可以进入流程的第二部分——使用已标识为插入、删除和更新的\
  \ ID 来执行数据修改，（对于插入和更新）仅获取所需的记录。让我们从删除开始。点击“控制流”选项卡并添加一个“执行 SQL 任务”。将其命名为 `Delete\
  \ Data`。将其连接到 `Delta Detection` 数据流任务。配置执行 SQL 任务如下（`C:\\SQL2012DIRecipes\\CH11\\\
  11-4_DeleteData.Sql`）：\n\n    | 连接 | CarSales_Staging_OLEDB |\n    | :--- | :---\
  \ |\n    | SQL 语句 | `DELETE FROM dbo.Invoice_Lines` |\n    | | `WHERE ID IN (` |\n\
  \    | | `SELECT DST.ID` |\n    | | `FROM dbo.Invoice_Lines DST` |\n    | | `LEFT\
  \ OUTER JOIN ##TMP_Deletes TMP` |\n    | | `ON TMP.ID = DST.ID` |\n    | | `WHERE\
  \ TMP.ID IS NULL` |\n    | | `)` |\n\n33. 现在处理插入。在控制流页面添加一个数据流任务。将上一个任务 (`DeleteData`)\
  \ 连接到它。将任务命名为 `Insert Data`。将其 `DelayValidation` 属性设置为 `True`。\n34. 添加一个新的包作用域变量\
  \ `InsertSQL`。这必须是一个包含与源数据关联的 `SELECT` 语句的字符串，并连接到 `TMP_Inserts` 临时表。在此示例中，将使用以下值；一旦全部工作正常，将进行调整以使用临时表（`C:\\\
  SQL2012DIRecipes\\CH11\\11-4_InsertSQL.Sql`）：\n\n    ```sql\n    SELECT SRC.ID,\
  \ SRC.InvoiceID, SRC.StockID, SRC.SalePrice, SRC.HashData\n    FROM dbo.Invoice_Lines\
  \ SRC\n    INNER JOIN TMP_Inserts TMP\n    ON SRC.ID = TMP.ID\n    ```\n\n35. 编辑“Insert\
  \ Data”数据流任务。\n36. 向数据流页面添加一个 OLE DB 源。将其重命名为 `CarSales_OLEDB`，并按如下配置：\n\n    |\
  \ OLE DB 连接管理器 | CarSales_OLEDB |\n    | :--- | :--- |\n    | 数据访问模式 | 来自变量的 SQL\
  \ 命令 |\n    | 变量名 | InsertSQL |\n\n37. 向数据流页面添加一个 OLE DB 目标连接器。将源连接到它。配置如下：\n\n\
  \    | OLE DB 连接管理器 | CarSales_Staging_OLEDB |\n    | :--- | :--- |\n    | 数据访问模式\
  \ | 表或视图 - 快速加载 |\n    | 表或视图的名称 | dbo.Invoice_Lines |\n\n38. 点击“列”并确保所有必需的列都被选中，然后点击“确定”确认您的更改。这会第二次访问源服务器，并添加目标数据集中尚不存在的新记录。\n\
  39. 返回到控制流页面。\n40. 最后，我们处理更新。\n\n\n\n首先，添加两个包作用域的字符串变量，如下所示 (`C:\\SQL2012DIRecipes\\\
  CH11\\11-4_UpdateDataTable.Sql`):\n\n| 名称： | `UpdateDataTable` |\n| 值： | `Invoice_Lines_Updates`\
  \ |\n| 名称： | `UpdateSQL` |\n| 值： | `SELECT     SRC.ID, SRC.InvoiceID,` |\n| `SRC.StockID,\
  \ SRC.SalePrice,` |\n| `SRC.LineItem, SRC.DateUpdated` |\n| `SRC.HashData` |\n|\
  \ `FROM       dbo.Invoice_Lines SRC` |\n| `INNER JOIN TMP_Updates TMP` |\n| `ON\
  \ SRC.ID` = `TMP.ID` |\n\n41.  `UpdateSQL` 变量仅从源服务器中选择需要更新的记录。`UpdateDataTable`\
  \ 指的是包含所有需要更新记录的数据临时表。`UpdateCode` 在目标服务器上执行更新操作。将其命名为 **更新数据**。将之前的数据流任务（插入数据）连接到它。将其\
  \ `DelayValidation` 属性设置为 True。\n\n42.  双击进行编辑。在数据流窗格中添加一个 OLEDB 源。将其重命名为 `CarSales_OLEDB`。将其\
  \ `ValidateExternalMetadata` 属性设置为 False。按如下配置：\n\n| OLEDB 连接管理器： | `CarSales_OLEDB`\
  \ |\n| 数据访问模式： | 来自变量的 SQL 命令 |\n| 变量名称： | `UpdateSQL` |\n\n43.  在数据流窗格中添加一个 OLEDB\
  \ 目标连接器。将源连接到它。按如下配置：\n\n| OLEDB 连接管理器： | `CarSales_Staging_OLEDB` |\n| 数据访问模式：\
  \ | 来自变量的 SQL 命令 |\n| 变量名称： | `UpdateDataTable` |\n\n44.  单击“映射”并确保所有必需的列都已映射，然后单击“确定”以确认更改。这将再次访问源服务器，并将目标数据集中尚不存在的任何新记录添加到\
  \ `Invoice_Lines_Updates` 暂存表中，该表最终也将很快成为临时表。\n\n45.  返回数据流窗格。添加一个执行 SQL 任务，并将其重命名为\
  \ **执行更新**。将“更新数据”数据流任务连接到它。将其 `DelayValidation` 属性设置为 True。\n\n46.  编辑 **执行更新**\
  \ 执行 SQL 任务并设置以下内容 (`C:\\SQL2012DIRecipes\\CH11\\11-4_CarryOutUpdates.Sql`):\n\n\
  | 连接： | `CarSales_Staging_OLEDB` |\n| SQL 语句： | `UPDATE        DST` |\n| `SET  \
  \         DST.InvoiceID` = `UPD.InvoiceID` |\n| `,DST.SalePrice` = `UPD.SalePrice`\
  \ |\n| `,DST.LineItem` = `UPD.LineItem` |\n| `,DST.UpdateDate` = `SRC.UpdateDate`\
  \ |\n| `,DST.StockID` = `UPD.StockID` |\n| `,DST.HashData` = `UPD.HashData` |\n\
  | `FROM          dbo.Invoice_Lines DST` |\n| `INNER JOIN   ##Invoice_Lines_Updates\
  \ UPD` |\n| `ON DST.ID` = `UPD.ID` |\n\n控制流窗格应类似于 图 11-10。\n\n![9781430247913_Fig11-10.jpg](img/9781430247913_Fig11-10.jpg)\n\
  \n图 11-10.  检测并仅加载增量数据的过程流\n\n至此，终于完成了。你拥有了一个 SSIS 包，它可以检测数据差异，并仅返回任何新记录或需要更新记录的完整数据。一旦该流程调试成功并正常运行，你就可以修改变量值以使用临时表，如下所示\
  \ (`C:\\SQL2012DIRecipes\\CH11\\11-4_VariablesForTempTables.Sql`):\n\n| `DeleteTable`:\
  \ | `TempDB..##TMP_Deletes` |\n| `UpdateTable`: | `TempDB..##TMP_Updates` |\n| `InsertTable`:\
  \ | `TempDB..##TMP_Inserts` |\n| `UpdateDataTable`: | `TempDB..##Invoice_Lines_Updates`\
  \ |\n| `InsertSQL`: | `SELECT          SRC.ID, SRC.InvoiceID,` |\n| `SRC.StockID,\
  \ SRC.SalePrice,SRC.HashData` |\n| `FROM            dbo.Invoice_Lines SRC` |\n|\
  \ `INNER JOIN   TempDB..##TMP_Inserts TMP` |\n| `ON SRC.ID`= `TMP.ID` |\n| `UpdateSQL`:\
  \ | `SELECT          SRC.ID, SRC.InvoiceID, SRC.StockID,` |\n| `SRC.SalePrice, SRC.HashData`\
  \ |\n| `FROM            dbo.Invoice_Lines SRC` |\n| `INNER JOIN   TempDB..##TMP_Updates\
  \ TMP` |\n| `ON SRC.ID` = `TMP.ID` |\n\n最后，你可以删除源数据库中的暂存表 `TMP_Updates` 和 `TMP_Inserts`，以及目标数据库中的\
  \ `TMP_Deletes` 和 `Invoice_Lines_Updates`。该流程现在将使用临时表而非持久化表。\n\n工作原理\n\n方案 11-1\
  \ 和 11-3 的缺点是每次流程运行时都需要从源服务器传输整个数据集。对此方法的一个改进可能是检测任何不同的记录，并且只传输已更改的记录，这正是本方案所实现的。\n\
  \n那么，假设你在源服务器上的权限极其有限，这该如何实现呢？\n\n解决方案是使用一个两阶段流程：\n\n*   首先，仅将键列和增量标志列取回目标服务器。\n\
  *   然后，检测增量（插入、更新和删除），并仅从源服务器请求每种类型的相应记录。\n\n在此示例中，我使用哈希码来检测增量——因此假定你的源数据在每次插入和更新时都生成了哈希码。这种方法同样适用于\
  \ `TIMESTAMP` 或 `ROWVERSION` 列或日期字段。\n\n值得注意的是，这种方法仅在你拥有增量检测列时才有效；如果你需要在源和目标数据集中比较多个列，可能就不太有用，因为你几乎不可避免地最终会将大部分数据从源服务器取回两次。在我的测试中，对于宽表，使用这种方法可以显著提升速度；但对于非常窄的表，可能反而更慢。在一个包含\
  \ 15 种混合数据类型的表中（其中一些是中等长度的 `VARCHAR` 字符串），数据差异为 2%，我获得了 10% 的处理时间缩减。在一个包含 150 列、其中数十列非常宽、数据差异同样为\
  \ 2% 的表中，该流程运行速度提高了近四倍。当然，你的结果取决于你的源数据、网络和目标服务器配置。\n\n图 11-11 或许能更清晰地以图示方式展示该流程。\n\
  \n![9781430247913_Fig11-11.jpg](img/9781430247913_Fig11-11.jpg)\n\n图 11-11.  检测源数据修改的过程流\n\
  \n在技术层面，此技术将使用会话范围的临时表来保存将被更新和删除的记录的增量 ID。为了在实践中实现这一点，你需要将临时表创建位置（源或目标）的连接属性 `RetainSameConnection`\
  \ 设置为 True。这确保在 SSIS 包运行期间始终使用同一连接，因此，所使用的任何会话范围临时表对所有需要使用它们的步骤都是可用的。然后你必须确保创建的任何临时表都必须是会话范围的——即它们的名称以双井号\
  \ (`##`) 开头。\n\n此方案的方法最适合在以下情况下使用：\n\n*   当你导入具有可靠增量检测列的宽表时。\n*   当修改的数据仅占总量的一小部分时。\n\
  *   当你不想将目标数据库中用于临时数据集的表持久化到磁盘时。\n\n请注意，在创建包之前需要搭建一点“脚手架”，之后你需要将其移除。这个说法可能需要解释一下，所以如下。为了在\
  \ SSIS 中轻松使用会话范围的临时表，首先在源和开发环境中创建用于设置包的常规表会大有帮助——这几乎与方案 11-1 中的做法相同。在创建包时，你将使用 SSIS\
  \ 变量来引用源和目标数据库中的暂存表。\n\n\n\n当一切正常工作时，修改 `SSIS` 变量以指向会话范围内的临时表，并在各自的数据库中删除对应的表。我称这些表为“临时表”。\n\
  \n四个 `ETL` 元数据表的使用方式如表 11-2 所述。\n\n表 11-2. 本配方中使用的 `ETL` 元数据表\n\n| ETL 元数据表 | 描述\
  \ |\n| --- | --- |\n| 源数据库表，用于存放新记录的 ID。 | 一旦在目标数据库上检测到差异，其 `ID` 会被发送回源数据库，以便可以将对应的记录发送到目标数据库进行插入。\
  \ |\n| 源数据库表，用于存放已更新记录的 ID。 | 一旦在目标数据库上检测到数据变更，其 `ID` 会被发送回源数据库，以便可以将对应的记录发送到目标数据库进行插入。\
  \ |\n| 目标数据库表，用于存放修改后的数据。 | 目标数据库上已更新记录的 `ID`。 |\n| 目标数据库表，用于存放已删除记录的 ID。 | 目标数据库上已删除记录的\
  \ `ID`。 |\n\n在本配方中，配方 11-1 中使用的 `VERSIONSTAMP` 列被一个名为 `HashData` 的 `VARCHAR` 列所取代，该列保存用于差异检测的哈希计算结果。\n\
  \n#### 提示、技巧与陷阱\n\n*   由于你使用的是会话范围的临时表，数据可能会溢出内存并进入 `TempDB`；因此，确保你的 `TempDB` 配置正确（针对处理器数量配置正确数量的文件等；详见联机丛书\
  \ (`BOL`)）是非常值得的。\n*   至于*脚手架*（用于存放差异数据的永久表），你可以使用物化的数据库表进行测试，直到你满意一切工作正常，然后才在第一阶段测试结束时替换对临时表的变量引用。\n\
  *   有两个主要的调整需要记住：\n    *   对于所有使用临时表的 `OLEDB` 源和目标连接器，`ValidateExternalMetadata`\
  \ 必须设置为 `False`。\n    *   对于所有使用临时表的 `Data Flow` 任务，`DelayValidation` 必须设置为 `True`。\n\
  \n# 11-5. 与其他 SQL 数据库执行差异数据更新\n\n## 问题\n\n你正在使用另一个 `SQL` 数据库作为数据源，并且希望只将修改过的或新记录传输到目标，同时传输已删除记录的\
  \ `ID`。\n\n## 解决方案\n\n使用一个差异检测列并像前面的配方那样使用临时表。以下步骤详述了针对 `Oracle` 数据源的一种简化方法。\n\n\
  1.  使用以下 `DDL` 创建一个 `Oracle` 全局临时表（`C:\\SQL2012DIRecipes\\CH11\\tblOracleDelta.Sql`）：\n\
  \n    ```\n    create global temporary table SCOTT.DELTA_DATA\n    (\n    \"EMPNO\"\
  \ NUMBER(4,0)\n    ) ;\n    on commit preserve rows\n    ```\n\n2.  使用以下 `DDL` 创建一个目标\
  \ `SQL Server` 表（`C:\\SQL2012DIRecipes\\CH11\\tblOracle_EMP.Sql`）：\n\n    ```\n\
  \    CREATE TABLE dbo.Oracle_EMP\n    (\n     EMPNO NUMERIC(4, 0) NULL,\n     LASTUPDATED\
  \ datetime NULL,\n     ENAME VARCHAR(10) NULL,\n     JOB VARCHAR(9) NULL,\n    \
  \ MGR NUMERIC(4, 0) NULL,\n     HIREDATE datetime NULL,\n     SAL NUMERIC(7, 2)\
  \ NULL,\n     COMM NUMERIC(7, 2) NULL,\n     DEPTNO NUMERIC(2, 0) NULL\n    ) ;\n\
  \    ```\n\n3.  创建一个新的 `SSIS` 包并添加两个 `OLEDB` 连接管理器：一个（命名为 `CarSales_Staging_OLEDB`）用于你的目标\
  \ `SQL Server` 数据库 (`CarSales_Staging`)，另一个（命名为 `Source_Oracle_OLEDB`）使用 `Oracle\
  \ Provider for OLEDB` 连接到你的 `Oracle` 实例。将两者的 `RetainSameConnection` 属性设置为 `True`。\n\
  4.  添加一个 `Data Flow` 任务。将其命名为 `Isolate new IDs for Insert`。双击进行编辑。\n5.  添加一个 `OLEDB`\
  \ 数据源。将其命名为 `Oracle Source`。编辑并配置如下：\n    *   `OLEDB` 连接管理器：`Source_Oracle_OLEDB`\n\
  \    *   数据访问模式：`SQL Command`\n    *   `SQL` 命令：`SELECT EMPNO FROM SCOTT.EMP`\n\
  6.  点击 `OK` 确认。\n7.  添加一个 `Lookup` 转换，配置为从目标表 `Oracle_EMP` 中选择 `EMPNO`。在 `EMPNO`\
  \ 列上进行连接。将不匹配的行重定向到 `NoMatch` 输出，然后点击 `OK`。\n8.  添加一个 `OLEDB` 目标。将其命名为 `Oracle Delta`\
  \ 并配置如下：\n    *   `OLEDB` 连接管理器：`Source_Oracle_OLEDB`\n    *   数据访问模式：`Table or\
  \ View`\n    *   表或视图名称：`Scott.DELTA_DATA`\n\n你的 `Data Flow` 面板应如图 11-12 所示。\n\n\
  ![9781430247913_Fig11-12.jpg](img/9781430247913_Fig11-12.jpg)\n\n图 11-12. Oracle\
  \ 差异数据处理\n\n9.  返回到 `Control Flow` 面板并添加一个新的 `Data Flow` 任务。将其命名为 `Insert new records`。双击进行编辑。\n\
  10. 添加一个 `OLEDB` 源。将其命名为 `Delta Records` 并配置如下（`C:\\SQL2012DIRecipes\\CH11\\11-5_DeltaRecords.Sql`）：\n\
  \    *   `OLEDB` 连接管理器：`Source_Oracle_OLEDB`\n    *   数据访问模式：`SQL Command`\n   \
  \ *   `SQL` 命令文本：`SELECT DISTINCT S.EMPNO, S.ENAME, S.JOB, S.MGR, S.HIREDATE, S.SAL,\
  \ S.COMM, S.DEPTNO, S.LASTUPDATED FROM SCOTT.DELTA_DATA D, SCOTT.EMP S WHERE D.EMPNO\
  \ = S.EMPNO`\n11. 点击 `OK` 确认。\n12. 添加一个 `OLEDB` 目标。将其命名为 `Delta Output`。将 `Delta\
  \ Records` `OLEDB` 源连接到它。映射所有列并点击 `OK`。返回到 `Control Flow` 面板。\n13. 添加一个 `Execute\
  \ SQL` 任务并将其命名为 `Delete temp table`。将 `Insert new records` `Data Flow` 任务连接到它，并配置如下：\n\
  \    *   连接：`Source_Oracle_OLEDB`\n    *   `SQL` 语句：`DELETE FROM SCOTT.DELTA_DATA`\n\
  14. 点击 `OK` 确认。`Control Flow` 面板应如图 11-13 所示。\n\n![9781430247913_Fig11-13.jpg](img/9781430247913_Fig11-13.jpg)\n\
  \n图 11-13. `Oracle` `SQL` 为基础的差异数据处理\n\n## 工作原理\n\n当前大多数商业和开源 `SQL` 数据库都以某种方式使用临时表。由于在此上下文中展示所有数据库如何使用是不切实际的，我简要概述了如何在\
  \ `Oracle` 中以这种方式使用，因为这是 `SQL Server` `DBA` 和开发人员经常会遇到的产品。如果你使用的是其他 `RDBMS`，我只能希望接下来描述的技术能作为一个有用的起点。请记住，如果其他方法都失败了，如果你能说服源系统\
  \ `DBA` 允许，你总是可以使用“普通”的持久化表。\n\n由于这本质上与配方 11-4 描述的过程类似，我只给出了一个简要概述，并提醒你注意任何相关的差异。具体来说，我只看了数据插入部分，并让你基于此方法推断如何执行删除和更新。\n\
  \n当你希望从 `Oracle` 数据源获取差异数据，并且已说服 `Oracle` `DBA` 创建一个全局临时表并授予你用于提取数据的帐户访问该表的权限时，此技术最合适。此外，在服务器上安装和配置相关的\
  \ `Oracle` 客户端软件也是根本性的。\n\n#### 提示、技巧与陷阱\n\n*   同样，将 `Oracle` `OLEDB` 连接管理器的 `RetainSameConnection`\
  \ 属性设置为 `True` 至关重要。\n*   在 `Oracle` 源数据库中创建临时表时使用 `on commit preserve rows` 同样是根本性的——没有这个，该过程将无法工作。\n\
  \n\n#### 11-6. 在不写入源服务器的情况下处理数据变更\n\n请注意，Oracle 临时表与 SQL Server 临时表不同——它在磁盘上物理存在。但是，只有在\
  \ SSIS 会话期间连接的用户才能使用他们插入到该表中的数据。这样做的缺点是，之后必须删除数据，否则数据将保留在表中，并在下次运行此过程时导致错误。\n\n\
  ### 问题\n\n你想从源数据库中仅传输已更改的记录，但你不被允许在源服务器上创建 ETL 元数据表。\n\n### 解决方案\n\n隔离出新增或已更改记录的\
  \ ID，并将其作为 `SELECT` 查询的一部分返回给源数据库。如果你的数据增量非常小，以下步骤说明了如何完成此操作。\n\n1.  在目标数据库 (`CarSales_Staging`)\
  \ 上创建一个表类型来保存 ID：\n    ```sql\n    CREATE TYPE DeltaIDs AS TABLE (ID INT);\n   \
  \ GO\n    ```\n2.  同样在目标数据库 (`CarSales_Staging`) 上，创建一个存储过程，用于返回与通过表值参数传入的 ID 集相对应的数据\
  \ (`C:\\SQL2012DIRecipes\\CH11\\pr_SelectDeltaData.Sql`)：\n    ```sql\n    CREATE\
  \ PROCEDURE CarSales_Staging.dbo.pr_SelectDeltaData\n    (\n    @DeltaSet DeltaIDs\
  \ READONLY\n    )\n    AS\n    SELECT\n        S.ID\n        ,S.InvoiceID\n    \
  \    ,S.StockID\n        ,S.SalePrice\n        ,CAST(S.HashData AS VARCHAR(50))\
  \ AS HashData\n    FROM\n        dbo.Invoice_Lines S\n    INNER JOIN\n        @DeltaSet\
  \ D\n    ON S.ID = D.ID;\n    GO\n    ```\n3.  使用以下 DDL 创建 `Invoice_Lines` 目标表（如果存在旧版本，请记得先删除）。DDL\
  \ 位于 `C:\\SQL2012DIRecipes\\CH11\\tbl11-5_Invoice_Lines.Sql`：\n    ```sql\n    CREATE\
  \ TABLE dbo.Invoice_Lines\n    (\n        ID INT NOT NULL,\n        InvoiceID INT\
  \ NULL,\n        StockID INT NULL,\n        SalePrice NUMERIC(18, 2) NULL,\n   \
  \     HashData VARCHAR(50) NULL\n    );\n    GO\n    ```\n4.  创建一个新的 SSIS 包，并添加两个\
  \ OLEDB 连接管理器，分别命名为 `CarSales_OLEDB` 和 `CarSales_Staging_OLEDB`，将其配置为分别连接到源服务器和目标服务器。然后添加一个\
  \ ADO.NET 连接管理器，命名为 `CarSales_ADONET`，将其配置为连接到源服务器。最后一个连接管理器将用于传回包含所需 ID 的表值参数 (TVP)，然后调用存储过程以返回增量数据。\n\
  5.  添加一个新的包作用域变量，命名为 `InsertDeltas`，其类型必须是 `object`。\n6.  添加一个新的数据流任务，命名为 `Get Source\
  \ delta information`。双击进行编辑。\n7.  添加一个 OLEDB 源适配器，命名为 `Source delta`。将其配置为使用 `CarSales_OLEDB`\
  \ 连接管理器。使用 SQL 命令从源表 (`Invoice_Lines`) 中选择 ID 和增量检测行，代码如下：\n    ```sql\n    SELECT\
  \ ID, Hashdata\n    FROM dbo.Invoice_Lines\n    ```\n8.  添加一个查找转换，如配方 11-1 的步骤 6\
  \ 至 11 所述。但在这里，你使用 `Hashdata` 列，而不是“可用查找列”中的 `VersionStamp` 列。将查找转换中的目标列命名为 `HashData_Destination`。\n\
  9.  向数据流窗格添加一个记录集目标。将查找转换连接到它，并确保选择“无匹配输出”。双击进行编辑。选择 `InsertDeltas` 作为变量名（用于保存输出）。对话框应如\
  \ 图 11-14 所示。\n    ![9781430247913_Fig11-14.jpg](img/9781430247913_Fig11-14.jpg)\n\
  \    图 11-14. 记录集目标配置。\n10. 单击“输入列”并选择 `ID` 列。这将仅传递新的（不匹配的）ID 到记录集变量中。单击“确定”返回到控制流选项卡。\n\
  11. 添加一个新的数据流任务，并将其连接到前面的“获取源增量信息”数据流任务。将其命名为 `Inserts`。双击进行编辑。\n12. 向数据流窗格添加一个脚本组件，命名为\
  \ `Source Data`。选择 `Source` 作为脚本组件类型。双击进行编辑。将只读变量设置为 `InsertDeltas`，脚本语言设置为 `Microsoft\
  \ Visual Basic 2010`。\n13. 单击“输入和输出”。展开 `Output 0` 并将其重命名为 `MainOutput`。然后添加五列，如下所示：\n\
  \    | 列名 | 数据类型 |\n    | :--- | :--- |\n    | ID | 4 字节有符号整数 |\n    | InvoiceID\
  \ | 4 字节有符号整数 |\n    | StockID | 4 字节有符号整数 |\n    | SalePrice | Decimal， 小数位数 2\
  \ |\n    | HashData | String， 长度 50 |\n14. 单击左侧的“连接管理器”。单击“添加”。将新连接管理器命名为 `DataBaseConnection`。选择\
  \ ADO.NET 连接管理器 `CarSales_ADONET`。\n15. 单击左侧的“脚本”，然后单击“编辑脚本”。\n16. 在 Imports 区域添加以下内容：\n\
  \    ```vbnet\n    Imports System.Data.SqlClient\n    ```\n17. 将 `ScriptMain` 类替换为以下代码\
  \ (`C:\\SQL2012DIRecipes\\CH11\\TVPDeltas.vb`)：\n    ```vbnet\n    Public Class\
  \ ScriptMain\n        Inherits UserComponent\n\n        Dim connMgr As IDTSConnectionManager100\n\
  \        Dim sqlConn As SqlConnection\n\n        Public Overrides Sub AcquireConnections(ByVal\
  \ Transaction As Object)\n            connMgr = Me.Connections.DataBaseConnection\n\
  \            sqlConn = CType(connMgr.AcquireConnection(Nothing), SqlConnection)\n\
  \        End Sub\n\n        Public Overrides Sub PostExecute()\n            MyBase.PostExecute()\n\
  \        End Sub\n\n        Public Overrides Sub CreateNewOutputRows()\n       \
  \     Dim DA As New OleDb.OleDbDataAdapter\n            Dim TBL As New DataTable\n\
  \            Dim Row As DataRow = Nothing\n\n            DA.Fill(TBL, Me.Variables.InsertDeltas)\n\
  \n            Dim cmd As New SqlClient.SqlCommand(\"dbo.pr_SelectDeltaData\", sqlConn)\n\
  \            cmd.CommandType = CommandType.StoredProcedure\n            Dim DeltaPrm\
  \ As SqlClient.SqlParameter = cmd.Parameters.Add(\"@DeltaSet\", SqlDbType.Structured)\n\
  \            DeltaPrm.Value = TBL\n            Dim RDR As SqlClient.SqlDataReader\
  \ = cmd.ExecuteReader()\n            If RDR.HasRows = True Then\n              \
  \  Do While RDR.Read()\n                    With MainOutputBuffer\n            \
  \            .AddRow()\n                        ' 映射数据\n                       \
  \ .ID = RDR.GetSqlInt32(0)\n                        .InvoiceID = RDR.GetSqlInt32(1)\n\
  \                        .StockID = RDR.GetSqlInt32(2)\n                       \
  \ .SalePrice = RDR.GetDecimal(3)\n                        If Not RDR.GetSqlString(4).IsNull\
  \ Then\n                            .HashData = RDR.GetSqlString(4)\n          \
  \              End If\n                    End With\n                Loop\n    \
  \        End If\n        End Sub\n    End Class\n    ```\n18. 单击“确定”进行确认。\n19. 向数据流窗格添加一个\
  \ OLEDB 目标组件。命名为 `Inserts`。将脚本源组件连接到它。按照之前配方中的描述，将其配置为连接到目标表。单击“列”并确保所有需要的列都被选中。单击“确定”确认你的更改。这会进行第二次对源服务器的访问，并将任何尚未存在于目标中的新记录添加进去。最终的包将如\
  \ 图 11-15 所示。\n    ![9781430247913_Fig11-15.jpg](img/9781430247913_Fig11-15.jpg)\n\
  \    图 11-15. 用于查询增量数据的完整包。\n\n### 工作原理\n\n有时候，无法在源数据库上使用会话范围的临时表。\n\n\n在大多数情况下，这是因为负责源数据库的数据库管理员（DBA）不会授予\
  \ SSIS 所使用账户所需的权限，和/或因为这给源服务器带来的额外负载被认为是不可接受的。还有一个被证明有用的解决方案，即隔离新建或更改记录的 ID，并将其作为\
  \ `SELECT` 查询的一部分返回给源数据库。尽管如此，你必须说服源系统的 DBA 在源系统中添加一个用户定义表类型和一个或多个存储过程。\n\n然而，需要谨慎提醒。此方法设计用于处理**极小**的增量。它绝对无法扩展到大型数据集，并可能在目标服务器上造成极端的**内存压力**。此外，此技术仅在\
  \ SQL Server 2008 及以上版本中有效，因为用户定义表类型自该版本起才可用。\n\n由于本配方展示的两种技术是前两个配方中所述方法的扩展，因此我并未解释整个过程，而只解释了允许你选择插入增量数据的那部分。其余过程与之前描述的几乎相同，故此处不再重复。在这些示例中，我使用哈希来隔离增量；当然，你也可以选择使用\
  \ `ROWVERSION` 或日期字段。\n\n本配方执行以下操作：\n*   检测增量数据。然而，与之前的配方不同，需要 `INSERT` 或 `UPDATE`\
  \ 的 ID 将使用记录集目标组件存储在 SSIS 对象变量中。\n*   通过将 SSIS 记录集作为表值参数传递给源数据库中的存储过程，将其返回至源服务器。\n\
  \n从更技术的角度来看，过程如下：首先，使用 SSIS 对象变量来填充 ADO.NET 数据表。然后，将此 ADO.NET 数据表作为表值参数传递回存储过程，该过程使用\
  \ TVP 提取数据子集。最后，将数据子集传递到脚本源输出缓冲区。这种方法的精妙之处在于，ADO.NET 数据表可以直接作为表值参数传递给 SQL Server\
  \ 存储过程，无需额外处理、循环或其他工作。\n\n#### 提示、技巧与陷阱\n*   记住为所有可为空的列添加空值处理。\n*   必须在 Imports\
  \ 区域引用 `System.Data.SqlClient`，因为将用它来调用源数据库上的存储过程。\n\n### 11-7. 在源数据库访问权限受限的情况下检测数据更改\n\
  \n#### 问题\n当源数据库除了读取源表的权限外，未授予其他任何权限时，你需要检测增量数据。\n\n#### 解决方案\n在目标端检测增量标识符，然后将其作为数据提取\
  \ `SELECT` 子句的一部分传递回去。以下解释如何使用此方法。\n\n1.  创建一个新的 SSIS 包。添加两个 OLEDB 连接管理器，分别命名为 `CarSales_Staging_OLEDB`（连接到\
  \ CarSales_Staging 数据库）和 `CarSales_OLEDB`（连接到 CarSales 数据库）。为 `CarSales_Staging_OLEDB`\
  \ 连接管理器将 `RetainSameConnection` 属性设置为 `True`。\n2.  添加以下变量：\n    ![image](img/untable11-1.jpg)\n\
  3.  添加一个执行 SQL 任务。将其命名为 `在目标端创建临时表`。将连接设置为 `CarSales_Staging_OLEDB`。将 SQL 语句设置为以下内容（`C:\\\
