    Next, we need some optional parameters. The following shows the options we will
    use and their parameters:


    *   `--admin-password <password>`: The password for the MySQL administrative user.


    *   `--admin-username <name>`: The username for the MySQL administrative user.


    *   `--data-storage-size-in-gbs <int>`: Size of the data storage (database drive)
    in GBs.


    *   `--display-name <text>`: A user-friendly name for the DB System.


    *   `--is-highly-available <bool>`: Specifies if the DB System is highly available.


    There is one more option we should discuss – the option to have the operation
    wait for a specific state. We do this with the `--wait-for-state <state>` option
    and one of the states (`ACCEPTED`, `CANCELED`, `CANCELING`, `FAILED`, `IN_PROGRESS`,
    `SUCCEEDED`). You can specify this option multiple times to wait for multiple
    operations. This operation asynchronously executes the operation and uses a work
    request to track the progress. Multiple states can be specified, returning on
    the first state. If timeout is reached, a return code of 2 is returned. For any
    other error, a return code of 1 is returned.


