    **Note**


    If this command returns an error, be sure to visit the online installation instructions
    for the OCI CLI (`https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/cliinstall.htm`)
    and correct the installation. You will need the OCI CLI in order to use ObjectStore
    with export and import.


    Notice we have one bucket in the list. The JSON output format is used by default
    for the OCI CLI commands to return data.


    Let’s continue with our example export from MDS. Recall, the above steps (creating
    SSH keys, uploading the private key, creating the configuration file, and installing
    the OCI CLI) can be done once for each PC you plan to use with exporting data
    with ObjectStore (or using the OCI CLI).


    ### Create the ObjectStore Bucket


    Next, we need to create an ObjectStore bucket to store our data in from the export.
    In this example, we will create a bucket in the `oci-tutorial-compartment` named
    `mysql-data-bucket`. Begin by logging into OCI and choosing Storage | Buckets
    from the menu. You will see the ObjectStore bucket page as shown in Figure [7-5](#527055_1_En_7_Chapter.xhtml#Fig5).
    Be sure to select the correct compartment from the list as shown.


    ![](images/527055_1_En_7_Chapter/527055_1_En_7_Fig5_HTML.png)


    A window with object storage and archive storage tab, in which buckets are selected
    on the left. Create bucket button is on the right. The table displays only one
    data stored in the bucket.


    **Figure 7-5**


    ObjectStore Bucket List


    To create a new bucket, click the `Create Bucket` button and replace the bucket
    name with `mysql-data-bucket` on the create bucket dialog as shown in Figure [7-6](#527055_1_En_7_Chapter.xhtml#Fig6).
    We can use the defaults for the other options listed. More specifically, we will
    use the standard bucket tier and the standard Oracle-managed encryption keys.
    Yes, buckets are encrypted by default. Nice.


    ![](images/527055_1_En_7_Chapter/527055_1_En_7_Fig6_HTML.png)


    A dialog box with the bucket name is highlighted. Default storage is selected
    as the default and select encrypt using oracle managed keys.


    **Figure 7-6**


    Create Bucket Dialog


    When ready, click the `Create` button to create the bucket. You should now see
    the bucket in the list for the compartment. We are now ready to export our data
    from our local MySQL server using this new bucket.


    ### Export to an ObjectStore Bucket


    Now we are ready to export our data from our local MySQL server. If you have not
    created a DB System to test with, do so now. Create a standard DB System that
    meets the storage requirements for your data. If you want to follow along with
    this tutorial, we will use a DB System with the name `oci-tutorial-mysql`, which
    we used earlier in the book.


    We will also be using an intermediate compute instance (named `connection-instance`)
    to connect to our DB System rather than creating a Bastion or VPN gateway. Recall,
    you will need to install the MySQL Shell on that compute instance to connect to
    your DB System. See Chapter [4](#527055_1_En_4_Chapter.xhtml) for more details
    on creating and configuring the compute instance.


    Return to your local MySQL server and open the MySQL Shell and connect to it.
    You can use the JavaScript option using the command shown below:


    ```

    C:\Users\cbell>mysqlsh -uroot -p –js

    ```


    Next, we will execute the `util.dumpInstance()` method providing a prefix for
    the bucket data (use `mds-test`) along with the ObjectStore information in a JSON
    string that includes the bucket name (`osBucketName`), threads, the MDS data compatibility
    switch (`ocimds`) set to `true`, and the `compatibility` options discussed earlier
    where we will strip restricted grants, definer clauses, missing primary keys,
    and invalid accounts. The following shows the format of the method call:


    ```

    util.dumpInstance("bucketPrefix", {osBucketName: "mds-bucket", threads: n, ocimds:
    true, compatibility: ["strip_restricted_grants", "strip_definers", "ignore_missing_pks",
    "skip_invalid_accounts"]})

    ```


    Ok, let’s run the method and see what happens. Listing [7-5](#527055_1_En_7_Chapter.xhtml#PC17)
    shows the output of running the method to dump the databases on our local MySQL
    server to the ObjectStore bucket we created earlier (`mysql-data-bucket`).'
