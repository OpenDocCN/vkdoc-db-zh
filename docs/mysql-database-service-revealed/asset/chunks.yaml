    请注意，在导出过程中有一些内容发生了变化，例如定义者子句和其他已修复的兼容性问题。尽管如此，如果你导航到对象存储桶（`mysql-data-bucket`），你会在存储桶中看到数据。


    要导航到 `mysql-data-bucket` 存储桶的内容，请点击 OCI 控制台菜单并选择 `Storage` | `Buckets`，然后点击 `mysql-data-bucket`
    链接以打开存储桶详细信息页面。接着，在 `Resources` 菜单中，选择 `Objects`，然后点击 `>` 展开 `mds-test` 前缀。你应该会看到一个类似图
    7-7 所示的文件列表。


    ![](img/527055_1_En_7_Fig7_HTML.png)


    图 7-7

    `mysql-data-bucket` 中的对象


    好的，现在我们的数据已经（可以说）在存储桶里了，接下来我们需要将其导入到我们的数据库系统中。但首先，我们必须像在个人电脑上那样，配置我们的中间计算实例以使用
    OCI CLI。不过，我们无需创建新的 API 密钥，只需上传现有的密钥即可。我们也可以使用相同的配置文件，只需做一个微小的更改。很好。


    ### 配置计算实例


    首先，在一个终端（PowerShell）会话中，使用如下 `ssh` 命令登录到计算实例。你可以打开第二个终端会话来进行文件复制操作。务必使用计算实例详细信息页面上显示的
    `公网 IP 地址`：


    ```

    ssh -i c:\users\cbell\.ssh\ssh-key-2022-08-16.key opc@150.136.69.126

    ```


    在计算实例上，使用以下命令创建 `.oci` 文件夹：


    ```

    mkdir .oci

    ```


    在你的个人电脑上（在另一个终端中），导航到你的 `.oci` 文件夹，并将文件复制到计算实例。你需要复制 `config` 文件以及 API 密钥，如下所示。请注意，我们使用的是创建计算实例时生成的
    SSH 密钥。如果你的 `.ssh` 文件夹中没有正确的密钥，这些命令将无法工作：


    > 注意

    > 如果你丢失了 SSH 密钥文件，你将不得不终止并重新创建计算实例。


    ```

    scp -i c:\users\cbell\.ssh\ssh-key-2022-08-16.key config opc@150.136.69.126:~/.oci/

    scp -i c:\users\cbell\.ssh\ssh-key-2022-08-16.key oci_api_key_public.pem opc@150.136.69.126:~/.oci/

    scp -i c:\users\cbell\.ssh\ssh-key-2022-08-16.key oci_api_key.pem opc@150.136.69.126:~/.oci/

    ```


    接下来，回到计算实例，使用命令 `nano ~/.oci/config` 编辑 `config` 文件。将最后一行的 `key_file` 参数更改为如下内容并保存文件：


    ```

    key_file=/home/opc/.oci/oci_api_key.pem

    ```


    我们还需要做一件小事。我们必须为对象存储桶创建一个预认证请求。'
- fmt: '#### Create a Pre-Authenticated Request (PAR)


    A pre-authenticated request (PAR) is an exclusive access token that permits access
    (read, read/write, write) to a bucket for a limited time. Using the OCI console,
    navigate to the ObjectStore list and open the details page for the bucket named
    `mysql-data-bucket`. On the bucket details page, navigate to the Pre-authenticated
    Requests in the Resources menu as shown in Figure [7-8](#527055_1_En_7_Chapter.xhtml#Fig8).


    ![](images/527055_1_En_7_Chapter/527055_1_En_7_Fig8_HTML.png)


    The window with the resources tab, in which pre-authenticated request is selected
    on the left. The button to create a pre-authenticated request is on the top and
    a table with no item is found.


    Figure 7-8


    Pre-Authenticated Requests List


    To create a PAR, click on the `Create Pre-Authenticated Request` button. This
    will open a dialog similar to Figure [7-9](#527055_1_En_7_Chapter.xhtml#Fig9).
    You can name the PAR (e.g., `par-import-mysql-data`), but you must set the `Access
    Type` to `Permit object reads` and tick the box for `Enable Object Listing`.


    ![](images/527055_1_En_7_Chapter/527055_1_En_7_Fig9_HTML.png)


    A dialog box to create pre-authenticated requests with the name, target as bucket
    type, access type as permit object reeds, and enable object listing are highlighted.


    Figure 7-9


    Create PAR Dialog


    Notice you can also set the expiration. This is the date and time that the PAR
    expires. Any attempts to use the PAR after that date will result in an access
    denied error. When you are ready to create the PAR, click the `Create Pre-Authenticated
    Request` button.


    OCI will then display a special dialog that requires careful attention. This dialog
    will present you with the PAR itself. This dialog is your one and only chance
    to copy the PAR string. If you close the dialog, you will not be able to retrieve
    the PAR again. You will have to create a new PAR. Figure [7-10](#527055_1_En_7_Chapter.xhtml#Fig10)
    shows an example of the PAR dialog.


    ![](images/527055_1_En_7_Chapter/527055_1_En_7_Fig10_HTML.png)


    A dialog box of pre-authenticated request details with name, pre-authenticated
    request U R L. A message to copy the U R L is below.


    Figure 7-10


    PAR Dialog


    Be sure to copy the PAR and paste it into a file for safe keeping. Remember, while
    it is only valid for a limited time period, it should be protected like any other
    security access token.


    Caution


    You must copy the PAR from the dialog using the copy option shown. You will not
    be able to retrieve the PAR once you close the dialog.


    Ok, now we are ready to run the import on our DB System.


    #### Import from the ObjectStore Bucket into a DB System


    Now that we have our compute instance properly configured and we have a PAR to
    use in the import, we can login to our DB System using our compute instance as
    demonstrated with the commands below. Once again, be sure to use the correct access
    points (IP) addresses for your compute instance and your DB System. Check the
    values by navigating to the correct detail pages in the OCI console:


    ```

    PS C:\Users\cbell> ssh -i c:\users\cbell\.ssh\ssh-key-2022-08-16.key opc@150.136.69.126

    [opc@connection-instance ~]$ mysqlsh --sql mysql_admin@10.0.1.226:33060

    ```


    Next, we can list the databases on the DB System as shown in Listing [7-6](#527055_1_En_7_Chapter.xhtml#PC23).


    ```

    MySQL  10.0.1.226:33060+ ssl  SQL > SHOW DATABASES;

    +--------------------+

    | Database           |

    +--------------------+

    | information_schema |

    | mysql              |

    | performance_schema |

    | sys                |

    +--------------------+

    4 rows in set (0.0013 sec)

    Listing 7-6

    Test Database (Before Import)

    ```


    Now we can run the import. Recall, we can use the `util.loadDump()` method that
    requires a few parameters. We will pass the PAR as the first parameter and then
    the options list, which we need only a `progressFile`. You can name the file whatever
    you’d like. The following is an example of the command we will use:


    ```

    util.loadDump("PAR_STRING_HERE", {progressFile: "progressFile"})

    ```


    Tip


    If you want to run the command to test it, you can add the `dryRun: true` option.
    This is strongly recommended for large or production data.


    Ok, let’s see this work! Switch to the JavaScript interface in the MySQL Shell,
    copy the command above replacing the PAR with the one you copied in an earlier
    step. Listing [7-7](#527055_1_En_7_Chapter.xhtml#PC25) shows the command running
    as a dry run to check for errors. Notice the PAR is obscured for security.


    ```

    MySQL  10.0.1.226:33060+ ssl  JS > util.loadDump("https:...mysql-data-bucket/o/mds-test/",
    {dryRun:true, progressFile:"progressFile"})

    Loading DDL and Data from OCI prefix PAR=/p//n/idj5psxg6enz/b/mysql-data-bucket/o/mds-test/,
    prefix=''mds-test/'' using 4 threads.

    Opening dump...

    dryRun enabled, no changes will be made.

    Target is MySQL 8.0.28-u3-cloud (MySQL Database Service). Dump was produced from
    MySQL 8.0.29

    Fetching dump data from remote location...

    Listing files - done

    Scanning metadata - done

    Checking for pre-existing objects...

    Executing common preamble SQL

    Executing DDL - done

    Executing view DDL - done

    Starting data load

    Executing common postamble SQL

    0% (0 bytes / 3.23 MB), 0.00 B/s, 19 / 19 tables done

    Recreating indexes - done

    No data loaded.

    0 warnings were reported during the load.

    Listing 7-7

    Dry Run Example

    ```


    Ok, so there were no errors! Now, let’s run the import without the dry run parameter
    as shown in Listing [7-8](#527055_1_En_7_Chapter.xhtml#PC26).


    ```

    MySQL  10.0.1.226:33060+ ssl  JS > util.loadDump("https.../mysql-data-bucket/o/mds-test/",
    {progressFile:"progressFile"})

    Loading DDL and Data from OCI prefix PAR=/p//n/idj5psxg6enz/b/mysql-data-bucket/o/mds-test/,
    prefix=''mds-test/'' using 4 threads.

    Opening dump...

    Target is MySQL 8.0.28-u3-cloud (MySQL Database Service). Dump was produced from
    MySQL 8.0.29

    Fetching dump data from remote location...

    Listing files - done

    Scanning metadata - done

    Checking for pre-existing objects...

    Executing common preamble SQL

    Executing DDL - done

    Executing view DDL - done

    Starting data load

    100% (3.23 MB / 3.23 MB), 2.15 MB/s, 19 / 19 tables done

    Recreating indexes - done

    Executing common postamble SQL

    19 chunks (52.58K rows, 3.23 MB) for 19 tables in 2 schemas were loaded in 4 sec
    (avg throughput 2.15 MB/s)

    0 warnings were reported during the load.

    Listing 7-8

    Importing the Data

    ```


    Excellent! It worked. Now, let’s see if the import worked by checking the list
    of databases. Listing [7-9](#527055_1_En_7_Chapter.xhtml#PC27) shows the list
    of databases after import and a query to fetch some data.'
