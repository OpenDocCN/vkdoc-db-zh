    About the Author About the Technical Reviewer


    # 1. Getting Started with MySQL in the Cloud


    The cloud age has been upon us for some time. It is a glorious vision where we
    no longer need to design, build, and staff enormous rooms full of very expensive
    computing equipment that needs round-the-clock attention and maintenance by a
    highly trained trusted staff. The ultimate goal is lower cost and higher capability.
    This has led to a rapid growth in cloud solutions and cloud providers.^([¹](#fn1))


    While cloud services have been around, only recently have cloud services become
    full featured and sophisticated enough to support real-world use cases. One such
    use case is having your data storage needs hosted by a cloud service.


    In this case, we want to use MySQL for all of our database needs, but we don’t
    want to build and maintain our own hardware and software. Rather, we want to be
    able to concentrate on building our applications and meeting the needs of our
    customers without worrying about the database system.


    This is what the Oracle Cloud Infrastructure and the MySQL Database Service are
    designed to do – to free you to concentrate on your business by providing a fully
    managed MySQL Database Service.


    MySQL has long been considered the world’s most popular open source database and
    consistently ranked second in the world ranking of database systems with only
    its owner (Oracle) ranking above it. The justification for such accolades includes
    proven reliability, high performance, and ease of use. MySQL is known to power
    the world’s most used websites including Facebook, YouTube, and [booking.​com](http://booking.com).
    As you may surmise, MySQL enjoys a robust and vast ecosystem as well as the backing
    of Oracle, the world’s leading database company.


    In recent years, MySQL Bastion Service has permitted organizations to grow their
    infrastructure to meet their business goals while keeping costs low and productivity
    high. That trend continues as MySQL moves to the cloud. In fact, organizations
    can now innovate and integrate their solutions even faster now that the routine
    management of MySQL is provided for them in OCI.


    In this chapter, we will learn what the Oracle Cloud Infrastructure and MySQL
    Database Service are and how we can use them. While this book isn’t a tutorial
    on cloud computing or the Oracle Cloud Infrastructure, we need to understand the
    basic concepts of cloud computing and the Oracle Cloud Infrastructure so that
    we can take advantage of the MySQL Database Service.


    ## Overview


    In recent years, MySQL has been offered by various cloud providers promising better
    experiences with MySQL. While some have succeeded in offering MySQL in various
    forms for cloud customers, there hasn’t been an offering that encapsulated the
    best that MySQL has to offer in a fully managed package. That is, until now.


    Oracle has added MySQL to its long and impressive list of services in its Oracle
    Cloud Infrastructure (OCI). In this section, we will see a high-level overview
    of cloud computing, Oracle Cloud Infrastructure, and MySQL Database Service.'
