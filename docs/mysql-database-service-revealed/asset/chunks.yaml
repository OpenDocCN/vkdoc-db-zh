    # Introduction


    The new era of cloud computing is here. Gone are the days when “cloud” simply
    meant something was connected to the Internet. Now companies like Oracle are providing
    complete suites of resources and tools for organizations to build their computing
    infrastructure without having to purchase hundreds of pieces of hardware, numerous
    equipment racks, and a small army of computer engineers to install, configure,
    and manage the many components that make up the infrastructure for hosting applications
    for use by their customers.


    One such resource provided by Oracle is the `MySQL Database Service` – a fully
    managed `MySQL` service that you can use as your database backend. Yes, you no
    longer must install `MySQL` and configure it yourself! Now, you can create a `MySQL`
    database server in the `Oracle Cloud Infrastructure (OCI)` with a few clicks of
    a mouse. Best of all, you can configure the resource to meet your business needs
    such as tailoring the system to use a minimal computing, memory, and disk size,
    which will permit you to reduce your overhead costs. The `MySQL Database Service
    (MDS)` is a brand new chapter in the long legacy of the world’s leading open source
    database server.


    ## Intended Audience


    I authored this book to share my passion for `MySQL` and to continue the legacy
    of `MySQL` that I have been fortunate to have been a part. I especially wanted
    to show how anyone can use `MDS` in `OCI` even if you do not have a systems engineering
    background. `OCI` is really that easy to use. The intended audience therefore
    includes anyone interested in learning how to leverage `MySQL` in the cloud such
    as hobbyists and enthusiasts, and more importantly systems engineers and IT planners
    who want to learn how `MDS` can expand their infrastructure with significant lower
    costs than on-premise solutions.


    ## How This Book Is Structured


    The book was written to guide the reader from a general knowledge of `MySQL` and
    `OCI` to creating `MySQL` servers in `OCI` and connecting them to their applications.
    The following is a brief overview of each chapter included in this book:


    *   Chapter [1](#527055_1_En_1_Chapter.xhtml), “Getting Started with MySQL in
    the Cloud”: This chapter introduces the `Oracle Cloud Infrastructure` and `MySQL
    Database Service Oracle`. It also presents an overview of `Cloud Infrastructure`
    and the resources you will be working with so that you can take advantage of the
    `MySQL Database Service`.

    *   Chapter [2](#527055_1_En_2_Chapter.xhtml), “Oracle Cloud Infrastructure”:
    This chapter goes deeper into the `OCI` and includes a tour of some of its features.
    You will also see how to get started with a special free account that you can
    use to learn how to use `OCI`.

    *   Chapter [3](#527055_1_En_3_Chapter.xhtml), “A Brief Tutorial of MySQL”: This
    chapter is a tutorial on `MySQL`. You will learn the basics of how to use `MySQL`
    including an overview of its major features and how to use the basic, frequently
    used structured query language (`SQL`) commands to perform basic database operations.

    *   Chapter [4](#527055_1_En_4_Chapter.xhtml), “MySQL Database Service”: This
    chapter dives even deeper into learning `OCI` as you learn how to set up and use
    an `MDS` database system including a short tour of the `MDS` service and a `DB
    System` via the cloud console.

    *   Chapter [5](#527055_1_En_5_Chapter.xhtml), “Backup and Restore”: This chapter
    discusses the recovery features of `MDS` including how to back up your database
    (data) and restore it should you need to do so. The chapter also discusses the
    importance of including backup and restore into your recovery plan.

    *   Chapter [6](#527055_1_En_6_Chapter.xhtml), “Point-in-Time Recovery”: This
    chapter discusses an advanced recovery feature in `MDS` called point-in-time recovery
    which allows you to recover your data to within a five-minute window. This feature
    makes using `MDS` safer for those who have data that can change frequently and
    those who want to ensure the most recent recovery can take place should the data
    become compromised either through human error or system failures.

    *   Chapter [7](#527055_1_En_7_Chapter.xhtml), “Data Import and Export”: This
    chapter presents several ways you can migrate data to/from `MDS` beginning with
    the concepts, strategies, and tools for data import and export.

    *   Chapter [8](#527055_1_En_8_Chapter.xhtml), “High Availability”: This chapter
    presents an advanced feature of `MDS` – the ability to create a system that is
    fault tolerant and thus highly available. You will discover what high availability
    is and how it can be achieved in `MDS`. The chapter begins with a brief tutorial
    on high availability.

    *   Chapter [9](#527055_1_En_9_Chapter.xhtml), “OCI Command-Line and Application
    Programming Interfaces”: This chapter introduces an alternative mechanism for
    accessing and interacting with `OCI` and `MDS` through the command-line and application
    programming interfaces available for `OCI`. The chapter presents an overview of
    the capabilities of the command-line interface (`CLI`) and application programming
    interface (`API`) for working with `OCI` and `MDS` including demonstrations of
    each.

    *   Chapter [10](#527055_1_En_10_Chapter.xhtml), “Migrating to MDS”: This chapter
    is for those who are planning to move their infrastructure to `OCI`. The chapter
    presents strategies for planning and migrating your existing `MySQL` installations
    to `MDS` as well as some of the deeper topics such as getting more details about
    `MDS` features or troubleshooting tips should something go wrong. This chapter
    will prepare you to begin planning and designing your `MySQL` infrastructure using
    `MDS`.


    ## How to Use This Book


    This book is designed to guide you through learning more about `OCI` and `MDS`,
    discovering the power of both, and learning how to build your own `OCI` `MDS`
    solutions.


    If you have experience with `OCI`, you can skip those portions that present tutorials
    on the minimal `OCI` technologies needed for use with `MDS`. Similarly, if you
    have experience with `MySQL`, you can skip the introductory chapter on `MySQL`
    and focus on how to get started using `MDS`. Either way, there is something for
    everyone interested in leveraging `MySQL` in the `OCI` cloud.'
