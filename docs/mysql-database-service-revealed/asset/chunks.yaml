  trans: '## 数据安全


    MDS 使用加密技术来保护您的数据。在底层，MDS 使用一种称为块卷的存储机制，该机制始终处于加密状态。MDS 还支持使用传输层安全协议 (TLS) 在 MDS
    与客户端之间进行加密通信。默认情况下，MDS 应用程序会尝试使用加密方式建立连接。


    ## MDS 与审计服务


    MDS 与 OCI 审计服务集成，使您能够对数据库服务器执行访问审计等审计目标。


    ## MDS 版本与存储引擎


    MDS 基于 `MySQL Enterprise Edition` 8.0 版本构建，并且**专一地**使用 `InnoDB 存储引擎`。`MySQL Enterprise
    Edition` 提供了众多企业级功能，包括审计、可通过可插拔认证模块（“PAM”）或原生 Windows 服务轻松将 MySQL 集成到安全基础设施中的外部认证模块、透明数据加密
    (TDE)、增强的加密与其他密码学特性，以及防御网络安全威胁的防火墙功能。


    ## 计算形状


    MDS 被配置为从一组计算资源配置选项中进行选择，这些配置描述了计算、内存和存储的规模。这些选项被称为计算形状。在置备（创建）MDS 时，您需要从一系列形状中选择最符合您需求的那一个。


    **提示**


    有关 MDS 的更多信息，请访问在线文档 [`https://docs.oracle.com/en-us/iaas/mysql-database/doc/overview-mysql-database-service.xhtml`](https://docs.oracle.com/en-us/iaas/mysql-database/doc/overview-mysql-database-service.xhtml)。


    ## DB 系统


    一个 MDS DB 系统（有时称为 `dbSystem`）是 MySQL 服务器实例的逻辑单元或容器。其主要目的是为 MDS 便捷地提供置备、备份、恢复、监控、终止等功能。DB
    系统容器由以下组件构成。除了与用户界面（例如 OCI 控制台）有交集外，此列表应视为参考信息，因为您无法直接与某些组件交互：


    *   `计算`：也称为计算实例，它是一个 OCI 计算资源，在创建时使用所选的计算形状进行配置。

    *   `操作系统`：操作系统虽然被视为独立于作为虚拟机的计算实例，但已预定义为 Oracle Enterprise Linux。

    *   `MySQL 企业版服务器`：MDS 配置了 MySQL 产品线中 8.0 版本的最新发布版。

    *   `虚拟网络接口卡 (VNIC)`：将 DB 系统连接到虚拟云网络 (VCN) 的子网。

    *   `网络附加块存储`：MDS 为所有块存储使用高性能选项。根据所选计算形状中存储的大小，存储可能由一个组内的多个块卷组成，以便实现高性能访问。


    虽然这个列表看起来需要配置和设置的内容很多，但 DB 系统容器已针对组件的快速部署（创建和置备）进行了优化。实际上，操作系统和 MySQL 作为特殊镜像进行了预配置，在配置
    MDS 时会加载该镜像。


    **提示**


    有关 DB 系统的完整描述，包括 MySQL 配置的所有详细信息，请参见 [`https://docs.oracle.com/en-us/iaas/mysql-database/doc/db-systems.xhtml`](https://docs.oracle.com/en-us/iaas/mysql-database/doc/db-systems.xhtml)。


    ## MySQL HeatWave


    MDS 最重大且最令人兴奋的功能之一，实际上是一个独立的产品。`MySQL HeatWave` 构建于 MDS 之上。`HeatWave` 提供了一个高性能的内存分析处理引擎，并已针对在
    OCI 上运行进行了优化。


    您可以使用存储在 MDS 中的数据来运行 `HeatWave`，无需进行昂贵的数据迁移、中间系统或任何应用程序更改。您的应用程序可以使用常规的 MySQL
    通信协议（可以理解为相同的应用程序）连接到 `HeatWave` 并与之交互。与 MDS 本身一样，所有典型的管理和维护操作都是自动化的。您也可以使用相同的
    OCI Web 控制台、REST API、CLI 或 DevOps 工具来管理您的 `HeatWave` 实例。


    虽然这一切听起来很棒，但 `HeatWave` 最重要的方面在于，您的查询可以在 MySQL 数据库的基础上实现数量级的加速，使您能够利用与应用程序相同的数据库存储，构建复杂且快速的联机事务处理和联机分析处理操作。我们将在第
    8 章了解更多关于 `HeatWave` 的内容。


    为了帮助我们理解如何在您的基础架构中利用 MDS，让我们来看看 MDS 的用例。


    ### 用例


    MDS 有许多用例。事实上，您已知的大多数 MySQL 用例都适用于 MDS。然而，在 OCI 中，有一些用例是 MDS 独有的。以下列出了几个更重要的用例：


    *   `迁移工作负载`：您可以将最繁重甚至全部的 MySQL 工作负载迁移到 OCI，从而释放资源并专注于业务更重要的目标。

    *   `开发云应用程序`：您可以更快地改进和发展您的应用程序，将其转变为基于 MySQL 的云原生应用程序，并消除许多从零开始开发基础设施的负担。

    *   `部署灵活性`：由于 MDS 与本地 MySQL 完全兼容，您在将部分或全部 MySQL 服务器部署到 OCI 时具有灵活性。

    *   `SaaS 应用程序`：由于 MySQL 是许多 SaaS 产品的首选数据库，您可以将您的 SaaS 应用程序构建并扩展到 OCI 上。


    然而，在 OCI 中使用 MDS 存在一些限制。


    ### 限制


    虽然我们期望能在 MDS 中使用所有 MySQL 功能，但有些功能不受支持，原因可能是它们不适用于云环境、尚未适配用于 OCI，或者需要 OCI 中的额外功能支持。以下是当前在
    MDS 中不受支持的功能：


    *   认证插件

    *   修改系统表

    *   二进制日志访问

    *   错误日志记录到系统日志

    *   组复制插件

    *   InnoDB 表空间加密

    *   密码强度插件

    *   设置全局变量

    *   持久化系统变量

    *   复制过滤器

    *   半同步复制

    *   可传输表空间


    如果您当前计划使用这些 MySQL 功能中的一项或多项，请在尝试使用之前查阅在线的 DB 系统文档以获取更多详细信息。您可能还需要查看 [`https://docs.oracle.com/en-us/iaas/mysql-database/doc/db-systems.xhtml#GUID-DAF5136C-C602-434E-8EBB-E1AFA57F0BB7`](https://docs.oracle.com/en-us/iaas/mysql-database/doc/db-systems.xhtml%2523GUID-DAF5136C-C602-434E-8EBB-E1AFA57F0BB7)
    以获取 MDS 中限制的完整列表，包括对现有功能的限制。'
- fmt: '# 2. Oracle Cloud Infrastructure


    ## Cloud Services Cost Expectations


    One of the most attractive aspects of using cloud services for infrastructure
    components such as IaaS components is cost. Not only will you save the cost of
    having to host a physical information technology laboratory complete with cooling
    and security measures, you also do not have to invest in additional human resources
    to operate and maintain the hardware and server.


    However, you must take care when planning your database systems. Oracle has many
    different configurations you can use such as selecting the shape (size of the
    compute object), which defines the CPU processing power as well as memory and
    disk size. Naturally, the larger (more powerful) shapes will cost more than the
    smaller shapes.


    Fees for using cloud services vary among vendors, but all base the cost on hourly
    rates for consumable processing (such as virtual compute platforms) and in some
    cases cost per unit (such as disk or other storage devices). In addition, you
    may incur costs for data transfer rates when you interact with the database system
    (for uploading data, exporting, networking, etc.). The combination of those costs
    over time will determine your savings.


    Let’s explore a simple hypothetical example. We will keep it simple and calculate
    only the cost of the database service. Let us use a fictitious cloud service that
    charges $0.05/hour for the compute service and $0.025 per GB per day for storage.
    That seems really cheap, yes? Let’s do some math. For a single day, we will incur
    a compute cost of $36.00 (30 days times 24 hours times $0.05) and if we use 10
    Gb of disk storage per day, we add $0.25 (10 Gb times $0.025) giving us a total
    of $36.25 per month. Clearly, that is a lot cheaper than the physical and human
    resources you would need to maintain your own MySQL server!


    While this example is pure fiction and wildly inaccurate,^([²](#fn2)) it should
    give you the perspective of how cloud services are billed and how your bill can
    add up over a month. But it need not be a complete surprise because you can create
    an OCI account and experiment with the resources available. In fact, if you follow
    the tutorial in the next chapter to create your own account with OCI, you can
    see how these fees are generated and billed against the sign-up credit Oracle
    grants to new accounts. That is, you will be given a credit in dollars that you
    can use to explore OCI resources. Once that credit has been used up, you will
    be billed for the services you use each month.


    Regardless, be sure to do your homework and work with an account representative
    at Oracle to set your expectations for your monthly billing liabilities.


    Tip


    For more accurate pricing for MDS, contact your Oracle sales representative to
    discuss your needs and set expectations for cost.


    ## Summary


    Cloud Services are a part of everyday life for most system architects, infrastructure
    planners, and information technology experts alike. Leveraging the cloud to meet
    critical business needs for capacity, growth, and innovation is the key to the
    future for most businesses.


    In this chapter, we discovered the benefits of using cloud services, a brief introduction
    to the Oracle Cloud Infrastructure, and how using OCI can make your business more
    agile with fewer resources and less dependence on often complex procurement, installation,
    configuration, and maintenance of critical infrastructure components.


    We also took a brief look at the MySQL Database Service including a survey of
    its benefits over on-prem MySQL installations as well as the features you can
    employ to migrate your MySQL applications to OCI.


    In addition to the benefits of the MySQL Database Service, we also got a glimpse
    at the OCI terminology and the major MySQL resources available including the MySQL
    DB System and HeatWave. We will continue to explore these features and more throughout
    the book.


    In the next chapter, we will take a closer look at the Oracle Cloud Infrastructure
    including a brief tour of the services available, how to get your account set
    up, and most importantly how to deploy your first MySQL DB System.


    Footnotes [1](#527055_1_En_1_Chapter.xhtml#Fn1_source)   [2](#527055_1_En_1_Chapter.xhtml#Fn2_source)


    ## A Brief Tour of Services


    OCI is a robust IaaS public cloud service platform that offers computational,
    storage, and advanced networking capabilities. Among its many features are also
    some platform as a service (PaaS) tools for businesses such as fully managed Oracle
    Autonomous Database as well as container services and other PaaS tools.


    A detailed tour or tutorial on OCI services will consume many pages and even a
    library of books to describe every nuance of every service. Rather than attempt
    to squash a tutorial into a few pages, we will focus only on those OCI services
    that make up your normal activity when working with MDS.


    Tip


    See the online OCI User Guide ([`https://docs.oracle.com/en-us/iaas/pdf/ug/OCI_User_Guide.pdf`](https://docs.oracle.com/en-us/iaas/pdf/ug/OCI_User_Guide.pdf))
    for more in-depth coverage of OCI and its services including tutorials on some
    of the major core features.


    However, before we jump into our tour of the core services, let’s review some
    terminology.


    ### Terminology


    There are a number of terms and concepts you will encounter when getting started
    with OCI. Some are rather easy to figure out while others can sometimes lead to
    confusion or misunderstanding for beginners. The following is a short list of
    key terms you will encounter when learning OCI. As you will see once you become
    proficient with OCI, this is list not complete, but it is a good place to start.
    The terms are presented roughly in order that you may encounter them when starting
    with OCI for the first time. Some terms and concepts use common abbreviations,
    which are also listed.


    Tip


    For more information about concepts and terminologies, see the *Key Concepts and
    Terminology* section at [`https://docs.oracle.com/en-us/iaas/Content/GSG/Concepts/concepts.htm`](https://docs.oracle.com/en-us/iaas/Content/GSG/Concepts/concepts.htm).'
  raw: '## Cloud Services Cost Expectations


    One of the most attractive aspects of using cloud services for infrastructure
    components such as IaaS components is cost. Not only will you save the cost of
    having to host a physical information technology laboratory complete with cooling
    and security measures, you also do not have to invest in additional human resources
    to operate and maintain the hardware and server.


    However, you must take care when planning your database systems. Oracle has many
    different configurations you can use such as selecting the shape (size of the
    compute object), which defines the CPU processing power as well as memory and
    disk size. Naturally, the larger (more powerful) shapes will cost more than the
    smaller shapes.


    Fees for using cloud services vary among vendors, but all base the cost on hourly
    rates for consumable processing (such as virtual compute platforms) and in some
    cases cost per unit (such as disk or other storage devices). In addition, you
    may incur costs for data transfer rates when you interact with the database system
    (for uploading data, exporting, networking, etc.). The combination of those costs
    over time will determine your savings.


    Let’s explore a simple hypothetical example. We will keep it simple and calculate
    only the cost of the database service. Let us use a fictitious cloud service that
    charges $0.05/hour for the compute service and $0.025 per GB per day for storage.
    That seems really cheap, yes? Let’s do some math. For a single day, we will incur
    a compute cost of $36.00 (30 days times 24 hours times $0.05) and if we use 10
    Gb of disk storage per day, we add $0.25 (10 Gb times $0.025) giving us a total
    of $36.25 per month. Clearly, that is a lot cheaper than the physical and human
    resources you would need to maintain your own MySQL server!


    While this example is pure fiction and wildly inaccurate,^([²](#fn2)) it should
    give you the perspective of how cloud services are billed and how your bill can
    add up over a month. But it need not be a complete surprise because you can create
    an OCI account and experiment with the resources available. In fact, if you follow
    the tutorial in the next chapter to create your own account with OCI, you can
    see how these fees are generated and billed against the sign-up credit Oracle
    grants to new accounts. That is, you will be given a credit in dollars that you
    can use to explore OCI resources. Once that credit has been used up, you will
    be billed for the services you use each month.


    Regardless, be sure to do your homework and work with an account representative
    at Oracle to set your expectations for your monthly billing liabilities.


    Tip


    For more accurate pricing for MDS, contact your Oracle sales representative to
    discuss your needs and set expectations for cost.


    ## Summary


    Cloud Services are a part of everyday life for most system architects, infrastructure
    planners, and information technology experts alike. Leveraging the cloud to meet
    critical business needs for capacity, growth, and innovation is the key to the
    future for most businesses.


    In this chapter, we discovered the benefits of using cloud services, a brief introduction
    to the Oracle Cloud Infrastructure, and how using OCI can make your business more
    agile with fewer resources and less dependence on often complex procurement, installation,
    configuration, and maintenance of critical infrastructure components.


    We also took a brief look at the MySQL Database Service including a survey of
    its benefits over on-prem MySQL installations as well as the features you can
    employ to migrate your MySQL applications to OCI.


    In addition to the benefits of the MySQL Database Service, we also got a glimpse
    at the OCI terminology and the major MySQL resources available including the MySQL
    DB System and HeatWave. We will continue to explore these features and more throughout
    the book.


    In the next chapter, we will take a closer look at the Oracle Cloud Infrastructure
    including a brief tour of the services available, how to get your account set
    up, and most importantly how to deploy your first MySQL DB System.


    Footnotes [1](#527055_1_En_1_Chapter.xhtml#Fn1_source)   [2](#527055_1_En_1_Chapter.xhtml#Fn2_source)


    # 2. Oracle Cloud Infrastructure


    Thus far, we have learned a little about cloud computing and have learned that
    Oracle Cloud Infrastructure is a powerful service that offers a host of tools
    you can use to move your critical infrastructure components to the cloud. OCI
    contains infrastructure as a service (IaaS) resources for you to leverage to build
    and grow your business.


    Recall, the MySQL Database Service (MDS) is one of those IaaS resources and indeed
    the focus of this book. Since MDS is built entirely on OCI, we must learn more
    about OCI in order to understand not only the nomenclature of OCI but also the
    core components with which we will be working. For example, while a database system
    (DB System) is fully managed, knowing the OCI resources involved can help you
    understand how best to configure a DB System for your uses.


    In this chapter, we will learn what the Oracle Cloud Infrastructure is and take
    a tour of some of its features. We will also see how to get started with a special
    free account that you can use to learn how to use OCI.


    ## A Brief Tour of Services


    OCI is a robust IaaS public cloud service platform that offers computational,
    storage, and advanced networking capabilities. Among its many features are also
    some platform as a service (PaaS) tools for businesses such as fully managed Oracle
    Autonomous Database as well as container services and other PaaS tools.


    A detailed tour or tutorial on OCI services will consume many pages and even a
    library of books to describe every nuance of every service. Rather than attempt
    to squash a tutorial into a few pages, we will focus only on those OCI services
    that make up your normal activity when working with MDS.


    Tip


    See the online OCI User Guide ([`https://docs.oracle.com/en-us/iaas/pdf/ug/OCI_User_Guide.pdf`](https://docs.oracle.com/en-us/iaas/pdf/ug/OCI_User_Guide.pdf))
    for more in-depth coverage of OCI and its services including tutorials on some
    of the major core features.


    However, before we jump into our tour of the core services, let’s review some
    terminology.


    ### Terminology


    There are a number of terms and concepts you will encounter when getting started
    with OCI. Some are rather easy to figure out while others can sometimes lead to
    confusion or misunderstanding for beginners. The following is a short list of
    key terms you will encounter when learning OCI. As you will see once you become
    proficient with OCI, this is list not complete, but it is a good place to start.
    The terms are presented roughly in order that you may encounter them when starting
    with OCI for the first time. Some terms and concepts use common abbreviations,
    which are also listed.


    Tip


    For more information about concepts and terminologies, see the *Key Concepts and
    Terminology* section at [`https://docs.oracle.com/en-us/iaas/Content/GSG/Concepts/concepts.htm`](https://docs.oracle.com/en-us/iaas/Content/GSG/Concepts/concepts.htm).'
  trans: '# 2. Oracle Cloud Infrastructure


    ## 云服务成本预期


    使用云服务作为基础设施组件（如 IaaS 组件）最具吸引力的方面之一就是成本。你不仅可以节省建立物理信息技术实验室的成本（包括冷却和安全措施），而且无需额外投入人力资源来运营和维护硬件及服务器。


    但是，在规划数据库系统时必须谨慎。Oracle 提供了多种不同的配置供你选择，例如选择**形状（计算对象的大小）**，这定义了 CPU 处理能力以及内存和磁盘大小。自然，更大（更强大）的形状比较小的形状成本更高。


    使用云服务的费用因供应商而异，但所有供应商都基于可消耗处理（如虚拟计算平台）的小时费率计费，在某些情况下也按单位（如磁盘或其他存储设备）计费。此外，当你与数据库系统交互时（如上传数据、导出、网络传输等），可能会产生数据传输速率的费用。这些成本随时间累积，将决定你的节省总额。


    让我们探讨一个简单的假设示例。我们将保持简单，仅计算数据库服务的成本。假设我们使用一个虚构的云服务，其计算服务收费为 $0.05/小时，存储收费为 $0.025/GB/天。这看起来真的很便宜，对吧？让我们算一下。对于一天，我们将产生
    $36.00 的计算成本（30 天乘以 24 小时乘以 $0.05），如果我们每天使用 10 Gb 的磁盘存储，则需额外支付 $0.25（10 Gb 乘以
    $0.025），每月总计 $36.25。显然，这比维护你自己的 MySQL 服务器所需的物理和人力资源成本要便宜得多！


    虽然这个例子纯属虚构且极不准确，^(²) 但它应该让你了解云服务的计费方式以及你的账单在一个月内是如何累积的。但这不必完全出乎意料，因为你可以创建一个 OCI
    账户并尝试可用的资源。事实上，如果你按照下一章的教程创建你自己的 OCI 账户，你可以看到这些费用是如何生成的，以及 Oracle 授予新账户的注册信用额度是如何抵扣账单的。也就是说，你将获得一定的美元信用额度，用于探索
    OCI 资源。一旦该信用额度用完，你将按月为你使用的服务付费。


    无论如何，请务必做好功课，并与 Oracle 的客户代表合作，以设定你对月度账单负债的预期。


    **提示**


    要获得 MDS 更准确的定价，请联系你的 Oracle 销售代表，讨论你的需求并设定成本预期。


    ## 小结


    云服务对于大多数系统架构师、基础设施规划师和信息技术专家来说已成为日常生活的一部分。利用云来满足容量、增长和创新等关键业务需求，是大多数企业未来的关键。


    在本章中，我们发现了使用云服务的好处，对 Oracle Cloud Infrastructure 进行了简要介绍，并了解了使用 OCI 如何让你的业务以更少的资源、更少地依赖通常复杂的采购、安装、配置和关键基础设施组件维护而变得更加敏捷。


    我们还简要了解了 MySQL 数据库服务，包括其相对于本地 MySQL 安装的优势，以及你可以用来将 MySQL 应用程序迁移到 OCI 的功能。


    除了 MySQL 数据库服务的优势之外，我们还初步了解了 OCI 术语以及可用的主要 MySQL 资源，包括 MySQL DB 系统和 HeatWave。我们将在本书中继续探索这些功能及更多内容。


    在下一章中，我们将更仔细地研究 Oracle Cloud Infrastructure，包括对可用服务的简要介绍、如何设置你的账户，以及最重要的——如何部署你的第一个
    MySQL DB 系统。


    脚注 1   2


    ## 服务简介


    OCI 是一个强大的 IaaS 公有云服务平台，提供计算、存储和高级网络功能。其众多功能中还包括一些面向企业的平台即服务（PaaS）工具，例如全托管的 Oracle
    自治数据库，以及容器服务和其他 PaaS 工具。


    对 OCI 服务的详细导览或教程将占用许多篇幅，甚至需要一整个图书馆的书籍来描述每个服务的细微差别。与其试图在几页内塞入一个教程，我们将只关注那些与 MDS
    协同工作时构成你日常活动的 OCI 服务。


    **提示**


    有关 OCI 及其服务的更深入介绍，包括一些主要核心功能的教程，请参阅在线 OCI 用户指南 [`https://docs.oracle.com/en-us/iaas/pdf/ug/OCI_User_Guide.pdf`](https://docs.oracle.com/en-us/iaas/pdf/ug/OCI_User_Guide.pdf)。


    然而，在我们开始核心服务导览之前，让我们先回顾一些术语。


    ### 术语


    在开始使用 OCI 时，你会遇到许多术语和概念。有些很容易理解，而另一些有时可能会让初学者感到困惑或误解。以下是学习 OCI 时会遇到的关键术语的简短列表。正如你将在熟练掌握
    OCI 后看到的那样，这个列表并不完整，但它是一个很好的起点。这些术语大致按照你第一次开始使用 OCI 时可能遇到的顺序列出。一些术语和概念使用常见缩写，这些缩写也一并列出。


    **提示**


    有关概念和术语的更多信息，请参阅 [`https://docs.oracle.com/en-us/iaas/Content/GSG/Concepts/concepts.htm`](https://docs.oracle.com/en-us/iaas/Content/GSG/Concepts/concepts.htm)
    中的*关键概念和术语*部分。'
- fmt: '#### Virtualization


    Let’s begin with what virtualization means with respect to cloud services. This
    may be the hardest concept for beginners to master since some feel nothing is
    “real” in the cloud.


    Simply, virtualization simply means a service, feature, or even hardware has been
    represented as an independent entity. In most cases, this means the object or
    resource in question is indeed running as a process or in some form as software
    in a vast computing framework.


    For example, a compute resource (think server) can be running as a virtual machine
    on a `hypervisor stack`. In other cases, it could mean a conceptual, managed concept
    such as a virtual network that is presented to the user (you) as if it were a
    physical network.


    Further, some virtual resources are simply parts of other virtual resources and
    not intended to be used individually. For example, a `block storage device` is
    typically connected to a compute resource and accessed via the operating system
    (or platform service) running on top of the operating system.


    #### Tenancy


    A tenancy is how `OCI` groups all of the resources for a particular customer (user).
    When you sign up for `OCI`, you will be given a `tenancy` for your account. All
    of your resources, billing, etc., will be associated with your `tenancy`. Resources
    in your `tenancy` cannot interact with resources in other `tenancies` (without
    additional resources configured to grant access) and you can administer only those
    resources that reside in your `tenancy`.


    #### Compartments


    `Compartments` are another level of organization for your `tenancy`. You can create
    `compartments` to contain a collection of related resources. Access to resources
    in a `compartment` is defined by user groups to which you give specific permissions.
    Thus, a `compartment` is a virtual or logical group (not a physical grouping).
    Interestingly, when you work with the `OCI Cloud Console`, you can use the `compartment`
    to filter the resources for viewing.


    A `tenancy` can be thought as the “root” `compartment` for your cloud resources
    and, once you create a `compartment`, any resources created will require you to
    select the `compartment` where the resource will reside.


    **Tip**

    To keep things simple for beginners, it is recommended that you wait to create
    multiple `compartments` once you have become accustomed to using `OCI`. Adding
    the `compartments` and their security profiles can make the learning curve steeper
    and error prone.


    When you create a `compartment`, it is associated with your `tenancy`. You can
    create multiple `compartments` as your need arises. Each `compartment` is controlled
    via access policies specific to that `compartment` allowing you to restrict access
    to user groups ensuring they can access only those resources they need. Thus,
    when you work with multiple `compartments`, some thought must be taken to plan
    how you are going to grant (or restrict) access to the `compartmental` resources
    for your users.


    #### Security Zone


    Each `compartment` has a `security zone` or `security zone profile`. When a `compartment`
    is created and resources added, `OCI` will validate all operations against those
    resources using the `security zone` policies. If the operation is restricted (the
    validation fails), the operation is rejected. We will learn more about security
    in the next section when we see a walk-through of setting up a free trial `OCI`
    account.


    #### OCI Resource Allocation


    You may be wondering where all of these `OCI` resources are housed or even how
    they are organized. `OCI` resources are organized in both physical and logical
    groupings. `OCI` resources may be physically located or distributed in one or
    more local data centers called `regions`, which have one or more physical layouts
    (geographically isolated hardware, power, cooling, etc.) called `availability
    domains`, and then into physically adjacent (same server rack) groupings called
    `fault domains`. The following attempt to explain how resources are within `OCI`:


    *   **Region**: A localized geographical area comprised of one or more data centers.
    Within each `region`, the resources are allocated to one or more `availability
    domains`, which allow for additional organization. All resources are either `region`-specific,
    for example, virtual networking, or are `availability`-specific such as storage
    and compute resources.


    *   **Availability Domain (AD)**: A geographically isolated (from other `availability
    domains`), fault-tolerant physical grouping of resources. `Availability domain`
    isolation allows for reduced risk of failures by permitting you to distribute
    your resources among `availability domains`. Note that some resources must be
    created within the same `availability domain`. For example, if you create a compute
    resource and want to attach storage, the storage resources must be in the same
    `availability domain` as the compute resource.


    *   **Fault Domain (FD)**: A grouping of hardware within an `availability domain`.
    `Fault domains` permit you to distribute your instances so that the instances
    are not on the same hardware within an `availability domain`. This permits protection
    against a hardware failure affecting one `fault domain` (the chances of the same
    or similar event affecting multiple `fault domains` are remote), the outage does
    not affect resources in the other `fault domains`. Thus, if you want high availability
    among your resources, you will want to allocate your resources across the `availability
    domains` and within each `availability domain` across `fault domains`.


    *   **Realm**: A (logical) collection of `regions`. `Realms` are isolated from
    one another. Your `tenancy` would exist in a single `realm` and be able to access
    `regions` within that `realm`. `OCI` currently offers several commercial and government
    `realms`.


    Figure [2-1](#527055_1_En_2_Chapter.xhtml#Fig1) presents a visual guide to how
    `regions`, `availability domains`, and `fault domains` are arranged logically.
    As you can see, we can distribute resources across `regions`, within a `region`
    across `availability domains`, and within an `availability domain`, across `fault
    domains`. Each layer adds a significant level of isolation against hardware or
    outside influences that cause failures.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig1_HTML.png)


    A block illustrates regions 1 to region N. Each region has availability domains
    1 to 3\. Each availability domain has 3 fault domains connected in series.


    **Figure 2-1** Regions, Availability, and Fault Domains


    Notice we have a `region`, `region 1`, that contains three `availability domains`
    (typically abbreviated as `AD-n`), which each have three `fault domains` (typically
    abbreviated `FD-n`). Oracle currently supports `regions` throughout the world
    with more being added regularly. Figure [2-2](#527055_1_En_2_Chapter.xhtml#Fig2)
    shows the current status of `OCI` `regions` taken from [`https://oracle.com/cloud/architecture-and-regions`](https://oracle.com/cloud/architecture-and-regions).


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig2_HTML.png)


    A world map depicts the commercial, commercial planned, and government regions
    in Oracle''s current support.


    **Figure 2-2** OCI Regions (Courtesy of [oracle.​com](http://oracle.com))


    #### Virtual Cloud Network


    A `virtual cloud network (VCN)` is a virtualization of a traditional computer
    network. The virtualization extends to creating subnets, routing tables, gateways,
    etc. All of your resources will be running on a `virtual cloud network`. The `virtual
    cloud network` is associated with a single `region` but has connectivity to all
    of the `availability domains` and `fault domains`. Further, for each subnet you
    can span one or more of the `availability domains`. You must set up at least one
    `virtual cloud network` before you can launch (create) compute instances. Thus,
    creating a `virtual cloud network` is one of the first things you will create
    when you set up your account.'
