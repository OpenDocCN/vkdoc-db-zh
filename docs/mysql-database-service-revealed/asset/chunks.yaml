  trans: '### 故障排除


    Oracle 为所有 OCI 产品和服务提供了全面的故障排除技巧列表。随着产品和服务的不断发展以及帮助客户解决问题的更多创新方法被发现，该列表会频繁更新。就我们的目的而言，MDS
    有一个专门的故障排除页面，位于[`https://docs.oracle.com/en-us/iaas/mysql-database/doc/troubleshooting.xhtml`](https://docs.oracle.com/en-us/iaas/mysql-database/doc/troubleshooting.xhtml)。图
    10-9 展示了 MDS 故障排除页面。


    > **提示**

    >

    > 您可能需要将 MDS 故障排除页面加入书签，以备将来参考。


    ![一张截图展示了使用 MySQL 时遇到的故障排除问题。超链接列在右侧。“Troubleshooting MySQL server”选项被高亮显示。](img/527055_1_En_10_Fig9_HTML.png)

    *图 10-9: MDS 故障排除页面（文档）*


    您会找到指向通用故障排除技巧的链接。不过，请注意页面中央有一个指向 MySQL 服务器故障排除页面的链接，如果您遇到与 OCI 无关的 MySQL 问题，这可能会有所帮助。


    现在我们已经全面了解了 Oracle 提供的在线帮助和文档，接下来让我们讨论如何开始规划迁移到 MDS。


    ## 检查您的数据库系统需求


    在本节中，我们将讨论在规划 MDS 解决方案之前必须考虑的 OCI 特定概念和技术。虽然您无需关心 MySQL 服务器实例本身的配置（因为 MDS 会为您完成），但您必须像规划本地
    MySQL 服务器那样严谨地规划您的数据库。这项规划将为您提供配置数据库系统所需的重要信息。


    回顾一下，我们在第 4 章创建第一个数据库系统时简要讨论过规划数据库需求，但还有更多需要考虑的因素。例如，每个数据库系统都有一个形态（CPU 和内存的大小）以及一个数据大小（数据存储的大小）。此外，还必须考虑网络，以便使您的数据库系统可被访问。以下各节将讨论这些主题。


    ### 形态


    您应仔细考虑需要使用何种形态。较小的形态通常成本更低，但如果使用的形态 CPU 核心数少于您的需求，可能会导致相当大的问题。同样，您也应仔细考虑需要使用多少内存。务必咨询您的系统管理规划人员，以确保选择的形态具备足够的
    CPU 核心和内存。图 10-10 展示了作者实验账户可用的数据库系统形态的部分列表。请注意，有 1 核、2 核、4 核、8 核、16 核等不同 CPU 核心数的形态，内存也相应增加。


    ![一张包含 21 行的表格列出了数据库系统的可用形态。下一列显示“是”或“否”，其后是形态编号。内存根据这些编号增加。](img/527055_1_En_10_Fig10_HTML.png)

    *图 10-10: 数据库系统的可用形态*


    列出的形态都是虚拟机，但您还可以选择更多其他形态，包括支持 HeatWave 和裸机实例的形态。再次强调，一般而言，形态支持的核心数和内存越多，成本越高，但您从“更大”形态中获得的性能提升可以抵消这部分成本。如果性能是关注点，始终应选择比您认为的最低可接受规格更大的形态。


    有关形态的更多信息，请参阅以下链接中的标题 `Supported Shapes`（支持的形态）：[`https://docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml`](https://docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml)


    ### 数据存储


    同样，数据库存储大小需要仔细考虑。与形态类似，较小的数据存储大小成本较低，但较大的大小会采用 RAID 条带化以实现更好的性能。您可以选择从 50 GB 起的任意大小。务必考虑您是否计划进行任何涉及上传或扩展数据的数据迁移，以便确保有足够的空间容纳导入的数据。您可以在日后增加数据存储的大小，但最好在一开始就规划更大的空间。


    有关数据存储选项和注意事项的更多信息，请参阅以下链接中的 `DB System Storage`（数据库系统存储）部分：[`https://docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml`](https://docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml)


    > **提示**

    >

    > 建议在测试期间执行基准分析，以验证您的环境配置是否足以满足应用程序的性能需求。


    ### 网络


    回顾一下，数据库系统无法从互联网直接访问。您需要设置额外的资源来弥补网络差距，例如 Bastion 服务、虚拟专用网络、Oracle FastConnect
    或中间计算实例。在规划如何将数据库系统整合到您的应用程序中时，应仔细考虑这些技术。


    关于网络，还有一些限制需要考虑。以下列出了您在规划网络连接时需要考虑的部分细节：


    -   每个子网中有三个 IP 地址被保留给网络服务。

    -   不具备高可用性的数据库系统需要三个 IP 地址：(1) 数据库系统的 IP 地址，(2) 计算实例，以及 (3) 用于 MySQL 服务器维护和升级任务的独立
    IP 地址。

    -   具备高可用性的数据库系统将需要最多七个 IP 地址：一个用于数据库系统的 IP 地址，三个用于托管 MySQL 的计算实例，以及每个 MySQL 服务器各一个用于维护和升级任务的
    IP 地址。


    有关规划网络要求的更多注意事项，请参阅 [`https://docs.oracle.com/iaas/Content/Network/Concepts/overview.htm`](https://docs.oracle.com/iaas/Content/Network/Concepts/overview.htm)。'
- fmt: '## Planning Your DB Systems


    Systems administration and planning are inseparable. That is, if you want to be
    successful. No more so than when planning cloud solutions. We must plan for how
    we want to set up, configure, and deploy our products and services in advance
    or face the perils of unexpected problems and delays. MDS is no exception to this
    policy, and you would do well to plan for how you want to use it in your environment.


    The information in this section will provide you with insight into areas of planning
    specific to MDS DB Systems. You should consider this section an additional resource
    to use along with your established policies, practices, and tools for planning
    DB Systems. The following lists some of the key areas where deliberate planning
    is needed:


    *   Create separate user accounts for administration of your DB Systems and application
    access

    *   Configure the size of your data and use that to plan the size of your DB Systems

    *   Consider the size (CPU, memory) of your compute instance (for the DB System)

    *   Decide on a plan for upgrading to high availability

    *   Research all costs associated with all OCI services and create a spending
    projection to set expectations

    *   Plan your security carefully to ensure you protect your cloud resources


    Most of these are things we have already discussed through the course of the book,
    but some may be new to you, especially if you have not used MySQL on-prem.


    However, the most critical is planning the size and cost of your DB Systems. You
    should spend some time on these tasks as changing the size (shape) of DB Systems
    may not be trivial and could require some downtime to reconfigure. Fortunately,
    Oracle provides options to do this if you need to do so by taking a backup and
    restoring to a new DB System with a different shape and storage size. Spending
    time on planning and especially projecting your OCI costs in advance will help
    you control your spending while best meeting your needs. You will be surprised
    how must capability is available for lower costs, but this affordability can add
    up if you do not make a solid plan for growth.


    Another critical area to consider is security. We discuss security in the next
    section.


    ## Security Best Practices


    Recall from earlier chapters that you must create accounts in OCI to divide the
    administrative and use functions. Recall also that it is recommended to create
    a separate user account(s) for use with your DB Systems either as user or application
    access. As such, there is a thorough list of security considerations. Since security
    is paramount for any solution, let us discuss several areas of security you should
    consider or plan to implement for your OCI solutions. The following lists and
    briefly describes the items you should investigate as you plan by category. Links
    are included for additional documentation:


    *   `Audit Services`: Employ audit services to view OCI API activities. See [`https//docs.oracle.com/iaas/Content/Audit/Concepts/auditoverview.xhtml`](http://docs.oracle.com/iaas/Content/Audit/Concepts/auditoverview.xhtml).

    *   `Data Masking`: You can protect your data using data masking to hide sensitive
    data. See *Data Masking* at [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml).

    *   `Deletion Plan`: Consider using a deletion plan to further protect your DB
    Systems from delete operations. See *Advanced Option Deletion Plan* at [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/creating-db-system.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/creating-db-system.xhtml).

    *   `IAM Policies`: Use Identity and Access Management policies to control access.
    See *Required IAM Policy* at [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/mysql-database-service-overview.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/mysql-database-service-overview.xhtml).

    *   `In-transit Encryption`: While data is encrypted at rest, you may want to
    use in-transit encryption to further protect your data. See *Data Security* at
    [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/mysql-database-service-overview.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/mysql-database-service-overview.xhtml).

    *   `MySQL Authentication`: Use the `authentication_oci` plugin to map MySQL users
    to existing users and groups defined in the IAM service. See *Connecting to a
    DB System Using authentication_oci Plugin* at [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/connecting-db-system.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/connecting-db-system.xhtml).

    *   `MySQL Connection Control`: The MySQL Database Service supports connection-control
    plugin to provide a deterrent that slows down brute force attacks against MySQL
    user accounts. See *Plugins and Components* at [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml).

    *   `MySQL Password Validation`: Use the `validate_password` component to enforce
    password generation by setting rules for complexity and frequency of mandatory
    changes. See *Plugins and Components* at [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml).

    *   `MySQL Security`: Plan MySQL security features to control access to your data.
    See [`https//dev.mysql.com/doc/refman/8.0/en/access-control.xhtml`](http://dev.mysql.com/doc/refman/8.0/en/access-control.xhtml).

    *   `Networking Load Balancer`: Consider restricting access via the Internet to
    a specific or range of IP addresses and use in-transit encryption. Also, consider
    using the networking load balancer. See *Connecting to a DB System Using a Network
    Load Balancer* at [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/connecting-db-system.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/connecting-db-system.xhtml).

    *   `VCN Security Groups`: Use virtual cloud networking security groups or security
    lists of the VCN to restrict the authorized public IP addresses to a single IP
    address or a range of IP addresses. See *Adding Ingress Rules* Using at [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/networking-setup-mysql-db-systems.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/networking-setup-mysql-db-systems.xhtml).

    *   `VCN Connection Restrictions`: You can configure your DB Systems to use private
    subnets of your VCN to restrict connections to either a VPN connection or use
    a Bastion Session. See *Bastion Session* at [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/networking-setup-mysql-db-systems.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/networking-setup-mysql-db-systems.xhtml)
    or *VPN Connection* at [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/networking-setup-mysql-db-systems.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/networking-setup-mysql-db-systems.xhtml).


    While the list contains terse descriptions, you should consider investigating
    each of the links for more detailed information for planning and implementing
    a secure MDS installation.'
