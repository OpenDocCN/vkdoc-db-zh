  trans: '### 管理标签


    您可以用来关联备份（或 OCI 中任何支持标签的资源）的另一机制是向该资源添加一个或多个标签。标签是您可以自行添加的短字符串。您可能希望添加标签用于筛选或排序。例如，您可以使用标签将备份与成本中心、事件或项目关联起来。


    您可以随时向备份添加标签。要执行此操作，请从数据库系统详情页面点击`资源`菜单中的`备份`视图，点击上下文菜单并选择`添加标签`，如图 5-11 所示。


    ![](img/527055_1_En_5_Fig11_HTML.png)


    一个标题为“创建手动备份”的框。给定了一个带列表的文本框。查看详情、恢复到新系统、编辑、复制 OCID、移动资源、添加标签、查看标签、删除，其中“添加标签”被选中。


    图 5-11


    添加标签（数据库系统详情页面 – 备份视图）


    如果您已导航至备份详情页面，则可以点击`编辑`按钮来编辑备份。


    点击`添加标签`按钮后，您将看到一个对话框，您可以在其中指定要添加到备份的一个或多个标签。图 5-12 展示了添加单个标签的示例。这里，我们添加了一个名为
    `CostCenter`、值为 `901` 的标签。请注意，标签中不能包含空格。


    ![](img/527055_1_En_5_Fig12_HTML.jpg)


    一个标题为“添加标签”的对话框，其中右下角的框“+ 添加另一个标签”和左下角的“添加标签”被选中。


    图 5-12


    添加标签对话框


    如果您想添加更多标签，可以点击 `+ 另一个标签` 按钮，这将为您添加另一组文本框以指定另一个标签。完成后，您可以点击`添加标签`按钮将标签添加到您的备份。


    请注意，您可以通过导航至备份详情页面查看与备份关联的标签。在那里，您可以选择`标签`选项卡，然后查看`自由格式标签`视图，以查看您已添加的标签，如图 5-13
    所示。


    ![](img/527055_1_En_5_Fig13_HTML.jpg)


    OCI 教程“MySQL 第一次测试”的屏幕截图，包含备份信息和标签选项卡。还显示了资源、编辑、移动、添加标签和删除选项。左侧有一个带字母 B 的矩形框。


    图 5-13


    自由格式标签视图（备份详情页面）


    ### 删除备份


    您可以随时删除备份。如果您创建了手动备份或希望通过删除旧备份来清理部分备份资源，您可以轻松完成。删除一组备份的最简单方法是使用云控制台主菜单并导航到 `数据库`
    | `备份`，这将显示您所有的 MDS 备份，如图 5-14 所示。


    ![](img/527055_1_En_5_Fig14_HTML.png)


    一个标题为“oci-tutorial-compartment 中的备份”的对话框，其中选中了选项“备份”。该表包含以下列：名称、状态、创建类型、保留天数、大小和创建时间。


    图 5-14


    列出所有数据库系统备份


    请注意，这里我们看到列表的标题是“*oci-tutorial-compartment 中的备份*”。正如您可能推断的那样，该列表一次只显示一个 compartment
    中的备份。这是因为备份包含在创建它们的 compartment 中——很像数据库系统（或任何存在于 compartment 级别的资源）。


    这个列表非常方便，因为它允许您选择多个备份，然后应用两种操作之一：添加标签或删除。`应用标签`按钮允许您向所有选中的备份添加一个或多个标签。同样，`删除`按钮会删除所有选中的备份。


    要删除单个备份，请使用右侧的上下文菜单并选择`删除`，如图 5-15 所示。


    ![](img/527055_1_En_5_Fig15_HTML.png)


    一个以名称、状态、数据库系统、创建类型、保留天数、大小和创建时间为列标题的对话框，其中第一列被选中。右侧有一个带删除选项的文本框。


    图 5-15


    删除备份（MDS 备份列表）


    系统将要求您确认信息，如图 5-16 所示。点击`删除备份`按钮以确认删除操作。显示此对话框是因为删除备份会导致该备份以后无法访问。


    ![](img/527055_1_En_5_Fig16_HTML.jpg)


    一个标题为“删除备份”的对话框。在对话框中，“删除备份”选项被标记为选中。


    图 5-16


    确认备份删除对话框


    您也可以从备份详情页面点击`删除`按钮来删除备份。或者，如果您正在查看数据库系统详情页面，请使用`资源`菜单中的`备份`视图选择上下文菜单并选择`删除`。'
- fmt: '# Move a Backup


    Backups are contained within the compartment where they are created. You cannot
    use a backup in one compartment for, say a restore, in another compartment. You
    must move the backup to the other compartment before you can use it.


    ## Note


    Only active backups can be moved. Backups in any other state cannot be moved to
    another compartment.


    If you are working with more than one compartment, you may need or want to move
    a backup to a different compartment. For example, you may want to restore the
    data for a DB System in another compartment perhaps to establish a baseline for
    a development environment, duplicate the data for other analysis, etc.


    ## Note


    The user who initiates the move must have the `MYSQL_BACKUP_MOVE` permission on
    the destination compartment. See [`https://docs.oracle.com/en-us/iaas/mysql-database/doc/policy-details-mysql-database-service.xhtml`](https://docs.oracle.com/en-us/iaas/mysql-database/doc/policy-details-mysql-database-service.xhtml)
    for more details.


    To move a backup to another compartment, you can navigate to the backup list via
    the cloud console menu choosing `Databases` | `Backups` then click the context
    menu and choose `Move Resource` as shown in Figure 5-17.


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig17_HTML.png)


    A dialog box with a text box is given with the following list. View details, restore
    to new system, edit, copy O C I D, move resource, add tags, view tags, and delete
    of which move resource is selected.


    Figure 5-17

    Move Resource (MDS Backups List)


    Once you click `Move Resource`, you will get a dialog with a single dropdown list
    where you can choose the compartment to which you want to move the backup. Figure
    5-18 shows the dialog.


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig18_HTML.jpg)


    A dialog box with the title move resource to a different compartment is given.
    In the dialog box, the move backup option is marked as selected.


    Figure 5-18

    Move Resource Dialog


    Simply choose the destination compartment from the list and click the `Move Backup`
    button to move the backup. Notice the example shows moving the backup to the `mysql-development`
    compartment. The operation takes only a few moments and when done, the backup
    will be removed from the list.


    ## Note


    You cannot select the compartment where the backup currently resides.


    This is because the MDS backups list uses the compartment as a filter. Since we
    were looking at the `oci-tutorial-compartment,` but we moved the resource to the
    `mysql-development` compartment, we have to change the `Compartments` filter to
    see the backup as demonstrated in Figure 5-19.


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig19_HTML.png)


    A dialog box titled backups in my s q l development compartment with the selected
    option backups is given. The table contains the following columns. Name, state,
    creation type, retention days, size, and created.


    Figure 5-19

    Showing Backups in the mysql-development Compartment


    You can now use the backup in the `mysql-development` compartment. You can move
    backups around any time you need to, but just remember you cannot use them in
    a compartment unless you move them to that compartment.


    Now, let’s learn what we can do to restore our data (backups).


    # Restore


    The restore operation in MDS DB Systems is not a separate feature or resource.
    It is actually a function of the backup resource. This is a slight departure from
    how other operating system and database backup tools work, so we list the restore
    operations under their own title for those new to MDS and MDS backups to avoid
    confusion.


    When you restore a backup, you do not restore the data to the same DB System.
    MDS (and other OCI) resources are designed for and implemented as “create new
    with” operations. Thus, to restore a backup means you are going to create a new
    DB System using the data in the backup along with certain configuration metadata
    stored with the backup. Once you get used to this new procedure, you may find
    it beneficial in cases where you want to restore a backup for diagnostic purposes
    where having the current and restored DB System would be advantageous.


    Since the restore operation creates a new DB System with the data in the backup,
    the dialog to create the restore is very similar to the one used to create a new
    DB System. Thus, some of the details may be very familiar, but we include them
    for completeness and clarity.


    There is just one very important aspect to consider. The new DB System cannot
    have/use the same IP address as an existing, running DB System. If you want to
    use the same IP address, you must first delete the existing DB System.


    Another thing to consider is the new DB System will retain the administrator credentials
    from the original DB System, so you will not need to recreate the administrator
    account and password.


    ## Note


    If you want to follow along with this demonstration, be sure to create a manual
    backup of your existing DB System so that you can have a backup to use for the
    restore.


    To restore a backup, first navigate to the list of DB System backups by using
    the cloud console main menu then select `Databases` | `Backups` then click `Restore
    to New DB System` from the context menu for the backup you want to restore as
    shown in Figure 5-20. In this case, we see a manual backup taken that we want
    to restore. The original DB System is still active and running.


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig20_HTML.png)


    A dialog box of columns headed name, state, D B system, creation type, retention
    days, size, and created. A text box on the right side with a restore to new D
    B system option is marked as selected.


    Figure 5-20

    Restore to New DB System (DB System Backup List)


    You can also navigate to the backup details page and click the `Restore to New
    DB System` button as shown in Figure 5-21 to start the restore.


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig21_HTML.png)


    A screenshot of o c i tutorial my s q l backup page with backup information and
    tags tabs. Resource, edit, move, add tag, and delete options are also shown. A
    rectangular box with B inscription is on the left.


    Figure 5-21

    Restore to New DB System (Backup Details Page)


    Once you click the button, the restore to new DB System dialog will appear. The
    information we will need to provide includes the following:


    *   `Name`: A name for the DB System.

    *   `Description` (optional): Provides a description for your own use to explain
    the DB System such as why it was created, to which projects it is allocated, etc.
    You should avoid any confidential data in the description.

    *   `Networking`: You will need to select the VCN and subnet for the DB System.

    *   `Availability Domain` (placement): Choose the availability domain.

    *   `Hardware`: Choose the shape and size of the data storage (block volume).

    *   `Backup Plan`: You have the option to turn on automatic backups.


    Since the dialog is quite long and looks very similar to the create new DB System
    dialog, we will go through the dialog in parts starting from the top. If you are
    following along with your own restore, you may need to scroll down to see all
    of the portions of the dialog.'
