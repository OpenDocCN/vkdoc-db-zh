- fmt: '## Summary


    实现MDS的高可用性非常简单。您可以在创建操作时选择它，也可以在已使用DB系统后启用它。无论哪种方式，Oracle都克服了相当陡峭的学习曲线，使复制能够启动并运行，并随着时间的推移进行管理。


    因此，Oracle在MySQL组复制的基础上进行了改进，依托其OCI功能集和成功经验，并整合了多项其他功能，以提供一个更易学习、更易维护的高可用性解决方案。事实上，没有理由不在您的DB系统上使用高可用性。虽然由于使用更多资源而成本更高，但可靠性和可用性带来的安心感远超过其微小的增量成本。


    在下一章中，我们将看到另外两项技术的概述：OCI命令行界面（CLI）和OCI应用程序编程接口（API）。我们已经在第7章见过CLI，但我们将更深入地了解CLI的可能性，包括如何编写可用于开发运维（DevOps）任务的特定操作脚本。


    ## 9. OCI命令行与应用程序编程界面


    到目前为止，本书中我们一直使用基于Web的OCI控制台来操作OCI产品和服务。我们了解了如何设置OCI账户、创建网络服务以及创建和配置DB系统。如果您对基于Web的控制台感到满意，应考虑继续使用它，因为您需要执行的每项操作都易于查找，并且大部分信息可以在一个页面或带有标签页的页面上找到。


    但是，如果您想以Bash（或类似）脚本文件的形式编写开发运维（DevOps）流程，该怎么办？如果您想用Python等编程语言来编写这些脚本呢？进一步地，如果您想将个人电脑配置为仅通过命令行访问来操作OCI中的对象，又该如何？幸运的是，所有这些问题的答案都可以在OCI提供的命令行和应用程序编程接口中找到。


    在本章中，我们将概述用于操作OCI和MDS DB系统的命令行界面（CLI）和应用程序编程接口（API）的功能。


    ### Getting Started


    OCI文档的一个优点是，Oracle经常包含同时涵盖基于Web和CLI示例的文本，用于操作其产品和服务。也有一些示例展示了如何使用API执行操作，但这些通常只出现在API文档中。


    您使用CLI几乎不费吹灰之力。事实上，如果您执行了第7章中的示例，您就已经安装了CLI。回想一下，我们安装CLI是因为MySQL Shell需要它。然而，当时没有透露的是，CLI是使用Python
    OCI API编写的。所以，如果您安装了CLI，那么您也同时安装了Python API。很好！


    在第7章名为“为OCI CLI访问配置您的个人电脑”的章节中，我们配置了个人电脑以供CLI使用。这至少需要以下配置，这些配置同时适用于CLI和API。如果您尚未配置个人电脑，请参考第7章中的相应章节来为使用CLI和API配置您的个人电脑：


    *   一个用于签署API请求的SSH密钥，以及已上传到您OCI账户的公钥。

    *   安装在支持操作系统上的`Python 3`。


    提示

    有关安装CLI的更多信息，请参阅位于 [`https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/cliinstall.htm`](https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/cliinstall.htm)
    的CLI安装文档。


    ### 命令行界面（CLI）


    OCI CLI是一个基于Python的应用程序，您可以下载并在个人电脑上运行。它代表了基于Web的云控制台的一种替代方案，特别适用于运行重复性任务或您希望通过开发运维（DevOps）工具自动化的任务。


    有趣的是，CLI是使用OCI API（SDK）构建的，如果您决定使用API，它可以向您展示其应用程序可能实现的功能。


    #### 安装CLI


    回想一下，我们在第7章名为“安装和测试OCI CLI”的章节中安装了CLI。如果您尚未安装CLI，请参考这些章节来配置您的个人电脑并安装CLI。


    #### 功能


    CLI是Python API的宏级接口。因此，许多可用操作执行一系列任务，这些任务通常在API中需要多个方法来完成。幸运的是，CLI的设计考虑了操作员的需求。因此，这些操作是我们在使用OCI产品和服务时所想到的操作。


    CLI的工作原理是提供一个命令列表，每个命令都可以有子命令和参数。CLI的主可执行文件名为`oci`，并以相同的名称调用。一个贴心之处是您无需记住所有的命令列表，因为CLI具有上下文帮助功能。例如，您可以不带参数地输入`oci`命令以获取所有命令的更多信息，或使用`oci
    <command>`获取特定命令的帮助。这也适用于子命令。列表9-1（为简洁起见节选）显示了主命令的帮助信息。


    ```

    if (condVar > someVal) {console.log("xxx")}

    ```'
  raw: '## Summary


    Achieving high availability with MDS is very easy. You can select it during the
    create operation or enable it later once you’ve used the DB System. Either way,
    Oracle has conquered the rather steep learning curve to get replication up and
    running and to manage it over time.


    Thus, Oracle has improved upon MySQL Group Replication building upon its OCI feature
    set and success and folding in several other features to make an easier to learn
    and easier to maintain high availability solution. In fact, there is no reason
    not to use high availability on your DB Systems. While it does cost more since
    you are using more resources, the piece of mind of reliability and availability
    is well worth the minimal increase.


    In the next chapter, we will see an overview of two additional technologies: the
    OCI command-line interface (CLI) and the OCI application programming interface
    (API). We have seen the CLI in Chapter [7](#527055_1_En_7_Chapter.xhtml), but
    we will see more about what is possible in the CLI including how to script certain
    actions that you can use in your development operations (DevOps) tasks.


    # 9. OCI Command-Line and Application Programming Interfaces


    Thus far in this book we have used the OCI web-based console to work with OCI
    products and services. We saw how to set up our OCI account, create networking
    services, and create and configure DB Systems. If you are comfortable with the
    web-based console, you should consider continuing using it as every operation
    you need to perform is easy to find and most information can be found on a single
    page or a page with tabs.


    However, what do you do if you want to write development operations (DevOps) procedures
    in the form of Bash (or similar) script files? What if you want to write those
    scripts in a programming language like Python? Further, what if you want to configure
    your PC to use only command-line access to manipulate objects in OCI? Fortunately,
    the answers for all these questions can be found in the command-line and application
    programming interfaces available for OCI.


    In this chapter, we will see an overview of the capabilities of the command-line
    interface (CLI) and application programming interface (API) for working with OCI
    and MDS DB Systems.


    ## Getting Started


    One of the nice features of the OCI documentation is that Oracle often includes
    text that covers both web-based and CLI examples for working with OCI products
    and services. There are also examples where Oracle includes how to perform operations
    using the APIs, but those are often seen only in the API documentation.


    You can use the CLI with very little effort on your part. In fact, if you have
    executed the examples in Chapter [7](#527055_1_En_7_Chapter.xhtml), you have already
    installed the CLI. Recall, we installed the CLI because MySQL Shell required it.
    However, what was not revealed was that the CLI is written using the Python OCI
    API. So, if you install the CLI, you’ve also installed the Python API. Nice!


    In Chapter [7](#527055_1_En_7_Chapter.xhtml), we configured our PC for use with
    the CLI in the section entitled *Configure Your PC for OCI CLI Access*. This requires
    the following at a minimum, which applies to both the CLI and APIs. If you have
    not configured your PC yet, please refer to that section in Chapter [7](#527055_1_En_7_Chapter.xhtml)
    to configure your PC for use with the CLI and API:


    *   An SSH key used for signing API requests and the public key uploaded into
    your OCI account.


    *   Python 3 installed on a supported operating system.


    Tip


    See the CLI installation documentation at [`https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/cliinstall.htm`](https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/cliinstall.htm)
    for more information about installing the CLI.


    ## Command-Line Interface (CLI)


    The OCI CLI is a Python-based application that you can download and run from your
    PC. It represents an alternative to the web-based cloud console and is especially
    helpful for running repeated tasks or tasks you want to automate from your developer
    operations (DevOps) tools.


    Interestingly, the CLI is built using the OCI APIs (SDK) and can show you what
    is possible for your own applications should you decide to use the API.


    ### Install the CLI


    Recall, we installed the CLI in Chapter [7](#527055_1_En_7_Chapter.xhtml) in the
    section entitled *Install and Test the OCI CLI*. If you have not installed the
    CLI yet, please refer to those sections to configure your PC and install the CLI.


    ### Capabilities


    The CLI is a macro-level interface for the Python API. As such, many of the operations
    available perform a set of tasks that would typically require several methods
    in the API. Fortunately, the CLI is designed with an eye for the operator. Thus,
    the operations are those that we think about when we work with OCI products and
    services.


    The CLI works by providing a list of commands that each can have subcommands and
    parameters. The CLI main executable is named `oci` and invoked with the same name.
    A nice touch is you don’t need to remember all of the command lists because the
    CLI has context help. For example, you can issue the `oci` command without parameters
    to get more information about all commands or help for a specific command with
    `oci <command>`. This also applies to subcommands. Listing [9-1](#527055_1_En_9_Chapter.xhtml#PC1)
    shows the help for the main commands excerpted for brevity.'
  trans: '## 总结


    实现 MDS 的高可用性非常简单。您可以在创建操作时选择它，也可以在已使用 DB 系统后启用它。无论哪种方式，Oracle 都克服了相当陡峭的学习曲线，使复制能够启动并运行，并随着时间的推移进行管理。


    因此，Oracle 在 MySQL 组复制的基础上进行了改进，依托其 OCI 功能集和成功经验，并整合了多项其他功能，以提供一个更易学习、更易维护的高可用性解决方案。事实上，没有理由不在您的
    DB 系统上使用高可用性。虽然由于使用更多资源而成本更高，但可靠性和可用性带来的安心感远超过其微小的增量成本。


    在下一章中，我们将看到另外两项技术的概述：OCI 命令行界面（CLI）和 OCI 应用程序编程接口（API）。我们已经在第 7 章见过 CLI，但我们将更深入地了解
    CLI 的可能性，包括如何编写可用于开发运维（DevOps）任务的特定操作脚本。


    ## 9. OCI 命令行与应用程序编程界面


    到目前为止，本书中我们一直使用基于 Web 的 OCI 控制台来操作 OCI 产品和服务。我们了解了如何设置 OCI 账户、创建网络服务以及创建和配置 DB
    系统。如果您对基于 Web 的控制台感到满意，应考虑继续使用它，因为您需要执行的每项操作都易于查找，并且大部分信息可以在一个页面或带有标签页的页面上找到。


    但是，如果您想以 Bash（或类似）脚本文件的形式编写开发运维（DevOps）流程，该怎么办？如果您想用 Python 等编程语言来编写这些脚本呢？进一步地，如果您想将个人电脑配置为仅通过命令行访问来操作
    OCI 中的对象，又该如何？幸运的是，所有这些问题的答案都可以在 OCI 提供的命令行和应用程序编程接口中找到。


    在本章中，我们将概述用于操作 OCI 和 MDS DB 系统的命令行界面（CLI）和应用程序编程接口（API）的功能。


    ### 入门指南


    OCI 文档的一个优点是，Oracle 经常包含同时涵盖基于 Web 和 CLI 示例的文本，用于操作其产品和服务。也有一些示例展示了如何使用 API 执行操作，但这些通常只出现在
    API 文档中。


    您使用 CLI 几乎不费吹灰之力。事实上，如果您执行了第 7 章中的示例，您就已经安装了 CLI。回想一下，我们安装 CLI 是因为 MySQL Shell
    需要它。然而，当时没有透露的是，CLI 是使用 Python OCI API 编写的。所以，如果您安装了 CLI，那么您也同时安装了 Python API。很好！


    在第 7 章名为“为 OCI CLI 访问配置您的个人电脑”的章节中，我们配置了个人电脑以供 CLI 使用。这至少需要以下配置，这些配置同时适用于 CLI
    和 API。如果您尚未配置个人电脑，请参考第 7 章中的相应章节来为使用 CLI 和 API 配置您的个人电脑：


    *   一个用于签署 API 请求的 SSH 密钥，以及已上传到您 OCI 账户的公钥。

    *   安装在支持操作系统上的`Python 3`。


    提示

    有关安装 CLI 的更多信息，请参阅位于 [`https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/cliinstall.htm`](https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/cliinstall.htm)
    的 CLI 安装文档。


    ### 命令行界面（CLI）


    OCI CLI 是一个基于 Python 的应用程序，您可以下载并在个人电脑上运行。它代表了基于 Web 的云控制台的一种替代方案，特别适用于运行重复性任务或您希望通过开发运维（DevOps）工具自动化的任务。


    有趣的是，CLI 是使用 OCI API（SDK）构建的，如果您决定使用 API，它可以向您展示其应用程序可能实现的功能。


    #### 安装 CLI


    回想一下，我们在第 7 章名为“安装和测试 OCI CLI”的章节中安装了 CLI。如果您尚未安装 CLI，请参考这些章节来配置您的个人电脑并安装 CLI。


    #### 功能


    CLI 是 Python API 的宏级接口。因此，许多可用操作执行一系列任务，这些任务通常在 API 中需要多个方法来完成。幸运的是，CLI 的设计考虑了操作员的需求。因此，这些操作是我们在使用
    OCI 产品和服务时所想到的操作。


    CLI 的工作原理是提供一个命令列表，每个命令都可以有子命令和参数。CLI 的主可执行文件名为`oci`，并以相同的名称调用。一个贴心之处是您无需记住所有的命令列表，因为
    CLI 具有上下文帮助功能。例如，您可以不带参数地输入`oci`命令以获取所有命令的更多信息，或使用`oci <command>`获取特定命令的帮助。这也适用于子命令。列表
    9-1（为简洁起见节选）显示了主命令的帮助信息。


    ```

    if (condVar > someVal) {console.log("xxx")}

    ```'
