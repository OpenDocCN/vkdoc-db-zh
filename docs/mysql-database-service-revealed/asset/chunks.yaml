- fmt: '## What Is the Oracle Cloud Infrastructure?


    The Oracle Cloud Infrastructure, hence, OCI, is positioned to transform your cloud
    experience by allowing you to adapt the OCI resources to your unique business
    needs and meet the demands of your innovations. The OCI is a cloud platform that
    is autonomous, scalable, and built especially for a vast range of enterprise workloads
    from basic cloud systems with key components residing in OCI to native cloud infrastructures.
    Better yet, with OCI, you get to control and manage your resources including security
    and monitoring as if they were part of your on-premises (also called on-prem)
    infrastructure laboratories.


    The key IaaS components you will be interacting with and building your cloud-based
    infrastructure include the following:


    *   **Compute**: You can choose from a wide range of compute devices (think server
    hardware and operating system as a virtual unit) from those that require a small
    amount of computational power, memory to those that require more computational
    power including processing cores and larger memories. You also have the option
    to choose a bare metal compute resource that ensures you have greater isolation,
    higher performance, and consistency. These form the basis for your applications
    and middleware software services that you build yourself.

    *   **Storage**: Like compute, you can choose a wide range of cloud-based storage
    for use with your compute resources. You can choose from network file, object,
    network block, flash, archive, database backup, data transfer, and even a software
    storage gateway. With so many choices, you are sure to find the storage mechanisms
    that you can best employ for your solutions.

    *   **Network**: You can choose private, secure networking with virtual private
    networking (VPN), setup subnets, scale load balancing, and much more. The virtual
    cloud networking resources allow you to create highly available, secure network
    solutions that can replace existing expensive on-prem hardware. With the elasticity
    features, you won’t need to rewrite or reconfigure your software every time you
    make network-wide changes. For example, if the networking addresses do not change
    when you replace or upgrade your compute or storage resources, you won’t need
    excessive downtime to reconfigure.

    *   **Edge**: The OCI also has resources to provide network edge services such
    as domain name service (DNS).

    *   **Containers**: The OCI also provides production and enterprise-grade resources
    to run container-based solutions in a high-performance, highly available manner.

    *   **Database**: Aside from the expected host of Oracle database resources, the
    OCI also provides the PaaS MySQL database solution. The MySQL Database Service
    is your one-stop resource for building and integrating your solutions with a database
    server as a key component. We’ll learn more about the MySQL Database Service in
    the next section.


    While this list is a high-level view of the core resources and capabilities of
    OCI, there is much more to offer and many more ways you can leverage OCI to solve
    your cloud computing needs. Figure [1-2](#527055_1_En_1_Chapter.xhtml#Fig2) shows
    a summary of the categories of features and capabilities of OCI.


    ![](images/527055_1_En_1_Chapter/527055_1_En_1_Fig2_HTML.png)


    A diagram presents the OCI capabilities and features that are categorized and
    summarized in the form of a table.


    **Figure 1-2** OCI Capabilities and Features (Courtesy of [oracle.com](http://oracle.com))


    > **Tip**

    >

    > For more information about OCI, visit [`www.oracle.com/cloud/`](http://www.oracle.com/cloud/).
    There you will see Figure [1-2](#527055_1_En_1_Chapter.xhtml#Fig2) which contains
    links to more information about each category and feature.


    OCI provides a web-based console that allows you to create, configure, and destroy
    resources. This is likely to be your default access mechanism. You will be presented
    with the OCI console once you log into your OCI account.


    We will learn more about OCI in the next chapter including how to set up your
    account as we explore how to set up our first MySQL Database Service.


    ## What Is the MySQL Database Service?


    The MySQL Database Service, hence, MDS, is a fully managed OCI resource that runs
    as a native service. That is, it is built into the OCI core components and therefore
    fully integrated into the OCI architecture. MDS continues to be developed, managed,
    and supported by the same MySQL engineering team at Oracle. Better still, MDS
    is compatible with on-prem MySQL installations, which means you do not need to
    alter your applications to migrate from on-prem MySQL to MDS.


    Simply put, MDS is MySQL. It isn’t a hybrid of components bundled together to
    look and feel like MySQL. While the MySQL version used with MDS is the Enterprise
    Edition, you do not have to purchase a license to use MDS. In many ways, you’re
    using MySQL just like you would if you used the open source community edition.
    The difference is you’re getting all of the enterprise features and paying only
    a small, nominal fee to use it!


    With MDS, you get all of the features, maturity, reliability, and performance
    you would if you were running MySQL on-prem. The difference is OCI permits the
    automation of maintenance tasks such as upgrades, backup, database and operating
    system patching, and so on. You are freed from that burden allowing you to focus
    exclusively on managing your data, schema designs, and access policies. Thus,
    you spend less money and yet still gain the benefits from using MySQL as your
    database server.


    Indeed, MDS in OCI enables the following benefits:


    *   **Rapid Provisioning**: Create MySQL instances using preconfigured settings
    optimized for production deployments

    *   **Automation**: Configuration, upgrades, patching, etc., are all fully automated

    *   **Customization**: Tailor your MDS resources by selecting from a list of configurations
    that pair computational power, memory, and storage sizes, which allows you to
    limit your costs for those resources – pay for only what you need

    *   **Secure Storage**: Choose cost-effective storage solutions that range from
    high-performance attached solid-state disks (SSD) to reliable, high-performance
    block volumes, and cost-effective archival

    *   **Fast Networking**: Create a virtual cloud network configured to meet your
    privacy needs

    *   **Monitoring**: Use monitoring to optimize your applications and respond quickly
    to events that require changes for optimal performance

    *   **Fewer Resources**: Migrating to MDS permits you to recruit new and train
    human resources for tasks and skills that are vital to your business


    We will see more details about most of these as we learn more about MDS and OCI.


    ### MDS in OCI


    Now that we know a bit more about OCI, we should discuss some of the constraints
    and terminology as well as OCI mechanisms that are required for using MDS. We
    won’t talk about how to set up and connect to MDS yet. We’ll cover that in the
    next chapter. Rather, the following are some of the things you should be familiar
    with to prepare you for using MDS. If you already use OCI, some of these will
    be familiar.


    #### Region Availability


    A region in OCI is a localized geographic area typically servicing the area with
    OCI data centers in the region. MDS is available in most regions but may not be
    available in new regions immediately as they are deployed. Check with your Oracle
    account liaison to ensure MDS is available in your region.


    #### Required Identity and Access Management Policy


    Access to OCI services is governed by another OCI resource called Identity and
    Access Management (`IAM`), which is used for all authentication and authorization
    including access via the console, SDK or CLI, and REST API. In order to use MDS,
    your OCI administrator will need to set up `IAM` to permit access to MDS resources.'
