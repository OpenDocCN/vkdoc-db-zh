    ## 使用计算实例


    第二种从本地 MySQL 服务器导出数据的方法将使用一个计算实例作为中间存储。在这种情况下，我们只需在本地 MySQL 服务器上执行导出操作，将文件放置在该系统上，然后将它们复制到计算实例，最后在
    DB 系统上使用这些数据。在我们开始之前，先回顾一下 MySQL Shell 是如何导出数据的。


    MySQL Shell 使用 `util.dumpInstance()` 方法将数据导出到本地文件，格式为制表符分隔值（文件扩展名 `.tsv`），并通过
    `zstd` 压缩（文件扩展名 `.zst`）以节省空间（`gzip` 也是一个可选项）。你也可以选择不压缩，但如果你是上传到对象存储，则建议使用默认压缩。


    注意


    默认情况下，大表会被分块，默认分块大小为 32MB。可以禁用分块，但不建议这样做。通过并行线程导入分块可以提高导入性能。


    如果你将数据导出到一个文件夹（例如，在你的本地 MySQL 服务器上），你会看到每个数据库和表对应多个文件。例如，如果你的本地 MySQL 服务器安装了 `world_x`
    数据库，你会看到 `city` 表的几个文件，如下所示：


    ```

    world_x@city.json

    world_x@city.sql

    world_x@city@@0.tsv.zst

    world_x@city@@0.tsv.zst.idx

    ```


    这里，我们看到该表的几个文件。有一个 `.json` 文件，包含 MySQL Shell 恢复表所需的信息。`.sql` 文件包含 `CREATE TABLE`
    相关的 SQL 语句。`.tsv.zst` 文件是压缩的制表符分隔值格式的数据和索引文件。对于其他表和数据库，你也会看到类似的文件。


    提示


    `zstd` 实用工具的源代码可从 `https://github.com/facebook/zstd` 下载。但是，你需要在你的机器上编译（构建）源代码才能使用它。


    现在我们了解了数据文件的样子，让我们进行一个示例。我们将再次使用仅安装了 `sakila` 和 `world` 数据库的本地 MySQL 服务器。


    ### 使用 MySQL Shell 导出数据


    第一步是运行 `util.dumpInstance()` 方法将文件保存到本地驱动器。在这种情况下，我们将使用不同的第一个参数。不是传入存储桶名称和相关参数，我们只需指定一个用于存储文件的文件夹（目录）以及与之前相同的选项集。由于大多数命令与上次将数据迁移到
    MDS 的方法类似，为简洁起见，我们省略了一些解释，并在清单中显示较少的详细信息。


    首先启动 MySQL Shell 并使用 JavaScript 接口连接到你的本地 MySQL 服务器 (`mysqlsh -uroot -p --js`)。清单
    7-10 显示了运行中的导出操作，为简洁起见，省略了注释和警告。


    ```

    MySQL  localhost:33060+ ssl  JS > util.dumpInstance("c:\\exported_data", {ocimds:true,
    compatibility: ["strip_restricted_grants", "strip_definers", "ignore_missing_pks",
    "skip_invalid_accounts"]})

