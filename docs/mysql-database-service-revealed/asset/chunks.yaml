    OCI 中的 MySQL 数据库系统，您可以尝试各种 MySQL 查询。


    实验完成后，请务必删除您在 OCI 中创建但不再需要的任何数据库系统、堡垒机、计算实例或其他资源。请记住，如果您不想删除这些资源，可以通过停止您的数据库系统和计算实例来降低成本。


    ### 养成良好的云资源管理习惯


    如果您已完成对 DB 系统的实验，并希望稍后继续探索其功能，请务必在注销前停止 DB 系统，以最大限度地减少您账户的费用。如果您将暂时搁置本书中的教程，您可能需要考虑删除
    DB 系统和其他资源（如您创建的堡垒机服务），以进一步减少账户费用。请记住，您留下的任何正在运行的可计费资源都将产生费用。如果您使用的是试用账户，这可能不是问题，但当您拥有大量
    DB 系统和其他 OCI 资源后，让资源持续运行久而久之会产生不小的开销。通过养成良好的云计算资源管理习惯，避免收到意外的月度账单。


    ## 总结


    MySQL 数据库服务对于希望在云端利用世界上最流行的开源数据库系统——MySQL——的强大功能的组织来说，是一个全新的机遇。这不仅是可行的，而且 Oracle
    通过其 Oracle Cloud Infrastructure (OCI) 让创建和管理多个 MySQL 数据库服务 DB 系统变得轻而易举。


    尽管 MySQL 数据库服务下还有其他可用资源，但 DB 系统代表了托管需要数据库系统的应用程序的任何基础设施的核心组件。最好的消息是，DB 系统是一个功能齐全、托管式的
    MySQL 实例，您可以根据业务需求进行定制。


    从 CPU 性能和内存（通过规格形状）到数据存储的大小，您可以根据即时需求配置一系列 DB 系统。而且您无需花费辛苦赚来的资金购买硬件和雇佣人力来设置、配置和调优这些服务器——所有这些都在几分钟内为您完成！显然，DB
    系统是世界领先的开源数据库系统的下一代演进。


    在本章中，我们浏览了 MySQL 数据库服务，重点介绍了 DB 系统。我们学习了如何创建 DB 系统、管理它，以及了解更多可用于与 DB 系统协作的功能。我们甚至学习了如何从个人电脑连接到
    DB 系统。


    在下一章中，我们将学习更多关于 MDS 针对 DB 系统的备份和恢复功能。


