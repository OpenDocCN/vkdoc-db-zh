    Now, let’s take the complexity up a bit. Let’s see how to control DB Systems.


    #### Stop/Start DB System


    When working with DB Systems, we will use the `oci.mysql.DbSystemClient` class
    and its methods. To stop a DB System, we use the `stop_db_system()` method and
    to start a DB System, we use the `start_db_system()` method. As you can see, the
    API methods are often quite self-explanatory.


    This example is a bit more complicated because we will have to provide a DB System
    id (OCID) in the form of another class named `stop_db_system_details()` for the
    stop or start operation. This class uses a model to populate the data. In this
    case, we need the DB System OCID and the shutdown type.


    We are also going to make it a bit more complex by first listing the DB Systems
    in our compartment and select the one with a specific name. You may be amazed
    at how difficult it is to remember OCIDs, but it is much easier to remember a
    DB System name. We’ll display a list for the user to choose the DB System to control.
    To list the DB Systems, we use the `list_db_systems()` method and pass in the
    compartment id, which we have saved in an environment file.


    In summary, we will import the libraries we need, read the configuration file,
    read the SSH key passphrase from the user, read the compartment id from the environment
    variable, then read the DB System name from the user. Once we have that information,
    we can call the method to list the DB Systems in the compartment, select one that
    matches the name, then either stop or start it.


    Interestingly, these API methods do not return with a work request id like we
    saw with the CLI examples. Instead, the method waits until the operation is complete.
    Listing [9-19](#527055_1_En_9_Chapter.xhtml#PC28) shows the complete code for
    this example. The file is named `stop_db_system.py` Take some time to study it
    before moving on to the next example.


    ```

    import getpass

    import os

    import sys

    # Import the oci module

    import oci

    # Determine which operation is requested: start/stop

    if len(sys.argv) > 1:

    is_stop = sys.argv[1].upper() == "STOP"

    operation = "Stopping"

    else:

    is_stop = False

    operation = "Starting"

    # Read your configuration file: be sure to provide a path if

    # your configuration file.

    config = oci.config.from_file()

    # Read the passphrase from the user

    pass_phrase = getpass.getpass("Enter the SSH key passphrase: ")

    # Add the passphrase  to the config file dictionary.

    config.update({''pass_phrase'':pass_phrase})

    # Initialize service client with default config file

    db_client = oci.mysql.DbSystemClient(config)

    # Get the compartment id from the environment

    COMPARTMENT_ID = os.getenv(''COMPARTMENT_ID'')

    # List the DB Systems

    list_db_systems_response = db_client.list_db_systems(compartment_id=COMPARTMENT_ID)

    # Loop through the DB System Summary

    db_systems = []

    num = 1

    print("DB Systems in Compartment")

    print("-------------------------")

    for db_system_summary in list_db_systems_response.data:

    if db_system_summary.lifecycle_state != ''DELETED'':

    print("{0}: {1}".format(num, db_system_summary.display_name))

    db_systems.append(db_system_summary)

    # If no DB Systems active, exit

    if len(db_systems) == 0:

    print("No db systems to control.")

    exit(1)

    # Get the name of the DB System to control

    db_num = int(input("\nWhich DB System (int)? "))

    print("\n{0} the DB System named ''{1}''\n".format(operation, db_systems[db_num-1].display_name))

    # Perform the operation

    if is_stop:

    db_system_response = db_client.stop_db_system(

    db_systems[db_num-1].id,

    stop_db_system_details=oci.mysql.models.StopDbSystemDetails(

    shutdown_type="FAST")

    )

    print(db_system_response.headers)

    else:

    db_system_response = db_client.start_db_system(db_systems[db_num-1].id)

    print(db_system_response.headers)

    print("Done!")

    Listing 9-19

    Control DB System Script

    ```'
