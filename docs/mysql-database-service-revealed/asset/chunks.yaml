  trans: '#### 创建端口转发会话


    现在，我们已具备创建端口转发会话（也称为 SSH 隧道）所需的一切条件。请如图 4-41 所示，在列表中点击新创建的 Bastion（`MySQLBastion`），导航至其详情页面。或者，您也可以使用右侧的上下文菜单并选择`查看详情`。


    ![](img/527055_1_En_4_Fig41_HTML.png)


    OCI 教程中 compartment 内的 Bastion 主页面。左上角有“创建 Bastion”按钮，下方是一个空表格。列标题为：名称、状态、Bastion
    类型和创建时间。


    图 4-41


    选择新的 Bastion 服务


    在 Bastion 详情页面的`会话`部分下，点击`创建会话`按钮，如图 4-42 所示。


    ![](img/527055_1_En_4_Fig42_HTML.png)


    一个对话框，顶部有“创建会话”按钮。空表格的列标题为：名称、会话类型、目标资源、目标端口、用户名、状态、会话 TTL 和启动时间。


    图 4-42


    创建会话（Bastion 详情页面）


    这将打开一个对话框，我们将在其中创建端口转发会话。在对话框中，于`会话类型`下拉菜单中选择`SSH 端口转发会话`，（可选）将会话命名为`MySQLSession`，在`用户名`文本框中输入`opc`，输入数据库系统的私有
    IP 地址（例如`10.0.1.73`），以及我们要打开的端口（例如`33060`），如图 4-43 所示。


    ![](img/527055_1_En_4_Fig43_HTML.png)


    “创建会话”对话框，显示了 Bastion 名称、会话类型、会话名称、IP 地址和端口的详细信息。目标主机选择为 IP 地址。


    图 4-43


    创建端口转发会话（第 1 部分）


    我们使用`opc`用户，因为它是 Bastion 和计算实例等系统的默认用户。您指定的端口将是用于创建隧道的端口。您可以选择任何有效的端口。如果您的 PC
    上安装了 MySQL，您可能需要选择另一个端口使用。


    在对话框中向下滚动，您将看到下一部分，我们需要上传先前生成的密钥对中的公钥。为此，点击`浏览`链接并选择我们之前创建的公钥（例如`bastion_rda.pub`），如图
    4-44 所示。验证输入的信息正确后，您可以点击`创建会话`按钮。


    ![](img/527055_1_En_4_Fig44_HTML.png)


    “创建会话”页面上的一个对话框。它显示“添加 SSH 密钥”。其特点是：选择 SSH 密钥文件、添加 SSH 公钥的位置和创建会话按钮。


    图 4-44


    创建端口转发会话（第 2 部分）


    您可能需要稍等片刻等待会话创建。创建完成后，它将显示在会话列表中，状态为`活跃`，如图 4-45 所示。


    ![](img/527055_1_En_4_Fig45_HTML.png)


    一个对话框，顶部有“创建会话”按钮。空表格的列标题为：名称、会话类型、目标资源、目标端口、用户名、状态、会话 TTL 和启动时间。


    图 4-45


    Bastion 中的会话列表


    注意`会话 TTL`列。这是 SSH 会话的超时时间（称为生存时间）。它代表了会话可用时间的上限。默认是 30 分钟（或 1800 秒）。您可以在创建会话时设置此值：在创建会话对话框中点击`高级选项`，并更改`最大会话生存时间`的值（以及可选地更改单位），如图
    4-46 所示。


    ![](img/527055_1_En_4_Fig46_HTML.png)


    一个包含会话配置的对话框。它包含最大会话生存时间、目标计算实例端口和目标计算实例 IP 地址。所有字段均已填好。


    图 4-46


    设置会话生存时间


    您现在可以使用它将您的 PC 连接到数据库系统。


    #### 从您的 PC 连接


    现在我们有了端口转发会话，可以打开隧道了。我们需要使用的命令有点复杂，但幸运的是，OCI 通过提供一个包含可用于访问 Bastion 端口转发会话的特殊 OCID
    的示例命令，使我们变得简单。只需在 Bastion 详情页面的`会话`列表中点击上下文菜单以打开菜单，然后选择`查看 SSH 命令`，如图 4-47 所示。


    ![](img/527055_1_En_4_Fig47_HTML.jpg)


    一个会话上下文菜单，包含编辑会话名称、查看 SSH 命令、复制 SSH 命令、复制 OCID、删除会话和打开支持请求。


    图 4-47


    会话上下文菜单


    这将打开一个如图 4-48 所示的对话框，其中显示了命令。点击`复制`标签复制该命令，然后点击`关闭`按钮关闭对话框。


    ![](img/527055_1_En_4_Fig48_HTML.jpg)


    “查看 SSH 命令”对话框。它显示了 SSH 命令并带有一个复制按钮。关闭按钮在左下角。


    图 4-48


    查看 SSH 命令对话框（会话）


    我们需要在使用前编辑它。具体来说，我们需要添加我们先前创建的 SSH 密钥路径`~/.ssh/bastion_rsa`，提供我们在端口转发会话中使用的端口（`33060`），以及我们想要在数据库系统上使用的端口（`33060`），如下所示。更改部分以粗体显示。最后，我们添加`&`运算符以运行命令并返回到命令行（在后台运行）。这是因为端口转发连接需要保持打开状态供我们使用：


    ```

    % ssh -i ~/.ssh/bastion_rsa -N -L 33060:10.0.1.73:33060 -p 22 ocid1.bastionsession.oc1...bfa@host.bastion.us-ashburn-1.oci.oraclecloud.com
    &

    ```


    如果您在跟着操作，请在您的 PC 上打开终端窗口并输入该命令。在尝试连接到 MySQL 之前，您需要等到看到以下响应：


    ```

    Use of the Oracle network and applications is intended solely for Oracle''s authorized
    users. The use of these resources by Oracle employees and contractors is subject
    to company policies, including the Code of Conduct, Acceptable Use Policy and
    Information Protection Policy; access may be monitored and logged, to the extent
    permitted by law, in accordance with Oracle policies. Unauthorized use may result
    in termination of your access, disciplinary action and/or civil and criminal penalties.

    ```


    一旦从 SSH（来自 OCI）获得响应，您就可以使用以下命令连接到数据库系统上的 MySQL：


    ```

    % mysqlsh --sql mysql_admin@127.0.0.1:33060

    ```


    注意，我们正在使用`mysqlsh`连接到环回地址（`127.0.0.1`或 localhost）端口`33060`上的 MySQL。这将通过 SSH 隧道将通信发送到数据库系统。列表
    4-5 显示了连接的记录。'
