    ## 从对象存储桶导入到本地 MySQL 服务器


    在继续之前，请务必在本地 MySQL 服务器上删除您已从 DB 系统导出的数据库。完成后，我们就可以运行导入了。回顾一下，我们可以使用 `util.loadDump()`
    方法，该方法需要几个参数。我们将把 PAR 作为第一个参数传递，然后是选项列表，这里我们只需要一个 `progressFile`。您可以随意命名该文件。以下是我们将使用的命令示例：


    ```

    util.loadDump("PAR_STRING_HERE", {progressFile: "progressFile"})

    ```


    好的，让我们看看效果！切换到 MySQL Shell 的 JavaScript 界面，复制上面的命令，并将 PAR 替换为您在之前步骤中复制的那一个。现在，让我们在没有
    dry run 参数的情况下运行导入，如清单 7-18 所示。


    ```

