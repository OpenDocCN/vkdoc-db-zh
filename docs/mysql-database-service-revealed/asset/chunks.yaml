    Warning: Permanently added ''129.158.195.169'' (ED25519) to the list of known
    hosts.

    Activate the web console with: systemctl enable --now cockpit.socket

    [opc@connection-instance ~]$

    ```


    清单 4-1


    连接到计算实例（从您的 PC）


    一旦连接到计算实例，我们现在就可以从该计算实例连接到数据库系统了。

