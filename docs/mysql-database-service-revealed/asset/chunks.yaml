    ## Recovery


    Recovery of a DB System using PITR is very similar to recovery using any normal
    backup. The difference is in how you select the backup. If you choose to recover
    using a PITR entry, you will need to select the last backup from the list


    To make this demonstration feasible, we will need to introduce an event from which
    we want to recover. A simple DROP DATABASE or similar SQL statement will suffice.
    In this case, I issued a `DROP DATABASE sakila`; command.


    I did so by logging into a compute instance then launched MySQL Shell on the compute
    instance to connect to a DB System. I then issued the DROP command at approximately
    21:06 UTC. I logged into the compute instance with the following command using
    the *public IP address* as shown on the compute instance details page:


    ```

    ssh -i c:\users\cbell\.ssh\ssh-key-2022-08-16.key opc@150.136.69.126

    ```


    From there, I logged into MySQL using MySQL Shell with the following and dropped
    the database:


    ```

    [opc@connection-instance ~]$ mysqlsh --sql mysql_admin@10.0.1.226:33060

    MySQL Shell 8.0.30

    Copyright (c) 2016, 2022, Oracle and/or its affiliates.

    Oracle is a registered trademark of Oracle Corporation and/or its affiliates.

    Other names may be trademarks of their respective owners.

    MySQL  10.0.1.226:33060+ ssl  SQL > DROP DATABASE sakila;

    Query OK, 23 rows affected (0.1493 sec)

    ```


    Ok, now we have our event. Now, we can attempt to restore to a point prior to
    21:06 UTC. We can do so by clicking on Restore to New DB System using the context
    menu for the backup in our list as shown in Figure [6-6](#527055_1_En_6_Chapter.xhtml#Fig6).
    If you have more backups from which to choose, you should choose the one dated
    most recently before the event from which you want to recover.


    ![](images/527055_1_En_6_Chapter/527055_1_En_6_Fig6_HTML.png)


    A window page displays the backup list with the details on top and the table with
    4 rows and 7 columns to list backups. In the view details, select and change restore
    to the new D B system.


    Figure 6-6


    Launching Restore to New DB System (Backups List on DB System Details Page)


    This launches a new dialog where you can change several parameters for the new
    DB System. The first section in the dialog concerns the backup settings as shown
    in Figure [6-7](#527055_1_En_6_Chapter.xhtml#Fig7).


    ![](images/527055_1_En_6_Chapter/527055_1_En_6_Fig7_HTML.png)


    A dialog box to configure the source highlights restores from the D B system at
    any point, select a specific point in time and time.


    Figure 6-7


    Restore DB System from Backup (PITR)


    This is the area where you can specify that you want to restore to a specific
    point-in-time. Begin by clicking on the *Restore from DB System at a point in
    time*. Notice this allows you to choose the latest PITR period or a specific period.
    For this demonstration, we tick the *Select a specific point in time radio* button.
    Finally, you can enter a time period that occurs prior to your event. In this
    case, the last entry available is 21:03 UTC. Simply reduce the time shown by 5
    minutes segments to reach your desired time period.


    Once you click *Restore* button and the DB System is ready, we can log in and
    see that the *sakila* database is indeed present and the unwanted data change
    event has been recovered. Recall, there is much going on under the hood. MDS is
    restoring from the last known good backup and once restored, is applying the binary
    logs recorded since the backup. All this occurs without any intervention from
    the user. How cool is that?


    Recall, we must first log into a compute instance prior to launching MySQL Shell
