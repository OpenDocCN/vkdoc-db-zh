  trans: '

    #### 甲骨文云标识符 (`OCID`)


    OCI 中的每个资源都有一个 Oracle Cloud Identifier（甲骨文云标识符）。它是一个唯一的字符串，用于标识 OCI 中的一个资源。通过命令行界面
    (`CLI`)、`REST API` 或开发者 API 代码访问资源时，几乎任何要对资源执行的操作都需要用到 Oracle Cloud Identifier。以下展示了
    `OCID` 的格式：

    ```

    ocid1...[REGION][.FUTURE USE].

    ```

    以下展示了一个 MySQL 数据库服务 `DB System` 的 `OCID` 示例。其他 OCI 资源将使用类似的格式，但前导部分通常显示 `OCID`
    所引用的资源类型：

    ```

    ocid1.mysqldbsystem.oc1.iad.aaaaaaaapuif...sbg5z7sy5imjtlclhbxwbjmrq

    ```


    #### 计算实例


    也称为计算实例，是在 OCI 中运行的计算主机。换句话说，它是一个你可以用来运行软件、安装自己的应用程序等的服务器。计算实例可以是虚拟机或裸机主机。计算实例的大小或虚拟化硬件能力由一组称为**配置方案**的逻辑分组（包括
    CPU 大小、核心数、性能和内存设置）来管理。服务器的配置（操作系统等）则由一个称为**镜像**的模板来管理。


    ##### 虚拟机


    虚拟机是一种在大型系统主机（称为虚拟机管理程序服务器）上运行的硬件的软件抽象实现，该主机为服务器分配虚拟化内存、CPU，有时还有磁盘。在使用自己的服务器或
    `PC` 时，你可能已经接触过虚拟机。OCI 中的虚拟机与此类似，但复杂得多，因为它们可以通过配置方案进行性能和容量的定制。


    ##### 裸机主机


    当性能或隔离性至关重要时，OCI 提供一小部分物理（或“裸金属”）机器。这些机器直接运行在硬件上，绕过虚拟机管理程序，不使用虚拟化内存、`CPU` 等（但可以连接到虚拟化资源）。甲骨云基础设施为你提供对物理主机（“裸金属”）机器的控制。当你使用裸机主机时，你是唯一使用物理
    `CPU`、内存和网络接口卡 (`NIC`) 的租户。你可以像使用任何其他计算实例一样使用它，其外观与使用虚拟机的计算实例没有区别。


    ##### 配置方案


    配置方案是一组定义计算实例的 `CPU` 核心数、内存大小以及在某些情况下磁盘空间的配置项。这允许你“调整”你的计算实例以满足需求。例如，如果你不需要大量内存，可以选择一个“较小”的配置方案，从而在产生成本时节省一些费用。


    ##### 镜像


    镜像是一个虚拟化磁盘的模板，定义了操作系统和默认安装的软件。当你创建计算实例时，可以选择要使用的镜像。例如，你可以选择预装了 Oracle Linux 的镜像。你也可以从已配置的计算实例创建一个镜像，这样就可以部署一个相同配置的新计算实例，为你节省设置和配置时间。很棒！


    ##### 关于“实例”一词的说明


    实例（instance）是云计算中那些被过度使用的术语之一。在 OCI 的术语中，将计算实例简称为“实例”是不正确的。这是因为还有其他被视为实例的资源。

    例如，在 MySQL 术语中，“实例”可以指运行中的 MySQL 服务器应用程序（运行在服务器平台上的 MySQL），或者在 MySQL 数据库服务中，一个
    `DB System` 可以被称为 `DB System 实例`。因此，你应该始终明确“实例”的含义：计算实例、MySQL 实例或 `DB System 实例`。


    #### 配置


    这是你开始创建资源时会遇到的一个术语。此处的配置是指 OCI 创建资源所需的一系列操作，包括其子组件以及为使用该资源配置资源。例如，配置一个新的计算实例（从高层次上讲）包括：分配一个虚拟机、通过镜像安装操作系统和基础软件，以及为你所在的区域、可用性域等配置计算实例。在使用
    OCI 资源时，你可能会在状态信息中看到这个术语。


    **提示**

    你可能在文档和博客中遇到这些术语和概念以首字母缩写形式或简写形式呈现。务必参考文档字典部分，以确认你可能不熟悉的术语和首字母缩写的含义，从而避免混淆。


    接下来，让我们讨论你可以用来与 OCI 交互的主要接口。

    '
- fmt: '## OCI 用户界面


    OCI 提供了多种交互机制。具体来说，有多种用户界面可用于创建、管理和销毁 OCI 资源。这些包括基于 Web 的 OCI 云用户界面（称为 Oracle
    Cloud Console 或简称 cloud console）、名为 OCI 命令行界面（`CLI`）的命令行工具，以及面向开发人员的可编程接口，包括一个表述性状态传递（`REST`）应用程序编程接口（`API`）^([³](#fn3))
    以及特定语言的 API，允许你直接从代码中操作 OCI。甚至还有一个名为 Cloud Shell 的基于云的终端应用程序。我们将在本章探讨基于 Web 的云控制台界面，而将
    `CLI`、`REST` 和开发者 API 留到第 [9](#527055_1_En_9_Chapter.xhtml) 章。


    > **注意**

    >

    > `CLI`、`REST` 和 API 需要在你的个人电脑上进行设置和配置。我们将在第 [9](#527055_1_En_9_Chapter.xhtml)
    章详细介绍这些步骤。


    OCI 云控制台是处理 OCI 资源最常用的机制。它易于使用、易于导航，并且不需要任何特殊软件。虽然某些菜单可能看起来有点长，但资源页面和详细信息页面之间的一致性使得整个体验感觉完全无缝。一旦你花了一些时间熟悉云控制台，你可能会发现它会成为你处理
    OCI 时的首选工具。


    要访问 OCI 云控制台，请导航至 [`https://cloud.oracle.com`](https://cloud.oracle.com)。登录后，你将看到云控制台。你首先应该了解界面的关键点或功能是：左上角的菜单按钮、中间的搜索框、中间的实用快速提示和教程，以及右侧的账户信息。根据你创建的账户类型，一旦账户创建并激活，控制台可以显示你当前计费周期的费用情况。这有助于你跟踪支出。对于免费试用账户，目前不显示此信息。图
    [2-3](#527055_1_En_2_Chapter.xhtml#Fig3) 展示了 OCI 云控制台的一个示例，因此也称为 OCI 控制台。


    > **注意**

    >

    > 本章中的许多图像显示的是我个人账户的 `UUID` 或其他特定数据。出于安全考虑，这些数据已被遮蔽。当你访问自己账户中的相同页面时，你将看到此类值。除非你在可信用户之间特意共享，否则应将所有
    `OCID` 视为私有数据。


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig3_HTML.png)


    Oracle 云的主菜单突出显示了身份和安全选项。选择该选项后，下一个菜单会显示可选项—— compartments。


    **图 2-3**


    OCI 云控制台


    > **注意**

    >

    > Oracle 每周都会对 OCI 控制台进行微小更改。未来展示的一些图像可能会略有不同，但方法和机制基本保持不变。例如，对话框可能会有一个需要你完成的新字段，或者字段可能会重新组织以便更好地查看。


    在你学会如何使用 OCI 之后，可能还会对另一个功能感兴趣。如果你查看云控制台的右上角，会看到一个看起来像提示符的符号。点击它会打开 OCI Cloud Shell，其中包含可用于管理资源的命令行界面（`CLI`）。点击该按钮，云
    Shell 将被创建。有趣的是，它本身是作为一个资源创建的，可以保存状态以供下次使用。图 [2-4](#527055_1_En_2_Chapter.xhtml#Fig4)
    展示了 OCI 云控制台。


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig4_HTML.png)


    Oracle 云搜索 Dr. Charles Bell 的窗口。下方显示快速启动链接。底部出现一个用于输入更多信息的 Oracle 云 Shell。


    **图 2-4**


    OCI Cloud Shell


    要了解更多关于 OCI Cloud Shell 的信息，请在控制台中输入 `help`，或参阅在线文档：[`https://docs.oracle.com/en-us/iaas/Content/API/Concepts/cloudshellintro.htm`](https://docs.oracle.com/en-us/iaas/Content/API/Concepts/cloudshellintro.htm)。我们将在下一节中了解更多关于
    `CLI` 的内容。


    你也可以通过点击右上角的问号，或点击任何快速启动链接/按钮来学习特定资源，从而从云控制台获得关于 OCI 的帮助。你可能想先点击问号符号，然后选择 **Using
    the Console** 主题来了解更多关于云控制台的信息。


    现在，我们准备开始探索，首先了解在使用 OCI 时会遇到的核心服务。


    ## 核心服务


    到目前为止，在我们对 OCI 的探索中，我们遇到了虚拟网络、计算实例、存储和访问等概念。这些资源由专用于该类型资源的云服务（有时称为云能力）管理和提供。你用来创建、管理和销毁这些资源的机制在很大程度上是隐藏的，并且涉及一系列通常密集的自动化流程。例如，当你创建一个计算实例时，会启动几个自动化机制和其他例程（称为工作流）来完成资源的配置。


    这些概念被认为是 OCI 中可用服务的核心。由于它们每个都是 OCI 提供的服务，因此我们将该能力称为服务，而单个资源则按其对象名称引用。例如，计算服务用于创建计算实例。


    以下列出了 OCI 提供的核心服务。我们将在后面的章节中更详细地了解每一项：


    *   网络服务

    *   计算服务

    *   存储服务

    *   身份与访问管理服务


    OCI 中的这些核心服务用于构建和提供更复杂的服务和资源。事实上，OCI 中的每个复杂资源通常都是使用这些核心服务中的一个或多个构建的。例如，MySQL 数据库服务构建在计算、网络、存储和身份与访问管理服务之上。其他例子包括容器编排、额外的托管服务、无服务器计算等等。


    让我们更详细地看看这些核心服务。'
  raw: '### OCI User Interfaces


    OCI provides several mechanisms you can use to interact with OCI resources. More
    specifically, there are several user interfaces you can use to create, manage,
    and destroy your OCI resources. These include the web-based OCI Cloud user interface
    called the Oracle Cloud Console (or simply cloud console), a command-line tool
    called the OCI Command Line Interface (CLI), and, for developers, programmable
    interfaces including a Representational State Transfer (REST) application programming
    interface (API) interface^([³](#fn3)) as well as language-specific APIs to allow
    you to work with OCI directly from code. There is even a cloud-based terminal
    application called the Cloud Shell. We will look at the web-based cloud console
    interface in this chapter saving the CLI, REST, and developer APIs for Chapter
    [9](#527055_1_En_9_Chapter.xhtml).


    Note


    The CLI, REST, and APIs require setup and configuration on your PC. We will walk
    through those steps in Chapter [9](#527055_1_En_9_Chapter.xhtml).


    The OCI Cloud Console is the most used mechanism of working with OCI resources.
    It is easy to use, easy to navigate, and doesn’t require any special software
    to use. While some of the menus can see a bit long, there is a consistency across
    the resource and detail pages that makes it all feel completely seamless. Once
    you’ve spent some time with the cloud console, you may find yourself using it
    as your go-to tool when working with OCI.


    To reach the OCI Cloud Console, navigate to [`https://cloud.oracle.com`](https://cloud.oracle.com).
    Once you login, you will see the cloud console. The key points or features of
    the interface you should learn first are the menu button in the top-left, the
    search box in the center, the helpful quick tips and tutorials in the center,
    and your account information on the right. Depending on the type of account you
    created, once the account is created and active, the console can show you your
    expenses so far in the billing cycle. That helps you keep track of your spending.
    This information is not currently shown for the free trial accounts. Figure [2-3](#527055_1_En_2_Chapter.xhtml#Fig3)
    shows an example of the OCI Cloud Console, hence OCI console.


    Note


    Many of the images in this chapter show UUIDs or other data specific to my personal
    account. Those data are masked for security. When you visit the same pages in
    your own account, you will see such values. You should treat all OCIDs as private
    data unless you are sharing them specifically among your trusted users.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig3_HTML.png)


    The main menu of Oracle cloud highlights identity and security options. By selecting
    that, the next menu displays the compartments option to be selected.


    Figure 2-3


    OCI Cloud Console


    Note


    Oracle makes minor changes to the OCI console weekly. Some of the images presented
    may differ slightly in the future, but the methods and mechanisms are largely
    unchanged. For example, a dialog may have a new field for you to complete or the
    fields may be reorganized for better viewing.


    There is one other feature you may be interested in after you have learned how
    to use OCI. If you look in the upper-right corner of the cloud console, you will
    see a symbol that looks like a prompt. This opens the OCI Cloud Shell that includes
    the command-line interface (CLI) which you can use to manage your resources. Click
    on that button and the cloud shell will be created. Interestingly, it is created
    as a resource itself which can save state from one use to another. Figure [2-4](#527055_1_En_2_Chapter.xhtml#Fig4)
    shows the OCI Cloud Console.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig4_HTML.png)


    A window of Oracle cloud searches Dr. Charles bell. Quick start links are displayed
    below. An Oracle cloud shell to type for more information appears at the bottom.


    Figure 2-4


    The OCI Cloud Shell


    To learn more about OCI Cloud Shell, type *help* in the console or see the online
    documentation at [`https://docs.oracle.com/en-us/iaas/Content/API/Concepts/cloudshellintro.htm`](https://docs.oracle.com/en-us/iaas/Content/API/Concepts/cloudshellintro.htm).
    We will learn more about the CLI in the next section.


    You can also get help with OCI from the cloud console by clicking on the question
    mark in the upper right corner or clicking on any of the quick start links/buttons
    to learn about specific resources. You may want to start with clicking the question
    mark symbol and selecting the *Using the Console* topic to learn more about the
    cloud console.


    Now we are ready to begin our tour with a look at the core services you will encounter
    when working with OCI.


    ### Core Services


    Thus far in our exploration of OCI, we’ve encountered things like virtual networks,
    compute instances, storage, and access concepts. These resources are managed and
    provided by a cloud service (sometimes called a cloud capability), which is devoted
    to that type of resource. The mechanisms with which you use to create, manage,
    and destroy those resources are largely hidden from view and involve a set of
    often intensive automation processes. For example, when you create a compute instance,
    several automation mechanisms and other routines (called workflows) are initiated
    to complete the provisioning of the resources.


    These concepts are considered the very core of the services available in OCI.
    Since they are each a service provided by OCI, we refer to the capability as a
    service and the individual resources by their object name. For example, the compute
    service is used to create a compute instance.


    The following lists the core services provided by OCI. We will see more about
    each in a later section:


    *   Networking Services


    *   Compute Services


    *   Storage Services


    *   Identity and Access Management Services


    These core services in OCI are used to build and provide more complex services
    and resources. In fact, every complex resource in OCI is typically built using
    one or more of these core services. For example, the MySQL Database Service is
    built on top of compute, networking, storage, and identity and access management
    services. Other examples include container orchestration, additional managed services,
    serverless computer, and many more.


    Let’s look at the core services in more detail.'
