    ## 从 MDS 迁移数据


    当从 MDS 导入数据时，我们必须选择三种方法之一来将导出的数据移动到 MDS。回顾一下，这些方法包括使用 ObjectStore 存储桶、将导出的数据上传到中间计算实例，以及通过
