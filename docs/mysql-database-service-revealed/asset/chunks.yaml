    ```

    Use of the Oracle network and applications is intended solely for Oracle''s authorized
    users. The use of these resources by Oracle employees and contractors is subject
    to company policies, including the Code of Conduct, Acceptable Use Policy and
    Information Protection Policy; access may be monitored and logged, to the extent
