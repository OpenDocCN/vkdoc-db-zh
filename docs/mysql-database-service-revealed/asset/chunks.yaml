  trans: '

    ### 使用索引


    表的创建不使用任何排序方式，也就是说，表本身是无序的。虽然 MySQL 每次返回的数据顺序可能相同，但除非创建索引，否则这种顺序并非隐含（或可靠的）。这里所说的排序，并非你通常所想的排序（那可以通过`SELECT`语句中的`ORDER
    BY`子句实现）。


    实际上，索引是服务器在执行查询时用来读取数据的映射。例如，如果表上没有索引，而你想选择某列值大于特定值的所有行，服务器就必须读取所有行来找出匹配项。然而，如果我们在该列上添加了索引，服务器就只需读取符合条件的那些行。


    需要说明的是，索引有多种形式。这里我指的是聚簇索引，其索引中包含了该列的值，这使得服务器仅需读取索引本身，而不必读取数据行，即可进行条件测试。


    创建索引时，你既可以在`CREATE TABLE`语句中指定索引，也可以单独执行`CREATE INDEX`命令。以下是一个简单示例：


    ```sql

    CREATE INDEX plant_name ON plants (plant_name);

    ```


    这条命令在`plant_name`列上添加了一个索引。请观察它如何影响表的定义：


    ```sql

    CREATE TABLE `plants` (

    `plant_name` char(30) NOT NULL,

    `sensor_value` float DEFAULT NULL,

    `sensor_event` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,

    `sensor_level` char(5) DEFAULT NULL,

    PRIMARY KEY (`plant_name`),

    KEY `plant_name` (`plant_name`)

    ) ENGINE=InnoDB DEFAULT CHARSET=latin1

    ```


    像这样创建的索引不影响表中行的唯一性，即确保特定列（或列组合）的某个值只能访问到唯一的一行。我指的是主键（或主索引）的概念，这是在创建表时使用的一个特殊选项，如前所述。


    ### 视图


    视图是一个或多个表中查询结果的逻辑映射。它们可以像表一样在查询中被引用，这使其成为创建数据子集进行操作的强大工具。你可以使用`CREATE VIEW`来创建视图，并赋予它一个类似表的名称。以下是一个简单示例，我们创建一个测试视图来从表中读取值。在这个例子中，我们限制了视图的大小（行数），但你可以为视图使用各种条件，包括合并来自不同表的数据：


    ```sql

    CREATE VIEW test_plants AS SELECT * FROM plants LIMIT 5;

    ```


    在中小型数据库解决方案中，通常不会遇到视图，但我在这里介绍它们，是为了让你了解其存在，以便在你决定进行额外分析并希望将数据组织成更小的组以便于阅读时使用。


    ### 触发器


    另一个高级概念（以及相关的 SQL 命令）是使用一种事件驱动机制，该机制在数据被更改时“被触发”。也就是说，你可以创建一小段 SQL 命令（一个过程），它将在数据被插入或更改时执行。


    触发器可以在几种事件或条件下执行。你可以在更新、插入或删除操作之前或之后设置一个触发器。触发器与单个表关联，其主体是一个特殊结构，允许你对受影响的行进行操作。以下是一个简单示例：


    ```sql

    DELIMITER //

    CREATE TRIGGER set_level BEFORE INSERT ON plants FOR EACH ROW

    BEGIN

    IF NEW.sensor_value < 0.40 THEN

    SET NEW.sensor_level = ''LOW'';

    ELSEIF NEW.sensor_value < 0.70 THEN

    SET NEW.sensor_level = ''OK'';

    ELSE

    SET NEW.sensor_level = ''HIGH'';

    END IF;

    END //

    DELIMITER ;

    ```


    此触发器将在每次向表中插入数据之前执行。如你在复合语句（`BEGIN`…`END`）中所见，我们根据`sensor_value`的值将名为`sensor_level`的列设置为`LOW`、`OK`或`HIGH`。为了看到实际效果，请考虑以下命令。`FOR
    EACH ROW`语法允许触发器作用于事务中的所有行：


    ```sql

    INSERT INTO plants (plant_name, sensor_value) VALUES (''plant1'', 0.5544);

    ```


    由于我们提供的值（0.5544）小于中间值（0.70），我们期望触发器会为我们填充`sensor_level`列。以下显示了当触发器触发时，确实发生了这种情况：


    ```sql

    +-------------+--------------+---------------------+--------------+

    | plant_name  | sensor_value | sensor_event        | sensor_level |

    +-------------+--------------+---------------------+--------------+

    | plant1      |       0.5544 | 2015-09-23 20:00:15 | OK           |

    +-------------+--------------+---------------------+--------------+

    1 row in set (0.00 sec)

    ```


    这展示了一种有趣而强大的方式，你可以利用数据库服务器的能力创建派生列，从而节省应用程序中的处理能力和代码。我鼓励你考虑利用这个以及类似强大的概念，来充分发挥数据库服务器的能力。

    '
- fmt: '### Simple Joins


    数据库系统最强大的概念之一是能够建立数据之间的关系（因此得名“关系型”）。也就是说，一张表中的数据可以引用另一张（或几张）表中的数据。最简单的形式被称为主从关系，即一张表中的一行引用或关联到另一张表中的一个或多个行。


    主从关系一个常见（且经典）的例子来自订单跟踪系统，其中一张表包含订单数据，另一张表包含该订单的明细项。这样，我们可以将客户编号和配送信息等订单信息只存储一次，并在检索订单本身时对表进行“连接”。


    让我们看一个来自名为 `world` 的示例数据库的例子。你可以在 MySQL 网站上找到这个数据库（`http://dev.mysql.com/doc/index-other.xhtml`）。可以自由下载它以及任何其他示例数据库。它们都展示了数据库系统的各种设计。在练习查询数据时你也会发现它很方便，因为它包含了不只几行的简单数据。


    #### Note


    如果你想运行下面的例子，需要按照示例文档中的描述安装 `world` 数据库（`http://dev.mysql.com/doc/world-setup/en/world-setup-installation.xhtml`）。


    清单 3-9 展示了一个简单连接的例子。这里有很多内容，所以请花点时间检查 `SELECT` 语句的各个部分，特别是我是如何指定 `JOIN` 子句的。你可以忽略
    `LIMIT` 选项，因为它只是限制结果集中的行数。


    ```sql

    mysql> USE world;

    mysql> SELECT Name, Continent, Language FROM Country JOIN CountryLanguage ON Country.Code
    = CountryLanguage.CountryCode LIMIT 10;

    +-------------+---------------+------------+

    | Name        | Continent     | Language   |

    +-------------+---------------+------------+

    | Aruba       | North America | Dutch      |

    | Aruba       | North America | English    |

    | Aruba       | North America | Papiamento |

    | Aruba       | North America | Spanish    |

    | Afghanistan | Asia          | Balochi    |

    | Afghanistan | Asia          | Dari       |

    | Afghanistan | Asia          | Pashto     |

    | Afghanistan | Asia          | Turkmenian |

    | Afghanistan | Asia          | Uzbek      |

    | Angola      | Africa        | Ambo       |

    +-------------+---------------+------------+

    10 rows in set (0.00 sec)

    ```


    **Listing 3-9**

    **Simple JOIN Example**


    这里我使用了一个 `JOIN` 子句，它指定了两张表，使得第一张表通过一个特定的列及其值与第二张表进行连接（`ON` 指定了匹配条件）。数据库服务器所做的是读取表中的每一行，并仅返回那些在指定列上匹配的行。任一表中不在另一表中的行都不会被返回。


    #### Tip


    你可以通过不同的连接来检索那些行。请参阅在线参考手册 `https://dev.mysql.com/doc/refman/8.0/en/join.xhtml`，以获取关于可能的连接类型（包括内连接和外连接）的更多详细信息。


    还要注意，我只包含了少数几个列。在这个例子中，我从 `Country` 表中指定了国家名称和所在大陆，从 `CountryLanguage` 表中指定了语言列。如果列名不是唯一的（相同的列出现在每个表中），我必须通过表名来指定它们，例如
    `Country.Name`。事实上，始终以这种方式限定列被认为是良好的实践。


    这个例子中有一个我感觉需要指出的有趣反常现象。事实上，有些人会认为这是一个设计缺陷。注意在 `JOIN` 子句中，我为每个表指定了表名和列名。这是正常且正确的，但注意列名在两张表中并不匹配。虽然这真的无关紧要，只会造成一点点额外的输入，但一些数据库管理员会认为这是错误的，并希望将公共列名在两个表中设为相同。


    连接的另一个用途是检索公共的、存档的或查找数据。例如，假设你有一个表存储那些不变（或很少变化）的事物的详细信息，例如与邮政编码关联的城市或与身份证号码（例如
    SSN）关联的姓名。你可以将这些信息存储在另一个单独的表中，并在需要时通过一个公共列（及其值）连接数据。在这种情况下，那个公共列可以被用作外键，这是另一个高级概念。


    外键用于维护数据完整性（即，如果你在一张表中有关联到另一张表的数据，但这种关系需要保持一致）。例如，如果你想确保在删除主表行时，所有从表行也被删除，你可以在主表中声明一个外键，指向从表的一列（或多列）。请参阅在线参考手册以获取关于外键的更多信息。


    这次关于连接的讨论只触及了最基础的部分。确实，连接可以说是数据库系统中最困难且常常被混淆的领域之一。如果你发现你想使用连接来组合多张表或扩展数据，以便数据从多个表中提供（外连接），你应该花些时间深入研究数据库概念，例如
    Clare Churcher 的书 *Beginning Database Design*（Apress，2012）。'
  raw: '### Simple Joins


    One of the most powerful concepts of database systems is the ability to make relationships
    (hence the name relational) among the data. That is, data in one table can reference
    data in another (or several tables). The most simplistic form of this is called
    a master-detail relationship where a row in one table references or is related
    to one or more rows in another.


    A common (and classic) example of a master-detail relationship is from an order-tracking
    system where we have one table containing the data for an order and another table
    containing the line items for the order. Thus, we store the order information
    such as customer number and shipping information once and combine or “join” the
    tables when we retrieve the order proper.


    Let’s look at an example from the sample database named world. You can find this
    database on the MySQL website ([`http://dev.mysql.com/doc/index-other.xhtml`](http://dev.mysql.com/doc/index-other.xhtml)).
    Feel free to download it and any other sample database. They all demonstrate various
    designs of database systems. You will also find it handy to practice querying
    the data as it contains more than a few, simple rows.


    Note


    If you want to run the following examples, you need to install the world database
    as described in the documentation for the example ([`http://dev.mysql.com/doc/world-setup/en/world-setup-installation.xhtml`](http://dev.mysql.com/doc/world-setup/en/world-setup-installation.xhtml)).


    Listing [3-9](#527055_1_En_3_Chapter.xhtml#PC29) shows an example of a simple
    join. There is a lot going on here, so take a moment to examine the parts of the
    `SELECT` statement, especially how I specified the `JOIN` clause. You can ignore
    the `LIMIT` option because that simply limits the number of rows in the result
    set.


    ```

    mysql> USE world;

    mysql> SELECT Name, Continent, Language FROM Country JOIN CountryLanguage ON Country.Code
    = CountryLanguage.CountryCode LIMIT 10;

    +-------------+---------------+------------+

    | Name        | Continent     | Language   |

    +-------------+---------------+------------+

    | Aruba       | North America | Dutch      |

    | Aruba       | North America | English    |

    | Aruba       | North America | Papiamento |

    | Aruba       | North America | Spanish    |

    | Afghanistan | Asia          | Balochi    |

    | Afghanistan | Asia          | Dari       |

    | Afghanistan | Asia          | Pashto     |

    | Afghanistan | Asia          | Turkmenian |

    | Afghanistan | Asia          | Uzbek      |

    | Angola      | Africa        | Ambo       |

    +-------------+---------------+------------+

    10 rows in set (0.00 sec)

    Listing 3-9

    Simple JOIN Example

    ```


    Here I used a `JOIN` clause that takes two tables specified such that the first
    table is joined to the second table using a specific column and its values (the
    `ON` specifies the match). What the database server does is read each row from
    the tables and returns only those rows where the value in the columns specified
    a match. Any rows in one table that are not in the other are not returned.


    Tip


    You can retrieve those rows with different joins. See the online reference manual
    at [`https://dev.mysql.com/doc/refman/8.0/en/join.xhtml`](https://dev.mysql.com/doc/refman/8.0/en/join.xhtml)
    for more information about the types of joins possible including the inner and
    outer joins for more details.


    Notice also that I included only a few columns. In this case, I specified the
    country name and continent from the `Country` table and the language column from
    the `CountryLanguage` table. If the column names were not unique (the same column
    appears in each table), I would have to specify them by table name such as `Country.Name`.
    In fact, it is considered good practice to always qualify the columns in this
    manner.


    There is one interesting anomaly in this example that I feel important to point
    out. In fact, some would consider it a design flaw. Notice in the `JOIN` clause
    I specified the table and column for each table. This is normal and correct but
    notice the column name does not match in both tables. While this really doesn’t
    matter, and creates only a bit of extra typing, some DBAs would consider this
    erroneous and would have a desire to make the common column name the same in both
    tables.


    Another use for a join is to retrieve common, archival, or lookup data. For example,
    suppose you had a table that stored details about things that do not change (or
    rarely change) such as cities associated with ZIP codes or names associated with
    identification numbers (e.g., SSN). You could store this information in a separate
    table and join the data on a common column (and values) whenever you needed. In
    this case, that common column can be used as a foreign key, which is another advanced
    concept.


    Foreign keys are used to maintain data integrity (i.e., if you have data in one
    table that relates to another table, but the relationship needs to be consistent).
    For example, if you wanted to make sure when you delete the master row that all
    of the detail rows are also deleted, you could declare a foreign key in the master
    table to a column (or columns) to the detail table. See the online reference manual
    for more information about foreign keys.


    This discussion on joins touches only the very basics. Indeed, joins are arguably
    one of the most difficult and often confused areas in database systems. If you
    find you want to use joins to combine several tables or extend data so that data
    is provided from several tables (outer joins), you should spend some time with
    an in-depth study of database concepts such as Clare Churcher’s book *Beginning
    Database Design* (Apress, 2012).'
