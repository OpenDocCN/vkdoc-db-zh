  trans: '### 如何获取与安装 MySQL


    MySQL 服务器适用于多种平台，包括大多数 Linux 和 Unix 平台、Mac OS X 以及 Windows。它可作为社区版下载（开源）或作为授权产品（企业版）提供。您可以直接从
    Oracle 下载社区版，或通过您的 Oracle 账户下载企业版。本章中，我们将使用社区版。


    要下载 MySQL 8 的社区版，请访问 [`www.mysql.com/downloads/`](http://www.mysql.com/downloads/)，向下滚动并点击
    *MySQL 社区版（GPL）下载*，然后点击 *MySQL 社区服务器*。页面将自动检测您的操作系统。如果您想为其他平台下载，可以从下拉列表中选择。


    下载页面将列出多个可供下载的文件。根据您的平台，您可能会看到几个选项，包括压缩文件、源代码和安装包。大多数用户会选择在笔记本电脑或台式计算机上安装的安装包。图
    3-2 展示了 macOS 平台各种下载选项的示例。


    ![](img/527055_1_En_3_Fig2_HTML.png)


    一张截图描绘了通用可用版本选项卡，显示了可下载的 macOS 11 示例。列出了版本和文件大小。下载按钮在右侧。


    图 3-2


    macOS 下载页面


    最受欢迎的平台之一是 Microsoft Windows。Oracle 为 Windows 提供了一个名为 Windows 安装程序的特殊安装包。该包包含社区许可下所有可用的
    MySQL 产品，包括 MySQL 服务器、Workbench、实用工具以及所有可用的连接器（用于连接到 MySQL 的程序库）。这使得在 Windows
    上安装变成了一站式、一次完成的事情。图 3-3 展示了 Windows 安装程序的下载页面。


    ![](img/527055_1_En_3_Fig3_HTML.png)


    通用可用版本选项卡的截图显示了适用于 Windows 的 My S Q L 安装程序，底部也提供了其他下载选项。


    图 3-3


    Windows 安装程序下载页面


    我们在图片中 Windows 安装程序下载链接下方看到这些内容。您可以选择 Windows 安装程序的 32 位或 64 位安装。请注意，该包可能只是一个包含服务器代码的
    `.zip` 文件。在这种情况下，您可能需要从解压后的文件夹运行服务器，或进行本地手动安装。


    如果您想跟随本章的示例进行操作，应考虑在您的 PC 或本地网络中的另一台 PC 上安装 MySQL。虽然使用 MDS 时您无需进行任何安装或配置，但我们可以通过本地安装来了解一些关于
    MySQL 的知识，这样我们就可以随时使用它而无需产生成本。


    安装 MySQL 非常简单，一旦您下载了适用于您平台的正确软件包，只需几分钟即可完成。只需像安装该平台上的任何其他软件一样安装服务器和任何子组件。如果您需要分步说明，可以参考在线参考手册
    ([`https://dev.mysql.com/doc/refman/8.0/en/installing.xhtml`](https://dev.mysql.com/doc/refman/8.0/en/installing.xhtml))。


    出于实验目的，您可以使用默认设置安装 MySQL。更具体地说，采用标准安装。如果您想为不同的环境进行预配置，随时可以重新安装。在安装过程中，系统可能会要求您为
    root 用户提供密码。请务必遵循密码选择的最佳实践。


    好的，现在我们已经安装了 MySQL 8 服务器，我们可以开始配置服务器以供使用。使用 MDS 时，您无需执行以下任何操作，但了解有关 MySQL 如何配置以及如何向用户账户授予权限总是有好处的。


    ### 配置与管理 MySQL 访问权限


    既然您已在本地安装了 MySQL，让我们简要讨论一下如何配置 MySQL、如何向他人授予服务器（和数据库）的访问权限，以及如何设置 X 插件（启用文档存储的关键组件）。我们首先了解一下用于定义
    MySQL 行为并配置选项的配置文件。


    #### 配置文件


    在 MySQL 中配置启动选项和变量的主要方法是使用一个名为 `my.cnf`（在 Windows 上为 `my.ini`）的文本文件。该文件通常位于 Posix
    系统上的 `/etc` 文件夹中。例如，在 macOS 上，该文件名为 `/etc/my.cnf`。清单 3-5 展示了一个典型 MySQL 配置文件的前几十行。


    ```sql

    # 小型系统的 MySQL 配置文件示例。

    # 以下选项将传递给所有 MySQL 客户端

    [client]

    port            = 3306

    socket          = /tmp/mysql.sock

    # 以下是一些特定程序的配置项

    # MySQL 服务器

    [mysqld]

    port            = 3306

    socket          = /tmp/mysql.sock

    skip-external-locking

    key_buffer_size = 16K

    max_allowed_packet = 1M

    table_open_cache = 4

    sort_buffer_size = 64K

    read_buffer_size = 256K

    read_rnd_buffer_size = 256K

    net_buffer_length = 2K

    thread_stack = 1024K

    ...

    innodb_log_file_size = 5M

    innodb_log_buffer_size = 8M

    innodb_flush_log_at_trx_commit = 1

    innodb_lock_wait_timeout = 50

    innodb_log_files_in_group = 2

    slow-query-log

    general-log

    ...

    ```


    清单 3-5


    MySQL 配置文件摘录


    请注意，我们使用方括号 `[]` 定义的节来分组设置。例如，我们看到一个名为 `[client]` 的节，用于定义读取配置文件的任何 MySQL 客户端的选项。同样，我们看到一个名为
    `[mysqld]` 的节，它适用于服务器进程（因为可执行文件名为 `mysqld`）。还要注意，我们看到了基本选项的设置，如端口、套接字等。但是，我们也可以使用配置文件为
    InnoDB、复制等设置选项。


    我建议找到并浏览您安装的配置文件，以便查看选项及其值。如果您遇到需要更改选项的情况——比如为了测试效果或进行实验——您可以使用 `SET` 命令来更改值，可以作为全局设置（影响所有连接）或会话设置（仅适用于当前连接）。


    但是，如果您更改了一个同时在配置文件中的全局设置，该值（状态）将仅保留到服务器重新启动。因此，如果您希望保留全局更改，应考虑将它们放在配置文件中。


    相反，在会话级别设置值可能对有限时间有益，或者您可能只想为特定任务执行此操作。例如，以下代码关闭了二进制日志，执行一个或多个 SQL 命令，然后再打开二进制日志。这是一个简单但深刻的示例，说明如何在参与复制的服务器上执行操作而不影响其他服务器：


    ```sql

    SET sql_log_bin=0;


    SET sql_log_bin=1;

    ```


    有关配置文件以及如何使用它来配置 MySQL 8 的更多信息，包括使用多个选项文件以及这些文件在每个平台上的位置，请参阅在线参考手册 ([`http://dev.mysql.com/doc/refman/8.0/en/`](http://dev.mysql.com/doc/refman/8.0/en/))
    中题为“使用选项文件”的部分。'
- fmt: '#### Creating Users and Granting Access


    There are two additional administrative operations you need to understand before
    working with MySQL: creating user accounts and granting access to databases. You
    must first issue a `CREATE USER` command followed by one or more `GRANT` commands.
    For example, the following shows the creation of a user named `hvac_user1` and
    grants the user access to the database `room_temp`:


    ```

    CREATE USER ''hvac_user1''@''%'' IDENTIFIED BY ''secret'';

    GRANT SELECT, INSERT, UPDATE ON room_temp.* TO ''hvac_user1''@''%'';

    ```


    The first command creates the user named `hvac_user1`, but the name also has an
    `@` followed by another string. This second string is the host name of the machine
    with which the user is associated. That is, each user in MySQL has both a username
    and a host name, in the form `user@host`, to uniquely identify them. That means
    the user and host `hvac_user1@10.0.1.16` and the user and host `hvac_user1@10.0.1.17`
    are not the same. However, the `%` symbol can be used as a wildcard to associate
    the user with any host. The `IDENTIFIED BY` clause sets the password for the user.


    ## A Note About Security


    It is always a good idea to create a user for your application that does not have
    full access to the MySQL system. This is so you can minimize any accidental changes
    and also to prevent exploitation. For example, it is recommended that you create
    a user with access only to those databases where you store (or retrieve) data.
    Also be careful about using the wildcard `%` for the host. Although it makes it
    easier to create a single user and let the user access the database server from
    any host, it also makes it much easier for someone bent on malice to access your
    server (once they discover the password).


    The second command allows access to databases. There are many privileges that
    you can give a user. The example shows the most likely set that you would want
    to give a user of a sensor network database: read (`SELECT`), add data (`INSERT`),
    and change data (`UPDATE`). See the online reference manual for more about security
    and account access privileges. The command also specifies a database and objects
    to which to grant the privilege. Thus, it is possible to give a user read (`SELECT`)
    privileges to some tables and write (`INSERT`, `UPDATE`) privileges to other tables.
    This example gives the user access to all objects (tables, views, and so on) in
    the `room_temp` database.


    ## Basic SQL Commands


    If you have never used a database system, learning and mastering the system requires
    training, experience, and a good deal of perseverance. Chief among the knowledge
    needed to become proficient is how to use the common SQL commands and concepts.
    This section completes the primer on MySQL by introducing the most common MySQL
    commands and concepts as a foundation for learning how to use the Document Store.


    > **Note**

    > Rather than replicate the reference manual, this section introduces the commands
    and concepts at a high level. If you decide to use any of the commands or concepts,
    please refer to the online reference manual for additional details, complete command
    syntax, and additional examples.


    This section reviews the most common SQL and MySQL-specific commands that you
    will need to know to get the most out of your MySQL server databases. While you
    have already seen some of these in action, this section provides additional information
    to help you use them.


    One important rule to understand is user-supplied variable names are case sensitive
    and obey case sensitivity of the host platform. Check the online reference manual
    for your platform to see how case sensitivity affects user-supplied variables.


    > **Note**

    > Most of the example queries in this section are taken from an Internet of Things
    (IoT) application where data is recorded from one or more sensors and devices.
    Regardless, the examples represent typical ways we interact with MySQL via SQL
    statements.


    ### Creating Databases and Tables


    The most basic commands you will need to learn, and master are the `CREATE DATABASE`
    and `CREATE TABLE` commands. Recall that database servers such as MySQL allow
    you to create any number of databases that you can add tables and store data in
    a logical manner.


    To create a database, use `CREATE DATABASE` followed by a name for the database.
    If you are using the MySQL client, you must use the `USE` command to switch to
    a specific database. The client focus is the latest database specified either
    at startup (on the command line) or via the `USE` command.


    You can override this by referencing the database name first. For example, `SELECT
    * FROM db1.table1` will execute regardless of the default database set. However,
    leaving off the database name will cause the `mysql` client to use the default
    database. The following shows two commands to create and change the focus of the
    database:


    ```

    mysql> CREATE DATABASE greenhouse;

    mysql> USE greenhouse;

    ```


    > **Tip**

    > If you want to see all the databases on the server, use the `SHOW DATABASES`
    command.


    Creating a table requires the, yes, `CREATE TABLE` command. This command has many
    options allowing you to specify not only the columns and their data types but
    also additional options such as indexes, foreign keys, and so on. An index can
    also be created using the `CREATE INDEX` command (see the following code). The
    following shows how to create a simple table for storing plant sensor data like
    what may be used for monitoring a personal greenhouse:


    ```

    CREATE TABLE `greenhouse`.`plants` (

    `plant_name` char(30) NOT NULL,

    `sensor_value` float DEFAULT NULL,

    `sensor_event` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,

    `sensor_level` char(5) DEFAULT NULL,

    PRIMARY KEY `plant_name` (`plant_name`)

    ) ENGINE=InnoDB DEFAULT CHARSET=latin1;

    ```


    Notice here that I specified the table name (`plants`) and four columns (`plant_name`,
    `sensor_value`, `sensor_event`, and `sensor_level`). I used several data types.
    For `plant_name`, I used a character field with a maximum of 30 characters, a
    floating-point data type for `sensor_value`, a timestamp value for `sensor_event`,
    and another character field for `sensor_level` of five characters.


    The `TIMESTAMP` data type is of particular use any time you want to record the
    date and time of an event or action. For example, it is often helpful to know
    when a sensor value is read. By adding a `TIMESTAMP` column to the table, you
    do not need to calculate, read, or otherwise format a date and time when the value
    is inserted into the database table.


    Notice also that I specified that the `plant_name` column be defined as a key,
    which creates an index. In this case, it is also the primary key. The `PRIMARY
    KEY` phrase tells the server to ensure there exists one and only one row in the
    table that matches the value of the column. You can specify several columns to
    be used in the primary key by repeating the keyword. Note that all primary key
    columns must not permit nulls (`NOT NULL`).


    If you cannot determine a set of columns that uniquely identify a row (and you
    want such a behavior – some favor tables without this restriction, but a good
    DBA would not), you can use an artificial data type option for integer fields
    called `AUTO INCREMENT`. When used on a column (must be the first column), the
    server automatically increases this value for each row inserted. In this way,
    it creates a default primary key. For more information about auto increment columns,
    see the online reference manual.


    Best practices suggest using a primary key on a character field to be suboptimal
    in some situations such as tables with large values for each column or many unique
    values. This can make searching and indexing slower. In this case, you could use
    an auto increment field to artificially add a primary key that is smaller in size
    (but somewhat more cryptic).'
  raw: '#### Creating Users and Granting Access


    There are two additional administrative operations you need to understand before
    working with MySQL: creating user accounts and granting access to databases. You
    must first issue a `CREATE USER` command followed by one or more `GRANT` commands.
    For example, the following shows the creation of a user named `hvac_user1` and
    grants the user access to the database `room_temp`:


    ```

    CREATE USER ''hvac_user1''@''%'' IDENTIFIED BY ''secret'';

    GRANT SELECT, INSERT, UPDATE ON room_temp.* TO ''hvac_user1''@''%'';

    ```


    The first command creates the user named `hvac_user1`, but the name also has an
    `@` followed by another string. This second string is the host name of the machine
    with which the user is associated. That is, each user in MySQL has both a username
    and a host name, in the form `user@host`, to uniquely identify them. That means
    the user and host `hvac_user1@10.0.1.16` and the user and host `hvac_user1@10.0.1.17`
    are not the same. However, the `%` symbol can be used as a wildcard to associate
    the user with any host. The `IDENTIFIED BY` clause sets the password for the user.


    A Note About Security


    It is always a good idea to create a user for your application that does not have
    full access to the MySQL system. This is so you can minimize any accidental changes
    and also to prevent exploitation. For example, it is recommended that you create
    a user with access only to those databases where you store (or retrieve) data.


    Also be careful about using the wildcard % for the host. Although it makes it
    easier to create a single user and let the user access the database server from
    any host, it also makes it much easier for someone bent on malice to access your
    server (once they discover the password).


    The second command allows access to databases. There are many privileges that
    you can give a user. The example shows the most likely set that you would want
    to give a user of a sensor network database: read (`SELECT`), add data (`INSERT`),
    and change data (`UPDATE`). See the online reference manual for more about security
    and account access privileges.


    The command also specifies a database and objects to which to grant the privilege.
    Thus, it is possible to give a user read (`SELECT`) privileges to some tables
    and write (`INSERT`, `UPDATE`) privileges to other tables. This example gives
    the user access to all objects (tables, views, and so on) in the `room_temp` database.


    ## Basic SQL Commands


    If you have never used a database system, learning and mastering the system requires
    training, experience, and a good deal of perseverance. Chief among the knowledge
    needed to become proficient is how to use the common SQL commands and concepts.
    This section completes the primer on MySQL by introducing the most common MySQL
    commands and concepts as a foundation for learning how to use the Document Store.


    Note


    Rather than replicate the reference manual, this section introduces the commands
    and concepts at a high level. If you decide to use any of the commands or concepts,
    please refer to the online reference manual for additional details, complete command
    syntax, and additional examples.


    This section reviews the most common SQL and MySQL-specific commands that you
    will need to know to get the most out of your MySQL server databases. While you
    have already seen some of these in action, this section provides additional information
    to help you use them.


    One important rule to understand is user-supplied variable names are case sensitive
    and obey case sensitivity of the host platform. Check the online reference manual
    for your platform to see how case sensitivity affects user-supplied variables.


    Note


    Most of the example queries in this section are taken from an Internet of Things
    (IoT) application where data is recorded from one or more sensors and devices.
    Regardless, the examples represent typical ways we interact with MySQL via SQL
    statements.


    ### Creating Databases and Tables


    The most basic commands you will need to learn, and master are the `CREATE DATABASE`
    and `CREATE TABLE` commands. Recall that database servers such as MySQL allow
    you to create any number of databases that you can add tables and store data in
    a logical manner.


    To create a database, use `CREATE DATABASE` followed by a name for the database.
    If you are using the MySQL client, you must use the `USE` command to switch to
    a specific database. The client focus is the latest database specified either
    at startup (on the command line) or via the `USE` command.


    You can override this by referencing the database name first. For example, `SELECT
    * FROM db1.table1` will execute regardless of the default database set. However,
    leaving off the database name will cause the `mysql` client to use the default
    database. The following shows two commands to create and change the focus of the
    database:


    ```

    mysql> CREATE DATABASE greenhouse;

    mysql> USE greenhouse;

    ```


    Tip


    If you want to see all the databases on the server, use the `SHOW DATABASES` command.


    Creating a table requires the, yes, `CREATE TABLE` command. This command has many
    options allowing you to specify not only the columns and their data types but
    also additional options such as indexes, foreign keys, and so on. An index can
    also be created using the `CREATE INDEX` command (see the following code). The
    following shows how to create a simple table for storing plant sensor data like
    what may be used for monitoring a personal greenhouse:


    ```

    CREATE TABLE `greenhouse`.`plants` (

    `plant_name` char(30) NOT NULL,

    `sensor_value` float DEFAULT NULL,

    `sensor_event` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,

    `sensor_level` char(5) DEFAULT NULL,

    PRIMARY KEY `plant_name` (`plant_name`)

    ) ENGINE=InnoDB DEFAULT CHARSET=latin1;

    ```


    Notice here that I specified the table name (`plants`) and four columns (`plant_name`,
    `sensor_value`, `sensor_event`, and `sensor_level`). I used several data types.
    For `plant_name`, I used a character field with a maximum of 30 characters, a
    floating-point data type for `sensor_value`, a timestamp value for `sensor_event`,
    and another character field for `sensor_level` of five characters.


    The `TIMESTAMP` data type is of particular use any time you want to record the
    date and time of an event or action. For example, it is often helpful to know
    when a sensor value is read. By adding a `TIMESTAMP` column to the table, you
    do not need to calculate, read, or otherwise format a date and time when the value
    is inserted into the database table.


    Notice also that I specified that the `plant_name` column be defined as a key,
    which creates an index. In this case, it is also the primary key. The `PRIMARY
    KEY` phrase tells the server to ensure there exists one and only one row in the
    table that matches the value of the column. You can specify several columns to
    be used in the primary key by repeating the keyword. Note that all primary key
    columns must not permit nulls (`NOT NULL`).


    If you cannot determine a set of columns that uniquely identify a row (and you
    want such a behavior – some favor tables without this restriction, but a good
    DBA would not), you can use an artificial data type option for integer fields
    called `AUTO INCREMENT`. When used on a column (must be the first column), the
    server automatically increases this value for each row inserted. In this way,
    it creates a default primary key. For more information about auto increment columns,
    see the online reference manual.


    Best practices suggest using a primary key on a character field to be suboptimal
    in some situations such as tables with large values for each column or many unique
    values. This can make searching and indexing slower. In this case, you could use
    an auto increment field to artificially add a primary key that is smaller in size
    (but somewhat more cryptic).'
  trans: '

    #### 创建用户与授予访问权限


    在使用 MySQL 之前，你还需要了解两个额外的管理操作：创建用户账户以及授予数据库访问权限。你必须首先发出 `CREATE USER` 命令，然后执行一个或多个
    `GRANT` 命令。例如，下面展示了创建一个名为 `hvac_user1` 的用户并授予其访问 `room_temp` 数据库的权限：


    ```

    CREATE USER ''hvac_user1''@''%'' IDENTIFIED BY ''secret'';

    GRANT SELECT, INSERT, UPDATE ON room_temp.* TO ''hvac_user1''@''%'';

    ```


    第一条命令创建了名为 `hvac_user1` 的用户，但用户名中还包含一个 `@` 符号及其后的字符串。这第二个字符串是用户关联的主机名。也就是说，MySQL
    中的每个用户都有一个用户名和一个主机名，以 `user@host` 的形式来唯一标识他们。这意味着用户和主机 `hvac_user1@10.0.1.16`
    与用户和主机 `hvac_user1@10.0.1.17` 并不是同一个。然而，`%` 符号可以作为通配符，用于将用户关联到任何主机。`IDENTIFIED
    BY` 子句用于设置该用户的密码。


    ## 关于安全性的说明


    为你的应用程序创建一个不具有 MySQL 系统完全访问权限的用户总是一个好主意。这样可以最大限度地减少意外更改，并防止被利用。例如，建议你创建一个用户，仅授予其访问你存储（或检索）数据的那些数据库的权限。同时，在使用主机通配符
    `%` 时要小心。虽然它使得创建单个用户并让该用户可以从任何主机访问数据库服务器变得更容易，但它也使得那些心怀恶意的人（一旦他们发现了密码）能够更容易地访问你的服务器。


    第二条命令授予了数据库访问权限。你可以授予用户的权限有很多。该示例展示了你可能最想授予传感器网络数据库用户的一组权限：读取（`SELECT`）、添加数据（`INSERT`）和更改数据（`UPDATE`）。有关安全性和账户访问权限的更多信息，请参阅在线参考手册。该命令还指定了授予权限的数据库和对象。因此，可以授予用户对某些表的读取（`SELECT`）权限，以及对其他表的写入（`INSERT`、`UPDATE`）权限。此示例授予用户访问
    `room_temp` 数据库中所有对象（表、视图等）的权限。


    ## 基本 SQL 命令


    如果你从未使用过数据库系统，学习和掌握它需要培训、经验和大量的毅力。要达到精通所需的知识中，最重要的是如何使用常见的 SQL 命令和概念。本节通过介绍最常见的
    MySQL 命令和概念来完成 MySQL 入门，以此作为学习如何使用文档存储的基础。


    > **注意**

    > 本节并非复制参考手册，而是在较高层次上介绍这些命令和概念。如果你决定使用任何命令或概念，请参阅在线参考手册以获取更多细节、完整的命令语法以及其他示例。


    本节回顾了最常见的 SQL 和 MySQL 特有的命令，你需要了解这些命令才能充分利用你的 MySQL 服务器数据库。虽然你已经看到过其中一些命令的实际应用，但本节提供了额外的信息来帮助你使用它们。


    需要理解的一个重要规则是，用户提供的变量名是区分大小写的，并且遵循主机平台的大小写敏感性。请查看你平台的在线参考手册，了解大小写敏感性如何影响用户提供的变量。


    > **注意**

    > 本节中的大多数示例查询都来自物联网（IoT）应用程序，其中一个或多个传感器和设备记录数据。尽管如此，这些示例代表了我们通过 SQL 语句与 MySQL
    交互的典型方式。


    ### 创建数据库和表


    你需要学习和掌握的最基本的命令是 `CREATE DATABASE` 和 `CREATE TABLE` 命令。回想一下，像 MySQL 这样的数据库服务器允许你创建任意数量的数据库，你可以在其中添加表并以逻辑方式存储数据。


    要创建数据库，请使用 `CREATE DATABASE` 后跟数据库的名称。如果你正在使用 MySQL 客户端，你必须使用 `USE` 命令切换到特定的数据库。客户端的焦点是最近指定的数据库，无论是通过启动时（在命令行上）还是通过
    `USE` 命令指定的。


    你可以通过首先引用数据库名称来覆盖此设置。例如，`SELECT * FROM db1.table1` 将无论设置的默认数据库如何都会执行。然而，省略数据库名称将导致
    `mysql` 客户端使用默认数据库。下面显示了两条命令，用于创建数据库和更改数据库焦点：


    ```

    mysql> CREATE DATABASE greenhouse;

    mysql> USE greenhouse;

    ```


    > **提示**

    > 如果你想查看服务器上的所有数据库，请使用 `SHOW DATABASES` 命令。


    创建一个表需要，没错，就是 `CREATE TABLE` 命令。这个命令有很多选项，不仅允许你指定列及其数据类型，还可以指定其他选项，如索引、外键等。也可以使用
    `CREATE INDEX` 命令创建索引（见下面的代码）。下面展示了如何创建一个简单的表来存储植物传感器数据，比如可能用于监测个人温室的数据：


    ```

    CREATE TABLE `greenhouse`.`plants` (

    `plant_name` char(30) NOT NULL,

    `sensor_value` float DEFAULT NULL,

    `sensor_event` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,

    `sensor_level` char(5) DEFAULT NULL,

    PRIMARY KEY `plant_name` (`plant_name`)

    ) ENGINE=InnoDB DEFAULT CHARSET=latin1;

    ```


    注意这里我指定了表名（`plants`）和四列（`plant_name`, `sensor_value`, `sensor_event` 和 `sensor_level`）。我使用了几种数据类型。对于
    `plant_name`，我使用了一个最多 30 个字符的字符字段，为 `sensor_value` 使用了浮点数据类型，为 `sensor_event`
    使用了时间戳值，为 `sensor_level` 使用了另一个 5 个字符的字符字段。


    `TIMESTAMP` 数据类型在你想记录事件或动作的日期和时间的任何时候都特别有用。例如，了解传感器值何时被读取通常很有帮助。通过向表中添加 `TIMESTAMP`
    列，你不需要在将值插入数据库表时计算、读取或以其他方式格式化日期和时间。


    还要注意，我指定将 `plant_name` 列定义为键，这会创建一个索引。在这种情况下，它也是主键。`PRIMARY KEY` 短语告诉服务器确保表中存在且仅存在一行与该列的值匹配。你可以通过重复关键字来指定多个列用于主键。请注意，所有主键列都必须不允许为空（`NOT
    NULL`）。


    如果你无法确定一组能唯一标识一行的列（而你希望有这样的行为——有些表没有此限制，但好的 DBA 不会这样），你可以使用一个适用于整数字段的人工数据类型选项，称为
    `AUTO INCREMENT`。当用于一个列（必须是第一列）时，服务器会自动为插入的每一行递增此值。这样，它就创建了一个默认的主键。有关自动递增列的更多信息，请参阅在线参考手册。


    最佳实践建议，在某些情况下，例如在每列值很大或有许多唯一值的表上，在字符字段上使用主键可能不是最优的。这可能会使搜索和索引变慢。在这种情况下，你可以使用一个自动递增字段来人为地添加一个更小（但有些晦涩）的主键。

