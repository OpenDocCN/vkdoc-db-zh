  trans: '

    ### 步骤 1：创建虚拟云网络


    由于我们已经在第 2 章中创建了一个虚拟云网络 (`oci-tutorial-vcn`)，我们将继续使用它。如果你想创建另一个，也可以操作。同样地，如果你已经终止了该虚拟云网络，则需要重新创建它。只需按照第
    2 章的演示，使用相同的设置创建一个虚拟云网络（使用不同的名称）。简而言之，你需要在云控制台中打开主菜单，然后选择 `网络`，接着选择 `虚拟云网络`，然后点击
    `启动虚拟云网络向导` 按钮来开始此过程。


    ### 步骤 2：创建用户组


    接下来的步骤是我们见过的。在 OCI 中，你可以创建用户和用户组，将用户归入组中，以便设置安全策略。OCI 要求你为使用 MDS 创建一个用户组和一个用户。


    在本教程中，我们将创建一个包含单个用户的示例用户组。我们将用户组命名为 `mysql-users`，用户名为 `mysqladmin`。名称并非至关重要，但为它们取一个能暗示其用途的名字是好的。这涉及两个步骤。首先，我们将创建用户组，然后将用户添加到该组中。


    #### 创建用户组


    用户组在域中创建。没有直接的云控制台菜单能带你直达用户组的资源页面；要创建用户组，你必须先打开当前（默认）域的资源页面。为此，请打开云控制台中的主菜单，然后选择
    `身份与安全`，接着点击 `域`。你将看到如图 4-2 所示的域资源页面。


    ![](img/527055_1_En_4_Fig2_HTML.png)


    OCI 教程 compartment 中的一个域资源页面，右侧显示默认域为当前域。左侧，在“身份”下，选择了“域”。


    图 4-2


    域资源页面


    要打开域详情页，只需选择如图所示的“默认”标签。在“默认”域详情页上，点击左侧“身份”菜单中的 `组`，如图 4-3 所示。


    ![](img/527055_1_En_4_Fig3_HTML.jpg)


    云控制台中的身份域菜单列出了概览、用户、组、动态组、应用程序、作业等。其中，“组”选项在一个红色矩形框内高亮显示。


    图 4-3


    默认域详情页


    此时，我们将看到该域的用户组列表。在列表顶部，点击 `创建组` 按钮以开始创建用户组的流程，如图 4-4 所示。


    ![](img/527055_1_En_4_Fig4_HTML.jpg)


    一个表格显示了用户组列表：所有域用户和管理员。左上角的“创建组”被高亮以供选择。


    图 4-4


    用户组列表（默认域）


    在“创建组”对话框中，我们至少需要输入以下信息：


    *   `名称`：为用户组选择一个唯一的名称。名称长度必须在 1 到 100 个字符之间。

    *   `描述`：输入一个说明该用户组用途的描述。

    *   `标签`（可选）：你可以为资源分配一个或多个短文本字符串。你不应存储关键信息或机密信息。


    提示


    OCI 中允许的名称包含以下字符：小写字母 `a`-`z`、大写字母 `A`-`Z`、`0`-`9`、句点 (`.`)、短横线 (`-`) 和下划线 (`_`)。不允许使用空格。


    如果你要跟着操作，我们将使用 `mysql-users` 作为用户组名称，描述为 “`使用 MySQL 数据库系统的用户`”，如图 4-5 所示。我们将不使用标签。


    注意


    如果你暂时不想创建新用户，可以使用你的根用户账户。只需在创建用户组时勾选根用户账户，即可将其添加到该组中。


    准备就绪后，点击 `创建` 按钮，如下所示。


    ![](img/527055_1_En_4_Fig5_HTML.png)


    一个用于创建组的对话框，包含名称、描述、请求用户访问权限以及一个用于列出名字、姓氏和电子邮件地址的表格。底部的“创建”按钮被高亮显示。


    图 4-5


    创建组对话框


    创建用户组只需片刻时间。完成后，你将被重定向到组详情页，如图 4-6 所示。你可以使用 `编辑组` 按钮来编辑用户组和更改参数。你也可以使用 `删除` 按钮（这是与界面中其他地方使用的“终止”一词少见的区别）来删除该用户组。


    ![](img/527055_1_En_4_Fig6_HTML.jpg)


    一个页面在右侧显示了已创建组的详细信息。提供“编辑组”和“添加标签”选项。左侧有一个内部写有字母 G 的蓝色圆圈。


    图 4-6


    组详情页


    现在我们有了用户组，可以创建一个用户并将其添加到该组中。如果你决定将根用户添加到组中，这一步可能是可选的。

    '
- fmt: '## 创建用户并将其添加到组


    即使您是唯一使用 OCI 账户的人，创建新用户也是一个良好的实践，因为这样您可以测试用户如何与您的资源进行交互。这不仅确保您创建的用户能够执行应用程序或使用资源，还能确保您的安全策略定义正确。


    本节中，我们将创建一个新用户并将其添加到组中。您需要输入名称、用户名以及一个有效的电子邮件地址。电子邮件地址是必需信息之一，因为 OCI 将通过电子邮件向用户发送一个链接来设置用户账户密码，这与您的根账户收到通知的方式非常相似。


    要创建用户，您需要导航回 **Default** 域详情页面。回想一下，您可以通过使用云控制台菜单选择 **Identity & Security**，然后单击
    **Domains**，在 Domains 资源页面上选择 **Default** 域来访问此页面。更多详情请参考上文相关章节。


    回到 **Default** 域详情页面后，单击左侧菜单中的 **Users** 项，然后在用户列表中单击 **Create user** 按钮，如图 [4-7](#527055_1_En_4_Chapter.xhtml#Fig7)
    所示。


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig7_HTML.jpg)


    *图 4-7：用户列表（默认域详情页面）*


    接下来，我们将创建一个名为 `Joe User` 的新用户并提供一个有效的电子邮件地址。该对话框允许您使用电子邮件地址作为用户名，但您也可以使用自定义用户名。为此，请取消选中
    **Use the email address as username** 复选框，以便输入 `joeuser` 作为用户名。请务必检查您输入的电子邮件地址是否有效。提示：您可以在此处使用自己的电子邮件地址。这就是为什么我们将登录方式改为使用用户名而不是电子邮件地址。很聪明吧。图
    [4-8](#527055_1_En_4_Chapter.xhtml#Fig8) 显示了填入数据后的创建用户对话框。


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig8_HTML.png)


    *图 4-8：创建用户对话框*


    请注意，我们还可以在同一操作中将用户添加到组！这里，我们只需选择我们之前创建的组 (`mysql-users`)。准备好后，单击 **Create** 按钮以创建用户。一封电子邮件将发送到您提供的电子邮件地址，允许您为新用户设置密码。如果您当前以根账户登录，则必须先注销该账户，然后才能设置/重置密码。


    > **注意**：当您尝试创建 MySQL DB 系统时，要以新用户身份登录，您需要注销根账户，然后使用新用户账户重新登录。


    现在我们已经创建了组和新用户，我们只需要使用安全策略向该组授予某些权限。


    ### 步骤三：创建策略


    最后，我们需要一个安全策略，向组授予某些权限，以便用户可以访问和使用 MySQL 资源。有几种方法可以做到这一点，包括使用云控制台界面来构建我们需要的特定命令，或者我们可以手动输入命令。在本例中，我们将使用手动选项。


    为了满足 MDS 的要求，我们需要为该组分配以下权限：


    *   `SUBNET_READ, SUBNET_ATTACH, SUBNET_DETACH, VCN_READ, COMPARTMENT_INSPECT`：允许组操作子网和
    VCN

    *   `manage mysql-family`：允许组管理 MySQL 资源

    *   `use tag-namespaces`：允许组在租户中使用标签命名空间


    我们将使用 `Allow` 权限语句来授予这些权限，这允许您将权限应用于租户本身或特定 compartment。由于我们将使用 `oci-tutorial-compartment`，我们将在语句中使用该值。但是，最后一个权限是应用于租户的。


    让我们看看如何做到这一点。要创建安全策略，请单击云控制台主菜单，选择 **Identity & Security**，然后单击 **Policies**。这将打开
    Policies 资源页面，如图 [4-9](#527055_1_En_4_Chapter.xhtml#Fig9) 所示。要创建新策略，请单击 **Create
    Policy** 按钮。


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig9_HTML.png)


    *图 4-9：策略资源页面*


    安全策略是在根 compartment 中创建的。您可能在列表范围中选择了 `oci-tutorial-compartment`，但这没关系。我们可以在下一个页面中选择
    compartment。


    创建策略时需要提供以下信息。如果您是跟随操作，以下显示了每个数据项的示例条目：


    *   名称：策略的名称。使用 `mysql-users-policy`。

    *   描述：对该策略提供内容的简短描述。使用 `Allow users to access MySQL DB Systems`。

    *   Compartment：务必选择您的根 compartment。


    我们还需要提供如上所述的策略语句。我们需要的语句格式由 OCI 之前提供的横幅给出。在本例中，以下是建议的策略语句。请注意 `[..|..]` 的使用，这表示我们有一组参数可供选择。在适用的情况下，我们将使用
    `compartment_name` 选项（我们移除其他选项和方括号）。这些语句经过人工格式化以便阅读：


    ```

    Allow group <group_name> to

    {SUBNET_READ, SUBNET_ATTACH, SUBNET_DETACH, VCN_READ, COMPARTMENT_INSPECT}

    in [

    tenancy |

    compartment <compartment_name> |

    compartment id <compartment_OCID>

    ]

    Allow group <group_name> to manage mysql-family in [

    tenancy |

    compartment <compartment_name> |

    compartment id <compartment_OCID>

    ]

    Allow group <group_name> to use tag-namespaces in tenancy

    ```


    我们可以用 `mysql-users` 替换 `<group_name>`，用 `oci-tutorial-compartment` 替换 `<compartment_name>`，如下所示，再次格式化以便阅读：


    ```

    Allow group mysql-users to

    {SUBNET_READ, SUBNET_ATTACH, SUBNET_DETACH, VCN_READ, COMPARTMENT_INSPECT}

    in compartment oci-tutorial-compartment

    Allow group mysql-users to manage mysql-family

    in compartment oci-tutorial-compartment

    Allow group mysql-users to use tag-namespaces in tenancy

    ```


    要将它们添加到“创建策略”对话框中，您需要单击开关 **Shown manual editor** 以获取一个文本框来粘贴这些语句。


    图 [4-10](#527055_1_En_4_Chapter.xhtml#Fig10) 显示了填入数据后的“创建策略”对话框。请务必仔细检查所有内容，包括选择您的根
    compartment，然后单击 **Create** 按钮以创建策略。


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig10_HTML.png)'
  raw: "#### Create and Add a User to the Group\n\nIt is good practice to create new\
    \ users even if you are the only one using your OCI account so that you can test\
    \ how users interact with your resources. Not only does this ensure your users\
    \ can execute applications or use resources you create, but it also ensures your\
    \ security policies are defined correctly.\n\nIn this section, we will create\
    \ a new user and add that user to the group. You will need to enter a name and\
    \ username as well as a valid email address. The email address is among the required\
    \ information because OCI will email the user a link to set the user account password\
    \ very similar to how your root account was notified.\n\nTo create the user, you\
    \ will need to navigate back to the Default domain details page. Recall, you can\
    \ reach this page by using the cloud console menu selecting *Identity & Security*\
    \ then click *Domains* and on the Domains resource page select the *Default* domain.\
    \ Refer to the sections above for more details.\n\nOnce you are back to the Default\
    \ domain details page, click the *Users* entry in the menu on the left and then\
    \ click the *Create user* button in the Users lists as shown in Figure [4-7](#527055_1_En_4_Chapter.xhtml#Fig7).\n\
    \n![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig7_HTML.jpg)\n\nA page of the\
    \ user list in the default domain. Create user button is highlighted and the username\
    \ is listed below on the right. In the identify domain, select users on the left.\n\
    \nFigure 4-7\n\nUsers List (Default Domain Details Page)\n\nNext, we will be creating\
    \ a new user with the name `Joe User` and a valid email address. The dialog is\
    \ designed to allow you to use the email address for the username, but you can\
    \ also use a custom username. To do so, untick the *Use the email address as username*\
    \ checkbox to allow you to enter `joeuser` as the username. Be sure to check to\
    \ make sure the email you entered is a valid email address. Hint: you can use\
    \ your own email address there if you’d like. This is why we changed the login\
    \ to use a username instead of the email address. Smart. Figure [4-8](#527055_1_En_4_Chapter.xhtml#Fig8)\
    \ shows the create user dialog with the data entered.\n\n![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig8_HTML.png)\n\
    \nA dialog box to create a user with the first name, last name, username, and\
    \ email. The table below lists the already created usernames.\n\nFigure 4-8\n\n\
    Create User Dialog\n\nNotice we can also add the user to a group in the same step!\
    \ Here, we simply select the group we created earlier (`mysql-users`) as shown.\
    \ When ready, click the *Create* button to create the user. An email will be sent\
    \ to the email address you provided allowing you to set the password for the new\
    \ user. If you are currently logged in with your root account, you will have to\
    \ logout of that account before the password set/reset will work.\n\nNote\n\n\
    To login as the user when you attempt to create a MySQL DB System, you will need\
    \ to logout of your root account and back in with your new user account.\n\nNow\
    \ that we have the group created and a new user, we only need to grant certain\
    \ privileges to the group using a security policy.\n\n### Step 3: Create Policies\n\
    \nFinally, we will need a security policy that grants certain permissions to the\
    \ group so that users can access and use MySQL resources. There are several ways\
    \ to do this including using the cloud console interface to build the specific\
    \ commands we need, or we can enter the commands manually. We will use the manual\
    \ option in this example.\n\nTo satisfy the requirements for MDS, we need to assign\
    \ the following to the group:\n\n*   `SUBNET_READ, SUBNET_ATTACH, SUBNET_DETACH,\
    \ VCN_READ, COMPARTMENT_INSPECT`: To allow the group to work with subnets and\
    \ VCNs\n\n*   `manage mysql-family`: To allow the group to manage MySQL resources\n\
    \n*   `use tag-namespaces`: To allow the group to use tag-namespaces in the tenancy\n\
    \nWe will be using the `Allow` permission statement to grant these privileges,\
    \ which permits you to apply the privileges to either the tenancy itself or a\
    \ specific compartment. Since we will be using the `oci-tutorial-compartment`,\
    \ we will use that value in the statements. However, the last privilege is applied\
    \ to the tenancy.\n\nLet’s see how we can do this. To create a security policy,\
    \ click on the cloud console main menu, select *Identity & Security* then click\
    \ *Policies*. This will open the Policies resource page as shown in Figure [4-9](#527055_1_En_4_Chapter.xhtml#Fig9).\
    \ To create a new policy, click the *Create Policy* button as shown.\n\n![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig9_HTML.png)\n\
    \nA page displays the policies in the o c i tutorial compartment. Create policy\
    \ button is highlighted below it. Under Identify, select policies on the left\
    \ side. List scope and its compartment are listed.\n\nFigure 4-9\n\nPolicies Resource\
    \ Page\n\nSecurity policies are created in the root compartment. You may have\
    \ the `oci-tutorial-compartment` selected in the List Scope, but that is Ok. We\
    \ can select the compartment in the next page.\n\nThe information we need to provide\
    \ when creating the policy includes the following. If you are following along,\
    \ example entries are shown for each data item:\n\n*   Name: A name for the policy.\
    \ Use mysql-users-policy.\n\n*   Description: A short description of what the\
    \ policy provides. Use Allow users to access MySQL DB Systems.\n\n*   Compartment:\
    \ Be sure to select your root compartment.\n\nWe also need to supply the policy\
    \ statements as we discussed above. The format of the statements we need was provided\
    \ for us in the banner OCI presented earlier. In this case, the following are\
    \ the suggested policy statements. Notice the use of `[..|..]`. This indicates\
    \ we have a choice of parameters to use. We will use the `compartment_name` option\
    \ where applicable (we remove the other options and the brackets). The statements\
    \ are artificially formatted for reading:\n\n```\nAllow group  to\n{SUBNET_READ,\
    \ SUBNET_ATTACH, SUBNET_DETACH, VCN_READ, COMPARTMENT_INSPECT}\nin [\ntenancy\
    \ |\ncompartment  |\ncompartment id \n]\nAllow group  to manage mysql-family in\
    \ [\ntenancy |\ncompartment  |\ncompartment id \n]\nAllow group  to use tag-namespaces\
    \ in tenancy\n```\n\nWe can use these to substitute the `<group_name>` with `mysql-users`\
    \ and the `<compartment_name>` with `oci-tutorial-compartment` as shown below\
    \ once again formatted for easier reading:\n\n```\nAllow group mysql-users to\n\
    {SUBNET_READ, SUBNET_ATTACH, SUBNET_DETACH, VCN_READ, COMPARTMENT_INSPECT}\nin\
    \ compartment oci-tutorial-compartment\nAllow group mysql-users to manage mysql-family\n\
    in compartment oci-tutorial-compartment\nAllow group mysql-users to use tag-namespaces\
    \ in tenancy\n```\n\nTo add these to the Create Policy dialog, you will have to\
    \ click the switch *Shown manual editor* to allow you to get a text box to paste\
    \ the statements.\n\nFigure [4-10](#527055_1_En_4_Chapter.xhtml#Fig10) shows the\
    \ Create Policy dialog with the data entered. Be sure to double-check everything\
    \ including selecting your root compartment and then click the *Create* button\
    \ to create the policy.\n\n![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig10_HTML.png)"
  trans: '## 创建用户并将其添加到组


    即使您是唯一使用 OCI 账户的人，创建新用户也是一个良好的实践，因为这样您可以测试用户如何与您的资源进行交互。这不仅确保您创建的用户能够执行应用程序或使用资源，还能确保您的安全策略定义正确。


    本节中，我们将创建一个新用户并将其添加到组中。您需要输入名称、用户名以及一个有效的电子邮件地址。电子邮件地址是必需信息之一，因为 OCI 将通过电子邮件向用户发送一个链接来设置用户账户密码，这与您的根账户收到通知的方式非常相似。


    要创建用户，您需要导航回 **Default** 域详情页面。回想一下，您可以通过使用云控制台菜单选择 **Identity & Security**，然后单击
    **Domains**，在 Domains 资源页面上选择 **Default** 域来访问此页面。更多详情请参考上文相关章节。


    回到 **Default** 域详情页面后，单击左侧菜单中的 **Users** 项，然后在用户列表中单击 **Create user** 按钮，如图 4-7
    所示。


    ![](img/527055_1_En_4_Fig7_HTML.jpg)


    *图 4-7：用户列表（默认域详情页面）*


    接下来，我们将创建一个名为 `Joe User` 的新用户并提供一个有效的电子邮件地址。该对话框允许您使用电子邮件地址作为用户名，但您也可以使用自定义用户名。为此，请取消选中
    **Use the email address as username** 复选框，以便输入 `joeuser` 作为用户名。请务必检查您输入的电子邮件地址是否有效。提示：您可以在此处使用自己的电子邮件地址。这就是为什么我们将登录方式改为使用用户名而不是电子邮件地址。很聪明吧。图
    4-8 显示了填入数据后的创建用户对话框。


    ![](img/527055_1_En_4_Fig8_HTML.png)


    *图 4-8：创建用户对话框*


    请注意，我们还可以在同一操作中将用户添加到组！这里，我们只需选择我们之前创建的组 (`mysql-users`)。准备好后，单击 **Create** 按钮以创建用户。一封电子邮件将发送到您提供的电子邮件地址，允许您为新用户设置密码。如果您当前以根账户登录，则必须先注销该账户，然后才能设置/重置密码。


    > **注意**：当您尝试创建 MySQL DB 系统时，要以新用户身份登录，您需要注销根账户，然后使用新用户账户重新登录。


    现在我们已经创建了组和新用户，我们只需要使用安全策略向该组授予某些权限。


    ### 步骤三：创建策略


    最后，我们需要一个安全策略，向组授予某些权限，以便用户可以访问和使用 MySQL 资源。有几种方法可以做到这一点，包括使用云控制台界面来构建我们需要的特定命令，或者我们可以手动输入命令。在本例中，我们将使用手动选项。


    为了满足 MDS 的要求，我们需要为该组分配以下权限：


    *   `SUBNET_READ, SUBNET_ATTACH, SUBNET_DETACH, VCN_READ, COMPARTMENT_INSPECT`：允许组操作子网和
    VCN

    *   `manage mysql-family`：允许组管理 MySQL 资源

    *   `use tag-namespaces`：允许组在租户中使用标签命名空间


    我们将使用 `Allow` 权限语句来授予这些权限，这允许您将权限应用于租户本身或特定 compartment。由于我们将使用 `oci-tutorial-compartment`，我们将在语句中使用该值。但是，最后一个权限是应用于租户的。


    让我们看看如何做到这一点。要创建安全策略，请单击云控制台主菜单，选择 **Identity & Security**，然后单击 **Policies**。这将打开
    Policies 资源页面，如图 4-9 所示。要创建新策略，请单击 **Create Policy** 按钮。


    ![](img/527055_1_En_4_Fig9_HTML.png)


    *图 4-9：策略资源页面*


    安全策略是在根 compartment 中创建的。您可能在列表范围中选择了 `oci-tutorial-compartment`，但这没关系。我们可以在下一个页面中选择
    compartment。


    创建策略时需要提供以下信息。如果您是跟随操作，以下显示了每个数据项的示例条目：


    *   名称：策略的名称。使用 `mysql-users-policy`。

    *   描述：对该策略提供内容的简短描述。使用 `Allow users to access MySQL DB Systems`。

    *   Compartment：务必选择您的根 compartment。


    我们还需要提供如上所述的策略语句。我们需要的语句格式由 OCI 之前提供的横幅给出。在本例中，以下是建议的策略语句。请注意 `[..|..]` 的使用，这表示我们有一组参数可供选择。在适用的情况下，我们将使用
    `compartment_name` 选项（我们移除其他选项和方括号）。这些语句经过人工格式化以便阅读：


    ```

    Allow group <group_name> to

    {SUBNET_READ, SUBNET_ATTACH, SUBNET_DETACH, VCN_READ, COMPARTMENT_INSPECT}

    in [

    tenancy |

    compartment <compartment_name> |

    compartment id <compartment_OCID>

    ]

    Allow group <group_name> to manage mysql-family in [

    tenancy |

    compartment <compartment_name> |

    compartment id <compartment_OCID>

    ]

    Allow group <group_name> to use tag-namespaces in tenancy

    ```


    我们可以用 `mysql-users` 替换 `<group_name>`，用 `oci-tutorial-compartment` 替换 `<compartment_name>`，如下所示，再次格式化以便阅读：


    ```

    Allow group mysql-users to

    {SUBNET_READ, SUBNET_ATTACH, SUBNET_DETACH, VCN_READ, COMPARTMENT_INSPECT}

    in compartment oci-tutorial-compartment

    Allow group mysql-users to manage mysql-family

    in compartment oci-tutorial-compartment

    Allow group mysql-users to use tag-namespaces in tenancy

    ```


    要将它们添加到“创建策略”对话框中，您需要单击开关 **Shown manual editor** 以获取一个文本框来粘贴这些语句。


    图 4-10 显示了填入数据后的“创建策略”对话框。请务必仔细检查所有内容，包括选择您的根 compartment，然后单击 **Create** 按钮以创建策略。


    ![](img/527055_1_En_4_Fig10_HTML.png)'
- fmt: "A dialog box to create a policy with data entered in the `name`, `description`,\
    \ and `compartment`. Policy builder with show manual editor is displayed below.\
    \ The create button is at the bottom left.\n\n**Figure 4-10**  \nCreate Policy\
    \ Dialog\n\n**Caution**  \nIf you do not select your root compartment, you may\
    \ receive a red banner at the bottom of the dialog with a somewhat cryptic error\
    \ stating the compartment doesn’t exist. If this happens, double-check your compartment\
    \ selection and try the create again.\n\nWhen the policy is created, you will\
    \ be directed to the Policies Detail page as shown in Figure [4-11](#527055_1_En_4_Chapter.xhtml#Fig11).\
    \ Notice you can edit the policy with the `Edit Policy` button or delete it with\
    \ the `Delete` button.\n\n![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig11_HTML.jpg)\n\
    \nA page displays the details of the policy created on the right. Edit policy,\
    \ delete, and add tags options are available. A green circle with `P` written\
    \ on it is on the left.\n\n**Figure 4-11**  \nPolicies Detail Page\n\nOk, now\
    \ that we have all three prerequisites completed, it’s time to take a tour of\
    \ MDS and learn how to create our first DB System.\n\n## A Tour of MDS\n\nNow\
    \ is the point in the book where most are eager to see in action – using MDS in\
    \ OCI. We will start off with a simple example to explore the nuances of creating\
    \ and getting to know about DB Systems before we move on to the more advanced\
    \ features of MDS.\n\nOne thing that may not be clear for some is the difference\
    \ between MDS and a DB System. MDS is an OCI platform as a service (PaaS), and\
    \ a DB System is one of the resources available in the service. The MySQL service\
    \ menu is shown in the cloud console menu as shown in Figure [4-12](#527055_1_En_4_Chapter.xhtml#Fig12).\
    \ As MDS continues to mature, you may see additional resources appear under the\
    \ MySQL menu.\n\n![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig12_HTML.jpg)\n\
    \nA menu in the oracle cloud selects the databases option. Databases are displayed\
    \ on the right side. Under it, My S Q L, D B systems, Backups, channels and configurations\
    \ are selected inside a box.\n\n**Figure 4-12**  \nMySQL Service Menu (Cloud Console)\n\
    \nNotice we see there are four resources under the MySQL menu. The following briefly\
    \ summarizes them:\n\n- `DB Systems`: Fully managed MySQL server resources\n-\
    \ `Backups`: Backups taken of the DB Systems\n- `Channels`: A replication resource\
    \ consisting of inbound or outbound replication channels. Inbound channels permit\
    \ asynchronous replication between a MySQL source and a DB System. Outbound channels\
    \ permit asynchronous replication of a DB System database to a MySQL replica.\n\
    - `Configurations`: A collection of user, system, initialization, or service-specific\
    \ variables that define the operation of the DB System. List includes many predefined\
    \ configurations, but you may create your own.\n\nWe will see all of the features\
    \ of MDS in the coming chapters. For now, let’s see a tutorial for creating out\
    \ very first DB System.\n\n**Note**  \nIf you have not followed along with satisfying\
    \ the prerequisites for creating a DB System, go back and do those steps first.\n\
    \n## Creating Your First DB System\n\nAt this point, we should have our OCI account\
    \ setup as well as a virtual cloud network (`oci-tutorial-vcn`), a compartment\
    \ resource (`oci-tutorial-compartment`), a new user (`joeuser`), a group (`mysql-users`)\
    \ to which the user is assigned, and a policy (`mysql-users-policy`) to allow\
    \ users to create and use MDS resources. If you don’t have all of those, be sure\
    \ to review the previous sections for more details.\n\nThere are a lot of things\
    \ to learn and a few steps to creating a DB System. It is rather easy once you\
    \ learn how, but unlike previous tutorials which walked you through the minimal\
    \ steps, this tutorial will proceed step-by-step and learn more about what is\
    \ available to us on each of the OCI cloud console pages. So, this tutorial may\
    \ take some time to get through, but it will be worth it to learn about what you\
    \ can do with a DB System.\n\n### Open the DB Systems Resource Page\n\nWe will\
    \ be using the MySQL menu from the cloud console to create a DB System. Simply\
    \ open the cloud console menu, select `Databases`, and then click on `DB Systems`\
    \ under the `MySQL` menu. This will open the DB Systems resource page as shown\
    \ in Figure [4-13](#527055_1_En_4_Chapter.xhtml#Fig13).\n\n![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig13_HTML.png)\n\
    \nA page displays the D B systems in the o c i tutorial compartment. Create my\
    \ S Q L Database system button and the table of the created database labeled my\
    \ S Q L test 1 are on the right.\n\n**Figure 4-13**  \nDB Systems Resource Page\n\
    \nWe see to the right a list of the DB Systems (`DB Systems in …`) we have created\
    \ and their states including the DB System, Crash Recovery, High Availability,\
    \ and HeatWave states as well as the date and time when the resource was created.\n\
    \nNotice the buttons above the `DB Systems in…` list. We have a `Create DB System`\
    \ button and an `Action` drop-down menu. On the `Action` drop-down menu, you can\
    \ execute an operation on any of the DB Systems that are selected in the list.\
    \ These include the following:\n\n- `Stop`: Stop the DB System\n- `Start`: Start\
    \ the DB System\n- `Restart`: Stop then start the DB System\n- `Create a Manual\
    \ Backup`: Create a backup of the DB System\n- `Apply Tags`: Apply one or more\
    \ tags to the resources\n- `Delete`: Delete (terminate) the DB System\n\nAs you\
    \ can see, this is a powerful menu and quite a shortcut for working with multiple\
    \ DB Systems. Fortunately, the `Action` drop-down menu is a common feature among\
    \ the OCI cloud console resource page lists. The actions may differ, but the concept\
    \ is the same.\n\nNotice also that there is one DB System here that has been terminated\
    \ (`Deleted`). A DB System that has been terminated will remain on the list for\
    \ a few days until all resources have been purged (e.g., the block volumes are\
    \ not immediately destroyed).\n\nOn the left side of the page, we see the `MySQL`\
    \ menu repeated. We can use that to navigate among the MySQL resources by clicking\
    \ the label we want to see. Below that on the left is the `List Scope` list that\
    \ we’ve seen before where we can choose the compartment to filter the DB Systems\
    \ list.\n\nAt the bottom left is a special `Filters` section where we can filter\
    \ the list even further by selecting a specific state, name, or even selecting\
    \ among HeatWave entries (we will see more about HeatWave in Chapter [8](#527055_1_En_8_Chapter.xhtml)).\n\
    \nFinally at the bottom is a Tag filter where, if we used tags, we could further\
    \ filter the list to show only those DB Systems that have those tags.\n\nThese\
    \ three filtering mechanisms are common among all OCI cloud console pages that\
    \ provide a list. Some resources may have differing filter selections, but all\
    \ resource pages allow you to filter the list. Nice."
