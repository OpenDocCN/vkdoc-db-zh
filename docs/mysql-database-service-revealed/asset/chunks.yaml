- fmt: '## Create a Manual Backup


    You can create a manual backup of your DB System at a time of your choosing. Recall,
    a manual backup can be either an increment or full backup and the retention period
    can be from 1 to 365 days. The manual backup contains a copy of all your data.
    Once again, it is always a good idea to make a manual backup before any major
    changes to your data including imports, reorganization, launching a new application,
    etc. A manual backup taken immediately before these actions will permit you to
    restore your data to a “known good” state.


    A manual backup can be done at any time except during the maintenance cycle where
    MDS is upgrading your DB System. In fact, MDS may give you a warning if you try
    to create a backup at a time when it is not advisable or permitted. Fortunately,
    those times are few and you are unlikely to encounter them.


    To create a manual backup, use the cloud console and navigate to your DB System.
    You can do so by clicking on the main menu and selecting `Databases` then `DB
    Systems` then click the name of your DB System to see the DB Systems details page.


    Once you are on the DB Systems detail page, click on the `Backups` entry in the
    `Resources` menu then click the `Create Manual Backup` button as shown in Figure
    5-6. Alternatively, you can use the `More Actions` button and choose `Create Manual
    Backup`. Also, instead of navigating to the DB System details page, you can click
    on the context menu from the DB Systems list and choose `Create Manual Backup`.


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig6_HTML.png)


    *A page labeled create manual backup is shown. The top right corner reads edit
    backup plan. A dialog box titled backup plan is given with a warning symbol that
    reads automatic backups are disabled.*


    **Figure 5-6: Create a Manual Backup (DB System Details Page)**


    Once you click the button or launch the manual backup from the context menu, a
    dialog will open prompting you to provide the following information:


    *   `Display Name`: Name the backup. MDS will generate a name for you, but if
    you want to be able to find it quickly or perhaps associate the name with an event
    or project, you should provide a name. By default, MDS includes the name of the
    DB System and date and time of the backup.

    *   (optional) `Description`: You can add a description for the backup. This could
    contain pertinent information that you cannot (should not) encode in the name^([^(10)](#fn10))
    such as details that prompted the need for the backup.

    *   `Configure Backup Type`: Here, you can choose between full or incremental
    backup. The default is full backup.

    *   `Configure Retention Period`: You can enter the number of days to retain the
    backup. You can choose a range from 1 to 365. The backup will be deleted after
    the number of days has expired. You can also choose a specific date that represents
    the day the backup retention will expire and therefore be deleted.

    *   `Navigate to the Backup Details Page After Closing the Dialog`: This tick
    box redirects you automatically to the backup details page. The box is ticked
    by default.


    Once you have the information entered and validated, click the `Create Manual
    Backup` button to create the backup. Figure 5-7 shows an example of the `Create
    Manual Backup` dialog.


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig7_HTML.png)


    *A dialog box titled create manual backup is given. It features 3 headers: provide
    basic information for D B system manual backup, configure backup type, and configure
    retention period.*


    **Figure 5-7: Create Manual Backup Dialog**


    **Tip**: I will stop highlighting all of the entry boxes on dialogs and forms
    for brevity and highlight the command buttons and other important features.


    If you ticked the tick box to show the backup details page, you will be redirected
    to that page so that you can monitor the backup progress. You can also monitor
    the backup progress on the `Backups` view from the `Resources` menu on the DB
    System details page. Figure 5-8 shows the progress of a manual backup as shown
    in the Backups view on the DB System details page.


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig8_HTML.png)


    *A table titled create manual backup is given. The table contains the following
    columns: Name, state, creation type, retention days, size, and created. The first
    row labeled o c i tutorial my s q l second test is highlighted.*


    **Figure 5-8: Backup Progress (DB System Details Page)**


    **Note**: The status of the DB System may change briefly to `UPDATING` when the
    backup starts.


    ## Edit a Backup


    Should you need to edit the name or description of your backup, you can do so
    using the edit backup feature. To edit a backup from the DB System details page,
    click on the `Backups` view on the `Resources` menu and click the context menu
    and choose `Edit` as shown in Figure 5-9.


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig9_HTML.png)


    *A box titled create manual backup. A text box is given with the following list.
    View details, restore to new system, edit, copy O C I D, move resource, add tags,
    view tags, and delete of which edit is selected.*


    **Figure 5-9: Edit Backup (DB Systems Details Page)**


    If you have navigated to the backup details page, you can click on the `Edit`
    button to edit the backup.


    Once you click the button to edit the backup, a dialog will be presented where
    you can change the following information:


    *   `Display Name`: You can change the name of the backup. By default, MDS includes
    the name of the DB System and the date and time of the backup.

    *   `Description`: You can change the description for the backup.

    *   `Configure Backup Type`: Here, you can choose between full or incremental
    backup. The default is full backup.

    *   `Configure Retention Period`: You can change the number of days to retain
    the backup. You can also choose a specific date that represents the day the backup
    retention will expire and therefore be deleted.


    Figure 5-10 shows the edit backup dialog.


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig10_HTML.png)


    *A dialog box titled, edit backup. The box is given with subtitles: provide basic
    information for D B system manual backup and configure retention period. At the
    end, the save changes option is given.*


    **Figure 5-10: Edit Backup Dialog**


    Once you have the information corrected, you can click the `Save Changes` button
    to save your changes.'
