    row labeled o c i tutorial my s q l second test is highlighted.


    Figure 5-8


    Backup Progress (DB System Details Page)


    Note


    The status of the DB System may change briefly to `UPDATING` when the backup starts.


    ### Edit a Backup


    Should you need to edit the name or description of your backup, you can do so
    using the edit backup feature. To edit a backup from the DB System details page,
    click on the *Backups* view on the *Resources* menu and click the context menu
    and choose *Edit* as shown in Figure [5-9](#527055_1_En_5_Chapter.xhtml#Fig9).


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig9_HTML.png)


    A box titled create manual backup. A text box is given with the following list.
    View details, restore to new system, edit, copy O C I D, move resource, add tags,
    view tags, and delete of which edit is selected.


    Figure 5-9


    Edit Backup (DB Systems Details Page)


    If you have navigated to the backup details page, you can click on the *Edit*
    button to edit the backup.


    Once you click the button to edit the backup, a dialog will be presented where
    you can change the following information:


    *   *Display Name*: You can change the name of the backup. By default, MDS includes
    the name of the DB System and the date and time of the backup.


    *   *Description*: You can change the description for the backup.


    *   *Configure Backup Type*: Here, you can choose between full or incremental
    backup. The default is full backup.


    *   *Configure Retention Period*: You can change the number of days to retain
    the backup. You can also choose a specific date that represents the day the backup
    retention will expire and therefore be deleted.


    Figure [5-10](#527055_1_En_5_Chapter.xhtml#Fig10) shows the edit backup dialog.


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig10_HTML.png)


    A dialog box titled, edit backup. The box is given with subtitles: provide basic
    information for D B system manual backup and configure retention period. At the
    end, the save changes option is given.


    Figure 5-10


    Edit Backup Dialog


    Once you have the information corrected, you can click the Save Changes button
    to save your changes.'
  trans: '## 创建手动备份


    您可以随时为数据库系统创建手动备份。请注意，手动备份可以是增量备份或完整备份，保留期限可设置为 1 到 365 天。手动备份包含您所有数据的副本。再次强调，在对数据进行任何重大更改（包括导入、重组、启动新应用等）之前，创建手动备份始终是一个好习惯。在这些操作前立即进行的备份，将允许您将数据恢复到一个“已知良好”的状态。


    手动备份可在任何时间进行，但 MDS 正在升级数据库系统的维护周期期间除外。实际上，如果您尝试在不建议或不允许的时间创建备份，MDS 可能会向您发出警告。幸运的是，这些情况很少见，您不太可能遇到。


    要创建手动备份，请使用云控制台并导航至您的数据库系统。您可以通过点击主菜单，选择`数据库`，然后选择`数据库系统`，再点击您的数据库系统名称以查看数据库系统详情页面。


    进入数据库系统详情页面后，点击`资源`菜单中的`备份`条目，然后点击`创建手动备份`按钮，如图 5-6 所示。或者，您可以使用`更多操作`按钮并选择`创建手动备份`。此外，您也可以不导航至数据库系统详情页面，而是直接从数据库系统列表的右键菜单中选择`创建手动备份`。


    ![](img/527055_1_En_5_Fig6_HTML.png)


    *显示了一个标签为“创建手动备份”的页面。右上角显示“编辑备份计划”。出现一个标题为“备份计划”的对话框，带有一个警告标志，显示“自动备份已禁用”。*


    **图 5-6：创建手动备份（数据库系统详情页面）**


    点击按钮或从右键菜单启动手动备份后，将打开一个对话框，提示您提供以下信息：


    *   `显示名称`：为备份命名。MDS 会为您生成一个名称，但如果您希望快速找到它，或者想将名称与某个事件或项目关联起来，您应该提供一个名称。默认情况下，MDS
    会包含数据库系统的名称以及备份的日期和时间。

    *   （可选）`描述`：您可以为备份添加描述。这里可以包含您无法（或不应该）在名称中编码的相关信息^(¹⁰)，例如促使您创建备份的详细原因。

    *   `配置备份类型`：在此处，您可以在完整备份或增量备份之间进行选择。默认是完整备份。

    *   `配置保留期`：您可以输入备份的保留天数。可选择 1 到 365 天的范围。超过该天数后，备份将被删除。您也可以选择一个特定日期，该日期代表备份保留期到期并将被删除的日子。

    *   `关闭对话框后备份详情页`：勾选此复选框后，系统会自动将您重定向到备份详情页。默认情况下，此框已勾选。


    输入并验证信息后，点击`创建手动备份`按钮以创建备份。图 5-7 显示了`创建手动备份`对话框的示例。


    ![](img/527055_1_En_5_Fig7_HTML.png)


    *显示一个标题为“创建手动备份”的对话框。它包含 3 个标题部分：提供数据库系统手动备份的基本信息、配置备份类型和配置保留期。*


    **图 5-7：创建手动备份对话框**


    **提示**：为简洁起见，我将不再高亮显示对话框和表单上的所有输入框，但会高亮显示命令按钮和其他重要功能。


    如果您勾选了显示备份详情页的复选框，系统会将您重定向到该页面，以便您可以监控备份进度。您也可以在数据库系统详情页面`资源`菜单的`备份`视图中监控备份进度。图
    5-8 显示了在数据库系统详情页面的备份视图中显示的手动备份进度。


    ![](img/527055_1_En_5_Fig8_HTML.png)


    *显示一个标题为“创建手动备份”的表格。该表包含以下列：名称、状态、创建类型、保留天数、大小和创建时间。第一行标签为“oci-tutorial-mysql-second-test”被高亮显示。*


    **图 5-8：备份进度（数据库系统详情页面）**


    **注意**：备份开始时，数据库系统的状态可能会短暂变更为`更新中`。


    ## 编辑备份


    如果您需要编辑备份的名称或描述，可以使用编辑备份功能。要从数据库系统详情页面编辑备份，请点击`资源`菜单中的`备份`视图，点击右键菜单并选择`编辑`，如图
    5-9 所示。


    ![](img/527055_1_En_5_Fig9_HTML.png)


    *显示一个标题为“创建手动备份”的方框。其中有一个文本框，显示以下列表：查看详情、还原到新系统、编辑、复制 OCI ID、移动资源、添加标签、查看标签和删除，其中“编辑”被选中。*


    **图 5-9：编辑备份（数据库系统详情页面）**


    如果您已导航至备份详情页，可以点击`编辑`按钮来编辑备份。


    点击编辑备份按钮后，将出现一个对话框，您可以在其中更改以下信息：


    *   `显示名称`：您可以更改备份的名称。默认情况下，MDS 会包含数据库系统的名称以及备份的日期和时间。

    *   `描述`：您可以更改备份的描述。

    *   `配置备份类型`：在此处，您可以在完整备份或增量备份之间进行选择。默认是完整备份。

    *   `配置保留期`：您可以更改备份的保留天数。您也可以选择一个特定日期，该日期代表备份保留期到期并将被删除的日子。


    图 5-10 显示了编辑备份对话框。


    ![](img/527055_1_En_5_Fig10_HTML.png)


    *显示一个标题为“编辑备份”的对话框。该对话框包含副标题：提供数据库系统手动备份的基本信息和配置保留期。最后提供了“保存更改”选项。*


    **图 5-10：编辑备份对话框**


    更正信息后，您可以点击`保存更改`按钮来保存您的修改。'
- fmt: '### Manage Tags


    Another mechanism you can use to associate a backup (or any resource in OCI that
    supports tags) is to add one or more tags to the resource. Tags are short strings
    that you can add yourself. You may want to add tags for filtering or sorting.
    For example, you may use a tag to associate a backup with a cost center, event,
    or project.


    You can add tags to your backup at any time. To do so from the DB System details
    page, click on the `Backups` view on the `Resources` menu and click the context
    menu and choose `Add Tags` as shown in Figure [5-11](#527055_1_En_5_Chapter.xhtml#Fig11).


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig11_HTML.png)


    A box titled, create manual backup. A text box is given with a list. View details,
    restore to new system, edit, copy O C I D, move resource, add tags, view tags,
    and delete of which add tags are selected.


    Figure 5-11


    Add Tags (DB Systems Details Page – Backups View)


    If you have navigated to the backup details page, you can click on the `Edit`
    button to edit the backup.


    Once you click the `Add Tags` button, you will see a dialog where you can specify
    one or more tags to be added to the backup. Figure [5-12](#527055_1_En_5_Chapter.xhtml#Fig12)
    shows an example of adding a single tag. Here, we add a tag named `CostCenter`
    with a value of `901`. Recall, tags cannot have spaces.


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig12_HTML.jpg)


    A dialog box titled, add tags is given in which the right bottom corner box, plus
    another tag, and the left bottom corner add tags are selected.


    Figure 5-12


    Add Tags Dialog


    If you wanted to add more tags, you can click on the `+ Another Tag` button, which
    will add another set of text boxes for you to specify another tag. When done,
    you can click the `Add Tags` button to add the tags to your backup.


    Recall, you can view the tags associated with your backup by navigating to the
    backup details page. There, you can select the `Tags` tab and then the `Free-form
    Tags` view to see tags you’ve added as shown in Figure [5-13](#527055_1_En_5_Chapter.xhtml#Fig13).


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig13_HTML.jpg)


    A screenshot of o c i tutorial my s q l first test with backup information and
    tags tabs. Resource, edit, move, add tag, and delete options are also shown. A
    rectangular box with B inscription is on the left.


    Figure 5-13


    Free-form Tags View (Backup Details Page)


    ### Delete a Backup


    You can delete a backup at any time. If you have created a manual backup or want
    to prune some of your backup resources by deleting old backups, you can do so
    easily. The easiest way to delete a set of backups is to use the cloud console
    main menu and navigate to `Databases` | `Backups`, which will show all of your
    MDS backups, as shown in Figure [5-14](#527055_1_En_5_Chapter.xhtml#Fig14).


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig14_HTML.png)


    A dialog box titled backups in o c i tutorial compartment with the selected option
    backups is given. The table contains the following columns. Name, state, creation
    type, retention days, size, and created.


    Figure 5-14


    Listing all DB System Backups


    Notice here we see the title of the list is "*Backups in oci-tutorial-compartment*".
    As you may surmise, the list only shows you the backups from one compartment at
    a time. This is because backups are contained in the compartment where they are
    created – much like DB Systems (or any resource that lives at the compartment
    level).


    This list is handy because it allows you to select multiple backups where you
    can apply one of two operations: adding tags or deleting. The `Apply Tags` button
    allows you to add one or more tags to all of the backups selected. Similarly,
    the `Delete` button deletes all of the backups selected.


    To delete a single backup, use the context menu on the right and choose `Delete`
    as shown in Figure [5-15](#527055_1_En_5_Chapter.xhtml#Fig15).


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig15_HTML.png)


    A dialog box of columns headed name, state, D B system, creation type, retention
    days, size, and created is given in which the first column is selected. A text
    box on the right side with a delete option.


    Figure 5-15


    Delete a Backup (MDS Backups List)


    You will be asked to confirm the information as shown in Figure [5-16](#527055_1_En_5_Chapter.xhtml#Fig16).
    Click the `Delete Backup` button to confirm the delete operation. This dialog
    is shown because deleting a backup renders the backup inaccessible for later use.


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig16_HTML.jpg)


    A dialog box with the title delete backup is given. In the dialog box, the delete
    backup option is marked as selected.


    Figure 5-16


    Confirm Backup Delete Dialog


    You can also delete a backup from the backup details page by clicking the `Delete`
    button. Or, if you are viewing a DB System details page, use the `Backups` view
    on the `Resources` menu to select the context menu and choose `Delete`.'
