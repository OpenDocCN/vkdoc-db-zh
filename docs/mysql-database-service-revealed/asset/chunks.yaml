  trans: '

    ## 可能出现什么问题？


    有人可能认为云服务万无一失，永远不会离线。遗憾的是，这种想法是个误区。许多细微因素都可能影响您访问数据的能力。可能是您的互联网服务提供商出现故障，您的本地硬件发生故障，当然，云服务本身也会发生故障。幸运的是，这些情况很少见，并且已经采取了许多步骤和周密的计划，以确保及早检测故障，并通过冗余措施以及快速行动恢复的人员来减轻故障影响。


    但我们不要忘记那个可能造成最大破坏的因素——人为错误。无论是意外删除，还是由于对数据执行了规划不当、执行不力的更新所带来的后果，人为错误都是我们必须防范的。因此，备份与恢复在云端与在本地环境同样重要，并将持续如此。此外，组织应将其备份和恢复设施纳入
    MDS 中，以取代当前可能用于本地 MySQL 备份与恢复的操作。


    例如，如果您使用诸如 `MySQL Enterprise Backup` (`MEB`) 之类的外部应用程序来备份本地 MySQL 服务器，您将用 `OCI`
    中的 `DB System` 备份功能来替代它。虽然 `DB System` 备份不提供与 `MEB` 相同的选项，但它仍可在您的业务连续性计划中取代 `MEB`
    的位置。而且，最重要的是，它们是物理备份，因此您可以确保数据能够快速高效地备份和恢复，而不会遇到逻辑备份所带来的空间问题或其他问题。


    同样，您的恢复计划也可以用 `DB Systems` 中的恢复功能来替代。不过，在恢复方面，这更多是一种差异。与 `MEB`（物理备份）或基于 SQL 的逻辑备份选项（如
    `mysqlpump` 和 `mysqldump`）等应用程序不同，`DB System` 恢复用于利用恢复的数据创建一个新的 `DB System`。更具体地说，您无法将数据恢复到一个现有的
    `DB System` 上。原因有很多，但如果您仔细想想，恢复到一个具有相同数据和配置的新 `DB System` 意味着您无需销毁原始系统即可回滚数据。您可以保留这两个
    `DB System`，以便进行任何您想要的恢复分析。


    提示

    有关 `mysqlpump` 的更多信息，请参见 [`https://dev.mysql.com/doc/refman/8.0/en/mysqlpump.xhtml`](https://dev.mysql.com/doc/refman/8.0/en/mysqlpump.xhtml)；有关
    `mysqldump` 的更多信息，请参见 [`https://dev.mysql.com/doc/refman/8.0/en/mysqldump.xhtml`](https://dev.mysql.com/doc/refman/8.0/en/mysqldump.xhtml)。


    因此，尽管缺乏选择性备份、选择性恢复以及恢复到现有 `DB System` 的功能，`DB System` 的备份和恢复特性依然强大、高效且可靠。正如您将看到的，自动备份功能使保护数据变得毫不费力。


    既然我们已经了解了备份与恢复在 MDS 中的重要性和作用，让我们更详细地看看这些特性。


    注意

    如果您想跟随演示操作，请确保已创建并运行一个 `DB System`，其参数与第 2 章讨论的参数类似。


    ## 备份


    为了更好地理解 `DB System` 备份，让我们从高层次角度考虑 `DB System` 的配置。`DB System` 由一个计算实例、一个安装并运行着操作系统和
    MySQL 的启动卷、用于数据的块存储设备（称为数据驱动器或简称为数据）以及一组用于运行 MySQL 的配置参数组成。


    当启动备份时，会调用数据驱动器的块卷服务来创建块卷（数据）的副本。块卷服务实现了一种快速复制，采用一种逻辑卷管理器（`lvm`）的形式来对数据进行快照。因此，无需产生某些备份应用程序和机制必须采用的任何形式的等待、阻塞或类似中断。


    然后，块卷备份与配置参数副本以及一些用于重建 `DB System` 的附加元数据相结合。计算实例、启动卷等不会被复制或放入备份中。相反，`DB System`
    备份包含了在备份时刻重建 `DB System` 和您的数据所需的一切。


    在本节中，我们将学习所有关于 `DB System` 备份的基本操作，包括自动和手动备份。您将看到，设置备份有很多可微调的选项。


    ### 备份类型


    `DB Systems` 中的备份可以设置为按预设时间间隔自动发生，可以手动随时创建备份，可以创建最终备份，并且如果需要维护或纠正措施，`OCI` 操作员可以为您创建备份。


    `DB Systems` 还支持完整备份和增量备份。完整备份是指备份备份时存在的所有数据。增量备份仅包含自上次完整备份以来的更改。通常，增量备份较小，因此可以更频繁地进行。例如，您可能希望采用这样的计划：在每天使用率低时运行一次完整备份，并在一天中定期进行增量备份。这样，您总是可以将数据恢复到增量备份时间窗口内的状态。


    增量备份允许您更频繁地进行备份，因为它们通常占用更少的空间。这允许您进行一次完整备份，然后在一段时间内进行多次增量备份。如果需要恢复，您需要恢复最近的完整备份，然后恢复之后进行的所有增量备份。


    例如，您可能希望采用这样的策略：在通常是在夜间使用率较低时进行一次完整备份，然后每隔几个小时进行一次增量备份。最佳实践建议根据您的数据恢复目标来调整频率。更具体地说，增量备份之间的时间间隔不应超过您的组织可以安全容忍的最大数据丢失量。这是因为自上次增量备份以来更改或添加的任何数据，在恢复完整备份及后续增量备份时都可能丢失。


    另一个最佳实践是利用 MySQL 的一个特殊功能，即时间点恢复，它内置于 MDS 中。这允许您通过每五分钟对数据进行一次快照来设置自动化恢复。因此，最大数据丢失将不超过五分钟的时间段。我们将在第
    6 章中更详细地讨论时间点恢复以及如何利用它来改进数据恢复。


    让我们更详细地看看每种备份类型。


    #### 手动备份


    手动备份是由您，即 `DB System` 的所有者，通过云控制台或通过 `REST API` 调用创建的备份（有关 `REST API` 调用的更多信息见第
    9 章）。手动备份的保留期可以设置为 1 到 365 天。所有手动备份都是完整备份。


    您可能希望在以下情况之前创建手动备份：对数据进行重大更改、执行任何数据清理或转换脚本、导入大量数据，或者在业务的关键时刻之前，例如大型活动或新产品发布之前。

    '
- fmt: '#### Automatic Backup


    You can use the automatic backup feature to choose a time to create a backup of
    the DB System. Unlike manual backups, automatic backups can be retained between
    1 and 35 days with a default of 7 days. Note that once you set up an automatic
    backup retention period, you cannot change it so consider your needs when setting
    up automatic backups. Interestingly, automatic backups, once configured, will
    backup a DB System even if it is inactive (e.g., stopped).


    Finally, should you delete a DB System, the automatic backups are deleted as well
    unless you changed the deletion plan in the DB System. Recall, the deletion plan
    can be set when you create a DB System and can be changed later. One of the settings
    in the `Deletion Plan` tab is to retain automatic backups. If you tick that, automatic
    backups are not deleted when the DB System is deleted.


    You may want to set up automatic backups so that you can be certain the data is
    backed up regularly and you don’t have to monitor or manage it on a day-to-day
    basis.


    #### Final Backup


    A final backup is a special backup that you can invoke when the DB System is deleted.
    More specifically, you can set the deletion plan for a DB System to take a final
    backup before the DB System is deleted. In this case, the backup is taken and
    once complete, the DB System is deleted. The final backup is always a full backup
    and can only be set automatically via the Deletion Plan tab for the DB System.


    #### Operator Backup


    This form of backup is another special backup that can be invoked by the MDS support
    team (often referred to as the operator hence the name). This backup is normally
    taken as a precaution before an operator takes action to correct a problem or
    in assisting you in solving an issue with your DB System. This type of backup
    is always a full backup.


    Operator backups are deleted automatically and are not part of your billing or
    service limits. While you can delete operator backups, it is not recommended since
    you may want to use it if your issue is not resolved, or the DB System cannot
    be fully recovered.


    The MySQL Support team creates this backup to assist in investigating potential
    issues with your service. These backups are deleted automatically. You can delete
    these backups too but is not recommended. These backs do not affect your limits.


    ### Backup Details


    You can see a list of backups whenever you visit the DB System details page and
    click on `Backups` in the `Resources` menu on the left. You will then see a list
    of backups similar to Figure 5-1.


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig1_HTML.png)


    A table titled, create manual backup is given. The table contains the following
    columns: Name, state, creation type, retention days, size, and created.


    Figure 5-1


    Listing Backups with a DB System


    Notice the list shows the name, state, backup (creation) type, retention, size,
    and date created. If you click on the context menu on the right for each backup,
    you can see a list of actions you can take on the backup as shown in Figure 5-2.


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig2_HTML.jpg)


    A menu with the following options: view details, restore to new system, edit,
    copy O C I D, move resource, add tags, view tags, and delete. The view details
    option is selected.


    Figure 5-2


    Context Menu (Backup list – DB System Details Page)


    Here we can view the details for the backup, restore to a new DB System, edit
    the backup (change the name, description, and retention period), copy its OCID,
    move it to a new location, add or view tags, and delete the backup.


    Tip


    You can navigate to a list of all your backups by using the cloud console main
    menu then selecting `Databases` | `Backup`s. You will be able to perform the same
    operations listed above on each backup in the list.


    Let’s look at the details page for a backup. The details page for a backup is
    like most detail pages for OCI resources where critical data is displayed in the
    center, an icon with the state is to the left, and a Resources menu appears below
    with tabs for various lists. In this case, a backup has only one entry in the
    Resources menu; DB System, which displays information about the DB System from
    which the backup was taken.


    Figure 5-3 shows the top portion of the backup details page.


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig3_HTML.png)


    A screenshot of o c i tutorial my s q l backup page with backup information and
    tags tabs. Resource, edit, move, add tag, and delete options are also shown. A
    rectangular box with B inscription is on the left.


    Figure 5-3


    Backup Details Page (Top)


    Notice we have the icon on the left. The icon and state follow the same behavior
    as other OCI resources changing color for certain states where green is always
    the `ACTIVE` state. To the right are the name and a series of buttons for common
    actions. These actions include the following:


    *   `Restore to New DB System`: Create a new DB System restoring the data from
    the backup.

    *   `Edit`: Used to change the backup metadata (name, description, and retention
    period).

    *   `Move Resource`: Allows you to move the resource to a new location (compartment).

    *   `Add Tags`: Used for adding user-defined tags.

    *   `Delete`: You can delete the backup.


    The main information section has two tabs: the `Backup Information` and `Tags`.
    The backup information includes the OCID, description, compartment, the MySQL
    version, shape, state, backup type, creation type, size, and creation date. Tags
    are those tags you or the OCI system set for the backup.


    Table 5-1 lists the data in more detail.


    Table 5-1


    Backup Information (backup details page)'
