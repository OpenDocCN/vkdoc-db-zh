  trans: '

    ### 使用对象存储桶


    第一种从本地 MySQL 服务器导出数据的方法是使用对象存储作为导出数据的中间存储。我们将使用本地 MySQL 服务器上的 MySQL Shell 创建数据导出，将其放入对象存储，然后再次使用
    MySQL Shell 从我们的 MDS DB 系统访问该数据进行导入。


    为了使用对象存储桶选项来上传导出的数据，您必须先配置您的 PC 以允许使用 OCI CLI。这是因为该机制和自动化过程将需要使用您的安全凭据。我们需要配置系统以允许自动访问您
    OCI 租户中的对象。然而，您应考虑将 OCI CLI 访问凭据存储在 PC 上的潜在安全影响。您只需设置一次 PC，并且除非您的 SSH 密钥发生变化，否则无需更改配置。


    **注意**


    一旦您将 PC 配置为自动访问租户中的某些对象，您应确保 PC 的安全性足够，以防止未经授权的访问来保护您的 OCI 凭据。


    #### 为 OCI CLI 访问配置您的 PC


    您需要配置 PC 两件事以通过 API 访问 OCI 对象：(1) 您需要一个 SSH 密钥对，并将公钥上传到您的 OCI 账户，以及 (2) 您需要创建一个包含您账户信息的特殊
    OCI 配置文件。如果您已有创建好的 SSH 密钥对，可以使用它，但下面演示了如何创建 SSH 密钥对并上传到您的 OCI 账户。


    **提示**


    以下示例展示了如何在 Windows 上生成 SSH 密钥对。如果您使用 Mac 或 Linux，请参阅 `https://docs.oracle.com/en-us/iaas/Content/API/Concepts/apisigningkey.htm#Required_Keys_and_OCIDs`
    以获取特定于平台的生成密钥命令示例。


    首先，我们需要创建一个 SSH 密钥对，但我们会将密钥放在用户账户的一个特殊文件夹中。打开 Windows PowerShell（或终端），在您的用户目录中创建一个名为
    `.oci` 的文件夹并切换到该目录，如下所示：


    ```

    PS C:\Users\cbell> mkdir %HOMEDRIVE%%HOMEPATH%\.oci

    PS C:\Users\cbell> cd %HOMEDRIVE%%HOMEPATH%\.oci

    PS C:\Users\cbell\.oci>

    ```


    接下来，我们将生成 SSH 密钥对，从私钥开始，然后生成公钥。请注意，系统会要求您提供密钥密码。请务必选择一个与您的 MySQL 管理密码不同并且您能记住的密码，因为您需要使用它来访问密钥。以下命令展示了如何创建密钥。命令以粗体显示：


    ```

    PS C:\Users\cbell\.oci> openssl genrsa -out oci_api_key.pem -aes128 -passout stdin
    2048

    Generating RSA private key, 2048 bit long modulus (2 primes)

    ........................+++++

    ....+++++

    e is 65537 (0x010001)

    Enter pass phrase for oci_api_key.pem:

    Verifying - Enter pass phrase for oci_api_key.pem:

    PS C:\Users\cbell\.oci> openssl rsa -pubout -in oci_api_key.pem -out oci_api_key_public.pem

    Enter pass phrase for oci_api_key.pem:

    writing RSA key

    ```


    **注意**


    Mac 和 Linux 系统要求密钥具有一组特殊的权限。您需要运行命令 `chmod go-rwx ~/.oci/oci_api_key.pem` 来为这些平台正确设置权限。


    我们将把公钥上传到我们的 OCI 账户。我们可以通过上传公钥或粘贴密钥文本来完成。在此示例中，我们将粘贴文本，以便使用 `type` 命令显示密钥内容，如下所示。注意，输出内容出于安全原因已被遮盖。您自己的密钥看起来类似但数值不同：


    ```

    PS C:\Users\cbell\.oci> type oci_api_key_public.pem

    -----BEGIN PUBLIC KEY-----

    12039812039u10293012983912839128309128309812039810-923801928309182

    12039812039u10293012983912839128309128309812039810-923801928309182

    12039812039u10293012983912839128309128309812039810-923801928309182

    12039812039u10293012983912839128309128309812039810-923801928309182

    12039812039u10293012983912839128309128309812039810-923801928309182

    12039812039u10293012983912839128309128309812039810-923801928309182

    UQIDAQAB

    -----END PUBLIC KEY-----

    ```


    现在我们已经生成了密钥，可以将密钥添加到我们的 OCI 账户。在 OCI 控制台中，通过单击右上角的您的用户图标打开您的账户设置，然后选择 *我的配置文件*。接着，在资源列表中，选择
    API 密钥，如图 7-1 所示。


    ![](img/527055_1_En_7_Fig1_HTML.png)


    左侧是包含资源选项卡的窗口，其中选择了 API 密钥。顶部有“添加 API 密钥”按钮，并且存在指纹和创建日期的列。


    图 7-1


    API 密钥（我的配置文件）

    '
- fmt: 'Next, click the `Add API key` button as shown in Figure [7-1](#527055_1_En_7_Chapter.xhtml#Fig1)
    to add a new key. On the next screen, choose the `Paste a public key` option then
    copy the text shown from the `type` command including the sections marked with
    `--------…---------` and paste into the text box then click the `Add` button.


    ![](images/527055_1_En_7_Chapter/527055_1_En_7_Fig2_HTML.png)


    A dialog box to Add A P I key displays the options to upload or paste the public
    key. Select Paste a public key and it displays the public key in the blank area.


    Figure 7-2


    Add API Key (Paste Option)


    Once you click the Add button, you will see a dialog that shows you the configuration
    file you need to create on your PC. Figure [7-3](#527055_1_En_7_Chapter.xhtml#Fig3)
    shows an example of the output you can expect with certain parameters masked for
    security.


    ![](images/527055_1_En_7_Chapter/527055_1_En_7_Fig3_HTML.png)


    A dialog box for the configuration file preview displays the selected A P I key
    fingerprint. A blank space in the middle displays the coded program. Copy button
    and close button are at the bottom.


    Figure 7-3


    Sample OCI Configuration File Contents (Add API Key)


    Notice the API key is shown with a fingerprint, which is a special hash of the
    key unique to that key. We will be using the fingerprint in the configuration
    file we will create in the next step.


    In fact, we will use the `Copy` link to copy the contents of the sample configuration
    file and paste it into a file named `config` that we will place in the `.oci`
    folder we created earlier. Open a new file with your favorite text file editor
    and paste the text into the file and save it as `HOMEDRIVE%%HOMEPATH%\.oci`. Once
    that is done, click the `Close` button. You should now see your API key fingerprint
    in the list as shown (obscured for security) in Figure [7-4](#527055_1_En_7_Chapter.xhtml#Fig4).
    Note that the key shown may vary.


    ![](images/527055_1_En_7_Chapter/527055_1_En_7_Fig4_HTML.png)


    A table displays the A P I keys with the Add A P I key on the top left. A check
    box is at each row and the column''s titles are fingerprint and created. 1 fingerprint
    is added on 16 august 2022.


    Figure 7-4


    API Key List (My Profile)


    Ok, we’re almost done. There is one more thing we need to add to the config file.
    We must set the key location (path) of our SSH keys. Open the configuration file
    (`HOMEDRIVE%%HOMEPATH%\.oci`) and notice there is a line with a `TODO` note as
    shown below. Here, we will replace the <> with the path where the SSH keys are
    located:


    ```

    key_file= # TODO

    ```


    At the bottom of the file, replace the path as shown using your specific path
    on your PC to your SSH keys. Be sure to use the actual path:


    ```

    key_file=C:\Users\cbell\.oci\oci_api_key.pem

    ```


    Once you have made the changes, save, and close the file. We can test that our
    configuration is working by installing the OCI command line interface (CLI). We
    will be using the OCI CLI to test in this chapter but will use the OCI CLI in
    Chapter [8](#527055_1_En_8_Chapter.xhtml) to demonstrate how to script your MDS
    operations.


    ### Install and Test the OCI CLI


    To install the OCI CLI, we will use the PowerShell on Windows. Similar commands
    are available for other platforms. Be sure to open the PowerShell with administrator
    privileges. Note that the installation process enables auto-complete when running
    an installation script. You must enable the `RemoteSigned` execution policy, which
    is the first command. The next command changes the PowerShell to use TLS 1.2\.
    The following command downloads the installer script file, and the last command
    executes the installation script (with prompts). Listing [7-4](#527055_1_En_7_Chapter.xhtml#PC13)
    shows a sample execution of the required commands (shown in bold). Your output
    may vary depending on what Python packages you may have installed. Also, note
    that we use the default paths for all installations. Portions omitted for brevity.


    ```

    PS C:\WINDOWS\system32> Set-ExecutionPolicy RemoteSigned                                                                                                                                    Execution
    Policy Change

    Do you want to change the execution policy?

    [Y] Yes  [A] Yes to All  [N] No  [L] No to All  [S] Suspend  [?] Help (default
