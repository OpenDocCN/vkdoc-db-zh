    and while we do not get a status, we can get more information about this work
    request including the status with the following command. Here, we use the `work-request`
    subcommand with the `get` operation to fetch the details of a work request with
    the OCID specified in the `--work-request-id` option:


    ```

    C:\>oci mysql work-request get --work-request-id=ocid1.mysqlworkrequest.MASKED

