    *Delete session*. You can delete the bastion by clicking on the *Delete bastion*
    button on the bastion details page.


    If the connection opened and you saw similar results to the listing, congratulations!
    You have successfully connected to your MySQL database server running on your
    DB System in OCI. You can experiment with MySQL queries as you now have access
    to the MySQL database system in OCI directly from your PC.


    Once you are done with experimenting, be sure to delete any DB Systems, Bastions,
    Compute Instances, or any other resource that you created in OCI that you do not
    need. Remember, if you do not want to delete the resources, you can reduce costs
    by stopping your DB Systems and Compute Instances.


    Practicing Good Cloud Hygiene


    If you are done experimenting with your DB System and want to continue exploring
    its features later, be sure to stop the DB System before you log out to minimize
    charges to your account. If you are going to be away from the tutorials in the
    book, you may want to consider deleting the DB System and other resources such
    as the Bastion Service you created to further minimize charges to your account.
    Remember, anything you leave running that is a billable resource will incur charges
    to your account. If you are using the trial account, that may not be a problem,
    but later on when you have a fleet of DB Systems and other OCI resources, leaving
    things running can add up after a while. Avoid monthly billing shocks by practicing
    good cloud computing hygiene.


    ## Summary


    The MySQL Database Service is a brave, new world for organizations wanting to
    leverage the power of MySQL – the world’s most popular open-source database system
    – in the cloud. Not only is this possible, but Oracle through its Oracle Cloud
    Infrastructure has made it easy to create and manage multiple MySQL Database Service
    DB Systems.


    While there are other resources available under the MySQL Database Service, DB
    Systems represent the core component for any infrastructure that hosts applications
    that require a database system. The best news is the DB System is a fully featured,
    managed instance of MySQL that you can tailor to your business needs.


    From CPU performance and memory (via shapes) to the size of the data storage,
    you can configure a host of DB Systems for your immediate needs. And you don’t
    have to spend your hard-earned funds buying hardware and human resources to set
    up, configure, and tune those servers – all of that is done for you in a manner
    of minutes! Clearly, DB Systems are the next evolution of the world’s leading
    open-source database system.


    In this chapter, we took a tour of the MySQL Database Service focusing on the
    DB System. We learned how to create a DB System, manage it, and more about the
    features available that you can use to work with the DB System. We even learned
    how to connect to the DB System from our PC.


    In the next chapter, we will learn more about the backup and restore features
    of MDS for DB Systems.


    Footnotes [1](#527055_1_En_4_Chapter.xhtml#Fn1_source)   [2](#527055_1_En_4_Chapter.xhtml#Fn2_source)


    # 5. Backup and Restore


    Now that we understand what the MySQL Database Service (MDS) is and how to create
    and connect to DB Systems in MDS we are almost ready to start using them in our
    projects and applications. However, there is one important feature that must be
    considered before planning integration with MDS and that is how to backup and
    restore our data.


    Professional systems and database administrators know that a good recovery plan
    needs to be in place before placing any important data on a system and vital to
    the longevity of the project and the organization. If something goes wrong you
    must be able to restore the data to some reasonable point where you can recover
    from the fault and rebuild the data. For many systems, a simple backup and restore
    mechanism is all that is needed.


    In this chapter, we will learn about the backup and restore options available
    to you in MDS that you can use to protect your data. However, before we jump into
    the backup and restore operations in MDS, let’s learn why it is important to have
    a plan for recovering your data in MDS.'
