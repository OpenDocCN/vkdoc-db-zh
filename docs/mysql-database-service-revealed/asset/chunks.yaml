    通常需要使用多个 MDS API 类来实现某些功能。让我们通过几个示例，简要浏览一下 Python 中的 MDS API。


    ### 示例使用


    当你初次开始使用 OCI SDK 时，可能会有些挑战。在本节中，我们将通过演示 Python SDK 如何工作的基础知识来了解如何开始。但首先，让我们安装
