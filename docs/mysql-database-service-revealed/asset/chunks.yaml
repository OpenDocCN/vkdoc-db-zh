    #### 小结


    开始使用任何基于云的服务所面临的挑战之一，就是将您的数据从本地存储（服务器或服务）转移到云端。对于开发者和那些规划其云端系统的人来说，能够将数据从云端导出也很重要。无论是用于开发、测试、质量控制、复制，还是仅仅用于离线备份，导出都和导入一样重要。


    省略这些功能的云服务可能会使导入问题变得比实际需要更大、更麻烦。虽然这个步骤通常只在您的解决方案投入生产时执行几次或仅一次，但在使用云服务时，导入和导出数据应该是一个无缝集成的过程。


    如果不存在导入和导出功能，开始使用 MDS 将会困难得多。幸运的是，我们了解到 MySQL Shell 提供了一些经过深思熟虑的实用程序，用于将数据导入（和导出）MDS。


    在本章中，我们了解了如何将数据从本地 MySQL 服务器迁移到 MDS 中的数据库系统。我们还看到了如何将数据从 MDS 迁出以在本地环境中使用的示例。


    我们还学习了将导出数据传输到 MDS 的三种机制；我们可以使用对象存储桶（推荐，快速）、将导出的数据上传到中间计算实例（较慢），或者使用堡垒服务将导出的数据直接上传到我们的数据库系统（最慢，不推荐）。如果您正在使用自己的本地
    MySQL 数据进行跟随操作，那么您现在已将其迁移到 MDS！


    在下一章中，我们将了解使您的数据库系统更具弹性和可靠性的高可用性选项。


    ### 8. 高可用性


    管理基础设施的数据库管理员和系统架构师理解在保持维护工作量最低的同时构建冗余的必要性。用于实现此目的的工具之一是一类使服务器或服务尽可能保持可用的功能。我们称之为高可用性。


    高可用性不仅是建立稳健、随时可用基础设施的关键因素，也是稳健的企业级数据库系统的品质。Oracle 持续开发和改进 MySQL 中的高可用性功能，并将这些能力转化到
    MySQL 数据库服务（MDS）中。


    MDS 中的高可用性是通过数据库系统中的一个特性实现的，该特性利用了一系列基于 MySQL 组复制长期稳定性构建的组件和自动化。这些组件共同构成了 MDS
    中数据库系统的高可用性功能。


    在本章中，我们将探讨什么是高可用性，以及如何使用 MDS 中的数据库系统来实现高可用性。让我们从一个关于高可用性的简要教程开始。

    '
- fmt: '## Overview


    高可用性最容易理解的方式是将其大致等同于可靠性——即在约定的时间内，尽可能确保解决方案的可访问性，并能容忍计划内或计划外的故障。换句话说，它是用户可以期望系统处于运行状态的时间比例。系统越可靠，运行时间越长，就意味着可用性水平越高。


    实现高可用性有多种方式，从而产生不同级别的可用性。这些级别可以作为实现更高可靠性状态的目标来表达。本质上，你使用技术和工具来提升可靠性，使解决方案能够持续运行，数据尽可能长时间可用（也称为正常运行时间）。正常运行时间以解决方案运行时间的比例或百分比表示。


    你可以通过遵循以下工程原则来实现高可用性：


    *   **消除单点故障**：设计你的解决方案，尽可能减少那些一旦发生故障就会导致解决方案无法使用的组件。

    *   **通过冗余实现恢复**：设计你的解决方案，允许多个主动冗余机制，以便从故障中快速恢复。

    *   **实现容错**：设计你的解决方案，以主动检测故障，并通过切换到冗余或备用机制自动恢复。


    这些原则是构建更高级别可靠性（从而实现高可用性）的基础模块或步骤。即使你不需要实现最高的可用性（解决方案几乎一直运行），通过实施这些原则，你至少也能让你的解决方案更加可靠，这是一个很好的目标。


    **可靠性与高可用性：有何区别？**


    可靠性衡量的是一个解决方案随时间推移的运行状况，这涵盖了高可用性的主要目标之一。实际上，你可以说可靠性的终极水平——即解决方案始终处于运行状态——就是高可用性的定义。因此，要使你的解决方案成为高可用解决方案，你应该专注于提高可靠性。


    ### MDS 中的高可用性


    MDS 中的高可用性功能内置于数据库系统中。它使用组复制来提供辅助服务器，以便在主服务器不可用时提供连续性。MySQL 组复制非常健壮，但对某些人来说，其设置和管理可能很复杂。然而，Oracle
    为 MDS 提供的自动化层使得配置和管理易于设置和使用。以至于你甚至不需要了解组复制的工作原理即可使用它：


    提示


    有关 MySQL 组复制的更多信息，请参阅 [`https://dev.mysql.com/doc/refman/8.0/en/group-replication.xhtml`](https://dev.mysql.com/doc/refman/8.0/en/group-replication.xhtml)。


    启用高可用性的数据库系统通过安全、受管理的内部网络复制数据，该网络与你为数据库系统终端连接配置的 VCN 子网不相连。但是，启用高可用性的数据库系统会使用更多资源（例如内存、CPU
    处理和网络带宽）。因此，网络吞吐量的性能可能与没有高可用性的数据库系统不同。


    由于 MDS 使用组复制，你可能会遇到一些使用的术语，例如主（负责对数据进行读/写访问的服务器实例）和辅助（一个或多个用作备用的服务器）、故障转移（当组复制检测到主服务器发生故障，并自动选择一个辅助服务器作为其替代者时）和切换（用户手动将主角色从主服务器切换到辅助服务器）。


    MDS 高可用性使用三个数据库系统实现：一个主系统和两个辅助系统。这形成了一个允许自动故障转移的最小组。所有写入主系统的数据都会被复制（复制）到辅助系统，使它们可用于故障转移或切换。


    在数据库系统上启用高可用性时，你可以为主数据库系统选择可用性域，而辅助数据库系统会被放置在另外两个可用性域中，从而使系统在可用性域级别上具有容错能力（因为这些域是独立的支撑硬件）。这是主实例的首选放置方式。辅助实例会自动放置在另外两个可用性或故障域中。


    你可以选择使用以下方法之一来放置数据库系统：


    *   **具有区域子网的多可用性域**：主系统和辅助系统放置在不同的可用性域中。

    *   **具有可用性域特定子网的多可用性域**：主系统和辅助系统放置在同一可用性域中的不同故障域中。

    *   **单可用性域区域**：主系统和辅助系统放置在同一可用性域中的不同故障域中。


    #### 故障转移和切换如何工作？


    当组复制检测到主服务器发生故障（故障转移）或用户发起手动切换（切换）时，组复制会将主角色切换到辅助服务器。此操作称为将辅助服务器提升为主服务器。


    当组复制检测到主服务器不再可用时，故障转移是自动发生的。此时，一个辅助服务器被选中并提升为主服务器，恢复客户端应用程序的可用性且不会丢失数据。另一方面，切换是由用户发起的，一旦发起，就会将一个辅助服务器提升为主服务器。


    #### 故障转移的条件是什么？


    有两大类事件可能导致故障转移条件：硬件和 MySQL。硬件故障包括存储、网络、可用性域或主机（VM 主机）事件。MySQL 故障包括 MySQL 进程停止、操作系统崩溃、MySQL
    实例性能低下或负载过高导致性能下降，或组复制错误。所有这些事件都可能导致组复制启动故障转移事件的条件。


    ### 前提条件


    如前所述，启用高可用性的数据库系统使用三个数据库系统，因此将消耗三倍的磁盘存储空间，这也意味着你的成本会略高，具体取决于所选的形状和数据存储大小。除此之外，使用数据库系统的高可用性还有一个前提条件：主键。


    注意


    此后，当我们提及启用了高可用性的数据库系统时，我们将使用术语 HA 和 HA 数据库系统。


    如果你想在数据库系统上启用高可用性，你的表必须有主键。这对于组复制能够正确（且唯一地）识别表中的行至关重要。以下部分将向你展示如何查找没有主键的表，以及在不给模式增加不必要复杂性的情况下添加主键的策略。'
  raw: '## Overview


    High availability is easiest to understand if you consider it loosely synonymous
    with reliability – making the solution as accessible as possible and tolerant
    to failures either planned or unplanned for an agreed upon period. That is, it’s
    how much users can expect the system to be operational. The more dependable the
    system and thus the longer it is operational equates to a higher level of availability.


    High availability can be accomplished in many ways, resulting in various levels
    of availability. The levels can be expressed as goals to achieving some higher
    state of reliability. Essentially, you use techniques and tools to boost reliability
    and make it possible for the solution to keep running and the data to be available
    as long as possible (also called uptime). Uptime is represented as a ratio or
    percentage of the amount of time the solution is operational.


    You can achieve high availability by practicing the following engineering principles:


    *   *Eliminate Single Points of Failure*: Design your solution so that there are
    as few components as possible that, should they fail, render the solution unusable.


    *   *Add Recovery Through Redundancy*: Design your solution to permit multiple,
    active redundant mechanisms to allow rapid recovery from failures.


    *   *Implement Fault Tolerance*: Design your solution to actively detect failures
    and automatically recover by switching to a redundant or alternative mechanism.


    These principles are building blocks or steps to take to reach higher levels of
    reliability and thus high availability. Even if you do not need to achieve maximum
    high availability (the solution is up nearly all the time), by implementing these
    principles you will make your solution more dependable at the least, which is
    a good goal to achieve.


    Reliability vs. High Availability: What is the Difference?


    Reliability is a measure of how operational a solution is over time, which covers
    one of the major goals for high availability. Indeed, you could say that the ultimate
    level of reliability – the solution is always operational – is the definition
    of high availability. Thus, to make your solution a high-availability solution,
    you should focus on improving reliability.


    ### High Availability in MDS


    The high availability feature in MDS is built into the DB System. It uses group
    replication to provide secondary servers that can be used to provide continuity
    in the event something happens to render the primary unavailable. MySQL Group
    Replication is very robust and, for some, can be complex to set up and manage.
    However, Oracle’s automation layer for MDS makes the configuration and management
    easy to set up and use. So much so that you do not need to know how group replication
    works to use it:


    Tip


    See [`https://dev.mysql.com/doc/refman/8.0/en/group-replication.xhtml`](https://dev.mysql.com/doc/refman/8.0/en/group-replication.xhtml)
    for more information about MySQL Group Replication.


    DB Systems with high availability enabled replicate data over a secure, managed,
    internal network, unconnected to the VCN subnet you configured for your DB System
    endpoint connection. However, DB Systems with high availability use more resources
    (e.g., memory, CPU processing, and networking bandwidth). Thus, the performance
    of networking throughput may differ from a DB System without high availability.


    Since MDS uses group replication, you may encounter some of the terms used such
    as primary (the server instance responsible for read/write access to the data)
    and secondary (one or more servers used as standby), failover (when group replication
    detects that the primary has failed and a secondary is automatically selected
    as its replacement), and switchover (a manual switch of the primary role from
    the primary to a secondary).


    MDS high availability is implemented using three DB Systems: one primary and two
    secondaries. This forms a minimal group that permits automatic failover. All data
    written to the primary is copied (replicated) to the secondaries making them available
    for failover or switchover.


    When you enable high availability on a DB System, you can select the availability
    domain for the primary DB System and the secondary DB Systems are placed in two
    other availability domains making the system fault tolerant at the availability
    domain level (since the domains are separate supporting hardware). This is the
    preferred placement of the primary instance. The secondaries are placed automatically
    in the other two availability or fault domains.


    You can choose to place the DB Systems using on the following methods:


    *   *Multiple Availability Domains with a Regional Subnet*: The primary and secondaries
    are placed in different availability domains.


    *   *Multiple Availability Domains with an Availability Domain-Specific Subnet*:
    The primary and secondaries are placed in different fault domains in the same
    availability domain.


    *   *Single Availability Domain Region*: The primary and secondaries are placed
    in different fault domains in the same availability domain.


    #### How Does Failover and Switchover Work?


    When group replication detects that the primary has failed (failover) or if the
    user initiates a manual switch (switchover), group replication will switch the
    primary role to a secondary. This action is called promotion of promoting a secondary
    to a primary.


    Failover is automatic when group replication detects that the primary is no longer
    viable. When this occurs, one of the secondaries is selected and promoted to the
    primary resuming availability for client applications without data loss. Switchover
    on the other hand is initiated by the user, and once initiated promotes a secondary
    to the primary.


    #### What Are the Conditions for Failover?


    There are two main groups of incidents that can cause failover conditions: hardware
    and MySQL. Hardware failures include storage, network, availability domain, or
    host (VM host) incidents. MySQL failures include if the MySQL process stops, operating
    system crashes, MySQL instance is slow or taxed resulting in low performance,
    or group replication errors. All these incidents can cause conditions where group
    replication initiates a failover event.


    ### Prerequisites


    As mentioned, DB Systems with high availability use three DB Systems and thus
    will consume three times the disk storage, which also means your costs will be
    slightly higher again depending on shape and data storage sizes chosen. Aside
    from that, there is one other prerequisite for using high availability with DB
    Systems: primary keys.


    Note


    Henceforth when referring to DB Systems with high availability enabled, we will
    use the terms HA and HA DB System.


    If you want to enable HA on a DB System, your tables must have primary keys. This
    is essential for group replication to be able to correctly (and uniquely) identify
    rows in your tables. The following sections show you how to find tables without
    primary keys and strategies for adding primary keys without adding unnecessary
    complexity to your schema.'
  trans: '## 概述


    理解高可用性的最简单方式，是将其大致等同于可靠性——即在约定的时间内，尽可能确保解决方案的可访问性，并能容忍计划内或计划外的故障。换句话说，它是用户可以期望系统处于运行状态的时间比例。系统越可靠，运行时间越长，就意味着可用性水平越高。


    实现高可用性有多种方式，从而产生不同级别的可用性。这些级别可以作为实现更高可靠性状态的目标来表达。本质上，你使用技术和工具来提升可靠性，使解决方案能够持续运行，数据尽可能长时间可用（也称为正常运行时间）。正常运行时间以解决方案运行时间的比例或百分比表示。


    你可以通过遵循以下工程原则来实现高可用性：


    *   **消除单点故障**：设计你的解决方案，尽可能减少那些一旦发生故障就会导致解决方案无法使用的组件。

    *   **通过冗余实现恢复**：设计你的解决方案，允许多个主动冗余机制，以便从故障中快速恢复。

    *   **实现容错**：设计你的解决方案，以主动检测故障，并通过切换到冗余或备用机制自动恢复。


    这些原则是构建更高级别可靠性（从而实现高可用性）的基础模块或步骤。即使你不需要实现最高的可用性（解决方案几乎一直运行），通过实施这些原则，你至少也能让你的解决方案更加可靠，这是一个很好的目标。


    **可靠性与高可用性：有何区别？**


    可靠性衡量的是一个解决方案随时间推移的运行状况，这涵盖了高可用性的主要目标之一。实际上，你可以说可靠性的终极水平——即解决方案始终处于运行状态——就是高可用性的定义。因此，要使你的解决方案成为高可用解决方案，你应该专注于提高可靠性。


