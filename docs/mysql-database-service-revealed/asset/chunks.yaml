    SSL 选项。可以使用命令行选项在命令行上指定它们，也可以作为 `\connect` Shell 命令的扩展。以下是如何使用 SSL 和命令行选项连接到服务器。


    ```bash

    $ mysqlsh -uroot -h127.0.0.1 --port=33060 --ssl-mode=REQUIRED

    ```


    > **提示**

    >

    > 有关加密连接的更多详细信息，请参阅 MySQL Shell 参考手册中的“使用加密连接”部分。


    MySQL Shell 是 MySQL 客户端技术的一个巨大飞跃。它不仅旨在以更智能的方式与 MySQL 中的 SQL 配合工作，还旨在支持 JavaScript
    和 Python 的原型设计。你可以使用任何你想要的语言，并轻松地在它们之间切换，而无需重新启动应用程序或断开连接。这有多酷？


    现在，让我们来看看连接到 MySQL 服务器的旧应用程序。'
- fmt: '### Connecting with the MySQL Client


    While the MySQL Shell has been around for a few years and has many features including
    scripting and development capabilities, there is another client that has been
    around in MySQL for decades. It is an application named `mysql`, which enables
    you to connect to and run SQL commands on the server. Interestingly, this MySQL
    client was originally named the MySQL monitor but has long since been called simply
    the “MySQL client,” terminal monitor, or even the MySQL command window.


    You can only get the `mysql` client if you install the MySQL server (on Windows
    or macOS) or one of the package components. For example, on Linux, you can install
    only the client package, which will give you the client as well. We will save
    installation of the client to a later section where we install MySQL on our local
    PC.


    #### New Default Authentication


    Prior to MySQL version 8.0.4, the default authentication mechanism used an authentication
    plugin called the `mysql_native_password plugin`, which used the SHA1 algorithm.
    This mechanism was fast and did not require an encrypted connection. However,
    since NIST has suggested organization stop using the SHA1 algorithm, Oracle has
    changed the default authentication plugin in MySQL version 8.0.4 to the `cachin_sha2_password`
    plugin.


    If you would like to learn more about the changes including why Oracle made the
    change and the advantages for users, see [`https://mysqlserverteam.com/mysql-8-0-4-new-default-authentication-plugin-caching_sha2_password/`](https://mysqlserverteam.com/mysql-8-0-4-new-default-authentication-plugin-caching_sha2_password/).


    To connect to the server using the MySQL client (`mysql`), you must specify a
    user account and the server to which you want to connect. If you are connecting
    to a server on the same machine, you can omit the server information (host and
    port) since they default to localhost on port 3306\. The user is specified using
    the `--user` (or `-u`) option. You can specify the password for the user on the
    command, but the more secure practice is to specify `--password` (or `-p`), and
    the client with prompt you for the password. If you do specify the password on
    the command line, you will be prompted with a warning encouraging you to not use
    that practice.


    Using the `mysql` client on the same machine without the `--host` (or `-h`) and
    `--port` option does not use a network connection. If you want to connect using
    a network connection or want to connect using a different port, you must use the
    loopback address. For example, to connect to a server running on port 3307 on
    the same machine, use the command `mysql -uroot -p –h127.0.0.1 --port=3306`. Listing
    [3-3](#527055_1_En_3_Chapter.xhtml#PC5) shows an example of connecting (and disconnecting)
    to a MySQL server with the `mysql` client.


    ```

    $ mysql -uroot -p -h 127.0.0.1 --port=3306

    Enter password:

    Welcome to the MySQL monitor.  Commands end with ; or \g.

    Your MySQL connection id is 15

    Server version: 8.0.23 MySQL Community Server - GPL

    Copyright (c) 2000, 2021, Oracle and/or its affiliates.

    Oracle is a registered trademark of Oracle Corporation and/or its

    affiliates. Other names may be trademarks of their respective

    owners.

    Type ''help;'' or ''\h'' for help. Type ''\c'' to clear the current input statement.

    mysql> quit

    Bye

    Listing 3-3

    Connecting with the mysql Client

    ```


    ### Basic SQL Commands


    Now that we’ve seen how to connect to MySQL, let’s take a brief look at some of
    the more popular SQL commands you will likely use by way of a short example. We
    will discuss the commands in more detail in a later section. Listing [3-4](#527055_1_En_3_Chapter.xhtml#PC6)
    shows examples of several SQL commands in action using the `mysql` client.


    Tip: To see a list of the commands available in the client, type `help;` and press
    `Enter` at the prompt.


    ```

    $ mysql -uroot -p -h 127.0.0.1 --port=3306

    Enter password:

    Welcome to the MySQL monitor.  Commands end with ; or \g.

    Your MySQL connection id is 15

    Server version: 8.0.23 MySQL Community Server - GPL

    Copyright (c) 2000, 2021, Oracle and/or its affiliates.

    Oracle is a registered trademark of Oracle Corporation and/or its

    affiliates. Other names may be trademarks of their respective

    owners.

    Type ''help;'' or ''\h'' for help. Type ''\c'' to clear the current input statement.

    mysql> CREATE DATABASE greenhouse;

    Query OK, 1 row affected (0.00 sec)

    mysql> CREATE TABLE greenhouse.plants (plant_name char(50), sensor_value int,
    sensor_event timestamp);

    Query OK, 0 rows affected (0.02 sec)

    mysql> INSERT INTO greenhouse.plants VALUES (''living room'', 23, NULL);

    Query OK, 1 row affected (0.01 sec)

    mysql> SELECT * FROM greenhouse.plants;

    +-------------+--------------+--------------+

    | plant_name  | sensor_value | sensor_event |

    +-------------+--------------+--------------+

    | living room |           23 | NULL         |

    +-------------+--------------+--------------+

    1 row in set (0.00 sec)

    mysql> SET @@global.server_id = 106;

    Query OK, 0 rows affected (0.00 sec)

    mysql> quit

    Bye

    Listing 3-4

    Example SQL Commands Using the mysql Client

    ```


    In this example, you see data definition language^([⁵](#fn5)) (DDL) in the form
    of the `CREATE DATABASE` and `CREATE TABLE` statements, data manipulation language^([⁶](#fn6))
    (DML) in the form of the `INSERT` and `SELECT` statements, and a simple administrative
    command to set a global server variable.


    Next you see the creation of a database and a table to store the data, the addition
    of a row in the table, and finally the retrieval of the data in the table. Notice
    how I used capital letters for SQL command keywords. This is a common practice
    and helps make the SQL commands easier to read and easier to find user-supplied
    options or data.


    Tip: You can exit the MySQL client by typing the command `quit`. On Linux and
    Unix systems, you can press `Ctrl+D` to exit the client.


    A great many commands are available in MySQL. Fortunately, you need to master
    only a few of the more common ones. The following are the commands you will use
    most often. The portions enclosed in `<>` indicate user-supplied components of
    the command, and `[...]` indicates that additional options are needed:


    *   `CREATE DATABASE <database_name>`: Creates a database

    *   `USE <database>`: Sets the default database (not an SQL command)

    *   `CREATE TABLE <table_name> [...]`: Creates a table or structure to store data

    *   `INSERT INTO <table_name> [...]`: Adds data to a table

    *   `UPDATE [...]`: Changes one or more values for a specific row

    *   `DELETE FROM <table_name> [...]`: Removes data from a table

    *   `SELECT [...]`: Retrieves data (rows) from the table

    *   `SHOW [...]`: Shows a list of the objects


    Note: You must terminate each command with a semicolon (`;`) or `\G`.


    Although this list is only a short introduction and nothing like a complete syntax
    guide, there is an excellent online reference manual that explains every command
    (and much more) in greater detail. You should refer to the online reference manual
    whenever you have a question about anything in MySQL. You can find it at [`http://dev.mysql.com/doc/`](http://dev.mysql.com/doc/).


    One of the more interesting commands shown allows you to see a list of objects.
    For example, you can see the databases with `SHOW DATABASES`, a list of tables
    (once you change to a database) with `SHOW TABLES`, and even the permissions for
    users with `SHOW GRANTS`. I find myself using these commands quite frequently.


    If you are thinking that there is a lot more to MySQL than a few simple commands,
    you are correct. Despite its ease of use and fast startup time, MySQL is a full-fledged
    relational database management system (RDBMS). There is much more to it than you’ve
    seen here. For more information about MySQL, including all the advanced features,
    see the reference manual.'
