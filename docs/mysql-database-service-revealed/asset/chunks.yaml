  trans: "\n### 连接 MySQL Shell\n\nMySQL Shell 是 MySQL 产品组合中新增的一个令人兴奋的组件。它代表了首个用于连接和交互\
    \ MySQL 的现代化高级客户端。该 Shell 可作为脚本环境，用于开发处理数据的新工具和应用程序。虽然它确实支持 SQL 模式，但其主要目的是允许使用\
    \ JavaScript 和 Python 语言访问数据。没错，你可以编写 JavaScript 和 Python 脚本，并在 Shell 中以交互方式或批处理方式执行它们。很酷吧！\n\
    \n**注意**\n\n我使用术语 “shell” 指代 MySQL Shell 支持的功能或对象。我使用 “MySQL Shell” 指代产品本身。\n\n\
    MySQL Shell 设计用于通过 X Plugin 使用新的 X Protocol 与服务器通信。但是，Shell 也可以使用较旧的协议连接到服务器，尽管在脚本模式下功能有限。这意味着，Shell\
    \ 允许你同时处理关系型（SQL）、JSON 文档（NoSQL）或两者。\n\nNoSQL 接口基于一个称为 X DevAPI（[`https://dev.mysql.com/doc/x-devapi-userguide/en/`](https://dev.mysql.com/doc/x-devapi-userguide/en/)）的应用程序编程接口。管理操作则由另一个称为\
    \ AdminAPI 的 API 支持。如果你计划使用 Shell 进行开发工作，请参阅在线文档以获取有关这些 API 的更多信息（[`https://dev.mysql.com/doc/mysql-shell/8.0/en/`](https://dev.mysql.com/doc/mysql-shell/8.0/en/)）。\n\
    \nOracle 通过 MySQL 下载网站（[`https://dev.mysql.com/downloads/shell/`](https://dev.mysql.com/downloads/shell/)）免费提供\
    \ MySQL Shell。你可以下载适用于你平台（例如 Windows、macOS、Linux）的特定版本，并使用你平台的常规机制进行安装。安装后，可以通过你平台的菜单系统或通过在命令行输入\
    \ `mysqlsh` 来启动它。图 3-1 显示了一个启动 MySQL Shell 的示例。注意其漂亮的提示符，它显示了 MySQL 徽标、连接信息和模式。很棒！\n\
    \n![](img/527055_1_En_3_Fig1_HTML.png)\n\nMySQL Shell 屏幕截图，显示版权及其关联公司。在命令行中键入\
    \ mysqlsh 以启动 MySQL Shell。\n\n图 3-1\n\n**MySQL Shell**\n\n以下各节从高层次介绍了 Shell 的主要功能。我们不会探讨每个功能或选项的所有细节，相反，本节提供了一个广泛的概述，以便你能快速开始，更重要的是，了解足够多的\
    \ Shell 知识，以便你能跟上本书中的示例。\n\n有关 MySQL Shell 的更多信息，请参阅在线 MySQL 参考手册中名为 “MySQL Shell\
    \ 用户指南” 的部分。\n\n#### 功能特性\n\nMySQL Shell 具有许多功能，包括支持传统 SQL 命令处理、脚本原型设计，甚至支持自定义\
    \ Shell。以下列出了 Shell 的一些主要功能。大多数功能可以通过命令行选项或特殊的 Shell 命令来控制。我们将在后续章节中更深入地探讨一些更关键的功能：\n\
    \n*   *日志记录*：你可以为会话创建日志以供后续分析或保存消息记录。你可以使用 `--log-level` 选项设置详细级别，范围从 1（无日志记录）到\
    \ 8（最大调试信息）。\n\n*   *输出格式*：Shell 支持三种格式选项：表格（`--table`），这是你从旧客户端习惯的传统网格格式；制表符分隔（tabbed），它使用制表符进行间距并用于批处理执行；以及\
    \ JSON（`--json`），它以更易于阅读的方式格式化 JSON 文档。这些是你在启动 Shell 时指定的命令行选项。\n\n*   *交互式代码执行*：使用\
    \ Shell 的默认模式是交互模式，它像传统客户端一样工作，你输入命令并获得响应。\n\n*   *批处理代码执行*：如果你想在没有交互会话的情况下运行脚本，可以使用\
    \ Shell 以批处理模式运行脚本。但是，输出仅限于非格式化输出（但可以使用 `--interactive` 选项覆盖）。\n\n*   *脚本语言*：Shell\
    \ 同时支持 JavaScript 和 Python，但一次只能使用一种。\n\n*   *会话*：会话本质上是到服务器的连接。Shell 允许你存储和删除会话。我们将在后面的章节中看到更多关于会话的内容。\n\
    \n*   *启动脚本*：你可以定义一个脚本在 Shell 启动时执行。你可以用 JavaScript 或 Python 编写该脚本。\n\n*   *命令历史和命令补全*：Shell\
    \ 会保存你输入的命令，允许你使用上下箭头键调用它们。Shell 还为已知关键字、API 函数和 SQL 关键字提供代码补全功能。\n\n*   *全局变量*：Shell\
    \ 提供了一些全局变量，你可以在交互模式下访问它们。这些包括：\n    *   `session`：如果已建立，则为全局会话对象\n    *   `db`：如果通过连接建立，则为模式对象\n\
    \    *   `dba`：用于处理 InnoDB 集群的 AdminAPI 对象\n    *   `shell`：用于使用 Shell 的通用函数\n\
    \    *   `util`：用于处理服务器的实用函数\n\n*   *自定义提示符*：你还可以通过使用特殊格式更新名为 `~/.mysqlsh/prompt.json`\
    \ 的配置文件或定义名为 `MYSQLSH_PROMPT_THEME` 的环境变量来更改默认提示符。有关更改提示符的更多详细信息，请参阅 MySQL Shell\
    \ 参考手册。\n\n*   *自动补全*：从 8.0.4 版本开始，Shell 允许用户按 *TAB* 键在 SQL 模式下自动补全关键字，以及在 JavaScript\
    \ 和 Python 模式下自动补全主要类和方法。\n\n*   *扩展*：你可以以报告和扩展对象的形式定义扩展。报告和扩展对象可以使用 JavaScript\
    \ 或 Python 创建。\n\n*   *实用程序*：Shell 还提供了几个你可能会觉得有用的实用程序，包括以下。你可以通过 API 调用访问它们，如示例所示。\n\
    \    *   *升级检查器*：用于验证 MySQL 服务器实例是否已准备好进行升级（例如，`util.checkForServerUpgrade()`）。\n\
    \    *   *JSON 导入*：将 JSON 文档导入到 MySQL 服务器的集合或表中（例如，`util.importJSON()`）。\n   \
    \ *   *并行表导入*：拆分单个数据文件并使用多个线程将数据块加载到 MySQL 表中。\n\n*   *Shell 命令*：与原始的 MySQL 客户端一样，有一些特殊命令用于控制应用程序本身，而不是与数据交互。要执行\
    \ Shell 命令，请使用反斜杠（`\\`）发出命令。例如，`\\help` 会打印所有 Shell 命令的帮助信息。\n\n*   *选项*：可以使用多个启动选项来启动\
    \ Shell，这些选项控制模式、连接、行为等。常见选项包括模式（SQL、JavaScript 或 Python）和连接参数。有关选项的完整列表，请使用 `mysqlsh\
    \ --help` 执行 Shell。\n\n如你所见，MySQL Shell 有一个长长的功能列表。有关完整的功能列表，请参阅在线参考手册。\n\n让我们看看对于刚开始使用\
    \ MySQL 的人来说最重要的两个方面：模式以及如何连接。\n"
- fmt: '## 模式支持


    MySQL Shell 支持三种模式（也称为语言支持或活动语言）：SQL、JavaScript 和 Python。我们可以通过 Shell 命令来启动其中任何一种模式。你可以根据需要随时切换模式（语言），而无需每次断开连接。以下是三种模式及其切换方式：


    *   `\sql`：切换到 SQL 语言


    *   `\js`：切换到 JavaScript 语言（默认模式）


    *   `\py`：切换到 Python 语言


    你也可以使用 `--` 代替 `\` 作为启动命令（`--sql`、`--js`、`--py`）。


    ## 建立连接


    在 Shell 中建立连接是一个需要与原来 MySQL 客户端（`mysql`）不同操作习惯的领域。你可以使用特殊格式的 URI 字符串，或者像旧客户端那样通过指定名称的各个选项来连接到服务器。也支持
    SSL 连接。连接可以通过启动选项、Shell 命令和脚本建立。但是，所有连接都需要密码。因此，除非另有说明，否则如果未提供密码，Shell 将提示输入密码。


    > **注意**

    >

    > 如果你想使用无密码连接（不推荐），必须使用 `--password` 选项，或者如果使用 URI，则需要额外添加一个冒号来代替密码。


    与其讨论所有可用的连接方式及相应选项，不如在下面的章节中介绍每种连接方法的一个示例。


    ### 使用 URI


    在 MySQL Shell 连接的场景下，URI 是一个使用以下格式编码的特殊字符串：`<dbuser>[:<dbpassword>]@host[:port][/schema/]`，其中
    `<>` 表示各个参数的字符串值。注意，密码、端口和模式是可选的，但用户和主机是必需的。这里的模式是指连接时要使用的默认模式（数据库）。


    > **注意**

    >

    > X 协议的默认端口是 `33060`。


    要在启动 Shell 时在命令行上使用 URI 连接到服务器，请使用 `--uri` 选项指定它，如下所示：


    ```bash

    $ mysqlsh --uri root:secret@localhost:33060

    ```


    Shell 假定所有连接都需要密码，如果未提供密码，将提示输入密码。清单 3-1 显示了上面没有密码的相同连接。请注意 Shell 如何提示输入密码。


    ```bash

    $ mysqlsh --uri root@localhost:33060/world_x

    Please provide the password for ''root@localhost:33060'':

    Save password for ''root@localhost:33060''? [Y]es/[N]o/Ne[v]er (default No): Y

    MySQL Shell 8.0.28

    Copyright (c) 2016, 2022, Oracle and/or its affiliates.

    Oracle is a registered trademark of Oracle Corporation and/or its affiliates.

    Other names may be trademarks of their respective owners.

    Type ''\help'' or ''\?'' for help; ''\quit'' to exit.

    Creating a session to ''root@localhost:33060/world_x''

    Fetching schema names for autocompletion... Press ^C to stop.

    Your MySQL connection id is 8 (X protocol)

    Server version: 8.0.23 MySQL Community Server - GPL

    Default schema `world_x` accessible through db.

    MySQL  localhost:33060+ ssl  world_x  JS >

    ```

    *清单 3-1 使用 URI 连接*


    注意我还在 URI 中通过 `/schema` 选项指定了默认模式（`world_x`）。


    > **提示**

    >

    > `world_x` 数据库是一个示例数据库，你可以从 [`https://dev.mysql.com/doc/index-other.xhtml`](https://dev.mysql.com/doc/index-other.xhtml)
    下载。


    ### 使用单独选项


    你也可以在 Shell 命令行上使用单独的选项指定连接，例如指定用户、主机、端口等。有关连接选项的完整列表，请参阅在线参考手册（[`https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-connections.xhtml`](https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-connections.xhtml)）。清单
    3-2 展示了如何使用单独选项连接到 MySQL 服务器。


    ```bash

    $ mysqlsh --user root --host localhost --port 33060 --schema world_x --py --mx

    MySQL Shell 8.0.28

    Copyright (c) 2016, 2022, Oracle and/or its affiliates.

    Oracle is a registered trademark of Oracle Corporation and/or its affiliates.

    Other names may be trademarks of their respective owners.

    Type ''\help'' or ''\?'' for help; ''\quit'' to exit.

    Creating an X protocol session to ''root@localhost:33060/world_x''

    Fetching schema names for autocompletion... Press ^C to stop.

    Your MySQL connection id is 9 (X protocol)

    Server version: 8.0.23 MySQL Community Server - GPL

    Default schema `world_x` accessible through db.

    MySQL  localhost:33060+ ssl  world_x  Py >

    ```

    *清单 3-2 使用单独选项连接*


    注意，我通过 `--py` 选项将模式（语言）改为了 Python。


    ### 使用 SSL 连接


    你还可以创建 SSL 连接以实现到服务器的安全连接。要使用 SSL，必须将服务器配置为使用 SSL。要在运行 MySQL 的同一台机器上使用 SSL，可以使用
    `--ssl-mode=REQUIRED` 选项。你也可以按照在线参考手册（[`https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-connections.xhtml`](https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-connections.xhtml)）所示指定
    SSL 选项。可以使用命令行选项在命令行上指定它们，也可以作为 `\connect` Shell 命令的扩展。以下是如何使用 SSL 和命令行选项连接到服务器。


    ```bash

    $ mysqlsh -uroot -h127.0.0.1 --port=33060 --ssl-mode=REQUIRED

    ```


    > **提示**

    >

    > 有关加密连接的更多详细信息，请参阅 MySQL Shell 参考手册中的“使用加密连接”部分。


    MySQL Shell 是 MySQL 客户端技术的一个巨大飞跃。它不仅旨在以更智能的方式与 MySQL 中的 SQL 配合工作，还旨在支持 JavaScript
    和 Python 的原型设计。你可以使用任何你想要的语言，并轻松地在它们之间切换，而无需重新启动应用程序或断开连接。这有多酷？


    现在，让我们来看看连接到 MySQL 服务器的旧应用程序。'
  raw: '#### Modes Supported


    The shell supports three modes (also called language support or simply the active
    language); SQL, JavaScript, and Python. Recall we can initiate any one of these
    modes by using a shell command. You can switch modes (languages) as often as you
    want without disconnection each time. The following lists the three modes and
    how to switch to each:


    *   `\sql`: Switch to the SQL language


    *   `\js`: Switch to the JavaScript language (default mode)


    *   `\py`: Switch to the Python language


    You can also issue these commands as startup by using `--` instead of `\` (`--sql`,
    `--js`, `--py`).


    #### Making Connections


    Making connections in the shell is one area that may take some getting used to
    doing differently than the original MySQL client (`mysql`). You can use a specially
    formatted URI string or connect to a server using individual options by name (like
    the old client). SSL connections are also supported. Connections can be made via
    startup options, shell commands, and in scripts. However, all connections are
    expected to use a password. Thus, unless you state otherwise, the shell will prompt
    for a password if one is not given.


    Note


    If you want to use a connection without a password (not recommended), you must
    use the `--password` option or, if using an URI, include an extra colon to take
    the place of the password.


    Rather than discuss all the available ways to connect and all the options to do
    so, the following presents one example of each method of making a connection in
    the following sections.


    ##### Using a URI


    A URI in the case of a MySQL Shell connection is a special string coded using
    the following format: `<dbuser>[:<dbpassword>]@host[:port][/schema/]`, where `<>`
    indicates string values for the various parameters. Notice the password, port,
    and schema are optional but the user and host are required. Schema in this case
    is the default schema (database) that you want to use when connecting.


    Note


    The default port for the X Protocol is 33060.


    To connect to a server using a URI on the command line when starting the shell,
    specify it with the `--uri` option as follows:


    ```

    $ mysqlsh --uri root:secret@localhost:33060

    ```


    The shell assumes all connections require a password and will prompt for a password
    if one is not provided. Listing [3-1](#527055_1_En_3_Chapter.xhtml#PC2) shows
    the same connection above made without the password. Notice how the shell prompts
    for the password.


    ```

    $ mysqlsh --uri root@localhost:33060/world_x

    Please provide the password for ''root@localhost:33060'':

    Save password for ''root@localhost:33060''? [Y]es/[N]o/Ne[v]er (default No): Y

    MySQL Shell 8.0.28

    Copyright (c) 2016, 2022, Oracle and/or its affiliates.

    Oracle is a registered trademark of Oracle Corporation and/or its affiliates.

    Other names may be trademarks of their respective owners.

    Type ''\help'' or ''\?'' for help; ''\quit'' to exit.

    Creating a session to ''root@localhost:33060/world_x''

    Fetching schema names for autocompletion... Press ^C to stop.

    Your MySQL connection id is 8 (X protocol)

    Server version: 8.0.23 MySQL Community Server - GPL

    Default schema `world_x` accessible through db.

    MySQL  localhost:33060+ ssl  world_x  JS >

    Listing 3-1

    Connecting with a URI

    ```


    Notice I also specified the default schema (`world_x`) with the `/schema` option
    in the URI.


    Tip


    The world_x database is a sample database you can download from [`https://dev.mysql.com/doc/index-other.xhtml`](https://dev.mysql.com/doc/index-other.xhtml).


    ##### Using Individual Options


    You can also specify connections on the shell command line using individual options
    such as specifying the user, host, port, etc. See the online reference manual
    for a complete list of connection options ([`https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-connections.xhtml`](https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-connections.xhtml)).
    Listing [3-2](#527055_1_En_3_Chapter.xhtml#PC3) shows how to connect to a MySQL
    server using individual options.


    ```

    $ mysqlsh --user root --host localhost --port 33060 --schema world_x --py --mx

    MySQL Shell 8.0.28

    Copyright (c) 2016, 2022, Oracle and/or its affiliates.

    Oracle is a registered trademark of Oracle Corporation and/or its affiliates.

    Other names may be trademarks of their respective owners.

    Type ''\help'' or ''\?'' for help; ''\quit'' to exit.

    Creating an X protocol session to ''root@localhost:33060/world_x''

    Fetching schema names for autocompletion... Press ^C to stop.

    Your MySQL connection id is 9 (X protocol)

    Server version: 8.0.23 MySQL Community Server - GPL

    Default schema `world_x` accessible through db.

    MySQL  localhost:33060+ ssl  world_x  Py >

    Listing 3-2

    Connecting Using Individual Options

    ```


    Notice I changed the mode (language) to Python with the `--py` option.


    ##### Using SSL Connections


    You can also create SSL connections for secure connections to your servers. To
    use SSL, you must configure your server to use SSL. To use SSL on the same machine
    where MySQL is running, you can use the `--ssl-mode=REQUIRED` option. You can
    also specify the SSL options as shown in the online reference manual ([`https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-connections.xhtml`](https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-connections.xhtml)).
    You can specify them on the command line using the command line options or as
    an extension to the `\connect` shell command. The following shows how to connect
    to a server using SSL and command line options.


    ```

    $ mysqlsh -uroot -h127.0.0.1 --port=33060 --ssl-mode=REQUIRED

    ```


    Tip


    See the section “Using Encrypted Connections” in the MySQL Shell reference manual
    for more details about encrypted connections.


    The MySQL Shell is a huge leap forward in technology for MySQL clients. Not only
    is it designed to work with SQL in MySQL in a smarter way, it is also designed
    to enable prototyping of JavaScript and Python. You can work with any language
    you want and switch between them easily without having to restart the application
    or drop the connection. How cool is that?


    Now, let’s look at the older application for connecting to MySQL servers.'
