- fmt: '## Create the Compute Instance


    For this tutorial, we will create a simple compute instance using the smallest
    shape since we don’t need it for more than a demonstration. We will use the default
    values, which happen to be an always free compute instance. To get started, open
    the cloud console main menu and select Compute | Instances as shown in Figure
    2-27.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig27_HTML.jpg)


    The main menu on Oracle cloud highlights compute option. The compute menu on the
    right highlights instances with a rectangular box.


    Figure 2-27


    Compute Instances (Main Menu)


    On the Compute page, you will need to select the compartment using the filter
    control on the left as shown in Figure 2-28. Select the `oci-tutorial-compartment`
    that we created earlier.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig28_HTML.jpg)


    The compute page has filter control on the left. It lists the scope on the top,
    the compartment below it. The oci-tutorial compartment is displayed in the scroll
    button.


    Figure 2-28


    Set List Scope (Compute Page)


    Next, click the Create instance button in the instances list as shown in Figure
    2-29. This will launch the create instance dialog.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig29_HTML.png)


    A window highlights the create instance button on the top left. A table with no
    items found is displayed below it.


    Figure 2-29


    Compute Instances List (oci-tutorial-compartment)


    The create instance dialog is a long form. Let’s go through it a portion at a
    time.


    The first portion we will examine includes entries for the name, selecting the
    compartment, placement (availability domain), and the image and shape. Once again,
    we will use the defaults for the Placement and Image and shape entries. If you
    are curious what selections are available, you can click the Edit link in each
    section.


    If you are following along, change the name to `oci-tutorial-instance-1` as shown
    in Figure 2-30. You may see the name of the compute instance generated for you
    and may be in the form like `instance-20220312-1956`. You should also verify the
    correct compartment (`oci-tutorial-compartment`) is selected and then scroll.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig30_HTML.png)


    A window of create compute instance with name, create in the compartment. Placement
    details, images, and shape details are displayed below it.


    Figure 2-30


    Create Compute Instance (Part 1)


    The next portion is the Networking and Add SSH Keys sections. Here, we see OCI
    has once again chosen the VCN resource we created (it is the only one in the compartment).
    If you are curious about what networking options are available, you can click
    the Edit button. However, for the tutorial, the defaults are acceptable.


    The Add SSH Keys section is important because OCI will generate an SSH key pair
    for you. You will need to use these keys in order to be able to login to the compute
    instance.


    To download the private key, click the Save Private Key button to save the private
    key to your PC as shown in Figure 2-31.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig31_HTML.png)


    A window of create compute instance displays the second page with networking and
    Add S S H keys. Select generate a key pair in the Add S S H keys. The save private
    key is highlighted at the bottom.


    Figure 2-31


    Create Compute Instance (Part 2)


    You will need to place it in your SSH key directory (folder). For example, on
    macOS or Linux, you can save the files in `~/.ssh`. However, you can place the
    file anywhere you want so long as the permissions are set correctly as demonstrated
    below.


    ```

    % mkdir ~/.ssh

    % mv ~/Downloads/ssh-key-2022-03-13.key ~/.ssh/.

    % chmod 400 ~/.ssh/ssh-key-2022-03-13.key

    ```


    The next portion defines the Boot volume parameters including setting a custom
    size and specifying encryption. We will use the default, but you can explore the
    other options with the links provided. When you are ready, click the Create button
    as shown in Figure 2-32.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig32_HTML.png)


    A window for creating compute instance displays 3 boot volume options in a checklist
    box. The use of in-transit encryption is selected. At the bottom left create button
    is highlighted.


    Figure 2-32


    Create Compute Instance (Part 3)


    Now the compute instance will be provisioned. The detail page for the compute
    instance will be opened and the status will be shown as `PROVISIONING` with an
    orange background. This can take a while so you may not see any changes to the
    status right away. When the compute instance is provisioned and started, the status
    will change to `RUNNING` with a green background as shown in Figure 2-33. Take
    a moment and scan through the data presented. You will see a number of important
    values including the Public IP address and the OCID. We will use the Public IP
    address to login to the compute instance via a secure shell host (SSH) session.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig33_HTML.png)


    A window of oci-tutorial-instance-1 with the instance information. General information,
    instance details, instance access and public V N I C are described. Public IP
    addresses are highlighted.


    Figure 2-33


    Compute Instance Details Page


    If you do not have an SSH client installed on your PC, you will need to do so
    before connecting to your compute instance. An encrypted SSH session is required.
    An SSH client is installed by default for macOS and most Linux distributions.
    See your platform documentation for how to install an SSH client.


    Sadly, Windows does not come with an SSH client. Fortunately, there are several
    varieties available as third-party applications. One of the popular options is
    called PuTTY, which is actually a general terminal session application. The SSH
    feature in PuTTY is very easy to use. What I like most about PuTTY is it is open
    source software and therefore free to download and use.


    You can download PuTTY from [`www.putty.org`](http://www.putty.org). The download
    is not an installation package (`.msi`), rather, it is simply the PuTTY executable
    (`putty.exe`). Simply download the file and place it in a folder that is in your
    path environment variable. You can also put it in your documents folder and simply
    execute it from there or by referencing the folder.


    Returning to the compute instance details page, if you scroll down, you will see
    the Work requests section, which shows the workflows that have been or are executing
    on the compute instance. The workflow that we want to ensure is complete is the
    Create instance workflow, which should have a state of `Succeeded` as shown in
    Figure 2-34.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig34_HTML.png)


    A table for the work request with 3 rows and 6 columns. The column names are operation,
    state, %complete, accepted, started, and finished. One succeeded state entry is
    added.


    Figure 2-34


    Compute Instance Work Requests List


    Once you see the workflow has succeeded, we’re ready to connect to the instance
    with a terminal. To do so, simply use the following command. Here we see we are
    using the `ssh` utility and the `-i` parameter with a path to the private SSH
    key we downloaded previously. Next, we supply the username and the public IP address
    we found on the compute instance details page. The default username is `opc:`


    ```

    ssh -i  opc@

    ```'
