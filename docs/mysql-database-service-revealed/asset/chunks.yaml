    # 云端 MySQL 入门


    本书中示例的代码可在 Apress 网站 [`www.apress.com`](http://www.apress.com) 上获取。你可以在本书信息页面的“源代码/下载”选项卡中找到链接。该选项卡位于页面的“相关书籍”部分。


    ## 联系作者


    如果您有任何问题或意见——甚至发现您认为我应该知道的错误——都可以通过 `drcharlesbell@gmail.com` 联系我。


    ## 致谢


    我要感谢 Apress 众多才华横溢、充满活力的专业人士。我感谢我的编辑 Jonathan Gennick 和执行编辑 Jill Balzano 的理解与耐心。他们对这个项目的成功至关重要。我还要感谢
    Apress 庞大的出版专业团队，让我在印刷品中显得如此出色，并特别感谢技术审校者的睿智建议。非常感谢大家！


    最重要的是，我要感谢我的妻子 Annette，感谢她在我花大量时间与笔记本电脑相处时，所给予的无限耐心和理解。


    ## 关于作者 关于技术审校者


    云时代已经来临一段时间了。这是一个美好的愿景，我们不再需要设计、建造和配备人员来维护装满昂贵计算设备的巨大房间，这些设备需要训练有素、值得信赖的员工全天候关注和维护。最终目标是降低成本、提高能力。这导致了云解决方案和云提供商的快速增长。(¹)


    虽然云服务已经存在一段时间，但直到最近，云服务才变得功能齐全、足够复杂，能够支持现实世界的用例。其中一个用例就是将您的数据存储需求托管给云服务。


    在这种情况下，我们希望将 `MySQL` 用于我们所有的数据库需求，但我们不想自己构建和维护硬件和软件。相反，我们希望能够专注于构建我们的应用程序和满足客户的需求，而无需担心数据库系统。


    这正是 `Oracle Cloud Infrastructure` 和 `MySQL 数据库服务` 的设计目的——通过提供完全托管的 `MySQL` 数据库服务，让您能够专注于您的业务。


    `MySQL` 长期以来一直被认为是世界上最受欢迎的开源数据库，并且在世界数据库系统排名中持续位居第二，只有其所有者 (`Oracle`) 排名高于它。获得如此赞誉的理由包括经过验证的可靠性、高性能和易用性。众所周知，`MySQL`
    为世界上使用最广泛的网站提供支持，包括 `Facebook`、`YouTube` 和 [`booking.com`](http://booking.com)。正如您可能推测的那样，`MySQL`
    拥有一个强大而庞大的生态系统，以及世界领先的数据库公司 `Oracle` 的支持。


    近年来，`MySQL 堡垒服务` 使得组织能够扩展其基础设施以满足业务目标，同时保持低成本和生产力。随着 `MySQL` 迁移到云端，这一趋势仍在继续。事实上，由于
    `OCI` 中为他们提供了 `MySQL` 的常规管理，组织现在可以更快地进行创新和集成他们的解决方案。


    在本章中，我们将了解什么是 `Oracle Cloud Infrastructure` 和 `MySQL 数据库服务`，以及如何使用它们。虽然本书不是关于云计算或
    `Oracle Cloud Infrastructure` 的教程，但我们需要了解云计算和 `Oracle Cloud Infrastructure` 的基本概念，以便我们能够利用
    `MySQL 数据库服务`。


    ## 概述


    近年来，各种云提供商都提供了 `MySQL`，承诺提供更好的 `MySQL` 体验。虽然有些提供商成功地为云客户以各种形式提供了 `MySQL`，但一直缺乏一个能将
    `MySQL` 的精华封装在一个完全托管套餐中的产品。直到现在，这种情况才改变。


    `Oracle` 已将其 `MySQL` 加入到其 `Oracle Cloud Infrastructure (OCI)` 中漫长而令人印象深刻的服务列表中。在本节中，我们将对云计算、`Oracle
    Cloud Infrastructure` 和 `MySQL 数据库服务` 进行一个高层次的概述。


    ---

