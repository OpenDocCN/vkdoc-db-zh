  raw: '#### How to Find Tables Without Primary Keys


    You can search the MySQL metadata to locate tables without primary keys. Listing
    [8-1](#527055_1_En_8_Chapter.xhtml#PC1) shows an SQL statement that you can use
    to mine the metadata database in MySQL. Notice we use the `information_schema`
    and the `tables` to find the table name and schema by joining that to the `information_schema
    statistics` table to find primary indexes, which indicates the table has a primary
    key. We also exclude the MySQL metadata databases.


    ```

    SELECT t.table_schema, t.table_name

    FROM information_schema.tables t

    LEFT JOIN (SELECT table_schema, table_name

    FROM information_schema.statistics

    WHERE index_name = ''PRIMARY''

    GROUP BY table_schema, table_name, index_name

    ) pks

    ON t.table_schema = pks.table_schema AND t.table_name = pks.table_name

    WHERE pks.table_name IS NULL

    AND t.table_type = ''BASE TABLE''

    AND t.table_schema NOT IN (''mysql'', ''sys'', ''performance_schema'', ''information_schema'');

    Listing 8-1

    SQL Statement for Locating Tables Without Primary Keys

    ```


    Listing [8-2](#527055_1_En_8_Chapter.xhtml#PC2) shows the SQL statement execution
    where one table was found without a primary key.


    ```

    MySQL  localhost:33060+ ssl  SQL > SELECT t.table_schema, t.table_name FROM information_schema.tables
    t

    LEFT JOIN (SELECT table_schema, table_name

    FROM information_schema.statistics

    WHERE index_name = ''PRIMARY''

    GROUP BY table_schema, table_name, index_name

    ) pks

    ON t.table_schema = pks.table_schema AND t.table_name = pks.table_name  WHERE
    pks.table_name IS NULL

    AND t.table_type = ''BASE TABLE''

    AND t.table_schema NOT IN (''mysql'', ''sys'', ''performance_schema'', ''information_schema'');

    +--------------+------------+

    | TABLE_SCHEMA | TABLE_NAME |

    +--------------+------------+

    | no_keys      | t1         |

    +--------------+------------+

    1 row in set (0.0230 sec)

    Listing 8-2

    Checking for Missing Primary Keys (SQL)

    ```


    #### How to Add Surrogate Primary Keys


    While you can easily use an `ALTER TABLE` SQL command to add a primary key to
    a table either by using one or more fields for the key or by adding an auto increment
    field to create a surrogate key. However, there is another way: invisible columns.
    In MySQL 8.0.23 and later, you can add a column to a table and make the column
    invisible (does not display in queries). In this case, the invisible column is
    a surrogate key for the table that satisfies the prerequisite for HA DB Systems.


    The following shows an example of how to create an invisible column as a primary
    key for the table in the listing above using the `ALTER TABLE` statement. Notice
    we are adding an auto increment column as the primary key like we would normally
    but the `INVISIBLE FIRST` clause creates the invisible column:


    ```

    ALTER TABLE no_keys.t1 ADD surrogate_key BIGINT UNSIGNED NOT NULL AUTO_INCREMENT
    PRIMARY KEY INVISIBLE FIRST;

    ```


    Listing [8-3](#527055_1_En_8_Chapter.xhtml#PC4) shows the structure of the altered
    table.


    ```

    MySQL  localhost:33060+ ssl  SQL > EXPLAIN no_keys.t1\G

    *************************** 1\. row ***************************

    Field: surrogate_key

    Type: bigint unsigned

    Null: NO

    Key: PRI

    Default: NULL

    Extra: auto_increment INVISIBLE

    *************************** 2\. row ***************************

    Field: a

    Type: int

    Null: YES

    Key:

    Default: NULL

    Extra:

    *************************** 3\. row ***************************

    Field: b

    Type: char(1)

    Null: YES

    Key:

    Default: NULL

    Extra:

    3 rows in set (0.0024 sec)

    Listing 8-3

    Example of ALTER TABLE with Invisible Surrogate Primary Key

    ```


    Tip


    See [`https://dev.mysql.com/doc/refman/8.0/en/invisible-columns.xhtml`](https://dev.mysql.com/doc/refman/8.0/en/invisible-columns.xhtml)
    for more information about invisible columns.


    Now that you understand the goals or requirements that high availability (HA)
    can solve, let’s now discuss how you can set up your DB Systems to use the MDS
    high availability feature.


    ## How to Set Up HA


    Setting up HA on a DB System is very easy. You need only select the options to
    enable HA during DB System creation or enable HA on an existing DB System. The
    following sections demonstrate each condition.


    ### Setup HA (Create DB System)


    When you create a DB System, you have the option to enable HA. The following explains
    how to enable HA when you create a new DB System. We omit details that are the
    same for creating a standalone DB System so if you want to follow along, you may
    want to refer to the *Create a DB System* section in Chapter [4](#527055_1_En_4_Chapter.xhtml)
    for how to create a DB System.


    Recall, we create a DB System by using the OCI cloud interface and selecting *Databases*
    | *MySQL* | *DB Systems* and clicking on the *Create DB System* button. Near the
    top of the dialog, you will see a section that allows you to choose between *Standalone*,
    *High Availability*, and *HeatWave*. To enable HA, choose the *High Availability*
    option as shown in Figure [8-1](#527055_1_En_8_Chapter.xhtml#Fig1).


    ![](images/527055_1_En_8_Chapter/527055_1_En_8_Fig1_HTML.png)


    A block diagram to create D B systems with standalone, High availability, and
    heatwave. The high availability block is enabled.


    Figure 8-1


    Enable HA (Create DB System)


    Once you select *High Availability*, you will notice a subtle change to the configure
    networking section. The change is an additional paragraph that suggests choosing
    a VCN with a regional subnet to maximize the robustness of availability should
    a fault occur in one of the domains. Figure [8-2](#527055_1_En_8_Chapter.xhtml#Fig2)
    shows the changes to this portion of the dialog.


    ![](images/527055_1_En_8_Chapter/527055_1_En_8_Fig2_HTML.png)


    A dialog box to configure networking with few hyperlinks within the text. Virtual
    cloud networks and subnets in oci-tutorial-compartments are filled in.


    Figure 8-2


    Networking Section (HA Enabled)


    You will also see a new section that allows you to choose the placement of the
    primary among the availability domains as shown in Figure [8-3](#527055_1_En_8_Chapter.xhtml#Fig3).


    ![](images/527055_1_En_8_Chapter/527055_1_En_8_Fig3_HTML.png)


    A dialog box to configure preferred primary placement with 3 available domains.
    The A D-1 is enabled. A check box to select the fault domain is available at the
    bottom.


    Figure 8-3


    Configure Primary Placement (HA Enabled)


    That’s it! Once you complete the rest of the dialog (MySQL administrator information,
    shape, and data storage size) then click the *Create* button, your HA DB System
    will be created. Once the HA DB System is ready, you can view it like you would
    any other DB System.


    There are also changes to the DB System details page starting with the summary,
    which shows the state of HA as shown in Figure [8-4](#527055_1_En_8_Chapter.xhtml#Fig4).


    ![](images/527055_1_En_8_Chapter/527055_1_En_8_Fig4_HTML.jpg)


    A database system detail page has a high availability menu that displays high
    availability as enabled and also a high availability type. Enabled is highlighted.


    Figure 8-4


    HA Enabled (DB System Details Page)'
