    ![](img/527055_1_En_2_Fig26_HTML.png)


    一个 `oci-tutorial-vcn` 的窗口，左侧有一个六边形绿色图标。右侧列出了 V C N 详细信息和子网 compartments。


    **图 2-26**

    VCN 详细信息页面


    现在我们有了 VCN，就可以准备创建计算实例了。

