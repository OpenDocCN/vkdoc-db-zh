    ## Using a Compute Instance


    The second method to export our data from our local MySQL server will use a compute
    instance an intermediate storage. In this case, we simply perform the export on
    our local MySQL server placing the files on that system, copy them to the compute
    instance, then consume the data on the DB System. Before we begin, let us review
    how MySQL Shell exports data.


    MySQL Shell exports data to local files with the `util.dumpInstance()` method
    in tab-separated value (file extension `.tsv`) files that are compressed by `zstd`
    ( file extension `.zst`) to save space (`gzip` is also available as an option).
    You can also choose no compression but, if you are uploading to Object Storage,
    it is recommended to use the default.


    Note


    Large tables are chunked by default with a default chunk size of 32MB. Chunking
    can be disabled, but it is not recommended. You can improve import performance
    by importing the chunks by parallel threads.


    If you export the data to a folder (e.g., on your local MySQL server), you will
    see several files for each database and table. For example, if your local MySQL
    server has the `world_x` database installed, you will see several files for the
    `city` table as follows:


    ```

    world_x@city.json

    world_x@city.sql

    world_x@city@@0.tsv.zst

    world_x@city@@0.tsv.zst.idx

    ```


    Here, we see several files for the table. There is a `.json` file that contains
    information MySQL Shell needs to restore the table. The `.sql` file contains the
    `CREATE TABLE` and related SQL statements. The `.tsv.zst` files are the data and
    index in compressed tab-separated value files. You will see similar files for
    the other tables and databases.


    Tip


    The `zstd` utility source code is available for download from `https://github.com/facebook/zstd`.
    However, you will need to compile (build) the source code on your machine to use
    it.


    Now that we understand what the data files look like, let us proceed with an example.
    We will once again use our local MySQL server with only the `sakila`, and `world`
    databases installed.


