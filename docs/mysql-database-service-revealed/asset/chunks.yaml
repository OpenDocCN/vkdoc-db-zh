- fmt: '### Using Indexes


    Tables are created without the use of any ordering. That is, tables are unordered.
    While it is true MySQL will return the data in the same order each time, there
    is no implied (or reliable) ordering unless you create an index. The ordering
    I am referring to here is not like you think when sorting (that’s possible with
    the `ORDER BY` clause in the `SELECT` statement).


    Rather, indexes are mappings that the server uses to read the data when queries
    are executed. For example, if you had no index on a table and wanted to select
    all rows with a value greater than a certain value for a column, the server will
    have to read all rows to find all the matches. However, if we added an index on
    that column, the server would have to read only those rows that match the criteria.


    I should note that there are several forms of indexes. What I am referring to
    here is a clustered index where the value for column in the index is stored in
    the index, allowing the server to read the index only and not the rows to do the
    test for the criteria.


    To create an index, you can either specify the index in the `CREATE TABLE` statement
    or issue a `CREATE INDEX` command. The following shows a simple example:


    ```sql

    CREATE INDEX plant_name ON plants (plant_name);

    ```


    This command adds an index on the `plant_name` column. Observe how this affects
    the table:


    ```sql

    CREATE TABLE `plants` (

    `plant_name` char(30) NOT NULL,

    `sensor_value` float DEFAULT NULL,

    `sensor_event` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,

    `sensor_level` char(5) DEFAULT NULL,

    PRIMARY KEY (`plant_name`),

    KEY `plant_name` (`plant_name`)

    ) ENGINE=InnoDB DEFAULT CHARSET=latin1

    ```


    Indexes created like this do not affect the uniqueness of the rows in the table,
    in other words, making sure there exists one and only one row that can be accessed
    by a specific value of a specific column (or columns). What I am referring to
    is the concept of a primary key (or primary index), which is a special option
    used in the creation of the table as described earlier.


    ### Views


    Views are logical mappings of results of one or more tables. They can be referenced
    as if they were tables in queries, making them a powerful tool for creating subsets
    of data to work with. You create a view with `CREATE VIEW` and give it a name
    similar to a table. The following shows a simple example where we create a test
    view to read values from a table. In this case, we limit the size of the view
    (number of rows), but you could use a wide variety of conditions for your views,
    including combining data from different tables:


    ```sql

    CREATE VIEW test_plants AS SELECT * FROM plants LIMIT 5;

    ```


    Views are not normally encountered in small or medium-sized database solutions,
    but I include them to make you aware of them in case you decide to do additional
    analysis and want to organize the data into smaller groups for easier reading.


    ### Triggers


    Another advanced concept (and associated SQL command) is the use of an event-driven
    mechanism that is “triggered” when data is changed. That is, you can create a
    short set of SQL commands (a procedure) that will execute when data is inserted
    or changed.


    There are several events or conditions under which the trigger will execute. You
    can set up a trigger either before or after an update, insert, or delete action.
    A trigger is associated with a single table and has as its body a special construct
    that allows you to act on the rows affected. The following shows a simple example:


    ```sql

    DELIMITER //

    CREATE TRIGGER set_level BEFORE INSERT ON plants FOR EACH ROW

    BEGIN

    IF NEW.sensor_value < 0.40 THEN

    SET NEW.sensor_level = ''LOW'';

    ELSEIF NEW.sensor_value < 0.70 THEN

    SET NEW.sensor_level = ''OK'';

    ELSE

    SET NEW.sensor_level = ''HIGH'';

    END IF;

    END //

    DELIMITER ;

    ```


    This trigger will execute before each insert into the table. As you can see in
    the compound statement (`BEGIN`…`END`), we set a column called `sensor_level`
    to `LOW`, `OK`, or `HIGH` depending on the value of the `sensor_value`. To see
    this in action, consider the following command. The `FOR EACH ROW` syntax allows
    the trigger to act on all rows in the transaction:


    ```sql

    INSERT INTO plants (plant_name, sensor_value) VALUES (''plant1'', 0.5544);

    ```


    Since the value we supplied is less than the middle value (0.70), we expect the
    trigger to fill in the `sensor_level` column for us. The following shows this
    indeed is what happened when the trigger fired:


    ```sql

    +-------------+--------------+---------------------+--------------+

    | plant_name  | sensor_value | sensor_event        | sensor_level |

    +-------------+--------------+---------------------+--------------+

    | plant1      |       0.5544 | 2015-09-23 20:00:15 | OK           |

    +-------------+--------------+---------------------+--------------+

    1 row in set (0.00 sec)

    ```


    This demonstrates an interesting and powerful way you can create derived columns
    with the power of the database server and save the processing power and code in
    your applications. I encourage you to consider this and similar powerful concepts
    for leveraging the power of the database server.'
