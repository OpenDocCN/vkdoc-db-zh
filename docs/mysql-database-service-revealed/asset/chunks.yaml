  trans: '### 连接 MySQL 客户端


    虽然 MySQL Shell 已推出数年，并具备包括脚本编写和开发能力在内的诸多功能，但另一个客户端在 MySQL 中已存在数十年。它是一个名为 `mysql`
    的应用程序，可让你连接到服务器并在其上运行 SQL 命令。有趣的是，这个 MySQL 客户端最初被称为 MySQL 监视器，但长期以来被简称为“MySQL
    客户端”、终端监视器，甚至 MySQL 命令窗口。


    你只有在安装 MySQL 服务器（在 Windows 或 macOS 上）或某个软件包组件时才能获得 `mysql` 客户端。例如，在 Linux 上，你可以仅安装客户端软件包，这样也会获得该客户端。我们将把客户端的安装留到后续在本地
    PC 上安装 MySQL 的章节。


    #### 新的默认认证方式


    在 MySQL 8.0.4 版本之前，默认的认证机制使用了一个名为 `mysql_native_password` 插件的认证插件，该插件使用 SHA1 算法。这种机制速度快，且不需要加密连接。然而，由于
    NIST 已建议组织停止使用 SHA1 算法，Oracle 在 MySQL 8.0.4 版本中将默认认证插件更改为了 `caching_sha2_password`
    插件。


    如果你想了解更多关于此变更的信息，包括 Oracle 为何做出此变更以及为用户带来的优势，请参阅 [`https://mysqlserverteam.com/mysql-8-0-4-new-default-authentication-plugin-caching_sha2_password/`](https://mysqlserverteam.com/mysql-8-0-4-new-default-authentication-plugin-caching_sha2_password/)。


    要使用 MySQL 客户端 (`mysql`) 连接到服务器，你必须指定一个用户账户和要连接的服务器。如果你连接的是同一台机器上的服务器，可以省略服务器信息（主机和端口），因为它们默认为
    localhost 和端口 3306。用户通过 `--user`（或 `-u`）选项指定。你可以在命令行上指定用户的密码，但更安全的做法是指定 `--password`（或
    `-p`），客户端会提示你输入密码。如果你确实在命令行上指定了密码，系统会提示一条警告，建议你不要这样做。


    在同一台机器上使用 `mysql` 客户端而不指定 `--host`（或 `-h`）和 `--port` 选项时，不会使用网络连接。如果你想通过网络连接或使用不同端口连接，必须使用回环地址。例如，要连接到同一台机器上运行在端口
    3307 的服务器，请使用命令 `mysql -uroot -p –h127.0.0.1 --port=3306`。清单 3-3 展示了一个使用 `mysql`
    客户端连接（并断开连接）到 MySQL 服务器的示例。


    ```

    $ mysql -uroot -p -h 127.0.0.1 --port=3306

    Enter password:

    Welcome to the MySQL monitor.  Commands end with ; or \g.

    Your MySQL connection id is 15

    Server version: 8.0.23 MySQL Community Server - GPL

    Copyright (c) 2000, 2021, Oracle and/or its affiliates.

    Oracle is a registered trademark of Oracle Corporation and/or its

    affiliates. Other names may be trademarks of their respective

    owners.

    Type ''help;'' or ''\h'' for help. Type ''\c'' to clear the current input statement.

    mysql> quit

    Bye

    清单 3-3

    使用 mysql 客户端进行连接

    ```


    ### 基本 SQL 命令


    现在我们已经了解了如何连接到 MySQL，让我们通过一个简短的例子，简要地看一下你可能会用到的一些更流行的 SQL 命令。我们将在后面的章节中更详细地讨论这些命令。清单
    3-4 展示了使用 `mysql` 客户端执行几个 SQL 命令的示例。


    提示：要查看客户端中可用的命令列表，请在提示符下输入 `help;` 并按 `Enter`。


    ```

    $ mysql -uroot -p -h 127.0.0.1 --port=3306

    Enter password:

    Welcome to the MySQL monitor.  Commands end with ; or \g.

    Your MySQL connection id is 15

    Server version: 8.0.23 MySQL Community Server - GPL

    Copyright (c) 2000, 2021, Oracle and/or its affiliates.

    Oracle is a registered trademark of Oracle Corporation and/or its

    affiliates. Other names may be trademarks of their respective

    owners.

    Type ''help;'' or ''\h'' for help. Type ''\c'' to clear the current input statement.

    mysql> CREATE DATABASE greenhouse;

    Query OK, 1 row affected (0.00 sec)

    mysql> CREATE TABLE greenhouse.plants (plant_name char(50), sensor_value int,
    sensor_event timestamp);

    Query OK, 0 rows affected (0.02 sec)

    mysql> INSERT INTO greenhouse.plants VALUES (''living room'', 23, NULL);

    Query OK, 1 row affected (0.01 sec)

    mysql> SELECT * FROM greenhouse.plants;

    +-------------+--------------+--------------+

    | plant_name  | sensor_value | sensor_event |

    +-------------+--------------+--------------+

    | living room |           23 | NULL         |

    +-------------+--------------+--------------+

    1 row in set (0.00 sec)

    mysql> SET @@global.server_id = 106;

    Query OK, 0 rows affected (0.00 sec)

    mysql> quit

    Bye

    清单 3-4

    使用 mysql 客户端的 SQL 命令示例

    ```


    在这个例子中，你可以看到以 `CREATE DATABASE` 和 `CREATE TABLE` 语句形式出现的数据定义语言^(⁵)（DDL），以 `INSERT`
    和 `SELECT` 语句形式出现的数据操作语言^(⁶)（DML），以及一个用于设置全局服务器变量的简单管理命令。


    接下来，你看到的是创建数据库和表来存储数据，在表中添加一行数据，最后检索表中的数据。注意我是如何使用大写字母来书写 SQL 命令关键字的。这是一种常见的做法，有助于使
    SQL 命令更易于阅读，也更容易找到用户提供的选项或数据。


    提示：你可以通过输入命令 `quit` 退出 MySQL 客户端。在 Linux 和 Unix 系统上，你可以按 `Ctrl+D` 退出客户端。


    MySQL 中有非常多的命令。幸运的是，你只需要掌握少数几个更常用的命令即可。以下是你将最常使用的命令。用 `<>` 括起来的部分表示命令中由用户提供的组件，`[...]`
    表示需要其他选项：


    *   `CREATE DATABASE <database_name>`：创建一个数据库

    *   `USE <database>`：设置默认数据库（非 SQL 命令）

    *   `CREATE TABLE <table_name> [...]`：创建一个用于存储数据的表或结构

    *   `INSERT INTO <table_name> [...]`：向表中添加数据

    *   `UPDATE [...]`：更改特定行的一个或多个值

    *   `DELETE FROM <table_name> [...]`：从表中删除数据

    *   `SELECT [...]`：从表中检索数据（行）

    *   `SHOW [...]`：显示对象列表


    注意：你必须以分号 (`;`) 或 `\G` 终止每条命令。


    尽管此列表只是一个简短的介绍，远非完整的语法指南，但有一份优秀的在线参考手册，其中更详细地解释了每条命令（以及更多内容）。当你对 MySQL 中的任何内容有疑问时，应查阅该在线参考手册。你可以在
    [`http://dev.mysql.com/doc/`](http://dev.mysql.com/doc/) 找到它。


    其中一个更有趣的命令是允许你查看对象列表的命令。例如，你可以使用 `SHOW DATABASES` 查看数据库，在切换到某个数据库后使用 `SHOW TABLES`
    查看表列表，甚至使用 `SHOW GRANTS` 查看用户的权限。我发现我自己经常使用这些命令。


    如果你认为 MySQL 的内容远不止这几个简单的命令，那你是对的。尽管它易于使用且启动速度快，但 MySQL 是一个功能齐全的关系数据库管理系统（RDBMS）。它的内容远比你在此处看到的要多。有关
    MySQL 的更多信息，包括所有高级功能，请参阅参考手册。'
- fmt: '### How to Get and Install MySQL


    The MySQL server is available for a variety of platforms including most Linux
    and Unix platforms, Mac OS X, and Windows. It is available as a community download
    (open source) or as a licensed product (enterprise edition). You can download
    the community editions directly from Oracle or you can download enterprise editions
    through your Oracle account. For the purposes of this chapter, we will use the
    community edition.


    To download community releases of MySQL 8, visit [`www.mysql.com/downloads/`](http://www.mysql.com/downloads/)
    and scroll down and click *MySQL Community (GPL) Downloads*, then click *MySQL
    Community Server*. The page will automatically detect your operating system. If
    you want to download for another platform, you can select it from the drop-down
    list.


    The download page will list several files for download. Depending on your platform,
    you may see several options including compressed files, source code, and installation
    packages. Most will choose the installation package for installation on a laptop
    or desktop computer. Figure [3-2](#527055_1_En_3_Chapter.xhtml#Fig2) shows an
    example of the various download options for macOS platforms.


    ![](images/527055_1_En_3_Chapter/527055_1_En_3_Fig2_HTML.png)


    A screenshot depicts the general availability release tab and displays the macOS
    11 examples that can be downloaded. The version and file size are displayed. The
    download button is on the right side.


    Figure 3-2


    Download Page for macOS


    One of the most popular platforms is Microsoft Windows. Oracle has provided a
    special installation packaging for Windows named the Windows Installer. This package
    includes all the MySQL products available under the community license including
    MySQL Server, Workbench, Utilities, and all of the available connectors (program
    libraries for connecting to MySQL). This makes installing on Windows a one-stop,
    one-installation affair. Figure [3-3](#527055_1_En_3_Chapter.xhtml#Fig3) shows
    the download page for the Windows installer.


    ![](images/527055_1_En_3_Chapter/527055_1_En_3_Fig3_HTML.png)


    A screenshot of the general availability release tab displays the My S Q L Installer
    for windows and also other downloads are available at the bottom.


    Figure 3-3


    Download Page for Windows Installer


    We see these below the Windows Installer download link in the image. You can choose
    either the Windows Installer 32- or 64-bit installation. Note that the package
    may be nothing more than a `.zip` file containing the server code. In this case,
    you may need to either run the server from the unzipped folder or do a local,
    manual install.


    If you want to follow along with the examples in this chapter, you should consider
    installing MySQL on your PC or another PC on your local network. While you will
    not have to do any installation or configuration when using MDS, we can learn
    a bit about MySQL by installing it locally so we can use it at our leisure without
    incurring costs.


    Installing MySQL is very easy and takes only a few minutes once you’ve downloaded
    the correct packages for your platform. Simply install the server and any subcomponents
    as you would for any other software for your platform. If you need step-by-step
    instructions, you can refer to the online reference manual ([`https://dev.mysql.com/doc/refman/8.0/en/installing.xhtml`](https://dev.mysql.com/doc/refman/8.0/en/installing.xhtml)).


    For our experimental purposes, you can install MySQL with the default settings.
    More specifically, as a standard installation. You can always reinstall it if
    you want to install it preconfigured for a different environment. During the install,
    you may be asked to provide a password for the root user. Be sure to use best
    practices for choosing a password.


    Ok, now that we have the MySQL 8 server installed, we can begin configuring the
    server for use. You will not need to do any of these operations when using MDS,
    but it is always good to know more about how MySQL is configured and how access
    is granted to user accounts.


    ### Configuring and Managing Access to MySQL


    Now that you have MySQL installed locally, let’s briefly discuss how to configure
    MySQL and how to grant access to the server (and databases) to others as well
    as how to set up the X Plugin (the key component to enable the Document Store).
    We begin with a look at the configuration file used to define the behavior and
    configure options in MySQL.


    #### Configuration Files


    The primary way to configure startup options and variables in MySQL is accomplished
    using a text file named `my.cnf` (or `my.ini` on Windows). This file is normally
    located on Posix systems in the `/etc` folder. For example, on macOS, the file
    is named `/etc/my.cnf`. Listing [3-5](#527055_1_En_3_Chapter.xhtml#PC7) shows
    the first few dozen lines from a typical MySQL configuration file.


    ```sql

    # Example MySQL config file for small systems.

    # The following options will be passed to all MySQL clients

    [client]

    port            = 3306

    socket          = /tmp/mysql.sock

    # Here follows entries for some specific programs

    # The MySQL server

    [mysqld]

    port            = 3306

    socket          = /tmp/mysql.sock

    skip-external-locking

    key_buffer_size = 16K

    max_allowed_packet = 1M

    table_open_cache = 4

    sort_buffer_size = 64K

    read_buffer_size = 256K

    read_rnd_buffer_size = 256K

    net_buffer_length = 2K

    thread_stack = 1024K

    ...

    innodb_log_file_size = 5M

    innodb_log_buffer_size = 8M

    innodb_flush_log_at_trx_commit = 1

    innodb_lock_wait_timeout = 50

    innodb_log_files_in_group = 2

    slow-query-log

    general-log

    ...

    ```


    Listing 3-5


    MySQL Configuration File Excerpt


    Notice we have settings grouped by section defined using square brackets `[]`.
    For example, we see a section named `[client]`, which is used to define options
    for any MySQL client that reads the configuration file. Similarly, we see a section
    named `[mysqld]`, which applies to the server process (because the executable
    is named `mysqld`). Notice also we see settings for basic options like port, socket,
    etc. However, we can also use the configuration file to set options for InnoDB,
    replication, and more.


    I recommend locating and browsing the configuration file for your installation
    so that you can see the options and their values. If you encounter a situation
    where you need to change an option – say to test the effect or perhaps to experiment
    – you can use the `SET` command to change values either as a global setting (affects
    all connections) or a session setting (applies only to the current connection).


    However, if you change a global setting that is also in the configuration file,
    the value (state) will remain only until the server is rebooted. Thus, if you
    want to keep global changes, you should consider placing them in the configuration
    file.


    Conversely, setting a value at the session level could be beneficial for a limited
    time or may be something you want to do only for a specific task. For example,
    the following turns off the binary log, executes one or more SQL commands, and
    then turns the binary log back on. This is a simple but profound example of how
    to perform actions on a server participating in replication without having the
    actions affect other servers:


    ```sql

    SET sql_log_bin=0;


    SET sql_log_bin=1;

    ```


    For more information about the configuration file and how to use it to configure
    MySQL 8 including using multiple option files and where the files exist on each
    platform, see the section entitled, “Using Option Files” in the online reference
    manual ([`http://dev.mysql.com/doc/refman/8.0/en/`](http://dev.mysql.com/doc/refman/8.0/en/)).'
