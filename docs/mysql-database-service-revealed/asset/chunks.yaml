    mysql> SELECT plant_name, sensor_value FROM greenhouse.plants WHERE plant_name
    = ''fern on deck'' ORDER BY sensor_value DESC;

    +--------------+--------------+

    | plant_name   | sensor_value |

    +--------------+--------------+

    | fern on deck |         0.73 |

    | fern on deck |         0.51 |

    | fern on deck |        0.477 |

    | fern on deck |         0.43 |

    +--------------+--------------+

    4 rows in set (0.00 sec)

    Listing 3-8

    ORDER BY Examples

    ```


    As I mentioned, there is a lot more to the `SELECT` statement than shown here,
    but what we have seen here will get you very far, especially when working with
    data typical of most small to medium-sized database solutions.


    ### Creating Data


    Now that you have a database and tables created, you will want to load or insert
    data into the tables. You can do so using the `INSERT INTO` statement. Here we
    specify the table and the data for the row. The following shows a simple example:


    ```

    INSERT INTO greenhouse.plants (plant_name, sensor_value) VALUES (''fern in den'',
    0.2319);

    ```


    In this example, I am inserting data for one of my plants by specifying the name
    and value. What about the other columns, you wonder? In this case, the other columns
    include a timestamp column, which will be filled in by the database server. All
    other columns (just the one) will be set to `NULL`, which means no value is available,
    the value is missing, the value is not zero, or the value is empty.


    Notice I specified the columns before the data for the row. This is necessary
    whenever you want to insert data for fewer columns than what the table contains.
    More specifically, leaving the column list off means you must supply data (or
    `NULL`) for all columns in the table. Also, the order of the columns listed can
    be different from the order they are defined in the table. Leaving the column
    list off will result in the ordering of the column data based on how they appear
    in the table.


    You can also insert several rows using the same command by using a comma-separated
    list of the row values, as shown here:


    ```

    INSERT INTO greenhouse.plants (plant_name, sensor_value) VALUES (''flowers in
    bedroom1'', 0.301), (''weird plant in kitchen'', 0.677), (''fern on deck'', 0.430);

    ```


    Here I’ve inserted several rows with the same command. Note that this is just
    a shorthand mechanism and, except for automatic commits, no different than issuing
    separate commands.


    ### Updating Data


    There are times when you want to change or update data. You may have a case where
    you need to change the value of one or more columns, replace the values for several
    rows, or correct formatting or even scale of numerical data. To update data, we
    use the `UPDATE` command. You can update a particular column, update a set of
    columns, perform calculations on one or more columns, and more.


    What may be more likely is you or your users will want to rename an object in
    your database. For example, suppose we determine the plant on the deck is not
    actually a fern but was an exotic flowering plant. In this case, we want to change
    all rows that have a plant name of “fern on deck” to “flowers on deck.” The following
    command performs the change:


    ```

    UPDATE greenhouse.plants SET plant_name = ''flowers on deck'' WHERE plant_name
    = ''fern on deck'';

    ```


    Notice the key operator here is the `SET` operator. This tells the database to
    assign a new value to the column(s) specified. You can list more than one set
    operation in the command.


    Notice I used a `WHERE` clause here to restrict the `UPDATE` to a particular set
    of rows. This is the same `WHERE` clause as you saw in the `SELECT` statement,
    and it does the same thing; it allows you to specify conditions that restrict
    the rows affected. If you do not use the `WHERE` clause, the updates will apply
    to all rows.


    Caution


    Don’t forget the `WHERE` clause! Issuing an `UPDATE` command without a `WHERE`
    clause will affect all rows in the table!


    ### Deleting Data


    Sometimes you end up with data in a table that needs to be removed. Maybe you
    used test data and want to get rid of the fake rows, or perhaps you want to compact
    or purge your tables or want to eliminate rows that no longer apply. To remove
    rows, use the `DELETE FROM` command.


    Let’s look at an example. Suppose you have a plant-monitoring solution under development,
    and you’ve discovered that one of your sensors or sensor nodes are reading values
    that are too low, because of a coding, wiring, or calibration error. In this case,
    we want to remove all rows with a sensor value less than 0.20\. The following
    command does this:


    ```

    DELETE FROM plants WHERE sensor_value < 0.20;

    ```


    Caution


    Don’t forget the `WHERE` clause! Issuing a `DELETE FROM` command without a `WHERE`
    clause will permanently delete all rows in the table!


    Notice I used a `WHERE` clause here. That is, a conditional statement to limit
    the rows acted upon. You can use whatever columns or conditions you want; just
    be sure you have the correct ones! I like to use the same `WHERE` clause in a
    `SELECT` statement first. For example, I would issue the following first to check
    that I am about to delete the rows I want and only those rows. Notice it is the
    same `WHERE` clause:


    ```

    SELECT * FROM plants WHERE sensor_value < 0.20;

    ```'
