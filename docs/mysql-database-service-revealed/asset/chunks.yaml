    #### Getting Started


    The basic layout of any Python SDK script begins with an import section where
    you import the `getpass` and `oci` modules. We need the `getpass` module because
    we must read the SSH key (called a passphrase) from the user (command-line).


    This is followed by creating an instance of the `oci.config` class. This is an
    operation that reads your configuration file and prepares the SDK objects for
    use with your credentials. We then read and add the passphrase to the configuration
    file dictionary. Next, we connect to whichever API class we want to use and, if
    the connection is successful, we can proceed to make the API method calls.


    Note


    If you have not set up your PC to use the OCI CLI, please refer to Chapter [7](#527055_1_En_7_Chapter.xhtml)
    and finish that setup before attempting the API examples. The configuration file
    is required for access to MDS via the API.


    Listing [9-16](#527055_1_En_9_Chapter.xhtml#PC20) shows the basic Python script
    you need to access the OCI API classes. The script is named `basic_api.py`.


    Tip


    If you are new to Python programming, you can visit [`www.python.org/`](http://www.python.org/)
    for how to download and install Python as well as tutorials and help getting started
    with Python. There are also many excellent books on Python and a few websites
    that can help you get started.


    ```

    #

    # MySQL Database Service

    #

    # Basic Python script for working with the MDS Python API

    #

    # Created by: Dr. Charles Bell

    #

    # Import the getpass module

    import getpass

    # Import the oci module

    import oci

    # Read your configuration file: be sure to provide a path if

    # your configuration file.

    config = oci.config.from_file()

    # Read the passphrase from the user

    pass_phrase = getpass.getpass("Enter the SSH key passphrase: ")

    # Add the passphrase  to the config file dictionary.

    config.update({''pass_phrase'':pass_phrase})

    # Initialize service client with default config file

    mysql_client = oci.mysql.MysqlaasClient(config)

    # Create an instance to the API module and call methods

    # Check response codes as needed and exit

    Listing 9-16

    Basic Python API Script

    ```


    You can execute this script with the following command. You should see it run
    and then exit without errors. If it does not, check your configuration file and
    the Python SDK install to make sure everything is installed and configured correctly
    before proceeding:


    ```

    python3 basic_api.py

    ```


    Now, let’s look at some of the examples we used in the CLI section to see how
    to accomplish the same using the Python SDK. Let’s start by listing the MySQL
    shapes using the `oci.mysql.MysqlaasClient` class.'
