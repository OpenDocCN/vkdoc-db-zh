- fmt: '## Install the Python SDK


    在使用 Python SDK 之前，我们必须先安装它。回想一下，我们提到过 Python SDK 是 OCI CLI 的一部分，但它安装在自己的环境中，因此普通的
    Python 客户端无法访问。幸运的是，我们可以在不影响任一产品的情况下，将 Python SDK 与 OCI CLI 一起安装。以下演示了如何在 Windows
    11 上安装 Python SDK，但关于在其他平台上安装或使用其他方法的详细信息，请访问 [`https://docs.oracle.com/en-us/iaas/tools/python/2.79.0/installation.xhtml`](https://docs.oracle.com/en-us/iaas/tools/python/2.79.0/installation.xhtml)。


    安装 Python SDK 的命令使用 `pip`，它在安装 Python 时会自动安装：


    ```

    pip install oci

