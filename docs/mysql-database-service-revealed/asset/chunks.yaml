    #### 将导出的数据复制到本地 MySQL 服务器


    登录计算实例后，导航到导出的数据文件夹，并使用以下命令创建数据的 zip 文件：


    ```

    $ zip -r imported_data.zip ./imported_data/*

    ```


    接下来，退出计算实例，并在您的 PC 上打开 PowerShell（终端）。我们将如下所示将 `mysql_data.zip` 文件复制到您的 PC。请注意，您需要使用正确的
    SSH 密钥文件和计算实例的公共 IP 地址：


