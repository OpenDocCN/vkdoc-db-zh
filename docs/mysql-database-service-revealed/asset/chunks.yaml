  trans: '

    #### 创建虚拟云网络


    接下来，我们需要一个虚拟云网络（VCN）来连接我们的计算实例，以便能够访问它。我们将使用 VCN 向导来简化配置工作，而不是手动配置 VCN。在这种情况下，我们将创建一个具有互联网访问权限的
    VCN，以便可以将计算实例放置在网络中并访问它。


    首先点击云控制台菜单按钮（左上角），然后选择`联网`，接着选择`虚拟云网络`，如图 2-19 所示。这将打开 VCN 的主页。


    ![](img/527055_1_En_2_Fig19_HTML.jpg)


    主菜单中用矩形框突出显示了联网选项，随后右侧的联网菜单打开。其中，虚拟云网络被高亮显示。


    **图 2-19**

    虚拟云网络（主菜单）


    在 VCN 页面上，您需要使用左侧的筛选控件选择 compartment，如图 2-20 所示。选择我们之前创建的 `oci-tutorial-compartment`。


    ![](img/527055_1_En_2_Fig20_HTML.jpg)


    V C N 页面中的筛选控件打开了列表范围。其下方有 compartment 和搜索 compartment 选项。在搜索下方，显示了 `oci-tutorial-compartment`。


    **图 2-20**

    设置列表范围（VCN 页面）


    设置好 compartment 后，显示内容将更改以显示该 compartment 中所有 VCN 的列表。目前，它将显示一个空列表。要启动 VCN 向导，请单击
    `启动 VCN 向导` 按钮，如图 2-21 所示。


    ![](img/527055_1_En_2_Fig21_HTML.png)


    一个表格，包含创建 v C N 和启动 V C N 向导选项。列名是名称、状态、I Pv4 C I D R 块、I Pv6 C I D R 块、默认路由表、D
    N S 域名和创建时间。


    **图 2-21**

    VCN 网络列表 (`oci-tutorial-compartment`)


    点击该按钮后，向导将打开，您可以输入所需信息。在这种情况下，我们将选择 `创建具有互联网连接的 VCN` 选项，如图 2-22 所示。选择后，如图所示单击
    `启动 VCN 向导` 按钮。


    ![](img/527055_1_En_2_Fig22_HTML.png)


    一个启动 V C N 向导的窗口，有用于创建具有互联网连接的 V C N 和向 V C N 添加互联网连接及站点到站点 V P N 的单选按钮。


    **图 2-22**

    启动 VCN 向导


    这将触发 OCI 中的检查，以确保允许创建 VCN，并且您可以创建它。您可能会在向导中看到指示此情况的横幅。页面打开时，我们需要提供 VCN 的名称并确保选择了正确的
    compartment。如果您正在跟随操作，请使用 `oci-tutorial-vcn` 作为 VCN 名称，然后单击 `下一步`，如图 2-23 所示。在
    `配置 VCN 和子网` 部分保留默认值。


    ![](img/527055_1_En_2_Fig23_HTML.png)


    一个创建具有互联网连接的 V C N 并进行配置的窗口。它包含基本信息以及配置 V C N 和子网选项。


    **图 2-23**

    创建具有互联网连接的 VCN – 基本信息


    在下一页，我们看到了来自向导的 VCN 参数摘要。花点时间查看一下。注意我们有一个公共子网和一个私有子网。我们将在后面的章节中了解如何使其与我们的计算实例协同工作。准备好后单击
    `创建` 按钮，如图 2-24 所示。


    ![](img/527055_1_En_2_Fig24_HTML.png)


    一个创建具有互联网连接的 V C N 的窗口。右侧显示了审阅和创建选项，包括 Oracle 虚拟云网络详细信息以及私有和公共子网的详细信息。


    **图 2-24**

    审阅并创建 VCN


    此时，将出现一个对话框，通知您资源调配的进度。由于我们使用的是向导，很自然地认为这是一个单一资源，但事实并非如此。正在为您调配和配置多个资源，包括 VCN、其子网、用于互联网和私有子网访问的网关、网关的路由表和安全列表等。图
    2-25 显示了所有资源调配完成并准备就绪后的对话框。


    ![](img/527055_1_En_2_Fig25_HTML.png)


    一个已创建虚拟云网络并正在创建资源的窗口。左侧列出了虚拟云网络创建过程。


    **图 2-25**

    正在调配 VCN


