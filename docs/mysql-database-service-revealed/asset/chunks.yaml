    mindset. Richard Stallman is credited as the father of the free software movement
    who pioneered a licensing mechanism to help protect ownership of software and
    yet make the use of the software and so some degree its revision free to all.
    The goal was to reestablish a cooperating community of developers cooperating
    with a single imperative – to guarantee freedom rather than restrict it.


    This ultimately led to the invention of some cleverly worded (read legally binding)
    licensing agreements that permit the code to be copied and modified without restriction,
    stating that derivative works (the modified copies) must be distributed under
    the same license as the original version without any additional restrictions.
    One such license (created by Stallman) is called the GNU Public License (GPL).
    This is the license that is used by Oracle to license MySQL and as such it is
    indeed free for anyone to use.


    However, GPL and similar licenses are intended to guarantee freedom to use, modify,
    and distribute; most never intended “free” to mean “no cost” or “free to a good
    home.” To counter this misconception, the Open Source Initiative (OSI) formed
    and later adopted and promoted the phrase open source to describe the freedoms
    guaranteed by the GPL license. For more information about open source software
    and the GPL, visit [`www.opensource.org`](http://www.opensource.org).


    MySQL runs as a background process (or as a foreground process if you launch it
    from the command line) on your system. Like most database systems, MySQL supports
    Structured Query Language (SQL). You can use SQL to create databases and objects
    (using data definition language [DDL]), write or change data (using data manipulation
    language [DML]), and execute various commands for managing the server.


    There are two mechanisms for connecting to MySQL. You can use an application like
    the MySQL Shell or MySQL Workbench, or you can use the older MySQL client. Let’s
    look at both options.'
  trans: '

    ## 概要


    Oracle Cloud Infrastructure 是一套庞大的云基础设施，提供了数十种服务供您构建自己的云解决方案。我们拥有诸如用于创建服务器的网络和计算等基础核心服务，诸如数据库系统等高级托管服务，乃至诸如容器编排等平台级服务。尽管我们已经了解更多关于这些概念和特性的知识，但我们仅仅是触及了
    OCI 所提供能力的皮毛。


    我们还了解到虚拟化和自动化是使 OCI 能够让您轻松地创建（配置）、管理和销毁资源的关键工具。这些简单的用例可以在几分钟内通过虚拟计算完成，而使用物理硬件则可能需要数小时甚至数天。


    在本章中，我们进一步了解了 OCI，包括所使用的术语、可用于操作 OCI 的用户界面，以及对 OCI 核心服务的解释。最后，我们看到了一个关于如何设置 OCI
    试用账户并创建我们的第一个 OCI 资源的简短教程。


    在下一章中，我们将花点时间进一步了解 MySQL，包括一个关于如何开始使用 MySQL 的简短教程。正如您将看到的，它是一个健壮、功能齐全且易于使用的数据库管理系统。


    脚注 1 2


    # 3. MySQL 简明教程


    也许您以前从未使用过数据库系统，或者您曾作为用户使用过，但从未需要从头开始设置过。又或者您决定探究一下数据库系统到底有什么名堂。


    在本章中，我将从通用 SQL 接口的角度（传统 MySQL）对 MySQL 进行简要介绍。您不仅会看到如何使用 MySQL 8 来创建和使用数据库，还将接触到一些
    SQL 接口的基础知识，这些是将 MySQL 服务器完全集成到您的基础设施中所必需且确实需要的。


    我们还将简要了解 MySQL Shell，以及如何通过 SQL 和 NoSQL 接口（用于应用程序和交互式会话）使用它来连接和操作 MySQL。


    我们将在本章结尾简要介绍如何将您的应用程序连接到 MySQL 服务器，以操作您创建的数据库。


    让我们从简要了解 MySQL 是什么以及它能为我们做什么开始。我们将从在本地 PC 上安装 MySQL 开始进行实验。


    注意


    虽然本书介绍了 Oracle Cloud Infrastructure 中的 MySQL 数据库服务，但本章中的大部分信息可用于任何 MySQL 服务器。


    ## 入门指南


    MySQL 是世界上最受欢迎的开源数据库系统，这有许多充分的理由。首先，它是开源的，这意味着任何人都可以免费将其用于各种任务。最重要的是，MySQL 包含在许多平台的软件仓库中，使其易于获取和安装。如果您的平台（例如
    aptitude）没有在软件仓库中包含 MySQL，您可以从 MySQL 网站 ([`http://dev.mysql.com`](http://dev.mysql.com))
    下载。


    Oracle 公司拥有 MySQL。Oracle 通过收购 Sun Microsystems 获得了 MySQL，而 Sun Microsystems 则是从其原始所有者
    MySQL AB 手中收购了 MySQL。尽管存在相反的担忧，但 Oracle 通过持续投资于 MySQL 的演进和新功能开发，并忠实维护其开源传统，展现了出色的管理。尽管
    Oracle 也提供 MySQL 的商业许可证——正如其以前的所有者过去所做的那样——MySQL 仍然是开源的，并对所有人开放。


    开源真的是免费的吗？


    开源软件起源于对公司财产心态的有意识抵制。Richard Stallman 被认为是自由软件运动之父，他开创了一种许可机制，以帮助保护软件的所有权，同时让软件的使用以及一定程度上的修改对所有人免费。目标是重建一个开发者合作的社区，只有一个共同的使命——保障自由而非限制自由。


    这最终导致了一些措辞巧妙（即具有法律约束力）的许可协议的发明，这些协议允许代码不受限制地复制和修改，并规定衍生作品（修改后的副本）必须根据与原始版本相同的许可证分发，不得附加任何额外限制。其中一种许可证（由
    Stallman 创建）称为 GNU 通用公共许可证（GPL）。Oracle 正是使用此许可证来授权 MySQL，因此它确实可供任何人免费使用。


    然而，GPL 及类似许可证旨在保障使用、修改和分发的自由；大多数情况下，它们从未将“自由”意指为“免费”或“免费赠予”。为了消除这种误解，开源促进组织（OSI）成立，后来采纳并推广了“开源”一词来描述
    GPL 许可证所保障的自由。有关开源软件和 GPL 的更多信息，请访问 [`www.opensource.org`](http://www.opensource.org)。


    MySQL 作为后台进程（或者如果您从命令行启动它，也可以作为前台进程）在您的系统上运行。与大多数数据库系统一样，MySQL 支持结构化查询语言（SQL）。您可以使用
    SQL 来创建数据库和对象（使用数据定义语言 [DDL]），写入或更改数据（使用数据操纵语言 [DML]），以及执行用于管理服务器的各种命令。


    连接到 MySQL 有两种机制。您可以使用像 MySQL Shell 或 MySQL Workbench 这样的应用程序，或者您可以使用较旧的 MySQL
    客户端。让我们看看这两种选项。

