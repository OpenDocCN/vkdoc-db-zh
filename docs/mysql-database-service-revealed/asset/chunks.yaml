  trans: '### 示例连接器：Connector/Python


    Oracle 提供的 Python 连接器是一款功能齐全的工具，可为 Python 应用程序和脚本提供与 MySQL 数据库服务器的连接。`Connector/Python`
    支持所有当前的 MySQL 服务器版本。它旨在实现 Python 与 MySQL 之间的自动数据类型转换，使构建查询和解析结果变得轻松。它还支持压缩、允许通过
    SSL 连接，并且支持所有 MySQL SQL 命令。


    `Connector/Python` 必须安装在您运行代码的计算机上，方式与安装您可能使用的任何其他 Python 库相同。在 Python 脚本中使用 `Connector/Python`
    包括导入基础模块、建立连接以及使用游标执行查询。


    在我们开始探讨如何使用 `Connector/Python` 编写一些支持 MySQL 数据库的应用程序之前，让我们先谈谈如何获取和安装 `Connector/Python`。


    **Python？那不是一种蛇吗？**


    Python 编程语言是一种高级语言，其设计初衷是尽可能像阅读英语一样自然，同时保持简洁、易学且功能强大。Python 爱好者会告诉您，设计者确实实现了这些目标。


    如果您从未使用过 Python，或者想了解更多关于它的信息，以下是一些介绍该语言的优秀书籍。互联网上也有大量资源可供利用，包括位于 `www.python.org/doc/`
    的 Python 文档页面：


    *   `Programming the Raspberry Pi`，作者 Simon Monk（麦格劳-希尔出版社，2013 年）

    *   `Beginning Python from Novice to Professional`，第二版，作者 Magnus Lie Hetland（Apress
    出版社，2008 年）

    *   `Python Cookbook`，作者 David Beazley 和 Brian K. Jones（O''Reilly Media 出版社，2013
    年）


    有趣的是，Python 是以英国喜剧团体 Monty Python 的名字命名的，而不是那种爬行动物。在学习 Python 时，您可能会遇到一些对 Monty
    Python 剧集的戏谑引用。由于我对 Monty Python 情有独钟，我觉得这些引用很有趣。当然，您的感受可能有所不同。


    #### 安装 Connector/Python


    下载过程与您为服务器所做的相同。您可以从 Oracle 的 MySQL 网站 (`http://dev.mysql.com/downloads/connector/python/`)
    下载 `Connector/Python`。该页面会自动检测您的平台并显示适用于该平台的可用下载项。您可能会看到多个选项。请务必选择与您的配置相匹配的那一个。


    由于大多数平台都预装了 Python，您可能不需要对系统做任何准备；只需下载安装程序并安装即可。然而，首选的安装方法是使用 Python 包管理器（来自 PyPi）通过
    `pip install` 命令来获取并安装连接器。以下演示了如何使用 `pip` 安装 `Connector/Python`：


    ```

    % pip3 install mysql-connector-python

    Collecting mysql-connector-python

    Downloading mysql_connector_python-8.0.28-py2.py3-none-any.whl (342 kB)

    |████████████████████████████████| 342 kB 198 kB/s

    Collecting protobuf>=3.0.0

    Downloading protobuf-3.19.3-cp310-cp310-macosx_10_9_universal2.whl (1.0 MB)

    |████████████████████████████████| 1.0 MB 544 kB/s

    Installing collected packages: protobuf, mysql-connector-python

    Successfully installed mysql-connector-python-8.0.28 protobuf-3.19.3

    ```


    注意 `pip` 安装程序命令。本例中使用了 `pip3` 命令，因为该计算机同时安装了 Python 2.X 和 3.X，我们希望确保将其安装到 Python
    3.X 环境中。


    **注意**


    您应该安装 Python 3.7 或更高版本。


    另请注意，被安装软件包所需的任何先决条件也会被自动下载和安装。正如您所见，使用 `pip` 比单独下载和安装软件包要容易得多。


    **提示**


    有关在特定平台上安装的具体说明，请参阅在线参考手册 (`http://dev.mysql.com/doc/connector-python/en/connector-python-installation.xhtml`)。


    #### 检查安装


    一旦安装了 `Connector/Python`，您可以通过下面的简短示例来验证它是否正常工作。首先输入命令 `python`（或者 `python3`，如果您想确保使用的是
    Python 3.X 安装）。这将打开一个交互式提示符，允许您一次输入一行 Python 代码并执行；它是一个 Python 命令行解释器，对于测试小段代码非常有用。只需按照示例所示输入以下几行：


    ```

    % python3

    Python 3.10.2 (v3.10.2:a58ebcc701, Jan 13 2022, 14:50:16) [Clang 13.0.0 (clang-1300.0.29.30)]
    on darwin

    Type "help", "copyright", "credits" or "license" for more information.

    >>> import mysql.connector

    >>> print(mysql.connector.__version__)

    8.0.28

    >>>

    >>> quit()

    ```


    您应该会看到打印出的 `Connector/Python` 版本号。如果您看到任何关于找不到连接器的错误，请务必检查您的安装以确保其工作正常。一旦您可以成功访问
    `Connector/Python`，就可以继续学习一些示例脚本了。


    Python 脚本（应用程序）使用类似 `<something>.py` 的文件名和扩展名保存，并通过以下命令行方式执行。我们将使用此方法来执行以下示例。因此，对于每个示例，您应该在文本编辑器中打开一个文件，输入所示的代码，保存文件，然后从命令行运行该脚本：


    ```

    $ python3 my_script.py

    ```


    如果您拥有并熟悉某个 Python 集成开发环境（IDE），您可以使用它来代替通过文本编辑器创建文件并通过命令行执行。优秀的 Python IDE 示例包括
    Thonny (`https://thonny.org/`) 和 PyCharm (`www.jetbrains.com/pycharm/download`)。两者都适用于
    Windows、macOS 和 Linux。


    Thonny 是一款免费、基础的 IDE，因此非常易于使用但功能有限；而 PyCharm 提供社区版和企业版，支持企业级 Python 开发的大量功能。'
- fmt: "## 连接到 MySQL 服务器\n\n让我们从一个简单的例子开始，我们将连接到 MySQL 服务器并获取数据库列表。我们将此示例命名为 `mysql_connector.py`。\n\
    \n在这个例子中，我们首先导入 Connector/Python 连接器类，然后为了保持整洁，我们使用一个字典来存储连接信息。有了连接字典后，我们调用 `connect()`\
    \ 方法来连接服务器。\n\n接下来，我们打开一个新的游标，并通过连接类的 `cursor()` 方法获取一个游标类的实例。使用游标类，我们可以调用 `execute()`\
    \ 方法并传入一条 SQL 语句。执行后，获取返回的行并打印每行的第一列。最后，我们关闭游标和连接以整理资源。清单 3-10 展示了此示例的完整代码。正如你将看到的，它非常易于理解。\n\
    \n> **注意**\n> 请务必将用户和密码更改为与你的安装相匹配。\n\n```python\n\"\"\"mysql_connect.py\"\"\"\
    \n#\n# MySQL Database Service\n#\n# Chapter 03 - MySQL Connect\n#\n# This script\
    \ demonstrates the basics for using the MySQL Connector/Python to\n# connect to\
    \ a MySQL server and issue a simple query and print the results.\n#\n# Dr. Charles\
    \ Bell\n#\n# Import libraries\nimport mysql.connector\n# Connection parameters\
    \ dictionary\nserver = {\n    'user': 'root',\n    'password': 'SECRET',\n   \
    \ 'host': '127.0.0.1',\n    'database': 'plant_monitoring',\n}\n# Connect to the\
    \ server\ncnx = mysql.connector.connect(**server)\n# Create a cursor\ncur = cnx.cursor()\n\
    # Execute a query\ncur.execute(\"SHOW DATABASES\")\n# Fetch and print the results\n\
    rows = cur.fetchall()\nfor row in rows:\n    print(row[0]) # Print first column\
    \ only\n# Close the cursor and connection\ncur.close()\ncnx.close()\n```\n\n**清单\
    \ 3-10** MySQL 连接与查询示例\n\n一旦你输入了代码，就可以执行它以查看结果，如下所示：\n\n> **提示**\n> 确保你的 MySQL\
    \ 服务器正在运行，并且你在字典中为服务器提供了正确的密码和主机名。\n\n```bash\n% python3 ./mysql_connect.py\n\
    animals\ngreenhouse\ninformation_schema\nmysql\nperformance_schema\nplant_monitoring\n\
    sakila\nsys\nworld\nworld_x\n```\n\n根据你安装或创建的示例数据库或其他数据库，你的结果可能会有所不同，但你至少应该看到\
    \ `plant_monitoring`、`mysql`、`information_schema` 和 `performance_schema`。\n\n\
    如果你遇到如下所示的错误，请务必检查字典中的凭据，确保你使用了正确的主机名（或 IP 地址）、端口、用户和密码。\n\n```bash\nError: 1045\
    \ (28000): Access denied for user 'root'@'localhost' (using password: YES)\n```\n\
    \n现在让我们看看如何插入数据。\n\n## 向表中插入数据\n\n现在让我们看看如何向表中插入一些数据。我们将此示例代码命名为 `mysql_insert.py`。\n\
    \n在这个例子中，我们只是想从文件中读取数据并将其插入到一个表中。我们将使用与之前示例相同的代码连接到服务器，并使用游标执行查询。不同之处在于，我们将使用一个文件以逗号分隔值格式（`.csv`）读取示例数据。这是一种在各种应用程序中常用的格式。\n\
    \n对于文件中的每一行，我们解码字段，然后使用列中的数据形成一条 `INSERT` 命令。我们将再次使用游标类的 `execute()` 方法来执行插入数据的查询。由于没有结果，我们不获取任何内容。但是，在插入完所有行后，我们必须调用游标类的\
    \ `commit()` 方法来提交更改。清单 3-11 展示了此示例的完整代码。请花点时间阅读以明确其逻辑。\n\n```python\n\"\"\"mysql_insert.py\"\
    \"\"\n#\n# MySQL Database Service\n#\n# Chapter 03 - MySQL Insert\n#\n# This script\
    \ demonstrates the basics for using the MySQL Connector/Python to\n# connect to\
    \ a MySQL server and insert data into a table.\n#\n# Dr. Charles Bell\n#\n# Import\
    \ libraries\nimport mysql.connector\n# Query\nINSERT_SQL = \"INSERT INTO plant_monitoring.plants\
    \ (name, location, climate) VALUES (\"\n# Connection parameters dictionary\nserver\
    \ = {\n    'user': 'root',\n    'password': 'SECRET',\n    'host': '127.0.0.1',\n\
    \    'database': 'plant_monitoring',\n}\n# Connect to the server\ncnx = mysql.connector.connect(**server)\n\
    # Create a cursor\ncur = cnx.cursor()\n# Read rows from a file for inserting into\
    \ plant-monitor table\nwith open(\"plants_data.txt\", encoding='UTF-8') as data_file:\n\
    \    data = data_file.readlines()\n# Now insert the data in the table\nfor row\
    \ in data:\n    cols = row.strip('\\n').split(\",\") # comma-separated row\n \
    \   INSERT = f\"{INSERT_SQL}'{cols[0]}','{cols[1]}',{cols[2]})\"\n    print(INSERT)\n\
    \    cur.execute(INSERT)\n# We must commit the changes\ncnx.commit()\n# Close\
    \ the cursor and connection\ncur.close()\ncnx.close()\n```\n\n**清单 3-11** MySQL\
    \ 插入数据示例\n\n我们读取的文件只有几行，是植物监控系统示例的一个模拟数据。以下显示了文件内容。请注意，我将其命名为 `plants_data.txt`。如果你更改了文件名，请务必相应地更改代码：\n\
    \n```text\nJerusalem Cherry,deck,2\nMoses in the Cradle,patio,2\nPeace Lilly,porch,1\n\
    Thanksgiving Cactus,porch,1\nAfrican Violet,porch,1\n```\n\n要运行该脚本，请从存储文件的文件夹中发出以下命令。请务必先将数据文件放在同一文件夹中。我展示了运行脚本的结果：\n\
    \n```bash\n% python3 ./mysql_insert.py\nINSERT INTO plant_monitoring.plants (name,\
    \ location, climate) VALUES ('Jerusalem Cherry','deck',2)\nINSERT INTO plant_monitoring.plants\
    \ (name, location, climate) VALUES ('Moses in the Cradle','patio',2)\nINSERT INTO\
    \ plant_monitoring.plants (name, location, climate) VALUES ('Peace Lilly','porch',1)\n\
    INSERT INTO plant_monitoring.plants (name, location, climate) VALUES ('Thanksgiving\
    \ Cactus','porch',1)\nINSERT INTO plant_monitoring.plants (name, location, climate)\
    \ VALUES ('African Violet','porch',1)\n```\n\n现在让我们检查一下我们的表。如果我们从一个空表开始，当我们对 plants\
    \ 表执行 `SELECT` 时，应该会看到以下内容。请注意，我们使用 MySQL Shell 传递要执行的查询并将输出格式化为表格：\n\n```bash\n\
    % mysqlsh -uroot -p --sql -e \"SELECT * FROM plant_monitoring.plants\" --table\n\
    +----+---------------------+----------+---------+\n| id | name               \
    \ | location | climate |\n+----+---------------------+----------+---------+\n\
    | 11 | Jerusalem Cherry    | deck     | outside |\n| 12 | Moses in the Cradle\
    \ | patio    | outside |\n| 13 | Peace Lilly         | porch    | inside  |\n\
    | 14 | Thanksgiving Cactus | porch    | inside  |\n| 15 | African Violet     \
    \ | porch    | inside  |\n+----+---------------------+----------+---------+\n\
    ```\n\n你可以使用连接器完成比这里展示的更多的功能。你应该阅读在线参考手册（ [`https://dev.mysql.com/doc/connector-python/en/`](https://dev.mysql.com/doc/connector-python/en/)\
    \ ）以获取更多信息和如何使用连接器满足你应用程序需求的示例。\n\n现在，让我们看一个 Connector/J 示例。我们将使用相同的示例，但用 Java\
    \ 实现。"
  raw: '#### Example 1: Connecting to MySQL


    Let’s start with a simple example where we connect to the MySQL server and get
    a list of databases. We will name this example `mysql_connector.py`.


    In this case, we start by importing the Connector/Python connector class and then
    to keep things tidy, we use a dictionary to store the connection information.
    Once we have the dictionary for the connection, we call the `connect()` method
    to connect to the server.


    Next, we open a new cursor and get an instance of the cursor class with the `cursor()`
    method of the connection class. With the cursor class, we can then call the `execute()`
    method passing in a SQL statement and once executed, fetch the rows returned and
    print out the first column in each row. Finally, we close both the cursor and
    connection to tidy things up. Listing [3-10](#527055_1_En_3_Chapter.xhtml#PC35)
    shows the complete code for this example. As you will see, it is very easy to
    follow.


    Caution


    Be sure to change the user and password to match your installation.


    ```

    """mysql_connect.py"""

    #

    # MySQL Database Service

    #

    # Chapter 03 - MySQL Connect

    #

    # This script demonstrates the basics for using the MySQL Connector/Python to

    # connect to a MySQL server and issue a simple query and print the results.

    #

    # Dr. Charles Bell

    #

    # Import libraries

    import mysql.connector

    # Connection parameters dictionary

    server = {

    ''user'': ''root'',

    ''password'': ''SECRET'',

    ''host'': ''127.0.0.1'',

    ''database'': ''plant_monitoring'',

    }

    # Connect to the server

    cnx = mysql.connector.connect(**server)

    # Create a cursor

    cur = cnx.cursor()

    # Execute a query

    cur.execute("SHOW DATABASES")

    # Fetch and print the results

    rows = cur.fetchall()

    for row in rows:

    print(row[0]) # Print first column only

    # Close the cursor and connection

    cur.close()

    cnx.close()

    Listing 3-10

    MySQL Connect and Query Example

    ```


    Once you have to code entered, you can execute it to see the results as shown
    below:


    Tip


    Be sure your MySQL server is running, and you provide the correct password and
    hostname for the server in the dictionary.


    ```

    % python3 ./mysql_connect.py

    animals

    greenhouse

    information_schema

    mysql

    performance_schema

    plant_monitoring

    sakila

    sys

    world

    world_x

    ```


    Depending on what sample databases or other databases you have installed or created,
    your results may be different, but you should see the `plant_monitoring`, `mysql`,
    `information_schema`, and `performance_schema` at a minimum.


    If you encounter errors like the one below, be sure to check your credentials
    in the dictionary to ensure you are using the correct hostname (or IP address),
    port, user, and password.


    ```

    Error: 1045 (28000): Access denied for user ''root''@''localhost'' (using password:
    YES)

    ```


    Now let’s look at how to insert data.


    #### Example 2: Inserting Data


    Now let’s see how we can insert some data in a table. We will name this example
    code `mysql_insert.py`.


    In this case, we simply want to read data from a file and insert it into a table.
    We will use the same code as the previous example to connect to the server and
    use a cursor to execute a query. The difference is we will use a file to read
    in sample data in a comma-separated value format (`.csv`). It is a common format
    used in a variety of applications.


    For each row in the file, we decode the fields then form an `INSERT` command using
    the data in the columns. Once again, we will use the `execute()` method of the
    cursor class to execute the query to insert the data. Since there are no results,
    we don’t fetch anything. However, after we finish inserting the rows, we must
    call the `commit()` method for the cursor class to commit the changes. Listing
    [3-11](#527055_1_En_3_Chapter.xhtml#PC38) shows the complete code for the example.
    Take a moment to read through it for clarity.


    ```

    """mysql_insert.py"""

    #

    # MySQL Database Service

    #

    # Chapter 03 - MySQL Insert

    #

    # This script demonstrates the basics for using the MySQL Connector/Python to

    # connect to a MySQL server and insert data into a table.

    #

    # Dr. Charles Bell

    #

    # Import libraries

    import mysql.connector

    # Query

    INSERT_SQL = "INSERT INTO plant_monitoring.plants (name, location, climate) VALUES
    ("

    # Connection parameters dictionary

    server = {

    ''user'': ''root'',

    ''password'': ''SECRET'',

    ''host'': ''127.0.0.1'',

    ''database'': ''plant_monitoring'',

    }

    # Connect to the server

    cnx = mysql.connector.connect(**server)

    # Create a cursor

    cur = cnx.cursor()

    # Read rows from a file for inserting into plant_monitor table

    with open("plants_data.txt", encoding=''UTF-8'') as data_file:

    data = data_file.readlines()

    # Now insert the data in the table

    for row in data:

    cols = row.strip(''\n'').split(",") # comma-separated row

    INSERT = f"{INSERT_SQL}''{cols[0]}'',''{cols[1]}'',{cols[2]})"

    print(INSERT)

    cur.execute(INSERT)

    # We must commit the changes

    cnx.commit()

    # Close the cursor and connection

    cur.close()

    cnx.close()

    Listing 3-11

    MySQL Insert Data Example

    ```


    The file we are reading has only a few rows and is a mockup of the plant-monitoring
    system example. The following shows the file contents. Note that I labeled it
    `plants_data.txt`. If you change the file name, be sure to change the code accordingly:


    ```

    Jerusalem Cherry,deck,2

    Moses in the Cradle,patio,2

    Peace Lilly,porch,1

    Thanksgiving Cactus,porch,1

    African Violet,porch,1

    ```


    To run the script, issue the following command from the folder where you stored
    the file. Be sure to put the data file in the same folder first. I show the results
    of running the script:


    ```

    % python3 ./mysql_insert.py

    INSERT INTO plant_monitoring.plants (name, location, climate) VALUES (''Jerusalem
    Cherry'',''deck'',2)

    INSERT INTO plant_monitoring.plants (name, location, climate) VALUES (''Moses
    in the Cradle'',''patio'',2)

    INSERT INTO plant_monitoring.plants (name, location, climate) VALUES (''Peace
    Lilly'',''porch'',1)

    INSERT INTO plant_monitoring.plants (name, location, climate) VALUES (''Thanksgiving
    Cactus'',''porch'',1)

    INSERT INTO plant_monitoring.plants (name, location, climate) VALUES (''African
    Violet'',''porch'',1)

    ```


    Now let’s check our table. If we started with an empty table, we should see the
    following if we execute the `SELECT` for the plants table. Notice we use the MySQL
    Shell passing the query to execute and formatting the output as a table:


    ```

    % mysqlsh -uroot -p --sql -e "SELECT * FROM plant_monitoring.plants" --table

    +----+---------------------+----------+---------+

    | id | name                | location | climate |

    +----+---------------------+----------+---------+

    | 11 | Jerusalem Cherry    | deck     | outside |

    | 12 | Moses in the Cradle | patio    | outside |

    | 13 | Peace Lilly         | porch    | inside  |

    | 14 | Thanksgiving Cactus | porch    | inside  |

    | 15 | African Violet      | porch    | inside  |

    +----+---------------------+----------+---------+

    ```


    You can do much more with the connector than shown here. You should read the online
    reference manual ([`https://dev.mysql.com/doc/connector-python/en/`](https://dev.mysql.com/doc/connector-python/en/))
    for more information and examples of how to use the connector to meet your application
    needs.


    Now, let’s look at a Connector/J example. We will use the same examples only implemented
    in Java.'
