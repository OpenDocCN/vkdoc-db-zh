  raw: 'Once you have the code saved in a file named MySQLTest.java, go ahead and
    compile and run it with the following commands. If Connector/J is not installed,
    you should see the error message depicted:


    ```

    % javac MySQLTest.java

    % java MySQLTest

    Connector/J is missing.

    No suitable driver found for jdbc:mysql://localhost:3306/plant_monitoring?useSSL=false

    ```


    If you installed Connector/J in a local folder, you could set the `CLASSPATH`
    as described above and run the code again. This time, you should see a success
    message like the following:


    ```

    % export CLASSPATH=./mysql-connector-java-8.0.28/mysql-connector-java-8.0.28.jar:$CLASSPATH

    % java MySQLTest

    Success!

    ```


    Once you confirm Connector/J is installed and working, you are ready for the examples.


    #### Example 1: Connecting to MySQL


    Let’s start with a simple example where we connect to the MySQL server and get
    a list of databases. We will name this example `MySQLConnect.java`.


    The logic of the code follows the same as the `MySQLTest.java` above, except this
    time we will make the connection, request a statement class, and execute the query
    in a single block We then loop through the rows returned and print the first column
    of the result set. Listing [3-13](#527055_1_En_3_Chapter.xhtml#PC48) shows the
    complete code for this example. As you will see, it is very easy to follow:


    ```

    //

    //  MySQL Database Service

    //

    // Chapter 03 - MySQL Connect

    //

    // This example attempts to connect to a MySQL server, execute a query

    // then print the first column of the result set.

    //

    // Dr. Charles Bell

    //

    // Imports

    import java.sql.Connection;

    import java.sql.DriverManager;

    import java.sql.ResultSet;

    import java.sql.SQLException;

    import java.sql.Statement;

    import java.util.logging.Level;

    import java.util.logging.Logger;

    public class MySQLConnect {

    public static void main(String[] args) {

    // Connection parameters

    String url = "jdbc:mysql://localhost:3306/"

    + "plant_monitoring?useSSL=false";

    String user = "root";

    String password = "SECRET";

    String query = "SHOW DATABASES";

    // Attempt the connection and execute a query then print the results

    try (Connection con = DriverManager.getConnection(url, user,

    password);

    Statement st = con.createStatement();

    ResultSet rs = st.executeQuery(query)) {

    while (rs.next()) {

    System.out.println(rs.getString(1));

    }

    } catch (SQLException ex) {

    Logger lgr = Logger.getLogger(MySQLConnect.class.getName());

    lgr.log(Level.SEVERE, ex.getMessage(), ex);

    }

    }

    }

    Listing 3-13

    MySQL Connect and Query Example

    ```


    Once you have to code entered, you can compile and execute it to see the results
    as shown below:


    Tip


    Be sure your MySQL server is running, and you provide the correct password and
    hostname for the server in the dictionary.


    ```

    % javac MySQLConnect.java

    % java MySQLConnect

    animals

    greenhouse

    information_schema

    mysql

    performance_schema

    plant_monitoring

    sakila

    sys

    world

    world_x

    ```


    Depending on what sample databases or other databases you have installed or created,
    your results may be different, but you should see the `plant_monitoring`, `mysql`,
    `information_schema`, and `performance_schema` at a minimum.


    If you encounter errors like the one below, be sure to check your credentials
    in the dictionary to ensure you are using the correct hostname (or IP address),
    port, user, and password.


    ```

    Error: 1045 (28000): Access denied for user ''root''@''localhost'' (using password:
    YES)

    ```


    Now let’s look at how to insert data.


    #### Example 2: Inserting Data


    Now let’s see how we can insert some data in a table. We will name this example
    code `mysql_insert.py`.


    In this case, we simply want to read data from a file and insert it into a table.
    We will use the same code as the previous example to connect to the server and
    execute a query. The difference is we will use a file to read in sample data in
    a comma-separated value format (`.csv`). It is a common format used in a variety
    of applications.


    For each row in the file, we decode the fields then form an `INSERT` command using
    the data in the columns. Once again, we will use the `execute()` method of the
    cursor class to execute the query to insert the data. Since there are no results,
    we don’t fetch anything. However, after we finish inserting the rows, we must
    call the `commit()` method for the cursor class to commit the changes. Listing
    [3-14](#527055_1_En_3_Chapter.xhtml#PC51) shows the complete code for the example.
    Take a moment to read through it for clarity.


    ```

    //

    //  MySQL Database Service

    //

    // Chapter 03 - MySQL Insert

    //

    // This example attempts to connect to a MySQL server, read rows from a file

    // and insert data into a table.

    //

    // Dr. Charles Bell

    //

    // Imports

    import java.io.File;

    import java.sql.Connection;

    import java.sql.DriverManager;

    import java.sql.SQLException;

    import java.sql.Statement;

    import java.util.logging.Level;

    import java.util.logging.Logger;

    import java.util.Scanner;

    public class MySQLInsert {

    public static void main(String[] args) {

    String url = "jdbc:mysql://localhost:3306/plant_monitoring?useSSL=false";

    String user = "root";

    String password = "SECRET";

    try (Connection con = DriverManager.getConnection(url, user, password);

    Statement st = con.createStatement()) {

    // Open the file and read all rows inserting them.

    try {

    File myObj = new File("plants_data.txt");

    Scanner myReader = new Scanner(myObj);

    while (myReader.hasNextLine()) {

    String data = myReader.nextLine();

    String cols[] = data.split(",");

    String sql = "INSERT INTO plant_monitoring.plants (name, "

    + "location, climate) VALUES (''" + cols[0]

    + "'',''" + cols[1] + "''," + cols[2] + ");";

    System.out.println(sql);

    st.executeUpdate(sql);

    }

    myReader.close();

    } catch (Exception e) {

    System.out.println("An error occurred.");

    e.printStackTrace();

    }

    } catch (SQLException ex) {

    Logger lgr = Logger.getLogger(MySQLInsert.class.getName());

    lgr.log(Level.SEVERE, ex.getMessage(), ex);

    }

    }

    }

    Listing 3-14

    MySQL Insert Data Example

    ```


    The file we are reading has only a few rows and is a mockup of the plant-monitoring
    system example. The following shows the file contents. Note that I labeled it
    `plants_data.txt`. If you change the file name, be sure to change the code accordingly:


    ```

    Jerusalem Cherry,deck,2

    Moses in the Cradle,patio,2

    Peace Lilly,porch,1

    Thanksgiving Cactus,porch,1

    African Violet,porch,1

    ```


    Recall if you want to run this example after having run the Python example above
    or if you want to rerun the examples, you should run the following command between
    executions to empty the table:


    ```

    % mysqlsh -uroot -p --sql -e "DELETE FROM plant_monitoring.plants" --table

    ```


    To compile and execute the code, issue the following commands from the folder
    where you stored the file. Be sure to put the data file in the same folder first.
    I show the results of running the code:


    ```

    % javac MySQLInsert.java

    % java MySQLInsert

    INSERT INTO plant_monitoring.plants (name, location, climate) VALUES (''Jerusalem
    Cherry'',''deck'',2);

    INSERT INTO plant_monitoring.plants (name, location, climate) VALUES (''Moses
    in the Cradle'',''patio'',2);

    INSERT INTO plant_monitoring.plants (name, location, climate) VALUES (''Peace
    Lilly'',''porch'',1);

    INSERT INTO plant_monitoring.plants (name, location, climate) VALUES (''Thanksgiving
    Cactus'',''porch'',1);

    INSERT INTO plant_monitoring.plants (name, location, climate) VALUES (''African
    Violet'',''porch'',1);

    ```'
