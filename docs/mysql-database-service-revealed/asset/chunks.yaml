    +--------------------+

    4 rows in set (0.0009 sec)

    MySQL  10.0.1.73:33060+ ssl  SQL > \q

    Bye!

    清单 4-3 连接到数据库系统上的 MySQL（计算实例）

    ```


    如果您看到类似清单中的输出，恭喜您！您刚刚连接到了您的第一个数据库系统。如果想尝试一下，可以继续运行一些示例 SQL 语句。


    ### 等等，它不工作！


    如果您无法连接，请返回并确保您的计算实例位于同一可用性域、同一 VCN（在公有子网中），并且您已按照上述说明向 VCN 私有子网添加了正确的入口规则。


    另一个常见问题是忘记了 MySQL 管理员用户名和密码。虽然记下密码是非常糟糕的做法，但您应确保使用创建数据库系统时提供的用户名和密码。更改该密码并不容易，因此最坏的情况可能需要您删除当前的数据库系统，用相同的数据创建另一个，并确保记录下
    MySQL 管理员用户的用户名和密码。


    就是这样！设置和使用起来相当容易，对吧？再次说明，这与您通常在 OCI 中构建应用程序的方式非常相似。您会将应用程序服务器或面向公众的连接点放在 VCN 的公有子网上，而将数据资源放在私有子网上，通过良好的安全实践来保护您的重要投资。


    现在，让我们看看如何直接从我们的 PC 连接到数据库系统。


    ## 使用堡垒机会话进行连接


    堡垒机是 OCI 的一项服务，它通过 SSH 提供受限且有时间限制的连接，用于访问那些没有公共端点的资源。连接建立后，用户可以使用任何 SSH 支持的软件或协议与目标资源进行交互。连接是使用堡垒机资源上的会话对象，通过
    SSH 客户端或 SSH 隧道连接到私有子网上的资源来完成的。例如，您可以使用支持 SSH 的 MySQL 客户端连接到数据库系统。在我们查看演示之前，让我们先了解一下堡垒机中使用的术语。


    > **注意**

    > 堡垒机与单个 VCN 相关联。它们无法从一个 VCN 移动到另一个 VCN。

    '
- fmt: '# Bastion Terminology


    The following summarizes key terminology used in the Bastion Service:


    *   **Bastion**: An OCI service that provides a secure, public access to target
    resources. These resources are those you cannot access from outside the VCN because
    they are placed in a private subnet in the VCN. The Bastion Service (sometimes
    an instance is simply called a bastion) is placed in the public subnet of the
    VCN. Clients are identified using a CIDR allow list to specify the address or
    address range you will permit to connect to a specific resource or range of resources
    in the private subnet.


    *   **Session**: A session is used to provide access to users via an SSH private
    key that matches the public SSH key pair. The SSH key pair is recorded in the
    session when it is created. A session therefore can be considered an active connection
    via the Bastion Service.


    *   **Target Resource**: A resource in the private subnet of the VCN to which
    you want to connect.


    *   **Target Host**: A specific type of target resource that supports SSH connections
    such as compute instances.


    ## Session Types


    Bastion has two types of sessions that are designed for connecting to a certain
    type of target resource. The session types include the following:


    *   **Managed SSH**: Allows SSH access to a compute instance executing Linux,
    running an OpenSSH server, and the Oracle Cloud Agent with the Bastion plugin
    enabled.


    *   **SSH Port Forwarding**: Also known as SSH tunneling. Does not require either
    an OpenSSH server or the Oracle Cloud Agent to be running on the target resource.
    Creates a secure connection between a specific port on the client to a specific
    port on the target resource. The tunnel supports most TCP protocols including
    Remote Desktop Protocol (RDP), Oracle Net Services, and MySQL.


    A bastion can be accessed via any of the normal clients used to communicate with
    OCI resources that also support SSH. For example, you can use the cloud console,
    CLI, or the OCI APIs.


    > Tip

    >

    > To learn more about Bastion, see `https://docs.oracle.com/en-us/iaas/Content/Bastion/Concepts/bastionoverview.htm`.


    In this tutorial, we will use a port-forwarding option and a Bastion Session to
    connect to our DB System using our PC.


    ## Prerequisites


    Before we begin, we will need the following pieces of information. We will see
    how (and where) to find this information as we proceed:


    *   Private IP Address of the DB System

    *   VCN and Subnet

    *   Classless Inter-Domain Routing (CIDR) for the IP Address of the client (e.g.,
    PC)

    *   Maximum session time (time you want to allow the connection to remain open)

    *   SSH Key Pair

    *   Ingress Rule on the Private Subnet of the VCN


    Clearly, you will need to have a running (or one that you can start) DB System,
    the VCN it is connected to, and the subnet. If you do not have a DB System that
    you can use, go back and create one before proceeding.


    We must also have an ingress rule for our private subnet to allow the MySQL ports
    3306 and 33060 to pass from the public subnet. If you skipped the previous example,
    return to the section entitled *Modify the VCN – Create an Ingress Rule for the
    Private Subnet* and create the ingress rule before continuing.


    ## Create a Bastion Service


    Now let’s create our Bastion Service. Using the cloud console main menu, choose
    **Identity & Security** | **Bastion** (you may need to scroll down a bit) and
    then click the **Create Bastion** button as shown in Figure 4-39. Make sure you
    have the correct compartment selected.


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig39_HTML.png)


    **Figure 4-39** Creating a New Bastion Service (Bastion Main Page)


    This will open a new dialog where you will be creating a new Bastion Service running
    on our VCN. First, name the bastion `MySQL Bastion`. Note that the name for a
    bastion cannot have spaces, underscores, or dashes (it will remind you). Next,
    select the `oci-tutorial-vcn` and the `Public Subnet-oci-tutorial-vcn` from the
    dropdown boxes. Recall, we want to create a bridge from the public subnet to the
    private subnet so the bastion must reside on the public subnet. Next, we will
    also use a CIDR of `0.0.0.0/0` (enter the string then press *ENTER* to accept
    it in the box), which is very open (allows all IP addresses), but you may want
    to modify that to restrict access for production uses. Figure 4-40 shows the dialog
    with the same data. When you have verified the entered data is correct, click
    the **Create bastion** button.


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig40_HTML.jpg)


    **Figure 4-40** Creating a Bastion Service (Dialog)


    You should wait for the bastion to be created and provisioned before proceeding.


    ## Create a SSH Key Pair


    We will need an SSH key pair to use with the bastion. Go ahead and create one
    now on your PC. Listing 4-4 shows an example of creating the key pair in the `~/.ssh`
    folder assigning permissions to the private key. Notice the name used is `bastion_rsa`,
    but you can use whatever you’d like just don’t overwrite any existing key pairs.


    ```bash

    % ssh-keygen -t rsa

    Generating public/private rsa key pair.

    Enter file in which to save the key (/Users/XXXX/.ssh/id_rsa): /Users/XXXX/.ssh/bastion_rsa

    ...

    The key fingerprint is:

    SHA256:NGrshx+714+XXXXXXXXXXXXXXXXXXXXXXXXU YYYYYYYY.local

    The key''s randomart image is:

    +---[RSA 3072]----+

    ...

    +----[SHA256]-----+

    ```


    **Listing 4-4** Generating a SSH Key Pair


    See `www.howtogeek.com/762863/how-to-generate-ssh-keys-in-windows-10-and-windows-11/`
    for how to generate an SSH key pair on Windows 10 or 11. See `https://docs.oracle.com/en-us/iaas/Content/API/Concepts/apisigningkey.htm#two`
    for how to create an API signing key on macOS and Linux.'
