    DB 系统。如果您想跟随本教程操作，我们将使用一个名为 `oci-tutorial-mysql` 的 DB 系统，我们在本书前面已经使用过它。


    回顾一下，我们需要使用一个中间计算实例来通过 MySQL Shell 登录我们的 DB 系统。您可以像之前一样使用 SSH 连接到同一个计算实例，然后可以像下面这样启动
    MySQL Shell：


    ```

    PS C:\Users\cbell> ssh -i c:\users\cbell\.ssh\ssh-key-2022-08-16.key opc@150.136.69.126

    [opc@connection-instance ~]$ mysqlsh --sql mysql_admin@10.0.1.226:33060

    ```


    接下来，我们将执行 `util.dumpInstance()` 方法，为存储桶数据提供一个前缀（使用 `mds-test`），并附带一个包含存储桶名称 (`osBucketName`)、线程数、MDS
    数据兼容性开关 (`ocimds`) 设为 `true`，以及之前讨论过的 `compatibility` 选项的 JSON 字符串。在兼容性选项中，我们将剥离受限的权限、definer
    子句、缺失的主键和无效的账户。清单 7-17 显示了运行该方法以将我们 DB 系统上的数据库转储到我们先前创建的 (`mysql-data-bucket`)
