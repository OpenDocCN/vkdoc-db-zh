    如果您看到类似的结果，恭喜您！您刚刚将数据从 DB 系统迁移到了本地 MySQL 服务器。如果您看到错误，请查阅 MySQL Shell 文档以获取更多信息
    ([`https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-utilities-load-dump.xhtml`](https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-utilities-load-dump.xhtml))。


    由于我们在本地 PC 上执行导入，我们可以使用 `util.loadDump()` 方法的另一种形式，该形式不需要 PAR，只需指定文件夹名称、存储桶名称
    (`osBucketName`) 和存储桶命名空间 (`osNamespace`) 参数，如下所示：


    ```

    util.loadDump("mds-test", { osBucketName:"mysql-data-bucket", osNamespace:"SECRET"})

    ```


    当您使用这些参数运行该方法时，系统会要求您输入 SSH 密钥密码。您可以在存储桶详细信息页面上找到存储桶名称和命名空间，如图 7-13 所示。


