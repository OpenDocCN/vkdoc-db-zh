    Figure 2-1


    Regions, Availability, and Fault Domains


    Notice we have a region, region 1, that contains three availability domains (typically
    abbreviated as AD-n), which each have three fault domains (typically abbreviated
    FD-n). Oracle currently supports regions throughout the world with more being
    added regularly. Figure [2-2](#527055_1_En_2_Chapter.xhtml#Fig2) shows the current
    status of OCI regions taken from [`https://oracle.com/cloud/architecture-and-regions`](https://oracle.com/cloud/architecture-and-regions).


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig2_HTML.png)


    A world map depicts the commercial, commercial planned, and government regions
    in Oracle''s current support.


    Figure 2-2


    OCI Regions (Courtesy of [oracle.​com](http://oracle.com))


    #### Virtual Cloud Network


    A virtual cloud network (VCN) is a virtualization of a traditional computer network.
    The virtualization extends to creating subnets, routing tables, gateways, etc.
    All of your resources will be running on a virtual cloud network. The virtual
    cloud network is associated with a single region but has connectivity to all of
    the availability domains and fault domains. Further, for each subnet you can span
    one or more of the availability domains. You must set up at least one virtual
    cloud network before you can launch (create) compute instances. Thus, creating
    a virtual cloud network is one of the first things you will create when you set
    up your account.'
  trans: '


    #### 虚拟化


    让我们首先了解虚拟化对于云服务意味着什么。这可能是初学者最难掌握的概念，因为有些人觉得云中没有什么是“真实”的。


    简单来说，虚拟化仅仅意味着一项服务、一个功能，甚至硬件，已经被表示为一个独立的实体。在大多数情况下，这意味着所讨论的对象或资源确实作为进程或以某种形式的软件在一个庞大的计算框架中运行。


    例如，一个计算资源（可以理解为服务器）可以作为虚拟机在 `虚拟机管理程序栈` 上运行。在其他情况下，它可能意味着一个概念性的、受管理的概念，比如一个虚拟网络，它向用户（你）呈现的方式就好像它是一个物理网络。


    此外，一些虚拟资源只是其他虚拟资源的一部分，并非设计为单独使用。例如，一个 `块存储设备` 通常连接到一个计算资源，并通过运行在操作系统之上的操作系统（或平台服务）进行访问。


    #### 租户


    租户是 `OCI` 为特定客户（用户）组织所有资源的方式。当你注册 `OCI` 时，系统会为你的账户分配一个 `租户`。你所有的资源、账单等都将与你的 `租户`
    相关联。你 `租户` 中的资源无法与其他 `租户` 中的资源交互（除非配置了额外的资源来授予访问权限），并且你只能管理位于你 `租户` 中的那些资源。


    #### 隔离区


    `隔离区` 是你 `租户` 的另一个组织层级。你可以创建 `隔离区` 来容纳一组相关的资源。对 `隔离区` 中资源的访问由你授予特定权限的用户组来定义。因此，`隔离区`
    是一个虚拟或逻辑上的分组（而非物理分组）。有趣的是，当你使用 `OCI 云控制台` 时，你可以使用 `隔离区` 来筛选要查看的资源。


    一个 `租户` 可以被视为你云资源的“根” `隔离区`，并且一旦你创建了一个 `隔离区`，创建的任何资源都需要你选择该资源将驻留于其中的 `隔离区`。


    **提示**

    为初学者简化起见，建议你在适应使用 `OCI` 之后再创建多个 `隔离区`。添加 `隔离区` 及其安全配置文件可能会使学习曲线更陡峭且更容易出错。


    当你创建一个 `隔离区` 时，它就与你的 `租户` 关联起来。你可以根据需要创建多个 `隔离区`。每个 `隔离区` 都通过特定于该 `隔离区` 的访问策略进行控制，允许你限制用户组的访问，确保他们只能访问他们需要的资源。因此，当你处理多个
    `隔离区` 时，必须仔细考虑如何为你用户对 `隔离区` 资源的访问进行授权（或限制）。


    #### 安全区


    每个 `隔离区` 都有一个 `安全区` 或 `安全区配置文件`。当创建一个 `隔离区` 并添加资源时，`OCI` 将使用 `安全区` 策略来验证所有针对这些资源的操作。如果操作受到限制（验证失败），该操作将被拒绝。我们将在下一节通过设置免费试用
    `OCI` 账户的演练来了解更多关于安全性的内容。


    #### OCI 资源分配


    你可能想知道所有这些 `OCI` 资源存放在哪里，甚至它们是如何组织的。`OCI` 资源按物理和逻辑分组进行组织。`OCI` 资源可能位于一个或多个称为 `区域`
    的本地数据中心，或在其中分布，这些中心具有一个或多个物理布局（地理隔离的硬件、电力、冷却等），称为 `可用域`，然后再细分为物理上相邻（同一机架）的分组，称为
    `故障域`。以下尝试解释 `OCI` 内部的资源组织方式：


    *   **区域**：由一个或多个数据中心组成的局部地理区域。在每个 `区域` 内，资源被分配到一个或多个 `可用域`，这允许进行额外的组织。所有资源要么是
    `区域` 特定的（例如，虚拟网络），要么是 `可用性` 特定的（例如，存储和计算资源）。


    *   **可用域 (AD)**：一个地理上隔离（与其他 `可用域` 隔离）、容错的物理资源分组。`可用域` 隔离通过允许你在 `可用域` 之间分配资源，从而降低故障风险。请注意，某些资源必须在同一
    `可用域` 内创建。例如，如果你创建一个计算资源并想要附加存储，那么存储资源必须与计算资源位于同一 `可用域`。


    *   **故障域 (FD)**：一个 `可用域` 内的硬件分组。`故障域` 允许你分配你的实例，使实例在同一个 `可用域` 内不运行在同一硬件上。这样可以防范影响一个
    `故障域` 的硬件故障（相同或类似事件影响多个 `故障域` 的可能性很小），停机不会影响其他 `故障域` 中的资源。因此，如果你想要资源具有高可用性，你会希望在
    `可用域` 之间以及在每个 `可用域` 内跨 `故障域` 分配你的资源。


    *   **领域**：`区域` 的一个（逻辑）集合。`领域` 彼此隔离。你的 `租户` 将存在于单个 `领域` 中，并且能够访问该 `领域` 内的 `区域`。`OCI`
    目前提供多个商业和政府 `领域`。


    图 2-1 以视觉方式展示了 `区域`、`可用域` 和 `故障域` 的逻辑排列方式。如你所见，我们可以在 `区域` 之间分配资源，在一个 `区域` 内跨 `可用域`
    分配，以及在一个 `可用域` 内跨 `故障域` 分配。每一层都增加了显著的隔离级别，以防止由硬件或外部影响引起的故障。


    ![](img/527055_1_En_2_Fig1_HTML.png)


    一个方块图展示了从区域 1 到区域 N。每个区域包含 1 到 3 号可用域。每个可用域有 3 个串联的故障域。


    **图 2-1** 区域、可用域和故障域


    注意，我们有一个 `区域`，即 `区域 1`，它包含三个 `可用域`（通常缩写为 `AD-n`），每个 `可用域` 有三个 `故障域`（通常缩写为 `FD-n`）。Oracle
    目前在全球支持多个 `区域`，并且正在定期增加更多。图 2-2 显示了当前 `OCI` `区域` 的状态，取自 [`https://oracle.com/cloud/architecture-and-regions`](https://oracle.com/cloud/architecture-and-regions)。


    ![](img/527055_1_En_2_Fig2_HTML.png)


    一幅世界地图描绘了 Oracle 当前支持的商业、商业计划中和政府区域。


    **图 2-2** OCI 区域（由 [oracle.​com](http://oracle.com) 提供）


    #### 虚拟云网络


    `虚拟云网络 (VCN)` 是对传统计算机网络的虚拟化。这种虚拟化扩展到创建子网、路由表、网关等。你所有的资源都将在一个 `虚拟云网络` 上运行。该 `虚拟云网络`
    与单个 `区域` 相关联，但可以连接到所有 `可用域` 和 `故障域`。此外，对于每个子网，你可以跨越一个或多个 `可用域`。在你能够启动（创建）计算实例之前，必须至少设置一个
    `虚拟云网络`。因此，创建 `虚拟云网络` 是你设置账户时首先要做的事情之一。


    '
- fmt: '#### Oracle Cloud Identifier (`OCID`)


    Every resource in OCI has an Oracle Cloud Identifier. It is a unique string of
    characters that identifies a resource in OCI. The Oracle Cloud Identifier is required
    for almost every operation you want to execute on a resource when accessing it
    via the command line interface (`CLI`), `REST API`, or a developer API via code.
    The following shows the format for the `OCID`:

    ```

    ocid1...[REGION][.FUTURE USE].

    ```

    The following shows an example of an `OCID` for a MySQL Database Service `DB System`.
    Other OCI resources will use a similar format but typically the preamble shows
    the type of resource the `OCID` references:

    ```

    ocid1.mysqldbsystem.oc1.iad.aaaaaaaapuif...sbg5z7sy5imjtlclhbxwbjmrq

    ```


    #### Compute


    Also called a compute instance, is a compute host running in OCI. In other words,
    it is a server that you can use to run software, install your own applications,
    etc. A compute instance can be a virtual machine or a bare metal host. The size
    or virtualized hardware capabilities of a compute instance are governed by a logical
    grouping of CPU size, number of cores, performance, and memory settings called
    a shape. The configuration of the server (operating system, etc.) is governed
    by a template called an image.


    ##### Virtual Machine


    A virtual machine is a software implementation of an abstract set of hardware
    running on a large system host (called a hypervisor server) that allocates virtualized
    memory, CPU, and sometimes disk for a server. You may have encountered virtual
    machines when using your own server or `PC`. Virtual machines in OCI are similar
    but are much more complex because they can be tailored to performance and capacity
    using shapes.


    ##### Bare Metal Host


    When performance or isolation is paramount, OCI provides a small set of physical
    (or “bare metal”) machines. These run directly on hardware bypassing the hypervisor
    and do not use virtualized memory, `CPU`, etc. (but may be connected to virtualized
    resources). Oracle Cloud Infrastructure provides you control of the physical host
    (“bare metal”) machine. When you use a bare metal host, you are the only tenant
    using the physical `CPU`, memory, and network interface card (`NIC`). You can
    use it as you would any other compute instance and appears no different than a
    compute instance using a virtual machine.


    ##### Shapes


    A shape is a set of configuration items that defines the number of `CPU` cores,
    size of memory, and in some cases the disk space for a compute instance. This
    allows you to “tune” your compute instance to meet your needs. For example, if
    you do not need a lot of memory, you can choose a “smaller” shape and therefore
    save some money when you incur costs.


    ##### Images


    An image is a template of a virtualized disk that defines the operating system
    and default installed software. When you create a compute instance, you can select
    the image you want to use. For example, you can select an image preinstalled with
    Oracle Linux. You can also create an image from one of your configured compute
    instances so you can deploy a new compute instance of the same configuration saving
    you the setup and configuration time. Cool!


    ##### A Word About the Word Instance


    The word instance is one of those overused terms in cloud computing. In OCI parlance,
    it is not correct to refer to a compute instance as simply “instance.” This is
    because there are other resources that are considered instances.

    For example, in MySQL parlance, “instance” can mean a running MySQL server application
    (MySQL running on a server platform), or in MySQL Database Services, a `DB System`
    can be referred to as a `DB System instance`. Thus, you should always qualify
    what you mean by “instance”: a compute instance, MySQL instance, or `DB System
    instance`.


    #### Provisioning


    This is one of those terms you will encounter once you start creating resources.
    Provisioning in this case means the set of operations required by OCI to create
    the resource including its subcomponents as well as configure the resource for
    use. For example, provisioning a new compute instance includes, at a high level,
    allocating a virtual machine, installing the operating system and base software
    via an image, and configuring the compute instance for your region, availability
    domain, etc. You may see this term when working with OCI resources as state or
    status.


    **Tip**

    You may encounter in the documentation and blogs some of these terms and concepts
    are presented as acronyms or simply abbreviated. Be sure to refer to the documentation
    dictionary section to confirm the meaning of terms and acronyms you may not be
    familiar with so to avoid confusion.


    Next, let’s discuss the major interfaces you can use to interact with OCI.'
