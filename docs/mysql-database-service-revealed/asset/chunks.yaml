    现在来检查我们的表格。如果我们从一个空表开始，对植物表执行`SELECT`语句后，应该会看到以下内容。请注意，我们使用 MySQL Shell 传递要执行的查询，并将输出格式化为表格：

    ```

    % mysqlsh -uroot -p --sql -e "SELECT * FROM plant_monitoring.plants" --table

    +----+---------------------+----------+---------+

    | id | name                | location | climate |

    +----+---------------------+----------+---------+

    | 11 | Jerusalem Cherry    | deck     | outside |

    | 12 | Moses in the Cradle | patio    | outside |

    | 13 | Peace Lilly         | porch    | inside  |

    | 14 | Thanksgiving Cactus | porch    | inside  |

    | 15 | African Violet      | porch    | inside  |

    +----+---------------------+----------+---------+

    ```


    再次强调，这些示例仅展示了使用连接器的最基础功能。实际上，连接器能实现的功能远不止于此。如需了解更多信息以及如何使用连接器满足您的应用需求的示例，请阅读在线参考手册
    (`https://dev.mysql.com/doc/connector-j/8.0/en/`)。


    ## 总结


    MySQL 数据库服务器是一个强大的工具。鉴于其在作为互联网数据库服务器方面的独特市场定位，网络开发者（以及许多初创公司和类似的互联网企业）选择 MySQL
    作为解决方案也就不足为奇了。该服务器不仅稳健且易于使用，还可以作为免费的社区许可证获取，让您能够将初始投资控制在预算之内。


    在本章中，您了解了使用 SQL 接口时 MySQL 数据库服务器在传统角色中的一些强大功能；如何发出用于创建数据库和表以存储数据的命令，以及检索这些数据的命令，甚至如何将您的应用程序连接到
    MySQL 以存储数据。虽然本章仅提供了 MySQL 的一个简短入门，但您已经学会了如何通过实践自己的 MySQL 安装来开始使用，这在生产环境中使用 MySQL
    数据库服务时将会带来回报。


    在下一章中，我们将深入探讨 MySQL 数据库服务，包括如何开始创建和使用您的第一个数据库系统（在 MDS 中称为 `dbSystem`）。


    脚注 1 2 3


    # 4. MySQL 数据库服务


    如果您是 MySQL 新手并且阅读了上一章，那么您现在应该已经足够熟悉 MySQL，能够欣赏其强大功能和简洁性。然而，如果您是一位长期的 MySQL 用户，并且已经将您自己的
    MySQL 服务器构建到您的基础设施中，那么您很可能非常清楚管理 MySQL 服务器所需付出的努力。长期以来，业界一直需要的是一种全托管的基于云的 MySQL
    服务，它在安全环境中运行，并得到云服务提供商的支持，该提供商提供实时服务管理，以确保您的数据库需求得到充分满足且可靠。那一天已经到来，它就是由 Oracle
    拥有和管理的 Oracle 云基础设施上运行的 **MySQL 数据库服务**。


    既然我们现在对 Oracle 云基础设施 (OCI) 和 MySQL 有了更多了解，我们就可以继续学习如何在 OCI 中使用和操作 MySQL，即 MySQL
    数据库服务，简称 MDS。在该服务中，有一个称为**数据库系统**的资源，简称 DB System。这就是为您提供托管 MySQL 服务器的 OCI 资源。


    回顾第 1 章，DB System 构建在现有的 OCI 资源之上，包括计算实例和块存储。然而，在幕后还有更多被使用和管理的组件。


    这种全托管服务为您提供了许多优势，包括无需初始设置硬件、安装操作系统、安装 MySQL、配置所有组件使其良好工作等，并且之后，您也无需担心基础操作系统甚至
    MySQL 的更新或升级——所有这些任务都由 OCI 内部的自动化处理，并由 MySQL 工程部门自身监督。太棒了！


    ## 托管式 MySQL 的职责


    “托管”一词用于描述 MySQL 在 OCI 中的运行方式。虽然这包括我们讨论过的设置、配置和升级等内容，但还包含什么？客户与 Oracle 的职责分别是什么？


    Oracle 负责确保备份和恢复机制可用，并在请求时按计划执行自动化备份、MySQL 版本补丁和升级、操作系统补丁和升级、监控系统是否存在异常并响应紧急问题，以及确保您的
    DB 系统在安全环境中运行。客户负责建模、设计和维护任何创建的模式（数据库）、查询设计和优化，以及数据访问和保留策略。


    因此，保持 MySQL 服务器成功运行的维护任务属于 Oracle 的职责范围，而数据和对其的访问则是客户的责任。


    在本章中，我们将回到我们的 OCI 账户，学习如何设置和使用一个 MDS 数据库系统。我们将通过云控制台简要浏览 MDS 服务和一个 DB System，以便我们完全理解页面上的所有内容。因此，我们要更深入地探索！让我们开始吧。


    ## 入门指南


    如果您一直在按照第 2 章和第 3 章中的 OCI 和 MySQL 教程操作，那么您应该已经设置好了一个 OCI 账户，并且熟悉 MySQL 中常用的术语和
    SQL 命令。如果您至少没有完成第 2 章中的 OCI 教程，您可能需要先回顾一下那一章。


    在开始部署您的第一个 DB 系统之前，您必须满足几个先决条件。以下步骤总结了我们需要在 OCI 账户中设置的内容：


    ![](img/527055_1_En_4_Fig1_HTML.png)


    一个横幅显示了 MySQL 先决条件。提到了租户管理员执行该任务的 3 个步骤。可以找到用于创建或将用户添加到组的几个超链接。


    图 4-1：首次使用 MDS 时的横幅


    1.  您必须拥有一个虚拟云网络 (VCN) 来放置您的 MySQL 资源。

    2.  您必须创建一个用户组并向该组添加至少一个用户。

    3.  您必须创建一个策略，允许该组拥有使用 MDS 和 DB 系统的某些权限。


    如果您不具备所有这些条件，您可能无法部署 DB 系统。有趣的是，OCI 在 MDS 资源页面顶部生成了一个横幅，如图 4-1 所示。


    请注意，它概述了所有三个步骤以及您需要通过根 compartment 上的策略授予的权限。另外，请注意横幅底部有一个关闭通知的链接。建议您在首次成功部署 DB
    系统之前不要关闭该横幅。


    让我们逐步完成所有三个步骤，并演示如何满足每一步的要求。请务必首先访问 `cloud.oracle.com` 登录您的 OCI 账户。


    **注意：** 在接下来的内容中，我们将省略显示菜单选择和类似基本操作的图片，因为我们在第 2 章中已经进行了足够的练习。

    '
- fmt: '### Step 1: Create a VCN


    Since we have already created a VCN (`oci-tutorial-vcn`) in Chapter [2](#527055_1_En_2_Chapter.xhtml),
    we will use that one. If you’d like to create another, you can do so. Similarly,
    if you terminated the VCN, you would need to recreate it. Just follow the demonstration
    in Chapter [2](#527055_1_En_2_Chapter.xhtml) and create a VCN with the same settings
    (using a different name). In short, you will need to open the main menu in the
    cloud console then choose `Networks` then `Virtual Cloud Networks` then click
    the `Start VCN Wizard` button to being the process.


    ### Step 2: Create a Group


    This next step is something we have seen. In OCI, you can create users and groups
    to place users in for the purposes of setting security policies. OCI requires
    you to create a group and user for use with MDS.


    In this tutorial, we will create a sample group with a single user. We will name
    the group `mysql-users` and the user `mysqladmin`. Names are not overly important,
    but it is nice to give them some name that at least hints at their intended use.
    There are two steps involved. First, we will create the group, then we will add
    the user to the group.


    #### Create a Group


    Groups are created in domains. There is no direct cloud console menu to take you
    directly to the groups'' resource page, rather, to create a group, you must first
    open the resource page for your current (default) domain. To do so, open the main
    menu in the cloud console, then select `Identity & Security` then click `Domains`.
    You will see the Domains resource page as shown in Figure [4-2](#527055_1_En_4_Chapter.xhtml#Fig2).


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig2_HTML.png)


    A Domain resource page in O C I tutorial compartment displays default as the current
    domain on the right. On the left side, under Identify, Domains is selected.


    Figure 4-2


    Domains Resource Page


    To open the domain details page, simply select the Default label as shown. On
    the Default domain details page in the Identity menu on the left, click `Groups`
    as shown in Figure [4-3](#527055_1_En_4_Chapter.xhtml#Fig3).


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig3_HTML.jpg)


    A menu of Identify domains in the cloud console list overview, user, groups, dynamic
    group, applications, jobs, etcetera. In that, Groups option is highlighted in
    a rectangular red box.


    Figure 4-3


    Default Domain Details Page


    At this point, we will see the list of groups for the domain. At the top of the
    list, click the `Create Group` button to start the process to create a group as
    shown in Figure [4-4](#527055_1_En_4_Chapter.xhtml#Fig4).


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig4_HTML.jpg)


    A table displays the list of groups: all domain users and administrators. Create
    group on the top left is highlighted for selection.


    Figure 4-4


    Groups List (Default Domain)


    On the Create Group dialog, we will want to enter the following information at
    a minimum:


    *   `Name`: Choose a unique name for the group. The name must be between 1 and
    100 characters.

    *   `Description`: Enter a description that communicates how the group will be
    used.

    *   `Tags` (optional): You can assign one or more short text strings to a resource.
    You should not store critical information or confidential information.


    Tip


    Names in OCI are permitted to contain the following characters: lowercase letters
    `a`-`z`, uppercase letters `A`-`Z`, `0`-`9`, period (`.`), dash (`-`), and underscore
    (`_`). Spaces are not allowed.


    If you are following along, we will use `mysql-users` for the group name and “`Users
    who use MySQL DB Systems`” for the description as shown in Figure [4-5](#527055_1_En_4_Chapter.xhtml#Fig5).
    We will not use tags.


    Note


    You can use your root user account if you do not want to create a user at this
    time. Simply add the root user to the group by ticking the root user account when
    you create the group.


    When you are ready to create the group, click the `Create` button as shown.


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig5_HTML.png)


    A dialog box to create a group with a name, description, request user access,
    and a table to list the first and last names with their email address. The create
    button on the bottom is highlighted.


    Figure 4-5


    Create Group Dialog


    It only takes a few moments for the group creation. When complete, you will be
    directed to the Group details page as shown in Figure [4-6](#527055_1_En_4_Chapter.xhtml#Fig6).
    You can edit the group and change parameters using the `Edit group` button. You
    can also use the `Delete` button (a rare departure from “terminate” used elsewhere
    in the interface) to delete the group.


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig6_HTML.jpg)


    A page displays the details of the group created on the right side. Edit group,
    and add tags options are available. A blue circle with G written inside is present
    on the left.


    Figure 4-6


    Group Details Page


    Now that we have our group, we can create a user and add them to the group. This
    may be an optional step if you decided to add your root user to the group.'
