    从 MDS 迁移遵循上述相同的机制，只是方向相反。因此，在演示上一节中展示的三种相同机制时，我们只会看到较小的细节。如果你需要更多细节，例如设置 ObjectStore
    存储桶或 Bastion 服务，请参考前面的章节。


    如果你执行了之前的任何示例，请务必在尝试导入之前，通过删除 `sakila` 和 `world` 数据库来准备你的本地 MySQL 服务器。


    以下各节简要演示了从 MDS 导入数据的每种机制。


    ### 使用 ObjectStore 存储桶


    将数据从 MDS 导入到我们的本地 MySQL 服务器的第一种方法是使用 ObjectStore 作为导出数据的中间存储。我们将使用 DB 系统上的 MySQL
    Shell 创建数据的导出，将其放入 ObjectStore，然后再次使用 MySQL Shell 从我们的本地 MySQL 服务器访问该数据进行导入。


    #### 准备你的 PC


    如果你尚未执行从 PC 迁移数据到 MDS 的先前示例，请返回并确保你的 PC 和计算实例已使用正确的 OCI API 配置文件和 SSH 密钥进行了准备。有关更多详细信息，请参阅上面的
    `Configure Your PC for OCI CLI Access` 和 `Install and Test the OCI CLI` 部分。


    还有一件事我们必须在 PC 上完成。我们必须在 MySQL 中将 `local_infile` 全局变量设置为 `ON`。默认情况下这是关闭的，你希望在完成备份后再次将其关闭。登录到本地
    MySQL 服务器后，执行以下命令：


    ```

    set @@global.local_infile=ON;

    ```


    清单 7-16 显示了该命令的实际执行情况。


    ```

    MySQL  localhost:33060+ ssl  SQL > SHOW VARIABLES LIKE ''%local%'';

    +---------------+-------+

    | Variable_name | Value |

    +---------------+-------+

    | local_infile  | OFF   |

    +---------------+-------+

    1 row in set (0.0033 sec)

    MySQL  localhost:33060+ ssl  SQL > SET @@global.local_infile=ON;

    Query OK, 0 rows affected (0.0009 sec)

    MySQL  localhost:33060+ ssl  SQL > SHOW VARIABLES LIKE ''%local%'';

    +---------------+-------+

    | Variable_name | Value |

    +---------------+-------+

    | local_infile  | ON    |

    +---------------+-------+

    1 row in set (0.0032 sec)

    清单 7-16

    在本地 MySQL 服务器上开启 local_infile

    ```


    #### 创建 ObjectStore 存储桶


    接下来，我们需要创建一个 ObjectStore 存储桶来存储导出的数据。在此示例中，我们将在 `oci-tutorial-compartment` 中创建一个名为
    `mysql-data-bucket` 的存储桶。首先登录 OCI 并从菜单中选择 Storage | Buckets。你将看到 ObjectStore 存储桶页面。


    回顾一下，要创建新存储桶，请单击 `Create Bucket` 按钮，并在创建存储桶对话框中将存储桶名称替换为 `mysql-data-bucket`。如果你之前创建过此存储桶，可以重复使用它，但必须先删除所有文件。你可以通过删除存储桶并重新创建，或者通过从上下文菜单中选择
    `Delete Folder` 来删除 `mds-test` 文件夹，如图 7-12 所示。


    ![](img/527055_1_En_7_Fig12_HTML.png)


    表格列出了存储桶中的对象。右侧的三点图标用于上传、创建预认证请求、创建新文件夹和删除文件夹。


    图 7-12


    删除存储桶中的对象'
