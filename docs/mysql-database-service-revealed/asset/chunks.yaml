    animals\ngreenhouse\ninformation_schema\nmysql\nperformance_schema\nplant_monitoring\n\
    sakila\nsys\nworld\nworld_x\n```\n\n根据你安装或创建的示例数据库或其他数据库，你的结果可能会有所不同，但你至少应该看到\
    \ `plant_monitoring`、`mysql`、`information_schema` 和 `performance_schema`。\n\n\
    如果你遇到如下所示的错误，请务必检查字典中的凭据，确保你使用了正确的主机名（或 IP 地址）、端口、用户和密码。\n\n```bash\nError: 1045\
    \ (28000): Access denied for user 'root'@'localhost' (using password: YES)\n```\n\
    \n现在让我们看看如何插入数据。\n\n## 向表中插入数据\n\n现在让我们看看如何向表中插入一些数据。我们将此示例代码命名为 `mysql_insert.py`。\n\
    \n在这个例子中，我们只是想从文件中读取数据并将其插入到一个表中。我们将使用与之前示例相同的代码连接到服务器，并使用游标执行查询。不同之处在于，我们将使用一个文件以逗号分隔值格式（`.csv`）读取示例数据。这是一种在各种应用程序中常用的格式。\n\
    \n对于文件中的每一行，我们解码字段，然后使用列中的数据形成一条 `INSERT` 命令。我们将再次使用游标类的 `execute()` 方法来执行插入数据的查询。由于没有结果，我们不获取任何内容。但是，在插入完所有行后，我们必须调用游标类的\
    \ `commit()` 方法来提交更改。清单 3-11 展示了此示例的完整代码。请花点时间阅读以明确其逻辑。\n\n```python\n\"\"\"mysql_insert.py\"\
    \"\"\n#\n# MySQL Database Service\n#\n# Chapter 03 - MySQL Insert\n#\n# This script\
    \ demonstrates the basics for using the MySQL Connector/Python to\n# connect to\
    \ a MySQL server and insert data into a table.\n#\n# Dr. Charles Bell\n#\n# Import\
    \ libraries\nimport mysql.connector\n# Query\nINSERT_SQL = \"INSERT INTO plant_monitoring.plants\
    \ (name, location, climate) VALUES (\"\n# Connection parameters dictionary\nserver\
    \ = {\n    'user': 'root',\n    'password': 'SECRET',\n    'host': '127.0.0.1',\n\
    \    'database': 'plant_monitoring',\n}\n# Connect to the server\ncnx = mysql.connector.connect(**server)\n\
    # Create a cursor\ncur = cnx.cursor()\n# Read rows from a file for inserting into\
    \ plant-monitor table\nwith open(\"plants_data.txt\", encoding='UTF-8') as data_file:\n\
    \    data = data_file.readlines()\n# Now insert the data in the table\nfor row\
    \ in data:\n    cols = row.strip('\\n').split(\",\") # comma-separated row\n \
    \   INSERT = f\"{INSERT_SQL}'{cols[0]}','{cols[1]}',{cols[2]})\"\n    print(INSERT)\n\
    \    cur.execute(INSERT)\n# We must commit the changes\ncnx.commit()\n# Close\
    \ the cursor and connection\ncur.close()\ncnx.close()\n```\n\n**清单 3-11** MySQL\
    \ 插入数据示例\n\n我们读取的文件只有几行，是植物监控系统示例的一个模拟数据。以下显示了文件内容。请注意，我将其命名为 `plants_data.txt`。如果你更改了文件名，请务必相应地更改代码：\n\
    \n```text\nJerusalem Cherry,deck,2\nMoses in the Cradle,patio,2\nPeace Lilly,porch,1\n\
    Thanksgiving Cactus,porch,1\nAfrican Violet,porch,1\n```\n\n要运行该脚本，请从存储文件的文件夹中发出以下命令。请务必先将数据文件放在同一文件夹中。我展示了运行脚本的结果：\n\
    \n```bash\n% python3 ./mysql_insert.py\nINSERT INTO plant_monitoring.plants (name,\
    \ location, climate) VALUES ('Jerusalem Cherry','deck',2)\nINSERT INTO plant_monitoring.plants\
    \ (name, location, climate) VALUES ('Moses in the Cradle','patio',2)\nINSERT INTO\
    \ plant_monitoring.plants (name, location, climate) VALUES ('Peace Lilly','porch',1)\n\
    INSERT INTO plant_monitoring.plants (name, location, climate) VALUES ('Thanksgiving\
    \ Cactus','porch',1)\nINSERT INTO plant_monitoring.plants (name, location, climate)\
    \ VALUES ('African Violet','porch',1)\n```\n\n现在让我们检查一下我们的表。如果我们从一个空表开始，当我们对 plants\
    \ 表执行 `SELECT` 时，应该会看到以下内容。请注意，我们使用 MySQL Shell 传递要执行的查询并将输出格式化为表格：\n\n```bash\n\
    % mysqlsh -uroot -p --sql -e \"SELECT * FROM plant_monitoring.plants\" --table\n\
    +----+---------------------+----------+---------+\n| id | name               \
    \ | location | climate |\n+----+---------------------+----------+---------+\n\
    | 11 | Jerusalem Cherry    | deck     | outside |\n| 12 | Moses in the Cradle\
    \ | patio    | outside |\n| 13 | Peace Lilly         | porch    | inside  |\n\
    | 14 | Thanksgiving Cactus | porch    | inside  |\n| 15 | African Violet     \
    \ | porch    | inside  |\n+----+---------------------+----------+---------+\n\
    ```\n\n你可以使用连接器完成比这里展示的更多的功能。你应该阅读在线参考手册（ [`https://dev.mysql.com/doc/connector-python/en/`](https://dev.mysql.com/doc/connector-python/en/)\
    \ ）以获取更多信息和如何使用连接器满足你应用程序需求的示例。\n\n现在，让我们看一个 Connector/J 示例。我们将使用相同的示例，但用 Java\
    \ 实现。"
- fmt: '### Example Connector: Connector/J


    The connector for Java from Oracle is a full-featured connector that provides
    connectivity to the MySQL database server for Java applications. Connector/J features
    support for all current MySQL server releases. It is a full-featured connector
    with all of the necessary features for creating secure connections and supports
    all MySQL SQL commands.


    Connector/J must be installed on the PC where you will run your code in the same
    manner any Java library that you may use. Using Connector/J in your applications
    consists of importing the base module, initiating a connection, and executing
    queries with a cursor.


    To keep things simple, we will be using a simplistic form of Java programming
    to write and execute the examples. More specifically, we will use a simple text
    editor to create the code files and the Java Development Kit (JDK) to compile
    the code (`javac`) and execute (`java`). If you have experience with more robust
    Java IDEs, you can use those instead.


    Note: The Java Runtime Environment (JRE) is not the same as the JDK. You will
    have to install the JDK even if you have the JRE installed.


    Naturally, to use Connector/J, you will need to ensure you have the latest version
    of the Java Runtime Environment installed on your PC. Most PCs have the JDK installed.
    However, if you want to check, simply issue `javac --version` in a terminal. If
    you get an error that the command cannot be found, visit [`www.oracle.com/java/technologies/downloads/`](http://www.oracle.com/java/technologies/downloads/)
    to learn how to download and install JDK on your PC.


    Note: You should use JDK version 8.0 or later.


    Before we jump into how we can use Connector/J to write some MySQL database–enabled
    applications, let’s talk about how to get and install Connector/J.


    #### Installing Connector/J


    Downloading is the same process as you discovered for the server. You can download
    Connector/J from Oracle’s MySQL website ([`http://dev.mysql.com/downloads/connector/j/`](http://dev.mysql.com/downloads/connector/j/)).
    The page will automatically detect your platform and show the available downloads
    for your platform. You may see several choices. Be sure to choose the one that
    matches your configuration. Note, however, there is no installation package for
    macOS. If you do not see your platform in the list, you can download using the
    *Platform Independent* operating system option.


    In this demonstration, we will use the *Platform Independent* option. We do this
    to demonstrate how you can use this option and use classes from an installation
    directory (folder) rather than install it on the system. You may want to do this
    if you are working on a system used for Java development as to not disrupt your
    IDE or Java installation.


    Simply choose the *Platform Independent* operating system option from the download
    page and download either the .zip or .tar.gz file. Once downloaded, copy the file
    to your project directory and unzip it. For example, if you had a folder named
    `../Ch03/java` to store the examples in this section, you can unzip the file in
    that directory. This will result in a folder in the same path named `../Ch03/java/mysql-connector-java-8.0.28`
    (or similar if you download a newer version of the connector).


    To access the classes in that folder, we will need to set the `CLASSPATH` as follows
    so that the classes can be found. This is a temporary setting that is only active
    for the terminal session opened and will not affect your Java installation. Just
    remember to execute this command once before you run the examples in this section.


    ```

    % cd ../Ch03/java

    % export CLASSPATH=./mysql-connector-java-8.0.28/mysql-connector-java-8.0.28.jar:$CLASSPATH

    ```


    Tip: See the online reference manual for specific notes about installing on some
    platforms ([`https://dev.mysql.com/doc/connector-j/8.0/en/connector-j-installing.xhtml`](https://dev.mysql.com/doc/connector-j/8.0/en/connector-j-installing.xhtml)).


    #### Checking the Installation


    Once Connector/J is installed, you can verify it is working with the following
    short example. We will create a new code file named `MySQLTest.java` with a class
    of the same name.


    Connector/J works with the Java database connectivity (JDBC) libraries. As such,
    rather than supply individual parameters for the connection, we build a universal
    resource locator (URL) that corresponds to the JDBC standard.


    The following shows a mockup format for the database connection URL syntax for
    MySQL Connector/J:


    *   `host`: the host name of the MySQL server. The default value is 127.0.0.1.

    *   `port`: the port number of the MySQL server. The default value is 3306.

    *   `database`: name of the default database for the connection.

    *   `failoverhost`: hostname of a standby database server. MySQL Connector/J supports
    failover when a connection fails. See the online reference for more details.

    *   `propertyNameN = propertyValueN`: one or more ampersand-separated list of
    properties (optional)


    ```

    jdbc:mysql://[host][,failoverhost...]

    [:port]/[database]

    [?propertyName1][=propertyValue1]

    [&propertyName2][=propertyValue2]...

    ```


    Tip: For a complete tutorial on JDBC, see Oracle’s JDBC tutorial website [`https://docs.oracle.com/javase/tutorial/jdbc/basics/index.xhtml`](https://docs.oracle.com/javase/tutorial/jdbc/basics/index.xhtml).


    Thus, to connect to our local MySQL server using the localhost and default port
    for MySQL, the URL will be as follows:


    ```

    "jdbc:mysql://localhost:3306/plant_monitoring?useSSL=false";

    ```


    Notice we left off the user and password. To make the connection to the server,
    we will use the Java `DriverManager` class to get the connection. We supply those
    as additional parameters when we call the `getConnection()` method of the `DriverManager`
    class.


    Now that we understand how to make the connection, let’s look at an example Java
    application that is designed to test if the Connector/J is installed. In this
    example, we attempt a connection using a user account that does not exist. We
    do this to ensure we will get the MySQL access denied error message. If it succeeds
    without that specific error, we know something else is wrong (it should not succeed).
    Conversely, if the connection generates a different error, we know that Connector/J
    is either not installed (not found on the `CLASSPATH`) or something else is wrong.
    Either way, we print the message for the exception so the user can determine a
    course of action to fix the issue.


    We place this logic inside the `main()` method. If Connector/J is installed, you
    should see an error message stating the user (`not_a_user`) cannot connect. Once
    again, any other error means either the URL path is invalid, or Connector/J is
    not installed. Listing 3-12 shows the completed code.


    ```

    //

    //  MySQL Database Service

    //

    // Chapter 03 - MySQL Test Connector/J

    //

    // This example tests installation of Connector/J by attempting to connect

    // to a MySQL server. Be sure to get the URL statement connect before

    // compiling and running the test.

    //

    // Dr. Charles Bell

    //

    // Imports

    import java.sql.Connection;

    import java.sql.DriverManager;

    import java.sql.SQLException;

    // Class

    public class MySQLTest {

    public static void main(String[] args) {

    // Connection parameters

    String url = "jdbc:mysql://localhost:3306/"

    + "plant_monitoring?useSSL=false";

    String user = "not_a_user";

    String password = "SECRET";

    // Attempt connection

    try (Connection con = DriverManager.getConnection(url, user,

    password)) {

    System.out.println("ERROR: Should not connect with "

    "''not_a_user''!");

    } catch (SQLException ex) {

    // Test to see if access denied error (expected).

    if (ex.getMessage().contains("Access denied")) {

    System.out.println("Success!");

    } else {

    // If Connector/J is not installed, print message.

    System.out.println("Connector/J is missing.");

    System.out.println(ex.getMessage());

    }

    }

    }

    }

    ```


    Listing 3-12: Test Connector/J Example'
