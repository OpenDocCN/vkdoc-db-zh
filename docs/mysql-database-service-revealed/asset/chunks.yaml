- fmt: '### Troubleshooting


    Oracle provides a comprehensive list of troubleshooting tips for all OCI products
    and services. This list is updated frequently as the products and services evolve
    and more innovations are found for helping customers with issues. For our purposes,
    there is a specific troubleshooting page for MDS at [`https://docs.oracle.com/en-us/iaas/mysql-database/doc/troubleshooting.xhtml`](https://docs.oracle.com/en-us/iaas/mysql-database/doc/troubleshooting.xhtml).
    Figure [10-9](#527055_1_En_10_Chapter.xhtml#Fig9) shows the MDS troubleshooting
    page.


    > **Tip**

    >

    > You may want to bookmark the MDS troubleshooting page for future reference.


    ![A screenshot displays the troubleshooting issues while working with MySQL. The
    hyperlink is listed on the right side. The Troubleshooting MySQL server option
    is highlighted.](images/527055_1_En_10_Chapter/527055_1_En_10_Fig9_HTML.png)

    *Figure 10-9: MDS Troubleshooting Page (Documentation)*


    You will find links to generic troubleshooting tips. However, notice in the center
    of the page is a link to the MySQL server troubleshooting page, which may be helpful
    if you have problems with MySQL unrelated to OCI.


    Now that we have a complete view of the online help and documentation available
    to us from Oracle, let’s discuss how to begin planning for migrating to MDS.


    ## Examine Your DB System Needs


    In this section, we will discuss the OCI-specific concepts and technologies that
    you must consider before planning your MDS solution. While you do not need to
    be concerned about the configuration of the MySQL server instance itself, since
    that is done for you by MDS, you must plan your databases with the same rigor
    you would for your on-prem MySQL servers. This planning will provide you vital
    information you will need for configuring your DB Systems.


    Recall, we discussed planning database needs briefly in Chapter [4](#527055_1_En_4_Chapter.xhtml)
    as we created our first DB System, but there is more to consider. For instance,
    each DB System has a shape (size of CPU, memory) as well as a data size (size
    of data storage). Also, networking must be considered with regard to how you will
    make your DB Systems accessible. The following sections discuss each of these
    topics.


    ### Shapes


    You should consider carefully what shape you need to use. Smaller shapes typically
    cost less, but there could be considerable issues trying to use a shape that has
    fewer CPU cores than you need. Similarly, you should consider carefully how much
    memory you need to use. Be sure to consult with your system administration planners
    to ensure you choose shapes with sufficient CPU cores and memory. Figure [10-10](#527055_1_En_10_Chapter.xhtml#Fig10)
    shows a partial list of the shapes available for DB Systems for the author’s experimental
    account. Notice there are shapes that have 1, 2, 4, 8, 16, etc., CPU cores and
    the memory increases accordingly.


    ![A table with 21 rows lists the shapes available for DB Systems. yes or no is
    displayed in the next column followed by shape numbers. memory increases based
    on these numbers.](images/527055_1_En_10_Chapter/527055_1_En_10_Fig10_HTML.png)

    *Figure 10-10: Shapes Available for DB Systems*


    The shapes listed are all virtual machines, but there are many more shapes you
    can choose from including those that support HeatWave and bare metal instances.
    Once again, generally speaking, the more cores and more memory the shape supports
    relates to the cost, but that is offset by the greater performance you gain from
    the “larger” shape. If performance is a concern, always aim for using a larger
    shape than what you consider would be minimal acceptance.


    See the heading, `Supported Shapes`, at the following link for more information
    about shapes. [`https://docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml`](https://docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml)


    ### Data Storage


    Similarly, the database storage size needs careful consideration. Like shapes,
    smaller data storage sizes cost less, but larger sizes are implemented with RAID
    striping for better performance. You can choose any size from 50 GB and up. Be
    sure to consider if you are planning any data migration involving uploading or
    expanding data so that you ensure you have enough room for the imported data.
    You can increase the size of the data storage at a later date, but it is always
    best to plan for more at the onset.


    See the section, `DB System Storage`, at the following link for more information
    about data storage options and considerations. [`https://docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml`](https://docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml)


    > **Tip**

    >

    > It is recommended to perform benchmark analysis during your testing to verify
    your environment’s configuration has adequate performance for your application’s
    requirements.


    ### Networking


    Recall that DB Systems are not accessible from the Internet. You will need to
    set up additional resources to bridge the networking gap such as Bastion Services,
    virtual private networks, Oracle FastConnect, or an intermediate compute instance.
    You should carefully consider these technologies when planning how you will incorporate
    your DB Systems into your applications.


    There are also several limitations to consider regarding networking. The following
    lists a few of the details you will need to consider when planning your networking
    connectivity:


    - Three IP addresses in each subnet are reserved for the networking service.

    - DB Systems without high availability require three IP addresses: (1) the DB
    System’s IP address, (2) compute instance, and (3) a separate IP address for MySQL
    server maintenance and upgrade tasks.

    - DB Systems with high availability will also require up to seven IP addresses:
    one for the DB System’s IP address, three for the compute instances hosting MySQL,
    and one for each MySQL server for maintenance and upgrade tasks.


    See [`https://docs.oracle.com/iaas/Content/Network/Concepts/overview.htm`](https://docs.oracle.com/iaas/Content/Network/Concepts/overview.htm)
    for more considerations for planning networking requirements.'
