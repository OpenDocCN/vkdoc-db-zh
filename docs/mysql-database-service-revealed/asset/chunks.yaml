- fmt: '## Connect to the DB System


    We are using the compute instance we created as a gateway to the DB System. Once
    you are logged into the compute instance, you can connect to the MySQL instance
    running on the DB System. We can use either the MySQL client (`mysql`) or MySQL
    Shell (`mysqlsh`).


    However, you have to install these packages on the compute instance first. The
    commands to do so are shown below. Note that you are using the `sudo` command
    since you will need elevated privileges to connect and the `opc` user account
    has permission to use `sudo`. Also, when you install these packages, you may see
    one or more dependent packages installed:


    ```

    $ sudo yum install mysql-shell

    $ sudo yum install mysql

    ```


    You can install these separately or install both with the following command:


    ```

    $ sudo yum install mysql-shell mysql

    ```


    Listing 4-2 shows an excerpt of installing the MySQL Shell. Installing the MySQL
    client (or both) will generate similar output with potentially other packages
    included.


