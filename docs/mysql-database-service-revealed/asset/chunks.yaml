    #### 创建预认证请求（PAR）


    预认证请求（PAR）是一种专属访问令牌，允许在限定时间内对存储桶进行访问（读取、读写、写入）。使用 OCI 控制台，导航到对象存储列表，打开名为`mysql-data-bucket`的存储桶的详细信息页面。在存储桶详细信息页面上，导航至资源菜单中的"预认证请求"，如图
    7-8 所示。


    ![](img/527055_1_En_7_Fig8_HTML.png)


    资源选项卡窗口，左侧选中了预认证请求。顶部是创建预认证请求的按钮，表格中没有找到任何项目。


