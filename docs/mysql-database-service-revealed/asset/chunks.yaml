    ### 使用堡垒主机网关


    第三种从 MDS 迁移数据的方法是使用一个堡垒主机网关将我们的 PC 直接连接到我们的数据库系统。回想一下，我们必须使用数据库系统的 IP 地址设置两个端口转发会话的堡垒主机服务：一个用于端口
    3306，另一个用于端口 33060。如果您尚未在上一节中设置堡垒主机服务，请参阅上面的 *设置堡垒主机服务* 和 *启动堡垒主机服务 SSH 会话* 部分以获取详细信息。


    请注意，如果您运行了前面的示例，您可能需要删除您创建的 `imported_data` 文件夹。'
- fmt: '#### Export Data Using MySQL Shell


    The next step is to run the `util.dumpInstance()` method to save the files to
    the local drive. In this case, we will use a different first parameter. Instead
    of passing in the bucket name and related parameters, we simply specify a folder
    (directory) to store the files and the same set of options as before. This is
    the same step we used in the last method, so we will show only the command used.
    If you are following along, you need not run this step again since the exported
    data should be on your PC. The command needed is shown below for clarity:


    ```

    util.dumpInstance("c:\\imported_data", {ocimds:true, compatibility: ["strip_restricted_grants",
    "strip_definers", "ignore_missing_pks", "skip_invalid_accounts"]})

    ```


    `Listing 7-23` shows the data export running on the compute instance connected
    via a Bastion gateway.


    ```

    MySQL  127.0.0.1:33060+ ssl  JS > util.dumpInstance("c:\\imported_data", {ocimds:true,
    compatibility: ["strip_restricted_grants", "strip_definers", "ignore_missing_pks",
    "skip_invalid_accounts"]})

    Acquiring global read lock

    Global read lock acquired

    Initializing - done

