  trans: '### 使用计算实例


    第二种从数据库系统导出数据的方法将使用一个计算实例作为中间存储。在这种情况下，我们只需在计算实例上执行导出，将文件放置在该系统上，然后复制到我们的本地 PC，最后在本地
    MySQL 服务器上消费这些数据。


    #### 使用 MySQL Shell 导出数据


    第一步是运行 `util.dumpInstance()` 方法，将文件保存到计算实例的本地驱动器。首先创建一个 SSH 会话以登录计算实例，然后创建一个名为
    `/home/opc/imported_data` 的文件夹，如下所示。创建完成后，使用 JavaScript 接口启动 MySQL Shell：


    ```

    $ mkdir /home/opc/imported_data

    ```


    接下来，像我们在迁移到 MDS 的示例中那样运行 `util.dumpInstance()` 方法，但将导出数据的位置指定为 `/home/opc/imported_data`。列表
    7-20 显示了导出运行的过程，为简洁起见省略了注释和警告。


    ```

    MySQL  10.0.1.226:33060+ ssl  JS > util.dumpInstance("/home/opc/imported_data",
    {ocimds:true, compatibility: ["strip_restricted_grants", "strip_definers", "ignore_missing_pks",
    "skip_invalid_accounts"]})

