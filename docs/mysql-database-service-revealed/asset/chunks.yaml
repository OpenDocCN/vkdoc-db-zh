- fmt: 'Like the incident emails, you will also see links to Oracle’s billing department
    should you need help and the email and phone number for someone you can contact.
    You can also find the details of your bill through the `OCI console` by clicking
    on your account icon in the upper-right corner and clicking `Analyze costs` under
    the `Usage` heading. This will present you with a dialog that you can use to see
    the cost incurred by day as well as a breakdown by service. Figure [10-3](#527055_1_En_10_Chapter.xhtml#Fig3)
    shows an example from one of my experimental accounts (that has had little activity).


    ![](images/527055_1_En_10_Chapter/527055_1_En_10_Fig3_HTML.png)


    An email was sent about the billing by Oracle. Customer name, account. transaction
    date, transaction number, transaction amount, reference number, and payment reference
    are listed.


    Figure 10-3: Example OCI Billing Email


    Figure [10-4](#527055_1_En_10_Chapter.xhtml#Fig4) shows an example of detailed
    billing for the same experimental account.


    ![](images/527055_1_En_10_Chapter/527055_1_En_10_Fig4_HTML.png)


    A bar chart depicts the cost versus the date from July 31 to August 19\. Legends
    are on the right side. A table with column names date, block storage, compute,
    my S Q L, object, and the total is below.


    Figure 10-4: Billing Usage (`OCI Console`)


    Notice you can manipulate the chart to show additional details or different views.
    The `Tab` dropdown control allows you to download the report as a `PDF`, comma-separated
    value (`CSV`) file, or just download the chart as an image. Those are nice touches
    your accounting personnel will appreciate.


    Now, let’s explore the documentation options for `OCI` and `MDS`.


    ### Documentation


    Oracle has provided documentation for all of `OCI` and `MDS` that you can access
    at a touch of your mouse. In the `OCI console`, you will notice a symbol with
    a question mark. This is the starting point for all of your documentation needs.
    At any point, you can click that icon and see a menu appear that will have content-specific
    links. For example, if you are working on a compute instance, you will see links
    for documentation for compute instance.


    ![](images/527055_1_En_10_Chapter/527055_1_En_10_Fig5_HTML.png)


    A menu with the documentation, how can you help today? chat, visit the support
    center, post questions, and submit feedback and Targeted help is displayed.


    Figure 10-5: Documentation Menu (`OCI Console`)


    Notice that you see links to specific tasks related to compute instances, which
    is very helpful when you want to learn how something works. Notice also you see
    links to support. You can open a chat window and talk to someone right away, go
    to the support center to do research on topics, post a question to the community
    forum, or submit feedback to support.


    There are also buttons at the bottom that will include specific targeted tasks.
    In this example, we see buttons for creating a support request (a formal support
    ticket) and increasing your service limit. Recall, the service limit refers to
    how many of certain objects or services your account is permitted to use at one
    time. If you run over your limit, you can visit this menu and submit a request
    for an extension.


    If you want general `OCI` documentation information, you can visit the main documentation
    at [`https://docs.oracle.com/en-us/iaas/Content/home.htm`](https://docs.oracle.com/en-us/iaas/Content/home.htm)
    for the complete documentation on `OCI`. Here you will see a multi-column menu
    that you can use to find documentation on all `OCI` products and services. When
    you click on the `MySQL Database` link, you will be directed to the top of the
    `MySQL` (`MDS`) documentation as shown in Figure [10-6](#527055_1_En_10_Chapter.xhtml#Fig6).
    From there, you can explore all of the topics for `MDS`.


    ![](images/527055_1_En_10_Chapter/527055_1_En_10_Fig6_HTML.jpg)


    A screenshot of My S Q L Database displays all the topics for M D S on the left
    side. The home page with getting started, related content, and more resources
    are displayed on the right side.


    Figure 10-6: `MDS` Documentation Home


    Notice at the bottom-right is a link to the `MySQL` documentation (for the server,
    `MySQL Shell`, etc.).


    > **Tip**

    >

    > You may want to bookmark the `MDS` documentation page for future reference.


    There is one more documentation item that could become critical for customers;
    the announcements page. On the `OCI console`, you will see a bell symbol. When
    you click on this, you will see the announcements page where you can monitor critical
    announcements about products and services you may use or be interested in as well
    as critical information about your account. Figure [10-7](#527055_1_En_10_Chapter.xhtml#Fig7)
    shows the main announcements page.


    ![](images/527055_1_En_10_Chapter/527055_1_En_10_Fig7_HTML.png)


    A window displays the announcement page of the Oracle. The announcement is displayed
    on the top, Highlights are at the center and all systems operational and help
    are at the bottom.


    Figure 10-7: Announcements Page (Overview)


    Notice you will see announcements from Oracle as well as highlights concerning
    any required actions, scheduled maintenance notices, or other notices. When any
    of these categories have entries, the small bell symbol on the `OCI console` will
    appear with a red dot to alert you to announcements.


    Notice the `Create an announcement subscription` button on the right. This allows
    you to create a subscription to watch for certain announcements. For example,
    you may want to create a subscription to watch for `ObjectStore` incidents if
    you plan to perform critical operations with `ObjectStore` buckets. You can view
    your subscriptions on the subscriptions page by clicking the `Subscriptions` link
    on the `Announcements` menu to the left.


    You can also receive details about any open incidents that may affect your account
    by clicking on the `Announcements` link under the `Announcements` menu on the
    left. This will open a view of the incidents related to your account including
    tools for setting date ranges to explore incidents in the past. Figure [10-8](#527055_1_En_10_Chapter.xhtml#Fig8)
    shows an example of this page that shows an incident that was resolved. Notice
    there is a link to the incident, which will open the details that you can review
    if you need more information.


    ![](images/527055_1_En_10_Chapter/527055_1_En_10_Fig8_HTML.png)


    A window to list the announcement details with the event start date, event end
    date, service, and platforms at the top. The resolved announcement is displayed
    at the bottom.


    Figure 10-8: Announcements Details


    Now that we know where the documentation is and the forms of communication Oracle
    uses to communicate, let’s examine a topic you may need at some point: troubleshooting.'
