    #### Stop/Start a DB System


    The next example shows how you can stop a DB System with the CLI. In this case,
    we need to use the `mysql db-system` command, pass the DB System OCID, and the
    `stop` operation. Listing [9-6](#527055_1_En_9_Chapter.xhtml#PC7) shows an example
    of this command.


    ```

    C:\>oci mysql db-system stop --db-system-id=ocid1.mysqldbsystem.MASKED --shutdown-type=fast

    {

    "opc-work-request-id": "ocid1.mysqlworkrequest.MASKED"

    }

    Listing 9-6

    Stopping a DB System

    ```


