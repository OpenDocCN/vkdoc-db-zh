  trans: '

    ## 什么是 Oracle 云基础设施？


    Oracle 云基础设施（Oracle Cloud Infrastructure，简称 OCI）旨在通过让您能够使 OCI 资源适应独特的业务需求并满足创新要求，从而改变您的云体验。OCI
    是一个自主、可扩展的云平台，专为广泛的企业工作负载而构建，从基本云系统（其核心组件驻留在 OCI 中）到原生云基础设施。更棒的是，借助 OCI，您可以像管理本地（也称为
    on-prem）基础设施实验室一样，控制和管理您的资源，包括安全性和监控。


    您将与之交互并用于构建基于云的基础设施的关键 IaaS 组件包括：


    *   **计算**：您可以从各种计算设备（可将服务器硬件和操作系统视为一个虚拟单元）中进行选择，从需要少量计算能力、内存的设备到需要更多计算能力（包括处理核心和更大内存）的设备。您还可以选择裸机计算资源，以确保获得更强的隔离性、更高的性能和一致性。这些构成了您自行构建的应用程序和中间件软件服务的基础。

    *   **存储**：与计算类似，您可以选择多种基于云的存储与计算资源配合使用。您可以从网络文件、对象、网络块、闪存、归档、数据库备份、数据传输甚至软件存储网关中进行选择。有了这么多选择，您一定能找到最适合您解决方案的存储机制。

    *   **网络**：您可以选择私有、安全的网络，使用虚拟专用网络（VPN），设置子网，扩展负载均衡等等。虚拟云网络资源使您能够创建高可用、安全的网络解决方案，以替代现有的昂贵本地硬件。凭借弹性特性，您无需在每次进行网络范围的更改时重写或重新配置软件。例如，当您替换或升级计算或存储资源时，只要网络地址不变，您就不需要过长的停机时间来重新配置。

    *   **边缘**：OCI 还提供资源来提供网络边缘服务，例如域名服务（DNS）。

    *   **容器**：还提供生产级和企业级资源，以高性能、高可用的方式运行基于容器的解决方案。

    *   **数据库**：除了预期的 Oracle 数据库资源系列外，OCI 还提供 PaaS MySQL 数据库解决方案。MySQL 数据库服务是您构建和集成解决方案的一站式资源，其中数据库服务器是关键组件。我们将在下一节中了解更多关于
    MySQL 数据库服务的信息。


    虽然此列表是 OCI 核心资源和功能的高层概述，但它还提供了更多功能，以及许多利用 OCI 来满足云计算需求的方式。图 1-2 展示了 OCI 功能和特性的类别摘要。


    ![](img/527055_1_En_1_Fig2_HTML.png)


    该图以表格形式分类和总结了 OCI 的能力与特性。


    **图 1-2** OCI 能力与特性（由[oracle.com](http://oracle.com)提供）


    > **提示**

    >

    > 有关 OCI 的更多信息，请访问 [`www.oracle.com/cloud/`](http://www.oracle.com/cloud/)。在那里您将看到图
    1-2，其中包含指向每个类别和特性更多信息的链接。


    OCI 提供了一个基于 Web 的控制台，允许您创建、配置和销毁资源。这很可能是您的默认访问机制。登录 OCI 帐户后，您将看到 OCI 控制台。


    我们将在下一章中了解更多关于 OCI 的信息，包括在探索如何设置我们的第一个 MySQL 数据库服务时，如何设置您的帐户。


    ## 什么是 MySQL 数据库服务？


    MySQL 数据库服务（MySQL Database Service，简称 MDS）是一种完全托管的 OCI 资源，作为原生服务运行。也就是说，它内置于 OCI
    核心组件中，因此完全集成到 OCI 架构中。MDS 继续由 Oracle 的同一 MySQL 工程团队开发、管理和支持。更棒的是，MDS 与本地 MySQL
    安装兼容，这意味着您无需更改应用程序即可从本地 MySQL 迁移到 MDS。


    简单地说，MDS 就是 MySQL。它并非为了看起来和感觉像 MySQL 而捆绑在一起的混合组件。虽然 MDS 使用的 MySQL 版本是企业版，但您无需购买许可证即可使用
    MDS。在许多方面，您使用 MDS 就像使用开源社区版一样。不同之处在于，您获得了所有的企业功能，只需支付很少的名义费用即可使用它！


    借助 MDS，您将获得与在本地运行 MySQL 相同的所有功能、成熟度、可靠性和性能。不同之处在于，OCI 允许自动化维护任务，例如升级、备份、数据库和操作系统修补等。您从这种负担中解放出来，使您可以完全专注于管理数据、架构设计和访问策略。因此，您花费更少的资金，却仍然能获得使用
    MySQL 作为数据库服务器的好处。


    实际上，OCI 中的 MDS 能带来以下好处：


    *   **快速置备**：使用针对生产部署优化的预配置设置创建 MySQL 实例。

    *   **自动化**：配置、升级、修补等全部自动化。

    *   **定制化**：通过从一系列配置中选择来定制您的 MDS 资源，这些配置将计算能力、内存和存储大小配对，使您可以限制这些资源的成本——只为所需付费。

    *   **安全存储**：选择经济高效的存储解决方案，范围从高性能的附加固态硬盘（SSD）到可靠、高性能的块卷，以及经济高效的归档存储。

    *   **快速网络**：创建配置为满足您隐私需求的虚拟云网络。

    *   **监控**：使用监控来优化您的应用程序，并快速响应需要更改以获得最佳性能的事件。

    *   **更少的资源投入**：迁移到 MDS 使您能够为对业务至关重要的任务和技能招聘和培训新的人力资源。


    随着我们了解更多关于 MDS 和 OCI 的信息，我们将看到其中大部分的更多细节。


    ### OCI 中的 MDS


    现在我们对 OCI 有了更多了解，我们应该讨论一些限制、术语以及使用 MDS 所需的 OCI 机制。我们暂时不会讨论如何设置和连接到 MDS。我们将在下一章介绍这些内容。相反，以下是一些您应该熟悉的内容，为您使用
    MDS 做准备。如果您已经在使用 OCI，其中一些内容您会很熟悉。


    #### 区域可用性


    OCI 中的区域是一个本地化的地理区域，通常由该区域内的 OCI 数据中心提供服务。MDS 在大多数区域可用，但在新区域部署后可能不会立即可用。请与您的 Oracle
    客户经理确认 MDS 在您的区域是否可用。


    #### 所需的身份和访问管理策略


    对 OCI 服务的访问受另一个 OCI 资源——身份和访问管理（`IAM`）的控制，该资源用于所有身份验证和授权，包括通过控制台、SDK 或 CLI 以及
    REST API 进行的访问。为了使用 MDS，您的 OCI 管理员需要设置`IAM`以允许访问 MDS 资源。

    '
- fmt: '## Data Security


    MDS uses encryption to protect your data. Under the hood, MDS uses a storage mechanism
    called a block volume, which is always encrypted. MDS also supports encryption
    between MDS and clients using Transport Layer Security (TLS). By default, MDS
    applications attempt to connect using encryption.


    ## MDS and Audit Service


    MDS integrates with the OCI Audit Service to allow you to perform auditing on
    your database servers for access and other goals.


    ## MDS Versions and Storage Engines


    MDS is built with `MySQL Enterprise Edition` version 8.0 and uses the `InnoDB
    Storage Engine` exclusively. `MySQL Enterprise Edition` offers a host of enterprise-grade
    features including auditing, external authentication modules to easily integrate
    MySQL with security infrastructures via Pluggable Authentication Modules ("PAM")
    or native Windows services, transparent data encryption (TDE), enhanced encryption
    and other cryptographic features, and firewall features to against cyber security
    threats.


    ## Shape


    MDS is configured to choose from a list of configurations for the compute resource
    that describes the size of the compute, memory, and storage. These are called
    shapes. When you provision (create) an MDS, you choose from a list of shapes that
    best meets your needs.


    **Tip**


    For more information about MDS, visit the online document [`https://docs.oracle.com/en-us/iaas/mysql-database/doc/overview-mysql-database-service.xhtml`](https://docs.oracle.com/en-us/iaas/mysql-database/doc/overview-mysql-database-service.xhtml).


    ## DB System


    An MDS DB System (sometimes called `dbSystem`) is a logical unit or container
    for the MySQL server instance. Its primary purpose is to facilitate provisioning,
    backup, restore, monitoring, termination, etc., for the MDS. The DB System container
    consists of these components. Except for the intersection with the user interface
    (such as the OCI console), this list should be considered informational since
    you cannot interact directly with some of the components:


    *   `Compute`: Also called the compute instance, it is an OCI compute resource
    configured with a shape selected at creation.

    *   `Operating System`: The operating system, while considered separate from the
    compute, which is a virtual machine, is predefined with Oracle Enterprise Linux.

    *   `MySQL Server Enterprise Edition`: An MDS is configured with latest release
    of version 8.0 in the MySQL product line.

    *   `Virtual Network Interface Card (VNIC)`: Attaches the DB System to a subnet
    of the Virtual Cloud Network (VCN).

    *   `Network-Attached Block Storage`: MDS uses the high-performance options for
    all block storage. Depending on the size of the storage in the shape chosen, the
    storage may consist of multiple block volumes in a group setup for high-performance
    access.


    While this list may seem like a lot to configure and set up, the DB System container
    is optimized for rapid deployment (creation and provisioning) of the components.
    In fact, the operating system and MySQL are preconfigured as a special image that
    is loaded when an MDS is configured.


    **Tip**


    For a complete description of a DB System including all of the details about how
    MySQL is configured, see [`https://docs.oracle.com/en-us/iaas/mysql-database/doc/db-systems.xhtml`](https://docs.oracle.com/en-us/iaas/mysql-database/doc/db-systems.xhtml).


    ## MySQL HeatWave


    One of the biggest and most exciting features of MDS is actually a separate product.
    `MySQL HeatWave` is built on MDS. `HeatWave` provides a high-performance in-memory
    analytical processing engine that has been optimized to run on OCI.


    You run `HeatWave` using your data stored in MDS without requiring expensive data
    migrations, intermediary systems, or any change to the application. Your applications
    can connect to and interact with `HeatWave` using the normal MySQL communication
    protocols (think same application). Like MDS itself, all of the typical administrative
    and maintenance operations are automated. You can also manage your `HeatWave`
    instances using the same OCI Web Console, REST API, CLI, or DevOps tools.


    While all that sounds great, the most important aspect of `HeatWave` is your queries
    can achieve orders of magnitude acceleration over the MySQL database permitting
    you to form complex and fast online transaction processing and online analytical
    processing operations using the same database storage as your applications. We’ll
    learn more about `HeatWave` in Chapter [8](#527055_1_En_8_Chapter.xhtml).


    To help us understand how we may leverage MDS in your infrastructure, let’s look
    at the use cases for MDS.


    ### Use Cases


    There are many use cases for MDS. Indeed, most use cases you already know for
    MySQL are applicable to MDS. However, there are a few unique to MDS in OCI. The
    following lists a few of the more significant use cases:


    *   `Migrate Workloads`: You can move your most intensive or even all of your
    MySQL workloads to OCI allowing you to free up resources and focus on the more
    important goals of your business.

    *   `Develop Cloud Applications`: You can improve and grow your applications into
    cloud-native MySQL-based applications more quickly and eliminate many of the burdens
    in developing infrastructure from the ground up.

    *   `Deployment Flexibility`: Since MDS is completely compatible with on-prem
    MySQL, you have flexibility in deploying some or all of your MySQL servers to
    OCI.

    *   `SaaS Applications`: Since MySQL is the database of choice for many SaaS products,
    you can build and scale your SaaS applications to OCI.


    However, there are some limitations to what you can do with MDS in OCI.


    ### Limitations


    While we expect to be able to use all MySQL features in MDS, there are some that
    are unsupported either because they are not applicable to a cloud environment,
    have not been adapted for use in OCI, or they need additional features for use
    in OCI. The following are currently unsupported in MDS:


    *   Authentication plugin

    *   Modification of system tables

    *   Binary log access

    *   Error logging to the system log

    *   Group replication plugin

    *   InnoDB tablespace encryption

    *   Password strength plugin

    *   Setting global variables

    *   Persisted system variables

    *   Replication filters

    *   Semi-synchronous replication

    *   Transportable tablespace


    If you are currently planning to use one or more of these MySQL features, check
    the online DB System documentation for more details before you try to use them.
    You may also want to see [`https://docs.oracle.com/en-us/iaas/mysql-database/doc/db-systems.xhtml#GUID-DAF5136C-C602-434E-8EBB-E1AFA57F0BB7`](https://docs.oracle.com/en-us/iaas/mysql-database/doc/db-systems.xhtml%2523GUID-DAF5136C-C602-434E-8EBB-E1AFA57F0BB7)
    for a complete list of the limitations in MDS including limitations on existing
    features.'
