    ## 为计算实例添加块存储


    由于默认的启动卷是 50 GB，对于存储任何大型应用程序甚至数据来说可能都太小了。毕竟，启动卷旨在用于存储系统应用程序等，而不是用户应用程序。幸运的是，我们可以轻松地为计算实例添加一个块卷，用于我们的应用程序和数据目的。


    添加块卷的过程比我们目前所见的简单点击式界面要复杂一些。简而言之，我们需要执行以下操作：

    - 创建一个块卷

    - 将块卷附加到计算实例

    - 在计算实例上连接块卷

    - 在计算实例上格式化并挂载块卷


    要创建块卷，请打开云控制台菜单并选择 *存储*，然后选择 *块卷*，如**图 2-35**所示。但是，这次，右键单击 *块卷* 标签并在新标签页中打开选项。我们需要同时看到计算实例详情和块卷页面。


    **图 2-35** 块卷（主菜单）

    ![](img/527055_1_En_2_Fig35_HTML.jpg)

    一个突出显示了存储的 Oracle 云主菜单。存储菜单在右侧打开，块卷被一个用于选择的矩形框突出显示。


    在块卷页面上，你需要使用左侧的筛选控件来选择 compartment，如**图 2-36**所示。选择我们之前创建的 `oci-tutorial-compartment`。


    **图 2-36** 设置列表范围（块卷页面）

    ![](img/527055_1_En_2_Fig36_HTML.jpg)

    一个列表范围的菜单。下方有 compartment 选项，并显示了可选的 compartment 名称。其中 Oci-tutorial-compartment
    被选中。


    接下来，单击实例列表中的 *创建块卷* 按钮，如**图 2-37**所示。这将启动创建实例对话框。


    **图 2-37** 块卷列表 (`oci-tutorial-compartment`)

    ![](img/527055_1_En_2_Fig37_HTML.png)

    一个列出块卷的表格。它有 3 行 10 列。块卷列表中未添加任何项目。


    当你单击 *创建块卷* 按钮时，你将看到创建块卷对话框。表单顶部是块卷名称的输入框。如果你正在跟随操作，请使用 `oci-tutorial-block-volume-1`
    作为名称。你还应该看到为 compartment 选择了 `oci-tutorial-compartment`。


    下方是选择可用性域的区域。这是可能出错的地方。如果你选择的可用性域与你的计算实例不同，你将无法将块卷附加到你的计算实例。


    返回计算实例详情页面，找到 *常规信息* 标签下方的可用性域。务必记下使用的是哪个可用性域，并在创建块卷对话框中选择相同的可用性域。在本教程中，我们使用了
    `AD-2` 可用性域（具体拼写可能因你所在的区域而异）。


    你可以将块卷大小保留为默认值（50 GB）。


    当你准备好后，单击 *创建块卷* 按钮，如**图 2-38**所示。


    **图 2-38** 创建块卷对话框

    ![](img/527055_1_En_2_Fig38_HTML.png)

    一个用于创建块卷的窗口，包含名称、compartment 和可用性域详细信息。卷大小和性能选项默认被选中，提供了详细信息。


    与计算实例类似，你将被定向到块卷详情页面，在那里你可以观察块卷的配置过程。当它准备就绪时，状态将变为带有绿色背景的 `可用`，如**图 2-39**所示。


    ![](img/527055_1_En_2_Fig39_HTML.png)

