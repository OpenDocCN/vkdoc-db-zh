    ```\n清单 3-13 MySQL 连接与查询示例\n\n输入代码后，你可以编译并执行它以查看结果，如下所示：\n\n**提示**\n确保你的 MySQL\
    \ 服务器正在运行，并且你在连接参数中提供了正确的密码和主机名。\n\n```\n% javac MySQLConnect.java\n% java MySQLConnect\n\
    animals\ngreenhouse\ninformation_schema\nmysql\nperformance_schema\nplant_monitoring\n\
    sakila\nsys\nworld\nworld_x\n```\n\n根据你安装或创建的示例数据库或其他数据库，你的结果可能不同，但至少应该看到 `plant_monitoring`、`mysql`、`information_schema`\
    \ 和 `performance_schema`。\n\n如果遇到如下错误，请务必检查你的连接参数，确保使用了正确的主机名（或 IP 地址）、端口、用户和密码。\n\
    \n```\nError: 1045 (28000): Access denied for user 'root'@'localhost' (using password:\
    \ YES)\n```\n\n现在让我们看看如何插入数据。\n\n## 示例 2：插入数据\n\n现在让我们看看如何向表中插入一些数据。我们将此示例代码命名为\
    \ `mysql_insert.py`。\n\n在这种情况下，我们只是想从文件中读取数据并将其插入表中。我们将使用与之前示例相同的代码连接到服务器并执行查询。不同之处在于，我们将使用文件以逗号分隔值格式（`.csv`）读取样本数据。这是一种在各种应用程序中常用的格式。\n\
    \n对于文件中的每一行，我们解码字段，然后使用列中的数据构建一个 `INSERT` 命令。我们将再次使用游标类的 `execute()` 方法来执行插入数据的查询。由于没有结果，我们不获取任何内容。但是，在完成行插入后，我们必须调用游标类的\
    \ `commit()` 方法来提交更改。清单 3-14 展示了此示例的完整代码。花点时间阅读一下以明确其逻辑。\n\n```\n//\n//  MySQL\
    \ Database Service\n//\n// Chapter 03 - MySQL Insert\n//\n// This example attempts\
    \ to connect to a MySQL server, read rows from a file\n// and insert data into\
    \ a table.\n//\n// Dr. Charles Bell\n//\n// Imports\nimport java.io.File;\nimport\
    \ java.sql.Connection;\nimport java.sql.DriverManager;\nimport java.sql.SQLException;\n\
    import java.sql.Statement;\nimport java.util.logging.Level;\nimport java.util.logging.Logger;\n\
    import java.util.Scanner;\npublic class MySQLInsert {\n    public static void\
    \ main(String[] args) {\n        String url = \"jdbc:mysql://localhost:3306/plant_monitoring?useSSL=false\"\
    ;\n        String user = \"root\";\n        String password = \"SECRET\";\n  \
    \      try (Connection con = DriverManager.getConnection(url, user, password);\n\
    \            Statement st = con.createStatement()) {\n            // Open the\
    \ file and read all rows inserting them.\n            try {\n                File\
    \ myObj = new File(\"plants_data.txt\");\n                Scanner myReader = new\
    \ Scanner(myObj);\n                while (myReader.hasNextLine()) {\n        \
    \            String data = myReader.nextLine();\n                    String cols[]\
    \ = data.split(\",\");\n                    String sql = \"INSERT INTO plant_monitoring.plants\
    \ (name, \"\n                        + \"location, climate) VALUES ('\" + cols[0]\n\
    \                        + \"','\" + cols[1] + \"',\" + cols[2] + \");\";\n  \
    \                  System.out.println(sql);\n                    st.executeUpdate(sql);\n\
    \                }\n                myReader.close();\n            } catch (Exception\
    \ e) {\n                System.out.println(\"An error occurred.\");\n        \
    \        e.printStackTrace();\n            }\n        } catch (SQLException ex)\
    \ {\n            Logger lgr = Logger.getLogger(MySQLInsert.class.getName());\n\
    \            lgr.log(Level.SEVERE, ex.getMessage(), ex);\n        }\n    }\n}\n\
    ```\n清单 3-14 MySQL 插入数据示例\n\n我们读取的文件只有几行，是植物监测系统示例的模拟数据。以下是文件内容。请注意，我将其标记为 `plants_data.txt`。如果更改文件名，请务必相应地修改代码：\n\
    \n```\nJerusalem Cherry,deck,2\nMoses in the Cradle,patio,2\nPeace Lilly,porch,1\n\
    Thanksgiving Cactus,porch,1\nAfrican Violet,porch,1\n```\n\n回想一下，如果你想在运行完上面的 Python\
    \ 示例后运行此示例，或者你想重新运行示例，你应该在两次执行之间运行以下命令来清空表：\n\n```\n% mysqlsh -uroot -p --sql\
    \ -e \"DELETE FROM plant_monitoring.plants\" --table\n```\n\n要编译并执行代码，请从存储文件的文件夹中发出以下命令。首先确保数据文件在同一文件夹中。我展示了运行代码的结果：\n\
    \n```\n% javac MySQLInsert.java\n% java MySQLInsert\nINSERT INTO plant_monitoring.plants\
    \ (name, location, climate) VALUES ('Jerusalem Cherry','deck',2);\nINSERT INTO\
    \ plant_monitoring.plants (name, location, climate) VALUES ('Moses in the Cradle','patio',2);\n\
    INSERT INTO plant_monitoring.plants (name, location, climate) VALUES ('Peace Lilly','porch',1);\n\
    INSERT INTO plant_monitoring.plants (name, location, climate) VALUES ('Thanksgiving\
    \ Cactus','porch',1);\nINSERT INTO plant_monitoring.plants (name, location, climate)\
    \ VALUES ('African Violet','porch',1);\n```\n"
