    部分来创建一个读取 PAR，以便我们可以在本地 MySQL 服务器上使用它来导入数据。


    请记住，务必复制 PAR 并将其粘贴到文件中妥善保存。同时请记住，尽管它在有限的时间段内有效，但它应像任何其他安全访问令牌一样受到保护。


