    ## Summary


    Point-in-time recovery is one of those features, like automated backups, which
    can increase your ability to recover from data disasters and reduce your risk
    of data loss. PITR in MDS is automated and easy to set up. Recovery using PITR
    for your DB System is also easy to accomplish and works without any need to record
    complex system parameters or process binary log files. Once you’ve had a chance
    to use the feature and in the unlikely event you rely upon it to restore your
    systems to operation, you will appreciate the work Oracle has done to make a complex
    task simple in execution for DB Systems owners.


    In the next chapter, we will learn about the options available to import and export
    your data to or from your MDS DB Systems.


    # 7. Data Import and Export


    The DB System in MDS is clearly a very powerful and intriguing alternative to
    on-prem MySQL servers. We’ve seen how to create DB Systems and create backups,
    but what do you do when you want to get your own data into your new DB System?
    Or, if you want to use a copy of the data in your DB System to an on-prem development
    lab, how do you export the data?


    Fortunately, there are methods for exporting your data and importing it to your
    DB System. As you will see, the process isn’t complicated and works well for most
    use cases. However, if your data is very large and you have many gigabytes or
    terabytes of data, you may want to consider contacting Oracle’s MySQL Sales team
    for more options for importing your data.


    In this chapter, we will discover several ways we can migrate data to/from the
    cloud. But first, let’s look at some of the concepts, strategies, and tools.


    ## Overview


    Oracle has ensured you don’t have to start from nothing to populate your DB System.
    You can indeed copy your data from a local MySQL server to a DB System. Oracle
    uses several terms in the documentation including migrating and importing data.
    However, the process of copying your data to the cloud is called migrating while
    the operations for performing the migration are two processes named export and
    import.


    In this section, we will see an overview of the tools and processes used for migrating
    data from your on-prem MySQL server to your DB System in MDS.


    ### Migrating Data to MDS


    The recommended process to migrate your data into MDS involves the use of the
    MySQL Shell to first export your data using one of several strategies for getting
    the exported data to your DB System and then import the data using MySQL Shell.
    We will see the strategies for getting the data to your DB System in the next
    section.


    MySQL Shell has several methods (also called utilities) for exporting data and
    one for importing data. These methods are found in the Java module named `util`,
    which is included as part of the MySQL Shell. To use the methods, you must be
    in the JavaScript mode. We can set the mode when we start MySQL Shell with the
    `--js` option or you can switch to JavaScript while in the shell with the `/js`
    shell command. When you start the shell in JavaScript mode or switch to the mode,
    you should see a prompt like the following:


    ```

    MySQL  localhost:33060+ ssl  JS >

    ```


    Note


    We saw the MySQL Shell in Chapter [3](#527055_1_En_3_Chapter.xhtml) and if you
    have been following along with the examples in the book, you should have MySQL
    Shell installed. If not, visit the documentation at [`https://dev.mysql.com/doc/mysql-shell/8.0/en/`](https://dev.mysql.com/doc/mysql-shell/8.0/en/)
    for how to download and install the MySQL Shell.


    The following briefly describes the methods for importing and exporting data.
    We list the required and option parameters (shown in square brackets). While these
    appear to be JavaScript methods (and they are), they execute a utility under the
    hood. Hence, Oracle calls these methods “utilities”:


    *   `util.dumpInstance(outputUrl[, options])`: Use this utility to export all
    compatible databases (schemas) from the MySQL server. By default, the utility
    exports users, events, routines, and triggers.


    *   `util.dumpSchemas(schemas, outputUrl[, options])`: Use this utility to export
    a list of databases (schemas) from the MySQL server. Thus, you can use this to
    export one database (schema) at-a-time or export a portion of your databases for
    migrating to MDS.


    *   `util.loadDump()`: Use this utility to import the files from the `dump*()`
    methods.


    This is a partial list of the utilities available in MySQL Shell. For a complete
    list of utilities, see [`https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-utilities.xhtml`](https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-utilities.xhtml).
    The documentation includes a section devoted to the dumping (exporting) data utilities.
    We will see some of these utilities in action in a later section. But first, we
    must discuss the strategies for getting the exported data to your DB System for
    import.


    Tip


    See [`https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-utilities-dump-instance-schema.xhtml`](https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-utilities-dump-instance-schema.xhtml)
    for more information about using the `dumpInstance()` method.'
