- fmt: '#### Networking Services


    Perhaps the most important core service is the networking services. Like other
    resources, networking services are virtualized. This means the traditional hardware/software
    components such as networks, subnets, routing, gateways, and similar building
    blocks of traditional, hardware-based networks are presented as resources that
    you can create and use with other resources to permit network connectivity.


    This virtual networking component concept is sometimes called `software-defined
    networking (SDN)`. Thus, cloud-based resources connect to these virtual networking
    components are also `SDN`-enabled infrastructure that lets you create and terminate
    your `virtual cloud networks (VCNs)`, organize them into `subnets`, and use them
    with your compute instances and other cloud resources. OCI networking resources
    include the following. We will only touch on the high-level concepts in this section
    and more details when we see a tutorial on creating networking resources:


    *   Virtual cloud networks and their subnets

    *   Reserved public IP addresses

    *   Security lists and security rules

    *   Gateways

    *   Route tables and rules

    *   Load balancers

    *   `DNS` zones

    *   Web Application Firewall (`WAF`) policies


    Tip


    For more information about the OCI networking services and resources, see [`https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/landing.htm#top`](https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/landing.htm%2523top).


    When working with OCI networking, you typically start with creating a `virtual
    cloud network (VCN)` and assigning a range of private internet protocol (`IP`)
    addresses for use in the network. You can create multiple `VCNs` and can configure
    them to be accessible via the Internet (or not), as well as cloud-specific (isolated)
    and inter-connected networks. You can also organize your `VCNs` into `subnets`;
    a logical subdivision of the networking addresses. `Subnets` in this case are
    the same concept as hardware networking subnets.


    When you create resources that require network connections such as compute instances
    must be assigned to one or more `subnets` through a cloud resource called a `virtual
    network interface card (vNIC)`. A `vNIC` attached to a public `subnet` can have
    a public `IP` address assigned which permits access from the Internet.


    Interestingly, OCI uses a pool of public `IP` addresses assigned dynamically.
    When a `vNIC` requests a public `IP` address, it is assigned from the pool. When
    the resource is terminated, the public `IP` address is returned to the pool. This
    is another example of the elasticity of cloud services. However, if you need a
    permanent public `IP` address, you can request a reserved public `IP` address
    that is allocated to your cloud account (there may be a fee involved too).


    You can also create a `security list` that stores rules for adding a layer of
    a software firewall to block or permit access to your resources. It works like
    a port and address filter permitting only those connects that meet the security
    permission lists.


    Similarly, you can create `route rules`, which are used to control `VCN` outbound
    communication to permit packets to be moved to the next stop (hop) in the network.
    Routing rules are associated with `gateway` resources.


    The hard work for networking in the cloud is the same as hardware-based networking.
    You must carefully choose the resources you need along with selecting the correct
    set of rules to make it all work correctly to permit only the desired traffic
    to and from the `subnets`. Fortunately, OCI provides a wizard we can use to automate
    some of the more common configurations.


    #### Compute Services


    Compute services are those resources that represent computing hardware such as
    servers that run applications or services. Recall, we use the term `compute instance`
    to refer to a provisioned compute resource.


    When you provision a `compute instance`, you can choose from a wide variety of
    options including the type of machine (bare metal, virtual machine, etc.) as well
    as a set of performance settings (called a `shape`) that lets you tailor the compute
    instance to your capacity and performance needs.


    #### Storage Services


    These services are the disk and data storage resources provided by OCI. You have
    several choices of data storage resources that you can use to tailor to your data
    workload. These include resources with characteristics such as persistent/non-persistent,
    data type, performance of read/write input/output operations per second (`IOPS`),
    throughput, durability, connectivity, storage interface protocol, capacity, and
    more.


    Like compute instances, you have many options you can use to tailor your storage
    to your business needs. The following sections briefly describe the more common
    choices you have for storage in OCI.


    ##### Block Volume


    A virtualized hard disk. `Block volumes` are disks that provide persistent storage
    for compute instances. They are, like most resources, virtual meaning you can
    detach and reattach them (using another virtual resource called `block volume
    attachment`) among different compute instances (one compute instance at a time)
    with no loss of data.


    `Block volumes` are used the same way you would a hard drive on your PC. You simply
    read and write data from/to the disk or install your applications as well. You
    can choose from a `boot volume`, which is used by compute instances where the
    image is written (think operating system), or `block volume` which is used for
    data. `Block volumes` are persistent and durable. You can choose from basic, balanced,
    and high-performance varieties that define performance characteristics.


    ##### Local NVMe


    A virtualized memory drive (like an `SSD`). Like `block volumes`, these can be
    attached as block storage but is nonpersistent and nondurable. These are used
    mainly for applications that require high-performance local storage without the
    need for long-term storage.


    ##### File Storage


    A distributed file system that you can attach to a compute instance and use as
    if it were a local drive. Commonly used as a shared file system storage and file
    storage is persistent and highly durable.


    ##### Object Storage


    Unlike `block volumes`, `object storage` is a different architecture designed
    to store data as objects. Thus, storage is optimized for object-level access rather
    than individual file access like `block volumes`, so you would not use `object
    storage` to read/write your data files.


    Data objects are stored in `buckets`, which is a special container you create
    to place your data objects. Each `bucket` can contain an unlimited number of data
    objects. However, data objects can be of any type up to 50 GB in size.


    You can choose between two tiers: standard object storage, which is life and accessible
    (sometimes called hot), or archive storage, which is archived when not used (sometimes
    called cold) and must be made available when you want to use it.


    `Object storage` is also not something you would attach directly to a compute
    instance. Rather, you use `object storage` to copy data to object store. Use cases
    for `object storage` include backing up data, sharing files, and unstructured
    data storage such as logs.'
  raw: '#### Networking Services


    Perhaps the most important core service is the networking services. Like other
    resources, networking services are virtualized. This means the traditional hardware/software
    components such as networks, subnets, routing, gateways, and similar building
    blocks of traditional, hardware-based networks are presented as resources that
    you can create and use with other resources to permit network connectivity.


    This virtual networking component concept is sometimes called software-defined
    networking (SDN). Thus, cloud-based resources connect to these virtual networking
    components are also SDN-enabled infrastructure that lets you create and terminate
    your virtual cloud networks (VCNs), organize them into subnets, and use them with
    your compute instances and other cloud resources. OCI networking resources include
    the following. We will only touch on the high-level concepts in this section and
    more details when we see a tutorial on creating networking resources:


    *   Virtual cloud networks and their subnets


    *   Reserved public IP addresses


    *   Security lists and security rules


    *   Gateways


    *   Route tables and rules


    *   Load balancers


    *   DNS zones


    *   Web Application Firewall (WAF) policies


    Tip


    For more information about the OCI networking services and resources, see [`https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/landing.htm#top`](https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/landing.htm%2523top).


    When working with OCI networking, you typically start with creating a virtual
    cloud network (VNC) and assigning a range of private internet protocol (IP) addresses
    for use in the network. You can create multiple VCNs and can configure them to
    be accessible via the Internet (or not), as well as cloud-specific (isolated)
    and inter-connected networks. You can also organize your VCNs into subnets; a
    logical subdivision of the networking addresses. Subnets in this case are the
    same concept as hardware networking subnets.


    When you create resources that require network connections such as compute instances
    must be assigned to one or more subnets through a cloud resource called a virtual
    network interface card (vNIC). A vNIC attached to a public subnet can have a public
    IP address assigned which permits access from the Internet.


    Interestingly, OCI uses a pool of public IP addresses assigned dynamically. When
    a vNIC requests a public IP address, it is assigned from the pool. When the resource
    is terminated, the public IP address is returned to the pool. This is another
    example of the elasticity of cloud services. However, if you need a permanent
    public IP address, you can request a reserved public IP address that is allocated
    to your cloud account (there may be a fee involved too).


    You can also create a security list that stores rules for adding a layer of a
    software firewall to block or permit access to your resources. It works like a
    port and address filter permitting only those connects that meet the security
    permission lists.


    Similarly, you can create route rules, which are used to control VCN outbound
    communication to permit packets to be moved to the next stop (hop) in the network.
    Routing rules are associated with gateway resources.


    The hard work for networking in the cloud is the same as hardware-based networking.
    You must carefully choose the resources you need along with selecting the correct
    set of rules to make it all work correctly to permit only the desired traffic
    to and from the subnets. Fortunately, OCI provides a wizard we can use to automate
    some of the more common configurations.


    #### Compute Services


    Compute services are those resources that represent computing hardware such as
    servers that run applications or services. Recall, we use the term compute instance
    to refer to a provisioned compute resource.


    When you provision a compute instance, you can choose from a wide variety of options
    including the type of machine (bare metal, virtual machine, etc.) as well as a
    set of performance settings (called a shape) that lets you tailor the compute
    instance to your capacity and performance needs.


    #### Storage Services


    These services are the disk and data storage resources provided by OCI. You have
    several choices of data storage resources that you can use to tailor to your data
    workload. These include resources with characteristics such as persistent/non-persistent,
    data type, performance of read/write input/output operations per second (IOPS),
    throughput, durability, connectivity, storage interface protocol, capacity, and
    more.


    Like compute instances, you have many options you can use to tailor your storage
    to your business needs. The following sections briefly describe the more common
    choices you have for storage in OCI.


    ##### Block Volume


    A virtualized hard disk. Block volumes are disks that provide persistent storage
    for compute instances. They are, like most resources, virtual meaning you can
    detach and reattach them (using another virtual resource called block volume attachment)
    among different compute instances (one compute instance at a time) with no loss
    of data.


    Block volumes are used the same way you would a hard drive on your PC. You simply
    read and write data from/to the disk or install your applications as well. You
    can choose from a boot volume, which is used by compute instances where the image
    is written (think operating system), or block volume which is used for data. Block
    volumes are persistent and durable. You can choose from basic, balanced, and high-performance
    varieties that define performance characteristics.


    ##### Local NVMe


    A virtualized memory drive (like an SSD). Like block volumes, these can be attached
    as block storage but is nonpersistent and nondurable. These are used mainly for
    applications that require high-performance local storage without the need for
    long-term storage.


    ##### File Storage


    A distributed file system that you can attach to a compute instance and use as
    if it were a local drive. Commonly used as a shared file system storage and file
    storage is persistent and highly durable.


    ##### Object Storage


    Unlike block volumes, object storage is a different architecture designed to store
    data as objects. Thus, storage is optimized for object-level access rather than
    individual file access like block volumes, so you would not use object storage
    to read/write your data files.


    Data objects are stored in buckets, which is a special container you create to
    place your data objects. Each bucket can contain an unlimited number of data objects.
    However, data objects can be of any type up to 50 GB in size.


    You can choose between two tiers: standard object storage, which is life and accessible
    (sometimes called hot), or archive storage, which is archived when not used (sometimes
    called cold) and must be made available when you want to use it.


    Object storage is also not something you would attach directly to a compute instance.
    Rather, you use object storage to copy data to object store. Use cases for object
    storage include backing up data, sharing files, and unstructured data storage
    such as logs.'
  trans: '

    #### 网络服务


    或许最重要的核心服务是网络服务。与其他资源一样，网络服务也是虚拟化的。这意味着传统的硬件/软件组件，例如网络、子网、路由、网关以及基于硬件的传统网络的类似构建模块，都以资源的形式呈现，您可以创建这些资源并与其他资源一起使用，以实现网络连通性。


    这种虚拟网络组件的概念有时被称为 `软件定义网络（SDN）`。因此，连接到这些虚拟网络组件的云端资源也是启用了 `SDN` 的基础设施，使您可以创建和终止您的
    `虚拟云网络（VCN）`，将它们组织成 `子网`，并与您的计算实例和其他云资源一起使用。OCI 网络资源包括以下内容。本节我们仅涉及高层次概念，当我们在创建网络资源的教程中看到时，会提供更多细节：


    *   虚拟云网络及其子网

    *   预留的公共 IP 地址

    *   安全列表和安全规则

    *   网关

    *   路由表和规则

    *   负载均衡器

    *   `DNS` 区域

    *   Web 应用程序防火墙（`WAF`）策略


    提示


    有关 OCI 网络服务和资源的更多信息，请参阅 [`https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/landing.htm#top`](https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/landing.htm#top)。


    在使用 OCI 网络时，您通常从创建一个 `虚拟云网络（VCN）` 开始，并为其分配一个私有互联网协议（`IP`）地址范围供网络内使用。您可以创建多个 `VCN`，并可将它们配置为可通过互联网访问（或不可访问），以及云专属的（隔离的）和互连的网络。您还可以将您的
    `VCN` 组织成 `子网`；这是网络地址的一个逻辑细分。此处的 `子网` 与硬件网络子网的概念相同。


    当您创建需要网络连接的资源（例如计算实例）时，必须通过一个称为 `虚拟网络接口卡（vNIC）` 的云资源将它们分配到一个或多个 `子网`。连接到公共 `子网`
    的 `vNIC` 可以被分配一个公共 `IP` 地址，从而允许从互联网访问。


    有趣的是，OCI 使用一个动态分配的公共 `IP` 地址池。当 `vNIC` 请求公共 `IP` 地址时，它会从池中分配一个。当资源被终止时，该公共 `IP`
    地址会返回到池中。这是云服务弹性的另一个例子。但是，如果您需要一个永久的公共 `IP` 地址，您可以申请一个预留的公共 `IP` 地址，该地址会分配到您的云账户（这可能也涉及费用）。


    您还可以创建一个 `安全列表`，其中存储用于添加一层软件防火墙的规则，以阻止或允许访问您的资源。它的工作方式类似于端口和地址过滤器，只允许那些符合安全权限列表的连接。


    类似地，您可以创建 `路由规则`，用于控制 `VCN` 的出站通信，允许数据包移动到网络中的下一跳（hop）。路由规则与 `网关` 资源相关联。


    云端的网络工作与基于硬件的网络一样辛苦。您必须仔细选择所需的资源，并选择正确的规则集，以确保一切正常工作，只允许期望的流量进出 `子网`。幸运的是，OCI
    提供了一个向导，我们可以用它来自动化一些更常见的配置。


    #### 计算服务


    计算服务是代表计算硬件的资源，例如运行应用程序或服务的服务器。回想一下，我们使用术语 `计算实例` 来指代已配置的计算资源。


    当您配置一个 `计算实例` 时，您可以从多种选项中选择，包括机器类型（裸机、虚拟机等）以及一组性能设置（称为 `形状`），使您可以根据容量和性能需求定制计算实例。


    #### 存储服务


    这些服务是 OCI 提供的磁盘和数据存储资源。您有多种数据存储资源可供选择，以适应您的数据工作负载。这些资源具有诸如持久性/非持久性、数据类型、读写输入/输出操作每秒性能（`IOPS`）、吞吐量、持久性、连接性、存储接口协议、容量等特性。


    与计算实例类似，您有许多选项可以定制存储以满足您的业务需求。以下部分简要介绍了 OCI 中存储的常见选择。


    ##### 块卷


    一种虚拟化的硬盘。`块卷` 是为计算实例提供持久存储的磁盘。与大多数资源一样，它们是虚拟的，意味着您可以在不同的计算实例之间分离和重新连接它们（使用另一个称为
    `块卷附加` 的虚拟资源）（一次只能连接到一个计算实例），而不会丢失数据。


    `块卷` 的使用方式与您在 PC 上使用硬盘的方式相同。您只需读写磁盘数据或安装应用程序。您可以选择 `启动卷`（计算实例使用它来写入镜像（可以理解为操作系统））或用于数据的
    `块卷`。`块卷` 是持久且耐用的。您可以从基础、平衡和高性能品种中选择，这些品种定义了性能特征。


    ##### 本地 NVMe


    一种虚拟化的内存驱动器（类似于 `SSD`）。与 `块卷` 类似，它们可以作为块存储附加，但具有非持久性和非耐用性。这些主要用于需要高性能本地存储而不需要长期存储的应用程序。


    ##### 文件存储


    一种分布式文件系统，您可以将其附加到计算实例并像使用本地驱动器一样使用它。通常用作共享文件系统存储，文件存储是持久且高度耐用的。


    ##### 对象存储


    与 `块卷` 不同，`对象存储` 是一种不同的架构，设计用于将数据存储为对象。因此，存储是针对对象级访问而非像 `块卷` 那样的单个文件访问进行优化的，因此您不会使用
    `对象存储` 来读写您的数据文件。


    数据对象存储在 `存储桶` 中，这是您创建的用于放置数据对象的特殊容器。每个 `存储桶` 可以包含无限数量的数据对象。但是，数据对象可以是任何类型，最大可达
    50 GB。


    您可以在两个存储层之间选择：标准对象存储（活动且可访问的，有时称为热存储）或存档存储（不使用时会被存档，有时称为冷存储，并且在您想要使用时必须使其可用）。


    `对象存储` 也不是您可以直接附加到计算实例的东西。相反，您使用 `对象存储` 将数据复制到对象存储。`对象存储` 的用例包括备份数据、共享文件以及非结构化数据存储（如日志）。

    '
- fmt: '## Identity and Access Management Services


    Identity and Access Management (IAM) services are those resources that you use
    to control access to your OCI resources, which make these core services one of
    the more complicated and yet vital for building your OCI-based infrastructure.
    You can create `users` and `groups` as well as apply access policies.


    The most used concept is called a `principal` (sometimes called an `instance principal`),
    which is a resource used to apply to IAM `users` and compute instances to permit
    access or interactions with OCI resources. The operations and actions that can
    be performed by an authenticated `principal` is called `authorization`.


    `Users` and `groups` are what you would expect where `users` have a name, password,
    API signing key, and one or more authentication tokens. Access is granted to `users`
    and `groups` by using `policy` resources that allow a `user` or `group` to access
    a specific `compartment` in a `tenancy` with any restrictions or conditions.


    For example, when a `user` wants to access an OCI resource, the `user` (or application/service)
    must be part of a `group`, which should have a `policy` with permissions in the
    same `compartment` and `tenancy`.


    Now that we’ve had a brief introduction to OCI core services, let’s learn how
    we can set up our OCI account and create our first OCI resources.


    ## Setting Up Your Account


    Getting started with OCI is really easy. In fact, Oracle allows you to create
    a free account that you can use to learn how to work with OCI. While the free
    account has a few limits on the size or complexity of resources you can create,
    Oracle gives each free account a $300.00 credit for signing up. This means you
    can use resources to try them out with the cost deducted from the initial credit.
    Once that amount is depleted, you will begin to incur charges. Thus, you must
    supply a valid credit card when creating the account.


    A free tier account also has access to certain always free services such as the
    following:


    *   Two Oracle Autonomous Databases with tools like `Application Express (APEC)`
    and `Oracle SQL Developer`

    *   Two OCI compute instances (VMs); Block, Object, and Archive Storage; Load
    Balancer and data egress; Monitoring and Notification services


    As mentioned, the free account is limited to the following:


    *   Up to eight compute instances across all available services

    *   Up to 5 TB of storage


    You can upgrade your account at the end of the 30 days to a pay-as-you-go account.
    If you created paid resources that you want to keep beyond the 30 days, you will
    need to upgrade your account.


    Caution


    Any resources provisioned with your credit allowance are reclaimed by Oracle after
    the 30-day period expires unless you upgrade your account.


    You can upgrade to a paid account at any. Simply click the `Upgrade your account`
    link in the panel on the right side of the cloud console page. You will continue
    to have ownership and access to your cloud resources after upgrading your account.


    ### Always Free Resources


    All OCI accounts (including pay-as-you-go) can create resources that are identified
    as “always free.” They are denoted by a label that reads, `Always Free`, in the
    cloud. Some of these resources may be limited to certain configurations. For example,
    compute instances that are always free are those that are provisioned as a virtual
    machine. Similarly, an Oracle Autonomous Database, and the networking, load balancing,
    and storage resources needed to support the applications that you want to build
    may also be free for sample applications or to perform prototyping.


    See the OCI documentation (`https://docs.oracle.com/en-us/iaas/Content/FreeTier/freetier_topic-Always_Free_Resources.htm#resources`)
    for more details about which resources are always free.


    There is one more concept we should discuss that relates to all accounts but is
    more restrictive for the free tier account.'
