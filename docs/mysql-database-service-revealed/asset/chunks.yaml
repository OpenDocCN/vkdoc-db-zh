    ## Summary


    The MySQL database server is a powerful tool. Given its unique placement in the
    market as the database server for the Internet, it is not surprising that web
    developers (as well as many startup and similar Internet properties) have chosen
    MySQL for their solutions. Not only is the server robust and easy to use, but
    it is also available as a free community license that you can use to keep your
    initial investment within budget.


    In this chapter, you discovered some of the power of using the MySQL database
    server in its traditional role using the SQL interface; how to issue commands
    for creating databases and tables for storing data as well as commands for retrieving
    that data, and even how to connect your applications to MySQL for storing data.
    While this chapter presents only a small primer on MySQL, you learned how to get
    started by practicing with your own installation of MySQL, which will pay dividends
    when employing the MySQL Database Service in a production environment.


    In the next chapter, we will take a deeper look into the MySQL Database Service
    including how to get started creating and using your first database system (called
    a `dbSystem` in MDS).


