    Now that we’ve had a good introduction to migrating data to a DB System, let’s
    look at the reverse: migrating data from MDS to our PC.


    ## Migrating Data from MDS


    When importing data from MDS, we must choose one of the three methods for moving
    the exported data to MDS. Recall, these include using an ObjectStore bucket, uploading
    the exported data to an intermediate Compute instance, and uploading the exported
    data directly to our DB System via a Bastion gateway.


    Migrating from MDS follows the same mechanism described above only in reverse.
    Thus, we will see only the smaller details as we work through the same three mechanisms
    demonstrated in the last section. If you need more detail such as setting up an
    ObjectStore bucket or a Bastion Service, please refer to the previous sections.


    If you executed any of the previous examples, be sure to prepare your local MySQL
    Server by dropping the `sakila` and `world` databases before you attempt the import.


    The following sections briefly demonstrate each of the mechanisms for importing
    data from MDS.


    ### Using an ObjectStore Bucket


    The first method to import our data from MDS to our local MySQL Server will use
    the ObjectStore as an intermediate storage for the exported data. We will use
    the MySQL Shell on our DB System to create an export of the data, which we will
    place in ObjectStore and then access that data from our local MySQL Server for
    the import again using MySQL Shell.


    #### Prepare Your PC


    If you have not executed the previous example of migrating data from your PC to
    MDS, go back and make sure you prepare your PC and your compute instance with
    the correct OCI API configuration file and SSH keys. See the sections `Configure
    Your PC for OCI CLI Access` and `Install and Test the OCI CLI` above for more
    details.


    There is one more thing we must do on our PC. We must set the `local_infile` global
    variable in MySQL to `ON`. This is turned off by default and you will want to
    turn it off again after you have finished the backup. When logged into your local
    MySQL server, execute the following command:


    ```

    set @@global.local_infile=ON;

    ```


    Listing 7-16 shows the command in action.


    ```

    MySQL  localhost:33060+ ssl  SQL > SHOW VARIABLES LIKE ''%local%'';

    +---------------+-------+

    | Variable_name | Value |

    +---------------+-------+

    | local_infile  | OFF   |

    +---------------+-------+

    1 row in set (0.0033 sec)

    MySQL  localhost:33060+ ssl  SQL > SET @@global.local_infile=ON;

    Query OK, 0 rows affected (0.0009 sec)

    MySQL  localhost:33060+ ssl  SQL > SHOW VARIABLES LIKE ''%local%'';

    +---------------+-------+

    | Variable_name | Value |

    +---------------+-------+

    | local_infile  | ON    |

    +---------------+-------+

    1 row in set (0.0032 sec)

    Listing 7-16

    Turn on local_infile (local MySQL server)

    ```


    #### Create the ObjectStore Bucket


    Next, we need to create an ObjectStore bucket to store our data in from the export.
    In this example, we will create a bucket in the `oci-tutorial-compartment` named
    `mysql-data-bucket`. Begin by logging into OCI and choosing Storage | Buckets
    from the menu. You will see the ObjectStore bucket page.


    Recall, to create a new bucket, click the `Create Bucket` button and replace the
    bucket name with `mysql-data-bucket` on the create bucket dialog. If you created
    this bucket earlier, you could reuse it, but you must delete all of the files
    first. You can do so by either deleting the bucket and recreating it or by deleting
    the folder `mds-test` by choosing `Delete Folder` from the context menu as shown
    in Figure 7-12.


    ![](images/527055_1_En_7_Chapter/527055_1_En_7_Fig12_HTML.png)


    A table lists the bucket object stored. The three-dot on the right-side upload,
    create pre-authenticated request, create a new folder, and delete folder are present.


    Figure 7-12


    Deleting Objects in a Bucket'
