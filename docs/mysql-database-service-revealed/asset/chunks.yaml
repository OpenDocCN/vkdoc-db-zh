    ## 添加代理主键


    虽然您可以轻松使用 `ALTER TABLE` SQL 命令为主键添加一个或多个字段，或者添加一个自增字段来创建代理键。然而，还有另一种方法：不可见列。在
    MySQL 8.0.23 及更高版本中，您可以向表中添加一列并将其设置为不可见（查询中不显示）。在这种情况下，不可见列就是表的代理键，它满足了 HA DB
    系统的要求。


