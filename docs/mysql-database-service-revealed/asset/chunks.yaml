    ## 创建计算实例


    在本教程中，我们将创建一个简单的计算实例，使用最小的规格，因为我们仅用于演示目的。我们将使用默认值，这些值恰好构成一个始终免费的计算实例。首先，打开云控制台主菜单，选择
    "Compute | Instances"，如图 2-27 所示。


    ![](img/527055_1_En_2_Fig27_HTML.jpg)


    Oracle 云上的主菜单高亮显示计算选项。右侧的计算菜单用矩形框突出显示了实例。


    图 2-27


    计算实例（主菜单）


    在计算页面上，您需要使用左侧的筛选控件选择 compartment，如图 2-28 所示。选择我们之前创建的 `oci-tutorial-compartment`。


    ![](img/527055_1_En_2_Fig28_HTML.jpg)


    计算页面左侧有筛选控件。顶部列出范围，其下方是 compartment。oci-tutorial compartment 显示在滚动按钮中。


    图 2-28


    设置列表范围（计算页面）


    接下来，点击实例列表中的 "Create instance" 按钮，如图 2-29 所示。这将启动创建实例对话框。


    ![](img/527055_1_En_2_Fig29_HTML.png)


    一个窗口高亮显示了左上角的创建实例按钮。其下方显示了一个未找到项目的表格。


    图 2-29


    计算实例列表 (oci-tutorial-compartment)


    创建实例对话框是一个长表单。让我们逐个部分来了解。


    我们将检查的第一部分包括名称、选择 compartment、放置位置（可用性域）以及映像和规格的条目。对于放置位置以及映像和规格条目，我们将再次使用默认值。如果您好奇有哪些选项可用，可以点击每个部分中的
    "Edit" 链接。


    如果您正在跟随操作，请将名称更改为 `oci-tutorial-instance-1`，如图 2-30 所示。您可能会看到系统为您生成的计算实例名称，形式类似
    `instance-20220312-1956`。您还应确认选择了正确的 compartment (`oci-tutorial-compartment`)，然后向下滚动。


    ![](img/527055_1_En_2_Fig30_HTML.png)


    一个创建计算实例的窗口，包含名称、创建于 compartment。下方显示了放置详细信息、映像和规格详细信息。


    图 2-30


    创建计算实例（第 1 部分）


    下一部分是 "Networking" 和 "Add SSH Keys" 部分。在这里，我们看到 OCI 再次选择了我们创建的 VCN 资源（它是 compartment
    中唯一的一个）。如果您好奇有哪些网络选项可用，可以点击 "Edit" 按钮。然而，对于本教程，默认值是可接受的。


    "Add SSH Keys" 部分很重要，因为 OCI 将为您生成一个 SSH 密钥对。您需要使用这些密钥才能登录到计算实例。


    要下载私钥，请点击 "Save Private Key" 按钮将私钥保存到您的 PC，如图 2-31 所示。


    ![](img/527055_1_En_2_Fig31_HTML.png)


    一个创建计算实例的窗口显示第二页，包含网络和添加 SSH 密钥。在添加 SSH 密钥中选择生成密钥对。底部的保存私钥按钮被高亮显示。


    图 2-31


    创建计算实例（第 2 部分）


    您需要将其放置在您的 SSH 密钥目录（文件夹）中。例如，在 macOS 或 Linux 上，您可以将文件保存在 `~/.ssh` 中。但是，您可以将文件放在任何您想要的地方，只要权限设置正确即可，如下所示。


    ```

    % mkdir ~/.ssh

    % mv ~/Downloads/ssh-key-2022-03-13.key ~/.ssh/.

    % chmod 400 ~/.ssh/ssh-key-2022-03-13.key

    ```


    下一部分定义了启动卷参数，包括设置自定义大小和指定加密。我们将使用默认值，但您可以通过提供的链接探索其他选项。准备就绪后，点击 "Create" 按钮，如图
    2-32 所示。


    ![](img/527055_1_En_2_Fig32_HTML.png)


    一个创建计算实例的窗口在复选框中显示了 3 个启动卷选项。选中了使用传输中加密。左下角的创建按钮被高亮显示。


    图 2-32


    创建计算实例（第 3 部分）


    现在计算实例将被配置。将打开计算实例的详细信息页面，状态将显示为 `PROVISIONING`，背景为橙色。这可能需要一段时间，因此您可能不会立即看到状态的任何变化。当计算实例配置完成并启动后，状态将更改为
    `RUNNING`，背景为绿色，如图 2-33 所示。花点时间浏览一下显示的数据。您会看到一些重要值，包括公共 IP 地址和 OCID。我们将使用公共 IP
    地址通过安全外壳主机 (SSH) 会话登录到计算实例。


    ![](img/527055_1_En_2_Fig33_HTML.png)


    一个 oci-tutorial-instance-1 的窗口，包含实例信息。描述了常规信息、实例详细信息、实例访问和公共 VNIC。公共 IP 地址被高亮显示。


    图 2-33


    计算实例详细信息页面


    如果您的 PC 上未安装 SSH 客户端，则需要在连接到计算实例之前安装一个。需要加密的 SSH 会话。macOS 和大多数 Linux 发行版默认安装了
    SSH 客户端。请参阅您的平台文档以了解如何安装 SSH 客户端。


    遗憾的是，Windows 不附带 SSH 客户端。幸运的是，有几种第三方应用程序可用。一个流行的选项称为 PuTTY，它实际上是一个通用的终端会话应用程序。PuTTY
    中的 SSH 功能非常易于使用。我最喜欢 PuTTY 的一点是它是开源软件，因此可以免费下载和使用。


    您可以从 [`www.putty.org`](http://www.putty.org) 下载 PuTTY。下载的文件不是一个安装包（`.msi`），而仅仅是
    PuTTY 可执行文件 (`putty.exe`)。只需下载该文件并将其放在您的 path 环境变量中的某个文件夹中。您也可以将其放在您的文档文件夹中，然后直接从那里执行或通过引用该文件夹来执行。


    回到计算实例详细信息页面，如果向下滚动，您将看到 "Work requests" 部分，该部分显示已在或正在计算实例上执行的工作流。我们想要确保完成的工作流是
    "Create instance" 工作流，其状态应为 `Succeeded`，如图 2-34 所示。


    ![](img/527055_1_En_2_Fig34_HTML.png)


    一个包含 3 行 6 列的工作请求表。列名为 operation, state, %complete, accepted, started, finished。添加了一个成功的状态条目。


    图 2-34


    计算实例工作请求列表


    一旦看到工作流成功，我们就准备好通过终端连接到实例。为此，只需使用以下命令。在这里，我们看到我们使用 `ssh` 实用程序和 `-i` 参数，以及之前下载的私有
    SSH 密钥的路径。接下来，我们提供在计算实例详细信息页面上找到的用户名和公共 IP 地址。默认用户名是 `opc`：


    ```

    ssh -i  opc@

    ```

