- fmt: '## What Can Go Wrong?


    Some may think cloud services are infallible and never go offline. That, sadly,
    is a myth. Things can happen in many small ways that can affect your ability to
    access your data. It could be an outage in your Internet provider, a failure of
    your local hardware, and, yes, failures do occur in cloud services. Fortunately,
    they are rare, and many steps and much planning go into ensuring the faults are
    detected early and mitigated by redundancy as well as staff that act quickly to
    recover.


    But let us not forget the one element that can cause the most damage – human error.
    Whether it is from an accidental delete or and consequences of a poorly planned
    and executed update to your data, human error is something we must prepare against.
    Thus, backup and restore are still and will continue to be just as important in
    the cloud and it is on-prem. Furthermore, organizations should incorporate the
    backup and restore facilities in MDS replacing the current operations that may
    be in place for backup and restore of on-prem MySQL.


    For example, if you use an external application such as `MySQL Enterprise Backup`
    (`MEB`) to backup your on-prem MySQL servers, you will replace that with the `DB
    System` backup features in `OCI`. While the `DB System` backup does not offer
    the same options as `MEB`, `DB System` backup can still take the place of `MEB`
    in your business continuity plan. And, best of all, they are physical backups
    so you can be assured your data will be backed up and restored quickly and efficiently
    without space concerns or other issues that logical backups incur.


    Similarly, your restore plan can be replaced with the restore feature in `DB Systems`.
    However, this is more of a difference with restore. Unlike application like `MEB`
    (physical backup) or SQL-based (logical backup) options like `mysqlpump` and `mysqldump`,
    `DB System` restore is used to create a new `DB System` with the data from the
    restore. More specifically, you cannot restore data onto an existing `DB System`.
    The reasons for this are many, but if you think about it, restoring to a new `DB
    System` with the same data and configuration means you don’t have to destroy the
    original to roll your data back. You can keep both `DB Systems` for any recovery
    analysis you want to conduct.


    Tip

    See [`https://dev.mysql.com/doc/refman/8.0/en/mysqlpump.xhtml`](https://dev.mysql.com/doc/refman/8.0/en/mysqlpump.xhtml)
    for more information about `mysqlpump` and [`https://dev.mysql.com/doc/refman/8.0/en/mysqldump.xhtml`](https://dev.mysql.com/doc/refman/8.0/en/mysqldump.xhtml)
    for more information about `mysqldump`.


    So, despite the lack of selective backup, selective restore, and restore to an
    existing `DB System`, the `DB System` backup and restore features are robust,
    efficient, and reliable. As you will see, the automatic backup feature makes protecting
    your data effortless.


    Now that we understand the importance and role of backup and restore in MDS, let’s
    look at the features in more detail.


    Note

    If you want to follow along in the demonstrations, be sure to have a `DB System`
    created and running using parameters similar to those discussed in Chapter [2](#527055_1_En_2_Chapter.xhtml).


    ## Backup


    To better understand `DB System` backups, let us consider the configuration of
    a `DB System` from a high-level point of view. A `DB System` consists of a compute
    instance, a boot volume with the operating system and MySQL installed and running,
    block storage devices for the data (called the data drive or simply data), and
    a set of configuration parameters for running MySQL.


    When a backup is initiated, the block volume service for the data drive(s) is
    invoked to make a copy of the block volumes (data). The block volume service implements
    a fast copy that employs a form of logical volume manager (`lvm`) to make snapshots
    of the data. So, there is no need to incur any form of wait or blocking or similar
    disruptions that some backup applications and mechanisms must employ.


    The block volume backup is then combined with a copy of the configuration parameters
    and some additional metadata used to recreate the `DB System`. The compute instance,
    boot volume, etc., are not copied or placed into the backup. Rather, the `DB System`
    backup has everything it needs to recreate the `DB System` and your data at the
    time of the backup.


    In this section, we will learn all of the basic operations you can do regarding
    `DB System` backups including automatic and manual backups. As you will see, there
    is a lot of fine-tuning available for setting up backups.


    ### Types of Backups


    Backup in `DB Systems` can be set to occur automatically at preset intervals,
    manually create a backup at any time, create a final backup, and the `OCI` operator
    can make a backup for you should maintenance or corrective actions be required.


    `DB Systems` also support full and incremental backups. Full backups are those
    that backup all of the data as it exists at the time of backup. Incremental backups
    include only those changes since the last full backup. Typically, incremental
    backups are smaller and therefore may occur more frequently. For example, you
    may want to adopt a plan to run a full backup during low usage each day and incremental
    backups periodically throughout the day. That way, you can always return your
    data to within the incremental backup window.


    Incremental backups permit you to take backups more frequently since they typically
    consume less space. This allows you to take a full backup once and then incremental
    backups throughout a period of time. Should you need to restore, you restore the
    last full backup then restore the incremental backups taken since.


    For example, you may want to adopt a policy to take a full backup during lower
    usage times, typically at night, then take incremental backups every few hours.
    Best practices suggest adjusting the frequency to match your data recovery goals.
    More specifically, the time between incremental backups should be no more than
    the maximum data loss your organization can safely tolerate. This is because any
    data changed or added since the last incremental backup may be lost when the full
    backup and subsequent incremental backups are restored.


    Another best practice is utilizing a special feature of MySQL called point-in-time
    recovery, which is built into MDS. This allows you to set up automated recovery
    by taking a snapshot of the data every five minutes. Thus, the maximum data loss
    will be no more than a five-minute period. We will talk more about point-in-time
    recovery and how you can leverage it to improve data recovery in Chapter [6](#527055_1_En_6_Chapter.xhtml).


    Let’s look at each of the backup types in more detail.


    #### Manual Backup


    A manual backup is a backup that you, the `DB System` owner, create via the cloud
    console or via a `REST API` call (more on `REST API` calls in Chapter [9](#527055_1_En_9_Chapter.xhtml)).
    The retention period for a manual backup can be set from 1 to 365 days. All manual
    backups are full backups.


    You may want to create a manual backup before making major changes to the data,
    executing any data pruning or conversion scripts, importing large amounts of data,
    or before a critical moment in your business such as before a large event or new
    product launch.'
