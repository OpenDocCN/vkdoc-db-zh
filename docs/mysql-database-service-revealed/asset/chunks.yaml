    图 7-13


    查找存储桶名称和命名空间'
- fmt: '### Using a Compute Instance


    The second method to export our data from our DB System will use a compute instance
    for intermediate storage. In this case, we simply perform the export on our compute
    instance placing the files on that system, copy them to our local PC, then consume
    the data on our local MySQL server.


    #### Export Data Using MySQL Shell


    The first step is to run the `util.dumpInstance()` method to save the files to
    the local drive on the compute instance. Begin by creating an SSH session to login
    to the compute instance then create a folder named `/home/opc/imported_data` as
    shown below. Once created, start MySQL Shell using the JavaScript interface:


    ```

    $ mkdir /home/opc/imported_data

    ```


    Next, run the `util.dumpInstance()` method like we did with the migrate to MDS
    example except use `/home/opc/imported_data` for the location of the exported
    data. Listing [7-20](#527055_1_En_7_Chapter.xhtml#PC51) shows the export running
    with the notes and warnings omitted for brevity.


    ```

    MySQL  10.0.1.226:33060+ ssl  JS > util.dumpInstance("/home/opc/imported_data",
    {ocimds:true, compatibility: ["strip_restricted_grants", "strip_definers", "ignore_missing_pks",
    "skip_invalid_accounts"]})

    Acquiring global read lock

    Global read lock acquired

    Initializing - done

    2 out of 6 schemas will be dumped and within them 19 tables, 7 views, 6 routines,
    6 triggers.

    4 out of 7 users will be dumped.

    Gathering information - done

    All transactions have been started

    Locking instance for backup

    Global read lock has been released

    Checking for compatibility with MySQL Database Service 8.0.30

    ...

    Compatibility issues with MySQL Database Service 8.0.30 were found and repaired.
    Please review the changes made before loading them.

    Validating MDS compatibility - done

    Writing global DDL files

    Writing users DDL

    Running data dump using 4 threads.

    NOTE: Progress information uses estimated values and may not be accurate.

    Writing schema metadata - done

    Writing DDL - done

    Writing table metadata - done

    Starting data dump

    99% (52.58K rows / ~52.68K rows), 0.00 rows/s, 0.00 B/s uncompressed, 0.00 B/s
    compressed

    Dump duration: 00:00:00s

    Total duration: 00:00:00s

    Schemas dumped: 2

    Tables dumped: 19

    Uncompressed data size: 3.23 MB

    Compressed data size: 807.97 KB

    Compression ratio: 4.0

    Rows written: 52575

    Bytes written: 807.97 KB

    Average uncompressed throughput: 3.23 MB/s

    Average compressed throughput: 807.97 KB/s

    Listing 7-20

    Export Data on Compute Instance (MySQL Shell)

    ```


    #### Copy the Exported Data to Your Local MySQL Server


    While logged into your compute instance, navigate to the exported data folder,
    and create a zip file of the data with the command below:


    ```

    $ zip -r imported_data.zip ./imported_data/*

    ```


    Next, log out of the compute instance and open a PowerShell (terminal) on your
    PC. We will be copying the `mysql_data.zip` file to your PC as shown below. Note
    that you will have to use the correct SSH key file and the public IP address of
    your compute instance:


    ```

    C:\> scp -i c:\users\cbell\.ssh\ssh-key-2022-08-16.key opc@150.136.69.126:~/imported_data.zip
    .

    imported_data.zip                      100%  838KB   1.7MB/s   00:00

    ```


    Next, return to your PC and unzip the files to a folder. On Windows, you can use
    the file explorer to locate the file, right-click on it and choose `Extract All…`.


    #### Import the Data on the DB System


    The last step is to launch MySQL Shell on your PC and import the data. We will
    use the command below. Notice the parameters used. We need the path to the exported
    data and, since we’re executing the import on our PC, we also need to add a path
    to the progress file option. The path must be a location where the user account
    has access to create and write files:


    ```

    util.loadDump("c:\\imported_data", {progressFile: "c:\\imported_data\\progressFile"})

    ```


    Listing [7-21](#527055_1_En_7_Chapter.xhtml#PC55) shows the transcript to running
    the `util.loadDump()` method.


    ```

    MySQL  localhost:33060+ ssl  JS > util.loadDump("c:\\imported_data", {progressFile:
    "c:\\imported_data\\progressFile"})

    Loading DDL and Data from ''c:\imported_data'' using 4 threads.

    Opening dump...

    Target is MySQL 8.0.29\. Dump was produced from MySQL 8.0.28-u3-cloud

    Scanning metadata - done

    Checking for pre-existing objects...

    Executing common preamble SQL

    Executing DDL - done

    Executing view DDL - done

    Starting data load

    2 thds loading - 1 thds indexing - 100% (3.23 MB / 3.23 MB), 6.23 MB/s, 17 / 19
    tables done

    Recreating indexes - done

    Executing common postamble SQL

    19 chunks (52.58K rows, 3.23 MB) for 19 tables in 2 schemas were loaded in 3 sec
    (avg throughput 3.23 MB/s)

    0 warnings were reported during the load.

    Listing 7-21

    Importing Data from Directory (MySQL Shell)

    ```


    Listing [7-22](#527055_1_En_7_Chapter.xhtml#PC56) shows the list of databases
    after import and a query to fetch some data.


    ```

    MySQL  localhost:33060+ ssl  SQL > SHOW DATABASES;

    +--------------------+

    | Database           |

    +--------------------+

    | information_schema |

    | mysql              |

    | performance_schema |

    | sakila             |

    | sys                |

    | world              |

    +--------------------+

    6 rows in set (0.0019 sec)

    MySQL  localhost:33060+ ssl  SQL > SELECT first_name, last_name FROM sakila.actor
    LIMIT 6;

    +------------+--------------+

    | first_name | last_name    |

    +------------+--------------+

    | PENELOPE   | GUINESS      |

    | NICK       | WAHLBERG     |

    | ED         | CHASE        |

    | JENNIFER   | DAVIS        |

    | JOHNNY     | LOLLOBRIGIDA |

    | BETTE      | NICHOLSON    |

    +------------+--------------+

    6 rows in set (0.0012 sec)

    Listing 7-22

    Test Database (After Import)

    ```


    ### Using a Bastion Gateway


    The third method to migrate data from MDS uses a Bastion gateway to connect our
    PC directly to our DB System. Recall, we must set up the Bastion Service with
    two port forwarding sessions: one for port 3306 and another for port 33060 using
    the IP address of our DB System. If you have not set up a Bastion Service in the
    previous section, please refer to the sections *Setup the Bastion Service* and
    *Start the Bastion Service SSH Sessions* above for details.


    Note that if you ran the previous example, you may need to delete the `imported_data`
    folder you created.'
