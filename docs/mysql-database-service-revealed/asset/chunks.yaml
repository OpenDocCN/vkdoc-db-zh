    *   `--admin-username <name>`：MySQL 管理用户的用户名。

    *   `--data-storage-size-in-gbs <int>`：数据存储（数据库驱动器）的大小（单位为 GB）。

    *   `--display-name <text>`：数据库系统的用户友好名称。

    *   `--is-highly-available <bool>`：指定数据库系统是否为高可用。


    我们还需要讨论另一个选项——让操作等待特定状态的选项。我们通过 `--wait-for-state <state>` 选项和以下状态之一 (`ACCEPTED`,
    `CANCELED`, `CANCELING`, `FAILED`, `IN_PROGRESS`, `SUCCEEDED`) 来实现。你可以多次指定此选项以等待多个操作。此操作会异步执行操作，并使用工作请求跟踪进度。可以指定多个状态，在第一个状态达到时返回。如果达到超时，则返回返回码
    `2`。对于任何其他错误，则返回返回码 `1`。


