    and compartment. Policy builder with show manual editor is displayed below. The
    create button is at the bottom left.


    Figure 4-10


    Create Policy Dialog


    Caution


    If you do not select your root compartment, you may receive a red banner at the
    bottom of the dialog with a somewhat cryptic error stating the compartment doesn’t
