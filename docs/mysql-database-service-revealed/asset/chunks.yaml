    ```\n\n列表 9-21 创建数据库系统脚本\n\n现在，让我们看看代码运行情况。列表 9-22 展示了运行该脚本的输出。请注意其中的选择列表和响应（为简洁起见，内容已编辑）。\n\
    \n```\nC:\\Users\\cbell>python create_db_system.py\nEnter the SSH key passphrase:\n\
