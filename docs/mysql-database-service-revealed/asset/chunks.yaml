    While the steps seem simpler, and they are, this method is slower than the ObjectStore
    method since we have to copy the files manually. The next and final example bypasses
    the upload to the compute instance and instead allowing us to upload the data
    direct to the DB System.


    ### Using a Bastion Gateway


    The third method to export our data from our local MySQL server uses a Bastion
    gateway to connect our PC directly to our DB System. This means we no longer need
    to copy or upload the data for the import; MySQL Shell can read the data from
    our PC.


    This method is slower than the other two methods due to the Bastion gateway and
    network layers and, more importantly, it has two potential issues: (1) the Bastion
    gateway is a paid service, and (2) the data you are copying must fit on the DB
    System storage in addition to the size of the data to be imported. Thus, it may
    require storing up to twice the amount of data; once for the exported data and
    a second time once the data is imported. This has the potential of creating an
    issue for smaller DB System storage sizes or for larger data. However, most initial
    data loads should not be an issue if you size your DB System initially to handle
    the exported data.


    The steps in this method are similar to the previous method except that we must
    set up our Bastion server first, then export the data on our local MySQL server,
    and then import the data from our PC. Let’s see a demonstration.


    #### Setup the Bastion Service


    Recall, we set up a Bastion gateway in Chapter [4](#527055_1_En_4_Chapter.xhtml)
    under the *Create a Bastion Service* heading. While once again the commands to
    do the export and import are similar, in this method we are creating access from
    our PC directly to our DB System so the exported data can be copied directly to
    the DB System for importing.


    We will use the same process described in Chapter [4](#527055_1_En_4_Chapter.xhtml)
    to set up a Bastion Service. however this time we will need two port forwarding
    sessions; one setup for port `3306` and the other setup for port `33060` because
    MySQL Shell will use both ports during the import. Recall, we will be using the
    IP address of our DB System and you will either need to create an SSH key pair
    or reuse a pair that you created earlier. Figure [7-11](#527055_1_En_7_Chapter.xhtml#Fig11)
    shows the Bastion Service setup with two port forwarding sessions.


    ![](images/527055_1_En_7_Chapter/527055_1_En_7_Fig11_HTML.png)


    A screenshot displays the Bastion information details. It has 2 items on the table.
    session type, the target resource, and the target port are highlighted.


    Figure 7-11


    Bastion Service Sessions (For Importing Data from PC)


    Tip


    If you need to see the steps in detail, see the section entitled *Create a Bastion
    Service* in Chapter [4](#527055_1_En_4_Chapter.xhtml) for setting up a Bastion
    Service.


    #### Export Data Using MySQL Shell


    The next step is to run the `util.dumpInstance()` method to save the files to
    the local drive. In this case, we will use a different first parameter. Instead
    of passing in the bucket name and related parameters, we simply specify a folder
    (directory) to store the files and the same set of options as before. This is
    the same step we used in the last method, so we will show only the command used.
    If you are following along, you need not run this step again since the exported
    data should be on your PC. The command needed is shown below for clarity:


    ```

    util.dumpInstance("c:\\exported_data", {ocimds:true, compatibility: ["strip_restricted_grants",
    "strip_definers", "ignore_missing_pks", "skip_invalid_accounts"]}

    ```'
