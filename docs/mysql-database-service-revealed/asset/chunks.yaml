- fmt: "### Connecting with MySQL Shell\n\nThe MySQL Shell is a new and exciting addition\
    \ to the MySQL portfolio. The MySQL Shell represents the first modern and advanced\
    \ client for connecting to and interacting with MySQL. The shell can be used as\
    \ a scripting environment for developing new tools and applications for working\
    \ with data. While it does support an SQL mode, its main purpose is to permit\
    \ access to data with the JavaScript and Python languages. That’s right, you can\
    \ write JavaScript and Python scripts and execute them within the shell interactively\
    \ or as a batch. Cool!\n\nNote\n\nI use the term “shell” to refer to features\
    \ or objects supported by the MySQL Shell. I use “MySQL Shell” to refer to the\
    \ product itself.\n\nThe MySQL Shell is designed to use the new X Protocol for\
    \ communicating with the server via the X Plugin. However, the shell can also\
    \ connect to the server using the older protocol albeit with limited features\
    \ in the scripting modes. What this means is, the shell allows you to work with\
    \ both relational (SQL), JSON documents (NoSQL), or both.\n\nThe NoSQL interface\
    \ is based on an application programming interface called the X DevAPI ([`https://dev.mysql.com/doc/x-devapi-userguide/en/`](https://dev.mysql.com/doc/x-devapi-userguide/en/)).\
    \ Administrative operations are supported by another API called the AdminAPI.\
    \ See the online documentation for more information about these APIs if you plan\
    \ to use the shell for development work ([`https://dev.mysql.com/doc/mysql-shell/8.0/en/`](https://dev.mysql.com/doc/mysql-shell/8.0/en/)).\n\
    \nOracle provides the MySQL Shell as a free download from the MySQL download website\
    \ ([`https://dev.mysql.com/downloads/shell/`](https://dev.mysql.com/downloads/shell/)).\
    \ You can download the specific release for your platform (e.g., Windows, macOS,\
    \ Linux) and install it using the normal mechanisms for your platform. Once installed,\
    \ you can launch it via the menu system for your platform or by entering `mysqlsh`\
    \ on a command line. Figure [3-1](#527055_1_En_3_Chapter.xhtml#Fig1) shows an\
    \ example of launching MySQL Shell. Notice the nifty prompt that displays the\
    \ MySQL logo, connection information, and mode. Nice!\n\n![](images/527055_1_En_3_Chapter/527055_1_En_3_Fig1_HTML.png)\n\
    \nA screenshot of The M Y S Q L shell displays the copyright and its affiliates.\
    \ Type M Y S Q L in the command line to launch the M Y S Q L Shell.\n\nFigure\
    \ 3-1\n\nThe MySQL Shell\n\nThe following sections present the major features\
    \ of the shell at a high level. We will not explore every detail of every feature\
    \ or option, rather, this section provides a broad overview so that you can get\
    \ started quickly and, more importantly, learn enough about the shell so that\
    \ you can follow along with the examples in this book.\n\nFor more information\
    \ about the MySQL Shell, see the section entitled, “MySQL Shell User Guide” in\
    \ the online MySQL reference manual.\n\n#### Features\n\nThe MySQL Shell has many\
    \ features including support for traditional SQL command processing, script prototyping,\
    \ and even support for customizing the shell. The following lists some of the\
    \ major features of the shell. Most of the features can be controlled via command\
    \ line options or with special shell commands. We take a deeper look at some of\
    \ the more critical features in later sections:\n\n*   *Logging*: You can create\
    \ a log of your session for later analysis or to keep a record of messages. You\
    \ can set the level of detail with the `--log-level` option ranging from 1 (nothing\
    \ logged) to 8 (max debug).\n\n*   *Output Formats*: The shell supports three\
    \ format options; table (`--table`), which is the traditional grid format you’re\
    \ used to from the old client, tabbed, which presents information using tabs for\
    \ spacing and is used for batch execution, and JSON (`--json`), which formats\
    \ the JSON documents in an easier to read manner. These are command-line options\
    \ you specify when launching the shell.\n\n*   *Interactive Code Execution*: The\
    \ default mode for using the shell is an interactive mode, which works like a\
    \ traditional client where you enter a command and get a response.\n\n*   *Batch\
    \ Code Execution*: If you want to run your script without the interactive session,\
    \ you can use the shell to run the script in batch mode. However, the output is\
    \ limited to non-formatted output (but can be overridden with the `--interactive`\
    \ option).\n\n*   *Scripting Languages*: The shell supports both JavaScript and\
    \ Python although you can use only one at a time.\n\n*   *Sessions*: Sessions\
    \ are essentially connections to servers. The shell allows you to store and remove\
    \ sessions. We will see more about sessions in a later section.\n\n*   *Startup\
    \ Scripts*: You can define a script to execute when the shell starts. You can\
    \ write the script in either JavaScript or Python.\n\n*   *Command History and\
    \ Command Completion*: The shell saves the commands you enter allowing you to\
    \ recalling them using the up and down arrow keys. The shell also provides code\
    \ completion for known keywords, API functions, and SQL keywords.\n\n*   *Global\
    \ Variables*: The shell provides a few global variables you can access when in\
    \ interactive mode. These include the following:\n    *   `session`: global session\
    \ object if established\n    *   `db`: schema if established via a connection\n\
    \    *   `dba`: the AdminAPI object for working with the InnoDB Cluster\n    *\
    \   `shell`: general purpose functions for using the shell\n    *   `util`: utility\
    \ functions for working with servers\n\n*   *Customize the Prompt*: You can also\
    \ change the default prompt by updating a configuration file named `~/.mysqlsh/prompt.json`\
    \ using a special format or by defining an environment variable named `MYSQLSH_PROMPT_THEME`.\
    \ See the MySQL Shell Reference manual for more details about changing the prompt.\n\
    \n*   *Auto Completion*: Starting in 8.0.4, the shell permits users to press the\
    \ *TAB* key to auto-complete keywords in SQL mode and the major classes and methods\
    \ in JavaScript and Python modes.\n\n*   *Extensions*: You can define extensions\
    \ in the form of reports and extension objects. Reports and extension objects\
    \ can be created using JavaScript or Python.\n\n*   *Utilities*: The shell also\
    \ provides several utilities that you may find helpful including the following.\
    \ You access them via an API call as demonstrated.\n    *   *Upgrade Checker*:\
    \ Used to verify whether MySQL server instances are ready for upgrade (e.g., `util.checkForServerUpgrade()`).\n\
    \    *   *JSON Import*: Import JSON documents to a MySQL Server collection or\
    \ table (e.g., `util.importJSON()`).\n    *   *Parallel Table Import*: Splits\
    \ up a single data file and uses multiple threads to load the chunks into a MySQL\
    \ table.\n\n*   *Shell Commands*: Like the original MySQL client, there are some\
    \ special commands that control the application itself rather than interact with\
    \ data. To execute a shell command, issue the command with a slash (`\\`). For\
    \ example, `\\help` prints the help for all of the shell commands.\n\n*   *Options*:\
    \ The shell can be launched using several startup options that control the mode,\
    \ connection, behavior, and more. Common options include the mode (SQL, JavaScript,\
    \ or Python) and connection parameters. For a complete list of options, execute\
    \ the shell with the `--help` option with `mysqlsh --help`.\n\nAs you can see,\
    \ there is a long list of features for the MySQL Shell. See the online reference\
    \ manual for a complete list of features.\n\nLet’s look at the two most important\
    \ to those getting started working with MySQL: modes and how to connect."
