- fmt: '## Setup


    You can set up PITR at any time for a DB System by enabling it on the DB System
    details page. You can also enable PITR when you create a DB System. The feature
    requires activation of automatic backups so if your DB System has that feature
    turned off, you will need to enable PITR.


    To check if your DB System has PITR or automatic backups enabled, visit the DB
    System details page and look for the `Backup` section as shown in Figure 6-1.


    ![](images/527055_1_En_6_Chapter/527055_1_En_6_Fig1_HTML.jpg)


    A screenshot of the backup section has automatic backup, backup window, retention
    days, and point-in-time restore details. The point-in-time restore is highlighted.


    Figure 6-1


    Backup Settings – Disabled (DB System Details Page)


    To enable PITR on a DB System, click the `Enable` link as shown. This will open
    a new `Edit Backup Plan` dialog where you can configure the feature. You can set
    the backup retention period (in days), enable PITR by ticking the `Enable point
    in time restore` tick box, and choose the backup window. Once your settings are
    ready, you can click the `Save Changes` button to enable PITR and automatic backups
    (if applicable). Figure 6-2 shows the `Edit Backup Plan` dialog.


    ![](images/527055_1_En_6_Chapter/527055_1_En_6_Fig2_HTML.jpg)


    A screenshot of the edit backup plan with 3 checklist buttons selected. The backup
    retention period sets as 10, and the save changes button is highlighted at the
    bottom.


    Figure 6-2


    Edit Backup Plan Dialog


    ### Note


    If you have a DB System running MySQL 8.0.28, you will need to update to MySQL
    8.0.29 at a minimum to use PITR. You can upgrade your DB System on the details
    page by clicking on the `Edit` link next to the MySQL version and choose the version
    you want to upgrade to from the list.


    Once the changes are saved, the DB System will enter an update period so that
    the MDS automation can complete the changes to the configuration in the background.
    Once complete, you will see the automatic backups and PITR enabled as shown in
    Figure 6-3.


    ![](images/527055_1_En_6_Chapter/527055_1_En_6_Fig3_HTML.jpg)


    A backup menu lists the automatic backup, backup window, retention days, and point-in-time
    restore. Automatic backup and point-in-time restore are enabled and highlighted
    with a rectangular box.


    Figure 6-3


    Backup Settings – Enabled (DB System Details Page)


    If you want to enable PITR on a new DB System, you can complete the same parameters
    on the Create DB System dialog in the Backup section as shown in Figure 6-4.


    ![](images/527055_1_En_6_Chapter/527055_1_En_6_Fig4_HTML.png)


    A dialog box of configure backup plan with enable automatic backup and enable
    point-in-time restore checkbox selected. The backup retention time is 7.


    Figure 6-4


    Backup Settings (Create DB System)


    Finally, you can list your backups by selecting the Backups list on the Resources
    menu on the DB System details page as shown in Figure 6-5.


    ![](images/527055_1_En_6_Chapter/527055_1_En_6_Fig5_HTML.png)


    A window page displays the backup list with the details on top, and the table
    to list the backups is at the bottom.


    Figure 6-5


    List of Backups (DB System Detail Page)


    Now that we know how to set up PITR, we can see a small demonstration on how to
    recover a DB System using PITR.


    ## Recovery


    Recovery of a DB System using PITR is very similar to recovery using any normal
    backup. The difference is in how you select the backup. If you choose to recover
    using a PITR entry, you will need to select the last backup from the list.


    To make this demonstration feasible, we will need to introduce an event from which
    we want to recover. A simple `DROP DATABASE` or similar SQL statement will suffice.
    In this case, I issued a `DROP DATABASE sakila`; command.


    I did so by logging into a compute instance then launched `MySQL Shell` on the
    compute instance to connect to a DB System. I then issued the `DROP` command at
    approximately 21:06 UTC. I logged into the compute instance with the following
    command using the `public IP address` as shown on the compute instance details
    page:


    ```bash

    ssh -i c:\users\cbell\.ssh\ssh-key-2022-08-16.key opc@150.136.69.126

    ```


    From there, I logged into MySQL using `MySQL Shell` with the following and dropped
    the database:


    ```

    [opc@connection-instance ~]$ mysqlsh --sql mysql_admin@10.0.1.226:33060

    MySQL Shell 8.0.30

    Copyright (c) 2016, 2022, Oracle and/or its affiliates.

    Oracle is a registered trademark of Oracle Corporation and/or its affiliates.

    Other names may be trademarks of their respective owners.

    MySQL  10.0.1.226:33060+ ssl  SQL > DROP DATABASE sakila;

    Query OK, 23 rows affected (0.1493 sec)

    ```


    Ok, now we have our event. Now, we can attempt to restore to a point prior to
    21:06 UTC. We can do so by clicking on `Restore to New DB System` using the context
    menu for the backup in our list as shown in Figure 6-6. If you have more backups
    from which to choose, you should choose the one dated most recently before the
    event from which you want to recover.


    ![](images/527055_1_En_6_Chapter/527055_1_En_6_Fig6_HTML.png)


    A window page displays the backup list with the details on top and the table with
    4 rows and 7 columns to list backups. In the view details, select and change restore
    to the new D B system.


    Figure 6-6


    Launching Restore to New DB System (Backups List on DB System Details Page)


    This launches a new dialog where you can change several parameters for the new
    DB System. The first section in the dialog concerns the backup settings as shown
    in Figure 6-7.


    ![](images/527055_1_En_6_Chapter/527055_1_En_6_Fig7_HTML.png)


    A dialog box to configure the source highlights restores from the D B system at
    any point, select a specific point in time and time.


    Figure 6-7


    Restore DB System from Backup (PITR)


    This is the area where you can specify that you want to restore to a specific
    point-in-time. Begin by clicking on the `Restore from DB System at a point in
    time`. Notice this allows you to choose the latest PITR period or a specific period.
    For this demonstration, we tick the `Select a specific point in time radio` button.
    Finally, you can enter a time period that occurs prior to your event. In this
    case, the last entry available is 21:03 UTC. Simply reduce the time shown by 5
    minutes segments to reach your desired time period.


    Once you click `Restore` button and the DB System is ready, we can log in and
    see that the `sakila` database is indeed present and the unwanted data change
    event has been recovered. Recall, there is much going on under the hood. MDS is
    restoring from the last known good backup and once restored, is applying the binary
    logs recorded since the backup. All this occurs without any intervention from
    the user. How cool is that?


    Recall, we must first log into a compute instance prior to launching `MySQL Shell`
    using the `Private IP Address` of the restored DB System as shown in Figure 6-8.


    ![](images/527055_1_En_6_Chapter/527055_1_En_6_Fig8_HTML.jpg)


    A menu of endpoints displays private IP addresses, internet F Q D N, My SQL part,
    and My SQL X Protocol port. Private IP address highlights with a rectangular box.


