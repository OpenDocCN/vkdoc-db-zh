    ### 较旧的 MySQL 版本


    还有一个兼容性问题需要考虑：MySQL 版本。迁移支持的最低版本是 MySQL 5.7.9。但是，如果你的版本比 MDS 中当前提供的版本（目前是 8.0.29）更旧，你应该考虑运行
    MySQL Shell 升级检查器实用程序，以查看迁移潜在问题的报告。有关此实用程序的更多信息，请参阅 MySQL Shell 用户指南 – 升级检查器实用程序
    ([`https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-utilities-upgrade.xhtml`](https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-utilities-upgrade.xhtml))。


    现在我们已经了解了数据迁移过程的一些知识，我们可以看到这些方法的示例来学习如何使用它们。在以下部分中，我们将看到通过首先将数据从本地 MySQL 服务器迁移到
    DB System，然后重新审视将数据从 DB System 迁移到本地 MySQL 服务器的过程，来实际操作导出和导入的示例。正如你将看到的，每个过程都需要使用导出和导入机制，我们将看到完成该过程的各种方式。这为你提供了将数据导入
    MDS 的选项，你可以根据需要进行调整。


    如果你想跟随下一部分的示例进行操作，你应该准备你的本地 MySQL 服务器只包含 `sakila` 和 `world` 数据库。如果你包含其他数据库，你可能需要调整所示的命令。你可以在
    [`https://dev.mysql.com/doc/index-other.xhtml`](https://dev.mysql.com/doc/index-other.xhtml)
    的 *Example Databases* 标题下找到这些示例数据库及其安装方法。


