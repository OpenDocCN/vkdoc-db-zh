    既然您已经了解了高可用性（HA）能够解决的目标或要求，现在让我们来讨论如何设置您的 DB 系统以使用 MDS 高可用性功能。


    ## 如何设置 HA


    在 DB 系统上设置 HA 非常简单。您只需要在创建 DB 系统时选择启用 HA 的选项，或在现有 DB 系统上启用 HA。以下部分将演示这两种情况。


    ### 设置 HA（创建 DB 系统）


