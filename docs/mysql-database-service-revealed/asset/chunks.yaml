    #### Create the ObjectStore Bucket


    Next, we need to create an ObjectStore bucket to store our data in from the export.
    In this example, we will create a bucket in the `oci-tutorial-compartment` named
    `mysql-data-bucket`. Begin by logging into OCI and choosing Storage | Buckets
    from the menu. You will see the ObjectStore bucket page as shown in Figure [7-5](#527055_1_En_7_Chapter.xhtml#Fig5).
    Be sure to select the correct compartment from the list as shown.


