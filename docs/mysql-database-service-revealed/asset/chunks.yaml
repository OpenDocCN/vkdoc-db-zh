    Figure 8-5


    Enable HA (DB System Details Page)


    Once you click *Enable*, you will see a dialog that explains what MDS will do
    to convert your standalone DB System to an HA DB System. Figure [8-6](#527055_1_En_8_Chapter.xhtml#Fig6)
    shows the enable HA dialog.


    ![](images/527055_1_En_8_Chapter/527055_1_En_8_Fig6_HTML.jpg)


    A dialog box of Enable high availability with 4 or 5 lines of text about the D
    B system. Enable button is at the bottom left and highlighted.


    Figure 8-6


    Enable HA Dialog (Existing DB System)


    When you are certain you want to proceed, you can click the *Enable* button. The
    results will be the same as the previous example of creating an HA DB System.


    Caution


    While point-in-time recovery is available for standalone DB Systems, it is not
    available for HA DB Systems. Thus, you may need to turn off point-in-time recovery
    to enable HA on a standalone DB System.


    However, if the shape you used for your standalone DB System is not compatible
    with MDS HA, you will see a dialog where you can choose a different shape. Simply
    choose a shape from the drop-down list then click the *Enable* button. Your data
    will not be erased, but you may incur additional charges for the new shape.


    ![](images/527055_1_En_8_Chapter/527055_1_En_8_Fig7_HTML.png)


    A dialog box of Enable high availability with few lines of text about the D B
    system. Configuration is selected from the scroll box. Enable button is at the
    left and highlighted.


    Figure 8-7


    Change Shape on Enable HA (Existing DB System)


    This process may take a few moments to run, so be prepared to wait until the HA
    feature is enabled on your DB System.


    Note


    Enabling HA on an existing DB System will increase cost because you will be adding
    two additional DB Systems and data storage for the secondaries. Fortunately, any
    additional networking loads for the HA feature support are not billed.


    ### Disable HA (Existing HA DB System)


    Surprisingly, you can disable HA on an existing HA DB System. Simply choose the
    *Disable* link on the DB System details page under the High Availability section
    as shown in Figure [8-8](#527055_1_En_8_Chapter.xhtml#Fig8).


    ![](images/527055_1_En_8_Chapter/527055_1_En_8_Fig8_HTML.jpg)


    A Database system detail page has a high availability menu that displays high
    availability as Enable.


    Figure 8-8


    Disable HA (Existing DB System)


    Once you click on *Disable*, you will be asked to confirm the operation as shown
    in Figure [8-9](#527055_1_En_8_Chapter.xhtml#Fig9). Once confirmed, click the
    *Disable* button on the dialog to disable HA on your DB System. This may take
    some time to complete.


    ![](images/527055_1_En_8_Chapter/527055_1_En_8_Fig9_HTML.jpg)


    A dialog box to disable high availability. A text asks are sure you want to disable
    the high availability? If you are sure, select the disable button on the bottom
    left and it is highlighted.


    Figure 8-9


    Confirm Disable HA


    ## How to Use MDS HA


    Once again, failover will occur automatically, but if you want to perform a switchover,
    you can do so by either choosing the context menu on the list of DB Systems or
    choosing Switchover from the menu as shown in Figure [8-10](#527055_1_En_8_Chapter.xhtml#Fig10).


    ![](images/527055_1_En_8_Chapter/527055_1_En_8_Fig10_HTML.png)


    A table lists the Database system. The create D B system button is at the top
    left. click the dots on the right side and select the switch over from that menu.


    Figure 8-10


    Selecting Switchover (DB Systems List)


    You can also use the More Actions menu on the DB System details page and choose
    Switchover as shown in Figure [8-11](#527055_1_En_8_Chapter.xhtml#Fig11).


    ![](images/527055_1_En_8_Chapter/527055_1_En_8_Fig11_HTML.jpg)


    The detail page of the D B system displays the general information details. Select
    the more action option from the tabs and select switchover from the menu.


    Figure 8-11


    Selecting Switchover (DB System Details Page)


    In either case, you will be presented with a dialog where you will need to choose
    the availability of fault domain of the secondary you want to promote as shown
    in Figure [8-12](#527055_1_En_8_Chapter.xhtml#Fig12).


    ![](images/527055_1_En_8_Chapter/527055_1_En_8_Fig12_HTML.png)


    A dialog box for switchover with 3 available domains. The A D-1 is primary, A
    D-2 and A D-3 are secondary. Select the switchover button on the bottom left.


    Figure 8-12


    Switchover Dialog


    Once you select a different availability domain and click the *Switchover* button,
    the status of the DB System changes to Updating, and the selected instance becomes
    the primary.


    ## Limitations


    There are a number of limitations for using HA DB Systems as listed below:


    *   *Backup*: You cannot restore a standalone DB System backup on an HA DB System.


    *   *HA Configuration*: You cannot change the configuration of an HA DB System.
    However, you can use a backup of an HA DB System to restore to a new HA DB System
    with a different HA configuration.


    *   *HeatWave*: You cannot use HeatWave on an HA DB System.


    *   *MySQL Version*: HA DB Systems must use MySQL 8.0.24 or later.


    *   *Point-in-Time Recovery*: You cannot use PITR on an HA DB System.


    *   *Rolling Upgrades*: When HA DB Systems are upgraded, rolling upgrades are
    used where each DB System (primary and secondaries) is upgraded that incur a brief
    downtime period before the new primary is available.


    *   *Secondary Access*: You cannot access the secondary instances directly, using
    MySQL Shell, or any other such client.


    *   *Shapes*: You must choose certain shapes available for HA and the maximum
    size of transaction is limited by shape. See the *Limitations* section at [`https://docs.oracle.com/en-us/iaas/mysql-database/doc/high-availability1.xhtml`](https://docs.oracle.com/en-us/iaas/mysql-database/doc/high-availability1.xhtml)
    for more information.


    ## Advanced Topics


    The HA features of MDS include two additional, advanced topics that bear mentioning.
    If your existing on-prem MySQL servers use replication and you want to replication
    to/from MDS, you can do so using features named inbound replication and outbound
    replication.


    These features are designed to allow you to create a hybrid cloud solution where
    part of your MySQL solution may be on-prem and the rest in OCI (MDS). These technologies
    can also be used to synchronize data between on-prem and MDS MySQL servers.


    Inbound replication uses a replication channel configured in MDS to copy transactions
    from an on-prem MySQL server (or another DB System elsewhere) called the source
    to a DB System called the replica. See [`https://docs.oracle.com/en-us/iaas/mysql-database/doc/inbound-replication.xhtml`](https://docs.oracle.com/en-us/iaas/mysql-database/doc/inbound-replication.xhtml)
    for more information about setting up inbound replication.


    Outbound replication does the reverse. It uses a replication channel configured
    in MDS to copy transactions from a DB System to an on-prem (or another DB System
    elsewhere) called the replica. The channel connects the DB System (source) to
    the replica and copies transactions from the source to the replica.'
