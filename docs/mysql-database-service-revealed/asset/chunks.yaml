    name with `mysql-data-bucket` on the create bucket dialog as shown in Figure [7-6](#527055_1_En_7_Chapter.xhtml#Fig6).
    We can use the defaults for the other options listed. More specifically, we will
    use the standard bucket tier and the standard Oracle-managed encryption keys.
    Yes, buckets are encrypted by default. Nice.


    ![](images/527055_1_En_7_Chapter/527055_1_En_7_Fig6_HTML.png)


    A dialog box with the bucket name is highlighted. Default storage is selected
    as the default and select encrypt using oracle managed keys.


