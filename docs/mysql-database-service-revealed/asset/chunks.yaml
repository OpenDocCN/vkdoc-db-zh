    # 4. MySQL Database Service


    If you are new to MySQL and read through the last chapter, you are now familiar
    enough with MySQL to appreciate its power and simplicity. However, if you are
    a long-term MySQL user and you’ve built your own MySQL servers into your infrastructure,
    chances are you are well aware of the effort needed to manage your MySQL servers.
    What the world has needed for some time is a fully managed cloud-based MySQL service
    that runs in a secure environment with the backing of a cloud vendor that provides
    real-time management of the service to ensure your database needs are fully fulfilled
    and reliable. That day has come, and it is the MySQL Database Service running
    on the Oracle Cloud Infrastructure owned and managed by Oracle.


    And now that we understand more about the Oracle Cloud Infrastructure (OCI) and
    MySQL, we can move on to learning how to use and work with MySQL in OCI, which
    is named the MySQL Database Service, hence MDS. Within that service is a resource
    called a database system, hence DB System. This is the OCI resource that provides
    the managed MySQL server for your use.


    Recall from Chapter [1](#527055_1_En_1_Chapter.xhtml) that the DB System is built
    on top of existing OCI resources including a compute instance and block storage.
    However, there are more components used and managed behind the scenes.


    This fully managed service provides a number of advantages for you including not
    having to set up hardware, install the operating system, install MySQL, configure
    everything to work nicely, etc., initially and then, later on, you won’t have
    to worry about updates or upgrades to the base operating system or even MySQL
    – all those tasks are taken care of by automation within OCI and overseen by the
    MySQL engineering branch themselves. Sweet!


    ## Managed Mysql Responsibilities


    The word, managed, is used to describe how MySQL is operated in OCI. While this
    includes things we’ve discussed such as setup, configuration, and upgrades, what
    else is included and what exactly is the customer versus Oracle’s responsibility?


    Oracle is responsible for ensuring backup and recovery mechanisms are available
    and, if requested, automated backups are executed on schedule, MySQL version patching
    and upgrades, operating system patches and upgrades, monitoring the system for
    anomalies and responding to urgent issues, and ensuring your DB Systems execute
    in a secure environment. The customer is responsible for modeling, designing,
    and maintaining any schemas (databases) created, query design and optimization,
    and data access and retention policies.


    Thus, maintenance tasks to keep the MySQL server running successfully are the
    realm of Oracle’s responsibility while the data and access to it are the responsibility
    of the customer.


    In this chapter, we will return to our OCI account and learn how to set up and
    use an MDS database system. We will take a short tour of the MDS service and a
    DB System via the cloud console so that we fully understand what all of the things
    are on the page. Thus, we’re going to dive a bit deeper! Let’s get started.


    ## Getting Started


    If you have been following along with the OCI and MySQL tutorials in Chapters
    [2](#527055_1_En_2_Chapter.xhtml) and [3](#527055_1_En_3_Chapter.xhtml), you should
    have an OCI account setup and be familiar with the terminology and SQL commands
    commonly used in MySQL. If you haven’t worked through at least the OCI tutorial
    in Chapter [2](#527055_1_En_2_Chapter.xhtml), you may want to review that chapter
    first.


    There are several prerequisites you must have in place before you can begin deploying
    your first DB System. The following steps summarize those things we will need
    to set up in our OCI account:


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig1_HTML.png)


    A banner displays the My S Q L prerequisites. 3 steps followed by the tenancy
    administrator to perform the task are mentioned. Few hyperlinks are found to create
    or add users to the groups.


    Figure 4-1: First-Time MDS Use Banner


    1.  You must have a Virtual Cloud Network (VCN) in which to place your MySQL resources.

    2.  You must create a user group and add at least one user to the group.

    3.  You must create a policy that allows the group certain privileges to work
    with MDS and DB Systems.


    If you do not have all of these conditions, you may not be able to deploy a DB
    System. Interestingly, OCI produces a banner at the top of the MDS resource page
    as shown in Figure [4-1](#527055_1_En_4_Chapter.xhtml#Fig1).


    Notice it outlines all three steps along with the privileges you will need to
    grant via a policy on the root compartment. Also, notice at the bottom of the
    banner is a link to turn off the notice. It is recommended you don’t turn off
    the banner until after your first successful DB System deployment.


    Let’s go through all three steps and see a demonstration of how to satisfy each.
    Be sure to first login to your OCI account by visiting `cloud.oracle.com`.


    **Note:** We will omit images showing menu selections and similar mundane operations
    going forward as we’ve had enough practice on those in Chapter [2](#527055_1_En_2_Chapter.xhtml).'
