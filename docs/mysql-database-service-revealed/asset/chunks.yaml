    },

    {

    "compartment-id": "ocid1.compartment.MASKED",

    "id": "ocid1.availabilitydomain.MASKED",

    "name": "DRUu:US-ASHBURN-AD-2"

    },

    {

    "compartment-id": "ocid1.compartment.MASKED",

