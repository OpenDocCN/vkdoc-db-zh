    results of each option.


    ```

    mysql> SELECT plant_name, sensor_value FROM greenhouse.plants WHERE plant_name
    = ''fern on deck'' ORDER BY sensor_value ASC;

    +--------------+--------------+

    | plant_name   | sensor_value |

    +--------------+--------------+

