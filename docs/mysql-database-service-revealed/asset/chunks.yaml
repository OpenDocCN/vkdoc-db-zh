    Finally, we can create a mount point and mount the drive as shown below:


    ```

    $ sudo mkdir /mnt/data

    $ sudo mount /dev/sdb /mnt/data

    $ ls -lsa /mnt/data

    total 0

    0 drwxr-xr-x. 2 root root  6 Mar 13 02:43 .

    0 drwxr-xr-x. 3 root root 18 Mar 13 02:35 ..

    ```


    And now we can use the drive to store applications and data.


    Persistent Mount


    If you plan to use the compute instance with an attached block volume for more
    than experimentation or more than a single session, you will want to make the
    mapping permanent. To do so, you will need to edit the `/etc/fstab` file. To do
    so, you will need the UUID for the block volume. You can find the UUID using the
    `sudo blkid` command. Once you have the UUID, add the following line to the `/etc/fstab`
    file then run `sudo mount -a` to check the mapping:


    ```

    UUID= /mnt/data xfs defaults,_netdev,nofail 0 2

    ```


    Once that is done, the drive will be mapped on boot.


