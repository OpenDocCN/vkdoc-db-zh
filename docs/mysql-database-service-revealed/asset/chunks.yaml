    *   *Data Masking*: You can protect your data using data masking to hide sensitive
    data. See *Data Masking* at [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml).


    *   *Deletion Plan*: Consider using a deletion plan to further protect your DB
    Systems from delete operations. See *Advanced Option Deletion Plan* at [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/creating-db-system.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/creating-db-system.xhtml).


    *   *IAM Policies*: Use Identity and Access Management policies to control access.
    See *Required IAM Policy* at [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/mysql-database-service-overview.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/mysql-database-service-overview.xhtml).


    *   *In-transit Encryption*: While data is encrypted at rest, you may want to
    use in-transit encryption to further protect your data. See *Data Security* at
    [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/mysql-database-service-overview.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/mysql-database-service-overview.xhtml).


    *   *MySQL Authentication*: Use the `authentication_oci` plugin to map MySQL users
    to existing users and groups defined in the IAM service. See *Connecting to a
    DB System Using authentication_oci Plugin* at [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/connecting-db-system.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/connecting-db-system.xhtml).


    *   *MySQL Connection Control*: The MySQL Database Service supports connection-control
    plugin to provide a deterrent that slows down brute force attacks against MySQL
    user accounts. See *Plugins and Components* at [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml).


    *   *MySQL Password Validation*: Use the `validate_password` component to enforce
    password generation by setting rules for complexity and frequency of mandatory
    changes. See *Plugins and Components* at [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml).


    *   *MySQL Security*: Plan MySQL security features to control access to your data.
    See [`https//dev.mysql.com/doc/refman/8.0/en/access-control.xhtml`](http://dev.mysql.com/doc/refman/8.0/en/access-control.xhtml).


    *   *Networking Load Balancer*: Consider restricting access via the Internet to
    a specific or range of IP addresses and use in-transit encryption. Also, consider
    using the networking load balancer. See *Connecting to a DB System Using a Network
    Load Balancer* at [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/connecting-db-system.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/connecting-db-system.xhtml).


    *   *VCN Security Groups*: Use virtual cloud networking security groups or security
    lists of the VCN to restrict the authorized public IP addresses to a single IP
    address or a range of IP addresses. See *Adding Ingress Rules* Using at [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/networking-setup-mysql-db-systems.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/networking-setup-mysql-db-systems.xhtml).


    *   *VCN Connection Restrictions*: You can configure your DB Systems to use private
    subnets of your VCN to restrict connections to either a VPN connection or use
    a Bastion Session. See *Bastion Session* at [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/networking-setup-mysql-db-systems.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/networking-setup-mysql-db-systems.xhtml)
    or *VPN Connection* at [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/networking-setup-mysql-db-systems.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/networking-setup-mysql-db-systems.xhtml).


    While the list contains terse descriptions, you should consider investigating
    each of the links for more detailed information for planning and implementing
    a secure MDS installation.'
  trans: '## 规划你的数据库系统


    系统管理与规划密不可分。想要成功，更是如此。在规划云解决方案时，这一点尤为突出。我们必须提前规划好如何设置、配置和部署我们的产品与服务，否则将面临意外问题和延误的风险。MDS
    也不例外，你最好提前规划好希望在其环境中如何使用它。


    本节中的信息将为你提供针对 MDS DB 系统的具体规划领域的见解。你应将本节视为额外资源，与你现有的用于规划 DB 系统的策略、实践和工具结合使用。以下列出了一些需要刻意规划的关


    *   为 DB 系统的管理和应用程序访问创建独立的用户账户

    *   配置数据规模，并以此为依据规划 DB 系统的规模

    *   考虑计算实例（用于 DB 系统）的规模（CPU、内存）

    *   制定升级到高可用性的计划

    *   研究所有 OCI 服务的相关成本，并创建支出预测以设定预期

    *   仔细规划安全性，确保保护你的云资源


    其中大部分是我们在本书过程中已经讨论过的内容，但有些可能对你来说是新的，尤其是如果你没有使用过本地部署的 MySQL。


    然而，最关键的是规划 DB 系统的规模和成本。你应该在这些任务上花费一些时间，因为更改 DB 系统的规模（形状）可能并非易事，并且可能需要一些停机时间来进行重新配置。幸运的是，Oracle
    提供了执行此操作的选项，你可以通过备份并在具有不同形状和存储大小的新 DB 系统上进行恢复来实现。提前花时间进行规划，特别是预测你的 OCI 成本，将帮助你在最好地满足需求的同时控制支出。你会惊讶于有多少功能可以以较低的成本获得，但如果你没有为增长制定一个可靠的计划，这种经济性可能会累积成可观的开支。


    另一个需要考虑的关键领域是安全性。我们将在下一节讨论安全性。


    ## 安全最佳实践


    回顾前面的章节，你必须在 OCI 中创建账户来划分管理功能和使用功能。还要记住，建议为你的 DB 系统创建独立的用户账户，用于用户访问或应用程序访问。因此，有一份详尽的安全考虑事项清单。由于安全性对任何解决方案都至关重要，让我们讨论一下你应该考虑或计划为你的
    OCI 解决方案实施的几个安全领域。以下按类别列出了你在规划时应研究的项目并进行了简要描述。提供了链接以获取更多文档：


    *   `审计服务`：利用审计服务查看 OCI API 活动。请参阅 [`https//docs.oracle.com/iaas/Content/Audit/Concepts/auditoverview.xhtml`](http://docs.oracle.com/iaas/Content/Audit/Concepts/auditoverview.xhtml)。

    *   `数据脱敏`：你可以使用数据脱敏来保护数据，隐藏敏感信息。请参阅 *数据脱敏* 部分 [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml)。

    *   `删除计划`：考虑使用删除计划来进一步保护你的 DB 系统免受删除操作的影响。请参阅 *高级选项：删除计划* [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/creating-db-system.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/creating-db-system.xhtml)。

    *   `IAM 策略`：使用身份和访问管理策略来控制访问。请参阅 *必需的 IAM 策略* [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/mysql-database-service-overview.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/mysql-database-service-overview.xhtml)。

    *   `传输中加密`：虽然数据在静态时已加密，但你可能希望使用传输中加密来进一步保护数据。请参阅 *数据安全* 部分 [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/mysql-database-service-overview.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/mysql-database-service-overview.xhtml)。

    *   `MySQL 身份验证`：使用 `authentication_oci` 插件将 MySQL 用户映射到 IAM 服务中定义的现有用户和组。请参阅
    *使用 authentication_oci 插件连接到 DB 系统* [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/connecting-db-system.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/connecting-db-system.xhtml)。

    *   `MySQL 连接控制`：MySQL 数据库服务支持连接控制插件，以提供一种威慑手段，减缓针对 MySQL 用户账户的暴力攻击。请参阅 *插件和组件*
    [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml)。

    *   `MySQL 密码验证`：使用 `validate_password` 组件通过设置复杂性和强制性更改频率的规则来强制执行密码生成。请参阅 *插件和组件*
    [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml)。

    *   `MySQL 安全性`：规划 MySQL 安全功能以控制对数据的访问。请参阅 [`https//dev.mysql.com/doc/refman/8.0/en/access-control.xhtml`](http://dev.mysql.com/doc/refman/8.0/en/access-control.xhtml)。

    *   `网络负载均衡器`：考虑将通过互联网的访问限制在特定 IP 地址或 IP 地址范围内，并使用传输中加密。同时，考虑使用网络负载均衡器。请参阅 *使用网络负载均衡器连接到
    DB 系统* [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/connecting-db-system.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/connecting-db-system.xhtml)。

    *   `VCN 安全组`：使用虚拟云网络安全组或 VCN 的安全列表，将授权的公共 IP 地址限制为单个 IP 地址或 IP 地址范围。请参阅 *使用...添加入站规则*
    [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/networking-setup-mysql-db-systems.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/networking-setup-mysql-db-systems.xhtml)。

    *   `VCN 连接限制`：你可以将 DB 系统配置为使用 VCN 的私有子网，将连接限制为仅限 VPN 连接，或使用堡垒机会话。请参阅 *堡垒机会话*
    [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/networking-setup-mysql-db-systems.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/networking-setup-mysql-db-systems.xhtml)
    或 *VPN 连接* [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/networking-setup-mysql-db-systems.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/networking-setup-mysql-db-systems.xhtml)。


    虽然该列表包含了简略描述，但你应该考虑研究每一个链接，以获取有关规划和实现安全 MDS 安装的更详细信息。'
- fmt: '## Summary


    The task of planning an MDS installation is not overly complex but does require
    some forethought and a deliberate plan. Like any technology, we should start small
    with a simple experimental installation for testing as many aspects of the technology
    as possible. This includes not only the mechanics of setting up a DB System but
    also the specifics of configuring the networking and security for accessing and
    protecting your data. It also gives you an opportunity to ensure and learn how
    to connect your application to your DB System.


    In this chapter, we learned some important considerations for planning your DB
    Systems including how to get help using the OCI documentation, where to go for
    additional help, and configuration considerations for shapes, disk storage, networking,
    and security.


    This is an exciting time for MySQL users. Oracle continues to keep its promise
    to not only continue developing MySQL but also pouring resources into improving
    and expanding the feature set into the cloud, which is a game-changing technology
    that removes the burden (and expense) of building your own complex (and expensive)
    on-prem MySQL installation. For those that want to reduce costs and improve capabilities
    by leveraging cloud services, OCI and MDS should be your weapon of choice.


    While already a capable and dependable service that is up to the challenge of
    fulfilling your database needs, keep a close watch on the Oracle Cloud Infrastructure
    for more excellent features, new MySQL services, and further refinement and updates
    to the MySQL Database Service.'
