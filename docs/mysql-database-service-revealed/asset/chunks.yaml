  trans: '

    # 移动备份


    备份包含在创建它们的 compartment 中。您无法在一个 compartment 中使用另一个 compartment 的备份（例如用于恢复）。您必须先将备份移动到其他
    compartment 才能使用它。


    ## 注意


    只有处于活动状态的备份才能被移动。处于任何其他状态的备份无法被移动到其他 compartment。


    如果您需要操作多个 compartment，您可能需要或希望将备份移动到不同的 compartment。例如，您可能希望恢复位于另一个 compartment
    中的某个 DB 系统的数据，可能是为了建立开发环境的基线、复制数据用于其他分析等。


    ## 注意


    发起移动的用户必须在目标 compartment 拥有 `MYSQL_BACKUP_MOVE` 权限。更多详情请参见 [`https://docs.oracle.com/en-us/iaas/mysql-database/doc/policy-details-mysql-database-service.xhtml`](https://docs.oracle.com/en-us/iaas/mysql-database/doc/policy-details-mysql-database-service.xhtml)。


    要将备份移动到其他 compartment，您可以通过云控制台菜单导航到备份列表，选择 `数据库` | `备份`，然后点击上下文菜单并选择 `移动资源`，如图
    5-17 所示。


    ![](img/527055_1_En_5_Fig17_HTML.png)


    显示一个带文本框的对话框，其中包含以下列表选项。查看详情、恢复到新系统、编辑、复制 O C I D、移动资源、添加标签、查看标签和删除，其中“移动资源”选项被选中。


    图 5-17

    移动资源（MDS 备份列表）


    点击 `移动资源` 后，您将看到一个带有一个下拉列表的对话框，您可以在其中选择要将备份移动到的 compartment。图 5-18 显示了该对话框。


    ![](img/527055_1_En_5_Fig18_HTML.jpg)


    显示一个标题为“将资源移动到其他 compartment”的对话框。在对话框中，“移动备份”选项被标记为选中。


    图 5-18

    移动资源对话框


    只需从列表中选择目标 compartment，然后点击 `移动备份` 按钮即可移动备份。请注意，示例中显示了将备份移动到 `mysql-development`
    compartment。操作仅需片刻，完成后，备份将从当前列表中移除。


    ## 注意


    您无法选择备份当前所在的 compartment。


    这是因为 MDS 备份列表使用 compartment 作为过滤器。由于我们之前查看的是 `oci-tutorial-compartment`，但我们将资源移动到了
    `mysql-development` compartment，因此我们必须更改 `Compartment` 过滤器才能看到该备份，如图 5-19 所示。


    ![](img/527055_1_En_5_Fig19_HTML.png)


    显示一个标题为“mysql-development compartment 中的备份”的对话框，其中“备份”选项被选中。表格包含以下列：名称、状态、创建类型、保留天数、大小和创建时间。


    图 5-19

    显示 mysql-development compartment 中的备份


    现在您可以在 `mysql-development` compartment 中使用该备份了。您可以随时按需移动备份，但请记住，除非您将备份移动到某个 compartment，否则无法在该
    compartment 中使用它们。


    现在，让我们了解一下可以如何恢复我们的数据（备份）。


    # 恢复


    MDS DB 系统中的恢复操作并非一个独立的功能或资源。它实际上是备份资源的一个功能。这与其他操作系统和数据库备份工具的工作方式略有不同，因此，为了避免混淆，我们为
    MDS 和 MDS 备份的新用户将恢复操作单独列出。


    当您恢复备份时，您并不是将数据恢复到同一个 DB 系统。MDS（以及其他 OCI）资源被设计并实现为“使用...创建新资源”的操作。因此，恢复备份意味着您将使用备份中的数据以及随备份存储的某些配置元数据来创建一个新的
    DB 系统。一旦您习惯了这个新流程，您可能会发现它在某些情况下很有用，例如当您为了诊断目的而希望恢复备份，并同时拥有当前的和恢复的 DB 系统会很有优势时。


    由于恢复操作会使用备份中的数据创建一个新的 DB 系统，用于创建恢复的对话框与用于创建新 DB 系统的对话框非常相似。因此，其中一些细节可能非常熟悉，但我们为了完整性和清晰性仍将其包含在内。


    只有一个非常重要的方面需要考虑。新的 DB 系统不能使用与现有、正在运行的 DB 系统相同的 IP 地址。如果您想使用相同的 IP 地址，必须先删除现有的
    DB 系统。


    另一件需要考虑的事情是，新的 DB 系统将保留来自原始 DB 系统的管理员凭据，因此您无需重新创建管理员帐户和密码。


    ## 注意


    如果您想跟随此演示操作，请务必为您的现有 DB 系统创建一个手动备份，以便您有一个可用于恢复的备份。


    要恢复备份，首先使用云控制台主导航到 DB 系统备份列表，然后选择 `数据库` | `备份`，接着为您想要恢复的备份从上下文菜单中点击 `恢复到新 DB 系统`，如图
    5-20 所示。在此情况下，我们看到一个已采取的手动备份，我们想要恢复它。原始 DB 系统仍然处于活动运行状态。


    ![](img/527055_1_En_5_Fig20_HTML.png)


    显示一个列标题为名称、状态、D B 系统、创建类型、保留天数、大小和创建时间的对话框。右侧有一个文本框，其中“恢复到新 D B 系统”选项被标记为选中。


    图 5-20

    恢复到新 DB 系统（DB 系统备份列表）


    您也可以导航到备份详情页面并点击 `恢复到新 DB 系统` 按钮，如图 5-21 所示，来开始恢复过程。


    ![](img/527055_1_En_5_Fig21_HTML.png)


    显示 o c i 教程 my s q l 备份页面的截图，包含备份信息和标签选项卡。还显示了资源、编辑、移动、添加标签和删除选项。左侧有一个带有 B 字样的矩形框。


    图 5-21

    恢复到新 DB 系统（备份详情页面）


    一旦您点击该按钮，“恢复到新 DB 系统”对话框将会出现。我们需要提供的信息包括以下内容：


    *   `名称`：DB 系统的名称。

    *   `描述`（可选）：提供您自己使用的描述，用于解释 DB 系统，例如其创建原因、分配给哪些项目等。您应避免在描述中包含任何机密数据。

    *   `网络`：您需要为 DB 系统选择 VCN 和子网。

    *   `可用性域`（放置）：选择可用性域。

    *   `硬件`：选择数据存储（块卷）的形状和大小。

    *   `备份计划`：您可以选择是否开启自动备份。


    由于该对话框相当长，并且看起来与创建新 DB 系统的对话框非常相似，我们将从顶部开始分部分介绍该对话框。如果您正在跟随进行自己的恢复操作，您可能需要向下滚动才能看到对话框的所有部分。

    '
- fmt: '# 从备份还原数据库系统


    首先，我们必须选择数据源。根据您启动还原的方式，此信息可能已为您填写。我们必须选择是从备份还原还是执行时间点还原（在第 6 章中有解释）。在此示例中，我们是从备份还原，因此数据源已为我们选定。图
    [5-22] 显示了对话框的数据源部分。


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig22_HTML.png)


    图 5-22 还原数据库系统（第 1 部分）


    ## 配置源


    一个标题为“配置源”的对话框，其中“从备份还原”选项标记为已选中。


    ## 提供数据库系统信息


    “名称”部分允许您为还原的数据库系统指定名称。MDS 会为您提供一个默认名称，但您很可能需要更改它。您还可以添加描述。MDS 会为您提供一个描述，其中包含还原的来源或出处，包括备份的名称、还原的日期和时间以及备份
    ID（备份的 OCID）。图 [5-23] 显示了对话框的名称部分。


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig23_HTML.png)


    图 5-23 还原数据库系统（第 2 部分）


    一个标题为“提供数据库系统信息”的对话框。“独立单实例数据库系统”选项标记为已选中。


    在此示例中，我们将还原为 `oci-tutorial-mysql` 数据库系统创建的手动备份之一，并将其命名为 `test-mysql-restore`。输入信息后，向下滚动到下一部分。


    ## 配置网络与放置位置


    在下一部分中，我们必须选择希望在其中还原备份的 compartment，但请记住，您应将备份还原到备份创建时所在的同一 compartment 中的数据库系统。我们还需要选择要使用的
    VCN 和可用性域。您会注意到，MDS 在这里已为您选择了正确的 compartment、VCN 和可用性域，如图 [5-24] 所示。


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig24_HTML.png)


    图 5-24 还原数据库系统（第 3 部分）


    一个对话框包含两个标题：“配置网络”和“配置放置位置”。在“配置放置位置”框中，“AD 2”选项标记为已选中。


    如果您想在与当前 compartment 不同的 compartment 中启动数据库系统，可以从列表中选择不同的 compartment。如果您不选择其他
    compartment，则将使用备份所在的同一 compartment。


    如果您正在使用自己的帐户进行操作，您应该看到 `oci-tutorial-vcn` 在 *Virtual Cloud Networking in oci-tutorial-compartment*
    列表中被选中，`Private Subnet oci-tutorial-vcn (Regional)` 条目在 *Subnet in oci-tutorial-compartment*
    列表中被选中，可用性域 2 (*AD-2*) 在 *Configure placement* 框中被选中。检查完选择后，向下滚动到下一部分，即 *Configure
    hardware* 部分。在这里，我们可以选择更改配置（shape）和更改数据存储的大小，如图 [5-25] 所示。


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig25_HTML.png)


    图 5-25 还原数据库系统（第 4 部分）


    一个标题为“配置硬件”的对话框。提供两个框，标题分别为：选择配置，以及数据存储大小（GB）。


    ## 配置硬件


    由于我们是从备份创建新的数据库系统，我们将使用默认设置，但您可以借此机会更改设置。只需确保数据的新大小足以存储您的数据即可。


    > **注意**

    > 如果您选择的配置比创建备份时使用的配置小，您必须确保新配置具有支持数据库系统所需的正确资源。例如，您必须确保有足够的处理器和内存分配以满足性能预期，并有足够的磁盘空间分配来还原数据。


    > **重要提示**

    > 从备份还原时，无法更改数据库系统的类型。例如，如果原始数据库系统是“独立”型，您的新数据库系统也将是“独立”型。


    ## 配置备份计划


    下一部分允许您选择启用自动备份、保留期和开始时间，如图 [5-26] 所示。此信息将与用于备份的数据库系统相同，但您可以更改选项。如果启用了时间点还原，您可以通过勾选所示的复选框来禁用它。


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig26_HTML.png)


    图 5-26 还原数据库系统（第 5 部分）


    一个标题为“配置备份计划”的对话框。提供两个框，标题分别为：备份保留期，和窗口开始时间。“启用自动备份”和“选择备份窗口”选项标记为已选中。


    ## 摘要与最终配置


    最后一部分是一个摘要，包含多个选项卡，允许您更改许多配置项，包括以下内容。同样，默认情况下，设置将与用于备份的原始数据库系统相同：


    *   **删除计划**：显示数据库系统的删除计划，包括是否启用、自动备份的保留时间以及最终备份的状态。启用/禁用链接是用于启用或禁用删除计划的快捷方式。

    *   **配置**：显示有关数据库系统的信息，包括其配置、内存和存储大小、MySQL 版本和配置，以及是否启用了崩溃恢复。存储大小旁边的编辑链接是更改数据库系统存储大小的快捷方式。

    *   **崩溃恢复**：启用或禁用崩溃恢复。禁用崩溃恢复可以提高性能，但也会关闭自动备份。请明智使用。

    *   **管理**：显示 MDS 维护窗口开始时间。请务必选择您使用量最低的时间段，以避免潜在冲突。

    *   **网络**：显示主机名、IP 地址和 MySQL 端口。除非您想自定义端点，否则不应更改这些设置。

    *   **标签**：显示数据库系统的标签。您也可以添加标签。


    图 [5-27] 显示了还原备份对话框的摘要部分。


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig27_HTML.png)


    图 5-27 还原数据库系统（第 6 部分）


    一个对话框包含以下标题：删除计划、配置、崩溃恢复、管理、网络和标签。其中选择了“网络”选项，“还原”标记为已选中。


    ## 执行还原


    一旦您通过这些选项卡决定了任何自定义设置，并准备好从备份还原数据库系统，就可以单击 *还原* 按钮。


    还原完成后，您将在数据库系统列表中看到它，并且现在可以访问新的数据库系统。如果您还原了正在使用的数据库系统的备份，则将生成一个新的端点，因此请务必检查还原的数据库系统详细信息页面以获取详细信息。例如，图
    [5-28] 显示了上述还原的数据库系统上的新端点。


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig28_HTML.jpg)


    图 5-28 已还原数据库系统详细信息页面（新端点）


    一个标题为“端点”的对话框。提供以下详细信息：私有 IP 地址、内部 FQDN、可用性域、故障域、MySQL 端口，以及 MySQL X 协议端口。


    如果您遵循本章开头的教程创建了新的数据库系统，当您导航到已还原的数据库系统详细信息页面时，应该会看到一个不同的端点。


    这就结束了我们对 MDS 备份和还原操作的探讨。'
  raw: 'First, we must select the source. Depending on how you initiated the restore,
    this information may be filled out for you. We must select whether we are restoring
    from a backup or a point-in-time restore, which is explained in Chapter [6](#527055_1_En_6_Chapter.xhtml).
    In this example, we are restoring from a backup so the source is chosen for us.
    Figure [5-22](#527055_1_En_5_Chapter.xhtml#Fig22) shows the source portion of
    the dialog.


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig22_HTML.png)


    A dialog box titled configure the source is given where the option, restore from
    a backup is marked as selected.


    Figure 5-22


    Restore DB System (Part 1)


    The name section allows you to specify a name for the restored DB System. MDS
    will provide a default name for you, but you most likely will want to change it.
    You can also add a description. MDS will provide a description for you that includes
    the source or origin for the restore including the name of the backup, date and
    time of the restore, as well as the backup id (the OCID for the backup). Figure
    [5-23](#527055_1_En_5_Chapter.xhtml#Fig23) shows the name section of the dialog.


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig23_HTML.png)


    A dialog box titled, provide D B system information. The standalone single-instance
    D B system is marked as selected.


    Figure 5-23


    Restore DB System (Part 2)


    For this example, we are going to restore one of the manual backups taken of the
    `oci-tutorial-mysql` DB System and we’re restoring it with the name `test-mysql-restore`.
    Once you enter the information, scroll down to the next section.


    In the next section, we must select the compartment where we want to restore the
    backup, but keep in mind you should restore the backup to a DB System in the same
    compartment where the backup was taken. We also select the VCN to use and the
    availability domain. You will notice here MDS has chosen the correct compartment,
    VCN, and availability domain for you as shown in Figure [5-24](#527055_1_En_5_Chapter.xhtml#Fig24).


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig24_HTML.png)


    A dialog box is given with two titles configure networking and configure placement.
    Option, A D 2 is marked as selected in configure placement box.


    Figure 5-24


    Restore DB System (Part 3)


    If you want to launch the DB System in a compartment other than the current compartment,
    you can select a different compartment from the list. If you do not select a different
    compartment, the same compartment where the backup resides is used.


    If you are following along with your own account, you should see the `oci-tutorial-vcn`
    is selected in the *Virtual Cloud Networking in oci-tutorial-compartment* list
    and the `Private Subnet oci-tutorial-vcn (Regional)` entry is selected in the
    *Subnet in oci-tutorial-compartment* list and availability domain 2 (*AD-2*) is
    selected in the *Configure placement* box. Once you inspect the selections, scroll
    down to the next section, which is the *Configure hardware* section. Here, we
    have the option of changing the shape and changing the size of the data storage
    as shown in Figure [5-25](#527055_1_En_5_Chapter.xhtml#Fig25).


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig25_HTML.png)


    A dialog box titled configure hardware is given. Two boxes are given with headers:
    select a shape, and data storage size in gigabytes.


    Figure 5-25


    Restore DB System (Part 4)


    Since we are creating a new DB System from a backup, we will use the defaults,
    however you can take this opportunity to change the settings. Just make sure the
    new size for the data is large enough to store your data.


    Caution


    If you choose a shape that is smaller than the shape used when the backup was
    taken, you must ensure the new shape has the correct resources to support your
    DB System. For example, you must ensure there is sufficient processor and memory
    allocated to maintain performance expectations and there is enough disk space
    allocated to restore the data.


    Note


    You cannot change the type of the DB System when restoring from a backup. For
    example, if the original DB System was Standalone, your new DB System will also
    be Standalone.


    The next section allows you to choose to enable automatic backups, retention period,
    and start time as shown in Figure [5-26](#527055_1_En_5_Chapter.xhtml#Fig26).
    This information will be the same as the DB System used for the backup, but you
    can change the options. If the point-in-time is enabled, you can disable it by
    checking the tickbox as shown.


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig26_HTML.png)


    A dialog box titled, configure backup plan. Two boxes are given with headers backup
    retention period and window start time. Options enable automatic backups and select
    backup window is marked.


    Figure 5-26


    Restore DB System (Part 5)


    The last section is a summary with several tabs that allow you to change a number
    of configuration times including the following. Once again, the settings will
    be the same (by default) as the original DB System used for the backup:


    *   *Deletion Plan*: Displays the deletion plan for the DB System including whether
    it is enabled, the retention time for automatic backups, and the state of the
    final backup. The enable/disable links are shortcuts for enabling or disabling
    the deletion plan.


    *   *Configuration*: Displays information about the DB System including its shape,
    memory and storage size, MySQL version and configuration, and if crash recovery
    is enabled. The edit link next to the storage size is a shortcut to changing the
    storage size of the DB System.


    *   *Crash Recovery*: Enable or disable crash recovery. Disabling crash recovery
    can improve performance but will also turn off automatic backups. Use wisely.


    *   *Management*: Displays the MDS maintenance window start time. Be sure to choose
    a timeframe where your usage is lowest to avoid potential conflicts.


    *   *Networking*: Displays the hostname, IP address, and MySQL ports. You should
    not alter these unless you want to customize the endpoint.


    *   *Tags*: Displays the tags for the DB System. You can also add tags.


    Figure [5-27](#527055_1_En_5_Chapter.xhtml#Fig27) shows the summary section of
    the restore backup dialog.


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig27_HTML.png)


    A dialog box with headers deletion plan, configuration, crash recovery, management,
    networking, and tags are given. In which the networking option is selected and
    restore is marked as selected.


    Figure 5-27


    Restore DB System (Part 6)


    Once you’ve decided on any customizations using these tabs and you’re ready to
    restore the DB System from backup, you can click the *Restore* button.


    Once the restore completes, you will see it in the list of DB Systems, and you
    can now access the new DB System. If you restored a backup for a DB System in
    use, a new endpoint will be generated so be sure to check the restored DB System
    details page for details. For example, Figure [5-28](#527055_1_En_5_Chapter.xhtml#Fig28)
    shows the new endpoint on the restored DB System from above.


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig28_HTML.jpg)


    A dialog box titled, endpoint. The following details are provided: private I P
    address, internal F Q D N, availability domain, fault domain, my s q l port, and
    my s q l x protocol port.


    Figure 5-28


    Restored DB System Details Page (New Endpoint)


    If you followed the tutorial at the beginning of the chapter to create a new DB
    System, you should see a different endpoint when you navigate to the restored
    DB System details page.


    That concludes our look at the MDS backup and restore operations.'
