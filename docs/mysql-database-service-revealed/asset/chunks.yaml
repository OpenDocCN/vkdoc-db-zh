    在将数据迁移到 MDS 时，我们必须选择三种移动导出数据到 MDS 的方法之一。回想一下，这些方法包括使用 ObjectStore 存储桶、将导出的数据上传到中间的
    Compute 实例，以及通过 Bastion 网关将导出的数据直接上传到我们的 DB System。本节演示了使用每种机制将数据迁移到 MDS。正如你将看到的，所有方法都使用
    MySQL Shell 来导出和导入数据。'
