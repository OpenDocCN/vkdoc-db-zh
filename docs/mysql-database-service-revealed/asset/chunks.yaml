- fmt: '# 备份详情与管理


    ## 备份详情页面


    备份详情页面的上半部分展示了备份的元数据信息，如下表所示。


    | Parameter | Description |

    | --- | --- |

    | *OCID* | The OCID (unique identifier) for the backup. |

    | *Description* | The description you provided when the backup was taken (for
    manual backups) or the description generated by OCI. |

    | *Compartment* | The compartment where the backup was taken. You can click on
    the link provided to see more details about the compartment |

    | *MySQL Version* | The version of MySQL running on the DB System when the backup
    was taken. This could be a critical item to consider if you restore an old backup
    as DB Systems are constantly upgraded when new MySQL versions are released. |

    | *Shape* | The shape for the compute instance of the DB System. |

    | *Retention Days* | The retention period in days for the backup. |

    | *State* | The current state of the backup. |

    | *Backup Type* | The type of backup taken; full or incremental. |

    | *Creation Type* | The backup creation method; manual or automatic. |

    | *Backup Size* | The backup size in GBs. |

    | *Total Storage Size* | The data storage size at the time of backup. |

    | *Created* | The date and time the backup was created. |

    | *Last Updated* | The date and time the backup was last updated. |


    `MySQL Version` 和 `Shape` 是将备份还原到新 DB 系统时所需的两个关键组件。在这里，您可以一目了然地看到 DB 系统的一般配置。


    `Figure 5-4` 显示了备份详情页面的下半部分。


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig4_HTML.png)


    **Figure 5-4: Backup Details Page (Bottom)**


    此处展示了关于 DB 系统的信息，包括其关于备份、高可用性、`HeatWave`、`OCID`、`Compartment` 和创建日期的参数。`Table
    5-2` 更详细地展示了这些数据。


    **Table 5-2: MySQL DB System (backup details page)**


    | Parameter | Description |

    | --- | --- |

    | *Name* | The name of the DB System. Presented as a link so you can navigate
    to the DB System details page. |

    | *Description* | The description you provided when the DB System was created.
    |

    | *State* | The operational state of the DB System. |

    | *Automatic Backups* | Automatic backup state; enabled or disabled. |

    | *High Availability* | High availability state; enabled or disabled. |

    | *HeatWave Cluster* | HeatWave cluster state; enabled or disabled. |

    | *OCID* | The unique OCID for the DB System. Links are provided for you to show
    or copy the OCID. |

    | *Compartment* | The name of the compartment where the DB System resides. |

    | *Created* | The date and time the DB System was created. |

    | *Last Updated* | The date and time the DB System was last updated. |


    ## 管理自动备份


    现在我们了解了备份类型以及每种备份可以看到的信息类型，让我们看看如何对 DB 系统进行备份。我们将看到所有备份类型的示例。


    ### 启用或禁用自动备份


    回想一下，我们在 `Chapter 4` 中创建 DB 系统时，并没有开启自动更新。幸运的是，我们可以随时打开（启用）或关闭（禁用）自动更新。


    我们只需通过云控制台主导航菜单选择 `Databases` | `DB Systems` 来导航到 DB 系统，然后选择 DB 系统并查看其详细信息，或者使用右侧的上下文菜单选择
    `View Details`。进入 DB 系统详细信息页面后，点击 `More Actions` 按钮并选择 `Edit Backup Plan`。


    如果自动备份被禁用，您将看到一个用于启用的复选框。只需勾选 `Enable Automatic Backups` 复选框，然后将出现另外两个选项，如 `Figure
    5-5` 所示。


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig5_HTML.png)


    **Figure 5-5: Enabling Automatic Backups**


    您将被允许更改备份保留期（默认为 7 天），并且可以更改自动备份的开始时间。您必须勾选 `Select Backup Window` 复选框才能启用开始时间窗口选择。开始窗口是自动备份可以发生的时间段。


    当您点击 `Window Start Time` 框时，将出现一个下拉列表，允许您从预定义的选项列表中选择一个开始窗口。请注意时间是 `UTC` 时间，因此请务必修正任何时区差异。请注意，您的自动备份将被安排在指定开始时间后的
    30 分钟内开始。您还可以点击 `Show backup windows per region` 链接以查看特定于您区域的默认备份窗口。


    当您对选择满意后，点击 `Save Changes` 按钮以启用自动备份。这可能会暂时将 DB 系统的状态更改为 `UPDATING`，并将图标颜色更改为黄色。


    > **注意：** 您也可以在 DB 系统列表中使用 DB 系统的上下文菜单来选择 `Edit Backup Plan`，以启用或禁用自动备份。


    要禁用自动备份，请使用 `More Actions` 按钮并选择 `Edit Backup Plan`。然后，只需取消勾选 `Enable Automatic
    Backups` 复选框，并点击 `Save Changes` 按钮即可禁用自动备份。这可能会暂时将 DB 系统的状态更改为 `UPDATING`，并将图标颜色更改为黄色。'
  raw: '| Parameter | Description |

    | --- | --- |

    | *OCID* | The OCID (unique identifier) for the backup. |

    | *Description* | The description you provided when the backup was taken (for
    manual backups) or the description generated by OCI. |

    | *Compartment* | The compartment where the backup was taken. You can click on
    the link provided to see more details about the compartment |

    | *MySQL Version* | The version of MySQL running on the DB System when the backup
    was taken. This could be a critical item to consider if you restore an old backup
    as DB Systems are constantly upgraded when new MySQL versions are released. |

    | *Shape* | The shape for the compute instance of the DB System. |

    | *Retention Days* | The retention period in days for the backup. |

    | *State* | The current state of the backup. |

    | *Backup Type* | The type of backup taken; full or incremental. |

    | *Creation Type* | The backup creation method; manual or automatic. |

    | *Backup Size* | The backup size in GBs. |

    | *Total Storage Size* | The data storage size at the time of backup. |

    | *Created* | The date and time the backup was created. |

    | *Last Updated* | The date and time the backup was last updated. |


    The MySQL version and shape are two of the critical components needed when restoring
    the backup to a new DB System. Here, you can see at-a-glance the general configuration
    of the DB System.


    Figure [5-4](#527055_1_En_5_Chapter.xhtml#Fig4) shows the bottom portion of the
    backup details page.


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig4_HTML.png)


    A page titled resources with option D B system is shown. It features name, description,
    state, availability, O C I D, compartment, etcetera of a D B system labeled o
    c i tutorial my s q l.


    Figure 5-4


    Backup Details Page (Bottom)


    Notice here we see the information about the DB System including its parameters
    regarding backups, high availability, HeatWave, OCID, compartment, and creation
    date. Table [5-2](#527055_1_En_5_Chapter.xhtml#Tab2) shows the data in more detail.


    Table 5-2


    MySQL DB System (backup details page)


    | Parameter | Description |

    | --- | --- |

    | *Name* | The name of the DB System. Presented as a link so you can navigate
    to the DB System details page. |

    | *Description* | The description you provided when the DB System was created.
    |

    | *State* | The operational state of the DB System. |

    | *Automatic Backups* | Automatic backup state; enabled or disabled. |

    | *High Availability* | High availability state; enabled or disabled. |

    | *HeatWave Cluster* | HeatWave cluster state; enabled or disabled. |

    | *OCID* | The unique OCID for the DB System. Links are provided for you to show
    or copy the OCID. |

    | *Compartment* | The name of the compartment where the DB System resides. |

    | *Created* | The date and time the DB System was created. |

    | *Last Updated* | The date and time the DB System was last updated. |


    Now that we understand the backup types and the type of information you can see
    with each backup, let’s look at how we can take a backup of a DB System. We will
    see examples of all backup types.


    ### Enable or Disable Automatic Backups


    Recall when we created our DB System in Chapter [4](#527055_1_En_4_Chapter.xhtml),
    we did not turn on automatic updates. Fortunately, we can turn automatic updates
    on (enable) or off (disable) at any time.


    We simply navigate to the DB System using the cloud console main menu selecting
    *Databases* | *DB Systems* and then select the DB System and view its details
    or use the context menu to the right and select *View Details*. Once you are on
    the DB System detail page click the *More Actions* button and select *Edit Backup
    Plan*.


    If automatic backups are disabled, you will see a checkbox to enable them. Simply
    tick the *Enable Automatic Backups* checkbox and then two more options will appear
    as shown in Figure [5-5](#527055_1_En_5_Chapter.xhtml#Fig5).


    ![](images/527055_1_En_5_Chapter/527055_1_En_5_Fig5_HTML.png)


    A dialog box titled edit backup plan is given. A few options are selected below.
    The title reads, enable automatic backups, seven, select backup window, and save
    changes.


    Figure 5-5


    Enabling Automatic Backups


    You will be permitted to change the backup retention (default is 7 days), and
    you can change the start time for the automatic backup. You must tick the tick
    box, `Select Backup Window`, to enable the start window selection. The start window
    is the time in which the automatic backup can take place.


    When you click on the *Window Start Time* box, a dropdown list will appear allowing
    you to choose a start window from a predefined list of options. Notice the times
    are in UTC, so be sure to correct for any time zone differences. Note that your
    automatic backup will be scheduled to start during the 30 minutes following the
    start time specified. You can also click the *Show backup windows per region*
    link to view the default backup window specific to your region.


    When you are satisfied with your selections, click the *Save Changes* button to
    enable automatic backups. This may temporarily change the state of the DB System
    to `UPDATING` and the icon color to yellow.


    Note


    You can also use the context menu for the DB System in the DB Systems list to
    choose *Edit Backup Plan* to enable or disable automatic backups.


    To disable automatic backups, use the *More Actions* button and select *Edit Backup
    Plan*. Then, simply untick the *Enable Automatic Backups* checkbox and click the
    *Save Changes* button to disable automatic backups. This may temporarily change
    the state of the DB System to `UPDATING` and the icon color to yellow.'
