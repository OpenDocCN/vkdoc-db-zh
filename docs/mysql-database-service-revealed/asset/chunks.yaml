    #### Summary


    One of the challenges for getting started with any cloud-based service is getting
    your data from your on-prem storage (server or services) to the cloud. For developers
    and those planning their cloud-based systems, it is also important to be able
    to get your data out of the cloud. Whether for development, testing, quality control,
    replication, or simply off-cloud backup, export can be as important as import.


    Cloud services that omit these facilities can make the import issue far larger
    an issue and more problematic than need be. While it is true this step is normally
    exercised only a few times or perhaps once when your solution goes into production,
    importing and exporting data should be a seamless integration when using the cloud
    service.


    Getting started with MDS would be a lot more difficult if no import and export
    capabilities existed. Fortunately, we learned that the MySQL Shell provides some
    well-thought-out utilities for getting your data into (and out of) MDS.


    In this chapter, we saw how to migrate our data from an on-prem MySQL server to
    a DB System in MDS. We also saw examples on how you could migrate your data out
    of MDS for use in your local environment.


    We also learned three mechanisms for transferring your exported data to MDS; we
    can use the ObjectStore bucket (recommended, fast), upload our exported data to
    an intermediate Compute instance (slower), or use a Bastion Service to upload
    our exported data directly to our DB System (slowest, not recommended). If you’re
    following along with your own on-prem MySQL data, you now have it migrated to
    MDS!


    In the next chapter, we will learn about the high availability options to make
    your DB Systems more resilient and dependable.


    ### 8. High Availability


    Database administrators and systems architects who manage infrastructures understand
    the need for building in redundancy while keeping maintenance chores to a minimum.
    One of the tools used to achieve this is a class of features that make the server
    or service available as much as possible. We call this high availability.


    Not only is high availability a key factor in establishing robust, always ready
    infrastructures, but it is also a quality of robust, enterprise-grade database
    systems. Oracle has continued to develop and improve the high availability features
    in MySQL and has translated those capabilities to the MySQL Database Service (MDS).


    High availability in MDS is accomplished through a feature in the DB System, which
    leverages a collection of components and automation built upon the long-term stability
    of MySQL Group Replication. Together, these components form the high availability
    feature for DB System in MDS.


    In this chapter, we will discover what high availability is and how it can be
    used to achieve high availability using DB Systems in MDS. Let’s begin with a
    brief tutorial on high availability.'
