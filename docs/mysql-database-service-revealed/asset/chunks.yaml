    一个对话框包含以下标题：删除计划、配置、崩溃恢复、管理、网络和标签。其中选择了“网络”选项，“还原”标记为已选中。


    ## 执行还原


    一旦您通过这些选项卡决定了任何自定义设置，并准备好从备份还原数据库系统，就可以单击 *还原* 按钮。


