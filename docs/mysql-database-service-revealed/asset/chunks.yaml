    retention period sets as 10, and the save changes button is highlighted at the
    bottom.


    Figure 6-2


    Edit Backup Plan Dialog


    Note


    If you have a DB System running MySQL 8.0.28, you will need to update to MySQL
    8.0.29 at a minimum to use PITR. You can upgrade your DB System on the details
    page by clicking on the *Edit* link next to the MySQL version and choose the version
    you want to upgrade to from the list.


    Once the changes are saved, the DB System will enter an update period so that
    the MDS automation can complete the changes to the configuration in the background.
    Once complete, you will see the automatic backups and PITR enabled as shown in
    Figure [6-3](#527055_1_En_6_Chapter.xhtml#Fig3).


    ![](images/527055_1_En_6_Chapter/527055_1_En_6_Fig3_HTML.jpg)


