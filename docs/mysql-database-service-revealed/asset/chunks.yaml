    #### Import the Data on the DB System


    The last step is to login to your compute instance again and launch MySQL Shell
    and import the data. Once again, we will not use the PAR parameters, rather, we
    will use the file path (`/home/opc/exported_data`). Listing [7-12](#527055_1_En_7_Chapter.xhtml#PC35)
    shows the transcript to running the `util.loadDump()` method. Notice the parameters
    used. We need only the path to the exported data. Cool!


    ```

