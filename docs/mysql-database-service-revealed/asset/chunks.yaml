    Listing 4-3 Connecting to MySQL on the DB System (Compute Instance)

    ```


    If you see something similar to the listing, congratulations! You have just connected
    to your first DB System. Go ahead and run some sample SQL statements if you want
    to play around with it.


    ### Wait, It Doesn’t Work!


    If you were not able to connect, go back and be sure your compute instance is
    in the same availability domain, on the same VCN (in the public subnet), and that
    you have added the correct ingress rule to the VCN private subnet as described
    above.


    Another common issue is forgetting the MySQL admin username and password. While
    writing it down is a very poor practice, you should ensure you are using the username
    and password you supplied when you created the DB System. There is no easy way
    to change that password, so worst case may require you to delete the current DB
    System and create another one with the same data and ensure you are recording
    the username and password for the MySQL admin user.


    That’s it! Pretty easy to set up and use, yes? Once again, this is very similar
    to how you would typically build an application in OCI. You would have the application
    server or the forward facing, public connection point on the public subnet of
    your VCN and your data resources on the private subnet protecting your vital investment
    with good security practices.


    Now, let’s see how we can connect to our DB System directly from our PC.


    ## Connecting Using a Bastion Session


    Bastion is an OCI service that provides restricted and time-limited connections
    via SSH to resources that do not have public endpoints. Once the connection is
    made, users can interact with the target resource by using any software or protocol
    supported by SSH. Connections are made using a session object on a Bastion resource
    using an SSH Client or SSH Tunnel to connect to a resource on a private subnet.
    For example, you can use a MySQL client (that supports SSH) to connect to a DB
    System. Let’s learn more about the terminology used in Bastion before we see a
    demonstration.


    > **Note**

    > Bastions are associated with a single VCN. They cannot be moved from one VCN
    to another.'
