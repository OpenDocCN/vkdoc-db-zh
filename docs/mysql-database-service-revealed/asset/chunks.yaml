- fmt: '## Endpoints


    Endpoints 是 DB System 的连接点。您可以将它们用于高级复制操作（我们将在第 [7](#527055_1_En_7_Chapter.xhtml)
    章中看到），或用于从其他进程或系统连接到 MySQL。


    当您在菜单中点击 `Endpoints` 时，您将看到已创建的端点列表，如图 [4-26](#527055_1_En_4_Chapter.xhtml#Fig26)
    所示。该列表将显示端点的主机名、其状态、IP 地址、MySQL 端口以及操作模式。请注意，我们教程 DB System 的端点列表中唯一的条目是您可以用于从
    VCN 连接到 MySQL 的 IP 地址。我们将在下一节中看到如何使用此端点。


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig26_HTML.png)


    一个窗口显示了资源选项卡，其中选择了端点。它显示了主机名列表，包含状态、IP 地址、MySQL 端口和模式。


    图 4-26


    Endpoints 资源窗格（DB System）


    ## HeatWave


    HeatWave 资源窗格用于显示有关 HeatWave 配置中集群的信息。当您在菜单中点击 `HeatWave` 时，您将看到已创建集群的列表。由于我们在创建
    DB System 时未启用 HeatWave，我们将看到一条说明此情况的消息，如图 [4-27](#527055_1_En_4_Chapter.xhtml#Fig27)
    所示。我们将在第 [8](#527055_1_En_8_Chapter.xhtml) 章更详细地介绍 HeatWave。


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig27_HTML.png)


    一个窗口显示了资源选项卡，其中选择了 heat wave。它显示了 heat wave 集群信息。


    图 4-27


    HeatWave 资源窗格（DB System）


    ## Backups


    备份是 OCI 中的特殊实体，包含所有数据的备份以及 MySQL 配置。就像为您的电脑备份一样，您可以使用备份将 DB System 恢复到备份时的状态。备份是维护数据完整性的重要工具。我们将在第
    [5](#527055_1_En_5_Chapter.xhtml) 章更详细地介绍备份。


    当您在菜单中点击 `Backups` 时，您将看到适用于该 DB System 的可用备份列表。该列表将显示名称、状态（状态）、创建类型（完全、增量）、保留天数、大小以及创建日期，如图
    [4-28](#527055_1_En_4_Chapter.xhtml#Fig28) 所示。请注意，此资源窗格包含一个过滤器，可让您按 compartment
    过滤列表（范围）。


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig28_HTML.png)


    一个窗口显示了资源选项卡，其中选择了备份。它显示了 o c i tutorial compartment 中的备份。自动备份已禁用。下方的表格显示了备份列表。


    图 4-28


    Backups 资源窗格（DB System）


    ## Channels


    通道用于复制中，以允许数据从/到其他系统（包括 DB System）传输。我们将在第 [7](#527055_1_En_7_Chapter.xhtml) 章了解更多关于通道的信息。


    当您在菜单中点击 `Channels` 时，您将看到与该 DB System 关联的通道列表，包括名称、源、目标、状态（状态）、详细信息、是否启用以及创建日期。


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig29_HTML.png)


    一个窗口显示了资源选项卡，其中选择了通道。表格显示未找到项目。创建通道按钮位于右上角。


    图 4-29


    Channels 资源窗格（DB System）


    ## Work Requests


    回想一下我们之前创建 DB System 时的情况，工作请求（工作流）是 OCI 内部运行的一个或多个进程，用于在 DB System 上执行某些操作。这些操作可以包括备份、编辑（更新）DB
    System、停止、重启等。


    当您在菜单中点击 `Work Requests` 时，您将看到工作请求列表出现在右侧窗格中，如图 [4-30](#527055_1_En_4_Chapter.xhtml#Fig30)
    所示。这将包括所有过去的工作请求以及任何当前活动的请求。该列表显示操作（工作请求名称）、状态、进度条、完成百分比、OCI 接受工作请求的时间、开始日期以及完成日期。


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig30_HTML.png)


    一个窗口显示了资源选项卡，其中选择了工作请求。表格显示了操作创建 d b system 的活动。


    图 4-30


    Work Requests 资源窗格（DB System）


    如果列出了工作请求，您可以在上下文菜单（行右侧垂直堆叠的三个点）上操作以管理工作请求并查看详细信息。


    现在，让我们看一下详细信息页面中心显示的 DB System 信息。


    ## MySQL DB System 信息和标签


    在 DB System 详细信息页面的中心有两个选项卡：一个用于显示处理 DB System 的关键元数据的 DB System `Information`，另一个用于显示为
    DB System 创建的标签或标记（包括系统生成和用户定义的标签）的 `Tags`。让我们分别看看这些选项卡。'
  raw: '##### Endpoints


    Endpoints are connection points for DB Systems. You can use them for advanced
    replication operations as we will see in Chapter [7](#527055_1_En_7_Chapter.xhtml),
    or for connecting to MySQL from another process or system.


    When you click on *Endpoints* in the menu, you will see a list of the endpoints
    you have created as shown in Figure [4-26](#527055_1_En_4_Chapter.xhtml#Fig26).
    The list will display the hostname for the endpoint, its status, IP address, MySQL
    ports, and the modes of operation. Notice the only entry in the endpoints list
    for our tutorial DB System is the IP address to which you can use to connect to
    MySQL from the VCN. We will see how to use this endpoint in the next section.


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig26_HTML.png)


    A window displays the resource tab, in which the endpoint is selected. It displays
    the list of hostnames with status, I P address, My S Q L ports, and modes.


    Figure 4-26


    Endpoints Resource Pane (DB System)


    ##### HeatWave


    The HeatWave resource pane is used to display information about the clusters in
    the HeatWave configuration. When you click on *HeatWave* in the menu, you will
    see a list of the clusters created. Since we have not enabled HeatWave when we
    created the DB System, we will see a message stating such as shown in Figure [4-27](#527055_1_En_4_Chapter.xhtml#Fig27).
    We will cover HeatWave in more detail in Chapter [8](#527055_1_En_8_Chapter.xhtml).


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig27_HTML.png)


    A window displays the resource tab, in which the heat wave is selected. It displays
    the heat wave cluster information.


    Figure 4-27


    HeatWave Resource Pane (DB System)


    ##### Backups


    Backups are special entities in OCI that include a backup of all of the data as
    well as the MySQL configuration. Like a backup for your PC, you can use a backup
    to restore the DB System to the state at the time of the backup. Backups are an
    essential tool in maintaining integrity of your data. We will cover backups in
    more detail in Chapter [5](#527055_1_En_5_Chapter.xhtml).


    When you click on *Backups* in the menu, you will see a list of the backups available
    for the DB System. The list will display the name, state (status), creation type
    (full, incremental), retention days, size, and the date it was created as shown
    in Figure [4-28](#527055_1_En_4_Chapter.xhtml#Fig28). Notice this resource pane
    includes a filter that lets you filter the list (scope) by compartment.


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig28_HTML.png)


    A window displays the resource tab, in which the backup is selected. It displays
    backup in the o c i tutorial compartment. Automatic backups are disabled. The
    table below displays the backup list.


    Figure 4-28


    Backups Resource Pane (DB System)


    ##### Channels


    Channels are used in replication to permit data from/to other systems (including
    DB Systems). We will learn more about channels in Chapter [7](#527055_1_En_7_Chapter.xhtml).


    When you click on *Channels* in the menu, you will see a list of the channels
    associated with the DB System to include the name, source, target, state (status),
    details, whether it is enabled, and date it was created.


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig29_HTML.png)


    A window displays the resource tab, in which the channel is selected. The table
    displays no items found. The create channel button is on the top right.


    Figure 4-29


    Channels Resource Pane (DB System)


    ##### Work Requests


    Recall from our earlier look at when we created the DB System, a work request
    (workflow) is an OCI internal process or processes that are run to execute some
    operation on the DB System. These can include backups, editing (updating) the
    DB System, stopping, restarting, etc.


    When you click on *Work Requests* in the menu, you will see a list of the work
    requests appear in the pane to the right as shown in Figure [4-30](#527055_1_En_4_Chapter.xhtml#Fig30).
    This will include all past work requests and any that are currently active. The
    list shows the operation (work request name), status, progress bar, % complete,
    when the work request was accepted by OCI, date when it started, and the date
    when it finished.


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig30_HTML.png)


    A window displays the resource tab, in which the work request is selected. The
    table displays the activity for the operation create d b system.


    Figure 4-30


    Work Requests Resource Pane (DB System)


    If there are work requests listed, you can act on the context menu (the three
    vertically stacked dots to the right of the row) to manipulate the work request
    to view the details.


    Now, let’s look at the DB System information shown in the center of the details
    page.


    #### MySQL DB System Information and Tags


    There are two tabs in the center of the DB System details page; one for the DB
    System *Information* that shows critical metadata for working with the DB System,
    and *Tags* that shows the tags or labels created for the DB System including system-generated
    and user-defined tags. Let’s look at each of these tabs.'
  trans: '

