- fmt: 'A window of `oci-tutorial-block-volume-1` with the block volume information.
    Performance, scheduled backups, and cross-region replication details are listed.


    Figure 2-39


    Block Volume Details Page


    Now, navigate back to your compute instance dialog. If you did not open the compute
    instance in a separate tab, use the cloud console menu to select `Compute` | `Instances`
    and click on the instance we created (`oci-tutorial-instance-1`) to see its detail
    page. Notice it is marked as `Always Free`.


    To attach the block volume to the compute instance, look for the `Attached block
    volumes` item in the `Resources` menu item on the left side of the compute instance
    details page and click it as shown in Figure [2-40](#527055_1_En_2_Chapter.xhtml#Fig40).


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig40_HTML.jpg)


    A menu with title resources has instance details. The attached block volume is
    highlighted on the menu for selection.


    Figure 2-40


    Resources Menu (Compute Instance Detail)


    This will show the Attached Block Volumes list where we will start the attachment
    process. However, there is one piece of information we need. We will need the
    `OCID` for the block volume we just created. This is needed because the attach
    block volume dialog may not populate the list of block volumes available immediately
    (it should be given time). That is, you can either select a block volume from
    a list or specify the `OCID`. We will use the select OCI option in this example.


    To locate the block volume `OCID`, open the block volumes detail page (tab) and
    locate the `OCID` on the `Block Volume Information` tab as shown in Figure [2-41](#527055_1_En_2_Chapter.xhtml#Fig41).
    You can copy the `OCID` from the block volume detail page and click the `Copy`
    link next to the `OCID`.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig41_HTML.jpg)


    A window of `oci-tutorial block-volume-1` has the block volume information details.
    The location of `OCID` is highlighted.


    Figure 2-41


    Locating the `OCID` on the Block Volume Details Page


    Now we can return to the compute instance detail page and locate the `Attach block
    volume` button in the `Attached block volumes` list as shown in Figure [2-42](#527055_1_En_2_Chapter.xhtml#Fig42).
    Click the button once you have copied the `OCID` of the block volume.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig42_HTML.png)


    A table to list the attached block volume. It has 3 rows and 10 columns. No block
    volume is attached to the instance in the table. Attach block volume button on
    the top left is highlighted.


    Figure 2-42


    Attached Block Volumes List (Compute Instance Detail Page)


    Select `Enter volume OCID` and paste the `OCID` into the box. For the `Device
    path`, choose `/dev/oracleoci/oraclevdb` as shown in Figure [2-43](#527055_1_En_2_Chapter.xhtml#Fig43).
    Leave the other sections with their default values. When ready, click the `Attach`
    button.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig43_HTML.jpg)


    A dialog box to attach block volume has volume options. Enter volume `OCID`. Volume
    scale is displayed and target, `VPU`, `IOPS`, and Throughput details are mentioned.


    Figure 2-43


    Attach Block Volume Dialog


    This process will create another OCI resource called a block volume attachment.
    You will not see this resource, but it is object used by OCI to associate a block
    volume with a compute instance. It is important to understand the attachment is
    like any other resource in OCI; it is a virtual object and in this case a device
    used to accomplish a goal of associating a block volume with a compute instance.


    Once you click the `Attach` button, you may see a dialog reminding you to run
    a set of `iSCSI` commands to connect the block volume to the operating system
    on the compute instance. We will see how to do this once the attachment process
    completes.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig44_HTML.jpg)


    A window of the attached block volume displays the remainder of the commands.
    It has two bullet point remainder. The close button is at the bottom left.


    Figure 2-44


    Run iSCSI Commands Reminder


    Once the attachment process is complete, the block volume will appear in the `Attached
    block volumes list`.


    Recall, we were told to run some `iSCSI` commands on the compute instance. We
    can get the commands we need to run from the `Attached block volumes` by clicking
    on the special menu (indicate with three vertical dots) and choosing `iSCSI commands
    & information` as shown in Figure [2-45](#527055_1_En_2_Chapter.xhtml#Fig45)


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig45_HTML.png)


    A table of the attached block volume with 2 rows and 10 columns. `oci-tutorial
    block volume1` is attached to the table. The view block volume details menu has
    `iSCSI commands and information` highlighted.


    Figure 2-45


    Getting the iSCSI Information (Compute Instance Details)


    This will open a new dialog that shows the commands you need to run as shown in
    Figure [2-46](#527055_1_En_2_Chapter.xhtml#Fig46).


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig46_HTML.png)


    A window displays the `iSCSI` command and information. A warning notice with 2
    points is at the top and connect and disconnect code is displayed. `IP` address
    and port, volume on details is given.


    Figure 2-46


    iSCSI Information Dialog


    You will find a section for `Connect` and another for `Disconnect` that have the
    exact commands you need for connecting and disconnecting the block volume on the
    compute instance. We won’t cover the parameters of the commands in this chapter.
    Rather, we will simply copy the three commands in the `Connect` section and run
    them on the compute instance.


    If you closed your `SSH` connection from the previous section, open a new one
