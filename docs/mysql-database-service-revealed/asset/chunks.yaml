  trans: '

    ## 身份和访问管理服务


    身份和访问管理 (IAM) 服务是您用来控制对 OCI 资源访问的资源，这使得这些核心服务成为构建基于 OCI 的基础设施时较为复杂但又至关重要的部分。您可以创建`用户`和`组`，并应用访问策略。


    最常用的概念是`委托主体`（有时称为`实例委托主体`），这是一个应用于 IAM`用户`和计算实例的资源，用于授予访问或与 OCI 资源交互的权限。经认证的`委托主体`可执行的操作和行为称为`授权`。


    `用户`和`组`正如您所预期的那样，`用户`拥有名称、密码、API 签名密钥和一个或多个身份验证令牌。通过使用`策略`资源向`用户`和`组`授予权限，这些策略允许`用户`或`组`在`租户`内的特定`
    compartment `（隔离区）中访问资源，并可附带任何限制或条件。


    例如，当`用户`想要访问 OCI 资源时，该`用户`（或应用程序/服务）必须是一个`组`的成员，并且该`组`应在同一个` compartment `和`租户`中拥有包含相应权限的`策略`。


    现在我们已经简要介绍了 OCI 核心服务，让我们学习如何设置 OCI 账户并创建我们的第一个 OCI 资源。


    ## 设置您的账户


    开始使用 OCI 非常简单。事实上，Oracle 允许您创建一个免费账户，用于学习如何使用 OCI。虽然免费账户在可创建资源的规模或复杂性方面有一些限制，但
    Oracle 为每个注册的免费账户提供 300.00 美元的初始赠金。这意味着您可以使用资源进行尝试，费用会从初始赠金中扣除。一旦该金额用完，您将开始产生费用。因此，在创建账户时，您必须提供一个有效的信用卡。


    免费套餐账户还可以访问某些始终免费的服务，例如：


    *   两个 Oracle 自治数据库，附带如`Application Express (APEC)`和`Oracle SQL Developer`之类的工具

    *   两个 OCI 计算实例（虚拟机）；块存储、对象存储和归档存储；负载均衡器和数据出口；监控和通知服务


    如前所述，免费账户有以下限制：


    *   所有可用服务中最多八个计算实例

    *   最多 5 TB 的存储空间


    您可以在 30 天结束时将您的账户升级为按需付费账户。如果您创建了付费资源并希望在 30 天后保留它们，您将需要升级您的账户。


    **注意**


    使用您的赠金额度配置的任何资源，在 30 天期限届满后都将被 Oracle 回收，除非您升级您的账户。


    您可以随时升级到付费账户。只需点击云控制台页面右侧面板中的`升级您的账户`链接即可。升级账户后，您将继续拥有云资源的所有权和访问权限。


    ### 始终免费资源


    所有 OCI 账户（包括按需付费账户）都可以创建标识为“始终免费”的资源。它们在云中由一个标有`Always Free`的标签表示。其中一些资源可能仅限于某些配置。例如，始终免费的计算实例是那些作为虚拟机配置的实例。同样，Oracle
    自治数据库，以及支持您想要构建的应用程序所需的网络、负载均衡和存储资源，对于示例应用程序或进行原型设计也可能是免费的。


    有关哪些资源始终免费的更多详细信息，请参阅 OCI 文档 (`https://docs.oracle.com/en-us/iaas/Content/FreeTier/freetier_topic-Always_Free_Resources.htm#resources`)。


    我们还有一个与所有账户相关但免费套餐账户限制更多的概念需要讨论。

    '
- fmt: '### Service Usage and Limits


    Service usage and limits are put in place to limit how many of certain resources
    you can create in your account. These may be applied to your tenancy or across
    your compartments.


    You can find your tenancy’s limits by clicking on the cloud console menu then
    select `Governance and Administration` then `Limits, Quotas, and Usage`. This
    gives you a long list of service limits, but you can filter by service, scope,
    resource name, or compartment.


    For example, if you look at the block volume service, you will see limits for
    number of backups, free backups, and free storage in GBs. Figure 2-5 shows an
    example of these limits in the cloud console.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig5_HTML.png)


    An image preview window displays limits, quotes, and usage of resources, based
    on the compartments in the cloud console.


    **Figure 2-5** Service Limits Example


    With that mind, let’s see how we can create our OCI account and take a small tour
    of some of the basic resources you may want to use. Interestingly, the resources
    in the tutorial are some of the components used to build a database system resource
    in the MySQL Database Service.


    Navigate to [`https://cloud.oracle.com/`](https://cloud.oracle.com/). Click `Sign
    Up` under “Not an Oracle Cloud customer yet?” on the left. Figure 2-6 shows the
    initial landing page.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig6_HTML.png)


    A window displays O C I with a sign in oracle cloud option at the top right. Cloud
    account name can be typed on the left side. It highlights the not oracle cloud
    customer option.


    **Figure 2-6** Oracle Cloud Landing Page


    This will open a new browser where you can create your Oracle cloud account. Figure
    2-7 shows the required information you will need to enter. Notice it defaults
    to the free tier account.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig7_HTML.png)


    An account information window with country, first name, last name, email, and
    I am a human check option to be filled. Terms of use are given at the bottom.


    **Figure 2-7** New Account Information (Part 1)


    You will need to choose the country or region where you live, enter your first
    and last name, successfully meet the captcha challenge, then click `Verify my
    email`. You should also read the terms of use shown at the bottom of the dialog.


    Once you click the button, you will get an email and in the email will be a link
    (button named `Verify email`) for you to click to complete the account creation
    process. If you are following along, go ahead and open your email and click the
    link/button. You will then be returned to the login creation page and the dialog
    will change to allow you to set your password, company name, cloud account name,
    and your home region as shown in Figure 2-8.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig8_HTML.png)


    The second page of new account information with the new password, confirm password,
    and company name are to be filled in. Cloud account name drcharlesbell is filled.
    Terms of use are at the bottom.


    **Figure 2-8** New Account Information (Part 2)


    Your home region is the geographical data center group closest to where you live.
    It is important to choose the closest to help reduce potentially longer latency
    across the Internet. When you have entered the information, click `Continue` at
    the bottom. Once again, you should read the terms of use statement above the button.


    Once you click the button, you will be presented with another dialog asking for
    your mailing address and phone number as shown in Figure 2-9.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig9_HTML.png)


    The third page of the new account information with address lines 1 and 2, city,
    state, postal code, and phone number to be filled in. The agreement check box
    is at the bottom.


    **Figure 2-9** New Account Information (Part 3)


    Once you have entered your personal information, click `Continue` to move to the
    payment information section as shown in Figure 2-10. To add your payment preference,
    click the `Add payment verification method` button and follow the prompts.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig10_HTML.png)


    The fourth page of the new account information with payment verification options.
    Add payment verification method button is in the middle. The agreement check box
    is at the bottom.


    **Figure 2-10** New Account Information (Part 4)


    Once you’ve entered your payment information and it has been validated, you will
    return to the dialog. To complete your account creation, tick the `Agreement`
    checkbox (after reading the agreement), then click `Start my free trial` as shown
    in Figure 2-11.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig11_HTML.png)


    The fifth page of the new address information window with payment verification.
    It displays thank you for verifying your details in the center. The agreement
    check box is at the bottom.


    **Figure 2-11** New Account Information (Part 5)


    At this point, your new account is being provisioned. You may receive a message
    that the process will take some time as shown in Figure 2-12. This is normal.
    Notice Oracle provides a link for you to learn more about OCI while you wait.
    That’s nice. You will be notified via email when your account is ready.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig12_HTML.jpg)


    An image preview with the text thank you for signing up for Oracle cloud. A link
    with text while you wait, you can read about O C I.


    **Figure 2-12** Account Creation Message


    Once your account is created and you click the link in the email to login, you
    will be sent to the OCI login page (your username is your email address) and once
    logged in, you may see a short questionnaire. Once you get past that, will see
    the OCI start page. You may see a notice that additional account setup tasks are
    being run in the background as shown in Figure 2-13.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig13_HTML.png)


    An image preview with text about your account is currently being set up, and some
    features will be unavailable. You will receive an email after the setup completes.


    **Figure 2-13** New Account Start Notice


    At this point, you’re all set to start working with OCI! However, recall we mentioned
    each account has its own tenancy. Your tenancy name is the first part of your
    email address that you used when you signed up. For example, if you used `mynamehere@wesayso.com`,
    your tenancy name would be `mynamehere`. Keep this in mind as we work through
    the example in the tutorial.


    Let’s take a quick tutorial of how to create our very first OCI resources.'
