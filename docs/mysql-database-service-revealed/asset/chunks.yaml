    #### 在数据库系统上导入数据


    最后一步是在您的 PC 上启动 MySQL Shell 并导入数据。我们将使用下面的命令。请注意所使用的参数。我们需要导出数据的路径，并且由于我们是在 PC
    上执行导入，我们还需要添加一个进度文件选项的路径。该路径必须是一个用户帐户有权创建和写入文件的位置：


    ```

    util.loadDump("c:\\imported_data", {progressFile: "c:\\imported_data\\progressFile"})

    ```


