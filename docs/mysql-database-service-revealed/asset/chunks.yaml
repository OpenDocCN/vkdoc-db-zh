- fmt: '#### Listing the MySQL Shapes


    To list the MySQL shapes, we use the `list_shapes()` method from the `oci.mysql.MysqlaasClient`
    class, which takes as a parameter the compartment id, which is common among many
    of the API methods.


    Since we will be using he compartment id often, we can save it in an environment
    variable and read it from the Python script. To set an environment variable in
    macOS or Linux, use the `export` command as shown below:


    ```

    export COMPARTMENT_ID=ocid1.compartment.MASKED

    ```


    For Windows, we use the `set` command as shown below:


    ```

    set COMPARTMENT_ID=ocid1.compartment.MASKED

    ```


    You can read an environment variable in Python with the `os` module as shown below:


    ```

    import os

    COMPARTMENT_ID = os.getenv(''COMPARTMENT_ID'')

    ```


    The call to the API to get the list of shapes is shown below:


    ```

    list_shapes_response = mysql_client.list_shapes(compartment_id=COMPARTMENT_ID)

    ```


    This returns a list or `ShapeSummary` classes, which we can use to loop through
    the shapes and print the name, which is a lot cleaner (and fewer lines) than a
    JSON output like the CLI. You can find the description of the `ShapeSummary` class
    at [`https://docs.oracle.com/en-us/iaas/tools/python/2.79.0/api/mysql/models/oci.mysql.models.ShapeSummary.xhtml#oci.mysql.models.ShapeSummary`](https://docs.oracle.com/en-us/iaas/tools/python/2.79.0/api/mysql/models/oci.mysql.models.ShapeSummary.xhtml%2523oci.mysql.models.ShapeSummary).


    Ok, now let’s look at the complete code. Listing [9-17](#527055_1_En_9_Chapter.xhtml#PC26)
    shows the completed code for this example. The file is named `list_mysql_shapes.py`.


    ```

    import getpass

    import os

    # Import the oci module

    import oci

    # Read your configuration file: be sure to provide a path if

    # your configuration file.

    config = oci.config.from_file()

    # Read the passphrase from the user

    pass_phrase = getpass.getpass("Enter the SSH key passphrase: ")

    # Add the passphrase  to the config file dictionary.

    config.update({''pass_phrase'':pass_phrase})

    # Initialize service client with default config file

    mysql_client = oci.mysql.MysqlaasClient(config)

    # Get the compartment id from the environment

    COMPARTMENT_ID = os.getenv(''COMPARTMENT_ID'')

    # List the MySQL shapes

    list_shapes_response = mysql_client.list_shapes(compartment_id=COMPARTMENT_ID)

    # Loop through the data and print the shape names only.

    for shape_summary in list_shapes_response.data:

    print(shape_summary.name)

    Listing 9-17

    List MySQL Shapes Script

    ```


    When you execute this code, you will see an excerpt of the list of MySQL shapes
    as shown in Listing [9-18](#527055_1_En_9_Chapter.xhtml#PC27).


