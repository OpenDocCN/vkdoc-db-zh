    接下来是创建 `oci.config` 类的一个实例。此操作读取您的配置文件并为 SDK 对象准备使用您的凭据。然后，我们读取密码短语并将其添加到配置文件字典中。接着，我们连接到想要使用的
    API 类，如果连接成功，我们就可以继续进行 API 方法调用。


    注意


    如果您的 PC 尚未设置使用 OCI CLI，请参阅第 [7](#527055_1_En_7_Chapter.xhtml) 章并在尝试 API 示例之前完成该设置。配置文件是通过
    API 访问 MDS 所必需的。


    [9-16](#527055_1_En_9_Chapter.xhtml#PC20) 列表展示了访问 OCI API 类所需的基本 Python 脚本。该脚本名为
    `basic_api.py`。


