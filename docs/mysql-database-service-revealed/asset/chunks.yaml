- fmt: '## Summary


    The Oracle Cloud Infrastructure is a vast set of cloud infrastructure that provides
    dozens of services for you to build your own cloud solutions. We have the basic,
    core services such as networking and compute services for creating servers, advanced
    managed services such as database systems, and even platform-level services such
    as container orchestration. Even though we’ve learned more about these concepts
    and features, we are only scratching the surface of the capabilities provided
    by OCI.


    We have also learned how virtualization and automation are the key tools used
    to make OCI easy for you to create (provision), manage, and destroy resources.
    This simple set of use cases can be accomplished in minutes with virtual computing
    that would take hours or days to do with physical hardware.


    In this chapter, we learned more about OCI including terminology used, the user
    interfaces available for working with OCI, as well as explanations of the core
    services in OCI. Finally, we saw a short tutorial on how to set up our OCI trial
    account and create our very first OCI resources.


    In the next chapter, we will take a few moments and learn more about MySQL including
    a short tutorial on how to get started using MySQL. As you will see, it is a robust,
    full-featured database management system that is easy to use.


    Footnotes [1](#527055_1_En_2_Chapter.xhtml#Fn1_source) [2](#527055_1_En_2_Chapter.xhtml#Fn2_source)


    # 3. A Brief Tutorial of MySQL


    Perhaps you’ve never used a database system before or maybe you’ve used one as
    a user but have never had any need to set up one from scratch. Or perhaps you’ve
    decided to discover what all the fuss is about database systems in general.


    In this chapter, I present a short introduction to MySQL in the general SQL interface
    sense (traditional MySQL). Not only will you see how MySQL 8 is used to create
    and use databases, but you will also be introduced to some of the basics of the
    SQL interface, which is necessary and indeed required to fully integrate a MySQL
    server in your infrastructure.


    We will also take a brief look at the MySQL Shell and how you can use that to
    connect to and work with MySQL via both a SQL and NoSQL interface for both applications
    and interactive sessions.


    We will conclude the chapter with a brief look at how to connect your applications
    to MySQL servers to work with the databases you create.


    Let’s begin with a brief foray into what MySQL is and what it can do for us. We
    will start with installing MySQL on our local PC for experimentation.


    Note


    While this book presents the MySQL Database Service in the Oracle Cloud Infrastructure,
    much of the information in this chapter can be used with any MySQL server.


    ## Getting Started


    MySQL is the world’s most popular open source database system for many excellent
    reasons. First, it is open source, which means anyone can use it for a wide variety
    of tasks for free. Best of all, MySQL is included in many platform repositories,
    making it easy to get and install. If your platform doesn’t include MySQL in the
    repository (such as aptitude), you can download it from the MySQL website ([`http://dev.mysql.com`](http://dev.mysql.com)).


    Oracle Corporation owns MySQL. Oracle obtained MySQL through an acquisition of
    Sun Microsystems, which acquired MySQL from its original owners, MySQL AB. Despite
    fears to the contrary, Oracle has shown excellent stewardship of MySQL by continuing
    to invest in the evolution and development of new features as well as faithfully
    maintaining its open source heritage. Although Oracle also offers commercial licenses
    of MySQL – just as its prior owners did in the past – MySQL is still open source
    and available to everyone.


    Is Open Source Really Free?


    Open source software grew from a conscious resistance to the corporate-property
    mindset. Richard Stallman is credited as the father of the free software movement
    who pioneered a licensing mechanism to help protect ownership of software and
    yet make the use of the software and so some degree its revision free to all.
    The goal was to reestablish a cooperating community of developers cooperating
    with a single imperative – to guarantee freedom rather than restrict it.


    This ultimately led to the invention of some cleverly worded (read legally binding)
    licensing agreements that permit the code to be copied and modified without restriction,
    stating that derivative works (the modified copies) must be distributed under
    the same license as the original version without any additional restrictions.
    One such license (created by Stallman) is called the GNU Public License (GPL).
    This is the license that is used by Oracle to license MySQL and as such it is
    indeed free for anyone to use.


    However, GPL and similar licenses are intended to guarantee freedom to use, modify,
    and distribute; most never intended “free” to mean “no cost” or “free to a good
    home.” To counter this misconception, the Open Source Initiative (OSI) formed
    and later adopted and promoted the phrase open source to describe the freedoms
    guaranteed by the GPL license. For more information about open source software
    and the GPL, visit [`www.opensource.org`](http://www.opensource.org).


    MySQL runs as a background process (or as a foreground process if you launch it
    from the command line) on your system. Like most database systems, MySQL supports
    Structured Query Language (SQL). You can use SQL to create databases and objects
    (using data definition language [DDL]), write or change data (using data manipulation
    language [DML]), and execute various commands for managing the server.


    There are two mechanisms for connecting to MySQL. You can use an application like
    the MySQL Shell or MySQL Workbench, or you can use the older MySQL client. Let’s
    look at both options.'
