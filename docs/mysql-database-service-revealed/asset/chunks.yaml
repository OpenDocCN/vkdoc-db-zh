    let’s add block storage to our compute instance.


    ## Add Block Storage to the Compute Instance


    Since the default boot volume is 50 GB, it is likely too small for storing any
    large applications or even data. After all, the boot volume is intended to be
    used to store system applications and the like rather than user applications.
    Fortunately, we can add a block volume easily to the compute instance for our
    application and data purposes.


    The process to add a block volume is a bit more complicated than a simple click-through
    interface like we’ve seen thus far. Briefly, we will need to perform the following
    operations:

    - Create a block volume

    - Attach the block volume to the compute instance

    - Connect the block volume on the compute instance

    - Format and mount the block volume on the compute instance


    To create a block volume, open the cloud console menu and select *Storage* then
    *Block Volumes* as shown in Figure [2-35](#527055_1_En_2_Chapter.xhtml#Fig35).
    However, this time, right-click on the *Block Volumes* label and open the selection
    in a new tab. We will need to see both the compute instance detail and block volume
    pages.


    **Figure 2-35** Block Volumes (Main Menu)

    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig35_HTML.jpg)

    An Oracle cloud with the main menu highlights the storage. The storage menu is
    opened on the right side, highlighting the block volume with a rectangular box
    for selection.


    On the Block Volumes page, you will need to select the compartment using the filter
    control on the left as shown in Figure [2-36](#527055_1_En_2_Chapter.xhtml#Fig36).
    Select the `oci-tutorial-compartment` that we created earlier.


    **Figure 2-36** Set List Scope (Block Volumes Page)

    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig36_HTML.jpg)

    A menu of list scope. It has compartments option below it and displays the names
    of compartments to be selected. The Oci-tutorial compartment is selected.


    Next, click the *Create Block Volume* button in the instances list as shown in
    Figure [2-37](#527055_1_En_2_Chapter.xhtml#Fig37). This will launch the create
    instance dialog.


    **Figure 2-37** Block Volumes List (`oci-tutorial-compartment`)

    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig37_HTML.png)

    A table to list the block volumes. It has 3 rows and 10 columns. No items are
    added to the block volume list.


    When you click the *Create Block Volume* button, you will see the create block
    volume dialog. At the top of the form is an entry for the block volume name. If
    you are following along, use `oci-tutorial-block-volume-1` as the name. You should
    also see the `oci-tutorial-compartment` selected for the compartment.


    Below that is an area to select the availability domain. This is where things
    can go wrong. If you select an availability domain different from your compute
    instance, you will not be able to attach the block volume to your compute instance.


    Go back to the compute instance detail page and look for the availability domain
    located beneath the *General Information* label. Be sure to note which availability
    domain is used and select the same availability domain in the create block volume
    dialog. In this tutorial, we used the `AD-2` availability domain (it may be spelled
    differently depending on what region you are in).


    You can leave the size of the block volume the default (50 GB).


    When you are ready, click the *Create Block Volume* button as shown in Figure
    [2-38](#527055_1_En_2_Chapter.xhtml#Fig38).


    **Figure 2-38** Create Block Volume Dialog

    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig38_HTML.png)

    A window to create the block volume with a name, compartment, and availability
    domain details. Volume size and performance with the default option selected give
    the details.


    Like the compute instance, you will be directed to the block volume detail page
    where you can watch the block volume being provisioned. When it is ready, the
    state will change to `AVAILABLE` with a green background as shown in Figure [2-39](#527055_1_En_2_Chapter.xhtml#Fig39).


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig39_HTML.png)'
