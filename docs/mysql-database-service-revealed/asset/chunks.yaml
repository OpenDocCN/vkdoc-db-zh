    #### Older MySQL Versions


    There is one more compatibility issue to consider: the MySQL version. The minimum
    version supported for migration is MySQL 5.7.9\. However, if you have a version
    older than the current version offered in MDS (currently 8.0.29), you should consider
    running the MySQL Shell Upgrade Checker Utility to see a report of potential issues
    with your migration. See the MySQL Shell User Guide – Upgrade Checker Utility
    ([`https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-utilities-upgrade.xhtml`](https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-utilities-upgrade.xhtml))
    for more information on this utility.


    Now that we have learned a little about the data migration process, we can see
    examples of the methods to learn how to use them. In the following sections, we
    will see examples of export and import in action by migrating data from our local
    MySQL server to a DB System first then revisit the processes for migrating data
    from our DB System to our local MySQL server. As you will see, each process requires
    use of the export and import mechanisms and we will see a variety of ways to complete
    the process. This gives you options to getting your data into MDS that you can
    tailor to your needs.


    If you want to follow along with the examples in the next sections, you should
    prepare your local MySQL server to contain only the *sakila* and *world* databases.
    If you include other databases, you may need to adjust the commands shown. You
    can find these sample databases and how to install them on [`https://dev.mysql.com/doc/index-other.xhtml`](https://dev.mysql.com/doc/index-other.xhtml)
    under the *Example Databases* heading.


    ## Migrating Data to MDS


    When migrating data to MDS, we must choose one of the three methods for moving
    the exported data to MDS. Recall, these include using an ObjectStore bucket, uploading
    the exported data to an intermediate Compute instance, and uploading the exported
    data directly to our DB System via a Bastion gateway. This section demonstrates
    migrating data to MDS using each mechanism. As you will see, all use the MySQL
    Shell to export and import data.'
