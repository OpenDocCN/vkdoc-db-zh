    当您在菜单中点击 `Channels` 时，您将看到与该数据库系统关联的通道列表，包括名称、源、目标、状态、详细信息、是否启用以及创建日期。


    ![](img/527055_1_En_4_Fig29_HTML.png)


    一个窗口显示了资源选项卡，其中选择了通道。表格显示未找到项目。创建通道按钮位于右上角。


    图 4-29


    通道资源窗格（数据库系统）


    ## 工作请求


    回想一下我们之前创建数据库系统时的情况，工作请求是 OCI 内部运行的一个或多个进程，用于在数据库系统上执行某些操作。这些操作可以包括备份、编辑（更新）数据库系统、停止、重启等。


    当您在菜单中点击 `Work Requests` 时，您将看到工作请求列表出现在右侧窗格中，如图 4-30 所示。这将包括所有过去的工作请求以及任何当前活动的请求。该列表显示操作（工作请求名称）、状态、进度条、完成百分比、OCI
    接受工作请求的时间、开始日期以及完成日期。


    ![](img/527055_1_En_4_Fig30_HTML.png)


    一个窗口显示了资源选项卡，其中选择了工作请求。表格显示了操作创建 d b system 的活动。


    图 4-30


    工作请求资源窗格（数据库系统）


    如果列出了工作请求，您可以在上下文菜单（行右侧垂直堆叠的三个点）上操作以管理工作请求并查看详细信息。


    现在，让我们看一下详细信息页面中心显示的数据库系统信息。


    ## MySQL 数据库系统信息和标签


    在数据库系统详细信息页面的中心有两个选项卡：一个用于显示处理数据库系统的关键元数据的 `Information`（信息），另一个用于显示为数据库系统创建的标签或标记（包括系统生成和用户定义的标签）的
    `Tags`（标签）。让我们分别看看这些选项卡。

    '
- fmt: '## DB System Information Tab


    The large area in the center of the details page contains a host of important
    information. The details are broken into several sections described below. Included
    in the description are key values or parameters that you may need to use for certain
    operations. Figure [4-31](#527055_1_En_4_Chapter.xhtml#Fig31) shows an excerpt
    of the tutorial DB System for you to use in locating the information described
    in the list.


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig31_HTML.png)


    A tab of `DB` system information with general information, `DB` system configuration,
    Backup, Deletion plan, Maintenance, Heatwave, High availability, Networking, and
    End point.


    Figure 4-31


    DB System Information Tab


    The `DB System Information` tab displays the following information by section.
    Notice there are some data presented as a link. These can be used to navigate
    to the details page for that resource or object or as shortcuts to run common
    operations.


    *   *General Information*: Displays the `OCID` with a link to copy it to your
    clipboard, description (that you provided when you created the `DB System`), compartment
    where the `DB System` resides, and the date created. The `OCID` is the most important
    piece of information in this section as you may need to use it for certain advanced
    operations and features.


    *   *DB System Configuration*: Displays information about the `DB System` including
    its shape, memory and storage size, MySQL version and configuration, and if crash
    recover is enabled. The edit link next to the storage size is a shortcut to changing
    the storage size of the `DB System`.


    *   *Backup*: Displays whether automatic backups are enabled, the retention (in
    days) of backups, and the window for running automatic backups. The enable/disable
    links are shortcuts for enabling or disabling automatic backups.


    *   *Deletion Plan*: Displays the deletion plan for the `DB System` including
    if it is enabled, the retention time for automatic backups, and the state of the
    final backup. The enable/disable links are shortcuts for enabling or disabling
    the deletion plan.


    *   *Maintenance*: Displays the start of the next maintenance cycle for `MDS`.
    This is the time when automatic upgrades and updates will occur. You can use it
    to time or delay critical operations to ensure your applications run smoothly.


    *   *HeatWave*: Displays information about `HeatWave` clusters. See `Chapter 8`
    for more details.


    *   *High Availability*: Displays information about the high availability configuration.
    See `Chapter 7` for more details.


    *   *Networking*: Displays the `VCN`, subnet, and subnet type where the `DB System`
    is connected. You may need to refer to this information for connecting services.


    *   *Endpoint*: Displays the private `IP` address the `DB System` is using on
    the `VCN`, a fully qualified domain name (`FQDN`), availability domain, fault
    domain, and the MySQL ports configured along with a helpful link to the documentation
    on how to connect to a `DB System`. We will explore that topic in the next section.
    The critical information you will need to use from this section includes the Private
    `IP` address (use the copy link to copy it to your clipboard). It may also be
    helpful to see the availability domain and fault domain at-a-glance when planning
    connections and other features.


    ## Tags Tab


    Next are the tabs section of the interface as shown in Figure [4-32](#527055_1_En_4_Chapter.xhtml#Fig32).
    Here, we will see all of the tags for the `DB System` to include any `OCI`-generated
    as well as user-defined tags. Notice we have two `OCI`-generated tags and a single
    user-defined tag. You can switch between these lists by clicking on the `Defined
    Tags` or `Free-form Tags` labels.


    You can create a user-defined tag by using the `More Actions` menu and selecting
    `Add Tags`. Note that tag names do not permit spaces or any character that cannot
    be printed (`ASCII`).


    Notice in the figure we see a small pencil icon next to the tag. If the pencil
    icon is enabled (not greyed out), you can click on it to edit the tag.


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig32_HTML.jpg)


    A dialog box with the tags selected from the Database system. Two defined tags
    are listed.


    Figure 4-32


    DB System Tags Tab


    Now, let’s look at the most common operations for the `DB System`; stopping and
    starting.


    Tip


    See [`https://docs.oracle.com/en-us/iaas/mysql-database/doc/managing-db-system.xhtml`](https://docs.oracle.com/en-us/iaas/mysql-database/doc/managing-db-system.xhtml)
    for more details on the resources and operations available on the `DB System`
    Details page.


    ### Stopping and Starting the DB System


    If you recall from the `More Actions` menu discussed earlier, you can stop and
    start a `DB System`. If you are not using or won’t be planning to use the `DB
    System` for some time, it may be a good idea to stop it. Stopping the `DB System`
    will reduce the cost burden against your account. You will still be billed a small
    amount since you have allocated billable resources, but you won’t be billed for
    an idle compute instance. If you plan to follow along with the next section, you
    do not need to stop the `DB System`. However, if you plan to come back to it later,
    you should stop the `DB System` and start it again when you are ready to continue
    the tutorial.


    To stop a `DB System`, you can use the `More Actions` button menu to select `Stop`.
    Similarly, to start a stopped `DB System`, you can use the Action button menu
    and select `Start`. Both operations take a while to complete but the status of
    the `DB System` will change accordingly, and you can watch the work requests list
    to check its progress.


    Now that we have our `DB System` created, you may be wondering how we can connect
    to it like we did with our MySQL server that we installed on our `PC` in `Chapter
    4`. As you will see, there are several mechanisms we can use depending on our
    requirements.


    ## Connecting to Your DB System


    Connecting to your MySQL `DB System` is not like a MySQL server you’ve installed
    on your `PC` or in your local network. Recall, a `DB System` is created in a `VCN`
    and, more specifically, in a private subnet. This means the `DB System` is only
    reachable by a machine that is also attached to or has access to the private subnet.
    So, you cannot connect to your `DB System` directly from your `PC` without some
    additional steps. In fact, there are several mechanisms you can use to connect
    to your `DB System`. We will learn about these mechanisms in this section.


    Note


    Preparing your connection method may take some time as you work through the steps.
    If you created a `DB System` in the last section and following along with this
    tutorial, you can leave the `DB System` running. However, if you want to read
    through this section and come back to it later, you should stop your `DB System`
    to reduce the cost and start it when you are ready to connect.'
