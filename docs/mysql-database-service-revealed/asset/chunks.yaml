- fmt: '## Summary


    如果你已经按照本章的示例操作，并创建了自己的数据库系统、备份并进行了恢复，那么你已经了解到创建和操作数据库系统是非常容易的。一旦你熟悉了操作按钮的位置以及访问相同功能的几种方法，这就变得相当例行化了。


    而且，如果你曾在自己的硬件（甚至是你自己的个人电脑）上设置并安装过 MySQL，你很可能已经发现配置 MySQL 需要大量的工作。也就是说，与其他一些系统相比，安装是轻而易举的，但调整
    MySQL 可能是一个相当大的挑战。幸运的是，MDS 让所有这些工作都成为了过去。


    在本章中，我们学习了 MDS 备份资源。我们详细了解了备份资源，包括如何列出它们。我们还学习了如何备份我们的数据库系统，包括设置自动备份以及如何创建手动备份。我们了解了增量备份和完全备份之间的区别，以及何时可能需要使用每种方式。最后，我们学习了如何使用备份资源来恢复数据库系统。


    在下一章中，我们将学习如何启用一个名为“时间点恢复”的新恢复功能；这是一种自动恢复机制，可以将你的数据库恢复到过去特定的 5 分钟时间段。很酷。


    脚注 [1](#527055_1_En_5_Chapter.xhtml#Fn1_source)


    # 6. 时间点恢复


    备份和恢复面临的一个挑战，体现在需要将数据库或一组数据库恢复到关键事件发生前的特定时间点的任务上。更具体地说，数据被认为在某个导致不一致或数据丢失的特定事件之前是有效的。例如，该事件可能是操作员错误、软件缺陷或硬件/连接问题的结果。


    当这种情况发生时，系统管理员（或数据库管理员）必须使用最后一个已知完好的备份来恢复数据。然而，如果备份设置在午夜进行，而更改数据的事件发生在白天，那么可能会有数小时的数据变更丢失，并且必须以某种方式重新创建。


    幸运的是，MySQL 中有一个功能可以用来保护你自己免受此类恢复事件的影响。它被称为时间点恢复（PITR），是复制技术和备份策略的结合。


    在本章中，我们将从简要概述 PITR 在本地的工作原理开始，学习 OCI MySQL 数据库服务（MDS）中 DB 系统上的 PITR。这将使你有机会了解
    MDS 中的 PITR 以及如何利用它来为数据恢复获取优势。


    ## Overview


    拥有本地 MySQL 服务器的用户可以使用 MySQL 中的一个名为“二进制日志”的功能，它以特殊的二进制格式记录你数据的变更，如果在需要数据恢复时可以重放。与物理备份类似，二进制日志不是人类可读的，但与物理备份不同，它们必须一个事件（数据变更）一个事件地处理，这使得它们作为恢复机制使用起来很麻烦。


    启用二进制日志记录的最佳方式是在你的 `my.cnf`（或 `my.ini`）配置文件中添加以下行并重启你的 MySQL 服务器。


    ```

    log_bin=ON

    ```


    你也可以通过使用以下命令来判断二进制日志记录是否已启用。注意值为 `ON`，这意味着二进制日志记录已启用：


    ```

    MySQL  localhost:33060+ ssl  SQL > SHOW VARIABLES LIKE ''log_bin'' \G

    *************************** 1. row ***************************

    Variable_name: log_bin

    Value: ON

    1 rows in set (0.0033 sec)

    ```


    你也可以使用以下命令为特定命令或一系列命令关闭二进制日志记录，这告诉 MySQL 跳过记录事件。这对于某些管理命令或你不想暴露给二进制日志（或传播给二进制日志的消费者，例如那些用于复制的）的数据更改可能很有用：


    ```

    SET sql_log_bin = ON


    SET sql_log_bin = OFF

    ```


    有趣的是，二进制日志是启用 MySQL 高可用性功能的关键组件之一。我们将在第 [8](#527055_1_En_8_Chapter.xhtml) 章探讨
    MDS 中的高可用性功能。


    提示


    有关 MySQL 二进制日志的更多信息，请参阅 [`https://dev.mysql.com/doc/refman/8.0/en/binary-log.xhtml`](https://dev.mysql.com/doc/refman/8.0/en/binary-log.xhtml)。


    一旦二进制日志记录开启，你的 MySQL 服务器就会在处理每个事件时进行记录并将其写入日志。这些日志的设计允许手动或自动轮换以减小文件大小。


    当与常规备份结合使用时，你可以设置备份例程，在数据快照之前立即轮换二进制日志。这使你能够开始记录自上次备份以来创建了哪些二进制日志。


    如果发生需要恢复到自动备份之间时间段的事件，你可以恢复最新的备份，然后通过重放（执行或应用）自上次备份以来创建的二进制日志，将数据应用到事件发生点。对于在本地服务器上使用此机制的用户，你可以使用二进制日志记录工具来帮助定位恢复数据的精确位置。


    这种机制，即 PITR，在 MDS 中对于数据库系统是可用的，并且是完全自动化的。你无需担心二进制日志、要恢复哪个备份或任何此类细节——所有这些都由 MDS
    自动化机制处理。事实上，它使用起来非常简单，你只需打开它然后忘记它（直到你需要恢复数据）。


    然而，复杂任务的自动化总是会导致某种程度的限制，以使其一致且可靠。OCI 为 MDS PITR 施加的限制是恢复窗口。目前，你可以使用启用 PITR 的 DB
    系统将数据恢复到任何 5 分钟的时间段。因此，你最多可能需要手动恢复 5 分钟的数据，这对于在备份之间自动恢复数据来说是一个很小的代价。


    现在我们了解更多关于 PITR 的信息了，让我们看看如何设置我们的数据库系统。'
  raw: '## Summary


    If you’ve followed along with the examples in this chapter and created your own
    DB Systems, backups, and restored DB Systems, you’ve learned that creating and
    working with DB Systems is very easy. Once you get the hang of where the operations
    (buttons) are and the several ways you can access the same function, it becomes
    rather routine.


    And, if you have set up and installed MySQL on your own hardware (or even your
    PC), chances are you’ve discovered there is a lot of work needed to configure
    MySQL. That is, installation is a breeze compared to some other systems, but tuning
    MySQL can be quite a challenge. Fortunately, MDS makes all of that work a thing
    of the past.


    In this chapter, we learned about MDS backup resources. We learned the details
    of a backup resource including how to list them. We also learned how to backup
    our DB Systems including setting up automatic backups as well as how to create
    manual backups. We learned the differences between incremental and full backups
    along with when you might want to use each. Finally, we learned how to restore
    DB Systems using a backup resource.


    In the next chapter, we will learn how to enable a new recovery feature named
    Point-in-Time Recovery; an automated recovery mechanism that can restore your
    databases to a specific 5-minute time period in the past. Cool.


    Footnotes [1](#527055_1_En_5_Chapter.xhtml#Fn1_source)


    # 6. Point-in-Time Recovery


    One of the challenges of backup and recovery is manifested when faced with the
    task of recovering a database or set of databases to a specific point before a
    critical event occurs. More specifically, the data is considered valid prior to
    a specific event that caused inconsistencies or data loss. For example, the event
    could be the result of operator error, a software defect, or hardware/connectivity
    issues.


    When this happens, systems administrators (or database administrators) must restore
    the data with the last known good backup. However, if the backup were set up to
    occur in the middle of the night and the data-altering event occurs during the
    middle of the day, there could be hours of data changes lost and must be recreated
    in some manner.


    Fortunately, there is a feature in MySQL that you can use to protect yourself
    against such recovery events. It is named point-in-time recovery (PITR) and is
    a combination of replication technologies and backup strategies.


    In this chapter, we will learn about PITR in the OCI MySQL Database Service (MDS)
    on a DB System beginning with a brief overview of how PITR works on-prem. This
    will give you the opportunity to understand PITR in MDS and how to leverage it
    to your advantage for data recovery.


    ## Overview


    Those who have their on-prem MySQL servers have at their disposal a feature in
    MySQL called binary logs, which record the changes to your data in a special binary
    format that can be replayed if data recovery is needed. Like physical backups,
    binary logs are not human readable but unlike physical backups, they must be processed
    one event (data change) at a time making them cumbersome for use as a recovery
    mechanism.


    The best way to enable binary logging is to place the following line in your my.cnf
    (or my.ini) configuration file and restart your MySQL server.


    ```

    log_bin=ON

    ```


    You can also determine if binary logging is enabled by using the following command.
    Notice the value is ON, which means binary logging is enabled:


    ```

    MySQL  localhost:33060+ ssl  SQL > SHOW VARIABLES LIKE ''log_bin'' \G

    *************************** 1\. row ***************************

    Variable_name: log_bin

    Value: ON

    1 rows in set (0.0033 sec)

    ```


    You can also turn off binary logging for specific commands or a series of commands
    with the following, which tells MySQL to skip logging the events. This can be
    helpful for certain administrative commands or changes to data you do not want
    to expose to the binary log (or propagate to consumers of the binary logs such
    as those used in replication):


    ```

    SET sql_log_bin = ON


    SET sql_log_bin = OFF

    ```


    Interestingly, binary logs are one of the key components in enabling the high
    availability features in MySQL. We will explore the high availability features
    in MDS in Chapter [8](#527055_1_En_8_Chapter.xhtml).


    Tip


    See [`https://dev.mysql.com/doc/refman/8.0/en/binary-log.xhtml`](https://dev.mysql.com/doc/refman/8.0/en/binary-log.xhtml)
    for more information about the MySQL binary log.


    Once binary logging is turned on, your MySQL server is recording each event as
    it is processed and writes it in the log. The logs are designed so that they can
    be rotated manually or automatically to reduce file sizes.


    When combined with regular backups, you can set up your backup routines to rotate
    the binary logs immediately before a snapshot of the data. This enables you to
    begin recording which binary logs have been created since the last backup.


    Should an event occur where you need to restore to a time period between the automated
    backups, you can restore that latest backup and then apply the logs to the point
    of the event by replaying (executing or applying) the binary logs that were created
    since the last backup. For those using this mechanism on their on-prem servers,
    you can use binary logging tools to help locate a precise location to restore
    your data.


    This mechanism, PITR, is available in MDS for DB Systems and is fully automated.
    You need not worry about binary logs, which backup to restore, or any such details
    – all of it is handled by the MDS automation mechanisms. In fact, it is so easy
    to use you merely turn it on and forget about it (until you need to recover your
    data).


    However, automation of complex tasks always results in some level of restriction
    in order to make it consistent and dependable. The limitation imposed by OCI for
    MDS PITR is the recovery window. Currently, you can recover your data on your
    DB System with PITR enabled to any 5-minute time period. Thus, at most you may
    have to recover manually is 5 minutes of data, which is a small price to pay for
    automatic recovery of data between backups.


    Now that we know a little more about PITR, let’s see how to setup our DB Systems.'
