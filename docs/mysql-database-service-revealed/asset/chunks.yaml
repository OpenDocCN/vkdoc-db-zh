    It will not be possible to load the dump in an HA enabled MDS instance.

    Compatibility issues with MySQL Database Service 8.0.28 were found. Please use
    the ''compatibility'' option to apply compatibility adaptations to the dumped
    DDL.

    Validating MDS compatibility - done

    Util.dumpInstance: Compatibility issues were found (RuntimeError)

    Listing 7-2

    Checking for Compatibility (Issues Found)

    ```


    我们在这里看到了一些错误。其中大多数与不使用 `SECURITY INVOKER` 特性的对象有关。报告告诉我们要使用 `strip_definers` 兼容性选项。我们还看到了缺少主键的问题，但由于我们不会使用高可用性功能，所以这不是问题。为此，我们使用
    `ignore_missing_pks` 兼容性选项。其他被指出的问题包括注释掉的加密子句，这可以在迁移过程中修复。


    如果我们再次运行命令，但这次按照建议提供兼容性选项，使用以下命令（为便于阅读进行了格式化），我们将得到一个短得多的报告。我们还使用了 `strip_restricted_grants`
    兼容性选项来修复具有不兼容权限的用户账户（清单中未显示）：


    ```

    util.dumpInstance(".\test",

    {

    ocimds:true,

    dryRun:true,

    compatibility:[

    "strip_definers",

    "ignore_missing_pks",

    "strip_restricted_grants"

    ]

    }

    )

    ```


    一旦我们使用这个新命令，我们将得到一个更干净的报告，如清单 7-3 所示。


    ```

    dryRun enabled, no locks will be acquired, and no files will be created.

    Acquiring global read lock

    Global read lock acquired

    Initializing - done

    13 out of 17 schemas will be dumped and within them 43 tables, 8 views, 10 routines,
    6 triggers.

    4 out of 7 users will be dumped.

    Gathering information - done

    All transactions have been started

    Locking instance for backup

    Global read lock has been released

    Checking for compatibility with MySQL Database Service 8.0.28

    ...

    NOTE: One or more tables without Primary Keys were found.

    This issue is ignored.

    This dump cannot be loaded into an MySQL Database Service instance with High Availability.

    Compatibility issues with MySQL Database Service 8.0.28 were found and repaired.
    Please review the changes made before loading them.

    Validating MDS compatibility - done

    Writing global DDL files

    Writing users DDL

    Writing DDL - done

    Starting data dump

    0% (0 rows / ~83 rows), 0.00 rows/s, 0.00 B/s uncompressed, 0.00 B/s compressed

    Listing 7-3

    Checking for Compatibility (No Issues Found)

    ```


    在这里，我们看到一个所有关键兼容性问题都已解决的报告。然后你可以继续进行并删除 `dryRun:true` 选项。


    ### 较旧的 MySQL 版本


    还有一个兼容性问题需要考虑：MySQL 版本。迁移支持的最低版本是 MySQL 5.7.9。但是，如果你的版本比 MDS 中当前提供的版本（目前是 8.0.29）更旧，你应该考虑运行
    MySQL Shell 升级检查器实用程序，以查看迁移潜在问题的报告。有关此实用程序的更多信息，请参阅 MySQL Shell 用户指南 – 升级检查器实用程序
    ([`https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-utilities-upgrade.xhtml`](https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-utilities-upgrade.xhtml))。


    现在我们已经了解了数据迁移过程的一些知识，我们可以看到这些方法的示例来学习如何使用它们。在以下部分中，我们将看到通过首先将数据从本地 MySQL 服务器迁移到
    DB System，然后重新审视将数据从 DB System 迁移到本地 MySQL 服务器的过程，来实际操作导出和导入的示例。正如你将看到的，每个过程都需要使用导出和导入机制，我们将看到完成该过程的各种方式。这为你提供了将数据导入
    MDS 的选项，你可以根据需要进行调整。


    如果你想跟随下一部分的示例进行操作，你应该准备你的本地 MySQL 服务器只包含 `sakila` 和 `world` 数据库。如果你包含其他数据库，你可能需要调整所示的命令。你可以在
    [`https://dev.mysql.com/doc/index-other.xhtml`](https://dev.mysql.com/doc/index-other.xhtml)
    的 *示例数据库* 标题下找到这些示例数据库及其安装方法。


    ### 将数据迁移到 MDS


    在将数据迁移到 MDS 时，我们必须选择三种移动导出数据到 MDS 的方法之一。回想一下，这些方法包括使用 ObjectStore 存储桶、将导出的数据上传到中间的
    Compute 实例，以及通过 Bastion 网关将导出的数据直接上传到我们的 DB System。本节演示了使用每种机制将数据迁移到 MDS。正如你将看到的，所有方法都使用
    MySQL Shell 来导出和导入数据。

    '
- fmt: '### Using an ObjectStore Bucket


    The first method to export our data from our local MySQL server will use the ObjectStore
    as an intermediate storage for the exported data. We will use the MySQL Shell
    on our local MySQL server to create an export of the data, which we will place
    in ObjectStore and then access that data from our MDS DB System for the import
    again using MySQL Shell.


    In order to use the ObjectStore bucket option to upload the exported data, you
    must first configure your PC to permit use of the OCI CLI. This is because the
    mechanism and automation will require use of your security credentials during
    the process. We will need to configure our system to allow automated access to
    the objects in your OCI tenancy. However, you should consider the potential security
    implications of storing your OCI CLI access credentials on your PC. You only need
    to set up your PC once and unless your SSH key changes, you will not need to change
    the configuration.


    **Caution**


    Once you configure your PC for automated access to certain objects in your tenancy,
    you should ensure the security on your PC is sufficient to prevent unauthorized
    access to protect your OCI credentials.


    #### Configure Your PC for OCI CLI Access


    There are two things you will need to configure your PC to access your OCI objects
    via the API: (1) you will need an SSH key pair that you will upload the public
    key to your OCI account, and (2) you will need to create a special OCI configuration
    file that contains your account information. If you have an SSH key pair that
    you have already created, you can use that, but the following demonstrates how
    to create an SSH key pair and upload it to your OCI account.


    **Tip**


    The following examples show how to generate the SSH key pair on Windows. If you
    use a Mac or Linux, see `https://docs.oracle.com/en-us/iaas/Content/API/Concepts/apisigningkey.htm#Required_Keys_and_OCIDs`
    for examples of the platform-specific commands for generating keys.


    First, we need to create an SSH key pair, but we will place the keys in a special
    folder in our use account. Open the Windows PowerShell (or terminal) and create
    a folder named `.oci` in your user directory and change to the directory as shown:


    ```

    PS C:\Users\cbell> mkdir %HOMEDRIVE%%HOMEPATH%\.oci

    PS C:\Users\cbell> cd %HOMEDRIVE%%HOMEPATH%\.oci

    PS C:\Users\cbell\.oci>

    ```


    Next, we will generate the SSH key pair starting with the private key, then generate
    the public key. Note that you will be asked to provide a password for the key.
    Be sure to choose a password that differs from your MySQL administrative password
    and that you will remember as you will need to use it to access the keys. The
    following commands show you how to create the keys. The commands are shown in
    bold:


    ```

    PS C:\Users\cbell\.oci> openssl genrsa -out oci_api_key.pem -aes128 -passout stdin
    2048

    Generating RSA private key, 2048 bit long modulus (2 primes)

    ........................+++++

    ....+++++

    e is 65537 (0x010001)

    Enter pass phrase for oci_api_key.pem:

    Verifying - Enter pass phrase for oci_api_key.pem:

    PS C:\Users\cbell\.oci> openssl rsa -pubout -in oci_api_key.pem -out oci_api_key_public.pem

    Enter pass phrase for oci_api_key.pem:

    writing RSA key

    ```


    **Note**


    Mac and Linux system require the keys have a special set of permissions. You will
    need to run the command `chmod go-rwx ~/.oci/oci_api_key.pem` to set the permissions
    correctly for these platforms.


    We will be uploading the public key to our OCI account. We can do so by either
    uploading the public key or by pasting in the text of the key. In this example,
    we will paste the text so we can show the contents of the key with the `type`
    command as shown. Notice the output is obscured for security. Your own key will
    appear similar but with different values:


    ```

    PS C:\Users\cbell\.oci> type oci_api_key_public.pem

    -----BEGIN PUBLIC KEY-----

    12039812039u10293012983912839128309128309812039810-923801928309182

    12039812039u10293012983912839128309128309812039810-923801928309182

    12039812039u10293012983912839128309128309812039810-923801928309182

    12039812039u10293012983912839128309128309812039810-923801928309182

    12039812039u10293012983912839128309128309812039810-923801928309182

    12039812039u10293012983912839128309128309812039810-923801928309182

    UQIDAQAB

    -----END PUBLIC KEY-----

    ```


    Now that we have our keys generated, we can add the key to our OCI account. From
    the OCI console, open your account settings by clicking on your use icon in the
    upper-right corner and choose *My Profile*. Then, in the Resources list, choose
    API keys as shown in Figure [7-1](#527055_1_En_7_Chapter.xhtml#Fig1).


    ![](images/527055_1_En_7_Chapter/527055_1_En_7_Fig1_HTML.png)


    The window with the resources tab, in which A P I keys is selected is on the left.
    The button Add A P I key is on the top and a column for fingerprint and created
    is present.


    Figure 7-1


    API Keys (My Profile)'
