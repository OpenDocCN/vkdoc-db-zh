- fmt: '## 查找无主键的表


    您可以通过搜索MySQL元数据来定位没有主键的表。清单 [8-1](#527055_1_En_8_Chapter.xhtml#PC1) 展示了一条SQL语句，可用于挖掘MySQL中的元数据数据库。请注意，我们使用
    `information_schema` 和 `tables` 来查找表名和模式，并通过连接到 `information_schema.statistics`
    表来查找主索引，从而判断表是否有主键。同时，我们排除了MySQL的元数据库。


    ```sql

    SELECT t.table_schema, t.table_name

    FROM information_schema.tables t

    LEFT JOIN (SELECT table_schema, table_name

    FROM information_schema.statistics

    WHERE index_name = ''PRIMARY''

    GROUP BY table_schema, table_name, index_name

    ) pks

    ON t.table_schema = pks.table_schema AND t.table_name = pks.table_name

    WHERE pks.table_name IS NULL

    AND t.table_type = ''BASE TABLE''

    AND t.table_schema NOT IN (''mysql'', ''sys'', ''performance_schema'', ''information_schema'');

    ```

    清单 8-1

    定位无主键表的SQL语句


    清单 [8-2](#527055_1_En_8_Chapter.xhtml#PC2) 展示了执行该SQL语句的结果，其中发现了一张没有主键的表。


    ```sql

    MySQL  localhost:33060+ ssl  SQL > SELECT t.table_schema, t.table_name FROM information_schema.tables
    t

    LEFT JOIN (SELECT table_schema, table_name

    FROM information_schema.statistics

    WHERE index_name = ''PRIMARY''

    GROUP BY table_schema, table_name, index_name

    ) pks

    ON t.table_schema = pks.table_schema AND t.table_name = pks.table_name  WHERE
    pks.table_name IS NULL

    AND t.table_type = ''BASE TABLE''

    AND t.table_schema NOT IN (''mysql'', ''sys'', ''performance_schema'', ''information_schema'');

    +--------------+------------+

    | TABLE_SCHEMA | TABLE_NAME |

    +--------------+------------+

    | no_keys      | t1         |

    +--------------+------------+

    1 row in set (0.0230 sec)

    ```

    清单 8-2

    检查缺失的主键（SQL）


    ## 添加代理主键


    虽然您可以轻松使用 `ALTER TABLE` SQL命令为主键添加一个或多个字段，或者添加一个自增字段来创建代理键。然而，还有另一种方法：不可见列。在MySQL
    8.0.23及更高版本中，您可以向表中添加一列并将其设置为不可见（查询中不显示）。在这种情况下，不可见列就是表的代理键，它满足了HA DB系统的要求。


    以下示例展示了如何使用 `ALTER TABLE` 语句为上面清单中的表创建一个不可见列作为主键。注意，我们像往常一样添加了一个自增列作为主键，但 `INVISIBLE
    FIRST` 子句创建了不可见列：


    ```sql

    ALTER TABLE no_keys.t1 ADD surrogate_key BIGINT UNSIGNED NOT NULL AUTO_INCREMENT
    PRIMARY KEY INVISIBLE FIRST;

    ```


    清单 [8-3](#527055_1_En_8_Chapter.xhtml#PC4) 展示了修改后表的结构。


    ```sql

    MySQL  localhost:33060+ ssl  SQL > EXPLAIN no_keys.t1\G

    *************************** 1. row ***************************

    Field: surrogate_key

    Type: bigint unsigned

    Null: NO

    Key: PRI

    Default: NULL

    Extra: auto_increment INVISIBLE

    *************************** 2. row ***************************

    Field: a

    Type: int

    Null: YES

    Key:

    Default: NULL

    Extra:

    *************************** 3. row ***************************

    Field: b

    Type: char(1)

    Null: YES

    Key:

    Default: NULL

    Extra:

    3 rows in set (0.0024 sec)

    ```

    清单 8-3

    使用不可见代理主键的 `ALTER TABLE` 示例


    > 提示

    > 有关不可见列的更多信息，请参见 [`https://dev.mysql.com/doc/refman/8.0/en/invisible-columns.xhtml`](https://dev.mysql.com/doc/refman/8.0/en/invisible-columns.xhtml)。


    既然您已经了解了高可用性（HA）能够解决的目标或要求，现在让我们来讨论如何设置您的DB系统以使用MDS高可用性功能。


    ## 如何设置HA


    在DB系统上设置HA非常简单。您只需要在创建DB系统时选择启用HA的选项，或在现有DB系统上启用HA。以下部分将演示这两种情况。


    ### 设置HA（创建DB系统）


    创建DB系统时，您可以选择启用HA。以下说明了在创建新DB系统时如何启用HA。我们省略了与创建独立DB系统相同的细节，因此如果您想继续操作，可能需要参考第
    [4](#527055_1_En_4_Chapter.xhtml) 章的 *创建DB系统* 部分以了解如何创建DB系统。


    回顾一下，我们通过使用OCI云界面并选择 *数据库* | *MySQL* | *DB系统*，然后单击 *创建DB系统* 按钮来创建DB系统。在对话框顶部附近，您会看到一个部分，允许您在
    *独立*、*高可用性* 和 *HeatWave* 之间进行选择。要启用HA，请选择 *高可用性* 选项，如图 [8-1](#527055_1_En_8_Chapter.xhtml#Fig1)
    所示。


    ![](images/527055_1_En_8_Chapter/527055_1_En_8_Fig1_HTML.png)


    一个用于创建独立、高可用性和HeatWave的D B系统的框图。高可用性块已启用。


    图 8-1

