    The last example we will look at is the operation to create a new DB System. While
    the Python code may seem more complex, but it uses the same features of this example
    only with a more sophisticated Python programming style. However, there are more
    API methods, and the parameters are more complex.


    ### Creating a DB System


    Recall from the create DB System example in the CLI section that we needed several
    pieces of information in order to create the DB System. We repeat the required
    and optional parameters in the following list:


    *   `--compartment-id <id>`: The compartment id.

    *   `--shape-name <name>`: The shape name.

    *   `--subnet-id <id>`: The subnet OCID.

    *   `--availability-domain <name>`: The availability domain name to use.

    *   `--admin-password <password>`: The password for the MySQL administrative user.

    *   `--admin-username <name>`: The username for the MySQL administrative user.

    *   `--data-storage-size-in-gbs <int>`: Size of the data storage (database drive)
    in GBs.

    *   `--display-name <text>`: A user-friendly name for the DB System.

    *   `--is-highly-available <bool>`: Specifies if the DB System is highly available.


    Recall from the CLI example, we used four CLI commands; one each to get the shape
    name, subnet id, and availability domain, and one to perform the create. This
    example using the Python API will do the same thing only in a single Python script.


    Like the last example, we will display a simple user interface to allow the user
    to choose the items from the lists asking only for the display name and data size
    as prompts. We will also prompt for the MySQL administrative user and password.


    Rather than go through line-by-line, let’s summarize what we will be doing. We
    know we must get the subnet, shape, and availability domain so we will write methods
    to get that information using a helper method that presents a list to the user
    prompting her to choose one from the list. Thus, we will get these three data
    items from the user.


    In doing so, we will explore more API classes including the `oci.core.VirtualNetworkClient`,
    `oci.mysql.MysqlaasClient`, and `oci.identity.IdentityClient` classes calling
    the appropriate methods for getting a list of those resources.


    The optional parameters; MySQL administrator user and password, data storage size,
    and display name are read from the user with prompts. We also set the HA to disabled
    by default.


    Once we have all the information, we use the `create_db_system()` method of the
    `oci.mysql.DbSystemClient` class to create the DB System. This method requires
    the population of a model named `oci.mysql.models.CreateDbSystemDetails`.


    Finally, since the `create_db_system()` method returns immediately, we pole the
    DB System by fetching its details with the `get_db_system()` method passing in
    the OCID for the new DB System as returned in the `create_db_system_response.data.id`
    variable. We pole the DB System until its `lifecycle_state` equals `ACTIVE`. There
    are other methods for doing this including some helper methods in the OCI API,
    but those are a bit more advanced for those getting started. Polling the `lifecycle_state`
    is an acceptable initial solution if you want the script to execute and wait until
    the resource is ready.


    That’s about it. There are more nuances to this example especially the Python
    programming parts, but we leave those details to you to ponder as an exercise.
    There are no magical or arcane code constructs here, just normal Python code around
    the Python API for OCI.


    Listing [9-21](#527055_1_En_9_Chapter.xhtml#PC30) shows the completed script.
    Take a few moments and read it so that you understand how it works. Don’t worry
    about the Python details; they will come with experience working with Python.'
