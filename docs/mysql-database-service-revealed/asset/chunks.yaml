    ## Persistent Mount


    If you plan to use the compute instance with an attached block volume for more
    than experimentation or more than a single session, you will want to make the
    mapping permanent. To do so, you will need to edit the `/etc/fstab` file. To do
    so, you will need the UUID for the block volume. You can find the UUID using the
    `sudo blkid` command. Once you have the UUID, add the following line to the `/etc/fstab`
    file then run `sudo mount -a` to check the mapping:


    ```

    UUID= /mnt/data xfs defaults,_netdev,nofail 0 2

    ```


    Once that is done, the drive will be mapped on boot.


    That’s it! Our tutorial is complete. If you are following along, feel free to
    explore the compute instance and block volume or create additional compute instances
    or block volumes as additional practice.


    The next step in the tutorial once you are done experimenting is to terminate
    the resources we don’t want to persist.


    ### Terminate the Resources


    This step is optional, but if you are experimenting with OCI resources, it is
    something you will not want to forget to do. Remember, any resources you create
    that aren’t part of the “always free” category/promotion will incur charges on
    your account. You don’t want to pay for things if you aren’t going to use them.


    This is one of the first lessons most people will learn about the cloud; unlike
    on-prem hardware that, when powered off, don’t cost you anything beyond the original
    investment (however complex that may be), most cloud resources are always billable.
    Some notable exceptions are resources that can be stopped. For example, the cost
    of a stopped compute instance is different from one that is active (running).
    Conversely, block storage incurs costs whether you are using it or not.


    We can minimize our costs by simply terminating (deleting) the resources we no
    longer need. In this case, we will take a more extreme step and terminate all
    of the resources we created in the tutorial that incurs costs or simply aren’t
    needed. In this tutorial, we only need to terminate the compute instance and block
    volume. Fortunately, terminating these high-level resources will also terminate
    the ancillary resources such as the block volume attachment:


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig47_HTML.jpg)


    Figure 2-47 Terminate Compute Instance (Compute Instance Details Page)


    There are several ways to terminate resources. The easiest to use is navigating
    directly to the resource details page and filter the view to show those you want
    to terminate (delete) and then use the *Terminate* button or *Other Actions* |
    *Terminate* menu.


    Let’s start with the compute instance. We’ll start from the main cloud console
    page. From there, open the main menu and select *Compute* then *Instances*. In
    the Compute Instances list, we can click on the name of the compute instance (shown
    as a hyperlink) to open the compute instance details page. From there, we click
    the *Other actions* menu near the top and then select *Terminate* as shown in
    Figure 2-47.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig48_HTML.jpg)


    Figure 2-48 Permanently Deleting the Attached Boot Volume


    When you click the button, you will see a popup message asking if you also want
    to delete the boot volume permanently. In this case, we do, and we should tick
    the *Permanently delete the attached boot volume* tick box as shown in Figure
    2-48. When ready, click the *Terminate instance* button.


