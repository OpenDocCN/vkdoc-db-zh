  trans: '# 堡垒服务术语


    以下总结了堡垒服务中使用的关键术语：


    *   **堡垒服务**：一项提供对目标资源进行安全公共访问的 OCI 服务。这些资源是那些您无法从虚拟云网络外部访问的资源，因为它们被置于虚拟云网络中的一个私有子网内。堡垒服务（有时实例就简称为堡垒）被置于虚拟云网络的公共子网中。客户端通过
    CIDR 允许列表来指定您允许连接到私有子网中特定资源或资源范围的地址或地址范围，以此进行身份验证。


    *   **会话**：会话用于通过与公钥 SSH 密钥对匹配的私钥向用户提供访问权限。SSH 密钥对在会话创建时被记录。因此，会话可以被视为通过堡垒服务建立的一个活动连接。


    *   **目标资源**：您想要连接的、位于虚拟云网络私有子网中的资源。


    *   **目标主机**：一种特定类型的目标资源，支持 SSH 连接，例如计算实例。


    ## 会话类型


    堡垒有两种类型的会话，设计用于连接到特定类型的目标资源。会话类型包括：


    *   **托管 SSH**：允许 SSH 访问运行 Linux、OpenSSH 服务器以及启用了堡垒插件的 Oracle Cloud Agent 的计算实例。


    *   **SSH 端口转发**：也称为 SSH 隧道。不需要在目标资源上运行 OpenSSH 服务器或 Oracle Cloud Agent。在客户端的特定端口和目标资源的特定端口之间创建一个安全连接。该隧道支持大多数
    TCP 协议，包括远程桌面协议、Oracle Net Services 和 MySQL。


    可以通过任何支持 SSH 的、用于与 OCI 资源通信的常规客户端访问堡垒。例如，您可以使用云控制台、CLI 或 OCI API。


    > 提示

    >

    > 要了解有关堡垒服务的更多信息，请参见 `https://docs.oracle.com/en-us/iaas/Content/Bastion/Concepts/bastionoverview.htm`。


    在本教程中，我们将使用端口转发选项和堡垒会话，通过我们的个人电脑连接到我们的 DB 系统。


    ## 先决条件


    在开始之前，我们需要以下信息。随着操作进行，我们将了解如何（以及在哪里）找到这些信息：


    *   DB 系统的私有 IP 地址

    *   虚拟云网络和子网

    *   客户端（例如个人电脑）IP 地址的无类域间路由

    *   最大会话时长（您希望连接保持打开的时间）

    *   SSH 密钥对

    *   虚拟云网络私有子网的入站规则


    显然，您需要有一个正在运行的（或可以启动的）DB 系统、它所连接的虚拟云网络以及子网。如果您没有可用的 DB 系统，请先返回创建一个再继续。


    我们还必须为私有子网设置一个入站规则，以允许来自公共子网的 MySQL 端口 3306 和 33060 的流量通过。如果您跳过了前面的示例，请返回标题为“*修改虚拟云网络——为私有子网创建入站规则*”的部分，并在继续之前创建入站规则。


    ## 创建堡垒服务


    现在让我们创建堡垒服务。使用云控制台主菜单，选择**身份与安全** | **堡垒服务**（您可能需要向下滚动一点），然后点击**创建堡垒**按钮，如图 4-39
    所示。确保选择了正确的 compartment。


    ![](img/527055_1_En_4_Fig39_HTML.png)


    **图 4-39** 创建新的堡垒服务（堡垒主页面）


    这将打开一个新对话框，您将在其中为我们虚拟云网络上的堡垒服务进行配置。首先，将堡垒命名为`MySQL Bastion`。请注意，堡垒的名称不能包含空格、下划线或短横线（它会提醒您）。接下来，从下拉框中选择`oci-tutorial-vcn`和`Public
    Subnet-oci-tutorial-vcn`。回想一下，我们想要从公共子网创建到私有子网的桥梁，因此堡垒必须位于公共子网中。接下来，我们还将使用一个`0.0.0.0/0`的
    CIDR（输入字符串后按*回车*键在框中确认），这是非常开放的（允许所有 IP 地址），但在生产环境中您可能希望修改它以限制访问。图 4-40 显示了填入相同数据的对话框。当您确认输入的数据正确后，点击**创建堡垒**按钮。


    ![](img/527055_1_En_4_Fig40_HTML.jpg)


    **图 4-40** 创建堡垒服务（对话框）


    您应该等待堡垒创建和配置完成后再继续下一步。


    ## 创建 SSH 密钥对


    我们需要一个 SSH 密钥对来与堡垒一起使用。现在就在您的个人电脑上创建一个吧。清单 4-4 展示了在`~/.ssh`文件夹中创建密钥对并为私钥分配权限的示例。注意使用的名称是`bastion_rsa`，但您可以使用任何名称，只需不要覆盖任何现有的密钥对即可。


    ```bash

    % ssh-keygen -t rsa

    Generating public/private rsa key pair.

    Enter file in which to save the key (/Users/XXXX/.ssh/id_rsa): /Users/XXXX/.ssh/bastion_rsa

    ...

    The key fingerprint is:

    SHA256:NGrshx+714+XXXXXXXXXXXXXXXXXXXXXXXXU YYYYYYYY.local

    The key''s randomart image is:

    +---[RSA 3072]----+

    ...

    +----[SHA256]-----+

    ```


    **清单 4-4** 生成 SSH 密钥对


    在 Windows 10 或 11 上生成 SSH 密钥对的方法，请参见`www.howtogeek.com/762863/how-to-generate-ssh-keys-in-windows-10-and-windows-11/`。在
    macOS 和 Linux 上创建 API 签名密钥的方法，请参见`https://docs.oracle.com/en-us/iaas/Content/API/Concepts/apisigningkey.htm#two`。'
- fmt: '#### Create a Port-Forwarding Session


    Now that we have what we need to create a port-forwarding session (also called
    an SSH tunnel), navigate to the Bastion details page by clicking on the newly
    created bastion in the list (`MySQLBastion`) as shown in Figure [4-41](#527055_1_En_4_Chapter.xhtml#Fig41).
    Alternatively, you can use the context menu to the right and choose `View Details`.


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig41_HTML.png)


    The main page of bastions in the o c i tutorial compartment. It has the create
    bastion button on the top left and an empty table below. The column headers are:
    name, state, bastion type and created.


    Figure 4-41


    Select the New Bastion Service


    On the bastion details page under the `Sessions` section, click the `Create session`
    button as shown in Figure [4-42](#527055_1_En_4_Chapter.xhtml#Fig42).


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig42_HTML.png)


    A dialog box with the create session button on the top. The column headers for
    the empty table are: name, session type, target resource, target port, username,
    state, session T T L and started.


    Figure 4-42


    Create Session (Bastion Details Page)


    This will open a dialog where we will create a port forwarding session. In the
    dialog, select the `SSH port forwarding session` in the `Session Type` drop-down,
    (optionally) name the session `MySQLSession`, enter `opc` in the `Username` text
    box, the Private IP address of the DB System (e.g., `10.0.1.73`), and the port
    we want to open (e.g., `33060`) as shown in Figure [4-43](#527055_1_En_4_Chapter.xhtml#Fig43).


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig43_HTML.png)


    A dialog box of the create session displays the details of the bastion name, session
    type, session name, I P address, and port. The target host is selected as the
    I P address.


    Figure 4-43


    Creating a Port Forwarding Session (Part 1)


    We use the `opc` user because it is the default user for systems like Bastion
    and Compute instances. The port you specify will be the port used to create the
    tunnel. You can choose whatever valid port you want. If you have MySQL installed
    on your PC, you may want to choose another port to use.


    As you scroll down in the dialog, you will see the next section where we will
    need to upload the public key from the key pair we generated. To do so, click
    the `Browse` link and select the public key we created earlier (e.g., `bastion_rda.pub`)
    as shown in Figure [4-44](#527055_1_En_4_Chapter.xhtml#Fig44). When you’ve verified
    the information entered is correct, you can click the `Create session` button.


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig44_HTML.png)


    A dialog box on the create session page. It displays the Add S S H key. It features:
    choose the S S H key file, place for adding the S S H public key, and create session
    button.


    Figure 4-44


    Creating a Port Forwarding Session (Part 2)


    You may need to wait a moment for the session to be created, but when it is, it
    will show in the list of sessions with a status of `Active` as shown in Figure
    [4-45](#527055_1_En_4_Chapter.xhtml#Fig45).


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig45_HTML.png)


    A dialog box with the create session button on the top. The column headers for
    the empty table are: name, session type, target resource, target port, username,
    state, session T T L, and started.


    Figure 4-45


    Sessions List in Bastion


    Notice the column `Session TTL`. This is the timeout (called time-to-live) for
    the SSH session. It represents a maximum limit for the time the session can be
    used. The default is 30 minutes (or 1800 seconds). You can set this when you create
    the session by clicking on `Advanced Options` in the create session dialog and
    changing the `Maximum session tine-to-live` value (and, optionally, the units)
    as shown in Figure [4-46](#527055_1_En_4_Chapter.xhtml#Fig46).


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig46_HTML.png)


    A dialog box with session configuration. It has a maximum session time to live,
    the target computes the instance port, and the target computes instance I P address.
    All fields are already filled.


    Figure 4-46


    Setting Session TTL


    You can now use it to connect your PC to your DB System.


    #### Connect from Your PC


    Now that we have the port forwarding session, we can open the tunnel. The command
    we need to use is a little complex, but fortunately OCI makes it easy for us by
    making a sample command that includes a special OCID that you can use to access
    the bastion port forwarding session. Simply click on the context menu in the `Sessions`
    list on the Bastion details page to open the context menu then choose `View SSH
    Command` as shown in Figure [4-47](#527055_1_En_4_Chapter.xhtml#Fig47).


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig47_HTML.jpg)


    A session context menu with edit session name, view S S H command, copy S S H
    command, copy O C I D, delete session and open support request.


    Figure 4-47


    Sessions Context Menu


    This will open a dialog as shown in Figure [4-48](#527055_1_En_4_Chapter.xhtml#Fig48)
    that displays the command. Click the `Copy` label to copy that command and then
    close the dialog by clicking the `Close` button.


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig48_HTML.jpg)


    A dialog box of view S S H command. It displays the S S H command with a copy
    button. The close button is at the bottom left.


    Figure 4-48


    View SSH Command Dialog (Session)


    We will need to edit it before we can use it. Specifically, we will need to add
    the SSH key path `~/.ssh/bastion_rsa` we created earlier and supply the port we
    used in the port forwarding session (`33060`), and the power we want to use on
    the DB System (`33060`) as shown below. The changes are shown in bold. Finally,
    we add the `&` operator to run the command and return to the command line (runs
    in the background). This is because the port forwarding connection needs to remain
    open for us to use it:


    ```

    % ssh -i ~/.ssh/bastion_rsa -N -L 33060:10.0.1.73:33060 -p 22 ocid1.bastionsession.oc1...bfa@host.bastion.us-ashburn-1.oci.oraclecloud.com
    &

    ```


    If you are following along, go ahead and open a terminal window on your PC and
    enter the command. You will need to wait until you see the following response
    before trying to connect to MySQL:


    ```

    Use of the Oracle network and applications is intended solely for Oracle''s authorized
    users. The use of these resources by Oracle employees and contractors is subject
    to company policies, including the Code of Conduct, Acceptable Use Policy and
    Information Protection Policy; access may be monitored and logged, to the extent
    permitted by law, in accordance with Oracle policies. Unauthorized use may result
    in termination of your access, disciplinary action and/or civil and criminal penalties.

    ```


    Once you get the response from SSH (from OCI), you can connect to MySQL on the
    DB System with the following command:


    ```

    % mysqlsh --sql mysql_admin@127.0.0.1:33060

    ```


    Notice we are using the `mysqlsh` to connect to MySQL on the loopback address
    (`127.0.0.1` or localhost) on port `33060`. This will send the communication down
    the SSH tunnel to the DB System. Listing [4-5](#527055_1_En_4_Chapter.xhtml#PC15)
    shows a transcript of the connection.'
  raw: '#### Create a Port-Forwarding Session


    Now that we have what we need to create a port-forwarding session (also called
    an SSH tunnel), navigate to the Bastion details page by clicking on the newly
    created bastion in the list (`MySQLBastion`) as shown in Figure [4-41](#527055_1_En_4_Chapter.xhtml#Fig41).
    Alternatively, you can use the context menu to the right and choose *View Details*.


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig41_HTML.png)


    The main page of bastions in the o c i tutorial compartment. It has the create
    bastion button on the top left and an empty table below. The column headers are:
    name, state, bastion type and created.


    Figure 4-41


    Select the New Bastion Service


    On the bastion details page under the *Sessions* section, click the *Create session*
    button as shown in Figure [4-42](#527055_1_En_4_Chapter.xhtml#Fig42).


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig42_HTML.png)


    A dialog box with the create session button on the top. The column headers for
    the empty table are: name, session type, target resource, target port, username,
    state, session T T L and started.


    Figure 4-42


    Create Session (Bastion Details Page)


    This will open a dialog where we will create a port forwarding session. In the
    dialog, select the `SSH port forwarding session` in the *Session Type* drop-down,
    (optionally) name the session `MySQLSession`, enter `opc` in the *Username* text
    box, the Private IP address of the DB System (e.g., `10.0.1.73`), and the port
    we want to open (e.g., `33060`) as shown in Figure [4-43](#527055_1_En_4_Chapter.xhtml#Fig43).


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig43_HTML.png)


    A dialog box of the create session displays the details of the bastion name, session
    type, session name, I P address, and port. The target host is selected as the
    I P address.


    Figure 4-43


    Creating a Port Forwarding Session (Part 1)


    We use the opc user because it is the default user for systems like Bastion and
    Compute instances. The port you specify will be the port used to create the tunnel.
    You can choose whatever valid port you want. If you have MySQL installed on your
    PC, you may want to choose another port to use.


    As you scroll down in the dialog, you will see the next section where we will
    need to upload the public key from the key pair we generated. To do so, click
    the *Browse* link and select the public key we created earlier (e.g., `bastion_rda.pub`)
    as shown in Figure [4-44](#527055_1_En_4_Chapter.xhtml#Fig44). When you’ve verified
    the information entered is correct, you can click the *Create session* button.


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig44_HTML.png)


    A dialog box on the create session page. It displays the Add S S H key. It features:
    choose the S S H key file, place for adding the S S H public key, and create session
    button.


    Figure 4-44


    Creating a Port Forwarding Session (Part 2)


    You may need to wait a moment for the session to be created, but when it is, it
    will show in the list of sessions with a status of `Active` as shown in Figure
    [4-45](#527055_1_En_4_Chapter.xhtml#Fig45).


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig45_HTML.png)


    A dialog box with the create session button on the top. The column headers for
    the empty table are: name, session type, target resource, target port, username,
    state, session T T L, and started.


    Figure 4-45


    Sessions List in Bastion


    Notice the column Session TTL. This is the timeout (called time-to-live) for the
    SSH session. It represents a maximum limit for the time the session can be used.
    The default is 30 minutes (or 1800 seconds). You can set this when you create
    the session by clicking on *Advanced Options* in the create session dialog and
    changing the *Maximum session tine-to-live* value (and, optionally, the units)
    as shown in Figure [4-46](#527055_1_En_4_Chapter.xhtml#Fig46).


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig46_HTML.png)


    A dialog box with session configuration. It has a maximum session time to live,
    the target computes the instance port, and the target computes instance I P address.
    All fields are already filled.


    Figure 4-46


    Setting Session TTL


    You can now use it to connect your PC to your DB System.


    #### Connect from Your PC


    Now that we have the port forwarding session, we can open the tunnel. The command
    we need to use is a little complex, but fortunately OCI makes it easy for us by
    making a sample command that includes a special OCID that you can use to access
    the bastion port forwarding session. Simply click on the context menu in the *Sessions*
    list on the Bastion details page to open the context menu then choose *View SSH
    Command* as shown in Figure [4-47](#527055_1_En_4_Chapter.xhtml#Fig47).


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig47_HTML.jpg)


    A session context menu with edit session name, view S S H command, copy S S H
    command, copy O C I D, delete session and open support request.


    Figure 4-47


    Sessions Context Menu


    This will open a dialog as shown in Figure [4-48](#527055_1_En_4_Chapter.xhtml#Fig48)
    that displays the command. Click the *Copy* label to copy that command and then
    close the dialog by clicking the *Close* button.


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig48_HTML.jpg)


    A dialog box of view S S H command. It displays the S S H command with a copy
    button. The close button is at the bottom left.


    Figure 4-48


    View SSH Command Dialog (Session)


    We will need to edit it before we can use it. Specifically, we will need to add
    the SSH key path `(~/.ssh/bastion_rsa`) we created earlier and supply the port
