- fmt: '### Data Transfer Strategies


    As mentioned, there are three ways to get your exported data to your DB System
    for import. The fastest is using another OCI resource called `ObjectStore` as
    the target from `MySQL Shell` where the shell copies the data directly to an `ObjectStore`
    bucket. A slower method is to use an intermediate `Compute` instance where you
    copy the data to the `Compute` instance then import it. The slowest method is
    to set up a `Bastion Service` to connect your PC to your DB System where the data
    is read from your PC when imported.


    Recall from Chapter [2](#527055_1_En_2_Chapter.xhtml), `ObjectStore` is a storage
    resource that allows you to treat a set of files and an object. `ObjectStore`
    permits you to place the files (objects) in a container called a bucket. Thus,
    when you use `MySQL Shell` to export to `ObjectStore`, you will be exporting the
    data files into a bucket and then later reading those files from the bucket during
    import.


    So, which method is best? That depends on your setup and how you’ve configured
    your `OCI` resources. However, the recommended method is to use `ObjectStore`.
    Be advised using `ObjectStore` to place the exported data in a bucket can lead
    to a small cost if you leave the files in the bucket (`ObjectStore` is a paid
    resource).


    ### What About Other Physical Backup Tools?


    While it is possible to use certain physical backup tools like `MySQL Enterprise
    Backup` (`MEB`) to take a backup of your on-prem `MySQL` and restore it on an
    `MDS` DB System, the procedure is complex and requires intimate knowledge of `MySQL`
    data file storage, the `DB System` configuration, as well as a valid license for
    the tool that can be used in `OCI`. Thus, using a physical backup tool to import
    your on-prem data is not recommended.


    ### Compatibility Concerns


    While you are unlikely to encounter problems when migrating your data to `MDS`,
    there are some considerations you should heed concerning compatibility between
    your on-prem `MySQL` servers and `MDS`.


    #### Security


    Primarily, there are some restrictions concerning security that may not be present
    on your on-prem server. Fortunately, the dump utilities in `MySQL Shell` can detect
    such issues, and in some cases, make your database (schema) compatible during
    the export by altering the SQL `CREATE` statements. You can enable this feature
    by specifying the `ocimds:true` option when you launch (call) the `util.dumpInstance()`
    method in `MySQL Shell`. These are added as a `JSON` document. For example, to
    supply the `ocimds` and `dryRun` options for the `util.dumpInstance()` call, you
    would use the following command:


    ```javascript

    util.dumpInstance(".\test",{ocimds:true,dryRun:true});

    ```


    This option instructs the `MySQL Shell` dump utility to run compatibility checks
    on your databases. If there are any issues found that cannot be automatically
    fixed, you will see a detailed report of those issues that includes strategies
    and examples on how to fix them.


    **Tip**


    It is strongly recommended to use the `ocimds:true` and `dryRun:true` options
    when using the dump utility in `MySQL Shell` for the first time. This will give
    you an opportunity to see and fix any potential issues before starting the migration.


    To use the automatic correction feature in the dump utility, you must pass the
    `compatibility=<list>` option providing one or more of the following compatibility
    checks overrides (entered as strings) in a comma-separated list when you call
    the method. For example, `util.dumpInstance(...compatibility:["force_innodb",
    "strip_definers"}...)`:


    *   `force_innodb`: modifies the `ENGINE=` clause to use `INNODB`. This ensures
    all tables are dumped with `CREATE TABLE` statements to use the `InnoDB` storage
    engine. `MDS` supports only the `InnoDB` storage engine.

    *   `strip_definers`: removes the `DEFINER=<account>` clause from views, routines,
    events, and triggers.

    *   `strip_restricted_grants`: removes those privileges from `GRANT` statements
    that are not used by `MDS`. These include `RELOAD`, `FILE`, `SUPER`, `BINLOG_ADMIN`,
    and `SET_USER_ID`.

    *   `skip_invalid_accounts`: skips any user accounts that do not have passwords.

    *   `strip_tablespaces`: removes the `TABLESPACE=<>` option from the `CREATE TABLE`
    statements.

    *   `create_invisible_pks`: adds primary keys to tables without them. `MDS` requires
    primary keys for high availability.

    *   `ignore_missing_pks`: permits tables without primary keys. Use only if you
    do not intend to use the high availability feature for `DB Systems`.


    **Tip**


    For more information about these options and compatibility checks, see [`https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-utilities-dump-instance-schema.xhtml`](https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-utilities-dump-instance-schema.xhtml).


    Let’s look at an example of using the compatibility feature.


    In this example, we have a `MySQL` server version `8.0.23` running on a local
    `PC`. There are several databases on the server some of which are the sample databases
    as shown in Listing [7-1](#527055_1_En_7_Chapter.xhtml#PC3).


    ```sql

    MySQL  localhost:33060+ ssl  SQL > SHOW DATABASES;

    +--------------------+

    | Database           |

    +--------------------+

    | animals            |

    | contact_list1      |

    | contact_list2      |

    | contact_list3      |

    | greenhouse         |

    | information_schema |

    | library_v1         |

    | library_v2         |

    | library_v3         |

    | mysql              |

    | performance_schema |

    | plant_monitoring   |

    | sakila             |

    | sys                |

    | test               |

    | world              |

    | world_x            |

    +--------------------+

    ```

    *Listing 7-1 Example: On-prem Server Databases*


    Notice the `sakila`, `world`, and `world_x` are sample databases from `Oracle`.


    To run the dump utility as a dry run and run the compatibility checks, we use
    the following command. Notice we must switch to the `JavaScript` mode to use the
    command. Also, the location or destination is required, but we will use a local
    subfolder named `test` as shown (no files will be created since it is a dry run):'
