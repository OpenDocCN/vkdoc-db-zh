    ```


    Once the client(s) are installed, you can connect to your MySQL instance using
    the MySQL admin user and password you provided when you created the DB System
    along with the private IP address from the DB System details page. Recall, this
    information is shown in the DB System Information (in the center of the page)
    under the DDD heading as shown in Figure 4-38. You can use the `Copy` link to
    copy the IP address.


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig38_HTML.jpg)

    The Database system information has an Endpoint with a hyperlink for how to connect.
    Private I P address, internal F Q D N, availability Domain, fault domain. The
    private I P address is highlighted.

    Figure 4-38 Locating the Private IP Address (DB System)


    Now we’re ready to connect. The following command shows the correct options (just
    one possible combination) for using the MySQL Shell to connect to our DB System.
    The options are similar for the MySQL client (remove the `--sql` option as it
    applies only to MySQL Shell):


    ```

    $ mysqlsh --sql -umysql_admin -p -h 10.0.1.15 --port=33060

    ```


    Alternatively, you can use an URI that combines the username, host, and port with
    the following command:


    ```

    $ mysqlsh --sql mysql_admin@10.0.1.15:33060

    ```


    > **Caution**

    > If you stopped your DB System earlier, be sure to start it and wait for it to
    become active before proceeding.


    Listing 4-3 shows a demonstration of using the command to connect to MySQL from
    the compute instance.


