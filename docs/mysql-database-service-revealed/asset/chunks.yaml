- fmt: "### Searching for Data\n\nThere are far more data types available than those\
    \ shown in the previous example. You should review the online reference manual\
    \ for a complete list of data types. See the section \"`Data Types.`\" If you\
    \ want to know the layout or \"schema\" of a table, use the `SHOW CREATE TABLE`\
    \ command.\n\n**Tip**  \nLike databases, you can also get a list of all the tables\
    \ in the database with the `SHOW TABLES` command.\n\nThe most used basic command\
    \ you need to know is the command to return the data from the table (also called\
    \ a result set or rows). To do this, you use the `SELECT` statement. This SQL\
    \ statement is the workhorse for a database system. All queries for data will\
    \ be executed with this command. As such, we will spend a bit more time looking\
    \ at the various clauses (parts) that can be used starting with the column list.\n\
    \n**Note**  \nWhile we examine `SELECT` statements first, if you want to try these\
    \ out on your system, be sure to run the `INSERT` statements in the following\
    \ section first.\n\nThe `SELECT` statement allows you to specify which columns\
    \ you want to choose from the data. The list appears as the first part of the\
    \ statement. The second part is the `FROM` clause, which specifies the table(s)\
    \ you want to retrieve rows from.\n\n**Note**  \nThe `FROM` clause can be used\
    \ to join tables with the `JOIN` operator. You will see a simple example of a\
    \ join in a later section.\n\nThe order that you specify the columns determines\
    \ the order shown in the result set. If you want all of the columns, use an asterisk\
    \ (`*`) instead. Listing 3-6 demonstrates three statements that generate the same\
    \ result sets. That is, the same rows will be displayed in the output of each.\
    \ In fact, I am using a table with only four rows for simplicity.\n\n```\nmysql>\
    \ SELECT plant_name, sensor_value, sensor_event, sensor_level FROM greenhouse.plants;\n\
    +--------------------+--------------+---------------------+--------------+\n|\
    \ plant_name         | sensor_value | sensor_event        | sensor_level |\n+--------------------+--------------+---------------------+--------------+\n\
    | fern in den        |       0.2319 | 2015-09-23 21:04:35 | NULL         |\n|\
    \ fern on deck       |         0.43 | 2015-09-23 21:11:45 | NULL         |\n|\
    \ flowers in bedroom1    |    0.301 | 2015-09-23 21:11:45 | NULL         |\n|\
    \ weird plant in kitchen |    0.677 | 2015-09-23 21:11:45 | NULL         |\n+--------------------+--------------+---------------------+--------------+\n\
    4 rows in set (0.00 sec)\nmysql> SELECT * FROM greenhouse.plants;\n+--------------------+--------------+---------------------+--------------+\n\
    | plant_name         | sensor_value | sensor_event        | sensor_level |\n+--------------------+--------------+---------------------+--------------+\n\
    | fern in den        |       0.2319 | 2015-09-23 21:04:35 | NULL         |\n|\
    \ fern on deck       |         0.43 | 2015-09-23 21:11:45 | NULL         |\n|\
    \ flowers in bedroom1    |    0.301 | 2015-09-23 21:11:45 | NULL         |\n|\
    \ weird plant in kitchen |    0.677 | 2015-09-23 21:11:45 | NULL         |\n+--------------------+--------------+---------------------+--------------+\n\
    4 rows in set (0.00 sec)\nmysql> SELECT sensor_value, plant_name, sensor_level,\
    \ sensor_event FROM greenhouse.plants;\n+--------------+-------------------+--------------+---------------------+\n\
    | sensor_value | plant_name        | sensor_level | sensor_event        |\n+--------------+-------------------+--------------+---------------------+\n\
    |       0.2319 | fern in den       | NULL         | 2015-09-23 21:04:35 |\n| \
    \        0.43 | fern on deck      | NULL         | 2015-09-23 21:11:45 |\n|  \
    \      0.301 | flowers in bedroom1    | NULL    |         23 21:11:45 |\n|   \
    \     0.677 | weird plant in kitchen | NULL    | 2015-09-23 21:11:45 |\n+--------------+------------------------+---------+---------------------+\n\
    4 rows in set (0.00 sec)\n```\n\n**Listing 3-6** Example `SELECT` Statements\n\
    \nNotice that the first two statements result in the same rows as well as the\
    \ same columns in the same order, but the third statement, while it generates\
    \ the same rows, displays the columns in a different order.\n\nYou can also use\
    \ functions in the column list to perform calculations and similar operations.\
    \ One special example is using the `COUNT()` function to determine the number\
    \ of rows in the result set, as shown here. See the online reference manual for\
    \ more examples of functions supplied by MySQL:\n\n```\nSELECT COUNT(*) FROM greenhouse.plants;\n\
    ```\n\nThe next clause in the `SELECT` statement is the `WHERE` clause. This is\
    \ where you specify the conditions you want to use to restrict the number of rows\
    \ in the result set. That is, only those rows that match the conditions. The conditions\
    \ are based on the columns and can be quite complex. That is, you can specify\
    \ conditions based on calculations, results from a join, and more. But most conditions\
    \ will be simple equalities or inequalities on one or more columns in order to\
    \ answer a question. For example, suppose you wanted to see the plants where the\
    \ sensor value read is less than 0.40. In this case, we issue the following query\
    \ and receive the results. Notice I specified only two columns: the plant name\
    \ and the value read from sensor:\n\n```\nmysql> SELECT plant_name, sensor_value\
    \ FROM greenhouse.plants WHERE sensor_value < 0.40;\n+---------------------+--------------+\n\
    | plant_name          | sensor_value |\n+---------------------+--------------+\n\
    | fern in den         |       0.2319 |\n| flowers in bedroom1 |        0.301 |\n\
    +---------------------+--------------+\n2 rows in set (0.01 sec)\n```\n\nThere\
    \ are additional clauses you can use including the `GROUP BY` clause, which is\
    \ used for grouping rows for aggregation or counting, and the `ORDER BY` clause,\
    \ which is used to order the result set. Let’s take a quick look at each starting\
    \ with aggregation.\n\nSuppose you wanted to average the sensor values read in\
    \ the table for each sensor. In this case, we have a table that contains sensor\
    \ readings over time for a variety of sensors. While the example contains only\
    \ four rows (and thus may not be statistically informative), the example demonstrates\
    \ the concept of aggregation quite plainly, as shown in Listing 3-7. Notice what\
    \ we receive is simply the average of the four sensor values read.\n\n```\nmysql>\
    \ SELECT plant_name, sensor_value FROM greenhouse.plants WHERE plant_name = 'fern\
    \ on deck';\n+--------------+--------------+\n| plant_name   | sensor_value |\n\
    +--------------+--------------+\n| fern on deck |         0.43 |\n| fern on deck\
    \ |         0.51 |\n| fern on deck |        0.477 |\n| fern on deck |        \
    \ 0.73 |\n+--------------+--------------+\n4 rows in set (0.00 sec)\nmysql> SELECT\
    \ plant_name, AVG(sensor_value) AS avg_value FROM greenhouse.plants WHERE plant_name\
    \ = 'fern on deck' GROUP BY plant_name;\n+--------------+-------------------+\n\
    | plant_name   | avg_value         |\n+--------------+-------------------+\n|\
    \ fern on deck | 0.536750003695488 |\n+--------------+-------------------+\n1\
    \ row in set (0.00 sec)\n```\n\n**Listing 3-7** `GROUP BY` Example\n\nNotice I\
    \ specified the average function, `AVG()`, in the column list and passed in the\
    \ name of the column I wanted to average. There are many such functions available\
    \ in MySQL to perform some powerful calculations. Clearly, this is another example\
    \ of how much power exists in the database server that would require many more\
    \ resources on a typical lightweight sensor or aggregator node in the network.\n\
    \nNotice also that I renamed the column with the average with the `AS` keyword.\
    \ You can use this to rename any column specified, which changes the name in the\
    \ result set, as you can see in the listing.\n\nAnother use of the `GROUP BY`\
    \ clause is counting. In this case, we replaced `AVG()` with `COUNT()` and received\
    \ the number of rows matching the `WHERE` clause. More specifically, we want to\
    \ know how many sensor values were stored for each plant."
  raw: 'There are far more data types available than those shown in the previous example.
    You should review the online reference manual for a complete list of data types.
    See the section “*Data Types.*” If you want to know the layout or “schema” of
    a table, use the `SHOW CREATE TABLE` command.


    Tip


    Like databases, you can also get a list of all the tables in the database with
    the `SHOW TABLES` command.


    ### Searching for Data


    The most used basic command you need to know is the command to return the data
    from the table (also called a result set or rows). To do this, you use the `SELECT`
    statement. This SQL statement is the workhorse for a database system. All queries
    for data will be executed with this command. As such, we will spend a bit more
    time looking at the various clauses (parts) that can be used starting with the
    column list.


    Note


    While we examine `SELECT` statements first, if you want to try these out on your
    system, be sure to run the `INSERT` statements in the following section first.


    The `SELECT` statement allows you to specify which columns you want to choose
    from the data. The list appears as the first part of the statement. The second
    part is the `FROM` clause, which specifies the table(s) you want to retrieve rows
    from.


    Note


    The `FROM` clause can be used to join tables with the JOIN operator. You will
    see a simple example of a join in a later section.


    The order that you specify the columns determines the order shown in the result
    set. If you want all of the columns, use an asterisk (`*`) instead. Listing [3-6](#527055_1_En_3_Chapter.xhtml#PC12)
    demonstrates three statements that generate the same result sets. That is, the
    same rows will be displayed in the output of each. In fact, I am using a table
    with only four rows for simplicity.


    ```

    mysql> SELECT plant_name, sensor_value, sensor_event, sensor_level FROM greenhouse.plants;

    +--------------------+--------------+---------------------+--------------+

    | plant_name         | sensor_value | sensor_event        | sensor_level |

    +--------------------+--------------+---------------------+--------------+

    | fern in den        |       0.2319 | 2015-09-23 21:04:35 | NULL         |

    | fern on deck       |         0.43 | 2015-09-23 21:11:45 | NULL         |

    | flowers in bedroom1    |    0.301 | 2015-09-23 21:11:45 | NULL         |

    | weird plant in kitchen |    0.677 | 2015-09-23 21:11:45 | NULL         |

    +--------------------+--------------+---------------------+--------------+

    4 rows in set (0.00 sec)

    mysql> SELECT * FROM greenhouse.plants;

    +--------------------+--------------+---------------------+--------------+

    | plant_name         | sensor_value | sensor_event        | sensor_level |

    +--------------------+--------------+---------------------+--------------+

    | fern in den        |       0.2319 | 2015-09-23 21:04:35 | NULL         |

    | fern on deck       |         0.43 | 2015-09-23 21:11:45 | NULL         |

    | flowers in bedroom1    |    0.301 | 2015-09-23 21:11:45 | NULL         |

    | weird plant in kitchen |    0.677 | 2015-09-23 21:11:45 | NULL         |

    +--------------------+--------------+---------------------+--------------+

    4 rows in set (0.00 sec)

    mysql> SELECT sensor_value, plant_name, sensor_level, sensor_event FROM greenhouse.plants;

    +--------------+-------------------+--------------+---------------------+

    | sensor_value | plant_name        | sensor_level | sensor_event        |

    +--------------+-------------------+--------------+---------------------+

    |       0.2319 | fern in den       | NULL         | 2015-09-23 21:04:35 |

    |         0.43 | fern on deck      | NULL         | 2015-09-23 21:11:45 |

    |        0.301 | flowers in bedroom1    | NULL    |         23 21:11:45 |

    |        0.677 | weird plant in kitchen | NULL    | 2015-09-23 21:11:45 |

    +--------------+------------------------+---------+---------------------+

    4 rows in set (0.00 sec)

    Listing 3-6

    Example SELECT Statements

    ```


    Notice that the first two statements result in the same rows as well as the same
    columns in the same order, but the third statement, while it generates the same
    rows, displays the columns in a different order.


    You can also use functions in the column list to perform calculations and similar
    operations. One special example is using the `COUNT()` function to determine the
    number of rows in the result set, as shown here. See the online reference manual
    for more examples of functions supplied by MySQL:


    ```

    SELECT COUNT(*) FROM greenhouse.plants;

    ```


    The next clause in the `SELECT` statement is the `WHERE` clause. This is where
    you specify the conditions you want to use to restrict the number of rows in the
    result set. That is, only those rows that match the conditions. The conditions
    are based on the columns and can be quite complex. That is, you can specify conditions
    based on calculations, results from a join, and more. But most conditions will
    be simple equalities or inequalities on one or more columns in order to answer
    a question. For example, suppose you wanted to see the plants where the sensor
    value read is less than 0.40\. In this case, we issue the following query and
    receive the results. Notice I specified only two columns: the plant name and the
    value read from sensor:


    ```

    mysql> SELECT plant_name, sensor_value FROM greenhouse.plants WHERE sensor_value
    < 0.40;

    +---------------------+--------------+

    | plant_name          | sensor_value |

    +---------------------+--------------+

    | fern in den         |       0.2319 |

    | flowers in bedroom1 |        0.301 |

    +---------------------+--------------+

    2 rows in set (0.01 sec)

    ```


    There are additional clauses you can use including the `GROUP BY` clause, which
    is used for grouping rows for aggregation or counting, and the `ORDER BY` clause,
    which is used to order the result set. Let’s take a quick look at each starting
    with aggregation.


    Suppose you wanted to average the sensor values read in the table for each sensor.
    In this case, we have a table that contains sensor readings over time for a variety
    of sensors. While the example contains only four rows (and thus may not be statistically
    informative), the example demonstrates the concept of aggregation quite plainly,
    as shown in Listing [3-7](#527055_1_En_3_Chapter.xhtml#PC15). Notice what we receive
    is simply the average of the four sensor values read.


    ```

    mysql> SELECT plant_name, sensor_value FROM greenhouse.plants WHERE plant_name
    = ''fern on deck'';

    +--------------+--------------+

    | plant_name   | sensor_value |

    +--------------+--------------+

    | fern on deck |         0.43 |

    | fern on deck |         0.51 |

    | fern on deck |        0.477 |

    | fern on deck |         0.73 |

    +--------------+--------------+

    4 rows in set (0.00 sec)

    mysql> SELECT plant_name, AVG(sensor_value) AS avg_value FROM greenhouse.plants
    WHERE plant_name = ''fern on deck'' GROUP BY plant_name;

    +--------------+-------------------+

    | plant_name   | avg_value         |

    +--------------+-------------------+

    | fern on deck | 0.536750003695488 |

    +--------------+-------------------+

    1 row in set (0.00 sec)

    Listing 3-7

    GROUP BY Example

    ```


    Notice I specified the average function, `AVG()`, in the column list and passed
    in the name of the column I wanted to average. There are many such functions available
    in MySQL to perform some powerful calculations. Clearly, this is another example
    of how much power exists in the database server that would require many more resources
    on a typical lightweight sensor or aggregator node in the network.


    Notice also that I renamed the column with the average with the `AS` keyword.
    You can use this to rename any column specified, which changes the name in the
    result set, as you can see in the listing.


    Another use of the `GROUP BY` clause is counting. In this case, we replaced `AVG()`
    with `COUNT()` and received the number of rows matching the `WHERE` clause. More
    specifically, we want to know how many sensor values were stored for each plant.'
  trans: "\n### 数据搜索\n\n除了前一个示例中显示的类型外，还有更多数据类型可用。你应该查阅在线参考手册以获取完整的数据类型列表。参见“`数据类型`”章节。如果你想了解表的布局或“模式”，请使用\
    \ `SHOW CREATE TABLE` 命令。\n\n**提示**  \n与数据库类似，你也可以使用 `SHOW TABLES` 命令获取数据库中所有表的列表。\n\
    \n你需要掌握的最常用的基础命令是从表中返回数据（也称为结果集或行）的命令。为此，你需要使用 `SELECT` 语句。这个 SQL 语句是数据库系统的工作主力。所有针对数据的查询都将通过此命令执行。因此，我们将花更多时间来研究可以使用的各种子句（部分），从列列表开始。\n\
    \n**注意**  \n虽然我们首先研究 `SELECT` 语句，但如果你想在系统上尝试这些操作，请务必先运行下一节中的 `INSERT` 语句。\n\n\
    `SELECT` 语句允许你指定要从数据中选择哪些列。该列表作为语句的第一部分出现。第二部分是 `FROM` 子句，它指定了你想要从中检索行的表。\n\n\
    **注意**  \n`FROM` 子句可以与 `JOIN` 操作符一起使用来连接表。你将在后面的章节中看到一个连接的简单示例。\n\n你指定列的顺序决定了结果集中显示的顺序。如果你想要所有列，可以使用星号\
    \ (`*`) 代替。代码清单 3-6 演示了生成相同结果集的三个语句。也就是说，每个输出中都将显示相同的行。实际上，为简单起见，我使用了一个只有四行的表。\n\
    \n```\nmysql> SELECT plant_name, sensor_value, sensor_event, sensor_level FROM\
    \ greenhouse.plants;\n+--------------------+--------------+---------------------+--------------+\n\
    | plant_name         | sensor_value | sensor_event        | sensor_level |\n+--------------------+--------------+---------------------+--------------+\n\
    | fern in den        |       0.2319 | 2015-09-23 21:04:35 | NULL         |\n|\
    \ fern on deck       |         0.43 | 2015-09-23 21:11:45 | NULL         |\n|\
    \ flowers in bedroom1    |    0.301 | 2015-09-23 21:11:45 | NULL         |\n|\
    \ weird plant in kitchen |    0.677 | 2015-09-23 21:11:45 | NULL         |\n+--------------------+--------------+---------------------+--------------+\n\
    4 rows in set (0.00 sec)\nmysql> SELECT * FROM greenhouse.plants;\n+--------------------+--------------+---------------------+--------------+\n\
    | plant_name         | sensor_value | sensor_event        | sensor_level |\n+--------------------+--------------+---------------------+--------------+\n\
    | fern in den        |       0.2319 | 2015-09-23 21:04:35 | NULL         |\n|\
    \ fern on deck       |         0.43 | 2015-09-23 21:11:45 | NULL         |\n|\
    \ flowers in bedroom1    |    0.301 | 2015-09-23 21:11:45 | NULL         |\n|\
    \ weird plant in kitchen |    0.677 | 2015-09-23 21:11:45 | NULL         |\n+--------------------+--------------+---------------------+--------------+\n\
    4 rows in set (0.00 sec)\nmysql> SELECT sensor_value, plant_name, sensor_level,\
    \ sensor_event FROM greenhouse.plants;\n+--------------+-------------------+--------------+---------------------+\n\
    | sensor_value | plant_name        | sensor_level | sensor_event        |\n+--------------+-------------------+--------------+---------------------+\n\
    |       0.2319 | fern in den       | NULL         | 2015-09-23 21:04:35 |\n| \
    \        0.43 | fern on deck      | NULL         | 2015-09-23 21:11:45 |\n|  \
    \      0.301 | flowers in bedroom1    | NULL    |         23 21:11:45 |\n|   \
    \     0.677 | weird plant in kitchen | NULL    | 2015-09-23 21:11:45 |\n+--------------+------------------------+---------+---------------------+\n\
    4 rows in set (0.00 sec)\n```\n\n**代码清单 3-6** `SELECT` 语句示例\n\n请注意，前两个语句不仅结果行相同，列也相同且顺序一致，但是第三个语句，虽然生成了相同的结果行，但显示的列顺序不同。\n\
    \n你还可以在列列表中使用函数来执行计算和类似操作。一个特殊的例子是使用 `COUNT()` 函数来确定结果集中的行数，如下所示。有关 MySQL 提供的函数的更多示例，请参阅在线参考手册：\n\
    \n```\nSELECT COUNT(*) FROM greenhouse.plants;\n```\n\n`SELECT` 语句中的下一个子句是 `WHERE`\
    \ 子句。在这里，你指定要用于限制结果集中行数的条件。也就是说，只有那些符合条件的行。这些条件基于列，并且可以相当复杂。也就是说，你可以指定基于计算、连接结果等的条件。但大多数条件将是简单的一列或多列的相等或不等式，以便回答问题。例如，假设你想查看传感器读数小于\
    \ 0.40 的植物。在这种情况下，我们执行以下查询并接收结果。注意，我只指定了两列：植物名称和传感器读数：\n\n```\nmysql> SELECT plant_name,\
    \ sensor_value FROM greenhouse.plants WHERE sensor_value < 0.40;\n+---------------------+--------------+\n\
    | plant_name          | sensor_value |\n+---------------------+--------------+\n\
    | fern in den         |       0.2319 |\n| flowers in bedroom1 |        0.301 |\n\
    +---------------------+--------------+\n2 rows in set (0.01 sec)\n```\n\n你还可以使用其他子句，包括用于对行进行分组以进行聚合或计数的\
    \ `GROUP BY` 子句，以及用于对结果集进行排序的 `ORDER BY` 子句。让我们快速了解一下每个子句，从聚合开始。\n\n假设你想计算表中每个传感器的读数平均值。在这种情况下，我们有一个包含各种传感器随时间推移的读数的表。虽然该示例仅包含四行（因此可能不具有统计意义），但它非常清楚地演示了聚合的概念，如代码清单\
    \ 3-7 所示。注意，我们得到的结果只是四个传感器读数的平均值。\n\n```\nmysql> SELECT plant_name, sensor_value\
    \ FROM greenhouse.plants WHERE plant_name = 'fern on deck';\n+--------------+--------------+\n\
    | plant_name   | sensor_value |\n+--------------+--------------+\n| fern on deck\
    \ |         0.43 |\n| fern on deck |         0.51 |\n| fern on deck |        0.477\
    \ |\n| fern on deck |         0.73 |\n+--------------+--------------+\n4 rows\
    \ in set (0.00 sec)\nmysql> SELECT plant_name, AVG(sensor_value) AS avg_value\
    \ FROM greenhouse.plants WHERE plant_name = 'fern on deck' GROUP BY plant_name;\n\
    +--------------+-------------------+\n| plant_name   | avg_value         |\n+--------------+-------------------+\n\
    | fern on deck | 0.536750003695488 |\n+--------------+-------------------+\n1\
    \ row in set (0.00 sec)\n```\n\n**代码清单 3-7** `GROUP BY` 示例\n\n注意，我在列列表中指定了平均值函数\
    \ `AVG()`，并传入了我想要计算平均值的列名。MySQL 中有许多这样的函数可用于执行强大的计算。显然，这是数据库服务器中存在巨大能力的又一个例证，如果在网络中典型的轻量级传感器或聚合节点上实现，将需要更多的资源。\n\
    \n还要注意，我用 `AS` 关键字重命名了包含平均值的列。你可以使用它来重命名任何指定的列，从而更改结果集中的列名，正如你在代码清单中看到的那样。\n\n\
    `GROUP BY` 子句的另一个用途是计数。在这里，我们将 `AVG()` 替换为 `COUNT()`，并收到了匹配 `WHERE` 子句的行数。更具体地说，我们想知道每个植物存储了多少个传感器值。\n"
- fmt: '## 查询数据


    ```sql

    mysql> SELECT plant_name, COUNT(sensor_value) as num_values FROM greenhouse.plants
    GROUP BY plant_name;

    +------------------------+------------+

    | plant_name             | num_values |

    +------------------------+------------+

    | fern in den            |          1 |

    | fern on deck           |          4 |

    | flowers in bedroom1    |          1 |

    | weird plant in kitchen |          1 |

    +------------------------+------------+

    4 rows in set (0.00 sec)

    ```


    现在，假设我们希望看到结果集按传感器值排序。我们将使用与选择甲板上蕨类植物行相同的查询，但使用 `ORDER BY` 子句按传感器值对行进行升序和降序排序。列表
    [3-8](#527055_1_En_3_Chapter.xhtml#PC17) 显示了每种选项的结果。


    ```sql

    mysql> SELECT plant_name, sensor_value FROM greenhouse.plants WHERE plant_name
    = ''fern on deck'' ORDER BY sensor_value ASC;

    +--------------+--------------+

    | plant_name   | sensor_value |

    +--------------+--------------+

    | fern on deck |         0.43 |

    | fern on deck |        0.477 |

    | fern on deck |         0.51 |

    | fern on deck |         0.73 |

    +--------------+--------------+

    4 rows in set (0.00 sec)

    mysql> SELECT plant_name, sensor_value FROM greenhouse.plants WHERE plant_name
    = ''fern on deck'' ORDER BY sensor_value DESC;

    +--------------+--------------+

    | plant_name   | sensor_value |

    +--------------+--------------+

    | fern on deck |         0.73 |

    | fern on deck |         0.51 |

    | fern on deck |        0.477 |

    | fern on deck |         0.43 |

    +--------------+--------------+

    4 rows in set (0.00 sec)

    ```

    列表 3-8

    `ORDER BY` 示例


    正如我所提到的，`SELECT` 语句远不止这里展示的内容，但我们所看到的将让你在大多数中小型数据库解决方案的典型数据工作中走得很远。


    ### 创建数据


    现在你已经创建了数据库和表，你将需要向表中加载或插入数据。你可以使用 `INSERT INTO` 语句来完成。在这里，我们指定表和行的数据。下面显示了一个简单的示例：


    ```sql

    INSERT INTO greenhouse.plants (plant_name, sensor_value) VALUES (''fern in den'',
    0.2319);

    ```


    在这个例子中，我通过指定名称和值来为我的一个植物插入数据。你可能会想，其他列怎么办？在这种情况下，其他列包括一个时间戳列，它将由数据库服务器填充。所有其他列（只有一个）将被设置为
    `NULL`，这意味着没有可用的值、该值缺失、该值不是零或者该值为空。


    请注意，我在行数据之前指定了列。当你想要插入的数据列数少于表包含的列数时，这是必需的。更具体地说，省略列列表意味着你必须为表中的所有列提供数据（或 `NULL`）。此外，列出的列的顺序可以不同于它们在表中定义的顺序。省略列列表将导致列数据的顺序基于它们在表中的出现顺序。


    你也可以使用逗号分隔的行值列表，通过同一命令插入多行，如下所示：


    ```sql

    INSERT INTO greenhouse.plants (plant_name, sensor_value) VALUES (''flowers in
    bedroom1'', 0.301), (''weird plant in kitchen'', 0.677), (''fern on deck'', 0.430);

    ```


    这里我用一个命令插入了多行。请注意，这只是一个简写机制，除了自动提交外，与发出单独的命令没有区别。


    ### 更新数据


    有时你想要更改或更新数据。你可能遇到需要更改一个或多个列的值、替换多行的值或更正数字数据的格式甚至范围的情况。要更新数据，我们使用 `UPDATE` 命令。你可以更新特定的列、更新一组列、对一个或多个列执行计算等等。


    更可能的情况是，你或你的用户会想要重命名数据库中的对象。例如，假设我们确定甲板上的植物实际上不是蕨类，而是一种奇异的开花植物。在这种情况下，我们希望将所有植物名为“fern
    on deck”的行更改为“flowers on deck”。以下命令执行此更改：


    ```sql

    UPDATE greenhouse.plants SET plant_name = ''flowers on deck'' WHERE plant_name
    = ''fern on deck'';

    ```


    请注意，这里的关键操作符是 `SET` 操作符。它告诉数据库为指定的列分配一个新值。你可以在命令中列出多个 `SET` 操作。


    请注意，我在这里使用了 `WHERE` 子句来将 `UPDATE` 限制到特定的一组行。这与你在 `SELECT` 语句中看到的 `WHERE` 子句相同，作用也一样；它允许你指定限制受影响行的条件。如果你不使用
    `WHERE` 子句，更新将应用于所有行。


    注意


    不要忘记 `WHERE` 子句！发出没有 `WHERE` 子句的 `UPDATE` 命令将影响表中的所有行！


    ### 删除数据


    有时你最终会在表中得到需要删除的数据。也许你使用了测试数据并想要摆脱这些假行，或者你可能想要压缩或清除你的表，或者想要删除不再适用的行。要删除行，请使用 `DELETE
    FROM` 命令。


    让我们看一个例子。假设你有一个正在开发的植物监测解决方案，并且你发现你的某个传感器或传感器节点读数太低，这是由于编码、接线或校准错误造成的。在这种情况下，我们希望删除所有传感器值小于
    0.20 的行。以下命令执行此操作：


    ```sql

    DELETE FROM plants WHERE sensor_value < 0.20;

    ```


    注意


    不要忘记 `WHERE` 子句！发出没有 `WHERE` 子句的 `DELETE FROM` 命令将永久删除表中的所有行！


    请注意，我在这里使用了 `WHERE` 子句。也就是说，一个限制所操作行的条件语句。你可以使用任何列或条件；只要确保它们是正确的！我喜欢先在 `SELECT`
    语句中使用相同的 `WHERE` 子句。例如，我会先发出以下命令来检查我是否将要删除我想要的行，并且仅删除这些行。请注意，这是相同的 `WHERE` 子句：


    ```sql

    SELECT * FROM plants WHERE sensor_value < 0.20;

    ```'
