    command, and change the delimiter back with `DELIMITER ;`. This is only when using
    the client.


    Since stored procedures can be quite complicated, if you decide to use them, read
    the “*CREATE PROCEDURE and CREATE FUNCTION Syntax*” section of the online reference
    manual before trying to develop your own. There is more to creating stored procedures
    than described in this section.


    Now suppose you want to execute a compound statement and return a result – you
    want to use it as a function. You can use functions to fill in data by performing
    calculations, data transformation, or simple translations. Functions therefore
    can be used to provide values to populate column values, provide aggregation,
    provide date operations, and more.


    You have already seen a couple of functions (`COUNT`, `AVG`). These are considered
    built-in functions, and there is an entire section devoted to them in the online
    reference manual. However, you can also create your own functions. For example,
    you may want to create a function to perform some data normalization on your data.
    More specifically, suppose you have a sensor that produces a value in a specific
    range, but depending on that value and another value from a different sensor or
    lookup table, you want to add, subtract, average, and so on, the value to correct
    it. You could write a function to do this and call it in a trigger to populate
    the value for a calculation column.


    What About Changing Objects?


    You may be wondering what you do when you need to modify a table, procedure, trigger,
    and so on. Rest easy, you do not have to start over from scratch! MySQL provides
    an `ALTER` command for each object. That is, there is an `ALTER TABLE`, `ALTER
    PROCEDURE`, and so on. See the online reference manual section entitled “Data
    Definition Statements” for more information about each `ALTER` command.


    Now that we have learned what the basic SQL commands are and how to use them,
    let’s look at how we can connect our applications to MySQL.


    ## Connecting Applications


    You have already seen how to connect to the MySQL server with the MySQL client
    and MySQL Shell. These tools are interactive tools where we can execute queries,
    but it isn’t helpful for saving data from our applications or other users. What
    we need is something called a connector. A connector is a programming module designed
    to permit our scripts or programs to send data to the database server. Connectors
    also allow us to query the database server to get data from the server.


    I will cover two primary connectors you are likely to encounter when developing
    your own applications. I present each as a tutorial that you can use to follow.
    I begin with a connector for use with Python scripts (Connector/Python) and then
    present a connector for use in writing simplified Java (Connector/J). But first,
    let’s see what connectors are available for our applications.


    ### MySQL Database Connectors


    There are many database connectors for MySQL. Oracle supplies a number of database
    connectors for a variety of languages. Table [3-1](#527055_1_En_3_Chapter.xhtml#Tab1)
    shows the current database connectors available for download from [`http://dev.mysql.com/downloads/`](http://dev.mysql.com/downloads/).


    Table 3-1


    MySQL Connectors


    | Connector | Description | Download URL |

    | --- | --- | --- |

    | C API (libmysqlclient) | A client library for C development | [`https://dev.mysql.com/downloads/c-api/`](https://dev.mysql.com/downloads/c-api/)
    |

    | Connector/C++ | Standardized C++ applications | [`https://dev.mysql.com/downloads/connector/cpp/`](https://dev.mysql.com/downloads/connector/cpp/)
    |

    | Connector/J | Java applications | [`https://dev.mysql.com/downloads/connector/j/`](https://dev.mysql.com/downloads/connector/j/)
    |

    | Connector/Net | Windows .Net platforms | [`https://dev.mysql.com/downloads/connector/net/`](https://dev.mysql.com/downloads/connector/net/)
    |

    | Connector/Node.js | Node.js applications | [`https://dev.mysql.com/downloads/connector/nodejs/`](https://dev.mysql.com/downloads/connector/nodejs/)
    |

    | Connector/ODBC | Generalized ODBC applications | [`https://dev.mysql.com/downloads/connector/odbc/`](https://dev.mysql.com/downloads/connector/odbc/)
    |

    | Connector/Python | Python applications | [`https://dev.mysql.com/downloads/connector/python/`](https://dev.mysql.com/downloads/connector/python/)
    |

    | MySQL native driver for PHP (mysqlnd) | PHP 5.3 or newer connector | [`https://dev.mysql.com/downloads/connector/php-mysqlnd/`](https://dev.mysql.com/downloads/connector/php-mysqlnd/)
    |


    As you can see, there is a connector for just about any programming language you
    are likely to encounter. You can find documentation for each of the connectors
    above at [`https://dev.mysql.com/doc/connectors/en/`](https://dev.mysql.com/doc/connectors/en/).


    ### Sample Database


    If you’d like to follow along with the examples, you will need to set up the sample
    database. If you have MySQL installed, you can use the MySQL Shell or client to
    execute the following queries:


    ```

    -- A database for storing plant soil moisture and ambient temperature

    CREATE DATABASE plant_monitoring;

    USE plant_monitoring;

    -- This table stores information about a plant.

    CREATE TABLE plant_monitoring.plants (

    id int NOT NULL AUTO_INCREMENT,

    name char(50) DEFAULT NULL,

    location char(30) DEFAULT NULL,

    climate enum (''inside'',''outside'') DEFAULT ''inside'',

    PRIMARY KEY (`id`)

    ) ENGINE=InnoDB DEFAULT CHARSET=latin1;

    ```


    We will be inserting data as part of the examples. If you want to run both examples
    and run the insert example more than once, be sure to empty the table with the
    following query:


    ```

    DELETE FROM plant_monitoring.plants;

    ```


    Now let’s take a look at two examples starting with Connector/Python.'
  trans: '## 存储例程


    MySQL 中还有许多其他概念和命令可用，但其中两个可能令人感兴趣的是 `PROCEDURE`（存储过程）和 `FUNCTION`（存储函数），有时它们被统称为**存储例程**。我在此介绍这些概念，以便当你想要探索它们时，能在高层次上理解其用法。


    假设你需要运行多个命令来更改数据。也就是说，你需要基于计算执行一些复杂的更改。对于这类操作，MySQL 提供了存储过程的概念。存储过程允许你在每次调用该过程时，执行一个复合语句（一系列
    SQL 命令）。存储过程有时被认为是一种主要用于周期性维护的高级技术，但即使在更简单的情况下，它们也可能非常方便。


    例如，假设你想开发一个使用 SQL 的自定义数据库应用，但因为在开发阶段，你需要周期性地重新开始，并希望先清除所有数据。如果只有一张表，存储过程帮助不大，但假设有若干张表分布在多个数据库中（对于较大的数据库来说这并不罕见）。这种情况下，存储过程可能会有帮助。


    在 MySQL 客户端中输入包含复合语句的命令时，你需要临时更改**定界符**（分号 `;`），以便行尾的分号不会终止命令的输入。例如，在编写包含复合语句的命令前使用
    `DELIMITER //`，使用 `//` 来结束命令，然后再用 `DELIMITER ;` 将定界符改回来。这只是在使用客户端时的操作。


    由于存储过程可能相当复杂，如果你决定使用它们，请在尝试开发自己的存储过程之前，先阅读在线参考手册中关于 **`CREATE PROCEDURE` 和 `CREATE
    FUNCTION` 语法** 的部分。创建存储过程远比本节描述的要复杂。


    现在，假设你想执行一个复合语句并返回一个结果——你想将其作为函数使用。你可以通过执行计算、数据转换或简单翻译来使用函数填充数据。因此，函数可用于提供值以填充列值、提供聚合、提供日期操作等等。


    你已经见过几个函数（`COUNT`，`AVG`）。这些被认为是**内置函数**，在线参考手册中有专门的一节介绍它们。然而，你也可以创建自己的函数。例如，你可能希望创建一个函数来对数据执行某种规范化操作。更具体地说，假设有一个传感器在特定范围内产生一个值，但根据该值以及来自另一个传感器或查找表的另一个值，你希望对该值进行加、减、求平均等操作以校正它。你可以编写一个函数来完成此操作，并在触发器中调用它来为计算列填充值。


    ### 如何修改对象？


    你可能想知道当需要修改表、过程、触发器等时该怎么办。放心，你不必从头开始！MySQL 为每个对象提供了 `ALTER` 命令。即，有 `ALTER TABLE`、`ALTER
    PROCEDURE` 等等。有关每个 `ALTER` 命令的更多信息，请参阅在线参考手册中名为“**数据定义语句**”的部分。


    现在我们已经了解了基本的 SQL 命令及其使用方法，接下来让我们看看如何将我们的应用程序连接到 MySQL。


    ## 连接应用程序


    你已经看到了如何使用 MySQL 客户端和 MySQL Shell 连接到 MySQL 服务器。这些是交互式工具，我们可以在其中执行查询，但对于从我们的应用程序或其他用户保存数据来说，这并无帮助。我们需要的是所谓的**连接器**。连接器是一个编程模块，旨在允许我们的脚本或程序将数据发送到数据库服务器。连接器还允许我们查询数据库服务器以从服务器获取数据。


    我将介绍你在开发自己的应用程序时可能遇到的两种主要连接器。我将每个作为教程来呈现，以便你跟随操作。我从一个用于 Python 脚本的连接器（Connector/Python）开始，然后介绍一个用于编写简化
    Java 的连接器（Connector/J）。但首先，让我们看看我们的应用程序可以使用哪些连接器。


    ### MySQL 数据库连接器


    MySQL 有许多数据库连接器。Oracle 为多种语言提供了多个数据库连接器。表 3-1 显示了当前可从 [`http://dev.mysql.com/downloads/`](http://dev.mysql.com/downloads/)
    下载的数据库连接器。


    表 3-1

    MySQL 连接器


    | 连接器 | 描述 | 下载 URL |

    | --- | --- | --- |

    | C API (libmysqlclient) | 用于 C 开发的客户端库 | [`https://dev.mysql.com/downloads/c-api/`](https://dev.mysql.com/downloads/c-api/)
    |

    | Connector/C++ | 标准化的 C++ 应用程序 | [`https://dev.mysql.com/downloads/connector/cpp/`](https://dev.mysql.com/downloads/connector/cpp/)
    |

    | Connector/J | Java 应用程序 | [`https://dev.mysql.com/downloads/connector/j/`](https://dev.mysql.com/downloads/connector/j/)
    |

    | Connector/Net | Windows .Net 平台 | [`https://dev.mysql.com/downloads/connector/net/`](https://dev.mysql.com/downloads/connector/net/)
    |

    | Connector/Node.js | Node.js 应用程序 | [`https://dev.mysql.com/downloads/connector/nodejs/`](https://dev.mysql.com/downloads/connector/nodejs/)
    |

    | Connector/ODBC | 通用的 ODBC 应用程序 | [`https://dev.mysql.com/downloads/connector/odbc/`](https://dev.mysql.com/downloads/connector/odbc/)
    |

    | Connector/Python | Python 应用程序 | [`https://dev.mysql.com/downloads/connector/python/`](https://dev.mysql.com/downloads/connector/python/)
    |

    | MySQL native driver for PHP (mysqlnd) | PHP 5.3 或更新版本的连接器 | [`https://dev.mysql.com/downloads/connector/php-mysqlnd/`](https://dev.mysql.com/downloads/connector/php-mysqlnd/)
    |


    如你所见，几乎任何你可能遇到的编程语言都有对应的连接器。你可以在 [`https://dev.mysql.com/doc/connectors/en/`](https://dev.mysql.com/doc/connectors/en/)
    找到上述每个连接器的文档。


    ### 示例数据库


    如果你想跟随示例操作，需要设置示例数据库。如果已安装 MySQL，你可以使用 MySQL Shell 或客户端执行以下查询：


    ```sql

    -- 一个用于存储植物土壤湿度和环境温度的数据库

    CREATE DATABASE plant_monitoring;

    USE plant_monitoring;

    -- 此表存储关于植物的信息。

    CREATE TABLE plant_monitoring.plants (

    id int NOT NULL AUTO_INCREMENT,

    name char(50) DEFAULT NULL,

    location char(30) DEFAULT NULL,

    climate enum (''inside'',''outside'') DEFAULT ''inside'',

    PRIMARY KEY (`id`)

    ) ENGINE=InnoDB DEFAULT CHARSET=latin1;

    ```


    我们将作为示例的一部分插入数据。如果你想同时运行两个示例，并且多次运行插入示例，请务必使用以下查询清空表：


    ```sql

    DELETE FROM plant_monitoring.plants;

    ```


    现在，让我们从 Connector/Python 开始，看两个例子。'
- fmt: '### Example Connector: Connector/Python


    The connector for Python from Oracle is a full-featured connector that provides
    connectivity to the MySQL database server for Python applications and scripts.
    `Connector/Python` features support for all current MySQL server releases. It
    is written to provide automatic data type conversion between Python and MySQL,
    making building queries and deciphering results easy. It also has support for
    compression, permits connections via SSL, and supports all MySQL SQL commands.


    `Connector/Python` must be installed on the PC where you will run your code in
    the same manner any Python library that you may use. Using `Connector/Python`
    in your Python scripts consists of importing the base module, initiating a connection,
    and executing queries with a cursor.


    Before we jump into how we can use `Connector/Python` to write some MySQL database–enabled
    applications, let’s talk about how to get and install `Connector/Python`.


    **Python? Isn’t that a Snake?**


    The Python programming language is a high-level language designed to be as close
    to like reading English as possible while being simple, easy to learn, and powerful.
    Pythonistas will tell you the designers have indeed met these goals.


    If you have never used Python or you would like to know more about it, the following
    are few good books that introduce the language. A host of resources are also available
    on the Internet, including the Python documentation pages at `www.python.org/doc/`:


    *   `Programming the Raspberry Pi` by Simon Monk (McGraw-Hill, 2013)

    *   `Beginning Python from Novice to Professional`, 2nd Edition, by Magnus Lie
    Hetland (Apress, 2008)

    *   `Python Cookbook` by David Beazley and Brian K. Jones (O’Reilly Media, 2013)


    Interestingly, Python was named after the British comedy troupe Monty Python and
    not the reptile. As you learn Python, you may encounter campy references to Monty
    Python episodes. Having a fondness for Monty Python, I find these references entertaining.
    Of course, your mileage may vary.


    #### Installing Connector/Python


    Downloading is the same process as you discovered for the server. You can download
    `Connector/Python` from Oracle’s MySQL website (`http://dev.mysql.com/downloads/connector/python/`).
    The page will automatically detect your platform and show the available downloads
    for your platform. You may see several choices. Be sure to choose the one that
    matches your configuration.


    Since most platforms come with Python installed, you may not need to do anything
    to prepare your system; just download the installer and install it. However, the
    preferred method of installation is to use the Python package manager (from PyPi)
    to get and install the connector with the command `pip install`. The following
    demonstrates how to install `Connector/Python` using `pip`:


    ```

    % pip3 install mysql-connector-python

    Collecting mysql-connector-python

    Downloading mysql_connector_python-8.0.28-py2.py3-none-any.whl (342 kB)

    |████████████████████████████████| 342 kB 198 kB/s

    Collecting protobuf>=3.0.0

    Downloading protobuf-3.19.3-cp310-cp310-macosx_10_9_universal2.whl (1.0 MB)

    |████████████████████████████████| 1.0 MB 544 kB/s

    Installing collected packages: protobuf, mysql-connector-python

    Successfully installed mysql-connector-python-8.0.28 protobuf-3.19.3

    ```


    Notice the `pip` installer command. The command `pip3` is used in this example
    because the PC has both Python 2.X and 3.X installed and we want to ensure we
    install it for the Python 3.X installation.


    **Note**


    You should install Python 3.7 or later.


    Also notice any prerequisites required for the package being installed are also
    automatically downloaded and installed. As you can see, using `pip` is much easier
    than downloading and installing packages separately.


    **Tip**


    See the online reference manual for specific notes about installing on some platforms
    (`http://dev.mysql.com/doc/connector-python/en/connector-python-installation.xhtml`).


    #### Checking the Installation


    Once `Connector/Python` is installed, you can verify it is working with the following
    short example. Begin by entering the command `python` (or `python3` if you want
    to ensure you are using the Python 3.X installation). This will open an interactive
    prompt that permits you to enter one line of Python code at a time and execute
    it; it’s a Python command-line interpreter and useful in testing small snippets
    of code. Just enter the following lines as shown in the example:


    ```

    % python3

    Python 3.10.2 (v3.10.2:a58ebcc701, Jan 13 2022, 14:50:16) [Clang 13.0.0 (clang-1300.0.29.30)]
    on darwin

    Type "help", "copyright", "credits" or "license" for more information.

    >>> import mysql.connector

    >>> print(mysql.connector.__version__)

    8.0.28

    >>>

    >>> quit()

    ```


    What you should see is the version of `Connector/Python` printed. If you see any
    errors about not finding the connector, be sure to check your installation to
    ensure it worked. Once you can successfully access `Connector/Python`, you’re
    ready to move on to some example scripts.


    Python scripts (applications) are saved using a file name and extension like `<something>.py`
    and executed from the command line as follows. We will use this method to execute
    the following examples. Thus, for each example, you should open a file in a text
    editor, enter the code as shown, save the file, and then run the script from the
    command line:


    ```

    $ python3 my_script.py

    ```


    If you have and are familiar with a Python integrated development environment
    (IDE), you can use that instead of creating a file with a text editor and executing
    it via the command line. Examples of good Python IDEs include Thonny (`https://thonny.org/`)
    and PyCharm (`www.jetbrains.com/pycharm/download`). Both are available for Windows,
    macOS, and Linux.


    Thonny is a free, basic IDE and therefore very easy to use but limited in features
    whereas PyCharm is available in a community and enterprise editions supporting
    a host of features for enterprise-wide Python development.'
