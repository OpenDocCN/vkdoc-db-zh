  trans: '

    ### 服务使用情况和限制


    设置服务使用情况和限制是为了限制您可以在账户中创建的某些资源的数量。这些限制可能适用于您的租户，也可能跨您的 compartment 应用。


    您可以通过点击云控制台菜单，然后选择 `Governance and Administration`，再选择 `Limits, Quotas, and Usage`
    来查找您租户的限制。这会显示一长串服务限制列表，但您可以按服务、范围、资源名称或 compartment 进行筛选。


    例如，如果您查看块卷服务，您会看到备份数量、免费备份数量以及以 GB 为单位的免费存储空间的限制。图 2-5 展示了这些限制在云控制台中的示例。


    ![](img/527055_1_En_2_Fig5_HTML.png)


    一个图片预览窗口，根据云控制台中的 compartment 显示资源的限制、配额和使用情况。


    **图 2-5** 服务限制示例


    考虑到这一点，让我们看看如何创建我们的 OCI 账户，并简要浏览一下您可能想要使用的一些基础资源。有趣的是，教程中的这些资源是用于构建 MySQL 数据库服务中数据库系统资源的一些组件。


    导航到 [`https://cloud.oracle.com/`](https://cloud.oracle.com/)。点击左侧“还不是 Oracle Cloud
    客户？”下的 `注册`。图 2-6 展示了初始着陆页面。


    ![](img/527055_1_En_2_Fig6_HTML.png)


    一个窗口显示 O C I，右上角有 Oracle Cloud 登录选项。左侧可以输入云账户名称。它突出显示了“非 Oracle Cloud 客户”选项。


    **图 2-6** Oracle Cloud 着陆页面


    这将打开一个新的浏览器窗口，您可以在其中创建您的 Oracle 云账户。图 2-7 展示了您需要输入的必填信息。注意它默认是免费套餐账户。


    ![](img/527055_1_En_2_Fig7_HTML.png)


    一个账户信息窗口，需要填写国家、名、姓、电子邮件，以及“我是人类”的验证选项。底部提供了使用条款。


    **图 2-7** 新账户信息（第 1 部分）


    您需要选择您居住的国家或地区，输入您的名和姓，成功通过人机验证挑战，然后点击 `验证我的电子邮件`。您也应该阅读对话框底部显示的使用条款。


    点击按钮后，您将收到一封电子邮件，邮件中会包含一个链接（按钮名为 `验证电子邮件`），您需要点击该链接以完成账户创建过程。如果您正在跟着操作，请立即打开您的电子邮件并点击链接/按钮。然后您将被返回到登录创建页面，对话框将变为允许您设置密码、公司名称、云账户名称以及您的
    home 区域，如图 2-8 所示。


    ![](img/527055_1_En_2_Fig8_HTML.png)


    新账户信息的第二页，需要填写新密码、确认密码和公司名称。云账户名称已填写为 drcharlesbell。使用条款位于底部。


    **图 2-8** 新账户信息（第 2 部分）


    您的 home 区域是距离您居住地最近的地理数据中心组。选择最近的区域非常重要，有助于减少潜在的互联网延迟。输入信息后，点击底部的 `继续`。再次提醒，您应该阅读按钮上方的使用条款声明。


    点击按钮后，您将看到另一个对话框，要求您提供邮寄地址和电话号码，如图 2-9 所示。


    ![](img/527055_1_En_2_Fig9_HTML.png)


    新账户信息的第三页，需要填写地址行 1 和 2、城市、州、邮政编码和电话号码。协议复选框位于底部。


    **图 2-9** 新账户信息（第 3 部分）


    输入您的个人信息后，点击 `继续` 进入支付信息部分，如图 2-10 所示。要添加您的支付偏好，请点击 `添加支付验证方法` 按钮并按照提示操作。


    ![](img/527055_1_En_2_Fig10_HTML.png)


    新账户信息的第四页，包含支付验证选项。中间是“添加支付验证方法”按钮。协议复选框位于底部。


    **图 2-10** 新账户信息（第 4 部分）


    输入支付信息并通过验证后，您将返回到对话框。要完成账户创建，请勾选 `协议` 复选框（阅读协议后），然后点击 `开始我的免费试用`，如图 2-11 所示。


    ![](img/527055_1_En_2_Fig11_HTML.png)


    新地址信息窗口的第五页，包含支付验证。中心显示“感谢您验证详细信息”。协议复选框位于底部。


    **图 2-11** 新账户信息（第 5 部分）


    此时，您的新账户正在配置中。您可能会收到一条消息，提示此过程需要一些时间，如图 2-12 所示。这是正常现象。注意 Oracle 提供了一个链接，让您在等待时了解更多关于
    OCI 的信息。这很贴心。当您的账户准备就绪时，您将通过电子邮件收到通知。


    ![](img/527055_1_En_2_Fig12_HTML.jpg)


    一个图片预览，显示文本“感谢您注册 Oracle Cloud”。带有一个链接，文本为“等待时，您可以阅读关于 O C I 的信息”。


    **图 2-12** 账户创建消息


    账户创建后，点击电子邮件中的链接登录，您将被发送到 OCI 登录页面（您的用户名是您的电子邮件地址），登录后，您可能会看到一个简短的问卷。完成问卷后，您将看到
    OCI 起始页。您可能会看到一条通知，提示额外的账户设置任务正在后台运行，如图 2-13 所示。


    ![](img/527055_1_En_2_Fig13_HTML.png)


    一个图片预览，显示文本“关于您的账户目前正在设置中，部分功能将不可用。设置完成后您将收到电子邮件。”


    **图 2-13** 新账户起始通知


    至此，您已准备好开始使用 OCI！但是，请记住我们提到过每个账户都有自己的租户。您的租户名称是您注册时使用的电子邮件地址的第一部分。例如，如果您使用 `mynamehere@wesayso.com`，您的租户名称将是
    `mynamehere`。在我们完成本教程的示例时，请记住这一点。


    让我们快速浏览一下如何创建我们的第一个 OCI 资源。

    '
- fmt: '### OCI Tutorial


    In this tutorial, we are going to create our first resources in OCI. The objective
    is to create a compute instance where we can login and experiment using it. We
    will see how to navigate the OCI Cloud Console (web interface) to create the resources
    needed to make the compute instance operational, which includes adding a block
    storage device to our compute instance, which will reveal some of the things going
    on in the background when you create a MySQL Database Service DB System. We will
    see how to do that in Chapter [4](#527055_1_En_4_Chapter.xhtml).


    For now, let’s get started provisioning new OCI resources. There are a couple
    of things we should do first. The following lists the resources we will create
    in order:


    *   Create a new Compartment

    *   Create the Virtual Cloud Network

    *   Create the Compute Instance

    *   Add Block Storage to the Compute Instance

    *   Terminate the Resources


    The tutorial is written to allow you to follow along and create the same resources
    in your own OCI account. If you have not created your own OCI account, you should
    do that now.


    #### Create a New Compartment


    The first thing you should do is to create a new compartment to organize your
    resources. While it is not required, using compartments can make organizing your
    resources for different projects, customers, or experiments much easier. Not only
    that, but with the added security you can assign to users and groups, you can
    ensure users access only those resources you permit.


    We will use the Oracle Cloud Console sidebar menu, which you can access via the
    menu button in the upper-left corner of the console. Each of the entries in the
    menu and submenus will take you to a different dialog from which you can view
    and manage resources of that category/group. To open the compartment page, open
    the sidebar menu, select `Identity & Security`, and then `Compartments` as shown
    in Figure [2-14](#527055_1_En_2_Chapter.xhtml#Fig14).


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig14_HTML.png)


    Figure 2-14: Compartments (Main Menu)


    This will open the Compartment page as shown in Figure [2-15](#527055_1_En_2_Chapter.xhtml#Fig15).
    Like most resource pages, you will see a list of your current resources in the
    center and a menu on the left that lets you manipulate the resources. Each resource
    page is a little different, but you will become familiar with the layout over
    time. However, notice the filters section. This allows you to filter the view
    by different groups such as state or in other resources the compartment.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig15_HTML.png)


    Figure 2-15: Compartments Page


    To create a new compartment, click the `Create Compartment` button. This will
    open the create component dialog. Here, we give the compartment a name. Try to
    use something that has some meaning for the use. For example, if you are creating
    a compartment for a particular project or customer, you may want to include something
    in the name to associate it. For our testing purposes, we will name the compartment
    `mysql-tutorial-compartment`. Go ahead and fill out the dialog with the name and
    whatever description you want. Leave the other fields at the default as shown
    in Figure [2-16](#527055_1_En_2_Chapter.xhtml#Fig16).


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig16_HTML.png)


    Figure 2-16: Create Compartment Dialog


    Notice there is a space to add tags. Tags are what they sound like – labels you
    can use to add to resources to make them easier to sort or locate. While it is
    discouraged to use tags to store perishable information, you could use tags to
    store critical accounting information if you’d like.


    When you are ready to create the compartment, click the `Create Compartment` button.
    Once the compartment is provisioned (it only takes a few seconds), you will see
    it listed in the compartments dialog as shown in Figure [2-17](#527055_1_En_2_Chapter.xhtml#Fig17).


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig17_HTML.png)


    Figure 2-17: List of Compartments


    Notice we see both the root and the new compartment. Recall from the discussion
    of compartments, all accounts have that root account. This is what makes creating
    a compartment optional – you already have one (root)^([⁴](#fn4)). Clearly, if
    you want any form of organization you will need to use compartments.


    **Caution**


    Once you start creating resources, your account will begin to incur charges. Due
    to the $300 credit when you signed up, you won’t see any charges on your credit
    card for some time but be aware all resources you create except for those labeled
    “always free” or “free tier” will incur charges against your initial credit. When
    that runs out, your credit card will be billed.


    If you want to see the compartment page for the new compartment, you can click
    on the link (the underlined name in the list). This will open the compartment
    detail page as shown in Figure [2-18](#527055_1_En_2_Chapter.xhtml#Fig18).


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig18_HTML.png)


    Figure 2-18: The `oci-tutorial-compartment` Detail Page


    Notice you can manage the resource on its detail page including deleting it. Also,
    notice the bottom of the detail page has another list for child compartments.
    Yes, you can create a hierarchy of compartments! Just open the detail page for
    the compartment and create new compartments using the `Create Compartment` button
    above the child list.


    Now that we have a compartment, we can start creating resources to place in it.
    The next step is to create a VCN.'
  raw: '### OCI Tutorial


    In this tutorial, we are going to create our first resources in OCI. The objective
    is to create a compute instance where we can login and experiment using it. We
    will see how to navigate the OCI Cloud Console (web interface) to create the resources
    needed to make the compute instance operational, which includes adding a block
    storage device to our compute instance, which will reveal some of the things going
    on in the background when you create a MySQL Database Service DB System. We will
    see how to do that in Chapter [4](#527055_1_En_4_Chapter.xhtml).


    For now, let’s get started provisioning new OCI resources. There are a couple
    of things we should do first. The following lists the resources we will create
    in order:


    *   Create a new Compartment


    *   Create the Virtual Cloud Network


    *   Create the Compute Instance


    *   Add Block Storage to the Compute Instance


    *   Terminate the Resources


    The tutorial is written to allow you to follow along and create the same resources
    in your own OCI account. If you have not created your own OCI account, you should
    do that now.


    #### Create a New Compartment


    The first thing you should do is to create a new compartment to organize your
    resources. While it is not required, using compartments can make organizing your
    resources for different projects, customers, or experiments much easier. Not only
    that, but with the added security you can assign to users and groups, you can
    ensure users access only those resources you permit.


    We will use the Oracle Cloud Console sidebar menu, which you can access via the
    menu button in the upper-left corner of the console. Each of the entries in the
    menu and submenus will take you to a different dialog from which you can view
    and manage resources of that category/group. To open the compartment page, open
    the sidebar menu, select *Identity & Security*, and then *Compartments* as shown
    in Figure [2-14](#527055_1_En_2_Chapter.xhtml#Fig14).


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig14_HTML.png)


    A window of Oracle cloud displays the main menu highlights identify and security.
    Select identify and security option, which opens compartments. Compartments are
    highlighted.


    Figure 2-14


    Compartments (Main Menu)


    This will open the Compartment page as shown in Figure [2-15](#527055_1_En_2_Chapter.xhtml#Fig15).
    Like most resource pages, you will see a list of your current resources in the
    center and a menu on the left that lets you manipulate the resources. Each resource
    page is a little different, but you will become familiar with the layout over
    time. However, notice the filters section. This allows you to filter the view
    by different groups such as state or in other resources the compartment.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig15_HTML.png)


    An Oracle cloud window with the compartments page displays the created compartment
    with status.


    Figure 2-15


    Components Page


    To create a new compartment, click the *Create Compartment* button. This will
    open the create component dialog. Here, we give the compartment a name. Try to
    use something that has some meaning for the use. For example, if you are creating
    a compartment for a particular project or customer, you may want to include something
    in the name to associate it. For our testing purposes, we will name the compartment
    `mysql-tutorial-compartment`. Go ahead and fill out the dialog with the name and
    whatever description you want. Leave the other fields at the default as shown
    in Figure [2-16](#527055_1_En_2_Chapter.xhtml#Fig16).


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig16_HTML.png)


    A window of the create compartment displays the name, description, parent compartment,
    and optional tags to organize and to track resources. The create compartment button
    is at the bottom left.


    Figure 2-16


    Create Component Dialog


    Notice there is a space to add tags. Tags are what they sound like – labels you
    can use to add to resources to make them easier to sort or locate. While it is
    discouraged to use tags to store perishable information, you could use tags to
    store critical accounting information if you’d like.


    When you are ready to create the compartment, click the *Create Component* button.
    Once the compartment is provisioned (it only takes a few seconds), you will see
    it listed in the compartments dialog as shown in Figure [2-17](#527055_1_En_2_Chapter.xhtml#Fig17).


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig17_HTML.png)


    A table with create compartment as the title. It has 3 rows and 7 columns. The
    column names are name, status, O C I D, authorized, security zone, sub-compartments,
    and created.


    Figure 2-17


    List of Compartments


    Notice we see both the root and the new compartment. Recall from the discussion
    of compartments, all accounts have that root account. This is what makes creating
    a compartment optional – you already have one (root)^([⁴](#fn4)). Clearly, if
    you want any form of organization you will need to use compartments.


    Caution


    Once you start creating resources, your account will begin to incur charges. Due
    to the $300 credit when you signed up, you won’t see any charges on your credit
    card for some time but be aware all resources you create except for those labeled
    “always free” or “free tier” will incur charges against your initial credit. When
    that runs out, your credit card will be billed.


    If you want to see the compartment page for the new compartment, you can click
    on the link (the underlined name in the list). This will open the compartment
    detail page as shown in Figure [2-18](#527055_1_En_2_Chapter.xhtml#Fig18).


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig18_HTML.png)


    A window of the oci-tutorial-compartment displays the active status with a big
    green circle on the left. Compartment information is displayed in the middle.


    Figure 2-18


    The oci-tutorial-compartment Detail Page


    Notice you can manage the resource on its detail page including deleting it. Also,
    notice the bottom of the detail page has another list for child compartments.
    Yes, you can create a hierarchy of compartments! Just open the detail page for
    the compartment and create new compartments using the *Create Compartment* button
    above the child list.


    Now that we have a compartment, we can start creating resources to place in it.
    The next step is to create a VCN.'
  trans: '

    ### OCI 教程


    在本教程中，我们将在 OCI 中创建我们的第一个资源。目标是创建一个可以登录并进行实验的计算实例。我们将学习如何浏览 OCI 云控制台（Web 界面）来创建使计算实例运行所需的资源，这包括向我们的计算实例添加一个块存储设备，这将揭示在您创建
    MySQL 数据库服务 DB 系统时后台发生的一些事情。我们将在第 4 章中了解如何操作。


    现在，让我们开始配置新的 OCI 资源。首先，有几件事我们需要做。以下是我们将按顺序创建的资源列表：


    *   创建一个新的 compartment

    *   创建虚拟云网络

    *   创建计算实例

    *   向计算实例添加块存储

    *   终止资源


    本教程的编写旨在让您能够跟随操作，并在您自己的 OCI 账户中创建相同的资源。如果您尚未创建自己的 OCI 账户，现在就应该创建一个。


    #### 创建新的 compartment


    您应该做的第一件事是创建一个新的 compartment 来组织您的资源。虽然这不是必需的，但使用 compartment 可以更轻松地为不同项目、客户或实验组织资源。不仅如此，通过您可以分配给用户和组的附加安全设置，您可以确保用户只能访问您允许的那些资源。


    我们将使用 Oracle Cloud Console 侧边栏菜单，您可以通过控制台左上角的菜单按钮访问它。菜单和子菜单中的每个条目都会将您带到不同的对话框，您可以从那里查看和管理该类别/组的资源。要打开
    compartment 页面，请打开侧边栏菜单，选择 `身份与安全`，然后选择 ` compartments `，如图 2-14 所示。


    ![](img/527055_1_En_2_Fig14_HTML.png)


    图 2-14： compartments （主菜单）


    这将打开 compartment 页面，如图 2-15 所示。与大多数资源页面一样，您将在中心看到当前资源的列表，左侧有一个菜单，可以让您操作资源。每个资源页面都略有不同，但随着时间的推移，您会熟悉其布局。但是，请注意筛选器部分。这允许您按不同的组（如状态或其他资源中的
    compartment）筛选视图。


    ![](img/527055_1_En_2_Fig15_HTML.png)


    图 2-15： compartments 页面


    要创建新的 compartment，请单击 `创建 compartment ` 按钮。这将打开创建 compartment 对话框。在这里，我们给 compartment
    一个名称。尽量使用对用途有意义的名称。例如，如果您是为特定项目或客户创建 compartment，您可能希望在名称中包含相关的内容。出于我们的测试目的，我们将
    compartment 命名为 `mysql-tutorial-compartment`。继续填写对话框的名称和您想要的任何描述。将其他字段保留为默认值，如图
    2-16 所示。


    ![](img/527055_1_En_2_Fig16_HTML.png)


    图 2-16：创建 compartment 对话框


    请注意，有一个添加标签的空间。标签正如其名——您可以添加到资源上的标签，以使它们更容易排序或定位。虽然不鼓励使用标签存储易变信息，但如果您愿意，可以使用标签存储关键的记账信息。


    当您准备好创建 compartment 时，请单击 `创建 compartment ` 按钮。一旦 compartment 配置完成（只需几秒钟），您将看到它在
    compartment 列表中列出，如图 2-17 所示。


    ![](img/527055_1_En_2_Fig17_HTML.png)


    图 2-17： compartments 列表


    注意我们既看到了根 compartment，也看到了新的 compartment。回顾关于 compartments 的讨论，所有账户都有那个根账户。这就是为什么创建
    compartment 是可选的——您已经有一个（根）^(⁴)。显然，如果您想要任何形式的组织，您将需要使用 compartments。


    **注意**


    一旦您开始创建资源，您的账户将开始产生费用。由于您注册时获得的 300 美元信用额度，您暂时不会在信用卡上看到任何费用，但请注意，除了标记为“永久免费”或“免费套餐”之外，您创建的所有资源都将消耗您最初的信用额度。当信用额度用完时，您的信用卡将被扣费。


    如果您想查看新 compartment 的 compartment 页面，可以单击链接（列表中的带下划线的名称）。这将打开 compartment 详情页面，如图
    2-18 所示。


    ![](img/527055_1_En_2_Fig18_HTML.png)


    图 2-18： `oci-tutorial-compartment` 详情页面


    请注意，您可以在其详情页面上管理资源，包括删除它。另外，请注意详情页面的底部还有另一个用于子 compartment 的列表。是的，您可以创建 compartment
    层次结构！只需打开 compartment 的详情页面，并使用子列表上方的 `创建 compartment ` 按钮创建新的 compartment。


    现在我们有了一个 compartment，我们可以开始创建要放入其中的资源。下一步是创建 VCN。

    '
- fmt: '#### Create the Virtual Cloud Network


    Next, we will need a virtual cloud network (VCN) to connect to our compute instance
    so we can access it. Rather than attempt to configure the VCN manually, we will
    be using the VCN wizard which greatly simplifies the work needed. In this case,
    we will create a VCN that has Internet access so that we can place a compute instance
    in the network and access it.


    Begin by clicking on the cloud console menu button (upper-left corner) then select
    `Networking` then `Virtual Cloud Networks` as shown in Figure 2-19. This will
    open the main page for VCNs.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig19_HTML.jpg)


    The main menu highlights the networking option with a rectangular box and then
    the right-side networking menu is opened. In that, virtual cloud networking is
    highlighted.


    **Figure 2-19**

    Virtual Cloud Networks (Main Menu)


    On the VCN page, you will need to select the compartment using the filter control
    on the left as shown in Figure 2-20. Select the `oci-tutorial-compartment` that
    we created earlier.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig20_HTML.jpg)


    The filter control in the V C N page opens the list scope. Below it has compartments,
    and search compartment options. Below the search, `oci-tutorial-compartment` appears.


    **Figure 2-20**

    Set List Scope (VCN Page)


    Once you’ve set the compartment, the display will change to show a list of all
    the VCNs in that compartment. Currently, it will show an empty list. To start
    the VCN wizard, click the `Start VCN Wizard` button as shown in Figure 2-21.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig21_HTML.png)


    A table with create v C N and start V C N wizard options. The column names are
    name, status, I Pv4 C I D R block, I Pv6 C I D R block, default route table, D
    N S domain name, and created.


    **Figure 2-21**

    VCN Network List (`oci-tutorial-compartment`)


    Once you click the button, the wizard opens, and you can enter the information
    needed. In this case, we will want to select the option `Create VCN with Internet
    Connectivity` as shown in Figure 2-22. Once selected, click the `Start VCN Wizard`
    button as shown.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig22_HTML.png)


    A window of start V C N wizard has bullet buttons for create V C N with internet
    connection and add internet connectivity and site-to-site V P N to a V C N.


    **Figure 2-22**

    Start VCN Wizard


    This will trigger a check in OCI to ensure the VCN is permitted, and you can create
    it. You may see a banner in the wizard indicating such. When the page opens, we
    will need to supply a name for the VCN and ensure the correct compartment is selected.
    If you are following along, use `oci-tutorial-vcn` for the VCN name then click
    `Next` as shown in Figure 2-23. Leave the default values in the `Configure VCN
    and Subnets` section.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig23_HTML.png)


    A window of create a V C N with internet connectivity with configuration. It has
    basic information and configure V C N and Subnets options.


    **Figure 2-23**

    Create VCN with Internet Connectivity – Basic Information


    On the next page, we are given a summary of the VCN parameters most have come
    from the wizard. Take a moment and look it over. Notice we have a public subnet
    as well as a private subnet. We will see how to make this work with our compute
    instance in a later section. Click the `Create` button when ready as shown in
    Figure 2-24.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig24_HTML.png)


    A window to create a V C N with internet connectivity. It displays the review
    and create options on the right with Oracle Virtual Cloud Network details and
    subnets details of private and public


    **Figure 2-24**

    Review and Create VCN


    At this point, a dialog will appear informing you of the progress of the provisioning.
    Since we are using the wizard, it is natural to think this is a single resource,
    but it is not. There are several resources being provisioned and configured for
    you to include the VCN, its subnets, gateways for Internet and private subnet
    access, routing tables and security lists for the gateways, and more. Figure 2-25
    shows the dialog once all resources are provisioned and ready.


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig25_HTML.png)


    A window of created virtual cloud network with creating resources. It lists the
    virtual cloud network creation on the left.


    **Figure 2-25**

    Provisioning the VCN


    Once the VCN is created, you can close the dialog and then click the `View Virtual
    Cloud Network` button at the bottom to navigate to the VCN page as shown in Figure
    2-26. Here we see the VCN with both of its subnets ready. Cool!


    ![](images/527055_1_En_2_Chapter/527055_1_En_2_Fig26_HTML.png)


    A window of `oci-tutorial-vcn` with a hexagon green icon on the left. V C N details
    and subnets compartments are listed on the right side.


    **Figure 2-26**

    VCN Detail Page


    Now that we have our VCN, we’re ready to create the compute instance.'
