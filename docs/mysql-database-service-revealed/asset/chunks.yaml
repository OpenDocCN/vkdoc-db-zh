    ## OCI APIs


    Oracle 为 OCI 中的几乎所有操作都提供了 API，MDS 也不例外。Oracle 还提供软件开发工具包（SDK），你可以使用它们来开发和部署与 OCI
    资源交互的应用程序。Oracle 为以下编程语言提供了 SDK。每个 SDK 都包含示例代码和文档。最重要的是，大多数 SDK 都可通过 GitHub 获取，你可以在那里贡献自己改进的建议。以下展示了
    OCI 可用的 SDK 及其文档链接。如果你想在应用程序中使用这些 SDK 中的任何一个，请务必查阅文档和示例以开始使用：


    *   `Java`: [`https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/javasdk.htm#SDK_for_Java`](https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/javasdk.htm%2523SDK_for_Java)


    *   `Python`: [`https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/pythonsdk.htm#SDK_for_Python`](https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/pythonsdk.htm%2523SDK_for_Python)


    *   `TypeScript` and `JavaScript`: [`https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/typescriptsdk.htm#SDK_for_TypeScript_and_JavaScript`](https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/typescriptsdk.htm%2523SDK_for_TypeScript_and_JavaScript)


    *   `.NET`: [`https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/dotnetsdk.htm#SDK_for_NET`](https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/dotnetsdk.htm%2523SDK_for_NET)


    *   `Go`: [`https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/gosdk.htm#SDK_for_Go`](https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/gosdk.htm%2523SDK_for_Go)


    *   `Ruby`: [`https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/rubysdk.htm#SDK_for_Ruby`](https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/rubysdk.htm%2523SDK_for_Ruby)


    由于 Python SDK 很流行且 Python 语言易于学习，我们将看一些使用 Python SDK 的示例。在深入研究 Python API 示例之前，让我们先简要讨论一下
    MDS API，以便我们理解这些接口。


    每个 SDK 的文档中都包含 API 参考，这是针对所支持每个资源的 API 的广泛列表。例如，Python SDK API 参考位于 [`https://docs.oracle.com/en-us/iaas/tools/python/2.79.0/api/landing.xhtml`](https://docs.oracle.com/en-us/iaas/tools/python/2.79.0/api/landing.xhtml)。


    现在，让我们简要了解一下 MDS API。


    ### MDS API


    MDS API 有五个主要组件（或者更准确地说，类）构成了该接口。这些包括：


    *   `oci.mysql.ChannelsClient`: 用于处理入站和出站复制的 API。


    *   `oci.mysql.DbBackupsClient`: 用于处理备份的 API。


    *   `oci.mysql.DbSystemClient`: 用于处理 DB Systems 的 API。


    *   `oci.mysql.MysqlaasClient`: 用于处理 MySQL 客户端访问（例如配置、形状、版本）的 API。


    *   `oci.mysql.WorkRequestsClient`: 用于与工作请求交互的 API。


    此外，MDS API 还有五个类，它们将一些单独的 API 方法和类组合在一起进行宏观操作。这些包括：


    *   `oci.mysql.ChannelsClientCompositeOperations`: 用于处理入站和出站复制的 API。


    *   `oci.mysql.DbBackupsClientCompositeOperations`: 用于处理备份的 API。


    *   `oci.mysql.DbSystemClientCompositeOperations`: 用于处理 DB Systems 的 API。


    *   `oci.mysql.MysqlaasClientCompositeOperations`: 用于处理 MySQL 客户端访问（例如配置、形状、版本）的
    API。


    *   `oci.mysql.WorkRequestsClientCompositeOperations`: 用于与工作请求交互的 API。


    通常需要使用多个 MDS API 类来实现某些功能。让我们通过几个示例，简要浏览一下 Python 中的 MDS API。


    ### 示例使用


    当你初次开始使用 OCI SDK 时，可能会有些挑战。在本节中，我们将通过演示 Python SDK 如何工作的基础知识来了解如何开始。但首先，让我们安装
    Python SDK。


    注意

    你必须在你的 PC 上安装 Python 3。有关在你的 PC 上安装 Python 的更多详情，请参阅 Python 组织 [`www.python.org/`](http://www.python.org/)。'
  raw: '### For More Information


    The most valuable resource and indeed the starting point for your continued research
    into the CLI is the documentation at [`https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/`](https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/).
    This documentation is listed by OCI product and service which includes every possible
    use of the CLI for those products and services. For example, the MDS portion of
    the documentation contains the following major sections. Links to the documentation
    for each section are included:


    *   *Backup*: Operations for working with backups including creating and listing
    ([`https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/backup.xhtml`](https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/backup.xhtml)).


    *   *Channel*: Operations for working with replication channels for inbound and
    outbound replication ([`https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/channel.xhtml`](https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/channel.xhtml)).


    *   *Configuration*: Operations on the set of MySQL server variables that configure
    the parameters of MySQL ([`https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/configuration.xhtml`](https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/configuration.xhtml)).


    *   *DB System*: Operations on DB Systems including all features such as high
    availability, HeatWave, and more ([`https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/db-system.xhtml`](https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/db-system.xhtml)).


    *   *Shape*: List operation to see available shapes ([`https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/shape.xhtml`](https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/shape.xhtml)).


    *   *Version*: List operation to list the MySQL server versions available ([`https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/version.xhtml`](https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/version.xhtml)).


    *   *Work-Request*: Operations to list and get work requests for monitoring operations
    ([`https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/work-request.xhtml`](https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/work-request.xhtml)).


    *   *Work-Request-Error*: List operation to get more information about work request
    errors ([`https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/work-request.xhtml`](https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/work-request.xhtml)).


    *   *Work-Request-Log-Entry*: List operation to get more information from the
    work request log ([`https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/work-request-log-entry.xhtml`](https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/work-request-log-entry.xhtml)).


    Refer to the links above for more details about the CLI operations for these areas.
    You can also visit the OCI CLI main documentation at [`https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/index.xhtml`](https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/index.xhtml)
    to see the complete list of the OCI CLI commands.


    ## OCI APIs


    Oracle provides APIs for almost every operation in OCI and MDS is no exception.
    Oracle also provides software development kits (SDK) that you can use to develop
    and deploy applications that interact with the OCI resources. Oracle provides
    SDKs for the following programming languages. Each SDK includes example code and
    documentation. Best of all, most SDKs are available via GitHub where you can contribute
    your own suggestions for improvements. The following show the SDKs available for
    OCI along with a link to the documentation for the SDK. If you want to use any
    of these SDKs for your applications, be sure to review the documentation and examples
    as you get started:


    *   *Java*: [`https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/javasdk.htm#SDK_for_Java`](https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/javasdk.htm%2523SDK_for_Java)


    *   *Python*: [`https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/pythonsdk.htm#SDK_for_Python`](https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/pythonsdk.htm%2523SDK_for_Python)


    *   *TypeScript and JavaScript*: [`https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/typescriptsdk.htm#SDK_for_TypeScript_and_JavaScript`](https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/typescriptsdk.htm%2523SDK_for_TypeScript_and_JavaScript)


    *   *.NET*: [`https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/dotnetsdk.htm#SDK_for_NET`](https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/dotnetsdk.htm%2523SDK_for_NET)


    *   *Go*: [`https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/gosdk.htm#SDK_for_Go`](https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/gosdk.htm%2523SDK_for_Go)


    *   *Ruby*: [`https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/rubysdk.htm#SDK_for_Ruby`](https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/rubysdk.htm%2523SDK_for_Ruby)


    Since the Python SDK is popular and the Python language is easy to learn, we will
    look at a few examples of using the Python SDK. Before we jump into the Python
    API examples, let’s discuss the MDS APIs briefly so that we understand the interfaces.


    Each SDK has as part of its documentation an API reference, which is an extensive
    list of the APIs for each resource supported. For example, the Python SDK API
    reference is found at [`https://docs.oracle.com/en-us/iaas/tools/python/2.79.0/api/landing.xhtml`](https://docs.oracle.com/en-us/iaas/tools/python/2.79.0/api/landing.xhtml).


    Now, let’s take a brief look at the MDS API.


    ### MDS API


    The MDS API has five main components (or, more correctly, classes) that make up
    the interface. These include the following:


    *   `oci.mysql.ChannelsClient`: API for working with inbound and outbound replication.


    *   `oci.mysql.DbBackupsClient`: API for working with backups.


    *   `oci.mysql.DbSystemClient`: API for working with DB Systems.


    *   `oci.mysql.MysqlaasClient`: API for working with the MySQL client access (e.g.
    configuration, shapes, versions).


    *   `oci.mysql.WorkRequestsClient`: API for interactive with work requests.


    In addition, the MDS API has five classes that have grouped some of the individual
    API methods and classes together for macro operations. These include the following:


    *   `oci.mysql.ChannelsClientCompositeOperations`: API for working with inbound
    and outbound replication.


    *   `oci.mysql.DbBackupsClientCompositeOperations`: API for working with backups.


    *   `oci.mysql.DbSystemClientCompositeOperations`: API for working with DB Systems.


    *   `oci.mysql.MysqlaasClientCompositeOperations`: API for working with the MySQL
    client access (e.g., configuration, shapes, versions).


    *   `oci.mysql.WorkRequestsClientCompositeOperations`: API for interactive with
    work requests.


    It is often necessary to use multiple MDS API classes to achieve certain functions.
    Let’s get a brief tour of the MDS API in Python using a few examples.


    ### Example Uses


    Using the OCI SDKs can be a little challenging when you first begin working with
    them. In this section, we will see how to get started by demonstrating the basics
    of how the Python SDK works. But first, let’s install the Python SDK.


    Note


    You must have Python 3 installed on your PC. See the Python organization at [`www.python.org/`](http://www.python.org/)
    for more details about installing Python on your PC.'
  trans: '

    ## 更多信息


    你持续研究 CLI 最有价值的资源和起点是位于 [`https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/`](https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/)
    的文档。该文档按 OCI 产品和服务列出，包含这些产品和服务的所有 CLI 可能用途。例如，MDS 部分的文档包含以下主要部分。指向各部分文档的链接已包括在内：


    *   `Backup`：处理备份的操作，包括创建和列出（[`https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/backup.xhtml`](https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/backup.xhtml)）。


    *   `Channel`：处理用于入站和出站复制的复制通道的操作（[`https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/channel.xhtml`](https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/channel.xhtml)）。


    *   `Configuration`：对配置 MySQL 参数的 MySQL 服务器变量集合的操作（[`https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/configuration.xhtml`](https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/configuration.xhtml)）。


    *   `DB System`：对 DB Systems 的操作，包括所有功能，如高可用性、HeatWave 等（[`https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/db-system.xhtml`](https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/db-system.xhtml)）。


    *   `Shape`：列出可用实例形状的列表操作（[`https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/shape.xhtml`](https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/shape.xhtml)）。


    *   `Version`：列出可用 MySQL 服务器版本的列表操作（[`https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/version.xhtml`](https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/version.xhtml)）。


    *   `Work-Request`：用于列出和获取监控操作的工作请求的操作（[`https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/work-request.xhtml`](https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/work-request.xhtml)）。


    *   `Work-Request-Error`：获取有关工作请求错误的更多信息的列表操作（[`https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/work-request.xhtml`](https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/work-request.xhtml)）。


    *   `Work-Request-Log-Entry`：从工作请求日志中获取更多信息的列表操作（[`https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/work-request-log-entry.xhtml`](https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/cmdref/mysql/work-request-log-entry.xhtml)）。


    有关这些区域的 CLI 操作的更多详情，请参阅上面的链接。你也可以访问 OCI CLI 主文档 [`https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/index.xhtml`](https://docs.oracle.com/en-us/iaas/tools/oci-cli/3.15.0/oci_cli_docs/index.xhtml)
    以查看 OCI CLI 命令的完整列表。


    ## OCI API


    Oracle 为 OCI 中的几乎所有操作都提供了 API，MDS 也不例外。Oracle 还提供软件开发工具包（SDK），你可以使用它们来开发和部署与 OCI
    资源交互的应用程序。Oracle 为以下编程语言提供了 SDK。每个 SDK 都包含示例代码和文档。最重要的是，大多数 SDK 都可通过 GitHub 获取，你可以在那里贡献自己改进的建议。以下展示了
    OCI 可用的 SDK 及其文档链接。如果你想在应用程序中使用这些 SDK 中的任何一个，请务必查阅文档和示例以开始使用：


