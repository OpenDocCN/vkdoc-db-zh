- fmt: '### What Is Cloud Computing?


    It is unlikely to find an information technology manager or engineer who hasn’t
    heard of cloud computing by now. Indeed, the term "cloud" is pandered about so
    much that we’ve come to think of it as a marketing term and some of us just ignore
    it as a result. Others have heard many good things among the hype and want to
    learn more. If you fall into this category, the following will help set the stage
    for our journey. If you already use `OCI`, feel free to skip ahead to the `MySQL
    Database Service` section.


    Cloud services have grown considerably since the early days when cloud simply
    meant the use of virtual machines to host servers that customers can use to build
    and run their own services. As cloud services grew, more components were added
    such as virtual networking and similar infrastructure components often as "elastic"
    devices that broke the bonds of conventional computing.


    For example, elastic technologies permitted the separation of networking allowing
    you to create an `IP` address that can be assigned to a server and later reused
    for other resources. Not only did this permit separation of the `IP` or networking
    from the server, but it also meant you could reduce retooling or reconfiguring
    of your applications should you need to replace a failed server with another.


    Since these early days, cloud computing has become more sophisticated and now
    includes characteristics or technologies that include the following examples:


    -   `On-Demand Resources`: You can create, deploy, use, and destroy resources
    at will

    -   `Networking Resources`: Virtualized networking components

    -   `Resource Pooling`: Ability to consume resources from a pool of like components/virtualized
    resources

    -   `Elasticity Among Components`: Connecting separate components together and
    mix-and-matching resources


    In addition to the resource characteristics, cloud systems have evolved to include
    three primary forms or models of cloud services. The primary difference among
    these models is level of control or depth that the customer (enterprise) can interact
    with the resources. The following briefly describes each from the perspective
    of the cloud service provider:


    -   `Software as a Service (SaaS)`: Software is delivered as a managed service
    typically as components that run on virtualized servers and accessed via web applications.
    Virtualized hardware components to support the `SaaS` application are fully managed
    and often hidden from the customer. Some example `SaaS` solutions include DocuSign,
    Dropbox, and Microsoft Office 365 (online).

    -   `Infrastructure as a Service (IaaS)`: Components and resources are provided
    for the customer to build their own infrastructure from virtualized components.
    These components may be fully managed. For example, database systems are considered
    `IaaS` components where the supporting virtualized components are managed, but
    the databases and data are managed and owned by the customer. Some example `IaaS`
    solutions include Rackspace, Google Compute Engine, and Digital Ocean.

    -   `Platform as a Service (PaaS)`: This provides a framework for customers to
    create customized applications. Typically, the customer manages the platform components
    with the cloud provider managing the underlying support components. Some example
    `PaaS` solutions include Google App Engine, Heroku, and OpenShift.


    Figure [1-1](#527055_1_En_1_Chapter.xhtml#Fig1) presents a graphical view of the
    three models plus the traditional on-prem model for developing applications. Notice
    the management responsibility changes among the models.


    ![](images/527055_1_En_1_Chapter/527055_1_En_1_Fig1_HTML.jpg)


    A block diagram of 4 models on-prem, `IaaS`, `PaaS`, and `SaaS`. Each has application,
    data, integration, middleware, and runtime managed by the customer and vendor.


    Figure 1-1

    Management Responsibilities Among On-Prem, `IaaS`, `PaaS`, and `SaaS`


    However, these models can be intermixed and often one model is used to provide
    resources from other models. For example, in this book, we will be focused on
    the `MySQL Database Service`, which is a `PaaS` component in the `Oracle Cloud
    Infrastructure` – an `IaaS` service. Thus, the `MySQL Database Service` is built
    on top of the `Oracle Cloud Infrastructure`.


    ### Why Move to the Cloud?


    There are many reasons an organization would want to move their infrastructure
    components to the cloud. We have already read where we can save money and increase
    agility in our development of products and how cloud services allow for more automation.
    Let’s dive into these a bit deeper.


    #### Improved Agility


    This is perhaps the biggest organizational benefit of using cloud services. Having
    the ability to react quickly to your business and market changes makes organization
    stronger and more successful in keeping up (and ahead) of the competition. Why
    is that?


    Consider for a moment the time, resources, and funds required for standing up
    a new project. Specifically, consider the information technology resources you
    need to support the development and later deployment of the project. Most organizations
    would have to rely on their information technology departments to research, acquire,
    install, and configure the hardware and software before you can fully get development
    underway. Depending on the complexity and uniqueness of the components, you could
    spend months tooling your infrastructure.


    However, with cloud systems, you can skip all of the length budgeting, ordering,
    installation, and similar processes and jump directly to creating those resources
    with a few clicks of a mouse in a web console for a cloud service. By moving critical
    and often new resources to the cloud, you gain the following potential benefits:


    -   `Agility`: Take advantage of opportunities and changing priorities

    -   `Rapid Deployment`: Deploy resources in hours versus days or months

    -   `Adaptability`: Respond quickly to market changes and verisimilitudes of technology

    -   `Streamline Processes`: Remove the burden of lengthy procurement processes

    -   `Reduce IT Investment`: Reduce the overhead of owning and maintaining your
    own hardware by reducing capital investment and human resources

    -   `Improved Delivery`: Develop and deliver solutions quickly


    #### Automation


    It is no secret that installing, configuring, tuning, and maintaining your own
    resources such as database systems can be time consuming and require careful,
    ongoing monitoring. For most on-prem installations, this requires not only the
    burden of procurement, but also the need for highly skilled engineers and technicians.
    This only intensifies when the number of resources start growing. For example,
    the human resources for managing a couple of database systems may be minimal,
    but when the number of systems increases, the complexity of the technology puts
    a higher demand on the human resources often requiring a larger staff and training
    for existing staff.


    Cloud systems cut these costs dramatically when you use managed services. For
    example, a fully managed database service means you no longer need human resources
    to tune and monitor the database system – the majority of that is done for you
    through automation built into the cloud services platform.


    This frees organizations to turn their resources to managing their solutions and
    in doing so free up time for development operations (`DevOps`) that often include
    automation for configuring, deploying, and maintaining the organization solutions,
    which is a more direct investment in the end product of your development than
    the hardware and supporting software and can lead to faster delivery and higher
    profit margins.


    As you can see, the cloud has many intriguing benefits, and the `Oracle Cloud
    Infrastructure` is built to exceed these benefits. Let’s learn more about the
    `Oracle Cloud Infrastructure`.'
