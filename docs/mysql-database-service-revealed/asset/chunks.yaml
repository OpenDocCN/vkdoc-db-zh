    When the policy is created, you will be directed to the Policies Detail page as
    shown in Figure [4-11](#527055_1_En_4_Chapter.xhtml#Fig11). Notice you can edit
    the policy with the *Edit Policy* button or delete it with the *Delete* button.


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig11_HTML.jpg)


    A page displays the details of the policy created on the right. Edit policy, delete,
    and add tags options are available. A green circle with P written on it is on
    the left.


    Figure 4-11


    Policies Detail Page


    Ok, now that we have all three prerequisites completed, it’s time to take a tour
    of MDS and learn how to create our first DB System.


    ## A Tour of MDS


    Now is the point in the book where most are eager to see in action – using MDS
    in OCI. We will start off with a simple example to explore the nuances of creating
    and getting to know about DB Systems before we move on to the more advanced features
    of MDS.


    One thing that may not be clear for some is the difference between MDS and a DB
    System. MDS is an OCI platform as a service (PaaS), and a DB System is one of
    the resources available in the service. The MySQL service menu is shown in the
    cloud console menu as shown in Figure [4-12](#527055_1_En_4_Chapter.xhtml#Fig12).
    As MDS continues to mature, you may see additional resources appear under the
    MySQL menu.


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig12_HTML.jpg)


    A menu in the oracle cloud selects the databases option. Databases are displayed
    on the right side. Under it, My S Q L, D B systems, Backups, channels and configurations
    are selected inside a box.


    Figure 4-12


    MySQL Service Menu (Cloud Console)


    Notice we see there are four resources under the MySQL menu. The following briefly
    summarizes them:


    *   *DB Systems*: Fully managed MySQL server resources


    *   *Backups*: Backups taken of the DB Systems


    *   *Channels*: A replication resource consisting of inbound or outbound replication
    channels. Inbound channels permit asynchronous replication between a MySQL source
    and a DB System. Outbound channels permit asynchronous replication of a DB System
    database to a MySQL replica.


    *   *Configurations*: A collection of user, system, initialization, or service-specific
    variables that define the operation of the DB System. List includes many predefined
    configurations, but you may create your own.


    We will see all of the features of MDS in the coming chapters. For now, let’s
    see a tutorial for creating out very first DB System.


    Note


    If you have not followed along with satisfying the prerequisites for creating
    a DB System, go back and do those steps first.


    ## Creating Your First DB System


    At this point, we should have our OCI account setup as well as a virtual cloud
    network (`oci-tutorial-vcn`), a compartment resource (`oci-tutorial-compartment`),
    a new user (`joeuser`), a group (`mysql-users`) to which the user is assigned,
    and a policy (`mysql-users-policy`) to allow users to create and use MDS resources.
    If you don’t have all of those, be sure to review the previous sections for more
    details.


    There are a lot of things to learn and a few steps to creating a DB System. It
    is rather easy once you learn how, but unlike previous tutorials which walked
    you through the minimal steps, this tutorial will proceed step-by-step and learn
    more about what is available to us on each of the OCI cloud console pages. So,
    this tutorial may take some time to get through, but it will be worth it to learn
    about what you can do with a DB System.


    ### Open the DB Systems Resource Page


    We will be using the MySQL menu from the cloud console to create a DB System.
    Simply open the cloud console menu, select *Databases*, and then click on *DB
    Systems* under the *MySQL* menu. This will open the DB Systems resource page as
    shown in Figure [4-13](#527055_1_En_4_Chapter.xhtml#Fig13).


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig13_HTML.png)


    A page displays the D B systems in the o c i tutorial compartment. Create my S
    Q L Database system button and the table of the created database labeled my S
    Q L test 1 are on the right.


    Figure 4-13


    DB Systems Resource Page


    We see to the right a list of the DB Systems (*DB Systems in …*) we have created
    and their states including the DB System, Crash Recovery, High Availability, and
    HeatWave states as well as the date and time when the resource was created.


    Notice the buttons above the *DB Systems in…* list. We have a *Create DB System*
    button and an *Action* drop-down menu. On the *Action* drop-down menu, you can
    execute an operation on any of the DB Systems that are selected in the list. These
    include the following:


    *   *Stop*: Stop the DB System


    *   *Start*: Start the DB System


    *   *Restart*: Stop then start the DB System


    *   *Create a Manual Backup*: Create a backup of the DB System


    *   *Apply Tags*: Apply one or more tags to the resources


    *   *Delete*: Delete (terminate) the DB System


    As you can see, this is a powerful menu and quite a shortcut for working with
    multiple DB Systems. Fortunately, the *Action* drop-down menu is a common feature
    among the OCI cloud console resource page lists. The actions may differ, but the
    concept is the same.


    Notice also that there is one DB System here that has been terminated (*Deleted*).
    A DB System that has been terminated will remain on the list for a few days until
    all resources have been purged (e.g., the block volumes are not immediately destroyed).


    On the left side of the page, we see the *MySQL* menu repeated. We can use that
    to navigate among the MySQL resources by clicking the label we want to see. Below
    that on the left is the *List Scope* list that we’ve seen before where we can
    choose the compartment to filter the DB Systems list.


    At the bottom left is a special *Filters* section where we can filter the list
    even further by selecting a specific state, name, or even selecting among HeatWave
    entries (we will see more about HeatWave in Chapter [8](#527055_1_En_8_Chapter.xhtml)).


    Finally at the bottom is a Tag filter where, if we used tags, we could further
    filter the list to show only those DB Systems that have those tags.


    These three filtering mechanisms are common among all OCI cloud console pages
    that provide a list. Some resources may have differing filter selections, but
    all resource pages allow you to filter the list. Nice.'
  trans: "\n一个用于创建策略的对话框，其中已输入`名称`、`描述`和` compartments`数据。下方显示了带有“显示手动编辑器”选项的策略构建器。“创建”按钮位于左下角。\n\
    \n**图 4-10**  \n创建策略对话框\n\n**注意**  \n如果你未选择你的根 compartment，可能会在对话框底部看到一个红色横幅，显示一条有些晦涩的错误信息，提示该\
    \ compartment 不存在。如果发生这种情况，请仔细检查你的 compartment 选择，然后重试创建。\n\n策略创建后，你将被定向到“策略详情”页面，如图\
    \ 4-11 所示。请注意，你可以使用“编辑策略”按钮编辑策略，或使用“删除”按钮将其删除。\n\n![](img/527055_1_En_4_Fig11_HTML.jpg)\n\
    \n一个页面在右侧显示已创建策略的详细信息。提供编辑策略、删除和添加标签的选项。左侧有一个带有字母`P`的绿色圆圈。\n\n**图 4-11**  \n策略详情页\n\
    \n好了，现在我们已经完成了所有三个先决条件，是时候参观一下 MDS 并学习如何创建我们的第一个 DB 系统了。\n\n## MDS 概览\n\n现在本书进行到这里，大多数人渴望看到实际操作——在\
    \ OCI 中使用 MDS。我们将从一个简单的示例开始，探索创建和了解 DB 系统的细微差别，然后再转向 MDS 的高级功能。\n\n对于某些人来说，可能不太清楚\
    \ MDS 与 DB 系统之间的区别。MDS 是 OCI 的平台即服务（PaaS），而 DB 系统是该服务中可用的资源之一。MySQL 服务菜单在云控制台菜单中的显示如图\
    \ 4-12 所示。随着 MDS 的不断成熟，你可能会看到更多资源出现在 MySQL 菜单下。\n\n![](img/527055_1_En_4_Fig12_HTML.jpg)\n\
    \nOracle Cloud 中的一个菜单，选择了“数据库”选项。右侧显示数据库。在其下方，一个框内选中了 MySQL、DB 系统、备份、通道和配置。\n\n\
    **图 4-12**  \nMySQL 服务菜单（云控制台）\n\n请注意，我们在 MySQL 菜单下看到有四个资源。以下是对它们的简要概述：\n\n- `DB\
    \ 系统`：完全托管的 MySQL 服务器资源\n- `备份`：对 DB 系统进行的备份\n- `通道`：由入站或出站复制通道组成的复制资源。入站通道允许在\
    \ MySQL 源和 DB 系统之间进行异步复制。出站通道允许将 DB 系统数据库异步复制到 MySQL 副本。\n- `配置`：定义 DB 系统操作的用户、系统、初始化或服务特定变量的集合。列表包含许多预定义配置，但你也可以创建自己的配置。\n\
    \n我们将在接下来的章节中看到 MDS 的所有功能。现在，让我们看一个创建我们的第一个 DB 系统的教程。\n\n**注意**  \n如果你尚未满足创建 DB\
    \ 系统的先决条件，请先返回并完成那些步骤。\n\n## 创建你的第一个 DB 系统\n\n此时，我们应该已经设置好我们的 OCI 账户，以及一个虚拟云网络（`oci-tutorial-vcn`）、一个\
    \ compartments 资源（`oci-tutorial-compartment`）、一个新用户（`joeuser`）、一个该用户被分配到的用户组（`mysql-users`），以及一个允许用户创建和使用\
    \ MDS 资源的策略（`mysql-users-policy`）。如果你没有全部准备好，请务必回顾前面的章节以获取更多细节。\n\n创建 DB 系统有很多需要学习的东西和几个步骤。一旦你学会了，其实相当容易，但与之前引导你完成最小步骤的教程不同，本教程将逐步进行，并学习更多关于在每个\
    \ OCI 云控制台上可用的功能。所以，这个教程可能需要一些时间才能完成，但为了学习你能用 DB 系统做什么，这是值得的。\n\n### 打开 DB 系统资源页面\n\
    \n我们将使用云控制台中的 MySQL 菜单来创建 DB 系统。只需打开云控制台菜单，选择`数据库`，然后在`MySQL`菜单下点击`DB 系统`。这将打开\
    \ DB 系统资源页面，如图 4-13 所示。\n\n![](img/527055_1_En_4_Fig13_HTML.png)\n\n一个页面在右侧显示了\
    \ o c i tutorial compartment 中的 D B 系统。创建 MySQL 数据库系统按钮和标记为 mysql test 1 的已创建数据库表位于右侧。\n\
    \n**图 4-13**  \nDB 系统资源页面\n\n我们在右侧看到我们已创建的 DB 系统列表（`...中的 DB 系统`）及其状态，包括 DB 系统、崩溃恢复、高可用性和\
    \ HeatWave 的状态，以及资源创建的日期和时间。\n\n请注意`...中的 DB 系统`列表上方的按钮。我们有一个`创建 DB 系统`按钮和一个`操作`下拉菜单。在`操作`下拉菜单上，你可以对列表中选中的任何\
    \ DB 系统执行操作。这些操作包括：\n\n- `停止`：停止 DB 系统\n- `启动`：启动 DB 系统\n- `重启`：停止然后启动 DB 系统\n\
    - `创建手动备份`：创建 DB 系统的备份\n- `应用标签`：向资源应用一个或多个标签\n- `删除`：删除（终止）DB 系统\n\n如你所见，这是一个功能强大的菜单，对于处理多个\
    \ DB 系统来说非常方便。幸运的是，`操作`下拉菜单是 OCI 云控制台资源页面列表中的常见功能。具体操作可能不同，但概念是相同的。\n\n还要注意，这里有一个\
    \ DB 系统已被终止（`已删除`）。已终止的 DB 系统将在列表中保留几天，直到所有资源都被清除（例如，块卷不会立即销毁）。\n\n在页面左侧，我们看到重复的`MySQL`菜单。我们可以通过点击我们想要查看的标签，使用它在\
    \ MySQL 资源之间导航。在左侧下方，是我们之前见过的`列表范围`列表，我们可以在其中选择 compartment 来筛选 DB 系统列表。\n\n左下角是一个特殊的`筛选器`部分，我们可以通过选择特定状态、名称，甚至在\
    \ HeatWave 条目中选择（我们将在第 8 章了解更多关于 HeatWave 的信息）来进一步筛选列表。\n\n最后，在底部是一个标签筛选器，如果我们使用了标签，可以进一步筛选列表，仅显示具有那些标签的\
    \ DB 系统。\n\n这三种筛选机制在所有提供列表的 OCI 云控制台页面中都很常见。某些资源的筛选选项可能有所不同，但所有资源页面都允许你筛选列表。很好。\n"
- fmt: '# 创建数据库系统


    让我们开始创建一个数据库系统。创建数据库系统的对话框很长，因此我们将分部分介绍。我们需要提供的信息包括：


    *   *名称*：数据库系统的名称。

    *   *描述*（可选）：为您自己提供一个描述来解释数据库系统，例如其创建原因、分配到的项目等。您应避免在描述中包含任何机密数据。

    *   *数据库系统类型*：您可以选择独立（无高可用性）、启用高可用性和 HeatWave 数据库系统。我们将在第 7 章中了解更多关于高可用性功能的信息，在第
    8 章中了解 HeatWave。

    *   *管理员*：您需要指定 MySQL 管理员用户帐户和密码。

    *   *网络*：您需要为数据库系统选择 VCN 和子网。

    *   *可用性域*（放置位置）：选择可用性域。

    *   *硬件*：选择数据存储（块卷）的形状和大小。

    *   *备份计划*：您可以选择开启自动备份。


    我们将引导您完成所有这些数据的填写，并展示如何为一个位于 `oci-tutorial-compartment` 中、没有自动备份的独立数据库系统完成每一项设置。在数据库系统资源页面的“数据库系统位于…”列表中，点击
    *创建数据库系统* 按钮来创建数据库系统。


    > **提示**

    >

    > 注意在创建对话框中有几个带下划线的短语。这些是指向文档的链接，您可以使用它们来了解更多细节。您应该考虑花时间探索这些链接，以便更熟悉数据库系统的细节。


    我们将从顶部到底部分部分检查对话框。您可以向下滚动查看创建数据库系统对话框的其他部分。图 4-14 显示了第一个部分，它要求填写 compartment、名称和描述。请务必在“在
    compartment 中创建”下拉列表中选择 `oci-tutorial-compartment`，并使用名称 `mysql-test-1`。如果您愿意，可以填写描述。


    ![图 4-14](images/527055_1_En_4_Chapter/527055_1_En_4_Fig14_HTML.png)

    *图 4-14 创建数据库系统（第 1 部分）*


    向下滚动到下一个部分，它要求填写数据库系统的类型和 MySQL 管理员凭据。为数据库系统类型选择 *独立* 选项，使用 `mysql_admin` 作为用户名并提供一个密码。请务必遵循密码限制，并再次输入密码进行验证。图
    4-15 显示了已选择和输入数据的部分。


    ![图 4-15](images/527055_1_En_4_Chapter/527055_1_En_4_Fig15_HTML.png)

    *图 4-15 创建数据库系统（第 2 部分）*


    一旦添加了这些信息，向下滚动到下一个部分，即 *配置网络* 部分，如图 4-16 所示。在这里，我们希望确保在“虚拟云网络位于 oci-tutorial-compartment”列表中选择了
    `oci-tutorial-vcn`，并且在“子网位于 oci-tutorial-compartment”列表中选择了 `Private Subnet oci-tutorial-vcn
    (Regional)` 条目。如果您看不到这些条目，可以使用“更改 Compartment”链接来更改 compartment。


    ![图 4-16](images/527055_1_En_4_Chapter/527055_1_En_4_Fig16_HTML.png)

    *图 4-16 创建数据库系统（第 3 部分）*


    一旦您验证了这些条目，向下滚动到下一节，即可用性域的放置位置。在这里，选择哪个可用性域并不重要，但既然我们迄今为止一直使用 *AD-2*，请继续选择它，如图
    4-17 所示。


    ![图 4-17](images/527055_1_En_4_Chapter/527055_1_En_4_Fig17_HTML.png)

    *图 4-17 创建数据库系统（第 4 部分）*


    选择了 AD-2 后，向下滚动到下一节，即 *配置硬件* 部分。在这里，我们可以选择更改形状以及更改数据存储的大小，如图 4-18 所示。由于我们是在练习创建数据库系统，我们将使用如图所示的默认值。在这种情况下，它是一个小型的虚拟机形状，具有
    8 GB RAM 和附加的 50 GB 块存储用于数据。正如您所推测的，创建和配置数据库系统的过程包括配置块卷、附加、连接并将块卷挂载到某个文件夹。


    ![图 4-18](images/527055_1_En_4_Chapter/527055_1_En_4_Fig18_HTML.png)

    *图 4-18 创建数据库系统（第 5 部分）*


    向下滚动到下一节，通过选择备份计划来选择自动备份。备份计划简单来说就是备份的频率和类型。我们将在第 5 章中了解更多关于备份的信息。目前，我们可以关闭备份功能，如图
    4-18 所示。我们不需要备份，因为我们不会创建任何数据，也不会出于任何保留目的配置数据库。当您确认输入的数据后，点击 *创建* 按钮来创建数据库系统。这将引导您进入数据库系统详细信息页面。


    ![图 4-19](images/527055_1_En_4_Chapter/527055_1_En_4_Fig19_HTML.png)

    *图 4-19 创建数据库系统（第 6 部分）*


    点击按钮后，数据库系统的创建、设置和配置过程将开始，`创建数据库系统` 工作请求（也称为工作流）将启动。这可能需要一段时间，所以如果没有立即发生任何事情或您认为它可能卡住了，请不要惊慌。就像我们在其他资源中看到的那样，一旦开始创建，您将被定向到资源详细信息页面。在这种情况下，您应该会看到类似于图
    4-20 的数据库系统详细信息页面。请注意，数据库系统仍处于 `正在创建` 状态。


    ![图 4-20](images/527055_1_En_4_Chapter/527055_1_En_4_Fig20_HTML.jpg)

    *图 4-20 数据库系统详细信息页面（正在创建）*


    您可以通过向下滚动到 *资源* 菜单，然后点击 *工作请求* 以查看 *工作请求* 部分（如图 4-21 所示）来检查初始配置数据库系统的工作流状态。在这里，我们可以看到所有已运行或正在运行的工作请求（工作流）。如您所见，初始工作流仍在运行，并且可能会持续一段时间。


    ![图 4-21](images/527055_1_En_4_Chapter/527055_1_En_4_Fig21_HTML.png)

    *图 4-21 数据库系统详细信息页面（工作请求列表）*'
  raw: '### Create a DB System


    Let’s go ahead and create a DB System. The dialog to create a DB System is long,
    so we will present a portion at a time. The information we will need to provide
    includes the following:


    *   *Name*: A name for the DB System.


    *   *Description* (optional): Provides a description for your own use to explain
    the DB System such as why it was created, to which projects it is allocated, etc.
    You should avoid any confidential data in the description.


    *   *Type of DB System*: You can choose from a standalone (no high availability),
    High Availability enabled, and a HeatWave DB System. We will learn more about
    the high availability features in Chapter [7](#527055_1_En_7_Chapter.xhtml) and
    HeatWave in Chapter [8](#527055_1_En_8_Chapter.xhtml).


    *   *Administrator*: You will need to specify the MySQL admin user account and
    password.


    *   *Networking*: You will need to select the VCN and subnet for the DB System.


    *   *Availability Domain* (placement): Choose the availability domain.


    *   *Hardware*: Choose the shape and size of the data storage (block volume).


    *   *Backup Plan*: You have the option to turn on automatic backups.


    We will walk-through all of these data and show how to complete each for a standalone
    DB System without automatic backups placed in the `oci-tutorial-compartment`.
    From the *DB Systems in…* list on the DB Systems resource page, click the *Create
    DB System* button to create a DB System.


    Tip


    Notice in the create dialog there are several underlined phrases. These are links
    to the documentation that you can use to explore more of the details. You should
    consider taking time to explore these in order to become more familiar with the
    details of a DB System.


    We will examine portions of the dialog from top-to-bottom. You can scroll down
    to see the other sections of the create DB System dialog. Figure [4-14](#527055_1_En_4_Chapter.xhtml#Fig14)
    shows the first portion that requests the compartment, name, and description.
    Be sure to select the `oci-tutorial-compartment` in the *Create in compartment*
    dropdown list and use the name `mysql-test-1`. You can fill in the description
    if you’d like.


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig14_HTML.png)


    A dialog box with the first page to create My S Q L Database system with information
    about, create in compartment, name, and description.


    Figure 4-14


    Create DB System (Part 1)


    Scroll down to the next portion, which requests the type of DB System, and the
    MySQL administrator credentials. Select the *Standalone* option for the DB System
    type and use `mysql_admin` for the username and provide a password. Be sure to
    follow the password restrictions and enter the password a second time to verify.
    Figure [4-15](#527055_1_En_4_Chapter.xhtml#Fig15) shows the portion with the data
    selected and entered.


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig15_HTML.png)


    A dialog box with the second page to create My S Q L Database system has a standalone
    selected. Create administrator credentials with username, password and confirm
    password is already filled.


    Figure 4-15


    Create DB System (Part 2)


    Once that information is added, scroll down to the next portion, which is the
    *Configure networking* section as shown in Figure [4-16](#527055_1_En_4_Chapter.xhtml#Fig16).
    Here, we want to ensure the `oci-tutorial-vcn` is selected in the *Virtual Cloud
    Networking in oci-tutorial-compartment* list and the `Private Subnet oci-tutorial-vcn
    (Regional)` entry is selected in the *Subnet in oci-tutorial-compartment* list.
    If you do not see these entries, you can change the compartment using the Change
    Compartment link.


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig16_HTML.png)


    A dialog box with the third page to create My S Q L Database system displays configured
    networking. It has V C N and a subnet in the o c i tutorial compartment.


    Figure 4-16


    Create DB System (Part 3)


    Once you have verified those entries, scroll down to the next section, which is
    the placement of availability domain. Here, it doesn’t matter which availability
    domain you choose, but since we’ve been using *AD-2* thus far, go ahead and select
    it as shown in Figure [4-17](#527055_1_En_4_Chapter.xhtml#Fig17).


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig17_HTML.png)


    A dialog box with the fourth page to create My S Q L Database system displays
    configure placement with 3 availability domains. A D 2 is selected.


    Figure 4-17


    Create DB System (Part 4)


    Once the AD-2 is selected, scroll down to the next section, which is the *Configure
    hardware* section. Here, we have the option of changing the shape and changing
    the size of the data storage as shown in Figure [4-18](#527055_1_En_4_Chapter.xhtml#Fig18).
    Since we are creating a DB System as an exercise, we will use the defaults as
    shown. In this case, it is a small VM shape with 8 GB of RAM and a 50 GB block
    storage attached for data. As you can surmise, the process of creating and provisioning
    the DB System includes provisioning the block volume, attaching, connecting, and
    mounting the block volume to a folder.


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig18_HTML.png)


    A dialog box with the fifth page to create My S Q L Database system with configured
    hardware. select a shape, has the change shape button. Data storage size is mentioned
    at the bottom.


    Figure 4-18


    Create DB System (Part 5)


    Scroll down to the next section, which allows you to choose automatic backups
    by selecting a backup plan. A backup plan is simply the frequency of the backup
    including the type. We will learn more about backups in Chapter [5](#527055_1_En_5_Chapter.xhtml).
    For now, we can turn off the backup feature as shown in Figure [4-18](#527055_1_En_4_Chapter.xhtml#Fig18).
    We do not need backups since we will not be creating any data or configuring the
    database for any retention purposes. When you have confirmed the data entered,
    click the Create button to create the DB System. This will direct you to the DB
    Systems detail page.


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig19_HTML.png)


    A dialog box with the sixth page to create My S Q L Database system displays configured
    backup plan. An automatic backup option is present and the create button is at
    the bottom.


    Figure 4-19


    Create DB System (Part 6)


    Once you click the button, the DB System create, set up, and provisioning processes
    will start and the `Create DB System` work request (also called a workflow) will
    commence. This can take a while so do not be alarmed if nothing happens right
    away or you think it may be stuck. Like we saw with other resources, once you
    start the create, you will be directed to the resource detail page. In this case,
    you should see the DB System details page similar to Figure [4-20](#527055_1_En_4_Chapter.xhtml#Fig20).
    Notice the DB System is still in the `CREATING` state.


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig20_HTML.jpg)


    A page displays the D B system information details on the right. A yellow hexagon
    shape with text D B S is on the left. It is in the creating state.


    Figure 4-20


    DB System Details Page (Creating)


    You can check on the status of the initial workflow to provision the DB System
    by scrolling down to the *Resources* menu then click *Work Requests* to view the
    *Work Requests* section as shown in Figure [4-21](#527055_1_En_4_Chapter.xhtml#Fig21).
    Here, we can see all work requests (workflows) that have been run or are running.
    As you can see, the initial workflow is still running and may stay that way for
    some time.


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig21_HTML.png)


    A table with 12 rows and 7 columns for the work request lists all the work requests
    that have been in progress or completed running. Status, progress, % complete,
    accepted, started, and complete are given.


    Figure 4-21


    DB System Details Page (Work Requests List)'
  trans: '# 创建数据库系统


    让我们开始创建一个数据库系统。创建数据库系统的对话框很长，因此我们将分部分介绍。我们需要提供的信息包括：


    *   *名称*：数据库系统的名称。

    *   *描述*（可选）：为您自己提供一个描述来解释数据库系统，例如其创建原因、分配到的项目等。您应避免在描述中包含任何机密数据。

    *   *数据库系统类型*：您可以选择独立（无高可用性）、启用高可用性和 HeatWave 数据库系统。我们将在第 7 章中了解更多关于高可用性功能的信息，在第
    8 章中了解 HeatWave。

    *   *管理员*：您需要指定 MySQL 管理员用户帐户和密码。

    *   *网络*：您需要为数据库系统选择 VCN 和子网。

    *   *可用性域*（放置位置）：选择可用性域。

    *   *硬件*：选择数据存储（块卷）的形状和大小。

    *   *备份计划*：您可以选择开启自动备份。


    我们将引导您完成所有这些数据的填写，并展示如何为一个位于 `oci-tutorial-compartment` 中、没有自动备份的独立数据库系统完成每一项设置。在数据库系统资源页面的“数据库系统位于…”列表中，点击
    *创建数据库系统* 按钮来创建数据库系统。


    > **提示**

    >

    > 注意在创建对话框中有几个带下划线的短语。这些是指向文档的链接，您可以使用它们来了解更多细节。您应该考虑花时间探索这些链接，以便更熟悉数据库系统的细节。


    我们将从顶部底部分部分检查对话框。您可以向下滚动查看创建数据库系统对话框的其他部分。图 4-14 显示了第一个部分，它要求填写 compartment、名称和描述。请务必在“在
    compartment 中创建”下拉列表中选择 `oci-tutorial-compartment`，并使用名称 `mysql-test-1`。如果您愿意，可以填写描述。


    ![图 4-14](img/527055_1_En_4_Fig14_HTML.png)

    *图 4-14 创建数据库系统（第 1 部分）*


    向下滚动到下一个部分，它要求填写数据库系统的类型和 MySQL 管理员凭据。为数据库系统类型选择 *独立* 选项，使用 `mysql_admin` 作为用户名并提供一个密码。请务必遵循密码限制，并再次输入密码进行验证。图
    4-15 显示了已选择和输入数据的部分。


    ![图 4-15](img/527055_1_En_4_Fig15_HTML.png)

    *图 4-15 创建数据库系统（第 2 部分）*


    一旦添加了这些信息，向下滚动到下一个部分，即 *配置网络* 部分，如图 4-16 所示。在这里，我们希望确保在“虚拟云网络位于 oci-tutorial-compartment”列表中选择了
    `oci-tutorial-vcn`，并且在“子网位于 oci-tutorial-compartment”列表中选择了 `Private Subnet oci-tutorial-vcn
    (Regional)` 条目。如果您看不到这些条目，可以使用“更改 Compartment”链接来更改 compartment。


    ![图 4-16](img/527055_1_En_4_Fig16_HTML.png)

    *图 4-16 创建数据库系统（第 3 部分）*


    一旦您验证了这些条目，向下滚动到下一节，即可用性域的放置位置。在这里，选择哪个可用性域并不重要，但既然我们迄今为止一直使用 *AD-2*，请继续选择它，如图
    4-17 所示。


    ![图 4-17](img/527055_1_En_4_Fig17_HTML.png)

    *图 4-17 创建数据库系统（第 4 部分）*


    选择了 AD-2 后，向下滚动到下一节，即 *配置硬件* 部分。在这里，我们可以选择更改形状以及更改数据存储的大小，如图 4-18 所示。由于我们是在练习创建数据库系统，我们将使用如图所示的默认值。在这种情况下，它是一个小型的虚拟机形状，具有
    8 GB RAM 和附加的 50 GB 块存储用于数据。正如您所推测的，创建和配置数据库系统的过程包括配置块卷、附加、连接并将块卷挂载到某个文件夹。


    ![图 4-18](img/527055_1_En_4_Fig18_HTML.png)

    *图 4-18 创建数据库系统（第 5 部分）*


    向下滚动到下一节，通过选择备份计划来选择自动备份。备份计划简单来说就是备份的频率和类型。我们将在第 5 章中了解更多关于备份的信息。目前，我们可以关闭备份功能，如图
    4-18 所示。我们不需要备份，因为我们不会创建任何数据，也不会出于任何保留目的配置数据库。当您确认输入的数据后，点击 *创建* 按钮来创建数据库系统。这将引导您进入数据库系统详细信息页面。


    ![图 4-19](img/527055_1_En_4_Fig19_HTML.png)

    *图 4-19 创建数据库系统（第 6 部分）*


    点击按钮后，数据库系统的创建、设置和配置过程将开始，`创建数据库系统` 工作请求（也称为工作流）将启动。这可能需要一段时间，所以如果没有立即发生任何事情或您认为它可能卡住了，请不要惊慌。就像我们在其他资源中看到的那样，一旦开始创建，您将被定向到资源详细信息页面。在这种情况下，您应该会看到类似于图
    4-20 的数据库系统详细信息页面。请注意，数据库系统仍处于 `正在创建` 状态。


    ![图 4-20](img/527055_1_En_4_Fig20_HTML.jpg)

    *图 4-20 数据库系统详细信息页面（正在创建）*


    您可以通过向下滚动到 *资源* 菜单，然后点击 *工作请求* 以查看 *工作请求* 部分（如图 4-21 所示）来检查初始配置数据库系统的工作流状态。在这里，我们可以看到所有已运行或正在运行的工作请求（工作流）。如您所见，初始工作流仍在运行，并且可能会持续一段时间。


    ![图 4-21](img/527055_1_En_4_Fig21_HTML.png)

    *图 4-21 数据库系统详细信息页面（工作请求列表）*'
- fmt: 'Once the workflow is done, the icon for the DB System will turn green, the
    status will change to `ACTIVE`, and the workflow will show complete. The process
    can take some minutes to complete. Let’s learn more about the DB System details
    page.


    ## DB System Details Page


    This is a good opportunity to look at the DB System details page more closely.
    Figure [4-22](#527055_1_En_4_Chapter.xhtml#Fig22) shows a map of the various sections
    we will explore. You have seen some of these in other resource pages, so the layout
    should not be a surprise. We won’t go through every detail of every portion, rather,
    we will spend some time learning what each does and what data is available to
    you.


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig22_HTML.png)


    A page displays the Data base system details for o c i tutorial my s q l with
    general information, D B system configuration, backup, deletion plan, etcetera.
    The table below displays the work requests.


    Figure 4-22


    DB System Details Page (Feature Map)


    There are three areas identified in the figure. These include the following. We
    will look at each in more detail in the following sections. The number in the
    list corresponds to the numbered dot in the figure:


    1.  Status and Buttons

    2.  Resource Menu

    3.  DB System Information and Tags


    ### Status and Buttons


    The status and buttons section of the details page is like any other OCI resource
    detail page. That is, on the left is an icon depicting the state of the resource
    by color and state value written below the icon. To the right of the icon is a
    set of buttons for the common operations on a DB System as shown in Figure [4-23](#527055_1_En_4_Chapter.xhtml#Fig23).


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig23_HTML.jpg)


    A page displays the D B system details for o c i tutorial my s q l with general
    information and D B system configuration. More actions button on the right top
    display action like delete, add tag, etcetera.


    Figure 4-23


    Status and Buttons, Action Menu


    There are several states that the DB System can have. Table [4-1](#527055_1_En_4_Chapter.xhtml#Tab1)
    shows a list of the states along with the color of the icon.


    Table 4-1


    DB System States and Icon Colors


    | Icon Color | State | Description |

    | --- | --- | --- |

    | Grey | `INACTIVE` | The DB System is powered off by the stop or reboot action
    in the Console or API. |

    | Red | `DELETED` | The DB System is deleted and is no longer available. |

    | | `FAILED` | An error condition prevented the creation or continued operation
    of the DB System. |

    | Yellow | `CREATING` | The DB System is reserving resources, booting, and creating
    the initial database. Provisioning can take several minutes. You cannot use the
    system yet. |

    | | `UPDATING` | The DB System is starting, stopping, restarting, or updating
    a replication channel associated with the DB System. |

    | | `DELETING` | The DB System is being deleted by the terminate action in the
    Console or API. |

    | Green | `ACTIVE` | The DB System is successfully created. |


    The buttons are for operations that include the following:


    *   `Edit`: Change name and description for the DB System for an active DB System.
    You can change the shape for an inactive DB System.

    *   `Start`: Start a stopped or inactive DB System. Note that this button is greyed
    out (inoperative) for an active DB System.

    *   `Stop`: Stop an active DB System.

    *   `Restart`: Stop then start a DB System.

    *   `More Actions`: Perform resource-specific actions on the DB System.


    If you are following along in this tutorial and want to stop and come back later
    to finish the chapter, you may want to stop the DB System so that you do not incur
    any costs for execution. You will still incur costs for having an inactive DB
    System, but not as much as if it were active. To stop the DB System, click the
    `Stop` button and optionally change the stop type. You will be prompted for a
    fast, slow, etc. options but you should choose the default. Once the DB System
    is stopped, its icon will change to yellow and the status `INACTIVE` will be displayed.


    The `More Actions` menu contains the following operations. Some of these operations
    may be available (repeated) on the various resource panes as defined in the next
    section. For example, you can create a new backup while viewing the list of existing
    backups.


    We won’t cover all of these operations in this chapter saving the explanations
    for later chapters. We will cover backup operations in Chapter [5](#527055_1_En_5_Chapter.xhtml),
    high availability options in Chapter [7](#527055_1_En_7_Chapter.xhtml), and HeatWave
    in Chapter [8](#527055_1_En_8_Chapter.xhtml):


    *   `Edit Backup Plan`: Enable or disable automatic backups.

    *   `Create Manual Backup`: Create a backup of the DB System.

    *   `Enable High Availability`: Change a standalone DB System to a high availability
    enabled DB System.

    *   `Disable Crash Recovery`: Enable or disable crash recovery. Disabling crash
    recovery can improve performance but will also turn off automatic backups. Use
    wisely.

    *   `Add HeatWave Cluster`: Add another cluster to the HeatWave configuration
    (valid only for DB Systems with HeatWave enabled).

    *   `Create Channel`: Create a replication channel for use in accepting replication
    data from another source. See Chapter [7](#527055_1_En_7_Chapter.xhtml) for more
    details on this advanced topic.

    *   `Update Storage Size`: Change the storage size of the MySQL data.

    *   `Edit MySQL Version`: If the DB System is running a lower (older) version
    of MySQL than what is available in OCI, you have the option of updating the DB
    System to use the latest version of MySQL.

    *   `Add Tags`: Add one or more user-defined tags that are displayed in the `Tags`
    tab.

    *   `Delete`: Terminate the DB System and delete all resources for it.


    Next, let’s look at the `Resource` menu and its selections.


    ### Resource Menu


    The resource menu is used to change the bottom portion (pane) of the details page
    to one of several resource views as shown in Figure [4-24](#527055_1_En_4_Chapter.xhtml#Fig24).
    Some views contain a filter section for filtering the view. The resources available
    for viewing and interacting with include metrics, replication endpoints, HeatWave
    clusters, backups, channels, and work requests. We will see an example of each
    of these in the following sections:


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig24_HTML.jpg)


    A menu for resources displays metrics, endpoints, heatwave, backups, channels
    and work requests.


    Figure 4-24


    Resources Menu


    #### Metrics


    One of the most powerful tools in diagnosing performance and related issues are
    the metrics you gather from the system. MySQL includes a long list of things you
    can monitor from the performance schema views and elsewhere in MySQL. However,
    most of that information is managed by OCI. Fortunately, you can still see graphical
    representation of many of those performance metrics as well as important OCI-related
    performance metrics for a DB System.


    When you click on `Metrics` in the menu, you will see a grid of various metric
    counters displayed as shown in Figure [4-25](#527055_1_En_4_Chapter.xhtml#Fig25).
    These include metrics for connections, statements, CPU, memory, network latency,
    disk utilization, and backups.


    ![](images/527055_1_En_4_Chapter/527055_1_En_4_Fig25_HTML.png)


    A window displays the resource tab, in which metrics are selected. It displays
    2 graphs for the current and active connections versus the time on 30 march 2022
    from 17:20 to 18:15 hours.


    Figure 4-25


    Metrics Resource Pane (DB System)


    Notice the metrics resource pane has a filter to the left that you can use to
    show all metrics or limit the view to either the DB System or backups.


    As you become more familiar with DB Systems and start using them in production
    environments, you may want to visit this resource pane to learn how your DB Systems
    are performing over time.'
