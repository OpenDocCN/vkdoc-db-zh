    scp -i c:\users\cbell\.ssh\ssh-key-2022-08-16.key oci_api_key_public.pem opc@150.136.69.126:~/.oci/

    scp -i c:\users\cbell\.ssh\ssh-key-2022-08-16.key oci_api_key.pem opc@150.136.69.126:~/.oci/

    ```


    Next, return to the compute instance and edit the config file with the command
    `nano ~/.oci/config`. Change the `key_file` parameter on the last line to the
    following and save the file:


    ```

    key_file=/home/opc/.oci/oci_api_key.pem

    ```


    There is one more minor thing we need to do. We must create a pre-authenticated
    request for the ObjectStore bucket.'
