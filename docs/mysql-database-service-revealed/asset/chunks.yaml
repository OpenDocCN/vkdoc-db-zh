    , and ignored otherwise.\n--sort-by [text] The field to sort by. Only one sort\
    \ order may be provided. Time fields are default ordered as descending. Accepted\
    \ values are: displayName, timeCreated, timeUpdated\n--sort-order [text] The sort\
    \ order to use (ASC or DESC). Accepted values are: ASC, DESC\nGlobal Parameters\n\
    =================\nUse \"oci --help\" for help on global parameters.\n\"--auth-purpose\"\
    , \"--auth\", \"--cert-bundle\", \"--cli-auto-prompt\", \"--\ncli-rc-file\", \"\
    --config-file\", \"--connection-timeout\", \"--debug\", \"--\ndefaults-file\"\
    , \"--endpoint\", \"--generate-full-command-json-input\", \"\n--generate-param-json-input\"\
    , \"--help\", \"--latest-version\", \"--max-\nretries\", \"--no-retry\", \"--opc-client-request-id\"\
    , \"--opc-request-id\",\n\"--output\", \"--profile\", \"--query\", \"--raw-output\"\
    , \"--read-timeout\",\n\"--region\", \"--release-info\", \"--request-id\", \"\
    --version\", \"-?\", \"-d\",\n\"-h\", \"-i\", \"-v\"\nListing 9-4\nCLI mysql backup\
    \ list Help Example\n```\n\n哇，信息量真大！我们现在知道了所有需要的信息，可以列出某个 compartment 或特定 DB System（使用\
