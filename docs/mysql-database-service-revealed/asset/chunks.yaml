    First, login to your compute instance and create the directory exported data as
    shown below:


    ```

    C:\exported_data> ssh -i c:\users\cbell\.ssh\ssh-key-2022-08-16.key opc@150.136.69.126

    [opc@connection-instance ~]$ mkdir exported_data

    ```


    Next, navigate to the exported data folder and copy the `mysql_data.zip` file
    to the compute instance as shown below. Note that you will have to use the correct
    SSH key file and the public IP address of your compute instance:


    ```

