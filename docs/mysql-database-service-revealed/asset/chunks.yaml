    on creating and configuring the compute instance.


    Return to your local MySQL server and open the MySQL Shell and connect to it.
    You can use the JavaScript option using the command shown below:


    ```

    C:\Users\cbell>mysqlsh -uroot -p –js

    ```


    Next, we will execute the `util.dumpInstance()` method providing a prefix for
    the bucket data (use `mds-test`) along with the ObjectStore information in a JSON
    string that includes the bucket name (`osBucketName`), threads, the MDS data compatibility
    switch (`ocimds`) set to `true`, and the `compatibility` options discussed earlier
    where we will strip restricted grants, definer clauses, missing primary keys,
    and invalid accounts. The following shows the format of the method call:


    ```

    util.dumpInstance("bucketPrefix", {osBucketName: "mds-bucket", threads: n, ocimds:
    true, compatibility: ["strip_restricted_grants", "strip_definers", "ignore_missing_pks",
    "skip_invalid_accounts"]})

    ```


