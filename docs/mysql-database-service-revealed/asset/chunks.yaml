    12: MySQL.VM.Standard.E3.32.512GB\n13: MySQL.VM.Standard.E3.48.768GB\n14: MySQL.VM.Standard.E3.64.1024GB\n\
    ...\n45: MySQL.HeatWave.BM.Standard.E3\nSelect the item in the list (int): 5\n\
    Choose an availability domain:\n1: DRUu:US-ASHBURN-AD-1\n2: DRUu:US-ASHBURN-AD-2\n\
    3: DRUu:US-ASHBURN-AD-3\nSelect the item in the list (int): 3\nEnter optional\
    \ parameters:\nEnter display name: TEST_API\nEnter DB size in GBs (e.g. 50): 50\n\
    Enter MySQL administrator user name: mysql_admin\nEnter MySQL administrator password:\n\
    Waiting................................................................................................................................Done!\n\
    ```\n\n列表 9-22 数据库系统脚本的输出\n\n花些时间，根据你自己的需求尝试使用这个脚本。你可能会发现，它有助于你开始为 MDS 编写自己的 Python\
    \ 自动化脚本。\n\n不过，如果你好奇的话，图 9-2 展示了控制台中的数据库系统详情页面。\n\n![TEST_API 数据库页面，包含常规信息、数据库系统配置、备份、HeatWave、高可用性、网络、放置位置和端点等详情的截图。](img/527055_1_En_9_Fig2_HTML.png)\n\
    \n图 9-2 新建数据库系统详情页面（API 示例）\n\n但是等等，还有更多内容。我们为你准备了一个额外的例子，供你自行尝试。\n\n#### 删除数据库系统\n\
    \n你的挑战是，以上述控制数据库系统脚本为基础，添加 `delete` 操作。首先，你需要使用 `oci.mysql.DbSystemClient` 类的\
    \ `delete_db_system()` 方法。你可以在 [`https://docs.oracle.com/en-us/iaas/tools/python/2.79.0/api/mysql/client/oci.mysql.DbSystemClient.xhtml#oci.mysql.DbSystemClient.delete_db_system`](https://docs.oracle.com/en-us/iaas/tools/python/2.79.0/api/mysql/client/oci.mysql.DbSystemClient.xhtml%2523oci.mysql.DbSystemClient.delete_db_system)\
    \ 找到该方法的文档和一个 Python 脚本示例。要完成此任务，你应该无需在控制数据库系统脚本 (`control_db_system.py`) 上添加太多内容，但这对于刚开始使用\
    \ Python 和 API 的人来说将是一个很好的练习。\n\n好了，这就是我们对 API 的简要介绍！尽管对 MDS API 和 Python SDK\
    \ 的介绍比较简短，但它应该让你了解了其可能性，并为你开始研究自己的 Python 应用程序来处理 MDS 资源提供了基础。"
- fmt: '## Summary


    When working with tens, hundreds, or thousands of `DB Systems`, performing maintenance
    operations on or working with the `OCI` web-based console may become tedious and
    somewhat slower than you’d like. That’s where the `CLI` and `APIs` shine; they
    allow you to script common operations either in a `Bash` (or similar) script or
    in a `Python` code file that you can execute.


    Either way, you will gain greater control and greater productivity when working
    with many `OCI` products and services and especially when your `OCI` operations
    become routine. In those cases, any improvement in productivity pays dividends.
    If these advantages appeal to you, I encourage you to read the online documentation
    for those areas you want to automate (script) first so that you can get acquainted
    with the mechanisms used. Once you’ve mastered the basics, you can branch out
    to explore more complex operations.


    In the next chapter, we will learn some strategies and planning for migrating
    existing on-prem `MySQL` installations to `MDS`.


    ## 10. Migrating to MDS


    This book has covered a lot of material including a brief overview of the `MySQL
    Database Service` (`MDS`) including how to set up a `DB System`, perform backup
    and recovery, data migration to/from `MDS`, how to set up and use the high availability
    features, and we took a quick look at the `OCI` command line interface (`CLI`)
    and application programming interfaces (`API`). We saw demonstrations of most
    of these technologies so that you can get started using `MDS` in your environment.


    However, this book represents an introduction to `MDS` and there is much more
    to `MDS` than what can be conveyed in an introductory text. For example, we have
    not discussed any strategies for planning and migrating your existing `MySQL`
    installations to `MDS` nor have we discussed some of the deeper topics such as
    getting more details about `MDS` features or troubleshooting tips should something
    go wrong.


    In this chapter, we will discuss these topics so that you are prepared to begin
    planning and designing your `MySQL` infrastructure using `MDS` objects. As you
    will see, many of the tasks you may have used for planning your on-prem `MySQL`
    installations also apply to `MDS`.


    One of the first things you should consider when thinking about and planning your
    migration to `MDS` is how to get help and what to do should something happen when
    using `OCI` and `MDS`. Let’s look at that topic first.


    ### Getting Help While Using OCI and MDS


    When you begin working with recent technologies or new software, there is always
    a learning curve. The same is true with `MDS` and that’s why you are reading this
    book – to get a jump on learning `MDS` so that you can start using it right away.


    However, there will be cases where you will need to know more information about
    `OCI` and `MDS`. Indeed, this book does not and should not be considered a replacement
    for the documentation not only because the book doesn’t cover every nuance but
    also because `Oracle` is improving all of its `OCI` features weekly. Thus, if
    you want to keep updated on all of the features and the latest changes, you will
    need to check the documentation from time to time.


    There are also times when things happen in `OCI`, and you will need to know about
    those. Fortunately, `Oracle` is good about keeping its customers well informed.
    Finally, you may also need some help troubleshooting should something go wrong.
    We will cover all these topics in this section.


    #### Communication with Oracle


    When you use `OCI`, you are using a massive distributed system that has so many
    components that operate behind the scenes that most customers are completely unaware
    of and that is really the point to using the cloud, isn’t it? You need not worry
    about the details instead you rely on `Oracle` to provide services for you to
    consume in your own products and services.


    However, despite the brilliant and hard-working army of engineers employed by
    `Oracle`, things sometimes go wrong. There could be an Internet outage, hardware
    failure, or some other localized incident that could cause temporary disruption
    in one or more services. Fortunately, these incidents are brief and often localized
    to a small portion of `OCI`.


    Should something occur that `Oracle` detects could impact its customers, `Oracle`
    will send an email to customers alerting of the potential issue. Notice I mentioned
    potential because `Oracle` is proactive in its responses and often broadcasts
    notices of incidents that may affect customers. That should be reassuring to anyone
    who has used other cloud services in the past that simply stopped working with
    no explanation.


    Should `Oracle` detect a situation that could affect you or some of your `OCI`
    objects, you will receive an email that describes the problem and lists any potential
    actions you may want to take. Figure [10-1](#527055_1_En_10_Chapter.xhtml#Fig1)
    shows an excerpt of an email that I received when `Oracle` detected a latency
    issue with the `ObjectStore` services in my region. Fortunately, these emails
    are infrequent but should never be dismissed without considering the impact of
    the problems identified.


    ![](images/527055_1_En_10_Chapter/527055_1_En_10_Fig1_HTML.png)


    An `Oracle` cloud infrastructure email alert for the production event notification.
    Information to contact the support if the issue still arises.


    Figure 10-1

    OCI Potential Problem Alert Email


    Notice the email plainly describes the problem and the potential issues I could
    have experienced. In this case, it was higher latency problems. The email also
    includes links for getting more information and contacting `Oracle` support for
    additional help.


    This also illustrates the need for anyone wanting to use `MDS` to become more
    familiar with the `OCI` technologies and services. In this case, it was a service
    that I was not using at the time, but as the email states, it could affect any
    other service that is built on top of `ObjectStore`. This is an excellent example
    and a good opportunity to learn more about `OCI` even if you do not recognize
    the service mentioned. We will discuss how to find out more about other `OCI`
    services and products in the next section.


    `Oracle` also sends its customers emails when the problem is resolved. Figure
    [10-2](#527055_1_En_10_Chapter.xhtml#Fig2) shows an example of an “all clear”
    email message from `Oracle`. Once again, `Oracle` provides links for you to find
    out more about the issue and a link to support if you need more help.


    ![](images/527055_1_En_10_Chapter/527055_1_En_10_Fig2_HTML.png)


    An email of the `Oracle` cloud infrastructure for multiple services resolved in
    the `US East` region. Contact details if the problem continues are given below.


    Figure 10-2

    OCI Problem Resolved Email


    `Oracle` also sends out regular emails about your usage and billing information.
    For example, you will receive an email prior to `Oracle` charging your account
    that provides a summary of your charges to date. The email includes your account
    (company) name, account number, the date and number of the invoice (transaction),
    amount billed, and a reference number.'
