  \ `.oci` 文件夹，并将文件复制到计算实例。你需要复制 `config` 文件以及 API 密钥，如下所示。请注意，我们使用的是创建计算实例时生成的 SSH\
  \ 密钥。如果你的 `.ssh` 文件夹中没有正确的密钥，这些命令将无法工作：\n\n> 注意\n> 如果你丢失了 SSH 密钥文件，你将不得不终止并重新创建计算实例。\n\
  \n```\nscp -i c:\\users\\cbell\\.ssh\\ssh-key-2022-08-16.key config opc@150.136.69.126:~/.oci/\n\
