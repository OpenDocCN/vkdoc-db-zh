  \ MySQL 管理员用户的用户名。\n*   `--data-storage-size-in-gbs <int>`: 数据存储（数据库驱动器）的大小，单位为\
  \ GB。\n*   `--display-name <text>`: 数据库系统的用户友好名称。\n*   `--is-highly-available <bool>`:\
  \ 指定数据库系统是否高度可用。\n\n回顾 CLI 示例，我们使用了四个 CLI 命令；一个用于获取形状名称，一个用于获取子网 ID，一个用于获取可用性域，还有一个用于执行创建操作。这个使用\
  \ Python API 的示例将完成同样的事情，但全部在一个 Python 脚本中完成。\n\n像上一个示例一样，我们将显示一个简单的用户界面，允许用户从列表中选择项目，仅将显示名称和数据大小作为提示输入。我们还将提示输入\
  \ MySQL 管理员用户名和密码。\n\n我们不逐行分析，而是总结一下我们将要做的事情。我们知道必须获取子网、形状和可用性域，因此我们将编写方法来获取这些信息，使用一个辅助方法向用户显示列表并提示她从列表中选择一个。这样，我们将从用户那里获取这三个数据项。\n\
  \n在此过程中，我们将探索更多的 API 类，包括`oci.core.VirtualNetworkClient`、`oci.mysql.MysqlaasClient`和`oci.identity.IdentityClient`类，调用适当的方法来获取这些资源的列表。\n\
  \n可选参数；MySQL 管理员用户名和密码、数据存储大小和显示名称，都通过提示从用户读取。我们还将高可用性默认设置为禁用。\n\n一旦我们获得了所有信息，就使用`oci.mysql.DbSystemClient`类的`create_db_system()`方法来创建数据库系统。此方法需要填充一个名为`oci.mysql.models.CreateDbSystemDetails`的模型。\n\
  \n最后，由于`create_db_system()`方法立即返回，我们通过使用`get_db_system()`方法获取其详细信息来轮询数据库系统，传入新数据库系统的\
  \ OCID（在`create_db_system_response.data.id`变量中返回）。我们轮询数据库系统，直到其`lifecycle_state`等于`ACTIVE`。还有其他方法可以做到这一点，包括\
  \ OCI API 中的一些辅助方法，但对于初学者来说有点高级。如果你想让脚本执行并等待资源就绪，轮询`lifecycle_state`是一个可接受的初始解决方案。\n\
