  \ API 方法，并且参数也更复杂。\n\n### 创建数据库系统\n\n回顾 CLI 部分中的创建数据库系统示例，我们需要几条信息来创建数据库系统。我们在以下列表中重复必需和可选参数：\n\
  \n*   `--compartment-id <id>`: compartment 的 ID。\n*   `--shape-name <name>`: 形状名称。\n\
