  \n你的挑战是，以上述控制数据库系统脚本为基础，添加 `delete` 操作。首先，你需要使用 `oci.mysql.DbSystemClient` 类的 `delete_db_system()`\
  \ 方法。你可以在 [`https://docs.oracle.com/en-us/iaas/tools/python/2.79.0/api/mysql/client/oci.mysql.DbSystemClient.xhtml#oci.mysql.DbSystemClient.delete_db_system`](https://docs.oracle.com/en-us/iaas/tools/python/2.79.0/api/mysql/client/oci.mysql.DbSystemClient.xhtml%2523oci.mysql.DbSystemClient.delete_db_system)\
  \ 找到该方法的文档和一个 Python 脚本示例。要完成此任务，你应该无需在控制数据库系统脚本 (`control_db_system.py`) 上添加太多内容，但这对于刚开始使用\
  \ Python 和 API 的人来说将是一个很好的练习。\n\n好了，这就是我们对 API 的简要介绍！尽管对 MDS API 和 Python SDK 的介绍比较简短，但它应该让你了解了其可能性，并为你开始研究自己的\
  \ Python 应用程序来处理 MDS 资源提供了基础。\n\n\n\n## 摘要\n\n当需要管理数十、数百甚至上千个 `DB System` 时，通过基于\
  \ Web 的`OCI`控制台执行维护操作或进行日常使用，可能会变得繁琐且速度不如预期。这正是 `CLI` 和 `API` 的优势所在；它们允许你通过 `Bash`（或类似）脚本或\
  \ `Python` 代码文件来编写常见操作的自动化程序。\n\n无论采用哪种方式，在使用众多 `OCI` 产品和服务时，尤其是在 `OCI` 操作变得常规化时，你都能获得更强的控制力和更高的生产力。在这些情况下，生产力的任何提升都会带来显著回报。如果这些优势吸引你，我建议你首先阅读你想自动化（编写脚本）领域的在线文档，以便熟悉其使用的机制。一旦掌握了基础知识，你就可以进一步探索更复杂的操作。\n\
  \n在下一章中，我们将学习一些将现有本地 `MySQL` 安装迁移到 `MDS` 的策略和规划。\n\n## 10. 迁移至 MDS\n\n本书涵盖了大量的内容，包括对\
  \ `MySQL Database Service` (`MDS`) 的简要概述，例如如何设置 `DB System`、执行备份与恢复、向/从 `MDS` 迁移数据、如何设置和使用高可用特性，以及我们快速了解了\
  \ `OCI` 命令行接口 (`CLI`) 和应用程序编程接口 (`API`)。我们演示了大部分这些技术，以便你能开始在环境中使用 `MDS`。\n\n然而，本书仅是对\
  \ `MDS` 的入门介绍，其丰富内涵远非一本入门书籍所能囊括。例如，我们尚未讨论任何关于规划和迁移现有 `MySQL` 安装到 `MDS` 的策略，也没有深入探讨一些更深层次的主题，例如如何获取有关\
  \ `MDS` 特性的更多细节，或是在出现问题时的故障排除技巧。\n\n在本章中，我们将讨论这些主题，以便你做好准备，开始使用 `MDS` 对象来规划和设计你的\
  \ `MySQL` 基础架构。正如你将看到的，许多用于规划本地 `MySQL` 安装的任务同样适用于 `MDS`。\n\n当思考和规划迁移至 `MDS` 时，你首先应该考虑的事情之一是如何获取帮助，以及在使用\
  \ `OCI` 和 `MDS` 时发生问题该如何处理。让我们首先看看这个主题。\n\n## 在使用 OCI 和 MDS 时获取帮助\n\n当你开始接触新技术或新软件时，总会有一个学习曲线。`MDS`\
  \ 同样如此，这也是你阅读本书的原因——为了快速掌握 `MDS` 的学习，以便能立即开始使用它。\n\n然而，在有些情况下，你需要了解关于 `OCI` 和 `MDS`\
  \ 的更多信息。确实，本书既没有，也不应被视为文档的替代品，不仅因为本书没有涵盖每一个细节，还因为 `Oracle` 每周都在改进其所有 `OCI` 功能特性。因此，如果你想随时了解所有特性的最新变化，你需要不时地查阅文档。\n\
  \n有时，在 `OCI` 中会发生一些状况，你需要了解这些情况。幸运的是，`Oracle` 非常善于让其客户保持知情。最后，当出现问题时，你可能还需要一些故障排除的帮助。我们将在本节涵盖所有这些主题。\n\
  \n### 与 Oracle 的沟通\n\n当你使用 `OCI` 时，你实际上是在使用一个庞大的分布式系统，它有太多在幕后运行的组件，以至于大多数客户都完全意识不到它们的存在——而这正是使用云计算的意义所在，不是吗？你无需担心细节，而是依赖\
  \ `Oracle` 为你提供服务，供你在自己的产品和服务中使用。\n\n然而，尽管 `Oracle` 拥有一支才华横溢且勤奋工作的工程师团队，但有时仍会出现问题。可能会发生互联网中断、硬件故障或其他一些局部事件，导致一项或多项服务出现暂时中断。幸运的是，这些事件通常很短暂，而且往往只影响到\
  \ `OCI` 的一小部分。\n\n如果 `Oracle` 检测到可能影响其客户的情况发生，它会向客户发送电子邮件，提醒潜在问题。请注意，我提到的是“潜在”，因为\
  \ `Oracle` 在响应方面非常积极主动，通常会广播可能影响客户的通知。对于那些过去使用过其他云服务（它们可能突然停止工作且没有任何解释）的用户来说，这应该会让人感到安心。\n\
  \n如果 `Oracle` 检测到可能影响你或你的某些 `OCI` 对象的情况，你将收到一封描述问题并列出你可能需要采取的任何潜在行动的电子邮件。图 10-1\
  \ 显示了一封我收到的电子邮件的摘录，当时 `Oracle` 检测到我所在区域的 `ObjectStore` 服务存在延迟问题。幸运的是，这类邮件并不频繁，但绝不能在未考虑所识别问题影响的情况下就置之不理。\n\
  \n![](img/527055_1_En_10_Fig1_HTML.png)\n\n一封关于生产事件通知的 `Oracle` 基础设施电子邮件警报。如问题仍出现，提供了联系支持的信息。\n\
  \n图 10-1\nOCI 潜在问题警报邮件\n\n请注意，这封邮件清楚地描述了问题以及我可能遇到的潜在问题。在这个案例中，是更高的延迟问题。邮件还包括了获取更多信息以及联系\
  \ `Oracle` 支持以获取额外帮助的链接。\n\n这也说明了任何想要使用 `MDS` 的人都需要更熟悉 `OCI` 技术和服务的必要性。在这个案例中，这是我当时未使用的一项服务，但正如邮件所述，它可能影响任何建立在\
  \ `ObjectStore` 之上的其他服务。这是一个极好的例子，也是一个了解 `OCI` 更多知识的好机会，即使你并不认识邮件中提到的服务。我们将在下一节讨论如何了解更多关于其他\
  \ `OCI` 服务和产品的信息。\n\n当问题解决后，`Oracle` 也会向其客户发送邮件。图 10-2 显示了来自 `Oracle` 的一封“警报解除”邮件示例。`Oracle`\
  \ 再次提供了链接，供你了解更多关于该问题的信息，以及在你需要更多帮助时联系支持的链接。\n\n![](img/527055_1_En_10_Fig2_HTML.png)\n\
  \n一封关于在 `美国东部` 区域解决的多项服务的 `Oracle` 云基础设施邮件。下方提供了如果问题持续存在的联系信息。\n\n图 10-2\nOCI 问题已解决邮件\n\
  \n`Oracle` 还会定期发送有关你的使用情况和账单信息的邮件。例如，在 `Oracle` 从你的账户扣款之前，你会收到一封电子邮件，提供截至当时的费用摘要。该邮件包含你的账户（公司）名称、账号、发票（交易）日期和编号、账单金额以及一个参考编号。\n\
  \n\n\n\n与事件邮件类似，如果您需要帮助，也会看到指向 Oracle 计费部门的链接，以及您可以联系的人员的电子邮件地址和电话号码。您也可以通过 `OCI\
  \ 控制台` 查看账单详情：点击右上角的账户图标，然后在“使用情况”标题下点击 `分析成本`。这将弹出一个对话框，您可以通过它按日查看产生的成本以及按服务细分的费用。图\
