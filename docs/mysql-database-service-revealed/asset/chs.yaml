  创建会话（Bastion 详情页面）\n\n这将打开一个对话框，我们将在其中创建端口转发会话。在对话框中，于`会话类型`下拉菜单中选择`SSH 端口转发会话`，（可选）将会话命名为`MySQLSession`，在`用户名`文本框中输入`opc`，输入数据库系统的私有\
