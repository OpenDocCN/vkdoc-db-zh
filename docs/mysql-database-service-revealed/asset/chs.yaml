  \ `会话列表` 中点击会话的上下文菜单并选择 `删除会话` 来删除会话。您可以通过点击堡垒机详情页上的 `删除堡垒机` 按钮来删除堡垒机。\n\n如果连接成功打开，并且您看到与清单类似的结果，恭喜！您已成功连接到\
