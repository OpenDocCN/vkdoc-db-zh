  \n}\n}\n...\nC:\\>oci mysql work-request get --work-request-id=ocid1.mysqlworkrequest.MASKED\n\
  {\n\"data\": {\n\"compartment-id\": \"ocid1.compartment.MASKED\",\n\"id\": \"ocid1.mysqlworkrequest.MASKED\"\
