  \ (`https://dev.mysql.com/doc/connector-j/8.0/en/`)。\n\n## 总结\n\nMySQL 数据库服务器是一个强大的工具。鉴于其在作为互联网数据库服务器方面的独特市场定位，网络开发者（以及许多初创公司和类似的互联网企业）选择\
  \ MySQL 作为解决方案也就不足为奇了。该服务器不仅稳健且易于使用，还可以作为免费的社区许可证获取，让您能够将初始投资控制在预算之内。\n\n在本章中，您了解了使用\
  \ SQL 接口时 MySQL 数据库服务器在传统角色中的一些强大功能；如何发出用于创建数据库和表以存储数据的命令，以及检索这些数据的命令，甚至如何将您的应用程序连接到\
  \ MySQL 以存储数据。虽然本章仅提供了 MySQL 的一个简短入门，但您已经学会了如何通过实践自己的 MySQL 安装来开始使用，这在生产环境中使用 MySQL\
  \ 数据库服务时将会带来回报。\n\n在下一章中，我们将深入探讨 MySQL 数据库服务，包括如何开始创建和使用您的第一个数据库系统（在 MDS 中称为 `dbSystem`）。\n\
  \n脚注 1 2 3\n\n# 4. MySQL 数据库服务\n\n如果您是 MySQL 新手并且阅读了上一章，那么您现在应该已经足够熟悉 MySQL，能够欣赏其强大功能和简洁性。然而，如果您是一位长期的\
  \ MySQL 用户，并且已经将您自己的 MySQL 服务器构建到您的基础设施中，那么您很可能非常清楚管理 MySQL 服务器所需付出的努力。长期以来，业界一直需要的是一种全托管的基于云的\
  \ MySQL 服务，它在安全环境中运行，并得到云服务提供商的支持，该提供商提供实时服务管理，以确保您的数据库需求得到充分满足且可靠。那一天已经到来，它就是由\
  \ Oracle 拥有和管理的 Oracle 云基础设施上运行的 **MySQL 数据库服务**。\n\n既然我们现在对 Oracle 云基础设施 (OCI)\
  \ 和 MySQL 有了更多了解，我们就可以继续学习如何在 OCI 中使用和操作 MySQL，即 MySQL 数据库服务，简称 MDS。在该服务中，有一个称为**数据库系统**的资源，简称\
  \ DB System。这就是为您提供托管 MySQL 服务器的 OCI 资源。\n\n回顾第 1 章，DB System 构建在现有的 OCI 资源之上，包括计算实例和块存储。然而，在幕后还有更多被使用和管理的组件。\n\
  \n这种全托管服务为您提供了许多优势，包括无需初始设置硬件、安装操作系统、安装 MySQL、配置所有组件使其良好工作等，并且之后，您也无需担心基础操作系统甚至\
  \ MySQL 的更新或升级——所有这些任务都由 OCI 内部的自动化处理，并由 MySQL 工程部门自身监督。太棒了！\n\n## 托管式 MySQL 的职责\n\
  \n“托管”一词用于描述 MySQL 在 OCI 中的运行方式。虽然这包括我们讨论过的设置、配置和升级等内容，但还包含什么？客户与 Oracle 的职责分别是什么？\n\
  \nOracle 负责确保备份和恢复机制可用，并在请求时按计划执行自动化备份、MySQL 版本补丁和升级、操作系统补丁和升级、监控系统是否存在异常并响应紧急问题，以及确保您的\
  \ DB 系统在安全环境中运行。客户负责建模、设计和维护任何创建的模式（数据库）、查询设计和优化，以及数据访问和保留策略。\n\n因此，保持 MySQL 服务器成功运行的维护任务属于\
  \ Oracle 的职责范围，而数据和对其的访问则是客户的责任。\n\n在本章中，我们将回到我们的 OCI 账户，学习如何设置和使用一个 MDS 数据库系统。我们将通过云控制台简要浏览\
  \ MDS 服务和一个 DB System，以便我们完全理解页面上的所有内容。因此，我们要更深入地探索！让我们开始吧。\n\n## 入门指南\n\n如果您一直在按照第\
  \ 2 章和第 3 章中的 OCI 和 MySQL 教程操作，那么您应该已经设置好了一个 OCI 账户，并且熟悉 MySQL 中常用的术语和 SQL 命令。如果您至少没有完成第\
  \ 2 章中的 OCI 教程，您可能需要先回顾一下那一章。\n\n在开始部署您的第一个 DB 系统之前，您必须满足几个先决条件。以下步骤总结了我们需要在 OCI\
  \ 账户中设置的内容：\n\n![](img/527055_1_En_4_Fig1_HTML.png)\n\n一个横幅显示了 MySQL 先决条件。提到了租户管理员执行该任务的\
  \ 3 个步骤。可以找到用于创建或将用户添加到组的几个超链接。\n\n图 4-1：首次使用 MDS 时的横幅\n\n1.  您必须拥有一个虚拟云网络 (VCN)\
  \ 来放置您的 MySQL 资源。\n2.  您必须创建一个用户组并向该组添加至少一个用户。\n3.  您必须创建一个策略，允许该组拥有使用 MDS 和 DB\
  \ 系统的某些权限。\n\n如果您不具备所有这些条件，您可能无法部署 DB 系统。有趣的是，OCI 在 MDS 资源页面顶部生成了一个横幅，如图 4-1 所示。\n\
