  \ 10-8 展示了此页面的示例，显示了一个已解决的事件。请注意，有一个指向该事件的链接，点击后将打开详细信息供您查阅（如果您需要更多信息）。\n\n![](img/527055_1_En_10_Fig8_HTML.png)\n\
