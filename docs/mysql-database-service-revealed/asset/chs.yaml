  \n一个标题为“配置硬件”的对话框。提供两个框，标题分别为：选择配置，以及数据存储大小（GB）。\n\n#### 配置硬件\n\n由于我们是从备份创建新的数据库系统，我们将使用默认设置，但您可以借此机会更改设置。只需确保数据的新大小足以存储您的数据即可。\n\
  \n> **注意**\n> 如果您选择的配置比创建备份时使用的配置小，您必须确保新配置具有支持数据库系统所需的正确资源。例如，您必须确保有足够的处理器和内存分配以满足性能预期，并有足够的磁盘空间分配来还原数据。\n\
