  \ 2-33 所示。花点时间浏览一下显示的数据。您会看到一些重要值，包括公共 IP 地址和 OCID。我们将使用公共 IP 地址通过安全外壳主机 (SSH) 会话登录到计算实例。\n\
  \n![](img/527055_1_En_2_Fig33_HTML.png)\n\n一个 oci-tutorial-instance-1 的窗口，包含实例信息。描述了常规信息、实例详细信息、实例访问和公共\
  \ VNIC。公共 IP 地址被高亮显示。\n\n图 2-33\n\n计算实例详细信息页面\n\n如果您的 PC 上未安装 SSH 客户端，则需要在连接到计算实例之前安装一个。需要加密的\
  \ SSH 会话。macOS 和大多数 Linux 发行版默认安装了 SSH 客户端。请参阅您的平台文档以了解如何安装 SSH 客户端。\n\n遗憾的是，Windows\
  \ 不附带 SSH 客户端。幸运的是，有几种第三方应用程序可用。一个流行的选项称为 PuTTY，它实际上是一个通用的终端会话应用程序。PuTTY 中的 SSH\
  \ 功能非常易于使用。我最喜欢 PuTTY 的一点是它是开源软件，因此可以免费下载和使用。\n\n您可以从 [`www.putty.org`](http://www.putty.org)\
  \ 下载 PuTTY。下载的文件不是一个安装包（`.msi`），而仅仅是 PuTTY 可执行文件 (`putty.exe`)。只需下载该文件并将其放在您的 path\
  \ 环境变量中的某个文件夹中。您也可以将其放在您的文档文件夹中，然后直接从那里执行或通过引用该文件夹来执行。\n\n回到计算实例详细信息页面，如果向下滚动，您将看到\
  \ \"Work requests\" 部分，该部分显示已在或正在计算实例上执行的工作流。我们想要确保完成的工作流是 \"Create instance\" 工作流，其状态应为\
  \ `Succeeded`，如图 2-34 所示。\n\n![](img/527055_1_En_2_Fig34_HTML.png)\n\n一个包含 3 行 6\
  \ 列的工作请求表。列名为 operation, state, %complete, accepted, started, finished。添加了一个成功的状态条目。\n\
  \n图 2-34\n\n计算实例工作请求列表\n\n一旦看到工作流成功，我们就准备好通过终端连接到实例。为此，只需使用以下命令。在这里，我们看到我们使用 `ssh`\
  \ 实用程序和 `-i` 参数，以及之前下载的私有 SSH 密钥的路径。接下来，我们提供在计算实例详细信息页面上找到的用户名和公共 IP 地址。默认用户名是 `opc`：\n\
  \n```\nssh -i  opc@\n```\n\n\n\n让我们看看该命令的实际操作。我们将使用之前下载并复制到用户账户 `.ssh` 文件夹的密钥，以及来自**图\
  \ 2-33**的公网 IP 地址（`129.153.25.232`）。**清单 2-1**展示了命令的实际操作。你可能会被要求如所示将 IP 地址添加到你的\
  \ hosts 文件。连接成功后，我们执行一个简单的 `ls -lsa` 命令来显示计算实例上用户目录的内容。\n\n```\n% ssh -i ~/.ssh/ssh-key-2022-03-13.key\
  \ opc@129.153.25.232\nThe authenticity of host '129.153.25.232 (129.153.25.232)'\
  \ can't be established.\n...\nAre you sure you want to continue connecting (yes/no/[fingerprint])?\
  \ yes\nWarning: Permanently added '129.153.25.232' (ED25519) to the list of known\
  \ hosts.\nActivate the web console with: systemctl enable --now cockpit.socket\n\
  [opc@oci-tutorial-instance-1 ~]$ ls -lsa\ntotal 12\n0 drwx------. 3 opc  opc   74\
  \ Mar 13 01:08 .\n0 drwxr-xr-x. 3 root root  17 Mar 13 01:08 ..\n4 -rw-r--r--. 1\
  \ opc  opc   18 Oct 10 01:59 .bash_logout\n4 -rw-r--r--. 1 opc  opc  141 Oct 10\
  \ 01:59 .bash_profile\n4 -rw-r--r--. 1 opc  opc  376 Oct 10 01:59 .bashrc\n0 drwx------.\
  \ 2 opc  opc   29 Mar 13 01:08 .ssh\n[opc@oci-tutorial-instance-1 ~]$ exit\n清单 2-1\n\
  使用 SSH 连接到计算实例\n```\n\n要关闭连接，只需使用 `exit` 命令。完成此操作后，我们已经证明可以成功连接到计算实例并使用它。现在，让我们为计算实例添加块存储。\n\
  \n## 为计算实例添加块存储\n\n由于默认的启动卷是 50 GB，对于存储任何大型应用程序甚至数据来说可能都太小了。毕竟，启动卷旨在用于存储系统应用程序等，而不是用户应用程序。幸运的是，我们可以轻松地为计算实例添加一个块卷，用于我们的应用程序和数据目的。\n\
  \n添加块卷的过程比我们目前所见的简单点击式界面要复杂一些。简而言之，我们需要执行以下操作：\n- 创建一个块卷\n- 将块卷附加到计算实例\n- 在计算实例上连接块卷\n\
  - 在计算实例上格式化并挂载块卷\n\n要创建块卷，请打开云控制台菜单并选择 *存储*，然后选择 *块卷*，如**图 2-35**所示。但是，这次，右键单击 *块卷*\
  \ 标签并在新标签页中打开选项。我们需要同时看到计算实例详情和块卷页面。\n\n**图 2-35** 块卷（主菜单）\n![](img/527055_1_En_2_Fig35_HTML.jpg)\n\
  一个突出显示了存储的 Oracle 云主菜单。存储菜单在右侧打开，块卷被一个用于选择的矩形框突出显示。\n\n在块卷页面上，你需要使用左侧的筛选控件来选择 compartment，如**图\
