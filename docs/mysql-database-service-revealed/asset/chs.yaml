  ### 列出 MySQL 规格


  要列出 MySQL 规格，我们使用 `oci.mysql.MysqlaasClient` 类中的 `list_shapes()` 方法，该方法接受 compartment
  ID 作为参数，这在许多 API 方法中都很常见。


  由于我们会经常使用 compartment ID，可以将其保存在环境变量中，并从 Python 脚本中读取。在 macOS 或 Linux 中设置环境变量，请使用
  `export` 命令，如下所示：


  ```

  export COMPARTMENT_ID=ocid1.compartment.MASKED

  ```


  对于 Windows，我们使用 `set` 命令，如下所示：


  ```

  set COMPARTMENT_ID=ocid1.compartment.MASKED

  ```


  在 Python 中，你可以使用 `os` 模块读取环境变量，如下所示：


  ```

  import os

  COMPARTMENT_ID = os.getenv(''COMPARTMENT_ID'')

  ```


  调用 API 获取规格列表的代码如下：


  ```

  list_shapes_response = mysql_client.list_shapes(compartment_id=COMPARTMENT_ID)

  ```


