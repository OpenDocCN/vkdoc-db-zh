  \ LIMIT 10;\n+------------+--------------+\n| first_name | last_name    |\n+------------+--------------+\n\
  | PENELOPE   | GUINESS      |\n| NICK       | WAHLBERG     |\n| ED         | CHASE\
  \        |\n| JENNIFER   | DAVIS        |\n| JOHNNY     | LOLLOBRIGIDA |\n| BETTE\
  \      | NICHOLSON    |\n| GRACE      | MOSTEL       |\n| MATTHEW    | JOHANSSON\
  \    |\n| JOE        | SWANK        |\n| CHRISTIAN  | GABLE        |\n+------------+--------------+\n\
  10 rows in set (0.0094 sec)\nListing 6-1\nTesting the Data (Restored DB System)\n\
  ```\n\n就是这样！现在我们知道了如何使用基于时间点的恢复将数据库系统恢复到特定的 5 分钟时间段。\n\n## 总结\n\n基于时间点恢复与自动备份一样，是一项可以增强您从数据灾难中恢复的能力并降低数据丢失风险的功能。MDS\
  \ 中的 PITR 是自动化的且易于设置。使用 PITR 恢复您的数据库系统也同样易于实现，无需记录复杂的系统参数或处理二进制日志文件。一旦您有机会使用该功能，并且在极少数情况下依赖它来恢复系统运行，您将会赞赏\
  \ Oracle 所做的工作，他们让数据库系统所有者在执行这一复杂任务时变得简单。\n\n在下一章中，我们将学习可用于将数据导入或导出到您的 MDS 数据库系统的选项。\n\
  \n# 7. 数据导入与导出\n\nMDS 中的数据库系统显然是一种非常强大且引人入胜的替代方案，可替代本地 MySQL 服务器。我们已经了解了如何创建数据库系统和创建备份，但是当您想将您自己的数据导入新的数据库系统时，您该怎么做？或者，如果您想将数据库系统中的数据副本用于本地开发实验室，您该如何导出数据？\n\
  \n幸运的是，有一些方法可以导出数据并将其导入到您的数据库系统。正如您将看到的，该过程并不复杂，并且适用于大多数用例。但是，如果您的数据量非常大，拥有许多 GB\
  \ 或 TB 的数据，您可能需要考虑联系 Oracle 的 MySQL 销售团队，以获取有关导入数据的更多选项。\n\n在本章中，我们将发现几种可以将数据迁移到云中或从云中迁出的方法。但首先，让我们看看一些概念、策略和工具。\n\
  \n## 概述\n\nOracle 确保您不必从零开始填充您的数据库系统。您确实可以将数据从本地 MySQL 服务器复制到数据库系统。Oracle 在文档中使用了几个术语，包括迁移和导入数据。但是，将数据复制到云中的过程称为迁移，而执行迁移的操作是名为导出和导入的两个过程。\n\
  \n在本节中，我们将概述用于将数据从您的本地 MySQL 服务器迁移到 MDS 中的数据库系统的工具和过程。\n\n### 将数据迁移到 MDS\n\n推荐的将数据迁移到\
  \ MDS 的过程涉及首先使用 MySQL Shell 导出数据，采用几种策略之一将导出的数据传输到您的数据库系统，然后使用 MySQL Shell 导入数据。我们将在下一节中看到将数据传输到数据库系统的策略。\n\
  \nMySQL Shell 有几种用于导出数据的方法（也称为实用工具）和一种用于导入数据的方法。这些方法位于名为 `util` 的 Java 模块中，该模块是\
  \ MySQL Shell 的一部分。要使用这些方法，您必须处于 JavaScript 模式。我们可以在启动 MySQL Shell 时使用 `--js` 选项设置模式，也可以在\
  \ shell 中使用 `/js` shell 命令切换到 JavaScript 模式。当您以 JavaScript 模式启动 shell 或切换到该模式时，您应该会看到如下提示：\n\
  \n```\nMySQL  localhost:33060+ ssl  JS >\n```\n\n注意\n\n我们在第 3 章中见过 MySQL Shell，如果您一直在按照书中的示例操作，您应该已经安装了\
  \ MySQL Shell。如果没有，请访问文档 [`https://dev.mysql.com/doc/mysql-shell/8.0/en/`](https://dev.mysql.com/doc/mysql-shell/8.0/en/)\
  \ 了解如何下载和安装 MySQL Shell。\n\n以下简要描述了用于导入和导出数据的方法。我们列出了必需和可选的参数（显示在方括号中）。虽然这些看起来像是\
  \ JavaScript 方法（它们确实是），但它们在底层执行了一个实用工具。因此，Oracle 称这些方法为“实用工具”：\n\n*   `util.dumpInstance(outputUrl[,\
  \ options])`：使用此实用工具从 MySQL 服务器导出所有兼容的数据库（模式）。默认情况下，该实用工具导出用户、事件、存储过程和触发器。\n\n*\
  \   `util.dumpSchemas(schemas, outputUrl[, options])`：使用此实用工具从 MySQL 服务器导出数据库（模式）列表。因此，您可以使用它一次导出一个数据库（模式），或者导出部分数据库以迁移到\
  \ MDS。\n\n*   `util.loadDump()`：使用此实用工具从 `dump*()` 方法导出的文件中导入数据。\n\n这是 MySQL Shell\
  \ 中可用实用工具的部分列表。有关完整列表，请参见 [`https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-utilities.xhtml`](https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-utilities.xhtml)。该文档包含专门介绍转储（导出）数据实用工具的部分。我们将在后面的章节中实际查看其中一些实用工具。但首先，我们必须讨论将导出的数据传输到您的数据库系统以进行导入的策略。\n\
  \n提示\n\n有关使用 `dumpInstance()` 方法的更多信息，请参见 [`https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-utilities-dump-instance-schema.xhtml`](https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-utilities-dump-instance-schema.xhtml)。\n\
  \n\n\n### 数据传输策略\n\n如前所述，将导出数据传输到你的数据库系统以进行导入有三种方式。最快的方式是使用另一个 OCI 资源，名为 `ObjectStore`\
  \ 作为从 `MySQL Shell` 指定的目标，Shell 会将数据直接复制到 `ObjectStore` 存储桶中。一种较慢的方法是使用一个中间的 `Compute`\
  \ 实例，你将数据复制到该实例，然后再导入。最慢的方法是设置一个 `Bastion 服务`，将你的个人电脑连接到你的数据库系统，在导入时直接从你的个人电脑读取数据。\n\
  \n回顾第 2 章，`ObjectStore` 是一种存储资源，允许你将一组文件视为对象进行处理。`ObjectStore` 允许你将文件（对象）放置在一个称为“存储桶”的容器中。因此，当你使用\
  \ `MySQL Shell` 导出到 `ObjectStore` 时，实际上是将数据文件导出到一个存储桶中，然后在后续导入过程中从该存储桶读取这些文件。\n\n\
  那么，哪种方法最好呢？这取决于你的环境配置以及 `OCI` 资源的设置方式。不过，推荐的方法是使用 `ObjectStore`。但请注意，使用 `ObjectStore`\
  \ 将导出的数据放入存储桶可能会产生少量费用，如果你将文件留在存储桶中的话（`ObjectStore` 是一项付费资源）。\n\n### 其他物理备份工具怎么办？\n\
  \n虽然可以使用某些物理备份工具，如 `MySQL Enterprise Backup` (`MEB`) 来备份你的本地 `MySQL` 并将其恢复到 `MDS`\
  \ 数据库系统上，但这个过程很复杂，并且需要对 `MySQL` 数据文件存储、`数据库系统` 配置有深入的了解，还需要一个能在 `OCI` 中使用的有效工具许可证。因此，**不建议**使用物理备份工具来导入你的本地数据。\n\
  \n### 兼容性问题\n\n虽然你在将数据迁移到 `MDS` 时不太可能遇到问题，但有一些关于你的本地 `MySQL` 服务器与 `MDS` 之间兼容性的注意事项需要留意。\n\
  \n## 安全性\n\n首先，在安全性方面存在一些限制，这些限制在你的本地服务器上可能不存在。幸运的是，`MySQL Shell` 中的转储工具可以检测到此类问题，并且在某些情况下，可以通过修改\
  \ SQL `CREATE` 语句在导出过程中使你的数据库（模式）兼容。你可以在 `MySQL Shell` 中调用（call） `util.dumpInstance()`\
  \ 方法时指定 `ocimds:true` 选项来启用此功能。这些选项以 `JSON` 文档形式添加。例如，要为 `util.dumpInstance()` 调用提供\
  \ `ocimds` 和 `dryRun` 选项，你可以使用以下命令：\n\n```javascript\nutil.dumpInstance(\".\\test\"\
  ,{ocimds:true,dryRun:true});\n```\n\n此选项指示 `MySQL Shell` 转储工具对你的数据库运行兼容性检查。如果发现任何无法自动修复的问题，你将看到一份详细报告，其中包含如何修复这些问题的策略和示例。\n\
  \n**提示**\n\n强烈建议在第一次使用 `MySQL Shell` 中的转储工具时使用 `ocimds:true` 和 `dryRun:true` 选项。这将让你有机会在开始迁移前查看并修复任何潜在问题。\n\
  \n要在转储工具中使用自动纠正功能，你必须在调用该方法时，通过 `compatibility=<列表>` 选项提供一个以逗号分隔的列表，其中包含以下一个或多个兼容性检查覆盖项（作为字符串输入）。例如，`util.dumpInstance(...,\
  \ compatibility:[\"force_innodb\", \"strip_definers\"], ...)`：\n\n*   `force_innodb`：修改\
  \ `ENGINE=` 子句以使用 `INNODB`。这确保所有表在转储时，其 `CREATE TABLE` 语句都使用 `InnoDB` 存储引擎。`MDS`\
  \ 仅支持 `InnoDB` 存储引擎。\n*   `strip_definers`：从视图、例程、事件和触发器中移除 `DEFINER=<账户>` 子句。\n\
  *   `strip_restricted_grants`：从 `GRANT` 语句中移除那些 `MDS` 不使用的权限。这些权限包括 `RELOAD`、`FILE`、`SUPER`、`BINLOG_ADMIN`\
  \ 和 `SET_USER_ID`。\n*   `skip_invalid_accounts`：跳过任何没有密码的用户账户。\n*   `strip_tablespaces`：从\
  \ `CREATE TABLE` 语句中移除 `TABLESPACE=<>` 选项。\n*   `create_invisible_pks`：为没有主键的表添加主键。`MDS`\
  \ 要求主键以实现高可用性。\n*   `ignore_missing_pks`：允许没有主键的表。仅当你不打算为 `数据库系统` 使用高可用性功能时才使用此选项。\n\
  \n**提示**\n\n有关这些选项和兼容性检查的更多信息，请参见 [`https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-utilities-dump-instance-schema.xhtml`](https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-utilities-dump-instance-schema.xhtml)。\n\
  \n让我们看一个使用兼容性功能的例子。\n\n在这个例子中，我们在本地 `PC` 上运行着一个 `MySQL` 服务器，版本为 `8.0.23`。服务器上有几个数据库，其中一些是示例数据库，如代码清单\
  \ 7-1 所示。\n\n```sql\nMySQL  localhost:33060+ ssl  SQL > SHOW DATABASES;\n+--------------------+\n\
  | Database           |\n+--------------------+\n| animals            |\n| contact_list1\
  \      |\n| contact_list2      |\n| contact_list3      |\n| greenhouse         |\n\
  | information_schema |\n| library_v1         |\n| library_v2         |\n| library_v3\
  \         |\n| mysql              |\n| performance_schema |\n| plant_monitoring\
  \   |\n| sakila             |\n| sys                |\n| test               |\n\
  | world              |\n| world_x            |\n+--------------------+\n```\n*清单\
  \ 7-1 示例：本地服务器数据库*\n\n注意，`sakila`、`world` 和 `world_x` 是来自 `Oracle` 的示例数据库。\n\n要运行转储工具的试运行（dry\
  \ run）并执行兼容性检查，我们使用以下命令。注意我们必须切换到 `JavaScript` 模式才能使用该命令。此外，位置或目标路径是必需的，但我们将使用名为\
  \ `test` 的本地子文件夹（由于是试运行，不会创建任何文件）：\n\n\n\n### 检查兼容性问题（发现）\n\n```\nutil.dumpInstance(\"\
  .\\test\",{ocimds:true,dryRun:true})\n```\n\n运行此命令后，我们将看到一个所有兼容性问题的列表。清单 7-2 展示了你可能会看到的一些错误和警告类型的摘录。\n\
  \n```\ndryRun enabled, no locks will be acquired, and no files will be created.\n\
  Acquiring global read lock\nGlobal read lock acquired\nInitializing - done\n13 out\
  \ of 17 schemas will be dumped and within them 43 tables, 8 views, 10 routines,\
  \ 6 triggers.\n4 out of 7 users will be dumped.\nGathering information - done\n\
  All transactions have been started\nLocking instance for backup\nGlobal read lock\
  \ has been released\nChecking for compatibility with MySQL Database Service 8.0.28\n\
  NOTE: Database test had unsupported ENCRYPTION option commented out\nNOTE: Database\
  \ world_x had unsupported ENCRYPTION option commented out\nNOTE: Database library_v3\
  \ had unsupported ENCRYPTION option commented out\nNOTE: Database library_v2 had\
  \ unsupported ENCRYPTION option commented out\n...\nNOTE: Database world had unsupported\
  \ ENCRYPTION option commented out\nNOTE: Database contact_list2 had unsupported\
  \ ENCRYPTION option commented out\nNOTE: Database plant_monitoring had unsupported\
  \ ENCRYPTION option commented out\nNOTE: Database library_v1 had unsupported ENCRYPTION\
  \ option commented out\n...\nNOTE: Database contact_list1 had unsupported ENCRYPTION\
  \ option commented out\nNOTE: Database greenhouse had unsupported ENCRYPTION option\
  \ commented out\nNOTE: Database contact_list3 had unsupported ENCRYPTION option\
  \ commented out\nNOTE: Database animals had unsupported ENCRYPTION option commented\
  \ out\nERROR: Table 'library_v1'.'books_authors' does not have a Primary Key, which\
  \ is required for High Availability in MDS\n...\nERROR: View animals.num_pets -\
  \ definition does not use SQL SECURITY INVOKER characteristic, which is required\
  \ (fix this with 'strip_definers' compatibility option)\nERROR: One or more tables\
  \ without Primary Keys were found.\nMySQL Database Service High Availability (MDS\
  \ HA) requires Primary Keys to be present in all tables.\nTo continue with the dump\
  \ you must do one of the following:\n* Create PRIMARY keys in all tables before\
  \ dumping them.\nMySQL 8.0.23 supports the creation of invisible columns to allow\
  \ creating Primary Key columns with no impact to applications. For more details,\
  \ see https://dev.mysql.com/doc/refman/en/invisible-columns.xhtml.\nThis is considered\
  \ a best practice for both performance and usability and will work seamlessly with\
  \ MDS.\n* Add the \"create_invisible_pks\" to the \"compatibility\" option.\nThe\
  \ dump will proceed and loader will automatically add Primary Keys to tables that\
  \ don't have them when loading into MDS.\nThis will make it possible to enable HA\
  \ in MDS without application impact.\nHowever, Inbound Replication into an MDS HA\
  \ instance (at the time of the release of MySQL Shell 8.0.24) will still not be\
  \ possible.\n* Add the \"ignore_missing_pks\" to the \"compatibility\" option.\n\
  This will disable this check and the dump will be produced normally, Primary Keys\
  \ will not be added automatically.\nIt will not be possible to load the dump in\
  \ an HA enabled MDS instance.\nCompatibility issues with MySQL Database Service\
  \ 8.0.28 were found. Please use the 'compatibility' option to apply compatibility\
  \ adaptations to the dumped DDL.\nValidating MDS compatibility - done\nUtil.dumpInstance:\
  \ Compatibility issues were found (RuntimeError)\nListing 7-2\nChecking for Compatibility\
  \ (Issues Found)\n```\n\n我们在这里看到了一些错误。其中大多数与不使用 `SECURITY INVOKER` 特性的对象有关。报告告诉我们要使用\
  \ `strip_definers` 兼容性选项。我们还看到了缺少主键的问题，但由于我们不会使用高可用性功能，所以这不是问题。为此，我们使用 `ignore_missing_pks`\
  \ 兼容性选项。其他被指出的问题包括注释掉的加密子句，这可以在迁移过程中修复。\n\n如果我们再次运行命令，但这次按照建议提供兼容性选项，使用以下命令（为便于阅读进行了格式化），我们将得到一个短得多的报告。我们还使用了\
  \ `strip_restricted_grants` 兼容性选项来修复具有不兼容权限的用户账户（清单中未显示）：\n\n```\nutil.dumpInstance(\"\
  .\\test\",\n{\nocimds:true,\ndryRun:true,\ncompatibility:[\n\"strip_definers\",\n\
  \"ignore_missing_pks\",\n\"strip_restricted_grants\"\n]\n}\n)\n```\n\n一旦我们使用这个新命令，我们将得到一个更干净的报告，如清单\
  \ 7-3 所示。\n\n```\ndryRun enabled, no locks will be acquired, and no files will be\
  \ created.\nAcquiring global read lock\nGlobal read lock acquired\nInitializing\
  \ - done\n13 out of 17 schemas will be dumped and within them 43 tables, 8 views,\
  \ 10 routines, 6 triggers.\n4 out of 7 users will be dumped.\nGathering information\
  \ - done\nAll transactions have been started\nLocking instance for backup\nGlobal\
  \ read lock has been released\nChecking for compatibility with MySQL Database Service\
  \ 8.0.28\n...\nNOTE: One or more tables without Primary Keys were found.\nThis issue\
  \ is ignored.\nThis dump cannot be loaded into an MySQL Database Service instance\
  \ with High Availability.\nCompatibility issues with MySQL Database Service 8.0.28\
  \ were found and repaired. Please review the changes made before loading them.\n\
  Validating MDS compatibility - done\nWriting global DDL files\nWriting users DDL\n\
  Writing DDL - done\nStarting data dump\n0% (0 rows / ~83 rows), 0.00 rows/s, 0.00\
  \ B/s uncompressed, 0.00 B/s compressed\nListing 7-3\nChecking for Compatibility\
  \ (No Issues Found)\n```\n\n在这里，我们看到一个所有关键兼容性问题都已解决的报告。然后你可以继续进行并删除 `dryRun:true`\
  \ 选项。\n\n### 较旧的 MySQL 版本\n\n还有一个兼容性问题需要考虑：MySQL 版本。迁移支持的最低版本是 MySQL 5.7.9。但是，如果你的版本比\
  \ MDS 中当前提供的版本（目前是 8.0.29）更旧，你应该考虑运行 MySQL Shell 升级检查器实用程序，以查看迁移潜在问题的报告。有关此实用程序的更多信息，请参阅\
  \ MySQL Shell 用户指南 – 升级检查器实用程序 ([`https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-utilities-upgrade.xhtml`](https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-utilities-upgrade.xhtml))。\n\
  \n现在我们已经了解了数据迁移过程的一些知识，我们可以看到这些方法的示例来学习如何使用它们。在以下部分中，我们将看到通过首先将数据从本地 MySQL 服务器迁移到\
  \ DB System，然后重新审视将数据从 DB System 迁移到本地 MySQL 服务器的过程，来实际操作导出和导入的示例。正如你将看到的，每个过程都需要使用导出和导入机制，我们将看到完成该过程的各种方式。这为你提供了将数据导入\
  \ MDS 的选项，你可以根据需要进行调整。\n\n如果你想跟随下一部分的示例进行操作，你应该准备你的本地 MySQL 服务器只包含 `sakila` 和 `world`\
  \ 数据库。如果你包含其他数据库，你可能需要调整所示的命令。你可以在 [`https://dev.mysql.com/doc/index-other.xhtml`](https://dev.mysql.com/doc/index-other.xhtml)\
  \ 的 *示例数据库* 标题下找到这些示例数据库及其安装方法。\n\n### 将数据迁移到 MDS\n\n在将数据迁移到 MDS 时，我们必须选择三种移动导出数据到\
  \ MDS 的方法之一。回想一下，这些方法包括使用 ObjectStore 存储桶、将导出的数据上传到中间的 Compute 实例，以及通过 Bastion 网关将导出的数据直接上传到我们的\
  \ DB System。本节演示了使用每种机制将数据迁移到 MDS。正如你将看到的，所有方法都使用 MySQL Shell 来导出和导入数据。\n\n\n\n\
  ### 使用对象存储桶\n\n第一种从本地 MySQL 服务器导出数据的方法是使用对象存储作为导出数据的中间存储。我们将使用本地 MySQL 服务器上的 MySQL\
  \ Shell 创建数据导出，将其放入对象存储，然后再次使用 MySQL Shell 从我们的 MDS DB 系统访问该数据进行导入。\n\n为了使用对象存储桶选项来上传导出的数据，您必须先配置您的\
  \ PC 以允许使用 OCI CLI。这是因为该机制和自动化过程将需要使用您的安全凭据。我们需要配置系统以允许自动访问您 OCI 租户中的对象。然而，您应考虑将\
  \ OCI CLI 访问凭据存储在 PC 上的潜在安全影响。您只需设置一次 PC，并且除非您的 SSH 密钥发生变化，否则无需更改配置。\n\n**注意**\n\
  \n一旦您将 PC 配置为自动访问租户中的某些对象，您应确保 PC 的安全性足够，以防止未经授权的访问来保护您的 OCI 凭据。\n\n#### 为 OCI CLI\
  \ 访问配置您的 PC\n\n您需要配置 PC 两件事以通过 API 访问 OCI 对象：(1) 您需要一个 SSH 密钥对，并将公钥上传到您的 OCI 账户，以及\
  \ (2) 您需要创建一个包含您账户信息的特殊 OCI 配置文件。如果您已有创建好的 SSH 密钥对，可以使用它，但下面演示了如何创建 SSH 密钥对并上传到您的\
  \ OCI 账户。\n\n**提示**\n\n以下示例展示了如何在 Windows 上生成 SSH 密钥对。如果您使用 Mac 或 Linux，请参阅 `https://docs.oracle.com/en-us/iaas/Content/API/Concepts/apisigningkey.htm#Required_Keys_and_OCIDs`\
  \ 以获取特定于平台的生成密钥命令示例。\n\n首先，我们需要创建一个 SSH 密钥对，但我们会将密钥放在用户账户的一个特殊文件夹中。打开 Windows PowerShell（或终端），在您的用户目录中创建一个名为\
  \ `.oci` 的文件夹并切换到该目录，如下所示：\n\n```\nPS C:\\Users\\cbell> mkdir %HOMEDRIVE%%HOMEPATH%\\\
  .oci\nPS C:\\Users\\cbell> cd %HOMEDRIVE%%HOMEPATH%\\.oci\nPS C:\\Users\\cbell\\\
  .oci>\n```\n\n接下来，我们将生成 SSH 密钥对，从私钥开始，然后生成公钥。请注意，系统会要求您提供密钥密码。请务必选择一个与您的 MySQL 管理密码不同并且您能记住的密码，因为您需要使用它来访问密钥。以下命令展示了如何创建密钥。命令以粗体显示：\n\
  \n```\nPS C:\\Users\\cbell\\.oci> openssl genrsa -out oci_api_key.pem -aes128 -passout\
  \ stdin 2048\nGenerating RSA private key, 2048 bit long modulus (2 primes)\n........................+++++\n\
  ....+++++\ne is 65537 (0x010001)\nEnter pass phrase for oci_api_key.pem:\nVerifying\
  \ - Enter pass phrase for oci_api_key.pem:\nPS C:\\Users\\cbell\\.oci> openssl rsa\
  \ -pubout -in oci_api_key.pem -out oci_api_key_public.pem\nEnter pass phrase for\
  \ oci_api_key.pem:\nwriting RSA key\n```\n\n**注意**\n\nMac 和 Linux 系统要求密钥具有一组特殊的权限。您需要运行命令\
  \ `chmod go-rwx ~/.oci/oci_api_key.pem` 来为这些平台正确设置权限。\n\n我们将把公钥上传到我们的 OCI 账户。我们可以通过上传公钥或粘贴密钥文本来完成。在此示例中，我们将粘贴文本，以便使用\
  \ `type` 命令显示密钥内容，如下所示。注意，输出内容出于安全原因已被遮盖。您自己的密钥看起来类似但数值不同：\n\n```\nPS C:\\Users\\\
  cbell\\.oci> type oci_api_key_public.pem\n-----BEGIN PUBLIC KEY-----\n12039812039u10293012983912839128309128309812039810-923801928309182\n\
  12039812039u10293012983912839128309128309812039810-923801928309182\n12039812039u10293012983912839128309128309812039810-923801928309182\n\
  12039812039u10293012983912839128309128309812039810-923801928309182\n12039812039u10293012983912839128309128309812039810-923801928309182\n\
  12039812039u10293012983912839128309128309812039810-923801928309182\nUQIDAQAB\n-----END\
  \ PUBLIC KEY-----\n```\n\n现在我们已经生成了密钥，可以将密钥添加到我们的 OCI 账户。在 OCI 控制台中，通过单击右上角的您的用户图标打开您的账户设置，然后选择\
  \ *我的配置文件*。接着，在资源列表中，选择 API 密钥，如图 7-1 所示。\n\n![](img/527055_1_En_7_Fig1_HTML.png)\n\
  \n左侧是包含资源选项卡的窗口，其中选择了 API 密钥。顶部有“添加 API 密钥”按钮，并且存在指纹和创建日期的列。\n\n图 7-1\n\nAPI 密钥（我的配置文件）\n\
  \n\n\n接下来，如图 7-1 所示，单击 `添加 API 密钥` 按钮以添加一个新密钥。在下一个屏幕中，选择 `粘贴公钥` 选项，然后复制 `type` 命令显示的文本（包括标有\
  \ `--------…---------` 的部分），将其粘贴到文本框中，然后单击 `添加` 按钮。\n\n![](img/527055_1_En_7_Fig2_HTML.png)\n\
  \n一个用于添加 API 密钥的对话框显示了上传或粘贴公钥的选项。选择“粘贴公钥”，它会在空白区域显示公钥。\n\n图 7-2\n\n添加 API 密钥（粘贴选项）\n\
  \n单击“添加”按钮后，您将看到一个对话框，其中显示您需要在 PC 上创建的配置文件。图 7-3 显示了一个输出示例，其中某些参数出于安全原因已被屏蔽。\n\n\
  ![](img/527055_1_En_7_Fig3_HTML.png)\n\n一个用于配置文件预览的对话框显示了选定的 API 密钥指纹。中间的空白区域显示了编码的程序。底部有“复制”按钮和“关闭”按钮。\n\
  \n图 7-3\n\nOCI 配置文件内容示例（添加 API 密钥）\n\n请注意，API 密钥显示时附带一个指纹，这是该密钥特有的特殊哈希值。我们将在下一步创建的配置文件中使用此指纹。\n\
  \n事实上，我们将使用 `复制` 链接来复制示例配置文件的内容，并将其粘贴到名为 `config` 的文件中，该文件将放置在我们之前创建的 `.oci` 文件夹中。使用您喜欢的文本编辑器打开一个新文件，将文本粘贴到文件中并将其保存为\
  \ `HOMEDRIVE%%HOMEPATH%\\.oci`。完成后，单击 `关闭` 按钮。您现在应该在列表中看到您的 API 密钥指纹，如图 7-4 所示（出于安全原因已模糊处理）。请注意，显示的密钥可能有所不同。\n\
  \n![](img/527055_1_En_7_Fig4_HTML.png)\n\n一个表格显示了 API 密钥，左上角是“添加 API 密钥”。每行有一个复选框，列标题是“指纹”和“创建时间”。有一个指纹于\
  \ 2022 年 8 月 16 日添加。\n\n图 7-4\n\nAPI 密钥列表（我的个人资料）\n\n好了，我们快完成了。还需要向配置文件添加一项内容。我们必须设置\
  \ SSH 密钥的密钥位置（路径）。打开配置文件 (`HOMEDRIVE%%HOMEPATH%\\.oci`)，注意其中有一行带有 `TODO` 注释，如下所示。在这里，我们将\
  \ `<>` 替换为 SSH 密钥所在路径：\n\n```\nkey_file= # TODO\n```\n\n在文件底部，使用您 PC 上 SSH 密钥的实际路径替换所示路径。请务必使用实际路径：\n\
