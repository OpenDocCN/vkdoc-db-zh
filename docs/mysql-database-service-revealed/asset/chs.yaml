  \ 22 ocid1.bastionsession.MASKED...\n```\n\n在 Mac 或 Linux 上，你可以使用 `&` 指令在后台执行这些命令。在\
  \ Windows PC 上，你需要在 PowerShell 中使用不同的机制。你可以使用带有 `-ScriptBlock` 选项的 `Start-Job` 命令，如下所示：\n\
  \n```\nStart-Job -ScriptBlock {ssh -i  -N -L 3306:10.0.1.226:3306 -p 22 ocid1.bastion...}\n\
  Start-Job -ScriptBlock {ssh -i  -N -L 33060:10.0.1.226:33060 -p 22 ocid1.bastion...}\n\
  ```\n\n好的，现在我们的 Bastion 设置好了，可以导入数据了。\n\n#### 在 DB 系统上导入数据\n\n最后一步是再次登录到你的计算实例，启动\
