  \n}\n],\n\"status\": \"SUCCEEDED\",\n\"time-accepted\": \"2022-08-22T01:09:46.862000+00:00\"\
  ,\n\"time-finished\": \"2022-08-22T01:13:56.223000+00:00\",\n\"time-started\": \"\
  2022-08-22T01:09:56.948000+00:00\"\n}\n}\n```\n清单 9-8 获取 DB 系统信息（已停止）\n\n与启动/停止类似，你也可以删除\
  \ DB 系统以及列出某个容器中的 DB 系统。对于 DB 系统，还有更多可用的命令。请参阅以下“更多信息”部分中的链接，以了解更多关于这些命令的信息。\n\n\
  好的，让我们再看一个示例，但这次我们将使用一个复杂的操作：创建一个新的 DB 系统。\n\n\n### 创建数据库系统\n\n创建数据库系统需要一组更复杂的参数和选项。在这种情况下，我们至少需要提供\
  \ compartment OCID、subnet OCID、名称（注意不是 OCIDs）以及可用性域名。我们将添加更多可选参数，但让我们先假设我们不知道这些对象的\
