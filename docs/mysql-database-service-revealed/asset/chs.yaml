  % java MySQLTest\nSuccess!\n```\n\n一旦确认 Connector/J 已安装并正常工作，你就可以开始接下来的示例了。\n\n\
  ## 示例 1：连接到 MySQL\n\n让我们从一个简单的例子开始，连接到 MySQL 服务器并获取数据库列表。我们将此示例命名为 `MySQLConnect.java`。\n\
  \n代码逻辑与上面的 `MySQLTest.java` 相同，区别在于这次我们将建立连接、请求一个 `Statement` 类并在一个代码块中执行查询。然后，我们遍历返回的行并打印结果集的第一列。清单\
  \ 3-13 展示了此示例的完整代码。正如你将看到的，它非常易于理解：\n\n```\n//\n//  MySQL Database Service\n//\n\
  // Chapter 03 - MySQL Connect\n//\n// This example attempts to connect to a MySQL\
  \ server, execute a query\n// then print the first column of the result set.\n//\n\
  // Dr. Charles Bell\n//\n// Imports\nimport java.sql.Connection;\nimport java.sql.DriverManager;\n\
  import java.sql.ResultSet;\nimport java.sql.SQLException;\nimport java.sql.Statement;\n\
  import java.util.logging.Level;\nimport java.util.logging.Logger;\npublic class\
  \ MySQLConnect {\n    public static void main(String[] args) {\n        // Connection\
  \ parameters\n        String url = \"jdbc:mysql://localhost:3306/\"\n          \
  \  + \"plant_monitoring?useSSL=false\";\n        String user = \"root\";\n     \
  \   String password = \"SECRET\";\n        String query = \"SHOW DATABASES\";\n\
  \        // Attempt the connection and execute a query then print the results\n\
  \        try (Connection con = DriverManager.getConnection(url, user,\n        \
  \    password);\n            Statement st = con.createStatement();\n           \
  \ ResultSet rs = st.executeQuery(query)) {\n            while (rs.next()) {\n  \
  \              System.out.println(rs.getString(1));\n            }\n        } catch\
  \ (SQLException ex) {\n            Logger lgr = Logger.getLogger(MySQLConnect.class.getName());\n\
  \            lgr.log(Level.SEVERE, ex.getMessage(), ex);\n        }\n    }\n}\n\
  ```\n清单 3-13 MySQL 连接与查询示例\n\n输入代码后，你可以编译并执行它以查看结果，如下所示：\n\n**提示**\n确保你的 MySQL 服务器正在运行，并且你在连接参数中提供了正确的密码和主机名。\n\
  \n```\n% javac MySQLConnect.java\n% java MySQLConnect\nanimals\ngreenhouse\ninformation_schema\n\
  mysql\nperformance_schema\nplant_monitoring\nsakila\nsys\nworld\nworld_x\n```\n\n\
  根据你安装或创建的示例数据库或其他数据库，你的结果可能不同，但至少应该看到 `plant_monitoring`、`mysql`、`information_schema`\
  \ 和 `performance_schema`。\n\n如果遇到如下错误，请务必检查你的连接参数，确保使用了正确的主机名（或 IP 地址）、端口、用户和密码。\n\
  \n```\nError: 1045 (28000): Access denied for user 'root'@'localhost' (using password:\
  \ YES)\n```\n\n现在让我们看看如何插入数据。\n\n## 示例 2：插入数据\n\n现在让我们看看如何向表中插入一些数据。我们将此示例代码命名为\
  \ `mysql_insert.py`。\n\n在这种情况下，我们只是想从文件中读取数据并将其插入表中。我们将使用与之前示例相同的代码连接到服务器并执行查询。不同之处在于，我们将使用文件以逗号分隔值格式（`.csv`）读取样本数据。这是一种在各种应用程序中常用的格式。\n\
  \n对于文件中的每一行，我们解码字段，然后使用列中的数据构建一个 `INSERT` 命令。我们将再次使用游标类的 `execute()` 方法来执行插入数据的查询。由于没有结果，我们不获取任何内容。但是，在完成行插入后，我们必须调用游标类的\
  \ `commit()` 方法来提交更改。清单 3-14 展示了此示例的完整代码。花点时间阅读一下以明确其逻辑。\n\n```\n//\n//  MySQL Database\
  \ Service\n//\n// Chapter 03 - MySQL Insert\n//\n// This example attempts to connect\
  \ to a MySQL server, read rows from a file\n// and insert data into a table.\n//\n\
  // Dr. Charles Bell\n//\n// Imports\nimport java.io.File;\nimport java.sql.Connection;\n\
  import java.sql.DriverManager;\nimport java.sql.SQLException;\nimport java.sql.Statement;\n\
  import java.util.logging.Level;\nimport java.util.logging.Logger;\nimport java.util.Scanner;\n\
  public class MySQLInsert {\n    public static void main(String[] args) {\n     \
  \   String url = \"jdbc:mysql://localhost:3306/plant_monitoring?useSSL=false\";\n\
  \        String user = \"root\";\n        String password = \"SECRET\";\n      \
  \  try (Connection con = DriverManager.getConnection(url, user, password);\n   \
  \         Statement st = con.createStatement()) {\n            // Open the file\
  \ and read all rows inserting them.\n            try {\n                File myObj\
  \ = new File(\"plants_data.txt\");\n                Scanner myReader = new Scanner(myObj);\n\
  \                while (myReader.hasNextLine()) {\n                    String data\
  \ = myReader.nextLine();\n                    String cols[] = data.split(\",\");\n\
  \                    String sql = \"INSERT INTO plant_monitoring.plants (name, \"\
  \n                        + \"location, climate) VALUES ('\" + cols[0]\n       \
  \                 + \"','\" + cols[1] + \"',\" + cols[2] + \");\";\n           \
  \         System.out.println(sql);\n                    st.executeUpdate(sql);\n\
  \                }\n                myReader.close();\n            } catch (Exception\
  \ e) {\n                System.out.println(\"An error occurred.\");\n          \
  \      e.printStackTrace();\n            }\n        } catch (SQLException ex) {\n\
  \            Logger lgr = Logger.getLogger(MySQLInsert.class.getName());\n     \
  \       lgr.log(Level.SEVERE, ex.getMessage(), ex);\n        }\n    }\n}\n```\n\
