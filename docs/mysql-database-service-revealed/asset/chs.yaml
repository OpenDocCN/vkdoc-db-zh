  \ 查询。\n\n实验完成后，请务必删除您在 OCI 中创建但不再需要的任何数据库系统、堡垒机、计算实例或其他资源。请记住，如果您不想删除这些资源，可以通过停止您的数据库系统和计算实例来降低成本。\n\
  \n### 养成良好的云资源管理习惯\n\n如果您已完成对 DB 系统的实验，并希望稍后继续探索其功能，请务必在注销前停止 DB 系统，以最大限度地减少您账户的费用。如果您将暂时搁置本书中的教程，您可能需要考虑删除\
  \ DB 系统和其他资源（如您创建的堡垒机服务），以进一步减少账户费用。请记住，您留下的任何正在运行的可计费资源都将产生费用。如果您使用的是试用账户，这可能不是问题，但当您拥有大量\
  \ DB 系统和其他 OCI 资源后，让资源持续运行久而久之会产生不小的开销。通过养成良好的云计算资源管理习惯，避免收到意外的月度账单。\n\n## 总结\n\n\
  MySQL 数据库服务对于希望在云端利用世界上最流行的开源数据库系统——MySQL——的强大功能的组织来说，是一个全新的机遇。这不仅是可行的，而且 Oracle\
  \ 通过其 Oracle Cloud Infrastructure (OCI) 让创建和管理多个 MySQL 数据库服务 DB 系统变得轻而易举。\n\n尽管\
  \ MySQL 数据库服务下还有其他可用资源，但 DB 系统代表了托管需要数据库系统的应用程序的任何基础设施的核心组件。最好的消息是，DB 系统是一个功能齐全、托管式的\
  \ MySQL 实例，您可以根据业务需求进行定制。\n\n从 CPU 性能和内存（通过规格形状）到数据存储的大小，您可以根据即时需求配置一系列 DB 系统。而且您无需花费辛苦赚来的资金购买硬件和雇佣人力来设置、配置和调优这些服务器——所有这些都在几分钟内为您完成！显然，DB\
  \ 系统是世界领先的开源数据库系统的下一代演进。\n\n在本章中，我们浏览了 MySQL 数据库服务，重点介绍了 DB 系统。我们学习了如何创建 DB 系统、管理它，以及了解更多可用于与\
  \ DB 系统协作的功能。我们甚至学习了如何从个人电脑连接到 DB 系统。\n\n在下一章中，我们将学习更多关于 MDS 针对 DB 系统的备份和恢复功能。\n\
  \n脚注 1   2\n\n# 5. 备份与恢复\n\n既然我们已经了解了 MySQL 数据库服务（MDS）是什么，以及如何在 MDS 中创建和连接到 DB 系统，我们差不多可以开始在项目和应用程序中使用它们了。然而，在规划与\
  \ MDS 集成之前，有一个重要的功能必须考虑，那就是如何备份和恢复我们的数据。\n\n专业的系统和数据库管理员都知道，在将任何重要数据放入系统之前，必须有一个良好的恢复计划，这对于项目和组织的长期稳定至关重要。如果出现问题，您必须能够将数据恢复到某个合理的点，以便能够从故障中恢复并重建数据。对于许多系统来说，一个简单的备份和恢复机制就是所需的全部。\n\
  \n在本章中，我们将学习 MDS 中可供您用来保护数据的备份和恢复选项。然而，在我们深入探讨 MDS 中的备份和恢复操作之前，让我们先了解为什么为 MDS 中的数据制定恢复计划很重要。\n\
  \n\n\n## 可能出现什么问题？\n\n有人可能认为云服务万无一失，永远不会离线。遗憾的是，这种想法是个误区。许多细微因素都可能影响您访问数据的能力。可能是您的互联网服务提供商出现故障，您的本地硬件发生故障，当然，云服务本身也会发生故障。幸运的是，这些情况很少见，并且已经采取了许多步骤和周密的计划，以确保及早检测故障，并通过冗余措施以及快速行动恢复的人员来减轻故障影响。\n\
  \n但我们不要忘记那个可能造成最大破坏的因素——人为错误。无论是意外删除，还是由于对数据执行了规划不当、执行不力的更新所带来的后果，人为错误都是我们必须防范的。因此，备份与恢复在云端与在本地环境同样重要，并将持续如此。此外，组织应将其备份和恢复设施纳入\
  \ MDS 中，以取代当前可能用于本地 MySQL 备份与恢复的操作。\n\n例如，如果您使用诸如 `MySQL Enterprise Backup` (`MEB`)\
  \ 之类的外部应用程序来备份本地 MySQL 服务器，您将用 `OCI` 中的 `DB System` 备份功能来替代它。虽然 `DB System` 备份不提供与\
  \ `MEB` 相同的选项，但它仍可在您的业务连续性计划中取代 `MEB` 的位置。而且，最重要的是，它们是物理备份，因此您可以确保数据能够快速高效地备份和恢复，而不会遇到逻辑备份所带来的空间问题或其他问题。\n\
  \n同样，您的恢复计划也可以用 `DB Systems` 中的恢复功能来替代。不过，在恢复方面，这更多是一种差异。与 `MEB`（物理备份）或基于 SQL 的逻辑备份选项（如\
  \ `mysqlpump` 和 `mysqldump`）等应用程序不同，`DB System` 恢复用于利用恢复的数据创建一个新的 `DB System`。更具体地说，您无法将数据恢复到一个现有的\
  \ `DB System` 上。原因有很多，但如果您仔细想想，恢复到一个具有相同数据和配置的新 `DB System` 意味着您无需销毁原始系统即可回滚数据。您可以保留这两个\
  \ `DB System`，以便进行任何您想要的恢复分析。\n\n提示\n有关 `mysqlpump` 的更多信息，请参见 [`https://dev.mysql.com/doc/refman/8.0/en/mysqlpump.xhtml`](https://dev.mysql.com/doc/refman/8.0/en/mysqlpump.xhtml)；有关\
  \ `mysqldump` 的更多信息，请参见 [`https://dev.mysql.com/doc/refman/8.0/en/mysqldump.xhtml`](https://dev.mysql.com/doc/refman/8.0/en/mysqldump.xhtml)。\n\
  \n因此，尽管缺乏选择性备份、选择性恢复以及恢复到现有 `DB System` 的功能，`DB System` 的备份和恢复特性依然强大、高效且可靠。正如您将看到的，自动备份功能使保护数据变得毫不费力。\n\
  \n既然我们已经了解了备份与恢复在 MDS 中的重要性和作用，让我们更详细地看看这些特性。\n\n注意\n如果您想跟随演示操作，请确保已创建并运行一个 `DB\
  \ System`，其参数与第 2 章讨论的参数类似。\n\n## 备份\n\n为了更好地理解 `DB System` 备份，让我们从高层次角度考虑 `DB System`\
  \ 的配置。`DB System` 由一个计算实例、一个安装并运行着操作系统和 MySQL 的启动卷、用于数据的块存储设备（称为数据驱动器或简称为数据）以及一组用于运行\
  \ MySQL 的配置参数组成。\n\n当启动备份时，会调用数据驱动器的块卷服务来创建块卷（数据）的副本。块卷服务实现了一种快速复制，采用一种逻辑卷管理器（`lvm`）的形式来对数据进行快照。因此，无需产生某些备份应用程序和机制必须采用的任何形式的等待、阻塞或类似中断。\n\
  \n然后，块卷备份与配置参数副本以及一些用于重建 `DB System` 的附加元数据相结合。计算实例、启动卷等不会被复制或放入备份中。相反，`DB System`\
  \ 备份包含了在备份时刻重建 `DB System` 和您的数据所需的一切。\n\n在本节中，我们将学习所有关于 `DB System` 备份的基本操作，包括自动和手动备份。您将看到，设置备份有很多可微调的选项。\n\
  \n### 备份类型\n\n`DB Systems` 中的备份可以设置为按预设时间间隔自动发生，可以手动随时创建备份，可以创建最终备份，并且如果需要维护或纠正措施，`OCI`\
  \ 操作员可以为您创建备份。\n\n`DB Systems` 还支持完整备份和增量备份。完整备份是指备份备份时存在的所有数据。增量备份仅包含自上次完整备份以来的更改。通常，增量备份较小，因此可以更频繁地进行。例如，您可能希望采用这样的计划：在每天使用率低时运行一次完整备份，并在一天中定期进行增量备份。这样，您总是可以将数据恢复到增量备份时间窗口内的状态。\n\
  \n增量备份允许您更频繁地进行备份，因为它们通常占用更少的空间。这允许您进行一次完整备份，然后在一段时间内进行多次增量备份。如果需要恢复，您需要恢复最近的完整备份，然后恢复之后进行的所有增量备份。\n\
  \n例如，您可能希望采用这样的策略：在通常是在夜间使用率较低时进行一次完整备份，然后每隔几个小时进行一次增量备份。最佳实践建议根据您的数据恢复目标来调整频率。更具体地说，增量备份之间的时间间隔不应超过您的组织可以安全容忍的最大数据丢失量。这是因为自上次增量备份以来更改或添加的任何数据，在恢复完整备份及后续增量备份时都可能丢失。\n\
  \n另一个最佳实践是利用 MySQL 的一个特殊功能，即时间点恢复，它内置于 MDS 中。这允许您通过每五分钟对数据进行一次快照来设置自动化恢复。因此，最大数据丢失将不超过五分钟的时间段。我们将在第\
  \ 6 章中更详细地讨论时间点恢复以及如何利用它来改进数据恢复。\n\n让我们更详细地看看每种备份类型。\n\n## 手动备份\n\n手动备份是由您，即 `DB\
  \ System` 的所有者，通过云控制台或通过 `REST API` 调用创建的备份（有关 `REST API` 调用的更多信息见第 9 章）。手动备份的保留期可以设置为\
  \ 1 到 365 天。所有手动备份都是完整备份。\n\n您可能希望在以下情况之前创建手动备份：对数据进行重大更改、执行任何数据清理或转换脚本、导入大量数据，或者在业务的关键时刻之前，例如大型活动或新产品发布之前。\n\
  \n\n\n#### 自动备份\n\n您可以使用自动备份功能来选择备份数据库系统的时间。与手动备份不同，自动备份的保留期可设置为 1 到 35 天，默认为 7\
  \ 天。请注意，一旦设置了自动备份保留期，将无法更改，因此在设置自动备份时请根据需求仔细考虑。有趣的是，自动备份一旦配置，即使数据库系统处于非活动状态（例如已停止），也会对其进行备份。\n\
  \n最后，如果您删除了数据库系统，除非您更改了数据库系统中的删除计划，否则自动备份也会被一并删除。回想一下，删除计划可以在创建数据库系统时设置，也可以在之后更改。`删除计划`选项卡中的一项设置是保留自动备份。如果勾选此项，在删除数据库系统时，自动备份将不会被删除。\n\
  \n您可能希望设置自动备份，以便确保数据定期得到备份，而无需每天进行监控或管理。\n\n## 最终备份\n\n最终备份是一种特殊备份，可在删除数据库系统时触发。更具体地说，您可以为数据库系统设置删除计划，以便在删除之前执行最终备份。在这种情况下，系统会先执行备份，完成后才删除数据库系统。最终备份始终是完整备份，并且只能通过数据库系统的`删除计划`选项卡自动设置。\n\
  \n## 操作员备份\n\n这种备份形式是另一种特殊备份，可由 MDS 支持团队（常被称为操作员，因此得名）触发。通常，操作员在采取操作纠正问题或协助您解决数据库系统问题之前，会执行此类备份作为预防措施。此类备份始终是完整备份。\n\
  \n操作员备份会自动删除，不计入您的计费或服务限制。虽然您可以手动删除操作员备份，但不建议这样做，因为如果问题未得到解决，或者数据库系统无法完全恢复，您可能需要使用它。\n\
  \nMySQL 支持团队创建此备份以协助调查您服务中的潜在问题。这些备份会自动删除。您也可以手动删除这些备份，但不建议。这些备份不影响您的限制。\n\n###\
  \ 备份详情\n\n每当您访问数据库系统详情页面，并点击左侧`资源`菜单中的`备份`时，您都可以看到备份列表。随后，您将看到一个类似于图 5-1 的备份列表。\n\
  \n![](img/527055_1_En_5_Fig1_HTML.png)\n\n图 5-1 显示了一个名为“创建手动备份”的表格，包含以下列：名称、状态、创建类型、保留天数、大小和创建时间。\n\
  \n图 5-1\n\n数据库系统中的备份列表\n\n请注意，列表显示了名称、状态、备份（创建）类型、保留期、大小和创建日期。如果您点击每个备份右侧的上下文菜单，可以查看可对该备份执行的操作列表，如图\
  \ 5-2 所示。\n\n![](img/527055_1_En_5_Fig2_HTML.jpg)\n\n图 5-2 显示了一个包含以下选项的菜单：查看详情、恢复到新系统、编辑、复制\
  \ OCID、移动资源、添加标签、查看标签和删除。其中“查看详情”选项被选中。\n\n图 5-2\n\n上下文菜单（备份列表 - 数据库系统详情页面）\n\n\
  在这里，我们可以查看备份的详情、恢复到新的数据库系统、编辑备份（更改名称、描述和保留期）、复制其 OCID、将其移动到新位置、添加或查看标签，以及删除备份。\n\
  \n提示\n\n您可以通过使用云控制台主菜单，然后选择`数据库` | `备份`，来导航到所有备份的列表。您将能够对列表中的每个备份执行上述相同的操作。\n\n\
  让我们来看一下备份的详情页面。备份的详情页面与大多数 OCI 资源的详情页面类似，关键数据显示在中央，状态图标位于左侧，下方是带有各种列表选项卡的`资源`菜单。在这种情况下，备份在`资源`菜单中只有一个条目：`数据库系统`，它显示有关从中获取备份的数据库系统的信息。\n\
  \n图 5-3 显示了备份详情页面的顶部部分。\n\n![](img/527055_1_En_5_Fig3_HTML.png)\n\n图 5-3 显示了一个 OCI\
  \ 教程中的 MySQL 备份页面截图，包含备份信息和标签选项卡。还显示了资源、编辑、移动、添加标签和删除选项。左侧有一个带有“B”字样的矩形框。\n\n图 5-3\n\
  \n备份详情页面（顶部）\n\n请注意，左侧有图标。图标和状态的行为与其他 OCI 资源相同，在某些状态下会改变颜色，其中绿色始终代表`活动`状态。右侧是名称和一系列用于常见操作的按钮。这些操作包括：\n\
  \n*   `恢复到新数据库系统`：从备份创建一个新的数据库系统以恢复数据。\n*   `编辑`：用于更改备份元数据（名称、描述和保留期）。\n*   `移动资源`：允许您将资源移动到新位置（\
  \ compartment）。\n*   `添加标签`：用于添加用户定义的标签。\n*   `删除`：您可以删除备份。\n\n主要信息部分有两个选项卡：`备份信息`和`标签`。备份信息包括\
  \ OCID、描述、 compartment、MySQL 版本、形状、状态、备份类型、创建类型、大小和创建日期。标签是您或 OCI 系统为备份设置的那些标签。\n\
  \n表 5-1 更详细地列出了数据。\n\n表 5-1\n\n备份信息（备份详情页面）\n\n\n\n### 备份详情与管理\n\n#### 备份详情页面\n\n\
  备份详情页面的上半部分展示了备份的元数据信息，如下表所示。\n\n| 参数 | 描述 |\n| --- | --- |\n| *OCID* | 备份的 OCID（唯一标识符）。\
  \ |\n| *Description* | 创建备份时您提供的描述（对于手动备份），或是由 OCI 生成的描述。 |\n| *Compartment* | 创建备份所在的\
  \ compartment。您可以点击提供的链接查看关于该 compartment 的更多详细信息。 |\n| *MySQL Version* | 创建备份时，DB\
  \ 系统上运行的 MySQL 版本。如果您要还原一个旧备份，这可能是一个需要考虑的关键项目，因为当新的 MySQL 版本发布时，DB 系统会不断升级。 |\n\
  | *Shape* | DB 系统计算实例的形状。 |\n| *Retention Days* | 备份的保留期（天数）。 |\n| *State* | 备份的当前状态。\
  \ |\n| *Backup Type* | 所采取的备份类型：完全备份或增量备份。 |\n| *Creation Type* | 备份创建方法：手动或自动。\
  \ |\n| *Backup Size* | 备份大小（GB）。 |\n| *Total Storage Size* | 备份时的数据存储大小。 |\n| *Created*\
  \ | 备份创建的日期和时间。 |\n| *Last Updated* | 备份最后更新的日期和时间。 |\n\n`MySQL Version` 和 `Shape`\
  \ 是将备份还原到新 DB 系统时所需的两个关键组件。在这里，您可以一目了然地看到 DB 系统的一般配置。\n\n`图 5-4` 显示了备份详情页面的下半部分。\n\
  \n![](img/527055_1_En_5_Fig4_HTML.png)\n\n**图 5-4：备份详情页面（底部）**\n\n此处展示了关于 DB 系统的信息，包括其关于备份、高可用性、`HeatWave`、`OCID`、`Compartment`\
  \ 和创建日期的参数。`表 5-2` 更详细地展示了这些数据。\n\n**表 5-2：MySQL DB 系统（备份详情页面）**\n\n| 参数 | 描述 |\n\
  | --- | --- |\n| *Name* | DB 系统的名称。显示为链接，因此您可以导航到 DB 系统详细信息页面。 |\n| *Description*\
  \ | 创建 DB 系统时您提供的描述。 |\n| *State* | DB 系统的运行状态。 |\n| *Automatic Backups* | 自动备份状态：已启用或已禁用。\
  \ |\n| *High Availability* | 高可用性状态：已启用或已禁用。 |\n| *HeatWave Cluster* | HeatWave\
  \ 集群状态：已启用或已禁用。 |\n| *OCID* | DB 系统唯一的 OCID。提供了显示或复制 OCID 的链接。 |\n| *Compartment*\
  \ | DB 系统所在 compartment 的名称。 |\n| *Created* | DB 系统创建的日期和时间。 |\n| *Last Updated*\
  \ | DB 系统最后更新的日期和时间。 |\n\n#### 管理自动备份\n\n现在我们了解了备份类型以及每种备份可以看到的信息类型，让我们看看如何对 DB\
  \ 系统进行备份。我们将看到所有备份类型的示例。\n\n##### 启用或禁用自动备份\n\n回想一下，我们在 `第 4 章` 中创建 DB 系统时，并没有开启自动更新。幸运的是，我们可以随时打开（启用）或关闭（禁用）自动更新。\n\
  \n我们只需通过云控制台主导航菜单选择 `Databases` | `DB Systems` 来导航到 DB 系统，然后选择 DB 系统并查看其详细信息，或者使用右侧的上下文菜单选择\
  \ `View Details`。进入 DB 系统详细信息页面后，点击 `More Actions` 按钮并选择 `Edit Backup Plan`。\n\n\
  如果自动备份被禁用，您将看到一个用于启用的复选框。只需勾选 `Enable Automatic Backups` 复选框，然后将出现另外两个选项，如 `图 5-5`\
  \ 所示。\n\n![](img/527055_1_En_5_Fig5_HTML.png)\n\n**图 5-5：启用自动备份**\n\n您将被允许更改备份保留期（默认为\
  \ 7 天），并且可以更改自动备份的开始时间。您必须勾选 `Select Backup Window` 复选框才能启用开始时间窗口选择。开始窗口是自动备份可以发生的时间段。\n\
  \n当您点击 `Window Start Time` 框时，将出现一个下拉列表，允许您从预定义的选项列表中选择一个开始窗口。请注意时间是 `UTC` 时间，因此请务必修正任何时区差异。请注意，您的自动备份将被安排在指定开始时间后的\
  \ 30 分钟内开始。您还可以点击 `Show backup windows per region` 链接以查看特定于您区域的默认备份窗口。\n\n当您对选择满意后，点击\
  \ `Save Changes` 按钮以启用自动备份。这可能会暂时将 DB 系统的状态更改为 `UPDATING`，并将图标颜色更改为黄色。\n\n> **注意：**\
  \ 您也可以在 DB 系统列表中使用 DB 系统的上下文菜单来选择 `Edit Backup Plan`，以启用或禁用自动备份。\n\n要禁用自动备份，请使用\
  \ `More Actions` 按钮并选择 `Edit Backup Plan`。然后，只需取消勾选 `Enable Automatic Backups` 复选框，并点击\
  \ `Save Changes` 按钮即可禁用自动备份。这可能会暂时将 DB 系统的状态更改为 `UPDATING`，并将图标颜色更改为黄色。\n\n\n####\
  \ 创建手动备份\n\n您可以随时为数据库系统创建手动备份。请注意，手动备份可以是增量备份或完整备份，保留期限可设置为 1 到 365 天。手动备份包含您所有数据的副本。再次强调，在对数据进行任何重大更改（包括导入、重组、启动新应用等）之前，创建手动备份始终是一个好习惯。在这些操作前立即进行的备份，将允许您将数据恢复到一个“已知良好”的状态。\n\
  \n手动备份可在任何时间进行，但 MDS 正在升级数据库系统的维护周期期间除外。实际上，如果您尝试在不建议或不允许的时间创建备份，MDS 可能会向您发出警告。幸运的是，这些情况很少见，您不太可能遇到。\n\
  \n要创建手动备份，请使用云控制台并导航至您的数据库系统。您可以通过点击主菜单，选择`数据库`，然后选择`数据库系统`，再点击您的数据库系统名称以查看数据库系统详情页面。\n\
  \n进入数据库系统详情页面后，点击`资源`菜单中的`备份`条目，然后点击`创建手动备份`按钮，如图 5-6 所示。或者，您可以使用`更多操作`按钮并选择`创建手动备份`。此外，您也可以不导航至数据库系统详情页面，而是直接从数据库系统列表的右键菜单中选择`创建手动备份`。\n\
  \n![](img/527055_1_En_5_Fig6_HTML.png)\n\n*显示了一个标签为“创建手动备份”的页面。右上角显示“编辑备份计划”。出现一个标题为“备份计划”的对话框，带有一个警告标志，显示“自动备份已禁用”。*\n\
  \n**图 5-6：创建手动备份（数据库系统详情页面）**\n\n点击按钮或从右键菜单启动手动备份后，将打开一个对话框，提示您提供以下信息：\n\n*   `显示名称`：为备份命名。MDS\
  \ 会为您生成一个名称，但如果您希望快速找到它，或者想将名称与某个事件或项目关联起来，您应该提供一个名称。默认情况下，MDS 会包含数据库系统的名称以及备份的日期和时间。\n\
  *   （可选）`描述`：您可以为备份添加描述。这里可以包含您无法（或不应该）在名称中编码的相关信息^(¹⁰)，例如促使您创建备份的详细原因。\n*   `配置备份类型`：在此处，您可以在完整备份或增量备份之间进行选择。默认是完整备份。\n\
  *   `配置保留期`：您可以输入备份的保留天数。可选择 1 到 365 天的范围。超过该天数后，备份将被删除。您也可以选择一个特定日期，该日期代表备份保留期到期并将被删除的日子。\n\
  *   `关闭对话框后备份详情页`：勾选此复选框后，系统会自动将您重定向到备份详情页。默认情况下，此框已勾选。\n\n输入并验证信息后，点击`创建手动备份`按钮以创建备份。图\
  \ 5-7 显示了`创建手动备份`对话框的示例。\n\n![](img/527055_1_En_5_Fig7_HTML.png)\n\n*显示一个标题为“创建手动备份”的对话框。它包含\
  \ 3 个标题部分：提供数据库系统手动备份的基本信息、配置备份类型和配置保留期。*\n\n**图 5-7：创建手动备份对话框**\n\n**提示**：为简洁起见，我将不再高亮显示对话框和表单上的所有输入框，但会高亮显示命令按钮和其他重要功能。\n\
  \n如果您勾选了显示备份详情页的复选框，系统会将您重定向到该页面，以便您可以监控备份进度。您也可以在数据库系统详情页面`资源`菜单的`备份`视图中监控备份进度。图\
  \ 5-8 显示了在数据库系统详情页面的备份视图中显示的手动备份进度。\n\n![](img/527055_1_En_5_Fig8_HTML.png)\n\n\
  *显示一个标题为“创建手动备份”的表格。该表包含以下列：名称、状态、创建类型、保留天数、大小和创建时间。第一行标签为“oci-tutorial-mysql-second-test”被高亮显示。*\n\
  \n**图 5-8：备份进度（数据库系统详情页面）**\n\n**注意**：备份开始时，数据库系统的状态可能会短暂变更为`更新中`。\n\n#### 编辑备份\n\
  \n如果您需要编辑备份的名称或描述，可以使用编辑备份功能。要从数据库系统详情页面编辑备份，请点击`资源`菜单中的`备份`视图，点击右键菜单并选择`编辑`，如图\
  \ 5-9 所示。\n\n![](img/527055_1_En_5_Fig9_HTML.png)\n\n*显示一个标题为“创建手动备份”的方框。其中有一个文本框，显示以下列表：查看详情、还原到新系统、编辑、复制\
  \ OCI ID、移动资源、添加标签、查看标签和删除，其中“编辑”被选中。*\n\n**图 5-9：编辑备份（数据库系统详情页面）**\n\n如果您已导航至备份详情页，可以点击`编辑`按钮来编辑备份。\n\
  \n点击编辑备份按钮后，将出现一个对话框，您可以在其中更改以下信息：\n\n*   `显示名称`：您可以更改备份的名称。默认情况下，MDS 会包含数据库系统的名称以及备份的日期和时间。\n\
  *   `描述`：您可以更改备份的描述。\n*   `配置备份类型`：在此处，您可以在完整备份或增量备份之间进行选择。默认是完整备份。\n*   `配置保留期`：您可以更改备份的保留天数。您也可以选择一个特定日期，该日期代表备份保留期到期并将被删除的日子。\n\
  \n图 5-10 显示了编辑备份对话框。\n\n![](img/527055_1_En_5_Fig10_HTML.png)\n\n*显示一个标题为“编辑备份”的对话框。该对话框包含副标题：提供数据库系统手动备份的基本信息和配置保留期。最后提供了“保存更改”选项。*\n\
  \n**图 5-10：编辑备份对话框**\n\n更正信息后，您可以点击`保存更改`按钮来保存您的修改。\n\n#### 管理标签\n\n您可以用来关联备份（或\
  \ OCI 中任何支持标签的资源）的另一机制是向该资源添加一个或多个标签。标签是您可以自行添加的短字符串。您可能希望添加标签用于筛选或排序。例如，您可以使用标签将备份与成本中心、事件或项目关联起来。\n\
  \n您可以随时向备份添加标签。要执行此操作，请从数据库系统详情页面点击`资源`菜单中的`备份`视图，点击上下文菜单并选择`添加标签`，如图 5-11 所示。\n\
  \n![](img/527055_1_En_5_Fig11_HTML.png)\n\n一个标题为“创建手动备份”的框。给定了一个带列表的文本框。查看详情、恢复到新系统、编辑、复制\
  \ OCID、移动资源、添加标签、查看标签、删除，其中“添加标签”被选中。\n\n图 5-11\n\n添加标签（数据库系统详情页面 – 备份视图）\n\n如果您已导航至备份详情页面，则可以点击`编辑`按钮来编辑备份。\n\
  \n点击`添加标签`按钮后，您将看到一个对话框，您可以在其中指定要添加到备份的一个或多个标签。图 5-12 展示了添加单个标签的示例。这里，我们添加了一个名为\
  \ `CostCenter`、值为 `901` 的标签。请注意，标签中不能包含空格。\n\n![](img/527055_1_En_5_Fig12_HTML.jpg)\n\
  \n一个标题为“添加标签”的对话框，其中右下角的框“+ 添加另一个标签”和左下角的“添加标签”被选中。\n\n图 5-12\n\n添加标签对话框\n\n如果您想添加更多标签，可以点击\
  \ `+ 另一个标签` 按钮，这将为您添加另一组文本框以指定另一个标签。完成后，您可以点击`添加标签`按钮将标签添加到您的备份。\n\n请注意，您可以通过导航至备份详情页面查看与备份关联的标签。在那里，您可以选择`标签`选项卡，然后查看`自由格式标签`视图，以查看您已添加的标签，如图\
  \ 5-13 所示。\n\n![](img/527055_1_En_5_Fig13_HTML.jpg)\n\nOCI 教程“MySQL 第一次测试”的屏幕截图，包含备份信息和标签选项卡。还显示了资源、编辑、移动、添加标签和删除选项。左侧有一个带字母\
  \ B 的矩形框。\n\n图 5-13\n\n自由格式标签视图（备份详情页面）\n\n#### 删除备份\n\n您可以随时删除备份。如果您创建了手动备份或希望通过删除旧备份来清理部分备份资源，您可以轻松完成。删除一组备份的最简单方法是使用云控制台主菜单并导航到\
  \ `数据库` | `备份`，这将显示您所有的 MDS 备份，如图 5-14 所示。\n\n![](img/527055_1_En_5_Fig14_HTML.png)\n\
  \n一个标题为“oci-tutorial-compartment 中的备份”的对话框，其中选中了选项“备份”。该表包含以下列：名称、状态、创建类型、保留天数、大小和创建时间。\n\
  \n图 5-14\n\n列出所有数据库系统备份\n\n请注意，这里我们看到列表的标题是“*oci-tutorial-compartment 中的备份*”。正如您可能推断的那样，该列表一次只显示一个\
  \ compartment 中的备份。这是因为备份包含在创建它们的 compartment 中——很像数据库系统（或任何存在于 compartment 级别的资源）。\n\
  \n这个列表非常方便，因为它允许您选择多个备份，然后应用两种操作之一：添加标签或删除。`应用标签`按钮允许您向所有选中的备份添加一个或多个标签。同样，`删除`按钮会删除所有选中的备份。\n\
  \n要删除单个备份，请使用右侧的上下文菜单并选择`删除`，如图 5-15 所示。\n\n![](img/527055_1_En_5_Fig15_HTML.png)\n\
  \n一个以名称、状态、数据库系统、创建类型、保留天数、大小和创建时间为列标题的对话框，其中第一列被选中。右侧有一个带删除选项的文本框。\n\n图 5-15\n\n\
  删除备份（MDS 备份列表）\n\n系统将要求您确认信息，如图 5-16 所示。点击`删除备份`按钮以确认删除操作。显示此对话框是因为删除备份会导致该备份以后无法访问。\n\
  \n![](img/527055_1_En_5_Fig16_HTML.jpg)\n\n一个标题为“删除备份”的对话框。在对话框中，“删除备份”选项被标记为选中。\n\
  \n图 5-16\n\n确认备份删除对话框\n\n您也可以从备份详情页面点击`删除`按钮来删除备份。或者，如果您正在查看数据库系统详情页面，请使用`资源`菜单中的`备份`视图选择上下文菜单并选择`删除`。\n\
  \n\n### 移动备份\n\n备份包含在创建它们的 compartment 中。您无法在一个 compartment 中使用另一个 compartment 的备份（例如用于恢复）。您必须先将备份移动到其他\
  \ compartment 才能使用它。\n\n### 注意\n\n只有处于活动状态的备份才能被移动。处于任何其他状态的备份无法被移动到其他 compartment。\n\
  \n如果您需要操作多个 compartment，您可能需要或希望将备份移动到不同的 compartment。例如，您可能希望恢复位于另一个 compartment\
  \ 中的某个 DB 系统的数据，可能是为了建立开发环境的基线、复制数据用于其他分析等。\n\n### 注意\n\n发起移动的用户必须在目标 compartment\
  \ 拥有 `MYSQL_BACKUP_MOVE` 权限。更多详情请参见 [`https://docs.oracle.com/en-us/iaas/mysql-database/doc/policy-details-mysql-database-service.xhtml`](https://docs.oracle.com/en-us/iaas/mysql-database/doc/policy-details-mysql-database-service.xhtml)。\n\
  \n要将备份移动到其他 compartment，您可以通过云控制台菜单导航到备份列表，选择 `数据库` | `备份`，然后点击上下文菜单并选择 `移动资源`，如图\
  \ 5-17 所示。\n\n![](img/527055_1_En_5_Fig17_HTML.png)\n\n显示一个带文本框的对话框，其中包含以下列表选项。查看详情、恢复到新系统、编辑、复制\
  \ O C I D、移动资源、添加标签、查看标签和删除，其中“移动资源”选项被选中。\n\n图 5-17\n移动资源（MDS 备份列表）\n\n点击 `移动资源`\
  \ 后，您将看到一个带有一个下拉列表的对话框，您可以在其中选择要将备份移动到的 compartment。图 5-18 显示了该对话框。\n\n![](img/527055_1_En_5_Fig18_HTML.jpg)\n\
  \n显示一个标题为“将资源移动到其他 compartment”的对话框。在对话框中，“移动备份”选项被标记为选中。\n\n图 5-18\n移动资源对话框\n\n\
  只需从列表中选择目标 compartment，然后点击 `移动备份` 按钮即可移动备份。请注意，示例中显示了将备份移动到 `mysql-development`\
  \ compartment。操作仅需片刻，完成后，备份将从当前列表中移除。\n\n### 注意\n\n您无法选择备份当前所在的 compartment。\n\n\
  这是因为 MDS 备份列表使用 compartment 作为过滤器。由于我们之前查看的是 `oci-tutorial-compartment`，但我们将资源移动到了\
  \ `mysql-development` compartment，因此我们必须更改 `Compartment` 过滤器才能看到该备份，如图 5-19 所示。\n\
  \n![](img/527055_1_En_5_Fig19_HTML.png)\n\n显示一个标题为“mysql-development compartment\
  \ 中的备份”的对话框，其中“备份”选项被选中。表格包含以下列：名称、状态、创建类型、保留天数、大小和创建时间。\n\n图 5-19\n显示 mysql-development\
  \ compartment 中的备份\n\n现在您可以在 `mysql-development` compartment 中使用该备份了。您可以随时按需移动备份，但请记住，除非您将备份移动到某个\
  \ compartment，否则无法在该 compartment 中使用它们。\n\n现在，让我们了解一下可以如何恢复我们的数据（备份）。\n\n## 恢复\n\
  \nMDS DB 系统中的恢复操作并非一个独立的功能或资源。它实际上是备份资源的一个功能。这与其他操作系统和数据库备份工具的工作方式略有不同，因此，为了避免混淆，我们为\
  \ MDS 和 MDS 备份的新用户将恢复操作单独列出。\n\n当您恢复备份时，您并不是将数据恢复到同一个 DB 系统。MDS（以及其他 OCI）资源被设计并实现为“使用...创建新资源”的操作。因此，恢复备份意味着您将使用备份中的数据以及随备份存储的某些配置元数据来创建一个新的\
  \ DB 系统。一旦您习惯了这个新流程，您可能会发现它在某些情况下很有用，例如当您为了诊断目的而希望恢复备份，并同时拥有当前的和恢复的 DB 系统会很有优势时。\n\
  \n由于恢复操作会使用备份中的数据创建一个新的 DB 系统，用于创建恢复的对话框与用于创建新 DB 系统的对话框非常相似。因此，其中一些细节可能非常熟悉，但我们为了完整性和清晰性仍将其包含在内。\n\
  \n只有一个非常重要的方面需要考虑。新的 DB 系统不能使用与现有、正在运行的 DB 系统相同的 IP 地址。如果您想使用相同的 IP 地址，必须先删除现有的\
  \ DB 系统。\n\n另一件需要考虑的事情是，新的 DB 系统将保留来自原始 DB 系统的管理员凭据，因此您无需重新创建管理员帐户和密码。\n\n### 注意\n\
  \n如果您想跟随此演示操作，请务必为您的现有 DB 系统创建一个手动备份，以便您有一个可用于恢复的备份。\n\n要恢复备份，首先使用云控制台主导航到 DB 系统备份列表，然后选择\
  \ `数据库` | `备份`，接着为您想要恢复的备份从上下文菜单中点击 `恢复到新 DB 系统`，如图 5-20 所示。在此情况下，我们看到一个已采取的手动备份，我们想要恢复它。原始\
  \ DB 系统仍然处于活动运行状态。\n\n![](img/527055_1_En_5_Fig20_HTML.png)\n\n显示一个列标题为名称、状态、D B\
  \ 系统、创建类型、保留天数、大小和创建时间的对话框。右侧有一个文本框，其中“恢复到新 D B 系统”选项被标记为选中。\n\n图 5-20\n恢复到新 DB\
  \ 系统（DB 系统备份列表）\n\n您也可以导航到备份详情页面并点击 `恢复到新 DB 系统` 按钮，如图 5-21 所示，来开始恢复过程。\n\n![](img/527055_1_En_5_Fig21_HTML.png)\n\
  \n显示 o c i 教程 my s q l 备份页面的截图，包含备份信息和标签选项卡。还显示了资源、编辑、移动、添加标签和删除选项。左侧有一个带有 B 字样的矩形框。\n\
  \n图 5-21\n恢复到新 DB 系统（备份详情页面）\n\n一旦您点击该按钮，“恢复到新 DB 系统”对话框将会出现。我们需要提供的信息包括以下内容：\n\n\
  *   `名称`：DB 系统的名称。\n*   `描述`（可选）：提供您自己使用的描述，用于解释 DB 系统，例如其创建原因、分配给哪些项目等。您应避免在描述中包含任何机密数据。\n\
  *   `网络`：您需要为 DB 系统选择 VCN 和子网。\n*   `可用性域`（放置）：选择可用性域。\n*   `硬件`：选择数据存储（块卷）的形状和大小。\n\
  *   `备份计划`：您可以选择是否开启自动备份。\n\n由于该对话框相当长，并且看起来与创建新 DB 系统的对话框非常相似，我们将从顶部开始分部分介绍该对话框。如果您正在跟随进行自己的恢复操作，您可能需要向下滚动才能看到对话框的所有部分。\n\
  \n\n\n### 从备份还原数据库系统\n\n首先，我们必须选择数据源。根据您启动还原的方式，此信息可能已为您填写。我们必须选择是从备份还原还是执行时间点还原（在第\
