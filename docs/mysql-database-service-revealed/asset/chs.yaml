  \n![](img/527055_1_En_5_Fig26_HTML.png)\n\n图 5-26 还原数据库系统（第 5 部分）\n\n一个标题为“配置备份计划”的对话框。提供两个框，标题分别为：备份保留期，和窗口开始时间。“启用自动备份”和“选择备份窗口”选项标记为已选中。\n\
