  \ sec)\n清单 7-13\n检查导入结果\n```\n\n虽然这些步骤看起来更简单（确实如此），但这种方法比 ObjectStore 方法慢，因为我们必须手动复制文件。下一个也是最后一个示例绕过了上传到计算实例的步骤，而是允许我们直接将数据上传到\
  \ DB 系统。\n\n### 使用堡垒网关\n\n从本地 MySQL 服务器导出数据的第三种方法是使用堡垒网关将我们的 PC 直接连接到 DB 系统。这意味着我们不再需要为导入而复制或上传数据；MySQL\
  \ Shell 可以直接从我们的 PC 读取数据。\n\n由于堡垒网关和网络层的原因，此方法比其他两种方法慢，更重要的是，它有两个潜在问题：(1) 堡垒网关是付费服务，(2)\
  \ 您复制的数据除了要导入的数据大小外，还必须能放入 DB 系统的存储中。因此，它可能需要存储最多两倍的数据量；一次是导出的数据，另一次是数据导入后。这可能对较小的\
  \ DB 系统存储大小或较大的数据造成问题。但是，如果您最初调整 DB 系统大小以处理导出的数据，大多数初始数据加载应该不是问题。\n\n此方法与前一个方法的步骤类似，只是我们必须先设置堡垒服务器，然后在本地\
  \ MySQL 服务器上导出数据，最后从我们的 PC 导入数据。让我们看一个演示。\n\n#### 设置堡垒服务\n\n回想一下，我们在第 4 章的 *创建堡垒服务*\
  \ 标题下设置了堡垒网关。虽然执行导出和导入的命令再次类似，但在本方法中，我们创建从 PC 到 DB 系统的直接访问，因此导出的数据可以直接复制到 DB 系统进行导入。\n\
  \n我们将使用第 4 章中描述的相同流程来设置堡垒服务。但是这次我们需要两个端口转发会话；一个为端口 `3306` 设置，另一个为端口 `33060` 设置，因为\
  \ MySQL Shell 在导入期间将使用这两个端口。回想一下，我们将使用 DB 系统的 IP 地址，并且您需要创建一个 SSH 密钥对或重用之前创建的密钥对。图\
  \ 7-11 展示了设置有两个端口转发会话的堡垒服务。\n\n![](img/527055_1_En_7_Fig11_HTML.png)\n\n一个屏幕截图显示了堡垒服务详细信息。表格中有\
  \ 2 个项目。会话类型、目标资源和目标端口被高亮显示。\n\n图 7-11\n\n堡垒服务会话（用于从 PC 导入数据）\n\n提示\n\n如果您需要查看详细步骤，请参阅第\
  \ 4 章中题为 *创建堡垒服务* 的部分，了解如何设置堡垒服务。\n\n#### 使用 MySQL Shell 导出数据\n\n下一步是运行 `util.dumpInstance()`\
  \ 方法将文件保存到本地驱动器。在这种情况下，我们将使用不同的第一个参数。我们不是传入存储桶名称和相关参数，而是简单地指定一个用于存储文件的文件夹（目录）以及与之前相同的选项集。这是我们在上一个方法中使用的相同步骤，因此我们只展示使用的命令。如果您正在跟随操作，则无需再次运行此步骤，因为导出的数据应该已经在您的\
  \ PC 上。所需的命令如下所示，以便清晰：\n\n```\nutil.dumpInstance(\"c:\\\\exported_data\", {ocimds:true,\
  \ compatibility: [\"strip_restricted_grants\", \"strip_definers\", \"ignore_missing_pks\"\
