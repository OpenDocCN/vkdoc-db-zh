  \ `继续`。再次提醒，您应该阅读按钮上方的使用条款声明。\n\n点击按钮后，您将看到另一个对话框，要求您提供邮寄地址和电话号码，如图 2-9 所示。\n\n\
  ![](img/527055_1_En_2_Fig9_HTML.png)\n\n新账户信息的第三页，需要填写地址行 1 和 2、城市、州、邮政编码和电话号码。协议复选框位于底部。\n\
  \n**图 2-9** 新账户信息（第 3 部分）\n\n输入您的个人信息后，点击 `继续` 进入支付信息部分，如图 2-10 所示。要添加您的支付偏好，请点击\
  \ `添加支付验证方法` 按钮并按照提示操作。\n\n![](img/527055_1_En_2_Fig10_HTML.png)\n\n新账户信息的第四页，包含支付验证选项。中间是“添加支付验证方法”按钮。协议复选框位于底部。\n\
  \n**图 2-10** 新账户信息（第 4 部分）\n\n输入支付信息并通过验证后，您将返回到对话框。要完成账户创建，请勾选 `协议` 复选框（阅读协议后），然后点击\
  \ `开始我的免费试用`，如图 2-11 所示。\n\n![](img/527055_1_En_2_Fig11_HTML.png)\n\n新地址信息窗口的第五页，包含支付验证。中心显示“感谢您验证详细信息”。协议复选框位于底部。\n\
  \n**图 2-11** 新账户信息（第 5 部分）\n\n此时，您的新账户正在配置中。您可能会收到一条消息，提示此过程需要一些时间，如图 2-12 所示。这是正常现象。注意\
  \ Oracle 提供了一个链接，让您在等待时了解更多关于 OCI 的信息。这很贴心。当您的账户准备就绪时，您将通过电子邮件收到通知。\n\n![](img/527055_1_En_2_Fig12_HTML.jpg)\n\
