  : \"00:00:17:38:7B:54\"\n}\n]\n}\n```\n**列表 9-10：列出一个 Compartment 的子网**\n\n接下来，我们需要获取可用的\
  \ MySQL 规格。由于这个列表可能很长，我们会看到分页输出，这需要多次调用才能获取完整列表。如果你和我一样，没有耐心等待，我们可以使用 `--all` 参数。\n\
  \n我们需要获取规格及其名称的列表，如列表 9-11 所示（为简洁起见进行了节选），这需要使用 `mysql` 命令和 `shape` 子命令配合 `list`\
  \ 选项以及 `--compartment-id` 参数。\n\n```cmd\nC:\\>oci mysql shape list --compartment-id=ocid1.compartment.MASKED\
  \ --all\nPrivate key passphrase:\n{\n\"data\": [\n{\n\"cpu-core-count\": 1,\n\"\
  is-supported-for\": [\n\"DBSYSTEM\"\n],\n\"memory-size-in-gbs\": 8,\n\"name\": \"\
