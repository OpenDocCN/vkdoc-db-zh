  \ 3 个启动卷选项。选中了使用传输中加密。左下角的创建按钮被高亮显示。\n\n图 2-32\n\n创建计算实例（第 3 部分）\n\n现在计算实例将被配置。将打开计算实例的详细信息页面，状态将显示为\
