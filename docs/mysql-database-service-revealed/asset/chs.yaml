  \n现在我们有了一个 compartment，我们可以开始创建要放入其中的资源。下一步是创建 VCN。\n\n\n\n#### 创建虚拟云网络\n\n接下来，我们需要一个虚拟云网络（VCN）来连接我们的计算实例，以便能够访问它。我们将使用\
