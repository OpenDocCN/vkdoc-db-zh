  \ 规格**\n\n好的，我们还需要一个列表：可用性域名的名称。要查找可用性域名，我们发出 `iam` 命令配合 `availability-domain` 子命令和\
  \ `list` 选项，并通过 `--compartment-id` 参数提供 compartment OCID。\n\n\n\n#### 列出可用域\n\n\
  ```bash\nC:\\ >oci iam availability-domain list --compartment-id=ocid1.compartment.MASKED\n\
  {\n\"data\": [\n{\n\"compartment-id\": \"ocid1.compartment.MASKED\",\n\"id\": \"\
  ocid1.availabilitydomain.MASKED\",\n\"name\": \"DRUu:US-ASHBURN-AD-1\"\n},\n{\n\"\
  compartment-id\": \"ocid1.compartment.MASKED\",\n\"id\": \"ocid1.availabilitydomain.MASKED\"\
  ,\n\"name\": \"DRUu:US-ASHBURN-AD-2\"\n},\n{\n\"compartment-id\": \"ocid1.compartment.MASKED\"\
  ,\n\"id\": \"ocid1.availabilitydomain.MASKED\",\n\"name\": \"DRUu:US-ASHBURN-AD-3\"\
  \n}\n]\n}\n代码清单 9-12\n列出可用域\n```\n\n接下来，我们需要一些可选参数。下面展示了我们将使用的选项及其参数：\n\n*   `--admin-password\
  \ <password>`：MySQL 管理用户的密码。\n*   `--admin-username <name>`：MySQL 管理用户的用户名。\n* \
  \  `--data-storage-size-in-gbs <int>`：数据存储（数据库驱动器）的大小（单位为 GB）。\n*   `--display-name\
  \ <text>`：数据库系统的用户友好名称。\n*   `--is-highly-available <bool>`：指定数据库系统是否为高可用。\n\n我们还需要讨论另一个选项——让操作等待特定状态的选项。我们通过\
  \ `--wait-for-state <state>` 选项和以下状态之一 (`ACCEPTED`, `CANCELED`, `CANCELING`, `FAILED`,\
  \ `IN_PROGRESS`, `SUCCEEDED`) 来实现。你可以多次指定此选项以等待多个操作。此操作会异步执行操作，并使用工作请求跟踪进度。可以指定多个状态，在第一个状态达到时返回。如果达到超时，则返回返回码\
  \ `2`。对于任何其他错误，则返回返回码 `1`。\n\n好了，现在我们可以构建命令了。以下是该命令的示例。如果你想跟着操作，请务必使用你自己的 OCID 替换示例中已掩码的\
  \ OCID：\n\n```bash\nC:\\>oci mysql db-system create --compartment-id=ocid1.compartment.MASKED\
