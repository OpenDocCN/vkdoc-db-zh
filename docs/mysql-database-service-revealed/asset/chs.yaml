  *一个名为“My SQL CLI Create”的数据库页面，显示了基本信息、数据库系统配置、备份、HeatWave、高可用性、网络、放置和端点的详细信息。*\n\
  **图 9-1：新建数据库系统详情页面（CLI 示例）**\n\n最后，为了清理本示例，我们可以使用以下命令删除新创建的数据库系统，如代码清单 9-14 所示。请注意，系统会要求你确认删除操作。\n\
