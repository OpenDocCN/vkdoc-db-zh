  \n正如你所看到的，这里有很多命令！我们最感兴趣的命令是 `mysql` 命令。清单 9-2 展示了 `mysql` (MDS) 命令的帮助信息。\n\n```\n\
  C:\\>oci mysql\nUsage: oci mysql [OPTIONS] COMMAND [ARGS]...\nThe CLI for the MySQL\
  \ Database Service\nOptions:\n-?, -h, --help  For detailed help on any of these\
  \ individual commands, enter\n --help.\nCommands:\nbackup                  A full\
  \ or incremental copy of a DB System which...\nchannel                 A Channel\
  \ connecting a DB System to an external...\nconfiguration           The set of MySQL\
  \ variables to be used when...\ndb-system               MySQL Database Service\n\
  shape                   The shape of the DB System.\nversion                 A supported\
  \ MySQL Version.\nwork-request            The status of an asynchronous task in\
  \ the system.\nwork-request-error      An error encountered while executing a work...\n\
  work-request-log-entry  A log message from the execution of a work...\n清单 9-2\n\
  CLI mysql 帮助示例\n```\n\n类似地，如果你想查看 `mysql backup` 命令的帮助，可以执行 `oci mysql backup` 命令。清单\
  \ 9-3 展示了此命令的输出。\n\n```\nC:\\>oci mysql backup\nUsage: oci mysql backup [OPTIONS]\
  \ COMMAND [ARGS]...\nA full or incremental copy of a DB System which can be used\
  \ to create a\nnew DB System or recover a DB System.\nTo use any of the API operations,\
  \ you must be authorized in an IAM policy.\nIf you're not authorized, talk to an\
  \ administrator. If you're an\nadministrator who needs to write policies to give\
  \ users access, see\n[Getting Started with Policies].\nOptions:\n-?, -h, --help\
  \  For detailed help on any of these individual commands, enter\n --help.\nCommands:\n\
  change-compartment  Moves a DB System Backup into a different compartment.\ncreate\
  \              Create a backup of a DB System.\ndelete              Delete a Backup.\n\
  get                 Get information about the specified Backup Command...\nlist\
  \                Get a list of DB System backups.\n清单 9-3\nCLI mysql backup 帮助示例\n\
  ```\n\n注意帮助信息中包含了大量内容。这是探索 CLI 最快的方式，并且在大多数情况下，你不需要查阅更长、更详细的在线文档。这就是为什么我们从基于 Web\
  \ 的控制台开始。一旦你掌握了它，所有这些术语都会变得清晰明了，你可以轻松地找到脚本化任何支持操作所需的命令和参数。\n\nCLI 的输出是 JavaScript\
  \ 对象表示法（JSON）格式，大多数人会发现它易于阅读和使用。例如，如果你想列出特定 DB System 的备份，你可以执行以下不带参数的命令，并添加 `--help`\
  \ 选项以获取更多信息：\n\n```\noci_mysql backup list --help\n```\n\n这将产生清单 [9-4 中的输出（为简洁起见进行了重新格式化）。注意\
  \ `DB System` 选项。\n\n```\nC:\\>oci mysql backup list --help\n\"list\"\n******\n\
  * 说明\n* 用法\n* 必需参数\n* 可选参数\n* 全局参数\n* 示例\n说明\n===========\n获取 DB System 备份列表。\n\
  用法\n=====\noci mysql backup list [OPTIONS]\n必需参数\n===================\n--compartment-id,\
  \ -c [text] 隔离区 OCID。\n可选参数\n===================\n--all 获取所有页面的结果。如果提供此选项，则无法提供\
  \ \"--limit\" 选项。\n--backup-id [text] 备份 OCID\n--creation-type [text] 备份创建类型。可接受的值为：AUTOMATIC,\
  \ MANUAL, OPERATOR\n--db-system-id [text] DB System OCID。\n--display-name [text]\
  \ 筛选条件，仅返回与给定显示名称完全匹配的资源。\n--from-json [text] 使用 file://path-to/file 语法从文件为该命令提供\
  \ JSON 文档输入。\n可使用 \"--generate-full-command-json-input\" 选项生成一个示例 json 文件，以用于此命令选项。键名是预先填充的，并与命令选项名称匹配（转换为\
  \ camelCase 格式，例如 compartment-id compartmentId），而键的值需要用户在将示例文件作为此命令输入之前填充。对于接受多个值的任何命令选项，该键的值可以是\
  \ JSON 数组。\n仍然可以在命令行上提供选项。如果某个选项同时存在于 JSON 文档和命令行中，则将使用命令行指定的值。\n有关此选项用法的示例，请参阅我们使用具有高级\
  \ JSON 选项的 CLI 链接：https://docs.cloud.oracle.com/iaas/Content/API/SDKDocs/cliusing.htm#AdvancedJSONOptions\n\
  --lifecycle-state [text] 备份生命周期状态。可接受的值为：ACTIVE, CREATING, DELETED, DELETING, FAILED,\
  \ INACTIVE, UPDATING\n--limit [integer] 在分页列表调用中返回的最大项目数。有关分页信息，请参阅列表分页。\n--page\
  \ [text] 来自上一个列表调用的 *opc-next-page* 或 *opc-prev-page* 响应头的值。有关分页信息，请参阅列表分页。\n--page-size\
  \ [integer] 获取结果时，每次调用要获取的结果数。仅与 \"--all\" 或 \"--limit\" 一起使用时有效，否则忽略。\n--sort-by\
  \ [text] 排序依据的字段。只能提供一个排序顺序。时间字段默认按降序排序。可接受的值为：displayName, timeCreated, timeUpdated\n\
  --sort-order [text] 要使用的排序顺序（ASC 或 DESC）。可接受的值为：ASC, DESC\n全局参数\n=================\n\
  使用 \"oci --help\" 获取关于全局参数的帮助。\n\"--auth-purpose\", \"--auth\", \"--cert-bundle\"\
  , \"--cli-auto-prompt\", \"--cli-rc-file\", \"--config-file\", \"--connection-timeout\"\
  , \"--debug\", \"--defaults-file\", \"--endpoint\", \"--generate-full-command-json-input\"\
  , \"--generate-param-json-input\", \"--help\", \"--latest-version\", \"--max-retries\"\
  , \"--no-retry\", \"--opc-client-request-id\", \"--opc-request-id\", \"--output\"\
  , \"--profile\", \"--query\", \"--raw-output\", \"--read-timeout\", \"--region\"\
  , \"--release-info\", \"--request-id\", \"--version\", \"-?\", \"-d\", \"-h\", \"\
  -i\", \"-v\"\n清单 9-4\nCLI mysql backup list 帮助示例\n```\n\n哇，信息量真大！我们现在知道了所有需要的信息，可以列出某个隔离区或特定\
  \ DB System（使用 `--db-system-id` 选项）的备份。\n\n> **注意**\n> 有些选项是必需的，而其他是可选的。此外，有些选项提供了快捷方式。例如，`--compartment-id`\
  \ 和 `-c` 是同一个选项。\n\n现在我们理解了 CLI 的基础知识，让我们来看一些可以立即用于你的 DB System 的示例操作。\n\n#### 示例用法\n\
  \n以下是一些使用 CLI 进行常见 MDS 操作的示例，范围从简单的对象列表到创建对象。这些仅作为示例，并未涵盖所有 MDS CLI 命令。更多链接请参见下面的\
  \ *更多信息*。\n\n> **警告**\n> `oci` 命令的参数不能使用空格。例如，`--param1=value` 是有效的，但 `--param1\
  \ = value` 是无效的，并将导致 “invalid option” 错误。\n\n## 管理 DB 系统\n\n### 列出 DB 系统的备份\n\n\
  要列出 DB 系统的备份，我们使用 `--db-system-id` 和 `--compartment-id` 选项，分别提供对应的 OCID。清单 9-5 展示了如何构建和执行此命令。请注意，输出以\
  \ JSON 格式生成。另请注意，我们使用了带有 `ACTIVE` 参数的 `--lifecycle-state` 选项，以跳过所有非活动状态的备份。\n\n\
  ```C:\\>oci mysql backup list --compartment-id=ocid1.compartment.MASKED --db-system-id=ocid1.mysqldbsystem.MASKED\
  \ --lifecycle-state=ACTIVE\n{\n\"data\": [\n{\n\"backup-size-in-gbs\": 1,\n\"backup-type\"\
  : \"INCREMENTAL\",\n\"creation-type\": \"AUTOMATIC\",\n\"data-storage-size-in-gbs\"\
