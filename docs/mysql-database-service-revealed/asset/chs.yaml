  ## 向表中插入数据


  现在让我们看看如何向表中插入一些数据。我们将此示例代码命名为 `mysql_insert.py`。


  在这个例子中，我们只是想从文件中读取数据并将其插入到一个表中。我们将使用与之前示例相同的代码连接到服务器，并使用游标执行查询。不同之处在于，我们将使用一个文件以逗号分隔值格式（`.csv`）读取示例数据。这是一种在各种应用程序中常用的格式。


  对于文件中的每一行，我们解码字段，然后使用列中的数据形成一条 `INSERT` 命令。我们将再次使用游标类的 `execute()` 方法来执行插入数据的查询。由于没有结果，我们不获取任何内容。但是，在插入完所有行后，我们必须调用游标类的
  `commit()` 方法来提交更改。清单 3-11 展示了此示例的完整代码。请花点时间阅读以明确其逻辑。


  ```python

  """mysql_insert.py"""

  #

  '
- '# MySQL Database Service

  #

  '
- '# Chapter 03 - MySQL Insert

  #

  '
- '# This script demonstrates the basics for using the MySQL Connector/Python to

  '
- '# connect to a MySQL server and insert data into a table.

  #

  '
- '# Dr. Charles Bell

  #

  '
- '# Import libraries

  import mysql.connector

  '
- '# Query

  INSERT_SQL = "INSERT INTO plant_monitoring.plants (name, location, climate) VALUES
  ("

  '
- "# Connection parameters dictionary\nserver = {\n    'user': 'root',\n    'password':\
  \ 'SECRET',\n    'host': '127.0.0.1',\n    'database': 'plant_monitoring',\n}\n"
- '# Connect to the server

  cnx = mysql.connector.connect(**server)

  '
- '# Create a cursor

  cur = cnx.cursor()

  '
- "# Read rows from a file for inserting into plant-monitor table\nwith open(\"plants_data.txt\"\
  , encoding='UTF-8') as data_file:\n    data = data_file.readlines()\n"
- "# Now insert the data in the table\nfor row in data:\n    cols = row.strip('\\\
