  现在我们有了用户组，可以创建一个用户并将其添加到该组中。如果你决定将根用户添加到组中，这一步可能是可选的。\n\n\n## 创建用户并将其添加到组\n\n即使您是唯一使用\
  \ OCI 账户的人，创建新用户也是一个良好的实践，因为这样您可以测试用户如何与您的资源进行交互。这不仅确保您创建的用户能够执行应用程序或使用资源，还能确保您的安全策略定义正确。\n\
  \n本节中，我们将创建一个新用户并将其添加到组中。您需要输入名称、用户名以及一个有效的电子邮件地址。电子邮件地址是必需信息之一，因为 OCI 将通过电子邮件向用户发送一个链接来设置用户账户密码，这与您的根账户收到通知的方式非常相似。\n\
  \n要创建用户，您需要导航回 **Default** 域详情页面。回想一下，您可以通过使用云控制台菜单选择 **Identity & Security**，然后单击\
  \ **Domains**，在 Domains 资源页面上选择 **Default** 域来访问此页面。更多详情请参考上文相关章节。\n\n回到 **Default**\
  \ 域详情页面后，单击左侧菜单中的 **Users** 项，然后在用户列表中单击 **Create user** 按钮，如图 4-7 所示。\n\n![](img/527055_1_En_4_Fig7_HTML.jpg)\n\
  \n*图 4-7：用户列表（默认域详情页面）*\n\n接下来，我们将创建一个名为 `Joe User` 的新用户并提供一个有效的电子邮件地址。该对话框允许您使用电子邮件地址作为用户名，但您也可以使用自定义用户名。为此，请取消选中\
  \ **Use the email address as username** 复选框，以便输入 `joeuser` 作为用户名。请务必检查您输入的电子邮件地址是否有效。提示：您可以在此处使用自己的电子邮件地址。这就是为什么我们将登录方式改为使用用户名而不是电子邮件地址。很聪明吧。图\
  \ 4-8 显示了填入数据后的创建用户对话框。\n\n![](img/527055_1_En_4_Fig8_HTML.png)\n\n*图 4-8：创建用户对话框*\n\
  \n请注意，我们还可以在同一操作中将用户添加到组！这里，我们只需选择我们之前创建的组 (`mysql-users`)。准备好后，单击 **Create** 按钮以创建用户。一封电子邮件将发送到您提供的电子邮件地址，允许您为新用户设置密码。如果您当前以根账户登录，则必须先注销该账户，然后才能设置/重置密码。\n\
  \n> **注意**：当您尝试创建 MySQL DB 系统时，要以新用户身份登录，您需要注销根账户，然后使用新用户账户重新登录。\n\n现在我们已经创建了组和新用户，我们只需要使用安全策略向该组授予某些权限。\n\
  \n### 步骤三：创建策略\n\n最后，我们需要一个安全策略，向组授予某些权限，以便用户可以访问和使用 MySQL 资源。有几种方法可以做到这一点，包括使用云控制台界面来构建我们需要的特定命令，或者我们可以手动输入命令。在本例中，我们将使用手动选项。\n\
  \n为了满足 MDS 的要求，我们需要为该组分配以下权限：\n\n*   `SUBNET_READ, SUBNET_ATTACH, SUBNET_DETACH,\
  \ VCN_READ, COMPARTMENT_INSPECT`：允许组操作子网和 VCN\n*   `manage mysql-family`：允许组管理 MySQL\
  \ 资源\n*   `use tag-namespaces`：允许组在租户中使用标签命名空间\n\n我们将使用 `Allow` 权限语句来授予这些权限，这允许您将权限应用于租户本身或特定\
  \ compartment。由于我们将使用 `oci-tutorial-compartment`，我们将在语句中使用该值。但是，最后一个权限是应用于租户的。\n\
  \n让我们看看如何做到这一点。要创建安全策略，请单击云控制台主菜单，选择 **Identity & Security**，然后单击 **Policies**。这将打开\
  \ Policies 资源页面，如图 4-9 所示。要创建新策略，请单击 **Create Policy** 按钮。\n\n![](img/527055_1_En_4_Fig9_HTML.png)\n\
  \n*图 4-9：策略资源页面*\n\n安全策略是在根 compartment 中创建的。您可能在列表范围中选择了 `oci-tutorial-compartment`，但这没关系。我们可以在下一个页面中选择\
  \ compartment。\n\n创建策略时需要提供以下信息。如果您是跟随操作，以下显示了每个数据项的示例条目：\n\n*   名称：策略的名称。使用 `mysql-users-policy`。\n\
  *   描述：对该策略提供内容的简短描述。使用 `Allow users to access MySQL DB Systems`。\n*   Compartment：务必选择您的根\
  \ compartment。\n\n我们还需要提供如上所述的策略语句。我们需要的语句格式由 OCI 之前提供的横幅给出。在本例中，以下是建议的策略语句。请注意\
  \ `[..|..]` 的使用，这表示我们有一组参数可供选择。在适用的情况下，我们将使用 `compartment_name` 选项（我们移除其他选项和方括号）。这些语句经过人工格式化以便阅读：\n\
  \n```\nAllow group <group_name> to\n{SUBNET_READ, SUBNET_ATTACH, SUBNET_DETACH,\
  \ VCN_READ, COMPARTMENT_INSPECT}\nin [\ntenancy |\ncompartment <compartment_name>\
  \ |\ncompartment id <compartment_OCID>\n]\nAllow group <group_name> to manage mysql-family\
  \ in [\ntenancy |\ncompartment <compartment_name> |\ncompartment id <compartment_OCID>\n\
  ]\nAllow group <group_name> to use tag-namespaces in tenancy\n```\n\n我们可以用 `mysql-users`\
  \ 替换 `<group_name>`，用 `oci-tutorial-compartment` 替换 `<compartment_name>`，如下所示，再次格式化以便阅读：\n\
  \n```\nAllow group mysql-users to\n{SUBNET_READ, SUBNET_ATTACH, SUBNET_DETACH, VCN_READ,\
  \ COMPARTMENT_INSPECT}\nin compartment oci-tutorial-compartment\nAllow group mysql-users\
  \ to manage mysql-family\nin compartment oci-tutorial-compartment\nAllow group mysql-users\
  \ to use tag-namespaces in tenancy\n```\n\n要将它们添加到“创建策略”对话框中，您需要单击开关 **Shown manual\
  \ editor** 以获取一个文本框来粘贴这些语句。\n\n图 4-10 显示了填入数据后的“创建策略”对话框。请务必仔细检查所有内容，包括选择您的根 compartment，然后单击\
  \ **Create** 按钮以创建策略。\n\n![](img/527055_1_En_4_Fig10_HTML.png)\n\n\n一个用于创建策略的对话框，其中已输入`名称`、`描述`和`\
  \ compartments`数据。下方显示了带有“显示手动编辑器”选项的策略构建器。“创建”按钮位于左下角。\n\n**图 4-10**  \n创建策略对话框\n\
  \n**注意**  \n如果你未选择你的根 compartment，可能会在对话框底部看到一个红色横幅，显示一条有些晦涩的错误信息，提示该 compartment\
  \ 不存在。如果发生这种情况，请仔细检查你的 compartment 选择，然后重试创建。\n\n策略创建后，你将被定向到“策略详情”页面，如图 4-11 所示。请注意，你可以使用“编辑策略”按钮编辑策略，或使用“删除”按钮将其删除。\n\
  \n![](img/527055_1_En_4_Fig11_HTML.jpg)\n\n一个页面在右侧显示已创建策略的详细信息。提供编辑策略、删除和添加标签的选项。左侧有一个带有字母`P`的绿色圆圈。\n\
  \n**图 4-11**  \n策略详情页\n\n好了，现在我们已经完成了所有三个先决条件，是时候参观一下 MDS 并学习如何创建我们的第一个 DB 系统了。\n\
  \n## MDS 概览\n\n现在本书进行到这里，大多数人渴望看到实际操作——在 OCI 中使用 MDS。我们将从一个简单的示例开始，探索创建和了解 DB 系统的细微差别，然后再转向\
  \ MDS 的高级功能。\n\n对于某些人来说，可能不太清楚 MDS 与 DB 系统之间的区别。MDS 是 OCI 的平台即服务（PaaS），而 DB 系统是该服务中可用的资源之一。MySQL\
  \ 服务菜单在云控制台菜单中的显示如图 4-12 所示。随着 MDS 的不断成熟，你可能会看到更多资源出现在 MySQL 菜单下。\n\n![](img/527055_1_En_4_Fig12_HTML.jpg)\n\
  \nOracle Cloud 中的一个菜单，选择了“数据库”选项。右侧显示数据库。在其下方，一个框内选中了 MySQL、DB 系统、备份、通道和配置。\n\n\
  **图 4-12**  \nMySQL 服务菜单（云控制台）\n\n请注意，我们在 MySQL 菜单下看到有四个资源。以下是对它们的简要概述：\n\n- `DB\
  \ 系统`：完全托管的 MySQL 服务器资源\n- `备份`：对 DB 系统进行的备份\n- `通道`：由入站或出站复制通道组成的复制资源。入站通道允许在 MySQL\
  \ 源和 DB 系统之间进行异步复制。出站通道允许将 DB 系统数据库异步复制到 MySQL 副本。\n- `配置`：定义 DB 系统操作的用户、系统、初始化或服务特定变量的集合。列表包含许多预定义配置，但你也可以创建自己的配置。\n\
  \n我们将在接下来的章节中看到 MDS 的所有功能。现在，让我们看一个创建我们的第一个 DB 系统的教程。\n\n**注意**  \n如果你尚未满足创建 DB\
  \ 系统的先决条件，请先返回并完成那些步骤。\n\n## 创建你的第一个 DB 系统\n\n此时，我们应该已经设置好我们的 OCI 账户，以及一个虚拟云网络（`oci-tutorial-vcn`）、一个\
  \ compartments 资源（`oci-tutorial-compartment`）、一个新用户（`joeuser`）、一个该用户被分配到的用户组（`mysql-users`），以及一个允许用户创建和使用\
  \ MDS 资源的策略（`mysql-users-policy`）。如果你没有全部准备好，请务必回顾前面的章节以获取更多细节。\n\n创建 DB 系统有很多需要学习的东西和几个步骤。一旦你学会了，其实相当容易，但与之前引导你完成最小步骤的教程不同，本教程将逐步进行，并学习更多关于在每个\
  \ OCI 云控制台上可用的功能。所以，这个教程可能需要一些时间才能完成，但为了学习你能用 DB 系统做什么，这是值得的。\n\n### 打开 DB 系统资源页面\n\
  \n我们将使用云控制台中的 MySQL 菜单来创建 DB 系统。只需打开云控制台菜单，选择`数据库`，然后在`MySQL`菜单下点击`DB 系统`。这将打开 DB\
  \ 系统资源页面，如图 4-13 所示。\n\n![](img/527055_1_En_4_Fig13_HTML.png)\n\n一个页面在右侧显示了 o c\
  \ i tutorial compartment 中的 D B 系统。创建 MySQL 数据库系统按钮和标记为 mysql test 1 的已创建数据库表位于右侧。\n\
  \n**图 4-13**  \nDB 系统资源页面\n\n我们在右侧看到我们已创建的 DB 系统列表（`...中的 DB 系统`）及其状态，包括 DB 系统、崩溃恢复、高可用性和\
  \ HeatWave 的状态，以及资源创建的日期和时间。\n\n请注意`...中的 DB 系统`列表上方的按钮。我们有一个`创建 DB 系统`按钮和一个`操作`下拉菜单。在`操作`下拉菜单上，你可以对列表中选中的任何\
  \ DB 系统执行操作。这些操作包括：\n\n- `停止`：停止 DB 系统\n- `启动`：启动 DB 系统\n- `重启`：停止然后启动 DB 系统\n-\
  \ `创建手动备份`：创建 DB 系统的备份\n- `应用标签`：向资源应用一个或多个标签\n- `删除`：删除（终止）DB 系统\n\n如你所见，这是一个功能强大的菜单，对于处理多个\
  \ DB 系统来说非常方便。幸运的是，`操作`下拉菜单是 OCI 云控制台资源页面列表中的常见功能。具体操作可能不同，但概念是相同的。\n\n还要注意，这里有一个\
  \ DB 系统已被终止（`已删除`）。已终止的 DB 系统将在列表中保留几天，直到所有资源都被清除（例如，块卷不会立即销毁）。\n\n在页面左侧，我们看到重复的`MySQL`菜单。我们可以通过点击我们想要查看的标签，使用它在\
  \ MySQL 资源之间导航。在左侧下方，是我们之前见过的`列表范围`列表，我们可以在其中选择 compartment 来筛选 DB 系统列表。\n\n左下角是一个特殊的`筛选器`部分，我们可以通过选择特定状态、名称，甚至在\
  \ HeatWave 条目中选择（我们将在第 8 章了解更多关于 HeatWave 的信息）来进一步筛选列表。\n\n最后，在底部是一个标签筛选器，如果我们使用了标签，可以进一步筛选列表，仅显示具有那些标签的\
  \ DB 系统。\n\n这三种筛选机制在所有提供列表的 OCI 云控制台页面中都很常见。某些资源的筛选选项可能有所不同，但所有资源页面都允许你筛选列表。很好。\n\
  \n\n### 创建数据库系统\n\n让我们开始创建一个数据库系统。创建数据库系统的对话框很长，因此我们将分部分介绍。我们需要提供的信息包括：\n\n*   *名称*：数据库系统的名称。\n\
  *   *描述*（可选）：为您自己提供一个描述来解释数据库系统，例如其创建原因、分配到的项目等。您应避免在描述中包含任何机密数据。\n*   *数据库系统类型*：您可以选择独立（无高可用性）、启用高可用性和\
  \ HeatWave 数据库系统。我们将在第 7 章中了解更多关于高可用性功能的信息，在第 8 章中了解 HeatWave。\n*   *管理员*：您需要指定\
  \ MySQL 管理员用户帐户和密码。\n*   *网络*：您需要为数据库系统选择 VCN 和子网。\n*   *可用性域*（放置位置）：选择可用性域。\n*\
  \   *硬件*：选择数据存储（块卷）的形状和大小。\n*   *备份计划*：您可以选择开启自动备份。\n\n我们将引导您完成所有这些数据的填写，并展示如何为一个位于\
  \ `oci-tutorial-compartment` 中、没有自动备份的独立数据库系统完成每一项设置。在数据库系统资源页面的“数据库系统位于…”列表中，点击\
  \ *创建数据库系统* 按钮来创建数据库系统。\n\n> **提示**\n>\n> 注意在创建对话框中有几个带下划线的短语。这些是指向文档的链接，您可以使用它们来了解更多细节。您应该考虑花时间探索这些链接，以便更熟悉数据库系统的细节。\n\
  \n我们将从顶部底部分部分检查对话框。您可以向下滚动查看创建数据库系统对话框的其他部分。图 4-14 显示了第一个部分，它要求填写 compartment、名称和描述。请务必在“在\
  \ compartment 中创建”下拉列表中选择 `oci-tutorial-compartment`，并使用名称 `mysql-test-1`。如果您愿意，可以填写描述。\n\
  \n![图 4-14](img/527055_1_En_4_Fig14_HTML.png)\n*图 4-14 创建数据库系统（第 1 部分）*\n\n向下滚动到下一个部分，它要求填写数据库系统的类型和\
  \ MySQL 管理员凭据。为数据库系统类型选择 *独立* 选项，使用 `mysql_admin` 作为用户名并提供一个密码。请务必遵循密码限制，并再次输入密码进行验证。图\
  \ 4-15 显示了已选择和输入数据的部分。\n\n![图 4-15](img/527055_1_En_4_Fig15_HTML.png)\n*图 4-15 创建数据库系统（第\
  \ 2 部分）*\n\n一旦添加了这些信息，向下滚动到下一个部分，即 *配置网络* 部分，如图 4-16 所示。在这里，我们希望确保在“虚拟云网络位于 oci-tutorial-compartment”列表中选择了\
  \ `oci-tutorial-vcn`，并且在“子网位于 oci-tutorial-compartment”列表中选择了 `Private Subnet oci-tutorial-vcn\
  \ (Regional)` 条目。如果您看不到这些条目，可以使用“更改 Compartment”链接来更改 compartment。\n\n![图 4-16](img/527055_1_En_4_Fig16_HTML.png)\n\
  *图 4-16 创建数据库系统（第 3 部分）*\n\n一旦您验证了这些条目，向下滚动到下一节，即可用性域的放置位置。在这里，选择哪个可用性域并不重要，但既然我们迄今为止一直使用\
  \ *AD-2*，请继续选择它，如图 4-17 所示。\n\n![图 4-17](img/527055_1_En_4_Fig17_HTML.png)\n*图 4-17\
  \ 创建数据库系统（第 4 部分）*\n\n选择了 AD-2 后，向下滚动到下一节，即 *配置硬件* 部分。在这里，我们可以选择更改形状以及更改数据存储的大小，如图\
  \ 4-18 所示。由于我们是在练习创建数据库系统，我们将使用如图所示的默认值。在这种情况下，它是一个小型的虚拟机形状，具有 8 GB RAM 和附加的 50\
  \ GB 块存储用于数据。正如您所推测的，创建和配置数据库系统的过程包括配置块卷、附加、连接并将块卷挂载到某个文件夹。\n\n![图 4-18](img/527055_1_En_4_Fig18_HTML.png)\n\
  *图 4-18 创建数据库系统（第 5 部分）*\n\n向下滚动到下一节，通过选择备份计划来选择自动备份。备份计划简单来说就是备份的频率和类型。我们将在第 5\
  \ 章中了解更多关于备份的信息。目前，我们可以关闭备份功能，如图 4-18 所示。我们不需要备份，因为我们不会创建任何数据，也不会出于任何保留目的配置数据库。当您确认输入的数据后，点击\
  \ *创建* 按钮来创建数据库系统。这将引导您进入数据库系统详细信息页面。\n\n![图 4-19](img/527055_1_En_4_Fig19_HTML.png)\n\
  *图 4-19 创建数据库系统（第 6 部分）*\n\n点击按钮后，数据库系统的创建、设置和配置过程将开始，`创建数据库系统` 工作请求（也称为工作流）将启动。这可能需要一段时间，所以如果没有立即发生任何事情或您认为它可能卡住了，请不要惊慌。就像我们在其他资源中看到的那样，一旦开始创建，您将被定向到资源详细信息页面。在这种情况下，您应该会看到类似于图\
  \ 4-20 的数据库系统详细信息页面。请注意，数据库系统仍处于 `正在创建` 状态。\n\n![图 4-20](img/527055_1_En_4_Fig20_HTML.jpg)\n\
  *图 4-20 数据库系统详细信息页面（正在创建）*\n\n您可以通过向下滚动到 *资源* 菜单，然后点击 *工作请求* 以查看 *工作请求* 部分（如图 4-21\
  \ 所示）来检查初始配置数据库系统的工作流状态。在这里，我们可以看到所有已运行或正在运行的工作请求（工作流）。如您所见，初始工作流仍在运行，并且可能会持续一段时间。\n\
  \n![图 4-21](img/527055_1_En_4_Fig21_HTML.png)\n*图 4-21 数据库系统详细信息页面（工作请求列表）*\n\n\n\
  工作流完成后，数据库系统的图标将变为绿色，状态将更改为 `ACTIVE`，并且工作流将显示为完成。此过程可能需要几分钟才能完成。让我们进一步了解数据库系统详情页面。\n\
  \n### 数据库系统详情页面\n\n这是一个更仔细查看数据库系统详情页面的好机会。图 4-22 展示了我们将要探索的各个部分的地图。您可能在其他资源页面中见过其中一些部分，因此布局应该不足为奇。我们不会逐一详述每个部分的所有细节，而是花些时间了解每个部分的功能以及可为您提供哪些数据。\n\
  \n![](img/527055_1_En_4_Fig22_HTML.png)\n\n页面显示 o c i 教程 my s q l 的数据库系统详情，包括常规信息、数据库系统配置、备份、删除计划等。下表显示了工作请求。\n\
  \n图 4-22\n\n数据库系统详情页面（功能图）\n\n图中标识了三个区域。这些区域包括以下内容。我们将在后续章节中更详细地查看每个部分。列表中的编号对应于图中的编号点：\n\
  \n1.  状态与按钮\n2.  资源菜单\n3.  数据库系统信息与标签\n\n#### 状态与按钮\n\n详情页面的状态与按钮部分与其他 OCI 资源详情页面类似。即，左侧是一个图标，通过颜色和图标下方写的状态值来描述资源的状态。图标右侧是一组用于数据库系统常见操作的按钮，如图\
  \ 4-23 所示。\n\n![](img/527055_1_En_4_Fig23_HTML.jpg)\n\n页面显示 o c i 教程 my s q l 的数据库系统详情，包括常规信息和数据库系统配置。右上角的更多操作按钮显示删除、添加标签等操作。\n\
  \n图 4-23\n\n状态与按钮，操作菜单\n\n数据库系统可能有几种状态。表 4-1 显示了状态列表以及图标的颜色。\n\n表 4-1\n\n数据库系统状态与图标颜色\n\
  \n| 图标颜色 | 状态 | 描述 |\n| --- | --- | --- |\n| 灰色 | `INACTIVE` | 数据库系统已通过控制台或 API\
  \ 中的停止或重启操作关闭。 |\n| 红色 | `DELETED` | 数据库系统已被删除且不再可用。 |\n|  | `FAILED` | 错误情况阻止了数据库系统的创建或持续运行。\
  \ |\n| 黄色 | `CREATING` | 数据库系统正在预留资源、启动并创建初始数据库。配置可能需要几分钟。您尚不能使用该系统。 |\n|  | `UPDATING`\
  \ | 数据库系统正在启动、停止、重启或更新与数据库系统关联的复制通道。 |\n|  | `DELETING` | 数据库系统正在通过控制台或 API 中的终止操作被删除。\
  \ |\n| 绿色 | `ACTIVE` | 数据库系统已成功创建。 |\n\n按钮用于执行以下操作：\n\n*   `编辑`：对于活动的数据库系统，更改其名称和描述。对于非活动的数据库系统，可以更改其配置形状。\n\
  *   `启动`：启动已停止或非活动的数据库系统。请注意，对于活动的数据库系统，此按钮呈灰色（不可操作）。\n*   `停止`：停止活动的数据库系统。\n* \
  \  `重启`：停止然后启动数据库系统。\n*   `更多操作`：对数据库系统执行资源特定的操作。\n\n如果您正在按照本教程操作并希望稍后停止以完成本章，您可能希望停止数据库系统以避免产生任何执行成本。对于非活动的数据库系统，您仍会产生成本，但低于活动状态。要停止数据库系统，请单击\
  \ `停止` 按钮，并可选择更改停止类型。系统会提示您选择快速、慢速等选项，但您应选择默认选项。数据库系统停止后，其图标将变为黄色，并显示状态 `INACTIVE`。\n\
  \n`更多操作` 菜单包含以下操作。其中一些操作可能在下一部分定义的各种资源窗格中可用（重复）。例如，您可以在查看现有备份列表时创建新备份。\n\n我们不会在本章中涵盖所有这些操作，将解释留待后续章节。我们将在第\
  \ 5 章介绍备份操作，在第 7 章介绍高可用性选项，在第 8 章介绍 HeatWave：\n\n*   `编辑备份计划`：启用或禁用自动备份。\n*   `创建手动备份`：创建数据库系统的备份。\n\
  *   `启用高可用性`：将独立数据库系统更改为启用高可用性的数据库系统。\n*   `禁用崩溃恢复`：启用或禁用崩溃恢复。禁用崩溃恢复可以提高性能，但也会关闭自动备份。请谨慎使用。\n\
  *   `添加 HeatWave 集群`：向 HeatWave 配置添加另一个集群（仅对启用了 HeatWave 的数据库系统有效）。\n*   `创建通道`：创建一个复制通道，用于接受来自另一个源的复制数据。有关此高级主题的更多详细信息，请参见第\
  \ 7 章。\n*   `更新存储大小`：更改 MySQL 数据的存储大小。\n*   `编辑 MySQL 版本`：如果数据库系统运行的 MySQL 版本低于\
  \ OCI 中可用的版本，您可以选择将数据库系统更新为使用最新版本的 MySQL。\n*   `添加标签`：添加一个或多个用户定义的标签，这些标签将显示在 `标签`\
  \ 选项卡中。\n*   `删除`：终止数据库系统并删除其所有资源。\n\n接下来，让我们查看 `资源` 菜单及其选项。\n\n#### 资源菜单\n\n资源菜单用于将详情页面底部部分（窗格）更改为几种资源视图之一，如图\
  \ 4-24 所示。某些视图包含用于过滤视图的筛选部分。可用于查看和交互的资源包括指标、复制端点、HeatWave 集群、备份、通道和工作请求。我们将在以下部分看到每种资源的示例：\n\
  \n![](img/527055_1_En_4_Fig24_HTML.jpg)\n\n一个资源菜单显示指标、端点、heatwave、备份、通道和工作请求。\n\n\
  图 4-24\n\n资源菜单\n\n##### 指标\n\n诊断性能和相关问题最强大的工具之一是从系统收集的指标。MySQL 包含一长串您可以通过性能模式视图和\
  \ MySQL 其他地方监控的内容。然而，其中大部分信息由 OCI 管理。幸运的是，您仍然可以查看许多此类性能指标的图形表示，以及数据库系统重要的 OCI 相关性能指标。\n\
  \n当您单击菜单中的 `指标` 时，您将看到以网格形式显示的各种指标计数器，如图 4-25 所示。这些指标包括连接、语句、CPU、内存、网络延迟、磁盘利用率和备份的指标。\n\
  \n![](img/527055_1_En_4_Fig25_HTML.png)\n\n一个窗口显示资源选项卡，其中选择了指标。它显示了 2022 年 3 月 30\
  \ 日 17:20 至 18:15 期间，当前连接和活动连接随时间变化的 2 个图表。\n\n图 4-25\n\n指标资源窗格（数据库系统）\n\n请注意，指标资源窗格左侧有一个筛选器，可用于显示所有指标或将视图限制为数据库系统或备份。\n\
  \n随着您对数据库系统越来越熟悉并开始在生产环境中使用它们，您可能希望访问此资源窗格以了解您的数据库系统随时间推移的性能表现。\n\n\n\n## 端点\n\n\
  端点是数据库系统的连接点。您可以将它们用于高级复制操作（我们将在第 7 章中看到），或者用于从其他进程或系统连接到 MySQL。\n\n当您在菜单中点击 `Endpoints`\
  \ 时，您将看到已创建的端点列表，如图 4-26 所示。该列表将显示端点的主机名、其状态、IP 地址、MySQL 端口以及操作模式。请注意，在我们教程数据库系统的端点列表中，唯一的条目是您可以用于从\
  \ VCN 连接到 MySQL 的 IP 地址。我们将在下一节中看到如何使用此端点。\n\n![](img/527055_1_En_4_Fig26_HTML.png)\n\
  \n一个窗口显示了资源选项卡，其中选择了端点。它显示了主机名列表，包含状态、IP 地址、MySQL 端口和模式。\n\n图 4-26\n\n端点资源窗格（数据库系统）\n\
  \n## HeatWave\n\nHeatWave 资源窗格用于显示有关 HeatWave 配置中集群的信息。当您在菜单中点击 `HeatWave` 时，您将看到已创建集群的列表。由于我们在创建数据库系统时未启用\
  \ HeatWave，我们将看到一条说明此情况的消息，如图 4-27 所示。我们将在第 8 章更详细地介绍 HeatWave。\n\n![](img/527055_1_En_4_Fig27_HTML.png)\n\
  \n一个窗口显示了资源选项卡，其中选择了 heat wave。它显示了 heat wave 集群信息。\n\n图 4-27\n\nHeatWave 资源窗格（数据库系统）\n\
  \n## 备份\n\n备份是 OCI 中的特殊实体，包含所有数据的备份以及 MySQL 配置。就像为您的电脑备份一样，您可以使用备份将数据库系统恢复到备份时的状态。备份是维护数据完整性的重要工具。我们将在第\
  \ 5 章更详细地介绍备份。\n\n当您在菜单中点击 `Backups` 时，您将看到适用于该数据库系统的可用备份列表。该列表将显示名称、状态、创建类型（完全、增量）、保留天数、大小以及创建日期，如图\
  \ 4-28 所示。请注意，此资源窗格包含一个过滤器，可让您按 compartment（范围）过滤列表。\n\n![](img/527055_1_En_4_Fig28_HTML.png)\n\
  \n一个窗口显示了资源选项卡，其中选择了备份。它显示了 o c i tutorial compartment 中的备份。自动备份已禁用。下方的表格显示了备份列表。\n\
  \n图 4-28\n\n备份资源窗格（数据库系统）\n\n## 通道\n\n通道用于复制中，以允许数据从/到其他系统（包括数据库系统）传输。我们将在第 7 章了解更多关于通道的信息。\n\
  \n当您在菜单中点击 `Channels` 时，您将看到与该数据库系统关联的通道列表，包括名称、源、目标、状态、详细信息、是否启用以及创建日期。\n\n![](img/527055_1_En_4_Fig29_HTML.png)\n\
  \n一个窗口显示了资源选项卡，其中选择了通道。表格显示未找到项目。创建通道按钮位于右上角。\n\n图 4-29\n\n通道资源窗格（数据库系统）\n\n## 工作请求\n\
  \n回想一下我们之前创建数据库系统时的情况，工作请求是 OCI 内部运行的一个或多个进程，用于在数据库系统上执行某些操作。这些操作可以包括备份、编辑（更新）数据库系统、停止、重启等。\n\
  \n当您在菜单中点击 `Work Requests` 时，您将看到工作请求列表出现在右侧窗格中，如图 4-30 所示。这将包括所有过去的工作请求以及任何当前活动的请求。该列表显示操作（工作请求名称）、状态、进度条、完成百分比、OCI\
  \ 接受工作请求的时间、开始日期以及完成日期。\n\n![](img/527055_1_En_4_Fig30_HTML.png)\n\n一个窗口显示了资源选项卡，其中选择了工作请求。表格显示了操作创建\
  \ d b system 的活动。\n\n图 4-30\n\n工作请求资源窗格（数据库系统）\n\n如果列出了工作请求，您可以在上下文菜单（行右侧垂直堆叠的三个点）上操作以管理工作请求并查看详细信息。\n\
  \n现在，让我们看一下详细信息页面中心显示的数据库系统信息。\n\n## MySQL 数据库系统信息和标签\n\n在数据库系统详细信息页面的中心有两个选项卡：一个用于显示处理数据库系统的关键元数据的\
  \ `Information`（信息），另一个用于显示为数据库系统创建的标签或标记（包括系统生成和用户定义的标签）的 `Tags`（标签）。让我们分别看看这些选项卡。\n\
  \n\n### DB 系统信息标签页\n\n详情页中心的大片区域包含大量重要信息。这些细节被分为以下几个部分进行描述。描述中包含了您可能在某些操作中需要使用的键值或参数。图\
  \ 4-31 展示了示例数据库系统的摘录，供您对照列表定位所描述的信息。\n\n![](img/527055_1_En_4_Fig31_HTML.png)\n\n\
  一个 `DB` 系统信息标签页，包含常规信息、`DB` 系统配置、备份、删除计划、维护、Heatwave、高可用性、网络和端点。\n\n图 4-31\n\nDB\
  \ 系统信息标签页\n\n`DB 系统信息` 标签页按分区显示以下信息。请注意，部分数据以链接形式呈现。这些链接可用于导航到该资源或对象的详情页，或作为运行常见操作的快捷方式。\n\
  \n*   *常规信息*: 显示 `OCID` 及其复制到剪贴板的链接、描述（您创建 `DB 系统` 时提供）、`DB 系统` 所在的 compartment\
  \ 以及创建日期。`OCID` 是此部分最重要的信息，因为您可能需要在某些高级操作和功能中使用它。\n\n*   *DB 系统配置*: 显示关于 `DB 系统`\
  \ 的信息，包括其形态、内存和存储大小、MySQL 版本和配置，以及是否启用了崩溃恢复。存储大小旁边的编辑链接是更改 `DB 系统` 存储大小的快捷方式。\n\n\
  *   *备份*: 显示是否启用了自动备份、备份的保留天数以及运行自动备份的时间窗口。启用/禁用链接是启用或禁用自动备份的快捷方式。\n\n*   *删除计划*:\
  \ 显示 `DB 系统` 的删除计划，包括是否已启用、自动备份的保留时间以及最终备份的状态。启用/禁用链接是启用或禁用删除计划的快捷方式。\n\n*   *维护*:\
  \ 显示 `MDS` 下一个维护周期的开始时间。这是自动升级和更新将发生的时间。您可以用它来安排或延迟关键操作，以确保应用程序平稳运行。\n\n*   *HeatWave*:\
  \ 显示关于 `HeatWave` 集群的信息。更多详情请参见 `第 8 章`。\n\n*   *高可用性*: 显示高可用性配置的信息。更多详情请参见 `第 7\
  \ 章`。\n\n*   *网络*: 显示 `DB 系统` 所连接的 `VCN`、子网和子网类型。连接服务时可能需要参考此信息。\n\n*   *端点*: 显示\
  \ `DB 系统` 在 `VCN` 上使用的私有 `IP` 地址、完全限定域名 (`FQDN`)、可用性域、故障域以及配置的 MySQL 端口，并提供了一个有用的链接，指向有关如何连接到\
  \ `DB 系统` 的文档。我们将在下一节探讨该主题。您需要从此部分获取的关键信息包括私有 `IP` 地址（使用复制链接将其复制到剪贴板）。在规划连接和其他功能时，一目了然地查看可用性域和故障域也可能很有帮助。\n\
  \n### 标签标签页\n\n接下来是界面的标签页部分，如图 4-32 所示。在这里，我们将看到 `DB 系统` 的所有标签，包括任何 `OCI` 生成的标签以及用户定义的标签。请注意，我们有两个\
  \ `OCI` 生成的标签和一个用户定义的标签。您可以通过点击“`Defined Tags`”或“`Free-form Tags`”标签在这些列表之间切换。\n\
  \n您可以使用“`More Actions`”菜单并选择“`Add Tags`”来创建用户定义的标签。请注意，标签名称不允许包含空格或任何不可打印的字符 (`ASCII`)。\n\
  \n请注意图中标签旁边有一个小铅笔图标。如果铅笔图标是启用状态（未灰显），您可以点击它来编辑标签。\n\n![](img/527055_1_En_4_Fig32_HTML.jpg)\n\
  \n一个对话框，其中显示了从数据库系统中选择的标签。列出了两个已定义的标签。\n\n图 4-32\n\nDB 系统标签标签页\n\n现在，让我们看看 `DB 系统`\
  \ 最常见的操作：停止和启动。\n\n提示\n\n有关 `DB 系统` 详情页上可用资源和操作的更多详情，请参见 [`https://docs.oracle.com/en-us/iaas/mysql-database/doc/managing-db-system.xhtml`](https://docs.oracle.com/en-us/iaas/mysql-database/doc/managing-db-system.xhtml)。\n\
  \n### 停止和启动 DB 系统\n\n如果您还记得前面讨论的“`More Actions`”菜单，您可以停止和启动 `DB 系统`。如果您在一段时间内不使用或不打算使用\
  \ `DB 系统`，停止它可能是个好主意。停止 `DB 系统` 将减轻您账户的费用负担。由于您分配了可计费资源，您仍将被收取少量费用，但您不会为空闲的计算实例付费。如果您计划跟随下一节操作，则无需停止\
  \ `DB 系统`。但是，如果您计划稍后再回来，您应该停止 `DB 系统`，并在准备好继续教程时再次启动它。\n\n要停止 `DB 系统`，您可以使用“`More\
  \ Actions`”按钮菜单选择“`Stop`”。同样地，要启动已停止的 `DB 系统`，您可以使用操作按钮菜单并选择“`Start`”。两项操作都需要一些时间才能完成，但\
  \ `DB 系统` 的状态会相应改变，您可以查看工作请求列表以检查其进度。\n\n现在我们已经创建了 `DB 系统`，您可能想知道如何像在 `第 4 章` 中连接安装在\
  \ `PC` 上的 MySQL 服务器那样连接到它。正如您将看到的，根据我们的需求，可以使用几种机制。\n\n## 连接到您的 DB 系统\n\n连接到您的 MySQL\
  \ `DB 系统` 与连接您安装在 `PC` 或本地网络中的 MySQL 服务器不同。回想一下，`DB 系统` 是在 `VCN` 中创建的，更具体地说，是在一个私有子网中。这意味着\
  \ `DB 系统` 只能被同样连接到或有权访问该私有子网的机器访问。因此，没有额外的步骤，您无法从 `PC` 直接连接到您的 `DB 系统`。实际上，有几种机制可用于连接到\
  \ `DB 系统`。我们将在本节中了解这些机制。\n\n注意\n\n准备连接方法可能需要一些时间，因为您需要完成各个步骤。如果您在上一节中创建了 `DB 系统`\
  \ 并跟随本教程操作，可以让 `DB 系统` 保持运行。但是，如果您想先阅读本部分，稍后再实践，您应该停止 `DB 系统` 以减少成本，并在准备连接时启动它。\n\
  \n\n### 连接机制\n\n连接到您的数据库系统的机制包括以下几种。每种都附有简要概述。正如您将看到的，有些设置起来非常简单，而另一些则更为复杂。幸运的是，选项足够多，几乎可以满足任何需求。可能还有其他更高级的机制，但这些是演示和文档中最常见的。\n\
  \n在所有情况下，您用于连接到 MySQL 的工具包括常规工具，例如较旧的 `mysql` 客户端、MySQL Shell 或 MySQL Workbench。有关可用于连接到数据库系统的工具的更多信息，请参阅\
  \ [`https://docs.oracle.com/en-us/iaas/mysql-database/doc/connecting-db-system.xhtml`](https://docs.oracle.com/en-us/iaas/mysql-database/doc/connecting-db-system.xhtml)：\n\
  \n*   `计算实例`：使用位于公共子网中的 VCN 里的计算实例。通过登录到计算实例，然后运行一个 MySQL 客户端来连接到数据库系统。这模拟了应用服务器如何用于托管您的应用程序并与数据库系统通信的方式。\n\
  \n*   `Bastion 会话`：使用 Bastion 服务（一种 OCI 资源），它为那些没有公共端点的受目标资源提供受限且有时限的访问。您可以授权用户从特定\
  \ IP 地址使用 SSH 通过几种选项之一连接到目标资源。例如，您可以创建一个端口转发会话（也称为 SSH 隧道），并通过 Bastion 会话使用它来将 MySQL\
  \ 客户端连接到您的数据库系统。\n\n*   `VPN 连接`：使用站点到站点 VPN、FastConnect（一种 OCI 资源）^(⁸) 或 OpenVPN\
  \ 访问服务器^(⁹) 将您的本地网络与您的 OCI VCN 桥接。更多信息，请访问 OCI 文档 ([`https://docs.oracle.com/en-us/iaas/Content/home.htm`](https://docs.oracle.com/en-us/iaas/Content/home.htm))\
  \ 并使用目录菜单导航到 `数据管理` | `MySQL 数据库` | `网络设置` | `VPN 连接` 以了解更多详情。\n\n*   `OpenVPN 访问服务器`：配置\
  \ OpenVPN 访问服务器以将您的本地网络连接到您的 VCN。更多信息，请访问 OCI 文档 ([`https://docs.oracle.com/en-us/iaas/Content/home.htm`](https://docs.oracle.com/en-us/iaas/Content/home.htm))\
  \ 并使用目录菜单导航到 `数据管理` | `MySQL 数据库` | `网络设置` | `OpenVPN 访问服务器` 以了解更多详情。\n\n**提示**\n\
  有关网络和数据库系统的更多信息，请参阅位于 [`https://docs.oracle.com/en-us/iaas/mysql-database/doc/networking-setup-mysql-db-systems.xhtml`](https://docs.oracle.com/en-us/iaas/mysql-database/doc/networking-setup-mysql-db-systems.xhtml)\
  \ 的网络设置文档。\n\n让我们看几个选项来完成我们关于数据库系统的教程。我们将看到如何使用计算实例并创建一个 Bastion 会话，将我们 PC 上的 MySQL\
  \ 客户端连接到我们的数据库系统。\n\n### 通过计算实例连接\n\n这种机制是最容易使用的，并且为试验或了解 MDS 和数据库系统提供了最快的方法。在这种情况下，我们只需创建一个计算实例，并将其放在与数据库系统相同的\
  \ compartment 中。我们将其放在数据库系统所在 VCN 的同一个公共子网中。\n\n**提示**\n如果您跳过了第 2 章的教程，您可能需要返回该教程以查看创建计算实例所需的步骤。\n\
  \n如果您在第 2 章中创建了计算实例并且仍然可用，只要它在同一个 VCN 的公共子网中，您就可以使用它来连接到您的数据库系统。我们将总结一下步骤，以防您需要创建一个新的计算实例。\n\
  \n#### 创建计算实例\n\n创建计算实例的步骤总结如下。如果您需要重温该教程以了解过程中每个步骤的更多信息，请参阅第 2 章。用于输入或选择的值显示在括号中：\n\
  \n1.  打开云控制台主菜单，选择 `计算` | `实例`，然后点击 `创建实例` 按钮。\n\n2.  给实例起一个名字 (`connection-instance`)。\n\
  \n3.  验证正确的 compartment (`oci-tutorial-compartment`)。从列表中选择正确的 compartment。\n\n\
  4.  验证是否选择了正确的 VCN (`oci-tutorial-vcn`)。点击 `编辑` 按钮可以更改 VCN。\n\n5.  点击 `保存私钥` 按钮下载私钥。\n\
  \n6.  （可选）将私钥复制到您的 `~/.ssh` 文件夹并更改文件权限（例如，`chmod 400 ~/.ssh/ssh-key-2022-04-01.key`）。\n\
  \n7.  点击创建按钮。\n\n最后，等待计算实例配置完成并将状态设置为 `ACTIVE`。回想一下，您可以在计算实例详细信息页面上的 `工作请求` 窗格中跟踪创建计算实例\
  \ (`创建实例`) 的工作请求进度。\n\n\n\n### 修改 VCN – 为私有子网创建入站规则\n\n对于我们的虚拟云网络（VCN），还需要完成一项操作。我们需要在私有子网中创建一条入站规则，以允许来自公有子网的连接。具体来说，就是要允许\
  \ VCN 公有子网上的新计算实例连接到 VCN 私有子网上的数据库系统。之前运行 VCN 设置向导时并未自动完成此配置，但操作非常简单。\n\n首先，点击云控制台主导航菜单，然后选择\
  \ `网络` | `虚拟云网络`，导航至 VCN。接着，点击您的 VCN（`oci-tutorial-vcn`）。\n\n在 VCN 详情页面，点击左侧`资源`菜单中的`子网`条目，然后点击私有子网（`Private\
  \ Subnet-oci-tutorial-vcn`），如图 4-33 所示。或者，您也可以点击私有子网右侧的上下文菜单并选择`查看详细信息`。\n\n![](img/527055_1_En_4_Fig33_HTML.png)\n\
  \n一个带有资源菜单的窗口，其中左侧选中了子网。一个表格列出了 oci 教程 compartment 中的子网。创建子网按钮位于顶部。\n\n图 4-33\n\n\
  选择私有子网（VCN）\n\n接下来，我们需要创建入站规则。在私有子网详情页面，点击左侧`资源`菜单中的`安全列表`条目，然后点击安全列表，如图 4-34 所示。或者，您也可以点击私有子网右侧的上下文菜单并选择`查看详细信息`。\n\
  \n![](img/527055_1_En_4_Fig34_HTML.png)\n\n一个带有资源菜单的窗口，其中左侧选中了安全列表。一个表格列出了安全列表，其中一项在矩形框中高亮显示。\n\
  \n图 4-34\n\n选择安全列表（私有子网）\n\n接着，在入站规则列表下方，点击`添加入站规则`按钮，如图 4-35 所示。\n\n![](img/527055_1_En_4_Fig35_HTML.png)\n\
  \n顶部是一个带有添加入站规则、编辑和移除按钮的表格。列标题为：无状态、源、IP 协议、源和目标端口范围、类型和代码、允许以及描述。\n\n图 4-35\n\n\
  添加入站规则（私有子网安全列表）\n\n将打开一个对话框，您可以在其中填写数据。至少需要输入 CIDR（`10.0.0.0/16`）、目标端口（`3306, 33060`）以及（可选）描述（`MySQL\
  \ 入站规则`）。填写完数据后，可以点击`添加入站规则`按钮，如图 4-36 所示。请注意，您可以点击`+ 另一条入站规则`按钮在此对话框中添加更多入站规则。\n\
  \n![](img/527055_1_En_4_Fig36_HTML.png)\n\n一个用于添加入站规则的对话框。其中源 CIDR、目标端口范围和描述字段被高亮显示。填写详细信息后，点击底部的添加入站规则按钮。\n\
  \n图 4-36\n\n为 MySQL 创建入站规则\n\n这将为我们的计算实例（位于 VCN 的公有子网）与数据库系统（位于 VCN 的私有子网）之间创建一个通信通道，但仅限于通过端口\
  \ 3306 和 33060 进行通信。现在，我们可以继续下一步了。\n\n**注意**\n\nMySQL 的入站规则只需添加一次。在您手动移除之前，它将一直保持生效。\n\
