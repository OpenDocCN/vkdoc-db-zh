  \n\n## 启用高可用性（现有数据库系统）\n\n在现有数据库系统上启用高可用性，可以通过以下方式完成：在`数据库系统列表`上使用上下文菜单选择`启用高可用性`，从`更多操作`菜单中选择`启用高可用性`，或者在`数据库系统详情页面`的高可用性部分点击`启用`链接，如图\
  \ 8-5 所示。\n\n![](img/527055_1_En_8_Fig5_HTML.jpg)\n数据库系统详情页面有一个高可用性菜单，显示高可用性为已禁用状态。超链接“启用”已高亮显示。\n\
  图 8-5：启用高可用性（数据库系统详情页面）\n\n一旦点击`启用`，您将看到一个对话框，解释 MDS 将如何把您的独立数据库系统转换为高可用性数据库系统。图\
  \ 8-6 展示了启用高可用性的对话框。\n\n![](img/527055_1_En_8_Fig6_HTML.jpg)\n一个“启用高可用性”对话框，包含 4\
  \ 到 5 行关于数据库系统的文本。“启用”按钮位于左下角并已高亮。\n图 8-6：启用高可用性对话框（现有数据库系统）\n\n当您确定要继续时，可以点击`启用`按钮。结果将与前面创建高可用性数据库系统的示例相同。\n\
  \n**注意**\n虽然独立数据库系统支持时间点恢复，但高可用性数据库系统不支持。因此，您可能需要关闭时间点恢复才能在独立数据库系统上启用高可用性。\n\n但是，如果您用于独立数据库系统的形状与\
  \ MDS 高可用性不兼容，您将看到一个对话框，可以在其中选择不同的形状。只需从下拉列表中选择一个形状，然后点击`启用`按钮。您的数据不会被擦除，但您可能会因新形状产生额外费用。\n\
  \n![](img/527055_1_En_8_Fig7_HTML.png)\n一个“启用高可用性”对话框，包含几行关于数据库系统的文本。配置从滚动框中选择。“启用”按钮位于左侧并已高亮。\n\
  图 8-7：启用高可用性时更改形状（现有数据库系统）\n\n此过程可能需要一些时间运行，因此请耐心等待，直到高可用性功能在您的数据库系统上启用。\n\n**注意**\n\
  在现有数据库系统上启用高可用性会增加成本，因为您将添加两个额外的数据库系统以及用于副本的数据存储。幸运的是，高可用性功能支持所产生的任何额外网络负载不会计费。\n\
  \n## 禁用高可用性（现有高可用性数据库系统）\n\n令人惊讶的是，您可以在现有的高可用性数据库系统上禁用高可用性。只需在`数据库系统详情页面`的高可用性部分选择`禁用`链接，如图\
  \ 8-8 所示。\n\n![](img/527055_1_En_8_Fig8_HTML.jpg)\n数据库系统详情页面有一个高可用性菜单，显示高可用性为已启用状态。\n\
  图 8-8：禁用高可用性（现有数据库系统）\n\n一旦点击`禁用`，系统会要求您确认操作，如图 8-9 所示。确认后，点击对话框上的`禁用`按钮以在您的数据库系统上禁用高可用性。此操作可能需要一些时间才能完成。\n\
  \n![](img/527055_1_En_8_Fig9_HTML.jpg)\n一个用于禁用高可用性的对话框。文本询问您是否确定要禁用高可用性？如果确定，请选择左下角的“禁用”按钮，该按钮已高亮。\n\
  图 8-9：确认禁用高可用性\n\n## 如何使用 MDS 高可用性\n\n再次说明，故障转移会自动发生，但如果您想执行切换，可以通过在`数据库系统`列表上选择上下文菜单或从菜单中选择`切换`来完成，如图\
  \ 8-10 所示。\n\n![](img/527055_1_En_8_Fig10_HTML.png)\n一个表格列出了数据库系统。“创建数据库系统”按钮位于左上角。点击右侧的点号并从该菜单中选择“切换”。\n\
  图 8-10：选择切换（数据库系统列表）\n\n您也可以在`数据库系统详情页面`使用`更多操作`菜单并选择`切换`，如图 8-11 所示。\n\n![](img/527055_1_En_8_Fig11_HTML.jpg)\n\
  数据库系统的详情页面显示常规信息详情。从选项卡中选择“更多操作”选项，并从菜单中选择“切换”。\n图 8-11：选择切换（数据库系统详情页面）\n\n无论哪种情况，您都会看到一个对话框，需要在其中选择要提升为新的主实例的副本的故障域可用区，如图\
  \ 8-12 所示。\n\n![](img/527055_1_En_8_Fig12_HTML.png)\n一个包含 3 个可用区的切换对话框。AD-1 为主用区，AD-2\
  \ 和 AD-3 为副本区。选择左下角的“切换”按钮。\n图 8-12：切换对话框\n\n一旦您选择了一个不同的可用区并点击`切换`按钮，`数据库系统`的状态将变为`更新中`，并且所选实例将成为主实例。\n\
  \n## 限制\n\n使用高可用性数据库系统存在一些限制，如下所列：\n\n*   **备份**：您无法在高可用性数据库系统上恢复独立数据库系统的备份。\n*\
  \   **高可用性配置**：您无法更改高可用性数据库系统的配置。但是，您可以使用高可用性数据库系统的备份来恢复到具有不同高可用性配置的新高可用性数据库系统。\n\
  *   **HeatWave**：您无法在高可用性数据库系统上使用 HeatWave。\n*   **MySQL 版本**：高可用性数据库系统必须使用 MySQL\
  \ 8.0.24 或更高版本。\n*   **时间点恢复**：您无法在高可用性数据库系统上使用 PITR。\n*   **滚动升级**：高可用性数据库系统升级时，使用滚动升级方式，每个数据库系统（主库和副本）依次升级，在新主库可用之前会有短暂的停机时间。\n\
  *   **副本访问**：您不能直接访问副本实例，无论是使用`MySQL Shell`还是任何其他此类客户端。\n*   **形状**：您必须选择某些可用于高可用性的形状，并且事务的最大大小受形状限制。更多信息请参阅\
  \ [`https://docs.oracle.com/en-us/iaas/mysql-database/doc/high-availability1.xhtml`](https://docs.oracle.com/en-us/iaas/mysql-database/doc/high-availability1.xhtml)\
  \ 中的**限制**部分。\n\n## 高级主题\n\nMDS 的高可用性功能还包括两个值得一提的额外高级主题。如果您现有的本地 MySQL 服务器使用复制，并且您想复制到/从\
  \ MDS 进行复制，您可以使用名为`入站复制`和`出站复制`的功能来实现。\n\n这些功能旨在让您能够创建混合云解决方案，其中您的 MySQL 解决方案的一部分可能在本地，其余部分在\
  \ OCI（MDS）中。这些技术也可用于在本地和 MDS MySQL 服务器之间同步数据。\n\n`入站复制`使用在 MDS 中配置的复制通道，将事务从一个本地\
  \ MySQL 服务器（或位于别处的另一个数据库系统）复制到一个称为`副本`的数据库系统。关于设置入站复制的更多信息，请参见 [`https://docs.oracle.com/en-us/iaas/mysql-database/doc/inbound-replication.xhtml`](https://docs.oracle.com/en-us/iaas/mysql-database/doc/inbound-replication.xhtml)。\n\
  \n`出站复制`则相反。它使用在 MDS 中配置的复制通道，将事务从一个数据库系统复制到一个本地（或位于别处的另一个数据库系统）称为`副本`的系统。该通道将数据库系统（`源`）连接到`副本`，并将事务从源复制到副本。\n\
  \n\n## 总结\n\n实现 MDS 的高可用性非常简单。您可以在创建操作时选择它，也可以在已使用 DB 系统后启用它。无论哪种方式，Oracle 都克服了相当陡峭的学习曲线，使复制能够启动并运行，并随着时间的推移进行管理。\n\
  \n因此，Oracle 在 MySQL 组复制的基础上进行了改进，依托其 OCI 功能集和成功经验，并整合了多项其他功能，以提供一个更易学习、更易维护的高可用性解决方案。事实上，没有理由不在您的\
  \ DB 系统上使用高可用性。虽然由于使用更多资源而成本更高，但可靠性和可用性带来的安心感远超过其微小的增量成本。\n\n在下一章中，我们将看到另外两项技术的概述：OCI\
  \ 命令行界面（CLI）和 OCI 应用程序编程接口（API）。我们已经在第 7 章见过 CLI，但我们将更深入地了解 CLI 的可能性，包括如何编写可用于开发运维（DevOps）任务的特定操作脚本。\n\
  \n## 9. OCI 命令行与应用程序编程界面\n\n到目前为止，本书中我们一直使用基于 Web 的 OCI 控制台来操作 OCI 产品和服务。我们了解了如何设置\
  \ OCI 账户、创建网络服务以及创建和配置 DB 系统。如果您对基于 Web 的控制台感到满意，应考虑继续使用它，因为您需要执行的每项操作都易于查找，并且大部分信息可以在一个页面或带有标签页的页面上找到。\n\
  \n但是，如果您想以 Bash（或类似）脚本文件的形式编写开发运维（DevOps）流程，该怎么办？如果您想用 Python 等编程语言来编写这些脚本呢？进一步地，如果您想将个人电脑配置为仅通过命令行访问来操作\
  \ OCI 中的对象，又该如何？幸运的是，所有这些问题的答案都可以在 OCI 提供的命令行和应用程序编程接口中找到。\n\n在本章中，我们将概述用于操作 OCI\
  \ 和 MDS DB 系统的命令行界面（CLI）和应用程序编程接口（API）的功能。\n\n## 入门指南\n\nOCI 文档的一个优点是，Oracle 经常包含同时涵盖基于\
  \ Web 和 CLI 示例的文本，用于操作其产品和服务。也有一些示例展示了如何使用 API 执行操作，但这些通常只出现在 API 文档中。\n\n您使用 CLI\
  \ 几乎不费吹灰之力。事实上，如果您执行了第 7 章中的示例，您就已经安装了 CLI。回想一下，我们安装 CLI 是因为 MySQL Shell 需要它。然而，当时没有透露的是，CLI\
  \ 是使用 Python OCI API 编写的。所以，如果您安装了 CLI，那么您也同时安装了 Python API。很好！\n\n在第 7 章名为“为 OCI\
  \ CLI 访问配置您的个人电脑”的章节中，我们配置了个人电脑以供 CLI 使用。这至少需要以下配置，这些配置同时适用于 CLI 和 API。如果您尚未配置个人电脑，请参考第\
  \ 7 章中的相应章节来为使用 CLI 和 API 配置您的个人电脑：\n\n*   一个用于签署 API 请求的 SSH 密钥，以及已上传到您 OCI 账户的公钥。\n\
  *   安装在支持操作系统上的`Python 3`。\n\n提示\n有关安装 CLI 的更多信息，请参阅位于 [`https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/cliinstall.htm`](https://docs.oracle.com/en-us/iaas/Content/API/SDKDocs/cliinstall.htm)\
  \ 的 CLI 安装文档。\n\n### 命令行界面（CLI）\n\nOCI CLI 是一个基于 Python 的应用程序，您可以下载并在个人电脑上运行。它代表了基于\
  \ Web 的云控制台的一种替代方案，特别适用于运行重复性任务或您希望通过开发运维（DevOps）工具自动化的任务。\n\n有趣的是，CLI 是使用 OCI API（SDK）构建的，如果您决定使用\
  \ API，它可以向您展示其应用程序可能实现的功能。\n\n#### 安装 CLI\n\n回想一下，我们在第 7 章名为“安装和测试 OCI CLI”的章节中安装了\
  \ CLI。如果您尚未安装 CLI，请参考这些章节来配置您的个人电脑并安装 CLI。\n\n#### 功能\n\nCLI 是 Python API 的宏级接口。因此，许多可用操作执行一系列任务，这些任务通常在\
  \ API 中需要多个方法来完成。幸运的是，CLI 的设计考虑了操作员的需求。因此，这些操作是我们在使用 OCI 产品和服务时所想到的操作。\n\nCLI 的工作原理是提供一个命令列表，每个命令都可以有子命令和参数。CLI\
  \ 的主可执行文件名为`oci`，并以相同的名称调用。一个贴心之处是您无需记住所有的命令列表，因为 CLI 具有上下文帮助功能。例如，您可以不带参数地输入`oci`命令以获取所有命令的更多信息，或使用`oci\
  \ <command>`获取特定命令的帮助。这也适用于子命令。列表 9-1（为简洁起见节选）显示了主命令的帮助信息。\n\n```\nif (condVar >\
  \ someVal) {console.log(\"xxx\")}\n```\n\n\n# OCI 命令行界面帮助\n\n```\nC:\\>oci\n用法：oci\
