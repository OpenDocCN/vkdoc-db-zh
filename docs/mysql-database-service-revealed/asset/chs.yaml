  \ PC。\n\n## 从 MDS 迁移数据\n\n当从 MDS 导入数据时，我们必须选择三种方法之一来将导出的数据移动到 MDS。回顾一下，这些方法包括使用\
  \ ObjectStore 存储桶、将导出的数据上传到中间计算实例，以及通过 Bastion 网关将导出的数据直接上传到我们的 DB 系统。\n\n从 MDS\
  \ 迁移遵循上述相同的机制，只是方向相反。因此，在演示上一节中展示的三种相同机制时，我们只会看到较小的细节。如果你需要更多细节，例如设置 ObjectStore\
  \ 存储桶或 Bastion 服务，请参考前面的章节。\n\n如果你执行了之前的任何示例，请务必在尝试导入之前，通过删除 `sakila` 和 `world`\
  \ 数据库来准备你的本地 MySQL 服务器。\n\n以下各节简要演示了从 MDS 导入数据的每种机制。\n\n### 使用 ObjectStore 存储桶\n\
  \n将数据从 MDS 导入到我们的本地 MySQL 服务器的第一种方法是使用 ObjectStore 作为导出数据的中间存储。我们将使用 DB 系统上的 MySQL\
  \ Shell 创建数据的导出，将其放入 ObjectStore，然后再次使用 MySQL Shell 从我们的本地 MySQL 服务器访问该数据进行导入。\n\
  \n#### 准备你的 PC\n\n如果你尚未执行从 PC 迁移数据到 MDS 的先前示例，请返回并确保你的 PC 和计算实例已使用正确的 OCI API 配置文件和\
