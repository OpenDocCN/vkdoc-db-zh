  \n\n### 示例连接器：Connector/J\n\nOracle 提供的 Java 连接器是一个功能齐全的连接器，它为 Java 应用程序提供了与 MySQL\
  \ 数据库服务器的连接能力。Connector/J 支持所有当前的 MySQL 服务器版本。它是一个功能齐全的连接器，具备创建安全连接所需的所有功能，并支持所有\
  \ MySQL SQL 命令。\n\nConnector/J 必须安装在您将运行代码的电脑上，其安装方式与您可能使用的任何 Java 库相同。在应用程序中使用\
  \ Connector/J 包括导入基础模块、启动连接以及使用游标执行查询。\n\n为了保持简单，我们将使用一种简化的 Java 编程形式来编写和执行示例。更具体地说，我们将使用简单的文本编辑器创建代码文件，并使用\
  \ Java 开发工具包（JDK）来编译代码（`javac`）和执行（`java`）。如果您有使用更强大的 Java IDE 的经验，也可以使用它们。\n\n\
  注意：Java 运行时环境（JRE）与 JDK 不同。即使您安装了 JRE，也必须安装 JDK。\n\n当然，要使用 Connector/J，您需要确保您的电脑上安装了最新版本的\
  \ Java 运行时环境。大多数电脑都安装了 JDK。但是，如果您想检查一下，只需在终端中执行 `javac --version`。如果提示找不到该命令，请访问\
  \ [`www.oracle.com/java/technologies/downloads/`](http://www.oracle.com/java/technologies/downloads/)\
  \ 了解如何在您的电脑上下载和安装 JDK。\n\n注意：您应该使用 8.0 或更高版本的 JDK。\n\n在我们深入探讨如何使用 Connector/J 编写一些支持\
  \ MySQL 数据库的应用程序之前，先来谈谈如何获取和安装 Connector/J。\n\n#### 安装 Connector/J\n\n下载过程与您为服务器发现的过程相同。您可以从\
  \ Oracle 的 MySQL 网站（[`http://dev.mysql.com/downloads/connector/j/`](http://dev.mysql.com/downloads/connector/j/)）下载\
  \ Connector/J。该页面会自动检测您的平台并显示适用于您平台的可用下载项。您可能会看到几个选项。请务必选择与您的配置匹配的选项。但请注意，没有 macOS\
  \ 的安装包。如果您的平台未在列表中显示，您可以使用 *Platform Independent*（平台无关）操作系统选项进行下载。\n\n在本演示中，我们将使用\
  \ *Platform Independent* 选项。我们这样做是为了演示如何使用此选项并从安装目录（文件夹）中使用类，而不是将其安装在系统上。如果您正在一个用于\
  \ Java 开发的系统上工作，以避免干扰您的 IDE 或 Java 安装，您可能希望这样做。\n\n只需从下载页面选择 *Platform Independent*\
  \ 操作系统选项，然后下载 .zip 或 .tar.gz 文件。下载后，将文件复制到您的项目目录并解压缩。例如，如果您有一个名为 `../Ch03/java`\
  \ 的文件夹来存储本节中的示例，您可以将文件解压缩到该目录中。这将在相同路径下生成一个名为 `../Ch03/java/mysql-connector-java-8.0.28`（或者如果您下载了较新版本的连接器，名称可能类似）的文件夹。\n\
  \n要访问该文件夹中的类，我们需要如下设置 `CLASSPATH`，以便能够找到这些类。这是一个临时设置，仅对打开的终端会话有效，不会影响您的 Java 安装。只需记住在运行本节示例之前执行一次此命令。\n\
  \n```\n% cd ../Ch03/java\n% export CLASSPATH=./mysql-connector-java-8.0.28/mysql-connector-java-8.0.28.jar:$CLASSPATH\n\
  ```\n\n提示：有关在某些平台上安装的具体说明，请参阅在线参考手册（[`https://dev.mysql.com/doc/connector-j/8.0/en/connector-j-installing.xhtml`](https://dev.mysql.com/doc/connector-j/8.0/en/connector-j-installing.xhtml)）。\n\
  \n#### 检查安装\n\n安装 Connector/J 后，您可以通过以下简短示例验证其是否正常工作。我们将创建一个名为 `MySQLTest.java`\
  \ 的新代码文件，其中包含一个同名的类。\n\nConnector/J 与 Java 数据库连接性（JDBC）库协同工作。因此，我们不是为连接提供单独的参数，而是构建一个符合\
  \ JDBC 标准的统一资源定位符（URL）。\n\n以下是 MySQL Connector/J 的数据库连接 URL 语法的模拟格式：\n\n*   `host`：MySQL\
  \ 服务器的主机名。默认值为 127.0.0.1。\n*   `port`：MySQL 服务器的端口号。默认值为 3306。\n*   `database`：连接的默认数据库名称。\n\
  *   `failoverhost`：备用数据库服务器的主机名。MySQL Connector/J 在连接失败时支持故障转移。更多细节请参阅在线参考。\n* \
  \  `propertyNameN = propertyValueN`：一个或多个由 & 符号分隔的属性列表（可选）\n\n```\njdbc:mysql://[host][,failoverhost...]\n\
  [:port]/[database]\n[?propertyName1][=propertyValue1]\n[&propertyName2][=propertyValue2]...\n\
  ```\n\n提示：有关 JDBC 的完整教程，请参阅 Oracle 的 JDBC 教程网站 [`https://docs.oracle.com/javase/tutorial/jdbc/basics/index.xhtml`](https://docs.oracle.com/javase/tutorial/jdbc/basics/index.xhtml)。\n\
  \n因此，要使用 localhost 和 MySQL 的默认端口连接到我们本地的 MySQL 服务器，URL 将如下所示：\n\n```\n\"jdbc:mysql://localhost:3306/plant_monitoring?useSSL=false\"\
  ;\n```\n\n请注意，我们省略了用户名和密码。为了连接到服务器，我们将使用 Java 的 `DriverManager` 类来获取连接。我们在调用 `DriverManager`\
  \ 类的 `getConnection()` 方法时将这些作为附加参数提供。\n\n既然我们已经了解了如何建立连接，现在来看一个设计用于测试 Connector/J\
  \ 是否安装的 Java 应用程序示例。在这个例子中，我们尝试使用一个不存在的用户账户进行连接。我们这样做是为了确保会得到 MySQL 访问被拒绝的错误消息。如果它没有出现该特定错误就成功了，我们就知道出了其他问题（它不应该成功）。相反，如果连接产生了不同的错误，我们就知道\
  \ Connector/J 要么未安装（在 `CLASSPATH` 上找不到），要么是其他问题。无论哪种情况，我们都会打印异常信息，以便用户可以确定解决问题的方案。\n\
  \n我们将此逻辑放在 `main()` 方法中。如果安装了 Connector/J，您应该会看到一条错误消息，指出用户（`not_a_user`）无法连接。再次强调，任何其他错误都意味着\
  \ URL 路径无效，或者 Connector/J 未安装。代码清单 3-12 显示了完整的代码。\n\n```\n//\n//  MySQL Database\
  \ Service\n//\n// Chapter 03 - MySQL Test Connector/J\n//\n// This example tests\
  \ installation of Connector/J by attempting to connect\n// to a MySQL server. Be\
  \ sure to get the URL statement connect before\n// compiling and running the test.\n\
  //\n// Dr. Charles Bell\n//\n// Imports\nimport java.sql.Connection;\nimport java.sql.DriverManager;\n\
  import java.sql.SQLException;\n// Class\npublic class MySQLTest {\npublic static\
  \ void main(String[] args) {\n// Connection parameters\nString url = \"jdbc:mysql://localhost:3306/\"\
  \n+ \"plant_monitoring?useSSL=false\";\nString user = \"not_a_user\";\nString password\
  \ = \"SECRET\";\n// Attempt connection\ntry (Connection con = DriverManager.getConnection(url,\
  \ user,\npassword)) {\nSystem.out.println(\"ERROR: Should not connect with \"\n\"\
  'not_a_user'!\");\n} catch (SQLException ex) {\n// Test to see if access denied\
  \ error (expected).\nif (ex.getMessage().contains(\"Access denied\")) {\nSystem.out.println(\"\
  Success!\");\n} else {\n// If Connector/J is not installed, print message.\nSystem.out.println(\"\
  Connector/J is missing.\");\nSystem.out.println(ex.getMessage());\n}\n}\n}\n}\n\
  ```\n\n代码清单 3-12：测试 Connector/J 示例\n\n\n\n# MySQL JDBC 连接与操作示例\n\n一旦你将代码保存在一个名为\
  \ `MySQLTest.java` 的文件中，就可以继续使用以下命令编译并运行它。如果 Connector/J 未安装，你应该会看到如下的错误信息：\n\n\
  ```\n% javac MySQLTest.java\n% java MySQLTest\nConnector/J is missing.\nNo suitable\
