  \ 中的*关键概念和术语*部分。\n\n\n\n## 虚拟化\n\n让我们首先了解虚拟化对于云服务意味着什么。这可能是初学者最难掌握的概念，因为有些人觉得云中没有什么是“真实”的。\n\
  \n简单来说，虚拟化仅仅意味着一项服务、一个功能，甚至硬件，已经被表示为一个独立的实体。在大多数情况下，这意味着所讨论的对象或资源确实作为进程或以某种形式的软件在一个庞大的计算框架中运行。\n\
  \n例如，一个计算资源（可以理解为服务器）可以作为虚拟机在 `虚拟机管理程序栈` 上运行。在其他情况下，它可能意味着一个概念性的、受管理的概念，比如一个虚拟网络，它向用户（你）呈现的方式就好像它是一个物理网络。\n\
  \n此外，一些虚拟资源只是其他虚拟资源的一部分，并非设计为单独使用。例如，一个 `块存储设备` 通常连接到一个计算资源，并通过运行在操作系统之上的操作系统（或平台服务）进行访问。\n\
  \n## 租户\n\n租户是 `OCI` 为特定客户（用户）组织所有资源的方式。当你注册 `OCI` 时，系统会为你的账户分配一个 `租户`。你所有的资源、账单等都将与你的\
  \ `租户` 相关联。你 `租户` 中的资源无法与其他 `租户` 中的资源交互（除非配置了额外的资源来授予访问权限），并且你只能管理位于你 `租户` 中的那些资源。\n\
  \n## 隔离区\n\n`隔离区` 是你 `租户` 的另一个组织层级。你可以创建 `隔离区` 来容纳一组相关的资源。对 `隔离区` 中资源的访问由你授予特定权限的用户组来定义。因此，`隔离区`\
  \ 是一个虚拟或逻辑上的分组（而非物理分组）。有趣的是，当你使用 `OCI 云控制台` 时，你可以使用 `隔离区` 来筛选要查看的资源。\n\n一个 `租户`\
  \ 可以被视为你云资源的“根” `隔离区`，并且一旦你创建了一个 `隔离区`，创建的任何资源都需要你选择该资源将驻留于其中的 `隔离区`。\n\n**提示**\n\
  为初学者简化起见，建议你在适应使用 `OCI` 之后再创建多个 `隔离区`。添加 `隔离区` 及其安全配置文件可能会使学习曲线更陡峭且更容易出错。\n\n当你创建一个\
  \ `隔离区` 时，它就与你的 `租户` 关联起来。你可以根据需要创建多个 `隔离区`。每个 `隔离区` 都通过特定于该 `隔离区` 的访问策略进行控制，允许你限制用户组的访问，确保他们只能访问他们需要的资源。因此，当你处理多个\
  \ `隔离区` 时，必须仔细考虑如何为你用户对 `隔离区` 资源的访问进行授权（或限制）。\n\n#### 安全区\n\n每个 `隔离区` 都有一个 `安全区`\
  \ 或 `安全区配置文件`。当创建一个 `隔离区` 并添加资源时，`OCI` 将使用 `安全区` 策略来验证所有针对这些资源的操作。如果操作受到限制（验证失败），该操作将被拒绝。我们将在下一节通过设置免费试用\
  \ `OCI` 账户的演练来了解更多关于安全性的内容。\n\n#### OCI 资源分配\n\n你可能想知道所有这些 `OCI` 资源存放在哪里，甚至它们是如何组织的。`OCI`\
  \ 资源按物理和逻辑分组进行组织。`OCI` 资源可能位于一个或多个称为 `区域` 的本地数据中心，或在其中分布，这些中心具有一个或多个物理布局（地理隔离的硬件、电力、冷却等），称为\
  \ `可用域`，然后再细分为物理上相邻（同一机架）的分组，称为 `故障域`。以下尝试解释 `OCI` 内部的资源组织方式：\n\n*   **区域**：由一个或多个数据中心组成的局部地理区域。在每个\
  \ `区域` 内，资源被分配到一个或多个 `可用域`，这允许进行额外的组织。所有资源要么是 `区域` 特定的（例如，虚拟网络），要么是 `可用性` 特定的（例如，存储和计算资源）。\n\
  \n*   **可用域 (AD)**：一个地理上隔离（与其他 `可用域` 隔离）、容错的物理资源分组。`可用域` 隔离通过允许你在 `可用域` 之间分配资源，从而降低故障风险。请注意，某些资源必须在同一\
  \ `可用域` 内创建。例如，如果你创建一个计算资源并想要附加存储，那么存储资源必须与计算资源位于同一 `可用域`。\n\n*   **故障域 (FD)**：一个\
  \ `可用域` 内的硬件分组。`故障域` 允许你分配你的实例，使实例在同一个 `可用域` 内不运行在同一硬件上。这样可以防范影响一个 `故障域` 的硬件故障（相同或类似事件影响多个\
  \ `故障域` 的可能性很小），停机不会影响其他 `故障域` 中的资源。因此，如果你想要资源具有高可用性，你会希望在 `可用域` 之间以及在每个 `可用域` 内跨\
  \ `故障域` 分配你的资源。\n\n*   **领域**：`区域` 的一个（逻辑）集合。`领域` 彼此隔离。你的 `租户` 将存在于单个 `领域` 中，并且能够访问该\
  \ `领域` 内的 `区域`。`OCI` 目前提供多个商业和政府 `领域`。\n\n图 2-1 以视觉方式展示了 `区域`、`可用域` 和 `故障域` 的逻辑排列方式。如你所见，我们可以在\
  \ `区域` 之间分配资源，在一个 `区域` 内跨 `可用域` 分配，以及在一个 `可用域` 内跨 `故障域` 分配。每一层都增加了显著的隔离级别，以防止由硬件或外部影响引起的故障。\n\
  \n![](img/527055_1_En_2_Fig1_HTML.png)\n\n一个方块图展示了从区域 1 到区域 N。每个区域包含 1 到 3 号可用域。每个可用域有\
  \ 3 个串联的故障域。\n\n**图 2-1** 区域、可用域和故障域\n\n注意，我们有一个 `区域`，即 `区域 1`，它包含三个 `可用域`（通常缩写为\
  \ `AD-n`），每个 `可用域` 有三个 `故障域`（通常缩写为 `FD-n`）。Oracle 目前在全球支持多个 `区域`，并且正在定期增加更多。图 2-2\
  \ 显示了当前 `OCI` `区域` 的状态，取自 [`https://oracle.com/cloud/architecture-and-regions`](https://oracle.com/cloud/architecture-and-regions)。\n\
  \n![](img/527055_1_En_2_Fig2_HTML.png)\n\n一幅世界地图描绘了 Oracle 当前支持的商业、商业计划中和政府区域。\n\
  \n**图 2-2** OCI 区域（由 [oracle.​com](http://oracle.com) 提供）\n\n#### 虚拟云网络\n\n`虚拟云网络\
  \ (VCN)` 是对传统计算机网络的虚拟化。这种虚拟化扩展到创建子网、路由表、网关等。你所有的资源都将在一个 `虚拟云网络` 上运行。该 `虚拟云网络` 与单个\
  \ `区域` 相关联，但可以连接到所有 `可用域` 和 `故障域`。此外，对于每个子网，你可以跨越一个或多个 `可用域`。在你能够启动（创建）计算实例之前，必须至少设置一个\
  \ `虚拟云网络`。因此，创建 `虚拟云网络` 是你设置账户时首先要做的事情之一。\n\n\n\n\n#### 甲骨文云标识符 (`OCID`)\n\nOCI\
  \ 中的每个资源都有一个 Oracle Cloud Identifier（甲骨文云标识符）。它是一个唯一的字符串，用于标识 OCI 中的一个资源。通过命令行界面\
  \ (`CLI`)、`REST API` 或开发者 API 代码访问资源时，几乎任何要对资源执行的操作都需要用到 Oracle Cloud Identifier。以下展示了\
  \ `OCID` 的格式：\n```\nocid1...[REGION][.FUTURE USE].\n```\n以下展示了一个 MySQL 数据库服务 `DB\
  \ System` 的 `OCID` 示例。其他 OCI 资源将使用类似的格式，但前导部分通常显示 `OCID` 所引用的资源类型：\n```\nocid1.mysqldbsystem.oc1.iad.aaaaaaaapuif...sbg5z7sy5imjtlclhbxwbjmrq\n\
  ```\n\n## 计算实例\n\n也称为计算实例，是在 OCI 中运行的计算主机。换句话说，它是一个你可以用来运行软件、安装自己的应用程序等的服务器。计算实例可以是虚拟机或裸机主机。计算实例的大小或虚拟化硬件能力由一组称为**配置方案**的逻辑分组（包括\
  \ CPU 大小、核心数、性能和内存设置）来管理。服务器的配置（操作系统等）则由一个称为**镜像**的模板来管理。\n\n##### 虚拟机\n\n虚拟机是一种在大型系统主机（称为虚拟机管理程序服务器）上运行的硬件的软件抽象实现，该主机为服务器分配虚拟化内存、CPU，有时还有磁盘。在使用自己的服务器或\
  \ `PC` 时，你可能已经接触过虚拟机。OCI 中的虚拟机与此类似，但复杂得多，因为它们可以通过配置方案进行性能和容量的定制。\n\n##### 裸机主机\n\
  \n当性能或隔离性至关重要时，OCI 提供一小部分物理（或“裸金属”）机器。这些机器直接运行在硬件上，绕过虚拟机管理程序，不使用虚拟化内存、`CPU` 等（但可以连接到虚拟化资源）。甲骨云基础设施为你提供对物理主机（“裸金属”）机器的控制。当你使用裸机主机时，你是唯一使用物理\
  \ `CPU`、内存和网络接口卡 (`NIC`) 的租户。你可以像使用任何其他计算实例一样使用它，其外观与使用虚拟机的计算实例没有区别。\n\n##### 配置方案\n\
  \n配置方案是一组定义计算实例的 `CPU` 核心数、内存大小以及在某些情况下磁盘空间的配置项。这允许你“调整”你的计算实例以满足需求。例如，如果你不需要大量内存，可以选择一个“较小”的配置方案，从而在产生成本时节省一些费用。\n\
  \n##### 镜像\n\n镜像是一个虚拟化磁盘的模板，定义了操作系统和默认安装的软件。当你创建计算实例时，可以选择要使用的镜像。例如，你可以选择预装了 Oracle\
  \ Linux 的镜像。你也可以从已配置的计算实例创建一个镜像，这样就可以部署一个相同配置的新计算实例，为你节省设置和配置时间。很棒！\n\n##### 关于“实例”一词的说明\n\
  \n实例（instance）是云计算中那些被过度使用的术语之一。在 OCI 的术语中，将计算实例简称为“实例”是不正确的。这是因为还有其他被视为实例的资源。\n\
  例如，在 MySQL 术语中，“实例”可以指运行中的 MySQL 服务器应用程序（运行在服务器平台上的 MySQL），或者在 MySQL 数据库服务中，一个 `DB\
  \ System` 可以被称为 `DB System 实例`。因此，你应该始终明确“实例”的含义：计算实例、MySQL 实例或 `DB System 实例`。\n\
  \n## 配置\n\n这是你开始创建资源时会遇到的一个术语。此处的配置是指 OCI 创建资源所需的一系列操作，包括其子组件以及为使用该资源配置资源。例如，配置一个新的计算实例（从高层次上讲）包括：分配一个虚拟机、通过镜像安装操作系统和基础软件，以及为你所在的区域、可用性域等配置计算实例。在使用\
  \ OCI 资源时，你可能会在状态信息中看到这个术语。\n\n**提示**\n你可能在文档和博客中遇到这些术语和概念以首字母缩写形式或简写形式呈现。务必参考文档字典部分，以确认你可能不熟悉的术语和首字母缩写的含义，从而避免混淆。\n\
  \n接下来，让我们讨论你可以用来与 OCI 交互的主要接口。\n\n\n\n\n## OCI 用户界面\n\nOCI 提供了多种交互机制。具体来说，有多种用户界面可用于创建、管理和销毁\
  \ OCI 资源。这些包括基于 Web 的 OCI 云用户界面（称为 Oracle Cloud Console 或简称 cloud console）、名为 OCI\
  \ 命令行界面（`CLI`）的命令行工具，以及面向开发人员的可编程接口，包括一个表述性状态传递（`REST`）应用程序编程接口（`API`）^(³) 以及特定语言的\
  \ API，允许你直接从代码中操作 OCI。甚至还有一个名为 Cloud Shell 的基于云的终端应用程序。我们将在本章探讨基于 Web 的云控制台界面，而将\
  \ `CLI`、`REST` 和开发者 API 留到第 9 章。\n\n> **注意**\n>\n> `CLI`、`REST` 和 API 需要在你的个人电脑上进行设置和配置。我们将在第\
  \ 9 章详细介绍这些步骤。\n\nOCI 云控制台是处理 OCI 资源最常用的机制。它易于使用、易于导航，并且不需要任何特殊软件。虽然某些菜单可能看起来有点长，但资源页面和详细信息页面之间的一致性使得整个体验感觉完全无缝。一旦你花了一些时间熟悉云控制台，你可能会发现它会成为你处理\
  \ OCI 时的首选工具。\n\n要访问 OCI 云控制台，请导航至 [`https://cloud.oracle.com`](https://cloud.oracle.com)。登录后，你将看到云控制台。你首先应该了解界面的关键点或功能是：左上角的菜单按钮、中间的搜索框、中间的实用快速提示和教程，以及右侧的账户信息。根据你创建的账户类型，一旦账户创建并激活，控制台可以显示你当前计费周期的费用情况。这有助于你跟踪支出。对于免费试用账户，目前不显示此信息。图\
  \ 2-3 展示了 OCI 云控制台的一个示例，因此也称为 OCI 控制台。\n\n> **注意**\n>\n> 本章中的许多图像显示的是我个人账户的 `UUID`\
  \ 或其他特定数据。出于安全考虑，这些数据已被遮蔽。当你访问自己账户中的相同页面时，你将看到此类值。除非你在可信用户之间特意共享，否则应将所有 `OCID` 视为私有数据。\n\
  \n![](img/527055_1_En_2_Fig3_HTML.png)\n\nOracle 云的主菜单突出显示了身份和安全选项。选择该选项后，下一个菜单会显示可选项——\
  \ compartments。\n\n**图 2-3**\n\nOCI 云控制台\n\n> **注意**\n>\n> Oracle 每周都会对 OCI 控制台进行微小更改。未来展示的一些图像可能会略有不同，但方法和机制基本保持不变。例如，对话框可能会有一个需要你完成的新字段，或者字段可能会重新组织以便更好地查看。\n\
  \n在你学会如何使用 OCI 之后，可能还会对另一个功能感兴趣。如果你查看云控制台的右上角，会看到一个看起来像提示符的符号。点击它会打开 OCI Cloud Shell，其中包含可用于管理资源的命令行界面（`CLI`）。点击该按钮，云\
  \ Shell 将被创建。有趣的是，它本身是作为一个资源创建的，可以保存状态以供下次使用。图 2-4 展示了 OCI 云控制台。\n\n![](img/527055_1_En_2_Fig4_HTML.png)\n\
  \nOracle 云搜索 Dr. Charles Bell 的窗口。下方显示快速启动链接。底部出现一个用于输入更多信息的 Oracle 云 Shell。\n\n\
  **图 2-4**\n\nOCI Cloud Shell\n\n要了解更多关于 OCI Cloud Shell 的信息，请在控制台中输入 `help`，或参阅在线文档：[`https://docs.oracle.com/en-us/iaas/Content/API/Concepts/cloudshellintro.htm`](https://docs.oracle.com/en-us/iaas/Content/API/Concepts/cloudshellintro.htm)。我们将在下一节中了解更多关于\
  \ `CLI` 的内容。\n\n你也可以通过点击右上角的问号，或点击任何快速启动链接/按钮来学习特定资源，从而从云控制台获得关于 OCI 的帮助。你可能想先点击问号符号，然后选择\
  \ **Using the Console** 主题来了解更多关于云控制台的信息。\n\n现在，我们准备开始探索，首先了解在使用 OCI 时会遇到的核心服务。\n\
  \n## 核心服务\n\n到目前为止，在我们对 OCI 的探索中，我们遇到了虚拟网络、计算实例、存储和访问等概念。这些资源由专用于该类型资源的云服务（有时称为云能力）管理和提供。你用来创建、管理和销毁这些资源的机制在很大程度上是隐藏的，并且涉及一系列通常密集的自动化流程。例如，当你创建一个计算实例时，会启动几个自动化机制和其他例程（称为工作流）来完成资源的配置。\n\
  \n这些概念被认为是 OCI 中可用服务的核心。由于它们每个都是 OCI 提供的服务，因此我们将该能力称为服务，而单个资源则按其对象名称引用。例如，计算服务用于创建计算实例。\n\
  \n以下列出了 OCI 提供的核心服务。我们将在后面的章节中更详细地了解每一项：\n\n*   网络服务\n*   计算服务\n*   存储服务\n*   身份与访问管理服务\n\
  \nOCI 中的这些核心服务用于构建和提供更复杂的服务和资源。事实上，OCI 中的每个复杂资源通常都是使用这些核心服务中的一个或多个构建的。例如，MySQL 数据库服务构建在计算、网络、存储和身份与访问管理服务之上。其他例子包括容器编排、额外的托管服务、无服务器计算等等。\n\
  \n让我们更详细地看看这些核心服务。\n\n\n\n\n#### 网络服务\n\n或许最重要的核心服务是网络服务。与其他资源一样，网络服务也是虚拟化的。这意味着传统的硬件/软件组件，例如网络、子网、路由、网关以及基于硬件的传统网络的类似构建模块，都以资源的形式呈现，您可以创建这些资源并与其他资源一起使用，以实现网络连通性。\n\
  \n这种虚拟网络组件的概念有时被称为 `软件定义网络（SDN）`。因此，连接到这些虚拟网络组件的云端资源也是启用了 `SDN` 的基础设施，使您可以创建和终止您的\
  \ `虚拟云网络（VCN）`，将它们组织成 `子网`，并与您的计算实例和其他云资源一起使用。OCI 网络资源包括以下内容。本节我们仅涉及高层次概念，当我们在创建网络资源的教程中看到时，会提供更多细节：\n\
  \n*   虚拟云网络及其子网\n*   预留的公共 IP 地址\n*   安全列表和安全规则\n*   网关\n*   路由表和规则\n*   负载均衡器\n\
  *   `DNS` 区域\n*   Web 应用程序防火墙（`WAF`）策略\n\n提示\n\n有关 OCI 网络服务和资源的更多信息，请参阅 [`https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/landing.htm#top`](https://docs.oracle.com/en-us/iaas/Content/Network/Concepts/landing.htm#top)。\n\
  \n在使用 OCI 网络时，您通常从创建一个 `虚拟云网络（VCN）` 开始，并为其分配一个私有互联网协议（`IP`）地址范围供网络内使用。您可以创建多个 `VCN`，并可将它们配置为可通过互联网访问（或不可访问），以及云专属的（隔离的）和互连的网络。您还可以将您的\
  \ `VCN` 组织成 `子网`；这是网络地址的一个逻辑细分。此处的 `子网` 与硬件网络子网的概念相同。\n\n当您创建需要网络连接的资源（例如计算实例）时，必须通过一个称为\
  \ `虚拟网络接口卡（vNIC）` 的云资源将它们分配到一个或多个 `子网`。连接到公共 `子网` 的 `vNIC` 可以被分配一个公共 `IP` 地址，从而允许从互联网访问。\n\
  \n有趣的是，OCI 使用一个动态分配的公共 `IP` 地址池。当 `vNIC` 请求公共 `IP` 地址时，它会从池中分配一个。当资源被终止时，该公共 `IP`\
  \ 地址会返回到池中。这是云服务弹性的另一个例子。但是，如果您需要一个永久的公共 `IP` 地址，您可以申请一个预留的公共 `IP` 地址，该地址会分配到您的云账户（这可能也涉及费用）。\n\
  \n您还可以创建一个 `安全列表`，其中存储用于添加一层软件防火墙的规则，以阻止或允许访问您的资源。它的工作方式类似于端口和地址过滤器，只允许那些符合安全权限列表的连接。\n\
  \n类似地，您可以创建 `路由规则`，用于控制 `VCN` 的出站通信，允许数据包移动到网络中的下一跳（hop）。路由规则与 `网关` 资源相关联。\n\n云端的网络工作与基于硬件的网络一样辛苦。您必须仔细选择所需的资源，并选择正确的规则集，以确保一切正常工作，只允许期望的流量进出\
  \ `子网`。幸运的是，OCI 提供了一个向导，我们可以用它来自动化一些更常见的配置。\n\n#### 计算服务\n\n计算服务是代表计算硬件的资源，例如运行应用程序或服务的服务器。回想一下，我们使用术语\
  \ `计算实例` 来指代已配置的计算资源。\n\n当您配置一个 `计算实例` 时，您可以从多种选项中选择，包括机器类型（裸机、虚拟机等）以及一组性能设置（称为\
  \ `形状`），使您可以根据容量和性能需求定制计算实例。\n\n#### 存储服务\n\n这些服务是 OCI 提供的磁盘和数据存储资源。您有多种数据存储资源可供选择，以适应您的数据工作负载。这些资源具有诸如持久性/非持久性、数据类型、读写输入/输出操作每秒性能（`IOPS`）、吞吐量、持久性、连接性、存储接口协议、容量等特性。\n\
  \n与计算实例类似，您有许多选项可以定制存储以满足您的业务需求。以下部分简要介绍了 OCI 中存储的常见选择。\n\n##### 块卷\n\n一种虚拟化的硬盘。`块卷`\
  \ 是为计算实例提供持久存储的磁盘。与大多数资源一样，它们是虚拟的，意味着您可以在不同的计算实例之间分离和重新连接它们（使用另一个称为 `块卷附加` 的虚拟资源）（一次只能连接到一个计算实例），而不会丢失数据。\n\
  \n`块卷` 的使用方式与您在 PC 上使用硬盘的方式相同。您只需读写磁盘数据或安装应用程序。您可以选择 `启动卷`（计算实例使用它来写入镜像（可以理解为操作系统））或用于数据的\
  \ `块卷`。`块卷` 是持久且耐用的。您可以从基础、平衡和高性能品种中选择，这些品种定义了性能特征。\n\n##### 本地 NVMe\n\n一种虚拟化的内存驱动器（类似于\
  \ `SSD`）。与 `块卷` 类似，它们可以作为块存储附加，但具有非持久性和非耐用性。这些主要用于需要高性能本地存储而不需要长期存储的应用程序。\n\n#####\
  \ 文件存储\n\n一种分布式文件系统，您可以将其附加到计算实例并像使用本地驱动器一样使用它。通常用作共享文件系统存储，文件存储是持久且高度耐用的。\n\n##\
  \ 对象存储\n\n与 `块卷` 不同，`对象存储` 是一种不同的架构，设计用于将数据存储为对象。因此，存储是针对对象级访问而非像 `块卷` 那样的单个文件访问进行优化的，因此您不会使用\
  \ `对象存储` 来读写您的数据文件。\n\n数据对象存储在 `存储桶` 中，这是您创建的用于放置数据对象的特殊容器。每个 `存储桶` 可以包含无限数量的数据对象。但是，数据对象可以是任何类型，最大可达\
  \ 50 GB。\n\n您可以在两个存储层之间选择：标准对象存储（活动且可访问的，有时称为热存储）或存档存储（不使用时会被存档，有时称为冷存储，并且在您想要使用时必须使其可用）。\n\
  \n`对象存储` 也不是您可以直接附加到计算实例的东西。相反，您使用 `对象存储` 将数据复制到对象存储。`对象存储` 的用例包括备份数据、共享文件以及非结构化数据存储（如日志）。\n\
  \n\n\n## 身份和访问管理服务\n\n身份和访问管理 (IAM) 服务是您用来控制对 OCI 资源访问的资源，这使得这些核心服务成为构建基于 OCI 的基础设施时较为复杂但又至关重要的部分。您可以创建`用户`和`组`，并应用访问策略。\n\
  \n最常用的概念是`委托主体`（有时称为`实例委托主体`），这是一个应用于 IAM`用户`和计算实例的资源，用于授予访问或与 OCI 资源交互的权限。经认证的`委托主体`可执行的操作和行为称为`授权`。\n\
  \n`用户`和`组`正如您所预期的那样，`用户`拥有名称、密码、API 签名密钥和一个或多个身份验证令牌。通过使用`策略`资源向`用户`和`组`授予权限，这些策略允许`用户`或`组`在`租户`内的特定`\
  \ compartment `（隔离区）中访问资源，并可附带任何限制或条件。\n\n例如，当`用户`想要访问 OCI 资源时，该`用户`（或应用程序/服务）必须是一个`组`的成员，并且该`组`应在同一个`\
  \ compartment `和`租户`中拥有包含相应权限的`策略`。\n\n现在我们已经简要介绍了 OCI 核心服务，让我们学习如何设置 OCI 账户并创建我们的第一个\
  \ OCI 资源。\n\n## 设置您的账户\n\n开始使用 OCI 非常简单。事实上，Oracle 允许您创建一个免费账户，用于学习如何使用 OCI。虽然免费账户在可创建资源的规模或复杂性方面有一些限制，但\
  \ Oracle 为每个注册的免费账户提供 300.00 美元的初始赠金。这意味着您可以使用资源进行尝试，费用会从初始赠金中扣除。一旦该金额用完，您将开始产生费用。因此，在创建账户时，您必须提供一个有效的信用卡。\n\
  \n免费套餐账户还可以访问某些始终免费的服务，例如：\n\n*   两个 Oracle 自治数据库，附带如`Application Express (APEC)`和`Oracle\
  \ SQL Developer`之类的工具\n*   两个 OCI 计算实例（虚拟机）；块存储、对象存储和归档存储；负载均衡器和数据出口；监控和通知服务\n\n\
  如前所述，免费账户有以下限制：\n\n*   所有可用服务中最多八个计算实例\n*   最多 5 TB 的存储空间\n\n您可以在 30 天结束时将您的账户升级为按需付费账户。如果您创建了付费资源并希望在\
  \ 30 天后保留它们，您将需要升级您的账户。\n\n**注意**\n\n使用您的赠金额度配置的任何资源，在 30 天期限届满后都将被 Oracle 回收，除非您升级您的账户。\n\
  \n您可以随时升级到付费账户。只需点击云控制台页面右侧面板中的`升级您的账户`链接即可。升级账户后，您将继续拥有云资源的所有权和访问权限。\n\n### 始终免费资源\n\
  \n所有 OCI 账户（包括按需付费账户）都可以创建标识为“始终免费”的资源。它们在云中由一个标有`Always Free`的标签表示。其中一些资源可能仅限于某些配置。例如，始终免费的计算实例是那些作为虚拟机配置的实例。同样，Oracle\
  \ 自治数据库，以及支持您想要构建的应用程序所需的网络、负载均衡和存储资源，对于示例应用程序或进行原型设计也可能是免费的。\n\n有关哪些资源始终免费的更多详细信息，请参阅\
  \ OCI 文档 (`https://docs.oracle.com/en-us/iaas/Content/FreeTier/freetier_topic-Always_Free_Resources.htm#resources`)。\n\
  \n我们还有一个与所有账户相关但免费套餐账户限制更多的概念需要讨论。\n\n\n\n### 服务使用情况和限制\n\n设置服务使用情况和限制是为了限制您可以在账户中创建的某些资源的数量。这些限制可能适用于您的租户，也可能跨您的\
  \ compartment 应用。\n\n您可以通过点击云控制台菜单，然后选择 `Governance and Administration`，再选择 `Limits,\
  \ Quotas, and Usage` 来查找您租户的限制。这会显示一长串服务限制列表，但您可以按服务、范围、资源名称或 compartment 进行筛选。\n\
  \n例如，如果您查看块卷服务，您会看到备份数量、免费备份数量以及以 GB 为单位的免费存储空间的限制。图 2-5 展示了这些限制在云控制台中的示例。\n\n![](img/527055_1_En_2_Fig5_HTML.png)\n\
  \n一个图片预览窗口，根据云控制台中的 compartment 显示资源的限制、配额和使用情况。\n\n**图 2-5** 服务限制示例\n\n考虑到这一点，让我们看看如何创建我们的\
  \ OCI 账户，并简要浏览一下您可能想要使用的一些基础资源。有趣的是，教程中的这些资源是用于构建 MySQL 数据库服务中数据库系统资源的一些组件。\n\n\
  导航到 [`https://cloud.oracle.com/`](https://cloud.oracle.com/)。点击左侧“还不是 Oracle Cloud\
  \ 客户？”下的 `注册`。图 2-6 展示了初始着陆页面。\n\n![](img/527055_1_En_2_Fig6_HTML.png)\n\n一个窗口显示\
  \ O C I，右上角有 Oracle Cloud 登录选项。左侧可以输入云账户名称。它突出显示了“非 Oracle Cloud 客户”选项。\n\n**图 2-6**\
  \ Oracle Cloud 着陆页面\n\n这将打开一个新的浏览器窗口，您可以在其中创建您的 Oracle 云账户。图 2-7 展示了您需要输入的必填信息。注意它默认是免费套餐账户。\n\
  \n![](img/527055_1_En_2_Fig7_HTML.png)\n\n一个账户信息窗口，需要填写国家、名、姓、电子邮件，以及“我是人类”的验证选项。底部提供了使用条款。\n\
  \n**图 2-7** 新账户信息（第 1 部分）\n\n您需要选择您居住的国家或地区，输入您的名和姓，成功通过人机验证挑战，然后点击 `验证我的电子邮件`。您也应该阅读对话框底部显示的使用条款。\n\
