  \ ~/.ssh/.\n% chmod 400 ~/.ssh/ssh-key-2022-03-13.key\n```\n\n下一部分定义了启动卷参数，包括设置自定义大小和指定加密。我们将使用默认值，但您可以通过提供的链接探索其他选项。准备就绪后，点击\
