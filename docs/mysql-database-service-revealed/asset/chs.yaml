  图 2-46\n\niSCSI 信息对话框\n\n你会发现一个 `连接` 部分和另一个 `断开连接` 部分，其中包含在计算实例上连接和断开块卷所需的确切命令。我们不会在本章中讨论这些命令的参数。相反，我们将直接复制\
  \ `连接` 部分中的三个命令，并在计算实例上运行它们。\n\n如果你在上一部分中关闭了 `SSH` 连接，请打开一个新的连接，并将命令粘贴到终端中，如下所示：\n\
  \n```\n$ sudo iscsiadm -m node -o new -T iqn.2015-12.com.oracleiaas:UUID -p 169.254.2.2:3260\n\
  New iSCSI node [tcp:[hw=,ip=,net_if=,iscsi_if=default] 169.254.2.2,3260,-1 iqn.2015-12.com.oracleiaas:UUID]\
  \ added\n$ sudo iscsiadm -m node -o update -T iqn.2015-12.com.oracleiaas:UUID -n\
  \ node.startup -v automatic\n$ sudo iscsiadm -m node -T iqn.2015-12.com.oracleiaas:UUID\
  \ -p 169.254.2.2:3260 -l\nLogging in to [iface: default, target: iqn.2015-12.com.oracleiaas:UUID,\
  \ portal: 169.254.2.2,3260]\nLogin to [iface: default, target: iqn.2015-12.com.oracleiaas:UUID,\
  \ portal: 169.254.2.2,3260] successful.\n```\n\n接下来，我们需要知道与已附加块卷关联的设备。我们可以通过在 `SSH`\
  \ 终端会话中执行以下命令来找到它：\n\n```\n$ ls -lsa /dev/oracleoci\ntotal 0\n0 drwxr-xr-x.  2 root\
  \ root  140 Mar 13 02:27 .\n0 drwxr-xr-x. 21 root root 3320 Mar 13 02:27 ..\n0 lrwxrwxrwx.\
  \  1 root root    6 Mar 13 02:25 oraclevda -> ../sda\n0 lrwxrwxrwx.  1 root root\
  \    7 Mar 13 02:25 oraclevda1 -> ../sda1\n0 lrwxrwxrwx.  1 root root    7 Mar 13\
  \ 02:25 oraclevda2 -> ../sda2\n0 lrwxrwxrwx.  1 root root    7 Mar 13 02:25 oraclevda3\
  \ -> ../sda3\n0 lrwxrwxrwx.  1 root root    6 Mar 13 02:27 oraclevdb -> ../sdb\n\
  ```\n\n注意\n\n本节中的示例命令仅是格式化和挂载驱动器的几种方法之一。请使用任何适用于 Oracle Linux 的机制来完成驱动器映射。\n\n这里我们看到使用的设备是\
  \ `/dev/sdb`。我们现在可以使用 `fdisk` 来创建一个分区，如下所示。请务必像示例那样使用 `sudo`。我们将使用的命令以粗体显示。\n\n\
  ```\n$ sudo fdisk /dev/sdb\nCommand (m for help): n\nPartition type\np   primary\
  \ (0 primary, 0 extended, 4 free)\ne   extended (container for logical partitions)\n\
  Select (default p): p\nUsing default response p.\nPartition number (1-4, default\
  \ 1):\nFirst sector (2048-104857599, default 2048):\nLast sector, +sectors or +size{K,M,G,T,P}\
  \ (2048-104857599, default 104857599):\nCreated a new partition 1 of type 'Linux'\
  \ and of size 50 GiB.\nCommand (m for help): w\nThe partition table has been altered.\n\
  Calling ioctl() to re-read partition table.\nSyncing disks.\n```\n\n接下来，我们使用 `xfs`\
  \ 文件系统格式化驱动器，如下所示：\n\n\n\n```\n$ sudo mkfs.xfs /dev/sdb -f\nmeta-data=/dev/sdb \
  \              isize=512    agcount=4, agsize=3276800 blks\n=                  \
  \     sectsz=4096  attr=2, projid32bit=1\n=                       crc=1        finobt=1,\
  \ sparse=1, rmapbt=0\n=                       reflink=1\ndata     =            \
  \           bsize=4096   blocks=13107200, imaxpct=25\n=                       sunit=0\
  \      swidth=0 blks\nnaming   =version 2              bsize=4096   ascii-ci=0,\
  \ ftype=1\nlog      =internal log           bsize=4096   blocks=6400, version=2\n\
  =                       sectsz=4096  sunit=1 blks, lazy-count=1\nrealtime =none\
  \                   extsz=4096   blocks=0, rtextents=0\n```\n\n最后，我们可以创建一个挂载点并挂载驱动器，如下所示：\n\
  \n```\n$ sudo mkdir /mnt/data\n$ sudo mount /dev/sdb /mnt/data\n$ ls -lsa /mnt/data\n\
  total 0\n0 drwxr-xr-x. 2 root root  6 Mar 13 02:43 .\n0 drwxr-xr-x. 3 root root\
  \ 18 Mar 13 02:35 ..\n```\n\n现在，我们就可以使用该驱动器来存储应用程序和数据了。\n\n## 持久化挂载\n\n如果您计划将附带块卷的计算实例用于实验或单次会话之外，您会希望使此映射永久生效。为此，您需要编辑\
  \ `/etc/fstab` 文件。要完成此操作，您需要块卷的 UUID。您可以使用 `sudo blkid` 命令找到 UUID。获得 UUID 后，将以下行添加到\
  \ `/etc/fstab` 文件中，然后运行 `sudo mount -a` 以检查映射：\n\n```\nUUID= /mnt/data xfs defaults,_netdev,nofail\
  \ 0 2\n```\n\n完成上述操作后，驱动器将在启动时自动挂载。\n\n就是这样！我们的教程已完成。如果您正在跟随操作，可以自由探索计算实例和块卷，或者创建额外的计算实例或块卷进行更多练习。\n\
  \n实验完成后，教程的下一步是终止我们不想保留的资源。\n\n### 终止资源\n\n此步骤是可选的，但如果您正在使用 OCI 资源进行实验，这是您一定不想忘记做的事情。请记住，您创建的任何不属于“始终免费”类别/促销的资源都将在您的账户上产生费用。如果您不打算使用它们，您肯定不想为此付费。\n\
  \n这是大多数人将学到的关于云的第一课；与本地硬件不同，本地硬件在关机后，除了最初的投资（无论多么复杂）外不会产生任何费用，而大多数云资源始终是可计费的。一个值得注意的例外是可以停止的资源。例如，已停止的计算实例的费用与活动（运行）的实例不同。相反，块存储无论您是否使用都会产生费用。\n\
  \n我们可以通过简单地终止（删除）不再需要的资源来最小化成本。在本例中，我们将采取更极端的步骤，终止教程中创建的所有会产生费用或根本不再需要的资源。在本教程中，我们只需要终止计算实例和块卷。幸运的是，终止这些高层资源也将终止辅助资源，例如块卷附加：\n\
  \n![](img/527055_1_En_2_Fig47_HTML.jpg)\n\n图 2-47 终止计算实例（计算实例详细信息页面）\n\n有几种终止资源的方法。最简单的方法是直接导航到资源详细信息页面，筛选视图以显示您想要终止（删除）的资源，然后使用*终止*按钮或*其他操作*\
  \ | *终止*菜单。\n\n让我们从计算实例开始。我们将从主云控制台页面开始。在那里，打开主菜单并选择*计算*，然后选择*实例*。在计算实例列表中，我们可以单击计算实例的名称（显示为超链接）以打开计算实例详细信息页面。然后，我们单击顶部附近的*其他操作*菜单，然后选择*终止*，如图\
  \ 2-47 所示。\n\n![](img/527055_1_En_2_Fig48_HTML.jpg)\n\n图 2-48 永久删除已附加的启动卷\n\n当您单击该按钮时，您将看到一个弹出消息，询问您是否也要永久删除启动卷。在本例中，我们需要这样做，我们应该勾选*永久删除已附加的启动卷*复选框，如图\
  \ 2-48 所示。准备就绪后，点击*终止实例*按钮。\n\n![](img/527055_1_En_2_Fig49_HTML.png)\n\n图 2-49 终止块卷（块卷详细信息页面）\n\
  \n请注意消息中“附加”一词的使用。正如您可能推测的那样，这意味着启动卷的附加方式与块卷类似。虽然它们以相同方式连接，但幕后有一个启动卷附加资源对象。\n\n\
  同样值得注意的是，这意味着可以将一个计算实例的单个启动卷用于另一个计算实例。例如，如果您需要更大的规格，您可以终止一个计算实例，保存启动卷以供另一个更大规格的计算实例使用。很酷。\n\
  \n一旦您点击终止实例按钮，状态将变为 `TERMINATING`，图标将变为橙色。一旦终止，状态将变为 `TERMINATED`，图标变为灰色。请务必等到此状态出现后再继续，因为计算实例需要处于已终止状态，然后我们才能终止块卷。\n\
  \n计算实例终止后，您可以通过点击云控制台菜单并选择*存储*然后选择*块卷*来导航到块卷详细信息页面。然后，您可以单击块卷名称（显示为超链接）以打开块卷详细信息页面。从那里，我们可以点击终止按钮来终止块卷，如图\
  \ 2-49 所示。\n\n![](img/527055_1_En_2_Fig50_HTML.png)\n\n图 2-50 终止块卷对话框\n\n系统将提示您确认终止。再次点击终止按钮以终止块卷，如图\
  \ 2-50 所示。\n\n与计算实例类似，状态将变为 `TERMINATING`，图标将变为橙色。一旦终止，状态将变为 `TERMINATED`，图标变为灰色。您现在可以关闭\
  \ Web 浏览器中的标签页了。\n\n我们的教程到此结束！我们已经看到了开始创建 OCI 资源是多么容易，包括隔离区、VCN、计算实例和块存储设备。\n\n\
  如果您正在跟随教程操作，请务必从您的账户注销。您可以通过点击云控制台右上角的账户图标并选择*注销*来完成，如图 2-51 所示。\n\n![](img/527055_1_En_2_Fig51_HTML.jpg)\n\
  \n图 2-51 注销云控制台\n```\n\n\n\n## 概要\n\nOracle Cloud Infrastructure 是一套庞大的云基础设施，提供了数十种服务供您构建自己的云解决方案。我们拥有诸如用于创建服务器的网络和计算等基础核心服务，诸如数据库系统等高级托管服务，乃至诸如容器编排等平台级服务。尽管我们已经了解更多关于这些概念和特性的知识，但我们仅仅是触及了\
  \ OCI 所提供能力的皮毛。\n\n我们还了解到虚拟化和自动化是使 OCI 能够让您轻松地创建（配置）、管理和销毁资源的关键工具。这些简单的用例可以在几分钟内通过虚拟计算完成，而使用物理硬件则可能需要数小时甚至数天。\n\
  \n在本章中，我们进一步了解了 OCI，包括所使用的术语、可用于操作 OCI 的用户界面，以及对 OCI 核心服务的解释。最后，我们看到了一个关于如何设置 OCI\
  \ 试用账户并创建我们的第一个 OCI 资源的简短教程。\n\n在下一章中，我们将花点时间进一步了解 MySQL，包括一个关于如何开始使用 MySQL 的简短教程。正如您将看到的，它是一个健壮、功能齐全且易于使用的数据库管理系统。\n\
  \n脚注 1 2\n\n# 3. MySQL 简明教程\n\n也许您以前从未使用过数据库系统，或者您曾作为用户使用过，但从未需要从头开始设置过。又或者您决定探究一下数据库系统到底有什么名堂。\n\
  \n在本章中，我将从通用 SQL 接口的角度（传统 MySQL）对 MySQL 进行简要介绍。您不仅会看到如何使用 MySQL 8 来创建和使用数据库，还将接触到一些\
  \ SQL 接口的基础知识，这些是将 MySQL 服务器完全集成到您的基础设施中所必需且确实需要的。\n\n我们还将简要了解 MySQL Shell，以及如何通过\
  \ SQL 和 NoSQL 接口（用于应用程序和交互式会话）使用它来连接和操作 MySQL。\n\n我们将在本章结尾简要介绍如何将您的应用程序连接到 MySQL\
  \ 服务器，以操作您创建的数据库。\n\n让我们从简要了解 MySQL 是什么以及它能为我们做什么开始。我们将从在本地 PC 上安装 MySQL 开始进行实验。\n\
  \n注意\n\n虽然本书介绍了 Oracle Cloud Infrastructure 中的 MySQL 数据库服务，但本章中的大部分信息可用于任何 MySQL\
  \ 服务器。\n\n## 入门指南\n\nMySQL 是世界上最受欢迎的开源数据库系统，这有许多充分的理由。首先，它是开源的，这意味着任何人都可以免费将其用于各种任务。最重要的是，MySQL\
  \ 包含在许多平台的软件仓库中，使其易于获取和安装。如果您的平台（例如 aptitude）没有在软件仓库中包含 MySQL，您可以从 MySQL 网站 ([`http://dev.mysql.com`](http://dev.mysql.com))\
  \ 下载。\n\nOracle 公司拥有 MySQL。Oracle 通过收购 Sun Microsystems 获得了 MySQL，而 Sun Microsystems\
  \ 则是从其原始所有者 MySQL AB 手中收购了 MySQL。尽管存在相反的担忧，但 Oracle 通过持续投资于 MySQL 的演进和新功能开发，并忠实维护其开源传统，展现了出色的管理。尽管\
  \ Oracle 也提供 MySQL 的商业许可证——正如其以前的所有者过去所做的那样——MySQL 仍然是开源的，并对所有人开放。\n\n开源真的是免费的吗？\n\
  \n开源软件起源于对公司财产心态的有意识抵制。Richard Stallman 被认为是自由软件运动之父，他开创了一种许可机制，以帮助保护软件的所有权，同时让软件的使用以及一定程度上的修改对所有人免费。目标是重建一个开发者合作的社区，只有一个共同的使命——保障自由而非限制自由。\n\
  \n这最终导致了一些措辞巧妙（即具有法律约束力）的许可协议的发明，这些协议允许代码不受限制地复制和修改，并规定衍生作品（修改后的副本）必须根据与原始版本相同的许可证分发，不得附加任何额外限制。其中一种许可证（由\
  \ Stallman 创建）称为 GNU 通用公共许可证（GPL）。Oracle 正是使用此许可证来授权 MySQL，因此它确实可供任何人免费使用。\n\n然而，GPL\
  \ 及类似许可证旨在保障使用、修改和分发的自由；大多数情况下，它们从未将“自由”意指为“免费”或“免费赠予”。为了消除这种误解，开源促进组织（OSI）成立，后来采纳并推广了“开源”一词来描述\
  \ GPL 许可证所保障的自由。有关开源软件和 GPL 的更多信息，请访问 [`www.opensource.org`](http://www.opensource.org)。\n\
  \nMySQL 作为后台进程（或者如果您从命令行启动它，也可以作为前台进程）在您的系统上运行。与大多数数据库系统一样，MySQL 支持结构化查询语言（SQL）。您可以使用\
  \ SQL 来创建数据库和对象（使用数据定义语言 [DDL]），写入或更改数据（使用数据操纵语言 [DML]），以及执行用于管理服务器的各种命令。\n\n连接到\
  \ MySQL 有两种机制。您可以使用像 MySQL Shell 或 MySQL Workbench 这样的应用程序，或者您可以使用较旧的 MySQL 客户端。让我们看看这两种选项。\n\
  \n\n\n### 连接 MySQL Shell\n\nMySQL Shell 是 MySQL 产品组合中新增的一个令人兴奋的组件。它代表了首个用于连接和交互\
  \ MySQL 的现代化高级客户端。该 Shell 可作为脚本环境，用于开发处理数据的新工具和应用程序。虽然它确实支持 SQL 模式，但其主要目的是允许使用 JavaScript\
  \ 和 Python 语言访问数据。没错，你可以编写 JavaScript 和 Python 脚本，并在 Shell 中以交互方式或批处理方式执行它们。很酷吧！\n\
  \n**注意**\n\n我使用术语 “shell” 指代 MySQL Shell 支持的功能或对象。我使用 “MySQL Shell” 指代产品本身。\n\n\
  MySQL Shell 设计用于通过 X Plugin 使用新的 X Protocol 与服务器通信。但是，Shell 也可以使用较旧的协议连接到服务器，尽管在脚本模式下功能有限。这意味着，Shell\
  \ 允许你同时处理关系型（SQL）、JSON 文档（NoSQL）或两者。\n\nNoSQL 接口基于一个称为 X DevAPI（[`https://dev.mysql.com/doc/x-devapi-userguide/en/`](https://dev.mysql.com/doc/x-devapi-userguide/en/)）的应用程序编程接口。管理操作则由另一个称为\
  \ AdminAPI 的 API 支持。如果你计划使用 Shell 进行开发工作，请参阅在线文档以获取有关这些 API 的更多信息（[`https://dev.mysql.com/doc/mysql-shell/8.0/en/`](https://dev.mysql.com/doc/mysql-shell/8.0/en/)）。\n\
  \nOracle 通过 MySQL 下载网站（[`https://dev.mysql.com/downloads/shell/`](https://dev.mysql.com/downloads/shell/)）免费提供\
  \ MySQL Shell。你可以下载适用于你平台（例如 Windows、macOS、Linux）的特定版本，并使用你平台的常规机制进行安装。安装后，可以通过你平台的菜单系统或通过在命令行输入\
  \ `mysqlsh` 来启动它。图 3-1 显示了一个启动 MySQL Shell 的示例。注意其漂亮的提示符，它显示了 MySQL 徽标、连接信息和模式。很棒！\n\
  \n![](img/527055_1_En_3_Fig1_HTML.png)\n\nMySQL Shell 屏幕截图，显示版权及其关联公司。在命令行中键入 mysqlsh\
  \ 以启动 MySQL Shell。\n\n图 3-1\n\n**MySQL Shell**\n\n以下各节从高层次介绍了 Shell 的主要功能。我们不会探讨每个功能或选项的所有细节，相反，本节提供了一个广泛的概述，以便你能快速开始，更重要的是，了解足够多的\
  \ Shell 知识，以便你能跟上本书中的示例。\n\n有关 MySQL Shell 的更多信息，请参阅在线 MySQL 参考手册中名为 “MySQL Shell\
  \ 用户指南” 的部分。\n\n#### 功能特性\n\nMySQL Shell 具有许多功能，包括支持传统 SQL 命令处理、脚本原型设计，甚至支持自定义 Shell。以下列出了\
  \ Shell 的一些主要功能。大多数功能可以通过命令行选项或特殊的 Shell 命令来控制。我们将在后续章节中更深入地探讨一些更关键的功能：\n\n*   *日志记录*：你可以为会话创建日志以供后续分析或保存消息记录。你可以使用\
  \ `--log-level` 选项设置详细级别，范围从 1（无日志记录）到 8（最大调试信息）。\n\n*   *输出格式*：Shell 支持三种格式选项：表格（`--table`），这是你从旧客户端习惯的传统网格格式；制表符分隔（tabbed），它使用制表符进行间距并用于批处理执行；以及\
  \ JSON（`--json`），它以更易于阅读的方式格式化 JSON 文档。这些是你在启动 Shell 时指定的命令行选项。\n\n*   *交互式代码执行*：使用\
  \ Shell 的默认模式是交互模式，它像传统客户端一样工作，你输入命令并获得响应。\n\n*   *批处理代码执行*：如果你想在没有交互会话的情况下运行脚本，可以使用\
  \ Shell 以批处理模式运行脚本。但是，输出仅限于非格式化输出（但可以使用 `--interactive` 选项覆盖）。\n\n*   *脚本语言*：Shell\
  \ 同时支持 JavaScript 和 Python，但一次只能使用一种。\n\n*   *会话*：会话本质上是到服务器的连接。Shell 允许你存储和删除会话。我们将在后面的章节中看到更多关于会话的内容。\n\
  \n*   *启动脚本*：你可以定义一个脚本在 Shell 启动时执行。你可以用 JavaScript 或 Python 编写该脚本。\n\n*   *命令历史和命令补全*：Shell\
  \ 会保存你输入的命令，允许你使用上下箭头键调用它们。Shell 还为已知关键字、API 函数和 SQL 关键字提供代码补全功能。\n\n*   *全局变量*：Shell\
  \ 提供了一些全局变量，你可以在交互模式下访问它们。这些包括：\n    *   `session`：如果已建立，则为全局会话对象\n    *   `db`：如果通过连接建立，则为模式对象\n\
  \    *   `dba`：用于处理 InnoDB 集群的 AdminAPI 对象\n    *   `shell`：用于使用 Shell 的通用函数\n \
  \   *   `util`：用于处理服务器的实用函数\n\n*   *自定义提示符*：你还可以通过使用特殊格式更新名为 `~/.mysqlsh/prompt.json`\
  \ 的配置文件或定义名为 `MYSQLSH_PROMPT_THEME` 的环境变量来更改默认提示符。有关更改提示符的更多详细信息，请参阅 MySQL Shell\
  \ 参考手册。\n\n*   *自动补全*：从 8.0.4 版本开始，Shell 允许用户按 *TAB* 键在 SQL 模式下自动补全关键字，以及在 JavaScript\
  \ 和 Python 模式下自动补全主要类和方法。\n\n*   *扩展*：你可以以报告和扩展对象的形式定义扩展。报告和扩展对象可以使用 JavaScript\
  \ 或 Python 创建。\n\n*   *实用程序*：Shell 还提供了几个你可能会觉得有用的实用程序，包括以下。你可以通过 API 调用访问它们，如示例所示。\n\
  \    *   *升级检查器*：用于验证 MySQL 服务器实例是否已准备好进行升级（例如，`util.checkForServerUpgrade()`）。\n\
  \    *   *JSON 导入*：将 JSON 文档导入到 MySQL 服务器的集合或表中（例如，`util.importJSON()`）。\n    *\
  \   *并行表导入*：拆分单个数据文件并使用多个线程将数据块加载到 MySQL 表中。\n\n*   *Shell 命令*：与原始的 MySQL 客户端一样，有一些特殊命令用于控制应用程序本身，而不是与数据交互。要执行\
  \ Shell 命令，请使用反斜杠（`\\`）发出命令。例如，`\\help` 会打印所有 Shell 命令的帮助信息。\n\n*   *选项*：可以使用多个启动选项来启动\
  \ Shell，这些选项控制模式、连接、行为等。常见选项包括模式（SQL、JavaScript 或 Python）和连接参数。有关选项的完整列表，请使用 `mysqlsh\
  \ --help` 执行 Shell。\n\n如你所见，MySQL Shell 有一个长长的功能列表。有关完整的功能列表，请参阅在线参考手册。\n\n让我们看看对于刚开始使用\
  \ MySQL 的人来说最重要的两个方面：模式以及如何连接。\n\n\n## 模式支持\n\nMySQL Shell 支持三种模式（也称为语言支持或活动语言）：SQL、JavaScript\
  \ 和 Python。我们可以通过 Shell 命令来启动其中任何一种模式。你可以根据需要随时切换模式（语言），而无需每次断开连接。以下是三种模式及其切换方式：\n\
  \n*   `\\sql`：切换到 SQL 语言\n\n*   `\\js`：切换到 JavaScript 语言（默认模式）\n\n*   `\\py`：切换到\
  \ Python 语言\n\n你也可以使用 `--` 代替 `\\` 作为启动命令（`--sql`、`--js`、`--py`）。\n\n## 建立连接\n\n\
  在 Shell 中建立连接是一个需要与原来 MySQL 客户端（`mysql`）不同操作习惯的领域。你可以使用特殊格式的 URI 字符串，或者像旧客户端那样通过指定名称的各个选项来连接到服务器。也支持\
  \ SSL 连接。连接可以通过启动选项、Shell 命令和脚本建立。但是，所有连接都需要密码。因此，除非另有说明，否则如果未提供密码，Shell 将提示输入密码。\n\
  \n> **注意**\n>\n> 如果你想使用无密码连接（不推荐），必须使用 `--password` 选项，或者如果使用 URI，则需要额外添加一个冒号来代替密码。\n\
  \n与其讨论所有可用的连接方式及相应选项，不如在下面的章节中介绍每种连接方法的一个示例。\n\n### 使用 URI\n\n在 MySQL Shell 连接的场景下，URI\
  \ 是一个使用以下格式编码的特殊字符串：`<dbuser>[:<dbpassword>]@host[:port][/schema/]`，其中 `<>` 表示各个参数的字符串值。注意，密码、端口和模式是可选的，但用户和主机是必需的。这里的模式是指连接时要使用的默认模式（数据库）。\n\
  \n> **注意**\n>\n> X 协议的默认端口是 `33060`。\n\n要在启动 Shell 时在命令行上使用 URI 连接到服务器，请使用 `--uri`\
  \ 选项指定它，如下所示：\n\n```bash\n$ mysqlsh --uri root:secret@localhost:33060\n```\n\nShell\
  \ 假定所有连接都需要密码，如果未提供密码，将提示输入密码。清单 3-1 显示了上面没有密码的相同连接。请注意 Shell 如何提示输入密码。\n\n```bash\n\
  $ mysqlsh --uri root@localhost:33060/world_x\nPlease provide the password for 'root@localhost:33060':\n\
  Save password for 'root@localhost:33060'? [Y]es/[N]o/Ne[v]er (default No): Y\nMySQL\
  \ Shell 8.0.28\nCopyright (c) 2016, 2022, Oracle and/or its affiliates.\nOracle\
  \ is a registered trademark of Oracle Corporation and/or its affiliates.\nOther\
  \ names may be trademarks of their respective owners.\nType '\\help' or '\\?' for\
  \ help; '\\quit' to exit.\nCreating a session to 'root@localhost:33060/world_x'\n\
  Fetching schema names for autocompletion... Press ^C to stop.\nYour MySQL connection\
  \ id is 8 (X protocol)\nServer version: 8.0.23 MySQL Community Server - GPL\nDefault\
  \ schema `world_x` accessible through db.\nMySQL  localhost:33060+ ssl  world_x\
  \  JS >\n```\n*清单 3-1 使用 URI 连接*\n\n注意我还在 URI 中通过 `/schema` 选项指定了默认模式（`world_x`）。\n\
  \n> **提示**\n>\n> `world_x` 数据库是一个示例数据库，你可以从 [`https://dev.mysql.com/doc/index-other.xhtml`](https://dev.mysql.com/doc/index-other.xhtml)\
  \ 下载。\n\n### 使用单独选项\n\n你也可以在 Shell 命令行上使用单独的选项指定连接，例如指定用户、主机、端口等。有关连接选项的完整列表，请参阅在线参考手册（[`https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-connections.xhtml`](https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-connections.xhtml)）。清单\
  \ 3-2 展示了如何使用单独选项连接到 MySQL 服务器。\n\n```bash\n$ mysqlsh --user root --host localhost\
  \ --port 33060 --schema world_x --py --mx\nMySQL Shell 8.0.28\nCopyright (c) 2016,\
  \ 2022, Oracle and/or its affiliates.\nOracle is a registered trademark of Oracle\
  \ Corporation and/or its affiliates.\nOther names may be trademarks of their respective\
  \ owners.\nType '\\help' or '\\?' for help; '\\quit' to exit.\nCreating an X protocol\
  \ session to 'root@localhost:33060/world_x'\nFetching schema names for autocompletion...\
  \ Press ^C to stop.\nYour MySQL connection id is 9 (X protocol)\nServer version:\
  \ 8.0.23 MySQL Community Server - GPL\nDefault schema `world_x` accessible through\
  \ db.\nMySQL  localhost:33060+ ssl  world_x  Py >\n```\n*清单 3-2 使用单独选项连接*\n\n注意，我通过\
  \ `--py` 选项将模式（语言）改为了 Python。\n\n### 使用 SSL 连接\n\n你还可以创建 SSL 连接以实现到服务器的安全连接。要使用\
  \ SSL，必须将服务器配置为使用 SSL。要在运行 MySQL 的同一台机器上使用 SSL，可以使用 `--ssl-mode=REQUIRED` 选项。你也可以按照在线参考手册（[`https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-connections.xhtml`](https://dev.mysql.com/doc/mysql-shell/8.0/en/mysql-shell-connections.xhtml)）所示指定\
  \ SSL 选项。可以使用命令行选项在命令行上指定它们，也可以作为 `\\connect` Shell 命令的扩展。以下是如何使用 SSL 和命令行选项连接到服务器。\n\
  \n```bash\n$ mysqlsh -uroot -h127.0.0.1 --port=33060 --ssl-mode=REQUIRED\n```\n\n\
  > **提示**\n>\n> 有关加密连接的更多详细信息，请参阅 MySQL Shell 参考手册中的“使用加密连接”部分。\n\nMySQL Shell 是\
  \ MySQL 客户端技术的一个巨大飞跃。它不仅旨在以更智能的方式与 MySQL 中的 SQL 配合工作，还旨在支持 JavaScript 和 Python 的原型设计。你可以使用任何你想要的语言，并轻松地在它们之间切换，而无需重新启动应用程序或断开连接。这有多酷？\n\
  \n现在，让我们来看看连接到 MySQL 服务器的旧应用程序。\n\n### 连接 MySQL 客户端\n\n虽然 MySQL Shell 已推出数年，并具备包括脚本编写和开发能力在内的诸多功能，但另一个客户端在\
  \ MySQL 中已存在数十年。它是一个名为 `mysql` 的应用程序，可让你连接到服务器并在其上运行 SQL 命令。有趣的是，这个 MySQL 客户端最初被称为\
  \ MySQL 监视器，但长期以来被简称为“MySQL 客户端”、终端监视器，甚至 MySQL 命令窗口。\n\n你只有在安装 MySQL 服务器（在 Windows\
  \ 或 macOS 上）或某个软件包组件时才能获得 `mysql` 客户端。例如，在 Linux 上，你可以仅安装客户端软件包，这样也会获得该客户端。我们将把客户端的安装留到后续在本地\
  \ PC 上安装 MySQL 的章节。\n\n#### 新的默认认证方式\n\n在 MySQL 8.0.4 版本之前，默认的认证机制使用了一个名为 `mysql_native_password`\
  \ 插件的认证插件，该插件使用 SHA1 算法。这种机制速度快，且不需要加密连接。然而，由于 NIST 已建议组织停止使用 SHA1 算法，Oracle 在 MySQL\
  \ 8.0.4 版本中将默认认证插件更改为了 `caching_sha2_password` 插件。\n\n如果你想了解更多关于此变更的信息，包括 Oracle\
  \ 为何做出此变更以及为用户带来的优势，请参阅 [`https://mysqlserverteam.com/mysql-8-0-4-new-default-authentication-plugin-caching_sha2_password/`](https://mysqlserverteam.com/mysql-8-0-4-new-default-authentication-plugin-caching_sha2_password/)。\n\
  \n要使用 MySQL 客户端 (`mysql`) 连接到服务器，你必须指定一个用户账户和要连接的服务器。如果你连接的是同一台机器上的服务器，可以省略服务器信息（主机和端口），因为它们默认为\
  \ localhost 和端口 3306。用户通过 `--user`（或 `-u`）选项指定。你可以在命令行上指定用户的密码，但更安全的做法是指定 `--password`（或\
  \ `-p`），客户端会提示你输入密码。如果你确实在命令行上指定了密码，系统会提示一条警告，建议你不要这样做。\n\n在同一台机器上使用 `mysql` 客户端而不指定\
  \ `--host`（或 `-h`）和 `--port` 选项时，不会使用网络连接。如果你想通过网络连接或使用不同端口连接，必须使用回环地址。例如，要连接到同一台机器上运行在端口\
  \ 3307 的服务器，请使用命令 `mysql -uroot -p –h127.0.0.1 --port=3306`。清单 3-3 展示了一个使用 `mysql`\
  \ 客户端连接（并断开连接）到 MySQL 服务器的示例。\n\n```\n$ mysql -uroot -p -h 127.0.0.1 --port=3306\n\
  Enter password:\nWelcome to the MySQL monitor.  Commands end with ; or \\g.\nYour\
  \ MySQL connection id is 15\nServer version: 8.0.23 MySQL Community Server - GPL\n\
  Copyright (c) 2000, 2021, Oracle and/or its affiliates.\nOracle is a registered\
  \ trademark of Oracle Corporation and/or its\naffiliates. Other names may be trademarks\
  \ of their respective\nowners.\nType 'help;' or '\\h' for help. Type '\\c' to clear\
  \ the current input statement.\nmysql> quit\nBye\n清单 3-3\n使用 mysql 客户端进行连接\n```\n\
  \n## 基本 SQL 命令\n\n现在我们已经了解了如何连接到 MySQL，让我们通过一个简短的例子，简要地看一下你可能会用到的一些更流行的 SQL 命令。我们将在后面的章节中更详细地讨论这些命令。清单\
  \ 3-4 展示了使用 `mysql` 客户端执行几个 SQL 命令的示例。\n\n提示：要查看客户端中可用的命令列表，请在提示符下输入 `help;` 并按\
  \ `Enter`。\n\n```\n$ mysql -uroot -p -h 127.0.0.1 --port=3306\nEnter password:\n\
  Welcome to the MySQL monitor.  Commands end with ; or \\g.\nYour MySQL connection\
  \ id is 15\nServer version: 8.0.23 MySQL Community Server - GPL\nCopyright (c) 2000,\
  \ 2021, Oracle and/or its affiliates.\nOracle is a registered trademark of Oracle\
  \ Corporation and/or its\naffiliates. Other names may be trademarks of their respective\n\
  owners.\nType 'help;' or '\\h' for help. Type '\\c' to clear the current input statement.\n\
  mysql> CREATE DATABASE greenhouse;\nQuery OK, 1 row affected (0.00 sec)\nmysql>\
  \ CREATE TABLE greenhouse.plants (plant_name char(50), sensor_value int, sensor_event\
  \ timestamp);\nQuery OK, 0 rows affected (0.02 sec)\nmysql> INSERT INTO greenhouse.plants\
  \ VALUES ('living room', 23, NULL);\nQuery OK, 1 row affected (0.01 sec)\nmysql>\
  \ SELECT * FROM greenhouse.plants;\n+-------------+--------------+--------------+\n\
  | plant_name  | sensor_value | sensor_event |\n+-------------+--------------+--------------+\n\
  | living room |           23 | NULL         |\n+-------------+--------------+--------------+\n\
  1 row in set (0.00 sec)\nmysql> SET @@global.server_id = 106;\nQuery OK, 0 rows\
  \ affected (0.00 sec)\nmysql> quit\nBye\n清单 3-4\n使用 mysql 客户端的 SQL 命令示例\n```\n\n\
  在这个例子中，你可以看到以 `CREATE DATABASE` 和 `CREATE TABLE` 语句形式出现的数据定义语言^(⁵)（DDL），以 `INSERT`\
  \ 和 `SELECT` 语句形式出现的数据操作语言^(⁶)（DML），以及一个用于设置全局服务器变量的简单管理命令。\n\n接下来，你看到的是创建数据库和表来存储数据，在表中添加一行数据，最后检索表中的数据。注意我是如何使用大写字母来书写\
  \ SQL 命令关键字的。这是一种常见的做法，有助于使 SQL 命令更易于阅读，也更容易找到用户提供的选项或数据。\n\n提示：你可以通过输入命令 `quit`\
  \ 退出 MySQL 客户端。在 Linux 和 Unix 系统上，你可以按 `Ctrl+D` 退出客户端。\n\nMySQL 中有非常多的命令。幸运的是，你只需要掌握少数几个更常用的命令即可。以下是你将最常使用的命令。用\
  \ `<>` 括起来的部分表示命令中由用户提供的组件，`[...]` 表示需要其他选项：\n\n*   `CREATE DATABASE <database_name>`：创建一个数据库\n\
  *   `USE <database>`：设置默认数据库（非 SQL 命令）\n*   `CREATE TABLE <table_name> [...]`：创建一个用于存储数据的表或结构\n\
  *   `INSERT INTO <table_name> [...]`：向表中添加数据\n*   `UPDATE [...]`：更改特定行的一个或多个值\n\
  *   `DELETE FROM <table_name> [...]`：从表中删除数据\n*   `SELECT [...]`：从表中检索数据（行）\n* \
  \  `SHOW [...]`：显示对象列表\n\n注意：你必须以分号 (`;`) 或 `\\G` 终止每条命令。\n\n尽管此列表只是一个简短的介绍，远非完整的语法指南，但有一份优秀的在线参考手册，其中更详细地解释了每条命令（以及更多内容）。当你对\
  \ MySQL 中的任何内容有疑问时，应查阅该在线参考手册。你可以在 [`http://dev.mysql.com/doc/`](http://dev.mysql.com/doc/)\
  \ 找到它。\n\n其中一个更有趣的命令是允许你查看对象列表的命令。例如，你可以使用 `SHOW DATABASES` 查看数据库，在切换到某个数据库后使用 `SHOW\
  \ TABLES` 查看表列表，甚至使用 `SHOW GRANTS` 查看用户的权限。我发现我自己经常使用这些命令。\n\n如果你认为 MySQL 的内容远不止这几个简单的命令，那你是对的。尽管它易于使用且启动速度快，但\
  \ MySQL 是一个功能齐全的关系数据库管理系统（RDBMS）。它的内容远比你在此处看到的要多。有关 MySQL 的更多信息，包括所有高级功能，请参阅参考手册。\n\
  \n### 如何获取与安装 MySQL\n\nMySQL 服务器适用于多种平台，包括大多数 Linux 和 Unix 平台、Mac OS X 以及 Windows。它可作为社区版下载（开源）或作为授权产品（企业版）提供。您可以直接从\
  \ Oracle 下载社区版，或通过您的 Oracle 账户下载企业版。本章中，我们将使用社区版。\n\n要下载 MySQL 8 的社区版，请访问 [`www.mysql.com/downloads/`](http://www.mysql.com/downloads/)，向下滚动并点击\
  \ *MySQL 社区版（GPL）下载*，然后点击 *MySQL 社区服务器*。页面将自动检测您的操作系统。如果您想为其他平台下载，可以从下拉列表中选择。\n\n\
  下载页面将列出多个可供下载的文件。根据您的平台，您可能会看到几个选项，包括压缩文件、源代码和安装包。大多数用户会选择在笔记本电脑或台式计算机上安装的安装包。图\
  \ 3-2 展示了 macOS 平台各种下载选项的示例。\n\n![](img/527055_1_En_3_Fig2_HTML.png)\n\n一张截图描绘了通用可用版本选项卡，显示了可下载的\
  \ macOS 11 示例。列出了版本和文件大小。下载按钮在右侧。\n\n图 3-2\n\nmacOS 下载页面\n\n最受欢迎的平台之一是 Microsoft\
  \ Windows。Oracle 为 Windows 提供了一个名为 Windows 安装程序的特殊安装包。该包包含社区许可下所有可用的 MySQL 产品，包括\
  \ MySQL 服务器、Workbench、实用工具以及所有可用的连接器（用于连接到 MySQL 的程序库）。这使得在 Windows 上安装变成了一站式、一次完成的事情。图\
  \ 3-3 展示了 Windows 安装程序的下载页面。\n\n![](img/527055_1_En_3_Fig3_HTML.png)\n\n通用可用版本选项卡的截图显示了适用于\
  \ Windows 的 My S Q L 安装程序，底部也提供了其他下载选项。\n\n图 3-3\n\nWindows 安装程序下载页面\n\n我们在图片中 Windows\
  \ 安装程序下载链接下方看到这些内容。您可以选择 Windows 安装程序的 32 位或 64 位安装。请注意，该包可能只是一个包含服务器代码的 `.zip`\
  \ 文件。在这种情况下，您可能需要从解压后的文件夹运行服务器，或进行本地手动安装。\n\n如果您想跟随本章的示例进行操作，应考虑在您的 PC 或本地网络中的另一台\
  \ PC 上安装 MySQL。虽然使用 MDS 时您无需进行任何安装或配置，但我们可以通过本地安装来了解一些关于 MySQL 的知识，这样我们就可以随时使用它而无需产生成本。\n\
  \n安装 MySQL 非常简单，一旦您下载了适用于您平台的正确软件包，只需几分钟即可完成。只需像安装该平台上的任何其他软件一样安装服务器和任何子组件。如果您需要分步说明，可以参考在线参考手册\
  \ ([`https://dev.mysql.com/doc/refman/8.0/en/installing.xhtml`](https://dev.mysql.com/doc/refman/8.0/en/installing.xhtml))。\n\
  \n出于实验目的，您可以使用默认设置安装 MySQL。更具体地说，采用标准安装。如果您想为不同的环境进行预配置，随时可以重新安装。在安装过程中，系统可能会要求您为\
  \ root 用户提供密码。请务必遵循密码选择的最佳实践。\n\n好的，现在我们已经安装了 MySQL 8 服务器，我们可以开始配置服务器以供使用。使用 MDS\
  \ 时，您无需执行以下任何操作，但了解有关 MySQL 如何配置以及如何向用户账户授予权限总是有好处的。\n\n### 配置与管理 MySQL 访问权限\n\n\
  既然您已在本地安装了 MySQL，让我们简要讨论一下如何配置 MySQL、如何向他人授予服务器（和数据库）的访问权限，以及如何设置 X 插件（启用文档存储的关键组件）。我们首先了解一下用于定义\
  \ MySQL 行为并配置选项的配置文件。\n\n#### 配置文件\n\n在 MySQL 中配置启动选项和变量的主要方法是使用一个名为 `my.cnf`（在\
  \ Windows 上为 `my.ini`）的文本文件。该文件通常位于 Posix 系统上的 `/etc` 文件夹中。例如，在 macOS 上，该文件名为 `/etc/my.cnf`。清单\
  \ 3-5 展示了一个典型 MySQL 配置文件的前几十行。\n\n```sql\n"
- '# 小型系统的 MySQL 配置文件示例。

  '
- '# 以下选项将传递给所有 MySQL 客户端

  [client]

  port            = 3306

  socket          = /tmp/mysql.sock

  '
- '# 以下是一些特定程序的配置项

  '
- "# MySQL 服务器\n[mysqld]\nport            = 3306\nsocket          = /tmp/mysql.sock\n\
  skip-external-locking\nkey_buffer_size = 16K\nmax_allowed_packet = 1M\ntable_open_cache\
  \ = 4\nsort_buffer_size = 64K\nread_buffer_size = 256K\nread_rnd_buffer_size = 256K\n\
  net_buffer_length = 2K\nthread_stack = 1024K\n...\ninnodb_log_file_size = 5M\ninnodb_log_buffer_size\
  \ = 8M\ninnodb_flush_log_at_trx_commit = 1\ninnodb_lock_wait_timeout = 50\ninnodb_log_files_in_group\
  \ = 2\nslow-query-log\ngeneral-log\n...\n```\n\n清单 3-5\n\nMySQL 配置文件摘录\n\n请注意，我们使用方括号\
  \ `[]` 定义的节来分组设置。例如，我们看到一个名为 `[client]` 的节，用于定义读取配置文件的任何 MySQL 客户端的选项。同样，我们看到一个名为\
  \ `[mysqld]` 的节，它适用于服务器进程（因为可执行文件名为 `mysqld`）。还要注意，我们看到了基本选项的设置，如端口、套接字等。但是，我们也可以使用配置文件为\
  \ InnoDB、复制等设置选项。\n\n我建议找到并浏览您安装的配置文件，以便查看选项及其值。如果您遇到需要更改选项的情况——比如为了测试效果或进行实验——您可以使用\
  \ `SET` 命令来更改值，可以作为全局设置（影响所有连接）或会话设置（仅适用于当前连接）。\n\n但是，如果您更改了一个同时在配置文件中的全局设置，该值（状态）将仅保留到服务器重新启动。因此，如果您希望保留全局更改，应考虑将它们放在配置文件中。\n\
  \n相反，在会话级别设置值可能对有限时间有益，或者您可能只想为特定任务执行此操作。例如，以下代码关闭了二进制日志，执行一个或多个 SQL 命令，然后再打开二进制日志。这是一个简单但深刻的示例，说明如何在参与复制的服务器上执行操作而不影响其他服务器：\n\
  \n```sql\nSET sql_log_bin=0;\n\nSET sql_log_bin=1;\n```\n\n有关配置文件以及如何使用它来配置 MySQL\
  \ 8 的更多信息，包括使用多个选项文件以及这些文件在每个平台上的位置，请参阅在线参考手册 ([`http://dev.mysql.com/doc/refman/8.0/en/`](http://dev.mysql.com/doc/refman/8.0/en/))\
  \ 中题为“使用选项文件”的部分。\n\n\n#### 创建用户与授予访问权限\n\n在使用 MySQL 之前，你还需要了解两个额外的管理操作：创建用户账户以及授予数据库访问权限。你必须首先发出\
  \ `CREATE USER` 命令，然后执行一个或多个 `GRANT` 命令。例如，下面展示了创建一个名为 `hvac_user1` 的用户并授予其访问 `room_temp`\
  \ 数据库的权限：\n\n```\nCREATE USER 'hvac_user1'@'%' IDENTIFIED BY 'secret';\nGRANT SELECT,\
  \ INSERT, UPDATE ON room_temp.* TO 'hvac_user1'@'%';\n```\n\n第一条命令创建了名为 `hvac_user1`\
  \ 的用户，但用户名中还包含一个 `@` 符号及其后的字符串。这第二个字符串是用户关联的主机名。也就是说，MySQL 中的每个用户都有一个用户名和一个主机名，以\
  \ `user@host` 的形式来唯一标识他们。这意味着用户和主机 `hvac_user1@10.0.1.16` 与用户和主机 `hvac_user1@10.0.1.17`\
  \ 并不是同一个。然而，`%` 符号可以作为通配符，用于将用户关联到任何主机。`IDENTIFIED BY` 子句用于设置该用户的密码。\n\n## 关于安全性的说明\n\
  \n为你的应用程序创建一个不具有 MySQL 系统完全访问权限的用户总是一个好主意。这样可以最大限度地减少意外更改，并防止被利用。例如，建议你创建一个用户，仅授予其访问你存储（或检索）数据的那些数据库的权限。同时，在使用主机通配符\
  \ `%` 时要小心。虽然它使得创建单个用户并让该用户可以从任何主机访问数据库服务器变得更容易，但它也使得那些心怀恶意的人（一旦他们发现了密码）能够更容易地访问你的服务器。\n\
  \n第二条命令授予了数据库访问权限。你可以授予用户的权限有很多。该示例展示了你可能最想授予传感器网络数据库用户的一组权限：读取（`SELECT`）、添加数据（`INSERT`）和更改数据（`UPDATE`）。有关安全性和账户访问权限的更多信息，请参阅在线参考手册。该命令还指定了授予权限的数据库和对象。因此，可以授予用户对某些表的读取（`SELECT`）权限，以及对其他表的写入（`INSERT`、`UPDATE`）权限。此示例授予用户访问\
  \ `room_temp` 数据库中所有对象（表、视图等）的权限。\n\n## 基本 SQL 命令\n\n如果你从未使用过数据库系统，学习和掌握它需要培训、经验和大量的毅力。要达到精通所需的知识中，最重要的是如何使用常见的\
  \ SQL 命令和概念。本节通过介绍最常见的 MySQL 命令和概念来完成 MySQL 入门，以此作为学习如何使用文档存储的基础。\n\n> **注意**\n\
  > 本节并非复制参考手册，而是在较高层次上介绍这些命令和概念。如果你决定使用任何命令或概念，请参阅在线参考手册以获取更多细节、完整的命令语法以及其他示例。\n\n\
  本节回顾了最常见的 SQL 和 MySQL 特有的命令，你需要了解这些命令才能充分利用你的 MySQL 服务器数据库。虽然你已经看到过其中一些命令的实际应用，但本节提供了额外的信息来帮助你使用它们。\n\
  \n需要理解的一个重要规则是，用户提供的变量名是区分大小写的，并且遵循主机平台的大小写敏感性。请查看你平台的在线参考手册，了解大小写敏感性如何影响用户提供的变量。\n\
  \n> **注意**\n> 本节中的大多数示例查询都来自物联网（IoT）应用程序，其中一个或多个传感器和设备记录数据。尽管如此，这些示例代表了我们通过 SQL\
  \ 语句与 MySQL 交互的典型方式。\n\n### 创建数据库和表\n\n你需要学习和掌握的最基本的命令是 `CREATE DATABASE` 和 `CREATE\
  \ TABLE` 命令。回想一下，像 MySQL 这样的数据库服务器允许你创建任意数量的数据库，你可以在其中添加表并以逻辑方式存储数据。\n\n要创建数据库，请使用\
  \ `CREATE DATABASE` 后跟数据库的名称。如果你正在使用 MySQL 客户端，你必须使用 `USE` 命令切换到特定的数据库。客户端的焦点是最近指定的数据库，无论是通过启动时（在命令行上）还是通过\
  \ `USE` 命令指定的。\n\n你可以通过首先引用数据库名称来覆盖此设置。例如，`SELECT * FROM db1.table1` 将无论设置的默认数据库如何都会执行。然而，省略数据库名称将导致\
  \ `mysql` 客户端使用默认数据库。下面显示了两条命令，用于创建数据库和更改数据库焦点：\n\n```\nmysql> CREATE DATABASE greenhouse;\n\
  mysql> USE greenhouse;\n```\n\n> **提示**\n> 如果你想查看服务器上的所有数据库，请使用 `SHOW DATABASES`\
  \ 命令。\n\n创建一个表需要，没错，就是 `CREATE TABLE` 命令。这个命令有很多选项，不仅允许你指定列及其数据类型，还可以指定其他选项，如索引、外键等。也可以使用\
  \ `CREATE INDEX` 命令创建索引（见下面的代码）。下面展示了如何创建一个简单的表来存储植物传感器数据，比如可能用于监测个人温室的数据：\n\n```\n\
  CREATE TABLE `greenhouse`.`plants` (\n`plant_name` char(30) NOT NULL,\n`sensor_value`\
  \ float DEFAULT NULL,\n`sensor_event` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP\
  \ ON UPDATE CURRENT_TIMESTAMP,\n`sensor_level` char(5) DEFAULT NULL,\nPRIMARY KEY\
  \ `plant_name` (`plant_name`)\n) ENGINE=InnoDB DEFAULT CHARSET=latin1;\n```\n\n\
  注意这里我指定了表名（`plants`）和四列（`plant_name`, `sensor_value`, `sensor_event` 和 `sensor_level`）。我使用了几种数据类型。对于\
  \ `plant_name`，我使用了一个最多 30 个字符的字符字段，为 `sensor_value` 使用了浮点数据类型，为 `sensor_event`\
  \ 使用了时间戳值，为 `sensor_level` 使用了另一个 5 个字符的字符字段。\n\n`TIMESTAMP` 数据类型在你想记录事件或动作的日期和时间的任何时候都特别有用。例如，了解传感器值何时被读取通常很有帮助。通过向表中添加\
  \ `TIMESTAMP` 列，你不需要在将值插入数据库表时计算、读取或以其他方式格式化日期和时间。\n\n还要注意，我指定将 `plant_name` 列定义为键，这会创建一个索引。在这种情况下，它也是主键。`PRIMARY\
  \ KEY` 短语告诉服务器确保表中存在且仅存在一行与该列的值匹配。你可以通过重复关键字来指定多个列用于主键。请注意，所有主键列都必须不允许为空（`NOT NULL`）。\n\
  \n如果你无法确定一组能唯一标识一行的列（而你希望有这样的行为——有些表没有此限制，但好的 DBA 不会这样），你可以使用一个适用于整数字段的人工数据类型选项，称为\
  \ `AUTO INCREMENT`。当用于一个列（必须是第一列）时，服务器会自动为插入的每一行递增此值。这样，它就创建了一个默认的主键。有关自动递增列的更多信息，请参阅在线参考手册。\n\
  \n最佳实践建议，在某些情况下，例如在每列值很大或有许多唯一值的表上，在字符字段上使用主键可能不是最优的。这可能会使搜索和索引变慢。在这种情况下，你可以使用一个自动递增字段来人为地添加一个更小（但有些晦涩）的主键。\n\
  \n\n\n### 数据搜索\n\n除了前一个示例中显示的类型外，还有更多数据类型可用。你应该查阅在线参考手册以获取完整的数据类型列表。参见“`数据类型`”章节。如果你想了解表的布局或“模式”，请使用\
  \ `SHOW CREATE TABLE` 命令。\n\n**提示**  \n与数据库类似，你也可以使用 `SHOW TABLES` 命令获取数据库中所有表的列表。\n\
  \n你需要掌握的最常用的基础命令是从表中返回数据（也称为结果集或行）的命令。为此，你需要使用 `SELECT` 语句。这个 SQL 语句是数据库系统的工作主力。所有针对数据的查询都将通过此命令执行。因此，我们将花更多时间来研究可以使用的各种子句（部分），从列列表开始。\n\
  \n**注意**  \n虽然我们首先研究 `SELECT` 语句，但如果你想在系统上尝试这些操作，请务必先运行下一节中的 `INSERT` 语句。\n\n`SELECT`\
  \ 语句允许你指定要从数据中选择哪些列。该列表作为语句的第一部分出现。第二部分是 `FROM` 子句，它指定了你想要从中检索行的表。\n\n**注意**  \n\
  `FROM` 子句可以与 `JOIN` 操作符一起使用来连接表。你将在后面的章节中看到一个连接的简单示例。\n\n你指定列的顺序决定了结果集中显示的顺序。如果你想要所有列，可以使用星号\
  \ (`*`) 代替。代码清单 3-6 演示了生成相同结果集的三个语句。也就是说，每个输出中都将显示相同的行。实际上，为简单起见，我使用了一个只有四行的表。\n\
  \n```\nmysql> SELECT plant_name, sensor_value, sensor_event, sensor_level FROM greenhouse.plants;\n\
  +--------------------+--------------+---------------------+--------------+\n| plant_name\
  \         | sensor_value | sensor_event        | sensor_level |\n+--------------------+--------------+---------------------+--------------+\n\
  | fern in den        |       0.2319 | 2015-09-23 21:04:35 | NULL         |\n| fern\
  \ on deck       |         0.43 | 2015-09-23 21:11:45 | NULL         |\n| flowers\
  \ in bedroom1    |    0.301 | 2015-09-23 21:11:45 | NULL         |\n| weird plant\
  \ in kitchen |    0.677 | 2015-09-23 21:11:45 | NULL         |\n+--------------------+--------------+---------------------+--------------+\n\
  4 rows in set (0.00 sec)\nmysql> SELECT * FROM greenhouse.plants;\n+--------------------+--------------+---------------------+--------------+\n\
  | plant_name         | sensor_value | sensor_event        | sensor_level |\n+--------------------+--------------+---------------------+--------------+\n\
  | fern in den        |       0.2319 | 2015-09-23 21:04:35 | NULL         |\n| fern\
  \ on deck       |         0.43 | 2015-09-23 21:11:45 | NULL         |\n| flowers\
  \ in bedroom1    |    0.301 | 2015-09-23 21:11:45 | NULL         |\n| weird plant\
  \ in kitchen |    0.677 | 2015-09-23 21:11:45 | NULL         |\n+--------------------+--------------+---------------------+--------------+\n\
  4 rows in set (0.00 sec)\nmysql> SELECT sensor_value, plant_name, sensor_level,\
  \ sensor_event FROM greenhouse.plants;\n+--------------+-------------------+--------------+---------------------+\n\
  | sensor_value | plant_name        | sensor_level | sensor_event        |\n+--------------+-------------------+--------------+---------------------+\n\
  |       0.2319 | fern in den       | NULL         | 2015-09-23 21:04:35 |\n|   \
  \      0.43 | fern on deck      | NULL         | 2015-09-23 21:11:45 |\n|      \
  \  0.301 | flowers in bedroom1    | NULL    |         23 21:11:45 |\n|        0.677\
  \ | weird plant in kitchen | NULL    | 2015-09-23 21:11:45 |\n+--------------+------------------------+---------+---------------------+\n\
  4 rows in set (0.00 sec)\n```\n\n**代码清单 3-6** `SELECT` 语句示例\n\n请注意，前两个语句不仅结果行相同，列也相同且顺序一致，但是第三个语句，虽然生成了相同的结果行，但显示的列顺序不同。\n\
  \n你还可以在列列表中使用函数来执行计算和类似操作。一个特殊的例子是使用 `COUNT()` 函数来确定结果集中的行数，如下所示。有关 MySQL 提供的函数的更多示例，请参阅在线参考手册：\n\
  \n```\nSELECT COUNT(*) FROM greenhouse.plants;\n```\n\n`SELECT` 语句中的下一个子句是 `WHERE`\
  \ 子句。在这里，你指定要用于限制结果集中行数的条件。也就是说，只有那些符合条件的行。这些条件基于列，并且可以相当复杂。也就是说，你可以指定基于计算、连接结果等的条件。但大多数条件将是简单的一列或多列的相等或不等式，以便回答问题。例如，假设你想查看传感器读数小于\
  \ 0.40 的植物。在这种情况下，我们执行以下查询并接收结果。注意，我只指定了两列：植物名称和传感器读数：\n\n```\nmysql> SELECT plant_name,\
  \ sensor_value FROM greenhouse.plants WHERE sensor_value < 0.40;\n+---------------------+--------------+\n\
  | plant_name          | sensor_value |\n+---------------------+--------------+\n\
  | fern in den         |       0.2319 |\n| flowers in bedroom1 |        0.301 |\n\
  +---------------------+--------------+\n2 rows in set (0.01 sec)\n```\n\n你还可以使用其他子句，包括用于对行进行分组以进行聚合或计数的\
  \ `GROUP BY` 子句，以及用于对结果集进行排序的 `ORDER BY` 子句。让我们快速了解一下每个子句，从聚合开始。\n\n假设你想计算表中每个传感器的读数平均值。在这种情况下，我们有一个包含各种传感器随时间推移的读数的表。虽然该示例仅包含四行（因此可能不具有统计意义），但它非常清楚地演示了聚合的概念，如代码清单\
  \ 3-7 所示。注意，我们得到的结果只是四个传感器读数的平均值。\n\n```\nmysql> SELECT plant_name, sensor_value\
  \ FROM greenhouse.plants WHERE plant_name = 'fern on deck';\n+--------------+--------------+\n\
  | plant_name   | sensor_value |\n+--------------+--------------+\n| fern on deck\
  \ |         0.43 |\n| fern on deck |         0.51 |\n| fern on deck |        0.477\
  \ |\n| fern on deck |         0.73 |\n+--------------+--------------+\n4 rows in\
  \ set (0.00 sec)\nmysql> SELECT plant_name, AVG(sensor_value) AS avg_value FROM\
  \ greenhouse.plants WHERE plant_name = 'fern on deck' GROUP BY plant_name;\n+--------------+-------------------+\n\
  | plant_name   | avg_value         |\n+--------------+-------------------+\n| fern\
  \ on deck | 0.536750003695488 |\n+--------------+-------------------+\n1 row in\
  \ set (0.00 sec)\n```\n\n**代码清单 3-7** `GROUP BY` 示例\n\n注意，我在列列表中指定了平均值函数 `AVG()`，并传入了我想要计算平均值的列名。MySQL\
  \ 中有许多这样的函数可用于执行强大的计算。显然，这是数据库服务器中存在巨大能力的又一个例证，如果在网络中典型的轻量级传感器或聚合节点上实现，将需要更多的资源。\n\
  \n还要注意，我用 `AS` 关键字重命名了包含平均值的列。你可以使用它来重命名任何指定的列，从而更改结果集中的列名，正如你在代码清单中看到的那样。\n\n`GROUP\
  \ BY` 子句的另一个用途是计数。在这里，我们将 `AVG()` 替换为 `COUNT()`，并收到了匹配 `WHERE` 子句的行数。更具体地说，我们想知道每个植物存储了多少个传感器值。\n\
  \n\n\n## 查询数据\n\n```sql\nmysql> SELECT plant_name, COUNT(sensor_value) as num_values\
  \ FROM greenhouse.plants GROUP BY plant_name;\n+------------------------+------------+\n\
  | plant_name             | num_values |\n+------------------------+------------+\n\
  | fern in den            |          1 |\n| fern on deck           |          4 |\n\
  | flowers in bedroom1    |          1 |\n| weird plant in kitchen |          1 |\n\
  +------------------------+------------+\n4 rows in set (0.00 sec)\n```\n\n现在，假设我们希望看到结果集按传感器值排序。我们将使用与选择甲板上蕨类植物行相同的查询，但使用\
  \ `ORDER BY` 子句按传感器值对行进行升序和降序排序。列表 3-8 显示了每种选项的结果。\n\n```sql\nmysql> SELECT plant_name,\
  \ sensor_value FROM greenhouse.plants WHERE plant_name = 'fern on deck' ORDER BY\
  \ sensor_value ASC;\n+--------------+--------------+\n| plant_name   | sensor_value\
  \ |\n+--------------+--------------+\n| fern on deck |         0.43 |\n| fern on\
  \ deck |        0.477 |\n| fern on deck |         0.51 |\n| fern on deck |     \
  \    0.73 |\n+--------------+--------------+\n4 rows in set (0.00 sec)\nmysql> SELECT\
  \ plant_name, sensor_value FROM greenhouse.plants WHERE plant_name = 'fern on deck'\
  \ ORDER BY sensor_value DESC;\n+--------------+--------------+\n| plant_name   |\
  \ sensor_value |\n+--------------+--------------+\n| fern on deck |         0.73\
  \ |\n| fern on deck |         0.51 |\n| fern on deck |        0.477 |\n| fern on\
  \ deck |         0.43 |\n+--------------+--------------+\n4 rows in set (0.00 sec)\n\
  ```\n列表 3-8\n`ORDER BY` 示例\n\n正如我所提到的，`SELECT` 语句远不止这里展示的内容，但我们所看到的将让你在大多数中小型数据库解决方案的典型数据工作中走得很远。\n\
  \n### 创建数据\n\n现在你已经创建了数据库和表，你将需要向表中加载或插入数据。你可以使用 `INSERT INTO` 语句来完成。在这里，我们指定表和行的数据。下面显示了一个简单的示例：\n\
  \n```sql\nINSERT INTO greenhouse.plants (plant_name, sensor_value) VALUES ('fern\
  \ in den', 0.2319);\n```\n\n在这个例子中，我通过指定名称和值来为我的一个植物插入数据。你可能会想，其他列怎么办？在这种情况下，其他列包括一个时间戳列，它将由数据库服务器填充。所有其他列（只有一个）将被设置为\
  \ `NULL`，这意味着没有可用的值、该值缺失、该值不是零或者该值为空。\n\n请注意，我在行数据之前指定了列。当你想要插入的数据列数少于表包含的列数时，这是必需的。更具体地说，省略列列表意味着你必须为表中的所有列提供数据（或\
  \ `NULL`）。此外，列出的列的顺序可以不同于它们在表中定义的顺序。省略列列表将导致列数据的顺序基于它们在表中的出现顺序。\n\n你也可以使用逗号分隔的行值列表，通过同一命令插入多行，如下所示：\n\
  \n```sql\nINSERT INTO greenhouse.plants (plant_name, sensor_value) VALUES ('flowers\
  \ in bedroom1', 0.301), ('weird plant in kitchen', 0.677), ('fern on deck', 0.430);\n\
  ```\n\n这里我用一个命令插入了多行。请注意，这只是一个简写机制，除了自动提交外，与发出单独的命令没有区别。\n\n### 更新数据\n\n有时你想要更改或更新数据。你可能遇到需要更改一个或多个列的值、替换多行的值或更正数字数据的格式甚至范围的情况。要更新数据，我们使用\
  \ `UPDATE` 命令。你可以更新特定的列、更新一组列、对一个或多个列执行计算等等。\n\n更可能的情况是，你或你的用户会想要重命名数据库中的对象。例如，假设我们确定甲板上的植物实际上不是蕨类，而是一种奇异的开花植物。在这种情况下，我们希望将所有植物名为“fern\
  \ on deck”的行更改为“flowers on deck”。以下命令执行此更改：\n\n```sql\nUPDATE greenhouse.plants\
  \ SET plant_name = 'flowers on deck' WHERE plant_name = 'fern on deck';\n```\n\n\
  请注意，这里的关键操作符是 `SET` 操作符。它告诉数据库为指定的列分配一个新值。你可以在命令中列出多个 `SET` 操作。\n\n请注意，我在这里使用了 `WHERE`\
  \ 子句来将 `UPDATE` 限制到特定的一组行。这与你在 `SELECT` 语句中看到的 `WHERE` 子句相同，作用也一样；它允许你指定限制受影响行的条件。如果你不使用\
  \ `WHERE` 子句，更新将应用于所有行。\n\n注意\n\n不要忘记 `WHERE` 子句！发出没有 `WHERE` 子句的 `UPDATE` 命令将影响表中的所有行！\n\
  \n### 删除数据\n\n有时你最终会在表中得到需要删除的数据。也许你使用了测试数据并想要摆脱这些假行，或者你可能想要压缩或清除你的表，或者想要删除不再适用的行。要删除行，请使用\
  \ `DELETE FROM` 命令。\n\n让我们看一个例子。假设你有一个正在开发的植物监测解决方案，并且你发现你的某个传感器或传感器节点读数太低，这是由于编码、接线或校准错误造成的。在这种情况下，我们希望删除所有传感器值小于\
  \ 0.20 的行。以下命令执行此操作：\n\n```sql\nDELETE FROM plants WHERE sensor_value < 0.20;\n\
  ```\n\n注意\n\n不要忘记 `WHERE` 子句！发出没有 `WHERE` 子句的 `DELETE FROM` 命令将永久删除表中的所有行！\n\n请注意，我在这里使用了\
  \ `WHERE` 子句。也就是说，一个限制所操作行的条件语句。你可以使用任何列或条件；只要确保它们是正确的！我喜欢先在 `SELECT` 语句中使用相同的 `WHERE`\
  \ 子句。例如，我会先发出以下命令来检查我是否将要删除我想要的行，并且仅删除这些行。请注意，这是相同的 `WHERE` 子句：\n\n```sql\nSELECT\
  \ * FROM plants WHERE sensor_value < 0.20;\n```\n\n\n\n### 使用索引\n\n表的创建不使用任何排序方式，也就是说，表本身是无序的。虽然\
  \ MySQL 每次返回的数据顺序可能相同，但除非创建索引，否则这种顺序并非隐含（或可靠的）。这里所说的排序，并非你通常所想的排序（那可以通过`SELECT`语句中的`ORDER\
  \ BY`子句实现）。\n\n实际上，索引是服务器在执行查询时用来读取数据的映射。例如，如果表上没有索引，而你想选择某列值大于特定值的所有行，服务器就必须读取所有行来找出匹配项。然而，如果我们在该列上添加了索引，服务器就只需读取符合条件的那些行。\n\
  \n需要说明的是，索引有多种形式。这里我指的是聚簇索引，其索引中包含了该列的值，这使得服务器仅需读取索引本身，而不必读取数据行，即可进行条件测试。\n\n创建索引时，你既可以在`CREATE\
  \ TABLE`语句中指定索引，也可以单独执行`CREATE INDEX`命令。以下是一个简单示例：\n\n```sql\nCREATE INDEX plant_name\
  \ ON plants (plant_name);\n```\n\n这条命令在`plant_name`列上添加了一个索引。请观察它如何影响表的定义：\n\n```sql\n\
  CREATE TABLE `plants` (\n`plant_name` char(30) NOT NULL,\n`sensor_value` float DEFAULT\
  \ NULL,\n`sensor_event` timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,\n\
  `sensor_level` char(5) DEFAULT NULL,\nPRIMARY KEY (`plant_name`),\nKEY `plant_name`\
  \ (`plant_name`)\n) ENGINE=InnoDB DEFAULT CHARSET=latin1\n```\n\n像这样创建的索引不影响表中行的唯一性，即确保特定列（或列组合）的某个值只能访问到唯一的一行。我指的是主键（或主索引）的概念，这是在创建表时使用的一个特殊选项，如前所述。\n\
  \n### 视图\n\n视图是一个或多个表中查询结果的逻辑映射。它们可以像表一样在查询中被引用，这使其成为创建数据子集进行操作的强大工具。你可以使用`CREATE\
  \ VIEW`来创建视图，并赋予它一个类似表的名称。以下是一个简单示例，我们创建一个测试视图来从表中读取值。在这个例子中，我们限制了视图的大小（行数），但你可以为视图使用各种条件，包括合并来自不同表的数据：\n\
  \n```sql\nCREATE VIEW test_plants AS SELECT * FROM plants LIMIT 5;\n```\n\n在中小型数据库解决方案中，通常不会遇到视图，但我在这里介绍它们，是为了让你了解其存在，以便在你决定进行额外分析并希望将数据组织成更小的组以便于阅读时使用。\n\
  \n### 触发器\n\n另一个高级概念（以及相关的 SQL 命令）是使用一种事件驱动机制，该机制在数据被更改时“被触发”。也就是说，你可以创建一小段 SQL\
  \ 命令（一个过程），它将在数据被插入或更改时执行。\n\n触发器可以在几种事件或条件下执行。你可以在更新、插入或删除操作之前或之后设置一个触发器。触发器与单个表关联，其主体是一个特殊结构，允许你对受影响的行进行操作。以下是一个简单示例：\n\
  \n```sql\nDELIMITER //\nCREATE TRIGGER set_level BEFORE INSERT ON plants FOR EACH\
  \ ROW\nBEGIN\nIF NEW.sensor_value < 0.40 THEN\nSET NEW.sensor_level = 'LOW';\nELSEIF\
  \ NEW.sensor_value < 0.70 THEN\nSET NEW.sensor_level = 'OK';\nELSE\nSET NEW.sensor_level\
  \ = 'HIGH';\nEND IF;\nEND //\nDELIMITER ;\n```\n\n此触发器将在每次向表中插入数据之前执行。如你在复合语句（`BEGIN`…`END`）中所见，我们根据`sensor_value`的值将名为`sensor_level`的列设置为`LOW`、`OK`或`HIGH`。为了看到实际效果，请考虑以下命令。`FOR\
  \ EACH ROW`语法允许触发器作用于事务中的所有行：\n\n```sql\nINSERT INTO plants (plant_name, sensor_value)\
  \ VALUES ('plant1', 0.5544);\n```\n\n由于我们提供的值（0.5544）小于中间值（0.70），我们期望触发器会为我们填充`sensor_level`列。以下显示了当触发器触发时，确实发生了这种情况：\n\
  \n```sql\n+-------------+--------------+---------------------+--------------+\n\
  | plant_name  | sensor_value | sensor_event        | sensor_level |\n+-------------+--------------+---------------------+--------------+\n\
  | plant1      |       0.5544 | 2015-09-23 20:00:15 | OK           |\n+-------------+--------------+---------------------+--------------+\n\
  1 row in set (0.00 sec)\n```\n\n这展示了一种有趣而强大的方式，你可以利用数据库服务器的能力创建派生列，从而节省应用程序中的处理能力和代码。我鼓励你考虑利用这个以及类似强大的概念，来充分发挥数据库服务器的能力。\n\
  \n\n### 简单连接\n\n数据库系统最强大的概念之一是能够建立数据之间的关系（因此得名“关系型”）。也就是说，一张表中的数据可以引用另一张（或几张）表中的数据。最简单的形式被称为主从关系，即一张表中的一行引用或关联到另一张表中的一个或多个行。\n\
  \n主从关系一个常见（且经典）的例子来自订单跟踪系统，其中一张表包含订单数据，另一张表包含该订单的明细项。这样，我们可以将客户编号和配送信息等订单信息只存储一次，并在检索订单本身时对表进行“连接”。\n\
  \n让我们看一个来自名为 `world` 的示例数据库的例子。你可以在 MySQL 网站上找到这个数据库（`http://dev.mysql.com/doc/index-other.xhtml`）。可以自由下载它以及任何其他示例数据库。它们都展示了数据库系统的各种设计。在练习查询数据时你也会发现它很方便，因为它包含了不只几行的简单数据。\n\
  \n### 注意\n\n如果你想运行下面的例子，需要按照示例文档中的描述安装 `world` 数据库（`http://dev.mysql.com/doc/world-setup/en/world-setup-installation.xhtml`）。\n\
  \n清单 3-9 展示了一个简单连接的例子。这里有很多内容，所以请花点时间检查 `SELECT` 语句的各个部分，特别是我是如何指定 `JOIN` 子句的。你可以忽略\
  \ `LIMIT` 选项，因为它只是限制结果集中的行数。\n\n```sql\nmysql> USE world;\nmysql> SELECT Name, Continent,\
  \ Language FROM Country JOIN CountryLanguage ON Country.Code = CountryLanguage.CountryCode\
  \ LIMIT 10;\n+-------------+---------------+------------+\n| Name        | Continent\
  \     | Language   |\n+-------------+---------------+------------+\n| Aruba    \
  \   | North America | Dutch      |\n| Aruba       | North America | English    |\n\
  | Aruba       | North America | Papiamento |\n| Aruba       | North America | Spanish\
  \    |\n| Afghanistan | Asia          | Balochi    |\n| Afghanistan | Asia     \
  \     | Dari       |\n| Afghanistan | Asia          | Pashto     |\n| Afghanistan\
  \ | Asia          | Turkmenian |\n| Afghanistan | Asia          | Uzbek      |\n\
  | Angola      | Africa        | Ambo       |\n+-------------+---------------+------------+\n\
  10 rows in set (0.00 sec)\n```\n\n**清单 3-9**\n**简单连接示例**\n\n这里我使用了一个 `JOIN` 子句，它指定了两张表，使得第一张表通过一个特定的列及其值与第二张表进行连接（`ON`\
  \ 指定了匹配条件）。数据库服务器所做的是读取表中的每一行，并仅返回那些在指定列上匹配的行。任一表中不在另一表中的行都不会被返回。\n\n#### 提示\n\n\
  你可以通过不同的连接来检索那些行。请参阅在线参考手册 `https://dev.mysql.com/doc/refman/8.0/en/join.xhtml`，以获取关于可能的连接类型（包括内连接和外连接）的更多详细信息。\n\
  \n还要注意，我只包含了少数几个列。在这个例子中，我从 `Country` 表中指定了国家名称和所在大陆，从 `CountryLanguage` 表中指定了语言列。如果列名不是唯一的（相同的列出现在每个表中），我必须通过表名来指定它们，例如\
  \ `Country.Name`。事实上，始终以这种方式限定列被认为是良好的实践。\n\n这个例子中有一个我感觉需要指出的有趣反常现象。事实上，有些人会认为这是一个设计缺陷。注意在\
  \ `JOIN` 子句中，我为每个表指定了表名和列名。这是正常且正确的，但注意列名在两张表中并不匹配。虽然这真的无关紧要，只会造成一点点额外的输入，但一些数据库管理员会认为这是错误的，并希望将公共列名在两个表中设为相同。\n\
  \n连接的另一个用途是检索公共的、存档的或查找数据。例如，假设你有一个表存储那些不变（或很少变化）的事物的详细信息，例如与邮政编码关联的城市或与身份证号码（例如\
  \ SSN）关联的姓名。你可以将这些信息存储在另一个单独的表中，并在需要时通过一个公共列（及其值）连接数据。在这种情况下，那个公共列可以被用作外键，这是另一个高级概念。\n\
  \n外键用于维护数据完整性（即，如果你在一张表中有关联到另一张表的数据，但这种关系需要保持一致）。例如，如果你想确保在删除主表行时，所有从表行也被删除，你可以在主表中声明一个外键，指向从表的一列（或多列）。请参阅在线参考手册以获取关于外键的更多信息。\n\
  \n这次关于连接的讨论只触及了最基础的部分。确实，连接可以说是数据库系统中最困难且常常被混淆的领域之一。如果你发现你想使用连接来组合多张表或扩展数据，以便数据从多个表中提供（外连接），你应该花些时间深入研究数据库概念，例如\
  \ Clare Churcher 的书 *Beginning Database Design*（Apress，2012）。\n\n## 存储例程\n\nMySQL\
  \ 中还有许多其他概念和命令可用，但其中两个可能令人感兴趣的是 `PROCEDURE`（存储过程）和 `FUNCTION`（存储函数），有时它们被统称为**存储例程**。我在此介绍这些概念，以便当你想要探索它们时，能在高层次上理解其用法。\n\
  \n假设你需要运行多个命令来更改数据。也就是说，你需要基于计算执行一些复杂的更改。对于这类操作，MySQL 提供了存储过程的概念。存储过程允许你在每次调用该过程时，执行一个复合语句（一系列\
  \ SQL 命令）。存储过程有时被认为是一种主要用于周期性维护的高级技术，但即使在更简单的情况下，它们也可能非常方便。\n\n例如，假设你想开发一个使用 SQL\
  \ 的自定义数据库应用，但因为在开发阶段，你需要周期性地重新开始，并希望先清除所有数据。如果只有一张表，存储过程帮助不大，但假设有若干张表分布在多个数据库中（对于较大的数据库来说这并不罕见）。这种情况下，存储过程可能会有帮助。\n\
  \n在 MySQL 客户端中输入包含复合语句的命令时，你需要临时更改**定界符**（分号 `;`），以便行尾的分号不会终止命令的输入。例如，在编写包含复合语句的命令前使用\
  \ `DELIMITER //`，使用 `//` 来结束命令，然后再用 `DELIMITER ;` 将定界符改回来。这只是在使用客户端时的操作。\n\n由于存储过程可能相当复杂，如果你决定使用它们，请在尝试开发自己的存储过程之前，先阅读在线参考手册中关于\
  \ **`CREATE PROCEDURE` 和 `CREATE FUNCTION` 语法** 的部分。创建存储过程远比本节描述的要复杂。\n\n现在，假设你想执行一个复合语句并返回一个结果——你想将其作为函数使用。你可以通过执行计算、数据转换或简单翻译来使用函数填充数据。因此，函数可用于提供值以填充列值、提供聚合、提供日期操作等等。\n\
  \n你已经见过几个函数（`COUNT`，`AVG`）。这些被认为是**内置函数**，在线参考手册中有专门的一节介绍它们。然而，你也可以创建自己的函数。例如，你可能希望创建一个函数来对数据执行某种规范化操作。更具体地说，假设有一个传感器在特定范围内产生一个值，但根据该值以及来自另一个传感器或查找表的另一个值，你希望对该值进行加、减、求平均等操作以校正它。你可以编写一个函数来完成此操作，并在触发器中调用它来为计算列填充值。\n\
  \n### 如何修改对象？\n\n你可能想知道当需要修改表、过程、触发器等时该怎么办。放心，你不必从头开始！MySQL 为每个对象提供了 `ALTER` 命令。即，有\
  \ `ALTER TABLE`、`ALTER PROCEDURE` 等等。有关每个 `ALTER` 命令的更多信息，请参阅在线参考手册中名为“**数据定义语句**”的部分。\n\
  \n现在我们已经了解了基本的 SQL 命令及其使用方法，接下来让我们看看如何将我们的应用程序连接到 MySQL。\n\n## 连接应用程序\n\n你已经看到了如何使用\
  \ MySQL 客户端和 MySQL Shell 连接到 MySQL 服务器。这些是交互式工具，我们可以在其中执行查询，但对于从我们的应用程序或其他用户保存数据来说，这并无帮助。我们需要的是所谓的**连接器**。连接器是一个编程模块，旨在允许我们的脚本或程序将数据发送到数据库服务器。连接器还允许我们查询数据库服务器以从服务器获取数据。\n\
  \n我将介绍你在开发自己的应用程序时可能遇到的两种主要连接器。我将每个作为教程来呈现，以便你跟随操作。我从一个用于 Python 脚本的连接器（Connector/Python）开始，然后介绍一个用于编写简化\
  \ Java 的连接器（Connector/J）。但首先，让我们看看我们的应用程序可以使用哪些连接器。\n\n### MySQL 数据库连接器\n\nMySQL\
  \ 有许多数据库连接器。Oracle 为多种语言提供了多个数据库连接器。表 3-1 显示了当前可从 [`http://dev.mysql.com/downloads/`](http://dev.mysql.com/downloads/)\
  \ 下载的数据库连接器。\n\n表 3-1\nMySQL 连接器\n\n| 连接器 | 描述 | 下载 URL |\n| --- | --- | --- |\n\
  | C API (libmysqlclient) | 用于 C 开发的客户端库 | [`https://dev.mysql.com/downloads/c-api/`](https://dev.mysql.com/downloads/c-api/)\
  \ |\n| Connector/C++ | 标准化的 C++ 应用程序 | [`https://dev.mysql.com/downloads/connector/cpp/`](https://dev.mysql.com/downloads/connector/cpp/)\
  \ |\n| Connector/J | Java 应用程序 | [`https://dev.mysql.com/downloads/connector/j/`](https://dev.mysql.com/downloads/connector/j/)\
  \ |\n| Connector/Net | Windows .Net 平台 | [`https://dev.mysql.com/downloads/connector/net/`](https://dev.mysql.com/downloads/connector/net/)\
  \ |\n| Connector/Node.js | Node.js 应用程序 | [`https://dev.mysql.com/downloads/connector/nodejs/`](https://dev.mysql.com/downloads/connector/nodejs/)\
  \ |\n| Connector/ODBC | 通用的 ODBC 应用程序 | [`https://dev.mysql.com/downloads/connector/odbc/`](https://dev.mysql.com/downloads/connector/odbc/)\
  \ |\n| Connector/Python | Python 应用程序 | [`https://dev.mysql.com/downloads/connector/python/`](https://dev.mysql.com/downloads/connector/python/)\
  \ |\n| MySQL native driver for PHP (mysqlnd) | PHP 5.3 或更新版本的连接器 | [`https://dev.mysql.com/downloads/connector/php-mysqlnd/`](https://dev.mysql.com/downloads/connector/php-mysqlnd/)\
  \ |\n\n如你所见，几乎任何你可能遇到的编程语言都有对应的连接器。你可以在 [`https://dev.mysql.com/doc/connectors/en/`](https://dev.mysql.com/doc/connectors/en/)\
  \ 找到上述每个连接器的文档。\n\n### 示例数据库\n\n如果你想跟随示例操作，需要设置示例数据库。如果已安装 MySQL，你可以使用 MySQL Shell\
  \ 或客户端执行以下查询：\n\n```sql\n-- 一个用于存储植物土壤湿度和环境温度的数据库\nCREATE DATABASE plant_monitoring;\n\
  USE plant_monitoring;\n-- 此表存储关于植物的信息。\nCREATE TABLE plant_monitoring.plants (\n\
  id int NOT NULL AUTO_INCREMENT,\nname char(50) DEFAULT NULL,\nlocation char(30)\
  \ DEFAULT NULL,\nclimate enum ('inside','outside') DEFAULT 'inside',\nPRIMARY KEY\
  \ (`id`)\n) ENGINE=InnoDB DEFAULT CHARSET=latin1;\n```\n\n我们将作为示例的一部分插入数据。如果你想同时运行两个示例，并且多次运行插入示例，请务必使用以下查询清空表：\n\
  \n```sql\nDELETE FROM plant_monitoring.plants;\n```\n\n现在，让我们从 Connector/Python\
  \ 开始，看两个例子。\n\n### 示例连接器：Connector/Python\n\nOracle 提供的 Python 连接器是一款功能齐全的工具，可为\
  \ Python 应用程序和脚本提供与 MySQL 数据库服务器的连接。`Connector/Python` 支持所有当前的 MySQL 服务器版本。它旨在实现\
  \ Python 与 MySQL 之间的自动数据类型转换，使构建查询和解析结果变得轻松。它还支持压缩、允许通过 SSL 连接，并且支持所有 MySQL SQL\
  \ 命令。\n\n`Connector/Python` 必须安装在您运行代码的计算机上，方式与安装您可能使用的任何其他 Python 库相同。在 Python\
  \ 脚本中使用 `Connector/Python` 包括导入基础模块、建立连接以及使用游标执行查询。\n\n在我们开始探讨如何使用 `Connector/Python`\
  \ 编写一些支持 MySQL 数据库的应用程序之前，让我们先谈谈如何获取和安装 `Connector/Python`。\n\n**Python？那不是一种蛇吗？**\n\
  \nPython 编程语言是一种高级语言，其设计初衷是尽可能像阅读英语一样自然，同时保持简洁、易学且功能强大。Python 爱好者会告诉您，设计者确实实现了这些目标。\n\
  \n如果您从未使用过 Python，或者想了解更多关于它的信息，以下是一些介绍该语言的优秀书籍。互联网上也有大量资源可供利用，包括位于 `www.python.org/doc/`\
  \ 的 Python 文档页面：\n\n*   `Programming the Raspberry Pi`，作者 Simon Monk（麦格劳-希尔出版社，2013\
  \ 年）\n*   `Beginning Python from Novice to Professional`，第二版，作者 Magnus Lie Hetland（Apress\
  \ 出版社，2008 年）\n*   `Python Cookbook`，作者 David Beazley 和 Brian K. Jones（O'Reilly\
  \ Media 出版社，2013 年）\n\n有趣的是，Python 是以英国喜剧团体 Monty Python 的名字命名的，而不是那种爬行动物。在学习 Python\
  \ 时，您可能会遇到一些对 Monty Python 剧集的戏谑引用。由于我对 Monty Python 情有独钟，我觉得这些引用很有趣。当然，您的感受可能有所不同。\n\
  \n#### 安装 Connector/Python\n\n下载过程与您为服务器所做的相同。您可以从 Oracle 的 MySQL 网站 (`http://dev.mysql.com/downloads/connector/python/`)\
  \ 下载 `Connector/Python`。该页面会自动检测您的平台并显示适用于该平台的可用下载项。您可能会看到多个选项。请务必选择与您的配置相匹配的那一个。\n\
  \n由于大多数平台都预装了 Python，您可能不需要对系统做任何准备；只需下载安装程序并安装即可。然而，首选的安装方法是使用 Python 包管理器（来自 PyPi）通过\
  \ `pip install` 命令来获取并安装连接器。以下演示了如何使用 `pip` 安装 `Connector/Python`：\n\n```\n% pip3\
  \ install mysql-connector-python\nCollecting mysql-connector-python\nDownloading\
  \ mysql_connector_python-8.0.28-py2.py3-none-any.whl (342 kB)\n|████████████████████████████████|\
  \ 342 kB 198 kB/s\nCollecting protobuf>=3.0.0\nDownloading protobuf-3.19.3-cp310-cp310-macosx_10_9_universal2.whl\
  \ (1.0 MB)\n|████████████████████████████████| 1.0 MB 544 kB/s\nInstalling collected\
  \ packages: protobuf, mysql-connector-python\nSuccessfully installed mysql-connector-python-8.0.28\
  \ protobuf-3.19.3\n```\n\n注意 `pip` 安装程序命令。本例中使用了 `pip3` 命令，因为该计算机同时安装了 Python 2.X\
  \ 和 3.X，我们希望确保将其安装到 Python 3.X 环境中。\n\n**注意**\n\n您应该安装 Python 3.7 或更高版本。\n\n另请注意，被安装软件包所需的任何先决条件也会被自动下载和安装。正如您所见，使用\
  \ `pip` 比单独下载和安装软件包要容易得多。\n\n**提示**\n\n有关在特定平台上安装的具体说明，请参阅在线参考手册 (`http://dev.mysql.com/doc/connector-python/en/connector-python-installation.xhtml`)。\n\
  \n#### 检查安装\n\n一旦安装了 `Connector/Python`，您可以通过下面的简短示例来验证它是否正常工作。首先输入命令 `python`（或者\
  \ `python3`，如果您想确保使用的是 Python 3.X 安装）。这将打开一个交互式提示符，允许您一次输入一行 Python 代码并执行；它是一个 Python\
  \ 命令行解释器，对于测试小段代码非常有用。只需按照示例所示输入以下几行：\n\n```\n% python3\nPython 3.10.2 (v3.10.2:a58ebcc701,\
  \ Jan 13 2022, 14:50:16) [Clang 13.0.0 (clang-1300.0.29.30)] on darwin\nType \"\
  help\", \"copyright\", \"credits\" or \"license\" for more information.\n>>> import\
  \ mysql.connector\n>>> print(mysql.connector.__version__)\n8.0.28\n>>>\n>>> quit()\n\
  ```\n\n您应该会看到打印出的 `Connector/Python` 版本号。如果您看到任何关于找不到连接器的错误，请务必检查您的安装以确保其工作正常。一旦您可以成功访问\
  \ `Connector/Python`，就可以继续学习一些示例脚本了。\n\nPython 脚本（应用程序）使用类似 `<something>.py` 的文件名和扩展名保存，并通过以下命令行方式执行。我们将使用此方法来执行以下示例。因此，对于每个示例，您应该在文本编辑器中打开一个文件，输入所示的代码，保存文件，然后从命令行运行该脚本：\n\
  \n```\n$ python3 my_script.py\n```\n\n如果您拥有并熟悉某个 Python 集成开发环境（IDE），您可以使用它来代替通过文本编辑器创建文件并通过命令行执行。优秀的\
  \ Python IDE 示例包括 Thonny (`https://thonny.org/`) 和 PyCharm (`www.jetbrains.com/pycharm/download`)。两者都适用于\
  \ Windows、macOS 和 Linux。\n\nThonny 是一款免费、基础的 IDE，因此非常易于使用但功能有限；而 PyCharm 提供社区版和企业版，支持企业级\
  \ Python 开发的大量功能。\n\n## 连接到 MySQL 服务器\n\n让我们从一个简单的例子开始，我们将连接到 MySQL 服务器并获取数据库列表。我们将此示例命名为\
  \ `mysql_connector.py`。\n\n在这个例子中，我们首先导入 Connector/Python 连接器类，然后为了保持整洁，我们使用一个字典来存储连接信息。有了连接字典后，我们调用\
  \ `connect()` 方法来连接服务器。\n\n接下来，我们打开一个新的游标，并通过连接类的 `cursor()` 方法获取一个游标类的实例。使用游标类，我们可以调用\
  \ `execute()` 方法并传入一条 SQL 语句。执行后，获取返回的行并打印每行的第一列。最后，我们关闭游标和连接以整理资源。清单 3-10 展示了此示例的完整代码。正如你将看到的，它非常易于理解。\n\
  \n> **注意**\n> 请务必将用户和密码更改为与你的安装相匹配。\n\n```python\n\"\"\"mysql_connect.py\"\"\"\n\
  #\n"
- '# MySQL Database Service

  #

  '
- '# Chapter 03 - MySQL Connect

  #

  '
- '# This script demonstrates the basics for using the MySQL Connector/Python to

  '
- '# connect to a MySQL server and issue a simple query and print the results.

  #

  '
- '# Dr. Charles Bell

  #

  '
- '# Import libraries

  import mysql.connector

  '
- "# Connection parameters dictionary\nserver = {\n    'user': 'root',\n    'password':\
  \ 'SECRET',\n    'host': '127.0.0.1',\n    'database': 'plant_monitoring',\n}\n"
- '# Connect to the server

  cnx = mysql.connector.connect(**server)

  '
- '# Create a cursor

  cur = cnx.cursor()

  '
- '# Execute a query

  cur.execute("SHOW DATABASES")

  '
- "# Fetch and print the results\nrows = cur.fetchall()\nfor row in rows:\n    print(row[0])\
  \ # Print first column only\n"
- '# Close the cursor and connection

  cur.close()

  cnx.close()

  ```


