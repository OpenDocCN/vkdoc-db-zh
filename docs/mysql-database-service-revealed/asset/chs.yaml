  \ PC 上启动端口转发。你需要为每个会话执行示例 SSH 命令。回顾一下，我们可以通过点击每个会话的上下文菜单并选择 `Copy SSH command` 来复制基本的\
  \ SSH 命令。\n\n复制每个命令后，你可以将其粘贴到 PowerShell（终端）中，并将用 `<>` 标记的占位符部分替换为正确的数据。例如，下面展示了在\
  \ Windows 11 PC 上用于打开端口 `3306` 和 `33060` 的端口转发会话的两个命令：\n\n```\nssh -i  -N -L 3306:10.0.1.226:3306\
