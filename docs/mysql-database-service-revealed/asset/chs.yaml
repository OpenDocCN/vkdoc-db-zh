  ### 停止/启动数据库系统


  在处理数据库系统时，我们将使用 `oci.mysql.DbSystemClient` 类及其方法。要停止数据库系统，我们使用 `stop_db_system()`
  方法；要启动数据库系统，我们使用 `start_db_system()` 方法。正如你所看到的，API 方法通常非常直观。


  这个例子稍微复杂一些，因为我们必须以另一个名为 `stop_db_system_details()` 的类的形式提供一个数据库系统 ID（OCID）来执行停止或启动操作。这个类使用一个模型来填充数据。在这个案例中，我们需要数据库系统
  OCID 和关闭类型。


  我们还将通过首先列出我们 compartment 中的数据库系统并选择一个具有特定名称的来使它更复杂一些。你可能会惊讶于记住 OCIDs 有多困难，但记住一个数据库系统名称要容易得多。我们将显示一个列表供用户选择要控制的数据库系统。要列出数据库系统，我们使用
  `list_db_systems()` 方法并传入 compartment ID，我们已经将其保存在一个环境文件中。


  总结一下，我们将导入需要的库，读取配置文件，从用户读取 SSH 密钥密码短语，从环境变量读取 compartment ID，然后从用户读取数据库系统名称。一旦我们有了这些信息，我们就可以调用方法列出该
  compartment 中的数据库系统，选择一个与名称匹配的，然后停止或启动它。


  有趣的是，这些 API 方法不像我们在 CLI 示例中看到的那样返回一个工作请求 ID。相反，该方法会等待直到操作完成。清单 9-19 展示了这个示例的完整代码。文件名为
  `stop_db_system.py`。在继续下一个示例之前，花点时间研究一下它。


  ```

  import getpass

  import os

  import sys

  '
- '# 导入 oci 模块

  import oci

  '
- '# 确定请求的操作：启动/停止

  if len(sys.argv) > 1:

  is_stop = sys.argv[1].upper() == "STOP"

  operation = "Stopping"

  else:

  is_stop = False

  operation = "Starting"

  '
- '# 读取你的配置文件：如果需要，请确保提供配置文件的路径。

  config = oci.config.from_file()

  '
- '# 从用户读取密码短语

  pass_phrase = getpass.getpass("Enter the SSH key passphrase: ")

  '
- '# 将密码短语添加到配置文件字典中。

  config.update({''pass_phrase'':pass_phrase})

  '
- '# 使用默认配置文件初始化服务客户端

  db_client = oci.mysql.DbSystemClient(config)

  '
- '# 从环境变量获取 compartment ID

  COMPARTMENT_ID = os.getenv(''COMPARTMENT_ID'')

  '
- '# 列出数据库系统

  list_db_systems_response = db_client.list_db_systems(compartment_id=COMPARTMENT_ID)

  '
- '# 循环遍历数据库系统摘要

  db_systems = []

  num = 1

  print("Compartment 中的数据库系统")

  print("-------------------------")

  for db_system_summary in list_db_systems_response.data:

  if db_system_summary.lifecycle_state != ''DELETED'':

  print("{0}: {1}".format(num, db_system_summary.display_name))

  db_systems.append(db_system_summary)

  '
- '# 如果没有活动的数据库系统，则退出

  if len(db_systems) == 0:

  print("没有可控制的数据库系统。")

  exit(1)

  '
- '# 获取要控制的数据库系统的名称

  db_num = int(input("\n 选择哪个数据库系统 (输入序号)? "))

  print("\n{0} 名为 ''{1}'' 的数据库系统\n".format(operation, db_systems[db_num-1].display_name))

  '
