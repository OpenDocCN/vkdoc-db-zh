  \n现在，让我们来探索 `OCI` 和 `MDS` 的文档选项。\n\n## 文档\n\nOracle 为所有 `OCI` 和 `MDS` 提供了文档，您只需轻点鼠标即可访问。在\
  \ `OCI 控制台` 中，您会注意到一个带问号的图标。这是满足您所有文档需求的起点。在任何时候，您都可以点击该图标，会看到一个包含内容相关链接的菜单出现。例如，如果您正在处理一个计算实例，您会看到计算实例文档的链接。\n\
  \n![](img/527055_1_En_10_Fig5_HTML.png)\n\n一个菜单，包含文档、今日如何提供帮助？、聊天、访问支持中心、发布问题和提交反馈以及定向帮助。\n\
  \n图 10-5：文档菜单（`OCI 控制台`）\n\n请注意，您会看到指向与计算实例相关的特定任务的链接，这在您想了解某些功能如何工作时非常有帮助。另请注意，您还会看到指向支持的链接。您可以打开聊天窗口立即与某人交谈，前往支持中心研究主题，在社区论坛发布问题，或者向支持团队提交反馈。\n\
  \n底部还有一些按钮，包含特定的定向任务。在此示例中，我们看到了用于创建支持请求（正式支持工单）和提高服务限制的按钮。回想一下，服务限制指的是您的账户一次允许使用的特定对象或服务的数量。如果您超出了限制，可以访问此菜单并提交延长请求。\n\
  \n如果您想要通用的 `OCI` 文档信息，可以访问 [`https://docs.oracle.com/en-us/iaas/Content/home.htm`](https://docs.oracle.com/en-us/iaas/Content/home.htm)\
  \ 主文档以获取关于 `OCI` 的完整文档。在这里，您将看到一个多列菜单，可用于查找所有 `OCI` 产品和服务文档。当您点击 `MySQL 数据库` 链接时，您将被定向到\
  \ `MySQL`（`MDS`）文档的顶部，如图 10-6 所示。从那里，您可以探索 `MDS` 的所有主题。\n\n![](img/527055_1_En_10_Fig6_HTML.jpg)\n\
