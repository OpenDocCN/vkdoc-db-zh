  \ SQL 语句。\n\n### 等等，它不工作！\n\n如果您无法连接，请返回并确保您的计算实例位于同一可用性域、同一 VCN（在公有子网中），并且您已按照上述说明向\
  \ VCN 私有子网添加了正确的入口规则。\n\n另一个常见问题是忘记了 MySQL 管理员用户名和密码。虽然记下密码是非常糟糕的做法，但您应确保使用创建数据库系统时提供的用户名和密码。更改该密码并不容易，因此最坏的情况可能需要您删除当前的数据库系统，用相同的数据创建另一个，并确保记录下\
  \ MySQL 管理员用户的用户名和密码。\n\n就是这样！设置和使用起来相当容易，对吧？再次说明，这与您通常在 OCI 中构建应用程序的方式非常相似。您会将应用程序服务器或面向公众的连接点放在\
  \ VCN 的公有子网上，而将数据资源放在私有子网上，通过良好的安全实践来保护您的重要投资。\n\n现在，让我们看看如何直接从我们的 PC 连接到数据库系统。\n\
  \n### 使用堡垒机会话进行连接\n\n堡垒机是 OCI 的一项服务，它通过 SSH 提供受限且有时间限制的连接，用于访问那些没有公共端点的资源。连接建立后，用户可以使用任何\
  \ SSH 支持的软件或协议与目标资源进行交互。连接是使用堡垒机资源上的会话对象，通过 SSH 客户端或 SSH 隧道连接到私有子网上的资源来完成的。例如，您可以使用支持\
  \ SSH 的 MySQL 客户端连接到数据库系统。在我们查看演示之前，让我们先了解一下堡垒机中使用的术语。\n\n> **注意**\n> 堡垒机与单个 VCN\
  \ 相关联。它们无法从一个 VCN 移动到另一个 VCN。\n\n\n#### 堡垒服务术语\n\n以下总结了堡垒服务中使用的关键术语：\n\n*   **堡垒服务**：一项提供对目标资源进行安全公共访问的\
  \ OCI 服务。这些资源是那些您无法从虚拟云网络外部访问的资源，因为它们被置于虚拟云网络中的一个私有子网内。堡垒服务（有时实例就简称为堡垒）被置于虚拟云网络的公共子网中。客户端通过\
  \ CIDR 允许列表来指定您允许连接到私有子网中特定资源或资源范围的地址或地址范围，以此进行身份验证。\n\n*   **会话**：会话用于通过与公钥 SSH\
  \ 密钥对匹配的私钥向用户提供访问权限。SSH 密钥对在会话创建时被记录。因此，会话可以被视为通过堡垒服务建立的一个活动连接。\n\n*   **目标资源**：您想要连接的、位于虚拟云网络私有子网中的资源。\n\
  \n*   **目标主机**：一种特定类型的目标资源，支持 SSH 连接，例如计算实例。\n\n#### 会话类型\n\n堡垒有两种类型的会话，设计用于连接到特定类型的目标资源。会话类型包括：\n\
  \n*   **托管 SSH**：允许 SSH 访问运行 Linux、OpenSSH 服务器以及启用了堡垒插件的 Oracle Cloud Agent 的计算实例。\n\
  \n*   **SSH 端口转发**：也称为 SSH 隧道。不需要在目标资源上运行 OpenSSH 服务器或 Oracle Cloud Agent。在客户端的特定端口和目标资源的特定端口之间创建一个安全连接。该隧道支持大多数\
  \ TCP 协议，包括远程桌面协议、Oracle Net Services 和 MySQL。\n\n可以通过任何支持 SSH 的、用于与 OCI 资源通信的常规客户端访问堡垒。例如，您可以使用云控制台、CLI\
  \ 或 OCI API。\n\n> 提示\n>\n> 要了解有关堡垒服务的更多信息，请参见 `https://docs.oracle.com/en-us/iaas/Content/Bastion/Concepts/bastionoverview.htm`。\n\
  \n在本教程中，我们将使用端口转发选项和堡垒会话，通过我们的个人电脑连接到我们的 DB 系统。\n\n#### 先决条件\n\n在开始之前，我们需要以下信息。随着操作进行，我们将了解如何（以及在哪里）找到这些信息：\n\
  \n*   DB 系统的私有 IP 地址\n*   虚拟云网络和子网\n*   客户端（例如个人电脑）IP 地址的无类域间路由\n*   最大会话时长（您希望连接保持打开的时间）\n\
  *   SSH 密钥对\n*   虚拟云网络私有子网的入站规则\n\n显然，您需要有一个正在运行的（或可以启动的）DB 系统、它所连接的虚拟云网络以及子网。如果您没有可用的\
  \ DB 系统，请先返回创建一个再继续。\n\n我们还必须为私有子网设置一个入站规则，以允许来自公共子网的 MySQL 端口 3306 和 33060 的流量通过。如果您跳过了前面的示例，请返回标题为“*修改虚拟云网络——为私有子网创建入站规则*”的部分，并在继续之前创建入站规则。\n\
  \n#### 创建堡垒服务\n\n现在让我们创建堡垒服务。使用云控制台主菜单，选择**身份与安全** | **堡垒服务**（您可能需要向下滚动一点），然后点击**创建堡垒**按钮，如图\
  \ 4-39 所示。确保选择了正确的 compartment。\n\n![](img/527055_1_En_4_Fig39_HTML.png)\n\n**图\
  \ 4-39** 创建新的堡垒服务（堡垒主页面）\n\n这将打开一个新对话框，您将在其中为我们虚拟云网络上的堡垒服务进行配置。首先，将堡垒命名为`MySQL Bastion`。请注意，堡垒的名称不能包含空格、下划线或短横线（它会提醒您）。接下来，从下拉框中选择`oci-tutorial-vcn`和`Public\
  \ Subnet-oci-tutorial-vcn`。回想一下，我们想要从公共子网创建到私有子网的桥梁，因此堡垒必须位于公共子网中。接下来，我们还将使用一个`0.0.0.0/0`的\
  \ CIDR（输入字符串后按*回车*键在框中确认），这是非常开放的（允许所有 IP 地址），但在生产环境中您可能希望修改它以限制访问。图 4-40 显示了填入相同数据的对话框。当您确认输入的数据正确后，点击**创建堡垒**按钮。\n\
  \n![](img/527055_1_En_4_Fig40_HTML.jpg)\n\n**图 4-40** 创建堡垒服务（对话框）\n\n您应该等待堡垒创建和配置完成后再继续下一步。\n\
  \n#### 创建 SSH 密钥对\n\n我们需要一个 SSH 密钥对来与堡垒一起使用。现在就在您的个人电脑上创建一个吧。清单 4-4 展示了在`~/.ssh`文件夹中创建密钥对并为私钥分配权限的示例。注意使用的名称是`bastion_rsa`，但您可以使用任何名称，只需不要覆盖任何现有的密钥对即可。\n\
  \n```bash\n% ssh-keygen -t rsa\nGenerating public/private rsa key pair.\nEnter file\
  \ in which to save the key (/Users/XXXX/.ssh/id_rsa): /Users/XXXX/.ssh/bastion_rsa\n\
  ...\nThe key fingerprint is:\nSHA256:NGrshx+714+XXXXXXXXXXXXXXXXXXXXXXXXU YYYYYYYY.local\n\
  The key's randomart image is:\n+---[RSA 3072]----+\n...\n+----[SHA256]-----+\n```\n\
  \n**清单 4-4** 生成 SSH 密钥对\n\n在 Windows 10 或 11 上生成 SSH 密钥对的方法，请参见`www.howtogeek.com/762863/how-to-generate-ssh-keys-in-windows-10-and-windows-11/`。在\
  \ macOS 和 Linux 上创建 API 签名密钥的方法，请参见`https://docs.oracle.com/en-us/iaas/Content/API/Concepts/apisigningkey.htm#two`。\n\
  \n#### 创建端口转发会话\n\n现在，我们已具备创建端口转发会话（也称为 SSH 隧道）所需的一切条件。请如图 4-41 所示，在列表中点击新创建的 Bastion（`MySQLBastion`），导航至其详情页面。或者，您也可以使用右侧的上下文菜单并选择`查看详情`。\n\
  \n![](img/527055_1_En_4_Fig41_HTML.png)\n\nOCI 教程中 compartment 内的 Bastion 主页面。左上角有“创建\
  \ Bastion”按钮，下方是一个空表格。列标题为：名称、状态、Bastion 类型和创建时间。\n\n图 4-41\n\n选择新的 Bastion 服务\n\
  \n在 Bastion 详情页面的`会话`部分下，点击`创建会话`按钮，如图 4-42 所示。\n\n![](img/527055_1_En_4_Fig42_HTML.png)\n\
