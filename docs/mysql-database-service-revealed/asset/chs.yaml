  \"prohibit-public-ip-on-vnic\": false,\n\"route-table-id\": \"ocid1.routetable.MASKED\"\
  ,\n\"security-list-ids\": [\n\"ocid1.securitylist.MASKED\"\n],\n\"subnet-domain-name\"\
  : \"sub03112027060.ocitutorialvcn.oraclevcn.com\",\n\"time-created\": \"2022-03-11T20:27:32.987000+00:00\"\
