  \ 10-7 展示了主公告页面。\n\n![](img/527055_1_En_10_Fig7_HTML.png)\n\n一个窗口显示 Oracle 的公告页面。公告显示在顶部，重点信息位于中心，所有系统正常运行和帮助信息在底部。\n\
  \n图 10-7：公告页面（概览）\n\n请注意，您会看到来自 Oracle 的公告，以及关于任何需要采取的操作、计划维护通知或其他通知的重点信息。当这些类别中有条目时，`OCI\
  \ 控制台` 上的小铃铛图标旁会出现一个红点，以提醒您有公告。\n\n请注意右侧的`创建公告订阅`按钮。这允许您创建订阅以监视某些公告。例如，如果您计划对 `ObjectStore`\
