  \n图 6-2\n\n编辑备份计划对话框\n\n### 注意\n\n如果您的数据库系统运行的是 MySQL 8.0.28，则需要至少更新到 MySQL 8.0.29\
  \ 才能使用 PITR。您可以在详情页面上，通过点击 MySQL 版本旁边的`编辑`链接，并从列表中选择您想要升级到的版本，来升级您的数据库系统。\n\n保存更改后，数据库系统将进入更新期，以便\
  \ MDS 自动化在后台完成配置更改。完成后，您将看到自动备份和 PITR 已启用，如图 6-3 所示。\n\n![](img/527055_1_En_6_Fig3_HTML.jpg)\n\
  \n这是一个备份菜单，列出了自动备份、备份窗口、保留天数和时间点恢复。自动备份和时间点恢复已启用，并被一个矩形框高亮标出。\n\n图 6-3\n\n备份设置 –\
  \ 已启用（数据库系统详情页面）\n\n如果您想在新的数据库系统上启用 PITR，可以在创建数据库系统的对话框的“备份”部分完成相同的参数设置，如图 6-4 所示。\n\
  \n![](img/527055_1_En_6_Fig4_HTML.png)\n\n这是一个配置备份计划的对话框，其中“启用自动备份”和“启用时间点恢复”复选框已被选中。备份保留时间为\
  \ 7。\n\n图 6-4\n\n备份设置（创建数据库系统）\n\n最后，您可以通过在数据库系统详情页面的资源菜单上选择“备份”列表来列出您的备份，如图 6-5\
  \ 所示。\n\n![](img/527055_1_En_6_Fig5_HTML.png)\n\n一个窗口页面显示了备份列表，顶部是详细信息，底部是列出备份的表格。\n\
  \n图 6-5\n\n备份列表（数据库系统详情页面）\n\n现在我们知道了如何设置 PITR，接下来看一个小演示，了解如何使用 PITR 恢复数据库系统。\n\n\
  ## 恢复\n\n使用 PITR 恢复数据库系统与使用任何普通备份恢复非常相似。不同之处在于您选择备份的方式。如果您选择通过 PITR 条目恢复，则需要从列表中选择最新的备份。\n\
  \n为了使这个演示可行，我们需要引入一个我们需要从中恢复的事件。一个简单的`DROP DATABASE`或类似的 SQL 语句就足够了。在这个例子中，我执行了一个`DROP\
  \ DATABASE sakila`; 命令。\n\n我通过登录到一个计算实例，然后在该计算实例上启动`MySQL Shell`来连接到数据库系统，从而完成了此操作。然后，我在大约\
  \ UTC 时间 21:06 发出了`DROP`命令。我使用计算实例详情页面上显示的`公网 IP 地址`，通过以下命令登录到计算实例：\n\n```bash\n\
  ssh -i c:\\users\\cbell\\.ssh\\ssh-key-2022-08-16.key opc@150.136.69.126\n```\n\n\
  从那里，我使用`MySQL Shell`登录到 MySQL 并删除了数据库：\n\n```\n[opc@connection-instance ~]$ mysqlsh\
  \ --sql mysql_admin@10.0.1.226:33060\nMySQL Shell 8.0.30\nCopyright (c) 2016, 2022,\
  \ Oracle and/or its affiliates.\nOracle is a registered trademark of Oracle Corporation\
  \ and/or its affiliates.\nOther names may be trademarks of their respective owners.\n\
  MySQL  10.0.1.226:33060+ ssl  SQL > DROP DATABASE sakila;\nQuery OK, 23 rows affected\
  \ (0.1493 sec)\n```\n\n好的，现在我们的事件发生了。现在，我们可以尝试恢复到 UTC 时间 21:06 之前的一个时间点。我们可以通过点击备份列表中备份的上下文菜单里的`恢复到新数据库系统`来完成此操作，如图\
  \ 6-6 所示。如果您有更多备份可供选择，您应该选择事件发生前最近日期的备份。\n\n![](img/527055_1_En_6_Fig6_HTML.png)\n\
  \n一个窗口页面显示了备份列表，顶部是详细信息，底部是一个包含 4 行 7 列的表格来列出备份。在查看详细信息中，选择并更改为“恢复到新数据库系统”。\n\n\
  图 6-6\n\n启动恢复到新数据库系统（数据库系统详情页面的备份列表）\n\n这将启动一个新对话框，您可以在其中为新的数据库系统更改几个参数。对话框的第一部分涉及备份设置，如图\
  \ 6-7 所示。\n\n![](img/527055_1_En_6_Fig7_HTML.png)\n\n一个用于配置源的对话框，突出显示了“从数据库系统在某个时间点恢复”、“选择特定时间点”和“时间”。\n\
  \n图 6-7\n\n从备份恢复数据库系统（PITR）\n\n这是您可以指定要恢复到特定时间点的区域。首先点击`从数据库系统在某个时间点恢复`。注意这允许您选择最新的\
  \ PITR 时间段或特定时间段。在这个演示中，我们勾选`选择特定时间点单选按钮`。最后，您可以输入一个在您事件发生之前的时段。在这个例子中，最后一个可用的条目是\
  \ UTC 时间 21:03。只需将显示的时间减少 5 分钟，直到达到您想要的时段。\n\n一旦您点击`恢复`按钮并且数据库系统准备就绪，我们就可以登录并看到`sakila`数据库确实存在，并且不需要的数据更改事件已被恢复。回想一下，底层进行了很多操作。MDS\
  \ 从最后一个已知完好的备份进行恢复，恢复后，会应用自备份以来记录的二进制日志。所有这些都无需用户干预。是不是很酷？\n\n回想一下，在启动`MySQL Shell`之前，我们必须先登录到一个计算实例，使用如图\
  \ 6-8 所示的已恢复数据库系统的`私有 IP 地址`。\n\n![](img/527055_1_En_6_Fig8_HTML.jpg)\n\n一个端点菜单显示了私有\
  \ IP 地址、互联网 FQDN、MySQL 端口和 MySQL X 协议端口。私有 IP 地址被一个矩形框高亮标出。\n\n图 6-8\n\n私有 IP 地址（通过\
  \ PITR 恢复的数据库系统）\n\n\n\n清单 6-1 展示了一个测试，用于确保 `sakila` 数据库存在。\n\n```\n[opc@connection-instance\
