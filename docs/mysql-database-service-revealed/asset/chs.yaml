  \ `启动虚拟云网络向导` 按钮来开始此过程。\n\n### 步骤 2：创建用户组\n\n接下来的步骤是我们见过的。在 OCI 中，你可以创建用户和用户组，将用户归入组中，以便设置安全策略。OCI\
