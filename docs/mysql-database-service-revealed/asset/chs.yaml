  \ MySQL 时遇到的故障排除问题。超链接列在右侧。“Troubleshooting MySQL server”选项被高亮显示。](img/527055_1_En_10_Fig9_HTML.png)\n\
  *图 10-9: MDS 故障排除页面（文档）*\n\n您会找到指向通用故障排除技巧的链接。不过，请注意页面中央有一个指向 MySQL 服务器故障排除页面的链接，如果您遇到与\
  \ OCI 无关的 MySQL 问题，这可能会有所帮助。\n\n现在我们已经全面了解了 Oracle 提供的在线帮助和文档，接下来让我们讨论如何开始规划迁移到\
  \ MDS。\n\n## 检查您的数据库系统需求\n\n在本节中，我们将讨论在规划 MDS 解决方案之前必须考虑的 OCI 特定概念和技术。虽然您无需关心 MySQL\
  \ 服务器实例本身的配置（因为 MDS 会为您完成），但您必须像规划本地 MySQL 服务器那样严谨地规划您的数据库。这项规划将为您提供配置数据库系统所需的重要信息。\n\
  \n回顾一下，我们在第 4 章创建第一个数据库系统时简要讨论过规划数据库需求，但还有更多需要考虑的因素。例如，每个数据库系统都有一个形态（CPU 和内存的大小）以及一个数据大小（数据存储的大小）。此外，还必须考虑网络，以便使您的数据库系统可被访问。以下各节将讨论这些主题。\n\
  \n### 形态\n\n您应仔细考虑需要使用何种形态。较小的形态通常成本更低，但如果使用的形态 CPU 核心数少于您的需求，可能会导致相当大的问题。同样，您也应仔细考虑需要使用多少内存。务必咨询您的系统管理规划人员，以确保选择的形态具备足够的\
  \ CPU 核心和内存。图 10-10 展示了作者实验账户可用的数据库系统形态的部分列表。请注意，有 1 核、2 核、4 核、8 核、16 核等不同 CPU 核心数的形态，内存也相应增加。\n\
  \n![一张包含 21 行的表格列出了数据库系统的可用形态。下一列显示“是”或“否”，其后是形态编号。内存根据这些编号增加。](img/527055_1_En_10_Fig10_HTML.png)\n\
  *图 10-10: 数据库系统的可用形态*\n\n列出的形态都是虚拟机，但您还可以选择更多其他形态，包括支持 HeatWave 和裸机实例的形态。再次强调，一般而言，形态支持的核心数和内存越多，成本越高，但您从“更大”形态中获得的性能提升可以抵消这部分成本。如果性能是关注点，始终应选择比您认为的最低可接受规格更大的形态。\n\
  \n有关形态的更多信息，请参阅以下链接中的标题 `Supported Shapes`（支持的形态）：[`https://docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml`](https://docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml)\n\
  \n### 数据存储\n\n同样，数据库存储大小需要仔细考虑。与形态类似，较小的数据存储大小成本较低，但较大的大小会采用 RAID 条带化以实现更好的性能。您可以选择从\
  \ 50 GB 起的任意大小。务必考虑您是否计划进行任何涉及上传或扩展数据的数据迁移，以便确保有足够的空间容纳导入的数据。您可以在日后增加数据存储的大小，但最好在一开始就规划更大的空间。\n\
  \n有关数据存储选项和注意事项的更多信息，请参阅以下链接中的 `DB System Storage`（数据库系统存储）部分：[`https://docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml`](https://docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml)\n\
  \n> **提示**\n>\n> 建议在测试期间执行基准分析，以验证您的环境配置是否足以满足应用程序的性能需求。\n\n### 网络\n\n回顾一下，数据库系统无法从互联网直接访问。您需要设置额外的资源来弥补网络差距，例如\
  \ Bastion 服务、虚拟专用网络、Oracle FastConnect 或中间计算实例。在规划如何将数据库系统整合到您的应用程序中时，应仔细考虑这些技术。\n\
  \n关于网络，还有一些限制需要考虑。以下列出了您在规划网络连接时需要考虑的部分细节：\n\n-   每个子网中有三个 IP 地址被保留给网络服务。\n-   不具备高可用性的数据库系统需要三个\
  \ IP 地址：(1) 数据库系统的 IP 地址，(2) 计算实例，以及 (3) 用于 MySQL 服务器维护和升级任务的独立 IP 地址。\n-   具备高可用性的数据库系统将需要最多七个\
  \ IP 地址：一个用于数据库系统的 IP 地址，三个用于托管 MySQL 的计算实例，以及每个 MySQL 服务器各一个用于维护和升级任务的 IP 地址。\n\
  \n有关规划网络要求的更多注意事项，请参阅 [`https://docs.oracle.com/iaas/Content/Network/Concepts/overview.htm`](https://docs.oracle.com/iaas/Content/Network/Concepts/overview.htm)。\n\
  \n## 规划你的数据库系统\n\n系统管理与规划密不可分。想要成功，更是如此。在规划云解决方案时，这一点尤为突出。我们必须提前规划好如何设置、配置和部署我们的产品与服务，否则将面临意外问题和延误的风险。MDS\
  \ 也不例外，你最好提前规划好希望在其环境中如何使用它。\n\n本节中的信息将为你提供针对 MDS DB 系统的具体规划领域的见解。你应将本节视为额外资源，与你现有的用于规划\
  \ DB 系统的策略、实践和工具结合使用。以下列出了一些需要刻意规划的关\n\n*   为 DB 系统的管理和应用程序访问创建独立的用户账户\n*   配置数据规模，并以此为依据规划\
  \ DB 系统的规模\n*   考虑计算实例（用于 DB 系统）的规模（CPU、内存）\n*   制定升级到高可用性的计划\n*   研究所有 OCI 服务的相关成本，并创建支出预测以设定预期\n\
  *   仔细规划安全性，确保保护你的云资源\n\n其中大部分是我们在本书过程中已经讨论过的内容，但有些可能对你来说是新的，尤其是如果你没有使用过本地部署的 MySQL。\n\
  \n然而，最关键的是规划 DB 系统的规模和成本。你应该在这些任务上花费一些时间，因为更改 DB 系统的规模（形状）可能并非易事，并且可能需要一些停机时间来进行重新配置。幸运的是，Oracle\
  \ 提供了执行此操作的选项，你可以通过备份并在具有不同形状和存储大小的新 DB 系统上进行恢复来实现。提前花时间进行规划，特别是预测你的 OCI 成本，将帮助你在最好地满足需求的同时控制支出。你会惊讶于有多少功能可以以较低的成本获得，但如果你没有为增长制定一个可靠的计划，这种经济性可能会累积成可观的开支。\n\
  \n另一个需要考虑的关键领域是安全性。我们将在下一节讨论安全性。\n\n## 安全最佳实践\n\n回顾前面的章节，你必须在 OCI 中创建账户来划分管理功能和使用功能。还要记住，建议为你的\
  \ DB 系统创建独立的用户账户，用于用户访问或应用程序访问。因此，有一份详尽的安全考虑事项清单。由于安全性对任何解决方案都至关重要，让我们讨论一下你应该考虑或计划为你的\
  \ OCI 解决方案实施的几个安全领域。以下按类别列出了你在规划时应研究的项目并进行了简要描述。提供了链接以获取更多文档：\n\n*   `审计服务`：利用审计服务查看\
  \ OCI API 活动。请参阅 [`https//docs.oracle.com/iaas/Content/Audit/Concepts/auditoverview.xhtml`](http://docs.oracle.com/iaas/Content/Audit/Concepts/auditoverview.xhtml)。\n\
  *   `数据脱敏`：你可以使用数据脱敏来保护数据，隐藏敏感信息。请参阅 *数据脱敏* 部分 [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml)。\n\
  *   `删除计划`：考虑使用删除计划来进一步保护你的 DB 系统免受删除操作的影响。请参阅 *高级选项：删除计划* [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/creating-db-system.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/creating-db-system.xhtml)。\n\
  *   `IAM 策略`：使用身份和访问管理策略来控制访问。请参阅 *必需的 IAM 策略* [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/mysql-database-service-overview.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/mysql-database-service-overview.xhtml)。\n\
  *   `传输中加密`：虽然数据在静态时已加密，但你可能希望使用传输中加密来进一步保护数据。请参阅 *数据安全* 部分 [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/mysql-database-service-overview.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/mysql-database-service-overview.xhtml)。\n\
  *   `MySQL 身份验证`：使用 `authentication_oci` 插件将 MySQL 用户映射到 IAM 服务中定义的现有用户和组。请参阅 *使用\
  \ authentication_oci 插件连接到 DB 系统* [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/connecting-db-system.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/connecting-db-system.xhtml)。\n\
  *   `MySQL 连接控制`：MySQL 数据库服务支持连接控制插件，以提供一种威慑手段，减缓针对 MySQL 用户账户的暴力攻击。请参阅 *插件和组件*\
  \ [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml)。\n\
  *   `MySQL 密码验证`：使用 `validate_password` 组件通过设置复杂性和强制性更改频率的规则来强制执行密码生成。请参阅 *插件和组件*\
  \ [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/db-system.xhtml)。\n\
  *   `MySQL 安全性`：规划 MySQL 安全功能以控制对数据的访问。请参阅 [`https//dev.mysql.com/doc/refman/8.0/en/access-control.xhtml`](http://dev.mysql.com/doc/refman/8.0/en/access-control.xhtml)。\n\
  *   `网络负载均衡器`：考虑将通过互联网的访问限制在特定 IP 地址或 IP 地址范围内，并使用传输中加密。同时，考虑使用网络负载均衡器。请参阅 *使用网络负载均衡器连接到\
  \ DB 系统* [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/connecting-db-system.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/connecting-db-system.xhtml)。\n\
  *   `VCN 安全组`：使用虚拟云网络安全组或 VCN 的安全列表，将授权的公共 IP 地址限制为单个 IP 地址或 IP 地址范围。请参阅 *使用...添加入站规则*\
  \ [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/networking-setup-mysql-db-systems.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/networking-setup-mysql-db-systems.xhtml)。\n\
  *   `VCN 连接限制`：你可以将 DB 系统配置为使用 VCN 的私有子网，将连接限制为仅限 VPN 连接，或使用堡垒机会话。请参阅 *堡垒机会话* [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/networking-setup-mysql-db-systems.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/networking-setup-mysql-db-systems.xhtml)\
  \ 或 *VPN 连接* [`https//docs.oracle.com/en-us/iaas/mysql-database/doc/networking-setup-mysql-db-systems.xhtml`](http://docs.oracle.com/en-us/iaas/mysql-database/doc/networking-setup-mysql-db-systems.xhtml)。\n\
  \n虽然该列表包含了简略描述，但你应该考虑研究每一个链接，以获取有关规划和实现安全 MDS 安装的更详细信息。\n\n\n## 总结\n\n规划一次 MDS 安装的任务并非极其复杂，但确实需要一些前瞻性的思考和周密的计划。与任何技术一样，我们应该从小处着手，先进行一个简单的实验性安装，以尽可能多地测试该技术的各个方面。这不仅包括部署数据库系统的机制，还包括配置访问和保护数据的网络与安全的具体细节。这也给你提供了一个机会，去确保并学习如何将你的应用程序连接到你的数据库系统。\n\
  \n在本章中，我们了解了规划数据库系统时的一些重要考量，包括如何使用 OCI 文档获取帮助、去哪里寻求额外帮助，以及关于计算形态、磁盘存储、网络和安全的配置考量。\n\
  \n对于 MySQL 用户来说，这是一个激动人心的时刻。Oracle 继续履行其承诺，不仅持续开发 MySQL，还投入资源在云端改进和扩展其功能集，这是一项**颠覆性的技术**，它消除了自行构建复杂（且昂贵）的本地\
  \ MySQL 安装的负担（和开销）。对于那些希望利用云服务来降低成本并提升能力的人而言，OCI 和 MDS 应该是你的**得力工具**。\n\n虽然它已经是一项能力出众且可靠的服务，足以满足你的数据库需求，但请密切关注\
  \ Oracle 云基础设施，以获取更多卓越功能、新的 MySQL 服务，以及对 MySQL 数据库服务的进一步优化和更新。\n\n\n\n"
