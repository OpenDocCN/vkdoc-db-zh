    ### 多服务器作业


    使用多服务器管理可以极大地简化管理。在多服务器环境中，您可以将一个实例配置为主服务器 (MSX)，然后将其他服务器配置为目标服务器 (TSX)。然后，您可以在
    MSX 上创建一组维护作业，并配置它们在 TSX 上或 TSX 的子集上运行。


    #### 配置 MSX 和 TSX 服务器


    在创建多服务器作业之前，您必须首先准备环境。第一步是编辑 MSX 上的注册表，并将 `AllowDownloadedJobsToMatchProxyName
    REG_DWORD` 的值设置为 `1`，这允许作业匹配代理名称。您可以在注册表中 `Software\Microsoft\Microsoft SQL Server\[YOUR
    INSTANCE NAME]` 键下的 SQL Server 代理键中找到此值。您还需要确保 TSX 配置了代理账户，其名称与将在其上运行作业的 MSX 上的代理账户名称相同。


    我们还需要配置 TSX 在与 MSX 通信时如何加密数据。我们使用 TSX 的 `MsxEncryptChannelOptions` 注册表键来实现这一点。您可以在注册表中
    `Software\Microsoft\Microsoft SQL Server\[YOUR INSTANCE NAME]` 键下的 SQL Server
    代理键中找到此键。值为 `0` 表示不使用加密。`1` 表示使用加密，但不验证证书，`2` 表示使用完整的 SSL 加密和证书验证。在我们的环境中，由于所有实例都在同一台物理机上，我们禁用加密。


    因此，为了准备我们的 `SQLSERVER\MASTERSERVER` 实例作为 MSX，并准备我们的 `SQLSERVER\TARGETSERVER1`
    和 `SQLSERVER\TARGETSERVER2` 实例作为 TSX，我们运行清单 22-9 中的脚本来更新注册表。

