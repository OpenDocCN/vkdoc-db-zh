- fmt: '### Note


    The demonstrations in this section use three instances named `SQLSERVER\MASTERSERVER`,
    which we configure as an MSX, and `SQLSERVER\TARGETSERVER1` and `SQLSERVER\TARGETSERVER2`,
    both of which we configure as TSXs.


    ```

    USE Master

    GO

    EXEC xp_regwrite

    @rootkey = N''HKEY_LOCAL_MACHINE''

    ,@key = N''Software\Microsoft\Microsoft SQL Server\MasterServer\SQL Server Agent''

    ,@value_name = N''AllowDownloadedJobsToMatchProxyName''

    ,@type = N''REG_DWORD''

    ,@value = 1 ;

    EXEC xp_regwrite

    @rootkey=''HKEY_LOCAL_MACHINE'',

    @key=''SOFTWARE\Microsoft\Microsoft SQL Server\MSSQL15.TARGETSERVER1\SQLServerAgent'',

    @value_name=''MsxEncryptChannelOptions'',

    @type=''REG_DWORD'',

    @value=0 ;

    EXEC xp_regwrite

    @rootkey=''HKEY_LOCAL_MACHINE'',

    @key=''SOFTWARE\Microsoft\Microsoft SQL Server\MSSQL15.TARGETSERVER2\SQLServerAgent'',

    @value_name=''MsxEncryptChannelOptions'',

    @type=''REG_DWORD'',

    @value=0 ;

    GO

    Listing 22-9

    Updating the Registry

    ```


    ### Tip


    Because all of our instances reside on the same server, this script can be run
    from any of the three instances. If your instances are on different servers, then
    the first command will run on the MSX and the other two commands should run against
    their corresponding TSX. You should also note that the service account running
    the database engine will require permissions to the registry keys, for the script
    to succeed.


    We now use the `SQLCMD` script in Listing [22-10](#333037_2_En_22_Chapter.xhtml#PC10)
    to create the PowerShell proxy account on `TARGETSERVER1` and `TARGETSERVER2`.
    The script must be run in SQLCMD mode to work because it connects to multiple
    instances.


    ```

    :connect sqlserver\targetserver1

    CREATE CREDENTIAL WinUserCredential

    WITH IDENTITY = N''PROSQLADMIN\WinUser'', SECRET = N''Pa$$w0rd'' ;

    GO

    EXEC msdb.dbo.sp_add_proxy

    @proxy_name=N''PowerShellProxy'',

    @credential_name=N''WinUserCredential'',

    @enabled=1,

    @description=N''Proxy to check Browser Service status'' ;

    GO

    EXEC msdb.dbo.sp_grant_proxy_to_subsystem

    @proxy_name=N''PowerShellProxy'',

    @subsystem_id=12 ;

    GO

    :connect sqlserver\targetserver2

    CREATE CREDENTIAL WinUserCredential

    WITH IDENTITY = N''PROSQLADMIN\WinUser'', SECRET = N''Pa$$w0rd'' ;

    GO

    EXEC msdb.dbo.sp_add_proxy

    @proxy_name=N''PowerShellProxy'',

    @credential_name=N''WinUserCredential'',

    @enabled=1,

    @description=N''Proxy to check Browser Service status'' ;

    GO

    EXEC msdb.dbo.sp_grant_proxy_to_subsystem

    @proxy_name=N''PowerShellProxy'',

    @subsystem_id=12 ;

    GO

    Listing 22-10

    Creating a Proxy

    ```


    We can now begin to configure our `SQLSERVER\MASTERSERVER` instance as an MSX.
    To do this through SQL Server Management Studio, we invoke the Master Server Wizard
    by opening the SQL Server Agent context menu in Object Explorer and selecting
    Multi Server Administration ➤ Make This A Master.


    After passing through the Welcome page of the wizard, we find the Master Server
    Operator page (see Figure [22-29](#333037_2_En_22_Chapter.xhtml#Fig29)). On this
    page, we enter the details of an operator who will be notified of the status of
    multiserver jobs.


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig29_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig29_HTML.jpg)


    Figure 22-29: The Master Server Operator page


    On the Target Servers page of the wizard, shown in Figure [22-30](#333037_2_En_22_Chapter.xhtml#Fig30),
    we select our target servers from the list of registered servers in the Registered
    Servers pane and move them to the Target Servers pane using the arrows. After
    highlighting a server in the Target Servers pane, we can use the Connection button
    to ensure connectivity.


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig30_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig30_HTML.jpg)


    Figure 22-30: The Target Servers page


    ### Tip


    All of our instances appear in the Local Server Groups node of the Registered
    Servers pane because they are all on the same server. If the instances that you
    wish to be target servers are not local, you can register servers by using the
    Registered Servers window, which you can access from the View menu in SQL Server
    Management Studio.


    On the Master Server Login Credentials page of the wizard, we are asked if a New
    Login should be created if required. This is the login that the TSXs use to connect
    to the MSX and download the jobs that they should run. If the instances of SQL
    Server Agent share the same service account as the MSX, then this is not required.


    Now we see a summary of the actions that will be performed on the Completion page
    of the wizard before we are presented with a progress window, which informs us
    of the success or failure of each task.'
