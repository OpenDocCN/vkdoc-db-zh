- fmt: '### Caution


    使用 `EVENT_RETENTION_MODE` 的 `NO_EVENT_LOSS` 选项可能会导致实例出现性能问题，因为任务可能必须等待，直到事件会话的缓冲区中有空间容纳事件数据才能完成。


    清单 [19-5](#333037_2_En_19_Chapter.xhtml#PC5) 中的脚本演示了如何使用 T-SQL 创建一个名为 `LogFileIO`
    的会话。此会话类似于通过 GUI 提供的“数据库日志文件 IO 跟踪”模板。不同之处在于，我们额外捕获了 `sqlos.wait_completed` 事件和
    `sqlserver.DatabaseName` 全局字段，并且我们还对此进行了筛选，以便仅跟踪 `Chapter19` 事务日志的详细信息。


    跟踪结果将写入 `C:\Logs` 文件夹中名为 `LogFileIO.xel` 的文件（该文件夹需要预先创建）。`STARTUP_STATE` 选项用于启动会话。


    ```sql

    CREATE EVENT SESSION [LogFileIO] ON SERVER

    ADD EVENT sqlos.async_io_completed(

    ACTION(sqlserver.database_name)

    WHERE ([sqlserver].[database_name]=N''Chapter19'')),

    ADD EVENT sqlos.async_io_requested(

    ACTION(sqlserver.database_name)

    WHERE ([sqlserver].[database_name]=N''Chapter19'')),

    ADD EVENT sqlos.spinlock_backoff(

    ACTION(sqlserver.database_name,sqlserver.sql_text)

    WHERE (([package0].[equal_uint64]([type],(85))) AND ([sqlserver].[database_name]=N''Chapter19''))),

    ADD EVENT sqlos.wait_completed(

    ACTION(sqlserver.database_name)

    WHERE ([sqlserver].[database_name]=N''Chapter19'')),

    ADD EVENT sqlos.wait_info(

    ACTION(sqlserver.client_app_name,sqlserver.database_name,sqlserver.is_system,sqlserver.session_id)

    WHERE ((([package0].[equal_uint64]([opcode],(1))) AND ([package0].[equal_uint64]([wait_type],(182))))
    AND ([sqlserver].[database_name]=N''Chapter19''))),

    ADD EVENT sqlserver.databases_log_flush(

    ACTION(sqlserver.database_name)

    WHERE ([sqlserver].[database_name]=N''Chapter19'')),

    ADD EVENT sqlserver.databases_log_flush_wait(

    ACTION(sqlserver.database_name)

    WHERE ([sqlserver].[database_name]=N''Chapter19'')),

    ADD EVENT sqlserver.file_write_completed(SET collect_path=(1)

    ACTION(sqlserver.database_name)

    WHERE (([package0].[equal_uint64]([file_id],(2))) AND ([sqlserver].[database_name]=N''Chapter19''))),

    ADD EVENT sqlserver.file_written(SET collect_path=(1)

    ACTION(sqlserver.database_name)

    WHERE (([package0].[equal_uint64]([file_id],(2))) AND ([sqlserver].[database_name]=N''Chapter19'')))

    ADD TARGET package0.event_file(SET filename=N''C:\Logs\LogFileIO.xel'',max_file_size=(512)),

    ADD TARGET package0.histogram(SET filtering_event_name=N''sqlos.spinlock_backoff'',source=N''sqlserver.sql_text''),

    ADD TARGET package0.ring_buffer

    WITH (MAX_MEMORY=4096 KB, EVENT_RETENTION_MODE=ALLOW_SINGLE_EVENT_LOSS,MAX_DISPATCH_LATENCY=30
    SECONDS,MAX_EVENT_SIZE=0 KB, MEMORY_PARTITION_MODE=NONE,TRACK_CAUSALITY=OFF,STARTUP_STATE=ON)

    GO

    ```

    清单 19-5 创建事件会话


    ### Note


    由于 `STARTUP_STATE` 配置为 `ON`，此会话将自动启动。


    ## 查看收集的数据


    SQL Server 提供了一个数据查看器，您可以使用它对来自文件或缓冲区的实时事件数据进行基本分析。然而，对于更复杂的分析，您可以通过 T-SQL 访问和操作事件数据。以下各节讨论了这些分析方法。


    ### 使用数据分析器分析数据


    您可以通过在对象资源管理器中依次展开“管理”➜“扩展事件”➜“会话”，然后从会话上下文菜单中选择“查看实时数据”，来使用数据分析器观察数据到达缓冲区时的实时情况。或者，您可以通过展开会话并从目标上下文菜单中选择“查看目标数据”来查看目标中的数据。


    ### Tip


    数据分析器不支持环形缓冲区或 ETW 目标类型。


    清单 [19-6](#333037_2_En_19_Chapter.xhtml#PC6) 中的脚本向 `Chapter19` 数据库中的 `Customers`
    表插入数据，这会导致事务日志产生 IO 活动，该活动会被我们的 `LogFileIO` 会话捕获。


    ```sql

    USE Chapter19

    GO

    --Create and populate numbers table

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE;

    --Create and populate name pieces

    DECLARE @Names TABLE

    (

    FirstName        VARCHAR(30),

    LastName        VARCHAR(30)

    );

    INSERT INTO @Names

    VALUES(''Peter'', ''Carter''),

    (''Michael'', ''Smith''),

    (''Danielle'', ''Mead''),

    (''Reuben'', ''Roberts''),

    (''Iris'', ''Jones''),

    (''Sylvia'', ''Davies''),

    (''Finola'', ''Wright''),

    (''Edward'', ''James''),

    (''Marie'', ''Andrews''),

    (''Jennifer'', ''Abraham'');

    --Insert to Customers

    SELECT * INTO #Customers

    FROM

    (SELECT

    (SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName,

    (SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) BillingAddressID,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) DeliveryAddressID,

    (SELECT TOP 1 CAST(RAND() * Number AS INT) * 10000

    FROM @Numbers

    ORDER BY NEWID()) CreditLimit,

    (SELECT TOP 1 CAST(RAND() * Number AS INT) * 9000

    FROM @Numbers

    ORDER BY NEWID()) Balance

    FROM @Numbers a

    CROSS JOIN @Numbers b

    CROSS JOIN @Numbers c

    ) a;

    INSERT INTO dbo.Customers

    SELECT * FROM #Customers ;

    GO

    ```

    清单 19-6 插入数据到 Customers 表


    如果现在在对象资源管理器中为 `LogFileIO` 会话下的 `event_file` 目标打开数据分析器，我们会看到图 [19-7](#333037_2_En_19_Chapter.xhtml#Fig7)
    所示的结果。查看器在网格中显示每个事件和时间戳；选择一个事件会显示该事件的“详细信息”窗格。


    ![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig7_HTML.jpg](../images/333037_2_En_19_Chapter/333037_2_En_19_Fig7_HTML.jpg)

    图 19-7 event_file 目标的数据视图


    请注意，SQL Server Management Studio 中会显示一个数据分析器工具栏，如图 [19-8](#333037_2_En_19_Chapter.xhtml#Fig8)
    所示。您可以使用此工具栏向网格添加或删除列，以及执行分组和聚合操作。


    ![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig8_HTML.jpg](../images/333037_2_En_19_Chapter/333037_2_En_19_Fig8_HTML.jpg)

    图 19-8 数据分析器工具栏


    单击“选择列”按钮会调用“选择列”对话框。我们使用此对话框将 `duration` 和 `wait_type` 列添加到网格，如图 [19-9](#333037_2_En_19_Chapter.xhtml#Fig9)
    所示。


    ![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig9_HTML.jpg](../images/333037_2_En_19_Chapter/333037_2_En_19_Fig9_HTML.jpg)

    图 19-9 “选择列”对话框


    我们现在可以右键单击 `Wait_Type` 列并选择 `Group By This Column` 选项。这将导致所有事件按“等待类型”级别进行汇总。


    我们现在可以使用“聚合”按钮调用“聚合”对话框。我们可以使用此对话框将聚合函数（如 `SUM`、`AVG` 或 `COUNT`）应用于数据。也可以按聚合值对数据进行排序。图
    [19-10](#333037_2_En_19_Chapter.xhtml#Fig10) 显示我们正在使用此对话框添加等待持续时间的 `SUM`。


    ![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig10_HTML.jpg](../images/333037_2_En_19_Chapter/333037_2_En_19_Fig10_HTML.jpg)

    图 19-10 “聚合”对话框


    在数据分析器网格中，我们现在可以看到 `wait_type` 对应的 `duration` 列的 `SUM`，如果展开此分组，则会显示详细粒度信息，如图 [19-11](#333037_2_En_19_Chapter.xhtml#Fig11)
    所示。


    ![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig11_HTML.jpg](../images/333037_2_En_19_Chapter/333037_2_En_19_Fig11_HTML.jpg)

    图 19-11 数据分析器网格'
  raw: '### Caution


    Using the `NO_EVENT_LOSS` option for `EVENT_RETENTION_MODE` can cause performance
    issues on your instance, because tasks may have to wait to complete until there
    is space in the event session’s buffers to hold the event data.


    The script in Listing [19-5](#333037_2_En_19_Chapter.xhtml#PC5) demonstrates how
    you can use T-SQL to create a session called `LogFileIO`. This session is similar
    to the Database Log File IO Tracking template, provided through the GUI. The difference
    is that we are additionally capturing the `sqlos.wait_completed` event and the
    `sqlserver.DatabaseName` global field, which we are also filtering on this, so
    that only details of the `Chapter19` transaction log are tracked.


    The results of the trace will be written to a file called `LogFileIO.xel` in the
    `C:\Logs` folder (which needs to be pre-created). The `STARTUP_STATE` option is
    used to start the session.


    ```

    CREATE EVENT SESSION [LogFileIO] ON SERVER

    ADD EVENT sqlos.async_io_completed(

    ACTION(sqlserver.database_name)

    WHERE ([sqlserver].[database_name]=N''Chapter19'')),

    ADD EVENT sqlos.async_io_requested(

    ACTION(sqlserver.database_name)

    WHERE ([sqlserver].[database_name]=N''Chapter19'')),

    ADD EVENT sqlos.spinlock_backoff(

    ACTION(sqlserver.database_name,sqlserver.sql_text)

    WHERE (([package0].[equal_uint64]([type],(85))) AND ([sqlserver].[database_name]=N''Chapter19''))),

    ADD EVENT sqlos.wait_completed(

    ACTION(sqlserver.database_name)

    WHERE ([sqlserver].[database_name]=N''Chapter19'')),

    ADD EVENT sqlos.wait_info(

    ACTION(sqlserver.client_app_name,sqlserver.database_name,sqlserver.is_system,sqlserver.session_id)

    WHERE ((([package0].[equal_uint64]([opcode],(1))) AND ([package0].[equal_uint64]([wait_type],(182))))
    AND ([sqlserver].[database_name]=N''Chapter19''))),

    ADD EVENT sqlserver.databases_log_flush(

    ACTION(sqlserver.database_name)

    WHERE ([sqlserver].[database_name]=N''Chapter19'')),

    ADD EVENT sqlserver.databases_log_flush_wait(

    ACTION(sqlserver.database_name)

    WHERE ([sqlserver].[database_name]=N''Chapter19'')),

    ADD EVENT sqlserver.file_write_completed(SET collect_path=(1)

    ACTION(sqlserver.database_name)

    WHERE (([package0].[equal_uint64]([file_id],(2))) AND ([sqlserver].[database_name]=N''Chapter19''))),

    ADD EVENT sqlserver.file_written(SET collect_path=(1)

    ACTION(sqlserver.database_name)

    WHERE (([package0].[equal_uint64]([file_id],(2))) AND ([sqlserver].[database_name]=N''Chapter19'')))

    ADD TARGET package0.event_file(SET filename=N''C:\Logs\LogFileIO.xel'',max_file_size=(512)),

    ADD TARGET package0.histogram(SET filtering_event_name=N''sqlos.spinlock_backoff'',source=N''sqlserver.sql_text''),

    ADD TARGET package0.ring_buffer

    WITH (MAX_MEMORY=4096 KB, EVENT_RETENTION_MODE=ALLOW_SINGLE_EVENT_LOSS,MAX_DISPATCH_LATENCY=30
    SECONDS,MAX_EVENT_SIZE=0 KB, MEMORY_PARTITION_MODE=NONE,TRACK_CAUSALITY=OFF,STARTUP_STATE=ON)

    GO

    Listing 19-5

    Creating an Event Session

    ```


    ### Note


    This session will start automatically, due to the STARTUP_STATE being configured
    as ON.


    ## Viewing the Collected Data


    SQL Server provides a data viewer that you can use for basic analysis of event
    data from a file or live data from the buffers. For more complex analysis, however,
    you can access and manipulate the event data via T-SQL. The following sections
    discuss each of these methods of analysis.


    ### Analyzing Data with Data Viewer


    You can use the data viewer to watch live data as it hits the buffers by drilling
    through Management ➤ Extended Events ➤ Sessions in Object Explorer and selecting
    Watch Live Data from the Session context menu. Alternatively, you can use it to
    view data in the target by drilling through the session and selecting View Target
    Data from the Target context menu.


    ### Tip


    The data viewer does not support the ring buffer or ETW target types.


    The script in Listing [19-6](#333037_2_En_19_Chapter.xhtml#PC6) inserts data into
    the `Customers` table in the `Chapter19` database, which causes IO activity for
    the transaction log, which is captured by our `LogFileIO` session.


    ```

    USE Chapter19

    GO

    --Create and populate numbers table

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE;

    --Create and populate name pieces

    DECLARE @Names TABLE

    (

    FirstName        VARCHAR(30),

    LastName        VARCHAR(30)

    );

    INSERT INTO @Names

    VALUES(''Peter'', ''Carter''),

    (''Michael'', ''Smith''),

    (''Danielle'', ''Mead''),

    (''Reuben'', ''Roberts''),

    (''Iris'', ''Jones''),

    (''Sylvia'', ''Davies''),

    (''Finola'', ''Wright''),

    (''Edward'', ''James''),

    (''Marie'', ''Andrews''),

    (''Jennifer'', ''Abraham'');

    --Insert to Customers

    SELECT * INTO #Customers

    FROM

    (SELECT

    (SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName,

    (SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) BillingAddressID,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) DeliveryAddressID,

    (SELECT TOP 1 CAST(RAND() * Number AS INT) * 10000

    FROM @Numbers

    ORDER BY NEWID()) CreditLimit,

    (SELECT TOP 1 CAST(RAND() * Number AS INT) * 9000

    FROM @Numbers

    ORDER BY NEWID()) Balance

    FROM @Numbers a

    CROSS JOIN @Numbers b

    CROSS JOIN @Numbers c

    ) a;

    INSERT INTO dbo.Customers

    SELECT * FROM #Customers ;

    GO

    Listing 19-6

    Inserting into Customers

    ```


    If we now open the data viewer for the `event_file` target under the `LogFileIO`
    session in Object Explorer, we see the results illustrated in Figure [19-7](#333037_2_En_19_Chapter.xhtml#Fig7).
    The viewer shows each event and timestamp in a grid; selecting an event exposes
    the Details pane for that event.


    ![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig7_HTML.jpg](images/333037_2_En_19_Chapter/333037_2_En_19_Fig7_HTML.jpg)


    Figure 19-7


    Data view on event_ file target


    Notice that a data viewer toolbar is displayed in SQL Server Management Studio,
    as illustrated in Figure [19-8](#333037_2_En_19_Chapter.xhtml#Fig8). You can use
    this toolbar to add or remove columns from the grid as well as to perform grouping
    and aggregation operations.


    ![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig8_HTML.jpg](images/333037_2_En_19_Chapter/333037_2_En_19_Fig8_HTML.jpg)


    Figure 19-8


    Data viewer toolbar


    Clicking the Choose Columns button invokes the Choose Columns dialog box. We use
    this dialog box to add the `duration` and `wait_type` columns to the grid, as
    shown in Figure [19-9](#333037_2_En_19_Chapter.xhtml#Fig9).


    ![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig9_HTML.jpg](images/333037_2_En_19_Chapter/333037_2_En_19_Fig9_HTML.jpg)


    Figure 19-9


    The Choose Columns dialog box


    We can now right-click the `Wait_Type` column and select the `Group By This Column`
    option. This will cause all of the events to be rolled up, to the level of Wait
    Type.


    We can now use the Aggregation button to invoke the Aggregation dialog box. We
    can use this dialog box to apply aggregate functions, such as `SUM`, `AVG`, or
    `COUNT`, to the data. It is also possible to sort the data by an aggregated value.
    Figure [19-10](#333037_2_En_19_Chapter.xhtml#Fig10) shows that we are using this
    dialog box to add a `SUM` of the wait durations.


    ![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig10_HTML.jpg](images/333037_2_En_19_Chapter/333037_2_En_19_Fig10_HTML.jpg)


    Figure 19-10


    The Aggregation dialog box


    In the data viewer grid, we are now able to see a `SUM` of the `duration` column
    for the `wait_type`, and if we expand this group, it displays the granular details,
    as shown in Figure [19-11](#333037_2_En_19_Chapter.xhtml#Fig11).


    ![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig11_HTML.jpg](images/333037_2_En_19_Chapter/333037_2_En_19_Fig11_HTML.jpg)


    Figure 19-11


    The data viewer grid'
