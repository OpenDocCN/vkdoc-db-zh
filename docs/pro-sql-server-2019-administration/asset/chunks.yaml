    *图 14-14：“连接到副本”页面*


    在“摘要”页面上，将显示要执行的任务详情，随后在“结果”页面上显示进度指示器。故障转移完成后，请检查所有任务是否成功，并调查收到的任何错误或警告。


    我们也可以使用 T-SQL 来故障转移可用性组。清单 14-18 中的命令实现了相同的结果。请确保从将要成为新主副本的副本上运行此脚本。如果您从当前主副本运行它，请使用
    SQLCMD 模式并在脚本中连接到新主副本。


    ```sql

    ALTER AVAILABILITY GROUP App2 FAILOVER ;

    GO

    ```


    *清单 14-18: 故障转移可用性组*


    ## 异步故障转移


    如果您的可用性组处于**异步提交**模式，那么从技术角度来看，您可以以类似于同步提交模式副本的方式进行故障转移，不同之处在于您需要强制故障转移，从而接受数据丢失的风险。您可以使用清单
    14-19 中的命令强制故障转移。您应在将成为新主副本的实例上运行此脚本。为使其工作，集群必须具有仲裁。如果没有，则需要在强制可用性组联机之前强制集群联机。


    ```sql

    ALTER AVAILABILITY GROUP App2 FORCE_FAILOVER_ALLOW_DATA_LOSS ;

    ```


    *清单 14-19: 强制故障转移*


    从流程角度来看，只有在您的主站点完全不可用时才应执行此操作。如果情况并非如此，首先应将应用程序置于安全状态。这可以避免任何数据丢失的可能性。我在生产环境中通常通过执行以下步骤来实现这一点：


    1.  禁用登录名。

    2.  将副本的模式更改为同步提交模式。

    3.  进行故障转移。

    4.  将副本更改回异步提交模式。

    5.  启用登录名。


    您可以使用清单 14-20 中的脚本来执行这些步骤。当从灾难恢复实例运行时，此脚本会在故障转移前将 `App2` 中的数据库置于安全状态，然后重新配置应用程序以在正常操作下工作。


    ```sql

    --DISABLE LOGINS

    DECLARE @AOAGDBs TABLE

    (

    DBName NVARCHAR(128)

    ) ;

    INSERT INTO @AOAGDBs

    SELECT database_name

    FROM sys.availability_groups AG

    INNER JOIN sys.availability_databases_cluster ADC

    ON AG.group_id = ADC.group_id

    WHERE AG.name = ''App2'' ;


    DECLARE @Mappings TABLE

    (

    LoginName NVARCHAR(128),

    DBname NVARCHAR(128),

    Username NVARCHAR(128),

    AliasName NVARCHAR(128)

    ) ;

    INSERT INTO @Mappings

    EXEC sp_msloginmappings ;


    DECLARE @SQL NVARCHAR(MAX)

    SELECT DISTINCT @SQL =

    (

    SELECT ''ALTER LOGIN ['' + LoginName + ''] DISABLE; '' AS [data()]

    FROM @Mappings M

    INNER JOIN @AOAGDBs A

    ON M.DBname = A.DBName

    WHERE LoginName  SUSER_NAME()

    FOR XML PATH ('''')

    )

    EXEC(@SQL)

    GO


    --SWITCH TO SYNCHRONOUS COMMIT MODE

    ALTER AVAILABILITY GROUP App2

    MODIFY REPLICA ON N''CLUSTERNODE3\ASYNCDR'' WITH (AVAILABILITY_MODE = SYNCHRONOUS_COMMIT)
    ;

    GO


    --FAIL OVER

    ALTER AVAILABILITY GROUP App2 FAILOVER

    GO


    --SWITCH BACK TO ASYNCHRONOUS COMMIT MODE

    ALTER AVAILABILITY GROUP App2

    MODIFY REPLICA ON N''CLUSTERNODE3\ASYNCDR'' WITH (AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT)
    ;

    GO


    --ENABLE LOGINS

    DECLARE @AOAGDBs TABLE

    (

    DBName NVARCHAR(128)

    ) ;

    INSERT INTO @AOAGDBs

    SELECT database_name

    FROM sys.availability_groups AG

    INNER JOIN sys.availability_databases_cluster ADC

    ON AG.group_id = ADC.group_id

    WHERE AG.name = ''App2'' ;


    DECLARE @Mappings TABLE

    (

    LoginName NVARCHAR(128),

    DBname NVARCHAR(128),

    Username NVARCHAR(128),

    AliasName NVARCHAR(128)

    ) ;

    INSERT INTO @Mappings

    EXEC sp_msloginmappings


    DECLARE @SQL NVARCHAR(MAX)

    SELECT DISTINCT @SQL =

    (

    SELECT ''ALTER LOGIN ['' + LoginName + ''] ENABLE; '' AS [data()]

    FROM @Mappings M

    INNER JOIN @AOAGDBs A

    ON M.DBname = A.DBName

    WHERE LoginName  SUSER_NAME()

    FOR XML PATH ('''')

    ) ;

    EXEC(@SQL)

    ```


    *清单 14-20: 将应用程序置于安全状态并进行故障转移*


    ## 同步未包含对象


    无论您使用哪种方法进行故障转移，假设可用性组中的所有数据库都是非包含的，那么您需要确保实例级对象已同步。保持实例级对象同步的最直接方法是实现一个 SSIS
    包，并将其计划为定期运行。


    无论您选择计划执行 SSIS 包，还是选择不同的方法，例如使用 SQL Server Agent 作业在辅助服务器上编写脚本并重新创建对象，以下是您应考虑同步的对象：


    *   登录名

    *   凭据

    *   SQL Server Agent 作业

    *   自定义错误消息

    *   链接服务器

    *   服务器级事件通知

    *   Master 数据库中的存储过程

    *   服务器级触发器

    *   加密密钥和证书


    ## 监控


    实现可用性组后，您需要监控它们，并响应可能影响数据可用性的任何错误或警告。如果您在整个企业中实现了许多可用性组，那么有效且全面监控它们的唯一方法是使用企业监控工具，例如
    SOC（系统操作中心）。但是，如果您只有少量可用性组，或者您正在对特定问题进行故障排除，那么 SQL Server 提供了 AlwaysOn 仪表板和 AlwaysOn
    健康跟踪。以下部分将探讨这两个功能。


    ### AlwaysOn 仪表板


    AlwaysOn 仪表板是一个交互式报告，允许您查看 AlwaysOn 环境的运行状况，并钻取或汇总拓扑中的元素。您可以从对象资源管理器中“可用性组”文件夹的上下文菜单，或从可用性组本身的上下文菜单调用此报告。图
    14-15 显示了从 `App2` 可用性组的上下文菜单生成的报告。您可以看到当前两个副本的同步状态都是健康的。


    数据库可能处于的三种同步状态是 `SYNCHRONIZED`（已同步）、`SYNCRONIZING`（正在同步）和 `NOT SYNCHRONIZING`（未同步）。同步副本应处于
    `SYNCHRONIZED` 状态，任何其他状态都是不健康的。然而，异步副本永远不会处于 `SYNCHRONIZED` 状态，而 `SYNCHRONIZING`
    状态被认为是健康的。无论哪种模式，`NOT SYNCHRONIZING` 都表示副本未连接。


    ![可用性组仪表板](img/333037_2_En_14_Fig15_HTML.jpg)


    *图 14-15: 可用性组仪表板*'
- fmt: '# AlwaysOn可用性组管理注意事项


    ### Note


    除了同步状态，副本还具有以下操作状态之一：`PENDING_FAILOVER`、`PENDING`、`ONLINE`、`OFFLINE`、`FAILED`、`FAILED_NO_QUORUM`
    和 `NULL`（当副本断开连接时）。可以通过 `sys.dm_hadr_availability_replica_states` DMV 查看副本的操作状态。


    在报告的右上角，有指向故障转移向导（本章前面讨论过）、AlwaysOn 健康事件（下一节讨论）以及查看集群仲裁信息的链接。此链接调用的“集群仲裁信息”屏幕如图
    [14-16](#333037_2_En_14_Chapter.xhtml#Fig16) 所示。您还可以在“可用性副本”窗口中深入查看每个副本，以获取特定于副本的详细信息。


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig16_HTML.jpg](images/333037_2_En_14_Chapter/333037_2_En_14_Fig16_HTML.jpg)


    图 14-16

    集群仲裁信息屏幕


    #### AlwaysOn Health Trace


    AlwaysOn Health Trace 是一个扩展事件会话，在您创建第一个可用性组时创建。它可以在 SQL Server Management Studio
    中找到，位于“扩展事件”➤“会话”下。通过其上下文菜单，您可以查看正在捕获的实时数据，或者进入会话属性以更改捕获事件的配置。


    深入查看会话会显示其程序包，从程序包的上下文菜单中，您可以查看先前捕获的事件。图 [14-17](#333037_2_En_14_Chapter.xhtml#Fig17)
    显示了最近捕获的事件，即数据库 5（在我们的例子中是 `Chapter14App2Customers`）正在等待日志在同步副本上被固化。第 [19](#333037_2_En_19_Chapter.xhtml)
    章详细讨论了扩展事件。


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig17_HTML.jpg](images/333037_2_En_14_Chapter/333037_2_En_14_Fig17_HTML.jpg)


    图 14-17

    目标数据


    ### 其他管理注意事项


    当使用 AlwaysOn 可用性组使数据库保持高可用性时，会施加一些限制。其中最具限制性的是，数据库不能被置于 `single_user` 模式或设置为 `read
    only`。这在您需要为维护而将应用程序置于安全状态时会产生影响。这就是为什么在本章的“故障转移”一节中，我们禁用了映射到这些数据库用户的登录账户。如果您必须将数据库置于单用户模式，则必须首先将其从可用性组中移除。


    可以通过执行清单 [14-21](#333037_2_En_14_Chapter.xhtml#PC21) 中的命令从可用性组中移除数据库。此命令将 `Chapter14App2Customers`
    数据库从可用性组中移除。


    ```

    ALTER DATABASE Chapter14App2Customers SET HADR OFF ;

    ```

    清单 14-21

    从可用性组中移除数据库


    也可能有些情况下，您希望数据库保留在可用性组中，但希望暂停向其他副本的数据移动。这通常是因为可用性组处于同步提交模式，并且您在高使用期间需要提升性能。您可以使用清单
    [14-22](#333037_2_En_14_Chapter.xhtml#PC22) 中的命令暂停数据库的数据移动，该命令暂停 `Chapter14App1Sales`
    数据库的数据移动，然后恢复它。


    ### Caution


    如果暂停数据移动，主副本上的事务日志会继续增长，并且在数据移动恢复且数据库同步之前，您无法截断它。


    ```

    ALTER DATABASE Chapter14App2Customers SET HADR SUSPEND ;

    GO

    ALTER DATABASE Chapter14App2Customers SET HADR RESUME ;

    GO

    ```

    清单 14-22

    暂停数据移动


    另一个重要的注意事项是数据库和日志文件的位置。这些文件在每个副本上必须位于相同的位置。这意味着，如果您使用命名实例，则必须为数据和日志更改默认文件位置，因为默认位置包含实例名称。当然，这是假设您不在每个节点上使用相同的实例名称，否则将违背使用命名实例的许多好处。


    ## 总结


    AlwaysOn 可用性组最多可实现八个辅助副本，结合了同步和异步提交模式。在使用可用性组实现高可用性时，始终使用同步提交模式，因为异步提交模式不支持自动故障转移。然而，在实现同步提交模式时，您必须意识到在事务在主副本上提交之前先在辅助副本上提交所带来的相关性能损失。对于灾难恢复，您通常会选择实现异步提交模式。


    可以通过“新建可用性组”向导、对话框、T-SQL 甚至 PowerShell 来创建可用性组。如果使用对话框创建可用性组，则某些方面（例如端点和相关权限）必须使用
    T-SQL 或 PowerShell 进行脚本编写。


    如果您使用可用性组实现灾难恢复，则需要配置多子网集群。然而，这并不意味着您必须在站点之间使用 SAN 复制，因为可用性组不依赖于共享存储。您需要做的是为管理集群访问点以及可用性组侦听器添加额外的
    IP 地址。您还需要注意支持客户端重新连接的集群属性，以确保客户端不会遇到大量的超时。


    在主副本发生故障时，故障转移到同步副本是自动的。然而，有些情况下您也需要手动进行故障转移。这可能是因为需要故障转移到灾难恢复站点的灾难，或者是为了主动维护。虽然可以故障转移到异步副本并存在数据丢失的可能性，但良好的做法是首先将数据库置于安全状态。因为如果数据库参与了可用性组，您就不能将其置于
    `read only` 或 `single_user` 模式，所以安全状态通常包括禁用登录账户，然后在故障转移前切换到同步提交模式。


    要在整个企业中监控可用性组，您需要使用监控工具，例如 Systems Operation Center。但是，如果您需要监控少量的可用性组或对特定问题进行故障排除，请使用
    SQL Server 附带的工具之一，例如用于监控拓扑运行状况的仪表板，以及称为 AlwaysOn Health Trace 的扩展事件会话。


    您还应考虑其他维护任务。这些任务包括将数据库和日志文件放置在何处（因为它们必须在每个副本上具有相同的位置），以及从可用性组中移除数据库以便将其置于 `single_user`
    模式（例如）。更改为 `single_user` 模式可能是由于需要以修复模式运行 `DBCC CHECKDB` 并暂停数据移动。暂停数据移动允许您在高使用期间消除性能开销，但要注意，它也会导致主副本上的事务日志增长，并且在数据移动恢复且数据库再次同步之前，没有选项可以截断它。'
  raw: '### Note


    In addition to the synchronization states, a replica also has one of the following
    operational states: `PENDING_FAILOVER`, `PENDING`, `ONLINE`, `OFFLINE`, `FAILED`,
    `FAILED_NO_QUORUM`, and `NULL` (when the replica is disconnected). The operational
    state of a replica can be viewed using the `sys.dm_hadr_availability_replica_states`
    DMV.


    At the top right of the report, there are links to the failover wizard, which
    we discussed earlier in this chapter; the AlwaysOn Health events, which we discussed
    in the next section; and also, a link to view cluster quorum information. The
    Cluster Quorum Information screen, which is invoked by this link, is displayed
    in Figure [14-16](#333037_2_En_14_Chapter.xhtml#Fig16). You can also drill through
    each replica in the Availability Replicas window to see replica-specific details.


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig16_HTML.jpg](images/333037_2_En_14_Chapter/333037_2_En_14_Fig16_HTML.jpg)


    Figure 14-16


    The Cluster Quorum Information screen


    #### AlwaysOn Health Trace


    The AlwaysOn Health Trace is an Extended Event session, which is created when
    you create your first availability group. It can be located in SQL Server Management
    Studio, under Extended Events ➤ Sessions, and via its context menu, you can view
    live data that is being captured, or you can enter the session’s properties to
    change the configuration of the events that are captured.


    Drilling through the session exposes the session’s package, and from the context
    menu of the package, you can view previously captured events. Figure [14-17](#333037_2_En_14_Chapter.xhtml#Fig17)
    shows that the latest event captured, which was Database 5 (which, in our case,
    is `Chapter14App2Customers`), was waiting for the log to be hardened on the synchronous
    replica. Extended Events is discussed in detail in Chapter [19](#333037_2_En_19_Chapter.xhtml).


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig17_HTML.jpg](images/333037_2_En_14_Chapter/333037_2_En_14_Fig17_HTML.jpg)


    Figure 14-17


    The target data


    ### Other Administrative Considerations


    When databases are made highly available with AlwaysOn Availability Groups, several
    limitations are imposed. One of the most restrictive of these is that databases
    cannot be placed in `single_user` mode or be made `read only`. This can have an
    impact when you need to safe-state your application for maintenance. This is why,
    in the Failover section of this chapter, we disabled the logins that have users
    mapped to the databases. If you must place your database in single-user mode,
    then you must first remove it from the availability group.


    A database can be removed from an availability group by running the command in
    Listing [14-21](#333037_2_En_14_Chapter.xhtml#PC21). This command removes the
    `Chapter14App2Customers` database from the availability group.


    ```

    ALTER DATABASE Chapter14App2Customers SET HADR OFF ;

    Listing 14-21

    Removing a Database from an Availability Group

    ```


    There may also be occasions in which you want a database to remain in an availability
    group, but you wish to suspend data movement to other replicas. This is usually
    because the availability group is in Synchronous Commit mode and you have a period
    of high utilization, where you need a performance improvement. You can suspend
    the data movement to a database by using the command in Listing [14-22](#333037_2_En_14_Chapter.xhtml#PC22),
    which suspends data movement for the `Chapter14App1Sales` database and then resumes
    it.


    ### Caution


    If you suspend data movement, the transaction log on the primary replica continues
    to grow, and you are not able to truncate it until data movement resumes and the
    databases are synchronized.


    ```

    ALTER DATABASE Chapter14App2Customers SET HADR SUSPEND ;

    GO

    ALTER DATABASE Chapter14App2Customers SET HADR RESUME ;

    GO

    Listing 14-22

    Suspending Data Movement

    ```


    Another important consideration is the placement of database and log files. These
    files must be in the same location on each replica. This means that if you use
    named instances, it is a hard technical requirement that you change the default
    file locations for data and logs, because the default location includes the name
    of the instance. This is assuming, of course, that you do not use the same instance
    name on each node, which would defy many of the benefits of having a named instance.


    ## Summary


    AlwaysOn Availability Groups can be implemented with up to eight secondary replicas,
    combining both Synchronous and Asynchronous Commit modes. When implementing high
    availability with availability groups, you always use Synchronous Commit mode,
    because Asynchronous Commit mode does not support automatic failover. When implementing
    Synchronous Commit mode, however, you must be aware of the associated performance
    penalty caused by committing the transaction on the secondary replica before it
    is committed on the primary replica. For disaster recovery, you will normally
    choose to implement Asynchronous Commit mode.


    The availability group can be created via the New Availability Group wizard, through
    dialog boxes, through T-SQL, or even through PowerShell. If you create an availability
    group using dialog boxes, then some aspects, such as the endpoint and associated
    permissions, must be scripted using T-SQL or PowerShell.


    If you implement disaster recovery with availability groups, then you need to
    configure a multi-subnet cluster. This does not mean that you must have SAN replication
    between the sites, however, since availability groups do not rely on shared storage.
    What you do need to do is add additional IP addresses for the administrative cluster
    access point and also for the Availability Group Listener. You also need to pay
    attention to the properties of the cluster that support client reconnection to
    ensure that clients do not experience a high number of timeouts.


    Failover to a synchronous replica in the event of a failure of the primary replica
    is automatic. There are instances, however, in which you will also need to fail
    over manually. This could be because of a disaster that requires failover to the
    DR site, or it could be for proactive maintenance. Although it is possible to
    fail over to an asynchronous replica with the possibility of data loss, it is
    good practice to place the databases in a safe state first. Because you cannot
    place a database in `read only` or `single_user` mode, if it is participating
    in an availability group, safe-stating usually consists of disabling the logins
    and then switching to Synchronous Commit mode before failover.


    To monitor availability groups throughout the enterprise, you need to use a monitoring
    tool, such as Systems Operation Center. If you need to monitor a small number
    of availability groups or troubleshoot a specific issue, however, use one of the
    tools included with SQL Server, such as a dashboard for monitoring the health
    of the topology, and an Extended Event session, called the AlwaysOn Health Trace.


    You should also consider other maintenance tasks. These include where to place
    database and log files, as they must have the same location on each replica, and
    removing a database from an availability group so that you can place it in `single_user`
    mode, for example. Changing to `single_user` mode may be due to a requirement
    to run `DBCC CHECKDB` in a repair mode and suspend data movement. Suspending data
    movement allows you to remove the performance overhead during a period of high
    utilization, but be warned, it also causes the transaction log on the primary
    replica to grow, without an option to truncate it, until data movement has resumed
    and the databases are once again synchronized.'
