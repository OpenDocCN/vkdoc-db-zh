- fmt: '## Editions and License Models


    Choosing the edition of SQL Server 2019 to support your data-tier application
    may sound like a simple task, but in fact, you should spend time thinking about
    this decision and consulting with both business stakeholders and other IT departments
    to bring their opinions into this decision. The first thing to consider is that
    there are five editions of SQL Server. These editions not only have different
    levels of functionality, but they also have different license considerations.
    Additionally, from an operational support perspective, you may find that the `TCO`
    (total cost of ownership) of the estate increases if you allow data-tier applications
    to be hosted on versions of SQL Server that are not deployed strategically within
    your estate.


    A full discussion of feature and licensing considerations is beyond the scope
    of this book; however, Table 1-1 details the available licensing models for each
    edition of SQL Server, whereas Table 1-2 highlights the primary purpose of each
    edition.


    Table 1-1: `SQL Server Edition License Models`


    | Edition | License Model(s) | Comments |

    | --- | --- | --- |

    | Enterprise | Per-core | – |

    | Standard | • Per-core• `Server + CAL` | – |

    | Web | Third-party hosting only | – |

    | Developer | Free for noncommercial use | Not for use in a production environment
    |

    | Express | Free edition of SQL Server | Limited functionality and small capacity
    limits, such as a 10GB database size, a 1GB limit on RAM, and a CPU limit of one
    socket, or four cores |


    A `CAL` is a client access license, where a client can refer to either a user
    or a device. You can choose whether to purchase user or device licenses based
    on which will be cheapest for your environment.


    For example, if your organization had a SQL Server that was supporting a call
    center that had 100 computers, and it ran 24/7 with three 8-hour shifts, then
    you would have 100 devices and 300 users, so device `CAL`s would be the most sensible
    option for you to choose.


    On the flip side, if your organization had a SQL Server that was supporting a
    sales team of 25 who all connected to the sales application not only via their
    laptops but also via their iPads, then you would have 25 users, but 50 devices,
    and therefore choosing user `CAL`s would be the more sensible option.


    To summarize, if you have more users than devices, then you should choose device
    `CAL`s. If you have more devices than users, on the other hand, you should choose
    user `CAL`s. Microsoft also supplies a tool called Microsoft Assessment and Planning
    (`MAP`) Toolkit for SQL Server, which will help you plan your licensing requirements.
    `MAP` Toolkit can be downloaded from `www.microsoft.com/en-gb/download/details.aspx?id=7826`.


    Table 1-2: `SQL Server Edition Overview`


    | Edition | Edition Overview |

    | --- | --- |

    | Enterprise | Fully featured edition of SQL Server for Enterprise systems and
    critical apps |

    | Standard | Core database and `BI` functionality, aimed at departmental level
    systems and noncritical apps |

    | Web | Is only available for service providers hosting public web sites that
    use SQL Server |

    | Developer | A fully featured edition, to the level of Enterprise edition, but
    meant for development use and not allowed for use on production systems |

    | Express | A free, entry-level version of SQL Server geared toward small applications
    with local data requirements |


    The version(s) of SQL Server that you choose to support in your Enterprise applications
    will vary depending on the project’s requirements, your organization’s requirements,
    and the underlying infrastructure. For example, if your organization hosts its
    entire SQL Server estate within a private cloud, then you are likely to only support
    the Enterprise edition, since you will be licensing the underlying infrastructure.


    Alternatively, if your organization is predominantly utilizing physical boxes,
    then you most likely need to support a mix of SQL Server versions, such as Enterprise
    and Standard editions. This will give projects the flexibility to reduce their
    costs if they only require a subset of features and are not expecting high volume
    workloads, and hence can live with the caps that Standard edition imposes on `RAM`
    and `CPU`.


    The next thing you should consider before choosing which edition you will use
    is whether or not you will use a `Windows Server Core` installation of SQL Server.
    Installations on `Server Core` can help improve security by reducing the attack
    surface of your server. `Server Core` is a minimal installation, so there is less
    surface to attack and fewer security vulnerabilities. It can also improve performance,
    because you do not have the overhead of the `GUI` and because many resource-intensive
    applications cannot be installed. If you do decide to use `Server Core`, then
    it is also important to understand the impacts of doing so.


    From the SQL Server perspective, the following features cannot be used:


    -   Reporting Services

    -   `SQL Server Data Tools (SSDT)`

    -   Client Tools Backward Compatibility

    -   Client Tools SDK

    -   `SQL Server Books Online`

    -   Distributed Replay Controller

    -   `Master Data Services (MDS)`

    -   `Data Quality Services (DQS)`


    The following features can be used, but only from a remote server:


    -   Management Tools

    -   Distributed Replay Client


    From the broader perspective of operational support, you will need to ensure that
    all of your operational teams (DBAs, Windows Operations, etc.) are in a position
    to support `Server Core`. For example, if your DBA team relies heavily on a third-party
    graphical tool for interrogating execution plans, does this need to be installed
    locally on the server? Is there an alternative tool that would meet their needs?
    From a Windows operations perspective, does the team have the tools in place for
    remotely monitoring and managing the server? Are there any third-party tools they
    rely on that would need to be replaced?


    You should also consider if your operations team has the skill set to manage systems
    using predominantly command-line processes. If it does not, then you should consider
    what training or upskilling may be required.


    ## Hardware Considerations


    When you are planning the hardware requirements for your server, ideally, you
    will implement a full capacity planning exercise so you can estimate the hardware
    requirements of the application(s) that the server will support. When conducting
    this exercise, make sure you take your company’s standard hardware lifecycle into
    account, rather than planning just for today. Depending on your organization,
    this could be between 1 and 5 years, but will generally be 3 years.


    This is important in order to avoid undersizing or oversizing your server. Project
    teams will generally want to oversize their servers in order to ensure performance.
    Not only is this approach costly when scaled through the enterprise, but in some
    environments, it can actually have a detrimental effect on performance. An example
    of this would be a private cloud infrastructure with shared resources. In this
    scenario, oversizing servers can have a negative impact on the entire environment,
    including the oversized server itself.'
