    it was initially created and also the size that it is expanded by each time it
    grows. If the log file is created at or grows in increments of less than 64MB,
    then 4 VLFs will be added to the file. If it is created at or grows in increments
    between 64MB and 1GB, then 8 VLFs will be added to the file. If it is created
    at or grows by more than 1GB, then 16 VLFs will be added.


    The transaction log is a fairly low-maintenance component of the SQL Server stack.
    There will be times, however, when maintenance scenarios occur; these are discussed
    in the following sections.


    ### Recovery Model


    The *recovery model* is a database-level property that controls how transactions
    are logged and, therefore, it has an impact on transaction log maintenance. The
    three recovery models within SQL Server are described in Table [6-1](#333037_2_En_6_Chapter.xhtml#Tab1).


    Table 6-1


    Recovery Models


    | Recovery Model | Description |

    | --- | --- |

    | `SIMPLE` | In the `SIMPLE` recovery model, it is not possible to back up the
    transaction log. Transactions are minimally logged and the log will automatically
    be truncated. In `SIMPLE` recovery model, the transaction log only exists to allow
    transactions to be rolled back. It is incompatible with several HADR (high availability/disaster
    recovery) technologies, such as AlwaysOn Availability Groups, Log Shipping, and
    database mirroring. This model is appropriate for reporting databases where updates
    only occur on an infrequent basis. This is because point-in-time recovery is not
    possible. The recovery point objective will be the time of the last `FULL` or
    `DIFFERENTIAL` backup. |

    | `FULL` | In the `FULL` recovery model, transaction log backups must be taken.
    The log will only be truncated during the log backup process. Transactions are
    fully logged and this means that point-in-time recovery is possible. It also means
    that you must have a complete chain of log file backups to restore a database
    to the most recent point. |

    | `BULK LOGGED` | The `BULK_LOGGED` recovery model is meant to be used on a temporary
    basis when you are using the `FULL` recovery model but need to perform a large
    `BULK INSERT` operation. When you switch to this mode, `BULK INSERT` operations
    are minimally logged. You then switch back to `FULL` recovery model when the import
    is complete. In this recovery model, you can restore to the end of any backup,
    but not to a specific point in time between backups. |


    ### Note


    Recovery models will be discussed further in Chapter [12](#333037_2_En_12_Chapter.xhtml).


    ### Log File Count


    Several times I have witnessed a misconception that having multiple log files
    can improve the performance of a database. This is a fallacy. The idea is driven
    by the belief that if you have multiple log files on separate drives, you can
    distribute IO and relieve the log as a bottleneck.


    The truth is that the transaction log is sequential, and even if you add multiple
    log files, SQL Server treats them as if they are a single file. This means that
    the second file will only be used after the first file becomes full. As a result,
    no performance benefit can be gained from this practice. In fact, the only possible
    reason that you would ever need more than one transaction log file is if you ran
    out of space on the LUN that was hosting the log, and for some reason it cannot
    be moved elsewhere and the volume can’t be expanded. In my professional career,
    although I have encountered multiple log files on several occasions, I have never
    encountered a valid reason for having them.


    ### Shrinking the Log


    Shrinking your log file should never be part of your standard maintenance routines.
    There is no benefit to adopting this policy. There are some occasions, however,
    when you may have to shrink a log file, and, thankfully, it does not come with
    the same hazards as shrinking a data file.


    The usual reason for needing to shrink your log file is when an atypical activity
    occurs in your database, such as an initial data population or a one-time ETL
    load. If this is the case, and your log file expands past the point where space
    thresholds on your volume are being breached, then reducing the size of the file
    is likely to be the best course of action, as opposed to expanding the volume
    that is hosting it. In this eventuality, however, you should carefully analyze
    the situation to ensure that it really is an atypical event. If it seems like
    it could occur again, then you should consider increasing capacity to deal with
    it.


    To shrink a log file, you can use the Shrink File dialog box. Here, select Log
    in the File Type drop-down box. This causes the Filegroup drop-down box to be
    grayed out and, assuming you only have one log file, it will automatically be
    selected in the File Name drop-down. If you have multiple transaction log files,
    you will be able to select the appropriate file from the drop-down list. As with
    shrinking a data file, choosing the Release Unused Space option will cause `TRUNCATEONLY`
    to be used.


    Alternatively, you can use the script in Listing [6-16](#333037_2_En_6_Chapter.xhtml#PC16)
    to achieve the same results. It is important to note, however, that shrinking
    the log file may not actually result in any space being reclaimed. This happens
    if the last VLF in the file cannot be reused. A full list of reasons why it may
    not be possible to reuse a VLF is included later in this chapter.


    ```

    USE [Chapter6]

    GO

    DBCC SHRINKFILE (N''Chapter6_log'', 0, TRUNCATEONLY);

    GO

    Listing 6-16

    Shrinking a Log with TRUNCATEONLY

    ```


    ### Tip


    Because shrinking the transaction log always involves reclaiming space from the
    end of the log, until the first active VLF is reached, it is sensible to take
    a log backup and place the database in single user mode before performing this
    activity.'
  trans: '## 日志维护


    事务日志是 SQL Server 武器库中的一项关键工具；它不仅提供恢复功能，还支持许多功能，例如 AlwaysOn 可用性组、事务复制、变更数据捕获等等。


    在内部，日志文件被划分为一系列 VLF（虚拟日志文件）。当文件中的最后一个 VLF 变满时，SQL Server 会尝试回绕到日志开头的第一个 VLF。如果此
    VLF 尚未被截断且无法被重用，那么 SQL Server 将尝试增长日志文件。如果由于磁盘空间不足或达到最大大小设置而无法扩展文件，则将引发 9002 错误，并且事务将被回滚。图
    6-11 说明了日志文件的结构及其循环使用方式。


    ![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig11_HTML.jpg](img/333037_2_En_6_Fig11_HTML.jpg)


    图 6-11：日志文件结构


    日志文件中 VLF 的数量由日志最初创建时的大小以及每次增长的大小决定。如果日志文件是以小于 64MB 的增量创建或增长的，则会向文件添加 4 个 VLF。如果它是以介于
    64MB 和 1GB 之间的增量创建或增长的，则会添加 8 个 VLF。如果它是以超过 1GB 的大小创建或增长的，则会添加 16 个 VLF。


    事务日志是 SQL Server 组件中一个维护需求相当低的组件。然而，有时也会出现需要维护的场景；这些将在以下章节中讨论。


    ### 恢复模型


    `恢复模型` 是一个数据库级别的属性，它控制着事务的记录方式，因此会影响事务日志维护。SQL Server 中的三种恢复模型描述于表 6-1 中。


    表 6-1：恢复模型


    | 恢复模型 | 描述 |

    | --- | --- |

    | `SIMPLE` | 在 `SIMPLE` 恢复模型中，无法备份事务日志。事务以最小方式记录，日志将自动截断。在 `SIMPLE` 恢复模型中，事务日志的存在仅是为了允许回滚事务。它与一些
    HADR（高可用性/灾难恢复）技术不兼容，例如 AlwaysOn 可用性组、日志传送和数据库镜像。此模型适用于仅偶尔发生更新的报表数据库。这是因为不可能进行时间点恢复。恢复点目标将是上一次
    `FULL` 或 `DIFFERENTIAL` 备份的时间。 |

    | `FULL` | 在 `FULL` 恢复模型中，必须进行事务日志备份。日志仅在日志备份过程中被截断。事务被完整记录，这意味着可以进行时间点恢复。这也意味着您必须拥有完整的日志文件备份链才能将数据库恢复到最近的时间点。
    |

    | `BULK LOGGED` | `BULK_LOGGED` 恢复模型旨在临时使用，当您正在使用 `FULL` 恢复模型但需要执行大型 `BULK INSERT`
    操作时。当您切换到此模式时，`BULK INSERT` 操作以最小方式记录。然后，在导入完成后，您可以切换回 `FULL` 恢复模型。在此恢复模型中，您可以恢复到任何备份的结尾，但无法恢复到备份之间的特定时间点。
    |


    ### 注意


    恢复模型将在第 12 章中进一步讨论。


    ### 日志文件数量


    我曾多次目睹一种误解，认为拥有多个日志文件可以提高数据库的性能。这是一种谬论。这种想法源于这样一种信念：如果您在不同的驱动器上有多个日志文件，就可以分散 I/O
    并缓解日志瓶颈。


    事实是，事务日志是顺序的，即使您添加了多个日志文件，SQL Server 也会将它们视为单个文件。这意味着只有在第一个文件变满后才会使用第二个文件。因此，这种做法无法获得任何性能收益。实际上，您唯一可能需要一个以上事务日志文件的情况是：承载日志的
    LUN 空间已用完，并且由于某种原因无法将其移动到其他地方，也无法扩展卷。在我的职业生涯中，虽然我多次遇到多个日志文件，但我从未遇到过拥有它们的合理理由。


    ### 收缩日志


    收缩日志文件绝不应该是您标准维护例程的一部分。采用此策略没有任何益处。然而，在某些情况下，您可能不得不收缩日志文件，而且值得庆幸的是，它不像收缩数据文件那样带来同样的风险。


    通常需要收缩日志文件的原因是数据库中发生了非典型的活动，例如初始数据填充或一次性 ETL 加载。如果是这种情况，并且您的日志文件已扩展到超出卷上空间阈值的程度，那么减少文件大小可能是最佳行动方案，而不是扩展承载它的卷。然而，在这种情况下，您应该仔细分析情况，以确保这确实是一个非典型事件。如果它似乎可能再次发生，那么您应该考虑增加容量来处理它。


    要收缩日志文件，您可以使用“收缩文件”对话框。在此处，从“文件类型”下拉框中选择“日志”。这会导致“文件组”下拉框变灰，并且假设您只有一个日志文件，它将在“文件名”下拉框中被自动选中。如果您有多个事务日志文件，您将能够从下拉列表中选择相应的文件。与收缩数据文件类似，选择“释放未使用的空间”选项将导致使用
    `TRUNCATEONLY`。


    或者，您可以使用清单 6-16 中的脚本来实现相同的结果。然而，重要的是要注意，收缩日志文件实际上可能不会回收任何空间。如果文件中的最后一个 VLF 无法被重用，就会发生这种情况。本章后面将包含可能无法重用
    VLF 的完整原因列表。


    ```

    USE [Chapter6]

    GO

    DBCC SHRINKFILE (N''Chapter6_log'', 0, TRUNCATEONLY);

    GO

    清单 6-16：使用 TRUNCATEONLY 收缩日志

    ```


    ### 提示


    因为收缩事务日志总是涉及从日志末尾回收空间，直到遇到第一个活动的 VLF，所以在执行此活动之前，进行日志备份并将数据库置于单用户模式是明智的。'
- fmt: '# Log Fragmentation


    When the log is truncated because of a backup in the FULL Recovery model or a
    checkpoint operation in the SIMPLE Recovery model, what actually happens is that
    any VLFs that can be reused are truncated. Reasons why a VLF may not be able to
    be reused include VLFs containing log records associated with active transactions,
    or transactions that have not yet been sent to other databases in Replication
    or AlwaysOn topologies. In a similar fashion, if you shrink the log file, then
    VLFs will be removed from the end of the file until the first active VLF is reached.


    There is no hard and fast rule for the optimum number of VLFs inside a log file,
    but I try to maintain approximately two VLFs per GB for large transaction logs,
    in the tens-of-gigabytes range. For smaller transaction logs, it is likely the
    ratio will be higher. If you have too many VLFs, then you may witness performance
    degradation of any activity that uses the transaction log. On the flip side, having
    too few VLFs can also pose a problem. In such a case where each VLF is GBs in
    size, when each VLF is truncated, it will take a substantial amount of time to
    clear, and you could witness a system slowdown while this takes place. Therefore,
    for large log files, it is recommended that you grow your transaction log in 8GB
    chunks to maintain the optimum number and size of VLFs.


    To demonstrate this phenomenon, we will create a new database called `Chapter6LogFragmentation`,
    which has a single table on the primary filegroup, called Inserts, and then populate
    it with 1 million rows using the script in Listing 6-17. This will cause a large
    number of VLFs to be created, which will have a negative impact on performance.


    ```sql

    --Create Chapter6LogFragmentation database

    CREATE DATABASE [Chapter6LogFragmentation]

    CONTAINMENT = NONE

    ON  PRIMARY

    ( NAME = N''Chapter6LogFragmentation'', FILENAME = N''F:\MSSQL\MSSQL15.PROSQLADMIN\MSSQL\DATA\Chapter6LogFragmentation.mdf'',
    SIZE = 5120KB, FILEGROWTH = 1024KB )

    LOG ON

    ( NAME = N''Chapter6LogFragmentation_log'', FILENAME = N''E:\MSSQL\MSSQL15.PROSQLADMIN\MSSQL\DATA\Chapter6LogFragmentation_log.ldf'',
    SIZE = 1024KB, FILEGROWTH = 10%);

    GO

    USE Chapter6LogFragmentation

    GO

    --Create Inserts table

    CREATE TABLE dbo.Inserts

    (ID        INT        IDENTITY,

    DummyText    NVARCHAR(50)

    );

    --Create a Numbers table that will be used to assit the population of the table

    DECLARE @Numbers TABLE

    (

    Number    INT

    )

    --Populate the Numbers table

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number +1

    FROM CTE

    WHERE Number <= 99

    )

    INSERT INTO @Numbers

    SELECT *

    FROM CTE;

    --Populate the example table with 100 rows of dummy text

    INSERT INTO dbo.Inserts

    SELECT ''DummyText''

    FROM @Numbers a

    CROSS JOIN @Numbers b

    CROSS JOIN @Numbers c;

    ```

    Listing 6-17

    Creating the Chapter6LogFragmentation Database


    You can review the size of your transaction log and see how many VLFs are in your
    log by running the script in Listing 6-18.


    ```sql

    --Create a variable to store the results of DBCC LOGINFO

    DECLARE @DBCCLogInfo TABLE

    (

    RecoveryUnitID    TINYINT

    ,FieldID        TINYINT

    ,FileSize        BIGINT

    ,StartOffset    BIGINT

    ,FseqNo        INT

    ,Status        TINYINT

    ,Parity        TINYINT

    ,CreateLSN    NUMERIC

    );

    --Populate the table variable with the results of DBCC LOGINFO

    INSERT INTO @DBCCLogInfo

    EXEC(''DBCC LOGINFO'');

    --Display the size of the log file, combined with the number of VLFs and a VLFs
    to GB ratio

    SELECT

    name

    ,[Size in MBs]

    ,[Number of VLFs]

    ,[Number of VLFs] / ([Size in MBs] / 1024) ''VLFs per GB''

    FROM

    (

    SELECT

    name

    ,size * 1.0 / 128 ''Size in MBs''

    ,(SELECT COUNT(*)

    FROM @DBCCLogInfo) ''Number of VLFs''

    FROM sys.database_files

    WHERE type = 1

    ) a;

    ```

    Listing 6-18

    Size of Log and Number of VLFs


    The results of running this script inside the `Chapter6LogFragmentation` database
    are displayed in Figure 6-12. You can see that there are 61 VLFs, which is an
    excessive amount given the log size is 345MB.


    ![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig12_HTML.jpg](images/333037_2_En_6_Chapter/333037_2_En_6_Fig12_HTML.jpg)


    Figure 6-12

    VLFs per GB


    ## Caution


    `DBCC LOGINFO` is undocumented, so it will not be supported by Microsoft. For
    example, in SQL Server 2012, Microsoft added a column to the output named `RecoverUnitID`,
    but they have never made its description public.


    The meaning of each column returned by `DBCC LOGINFO` is described in Table 6-2.


    Table 6-2

    DBCC LOGINFO Columns


    | Column | Description |

    | --- | --- |

    | `FileID` | The ID of the physical file. Assuming that you only have one file,
    this should always return the same value. |

    | `FileSize` | The size of the VLF in bytes. |

    | `StartOffset` | How many bytes there are from the beginning of the physical
    file until the start of the VLF. |

    | `FSeqNo` | Defines the current usage order of the VLFs. The highest `FSeqNo`
    indicates the VLF that is currently being written to. |

    | `Status` | A status of 2 means that the VLF is currently active. A status of
    0 means that it is not and can therefore be reused. |

    | `Parity` | Parity starts at 0. When a VLF is initially used, it is set to 64.
    Subsequently, it can be set to either 64 or 128. Each time a VLF is reused, this
    flag is switched to the opposite value. |

    | `CreateLSN` | `CreateLSN` indicates the log sequence number that was used to
    create the VLF. |


    With an understanding of the columns, we can identify several interesting facts
    about the results shown earlier. First, because the first four VLFs have a `CreateLSN`
    value of 0, we know that these were the VLFs that were initially created when
    the log file itself was generated. The rest have been created by the log expanding,
    rather than cycling. We can also see that the final ten VLFs in the results have
    not yet been used, because they have a Parity of 0. The VLF with an `FSeqNo` of
    83 is the VLF where records are currently being written, since it has the highest
    `FSeqNo`.


    Most interestingly, for the purpose of this example, we can see that the first
    51 VLFs are marked as active, meaning that they cannot be reused. This means that
    if we attempt to shrink our log file, only ten VLFs can be removed and the file
    would only shrink by the sum of their file sizes.


    The reason that our log was growing and could not be cycled was because all the
    space was used during the course of a single transaction and, of course, our log
    has not been backed up. The query in Listing 6-19 will enable you to determine
    if there are any other reasons why your transaction log is growing. The query
    interrogates the `sys.databases` catalog view and returns the last reason that
    a VLF could not be reused.


    ```sql

    SELECT log_reuse_wait_desc

    FROM sys.databases

    WHERE name = ''Chapter6LogFragmentation'';

    ```

    Listing 6-19

    sys.databases


    The log reuse waits that are still used in SQL Server 2019 and that are not for
    Microsoft’s internal use only are described in Table 6-3. It is important to understand
    that the log reuse wait applies to the point when the log attempts to cycle and
    may still not be valid at the point you query `sys.databases`. For example, if
    there was an active transaction at the point that the last log cycle was attempted,
    it will be reflected in `sys.databases`, even though you may not currently have
    any active transactions at the point when you query `sys.databases`.


    Table 6-3

    Log Reuse Waits'
