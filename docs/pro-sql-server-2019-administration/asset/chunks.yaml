  trans: '### 行压缩


    在未压缩的页面中，如前所述，SQL Server 会先存储固定长度列，然后是可变长度列。唯一可以是可变长度的列是具有可变长度数据类型的列，例如 `VARCHAR`
    或 `VARBINARY`。当为表实现行压缩时，SQL Server 也会为其他数据类型使用最小的存储空间。例如，如果有一个整数列，其在第 1 行包含一个
    `NULL` 值，第 2 行值为 `50`，第 3 行值为 `40,000`，那么在第 1 行，该列根本不占用任何空间；在第 2 行它使用 1 个字节，因为系统会将其存储为
    `TINYINT`；在第 3 行它使用 4 个字节，因为系统需要将其存储为 `INT`。这与未压缩的表每行（包括第 1 行）都使用 4 个字节形成对比。


    此外，SQL Server 还会压缩 Unicode 列，使得可以存储为单字节的字符只使用单字节，而不是像在未压缩页面中那样使用 2 个字节。为了实现这些优化，SQL
    Server 必须使用不同的页面格式，如图 7-11 所示。


    ![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig11_HTML.jpg](img/333037_2_En_7_Fig11_HTML.jpg)

    *图 7-11：采用行压缩的页面结构*


    ### 注意


    短列是指 8 字节或更少的列。


    在图 7-11 中，行元数据的第一区域包含详细信息，例如是否存在有关该行的版本信息以及是否存在任何长数据列。列描述符包含短列的数量和每个长列的长度。元数据的第二区域包含详细信息，例如版本信息和堆的转发行指针。


    ### 页压缩


    当实现页压缩时，会首先实现行压缩。页压缩本身实际上由两种不同的压缩形式组成。第一种是*前缀压缩*，第二种是*字典压缩*。这些压缩类型在以下部分概述。


    #### 前缀压缩


    前缀压缩的工作原理是为页面内跨行的列建立一个公共前缀。一旦确定了最佳前缀值，SQL Server 会选择包含完整前缀的最长值作为锚点行，并将该列中的所有其他值存储为锚点行的差分，而不是存储值本身。例如，表
    7-2 详细说明了存储在列中的值，并随后描述了 SQL Server 将如何使用前缀压缩存储这些值。值 `Postfreeze` 被选为锚点值，因为它是最长的、包含已识别的完整前缀
    `Post` 的值。`<>` 中的数字是使用了多少前缀字符的标记。


    *表 7-2：前缀压缩差分*


    | 列 A 值 | 列 A 存储 | 列 B 值 | 列 B 存储 |

    | --- | --- | --- | --- |

    | `Postcode` | `<4>code` | `Teethings (锚点)` | — |

    | `Postfreeze (锚点)` | — | `Teacher` | `<2>acher` |

    | `Postpones` | `<4>pones` | `Teenager` | `<3>nager` |

    | `Postilion` | `<4>ilion` | `Teeth` | `<5>` |

    | `Imposters` | `<0>Imposters` | `Tent` | `<2>nt` |

    | [`Poacher`](http://www.morewords.com/word/poacher/) | `<2>acher` | `Rent` |
    `<0>Rent` |


    #### 字典压缩


    字典压缩是在所有列都使用前缀压缩之后执行的。它查看页面中的所有列，并找到匹配的值。匹配是使用值的二进制表示执行的，这使得该过程与数据类型无关。当它找到重复值时，会将它们添加到页面顶部的特殊字典中，并在行中简单地存储一个指向该值在字典中位置的指针。表
    7-3 扩展了上表，以便您对此有一个概览。


    *表 7-3：字典压缩指针*


    | 列 A 值 | 列 A 存储 | 列 B 值 | 列 B 存储 |

    | --- | --- | --- | --- |

    | `Postcode` | `<4>code` | `Teethings (锚点)` | — |

    | `Postfreeze (锚点)` | — | `Teacher` | `[指针 1]` |

    | `Postpones` | `<4>pones` | `Teenager` | `<3>nager` |

    | `Postilion` | `<4>ilion` | `Teeth` | `<5>` |

    | `Imposters` | `<0>Imposters` | `Tent` | `<2>nt` |

    | [`Poacher`](http://www.morewords.com/word/poacher/) | `[指针 1]` | `Rent` | `<0>Rent`
    |


    在这里，您可以看到前一表中出现在两列中的值 `<2>acher` 已被指向存储该值的字典的指针所取代。


    #### 页压缩结构


    为了便于页压缩，在页面头部之后立即插入一个特殊的行，该行包含有关锚点记录和字典的信息。此行称为压缩信息记录，如图 7-12 所示。


    ![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig12_HTML.jpg](img/333037_2_En_7_Fig12_HTML.jpg)

    *图 7-12：采用页压缩的页面结构*


    压缩信息记录的行元数据指定了记录是否包含锚点记录和字典。更改计数记录了对页面进行了多少次更改，这可能会影响锚点和字典的有用性。当表重建时，SQL Server
    可以使用此信息来确定是否应重建页面。偏移量包含字典的开始和结束位置（从页面开头算起）。锚点记录包含每个列的前缀值，字典包含已为其创建指针的重复值。


    ### 列存储压缩


    列存储索引始终是自动压缩的。这意味着如果您在表上创建聚集列存储索引，您的表也将被压缩，并且这不能与行压缩或页压缩结合使用。您有两种类型的列存储压缩可用：`COLUMNSTORE`（在
    SQL Server 2012 中引入）和 `COLUMNSTORE_ARCHIVE`（在 SQL Server 2014 中引入）。


    您可以将 `COLUMNSTORE` 视为列存储索引的标准压缩类型，并且应仅对不常访问的数据使用 `COLUMNSTORE_ARCHIVE` 算法。这是因为就性能而言，此压缩算法打破了
    SQL Server 数据压缩的规则。如果实现此算法，请预期会有非常高的压缩比，但也要准备好为此付出查询性能的代价。


    ### 实现行压缩和页压缩


    行压缩和页压缩的规划与实现是一个相当直接的过程，将在以下部分讨论。'
- fmt: '#### Selecting the Compression Level


    As you probably realized from the earlier descriptions of row and page compression,
    page compression offers a higher compression ratio than row compression, which
    means better IO performance. However, this is at the expense of CPU cycles, both
    when the table is being compressed and again when it is being accessed. Therefore,
    before you start compressing your tables, make sure you understand how much each
    of these compression types will reduce the size of your table by so that you can
    assess how much IO efficiency you can achieve.


    You can accomplish this by using a system stored procedure called `sp_estimate_data_compression_savings`.
    This procedure estimates the amount of space that you could save by implementing
    compression. It accepts the parameters listed in Table 7-4.


    Table 7-4: `sp_estimate_data_compression_savings` Parameters


    | Parameter | Comments |

    | --- | --- |

    | `@schema_name` | The name of the schema, which contains the table that you want
    to run the procedure against. |

    | `@object_name` | The name of the table that you want to run the procedure against.
    |

    | `@index_ID` | Pass in `NULL` for all indexes. For a heap, the index ID is always
    `0` and a clustered index always has an ID of `1`. |

    | `@partition_number` | Pass in `NULL` for all partitions. |

    | `@data_compression` | Pass in `ROW`, `PAGE`, `COLUMNSTORE`, `COLUMNSTORE_ARCHIVE`,
    or `NONE` if you want to assess the impact of removing compression from a table
    that is already compressed. |


    The two executions of the `sp_estimate_data_compression_savings` stored procedure
    in Listing 7-11 assess the impact of row and page compression, respectively, on
    all partitions of our `ExistingOrders` table.


    ```

    EXEC sp_estimate_data_compression_savings @schema_name = ''dbo'', @object_name
    = ''ExistingOrders'',

    @index_id = NULL, @partition_number = NULL, @data_compression =''ROW'' ;

    EXEC sp_estimate_data_compression_savings @schema_name = ''dbo'', @object_name
    = ''ExistingOrders'',

    @index_id = NULL, @partition_number = NULL, @data_compression =''PAGE'' ;

    ```

    Listing 7-11: `Sp_estimate_data_compression_savings`


    The results in Figure 7-13 show that for the two partitions that are currently
    in use, page compression will have no additional benefit over row compression.
    Therefore, it is pointless to add the extra CPU overhead associated with page
    compression. This is because row compression is always implemented on every row
    of every page in the table. Page compression, on the other hand, is assessed on
    a page-by-page basis, and only pages that will benefit from being compressed are
    rebuilt. Because of the random nature of the largely numeric data that we inserted
    into this table, SQL Server has determined that the pages of our table will not
    benefit from page compression.


    ![Results of sp_estimate_data_compression_savings](images/333037_2_En_7_Chapter/333037_2_En_7_Fig13_HTML.jpg)

    Figure 7-13: Results of `sp_estimate_data_compression_savings`


    **Tip**

    SQL Server 2019 introduces support for Columnstore indexes into `sp_estimate_data_compression_savings`.
    The compression types `COLUMNSTORE` and `COLUMNSTORE_ARCHIVE` can now be used
    as both a source object and a compression type. Columnstore compression is discussed
    in the “Columnstore Compression” section of this chapter.


    #### Compressing Tables and Partitions


    We determined that row compression reduces the size of our table, but we can’t
    gain any further benefits by implementing page compression. Therefore, we can
    compress our entire table using the command in Listing 7-12.


    ```

    ALTER TABLE ExistingOrders

    REBUILD WITH (DATA_COMPRESSION = ROW) ;

    ```

    Listing 7-12: Implementing Row Compression on the Entire Table


    If we look more closely at the results, however, we can see that, in fact, only
    partition 1 benefits from row compression. Partition 2 remains the same size.
    Therefore, it is not worth the overhead to compress partition 2. Running the `ALTER
    TABLE` statement in Listing 7-13 will rebuild only partition 1. It will then remove
    compression from the entire table by rebuilding it with `DATA_COMPRESSION = NONE`.


    ```

    --Compress partition 1 with ROW compression

    ALTER TABLE ExistingOrders

    REBUILD PARTITION = 1 WITH (DATA_COMPRESSION = ROW) ;

    GO

    --Remove compression from the whole table

    ALTER TABLE ExistingOrders

    REBUILD WITH (DATA_COMPRESSION = NONE) ;

    ```

    Listing 7-13: Implementing Row Compression for Specific Partitions


    #### Data Compression Wizard


    The Data Compression Wizard can be reached via the context menu of a table by
    drilling down through **Storage ➤ Manage Compression**. It provides a graphical
    user interface (GUI) for managing compression. The main page of the wizard is
    illustrated in Figure 7-14. On this screen, you can utilize the **Use Same Compression
    Type For All Partitions** option to implement one type of compression uniformly
    across the table. Alternatively, you can specify different compression types for
    each individual partition. The **Calculate** button runs the `sp_estimate_data_compression_savings`
    stored procedure and displays the current and estimated results for each partition.


    ![The Data Compression Wizard](images/333037_2_En_7_Chapter/333037_2_En_7_Fig14_HTML.jpg)

    Figure 7-14: The Data Compression Wizard


    On the final page of the wizard, you can choose to run the process immediately,
    script the action, or schedule it to run using SQL Server Agent.


    #### Maintaining Compression on Heaps


    When new pages are added to a heap (a table without a clustered index), they are
    not automatically compressed with page compression. This means that rebuilding
    a compressed table should be part of your standard maintenance routines when it
    does not have a clustered index. To rebuild the compression on a table, you should
    remove compression and then reimplement it.


    **Tip**

    New heap pages will be compressed if they are inserted using `INSERT INTO...WITH
    (TABLOCK)` or if they are inserted as part of a bulk insert where optimizations
    have been enabled.


    #### Maintaining Compressed Partitions


    In order to use the `SWITCH` operation with partitions, both partitions must have
    the same level of compression selected. If you use `MERGE`, then the compression
    level of the destination partition is used. When you use `SPLIT`, the new partition
    inherits its compression level from the original partition.


    Just like with a nonpartitioned table, if you drop the clustered index of a table,
    then the heap inherits the compression level of the clustered index. However,
    if you drop the clustered index as part of an exercise to modify the partition
    scheme, then compression is removed from the table.'
