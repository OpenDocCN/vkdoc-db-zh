    On the Master Server Login Credentials page of the wizard, we are asked if a New
    Login should be created if required. This is the login that the TSXs use to connect
    to the MSX and download the jobs that they should run. If the instances of SQL
    Server Agent share the same service account as the MSX, then this is not required.


    Now we see a summary of the actions that will be performed on the Completion page
    of the wizard before we are presented with a progress window, which informs us
    of the success or failure of each task.'
  trans: '### 注意


    本节中的演示使用了三个实例：`SQLSERVER\MASTERSERVER`（我们将其配置为 MSX），以及 `SQLSERVER\TARGETSERVER1`
    和 `SQLSERVER\TARGETSERVER2`（我们将它们配置为 TSX）。


    ```

    USE Master

    GO

    EXEC xp_regwrite

    @rootkey = N''HKEY_LOCAL_MACHINE''

    ,@key = N''Software\Microsoft\Microsoft SQL Server\MasterServer\SQL Server Agent''

    ,@value_name = N''AllowDownloadedJobsToMatchProxyName''

    ,@type = N''REG_DWORD''

    ,@value = 1 ;

    EXEC xp_regwrite

    @rootkey=''HKEY_LOCAL_MACHINE'',

    @key=''SOFTWARE\Microsoft\Microsoft SQL Server\MSSQL15.TARGETSERVER1\SQLServerAgent'',

    @value_name=''MsxEncryptChannelOptions'',

    @type=''REG_DWORD'',

    @value=0 ;

    EXEC xp_regwrite

    @rootkey=''HKEY_LOCAL_MACHINE'',

    @key=''SOFTWARE\Microsoft\Microsoft SQL Server\MSSQL15.TARGETSERVER2\SQLServerAgent'',

    @value_name=''MsxEncryptChannelOptions'',

    @type=''REG_DWORD'',

    @value=0 ;

    GO

    清单 22-9

    更新注册表

    ```


    ### 提示


    由于我们所有的实例都位于同一台服务器上，因此可以从这三个实例中的任何一个运行此脚本。如果你的实例位于不同的服务器上，那么第一条命令将在 MSX 上运行，而其他两条命令应针对其对应的
    TSX 运行。你还需要注意，运行数据库引擎的服务帐户需要拥有注册表项的权限，脚本才能成功执行。


    我们现在使用清单 22-10 中的 `SQLCMD` 脚本在 `TARGETSERVER1` 和 `TARGETSERVER2` 上创建 PowerShell
    代理帐户。该脚本必须在 SQLCMD 模式下运行才能生效，因为它需要连接到多个实例。


    ```

    :connect sqlserver\targetserver1

    CREATE CREDENTIAL WinUserCredential

    WITH IDENTITY = N''PROSQLADMIN\WinUser'', SECRET = N''Pa$$w0rd'' ;

    GO

    EXEC msdb.dbo.sp_add_proxy

    @proxy_name=N''PowerShellProxy'',

    @credential_name=N''WinUserCredential'',

    @enabled=1,

    @description=N''用于检查浏览器服务状态的代理'' ;

    GO

    EXEC msdb.dbo.sp_grant_proxy_to_subsystem

    @proxy_name=N''PowerShellProxy'',

    @subsystem_id=12 ;

    GO

    :connect sqlserver\targetserver2

    CREATE CREDENTIAL WinUserCredential

    WITH IDENTITY = N''PROSQLADMIN\WinUser'', SECRET = N''Pa$$w0rd'' ;

    GO

    EXEC msdb.dbo.sp_add_proxy

    @proxy_name=N''PowerShellProxy'',

    @credential_name=N''WinUserCredential'',

    @enabled=1,

    @description=N''用于检查浏览器服务状态的代理'' ;

    GO

    EXEC msdb.dbo.sp_grant_proxy_to_subsystem

    @proxy_name=N''PowerShellProxy'',

    @subsystem_id=12 ;

    GO

    清单 22-10

    创建代理

    ```


    我们现在可以开始将 `SQLSERVER\MASTERSERVER` 实例配置为 MSX。要通过 SQL Server Management Studio
    完成此操作，我们右键单击对象资源管理器中的 SQL Server Agent 上下文菜单，选择“多服务器管理” ➤ “将其设为 MSX”，从而启动“主服务器向导”。


    通过向导的欢迎页面后，我们会看到“主服务器操作员”页面（见图 22-29）。在此页面上，我们输入一个操作员的详细信息，该操作员将接收多服务器作业状态的通知。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig29_HTML.jpg](img/333037_2_En_22_Fig29_HTML.jpg)


    图 22-29：主服务器操作员页面


    在向导的“目标服务器”页面（如图 22-30 所示）中，我们从“已注册的服务器”窗格中的已注册服务器列表中选择目标服务器，并使用箭头按钮将它们移动到“目标服务器”窗格中。在“目标服务器”窗格中高亮显示一个服务器后，我们可以使用“连接”按钮来确保连通性。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig30_HTML.jpg](img/333037_2_En_22_Fig30_HTML.jpg)


    图 22-30：目标服务器页面


    ### 提示


    我们所有的实例都出现在“已注册的服务器”窗格的“本地服务器组”节点中，因为它们都在同一台服务器上。如果你希望作为目标服务器的实例不是本地的，可以通过“已注册的服务器”窗口注册服务器，该窗口可以通过
    SQL Server Management Studio 的“视图”菜单访问。


    在向导的“主服务器登录凭据”页面上，系统会询问我们是否需要时创建新的登录名。这是 TSX 用来连接到 MSX 并下载它们应运行的作业的登录名。如果 SQL
    Server Agent 的实例与 MSX 共享相同的服务帐户，则不需要此操作。


    现在，在向导的“完成”页面上，我们会看到将执行操作的摘要，然后会显示一个进度窗口，告知我们每项任务是成功还是失败。'
- fmt: '# Creating Master Jobs


    You can create a master job in the same way as a local job, with the exception
    of specifying the target servers on which it should run. However, a limitation
    of using multiserver jobs is that T-SQL job steps cannot run under the context
    of another user; they must run under the context of the service account. Therefore,
    before we convert our `BackupAndCheckBrowser` job to be a multiserver job, we
    must edit it to remove the `Run As Account`. We can do this by using the `sp_update_jobstep`
    procedure, as demonstrated in Listing [22-11](#333037_2_En_22_Chapter.xhtml#PC11).


    ```

    USE MSDB

    GO

    EXEC msdb.dbo.sp_update_jobstep

    @job_name=N''BackupAndCheckBrowser'',

    @step_id=1 ,

    @database_user_name=N" ;

    GO

    Listing 22-11

    Updating Job Step

    ```


    Another limitation of multiserver jobs is that the only allowable operator is
    the `MSXOperator`, who receives all notifications for multiserver jobs. Therefore,
    we also need to change the `DBATeam` operator to the `MSXOperator` operator before
    continuing. We can use the `sp_update_job` procedure to achieve this with the
    script in Listing [22-12](#333037_2_En_22_Chapter.xhtml#PC12).


    ```

    USE msdb

    GO

    EXEC msdb.dbo.sp_update_job

    @job_name=N''BackupAndCheckBrowser'',

    @notify_email_operator_name=N''MSXOperator'' ;

    GO

    Listing 22-12

    Updating a Job

    ```


    We can now proceed to convert our `BackupAndCheckBrowser` job to a multiserver
    job from Management Studio by opening the Job Properties dialog box and navigating
    to the Targets page. As illustrated in Figure [22-31](#333037_2_En_22_Chapter.xhtml#Fig31),
    we can use this page to change the job to a multiserver job and specify the target
    servers that it should run against from a list of target servers that have been
    enlisted using the `sp_msx_enlist` stored procedure. After closing the properties
    dialog box, the job runs against the `TargetServer1` and `TargetServer2` instances
    instead of the `MASTERSERVER` instance.


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig31_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig31_HTML.jpg)


    Figure 22-31: Convert to multiserver job


    To achieve the same results via T-SQL, we use the `sp_delete_jobserver` system
    stored procedure to stop the job from running against the MSX and the `sp_add_jobserver`
    system stored procedure to configure the job to run against the TSXs. Both of
    these procedures accept the parameters detailed in Table [22-3](#333037_2_En_22_Chapter.xhtml#Tab3).


    Table 22-3: `sp_delete_jobserver` and `sp_add_jobserver` Parameters


    | Parameter | Description |

    | --- | --- |

    | `@job_id` | The GUID of the job that you are converting to a multiserver job.
    If `NULL`, then the `@job_name` parameter must be specified. |

    | `@job_name` | The name of the job that you are converting to a multiserver job.
    If `NULL`, then the `@job_id` parameter must be specified. |

    | `@server_name` | The server\instance name that you want the job to run against.
    |


    In our scenario, we can use the script in Listing [22-13](#333037_2_En_22_Chapter.xhtml#PC13)
    to convert the job.


    ```

    EXEC msdb.dbo.sp_delete_jobserver

    @job_name=N''BackupAndCheckBrowser'',

    @server_name = N''SQLSERVER\MASTERSERVER'' ;

    GO

    EXEC msdb.dbo.sp_add_jobserver

    @job_name=N''BackupAndCheckBrowser'',

    @server_name = N''SQLSERVER\TARGETSERVER1'' ;

    GO

    EXEC msdb.dbo.sp_add_jobserver

    @job_name=N''BackupAndCheckBrowser'',

    @server_name = N''SQLSERVER\TARGETSERVER2'' ;

    GO

    Listing 22-13

    Converting to a Multiserver Job

    ```


    # Managing Target Servers


    When you configure your MSX, make sure you consider various maintenance activities
    against the TSXs. These include polling the TSXs, synchronizing time across the
    servers, running ad hoc jobs, and defecting (delisting) TSXs.


    We can achieve these tasks in the Target Server Status dialog box, which we can
    invoke from the context menu of SQL Server Agent on the MSX by selecting Multi
    Server Administration ➤ Manage Target Servers. The Target Server Status tab of
    this dialog box is shown in Figure [22-32](#333037_2_En_22_Chapter.xhtml#Fig32).


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig32_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig32_HTML.jpg)


    Figure 22-32: The Target Server Status tab


    On this tab, we can use the Force Poll button to make the Target Servers Poll
    the MSX. When a TSX polls the MSX, we are forcing it to download the latest copy
    of the jobs that it is configured to run. This is useful if you have updated the
    master job.


    The Force Defection button causes the highlighted TSX to be delisted from the
    MSX. After it is delisted, the selected TSX no longer polls for or runs multiserver
    jobs.


    The Post Instructions button invokes the Post Download Instructions dialog box,
    where you are able to send one of the following instructions to TSXs:


    *   Defect

    *   Set Polling Interval

    *   Synchronize Clocks

    *   Start Job


    To synchronize the time on all servers, you would choose the Synchronize Clocks
    instruction type and ensure that All Target Servers is selected in the Recipients
    section, as illustrated in Figure [22-33](#333037_2_En_22_Chapter.xhtml#Fig33).
    The clocks are then synchronized when the targets next poll the master.


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig33_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig33_HTML.jpg)


    Figure 22-33: Synchronize Clocks


    In another scenario, there may be a time when we wish to perform an ad hoc run
    of our `BackupAndCheckBrowser` job against `TARGETSERVER1`. We can do this by
    selecting Start Job as the Instruction Type and then choosing our job from the
    Job Name drop-down list. We then use the Recipients section of the screen to select
    `TARGETSERVER1`. This is illustrated in Figure [22-34](#333037_2_En_22_Chapter.xhtml#Fig34).


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig34_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig34_HTML.jpg)


    Figure 22-34: Start a job on TARGETSERVER1


    On the Download Instructions tab of the Target Server Status dialog box, which
    is illustrated in Figure [22-35](#333037_2_En_22_Chapter.xhtml#Fig35), we see
    a list of instructions that have been sent to targets. We can use the drop-down
    lists at the top of the screen to filter the instructions by job or by target
    server.


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig35_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig35_HTML.jpg)


    Figure 22-35: The Download Instructions tab'
