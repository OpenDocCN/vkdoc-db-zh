    ![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig5_HTML.jpg](images/333037_2_En_10_Chapter/333037_2_En_10_Fig5_HTML.jpg)


    Figure 10-5


    Entity relationship diagram


    A good schema design for this example would involve three schemas, which are split
    by business responsibility—`Sales`, `Procurement`, and `Accounts`. Table [10-3](#333037_2_En_10_Chapter.xhtml#Tab3)
    demonstrates how these tables can be split and permissions can then be assigned
    to the tables via database roles.


    Table 10-3


    Schema Permissions


    | Schema | Table | Database Role | Permissions |

    | --- | --- | --- | --- |

    | `Sales` | `OrderHeader``OrderDetails``Customers``Addresses` | `Sales` | `SELECT`,
    `INSERT`, `UPDATE` |

    | `Accounts` | `SELECT` |

    | `Procurement` | `Products``Vendors` | `Purchasing` | `SELECT`, `INSERT`, `UPDATE`
    |

    | `Sales` | `SELECT` |

    |   |   | `Accounts` | `SELECT` |

    | `Accounts` | `Invoices``CustAccountHistory``VendAccountHistory` | `Accounts`
    | `SELECT`, `INSERT`, `UPDATE` |


    The command in Listing [10-9](#333037_2_En_10_Chapter.xhtml#PC9) creates a schema
    called `CH10` and then grants the user Danielle `SELECT` permissions on the `dbo`
    schema. This will implicitly give her `SELECT` permissions on all tables within
    this schema, including new tables, which are yet to be created.


    ```

    CREATE SCHEMA CH10 ;

    GO

    GRANT SELECT ON SCHEMA::CH10 TO Danielle ;

    Listing 10-9

    Granting Permissions on a Schema

    ```


    To change a table’s schema post creation, use the `ALTER SCHEMA TRANSFER` command,
    as demonstrated in Listing [10-10](#333037_2_En_10_Chapter.xhtml#PC10). This script
    creates a table without specifying a schema. This means that it is automatically
    placed in the `dbo` schema. It is then moved to the `CH10` schema.


    ```

    CREATE TABLE TransferTest

    (

    ID int

    ) ;

    GO

    ALTER SCHEMA CH10 TRANSFER dbo.TransferTest ;

    GO

    Listing 10-10

    Transferring an Object Between Schemas

    ```


    ### Creating and Managing Contained Users


    We have already seen how to create a database user, which maps to a login at the
    instance level. It is also possible to create a database user, which does not
    map to a server principal, however. This is to support a technology called *contained
    databases*.


    Contained databases allow you to reduce a database’s dependency on the instance
    by isolating aspects such as security. This makes the database easier to move
    between instances and helps support technologies such as AlwaysOn Availability
    Groups, which are discussed in Chapter [14](#333037_2_En_14_Chapter.xhtml).


    Currently, SQL Server supports the database containment levels of `NONE`, which
    is the default, and `PARTIAL`. `PARTIAL` indicates that the database supports
    contained database users and that metadata is stored inside the database using
    the same collation. However, the database can still interact with no-contained
    features, such as users mapped to logins at the instance level. There is currently
    no option for `FULL` containment, since there is no way to stop the database from
    interacting with objects outside its boundaries.


    In order to use contained databases, you must enable them at both the instance
    and the database level. You can enable them at both levels by using the Server
    Properties and Database Properties dialog boxes in SQL Server Management Studio.
    Alternatively, you can enable them at the instance level by using `sp_configure`
    and at the database level by using the `ALTER DATABASE` statement. The script
    in Listing [10-11](#333037_2_En_10_Chapter.xhtml#PC11) demonstrates how to enable
    contained databases for the instance and the `Chapter10` database using T-SQL.
    To use the `ALTER DATABASE` command, you need to disconnect users from the database.


    ```

    --Enable contained databases at the instance level

    EXEC sp_configure ''show advanced options'', 1 ;

    GO

    RECONFIGURE ;

    GO

    EXEC sp_configure ''contained database authentication'', ''1'' ;

    GO

    RECONFIGURE WITH OVERRIDE ;

    GO

    --Set Chapter10 database to use partial containment

    USE Master

    GO

    ALTER DATABASE [Chapter10] SET CONTAINMENT = PARTIAL WITH NO_WAIT ;

    GO

    Listing 10-11

    Enabling Contained Databases

    ```


    Once you have enabled contained databases, you can create database users that
    are not associated with a login at the instance level. You can create a user from
    a Windows user or group by using the syntax demonstrated in Listing [10-12](#333037_2_En_10_Chapter.xhtml#PC12).
    This script creates a database user that maps to the `Chapter10Users` domain group.
    It specifies that `dbo` is the default schema.


    ```

    USE Chapter10

    GO

    CREATE USER [PROSQLADMIN\Chapter10Users] WITH DEFAULT_SCHEMA=dbo ;

    GO

    Listing 10-12

    Creating a Database User from a Windows Login

    ```


    Alternatively, to create a database user who is not mapped to a login at the instance
    level but who still relies on second tier authentication, you can use the syntax
    in Listing [10-13](#333037_2_En_10_Chapter.xhtml#PC13). This script creates a
    user in the `Chapter10` database called `ContainedUser`.


    ```

    USE Chapter10

    GO

    CREATE USER ContainedUser WITH PASSWORD=N''Pa$$w0rd'', DEFAULT_SCHEMA=dbo ;

    GO

    Listing 10-13

    Creating a Database User with Second Tier Authentication

    ```'
  trans: '

    ### 架构（Schemas）


    架构（Schemas）为数据库对象提供了一个逻辑命名空间，同时将对象与其所有者抽象分离。数据库中的每个对象都必须归某个数据库用户所有。在非常早期的 SQL
    Server 版本中，这种所有权是直接的。换句话说，一个名为 Bob 的用户可能直接拥有十个独立的表。然而，从 SQL Server 2005 开始，这个模型发生了变化：现在
    Bob 拥有一个架构，而这十个表则成为该架构的一部分。


    这种抽象简化了更改数据库对象所有权的过程；在这个例子中，要将十个表的所有者从 Bob 更改为 Colin，你只需在一处（架构）更改所有权，而不必在全部十个表上逐一更改。


    定义清晰的架构也有助于简化权限管理，因为你可以为主体分配对架构的权限，而不是对架构内各个对象的权限。例如，假设你有五个与销售相关的表——`OrderHeaders`、`OrderDetails`、`StockList`、`PriceList`
    和 `Customers`——将它们全部放入一个名为 `Sales` 的架构中，就可以将 `SELECT`、`UPDATE` 和 `INSERT` 权限应用在
    `Sales` 架构上，从而授予 `SalesUsers` 数据库角色。然而，将权限分配给整个架构并不仅影响表。例如，授予对架构的 `SELECT` 权限也会授予对该架构内所有视图的
    `SELECT` 权限。授予对架构的 `EXECUTE` 权限则会授予对该架构内所有存储过程和函数的 `EXECUTE` 权限。


    因此，设计良好的架构会按业务规则而非技术连接来分组表。请思考图 10-5 中的实体关系图。


    ![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig5_HTML.jpg](img/333037_2_En_10_Fig5_HTML.jpg)


    图 10-5


    实体关系图


    对于此示例，一个良好的架构设计会涉及三个按业务职责划分的架构：`Sales`（销售）、`Procurement`（采购）和 `Accounts`（财务）。表
    10-3 演示了如何划分这些表，以及如何通过数据库角色为这些表分配权限。


    表 10-3


    架构权限


    | 架构 | 表 | 数据库角色 | 权限 |

    | --- | --- | --- | --- |

    | `Sales` | `OrderHeader` `OrderDetails` `Customers` `Addresses` | `Sales` | `SELECT`,
    `INSERT`, `UPDATE` |

    | | | `Accounts` | `SELECT` |

    | `Procurement` | `Products` `Vendors` | `Purchasing` | `SELECT`, `INSERT`, `UPDATE`
    |

    | | | `Sales` | `SELECT` |

    | | | `Accounts` | `SELECT` |

    | `Accounts` | `Invoices` `CustAccountHistory` `VendAccountHistory` | `Accounts`
    | `SELECT`, `INSERT`, `UPDATE` |


    清单 10-9 中的命令创建了一个名为 `CH10` 的架构，然后授予用户 Danielle 对 `dbo` 架构的 `SELECT` 权限。这将隐式地授予她对所有在此架构内的表（包括尚未创建的新表）的
    `SELECT` 权限。


    ```sql

    CREATE SCHEMA CH10 ;

    GO

    GRANT SELECT ON SCHEMA::CH10 TO Danielle ;

    ```


    清单 10-9


    授予对架构的权限


    若要在表创建后更改其所属架构，请使用 `ALTER SCHEMA TRANSFER` 命令，如清单 10-10 所示。此脚本在创建表时未指定架构，这意味着它会自动放入
    `dbo` 架构，然后被移动到 `CH10` 架构。


    ```sql

    CREATE TABLE TransferTest

    (

    ID int

    ) ;

    GO

    ALTER SCHEMA CH10 TRANSFER dbo.TransferTest ;

    GO

    ```


    清单 10-10


    在架构之间传输对象


    ### 创建和管理包含式用户（Contained Users）


    我们已经了解了如何创建一个数据库用户，该用户映射到实例级别的登录名。然而，也可以创建一个不映射到服务器主体的数据库用户。这是为了支持一种称为 `包含式数据库（contained
    databases）` 的技术。


    `包含式数据库` 允许你通过隔离安全性等方面，减少数据库对实例的依赖。这使得数据库更容易在实例之间迁移，并有助于支持如第 14 章讨论的 AlwaysOn
    可用性组等技术。


    目前，SQL Server 支持 `NONE`（默认）和 `PARTIAL` 两种数据库包含级别。`PARTIAL` 表示数据库支持包含式数据库用户，并且元数据使用相同的排序规则存储在数据库内部。但是，该数据库仍可以与非包含式功能（例如，映射到实例级别登录名的用户）进行交互。目前没有
    `FULL`（完全）包含的选项，因为无法阻止数据库与其边界外的对象进行交互。


    要使用包含式数据库，你必须在实例和数据库两个级别启用它们。你可以通过 SQL Server Management Studio 中的“服务器属性”和“数据库属性”对话框在两个级别启用它们。或者，你可以使用
    `sp_configure` 在实例级别启用，并使用 `ALTER DATABASE` 语句在数据库级别启用。清单 10-11 中的脚本演示了如何使用 T-SQL
    为实例和 `Chapter10` 数据库启用包含式数据库。要使用 `ALTER DATABASE` 命令，你需要将用户从数据库中断开连接。


    ```sql

    --在实例级别启用包含式数据库

    EXEC sp_configure ''show advanced options'', 1 ;

    GO

    RECONFIGURE ;

    GO

    EXEC sp_configure ''contained database authentication'', ''1'' ;

    GO

    RECONFIGURE WITH OVERRIDE ;

    GO

    --将 Chapter10 数据库设置为使用部分包含

    USE Master

    GO

    ALTER DATABASE [Chapter10] SET CONTAINMENT = PARTIAL WITH NO_WAIT ;

    GO

    ```


    清单 10-11


    启用包含式数据库


    一旦启用了包含式数据库，你就可以创建不与实例级别登录名关联的数据库用户。你可以使用清单 10-12 中演示的语法，从 Windows 用户或组创建用户。此脚本创建了一个映射到
    `Chapter10Users` 域组的数据库用户，并指定 `dbo` 为默认架构。


    ```sql

    USE Chapter10

    GO

    CREATE USER [PROSQLADMIN\Chapter10Users] WITH DEFAULT_SCHEMA=dbo ;

    GO

    ```


    清单 10-12


    从 Windows 登录名创建数据库用户


    或者，要创建一个不映射到实例级别登录名但仍然依赖第二层身份验证的数据库用户，可以使用清单 10-13 中的语法。此脚本在 `Chapter10` 数据库中创建了一个名为
    `ContainedUser` 的用户。


    ```sql

    USE Chapter10

    GO

    CREATE USER ContainedUser WITH PASSWORD=N''Pa$$w0rd'', DEFAULT_SCHEMA=dbo ;

    GO

    ```


    清单 10-13


    使用第二层身份验证创建数据库用户

    '
- fmt: '## Contained Database Users


    When you use contained database users, you need to take a number of additional
    security considerations into account. First, some applications may require that
    a user have permissions to multiple databases. If the user is mapped to a Windows
    user or group, then this is straightforward because the SID that is being authenticated
    is that of the Windows object. If the database user is using second tier authentication,
    however, then it is possible to duplicate the SID of the user from the first database.
    For example, we can create a user called `ContainedUser` in the `Chapter10` database
    that will use second tier authentication. We can then duplicate this user in the
    `Chapter10Twain` database by specifying the SID, as demonstrated in Listing 10-14.
    Before duplicating the user, the script first creates the `Chapter10Twain` database
    and configures it to be contained.


    ```sql

    USE Master

    GO

    CREATE DATABASE Chapter10Twain ;

    GO

    ALTER DATABASE Chapter10Twain SET CONTAINMENT = PARTIAL WITH NO_WAIT ;

    GO

    USE Chapter10Twain

    GO

    CREATE USER ContainedUser WITH PASSWORD = ''Pa$$w0rd'',

    SID = 0x0105000000000009030000009134B23303A7184590E152AE6A1197DF ;

    ```

    Listing 10-14

    Creating a Duplicate User


    We can determine the SID by querying the `sys.database_principals` catalog view
    from the `Chapter10` database, as demonstrated in Listing 10-15.


    ```sql

    SELECT sid

    FROM sys.database_principals

    WHERE name = ''ContainedUser'' ;

    ```

    Listing 10-15

    Finding the User’s SID


    Once we have duplicated the user in the second database, we also need to turn
    on the `TRUSTWORTHY` property of the first database in order to allow cross-database
    queries to take place. We can turn on `TRUSTWORTHY` in the `Chapter10` database
    by using the command in Listing 10-16.


    ```sql

    ALTER DATABASE Chapter10 SET TRUSTWORTHY ON ;

    ```

    Listing 10-16

    Turning On TRUSTWORTHY


    Even if we do not create a duplicate user, it is still possible for a contained
    user to access other databases via the Guest account of another database if the
    Guest account is enabled. This is a technical requirement so that the contained
    user can access TempDB.


    DBAs should also be careful when they attach a contained database to an instance
    to ensure that they are not inadvertently granting permissions to users who are
    not meant to have access. This can happen when you are moving a database from
    a pre-production environment to a production instance and UAT (user acceptance
    testing) or development users were not removed from the database before the attach.


    ## Implementing Object-Level Security


    There are two variations of syntax for granting a database user permissions to
    an object. The first uses the `OBJECT` phrase, whereas the second does not. For
    example, the two commands in Listing 10-17 are functionally equivalent.


    ```sql

    USE Chapter10

    GO

    --Grant with OBJECT notation

    GRANT SELECT ON OBJECT::dbo.SensitiveData TO [PROSQLADMIN\Chapter10Users] ;

    GO

    --Grant without OBJECT notation

    GRANT SELECT ON dbo.SensitiveData TO [PROSQLADMIN\Chapter10Users] ;

    GO

    ```

    Listing 10-17

    Assigning Permissions


    Many permissions can be granted and not all permissions are relevant to each object.
    For example, the `SELECT` permission can be granted on a table or a view, but
    not to a stored procedure. The `EXECUTE` permission, on the other hand, can be
    granted on a stored procedure, but not to a table or view.


    When granting permissions on a table, it is possible to grant permissions to specific
    columns, as opposed to the table itself. The script in Listing 10-18 gives the
    user `ContainedUser` `SELECT` permissions on the `SensitiveData` table in the
    `Chapter10` database. Instead of being able to read the entire table, however,
    permissions are only granted on the `SensitiveText` column.


    ```sql

    GRANT SELECT ON dbo.SensitiveData ([SensitiveText]) TO ContainedUser ;

    ```

    Listing 10-18

    Granting Column-Level Permissions


    ## Server Audit


    SQL Server Audit provides DBAs with the ability to capture granular audits against
    instance-level and database-level activity and save this activity to a file, the
    Windows Security log, or the Windows Application log. The location where the audit
    data is saved is known as the *target*. The SQL Server Audit object sits at the
    instance level and defines the properties of the audit and the target. You can
    have multiple server audits in each instance. This is useful if you have to audit
    many events in a busy environment, since you can distribute the IO by using a
    file as the target and placing each target file on a separate volume.


    Choosing the correct target is important from a security perspective. If you choose
    the Windows Application log as a target, then any Windows user who is authenticated
    to the server is able to access it. The Security log is a lot more secure than
    the Application log but can also be more complex to configure for SQL Server Audit.
    The service account that is running the SQL Server service requires the Generate
    Security Audits user rights assignment within the server’s local security policy.
    Application-generated auditing also needs to be enabled for success and failure
    within the audit policy. The other consideration for the target is size. If you
    decide to use the Application log or Security log, then it is important that you
    consider, and potentially increase, the size of these logs before you begin using
    them for your audit. Also, work with your Windows administration team to decide
    on how the log will be cycled when full and if you will be achieving the log by
    backing it up to tape.


    The SQL Server Audit can then be associated with one or more server audit specifications
    and database audit specifications. These specifications define the activity that
    will be audited at the instance level and the database level, respectively. It
    is helpful to have multiple server or database audit specifications if you are
    auditing many actions, because you can categorize them to make management easier
    while still associating them with the same server audit. Each database within
    the instance needs its own database audit specification if you plan to audit activity
    in multiple databases.'
