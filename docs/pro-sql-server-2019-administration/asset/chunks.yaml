  trans: '## 管理统计信息


    除了由 SQL Server 自动创建和更新之外，您还可以使用 `CREATE STATISTICS` 语句手动创建和更新统计信息。如果希望创建筛选统计信息，请在语句末尾添加一个
    `WHERE` 子句。清单 8-23 中的脚本首先在 `CustomersDisk` 表的 `FirstName` 和 `LastName` 列上创建一个多列统计信息。然后，它在
    `OrdersDisk` 表的 `NetAmount` 列上创建一个筛选统计信息，该统计信息仅基于 `OrderDate` 大于 2019 年 1 月 1
    日的行构建。


    ```

    USE Chapter8

    GO

    --在 FirstName 和 LastName 上创建多列统计信息

    CREATE STATISTICS Stat_FirstName_LastName ON dbo.CustomersDisk(FirstName, LastName)
    ;

    GO

    --在 NetAmount 上创建筛选统计信息

    CREATE STATISTICS Stat_NetAmount_Filter_OrderDate ON dbo.OrdersDisk(NetAmount)

    WHERE OrderDate > ''2019-01-01'' ;

    GO

    清单 8-23

    创建统计信息

    ```


    创建统计信息时，可以使用表 8-4 中详述的选项。


    表 8-4 创建统计信息的选项


    | 选项 | 描述 |

    | --- | --- |

    | `FULLSCAN` | 在表中 100% 的行样本上创建统计信息对象。此选项创建最准确的统计信息，但生成所需时间最长。 |

    | `SAMPLE` | 指定用于构建统计信息对象的行数或行百分比。样本越大，统计信息越准确，但生成时间也越长。指定 0 会创建统计信息对象但不填充它。 |

    | `NORECOMPUTE` | 将统计信息对象排除在使用 `AUTO_UPDATE_STATISTICS` 自动更新的范围之外。 |

    | `INCREMENTAL` | 覆盖数据库级别的增量统计信息设置。 |


    可以使用 `UPDATE STATISTICS` 语句来更新单个统计信息，或单个表上的所有统计信息。清单 8-24 中的脚本首先更新我们在 `OrdersDisk`
    表上创建的 `Stat_NetAmount_Filter_OrderDate` 统计信息对象，然后更新 `CustomersDisk` 表上的所有统计信息。


    ```

    --更新单个统计信息对象

    UPDATE STATISTICS dbo.OrdersDisk Stat_NetAmount_Filter_OrderDate ;

    GO

    --更新表上的所有统计信息

    UPDATE STATISTICS dbo.CustomersDisk ;

    GO

    清单 8-24

    更新统计信息

    ```


    使用 `UPDATE STATISTICS` 时，除了表 8-4 中创建统计信息的选项（这些选项在更新统计信息时同样有效）之外，表 8-5 中详述的选项也可用。


    表 8-5 更新统计信息的选项


    | 选项 | 描述 |

    | --- | --- |

    | `RESAMPLE` | 使用最近的采样率来更新统计信息。 |

    | `ON PARTITIONS` | 为列出的分区生成统计信息，然后将它们合并以创建全局统计信息。 |

    | `ALL \| COLUMNS \| INDEX` | 指定是仅更新列、仅更新索引，还是两者都更新。默认值为 `ALL`。 |


    您还可以使用系统存储过程 `sp_updatestats` 来更新整个数据库的统计信息。此过程会更新基于磁盘的表上的过时统计信息，以及内存优化表上的所有统计信息（无论其是否过时）。清单
    8-25 演示了使用此系统存储过程来更新 `Chapter8` 数据库中的统计信息。传入 `RESAMPLE` 参数会导致使用最近的采样率。省略此参数则使用默认采样率。


    ```

    EXEC sp_updatestats ''RESAMPLE'' ;

    清单 8-25

    Sp_updatestats

    ```


    ### 注


    更新统计信息会导致使用这些统计信息的查询在下次运行时重新编译。唯一例外的情况是，所引用的表和索引只有一个可能的执行计划。例如，`SELECT * FROM
    MyTable` 总是执行聚集索引扫描（假设该表具有聚集索引）。


    SQL Server 2019 引入了额外的元数据信息，以帮助诊断因查询等待同步统计信息更新完成而引发的问题。首先，添加了一个新的等待类型，称为 `WAIT_ON_SYNC_STATISTICS_REFRESH`。此等待类型表示查询在等待同步统计信息更新完成所花费的时间。其次，在
    `sys.dm_exec_requests` DMV 中添加了一个新的命令类型，称为 `SELECT (STATMAN)`。此命令类型指示一条 `SELECT`
    语句当前正在等待同步统计信息更新完成，然后才能继续执行。'
- fmt: '## Summary


    A table that does not have a clustered index is called a heap, and the data pages
    of the table are stored in no particular order. Clustered indexes build a B-tree
    structure, based on the clustered index key, and cause the data within the table
    to be ordered by that key. There can only ever be one clustered index on a table
    because the leaf level of the clustered index is the actual data pages of the
    table, and the pages can only be physically ordered in one way. The natural choice
    of key for a clustered index is the primary key of the table and, by default,
    SQL Server automatically creates a clustered index on the primary key. There are
    situations, however, when you may choose to use a different column as the clustered
    index key. This is usually when the primary key of the table is very wide, is
    updatable, or is not ever-increasing.


    Nonclustered indexes are also B-tree structures built on other columns within
    a table. The difference is that the leaf level of a nonclustered index contains
    pointers to the data pages of the table, as opposed to the data pages themselves.
    Because a nonclustered index does not order the actual data pages of a table,
    you can create multiple nonclustered indexes. These can improve query performance
    when you create them on columns that are used in `WHERE`, `JOIN`, and `GROUP BY`
    clauses. You can also include other columns at the leaf level of the B-tree of
    a nonclustered index in order to cover a query. A query is covered by a nonclustered
    index when you do not need to read the data from the underlying table. You can
    also filter a nonclustered index by adding a `WHERE` clause to the definition.
    This allows for improved query performance for queries that use a well-defined
    subset of data.


    Columnstore indexes compress data and store each column in a distinct set of pages.
    This can significantly improve the performance of data warehouse–style queries,
    which perform analysis on large data sets, since only the required columns need
    to be accessed, as opposed to the entire row. Each column is also split into segments,
    with each segment containing a header with metadata about the data, in order to
    further improve performance by allowing SQL Server to only access the relevant
    segments, in order to satisfy a query. Nonclustered Columnstore indexes are not
    updatable, meaning that you must disable or drop the index before DML statements
    can occur on the base table. You can, on the other hand, update clustered Columnstore
    indexes.


    You can create two types of index on memory-optimized tables: nonclustered indexes
    and nonclustered hash indexes. Nonclustered hash indexes are very efficient for
    point lookups, but they can be much less efficient when you must perform a range
    scan. Nonclustered indexes perform better for operations such as inequality comparisons,
    and they are also able to return the data in the sort order of the index key.


    Indexes need to be maintained over time. They become fragmented due to DML statements
    causing page splits and can be reorganized or rebuilt to reduce or remove fragmentation.
    When pages become out of sequence, this is known as external fragmentation, and
    when pages have lots of free space, this is known as internal fragmentation. SQL
    Server stores metadata regarding index fragmentation and can display this through
    a DMF called `sys.dm_db_index_physical_stats`. SQL Server also maintains information
    on indexes that it regards as missing. A missing index is an index that does not
    exist in the database but would improve query performance if it were created.
    DBAs can use this data to help them improve their indexing strategies.


    SQL Server maintains statistics about the distribution of values within a column
    or set of columns to help improve the quality of query plans. Without good-quality
    statistics, SQL Server may make the wrong choice about which index or index operator
    to use in order to satisfy a query. For example, it may choose to perform an index
    scan when an index seek would have been more appropriate. You can update statistics
    manually or automatically, but either way causes queries to be recompiled. SQL
    Server also supports incremental statistics, which allow statistics to be created
    on a per-partition basis, as opposed to globally for an entire table.


    # 9. Database Consistency


    Databases involve lots of IO. When you have a lot of IO, you inherently run the
    risk of corruption. Your primary defense against database corruption is to take
    regular backups of your database and to periodically test that these backups can
    be restored. You need to look out for database corruption, however, and SQL Server
    provides tools you can use to check the consistency of your database as well as
    to resolve consistency issues if backups are not available. This chapter will
    look at the options you have for both checking and fixing consistency issues.


    ## Consistency Errors


    Consistency errors can occur in user databases or system databases, leaving tables,
    databases, or even the entire instances in an inaccessible state. Consistency
    errors can occur for many reasons, including hardware failures and issues with
    the Database Engine. The following sections discuss the types of error that can
    occur, how to detect these errors, and what to do if your system databases become
    corrupt.


    ### Understand Consistency Errors


    Different database consistency errors can occur; these cause a query to fail or
    a session to be disconnected and a message to be written to the SQL Server error
    log. The most common errors are detailed in the following sections.


    #### `605` Error


    A `605` error can point to one of two issues, depending on the error severity.
    If the severity is level 12, then it indicates a dirty read. A dirty read is a
    transactional anomaly that occurs when you are using the Read Uncommitted isolation
    level or the `NOLOCK` query hint. It occurs when a transaction reads a row that
    never existed in the database, due to another transaction being rolled back. Transactional
    anomalies will be discussed in more detail in Chapter [18](#333037_2_En_18_Chapter.xhtml).
    To resolve this issue, either rerun the query until it succeeds or rewrite the
    query to avoid the use of the Read Uncommitted isolation level or the `NOLOCK`
    query hint.


    The `605` error may indicate a more serious issue, however, and often it indicates
    a hardware failure. If the severity level is 21, then the page may be damaged,
    or the incorrect page may be being served up from the operating system. If this
    is the case, then you need to either restore from a backup or use `DBCC CHECKDB`
    to fix the issue. (`DBCC CHECKDB` is discussed later in this chapter.) Additionally,
    you should also have the Windows administrators and storage team check for possible
    hardware or disk-level issues.


    #### `823` Error


    An `823` error occurs when SQL Server attempts to perform an IO operation and
    the Windows API that it uses to perform this action returns an error to the Database
    Engine. An `823` error is almost always associated with a hardware or driver issue.


    If an `823` error occurs, then you should use `DBCC CHECKDB` to check the consistency
    of the rest of the database and any other databases that reside on the same volume.
    You should liaise with your storage team to resolve the issue with the storage.
    Your Windows administrator should also check the Windows event log for correlated
    error messages. Finally, you should either restore the database from a backup
    or use `DBCC CHECKDB` to “fix” the issue.


    #### `824` Error


    If the call to the Windows API succeeds but there are logical consistency issues
    with the data returned, then an `824` error is generated. Just like an `823` error,
    an `824` error usually means that there is an issue with the storage subsystem.
    If an `824` error is generated, then you should follow the same course of action
    as you do when an `823` error is generated.'
  raw: '## Summary


    A table that does not have a clustered index is called a heap, and the data pages
    of the table are stored in no particular order. Clustered indexes build a B-tree
    structure, based on the clustered index key, and cause the data within the table
    to be ordered by that key. There can only ever be one clustered index on a table
    because the leaf level of the clustered index is the actual data pages of the
    table, and the pages can only be physically ordered in one way. The natural choice
    of key for a clustered index is the primary key of the table and, by default,
    SQL Server automatically creates a clustered index on the primary key. There are
    situations, however, when you may choose to use a different column as the clustered
    index key. This is usually when the primary key of the table is very wide, is
    updatable, or is not ever-increasing.


    Nonclustered indexes are also B-tree structures built on other columns within
    a table. The difference is that the leaf level of a nonclustered index contains
    pointers to the data pages of the table, as opposed to the data pages themselves.
    Because a nonclustered index does not order the actual data pages of a table,
    you can create multiple nonclustered indexes. These can improve query performance
    when you create them on columns that are used in `WHERE`, `JOIN`, and `GROUP BY`
    clauses. You can also include other columns at the leaf level of the B-tree of
    a nonclustered index in order to cover a query. A query is covered by a nonclustered
    index when you do not need to read the data from the underlying table. You can
    also filter a nonclustered index by adding a `WHERE` clause to the definition.
    This allows for improved query performance for queries that use a well-defined
    subset of data.


    Columnstore indexes compress data and store each column in a distinct set of pages.
    This can significantly improve the performance of data warehouse–style queries,
    which perform analysis on large data sets, since only the required columns need
    to be accessed, as opposed to the entire row. Each column is also split into segments,
    with each segment containing a header with metadata about the data, in order to
    further improve performance by allowing SQL Server to only access the relevant
    segments, in order to satisfy a query. Nonclustered Columnstore indexes are not
    updatable, meaning that you must disable or drop the index before DML statements
    can occur on the base table. You can, on the other hand, update clustered Columnstore
    indexes.


    You can create two types of index on memory-optimized tables: nonclustered indexes
    and nonclustered hash indexes. Nonclustered hash indexes are very efficient for
    point lookups, but they can be much less efficient when you must perform a range
    scan. Nonclustered indexes perform better for operations such as inequality comparisons,
    and they are also able to return the data in the sort order of the index key.


    Indexes need to be maintained over time. They become fragmented due to DML statements
    causing page splits and can be reorganized or rebuilt to reduce or remove fragmentation.
    When pages become out of sequence, this is known as external fragmentation, and
    when pages have lots of free space, this is known as internal fragmentation. SQL
    Server stores metadata regarding index fragmentation and can display this through
    a DMF called `sys.dm_db_index_physical_stats`. SQL Server also maintains information
    on indexes that it regards as missing. A missing index is an index that does not
    exist in the database but would improve query performance if it were created.
    DBAs can use this data to help them improve their indexing strategies.


    SQL Server maintains statistics about the distribution of values within a column
    or set of columns to help improve the quality of query plans. Without good-quality
    statistics, SQL Server may make the wrong choice about which index or index operator
    to use in order to satisfy a query. For example, it may choose to perform an index
    scan when an index seek would have been more appropriate. You can update statistics
    manually or automatically, but either way causes queries to be recompiled. SQL
    Server also supports incremental statistics, which allow statistics to be created
    on a per-partition basis, as opposed to globally for an entire table.


    # 9. Database Consistency


    Databases involve lots of IO. When you have a lot of IO, you inherently run the
    risk of corruption. Your primary defense against database corruption is to take
    regular backups of your database and to periodically test that these backups can
    be restored. You need to look out for database corruption, however, and SQL Server
    provides tools you can use to check the consistency of your database as well as
    to resolve consistency issues if backups are not available. This chapter will
    look at the options you have for both checking and fixing consistency issues.


    ## Consistency Errors


    Consistency errors can occur in user databases or system databases, leaving tables,
    databases, or even the entire instances in an inaccessible state. Consistency
    errors can occur for many reasons, including hardware failures and issues with
    the Database Engine. The following sections discuss the types of error that can
    occur, how to detect these errors, and what to do if your system databases become
    corrupt.


    ### Understand Consistency Errors


    Different database consistency errors can occur; these cause a query to fail or
    a session to be disconnected and a message to be written to the SQL Server error
    log. The most common errors are detailed in the following sections.


    #### 605 Error


    A 605 error can point to one of two issues, depending on the error severity. If
    the severity is level 12, then it indicates a dirty read. A *dirty read* is a
    transactional anomaly that occurs when you are using the Read Uncommitted isolation
    level or the `NOLOCK` query hint. It occurs when a transaction reads a row that
    never existed in the database, due to another transaction being rolled back. Transactional
    anomalies will be discussed in more detail in Chapter [18](#333037_2_En_18_Chapter.xhtml).
    To resolve this issue, either rerun the query until it succeeds or rewrite the
    query to avoid the use of the Read Uncommitted isolation level or the `NOLOCK`
    query hint.


    The 605 error may indicate a more serious issue, however, and often it indicates
    a hardware failure. If the severity level is 21, then the page may be damaged,
    or the incorrect page may be being served up from the operating system. If this
    is the case, then you need to either restore from a backup or use `DBCC CHECKDB`
    to fix the issue. (`DBCC CHECKDB` is discussed later in this chapter.) Additionally,
    you should also have the Windows administrators and storage team check for possible
    hardware or disk-level issues.


    #### 823 Error


    An 823 error occurs when SQL Server attempts to perform an IO operation and the
    Windows API that it uses to perform this action returns an error to the Database
    Engine. An 823 error is almost always associated with a hardware or driver issue.


    If an 823 error occurs, then you should use `DBCC CHECKDB` to check the consistency
    of the rest of the database and any other databases that reside on the same volume.
    You should liaise with your storage team to resolve the issue with the storage.
    Your Windows administrator should also check the Windows event log for correlated
    error messages. Finally, you should either restore the database from a backup
    or use `DBCC CHECKDB` to “fix” the issue.


    #### 824 Error


    If the call to the Windows API succeeds but there are logical consistency issues
    with the data returned, then an 824 error is generated. Just like an 823 error,
    an 824 error usually means that there is an issue with the storage subsystem.
    If an 824 error is generated, then you should follow the same course of action
    as you do when an 823 error is generated.'
  trans: '

    ## 摘要


    没有聚集索引的表称为堆，其数据页按无序方式存储。聚集索引基于聚集索引键构建 B 树结构，并使表中的数据按该键排序。由于聚集索引的叶级就是表的实际数据页，而数据页只能以一种方式进行物理排序，因此表上只能有一个聚集索引。聚集索引键的自然选择是表的主键，默认情况下，SQL
    Server 会自动在主键上创建聚集索引。但在某些情况下，你可能会选择使用不同的列作为聚集索引键。这通常发生在表的主键非常宽、可更新或非始终递增时。


    非聚集索引也是基于表中其他列构建的 B 树结构。不同之处在于，非聚集索引的叶级包含的是指向表数据页的指针，而非数据页本身。因为非聚集索引不会对表的实际数据页进行排序，所以可以创建多个非聚集索引。当在用于
    `WHERE`、`JOIN` 和 `GROUP BY` 子句的列上创建非聚集索引时，它们可以提升查询性能。你还可以在 B 树的叶级包含其他列，以实现索引覆盖查询。当查询无需读取基础表中的数据时，该查询就被非聚集索引覆盖了。你还可以通过向索引定义中添加
    `WHERE` 子句来筛选非聚集索引。这能为使用明确定义数据子集的查询提升性能。


    列存储索引压缩数据并将每个列存储在独立的一组页中。这可以显著提升数据仓库风格查询的性能，因为此类查询在大型数据集上执行分析，只需访问所需的列，而无需访问整行。每个列还会被拆分为段，每个段包含一个带有数据元数据的标头，以便
    SQL Server 只需访问相关段即可满足查询，从而进一步提升性能。非聚集列存储索引不可更新，这意味着在基础表上执行 DML 语句之前，必须禁用或删除该索引。另一方面，你可以更新聚集列存储索引。


    可以在内存优化表上创建两种类型的索引：非聚集索引和非聚集哈希索引。非聚集哈希索引对于点查询非常高效，但在执行范围扫描时效率可能低得多。非聚集索引在执行诸如不等式比较等操作时表现更佳，并且还能够按索引键的排序顺序返回数据。


    索引需要随时间进行维护。由于 DML 语句导致页拆分，索引会产生碎片，可以通过重组或重建来减少或消除碎片。当页的顺序错乱时，这称为外部碎片；当页中有大量空闲空间时，则称为内部碎片。SQL
    Server 存储有关索引碎片的元数据，并可通过名为 `sys.dm_db_index_physical_stats` 的 DMF 来显示这些信息。SQL
    Server 还会维护其认为缺失的索引信息。缺失索引是指数据库中不存在，但如果创建则能提升查询性能的索引。数据库管理员可以利用这些数据来帮助改进其索引策略。


    SQL Server 维护有关列或列组中值分布的统计信息，以帮助提升查询计划的质量。若没有高质量的统计信息，SQL Server 可能在选择使用哪个索引或索引操作符来满足查询时做出错误的选择。例如，它可能选择执行索引扫描，而实际上索引查找更为合适。你可以手动或自动更新统计信息，但无论哪种方式都会导致查询重新编译。SQL
    Server 还支持增量统计信息，允许在每个分区上创建统计信息，而不是针对整个表全局创建。


    # 9. 数据库一致性


    数据库涉及大量 IO 操作。当 IO 操作频繁时，固有地存在损坏的风险。防范数据库损坏的主要方法是定期备份数据库，并周期性地测试这些备份是否可恢复。然而，你需要留意数据库损坏情况，SQL
    Server 提供了工具，可用于检查数据库的一致性，并在备份不可用时解决一致性问题。本章将探讨用于检查和修复一致性问题的各种选项。


    ## 一致性错误


    一致性错误可能发生在用户数据库或系统数据库中，导致表、数据库甚至整个实例处于不可访问状态。一致性错误可能由多种原因引起，包括硬件故障和数据库引擎问题。以下各节将讨论可能发生的错误类型、如何检测这些错误，以及如果系统数据库损坏应采取的措施。


    ### 理解一致性错误


    可能发生多种不同的数据库一致性错误；这些错误会导致查询失败或会话断开连接，并将消息写入 SQL Server 错误日志。最常见的错误将在以下各节中详述。


    #### `605` 错误


    根据错误严重性级别，`605` 错误可能指向两个问题之一。如果严重性级别为 12，则表示发生了脏读。脏读是一种事务异常，当你使用 Read Uncommitted
    隔离级别或 `NOLOCK` 查询提示时会发生。当一个事务读取了一行在数据库中从未存在过的数据（由于另一个事务被回滚）时，就会发生脏读。事务异常将在第 18
    章中更详细讨论。要解决此问题，可以重新运行查询直到成功，或者重写查询以避免使用 Read Uncommitted 隔离级别或 `NOLOCK` 查询提示。


    然而，`605` 错误可能表明一个更严重的问题，通常指示硬件故障。如果严重性级别为 21，则可能是页面损坏，或者操作系统提供了错误的页面。如果是这种情况，你需要从备份恢复或使用
    `DBCC CHECKDB` 来修复问题（`DBCC CHECKDB` 将在本章后面讨论）。此外，你还应让 Windows 管理员和存储团队检查可能的硬件或磁盘级问题。


    #### `823` 错误


    当 SQL Server 尝试执行 IO 操作，而用于执行此操作的 Windows API 向数据库引擎返回错误时，会发生 `823` 错误。`823` 错误几乎总是与硬件或驱动程序问题相关。


    如果发生 `823` 错误，你应该使用 `DBCC CHECKDB` 来检查数据库其余部分以及位于同一卷上的任何其他数据库的一致性。你应该与存储团队联系以解决存储问题。你的
    Windows 管理员还应检查 Windows 事件日志以查找相关的错误消息。最后，你应该从备份恢复数据库，或者使用 `DBCC CHECKDB` 来“修复”此问题。


    #### `824` 错误


    如果对 Windows API 的调用成功，但返回的数据存在逻辑一致性问题，则会生成 `824` 错误。与 `823` 错误一样，`824` 错误通常意味着存储子系统存在问题。如果生成了
    `824` 错误，你应该遵循与处理 `823` 错误相同的步骤。

    '
- fmt: '## 5180 错误


    当发现无效的文件 ID 时，会发生 5180 错误。文件 ID 存储在页面指针以及每个文件开头的系统页面中。此错误通常由页面内的损坏指针引起，但也可能表示数据库引擎存在问题。如果遇到此错误，应从备份还原或运行
    `DBCC CHECKDB` 来修复错误。


    ## 7105 错误


    当表中的某一行引用不存在的 LOB（大型对象块）结构时，会发生 7105 错误。这可能是由于脏读导致的，类似于严重级别 12 的 605 错误，也可能是页面损坏的结果。损坏可能发生在指向
    LOB 结构的数据页上，也可能发生在 LOB 结构本身的页面上。


    如果遇到 7105 错误，则应运行 `DBCC CHECKDB` 来检查错误。如果没有发现任何错误，那么该错误很可能是脏读的结果。但如果发现了错误，则应从备份还原数据库或使用
    `DBCC CHECKDB` 来修复问题。


    ## 检测一致性错误


    SQL Server 提供了在页面从磁盘读取和写入磁盘时验证其完整性的机制。它还提供了一个损坏页面的日志，帮助您识别发生的错误类型、发生的次数以及已损坏页面的当前状态。这些特性将在以下部分中讨论。


    ### 页面验证选项


    一个名为 `Page Verify` 的数据库级选项决定了 SQL Server 如何检查 I/O 子系统在读写页面到磁盘时引起的页面损坏。它可以配置为 `CHECKSUM`（默认选项）、`TORN_PAGE_DETECTION`
    或 `NONE`。


    建议将 `Page Verify` 设置为 `CHECKSUM`。选择此选项后，每次写入页面时，都会针对整个页面创建一个 `CHECKSUM` 值并保存在页面头部。`CHECKSUM`
    值是一个哈希和，它是确定性的，并且基于运行哈希函数的值是唯一的。然后在页面读入缓冲区缓存时重新计算此值，并与原始值进行比较。


    当指定 `TORN_PAGE_DETECTION` 时，每当页面写入磁盘时，页面每个 512 字节扇区的前 2 个字节都会写入页面的头部。当页面随后读入内存时，会检查这些值以确保它们相同。这里的缺陷显而易见；页面完全有可能已损坏，但这种损坏未被注意到，因为它不在被检查的字节内。`TORN_PAGE_DETECTION`
    是 SQL Server 的一项已弃用功能，这意味着它在未来版本中将不可用。您应避免使用它。如果 `Page Verify` 设置为 `NONE`，则 SQL
    Server 不执行任何页面验证。这不是好的做法。


    如果您所有的数据库都是在 SQL Server 2019 实例中创建的，那么它们都默认配置为使用 `CHECKSUM`。但是，如果您是从早期版本的 SQL
    Server 迁移数据库，那么它们可能配置为使用 `TORN_PAGE_DETECTION`。您可以使用清单 [9-1](#333037_2_En_9_Chapter.xhtml#PC1)
    中的脚本来检查数据库的 `Page Verify` 设置。


    ```sql

    --Create the Chapter9 database

    CREATE DATABASE Chapter9 ;

    GO

    --View page verify option, for all databases on the instance

    SELECT

    name

    ,page_verify_option_desc

    FROM sys.databases ;

    Listing 9-1

    Checking the Page Verify Option

    ```


    如果您发现某个数据库正在使用 `TORN_PAGE_DETECTION`，或者更糟，被设置为 `NONE`，那么您可以通过在“数据库属性”对话框的“选项”页中更改设置来解决此问题，如图
    [9-1](#333037_2_En_9_Chapter.xhtml#Fig1) 所示。


    ![../images/333037_2_En_9_Chapter/333037_2_En_9_Fig1_HTML.jpg](images/333037_2_En_9_Chapter/333037_2_En_9_Fig1_HTML.jpg)


    图 9-1


    选项页


    ### 注意


    更改 `Page Verify` 选项不会立即导致针对数据页创建 `CHECKSUM`。`CHECKSUM` 仅在页面被修改后写回磁盘时生成。


    或者，您可以使用 T-SQL 通过 `ALTER DATABASE <DatabaseName> SET PAGE_VERIFY CHECKSUM WITH
    NO_WAIT` 语句达到相同的结果。清单 [9-2](#333037_2_En_9_Chapter.xhtml#PC2) 中的脚本将当前设置为 `NONE`
    或 `TORN_PAGE_DETECTION` 的所有数据库重新配置为使用 `CHECKSUM`。该脚本使用 XQuery `data()` 函数避免了游标的需要。它通过为表中的每一行构建所需的语句来工作。它将每一行的数据转换为
    XML，然后使用 `Data()` 函数剥离标签，只留下语句。然后将其转换回关系字符串并传递给 Unicode 变量，该变量随后作为动态 SQL 执行。


    ```sql

    DECLARE @SQL NVARCHAR(MAX)

    SELECT @SQL =

    (

    SELECT

    ''ALTER DATABASE '' + QUOTENAME(Name) +

    '' SET PAGE_VERIFY CHECKSUM WITH NO_WAIT; '' AS [data()]

    FROM sys.databases

    WHERE page_verify_option_desc <> ''CHECKSUM''

    FOR XML PATH('''')

    ) ;

    BEGIN TRY

    EXEC(@SQL) ;

    END TRY

    BEGIN CATCH

    SELECT ''Failure executing the following SQL statement '' + CHAR(13) +CHAR(10)
    + @SQL ;

    END CATCH

    Listing 9-2

    Reconfiguring All Databases to Use CHECKSUM

    ```


    ### 提示


    任何时候您需要一个脚本来对多个数据库执行操作，都可以使用此技术。该代码比使用游标高效得多，并通过允许 DBA 以身作则来提倡良好的实践。您总是告诉您的开发人员不要使用游标，对吧？


    ### 可疑页


    如果 SQL Server 发现校验和错误或页撕裂的页面，它会在 `MSDB` 数据库中一个名为 `dbo.suspect_pages` 的表中记录这些页面。它还将遇到
    823 或 824 错误的任何页面记录在此表中。该表由六列组成，如表 [9-1](#333037_2_En_9_Chapter.xhtml#Tab1) 所述。


    表 9-1


    `suspect_pages` 列


    | 列 | 描述 |

    | --- | --- |

    | `Database_id` | 包含可疑页面的数据库的 ID |

    | `File_id` | 包含可疑页面的文件的 ID |

    | `Page_id` | 可疑页面的 ID |

    | `Event_Type` | 导致可疑页面被更新的事件性质 |

    | `Error_count` | 记录事件发生次数的增量计数器 |

    | `Last_updated_date` | 行最后一次更新的时间 |


    `event_type` 列的可能值在表 [9-2](#333037_2_En_9_Chapter.xhtml#Tab2) 中解释。


    表 9-2


    事件类型


    | Event_type | 描述 |

    | --- | --- |

    | `1` | 823 或 824 错误 |

    | `2` | 校验和错误 |

    | `3` | 页撕裂 |

    | `4` | 已还原 |

    | `5` | 已修复 |

    | `7` | 被 `DBCC CHECKDB` 释放 |


    在 `suspect_pages` 表中记录可疑页面后，SQL Server 在您通过从备份还原页面或使用 `DBCC CHECKDB` 修复问题后更新该行。每次遇到具有相同
    `event_type` 的错误时，它也会增加错误计数。您应监视此表中的新条目和更新条目，还应定期从此表中删除 `event_type` 为 `4` 或 `5`
    的行，以防止该表被填满。'
  raw: '#### 5180 Error


    A 5180 error occurs when a file ID is discovered that is not valid. File IDs are
    stored in page pointers, as well as in system pages at the beginning of each file.
    This error is usually caused by a corrupt pointer within a page, but it can potentially
    also indicate an issue with the Database Engine. If you experience this error,
    you should restore from a backup or run `DBCC CHECKDB` to fix the error.


    #### 7105 Error


    A 7105 error occurs when a row within a table references an LOB (Large Object
    Block) structure that does not exist. This can happen because of a dirty read
    in the same manner as a 605 severity 12 error, or it can happen as the result
    of a corrupt page. The corruption can either be in the data page that points to
    the LOB structure or in a page of the LOB structure itself.


    If you encounter a 7105 error, then you should run `DBCC CHECKDB` to check for
    errors. If you don’t find any, then the error is likely the result of a dirty
    read. If you find errors, however, then either restore the database from a backup
    or use `DBCC CHECKDB` to fix the issue.


    ### Detecting Consistency Errors


    SQL Server provides mechanisms for verifying the integrity of pages as they are
    read from and written to disk. It also provides a log of corrupt pages that helps
    you identify the type of error that has occurred, how many times it has occurred,
    and the current status of the page that has become corrupt. These features are
    discussed in the following sections.


    #### Page Verify Option


    A database-level option called Page Verify determines how SQL Server checks for
    page corruption that the IO subsystem causes when it is reading and writing pages
    to disk. It can be configured as `CHECKSUM`, which is the default option, `TORN_PAGE_DETECTION`,
    or `NONE`.


    The recommended setting for Page Verify is `CHECKSUM` . When this option is selected,
    every time a page is written, a `CHECKSUM` value is created against the entire
    page and saved in the page header. A `CHECKSUM` value is a hash sum, which is
    deterministic and unique based on the value that the hashing function is run against.
    This value is then recalculated when a page is read into the buffer cache and
    compared to the original value.


    When `TORN_PAGE_DETECTION` is specified, whenever a page is written to disk, the
    first 2 bytes of every 512-byte sector of the page are written to the page’s header.
    When the page is subsequently read into memory, these values are checked to ensure
    that they are the same. The flaw here is obvious; it is perfectly possible for
    a page to be corrupt, and for this corruption not to be noticed, because it is
    not within the bytes that are checked. `TORN_PAGE_DETECTION` is a deprecated feature
    of SQL Server, which means that it will not be available in future versions. You
    should avoid using it. If Page Verify is set to `NONE`, then SQL Server performs
    no page verification whatsoever. This is not good practice.


    If all of your databases have been created in a SQL Server 2019 instance, then
    they are all configured to use `CHECKSUM` by default. If you have migrated your
    databases from a previous version of SQL Server, however, then they may be configured
    to use `TORN_PAGE_DETECTION` . You can check the Page Verify setting of your databases
    by using the script in Listing [9-1](#333037_2_En_9_Chapter.xhtml#PC1).


    ```

    --Create the Chapter9 database

    CREATE DATABASE Chapter9 ;

    GO

    --View page verify option, for all databases on the instance

    SELECT

    name

    ,page_verify_option_desc

    FROM sys.databases ;

    Listing 9-1

    Checking the Page Verify Option

    ```


    If you find that a database is using `TORN_PAGE_DETECTION`, or worse, was set
    to `NONE`, then you can resolve the issue by altering the setting in the Options
    page of the Database Properties dialog box, as shown in Figure [9-1](#333037_2_En_9_Chapter.xhtml#Fig1).


    ![../images/333037_2_En_9_Chapter/333037_2_En_9_Fig1_HTML.jpg](images/333037_2_En_9_Chapter/333037_2_En_9_Fig1_HTML.jpg)


    Figure 9-1


    The Options page


    ### Note


    Changing the Page Verify option does not cause the `CHECKSUM` to be created against
    the data pages immediately. The `CHECKSUM` is only generated when the pages are
    written back to disk after being modified.


    Alternatively, you can achieve the same results using T-SQL by using an `ALTER
    DATABASE <DatabaseName> SET PAGE_VERIFY CHECKSUM WITH NO_WAIT` statement. The
    script in Listing [9-2](#333037_2_En_9_Chapter.xhtml#PC2) causes all databases
    that are currently set to either `NONE` or `TORN_PAGE_DETECTION` to be reconfigured
    to use `CHECKSUM`. The script uses the XQuery `data()` function to avoid the need
    for a cursor. The script works by building the statement required for every row
    in the table. It flips the data for each row into XML, but the tags are then striped
    out using the `Data()` function, leaving only the statement. It is then flipped
    back to a relational string and passed into a Unicode variable, which is then
    executed as dynamic SQL.


    ```

    DECLARE @SQL NVARCHAR(MAX)

    SELECT @SQL =

    (

    SELECT

    ''ALTER DATABASE '' + QUOTENAME(Name) +

    '' SET PAGE_VERIFY CHECKSUM WITH NO_WAIT; '' AS [data()]

    FROM sys.databases

    WHERE page_verify_option_desc  ''CHECKSUM''

    FOR XML PATH(")

    ) ;

    BEGIN TRY

    EXEC(@SQL) ;

    END TRY

    BEGIN CATCH

    SELECT ''Failure executing the following SQL statement '' + CHAR(13) +CHAR(10)
    + @SQL ;

    END CATCH

    Listing 9-2

    Reconfiguring All Databases to Use CHECKSUM

    ```


    ### Tip


    You can use this technique any time you require a script to perform an operation
    against multiple databases. The code is far more efficient than using a cursor
    and promotes good practice by allowing DBAs to lead by example. You are always
    telling your developers not to use the cursor, right?


    #### Suspect Pages


    If SQL Server discovers a page with a bad checksum or a torn page, then it records
    the pages in the MSDB database in a table called `dbo.suspect_pages` . It also
    records any pages that encounter an 823 or 824 error in this table. The table
    consists of six columns, as described in Table [9-1](#333037_2_En_9_Chapter.xhtml#Tab1).


    Table 9-1


    suspect_pages Columns


    | Column | Description |

    | --- | --- |

    | `Database_id` | The ID of the database that contains the suspect page |

    | `File_id` | The ID of the file that contains the suspect page |

    | `Page_id` | The ID of the page that is suspect |

    | `Event_Type` | The nature of the event that caused the suspect pages to be updated
    |

    | `Error_count` | An incremental counter that records the number of times that
    the event has occurred |

    | `Last_updated_date` | The last time the row was updated |


    The possible values for the `event_type column` are explained in Table [9-2](#333037_2_En_9_Chapter.xhtml#Tab2).


    Table 9-2


    Event Types


    | Event_type | Description |

    | --- | --- |

    | `1` | 823 or 824 error |

    | `2` | Bad checksum |

    | `3` | Torn page |

    | `4` | Restored |

    | `5` | Repaired |

    | `7` | Deallocated by `DBCC CHECKDB` |


    After recording the suspect page in the `suspect_pages` table, SQL Server updates
    the row after you have fixed the issue by either restoring the page from a backup
    or by using `DBCC CHECKDB`. It also increments the error count every time an error
    with the same `event_type` is encountered. You should monitor this table for new
    and updated entries, and you should also periodically delete rows from this table,
    which have an `event_type` of `4` or `5`, to stop the table from becoming full.'
  trans: '

    ## 5180 错误


    当发现无效的文件 ID 时，会发生 5180 错误。文件 ID 存储在页面指针以及每个文件开头的系统页面中。此错误通常由页面内的损坏指针引起，但也可能表示数据库引擎存在问题。如果遇到此错误，应从备份还原或运行
    `DBCC CHECKDB` 来修复错误。


    ## 7105 错误


    当表中的某一行引用不存在的 LOB（大型对象块）结构时，会发生 7105 错误。这可能是由于脏读导致的，类似于严重级别 12 的 605 错误，也可能是页面损坏的结果。损坏可能发生在指向
    LOB 结构的数据页上，也可能发生在 LOB 结构本身的页面上。


    如果遇到 7105 错误，则应运行 `DBCC CHECKDB` 来检查错误。如果没有发现任何错误，那么该错误很可能是脏读的结果。但如果发现了错误，则应从备份还原数据库或使用
    `DBCC CHECKDB` 来修复问题。


    ## 检测一致性错误


    SQL Server 提供了在页面从磁盘读取和写入磁盘时验证其完整性的机制。它还提供了一个损坏页面的日志，帮助您识别发生的错误类型、发生的次数以及已损坏页面的当前状态。这些特性将在以下部分中讨论。


    ### 页面验证选项


    一个名为 `Page Verify` 的数据库级选项决定了 SQL Server 如何检查 I/O 子系统在读写页面到磁盘时引起的页面损坏。它可以配置为 `CHECKSUM`（默认选项）、`TORN_PAGE_DETECTION`
    或 `NONE`。


    建议将 `Page Verify` 设置为 `CHECKSUM`。选择此选项后，每次写入页面时，都会针对整个页面创建一个 `CHECKSUM` 值并保存在页面头部。`CHECKSUM`
    值是一个哈希和，它是确定性的，并且基于运行哈希函数的值是唯一的。然后在页面读入缓冲区缓存时重新计算此值，并与原始值进行比较。


    当指定 `TORN_PAGE_DETECTION` 时，每当页面写入磁盘时，页面每个 512 字节扇区的前 2 个字节都会写入页面的头部。当页面随后读入内存时，会检查这些值以确保它们相同。这里的缺陷显而易见；页面完全有可能已损坏，但这种损坏未被注意到，因为它不在被检查的字节内。`TORN_PAGE_DETECTION`
    是 SQL Server 的一项已弃用功能，这意味着它在未来版本中将不可用。您应避免使用它。如果 `Page Verify` 设置为 `NONE`，则 SQL
    Server 不执行任何页面验证。这不是好的做法。


    如果您所有的数据库都是在 SQL Server 2019 实例中创建的，那么它们都默认配置为使用 `CHECKSUM`。但是，如果您是从早期版本的 SQL
    Server 迁移数据库，那么它们可能配置为使用 `TORN_PAGE_DETECTION`。您可以使用清单 9-1 中的脚本来检查数据库的 `Page Verify`
    设置。


    ```sql

    --Create the Chapter9 database

    CREATE DATABASE Chapter9 ;

    GO

    --View page verify option, for all databases on the instance

    SELECT

    name

    ,page_verify_option_desc

    FROM sys.databases ;

    Listing 9-1

    Checking the Page Verify Option

    ```


    如果您发现某个数据库正在使用 `TORN_PAGE_DETECTION`，或者更糟，被设置为 `NONE`，那么您可以通过在“数据库属性”对话框的“选项”页中更改设置来解决此问题，如图
    9-1 所示。


    ![../images/333037_2_En_9_Chapter/333037_2_En_9_Fig1_HTML.jpg](img/333037_2_En_9_Fig1_HTML.jpg)


    图 9-1


    选项页


    ### 注意


    更改 `Page Verify` 选项不会立即导致针对数据页创建 `CHECKSUM`。`CHECKSUM` 仅在页面被修改后写回磁盘时生成。


    或者，您可以使用 T-SQL 通过 `ALTER DATABASE <DatabaseName> SET PAGE_VERIFY CHECKSUM WITH
    NO_WAIT` 语句达到相同的结果。清单 9-2 中的脚本将当前设置为 `NONE` 或 `TORN_PAGE_DETECTION` 的所有数据库重新配置为使用
    `CHECKSUM`。该脚本使用 XQuery `data()` 函数避免了游标的需要。它通过为表中的每一行构建所需的语句来工作。它将每一行的数据转换为 XML，然后使用
    `Data()` 函数剥离标签，只留下语句。然后将其转换回关系字符串并传递给 Unicode 变量，该变量随后作为动态 SQL 执行。


    ```sql

    DECLARE @SQL NVARCHAR(MAX)

    SELECT @SQL =

    (

    SELECT

    ''ALTER DATABASE '' + QUOTENAME(Name) +

    '' SET PAGE_VERIFY CHECKSUM WITH NO_WAIT; '' AS [data()]

    FROM sys.databases

    WHERE page_verify_option_desc <> ''CHECKSUM''

    FOR XML PATH('''')

    ) ;

    BEGIN TRY

    EXEC(@SQL) ;

    END TRY

    BEGIN CATCH

    SELECT ''Failure executing the following SQL statement '' + CHAR(13) +CHAR(10)
    + @SQL ;

    END CATCH

    Listing 9-2

    Reconfiguring All Databases to Use CHECKSUM

    ```


    ### 提示


    任何时候您需要一个脚本来对多个数据库执行操作，都可以使用此技术。该代码比使用游标高效得多，并通过允许 DBA 以身作则来提倡良好的实践。您总是告诉您的开发人员不要使用游标，对吧？


    ### 可疑页


    如果 SQL Server 发现校验和错误或页撕裂的页面，它会在 `MSDB` 数据库中一个名为 `dbo.suspect_pages` 的表中记录这些页面。它还将遇到
    823 或 824 错误的任何页面记录在此表中。该表由六列组成，如表 9-1 所述。


    表 9-1


    `suspect_pages` 列


    | 列 | 描述 |

    | --- | --- |

    | `Database_id` | 包含可疑页面的数据库的 ID |

    | `File_id` | 包含可疑页面的文件的 ID |

    | `Page_id` | 可疑页面的 ID |

    | `Event_Type` | 导致可疑页面被更新的事件性质 |

    | `Error_count` | 记录事件发生次数的增量计数器 |

    | `Last_updated_date` | 行最后一次更新的时间 |


    `event_type` 列的可能值在表 9-2 中解释。


    表 9-2


    事件类型


    | Event_type | 描述 |

    | --- | --- |

    | `1` | 823 或 824 错误 |

    | `2` | 校验和错误 |

    | `3` | 页撕裂 |

    | `4` | 已还原 |

    | `5` | 已修复 |

    | `7` | 被 `DBCC CHECKDB` 释放 |


    在 `suspect_pages` 表中记录可疑页面后，SQL Server 在您通过从备份还原页面或使用 `DBCC CHECKDB` 修复问题后更新该行。每次遇到具有相同
    `event_type` 的错误时，它也会增加错误计数。您应监视此表中的新条目和更新条目，还应定期从此表中删除 `event_type` 为 `4` 或 `5`
    的行，以防止该表被填满。

    '
- fmt: '### Note


    页面恢复将在第[12](#333037_2_En_12_Chapter.xhtml)章讨论。


    清单[9-3](#333037_2_En_9_Chapter.xhtml#PC3)中的脚本创建了一个名为`Chapter9`的新数据库，其中包含一个名为`CorruptTable`的表，该表随后被填充数据。然后，它使表中的一个页面损坏。


    ```sql

    USE Chapter9

    GO

    --Create the table that we will corrupt

    CREATE TABLE dbo.CorruptTable

    (

    ID    INT    NOT NULL    PRIMARY KEY CLUSTERED    IDENTITY,

    SampleText NVARCHAR(50)

    ) ;

    --Populate the table

    DECLARE @Numbers TABLE

    (ID        INT)

    ;WITH CTE(Num)

    AS

    (

    SELECT 1 Num

    UNION ALL

    SELECT Num + 1

    FROM CTE

    WHERE Num <= 100

    )

    INSERT INTO @Numbers

    SELECT Num

    FROM CTE ;

    INSERT INTO dbo.CorruptTable

    SELECT ''SampleText''

    FROM @Numbers a

    CROSS JOIN @Numbers b ;

    --DBCC WRITEPAGE will be used to corrupt a page in the table. This requires the

    --database to be placed in single user mode.

    --THIS IS VERY DANGEROUS – DO NOT EVER USE THIS IN A PRODUCTION ENVIRONMENT

    ALTER DATABASE Chapter9 SET  SINGLE_USER WITH NO_WAIT ;

    GO

    DECLARE @SQL NVARCHAR(MAX) ;

    SELECT @SQL = ''DBCC WRITEPAGE('' +

    (

    SELECT CAST(DB_ID(''Chapter9'') AS NVARCHAR)

    ) +

    '', 1, '' +

    (

    SELECT TOP 1 CAST(page_id AS NVARCHAR)

    FROM dbo.CorruptTable

    CROSS APPLY sys.fn_PhysLocCracker(%%physloc%%)

    ) +

    '', 2000, 1, 0x61, 1)'' ;

    EXEC(@SQL) ;

    ALTER DATABASE Chapter9 SET  MULTI_USER WITH NO_WAIT ;

    GO

    SELECT *

    FROM dbo.CorruptTable ;

    ```


    Listing 9-3

    Corrupting a Page


    图[9-2](#333037_2_En_9_Chapter.xhtml#Fig2)中的结果显示，脚本中尝试从表中读取数据的最终查询失败，因为其中一个页面已损坏，因此存在错误的校验和。


    ![../images/333037_2_En_9_Chapter/333037_2_En_9_Fig2_HTML.jpg](images/333037_2_En_9_Chapter/333037_2_En_9_Fig2_HTML.jpg)


    Figure 9-2

    Bad checksum error


    ### Caution


    `DBCC WRITEPAGE`在这里仅用于教育目的。它未公开且极其危险。它`never`应在生产系统上使用，并且只应在任何数据库上极其谨慎地使用。


    你可以使用清单[9-4](#333037_2_En_9_Chapter.xhtml#PC4)中的查询从`msdb.dbo.suspect_pages`表中生成友好的输出。此查询使用`DB_NAME()`函数查找数据库名称，连接到`sys.master_files`系统表以查找涉及的文件名称，并使用`CASE`语句将`event_type`转换为事件类型描述。


    ```sql

    SELECT

    DB_NAME(sp.database_id) [Database]

    ,mf.name

    ,sp.page_id

    ,CASE sp.event_type

    WHEN 1 THEN ''823 or 824 or Torn Page''

    WHEN 2 THEN ''Bad Checksum''

    WHEN 3 THEN ''Torn Page''

    WHEN 4 THEN ''Restored''

    WHEN 5 THEN ''Repaired (DBCC)''

    WHEN 7 THEN ''Deallocated (DBCC)''

    END AS [Event]

    ,sp.error_count

    ,sp.last_update_date

    FROM msdb.dbo.suspect_pages sp

    INNER JOIN sys.master_files mf

    ON sp.database_id = mf.database_id

    AND sp.file_id = mf.file_id ;

    ```


    Listing 9-4

    Querying suspect_pages


    在损坏了我们的`CorruptTable`表的一个页面后，运行此查询将产生图[9-3](#333037_2_En_9_Chapter.xhtml#Fig3)中的结果。显然，如果你在自己的系统上运行脚本，`page_id`很可能会不同，因为数据库引擎可能为你创建的表分配了不同的页面。


    ![../images/333037_2_En_9_Chapter/333037_2_En_9_Fig3_HTML.jpg](images/333037_2_En_9_Chapter/333037_2_En_9_Fig3_HTML.jpg)


    Figure 9-3

    Results of querying suspect_pages


    ### Note


    我们将在本章后面修复错误，但这会丢失存储在页面上的数据。如果有备份可用，那么在此场景下，页面恢复是比修复更好的选择。


    #### Consistency Issues for Memory-Optimized Tables


    损坏通常发生在物理IO操作期间，因此你可以原谅自己认为内存优化表不受损坏影响，但这是一个谬误。正如你可能从第[7](#333037_2_En_7_Chapter.xhtml)章记得的，虽然内存优化表驻留在内存中，但表的副本——根据你的持久性设置，还包含你数据的副本——保存在物理文件中。这是为了确保在实例重启后表和数据仍然可用。这些文件可能会遭受损坏。由于诸如故障RAM芯片等问题，内存中的数据也可能变得损坏。


    不幸的是，`DBCC CHECKDB`的修复选项不支持内存表。但是，当你备份包含内存优化文件组的数据库时，会对此文件组中的文件执行校验和验证。因此，至关重要的是，你不仅要定期备份，还要定期检查它们是否可以成功恢复。这是因为在内存优化表损坏的情况下，你唯一的选择是从最后一个已知完好的备份中恢复。


    ### System Database Corruption


    如果系统数据库损坏，你的实例可能会处于无法访问的状态。以下各节讨论如何响应主数据库和资源数据库中的损坏。


    #### Corruption of the Master Database


    如果主数据库损坏，你的实例可能无法启动。如果是这种情况，那么你需要重建系统数据库，然后从备份中恢复最新的副本。第[12](#333037_2_En_12_Chapter.xhtml)章更详细地讨论了数据库备份策略，但这凸显了备份系统数据库的重要性。如果你需要重建系统数据库，并且无法从备份中恢复，你将丢失所有实例级信息，例如登录名、SQL
    Server Agent作业、链接服务器等。甚至实例内用户数据库的知识也会丢失，你将需要重新附加数据库。


    为了重建系统数据库，你需要运行安装程序。当你使用安装程序重建系统数据库时，表[9-3](#333037_2_En_9_Chapter.xhtml#Tab3)中描述的参数可用。


    Table 9-3

    System Database Rebuild Parameters


    | Parameter | Description |

    | --- | --- |

    | `/ACTION` | 指定操作参数为`Rebuilddatabase`。 |

    | `/INSTANCENAME` | 指定包含损坏系统数据库的实例的名称。 |

    | `/Q` | 此参数代表安静。使用它可以在没有任何用户交互的情况下运行安装程序。 |

    | `/SQLCOLLATION` | 这是一个可选参数，可用于指定实例的排序规则。如果省略，则使用Windows操作系统的排序规则。 |

    | `/SAPWD` | 如果你的实例使用混合模式身份验证，则使用此参数指定SA帐户的密码。 |

    | `/SQLSYSADMINACCOUNTS` | 使用此参数指定哪些帐户应成为实例的系统管理员。 |


    清单[9-5](#333037_2_En_9_Chapter.xhtml#PC5)中的PowerShell命令重建了`PROSQLADMIN`实例的系统数据库。


    ```powershell

    .\setup.exe /ACTION=rebuilddatabase /INSTANCENAME=PROSQLADMIN /SQLSYSADMINACCOUNTS=SQLAdministrator

    ```


    Listing 9-5

    Rebuilding System Databases


    如前所述，当此操作完成后，理想情况下我们从备份中恢复主数据库的最新副本。由于我们没有备份，我们需要重新附加我们的`Chapter9`数据库以继续。此外，`suspect_pages`表中损坏页面的详细信息也将丢失。但是，尝试读取`Chapter9`数据库中的`CorruptTable`表会导致这些数据被重新填充。清单[9-6](#333037_2_En_9_Chapter.xhtml#PC6)中的脚本重新附加了`Chapter9`数据库。在运行脚本之前，你应该更改文件路径以匹配你自己的配置。


    ```sql

    CREATE DATABASE Chapter9 ON

    ( FILENAME = N''F:\MSSQL\DATA\Chapter9.mdf'' ),

    ( FILENAME = N''F:\MSSQL\DATA\Chapter9_log.ldf'' )

    FOR ATTACH ;

    ```


    Listing 9-6

    Reattaching a Database'
  raw: '### Note


    Page restores will be discussed in Chapter [12](#333037_2_En_12_Chapter.xhtml).


    The script in Listing [9-3](#333037_2_En_9_Chapter.xhtml#PC3) creates a new database
    called `Chapter9`, with a single table, called `CorruptTable`, which is then populated
    with data. It then causes one of the table’s pages to become corrupt.


    ```

    USE Chapter9

    GO

    --Create the table that we will corrupt

    CREATE TABLE dbo.CorruptTable

    (

    ID    INT    NOT NULL    PRIMARY KEY CLUSTERED    IDENTITY,

    SampleText NVARCHAR(50)

    ) ;

    --Populate the table

    DECLARE @Numbers TABLE

    (ID        INT)

    ;WITH CTE(Num)

    AS

    (

    SELECT 1 Num

    UNION ALL

    SELECT Num + 1

    FROM CTE

    WHERE Num <= 100

    )

    INSERT INTO @Numbers

    SELECT Num

    FROM CTE ;

    INSERT INTO dbo.CorruptTable

    SELECT ''SampleText''

    FROM @Numbers a

    CROSS JOIN @Numbers b ;

    --DBCC WRITEPAGE will be used to corrupt a page in the table. This requires the

    --database to be placed in single user mode.

    --THIS IS VERY DANGEROUS – DO NOT EVER USE THIS IN A PRODUCTION ENVIRONMENT

    ALTER DATABASE Chapter9 SET  SINGLE_USER WITH NO_WAIT ;

    GO

    DECLARE @SQL NVARCHAR(MAX) ;

    SELECT @SQL = ''DBCC WRITEPAGE('' +

    (

    SELECT CAST(DB_ID(''Chapter9'') AS NVARCHAR)

    ) +

    '', 1, '' +

    (

    SELECT TOP 1 CAST(page_id AS NVARCHAR)

    FROM dbo.CorruptTable

    CROSS APPLY sys.fn_PhysLocCracker(%%physloc%%)

    ) +

    '', 2000, 1, 0x61, 1)'' ;

    EXEC(@SQL) ;

    ALTER DATABASE Chapter9 SET  MULTI_USER WITH NO_WAIT ;

    GO

    SELECT *

    FROM dbo.CorruptTable ;

    Listing 9-3

    Corrupting a Page

    ```


    The results in Figure [9-2](#333037_2_En_9_Chapter.xhtml#Fig2) show that the final
    query in the script, which tried to read the data from the table, failed because
    one of the pages is corrupt, and therefore, there is a bad checksum.


    ![../images/333037_2_En_9_Chapter/333037_2_En_9_Fig2_HTML.jpg](images/333037_2_En_9_Chapter/333037_2_En_9_Fig2_HTML.jpg)


    Figure 9-2


    Bad checksum error


    ### Caution


    `DBCC WRITEPAGE` is used here for educational purposes only. It is undocumented
    and also extremely dangerous. It should *never* be used on a production system
    and should only be used on any database with extreme caution.


    You can use the query in Listing [9-4](#333037_2_En_9_Chapter.xhtml#PC4) to generate
    a friendly output from the `msdb.dbo.suspect_pages` table. This query uses the
    `DB_NAME()` function to find the name of the database, joins to the `sys.master_files`
    system table to find the name of the file involved, and uses a `CASE` statement
    to translate the `event_type` into an event type description.


    ```

    SELECT

    DB_NAME(sp.database_id) [Database]

    ,mf.name

    ,sp.page_id

    ,CASE sp.event_type

    WHEN 1 THEN ''823 or 824 or Torn Page''

    WHEN 2 THEN ''Bad Checksum''

    WHEN 3 THEN ''Torn Page''

    WHEN 4 THEN ''Restored''

    WHEN 5 THEN ''Repaired (DBCC)''

    WHEN 7 THEN ''Deallocated (DBCC)''

    END AS [Event]

    ,sp.error_count

    ,sp.last_update_date

    FROM msdb.dbo.suspect_pages sp

    INNER JOIN sys.master_files mf

    ON sp.database_id = mf.database_id

    AND sp.file_id = mf.file_id ;

    Listing 9-4

    Querying suspect_pages

    ```


    After corrupting a page of our `CorruptTable` table, running this query will produce
    the results in Figure [9-3](#333037_2_En_9_Chapter.xhtml#Fig3). Obviously, the
    `page_id` is likely to be different if you were to run the scripts on your own
    system, since the Database Engine is likely to have allocated different pages
    to the table that you created.


    ![../images/333037_2_En_9_Chapter/333037_2_En_9_Fig3_HTML.jpg](images/333037_2_En_9_Chapter/333037_2_En_9_Fig3_HTML.jpg)


    Figure 9-3


    Results of querying suspect_pages


    ### Note


    We will fix the error later in this chapter, but that involves losing data that
    was stored on the page. If a backup is available, then a page restore is a better
    option than a repair in this scenario.


    #### Consistency Issues for Memory-Optimized Tables


    Corruption usually occurs during a physical IO operation, so you can be forgiven
    for thinking that memory-optimized tables are immune to corruption, but this is
    a fallacy. As you may remember from Chapter [7](#333037_2_En_7_Chapter.xhtml),
    although memory-optimized tables reside in memory, a copy of the tables—and depending
    on your durability settings, a copy of your data—is kept in physical files. This
    is to ensure that the tables and data are still available after a restart of the
    instance. These files can be subject to corruption. It is also possible for data
    to become corrupt in memory, due to issues such as a faulty RAM chip.


    Unfortunately, the repair options of `DBCC CHECKDB` are not supported against
    memory tables. However, when you take a backup of a database that contains a memory-optimized
    filegroup, a checksum validation is performed against the files within this filegroup.
    It is therefore imperative that you not only take regular backups, but that you
    also check that they can be restored successfully, on a regular basis. This is
    because your only option, in the event of a corrupted memory-optimized table,
    is to restore from the last known good backup.


    ### System Database Corruption


    If system databases become corrupt, your instance can be left in an inaccessible
    state. The following sections discuss how to respond to corruption in the Master
    database and the Resource database.


    #### Corruption of the Master Database


    If the Master database becomes corrupted, it is possible that your instance will
    be unable to start. If this is the case, then you need to rebuild the system databases
    and then restore the latest copies from backups. Chapter [12](#333037_2_En_12_Chapter.xhtml)
    discusses strategies for database backups in more detail, but this highlights
    why backing up your system databases is important. In the event that you need
    to rebuild your system databases, you will lose all instance-level information,
    such as logins, SQL Server Agent jobs, linked servers, and so on, if you are not
    able to restore from a backup. Even knowledge of the user databases within the
    instance will be lost, and you will need to reattach the databases.


    In order to rebuild the system databases, you need to run setup. When you are
    rebuilding system databases using setup, the parameters described in Table [9-3](#333037_2_En_9_Chapter.xhtml#Tab3)
    are available.


    Table 9-3


    System Database Rebuild Parameters


    | Parameter | Description |

    | --- | --- |

    | `/ACTION` | Specifies `Rebuilddatabase` for the action parameter. |

    | `/INSTANCENAME` | Specifies the instance name of the instance that contains
    the corrupt system database. |

    | `/Q` | This parameter stands for quiet. Use this to run setup without any user
    interaction. |

    | `/SQLCOLLATION` | This is an optional parameter that you can use to specify
    a collation for the instance. If you omit it, the collation of the Windows OS
    is used. |

    | `/SAPWD` | If your instance uses mixed-mode authentication, then use this parameter
    to specify the password for the SA account. |

    | `/SQLSYSADMINACCOUNTS` | Use this parameter to specify which accounts should
    be made sysadmins of the instance. |


    The PowerShell command in Listing [9-5](#333037_2_En_9_Chapter.xhtml#PC5) rebuilds
    the system databases of the `PROSQLADMIN` instance.


    ```

    .\setup.exe /ACTION=rebuilddatabase /INSTANCENAME=PROSQLADMIN /SQLSYSADMINACCOUNTS=SQLAdministrator

    Listing 9-5

    Rebuilding System Databases

    ```


    As mentioned, when this action is complete, ideally we restore the latest copy
    of the Master database from a backup. Since we do not have one, we need to reattach
    our `Chapter9` database in order to continue. Additionally, the detail of the
    corrupt page within the `suspect_pages` table will also be lost. Attempting to
    read the `CorruptTable` table in the `Chapter9` database causes this data to be
    repopulated, however. The script in Listing [9-6](#333037_2_En_9_Chapter.xhtml#PC6)
    reattaches the `Chapter9` database. You should change the file paths to match
    your own configuration before you run the script.


    ```

    CREATE DATABASE Chapter9 ON

    ( FILENAME = N''F:\MSSQL\DATA\Chapter9.mdf'' ),

    ( FILENAME = N''F:\MSSQL\DATA\Chapter9_log.ldf'' )

    FOR ATTACH ;

    Listing 9-6

    Reattaching a Database

    ```'
