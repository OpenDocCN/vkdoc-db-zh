    Listing 9-10

    Repairing Corruption with DBCC CHECKDB

    ```


    The partial results in Figure [9-11](#333037_2_En_9_Chapter.xhtml#Fig11) show
    that the errors in `CorruptTable` have been fixed. It also shows that the page
    has been deallocated. This means that we have lost all data on the page.


    ![../images/333037_2_En_9_Chapter/333037_2_En_9_Fig11_HTML.jpg](images/333037_2_En_9_Chapter/333037_2_En_9_Fig11_HTML.jpg)


    Figure 9-11


    Results of repairing corruption with DBCC CHECKDB


    If we query the `msdb.dbo.suspect_pages` table again using the same query as demonstrated
    in Listing [9-4](#333037_2_En_9_Chapter.xhtml#PC4), we see that the `Event` column
    has been updated to state that the page has been deallocated. We can also see
    that the `error_count` column has been incremented every time we accessed the
    page, through either `SELECT` statements or `DBCC CHECKDB`. These results are
    displayed in Figure [9-12](#333037_2_En_9_Chapter.xhtml#Fig12).


    ![../images/333037_2_En_9_Chapter/333037_2_En_9_Fig12_HTML.jpg](images/333037_2_En_9_Chapter/333037_2_En_9_Fig12_HTML.jpg)


