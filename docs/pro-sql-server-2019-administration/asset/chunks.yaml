    要执行与通过 SSMS 执行的相同还原操作，我们使用清单 12-10 中的命令。在运行脚本前，请将备份设备的路径更改为符合你自身配置的路径。


    ```

    USE master

    GO

    --备份日志尾部

    BACKUP LOG Chapter12

    TO  DISK = N''H:\MSSQL\Backup\Chapter12_LogBackup_2012-02-16_12-17-49.bak''

    WITH NOFORMAT,

    NAME = N''Chapter12_LogBackup_2012-02-16_12-17-49'',

    NORECOVERY,

    STATS = 5 ;

    --还原完整备份

    RESTORE DATABASE Chapter12

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12.bak''

    WITH  FILE = 1,

    NORECOVERY,

    STATS = 5 ;

    --还原差异备份

    RESTORE DATABASE Chapter12

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12.bak''

    WITH  FILE = 2,

    NORECOVERY,

    STATS = 5 ;

    --还原事务日志

    RESTORE LOG Chapter12

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12.bak''

    WITH  FILE = 3,

    STATS = 5 ;

    GO

    清单 12-10

    还原数据库

    ```


    ## 还原到时间点


    为了演示将数据库还原到某个时间点，我们首先进行一系列备份，并在每次备份之间操作数据。清单 12-11 中的脚本首先创建 `Chapter12` 数据库的基础完整备份。然后在进行事务日志备份之前，向
    `Addresses` 表插入一些行。接着，在截断该表之前，再向 `Addresses` 表插入一些行；最后，再进行一次事务日志备份。


    ```

    USE Chapter12

    GO

    BACKUP DATABASE Chapter12

    TO  DISK = ''H:\MSSQL\Backup\Chapter12PointinTime.bak''

    WITH  RETAINDAYS = 90

    , FORMAT

    , INIT, SKIP

    , MEDIANAME = ''Chapter12Point-in-time''

    , NAME = ''Chapter12-Full Database Backup''

    , COMPRESSION ;

    INSERT INTO dbo.Addresses

    VALUES(''1 Carter Drive'', ''Hedge End'', ''Southampton'', ''SO32 6GH'')

    ,(''10 Apress Way'', NULL, ''London'', ''WC10 2FG'') ;

    BACKUP LOG Chapter12

    TO  DISK = ''H:\MSSQL\Backup\Chapter12PointinTime.bak''

    WITH  RETAINDAYS = 90

    , NOINIT

    , MEDIANAME = ''Chapter12Point-in-time''

    , NAME = ''Chapter12-Log Backup''

    , COMPRESSION ;

    INSERT INTO dbo.Addresses

    VALUES(''12 SQL Street'', ''Botley'', ''Southampton'', ''SO32 8RT'')

    ,(''19 Springer Way'', NULL, ''London'', ''EC1 5GG'') ;

    TRUNCATE TABLE dbo.Addresses ;

    BACKUP LOG Chapter12

    TO  DISK = ''H:\MSSQL\Backup\Chapter12PointinTime.bak''

    WITH  RETAINDAYS = 90

    , NOINIT

    , MEDIANAME = ''Chapter12Point-in-time''

    , NAME = ''Chapter12-Log Backup''

    , COMPRESSION ;

    GO

    清单 12-11

    准备 Chapter12 数据库

    ```


    设想在这个脚本中发生的一系列事件之后，我们发现 `Addresses` 表被错误地截断了，需要将其还原到紧接这次截断操作发生之前的点。为此，我们需要知道截断的确切时间，并还原到该日期/时间之前，或者更精确地说，我们需要找到发生截断操作的事务的
    LSN，并还原到该事务之前。在这个演示中，我们选择后一种方法。


    我们可以使用一个名为 `sys.fn_dump_dblog()` 的系统函数来显示包含第二个 INSERT 语句和表截断操作的最后一个日志备份的内容。该过程接受多达
    68 个参数，并且**没有一个参数可以省略！**


    第一和第二个参数允许你指定一个开始和结束的 LSN，用于筛选结果。这两个参数都可以设置为 `NULL` 以返回备份中的所有条目。第三个参数指定备份集是磁盘还是磁带，而第四个参数指定设备内备份集的序列
    ID。接下来的 64 个参数接受介质集内的备份设备名称。如果介质集包含的设备少于 64 个，那么对于任何不需要的参数，你应使用 `DEFAULT` 值。


    清单 12-12 中的脚本使用了未公开的 `fn_dump_dblog()` 系统函数来识别发生截断操作的自动提交事务的起始 LSN。这个函数的问题在于，它返回的
    LSN 格式与 `RESTORE` 命令所需的格式不同。因此，计算列 `ConvertedLSN` 将 LSN 的三个部分从二进制转换为十进制，根据需要填充零，最后将它们连接回一起，生成一个可以传递给
    `RESTORE` 操作的 LSN。


    ```

    SELECT

    CAST(

    CAST(

    CONVERT(VARBINARY, ''0x''

    + RIGHT(REPLICATE(''0'', 8)

    + SUBSTRING([Current LSN], 1, 8), 8), 1

    ) AS INT

    ) AS VARCHAR(11)

    ) +

    RIGHT(REPLICATE(''0'', 10) +

    CAST(

    CAST(

    CONVERT(VARBINARY, ''0x''

    + RIGHT(REPLICATE(''0'', 8)

    + SUBSTRING([Current LSN], 10, 8), 8), 1

    ) AS INT

    ) AS VARCHAR(10)), 10) +

    RIGHT(REPLICATE(''0'',5) +

    CAST(

    CAST(CONVERT(VARBINARY, ''0x''

    + RIGHT(REPLICATE(''0'', 8)

    + SUBSTRING([Current LSN], 19, 4), 8), 1

    ) AS INT

    ) AS VARCHAR

    ), 5) AS ConvertedLSN

    ,*

    FROM

    sys.fn_dump_dblog (

    NULL, NULL, N''DISK'', 3, N''H:\MSSQL\Backup\Chapter12PointinTime.bak''

    DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT,

    DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT,

    DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT,

    DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT,

    DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT,

    DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT,

    DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT,

    DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT,

    DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT)

    WHERE [Transaction Name] = ''TRUNCATE TABLE'' ;

    清单 12-12

    查找截断操作的 LSN

    ```


    既然我们已经找到了截断 `Addresses` 表的事务的 LSN，我们就可以将 `Chapter12` 数据库还原到这个时间点。清单 12-13 中的脚本完整地还原了完整备份和第一个事务日志备份。然后还原最后一个事务日志，但使用
    `STOPBEFOREMARK` 参数来指定不应还原的第一个 LSN。在运行脚本前，请根据你自己的配置更改备份设备的位置。你还应该将 LSN 替换为你使用
    `sys.fn_dump_dblog()` 生成的 LSN。


    ```

    USE master

    GO

    RESTORE DATABASE Chapter12

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12PointinTime.bak''

    WITH  FILE = 1

    ,  NORECOVERY

    ,  STATS = 5

    , REPLACE ;

    RESTORE LOG Chapter12

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12PointinTime.bak''

    WITH  FILE = 2

    ,  NORECOVERY

    ,  STATS = 5

    , REPLACE ;

    RESTORE LOG Chapter12

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12PointinTime.bak''

    WITH  FILE = 3

    ,  STATS = 5

    , STOPBEFOREMARK = ''lsn:35000000036000001''

    , RECOVERY

    , REPLACE ;

    清单 12-13

    还原到时间点

    ```


    ## 还原文件和页面


    能够还原文件组、文件甚至页面，使你在灾难恢复场景中拥有极大的控制力和灵活性。以下部分演示如何执行文件还原和页面还原。

    '
- fmt: '### Restoring a File


    You may come across situations in which only some files or filegroups within the
    database are corrupt. If this is the case, then it is possible to restore just
    the corrupt file, assuming you have the complete log chain available, between
    the point when you took the file or filegroup backup and the end of the log. In
    order to demonstrate this functionality, we first insert some rows into the `Contacts`
    table of the `Chapter12` database before we back up the primary filegroup and
    `FileGroupA`. We then insert some rows into the `Addresses` table, which resides
    on `FileGroupB`, before we take a transaction log backup. These tasks are performed
    by the script in Listing [12-14](#333037_2_En_12_Chapter.xhtml#PC14).


    ```sql

    INSERT INTO dbo.Contacts

    VALUES(''Peter'', ''Carter'', 1),

    (''Danielle'', ''Carter'', 1) ;

    BACKUP DATABASE Chapter12 FILEGROUP = N''PRIMARY'',  FILEGROUP = N''FileGroupA''

    TO  DISK = N''H:\MSSQL\Backup\Chapter12FileRestore.bak''

    WITH FORMAT

    , NAME = N''Chapter12-Filegroup Backup''

    , STATS = 10 ;

    INSERT INTO dbo.Addresses

    VALUES(''SQL House'', ''Server Buildings'', NULL, ''SQ42 4BY''),

    (''Carter Mansions'', ''Admin Road'', ''London'', ''E3 3GJ'') ;

    BACKUP LOG Chapter12

    TO  DISK = N''H:\MSSQL\Backup\Chapter12FileRestore.bak''

    WITH NOFORMAT

    , NOINIT

    ,  NAME = N''Chapter12-Log Backup''

    , NOSKIP

    , STATS = 10 ;

    ```

    Listing 12-14 Preparing the Database


    If we imagine that `Chapter12FileA` has become corrupt, we are able to restore
    this file, even though we do not have a corresponding backup for `Chapter12FileB`,
    and recover to the latest point in time by using the script in Listing [12-15](#333037_2_En_12_Chapter.xhtml#PC15).
    This script performs a file restore on the file `Chapter12FileA` before taking
    a tail-log backup of the transaction log and then finally applying all transaction
    logs in sequence. Before running this script, change the location of the backup
    devices to reflect your own configuration.


    ### Caution


    If we had not taken the tail-log backup, then we would no longer have been able
    to access the `Contacts` table (in `FileGroupB`), unless we had also been able
    to restore the `Chapter12FileB` file.


    ```sql

    USE master

    GO

    RESTORE DATABASE Chapter12 FILE = N''Chapter12FileA''

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12FileRestore.bak''

    WITH  FILE = 1

    , NORECOVERY

    , STATS = 10

    , REPLACE ;

    GO

    BACKUP LOG Chapter12

    TO  DISK = N''H:\MSSQL\Backup\Chapter12_LogBackup_2012-02-17_12-26-09.bak''

    WITH NOFORMAT

    , NOINIT

    ,  NAME = N''Chapter12_LogBackup_2012-02-17_12-26-09''

    , NOSKIP

    , NORECOVERY

    ,  STATS = 5 ;

    RESTORE LOG Chapter12

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12FileRestore.bak''

    WITH  FILE = 2

    , STATS = 10

    , NORECOVERY ;

    RESTORE LOG Chapter12

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12_LogBackup_2012-02-17_12-26-09.bak''

    WITH FILE = 1

    , STATS = 10

    , RECOVERY ;

    GO

    ```

    Listing 12-15 Restoring a File


    ### Restoring a Page


    If a page becomes corrupt, then it is possible to restore this page instead of
    restoring the complete file or even the database. This can significantly reduce
    downtime in a minor DR scenario. In order to demonstrate this functionality, we
    take a full backup of the `Chapter12` database and then use the undocumented `DBCC
    WRITEPAGE` to cause a corruption in one of the pages of our `Contacts` table.
    These steps are performed in Listing [12-16](#333037_2_En_12_Chapter.xhtml#PC16).


    ### Caution


    `DBCC WRITEPAGE` is used here for educational purposes only. It is undocumented,
    but also extremely dangerous. It should not ever be used on a production system
    and should only ever be used on any database with extreme caution.


    ```sql

    --Back up the database

    BACKUP DATABASE Chapter12

    TO  DISK = N''H:\MSSQL\Backup\Chapter12PageRestore.bak''

    WITH FORMAT

    , NAME = N''Chapter12-Full Backup''

    , STATS = 10 ;

    --Corrupt a page in the Contacts table

    ALTER DATABASE Chapter12 SET SINGLE_USER WITH NO_WAIT ;

    GO

    DECLARE @SQL NVARCHAR(MAX)

    SELECT @SQL = ''DBCC WRITEPAGE('' +

    (

    SELECT CAST(DB_ID(''Chapter12'') AS NVARCHAR)

    ) +

    '', '' +

    (

    SELECT TOP 1 CAST(file_id AS NVARCHAR)

    FROM dbo.Contacts

    CROSS APPLY sys.fn_PhysLocCracker(%%physloc%%)

    ) +

    '', '' +

    (

    SELECT TOP 1 CAST(page_id AS NVARCHAR)

    FROM dbo.Contacts

    CROSS APPLY sys.fn_PhysLocCracker(%%physloc%%)

    ) +

    '', 2000, 1, 0x61, 1)'' ;

    EXEC(@SQL) ;

    ALTER DATABASE Chapter12 SET MULTI_USER ;

    GO

    ```

    Listing 12-16 Preparing the Database


    If we attempt to access the `Contacts` table after running the script, we receive
    the error message warning us of a logical consistency-based I/O error, and the
    statement fails. The error message also provides details of the page that is corrupt,
    which we can use in our `RESTORE` statement. To resolve this, we can run the script
    in Listing [12-17](#333037_2_En_12_Chapter.xhtml#PC17). The script restores the
    corrupt page before taking a tail-log backup, and then finally it applies the
    tail of the log. Before running the script, modify the location of the backup
    devices to reflect your configuration. You should also update the `PageID` to
    reflect the page that is corrupt in your version of the `Chapter12` database.
    Specify the page to be restored in the format `FileID:PageID`.


    ### Tip


    The details of the corrupt page can also be found in `MSDB.dbo.suspect_pages`.


    ```sql

    USE Master

    GO

    RESTORE DATABASE Chapter12 PAGE=''3:8''

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12PageRestore.bak''

    WITH  FILE = 1

    , NORECOVERY

    ,  STATS = 5 ;

    BACKUP LOG Chapter12

    TO  DISK = N''H:\MSSQL\Backup\Chapter12_LogBackup_2012-02-17_16-47-46.bak''

    WITH NOFORMAT, NOINIT

    , NAME = N''Chapter12_LogBackup_2012-02-17_16-32-46''

    , NOSKIP

    , STATS = 5 ;

    RESTORE LOG Chapter12

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12_LogBackup_2012-02-17_16-47-46.bak''

    WITH  STATS = 5

    , RECOVERY ;

    GO

    ```

    Listing 12-17 Restoring a Page'
