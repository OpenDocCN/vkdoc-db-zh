- fmt: "#### Automatic Page Repair\n\nIf a page becomes corrupt in a database configured\
    \ as a replica in an AlwaysOn Availability Group topology, then SQL Server attempts\
    \ to fix the corruption by obtaining a copy of the pages from one of the secondary\
    \ replicas. This means that a logical corruption can be resolved without you needing\
    \ to perform a restore or to run `DBCC CHECKDB` with a repair option. However,\
    \ automatic page repair does not work for the following page types:\n\n*   File\
    \ Header page\n*   Database Boot page\n*   Allocation pages\n    *   GAM (Global\
    \ Allocation Map)\n    *   SGAM (Shared Global Allocation Map)\n    *   PFS (Page\
    \ Free Space)\n\nIf the primary replica fails to read a page because it is corrupt,\
    \ it first logs the page in the `MSDB.dbo.suspect_pages` table. It then checks\
    \ that at least one replica is in the `SYNCHRONIZED` state and that transactions\
    \ are still being sent to the replica. If these conditions are met, then the primary\
    \ sends a broadcast to all replicas, specifying the `PageID` and LSN (log sequence\
    \ number) at the end of the flushed log. The page is then marked as restore pending,\
    \ meaning that any attempts to access it will fail, with error code 829.\n\nAfter\
    \ receiving the broadcast, the secondary replicas wait, until they have redone\
    \ transactions up to the LSN specified in the broadcast message. At this point,\
    \ they try to access the page. If they cannot access it, they return an error.\
    \ If they `can` access the page, they send the page back to the primary replica.\
    \ The primary replica accepts the page from the first secondary to respond.\n\n\
    The primary replica will then replace the corrupt copy of the page with the version\
    \ that it received from the secondary replica. When this process completes, it\
    \ updates the page in the `MSDB.dbo.suspect_pages` table to reflect that it has\
    \ been repaired by setting the `event_type` column to a value of `5 (Repaired)`.\n\
    \nIf the secondary replica fails to read a page while redoing the log because\
    \ it is corrupt, it places the secondary into the `SUSPENDED` state. It then logs\
    \ the page in the `MSDB.dbo.suspect_pages` table and requests a copy of the page\
    \ from the primary replica. The primary replica attempts to access the page. If\
    \ it is inaccessible, then it returns an error and the secondary replica remains\
    \ in the `SUSPENDED` state.\n\nIf it can access the page, then it sends it to\
    \ the secondary replica that requested it. The secondary replica replaces the\
    \ corrupt page with the version that it obtained from the primary replica. It\
    \ then updates the `MSDB.dbo.suspect_pages` table with an `event_id` of `5`. Finally,\
    \ it attempts to resume the AOAG session.\n\n### Note\n\nIt is possible to manually\
    \ resume the session, but if you do, the corrupt page is hit again during the\
    \ synchronization. Make sure you repair or restore the page on the primary replica\
    \ first.\n\n### Log Shipping\n\nLog shipping is a technology that you can use\
    \ to implement disaster recovery. It works by backing up the transaction log on\
    \ the principle server, copying it to the secondary server, and then restoring\
    \ it. It is most appropriate to use log shipping in DR scenarios in which you\
    \ require a load delay, because this is not possible with AOAG. As an example\
    \ of where a load delay may be useful, consider a scenario in which a user accidently\
    \ deletes all of the data from a table. If there is a delay before the database\
    \ on the DR server is updated, then it is possible to recover the data for this\
    \ table, from the DR server, and then repopulate the production server. This means\
    \ that you do not need to restore a backup to recover the data. Log shipping is\
    \ not appropriate for high availability, since there is no automatic failover\
    \ functionality. The diagram in Figure [13-7](#333037_2_En_13_Chapter.xhtml#Fig7)\
    \ illustrates a log shipping topology.\n\n![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig7_HTML.png](images/333037_2_En_13_Chapter/333037_2_En_13_Fig7_HTML.png)\n\
    \nFigure 13-7: Log Shipping topology\n\n### Recovery Modes\n\nIn a log shipping\
    \ topology, there is always exactly one principle server, which is the production\
    \ server. It is possible to have multiple secondary servers, however, and these\
    \ servers can be a mix of DR servers and servers used to offload reporting.\n\n\
    When you restore a transaction log, you can specify three recovery modes: Recovery,\
    \ NoRecovery, and Standby. The Recovery mode brings the database online, which\
    \ is not supported with Log Shipping. The NoRecovery mode keeps the database offline\
    \ so that more backups can be restored. This is the normal configuration for log\
    \ shipping and is the appropriate choice for DR scenarios.\n\nThe Standby option\
    \ brings the database online, but in a read-only state so that you can restore\
    \ further backups. This functionality works by maintaining a `TUF` (Transaction\
    \ Undo File). The `TUF` file records any uncommitted transactions in the transaction\
    \ log. This means that you can roll back these uncommitted transactions in the\
    \ transaction log, which allows the database to be more accessible (although it\
    \ is read-only). The next time a restore needs to be applied, you can reapply\
    \ the uncommitted transaction in the `TUF` file to the log before the redo phase\
    \ of the next log restore begins.\n\nFigure [13-8](#333037_2_En_13_Chapter.xhtml#Fig8)\
    \ illustrates a log shipping topology that uses both a DR server and a reporting\
    \ server.\n\n![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig8_HTML.png](images/333037_2_En_13_Chapter/333037_2_En_13_Fig8_HTML.png)\n\
    \nFigure 13-8: Log shipping with DR and reporting servers\n\n### Remote Monitor\
    \ Server\n\nOptionally, you can configure a monitor server in your log shipping\
    \ topology. This helps you centralize monitoring and alerting. When you implement\
    \ a monitor server, the history and status of all backup, copy, and restore operations\
    \ are stored on the monitor server. A monitor server also allows you to have a\
    \ single alert job, which is configured to monitor the backup, copy, and restore\
    \ operations on all servers, as opposed to it needing separate alerts on each\
    \ server in the topology.\n\n### Caution\n\nIf you wish to use a monitor server,\
    \ it is important to configure it when you set up log shipping. After log shipping\
    \ has been configured, the only way to add a monitor server is to tear down and\
    \ reconfigure log shipping.\n\n### Failover\n\nUnlike other high availability\
    \ and disaster recovery technologies, an amount of administrative effort is associated\
    \ with failing over log shipping. To fail over log shipping, you must back up\
    \ the tail end of the transaction log, and copy it, along with any other uncopied\
    \ backup files, to the secondary server.\n\nYou now need to apply the remaining\
    \ transaction log backups to the secondary server in sequence, finishing with\
    \ the tail-log backup. You apply the final restore using the `WITH RECOVERY` option\
    \ to bring the database back online in a consistent state. If you are not planning\
    \ to fail back, you can reconfigure log shipping with the secondary server as\
    \ the new primary server.\n\n### Note\n\nLog shipping is discussed in further\
    \ detail in Chapter [15](#333037_2_En_15_Chapter.xhtml). Backups and restores\
    \ are discussed in further detail in Chapter [12](#333037_2_En_12_Chapter.xhtml)."
