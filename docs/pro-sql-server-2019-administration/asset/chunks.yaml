- fmt: '### Monitoring


    监控日志传送拓扑最重要的方面是确保备份在主服务器上执行，并在辅助服务器上被还原。因此，在本章中配置日志传送时，我们调整了备份和还原的可接受阈值，并在监控服务器上创建了服务器代理警报。然而，要使这些警报有用，我们需要为它们配置一个操作员来接收通知。


    在监控服务器上，我们配置了两个警报。第一个名为 **Log Shipping Primary Server Alert**，查看其属性的 **General**
    选项卡时，可以看到它被配置为响应 `Error 14420`，如图 [15-11](#333037_2_En_15_Chapter.xhtml#Fig11)
    所示。`Error 14420` 表示在定义的时限内未对主数据库进行备份。


    ![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig11_HTML.jpg](images/333037_2_En_15_Chapter/333037_2_En_15_Fig11_HTML.jpg)

    图 15-11: **General** 选项卡


    在 **Response** 选项卡（如图 [15-12](#333037_2_En_15_Chapter.xhtml#Fig12) 所示）中，我们需要配置一个操作员来接收警报。你可以使用
    **New Operator** 按钮配置一个新操作员，或者像我们这样，只需在列表中为相应的操作员选择适当的通知通道。你还可以选择运行一个 SQL Server
    代理作业来尝试修复该状况。


    ![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig12_HTML.jpg](images/333037_2_En_15_Chapter/333037_2_En_15_Fig12_HTML.jpg)

    图 15-12: **Response** 选项卡


    你应该以配置 **Log Shipping Primary Server Alert** 的相同方式来配置 **Log Shipping Secondary
    Server Alert**。辅助服务器警报的工作方式相同，只是它监控的是 `Error 14421` 而不是 `14420`。`Error 14421`
    表示在时限内未将事务日志还原到辅助服务器。


    可以从 **SQL Server Management Studio** 运行日志传送报告。在监控服务器上运行时，它会显示主服务器和每个辅助服务器的状态。在主服务器上运行时，它会基于备份作业显示每个数据库的状态，并包含每个辅助服务器的一行信息。在灾难恢复服务器上运行时，它会基于还原作业显示每个数据库的状态。你可以通过调用实例的上下文菜单，依次选择
    **Reports** -> **Standard Reports**，然后选择 **Transaction Log Shipping Status** 报告来访问该报告。


    图 [15-13](#333037_2_En_15_Chapter.xhtml#Fig13) 展示了在主服务器上运行的报告。你可以看到备份作业的状态已设置为
    **Alert**，并且文本以红色高亮显示。这表明主数据库上成功备份的阈值已被突破。在我们的案例中，我们通过禁用备份作业模拟了这种情况。我们本可以通过使用
    `sp_help_log_shipping_monitor` 存储过程获得相同的信息。


    ![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig13_HTML.jpg](images/333037_2_En_15_Chapter/333037_2_En_15_Fig13_HTML.jpg)

    图 15-13: **Log Shipping** 报告


    ## Summary


    日志传送是一种可用于为数据库实现灾难恢复的技术。它通过备份主数据库的事务日志、将其复制到辅助服务器，然后将其还原来同步数据。如果使用 `STANDBY` 选项还原日志，那么未提交的事务将存储在一个事务撤消文件中，你可以在后续备份之前重新应用它们。这意味着你可以将数据库联机为只读模式以进行报告。然而，如果使用
    `NORECOVERY` 选项还原日志，那么服务器就为灾难恢复调用做好了准备，但数据库处于脱机状态。


    将数据库故障转移到辅助服务器涉及备份事务日志的尾端，然后将所有未完成的日志备份应用到辅助数据库，最后通过使用 `RECOVERY` 选项执行最终还原来使数据库联机。如果你希望切换服务器角色，则需要禁用当前的日志传送作业，重新配置日志传送使辅助服务器现在成为主服务器，然后重新配置监控。然而，在后续故障转移之后，切换角色会变得更容易，因为你可以简单地禁用和启用日志传送所使用的相应
    **SQL Server Agent** 作业。


    要监控日志传送拓扑的运行状况，你应该配置日志传送警报，并添加一个在警报触发时将收到通知的操作员。主服务器的警报监控 `Error 14420`，这表示已超出备份阈值。辅助服务器的警报监控
    `Error 14421`，这表示已超出还原阈值。


    提供了一个日志传送报告；它返回有关主数据库、辅助数据库或拓扑中所有服务器的数据，具体取决于它是从主服务器、辅助服务器还是监控服务器调用的。相同的信息可以从
    `sp_help_log_shipping_monitor` 存储过程获得。


    # 16. Scaling Workloads


    SQL Server 提供了多种技术，允许数据库管理员在多个数据库之间水平扩展其工作负载以避免锁争用，或在服务器之间水平扩展以分散资源利用率。这些技术包括数据库快照、复制和
    **AlwaysOn** 可用性组。本章讨论这些技术的注意事项并演示如何实施它们。'
  raw: '### Monitoring


    The most important aspect of monitoring your Log Shipping topology is ensuring
    that the backups are occurring on the primary and being restored on the secondary.
    For this reason, when we configure log shipping in this chapter, we tweak the
    acceptable thresholds for backups and restores, and Server Agent Alerts are created
    on the monitor server. Before these alerts are useful, however, we need to configure
    them with an operator to notify.


    On the monitor server, we have configured two alerts. The first is called Log
    Shipping Primary Server Alert, and when you view the General tab of this alert’s
    properties, you see that it is configured to respond to Error 14420, as shown
    in Figure [15-11](#333037_2_En_15_Chapter.xhtml#Fig11). Error 14420 indicates
    that a backup has not been taken of the primary database within the defined threshold.


    ![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig11_HTML.jpg](images/333037_2_En_15_Chapter/333037_2_En_15_Fig11_HTML.jpg)


    Figure 15-11


    The General tab


    On the Response tab, displayed in Figure [15-12](#333037_2_En_15_Chapter.xhtml#Fig12),
    we need to configure an operator to receive the alerts. You can either use the
    New Operator button to configure a new operator or, as in our case, simply select
    the appropriate notification channel for the appropriate operator(s) in the list.
    You can also elect to run a SQL Server Agent job, which attempts to remediate
    the condition.


    ![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig12_HTML.jpg](images/333037_2_En_15_Chapter/333037_2_En_15_Fig12_HTML.jpg)


    Figure 15-12


    The Response tab


    You should configure the Log Shipping Secondary Server Alert in the same way you
    configured the Log Shipping Primary Server Alert. The secondary server alert works
    in the same way, except that it is monitoring for Error 14421 instead of 14420\.
    Error 14421 indicates that a transaction log has not been restored to the secondary
    server within the threshold period.


    The log shipping report can be run from SQL Server Management Studio, and when
    you run it on the monitor server, it displays the status of the primary server
    and each secondary server. When run on the primary server, it shows the status
    of each database based on the backup jobs and includes a line for each secondary.
    When run on the DR server, it shows the status of each database based on the restore
    jobs. You can access the report by invoking the context menu of the instance and
    drilling through Reports ➤ Standard Reports, before selecting the Transaction
    Log Shipping Status report.


    Figure [15-13](#333037_2_En_15_Chapter.xhtml#Fig13) illustrates the report when
    run against the primary server. You can see that the status of the backup jobs
    has been set to Alert and the text has been highlighted in red. This indicates
    that the threshold for a successful backup has been breached on the primary database.
    In our case, we simulated this by disabling the backup job. We could have obtained
    the same information by using the `sp_help_log_shipping_monitor` stored procedure.


    ![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig13_HTML.jpg](images/333037_2_En_15_Chapter/333037_2_En_15_Fig13_HTML.jpg)


    Figure 15-13


    The Log Shipping report


    ## Summary


    Log shipping is a technology that you can use to implement DR for databases. It
    synchronizes data by backing up the transaction log of the primary database, copying
    it to a secondary server, and then restoring it. If the log is restored with `STANDBY`,
    then uncommitted transactions are stored in a Transaction Undo File, and you can
    reapply them before subsequent backups. This means that you can bring the database
    online in read-only mode for reporting. If the logs are restored with `NORECOVERY`,
    however, then the servers are ready for a DR invocation, but the databases are
    in an offline state.


    Failing over a database to a secondary server involves backing up the tail end
    of the transaction log and then applying any outstanding log backups to the secondary
    database, before finally bringing the database online by issuing the final restore
    with `RECOVERY`. If you wish to switch the server roles, then you need to disable
    the current log shipping jobs, reconfigure log shipping so that the secondary
    server is now the primary, and then reconfigure monitoring. After subsequent failovers,
    however, switching the roles becomes easier, because you are able to simply disable
    and enable the appropriate SQL Server Agent jobs used by log shipping.


    To monitor the health of your Log Shipping topology, you should configure the
    log shipping alerts and add an operator who will be notified if the alert fires.
    The alert for the primary server is monitoring for Error 14420, which means that
    the backup threshold has been exceeded. The alert for the secondary server(s)
    monitors for Error 14421, which indicates that the restore threshold has been
    exceeded.


    A log shipping report is available; it returns data about the primary databases,
    the secondary databases, or all servers in the topology, depending on whether
    it is invoked from the primary server, the secondary server, or the monitor server,
    respectively. The same information can be obtained from the `sp_help_log_shipping_monitor`
    stored procedure.


    # 16. Scaling Workloads


    SQL Server provides multiple technologies that allow DBAs to horizontally scale
    their workloads between multiple databases to avoid lock contention or to scale
    them horizontally between servers to spread resource utilization. These technologies
    include database snapshots, replication, and AlwaysOn Availability Groups. This
    chapter discusses the considerations for these technologies and demonstrates how
    to implement them.'
