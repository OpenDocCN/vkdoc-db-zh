- fmt: '#### Corruption of the Resource Database or Binaries


    It is possible for the instance itself to become corrupt. This can include corrupt
    Registry keys or the Resource database becoming corrupt. If this happens, then
    find the repair utility that ships with the SQL Server installation media. To
    invoke this tool, select `Repair` from the `Maintenance` tab of the `SQL Server
    Installation Center`.


    After the wizard has run the appropriate rule checks, you are presented with the
    Select Instance page, as illustrated in Figure [9-4](#333037_2_En_9_Chapter.xhtml#Fig4).


    ![../images/333037_2_En_9_Chapter/333037_2_En_9_Fig4_HTML.jpg](images/333037_2_En_9_Chapter/333037_2_En_9_Fig4_HTML.jpg)

    *Figure 9-4. The Select Instance page*


    After you select the instance that needs to be repaired, the following page of
    the wizard runs an additional rule check to ensure that the required features
    can be repaired. Finally, on the `Ready To Repair` page, you see a summary of
    the actions that are to be performed. After choosing to repair, you see the repair
    progress report. Once the repair completes, a `Summary` page displays, which provides
    you with the status of each operation that was performed and also a link to a
    log file that you may wish to review if you need to perform troubleshooting.


    As an alternative to using `SQL Server Installation Center`, you can achieve the
    same rebuild from the command line. This is useful if your instance is running
    on Windows Server Core. When you are repairing an instance from the command line,
    the parameters available to you are those listed in Table [9-4](#333037_2_En_9_Chapter.xhtml#Tab4).
    Because the `Master` database is not being rebuilt when you are repairing an instance,
    you do not need to specify a collation or Administrator details.


    *Table 9-4. Instance Repair Parameters*


    | Parameter | Description |

    | --- | --- |

    | `/ACTION` | Specifies `Repair` for the action parameter. |

    | `/INSTANCENAME` | Specifies the instance name of the instance that contains
    the corrupt system database. |

    | `/Q` | This parameter is quiet. Use this to run without any user interaction.
    |

    | `/ENU` | An optional parameter that you can use on a localized operating system
    to specify that the English version of SQL Server should be used. |

    | `/FEATURES` | An optional parameter you can use to specify a list of components
    to repair. |

    | `/HIDECONSOLE` | An optional parameter that causes the console to be suppressed.
    |


    The PowerShell command in Listing [9-7](#333037_2_En_9_Chapter.xhtml#PC7) also
    rebuilds the `PROSQLADMIN` instance. This script also works for instances hosted
    on Windows Server Core.


    ```

    .\setup.exe /ACTION=repair /INSTANCENAME=PROSQLADMIN /q

    ```

    *Listing 9-7. Repairing an Instance*


    ### DBCC CHECKDB


    `DBCC CHECKDB` is a utility that can be used to both discover corruption and also
    fix the errors. When you run `DBCC CHECKDB`, by default it creates a database
    snapshot and runs the consistency checks against this snapshot. This provides
    a transactionally consistent point from which the checks can occur while at the
    same time reducing contention in the database. It can check multiple objects in
    parallel to improve performance, but this depends on the number of cores that
    are available and the `MAXDOP` setting of the instance.


    #### Checking for Errors


    When you run `DBCC CHECKDB` for the purpose of discovering corruption only, then
    you can specify the arguments, detailed in Table [9-5](#333037_2_En_9_Chapter.xhtml#Tab5).


    *Table 9-5. DBCC CHECKDB Arguments*


    | Argument | Description |

    | --- | --- |

    | `NOINDEX` | Specifies that integrity checks should be performed on heap and
    clustered index structures but not on nonclustered indexes. |

    | `EXTENDED_LOGICAL_CHECKS` | Forces the logical consistency of XML indexes, indexed
    views, and spatial indexes to be performed. |

    | `NO_INFOMSGS` | Prevents informational messages from being returned in the results.
    This can reduce noise when you are searching for an issue, since only errors and
    warnings with a severity level greater than 10 are returned. |

    | `TABLOCK` | `DBCC CHECKDB` creates a database snapshot and runs its consistency
    checks against this structure to avoid taking out locks in the database, which
    cause contention. Specifying this option changes that behavior so that instead
    of creating a snapshot, SQL Server takes out a temporary exclusive lock on the
    database, followed by exclusive locks on the structures that it is checking. In
    the event of high write load, this can reduce the time it takes to run `DBCC CHECKDB`,
    but at the expense of contention with other processes that may be running. It
    also causes the system table metadata validation and service broker validation
    to be skipped. |

    | `ESTIMATEONLY` | When this argument is specified, no checks are performed. The
    only thing that happens is that the space required in `TempDB` to perform the
    checks is calculated based on the other arguments specified. |

    | `PHYSICAL_ONLY` | When this argument is used, `DBCC CHECKDB` is limited to performing
    allocation consistency checks on the database, consistency checks on system catalogs,
    and validation on each page of every table within the database. This option cannot
    be used in conjunction with `DATA_PURITY`. |

    | `DATA_PURITY` | Specifies that column integrity checks are carried out, such
    as ensuring that values are within their data type boundaries. For use with databases
    that have been upgraded from SQL Server 2000 or below only. For any newer databases,
    or SQL Server 2000 databases that have already been scanned with `DATA_PURITY`,
    the checks happen by default. |

    | `ALL_ERRORMSGS` | For backward compatibility only. Has no effect on SQL 2019
    databases. |


    `DBCC CHECKDB` is a very intensive process that can consume many CPU and IO resources.
    Therefore, it is advisable to run it during a maintenance window to avoid performance
    issues for applications. The Database Engine automatically decides how many CPU
    cores to assign the `DBCC CHECKDB` based on the instance level setting for `MAXDOP`
    and the amount of throughput to the server when the process begins. If you expect
    load to increase during the window when `DBCC CHECKDB` will be running, however,
    then you can throttle the process to a single core by turning on Trace Flag 2528.
    This flag should be used with caution, however, because it causes `DBCC CHECKDB`
    to take much longer to complete. If a snapshot is not generated, either because
    you have specified `TABLOCK` or because there was not enough space on disk to
    generate a snapshot, then it also causes each table to be locked for a much longer
    period.


    The sample in Listing [9-8](#333037_2_En_9_Chapter.xhtml#PC8) does not perform
    any checks but calculates the amount of space required in `TempDB` in order for
    `DBCC CHECKDB` to run successfully against the `Chapter9` database.


    ```

    USE Chapter9

    GO

    DBCC CHECKDB WITH ESTIMATEONLY ;

    ```

    *Listing 9-8. Checking TempDB Space Required for DBCC CHECKDB*


    Because our `Chapter9` database is tiny, we only require less than half a megabyte
