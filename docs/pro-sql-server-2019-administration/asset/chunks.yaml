- fmt: '### Caution


    If encrypting existing data, only ever perform the operation during a maintenance
    window, as DML statements against the table while encryption is in progress could
    potentially result in data loss.


    We will now use PowerShell to demonstrate how a client may insert data into encrypted
    columns. Note that the connection string includes the `Column Encryption Setting`.
    The technique is demonstrated in Listing 11-20.


    ```powershell

    #Create a SqlConnection object, specifying Column Encryption Setting = enabled

    $sqlConn = New-Object System.Data.SqlClient.SqlConnection

    $sqlConn.ConnectionString = "Server=localhost\prosqladmin;Integrated Security=true;
    Initial Catalog=Chapter11AlwaysEncrypted; Column Encryption Setting=enabled;"

    #Open the connection

    $sqlConn.Open()

    #Create a SqlCommand object, and add the query and parameters

    $sqlcmd = New-Object System.Data.SqlClient.SqlCommand

    $sqlcmd.Connection = $sqlConn

    $sqlcmd.CommandText = "INSERT INTO dbo.CreditCards (CardType, CardNumber, ExpMonth,
    ExpYear, CustomerID) VALUES (@CardType, @CardNumber, @ExpMonth, @ExpYear, @CustomerID)"

    $sqlcmd.Parameters.Add((New-Object Data.SqlClient.SqlParameter("@CardType",[Data.SQLDBType]::nVarChar,20)))

    $sqlcmd.Parameters["@CardType"].Value = "SuperiorCard"

    $sqlcmd.Parameters.Add((New-Object Data.SqlClient.SqlParameter("@CardNumber",[Data.SQLDBType]::nVarChar,20)))

    $sqlcmd.Parameters["@CardNumber"].Value = "33332664695310"

    $sqlcmd.Parameters.Add((New-Object Data.SqlClient.SqlParameter("@ExpMonth",[Data.SQLDBType]::Int)))

    $sqlcmd.Parameters["@ExpMonth"].Value = "12"

    $sqlcmd.Parameters.Add((New-Object Data.SqlClient.SqlParameter("@ExpYear",[Data.SQLDBType]::Int)))

    $sqlcmd.Parameters["@ExpYear"].Value = "22"

    $sqlcmd.Parameters.Add((New-Object Data.SqlClient.SqlParameter("@CustomerID",[Data.SQLDBType]::Int)))

    $sqlcmd.Parameters["@CustomerID"].Value = "1"

    #Insert the data

    $sqlcmd.ExecuteNonQuery();

    #Close the connection

    $sqlConn.Close()

    ```

    Listing 11-20 Insert Data into Encrypted Columns


    ### Administering Keys


    As you would expect, metadata about keys is exposed through system tables and
    dynamic management views. Details regarding Column Master Keys can be found in
    the `sys.column_master_keys` table. The columns returned by this table are detailed
    in Table 11-6.


    Table 11-6 `sys.column_master_keys` Columns


    | Column | Description |

    | --- | --- |

    | Name | The name of the column master key. |

    | Column_master_key_id | The internal identifier of the column master key. |

    | Create_date | The date and time that the key was created. |

    | Modify_date | The date and time that the key was last modified. |

    | Key_store_provider_name | The type of key store provider, where the key is stored.
    |

    | Key_path | The path to the key, within the key store. |

    | Allow_enclave_computations | Specifies if the key is enclave enabled. |

    | Signature | A digital signature, combining `key_path` and `allow_enclave_computations`.
    This stops malicious administrators changing the key’s enclave-enabled setting.
    |


    The details of Column Encryption Keys can be found in the `sys.column_encryption_keys`
    system table. This table returns the columns detailed in Table 11-7.


    Table 11-7 Columns Returned by `sys.column_encryption_keys`


    | Name | Description |

    | --- | --- |

    | Name | The name of the column encryption key |

    | Column_encryption_key_id | The internal ID of the column encryption key |

    | Create_date | The date and time that the key was created |

    | Modify_date | The date and time that the key was last modified |


    An additional system table called `sys.column_encryption_key_values` provides
    a join between the `sys.column_master_keys` and `sys.column_encryption_keys` system
    tables while at the same time providing the encrypted value of the column encryption
    key, when encrypted by the column master key. Table 11-8 details the columns returned
    by this system table.


    Table 11-8 `sys.column_encryption_key_values` Columns


    | Name | Description |

    | --- | --- |

    | Column_encryption_key_id | The internal ID of the column encryption key |

    | Column_master_key_id | The internal ID of the column master key |

    | Encrypted_value | The encrypted value of the column encryption key |

    | Encrypted_algorithm_name | The algorithm used to encrypt the column encryption
    key |


    Therefore, we could use the query in Listing 11-21 to find all columns in a database
    that have been encrypted with enclave-enabled keys.


    ### Tip


    Remove the WHERE clause to return all columns that are secure with Always Encrypted,
    and determine which columns do and do not support secure enclaves.


    ```sql

    SELECT

    c.name AS ColumnName

    , OBJECT_NAME(c.object_id) AS TableName

    , cek.name AS ColumnEncryptionKey

    , cmk.name AS ColumnMasterKey

    , CASE

    WHEN cmk.allow_enclave_computations = 1

    THEN ''Yes''

    ELSE ''No''

    END AS SecureEnclaves

    FROM sys.columns c

    INNER JOIN sys.column_encryption_keys cek

    ON c.column_encryption_key_id = cek.column_encryption_key_id

    INNER JOIN sys.column_encryption_key_values cekv

    ON cekv.column_encryption_key_id = cek.column_encryption_key_id

    INNER JOIN sys.column_master_keys cmk

    ON cmk.column_master_key_id = cekv.column_master_key_id

    WHERE allow_enclave_computations = 1

    ```

    Listing 11-21 Return Details of Columns That Use Secure Enclaves


    It is not possible for an Administrator to toggle a key between enclave enabled
    and not enclave enabled. This is a conscious design decision by Microsoft, to
    protect against malicious Administrators. It is possible to rotate keys, however,
    and when rotating keys, you can rotate out a key that is not enclave enabled and
    replace it with one that is (or vice versa).


    ### Tip


    The following demonstration assumes that an additional column master key exists
    within the `Chapter11AlwaysEncrypted` database.


    The simplest way to rotate a key is by using SQL Server Management Studio. Drill
    through `Databases` -> `Chapter11AlwaysEncrypted` -> `Security` -> `Always Encrypted
    Keys` -> `Column Master Keys` and then select `Rotate` from the context menu of
    the key which you wish to rotate out. This will cause the Column Master Key Rotation
    dialog box to be displayed, as illustrated in Figure 11-5. Here, you can select
    the new key, which should be used to encrypt the underlying column encryption
    keys.


    ![../images/333037_2_En_11_Chapter/333037_2_En_11_Fig5_HTML.jpg](images/333037_2_En_11_Chapter/333037_2_En_11_Fig5_HTML.jpg)

    Figure 11-5 Column Master Key Rotation dialog box


    Now that the encryption keys have been re-encrypted using the new keys, the old
    key values need to be cleaned up. This can be achieved by selecting `Cleanup`
    from the context menu of the old column master key, causing the Column Master
    Key Cleanup dialog box to be invoked. This is illustrated in Figure 11-6.


    ![../images/333037_2_En_11_Chapter/333037_2_En_11_Fig6_HTML.jpg](images/333037_2_En_11_Chapter/333037_2_En_11_Fig6_HTML.jpg)

    Figure 11-6 Column Master Key Cleanup dialog box'
