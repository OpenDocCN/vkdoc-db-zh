    that was current at the start of the transaction by looking for the closest sequence
    number that is lower than the transaction’s own sequence number. This means that
    although other versions of the row may exist with modifications, it cannot see
    them, since the sequence numbers are higher. If two transactions try to update
    the same row at the same time, instead of a deadlock occurring, the second transaction
    throws error 3960 and the transaction is rolled back. The result of this behavior
    is that dirty reads, nonrepeatable reads, and phantom reads are not possible.


    The Read Committed Snapshot uses pessimistic concurrency for write operations
    and optimistic concurrency for read operations. For read operations, it uses the
    version of the row that is current at the beginning of each statement within the
    transaction, as opposed to the version that was current at the beginning of the
    transaction. This means that you achieve the same level of isolation as you would
    by using the pessimistic Read Committed isolation level.


    Unlike the pessimistic isolation levels, you need to turn on optimistic isolation
    levels at the database level. When you turn on Read Committed Snapshot, this replaces
    the functionality of Read Committed. This is important to bear in mind, because
    Read Committed Snapshot becomes your default isolation level and is used for all
    transactions that do not specifically set an isolation level. The script in Listing
    [18-4](#333037_2_En_18_Chapter.xhtml#PC4) demonstrates how to turn on Snapshot
    isolation and Read Committed Snapshot isolation for the `Chapter18` database.
    The script first checks to make sure that Read Committed and Read Committed Snapshot
    are not already enabled. If they are not, it kills any sessions that are currently
    connected to the `Chapter18` database before finally running the `ALTER DATABASE`
    statements.


    ```

    --Check if already enabled

    IF EXISTS (

    SELECT name

    ,snapshot_isolation_state_desc

    ,is_read_committed_snapshot_on

    FROM sys.databases

    WHERE name = ''Chapter18''

    AND snapshot_isolation_state_desc = ''OFF''

    AND is_read_committed_snapshot_on = 0 )

    BEGIN

    --Kill any existing sessions

    IF EXISTS(

    SELECT * FROM sys.dm_exec_sessions where database_id = DB_id(''Chapter18'')

    )

    BEGIN

    PRINT ''Killing Sessions to Chapter18 database''

    DECLARE @SQL NVARCHAR(MAX)

    SET @SQL = (SELECT ''KILL '' + CAST(Session_id AS NVARCHAR(3)) + ''; '' [data()]

    FROM sys.dm_exec_sessions

    WHERE database_id = DB_id(''Chapter18'')

    FOR XML PATH('''')

    )

    EXEC(@SQL)

    END

    PRINT ''Enabling Snapshot and Read Committed Sanpshot Isolation''

    ALTER DATABASE Chapter18

    SET ALLOW_SNAPSHOT_ISOLATION ON ;

    ALTER DATABASE Chapter18

    SET READ_COMMITTED_SNAPSHOT ON ;

    END

    ELSE

    PRINT ''Snapshot Isolation already enabled''

    Listing 18-4

    Turning On Optimistic Isolation

    ```


    #### Durable


    For a transaction to be durable, after it has been committed, it stays committed,
    even in a catastrophic event. This means that the change must be written to disk,
    since the change within memory will not withstand a power failure, a restart of
    the instance, and so on. SQL Server achieves this by using a process called write-ahead
    logging (WAL). This process flushes the log cache to disk at the point the transaction
    commits, and the commit only completes once this flush finishes.


    SQL Server relaxed these rules, however, by introducing a feature called delayed
    durability. This feature works by delaying the flush of the log cache to disk
    until one of the following events occurs:


    *   The log cache becomes full and automatically flushes to disk.


    *   A fully durable transaction in the same database commits.


    *   The `sp_flush_log` system stored procedure is run against the database.


    When delayed durability is used, the data is visible to other transactions as
    soon as the transaction commits; however, the data committed within the transaction
    could potentially be lost, if the instance goes down or is restarted, until the
    log records have been flushed. Support for delayed durability is configured at
    the database level, using one of the three options detailed in Table [18-10](#333037_2_En_18_Chapter.xhtml#Tab10).


    Table 18-10


    Support Levels for Delayed Durability


    | Support Level | Description |

    | --- | --- |

    | `ALLOWED` | Delayed durability is supported within the database and specified
    on a transaction level basis. |

    | `FORCED` | All transactions within the database will use delayed durability.
    |

    | `DISABLED` | The default setting. No transactions within the database are permitted
    to use delayed durability. |


    The command in Listing [18-5](#333037_2_En_18_Chapter.xhtml#PC5) shows how to
    allow delayed durability in the Chapter18 database.


    ```

    ALTER DATABASE Chapter18

    SET DELAYED_DURABILITY  = ALLOWED ;

    Listing 18-5

    Allowing Delayed Durability

    ```


    If a database is configured to allow delayed durability, then Full or Delayed
    durability is configured at the transaction level, in the `COMMIT` statement.
    The script in Listing [18-6](#333037_2_En_18_Chapter.xhtml#PC6) demonstrates how
    to commit a transaction with delayed durability.


    ```

    USE Chapter18

    GO

    BEGIN TRANSACTION

    UPDATE dbo.Customers

    SET DeliveryAddressID = 1

    WHERE CustomerID = 10 ;

    COMMIT WITH (DELAYED_DURABILITY = ON)

    Listing 18-6

    Committing with Delayed Durability

    ```


    ### Caution


    The most important thing to remember, when using delayed durability, is the potential
    for data loss. If any transactions have committed but the associated log records
    have not been flushed to disk when the instance goes down, this data is lost.


    In the event of an issue, such as an IO error, it is possible for uncommitted
    transactions to enter a state where they cannot be committed or rolled back. This
    occurs when you are bringing a database back online and it fails during both the
    redo phase and the undo phase. This is called a *deferred transaction*. Deferred
    transactions stop the VLF that they are in from being truncated, meaning that
    the transaction log continues to grow.


    Resolving the issue depends on the cause of the problem. If the problem is caused
    by a corrupt page, then you may be able to restore this page from a backup. If
    the issue is caused because a filegroup was offline, then you must either restore
    the filegroup or mark the filegroup as defunct. If you mark a filegroup as defunct,
    you cannot recover it.


    ## Transaction with In-Memory OLTP


    Memory-optimized tables do not support locks to improve concurrency; this changes
    the way isolation levels can work, since pessimistic concurrency is no longer
    an option. We discuss isolation levels supported for In-Memory OLTP, along with
    considerations for cross-container queries, in the following sections.


    ### Isolation Levels


    Because all isolation levels used with In-Memory OLTP must be optimistic, each
    isolation level implements row versioning. Unlike row versioning for disk-based
    tables, however, row versions for memory-optimized tables are not maintained in
    TempDB. Instead, they are maintained in the memory-optimized table that they relate
    to.'
  trans: '# 乐观隔离级别


    乐观隔离级别在工作时无需对读取或写入操作获取任何锁。相反，它们使用一种称为 `行版本控制` 的技术。`行版本控制` 的工作原理是：每当行被更新时，它都会在
    `TempDB` 中为未提交的事务维护该行的一个新副本。这意味着始终存在一个事务可以引用的数据一致副本。这可以显著减少高并发系统上的争用。代价是需要根据大小和吞吐量容量来适当扩展
    `TempDB`，因为额外的 I/O 可能对性能产生负面影响。


    `快照隔离` 对读取和写入操作都使用乐观并发控制。它的工作原理是在事务开始时为每个事务分配一个事务序列号。然后，它能够通过查找最接近且小于该事务自身序列号的序列号，从
    `TempDB` 中读取该事务开始时行的版本。这意味着，尽管可能存在包含修改的其他行版本，但由于序列号较高，该事务无法看到它们。如果两个事务同时尝试更新同一行，则不会发生死锁，而是第二个事务会抛出错误
    `3960` 并且回滚该事务。这种行为的结果是，脏读、不可重复读和幻读都不可能发生。


    `已提交读快照` 对写入操作使用悲观并发控制，对读取操作使用乐观并发控制。对于读取操作，它使用事务内每个语句开始时行的当前版本，而不是事务开始时行的版本。这意味着你获得的隔离级别与使用悲观的
    `已提交读` 隔离级别相同。


    与悲观隔离级别不同，你需要在数据库级别开启乐观隔离级别。当你开启 `已提交读快照` 时，它将替代 `已提交读` 的功能。这一点很重要，因为 `已提交读快照`
    成为你的默认隔离级别，并用于所有未显式设置隔离级别的事务。清单 18-4 中的脚本演示了如何为 `Chapter18` 数据库开启 `快照隔离` 和 `已提交读快照隔离`。该脚本首先检查以确保
    `已提交读` 和 `已提交读快照` 尚未启用。如果未启用，它会先终止当前连接到 `Chapter18` 数据库的所有会话，最后才运行 `ALTER DATABASE`
    语句。


    ```sql

    --Check if already enabled

    IF EXISTS (

    SELECT name

    ,snapshot_isolation_state_desc

    ,is_read_committed_snapshot_on

    FROM sys.databases

    WHERE name = ''Chapter18''

    AND snapshot_isolation_state_desc = ''OFF''

    AND is_read_committed_snapshot_on = 0 )

    BEGIN

    --Kill any existing sessions

    IF EXISTS(

    SELECT * FROM sys.dm_exec_sessions where database_id = DB_id(''Chapter18'')

    )

    BEGIN

    PRINT ''Killing Sessions to Chapter18 database''

    DECLARE @SQL NVARCHAR(MAX)

    SET @SQL = (SELECT ''KILL '' + CAST(Session_id AS NVARCHAR(3)) + ''; '' [data()]

    FROM sys.dm_exec_sessions

    WHERE database_id = DB_id(''Chapter18'')

    FOR XML PATH('''')

    )

    EXEC(@SQL)

    END

    PRINT ''Enabling Snapshot and Read Committed Sanpshot Isolation''

    ALTER DATABASE Chapter18

    SET ALLOW_SNAPSHOT_ISOLATION ON ;

    ALTER DATABASE Chapter18

    SET READ_COMMITTED_SNAPSHOT ON ;

    END

    ELSE

    PRINT ''Snapshot Isolation already enabled''

    Listing 18-4

    启用乐观隔离级别

    ```


    ## 持久性


    要使事务具有持久性，它在提交后必须保持已提交状态，即使在发生灾难性事件时也是如此。这意味着更改必须写入磁盘，因为内存中的更改无法承受断电、实例重启等情况。SQL
    Server 通过使用一种称为预写日志（WAL）的过程来实现这一点。该过程在事务提交时将日志缓存刷新到磁盘，并且只有在此刷新完成后提交才算完成。


    然而，SQL Server 通过引入一项称为延迟持久性的功能放宽了这些规则。此功能的工作原理是延迟将日志缓存刷新到磁盘，直到发生以下事件之一：


    *   日志缓存变满并自动刷新到磁盘。

    *   同一数据库中的一个完全持久性事务提交。

    *   针对数据库运行了 `sp_flush_log` 系统存储过程。


    使用延迟持久性时，数据在事务提交后立即对其他事务可见；但是，在日志记录被刷新之前，如果实例宕机或重启，该事务内提交的数据可能会丢失。延迟持久性的支持在数据库级别配置，使用表
    18-10 中详述的三个选项之一。


    表 18-10

    延迟持久性的支持级别


    | 支持级别 | 描述 |

    | --- | --- |

    | `ALLOWED` | 数据库支持延迟持久性，并在事务级别指定。 |

    | `FORCED` | 数据库中的所有事务都将使用延迟持久性。 |

    | `DISABLED` | 默认设置。不允许数据库中的任何事务使用延迟持久性。 |


    清单 18-5 中的命令显示了如何在 `Chapter18` 数据库中允许延迟持久性。


    ```sql

    ALTER DATABASE Chapter18

    SET DELAYED_DURABILITY  = ALLOWED ;

    Listing 18-5

    允许延迟持久性

    ```


    如果数据库配置为允许延迟持久性，则在 `COMMIT` 语句中配置事务级别的 `FULL` 或 `DELAYED` 持久性。清单 18-6 中的脚本演示了如何以延迟持久性提交事务。


    ```sql

    USE Chapter18

    GO

    BEGIN TRANSACTION

    UPDATE dbo.Customers

    SET DeliveryAddressID = 1

    WHERE CustomerID = 10 ;

    COMMIT WITH (DELAYED_DURABILITY = ON)

    Listing 18-6

    以延迟持久性提交

    ```


    ## 注意事项


    使用延迟持久性时，最重要的是要记住存在数据丢失的可能性。如果任何事务已提交，但相关的日志记录在实例宕机时尚未刷新到磁盘，这些数据将会丢失。


    在发生问题（例如 I/O 错误）时，未提交的事务可能进入既无法提交也无法回滚的状态。当您将数据库联机并在重做阶段和回滚阶段都失败时，就会发生这种情况。这称为
    `延迟事务`。延迟事务会阻止它们所在的 VLF 被截断，这意味着事务日志会持续增长。


    解决问题取决于问题的原因。如果问题是由损坏的页引起的，那么您可以尝试从备份中还原此页。如果问题是由于文件组脱机引起的，那么您必须还原该文件组或将该文件组标记为可疑。如果您将文件组标记为可疑，则无法恢复它。


    ## 使用内存中 OLTP 的事务


    内存优化表不支持锁来提高并发性；这改变了隔离级别工作的方式，因为悲观并发控制不再是可选项。我们将在以下各节中讨论内存中 OLTP 支持的隔离级别，以及跨容器查询的注意事项。


    ### 隔离级别


    因为与内存中 OLTP 一起使用的所有隔离级别都必须是乐观的，所以每个隔离级别都实现行版本控制。然而，与基于磁盘的表的行版本控制不同，内存优化表的行版本不在
    `TempDB` 中维护。相反，它们在它们相关的内存优化表中维护。'
- fmt: '### Read Committed


    The `Read Committed` isolation level is supported against memory-optimized tables,
    but only if you are using autocommit transactions. It is not possible to use `Read
    Committed` in explicit or implicit transactions. It is also not possible to use
    `Read Committed` in the `ATOMIC` block of a natively compiled stored procedure.
    Because `Read Committed` is the default isolation level for SQL Server, you must
    either ensure that all transactions involving memory-optimized tables explicitly
    state an isolation level, or you must set the `MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT`
    database property. This option elevates all transactions that involve memory-optimized
    tables but do not specify an isolation level to Snapshot isolation, the least
    restrictive isolation level, which is fully supported for In-Memory OLTP.


    The command in Listing 18-7 shows how to set the `MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT`
    property for the `Chapter18` database.


    ```sql

    ALTER DATABASE Chapter18

    SET MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT = ON ;

    ```

    Listing 18-7

    Elevating to Snapshot


    ### Read Committed Snapshot


    The `Read Committed Snapshot` isolation level is supported for memory-optimized
    tables, but only when you are using autocommit transactions. This isolation level
    is not supported when the transaction accesses disk-based tables.


    ### Snapshot


    The `Snapshot` isolation level uses row versioning to guarantee that a transaction
    always sees the data, as it was at the start of the transaction. Snapshot isolation
    is only supported against memory-optimized tables when you use interpreted SQL
    if it is specified as a query hint as opposed to at the transaction level. It
    is fully supported in the `ATOMIC` block of natively compiled stored procedures.


    If a transaction attempts to modify a row that has already been updated by another
    transaction, then the conflict detection mechanism rolls back the transaction,
    and Error 41302 is thrown. If a transaction attempts to insert a row that has
    the same primary key value as a row that has been inserted by another transaction,
    then conflict detection rolls back the transaction and Error 41352 is thrown.
    If a transaction attempts to modify the data in a table that has been dropped
    by another transaction, then Error 41305 is thrown, and the transaction is rolled
    back.


    ### Repeatable Read


    The `Repeatable Read` isolation level provides the same protection as `Snapshot`,
    but additionally, it guarantees that rows read by the transaction have not been
    modified by other rows since the start of the transaction. If the transaction
    attempts to read a row that has been modified by another transaction, then Error
    41305 is thrown and the transaction is rolled back. The `Repeatable Read` isolation
    is not supported against memory-optimized tables when using interpreted SQL, however.
    It is only supported in the `ATOMIC` block of natively compiled stored procedures.


    ### Serializable


    The `Serializable` isolation level offers the same protection that is offered
    by `Repeatable Read`, but in addition, it guarantees that no rows have been inserted
    within the range of rows being accessed by queries within the transaction. If
    a transaction using the `Serializable` isolation level cannot meet its guarantees,
    then the conflict detection mechanism rolls back the transaction and Error 41325
    is thrown. `Serializable` isolation is not supported against memory-optimized
    tables when using interpreted SQL, however. It is only supported in the `ATOMIC`
    block of natively compiled stored procedures.


    ## Cross-Container Transactions


    Because isolation levels’ use is restricted, when a transaction accesses both
    memory-optimized tables and disk-based tables, you may need to specify a combination
    of isolation levels and query hints. The query in Listing 18-8 joins together
    the `Customers` and `CustomersMem` tables. It succeeds only because we have turned
    on `MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT`. This means that the query uses the
    default `Read Committed Snapshot` isolation level to access the disk-based table
    and automatically upgrades the read of the `CustomersMem` table to use `Snapshot`
    isolation.


    ```sql

    BEGIN TRANSACTION

    SELECT *

    FROM dbo.Customers C

    INNER JOIN dbo.CustomersMem CM

    ON C.CustomerID = CM.CustomerID ;

    COMMIT TRANSACTION

    ```

    Listing 18-8

    Joining Disk and Memory Tables with Automatic Elevation


    However, if we now turn off `MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT`, which you
    can do using the script in Listing 18-9, the same transaction now fails with the
    error message shown in Figure 18-4.


    ![../images/333037_2_En_18_Chapter/333037_2_En_18_Fig4_HTML.jpg](images/333037_2_En_18_Chapter/333037_2_En_18_Fig4_HTML.jpg)


    Figure 18-4


    Join disk and memory tables without automatic elevation


    ```sql

    ALTER DATABASE Chapter18

    SET MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT=OFF

    GO

    ```

    Listing 18-9

    Turning Off `MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT`


    The query in Listing 18-10 demonstrates how we can join the `Customers` table
    with the `CustomersMem` table using the `Snapshot` isolation level for the memory-optimized
    table and the `Serializable` isolation level for the disk-based table. Because
    we are using interpreted SQL, the `Snapshot` isolation level is the only level
    we can use to access the memory-optimized table, and we must specify this as a
    query hint. If we specify it at the transaction level instead of at serializable,
    the transaction fails.


    ```sql

    BEGIN TRANSACTION

    SET TRANSACTION ISOLATION LEVEL SERIALIZABLE

    SELECT *

    FROM dbo.Customers C

    INNER JOIN dbo.CustomersMem CM (SNAPSHOT)

    ON C.CustomerID = CM.CustomerID ;

    COMMIT TRANSACTION

    ```

    Listing 18-10

    Joining Disk and Memory-Optimized Tables Using Query Hints


    If we use a natively compiled stored procedure instead of interpreted SQL, we
    add the required transaction isolation level to the `ATOMIC` block of the procedure
    definition. The script in Listing 18-11 demonstrates creating a natively compiled
    stored procedure that updates the `CustomersMem` table using the `Serializable`
    isolation level. Because natively compiled stored procedures are not able to access
    disk-based tables, you do not need to be concerned with locking hints to support
    cross-container transactions.


    ```sql

    CREATE PROCEDURE dbo.UpdateCreditLimit

    WITH native_compilation, schemabinding, execute as owner

    AS

    BEGIN ATOMIC

    WITH(TRANSACTION ISOLATION LEVEL = SERIALIZABLE, LANGUAGE = ''English'')

    UPDATE dbo.CustomersMem

    SET CreditLimit = CreditLimit * 1.1

    WHERE Balance < CreditLimit / 4 ;

    UPDATE dbo.CustomersMem

    SET CreditLimit = CreditLimit * 1.05

    WHERE Balance < CreditLimit / 2 ;

    END

    ```

    Listing 18-11

    Using `Serializable` Isolation in a Natively Compiled Stored Procedure'
