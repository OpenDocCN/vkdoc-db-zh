    | 共享意向排他 (`SIX`) | 保护层次结构较低级别所有资源上的共享锁和某些资源上的排他锁 |

    | 意向更新 (`IU`) | 保护层次结构较低级别所有资源上的更新锁 |

    | 共享意向更新 (`SIU`) | `S` 和 `IU` 锁的结果集 |

    | 更新意向排他 (`UIX`) | `X` 和 `IU` 锁的结果集 |


