  trans: '

    ### 使用 sp_configure


    您可以使用系统存储过程 `sp_configure` 更改许多可在实例级别配置的设置。您可以使用 `sp_configure` 过程来查看和更改实例级设置。本书的许多示例都将使用此过程，因此理解其工作原理非常重要。如果过程是批处理中的第一条语句，则可以在没有
    `EXEC` 关键字的情况下运行它；但如果前面有任何语句，则必须使用 `EXEC` 关键字。如果该过程在没有参数的情况下运行，它将返回一个包含五列的结果集。这些列的含义详见表
    5-1。


    表 5-1


    sp_configure 返回的结果集


    | 列 | 描述 |

    | --- | --- |

    | `Name` | 实例级设置的名称。 |

    | `Minimum` | 该设置可接受的最小值。 |

    | `Maximum` | 该设置可接受的最大值。 |

    | `Config_value` | 为此设置配置的值。如果此值与 `Run_value` 列中的值不同，则需要重新启动或重新配置实例才能使此配置生效。 |

    | `Run_value` | 该设置当前正在使用的值。 |


    如果您希望使用 `sp_configure` 更改某个设置的值（而不仅仅是查看），则必须在运行该过程时传入两个参数。第一个参数名为 `configname`，其数据类型定义为
    `VARCHAR(35)`。此参数用于传递您希望更改的设置的名称。第二个参数名为 `configvalue`，定义为整数。此参数用于传递该设置的新值。使用
    `sp_configure` 更改实例级设置后，它不会立即生效。要激活该设置，您需要重新启动数据库引擎服务或重新配置实例。


    重新配置实例有两个选项。第一个是名为 `RECONFIGURE` 的命令。第二个是名为 `RECONFIGURE WITH OVERRIDE` 的命令。只要新配置的值被
    SQL Server 视为“合理”，`RECONFIGURE` 命令就会更改设置的运行值。例如，当实例上存在包含数据库时，`RECONFIGURE` 将不允许您禁用它们。但是，如果您使用
    `RECONFIGURE WITH OVERRIDE` 命令，则将允许此操作，即使您的包含数据库将无法再访问。即便如此，SQL Server 仍然会运行检查以确保您输入的值在设置的
    `Min` 和 `Max` 值之间。它也不允许您执行任何会导致严重错误的操作。例如，它不会允许您将“最小服务器内存 (MB)”设置配置为高于“最大服务器内存
    (MB)”设置，因为这会导致数据库引擎出现致命错误。


    在 SQL Server 2019 中，首次运行不带参数的 `sp_configure` 存储过程时，它将返回 18 行。这些行包含实例的基本配置选项。其中一个选项称为“显示高级选项”。如果您打开此选项然后重新配置实例，如代码清单
    5-1 所示，那么当您再次运行该过程时，将显示另外 52 个高级设置。如果您在打开“显示高级选项”设置之前尝试更改某个高级选项的值，则命令将失败。


    ```

    EXEC sp_configure ''show advanced options'', 1

    RECONFIGURE

    Listing 5-1

    显示高级选项

    ```


    作为使用 sp_configure 查看这些设置的替代方法，您也可以通过查询 `sys.configurations` 来检索相同的信息。如果使用 `sys.configurations`
    返回信息，则会返回两个额外的列。其中一列称为 `is_dynamic`，它指定该选项是否可以使用 `RECONFIGURE` 命令配置 (1)，或者是否需要重新启动实例
    (0)。另一列称为 `is_Advanced`，它指示该设置是否无需打开“显示高级选项”即可配置。


    ### 处理器和内存配置


    配置实例时，首要考虑事项之一应是处理器和内存资源的配置。对于处理器，您应主要考虑两个方面：处理器亲和性以及 MAXDOP（最大并行度）。


    #### 处理器亲和性


    默认情况下，您的实例将能够使用服务器中的所有处理器核心。（物理处理器，也称为插槽或 CPU，由多个核心组成，每个核心都是独立的处理器）。但是，如果您使用处理器亲和性，则特定的处理器核心将与您的实例对齐，这些将是该实例唯一可以访问的核心。通过这种方式限制您的实例主要有两个原因。第一个原因是您在同一服务器上运行多个实例。在这种配置下，您可能会发现实例竞争相同的处理器资源并因此相互阻塞。处理器亲和性通过一个名为
    `affinity mask` 的设置来控制。


    假设您有一台具有四个物理处理器的服务器，每个处理器有两个核心。为本例目的假设超线程已关闭，则 SQL Server 总共有八个可用核心。如果您在服务器上有四个实例，那么为了避免实例竞争资源，您可以将核心
    0 和 1 与实例 1 对齐，核心 2 和 3 与实例 2 对齐，核心 4 和 5 与实例 3 对齐，核心 6 和 7 与实例 4 对齐。当然，这样做的缺点是，如果一个实例处于空闲状态，CPU
    资源将无法得到利用。


    如果您在服务器上运行其他服务，例如 SQL Server Integration Services (SSIS)，您可能希望保留一个核心供 Windows
    和其他应用程序使用，任何实例都不能使用它。在这种情况下，您可能已经发现实例 4 比其他实例使用的处理器资源少。例如，它可能是一个专用于 ETL（提取、转换和加载）的实例，主要用于托管
    SSIS 目录。在这种情况下，您可能只将实例 4 与核心 6 对齐。这将把核心 7 留作其他用途。此设计如图 5-1 所示。


    ### 注意


    SSIS 已集成到数据库引擎中。但是，当 SSIS 包运行时，它们在单独的 DTSHost 进程中运行，因此不与实例的处理器和内存配置对齐。


    ![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig1_HTML.jpg](img/333037_2_En_5_Fig1_HTML.jpg)


    图 5-1


    处理器亲和性图示


    使用处理器亲和性时，为了获得最佳性能，将实例与同一 NUMA（非统一内存访问）节点上的核心对齐至关重要。这是因为如果处理器需要远程访问不同 NUMA 节点的内存，它需要通过互连进行，这比访问本地
    NUMA 节点要慢得多。在图 5-1 所示的示例中，如果我们将实例 1 与核心 0 和 7 对齐，那么我们将跨越 NUMA 边界，性能将会受损。

    '
- fmt: '## 注意事项


    虽然对于SQL Server不推荐，但一些虚拟环境使用一种称为`over-subscribed processors`的技术。这意味着分配给客户的内核数多于物理主机上实际存在的内核数。在这种情况下，你不应使用处理器亲和性，因为NUMA边界将不会被尊重。


    减少争用的亲和性掩码同样适用于集群环境。想象一个主动/主动配置的双节点集群。集群的每个节点托管一个实例。对于你的业务而言，确保在发生故障转移时具有一致的性能可能很重要。在这种情况下，假设你的每个节点有八个核心，那么在节点1上，你可以将实例1配置为使用核心0、1、2和3。在节点2上，你可以将实例2配置为使用核心4、5、6和7。现在，在发生故障转移时，你的实例将继续使用相同的处理器核心，而不会争夺资源。


    使用处理器亲和性的第二个原因是为了避免操作系统级别线程在处理器之间移动带来的开销。当你的实例处于高负载时，通过将SQL Server线程与特定核心对齐，你可能会看到性能提升。在这种情况下，可以将标准SQL
    Server任务与SQL Server IO相关任务分开。


    想象你有一台单处理器服务器，它有两个核心。超线程已关闭，并且你安装了一个实例。你可以选择将与IO亲和性相关的任务（如`Lazy Writer`）与核心0对齐，而将其他SQL
    Server线程与核心1对齐。要将IO任务与特定处理器对齐，你需要使用一个额外的设置，称为`Affinity I/O Mask`。启用此设置后，会创建一个隐藏的调度程序，专门用于`Lazy
    Writer`。因此，重要的是不要将亲和性掩码和`Affinity I/O Masks`与同一个核心对齐。否则，你将无意中造成你试图避免的争用。


    ## 关于I/O掩码的注意事项


    很少需要使用`Affinity I/O Mask`。要对齐来自多个实例的工作负载，`Affinity Mask`就足够了。它通常只适用于在32位系统上运行的非常大的数据库。对于具有更大内存容量的64位系统，IO抖动较少；因此上下文切换也较少。


    `Affinity Mask`和`Affinity I/O Mask`都可以通过SQL Server Management Studio中的GUI进行设置，方法是在实例属性对话框中选择“处理器”选项卡，如图5-2所示。


    ![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig2_HTML.jpg](images/333037_2_En_5_Chapter/333037_2_En_5_Fig2_HTML.jpg)


    图 5-2

    “处理器”选项卡


    处理器亲和性基于位图工作。因此，如果你希望使用`sp_configure`来设置处理器亲和性，那么你首先需要计算位图值的整数表示。这变得更加复杂，因为`INT`数据类型是32位有符号整数，意味着某些表示将是负数。分配给每个处理器的值列于表5-2。


    表 5-2

    处理器亲和性位图


    | 处理器编号 | 位掩码 | 有符号整数表示 |

    | --- | --- | --- |

    | 0 | 0000 0000 0000 0000 0000 0000 0000 0001 | 1 |

    | 1 | 0000 0000 0000 0000 0000 0000 0000 0010 | 2 |

    | 2 | 0000 0000 0000 0000 0000 0000 0000 0100 | 4 |

    | 3 | 0000 0000 0000 0000 0000 0000 0000 1000 | 8 |

    | 4 | 0000 0000 0000 0000 0000 0000 0001 0000 | 16 |

    | 5 | 0000 0000 0000 0000 0000 0000 0010 0000 | 32 |

