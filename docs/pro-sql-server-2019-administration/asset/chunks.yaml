- fmt: '### Integration Services


    Integration Services is a very powerful, graphical ETL (extract, transform, and
    load) tool provided with SQL Server. From SQL Server 2012 onward, Integration
    Services is incorporated into the Database Engine. Despite this, the Integration
    Services option still needs to be installed for the functionality to work correctly,
    because it includes binaries that the functionality relies on.


    Integration Services packages comprise a *control flow*, which is responsible
    for management and flow operations, including bulk inserts, loops, and transactions.
    The control flow also contains zero or more data flows. A *data flow* is a set
    of data sources, transformations, and destinations, which provides a powerful
    framework for merging, dispersing, and transforming data.


    Integration Services can be horizontally scaled out across multiple servers, with
    a master and `n` workers. Therefore, in recent versions of SQL Server, you have
    the option to install classic, stand-alone Integration Services or install a scale
    out master, or scale out worker, on the server.


    ### Client Tools Backward Compatibility


    Client Tools Backward Compatibility provides support for discontinued features
    of SQL Server. Installing this feature will install SQL Distributed Management
    Objects and Decision Support Objects.


    ### Client Tools SDK


    Installing the Client Tools SDK provides the `SMO (Server Management Objects)`
    assemblies. This allows you to programmatically control SQL Server and Integration
    Services from within `.NET` applications.


    ### Distributed Replay Controller


    Distributed Replay is a feature that allows you to capture a trace and then replay
    it on another server. This allows you to test the impact of performance tuning
    or software upgrades. If this sounds familiar to functionality in Profiler that
    you may be used to, then you are correct, there is some overlap. Distributed Replay
    has the following advantages, however:


    1.  Distributed Replay has a lower impact on resources than Profiler, meaning
    that the servers you are tracing run less risk of suffering performance issues
    while the trace is running.

    2.  Distributed Replay allows you to capture workloads from multiple servers (clients)
    and replay them on a single host.


    Within a Distributed Replay topology, you need to configure one server as the
    controller. It is the controller that will orchestrate the work against the client(s)
    and the target server.


    ### Distributed Replay Client


    As described earlier, multiple client servers can work together to create a workload
    to be replayed against the target server. The Distributed Replay Client should
    be installed on any servers that you wish to capture traces from using Distributed
    Replay.


    ### SQL Client Connectivity SDK


    The Client Connectivity SDK provides a SDK for SQL Native Client to support application
    development. It also provides other interfaces, such as support for stack tracing
    in client applications.


    ### Master Data Services


    Master Data Services is a tool for managing master data within the enterprise.
    It allows you to model data domains that map to business entities, and it helps
    you manage these with hierarchies, business rules, and data versioning. When you
    select this feature, several components are installed:


    *   A web console to provide administrative capability

    *   A configuration tool to allow you to configure your MDM databases and the
    web console

    *   A web service, which provides extensibility for developers

    *   An Excel add-in, for creating new entities and attributes


    ### Caution


    In SQL Server 2016 and above, management tools are not included with the SQL Server
    Installation media. Instead, to install them, you can use the `Install SQL Server
    Management Tools` link, on the Installation page of the SQL Server Installation
    Center. Reporting Services (SSRS) is also not included with the installation media,
    in SQL Server 2019. This can be installed using the `Install SQL Server Reporting
    Services` link, in the Installation page of the SQL Server Installation Center.


    ## Summary


    Planning a deployment can be a complicated task that involves discussions with
    business and technical stakeholders to ensure that your platform will meet the
    application requirements and ultimately the business needs. There are many factors
    that you should take into account.


    Make sure you consider which is the appropriate version of SQL Server to install
    and the associated licensing considerations for that version. You should consider
    the holistic supportability of the estate when making this decision and not just
    the needs of the specific application. You should also consider if an Azure hosting
    option may be right for your application, or potentially even a hybrid approach,
    involving both on-premise and cloud hosting.


    When planning a deployment, make sure to carry out thorough capacity planning.
    Also think about the hardware requirements of the application. How much RAM and
    how many processor cores you will need are important considerations, but perhaps
    the main consideration is storage. SQL Server is usually an IO-bound application,
    so storage can often prove to be the bottleneck.


    You should also consider requirements for the operating system. This should not
    be limited to the most appropriate version of Windows, but also to the configuration
    of the operating system. Just because there is a Windows gold build available,
    does this mean that it is configured optimally for your SQL Server installation?


    Finally, consider which features you should select to install. Most applications
    require only a small subset of features, and by carefully selecting which features
    you require, you can reduce the security footprint of the installation and also
    reduce management overheads.


    # 2. GUI Installation


    You can invoke SQL Server’s Installation Center by running SQL Server’s `setup.exe`
    application. The Installation Center provides many utilities that will help you
    install an instance; these include links and tools to assist you with planning
    your deployment, stand-alone and clustered installation capability, and advanced
    tools, which will allow you to build instances using configuration files or based
    upon prepared images.


    This chapter will provide an overview of the options available to you in the Installation
    Center before guiding you through the process of installing SQL Server using the
    graphical user interface (GUI). It will also offer real-world advice on decisions
    that are critical to the ongoing supportability of your instance.


    ## Installation Center


    The SQL Server Installation Center is a one-stop shop for all activity that relates
    to planning, installing, and upgrading a SQL Server instance. It is the application
    that you are greeted with when you run the SQL Server installation media. Installation
    Center consists of seven tabs, and the following sections will describe the content
    of those tabs.'
