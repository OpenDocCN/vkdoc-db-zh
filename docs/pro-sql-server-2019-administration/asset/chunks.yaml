- fmt: '#### Backup Device


    A `backup device` is a physical file on disk, a tape, or a Windows Azure Blob.
    When the device is a disk, the disk can reside locally on the server or on a backup
    share specified by a URL. A media set can contain a maximum of 64 backup devices,
    and data can be striped across the backup devices and can also be mirrored. In
    Figure [12-2](#333037_2_En_12_Chapter.xhtml#Fig2), there are six backup devices,
    split into three mirrored pairs. This means that the backup set is striped across
    three of the devices and then mirrored to the other three.


    Striping the backup can be useful for a large database, because doing so allows
    you to place each device on a different drive array to increase throughput. It
    can also pose administrative challenges, however; if one of the disks in the devices
    in the stripe becomes unavailable, you are unable to restore your backup. You
    can mitigate this by using a mirror. When you use a mirror, the contents of each
    device are duplicated to an additional device for redundancy. If one backup device
    in a media set is mirrored, then all devices within the media set must be mirrored.
    Each backup device or mirrored set of backup devices is known as a `media family`.
    Each device can have up to four mirrors.


    Each backup device within a media set must be all disk or all tape. If they are
    mirrored, then the mirror devices must have similar properties; otherwise an error
    is thrown. For this reason, Microsoft recommends using the same make and model
    of device for mirrors.


    It is also possible to create logical backup devices, which abstract a physical
    backup device. Using logical devices can simplify administration, especially if
    you are planning to use many backup devices in the same physical location. A `logical
    backup device` is an instance-level object and can be created in SSMS by choosing
    **New Backup Device** from the context menu of **Server Objects** ➤ **Backup Devices**;
    this causes the **Backup Device** dialog box to be displayed, where you can specify
    a logical device name and a physical path.


    Alternatively, you can create the same logical backup device via T-SQL using the
    `sp_addumpdevice` system stored procedure. The command in Listing [12-3](#333037_2_En_12_Chapter.xhtml#PC3)
    uses the `sp_addumpdevice` procedure to create the `Chapter12Backup` logical backup
    device. In this example, we use the `@devtype` parameter to pass in the type of
    the device, in our case, disk. We then pass the abstracted name of the device
    into the `@logicalname` parameter and the physical file into the `@physicalname`
    parameter.


    ```

    EXEC sp_addumpdevice  @devtype = ''disk'',

    @logicalname = ''Chapter12Backup'',

    @physicalname = ''C:\MSSQL\Backup\Chapter12Backup.bak'' ;

    GO

    Listing 12-3

    Creating a Logical Backup Device

    ```


    #### Media Sets


    A media set contains the backup devices to which the backup is written. Each media
    family within a media set is assigned a sequential number based upon their position
    in the media set. This is called the `family sequence number`. Additionally, each
    physical device is allocated a `physical sequence number` to identify its physical
    position within the media set.


    When a media set is created, the backup devices (files or tapes) are formatted,
    and a media header is written to each device. This media header remains until
    the devices are formatted and contains details, such as the name of the media
    set, the GUID of the media set, the GUIDs and sequence numbers of the media families,
    the number of mirrors in the set, and the date/time that the header was written.


    #### Backup Sets


    Each time a backup is taken to the media set, it is known as a `backup set`. New
    backup sets can be appended to the media, or you can overwrite the existing backup
    sets. If the media set contains only one media family, then that media family
    contains the entire backup set. Otherwise, the backup set is distributed across
    the media families. Each backup set within the media set is given a sequential
    number; this allows you to select which backup set to restore.


    #### Backup Strategies


    A DBA can implement numerous backup strategies for a database, but always base
    your strategy on the RTO (recovery time objective) and RPO (recovery point objective)
    requirements of a data-tier application. For example, if an application has an
    RPO of 60 minutes, you are not able to achieve this goal if you only back up the
    database once every 24 hours.


    ##### Full Backup Only


    Backup strategies where you only take full backups are the least flexible. If
    databases are infrequently updated and there is a regular backup window that is
    long enough to take a full backup, then this may be an appropriate strategy. Also,
    a full backup–only strategy is often used for the `Master` and `MSDB` system databases.


    It may also be appropriate for user databases, which are used for reporting only
    and are not updated by users. In this scenario, it may be that the only updates
    to the database are made via an ETL load. If this is the case, then your backup
    only needs to be as frequent as this load. You should, however, consider adding
    a dependency between the ETL load and the full backup, such as putting them in
    the same SQL Server Agent job. This is because if your backup takes place halfway
    through an ETL load, it may render the backup useless when you come to restore—at
    least, it would be useless without unpicking the transactions performed in the
    ETL load that were included in the backup before finally rerunning the ETL load.


    Using a full backup–only strategy also limits your flexibility for restores. If
    you only take full backups, then your only restore option is to restore the database
    from the point of the last full backup. This can pose two issues. The first is
    that if you take nightly backups at midnight every night and your database becomes
    corrupt at 23:00, then you lose 23 hours of data modifications.


    The second issue occurs if a user accidently truncates a table at 23:00. The earliest
    restore point for the database is midnight the previous night. In this scenario,
    once again, your RPO for the incident is 23 hours, meaning 23 hours of data modifications
    are lost.


    ##### Full and Transaction Log Backups


    If your database is in `FULL` recovery model, then you are able to take transaction
    log backups, as well as the full backups. This means that you can take much more
    frequent backups, since the transaction log backup is quicker than the full backup
    and uses fewer resources. This is appropriate for databases that are updated throughout
    the day, and it also offers more flexible restores, since you are able to restore
    to a point in time just before a disaster occurred.


    If you are taking transaction log backups, then you schedule your log backups
    to be in line with your RPO. For example, if you have an RPO of 1 hour, then you
    can schedule your log backups to occur every 60 minutes, because this means that
    you can never lose more than one hour of data. (This is true as long as you have
    a complete log chain, none of your backups are corrupt, and the share or folder
    where the backups are stored is accessible when you need it.)


    When you use this strategy, you should also consider your RTO. Imagine that you
    have an RPO of 30 minutes, so you are taking transaction log backups every half
    hour, but you are only taking a full backup once per week, at 01:00 on a Saturday.
    If your database becomes corrupt on Friday night at 23:00, you need to restore
    330 backups. This is perfectly feasible from a technical view point, but if you
    have an RTO of 1 hour, then you may not be able to restore the database within
    the allotted time.'
