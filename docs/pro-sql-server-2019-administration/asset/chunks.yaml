  trans: '

    ## 服务器角色


    SQL Server 提供了一套开箱即用的服务器角色，允许你将实例级权限分配给满足常见需求的登录名。这些被称为 `固定服务器角色`，你无法更改分配给它们的权限；只能添加或删除登录名。表
    10-1 描述了这些固定服务器角色。


    **表 10-1** 固定服务器角色


    | 角色 | 描述 |

    | --- | --- |

    | `sysadmin` | `sysadmin` 角色授予对整个实例的管理权限。`sysadmin` 角色的成员可以在 SQL Server 关系引擎实例内执行任何操作。
    |

    | `blkadmin` | 结合对数据库中目标表的 `INSERT` 权限，`bulkadmin` 角色允许用户使用 `BULK INSERT` 语句从文件导入数据。此角色通常授予运行
    ETL 过程的服务账户。 |

    | `dbcreator` | `dbcreator` 角色允许其成员在实例中创建新数据库。用户创建数据库后，他将自动成为该数据库的所有者，并能够在其中执行任何操作。
    |

    | `diskadmin` | `diskadmin` 角色授予其成员在 SQL Server 中管理备份设备的权限。 |

    | `processadmin` | `processadmin` 角色的成员能够从 T-SQL 或 SSMS 停止实例。他们还能够终止正在运行的进程。 |

    | `public` | 所有 SQL Server 登录名都会添加到 `public` 角色。虽然可以向 `public` 角色分配权限，但这不符合最小权限原则。此角色通常仅用于内部
    SQL Server 操作，例如对 TempDB 进行身份验证。 |

    | `securityadmin` | `securityadmin` 角色的成员能够在实例级别管理登录名。例如，成员可以将登录名添加到服务器角色（`sysadmin`
    除外）或向实例级资源（如端点）分配权限。但是，他们无法在数据库内向数据库用户分配权限。 |

    | `serveradmin` | `Serveradmin` 角色结合了 `diskadmin` 和 `processadmin` 角色的功能。此外，该角色的成员不仅能够启动或停止实例，还可以使用
    `SHUTDOWN` T-SQL 命令关闭实例。此处的细微差别在于，如果使用 `NOWAIT` 选项，`SHUTDOWN` 命令允许你选择不在每个数据库中运行
    `CHECKPOINT`。此外，该角色的成员可以修改端点并查看所有实例元数据。 |

    | `setupadmin` | `setupadmin` 角色的成员能够创建和管理链接服务器。 |


    你还可以创建自己的服务器角色，将需要一组针对你的环境定制的常用权限的用户分组。例如，如果你有一个依赖于可用性组的高可用性环境，那么你可能希望创建一个名为 `AOAG`
    的服务器角色，并向该组授予以下权限：


    *   `ALTER ANY AVAILABILITY GROUP`

    *   `ALTER ANY ENDPOINT`

    *   `CREATE AVAILABILITY GROUP`

    *   `CREATE ENDPOINT`


    然后，你可以将初级 DBA 添加到此角色，他们不被授权拥有完整的 `sysadmin` 权限，但你希望他们管理实例的高可用性。你可以在 SSMS 中，通过右键单击
    **安全性** ➤ **服务器角色** 并选择 **新建服务器角色** 来创建此服务器角色。**新建服务器角色** 对话框的 **常规** 选项卡如图 10-2
    所示。


    ![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig2_HTML.jpg](img/333037_2_En_10_Fig2_HTML.jpg)


    **图 10-2** 常规选项卡


    你可以看到，我们已将角色名称指定为 `AOAG`，为角色指定了所有者，并选择了正在配置的实例下所需的权限。在对话框的 **成员** 选项卡中，我们可以搜索要添加到角色的现有登录名；在
    **成员身份** 选项卡中，我们可以选择将角色嵌套在另一个服务器角色中。


    或者，你也可以通过 T-SQL 创建该组。清单 10-3 中的脚本也创建了这个组。我们将在本章后面将登录名添加到该角色。


    ```sql

    USE Master

    GO

    CREATE SERVER ROLE AOAG AUTHORIZATION [WIN-KIAGK4GN1MJ\Administrator] ;

    GO

    GRANT ALTER ANY AVAILABILITY GROUP TO AOAG ;

    GRANT ALTER ANY ENDPOINT TO AOAG ;

    GRANT CREATE AVAILABILITY GROUP TO AOAG ;

    GRANT CREATE ENDPOINT TO AOAG ;

    GO

    ```


    **清单 10-3** 创建服务器角色并分配权限

