    ## 创建可配置的 SQL Server Docker 镜像


    虽然“为 SQL Server 创建一个简单的 Docker 镜像”一节中讨论的构建过程易于遵循，但它也相当不灵活。所有内容都是硬编码的，并且没有在构建过程中附加数据库的方法。因此，在接下来的演示中，我们将对构建进行重大更改，允许我们对其进行参数化，使构建在现实场景中更加可用。


    遵循与之前相同的过程，并使用主机上相同的文件夹结构，让我们首先创建一个新的 Docker 文件。我们将使用的`Dockerfile`内容可以在清单 4-28
    中找到。该文件相似，但你会注意到一些变化。首先，我们删除了安装 SQL Server 命令行实用工具的代码。这是因为我们将使用`sqlserver` PowerShell
    provider 代替。


    我们还将 SQL Server 安装步骤中硬编码的 sa 密码更改为`TempPassw0rd`。这是因为当我们运行容器实例时，我们将传入想要使用的密码。


    最显著的是，你会注意到对`Start.ps1`的调用被扩展为传递参数。在这个构建中，`Start.ps1`是所有魔法发生的地方。你会注意到我们将环境变量传递给脚本的每个参数。


    ```

    #使用 Server Core 基础镜像

    FROM mcr.microsoft.com/windows/servercore:ltsc2019

    #为 SQL Server 和 SQL 命令行实用工具媒体创建临时文件夹

    RUN powershell -Command (mkdir C:\SQL2019)

    #将 SQL Server 媒体复制到容器中

    COPY \SQL2019 C:/SQL2019

    #安装 SQL Server

    RUN C:/SQL2019/SETUP.exe /Q /ACTION=INSTALL /FEATURES=SQLENGINE /INSTANCENAME=MSSQLSERVER
    \

    /SECURITYMODE=SQL /SAPWD="TempPassw0rd" /SQLSVCACCOUNT="NT AUTHORITY\System" \

    /AGTSVCACCOUNT="NT AUTHORITY\System" /SQLSYSADMINACCOUNTS="BUILTIN\Administrators"
    \

    /IACCEPTSQLSERVERLICENSETERMS=1 /TCPENABLED=1 /UPDATEENABLED=False

    #设置 SQL Server 自动启动

    RUN powershell -Command (Set-Service MSSQLSERVER -StartupType Automatic)

    #移除安装媒体

    RUN powershell -Command (Remove-Item -Path C:/SQL2019 -Recurse -Force)

    #为数据文件创建挂载点

    VOLUME C:/DataFiles

    #将 shell 切换到 PowerShell

    #SHELL ["powershell", "-Command", "$ErrorActionPreference = ''Stop''; $ProgressPreference
    = ''SilentlyContinue'';"]

    #将 start.ps1 复制到容器

    COPY \start.ps1 /

    WORKDIR /

    CMD powershell -Command (.\start.ps1 -saPassword $env:saPassword -databases $env:databases
    -agentStartupType $env:agentStartupType)

    清单 4-28

    Dockerfile

    ```


    我们的下一步将是创建一个新的`Start.ps1`文件。这次，如清单 4-29 所示，该文件要复杂得多。该脚本接受三个参数，允许我们传入 sa 帐户的密码、实例上应该存在的数据库数组以及
    SQL Server 代理服务所需的启动类型。


    脚本中的第一个命令用于从 PowerShell 库安装`sqlserver` PowerShell 模块。这使我们能够使用`Invoke-SqlCmd` cmdlet。然后，脚本使用
    sa 帐户的临时密码对 SQL 实例运行查询，并将密码更改为传入的密码。


    脚本的下一部分是最复杂的部分。此部分检查传入的数据库名称数组中的每个数据库是否存在于实例上。如果不存在，它会尝试从挂载卷附加数据库。如果数据库文件不存在，它将检查挂载卷中是否存在备份文件并还原数据库。最后，如果其他所有方法都失败，则将创建一个新数据库。'
- fmt: "### Tip\n\n此版本的脚本严重依赖于数据库和备份文件的命名约定。它还假设始终只有一个`.mdf`和`.ldf`文件。当然，你可以编辑此脚本，以添加对`.ndf`文件、你自己的命名约定或应用程序需求的支持。\n\
    \n脚本中的下一个命令将修改 SQL Server Agent 服务以使用传递给脚本的启动类型。最后，脚本进入与上一个示例相同的无限循环。这可以防止容器在最后一个指令传递后停止。\n\
    \n```powershell\nparam(\n    [Parameter(Mandatory=$true)]\n    [string]$saPassword,\n\
    \    [Parameter(Mandatory=$false)]\n    [string]$databases,\n    [Parameter(Mandatory=$false)]\n\
    \    [String]$agentStartupType\n)\n\n#Install SQL Server PowerShell Provider\n\
    If(-not(Get-InstalledModule SQLServer -ErrorAction silentlycontinue)){\n    Install-Module\
    \ SQLServer -Confirm:$False -Force\n}\n\n#Update sa Password\n$params = @{\n \
    \   ServerInstance = \"localhost\"\n    Username = \"sa\"\n    Password = \"TempPassw0rd\"\
    \n    Query = \"ALTER LOGIN [sa] WITH PASSWORD='{0}'; ALTER LOGIN sa ENABLE ;\"\
    \ -f $saPassword\n}\nInvoke-Sqlcmd @params\n\n#Shred the database array\n$databasesClean\
    \ = $databases -split \",\"\n\n#Create each database\nForEach ($database in $databasesClean)\
    \ {\n    $params = @{\n        ServerInstance = \"localhost\"\n        Username\
    \ = \"sa\"\n        Password = $saPassword\n        Variable = \"dbName='{0}'\"\
    \ -f $database\n        Query = \"SELECT COUNT(*) AS dbExists FROM sys.databases\
    \ WHERE name = `$(dbName)\"\n    }\n    $dbExists = Invoke-Sqlcmd @params\n\n\
    \    if ($dbexists.dbExists -eq 0) {\n        $mdf = \"C:\\DataFiles\\{0}.mdf\"\
    \ -f $database\n        if (Test-Path $mdf) {\n            $params = @{\n    \
    \            ServerInstance = \"localhost\"\n                Username = \"sa\"\
    \n                Password = $saPassword\n                Variable = \"dbName='{0}'\"\
    \ -f $database\n                Query = \"DECLARE @SQL NVARCHAR(MAX) = 'CREATE\
    \ DATABASE [' + `$(dbName) + '] ON ( FILENAME = N'C:\\datafiles\\' + `$(dbName)\
    \ + '.mdf' ),( FILENAME = N'C:\\datafiles\\' + `$(dbName) + '.ldf' ) FOR ATTACH';\
    \ EXEC(@SQL)\"\n            }\n            Invoke-Sqlcmd @params\n        } else\
    \ {\n            $bak = \"C:\\DataFiles\\{0}.bak\" -f $database\n            if\
    \ (Test-Path $bak) {\n                $params = @{\n                    ServerInstance\
    \ = \"localhost\"\n                    Username = \"sa\"\n                   \
    \ Password = $saPassword\n                    Variable = \"dbName='{0}'\" -f $database\n\
    \                    Query = \"DECLARE @SQL NVARCHAR(MAX) = 'RESTORE DATABASE\
    \ [' + `$(dbName) + '] FROM  DISK = N'C:\\Datafiles\\' + `$(dbName) + '.bak';';\
    \ EXEC(@SQL)\"\n                }\n                Invoke-Sqlcmd @params\n   \
    \         } else {\n                $params = @{\n                    ServerInstance\
    \ = \"localhost\"\n                    Username = \"sa\"\n                   \
    \ Password = $saPassword\n                    Variable = \"dbName='{0}'\" -f $database\n\
    \                    Query = \"DECLARE @SQL NVARCHAR(MAX) = 'CREATE DATABASE ['\
    \ + `$(dbName) + ']' EXEC(@SQL)\"\n                }\n                Invoke-Sqlcmd\
    \ @params\n            }\n        }\n    }\n}\n\n#Set Agent service startup type\n\
    Set-Service SQLSERVERAGENT -StartupType $agentStartupType\n\n#Start infinite loop\n\
    $lastCheck = (Get-Date).AddSeconds(-2)\nwhile ($true)\n{\n    $lastCheck = Get-Date\n\
    \    Start-Sleep -Seconds 2\n}\n```\n\n*Listing 4-29*\n*Start.ps1*\n\n### Tip\n\
    \n环境变量不支持数组。因此，我们需要将数据库列表作为逗号分隔的字符串传递。然后，我们在 PowerShell 中使用 `Split` 来创建数组。\n\n\
    现在我们可以使用清单 [4-30] 中的命令来构建镜像。请注意，我已增加主版本号。\n\n```bash\ndocker build -t sql-2019:2.0\
    \ .\n```\n\n*Listing 4-30*\n*Build the Docker Image*\n\n最后，我们可以如清单 [4-31] 所示运行容器。请注意，我们使用\
    \ `-e` 开关在容器中创建环境变量。\n\n```bash\ndocker run -p 1433:1433 --name sql-2019 -e \"\
    saPassword=PermPassw0rd\" -e \"databases=test,persisteddata\" -e \"agentStartupType=Automatic\"\
    \ -d --volume c:\\Datafiles:c:\\datafiles sql-2019:2.0\n```\n\n*Listing 4-31*\n\
    *Run the Container*\n\n### Tip\n\n容器自动化的可能性本身就值得写一本书，我鼓励你进行实验。例如，你可以尝试将运行容器的命令包装在\
    \ PowerShell 脚本中，在其中传递所需的容器名称。该脚本随后可以在主机上创建一个包含容器名称的文件夹，使其具有唯一性。容器的挂载卷可以映射到一个唯一的文件夹名称。你还应该尝试将\
    \ `sa` 密码作为加密文件的路径传递，因为在生产环境中将其作为环境变量传递并不安全。你也可以尝试向容器添加 gMSA（组托管服务账户）。这将允许 SQL\
    \ Server 与 AD 交互，尽管容器不支持域加入。\n\n### Kubernetes 支持\n\nKubernetes 是一个容器编排器。它允许在服务器集群上运行容器，为容器提供高可用性。使用最新版本的\
    \ Kubernetes，Windows Server 2019 服务器可以与 Linux 服务器一起添加到集群中。\n\nSQL Server 2019\
    \ 远非忽视这一事实，并引入了一项名为大数据集群（Big Data Clusters）的新技术。该技术利用 Kubernetes 的力量来部署可扩展的 SQL\
    \ Server、Spark 和 HDFS 容器集群。大数据集群超出了本书的范围，但更多细节可以在 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/big-data-cluster-overview`](https://docs.microsoft.com/en-us/sql/big-data-cluster/big-data-cluster-overview)\
    \ 找到。\n\n此外，从 SQL Server 2019 开始，AlwaysOn 可用性组也可用于在 Kubernetes 编排的容器中，为托管容器的数据库提供高可用性和灾难恢复。这利用了\
    \ SQL Server Kubernetes 操作员（operator）的概念，它是一个扩展 Kubernetes API 的应用程序特定软件。在这种情况下，结果是一个操作员，它协助在集群内打包、部署和管理\
    \ AlwaysOn 容器。在 Kubernetes 集群中构建可用性组超出了本书的范围，但更多细节可以在 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-kubernetes-deploy`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-kubernetes-deploy)\
    \ 找到。在这里，你会发现一个使用 Azure 托管 Kubernetes 服务配置可用性组的演练。\n\n## 总结\n\nSQL Server 现在不仅可以安装在\
    \ Windows 上，还可以安装在 Linux 上和容器内。这为数据库架构师提供了更大的灵活性，可以将 SQL Server 托管在最适合其应用程序需求的平台上。\n\
    \nSQL Server 可以安装在 Ubuntu、Red Hat 和 Suse Linux 发行版上。在规划部署时，你应确保使用的是受支持的 Linux\
    \ 版本以及受支持的 Linux 发行版。\n\nSQL Server 可以安装在 Windows 和 Linux 容器上。Microsoft 提供了一些基本的\
    \ Docker 镜像，但对于大多数用途，你将需要构建自己的自定义 Docker 镜像来部署 SQL Server。除了独立的 Docker 容器外，SQL\
    \ Server 2019 还引入了对 Kubernetes 的支持，包括大数据集群和 SQL Server Kubernetes 操作员，这允许在 Kubernetes\
    \ 集群内安装 AlwaysOn 可用性组。\n\n# 5. 配置实例\n\nSQL Server 实例的安装和配置在安装成功完成时并未结束。无论是在数据库引擎内部还是外部（使用诸如\
    \ SQL Server 配置管理器之类的工具），你都需要考虑许多其他因素。在本章中，我们将讨论许多最重要的实例级配置选项，包括 SQL Server 新的缓冲池扩展技术以及系统数据库的重要配置选择。我们还将了解如何配置你的实例以使其与防火墙协同工作。\n\
    \n## 实例配置\n\n在实例层面，有无数可以配置的设置和标志。在以下部分中，我们将探讨使用诸如 `sp_configure`、`sys.configurations`、`DBCC\
    \ TRACEON` 和 `ALTER SERVER` 等工具来查看和配置这些设置。"
  raw: '### Tip


    This version of the script relies heavily on naming conventions of database and
    backup files. It also assumes that there will only ever be an `.mdf` and `.ldf`
    file. You can, of course, edit this script, however, to add support for `.ndf`
    files or your own naming conventions or application requirements.


    The next command in the script will alter the SQL Server Agent service to use
    the startup type that has been passed to the script. Finally, the script enters
    the same infinite loop as in the previous example. This stops the container from
    stopping, after the last instruction is passed.


    ```

    param(

    [Parameter(Mandatory=$true)]

    [string]$saPassword,

    [Parameter(Mandatory=$false)]

    [string]$databases,

    [Parameter(Mandatory=$false)]

    [String]$agentStartupType

    )

    #Install SQL Server PowerShell Provider

    If(-not(Get-InstalledModule SQLServer -ErrorAction silentlycontinue)){

    Install-Module SQLServer -Confirm:$False -Force

    }

    #Update sa Password

    $params = @{

    ServerInstance = "localhost"

    Username = "sa"

    Password = "TempPassw0rd"

    Query = "ALTER LOGIN [sa] WITH PASSWORD=''{0}''; ALTER LOGIN sa ENABLE ;" -f $saPassword

    }

    Invoke-Sqlcmd @params

    #Shred the database array

    $databasesClean = $databases -split ","

    #Create each database

    ForEach ($database in $databasesClean) {

    $params = @{

    ServerInstance = "localhost"

    Username = "sa"

    Password = $saPassword

    Variable = "dbName=''{0}''" -f $database

    Query = "SELECT COUNT(*) AS dbExists FROM sys.databases WHERE name = `$(dbName)"

    }

    $dbExists = Invoke-Sqlcmd @params

    if ($dbexists.dbExists -eq 0) {

    $mdf = "C:\DataFiles\{0}.mdf" -f $database

    if (Test-Path $mdf) {

    $params = @{

    ServerInstance = "localhost"

    Username = "sa"

    Password = $saPassword

    Variable = "dbName=''{0}''" -f $database

    Query = "DECLARE @SQL NVARCHAR(MAX) = ''CREATE DATABASE ['' + `$(dbName) + '']
    ON ( FILENAME = N"C:\datafiles\'' + `$(dbName) + ''.mdf" ),( FILENAME = N"C:\datafiles\''
    + `$(dbName) + ''.ldf" ) FOR ATTACH''; EXEC(@SQL)"

    }

    Invoke-Sqlcmd @params

    } else {

    $bak = "C:\DataFiles\{0}.bak" -f $database

    if (Test-Path $bak) {

    $params = @{

    ServerInstance = "localhost"

    Username = "sa"

    Password = $saPassword

    Variable = "dbName=''{0}''" -f $database

    Query = "DECLARE @SQL NVARCHAR(MAX) = ''RESTORE DATABASE ['' + `$(dbName) + '']
    FROM  DISK = N"C:\Datafiles\'' + `$(dbName) + ''.bak";''; EXEC(@SQL)"

    }

    Invoke-Sqlcmd @params

    } else {

    $params = @{

    ServerInstance = "localhost"

    Username = "sa"

    Password = $saPassword

    Variable = "dbName=''{0}''" -f $database

    Query = "DECLARE @SQL NVARCHAR(MAX) = ''CREATE DATABASE ['' + `$(dbName) + '']''
    EXEC(@SQL)"

    }

    Invoke-Sqlcmd @params

    }

    }

    }

    }

    #Set Agent service startup type

    Set-Service SQLSERVERAGENT -StartupType $agentStartupType

    #Start infinite loop

    $lastCheck = (Get-Date).AddSeconds(-2)

    while ($true)

    {

    $lastCheck = Get-Date

    Start-Sleep -Seconds 2

    }

    Listing 4-29

    Start.ps1

    ```


    ### Tip


    Environment variables do not support arrays. Therefore, we need to pass the list
    of databases as a comma-separated string. We then use Split in PowerShell to create
    the array.


    We can now build the image, using the command in Listing [4-30](#333037_2_En_4_Chapter.xhtml#PC30).
    Notice that I have incremented the major version number.


    ```

    docker build -t sql-2019:2.0 .

    Listing 4-30

    Build the Docker Image

    ```


    Finally, we can run the container, as demonstrated in Listing [4-31](#333037_2_En_4_Chapter.xhtml#PC31).
    Notice that we are using -e switches, to create the environment variables in the
    container.


    ```

    docker run -p 1433:1433 --name sql-2019 -e "saPassword=PermPassw0rd" -e "databases=test,persisteddata"
    -e "agentStartupType=Automatic" -d --volume c:\Datafiles:c:\datafiles sql-2019:2.0

    Listing 4-31

    Run the Container

    ```


    ### Tip


    The possibilities for automation with containers are worthy of a book in its own
    right, and I would encourage you to experiment. For example, you could try wrapping
    the command that runs the container in a PowerShell script, where you pass the
    required name of the container. The script could then create a folder on the host,
    which includes the container name, making it unique. The container’s mounted volume
    could then map to a unique folder name. You should also experiment with passing
    the sa password as a path to an encrypted file, as passing it in an environment
    variable is not secure for a production environment. You could also experiment
    with adding a gMSA to the container. This will allow SQL Server to interact with
    AD, despite domain join not being supported for containers.


    ### Kubernetes Support


    Kubernetes is a container orchestrator. It allows for containers to be run on
    a cluster of servers, providing high availability for containers. With the latest
    version of Kubernetes, Windows Server 2019 servers can be added to a cluster,
    alongside Linux servers.


    SQL Server 2019 has far from ignored this fact and has introduced a new technology
    called Big Data Clusters. This technology harnesses the power of Kubernetes to
    deploy a scalable cluster of SQL Server, Spark, and HDFS containers. Big Data
    Clusters are beyond the scope of this book, but further details can be found at
    [`https://docs.microsoft.com/en-us/sql/big-data-cluster/big-data-cluster-overview`](https://docs.microsoft.com/en-us/sql/big-data-cluster/big-data-cluster-overview)
    .


    Additionally , from SQL Server 2019, AlwaysOn Availability Groups can also be
    used in containers orchestrated with Kubernetes, to provide HA and DR for databases
    hosted containers. This works with the concept of a SQL Server Kubernetes operator,
    which is an application-specific software that extends the Kubernetes API. In
    this case, the result is an operator that assists in packaging, deploying, and
    managing AlwaysOn containers within the cluster. Building Availability Groups
    inside a Kubernetes cluster is beyond the scope of this book, but further details
    can be found at [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-kubernetes-deploy`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-kubernetes-deploy)
    . Here, you will find a walkthrough of configuring Availability Groups, using
    Azure’s managed Kubernetes service.


    ## Summary


    SQL Server can now be installed not just on Windows but also on Linux and inside
    containers. This provides much more flexibility for database architects to host
    SQL Server on the platform that is most appropriate for their application’s needs.


    SQL Server can be installed on Ubuntu, Red Hat, and Suse Linux distributions.
    When planning the deployment, you should ensure that you are using a supported
    version as well as a supported distribution of Linux.


    SQL Server can be installed on both Windows and Linux containers. Microsoft supplies
    some basic Docker images, but for most purposes, you will need to build your own,
    custom Docker image for deploying SQL Server. In addition to stand-alone Docker
    containers, SQL Server 2019 also introduces support for Kubernetes, with Big Data
    Clusters and a SQL Server Kubernetes operator, which allows for AlwaysOn Availability
    Groups to be installed within a Kubernetes cluster.


    # 5. Configuring the Instance


    The installation and configuration of your SQL Server instance does not end when
    setup successfully completes. There are many other considerations that you should
    take into account, both inside the database engine and outside of it, using tools
    such as SQL Server Configuration Manager. In this chapter, we will discuss many
    of the most important instance-level configuration options, including SQL Server’s
    new buffer pool extension technology and important configuration choices for system
    databases. We will also look at how your instance can configure SQL Server to
    work with your firewall.


    ## Instance Configuration


    At the instance level, there are countless settings and flags that can be configured.
    In the following sections, we will look at viewing and configuring these settings
    using tools such as `sp_configure`, `sys.configurations`, `DBCC TRACEON`, and
    `ALTER SERVER`.'
