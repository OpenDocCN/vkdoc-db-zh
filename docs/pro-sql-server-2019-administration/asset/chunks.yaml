    Let’s now create our Extended Event session and start the trace. You should configure
    the Event session to capture the events, event fields, and actions detailed in
    Table [21-4](#333037_2_En_21_Chapter.xhtml#Tab4).


    Table 21-4


    Events and Event Fields'
