- fmt: '### 提示


    你还可以嵌套服务器组。因此，在更复杂的拓扑结构中，你可以为每个地理区域设置一个服务器组，其中包含每个环境的服务器组。


    现在，让我们从每个服务器组的上下文菜单中选择“新建服务器注册”选项，将我们的实例添加到相应的组中。我们将`SQLSERVER\TARGETSERVER1`和`SQLSERVER\TARGETSERVER2`添加到Prod组，并将`SQLSERVER`的默认实例添加到DevTest组。你可以使用与注册中央管理服务器时相同的“新建服务器注册”对话框来添加服务器。图[23-7](#333037_2_En_23_Chapter.xhtml#Fig7)显示了添加服务器后的“已注册服务器”屏幕。


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig7_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig7_HTML.jpg)


    图 23-7


    “已注册服务器”窗口


    中央管理服务器的一个非常有用的功能是能够针对服务器组内的所有服务器或它们管理的所有服务器运行查询。例如，我们可以从Prod服务器组的上下文菜单中选择“新建查询”，然后运行清单[23-3](#333037_2_En_23_Chapter.xhtml#PC3)中的查询。


    ```

    SELECT name

    FROM sys.Databases ;

    -- 清单 23-3

    -- 列出服务器组中的所有数据库

    ```


    此查询返回的结果如图[23-8](#333037_2_En_23_Chapter.xhtml#Fig8)所示。


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig8_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig8_HTML.jpg)


    图 23-8


    列出服务器组中所有服务器的结果


    你首先会注意到，查询结果下方的状态栏是粉红色而不是黄色。这表示查询已在多个服务器上运行。其次，状态栏没有显示实例名称，而是显示了查询针对的服务器组；在我们的例子中，是Prod。最后，请注意结果集中添加了一个额外的列。此列名为“服务器名称”，它指示该行是从组内的哪个实例返回的。由于`SQLSERVER\TARGETSERVER1`和`SQLSERVER\TARGETSERVER2`上不存在用户数据库，因此从每个实例返回了四个系统数据库。


    ## 创建策略


    你可以使用SQL Server Management Studio或T-SQL创建策略。以下部分讨论如何创建简单的静态策略，然后再讨论如何创建高级的动态策略。


    ### 创建简单策略


    PBM在其预定义的方面、属性和条件中提供了极大的灵活性。你可以利用这种灵活性为企业创建一套全面的策略。以下部分讨论如何使用PBM的内置功能创建简单策略。


    #### 创建可手动评估的策略


    你可能已经注意到，本书中的示例数据库使用`Chapter<ChapterNumber>`的命名格式。因此，我们在这里创建一个策略来强制执行此命名约定，方法是使任何违反此策略的策略回滚并生成错误。为此，我们通过在主服务器的对象资源管理器中依次展开“管理”->“策略管理”，然后从“策略”上下文菜单中选择“新建策略”，来调用“创建新策略”对话框。图[23-9](#333037_2_En_23_Chapter.xhtml#Fig9)显示了该对话框的“常规”页面。


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig9_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig9_HTML.jpg)


    图 23-9


    “创建新策略”对话框，“常规”页面


    在此页面上，我们为策略命名，但发现“针对目标”和“评估模式”选项不可用。这是因为我们尚未创建条件。因此，我们的下一步是使用“检查条件”下拉框选择“新建条件”。这将显示“创建新条件”对话框的“常规”页面，如图[23-10](#333037_2_En_23_Chapter.xhtml#Fig10)所示。


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig10_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig10_HTML.jpg)


    图 23-10


    “创建新条件”对话框，“常规”页面


    在此页面上，我们为条件命名并选择“数据库”方面。在屏幕的“表达式”区域，我们选择`@Name`字段应该`LIKE ''Chapter%''`，其中`%`是零个或多个字符的通配符。在“描述”页面上，我们可以选择为条件指定文本描述。


    回到“创建新策略”对话框的“常规”页面，我们确保“评估模式”下拉列表设置为“按需”，这意味着除非我们显式评估该策略，否则不会对其进行评估。唯一可用的其他选项是安排评估。这是因为“数据库”方面不支持“更改时：仅记录”或“更改时：阻止”评估模式。


    我们的策略显然不适用于系统数据库。这很重要，因为我们可以使用该策略检查现有数据库以及我们创建的新数据库。因此，在页面的“针对目标”部分，我们使用下拉框进入“创建新条件”对话框，并创建一个排除数据库ID小于或等于4的数据库的条件，如图[23-11](#333037_2_En_23_Chapter.xhtml#Fig11)所示。


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig11_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig11_HTML.jpg)


    图 23-11


    创建 ExcludeSystemDatabases 条件


    回到“创建新策略”对话框，我们可以创建一个条件来强制执行服务器限制，该限制筛选要评估策略的实例。但是，因为我们仅针对`SQLSERVER\MASTERSERVER`实例评估策略，所以不需要这样做。相反，我们导航到“描述”页面，如图[23-12](#333037_2_En_23_Chapter.xhtml#Fig12)所示。


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig12_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig12_HTML.jpg)


    图 23-12


    “描述”页面


    在此页面上，我们使用“新建”按钮创建一个新类别`CodeRelease`，它帮助我们在UAT（用户验收测试）或OAT（操作验收测试）环境中检查代码质量，然后再将代码推广到生产环境。我们还可以选择添加策略的自由文本描述和帮助超链接，以及网站地址或电子邮件链接。


    #### 手动评估策略


    在评估我们的策略之前，我们首先通过执行清单[23-4](#333037_2_En_23_Chapter.xhtml#PC4)中的命令创建一个不符合我们命名约定的数据库。


    ```

    CREATE DATABASE BrokenPolicy ;

    -- 清单 23-4

    -- 创建一个 BrokenPolicy 数据库

    ```


    我们可以通过使用“评估策略”对话框来评估我们的新策略，该对话框可以通过在对象资源管理器中依次展开“管理”->“策略管理”->“策略”，并从我们的策略的上下文菜单中选择“评估”来调用。


    ### 提示


    即使策略被禁用，你也可以手动评估它。


    在“评估策略”对话框中，如图[23-13](#333037_2_En_23_Chapter.xhtml#Fig13)所示，你会在窗口上半部分看到已评估策略的列表；状态指示器会告知是否有任何策略被破坏。在窗口的下半部分，你会看到高亮显示的策略所评估的目标列表；这里的状态指示器会逐个目标地告知你策略的状态。'
  raw: '### Tip


    You can also nest server groups. Therefore, in more complex topologies, you can
    have a server group for each geographical region, which contains a server group
    for each environment.


    Now let’s choose the New Server Registration option from the context menu of each
    server group to add our instances to the appropriate groups. We add `SQLSERVER\TARGETSERVER1`
    and `SQLSERVER\TARGETSERVER2` to the Prod group and add the default instance of
    `SQLSERVER` to the DevTest group. You can add the servers using the same New Server
    Registration dialog box that you used to register the central management server.
    Figure [23-7](#333037_2_En_23_Chapter.xhtml#Fig7) shows the Registered Servers
    screen after the servers have been added.


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig7_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig7_HTML.jpg)


    Figure 23-7


    The Registered Servers window


    One very useful feature of central management servers is their ability to run
    queries against all servers within a server group or against all servers they
    manage. For example, we can select New Query from the context menu of the Prod
    Server Group and run the query in Listing [23-3](#333037_2_En_23_Chapter.xhtml#PC3).


    ```

    SELECT name

    FROM sys.Databases ;

    Listing 23-3

    Listing All Database in the Server Group

    ```


    This query returns the results displayed in Figure [23-8](#333037_2_En_23_Chapter.xhtml#Fig8).


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig8_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig8_HTML.jpg)


    Figure 23-8


    Results of listing all servers in the server group


    The first thing you notice is that the status bar below the query results is pink
    instead of yellow. This indicates that the query has been run against multiple
    servers. Second, instead of displaying an instance name, the status bar displays
    the server group that the query has been run against; in our case, this is Prod.
    Finally, notice that an additional column has been added to the result set. This
    column is called Server Name, and it indicates which instance within the server
    group the row returned from. Because no user databases exist on `SQLSERVER\TARGETSERVER1`
    or `SQLSERVER\TARGETSERVER2`, the four system databases have been returned from
    each instance.


    ## Creating Policies


    You can create policies using either SQL Server Management Studio or T-SQL. The
    following sections discuss how to create a simple static policy, before they go
    on to discuss how to create advanced, dynamic policies.


    ### Creating Simple Policies


    PBM offers a great deal of flexibility within its predefined facets, properties,
    and conditions. You can use this flexibility to create a comprehensive set of
    policies for your enterprise. The following sections discuss how to use PBM’s
    built-in functionality to create simple policies.


    #### Creating a Policy That You Can Manually Evaluate


    As you’ve probably noticed, example databases in this book use the name format
    of `Chapter<ChapterNumber>`. Therefore, here we create a policy that enforces
    this naming convention by causing any policy that violates this policy to roll
    back and generate an error. To do this, we invoke the Create New Policy dialog
    box by drilling through Management ➤ Policy Management in Object Explorer on the
    Master server and then selecting New Policy from the Policies context menu. Figure
    [23-9](#333037_2_En_23_Chapter.xhtml#Fig9) displays the General page of the dialog
    box.


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig9_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig9_HTML.jpg)


    Figure 23-9


    Create New Policy dialog box, General page


    On this page, we give the policy a name but find that the Against Targets and
    Evaluation Mode options are not accessible. This is because we have not yet created
    a condition. Therefore, our next step is to use the Check Condition drop-down
    box to select New Condition. This causes the General page of the Create New Condition
    dialog box to display, illustrated in Figure [23-10](#333037_2_En_23_Chapter.xhtml#Fig10).


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig10_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig10_HTML.jpg)


    Figure 23-10


    Create New Condition dialog box, General page


    On this page, we give the condition a name and select the Database facet. In the
    Expression area of the screen, we select that the `@Name` field should be `LIKE
    ''Chapter%''`, where `%` is a zero-or-more-character wildcard. On the Description
    page, we are optionally able to specify a textual description for the condition.


    Back on the General page of the Create New Policy dialog box, we ensure that the
    Evaluation Mode drop-down is set to select On Demand, which means that the policy
    is not evaluated unless we explicitly evaluate it. The only other option available
    is to schedule the evaluation. This is because the Database facet does not support
    the On Change: Log Only or On Change: Prevent evaluation modes.


    Our policy obviously does not apply to system databases. This matters because
    we can use our policy to check existing databases as well as new databases we
    create. Therefore, in the Against Targets section of the page, we use the drop-down
    box to enter the Create New Condition dialog box and create a condition that excludes
    databases that have a database ID of four or less, as shown in Figure [23-11](#333037_2_En_23_Chapter.xhtml#Fig11).


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig11_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig11_HTML.jpg)


    Figure 23-11


    Create an ExcludeSystemDatabases condition


    Back in the Create New Policy dialog box, we can create a condition to enforce
    a server restriction, which filters the instances that the policy is evaluated
    against. Because we are only evaluating the policy against our `SQLSERVER\MASTERSERVER`
    instance, however, we do not need to do this. Instead, we navigate to the Description
    page, illustrated in Figure [23-12](#333037_2_En_23_Chapter.xhtml#Fig12).


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig12_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig12_HTML.jpg)


    Figure 23-12


    The Description page


    On this page, we use the New button to create a new category, `CodeRelease`, which
    helps us check code quality in a UAT (user acceptance testing) or OAT (operational
    acceptance testing) environment before the code is promoted to production. Optionally,
    we can also add a free text description of the policy and a help hyperlink, alongside
    a web site address or e-mail link.


    #### Manually Evaluating a Policy


    Before evaluating our policy, we first create a database that does not match our
    naming convention by executing the command in Listing [23-4](#333037_2_En_23_Chapter.xhtml#PC4).


    ```

    CREATE DATABASE BrokenPolicy ;

    Listing 23-4

    Creating a BrokenPolicy Database

    ```


    We can evaluate our new policy against our instance by using the Evaluate Policies
    dialog box, which we can invoke by drilling through Management ➤ Policy Management
    ➤ Policies and by selecting Evaluate from the context menu of our policy.


    ### Tip


    You can manually evaluate the policy even if it is disabled.


    In the Evaluate Policies dialog box, shown in Figure [23-13](#333037_2_En_23_Chapter.xhtml#Fig13),
    you see a list of policies that have been evaluated in the top half of the window;
    a status indicator informs you if any policies have been broken. In the bottom
    half of the window, you see a list of targets that the highlighted policy was
    evaluated against; here a status indicator informs you of the policy’s status
    on a target-by-target basis.'
