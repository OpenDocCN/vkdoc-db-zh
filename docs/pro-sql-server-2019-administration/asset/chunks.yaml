    ## Summary


    Extended Events introduce new concepts that you must understand in order to fully
    harness their power. Events are points of interest that are captured in a trace,
    whereas actions provide extended information, in addition to the event columns.
    Predicates allow you to filter events in order to provide a more targeted trace,
    and targets define how the data is stored. A session is the trace object itself,
    and it can be configured to include multiple events, actions, predicates, and
    targets.


    You can create an event session through the New Session Wizard, an easy and quick
    method that exposes Templates; via the New Session dialog box; or of course, via
    T-SQL. When creating a session via T-SQL, you use the `CREATE EVENT SESSION` DDL
    statement to configure all aspects of the trace.


    Each Extended Event artifact is contained within one of four packages: `Package0`,
    `Sqlserver`, `Sqlos`, and `SecAudit`. The contents of `SecAudit` are not exposed,
    however, since these are used internally to support SQL Audit functionality, which
    is discussed in Chapter [9](#333037_2_En_9_Chapter.xhtml).


    You can view data using the data viewer. The data viewer allows you to watch live
    data in the session’s buffers, and it also supports viewing target data from the
    Event File, Event Count, and Histogram Target types. The data viewer provides
    basic data analysis capability, including grouping and aggregating data.


    For more complex data analysis, you can open targets in T-SQL. To open an Event
    File target, use the `sys.fn_xe_file_target_read_file` results system stored procedure.
    You then have the power of T-SQL at your disposal for complex analysis requirements.


    You can correlate events by turning on causality tracking within the session.
    This adds a `GUID` and a sequence number to each event so that you can identify
    relationships. You can also easily correlate SQL events with Perfmon data, because
    Extended Events expose processor, logical disk, and system performance counters.
    To correlate events with other operating system–level events, event sessions can
    use the ETW target, which you can then merge with other data collector sets to
    map Extended Events to events from other providers in the ETW architecture.


    # 20. Query Store


    The Query Store is a feature that was introduced in SQL Server 2016, which captures
    the history of queries, their plans, and statistics. It allows DBAs to easily
    view the plans that were used by queries and troubleshoot performance issues.
    In this chapter, we will discuss how Query Store can be enabled and configured.
    We will also examine how the Query Store can be used to diagnose and resolve performance
    issues.


    ## Enabling and Configuring Query Store


    Query Store is enabled and configured at the database level, so the first thing
    we will do is create a database, called `Chapter20`. This can be achieved using
    the script in Listing [20-1](#333037_2_En_20_Chapter.xhtml#PC1).


    ```sql

    --Create the database

    CREATE DATABASE Chapter20 ;

    GO

    USE Chapter20

    GO

    --Create and populate numbers table

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE;

    --Create and populate name pieces

    DECLARE @Names TABLE

    (

    FirstName        VARCHAR(30),

    LastName        VARCHAR(30)

    );

    INSERT INTO @Names

    VALUES(''Peter'', ''Carter''),

    (''Michael'', ''Smith''),

    (''Danielle'', ''Mead''),

    (''Reuben'', ''Roberts''),

    (''Iris'', ''Jones''),

    (''Sylvia'', ''Davies''),

    (''Finola'', ''Wright''),

    (''Edward'', ''James''),

    (''Marie'', ''Andrews''),

    (''Jennifer'', ''Abraham'');

    --Create and populate Customers table

    CREATE TABLE dbo.Customers

    (

    CustomerID           INT                NOT NULL                       IDENTITY             PRIMARY
    KEY,

    FirstName            VARCHAR(30)        NOT NULL,

    LastName             VARCHAR(30)        NOT NULL,

    BillingAddressID     INT                NOT NULL,

    DeliveryAddressID    INT                NOT NULL,

    CreditLimit          MONEY              NOT NULL,

    Balance              MONEY              NOT NULL

    );

    SELECT * INTO #Customers

    FROM

    (SELECT

    (SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName,

    (SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) BillingAddressID,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) DeliveryAddressID,

    (SELECT TOP 1 CAST(RAND() * Number AS INT) * 10000

    FROM @Numbers

    ORDER BY NEWID()) CreditLimit,

    (SELECT TOP 1 CAST(RAND() * Number AS INT) * 9000

    FROM @Numbers

    ORDER BY NEWID()) Balance

    FROM @Numbers a

    CROSS JOIN @Numbers b

    ) a;

    INSERT INTO dbo.Customers

    SELECT * FROM #Customers;

    GO

    CREATE INDEX idx_LastName ON dbo.Customers(LastName)

    GO

    Listing 20-1

    Create the Chapter20 Database

    ```


    Now that we have a database, we can enable Query Store for the database, by using
    the command in Listing [20-2](#333037_2_En_20_Chapter.xhtml#PC2).


    ```sql

    ALTER DATABASE Chapter20 SET QUERY_STORE = ON

    Listing 20-2

    Enable Query Store

    ```


    As well as enabling Query Store using an `ALTER DATABASE` command, this method
    is also used to configure Query Store properties. Table [20-1](#333037_2_En_20_Chapter.xhtml#Tab1)
    details the Query Store–related `SET` options that are available.


    **Table 20-1**

    **Query Store SET Options**'
