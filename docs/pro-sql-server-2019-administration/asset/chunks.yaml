    ### 重试逻辑


    无论您使用的是解释型 SQL 还是原生编译的存储过程，在针对内存优化表运行事务时，都必须确保使用重试逻辑。这是因为乐观并发模型意味着冲突检测机制会回滚事务，而不是通过锁来管理并发。同样重要的是要记住，如果无法保证所需的隔离级别，SQL
    Server 甚至会回滚只读事务。例如，如果您在只读事务中使用可序列化隔离级别，而另一个事务插入了与您的查询筛选条件匹配的行，则该事务将被回滚。


    清单 18-12 中的脚本为 `UpdateCreditLimit` 过程创建了一个包装器存储过程，如果过程失败，该过程最多重试十次，每次迭代之间间隔 1
    秒。您应更改此延迟以匹配冲突事务的平均持续时间。


    ```sql

    CREATE PROCEDURE UpdateCreditLimitWrapper

    AS

    BEGIN

    DECLARE @Retries INT = 1 ;

    WHILE @Retries <= 10

    BEGIN

    BEGIN TRY

    EXEC dbo.UpdateCreditLimit ;

    END TRY

    BEGIN CATCH

    WAITFOR DELAY ''00:00:01'' ;

    SET @Retries = @Retries + 1 ;

    END CATCH

    END

    END

    ```

    清单 18-12 内存优化表的重试逻辑


    ## 观察事务、锁和死锁


    SQL Server 提供了一组 DMV（动态管理视图），用于公开有关当前事务和锁的信息。以下各节探讨可用的元数据。


    ### 观察事务


    `sys.dm_tran_active_transactions` DMV 详细列出了实例中的当前事务。此 DMV 返回表 18-11 中描述的列。


    表 18-11 `sys.dm_tran_active_transactions` 返回的列


    | 列 | 描述 |

    | --- | --- |

    | `transaction_id` | 事务的唯一 ID。 |

    | `name` | 事务的名称。如果事务未标记名称，则显示默认名称——例如 `"user_transaction"`。 |

    | `transaction_begin_time` | 事务开始的日期和时间。 |

    | `transaction_type` | 描述事务类型的整数值。<br>• `1` 表示读写事务。<br>• `2` 表示只读事务。<br>• `3`
    表示系统事务。<br>• `4` 表示分布式事务。 |

    | `transaction_uow` | MSDTC（Microsoft 分布式事务协调器）用于处理分布式事务的工作单元 ID。 |

    | `transaction_state` | 事务的当前状态。<br>• `0` 表示事务仍在初始化。<br>• `1` 表示事务已初始化但尚未开始。<br>• `2`
    表示事务处于活动状态。<br>• `3` 表示事务已结束。此状态仅适用于只读事务。<br>• `4` 表示已启动提交。此状态仅适用于分布式事务。<br>• `5`
    表示事务已准备好并等待解决。<br>• `6` 表示事务已提交。<br>• `7` 表示事务正在回滚。<br>• `8` 表示事务回滚已完成。 |

    | `dtc_state` | 指示 Azure 数据库上事务的状态。<br>• `1` 表示事务处于活动状态。<br>• `2` 表示事务已准备好。<br>• `3`
    表示事务已提交。<br>• `4` 表示事务已中止。<br>• `5` 表示事务已恢复。 |


    ### 注意


    本章中的 DMV 已省略未文档化的列。


    清单 18-13 中的脚本展示了如何使用 `sys.dm_tran_active_transactions` 查找长时间运行事务的详细信息。该查询查找运行时间超过
    10 分钟的事务，并返回信息，包括它们的当前状态、消耗的资源量以及执行它们的登录名。


    ### 提示


    在测试环境中，在运行此查询前 10 分钟开始一个事务但不提交它。


    ```sql

    SELECT

    name

    ,transaction_begin_time

    ,CASE transaction_type

    WHEN 1 THEN ''读写''

    WHEN 2 THEN ''只读''

    WHEN 3 THEN ''系统''

    WHEN 4 THEN ''分布式''

    END TransactionType,

    CASE transaction_state

    WHEN 0 THEN ''正在初始化''

    WHEN 1 THEN ''已初始化但未启动''

    WHEN 2 THEN ''活动''

    WHEN 3 THEN ''已结束''

    WHEN 4 THEN ''正在提交''

    WHEN 5 THEN ''已准备好''

    WHEN 6 THEN ''已提交''

    WHEN 7 THEN ''正在回滚''

    WHEN 8 THEN ''已回滚''

    END State

    , SUBSTRING(TXT.text, ( er.statement_start_offset / 2 ) + 1,

    ( ( CASE WHEN er.statement_end_offset = -1

    THEN LEN(CONVERT(NVARCHAR(MAX), TXT.text)) * 2

    ELSE er.statement_end_offset

    END - er.statement_start_offset ) / 2 ) + 1) AS CurrentQuery

    , TXT.text AS ParentQuery

    , es.host_name

    , CASE tat.transaction_type

    WHEN 1 THEN ''读写事务''

    WHEN 2 THEN ''只读事务''

    WHEN 3 THEN ''系统事务''

    WHEN 4 THEN ''分布式事务''

    ELSE ''未知''

    END AS TransactionType

    ,SUSER_SNAME(es.security_id) LoginRunningTransaction

    ,es.memory_usage * 8 MemUsageKB

    ,es.reads

    ,es.writes

    ,es.cpu_time

    FROM sys.dm_tran_active_transactions tat

    INNER JOIN sys.dm_tran_session_transactions st

    ON tat.transaction_id = st.transaction_id

    INNER JOIN sys.dm_exec_sessions es

    ON st.session_id = es.session_id

    INNER JOIN sys.dm_exec_requests er

    ON er.session_id = es.session_id

    CROSS APPLY sys.dm_exec_sql_text(er.sql_handle) TXT

    WHERE st.is_user_transaction = 1

    AND tat.transaction_begin_time < DATEADD(MINUTE,-10,GETDATE()) ;

    ```

    清单 18-13 长时间运行的事务


    该查询通过 `sys.dm_tran_session_transactions` 连接到 `sys.dm_exec_sessions` 来工作。此 DMV
    可用于将事务与会话关联起来，它返回表 18-12 中描述的列。


    表 18-12 `sys.dm_tran_session_transactions` 列


    | 列 | 描述 |

    | --- | --- |

    | `session_id` | 运行事务的会话 ID。 |

    | `transaction_id` | 事务的唯一 ID。 |

    | `transaction_descriptor` | 用于与客户端驱动程序通信的 ID。 |

    | `enlist_count` | 会话中活动请求的数量。 |

    | `is_user_transaction` | 指示事务是用户事务还是系统事务。`0` 表示系统事务，`1` 表示用户事务。 |

    | `is_local` | 指示事务是否为分布式事务。`0` 表示分布式事务，`1` 表示本地事务。 |

    | `is_enlisted` | 指示已征用分布式事务。 |

    | `is_bound` | 指示事务是否在绑定会话中运行。 |

    | `open_transaction_count` | 会话中打开事务的计数。 |

