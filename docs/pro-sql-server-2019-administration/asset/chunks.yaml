- fmt: '### The Planning Tab


    The Planning tab is illustrated in Figure [2-1](#333037_2_En_2_Chapter.xhtml#Fig1)
    and consists of numerous links to MSDN (Microsoft Developer Network) pages, which
    provide you with important documentation on SQL Server, such as a complete set
    of hardware and software requirements and documentation for SQL Server’s security
    model.


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig1_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig1_HTML.jpg)

    Figure 2-1: The Planning tab


    In addition to accessing documentation with the links provided, you can also access
    two tools. The first of these is the `System Configuration Checker`. This tool
    runs during the installation process to determine if there are any conditions
    that will prevent SQL Server from being installed. These checks include ensuring
    that the server is not already configured as a domain controller and checking
    that the WMI (Windows Management Instrumentation) service is running. When you
    run this tool before you begin installing SQL Server, it can prewarn you of any
    issues that may cause the installation to fail so that you can fix them before
    you begin installation. The `System Configuration Checker` is also available on
    the `Tools` tab on the Installation Center.


    The second tool (or more accurately, a link to its download page) is the `Data
    Migration Assistant`. This tool can be used to detect compatibility issues when
    upgrading to SQL Server 2019, as well as recommending performance and reliability
    enhancements.


    ### The Installation Tab


    As illustrated in Figure [2-2](#333037_2_En_2_Chapter.xhtml#Fig2), the `Installation`
    tab of the Installation Center contains the tools that you will use for installing
    a new instance of SQL Server, adding new features to an existing instance, or
    upgrading an instance from SQL Server 2005, 2008, or 2012. In order to install
    a stand-alone instance of SQL Server, you would select the `New SQL Server Stand-Alone
    Instance Or Add New Features To An Existing Instance` option.


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig2_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig2_HTML.jpg)

    Figure 2-2: The Installation tab


    In addition to installing a stand-alone instance, adding new features to an instance,
    and upgrading an existing instance to the latest version, there are also options
    on this screen for installing a SQL Server failover clustered instance and for
    adding a new node to an existing failover cluster. A *failover cluster* is a system
    where between 2 and 64 servers work together to provide redundancy and protect
    against a failure that stops one or more of the servers from functioning. Each
    server that participates in the cluster is known as a *node*.


    The `SQL Server Database Engine` and the `SQL Server Analysis Services` are both
    “cluster-aware” applications, meaning that they can be installed on a Windows
    cluster and can make use of its failover capabilities. When installed on a failover
    cluster, databases and transaction logs are located on shared storage, which any
    node in the cluster can use, but the binaries are installed locally on each of
    the nodes.


    There are also links to the download pages of SQL Server component, which are
    no longer included with the database media. These include `SQL Server Data Tools`,
    which is a studio for T-SQL and BI development, `SQL Server Management Studio`—an
    administration and development interface for SQL Server and `SQL Server Reporting
    Services`, which will allow the server to host and distribute reports.


    Finally, this page contains the option to install a stand-alone instance of `Machine
    Learning Server`. This does not require a SQL Server instance to be installed
    and provides support for the R and Python languages. It also provides a combination
    of R packages, Python packages, interpreters, and infrastructure—providing the
    ability to create both data science and machine learning solutions. These solutions
    can then import, explore, and analyze heterogeneous data sets.


    ### The Maintenance Tab


    The `Maintenance` tab contains tools for performing an edition upgrade, repairing
    a corrupt instance, and removing a node from a cluster; it also contains a link
    to run Windows Update, as illustrated in Figure [2-3](#333037_2_En_2_Chapter.xhtml#Fig3).


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig3_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig3_HTML.jpg)

    Figure 2-3: The Maintenance tab


    You can use the `Edition Upgrade` option to upgrade an existing SQL Server 2019
    instance from one edition to another; so, for example, you may wish to upgrade
    an instance installed as Developer edition to Enterprise edition.


    You can use the `Repair` option to attempt to resolve issues with a corrupt installation
    of SQL Server. For example, you can use this tool if the Registry entries or binaries
    are corrupt, preventing the instance from starting.


    ### Tip


    This `Repair` option won’t help if the Master database is corrupt and preventing
    the instance from starting. In this instance, you should use `setup.exe` from
    the command line, or PowerShell, with the `ACTION` parameter set to `REBUILDDATABASE`.


    Use the `Remove Node From A SQL Server Failover Cluster` option to remove SQL
    Server from a node within a failover cluster. You can use this option as part
    of the process for evicting a node. Unfortunately, the Installation Center has
    no functionality for uninstalling an instance. You must do this through the Control
    Panel.


    Not surprisingly, you can use the `Launch Windows Update To Search For Product
    Updates` option to launch Windows Update. You can then choose to install the updates
    and fixes that are available for SQL Server.


    ### The Tools Tab


    The `Tools` tab contains a selection of tools that will assist you in installing
    SQL Server, as illustrated in Figure [2-4](#333037_2_En_2_Chapter.xhtml#Fig4).
    This includes the `System Configuration Checker`, which I introduced earlier in
    this chapter; a discovery tool for SQL Server components already installed on
    the local server and the `Microsoft Assessment and Planning (MAP) tool`.


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig4_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig4_HTML.jpg)

    Figure 2-4: The Tools tab


    Choose the `Installed SQL Server Features Discovery Report` option to analyze
    the local server and return a list of all SQL Server features and components that
    are installed. This will include features from all versions, from SQL Server 2005
    on.


    The `Microsoft Assessment And Planning (MAP) Toolkit For SQL Server` option will
    provide you with a link from which you can download the MAP for SQL Server tool.
    When you run this tool, it will perform a network-wide search for SQL Server,
    Oracle, and MySQL installations. It will produce a detailed report, which, for
    SQL Server, will include the name, version, and edition of the component. For
    Oracle, it will include the size and usage of each schema, including complexity
    estimates for migration. You can also use this tool to plan migration and consolidation
    strategies and to audit license requirements across the enterprise.


    ### The Resources Tab


    As illustrated in Figure [2-5](#333037_2_En_2_Chapter.xhtml#Fig5), the `Resources`
    tab contains links to useful information regarding SQL Server. This includes a
    link to `SQL Server Books Online`, the `Developer Center`, and the `SQL Server
    product evaluation` site. Additionally, on this tab, you will also find links
    to Microsoft’s privacy statement and the full SQL Server license agreement. Another
    very useful link is one that directs you to the `CodePlex samples site`. From
    this site, you can download the `WideWorldImporters` databases, which will aid
    you in testing features of SQL Server with a precreated database.


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig5_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig5_HTML.jpg)

    Figure 2-5: The Resources tab'
