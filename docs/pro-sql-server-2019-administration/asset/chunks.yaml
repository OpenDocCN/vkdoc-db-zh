    ## Metadata for Capacity Planning


    One of the most useful ways you can use metadata is during your pursuit of proactive
    capacity management. SQL Server exposes metadata that provides you with information
    about the current size and usage of your database files, and you can use this
    information to plan ahead and arrange additional capacity, before your enterprise
    monitoring software starts generating critical alerts.


    ### Exposing File Stats


    The `sys.dm_db_file_space_usage` DMV returns details of the space used within
    each data file of the database in which it is run. The columns returned by this
    object are detailed in Table [17-4](#333037_2_En_17_Chapter.xhtml#Tab4).


    Table 17-4


    sys.dm_db_file_space_usage Columns


    | Column | Description |

    | --- | --- |

    | `database_id` | The ID of the database to which the file belongs. |

    | `file_id` | The ID of the file within the database. These IDs are repeated between
    databases. For example, the primary file always has an ID of `1`, and the first
    log file always has an ID of `2`. |

    | `filegroup_id` | The ID of the filegroup in which the file resides. |

    | `total_page_count` | The total number of pages within the file. |

    | `allocated_extent_page_count` | The number of pages within the file that are
    in extents that have been allocated. |

    | `unallocated_extent_page_count` | The number of pages within the file that are
    in extents that have not been allocated. |

    | `version_store_reserved_page_count` | The number of pages reserved to support
    transactions using snapshot isolation. Only applicable to TempDB. |

    | `user_object_reserved_page_count` | The number of pages reserved for user objects.
    Only applicable to TempDB. |

    | `internal_object_reserved_page_count` | The number of pages reserved for internal
    objects. Only applicable to TempDB. |

    | `mixed_extent_page_count` | The number of extents that have pages allocated
    to different objects. |


    The `sys.dm_io_virtual_file_stats` DMV returns IO statistics for the database
    and log files of the database. This can help you determine the amount of data
    being written to each file and warn you of high IO stalls. The object accepts
    `database_id` and `file_id` as parameters and returns the columns detailed in
    Table [17-5](#333037_2_En_17_Chapter.xhtml#Tab5).


    ### Tip


    *IO stalls* are the amount of time it takes the IO subsystem to respond to SQL
    Server.


    Table 17-5


    sys.dm_io_virtual_file_stats Columns


    | Column | Description |

    | --- | --- |

    | `database_id` | The ID of the database to which the file belongs. |

    | `file_id` | The ID of the file within the database. These IDs are repeated between
    databases. For example, the primary file always has an ID of `1` and the first
    log file always has an ID of `2`. |

    | `sample_ms` | The number of milliseconds since the computer started. |

    | `num_of_reads` | The total number of reads against the file. |

    | `num_of_bytes_read` | The total number of bytes read from the file. |

    | `io_stall_read_ms` | The total time waiting for reads to be issued against the
    file, specified in milliseconds. |

    | `num_of_writes` | The total number of write operations performed against the
    file. |

    | `num_of_bytes_written` | The total number of bytes written to the file. |

    | `io_stall_write_ms` | The total time waiting for writes to complete against
    the file, specified in milliseconds. |

    | `io_stall` | The total time waiting for all IO requests against the file to
    be completed, specified in milliseconds. |

    | `size_on_disk_bytes` | The total space used by the file on disk, specified in
    bytes. |

    | `file_handle` | The Windows file handle. |

    | `io_stall_queued_read_ms` | Total IO latency for read operations against the
    file, caused by Resource Governor. Resource Governor is discussed in Chapter [24](#333037_2_En_24_Chapter.xhtml).
    |

    | `io_stall_queued_write_ms` | Total IO latency for write operations against the
    file, caused by Resource Governor. Resource Governor is discussed in Chapter [24](#333037_2_En_24_Chapter.xhtml).
    |


