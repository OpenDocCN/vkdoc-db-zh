    ## 解决查询存储问题


    图 20-8 展示了**性能退化查询报告**。此报告显示了在持续时间或执行次数方面影响随时间增加的查询。这些查询在报告左上角用条形图显示。报告的右上角显示了用于执行查询的计划及其关联的持续时间。在报告底部，我们可以看到在屏幕上半部分当前选择的查询和计划的实执行计划。


    ![../images/333037_2_En_20_Chapter/333037_2_En_20_Fig8_HTML.jpg](img/333037_2_En_20_Fig8_HTML.jpg)

    图 20-8: 性能退化查询报告


    在这个特定的例子中，我们可以看到该查询使用了两个不同的计划运行，并且 ID 为 `168` 的计划执行所需时间明显少于 ID 为 `110` 的计划。因此，在选择了更高效的计划后，我们可以使用报告中间的`强制计划`按钮，来确保始终使用更高效的计划来执行此查询。一旦我们使用了此功能，`取消强制计划`按钮将变为可用状态，允许我们在需要时撤销我们的操作。'
- fmt: '### Tip


    `Force` 和 `Unforce` 按钮在所有查询存储报告中都可用，只要其中可选择特定的计划。


    除了使用图形用户界面来提升查询性能外，系统还提供了许多可用的存储过程。这些过程在表 20-5 中详细列出，可用于管理查询计划和查询存储本身。


    表 20-5


    查询存储存储过程


    | 过程 | 描述 |

    | --- | --- |

    | `Sp_query_store_flush_db` | 将查询存储数据刷新到磁盘 |

    | `Sp_query_store_force_plan` | 强制查询使用特定计划 |

    | `Sp_query_store_unforce_plan` | 从查询中移除强制计划 |

    | `Sp_query_store_reset_exec_stats` | 清除查询存储中特定查询的运行时统计信息 |

    | `Sp_query_store_remove_plan` | 从查询存储中移除特定计划 |

    | `Sp_query_store_remove_query` | 从查询存储中移除查询及其所有关联信息 |


    例如，要取消我们在前一个例子中强制应用于查询的计划，我们可以使用清单 20-6 中的查询。


    ```

    EXEC sp_query_store_unforce_plan @query_id=109, @plan_id=168

    Listing 20-6

    取消强制查询计划

    ```


    ## Summary


    查询存储是 SQL Server 的一项非常强大的功能，它允许数据库管理员监控特定查询及其计划的性能。由于数据会被刷新到磁盘，这意味着即使实例重启后，数据也会持久保存。


    提供了六种标准报告，允许数据库管理员查看诸如退化查询、资源消耗最多的查询，甚至按查询查看等待统计等信息。


    除了查看有问题的查询，数据库管理员还可以强制使用性能最优的计划。这可以通过交互式报告实现，也可以通过使用 T-SQL 的自动化方式实现。自动化方法将通过目录视图检查查询存储数据，然后将相关数据传递给系统存储过程的参数。


    SQL Server 2019 为数据库管理员提供了对查询存储捕获哪些查询的更细粒度控制。这是通过自定义捕获策略实现的，其中可以使用执行计数和执行时间等详细信息来捕获性能影响最高的查询。这不仅节省了磁盘空间，还避免了处理捕获数据时的“噪音”。


    # 21. 分布式重放


    分布式重放是 SQL Server 附带的一个实用工具，它使您能够在一台或多台客户端上重放跟踪，并将事件分发到目标服务器。这对于测试软件更新（例如操作系统级别和
    SQL Server 级别的 Service Pack）、测试性能调整、负载测试和整合规划等场景非常有用。


    在旧版本的 SQL Server 中，通常使用 SQL Trace 及其图形界面 Profiler 来生成和重放跟踪。然而，这存在一些限制，例如捕获跟踪的开销以及无法在多台服务器上重放跟踪。因此，SQL
    Trace 和 Profiler 对于数据库引擎已被弃用，建议您仅对分析服务活动使用 Profiler 进行跟踪。相反，建议使用扩展事件（在第 19 章中讨论）以更低的开销捕获跟踪，然后使用分布式重放来重放它们。


    ### Note


    在本章的演示中，我们将使用四台服务器，分别命名为 Controller、Client1、Client2 和 Target。每台服务器都安装了 SQL Server
    的默认实例，并且所有服务器都是 `PROSQLADMIN` 域的一部分。分布式重放控制器功能安装在控制器服务器上，分布式重放客户端安装在 Client1 和
    Client2 服务器上。分布式重放控制器和分布式重放客户端都是共享功能，因此即使安装了多个实例，每台服务器也只需安装一次。尽管分布式重放客户端应安装在目标实例上以进行应用程序兼容性测试，但在我们的场景中，我们研究的是在模拟并发活动时进行性能测试，因此分布式重放客户端不安装在目标服务器上，因为对于这些目的不推荐这样做。分布式重放管理工具已安装在控制器上。


    ## 分布式重放概念


    要利用分布式重放的强大功能，理解其概念非常重要，例如控制器、客户端和目标服务器。理解分布式重放的架构也很重要。这些主题将在以下部分讨论。


    ### 分布式重放组件


    分布式重放控制器位于分布式重放基础设施的核心，用于协调每个分布式重放客户端的活动。当分布式重放控制器服务启动时，它会从 `DReplayController.config`
    文件中提取其设置，因此您可能需要编辑此文件来配置日志记录选项。我们将在本章后面讨论这一点。一个分布式重放拓扑中只有一个控制器。


    分布式重放客户端是您用来重放工作负载的服务器。当分布式重放客户端服务启动时，它会从 `DReplayClient.config` 文件中提取其配置，因此您可能需要编辑此文件来配置日志记录选项以及存储跟踪结果和中间文件的文件夹。我们将在本章后面讨论这一点。您可以在分布式重放拓扑中配置多个客户端，最多支持
    16 个客户端。


    目标是重放跟踪的实例。一个分布式重放拓扑中总有一个目标。因为您可以有多个客户端对应一个目标的比例，所以您可以使用分布式重放作为负载测试工具，使用通用硬件或模拟并发工作负载。


    分布式重放管理工具是一个命令行工具，允许您准备和重放跟踪。可执行文件名为 `DReplay.exe`；它依赖于 `DReplay.exe.preprocess.config`
    文件来获取处理中间跟踪文件所需的配置，以及 `DReplay.exe.replay.config` 文件来获取重放跟踪所需的配置。这意味着您可能需要编辑每个配置文件以指定设置，例如是否应包含系统活动，以及指定查询超时值，我们将在本章后面讨论这些。


    ### 分布式重放架构


    图 21-1 中的图表概述了分布式重放组件以及重放过程如何在预处理和重放阶段工作。在预处理阶段，会在控制器的工作目录中创建一个中间文件。在重放阶段，事件被分发到目标之前，会在客户端创建分发文件。


    ![分布式重放架构](images/333037_2_En_21_Chapter/333037_2_En_21_Fig1_HTML.png)


    图 21-1


    分布式重放架构


    ## 配置环境


    在开始重放跟踪之前，我们需要配置分布式重放控制器、分布式重放客户端和分布式重放管理工具。这些活动将在以下部分讨论。'
  raw: '### Tip


    The Force and Unforce buttons are available on all Query Store reports, where
    a specific plan is selectable.


    As well as using the GUI to impart performance improvements on queries, there
    are also a number of system stored procedures exposed. These procedures are detailed
    in Table [20-5](#333037_2_En_20_Chapter.xhtml#Tab5) and can be used to manage
    both plans and the Query Store itself.


    Table 20-5


    Query Store Stored Procedures


    | Procedure | Description |

    | --- | --- |

    | Sp_query_store_flush_db | Flushes Query Store data to disk |

    | Sp_query_store_force_plan | Forces a query to use a specific plan |

    | Sp_query_store_unforce_plan | Removes a forced plan from a query |

    | Sp_query_store_reset_exec_stats | Clears the runtime statistics from the Query
    Store, for a specific query |

    | Sp_query_store_remove_plan | Removes a specific plan from the Query Store |

    | Sp_query_store_remove_query | Removes a query and all associated information
    from the Query Store |


    For example, to Unforce the plan that we forced upon our query in the previous
    example, we could use the query in Listing [20-6](#333037_2_En_20_Chapter.xhtml#PC6).


    ```

    EXEC sp_query_store_unforce_plan @query_id=109, @plan_id=168

    Listing 20-6

    Unforce a Query Plan

    ```


    ## Summary


    The Query Store is a very powerful feature of SQL Server, which allows DBAs to
    monitor the performance of specific queries and their plans. Because the data
    is flushed to disk, this means that the data persists, even after an instance
    is restarted.


    Six standard reports are available, which allow DBAs to view information such
    as regressed queries, the most resource-intensive queries, or even wait statistics,
    by query.


    As well as viewing problematic queries, DBAs can also force the most performant
    plan to be used. This can be achieved through the interactive reports, or via
    automation, using T-SQL. The automated approach would examine the Query Store
    data through the catalog views and then pass the relevant data to the parameters
    of system stored procedures.


    SQL Server 2019 gives DBAs even more granular control over which queries are captured
    by Query Store. This is implemented with custom capture policies, where details
    such as execution count and execution time can be used to capture only the queries
    with the highest performance impact. This not only saves disk space but also avoids
    “noise” when working with the captured data.


    # 21. Distributed Replay


    Distributed Replay is a utility supplied with SQL Server that offers you the ability
    to replay traces on one or more clients and dispatch the events to a target server.
    This is useful for scenarios in which you are testing the impact of software updates,
    such as OS-level and SQL Server–level service packs, testing performance tuning,
    load testing, and consolidation planning.


    In older versions of SQL Server, SQL Trace and its GUI, Profiler, were commonly
    used to both generate traces and replay them. This had limitations, however, such
    as the overhead to capture the trace and the inability to replay the trace on
    multiple servers. For this reason, SQL Trace and Profiler have been deprecated
    for the Database Engine, and it is recommended that you only use Profiler for
    tracing Analysis Services activity. Instead, the recommendation is that you use
    Extended Events (discussed in Chapter [19](#333037_2_En_19_Chapter.xhtml)) to
    capture traces with less overhead and then use Distributed Replay to replay them.


    ### Note


    For the demonstrations in this chapter, we will be using four servers, named Controller,
    Client1, Client2, and Target. Each server has a default instance of SQL Server
    installed, and all servers are part of the `PROSQLADMIN` domain. The Distributed
    Replay Controller feature is installed on the controller server, and the Distributed
    Replay Client is installed on the Client1 and Client2 servers. Both Distributed
    Replay Controller and Distributed Replay Client are shared features, so only need
    to be installed once per server, even if there are multiple instances installed.
    Although the Distributed Replay Client should be installed on the target instance
    for application compatibility testing, in our scenarios, we look at performance
    testing while simulating concurrent activity, and therefore the Distributed Replay
    Client is not installed on the target, since it is not recommended for these purposes.
    The Distributed Replay Administration Tool has been installed on the controller.


    ## Distributed Replay Concepts


    To harness the power of Distributed Replay, it is important that you understand
    its concepts, such as the controller, the clients, and the target servers. It
    is also important to understand the architecture of Distributed Replay. These
    topics are discussed in the following sections.


    ### Distributed Replay Components


    The Distributed Replay Controller sits at the heart of the Distributed Replay
    infrastructure and is used to orchestrate the activity on each of the Distributed
    Replay clients. When the Distributed Replay Controller service starts, it pulls
    its settings from the `DReplayController.config` file, so you may need to edit
    this file to configure logging options. We discuss this later in the chapter.
    There is only one controller in a Distributed Replay topology.


    The Distributed Replay clients are the servers you use to replay the workloads.
    When the Distributed Replay Client service starts, it pulls its configuration
    from the `DReplayClient.config` file, so you may need to edit this file to configure
    the logging options and folders where the trace results and intermediate files
    will be stored. This is discussed later in the chapter. You can configure multiple
    clients in a Distributed Replay topology with support for a maximum of 16 clients.


    The target is the instance in which the trace is replayed. There is always one
    target in a Distributed Replay topology. Because you can have a ratio of multiple
    clients to one target, you can use Distributed Replay as a tool for load testing
    with commodity hardware or to simulate concurrent workloads.


    The Distributed Replay Administration Tool is a command-line tool that allows
    you to prepare and replay traces. The executable is called `DReplay.`exe; it relies
    on the `DReplay.exe.preprocess.config` file to obtain the configuration it needs
    to process intermediate trace files and the `DReplay.exe.replay.config` file to
    obtain the configuration it needs to replay the trace. This means that you may
    need to edit each of these configuration files to specify settings, such as whether
    or not system activity should be included, and specify query timeout values, which
    we discussed later in this chapter.


    ### Distributed Replay Architecture


    The diagram in Figure [21-1](#333037_2_En_21_Chapter.xhtml#Fig1) gives you an
    overview of the Distributed Replay components and how the replay process works
    across the preprocess and replay phases. In the preprocess phase, an intermediate
    file is created in the working directory of the controller. In the replay phase,
    dispatch files are created at the clients before the events are dispatched to
    the target.


    ![../images/333037_2_En_21_Chapter/333037_2_En_21_Fig1_HTML.png](images/333037_2_En_21_Chapter/333037_2_En_21_Fig1_HTML.png)


    Figure 21-1


    Distributed Replay architecture


    ## Configuring the Environment


    Before we begin to replay traces, we need to configure the Distributed Replay
    controller, the Distributed Replay clients, and the Distributed Replay Administration
    Tool. These activities are discussed in the following sections.'
