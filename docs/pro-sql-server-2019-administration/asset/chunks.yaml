  trans: "\n#### 自动页面修复\n\n如果数据库中某个页面损坏，且该数据库配置为 AlwaysOn 可用性组拓扑中的副本，则 SQL Server\
    \ 会尝试从某个辅助副本获取该页面的副本来修复损坏。这意味着无需你执行还原或运行带修复选项的 `DBCC CHECKDB`，即可解决逻辑损坏问题。但是，自动页面修复不适用于以下页面类型：\n\
    \n*   文件头页面\n*   数据库引导页面\n*   分配页面\n    *   GAM（全局分配映射）\n    *   SGAM（共享全局分配映射）\n\
    \    *   PFS（页面可用空间）\n\n如果主副本因页面损坏而无法读取该页面，它会首先将该页面记录到 `MSDB.dbo.suspect_pages`\
    \ 表中。然后，它会检查是否至少有一个副本处于 `SYNCHRONIZED`（已同步）状态，并且事务仍在发送到该副本。如果满足这些条件，主副本将向所有副本发送一个广播，指定\
    \ `PageID` 和刷新日志结束时的 LSN（日志序列号）。随后，该页面会被标记为还原挂起，这意味着任何访问它的尝试都将失败，并返回错误代码 829。\n\
    \n收到广播后，辅助副本将等待，直到它们重做的事务达到广播消息中指定的 LSN。此时，它们会尝试访问该页面。如果无法访问，则返回错误。如果它们**可以**访问该页面，则会将该页面发送回主副本。主副本接受第一个响应的辅助副本发送来的页面。\n\
    \n然后，主副本将用从辅助副本接收到的版本替换损坏的页面副本。此过程完成后，它会更新 `MSDB.dbo.suspect_pages` 表中的页面记录，通过将\
    \ `event_type` 列设置为 `5 (已修复)` 值来反映页面已被修复。\n\n如果辅助副本在重做日志时因页面损坏而无法读取该页面，它会将该辅助副本置于\
    \ `SUSPENDED`（已挂起）状态。然后，它将该页面记录到 `MSDB.dbo.suspect_pages` 表中，并向主副本请求该页面的副本。主副本尝试访问该页面。如果无法访问，则返回错误，辅助副本将保持在\
    \ `SUSPENDED` 状态。\n\n如果主副本可以访问该页面，则会将其发送给发出请求的辅助副本。辅助副本用从主副本获取的版本替换损坏的页面。然后，它使用\
    \ `event_id` 为 `5` 更新 `MSDB.dbo.suspect_pages` 表。最后，它尝试恢复 AOAG（AlwaysOn 可用性组）会话。\n\
    \n### 注意\n\n可以手动恢复会话，但如果你这样做，在同步期间再次遇到损坏页面时会出错。请务必首先在主副本上修复或还原该页面。\n\n### 日志传送\n\
    \n日志传送是一种可用于实现灾难恢复的技术。它的工作原理是在主服务器上备份事务日志，将其复制到辅助服务器，然后进行还原。当你需要加载延迟的灾难恢复场景中，最适合使用日志传送，因为这在\
    \ AOAG 中无法实现。例如，在用户意外删除表中所有数据的场景中，如果灾难恢复服务器上的数据库在更新前存在延迟，则有可能从该服务器恢复此表的数据，然后重新填充生产服务器。这意味着你无需还原备份来恢复数据。日志传送不适用于高可用性，因为它没有自动故障转移功能。图\
    \ 13-7 中的示意图展示了一个日志传送拓扑。\n\n![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig7_HTML.png](img/333037_2_En_13_Fig7_HTML.png)\n\
    \n图 13-7：日志传送拓扑\n\n### 恢复模式\n\n在日志传送拓扑中，始终恰好有一个主服务器，即生产服务器。然而，可以有多个辅助服务器，这些服务器可以是灾难恢复服务器和用于分担报表负载的服务器的混合体。\n\
    \n当你还原事务日志时，可以指定三种恢复模式：Recovery（恢复）、NoRecovery（不恢复）和 Standby（待机）。Recovery 模式使数据库联机，但日志传送不支持此模式。NoRecovery\
    \ 模式使数据库保持脱机，以便可以还原更多备份。这是日志传送的常规配置，也是灾难恢复场景的合适选择。\n\nStandby 选项使数据库联机，但处于只读状态，因此你可以还原更多备份。此功能通过维护一个\
    \ `TUF`（事务撤消文件）来实现。`TUF` 文件记录事务日志中任何未提交的事务。这意味着你可以回滚事务日志中的这些未提交事务，从而使数据库更易于访问（尽管它是只读的）。下次需要应用还原时，你可以在下一个日志还原的重做阶段开始之前，将\
    \ `TUF` 文件中的未提交事务重新应用到日志中。\n\n图 13-8 展示了一个同时使用灾难恢复服务器和报表服务器的日志传送拓扑。\n\n![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig8_HTML.png](img/333037_2_En_13_Fig8_HTML.png)\n\
    \n图 13-8：带有灾难恢复和报表服务器的日志传送\n\n### 远程监视服务器\n\n可选地，你可以在日志传送拓扑中配置一个监视服务器。这有助于你集中监视和警报。当你实现监视服务器时，所有备份、复制和还原操作的历史记录和状态都存储在该监视服务器上。监视服务器还允许你拥有一个单一的警报作业，该作业配置为监视所有服务器上的备份、复制和还原操作，而不需要在拓扑中的每台服务器上设置单独的警报。\n\
    \n### 注意\n\n如果要使用监视服务器，在设置日志传送时配置它至关重要。日志传送配置完成后，添加监视服务器的唯一方法是拆解并重新配置日志传送。\n\n\
    ### 故障转移\n\n与其他高可用性和灾难恢复技术不同，日志传送故障转移需要付出一定的管理努力。要进行日志传送故障转移，你必须备份事务日志的尾部，并将其连同任何其他未复制的备份文件一起复制到辅助服务器。\n\
    \n现在你需要按顺序将剩余的事务日志备份应用到辅助服务器，最后应用尾日志备份。你使用 `WITH RECOVERY` 选项应用最终还原，以使数据库以一致状态重新联机。如果你不打算故障恢复回去，可以将日志传送重新配置为以辅助服务器作为新的主服务器。\n\
    \n### 注意\n\n第 15 章将更详细地讨论日志传送。第 12 章将更详细地讨论备份和还原。\n"
- fmt: '## Combining Technologies


    要满足您的业务目标和非功能性需求（NFRs），您需要将多种高可用性和灾难恢复技术结合起来，以创建一个可靠且可扩展的平台。一个经典的例子就是将 `AlwaysOn
    Failover Cluster` 与 `AlwaysOn Availability Groups` 结合的需求。


    您可能需要结合这些技术的原因是，当您在同步模式下使用 `AlwaysOn Availability Groups` 时（这是实现自动故障转移所必须的），它可能会导致性能障碍。如本章前面所讨论的，性能问题源于事务在提交到主服务器之前，先在辅助服务器上提交。然而，集群技术不会遇到此问题，因为它依赖于共享磁盘资源，因此事务只提交一次。


    因此，常见的做法是首先使用集群来实现高可用性，然后使用 `AlwaysOn Availability Groups` 来执行灾难恢复（DR）和/或卸载报告工作负载。图
    13-9 中的图表说明了一种结合集群和 `AOAG` 的高可用性/灾难恢复拓扑，分别用于实现高可用性和灾难恢复。


    ![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig9_HTML.png](images/333037_2_En_13_Chapter/333037_2_En_13_Fig9_HTML.png)

    图 13-9


    集群与 AlwaysOn 可用性组的结合


    图 13-9 显示，数据库的主副本托管在一个双节点主动/被动集群上。如果活动节点发生故障，则应用集群规则，共享存储、网络名称和 IP 地址会重新附加到被动节点，该节点随后成为活动节点。但是，如果两个节点都不可访问，则可用性组侦听器会将流量指向集群的第三个节点，该节点位于灾难恢复站点，并使用日志流复制进行同步。当然，当使用异步模式时，数据库必须由
    `DBA` 手动进行故障转移。


    另一个常见场景是集群和日志传送的结合，分别用于实现高可用性和灾难恢复。这种组合的工作方式与集群结合 `AlwaysOn Availability Groups`
    非常相似，如图 13-10 所示。


    ![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig10_HTML.png](images/333037_2_En_13_Chapter/333037_2_En_13_Fig10_HTML.png)

    图 13-10


    集群结合日志传送


    该图显示，在主数据中心配置了一个双节点主动/被动集群。托管在此实例上的数据库的事务日志然后被传送到灾难恢复数据中心的一台独立服务器。由于集群使用共享存储，您还应该为备份卷使用共享存储，并将备份卷作为资源添加到角色中。这意味着当实例故障转移到另一个节点时，备份共享也会随之故障转移，日志传送将继续同步，不会中断。


    ### Caution


    如果在日志传送备份或复制作业进行期间发生故障转移，日志传送可能会失去同步并需要手动干预。这意味着在故障转移后，您应该检查日志传送作业的健康状态。


    ## Summary


    理解可用性的概念是为您需要高可用性和灾难恢复的应用程序做出正确实施选择的关键。您应该计算停机成本，并将其与实施高可用性/灾难恢复解决方案选择的成本进行比较，以帮助企业了解每个选项的成本/收益概况。在选择技术实现时，您也应该注意服务级别协议（SLA），因为如果未能满足
    SLA，可能会产生财务处罚。


    `SQL Server` 提供了一套完整的高可用性和灾难恢复技术，使您能够灵活地实施最适合数据层应用程序需求的解决方案。对于高可用性，您可以实施集群或 `AlwaysOn
    Availability Groups (AOAG)`。集群使用共享磁盘资源，故障转移发生在实例级别。而 `AOAG` 则通过维护数据库的冗余副本来在数据库级别同步数据，使用同步日志流。


    要实现灾难恢复，您可以选择实施 `AOAG` 或日志传送。日志传送通过备份、复制和还原数据库的事务日志来工作，而 `AOAG` 则使用异步日志流来同步数据。


    您还可以将多种高可用性和灾难恢复技术结合在一起，以实施最合适的可用性策略。常见的例子是将用于高可用性的集群与用于提供灾难恢复的 `AOAG` 或日志传送相结合。


    ## 14. Implementing AlwaysOn Availability Groups


    `AlwaysOn Availability Groups` 为实现高可用性、从灾难中恢复以及扩展只读工作负载提供了一个灵活的选择。该技术在数据库级别同步数据，但健康监控和仲裁由
    `Windows` 集群提供。


    `AlwaysOn Availability Groups` 有不同的变体。传统的类型建立在 `Windows Failover Cluster` 上，但如果
    `SQL Server` 安装在 `Linux` 上，则可以使用 `Pacemaker`。自 `SQL Server 2017` 起，`AlwaysOn Availability
    Groups` 也可以在完全没有集群的情况下配置。这对于卸载报告工作负载是可接受的，但不是有效的高可用性或灾难恢复配置。当使用 `SQL Server 2019`
    和 `Windows Server 2019` 时，可用性组甚至可以为容器化的 `SQL` 配置，例如与 `Kubernetes` 结合。


    本章重点介绍在 `Windows Failover Cluster` 上配置可用性组，旨在同时提供高可用性（HA）和灾难恢复（DR）。我们还将讨论 `Linux`
    上的可用性组和分布式可用性组。使用可用性组来扩展只读工作负载将在第 16 章中讨论。


    ### Note


    在本章的演示中，我们使用一个包含域控制器和一个三节点集群的域。集群没有用于数据的共享存储，也没有 `AlwaysOn Failover Clustered
    Instance`。每个节点上都安装了一个独立的 `SQL Server` 实例，分别命名为 `ClusterNode1\PrimaryReplica`、`ClusterNode2\SyncHA`
    和 `ClusterNode3\AsyncDR`。`CLUSTERNODE1` 和 `CLUSTERNODE2` 位于 `Site1`，`CLUSTERNODE3`
    位于 `Site2`，这意味着集群跨越了子网。关于如何构建故障转移集群或故障转移集群实例的完整细节超出了本书的范围，但完整细节可以在 `Apress` 出版的《`SQL
    Server AlwaysOn Revealed`》一书中找到，网址为 [`www.apress.com/gb/book/9781484223963`](http://www.apress.com/gb/book/9781484223963)。


    ## Implementing AlwaysOn Availability Groups


    在实施 `AlwaysOn Availability Groups` 之前，我们首先创建三个数据库，它们将在本章的演示中使用。其中两个数据库与虚构的应用程序
    `App1` 相关，第三个数据库与虚构的应用程序 `App2` 相关。每个数据库包含一个表，我们向其中填充了数据。每个数据库的恢复模式都设置为 `FULL`。这是数据库使用
    `AlwaysOn Availability Groups` 的硬性要求，因为数据是通过日志流同步的。清单 14-1 中的脚本创建了这些数据库。'
  raw: '### Combining Technologies


    To meet your business objectives and nonfunctional requirements (NFRs), you need
    to combine multiple high availability and disaster recovery technologies together
    to create a reliable, scalable platform. A classic example of this is the requirement
    to combine an AlwaysOn Failover Cluster with AlwaysOn Availability Groups.


    The reason you may need to combine these technologies is that when you use AlwaysOn
    Availability Groups in synchronous mode, which you must do for automatic failover,
    it can cause a performance impediment. As discussed earlier in this chapter, the
    performance issue is caused by the transaction being committed on the secondary
    server before being committed on the primary server. Clustering does not suffer
    from this issue, however, because it relies on a shared disk resource, and therefore
    the transaction is only committed once.


    Therefore, it is common practice to first use a cluster to achieve high availability
    and then use AlwaysOn Availability Groups to perform DR and/or offload reporting.
    The diagram in Figure [13-9](#333037_2_En_13_Chapter.xhtml#Fig9) illustrates a
    HA/DR topology that combines clustering and AOAG to achieve high availability
    and disaster recovery, respectively.


    ![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig9_HTML.png](images/333037_2_En_13_Chapter/333037_2_En_13_Fig9_HTML.png)


    Figure 13-9


    Clustering and AlwaysOn Availability Groups combined


    The diagram in Figure [13-9](#333037_2_En_13_Chapter.xhtml#Fig9) shows that the
    primary replica of the database is hosted on a two-node active/passive cluster.
    If the active node fails, the rules of clustering apply, and the shared storage,
    network name, and IP address are reattached to the passive node, which then becomes
    the active node. If both nodes are inaccessible, however, the availability group
    listener points the traffic to the third node of the cluster, which is situated
    in the DR site and is synchronized using log stream replication. Of course, when
    asynchronous mode is used, the database must be failed over manually by a DBA.


    Another common scenario is the combination of a cluster and log shipping to achieve
    high availability and disaster recovery, respectively. This combination works
    in much the same way as clustering combined with AlwaysOn Availability Groups
    and is illustrated in Figure [13-10](#333037_2_En_13_Chapter.xhtml#Fig10).


    ![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig10_HTML.png](images/333037_2_En_13_Chapter/333037_2_En_13_Fig10_HTML.png)


    Figure 13-10


    Clustering combined with log shipping


    The diagram shows that a two-node active/passive cluster has been configured in
    the primary data center. The transaction log(s) of the database(s) hosted on this
    instance are then shipped to a stand-alone server in the DR data center. Because
    the cluster uses shared storage, you should also use shared storage for the backup
    volume and add the backup volume as a resource in the role. This means that when
    the instance fails over to the other node, the backup share also fails over, and
    log shipping continues to synchronize, uninterrupted.


    ### Caution


    If failover occurs while the log shipping backup or copy jobs are in progress,
    then log shipping may become unsynchronized and require manual intervention. This
    means that after a failover, you should check the health of your log shipping
    jobs.


    ## Summary


    Understanding the concepts of availability is key to making the correct implementation
    choices for your applications that require high availability and disaster recovery.
    You should calculate the cost of downtime and compare this to the cost of implementing
    choices of HA/DR solutions to help the business understand the cost/benefit profile
    of each option. You should also be mindful of SLAs when choosing the technology
    implementation, since there could be financial penalties if SLAs are not met.


    SQL Server provides a full suite of high availability and disaster recovery technologies,
    giving you the flexibility to implement a solution that best fits the needs of
    your data-tier applications. For high availability, you can implement either clustering
    or AlwaysOn Availability Groups (AOAG). Clustering uses a shared disk resource,
    and failover occurs at the instance level. AOAG, on the other hand, synchronizes
    data at the database level by maintaining a redundant copy of the database with
    a synchronous log stream.


    To implement disaster recovery, you can choose to implement AOAG or log shipping.
    Log shipping works by backing up, copying, and restoring the transaction logs
    of the databases, whereas AOAG synchronizes the data using an asynchronous log
    stream.


    It is also possible to combine multiple HA and DR technologies together in order
    to implement the most appropriate availability strategy. Common examples of this
    are combining clustering for high availability with AOAG or log shipping to provide
    DR.


    # 14. Implementing AlwaysOn Availability Groups


    AlwaysOn Availability Groups provide a flexible option for achieving high availability,
    recovering from disasters, and scaling out read-only workloads. The technology
    synchronizes data at the database level, but health monitoring and quorum are
    provided by a Windows cluster.


    There are different variations of AlwaysOn Availability Groups. The traditional
    flavor sits on a Windows Failover Cluster, but if SQL Server is installed on Linux,
    then Pacemaker can be used. Since SQL Server 2017, AlwaysOn Availability Groups
    can also be configured with no cluster at all. This is acceptable for offloading
    reporting but is not a valid HA or DR configuration. When using SQL Server 2019
    with Windows Server 2019, Availability Groups can even be configured for containerized
    SQL, with Kubernetes.


    This chapter focuses on configuring Availability Groups on a Windows Failover
    Cluster, for the purpose of providing both high availability (HA) and disaster
    recovery (DR). We also discuss Availability Groups on Linux and Distributed Availability
    Groups. We discuss using availability groups to scale out read-only workloads
    in Chapter [16](#333037_2_En_16_Chapter.xhtml).


    ### Note


    For the demonstrations in this chapter, we use a domain that contains a domain
    controller and a three-node cluster. The cluster has no shared storage for data
    and there is no AlwaysOn Failover Clustered Instance. Each node has a stand-alone
    instance of SQL Server installed on it named `ClusterNode1\PrimaryReplica`, `ClusterNode2\SyncHA`,
    and `ClusterNode3\AsyncDR`, respectively. CLUSTERNODE1 and CLUSTERNODE2 are in
    Site1 and CLUSTERNODE3 resides in Site2, meaning that the cluster is stretched
    across subnets. Full details of how to build a Failover Cluster or a Failover
    Clustered Instance are beyond the scope of this book, but full details can be
    found in the Apress title SQL Server AlwaysOn Revealed, which can be found at
    [`www.apress.com/gb/book/9781484223963`](http://www.apress.com/gb/book/9781484223963)
    .


    ## Implementing AlwaysOn Availability Groups


    Before implementing AlwaysOn Availability Groups, we first create three databases,
    which we will use during the demonstrations in this chapter. Two of the databases
    relate to the fictional application, `App1`, and the third database relates to
    the fictional application, `App2`. Each contains a single table, which we populate
    with data. Each database is configured with Recovery mode set to `FULL`. This
    is a hard requirement for a database to use AlwaysOn Availability Groups because
    data is synchronized via a log stream. The script in Listing [14-1](#333037_2_En_14_Chapter.xhtml#PC1)
    creates these databases.'
  trans: '## 技术结合


    要满足您的业务目标和非功能性需求（NFRs），您需要将多种高可用性和灾难恢复技术结合起来，以创建一个可靠且可扩展的平台。一个经典的例子就是将 `AlwaysOn
    故障转移集群` 与 `AlwaysOn 可用性组` 结合的需求。


    您可能需要结合这些技术的原因是，当您在同步模式下使用 `AlwaysOn 可用性组` 时（这是实现自动故障转移所必须的），它可能会导致性能障碍。如本章前面所讨论的，性能问题源于事务在提交到主服务器之前，先在辅助服务器上提交。然而，集群技术不会遇到此问题，因为它依赖于共享磁盘资源，因此事务只提交一次。


    因此，常见的做法是首先使用集群来实现高可用性，然后使用 `AlwaysOn 可用性组` 来执行灾难恢复（DR）和/或卸载报告工作负载。图 13-9 中的图表说明了一种结合集群和
    `AOAG` 的高可用性/灾难恢复拓扑，分别用于实现高可用性和灾难恢复。


    ![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig9_HTML.png](img/333037_2_En_13_Fig9_HTML.png)

    图 13-9


    集群与 AlwaysOn 可用性组的结合


    图 13-9 显示，数据库的主副本托管在一个双节点主动/被动集群上。如果活动节点发生故障，则应用集群规则，共享存储、网络名称和 IP 地址会重新附加到被动节点，该节点随后成为活动节点。但是，如果两个节点都不可访问，则可用性组侦听器会将流量指向集群的第三个节点，该节点位于灾难恢复站点，并使用日志流复制进行同步。当然，当使用异步模式时，数据库必须由
    `DBA` 手动进行故障转移。


    另一个常见场景是集群和日志传送的结合，分别用于实现高可用性和灾难恢复。这种组合的工作方式与集群结合 `AlwaysOn 可用性组` 非常相似，如图 13-10
    所示。


    ![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig10_HTML.png](img/333037_2_En_13_Fig10_HTML.png)

    图 13-10


    集群结合日志传送


    该图显示，在主数据中心配置了一个双节点主动/被动集群。托管在此实例上的数据库的事务日志然后被传送到灾难恢复数据中心的一台独立服务器。由于集群使用共享存储，您还应该为备份卷使用共享存储，并将备份卷作为资源添加到角色中。这意味着当实例故障转移到另一个节点时，备份共享也会随之故障转移，日志传送将继续同步，不会中断。


    ### 注意


    如果在日志传送备份或复制作业进行期间发生故障转移，日志传送可能会失去同步并需要手动干预。这意味着在故障转移后，您应该检查日志传送作业的健康状态。


    ## 总结


    理解可用性的概念是为您需要高可用性和灾难恢复的应用程序做出正确实施选择的关键。您应该计算停机成本，并将其与实施高可用性/灾难恢复解决方案选择的成本进行比较，以帮助企业了解每个选项的成本/收益概况。在选择技术实现时，您也应该注意服务级别协议（SLA），因为如果未能满足
    SLA，可能会产生财务处罚。


    `SQL Server` 提供了一套完整的高可用性和灾难恢复技术，使您能够灵活地实施最适合数据层应用程序需求的解决方案。对于高可用性，您可以实施故障转移集群或
    `AlwaysOn 可用性组 (AOAG)`。故障转移集群使用共享磁盘资源，故障转移发生在实例级别。而 `AOAG` 则通过维护数据库的冗余副本来在数据库级别同步数据，使用同步日志流。


    要实现灾难恢复，您可以选择实施 `AOAG` 或日志传送。日志传送通过备份、复制和还原数据库的事务日志来工作，而 `AOAG` 则使用异步日志流来同步数据。


    您还可以将多种高可用性和灾难恢复技术结合在一起，以实施最合适的可用性策略。常见的例子是将用于高可用性的故障转移集群与用于提供灾难恢复的 `AOAG` 或日志传送相结合。


    ## 14. 实施 AlwaysOn 可用性组


    `AlwaysOn 可用性组` 为实现高可用性、从灾难中恢复以及扩展只读工作负载提供了一个灵活的选择。该技术在数据库级别同步数据，但健康监控和仲裁由 `Windows`
    集群提供。


    `AlwaysOn 可用性组` 有不同的变体。传统的类型建立在 `Windows 故障转移集群` 上，但如果 `SQL Server` 安装在 `Linux`
    上，则可以使用 `Pacemaker`。自 `SQL Server 2017` 起，`AlwaysOn 可用性组` 也可以在完全没有集群的情况下配置。这对于卸载报告工作负载是可接受的，但不是有效的高可用性或灾难恢复配置。当使用
    `SQL Server 2019` 和 `Windows Server 2019` 时，可用性组甚至可以为容器化的 `SQL` 配置，例如与 `Kubernetes`
    结合。


    本章重点介绍在 `Windows 故障转移集群` 上配置可用性组，旨在同时提供高可用性（HA）和灾难恢复（DR）。我们还将讨论 `Linux` 上的可用性组和分布式可用性组。使用可用性组来扩展只读工作负载将在第
    16 章中讨论。


    ### 注意


    在本章的演示中，我们使用一个包含域控制器和一个三节点集群的域。集群没有用于数据的共享存储，也没有 `AlwaysOn 故障转移集群实例`。每个节点上都安装了一个独立的
    `SQL Server` 实例，分别命名为 `ClusterNode1\PrimaryReplica`、`ClusterNode2\SyncHA` 和 `ClusterNode3\AsyncDR`。`CLUSTERNODE1`
    和 `CLUSTERNODE2` 位于 `Site1`，`CLUSTERNODE3` 位于 `Site2`，这意味着集群跨越了子网。关于如何构建故障转移集群或故障转移集群实例的完整细节超出了本书的范围，但完整细节可以在
    `Apress` 出版的《`SQL Server AlwaysOn Revealed`》一书中找到，网址为 [`www.apress.com/gb/book/9781484223963`](http://www.apress.com/gb/book/9781484223963)。


    ## 实施 AlwaysOn 可用性组


    在实施 `AlwaysOn 可用性组` 之前，我们首先创建三个数据库，它们将在本章的演示中使用。其中两个数据库与虚构的应用程序 `App1` 相关，第三个数据库与虚构的应用程序
    `App2` 相关。每个数据库包含一个表，我们向其中填充了数据。每个数据库的恢复模式都设置为 `FULL`。这是数据库使用 `AlwaysOn 可用性组`
    的硬性要求，因为数据是通过日志流同步的。清单 14-1 中的脚本创建了这些数据库。'
