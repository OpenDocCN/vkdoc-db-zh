    ## 总结


    数据库快照使用写时复制技术创建数据库的时间点副本。快照必须与源数据库存在于同一实例上，因此虽然不能使用它们在服务器之间分配负载，但可以使用它们来减少读写操作之间的争用。


    快照可用于恢复因人为错误而丢失的数据，也可用于报告目的。您可以将数据复制回源数据库，或者从快照还原源数据库，只要它是与源数据库链接的唯一快照。但是，快照不能提供针对故障或损坏的保护，也不是备份的合适替代方案。


    复制是 SQL Server 提供的一套技术，允许您在系统之间分发数据。为了扩展工作负载，事务复制是最合适的选择。事务复制可以通过配置分发服务器（它将保存复制元数据，并可能减轻同步负担）、发布服务器（托管要同步的数据）和订阅服务器（同步的目标）来实现。复制是一项复杂的技术，作为
    DBA，您应该了解如何使用 `T-SQL` 以及 GUI 来实现它，因为您会遇到需要拆除和重建复制的情况。复制还公开了 `RMO`（复制管理对象）API，这是一个用于
    .NET 的复制编程接口。


    您可以在 AlwaysOn 可用性组拓扑中配置可读辅助副本；这些副本允许横向扩展只读工作负载。即使主副本脱机，可读辅助副本也保持联机。这里需要注意的是，连接必须直接建立到实例。


    为了实现可读辅助副本，您必须配置只读路由。这包括为辅助副本提供一个用于只读报告的 URL，然后更新主副本上的只读路由列表。使用此策略进行横向扩展报告的风险在于，辅助副本上的长时间运行事务或辅助副本断开连接可能导致日志截断延迟以及延迟清理
    ghost 记录。


    # 第四部分 性能与维护


    ## 17. SQL Server 元数据


    元数据是描述其他数据的数据。SQL Server 公开大量的元数据，包括描述每个对象的结构元数据和描述数据本身的描述性元数据。元数据通过一系列


    *   目录视图

    *   信息架构视图

    *   动态管理视图和函数

    *   系统函数

    *   系统存储过程


    公开。在本章中，我们将讨论如何使用元数据在实例级别执行操作，例如公开注册表值，研究元数据如何协助容量规划，并讨论如何将元数据用于故障排除和性能调优。最后，我们将了解如何使用元数据驱动自动化维护。


    ### 提示

    元数据是一个高级主题，值得单独写一本书。因此，我鼓励您探索本章可能未涉及的其他元数据对象。

    '
- fmt: '## Introducing Metadata Objects


    Catalog views reside in the `sys` schema. There are many catalog views, some of
    the most useful of which, such as `sys.master_files`, are explored in this chapter.
    Listing 17-1 shows an example of how to use a catalog view to produce a list of
    databases that are in `FULL` recovery model.


    ```sql

    SELECT name

    FROM sys.databases

    WHERE recovery_model_desc = ''FULL'' ;

    ```

    *Listing 17-1 Using Catalog Views*


    Information schema views reside in the `INFORMATION_SCHEMA` schema. They return
    less detail than catalog views but are based on the ISO standards. This means
    that you can port your queries between RDBMS (Relational Database Management Systems).
    Listing 17-2 shows an example of using information schema views to produce a list
    of principals that have been granted `SELECT` access to the `Chapter10.dbo.SensitiveData`
    table.


    ```sql

    USE Chapter10

    GO

    SELECT GRANTEE, PRIVILEGE_TYPE

    FROM INFORMATION_SCHEMA.TABLE_PRIVILEGES

    WHERE TABLE_SCHEMA = ''dbo''

    AND TABLE_NAME = ''SensitiveData''

    AND PRIVILEGE_TYPE = ''SELECT'' ;

    ```

    *Listing 17-2 Using Information Schema Views*


    Many dynamic management views and functions are available in SQL Server. Collectively,
    they are known as DMVs and they provide information about the current state of
    the instance, which you can use for troubleshooting and tuning performance. The
    following categories of DMV are exposed in SQL Server 2019:


    *   AlwaysOn Availability Groups

    *   Change data capture

    *   Change tracking

    *   Common language runtime (CLR)

    *   Database mirroring

    *   Databases

    *   Execution

    *   Extended events

    *   FILESTREAM and FileTable

    *   Full-text search and semantic search

    *   Geo-Replication

    *   Indexes

    *   I/O

    *   Memory-optimized tables

    *   Objects

    *   Query notifications

    *   Replication

    *   Resource Governor

    *   Security

    *   Server

    *   Service broker

    *   Spatial

    *   SQL Data Warehouse and PDW

    *   SQL Server operating system

    *   Stretch Databases

    *   Transactions


    We demonstrate and discuss how to use DMVs many times throughout this chapter.
    DMVs always begin with a `dm_` prefix, followed by two to four characters that
    describe the category of the object—for example, `os_` for operating system, `db_`
    for database, and `exec_` for execution. This is followed by the name of the object.
    In Listing 17-3, you can see two things: an example of how to use a dynamic management
    view to find a list of logins that are currently connected to the `Chapter16`
    database and a dynamic management function you can use to produce details of the
    pages that store the data relating to the `Chapter16.dbo.Customers` table.


    ```sql

    USE Chapter16 –This database will exist if you followed the examples in Chapter16
    of this book

    GO

    --Find logins connected to the Chapter16 database

    SELECT login_name

    FROM sys.dm_exec_sessions

    WHERE database_id = DB_ID(''Chapter16'') ;

    --Return details of the data pages storing the Chapter16.dbo.Customers table

    SELECT *

    FROM sys.dm_db_database_page_allocations(DB_ID(''Chapter16''),

    OBJECT_ID(''dbo.Customers''),

    NULL,

    NULL,

    ''DETAILED'') ;

    ```

    *Listing 17-3 Using Dynamic Management Views and Functions*


    SQL Server also offers many metadata-related system functions, such as `DB_ID()`
    and `OBJECT_ID()`, which we used in Listing 17-3. Another example of a metadata-related
    system function is `DATALENGTH`, which we use in Listing 17-4 to return the length
    of each value in the `LastName` column of the `Chapter16.dbo.Customers` table.


    ```sql

    USE Chapter16

    GO

    SELECT DATALENGTH(LastName)

    FROM dbo.Customers ;

    ```

    *Listing 17-4 Using System Functions*


    ## Server-Level and Instance-Level Metadata


    Many forms of metadata are available for the server and instance. Server-level
    metadata can be very useful for DBAs who need to find configuration information
    or troubleshoot an issue when they do not have access to the underlying operating
    system. For example, the `dm_server` category of DMVs offers views that allow
    you to check the status of server audits, view SQL Server’s Registry keys, find
    the location of memory dump files, and find details of the instance’s services.
    In the following sections, we discuss how to view the Registry keys associated
    with the instance, expose details of SQL Server’s services, and view the contents
    of the buffer cache.


    ### Exposing Registry Values


    The `sys.dm_server_registry` DMV exposes key registry entries pertaining to the
    instance. The view returns three columns, which are detailed in Table 17-1.


    *Table 17-1 sys.dm_server_registry Columns*


    | Column | Description |

    | --- | --- |

    | `Registry_key` | The name of the Registry key |

    | `Value_name` | The name of the key’s value |

    | `Value_data` | The data contained within the value |


    A very useful piece of information that you can find in the `sys.dm_server_registry`
    DMV is the port number on which SQL Server is currently listening. The query in
    Listing 17-5 uses the `sys.dm_server_registry` DMV to return the port on which
    the instance is listening, assuming the instance is configured to listen on all
    IP addresses.


    ```sql

    SELECT *

    FROM (

    SELECT

    CASE

    WHEN value_name = ''tcpport'' AND value_data != ''''

    THEN value_data

    WHEN value_name = ''tcpport'' AND value_data = ''''

    THEN (

    SELECT value_data

    FROM sys.dm_server_registry

    WHERE registry_key LIKE ''%ipall''

    AND value_name = ''tcpdynamicports'' )

    END PortNumber

    FROM sys.dm_server_registry

    WHERE registry_key LIKE ''%IPAll'' ) a

    WHERE a.PortNumber IS NOT NULL ;

    ```

    *Listing 17-5 Finding the Port Number*


    Another useful feature of this DMV is its ability to return the startup parameters
    of the SQL Server service. This is particularly useful if you want to find out
    if switches such as `-E` have been configured for the instance. The `-E` switch
    increases the number of extents that are allocated to each file in the round-robin
    algorithm. The query in Listing 17-6 displays the startup parameters configured
    for the instance.


    ```sql

    SELECT *

    FROM sys.dm_server_registry

    WHERE value_name LIKE ''SQLArg%'' ;

    ```

    *Listing 17-6 Finding Startup Parameters*


    ### Exposing Service Details


    Another useful DMV within the `dm_server` category is `sys.dm_server_services`,
    which exposes details of the services the instance is using. Table 17-2 describes
    the columns returned.


    *Table 17-2 sys.dm_server_services Columns*


    | Column | Description |

    | --- | --- |

    | `Servicename` | The name of the service. |

    | `Startup_type` | An integer representing the startup type of the service. |

    | `Startup_desc` | A textual description of the startup type of the service. |

    | `Status` | An integer representing the current status of the service. |

    | `Status_desc` | A textual description of the current service state. |

    | `Process_id` | The process ID of the service. |

    | `Last_startup_time` | The date and time that the service last started. |

    | `Service_account` | The account used to run the service. |

    | `Filename` | The file name of the service, including the full file path. |

    | `Is_clustered` | `1` indicates that the service is clustered; `0` indicates
    that it is stand-alone. |

    | `Clusternodename` | If the service is clustered, this column indicates the name
    of the node on which the service is running. |


    The query in Listing 17-7 returns the name of each service, its startup type,
    its current status, and the name of the service account that runs the service.


    ```sql

    SELECT servicename

    ,startup_type_desc

    ,status_desc

    ,service_account

    FROM sys.dm_server_services ;

    ```

    *Listing 17-7 Exposing Service Details*'
