- fmt: "### Tip\n\nThe SQL Server Service account is automatically granted file system\
    \ permissions on the `FILESTREAM` container. It is considered bad practice to\
    \ grant any other user permissions to this folder structure. If you try to access\
    \ the folder with a Windows administrator account, you are given a permissions\
    \ warning, stating that if you continue, you will be permanently granting yourself\
    \ permissions to the folder.\n\n![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig5_HTML.jpg](images/333037_2_En_6_Chapter/333037_2_En_6_Fig5_HTML.jpg)\n\
    *Figure 6-5: FILESTREAM folder hierarchy*\n\n`FileTable` is a technology that\
    \ builds on top of `FILESTREAM` and allows data to be stored in the file system.\
    \ Therefore, to use it, you must enable `FILESTREAM` with streaming access. Unlike\
    \ `FILESTREAM`, however, `FileTable` allows nontransactional access to the data.\
    \ This means that you can move data so it is stored in the SQL Engine rather than\
    \ in the operating system without needing to modify existing applications. You\
    \ can also open and modify the files through Windows Explorer like any other files\
    \ in the operating system.\n\nTo achieve this, SQL Server enables Windows applications\
    \ to request a file handle without having a transaction. Because of this functionality,\
    \ you need to specify, at the database level, what level of nontransactional access\
    \ applications may request. You can configure the following access levels:\n\n\
    *   `NONE` (Default—Only transactional access is permitted.)\n*   `READ_ONLY`\
    \ (The object in the file system can be viewed but not modified.)\n*   `FULL`\
    \ (The object in the file system can be viewed and modified.)\n*   `IN_TRANSITION_TO_READ_ONLY`\
    \ (Transitioning to `READ_ONLY`)\n*   `IN_TRANSITION_TO_OFF` (Transitioning to\
    \ `NONE`)\n\nYou also need to specify the root directory for the `FileTable` container.\
    \ Both of these tasks can be performed with the same `ALTER DATABASE` statement,\
    \ as demonstrated in Listing 6-4.\n\n```sql\nALTER DATABASE Chapter6\nSET FILESTREAM\
    \ ( NON_TRANSACTED_ACCESS = FULL, DIRECTORY_NAME = N'Chapter6_FileTable' );\n\
    -- Listing 6-4: Setting the Nontransactional Access Level\n```\n\nSQL Server now\
    \ creates a share, which has the same name as your instance. Inside this share,\
    \ you will find a folder with the name you specified. When you create a `FileTable`,\
    \ you can again specify a directory name. This creates a subfolder with the name\
    \ you specify. Because `FileTable`s do not have a relational schema, and the metadata\
    \ that is stored about the files is fixed, the syntax for creating them includes\
    \ only the name of the table, the directory, and the collation to use. The code\
    \ in Listing 6-5 demonstrates how to create a `FileTable` called `Chapter6_FileTable`.\n\
    \n```sql\nUSE Chapter6\nGO\nCREATE TABLE dbo.ch06_test AS FILETABLE\nWITH\n(\n\
    \    FILETABLE_DIRECTORY = 'Chapter6_FileTable',\n    FILETABLE_COLLATE_FILENAME\
    \ = database_default\n);\nGO\n-- Listing 6-5: Creating a FileTable\n```\n\nTo\
    \ load files into the table, you can simply copy or move them into the folder\
    \ location, or developers can use the `System.IO` namespace within their applications.\
    \ SQL Server will update the metadata columns of the `FileTable` accordingly.\
    \ In our example, the file path to the container where the `FileTable` files can\
    \ be found is `\\\\127.0.0.1\\prosqladmin\\Chapter6_FileTable\\Chapter6_FileTable`.\
    \ Here, `127.0.0.1` is the loopback address of our server, `prosqladmin` is the\
    \ share that was created based on our instance name, and `Chapter6_FileTable\\\
    Chapter6_FileTable FILESTREAM\\FileTable` is the container.\n\n### Memory-Optimized\
    \ Filegroups\n\nSQL Server 2014 introduced a feature called `memory-optimized\
    \ tables`. These tables are stored entirely in memory; however, the data is also\
    \ written to files on disk. This is for durability. Transactions against in-memory\
    \ tables have the same ACID (Atomic, Consistent, Isolated, and Durable) properties\
    \ as traditional disk-based tables. We will discuss in-memory tables further in\
    \ Chapter 7 and in-memory transactions in Chapter 18.\n\nBecause in-memory tables\
    \ require a copy of the data to be stored on disk, in order to be durable, we\
    \ have the memory-optimized filegroup. This type of filegroup is similar to a\
    \ `FILESTREAM` filegroup but with some subtle differences. First, you can only\
    \ create one memory-optimized filegroup per database. Second, you do not need\
    \ to explicitly enable `FILESTREAM` unless you are planning to use both features.\n\
    \nIn-memory data is persisted on disk through the use of two file types. One is\
    \ a Data file and the other a Delta file. These two file types always operate\
    \ in pairs and cover a specific range of transactions, so you should always have\
    \ the same amount. The Data file is used to track inserts that are made to in-memory\
    \ tables, and the Delta file is used to track deletions. Update statements are\
    \ tracked via a combination of the two files, because the update is tracked as\
    \ a delete and an insert. The files are written sequentially and are table agnostic,\
    \ meaning that each file may contain data for multiple tables.\n\nWe can add an\
    \ in-memory-optimized filegroup to our database in the Filegroups tab of the Database\
    \ Properties dialog box by using the Add Filegroup button in the Memory Optimized\
    \ Data area of the screen and by specifying a name for the filegroup. This is\
    \ illustrated in Figure 6-6.\n\n![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig6_HTML.jpg](images/333037_2_En_6_Chapter/333037_2_En_6_Fig6_HTML.jpg)\n\
    *Figure 6-6: Adding the in-memory filegroup*\n\nWe can then add the container\
    \ to the filegroup by using the Add File button in the Files tab of the Database\
    \ Properties dialog box. Here we need to specify the logical name of our file\
    \ and select the `FILESTREAM` file type. We will then be able to choose to add\
    \ the file to our in-memory filegroup by using the drop-down box, as shown in\
    \ Figure 6-7.\n\n![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig7_HTML.jpg](images/333037_2_En_6_Chapter/333037_2_En_6_Fig7_HTML.jpg)\n\
    *Figure 6-7: Adding an in-memory container*\n\nAlternatively, we can achieve the\
    \ same results by using the T-SQL script in Listing 6-6. Make sure to change the\
    \ file location to match your directory structure.\n\n```sql\nALTER DATABASE [Chapter6]\
    \ ADD FILEGROUP [Chapter6_InMemory] CONTAINS MEMORY_OPTIMIZED_DATA;\nGO\nALTER\
    \ DATABASE [Chapter6] ADD FILE ( NAME = N'InMemory', FILENAME = N'F:\\MSSQL\\\
    MSSQL15.PROSQLADMIN\\MSSQL\\DATA\\InMemory' ) TO FILEGROUP [Chapter6_InMemory];\n\
    GO\n-- Listing 6-6: Adding an In-Memory Filegroup and Container\n```\n\n### Strategies\
    \ for Structured Filegroups\n\nA DBA can adopt different filegroup strategies\
    \ to assist with requirements such as performance, backup time, recovery time\
    \ objectives, and tiered storage offerings. The following sections explore those\
    \ strategies."
  raw: '### Tip


    The SQL Server Service account is automatically granted file system permissions
    on the `FILESTREAM` container. It is considered bad practice to grant any other
    user permissions to this folder structure. If you try to access the folder with
    a Windows administrator account, you are given a permissions warning, stating
    that if you continue, you will be permanently granting yourself permissions to
    the folder.


    ![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig5_HTML.jpg](images/333037_2_En_6_Chapter/333037_2_En_6_Fig5_HTML.jpg)


    Figure 6-5


    FILESTREAM folder hierarchy


    FileTable is a technology that builds on top of FILESTREAM and allows data to
    be stored in the file system. Therefore, to use it, you must enable FILESTREAM
    with streaming access. Unlike FILESTREAM, however, FileTable allows nontransactional
    access to the data. This means that you can move data so it is stored in the SQL
    Engine rather than in the operating system without needing to modify existing
    applications. You can also open and modify the files through Windows Explorer
    like any other files in the operating system.


    To achieve this, SQL Server enables Windows applications to request a file handle
    without having a transaction. Because of this functionality, you need to specify,
    at the database level, what level of nontransactional access applications may
    request. You can configure the following access levels:


    *   `NONE` (Default—Only transactional access is permitted.)


    *   `READ_ONLY` (The object in the file system can be viewed but not modified.)


    *   `FULL` (The object in the file system can be viewed and modified.)


    *   `IN_TRANSITION_TO_READ_ONLY` (Transitioning to `READ_ONLY`)


    *   `IN_TRANSITION_TO_OFF` (Transitioning to `NONE`)


    You also need to specify the root directory for the `FileTable` container. Both
    of these tasks can be performed with the same `ALTER DATABASE` statement, as demonstrated
    in Listing [6-4](#333037_2_En_6_Chapter.xhtml#PC4).


    ```

    ALTER DATABASE Chapter6

    SET FILESTREAM ( NON_TRANSACTED_ACCESS = FULL, DIRECTORY_NAME = N''Chapter6_FileTable''
    );

    Listing 6-4

    Setting the Nontransactional Access Level

    ```


    SQL Server now creates a share, which has the same name as your instance. Inside
    this share, you will find a folder with the name you specified. When you create
    a FileTable, you can again specify a directory name. This creates a subfolder
    with the name you specify. Because FileTables do not have a relational schema,
    and the metadata that is stored about the files is fixed, the syntax for creating
    them includes only the name of the table, the directory, and the collation to
    use. The code in Listing [6-5](#333037_2_En_6_Chapter.xhtml#PC5) demonstrates
    how to create a FileTable called `Chapter6_FileTable`.


    ```

    USE Chapter6

    GO

    CREATE TABLE dbo.ch06_test AS FILETABLE

    WITH

    (

    FILETABLE_DIRECTORY = ''Chapter6_FileTable'',

    FILETABLE_COLLATE_FILENAME = database_default

    );

    GO

    Listing 6-5

    Creating a FileTable

    ```


    To load files into the table, you can simply copy or move them into the folder
    location, or developers can use the `System.IO` namespace within their applications.
    SQL Server will update the metadata columns of the FileTable accordingly. In our
    example, the file path to the container where the FileTable files can be found
    is `\\127.0.0.1\prosqladmin\Chapter6_FileTable\Chapter6_FileTable`. Here, `127.0.0.1`
    is the loopback address of our server, `prosqladmin` is the share that was created
    based on our instance name, and `Chapter6_FileTable\Chapter6_FileTable FILESTREAM\FileTable`
    is the container.


    ### Memory-Optimized Filegroups


    SQL Server 2014 introduced a feature called *memory-optimized tables*. These tables
    are stored entirely in memory; however, the data is also written to files on disk.
    This is for durability. Transactions against in-memory tables have the same ACID
    (Atomic, Consistent, Isolated, and Durable) properties as traditional disk-based
    tables. We will discuss in-memory tables further in Chapter [7](#333037_2_En_7_Chapter.xhtml)
    and in-memory transactions in Chapter [18](#333037_2_En_18_Chapter.xhtml).


    Because in-memory tables require a copy of the data to be stored on disk, in order
    to be durable, we have the memory-optimized filegroup. This type of filegroup
    is similar to a FILESTREAM filegroup but with some subtle differences. First,
    you can only create one memory-optimized filegroup per database. Second, you do
    not need to explicitly enable FILESTREAM unless you are planning to use both features.


    In-memory data is persisted on disk through the use of two file types. One is
    a Data file and the other a Delta file. These two file types always operate in
    pairs and cover a specific range of transactions, so you should always have the
    same amount. The Data file is used to track inserts that are made to in-memory
    tables, and the Delta file is used to track deletions. Update statements are tracked
    via a combination of the two files, because the update is tracked as a delete
    and an insert. The files are written sequentially and are table agnostic, meaning
    that each file may contain data for multiple tables.


    We can add an in-memory-optimized filegroup to our database in the Filegroups
    tab of the Database Properties dialog box by using the Add Filegroup button in
    the Memory Optimized Data area of the screen and by specifying a name for the
    filegroup. This is illustrated in Figure [6-6](#333037_2_En_6_Chapter.xhtml#Fig6).


    ![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig6_HTML.jpg](images/333037_2_En_6_Chapter/333037_2_En_6_Fig6_HTML.jpg)


    Figure 6-6


    Adding the in-memory filegroup


    We can then add the container to the filegroup by using the Add File button in
    the Files tab of the Database Properties dialog box. Here we need to specify the
    logical name of our file and select the `FILESTREAM` file type. We will then be
    able to choose to add the file to our in-memory filegroup by using the drop-down
    box, as shown in Figure [6-7](#333037_2_En_6_Chapter.xhtml#Fig7).


    ![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig7_HTML.jpg](images/333037_2_En_6_Chapter/333037_2_En_6_Fig7_HTML.jpg)


    Figure 6-7


    Adding an in-memory container


    Alternatively, we can achieve the same results by using the T-SQL script in Listing
    [6-6](#333037_2_En_6_Chapter.xhtml#PC6). Make sure to change the file location
    to match your directory structure.


    ```

    ALTER DATABASE [Chapter6] ADD FILEGROUP [Chapter6_InMemory] CONTAINS MEMORY_OPTIMIZED_DATA;

    GO

    ALTER DATABASE [Chapter6] ADD FILE ( NAME = N''InMemory'', FILENAME = N''F:\MSSQL\MSSQL15.PROSQLADMIN\MSSQL\DATA\InMemory''
    ) TO FILEGROUP [Chapter6_InMemory];

    GO

    Listing 6-6

    Adding an In-Memory Filegroup and Container

    ```


    ### Strategies for Structured Filegroups


    A DBA can adopt different filegroup strategies to assist with requirements such
    as performance, backup time, recovery time objectives, and tiered storage offerings.
    The following sections explore those strategies.'
  trans: "\n### 提示\n\nSQL Server 服务账户会被自动授予对 `FILESTREAM` 容器的文件系统权限。将此文件夹结构的权限授予任何其他用户被认为是**不良做法**。如果您尝试使用\
    \ Windows 管理员账户访问该文件夹，系统会给出权限警告，说明如果您继续操作，将永久授予您对该文件夹的权限。\n\n![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig5_HTML.jpg](img/333037_2_En_6_Fig5_HTML.jpg)\n\
    *图 6-5: FILESTREAM 文件夹层级结构*\n\n`FileTable` 是一种构建在 `FILESTREAM` 之上的技术，允许将数据存储在文件系统中。因此，要使用它，您必须启用具有流式访问权限的\
    \ `FILESTREAM`。然而，与 `FILESTREAM` 不同，`FileTable` 允许对数据进行非事务性访问。这意味着您可以将数据移动到 SQL\
    \ 引擎中存储，而不是存储在操作系统中，而无需修改现有应用程序。您还可以像处理操作系统中的任何其他文件一样，通过 Windows 资源管理器打开和修改这些文件。\n\
    \n为实现这一点，SQL Server 使 Windows 应用程序能够在没有事务的情况下请求文件句柄。由于此功能，您需要在数据库级别指定应用程序可以请求的非事务性访问级别。您可以配置以下访问级别：\n\
    \n*   `NONE`（默认值—仅允许事务性访问。）\n*   `READ_ONLY`（可以查看文件系统中的对象，但不能修改。）\n*   `FULL`（可以查看并修改文件系统中的对象。）\n\
    *   `IN_TRANSITION_TO_READ_ONLY`（正在转换为 `READ_ONLY`）\n*   `IN_TRANSITION_TO_OFF`（正在转换为\
    \ `NONE`）\n\n您还需要指定 `FileTable` 容器的根目录。这两项任务都可以使用同一条 `ALTER DATABASE` 语句来完成，如清单\
    \ 6-4 所示。\n\n```sql\nALTER DATABASE Chapter6\nSET FILESTREAM ( NON_TRANSACTED_ACCESS\
    \ = FULL, DIRECTORY_NAME = N'Chapter6_FileTable' );\n-- 清单 6-4: 设置非事务性访问级别\n```\n\
    \nSQL Server 现在会创建一个共享，其名称与您的实例名称相同。在此共享中，您将找到一个以您指定名称命名的文件夹。当您创建 `FileTable`\
    \ 时，可以再次指定一个目录名称。这将创建一个以您指定名称命名的子文件夹。由于 `FileTable` 没有关系型架构，并且存储的关于文件的元数据是固定的，因此创建它们的语法仅包含表名、目录和要使用的排序规则。清单\
    \ 6-5 中的代码演示了如何创建一个名为 `Chapter6_FileTable` 的 `FileTable`。\n\n```sql\nUSE Chapter6\n\
    GO\nCREATE TABLE dbo.ch06_test AS FILETABLE\nWITH\n(\n    FILETABLE_DIRECTORY\
    \ = 'Chapter6_FileTable',\n    FILETABLE_COLLATE_FILENAME = database_default\n\
    );\nGO\n-- 清单 6-5: 创建 FileTable\n```\n\n要将文件加载到表中，您可以简单地将它们复制或移动到该文件夹位置，或者开发人员可以在其应用程序中使用\
    \ `System.IO` 命名空间。SQL Server 会相应地更新 `FileTable` 的元数据列。在我们的示例中，可以找到 `FileTable`\
    \ 文件的容器的文件路径是 `\\\\127.0.0.1\\prosqladmin\\Chapter6_FileTable\\Chapter6_FileTable`。这里，`127.0.0.1`\
    \ 是我们服务器的环回地址，`prosqladmin` 是基于我们的实例名称创建的共享，而 `Chapter6_FileTable\\Chapter6_FileTable\
    \ FILESTREAM\\FileTable` 是容器。\n\n### 内存优化文件组\n\nSQL Server 2014 引入了一项名为 `内存优化表`\
    \ 的功能。这些表完全存储在内存中；但是，数据也会写入磁盘上的文件中。这是为了持久性。针对内存中表的事务具有与传统的基于磁盘的表相同的 ACID（原子性、一致性、隔离性和持久性）属性。我们将在第\
    \ 7 章进一步讨论内存中表，并在第 18 章讨论内存中事务。\n\n由于内存中表需要将数据的副本存储在磁盘上以实现持久性，因此我们有了内存优化文件组。这种类型的文件组类似于\
    \ `FILESTREAM` 文件组，但有一些细微的差别。首先，每个数据库只能创建一个内存优化文件组。其次，除非您计划同时使用这两个功能，否则不需要显式启用\
    \ `FILESTREAM`。\n\n内存中数据通过使用两种文件类型持久化到磁盘。一种是数据文件，另一种是增量文件。这两种文件类型总是成对操作，并覆盖特定的事务范围，因此您应该始终拥有相同数量的文件。数据文件用于跟踪对内存中表进行的插入操作，增量文件用于跟踪删除操作。更新语句通过这两种文件的组合进行跟踪，因为更新被跟踪为一次删除和一次插入。这些文件是顺序写入的，并且是表不可知的，这意味着每个文件可能包含多个表的数据。\n\
    \n我们可以通过在“数据库属性”对话框的“文件组”选项卡中使用“内存优化数据”区域的“添加文件组”按钮，并指定文件组的名称，将内存优化文件组添加到我们的数据库中。如图\
    \ 6-6 所示。\n\n![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig6_HTML.jpg](img/333037_2_En_6_Fig6_HTML.jpg)\n\
    *图 6-6: 添加内存优化文件组*\n\n然后，我们可以通过在“数据库属性”对话框的“文件”选项卡中使用“添加文件”按钮，将容器添加到文件组中。在这里，我们需要指定文件的逻辑名称，并选择\
    \ `FILESTREAM` 文件类型。然后，我们可以使用下拉框选择将文件添加到我们的内存优化文件组中，如图 6-7 所示。\n\n![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig7_HTML.jpg](img/333037_2_En_6_Fig7_HTML.jpg)\n\
    *图 6-7: 添加内存优化容器*\n\n或者，我们可以使用清单 6-6 中的 T-SQL 脚本实现相同的结果。请务必将文件位置更改为与您的目录结构匹配。\n\
    \n```sql\nALTER DATABASE [Chapter6] ADD FILEGROUP [Chapter6_InMemory] CONTAINS\
    \ MEMORY_OPTIMIZED_DATA;\nGO\nALTER DATABASE [Chapter6] ADD FILE ( NAME = N'InMemory',\
    \ FILENAME = N'F:\\MSSQL\\MSSQL15.PROSQLADMIN\\MSSQL\\DATA\\InMemory' ) TO FILEGROUP\
    \ [Chapter6_InMemory];\nGO\n-- 清单 6-6: 添加内存优化文件组和容器\n```\n\n### 结构化文件组策略\n\nDBA\
    \ 可以采用不同的文件组策略来帮助满足性能、备份时间、恢复时间目标和分层存储等要求。以下各节将探讨这些策略。\n"
- fmt: '## Performance Strategies


    When designing a filegroup strategy for performance, consider object placement
    in relation to joins performed by the application’s queries. Imagine, for example,
    a large data warehouse. You have a wide fact table, with hundreds of thousands
    of rows, which joins to two dimension tables, each with millions of rows. If you
    placed all three of these objects on the same filegroup, then you can distribute
    the IO by using multiple files, placing each file on a different spindle. The
    issue here, however, is that even though the IO can be distributed, you do not
    have granular control over which tables are placed on which LUNs (logical unit
    numbers). As demonstrated earlier in this chapter, all objects will be stripped
    evenly, using a combination of `round-robin` and `proportional fill` algorithms,
    across each of the files. Therefore, it is possible to gain a performance advantage
    by splitting these tables into three separate filegroups, each of which would
    be created on separate LUNs. This may allow SQL Server to improve the parallelization
    of the table scans.


    Alternatively, another scenario may be that you have a massive data warehouse,
    in the tens of terabytes (TBs), and a very large server, with a balanced throughput,
    such as a server built using the Fast Track Data Warehouse Reference Architecture
    (details of which can be found on the MSDB library); in this case, you may get
    the best performance by creating filegroups over every single disk available.
    This gives the server the best performance in terms of IO throughput and helps
    prevent the IO subsystem from becoming the bottleneck.


    Also consider the placement of tables that are subject to horizontal partitioning.
    Imagine a very large table where data is partitioned by month. If your application’s
    workload means that several months of data are often being read at the same time,
    then you may see a performance improvement if you split each month out into separate
    filegroups, each of which uses a discrete set of spindles, in a similar way to
    the join example, mentioned earlier. There will be a full discussion on partitioning
    in Chapter [7](#333037_2_En_7_Chapter.xhtml).


    ### Caution


    The downside to this approach is that placing partitions on separate filegroups
    prevents you from using partitioning functions, such as `SWITCH`.


    ## Backup and Restore Strategies


    SQL Server allows you to back up at the file and filegroup level as well as at
    the database level. You are subsequently able to perform what is known as a ``piecemeal
    restore``. A piecemeal restore allows you to bring your database online in stages.
    This can be very useful for large databases that have a very low recovery time
    objective.


    Imagine that you have a large database that contains a small amount of very critical
    data that the business cannot be without for more than a maximum of 2 hours. The
    database also contains a large amount of historic data that the business requires
    access to on a daily basis for the purpose of reporting, but it is not critical
    that it is restored within the 2-hour window. In this scenario, it is good practice
    to have two secondary filegroups. The first contains the critical data and the
    second contains the historic data. In the event of a disaster, you can then restore
    the primary filegroup and the first secondary filegroup. At this point, you can
    bring the database online and the business will have access to this data. Subsequently,
    the filegroup containing the historic reporting data could be brought online.


    Filegroups can also assist with backup strategies. Imagine a scenario where you
    have a large database that takes 2 hours to back up. Unfortunately, you have a
    long-running ETL process and only a 1-hour window in which the database can be
    backed up nightly. If this is the case, then you can split the data between two
    filegroups. The first filegroup can be backed up on Monday, Wednesday, and Friday,
    and the second filegroup can be backed up on Tuesday, Thursday, and Saturday.
    Backups and restores are discussed fully in Chapter [12](#333037_2_En_12_Chapter.xhtml).


    ## Storage-Tiering Strategies


    Some organizations may decide that they want to implement storage tiering for
    large databases. If this is the case, then you will often need to implement this
    by using partitioning. For example, imagine that a table contains 6 years’ worth
    of data. The data for the current year is accessed and updated many times a day.
    Data for the previous 3 years is accessed in monthly reports, but other than that
    is rarely touched. Data as far back as 6 years must be available instantly, if
    it is needed for regulatory reasons, but in practice, it is rarely accessed.


    In the scenario just described, partitioning could be used with yearly partitions.
    The filegroup containing the current year’s data could consist of files on locally
    attached `RAID 10` LUNs for optimum performance. The partitions holding data for
    years 2 and 3 could be placed on the premium tier of the corporate `SAN` device.
    Partitions for data older than 3 years could be placed on near-line storage within
    the SAN, thus satisfying regulatory requirements in the most cost-effective manner.


    Some organizations have also introduced automated storage tiering, such as `AO
    (Adaptive Optimization)`. Although automated storage tiering technology works
    extremely well in some environments, its implementation for SQL Server can sometimes
    prove problematic. This is because it works in two phases. The first is an analysis
    phase, which decides which tier each block or file should reside on for the best
    trade-off between cost and expense. The second phase will actually move the data
    to the most appropriate tier.


    The issue is that the window where data is being moved tends to reduce the performance
    of the SAN. Therefore, running analysis followed by moving the data frequently
    (i.e., hourly) can cause unacceptable performance degradation. On the flip side,
    however, running analysis less frequently (such as during business hours) and
    moving data overnight sometimes do not tally with SQL Server usage profiles. For
    example, imagine a reporting application that needs optimum performance, but where
    the weekly reports are generated on a Friday. Because the last analysis window
    before this peak period was Thursday, when not a lot was happening, the data is
    likely to reside on a slower, more cost-effective tier, meaning that performance
    will be impaired. When Saturday arrives, however, and the application is virtually
    idle again, the data will reside on the premium tier, because of the analysis
    window, during Friday’s peak usage. For this reason, automated storage tiering
    often works best in environments where databases have set hours of operation,
    with little day-to-day variance in usage profiles.


    ## Strategies for Memory-Optimized Filegroups


    Just like structured filegroups, memory-optimized filegroups will use a `round-robin`
    approach to allocating data between containers. It is common practice to place
    these multiple containers on separate spindles in order to maximize IO throughput.
    The issue is, however, that if you place one container on spindle A and one container
    on spindle B, then the `round-robin` approach will place all of the Data files
    on one volume and all of the Delta files on the other volume.


    To avoid this issue, it is good practice to place two containers on each of the
    volumes that you wish to use for your memory-optimized filegroup. This will ensure
    that you get a balanced distribution of IO, as illustrated in Figure [6-8](#333037_2_En_6_Chapter.xhtml#Fig8).
    This is in line with Microsoft’s recommended best practice.


    ![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig8_HTML.jpg](images/333037_2_En_6_Chapter/333037_2_En_6_Fig8_HTML.jpg)


    Figure 6-8


    Balanced IO distribution for memory-optimized filegroups'
