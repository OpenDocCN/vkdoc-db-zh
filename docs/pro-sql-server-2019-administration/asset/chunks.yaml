  trans: '#### 选择压缩级别


    正如你可能从前文关于行压缩和页压缩的描述中已经意识到的，页压缩提供比行压缩更高的压缩率，这意味着更好的 I/O 性能。然而，这是以牺牲 CPU 周期为代价的，无论是在压缩表时，还是在访问表时都会产生开销。因此，在开始压缩表之前，请务必了解每种压缩类型能减少多少表的大小，以便评估你能获得多少
    I/O 效率提升。


    你可以通过使用一个名为 `sp_estimate_data_compression_savings` 的系统存储过程来实现这一点。该过程用于估算实施压缩可以节省的空间量。它接受表
    7-4 中列出的参数。


    表 7-4：`sp_estimate_data_compression_savings` 参数


    | 参数 | 说明 |

    | --- | --- |

    | `@schema_name` | 包含你要对其运行该过程的表的架构名称。 |

    | `@object_name` | 你要对其运行该过程的表的名称。 |

    | `@index_ID` | 对所有索引传入 `NULL`。对于堆，索引 ID 始终为 `0`，而聚集索引的 ID 始终为 `1`。 |

    | `@partition_number` | 对所有分区传入 `NULL`。 |

    | `@data_compression` | 传入 `ROW`、`PAGE`、`COLUMNSTORE`、`COLUMNSTORE_ARCHIVE`，或者如果你希望评估从已压缩的表中移除压缩的影响，则传入
    `NONE`。 |


    代码清单 7-11 中对 `sp_estimate_data_compression_savings` 存储过程的两次执行，分别评估了行压缩和页压缩对我们
    `ExistingOrders` 表所有分区的影响。


    ```

    EXEC sp_estimate_data_compression_savings @schema_name = ''dbo'', @object_name
    = ''ExistingOrders'',

    @index_id = NULL, @partition_number = NULL, @data_compression =''ROW'' ;

    EXEC sp_estimate_data_compression_savings @schema_name = ''dbo'', @object_name
    = ''ExistingOrders'',

    @index_id = NULL, @partition_number = NULL, @data_compression =''PAGE'' ;

    ```

    代码清单 7-11：`Sp_estimate_data_compression_savings`


    图 7-13 中的结果显示，对于当前正在使用的两个分区，页压缩相比行压缩不会带来额外的好处。因此，增加与页压缩相关的额外 CPU 开销是没有意义的。这是因为行压缩总是对表中每个页面的每一行实施。而页压缩则是在逐页的基础上进行评估，只有那些从压缩中受益的页面才会被重建。由于我们插入该表的数据主要是数字且具有随机性，SQL
    Server 已经确定我们表的页面不会从页压缩中受益。


    ![sp_estimate_data_compression_savings 的结果](img/333037_2_En_7_Fig13_HTML.jpg)

    图 7-13：`sp_estimate_data_compression_savings` 的结果


    **提示**

    SQL Server 2019 在 `sp_estimate_data_compression_savings` 中引入了对列存储索引的支持。压缩类型 `COLUMNSTORE`
    和 `COLUMNSTORE_ARCHIVE` 现在既可以作为源对象，也可以作为压缩类型使用。列存储压缩将在本章的“列存储压缩”一节中讨论。


    #### 压缩表和分区


    我们已经确定行压缩减小了表的大小，但实施页压缩无法获得进一步的好处。因此，我们可以使用代码清单 7-12 中的命令来压缩整个表。


    ```

    ALTER TABLE ExistingOrders

    REBUILD WITH (DATA_COMPRESSION = ROW) ;

    ```

    代码清单 7-12：对整个表实施行压缩


    然而，如果我们更仔细地查看结果，会发现实际上只有分区 1 受益于行压缩。分区 2 的大小保持不变。因此，压缩分区 2 不值得其开销。运行代码清单 7-13
    中的 `ALTER TABLE` 语句将仅重建分区 1。然后，它将通过使用 `DATA_COMPRESSION = NONE` 重建整个表来移除压缩。


    ```

    --使用 ROW 压缩压缩分区 1

    ALTER TABLE ExistingOrders

    REBUILD PARTITION = 1 WITH (DATA_COMPRESSION = ROW) ;

    GO

    --移除整个表的压缩

    ALTER TABLE ExistingOrders

    REBUILD WITH (DATA_COMPRESSION = NONE) ;

    ```

    代码清单 7-13：对特定分区实施行压缩


    #### 数据压缩向导


    数据压缩向导可以通过表的上下文菜单，依次点击 **存储 ➤ 管理压缩** 来访问。它提供了一个图形用户界面（GUI）来管理压缩。向导的主页如图 7-14 所示。在此屏幕上，你可以使用
    **对所有分区使用相同压缩类型** 选项在表上统一实施一种压缩类型。或者，你可以为每个单独的分区指定不同的压缩类型。**计算** 按钮运行 `sp_estimate_data_compression_savings`
    存储过程，并显示每个分区的当前和预估结果。


    ![数据压缩向导](img/333037_2_En_7_Fig14_HTML.jpg)

    图 7-14：数据压缩向导


    在向导的最后一页，你可以选择立即运行该过程、将操作编写为脚本，或使用 SQL Server Agent 计划其运行。


    #### 维护堆上的压缩


    当新页面被添加到堆（没有聚集索引的表）时，它们不会自动应用页压缩。这意味着重建压缩表应成为你在表没有聚集索引时的标准维护例程的一部分。要重建表上的压缩，你应该先移除压缩，然后再重新实施。


    **提示**

    如果新堆页面是使用 `INSERT INTO...WITH (TABLOCK)` 插入的，或者作为启用了优化的大容量插入的一部分插入的，它们将会被压缩。


    #### 维护压缩分区


    为了对分区使用 `SWITCH` 操作，两个分区必须选择相同的压缩级别。如果你使用 `MERGE`，则使用目标分区的压缩级别。当你使用 `SPLIT` 时，新分区从原始分区继承其压缩级别。


    就像非分区表一样，如果你删除表的聚集索引，则堆会继承聚集索引的压缩级别。但是，如果你是在修改分区方案的操作中删除聚集索引，则压缩会从表中移除。'
- fmt: '## Memory-Optimized Tables


    In-Memory OLTP is a feature of SQL Server, which can offer significant performance
    improvements by storing all of the table’s data in memory. This, of course, can
    dramatically reduce IO, despite the fact that the tables are also saved to disk
    for durability. This is because the disk-based version of the tables is stored
    in an unstructured format, outside of the database engine, using a FILESTREAM-based
    technology. Also, memory-optimized checkpoints happen a lot more frequently. An
    automatic checkpoint is taken after the transaction log has grown by 512MB since
    the last time an automatic checkpoint occurred. This removes IO spikes that are
    associated with checkpoint activity. IO contention on transaction logs can also
    be reduced with memory-optimized tables since less data is logged. It is also
    worth mentioning that only table changes are logged, not index changes.


    In addition to minimizing IO, In-Memory OLTP can also reduce CPU overhead. This
    is because natively compiled stored procedures can be used to access the data,
    as opposed to traditional, interpreted code. Natively compiled stored procedures
    use significantly fewer instructions, meaning less CPU time. Memory-optimized
    tables do not help reduce network overhead, however, because the same amount of
    data still needs to be communicated to the client.


    By their very nature, memory-optimized tables increase memory pressure as opposed
    to reducing it, because even if you never use the data, it still sits in memory,
    reducing the amount of space available in which traditional resources can be cached.
    This means that in-memory functionality is designed for OLTP workloads as opposed
    to data warehousing workloads. The expectation is that fact and dimension tables
    within a data warehouse are too large to reside in memory.


    As well as lower resource usage, memory-optimized tables can also help reduce
    contention. When you access data in a memory-optimized table, SQL Server does
    not take out a latch. This means that both latch and spinlock contention is automatically
    removed. Blocking between read and write transactions can also be reduced because
    of a new optimistic concurrency method for implementing isolation levels. Transactions
    and isolation levels, including memory optimized, are discussed in Chapter [18](#333037_2_En_18_Chapter.xhtml).


    ### Durability


    When creating memory-optimized tables, you can specify either `SCHEMA_AND_DATA`
    or `SCHEMA_ONLY` as the durability setting. If you select `SCHEMA_AND_DATA`, then
    all of the table’s data is persisted to disk and transactions are logged. If you
    select `SCHEMA_ONLY`, however, then data is not persisted, and transactions are
    not logged. This means that after the SQL Server service is restarted, the structure
    of the table will remain intact, but it will contain no data. This can be useful
    for transient processes, such as data staging during an ETL load.


    ### Creating and Managing Memory-Optimized Tables


    > **Tip**

    >

    > At first glance, it may be tempting to use memory-optimized tables throughout
    your database. They have many limitations, however, and, in fact, you should only
    use them on an exception basis. These limitations will be discussed later in this
    section.


    Before you can create a memory-optimized table, a memory-optimized filegroup must
    already exist. Memory-optimized filegroups are discussed in Chapter [6](#333037_2_En_6_Chapter.xhtml).


    You create memory-optimized tables using the `CREATE TABLE T-SQL` statement, as
    you would for a disk-based table. The difference is that you must specify a `WITH`
    clause, which specifies that the table will be memory optimized. The `WITH` clause
    is also used to indicate the level of durability that you require.


    Memory-optimized tables must also include an index. We fully discuss indexes,
    including indexes for memory-optimized tables, in Chapter [8](#333037_2_En_8_Chapter.xhtml),
    but for now, you should know that memory-optimized tables support the following
    types of indexes:


    *   Nonclustered hash index

    *   Nonclustered index


    Hash indexes are organized into buckets, and when you create them, you must specify
    a bucket count using the `BUCKET_COUNT` parameter. Ideally, your bucket count
    should be two times the number of distinct values within the index key. You will
    not always know how many distinct values you have; in such cases, you may wish
    to significantly increase the `BUCKET_COUNT`. The trade-off is that the more buckets
    you have, the more memory the index consumes. Once you have created the table,
    the index will be a fixed size and it is not possible to alter the table or its
    indexes.


    The script in Listing [7-14](#333037_2_En_7_Chapter.xhtml#PC14) creates a memory-optimized
    table called `OrdersMem` with full durability and populates it with data. It creates
    a nonclustered hash index on the `ID` column with a bucket count of 2,000,000,
    since we will be inserting 1,000,000 rows. The script assumes that the memory-optimized
    filegroup has already been created.


    ```

    USE [Chapter7]

    GO

    CREATE TABLE dbo.OrdersMem(

    OrderNumber int IDENTITY(1,1) NOT NULL PRIMARY KEY NONCLUSTERED HASH

    WITH (BUCKET_COUNT= 2000000),

    OrderDate date NOT NULL,

    CustomerID int NOT NULL,

    ProductID int NOT NULL,

    Quantity int NOT NULL,

    NetAmount money NOT NULL,

    TaxAmount money NOT NULL,

    InvoiceAddressID int NOT NULL,

    DeliveryAddressID int NOT NULL,

    DeliveryDate date NULL,

    )WITH (MEMORY_OPTIMIZED = ON, DURABILITY = SCHEMA_AND_DATA) ;

    DECLARE @Numbers TABLE

    (

    Number    INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE ;

    --Populate ExistingOrders with data

    INSERT INTO dbo.OrdersMem

    SELECT

    (SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number

    FROM @Numbers

    ORDER BY NEWID()),getdate())as DATE)),

    (SELECT TOP 1 Number -10 FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    500,

    100,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number - 10

    FROM @Numbers

    ORDER BY NEWID()),getdate()) as DATE))

    FROM @Numbers a

    CROSS JOIN @Numbers b

    CROSS JOIN @Numbers c ;

    ```


    **Listing 7-14** Creating a Memory-Optimized Table


    ### Performance Profile


    While memory-optimized tables were in development, they were known as `Hekaton`,
    which is a play on words, meaning 100 times faster. So let’s see how performance
    compares for different query types between in-memory and disk-based tables. The
    code in Listing [7-15](#333037_2_En_7_Chapter.xhtml#PC15) creates a new table,
    called `OrdersDisc`, and populates it with the data from `OrdersMem` so that you
    can run fair tests against the two tables.'
