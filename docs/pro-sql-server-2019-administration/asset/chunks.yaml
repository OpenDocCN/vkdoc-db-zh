    ### 从快照中恢复数据


    如果用户错误导致数据丢失，那么数据库快照可以让数据库管理员无需从备份中恢复数据库就能找回数据，这可以减少解决问题的恢复时间目标。假设一个用户意外截断了 `Chapter16`
    数据库中的 `Contacts` 表；我们可以通过从快照中重新插入来恢复这些数据，如代码清单 16-4 所示。


    ```

    --Truncate the table

    TRUNCATE TABLE Chapter16.dbo.Customers ;

    --Allow Identity values to be re-inserted

    SET IDENTITY_INSERT Chapter16.dbo.Customers ON ;

    --Insert the data

    INSERT INTO Chapter16.dbo.Customers(ID, FirstName, LastName, CreditCardNumber)

    SELECT *

    FROM Chapter16_ss_0630.dbo.Customers ;

    --Turn off IDENTITY_INSERT

    SET IDENTITY_INSERT Chapter16.dbo.Customers OFF ;

    代码清单 16-4

    恢复丢失的数据

    ```


    如果源数据库的大部分内容因用户错误而损坏，那么与逐个修复数据问题相比，从快照中恢复整个数据库可能更快。你可以使用带有 `FROM DATABASE_SNAPSHOT`
    语法的 `RESTORE` 命令来完成此操作，如代码清单 16-5 所示。


    **注意**


    如果你希望恢复的数据库存在多个快照，那么在运行此脚本之前，你必须删除除你计划用于恢复的那个快照之外的所有其他快照。


    ```

    USE Master

    GO

    RESTORE DATABASE Chapter16

    FROM DATABASE_SNAPSHOT = ''Chapter16_ss_0630'' ;

    代码清单 16-5

    从数据库快照中恢复

    ```


    ## 复制


    SQL Server 提供了一套复制技术，可用于在实例之间分散数据。你可以将复制用于多种目的，包括卸载报表处理、整合来自多个站点的数据、支持数据仓库以及与移动用户交换数据。


    ### 复制概念


    复制的术语借鉴自出版业。复制拓扑的组成部分在表 16-1 中描述。


    **表 16-1**


    **复制组件**


    | 组件 | 描述 |

    | --- | --- |

    | 发布服务器 | 发布服务器是向其他位置提供数据的实例。这本质上是主服务器。 |

    | 订阅服务器 | 订阅服务器是从发布服务器接收数据的实例。这本质上是从属服务器。一个复制拓扑可以有多个订阅服务器。 |

    | 分发服务器 | 分发服务器是存储复制技术元数据的实例，也可能承担处理工作负载。该实例可能与发布服务器是同一个实例。 |

    | 项目 | 项目是一个被复制的数据库对象，例如表或视图。可以对项目进行筛选，以减少需要复制的数据量。 |

    | 发布 | 发布是来自数据库的一组项目，作为一个单元进行复制。 |

    | 订阅 | 订阅是订阅服务器接收发布的请求。它定义了订阅服务器接收哪些发布。订阅有两种类型：推送订阅和请求订阅。在请求订阅模型中，负责移动数据的分发代理或合并代理运行在每个订阅服务器上。在推送模型中，分发代理或合并代理运行在分发服务器上。
    |

    | 复制代理 | 复制代理是位于 SQL Server 之外的应用程序，用于执行各种任务。使用的代理取决于你实现的复制类型。 |


    图 16-3 说明了复制组件如何在复制拓扑中组合在一起。在此示例中，两个订阅服务器各自接收相同的发布，并且分发服务器已与发布服务器分离。这被称为*远程分发器*。如果发布服务器和分发服务器共享同一个实例，则称为*本地分发器*。


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig3_HTML.png](img/333037_2_En_16_Fig3_HTML.png)


    **图 16-3**


    **复制组件概览**


    ### 复制类型


    SQL Server 提供了三种主要的复制类型：快照复制、事务性复制和合并复制。这些复制技术将在以下部分介绍。


    #### 快照


    快照复制的工作原理是在同步发生时获取所有项目的完整副本；因此，它不需要跟踪同步之间的数据更改。如果你在项目上定义了筛选器，则只会复制筛选后的数据。这意味着快照复制除了在同步发生时之外，没有额外开销。然而，当同步确实发生时，如果要复制的数据量很大，资源开销可能会非常高。


    快照代理为发布中的每个项目创建一个系统视图和一个系统存储过程。它使用这些对象来生成项目的内容。它还创建架构文件，在使用 `BCP`（大容量复制程序）批量复制数据之前，先将这些架构文件应用到订阅数据库。


    由于其资源利用特性，快照复制最适合以下情况：被复制的数据集较小且不常更改，或者在短时间内发生大量更改。（例如，这可能包括每月更新的价目表。）此外，快照复制是你用于对事务性复制和合并复制执行初始同步的默认机制。


    使用快照复制时，快照代理在发布服务器上运行以生成发布。然后，分发代理（运行在分发服务器或每个订阅服务器上）将发布应用到订阅服务器。快照复制始终单向工作，这意味着订阅服务器永远无法更新发布服务器。

    '
- fmt: '#### Transactional


    Transactional replication works by reading transactions from the transaction log
    on the publisher and then sending these transactions to be reapplied on the subscribers.
    The `Log Reader Agent`, which runs at the publisher, reads the transactions, and
    a `VLF` is not truncated until all log records marked for replication have been
    processed. This means that if there is a long period between synchronizations
    and many data modifications occur, there is a risk that your transaction log will
    grow or even run out of space. After the transactions have been read from the
    log, the `Distribution Agent` applies the transactions to the subscribers. This
    agent runs at the distributor in a push subscription model or at each of the subscribers
    in a pull subscription model. Synchronization is scheduled by `SQL Server Agent`
    jobs, which are configured to run the replication agents, and you can configure
    synchronization, so it happens continuously or periodically, depending on your
    requirements. The initial data synchronization is performed using the `Snapshot
    Agent` by default.


    Transactional replication is normally used in server-to-server scenarios where
    there is a high volume of data modifications at the publisher and there is a reliable
    network connection between the publisher and subscriber. A global data warehouse
    is an example of this, having subsets of data replicated to regional data warehouses.


    Standard transactional replication always works in a single direction only, which
    means that it is not possible for the subscribers to update the publisher. SQL
    Server also offers peer-to-peer transactional replication, however. In a Peer-to-Peer
    topology, each server acts as a publisher and a subscriber to the other servers
    in the topology. This means that changes you make on any server are replicated
    to all other servers in the topology.


    Because all servers can accept updates, it is possible for conflicts to occur.
    For this reason, peer-to-peer replication is most suitable when each peer accepts
    updates on a different partition of data. If a conflict does occur, you can configure
    SQL Server to apply the transaction with the highest `OriginatorID` (a unique
    integer that is assigned to each node in the topology), or you can choose to resolve
    the conflict manually, which is the recommended approach.


    ### Tip


    If you are unable to partition the updatable data between nodes, and conflicts
    are likely, you may find merge replication to be a better choice of technology.


    #### Merge


    Merge replication allows you to update both the publisher and the subscribers.
    This is a good choice for client-server scenarios, such as mobile salespersons
    who can enter orders on their laptops and then have them sync with the main sales
    database. It can also be useful in some server-server scenarios—for example, regional
    data warehouses that are updated via `ETL` processes and then rolled up into a
    global data warehouse.


    Merge replication works by maintaining a `rowguid` on every table that is an article
    within the publication. If the table does not have a `uniqueidentifier` column
    with the `ROWGUID` property set, then merge replication adds one. When a data
    modification is made to a table, a trigger fires, which maintains a series of
    change-tracking tables. When the `Merge Agent` runs, it applies only the latest
    version of the row. This means that resource utilization is high for tracking
    changes that occur, but the trade-off is that merge replication has the lowest
    overhead for actually synchronizing the changes.


    Because the subscribers, as well as the publisher, can be updated, there is a
    risk that conflicts between rows will occur. You manage these using conflict resolvers.
    Merge replication offers 12 conflict resolvers out of the box, including earliest
    wins, latest wins, and subscriber always wins. You can also program your own `COM`-based
    conflict resolvers or choose to resolve conflicts manually.


    Because you can use merge replication in client-server scenarios, it offers you
    a technology called Web synchronization for updating subscribers. When you use
    Web synchronization, after extracting the changes, the `Merge Agent` makes an
    `HTTPS` request to `IIS` and sends the data changes to the subscribers in the
    form of an `XML` message. `Replication Listener` and `Merge Replication Reconciler`,
    which are processes running on the subscriber, process the data changes, after
    sending any data modifications made at the subscriber back to the publisher.


    ### Implementing Transactional Replication


    The most appropriate type of replication for scaling workloads is standard transactional
    replication. We discuss how to implement this technology in the following sections.


    ### Note


    For the demonstrations in this section, we use two instances: `WIN-KIAGK4GN1MJ\PROSQLADMIN`
    and `WIN-KIAGK4GN1MJ\PROSQLADMIN2`.


    #### Implementing the Distributor


    Before configuring transactional replication for the Chapter [16](#333037_2_En_16_Chapter.xhtml)
    database, we will configure our instance as a Distributor. This can be achieved
    with the `Configure Distribution Wizard`, which can be invoked by selecting `Configure
    Distribution` from the context menu of `Replication`. The first page in the wizard
    is the `Distributor` page, illustrated in Figure [16-4](#333037_2_En_16_Chapter.xhtml#Fig4).
    On this page, we can choose to use the current instance as the distributor or
    specify a different instance.


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig4_HTML.jpg](images/333037_2_En_16_Chapter/333037_2_En_16_Fig4_HTML.jpg)


    *Figure 16-4 The Distributor page*


    Because our instance is not currently configured for `SQL Server Agent` service
    to start automatically, we now see the `SQL Server Agent Start` page, which warns
    us of this situation. This is because replication agents rely on `SQL Server Agent`
    to be scheduled and run. We choose the option for `SQL Server Agent` to be configured
    to start automatically, as shown in Figure [16-5](#333037_2_En_16_Chapter.xhtml#Fig5).


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig5_HTML.jpg](images/333037_2_En_16_Chapter/333037_2_En_16_Fig5_HTML.jpg)


    *Figure 16-5 The SQL Server Agent Start page*


    On the `Snapshot Folder` page of the wizard, we select the location the `Snapshot
    Agent` will use to store the initial data for synchronization. This can be a local
    folder or a network share, but if you specify a local folder, then pull subscriptions
    are not supported, since the subscribers are unable to access it. In our case,
    we use a network share. The `Snapshot Folder` page is illustrated in Figure [16-6](#333037_2_En_16_Chapter.xhtml#Fig6).


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig6_HTML.jpg](images/333037_2_En_16_Chapter/333037_2_En_16_Fig6_HTML.jpg)


    *Figure 16-6 Snapshot Folder page*


    Next, on the `Distribution Database` page of the wizard, we must specify a name
    for the distribution database and supply two folder locations, where the data
    and log files should be stored. This is represented in Figure [16-7](#333037_2_En_16_Chapter.xhtml#Fig7).


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig7_HTML.jpg](images/333037_2_En_16_Chapter/333037_2_En_16_Fig7_HTML.jpg)


    *Figure 16-7 Distribution Database page*


    On the `Publishers` page of the wizard, shown in Figure [16-8](#333037_2_En_16_Chapter.xhtml#Fig8),
    we specify the instances that will be used as Publishers for the Distributor.
    The current instance will be added automatically but can be deselected. The `Add`
    button in the bottom right of the page can be used to add additional SQL Server
    instances or Oracle databases.


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig8_HTML.jpg](images/333037_2_En_16_Chapter/333037_2_En_16_Fig8_HTML.jpg)


    *Figure 16-8 Publishers page*


    Finally, we can choose to either configure the distributor, script the configuration,
    or both. In this case, we will configure the Distributor straight away.'
