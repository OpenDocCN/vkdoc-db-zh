    ## 注意


    `DBCC LOGINFO` 是未公开的文档，因此不会得到 Microsoft 的支持。例如，在 SQL Server 2012 中，Microsoft 在输出中添加了一个名为
    `RecoverUnitID` 的列，但他们从未公开过其描述。


    `DBCC LOGINFO` 返回的每个列的含义如表 6-2 所述。


    表 6-2

    DBCC LOGINFO 列


    | 列 | 描述 |

    | --- | --- |

    | `FileID` | 物理文件的 ID。假设你只有一个文件，这应该总是返回相同的值。 |

    | `FileSize` | VLF 的大小（以字节为单位）。 |

    | `StartOffset` | 从物理文件的开始到 VLF 起始位置的字节数。 |

    | `FSeqNo` | 定义 VLF 的当前使用顺序。最高的 `FSeqNo` 表示当前正在写入的 VLF。 |

    | `Status` | 状态为 2 表示 VLF 当前是活动的。状态为 0 表示不是活动的，因此可以被重用。 |

    | `Parity` | 校验位从 0 开始。当 VLF 首次被使用时，它被设置为 64。随后，它可以设置为 64 或 128。每次 VLF 被重用时，此标志会切换到相反的值。
    |

    | `CreateLSN` | `CreateLSN` 表示创建 VLF 时使用的日志序列号。 |


    了解了这些列之后，我们可以识别出前面所示结果的一些有趣事实。首先，因为前四个 VLF 的 `CreateLSN` 值为 0，我们知道这些是在日志文件本身生成时最初创建的
    VLF。其余的则是由日志扩展而非循环使用创建的。我们还可以看到结果中的最后十个 VLF 尚未被使用，因为它们的 Parity 为 0。`FSeqNo` 为
    83 的 VLF 是当前正在写入记录的 VLF，因为它具有最高的 `FSeqNo`。


    最有趣的是，就本示例而言，我们可以看到前 51 个 VLF 被标记为活动状态，这意味着它们无法被重用。这意味着如果我们尝试收缩日志文件，只能移除十个 VLF，文件只能缩小它们文件大小的总和。


    我们的日志增长且无法循环使用的原因是所有空间都在单个事务过程中被使用了，当然，我们的日志没有被备份。清单 6-19 中的查询将帮助你确定事务日志增长是否有其他原因。该查询检查
    `sys.databases` 目录视图并返回 VLF 最后一次无法被重用的原因。


    ```sql

    SELECT log_reuse_wait_desc

    FROM sys.databases

    WHERE name = ''Chapter6LogFragmentation'';

    ```

