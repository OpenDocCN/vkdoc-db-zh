    # 端口与防火墙


    在现代企业网络拓扑中，你的 SQL Server 实例很可能需要通过至少两个防火墙进行通信。其中一个将是硬件防火墙，另一个将是 Windows 防火墙，也称为本地防火墙。为了让你的实例能够与其他接口（无论是网络上的应用程序还是其他实例）通信，同时保持防火墙提供的安全性，就需要开放端口，以便
    SQL Server 可以通过这些端口进行通信。


    ## 通信过程


    为了理解需要开放哪些端口来允许 SQL Server 流量，你首先必须理解客户端如何与 SQL Server 通信。图 5-7 展示了 TCP/IP 连接的过程流。此示例假设实例正在监听端口
    `1433`——这将在本章后面详细讨论。它还假设客户端运行在 Windows Vista/Windows Server 2008 或更高版本上。


    ![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig7_HTML.jpg](img/333037_2_En_5_Fig7_HTML.jpg)


    图 5-7 通信过程流


    如果你希望客户端通过命名管道而非 TCP/IP 访问实例，那么 SQL Server 将通过端口 `445` 进行通信。这与文件和打印机共享使用的端口相同。


    ## SQL Server 所需的端口


    如果你安装的是 SQL Server 的默认实例，那么安装程序将自动分配端口 `1433`，这是 IANA（互联网号码分配机构）为 SQL Server 注册的端口。然而，许多
    DBA 出于增强安全性的考虑，会选择更改此端口号。攻击者会知道你很可能在端口 `1433` 上运行实例，因此知道要攻击哪个端口。在较小的环境中，除非你对网络的安全性有信心，否则使用非标准端口号可能是增加一层混淆的好主意。然而，在大型企业中，你需要考虑对运营可支持性的影响。例如，如果每个实例都有不同的端口号，你将需要一种记录并能在浏览器服务故障时快速获取给定实例端口号的方法。在允许多个命名实例共存于每台服务器的环境中，这将不那么令人担忧，因为你已经拥有了用于记录这些端口号的清单工具。


    ## 注


    IANA，即互联网号码分配机构，负责协调互联网协议资源的分配，如 IP 地址、域名、协议参数和网络服务的端口号。其网站是 `www.internetassignednumbersauthority.org/`。


    如果你安装的是 SQL Server 的命名实例，那么安装程序将配置该实例使用动态端口。当配置了动态端口时，每次实例启动时，它都会向操作系统请求一个端口号。操作系统随后会从动态范围中分配一个随机的可用端口，假设你运行的是
    Windows Server 2008 或更高版本，该范围是 `49152` 到 `65535`。在早期版本的 Windows 中，动态端口范围是 `1024`
    到 `5000`，但微软在 Windows Vista 和 Windows Server 2008 中更改了此范围以符合 IANA 规定。


    如果你的实例配置为使用动态端口，那么配置防火墙可能具有挑战性。在 Windows 防火墙级别，可以将特定服务配置为在任何端口上通信，但这在硬件防火墙级别可能难以复制。或者，你需要双向保持整个动态端口范围开放。因此，我建议将实例配置为使用特定端口。


    重要的是要记住，SQL Server 为各种功能使用许多其他端口。数据库引擎可能需要的完整端口集列在表 5-5 中。如果你安装了数据库引擎之外的功能，如 SSAS
    或 SSRS，则将需要额外的端口。如果你计划在实例中使用其他服务，如用于加密的 IPSec、用于分布式事务的 `MSDTC`（Microsoft 分布式事务协调器）或用于监控的
    `SCOM`（System Center Operations Manager），也将有额外的要求。


    ## 表 5-5：数据库引擎所需的端口


    | 功能 | 端口 |

    | --- | --- |

    | 浏览器服务 | `UDP 1433`。 |

    | 通过 TCP/IP 的实例 | `TCP 1433`，动态或静态配置。 |

    | 通过命名管道的实例 | `TCP 445`。 |

    | DAC（专用管理员连接） | `TCP 1434`。如果 `TCP 1434` 已被占用，端口号将在实例启动时打印到 SQL Server 日志中。 |

    | Service Broker | `TCP 4022` 或按配置设定。 |

    | AlwaysOn 可用性组 | `TCP 5022` 或按配置设定。 |

    | 带 Web 同步的合并复制 | `TCP 21`、`TCP 80`、`UDP 137`、`UDP 138`、`TCP 139`、`TCP 445`。 |

    | T-SQL 调试器 | `TCP 135`。 |


    ## 配置实例将监听的端口


    如本章前面所述，如果你有一个命名实例，那么在配置防火墙之前，你可能希望为该实例配置一个静态端口。该端口可以在 SQL Server 配置管理器中 TCP/IP
    协议的“TCP/IP 属性”对话框内配置。要导航到此对话框，请在 SQL Server 配置管理器的左侧窗格中展开 `SQL Server Network
    Configuration` ➤ `Protocols for *INSTANCENAME*`（其中 `*INSTANCENAME*` 是你的实例名称）。在右侧窗格中双击
    `TCP/IP` 将显示该对话框。


    在“协议”选项卡上，你会注意到一个名为 `Listen All` 的设置，其默认值为“是”，如图 5-8 所示。此设置的意义稍后会变得清晰。


    ![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig8_HTML.jpg](img/333037_2_En_5_Fig8_HTML.jpg)


    图 5-8 “协议”选项卡


    在“IP 地址”选项卡上，你会注意到有多个 IP 地址的配置详细信息。但是，由于 `Listen All` 设置为“是”，SQL Server 将忽略所有这些配置。相反，它将只查看对话框最底部为
    `IP All` 指定的设置。`TCP Dynamic Ports` 字段将显示操作系统分配的随机端口，而 `TCP Port` 字段将为空，如图 5-9
    所示。要分配静态端口号，我们需要反转此设置。我们需要清空 `TCP Dynamic Ports` 字段，并在 `TCP Port` 字段中填入我们选择的端口号
    `1433`。SQL Server 服务需要重启后此更改才能生效。


    ![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig9_HTML.jpg](img/333037_2_En_5_Fig9_HTML.jpg)


    图 5-9 “IP 地址”选项卡

    '
- fmt: '### Tip


    Remember that the default instance will take port `1433` by default. Therefore,
    if a default instance already exists on the server, when you create the named
    instance, you must use a different port.


    We could achieve the same result from PowerShell by running the script in Listing
    [5-9](#333037_2_En_5_Chapter.xhtml#PC9). This script has two variables at the
    top where you should insert the name of your instance and the port number you
    want to assign. These could also be parameterized to create a reusable script.
    The script loads the relevant SMO assembly. It then creates a new SMO object and
    connects to the TCP properties of the object to configure the port. The script
    must be run as Administrator.


    ```powershell

    # Initialize variables

    $Instance = "PROSQLADMIN"

    $Port = "1433"

    # Load SMO Wmi.ManagedComputer assembly

    [System.Reflection.Assembly]::LoadWithPartialName("Microsoft.SqlServer.SqlWmiManagement")
    | out-null

    # Create a new smo object

    $m = New-Object (''Microsoft.SqlServer.Management.Smo.Wmi.ManagedComputer'')

    #Disable dynamic ports

    $m.ServerInstances[$Instance].ServerProtocols[''Tcp''].IPAddresses[''IPAll''].IPAddressProperties[''TcpDynamicPorts''].Value
    = ""

    # Set static port

    $m.ServerInstances[$Instance].ServerProtocols[''Tcp''].IPAddresses[''IPAll''].IPAddressProperties[''TcpPort''].Value
    = "$Port"

    # Reconfigure TCP

    $m.ServerInstances[$Instance].ServerProtocols[''Tcp''].Alter()

    ```


    Listing 5-9: Assigning a Static Port


    ## System Databases


    SQL Server maintains five system databases, each of which is important to the
    efficient running of your instance. The following sections describe each of these
    databases and detail any special considerations for configuring them.


    ### mssqlsystemresource (Resource)


    Although referred to as Resource, the full name of the Resource database is `mssqlsystemresource`.
    It is the physical repository used to store the system objects that appear within
    the `sys` schema of every database. It is read-only and should never be modified,
    except under guidance from Microsoft. It is not visible within Management Studio,
    and if you try to connect to it from a query window, it will fail, unless you
    are in single user mode. There are no considerations for configuring Resource.


    ### MSDB


    `MSDB` is used as a metadata repository for many SQL Server features, including
    Server Agent, Backup/Restore, Database Mail, Log Shipping, Policies, and more.
    Although this is obviously a critical and useful database, there are no specific
    configuration options to consider. That being said, in a very large instance consisting
    of a very large number of databases, all with frequent log backups, the database
    can grow very large. This means that you will need to purge old data and sometimes
    consider indexing strategies. Historic backup data can be purged using the `sp_deletebackuphistory`
    stored procedure or the History Cleanup Task in a Maintenance Plan. Automating
    routine maintenance tasks will be discussed in more detail in Chapter [22](#333037_2_En_22_Chapter.xhtml).


    ### Master


    `Master` is the system database that contains metadata for instance-level objects,
    such as logins, linked servers, TCP endpoints, and master keys and certificates
    for implementing encryption. The biggest consideration for the `Master` database
    is the backup policy. Although it does not need to be backed up as frequently
    as user databases do, you should always ensure that you do have a current backup.
    At a minimum, the database should be backed up after creating or altering logins,
    linked servers, and system configurations; creating or altering keys and certificates;
    or after creating or dropping user databases. Many people select a weekly, full
    backup schedule for `Master`, but this will depend on your operational requirements,
    such as how often you create new users.


    ### Note


    Logins and users will be discussed in Chapter [9](#333037_2_En_9_Chapter.xhtml),
    backups will be discussed in Chapter [15](#333037_2_En_15_Chapter.xhtml), and
    keys and certificates will be discussed in Chapter [10](#333037_2_En_10_Chapter.xhtml).


    Although technically possible, it is considered bad practice to store user objects
    in the `Master` database. I have seen clients implement this for stored procedures
    that need to be shared by all databases on the instance, but it adds complexity,
    because they are fragmenting the storage of user objects and also increasing the
    frequency with which they must backup `Master`.


    ### Tip


    Because developers often do not set a default database, they end up creating stored
    procedures in the `Master` database by mistake. You should check for this issue
    as part of your code deployment process.


    ### Model


    `Model` is used as a template for all new databases that are created on the instance.
    This means that spending some time configuring this database can save you time
    and reduce human error when you are creating user databases. For example, if you
    set the recovery model to be Full on the `Model` database, then all new user databases
    will automatically be configured in the same way. You still have the option to
    override this in your `CREATE DATABASE` statement. Additionally, if you need a
    specific object to exist in all databases, such as a maintenance-stored procedure
    or a database role, then creating this in `Model` will mean that the object will
    automatically be created inside every new database. `Model` is also used for creating
    `TempDB` every time the instance starts. This means that if you create objects
    in the `Model` database, they will automatically be added to `TempDB` when the
    instance restarts.


    ### Tip


    When you are configuring or adding new objects to `Model`, existing databases
    will not be updated. Changes will only apply to new databases that you create
    subsequently.'
