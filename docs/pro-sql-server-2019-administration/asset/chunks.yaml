    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig7_HTML.jpg](img/333037_2_En_14_Fig7_HTML.jpg)


    图 14-7 侦听器选项卡


    #### 选择初始数据同步


    在如图 14-8 所示的“选择初始数据同步”屏幕上，我们选择如何执行副本的初始数据同步。如果选择“完整”，则参与可用性组的每个数据库都将执行完整备份，然后是日志备份。备份文件备份到你指定的共享，然后还原到辅助服务器。共享路径可以使用
    `Windows` 或 `Linux` 格式指定，具体取决于你的要求。还原完成后，通过日志流的数据同步开始。


    如果你已经备份了数据库并将它们还原到辅助副本上，则可以选择“仅连接”选项。这将启动可用性组内数据库通过日志流的数据同步。选择“跳过初始数据同步”允许你在完成设置后自行备份和还原数据库。


    如果选择“自动种子设定”选项，则最初会在每个副本上创建一个空数据库。然后使用 `VDI` 通过日志流传输进行数据种子设定。此选项比使用备份初始化慢，但避免了在共享之间传输大型备份文件。


    ### 提示


    如果你的可用性组将包含许多数据库，那么最好自行执行备份/还原。这是因为内置工具将按顺序执行操作，因此可能需要很长时间才能完成。


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig8_HTML.jpg](img/333037_2_En_14_Fig8_HTML.jpg)


    图 14-8 选择数据同步页面


    #### 验证和完成


    在“验证”页面上，会检查可能导致设置失败的规则。如果任何结果返回为“失败”，则需要在尝试继续之前解决它们。


    验证测试完成后，我们转到“摘要”页面，其中显示了在设置过程中要执行的任务列表。


    随着设置的进行，每个配置任务的结果显示在“结果”页面上。如果此页面上出现任何错误，请务必调查它们，但这并不一定意味着整个可用性组需要重新配置。例如，如果由于
    `VCO` 尚未在 `AD` 中呈现而导致创建可用性组侦听器失败，那么你可以重新创建侦听器，而无需重新创建整个可用性组。


    作为使用“新建可用性组向导”的替代方法，你可以使用“新建可用性组”对话框，然后使用“添加侦听器”对话框来执行可用性组的配置。本章稍后将探讨这种创建可用性组的方法。

    '
- fmt: '### Using the New Availability Group Dialog Box


    Now that we have successfully created our first availability group, let’s create
    a second availability group for `App2`. This time, we use the New Availability
    Group and Add Listener dialog boxes. We begin this process by backing up the `Chapter14App2Customers`
    database. Just like when we created the `App1` availability group, the databases
    are not selectable until we perform the backup. Unlike when we used the wizard,
    however, we have no way to make SQL Server perform the initial database synchronization
    using a backup/restore option. Therefore, we must either back up the database
    to the share that we created during the previous demonstration and then restore
    the backup, along with a transaction log backup, to the secondary instance, or
    use Automatic Seeding. In this example, we will use Automatic Seeding, so there
    is no need to restore the databases to the secondary Replicas in advance. The
    script in Listing 14-4 will perform the Full backup of the `Chapter14App2Customers`
    database.


    #### Tip


    For Automatic Seeding to work, the Availability Group must be granted the `CREATE
    ANY DATABASE` permission on the secondary servers. More information about granting
    permissions can be found in Chapter 10.


    ```

    --Back Up Database

    BACKUP DATABASE [Chapter14App2Customers] TO  DISK = N''\\CLUSTERNODE1\AOAGShare\Chapter14App2Customers.bak''
    WITH  COPY_ONLY, FORMAT, INIT, REWIND, COMPRESSION,  STATS = 5 ;

    GO

    Listing 14-4

    Backing Up and Restoring the Database

    ```


    If we had not already created an availability group, then our next job would be
    to create a TCP endpoint so the instances could communicate. We would then need
    to create a login for the service account on each instance and grant it the connect
    permissions on the endpoints. Because we can only ever have one database mirroring
    endpoint per instance, however, we are not required to create a new one, and obviously
    we have no reason to grant the service account additional privileges. Therefore,
    we continue by creating the availability group. To do this, we drill through AlwaysOn
    High Availability in Object Explorer and select New Availability Group from the
    context menu of availability groups.


    This causes the General tab of the New Availability Group dialog box to display,
    as illustrated in Figure 14-9. On this screen, we type the name of the availability
    group in the first field. Then we click the Add button under the Availability
    Databases window before we type the name of the database that we wish to add to
    the group. We then need to click the Add button under the Availability Replicas
    window before we type the server\instance name of the secondary replica in the
    new row. For our use case, there is no need to specify the Per Database DTC Support
    or Database Level Health Detection settings, as there is only a single database
    within the Availability Group. We have set Required Synchronized Secondaries to
    Commit to 1, however. This setting, which was new in SQL Server 2017, guarantees
    that the specified number of secondary replicas write the transaction data to
    log before the primary replica commits each transaction. In our scenario, where
    we only have a single synchronous secondary, that in the event of a failure on
    the Primary Replica, failover will happen automatically, but the Secondary Replica
    will not allow user transactions to be written to the database, until the original
    Primary Replica comes back online. This absolutely guarantees that there can be
    no data loss in any circumstances. If we had left this setting as 0 (as we did
    in the first example in this chapter), then in the event that the Primary Replica
    failed and users wrote transactions to the Secondary Replica, before this Replica
    also failed, then data loss could occur, as the only other Replica uses asynchronous
    commit mode.


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig9_HTML.jpg](images/333037_2_En_14_Chapter/333037_2_En_14_Fig9_HTML.jpg)

    *Figure 14-9: The New Availability Group dialog box*


    Now we can begin to set the replica properties. We discussed the Role, Availability
    Mode, Failover Mode, Readable Secondary, and Endpoint URL properties when we created
    the `App1` availability group. The Connection In Primary Role property defines
    what connections can be made to the replica if the replica is in the primary role.
    You can configure this as either Allow All Connections or allow Read/Write connections.
    When Read/Write is specified, applications using the `Application Intent = Read
    only` parameter in their connection string will not be able to connect to the
    replica.


    The Session Timeout property sets how long the replicas can go without receiving
    a ping from one another before they enter the `DISCONNECTED` state and the session
    ends. Although it is possible to set this value to as low as 5 seconds, it is
    usually a good idea to keep the setting at 60 seconds; otherwise you run the risk
    of a false positive response, resulting in unnecessary failover. If a replica
    times out, it needs to be resynchronized, since transactions on the primary will
    no longer wait for the secondary, even if the secondary is running in Synchronous
    Commit mode.


    On the Backup Preferences tab of the dialog box, we define the preferred replica
    to use for automated backup jobs, as shown in Figure 14-10. Just like when using
    the wizard, we can specify Primary, or we can choose between enforcing and preferring
    backups to occur on a secondary replica. We can also configure a weight, between
    0 and 100 for each replica, and use the Exclude Replica check box to avoid backups
    being taken on a specific node.


    #### Tip


    Excluding Replicas from backups can help if you are using Software Assurance,
    and although your licensing allows you to keep a secondary replica synchronized
    for the purpose of either HA or DR, it does not allow you to perform other tasks
    (such as backups) on this secondary server.


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig10_HTML.jpg](images/333037_2_En_14_Chapter/333037_2_En_14_Fig10_HTML.jpg)

    *Figure 14-10: The Backup Preferences tab*


    Once we have created the availability group, we need to create the availability
    group listener. To do this, we select New Listener from the context menu of the
    `App2` availability group, which should now be visible in Object Explorer. This
    invokes the New Availability Group Listener dialog box, which can be seen in Figure
    14-11.


    In this dialog box, we start by entering the virtual name for the listener. We
    then define the port that it will listen on and the IP address that will be assigned
    to it.


    #### Tip


    We are able to use the same port for both of the listeners, as well as the SQL
    Server instance, because all three use different IP addresses.


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig11_HTML.jpg](images/333037_2_En_14_Chapter/333037_2_En_14_Fig11_HTML.jpg)

    *Figure 14-11: The New Availability Group Listener dialog box*


    ### Availability Groups on Linux


    As well as working on a Windows cluster, Availability Groups can also be configured
    on SQL Server instances running on Linux. In this section, we will discuss how
    to configure availability groups for high availability on Linux. In our specific
    scenario, we have two servers, namely, `ubuntu-primary` and `ubuntu-secondary`,
    which will form our server topology.'
