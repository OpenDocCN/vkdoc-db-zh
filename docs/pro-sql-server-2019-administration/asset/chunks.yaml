  trans: '## 包含式数据库用户


    当使用包含式数据库用户时，你需要考虑许多额外的安全因素。首先，某些应用程序可能要求一个用户拥有多个数据库的权限。如果该用户映射到一个 Windows 用户或组，那么事情就很简单，因为被验证的
    SID 就是该 Windows 对象的 SID。然而，如果数据库用户使用的是二级验证，那么就有可能复制第一个数据库中用户的 SID。例如，我们可以在 `Chapter10`
    数据库中创建一个名为 `ContainedUser` 的用户，该用户将使用二级验证。然后，我们可以通过指定 SID，将此用户复制到 `Chapter10Twain`
    数据库中，如代码清单 10-14 所示。在复制用户之前，该脚本首先创建了 `Chapter10Twain` 数据库并将其配置为包含式。


    ```sql

    USE Master

    GO

    CREATE DATABASE Chapter10Twain ;

    GO

    ALTER DATABASE Chapter10Twain SET CONTAINMENT = PARTIAL WITH NO_WAIT ;

    GO

    USE Chapter10Twain

    GO

    CREATE USER ContainedUser WITH PASSWORD = ''Pa$$w0rd'',

    SID = 0x0105000000000009030000009134B23303A7184590E152AE6A1197DF ;

    ```

    代码清单 10-14

    创建重复用户


    我们可以通过查询 `Chapter10` 数据库中的 `sys.database_principals` 目录视图来确定 SID，如代码清单 10-15 所示。


    ```sql

    SELECT sid

    FROM sys.database_principals

    WHERE name = ''ContainedUser'' ;

    ```

    代码清单 10-15

    查找用户的 SID


    一旦我们在第二个数据库中复制了用户，我们还需要启用第一个数据库的 `TRUSTWORTHY` 属性，以便允许进行跨数据库查询。我们可以使用代码清单 10-16
    中的命令在 `Chapter10` 数据库中启用 `TRUSTWORTHY`。


    ```sql

    ALTER DATABASE Chapter10 SET TRUSTWORTHY ON ;

    ```

    代码清单 10-16

    启用 TRUSTWORTHY


    即使我们没有创建重复用户，如果启用了另一个数据库的 Guest 账户，包含式用户仍然可以通过该 Guest 账户访问其他数据库。这是一个技术要求，目的是让包含式用户能够访问
    TempDB。


    DBA 在将包含式数据库附加到实例时也应谨慎，以确保不会无意中将权限授予本不应访问的用户。当你将数据库从预生产环境迁移到生产实例，而附加前未从数据库中移除
    UAT（用户验收测试）或开发用户时，就可能发生这种情况。


    ## 实现对象级安全性


    为数据库用户授予对象权限有两种语法变体。第一种使用 `OBJECT` 短语，而第二种不使用。例如，代码清单 10-17 中的两个命令在功能上是等效的。


    ```sql

    USE Chapter10

    GO

    --使用 OBJECT 符号授权

    GRANT SELECT ON OBJECT::dbo.SensitiveData TO [PROSQLADMIN\Chapter10Users] ;

    GO

    --不使用 OBJECT 符号授权

    GRANT SELECT ON dbo.SensitiveData TO [PROSQLADMIN\Chapter10Users] ;

    GO

    ```

    代码清单 10-17

    分配权限


    许多权限可以被授予，但并非所有权限都与每个对象相关。例如，`SELECT` 权限可以授予表或视图，但不能授予存储过程。而 `EXECUTE` 权限可以授予存储过程，但不能授予表或视图。


    在授予表权限时，可以授予特定列的权限，而不是整个表的权限。代码清单 10-18 中的脚本授予用户 `ContainedUser` 对 `Chapter10`
    数据库中 `SensitiveData` 表的 `SELECT` 权限。但是，用户不能读取整个表，权限仅被授予 `SensitiveText` 列。


    ```sql

    GRANT SELECT ON dbo.SensitiveData ([SensitiveText]) TO ContainedUser ;

    ```

    代码清单 10-18

    授予列级权限


    ## 服务器审计


    SQL Server 审计使 DBA 能够捕获针对实例级和数据库级活动的细粒度审计信息，并将此活动保存到文件、Windows 安全日志或 Windows 应用程序日志中。保存审计数据的位置称为*目标*。SQL
    Server 审计对象位于实例级别，定义了审计和目标的属性。每个实例中可以有多个服务器审计。这在需要审计繁忙环境中的许多事件时很有用，因为你可以通过使用文件作为目标并将每个目标文件放在单独的卷上来分散
    IO。


    从安全角度来看，选择正确的目标很重要。如果你选择 Windows 应用程序日志作为目标，那么任何经过服务器认证的 Windows 用户都能访问它。安全日志比应用程序日志安全得多，但为
    SQL Server 审计进行配置也可能更复杂。运行 SQL Server 服务的服务账户需要在服务器的本地安全策略中拥有“生成安全审计”用户权限分配。还需要在审计策略中为成功和失败启用应用程序生成的审计。目标的另一个考虑因素是大小。如果你决定使用应用程序日志或安全日志，那么在开始将其用于审计之前，考虑并可能增加这些日志的大小是很重要的。此外，与你的
    Windows 管理团队合作，决定当日志满时如何循环覆盖，以及是否通过将其备份到磁带进行归档。


    然后，SQL Server 审计可以与一个或多个服务器审计规范和数据库审计规范关联。这些规范分别定义了将在实例级和数据库级审计的活动。如果你正在审计许多操作，拥有多个服务器或数据库审计规范是有帮助的，因为你可以对它们进行分类以简化管理，同时仍将它们与同一个服务器审计关联。如果你计划在多个数据库中审计活动，实例内的每个数据库都需要自己的数据库审计规范。'
- fmt: '## 创建服务器审计


    创建服务器审计时，可以使用表 10-4 中详述的选项。


    **表 10-4 服务器审计选项**


    | 选项 | 描述 |

    | --- | --- |

    | `FILEPATH` | 仅在选择文件目标时适用。指定将生成审计日志的文件路径。 |

    | `MAXSIZE` | 仅在选择文件目标时适用。指定审计文件可以增长到的最大大小。可以为此指定的最小大小为 2MB。 |

    | `MAX_ROLLOVER_FILES` | 仅在选择文件目标时适用。当审计文件已满时，您可以循环该文件或生成一个新文件。`MAX_ROLLOVER_FILES`
    设置控制在开始循环之前可以生成多少个新文件。默认值为 `UNLIMITED`，但指定一个数字会将文件数量限制在此上限内。如果将其设置为 0，则将始终只有一个文件，并且每次文件填满时都会循环。任何大于
    0 的值表示允许的滚动文件数。例如，如果指定 5，那么总共最多将有六个文件。 |

    | `MAX_FILES` | 仅在选择文件目标时适用。作为 `MAX_ROLLOVER_FILES` 的替代选项，`MAX_FILES` 设置指定了可以生成的审计文件数量的限制，但当达到此数目时，日志不会循环。相反，审计将失败，并且导致审计操作发生的事件将根据
    `ON_FAILURE` 的设置进行处理。 |

    | `RESERVE_DISK_SPACE` | 仅在选择文件目标时适用。预分配与 `MAXSIZE` 中设置的值相等的卷上空间，而不是允许审计日志按需增长。
    |

    | `QUEUE_DELAY` | 指定审计事件是同步写入还是异步写入。如果设置为 0，事件将同步写入日志。否则，指定在强制写入事件之前可以经过的持续时间（以毫秒为单位）。默认值为
    1000（1 秒），这也是最小值。 |

    | `ON_FAILURE` | 指定如果导致审计的事件无法审计到日志中时应该发生的情况。可接受的值为 `CONTINUE`、`SHUTDOWN` 或 `FAIL_OPERATION`。当指定
    `CONTINUE` 时，允许操作继续。这可能导致发生未经审计的活动。`FAIL_OPERATION` 使可审计事件失败，但允许其他操作继续。`SHUTDOWN`
    强制在实例无法将可审计事件写入日志时停止实例。 |

    | `AUDIT_GUID` | 由于服务器和数据库审计规范通过 GUID 链接到服务器审计，因此有时审计规范可能会成为孤立状态。这包括将数据库附加到实例时或实施诸如数据库镜像等技术时。此选项允许您为服务器审计指定特定的
    GUID，而不是让 SQL Server 生成一个新的 GUID。 |


    也可以在服务器审计上创建筛选器。当您的审计规范捕获针对整个对象类的活动，但您只对审计其中的一个子集感兴趣时，这可能很有用。例如，您可能配置了一个服务器审计规范来记录对服务器角色的任何成员更改；但是，您实际上只对
    `sysadmin` 服务器角色成员被修改感兴趣。在这种情况下，您可以筛选 `sysadmin` 角色。


    您可以通过 SQL Server Management Studio (SSMS) 中的 GUI 创建服务器审计：在对象资源管理器中浏览到“安全性”，然后从“审计”节点中选择“新建审计”。图
    10-6 展示了“创建审计”对话框。


    ![创建审计对话框图片](images/333037_2_En_10_Chapter/333037_2_En_10_Fig6_HTML.jpg)


    **图 10-6 “常规”选项卡**


    您可以看到我们决定将审计保存到平面文件，而不是 Windows 日志。因此，我们需要指定与文件相关的参数。我们将文件设置为滚动，并将任何单个文件的最大大小强制为
    512MB。我们保留审计条目在强制写入日志之前的持续时间的默认值 1 秒（1000 毫秒），并将审计命名为 `Audit-ProSQLAdmin`。


    在“创建审计”对话框的“筛选器”选项卡上，您应指定希望基于 `object_name` 进行筛选，并且仅审计对 `sysadmin` 角色的更改。


    或者，我们可以使用 T-SQL 执行相同的操作。代码清单 10-19 中的脚本创建了相同的服务器审计。


    ```sql

    USE Master

    GO

    CREATE SERVER AUDIT [Audit-ProSQLAdmin]

    TO FILE

    (        FILEPATH = N''c:\audit''

    ,MAXSIZE = 512 MB

    ,MAX_ROLLOVER_FILES = 2147483647

    ,RESERVE_DISK_SPACE = OFF

    )

    WITH

    (        QUEUE_DELAY = 1000

    ,ON_FAILURE = CONTINUE

    )

    WHERE object_name = ''sysadmin'' ;

    ```

    **代码清单 10-19 创建服务器审计**


    ## 创建服务器审计规范


    要通过 SSMS 创建服务器审计规范，我们可以在对象资源管理器中浏览到“安全性”，然后从“服务器审计规范”上下文菜单中选择“新建服务器审计规范”。这将显示“创建服务器审计规范”对话框，如图
    10-7 所示。


    ![创建服务器审计规范对话框图片](images/333037_2_En_10_Chapter/333037_2_En_10_Fig7_HTML.jpg)


    **图 10-7 服务器审计规范对话框**


    您可以看到我们选择了 `SERVER_ROLE_MEMBER_CHANGE_GROUP` 作为审计操作类型。这将审计服务器角色成员资格的任何添加或删除。但是，结合我们在服务器审计对象上设置的筛选器，新结果是将只记录对
    `sysadmin` 服务器角色的更改。我们还从“审计”下拉框中选择了 `Audit-ProSQLAdmin` 审计，以将对象关联起来。


    或者，我们可以通过运行代码清单 10-20 中的命令使用 T-SQL 创建相同的服务器审计规范。在此命令中，我们使用 `FOR SERVER AUDIT`
    子句将服务器审计规范链接到 `Audit-ProSQLAdmin` 服务器审计，并使用 `ADD` 子句指定要捕获的审计操作类型。


    ```sql

    CREATE SERVER AUDIT SPECIFICATION [ServerAuditSpecification-ProSQLAdmin]

    FOR SERVER AUDIT [Audit-ProSQLAdmin]

    ADD (SERVER_ROLE_MEMBER_CHANGE_GROUP) ;

    ```

    **代码清单 10-20 创建服务器审计规范**'
  raw: '### Creating a Server Audit


    When you create a server audit, you can use the options detailed in Table [10-4](#333037_2_En_10_Chapter.xhtml#Tab4).


    Table 10-4


    Server Audit Options


    | Option | Description |

    | --- | --- |

    | `FILEPATH` | Only applies if you choose a file target. Specifies the file path,
    where the audit logs will be generated. |

    | `MAXSIZE` | Only applies if you choose a file target. Specifies the largest
    size that the audit file can grow to. The minimum size you can specify for this
    is 2MB. |

    | `MAX_ROLLOVER_FILES` | Only applies if you choose a file target. When the audit
    file becomes full, you can either cycle that file or generate a new file. The
    `MAX_ROLLOVER_FILES` setting controls how many new files can be generated before
    they begin to cycle. The default value is `UNLIMITED`, but specifying a number
    caps the number of files to this limit. If you set it to 0, then there will only
    ever be one file, and it will cycle every time it becomes full. Any value above
    0 indicates the number of rollover files that will be permitted. So, e.g., if
    you specify 5, then there will be a maximum of six files in total. |

    | `MAX_FILES` | Only applies if you choose a file target. As an alternative to
    `MAX_ROLLOVER_FILES`, the `MAX_FILES` setting specifies a limit for the number
    of audit files that can be generated, but when this number is reached, the logs
    will not cycle. Instead, the audit fails and events that cause an audit action
    to occur are handled based on the setting for `ON_FAILURE`. |

    | `RESERVE_DISK_SPACE` | Only applies if you choose a file target. Preallocate
    space on the volume equal to the value set in `MAXSIZE`, as opposed to allowing
    the audit log to grow as required. |

    | `QUEUE_DELAY` | Specifies if audit events are written synchronously or asynchronously.
    If set to 0, events are written to the log synchronously. Otherwise, specifies
    the duration in milliseconds that can elapse before events are forced to write.
    The default value is 1000 (1 second), which is also the minimum value. |

    | `ON_FAILURE` | Specifies what should happen if events that cause an audit action
    fail to be audited to the log. Acceptable values are `CONTINUE`, `SHUTDOWN`, or
    `FAIL_OPERATION`. When `CONTINUE` is specified, the operation is allowed to continue.
    This can lead to unaudited activity occurring. `FAIL_OPERATION` causes auditable
    events to fail, but allows other actions to continue. `SHUTDOWN` forces the instance
    to stop if auditable events cannot be written to the log. |

    | `AUDIT_GUID` | Because server and database audit specifications link to the
    server audit through a GUID, there are occasions when an audit specification can
    become orphaned. These include when you attach a database to an instance or when
    you implement technologies such as database mirroring. This option allows you
    to specify a specific GUID for the server audit, as opposed to having SQL Server
    generate a new one. |


    It is also possible to create a filter on the server audit. This can be useful
    when your audit specification captures activity against an entire class of object,
    but you are only interested in auditing a subset. For example, you may configure
    a server audit specification to log any member changes to server roles; however,
    you are only actually interested in members of the sysadmin server role being
    modified. In this scenario, you can filter on the `sysadmin` role.


    You can create a server audit through the GUI in SQL Server Management Studio
    by drilling through Security in Object Explorer and choosing New Audit from the
    Audits node. Figure [10-6](#333037_2_En_10_Chapter.xhtml#Fig6) illustrates the
    Create Audit dialog box.


    ![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig6_HTML.jpg](images/333037_2_En_10_Chapter/333037_2_En_10_Fig6_HTML.jpg)


    Figure 10-6


    The General tab


    You can see that we have decided to save our audit to a flat file, as opposed
    to a Windows log. Therefore, we need to specify the file-related parameters. We
    set our file to rollover and enforce the maximum size for any one file to be 512MB.
    We leave the default value of 1 second (1000 milliseconds) as a maximum duration
    before audit entries are forced to be written to the log and name the audit `Audit-ProSQLAdmin`
    .


    On the Filter tab of the Create Audit dialog box, you should specify that we wish
    to filter on the `object_name` and only audit changes to the `sysadmin` role.


    Alternatively, we can use T-SQL to perform the same action. The script in Listing
    [10-19](#333037_2_En_10_Chapter.xhtml#PC19) creates the same server audit.


    ```

    USE Master

    GO

    CREATE SERVER AUDIT [Audit-ProSQLAdmin]

    TO FILE

    (        FILEPATH = N''c:\audit''

    ,MAXSIZE = 512 MB

    ,MAX_ROLLOVER_FILES = 2147483647

    ,RESERVE_DISK_SPACE = OFF

    )

    WITH

    (        QUEUE_DELAY = 1000

    ,ON_FAILURE = CONTINUE

    )

    WHERE object_name = ''sysadmin'' ;

    Listing 10-19

    Creating a Server Audit

    ```


    ### Creating a Server Audit Specification


    To create the server audit specification through SSMS, we can drill through Security
    in Object Explorer and choose New Server Audit Specification from the Server Audit
    Specifications context menu. This will cause the Create Server Audit Specification
    dialog box to be displayed, as illustrated in Figure [10-7](#333037_2_En_10_Chapter.xhtml#Fig7).


    ![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig7_HTML.jpg](images/333037_2_En_10_Chapter/333037_2_En_10_Fig7_HTML.jpg)


    Figure 10-7


    Server Audit Specification dialog box


    You can see that we have selected the `SERVER_ROLE_MEMBER_CHANGE_GROUP` as the
    audit action type. This audits any additions or removals of the membership of
    server roles. Combined with the filter that we have put on the Server Audit object,
    however, the new result is that only changes to the `sysadmin` server role will
    be logged. We also selected the `Audit-ProSQLAdmin` audit from the Audit drop-down
    box to tie the objects together.


    Alternatively, we can create the same server audit specification through T-SQL
    by running the command in Listing [10-20](#333037_2_En_10_Chapter.xhtml#PC20).
    In this command, we are using the `FOR SERVER AUDIT` clause to link the server
    audit specification to the `Audit-ProSQLAdmin` server audit, and the `ADD` clause
    to specify the audit action type to capture.


    ```

    CREATE SERVER AUDIT SPECIFICATION [ServerAuditSpecification-ProSQLAdmin]

    FOR SERVER AUDIT [Audit-ProSQLAdmin]

    ADD (SERVER_ROLE_MEMBER_CHANGE_GROUP) ;

    Listing 10-20

    Creating the Server Audit Specification

    ```'
