  trans: '

    # 数据库备份


    ### 完全、差异和事务日志备份


    为了克服刚刚描述的问题，您可以在策略中添加差异备份。由于差异备份是累积性的，这与日志备份的增量方式相反，如果您在每天晚上 01:00 进行一次差异备份，那么您只需要恢复
    43 个备份即可将数据库恢复到故障发生前的状态。此恢复序列包括完全备份、在星期五早上 01:00 进行的差异备份，然后是从 01:30 到 23:00 按顺序恢复的事务日志。


    ### 文件组备份


    对于非常庞大的数据库，可能找不到足够大的维护窗口来执行整个数据库的完全备份。在这种情况下，您可以将数据分散到多个文件组中，并在交替的晚上备份一半的文件组。当您需要进行恢复时，只要拥有从文件组备份时间点到日志末尾的完整日志链，您就可以仅恢复包含损坏数据的文件组。


    ### 提示


    虽然可以备份单个文件以及整个文件组，但我觉得这样帮助不大，因为表是分散在文件组内的所有文件中的。因此，如果一个表损坏了，您需要恢复文件组内的所有文件；或者，如果只有少数几个页面损坏，则可以只恢复这些页面。


    ### 部分备份


    部分备份涉及备份所有读/写文件组，但不备份任何只读文件组。如果数据库中有大量存档数据，这会非常有用。T-SQL 中的`BACKUP DATABASE`命令也支持`READ_WRITE_FILEGROUP`选项。这意味着您可以轻松地对数据库执行部分备份，而不必列出所有读/写文件组——如果文件组很多，手动列出当然容易出错。


    数据库可以通过`SSMS`或 T-SQL 进行备份。我们将在以下章节中探讨这些技术。通常，定期备份是通过`SQL Server Agent`计划运行的，或者被纳入维护计划中。这些主题在第
    22 章中讨论。


    ### 在 SQL Server Management Studio 中备份


    您可以通过在数据库的上下文菜单中选择`任务 ➤ 备份`来备份数据库；这将显示“备份数据库”对话框的`常规`页面，如图 12-3 所示。


    ![../images/333037_2_En_12_Chapter/333037_2_En_12_Fig3_HTML.jpg](img/333037_2_En_12_Fig3_HTML.jpg)


    图 12-3：`常规`页面


    在`数据库`下拉列表中，选择您希望备份的数据库，在`备份类型`下拉菜单中，选择执行完全备份、差异备份或事务日志备份。`仅复制备份`复选框允许您执行一个不影响恢复序列的备份。因此，如果您进行一次仅复制完全备份，它不会影响差异基准。这意味着`DIFF`页面不会被重置。进行一次仅复制日志备份不会影响日志归档点，因此日志不会被截断。进行仅复制日志备份在某些在线恢复场景中可能很有用。无法进行仅复制差异备份。


    如果您在`备份组件`部分选择了完全或差异备份，请选择是备份整个数据库还是特定的文件和文件组。选择`文件和文件组`单选按钮将显示“选择文件和文件组”对话框，如图
    12-4 所示。在这里，您可以选择单个文件或整个文件组进行备份。


    ![../images/333037_2_En_12_Chapter/333037_2_En_12_Fig4_HTML.jpg](img/333037_2_En_12_Fig4_HTML.jpg)


    图 12-4：`选择文件和文件组`对话框


    在屏幕的`备份到`部分，您可以从下拉列表中选择`磁带`、`磁盘`或`URL`，然后使用`添加`和`删除`按钮来指定构成媒体集定义的备份设备。最多可以指定 64
    个备份设备。备份设备可以包含多个备份（备份集），当您单击`内容`按钮时，将显示备份设备中包含的每个备份集的详细信息。


    在`媒体选项`页面上，您可以指定是要使用现有媒体集还是新建一个。如果选择使用现有媒体集，则指定是要覆盖媒体集的内容还是向媒体集追加新的备份集。如果选择新建媒体集，则可以指定媒体集的名称，以及可选的描述。如果使用现有媒体集，您可以验证媒体集和备份集的过期日期和时间。这些检查可能会导致备份集被追加到现有备份设备，而不是覆盖备份集。


    在`可靠性`部分，指定备份完成后是否应进行验证。这通常是个好主意，特别是如果您备份到`URL`，因为通过网络的备份容易损坏。选择`写入媒体前执行校验和`选项会在每个数据库页面写入备份设备之前验证其页面校验和。这会导致备份操作使用额外的资源，但如果您没有像执行备份那样频繁地运行`DBCC
    CHECKDB`，那么此选项可以提前警告任何数据库损坏。（更多详情请参见第 9 章。）`遇到错误时继续`选项使得即使在页面验证过程中发现错误的校验和，备份也会继续进行。


    在`备份选项`页面上，您可以设置备份集的过期日期，以及选择是否要压缩或加密备份集。对于压缩，您可以选择使用实例默认设置，或者通过专门选择压缩或不压缩来覆盖此设置。


    如果选择加密备份，则需要选择一个预先存在的证书。（您可以在第 11 章中找到有关如何创建证书的详细信息。）然后，您需要选择用于加密备份的算法。`SQL Server
    2019`中的可用算法是`AES 128`、`AES 192`、`AES 256`或`3DES (Triple_DES_3Key)`。您通常应选择`AES`算法，因为对`3DES`的支持将在未来版本的`SQL
    Server`中移除。

    '
- fmt: '### Backing Up via T-SQL


    When you back up a database or log via T-SQL, you can specify many arguments.
    These can be broken down into the following categories:


    #### Miscellaneous Options


    | Argument | Description |

    | --- | --- |

    | `BUFFERCOUNT` | The total number of IO buffers used for the backup operation.
    |

    | `MAXTRANSFERSIZE` | The largest possible unit of transfer between SQL Server
    and the backup media, specified in bytes. |

    | `STATS` | Specifies how often progress messages should be displayed. The default
    is to display a progress message in 10% increments. |


    #### Log-Specific Options


    | Argument | Description |

    | --- | --- |

    | `NORECOVERY/STANDBY` | `NORECOVERY` causes the database to be left in a restoring
    state when the backup completes, making it inaccessible to users. `STANDBY` leaves
    the database in a read-only state when the backup completes. `STANDBY` requires
    that you specify the path and file name of the transaction undo file, so it should
    be used with the format `STANDBY = transaction_undo_file`. If neither option is
    specified, then the database remains online when the backup completes. |

    | `NO_TRUNCATE` | Specifies that the log backup should be attempted, even if the
    database is not in a healthy state. It also does not attempt to truncate an inactive
    portion of the log. Taking a tail-log backup involves backing up the log with
    `NORECOVERY` and `NO_TRUNCATE` specified. |


    #### Error Management Options


    | Argument | Description |

    | --- | --- |

    | `CHECKSUM/NO_CHECKSUM` | Specifies if the page checksum of each page should
    be validated before the page is written to the media set. |

    | `CONTINUE_AFTER_ERROR/STOP_ON_ERROR` | `STOP_ON_ERROR` is the default behavior
    and causes the backup to fail if a bad checksum is discovered when verifying the
    page checksum. `CONTINUE_AFTER_ERROR` allows the backup to continue if a bad checksum
    is discovered. |


    #### Media Set Options


    | Argument | Description |

    | --- | --- |

    | `INIT/NOINIT` | `INIT` attempts to overwrite the existing backup sets in the
    media set but leaves the media header intact. It first checks the name and expiry
    date of the backup set, unless `SKIP` is specified. `NOINIT` appends the backup
    set to the media set, which is the default behavior. |

    | `SKIP/NOSKIP` | `SKIP` causes the `INIT` checks of backup set name and expiration
    date to be skipped. `NOSKIP` enforces them, which is the default behavior. |

    | `FORMAT/NOFORMAT` | `FORMAT` causes the media header to be overwritten, leaving
    any backup sets within the media set unusable. This essentially creates a new
    media set. The backup set names and expiry dates are not checked. `NOFORMAT` preserves
    the existing media header, which is the default behavior. |

    | `MEDIANAME` | Specifies the name of the media set. |

    | `MEDIADESCRIPTION` | Adds a description of the media set. |

    | `BLOCKSIZE` | Specifies the block size in bytes that will be used for the backup.
    The `BLOCKSIZE` defaults to 512 for disk and URL and defaults to 65,536 for tape.
    |


    #### Backup Set Options


    | Argument | Description |

    | --- | --- |

    | `COPY_ONLY` | Specifies that a `copy_only` backup of the database or log should
    be taken. This option is ignored if you perform a differential backup. |

    | `COMPRESSION/NO COMPRESSION` | By default, SQL Server decides if the backup
    should be compressed based on the instance-level setting. (These can be viewed
    in `sys.configurations`.) You can override this setting, however, by specifying
    `COMPRESSION` or `NO COMPRESSION`, as appropriate. Backup compression is only
    available in Enterprise, Business Intelligence, and Standard Editions of SQL Server.
    |

    | `NAME` | Specifies a name for the backup set. |

    | `DESCRIPTION` | Adds a description to the backup set. |

    | `EXPIRYDATE/RETAINEDDAYS` | Use `EXPIRYDATE = datetime` to specify a precise
    date and time that the backup set expires. After this date, the backup set can
    be overwritten. Specify `RETAINDAYS = int` to specify a number of days before
    the backup set expires. |


    #### WITH Options


    | Argument | Description |

    | --- | --- |

    | `CREDENTIAL` | Use when backing up to a Windows Azure Blob. |

    | `DIFFERENTIAL` | Specifies that a differential backup should be taken. If this
    option is omitted, then a full backup is taken. |

    | `ENCRYPTION` | Specifies the algorithm to use for the encryption of the backup.
    If the backup is not to be encrypted, then `NO_ENCRYPTION` can be specified, which
    is the default option. Backup encryption is only available in Enterprise, Business
    Intelligence, and Standard Editions of SQL Server. |

    | `encryptor_name` | The name of the encryptor in the format `SERVER CERTIFICATE
    = encryptor name` or `SERVER ASYMMETRIC KEY = encryptor name`. |


    #### Backup Options


    | Argument | Description |

    | --- | --- |

    | `DATABASE/LOG` | Specify `DATABASE` to perform a full or differential backup.
    Specify `LOG` to perform a transaction log backup. |

    | `database_name` | The name of the database to perform the backup operation against.
    Can also be a variable containing the name of the database. |

    | `file_or_filegroup` | A comma-separated list of files or filegroups to back
    up, in the format `FILE = logical file name` or `FILEGROUP = Logical filegroup
    name`. |

    | `READ_WRITE_FILEGROUPS` | Performs a partial backup by backing up all read/write
    filegroups. Optionally, use comma-separated `FILEGROUP = syntax after this clause`
    to add read-only filegroups. |

    | `TO` | A comma-separated list of backup devices to stripe the backup set over,
    with the syntax `DISK = physical device`, `TAPE = physical device`, or `URL =
    physical device`. |

    | `MIRROR TO` | A comma-separated list of backup devices to which to mirror the
    backup set. If the `MIRROR TO` clause is used, the number of backup devices specified
    must equal the number of backup devices specified in the `TO` clause. |


    *   Backup options (described in Table 12-1).

    *   `WITH` options (described in Table 12-2).

    *   Backup set options (described in Table 12-3).

    *   Media set options (described in Table 12-4).

    *   Error management options (described in Table 12-5).

    *   Tape options have been deprecated for many versions and should not be used.
    Therefore, details of tape options are omitted from this chapter.

    *   Log-specific options (described in Table 12-6).

    *   Miscellaneous options (described in Table 12-7).


    To perform the full database backup of the `Chapter12` database, which we demonstrate
    through the GUI, we can use the command in Listing 12-4. Before running this script,
    modify the path of the backup device to meet your system’s configuration.


    ```sql

    BACKUP DATABASE Chapter12

    TO  DISK = ''H:\MSSQL\Backup\Chapter12.bak''

    WITH  RETAINDAYS = 90

    , FORMAT

    , INIT

    , MEDIANAME = ''Chapter12''

    , NAME = ''Chapter12-Full Database Backup''

    , COMPRESSION ;

    GO

    ```

    Listing 12-4: Performing a Full Backup


    If we want to perform a differential backup of the `Chapter12` database and append
    the backup to the same media set, we can add the `WITH DIFFERENTIAL` option to
    our statement, as demonstrated in Listing 12-5. Before running this script, modify
    the path of the backup device to meet your system’s configuration.


    ```sql

    BACKUP DATABASE Chapter12

    TO  DISK = ''H:\MSSQL\Backup\Chapter12.bak''

    WITH  DIFFERENTIAL

    , RETAINDAYS = 90

    , NOINIT

    , MEDIANAME = ''Chapter12''

    , NAME = ''Chapter12-Diff Database Backup''

    , COMPRESSION ;

    GO

    ```

    Listing 12-5: Performing a Differential Backup'
