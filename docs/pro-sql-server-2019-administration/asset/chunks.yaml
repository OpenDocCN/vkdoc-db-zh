  trans: '### 注意


    SQL Server 中的查询要么正在运行，要么在处理器上等待轮次（可运行），要么在等待其他资源（已暂停）。如果它在等待其他资源，SQL Server 会记录其等待的原因以及此等待的持续时间。


    `资源`等待发生在线程需要访问某个对象，但该对象已被使用，因此线程必须等待时。这可能包括线程等待对对象加锁，或等待磁盘资源响应。`队列`等待发生在线程空闲并等待分配任务时。这不一定表示性能瓶颈，因为它通常是后台任务，如死锁监视器或惰性写入器，等待直到被需要。`外部`等待发生在线程等待外部资源时，例如链接服务器。这里隐藏的陷阱是，外部等待并不总是意味着线程真正在等待。它可能正在执行
    SQL Server 外部的操作，例如运行外部代码的扩展存储过程。


    任何已发出的任务都处于三种状态之一：正在运行、可运行或已暂停。如果任务处于正在运行状态，则它正在处理器上执行。当任务处于可运行状态时，它位于处理器队列中，等待轮到其运行。这被称为
    `信号等待`。当任务暂停时，意味着该任务因信号等待以外的任何原因而等待。换句话说，它正在经历资源等待、队列等待或外部等待。每个查询在执行过程中都可能在这三种状态之间交替。


    `sys.dm_os_wait_stats` 返回自实例启动或动态管理视图 (DMV) 所暴露的统计信息被重置以来，每种等待类型的累计等待详细信息。你可以通过运行清单
    17-16 中的命令来重置统计信息。这一点很重要，因为它提供了关于瓶颈来源的整体视图。


    ```

    DBCC SQLPERF (''sys.dm_os_wait_stats'', CLEAR) ;

    ```

    清单 17-16

    重置等待统计信息


    `sys.dm_os_wait_stats` 返回的列详见表 17-9。


    表 17-9

    `sys.dm_os_wait_stats` 的列


    | 列 | 描述 |

    | --- | --- |

    | `wait_type` | 已发生的等待类型的名称。 |

    | `waiting_tasks_count` | 此等待类型上已发生的任务数。 |

    | `wait_time_ms` | 针对此等待类型的所有等待的累计时间，以毫秒显示。这包括信号等待时间。 |

    | `max_wait_time_ms` | 针对此等待类型的单次等待的最长时间。 |

    | `signal_wait_time_ms` | 针对此等待类型的所有信号等待的累计时间。 |


    要查找导致最高累计等待时间的等待类型，请运行清单 17-17 中的查询。此查询在结果集中添加了一个计算列，该列从总等待时间中扣除信号等待时间，以避免 CPU
    压力扭曲结果。


    ```

    SELECT *

    , wait_time_ms - signal_wait_time_ms ResourceWaits

    FROM sys.dm_os_wait_stats

    ORDER BY wait_time_ms - signal_wait_time_ms DESC ;

    ```

    清单 17-17

    查找最高等待


    当然，信号等待时间本身也可能是一个值得关注的问题，可能将处理器识别为瓶颈，你应该对其进行分析。因此，请使用清单 17-18 中的查询来计算因任务等待处理器轮次而导致的等待占总等待的百分比。该值按等待类型显示，后面有一行显示所有等待类型的总体百分比。


    ```

    SELECT ISNULL(wait_type, ''Overall Percentage:'') wait_type

    ,PercentageSignalWait

    FROM (

    SELECT wait_type

    ,CAST(100\. * SUM(signal_wait_time_ms)

    / SUM(wait_time_ms) AS NUMERIC(20,2)) PercentageSignalWait

    FROM sys.dm_os_wait_stats

    WHERE wait_time_ms > 0

    GROUP BY wait_type WITH ROLLUP

    ) a

    ORDER BY PercentageSignalWait DESC ;

    ```

    清单 17-18

    计算信号等待


    要查找特定时间段内的最高等待，你需要对数据进行两次采样，然后用第一次采样减去第二次采样。清单 17-19 中的脚本以 10 分钟的间隔对数据进行两次采样，然后显示该时间段内前五个最高等待的详细信息。


    ```

    DECLARE @Waits1 TABLE

    (

    wait_type NVARCHAR(128),

    wait_time_ms BIGINT

    ) ;

    DECLARE @Waits2 TABLE

    (

    wait_type NVARCHAR(128),

    wait_time_ms BIGINT

    ) ;

    INSERT INTO @waits1

    SELECT wait_type

    ,wait_time_ms

    FROM sys.dm_os_wait_stats ;

    WAITFOR DELAY ''00:10:00'' ;

    INSERT INTO @Waits2

    SELECT wait_type

    ,wait_time_ms

    FROM sys.dm_os_wait_stats ;

    SELECT TOP 5

    w2.wait_type

    ,w2.wait_time_ms - w1.wait_time_ms

    FROM @Waits1 w1

    INNER JOIN @Waits2 w2

    ON w1.wait_type = w2.wait_type

    ORDER BY w2.wait_time_ms - w1.wait_time_ms DESC ;

    ```

    清单 17-19

    计算特定时间段内的最高等待


    ## 数据库元数据


    在 SQL Server 的早期版本中，如果 DBA 需要发现数据库中有关特定页面的信息，他除了使用众所周知但未公开的 `DBCC PAGE` 命令外别无选择。SQL
    Server 通过添加一个名为 `sys.dm_db_page_info` 的新动态管理视图来解决这个问题。该视图有完整的文档记录并受 Microsoft
    支持，它能够以表值格式返回页面头信息。该函数接受的参数详见表 17-10。


    表 17-10

    `sys.dm_db_page_info` 接受的参数


    | 参数 | 描述 |

    | --- | --- |

    | Database_id | 你希望返回详细信息的数据库的 `database_id`。 |

    | File_id | 你希望返回详细信息的文件的 `file_id`。 |

    | Page_id | 你感兴趣的页面的 page_id。 |

    | Mode | 模式可设置为 `LIMITED` 或 `DETAILED`。模式之间的唯一区别是，使用 LIMITED 时，描述列不会被填充。这可以提高针对大表的性能。
    |


    为了填充这些参数，添加了一个额外的系统函数，名为 `sys.fn_PageResCracker`。该函数可以 cross apply 到表，将 `%%physloc%%`
    作为参数传递。或者，如果 cross apply 到 `sys.dm_exec_requests` DMV 或 `sys.sysprocesses`（一个已弃用的系统视图），则添加了一个名为
    `page_resource` 的额外列，该列可以作为参数传递给该函数。如果你正在诊断页面等待问题，这很有帮助。当传入一个页面资源/物理位置对象时，该函数将在结果集中为每一行返回
    `database_id`、`file_id` 和 `page_id`。


    ### 注意


    当与 `%%physloc%%` 而不是 `page_resource` 对象一起使用时，`sys.fn_PageResCracker` 函数返回的是 `slot_id`，而不是
    `database_id`。因此，当与 `%%physloc%%` 一起使用时，应使用 `DB_ID()` 函数来获取 database_id，并且应丢弃该函数返回的
    `database_id` 列。


    表 17-11 详细说明了 `sys.dm_db_page_info` DMF 返回的列。


    表 17-11

    `sys.dm_db_page_info` 返回的列'
