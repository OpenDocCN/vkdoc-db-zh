  trans: '

    #### 仲裁


    为了实现自动故障转移，集群服务需要知道节点是否宕机。为此，必须形成一个**仲裁**。仲裁的定义是“为开展业务所需的最少成员数量”。在高可用性语境下，这意味着集群中的每个节点，以及可选的一个见证设备（可以是一个集群磁盘或集群外部的文件共享），都获得一票投票权。如果超过半数的投票成员无法与某个节点通信，则集群服务便知该节点已宕机，其上任何具备集群感知能力的应用程序将故障转移至另一节点。要求超过半数的投票成员无法与该节点通信，是为了避免一种称为
    `脑裂` 的情形。


    要解释脑裂场景，可以想象数据中心 1 有三个节点，数据中心 2 也有三个节点。现在假设两个数据中心之间的网络连接中断，但所有六个节点仍保持在线。数据中心 1
    的三个节点认为数据中心 2 的所有节点均不可用。反之，数据中心 2 的节点也认为数据中心 1 的节点不可用。这导致集群的两侧（称为分区）都认为自己应该取得控制权。这对于成功连接到任一分区的应用程序可能产生不可预测且不良的后果。公式
    `仲裁 = (投票成员数 / 2) + 1` 可防止此场景发生。


    ### 提示


    如果您的集群丢失了仲裁，可以通过使用 `/fq` 开关启动集群服务来强制一个分区联机。如果您使用的是 Windows Server 2012 R2 或更高版本，则强制联机的分区被视为
    `权威分区`。这意味着当连接恢复时，其他分区可以自动重新加入集群。


    有多种仲裁模型可用，最合适的选择取决于您的环境。表 13-4 列出了您可以使用的模型，并详细说明了最适用的方式。


    表 13-4


    仲裁模型


    | 仲裁模型 | 适用情况 |

    | --- | --- |

    | 节点多数 | 当集群中有奇数个节点时 |

    | 节点+磁盘见证多数 | 当集群中有偶数个节点时 |

    | 节点+文件共享见证多数 | 当节点分布在多个站点，或当您有偶数个节点且需要避免共享磁盘时∗ |


    **由于虚拟化而需要避免共享磁盘的原因将在本章后面讨论。*


    虽然默认选项是一节点一票，但可以通过将 `NodeWeight` 属性更改为零来手动移除一个节点的投票权。这在您拥有 `多子网集群`（节点分布在多个站点的集群）时很有用。在此场景中，建议您在第三个站点使用文件共享见证。这有助于避免因数据中心之间网络故障而导致的集群中断。然而，如果您的仲裁节点数为奇数，添加文件共享见证将导致投票数为偶数，这是危险的。从辅助数据中心的一个节点移除投票可以消除此问题。


    ### 注意


    文件共享见证不存储仲裁数据库的完整副本。这意味着带有文件共享见证的两节点集群容易受到一种称为 `时间点分区` 的场景影响。在此场景中，如果您正在为第二个节点修补或更改集群服务时有一个节点发生故障，则没有最新的仲裁数据库副本。这将使您处于需要销毁并重建集群的境地。


    现代版本的 Windows Server 还支持动态仲裁和针对 50%节点分裂的平局决胜器概念。启用动态仲裁时，集群服务会根据集群中的节点数量自动决定是否给予仲裁见证投票权。如果您有偶数个节点，则分配投票权；如果是奇数个节点，则不分配。针对
    50%节点分裂的平局决胜器扩展了这一概念。如果您有偶数个节点和一个见证，而见证发生故障，则集群服务会自动从集群中一个随机节点移除一票。这保持了仲裁中投票数为奇数，并降低了因见证故障导致集群脱机的风险。


    ### 提示


    如果您的集群运行在 Windows Server 2016 或更高版本的数据中心版上，则支持存储空间直通。这允许使用本地附加的物理存储，通过软件定义的存储层来实现高可用性。关于存储空间直通的完整讨论超出了本书范围，但更多细节可以在
    [`https://docs.microsoft.com/en-us/windows-server/storage/storage-spaces/storage-spaces-direct-overview`](https://docs.microsoft.com/en-us/windows-server/storage/storage-spaces/storage-spaces-direct-overview)
    找到。


    ### AlwaysOn 可用性组


    AlwaysOn 可用性组 (`AOAG`) 取代了数据库镜像，本质上是数据库镜像和集群技术的融合。SQL Server 在集群的每个节点上作为独立实例安装（与
    AlwaysOn 故障转移集群实例相对）。然后，一个名为可用性组侦听器的集群感知应用程序安装在集群上；它用于将流量定向到正确的节点。然而，`AOAG` 不依赖共享磁盘，而是压缩日志流并将其发送到其他节点，方式与数据库镜像类似。


    在您拥有小型数据库且写入配置文件较低的情况下，`AOAG` 是最合适的高可用技术。这是因为，当同步使用时，它要求在所有同步副本上提交数据后，才会在主数据库上提交。您最多可以拥有八个副本，包括三个同步副本。在虚拟化环境中实现高可用性时，`AOAG`
    也可能是最合适的技术。这是因为集群所需的共享磁盘可能与虚拟资产的某些功能不兼容。例如，当虚拟机使用通过光纤通道呈现的共享磁盘时，VMware 不支持使用 vMotion（用于在物理服务器之间手动移动虚拟机）和分布式资源调度程序（DRS，用于根据资源利用率在物理服务器之间自动移动虚拟机）。

    '
- fmt: '### Tip


    The limitations surrounding shared disks with VMware features can be worked around
    by presenting the storage directly to the guest OS over an iSCSI connection at
    the expense of performance degradation.


    `AOAG` is the most appropriate technology for `DR` when you have a proactive failover
    requirement but when you do not need to implement a load delay. `AOAG` may also
    be suitable for disaster recovery in scenarios where you wish to utilize your
    `DR` server for offloading reporting. This allows the redundant servers to be
    utilized. When used for disaster recovery, `AOAG` works in an asynchronous mode.
    This means that it is possible to lose data in the event of a failover. The `RPO`
    is nondeterministic and is based on the time of the last uncommitted transaction.


    In the old days, of database mirroring, the secondary database was always offline.
    This means that you cannot use the secondary database to offload any reporting
    or other read-only activities. It is possible to work around this by creating
    a database snapshot against the secondary database and pointing read-only activity
    to the snapshot. This can still be complicated, however, because you must configure
    your application to issue read-only statements against a different network name
    and IP address. `Availability Groups`, on the other hand, allow you to configure
    one or more replicas as readable. The only limitation is that readable replicas
    and automatic failover cannot be configured on the same secondaries. The norm,
    however, would be to configure readable secondary replicas in asynchronous commit
    mode so that they do not impair performance.


    To further simplify this, the `Availability Group` Replica checks for the `read-only`
    or `read-intent` properties in an application connection string and points the
    application to the appropriate node. This means that you can easily scale reporting
    and database maintenance routines horizontally with very little development effort
    and with the applications being able to use a single connection string.


    Because `AOAG` allows you to combine synchronous replicas (with or without automatic
    failover), asynchronous replicas, and replicas for read-only access, it allows
    you to satisfy high availability, disaster recovery, and reporting scale-out requirements
    using a single technology. If your sole requirement is read scaling, as opposed
    to `HA` or `DR`, then it is actually possible to configure `Availability Groups`
    with no cluster, from `SQL Server 2017` onward. In this case, there is no cluster
    service, and hence no automatic redirection. Replicas within the `Availability
    Group` use certificate when communicating with each other. This is also true if
    you configure `Availability Groups` without `AD`, in a workgroup or cross-domain.


    When you are using `AOAG`, failover does not occur at the database level, nor
    at the instance level. Instead, failover occurs at the level of the availability
    group. The availability group is a concept that allows you to group related databases
    together so that they can fail over as an atomic unit. This is particularly useful
    in consolidated environments, because it allows you to group together the databases
    that map to a single application. You can then fail over this application to another
    replica for the purposes of `DR` testing, among other reasons, without having
    an impact on the other data-tier applications that are hosted on the instance.


    No hard limits are imposed for the number of availability groups you can configure
    on an instance, nor are there any hard limits for the number of databases on an
    instance that can take part in `AOAG`. Microsoft, however, has tested up to, and
    officially recommends, a maximum of 100 databases and 10 availability groups per
    instance. The main limiting factor in scaling the number of databases is that
    `AOAG` uses a database mirroring endpoint and there can only be one per instance.
    This means that the log stream for all data modifications is sent over the same
    endpoint.


    Figure [13-5](#333037_2_En_13_Chapter.xhtml#Fig5) depicts how you can map data-tier
    applications to availability groups for independent failover. In this example,
    a single instance hosts two data-tier applications. Each application has been
    added to a separate availability group. The first availability group has failed
    over to `Node2`. Therefore, the availability group listeners point traffic for
    Application1 to `Node2` and traffic for Application2 to `Node1`. Because each
    availability group has its own network name and IP address, and because these
    resources fail over with the `AOAG`, the application is able to seamlessly reconnect
    to the databases after failover.


    ![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig5_HTML.png](images/333037_2_En_13_Chapter/333037_2_En_13_Fig5_HTML.png)


    Figure 13-5


    Availability group failover


    The diagram in Figure [13-6](#333037_2_En_13_Chapter.xhtml#Fig6) depicts an AlwaysOn
    Availability Group topology. In this example, there are four nodes in the cluster
    and a disk witness. `Node1` is hosting the primary replicas of the databases,
    `Node2` is being used for automatic failover, `Node3` is being used to offload
    reporting, and `Node4` is being used for `DR`. Because the cluster is stretched
    across two data centers, multi-subnet clustering has been implemented. Because
    there is no shared storage, however, there is no need for `SAN` replication between
    the sites.


    ![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig6_HTML.png](images/333037_2_En_13_Chapter/333037_2_En_13_Fig6_HTML.png)


    Figure 13-6


    AlwaysOn Availability Group topology


    ### Note


    AlwaysOn Availability Groups are discussed in more detail in Chapters [14](#333037_2_En_14_Chapter.xhtml)
    and [16](#333037_2_En_16_Chapter.xhtml).'
