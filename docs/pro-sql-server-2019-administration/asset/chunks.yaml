- fmt: '### Using sp_configure


    You can change many of the settings that you can configure at the instance level
    using the system stored procedure `sp_configure`. You can use the `sp_configure`
    procedure to both view and change instance-level settings. This procedure will
    be used in many examples throughout this book, so it is important that you understand
    how it works. If a procedure is the first statement in the batch, you can run
    it without the `EXEC` keyword, but you must use the `EXEC` keyword if there are
    any preceding statements. If the procedure is run with no parameters, then it
    will return a five-column result set. The meaning of these columns is detailed
    in Table 5-1.


    Table 5-1


    Result Set Returned by sp_configure


    | Column | Description |

    | --- | --- |

    | `Name` | The name of the instance-level setting. |

    | `Minimum` | The minimum value that is acceptable for this setting. |

    | `Maximum` | The maximum value that is accepted for this setting. |

    | `Config_value` | The value that has been configured for this value. If this
    value differs from the value in the `Run_value` column, then the instance will
    need to be either restarted or reconfigured for this configuration to take effect.
    |

    | `Run_value` | The value that is currently being used for this setting. |


    If you wish to use `sp_configure` to change the value of a setting, as opposed
    to just viewing it, then you must run the procedure with two parameters being
    passed in. The first of these parameters is called `configname` and is defined
    with a `VARCHAR(35)` data type. This parameter is used to pass the name of the
    setting that you wish to change. The second parameter is called `configvalue`
    and is defined as an integer. This parameter is used to pass the new value for
    the setting. After you have changed an instance-level setting using `sp_configure`,
    it will not immediately take effect. To activate the setting, you will need to
    either restart the Database Engine Service or reconfigure the instance.


    There are two options for reconfiguring the instance. The first is a command called
    `RECONFIGURE`. The second is a command called `RECONFIGURE WITH OVERRIDE`. The
    `RECONFIGURE` command will change the running value of the setting as long as
    the newly configured value is regarded as “sensible” by SQL Server. For example,
    `RECONFIGURE` will not allow you to disable contained databases when they exist
    on the instance. If you use the `RECONFIGURE WITH OVERRIDE` command , however,
    this action would be allowed, even though your contained databases will no longer
    be accessible. Even with this command, however, SQL Server will still run checks
    to ensure that the value you have entered is between the `Min` and `Max` values
    for the setting. It will also not allow you to perform any operations that will
    cause serious errors. For example, it will not allow you to configure the Min
    Server Memory (MB) setting to be higher than the Max Server Memory (MB) setting,
    since this would cause a fatal error in the Database Engine.


    The first time you run the `sp_configure` stored procedure with no parameters
    in SQL Server 2019, it will return 18 rows. These rows contain the basic configuration
    options for the instance. One of the options is called Show Advanced Options.
    If you turn on this option and then reconfigure the instance, as demonstrated
    in Listing 5-1, then an additional 52 advanced settings will be displayed when
    you run the procedure. If you try to change the value of one of the advanced options
    before turning on the Show Advanced Options setting, then the command will fail.


    ```

    EXEC sp_configure ''show advanced options'', 1

    RECONFIGURE

    Listing 5-1

    Showing Advanced Options

    ```


    As an alternative to viewing these settings with sp_configure, you can also retrieve
    the same information by querying `sys.configurations`. If you use `sys.configurations`
    to return the information, then two additional columns will be returned. One of
    these columns is called `is_dynamic` , and it designates if the option can be
    configured with the `RECONFIGURE` command (1) or if the instance needs to be restarted
    (0). The other column is called `is_Advanced` , and it indicates if the setting
    is configurable without Show Advanced Options being turned on.


    ### Processor and Memory Configuration


    When configuring your instance, one of your first considerations should be the
    configuration of processor and memory resources. There are two main considerations
    that you should give to the processor. One is processor affinity and the other
    is MAXDOP (maximum degree of parallelism).


    #### Processor Affinity


    By default, your instance will be able to use all of the processor cores within
    your server. (A physical processor, also known as a socket, or CPU, consists of
    multiple cores, which are individual processors). If you use processor affinity,
    however, specific processor cores will be aligned with your instance, and these
    will be the only cores that the instance has access to. There are two main reasons
    for limiting your instance in this way. The first is when you have multiple instances
    running on the same server. With this configuration, you may find that the instances
    are competing for the same processor resources and therefore blocking each other.
    Processor affinity is controlled via a setting called `affinity mask`.


    Imagine you had a server with four physical processors, each of which had two
    cores. Assuming that hyper-threading is turned off for the purpose of this example,
    there would be a total of eight cores available to SQL Server. If you had four
    instances on the server, then to avoid the instances competing for resources,
    you could align cores 0 and 1 with instance 1, cores 2 and 3 with instance 2,
    cores 4 and 5 with instance 3, and cores 6 and 7 with instance 4. Of course, the
    disadvantage of this is CPU resources not being utilized, if an instance is idle.


    If you have other services running on the server, such as SQL Server Integration
    Services (SSIS), you may wish to leave a core available for Windows and other
    applications, which cannot be used by any of the instances. In this case, you
    may have identified that instance 4 uses less processor resources than the other
    instances. It may be an instance dedicated to ETL (extract, transform, and load),
    for example, and be used primarily for hosting the SSIS Catalog. In this case,
    you may align instance 4 with core 6 only. This would leave core 7 free for other
    purposes. This design is illustrated in Figure 5-1.


    ### Note


    SSIS is incorporated into the Database Engine. However, when SSIS packages run,
    they run in a separate DTSHost process and are, therefore, not aligned with the
    processor and memory configuration of the instance.


    ![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig1_HTML.jpg](images/333037_2_En_5_Chapter/333037_2_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Processor affinity diagram


    When using processor affinity, it is important for performance to align an instance
    with cores on the same NUMA (non-uniform memory access) node. This is because
    if a processor needs to remotely access the memory of a different NUMA node, it
    needs to go via an interconnect, which is a lot slower than accessing the local
    NUMA node. In the example shown in Figure 5-1, if we had aligned instance 1 with
    cores 0 and 7, then we would have breached the NUMA boundary and performance would
    have been impaired.'
  raw: '### Using sp_configure


    You can change many of the settings that you can configure at the instance level
    using the system stored procedure `sp_configure`. You can use the `sp_configure`
    procedure to both view and change instance-level settings. This procedure will
    be used in many examples throughout this book, so it is important that you understand
    how it works. If a procedure is the first statement in the batch, you can run
    it without the `EXEC` keyword, but you must use the `EXEC` keyword if there are
    any preceding statements. If the procedure is run with no parameters, then it
    will return a five-column result set. The meaning of these columns is detailed
    in Table [5-1](#333037_2_En_5_Chapter.xhtml#Tab1).


    Table 5-1


    Result Set Returned by sp_configure


    | Column | Description |

    | --- | --- |

    | `Name` | The name of the instance-level setting. |

    | `Minimum` | The minimum value that is acceptable for this setting. |

    | `Maximum` | The maximum value that is accepted for this setting. |

    | `Config_value` | The value that has been configured for this value. If this
    value differs from the value in the `Run_value` column, then the instance will
    need to be either restarted or reconfigured for this configuration to take effect.
    |

    | `Run_value` | The value that is currently being used for this setting. |


    If you wish to use `sp_configure` to change the value of a setting, as opposed
    to just viewing it, then you must run the procedure with two parameters being
    passed in. The first of these parameters is called `configname` and is defined
    with a `VARCHAR(35)` data type. This parameter is used to pass the name of the
    setting that you wish to change. The second parameter is called `configvalue`
    and is defined as an integer. This parameter is used to pass the new value for
    the setting. After you have changed an instance-level setting using `sp_configure`,
    it will not immediately take effect. To activate the setting, you will need to
    either restart the Database Engine Service or reconfigure the instance.


    There are two options for reconfiguring the instance. The first is a command called
    `RECONFIGURE`. The second is a command called `RECONFIGURE WITH OVERRIDE`. The
    `RECONFIGURE` command will change the running value of the setting as long as
    the newly configured value is regarded as “sensible” by SQL Server. For example,
    `RECONFIGURE` will not allow you to disable contained databases when they exist
    on the instance. If you use the `RECONFIGURE WITH OVERRIDE` command , however,
    this action would be allowed, even though your contained databases will no longer
    be accessible. Even with this command, however, SQL Server will still run checks
    to ensure that the value you have entered is between the `Min` and `Max` values
    for the setting. It will also not allow you to perform any operations that will
    cause serious errors. For example, it will not allow you to configure the Min
    Server Memory (MB) setting to be higher than the Max Server Memory (MB) setting,
    since this would cause a fatal error in the Database Engine.


    The first time you run the `sp_configure` stored procedure with no parameters
    in SQL Server 2019, it will return 18 rows. These rows contain the basic configuration
    options for the instance. One of the options is called Show Advanced Options.
    If you turn on this option and then reconfigure the instance, as demonstrated
    in Listing [5-1](#333037_2_En_5_Chapter.xhtml#PC1), then an additional 52 advanced
    settings will be displayed when you run the procedure. If you try to change the
    value of one of the advanced options before turning on the Show Advanced Options
    setting, then the command will fail.


    ```

    EXEC sp_configure ''show advanced options'', 1

    RECONFIGURE

    Listing 5-1

    Showing Advanced Options

    ```


    As an alternative to viewing these settings with sp_configure, you can also retrieve
    the same information by querying `sys.configurations`. If you use `sys.configurations`
    to return the information, then two additional columns will be returned. One of
    these columns is called `is_dynamic` , and it designates if the option can be
    configured with the `RECONFIGURE` command (1) or if the instance needs to be restarted
    (0). The other column is called `is_Advanced` , and it indicates if the setting
    is configurable without Show Advanced Options being turned on.


    ### Processor and Memory Configuration


    When configuring your instance, one of your first considerations should be the
    configuration of processor and memory resources. There are two main considerations
    that you should give to the processor. One is processor affinity and the other
    is MAXDOP (maximum degree of parallelism).


    #### Processor Affinity


    By default, your instance will be able to use all of the processor cores within
    your server. (A physical processor, also known as a socket, or CPU, consists of
    multiple cores, which are individual processors). If you use processor affinity,
    however, specific processor cores will be aligned with your instance, and these
    will be the only cores that the instance has access to. There are two main reasons
    for limiting your instance in this way. The first is when you have multiple instances
    running on the same server. With this configuration, you may find that the instances
    are competing for the same processor resources and therefore blocking each other.
    Processor affinity is controlled via a setting called *affinity mask* .


    Imagine you had a server with four physical processors, each of which had two
    cores. Assuming that hyper-threading is turned off for the purpose of this example,
    there would be a total of eight cores available to SQL Server. If you had four
    instances on the server, then to avoid the instances competing for resources,
    you could align cores 0 and 1 with instance 1, cores 2 and 3 with instance 2,
    cores 4 and 5 with instance 3, and cores 6 and 7 with instance 4\. Of course,
    the disadvantage of this is CPU resources not being utilized, if an instance is
    idle.


    If you have other services running on the server, such as SQL Server Integration
    Services (SSIS), you may wish to leave a core available for Windows and other
    applications, which cannot be used by any of the instances. In this case, you
    may have identified that instance 4 uses less processor resources than the other
    instances. It may be an instance dedicated to ETL (extract, transform, and load),
    for example, and be used primarily for hosting the SSIS Catalog. In this case,
    you may align instance 4 with core 6 only. This would leave core 7 free for other
    purposes. This design is illustrated in Figure [5-1](#333037_2_En_5_Chapter.xhtml#Fig1).


    ### Note


    SSIS is incorporated into the Database Engine. However, when SSIS packages run,
    they run in a separate DTSHost process and are, therefore, not aligned with the
    processor and memory configuration of the instance.


    ![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig1_HTML.jpg](images/333037_2_En_5_Chapter/333037_2_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Processor affinity diagram


    When using processor affinity, it is important for performance to align an instance
    with cores on the same NUMA (non-uniform memory access) node. This is because
    if a processor needs to remotely access the memory of a different NUMA node, it
    needs to go via an interconnect, which is a lot slower than accessing the local
    NUMA node. In the example shown in Figure [5-1](#333037_2_En_5_Chapter.xhtml#Fig1),
