    GO

    --Re-run $PARTITION to assess new spread of rows

    SELECT

    COUNT(*) ''Number of Rows''

    ,$PARTITION.PartFuncWeek(OrderDate) ''Partition''

    FROM dbo.ExistingOrders

    GROUP BY $PARTITION.PartFuncWeek(OrderDate) ;

    SELECT name, value FROM SYS.partition_functions PF

    INNER JOIN SYS.partition_range_values PFR ON PF.function_id = PFR.function_id

    WHERE name = ''PARTFUNCWEEK'' ;

    Listing 7-8

    Implementing a Sliding Window

    ```


    The results displayed in Figure [7-7](#333037_2_En_7_Chapter.xhtml#Fig7) show
    how the partitions have been realigned.


    ![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig7_HTML.jpg](images/333037_2_En_7_Chapter/333037_2_En_7_Fig7_HTML.jpg)


    Figure 7-7


    New partition alignment


    When you are using the `SWITCH` function , there are several limitations. First,
    all nonclustered indexes of the table must be aligned with the base table. Also,
    the empty table or partition that you move the data into must have the same indexing
    structure. It must also reside on the same filegroup as the partition that you
    are switching out. This is because the `SWITCH` function does not actually move
    any data. It is a metadata operation that changes the pointers of the pages that
    make up the partition.


    You can use `MERGE` and `SPLIT` with different filegroups, but there will be a
    performance impediment. Like `SWITCH`, `MERGE` and `SPLIT` can be performed as
    metadata operations if all partitions involved reside on the same filegroup. If
    they are on different filegroups, however, then physical data moves need to be
    performed by SQL Server, which can take substantially longer.


    ### Partition Elimination


    One of the key benefits of partitioning is that the Query Optimizer is able to
    access only the partitions required tosatisfy the results of a query, instead
    of the entire table. For partition elimination to be successful, the partitioning
    key must be included as a filter in the `WHERE` clause. We can witness this functionality
    by running the query in Listing [7-9](#333037_2_En_7_Chapter.xhtml#PC9) against
    our `ExistingOrders` table and choosing the option to include the actual execution
    plan.


    ```

    SELECT OrderNumber, OrderDate

    FROM dbo.ExistingOrders

    WHERE OrderDate BETWEEN ''2019-03-01'' AND ''2019-03-07'' ;

    Listing 7-9

    Query Using Partition Elimination

    ```


    If we now view the execution plan and examine the properties of the Index Scan
    operator through Management Studio, we see that only one partition has been accessed,
    as shown in Figure [7-8](#333037_2_En_7_Chapter.xhtml#Fig8).


    ![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig8_HTML.jpg](images/333037_2_En_7_Chapter/333037_2_En_7_Fig8_HTML.jpg)


    Figure 7-8


    Index Scan operator properties with partition elimination


    The partition elimination functionality can be a little fragile, however. For
    example, if you are manipulating the `OrderDate` column in any way, as opposed
    to just using it for evaluation, then partition elimination cannot occur. For
    example, if you cast the `OrderDate` column to the `DATETIME2` data type, as demonstrated
    in Listing [7-10](#333037_2_En_7_Chapter.xhtml#PC10), then all partitions would
    need to be accessed. This issue can also impact partitioned indexes.


    ```

    SELECT OrderNumber, OrderDate

    FROM dbo.ExistingOrders

    WHERE CAST(OrderDate AS DATETIME2) BETWEEN ''2019-03-01'' AND ''2019-03-31'' ;

    Listing 7-10

    Query Not Using Partition Elimination

    ```


    Figure [7-9](#333037_2_En_7_Chapter.xhtml#Fig9) illustrates the same properties
    of the Index Scan operator, viewed through Management Studio. Here you can see
    that all partitions have been accessed, as opposed to just one.


    ![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig9_HTML.jpg](images/333037_2_En_7_Chapter/333037_2_En_7_Fig9_HTML.jpg)


    Figure 7-9


    Index Scan properties, no partition elimination


    ## Table Compression


    When you think of compression, it is natural to think of saving space at the expense
    of performance. However, this does not always hold true for SQL Server table compression.
    Compression in SQL Server can actually offer a performance benefit. This is because
    SQL Server is usually an IO-bound application, as opposed to being CPU bound.
    This means that if SQL Server needs to read dramatically fewer pages from disk,
    then performance will increase, even if this is at the expense of CPU cycles.
    Of course, if your database is, in fact, CPU bound because you have very fast
    disks and only a single CPU core, for example, then compression could have a negative
    impact, but this is atypical. In order to understand table compression, it helps
    to have insight into how SQL Server stores data within a page. Although a full
    discussion of page internals is beyond the scope of this book, Figure [7-10](#333037_2_En_7_Chapter.xhtml#Fig10)
    gives you a high-level view of the default structure of an on-disk page and row.


    ![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig10_HTML.jpg](images/333037_2_En_7_Chapter/333037_2_En_7_Fig10_HTML.jpg)


    Figure 7-10


    Structure of a page


    Within the row, the row metadata contains details such as whether or not versioning
    information exists for the row and if the row has `NULL` values. The fixed-length
    column metadata records the length of the fixed-length portion of the page. The
    variable-length metadata includes a column offset array for the variable-length
    columns so that SQL Server can track where each column begins in relation to the
    beginning of the row.'
  trans: '# 实现滑动窗口


    ```sql

    --创建 OldOrders 表

    CREATE TABLE dbo.OldOrdersStaging(

    [OrderNumber] [int] IDENTITY(1,1) NOT NULL,

    [OrderDate] [date] NOT NULL,

    [CustomerID] [int] NOT NULL,

    [ProductID] [int] NOT NULL,

    [Quantity] [int] NOT NULL,

    [NetAmount] [money] NOT NULL,

    [TaxAmount] [money] NOT NULL,

    [InvoiceAddressID] [int] NOT NULL,

    [DeliveryAddressID] [int] NOT NULL,

    [DeliveryDate] [date] NULL,

    CONSTRAINT PK_OldOrdersStaging PRIMARY KEY CLUSTERED

    (

    OrderNumber ASC,

    OrderDate ASC

    )WITH (PAD_INDEX = OFF, STATISTICS_NORECOMPUTE = OFF, IGNORE_DUP_KEY = OFF,

    ALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS = ON)

    ) ;

    GO

    --计算最低边界点值

    DECLARE @LowestBoundaryPoint DATE = (

    SELECT TOP 1 CAST(value  AS DATE)

    FROM sys.partition_functions pf

    INNER JOIN sys.partition_range_values prv

    ON pf.function_id = prv.function_id

    WHERE pf.name = ''PartFuncWeek''

    ORDER BY value ASC) ;

    --计算最高边界点值

    DECLARE @HighestboundaryPoint DATE = (

    SELECT TOP 1 CAST(value  AS DATE)

    FROM sys.partition_functions pf

    INNER JOIN sys.partition_range_values prv

    ON pf.function_id = prv.function_id

    WHERE pf.name = ''PartFuncWeek''

    ORDER BY value DESC) ;

    --向最高边界点值加 7 天以确定新的边界点

    DECLARE @NewSplitRange DATE = (

    SELECT DATEADD(dd,7,@HighestboundaryPoint)) ;

    --将最旧的分区切换到 OldOrders 表

    ALTER TABLE ExistingOrders

    SWITCH PARTITION 1 TO OldOrdersStaging PARTITION 2 ;

    --移除最旧的分区

    ALTER PARTITION FUNCTION PartFuncWeek()

    MERGE RANGE(@LowestBoundaryPoint) ;

    --创建新分区

    ALTER PARTITION FUNCTION PartFuncWeek()

    SPLIT RANGE(@NewSplitRange) ;

    GO

    --重新运行 $PARTITION 以评估新的行分布

    SELECT

    COUNT(*) ''Number of Rows''

    ,$PARTITION.PartFuncWeek(OrderDate) ''Partition''

    FROM dbo.ExistingOrders

    GROUP BY $PARTITION.PartFuncWeek(OrderDate) ;

    SELECT name, value FROM SYS.partition_functions PF

    INNER JOIN SYS.partition_range_values PFR ON PF.function_id = PFR.function_id

    WHERE name = ''PARTFUNCWEEK'' ;

    ```


    图 7-7 中显示的结果展示了分区是如何重新对齐的。


    ![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig7_HTML.jpg](img/333037_2_En_7_Fig7_HTML.jpg)


    图 7-7 新分区对齐


    使用`SWITCH`函数有几个限制。首先，表的所有非聚集索引必须与基表对齐。此外，您要移入数据的空表或分区必须具有相同的索引结构。它还必须与切换出的分区位于同一文件组上。这是因为`SWITCH`函数实际上并不移动任何数据，它是一个元数据操作，更改构成分区的页面的指针。


    您可以在不同的文件组上执行`MERGE`和`SPLIT`，但这会带来性能上的阻碍。与`SWITCH`类似，如果涉及的所有分区都位于同一文件组上，`MERGE`和`SPLIT`可以作为元数据操作执行。但是，如果它们位于不同的文件组上，那么
    SQL Server 就需要执行物理数据移动，这可能会花费更长的时间。


    ### 分区消除


    分区的一个关键优势是，查询优化器能够只访问满足查询结果所需的分区，而不是整个表。要使分区消除成功，分区键必须作为筛选条件包含在`WHERE`子句中。我们可以通过针对`ExistingOrders`表运行清单
    7-9 中的查询，并选择包含实际执行计划的选项来见证此功能。


    ```sql

    SELECT OrderNumber, OrderDate

    FROM dbo.ExistingOrders

    WHERE OrderDate BETWEEN ''2019-03-01'' AND ''2019-03-07'' ;

    ```


    如果我们现在查看执行计划，并通过 SQL Server Management Studio 检查索引扫描运算符的属性，我们会看到只有一个分区被访问，如图 7-8
    所示。


    ![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig8_HTML.jpg](img/333037_2_En_7_Fig8_HTML.jpg)


    图 7-8 启用分区消除后的索引扫描运算符属性


    然而，分区消除功能可能有点脆弱。例如，如果您以任何方式操作`OrderDate`列，而不仅仅是将其用于求值，那么分区消除就无法发生。例如，如果您将`OrderDate`列转换为`DATETIME2`数据类型，如清单
    7-10 所示，那么所有分区都将需要被访问。此问题也会影响分区索引。


    ```sql

    SELECT OrderNumber, OrderDate

    FROM dbo.ExistingOrders

    WHERE CAST(OrderDate AS DATETIME2) BETWEEN ''2019-03-01'' AND ''2019-03-31'' ;

    ```


    图 7-9 展示了通过 SQL Server Management Studio 查看到的索引扫描运算符的相同属性。在这里，您可以看到所有分区都被访问了，而不仅仅是一个。


    ![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig9_HTML.jpg](img/333037_2_En_7_Fig9_HTML.jpg)


    图 7-9 索引扫描属性，无分区消除


    ## 表压缩


    当您想到压缩时，很自然会认为这是以牺牲性能为代价来节省空间。然而，这对于 SQL Server 表压缩来说并不总是成立。SQL Server 中的压缩实际上可以提供性能优势。这是因为
    SQL Server 通常是一个受 IO 限制的应用程序，而不是受 CPU 限制。这意味着，如果 SQL Server 需要从磁盘读取的页面数量急剧减少，那么即使这会消耗
    CPU 周期，性能也会提高。当然，如果您的数据库实际上受 CPU 限制（例如，因为您的磁盘速度非常快且只有一个 CPU 核心），那么压缩可能会产生负面影响，但这并不典型。为了理解表压缩，深入了解
    SQL Server 如何在页面内存储数据会有所帮助。尽管对页面内部的完整讨论超出了本书的范围，但图 7-10 从高层次上展示了磁盘上页面和行的默认结构。


    ![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig10_HTML.jpg](img/333037_2_En_7_Fig10_HTML.jpg)


    图 7-10 页面结构


    在行内，行元数据包含诸如行是否存在版本控制信息以及行是否具有`NULL`值等详细信息。固定长度列元数据记录页面固定长度部分的长度。可变长度元数据包括一个可变长度列的列偏移数组，以便
    SQL Server 可以跟踪每个列相对于行开始的位置。'
- fmt: '### Row Compression


    On an uncompressed page, as just described, SQL Server stores fixed-length columns
    first, followed by variable-length columns. The only columns that can be variable
    length are columns with a variable-length data type, such as `VARCHAR` or `VARBINARY`.
    When row compression is implemented for a table, SQL Server uses the minimum amount
    of storage for other data types as well. For example, if you have an integer column
    that contains a `NULL` value in row 1, a value of `50` in row 2, and a value of
    `40,000` in row 3, then in row 1, the column does not use any space at all; it
    uses 1 byte in row 2, because it will store this value as a `TINYINT`; and it
    uses 4 bytes in row 3, because it will need to store this value as an `INT`. This
    is opposed to an uncompressed table using 4 bytes for every row, including row
    1.


    In addition, SQL Server also compresses Unicode columns so that characters that
    can be stored as a single byte only use a single byte, as opposed to 2 bytes,
    as they would in an uncompressed page. In order to achieve these optimizations,
    SQL Server has to use a different page format, which is outlined in Figure [7-11](#333037_2_En_7_Chapter.xhtml#Fig11).


    ![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig11_HTML.jpg](images/333037_2_En_7_Chapter/333037_2_En_7_Fig11_HTML.jpg)

    *Figure 7-11: Page structure with row compression*


    ### Note


    A short column is 8 bytes or less.


    In Figure [7-11](#333037_2_En_7_Chapter.xhtml#Fig11), the first area of row metadata
    contains details such as whether or not there is versioning information about
    the row and if any long data columns exist. The column descriptor contains the
    number of short columns and the length of each long column. The second area of
    metadata contains details such as versioning information and forwarding pointers
    for heaps.


    ### Page Compression


    When you implement page compression, row compression is implemented first. Page
    compression itself is actually comprised of two different forms of compression.
    The first is *prefix compression* and the second is *dictionary compression*.
    These compression types are outlined in the following sections.


    #### Prefix Compression


    Prefix compression works by establishing a common prefix for a column across rows
    within a page. Once the best prefix value has been established, SQL Server chooses
    the longest value that contains the full prefix as the anchor row and stores all
    other values within the column, as a differential of the anchor row, as opposed
    to storing the values themselves. For example, Table [7-2](#333037_2_En_7_Chapter.xhtml#Tab2)
    details the values that are being stored within a column and follows this with
    a description of how SQL Server will store the values using prefix compression.
    The value `Postfreeze` has been chosen as the anchor value, since it is the longest
    value that contains the full prefix of `Post`, which has been identified. The
    number in `<>` is a marker of how many characters of the prefix are used.


    *Table 7-2: Prefix Compression Differentials*


    | Column A Value | Column A Storage | Column B Value | Column B Storage |

    | --- | --- | --- | --- |

    | `Postcode` | `<4>code` | `Teethings (Anchor)` | — |

    | `Postfreeze (Anchor)` | — | `Teacher` | `<2>acher` |

    | `Postpones` | `<4>pones` | `Teenager` | `<3>nager` |

    | `Postilion` | `<4>ilion` | `Teeth` | `<5>` |

    | `Imposters` | `<0>Imposters` | `Tent` | `<2>nt` |

    | [`Poacher`](http://www.morewords.com/word/poacher/) | `<2>acher` | `Rent` |
    `<0>Rent` |


    #### Dictionary Compression


    Dictionary compression is performed after all columns have been compressed using
    prefix compression. It looks across all columns within a page and finds values
    that match. The matching is performed using the binary representation of a value,
    which makes the process data type agnostic. When it finds duplicate values, it
    adds them to a special dictionary at the top of the page, and in the row, it simply
    stores a pointer to the value’s location in the dictionary. Table [7-3](#333037_2_En_7_Chapter.xhtml#Tab3)
    expands on the previous table to give you an overview of this.


    *Table 7-3: Dictionary Compression Pointers*


    | Column A Value | Column A Storage | Column B Value | Column B Storage |

    | --- | --- | --- | --- |

    | `Postcode` | `<4>code` | `Teethings (Anchor)` | — |

    | `Postfreeze (Anchor)` | — | `Teacher` | `[Pointer1]` |

    | `Postpones` | `<4>pones` | `Teenager` | `<3>nager` |

    | `Postilion` | `<4>ilion` | `Teeth` | `<5>` |

    | `Imposters` | `<0>Imposters` | `Tent` | `<2>nt` |

    | [`Poacher`](http://www.morewords.com/word/poacher/) | `[Pointer1]` | `Rent`
    | `<0>Rent` |


    Here, you can see that the value `<2>acher`, which appeared in both columns in
    the previous table, has been replaced with a pointer to the dictionary where the
    value is stored.


    #### Page Compression Structure


    In order to facilitate page compression, a special row is inserted in the page
    immediately after the page header, which contains the information regarding the
    anchor record and dictionary. This row is called the compression information record,
    and it is illustrated in Figure [7-12](#333037_2_En_7_Chapter.xhtml#Fig12).


    ![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig12_HTML.jpg](images/333037_2_En_7_Chapter/333037_2_En_7_Fig12_HTML.jpg)

    *Figure 7-12: Page structure with page compression*


    The row metadata for the compression information record specifies if the record
    contains an anchor record and a dictionary. The change count records how many
    changes have been made to the page, which may affect the usefulness of the anchor
    and dictionary. When a table is rebuilt, SQL Server can use this information to
    determine if the page should be rebuilt. The offsets contain the start and end
    locations of the dictionary, from the beginning of the page. The anchor record
    contains each column’s prefix value and the dictionary contains the duplicate
    values for which pointers have been created.


    ### Columnstore Compression


    Columnstore indexes are always compressed, automatically. This means that if you
    create a clustered columnstore index on your table, your table is also compressed,
    and this cannot be combined with row or page compression. There are two types
    of columnstore compression available to you; `COLUMNSTORE`, which was introduced
    in SQL Server 2012, and `COLUMNSTORE_ARCHIVE`, which was introduced in SQL Server
    2014.


    You can think of `COLUMNSTORE` as the standard compression type for columnstore
    indexes, and you should only use the `COLUMNSTORE_ARCHIVE` algorithm for data
    that is infrequently accessed. This is because this compression algorithm breaks
    the rules for SQL Server data compression as far as performance goes. If you implement
    this algorithm, expect a very high compression ratio, but prepare for it to be
    at the expense of query performance.


    ### Implementing Compression


    The planning and implementation of row and page compression is a fairly straightforward
    process, and it is discussed in the following sections.'
