- fmt: "## Choosing the Collation\n\nThe second tab of the Server Configuration page\
    \ will allow you to customize your collation, as illustrated in Figure [2-19](#333037_2_En_2_Chapter.xhtml#Fig19).\n\
    \n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig19_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig19_HTML.jpg)\n\
    \nFigure 2-19: Collation Configuration page\n\n*Collations* determine how SQL\
    \ Server will sort data and also define SQL Server’s matching behavior, with regard\
    \ to accents, kana, width, and case. You can also specify that sorting and matching\
    \ should be carried out on the binary or binary code point representations.\n\n\
    If your collation is accent sensitive, then in comparison, SQL Server does not\
    \ regard `è` as the same character as `e`, whereas it will treat these characters\
    \ as equal, if accent insensitivity is specified. Kana sensitivity defines if\
    \ the Japanese Hiragana character set is equal to the Katakana character set.\
    \ Width sensitivity defines if a single byte representation of a character is\
    \ equal to its two-byte equivalent.\n\nCase sensitivity defines if a capital letter\
    \ is equal to its lowercase equivalent during comparison. For example, the code\
    \ in Listing [2-1](#333037_2_En_2_Chapter.xhtml#PC1) will create and populate\
    \ a temporary table and then run the same query, but using two different collations.\n\
    \n```sql\n--Create a local temporary table\nCREATE TABLE #CaseExample\n(\n   \
    \ Name        VARCHAR(20)\n)\n--Populate values\nINSERT INTO #CaseExample\nVALUES('James'),\
    \ ('james'), ('John'), ('john')\n--Count the number of entries for James, with\
    \ case sensitive collation\nSELECT COUNT(*) AS 'Case Sensitive'\nFROM #CaseExample\n\
    WHERE Name = 'John' COLLATE Latin1_General_CS_AI\n--Count the number of entries\
    \ for James, with case insensitive collation\nSELECT COUNT(*) AS 'Case Insensitive'\n\
    FROM #CaseExample\nWHERE Name = 'John' COLLATE Latin1_General_CI_AI\n--DROP temporary\
    \ table\nDROP TABLE #CaseExample\n```\n\nListing 2-1: Effect of Case Sensitivity\
    \ of Matching\n\nYou can see from the results in Figure [2-20](#333037_2_En_2_Chapter.xhtml#Fig20)\
    \ that the first query only found one example of the word `John`, because it used\
    \ a case-sensitive collation, but because the second query uses a case-insensitive\
    \ collation, it matched two results.\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig20_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig20_HTML.jpg)\n\
    \nFigure 2-20: Results of case sensitivity example\n\nAlthough the effects of\
    \ the various collation sensitivities may be fairly straightforward, a slightly\
    \ more confusing aspect is how collations can affect sort order. Surely there\
    \ is only one correct way to order data? Well, the answer to this question is\
    \ no. There are various ways that data can be correctly ordered. For example,\
    \ while some collations order data alphabetically, other collations may use nonalphabetic\
    \ writing systems, such as Chinese, which can be ordered using a method called\
    \ radical and stroke sorting. This system will identify common character components\
    \ and then order them by the number of strokes. An example of how collations can\
    \ affect sort order is demonstrated in Listing [2-2](#333037_2_En_2_Chapter.xhtml#PC2).\n\
    \n```sql\n--Create a temporary table\nCREATE TABLE #SortOrderExample\n(\n    Food\
    \        VARCHAR(20)\n)\n--Populate the table\nINSERT INTO #SortOrderExample\n\
    VALUES ('Coke'), ('Chips'), ('Crisps'), ('Cake')\n--Select food using Latin1_General\
    \ collation\nSELECT Food AS 'Latin1_General collation'\nFROM #SortOrderExample\n\
    ORDER BY Food\n    COLLATE Latin1_General_CI_AI\n--Select food using Traditional_Spanish\
    \ collation\nSELECT Food AS 'Traditional_Spanish colation'\nFROM #SortOrderExample\n\
    ORDER BY Food\n    COLLATE Traditional_Spanish_CI_AI\n```\n\nListing 2-2: Effect\
    \ of Collations on Sort Order\n\nThe results in Figure [2-21](#333037_2_En_2_Chapter.xhtml#Fig21)\
    \ show that the value `Chips` has been sorted differently using the two collations.\
    \ This is because in traditional Spanish, `ch` is regarded as a separate character\
    \ and is sorted after `cz`.\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig21_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig21_HTML.jpg)\n\
    \nFigure 2-21: Results of sort order example\n\nThere are two types of binary\
    \ collation to choose from. The older style binary collations are included for\
    \ backward compatibility only and are identified with the `BIN` suffix. If you\
    \ choose to choose this type of binary collation, then characters will be matched\
    \ and sorted based on the bit patterns of each character. If you choose the modern\
    \ binary collations, which can be identified with a `BIN2` suffix, then data will\
    \ be sorted and matched based on Unicode code points for Unicode data and the\
    \ code point of the relevant ANSI code page, for non-Unicode data. The example\
    \ in Listing [2-3](#333037_2_En_2_Chapter.xhtml#PC3) demonstrates the behavior\
    \ of a binary (`BIN2`) collation, compared to case-sensitive and case-insensitive\
    \ collations.\n\n```sql\nCREATE TABLE #CaseExample\n(\n    Name        VARCHAR(20)\n\
    )\n--Populate values\nINSERT INTO #CaseExample\nVALUES('James'), ('james'), ('John'),\
    \ ('john')\n--Select all rows with a case sensitive collation\nSELECT name as\
    \ [Case Sensitive]\nFROM #CaseExample\nOrder by Name COLLATE Latin1_General_CS_AI\n\
    --Select all rows, with a case insensitive collation\nSELECT name as [Case Insensitive]\n\
    FROM #CaseExample\nOrder by Name COLLATE  Latin1_General_CI_AI\nSELECT name as\
    \ [binary]\nFROM #CaseExample\nOrder by Name COLLATE  Latin1_General_BIN2\n--DROP\
    \ temporary table\nDROP TABLE #CaseExample\n```\n\nListing 2-3: Binary Collation\
    \ Sort Order\n\nThe results in Figure [2-22](#333037_2_En_2_Chapter.xhtml#Fig22)\
    \ show that because the data is ordered by code point rather than alphabetically,\
    \ the values beginning with capital letters are ordered before those beginning\
    \ with lowercase letters, since this matches the code points of the characters.\n\
    \n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig22_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig22_HTML.jpg)\n\
    \nFigure 2-22: Binary collation sort order\n\nCollations can be challenging, and\
    \ ideally you will maintain consistent collations across the enterprise. This\
    \ is not always possible in today’s global organizations, but you should aspire\
    \ to it. You should also be careful to select the correct collation for the instance\
    \ at the point of installation. Changing the collation afterward can be challenging,\
    \ because databases and columns within tables have their own collations, and a\
    \ collation cannot be changed if other objects depend on it. At a high level,\
    \ a worst-case scenario will involve the following actions to change your collation\
    \ at a later date:\n\n1.  Re-create all databases.\n2.  Export all data into the\
    \ newly created copies of the databases.\n3.  Drop the original databases.\n4.\
    \  Rebuild the Master database with the desired collation.\n5.  Re-create the\
    \ databases.\n6.  Import the data back into your database from the copies that\
    \ you created.\n7.  Drop the copies of the databases.\n\nUnless you have a specific\
    \ backward compatibility requirement, you should avoid using SQL collations and\
    \ only use Windows collations. It is best practice to use Windows collations because\
    \ SQL collations are deprecated and are not all fully compatible with Windows\
    \ collations. Additionally, you should be mindful when selecting newer collations,\
    \ such as Norwegian or Bosnian_Latin. Although this new family of collations map\
    \ to code pages in Windows Server 2008 or above, they do not map to code pages\
    \ in older operating systems. So if you were to run a `SELECT *` query, against\
    \ your instance from an older operating system, such as Windows XP, the code page\
    \ would not match, and an exception would be thrown.\n\n### Note\n\nExamples in\
    \ this book, you should use `Latin1_General_CI_AS`."
  raw: '### Choosing the Collation


    The second tab of the Server Configuration page will allow you to customize your
    collation, as illustrated in Figure [2-19](#333037_2_En_2_Chapter.xhtml#Fig19).


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig19_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig19_HTML.jpg)


    Figure 2-19


    Collation Configuration page


    *Collations* determine how SQL Server will sort data and also define SQL Server’s
    matching behavior, with regard to accents, kana, width, and case. You can also
    specify that sorting and matching should be carried out on the binary or binary
    code point representations.


    If your collation is accent sensitive, then in comparison, SQL Server does not
    regard è as the same character as e, whereas it will treat these characters as
    equal, if accent insensitivity is specified. Kana sensitivity defines if the Japanese
    Hiragana character set is equal to the Katakana character set. Width sensitivity
    defines if a single byte representation of a character is equal to its two-byte
    equivalent.


    Case sensitivity defines if a capital letter is equal to its lowercase equivalent
    during comparison. For example, the code in Listing [2-1](#333037_2_En_2_Chapter.xhtml#PC1)
    will create and populate a temporary table and then run the same query, but using
    two different collations.


    ```

    --Create a local temporary table

    CREATE TABLE #CaseExample

    (

    Name        VARCHAR(20)

    )

    --Populate values

    INSERT INTO #CaseExample

    VALUES(''James''), (''james''), (''John''), (''john'')

    --Count the number of entries for James, with case sensitive collation

    SELECT COUNT(*) AS ''Case Sensitive''

    FROM #CaseExample

    WHERE Name = ''John'' COLLATE Latin1_General_CS_AI

    --Count the number of entries for James, with case insensitive collation

    SELECT COUNT(*) AS ''Case Insensitive''

    FROM #CaseExample

    WHERE Name = ''John'' COLLATE Latin1_General_CI_AI

    --DROP temporary table

    DROP TABLE #CaseExample

    Listing 2-1

    Effect of Case Sensitivity of Matching

    ```


    You can see from the results in Figure [2-20](#333037_2_En_2_Chapter.xhtml#Fig20)
    that the first query only found one example of the word John, because it used
    a case-sensitive collation, but because the second query uses a case-insensitive
    collation, it matched two results.


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig20_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig20_HTML.jpg)


    Figure 2-20


    Results of case sensitivity example


    Although the effects of the various collation sensitivities may be fairly straightforward,
    a slightly more confusing aspect is how collations can affect sort order. Surely
    there is only one correct way to order data? Well, the answer to this question
    is no. There are various ways that data can be correctly ordered. For example,
    while some collations order data alphabetically, other collations may use nonalphabetic
    writing systems, such as Chinese, which can be ordered using a method called radical
    and stroke sorting. This system will identify common character components and
    then order them by the number of strokes. An example of how collations can affect
    sort order is demonstrated in Listing [2-2](#333037_2_En_2_Chapter.xhtml#PC2).


    ```

    --Create a temporary table

    CREATE TABLE #SortOrderExample

    (

    Food        VARCHAR(20)

    )

    --Populate the table

    INSERT INTO #SortOrderExample

    VALUES (''Coke''), (''Chips''), (''Crisps''), (''Cake'')

    --Select food using Latin1_General collation

    SELECT Food AS ''Latin1_General collation''

    FROM #SortOrderExample

    ORDER BY Food

    COLLATE Latin1_General_CI_AI

    --Select food using Traditional_Spanish collation

    SELECT Food AS ''Traditional_Spanish colation''

    FROM #SortOrderExample

    ORDER BY Food

    COLLATE Traditional_Spanish_CI_AI

    Listing 2-2

    Effect of Collations on Sort Order

    ```


    The results in Figure [2-21](#333037_2_En_2_Chapter.xhtml#Fig21) show that the
    value Chips has been sorted differently using the two collations. This is because
    in traditional Spanish, ch is regarded as a separate character and is sorted after
    cz.


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig21_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig21_HTML.jpg)


    Figure 2-21


    Results of sort order example


    There are two types of binary collation to choose from. The older style binary
    collations are included for backward compatibility only and are identified with
    the BIN suffix. If you choose to choose this type of binary collation, then characters
    will be matched and sorted based on the bit patterns of each character. If you
    choose the modern binary collations, which can be identified with a BIN2 suffix,
    then data will be sorted and matched based on Unicode code points for Unicode
    data and the code point of the relevant ANSI code page, for non-Unicode data.
    The example in Listing [2-3](#333037_2_En_2_Chapter.xhtml#PC3) demonstrates the
    behavior of a binary (BIN2) collation, compared to case-sensitive and case-insensitive
    collations.


    ```

    CREATE TABLE #CaseExample

    (

    Name        VARCHAR(20)

    )

    --Populate values

    INSERT INTO #CaseExample

    VALUES(''James''), (''james''), (''John''), (''john'')

    --Select all rows with a case sensitive collation

    SELECT name as [Case Sensitive]

    FROM #CaseExample

    Order by Name COLLATE Latin1_General_CS_AI

    --Select all rows, with a case insensitive collation

    SELECT name as [Case Insensitive]

    FROM #CaseExample

    Order by Name COLLATE  Latin1_General_CI_AI

    SELECT name as [binary]

    FROM #CaseExample

    Order by Name COLLATE  Latin1_General_BIN2

    --DROP temporary table

    DROP TABLE #CaseExample

    Listing 2-3

    Binary Collation Sort Order

    ```


    The results in Figure [2-22](#333037_2_En_2_Chapter.xhtml#Fig22) show that because
    the data is ordered by code point rather than alphabetically, the values beginning
    with capital letters are ordered before those beginning with lowercase letters,
    since this matches the code points of the characters.


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig22_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig22_HTML.jpg)


    Figure 2-22


    Binary collation sort order


    Collations can be challenging, and ideally you will maintain consistent collations
    across the enterprise. This is not always possible in today’s global organizations,
    but you should aspire to it. You should also be careful to select the correct
    collation for the instance at the point of installation. Changing the collation
    afterward can be challenging, because databases and columns within tables have
    their own collations, and a collation cannot be changed if other objects depend
    on it. At a high level, a worst-case scenario will involve the following actions
    to change your collation at a later date:


    1.  Re-create all databases.


    2.  Export all data into the newly created copies of the databases.


    3.  Drop the original databases.


    4.  Rebuild the Master database with the desired collation.


    5.  Re-create the databases.


    6.  Import the data back into your database from the copies that you created.


    7.  Drop the copies of the databases.


    Unless you have a specific backward compatibility requirement, you should avoid
    using SQL collations and only use Windows collations. It is best practice to use
    Windows collations because SQL collations are deprecated and are not all fully
    compatible with Windows collations. Additionally, you should be mindful when selecting
    newer collations, such as Norwegian or Bosnian_Latin. Although this new family
    of collations map to code pages in Windows Server 2008 or above, they do not map
    to code pages in older operating systems. So if you were to run a `SELECT *` query,
    against your instance from an older operating system, such as Windows XP, the
    code page would not match, and an exception would be thrown.


    ### Note


    Examples in this book, you should use Latin1_General_CI_AS.'
  trans: "\n## 选择排序规则\n\n服务器配置页面的第二个选项卡允许您自定义排序规则，如图 2-19 所示。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig19_HTML.jpg](img/333037_2_En_2_Fig19_HTML.jpg)\n\
    \n图 2-19：排序规则配置页面\n\n*排序规则*决定了 SQL Server 将如何排序数据，并定义了 SQL Server 在区分重音、假名、宽度和大小写方面的匹配行为。您还可以指定排序和匹配应在二进制或二进制代码点表示上进行。\n\
    \n如果您的排序规则是区分重音的，那么在比较时，SQL Server 不会将 `è` 视为与 `e` 相同的字符；而如果指定了不区分重音，SQL Server\
    \ 则会将这些字符视为相等。假名敏感性定义日文平假名字符集是否与片假名字符集相等。宽度敏感性定义字符的单字节表示是否与其双字节等价形式相等。\n\n大小写敏感性定义在比较时大写字母是否与其小写等价形式相等。例如，清单\
    \ 2-1 中的代码将创建并填充一个临时表，然后使用两种不同的排序规则运行相同的查询。\n\n```sql\n--创建一个局部临时表\nCREATE TABLE\
    \ #CaseExample\n(\n    Name        VARCHAR(20)\n)\n--填充值\nINSERT INTO #CaseExample\n\
    VALUES('James'), ('james'), ('John'), ('john')\n--使用区分大小写的排序规则，计算名称为 James 的条目数\n\
    SELECT COUNT(*) AS 'Case Sensitive'\nFROM #CaseExample\nWHERE Name = 'John' COLLATE\
    \ Latin1_General_CS_AI\n--使用不区分大小写的排序规则，计算名称为 James 的条目数\nSELECT COUNT(*) AS 'Case\
    \ Insensitive'\nFROM #CaseExample\nWHERE Name = 'John' COLLATE Latin1_General_CI_AI\n\
    --删除临时表\nDROP TABLE #CaseExample\n```\n\n清单 2-1：匹配时区分大小写的效果\n\n从图 2-20 中的结果可以看出，第一个查询只找到了一个\
    \ `John`，因为它使用了区分大小写的排序规则；但第二个查询使用了不区分大小写的排序规则，因此匹配到了两个结果。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig20_HTML.jpg](img/333037_2_En_2_Fig20_HTML.jpg)\n\
    \n图 2-20：区分大小写示例的结果\n\n尽管各种排序规则敏感性的影响可能相当直接，但一个稍微令人困惑的方面是排序规则如何影响排序顺序。数据肯定只有一种正确的排序方式吧？嗯，这个问题的答案是否定的。数据可以通过多种方式正确排序。例如，虽然一些排序规则按字母顺序排序数据，但其他排序规则可能使用非字母书写系统，例如中文，可以使用一种称为部首和笔画排序的方法进行排序。这个系统会识别共同的字符组成部分，然后按笔画数量排序。清单\
    \ 2-2 演示了一个排序规则如何影响排序顺序的例子。\n\n```sql\n--创建一个临时表\nCREATE TABLE #SortOrderExample\n\
    (\n    Food        VARCHAR(20)\n)\n--填充表\nINSERT INTO #SortOrderExample\nVALUES\
    \ ('Coke'), ('Chips'), ('Crisps'), ('Cake')\n--使用 Latin1_General 排序规则选择食物\nSELECT\
    \ Food AS 'Latin1_General collation'\nFROM #SortOrderExample\nORDER BY Food\n\
    \    COLLATE Latin1_General_CI_AI\n--使用 Traditional_Spanish 排序规则选择食物\nSELECT Food\
    \ AS 'Traditional_Spanish colation'\nFROM #SortOrderExample\nORDER BY Food\n \
    \   COLLATE Traditional_Spanish_CI_AI\n```\n\n清单 2-2：排序规则对排序顺序的影响\n\n图 2-21 中的结果显示，`Chips`\
    \ 这个值使用两种排序规则排序的结果不同。这是因为在传统西班牙语中，`ch` 被视为一个单独的字符，并且排序在 `cz` 之后。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig21_HTML.jpg](img/333037_2_En_2_Fig21_HTML.jpg)\n\
    \n图 2-21：排序顺序示例的结果\n\n有两种类型的二进制排序规则可供选择。较旧样式的二进制排序规则仅出于向后兼容性而包含，并以 `BIN` 后缀标识。如果您选择这种类型的二进制排序规则，那么字符将基于每个字符的位模式进行匹配和排序。如果您选择现代二进制排序规则（以\
    \ `BIN2` 后缀标识），那么对于 Unicode 数据，数据将基于 Unicode 代码点进行排序和匹配；对于非 Unicode 数据，则基于相关 ANSI\
    \ 代码页的代码点进行排序和匹配。清单 2-3 中的示例演示了二进制（`BIN2`）排序规则与区分大小写和不区分大小写排序规则相比的行为。\n\n```sql\n\
    CREATE TABLE #CaseExample\n(\n    Name        VARCHAR(20)\n)\n--填充值\nINSERT INTO\
    \ #CaseExample\nVALUES('James'), ('james'), ('John'), ('john')\n--使用区分大小写的排序规则选择所有行\n\
    SELECT name as [Case Sensitive]\nFROM #CaseExample\nOrder by Name COLLATE Latin1_General_CS_AI\n\
    --使用不区分大小写的排序规则选择所有行\nSELECT name as [Case Insensitive]\nFROM #CaseExample\nOrder\
    \ by Name COLLATE  Latin1_General_CI_AI\nSELECT name as [binary]\nFROM #CaseExample\n\
    Order by Name COLLATE  Latin1_General_BIN2\n--删除临时表\nDROP TABLE #CaseExample\n\
    ```\n\n清单 2-3：二进制排序规则的排序顺序\n\n图 2-22 中的结果显示，因为数据是按代码点而非字母顺序排序的，所以以大写字母开头的值排在以小写字母开头的值之前，这与字符的代码点相匹配。\n\
    \n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig22_HTML.jpg](img/333037_2_En_2_Fig22_HTML.jpg)\n\
    \n图 2-22：二进制排序规则的排序顺序\n\n排序规则可能具有挑战性，理想情况下，您应在整个企业中保持一致的排序规则。这在当今的全球化组织中并非总是可行，但您应努力做到。在安装实例时，您还应小心选择正确的排序规则。之后更改排序规则可能具有挑战性，因为数据库和表内的列都有自己的排序规则，并且如果其他对象依赖于某个排序规则，则无法更改它。从高层次来看，最坏的情况将涉及以下操作来在日后更改您的排序规则：\n\
    \n1.  重新创建所有数据库。\n2.  将所有数据导出到新创建的数据库副本中。\n3.  删除原始数据库。\n4.  使用所需的排序规则重建 Master\
    \ 数据库。\n5.  重新创建数据库。\n6.  从您创建的副本中将数据导回您的数据库。\n7.  删除数据库的副本。\n\n除非您有特定的向后兼容性要求，否则应避免使用\
    \ SQL 排序规则，而仅使用 Windows 排序规则。使用 Windows 排序规则是最佳实践，因为 SQL 排序规则已被弃用，并且并非所有都与 Windows\
    \ 排序规则完全兼容。此外，在选择较新的排序规则（如挪威语或波斯尼亚语 _ 拉丁文）时应谨慎。尽管这类新的排序规则系列映射到 Windows Server\
    \ 2008 或更高版本中的代码页，但它们不映射到较旧操作系统中的代码页。因此，如果您从较旧的操作系统（如 Windows XP）对实例运行 `SELECT\
    \ *` 查询，代码页将不匹配，并会抛出异常。\n\n### 注意\n\n本书中的示例，您应该使用 `Latin1_General_CI_AS`。\n"
- fmt: '### Provisioning Instance Security


    The next page of the setup wizard allows you to configure the Database Engine.
    It consists of six tabs. In the first tab, you can specify the authentication
    mode of the instance and instance administrators, as illustrated in Figure [2-23](#333037_2_En_2_Chapter.xhtml#Fig23).
    The second tab allows you to specify the folder that will be used as the default
    data directory, as well as specific locations for user databases and `TempDB`.
    The third tab provides configuration options for `TempDB`, while the fourth allows
    you to configure the maximum degree of parallelism for the instance; the fifth
    allows for instance memory settings to be configured, and the final tab will allow
    you to configure `FILESTREAM`.


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig23_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig23_HTML.jpg)


    Figure 2-23: The Server Configuration tab


    `Windows authentication mode` means that the credentials that a user supplies
    when logging into Windows will be passed to SQL Server, and the user does not
    require any additional credentials to gain access to the instance. With `mixed
    mode`, although Windows credentials can still be used to access the instance,
    users can also be given second-tier credentials. If this option is selected, then
    SQL Server will hold its own usernames and passwords for users inside the instance,
    and users can supply these, in order to gain access, even if their Windows identity
    does not have permissions.


    For security best practice, it is a good idea to only allow Windows authentication
    to your instance. This is for two reasons. First, with Windows authentication
    only, if an attacker were to gain access to your network, then they would still
    not be able to access SQL Server, since they would not have a valid Windows account
    with the correct permissions. With mixed-mode authentication however, once inside
    the network, attackers could use brute force attacks or other hacking methodologies
    to attempt to gain access via a second-tier user account. Second, if you specify
    mixed-mode authentication, then you are required to create an `SA` account. The
    `SA` account is a SQL Server user account that has administrative privileges over
    the instance. If the password for this account became compromised, then an attacker
    could gain administrative control over SQL Server.


    Mixed-mode authentication is a necessity in some cases, however. For example,
    you may have a legacy application that does not support Windows authentication
    or a third-party application that has a hard-coded connection that uses second-tier
    authentication. These would be two valid reasons why mixed-mode authentication
    may be required. Another valid reason would be if you have users that need to
    access the instance from a nontrusted domain.


    ### Caution


    Use mixed-mode authentication by exception only in order to reduce the security
    footprint of SQL Server.


    ### Configuring the Instance


    On the Server Configuration tab, you will also need to enter at least one instance
    administrator. You can use the `Add Current User` button to add your current Windows
    security context or the `Add` button to search for Windows security principles,
    such as users or groups. Ideally, you should select a Windows group, which contains
    all DBAs that will require administrative access to the instance, since this simplifies
    security.


    The Data Directories tab of Database Engine Configuration page is illustrated
    in Figure [2-24](#333037_2_En_2_Chapter.xhtml#Fig24).


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig24_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig24_HTML.jpg)


    Figure 2-24: The Data Directories tab


    The Data Directories tab allows you to alter the default location of the data
    root directory. On this screen, you can also change the default location for user
    databases and their log files as well as specify where `TempDB` data and log files
    should be created. As you may recall from Chapter [1](#333037_2_En_1_Chapter.xhtml),
    this is particularly important, because you will probably wish to separate user
    data files from their logs and also from `TempDB`. Finally, this tab allows you
    to specify a default location for backups of databases that will be taken.


    The `TempDB` tab (Figure [2-25](#333037_2_En_2_Chapter.xhtml#Fig25)) allows you
    to configure file options for `TempDB`. The number of files required for `TempDB`
    is important, as too few files can cause contention on system pages, such as `GAM`
    (Global Allocation Map) and `SGAM` (Shared Global Allocation Map). The optimal
    number of files can be calculated using the formula:

    ```

    SMALLEST(Number of logical cores, 8)

    ```

    If your server has hyper-threading turned on, then the number of logical cores
    will be the number of physical cores, multiplied by two. On VMWare, the number
    of logical cores will be equal to the number of virtual cores.


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig25_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig25_HTML.jpg)


    Figure 2-25: TempDB tab


    When considering the initial size of the files, I usually work to the rule:

    ```

    SUM(Data file size for all user databases) / 3

    ```

    for busy `OLTP` systems, but this will vary, based on your requirements and the
    workload profile of your user databases.


    The `MaxDOP` tab of the wizard, illustrated in Figure [2-26](#333037_2_En_2_Chapter.xhtml#Fig26),
    allows you to configure the maximum number of CPU cores that can be used by any
    single query. The setup program calculates a default recommended value, but you
    can override this if required. Please see Chapter [5](#333037_2_En_5_Chapter.xhtml)
    of this book for a detailed discussion of how `MaxDOP` should be configured.


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig26_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig26_HTML.jpg)


    Figure 2-26: MaxDOP tab


    Figure [2-27](#333037_2_En_2_Chapter.xhtml#Fig27) illustrates the Memory tab.
    Here, you are able to specify if you would like to use the default configuration,
    for the minimum and maximum amount of memory that can be allocated to the instance;
    use the recommended values, calculated by the setup wizard; or specify your own
    values. To specify your own preferred values, choose the recommended option, enter
    your values, and check the `Click here to accept the recommended memory configurations
    for the SQL Server database engine` check box. This check box must also be used,
    if you wish to adhere to the setup program’s recommendations. A detailed discussion
    of how best to configure minimum and maximum memory settings for the database
    engine can be found in Chapter [5](#333037_2_En_5_Chapter.xhtml) of this book.


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig27_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig27_HTML.jpg)


    Figure 2-27: Memory tab'
  raw: '### Provisioning Instance Security


    The next page of the setup wizard allows you to configure the Database Engine.
    It consists of six tabs. In the first tab, you can specify the authentication
    mode of the instance and instance administrators, as illustrated in Figure [2-23](#333037_2_En_2_Chapter.xhtml#Fig23).
    The second tab allows you to specify the folder that will be used as the default
    data directory, as well as specific locations for user databases and TempDB. The
    third tab provides configuration options for TempDB, while the fourth allows you
    to configure the maximum degree of parallelism for the instance; the fifth allows
    for instance memory settings to be configured, and the final tab will allow you
    to configure FILESTREAM.


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig23_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig23_HTML.jpg)


    Figure 2-23


    The Server Configuration tab


    Windows authentication mode means that the credentials that a user supplies when
    logging into Windows will be passed to SQL Server, and the user does not require
    any additional credentials to gain access to the instance. With mixed mode, although
    Windows credentials can still be used to access the instance, users can also be
    given second-tier credentials. If this option is selected, then SQL Server will
    hold its own usernames and passwords for users inside the instance, and users
    can supply these, in order to gain access, even if their Windows identity does
    not have permissions.


    For security best practice, it is a good idea to only allow Windows authentication
    to your instance. This is for two reasons. First, with Windows authentication
    only, if an attacker were to gain access to your network, then they would still
    not be able to access SQL Server, since they would not have a valid Windows account
    with the correct permissions. With mixed-mode authentication however, once inside
    the network, attackers could use brute force attacks or other hacking methodologies
    to attempt to gain access via a second-tier user account. Second, if you specify
    mixed-mode authentication, then you are required to create an SA account. The
    SA account is a SQL Server user account that has administrative privileges over
    the instance. If the password for this account became compromised, then an attacker
    could gain administrative control over SQL Server.


    Mixed-mode authentication is a necessity in some cases, however. For example,
    you may have a legacy application that does not support Windows authentication
    or a third-party application that has a hard-coded connection that uses second-tier
    authentication. These would be two valid reasons why mixed-mode authentication
    may be required. Another valid reason would be if you have users that need to
    access the instance from a nontrusted domain.


    ### Caution


    Use mixed-mode authentication by exception only in order to reduce the security
    footprint of SQL Server.


