  trans: '

    ### 使用“新建可用性组”对话框


    既然我们已经成功创建了第一个可用性组，现在让我们为 `App2` 创建第二个可用性组。这次，我们使用“新建可用性组”和“添加侦听器”对话框。我们首先通过备份
    `Chapter14App2Customers` 数据库来开始此过程。就像创建 `App1` 可用性组时一样，在我们执行备份之前，数据库是不可选择的。然而，与使用向导时不同，我们无法通过备份/还原选项让
    SQL Server 执行初始数据库同步。因此，我们必须将数据库备份到我们在上一个演示中创建的共享中，然后将备份连同事务日志备份还原到辅助实例，或者使用**自动种子设定**。在此示例中，我们将使用自动种子设定，因此无需提前将数据库还原到辅助副本。清单
    14-4 中的脚本将对 `Chapter14App2Customers` 数据库执行完整备份。


    #### 提示


    要使自动种子设定生效，必须在辅助服务器上为可用性组授予 `CREATE ANY DATABASE` 权限。有关授予权限的更多信息，请参见第 10 章。


    ```

    --Back Up Database

    BACKUP DATABASE [Chapter14App2Customers] TO  DISK = N''\\CLUSTERNODE1\AOAGShare\Chapter14App2Customers.bak''
    WITH  COPY_ONLY, FORMAT, INIT, REWIND, COMPRESSION,  STATS = 5 ;

    GO

    清单 14-4

    备份和还原数据库

    ```


    如果我们尚未创建可用性组，那么我们的下一步将是创建一个 TCP 终结点，以便实例可以通信。然后，我们需要在每个实例上为服务账户创建登录名，并授予其在终结点上的连接权限。然而，由于每个实例只能有一个数据库镜像终结点，因此我们不需要创建新的终结点，而且显然我们也没有理由为服务账户授予额外的权限。因此，我们继续创建可用性组。为此，我们在对象资源管理器中展开“AlwaysOn
    高可用性”，然后从可用性组的上下文菜单中选择“新建可用性组”。


    这将显示“新建可用性组”对话框的“常规”选项卡，如图 14-9 所示。在此界面上，我们在第一个字段中输入可用性组的名称。然后，我们在“可用性数据库”窗口下单击“添加”按钮，再输入我们希望添加到组中的数据库名称。接着，我们需要在“可用性副本”窗口下单击“添加”按钮，然后在新增的行中输入辅助副本的“服务器\实例”名称。对于我们的用例，无需指定“每数据库
    DTC 支持”或“数据库级别运行状况检测”设置，因为可用性组内只有一个数据库。但是，我们将“要提交的同步辅助副本数”设置为 1。此设置是 SQL Server
    2017 中的新增功能，它保证在提交每个事务之前，指定数量的辅助副本已将事务数据写入日志。在我们的场景中，我们只有一个同步辅助副本，如果主副本发生故障，故障转移将自动发生，但在原始主副本重新联机之前，辅助副本将不允许用户事务写入数据库。这绝对保证了在任何情况下都不会丢失数据。如果我们将此设置保留为
    0（如本章第一个示例中那样），那么在主副本发生故障、用户在辅助副本也发生故障之前向其写入事务的情况下，就可能发生数据丢失，因为另一个唯一副本使用的是异步提交模式。


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig9_HTML.jpg](img/333037_2_En_14_Fig9_HTML.jpg)

    *图 14-9：新建可用性组对话框*


    现在我们可以开始设置副本属性。在创建 `App1` 可用性组时，我们讨论了“角色”、“可用性模式”、“故障转移模式”、“可读辅助副本”和“终结点 URL”属性。“连接中的主角色”属性定义了当副本处于主角色时可以建立哪些连接。您可以将其配置为“允许所有连接”或“允许读/写连接”。当指定“读/写”时，其连接字符串中使用
    `Application Intent = Read only` 参数的应用程序将无法连接到该副本。


    “会话超时”属性设置了副本在多长时间内未收到彼此的 ping 后，会进入 `DISCONNECTED` 状态并结束会话。虽然可以将此值设置为低至 5 秒，但通常最好将设置保持为
    60 秒；否则，您可能会面临误报响应的风险，导致不必要的故障转移。如果副本超时，则需要重新同步，因为即使辅助副本以同步提交模式运行，主副本上的事务也不再会等待它。


    在对话框的“备份首选项”选项卡上，我们定义用于自动备份作业的首选副本，如图 14-10 所示。就像使用向导时一样，我们可以指定“主副本”，也可以选择强制或偏好在辅助副本上进行备份。我们还可以为每个副本配置一个介于
    0 到 100 之间的权重，并使用“排除副本”复选框来避免在特定节点上进行备份。


    #### 提示


    如果您使用的是软件保障，尽管您的许可允许您将辅助副本同步用于高可用性或灾难恢复目的，但不允许您在此辅助服务器上执行其他任务（例如备份），此时排除副本进行备份会很有帮助。


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig10_HTML.jpg](img/333037_2_En_14_Fig10_HTML.jpg)

    *图 14-10：“备份首选项”选项卡*


    创建可用性组后，我们需要创建可用性组侦听器。为此，我们从现在应在对象资源管理器中可见的 `App2` 可用性组的上下文菜单中选择“新建侦听器”。这将调用“新建可用性组侦听器”对话框，如图
    14-11 所示。


    在此对话框中，我们首先输入侦听器的虚拟名称。然后，我们定义它将侦听的端口以及将分配给它的 IP 地址。


    #### 提示


    我们能够为两个侦听器以及 SQL Server 实例使用相同的端口，因为所有三者使用的是不同的 IP 地址。


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig11_HTML.jpg](img/333037_2_En_14_Fig11_HTML.jpg)

    *图 14-11：新建可用性组侦听器对话框*


    ### Linux 上的可用性组


    除了在 Windows 故障转移群集上工作外，还可以在 Linux 上运行的 SQL Server 实例上配置可用性组。在本节中，我们将讨论如何在 Linux
    上为高可用性配置可用性组。在我们的具体场景中，我们有两个服务器，即 `ubuntu-primary` 和 `ubuntu-secondary`，它们将构成我们的服务器拓扑。

    '
- fmt: '### Tip


    有关在Linux上安装SQL Server的更多信息，请参见[第4章](#333037_2_En_4_Chapter.xhtml)。


    正如在Windows环境中一样，在Linux上配置可用性组的第一步是在服务级别启用该功能。[清单 14-5](#333037_2_En_14_Chapter.xhtml#PC5)
    中的脚本演示了如何启用可用性组然后重启服务。此脚本需要在将成为副本的每个服务器上执行。


    ### Tip


    如[第4章](#333037_2_En_4_Chapter.xhtml)所讨论的，`sudo`相当于Windows中的“以管理员身份运行”。使用`sudo`时，系统会提示您输入`root`密码。


    ```

    sudo /opt/mssql/bin/mssql-conf set hadr.hadrenabled  1

    sudo systemctl restart mssql-server

    Listing 14-5

    启用 AlwaysOn 可用性组

    ```


    由于Linux服务器无法使用AD身份验证相互进行身份验证，因此下一步是创建可用于身份验证的证书。您可以通过连接到主服务器并运行[清单 14-6](#333037_2_En_14_Chapter.xhtml#PC6)
    中的脚本来创建证书。该脚本在SQL Server实例中创建证书，然后将其备份到操作系统，以便我们可以将其复制到辅助服务器。请记住，您可以通过使用`sqlcmd`或从安装在Windows机器上的SSMS进行连接，来连接到在Linux上运行的SQL
    Server实例。


    ### Tip


    有关创建证书的更多详细信息，请参见[第11章](#333037_2_En_11_Chapter.xhtml)。


    ```

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''Pa$$w0rd'';

    GO

    CREATE CERTIFICATE aoag_certificate WITH SUBJECT = ''AvailabilityGroups'';

    GO

    BACKUP CERTIFICATE aoag_certificate

    TO FILE = ''/var/opt/mssql/data/aoag_certificate.cer''

    WITH PRIVATE KEY (

    FILE = ''/var/opt/mssql/data/aoag_certificate.pvk'',

    ENCRYPTION BY PASSWORD = ''Pa$$w0rd''

    );

    GO

    Listing 14-6

    创建证书

    ```


    我们现在需要将密钥复制到辅助服务器。为此，我们首先需要授予用户对`/var/opt/mssql/`数据文件夹的权限。我们可以使用[清单 14-7](#333037_2_En_14_Chapter.xhtml#PC7)
    中的命令来完成此操作，该命令需要在两台服务器上运行。


    ```

    sudo chmod -R 777 /var/opt/mssql/data

    Listing 14-7

    授予权限

    ```


    在[清单 14-8](#333037_2_En_14_Chapter.xhtml#PC8) 中的命令，如果在主服务器上运行，将把证书的公钥和私钥复制到辅助服务器。为了使此命令正常工作，每台服务器上应安装并配置SSH。关于SSH的完整讨论超出了本书的范围，但可以在
    [`http://ubuntuhandbook.org/index.php/2014/09/enable-ssh-in-ubuntu-14-10-server-desktop/`](http://ubuntuhandbook.org/index.php/2014/09/enable-ssh-in-ubuntu-14-10-server-desktop/)
    找到指南。


    ### Tip


    您应更改用户和服务器名称以匹配您自己的配置。


    ```

    scp aoag_certificate.* pete@ubuntu-secondary:/var/opt/mssql/data

    Listing 14-8

    复制密钥

    ```


    我们现在需要通过从文件系统导入证书和密钥，在辅助服务器上创建证书。这可以使用[清单 14-9](#333037_2_En_14_Chapter.xhtml#PC9)
    中的脚本实现。


    ```

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''Pa$$w0rd'' ;

    GO

    CREATE CERTIFICATE aoag_certificate

    FROM FILE = ''/var/opt/mssql/data/aoag_certificate.cer''

    WITH PRIVATE KEY (

    FILE = ''/var/opt/mssql/data/aoag_certificate.pvk'',

    DECRYPTION BY PASSWORD = ''Pa$$w0rd''

    ) ;

    GO

    Listing 14-9

    在辅助服务器上创建证书

    ```


    现在我们的证书已就位，我们需要创建用于连接的端点。[清单 14-10](#333037_2_En_14_Chapter.xhtml#PC10) 中的脚本将创建一个名为`AOAG_Endpoint`的端点，该端点侦听端口`5022`并使用我们的证书进行身份验证。此脚本应在两个实例上运行。


    ```

    CREATE ENDPOINT AOAG_Endpoint

    STATE = STARTED

    AS TCP (LISTENER_PORT = 5022)

    FOR DATABASE_MIRRORING (

    ROLE = ALL,

    AUTHENTICATION = CERTIFICATE aoag_certificate,

    ENCRYPTION = REQUIRED ALGORITHM AES

    );

    Listing 14-10

    创建端点

    ```


    接下来，我们可以在主副本上创建可用性组。这可以使用[清单 14-11](#333037_2_En_14_Chapter.xhtml#PC11) 中的命令来实现。我们这里不讨论
    `CREATE AVAILABILITY GROUP` 命令的完整语法（可在 [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-availability-group-transact-sql?view=sql-server-2019`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-availability-group-transact-sql%253Fview%253Dsql-server-2019)
    找到），但有几个具体的要点我想指出。首先，您会注意到 `CLUSTER_TYPE` 被设置为 `EXTERNAL`。当底层群集是Linux上的Pacemaker时，这是唯一有效的选项。您还会注意到
    `FAILOVER_MODE` 被设置为 `manual`。当 `CLUSTER_TYPE` 设置为 `EXTERNAL` 时，这是唯一有效的选项。这意味着永远不应通过T-SQL执行故障转移。故障转移应仅由外部群集管理器管理。


    ```

    CREATE AVAILABILITY GROUP Linux_AOAG

    WITH (CLUSTER_TYPE = EXTERNAL)

    FOR REPLICA ON ''ubuntu-primary'' WITH (

    ENDPOINT_URL = N''tcp://ubuntu-primary:5022'',

    AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,

    FAILOVER_MODE = EXTERNAL,

    SEEDING_MODE = AUTOMATIC

    ),

    ''ubuntu-secondary'' WITH (

    ENDPOINT_URL = N''tcp://ubuntu-secondary:5022'',

    AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,

    FAILOVER_MODE = EXTERNAL,

    SEEDING_MODE = AUTOMATIC

    ) ;

    GO

    Listing 14-11

    创建可用性组

    ```


    我们现在将使用[清单 14-12](#333037_2_En_14_Chapter.xhtml#PC12) 中的命令来授予可用性组创建数据库的权限。


    ```

    ALTER AVAILABILITY GROUP Linux_AOAG GRANT CREATE ANY DATABASE ;

    GO

    Listing 14-12

    授予权限

    ```


    我们现在可以将辅助副本加入可用性组，并通过在连接到辅助实例时运行[清单 14-13](#333037_2_En_14_Chapter.xhtml#PC13)
    中的脚本来确保其具有适当的权限。'
  raw: '### Tip


    For further information on installing SQL Server on Linux, please see Chapter
    [4](#333037_2_En_4_Chapter.xhtml).


    Just as you do in a Windows environment, the first step in configuring Availability
    Groups on Linux is to enable the feature, at the service level. The script in
    Listing [14-5](#333037_2_En_14_Chapter.xhtml#PC5) demonstrates how to enable Availability
    Groups and then restart the service. This script needs to be executed on each
    server that will host a Replica.


    ### Tip


    As discussed in Chapter [4](#333037_2_En_4_Chapter.xhtml), `sudo` is the equivalent
    of Run as Administrator in Windows. You will be prompted to enter the `root` password,
    when using `sudo`.


    ```

    sudo /opt/mssql/bin/mssql-conf set hadr.hadrenabled  1

    sudo systemctl restart mssql-server

    Listing 14-5

    Enable AlwaysOn Availability Groups

    ```


    Because Linux servers cannot authenticate with each other, using AD authentication,
    the next step is to create certificates, which can be used for authentication.
    You can create the certificates by connecting to the primary server and running
    the script in Listing [14-6](#333037_2_En_14_Chapter.xhtml#PC6). The script creates
    a certificate in the SQL Server instance and then backs it up to the operating
    system, so that we can copy it to the secondary server. Remember that you can
    connect to a SQL Server instance running on Linux by using `sqlcmd` or by connecting
    from SSMS installed on a Windows-based machine.


    ### Tip


    Further details of creating certificates can be found in Chapter [11](#333037_2_En_11_Chapter.xhtml).


    ```

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''Pa$$w0rd'';

    GO

    CREATE CERTIFICATE aoag_certificate WITH SUBJECT = ''AvailabilityGroups'';

    GO

    BACKUP CERTIFICATE aoag_certificate

    TO FILE = ''/var/opt/mssql/data/aoag_certificate.cer''

    WITH PRIVATE KEY (

    FILE = ''/var/opt/mssql/data/aoag_certificate.pvk'',

    ENCRYPTION BY PASSWORD = ''Pa$$w0rd''

    );

    GO

    Listing 14-6

    Creating a Certificate

    ```


    We now need to copy the keys to the secondary server. To do this, we first need
    to grant the user permissions to the `/var/opt/mssql/` data folder. We can do
    this with the command in Listing [14-7](#333037_2_En_14_Chapter.xhtml#PC7), which
    needs to be run on both servers.


    ```

    sudo chmod -R 777 /var/opt/mssql/data

    Listing 14-7

    Grant Permissions

    ```


    The command in Listing [14-8](#333037_2_En_14_Chapter.xhtml#PC8), if run on the
    primary server, will copy the public and private keys of the certificate to the
    secondary server. For this command to work, SSH should be installed and configured
    on each server. A full discussion of SSH is beyond the scope of this book, but
    a guide can be found at [`http://ubuntuhandbook.org/index.php/2014/09/enable-ssh-in-ubuntu-14-10-server-desktop/`](http://ubuntuhandbook.org/index.php/2014/09/enable-ssh-in-ubuntu-14-10-server-desktop/)
    .


    ### Tip


    You should change the user and server names to match your own configuration.


    ```

    scp aoag_certificate.* pete@ubuntu-secondary:/var/opt/mssql/data

    Listing 14-8

    Copy the Keys

    ```


    We now need to create the certificate on the secondary server, by importing the
    certificate and key from the file system. This can be achieved using the script
    in Listing [14-9](#333037_2_En_14_Chapter.xhtml#PC9).


    ```

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''Pa$$w0rd'' ;

    GO

    CREATE CERTIFICATE aoag_certificate

    FROM FILE = ''/var/opt/mssql/data/aoag_certificate.cer''

    WITH PRIVATE KEY (

    FILE = ''/var/opt/mssql/data/aoag_certificate.pvk'',

    DECRYPTION BY PASSWORD = ''Pa$$w0rd''

    ) ;

    GO

    Listing 14-9

    Create the Certificate on the Secondary Server

    ```


    Now that our certificates are in place, we need to create the endpoints that will
    be used for connections. The script in Listing [14-10](#333037_2_En_14_Chapter.xhtml#PC10)
    will create an endpoint called AOAG_Endpoint, which listens on port 5022 and uses
    our certificate for authentication. This script should be run on both instances.


    ```

    CREATE ENDPOINT AOAG_Endpoint

    STATE = STARTED

    AS TCP (LISTENER_PORT = 5022)

    FOR DATABASE_MIRRORING (

    ROLE = ALL,

    AUTHENTICATION = CERTIFICATE aoag_certificate,

    ENCRYPTION = REQUIRED ALGORITHM AES

    );

    Listing 14-10

    Create the Endpoints

    ```


    Next, we can create the Availability Group on the Primary Replica. This can be
    achieved using the command in Listing [14-11](#333037_2_En_14_Chapter.xhtml#PC11).
    We will not discuss the full syntax of the CREATE AVAILABILITY GROUP command here,
    which can be found at [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-availability-group-transact-sql?view=sql-server-2019`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-availability-group-transact-sql%253Fview%253Dsql-server-2019)
    , but there are a couple specific points of interest that I would like to point
    out. Firstly, you will notice that CLUSTER_TYPE is set to EXTERNAL. This is the
    only valid option, when the underlying cluster is Pacemaker, on Linux. You will
    also notice that the FAILOVER_MODE is set to manual. This is the only valid option
    when the CLUSTER_TYPE is set to EXTERNAL. It means that failover should never
    be performed via T-SQL. Failover should only ever be managed by the external cluster
    manager.


    ```

    CREATE AVAILABILITY GROUP Linux_AOAG

    WITH (CLUSTER_TYPE = EXTERNAL)

    FOR REPLICA ON ''ubuntu-primary'' WITH (

    ENDPOINT_URL = N''tcp://ubuntu-primary:5022'',

    AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,

    FAILOVER_MODE = EXTERNAL,

    SEEDING_MODE = AUTOMATIC

    ),

    ''ubuntu-secondary'' WITH (

    ENDPOINT_URL = N''tcp://ubuntu-secondary:5022'',

    AVAILABILITY_MODE = SYNCHRONOUS_COMMIT,

    FAILOVER_MODE = EXTERNAL,

    SEEDING_MODE = AUTOMATIC

    ) ;

    GO

    Listing 14-11

    Create the Availability Group

    ```


    We will now use the command in Listing [14-12](#333037_2_En_14_Chapter.xhtml#PC12)
    to grant the Availability Group permissions to create databases.


    ```

    ALTER AVAILABILITY GROUP Linux_AOAG GRANT CREATE ANY DATABASE ;

    GO

    Listing 14-12

    Grant Permissions

    ```


    We can now join our secondary replica to the Availability Group and ensure that
    it has the appropriate permissions by running the script in Listing [14-13](#333037_2_En_14_Chapter.xhtml#PC13)
    while connected to the secondary instance.'
