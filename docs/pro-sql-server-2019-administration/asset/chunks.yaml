    ## 提示


    互联网上有很多免费的计算器可以帮助你将二进制转换为有符号整数。


    在32核服务器上，处理器亲和性有2.631308369336935e+35种可能的组合，但表5-3中包含了一些示例。


    表 5-3

    亲和性掩码示例


    | 对齐的处理器 | 位掩码 | 有符号整数表示 |

    | --- | --- | --- |

    | 0 和 1 | 0000 0000 0000 0000 0000 0000 0000 0011 | 3 |

    | 0, 1, 2, 和 3 | 0000 0000 0000 0000 0000 0000 0000 1111 | 15 |

    | 8 和 9 | 0000 0000 0000 0000 0000 0011 0000 0000 | 768 |

    | 8, 9, 10, 和 11 | 0000 0000 0000 0000 0000 1111 0000 0000 | 3840 |

    | 30 和 31 | 1100 0000 0000 0000 0000 0000 0000 0000 | -1073741824 |

    | 28, 29, 30, 和 31 | 1111 0000 0000 0000 0000 0000 0000 0000 | -268435456 |


    由于亲和性掩码的性质以及整数数据类型的最大范围是2^32，如果你的服务器有33到64个处理器，那么你还需要设置`Affinity64 Mask`和`Affinity64
    I/O Mask`设置。这些将为额外的处理器提供掩码。


    本节讨论的所有设置都可以使用`sp_configure`进行配置。清单5-2中的示例演示了将实例与核心0到3对齐。


    ```

    EXEC sp_configure ''affinity mask'', 15

    RECONFIGURE

    ```

    清单 5-2

    设置处理器亲和性


    即使使用64位掩码，使用此方法对齐前64个核心仍然存在限制，而SQL Server最多支持256个逻辑处理器。因此，新版本的SQL Server引入了一种增强的设置处理器亲和性的方法。这是通过一个名为`ALTER
    SERVER CONFIGURATION`的命令实现的。清单5-3演示了使用此命令的两种方式。第一种以我们迄今为止看到的方式将实例与特定处理器对齐。在此示例中，对齐的是CPU
    0、1、2和3。第二种将实例与两个NUMA节点内的所有处理器对齐，在本例中是节点0和4。正如使用`sp_configure`进行更改一样，使用`ALTER
    SERVER CONFIGURATION`进行的更改将反映在`sys.configurations`中。


    ```

    ALTER SERVER CONFIGURATION

    SET PROCESS AFFINITY CPU=0 TO 3

    ALTER SERVER CONFIGURATION

    SET PROCESS AFFINITY NUMANODE=0, 4

    ```

    清单 5-3

    `ALTER SERVER CONFIGURATION`'
  raw: '### Caution


    Although it is not recommended for SQL Server, some virtual environments use a
    technique called *over-subscribed processors* . This means that more cores are
    allocated to guests than actually exist on the physical hosts. When this is the
    case, you should not use processor affinity because NUMA boundaries will not be
    respected.


    The affinity mask reducing contention also holds true for clustered environments.
    Imagine you have a two-node cluster with an active/active configuration. Each
    node of the cluster is hosting a single instance. It may be important for your
    business that you can guarantee consistent performance in the event of a failover.
    In this case, assuming that each of your nodes has eight cores, then on node 1,
    you could configure instance 1 to use cores 0, 1, 2, and 3\. On node 2, you could
    configure instance 2 to use cores 4, 5, 6, and 7\. Now, in the event of failover,
    your instances will continue to use the same processor cores and not fight for
    resources.


    The second reason for using processor affinity is to avoid the overhead associated
    with threads being moved between processors at the operating system level. When
    your instance is under heavy load, you may see a performance improvement by aligning
    SQL Server threads with specific cores. In this scenario, it would be possible
    to separate standard SQL Server tasks from SQL Server IO-related tasks.


    Imagine that you have a server with a single processor, which has two cores. Hyper-threading
    is turned off and you have a single instance installed. You may choose to align
    tasks associated with IO affinity, such as Lazy Writer, with core 0 while aligning
    other SQL Server threads with core 1\. To align IO tasks with specific processors,
    you need to use an additional setting, called *Affinity I/O Mask* . When this
    setting is enabled, a hidden scheduler is created, which is used purely for Lazy
    Writer. Therefore, it is important that you do not align the affinity and Affinity
    I/O Masks with the same core. Otherwise, you will inadvertently create the contention
    that you are trying to avoid.


    ### Caution


    It is very rare that Affinity I/O Mask is required. To align workloads from multiple
    instances, Affinity Mask is sufficient. It is normally only appropriate for very
    large databases running on 32-bit systems. With 64-bit systems with larger amounts
    of RAM, IO churn is less; hence there is less context switching.


    Both Affinity Mask and Affinity I/O Mask can be set through the GUI in SQL Server
    Management Studio by selecting the Processors tab in the Instance Properties dialog
    box, as shown in Figure [5-2](#333037_2_En_5_Chapter.xhtml#Fig2).


    ![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig2_HTML.jpg](images/333037_2_En_5_Chapter/333037_2_En_5_Fig2_HTML.jpg)


    Figure 5-2


    The Processors tab


    Processor affinity works based on bitmaps. Therefore, if you wish to use `sp_configure`
    to set processor affinity, then you first need to calculate the integer representation
    of the bitmap value. This is made more complex because the `INT` data type is
    a 32-bit signed integer, meaning that some of the representations will be negative
    numbers. The value assigned to each processor is listed in Table [5-2](#333037_2_En_5_Chapter.xhtml#Tab2).


    Table 5-2


    Processor Affinity Bitmaps


    | Processor Number | Bit Mask | Signed Integer Representation |

    | --- | --- | --- |

    | 0 | 0000 0000 0000 0000 0000 0000 0000 0001 | 1 |

    | 1 | 0000 0000 0000 0000 0000 0000 0000 0010 | 2 |

    | 2 | 0000 0000 0000 0000 0000 0000 0000 0100 | 4 |

    | 3 | 0000 0000 0000 0000 0000 0000 0000 1000 | 8 |

    | 4 | 0000 0000 0000 0000 0000 0000 0001 0000 | 16 |

    | 5 | 0000 0000 0000 0000 0000 0000 0010 0000 | 32 |

    | 6 | 0000 0000 0000 0000 0000 0000 0100 0000 | 64 |

    | 7 | 0000 0000 0000 0000 0000 0000 1000 0000 | 128 |

    | 8 | 0000 0000 0000 0000 0000 0001 0000 0000 | 256 |

    | 9 | 0000 0000 0000 0000 0000 0010 0000 0000 | 512 |

    | 10 | 0000 0000 0000 0000 0000 0100 0000 0000 | 1024 |

    | 11 | 0000 0000 0000 0000 0000 1000 0000 0000 | 2028 |

    | 12 | 0000 0000 0000 0000 0001 0000 0000 0000 | 4096 |

    | 13 | 0000 0000 0000 0000 0010 0000 0000 0000 | 8192 |

    | 14 | 0000 0000 0000 0000 0100 0000 0000 0000 | 16384 |

    | 15 | 0000 0000 0000 0000 1000 0000 0000 0000 | 32768 |

    | 16 | 0000 0000 0000 0001 0000 0000 0000 0000 | 65536 |

    | 17 | 0000 0000 0000 0010 0000 0000 0000 0000 | 131072 |

    | 18 | 0000 0000 0000 0100 0000 0000 0000 0000 | 262144 |

    | 19 | 0000 0000 0000 1000 0000 0000 0000 0000 | 524288 |

    | 20 | 0000 0000 0001 0000 0000 0000 0000 0000 | 1048576 |

    | 21 | 0000 0000 0010 0000 0000 0000 0000 0000 | 2097152 |

    | 22 | 0000 0000 0100 0000 0000 0000 0000 0000 | 4194304 |

    | 23 | 0000 0000 1000 0000 0000 0000 0000 0000 | 8388608 |

    | 24 | 0000 0001 0000 0000 0000 0000 0000 0000 | 16777216 |

    | 25 | 0000 0010 0000 0000 0000 0000 0000 0000 | 33554432 |

    | 26 | 0000 0100 0000 0000 0000 0000 0000 0000 | 67108864 |

    | 27 | 0000 1000 0000 0000 0000 0000 0000 0000 | 134217728 |

    | 28 | 0001 0000 0000 0000 0000 0000 0000 0000 | 268435456 |

    | 29 | 0010 0000 0000 0000 0000 0000 0000 0000 | 536870912 |

    | 30 | 0100 0000 0000 0000 0000 0000 0000 0000 | 1073741824 |

    | 31 | 1000 0000 0000 0000 0000 0000 0000 0000 | -2147483648 |


    ### Tip


    Many free calculators are available on the Internet that will assist you in converting
    binary to signed integer.


    On a 32-core server, there are 2.631308369336935e+35 possible combinations for
    processor affinity, but a few examples are included in Table [5-3](#333037_2_En_5_Chapter.xhtml#Tab3).


    Table 5-3


    Examples of Affinity Masks


    | Aligned Processors | Bit Mask | Signed Integer Representation |

    | --- | --- | --- |

    | 0 and 1 | 0000 0000 0000 0000 0000 0000 0000 0011 | 3 |

    | 0, 1, 2, and 3 | 0000 0000 0000 0000 0000 0000 0000 1111 | 15 |

    | 8 and 9 | 0000 0000 0000 0000 0000 0011 0000 0000 | 768 |

    | 8, 9, 10, and 11 | 0000 0000 0000 0000 0000 1111 0000 0000 | 3840 |

    | 30 and 31 | 1100 0000 0000 0000 0000 0000 0000 0000 | -1073741824 |

    | 28, 29, 30, and 31 | 1111 0000 0000 0000 0000 0000 0000 0000 | -268435456 |


    Because of the nature of the affinity mask and the integer data type having a
    maximum range of 2^32, if your server has between 33 and 64 processors, then you
    will also need to set the Affinity64 Mask and Affinity64 I/O Mask settings. These
    will provide the masks for the additional processors.


    The settings discussed in this section can all be configured using sp_configure.
    The example in Listing [5-2](#333037_2_En_5_Chapter.xhtml#PC2) demonstrates aligning
    the instance with cores 0 to 3.


    ```

    EXEC sp_configure ''affinity mask'', 15

    RECONFIGURE

    Listing 5-2

    Setting Processor Affinity

    ```


    Even with the 64-bit masks, there is still a limitation of aligning the first
    64 cores using this method, and SQL Server will support up to 256 logical processors.
    For this reason, newer versions of SQL Server have introduced an enhanced method
    of setting processor affinity. This is through a command called `ALTER SERVER
    CONFIGURATION`. Listing [5-3](#333037_2_En_5_Chapter.xhtml#PC3) demonstrated two
    ways that this command can be used. The first aligns the instance with specific
    processors in the way that we have seen up until now. In this example, the alignment
    is with CPUs 0, 1, 2, and 3\. The second aligns the instance with all processors
    within two NUMA nodes, in this case, nodes 0 and 4\. Just as when you make changes
    using `sp_configure`, changes made using `ALTER SERVER CONFIGURATION` will be
    reflected in `sys.configurations`.


    ```

    ALTER SERVER CONFIGURATION

    SET PROCESS AFFINITY CPU=0 TO 3

    ALTER SERVER CONFIGURATION

    SET PROCESS AFFINITY NUMANODE=0, 4

    Listing 5-3

    ALTER SERVER CONFIGURATION

    ```'
  trans: '## 注意事项


    虽然对于 SQL Server 不推荐，但一些虚拟环境使用一种称为 `over-subscribed processors` 的技术。这意味着分配给客户的内核数多于物理主机上实际存在的内核数。在这种情况下，你不应使用处理器亲和性，因为
    NUMA 边界将不会被尊重。


    减少争用的亲和性掩码同样适用于集群环境。想象一个主动/主动配置的双节点集群。集群的每个节点托管一个实例。对于你的业务而言，确保在发生故障转移时具有一致的性能可能很重要。在这种情况下，假设你的每个节点有八个核心，那么在节点
    1 上，你可以将实例 1 配置为使用核心 0、1、2 和 3。在节点 2 上，你可以将实例 2 配置为使用核心 4、5、6 和 7。现在，在发生故障转移时，你的实例将继续使用相同的处理器核心，而不会争夺资源。


    使用处理器亲和性的第二个原因是为了避免操作系统级别线程在处理器之间移动带来的开销。当你的实例处于高负载时，通过将 SQL Server 线程与特定核心对齐，你可能会看到性能提升。在这种情况下，可以将标准
    SQL Server 任务与 SQL Server IO 相关任务分开。


    想象你有一台单处理器服务器，它有两个核心。超线程已关闭，并且你安装了一个实例。你可以选择将与 IO 亲和性相关的任务（如 `Lazy Writer`）与核心
    0 对齐，而将其他 SQL Server 线程与核心 1 对齐。要将 IO 任务与特定处理器对齐，你需要使用一个额外的设置，称为 `Affinity I/O
    Mask`。启用此设置后，会创建一个隐藏的调度程序，专门用于 `Lazy Writer`。因此，重要的是不要将亲和性掩码和 `Affinity I/O Masks`
    与同一个核心对齐。否则，你将无意中造成你试图避免的争用。


    ## 关于 I/O 掩码的注意事项


    很少需要使用 `Affinity I/O Mask`。要对齐来自多个实例的工作负载，`Affinity Mask` 就足够了。它通常只适用于在 32 位系统上运行的非常大的数据库。对于具有更大内存容量的
    64 位系统，IO 抖动较少；因此上下文切换也较少。


    `Affinity Mask` 和 `Affinity I/O Mask` 都可以通过 SQL Server Management Studio 中的 GUI
    进行设置，方法是在实例属性对话框中选择“处理器”选项卡，如图 5-2 所示。


    ![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig2_HTML.jpg](img/333037_2_En_5_Fig2_HTML.jpg)


    图 5-2

    “处理器”选项卡


    处理器亲和性基于位图工作。因此，如果你希望使用 `sp_configure` 来设置处理器亲和性，那么你首先需要计算位图值的整数表示。这变得更加复杂，因为
    `INT` 数据类型是 32 位有符号整数，意味着某些表示将是负数。分配给每个处理器的值列于表 5-2。


    表 5-2

    处理器亲和性位图


    | 处理器编号 | 位掩码 | 有符号整数表示 |

    | --- | --- | --- |

    | 0 | 0000 0000 0000 0000 0000 0000 0000 0001 | 1 |

    | 1 | 0000 0000 0000 0000 0000 0000 0000 0010 | 2 |

    | 2 | 0000 0000 0000 0000 0000 0000 0000 0100 | 4 |

    | 3 | 0000 0000 0000 0000 0000 0000 0000 1000 | 8 |

    | 4 | 0000 0000 0000 0000 0000 0000 0001 0000 | 16 |

    | 5 | 0000 0000 0000 0000 0000 0000 0010 0000 | 32 |

    | 6 | 0000 0000 0000 0000 0000 0000 0100 0000 | 64 |

    | 7 | 0000 0000 0000 0000 0000 0000 1000 0000 | 128 |

    | 8 | 0000 0000 0000 0000 0000 0001 0000 0000 | 256 |

    | 9 | 0000 0000 0000 0000 0000 0010 0000 0000 | 512 |

    | 10 | 0000 0000 0000 0000 0000 0100 0000 0000 | 1024 |

    | 11 | 0000 0000 0000 0000 0000 1000 0000 0000 | 2028 |

    | 12 | 0000 0000 0000 0000 0001 0000 0000 0000 | 4096 |

    | 13 | 0000 0000 0000 0000 0010 0000 0000 0000 | 8192 |

    | 14 | 0000 0000 0000 0000 0100 0000 0000 0000 | 16384 |

    | 15 | 0000 0000 0000 0000 1000 0000 0000 0000 | 32768 |

    | 16 | 0000 0000 0000 0001 0000 0000 0000 0000 | 65536 |

    | 17 | 0000 0000 0000 0010 0000 0000 0000 0000 | 131072 |

    | 18 | 0000 0000 0000 0100 0000 0000 0000 0000 | 262144 |

    | 19 | 0000 0000 0000 1000 0000 0000 0000 0000 | 524288 |

    | 20 | 0000 0000 0001 0000 0000 0000 0000 0000 | 1048576 |

    | 21 | 0000 0000 0010 0000 0000 0000 0000 0000 | 2097152 |

    | 22 | 0000 0000 0100 0000 0000 0000 0000 0000 | 4194304 |

    | 23 | 0000 0000 1000 0000 0000 0000 0000 0000 | 8388608 |

    | 24 | 0000 0001 0000 0000 0000 0000 0000 0000 | 16777216 |

    | 25 | 0000 0010 0000 0000 0000 0000 0000 0000 | 33554432 |

    | 26 | 0000 0100 0000 0000 0000 0000 0000 0000 | 67108864 |

    | 27 | 0000 1000 0000 0000 0000 0000 0000 0000 | 134217728 |

    | 28 | 0001 0000 0000 0000 0000 0000 0000 0000 | 268435456 |

    | 29 | 0010 0000 0000 0000 0000 0000 0000 0000 | 536870912 |

    | 30 | 0100 0000 0000 0000 0000 0000 0000 0000 | 1073741824 |

    | 31 | 1000 0000 0000 0000 0000 0000 0000 0000 | -2147483648 |


    ## 提示


    互联网上有很多免费的计算器可以帮助你将二进制转换为有符号整数。


    在 32 核服务器上，处理器亲和性有 2.631308369336935e+35 种可能的组合，但表 5-3 中包含了一些示例。


    表 5-3

    亲和性掩码示例


    | 对齐的处理器 | 位掩码 | 有符号整数表示 |

    | --- | --- | --- |

    | 0 和 1 | 0000 0000 0000 0000 0000 0000 0000 0011 | 3 |

    | 0, 1, 2, 和 3 | 0000 0000 0000 0000 0000 0000 0000 1111 | 15 |

    | 8 和 9 | 0000 0000 0000 0000 0000 0011 0000 0000 | 768 |

    | 8, 9, 10, 和 11 | 0000 0000 0000 0000 0000 1111 0000 0000 | 3840 |

    | 30 和 31 | 1100 0000 0000 0000 0000 0000 0000 0000 | -1073741824 |

    | 28, 29, 30, 和 31 | 1111 0000 0000 0000 0000 0000 0000 0000 | -268435456 |


    由于亲和性掩码的性质以及整数数据类型的最大范围是 2³²，如果你的服务器有 33 到 64 个处理器，那么你还需要设置 `Affinity64 Mask`
    和 `Affinity64 I/O Mask` 设置。这些将为额外的处理器提供掩码。


    本节讨论的所有设置都可以使用 `sp_configure` 进行配置。清单 5-2 中的示例演示了将实例与核心 0 到 3 对齐。


    ```

    EXEC sp_configure ''affinity mask'', 15

    RECONFIGURE

    ```

    清单 5-2

    设置处理器亲和性


    即使使用 64 位掩码，使用此方法对齐前 64 个核心仍然存在限制，而 SQL Server 最多支持 256 个逻辑处理器。因此，新版本的 SQL Server
    引入了一种增强的设置处理器亲和性的方法。这是通过一个名为 `ALTER SERVER CONFIGURATION` 的命令实现的。清单 5-3 演示了使用此命令的两种方式。第一种以我们迄今为止看到的方式将实例与特定处理器对齐。在此示例中，对齐的是
    CPU 0、1、2 和 3。第二种将实例与两个 NUMA 节点内的所有处理器对齐，在本例中是节点 0 和 4。正如使用 `sp_configure` 进行更改一样，使用
    `ALTER SERVER CONFIGURATION` 进行的更改将反映在 `sys.configurations` 中。


    ```

    ALTER SERVER CONFIGURATION

    SET PROCESS AFFINITY CPU=0 TO 3

    ALTER SERVER CONFIGURATION

    SET PROCESS AFFINITY NUMANODE=0, 4

    ```

    清单 5-3

    `ALTER SERVER CONFIGURATION`'
- fmt: "## MAXDOP\n\nMAXDOP will set the maximum number of cores that will be made\
    \ available to each individual execution of a query. The thought of this may initially\
    \ sound counterintuitive. Surely you would want every query to be parallelized\
    \ as much as possible? Well, this is not always the case.\n\nAlthough some data\
    \ warehousing queries may benefit from high levels of parallelization, many OLTP\
    \ (online transaction processing) workloads may perform better with a lower degree\
    \ of parallelization. This is because if a query executes over many parallel threads,\
    \ and one thread takes much longer than the others to complete, then the other\
    \ threads may sit waiting for the final thread to finish so that their streams\
    \ can be synchronized. If this is occurring, you are likely to see a high number\
    \ of waits with the wait type `CXPACKET`.\n\nIn many OLTP systems, high levels\
    \ of parallelization being chosen by the Query Optimizer actually indicate issues\
    \ such as missing or highly fragmented indexes or out-of-date statistics. Resolving\
    \ these issues will improve performance far more than running queries with a high\
    \ degree of parallelism.\n\nFor instances that support heavy data warehousing\
    \ workloads, different `MAXDOP` configurations should be tested and set accordingly,\
    \ with the understanding that `MAXDOP` can also be set at the query level, through\
    \ the use of a query hint, if a handful of queries would benefit from a different\
    \ setting to the majority of the instance’s workload. In the vast majority of\
    \ cases, however, the instance-level setting for `MAXDOP` should be configured\
    \ to the lowest of the following three values:\n\n*   `8`\n*   Number of cores\
    \ available to the instance (the default value for `MAXDOP`)\n*   The number of\
    \ cores within a NUMA node\n\nThe default value for `MAXDOP` is `0`, which means\
    \ that queries are only limited by the number of cores that are visible to the\
    \ instance. You can configure `MAXDOP` via the GUI by configuring the `Max Degree\
    \ of Parallelism` setting on the `Advanced` tab of the Server Properties. Figure\
    \ 5-3 illustrates this setting being configured to `8`.\n\n![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig3_HTML.jpg](images/333037_2_En_5_Chapter/333037_2_En_5_Fig3_HTML.jpg)\n\
    \nFigure 5-3\nThe Advanced tab\n\nYou can also configure `MAXDOP` using `sp_configure`.\
    \ Listing 5-4 demonstrates using `sp_configure` to set `MAXDOP` to a value of\
    \ `8`.\n\n```\nEXEC sys.sp_configure 'max degree of parallelism', 8\nRECONFIGURE\n\
    ```\n\nListing 5-4\nConfiguring MAXDOP with sp_configure\n\nAn adjunct to lowering\
    \ the `MAXDOP` setting is to increase the threshold at which the Query Optimizer\
    \ will choose a parallel plan over a serial plan. The default setting for this\
    \ is an estimated serial execution time of 5 seconds, but you can configure this\
    \ to anything between 0 and 32767 seconds. A practical limit in many environments\
    \ is around 30 seconds, but of course, this is workload specific and should always\
    \ be tested. The `cost threshold for parallelism` option will be ignored, however,\
    \ if you have `MAXDOP` configured to `1`, or if there is only one core available\
    \ to the instance. The script in Listing 5-5 will increase the `cost threshold\
    \ for parallelism` to `10` seconds.\n\n```\nEXEC sp_configure 'cost threshold\
    \ for parallelism', 10\nRECONFIGURE\n```\n\nListing 5-5\nConfiguring Cost Threshold\
    \ for Parallelism\n\n## Min and Max Server Memory\n\nThe `Min Server Memory (MB)`\
    \ and `Max Server Memory (MB)` settings are used to control how much memory SQL\
    \ Server has available for its memory pool. The memory pool contains many components.\
    \ Some of the largest components are detailed in Table 5-4.\n\nTable 5-4\nSQL\
    \ Server Memory Pool\n\n| Component | Description |\n| --- | --- |\n| Buffer cache\
    \ | The buffer cache stores data and index pages before and after being read from\
    \ or written to disk. Even if the pages your query requires are not in the cache,\
    \ they will still be written to the buffer cache first and then retrieved from\
    \ memory, as opposed to being written directly from disk. |\n| Procedure cache\
    \ | The procedure cache contains execution plans, not just for stored procedures\
    \ but also for ad hoc queries, prepared statements, and triggers. When SQL Server\
    \ begins to optimize a query, it first checks this cache to see if a suitable\
    \ plan already exists. |\n| Log cache | The log cache stores log records before\
    \ they are written to the transaction log. |\n| Log pool | A hash table that allows\
    \ HA/DR and data distribution technologies, such as AlwaysOn, Mirroring, and Replication,\
    \ to quickly access required log records. |\n| CLR | CLR refers to .NET code that\
    \ is used inside the instance. In older versions of SQL Server, CLR sat outside\
    \ of the main memory pool, as the memory pool only dealt with single, 8KB page\
    \ allocations. From SQL Server 2012 onward, the memory pool now deals with both\
    \ single and multipage allocations, so CLR has been brought in. |\n\nIn many environments,\
    \ it is likely that you will want to provide the same value for both `Min` and\
    \ `Max Server Memory`. This will avoid the overhead of SQL Server dynamically\
    \ managing the amount of memory it has reserved.\n\nIf you have multiple instances,\
    \ however, then dynamic memory management may be beneficial so that the instance\
    \ with the heaviest workload at any given time can consume the most resources.\
    \ You must give extra consideration if your instances are hosted on an active/active\
    \ cluster. I have seen one example of a client turning on `Lock Pages In Memory`\
    \ and then configuring the min and max memory for the instances on each node as\
    \ if they were stand-alone boxes. At the point of failover, the remaining node\
    \ crashed, because there was not enough RAM to support the memory requirements\
    \ of all instances on one box.\n\nNo matter how your environment is configured,\
    \ you will always want to leave enough memory for the operating system. Assuming\
    \ that you have one instance and no other applications, such as SSIS packages,\
    \ running on the server, you would normally set both the `min` and `max` memory\
    \ setting to be the lowest value from the following:\n\n*   RAM - 2GB\n*   (RAM\
    \ / 8) ∗ 7\n\nIf you have multiple instances, you would, of course, divide this\
    \ number appropriately between the instances, depending on their requirements.\
    \ If you have other applications running on the server, then you must also take\
    \ their memory requirements into account and add those to the operating system\
    \ requirements.\n\n`Min Server Memory (MB)` and `Max Server Memory (MB)` can both\
    \ be configured by using the `Memory` tab in the Server Properties dialog box,\
    \ as shown in Figure 5-4.\n\n![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig4_HTML.jpg](images/333037_2_En_5_Chapter/333037_2_En_5_Fig4_HTML.jpg)\n\
    \nFigure 5-4\nThe Memory tab\n\nYou can also configure both the settings through\
    \ T-SQL by using the `sp_configure` stored procedure. Listing 5-6 demonstrates\
    \ this.\n\n```\nDECLARE @MemOption1 INT = (SELECT physical_memory_kb/1024 - 2048\
    \ FROM sys.dm_os_sys_info)\nDECLARE @MemOption2 INT = (SELECT ((physical_Memory_kb/1024)/8)\
    \ * 7 FROM sys.dm_os_sys_info)\nIF @MemOption1 <= 0\nBEGIN\n    EXEC sys.sp_configure\
    \ 'min server memory (MB)', @MemOption2\n    EXEC sys.sp_configure 'max server\
    \ memory (MB)', @MemOption2\n    RECONFIGURE\nEND\nELSE IF @MemOption2 < @MemOption1\n\
    BEGIN\n    EXEC sys.sp_configure 'min server memory (MB)', @MemOption2\n    EXEC\
    \ sys.sp_configure 'max server memory (MB)', @MemOption2\n    RECONFIGURE\nEND\n\
    ELSE\nBEGIN\n    EXEC sys.sp_configure 'min server memory (MB)', @MemOption1\n\
    \    EXEC sys.sp_configure 'max server memory (MB)', @MemOption1\n    RECONFIGURE\n\
    END\n```\n\nListing 5-6\nConfiguring Min and Max Server Memory"
