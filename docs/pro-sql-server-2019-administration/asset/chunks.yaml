  trans: '# 创建主作业


    您可以按照与创建本地作业相同的方式创建主作业，唯一的区别是指定其应在哪些目标服务器上运行。然而，使用多服务器作业的一个限制是，T-SQL 作业步骤无法在另一个用户的上下文下运行；它们必须在服务帐户的上下文下运行。因此，在我们将
    `BackupAndCheckBrowser` 作业转换为多服务器作业之前，必须编辑它以移除 `运行身份帐户`。我们可以通过使用 `sp_update_jobstep`
    存储过程来实现这一点，如清单 22-11 所示。


    ```

    USE MSDB

    GO

    EXEC msdb.dbo.sp_update_jobstep

    @job_name=N''BackupAndCheckBrowser'',

    @step_id=1 ,

    @database_user_name=N" ;

    GO

    清单 22-11

    更新作业步骤

    ```


    多服务器作业的另一个限制是，唯一允许的操作员是 `MSXOperator`，他接收所有多服务器作业的通知。因此，在继续之前，我们还需要将 `DBATeam`
    操作员更改为 `MSXOperator` 操作员。我们可以使用 `sp_update_job` 存储过程，通过清单 22-12 中的脚本来实现这一点。


    ```

    USE msdb

    GO

    EXEC msdb.dbo.sp_update_job

    @job_name=N''BackupAndCheckBrowser'',

    @notify_email_operator_name=N''MSXOperator'' ;

    GO

    清单 22-12

    更新作业

    ```


    我们现在可以继续通过 Management Studio 将我们的 `BackupAndCheckBrowser` 作业转换为多服务器作业，方法是打开“作业属性”对话框并导航到“目标”页面。如图
    22-31 所示，我们可以使用此页面将作业更改为多服务器作业，并从已使用 `sp_msx_enlist` 存储过程登记的目标服务器列表中指定它应针对运行的目标服务器。关闭属性对话框后，该作业将针对
    `TargetServer1` 和 `TargetServer2` 实例运行，而不是 `MASTERSERVER` 实例。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig31_HTML.jpg](img/333037_2_En_22_Fig31_HTML.jpg)


    图 22-31：转换为多服务器作业


    要通过 T-SQL 实现相同的结果，我们使用 `sp_delete_jobserver` 系统存储过程来停止作业针对 MSX 运行，并使用 `sp_add_jobserver`
    系统存储过程来配置作业针对 TSX 运行。这两个过程都接受表 22-3 中详述的参数。


    表 22-3：`sp_delete_jobserver` 和 `sp_add_jobserver` 参数


    | 参数 | 描述 |

    | --- | --- |

    | `@job_id` | 您要转换为多服务器作业的作业的 GUID。如果为 `NULL`，则必须指定 `@job_name` 参数。 |

    | `@job_name` | 您要转换为多服务器作业的作业的名称。如果为 `NULL`，则必须指定 `@job_id` 参数。 |

    | `@server_name` | 您希望作业针对运行的服务器\实例名称。 |


    在我们的场景中，我们可以使用清单 22-13 中的脚本来转换作业。


    ```

    EXEC msdb.dbo.sp_delete_jobserver

    @job_name=N''BackupAndCheckBrowser'',

    @server_name = N''SQLSERVER\MASTERSERVER'' ;

    GO

    EXEC msdb.dbo.sp_add_jobserver

    @job_name=N''BackupAndCheckBrowser'',

    @server_name = N''SQLSERVER\TARGETSERVER1'' ;

    GO

    EXEC msdb.dbo.sp_add_jobserver

    @job_name=N''BackupAndCheckBrowser'',

    @server_name = N''SQLSERVER\TARGETSERVER2'' ;

    GO

    清单 22-13

    转换为多服务器作业

    ```


    # 管理目标服务器


    在配置 MSX 时，请确保考虑针对 TSX 的各种维护活动。这些活动包括轮询 TSX、跨服务器同步时间、运行临时作业以及使 TSX 脱离（取消登记）。


    我们可以在“目标服务器状态”对话框中完成这些任务。可以通过在 MSX 上右键单击 SQL Server Agent，选择“多服务器管理”->“管理目标服务器”来调用此对话框。此对话框的“目标服务器状态”选项卡如图
    22-32 所示。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig32_HTML.jpg](img/333037_2_En_22_Fig32_HTML.jpg)


    图 22-32：“目标服务器状态”选项卡


    在此选项卡上，我们可以使用“强制轮询”按钮使目标服务器轮询 MSX。当 TSX 轮询 MSX 时，我们强制它下载其配置为运行的作业的最新副本。如果您更新了主作业，这非常有用。


    “强制脱离”按钮会导致高亮显示的 TSX 从 MSX 取消登记。取消登记后，选定的 TSX 将不再轮询或运行多服务器作业。


    “发布指令”按钮调用“发布下载指令”对话框，您可以在其中向 TSX 发送以下指令之一：


    *   脱离

    *   设置轮询间隔

    *   同步时钟

    *   启动作业


    要同步所有服务器上的时间，您需要选择“同步时钟”指令类型，并确保在“收件人”部分选择了“所有目标服务器”，如图 22-33 所示。然后，当时钟在目标服务器下次轮询主服务器时进行同步。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig33_HTML.jpg](img/333037_2_En_22_Fig33_HTML.jpg)


    图 22-33：同步时钟


    在另一种场景中，可能有时我们希望临时运行 `BackupAndCheckBrowser` 作业到 `TARGETSERVER1`。我们可以通过选择“启动作业”作为指令类型，然后从“作业名称”下拉列表中选择我们的作业来实现这一点。然后，我们使用屏幕的“收件人”部分来选择
    `TARGETSERVER1`。如图 22-34 所示。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig34_HTML.jpg](img/333037_2_En_22_Fig34_HTML.jpg)


    图 22-34：在 TARGETSERVER1 上启动作业


    在“目标服务器状态”对话框的“下载指令”选项卡上，如图 22-35 所示，我们看到了已发送到目标的指令列表。我们可以使用屏幕顶部的下拉列表按作业或目标服务器筛选指令。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig35_HTML.jpg](img/333037_2_En_22_Fig35_HTML.jpg)


    图 22-35：“下载指令”选项卡'
- fmt: '## Summary


    SQL Server Agent is a scheduling engine for SQL Server that allows you to create
    powerful maintenance jobs, with decision-based logic, on a variety of schedules.
    A job is the container for the tasks that should be performed, and each of these
    tasks is known as a step. Each job step can run under the context of a different
    account and can run tasks under different subsystems, or types, such as T-SQL,
    PowerShell, operating system command, or SSIS package.


    A schedule is attached to a job and can be triggered at a specific date and time,
    when the CPU is idle, or on a reoccurring schedule, such as daily, weekly, or
    monthly. A schedule can also reoccur on an intraday basis, such as hourly, every
    minute, or even as frequently as every 10 seconds.


    An operator is an individual or team who is notified of the success or failure
    of jobs and if an alert fires. Operators can be notified of job status via e-mail,
    pager, or `NET SEND`; however, support for `NET SEND` and pager are deprecated.
    For an operator to be notified by e-mail, Database Mail must be configured so
    that e-mails can be sent via your SMTP Replay server.


    By default, jobs run under the context of the SQL Server Agent service account.
    However, for good security practice, you should consider using proxy accounts
    to run the job steps. Proxy accounts map to credentials at the instance level,
    which in turn map to a Windows-level security principle. Proxies can be used for
    all subsystems, except T-SQL. T-SQL job steps use `EXECUTE AS` to execute the
    commands under the context of a database user. This is configured using the Run
    As property.


    Alerts can be triggered when an error or warning is fired within the Database
    Engine, when a WMI event occurs, or in response to a performance condition being
    met. When an alert fires, responses include notifying an operator or running a
    job to resolve an issue.


    Multiserver jobs allow DBAs to run jobs consistently across their enterprise.
    In a multiserver scenario, there is a master server (MSX), in which jobs are created
    and modified, and multiple target servers (TSXs). The TSXs periodically poll the
    MSX and retrieve a list of jobs that they should be running.


    # 23. Policy-Based Management


    Policy-Based Management (PBM) is a system DBAs can use to report on or enforce
    standards across the enterprise, when used with a central management server. This
    chapter first introduces you to the concepts used by PBM and then demonstrates
    how to use PBM to effectively manage an estate through the GUI and with PowerShell.


    ## PBM Concepts


    Policy-Based Management uses the concepts of `Targets`, `Facets`, `Conditions`,
    and `Policies`. `Targets` are entities PBM manages, such as databases or tables.
    `Facets` are collections of properties that relate to a target. For example, the
    database facet includes a property relating to the name of the database. `Conditions`
    are Boolean expressions that can be evaluated against a property. `Policies` bind
    conditions to targets. The following sections discuss each of these concepts.


    ### Facets


    A facet is a collection of properties that relate to a type of target, such as
    `View`, which has properties including `IsSchemaBound`, `HasIndex`, and `HasAfterTrigger`;
    `Database Role`, which has properties including `Name Owner` and `IsFixedRole`;
    and `Index`, which has properties including `IsClustered`, `IsPartitioned`, and
    `IsUnique`. The `Index` facet also exposes properties relating to geospatial indexes,
    memory-optimized indexes, XML indexes, and full-text indexes. Other notable facets
    include `Database`, `StoredProcedure`, `SurfaceAreaConfiguration`, `LinkedServer`,
    and `Audit`. SQL Server 2019 provides 96 facets in all, and you can find a complete
    list within the “Evaluation Modes” section of this chapter. You can also access
    a list of facets by running the command in Listing 23-1.


    ```sql

    SELECT name

    FROM msdb.dbo.syspolicy_management_facets ;

    ```

    Listing 23-1: Finding a List of Facets


    ### Conditions


    A condition is a Boolean expression that is evaluated against an object property
    to determine whether or not it matches your requirement. Each facet contains multiple
    properties that you can create conditions against, but each condition can only
    access properties from a single facet. Conditions can be evaluated against the
    following operators:


    *   `=`

    *   `!=`

    *   `LIKE`

    *   `NOT LIKE`

    *   `IN`

    *   `NOT IN`


    For example, you can use the `LIKE` operator to ensure that all database names
    begin with `Chapter` by using the following expression `Database.Name LIKE ''Chapter%''`.


    ### Targets


    A target is an entity to which a policy can be applied. This can be a table, a
    database, an entire instance, or most other objects within SQL Server. When adding
    targets to a policy, you can use conditions to limit the number of targets. This
    means, for example, if you create a policy to enforce database naming conventions
    on an instance, you can use a condition to avoid checking the policy against database
    names that contain the words “SharePoint,” “bdc,” or “wss,” since these are your
    SharePoint databases and they may contain GUIDs that may be disallowed under your
    standard naming conventions.


    ### Policies


    A policy contains one condition and binds it to one or more targets (targets may
    also be filtered by separate conditions) and an evaluation mode. Depending on
    the evaluation mode you select, the policy may also contain a schedule on which
    you would like the policy to be checked. Policies support four evaluation modes,
    which are discussed in the following section.


    ### Evaluation Modes


    Policies support between one and four evaluation modes, depending on which facet
    you use within the condition. The following are the evaluation modes:


    *   `On Demand`

    *   `On Schedule`

    *   `On Change: Log Only`

    *   `On Change: Prevent`


    If the evaluation mode is configured as `On Demand`, then the policies are only
    evaluated when you (the DBA) manually evaluate them. If the evaluation mode is
    configured as `On Schedule`, then you create a schedule when you create the policy;
    this causes the policy to be evaluated periodically.


    ### Tip


    A policy can be evaluated `On Demand` even if it has been configured with a different
    evaluation mode.


    If you select the `On Change: Log Only` evaluation mode, then whenever the relevant
    property of a target changes, the result of the policy validation is logged to
    the SQL Server log. In the event that the policy is fired but not validated, a
    message is generated in the log. This occurs when a target has been configured
    in such a way that one of your policies is violated. If the policy is violated,
    then Error 34053 is thrown with a severity level of 16 (meaning the problem can
    be fixed by the user).


    ### Tip


    When you create an object, this causes the properties to be evaluated in the same
    way that they are when an existing object’s properties are altered.


    If you choose `On Change: Prevent` as the evaluation mode, then when a property
    is changed, SQL Server evaluates the property, and if there is a violation, an
    error message is thrown and the statement that caused the policy violation is
    rolled back.


    Because policies work based on DDL events being fired, depending on the properties
    within the facet, not all evaluation modes can be implemented for all facets.
    The rules for working out the evaluation modes supported by a specific facet are
    rather opaque, so you can discover them by running the query in Listing 23-2.


    ```sql

    SELECT

    name ,

    ''Yes'' AS on_demand,

    CASE

    WHEN (CONVERT(BIT, execution_mode & 4)) = 1

    THEN ''Yes''

    ELSE ''No''

    END  AS on_schedule,

    CASE

    WHEN (CONVERT(BIT, execution_mode & 2)) = 1

    THEN ''Yes''

    ELSE ''No''

    END  AS on_change_log,

    CASE

    WHEN (CONVERT(BIT, execution_mode & 1)) = 1

    THEN ''Yes''

    ELSE ''No''

    END  AS on_change_prevent

    FROM msdb.dbo.syspolicy_management_facets ;

    ```

    Listing 23-2: Listing Supported Execution Types per Facet'
