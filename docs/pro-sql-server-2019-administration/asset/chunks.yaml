  trans: '

    ### 筛选索引


    筛选索引是建立在表中存储的数据子集上的索引，而不是建立在表的全部数据上。因为索引更小，它们可以带来查询性能的提升和存储成本的降低。它们还可能减少对 DML
    操作的开销，因为只有当 DML 操作影响到索引内的数据时，才需要更新索引。例如，如果一个索引筛选条件为 `OrderDate >= ''2019-01-01''
    AND OrderDate <= ''2019-12-31''`，随后更新了表中所有 `OrderDate >= ''2020-01-01''` 的行，那么该更新操作的性能将与索引不存在时相同。


    筛选索引是通过在创建索引时使用 `WHERE` 子句来构建的。在 `WHERE` 子句中可以进行许多操作，例如筛选 `NULL` 或 `NOT NULL`
    值；使用等于和不等于运算符，如 `=`、`>`、`<` 和 `IN`；以及使用逻辑运算符，如 `AND` 和 `OR`。然而，也存在一些限制。例如，不能使用
    `BETWEEN`、`CASE` 或 `NOT IN`。此外，只能使用简单的谓词；例如，禁止使用日期/时间函数，因此无法创建滚动筛选器。也不能将列与其他列进行比较。


    清单 8-5 中的语句在 `DeliveryDate` 列上创建了一个筛选索引，条件为值是 `NULL`。这允许你对运行以确定哪些订单尚未安排交付的查询进行性能优化。


    ```

    CREATE NONCLUSTERED INDEX NonDeliveredItems ON dbo.OrdersDisk(DeliveryDate)

    WHERE DeliveryDate IS NULL ;

    Listing 8-5

    创建筛选索引

    ```


    ### 专业应用的索引


    除了传统的 B 树索引外，SQL Server 还提供了几种特殊类型的索引，以帮助提升针对内存优化表的查询性能，以及有助于数据仓库场景查询性能的列存储索引。以下各节将讨论这些特殊索引。虽然超出了本书的范围，但
    SQL Server 还为地理空间数据、XML 和 JSON 提供了特殊索引。


    ### 列存储索引


    正如你所见，传统的索引在数据页上存储数据行。这被称为 `行存储`。SQL Server 还支持 `列存储` 索引。这些索引将数据翻转过来，使用一个页来存储一个列，而不是一组行。这在图
    8-5 中进行了说明。


    ![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig5_HTML.jpg](img/333037_2_En_8_Fig5_HTML.jpg)


    图 8-5

    列存储索引结构


    列存储索引将表中的行切片成每个 102,400 到 1,048,576 行之间的块。每个切片称为一个 `行组`。每个行组中的数据随后被按列拆分，并使用 VertiPaq
    技术进行压缩。行组内的每个列称为一个 `列段`。


    在适当的应用场景下，列存储索引相对于传统索引提供了若干优势。首先，由于它们是高度压缩的，可以提高 IO 效率并减少内存开销。它们能够实现如此高的压缩率，是因为单列内的数据在行与行之间通常非常相似。此外，因为查询能够仅检索其所需列的数据页，IO
    可以再次减少。这甚至得到了进一步的帮助，因为每个列段都包含一个带有段内数据元数据的标头。这意味着 SQL Server 可以仅访问其需要的段，而不是整个列。为了支持列存储索引，还引入了一种新的查询执行机制。它被称为批处理执行模式，允许以
    1000 行为一块处理数据，而不是逐行处理。这意味着 CPU 使用率要高效得多。然而，列存储索引并非万能药，它们的设计目标是优化针对超大型表执行只读操作的数据仓库型查询。OLTP
    型查询不太可能看到任何益处，在某些情况下，执行速度甚至可能更慢。SQL Server 同时支持聚集和非聚集列存储索引，这些将在以下各节中讨论。

    '
- fmt: '# Columnstore 索引


    ## 聚集列存储索引


    聚集列存储索引将整个表以列存储格式存储。对于具有聚集列存储索引的表，没有传统的行存储；但是，新插入到表中的行可能会暂时放置在一个称为*deltastore*的行存储表中。这是为了防止列存储索引碎片化并增强
    DML 操作的性能。图 [8-6](#333037_2_En_8_Chapter.xhtml#Fig6) 中的图示说明了这一点。


    ![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig6_HTML.jpg](images/333037_2_En_8_Chapter/333037_2_En_8_Fig6_HTML.jpg)


    图 8-6


    具有 deltastore 的聚集列存储索引


    该图显示，当数据插入到聚集列存储索引时，SQL Server 会评估行数。如果行数足够多以达到良好的压缩率，SQL Server 会将它们视为一个或多个行组，并立即压缩它们并将其添加到列存储索引中。然而，如果行数太少，SQL
    Server 会将它们插入到内部的 deltastore 结构中。当您对表运行查询时，数据库引擎会无缝地连接这些结构并将结果作为一个整体返回。一旦有足够的行，deltastore
    就会被标记为关闭，一个称为*tuple mover*的后台进程会将这些行压缩到列存储索引的一个行组中。


    每个聚集列存储索引可以有多个 deltastore。这是因为当 SQL Server 确定插入操作需要使用 deltastore 时，它会尝试访问现有的 deltastore。然而，如果所有现有的
    deltastore 都被锁定，那么就会创建一个新的，而不是强制查询等待锁释放。


    在聚集列存储索引中删除行时，该行仅被逻辑删除。数据在物理上仍保留在行组中，直到下次重建索引。SQL Server 维护一个指向已删除行的 B 树结构，以便轻松识别它们。如果被删除的行位于
    deltastore 中而不是索引本身，则会被立即物理和逻辑删除。当您在聚集列存储索引中更新一行时，SQL Server 会将该行标记为逻辑删除，并在 deltastore
    中插入一个包含该行新值的新行。


    您可以使用 `CREATE CLUSTERED COLUMNSTORE INDEX` 语句创建聚集列存储索引。清单 [8-6](#333037_2_En_8_Chapter.xhtml#PC6)
    中的脚本将 `OrdersDisk` 表的内容复制到一个名为 `OrdersColumnstore` 的新表中，然后在该表上创建聚集列存储索引。创建索引时，您无需指定键列；这是因为所有列都被添加到列存储索引内的列段中。然后，您的查询可以使用该索引在需要满足查询的任何列上进行搜索。聚集列存储索引是表上唯一的索引。您无法创建传统的非聚集索引或非聚集列存储索引。此外，表不能有主键、外键或唯一约束。


    ```sql

    SELECT * INTO dbo.OrdersColumnstore

    FROM dbo.OrdersDisk ;

    GO

    CREATE CLUSTERED COLUMNSTORE INDEX CCI_OrdersColumnstore ON dbo.OrdersColumnstore
    ;

    Listing 8-6

    创建聚集列存储索引

    ```


    使用列存储索引时，并非所有数据类型都受支持。无法在包含以下数据类型的表上创建聚集列存储索引：


    *   `TEXT`

    *   `NTEXT`

    *   `IMAGE`

    *   `VARCHAR(MAX)`

    *   `NVARCHAR(MAX)`

    *   `ROWVERSION`

    *   `SQL_VARIANT`

    *   `HIERARCHYID`

    *   `GEOGRAPHY`

    *   `GEOMETRY`

    *   `XML`


    ## 非聚集列存储索引


    非聚集列存储索引不可更新。这意味着如果您在表上创建了非聚集列存储索引，该表将变为只读。更新或删除该表中数据的唯一方法是先删除或禁用列存储索引，然后在 DML
    过程完成后重新创建它。要向具有非聚集列存储索引的表中插入数据，您必须首先删除或禁用列存储索引，或者使用分区切换来导入数据。分区切换在第 [7](#333037_2_En_7_Chapter.xhtml)
    章中讨论。


    当表支持多种工作负载时，使用非聚集列存储索引代替聚集列存储索引是合适的。在此场景中，非聚集列存储索引支持实时分析，而 OLTP 风格的查询可以利用传统的聚集索引。


    清单 [8-7](#333037_2_En_8_Chapter.xhtml#PC7) 中的语句在 `CustomersDisk` 表的 `FirstName`、`LastName`、`Balance`
    和 `CustomerID` 列上创建了一个非聚集列存储索引。从创建此索引可以看出，与聚集列存储索引不同，非聚集列存储索引可以与传统索引共存，并且在本例中，我们甚至覆盖了一些相同的列。


    ```sql

    CREATE NONCLUSTERED COLUMNSTORE INDEX NCCI_FirstName_LastName_Balance_CustomerID

    ON dbo.CustomersDisk(FirstName,LastName,Balance,CustomerID) ;

    Listing 8-7

    创建非聚集列存储索引

    ```


    ## 内存索引


    正如我们在第 [7](#333037_2_En_7_Chapter.xhtml) 章中看到的，SQL Server 为内存优化表提供了两种索引类型：非聚集索引和非聚集哈希索引。每个内存优化表必须至少有一个索引，并且最多可以支持八个。所有内存索引都覆盖表中的所有列，因为它们使用内存指针链接到数据行。


    内存优化表上的索引必须在 `CREATE TABLE` 语句中创建。没有用于内存索引的 `CREATE INDEX` 语句。基于内存优化表构建的索引始终仅存储在内存中，并且无论表的持久性设置如何，都永远不会持久化到磁盘。然后，它们会在实例从表的底层数据重新启动后重新创建。您无需担心内存索引的碎片，因为它们从不具有基于磁盘的结构。'
  raw: '### Clustered Columnstore Indexes


    Clustered Columnstore indexes cause the entire table to be stored in a Columnstore
    format. There is no traditional rowstore storage for a table with a clustered
    Columnstore index; however, new rows that are inserted into the table may temporarily
    be placed into a rowstore table, called a *deltastore*. This is to prevent the
    Columnstore index from becoming fragmented and to enhance performance for DML
    operations. The diagram in Figure [8-6](#333037_2_En_8_Chapter.xhtml#Fig6) illustrates
    this.


    ![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig6_HTML.jpg](images/333037_2_En_8_Chapter/333037_2_En_8_Fig6_HTML.jpg)


    Figure 8-6


    Clustered columnstore index with deltastores


    The diagram shows that when data is inserted into a clustered Columnstore index,
    SQL Server assesses the number of rows. If the number of rows is high enough to
    achieve a good compression rate, SQL Server treats them as a rowgroup or rowgroups
    and immediately compresses them and adds them to the Columnstore index. If there
    are too few rows however, SQL Server inserts them into the internal deltastore
    structure. When you run a query against the table, the database engine seamlessly
    joins the structures together and returns the results as one. Once there are enough
    rows, the deltastore is marked as closed and a background process called the *tuple*
    compresses the rows into a rowgroup in the Columnstore index.


    There can be multiple deltastores for each clustered Columnstore index. This is
    because when SQL Server determines that an insert warrants using a deltastore,
    it attempts to access the existing deltastores. If all existing deltastores are
    locked, however, then a new one is created, instead of the query being forced
    to wait for a lock to be released.


    When a row is deleted in a clustered Columnstore index, then the row is only logically
    removed. The data still physically stays in the rowgroup until the next time the
    index is rebuilt. SQL Server maintains a B-tree structure of pointers to deleted
    rows in order to easily identify them. If the row being deleted is located in
    a deltastore, as opposed to the index itself, then it is immediately deleted,
    both logically and physically. When you update a row in a clustered Columnstore
    index, then SQL Server marks the row as being logically deleted and inserts a
    new row into a deltastore, which contains the new values for the row.


    You can create clustered Columnstore indexes using a `CREATE CLUSTERED COLUMNSTORE
    INDEX` statement. The script in Listing [8-6](#333037_2_En_8_Chapter.xhtml#PC6)
    copies the contents of the `OrdersDisk` table to a new table called `OrdersColumnstore`
    and then creates a clustered Columnstore index on the table. When you create the
    index, you do not need to specify a key column; this is because all of the columns
    are added to column segments within the Columnstore index. Your queries can then
    use the index to search on whichever column(s) it needs to satisfy the query.
    The clustered Columnstore index is the only index on the table. You are not able
    to create traditional nonclustered indexes or a nonclustered Columnstore index.
    Additionally, the table must not have primary key, foreign key, or unique constraints.


    ```

    SELECT * INTO dbo.OrdersColumnstore

    FROM dbo.OrdersDisk ;

    GO

    CREATE CLUSTERED COLUMNSTORE INDEX CCI_OrdersColumnstore ON dbo.OrdersColumnstore
    ;

    Listing 8-6

    Creating a Clustered Columnstore Index

    ```


    Not all data types are supported when you are using Columnstore indexes. It is
    not possible to create a clustered Columnstore index on tables that contain the
    following data types:


    *   `TEXT`


    *   `NTEXT`


    *   `IMAGE`


    *   `VARCHAR(MAX)`


    *   `NVARCHAR(MAX)`


    *   `ROWVERSION`


    *   `SQL_VARIANT`


    *   `HIERARCHYID`


    *   `GEOGRAPHY`


    *   `GEOMETRY`


    *   `XML`


    ### Nonclustered Columnstore Indexes


    Nonclustered Columnstore indexes are not updatable. This means that if you create
    a nonclustered Columnstore index on a table, that table becomes read-only. The
    only way you can update or delete data from that table is to first drop or disable
    the Columnstore index and then re-create it once the DML process has completed.
    To insert data into a table with a nonclustered Columnstore index, you must first
    either drop or disable the Columnstore index or, alternatively, use partition
    switching to bring the data in. Partition switching is discussed in Chapter [7](#333037_2_En_7_Chapter.xhtml)*.*


    It is appropriate to use a nonclustered Columnstore index instead of a clustered
    Columnstore index when the table supports multiple workload profiles. In this
    scenario, the nonclustered Columnstore index supports real-time analytics, whereas
    OLTP-style queries can make use of a traditional clustered index.


    The statement in Listing [8-7](#333037_2_En_8_Chapter.xhtml#PC7) creates a nonclustered
    Columnstore index on the `FirstName`, `LastName`, `Balance`, and `CustomerID`
    columns of the `CustomersDisk` table. You can see from our creation of this index
    that unlike clustered Columnstore indexes, nonclustered Columnstore indexes can
    coexist with traditional indexes, and, in this case, we even cover some of the
    same columns.


    ```

    CREATE NONCLUSTERED COLUMNSTORE INDEX NCCI_FirstName_LastName_Balance_CustomerID

    ON dbo.CustomersDisk(FirstName,LastName,Balance,CustomerID) ;

    Listing 8-7

    Creating Nonclustered Columnstore Indexes

    ```


    ### In-Memory Indexes


    As we saw in Chapter [7](#333037_2_En_7_Chapter.xhtml), SQL Server provides two
    types of index for memory-optimized tables: nonclustered and nonclustered hash.
    Every memory-optimized table must have a minimum of one index and can support
    a maximum of eight. All in-memory indexes cover all columns in the table, because
    they use a memory pointer to link to the data row.


    Indexes on memory-optimized tables must be created in the `CREATE TABLE` statement.
    There is no `CREATE INDEX` statement for in-memory indexes. Indexes built on memory-optimized
    tables are always stored in memory only and are never persisted to disk, regardless
    of your table’s durability setting. They are then re-created after the instance
    restarts from the table’s underlying data. You do not need to worry about fragmentation
    of in-memory indexes, since they never have a disk-based structure.'
  trans: '# 列存储索引


    ## 聚集列存储索引


    聚集列存储索引将整个表以列存储格式存储。对于具有聚集列存储索引的表，没有传统的行存储；但是，新插入到表中的行可能会暂时放置在一个称为*deltastore*的行存储表中。这是为了防止列存储索引碎片化并增强
    DML 操作的性能。图 8-6 中的图示说明了这一点。


    ![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig6_HTML.jpg](img/333037_2_En_8_Fig6_HTML.jpg)


    图 8-6


    具有增量存储的聚集列存储索引


    该图显示，当数据插入到聚集列存储索引时，SQL Server 会评估行数。如果行数足够多以达到良好的压缩率，SQL Server 会将它们视为一个或多个行组，并立即压缩它们并将其添加到列存储索引中。然而，如果行数太少，SQL
    Server 会将它们插入到内部的增量存储结构中。当您对表运行查询时，数据库引擎会无缝地连接这些结构并将结果作为一个整体返回。一旦有足够的行，增量存储就会被标记为关闭，一个称为*元组移动器*的后台进程会将这些行压缩到列存储索引的一个行组中。


    每个聚集列存储索引可以有多个增量存储。这是因为当 SQL Server 确定插入操作需要使用增量存储时，它会尝试访问现有的增量存储。然而，如果所有现有的增量存储都被锁定，那么就会创建一个新的，而不是强制查询等待锁释放。


    在聚集列存储索引中删除行时，该行仅被逻辑删除。数据在物理上仍保留在行组中，直到下次重建索引。SQL Server 维护一个指向已删除行的 B 树结构，以便轻松识别它们。如果被删除的行位于增量存储中而不是索引本身，则会被立即物理和逻辑删除。当您在聚集列存储索引中更新一行时，SQL
    Server 会将该行标记为逻辑删除，并在增量存储中插入一个包含该行新值的新行。


    您可以使用 `CREATE CLUSTERED COLUMNSTORE INDEX` 语句创建聚集列存储索引。清单 8-6 中的脚本将 `OrdersDisk`
    表的内容复制到一个名为 `OrdersColumnstore` 的新表中，然后在该表上创建聚集列存储索引。创建索引时，您无需指定键列；这是因为所有列都被添加到列存储索引内的列段中。然后，您的查询可以使用该索引在需要满足查询的任何列上进行搜索。聚集列存储索引是表上唯一的索引。您无法创建传统的非聚集索引或非聚集列存储索引。此外，表不能有主键、外键或唯一约束。


    ```sql

    SELECT * INTO dbo.OrdersColumnstore

    FROM dbo.OrdersDisk ;

    GO

    CREATE CLUSTERED COLUMNSTORE INDEX CCI_OrdersColumnstore ON dbo.OrdersColumnstore
    ;

    清单 8-6

    创建聚集列存储索引

    ```


    使用列存储索引时，并非所有数据类型都受支持。无法在包含以下数据类型的表上创建聚集列存储索引：


    *   `TEXT`

    *   `NTEXT`

    *   `IMAGE`

    *   `VARCHAR(MAX)`

    *   `NVARCHAR(MAX)`

    *   `ROWVERSION`

    *   `SQL_VARIANT`

    *   `HIERARCHYID`

    *   `GEOGRAPHY`

    *   `GEOMETRY`

    *   `XML`


    ## 非聚集列存储索引


    非聚集列存储索引不可更新。这意味着如果您在表上创建了非聚集列存储索引，该表将变为只读。更新或删除该表中数据的唯一方法是先删除或禁用列存储索引，然后在 DML
    过程完成后重新创建它。要向具有非聚集列存储索引的表中插入数据，您必须首先删除或禁用列存储索引，或者使用分区切换来导入数据。分区切换在第 7 章中讨论。


    当表支持多种工作负载时，使用非聚集列存储索引代替聚集列存储索引是合适的。在此场景中，非聚集列存储索引支持实时分析，而 OLTP 风格的查询可以利用传统的聚集索引。


    清单 8-7 中的语句在 `CustomersDisk` 表的 `FirstName`、`LastName`、`Balance` 和 `CustomerID`
    列上创建了一个非聚集列存储索引。从创建此索引可以看出，与聚集列存储索引不同，非聚集列存储索引可以与传统索引共存，并且在本例中，我们甚至覆盖了一些相同的列。


    ```sql

    CREATE NONCLUSTERED COLUMNSTORE INDEX NCCI_FirstName_LastName_Balance_CustomerID

    ON dbo.CustomersDisk(FirstName,LastName,Balance,CustomerID) ;

    清单 8-7

    创建非聚集列存储索引

    ```


    ## 内存优化索引


    正如我们在第 7 章中看到的，SQL Server 为内存优化表提供了两种索引类型：非聚集索引和非聚集哈希索引。每个内存优化表必须至少有一个索引，并且最多可以支持八个。所有内存优化索引都覆盖表中的所有列，因为它们使用内存指针链接到数据行。


    内存优化表上的索引必须在 `CREATE TABLE` 语句中创建。没有用于内存优化索引的 `CREATE INDEX` 语句。基于内存优化表构建的索引始终仅存储在内存中，并且无论表的持久性设置如何，都永远不会持久化到磁盘。然后，它们会在实例从表的底层数据重新启动后重新创建。您无需担心内存优化索引的碎片，因为它们从不具有基于磁盘的结构。'
- fmt: "## In-Memory Nonclustered Hash Indexes\n\nA nonclustered hash index consists\
    \ of an array of buckets. A hash function is run on each of the index keys, and\
    \ then the hashed key values are placed into the buckets. The hashing algorithm\
    \ used is deterministic, meaning that index keys with the same value always have\
    \ the same hash value. This is important because repeated hash values are always\
    \ placed in the same hash bucket. When many keys are in the same hash bucket,\
    \ performance of the index can degrade, because the whole chain of duplicates\
    \ needs to be scanned to find the correct key. Therefore, if you are building\
    \ a hash index on a nonunique column with many repeated keys, you should create\
    \ the index with a much larger number of buckets. This should be in the realm\
    \ of 20 to 100 times the number of distinct key values, as opposed to 2 times\
    \ the number of unique keys that is usually recommended for unique indexes. Alternatively,\
    \ using a nonclustered index on a nonunique column may offer a better solution.\
    \ The second consequence of the hash function being deterministic is that different\
    \ versions of the same row are always stored in the same hash bucket.\n\nEven\
    \ in the case of a unique index where only a single, current row version exists,\
    \ the distribution of hashed values into buckets is not even, and if there are\
    \ an equal number of buckets to unique key values, then approximately one third\
    \ of the buckets is empty, one third contains a single value, and one third contains\
    \ multiple values. When multiple values share a bucket, it is known as a `hash\
    \ collision`, and a large number of `hash collision`s can lead to reduced performance.\
    \ Hence the recommendation for the number of buckets in a unique index being twice\
    \ the number of unique values expected in the table.\n\n### Tip\n\nWhen you have\
    \ a unique nonclustered hash index, in some cases, many unique values may hash\
    \ to the same bucket. If you experience this, then increasing the number of buckets\
    \ helps, in the same way that a nonunique index does.\n\nAs an example, if your\
    \ table has 1 million rows, and the indexed column is unique, the optimum number\
    \ of buckets, known as the `BUCKET_COUNT`, is 2 million. If you know that you\
    \ expect your table to grow to 2 million rows, however, then it may be prudent\
    \ to create 4 million hash buckets. This number of buckets is low enough to not\
    \ have an impact on memory. It also still allows for the expected increase in\
    \ rows, without there being too few buckets, which would impair performance. An\
    \ illustration of potential mappings between index values and hash buckets is\
    \ shown in Figure [8-7](#333037_2_En_8_Chapter.xhtml#Fig7).\n\n### Tip\n\nThe\
    \ amount of memory used by a nonclustered hash index always remains static, since\
    \ the number of buckets does not change.\n\n![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig7_HTML.jpg](images/333037_2_En_8_Chapter/333037_2_En_8_Fig7_HTML.jpg)\n\
    \nFigure 8-7\n\nMappings to a nonclustered hash index\n\nHash indexes are optimized\
    \ for seek operations with the `=` predicate. For the seek operation, however,\
    \ the full index key must be present in the predicate evaluation. If it is not,\
    \ a full index scan is required. An index scan is also required if inequality\
    \ predicates such as `<` or `>` are used. Also, because the index is not ordered,\
    \ the index cannot return the data in the sort order of the index key.\n\n###\
    \ Note\n\nYou may remember that in Chapter [7](#333037_2_En_7_Chapter.xhtml),\
    \ we witnessed superior performance from a disk-based table than from a memory-optimized\
    \ table. This is explained by using the `>` predicate in our query; this meant\
    \ that although the disk-based index was able to perform an index seek, our memory-optimized\
    \ hash index had to perform an index scan.\n\nLet’s now create a memory-optimized\
    \ version of our `OrdersDisk` table, which includes a nonclustered hash index\
    \ on the `OrderID` column, using the script in Listing [8-8](#333037_2_En_8_Chapter.xhtml#PC8).\
    \ Initially, this row has 1 million rows, but we expect the number to grow to\
    \ 2 million, so we use a `BUCKET_COUNT` of 4 million.\n\n```\nCREATE TABLE dbo.OrdersMemHash\n\
    (\n    OrderNumber    INT    NOT NULL    IDENTITY    PRIMARY KEY\n        NONCLUSTERED\
    \ HASH WITH(BUCKET_COUNT = 4000000),\n    OrderDate      DATE    NOT NULL,\n \
    \   CustomerID     INT     NOT NULL,\n    ProductID      INT     NOT NULL,\n \
    \   Quantity       INT     NOT NULL,\n    NetAmount      MONEY   NOT NULL,\n \
    \   DeliveryDate   DATE    NULL,\n) WITH(MEMORY_OPTIMIZED = ON, DURABILITY = SCHEMA_AND_DATA)\
    \ ;\n\nINSERT INTO dbo.OrdersMemHash(OrderDate,CustomerID,ProductID,Quantity,NetAmount,DeliveryDate)\n\
    SELECT OrderDate\n      ,CustomerID\n      ,ProductID\n      ,Quantity\n     \
    \ ,NetAmount\n      ,DeliveryDate\nFROM dbo.OrdersDisk ;\n```\nListing 8-8\nCreating\
    \ a Table with a Nonclustered Hash Index\n\nIf we now wish to add an additional\
    \ index to the table, we need to drop and re-create it. We already have data in\
    \ the table, however, so we first need to create a temp table and copy the data\
    \ in so that we can drop and re-create the memory-optimized table. The script\
    \ in Listing [8-9](#333037_2_En_8_Chapter.xhtml#PC9) adds a nonclustered index\
    \ to the `OrderDate` column.\n\n```\n--Create and populate temp table\nSELECT\
    \ * INTO #OrdersMemHash\nFROM dbo.OrdersMemHash ;\n\n--Drop existing table\nDROP\
    \ TABLE dbo.OrdersMemHash ;\n\n--Re-create the table with the new index\nCREATE\
    \ TABLE dbo.OrdersMemHash\n(\n    OrderNumber     INT     NOT NULL    IDENTITY\
    \    PRIMARY KEY\n        NONCLUSTERED HASH WITH(BUCKET_COUNT = 4000000),\n  \
    \  OrderDate       DATE    NOT NULL     INDEX NCI_OrderDate NONCLUSTERED,\n  \
    \  CustomerID      INT     NOT NULL,\n    ProductID       INT     NOT NULL,\n\
    \    Quantity        INT     NOT NULL,\n    NetAmount       MONEY   NOT NULL,\n\
    \    DeliveryDate    DATE    NULL,\n) WITH(MEMORY_OPTIMIZED = ON, DURABILITY =\
    \ SCHEMA_AND_DATA) ;\nGO\n\n--Allow values to be inserted into the identity column\n\
    SET IDENTITY_INSERT OrdersMemHash ON ;\nGO\n\n--Repopulate the table\nINSERT INTO\n\
    dbo.OrdersMemHash(OrderNumber,OrderDate,CustomerID,ProductID,Quantity,NetAmount,DeliveryDate)\n\
    SELECT *\nFROM #OrdersMemHash ;\n\n--Stop further inserts to the identity column\
    \ and clean up temp table\nSET IDENTITY_INSERT OrdersMemHash OFF ;\n\nDROP TABLE\
    \ #OrdersMemHash ;\n```\nListing 8-9\nAdding an Index to a Memory-Optimized Table\n\
    \nWe can examine the distribution of the values in our hash index by interrogating\
    \ the `sys.dm_db_xtp_hash_index_stats` DMV. The query in Listing [8-10](#333037_2_En_8_Chapter.xhtml#PC10)\
    \ demonstrates using this DMV to view the number of hash collisions and calculate\
    \ the percentage of empty buckets.\n\n```\nSELECT\n    OBJECT_SCHEMA_NAME(HIS.OBJECT_ID)\
    \ + '.' + OBJECT_NAME(HIS.OBJECT_ID) 'Table Name',\n    I.name as 'Index Name',\n\
    \    HIS.total_bucket_count,\n    HIS.empty_bucket_count,\n    FLOOR((CAST(empty_bucket_count\
    \ AS FLOAT)/total_bucket_count) * 100) 'Empty Bucket Percentage',\n    total_bucket_count\
    \ - empty_bucket_count 'Used Bucket Count',\n    HIS.avg_chain_length,\n    HIS.max_chain_length\n\
    FROM sys.dm_db_xtp_hash_index_stats AS HIS\nINNER JOIN sys.indexes AS I\n    ON\
    \ HIS.object_id = I.object_id\n    AND HIS.index_id = I.index_id ;\n```\nListing\
    \ 8-10\n`sys.dm_db_xtp_hash_index_stats`"
  raw: '#### In-Memory Nonclustered Hash Indexes


    A nonclustered hash index consists of an array of buckets. A hash function is
    run on each of the index keys, and then the hashed key values are placed into
    the buckets. The hashing algorithm used is deterministic, meaning that index keys
    with the same value always have the same hash value. This is important because
    repeated hash values are always placed in the same hash bucket. When many keys
    are in the same hash bucket, performance of the index can degrade, because the
    whole chain of duplicates needs to be scanned to find the correct key. Therefore,
    if you are building a hash index on a nonunique column with many repeated keys,
    you should create the index with a much larger number of buckets. This should
    be in the realm of 20 to 100 times the number of distinct key values, as opposed
    to 2 times the number of unique keys that is usually recommended for unique indexes.
    Alternatively, using a nonclustered index on a nonunique column may offer a better
    solution. The second consequence of the hash function being deterministic is that
    different versions of the same row are always stored in the same hash bucket.


    Even in the case of a unique index where only a single, current row version exists,
    the distribution of hashed values into buckets is not even, and if there are an
    equal number of buckets to unique key values, then approximately one third of
    the buckets is empty, one third contains a single value, and one third contains
    multiple values. When multiple values share a bucket, it is known as a *hash collision*,
    and a large number of hash collisions can lead to reduced performance. Hence the
    recommendation for the number of buckets in a unique index being twice the number
    of unique values expected in the table.


    ### Tip


    When you have a unique nonclustered hash index, in some cases, many unique values
    may hash to the same bucket. If you experience this, then increasing the number
    of buckets helps, in the same way that a nonunique index does.


    As an example, if your table has 1 million rows, and the indexed column is unique,
    the optimum number of buckets, known as the `BUCKET_COUNT`, is 2 million. If you
    know that you expect your table to grow to 2 million rows, however, then it may
    be prudent to create 4 million hash buckets. This number of buckets is low enough
    to not have an impact on memory. It also still allows for the expected increase
    in rows, without there being too few buckets, which would impair performance.
    An illustration of potential mappings between index values and hash buckets is
    shown in Figure [8-7](#333037_2_En_8_Chapter.xhtml#Fig7).


    ### Tip


    The amount of memory used by a nonclustered hash index always remains static,
    since the number of buckets does not change.


    ![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig7_HTML.jpg](images/333037_2_En_8_Chapter/333037_2_En_8_Fig7_HTML.jpg)


    Figure 8-7


    Mappings to a nonclustered hash index


    Hash indexes are optimized for seek operations with the `=` predicate. For the
    seek operation, however, the full index key must be present in the predicate evaluation.
    If it is not, a full index scan is required. An index scan is also required if
    inequality predicates such as `<` or `>` are used. Also, because the index is
    not ordered, the index cannot return the data in the sort order of the index key.


    ### Note


    You may remember that in Chapter [7](#333037_2_En_7_Chapter.xhtml), we witnessed
    superior performance from a disk-based table than from a memory-optimized table.
    This is explained by using the > predicate in our query; this meant that although
    the disk-based index was able to perform an index seek, our memory-optimized hash
    index had to perform an index scan.


    Let’s now create a memory-optimized version of our `OrdersDisk` table, which includes
    a nonclustered hash index on the `OrderID` column, using the script in Listing
    [8-8](#333037_2_En_8_Chapter.xhtml#PC8). Initially, this row has 1 million rows,
    but we expect the number to grow to 2 million, so we use a `BUCKET_COUNT` of 4
    million.


    ```

    CREATE TABLE dbo.OrdersMemHash

    (

    OrderNumber    INT    NOT NULL    IDENTITY    PRIMARY KEY

    NONCLUSTERED HASH WITH(BUCKET_COUNT = 4000000),

    OrderDate      DATE    NOT NULL,

    CustomerID     INT     NOT NULL,

    ProductID      INT     NOT NULL,

    Quantity       INT     NOT NULL,

    NetAmount      MONEY   NOT NULL,

    DeliveryDate   DATE    NULL,

    ) WITH(MEMORY_OPTIMIZED = ON, DURABILITY = SCHEMA_AND_DATA) ;

    INSERT INTO dbo.OrdersMemHash(OrderDate,CustomerID,ProductID,Quantity,NetAmount,DeliveryDate)

    SELECT OrderDate

    ,CustomerID

    ,ProductID

    ,Quantity

    ,NetAmount

    ,DeliveryDate

    FROM dbo.OrdersDisk ;

    Listing 8-8

    Creating a Table with a Nonclustered Hash Index

    ```


    If we now wish to add an additional index to the table, we need to drop and re-create
    it. We already have data in the table, however, so we first need to create a temp
    table and copy the data in so that we can drop and re-create the memory-optimized
    table. The script in Listing [8-9](#333037_2_En_8_Chapter.xhtml#PC9) adds a nonclustered
    index to the `OrderDate` column.


    ```

    --Create and populate temp table

    SELECT * INTO #OrdersMemHash

    FROM dbo.OrdersMemHash ;

    --Drop existing table

    DROP TABLE dbo.OrdersMemHash ;

    --Re-create the table with the new index

    CREATE TABLE dbo.OrdersMemHash

    (

    OrderNumber     INT     NOT NULL    IDENTITY    PRIMARY KEY

    NONCLUSTERED HASH WITH(BUCKET_COUNT = 4000000),

    OrderDate       DATE    NOT NULL     INDEX NCI_OrderDate NONCLUSTERED,

    CustomerID      INT     NOT NULL,

    ProductID       INT     NOT NULL,

    Quantity        INT     NOT NULL,

    NetAmount       MONEY   NOT NULL,

    DeliveryDate    DATE    NULL,

    ) WITH(MEMORY_OPTIMIZED = ON, DURABILITY = SCHEMA_AND_DATA) ;

    GO

    --Allow values to be inserted into the identity column

    SET IDENTITY_INSERT OrdersMemHash ON ;

    GO

    --Repopulate the table

    INSERT INTO

    dbo.OrdersMemHash(OrderNumber,OrderDate,CustomerID,ProductID,Quantity,NetAmount,DeliveryDate)

    SELECT *

    FROM #OrdersMemHash ;

    --Stop further inserts to the identity column and clean up temp table

    SET IDENTITY_INSERT OrdersMemHash OFF ;

    DROP TABLE #OrdersMemHash ;

    Listing 8-9

    Adding an Index to a Memory-Optimized Table

    ```


    We can examine the distribution of the values in our hash index by interrogating
    the `sys.dm_db_xtp_hash_index_stats` DMV. The query in Listing [8-10](#333037_2_En_8_Chapter.xhtml#PC10)
    demonstrates using this DMV to view the number of hash collisions and calculate
    the percentage of empty buckets.


    ```

    SELECT

    OBJECT_SCHEMA_NAME(HIS.OBJECT_ID) + ''.'' + OBJECT_NAME(HIS.OBJECT_ID) ''Table
    Name'',

    I.name as ''Index Name'',

    HIS.total_bucket_count,

    HIS.empty_bucket_count,

    FLOOR((CAST(empty_bucket_count AS FLOAT)/total_bucket_count) * 100) ''Empty Bucket
    Percentage'',

    total_bucket_count - empty_bucket_count ''Used Bucket Count'',

    HIS.avg_chain_length,

    HIS.max_chain_length

    FROM sys.dm_db_xtp_hash_index_stats AS HIS

    INNER JOIN sys.indexes AS I

    ON HIS.object_id = I.object_id

    AND HIS.index_id = I.index_id ;

    Listing 8-10

    sys.dm_db_xtp_hash_index_stats

    ```'
  trans: "## 内存中非聚集哈希索引\n\n一个非聚集哈希索引由一组存储桶构成。对每个索引键运行一个哈希函数，然后将哈希后的键值放入存储桶中。所使用的哈希算法是确定性的，这意味着具有相同值的索引键总是具有相同的哈希值。这一点很重要，因为重复的哈希值总是会被放入同一个哈希存储桶中。当许多键位于同一个哈希存储桶中时，索引的性能可能会下降，因为需要扫描整个重复项链才能找到正确的键。因此，如果您在一个包含大量重复键的非唯一列上构建哈希索引，则应使用大得多的存储桶数量来创建索引。这个数量应该是唯一键值数量的\
    \ 20 到 100 倍，而不是通常为唯一索引推荐的唯一键数量的 2 倍。或者，在非唯一列上使用非聚集索引可能是一个更好的解决方案。哈希函数具有确定性的第二个后果是，同一行的不同版本总是存储在同一个哈希存储桶中。\n\
    \n即使是在唯一索引的情况下，即只存在一个当前行版本，哈希值在存储桶中的分布也不是均匀的。如果存储桶的数量等于唯一键值的数量，那么大约三分之一的存储桶是空的，三分之一包含一个值，三分之一包含多个值。当多个值共享一个存储桶时，这被称为`哈希冲突`，大量的`哈希冲突`会导致性能下降。因此，对于唯一索引，建议将存储桶数量设置为表中预期唯一值数量的两倍。\n\
    \n### 提示\n\n当您有一个唯一的非聚集哈希索引时，在某些情况下，许多唯一值可能会哈希到同一个存储桶。如果您遇到这种情况，那么增加存储桶数量会有所帮助，这与处理非唯一索引的方式相同。\n\
    \n例如，如果您的表有 100 万行，并且索引列是唯一的，则最优的存储桶数量（称为`BUCKET_COUNT`）是 200 万。但是，如果您知道您的表预计将增长到\
    \ 200 万行，那么创建 400 万个哈希存储桶可能是明智之举。这个数量的存储桶足够低，不会对内存产生影响。同时，它也允许预期的行数增长，而不会因为存储桶太少而损害性能。索引值和哈希存储桶之间潜在映射关系的示意图如图\
    \ 8-7 所示。\n\n### 提示\n\n非聚集哈希索引使用的内存量始终保持静态，因为存储桶的数量不会改变。\n\n![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig7_HTML.jpg](img/333037_2_En_8_Fig7_HTML.jpg)\n\
    \n图 8-7\n\n到非聚集哈希索引的映射\n\n哈希索引针对带有`=`谓词的查找操作进行了优化。然而，对于查找操作，谓词评估中必须存在完整的索引键。如果不存在，则需要进行完整的索引扫描。如果使用了诸如`<`或`>`之类的不等式谓词，也需要进行索引扫描。此外，由于索引是无序的，索引无法按照索引键的排序顺序返回数据。\n\
    \n### 注意\n\n您可能还记得，在第 7 章中，我们观察到基于磁盘的表的性能优于内存优化表。这可以通过我们在查询中使用了`>`谓词来解释；这意味着尽管基于磁盘的索引能够执行索引查找，但我们的内存优化哈希索引却必须执行索引扫描。\n\
    \n现在，让我们使用清单 8-8 中的脚本，创建一个`OrdersDisk`表的内存优化版本，该版本包含在`OrderID`列上的非聚集哈希索引。最初，该表有\
    \ 100 万行，但我们预计这个数字会增长到 200 万，因此我们使用 400 万作为`BUCKET_COUNT`。\n\n```\nCREATE TABLE\
    \ dbo.OrdersMemHash\n(\n    OrderNumber    INT    NOT NULL    IDENTITY    PRIMARY\
    \ KEY\n        NONCLUSTERED HASH WITH(BUCKET_COUNT = 4000000),\n    OrderDate\
    \      DATE    NOT NULL,\n    CustomerID     INT     NOT NULL,\n    ProductID\
    \      INT     NOT NULL,\n    Quantity       INT     NOT NULL,\n    NetAmount\
    \      MONEY   NOT NULL,\n    DeliveryDate   DATE    NULL,\n) WITH(MEMORY_OPTIMIZED\
    \ = ON, DURABILITY = SCHEMA_AND_DATA) ;\n\nINSERT INTO dbo.OrdersMemHash(OrderDate,CustomerID,ProductID,Quantity,NetAmount,DeliveryDate)\n\
    SELECT OrderDate\n      ,CustomerID\n      ,ProductID\n      ,Quantity\n     \
    \ ,NetAmount\n      ,DeliveryDate\nFROM dbo.OrdersDisk ;\n```\n清单 8-8\n创建带有非聚集哈希索引的表\n\
    \n如果我们现在希望向表中添加一个额外的索引，我们需要先删除再重新创建它。然而，表中已有数据，因此我们首先需要创建一个临时表并将数据复制进去，然后才能删除并重新创建内存优化表。清单\
    \ 8-9 中的脚本向`OrderDate`列添加了一个非聚集索引。\n\n```\n--创建并填充临时表\nSELECT * INTO #OrdersMemHash\n\
    FROM dbo.OrdersMemHash ;\n\n--删除现有表\nDROP TABLE dbo.OrdersMemHash ;\n\n--使用新索引重新创建表\n\
    CREATE TABLE dbo.OrdersMemHash\n(\n    OrderNumber     INT     NOT NULL    IDENTITY\
    \    PRIMARY KEY\n        NONCLUSTERED HASH WITH(BUCKET_COUNT = 4000000),\n  \
    \  OrderDate       DATE    NOT NULL     INDEX NCI_OrderDate NONCLUSTERED,\n  \
    \  CustomerID      INT     NOT NULL,\n    ProductID       INT     NOT NULL,\n\
    \    Quantity        INT     NOT NULL,\n    NetAmount       MONEY   NOT NULL,\n\
    \    DeliveryDate    DATE    NULL,\n) WITH(MEMORY_OPTIMIZED = ON, DURABILITY =\
    \ SCHEMA_AND_DATA) ;\nGO\n\n--允许向标识列插入值\nSET IDENTITY_INSERT OrdersMemHash ON\
    \ ;\nGO\n\n--重新填充表\nINSERT INTO\ndbo.OrdersMemHash(OrderNumber,OrderDate,CustomerID,ProductID,Quantity,NetAmount,DeliveryDate)\n\
    SELECT *\nFROM #OrdersMemHash ;\n\n--停止向标识列插入并清理临时表\nSET IDENTITY_INSERT OrdersMemHash\
    \ OFF ;\n\nDROP TABLE #OrdersMemHash ;\n```\n清单 8-9\n向内存优化表添加索引\n\n我们可以通过查询`sys.dm_db_xtp_hash_index_stats`\
    \ DMV 来检查哈希索引中的值分布。清单 8-10 中的查询演示了如何使用此 DMV 查看哈希冲突数并计算空存储桶的百分比。\n\n```\nSELECT\n\
    \    OBJECT_SCHEMA_NAME(HIS.OBJECT_ID) + '.' + OBJECT_NAME(HIS.OBJECT_ID) '表名',\n\
    \    I.name as '索引名',\n    HIS.total_bucket_count,\n    HIS.empty_bucket_count,\n\
    \    FLOOR((CAST(empty_bucket_count AS FLOAT)/total_bucket_count) * 100) '空存储桶百分比',\n\
    \    total_bucket_count - empty_bucket_count '已使用存储桶数',\n    HIS.avg_chain_length,\n\
    \    HIS.max_chain_length\nFROM sys.dm_db_xtp_hash_index_stats AS HIS\nINNER JOIN\
    \ sys.indexes AS I\n    ON HIS.object_id = I.object_id\n    AND HIS.index_id =\
    \ I.index_id ;\n```\n清单 8-10\n`sys.dm_db_xtp_hash_index_stats`"
- fmt: "# 从结果看索引性能\n\n从图[8-8](#333037_2_En_8_Chapter.xhtml#Fig8)的结果可以看出，对于我们的哈希索引，78%的桶是空的。这个比例之所以这么高，是因为我们考虑到了表的增长而指定了一个较大的`BUCKET_COUNT`。如果这个比例低于33%，我们就会希望指定更高的桶数以避免哈希冲突。我们还可以看到，平均链长度为1，最大链长度为5。这是健康的。如果平均链计数增加，性能就会开始下降，因为SQL\
    \ Server必须扫描多个值才能找到正确的键。如果平均链长度达到10或更高，则意味着键不是唯一的，并且键中有太多重复值，使得哈希索引不可行。此时，我们应该删除并重新创建表，为索引指定更高的桶数，或者理想情况下，考虑改用非聚集索引。\n\
    \n![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig8_HTML.jpg](images/333037_2_En_8_Chapter/333037_2_En_8_Fig8_HTML.jpg)\n\
    \n**图 8-8**\n\n`sys.dm_db_xtp_hash_index_stats`结果\n\n## 内存中非聚集索引\n\n内存中的非聚集索引具有与基于磁盘的非聚集索引类似的结构，称为\
    \ *bw-tree*。这种结构使用页面映射表而不是指针，并使用“小于”而不是“大于”进行遍历（基于磁盘的索引使用“大于”）。索引的叶级别是一个单向链表。在查询使用不等式谓词（如`BETWEEN`、`>`或`<`）时，非聚集索引比非聚集哈希索引性能更好。在使用`=`谓词但不是键中的所有列都用于筛选时，内存中的非聚集索引也比非聚集哈希索引性能更好。非聚集索引也可以按照索引键的排序顺序返回数据。然而，与基于磁盘的索引不同，这些索引无法按照索引键的逆序返回结果。\n\
    \n## 维护索引\n\n索引创建后，DBA的工作并未完成。索引需要持续维护。以下部分讨论索引维护的注意事项。\n\n### 缺失索引\n\n当您运行查询时，数据库引擎会跟踪其在构建计划时希望使用的任何索引，以帮助提高查询性能。当您在SSMS中查看执行计划时，它会提供关于缺失索引的建议，但这些数据也可以通过DMV稍后获得。\n\
    \n> **提示**\n> 由于建议是基于单个计划的，您应该审查它们，而不是盲目地实施。\n\n为了演示此功能，我们可以执行清单[8-11](#333037_2_En_8_Chapter.xhtml#PC11)中的查询，并选择包含实际的执行计划。\n\
    \n> **提示**\n> 您可以通过查看估计的查询计划来查看缺失索引信息。\n\n```sql\nSELECT SUM(c.creditlimit) TotalExposure,\
    \ SUM(o.netamount) 'TotalOrdersValue'\nFROM dbo.CustomersDisk c\nINNER JOIN dbo.OrdersDisk\
    \ o\nON c.CustomerID = o.CustomerID ;\n```\n\n**清单 8-11 生成缺失索引详情**\n\n运行此查询后，我们可以检查执行计划，看看它告诉我们什么。此查询的执行计划如图[8-9](#333037_2_En_8_Chapter.xhtml#Fig9)所示。\n\
    \n![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig9_HTML.jpg](images/333037_2_En_8_Chapter/333037_2_En_8_Fig9_HTML.jpg)\n\
    \n**图 8-9 显示缺失索引的执行计划**\n\n在图[8-9](#333037_2_En_8_Chapter.xhtml#Fig9)的执行计划顶部，您可以看到SQL\
    \ Server建议我们在`OrdersDisk`表的`CustomerID`列上创建一个索引，并在叶级别包含`NetAmount`列。我们还被告知，这应该能为查询提供75%的性能提升。\n\
    \n如前所述，SQL Server也通过DMV提供此信息。`sys.dm_db_missing_index_details` DMV通过中间DMV `sys.dm_db_missing_index_groups`连接到`sys.dm_db_missing_index_group_stats`，以避免多对多关系。清单[8-12](#333037_2_En_8_Chapter.xhtml#PC12)中的脚本演示了我们如何使用这些DMV来返回有关缺失索引的详细信息。\n\
    \n```sql\nSELECT\n    mid.statement TableName\n    ,ISNULL(mid.equality_columns,\
    \ '')\n        + ','\n        + ISNULL(mid.inequality_columns, '') IndexKeyColumns\n\
    \    ,mid.included_columns\n    ,migs.unique_compiles\n    ,migs.user_seeks\n\
    \    ,migs.user_scans\n    ,migs.avg_total_user_cost\n    ,migs.avg_user_impact\n\
    FROM sys.dm_db_missing_index_details mid\nINNER JOIN sys.dm_db_missing_index_groups\
    \ mig\n    ON mid.index_handle = mig.index_handle\nINNER JOIN sys.dm_db_missing_index_group_stats\
    \ migs\n    ON mig.index_group_handle = migs.group_handle ;\n```\n\n**清单 8-12\
    \ 缺失索引DMV**\n\n此查询的结果如图[8-10](#333037_2_En_8_Chapter.xhtml#Fig10)所示。它们显示了以下信息：具有缺失索引的表的名称；SQL\
    \ Server建议应构成索引键的列；SQL Server建议应添加为B树叶级别包含列的列；本应从索引中受益的查询已被编译的次数；如果索引存在，本应对索引执行的查找次数；如果索引存在，本应对索引执行的扫描次数；使用索引本可节省的平均成本；以及使用索引本可节省的平均成本百分比。在我们的例子中，我们可以看到，如果我们在运行查询时索引已经存在，查询的成本本可以降低95%。\n\
    \n![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig10_HTML.jpg](images/333037_2_En_8_Chapter/333037_2_En_8_Fig10_HTML.jpg)\n\
    \n**图 8-10 缺失索引结果**"
  raw: 'From the results in Figure [8-8](#333037_2_En_8_Chapter.xhtml#Fig8), we can
    see that for our hash index, 78% of the buckets are empty. The percentage is this
    high because we specified a large `BUCKET_COUNT` with table growth in mind. If
    the percentage was less than 33%, we would want to specify a higher number of
    buckets to avoid hash collisions. We can also see that we have an average chain
    length of 1, with a maximum chain length of 5\. This is healthy. If the average
    chain count increases, then performance begins to tail off, since SQL Server has
    to scan multiple values to find the correct key. If the average chain length reaches
    10 or higher, then the implication is that the key is nonunique and there are
    too many duplicate values in the key to make a hash index viable. At this point,
    we should either drop and re-create the table with a higher bucket count for the
    index or, ideally, look to implement a nonclustered index instead.


    ![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig8_HTML.jpg](images/333037_2_En_8_Chapter/333037_2_En_8_Fig8_HTML.jpg)


    Figure 8-8


    sys.dm_db_xtp_hash_index_stats results


    #### In-Memory Nonclustered Indexes


    In-memory nonclustered indexes have a similar structure to a disk-based nonclustered
    index called a *bw-tree* . This structure uses a page-mapping table, as opposed
    to pointers, and is traversed using less than, as opposed to greater than, which
    is used when traversing disk-based indexes. The leaf level of the index is a singly
    linked list. Nonclustered indexes perform better than nonclustered hash indexes
    where a query uses inequality predicates, such as `BETWEEN`, `>`, or `<`. In-memory
    nonclustered indexes also perform better than a nonclustered hash index, where
    the `=` predicate is used, but not all of the columns in the key are used in the
    filter. Nonclustered indexes can also return the data in the sort order of the
    index key. Unlike disk-based indexes, however, these indexes cannot return the
    results in the reverse order of the index key.


    ## Maintaining Indexes


    Once indexes have been created, a DBA’s work is not complete. Indexes need to
    be maintained on an ongoing basis. The following sections discuss considerations
    for index maintenance.


    ### Missing Indexes


    When you run queries , the Database Engine keeps track of any indexes that it
    would like to use when building a plan to aid your query performance. When you
    view an execution plan in SSMS, you are provided with advice on missing indexes,
    but the data is also available later through DMVs.


    ### Tip


    Because the suggestions are based on a single plan, you should review them as
    opposed to implementing them blindly.


    In order to demonstrate this functionality, we can execute the query in Listing
    [8-11](#333037_2_En_8_Chapter.xhtml#PC11) and choose to include the actual execution
    plan.


    ### Tip


    You can see missing index information by viewing the estimated query plan.


    ```

    SELECT SUM(c.creditlimit) TotalExposure, SUM(o.netamount) ''TotalOrdersValue''

    FROM dbo.CustomersDisk c

    INNER JOIN dbo.OrdersDisk o

    ON c.CustomerID = o.CustomerID ;

    Listing 8-11

    Generating Missing Index Details

    ```


    Once we have run this query, we can examine the execution plan and see what it
    tells us. The execution plan for this query is shown in Figure [8-9](#333037_2_En_8_Chapter.xhtml#Fig9).


    ![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig9_HTML.jpg](images/333037_2_En_8_Chapter/333037_2_En_8_Fig9_HTML.jpg)


    Figure 8-9


    Execution plan showing missing indexes


    At the top of the execution plan in Figure [8-9](#333037_2_En_8_Chapter.xhtml#Fig9),
    you can see that SQL Server is recommending that we create an index on the `CustomerID`
    column of the `OrdersDisk` table and include the `NetAmount` column at the leaf
    level. We are also advised that this should provide a 75% performance improvement
    to the query.


    As mentioned, SQL Server also makes this information available through DMVs. The
    `sys.dm_db_missing_index_details` DMV joins to the `sys.dm_db_missing_index_group_stats`
    through the intermediate DMV `sys.dm_db_missing_index_groups`, which avoids a
    many-to-many relationship. The script in Listing [8-12](#333037_2_En_8_Chapter.xhtml#PC12)
    demonstrates how we can use these DMVs to return details on missing indexes.


    ```

    SELECT

    mid.statement TableName

    ,ISNULL(mid.equality_columns, ")

    + '',''

    + ISNULL(mid.inequality_columns, ") IndexKeyColumns

    ,mid.included_columns

    ,migs.unique_compiles

    ,migs.user_seeks

    ,migs.user_scans

    ,migs.avg_total_user_cost

    ,migs.avg_user_impact

    FROM sys.dm_db_missing_index_details mid

    INNER JOIN sys.dm_db_missing_index_groups mig

    ON mid.index_handle = mig.index_handle

    INNER JOIN sys.dm_db_missing_index_group_stats migs

    ON mig.index_group_handle = migs.group_handle ;

    Listing 8-12

    Missing Index DMVs

    ```


    The results of this query are shown in Figure [8-10](#333037_2_En_8_Chapter.xhtml#Fig10).
    They show the following: the name of the table with the missing index; the column(s)
    that SQL Server recommends should form the index key; the columns that SQL Server
    recommends should be added as included columns at the leaf level of the B-tree;
    the number of times that queries that would have benefited from the index have
    been compiled; how many seeks would have been performed against the index, if
    it existed; the number of times that the index has been scanned if it existed;
    the average cost that would have been saved by using the index; and the average
    percentage cost that would have been saved by using the index. In our case, we
    can see that the query would have been 95% less expensive if the index existed
    when we ran our query.


    ![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig10_HTML.jpg](images/333037_2_En_8_Chapter/333037_2_En_8_Fig10_HTML.jpg)


    Figure 8-10


    Missing index results'
  trans: "\n# 从结果看索引性能\n\n从图 8-8 的结果可以看出，对于我们的哈希索引，78%的桶是空的。这个比例之所以这么高，是因为我们考虑到了表的增长而指定了一个较大的`BUCKET_COUNT`。如果这个比例低于\
    \ 33%，我们就会希望指定更高的桶数以避免哈希冲突。我们还可以看到，平均链长度为 1，最大链长度为 5。这是健康的。如果平均链计数增加，性能就会开始下降，因为\
    \ SQL Server 必须扫描多个值才能找到正确的键。如果平均链长度达到 10 或更高，则意味着键不是唯一的，并且键中有太多重复值，使得哈希索引不可行。此时，我们应该删除并重新创建表，为索引指定更高的桶数，或者理想情况下，考虑改用非聚集索引。\n\
    \n![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig8_HTML.jpg](img/333037_2_En_8_Fig8_HTML.jpg)\n\
    \n**图 8-8**\n\n`sys.dm_db_xtp_hash_index_stats`结果\n\n## 内存中非聚集索引\n\n内存中的非聚集索引具有与基于磁盘的非聚集索引类似的结构，称为\
    \ *bw-tree*。这种结构使用页面映射表而不是指针，并使用“小于”而不是“大于”进行遍历（基于磁盘的索引使用“大于”）。索引的叶级别是一个单向链表。在查询使用不等式谓词（如`BETWEEN`、`>`或`<`）时，非聚集索引比非聚集哈希索引性能更好。在使用`=`谓词但不是键中的所有列都用于筛选时，内存中的非聚集索引也比非聚集哈希索引性能更好。非聚集索引也可以按照索引键的排序顺序返回数据。然而，与基于磁盘的索引不同，这些索引无法按照索引键的逆序返回结果。\n\
    \n## 维护索引\n\n索引创建后，DBA 的工作并未完成。索引需要持续维护。以下部分讨论索引维护的注意事项。\n\n### 缺失索引\n\n当您运行查询时，数据库引擎会跟踪其在构建计划时希望使用的任何索引，以帮助提高查询性能。当您在\
    \ SSMS 中查看执行计划时，它会提供关于缺失索引的建议，但这些数据也可以通过 DMV 稍后获得。\n\n> **提示**\n> 由于建议是基于单个计划的，您应该审查它们，而不是盲目地实施。\n\
    \n为了演示此功能，我们可以执行清单 8-11 中的查询，并选择包含实际的执行计划。\n\n> **提示**\n> 您可以通过查看估计的查询计划来查看缺失索引信息。\n\
    \n```sql\nSELECT SUM(c.creditlimit) TotalExposure, SUM(o.netamount) 'TotalOrdersValue'\n\
    FROM dbo.CustomersDisk c\nINNER JOIN dbo.OrdersDisk o\nON c.CustomerID = o.CustomerID\
    \ ;\n```\n\n**清单 8-11 生成缺失索引详情**\n\n运行此查询后，我们可以检查执行计划，看看它告诉我们什么。此查询的执行计划如图 8-9\
    \ 所示。\n\n![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig9_HTML.jpg](img/333037_2_En_8_Fig9_HTML.jpg)\n\
    \n**图 8-9 显示缺失索引的执行计划**\n\n在图 8-9 的执行计划顶部，您可以看到 SQL Server 建议我们在`OrdersDisk`表的`CustomerID`列上创建一个索引，并在叶级别包含`NetAmount`列。我们还被告知，这应该能为查询提供\
    \ 75%的性能提升。\n\n如前所述，SQL Server 也通过 DMV 提供此信息。`sys.dm_db_missing_index_details`\
    \ DMV 通过中间 DMV `sys.dm_db_missing_index_groups`连接到`sys.dm_db_missing_index_group_stats`，以避免多对多关系。清单\
    \ 8-12 中的脚本演示了我们如何使用这些 DMV 来返回有关缺失索引的详细信息。\n\n```sql\nSELECT\n    mid.statement\
    \ TableName\n    ,ISNULL(mid.equality_columns, '')\n        + ','\n        + ISNULL(mid.inequality_columns,\
    \ '') IndexKeyColumns\n    ,mid.included_columns\n    ,migs.unique_compiles\n\
    \    ,migs.user_seeks\n    ,migs.user_scans\n    ,migs.avg_total_user_cost\n \
    \   ,migs.avg_user_impact\nFROM sys.dm_db_missing_index_details mid\nINNER JOIN\
    \ sys.dm_db_missing_index_groups mig\n    ON mid.index_handle = mig.index_handle\n\
    INNER JOIN sys.dm_db_missing_index_group_stats migs\n    ON mig.index_group_handle\
    \ = migs.group_handle ;\n```\n\n**清单 8-12 缺失索引 DMV**\n\n此查询的结果如图 8-10 所示。它们显示了以下信息：具有缺失索引的表的名称；SQL\
    \ Server 建议应构成索引键的列；SQL Server 建议应添加为 B 树叶级别包含列的列；本应从索引中受益的查询已被编译的次数；如果索引存在，本应对索引执行的查找次数；如果索引存在，本应对索引执行的扫描次数；使用索引本可节省的平均成本；以及使用索引本可节省的平均成本百分比。在我们的例子中，我们可以看到，如果我们在运行查询时索引已经存在，查询的成本本可以降低\
    \ 95%。\n\n![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig10_HTML.jpg](img/333037_2_En_8_Fig10_HTML.jpg)\n\
    \n**图 8-10 缺失索引结果**\n"
- fmt: "### Index Fragmentation\n\nDisk-based indexes are subject to fragmentation.\
    \ Two forms of fragmentation can occur in B-trees: internal fragmentation and\
    \ external fragmentation.\n\n`Internal fragmentation` refers to pages having lots\
    \ of free space. If pages have lots of free space, then SQL Server needs to read\
    \ more pages than is necessary to return all of the required rows for a query.\n\
    \n`External fragmentation` refers to the pages of the index becoming out of physical\
    \ order. This can reduce performance, since the data cannot be read sequentially\
    \ from disk.\n\nFor example, imagine that you have a table with 1 million rows\
    \ of data and that all of these data rows fit into 5000 pages when the data pages\
    \ are 100% full. This means that SQL Server needs to read just over 39MB of data\
    \ in order to scan the entire table (`8KB * 5000`). If the pages of the table\
    \ are only 50% full, however, this increases the number of pages in use to 10,000,\
    \ which also increases the amount of data that needs to be read to 78MB. This\
    \ is internal fragmentation.\n\nInternal fragmentation can occur naturally when\
    \ `DELETE` statements are issued and when `DML` statements occur, such as when\
    \ a key value that is not ever-increasing is inserted. This is because SQL Server\
    \ may respond to this situation by performing a page split. A page split creates\
    \ a new page, moves half of the data from the existing page to the new page, and\
    \ leaves the other half on the existing page, thus creating 50% free space on\
    \ both pages. They can also occur artificially, however, through the misuse of\
    \ the `FILLFACTOR` and `PAD_INDEX` settings.\n\n`FILLFACTOR` controls how much\
    \ free space is left on each leaf level page of an index when it is created or\
    \ rebuilt. By default, the `FILLFACTOR` is set to `0`, which means that it leaves\
    \ enough space on the page for exactly one row. In some cases, however, when a\
    \ high number of page splits is occurring due to DML operations, a DBA may be\
    \ able to reduce fragmentation by altering the `FILLFACTOR`. Setting a `FILLFACTOR`\
    \ of `80`, for example, leaves 20% free space in the page, meaning that new rows\
    \ can be added to the page without page splits occurring. Many DBAs change the\
    \ `FILLFACTOR` when they are not required to, however, which automatically causes\
    \ internal fragmentation as soon as the index is built. `PAD_INDEX` can be applied\
    \ only when `FILLFACTOR` is used, and it applies the same percentage of free space\
    \ to the intermediate levels of the B-tree.\n\nExternal fragmentation is also\
    \ caused by page splits and refers to the logical order of pages, as ordered by\
    \ the index key, being out of sequence when compared to the physical order of\
    \ pages on disk. External fragmentation makes it so SQL Server is less able to\
    \ perform scan operations using a sequential read, because the head needs to move\
    \ backward and forward over the disk to locate the pages within the file.\n\n\
    ### Note\n\nThis is not the same as fragmentation at the file system level where\
    \ a data file can be split over multiple, unordered disk sectors.\n\n#### Detecting\
    \ Fragmentation\n\nYou can identify fragmentation of indexes by using the `sys.dm_db_index_physical_stats`\
    \ DMF. This function accepts the parameters listed in Table 8-2.\n\nTable 8-2\n\
    sys.dm_db_index_physical_stats Parameters\n\n| Parameter | Description |\n| ---\
    \ | --- |\n| `Database_ID` | The ID of the database that you want to run the function\
    \ against. If you do not know it, you can pass in `DB_ID('MyDatabase')` where\
    \ `MyDatabase` is the name of your database. |\n| `Object_ID` | The Object ID\
    \ of the table that you want to run the function against. If you do not know it,\
    \ pass in `OBJECT_ID('MyTable')` where `MyTable` is the name of your table. Pass\
    \ in `NULL` to run the function against all tables in the database. |\n| `Index_ID`\
    \ | The index ID of the index you want to run the function against. This is always\
    \ `1` for a clustered index. Pass in `NULL` to run the function against all indexes\
    \ on the table. |\n| `Partition_Number` | The ID of the partition that you want\
    \ to run the function against. Pass in `NULL` if you want to run the function\
    \ against all partitions or if the table is not partitioned. |\n| `Mode` | Choose\
    \ `LIMITED`, `SAMPLED`, or `DETAILED`. `LIMITED` only scans the non-leaf levels\
    \ of an index. `SAMPLED` scans 1% of pages in the table, unless the table has\
    \ 10,000 pages or less, in which case `DETAILED` mode is used. `DETAILED` mode\
    \ scans 100% of the pages in the table. For very large tables, `SAMPLED` is often\
    \ preferred due to the length of time it can take to return data in `DETAILED`\
    \ mode. |\n\nListing 8-13 demonstrates how we can use `sys.dm_db_index_physical_stats`\
    \ to check the fragmentation levels of our `OrdersDisk` table.\n\n```sql\nUSE\
    \ Chapter8\nGO\nSELECT\n    i.name\n    ,IPS.index_type_desc\n    ,IPS.index_level\n\
    \    ,IPS.avg_fragmentation_in_percent\n    ,IPS.avg_page_space_used_in_percent\n\
    \    ,i.fill_factor\n    ,CASE\n        WHEN i.fill_factor = 0\n            THEN\
    \ 100-IPS.avg_page_space_used_in_percent\n        ELSE i.fill_factor-ips.avg_page_space_used_in_percent\n\
    \     END Internal_Frag_With_Fillfactor_Offset\n    ,IPS.fragment_count\n    ,IPS.avg_fragment_size_in_pages\n\
    FROM sys.dm_db_index_physical_stats(DB_ID('Chapter8'),OBJECT_ID('dbo.OrdersDisk'),NULL,NULL,'DETAILED')\
    \ IPS\nINNER JOIN sys.indexes i\n    ON IPS.Object_id = i.object_id\n    AND IPS.index_id\
    \ = i.index_id ;\n```\nListing 8-13\n`sys.dm_db_index_physical_stats`\n\nYou can\
    \ see, from the results of this query, that one row is returned for every level\
    \ of each B-tree. If the table was partitioned, this would also be broken down\
    \ by partition. The `index_level` column indicates which level of the B-tree is\
    \ represented by the row. Level 0 implies the leaf level of the B-tree, whereas\
    \ Level 1 is either the lowest intermediate level or the root level if no intermediate\
    \ levels exist, and so on, with the highest number always reflecting the root\
    \ node.\n\nThe `avg_fragmentation_in_percent` column tells us how much external\
    \ fragmentation is present. We want this value to be as close to zero as possible.\n\
    \nThe `avg_page_space_used_in_percent` tells us how much internal fragmentation\
    \ is present, so we want this value to be as close to 100 as possible. The `Internal_Frag_With_FillFactor_Offset`\
    \ column also tells us how much internal fragmentation is present, but this time,\
    \ it applies an offset to allow for the fill factor that has been applied to the\
    \ index.\n\nThe `fragment_count` column indicates how many chunks of continuous\
    \ pages exist for the index level, so we want this value to be as low as possible.\n\
    \nThe `avg_fragment_size_in_pages` column tells the average size of each fragment,\
    \ so obviously this number should also be as high as possible."
  raw: '### Index Fragmentation


    Disk-based indexes are subject to fragmentation. Two forms of fragmentation can
    occur in B-trees: internal fragmentation and external fragmentation. *Internal
    fragmentation* refers to pages having lots of free space. If pages have lots of
    free space, then SQL Server needs to read more pages than is necessary to return
    all of the required rows for a query. *External fragmentation* refers to the pages
    of the index becoming out of physical order. This can reduce performance, since
    the data cannot be read sequentially from disk.


    For example, imagine that you have a table with 1 million rows of data and that
    all of these data rows fit into 5000 pages when the data pages are 100% full.
    This means that SQL Server needs to read just over 39MB of data in order to scan
    the entire table (8KB ∗ 5000). If the pages of the table are only 50% full, however,
    this increases the number of pages in use to 10,000, which also increases the
    amount of data that needs to be read to 78MB. This is internal fragmentation.


    Internal fragmentation can occur naturally when `DELETE` statements are issued
    and when `DML` statements occur, such as when a key value that is not ever-increasing
    is inserted. This is because SQL Server may respond to this situation by performing
    a *page split*. A page split creates a new page, moves half of the data from the
    existing page to the new page, and leaves the other half on the existing page,
    thus creating 50% free space on both pages. They can also occur artificially,
    however, through the misuse of the `FILLFACTOR` and `PAD_INDEX` settings.


    `FILLFACTOR` controls how much free space is left on each leaf level page of an
    index when it is created or rebuilt. By default, the `FILLFACTOR` is set to `0`,
    which means that it leaves enough space on the page for exactly one row. In some
    cases, however, when a high number of page splits is occurring due to DML operations,
    a DBA may be able to reduce fragmentation by altering the `FILLFACTOR`. Setting
    a `FILLFACTOR` of `80`, for example, leaves 20% free space in the page, meaning
    that new rows can be added to the page without page splits occurring. Many DBAs
    change the `FILLFACTOR` when they are not required to, however, which automatically
    causes internal fragmentation as soon as the index is built. `PAD_INDEX` can be
    applied only when `FILLFACTOR` is used, and it applies the same percentage of
    free space to the intermediate levels of the B-tree.


    External fragmentation is also caused by page splits and refers to the logical
    order of pages, as ordered by the index key, being out of sequence when compared
    to the physical order of pages on disk. External fragmentation makes it so SQL
    Server is less able to perform scan operations using a sequential read, because
    the head needs to move backward and forward over the disk to locate the pages
    within the file.


    ### Note


    This is not the same as fragmentation at the file system level where a data file
    can be split over multiple, unordered disk sectors.


    #### Detecting Fragmentation


    You can identify fragmentation of indexes by using the `sys.dm_db_index_physical_stats`
    DMF. This function accepts the parameters listed in Table [8-2](#333037_2_En_8_Chapter.xhtml#Tab2).


    Table 8-2


    sys.dm_db_index_physical_stats Parameters


    | Parameter | Description |

    | --- | --- |

    | `Database_ID` | The ID of the database that you want to run the function against.
    If you do not know it, you can pass in `DB_ID(''MyDatabase'')` where `MyDatabase`
    is the name of your database. |

    | `Object_ID` | The Object ID of the table that you want to run the function against.
    If you do not know it, pass in `OBJECT_ID(''MyTable'')` where `MyTable` is the
    name of your table. Pass in `NULL` to run the function against all tables in the
    database. |

    | `Index_ID` | The index ID of the index you want to run the function against.
    This is always `1` for a clustered index. Pass in `NULL` to run the function against
    all indexes on the table. |

    | `Partition_Number` | The ID of the partition that you want to run the function
    against. Pass in `NULL` if you want to run the function against all partitions
    or if the table is not partitioned. |

    | `Mode` | Choose `LIMITED`, `SAMPLED`, or `DETAILED`. `LIMITED` only scans the
    non-leaf levels of an index. `SAMPLED` scans 1% of pages in the table, unless
    the table has 10,000 pages or less, in which case `DETAILED` mode is used. `DETAILED`
    mode scans 100% of the pages in the table. For very large tables, `SAMPLED` is
    often preferred due to the length of time it can take to return data in `DETAILED`
    mode. |


    Listing [8-13](#333037_2_En_8_Chapter.xhtml#PC13) demonstrates how we can use
    `sys.dm_db_index_physical_stats` to check the fragmentation levels of our `OrdersDisk`
    table.


    ```

    USE Chapter8

    GO

    SELECT

    i.name

    ,IPS.index_type_desc

    ,IPS.index_level

    ,IPS.avg_fragmentation_in_percent

    ,IPS.avg_page_space_used_in_percent

    ,i.fill_factor

    ,CASE

    WHEN i.fill_factor = 0

    THEN 100-IPS.avg_page_space_used_in_percent

    ELSE i.fill_factor-ips.avg_page_space_used_in_percent

    END Internal_Frag_With_Fillfactor_Offset

    ,IPS.fragment_count

    ,IPS.avg_fragment_size_in_pages

    FROM sys.dm_db_index_physical_stats(DB_ID(''Chapter8''),OBJECT_ID(''dbo.OrdersDisk''),NULL,NULL,''DETAILED'')
    IPS

    INNER JOIN sys.indexes i

    ON IPS.Object_id = i.object_id

    AND IPS.index_id = i.index_id ;

    Listing 8-13

    sys.dm_db_index_physical_stats

    ```


    You can see, from the results of this query, that one row is returned for every
    level of each B-tree. If the table was partitioned, this would also be broken
    down by partition. The `index_level` column indicates which level of the B-tree
    is represented by the row. Level 0 implies the leaf level of the B-tree, whereas
    Level 1 is either the lowest intermediate level or the root level if no intermediate
    levels exist, and so on, with the highest number always reflecting the root node.
    The `avg_fragmentation_in_percent` column tells us how much external fragmentation
    is present. We want this value to be as close to zero as possible. The `avg_page_space_used_in_percent`
    tells us how much internal fragmentation is present, so we want this value to
    be as close to 100 as possible. The `Internal_Frag_With_FillFactor_Offset` column
    also tells us how much internal fragmentation is present, but this time, it applies
    an offset to allow for the fill factor that has been applied to the index. The
    `fragment_count` column indicates how many chunks of continuous pages exist for
    the index level, so we want this value to be as low as possible. The `avg_fragment_size_in_pages`
    column tells the average size of each fragment, so obviously this number should
    also be as high as possible.'
  trans: "### 索引碎片化\n\n基于磁盘的索引会产生碎片化。B 树中可能发生两种形式的碎片化：内部碎片化和外部碎片化。\n\n`内部碎片化` 指的是页面拥有大量空闲空间。如果页面存在大量空闲空间，那么\
    \ SQL Server 就需要读取比实际返回查询所需全部行更多的页数。\n\n`外部碎片化` 指的是索引的页面在物理顺序上变得不连续。这会降低性能，因为数据无法从磁盘上被顺序读取。\n\
    \n例如，假设你有一个包含 100 万行数据的表，并且当数据页 100% 满时，所有这些数据行正好能放入 5000 个页中。这意味着 SQL Server\
    \ 只需读取略多于 39MB 的数据就能扫描整个表（`8KB * 5000`）。然而，如果表的页只有 50% 被填满，这就会使使用的页数增加到 10,000\
    \ 个，同时也使需要读取的数据量增加到 78MB。这就是内部碎片化。\n\n当执行 `DELETE` 语句以及发生 `DML` 语句（例如插入一个非递增的键值）时，内部碎片化可能会自然发生。这是因为\
    \ SQL Server 可能会通过执行页拆分来响应这种情况。页拆分会创建一个新页，将现有页中一半的数据移动到新页，并将另一半留在现有页上，从而在两个页上都创建出\
    \ 50% 的空闲空间。然而，它们也可能由于误用 `FILLFACTOR` 和 `PAD_INDEX` 设置而人为产生。\n\n`FILLFACTOR` 控制在创建或重建索引时，其每个叶级页上保留多少空闲空间。默认情况下，`FILLFACTOR`\
    \ 设置为 `0`，这意味着它在页面上恰好为一行留出足够的空间。然而，在某些情况下，当由于 DML 操作导致大量页拆分发生时，数据库管理员可以通过调整 `FILLFACTOR`\
    \ 来减少碎片化。例如，设置 `FILLFACTOR` 为 `80` 会在页面上留下 20% 的空闲空间，这意味着新行可以被添加到该页面而无需发生页拆分。然而，许多\
    \ DBA 在并非必需的情况下也更改了 `FILLFACTOR`，这会在索引构建完成后立即自动导致内部碎片化。`PAD_INDEX` 只能在使用 `FILLFACTOR`\
    \ 时应用，它将相同百分比的空闲空间应用于 B 树的中间级别。\n\n外部碎片化同样由页拆分引起，它指的是按索引键排序的页面的逻辑顺序与磁盘上页面的物理顺序相比不连续。外部碎片化使得\
    \ SQL Server 较少能够使用顺序读取来执行扫描操作，因为磁头需要在磁盘上来回移动以定位文件中的页面。\n\n### 注意\n\n这与文件系统级别的碎片化不同，后者是指一个数据文件可能被分散存储在多个无序的磁盘扇区中。\n\
    \n#### 检测碎片化\n\n你可以使用 `sys.dm_db_index_physical_stats` DMF 来识别索引的碎片化。此函数接受表 8-2\
    \ 中列出的参数。\n\n表 8-2\nsys.dm_db_index_physical_stats 参数\n\n| 参数 | 描述 |\n| --- |\
    \ --- |\n| `Database_ID` | 你想要对其运行此函数的数据库 ID。如果你不知道它，可以传入 `DB_ID('MyDatabase')`，其中\
    \ `MyDatabase` 是你的数据库名称。 |\n| `Object_ID` | 你想要对其运行此函数的表的对象 ID。如果你不知道它，传入 `OBJECT_ID('MyTable')`，其中\
    \ `MyTable` 是你的表名。传入 `NULL` 则对数据库中的所有表运行此函数。 |\n| `Index_ID` | 你想要对其运行此函数的索引的索引\
    \ ID。对于聚集索引，此值始终为 `1`。传入 `NULL` 则对表上的所有索引运行此函数。 |\n| `Partition_Number` | 你想要对其运行此函数的分区\
    \ ID。如果你想对所有分区运行此函数或该表未分区，则传入 `NULL`。 |\n| `Mode` | 选择 `LIMITED`、`SAMPLED` 或 `DETAILED`。`LIMITED`\
    \ 仅扫描索引的非叶级。`SAMPLED` 扫描表中 1% 的页，除非该表的页数少于或等于 10,000 个，在这种情况下将使用 `DETAILED` 模式。`DETAILED`\
    \ 模式扫描表中 100% 的页。对于非常大的表，由于 `DETAILED` 模式返回数据所需的时间可能很长，通常更倾向于使用 `SAMPLED`。 |\n\
    \n清单 8-13 展示了如何使用 `sys.dm_db_index_physical_stats` 来检查我们的 `OrdersDisk` 表的碎片化水平。\n\
    \n```sql\nUSE Chapter8\nGO\nSELECT\n    i.name\n    ,IPS.index_type_desc\n   \
    \ ,IPS.index_level\n    ,IPS.avg_fragmentation_in_percent\n    ,IPS.avg_page_space_used_in_percent\n\
    \    ,i.fill_factor\n    ,CASE\n        WHEN i.fill_factor = 0\n            THEN\
    \ 100-IPS.avg_page_space_used_in_percent\n        ELSE i.fill_factor-ips.avg_page_space_used_in_percent\n\
    \     END Internal_Frag_With_Fillfactor_Offset\n    ,IPS.fragment_count\n    ,IPS.avg_fragment_size_in_pages\n\
    FROM sys.dm_db_index_physical_stats(DB_ID('Chapter8'),OBJECT_ID('dbo.OrdersDisk'),NULL,NULL,'DETAILED')\
    \ IPS\nINNER JOIN sys.indexes i\n    ON IPS.Object_id = i.object_id\n    AND IPS.index_id\
    \ = i.index_id ;\n```\n清单 8-13\n`sys.dm_db_index_physical_stats`\n\n从该查询的结果中，你可以看到每个\
    \ B 树的每个级别都返回了一行。如果表是分区的，这也会按分区进行细分。`index_level` 列指示该行代表的是 B 树的哪一级别。级别 0 表示 B\
    \ 树的叶级，而级别 1 是最低的中间级别，或者如果不存在中间级别则为根级别，依此类推，最高编号始终反映根节点。\n\n`avg_fragmentation_in_percent`\
    \ 列告诉我们存在多少外部碎片化。我们希望这个值尽可能接近零。\n\n`avg_page_space_used_in_percent` 告诉我们存在多少内部碎片化，所以我们希望这个值尽可能接近\
    \ 100。`Internal_Frag_With_FillFactor_Offset` 列也告诉我们存在多少内部碎片化，但这次，它应用了一个偏移量来考虑已应用于索引的填充因子。\n\
    \n`fragment_count` 列表示该索引级别存在多少个连续页的块，所以我们希望这个值尽可能低。\n\n`avg_fragment_size_in_pages`\
    \ 列告诉我们每个碎片的平均大小，所以显然这个数字也应该尽可能高。"
- fmt: '## Removing Fragmentation


    你可以通过重组或重建索引来移除碎片。当你重组一个索引时，SQL Server 会重新组织索引叶级别的数据。它会查看页面上是否有可用的空闲空间。如果有，它会将下一页的行移动到该页上。如果在此过程结束时存在空页面，则它们将被删除。SQL
    Server 仅将页面填充到指定的 `FillFactor` 级别。一旦完成，叶级别页面内的数据会被重新排列，使其物理顺序更接近其逻辑键顺序。重组索引始终是一个
    `ONLINE` 操作，这意味着在操作进行期间，其他进程仍可以使用该索引。由于它始终是一个 `ONLINE` 操作，如果 `ALLOW_PAGE_LOCKS`
    选项被关闭，它将会失败。重组索引的过程适用于移除内部碎片和 30% 或更低程度的外部碎片。然而，即使在这种使用模式下，它也不能保证操作完成后完全没有碎片。


    清单 [8-14](#333037_2_En_8_Chapter.xhtml#PC14) 中的脚本在 `OrdersDisk` 表上创建了一个名为 `NCI_CustomerID`
    的索引，然后演示了如何重组它。


    ```

    --创建将在后续示例中使用的索引

    CREATE NONCLUSTERED INDEX NCI_CustomerID ON dbo.OrdersDisk(CustomerID) ;

    GO

    --重组索引

    ALTER INDEX NCI_CustomerID ON dbo.OrdersDisk REORGANIZE ;

    ```

    清单 8-14

    重组索引


    当你重建一个索引时，现有索引会被删除然后完全重建。根据定义，这移除了内部和外部碎片，因为索引是从零开始构建的。然而，重要的是要注意，此操作之后你仍然不能保证达到
    100% 无碎片。这是因为 SQL Server 会将索引的不同部分分配给参与重建的每个 CPU 核心。每个 CPU 核心应该以完美的顺序构建自己的部分，但当这些部分同步时，可能会产生少量碎片。你可以通过指定
    `MAXDOP = 1` 来最小化这个问题。即使设置了这个选项，在某些情况下你仍然可能遇到碎片。例如，如果 `ALLOW_PAGES_LOCKS` 被配置为
    `OFF`，那么工作线程会共享分配缓存，这可能导致碎片。此外，当你设置 `MAXDOP = 1` 时，这是以重建索引所需的时间为代价的。


    你可以通过执行 `ONLINE` 或 `OFFLINE` 操作来重建索引。如果你选择以 `ONLINE` 操作重建索引，那么在操作进行时，原始版本的索引仍然可以访问。`ONLINE`
    操作是以时间和资源利用率为代价的。你需要启用 `ALLOW_PAGE_LOCKS` 才能使你的 `ONLINE` 重建成功。


    清单 [8-15](#333037_2_En_8_Chapter.xhtml#PC15) 中的脚本演示了如何重建 `OrdersDisk` 表上的 `NCI_Balance`
    索引。因为我们没有指定 `ONLINE = ON`，所以它使用默认设置 `ONLINE = OFF`，并且在整个操作期间索引都被锁定。因为我们指定了 `MAXDOP
    = 1`，所以操作速度较慢，但没有碎片。


    ```

    ALTER INDEX NCI_CustomerID ON dbo.OrdersDisk REBUILD WITH(MAXDOP = 1) ;

    ```

    清单 8-15

    重建索引


    如果你创建一个维护计划来重建或重组索引，那么指定数据库内的所有索引都将被重建，无论它们是否需要——这可能是耗时且消耗资源的。你可以通过使用 `sys.dm_db_index_physical_stats`
    DMF 创建一个智能脚本来解决此问题，你可以从 SQL Server Agent 运行该脚本，并仅对需要操作的索引进行重组或重建。这在第 [17](#333037_2_En_17_Chapter.xhtml)
    章中有更详细的讨论。


    ### 提示


    有一种误解认为使用 SSD 可以消除索引碎片问题。这是不正确的。尽管 SSD 降低了乱序页面对性能的影响，但它们并没有消除这种影响。它们对内部碎片也没有影响。


    ### 可恢复的索引操作


    SQL Server 2019 支持可恢复的联机索引创建和索引重建，适用于传统（聚集和非聚集）索引以及列存储索引。可恢复的索引操作允许你暂停一个联机索引操作（创建或重建），以便释放系统资源，然后当资源利用率不再是问题时，再从中断处重新启动。这些操作还允许在联机索引操作因常见原因（例如磁盘空间不足）失败后重新启动。


    此功能为 DBA 带来的一些优势是显而易见的。例如，如果一个大型索引重建需要适应短暂的维护窗口，那么可以在维护窗口结束时暂停重建，并在下一个维护窗口开始时重新启动，而不是必须中止操作来释放系统资源。然而，还有一些隐藏的好处。例如，可恢复的索引操作不会消耗大量的日志空间，即使对大型索引执行也是如此。这是因为所有重启索引操作所需的数据都存储在数据库内。一个附带说明是，索引操作在暂停时不会保持一个长时间运行的事务。


    在大多数情况下，使用可恢复索引操作的缺点很少。达到的碎片整理质量与标准联机索引操作的质量相当，并且可恢复操作与标准联机索引操作在速度上没有真正的区别（当然，不包括潜在的暂停时间）。然而，一如既往，天下没有免费的午餐，在暂停的可恢复操作期间，由于需要更新索引的两个版本，受影响表和索引的写入性能将会下降。在大多数情况下，这种下降不应超过
    10%。在暂停期间，对读取操作应该没有影响，因为它们继续使用原始版本的索引，直到操作完成。


    清单 [8-16](#333037_2_En_8_Chapter.xhtml#PC16) 中的命令演示了如何将 `OrdersDisk` 表上的 `NCI_CustomerID`
    索引重建为可恢复操作。


    ```

    ALTER INDEX NCI_CustomerID ON dbo.OrdersDisk REBUILD WITH(MAXDOP = 1, ONLINE=ON,
    RESUMABLE=ON) ;

    ```

    清单 8-16

    可恢复索引重建


    清单 [8-17](#333037_2_En_8_Chapter.xhtml#PC17) 中的命令将暂停清单 [8-16](#333037_2_En_8_Chapter.xhtml#PC16)
    中启动的索引重建。'
  raw: '#### Removing Fragmentation


    You can remove fragmentation by either reorganizing or rebuilding an index. When
    you reorganize an index, SQL Server reorganizes the data within the leaf level
    of the index. It looks to see if there is free space on a page that it can use.
    If there is, then it moves rows from the next page onto this page. If there are
    empty pages at the end of this process, then they are removed. SQL Server only
    fills pages to the level of the `FillFactor` specified. Once this is complete,
    the data within the leaf level pages is shuffled so that their physical order
    is a closer match to their logical, key order. Reorganizing an index is always
    an `ONLINE` operation, meaning that the index can still be used by other processes
    while the operation is in progress. Where it is always an `ONLINE` operation,
    it will fail if the `ALLOW_PAGE_LOCKS` option is turned off. The process of reorganizing
    an index is suitable for removing internal fragmentation and low levels of external
    fragmentation of 30% or less. However, it makes no guarantees, even with this
    usage profile, that there will not be fragmentation left after the operation completes.


    The script in Listing [8-14](#333037_2_En_8_Chapter.xhtml#PC14) creates an index
    called `NCI_CustomerID` on the `OrdersDisk` table and then demonstrates how we
    can reorganize it.


    ```

    --Create the index that will be used in the examples, for the following sections

    CREATE NONCLUSTERED INDEX NCI_CustomerID ON dbo.OrdersDisk(CustomerID) ;

    GO

    --Reorganize the index

    ALTER INDEX NCI_CustomerID ON dbo.OrdersDisk REORGANIZE ;

    Listing 8-14

    Reorganizing an Index

    ```


    When you rebuild an index, the existing index is dropped and then completely rebuilt.
    This, by definition, removes internal and external fragmentation, since the index
    is built from scratch. It is important to note, however, that you are still not
    guaranteed to be 100% fragmentation-free after this operation. This is because
    SQL Server assigns different chunks of the index to each CPU core that is involved
    in the rebuild. Each CPU core should build its own section in the perfect sequence,
    but when the pieces are synchronized, there may be a small amount of fragmentation.
    You can minimize this issue by specifying `MAXDOP = 1`. Even when you set this
    option, you may still encounter fragmentation in some cases. For example, if `ALLOW_PAGES_LOCKS`
    is configured as `OFF`, then the workers share the allocation cache, which can
    cause fragmentation. Additionally, when you set `MAXDOP = 1`, it is at the expense
    of the time it takes to rebuild the index.


    You can rebuild an index by performing either an `ONLINE` or `OFFLINE` operation.
    If you choose to rebuild the index as an `ONLINE` operation, then the original
    version of the index is still accessible, while the operation takes place. The
    `ONLINE` operation comes at the expense of both time and resource utilization.
    You need to enable `ALLOW_PAGE_LOCKS` to make your `ONLINE` rebuild successful.


    The script in Listing [8-15](#333037_2_En_8_Chapter.xhtml#PC15) demonstrates how
    we can rebuild the `NCI_Balance` index on the `OrdersDisk` table. Because we have
    not specified `ONLINE = ON`, it uses the default setting of `ONLINE = OFF`, and
    the index is locked for the entire operation. Because we specify `MAXDOP = 1`,
    the operation is slower, but has no fragmentation.


    ```

    ALTER INDEX NCI_CustomerID ON dbo.OrdersDisk REBUILD WITH(MAXDOP = 1) ;

    Listing 8-15

    Rebuilding an Index

    ```


    If you create a maintenance plan to rebuild or reorganize indexes, then all indexes
    within the specified database are rebuilt, regardless of whether they need to
    be—this can be time-consuming and eat resources. You can resolve this issue by
    using the `sys.dm_db_index_physical_stats` DMF to create an intelligent script
    that you can run from SQL Server Agent and use to reorganize or rebuild only those
    indexes that require it. This is discussed in more detail in Chapter [17](#333037_2_En_17_Chapter.xhtml)*.*


    ### Tip


    There is a myth that using SSDs removes the issue of index fragmentation. This
    is not correct. Although SSDs reduce the performance impact of out-of-order pages,
    they do not remove it. They also have no impact on internal fragmentation.


    ### Resumable Index Operations


    SQL Server 2019 supports resumable online index creation and index rebuilds, for
    both traditional (clustered and nonclustered) indexes and Columnstore indexes.
    Resumable index operations allow you to pause an online index operation (build
    or rebuild), in order to free up system resources, and then restart it again,
    from where it left off, when resource utilization is no longer an issue. These
    operations also allow an online index operation to be restarted, after it has
    failed for common reasons, such as lack of disk space.


    Some of the advantages that this functionality brings to a DBA are clear. For
    example, if a large index rebuild needs to fit inside a short maintenance window,
    then the rebuild can be paused at the end of a maintenance window and restarted
    at the beginning of the next, as opposed to having to abort the operation, to
    free up system resources. There are also other, hidden benefits, however. For
    example, resumable index operations do not consume large amount of log space,
    even when performed on large indexes. This is because all data required to restart
    the index operation is stored inside the database. A side note of this is that
    the index operation does not hold a long-running transaction while paused.


    For the most part, there are very few drawbacks to using resumable index operations.
    The quality of defragmentation achieved is comparable to the quality of a standard
    online index operation, and there is no real difference in speed between resumable
    and standard online index operations (excluding the potential pause of course).
    As always, however, there is no such thing as a free lunch, and during a paused,
    resumable operation, there will be a degradation of write performance, to affected
    tables and indexes, due to two versions of the index needing to be updated. This
    degradation should not be more than 10%, in most cases. There should be no impact
    to read operations, during the pause, as they continue to use the original version
    of the index, until the operation has completed.


    The command in Listing [8-16](#333037_2_En_8_Chapter.xhtml#PC16) demonstrated
    how to rebuild the `NCI_CustomerID` index, on the `OrdersDisk` table, as a resumable
    operation.


    ```

    ALTER INDEX NCI_CustomerID ON dbo.OrdersDisk REBUILD WITH(MAXDOP = 1, ONLINE=ON,
    RESUMABLE=ON) ;

    Listing 8-16

    Resumable Index Rebuild

    ```


    The command in Listing [8-17](#333037_2_En_8_Chapter.xhtml#PC17) will pause the
    index rebuild, started in Listing [8-16](#333037_2_En_8_Chapter.xhtml#PC16).'
