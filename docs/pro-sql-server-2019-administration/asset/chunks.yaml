    # 19. 扩展事件


    扩展事件是 SQL Server 提供的一种轻量级监视系统。由于其架构使用的系统资源非常少，因此扩展性很好，并且允许您以对用户活动影响最小的方式监视实例。它们还具有高度可配置性，这使您在数据库管理员角色中拥有广泛的选项来捕获从非常细粒度（如页面拆分）到更高级别详细信息（如
    **CPU** 利用率）的详细信息。您还可以将扩展事件与操作系统数据关联起来，以便在排查问题时提供整体视图。扩展事件的前身是 **SQL Trace** 及其
    **GUI** 工具 **Profiler**。该工具现已不推荐用于数据库引擎，建议仅将其用于跟踪 **Analysis Service** 活动。


    在本章中，我们将讨论与扩展事件相关的概念，然后讨论如何实现该技术。最后，我们将讨论如何将其与操作系统计数器集成。


    ## 扩展事件概念


    扩展事件具有丰富的架构，由事件、目标、操作、类型、谓词和映射组成。这些对象存储在包内，而包又存储在模块内，模块可以是 `.dll` 文件或可执行文件。我们将在以下部分讨论这些概念。


    ### 包


    *包* 是扩展事件中使用的对象的容器。以下是 SQL Server 的四种包类型：


    *   `Package0`：默认包，用于扩展事件系统对象。

    *   `Sqlserver`：用于 SQL Server 相关对象。

    *   `Sqlos`：用于 SQLOS 相关对象。

    *   `SecAudit`：由 SQL 审计使用；但其对象不对外暴露。


    ### 事件


    *事件* 是您可以跟踪的感兴趣的发生事项。它可以是一个 SQL 批处理完成、一次缓存未命中、一次页面拆分，或者根据您配置的跟踪性质，几乎任何可能发生在数据库引擎内部的事情。每个事件都通过通道和关键字（也称为类别）进行分类。*通道*
    是高级分类，SQL Server 2019 中的所有事件都属于表 19-1 中描述的通道之一。


    表 19-1 通道


    | 通道 | 描述 |

    | --- | --- |

    | Admin | 具有明确解决方案的已知事件。例如，死锁、服务器启动、CPU 阈值被超过以及使用已弃用的功能。 |

    | Operational | 用于排查问题。例如，检测到坏内存、AlwaysOn 可用性组副本更改其状态以及检测到长时间 I/O，这些都是属于 Operational
    通道的事件。 |

    | Analytic | 可用于排查性能等问题的高容量事件。例如，事务开始、获取锁以及文件读取完成，这些都是属于 Analytic 通道的事件。 |

    | Debug | 开发人员用于通过返回内部数据来诊断问题。Debug 通道中的事件在 SQL Server 的未来版本中可能会更改，因此应尽可能避免使用它们。
    |


    关键字，也称为类别，粒度要细得多。SQL Server 2019 中有 88 个类别。可以通过运行清单 19-1 中的查询来列出这些类别。


    ```

    SELECT DISTINCT map_value AS Category

    FROM sys.dm_xe_map_values map

    WHERE map.name = ''keyword_map''

    ORDER BY map.map_value

    ```


    清单 19-1 返回类别列表


    ### 目标


    *目标* 是事件的消费者；本质上，它是跟踪数据将被写入的设备。SQL Server 2019 中可用的目标详见表 19-2。


    表 19-2 目标


    | 目标 | 同步/异步 | 描述 |

    | --- | --- | --- |

    | Event counter | 同步 | 统计会话期间发生的事件数量 |

    | Event file | 异步 | 将事件输出写入内存缓冲区，然后将其刷新到磁盘 |

    | Event pairing | 异步 | 确定是否发生了配对事件而没有其匹配事件，例如，一个语句开始但从未完成 |

    | ETW* | 同步 | 用于将扩展事件与操作系统数据关联 |

    | Histogram | 异步 | 根据操作或事件列统计会话期间发生的事件数量 |

    | Ring buffer | 异步 | 使用先进先出方法将数据存储在内存缓冲区中 |


    ***Event Tracking for Windows**


    ### 操作


    *操作* 是允许在事件触发时捕获附加信息的命令。当事件发生时，操作会同步触发，事件本身并不知道该操作。SQL Server 2019 中有 64 个可用操作，允许您捕获丰富的信息数组，包括导致事件触发的语句、运行该语句的登录名、事务
    **ID**、**CPU ID** 以及调用堆栈。'
- fmt: '### Predicates


    `Predicates`是系统在向目标发送事件之前可以应用的筛选条件。您可以创建简单的谓词，例如基于数据库ID筛选完成的语句；也可以创建更复杂的谓词，例如仅捕获持续时间超过5秒的长IO，或者仅当AlwaysOn可用性组副本的角色更改发生超过两次时才捕获该事件。


    谓词也完全支持短路求值。这意味着如果您在谓词中使用多个条件，那么谓词的顺序就很重要，因为如果第一个谓词的评估失败，第二个谓词将不会被评估。由于谓词是同步评估的，这可能会对性能产生影响。因此，明智的做法是设计您的谓词，使最不可能评估为`true`的谓词排在非常可能评估为`true`的谓词之前。例如，假设您计划筛选一个特定数据库（数据库ID为`6`），该数据库是实例上高比例活动的目标，但您也计划筛选一个特定用户ID（`MyUser`），该用户负责较低比例的活动。在此场景中，您将使用`WHERE
    (([sqlserver].[username]=N''MyUser'') AND ([sqlserver].[database_id]=(6)))`谓词，首先筛选掉与`MyUser`无关的活动，然后筛选掉与数据库ID`6`无关的活动。


    ### Types and Maps


    包中的所有对象都被分配了一个类型。此类型用于解释存储在对象字节集合中的数据。对象被分配为以下类型之一：


    *   `Action`

    *   `Event`

    *   `Pred_compare`（从事件中检索数据）

    *   `Pred_source`（比较数据类型）

    *   `Target`

    *   `Type`


    您可以通过执行清单[19-2]中的查询来找到谓词比较器和谓词源的列表。


    ```

    --Retrieve list of predicate comparators

    SELECT name

    ,description,

    (SELECT name

    FROM sys.dm_xe_packages

    WHERE guid = xo.package_guid) Package

    FROM sys.dm_xe_objects xo

    WHERE object_type = ''pred_compare''

    ORDER BY name ;

    --Retrieve list of predicate sources

    SELECT name

    ,description,

    (SELECT name

    FROM sys.dm_xe_packages

    WHERE guid = xo.package_guid) Package

    FROM sys.dm_xe_objects xo

    WHERE object_type = ''pred_source''

    ORDER BY name ;

    Listing 19-2

    Retrieving Predicate Comparators and Sources

    ```


    *映射*是一个字典，将内部ID值映射为DBA可以理解的字符串。映射键仅在其上下文中是唯一的，并在不同上下文之间重复。例如，在`statement_recompile_cause`上下文中，`map_key`为`1`对应于`map_value`为`Schema
    Changed`。然而，在`database_sql_statement`类型的上下文中，`map_key`为`1`对应于`map_value`为`CREATE
    DATABASE`。您可以使用`sys.dm_xe_map_values` DMV查找完整的映射列表，如清单[19-3]所示。要检查特定上下文的映射，请对name列进行筛选。


    ```

    SELECT

    map_key

    , map_value

    , name

    FROM sys.dm_xe_map_values ;

    Listing 19-3

    Sys.dm_xe_map_values

    ```


    ### Sessions


    *会话*本质上是一个跟踪。它可以包含来自多个包、操作、目标和谓词的事件。当您启动或停止会话时，就是在打开或关闭跟踪。会话启动时，事件被写入内存缓冲区，并在发送到目标之前应用谓词。因此，在创建会话时，您需要配置属性，例如会话可用于缓冲的内存量、如果会话遇到内存压力可以丢弃哪些事件，以及事件发送到目标前的最大延迟。


    ## Creating an Event Session


    您可以使用新建会话向导、新建会话对话框或通过T-SQL创建事件会话。我们将在以下部分探讨这些选项。然而，在创建任何事件会话之前，我们首先创建`Chapter19`数据库，用数据填充它，并创建存储过程，这些将在后面的示例中使用。清单[19-4]包含执行此操作的脚本。


    ```

    --Create the database

    CREATE DATABASE Chapter19 ;

    GO

    USE Chapter19

    GO

    --Create and populate numbers table

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE;

    --Create and populate name pieces

    DECLARE @Names TABLE

    (

    FirstName        VARCHAR(30),

    LastName        VARCHAR(30)

    );

    INSERT INTO @Names

    VALUES(''Peter'', ''Carter''),

    (''Michael'', ''Smith''),

    (''Danielle'', ''Mead''),

    (''Reuben'', ''Roberts''),

    (''Iris'', ''Jones''),

    (''Sylvia'', ''Davies''),

    (''Finola'', ''Wright''),

    (''Edward'', ''James''),

    (''Marie'', ''Andrews''),

    (''Jennifer'', ''Abraham'');

    --Create and populate Customers table

    CREATE TABLE dbo.Customers

    (

    CustomerID           INT                NOT NULL        IDENTITY                    PRIMARY
    KEY,

    FirstName            VARCHAR(30)        NOT NULL,

    LastName             VARCHAR(30)        NOT NULL,

    BillingAddressID     INT                NOT NULL,

    DeliveryAddressID    INT                NOT NULL,

    CreditLimit          MONEY              NOT NULL,

    Balance              MONEY              NOT NULL

    );

    SELECT * INTO #Customers

    FROM

    (SELECT

    (SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName,

    (SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) BillingAddressID,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) DeliveryAddressID,

    (SELECT TOP 1 CAST(RAND() * Number AS INT) * 10000

    FROM @Numbers

    ORDER BY NEWID()) CreditLimit,

    (SELECT TOP 1 CAST(RAND() * Number AS INT) * 9000

    FROM @Numbers

    ORDER BY NEWID()) Balance

    FROM @Numbers a

    CROSS JOIN @Numbers b

    ) a;

    INSERT INTO dbo.Customers

    SELECT * FROM #Customers;

    GO

    CREATE INDEX idx_LastName ON dbo.Customers(LastName)

    GO

    CREATE PROCEDURE UpdateCustomerWithPageSplits

    AS

    BEGIN

    UPDATE dbo.Customers

    SET FirstName = cast(FirstName + replicate(FirstName,10) as varchar(30))

    ,LastName = cast(LastName + replicate(LastName,10) as varchar(30)) ;

    END ;

    GO

    CREATE PROCEDURE UpdateCustomersWithoutPageSplits

    AS

    BEGIN

    UPDATE dbo.Customers

    SET CreditLimit = CreditLimit * 1.5

    WHERE Balance < CreditLimit - 10000 ;

    END ;

    GO

    Listing 19-4

    Creating the Chapter19 Database

    ```'
  raw: '### Predicates


    *Predicates* are filter conditions that you can apply before the system sends
    events to the target. It is possible to create simple predicates, such as filtering
    statements completing based on a database ID, but you can also create more complex
    predicates, such as only capturing a long IO that has a duration greater than
    5 seconds or only capturing the role change of an AlwaysOn Availability Group
    replica if it happens more than twice.


    Predicates also fully support short-circuiting. This means that if you use multiple
    conditions within a predicate, then the order of predicates is important, because
    if the evaluation of the first predicate fails, the second predicate will not
    be evaluated. Because predicates are evaluated synchronously, this can have an
    impact on performance. Therefore, it is prudent to design your predicates in such
    a way that predicates that are least likely to evaluate to `true` come before
    predicates that are very likely to evaluate to `true`. For example, imagine that
    you are planning to filter on a specific database (with a database ID of `6`)
    that is the target of a high percentage of the activity on the instance, but you
    also plan to filter on a specific user ID (`MyUser`), which is responsible for
    a lower percentage of the activity. In this scenario, you would use the `WHERE
    (([sqlserver].[username]=N''MyUser'') AND ([sqlserver].[database_id]=(6)))` predicate
    to first filter out activity that does not relate to `MyUser` and then filter
    out activity that does not relate to database ID `6`.


    ### Types and Maps


    All objects within a package are assigned a type. This type is used to interpret
    the data stored within the byte collection of an object. Objects are assigned
    one of the following types:


    *   `Action`


    *   `Event`


    *   `Pred_compare` (retrieve data from events)


    *   `Pred_source` (compare data types)


    *   `Target`


    *   `Type`


    You can find a list of predicate comparators and predicate sources by executing
    the queries in Listing [19-2](#333037_2_En_19_Chapter.xhtml#PC2).


    ```

    --Retrieve list of predicate comparators

    SELECT name

    ,description,

    (SELECT name

    FROM sys.dm_xe_packages

    WHERE guid = xo.package_guid) Package

    FROM sys.dm_xe_objects xo

    WHERE object_type = ''pred_compare''

    ORDER BY name ;

    --Retrieve list of predicate sources

    SELECT name

    ,description,

    (SELECT name

    FROM sys.dm_xe_packages

    WHERE guid = xo.package_guid) Package

    FROM sys.dm_xe_objects xo

    WHERE object_type = ''pred_source''

    ORDER BY name ;

    Listing 19-2

    Retrieving Predicate Comparators and Sources

    ```


    A *map* is a dictionary that maps internal ID values to strings that DBAs can
    understand. Map keys are only unique within their context and are repeated between
    contexts. For example, within the `statement_recompile_cause` context, a `map_key`
    of `1` relates to a `map_value` of `Schema Changed`. Within the context of a `database_sql_statement`
    type, however, a `map_key` of `1` relates to a `map_value` of `CREATE DATABASE`.
    You can find a complete list of mappings by using the `sys.dm_xe_map_values` DMV,
    as demonstrated in Listing [19-3](#333037_2_En_19_Chapter.xhtml#PC3). To check
    the mappings for a specific context, filter on the name column.


    ```

    SELECT

    map_key

    , map_value

    , name

    FROM sys.dm_xe_map_values ;

    Listing 19-3

    Sys.dm_xe_map_values

    ```


    ### Sessions


    A *session* is essentially a trace. It can contain events from multiple packages,
    actions, targets, and predicates. When you start or stop a session, you are turning
    the trace on or off. When a session starts, events are written to memory buffers
    and have predicates applied before they are sent to the target. Therefore, when
    creating a session, you need to configure properties, such as how much memory
    the session can use for buffering, what events can be dropped if the session experiences
    memory pressure, and the maximum latency before the events are sent to the target.


    ## Creating an Event Session


    You can create an event session using either the New Session Wizard, the New Session
    dialog box, or via T-SQL. We explore each of these options in the following sections.
    Before creating any event sessions, however, we first create the `Chapter19` database,
    populate it with data, and create stored procedures, which we use in later examples.
    Listing [19-4](#333037_2_En_19_Chapter.xhtml#PC4) contains the script to do this.


    ```

    --Create the database

    CREATE DATABASE Chapter19 ;

    GO

    USE Chapter19

    GO

    --Create and populate numbers table

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE;

    --Create and populate name pieces

    DECLARE @Names TABLE

    (

    FirstName        VARCHAR(30),

    LastName        VARCHAR(30)

    );

    INSERT INTO @Names

    VALUES(''Peter'', ''Carter''),

    (''Michael'', ''Smith''),

    (''Danielle'', ''Mead''),

    (''Reuben'', ''Roberts''),

    (''Iris'', ''Jones''),

    (''Sylvia'', ''Davies''),

    (''Finola'', ''Wright''),

    (''Edward'', ''James''),

    (''Marie'', ''Andrews''),

    (''Jennifer'', ''Abraham'');

    --Create and populate Customers table

    CREATE TABLE dbo.Customers

    (

    CustomerID           INT                NOT NULL        IDENTITY                    PRIMARY
    KEY,

    FirstName            VARCHAR(30)        NOT NULL,

    LastName             VARCHAR(30)        NOT NULL,

    BillingAddressID     INT                NOT NULL,

    DeliveryAddressID    INT                NOT NULL,

    CreditLimit          MONEY              NOT NULL,

    Balance              MONEY              NOT NULL

    );

    SELECT * INTO #Customers

    FROM

    (SELECT

    (SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName,

    (SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) BillingAddressID,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) DeliveryAddressID,

    (SELECT TOP 1 CAST(RAND() * Number AS INT) * 10000

    FROM @Numbers

    ORDER BY NEWID()) CreditLimit,

    (SELECT TOP 1 CAST(RAND() * Number AS INT) * 9000

    FROM @Numbers

    ORDER BY NEWID()) Balance

    FROM @Numbers a

    CROSS JOIN @Numbers b

    ) a;

    INSERT INTO dbo.Customers

    SELECT * FROM #Customers;

    GO

    CREATE INDEX idx_LastName ON dbo.Customers(LastName)

    GO

    CREATE PROCEDURE UpdateCustomerWithPageSplits

    AS

    BEGIN

    UPDATE dbo.Customers

    SET FirstName = cast(FirstName + replicate(FirstName,10) as varchar(30))

    ,LastName = cast(LastName + replicate(LastName,10) as varchar(30)) ;

    END ;

    GO

    CREATE PROCEDURE UpdateCustomersWithoutPageSplits

    AS

    BEGIN

    UPDATE dbo.Customers

    SET CreditLimit = CreditLimit * 1.5

    WHERE Balance < CreditLimit - 10000 ;

    END ;

    GO

    Listing 19-4

    Creating the Chapter19 Database

    ```'
