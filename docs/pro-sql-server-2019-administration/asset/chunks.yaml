- fmt: '### 创建 SQL Server Agent 作业


    在接下来的章节中，我们将创建一个简单的 SQL Server Agent 作业，该作业运行一个操作系统命令来删除旧的备份文件。然后，我们将创建一个更复杂的
    SQL Server Agent 作业，该作业备份数据库并运行一个 PowerShell 脚本来确保 SQL Server Browser 服务正在运行。然而，在创建
    SQL Server Agent 作业之前，我们首先创建 `Chapter22` 数据库以及在后续章节中使用的安全主体。


    你可以在清单 [22-2](#333037_2_En_22_Chapter.xhtml#PC2) 中找到执行这些任务的脚本。该脚本使用 PowerShell
    创建两个域用户：`SQLUser` 和 `WinUser`。然后它使用 `SQLCMD` 来创建 `Chapter22` 数据库，之后为 `SQLUser`
    创建一个登录名，并将其映射到具有备份权限的 `Chapter22` 数据库。你可以从 PowerShell ISE（集成脚本环境）或 PowerShell
    命令提示符运行该脚本。你应该在 Windows Server 操作系统上运行该脚本；如果你在其他操作系统上运行，则需要手动准备环境。


    ```powershell

    Set-ExecutionPolicy Unrestricted

    import-module SQLPS

    import-module servermanager

    Add-WindowsFeature -Name "RSAT-AD-PowerShell" -IncludeAllSubFeature

    New-ADUser SQLUser -AccountPassword (ConvertTo-SecureString -AsPlainText "Pa$$w0rd"
    -Force) -Server "PROSQLADMIN.COM"

    Enable-ADAccount -Identity SQLUser

    New-ADUser WinUser -AccountPassword (ConvertTo-SecureString -AsPlainText "Pa$$w0rd"
    -Force) -Server "PROSQLADMIN.COM"

    Enable-ADAccount -Identity WinUser

    $perm = [ADSI]"WinNT://SQLServer/Administrators,group"

    $perm.psbase.Invoke("Add",([ADSI]"WinNT://PROSQLADMIN/WinUser").path)

    invoke-sqlcmd -ServerInstance .\MasterServer -Query "--Create the database

    CREATE DATABASE Chapter22 ;

    GO

    USE Chapter22

    GO

    --Create and populate numbers table

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE;

    --Create and populate name pieces

    DECLARE @Names TABLE

    (

    FirstName       VARCHAR(30),

    LastName        VARCHAR(30)

    );

    INSERT INTO @Names

    VALUES(''Peter'', ''Carter''),

    (''Michael'', ''Smith''),

    (''Danielle'', ''Mead''),

    (''Reuben'', ''Roberts''),

    (''Iris'', ''Jones''),

    (''Sylvia'', ''Davies''),

    (''Finola'', ''Wright''),

    (''Edward'', ''James''),

    (''Marie'', ''Andrews''),

    (''Jennifer'', ''Abraham'');

    --Create and populate Customers table

    CREATE TABLE dbo.Customers

    (

    CustomerID       INT           NOT NULL    IDENTITY    PRIMARY KEY,

    FirstName          VARCHAR(30)   NOT NULL,

    LastName           VARCHAR(30)   NOT NULL,

    BillingAddressID   INT           NOT NULL,

    DeliveryAddressID  INT           NOT NULL,

    CreditLimit        MONEY         NOT NULL,

    Balance            MONEY         NOT NULL

    );

    SELECT * INTO #Customers

    FROM

    (SELECT

    (SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName,

    (SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) BillingAddressID,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) DeliveryAddressID,

    (SELECT TOP 1 CAST(RAND() * Number AS INT) * 10000

    FROM @Numbers

    ORDER BY NEWID()) CreditLimit,

    (SELECT TOP 1 CAST(RAND() * Number AS INT) * 9000

    FROM @Numbers

    ORDER BY NEWID()) Balance

    FROM @Numbers a

    ) a;

    --Create the SQLUser Login and DB User

    USE Master

    GO

    CREATE LOGIN [PROSQLADMIN\sqluser] FROM WINDOWS WITH DEFAULT_DATABASE=Chapter22
    ;

    GO

    USE Chapter22

    GO

    CREATE USER [PROSQLADMIN\sqluser] FOR LOGIN [PROSQLADMIN\sqluser] ;

    GO

    --Add the SQLUser to the db_backupoperator group

    ALTER ROLE db_backupoperator ADD MEMBER [PROSQLADMIN\sqluser] ;

    GO"

    Listing 22-2

    Preparing the Environment

    ```


    ### 创建简单的 SQL Server Agent 作业


    我们首先创建一个简单的 Server Agent 作业，该作业使用操作系统命令删除超过 30 天的备份文件，并将此作业安排为每月运行一次。我们使用“新建作业”对话框创建
    SQL Server Agent 对象。要调用此对话框，请在对象资源管理器中浏览到 `SQL Server Agent`，并从“作业”上下文菜单中选择“新建作业”。图
    [22-2](#333037_2_En_22_Chapter.xhtml#Fig2) 说明了“新建作业”对话框的“常规”页面。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig2_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig2_HTML.jpg)

    图 22-2 常规页面


    在此页面上，我们将作业命名为 `DeleteOldBackups`，并将作业所有者更改为 `sa` 帐户。我们还可以选择添加作业的描述并选择一个类别。


    在“步骤”页面上，我们使用“新建”按钮调用“新建作业步骤”对话框。此对话框的“常规”选项卡如图 [22-3](#333037_2_En_22_Chapter.xhtml#Fig3)
    所示。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig3_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig3_HTML.jpg)

    图 22-3 常规页面


    在此页面上，我们为作业步骤指定一个名称，在“类型”下拉列表中指定该步骤是操作系统命令，并在“运行身份”下拉列表中确认该步骤在 SQL Server Agent
    服务帐户的安全上下文下运行。在“命令”部分，我们输入一个批处理命令，该命令从我们的默认备份位置删除所有超过 30 天且文件扩展名为 `.bak` 的文件。你可以在清单
    [22-3](#333037_2_En_22_Chapter.xhtml#PC3) 中找到此批处理命令。


    ```cmd

    forfiles -p "C:\Program Files\Microsoft SQL Server\MSSQL12.MASTERSERVER\MSSQL\Backup"
    -s -m *.bak /D -30 /C "cmd /c del @path"

    Listing 22-3

    Removing Old Backups

    ```


    在“新建作业步骤”对话框的“高级”页面（如图 [22-4](#333037_2_22_Chapter.xhtml#Fig4) 所示）中，我们保留默认设置。然而，在更复杂的场景中，我们可以使用此页面来配置日志记录和控制决策树逻辑。我们将在下一节中讨论这一点。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig4_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig4_HTML.jpg)

    图 22-4 高级页面


    一旦配置了作业步骤，我们就可以退出“新建作业步骤”对话框并返回到“新建作业”对话框。现在，我们转到“计划”页面。在此页面上，我们使用“新建”按钮调用“新建作业计划”对话框，如图
    [22-5](#333037_2_En_22_Chapter.xhtml#Fig5) 所示。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig5_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig5_HTML.jpg)

    图 22-5 “新建作业计划”对话框


    在“新建作业计划”对话框中，我们首先输入计划的名称。默认计划类型是“重复出现”，但如果我们选择其他选项，屏幕会动态变化。在屏幕的“频率”部分，我们选择“每月”。同样，如果我们在该下拉列表中选择“每周”或“每天”，屏幕也会动态变化。


    我们现在可以配置希望计划调用作业执行的日期和时间。在我们的场景中，我们保留午夜、每月第一天的默认选项。


    在“新建作业”对话框的“通知”页面上，我们配置希望在作业完成时发生的任何操作。如图 [22-6](#333037_2_En_22_Chapter.xhtml#Fig6)
    所示，我们配置了一个条目，如果作业失败，则写入 Windows 应用程序日志。如果你的企业由 SCOM 等监控工具管理，这是一个特别有用的选项，因为你可以配置
    SCOM 监控 Windows 应用程序日志中的失败条目并向 DBA 团队发送警报。在下一节中，我们将讨论如何直接从 SQL Server Agent 配置电子邮件通知。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig6_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig6_HTML.jpg)

    图 22-6 通知页面'
