  trans: "\n### 注意\n\n仅当您的服务器尚未配置为接收 SQL Server 的产品更新时，此屏幕才会出现。\n\n向导的下一个屏幕将尝试扫描 SQL\
    \ Server 更新，以确保您在安装过程中安装了最新的 `CUs`（累积更新）和 `SPs`（服务包）。它将检查本地服务器上的 Microsoft 更新服务以获取这些更新，并列出任何可用的更新。这是流式安装功能的扩展，允许您通过指定更新位置，在安装基础二进制文件的同时安装更新，但此功能现已**已弃用**。产品更新页面也可以配置为在本地文件夹或网络位置中查找更新。此功能将在第\
    \ 3 章中详细讨论。\n\n### 注意\n\n如果未找到产品更新，则不会出现此屏幕。\n\n随着安装程序进入向导的下一个页面（如图 2-12 所示），SQL\
    \ Server 安装所需文件的提取和安装开始，并显示进度。此屏幕还显示产品更新找到的任何更新包的下载和提取进度。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig12_HTML.jpg](img/333037_2_En_2_Fig12_HTML.jpg)\n\
    \n图 2-12：安装程序文件页面\n\n如图 2-13 所示，向导的下一个屏幕运行安装规则检查，并显示在安装开始前您可能需要解决的错误或警告。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig13_HTML.jpg](img/333037_2_En_2_Fig13_HTML.jpg)\n\
    \n图 2-13：安装规则页面\n\n在图 2-13 中，请注意显示的 Windows 防火墙警告。这不会阻止安装继续，但它会警告您服务器已开启 Windows\
    \ 防火墙。默认情况下，Windows 防火墙未配置为允许 SQL Server 流量，因此必须创建规则才能使客户端应用程序能够与您正在安装的实例通信。我们将在第\
    \ 5 章详细讨论 SQL Server 端口和防火墙配置。\n\n假设在继续之前未发现需要解决的错误，向导的下一页将允许您选择应安装的功能。这将在下一节详细讨论。\n\
    \n### 功能选择页面\n\n安装向导的“功能选择”页面允许您选择要安装的选项。每个可用选项的概述可以在第 1 章中找到。功能选择页面如图 2-14 所示。\n\
    \n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig14_HTML.jpg](img/333037_2_En_2_Fig14_HTML.jpg)\n\
    \n图 2-14：功能选择页面\n\n我们将选择以下功能，因为它们将用于本书中的演示和讨论。\n\n*   数据库引擎服务\n    *   SQL Server\
    \ 复制\n*   客户端工具连接性\n*   分布式重放控制器\n*   分布式重放客户端\n\n此外，向导的此页面要求您指定实例根目录和共享功能目录的文件夹位置。您可能希望将这些位置移动到不同的驱动器，以便将\
    \ `C:\\` 驱动器留给操作系统。您可能出于空间原因或仅仅为了将 SQL Server 二进制文件与其他应用程序隔离而这样做。实例根目录通常将包含您在服务器上创建的每个实例的一个文件夹，并且数据库引擎、`SSAS`\
    \ 和 `SSRS` 安装将有单独的文件夹。与数据库引擎关联的文件夹将称为 `MSSQL15.[实例名称]`，其中实例名称是您的实例名称，对于默认实例则为\
    \ `MSSQLSERVER`。此文件夹名称中的数字 `15` 与 SQL Server 的版本相关，SQL Server 2019 对应为 `15`。此文件夹将包含一个名为\
    \ `MSSQL` 的子文件夹，该子文件夹又将包含与您的实例关联的文件所在的文件夹，包括一个名为 `Binn` 的文件夹（其中包含与您的实例关联的应用程序文件、应用程序扩展和\
    \ XML 配置）、一个名为 `Backup` 的文件夹（它将作为数据库备份的默认位置）以及一个名为 `Data` 的文件夹（它将是系统数据库的默认位置）。`TempDB`、用户数据库和备份的默认文件夹可以在安装过程的后期修改，并且如第\
    \ 1 章所述，在许多环境中将这些数据库拆分到单独的卷中是一种良好实践。这里还将创建其他文件夹，包括一个名为 `LOGS` 的文件夹，它将是错误日志和默认扩展事件运行状况跟踪文件的默认位置。\n\
    \n如果您在 64 位环境中安装 SQL Server，系统将要求您同时输入 32 位和 64 位版本的共享功能目录的文件夹。这是因为某些 SQL Server\
    \ 组件始终作为 32 位进程安装。32 位和 64 位组件不能共享目录，因此为了使安装继续，您必须为这些选项中的每一个指定不同的文件夹。共享功能目录成为所有\
    \ SQL Server 实例共享的功能（例如 `SDKs` 和管理工具）的根级目录。\n\n在向导的下一页（如图 2-15 所示），将执行额外的规则检查，以确保您选择的功能可以安装。\n\
    \n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig15_HTML.jpg](img/333037_2_En_2_Fig15_HTML.jpg)\n\
    \n图 2-15：功能规则页面\n\n检查的规则将根据您选择的功能而有所不同。\n"
- fmt: '## The Instance Configuration Page


    规则检查成功完成后，安装向导的以下屏幕将允许您指定是要安装默认实例还是命名实例，如图 [2-16](#333037_2_En_2_Chapter.xhtml#Fig16)
    所示。屏幕下半部分的框将为您提供服务器上已安装的任何其他实例或共享功能的详细信息。


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig16_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig16_HTML.jpg)


    Figure 2-16


    Instance Configuration page


    默认实例与命名实例的区别在于，默认实例使用其安装所在的服务器名称，而命名实例则被赋予一个扩展名称。这有一个明显的副作用：一个服务器上只能有一个 `SQL Server`
    默认实例，但可以有多个命名实例。使用 `SQL Server 2019`，单个服务器最多可托管 50 个独立实例。当然，这些实例将共享服务器的物理资源。对于故障转移群集，如果您的数据托管在
    `SMB` 文件共享上，此数字保持不变；但如果使用共享群集磁盘进行存储，则减少到 25 个。


    安装命名实例之前，并不需要先安装默认实例。服务器上只有命名实例而没有默认实例是一种完全有效的配置。许多 `DBA` 团队选择只在他们的环境中支持命名实例，以便能够在
    `SQL Server` 层强制执行有意义的命名约定，而不是依赖构建服务器或虚拟机的基础设施团队所施加的命名约定。实例名称的最大长度为 16 个字符。默认情况下，`InstanceID`
    将设置为实例名称，对于默认实例则为 `MSSQLSERVER`。虽然可以更改此 `ID`，但这是一种不良做法，因为此 `ID` 用于标识注册表项和安装目录。


    ## Selecting Service Accounts


    向导的下一个屏幕分为两个选项卡。第一个选项卡允许您为每个 `SQL Server` 服务指定服务帐户，如图 [2-17](#333037_2_En_2_Chapter.xhtml#Fig17)
    所示，第二个选项卡允许您指定实例的排序规则。


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig17_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig17_HTML.jpg)


    Figure 2-17


    Service Accounts Configuration page


    `SQL Server 2019` 支持使用本地和域帐户、内置帐户、虚拟帐户、`MSAs`（托管服务帐户）和 `gMSAs`（组托管服务帐户）作为运行服务的安全上下文。您选择的服务帐户模型对您环境的安全性和可管理性都至关重要。


    不同的组织对服务帐户模型有不同的要求，您可能会受到合规性要求和许多其他因素的限制。本质上，您所做的选择是在环境的安全性和操作支持性之间进行权衡。例如，`Microsoft`
    的最佳实践是为每个服务使用单独的服务帐户，并确保您环境中的每个服务器都使用一组离散的服务帐户，因为这完全强制执行了*最小权限原则*。*最小权限原则*规定，每个安全上下文将被授予执行其日常活动所需的最小权限集。


    然而，在现实中，您会发现这种方法给您的 `SQL Server` 环境带来了显著的复杂性，并且可能增加操作支持的成本，同时在灾难场景中还可能增加停机窗口。另一方面，我也曾在服务帐户模型非常粗略的组织中工作过，以至于每个区域只有一组
    `SQL Server` 服务帐户。这种方法也可能导致重大问题。假设您有一个大型环境，并且整个环境使用相同的服务帐户。再想象一下，您有一个合规性要求，需要每
    90 天更改一次服务帐户密码。这意味着您将同时导致整个 `SQL Server` 环境的停机。这根本不实际。


    这个问题没有绝对的对错答案，解决方案将取决于各个组织的需求和约束。然而，对于使用域帐户作为服务帐户的组织，我倾向于为每个数据层应用程序推荐一组不同的服务帐户。因此，想象一个环境，如图
    [2-18](#333037_2_En_2_Chapter.xhtml#Fig18) 所示，您的数据层应用程序在主站点由一个双节点群集和一个 `ETL` 服务器组成，在辅助站点有两台灾备服务器，这种设计将涉及所有这些实例共用的一组服务帐户，但其他数据层应用程序不允许使用这些帐户，需要它们自己的一组。


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig18_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig18_HTML.jpg)


    Figure 2-18


    Service account model by data-tier application


    当然，这种模型也带来了它自身的挑战。例如，如果您开始合并过程，就需要审查和修改此策略。由于围绕服务帐户管理的挑战，`Microsoft` 引入了虚拟帐户和
    `MSA`。*虚拟帐户*是没有密码管理要求的本地帐户。它们可以使用创建它们的服务器的计算机身份访问域。另一方面，*托管服务帐户*是域级帐户。它们在 `AD`（活动目录）中提供自动密码管理，并且只要您的域运行的功能级别是
    `Windows Server 2008 R2` 或更高版本，它们还会自动维护其 `Kerberos SPN`（服务主体名称）。


    然而，这两种类型的帐户都有一个限制。它们只能在单个服务器上使用。如前所述，这可能会给您的 `SQL Server` 环境引入复杂性，特别是对于高可用的多服务器应用程序。这个问题已通过引入组
    `MSA` 得到解决，它使您能够将 `MSA` 与域中的多个服务器关联起来。但是，要使用此功能，您的林需要运行在 `Windows Server 2012`
    或更高版本的功能级别上。


    此外，在此向导页面上，您可以选择授予 `SQL Server` 服务帐户“执行卷维护任务”用户权限分配。如果选择此选项，那么 `SQL Server` 将能够创建数据库文件和增长数据库文件，而无需用零填充空闲空间。这显著提高了文件创建和增长操作的性能。


    权衡之处在于它打开了一个非常小的安全漏洞。如果数据库文件创建位置所在的磁盘区域存储了任何数据，那么使用专门的工具，有可能检索到该数据，因为它没有被覆盖。然而，利用此安全漏洞的机会非常渺茫，因此我总是建议授予此权限，即使在安全性要求最高的环境之外。


    ### Note


    此功能仅适用于数据库文件。事务日志文件中的空闲空间在创建或增长时总是需要用零填充。'
  raw: '### The Instance Configuration Page


    After successful completion of the rule check, the following screen of the wizard
    will allow you to specify if you would like to install a default instance or a
    named instance, as illustrated in Figure [2-16](#333037_2_En_2_Chapter.xhtml#Fig16).
    The box in the lower half of the screen will give you details of any other instances
    or shared features that are already installed on the server.


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig16_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig16_HTML.jpg)


    Figure 2-16


    Instance Configuration page


    The difference between a default instance and a named instance is that a default
    instance takes the name of the server that it is installed on, whereas a named
    instance is given an extended name. This has the obvious side effect that it is
    only possible to have a single default instance of SQL Server on a server, but
    you can have multiple named instances. With SQL Server 2019, up to 50 stand-alone
    instances can be hosted on a single server. Naturally, these instances will share
    the server’s physical resources. For failover clusters, this number stays the
    same if your data is hosted on an SMB file share, but it reduces to 25 if you
    use a shared cluster disk for storage.


    You are not required to install a default instance before installing a named instance.
    It is a perfectly valid configuration to have only named instances on a server
    with no default instance. Many DBA teams choose to only support named instances
    in their environments so that they can enforce naming conventions that are meaningful
    at the SQL Server layer, as opposed to relying on the naming conventions imposed
    by the infrastructure teams who build the servers or VMs. The maximum length of
    an instance name is 16 characters. By default, the InstanceID will be set to the
    instance name, or MSSQLSERVER for a default instance. Although it is possible
    to change this ID, it is bad practice to do so, because this ID is used to identify
    Registry keys and installation directories.


    ### Selecting Service Accounts


    The next screen of the wizard is separated into two tabs. The first tab will allow
    you to specify service accounts for each of the SQL Server services, as illustrated
    in Figure [2-17](#333037_2_En_2_Chapter.xhtml#Fig17), and the second tab will
    allow you to specify the collation of your instance.


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig17_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig17_HTML.jpg)


    Figure 2-17


    Service Accounts Configuration page


    SQL Server 2019 supports the use of local and domain accounts, built-in accounts,
    virtual accounts, MSAs (managed service accounts), and gMSAs (group managed service
    accounts) as the security context used to run a service. The service account model
    that you choose is key to both the security and manageability of your environment.


    Different organizations have different requirements for service account models,
    and you may be constrained by compliance requirements and many other factors.
    Essentially, the choice that you make is a trade-off between the security and
    operational supportability of your environment. For example, the Microsoft best
    practice is to use a separate service account for every service and to ensure
    that every server in your environment uses a discrete set of service accounts,
    since this fully enforces the principle of least privilege. The *principle of
    least privilege* states that each security context will be granted the minimum
    set of permissions required for it to carry out its day-to-day activities.


    In reality, however, you will find that this approach introduces significant complexity
    into your SQL Server estate, and it can increase the cost of operational support
    while also risking increasing outage windows in disaster scenarios. On the flip
    side, I have worked in organizations where the service account model is very coarse,
    to the point where there is only a single set of SQL Server service accounts for
    each region. This approach can also cause significant issues. Imagine that you
    have a large estate and the whole estate uses the same service account. Now imagine
    that you have a compliance requirement to change service account passwords on
    a 90-day basis. This means that you would cause an outage to your entire SQL Server
    estate at the same time. This simply is not practical.


    There is no right or wrong answer to this problem, and the solution will depend
    on the requirements and constraints of individual organizations. For organizations
    that use domain accounts as service accounts, however, I tend to recommend a distinct
    set of service accounts for each data-tier application. So if you imagine an environment,
    as shown in Figure [2-18](#333037_2_En_2_Chapter.xhtml#Fig18), where your data-tier
    application consists of a two-node cluster and an ETL server in a primary site,
    and two DR servers in a secondary site, this design would involve a common set
    of service accounts used by all of these instances, but other data-tier applications
    would not be allowed to use these accounts and would require their own set.


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig18_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig18_HTML.jpg)


    Figure 2-18


    Service account model by data-tier application


    Of course, this model poses its own challenges. For example, you would need to
    review and amend this policy if you were to start a process of consolidation.
    Because of the challenges surrounding service account management, Microsoft introduced
    virtual accounts and MSAs. *Virtual accounts* are local accounts that have no
    password management requirements. They can access the domain by using the computer
    identity of the server on which they have been created. *Managed service accounts*
    , on the other hand, are domain-level accounts. They provide automatic password
    management within AD (Active Directory) and also automatically maintain their
    Kerberos SPNs (service principal names), as long as your domain is running at
    the functional level of Windows Server 2008 R2 or higher.


    Both of these types of account have a limitation, however. They can only be used
    on a single server. As discussed earlier, this can introduce complexity into your
    SQL Server estate, especially for highly available, multiserver applications.
    This issue has been resolved by the introduction of group MSAs, which give you
    the ability to associate an MSA with multiple servers within the domain. In order
    to use this functionality, however, your forest needs to be running at the functional
    level of Windows Server 2012 or higher.


    Additionally, on this page of the wizard, you can choose to grant the Perform
    Volume Maintenance Tasks user rights assignment to the SQL Server service account.
    If you select this option, then SQL Server will have the ability to create database
    files and grow database files without the need to fill the empty space with zeros.
    This significantly improves the performance of file creation and growth operations.


    The trade-off is that it opens a very small security hole. If any data was stored
    on the same area of the disk that the database file is created on, then with specialized
    tooling, it is possible to retrieve that data, as it has not been overwritten.
    The chance of exploitation of this security hole is so remote, however, that I
    always recommend granting this privilege, in all but the most secure environments.


    ### Note


    This functionality only applies to database files. The free space in transaction
    log files always have to be filled with zeros when they are created, or when they
    grow.'
