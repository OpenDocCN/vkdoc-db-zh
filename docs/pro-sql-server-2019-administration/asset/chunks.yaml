    For security reasons, these files are recompiled based on database metadata every
    time the SQL Server service starts. This means that if the DLLs are tampered with,
    the changes made will not persist. Additionally, the files are linked to the SQL
    Server process to prevent them from being modified.


    SQL Server automatically removes the DLLs when they are no longer needed. After
    a table has been dropped and a checkpoint has subsequently been issued, the DLLs
    are unloaded from memory and physically deleted from the file system, either when
    the instance is restarted or when the databases are taken offline or dropped.


    #### Natively Compiled Stored Procedures


    In addition to natively compiled memory-optimized tables, SQL Server 2019 also
    supports natively compiled stored procedures. As mentioned earlier in this chapter,
    these procedures can reduce CPU overhead and offer a performance benefit over
    traditionally interpreted stored procedures because fewer CPU cycles are required
    during their execution.


    The syntax for creating a natively compiled stored procedure is similar to the
    syntax for creating an interpreted stored procedure, but there are some subtle
    differences. First, the procedure must start with a `BEGIN ATOMIC` clause. The
    body of the procedure must include precisely one `BEGIN ATOMIC` clause. The transaction
    within this block will commit when the block ends. The block must terminate with
    an `END` statement. When you begin the atomic block, you *must* specify the isolation
    level and the language to use.


    You will also notice that the `WITH` clause contains `NATIVE_COMPILATION`, `SCHEMABINDING`,
    and `EXECUTE AS` options. `SCHEMABINDING` must be specified for natively compiled
    procedures. This prevents the objects on which it depends from being altered.
    You must also specify the `EXECUTE AS` clause because the default value for `EXECUTE
    AS` is `Caller`, but this is not a supported option for native compilation. This
    has implications if you are looking to migrate your existing interpreted SQL to
    natively compiled procedures, and it means that you should reassess your security
    policy as a prerequisite to code migration. The option is fairly self-explanatory.


    You can see an example of creating a natively compiled stored procedure in Listing
    [7-20](#333037_2_En_7_Chapter.xhtml#PC20). This procedure can be used to update
    the `OrdersMem` table.


    ```

    CREATE PROCEDURE UpdateOrdersMem

    WITH NATIVE_COMPILATION, SCHEMABINDING, EXECUTE AS OWNER

    AS

    BEGIN ATOMIC WITH (TRANSACTION ISOLATION LEVEL = SNAPSHOT, LANGUAGE = ''English'')

    UPDATE dbo.OrdersMem

    SET DeliveryDate = DATEADD(dd,1,DeliveryDate)

    WHERE DeliveryDate < GETDATE()

    END ;

    Listing 7-20

    Creating a Natively Compiled Stored Procedure

    ```


    When planning a code migration to natively compiled procedures, you should advise
    your development teams that there are many limitations, and they will not be able
    to use features including table variables, CTEs (Common Table Expressions), subqueries,
    the `OR` operator in `WHERE` clauses, and `UNION`.


    Like memory-optimized tables, DLLs are also created for natively compiled stored
    procedures. The modified script in Listing [7-21](#333037_2_En_7_Chapter.xhtml#PC21)
    displays a list of DLLs associated with natively compiled procedures.


    ```

    SELECT

    m.name DLL

    ,o.name ProcedureName

    ,description

    FROM sys.dm_os_loaded_modules m

    INNER JOIN sys.objects o

    ON o.object_id =

    (SELECT SUBSTRING(m.name, LEN(m.name) + 2 - CHARINDEX(''_'', REVERSE(m.name)),

    len(m.name) - (LEN(m.name) + 2 - CHARINDEX(''_'', REVERSE(m.name)) + 3) ))

    WHERE m.name like ''%xtp_p_'' + cast(db_id() as varchar(10)) + ''%'' ;

    Listing 7-21

    Viewing DLLs for Natively Compiled Procedures

    ```


    ## Summary


    SQL Server offers many features for optimizing tables. Partitioning allows tables
    to be split down into smaller structures, which means that SQL Server can read
    fewer pages in order to locate the rows that it needs to return. This process
    is called partition elimination. Partitioning also allows you to perform storage
    tiering by storing older, less frequently accessed data on inexpensive storage.


    `SWITCH`, `SPLIT`, and `MERGE` operations will help you implement sliding windows
    for your partitioned tables. `SWITCH` allows you to move data from its current
    partition to an empty partition or table as a metadata operation. `SPLIT` and
    `MERGE` allow you to insert and remove boundary points in a partition function.


    Two compression options are available for row-based tables. These types of compression
    are designed as a performance enhancement, because they allow SQL Server to reduce
    the amount of IO it needs to read all of the required rows from a table. Row compression
    works by storing numeric and Unicode values in the smallest space required, rather
    than the largest space required, for any acceptable value. Page compression implements
    row compression and also prefix and dictionary compression. This provides a higher
    compression ratio, meaning even less IO, but at the expense of CPU.


    Columnstore indexes have two compression methods. `COLUMNSTORE` is the standard
    compression type. `COLUMNSTORE_ARCHIVE` should only be used for infrequently accessed
    data.


    Memory-optimized tables are a feature of SQL Server, which enable massive performance
    gains by keeping an entire table resident in memory. This can significantly reduce
    IO pressure. You can use such tables in conjunction with natively compiled stored
    procedures, which can also increase performance, by interacting directly with
    the natively compiled DLLs of the memory-optimized tables and by reducing the
    CPU cycles required, as compared to interpreted code.


    # 8. Indexes and Statistics


    Recent versions of SQL Server support many different types of index that are used
    to enhance query performance. These include traditional clustered and nonclustered
    indexes, which are built on B-tree (balanced-tree) structures and enhance read
    performance on disk-based tables. There are also indexes that support complex
    data types, such as XML, JSON, and Geospatial data types. These advanced data
    type indexes are beyond the scope of this book, but a full discussion can be found
    in the Apress title *SQL Server Advanced Data Types*, which can be found at [`www.apress.com/gp/book/9781484239001`](http://www.apress.com/gp/book/9781484239001)
    . DBAs can also create Columnstore indexes to support data warehouse–style queries,
    where analysis is performed on very large tables. SQL Server also supports in-memory
    indexes, which enhance the performance of tables that are stored using In-Memory
    OLTP. This chapter discusses many of the available index types inside the Database
    Engine.


    SQL Server maintains statistics on index and table columns to enhance query performance
    by improving cardinality estimates. This allows the Query Optimizer to an efficient
    query plan. This chapter also discusses how to use and maintain statistics.'
  trans: '## 原生编译表


    当你创建一个内存优化表时，SQL Server 会使用本机代码将表编译成一个 DLL（动态链接库），并将该 DLL 加载到内存中。你可以通过运行清单 7-19
    中的查询来检查这些 DLL。该脚本检查 `dm_os_loaded_modules` DMV，然后根据 DLL 文件名中嵌入的表的 `object_id`
    与 `sys.tables` 进行联接。这使得查询能够返回表的名称。


    ```sql

    SELECT

    m.name DLL

    ,t.name TableName

    ,description

    FROM sys.dm_os_loaded_modules m

    INNER JOIN sys.tables t

    ON t.object_id =

    (SELECT SUBSTRING(m.name, LEN(m.name) + 2 - CHARINDEX(''_'', REVERSE(m.name)),

    len(m.name) - (LEN(m.name) + 2 - CHARINDEX(''_'', REVERSE(m.name)) + 3) ))

    WHERE m.name like ''%xtp_t_'' + cast(db_id() as varchar(10)) + ''%'' ;

    -- 清单 7-19

    -- 查看内存优化表的 DLL

    ```


    出于安全原因，每次 SQL Server 服务启动时，这些文件都会根据数据库元数据重新编译。这意味着如果 DLL 被篡改，所做的更改将不会持久化。此外，这些文件与
    SQL Server 进程关联，以防止它们被修改。


    当不再需要时，SQL Server 会自动删除这些 DLL。在表被删除并随后发出检查点之后，这些 DLL 将在实例重启时，或者当数据库脱机或被删除时，从内存中卸载并从文件系统中物理删除。


    ## 原生编译存储过程


    除了原生编译的内存优化表之外，SQL Server 2019 还支持原生编译存储过程。如本章前面所述，与传统的解释型存储过程相比，这些过程可以减少 CPU
    开销，并在执行时提供性能优势，因为它们所需的 CPU 周期更少。


    创建原生编译存储过程的语法与创建解释型存储过程的语法类似，但有一些细微的差别。首先，该过程必须以 `BEGIN ATOMIC` 子句开头。过程体必须包含且仅包含一个
    `BEGIN ATOMIC` 子句。该块内的事务将在块结束时提交。该块必须以 `END` 语句终止。当你开始这个原子块时，你`必须`指定隔离级别和使用的语言。


    你还会注意到 `WITH` 子句包含 `NATIVE_COMPILATION`、`SCHEMABINDING` 和 `EXECUTE AS` 选项。对于原生编译过程，必须指定
    `SCHEMABINDING`。这可以防止它所依赖的对象被更改。你还必须指定 `EXECUTE AS` 子句，因为 `EXECUTE AS` 的默认值是 `Caller`，但这并非原生编译支持的选项。如果你希望将现有的解释型
    SQL 代码迁移到原生编译过程，这一点具有重要影响，这意味着你应该在代码迁移前重新评估你的安全策略。这个选项的含义相当直观。


    你可以在清单 7-20 中看到一个创建原生编译存储过程的示例。此过程可用于更新 `OrdersMem` 表。


    ```sql

    CREATE PROCEDURE UpdateOrdersMem

    WITH NATIVE_COMPILATION, SCHEMABINDING, EXECUTE AS OWNER

    AS

    BEGIN ATOMIC WITH (TRANSACTION ISOLATION LEVEL = SNAPSHOT, LANGUAGE = ''English'')

    UPDATE dbo.OrdersMem

    SET DeliveryDate = DATEADD(dd,1,DeliveryDate)

    WHERE DeliveryDate < GETDATE()

    END ;

    -- 清单 7-20

    -- 创建一个原生编译存储过程

    ```


    在规划向原生编译过程的代码迁移时，你应该建议你的开发团队存在许多限制，他们将无法使用包括表变量、CTE（公用表表达式）、子查询、`WHERE` 子句中的 `OR`
    运算符以及 `UNION` 等特性。


    与内存优化表类似，也会为原生编译存储过程创建 DLL。清单 7-21 中修改后的脚本显示了与原生编译过程关联的 DLL 列表。


    ```sql

    SELECT

    m.name DLL

    ,o.name ProcedureName

    ,description

    FROM sys.dm_os_loaded_modules m

    INNER JOIN sys.objects o

    ON o.object_id =

    (SELECT SUBSTRING(m.name, LEN(m.name) + 2 - CHARINDEX(''_'', REVERSE(m.name)),

    len(m.name) - (LEN(m.name) + 2 - CHARINDEX(''_'', REVERSE(m.name)) + 3) ))

    WHERE m.name like ''%xtp_p_'' + cast(db_id() as varchar(10)) + ''%'' ;

    -- 清单 7-21

    -- 查看原生编译过程的 DLL

    ```


    ## 总结


    SQL Server 提供了许多用于优化表的功能。分区允许将表拆分成更小的结构，这意味着 SQL Server 可以读取更少的页面来定位需要返回的行。此过程称为分区消除。分区还允许你通过将较旧的、访问频率较低的数据存储在廉价的存储设备上来执行存储分层。


    `SWITCH`、`SPLIT` 和 `MERGE` 操作将帮助你为分区表实现滑动窗口。`SWITCH` 允许你将数据从其当前分区作为元数据操作移动到空分区或表中。`SPLIT`
    和 `MERGE` 允许你在分区函数中插入和删除边界点。


    基于行的表有两种压缩选项。这些压缩类型旨在作为性能增强，因为它们允许 SQL Server 减少从表中读取所有所需行所需的 I/O 量。行压缩的工作原理是将数值和
    Unicode 值存储在可接受值所需的最小空间中，而不是最大空间中。页面压缩实现了行压缩，并增加了前缀和字典压缩。这提供了更高的压缩比，意味着更少的 I/O，但以消耗
    CPU 为代价。


    列存储索引有两种压缩方法。`COLUMNSTORE` 是标准压缩类型。`COLUMNSTORE_ARCHIVE` 应仅用于不常访问的数据。


    内存优化表是 SQL Server 的一项功能，通过将整个表常驻内存来实现巨大的性能提升。这可以显著减少 I/O 压力。你可以将此类表与原生编译存储过程结合使用，后者通过与内存优化表的原生编译
    DLL 直接交互，并减少所需的 CPU 周期（与解释型代码相比），也能提高性能。


    ## 8. 索引和统计信息


    最近版本的 SQL Server 支持多种不同类型的索引，用于增强查询性能。这些包括建立在 B 树（平衡树）结构上的传统聚集和非聚集索引，它们增强了基于磁盘的表的读取性能。还有支持复杂数据类型的索引，例如
    XML、JSON 和地理空间数据类型。这些高级数据类型索引超出了本书的范围，但完整的讨论可以在 Apress 的书籍 *SQL Server Advanced
    Data Types* 中找到，该书位于 [`www.apress.com/gp/book/9781484239001`](http://www.apress.com/gp/book/9781484239001)。DBA
    还可以创建列存储索引以支持数据仓库风格的查询，即在非常大的表上进行分析。SQL Server 还支持内存中索引，这些索引增强了使用内存 OLTP 存储的表的性能。本章讨论了数据库引擎内部许多可用的索引类型。


    SQL Server 维护关于索引和表列的统计信息，通过改进基数估计来增强查询性能。这使得查询优化器能够生成高效的查询计划。本章还讨论了如何使用和维护统计信息。'
- fmt: '## Clustered Indexes


    A `B-tree` is a data structure you can use to organize key values so a user can
    search for the data they are looking for much more quickly than if they had to
    read the entire table. It is a tree-based structure where each node is allowed
    more than two child nodes. The tree is balanced, meaning there will always be
    the same number of steps to retrieve any single row of data.


    A `clustered index` is a B-tree structure that causes the data pages of a table
    to be logically stored in the order of the clustered index key. The clustered
    index key can be a single column or a set of columns that enforce uniqueness of
    each row in the table. This key is often the table’s primary key, and although
    this is the most typical usage, in some circumstances, you will want to use a
    different column. This is discussed in more detail later in this chapter.


    ### Tables Without a Clustered Index


    When a table exists without a clustered index, it is known as a `heap`. A heap
    consists of an IAM (index allocation map) page(s) and a series of data pages that
    are not linked together or stored in order. The only way SQL Server can determine
    the pages of the table is by reading the IAM page(s). When a table is stored as
    a heap, without an index, then every time the table is accessed, SQL Server must
    read every single page in the table, even if you only want to return one row.
    The diagram in Figure 8-1 illustrates how a heap is structured.


    ![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig1_HTML.jpg](images/333037_2_En_8_Chapter/333037_2_En_8_Fig1_HTML.jpg)


    Figure 8-1: Heap structure


    When data is stored on a heap, SQL Server needs to maintain a unique identifier
    for each row. It does this by creating a RID (row identifier). A RID has a format
    of `FileID:Page ID:Slot Number`, which is a physical location. Even if a table
    has nonclustered indexes, it is still stored as a heap, unless there is a clustered
    index. When nonclustered indexes are created on a heap, the RID is used as a pointer
    so that nonclustered indexes can link back to the correct row in the base table.


    ### Tables with a Clustered Index


    When you create a clustered index on a table, a B-tree structure is created. This
    B-tree is based on the values of the clustered key, and if the clustered index
    is not unique, it also includes a uniquifier. A `uniquifier` is a value used to
    identify rows if their key values are the same. This allows SQL Server to perform
    more efficient search operations by creating a tiered set of pointers to the data,
    as illustrated in Figure 8-2. The page at the top level of this hierarchy is called
    the `root node`. The bottom level of the structure is called the `leaf level`,
    and with a clustered index, the leaf level consists of the actual data pages of
    the table. B-tree structures can have one or more intermediate levels, depending
    on the size of the table.


    ![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig2_HTML.jpg](images/333037_2_En_8_Chapter/333037_2_En_8_Fig2_HTML.jpg)


    Figure 8-2: Clustered index structure


    Figure 8-2 shows that although the leaf level is the data itself, the levels above
    contain pointers to the pages below them in the tree. This allows SQL Server to
    perform a seek operation, which is a very efficient method of returning a small
    number of rows. It works by navigating its way down the B-tree, using the pointers,
    to find the row(s) it requires. In this figure, we can see that, if required,
    SQL Server can still scan all pages of the table in order to retrieve the required
    rows—this is known as a `clustered index scan`. Alternatively, SQL Server may
    decide to combine these two methods to perform a range scan. Here, SQL Server
    seeks the first value of the required range and then scans the leaf level until
    it encounters the first value that is not required. SQL Server can do this because
    the table is ordered by the index key, which means that it can guarantee that
    no other matching values appear later in the table.


    ### Clustering the Primary Key


    The primary key of a table is often the natural choice for the clustered index,
    because many OLTP applications access 99% of data through the primary key. In
    fact, by default, unless you specify otherwise, or unless a clustered index already
    exists on the table, creating a primary key automatically generates a clustered
    index on that key. There are circumstances when the primary key is not the correct
    choice for the clustered index. An example of this that I have witnessed is a
    third-party application that requires the primary key of the table to be a GUID.


    Creating a clustered index on a GUID introduces two major problems if the clustered
    index is to be built on the primary key. The first is size. A GUID is 16 bytes
    long. When a table has nonclustered indexes, the clustered index key is stored
    in every nonclustered index. For unique nonclustered indexes, it is stored for
    every row at the leaf level, and for nonunique nonclustered indexes, it is also
    stored at every row in the root and intermediate levels of the index. When you
    multiply 16 bytes by millions of rows, this drastically increases the size of
    the indexes, making them less efficient.


    The second issue is that when a GUID is generated, it is a random value. Because
    the data in your table is stored in the order of the clustered index key for good
    performance, you need the values of this key to be generated in sequential order.
    Generating random values for your clustered index key results in the index becoming
    more and more fragmented every time you insert a new row. Fragmentation is discussed
    later in this chapter.


    There is a workaround for the second issue, however. SQL Server has a function
    called `NEWSEQUENTIALID()`. This function always generates a GUID value that is
    higher than previous values generated on the server. Therefore, if you use this
    function in the default constraint of your primary key, you can enforce sequential
    inserts.


    ### Caution


    After the server has been restarted, `NEWSEQUENTIALID()` can start with a lower
    value. This may lead to fragmentation.


    If the primary key must be a GUID or another wide column, such as a Social Security
    Number, or if it must be a set of columns that form a natural key, such as Customer
    ID, Order Date, and Product ID, then it is highly recommended that you create
    an additional column in your table. You can make this column an `INT` or `BIGINT`,
    depending on the number of rows you expect the table to have, and you can use
    either the `IDENTITY` property or a `SEQUENCE` in order to create a narrow, sequential
    key for your clustered index.


    ### Tip


    Remember a narrow clustered key is important because it will be included in all
    other indexes on the table.


    ### Administering Clustered Indexes


    You can create a clustered index by using the `CREATE CLUSTERED INDEX` statement,
    as shown in Listing 8-1. Other methods you can use to create a clustered index
    are using the `ALTER TABLE` statement with a `PRIMARY KEY` clause and using the
    `INDEX` clause in the `CREATE TABLE` statement, as long as you are using SQL Server
    2014 or higher. This script creates a database called `Chapter8` and then a table
    called `CIDemo`. Finally, it creates a clustered index on the `ID` column of this
    table.


    ```sql

    -- Listing 8-1: Creating a clustered index

    CREATE CLUSTERED INDEX IX_CIDemo_ID ON dbo.CIDemo(ID);

    ```'
