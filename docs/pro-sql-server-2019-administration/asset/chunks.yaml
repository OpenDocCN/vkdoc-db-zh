- fmt: '### 创建分类器函数


    分类器函数是驻留在 Master 数据库中的标量 UDF（用户定义函数）。它返回类型为 `SYSNAME` 的值，这是系统定义的类型，等同于 `NVARCHAR(128)`。函数返回的值对应于每个请求应归入的工作负载组名称。函数内的逻辑决定返回哪个工作负载组名称。每个实例通常只有一个分类器函数，因此如果添加了额外的工作负载组，则需要修改该函数。


    现在，让我们使用本章构建的资源调控器环境创建一个分类器函数。该函数将根据以下规则对每个针对我们实例的请求进行分类：


    1.  如果请求是在 `SalesUser` 登录的上下文中发出的，则该请求应归入 `SalesUsers` 工作负载组。

    2.  如果请求由 `SalesManager` 登录发出，则请求应放置在 `Managers` 工作负载组中。

    3.  如果请求由 `ReportsUser` 登录发出，并且请求来自名为 `ReportsApp` 的服务器，则该请求应归入 `InternalReports`
    工作负载组。

    4.  如果请求由 `ReportsUser` 登录发出但并非源自 `ReportsApp` 服务器，则它应归入 `ExternalReports` 工作负载组。

    5.  所有其他请求都应放置到默认工作负载组。


    在创建分类器函数之前，我们需要准备实例。为此，我们首先创建 `Chapter24` 数据库。然后创建 `SalesUser`、`ReportsUser` 和
    `SalesManager` 登录，并将 `Users` 映射到 `Chapter24` 数据库。（关于安全原则的更多详细信息，请参见第 [10](#333037_2_En_10_Chapter.xhtml)
    章。）清单 [24-3](#333037_2_En_24_Chapter.xhtml#PC3) 包含了准备实例所需的代码。


    > **注意**

    >

    > 出于本示例的目的，用户被映射到 `Chapter24` 数据库，但你可以针对实例中的任何数据库进行查询。


    ```sql

    --Create the database

    USE [master]

    GO

    CREATE DATABASE Chapter24 ;

    --Create the Logins and Users

    CREATE LOGIN SalesUser

    WITH PASSWORD=N''Pa$$w0rd'', DEFAULT_DATABASE=Chapter24,

    CHECK_EXPIRATION=OFF, CHECK_POLICY=OFF ;

    GO

    CREATE LOGIN ReportsUser

    WITH PASSWORD=N''Pa$$w0rd'', DEFAULT_DATABASE=Chapter24,

    CHECK_EXPIRATION=OFF, CHECK_POLICY=OFF ;

    GO

    CREATE LOGIN SalesManager

    WITH PASSWORD=N''Pa$$w0rd'', DEFAULT_DATABASE=Chapter24,

    CHECK_EXPIRATION=OFF, CHECK_POLICY=OFF ;

    GO

    USE Chapter24

    GO

    CREATE USER SalesUser FOR LOGIN SalesUser ;

    GO

    CREATE USER ReportsUser FOR LOGIN ReportsUser ;

    GO

    CREATE USER SalesManager FOR LOGIN SalesManager ;

    GO

    ```

    清单 24-3

    准备实例


    为了实现关于每个请求应放置到哪个工作负载组的业务规则，我们使用表 [24-6](#333037_2_En_24_Chapter.xhtml#Tab6) 中详述的系统函数。


    表 24-6


    用于实现业务规则的系统函数


    | 函数 | 描述 | 业务规则 |

    | --- | --- | --- |

    | `SUSER_SNAME()` | 返回登录名 | 1, 2, 3, 4 |

    | `HOST_NAME()` | 发出请求的主机名 | 3, 4 |


    创建分类器函数时，它必须遵循特定规则。首先，函数必须是**架构绑定**的。这意味着任何被该函数引用的基础对象，如果不先删除该函数，就无法被更改。该函数还必须返回
    `SYSNAME` 数据类型且没有参数。


    值得注意的是，要求函数是架构绑定的这一点很重要，它对资源调控器的灵活性带来了限制。例如，如果能够基于数据库角色成员身份来委派工作负载将非常有用；然而，这是不可能的，因为架构绑定函数无法直接或间接访问其他数据库中的对象。由于分类器函数必须驻留在
    Master 数据库中，你无法访问有关其他数据库中数据库角色的信息。


    和所有情况一样，这个问题也有变通方法。例如，你可以在 Master 数据库中创建一个表来维护来自用户数据库的角色成员身份。你甚至可以通过结合使用用户数据库中的视图和触发器来自动保持此表的更新。该视图将基于
    `sys.sysusers` 目录视图，而触发器将基于你创建的视图。然而，这将是一个复杂的设计，会带来维护上的操作挑战。


    清单 [24-4](#333037_2_En_24_Chapter.xhtml#PC4) 中的脚本创建了分类器函数，该函数在将函数与资源调控器关联之前实现了我们的业务规则。和往常一样，然后重新配置资源调控器以使我们的更改生效。


    ```sql

    USE Master

    GO

    CREATE FUNCTION dbo.Classifier()

    RETURNS SYSNAME

    WITH SCHEMABINDING

    AS

    BEGIN

    --Declare variables

    DECLARE @WorkloadGroup        SYSNAME ;

    SET @WorkloadGroup = ''Not Assigned'' ;

    --Implement business rule 1

    IF (SUSER_NAME() = ''SalesUser'')

    BEGIN

    SET @WorkloadGroup = ''SalesUsers'' ;

    END

    --Implement business rule 2

    ELSE IF (SUSER_NAME() = ''SalesManager'')

    BEGIN

    SET @WorkloadGroup = ''Managers'' ;

    END

    --Implement business rules 3 & 4

    ELSE IF (SUSER_SNAME() = ''ReportsUser'')

    BEGIN

    IF (HOST_NAME() = ''ReportsApp'')

    BEGIN

    SET @WorkloadGroup = ''InternalReports''

    END

    ELSE

    BEGIN

    SET @WorkloadGroup = ''ExternalReports''

    END

    END

    --Implement business rule 5 (Put all other requests into the default workload
    group)

    ELSE IF @WorkloadGroup = ''Not Assigned''

    BEGIN

    SET @WorkloadGroup = ''default''

    END

    --Return the apropriate Workload Group name

    RETURN @WorkloadGroup

    END

    GO

    --Associate the Classifier Function with Resource Governor

    ALTER RESOURCE GOVERNOR WITH (CLASSIFIER_FUNCTION = dbo.Classifier) ;

    ALTER RESOURCE GOVERNOR RECONFIGURE ;

    ```

    清单 24-4

    创建分类器函数


    ### 测试分类器函数


    创建分类器函数后，我们需要测试它是否有效。我们可以使用 `EXECUTE AS` 语句更改系统上下文，然后调用分类器函数来测试业务规则 1 和 2。清单 [24-5](#333037_2_En_24_Chapter.xhtml#PC5)
    展示了这一点。该脚本临时允许所有登录直接访问分类器函数，这使得查询能够工作。它通过在脚本结束前授予 Public 角色 `EXECUTE` 权限，然后再撤销此权限来实现这一点。


    ```sql

    USE MASTER

    GO

    GRANT EXECUTE ON dbo.Classifier TO public ;

    GO

    EXECUTE AS LOGIN = ''SalesUser'' ;

    SELECT dbo.Classifier() AS ''Workload Group'' ;

    REVERT

    EXECUTE AS LOGIN = ''SalesManager'' ;

    SELECT dbo.Classifier() as ''Workload Group'' ;

    REVERT

    REVOKE EXECUTE ON dbo.Classifier TO public ;

    GO

    ```

    清单 24-5

    测试业务规则 1 和 2


    运行这两个查询的结果表明，业务规则 1 和 2 正常工作。


    要测试业务规则 4，我们可以使用与验证业务规则 1 和 2 相同的过程。唯一的区别是将执行上下文更改为 `ReportsUser`。为了验证规则 3，我们使用相同的过程，但这次从名为
    `ReportsApp` 的服务器调用查询。


    > **提示**

    >

    > 如果你没有名为 `ReportsApp` 的服务器的访问权限，那么请更新函数定义以使用你有权访问的服务器名称。


    ## 监控资源调控器


    SQL Server 提供了动态管理视图 (DMV)，可用于返回与资源池和工作负载组相关的统计信息。不过，你也可以使用 Windows 的性能监视器工具来监控资源调控器的使用情况，这为你提供了图形化表示的优势。接下来的章节将讨论这两种监控资源调控器的方法。'
  raw: '### Creating a Classifier Function


    A classifier function is a scalar UDF (user-defined function) that resides in
    the Master database. It returns a value of type `SYSNAME`, which is a system-defined
    type equivalent to `NVARCHAR(128)`. The value returned by the function corresponds
    to the name of the workload group into which each request should fall. The logic
    within the function determines which workload group name is returned. You only
    ever have one classifier function per instance, so you need to modify the function
    if you add additional workload groups.


    Now let’s create a classifier function using the Resource Governor environment
    that we have built in this chapter. This function will classify each request made
    against our instance using the following rules:


    1.  If the request is made under the context of the `SalesUser` login, then the
    request should fall under the `SalesUsers` workload group.


    2.  If the request is made by the `SalesManager` login, then requests should be
    placed in the `Managers` workload group.


    3.  If the request is made by the `ReportsUser` login and the request was made
    from a server named `ReportsApp`, then the request should fall into the `InternalReports`
    workload group.


    4.  If the request is made by the `ReportsUser` login but did not originate from
    the `ReportsApp` server, then it should fall into the `ExternalReports` workload
    group.


    5.  All other requests should be placed into the default workload group.


    Before creating our classifier function, we prepare the instance. To do this,
    we first create the `Chapter24` database. We then create the `SalesUser`, `ReportsUser`,
    and `SalesManager` logins, with `Users` mapped to the `Chapter24` database. (Further
    detail on security principles can be found in Chapter [10](#333037_2_En_10_Chapter.xhtml).)
    Listing [24-3](#333037_2_En_24_Chapter.xhtml#PC3) contains the code we need to
    prepare the instance.


    ### Note


    The users are mapped to the `Chapter24` database for the purpose of this example,
    but you can make the queries against any database in the instance.


    ```

    --Create the database

    USE [master]

    GO

    CREATE DATABASE Chapter24 ;

    --Create the Logins and Users

    CREATE LOGIN SalesUser

    WITH PASSWORD=N''Pa$$w0rd'', DEFAULT_DATABASE=Chapter24,

    CHECK_EXPIRATION=OFF, CHECK_POLICY=OFF ;

    GO

    CREATE LOGIN ReportsUser

    WITH PASSWORD=N''Pa$$w0rd'', DEFAULT_DATABASE=Chapter24,

    CHECK_EXPIRATION=OFF, CHECK_POLICY=OFF ;

    GO

    CREATE LOGIN SalesManager

    WITH PASSWORD=N''Pa$$w0rd'', DEFAULT_DATABASE=Chapter24,

    CHECK_EXPIRATION=OFF, CHECK_POLICY=OFF ;

    GO

    USE Chapter24

    GO

    CREATE USER SalesUser FOR LOGIN SalesUser ;

    GO

    CREATE USER ReportsUser FOR LOGIN ReportsUser ;

    GO

    CREATE USER SalesManager FOR LOGIN SalesManager ;

    GO

    Listing 24-3

    Preparing the Instance

    ```


    In order to implement the business rules pertaining to which workload group each
    request should be placed into, we use the system functions detailed in Table [24-6](#333037_2_En_24_Chapter.xhtml#Tab6).


    Table 24-6


    System Functions for Implementing Business Rules


    | Function | Description | Business Rule(s) |

    | --- | --- | --- |

    | `SUSER_SNAME()` | Returns the name of a login | 1, 2, 3, 4 |

    | `HOST_NAME()` | Returns the name of the host from which the request was issued
    | 3, 4 |


    When we create a classifier function, it must follow specific rules. First, the
    function must be *schema-bound*. This means that any underlying objects that are
    referenced by the function cannot be altered without the function first being
    dropped. The function must also return the `SYSNAME` data type and have no parameters.


    It is worth noting that the requirement for the function to be schema-bound is
    significant, and it poses limitations on the flexibility of Resource Governor.
    For example, it would be very useful if you were able to delegate workloads based
    upon database role membership; however, this is not possible, because schema-bound
    functions cannot access objects in other databases, either directly or indirectly.
    Because the classifier function must reside in the Master database, you cannot
    access information regarding database roles in other databases.


    As with all things, there are workarounds for this issue. For example, you can
    create a table in the Master database that maintains role membership from user
    databases. You can even keep this table updated automatically by using a combination
    of views and triggers in the user database. The view would be based on the `sys.sysusers`
    catalog view, and the trigger would be based on the view that you created. This
    would be a complex design, however, which would pose operational challenges to
    maintain.


    The script within Listing [24-4](#333037_2_En_24_Chapter.xhtml#PC4) creates the
    classifier function, which implements our business rules before associating the
    function with Resource Governor. As always, Resource Governor is then reconfigured
    so that our changes take effect.


    ```

    USE Master

    GO

    CREATE FUNCTION dbo.Classifier()

    RETURNS SYSNAME

    WITH SCHEMABINDING

    AS

    BEGIN

    --Declare variables

    DECLARE @WorkloadGroup        SYSNAME ;

    SET @WorkloadGroup = ''Not Assigned'' ;

    --Implement business rule 1

    IF (SUSER_NAME() = ''SalesUser'')

    BEGIN

    SET @WorkloadGroup = ''SalesUsers'' ;

    END

    --Implement business rule 2

    ELSE IF (SUSER_NAME() = ''SalesManager'')

    BEGIN

    SET @WorkloadGroup = ''Managers'' ;

    END

    --Implement business rules 3 & 4

    ELSE IF (SUSER_SNAME() = ''ReportsUser'')

    BEGIN

    IF (HOST_NAME() = ''ReportsApp'')

    BEGIN

    SET @WorkloadGroup = ''InternalReports''

    END

    ELSE

    BEGIN

    SET @WorkloadGroup = ''ExternalReports''

    END

    END

    --Implement business rule 5 (Put all other requests into the default workload
    group)

    ELSE IF @WorkloadGroup = ''Not Assigned''

    BEGIN

    SET @WorkloadGroup = ''default''

    END

    --Return the apropriate Workload Group name

    RETURN @WorkloadGroup

    END

    GO

    --Associate the Classifier Function with Resource Governor

    ALTER RESOURCE GOVERNOR WITH (CLASSIFIER_FUNCTION = dbo.Classifier) ;

    ALTER RESOURCE GOVERNOR RECONFIGURE ;

    Listing 24-4

    Creating the Classifier Function

    ```


    ### Testing the Classifier Function


    After we create the classifier function, we want to test that it works. We can
    test business rules 1 and 2 by using the `EXECUTE AS` statement to change our
    system context and then call the classifier function. This is demonstrated in
    Listing [24-5](#333037_2_En_24_Chapter.xhtml#PC5). The script temporarily allows
    all logins to access the classifier function directly, which allows the queries
    to work. It implements this by granting the Public role the `EXECUTE` permission
    before revoking this permission at the end of the script.


    ```

    USE MASTER

    GO

    GRANT EXECUTE ON dbo.Classifier TO public ;

    GO

    EXECUTE AS LOGIN = ''SalesUser'' ;

    SELECT dbo.Classifier() AS ''Workload Group'' ;

    REVERT

    EXECUTE AS LOGIN = ''SalesManager'' ;

    SELECT dbo.Classifier() as ''Workload Group'' ;

    REVERT

    REVOKE EXECUTE ON dbo.Classifier TO public ;

    GO

    Listing 24-5

    Testing Business Rules 1 and 2

    ```


    The result of running these two queries shows that business rules 1 and 2 are
    working as expected.


    To test business rule 4, we can use the same process we used to validate business
    rules 1 and 2\. The only difference is that we change the execution context to
    `ReportsUser`. In order to validate rule 3, we use the same process, but this
    time, we invoke the query from a server named `ReportsApp`.


    ### Tip


    If you do not have access to a server named `ReportsApp`, then update the function
    definition to use a server name that you do have access to.


    ## Monitoring Resource Governor


    SQL Server exposes dynamic management views (DMVs) that you can use to return
    statistics relating to resource pools and workload groups. You can also monitor
    Resource Governor’s usage using Windows’ Performance Monitor tool, however, and
    this gives you the advantage of a graphical representation. The following sections
    discuss both of these approaches to monitoring Resource Governor.'
