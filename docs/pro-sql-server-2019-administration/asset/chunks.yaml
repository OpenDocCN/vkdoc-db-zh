    ## Configuring SQL Server


    The first step in configuring AlwaysOn Availability Groups is enabling this feature
    on the SQL Server service. To enable the feature from the GUI, we open SQL Server
    Configuration Manager, drill through SQL Server Services, and select Properties
    from the context menu of the SQL Server service. When we do this, the service
    properties display and we navigate to the AlwaysOn High Availability tab, shown
    in Figure 14-1.


    On this tab, we check the Enable AlwaysOn Availability Groups box and ensure that
    the cluster name displayed in the Windows Failover Cluster Name box is correct.
    We then need to restart the SQL Server service. Because AlwaysOn Availability
    Groups uses stand-alone instances, which are installed locally on each cluster
    node, as opposed to a failover clustered instance, which spans multiple nodes,
    we need to repeat these steps for each stand-alone instance hosted on the cluster.


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig1_HTML.jpg](images/333037_2_En_14_Chapter/333037_2_En_14_Fig1_HTML.jpg)


    Figure 14-1: The AlwaysOn High Availability tab


    We can also use PowerShell to enable AlwaysOn Availability Groups. To do this,
    we use the PowerShell command in Listing 14-2. The script assumes that `CLUSTERNODE1`
    is the name of the server and that `PRIMARYREPLICA` is the name of the SQL Server
    instance.


    ```powershell

    Enable-SqlAlwaysOn -Path SQLSERVER:\SQL\CLUSTERNODE1\PRIMARYREPLICA

    ```


    Listing 14-2: Enabling AlwaysOn Availability Groups


    The next step is to take a full backup of all databases that will be part of the
    availability group. We will not be able to add them to an Availability Group until
    this has been done. We create separate availability groups for `App1` and `App2`,
    respectively, so to create an availability group for `App1`, we need to back up
    the `Chapter14App1Customers` and `Chapter14App1Sales` databases. We do this by
    running the script in Listing 14-3.


    ```sql

    BACKUP DATABASE Chapter14App1Customers

    TO  DISK = N''C:\Backups\Chapter14App1Customers.bak''

    WITH NAME = N''Chapter14App1Customers-Full Database Backup'' ;

    GO

    BACKUP DATABASE Chapter14App1Sales

    TO  DISK = N''C:\Backups\Chapter14App1Sales.bak''

    WITH NAME = N''Chapter14App1Sales-Full Database Backup'' ;

    GO

    ```


    Listing 14-3: Backing Up the Databases


    ### Note


    Backups are discussed in Chapter 12.


    ## Creating the Availability Group


    You can create an availability group topology in SQL Server in several ways. It
    can be created manually, predominantly through dialog boxes, via T-SQL, or through
    a wizard. In this chapter, we will explore the wizard and the dialog boxes.'
