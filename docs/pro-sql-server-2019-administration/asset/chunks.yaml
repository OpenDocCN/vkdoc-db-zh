    ### 注意


    在本章的演示中，我们将使用四台服务器，分别命名为 Controller、Client1、Client2 和 Target。每台服务器都安装了 SQL Server
    的默认实例，并且所有服务器都是 `PROSQLADMIN` 域的一部分。分布式重放控制器功能安装在控制器服务器上，分布式重放客户端安装在 Client1 和
    Client2 服务器上。分布式重放控制器和分布式重放客户端都是共享功能，因此即使安装了多个实例，每台服务器也只需安装一次。尽管分布式重放客户端应安装在目标实例上以进行应用程序兼容性测试，但在我们的场景中，我们研究的是在模拟并发活动时进行性能测试，因此分布式重放客户端不安装在目标服务器上，因为对于这些目的不推荐这样做。分布式重放管理工具已安装在控制器上。


    ## 分布式重放概念


    要利用分布式重放的强大功能，理解其概念非常重要，例如控制器、客户端和目标服务器。理解分布式重放的架构也很重要。这些主题将在以下部分讨论。


    ### 分布式重放组件


    分布式重放控制器位于分布式重放基础设施的核心，用于协调每个分布式重放客户端的活动。当分布式重放控制器服务启动时，它会从 `DReplayController.config`
    文件中提取其设置，因此您可能需要编辑此文件来配置日志记录选项。我们将在本章后面讨论这一点。一个分布式重放拓扑中只有一个控制器。


    分布式重放客户端是您用来重放工作负载的服务器。当分布式重放客户端服务启动时，它会从 `DReplayClient.config` 文件中提取其配置，因此您可能需要编辑此文件来配置日志记录选项以及存储跟踪结果和中间文件的文件夹。我们将在本章后面讨论这一点。您可以在分布式重放拓扑中配置多个客户端，最多支持
    16 个客户端。


    目标是重放跟踪的实例。一个分布式重放拓扑中总有一个目标。因为您可以有多个客户端对应一个目标的比例，所以您可以使用分布式重放作为负载测试工具，使用通用硬件或模拟并发工作负载。


    分布式重放管理工具是一个命令行工具，允许您准备和重放跟踪。可执行文件名为 `DReplay.exe`；它依赖于 `DReplay.exe.preprocess.config`
    文件来获取处理中间跟踪文件所需的配置，以及 `DReplay.exe.replay.config` 文件来获取重放跟踪所需的配置。这意味着您可能需要编辑每个配置文件以指定设置，例如是否应包含系统活动，以及指定查询超时值，我们将在本章后面讨论这些。


    ### 分布式重放架构


    图 21-1 中的图表概述了分布式重放组件以及重放过程如何在预处理和重放阶段工作。在预处理阶段，会在控制器的工作目录中创建一个中间文件。在重放阶段，事件被分发到目标之前，会在客户端创建分发文件。


    ![分布式重放架构](img/333037_2_En_21_Fig1_HTML.png)


    图 21-1


    分布式重放架构


    ## 配置环境


    在开始重放跟踪之前，我们需要配置分布式重放控制器、分布式重放客户端和分布式重放管理工具。这些活动将在以下部分讨论。

    '
- fmt: '### Configuring the Controller


    You can find the `DReplayController.config` file within the `Tools\DReplayController`
    folder, which resides in the 32-bit shared directory of SQL Server. Therefore,
    if SQL Server is installed with default paths, the fully qualified path is `C:\Program
    Files (x86)\Microsoft SQL Server\150\Tools\DReplayController\DReplayController.config`.
    You can use this configuration file to control the logging level. These are the
    possible options:


    *   `INFORMATIONAL`: Logs all messages to the controller log.

    *   `WARNINGS`: Filters out informational messages, but logs all errors and warnings.

    *   `CRITICAL`: Logs only critical errors. This is the default value.


    The default contents of the `DReplayController.config` file are shown in Listing
    21-1.


    ```

    CRITICAL

    ```


    Listing 21-1

    `DReplayController.config`


    Because the service pulls this logging level from the configuration file at the
    point when the service starts, if you change the logging level after starting
    the service, then you need to restart the service. The log itself is created when
    the service starts, and it includes startup information, such as the service account
    being used. You can find the log in the `\DReplayController\Log` folder named
    `DReplay Controller Log_<Uniquifier>`. A new log is generated each time the service
    starts.


    If you are running the Distributed Replay Client service under a different service
    account than the Distributed Replay Controller service, then you also need to
    configure DCOM (Distributed Component Object Model) permissions on the Distributed
    Replay Controller service. You can do this via Component Services, which can be
    found in Administrative Tools in Windows.


    Once Component Services has been invoked, you need to drill through Console Root
    ➤ Component Services ➤ Computers ➤ My Computer ➤ DCOM Config and then select Properties
    from the `DReplayController` context menu. This causes the Properties dialog box
    to be invoked. From here, you should navigate to the Security tab.


    Now use the Edit button in the Launch and Activation Permissions section to launch
    the Permissions dialog box. Here, use the Add button to add the service account
    of the Distributed Replay Client service before granting it the Local Activation
    and Remote Activation privileges.


    You now need to repeat this process in the Access Permissions section to grant
    the service account the Local Access and Remote Access privileges.


    You also need to ensure that the Distributed Replay Client service account is
    added to the Distributed COM Users Windows Group on the server running the Distributed
    Replay Controller. Once you have applied these changes, you need to restart both
    the Distributed Replay Controller service and the Distributed Replay Client service(s)
    for the changes to take effect.


    ### Tip


    In regard to firewall configuration, the controller and the client communicate
    using port 135 and dynamic ports; therefore, you must ensure that these are open
    between the servers. Opening the dynamic port range can violate some organization’s
    security best practice, however. The workaround is to configure Windows Firewall
    so it allows the Distributed Replay executables to communicate through any port.
    This poses its own issues, however, because some corporate firewalls are not configured
    to offer this functionality, meaning that even though Windows Firewall does allow
    the traffic through, the packets may be dropped at the corporate firewall level.


    ### Configuring Clients


    You can find the `DReplayClient.config` file in the `Tools\DReplayClient` folder,
    which resides in the 32-bit shared directory of SQL Server. Therefore, if SQL
    Server is installed with default paths, the fully qualified path would be `C:\Program
    Files (x86)\Microsoft SQL Server\150\Tools\DReplayController\DReplayClient.config`.
    You can use this configuration file to configure the settings detailed in Table
    21-1.


    Table 21-1

    `DReplayClient.config` Options


    | Option | Description |

    | --- | --- |

    | `Controller` | The name of the server hosting the Distributed Replay Controller.
    It is important to note that this is the server name, not the server\instance
    name. |

    | `WorkingDirectory` | The location on the client where dispatch files are stored.
    If this option is not included in the configuration file, then the folder where
    the configuration file is stored is used. |

    | `ResultsDirectory` | The location where the results file from the replay is
    stored. If this option is not specified in the configuration file, then the folder
    that the configuration file is stored in is used. |

    | `Logging` | Use this option to control the logging level. The possible options
    are • `INFORMATIONAL`, which logs all messages to the controller log. • `WARNINGS`,
    which filters out informational messages, but logs all errors and warnings. • `CRITICAL`,
    which logs only critical errors. This is the default value. |


    Listing 21-2 displays an edited version of the `DReplayClient.config` file, which
    has been configured to point to our controller server and the Working and Results
    folders.


    ```

    controller

    C:\DistributedReplay\WorkingDir\

    C:\DistributedReplay\ResultDir\

    CRITICAL

    ```


    Listing 21-2

    `DReplayClient.config`


    ### Tip


    You must start the Distributed Replay Controller service before you start the
    Distributed Replay Client service on each client.


    Because we are using two clients, we need to repeat these activities on each.
    In our environment, these clients are the servers, Client1 and Client2.


    ### Tip


    In regard to firewall configuration, the client and the target communicate using
    the SQL Server ports. In a standard configuration, this means using TCP 1433 and
    UDP 1434 for the browser service, if you are using a named instance. If you are
    using nonstandard ports, configure the firewall accordingly.'
