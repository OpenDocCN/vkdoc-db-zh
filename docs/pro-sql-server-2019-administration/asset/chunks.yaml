- fmt: '## Summary


    Policy-Based Management (PBM) offers a powerful and flexible method for ensuring
    coding standards and hosting standards are met across your enterprise. A target
    is an entity managed by PBM. A condition is a Boolean expression that the policy
    evaluates against the targets, and a facet is a collection of properties that
    relate to a specific type of target.


    Depending on the facet you use, a policy offers up to four policy evaluation modes:
    `On Demand`, `On Schedule`, `On Change: Log Only`, and `On Change: Prevent`. `On
    Demand`, `On Schedule`, and `On Change: Log Only` can be thought of as reactive,
    whereas `On Change: Prevent` can be thought of as proactive, since it actively
    stops a configuration from being made, which violates a policy. Because `On Change`
    modes rely on DDL triggers, you must enable nested triggers at the instance level,
    and they are not available for all facets.


    Policies are extensible, through the use of the `ExecuteSql()` and `ExecuteWql()`
    functions, which allow you to evaluate the results of T-SQL or WQL queries. These
    functions offer massive flexibility, but their power can also cause security holes
    to be opened, so exercise caution when granting permissions to create policies.


    An instance can be registered as a central management server, and other servers
    can be registered underneath it, either directly or in groups. This gives DBAs
    the ability to run a query across multiple instances at the same time, and it
    also offers them the ability to evaluate policies against multiple servers at
    the same time. This means that you can use Policy-Based Management at the Enterprise
    level to enforce standards.


    You can evaluate policies from within SQL Server or using PowerShell with the
    `-InvokePolicyEvaluation` cmdlet. This offers you increased flexibility for managing
    estates that have older SQL Server instances, such as 2000 or 2005. This is because
    PowerShell allows DBAs to evaluate the policies from XML files, instead of only
    being able to evaluate them after importing them to `MSDB`.


    # 24. Resource Governor


    Resource Governor provides a method for throttling applications at the SQL Server
    layer by imposing limits on CPU, memory, and physical IO on different classifications
    of connection. This chapter discusses the concepts the Resource Governor uses
    before demonstrating how to implement it. We then look at how to monitor the effect
    that Resource Governor has on resource utilization.


    ## Resource Governor Concepts


    Resource Governor uses resource pools to define a subset of server resources,
    workload groups as logical containers for similar session requests, and a classifier
    function to determine to which workload group a specific request should be assigned.
    The following sections discuss each of these concepts.


    ### Resource Pool


    A *resource pool* defines a subset of server resources that sessions can utilize.
    When Resource Governor is enabled, three pools are automatically created: the
    internal pool, the default pool, and the default external pool. The *internal
    pool* represents the server resources the instance uses. This pool cannot be modified.
    The *default pool* is designed as a catch-all pool and is used to assign resources
    to any session that is not assigned to a user-defined resource pool. You cannot
    remove this pool; however, you can modify its settings. The default external pool
    is used to govern resources used by the `rterm.exe`, `BxlServer.exe`, and `python.exe`
    processes, which are used by Machine Learning Services. The default external resource
    pool can be modified, but not removed, and new external resource pools can be
    added.


    Resource pools allow you to configure the minimum and maximum amount of resources
    (CPU, memory, and physical IO) that will be available to sessions that are assigned
    to that pool. As you add additional pools, maximum values of existing pools are
    transparently adjusted so they do not conflict with the minimum resource percentages
    assigned to all pools. For example, imagine that you have configured the resource
    pools, which are represented in Table 24-1, to throttle CPU usage.


    Table 24-1

    Resource Pools’ Simple Effective Maximum Percentages


    | Resource Pool* | Min CPU % | Max CPU % | Effective Max CPU % | Calculation |

    | --- | --- | --- | --- | --- |

    | `Default` | 0 | 100 | 75 | `Smallest(75,(100–0-25)) = 75` |

    | `SalesApplication` | 25 | 75 | 75 | `Smallest(75,(100–0-0)) = 75` |

    | `Default External` | 0 | 100 | 75 | `Smallest(75,(100–0-25)) = 75` |


    *∗The internal resource pool is not mentioned here since it is not configurable
    either directly or implicitly. Instead, it can consume whatever resources it requires
    and has a minimum CPU of 0; therefore, it does not impact the effective maximum
    CPU calculation for other pools.*


    In this example, the actual Max CPU % settings will be as you configured them.
    However, imagine that you now add an additional resource pool, called `AccountsApplication`,
    which is configured with a Min CPU % of 50 and a Max CPU % of 80. The sum of the
    minimum CPU percentages is now greater than the sum of the maximum CPU percentages.
    This means that the effective maximum CPU percentage for each resource pool is
    reduced accordingly. The formula for this calculation is `Smallest(DefaultMax,
    DefaultMax – SUM(Other Min CPU))`, which is reflected in Table 24-2.


    Table 24-2

    Resource Pools’ Effective Maximum Percentages After Implicit Reductions


    | Resource Pool* | Min CPU % | Max CPU % | Effective Max CPU % | Calculation |

    | --- | --- | --- | --- | --- |

    | `Default` | 0 | 100 | 25 | `Smallest(100,(100-sum(25,50,0))) = 25` |

    | `SalesApplication` | 25 | 75 | 50 | `Smallest(75,(100-50-0)) = 50` |

    | `AccountsApplication` | 50 | 80 | 75 | `Smallest(80,(100-25-0)) = 75` |

    | `Default External` | 0 | 100 | 25 | `Smallest(100,(100-sum(25,50,0))) = 25`
    |


    *∗The internal resource pool is not mentioned here since it is not configurable
    either directly or implicitly. Instead, it can consume whatever resources it requires
    and has a minimum CPU of 0; therefore, it does not impact the effective maximum
    CPU calculation for other pools.*


    ### Workload Group


    A resource pool can contain one or more workload groups. A *workload group* represents
    a logical container for similar sessions that have been classified as similar
    by executing a classifier function, which is covered in the next section. For
    example, in the `SalesApplication` resource pool mentioned earlier, we can create
    two workload groups. We can use one of these workload groups as a container for
    normal user sessions while using the second as a container for reporting sessions.


    This approach allows us to monitor the groups of sessions separately. It also
    allows us to define separate policies for each set of sessions. For example, we
    may choose to specify that sessions used for reporting have a lower `MAXDOP` (Maximum
    Degree of Parallelization) setting than the sessions used for standard users,
    or that sessions used for reporting should only be able to specify a limited number
    of concurrent requests. These settings are in addition to the settings we can
    configure at the resource pool level.


    ### Classifier Function


    A *classifier function* is a scalar function, created in the Master database.
    It is used to determine which workload group each session should be assigned to.
    Every new session is classified using a single classifier function, with the exception
    of DACs (dedicated administrator connections), which are not subject to Resource
    Governor. The classifier function can group sessions based on virtually any attribute
    that it is possible to code within interpreted SQL. For example, you may choose
    to classify requests based upon username, role membership, application name, host
    name, login property, connection property, or even time.'
  raw: '## Summary


    Policy-Based Management (PBM) offers a powerful and flexible method for ensuring
    coding standards and hosting standards are met across your enterprise. A target
    is an entity managed by PBM. A condition is a Boolean expression that the policy
    evaluates against the targets, and a facet is a collection of properties that
    relate to a specific type of target.


    Depending on the facet you use, a policy offers up to four policy evaluation modes:
    On Demand, On Schedule, On Change: Log Only, and On Change: Prevent. On Demand,
    On Schedule, and On Change: Log Only can be thought of as reactive, whereas On
    Change: Prevent can be thought of as proactive, since it actively stops a configuration
    from being made, which violates a policy. Because On Change modes rely on DDL
    triggers, you must enable nested triggers at the instance level, and they are
    not available for all facets.


    Policies are extensible, through the use of the `ExecuteSql()` and `ExecuteWql()`
    functions, which allow you to evaluate the results of T-SQL or WQL queries. These
    functions offer massive flexibility, but their power can also cause security holes
    to be opened, so exercise caution when granting permissions to create policies.


    An instance can be registered as a central management server, and other servers
    can be registered underneath it, either directly or in groups. This gives DBAs
    the ability to run a query across multiple instances at the same time, and it
    also offers them the ability to evaluate policies against multiple servers at
    the same time. This means that you can use Policy-Based Management at the Enterprise
    level to enforce standards.


    You can evaluate policies from within SQL Server or using PowerShell with the
    `-InvokePolicyEvaluation` cmdlet. This offers you increased flexibility for managing
    estates that have older SQL Server instances, such as 2000 or 2005\. This is because
    PowerShell allows DBAs to evaluate the policies from XML files, instead of only
    being able to evaluate them after importing them to MSDB.


    # 24. Resource Governor


    Resource Governor provides a method for throttling applications at the SQL Server
    layer by imposing limits on CPU, memory, and physical IO on different classifications
    of connection. This chapter discusses the concepts the Resource Governor uses
    before demonstrating how to implement it. We then look at how to monitor the effect
    that Resource Governor has on resource utilization.


    ## Resource Governor Concepts


    Resource Governor uses resource pools to define a subset of server resources,
    workload groups as logical containers for similar session requests, and a classifier
    function to determine to which workload group a specific request should be assigned.
    The following sections discuss each of these concepts.


    ### Resource Pool


    A *resource pool* defines a subset of server resources that sessions can utilize.
    When Resource Governor is enabled, three pools are automatically created: the
    internal pool, the default pool, and the default external pool. The *internal
    pool* represents the server resources the instance uses. This pool cannot be modified.
    The *default pool* is designed as a catch-all pool and is used to assign resources
    to any session that is not assigned to a user-defined resource pool. You cannot
    remove this pool; however, you can modify its settings. The default external pool
    is used to govern resources used by the rterm.exe, BxlServer.exe, and python.exe
    processes, which are used by Machine Learning Services. The default external resource
    pool can be modified, but not removed, and new external resource pools can be
    added.


    Resource pools allow you to configure the minimum and maximum amount of resources
    (CPU, memory, and physical IO) that will be available to sessions that are assigned
    to that pool. As you add additional pools, maximum values of existing pools are
    transparently adjusted so they do not conflict with the minimum resource percentages
    assigned to all pools. For example, imagine that you have configured the resource
    pools, which are represented in Table [24-1](#333037_2_En_24_Chapter.xhtml#Tab1),
    to throttle CPU usage.


    Table 24-1


    Resource Pools’ Simple Effective Maximum Percentages


    | Resource Pool∗ | Min CPU % | Max CPU % | Effective Max CPU % | Calculation |

    | --- | --- | --- | --- | --- |

    | `Default` | 0 | 100 | 75 | `Smallest(75,(100–0-25)) = 75` |

    | `SalesApplication` | 25 | 75 | 75 | `Smallest(75,(100–0-0)) = 75` |

    | `Default External` | 0 | 100 | 75 | `Smallest(75,(100–0-25)) = 75` |


    *∗The internal resource pool is not mentioned here since it is not configurable
    either directly or implicitly. Instead, it can consume whatever resources it requires
    and has a minimum CPU of 0; therefore, it does not impact the effective maximum
    CPU calculation for other pools.*


    In this example, the actual Max CPU % settings will be as you configured them.
    However, imagine that you now add an additional resource pool, called `AccountsApplication`,
    which is configured with a Min CPU % of 50 and a Max CPU % of 80\. The sum of
    the minimum CPU percentages is now greater than the sum of the maximum CPU percentages.
    This means that the effective maximum CPU percentage for each resource pool is
    reduced accordingly. The formula for this calculation is `Smallest( Default(Max),
    Default(Max) – SUM(Other Min CPU))`, which is reflected in Table [24-2](#333037_2_En_24_Chapter.xhtml#Tab2).


    Table 24-2


    Resource Pools’ Effective Maximum Percentages After Implicit Reductions


    | Resource Pool∗ | Min CPU % | Max CPU % | Effective Max CPU % | Calculation |

    | --- | --- | --- | --- | --- |

    | `Default` | 0 | 100 | 25 | `Smallest(100,(100-sum(25,50,0))) = 25` |

    | `SalesApplication` | 25 | 75 | 50 | `Smallest(75,(100-50-0)) = 50` |

    | `AccountsApplication` | 50 | 80 | 75 | `Smallest(80,(100-25-0)) = 75` |

    | `Default External` | 0 | 100 | 25 | `Smallest(100,(100-sum(25,50,0))) = 25`
    |


    *∗The internal resource pool is not mentioned here since it is not configurable
    either directly or implicitly. Instead, it can consume whatever resources it requires
    and has a minimum CPU of 0; therefore, it does not impact the effective maximum
    CPU calculation for other pools.*


    ### Workload Group


    A resource pool can contain one or more workload groups. A *workload group* represents
    a logical container for similar sessions that have been classified as similar
    by executing a classifier function, which is covered in the next section. For
    example, in the `SalesApplication` resource pool mentioned earlier, we can create
    two workload groups. We can use one of these workload groups as a container for
    normal user sessions while using the second as a container for reporting sessions.


    This approach allows us to monitor the groups of sessions separately. It also
    allows us to define separate policies for each set of sessions. For example, we
    may choose to specify that sessions used for reporting have a lower `MAXDOP` (Maximum
    Degree of Parallelization) setting than the sessions used for standard users,
    or that sessions used for reporting should only be able to specify a limited number
    of concurrent requests. These settings are in addition to the settings we can
    configure at the resource pool level.


    ### Classifier Function


    A *classifier function* is a scalar function, created in the Master database.
    It is used to determine which workload group each session should be assigned to.
    Every new session is classified using a single classifier function, with the exception
    of DACs (dedicated administrator connections), which are not subject to Resource
    Governor. The classifier function can group sessions based on virtually any attribute
    that it is possible to code within interpreted SQL. For example, you may choose
    to classify requests based upon username, role membership, application name, host
    name, login property, connection property, or even time.'
  trans: '

    ## 摘要


    基于策略的管理 (PBM) 提供了一种强大而灵活的方法，用于确保在整个企业中满足编码标准和托管标准。**目标**是 PBM 管理的实体。**条件**是策略针对目标进行评估的布尔表达式，而
    **Facet** 是与特定类型目标相关联的属性集合。


    根据您使用的 Facet，一个策略最多可提供四种策略评估模式：`按需`、`按计划`、`仅更改：记录`和`更改：阻止`。`按需`、`按计划`和`仅更改：记录`可视为反应性的，而`更改：阻止`可视为主动性的，因为它会主动阻止违反策略的配置更改。由于`更改`模式依赖于
    DDL 触发器，您必须在实例级别启用嵌套触发器，并且并非所有 Facet 都支持这些模式。


    策略是可扩展的，通过使用 `ExecuteSql()` 和 `ExecuteWql()` 函数，您可以评估 T-SQL 或 WQL 查询的结果。这些函数提供了极大的灵活性，但其强大的功能也可能导致安全漏洞，因此在授予创建策略的权限时需谨慎。


    一个实例可以注册为中央管理服务器，其他服务器可以直接或分组注册在其下方。这使数据库管理员 (DBA) 能够同时跨多个实例运行查询，并且还为他们提供了同时针对多个服务器评估策略的能力。这意味着您可以在企业级别使用基于策略的管理来强制实施标准。


    您可以从 SQL Server 内部或使用带有 `-InvokePolicyEvaluation` cmdlet 的 PowerShell 来评估策略。这为您管理包含较旧
    SQL Server 实例（如 2000 或 2005）的环境提供了更大的灵活性。这是因为 PowerShell 允许 DBA 从 XML 文件评估策略，而不仅仅是导入到
    `MSDB` 后才能评估。


    # 24. 资源调控器


    资源调控器提供了一种在 SQL Server 层对应用程序进行节流的方法，通过对不同分类的连接施加 CPU、内存和物理 IO 的限制。本章首先讨论资源调控器使用的概念，然后演示如何实现它。接着，我们将探讨如何监控资源调控器对资源利用率的影响。


    ## 资源调控器概念


    资源调控器使用**资源池**来定义服务器资源的子集，使用**工作负荷组**作为类似会话请求的逻辑容器，并使用**分类器函数**来确定应将特定请求分配给哪个工作负荷组。以下各节将讨论这些概念。


    ### 资源池


    一个*资源池*定义了会话可以利用的服务器资源子集。启用资源调控器时，会自动创建三个池：内部池、默认池和默认外部池。*内部池*代表实例使用的服务器资源。此池无法修改。*默认池*设计为一个全池，用于将资源分配给任何未分配到用户定义资源池的会话。您不能删除此池；但是，可以修改其设置。默认外部池用于管理由机器学习服务使用的
    `rterm.exe`、`BxlServer.exe` 和 `python.exe` 进程所使用的资源。默认外部资源池可以修改但不能删除，并且可以添加新的外部资源池。


    资源池允许您配置将分配给分配到该池的会话的可用资源（CPU、内存和物理 IO）的最小和最大数量。当您添加其他池时，现有池的最大值会进行透明调整，以便它们不会与分配给所有池的最小资源百分比冲突。例如，假设您配置了资源池（如表
    24-1 所示）来限制 CPU 使用率。


    表 24-1

    资源池的简单有效最大百分比


    | 资源池* | 最小 CPU % | 最大 CPU % | 有效最大 CPU % | 计算 |

    | --- | --- | --- | --- | --- |

    | `默认` | 0 | 100 | 75 | `最小值(75,(100–0-25)) = 75` |

    | `销售应用程序` | 25 | 75 | 75 | `最小值(75,(100–0-0)) = 75` |

    | `默认外部` | 0 | 100 | 75 | `最小值(75,(100–0-25)) = 75` |


    *∗此处未提及内部资源池，因为它既不能直接配置，也不能隐式配置。相反，它可以消耗其所需的任何资源，并且最小 CPU 为 0；因此，它不会影响其他池的有效最大
    CPU 计算。*


    在此示例中，实际的“最大 CPU %”设置将如您所配置。但是，假设您现在添加了一个名为 `会计应用程序` 的额外资源池，其配置的最小 CPU % 为 50，最大
    CPU % 为 80。最小 CPU 百分比之和现在大于最大 CPU 百分比之和。这意味着每个资源池的有效最大 CPU 百分比将相应降低。此计算的公式是 `最小值(默认最大值,
    默认最大值 – SUM(其他最小 CPU))`，如表 24-2 所示。


    表 24-2

    隐式降低后的资源池有效最大百分比


    | 资源池* | 最小 CPU % | 最大 CPU % | 有效最大 CPU % | 计算 |

    | --- | --- | --- | --- | --- |

    | `默认` | 0 | 100 | 25 | `最小值(100,(100-sum(25,50,0))) = 25` |

    | `销售应用程序` | 25 | 75 | 50 | `最小值(75,(100-50-0)) = 50` |

    | `会计应用程序` | 50 | 80 | 75 | `最小值(80,(100-25-0)) = 75` |

    | `默认外部` | 0 | 100 | 25 | `最小值(100,(100-sum(25,50,0))) = 25` |


    *∗此处未提及内部资源池，因为它既不能直接配置，也不能隐式配置。相反，它可以消耗其所需的任何资源，并且最小 CPU 为 0；因此，它不会影响其他池的有效最大
    CPU 计算。*


    ### 工作负荷组


    一个资源池可以包含一个或多个工作负荷组。一个*工作负荷组*代表一个逻辑容器，用于存放通过执行分类器函数（下一节介绍）被归类为相似的会话。例如，在前面提到的
    `销售应用程序` 资源池中，我们可以创建两个工作负荷组。我们可以将其中一个工作负荷组用作普通用户会话的容器，而将第二个用作报表会话的容器。


    这种方法使我们能够分别监控会话组。它还允许我们为每组会话定义不同的策略。例如，我们可以选择指定用于报表的会话具有比标准用户会话更低的 `MAXDOP`（最大并行度）设置，或者用于报表的会话只能指定有限数量的并发请求。这些设置是除了我们可以在资源池级别配置的设置之外的额外设置。


    ### 分类器函数


    一个*分类器函数*是在 Master 数据库中创建的标量函数。它用于确定每个会话应分配到哪个工作负荷组。除 DAC（专用管理员连接）外，每个新会话都使用单个分类器函数进行分类，DAC
    不受资源调控器约束。分类器函数可以基于几乎任何可以在解释型 SQL 中编码的属性对会话进行分组。例如，您可以选择基于用户名、角色成员身份、应用程序名称、主机名、登录属性、连接属性甚至时间来对请求进行分类。

