    ### 使用分布式重播


    现在分布式重播实用程序已经配置好了，我们使用扩展事件创建一个跟踪，然后再同步目标。然后，我们使用分布式重播来重放该跟踪，以测试性能调整，模拟两个客户端上的并发活动。然而，在执行此操作之前，我们首先使用清单
    21-5 中的脚本在控制器上创建 `Chapter21` 数据库。


    ```

    --创建数据库

    CREATE DATABASE Chapter21 ;

    GO

    USE Chapter21

    GO

    --创建并填充数字表

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE;

    --创建并填充姓名片段表

    DECLARE @Names TABLE

    (

    FirstName        VARCHAR(30),

    LastName        VARCHAR(30)

    );

    INSERT INTO @Names

    VALUES(''Peter'', ''Carter''),

    (''Michael'', ''Smith''),

    (''Danielle'', ''Mead''),

    (''Reuben'', ''Roberts''),

    (''Iris'', ''Jones''),

    (''Sylvia'', ''Davies''),

    (''Finola'', ''Wright''),

    (''Edward'', ''James''),

    (''Marie'', ''Andrews''),

    (''Jennifer'', ''Abraham'');

    --创建并填充地址表

    CREATE TABLE dbo.Addresses

    (

    AddressID        INT        NOT NULL        IDENTITY        PRIMARY KEY,

    AddressLine1        NVARCHAR(50),

    AddressLine2        NVARCHAR(50),

    AddressLine3        NVARCHAR(50),

    PostCode        NCHAR(8)

    ) ;

    INSERT INTO dbo.Addresses

    VALUES(''1 Carter Drive'', ''Hedge End'', ''Southampton'', ''SO32 6GH'')

    ,(''10 Apress Way'', NULL, ''London'', ''WC10 2FG'')

    ,(''12 SQL Street'', ''Botley'', ''Southampton'', ''SO32 8RT'')

    ,(''19 Springer Way'', NULL, ''London'', ''EC1 5GG'') ;

    --创建并填充客户表

    CREATE TABLE dbo.Customers

    (

    CustomerID            INT          NOT NULL   IDENTITY   PRIMARY KEY,

    FirstName             VARCHAR(30)  NOT NULL,

    LastName              VARCHAR(30)  NOT NULL,

    BillingAddressID      INT          NOT NULL,

    DeliveryAddressID     INT          NOT NULL,

    CreditLimit           MONEY        NOT NULL,

    Balance               MONEY        NOT NULL

    );

    SELECT * INTO #Customers

    FROM

    (SELECT

    (SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName,

    (SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) BillingAddressID,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) DeliveryAddressID,

    (SELECT TOP 1 CAST(RAND() * Number AS INT) * 10000

    FROM @Numbers ORDER BY NEWID()) CreditLimit,

    (SELECT TOP 1 CAST(RAND() * Number AS INT) * 9000

    FROM @Numbers ORDER BY NEWID()) Balance

    FROM @Numbers a

    CROSS JOIN @Numbers b

    CROSS JOIN @Numbers c

    ) a;

    INSERT INTO dbo.Customers

    SELECT * FROM #Customers;

    GO

    清单 21-5

    创建 Chapter21 数据库

    ```


    ### 同步目标


    由于我们重放的跟踪包含 DML 语句，因此我们需要在开始捕获跟踪之前立即同步目标数据库，以确保 ID 对齐。我们通过备份控制器上的 `Chapter21`
    数据库并在目标上还原来执行此任务。我们可以使用清单 21-6 中的脚本来实现这一点。'
- fmt: '### Tip


    Remember to change the file locations to match your own configuration before running
    the script.


    ```

    --Part 1 - To be run on the controller

    BACKUP DATABASE Chapter21

    TO  DISK = N''F:\MSSQL\Backup\Chapter21.bak''

    WITH NOFORMAT, NOINIT,  NAME = N''Chapter21-Full Database Backup'', SKIP,  STATS
    = 10

    GO

    --Part 2 - To be run on the client, after moving the backup file across

    RESTORE DATABASE Chapter21

    FROM  DISK = N''F:\MSSQL\Backup\Chapter21.bak''

    WITH  FILE = 1, STATS = 5

    GO

    Listing 21-6

    Synchronizing the Chapter21 Database

    ```


    Ideally, the database should have the same `DatabaseID` on each server, but if
    this is not feasible, then ensure that the `Database_name` action is captured
    in the event session for mapping purposes. You should also ensure that any logins
    contained within the trace are created on the Target server, with the same permissions
    and the same default database. If you fail to do this, you get replay errors.


    Since our demonstration is for testing performance enhancements, you may wish
    to take this opportunity to create appropriate indexes on the `Customers` and
    `Addresses` tables in the synchronized database. You can find a script including
    index suggestions that are appropriate for our trace workload in Listing [21-7](#333037_2_En_21_Chapter.xhtml#PC7).


    ```

    USE Chapter21

    GO

    CREATE INDEX IDX_Customers_LastName ON dbo.Customers(LastName) INCLUDE(FirstName)
    ;

    GO

    CREATE INDEX IDX_Customers_AddressID ON dbo.Customers(DeliveryAddressID) ;

    GO

    CREATE INDEX IDX_Addresses_AddressID ON dbo.Addresses(AddressID) ;

    GO

    CREATE INDEX IDX_Customers_LastName_CustomerID ON dbo.Customers(LastName, CustomerID)
    ;

    GO

    Listing 21-7

    Index Suggestions

    ```


