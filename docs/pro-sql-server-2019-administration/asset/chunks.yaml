    The Read-Only Routing tab is where things get interesting, from the perspective
    of Readable Secondaries. Each Readable Secondary Replica must be given a Read-Only
    Routing URL. This is the path to which read-only requests will be sent and consists
    of the protocol (TCP), followed by the fully qualified address of the server hosting
    the readable secondary, including the port number.


    After this Read-Only URL has been specified, we can then add the Read-Only Routing
    List. This specifies the Replica(s) that read-only requests will be routed to.
    The routing list only applies to a node, when it has the Primary role, within
    the Availability Group. Therefore, different routing lists can be supplied for
    each node. This is useful when you have multiple readable secondaries in different
    sites. If we had a second readable secondary replica in Site 2, for example, then
    we could configure the Replica on `CLUSTERNODE3` to route read-only requests to
    this readable secondary, when it holds the Primary role.


    You can also specify multiple readable secondary Replicas in each routing list,
    if more than one readable secondary exists. Read-only requests will be routed
    to the first server in the list. If this server is not available, however, then
    requests will be routed to the second server in the list, and so on. If you wish
    to use this feature, then the servers should be separated by a comma.


