    provides an overview of each level of the security hierarchy and how principals
    are layered.


    ![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig1_HTML.jpg](images/333037_2_En_10_Chapter/333037_2_En_10_Fig1_HTML.jpg)


    Figure 10-1


    Security principal hierarchy


    The diagram shows that a login, created within the SQL Server instance, can be
    mapped to a local Windows user or group or to a domain user or group. Usually,
    in an Enterprise environment, this is a domain user or group. (A *group* is a
    collection of users that are granted permissions as a unit.) This eases the administration
    of security. Imagine that a new person joins the sales team. When added to the
    domain group called `SalesTeam`—which already has all of the required permissions
    to file system locations, SQL Server databases, and so on—he immediately inherits
    all required permissions to perform his role.


    The diagram also illustrates how local server accounts or domain accounts and
    groups can be mapped to a user at the database level (a database user without
    login). This is part of the functionality of contained databases. This technology
    was introduced as far back as SQL Server 2012, to support high availability with
    AlwaysOn Availability Groups. Contained database authentication is discussed later
    in this chapter.


    You can then add the Windows login, which you create at the SQL Server instance
    level or at a second tier SQL Server login (if you are using mixed-mode authentication),
    to fixed server roles and user-defined server roles at the instance level. Doing
    this allows you to grant the user common sets of permissions to instance-level
    objects, such as linked servers and endpoints. You can also map logins to database
    users.


    Database users sit at the database level of the hierarchy. You can grant them
    permissions directly on schemas and objects within the database, or you can add
    them to database roles. Database roles are similar to server roles, except they
    are granted a common set of permissions on objects that sit inside the database,
    such as schemas, tables, views, stored procedures, and so on.


    Before moving any further, we will now create the Chapter10 database, which will
    be used by examples in this chapter. This can be achieved by running the script
    in Listing [10-1](#333037_2_En_10_Chapter.xhtml#PC1).


    ```

    --Create Chapter10 database

    CREATE DATABASE Chapter10 ;

    GO

    USE Chapter10

    GO

    --Create SensitiveData table

    CREATE TABLE dbo.SensitiveData

    (

    ID    INT    PRIMARY KEY    IDENTITY,

    SensitiveText        NVARCHAR(100)

    ) ;

    --Populate SensitiveData table

    DECLARE @Numbers TABLE

    (

    ID        INT

    )

    ;WITH CTE(Num)

    AS

    (

    SELECT 1 AS Num

    UNION ALL

    SELECT Num + 1

    FROM CTE

    WHERE Num < 100

    )

    INSERT INTO @Numbers

    SELECT Num

    FROM CTE ;

    INSERT INTO dbo.SensitiveData

    SELECT ''SampleData''

    FROM @Numbers ;

    Listing 10-1

    Create the Chapter10 Database

    ```


    ## Implementing Instance-Level Security


    Unless you are using contained databases (discussed later in this chapter), all
    users must be authenticated at the instance level. You can use two authentication
    modes with SQL Server: Windows authentication and mixed-mode authentication. When
    you select Windows authentication, a login at the instance level is created and
    mapped to a Windows user or group, which exists either at the domain level or
    at the local server level.


    For example, let’s say you have two users, Pete and Danielle. Both users have
    domain accounts, `PROSQLADMIN\Pete` and `PROSQLADMIN\Danielle`. Both users are
    also part of a Windows group called `PROSQLADMIN\SQLUsers`. Creating two logins,
    one mapped to Pete’s account and one mapped to Danielle’s account, is functionally
    equivalent to creating one login, mapped to the `SQLUsers` group , as long as
    you grant the exact same set of permissions. Creating two separate logins provides
    more granular control over the permissions, however.


    When you create a login mapped to a Windows user or group, SQL Server records
    the SID (security identifier) of this principal and stores it in the Master database.
    It then uses this SID to identify users who are attempting to connect, from the
    context that they have used, to log in to the server or domain.


    In addition to creating a login mapped to a Windows user or group, you can also
    map a login to a certificate or an asymmetric key. Doing so does not allow a user
    to authenticate to the instance by using a certificate, but it does allow for
    code signing so that permissions to procedures can be abstracted, rather than
    granted directly to a login. This helps when you are using dynamic SQL, which
    breaks the ownership chain; in this scenario, when you run the procedure, SQL
    Server combines the permissions from the user who called the procedure and the
    user who maps to the certificate. Ownership chains are discussed later in this
    chapter.


    If you select mixed-mode authentication for your instance, however, then in addition
    to using Windows authentication, as described earlier, users can also connect
    by using second tier authentication. When you use second tier authentication,
    you create a SQL login, which has a username and password. This username and password
    is stored in the Master database with its own SID. When a user attempts to authenticate
    to the instance, she supplies the username and password, and this is validated
    against the credentials stored.


    When you are using mixed-mode authentication, there will be a special user, called
    the SA. This is the System Administrator account, and it has administrative rights
    to the entire instance. This can be a security vulnerability, because anybody
    looking to hack into a SQL Server instance will first try to crack the password
    for the SA account. Because of this, it is imperative that you use a very strong
    password for this account.


    An additional security tip is to rename the SA account. This means that a potential
    hacker will not know the name of the administrative account, which makes it a
    lot harder to break into the instance. You can rename the SA account by using
    the command in Listing [10-2](#333037_2_En_10_Chapter.xhtml#PC2).


    ```

    ALTER LOGIN sa WITH NAME = PROSQLADMINSA ;

    Listing 10-2

    Renaming the SA Account

    ```


    By its very nature, Windows authentication is more secure than second tier authentication.
    Therefore, it is good practice to configure your instance to use Windows authentication
    only, unless you have a specific need to use second tier authentication. You can
    set the authentication mode in SQL Server Management Studio within the Security
    tab of the Server Properties dialog box. You will need to restart the SQL Server
    service for the change to take effect.'
  trans: '## 安全层级


    SQL Server 的安全层级始于 Windows 域级别，并逐级向下延伸，经过本地服务器、SQL Server 实例、数据库，直至对象级别。该模型基于
    *主体*、*安全对象* 和 *权限* 的概念。*主体* 是被授予权限、拒绝权限或撤销权限的实体。撤销权限意味着删除现有的授予或拒绝分配。组和角色是包含零个或多个安全主体的主体，通过允许你将权限作为一个单一单元分配给相似的主体，简化了安全管理。


    *安全对象* 是可以被授予权限的对象——例如，实例级别的端点，或数据库内的表。因此，你将安全对象上的权限授予某个主体。图 10-1 中的图表概述了安全层级的每一级以及主体是如何分层的。


    ![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig1_HTML.jpg](img/333037_2_En_10_Fig1_HTML.jpg)


    *图 10-1：安全主体层级*


    该图显示，在 SQL Server 实例中创建的登录名可以映射到本地 Windows 用户或组，或域用户或组。通常，在企业环境中，这是一个域用户或组。（*组*
    是被作为一个单元授予权限的用户集合。）这简化了安全管理。想象一下，一个新成员加入了销售团队。当他被添加到名为 `SalesTeam` 的域组时——该组已经拥有了访问文件系统位置、SQL
    Server 数据库等所需的所有权限——他立即继承了履行其角色所需的所有权限。


    该图还说明了本地服务器帐户或域帐户及组如何映射到数据库级别的用户（一个没有登录名的数据库用户）。这是包含数据库功能的一部分。这项技术早在 SQL Server
    2012 中就已引入，以支持使用 AlwaysOn 可用性组的高可用性。本章稍后将讨论包含数据库身份验证。


    然后，你可以将 Windows 登录名（你在 SQL Server 实例级别创建的）或二级 SQL Server 登录名（如果你使用的是混合模式身份验证）添加到实例级别的固定服务器角色和用户定义服务器角色中。这样做允许你将通用权限集授予用户，用于实例级别的对象，如链接服务器和端点。你也可以将登录名映射到数据库用户。


    数据库用户位于层级的数据库级别。你可以直接在数据库内的架构和对象上授予他们权限，或者可以将他们添加到数据库角色中。数据库角色类似于服务器角色，不同之处在于它们被授予了对数据库内部对象（如架构、表、视图、存储过程等）的通用权限集。


    ### 创建 Chapter10 数据库


    在继续之前，我们现在将创建 `Chapter10` 数据库，本章中的示例将使用该数据库。这可以通过运行清单 10-1 中的脚本来实现。


    ```sql

    --Create Chapter10 database

    CREATE DATABASE Chapter10 ;

    GO

    USE Chapter10

    GO

    --Create SensitiveData table

    CREATE TABLE dbo.SensitiveData

    (

    ID    INT    PRIMARY KEY    IDENTITY,

    SensitiveText        NVARCHAR(100)

    ) ;

    --Populate SensitiveData table

    DECLARE @Numbers TABLE

    (

    ID        INT

    )

    ;WITH CTE(Num)

    AS

    (

    SELECT 1 AS Num

    UNION ALL

    SELECT Num + 1

    FROM CTE

    WHERE Num < 100

    )

    INSERT INTO @Numbers

    SELECT Num

    FROM CTE ;

    INSERT INTO dbo.SensitiveData

    SELECT ''SampleData''

    FROM @Numbers ;

    ```


    ## 实现实例级安全


    除非你使用的是包含数据库（本章稍后讨论），否则所有用户都必须在实例级别进行身份验证。你可以使用两种身份验证模式：Windows 身份验证和混合模式身份验证。当你选择
    Windows 身份验证时，会创建一个实例级别的登录名，并将其映射到 Windows 用户或组，该用户或组存在于域级别或本地服务器级别。


    例如，假设有两个用户 Pete 和 Danielle。两人都有域帐户，`PROSQLADMIN\Pete` 和 `PROSQLADMIN\Danielle`。两人也是一个名为
    `PROSQLADMIN\SQLUsers` 的 Windows 组的成员。创建两个登录名，一个映射到 Pete 的帐户，一个映射到 Danielle 的帐户，在功能上等同于创建一个登录名，映射到
    `SQLUsers` 组，前提是你授予完全相同的权限集。然而，创建两个单独的登录名可以对权限进行更精细的控制。


    当你创建一个映射到 Windows 用户或组的登录名时，SQL Server 会记录此主体的 SID（安全标识符）并将其存储在 Master 数据库中。然后，它使用此
    SID 来识别尝试连接的用户，依据是他们用来登录服务器或域的上下文。


    除了创建映射到 Windows 用户或组的登录名外，你还可以将登录名映射到证书或非对称密钥。这样做并不允许用户使用证书进行实例身份验证，但它确实允许代码签名，从而可以将权限抽象到存储过程，而不是直接授予登录名。这在你使用动态
    SQL（这会打破所有权链）时很有帮助；在这种场景下，当你运行存储过程时，SQL Server 会结合调用该过程的用户和映射到证书的用户的权限。所有权链将在本章稍后讨论。


    但是，如果你为实例选择混合模式身份验证，那么除了使用前面描述的 Windows 身份验证外，用户还可以使用二级身份验证进行连接。当你使用二级身份验证时，你会创建一个
    SQL 登录名，该登录名具有用户名和密码。此用户名和密码及其自身的 SID 一起存储在 Master 数据库中。当用户尝试进行实例身份验证时，她提供用户名和密码，系统会将其与存储的凭据进行验证。


    当使用混合模式身份验证时，会存在一个名为 `SA` 的特殊用户。这是系统管理员帐户，它对整个实例拥有管理权限。这可能是一个安全漏洞，因为任何试图入侵 SQL
    Server 实例的人都会首先尝试破解 `SA` 帐户的密码。因此，必须为该帐户使用非常强的密码。


    另一个安全提示是重命名 `SA` 帐户。这意味着潜在的黑客将不知道管理帐户的名称，这使得入侵实例变得更加困难。你可以使用清单 10-2 中的命令重命名 `SA`
    帐户。


    ```sql

    ALTER LOGIN sa WITH NAME = PROSQLADMINSA ;

    ```


    就其本质而言，Windows 身份验证比二级身份验证更安全。因此，除非你有特定需要使用二级身份验证，否则最佳实践是将你的实例配置为仅使用 Windows 身份验证。你可以在
    SQL Server Management Studio 的“服务器属性”对话框的“安全性”选项卡中设置身份验证模式。你需要重启 SQL Server 服务才能使更改生效。'
- fmt: '## Server Roles


    SQL Server provides a set of server roles, out of the box, that allow you to assign
    instance-level permissions to logins that map to common requirements. These are
    called `fixed server roles`, and you cannot change the permissions that are assigned
    to them; you can only add and remove logins. Table [10-1](#333037_2_En_10_Chapter.xhtml#Tab1)
    describes each of these fixed server roles.


    **Table 10-1** Fixed Server Roles


    | Role | Description |

    | --- | --- |

    | `sysadmin` | The `sysadmin` role gives administrative permissions to the entire
    instance. A member of the `sysadmin` role can perform any action within the instance
    of the SQL Server relational engine. |

    | `blkadmin` | In conjunction with the `INSERT` permission on the target table
    within a database, the `bulkadmin` role allows a user to import data from a file
    using the `BULK INSERT` statement. This role is normally given to service accounts
    that run ETL processes. |

    | `dbcreator` | The `dbcreator` role allows its members to create new databases
    within the instance. Once a user creates a database, he is automatically the owner
    of that database and is able to perform any action inside it. |

    | `diskadmin` | The `diskadmin` role gives its members the permissions to manage
    backup devices within SQL Server. |

    | `processadmin` | Members of the `processadmin` role are able to stop the instance
    from T-SQL or SSMS. They are also able to kill running processes. |

    | `public` | All SQL Server logins are added to the `public` role. Although you
    can assign permissions to the `public` role, this does not fit with the principle
    of least privilege. This role is normally only used for internal SQL Server operations,
    such as authentication to TempDB. |

    | `securityadmin` | Members of the `securityadmin` role are able to manage logins
    at the instance level. For example, members may add a login to a server role (except
    `sysadmin`) or assign permissions to an instance-level resource, such as an endpoint.
    However, they cannot assign permissions within a database to database users. |

    | `serveradmin` | `Serveradmin` combines the `diskadmin` and `processadmin` roles.
    As well as being able to start or stop the instance, however, members of this
    role can also shut down the instance using the `SHUTDOWN` T-SQL command. The subtle
    difference here is that the `SHUTDOWN` command gives you the option of not running
    a `CHECKPOINT` in each database if you use it with the `NOWAIT` option. Additionally,
    members of this role can alter endpoints and view all instance metadata. |

    | `setupadmin` | Members of the `setupadmin` role are able to create and manage
    linked servers. |


    You can also create your own server roles, which group users who need a common
    set of permissions that are tailored to your environment. For example, if you
    have a highly available environment that relies on availability groups, then you
    may wish to create a server role called `AOAG` and grant this group the following
    permissions:


    *   `ALTER ANY AVAILABILITY GROUP`

    *   `ALTER ANY ENDPOINT`

    *   `CREATE AVAILABILITY GROUP`

    *   `CREATE ENDPOINT`


    You can then add the junior DBAs, who are not authorized to have full `sysadmin`
    permissions, but who you want to manage the high availability of the instance,
    to this role. You can create this server role by selecting **New Server Role**
    from the context menu of **Security** ➤ **Server Roles** in SSMS. The **General**
    tab of the **New Server Role** dialog box is illustrated in Figure [10-2](#333037_2_En_10_Chapter.xhtml#Fig2).


    ![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig2_HTML.jpg](images/333037_2_En_10_Chapter/333037_2_En_10_Fig2_HTML.jpg)


    **Figure 10-2** The General tab


    You can see that we have assigned the name of the role as `AOAG`, we have specified
    an owner for the role, and we have selected the permissions required under the
    instance that we are configuring. On the **Members** tab of the dialog box, we
    can search for preexisting logins that we will add to the role, and in the **Membership**
    tab, we can optionally choose to nest the role inside another server role.


    Alternatively, you can create the group through T-SQL. The script in Listing [10-3](#333037_2_En_10_Chapter.xhtml#PC3)
    also creates this group. We add logins to the role later in this chapter.


    ```sql

    USE Master

    GO

    CREATE SERVER ROLE AOAG AUTHORIZATION [WIN-KIAGK4GN1MJ\Administrator] ;

    GO

    GRANT ALTER ANY AVAILABILITY GROUP TO AOAG ;

    GRANT ALTER ANY ENDPOINT TO AOAG ;

    GRANT CREATE AVAILABILITY GROUP TO AOAG ;

    GRANT CREATE ENDPOINT TO AOAG ;

    GO

    ```


    **Listing 10-3** Creating a Server Role and Assigning Permissions'
