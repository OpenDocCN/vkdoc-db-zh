  trans: '

    ## 内存优化表


    内存中 OLTP 是 SQL Server 的一项功能，它通过将所有表数据存储在内存中，从而提供显著的性能提升。当然，这可以极大地减少 IO，尽管这些表为了持久性也会保存到磁盘上。这是因为基于磁盘的表版本使用基于
    FILESTREAM 的技术，以非结构化格式存储在数据库引擎之外。此外，内存优化的检查点操作发生得更为频繁。自从上一次自动检查点发生后，事务日志每增长 512MB
    就会进行一次自动检查点。这消除了与检查点活动相关的 IO 峰值。由于记录的数据更少，内存优化表也能减少事务日志上的 IO 争用。同样值得一提的是，只有表的变更会被记录，索引变更则不会。


    除了最小化 IO，内存中 OLTP 还能降低 CPU 开销。这是因为可以使用本机编译存储过程来访问数据，而不是传统的、解释型的代码。本机编译存储过程使用的指令显著更少，这意味着消耗的
    CPU 时间更少。然而，内存优化表无助于减少网络开销，因为仍然需要将相同数量的数据传送给客户端。


    就其本质而言，内存优化表会增加内存压力而非减少它，因为即使您从不使用这些数据，它仍然驻留在内存中，从而减少了传统资源可用于缓存的可用空间。这意味着内存中功能是为
    OLTP 工作负载设计的，而不是数据仓库工作负载。预期是数据仓库中的事实表和维度表太大，无法驻留在内存中。


    除了较低的资源使用率，内存优化表还有助于减少争用。当您访问内存优化表中的数据时，SQL Server 不会获取闩锁。这意味着闩锁和自旋锁争用会自动消除。由于一种用于实现隔离级别的新的乐观并发方法，读写事务之间的阻塞也可以减少。事务和隔离级别，包括内存优化的，将在第
    18 章中讨论。


    ### 持久性


    创建内存优化表时，您可以将持久性设置指定为 `SCHEMA_AND_DATA` 或 `SCHEMA_ONLY`。如果您选择 `SCHEMA_AND_DATA`，则表的所有数据都将持久化到磁盘，并且事务会被记录。然而，如果您选择
    `SCHEMA_ONLY`，则数据不会被持久化，事务也不会被记录。这意味着在 SQL Server 服务重启后，表的结构将保持完整，但它将不包含任何数据。这对于临时过程很有用，例如
    ETL 加载期间的数据暂存。


    ### 创建和管理内存优化表


    > **提示**

    >

    > 乍一看，您可能很想在整个数据库中使用内存优化表。然而，它们有许多限制，事实上，您只应在例外情况下使用它们。这些限制将在本节后面讨论。


    在创建内存优化表之前，必须已存在一个内存优化文件组。内存优化文件组在第 6 章中讨论。


    您可以像创建基于磁盘的表一样，使用 `CREATE TABLE T-SQL` 语句创建内存优化表。不同之处在于，您必须指定一个 `WITH` 子句，该子句指明该表将进行内存优化。`WITH`
    子句还用于指示您所需的持久性级别。


    内存优化表还必须包含索引。我们将在第 8 章中全面讨论索引，包括内存优化表的索引，但现在您应该知道内存优化表支持以下索引类型：


    *   非聚集哈希索引

    *   非聚集索引


    哈希索引组织到存储桶中，创建时必须使用 `BUCKET_COUNT` 参数指定存储桶计数。理想情况下，您的存储桶计数应该是索引键中不同值数量的两倍。您并不总是知道有多少个不同的值；在这种情况下，您可能希望显著增加
    `BUCKET_COUNT`。权衡之处在于，存储桶越多，索引消耗的内存就越多。创建表后，索引大小是固定的，无法更改表或其索引。


    清单 7-14 中的脚本创建了一个名为 `OrdersMem` 的完全持久化内存优化表，并用数据填充它。它在 `ID` 列上创建了一个非聚集哈希索引，存储桶计数为
    2,000,000，因为我们将插入 1,000,000 行。该脚本假设内存优化文件组已经创建。


    ```

    USE [Chapter7]

    GO

    CREATE TABLE dbo.OrdersMem(

    OrderNumber int IDENTITY(1,1) NOT NULL PRIMARY KEY NONCLUSTERED HASH

    WITH (BUCKET_COUNT= 2000000),

    OrderDate date NOT NULL,

    CustomerID int NOT NULL,

    ProductID int NOT NULL,

    Quantity int NOT NULL,

    NetAmount money NOT NULL,

    TaxAmount money NOT NULL,

    InvoiceAddressID int NOT NULL,

    DeliveryAddressID int NOT NULL,

    DeliveryDate date NULL,

    )WITH (MEMORY_OPTIMIZED = ON, DURABILITY = SCHEMA_AND_DATA) ;

    DECLARE @Numbers TABLE

    (

    Number    INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE ;

    --Populate ExistingOrders with data

    INSERT INTO dbo.OrdersMem

    SELECT

    (SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number

    FROM @Numbers

    ORDER BY NEWID()),getdate())as DATE)),

    (SELECT TOP 1 Number -10 FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    500,

    100,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number - 10

    FROM @Numbers

    ORDER BY NEWID()),getdate()) as DATE))

    FROM @Numbers a

    CROSS JOIN @Numbers b

    CROSS JOIN @Numbers c ;

    ```


    **清单 7-14** 创建内存优化表


    ### 性能概况


    在内存优化表开发期间，它们被称为 `Hekaton`，这是一个文字游戏，意思是快 100 倍。那么让我们看看内存中表和基于磁盘的表在不同查询类型上的性能对比如何。清单
    7-15 中的代码创建了一个名为 `OrdersDisc` 的新表，并使用来自 `OrdersMem` 的数据填充它，以便您可以针对这两个表运行公平的测试。

    '
- fmt: '### Note


    For this benchmarking, the tests are running on a VM, with 2×2 Core vCPUs, 8GB
    RAM, and a hybrid SSHD (Solid State Hybrid Technology) SATA disk.


    ```sql

    USE [Chapter7]

    GO

    CREATE TABLE dbo.OrdersDisc(

    OrderNumber int NOT NULL,

    OrderDate date NOT NULL,

    CustomerID int NOT NULL,

    ProductID int NOT NULL,

    Quantity int NOT NULL,

    NetAmount money NOT NULL,

    TaxAmount money NOT NULL,

    InvoiceAddressID int NOT NULL,

    DeliveryAddressID int NOT NULL,

    DeliveryDate date NULL,

    CONSTRAINT [PK_OrdersDisc] PRIMARY KEY CLUSTERED

    (

    [OrderNumber] ASC,

    [OrderDate] ASC

    )

    ) ;

    INSERT INTO dbo.OrdersDisc

    SELECT *

    FROM dbo.OrdersMem ;

    ```


    **Listing 7-15** Creating a Disk-Based Table and Populating It with Data


    First, we will run the most basic test—a `SELECT *` query from each table. The
    script in Listing [7-16](#333037_2_En_7_Chapter.xhtml#PC16) runs these queries
    after tearing down the plan cache and the buffer cache to ensure a fair test.


    ```sql

    SET STATISTICS TIME ON

    --Tear down the plan cache

    DBCC FREEPROCCACHE

    --Tear down the buffer cache

    DBCC DROPCLEANBUFFERS

    --Run the benchmarks

    SELECT *

    FROM dbo.OrdersMem ;

    SELECT *

    FROM dbo.OrdersDisc ;

    ```


    **Listing 7-16** The SELECT * Benchmark


    From the results in Figure [7-15](#333037_2_En_7_Chapter.xhtml#Fig15), you can
    see that the memory-optimized table returned the results just under 4.5% faster.


    ### Tip


    Naturally, the results you see may vary based on the system on which you run the
    scripts. For example, if you have SSDs, then the queries against the disk-based
    tables may be more comparable. Also, be aware that this test uses cold data (not
    in the buffer cache). If the data in the disk-based tables is warm (in the buffer
    cache), then you can expect the results to be comparable, or in some cases, the
    query against the disk-based table may even be slightly faster.


    ![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig15_HTML.jpg](images/333037_2_En_7_Chapter/333037_2_En_7_Fig15_HTML.jpg)


    **Figure 7-15** SELECT ∗ benchmark results


    In the next test, we see what happens if we add in an aggregation. The script
    in Listing [7-17](#333037_2_En_7_Chapter.xhtml#PC17) runs `COUNT(*)` queries against
    each of the tables.


    ```sql

    SET STATISTICS TIME ON

    --Tear down the plan cache

    DBCC FREEPROCCACHE

    --Tear down the buffer cache

    DBCC DROPCLEANBUFFERS

    --Run the benchmarks

    SELECT COUNT(*)

    FROM dbo.OrdersMem ;

    SELECT COUNT(*)

    FROM dbo.OrdersDisc ;

    ```


    **Listing 7-17** The COUNT(*) Benchmark


    From the results in Figure [7-16](#333037_2_En_7_Chapter.xhtml#Fig16), we can
    see that this time, the memory-optimized table performed considerably better than
    the disk-based table, offering us a 340% performance improvement over the disk-based
    table.


    ![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig16_HTML.jpg](images/333037_2_En_7_Chapter/333037_2_En_7_Fig16_HTML.jpg)


    **Figure 7-16** COUNT(∗) benchmark results


    It is also interesting to see how memory-optimized tables compare to disk-based
    tables when there is a filter on the `OrderNumber` column, since this column is
    covered by an index on both tables. The script in Listing [7-18](#333037_2_En_7_Chapter.xhtml#PC18)
    adds the data in the `NetAmount` column, but it also filters on the `OrderNumber`
    column so that only `OrderNumbers` over 950,000 are considered.


    ```sql

    SET STATISTICS TIME ON

    --Tear down the plan cache

    DBCC FREEPROCCACHE

    --Tear down the buffer cache

    DBCC DROPCLEANBUFFERS

    --Run the benchmarks

    SELECT SUM(NetAmount)

    FROM dbo.OrdersMem

    WHERE OrderNumber > 950000 ;

    SELECT SUM(NetAmount)

    FROM dbo.OrdersDisc

    WHERE OrderNumber > 950000 ;

    ```


    **Listing 7-18** Primary Key Filter Benchmark


    In this instance, because the memory-optimized table was scanned but the clustered
    index on the disk-based table was able to perform an index seek, the disk-based
    table performed approximately ten times faster than the memory-optimized table.
    This is illustrated in Figure [7-17](#333037_2_En_7_Chapter.xhtml#Fig17).


    ![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig17_HTML.jpg](images/333037_2_En_7_Chapter/333037_2_En_7_Fig17_HTML.jpg)


    **Figure 7-17** SUM filtering on primary key benchmark results


    ### Note


    We would have received a far superior performance for the final query on the memory-optimized
    table if we had implemented a nonclustered index as opposed to a nonclustered
    hash index. We completely discuss the impact of indexes in Chapter [8](#333037_2_En_8_Chapter.xhtml).


    ### Table Memory Optimization Advisor


    The Table Memory Optimization Advisor is a wizard that can run against an existing
    disk-based table, and it will walk you through the process of migration. The first
    page of the wizard checks your table for incompatible features, such as sparse
    columns and foreign key constraints against disk-based tables.


    The following page provides you with a warning having to do with which features
    are not available for memory-optimized tables, such as distributed transactions
    and `TRUNCATE TABLE` statements.


    The Migration Options page of the wizard allows you to specify the durability
    level of the table. Checking the box causes the table to be created with `DURABILITY
    = SCHEMA_ONLY`. On this screen, you can also choose a new name for the disk-based
    table that you are migrating, since obviously, the new object cannot share the
    name of the existing object. Finally, you can use the check box to specify if
    you want the data from the existing table to be copied to the new table.


    The Primary Key Migration page allows you to select the columns that you wish
    to use to form the primary key of the table as well as the index that you want
    to create on your table. If you choose a nonclustered hash index, you need to
    specify the bucket count, whereas if you choose a nonclustered index, you need
    to specify the columns and order.


    The Summary screen of the wizard provides an overview of the activities that will
    be performed. Clicking the Migrate button causes the table to be migrated.


    ### Caution


    While the compatibility of memory-optimized tables with the SQL Server feature
    set has improved dramatically over the last few releases, there are still a number
    of features that memory-optimized tables do not support. A full list of nonsupported
    T-SQL constructs can be found at [`https://docs.microsoft.com/en-us/sql/relational-databases/in-memory-oltp/transact-sql-constructs-not-supported-by-in-memory-oltp?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/relational-databases/in-memory-oltp/transact-sql-constructs-not-supported-by-in-memory-oltp%253Fview%253Dsql-server-ver15).


    ### Natively Compiled Objects


    In-Memory OLTP introduces native compilation, for both memory-optimized tables
    and for stored procedures. The following sections discuss these concepts.'
