  trans: '## 介绍元数据对象


    目录视图位于 `sys` 架构中。目录视图有很多，其中一些最有用的视图，例如 `sys.master_files`，将在本章探讨。清单 17-1 展示了如何使用目录视图生成处于
    `FULL` 恢复模式的数据库列表的示例。


    ```sql

    SELECT name

    FROM sys.databases

    WHERE recovery_model_desc = ''FULL'' ;

    ```

    *清单 17-1 使用目录视图*


    信息模式视图位于 `INFORMATION_SCHEMA` 架构中。它们返回的细节不如目录视图多，但基于 ISO 标准。这意味着你可以在不同的关系数据库管理系统之间移植你的查询。清单
    17-2 展示了使用信息模式视图生成已被授予对 `Chapter10.dbo.SensitiveData` 表 `SELECT` 访问权限的主体列表的示例。


    ```sql

    USE Chapter10

    GO

    SELECT GRANTEE, PRIVILEGE_TYPE

    FROM INFORMATION_SCHEMA.TABLE_PRIVILEGES

    WHERE TABLE_SCHEMA = ''dbo''

    AND TABLE_NAME = ''SensitiveData''

    AND PRIVILEGE_TYPE = ''SELECT'' ;

    ```

    *清单 17-2 使用信息模式视图*


    SQL Server 中提供了许多动态管理视图和函数。它们统称为 DMV，提供了有关实例当前状态的信息，可用于故障排除和性能调优。SQL Server 2019
    中公开了以下类别的 DMV：


    *   AlwaysOn 可用性组

    *   变更数据捕获

    *   变更跟踪

    *   公共语言运行时 (CLR)

    *   数据库镜像

    *   数据库

    *   执行

    *   扩展事件

    *   FILESTREAM 和 FileTable

    *   全文搜索和语义搜索

    *   地理复制

    *   索引

    *   I/O

    *   内存优化表

    *   对象

    *   查询通知

    *   复制

    *   资源调控器

    *   安全性

    *   服务器

    *   服务代理

    *   空间

    *   SQL 数据仓库和 PDW

    *   SQL Server 操作系统

    *   延伸数据库

    *   事务


    我们将在本章多处演示和讨论如何使用 DMV。DMV 总是以 `dm_` 前缀开头，后接两到四个描述对象类别的字符——例如，`os_` 代表操作系统，`db_`
    代表数据库，`exec_` 代表执行。其后是对象的名称。在清单 17-3 中，你可以看到两点：一个是如何使用动态管理视图查找当前连接到 `Chapter16`
    数据库的登录名列表的示例；另一个是你可以使用一个动态管理函数来生成与 `Chapter16.dbo.Customers` 表相关的数据所存储页面的详细信息。


    ```sql

    USE Chapter16 –如果你遵循了本书第 16 章的示例，此数据库将存在

    GO

    --查找连接到 Chapter16 数据库的登录名

    SELECT login_name

    FROM sys.dm_exec_sessions

    WHERE database_id = DB_ID(''Chapter16'') ;

    --返回存储 Chapter16.dbo.Customers 表的数据页的详细信息

    SELECT *

    FROM sys.dm_db_database_page_allocations(DB_ID(''Chapter16''),

    OBJECT_ID(''dbo.Customers''),

    NULL,

    NULL,

    ''DETAILED'') ;

    ```

    *清单 17-3 使用动态管理视图和函数*


    SQL Server 还提供了许多与元数据相关的系统函数，例如我们在清单 17-3 中使用的 `DB_ID()` 和 `OBJECT_ID()`。另一个与元数据相关的系统函数例子是
    `DATALENGTH`，我们在清单 17-4 中使用它来返回 `Chapter16.dbo.Customers` 表 `LastName` 列中每个值的长度。


    ```sql

    USE Chapter16

    GO

    SELECT DATALENGTH(LastName)

    FROM dbo.Customers ;

    ```

    *清单 17-4 使用系统函数*


    ## 服务器级和实例级元数据


    服务器和实例有多种形式的元数据可用。服务器级元数据对于需要查找配置信息或在无法访问底层操作系统时进行故障排除的数据库管理员非常有用。例如，`dm_server`
    类别的 DMV 提供了允许你检查服务器审核状态、查看 SQL Server 的注册表项、查找内存转储文件的位置以及查找实例服务详细信息的视图。在以下部分中，我们将讨论如何查看与实例关联的注册表项、公开
    SQL Server 服务的详细信息以及查看缓冲区缓存的内容。


    ### 公开注册表值


    `sys.dm_server_registry` DMV 公开了与实例相关的关键注册表项。该视图返回三列，如表 17-1 所述。


    *表 17-1 sys.dm_server_registry 列*


    | 列 | 描述 |

    | --- | --- |

    | `Registry_key` | 注册表项的名称 |

    | `Value_name` | 项的值的名称 |

    | `Value_data` | 值中包含的数据 |


    你可以在 `sys.dm_server_registry` DMV 中找到的一个非常有用的信息是 SQL Server 当前正在侦听的端口号。清单 17-5
    中的查询使用 `sys.dm_server_registry` DMV 返回实例正在侦听的端口，前提是实例配置为侦听所有 IP 地址。


    ```sql

    SELECT *

    FROM (

    SELECT

    CASE

    WHEN value_name = ''tcpport'' AND value_data != ''''

    THEN value_data

    WHEN value_name = ''tcpport'' AND value_data = ''''

    THEN (

    SELECT value_data

    FROM sys.dm_server_registry

    WHERE registry_key LIKE ''%ipall''

    AND value_name = ''tcpdynamicports'' )

    END PortNumber

    FROM sys.dm_server_registry

    WHERE registry_key LIKE ''%IPAll'' ) a

    WHERE a.PortNumber IS NOT NULL ;

    ```

    *清单 17-5 查找端口号*


    此 DMV 的另一个有用功能是能够返回 SQL Server 服务的启动参数。如果你想了解是否为实例配置了 `-E` 这样的开关，这将特别有用。`-E` 开关增加了在轮询算法中分配给每个文件的区数量。清单
    17-6 中的查询显示为实例配置的启动参数。


    ```sql

    SELECT *

    FROM sys.dm_server_registry

    WHERE value_name LIKE ''SQLArg%'' ;

    ```

    *清单 17-6 查找启动参数*


    ### 公开服务详细信息


    `dm_server` 类别中另一个有用的 DMV 是 `sys.dm_server_services`，它公开了实例正在使用的服务的详细信息。表 17-2
    描述了返回的列。


    *表 17-2 sys.dm_server_services 列*


    | 列 | 描述 |

    | --- | --- |

    | `Servicename` | 服务的名称。 |

    | `Startup_type` | 表示服务启动类型的整数。 |

    | `Startup_desc` | 服务启动类型的文本描述。 |

    | `Status` | 表示服务当前状态的整数。 |

    | `Status_desc` | 当前服务状态的文本描述。 |

    | `Process_id` | 服务的进程 ID。 |

    | `Last_startup_time` | 服务上次启动的日期和时间。 |

    | `Service_account` | 用于运行服务的帐户。 |

    | `Filename` | 服务的文件名，包括完整文件路径。 |

    | `Is_clustered` | `1` 表示服务是集群的；`0` 表示它是独立的。 |

    | `Clusternodename` | 如果服务是集群的，此列指示服务正在其上运行的节点的名称。 |


    清单 17-7 中的查询返回每个服务的名称、其启动类型、当前状态以及运行该服务的服务帐户名称。


    ```sql

    SELECT servicename

    ,startup_type_desc

    ,status_desc

    ,service_account

    FROM sys.dm_server_services ;

    ```

    *清单 17-7 公开服务详细信息*'
- fmt: '# Analyzing Buffer Cache Usage


    `dm_os`类别的DMV暴露了41个包含SQLOS当前状态信息的对象，尽管其中只有31个有文档记录。`dm_os`类别中一个特别有用的、暴露缓冲区缓存内容的DMV是`sys.dm_os_buffer_descriptors`。查询此对象时，将返回表17-3中详述的列。


    **Table 17-3** `sys.dm_os_buffer_descriptors` Columns


    | Column | Description |

    | --- | --- |

    | `Database_id` | 页面所属数据库的ID |

    | `File_id` | 页面所属文件的ID |

    | `Page_id` | 页面的ID |

    | `Page_level` | 页面的索引级别 |

    | `Allocation_unit_id` | 页面所属分配单元的ID |

    | `Page_type` | 页面类型，例如 `DATA_PAGE`, `INDEX_PAGE`, `IAM_PAGE` 或 `PFS_PAGE` |

    | `Row_count` | 存储在页面上的行数 |

    | `Free_space_in_bytes` | 页面上的可用空间量 |

