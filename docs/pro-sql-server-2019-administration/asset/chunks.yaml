    | `6` | `REPLICATION` | 日志中存在尚未被分发服务器接收的事务。 |

    | `7` | `DATABASE_SNAPSHOT_CREATION` | 当前正在创建数据库快照。数据库快照将在第 16 章讨论。 |

    | `8` | `LOG_SCAN` | 正在进行日志扫描操作。 |

    | `9` | `AVAILABILITY_REPLICA` | 未完全同步辅助副本，或可用性组已暂停。 |

    | `13` | `OLDEST_PAGE` | 数据库中最旧的页面比检查点 LSN 还要旧。当使用间接检查点时会发生这种情况。 |

    | `16` | `XPT_CHECKPOINT` | 在日志可以被截断之前，需要一次针对内存优化表的 `CHECKPOINT`。 |


    在我们的场景中，为了将 `VLF` 标记为可重用，我们需要备份事务日志。理论上，我们也可以切换到 `SIMPLE` 恢复模式，但这会破坏我们的日志链。在此之前，我们需要进行一次完整备份。这是因为所有备份序列都必须从完整备份开始。（备份和还原将在第
    12 章讨论。）这样操作后，只有 `FSeqNo` 为 83 的 `VLF` 保持活动状态，其他的将被标记为可重用。


    为了改善日志碎片化，我们需要先收缩日志文件，然后以更大的增量再次扩展它。因此，在我们的案例中，我们将日志文件尽可能收缩，这将收缩到 `FSeqNo` 为 83
    的 `VLF`，因为这是文件中最后一个活动 `VLF`。然后我们将其扩展回 500MB。我们可以使用清单 6-20 中的脚本来执行这些任务。


    ```

    USE Chapter6LogFragmentation

    GO

    DBCC SHRINKFILE (''Chapter6LogFragmentation _log'', 0, TRUNCATEONLY);

    GO

    ALTER DATABASE Chapter6LogFragmentation MODIFY FILE ( NAME = ''Chapter6LogFragmentation
    _log'', SIZE = 512000KB );

    GO

    清单 6-20

    对事务日志进行碎片整理

    ```


    最后，我们再次运行清单 6-18 中的查询，以便检查差异。图 6-13 显示，尽管日志增长了大约 155GB，但我们拥有的 `VLF` 数量比开始时更少。


    ![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig13_HTML.jpg](img/333037_2_En_6_Fig13_HTML.jpg)


    图 6-13


    收缩和扩展后的日志碎片化情况


    ## 总结


    `文件组` 是数据文件的逻辑容器。也存在用于 `FILESTREAM`/`FileTable` 数据以及内存优化数据的特殊 `文件组`。当创建表和索引时，它们是在
    `文件组` 上创建的，而不是直接在文件上创建，并且对象中的数据会均匀分布在该 `文件组` 内的各个文件上。


    你可以采用多种 `文件组` 策略来辅助性能、备份/恢复活动，甚至存储分层。为了提升性能，你可以选择将频繁连接的对象放入不同的 `文件组`，或者将所有对象分布到服务器的所有磁盘上以最大化
    IO 吞吐量。


    为了在维护窗口有限的情况下支持超大型数据库的备份，你可以将数据分布在不同的 `文件组` 上，并在隔夜轮换备份这些 `文件组`。为了缩短关键数据的恢复时间，你可以将关键数据隔离在单独的
    `文件组` 中，然后先于其他 `文件组` 恢复它。


    为了支持手动存储分层，请实现表分区，使每个分区存储在单独的 `文件组` 上。然后，你可以将每个 `文件组` 内的文件放置在适当的存储设备上。


    `FILESTREAM` 和内存优化 `文件组` 都指向操作系统中的文件夹，而不是包含文件。每个文件夹位置被称为容器。对于内存优化 `文件组`，建议为你使用的每个磁盘阵列准备两个容器，以便均匀分布
    IO。


    你可以扩展和收缩数据文件。但是，收缩文件（尤其是自动收缩）被认为是不良实践，并可能导致严重的碎片化问题，从而引发性能问题。扩展文件时，应使用较大的增量以减少重复开销。


    你也可以扩展和收缩日志文件，尽管很少需要收缩它们。以小增量扩展日志文件可能导致日志碎片化，即你的日志文件包含大量的 `VLF`。你可以通过先收缩日志文件，然后以更大的增量再次扩展它来解决日志碎片化问题。


    # 7. 表优化


    在你的数据层应用程序的生命周期中，你可能需要对保存应用程序数据的表执行许多维护任务和性能优化操作。这些操作可能包括对表进行分区、压缩表或将数据迁移到内存优化表。在本章中，我们将详细探讨这三个概念。


    ## 表分区


    *分区* 是针对大型表和索引的一种性能优化方法，它将对象水平拆分为更小的单元。当随后访问表或索引时，`SQL Server` 可以执行一种称为 *分区消除*
    的优化，允许仅读取所需的分区，而不是整个表。此外，每个分区可以存储在单独的 `文件组` 上；这允许你将不同分区存储在不同的存储层上。例如，你可以将较旧、访问频率较低的数据存储在较便宜的存储上。图
    7-1 展示了一个大型 `Orders` 表可能的结构。


    ![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig1_HTML.jpg](img/333037_2_En_7_Fig1_HTML.jpg)


    图 7-1


    分区结构


    ### 分区概念


    在深入探讨分区的技术实现之前，理解相关概念会有所帮助，例如分区键、分区函数、分区方案和分区对齐。这些概念将在以下各节中讨论。

    '
- fmt: '# 数据库分区


    ## 分区键


    `分区键`用于确定表中每一行应放置在哪个分区中。如果表具有聚集索引，则分区键必须是聚集索引键的子集。表上所有其他`UNIQUE`索引，包括主键（如果与聚集索引不同），也需要包含分区键。分区键可以由任何数据类型组成，但以下类型除外：`TEXT`、`NTEXT`、`IMAGE`、`XML`、`TIMESTAMP`、`VARCHAR(MAX)`、`NVARCHAR(MAX)`和`VARBINARY(MAX)`。它也不能是用户定义的
    CLR 类型列或具有别名数据类型的列。但是，它可以是计算列，只要该列是持久化的。许多场景会使用日期或日期时间列作为分区键。这允许你基于时间实现滑动窗口。我们将在本章后面讨论滑动窗口。在图
    7-1 中，`OrderData`列被用作分区键。


    由于该列用于在分区之间分布行，因此你应使用能够实现行均匀分布的列，以从解决方案中获得最大收益。你选择的列也应该是查询用作筛选条件的列。这将允许你实现分区消除。


    ## 分区函数


    你使用边界点来设置每个分区的上限和下限。在图 7-1 中，你可以看到边界点被设置为 2019 年 1 月 1 日和 2017 年 1 月 1 日。这些边界点在一个称为`分区函数`的数据库对象中进行配置。在创建分区函数时，你可以指定范围是左对齐还是右对齐。如果将范围左对齐，则任何严格等于边界点值的值都将存储在该边界点左侧的分区中。如果将范围右对齐，则严格等于边界点值的值将被放置在该边界点右侧的分区中。分区函数还规定了分区键的数据类型。


    ## 分区方案


    每个分区可以存储在单独的文件组上。`分区方案`是一个你创建的对象，用于指定每个分区将存储在哪个文件组上。从图 7-1 可以看出，分区的数量总是比边界点多一个。然而，当你创建分区方案时，可以指定一个“额外”的文件组。这将定义如果添加额外的边界点，下一个应使用的文件组。也可以指定`ALL`关键字，而不是指定各个文件组。这将强制所有分区存储在同一个文件组上。


    ## 索引对齐


    如果索引建立在与表相同的分区函数上，则该索引被视为与表对齐。如果索引建立在不同的分区函数上，但两个函数完全相同（即它们共享相同的数据类型、相同数量的分区和相同的边界点值），则它也被视为对齐。


    由于聚集索引的叶级由表的实际数据页组成，因此聚集索引始终与表对齐。然而，非聚集索引可以存储在与堆或聚集索引不同的文件组上。这延伸到分区，其中基础表或非聚集索引可以独立分区。如果非聚集索引存储在相同的分区方案或相同的分区方案上，则它们是对齐的。如果不是这种情况，则它们是非对齐的。


    除非有特定原因不这样做，否则将索引与基础表对齐是良好的实践。这是因为对齐索引有助于实现分区消除。索引对齐也是某些操作（如`SWITCH`）所必需的，这将在本章后面讨论。


    ## 分区层次结构


    涉及分区的对象以一对多的层次结构工作，因此多个表可以共享一个分区方案，多个分区方案可以共享一个分区函数，如图 7-2 所示。


    ![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig2_HTML.jpg](images/333037_2_En_7_Chapter/333037_2_En_7_Fig2_HTML.jpg)


    图 7-2

    分区层次结构


    ### 提示


    虽然图数据库超出了本书的范围，但值得一提的是，SQL Server 2019 引入了对分区图数据库表和索引的支持，它将数据划分为单元，这些单元可以分布在多个文件组上。


    ## 实现分区


    实现分区涉及创建分区函数和分区方案，然后在分区方案上创建表。如果表已存在，则需要删除并重新创建表的聚集索引。这些任务将在以下部分中讨论。


    ### 创建分区对象


    你需要创建的第一个对象是分区函数。这可以使用`CREATE PARTITION FUNCTION`语句创建，如代码清单 7-1 所示。此脚本创建一个名为`Chapter7`的数据库，然后创建一个名为`PartFunc`的分区函数。该函数指定分区键的数据类型为`DATE`，并为
    2019 年 1 月 1 日和 2017 年 1 月 1 日设置边界点。表 7-1 详细说明了日期将如何分布在分区之间。


    表 7-1

    日期分布


    | 日期 | 分区 | 备注 |

    | --- | --- | --- |

    | 2015年6月6日 | 1 | |

    | 2016年1月1日 | 1 | 如果使用了`RANGE RIGHT`，此值将在分区 2 中。 |

    | 2017年10月11日 | 2 | |

    | 2018年1月1日 | 2 | 如果使用了`RANGE RIGHT`，此值将在分区 3 中。 |

    | 2019年5月9日 | 3 | |


    ```sql

    USE Master

    GO

    --Create Database Chapter7 using default settings from Model

    CREATE DATABASE Chapter7 ;

    GO

    USE Chapter7

    GO

    --Create Partition Function

    CREATE PARTITION FUNCTION PartFunc(Date)

    AS RANGE LEFT

    FOR VALUES(''2017-01-01'', ''2019-01-01'') ;

    Listing 7-1

    创建分区函数

    ```


    我们需要创建的下一个对象是分区方案。这可以使用`CREATE PARTITION SCHEME`语句创建，如代码清单 7-2 所示。此脚本创建一个名为`PartScheme`的分区方案，它基于`PartFunc`分区函数，并指定所有分区都将存储在`PRIMARY`文件组上。虽然将所有分区存储在同一个文件组上不允许我们实现存储分层，但它确实使我们能够自动化滑动窗口。


    ```sql

    CREATE PARTITION SCHEME PartScheme

    AS PARTITION PartFunc

    ALL TO ([PRIMARY]) ;

    Listing 7-2

    创建分区方案

    ```'
  raw: '#### Partitioning Key


    The *partitioning key* is used to determine in which partition each row of the
    table should be placed. If your table has a clustered index, then the partitioning
    key must be a subset of the clustered index key. All other `UNIQUE` indexes on
    the table, including the primary key (if this differs from the clustered index),
    also need to include the partitioning key. The partitioning key can consist of
    any data type, with the exception of `TEXT`, `NTEXT`, `IMAGE`, `XML`, `TIMESTAMP`,
    `VARCHAR(MAX)`, `NVARCHAR(MAX)`, and `VARBINARY(MAX)`. It also cannot be a user-defined
    CLR Type column or a column with an alias data type. It can, however, be a computed
    column, as long as this column is persisted. Many scenarios will use a date or
    datetime column as the partitioning key. This allows you to implement sliding
    windows based on time. We discuss sliding windows later in this chapter. In Figure
    [7-1](#333037_2_En_7_Chapter.xhtml#Fig1), the `OrderData` column is being used
    as the partitioning key.


    Because the column is used to distribute rows between partitions, you should use
    a column that will enable an even distribution of rows in order to gain the most
    benefit from the solution. The column you select should also be a column that
    queries will use as a filter criterion. This will allow you to achieve partition
    elimination.


    #### Partition Function


    You use boundary points to set the upper and lower limits of each partition .
    In Figure [7-1](#333037_2_En_7_Chapter.xhtml#Fig1), you can see that the boundary
    points are set as 1st Jan 2019 and 1st Jan 2017\. These boundary points are configured
    in a database object called the *partition function*. When creating the partition
    function, you can specify if the range should be left or right. If you align the
    range to the left, then any values that are exactly equal to a boundary point
    value will be stored in the partition to the left of that boundary point. If you
    align the range with the right, then values exactly equal to the boundary point
    value will be placed in the partition to the right of that boundary point. The
    partition function also dictates the data type of the partitioning key.


    #### Partition Scheme


    Each partition can be stored on a separate filegroup. The *partition scheme* is
    an object that you create to specify which filegroup each partition will be stored
    on. As you can see from Figure [7-1](#333037_2_En_7_Chapter.xhtml#Fig1), there
    is always one more partition than there is boundary point. When you create a partition
    scheme, however, it is possible to specify an “extra” filegroup. This will define
    the next filegroup that should be used if an additional boundary point is added.
    It is also possible to specify the `ALL` keyword, as opposed to specifying individual
    filegroups. This will force all partitions to be stored on the same filegroup.


    #### Index Alignment


    An index is considered aligned with the table if it is built on the same partition
    function as the table. It is also considered aligned if it is built on a different
    partition function, but the two functions are identical, in that they share the
    same data type, the same number of partitions, and the same boundary point values.


    Because the leaf level of a clustered index consists of the actual data pages
    of the table, a clustered index is always aligned with the table. A nonclustered
    index, however, can be stored on a separate filegroup to the heap or clustered
    index. This extends to partitioning, where either the base table or nonclustered
    indexes can be independently partitioned. If nonclustered indexes are stored on
    the same partition scheme or an identical partition scheme, then they are aligned.
    If this is not the case, then they are nonaligned.


    Aligning indexes with the base table is good practice unless you have a specific
    reason not to. This is because aligning indexes can assist with partition elimination.
    Index alignment is also required for operations such as `SWITCH`, which will be
    discussed later in this chapter.


    #### Partitioning Hierarchy


    Objects involved in partitioning work in a one-to-many hierarchy, so multiple
    tables can share a partition scheme and multiple partition schemes can share a
    partition function, as illustrated in Figure [7-2](#333037_2_En_7_Chapter.xhtml#Fig2).


    ![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig2_HTML.jpg](images/333037_2_En_7_Chapter/333037_2_En_7_Fig2_HTML.jpg)


    Figure 7-2


    Partitioning hierarchy


    ### Tip


    While graph databases are beyond the scope of this book, it is worth mentioning
    that SQL Server 2019 introduces support for partitioning graph database tables
    and indexes, which divides the data into units, which can be spread across multiple
    filegroups.


    ### Implementing Partitioning


    Implementing partitioning involves creating the partition function and partition
    scheme and then creating the table on the partition scheme. If the table already
    exists, then you will need to drop and re-create the table’s clustered index.
    These tasks are discussed in the following sections.


    #### Creating the Partitioning Objects


    The first object that you will need to create is the partition function. This
    can be created using the `CREATE PARTITION FUNCTION` statement , as demonstrated
    in Listing [7-1](#333037_2_En_7_Chapter.xhtml#PC1). This script creates a database
    called `Chapter7` and then creates a partition function called `PartFunc`. The
    function specifies a data type for partitioning keys of `DATE` and sets boundary
    points for 1st Jan 2019 and 1st Jan 2017\. Table [7-1](#333037_2_En_7_Chapter.xhtml#Tab1)
    details how dates will be distributed between partitions.


    Table 7-1


    Distribution of Dates


    | Date | Partition | Notes |

    | --- | --- | --- |

    | 6th June 2015 | 1 |   |

    | 1st Jan 2016 | 1 | If we had used `RANGE RIGHT`, this value would be in Partition
    2. |

    | 11th October 2017 | 2 |   |

    | 1st Jan 2018 | 2 | If we had used `RANGE RIGHT`, this value would be in Partition
    3. |

    | 9th May 2019 | 3 |   |


    ```

    USE Master

    GO

    --Create Database Chapter7 using default settings from Model

    CREATE DATABASE Chapter7 ;

    GO

    USE Chapter7

    GO

    --Create Partition Function

    CREATE PARTITION FUNCTION PartFunc(Date)

    AS RANGE LEFT

    FOR VALUES(''2017-01-01'', ''2019-01-01'') ;

    Listing 7-1

    Creating the Partition Function

    ```


    The next object that we need to create is a partition scheme. This can be created
    using the `CREATE PARTITION SCHEME` statement, as demonstrated in Listing [7-2](#333037_2_En_7_Chapter.xhtml#PC2).
    This script creates a partition scheme called `PartScheme` against the `PartFunc`
    partition function and specifies that all partitions will be stored on the `PRIMARY`
    filegroup. Although storing all partitions on the same filegroup does not allow
    us to implement storage tiering, it does enable us to automate sliding windows.


    ```

    CREATE PARTITION SCHEME PartScheme

    AS PARTITION PartFunc

    ALL TO ([PRIMARY]) ;

    Listing 7-2

    Creating the Partition Scheme

    ```'
