- fmt: '# To Generate Activity to Be Traced


    Depending on your scenario, you may wish to capture real user activity; to do
    so, you need to use a tool, such as `SQLStress`, or script activity. In our case,
    we script activity to be traced (see Listing 21-9).


    ```sql

    USE Chapter21

    GO

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number  1000000

    GO 50

    SELECT TOP 10 PERCENT *

    FROM dbo.Customers

    GO 100

    ```

    Listing 21-9: Generating Activity


    We can now stop our trace by using the command in Listing 21-10.


    ```sql

    ALTER EVENT SESSION DReplay

    ON SERVER

    STATE = stop;

    GO

    ```

    Listing 21-10: Stopping the Trace


    ## Replaying the Trace


    Now that we have captured a trace, we convert it to a `.trc` file and then preprocess
    it before replaying it by using the Distributed Replay Administration Tool from
    the command line.


    ### Converting the Trace File


    In order to use our `.xel` file with Distributed Replay, we first need to convert
    it to a `.trc` file. We do this with the help of the `readtrace.exe` command-line
    tool, which uses RML (Replay Markup Language) to convert the data. `ReadTrace`
    ships as part of Microsoft’s RML Utilities for SQL Server toolset, which you can
    download from [`www.microsoft.com/en-gb/download/details.aspx?id=4511`](http://www.microsoft.com/en-gb/download/details.aspx%253Fid%253D4511).
    The following example assumes that you have installed this toolkit.


    > **Tip**

    > The preceding link contains all RML Utilities, and this chapter uses this version
    of the tools. A newer version of `ReadTrace` can be downloaded as part of DEA
    (Database Experimentation Assistant), however, which can be found at [`www.microsoft.com/en-us/download/details.aspx?id=54090`](http://www.microsoft.com/en-us/download/details.aspx%253Fid%253D54090).


    Here, we convert our trace file by navigating to the `C:\Program Files\Microsoft
    Corporation\RMLUtils` folder and running `ReadTrace.exe` with the arguments detailed
    in Table 21-5.


    Table 21-5: ReadTrace Arguments


    | Argument | Description |

    | --- | --- |

    | `-I` | The fully qualified file name of the `.xel` file to convert. |

    | `-O` | The folder to output the results to. This includes the log file as well
    as the `.trc` file. |

    | `-a` | Prevent analytical processing. |

    | `-MS` | Mirror to a single `.trc` file, as opposed to separate files for each
    SPID. |


    > **Tip**

    > You can find a full description of all `ReadTrace` arguments in the RML Utilities
    for SQL Server help file.


    We run `ReadTrace` by using the command in Listing 21-11.


    > **Tip**

    > Remember to change the filename and path of the input and output files before
    running this script. Even if you have used the same location, your `.xel` file
    name will include a different uniquifier.


    ```cmd

    readtrace.exe -I"C:\MSSQL\DReplay_0_130737313343740000.xel" -O"C:\MSSQL\DReplayTraceFile"
    -a -MS

    ```

    Listing 21-11: Converting to .trc Using ReadTrace


    ### Preprocessing the Trace Data


    The Administration Tool is a command-line utility, which can be run with the options
    detailed in Table 21-6.


    Table 21-6: Administration Tool Options


    | Option | Description |

    | --- | --- |

    | `Preprocess` | Prepares the trace data by creating the intermediate files |

    | `Replay` | Dispatches the trace to the clients and begins the replay |

    | `Status` | Displays the controller’s current status |

    | `Cancel` | Cancels the current operation |


    When run with the `preprocess` option, the Administration Tool accepts the arguments
    detailed in Table 21-7.


    Table 21-7: Preprocess Arguments


    | Argument | Full Name | Description |

    | --- | --- | --- |

    | `-m` | `Controller` | The name of the server hosting the Distributed Replay
    Controller. |

    | `-i` | `input_trace_file` | The fully qualified file name of the trace file.
    If there are rollover files, then specify a comma-separated list. |

    | `-d` | `controller_working_dir` | The folder where intermediate files are stored.
    |

    | `-c` | `config_file` | The fully qualified file name of the `DReplay.exe.preprocess.config`
    configuration file. |

    | `-f` | `status_interval` | The frequency with which status messages are displayed,
    specified in milliseconds. |


    To preprocess our trace file, we can use the command in Listing 21-12. This process
    creates an intermediate file, which can then be dispatched to the clients, ready
    for replay.


    > **Tip**

    > Change the file paths to match your configuration before you run this script.


    ```cmd

    dreplay preprocess -m controller  -i "C:\MSSQL\DReplayTraceFile\SPID00000.trc"
    -d "c:\Distributed Replay\WorkingDir" -c "C:\Program Files (x86)\Microsoft SQL
    Server\150\Tools\Binn\DReplay.exe.preprocess.config"

    ```

    Listing 21-12: Preprocessing the Trace


    ### Starting the Replay


    You can start the replay using the Distributed Replay Administration Tool. The
    arguments accepted when the tool is used with the `replay` option are detailed
    in Table 21-8.


    Table 21-8: Replay Arguments


    | Argument | Full Name | Description |

    | --- | --- | --- |

    | `-m` | `Controller` | The name of the server hosting the Distributed Replay
    Controller |

    | `-d` | `controller_working_dir` | The folder where intermediate files are stored
    |

    | `-o` | `output` | Specifies that client’s replay activity should be captured
    and saved to the Results directory |

    | `-s` | `target_server` | The server\instance name of the Target server |

    | `-w` | `clients` | A comma-separated list of clients |

    | `-c` | `config_file` | The fully qualified name of the `DReplay.exe.replay.config`
    configuration file |

    | `-f` | `status_interval` | The frequency at which to display the status, specified
    in seconds |


    Therefore, to replay the trace, using `Client1` and `Client2`, against our Target
    server, we use the command in Listing 21-13.


    ```cmd

    dreplay replay -m controller -d "c:\Distributed Replay\WorkingDir" -s Target -o
    -w Client1,Client2 -c "C:\Program Files (x86)\Microsoft SQL Server\150\Tools\Binn\DReplay.Exe.Replay.config"

    ```

    Listing 21-13: Replaying the Trace


    > **Tip**

    > The first line of the output may indicate that no events have been dispatched.
    This is not an issue—it just means that the event dispatch has not yet started.'
