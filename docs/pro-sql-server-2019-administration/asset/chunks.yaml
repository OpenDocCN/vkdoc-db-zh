    可恢复索引重建


    清单 8-17 中的命令将暂停清单 8-16 中启动的索引重建。'
- fmt: '### Tip


    The command in Listing [8-17](#333037_2_En_8_Chapter.xhtml#PC17) will only work
    if the execution of the command in Listing [8-16](#333037_2_En_8_Chapter.xhtml#PC16)
    has not yet completed.


    ```sql

    ALTER INDEX NCI_CustomerID ON dbo.OrdersDisk PAUSE

    Listing 8-17

    Pause an Index Rebuild

    ```


    After running this script, the index rebuild operation will pause, and the message
    shown in Figure [8-11](#333037_2_En_8_Chapter.xhtml#Fig11) will be displayed.


    ![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig11_HTML.jpg](images/333037_2_En_8_Chapter/333037_2_En_8_Fig11_HTML.jpg)

    *Figure 8-11: Message thrown, when index operation paused*


    The script in Listing [8-18](#333037_2_En_8_Chapter.xhtml#PC18) will either resume
    or abort the index rebuild, based on the value assigned to the `@Action` variable.


    ```sql

    DECLARE @Action NVARCHAR(6) = ''Resume''

    IF (@Action = ''Resume'')

    BEGIN

    ALTER INDEX NCI_CustomerID ON dbo.OrdersDisk RESUME

    END

    ELSE

    BEGIN

    ALTER INDEX NCI_CustomerID ON dbo.OrdersDisk ABORT

    END

    Listing 8-18

    Resume or Abort an Index Operation

    ```


    Instead of turning on `ONLINE` and `RESUMABLE` options for each, individual index
    operation, you can turn them on globally, at the database level, by using database
    scoped configurations. The `ELEVATE_ONLINE` configuration will change the default
    value of `ONLINE` to `ON`, for supported index operations, within the database.
    The configuration `ELEVATE_RESUMABLE` will default the value of `RESUMABLE` to
    `ON`.


    Both `ELEVATE_ONLINE` and `ELEVATE_RESUMABLE` can be configured as `OFF` (the
    default behavior), `WHEN_SUPPORTED`, or `FAIL_UNSUPPORTED`. When set to `WHEN_SUPPORTED`,
    noncompatible operations such as rebuilding XML indexes will be performed offline
    and unresumable. If set to `FAIL_UNSUPPORTED`, however, such operations will fail,
    throwing an error.


    The script in Listing [8-19](#333037_2_En_8_Chapter.xhtml#PC19) demonstrates how
    to set `ELEVATE_ONLINE` and `ELEVATE_RESUMABLE` to `WHEN_SUPPORTED`, for the `Chapter8`
    database.


    ```sql

    USE Chapter8

    GO

    ALTER DATABASE SCOPED CONFIGURATION SET ELEVATE_ONLINE = WHEN_SUPPORTED ;

    GO

    ALTER DATABASE SCOPED CONFIGURATION SET ELEVATE_RESUMABLE = WHEN_SUPPORTED ;

    GO

    Listing 8-19

    Default to ONLINE and RESUMABLE

    ```


    ### Partitioned Indexes


    As mentioned in Chapter [7](#333037_2_En_7_Chapter.xhtml), it is possible to partition
    indexes as well as tables. A clustered index always shares the same partition
    scheme as the underlying table, because the leaf level of the clustered index
    is made up of the actual data pages of the table. Nonclustered indexes, on the
    other hand, can either be aligned with the table or not. Indexes are aligned if
    they share the same partition scheme or if they are created on an identical partition
    scheme.


    In most cases, it is good practice to align nonclustered indexes with the base
    table, but on occasion, you may wish to deviate from this strategy. For example,
    if the base table is not partitioned, you can still partition an index for performance.
    Also, if your index key is unique and does not contain the partitioning key, then
    it needs to be unaligned. There is also an opportunity to gain a performance boost
    from unaligned nonclustered indexes if the table is involved in collated joins
    with other tables on different columns.


    You can create a partitioned index by using the `ON` clause to specify the partition
    scheme in the same way that you create a partitioned table. If the index already
    exists, you can rebuild it, specifying the partition scheme in the `ON` clause.
    The script in Listing [8-20](#333037_2_En_8_Chapter.xhtml#PC20) creates a partition
    function and a partition scheme. It then rebuilds the clustered index of the `OrdersDisk`
    table to move it to the new partition scheme. Finally, it creates a new nonclustered
    index, which is partition aligned with the table.


    **Tip:** Before running the script, change the name of the primary key to match
    your own.


    ```sql

    --Create partition function

    CREATE PARTITION FUNCTION OrdersPartFunc(int)

    AS RANGE LEFT

    FOR VALUES(250000,500000,750000) ;

    GO

    --Create partition scheme

    CREATE PARTITION SCHEME OrdersPartScheme

    AS PARTITION OrdersPartFunc

    ALL TO([PRIMARY]) ;

    GO

    --Partition OrdersDisk table

    ALTER TABLE dbo.OrdersDisk DROP CONSTRAINT PK__OrdersDi__CAC5E7420B016A9F ;

    GO

    ALTER TABLE dbo.OrdersDisk

    ADD PRIMARY KEY CLUSTERED(OrderNumber) ON OrdersPartScheme(OrderNumber) ;

    GO

    --Create partition aligned nonclustered index

    CREATE NONCLUSTERED INDEX NCI_Part_CustID ON dbo.OrdersDisk(CustomerID, OrderNumber)

    ON OrdersPartScheme(OrderNumber) ;

    Listing 8-20

    Rebuilding and Creating Partitioned Indexes

    ```


    When you rebuild an index, you can also specify that only a certain partition
    is rebuilt. The example in Listing [8-21](#333037_2_En_8_Chapter.xhtml#PC21) rebuilds
    only Partition 1 of the `NCI_Part_CustID` index.


    ```sql

    ALTER INDEX NCI_Part_CustID ON dbo.OrdersDisk REBUILD PARTITION = 1 ;

    Listing 8-21

    Rebuilding a Specific Partition

    ```


    ## Statistics


    SQL Server maintains statistics regarding the distribution of data within a column
    or set of columns. These columns can either be within a table or a nonclustered
    index. When the statistics are built on a set of columns, then they also include
    correlation statistics between the distributions of values in those columns. The
    Query Optimizer can then use these statistics to build efficient query plans based
    on the number of rows that it expects a query to return. A lack of statistics
    can lead to inefficient plans being generated. For example, the Query Optimizer
    may decide to perform an index scan when a seek operation would be more efficient.


    You can allow SQL Server to manage statistics automatically. A database-level
    option called `AUTO_CREATE_STATISTICS` automatically generates single column statistics,
    where SQL Server believes better cardinality estimates will help query performance.
    There are limitations to this however. For example, filtered statistics or multicolumn
    statistics cannot be created automatically.'
