- fmt: "### Note\n\nThis screen will only appear if your server is not already configured\
    \ to receive product updates for SQL Server.\n\nThe next screen of the wizard\
    \ will attempt to scan for SQL Server updates to ensure that you install the latest\
    \ `CUs` (cumulative updates) and `SPs` (service packs) with your installation.\
    \ It will check the Microsoft Update service on the local server for these updates\
    \ and list any that are available. This is an extension of slipstream installation\
    \ functionality, which allows you to install updates at the same time as the installation\
    \ of the base binaries by specifying their location for setup, but it has now\
    \ been deprecated. The Product Updates page can also be configured to look for\
    \ updates in local folders or network locations. This functionality will be discussed\
    \ in further detail in Chapter [3](#333037_2_En_3_Chapter.xhtml).\n\n### Note\n\
    \nThis screen will not appear if product updates are not found.\n\nAs setup moves\
    \ to the next page of the wizard, which is illustrated in Figure [2-12](#333037_2_En_2_Chapter.xhtml#Fig12),\
    \ the extraction and installation of the files required for SQL Server setup begins,\
    \ and the progress displays. This screen also displays the progress of the download\
    \ and extraction of any update packages that were found by Product Updates.\n\n\
    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig12_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig12_HTML.jpg)\n\
    \nFigure 2-12: Install Setup Files page\n\nAs illustrated in Figure [2-13](#333037_2_En_2_Chapter.xhtml#Fig13),\
    \ the next screen of the wizard runs an installation rule check and displays errors\
    \ or warnings that you may need to address before installation begins.\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig13_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig13_HTML.jpg)\n\
    \nFigure 2-13: Install Rules page\n\nIn Figure [2-13](#333037_2_En_2_Chapter.xhtml#Fig13),\
    \ notice the warning being displayed for Windows Firewall. This will not stop\
    \ the installation from proceeding, but it does warn you that the server has Windows\
    \ Firewall switched on. By default, Windows Firewall is not configured to allow\
    \ SQL Server traffic, so rules must be created in order for client applications\
    \ to be able to communicate with the instance that you are installing. We will\
    \ discuss SQL Server ports and Firewall configuration in detail in Chapter [5](#333037_2_En_5_Chapter.xhtml).\n\
    \nAssuming no errors are discovered that need to be addressed before you continue,\
    \ the next page of the wizard will allow you to choose the feature that should\
    \ be installed. This is discussed in detail in the next section.\n\n### The Feature\
    \ Selection Page\n\nThe Feature Selection page of the setup wizard allows you\
    \ to select the options that you wish to install. An overview of each of the available\
    \ options can be found in Chapter [1](#333037_2_En_1_Chapter.xhtml). The Feature\
    \ Selection page is illustrated in Figure [2-14](#333037_2_En_2_Chapter.xhtml#Fig14).\n\
    \n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig14_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig14_HTML.jpg)\n\
    \nFigure 2-14: Feature Selection page\n\nWe will select the following features,\
    \ since they will be used for demonstrations and discussions throughout this book.\n\
    \n*   Database Engine Services\n    *   SQL Server Replication\n*   Client Tools\
    \ Connectivity\n*   Distributed Replay Controller\n*   Distributed Replay Client\n\
    \nAdditionally, this page of the wizard requires you to specify folder locations\
    \ for the instance root directory and the shared features directory. You may want\
    \ to move these to a different drive in order to leave the `C:\\` drive for the\
    \ operating system. You may want to do this for space reasons or just to isolate\
    \ the SQL Server binaries from other applications. The instance root directory\
    \ will typically contain a folder for each instance that you create on the server,\
    \ and there will be separate folders for the Database Engine, `SSAS`, and `SSRS`\
    \ installations. A folder associated with the Database Engine will be called `MSSQL15.[InstanceName]`,\
    \ where instance name is either the name of your instance or `MSSQLSERVER` for\
    \ a default instance. The number `15` in this folder name relates to the version\
    \ of SQL Server, which is `15` for SQL Server 2019. This folder will contain a\
    \ subfolder called `MSSQL`, which in turn will contain folders that will be home\
    \ to the files associated with your instance, including a folder called `Binn`,\
    \ which will contain the application files, application extensions, and XML configurations\
    \ associated with your instance; a folder called `Backup`, which will be the default\
    \ location for backups of databases; and a folder called `Data`, which will be\
    \ the default location of the system databases. The default folders for `TempDB`,\
    \ user databases, and backups can be modified later in the installation process,\
    \ and splitting these databases into separate volumes is a good practice in many\
    \ environments, as discussed in Chapter [1](#333037_2_En_1_Chapter.xhtml). Other\
    \ folders will also be created here, including a folder called `LOGS`, which will\
    \ be the default location for the files for both the error logs and the default\
    \ Extended Event health trace.\n\nIf you are installing SQL Server in a 64-bit\
    \ environment, you will be asked to enter folders for both 32- and 64-bit versions\
    \ of the shared features directory. This is because some SQL Server components\
    \ are always installed as 32-bit processes. The 32- and 64-bit components cannot\
    \ share a directory, so for installation to continue, you must specify different\
    \ folders for each of these options. The shared features directory becomes a root\
    \ level directory for features that are shared by all instances of SQL Server,\
    \ such as `SDKs` and management tools.\n\nOn the next page of the wizard, illustrated\
    \ in Figure [2-15](#333037_2_En_2_Chapter.xhtml#Fig15), an additional rule check\
    \ will be carried out to ensure that the features that you have selected can be\
    \ installed.\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig15_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig15_HTML.jpg)\n\
    \nFigure 2-15: Feature Rules page\n\nThe rules that are checked will vary depending\
    \ on the features that you have selected."
