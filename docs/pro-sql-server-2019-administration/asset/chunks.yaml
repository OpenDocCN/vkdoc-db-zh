- fmt: '# Database Snapshots


    A `database snapshot` is a point-in-time view of a database that never changes
    after it is generated. It works using copy-on-write technology; this means that
    if a page is modified in the source database, the original version of the page
    is copied to an NTFS sparse file, which is used by the database snapshot. A `sparse
    file` is a file that starts off empty, with no disk space allocated. As pages
    are updated in the source database and these pages are copied to the sparse file,
    it grows to accommodate them. This process is illustrated in Figure [16-1](#333037_2_En_16_Chapter.xhtml#Fig1).


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig1_HTML.png](images/333037_2_En_16_Chapter/333037_2_En_16_Fig1_HTML.png)


    Figure 16-1 Database snapshots


    If a user runs a query against the database snapshot, SQL Server checks to see
    if the required pages exist in the database snapshot. Any pages that do exist
    are returned from the database snapshot, whereas any other pages are retrieved
    from the source database, as illustrated in Figure [16-2](#333037_2_En_16_Chapter.xhtml#Fig2).
    In this example, to satisfy the query, SQL Server needs to return `Page 1:100`
    and `Page 1:101`. `Page 1:100` has been modified in the source database since
    the snapshot was taken. Therefore, the original version of the page has been copied
    to the sparse file and SQL Server retrieves it from there. `Page 1:101`, on the
    other hand, has not been modified in the source database since the snapshot was
    created. Therefore, it does not exist in the sparse file, and SQL Server retrieves
    it from the source database.


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig2_HTML.png](images/333037_2_En_16_Chapter/333037_2_En_16_Fig2_HTML.png)


    Figure 16-2 Querying a database snapshot


    If your data-tier application is suffering from contention caused by locking,
    then you can scale out reporting to a database snapshot. It is important to note,
    however, that because a database snapshot must reside on the same instance as
    the source database, it does not help overcome resource utilization issues. In
    fact, the opposite is true. Because any modified pages must be copied to the sparse
    file, the `IO` overhead increases. The memory footprint also increases, since
    pages are duplicated in the buffer cache for each database.


    ### Tip


    It may not be appropriate to have a database snapshot present while `IO`-intensive
    tasks are carried out. I have seen a couple of scenarios—one involving index rebuilds
    on a `VLDB` and the other involving a snapshot on the Subscriber database in a
    Replication topology—where the copy-on-write thread and the ghost cleanup thread
    have blocked each other so badly that processes never complete. If you encounter
    this scenario and you must have a snapshot present during `IO`-intensive tasks,
    then the only workaround is to disable the ghost cleanup task using `Trace Flag
    661`. Be warned, however, that if you take this approach, deleted rows are never
    automatically removed, and you must clean them up in another way, such as by rebuilding
    all indexes.


    In addition to the resource overhead of database snapshots, another issue you
    encounter when you use them to reduce contention for reporting is that data becomes
    stale as pages in the source database are modified. To overcome this, you can
    create a metadata-driven script to periodically refresh the snapshot. This is
    demonstrated in Chapter [17](#333037_2_En_17_Chapter.xhtml).


    The issue of data becoming stale can also be an advantage however, because it
    gives you two benefits: first, it means that you can use snapshots for historic
    reporting purposes; and second, it means that you can use database snapshots to
    recover data after user error has occurred. Be warned, however, that these snapshots
    provide no resilience against `IO` errors or database failures, and you cannot
    use them to replace database backups.


    ## Implementing Database Snapshots


    Before demonstrating how to create a database snapshot, we first create the `Chapter16`
    database, which we use for demonstrations throughout this chapter. The script
    in Listing [16-1](#333037_2_En_16_Chapter.xhtml#PC1) creates this database and
    populates it with data.


    ```sql

    CREATE DATABASE Chapter16 ;

    GO

    USE Chapter16

    GO

    CREATE TABLE Customers

    (

    ID                  INT            PRIMARY KEY        IDENTITY,

    FirstName           NVARCHAR(30),

    LastName            NVARCHAR(30),

    CreditCardNumber    VARBINARY(8000)

    ) ;

    GO

    --Populate the table

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE ;

    DECLARE @Names TABLE

    (

    FirstName       VARCHAR(30),

    LastName        VARCHAR(30)

    ) ;

    INSERT INTO @Names

    VALUES(''Peter'', ''Carter''),

    (''Michael'', ''Smith''),

    (''Danielle'', ''Mead''),

    (''Reuben'', ''Roberts''),

    (''Iris'', ''Jones''),

    (''Sylvia'', ''Davies''),

    (''Finola'', ''Wright''),

    (''Edward'', ''James''),

    (''Marie'', ''Andrews''),

    (''Jennifer'', ''Abraham''),

    (''Margaret'', ''Jones'') ;

    INSERT INTO Customers(Firstname, LastName, CreditCardNumber)

    SELECT  FirstName, LastName, CreditCardNumber FROM

    (SELECT

    (SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName

    ,(SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName

    ,(SELECT CONVERT(VARBINARY(8000)

    ,(SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99

    ORDER BY NEWID()) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99

    ORDER BY NEWID()) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99

    ORDER BY NEWID()) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99

    ORDER BY NEWID()))) CreditCardNumber

    FROM @Numbers a

    CROSS JOIN @Numbers b

    ) d ;

    ```

    Listing 16-1 Creating the `Chapter16` Database


    To create a database snapshot on the `Chapter16` database, we use the `CREATE
    DATABASE` syntax, adding the `AS SNAPSHOT OF` clause, as demonstrated in Listing
    [16-2](#333037_2_En_16_Chapter.xhtml#PC2). The number of files must match the
    number of files of the source database, and the snapshot must be created with
    a unique name. The `.ss` file extension is standard, but not mandatory. I have
    known some `DBA`s to use an `.ndf` extension if they cannot gain an antivirus
    exception for an additional file extension. I recommend using the `.ss` extension
    if possible, however, because this clearly identifies the file as being associated
    with a snapshot.


    ```sql

    CREATE DATABASE Chapter16_ss_0630

    ON PRIMARY

    ( NAME = N''Chapter16'', FILENAME = N''F:\MSSQL\DATA\Chapter16_ss_0630.ss'' )

    AS SNAPSHOT OF Chapter16 ;

    ```

    Listing 16-2 Creating a Database Snapshot


    The fact that each database snapshot must have a unique name can cause an issue
    for connecting applications if you plan to use multiple snapshots; this is because
    the applications do not know the name of the database to which they should connect.
    You can resolve this issue by programmatically pointing applications to the latest
    database snapshot. You can find an example of how to do this in Listing [16-3](#333037_2_En_16_Chapter.xhtml#PC3).
    This script creates and runs a procedure that returns all data from the `Customers`
    table. It first dynamically checks the name of the most recent snapshot that is
    based on the `Chapter16` database, which means that the data will always be returned
    from the most recent snapshot.


    ```sql

    USE Chapter16

    GO

    CREATE PROCEDURE dbo.usp_Dynamic_Snapshot_Query

    AS

    BEGIN

    DECLARE @LatestSnashot NVARCHAR(128)

    DECLARE @SQL NVARCHAR(MAX)

    SET @LatestSnashot = (

    SELECT TOP 1 name from sys.databases

    WHERE source_database_id = DB_ID(''Chapter16'')

    ORDER BY create_date DESC ) ;

    SET @SQL = ''SELECT * FROM '' + @LatestSnashot + ''.dbo.Customers'' ;

    EXEC(@SQL) ;

    END

    EXEC dbo.usp_Dynamic_Snapshot_Query ;

    ```

    Listing 16-3 Directing Clients to Latest Snapshot'
  raw: '## Database Snapshots


    A *database snapshot* is a point-in-time view of a database that never changes
    after it is generated. It works using copy-on-write technology; this means that
    if a page is modified in the source database, the original version of the page
    is copied to an NTFS sparse file, which is used by the database snapshot. A *sparse
    file* is a file that starts off empty, with no disk space allocated. As pages
    are updated in the source database and these pages are copied to the sparse file,
    it grows to accommodate them. This process is illustrated in Figure [16-1](#333037_2_En_16_Chapter.xhtml#Fig1).


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig1_HTML.png](images/333037_2_En_16_Chapter/333037_2_En_16_Fig1_HTML.png)


    Figure 16-1


    Database snapshots


    If a user runs a query against the database snapshot, SQL Server checks to see
    if the required pages exist in the database snapshot. Any pages that do exist
    are returned from the database snapshot, whereas any other pages are retrieved
    from the source database, as illustrated in Figure [16-2](#333037_2_En_16_Chapter.xhtml#Fig2).
    In this example, to satisfy the query, SQL Server needs to return Page 1:100 and
    Page 1:101\. Page 1:100 has been modified in the source database since the snapshot
    was taken. Therefore, the original version of the page has been copied to the
    sparse file and SQL Server retrieves it from there. Page 1:101, on the other hand,
    has not been modified in the source database since the snapshot was created. Therefore,
    it does not exist in the sparse file, and SQL Server retrieves it from the source
    database.


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig2_HTML.png](images/333037_2_En_16_Chapter/333037_2_En_16_Fig2_HTML.png)


    Figure 16-2


    Querying a database snapshot


    If your data-tier application is suffering from contention caused by locking,
    then you can scale out reporting to a database snapshot. It is important to note,
    however, that because a database snapshot must reside on the same instance as
    the source database, it does not help overcome resource utilization issues. In
    fact, the opposite is true. Because any modified pages must be copied to the sparse
    file, the IO overhead increases. The memory footprint also increases, since pages
    are duplicated in the buffer cache for each database.


    ### Tip


    It may not be appropriate to have a database snapshot present while IO-intensive
    tasks are carried out. I have seen a couple of scenarios—one involving index rebuilds
    on a VLDB and the other involving a snapshot on the Subscriber database in a Replication
    topology—where the copy-on-write thread and the ghost cleanup thread have blocked
    each other so badly that processes never complete. If you encounter this scenario
    and you must have a snapshot present during IO-intensive tasks, then the only
    workaround is to disable the ghost cleanup task using Trace Flag 661\. Be warned,
    however, that if you take this approach, deleted rows are never automatically
    removed, and you must clean them up in another way, such as by rebuilding all
    indexes.


    In addition to the resource overhead of database snapshots, another issue you
    encounter when you use them to reduce contention for reporting is that data becomes
    stale as pages in the source database are modified. To overcome this, you can
    create a metadata-driven script to periodically refresh the snapshot. This is
    demonstrated in Chapter [17](#333037_2_En_17_Chapter.xhtml).


    The issue of data becoming stale can also be an advantage however, because it
    gives you two benefits: first, it means that you can use snapshots for historic
    reporting purposes; and second, it means that you can use database snapshots to
    recover data after user error has occurred. Be warned, however, that these snapshots
    provide no resilience against IO errors or database failures, and you cannot use
    them to replace database backups.


    ### Implementing Database Snapshots


    Before demonstrating how to create a database snapshot, we first create the `Chapter16`
    database, which we use for demonstrations throughout this chapter. The script
    in Listing [16-1](#333037_2_En_16_Chapter.xhtml#PC1) creates this database and
    populates it with data.


    ```

    CREATE DATABASE Chapter16 ;

    GO

    USE Chapter16

    GO

    CREATE TABLE Customers

    (

    ID                  INT            PRIMARY KEY        IDENTITY,

    FirstName           NVARCHAR(30),

    LastName            NVARCHAR(30),

    CreditCardNumber    VARBINARY(8000)

    ) ;

    GO

    --Populate the table

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE ;

    DECLARE @Names TABLE

    (

    FirstName       VARCHAR(30),

    LastName        VARCHAR(30)

    ) ;

    INSERT INTO @Names

    VALUES(''Peter'', ''Carter''),

    (''Michael'', ''Smith''),

    (''Danielle'', ''Mead''),

    (''Reuben'', ''Roberts''),

    (''Iris'', ''Jones''),

    (''Sylvia'', ''Davies''),

    (''Finola'', ''Wright''),

    (''Edward'', ''James''),

    (''Marie'', ''Andrews''),

    (''Jennifer'', ''Abraham''),

    (''Margaret'', ''Jones'') ;

    INSERT INTO Customers(Firstname, LastName, CreditCardNumber)

    SELECT  FirstName, LastName, CreditCardNumber FROM

    (SELECT

    (SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName

    ,(SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName

    ,(SELECT CONVERT(VARBINARY(8000)

    ,(SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99

    ORDER BY NEWID()) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99

    ORDER BY NEWID()) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99

    ORDER BY NEWID()) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99

    ORDER BY NEWID()))) CreditCardNumber

    FROM @Numbers a

    CROSS JOIN @Numbers b

    ) d ;

    Listing 16-1

    Creating the Chapter16 Database

    ```


    To create a database snapshot on the `Chapter16` database, we use the `CREATE
    DATABASE` syntax, adding the `AS SNAPSHOT OF` clause, as demonstrated in Listing
    [16-2](#333037_2_En_16_Chapter.xhtml#PC2). The number of files must match the
    number of files of the source database, and the snapshot must be created with
    a unique name. The `.ss` file extension is standard, but not mandatory. I have
    known some DBAs to use an `.ndf` extension if they cannot gain an antivirus exception
    for an additional file extension. I recommend using the `.ss` extension if possible,
    however, because this clearly identifies the file as being associated with a snapshot.


    ```

    CREATE DATABASE Chapter16_ss_0630

    ON PRIMARY

    ( NAME = N''Chapter16'', FILENAME = N''F:\MSSQL\DATA\Chapter16_ss_0630.ss'' )

    AS SNAPSHOT OF Chapter16 ;

    Listing 16-2

    Creating a Database Snapshot

    ```


    The fact that each database snapshot must have a unique name can cause an issue
    for connecting applications if you plan to use multiple snapshots; this is because
    the applications do not know the name of the database to which they should connect.
    You can resolve this issue by programmatically pointing applications to the latest
    database snapshot. You can find an example of how to do this in Listing [16-3](#333037_2_En_16_Chapter.xhtml#PC3).
    This script creates and runs a procedure that returns all data from the `Contacts`
    table. It first dynamically checks the name of the most recent snapshot that is
    based on the `Chapter16` database, which means that the data will always be returned
    from the most recent snapshot.


    ```

    USE Chapter16

    GO

    CREATE PROCEDURE dbo.usp_Dynamic_Snapshot_Query

    AS

    BEGIN

    DECLARE @LatestSnashot NVARCHAR(128)

    DECLARE @SQL NVARCHAR(MAX)

    SET @LatestSnashot = (

    SELECT TOP 1 name from sys.databases

    WHERE source_database_id = DB_ID(''Chapter16'')

    ORDER BY create_date DESC ) ;

    SET @SQL = ''SELECT * FROM '' + @LatestSnashot + ''.dbo.Customers'' ;

    EXEC(@SQL) ;

    END

    EXEC dbo.usp_Dynamic_Snapshot_Query ;

    Listing 16-3

    Directing Clients to Latest Snapshot

