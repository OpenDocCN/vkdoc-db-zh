- fmt: '# SQL Server 安装配置


    ## FILESTREAM 配置


    数据库引擎配置的 **FILESTREAM** 选项卡允许您启用和配置 SQL Server **FILESTREAM** 功能的访问级别，如图 2-28
    所示。如果您希望使用 SQL Server 的 **FileTable** 功能，则也必须启用 **FILESTREAM**。**FILESTREAM**
    和 **FileTable** 提供了在 Windows 文件夹结构中以非结构化方式存储数据的能力，同时保留了从 SQL Server 管理和查询这些数据的能力。


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig28_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig28_HTML.jpg)


    图 2-28 FILESTREAM 选项卡


    选择“为 Transact-SQL 访问启用 FILESTREAM”将启用 **FILESTREAM**，但数据只能从 SQL Server 内部访问。此外，选择“为文件
    I/O 访问启用 FILESTREAM”使应用程序能够直接从操作系统访问数据，绕过 SQL Server。如果选择此选项，则还需要提供一个预先存在的文件共享的名称，该共享将用于直接应用程序访问。“允许远程客户端访问
    FILESTREAM 数据”选项使数据可供远程应用程序使用。这三个选项是逐层构建的，例如，如果不先选择“为 Transact-SQL 访问启用 FILESTREAM”，就不可能选择“为文件
    I/O 访问启用 FILESTREAM”。**FILESTREAM** 和 **FileTable** 将在第 6 章进一步讨论。


    ## 配置分布式重放


    如图 2-29 所示，向导的下一页将提示您指定将被授予访问 **Distributed Replay Controller** 服务的用户。与授予实例管理权限的方式相同，您可以使用“添加当前用户”按钮添加您当前的安全上下文，也可以使用“添加”按钮浏览
    Windows 用户和组。


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig29_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig29_HTML.jpg)


    图 2-29 Distributed Replay Controller 页面


    在向导的下一页，您可以配置 **Distributed Replay** 客户端，如图 2-30 所示。“工作目录”是客户端上保存调度文件的文件夹。“结果目录”是客户端上保存跟踪文件的文件夹。每次运行跟踪时，这两个位置中的文件都将被覆盖。如果您有已配置的现有
    **Distributed Replay Controller**，则应在“控制器名称”字段中输入其名称。但是，如果您正在配置一个新的控制器，则该字段应留空，稍后在
    `DReplayClient.config` 配置文件中进行修改。**Distributed Replay** 的配置和使用将在第 21 章讨论。


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig30_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig30_HTML.jpg)


    图 2-30 Distributed Replay Client 页面


    ## 完成安装


    向导的“准备安装”页面是安装开始前的最后一页，如图 2-31 所示。此屏幕提供了将要安装的功能摘要，但此页面最有趣的部分可能是“配置文件路径”部分。它提供了一个配置文件的路径，您可以重用该文件来安装具有相同配置的更多实例。配置文件将在第
    3 章进一步讨论。


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig31_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig31_HTML.jpg)


    图 2-31 准备安装页面


    安装向导将在安装过程中显示进度条。安装完成后，将显示一个摘要屏幕，如图 2-32 所示。您应检查以确保每个正在安装的组件状态均为“成功”。至此，SQL Server
    安装完成。


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig32_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig32_HTML.jpg)


    图 2-32 完成页面


    ## 总结


    SQL Server 的安装中心提供了许多有用的工具和链接，用于指导和协助您的安装过程。您可以使用安装中心安装故障转移群集实例以及独立的 SQL Server
    实例。还有一些工具可帮助满足高级安装要求，例如 SQL Server 的准备映像以及基于配置文件的安装。


    除了使用 SQL Server 2019 安装向导安装数据库引擎实例外，您还可以使用同一工具安装 BI 和 ETL 套件中的工具，例如 **Analysis
    Services**、**Integration Services**、**Data Quality Services** 和 **Master Data
    Services**。如果您使用向导安装 **Analysis Services**，则可以使用多维模型或表模型配置该工具。


    虽然您可以使用默认值成功安装 SQL Server，但为了您的实例乃至您整个环境的长期可维护性，请务必考虑安装的诸多方面。这尤其适用于排序规则、服务帐户和其他安全注意事项，例如添加最合适的管理员组以及实施身份验证模型。


    # 3. Server Core 安装


    由于 SQL Server 不支持远程安装，并且 Windows Server Core 仅提供命令行界面（CLI）而没有图形用户界面（GUI），因此您必须在
    Windows Server Core 上将 SQL Server 安装作为命令行操作执行。您还可以使用配置文件来生成一致、可重复的安装。


    在本章中，我们将回顾在 Windows Server Core 上安装 SQL Server 的注意事项，然后演示如何在此平台上执行安装。我们还将讨论使用配置文件以及如何利用它们来简化未来的安装并确保一致性。


    在第 1 章中，您可能记得我们讨论了 SQL Server 在 Windows Server Core 上的限制，以及某些功能（如 **Reporting
    Services**、**Master Data Services** 和 **Data Quality Services**）不受支持，而其他功能（如 **Management
    Tools** 和 **Distributed Replay Client**）仅受远程支持。您还应确保在组织内的各种能力范围内具有操作可维护性，包括 **PowerShell**
    的熟练程度以及操作工具的兼容性。


    ## 安装实例


    在 Windows Server Core 中安装 SQL Server 需要从 **PowerShell** 终端运行 `setup.exe`。`setup.exe`
    可在 SQL Server 安装介质的根目录中找到。从 **PowerShell** 终端运行 `setup.exe` 时，可以使用开关和参数传入值，这些值将用于配置实例。


    > 注意：如果需要，您可以遵循相同的过程在基于 GUI 的 Windows 版本上安装 SQL Server。'
  raw: 'The FILESTREAM tab of the Database Engine Configuration page allows you to
    enable and configure the level of access for SQL Server FILESTREAM functionality,
    as illustrated in Figure [2-28](#333037_2_En_2_Chapter.xhtml#Fig28). FILESTREAM
    must also be enabled if you wish to use the FileTable feature of SQL Server. FILESTREAM
    and FileTable provide the ability to store data in an unstructured manner within
    the Windows folder structure while retaining the ability to manage and interrogate
    this data from SQL Server.


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig28_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig28_HTML.jpg)


    Figure 2-28


    The FILESTREAM tab


    Selecting Enable FILESTREAM For Transact-SQL Access will enable FILESTREAM, but
    the data can only be accessed from inside SQL Server. Additionally, selecting
    Enable FILESTREAM For File I/O Access enables applications to access the data
    directly from the operating system, bypassing SQL Server. If this option is selected,
    then you will also need to provide the name of a preexisting file share, which
    will be used for direct application access. The Allow Remote Clients Access To
    FILESTREAM Data option makes the data available to remote applications. The three
    options build on top of each other, so it is not possible to select Enable FILESTREAM
    For File I/O Access without first selecting Enable FILESTREAM For Transact-SQL
    Access, for example. FILESTREAM and FileTable will be discussed further in Chapter
    [6](#333037_2_En_6_Chapter.xhtml).


    ### Configuring Distributed Replay


    As illustrated in Figure [2-29](#333037_2_En_2_Chapter.xhtml#Fig29), the next
    page of the wizard will prompt you to specify the users who will be given access
    to the Distributed Replay Controller service. In the same fashion that you grant
    administrative permissions to the instance, you can use the Add Current User button
    to add your current security context or you can use the Add button to browse for
    Windows users and groups.


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig29_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig29_HTML.jpg)


    Figure 2-29


    The Distributed Replay Controller page


    On the next page of the wizard, you can configure the Distributed Replay client,
    as illustrated in Figure [2-30](#333037_2_En_2_Chapter.xhtml#Fig30). The Working
    Directory is the folder on the client where the dispatch files are saved. The
    Results Directory is the folder on the client where the trace file will be saved.
    The files in both of these locations will be overwritten each time a trace is
    run. If you have an existing Distributed Replay Controller configured, then you
    should enter its name in the Controller Name field. However, if you are configuring
    a new controller, then this field should be left blank and then amended later
    in the DReplayClient.config configuration file. The configuration and use of Distributed
    Replay will be discussed in Chapter [21](#333037_2_En_21_Chapter.xhtml).


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig30_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig30_HTML.jpg)


    Figure 2-30


    The Distributed Replay Client page


    ### Completing the Installation


    The Ready to Install page of the wizard is the final page before installation
    commences, and it is illustrated in Figure [2-31](#333037_2_En_2_Chapter.xhtml#Fig31).
    This screen gives you a summary of the features that will be installed, but possibly
    the most interesting component of this page is the Configuration File Path section.
    This gives you the path to a configuration file that you can reuse to install
    further instances with an identical configuration. Configuration files will be
    discussed further in Chapter [3](#333037_2_En_3_Chapter.xhtml).


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig31_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig31_HTML.jpg)


    Figure 2-31


    The Ready to Install page


    The setup wizard will display a progress bar during the installation. When installation
    is complete, a summary screen will be displayed, as shown in Figure [2-32](#333037_2_En_2_Chapter.xhtml#Fig32).
    You should check to ensure that each of the components being installed has a status
    of Succeeded. The SQL Server installation is then complete.


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig32_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig32_HTML.jpg)


    Figure 2-32


    Completion page


    ## Summary


    SQL Server’s Installation Center provides many useful tools and links for guiding
    and assisting you in the installation process. You can use the Installation Center
    to install failover clustered instances as well as stand-alone instances of SQL
    Server. There are also tools to assist in advanced installation requirements,
    such as prepared images of SQL Server and installations based on configuration
    files.


    In addition to using the SQL Server 2019 Setup wizard to install an instance of
    the Database Engine, you can also use the same tool to install the tools within
    the BI and ETL suite, such as Analysis Services, Integration Services, Data Quality
    Services, and Master Data Services. If you use the wizard to install Analysis
    Services, then the tool can be configured with the multidimensional model or tabular
    model.


    Although you can install SQL Server successfully using default values, for the
    ongoing supportability of your instance, and indeed your estate, make sure you
    consider many aspects of the installation. This applies especially to collations,
    service accounts, and other security considerations, such as the most appropriate
    administrators group to add and the authentication model to implement.


    # 3. Server Core Installation


    Because SQL Server does not support remote installations and because Windows Server
    Core provides only a command-line interface (CLI) and no graphical user interface
    (GUI), you must perform installation of SQL Server on Windows Server Core as a
    command-line operation. You can also use a configuration file to produce consistent,
    repeatable installations.


    In this chapter, we will review the considerations for installing SQL Server on
    Windows Server Core before demonstrating how to perform an installation on this
    platform. We will also discuss using configuration files and how you can use them
    to simplify future installations and enforce consistency.


    In Chapter [1](#333037_2_En_1_Chapter.xhtml), you may remember that we discussed
    the limitations of SQL Server on Windows Server Core and how some features, such
    as Reporting Services, Master Data Services, and Data Quality Services, are not
    supported, whereas other features, such as Management Tools and Distributed Replay
    Client, are only supported remotely. You should also ensure that you have operational
    supportability across various competencies within your organization, including
    proficiency in PowerShell and the compatibility of operational tooling.


    ## Installing an Instance


    Installing SQL Server in Windows Server Core involves running setup.exe from the
    PowerShell terminal. Setup.exe can be found in the root directory of the SQL Server
    installation media. When running setup.exe from the PowerShell terminal, you can
    use switches and parameters to pass in values, which will be used to configure
    the instance.


    ### Note


    You can follow the same process to install SQL Server on a GUI-based version of
    Windows, if required.'
