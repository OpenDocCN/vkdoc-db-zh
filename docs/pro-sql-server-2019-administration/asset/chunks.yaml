  trans: '

    #### 备份设备


    一个`备份设备`是磁盘上的物理文件、磁带或一个 Windows Azure Blob。当设备是磁盘时，该磁盘可以位于服务器本地，也可以位于通过 URL 指定的备份共享上。一个媒体集最多可以包含
    64 个备份设备，数据可以**条带化**分布 across 这些备份设备，也可以被**镜像**。在图 12-2 中，有六个备份设备，被分成三个镜像对。这意味着备份集被条带化分布在其中三个设备上，然后镜像到另外三个设备上。


    对大型数据库进行条带化备份可能很有用，因为这样可以将每个设备放置在不同的驱动器阵列上以提高吞吐量。然而，这也可能带来管理上的挑战；如果条带中某个设备里的一个磁盘变得不可用，您将无法还原备份。您可以通过使用**镜像**来缓解这个问题。当您使用镜像时，每个设备的内容会被复制到一个额外的设备以实现冗余。如果一个媒体集中的一个备份设备被镜像，那么该媒体集中的所有设备都必须被镜像。每个备份设备或镜像的备份设备集被称为一个`介质族`。每个设备最多可以有四个镜像。


    一个媒体集中的所有备份设备必须都是磁盘或都是磁带。如果它们被镜像，那么镜像设备必须具有相似的属性；否则会引发错误。因此，Microsoft 建议为镜像使用相同品牌和型号的设备。


    也可以创建逻辑备份设备，它对物理备份设备进行了抽象。使用逻辑设备可以简化管理，特别是当您计划在同一物理位置使用许多备份设备时。一个`逻辑备份设备`是实例级别的对象，可以通过在
    SSMS 中，右键单击**服务器对象** ➤ **备份设备**，然后从上下文菜单中选择**新建备份设备**来创建；这会显示**备份设备**对话框，您可以在其中指定逻辑设备名称和物理路径。


    或者，您也可以通过 T-SQL 使用 `sp_addumpdevice` 系统存储过程来创建相同的逻辑备份设备。清单 12-3 中的命令使用 `sp_addumpdevice`
    过程创建了 `Chapter12Backup` 逻辑备份设备。在此示例中，我们使用 `@devtype` 参数传入设备的类型，在我们的例子中是 `disk`。然后，我们将设备的抽象名称传入
    `@logicalname` 参数，将物理文件传入 `@physicalname` 参数。


    ```

    EXEC sp_addumpdevice  @devtype = ''disk'',

    @logicalname = ''Chapter12Backup'',

    @physicalname = ''C:\MSSQL\Backup\Chapter12Backup.bak'' ;

    GO

    清单 12-3

    创建逻辑备份设备

    ```


    #### 媒体集


    一个媒体集包含备份所写入的备份设备。媒体集内的每个介质族根据其在媒体集中的位置被分配一个序列号。这被称为`族序列号`。此外，每个物理设备被分配一个`物理序列号`，以标识其在媒体集内的物理位置。


    创建媒体集时，备份设备（文件或磁带）会被格式化，并且一个媒体标头会被写入每个设备。该媒体标头会一直保留到设备被再次格式化，其中包含详细信息，例如媒体集的名称、媒体集的
    GUID、介质族的 GUID 和序列号、集中的镜像数量以及标头写入的日期/时间。


    #### 备份集


    每次进行备份到媒体集时，都被称为一个`备份集`。新的备份集可以追加到媒体上，或者您可以覆盖现有的备份集。如果媒体集只包含一个介质族，那么该介质族包含整个备份集。否则，备份集会分布
    across 各个介质族。媒体集内的每个备份集都会被赋予一个序列号；这允许您选择要还原哪个备份集。


    #### 备份策略


    DBA 可以为数据库实施多种备份策略，但您的策略应始终基于数据层应用程序的 RTO（恢复时间目标）和 RPO（恢复点目标）要求。例如，如果一个应用程序的 RPO
    为 60 分钟，而您每 24 小时才备份一次数据库，那么您将无法实现此目标。


    ##### 仅完整备份


    仅进行完整备份的策略是最不灵活的。如果数据库更新不频繁，并且有足够长的定期备份窗口来进行完整备份，那么这可能是一种合适的策略。此外，仅完整备份策略通常用于
    `Master` 和 `MSDB` 系统数据库。


    对于仅用于报告且不被用户更新的用户数据库，这也可能适用。在这种情况下，数据库的唯一更新可能是通过 ETL 加载进行的。如果是这样，那么您的备份只需要与此加载一样频繁即可。但是，您应该考虑在
    ETL 加载和完整备份之间添加依赖关系，例如将它们放在同一个 SQL Server Agent 作业中。这是因为如果您的备份在 ETL 加载过程中进行，那么在您需要还原时，可能会导致备份无法使用——至少，在最终重新运行
    ETL 加载之前，您需要先撤销包含在备份中的、由 ETL 加载执行的事务，否则备份是无用的。


    使用仅完整备份策略也限制了您还原的灵活性。如果您只进行完整备份，那么您唯一的还原选项是从最后一次完整备份的时间点还原数据库。这可能带来两个问题。第一个是，如果您在每晚午夜进行夜间备份，而您的数据库在晚上
    23:00 损坏，那么您将丢失 23 小时的数据修改。


    第二个问题发生在用户在晚上 23:00 误删了一个表时。数据库最早的还原点是前一天的午夜。在此场景下，再次说明，您此次事件的 RPO 是 23 小时，意味着
    23 小时的数据修改丢失了。


    ##### 完整备份和事务日志备份


    如果您的数据库处于 `FULL`（完整）恢复模式，那么您除了完整备份外，还可以进行事务日志备份。这意味着您可以进行更频繁的备份，因为事务日志备份比完整备份更快且使用更少的资源。这对于全天都在更新的数据库是合适的，并且它也提供了更灵活的还原选项，因为您可以还原到灾难发生前的某个时间点。


    如果您正在执行事务日志备份，那么您应按照您的 RPO 来安排日志备份。例如，如果您的 RPO 是 1 小时，那么您可以安排每 60 分钟进行一次日志备份，因为这意味着您最多只会丢失一小时的数据。（只要您拥有完整的日志链，所有备份都未损坏，并且备份存储的共享或文件夹在您需要时是可访问的，这就是成立的。）


    当您使用此策略时，您还应该考虑您的 RTO。想象一下，您的 RPO 是 30 分钟，因此您每半小时进行一次事务日志备份，但您每周只进行一次完整备份，时间是周六凌晨
    01:00。如果您的数据库在周五晚上 23:00 损坏，您需要还原 330 个备份。从技术角度来看，这完全可行，但如果您有一个 1 小时的 RTO，那么您可能无法在规定时间内完成数据库的还原。

    '
- fmt: '# Backing Up a Database


    ### Full, Differential, and Transaction Log Backups


    To overcome the issue just described, you may choose to add differential backups
    to your strategy. Because a differential backup is cumulative, as opposed to incremental
    in the way that log backups are, if you took a differential backup on a nightly
    basis at 01:00, then you only need to restore 43 backups to recover your database
    to the point just before the failure. This restore sequence consists of the full
    backup, the differential backup taken on the Friday morning at 01:00, and then
    the transaction logs, in sequence, between 01:30 and 23:00.


    ### Filegroup Backups


    For very large databases, it may not be possible to find a maintenance window
    that is large enough to take a full backup of the entire database. In this scenario,
    you may be able to split your data across filegroups and back up half of the filegroups
    on alternate nights. When you come to a restore scenario, you are able to restore
    only the filegroup that contains the corrupt data, providing that you have a complete
    log chain from the time the filegroup was backed up to the end of the log.


    ### Tip


    Although it is possible to back up individual files as well as a whole filegroup,
    I find this less helpful, because tables are spread across all files within a
    filegroup. Therefore, if a table is corrupted, you need to restore all files within
    the filegroup, or if you only have a handful of corrupt pages, then you can restore
    just these pages.


    ### Partial Backup


    A partial backup involves backing up all read/write filegroups, but not backing
    up any read-only filegroups. This can be very helpful if you have a large amount
    of archive data in the database. The `BACKUP DATABASE` command in T-SQL also supports
    the `READ_WRITE_FILEGROUP` option. This means that you can easily perform a partial
    backup of a database without having to list out the read/write filegroups, which
    of course can leave you prone to human error if you have many filegroups.


    A database can be backed up through `SSMS` or via T-SQL. We examine these techniques
    in the following sections. Usually, regular backups are scheduled to run with
    `SQL Server Agent` or are incorporated into a maintenance plan. These topics are
    discussed in Chapter [22](#333037_2_En_22_Chapter.xhtml).


    ### Backing Up in SQL Server Management Studio


    You can back up a database through `SSMS` by selecting `Tasks ➤ Backup` from the
    context menu of the database; this causes the `General` page of the `Back Up Database`
    dialog box to display, as shown in Figure [12-3](#333037_2_En_12_Chapter.xhtml#Fig3).


    ![../images/333037_2_En_12_Chapter/333037_2_En_12_Fig3_HTML.jpg](images/333037_2_En_12_Chapter/333037_2_En_12_Fig3_HTML.jpg)


    Figure 12-3: The `General` page


    In the `Database` drop-down list, select the database that you wish to back up,
    and in the `Backup Type` drop-down, choose to perform either a Full, a Differential,
    or a Transaction Log backup. The `Copy-Only Backup` check box allows you to perform
    a backup that does not affect the restore sequence. Therefore, if you take a copy-only
    full backup, it does not affect the differential base. Under the covers, this
    means that the `DIFF` pages are not reset. Taking a copy-only log backup does
    not affect the log archive point, and therefore the log is not truncated. Taking
    a copy-only log backup can be helpful in some online restore scenarios. It is
    not possible to take a copy-only differential backup.


    If you have selected a full or differential backup in the `Backup Component` section,
    choose if you want to back up the entire database or specific files and filegroups.
    Selecting the `Files and Filegroups` radio button causes the `Select Files and
    Filegroups` dialog box to display, as illustrated in Figure [12-4](#333037_2_En_12_Chapter.xhtml#Fig4).
    Here, you can select individual files or entire filegroups to back up.


    ![../images/333037_2_En_12_Chapter/333037_2_En_12_Fig4_HTML.jpg](images/333037_2_En_12_Chapter/333037_2_En_12_Fig4_HTML.jpg)


    Figure 12-4: The `Select Files and Filegroups` dialog box


    In the `Back Up To` section of the screen, you can select either `Disk`, `Tape`,
    or `URL` from the drop-down list before you use the `Add` and `Remove` buttons
    to specify the backup devices that form the definition of the media set. You can
    specify a maximum of 64 backup devices. The backup device may contain multiple
    backups (backup sets), and when you click the `Contents` button, the details of
    each backup set contained within the backup device will be displayed.


    On the `Media Option` page, you can specify if you want to use an existing media
    set or create a new one. If you choose to use an existing media set, then specify
    if you want to overwrite the content of the media set or append a new backup set
    to the media set. If you choose to create a new media set, then you can specify
    the name and, optionally, a description for the media set. If you use an existing
    media set, you can verify the date and time that the media set and backup set
    expire. These checks may cause the backup set to be appended to the existing backup
    device, instead of overwriting the backup sets.


    Under the `Reliability` section, specify if the backup should be verified after
    completion. This is usually a good idea, especially if you are backing up to a
    `URL`, since backups across the network are prone to corruption. Choosing the
    `Perform Checksum Before Writing To Media` option causes the page checksum of
    each page of the database to be verified before it is written to the backup device.
    This causes the backup operation to use additional resources, but if you are not
    running `DBCC CHECKDB` as frequently as you take backups, then this option may
    give you an early warning of any database corruption. (Please see Chapter [9](#333037_2_En_9_Chapter.xhtml)
    for more details.) The `Continue On Error` option causes the backup to continue,
    even if a bad checksum is discovered during verification of the pages.


    On the `Backup Options` page, you are able to set the expiration date of the backup
    set as well as select if you want the backup set to be compressed or encrypted.
    For compression, you can choose to use the instance default setting, or you can
    override this setting by specifically choosing to compress, or not compress, the
    backup.


    If you choose to encrypt the backup, then you need to select a preexisting certificate.
    (You can find details of how to create a certificate in Chapter [11](#333037_2_En_11_Chapter.xhtml).)
    You then need to select the algorithm that you wish to use to encrypt the backup.
    Available algorithms in `SQL Server 2019` are `AES 128`, `AES 192`, `AES 256`,
    or `3DES (Triple_DES_3Key)`. You should usually select an `AES` algorithm, because
    support for `3DES` will be removed in a future version of `SQL Server`.'
