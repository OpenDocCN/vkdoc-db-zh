    ## Working with Distributed Replay


    Now that the Distributed Replay utility is configured, we create a trace using
    Extended Events before we synchronize the target. We then use Distributed Replay
    to replay the trace in order to test performance tweaks, simulating concurrent
    activity on the two clients. Before we do this, however, we create the `Chapter21`
    database on the controller using the script in Listing [21-5](#333037_2_En_21_Chapter.xhtml#PC5).


    ```

