    ### Caution


    In SQL Server 2016 and above, management tools are not included with the SQL Server
    Installation media. Instead, to install them, you can use the Install SQL Server
    Management Tools link, on the Installation page of the SQL Server Installation
    Center. Reporting Services (SSRS) is also not included with the installation media,
    in SQL Server 2019\. This can be installed using the Install SQL Server Reporting
    Services link, in the Installation page of the SQL Server Installation Center.


    ## Summary


    Planning a deployment can be a complicated task that involves discussions with
    business and technical stakeholders to ensure that your platform will meet the
    application requirements and ultimately the business needs. There are many factors
    that you should take into account.


    Make sure you consider which is the appropriate version of SQL Server to install
    and the associated licensing considerations for that version. You should consider
    the holistic supportability of the estate when making this decision and not just
    the needs of the specific application. You should also consider if an Azure hosting
    option may be right for your application, or potentially even a hybrid approach,
    involving both on-premise and cloud hosting.


    When planning a deployment, make sure to carry out thorough capacity planning.
    Also think about the hardware requirements of the application. How much RAM and
    how many processor cores you will need are important considerations, but perhaps
    the main consideration is storage. SQL Server is usually an IO-bound application,
    so storage can often prove to be the bottleneck.


    You should also consider requirements for the operating system. This should not
    be limited to the most appropriate version of Windows, but also to the configuration
    of the operating system. Just because there is a Windows gold build available,
    does this mean that it is configured optimally for your SQL Server installation?


    Finally, consider which features you should select to install. Most applications
    require only a small subset of features, and by carefully selecting which features
    you require, you can reduce the security footprint of the installation and also
    reduce management overheads.


    # 2. GUI Installation


    You can invoke SQL Server’s Installation Center by running SQL Server’s `setup.exe`
    application. The Installation Center provides many utilities that will help you
    install an instance; these include links and tools to assist you with planning
    your deployment, stand-alone and clustered installation capability, and advanced
    tools, which will allow you to build instances using configuration files or based
    upon prepared images.


    This chapter will provide an overview of the options available to you in the Installation
    Center before guiding you through the process of installing SQL Server using the
    graphical user interface (GUI ). It will also offer real-world advice on decisions
    that are critical to the ongoing supportability of your instance.


    ## Installation Center


    The SQL Server Installation Center is a one-stop shop for all activity that relates
    to planning, installing, and upgrading a SQL Server instance. It is the application
    that you are greeted with when you run the SQL Server installation media. Installation
    Center consists of seven tabs, and the following sections will describe the content
    of those tabs.'
  trans: '

    ### 集成服务


    集成服务是 SQL Server 随附的一个功能强大、基于图形界面的 ETL（提取、转换和加载）工具。从 SQL Server 2012 开始，集成服务被纳入数据库引擎。尽管如此，仍需安装集成服务选项才能使该功能正常工作，因为它包含了该功能所依赖的二进制文件。


    集成服务包由一个*控制流*组成，负责管理和流程操作，包括批量插入、循环和事务。控制流还包含零个或多个数据流。*数据流*是一组数据源、转换和目标，它为合并、分散和转换数据提供了一个强大的框架。


    集成服务可以在多台服务器上进行横向扩展，包含一个主服务器和 `n` 个工作服务器。因此，在 SQL Server 的较新版本中，您可以选择安装经典的、独立的集成服务，或者在服务器上安装横向扩展主服务器，或横向扩展工作服务器。


    ### 客户端工具向后兼容性


    客户端工具向后兼容性为 SQL Server 已停止支持的功能提供支持。安装此功能将安装 SQL 分布式管理对象和决策支持对象。


    ### 客户端工具 SDK


    安装客户端工具 SDK 将提供 `SMO（服务器管理对象）` 程序集。这允许您从 `.NET` 应用程序中以编程方式控制 SQL Server 和集成服务。


    ### 分布式重放控制器


    分布式重放是一项功能，允许您捕获跟踪信息，然后在另一台服务器上重放。这使您可以测试性能调优或软件升级的影响。如果您觉得这听起来像是您可能熟悉的 Profiler
    中的某个功能，那么您是正确的，两者有部分重叠。然而，分布式重放具有以下优势：


    1.  分布式重放对资源的影响低于 Profiler，这意味着您正在跟踪的服务器在跟踪运行期间遭受性能问题的风险更低。

    2.  分布式重放允许您从多台服务器（客户端）捕获工作负载，然后在单台主机上重放。


    在分布式重放拓扑中，您需要将一台服务器配置为控制器。正是控制器将针对客户端和目标服务器协调工作。


    ### 分布式重放客户端


    如前所述，多个客户端服务器可以协同工作以创建将在目标服务器上重放的工作负载。分布式重放客户端应安装在您希望使用分布式重放捕获跟踪信息的任何服务器上。


    ### SQL 客户端连接 SDK


    客户端连接 SDK 为 SQL Native Client 提供了一个 SDK 以支持应用程序开发。它还提供了其他接口，例如支持在客户端应用程序中进行堆栈跟踪。


    ### 主数据服务


    主数据服务是用于管理企业内主数据的工具。它允许您对映射到业务实体的数据域进行建模，并通过层次结构、业务规则和数据版本控制来帮助您管理这些域。选择此功能时，将安装以下组件：


    *   一个用于提供管理功能的 Web 控制台

    *   一个允许您配置 MDM 数据库和 Web 控制台的配置工具

    *   一个为开发人员提供可扩展性的 Web 服务

    *   一个用于创建新实体和属性的 Excel 插件


    ### 注意


    在 SQL Server 2016 及更高版本中，管理工具不包含在 SQL Server 安装介质中。要安装它们，您可以使用 SQL Server 安装中心“安装”页面上的
    `安装 SQL Server 管理工具` 链接。在 SQL Server 2019 中，报表服务也不包含在安装介质中。可以使用 SQL Server 安装中心“安装”页面上的
    `安装 SQL Server 报表服务` 链接来安装它。


    ## 总结


    规划部署可能是一项复杂的任务，需要与业务和技术利益相关者进行讨论，以确保您的平台将满足应用程序要求并最终满足业务需求。有许多因素需要考虑。


    请确保考虑安装哪个版本的 SQL Server 是合适的，以及该版本的相关许可注意事项。在做出此决定时，您应考虑整个环境的整体可支持性，而不仅仅是特定应用程序的需求。您还应考虑
    Azure 托管选项是否适合您的应用程序，或者甚至可能是涉及本地和云托管的混合方法。


    在规划部署时，请确保进行彻底的容量规划。同时考虑应用程序的硬件要求。您将需要多少 RAM 和多少个处理器内核是重要的考虑因素，但也许主要的考虑因素是存储。SQL
    Server 通常是一个 I/O 密集型应用程序，因此存储通常可能成为瓶颈。


    您还应考虑操作系统的要求。这不应仅限于最合适的 Windows 版本，还应包括操作系统的配置。仅仅因为有一个 Windows 金牌镜像可用，这是否意味着它针对您的
    SQL Server 安装进行了最优配置？


    最后，考虑应选择安装哪些功能。大多数应用程序只需要一小部分功能，通过仔细选择您需要的功能，您可以减少安装的安全足迹，同时降低管理开销。


    # 2. GUI 安装


    您可以通过运行 SQL Server 的 `setup.exe` 应用程序来调用 SQL Server 安装中心。安装中心提供了许多实用程序，将帮助您安装实例；这些包括链接和工具，以帮助您规划部署、独立和群集安装功能，以及高级工具，这些工具将允许您使用配置文件或基于准备好的镜像来构建实例。


    本章将概述安装中心提供的选项，然后指导您使用图形用户界面安装 SQL Server 的过程。它还将针对对实例的持续可支持性至关重要的决策提供实用的建议。


    ## 安装中心


    SQL Server 安装中心是与规划、安装和升级 SQL Server 实例相关的所有活动的一站式平台。当您运行 SQL Server 安装介质时，首先看到的就是这个应用程序。安装中心由七个选项卡组成，以下部分将描述这些选项卡的内容。

