  trans: '# 使用新建可用性组向导


    当备份成功完成后，我们通过在对象资源管理器中展开 AlwaysOn 高可用性，然后从“可用性组”文件夹的上下文菜单中选择“新建可用性组向导”来启动该向导。向导的“简介”页面将显示出来，为我们概述需要执行的步骤。


    在“指定名称”页面（参见图 14-2），系统会提示我们为可用性组输入一个名称。我们还需要选择“Windows Server 故障转移群集”作为群集类型。其他群集类型选项包括“外部”（支持
    Linux 上的 Pacemaker）和“无”（用于无群集的可用性组）。“数据库级别运行状况检测”选项将使得组中任何数据库脱机时，可用性组都会发生故障转移。“每数据库
    DTC 支持”选项将指定是否支持使用 MSDTC（Microsoft 分布式事务处理协调器）的跨数据库事务。关于配置 DTC 的完整讨论超出了本书范围，但可以在
    [`https://docs.microsoft.com/en-us/previous-versions/windows/desktop/ms681291(v=vs.85)`](https://docs.microsoft.com/en-us/previous-versions/windows/desktop/ms681291%2528v%25253Dvs.85%2529)
    找到更多详细信息。


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig2_HTML.jpg](img/333037_2_En_14_Fig2_HTML.jpg)


    图 14-2：指定名称页面


    在“选择数据库”页面，系统会提示我们选择希望参与可用性组的数据库，如图 14-3 所示。在此屏幕上，请注意我们无法选择 `Chapter14App2Customers`
    数据库，因为我们尚未对该数据库进行完整备份。


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig3_HTML.jpg](img/333037_2_En_14_Fig3_HTML.jpg)


    图 14-3：选择数据库页面


    “指定副本”页面包含四个选项卡。我们使用第一个选项卡“副本”将辅助副本添加到拓扑中。选中“同步提交”选项会导致数据在提交到主副本之前，先在辅助副本上提交。（这也被称为在主副本之前，先在辅助副本上固化日志。）这意味着在发生故障转移时，不可能丢失数据，即我们可以满足
    RPO（恢复点目标）为 0（零）的 SLA（服务级别协议）。然而，这也意味着性能会有所下降。如果我们选择“异步提交”，那么副本将以异步提交模式运行。这意味着数据在提交到辅助副本之前，先在主副本上提交。这避免了性能下降，但也意味着在发生故障转移时，RPO
    是不确定的。同步副本的性能考虑因素将在本章后面讨论。


    当我们选中“自动故障转移”选项时，如果我们尚未选择“同步提交”，该选项也会被自动选中。这是因为自动故障转移仅在同步提交模式下才可能。我们可以将“可读辅助副本”下拉列表设置为“否”、“是”或“仅读意向”。当设置为“否”时，处于辅助角色的副本上的数据库不可访问。当设置为“仅读意向”时，可用性组侦听器可以将只读工作负载重定向到此辅助副本，但前提是应用程序在连接字符串中指定了
    `Application Intent=Read-only`。将其设置为“是”则启用侦听器重定向只读流量，无论应用程序的连接字符串中是否存在 `Application
    Intent` 参数。尽管我们可以通过 GUI 更改“可读辅助副本”的值，同时为副本配置自动故障转移而不报错，但这只是向导的一个特性。实际上，该副本是不可访问的，因为配置为自动故障转移时不支持活动辅助副本。“副本”选项卡如图
    14-4 所示。为满足我们实现高可用性和灾难恢复的要求，我们将同一站点内的辅助服务器配置为同步副本，将不同站点中的服务器配置为异步副本。这意味着数据中心之间的延迟不会加剧与同步提交相关的性能下降。


    ### 注意


    将辅助副本用于只读工作负载在第 16 章中有更深入的讨论。


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig4_HTML.jpg](img/333037_2_En_14_Fig4_HTML.jpg)


    图 14-4：副本选项卡


    在“指定副本”页面的“端点”选项卡上（如图 14-5 所示），我们为每个端点指定端口号。默认端口为 5022，但如果需要，我们可以指定不同的端口。在此选项卡上，我们还指定在端点之间发送数据时是否应进行加密。选中此选项通常是个好主意，如果选中，则使用
    AES（高级加密标准）作为加密算法。


    可选地，您还可以更改创建的端点的名称。但是，由于每个实例只允许一个数据库镜像端点，而且默认名称已经相当具有描述性，因此并不总是需要更改它。一些 DBA 选择将其重命名以包含实例名称，因为这可以简化多服务器的管理。如果您的企业有许多可用性组群集，这是一个好主意。


    显示每个实例使用的服务帐户仅供参考。如果您确保两个实例使用相同的服务帐户，可以简化安全管理。如果未能做到这一点，您将需要为每个服务帐户授予每个实例的权限。这意味着，您没有通过仅将一个服务帐户用于一个实例来减小每个服务帐户的安全范围，而是将安全范围从操作系统级别提升到了
    SQL Server 级别。


    端点 URL 指定了可用性组用于通信的端点的 URL。URL 的格式是 `[传输协议]://[路径]:[端口]`。数据库镜像端点的传输协议始终是 TCP（传输控制协议）。路径可以是服务器的完全限定域名
    (FQDN)、单独的服务器名称或网络中唯一的 IP 地址。我建议使用服务器的 FQDN，因为这总是保证有效。这也是填充的默认值。端口号应与您为端点指定的端口号匹配。'
- fmt: '### Note


    可用性组通过数据库镜像端点进行通信。虽然数据库镜像已弃用，但这些端点仍然有效。


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig5_HTML.jpg](images/333037_2_En_14_Chapter/333037_2_En_14_Fig5_HTML.jpg)


    图 14-5 端点选项卡


    #### 备份首选项选项卡


    在“备份首选项”选项卡（见图 14-6）上，我们可以指定执行自动备份的副本。AlwaysOn 可用性组的一个主要优点是，使用它们时，可以将备份等维护任务扩展到辅助服务器。因此，自动备份可以无缝地定向到活动辅助副本。可能的选项包括“首选辅助”、“仅限辅助”、“主副本”或“任意副本”。还可以为每个副本设置优先级。在确定针对哪个副本运行备份作业时，SQL
    Server 会评估每个节点的备份优先级，并更有可能选择优先级最高的副本。


    尽管减少主副本 I/O 的优势显而易见，但在许多情况下，我有些争议性地建议不要将自动备份扩展到辅助副本。当应用程序的恢复时间目标（`RTO`）是优先考虑事项时，尤其如此，因为存在操作可支持性问题。设想这样一种情况：备份正在辅助副本上进行，而用户打电话说他们意外删除了关键表中的所有数据。现在你需要恢复数据库副本并重新填充该表。然而，备份文件位于辅助副本上。因此，在开始恢复数据库（或通过网络执行恢复）之前，你需要将备份文件复制到主副本。这会立即增加你的
    `RTO`。


    此外，当配置为允许在多台服务器上备份时，`SQL Server` 仍然只在进行备份的实例上维护备份历史记录。这意味着你可能需要在服务器之间慌乱地查找，试图检索所有备份文件，却不知道每个文件存放在哪里。如果其中一台服务器发生完全系统中断，情况会变得更糟。你可能会发现自己处于日志链断裂的困境中。


    对于我刚才提到的大多数问题，解决方法是使用文件服务器上的共享，并将每个实例配置为备份到同一个共享。然而，这样设置的问题是，你现在正通过网络传输所有备份，而不是在本地进行备份。这会增加备份的持续时间以及网络流量。


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig6_HTML.jpg](images/333037_2_En_14_Chapter/333037_2_En_14_Fig6_HTML.jpg)


    图 14-6 备份首选项选项卡


    #### 侦听器选项卡


    在如图 14-7 所示的“侦听器”选项卡上，我们选择是创建可用性组侦听器，还是希望将此任务推迟到以后。如果选择创建侦听器，则需要指定侦听器的名称、它应侦听的端口以及它应使用的
    IP 地址。在多子网群集中，我们为每个子网指定一个地址。此处提供的详细信息用于在可用性组的群集角色中创建客户端访问点资源。你可能会注意到我们为侦听器指定了端口
    `1433`，而我们的实例也运行在端口 `1433` 上。这是一个有效的配置，因为侦听器配置的 IP 地址与 `SQL Server` 实例不同。使用相同的端口号并非强制要求，但如果你在现有实例上实现
    AlwaysOn 可用性组，这可能有益，因为指定端口号连接的应用程序可能需要更少的更改。请记住，服务器名称仍将不同，因为应用程序将连接到侦听器的虚拟名称，而不是物理服务器\实例的名称。在我们的示例中，应用程序连接到
    `APP1LISTEN\PRIMARYREPLICA` 而不是 `CLUSTERNODE1\PRIMARYREPLICA`。虽然通过 `CLUSTERNODE1`
    的连接仍然允许，但它们无法从高可用性或扩展我们的报告中受益。


    由于我们的 App1 可用性组跨越两个子网，因此我们的侦听器必须有两个 IP 地址，每个子网一个。这使得侦听器在我们的任一站点中都可用。


    ### Tip


    如果你在组织单位（`OU`）中没有“创建计算机对象”权限，那么侦听器的 `VCO`（虚拟计算机对象）必须存在于活动目录（`AD`）中，并且你必须被分配对该对象的“完全控制”权限。


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig7_HTML.jpg](images/333037_2_En_14_Chapter/333037_2_En_14_Fig7_HTML.jpg)


    图 14-7 侦听器选项卡


    #### 选择初始数据同步


    在如图 14-8 所示的“选择初始数据同步”屏幕上，我们选择如何执行副本的初始数据同步。如果选择“完整”，则参与可用性组的每个数据库都将执行完整备份，然后是日志备份。备份文件备份到你指定的共享，然后还原到辅助服务器。共享路径可以使用
    `Windows` 或 `Linux` 格式指定，具体取决于你的要求。还原完成后，通过日志流的数据同步开始。


    如果你已经备份了数据库并将它们还原到辅助副本上，则可以选择“仅连接”选项。这将启动可用性组内数据库通过日志流的数据同步。选择“跳过初始数据同步”允许你在完成设置后自行备份和还原数据库。


    如果选择“自动种子设定”选项，则最初会在每个副本上创建一个空数据库。然后使用 `VDI` 通过日志流传输进行数据种子设定。此选项比使用备份初始化慢，但避免了在共享之间传输大型备份文件。


    ### Tip


    如果你的可用性组将包含许多数据库，那么最好自行执行备份/还原。这是因为内置工具将按顺序执行操作，因此可能需要很长时间才能完成。


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig8_HTML.jpg](images/333037_2_En_14_Chapter/333037_2_En_14_Fig8_HTML.jpg)


    图 14-8 选择数据同步页面


    #### 验证和完成


    在“验证”页面上，会检查可能导致设置失败的规则。如果任何结果返回为“失败”，则需要在尝试继续之前解决它们。


    验证测试完成后，我们转到“摘要”页面，其中显示了在设置过程中要执行的任务列表。


    随着设置的进行，每个配置任务的结果显示在“结果”页面上。如果此页面上出现任何错误，请务必调查它们，但这并不一定意味着整个可用性组需要重新配置。例如，如果由于
    `VCO` 尚未在 `AD` 中呈现而导致创建可用性组侦听器失败，那么你可以重新创建侦听器，而无需重新创建整个可用性组。


    作为使用“新建可用性组向导”的替代方法，你可以使用“新建可用性组”对话框，然后使用“添加侦听器”对话框来执行可用性组的配置。本章稍后将探讨这种创建可用性组的方法。'
  raw: '### Note


    Availability groups communicate with a database mirroring endpoint. Although database
    mirroring is deprecated, the endpoints are not.


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig5_HTML.jpg](images/333037_2_En_14_Chapter/333037_2_En_14_Fig5_HTML.jpg)


    Figure 14-5


    The Endpoints tab


    On the Backup Preferences tab (see Figure [14-6](#333037_2_En_14_Chapter.xhtml#Fig6)),
    we can specify the replica on which automated backups will be taken. One of the
    big advantages of AlwaysOn Availability Groups is that when you use them, you
    can scale out maintenance tasks, such as backups, to secondary servers. Therefore,
    automated backups can seamlessly be directed to active secondaries. The possible
    options are Prefer Secondary, Secondary Only, Primary, or Any Replica. It is also
    possible to set priorities for each replica. When determining which replica to
    run the backup job against, SQL Server evaluates the backup priorities of each
    node and is more likely to choose the replica with the highest priority.


    Although the advantages of reducing IO on the primary replica are obvious, I,
    somewhat controversially, recommend against scaling automated backups to secondary
    replicas in many cases. This is especially the case when RTO (recovery time objective)
    is a priority for the application because of operational supportability issues.
    Imagine a scenario in which backups are being taken against a secondary replica
    and a user calls to say that they have accidently deleted all data from a critical
    table. You now need to restore a copy of the database and repopulate the table.
    The backup files, however, sit on the secondary replica. As a result, you need
    to copy the backup files over to the primary replica before you can begin to restore
    the database (or perform the restore over the network). This instantly increases
    your RTO.


    Also, when configured to allow backups against multiple servers, SQL Server still
    only maintains the backup history on the instance where the backup was taken.
    This means that you may be scrambling between servers, trying to retrieve all
    of your backup files, not knowing where each one resides. This becomes even worse
    if one of the servers has a complete system outage. You can find yourself in a
    scenario in which you have a broken log chain.


    The workaround for most of the issues that I just mentioned is to use a share
    on a file server and configure each instance to back up to the same share. The
    problem with this, however, is that by setting things up in this manner, you are
    now sending all of your backups across the network rather than backing them up
    locally. This can increase the duration of your backups as well as increase network
    traffic.


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig6_HTML.jpg](images/333037_2_En_14_Chapter/333037_2_En_14_Fig6_HTML.jpg)


    Figure 14-6


    The Backup Preferences tab


    On the Listener tab, shown in Figure [14-7](#333037_2_En_14_Chapter.xhtml#Fig7),
    we choose if we want to create an availability group listener or if we want to
    defer this task until later. If we choose to create the listener, then we need
    to specify the listener’s name, the port that it should listen on, and the IP
    address(es) that it should use. We specify one address for each subnet, in multi-subnet
    clusters. The details provided here are used to create the client access point
    resource in the availability group’s cluster role. You may notice that we have
    specified port 1433 for the listener, although our instance is also running on
    port 1433\. This is a valid configuration, because the listener is configured
    on a different IP address than the SQL Server instance. It is also not mandatory
    to use the same port number, but it can be beneficial, if you are implementing
    AlwaysOn Availability Groups on an existing instance because applications that
    specify the port number to connect may need fewer application changes. Remember
    that the server name will still be different, however, because applications will
    be connecting to the virtual name of the listener, as opposed to the name of the
    physical server\instance. In our example, applications connect to `APP1LISTEN\PRIMARYREPLICA`
    instead of `CLUSTERNODE1\PRIMARYREPLICA`. Although connections via `CLUSTERNODE1`
    are still permitted, they do not benefit from high availability or scale our reporting.


    Because our App1 Availability Group spans two subnets, then our Listener must
    have two IP addresses, one in each subnet. This makes the listener available in
    either of our sites.


    ### Tip


    If you do not have Create Computer Objects permission within the OU, then the
    listener’s VCO (virtual computer object) must be present in AD and you must be
    assigned Full Control permissions on the object.


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig7_HTML.jpg](images/333037_2_En_14_Chapter/333037_2_En_14_Fig7_HTML.jpg)


    Figure 14-7


    The Listener tab


    On the Select Initial Data Synchronization screen, shown in Figure [14-8](#333037_2_En_14_Chapter.xhtml#Fig8),
    we choose how the initial data synchronization of the replicas is performed. If
    you choose Full, then each database that participates in the availability group
    is subject to a full backup, followed by a log backup. The backup files are backed
    up to a share, which you specify, before they are restored to the secondary servers.
    The share path can be specified using either Windows or Linux formats, depending
    on your requirements. After the restore is complete, data synchronization, via
    log stream, commences.


    If you have already backed up your databases and restored them onto the secondaries,
    then you can select the Join Only option. This starts the data synchronization,
    via log stream, on the databases within the availability group. Selecting Skip
    Initial Data Synchronization allows you to back up and restore the databases yourself
    after you complete the setup.


    If you select the Automatic Seeding option, then an empty database is initially
    created on each Replica. The data is then seeding using VDI over the log stream
    transport. This option is slower than initializing with a backup but avoids transferring
    large backup files between shares.


    ### Tip


    If your availability group will contain many databases, then it may be best to
    perform the backup/restore yourself. This is because the built-in utility will
    perform the actions sequentially, and therefore, it may take a long time to complete.


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig8_HTML.jpg](images/333037_2_En_14_Chapter/333037_2_En_14_Fig8_HTML.jpg)


    Figure 14-8


    The Select Data Synchronization page


    On the Validation page, rules that may cause the setup to fail are checked. If
    any of the results come back as Failed, then you need to resolve them before you
    attempt to continue.


    Once validation tests are complete and we move to the Summary page, we are presented
    with a list of the tasks that are to be carried out during the setup.


    As setup progresses, the results of each configuration task display on the Results
    page. If any errors occur on this page, be sure to investigate them, but this
    does not necessarily mean that the entire availability group needs to be reconfigured.
    For example, if the creation of the availability group listener fails because
    the VCO had not been presented in AD, then you can re-create the listener without
    needing to re-create the entire availability group.


    As an alternative to using the New Availability Group wizard, you can perform
    the configuration of the availability group using the New Availability Group dialog
    box, followed by the Add Listener dialog box. This method of creating an availability
    group is examined later in this chapter.'
