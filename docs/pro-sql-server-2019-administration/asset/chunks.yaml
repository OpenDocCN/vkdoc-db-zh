  trans: '## 提示


    在本节中，我们将使用一台 Windows Server 2019 主机，该主机已安装容器功能、Docker 模块和 Microsoft Docker 提供程序。如何执行这些准备步骤的详细信息，请参阅本章的“运行
    Microsoft 提供的 Docker 镜像”部分。


    Dockerfile 是一个部署脚本，它指定了应如何构建容器镜像。该文件由一组指令构成。与基于 Windows 创建 SQL Server 容器最相关的指令在表
    4-3 中详述。


    表 4-3：Dockerfile 指令


    | 指令 | 描述 |

    | --- | --- |

    | `FROM` | 你的新镜像所应基于的容器镜像 |

    | `RUN` | 指定要运行的命令 |

    | `COPY` | 将文件从主机复制到容器镜像 |

    | `ADD` | 类似于 COPY，但允许从远程源复制文件 |

    | `WORKDIR` | 为其他 Docker 指令指定工作目录 |

    | `CMD` | 设置当容器镜像实例部署时要运行的默认命令 |

    | `VOLUME` | 创建一个挂载点 |


    创建我们自己的容器镜像的第一步是从 MCR 拉取 Windows Server 2019 Core 镜像。这将是我们镜像的基础镜像。我们可以使用 PowerShell
    来完成此操作，使用的是清单 4-19 中的命令。


    ```

    docker pull mcr.microsoft.com/windows/servercore:ltsc2019

    ```

    **清单 4-19：** 拉取基础镜像


    我们的下一步是在主机上创建一个简单的文件夹结构。首先，我们将创建一个名为 `C:\DockerBuild` 的文件夹。此文件夹将存储我们的构建脚本。我们还将在其下创建一个名为
    `C:\DockerBuild\SQL2019` 的文件夹。此文件夹应包含 SQL Server 2019 安装介质。


    我们现在需要创建两个脚本，都将放置在 `C:\DockerBuild` 文件夹中。第一个文件是 Dockerfile。此文件必须命名为 `Dockerfile`
    且没有扩展名。


    ### 提示


    保存 `dockerfile` 时，请确保你的文本/代码编辑器没有自动向文件附加默认文件扩展名。如果附加了，那么镜像的构建将失败。


    清单 4-20 中的脚本包含了我们将要使用的 Dockerfile 的内容。


    ```

    #使用 Server Core 基础镜像

    FROM mcr.microsoft.com/windows/servercore:ltsc2019

    #为 SQL Server 和 SQL 命令行实用工具介质创建临时文件夹

    RUN powershell -Command (mkdir C:\SQL2019)

    #将 SQL Server 介质复制到容器中

    COPY \SQL2019 C:/SQL2019

    #安装 SQL Server

    RUN C:/SQL2019/SETUP.exe /Q /ACTION=INSTALL /FEATURES=SQLENGINE /INSTANCENAME=MSSQLSERVER
    \

    /SECURITYMODE=SQL /SAPWD="Passw0rd" /SQLSVCACCOUNT="NT AUTHORITY\System" \

    /AGTSVCACCOUNT="NT AUTHORITY\System" /SQLSYSADMINACCOUNTS="BUILTIN\Administrators"
    \

    /IACCEPTSQLSERVERLICENSETERMS=1 /TCPENABLED=1 /UPDATEENABLED=False

    #安装 Chocolatey 和 SQL Server 命令行实用工具

    RUN @"%SystemRoot%\System32\WindowsPowerShell\v1.0\powershell.exe" -NoProfile
    -InputFormat None -ExecutionPolicy Bypass -Command "iex ((New-Object System.Net.WebClient).DownloadString(''https://chocolatey.org/install.ps1''))"
    && SET "PATH=%PATH%;%ALLUSERSPROFILE%\chocolatey\bin"

    RUN choco install sqlserver-cmdlineutils -y

    #设置 SQL Server 自动启动

    RUN powershell -Command (Set-Service MSSQLSERVER -StartupType Automatic)

    #移除安装介质

    RUN powershell -Command (Remove-Item -Path C:/SQL2019 -Recurse -Force)

    #为数据文件创建一个挂载点

    VOLUME C:/DataFiles

    #将 start.ps1 复制到容器中

    COPY \start.ps1 /

    WORKDIR /

    CMD powershell -Command (.\start.ps1)

    ```

    **清单 4-20：** Dockerfile


    即使没有 Docker 经验，通过理解文件内容，也很容易看出发生了什么。我们的第一条语句表明，我们的构建将基于由 Microsoft 提供的 Windows
    Server 2019 Core 构建。然后我们使用 `RUN` 和 `COPY` 指令将 SQL Server 介质复制到容器中。


    之后，我们直接进入 SQL Server 的安装。通过 PowerShell 安装 SQL Server 在第 3 章中讨论过。这段代码与在传统的运行 Windows
    Server Core 的服务器上安装 SQL Server 没有区别。唯一值得注意的是，由于命令跨越多行，我们在每行末尾使用了 `\`，以告知 Docker
    这是一条指令。


    脚本的下一部分相当有趣。我们正在安装 Chocolatey。Chocolatey 是 Windows 的一个包管理器，拥有一个庞大的预打包应用程序库。在这种情况下，它很有帮助，因为它允许我们轻松安装
    SQL Server 命令行实用工具，该工具在 Chocolatey 库中可用。


    ### 提示


    Chocolatey 也可用于打包你自己的 SQL Server 构建。我最近为一个客户做了这件事，它非常契合 DevOps/配置管理式的运维风格。


    接下来，我们使用 `RUN` 指令来运行 PowerShell 命令，这些命令将清理我们的安装文件并确保数据库引擎服务已启动。我们的下一步是使用 `VOLUME`
    指令为 `DataFiles` 创建一个挂载点。当我们运行容器实例时，我们将能够将其映射到主机上的一个文件夹，以允许我们的数据被持久化。


    最后，我们将一个名为 `Start.ps1` 的文件复制到我们的容器中并运行它。`Start.ps1` 的内容如清单 4-21 所示。此脚本用于运行一个无限循环。如果我们不这样做，那么一旦最后一条指令发送完毕，容器就会停止。


    ```

    $lastCheck = (Get-Date).AddSeconds(-2)

    while ($true)

    {

    $lastCheck = Get-Date

    Start-Sleep -Seconds 2

    }

    ```

    **清单 4-21：** Start.ps1


    将这两个文件保存在主机的 `C:\DockerBuild` 文件夹中之后，我们可以通过运行清单 4-22 中的命令来构建镜像。我们使用 `-t` 开关来标记构建。我使用了
    `major.minor` 表示法来指示构建版本。'
- fmt: '### Tip


    确保在运行命令前位于`C:\DockerBuild`目录。


    ```

    docker build -t sql2019:1.0 .

    Listing 4-22

    Build the Image

    ```


    构建完成后，我们可以使用清单[4-23](#333037_2_En_4_Chapter.xhtml#PC23)中的命令创建一个容器实例。


    ```

    docker run -p 1433:1433 --name sql-2019 -d --volume c:\Datafiles:c:\datafiles
    sql2019:1.0

    Listing 4-23

    Run a Docker Container

    ```


    在这个命令中，我们使用`-p`来向主机暴露一个端口，并使用`-d`将容器作为后台进程运行。我们还使用`--name`来标识容器。最有趣的是，我们使用`--volume`将容器中的挂载点映射到主机上的一个文件夹。其格式为`source:target`。


    我们没有为容器指定IP地址，因此可以使用清单[4-24](#333037_2_En_4_Chapter.xhtml#PC24)中的命令检查它被分配的IP地址。这个命令使用Docker
    inspect从基于JSON的配置中提取特定节点，后跟您感兴趣的容器名称。


    ```

    docker inspect --format "{{ .NetworkSettings.Networks.nat.IPAddress }}" sql-2019

    Listing 4-24

    Obtain the Container’s IP Address

    ```


    现在，我们可以从容器外部，使用SSMS（或其他SQL客户端）通过这个IP地址连接到实例。


    让我们使用清单[4-25](#333037_2_En_4_Chapter.xhtml#PC25)中的脚本在挂载卷上创建一个数据库。


    ```

    CREATE DATABASE PersistedData

    ON  PRIMARY

    ( NAME = N''PersistedData'', FILENAME = N''C:\Datafiles\PersistedData.mdf'' ,
    SIZE = 8192KB , FILEGROWTH = 65536KB )

    LOG ON

    ( NAME = N''PersistedData_log'', FILENAME = N''C:\Datafiles\PersistedData.ldf''
    , SIZE = 8192KB , FILEGROWTH = 65536KB )

    GO

    Listing 4-25

    Create a Database

    ```


    如果我们现在销毁容器，数据将会持久保存。我们可以使用清单[4-26](#333037_2_En_4_Chapter.xhtml#PC26)中的脚本来删除容器。该脚本首先停止容器，然后将其移除。


    ```

    docker stop sql-2019

    docker rm sql-2019

    Listing 4-26

    Remove the Container

    ```


    如果你现在使用清单[4-23](#333037_2_En_4_Chapter.xhtml#PC23)中的脚本重新创建容器，并使用清单[4-24](#333037_2_En_4_Chapter.xhtml#PC24)中的脚本获取新的IP地址，当你连接到实例时，会注意到`PersistedData`数据库不再在实例上。这是因为在构建过程中数据库没有被附加。然而，由于文件存储在主机上，你可以使用清单[4-27](#333037_2_En_4_Chapter.xhtml#PC27)中的命令简单地重新附加数据库。


    ```

    CREATE DATABASE PersistedData ON

    ( FILENAME = N''C:\datafiles\PersistedData.mdf'' ),

    ( FILENAME = N''C:\datafiles\PersistedData.ldf'' )

    FOR ATTACH

    GO

    Listing 4-27

    Reattach the Database

    ```


    ## Creating a Configurable Docker Image for SQL Server


    虽然“为SQL Server创建一个简单的Docker镜像”一节中讨论的构建过程易于遵循，但它也相当不灵活。所有内容都是硬编码的，并且没有在构建过程中附加数据库的方法。因此，在接下来的演示中，我们将对构建进行重大更改，允许我们对其进行参数化，使构建在现实场景中更加可用。


    遵循与之前相同的过程，并使用主机上相同的文件夹结构，让我们首先创建一个新的Docker文件。我们将使用的`Dockerfile`内容可以在清单[4-28](#333037_2_En_4_Chapter.xhtml#PC28)中找到。该文件相似，但你会注意到一些变化。首先，我们删除了安装SQL
    Server命令行实用工具的代码。这是因为我们将使用`sqlserver` PowerShell provider代替。


    我们还将SQL Server安装步骤中硬编码的sa密码更改为`TempPassw0rd`。这是因为当我们运行容器实例时，我们将传入想要使用的密码。


    最显著的是，你会注意到对`Start.ps1`的调用被扩展为传递参数。在这个构建中，`Start.ps1`是所有魔法发生的地方。你会注意到我们将环境变量传递给脚本的每个参数。


    ```

    #Use the Server Core base image

    FROM mcr.microsoft.com/windows/servercore:ltsc2019

    #Make temp folders for the SQL Server and SQL Command Line Utilities media

    RUN powershell -Command (mkdir C:\SQL2019)

    #Copy the SQL Server  media into the container

    COPY \SQL2019 C:/SQL2019

    #Install SQL Server

    RUN C:/SQL2019/SETUP.exe /Q /ACTION=INSTALL /FEATURES=SQLENGINE /INSTANCENAME=MSSQLSERVER
    \

    /SECURITYMODE=SQL /SAPWD="TempPassw0rd" /SQLSVCACCOUNT="NT AUTHORITY\System" \

    /AGTSVCACCOUNT="NT AUTHORITY\System" /SQLSYSADMINACCOUNTS="BUILTIN\Administrators"
    \

    /IACCEPTSQLSERVERLICENSETERMS=1 /TCPENABLED=1 /UPDATEENABLED=False

    #Set SQL Server to start automaticaly

    RUN powershell -Command (Set-Service MSSQLSERVER -StartupType Automatic)

    #Remove the installation media

    RUN powershell -Command (Remove-Item -Path C:/SQL2019 -Recurse -Force)

    #Create a mountpoint for data files

    VOLUME C:/DataFiles

    #Switch shell to PowerShell

    #SHELL ["powershell", "-Command", "$ErrorActionPreference = ''Stop''; $ProgressPreference
    = ''SilentlyContinue'';"]

    #Copy start.ps1 to container

    COPY \start.ps1 /

    WORKDIR /

    CMD powershell -Command (.\start.ps1 -saPassword $env:saPassword -databases $env:databases
    -agentStartupType $env:agentStartupType)

    Listing 4-28

    Dockerfile

    ```


    我们的下一步将是创建一个新的`Start.ps1`文件。这次，如清单[4-29](#333037_2_En_4_Chapter.xhtml#PC29)所示，该文件要复杂得多。该脚本接受三个参数，允许我们传入sa帐户的密码、实例上应该存在的数据库数组以及SQL
    Server代理服务所需的启动类型。


    脚本中的第一个命令用于从PowerShell库安装`sqlserver` PowerShell模块。这使我们能够使用`Invoke-SqlCmd` cmdlet。然后，脚本使用sa帐户的临时密码对SQL实例运行查询，并将密码更改为传入的密码。


    脚本的下一部分是最复杂的部分。此部分检查传入的数据库名称数组中的每个数据库是否存在于实例上。如果不存在，它会尝试从挂载卷附加数据库。如果数据库文件不存在，它将检查挂载卷中是否存在备份文件并还原数据库。最后，如果其他所有方法都失败，则将创建一个新数据库。'
  raw: '### Tip


    Make sure you are in the C:\DockerBuild folder before running the command.


    ```

    docker build -t sql2019:1.0 .

    Listing 4-22

    Build the Image

    ```


    Once the build has completed, we can create an instance of the container, by using
    the command in Listing [4-23](#333037_2_En_4_Chapter.xhtml#PC23).


    ```

    docker run -p 1433:1433 --name sql-2019 -d --volume c:\Datafiles:c:\datafiles
    sql2019:1.0

    Listing 4-23

    Run a Docker Container

    ```


    In this command, we are using `-p` to expose a port to the host machine and `-d`
    to run the container as a background process. We are also using `–-name` to identify
    the container. Most interestingly, we are using `--volume` to map the mount point
    in the container to a folder on our host. This takes the format `source:target`.


    We have not specified an IP address for the container, so we can check the IP
    address that it has been assigned, by using the command in Listing [4-24](#333037_2_En_4_Chapter.xhtml#PC24).
    This is using the Docker inspect command to pull out a specific node from the
    JSON-based configuration, followed by the name of the container that you are interested
    in.


    ```

    docker inspect --format "{{ .NetworkSettings.Networks.nat.IPAddress }}" sql-2019

    Listing 4-24

    Obtain the Container’s IP Address

    ```


    We can now connect to the instance, from outside of the container, using SSMS
    (or other SQL client) using the IP address.


    Let’s use the script in Listing [4-25](#333037_2_En_4_Chapter.xhtml#PC25) to create
    a database on the mounted volume.


    ```

    CREATE DATABASE PersistedData

    ON  PRIMARY

    ( NAME = N''PersistedData'', FILENAME = N''C:\Datafiles\PersistedData.mdf'' ,
    SIZE = 8192KB , FILEGROWTH = 65536KB )

    LOG ON

    ( NAME = N''PersistedData_log'', FILENAME = N''C:\Datafiles\PersistedData.ldf''
    , SIZE = 8192KB , FILEGROWTH = 65536KB )

    GO

    Listing 4-25

    Create a Database

    ```


    If we now destroy the container, then the data will persist. We can drop the container
    using the script in Listing [4-26](#333037_2_En_4_Chapter.xhtml#PC26). This script
    first stops the container and then removes it.


    ```

    docker stop sql-2019

    docker rm sql-2019

    Listing 4-26

    Remove the Container

    ```


    If you now re-create the container using the script in Listing [4-23](#333037_2_En_4_Chapter.xhtml#PC23)
    and obtain the new IP address by using the script in Listing [4-24](#333037_2_En_4_Chapter.xhtml#PC24),
    you will notice, when you connect to the instance, that the `PersistedData` database
    is no longer on the instance. This is because the database is not attached during
    the build. Because the files are stored on the host, however, then you can simply
    reattach the database, using the command in Listing [4-27](#333037_2_En_4_Chapter.xhtml#PC27).


    ```

    CREATE DATABASE PersistedData ON

    ( FILENAME = N''C:\datafiles\PersistedData.mdf'' ),

    ( FILENAME = N''C:\datafiles\PersistedData.ldf'' )

    FOR ATTACH

    GO

    Listing 4-27

    Reattach the Database

    ```


    ### Creating a Configurable Docker Image for SQL Server


    While the build discussed in the “Creating a Simple Docker Image for SQL Server”
    section was easy to follow, it was also rather inflexible. Everything was hard-coded
    and there was no means of attaching databases during the build process. Therefore,
    in the following demonstration, we will make a major change to our build, which
    allows us to parameterize it, making the build a lot more useable in real-world
    scenarios.


    Following the same process as before and using the same folder structure on the
    host, let’s first create a new Docker file. The contents of `Dockerfile` that
    we will use can be found in Listing [4-28](#333037_2_En_4_Chapter.xhtml#PC28).
    The file is similar, but you will notice a few changes. Firstly, we have removed
    the code which installs SQL Server Command Line Utilities. This is because we
    will be using the `sqlserver` PowerShell provider instead.


    We have also changed the hard-coded sa password in the SQL Server installation
    step, to be `TempPassw0rd`. This is because when we run an instance of the container,
    we will pass in the password that we want to use.


    Most significantly, you will notice that the call to `Start.ps1` has been expanded
    to pass in parameters. In this build, `Start.ps1` is where all of the magic happens.
    You will notice that we are passing environment variables to each of the script’s
    parameters.


    ```

    #Use the Server Core base image

    FROM mcr.microsoft.com/windows/servercore:ltsc2019

    #Make temp folders for the SQL Server and SQL Command Line Utilities media

    RUN powershell -Command (mkdir C:\SQL2019)

    #Copy the SQL Server  media into the container

    COPY \SQL2019 C:/SQL2019

    #Install SQL Server

    RUN C:/SQL2019/SETUP.exe /Q /ACTION=INSTALL /FEATURES=SQLENGINE /INSTANCENAME=MSSQLSERVER
    \

    /SECURITYMODE=SQL /SAPWD="TempPassw0rd" /SQLSVCACCOUNT="NT AUTHORITY\System" \

    /AGTSVCACCOUNT="NT AUTHORITY\System" /SQLSYSADMINACCOUNTS="BUILTIN\Administrators"
    \

    /IACCEPTSQLSERVERLICENSETERMS=1 /TCPENABLED=1 /UPDATEENABLED=False

    #Set SQL Server to start automaticaly

    RUN powershell -Command (Set-Service MSSQLSERVER -StartupType Automatic)

    #Remove the installation media

    RUN powershell -Command (Remove-Item -Path C:/SQL2019 -Recurse -Force)

    #Create a mountpoint for data files

    VOLUME C:/DataFiles

    #Switch shell to PowerShell

    #SHELL ["powershell", "-Command", "$ErrorActionPreference = ''Stop''; $ProgressPreference
    = ''SilentlyContinue'';"]

    #Copy start.ps1 to container

    COPY \start.ps1 /

    WORKDIR /

    CMD powershell -Command (.\start.ps1 -saPassword $env:saPassword -databases $env:databases
    -agentStartupType $env:agentStartupType)

    Listing 4-28

    Dockerfile

    ```


    Our next step will be to create a new Start.ps1 file. This time, the file, which
    can be seen in Listing [4-29](#333037_2_En_4_Chapter.xhtml#PC29), is a lot more
    complex. The script accepts three parameters, which allow us to pass in a password
    for the sa account, an array of databases that should exist on the instance, and
    the required startup type of the SQL Server Agent service.


    The first command in the script is used to install the `sqlserver` PowerShell
    module, from the PowerShell Gallery. This allows us to use the `Invoke-SqlCmd`
    cmdlet. The script then runs a query against the SQL instance, authenticating
    using the temporary password of the sa account, and changes the password to the
    one passed in.


    The next section of the script is the most complicated. This section checks to
    see if each database in the array of database names that was passed exists on
    the instance. If it doesn’t, it attempts to attach the database from the mounted
    volume. If no database files exist, it will check to see if there is a backup
    file in the mounted volume and restore the database. Finally, if all else fails,
    a new database will be created.'
