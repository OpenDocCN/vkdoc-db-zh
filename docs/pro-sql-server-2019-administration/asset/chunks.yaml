    index is to be built on the primary key. The first is size. A GUID is 16 bytes
    long. When a table has nonclustered indexes, the clustered index key is stored
    in every nonclustered index. For unique nonclustered indexes, it is stored for
    every row at the leaf level, and for nonunique nonclustered indexes, it is also
    stored at every row in the root and intermediate levels of the index. When you
    multiply 16 bytes by millions of rows, this drastically increases the size of
    the indexes, making them less efficient.


    The second issue is that when a GUID is generated, it is a random value. Because
    the data in your table is stored in the order of the clustered index key for good
    performance, you need the values of this key to be generated in sequential order.
    Generating random values for your clustered index key results in the index becoming
    more and more fragmented every time you insert a new row. Fragmentation is discussed
    later in this chapter.


    There is a workaround for the second issue, however. SQL Server has a function
    called `NEWSEQUENTIALID()`. This function always generates a GUID value that is
    higher than previous values generated on the server. Therefore, if you use this
    function in the default constraint of your primary key, you can enforce sequential
    inserts.


    ### Caution


    After the server has been restarted, `NEWSEQUENTIALID()` can start with a lower
    value. This may lead to fragmentation.


    If the primary key must be a GUID or another wide column, such as a Social Security
    Number, or if it must be a set of columns that form a natural key, such as Customer
    ID, Order Date, and Product ID, then it is highly recommended that you create
    an additional column in your table. You can make this column an `INT` or `BIGINT`,
    depending on the number of rows you expect the table to have, and you can use
    either the `IDENTITY` property or a `SEQUENCE` in order to create a narrow, sequential
    key for your clustered index.


    ### Tip


    Remember a narrow clustered key is important because it will be included in all
    other indexes on the table.


    ### Administering Clustered Indexes


    You can create a clustered index by using the `CREATE CLUSTERED INDEX` statement
    , as shown in Listing [8-1](#333037_2_En_8_Chapter.xhtml#PC1). Other methods you
    can use to create a clustered index are using the `ALTER TABLE` statement with
    a `PRIMARY KEY` clause and using the `INDEX` clause in the `CREATE TABLE` statement,
    as long as you are using SQL Server 2014 or higher. This script creates a database
    called `Chapter8` and then a table called `CIDemo`. Finally, it creates a clustered
    index on the `ID` column of this table.'
  trans: '

    ## 聚集索引


    一个 `B 树` 是一种你可以用来组织键值的数据结构，使得用户可以比必须读取整张表快得多地搜索他们要查找的数据。它是一种基于树的结构，其中每个节点允许拥有两个以上的子节点。该树是平衡的，这意味着检索任何单行数据所需的步骤数始终相同。


    一个 `聚集索引` 是一种 B 树结构，它使得表的数据页根据聚集索引键的逻辑顺序进行存储。聚集索引键可以是单个列，也可以是一组确保表中每行唯一性的列。该键通常是表的主键，尽管这是最典型的用法，但在某些情况下，你可能希望使用不同的列。本章稍后将更详细地讨论这一点。


    ### 没有聚集索引的表


    当一张表存在但没有聚集索引时，它被称为 `堆`。一个堆由一个或多个 IAM（索引分配映射）页和一系列未链接在一起或未按顺序存储的数据页组成。SQL Server
    确定表的数据页的唯一方式是读取 IAM 页。当表作为堆存储，即没有索引时，每次访问该表，SQL Server 都必须读取表中的每一个数据页，即使你只想返回一行数据。图
    8-1 中的示意图说明了堆的结构。


    ![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig1_HTML.jpg](img/333037_2_En_8_Fig1_HTML.jpg)


    图 8-1：堆结构


    当数据存储在堆上时，SQL Server 需要为每一行维护一个唯一标识符。它通过创建一个 RID（行标识符）来实现这一点。RID 的格式为 `文件 ID:页
    ID:槽号`，这是一个物理位置。即使一张表有非聚集索引，除非存在聚集索引，否则它仍然作为堆存储。当在堆上创建非聚集索引时，RID 被用作指针，使得非聚集索引能够链接回基表中的正确行。


    ### 有聚集索引的表


    当你在表上创建聚集索引时，就会创建一个 B 树结构。这个 B 树基于聚集键的值，如果聚集索引不是唯一的，它还会包含一个唯一值生成器。一个 `唯一值生成器`
    是一个用于在键值相同时识别行的值。这允许 SQL Server 通过创建到数据的分层指针集来执行更高效的搜索操作，如图 8-2 所示。此层次结构顶层的页面称为
    `根节点`。结构的底层称为 `叶级别`，对于聚集索引，叶级别由表的实际数据页组成。根据表的大小，B 树结构可以有一个或多个中间级别。


    ![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig2_HTML.jpg](img/333037_2_En_8_Fig2_HTML.jpg)


    图 8-2：聚集索引结构


    图 8-2 显示，尽管叶级别是数据本身，但其上的级别包含指向其下方树中页面的指针。这使得 SQL Server 可以执行查找操作，这是一种返回少量行的非常高效的方法。它的工作原理是沿着
    B 树向下导航，使用指针来找到所需的行。在此图中，我们可以看到，如果需要，SQL Server 仍然可以扫描所有表页面来检索所需的行——这被称为 `聚集索引扫描`。或者，SQL
    Server 可能决定结合这两种方法来执行范围扫描。这里，SQL Server 查找所需范围的第一个值，然后扫描叶级别，直到遇到第一个不需要的值。SQL Server
    可以这样做，因为表是按照索引键排序的，这意味着它可以保证没有其他匹配值出现在表中更靠后的位置。


    ### 主键聚簇


    表的主键通常是聚集索引的自然选择，因为许多 OLTP 应用程序 99% 的数据访问是通过主键进行的。事实上，默认情况下，除非你另有指定，或者表上已存在聚集索引，否则创建主键会自动在该键上生成聚集索引。存在一些情况，主键不是聚集索引的正确选择。我亲身经历过的一个例子是一个第三方应用程序，它要求表的主键是一个
    GUID。


    如果聚集索引要建立在主键上，那么在 GUID 上创建聚集索引会带来两个主要问题。第一个是大小。一个 GUID 长 16 字节。当表有非聚集索引时，聚集索引键会存储在每一个非聚集索引中。对于唯一的非聚集索引，它在叶级别为每一行存储；对于非唯一的非聚集索引，它也在索引的根级别和中间级别的每一行存储。当你将
    16 字节乘以数百万行时，这会极大地增加索引的大小，使其效率降低。


    第二个问题是，当 GUID 生成时，它是一个随机值。为了获得良好的性能，表中的数据按照聚集索引键的顺序存储，因此你需要此键的值按顺序生成。为聚集索引键生成随机值会导致每次插入新行时，索引变得越来越碎片化。碎片将在本章后面讨论。


    不过，对于第二个问题有一个解决方法。SQL Server 有一个名为 `NEWSEQUENTIALID()` 的函数。此函数总是生成一个比之前在服务器上生成的值更高的
    GUID 值。因此，如果你在主键的默认约束中使用此函数，就可以强制顺序插入。


    ### 注意


    服务器重启后，`NEWSEQUENTIALID()` 可能从一个较低的值开始。这可能会导致碎片。


    如果主键必须是 GUID 或其他宽列（例如社会保障号），或者它必须是一组构成自然键的列（例如客户 ID、订单日期和产品 ID），那么强烈建议你在表中创建一个额外的列。你可以根据预期表中的行数，将此列设为
    `INT` 或 `BIGINT`，并可以使用 `IDENTITY` 属性或 `SEQUENCE` 来为你的聚集索引创建一个窄的、顺序的键。


    ### 提示


    请记住，窄的聚集键很重要，因为它将包含在表的所有其他索引中。


    ### 管理聚集索引


    你可以使用 `CREATE CLUSTERED INDEX` 语句创建聚集索引，如代码清单 8-1 所示。其他可用于创建聚集索引的方法包括：使用带有 `PRIMARY
    KEY` 子句的 `ALTER TABLE` 语句，以及在 `CREATE TABLE` 语句中使用 `INDEX` 子句（只要你使用的是 SQL Server
    2014 或更高版本）。此脚本创建了一个名为 `Chapter8` 的数据库，然后创建了一个名为 `CIDemo` 的表。最后，它在表的 `ID` 列上创建了一个聚集索引。


    ```sql

    -- 代码清单 8-1：创建聚集索引

    CREATE CLUSTERED INDEX IX_CIDemo_ID ON dbo.CIDemo(ID);

    ```

    '
- fmt: '### Note


    请记得修改文件路径以匹配您自己的配置。


    ```sql

    --Create Chapter8 Database

    CREATE DATABASE Chapter8

    ON  PRIMARY

    ( NAME = N''Chapter8'', FILENAME =

    N''F:\Program Files\Microsoft SQL Server\MSSQL15.PROSQLADMIN\MSSQL\DATA\Chapter8.mdf''),

    FILEGROUP [MEM] CONTAINS MEMORY_OPTIMIZED_DATA  DEFAULT

    ( NAME = N''MEM'', FILENAME = N''H:\DATA\CH08'')

    LOG ON

    ( NAME = N''Chapter8_log'', FILENAME =

    N''E:\Program Files\Microsoft SQL Server\MSSQL15.PROSQLADMIN\MSSQL\DATA\Chapter8_log.ldf'')
    ;

    GO

    USE Chapter8

    GO

    --Create CIDemo table

    CREATE TABLE dbo.CIDemo

    (

    ID       INT       IDENTITY,

    DummyText     VARCHAR(30)

    ) ;

    GO

    --Create clustered index

    CREATE UNIQUE CLUSTERED INDEX CI_CIDemo ON dbo.CIDemo([ID]) ;

    GO

    Listing 8-1

    Creating a Clustered Index

    ```


    当创建索引时，有许多 `WITH` 选项可以指定。这些选项在表 [8-1](#333037_2_En_8_Chapter.xhtml#Tab1) 中概述。


    **Table 8-1**

    **Clustered Index WITH Options**


    | Option | Description |

    | --- | --- |

    | `MAXDOP` | 指定用于构建索引的核心数。每个使用的核心构建自己的索引部分。权衡之处在于，较高的 `MAXOP` 构建索引更快，但较低的 `MAXDOP`
    意味着索引构建时产生的碎片更少。 |

    | `FILLFACTOR` | 指定应在索引叶子级的每个页面中保留多少可用空间。这有助于减少因插入导致的碎片，但代价是索引更宽，读取需要更多IO。对于聚集索引，如果其键值不变且始终递增，请始终将其设置为
    0，即 100% 满减去足够一行的空间。 |

    | `PAD_INDEX` | 将填充因子百分比应用于 B 树的中间级别。 |

    | `STATISTICS_NORECOMPUTE` | 打开或关闭分布统计信息的自动更新。本章后面将讨论统计信息。 |

    | `SORT_IN_TEMPDB` | 指定索引的中间排序结果应存储在 TempDB 中。使用此选项可以将 IO 卸载到承载 TempDB 的磁盘，但代价是使用更多磁盘空间。如果
    `RESUMABLE` 为 `ON`，则此项不能为 `ON`。 |

    | `STATISTICS_INCREMENTAL` | 指定是否应按分区创建统计信息。本章后面将讨论其限制。 |

    | `DROP_EXISTING` | 用于删除并重建同名的现有索引。 |

    | `IGNORE_DUP_KEY` | 启用此选项后，尝试向唯一索引中插入重复键值的 `INSERT` 语句不会失败。而是会生成警告，只有违反唯一约束的行会失败。
    |

    | `ONLINE` | 可设置为 `ON` 或 `OFF`，默认为 `OFF`。指定在索引构建或重建期间是否应对整个表和索引加锁。如果为 `ON`，则查询仍可在操作期间访问表。这以索引构建时间为代价。对于聚集索引，如果表包含
    LOB 数据，则此选项不可用。* |

    | `OPTIMIZE_FOR_SEQUENTIAL_KEY` | 优化高并发插入，其中索引键是顺序的。此功能于 SQL Server 2019 引入，专为遭受最后一页插入争用的索引设计。
    |

    | `RESUMABLE` | 可设置为 `ON` 或 `OFF`，默认为 `OFF`。指定索引创建或构建是否可以暂停和恢复，或者是否可以在失败后恢复。仅当
    `ONLINE` 设置为 `ON` 时，此项才能设置为 `ON`。 |

    | `MAX_DURATION` | 以分钟为单位，指定索引重建或重新生成在暂停前将执行的最大时长。仅当 `ONLINE` 设置为 `ON` 且 `RESUMABLE`
    设置为 `ON` 时才能指定。 |

    | `ALLOW_ROW_LOCKS` | 指定在访问表时可以获取行锁。这并不意味着它们一定会被获取。 |

    | `ALLOW_PAGE_LOCKS` | 指定在访问表时可以获取页锁。这并不意味着它们一定会被获取。 |


    *空间数据被视为 LOB 数据。*


    如本章前面所述，如果在表上创建主键，除非您指定了 `NONCLUSTERED` 关键字，或者已存在聚集索引，否则会自动创建一个聚集索引来覆盖主键的列。同时，请记住，有时如果主键很宽或者它不是始终递增的，您可能希望将聚集索引移动到更合适的列上。


    为了实现这一点，您需要删除主键约束，然后使用 `NONCLUSTERED` 关键字重新创建它。这会强制 SQL Server 用唯一的非聚集索引覆盖主键。此操作完成后，您就可以在您选择的列上创建聚集索引。


    如果您需要删除一个未覆盖主键的聚集索引，可以使用 `DROP INDEX` 语句来完成，如清单 [8-2](#333037_2_En_8_Chapter.xhtml#PC2)
    所示，该语句删除了我们在上一个示例中创建的聚集索引。


    ```sql

    DROP INDEX CI_CIDemo ON dbo.CIDemo ;

    Listing 8-2

    Dropping the Index

    ```


    ## Nonclustered Indexes


    非聚集索引与聚集索引一样，基于 B 树结构。不同之处在于，非聚集索引的叶子级包含指向表数据页的指针，而不是表的数据页本身，如图 [8-3](#333037_2_En_8_Chapter.xhtml#Fig3)
    所示。这意味着一个表可以有多个非聚集索引来支持查询性能。


    ![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig3_HTML.jpg](images/333037_2_En_8_Chapter/333037_2_En_8_Fig3_HTML.jpg)


    **Figure 8-3**

    **Nonclustered index structure**


    与聚集索引一样，非聚集索引支持查找、扫描和范围扫描操作以查找所需数据。如果非聚集索引的索引键包含查询期间需要访问的所有列，那么您就不需要 SQL Server
    访问基础表。如果访问的列仅包含在非聚集索引和聚集索引键中，这也同样成立。这是因为非聚集索引的叶子级总是包含聚集索引键。这被称为索引*覆盖查询*，将在下一节讨论。


    如果查询需要返回未包含在非聚集索引或聚集索引键中的列，SQL Server 需要在基础表中找到匹配的行。这通过称为*键查找*的过程完成。键查找操作使用聚集索引键值或
    RID（如果表没有聚集索引）从基础表访问所需的行。


    对于少量行来说，这可能是高效的，但如果查询返回许多行，它很快就会变得代价高昂。这意味着，如果将返回许多行，SQL Server 可能决定忽略非聚集索引而使用聚集索引或堆的开销更低。此决策称为索引的*临界点*。临界点因表而异，但通常介于表的
    0.5% 到 2% 之间。'
