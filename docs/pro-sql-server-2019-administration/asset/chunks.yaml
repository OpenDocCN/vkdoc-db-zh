  trans: '### 提示


    若要评估多个策略，请在**对象资源管理器**中的**策略**文件夹的右键菜单中选择**评估**，然后选择您希望评估的策略。所有选定的策略将被评估，并显示在**评估结果**页面中。


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig13_HTML.jpg](img/333037_2_En_23_Fig13_HTML.jpg)


    图 23-13


    **评估策略**对话框


    ### 提示


    我们在本书的第 22 章创建了 `Chapter22` 数据库。如果您没有 `Chapter22` 数据库，可以使用语句 `CREATE DATABASE
    Chapter22 ;` 来创建它。


    点击**详细信息**列中的**查看**链接，以调用**结果详细视图**对话框，如图 23-14 所示。此信息对于失败的策略评估很有用，因为它提供了未满足策略条件的实际值的详细信息。


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig14_HTML.jpg](img/333037_2_En_23_Fig14_HTML.jpg)


    图 23-14


    **结果详细视图**对话框


    #### 创建一个防止不良活动的策略


    另一个非常有用的简单策略是帮助您防止开发人员混淆其存储过程的策略。可以说，过程混淆在第三方软件中有其位置，以防止知识产权被盗。然而，对于内部应用程序，则无需使用混淆，这样做可能导致诊断性能问题时出现困难。此外，如果开发团队没有使用源代码控制，在发生灾难时可能导致代码丢失。在这种情况下，我们不仅仅是临时评估策略，而是要阻止创建被混淆的存储过程。这意味着在代码发布期间，您不需要审查每个存储过程是否包含
    `WITH ENCRYPTION` 语法。相反，您可以期望策略被评估，并且 `CREATE PROCEDURE` 语句被回滚，从而防止这种情况发生。


    在创建此策略之前，我们需要确保实例上启用了嵌套触发器。这是因为策略将使用 DDL 触发器来强制执行，而嵌套触发器是 **变更时：防止** 模式的硬性技术要求。您可以使用
    `sp_configure` 来启用嵌套触发器，脚本如清单 23-5 所示；不过，它们默认是开启的。


    ```

    EXEC sp_configure ''nested triggers'', 1 ;

    RECONFIGURE

    清单 23-5

    启用嵌套触发器

    ```


    创建策略后，您需要创建一个条件。创建条件时，如图 23-15 所示，我们使用了 **存储过程** 属性方面的 `@IsEncrypted` 属性。


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig15_HTML.jpg](img/333037_2_En_23_Fig15_HTML.jpg)


    图 23-15


    **创建新条件**对话框


    在**创建新策略**对话框中，如图 23-16 所示，我们可以使用**针对目标**区域来配置哪些目标应由该策略评估；但是，该设置默认为**每个数据库中的每个存储过程**。这符合我们的需求，因此我们不需要创建条件。在**评估模式**下拉列表中，我们选择**变更时：防止**；这使得如果存储过程被混淆，则无法在我们的
    `SQLSERVER\MASTERSERVER` 实例上创建存储过程。我们还确保选中**已启用**框，以便策略在创建时即被启用。


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig16_HTML.jpg](img/333037_2_En_23_Fig16_HTML.jpg)


    图 23-16


    **创建新策略**对话框


    为了演示实际的防止效果，我们尝试使用清单 23-6 中的脚本创建一个存储过程。


    ```

    CREATE PROCEDURE ObfuscatedProc

    WITH ENCRYPTION

    AS

    BEGIN

    SELECT *

    FROM sys.tables

    END

    清单 23-6

    使用 WITH ENCRYPTION 创建存储过程

    ```


    图 23-17 显示了我们尝试运行此 `CREATE PROCEDURE` 语句时抛出的错误。


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig17_HTML.jpg](img/333037_2_En_23_Fig17_HTML.jpg)


    图 23-17


    策略触发器抛出的错误


    ### 创建高级策略


    基于策略的管理是可扩展的，如果您无法使用内置的属性方面创建所需的条件，**表达式高级编辑器**允许您使用广泛的函数。这些函数包括 `ExecuteSql()`
    和 `ExecuteWql()`，它们允许您分别构建自己的 SQL 和 WQL（Windows 查询语言）。`ExecuteSql()` 和 `ExecuteWql()`
    函数不是 T-SQL 函数，它们是 PBM 框架的一部分。


    您可以使用这些函数针对数据库引擎或 Windows 编写查询并评估结果。函数对每个目标调用一次。因此，例如，如果它们与**服务器**属性方面一起使用，则只运行一次，但如果它们针对**表**属性方面使用，则会对每个目标表进行评估。当您使用
    `ExecuteSql()` 时如果返回了多列，则评估第一行的第一列。当您使用 `ExecuteWql()` 时如果返回了多列，则会抛出错误。例如，假设您想要确保
    SQL Server Agent 服务已启动。您可以通过运行清单 23-7 中的查询在 T-SQL 中实现这一点。此查询使用 `LIKE` 运算符，因为 `servicename`
    列也包含服务名称，而 `LIKE` 运算符使查询通用化，因此可以在任何实例上运行而无需修改。


    ```

    SELECT status_desc

    FROM sys.dm_server_services

    WHERE servicename LIKE ''SQL Server Agent%'' ;

    清单 23-7

    使用 T-SQL 检查确保 SQL Server Agent 正在运行

    ```


    或者，您也可以使用清单 23-8 中的 WQL 查询实现相同的结果。


    ### 注意


    您可以在 [`https://msdn.microsoft.com/en-us/library/aa394606`](https://msdn.microsoft.com/en-us/library/aa394606)
    `(v=vs.85).aspx` 找到 WQL 参考。


    ```

    SELECT State FROM Win32_Service  WHERE Name ="SQLSERVERAGENT$MASTERSERVER"

    清单 23-8

    使用 WQL 检查 SQL Server Agent 是否正在运行

    ```


    要使用 T-SQL 版本的查询，您需要使用 `ExecuteSql()` 函数，该函数接受表 23-1 中的参数。


    表 23-1


    `ExecuteSQL()` 参数


    | 参数 | 描述 |

    | --- | --- |

    | `returnType` | 指定查询的预期返回类型。可接受的值为 `Numeric`、`String`、`Bool`、`DateTime`、`Array`
    和 `GUID`。 |

    | `sqlQuery` | 指定应运行的查询。 |


    要使用 WQL 版本的查询，您需要使用 `ExecuteWql()`，它接受表 23-2 中描述的参数。


    表 23-2


    `ExecuteWQL()` 参数


    | 参数 | 描述 |

    | --- | --- |

    | `returnType` | 指定查询的预期返回类型。可接受的值为 `Numeric`、`String`、`Bool`、`DateTime`、`Array`
    和 `GUID`。 |

    | `namespace` | 指定应针对哪个 WQL 命名空间执行查询。 |

    | `wqlQuery` | 指定应运行的查询。 |


    因此，如果您使用 T-SQL 方法，您的条件将在 PBM 的条件编辑器中使用清单 23-9 中的脚本（它不会直接在 SSMS 中工作）。


    ```

    ExecuteSql(''string'', ''SELECT status_desc FROM sys.dm_server_services WHERE
    servicename LIKE "SQL Server Agent%"'')

    清单 23-9

    ExecuteSQL()

    ```'
