  trans: '### 紧急模式


    如果您的数据库文件损坏到数据库无法访问且无法恢复的程度，即使使用了 `REPAIR_ALLOW_DATA_LOSS` 选项也不行，并且您没有可用的备份，那么您最后的手段就是使用
    `REPAIR_ALLOW_DATA_LOSS` 选项在紧急模式下运行 `DBCC CHECKDB`。请记住，紧急模式是修复数据库的最后手段选项，如果您无法通过此模式访问数据库，那么您将无法通过任何其他方式访问它们。当您在数据库处于紧急模式下执行此操作时，`DBCC
    CHECKDB` 会将因损坏而无法访问的数据页视为没有错误，以尝试恢复数据。


    此操作还可以备份因日志损坏而无法访问的数据库。这是因为它会尝试强制事务日志恢复，即使遇到错误也是如此。如果失败，它会重建事务日志。当然，这可能导致事务不一致，但如前所述，这是一个最后的选择。


    举个例子，我们将在操作系统中删除 `Chapter9` 数据库的事务日志文件。您可以通过运行清单 9-11 中的查询来找到事务日志文件的操作系统位置。


    ```sql

    SELECT physical_name

    FROM sys.master_files

    WHERE database_id = DB_ID(''Chapter9'')

    AND type_desc = ''Log'' ;

    ```

    清单 9-11 查找事务日志路径


    由于数据和日志文件被 SQL Server 进程锁定，我们首先需要停止实例。重新启动实例后，我们可以看到我们的 `Chapter9` 数据库已被标记为“恢复挂起”，如图
    9-13 所示。


    ![../images/333037_2_En_9_Chapter/333037_2_En_9_Fig13_HTML.jpg](img/333037_2_En_9_Fig13_HTML.jpg)

    图 9-13 处于恢复挂起状态的数据库


    由于我们没有 `Chapter9` 数据库的可用备份，我们唯一的选择就是使用紧急模式下的 `DBCC CHECKDB`。清单 9-12 中的脚本将 `Chapter9`
    数据库置于紧急模式，然后使用带有 `REPAIR_ALLOW_DATA_LOSS` 选项的 `DBCC CHECKDB` 来修复错误。


    ```sql

    ALTER DATABASE Chapter9 SET EMERGENCY ;

    GO

    ALTER DATABASE Chapter9 SET SINGLE_USER ;

    GO

    DBCC CHECKDB (''Chapter9'', REPAIR_ALLOW_DATA_LOSS) ;

    GO

    ALTER DATABASE Chapter9 SET MULTI_USER ;

    GO

    ```

    清单 9-12 紧急模式下的 `DBCC CHECKDB`


    如图 9-14 所示的部分结果表明，SQL Server 能够通过重建事务日志使数据库重新联机。然而，这也意味着事务一致性已经丢失，备份链已中断。由于我们失去了事务一致性，我们现在应该运行
    `DBCC CHECKCONSTRAINTS` 来查找外键约束和 CHECK 约束中的错误。本章稍后将介绍 `DBCC CHECKCONSTRAINTS`。


    ![../images/333037_2_En_9_Chapter/333037_2_En_9_Fig14_HTML.jpg](img/333037_2_En_9_Fig14_HTML.jpg)

    图 9-14 紧急模式下 `DBCC CHECKDB` 的结果


    ### 注意


    如果在紧急模式下运行 `DBCC CHECKDB` 失败，那么数据库将无法通过其他方式修复。


    ### 其他用于处理损坏的 DBCC 命令


    还有一些其他 DBCC 命令执行 `DBCC CHECKDB` 所做工作的一个子集。这些将在以下部分讨论。


    #### DBCC CHECKCATALOG


    在 SQL Server 中，系统目录是描述数据库及其内部数据的元数据的集合。运行 `DBCC CHECKCATALOG` 时，它会对此目录执行一致性检查。此命令作为
    `DBCC CHECKDB` 的一部分运行，但也可以作为独立命令运行。作为独立命令运行时，它接受与 `DBCC CHECKDB` 相同的参数，但 `PHYSICAL_ONLY`
    和 `DATA_PURITY` 除外，这些参数对此命令不可用。


    #### DBCC CHECKALLOC


    `DBCC CHECKALLOC` 对数据库内的磁盘分配结构执行一致性检查。它作为 `DBCC CHECKDB` 的一部分运行，但也可以作为独立命令运行。作为独立命令运行时，它接受许多与
    `DBCC CHECKDB` 相同的参数，但 `PHYSICAL_ONLY`、`DATA_PURITY` 和 `REPAIR_REBUILD` 除外，这些参数对此命令不可用。输出按表、索引和分区列出。


    #### DBCC CHECKTABLE


    `DBCC CHECKTABLE` 作为 `DBCC CHECKDB` 的一部分针对数据库中的每个表和索引视图运行。但是，它也可以作为单独的命令针对特定表及其索引运行。它对该特定表执行一致性检查，如果有任何索引视图引用该表，它还会执行跨表一致性检查。它接受与
    `DBCC CHECKDB` 相同的参数，但使用它时，还需要指定要检查的表的名称或 ID。


    ### 谨慎


    我曾见过人们将他们的表分成两组，然后用在隔夜对一半表运行 `DBCC CHECKTABLE` 来代替 `DBCC CHECKDB`。这不仅会在检查内容上留下空白，而且为每个被检查的表都会生成一个新的数据库快照，而不是为所有检查生成一个快照。这可能导致每个表的运行时间更长。


    #### DBCC CHECKFILEGROUP


    `DBCC CHECKFILEGROUP` 对指定文件组内的系统目录、分配结构、表和索引视图执行一致性检查。然而，当表的索引存储在不同的文件组上时，存在一些限制。在这种情况下，索引不会被检查一致性。即使索引存储在您正在检查的文件组上，但对应的基表在另一个文件组上时，此限制同样适用。


    如果您有一个分区表，该表存储在多个文件组上，`DBCC CHECKFILEGROUP` 仅检查存储在被检查文件组上的分区的分区。`DBCC CHECKFILEGROUP`
    的参数与 `DBCC CHECKDB` 相同，但 `DATA_PURITY` 除外，该参数无效，并且您不能指定任何修复选项。您还需要指定文件组名称或 ID。'
- fmt: '### DBCC CHECKIDENT


    `DBCC CHECKIDENT` scans all rows within a specified table to find the highest
    value in the `IDENTITY` column. It then checks to ensure that the next `IDENTITY`
    value, which is stored in a table’s metadata, is higher than the highest value
    in the `IDENTITY` column of the table. `DBCC CHECKIDENT` accepts the arguments
    detailed in Table [9-6](#333037_2_En_9_Chapter.xhtml#Tab6).


    Table 9-6


    DBCC CHECKIDENT Arguments


    | Argument | Description |

    | --- | --- |

    | Table Name | The name of the table to be checked. |

    | `NORESEED` | Returns the maximum value of the `IDENTITY` column and the current
    `IDENTITY` value, but will not reseed the column, even if required. |

    | `RESEED` | Reseeds the current `IDENTITY` value to that of the maximum `IDENTITY`
    value in the table. |

    | New Reseed Value | Used with `RESEED`, specifies a seed for the `IDENTITY` value.
    This should be used with caution, since setting the `IDENTITY` value to lower
    than the maximum value in the table can cause errors to be generated, if there
    is a primary key or unique constraint on the `IDENTITY` column. |

    | `WITH NO_INFOMSGS` | Causes informational messages to be suppressed. |


    We could check the `IDENTITY` value against the maximum `IDENTITY` value in our
    `CorruptTable` table by using the command in Listing [9-13](#333037_2_En_9_Chapter.xhtml#PC14).


    ```

    DBCC CHECKIDENT(''CorruptTable'',NORESEED) ;

    Listing 9-13

    DBCC CHECKIDENT

    ```


    The results, displayed in Figure [9-15](#333037_2_En_9_Chapter.xhtml#Fig15), show
    that both the maximum value in the `IDENTITY` column and the current `IDENTITY`
    value are both `10201`, meaning that there is not currently an issue with the
    `IDENTITY` value in our table.


    ![../images/333037_2_En_9_Chapter/333037_2_En_9_Fig15_HTML.jpg](images/333037_2_En_9_Chapter/333037_2_En_9_Fig15_HTML.jpg)


    Figure 9-15


    DBCC CHECKIDENT results


    ### DBCC CHECKCONSTRAINTS


    `DBCC CHECKCONSTRAINTS` can check the integrity of a specific foreign key or check
    constraint within a table, check all constraints on a single table, or check all
    constraints on all tables of a database. `DBCC CHECKCONSTRAINTS` accepts the arguments
    detailed in Table [9-7](#333037_2_En_9_Chapter.xhtml#Tab7).


    Table 9-7


    DBCC CHECKCONSTRAINTS Arguments


    | Argument | Description |

    | --- | --- |

    | Table or Constraint | Specifies either the name or ID of the constraint you
    wish to check or specifies the name or ID of a table to check all enabled constraints
    on that table. Omitting this argument causes all enabled constraints on all tables
    within the database to be checked. |

    | `ALL_CONSTRAINTS` | If `DBCC CHECKCONSTRAINTS` is being run against an entire
    table or entire database, then this option forces disabled constraints to be checked
    as well as enabled ones. |

    | `ALL_ERRORMSGS` | By default, if `DBCC CHECKCONSTRAINTS` finds rows that violate
    a constraint, it returns the first 200 of these rows. Specifying `ALL_ERRORMSGS`
    causes all rows violating the constraint to be returned, even if this number exceeds
    200. |

    | `NO_INFOMSGS` | Causes informational messages to be suppressed. |


    The script in Listing [9-14](#333037_2_En_9_Chapter.xhtml#PC15) creates a table
    called `BadConstraint` and inserts a single row. It then creates a check constraint
    on the table, with the `NOCHECK` option specified, which allows us to create a
    constraint that is immediately violated by the existing row that we have already
    added. Finally, we run `DBCC CHECKCONSTRAINTS` against the table.


    ```

    USE Chapter9

    GO

    --Create the BadConstraint table

    CREATE TABLE dbo.BadConstraint

    (

    ID        INT PRIMARY KEY

    ) ;

    --Insert a negative value into the BadConstraint table

    INSERT INTO dbo.BadConstraint

    VALUES(-1) ;

    --Create a CHECK constraint, which enforces positive values in the ID column

    ALTER TABLE dbo.BadConstraint WITH NOCHECK ADD CONSTRAINT chkBadConstraint CHECK
    (ID > 0) ;

    GO

    --Run DBCC CHECKCONSTRAINTS against the table

    DBCC CHECKCONSTRAINTS(''dbo.BadConstraint'') ;

    Listing 9-14

    DBCC CHECKCONSTRAINTS

    ```


    The results of running this script are shown in Figure [9-16](#333037_2_En_9_Chapter.xhtml#Fig16).
    You can see that `DBCC CHECKCONSTRAINTS` has returned the details of the row that
    breaches the constraint.


    ![../images/333037_2_En_9_Chapter/333037_2_En_9_Fig16_HTML.jpg](images/333037_2_En_9_Chapter/333037_2_En_9_Fig16_HTML.jpg)


    Figure 9-16


    DBCC CHECKCONSTRAINTS results


    ### Tip


    After running `DBCC CHECKDB` or other DBCC commands to repair corruption, it is
    good practice to run `DBCC CHECKCONSTRAINTS`. This is because the repair options
    of the DBCC commands do not take constraint integrity into account.


    Even if `DBCC CHECKCONSTRAINTS` does not find any bad data, it still does not
    mark the constraint as trusted. You must do this manually. The script in Listing
    [9-15](#333037_2_En_9_Chapter.xhtml#PC16) first runs a query to see if the constraint
    is trusted and then manually marks it as trusted.


    ```

    SELECT

    is_not_trusted

    FROM sys.check_constraints

    WHERE name = ''chkBadConstraint'' ;

    ALTER TABLE dbo.BadConstraint WITH CHECK CHECK CONSTRAINT chkDadConstraint ;

    Listing 9-15

    Marking a Constraint as Trusted

    ```


    ### Consistency Checks on VLDBs


    If you have VLDBs (very large databases), then it may be difficult to find a maintenance
    window long enough to run `DBCC CHECKDB`, and running it while users or ETL processes
    are connected is likely to cause performance issues. You may also encounter a
    similar issue if you have a large estate of smaller databases that are using a
    common infrastructure, such as a SAN or a private cloud. Ensuring that your databases
    are consistent, however, should be a priority near the top of your agenda, so
    you should try and find a strategy that achieves both your maintenance and performance
    goals. The following sections discuss strategies that you may choose to adopt
    to achieve this balance.


    #### DBCC CHECKDB with PHYSICAL_ONLY


    One strategy that you can adopt is to run `DBCC CHECKDB` regularly, ideally nightly,
    using the `PHYSICAL_ONLY` option, and then run a complete check on a periodic
    but less-frequent basis, ideally weekly. When you run `DBCC CHECKDB` with the
    `PHYSICAL_ONLY` option, consistency checks are carried out of system catalogs
    and allocation structures, and each page of every table is scanned and validated.
    The net result of this is that corruption caused by IO errors is trapped, but
    other issues, such as logical consistency errors, are identified. This is why
    it is important to still run a full scan weekly.


    #### Backing Up WITH CHECKSUM and DBCC CHECKALLOC


    If you are in a position where all of your databases have a full backup every
    night and all are configured with a `PAGE_VERIFY` option of `CHECKSUM`, then an
    alternative approach to the one mentioned in the previous section is to add the
    `WITH CHECKSUM` option to your full backups, followed by a `DBCC CHECKALLOC`,
    to replace the `DBCC CHECKDB`, with the `PHYSICAL_ONLY` option specified on a
    nightly basis. The `DBCC CHECKALLOC` command, which is actually a subset of the
    `DBCC CHECKDB` command, validates the allocation structures within the database.
    When the full backups are taken `WITH CHECKSUM`, then this fulfills the requirement
    to scan and verify each page of every table for IO errors. Just like running `DBCC
    CHECKDB`, with the `PHYSICAL_ONLY` option specified, this identifies any corruption
    caused by IO operations and identifies any bad checksums. Any page errors that
    occurred in memory, however, are not identified. This means that like the `PHYSICAL_ONLY`
    strategy, you still require a full run of `DBCC CHECKDB` once a week to trap logical
    consistency errors or corruptions that occurred in memory. This option is very
    useful if you have an environment with common infrastructure and you are performing
    full nightly backups of all databases, since you will reduce the overall amount
    of IO on a nightly basis. This is at the expense of the duration of your backup
    window, however, and it increases the resources used during this time.'
