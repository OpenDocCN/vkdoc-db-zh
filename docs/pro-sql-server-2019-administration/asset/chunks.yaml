    # 第 15 章 实施日志传送


    正如第 13 章所讨论的，日志传送是一项可用于实现灾难恢复和横向扩展只读报告的技术。其工作原理是获取数据库的事务日志备份，将它们复制到一个或多个辅助服务器，然后进行还原，以保持辅助服务器同步。本章将演示如何为灾难恢复（DR）实施日志传送。你还将了解如何监视和故障转移日志传送。


    > **注意：** 为便于本章的演示，我们将使用一个域，该域包含一个域控制器和四台独立服务器，每台服务器都安装了 SQL Server 实例。服务器\实例名称分别为
    `PRIMARYSERVER\PROSQLADMIN`、`DRSERVER\PROSQLDR`、`REPORTSERVER\PROSQLREPORTS` 和
    `MONITORSERVER\PROSQLMONITOR`。


    ## 为灾难恢复实施日志传送


    在我们开始为灾难恢复实施日志传送之前，我们首先创建一个用于本章演示的数据库。代码清单 15-1 中的脚本创建了一个名为 `Chapter15` 的数据库，其恢复模式设置为
    `FULL`。我们在数据库内创建一个表并向其填充数据。


    ```sql

    --Create the database

    CREATE DATABASE Chapter15;

    GO

    ALTER DATABASE Chapter15 SET RECOVERY FULL;

    GO

    USE Chapter15

    GO

    --Create and populate numbers table

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE;

    --Create and populate name pieces

    DECLARE @Names TABLE

    (

    FirstName        VARCHAR(30),

    LastName        VARCHAR(30)

    );

    INSERT INTO @Names

    VALUES(''Peter'', ''Carter''),

    (''Michael'', ''Smith''),

    (''Danielle'', ''Mead''),

    (''Reuben'', ''Roberts''),

    (''Iris'', ''Jones''),

    (''Sylvia'', ''Davies''),

    (''Finola'', ''Wright''),

    (''Edward'', ''James''),

    (''Marie'', ''Andrews''),

    (''Jennifer'', ''Abraham'') ;

    --Create and populate Customers table

    CREATE TABLE dbo.Customers

    (

    CustomerID          INT            NOT NULL    IDENTITY    PRIMARY KEY,

    FirstName           VARCHAR(30)    NOT NULL,

    LastName            VARCHAR(30)    NOT NULL,

    BillingAddressID    INT            NOT NULL,

    DeliveryAddressID   INT            NOT NULL,

    CreditLimit         MONEY          NOT NULL,

    Balance             MONEY          NOT NULL

    );

    SELECT * INTO #Customers

    FROM

    (SELECT

    (SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName,

    (SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) BillingAddressID,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) DeliveryAddressID,

    (SELECT TOP 1 CAST(RAND() * Number AS INT) * 10000

    FROM @Numbers

    ORDER BY NEWID()) CreditLimit,

    (SELECT TOP 1 CAST(RAND() * Number AS INT) * 9000

    FROM @Numbers

    ORDER BY NEWID()) Balance

    FROM @Numbers a

    CROSS JOIN @Numbers b

    ) a;

    INSERT INTO dbo.Customers

    SELECT * FROM #Customers;

    GO

    ```


    **代码清单 15-1** 创建用于日志传送的数据库


    出于本次演示的目的，我们希望为 `Chapter15` 数据库配置灾难恢复，使其恢复点目标（RPO）为 10 分钟。同时，我们将在 DR 服务器上实现 10
    分钟的加载延迟。这意味着，如果应用团队在发生导致数据丢失的事件（例如，用户意外删除了表中的行）后立即通知我们，那么我们能够在包含错误事务的日志被还原之前，利用
    DR 服务器上的数据来纠正问题。


    ### GUI 配置


    我们可以通过 SQL Server Management Studio（SSMS）为 `Chapter15` 数据库配置日志传送。为此，我们从数据库的右键上下文菜单中选择**属性**，并导航到**事务日志传送**页面，如图
    15-1 所示。此页面上的首要任务是选中**启用此为日志传送配置中的主数据库**复选框。


    ![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig1_HTML.jpg](img/333037_2_En_15_Fig1_HTML.jpg)


    **图 15-1** 事务日志传送页面


    现在，我们可以使用**备份设置**按钮来显示**事务日志备份设置**屏幕。在此屏幕上，我们输入用于存储日志传送所生成日志备份的共享文件夹的 UNC（通用命名约定）路径。由于此共享文件夹实际上配置在我们的主服务器上，因此我们还需要在下方的字段中输入本地路径。用于运行备份作业的帐户需要被授予对此共享文件夹的读取和更改权限。默认情况下，这将是
    SQL Server 服务帐户，但为了更精细的安全性，可以将日志传送作业配置为在代理帐户下运行。代理帐户将在第 22 章讨论。


    然后，我们配置备份文件在删除前需要保留多长时间。你选择的值取决于你企业的需求，但如果你的备份文件被卸载到磁带，那么你应该让文件保留足够长的时间以允许企业备份作业运行，并且可能还需要为其失败后在下一个周期成功预留足够的时间。你还应考虑对临时还原的需求。例如，如果一个项目发现数据问题并请求还原，你希望能够从本地磁盘检索相关的备份（如果可能的话）。因此，请考虑在
    SQL Server 删除备份的本地副本之前，应给予项目多长时间来发现问题并请求还原。备份策略将在第 12 章进一步讨论。


    你还应指定如果未发生日志备份，希望在多久后生成警报。为了能收到任何备份失败的通知，你可以将该值配置为比你的备份计划时间长一分钟。然而，在某些环境中，错过几次备份可能是可以接受的。在这种情况下，你可以将值设置为更大的间隔，以便在维护窗口和其他类似情况下不会被备份失败的警报淹没。


    **设置备份压缩**下拉列表决定是否应使用备份压缩来减少网络流量。默认是从实例继承配置，但你可以通过明确选择使用或不使用它来覆盖日志传送作业所进行的备份的设置。**事务日志备份设置**屏幕如图
    15-2 所示。


    ![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig2_HTML.jpg](img/333037_2_En_15_Fig2_HTML.jpg)


    **图 15-2** 事务日志备份设置屏幕


    点击**计划**按钮将调用**新建作业计划**屏幕。如图 15-3 所示，这个屏幕是用于创建作业计划的标准 SQL Server Agent 界面，只不过它已预先填入了日志传送备份作业的默认名称。由于我们试图实现
    10 分钟的 RPO，我们将备份作业配置为每 5 分钟运行一次。这是因为我们还需要留出时间让复制作业运行。在灾难恢复规划中，我们不能假定主服务器始终可用以供我们检索日志备份。


    ![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig3_HTML.jpg](img/333037_2_En_15_Fig3_HTML.jpg)


    **图 15-3**

    '
- fmt: '# The New Job Schedule screen and Log Shipping Configuration


    After returning to the Transaction Log Shipping page, we can use the Add button
    to configure the secondary server(s) for our Log Shipping topology. Using this
    button causes the Secondary Database Settings page to display. This page consists
    of three tabs. The first of these is the Initialize Secondary Database tab, which
    is displayed in Figure [15-4](#333037_2_En_15_Chapter.xhtml#Fig4).


    ## Initialize Secondary Database Tab


    On this tab, we configure how we want to initialize our secondary database. We
    can pre-initialize our databases by taking a full backup of the database and then
    manually restoring them to the secondary server using the `NORECOVERY` option.
    In this kind of instance, we would select the No, The Secondary Database Is Initialized
    option.


    If we already have a full backup available, then we can place it in a file share
    that the SQL Server service account has read and modify permissions on and then
    use the Yes, Restore An Existing Backup Of The Primary Database Into The Secondary
    Database option and specify the location of the backup file.


    In our case, however, we do not have an existing full backup of the `Chapter15`
    database, so we select the option to Yes, Generate A Full Backup Of The Primary
    Database And Restore It To The Secondary Database. This causes the Restore Options
    window to display; it is here where we enter the locations that we want the database
    and transaction log files to be created on the secondary server, as illustrated
    in Figure [15-4](#333037_2_En_15_Chapter.xhtml#Fig4).


    ![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig4_HTML.jpg](images/333037_2_En_15_Chapter/333037_2_En_15_Fig4_HTML.jpg)


    **Figure 15-4** The Initialize Secondary Database tab


    ## Copy Files Tab


    On the Copy Files tab, illustrated in Figure [15-5](#333037_2_En_15_Chapter.xhtml#Fig5),
    we configure the job that is responsible for copying the transaction log files
    from the primary server to the secondary server(s). First, we specify the share
    on the secondary server to which we will copy the transaction logs. The account
    that runs the copy job must be configured with read and modify permissions on
    the share. Just like the backup job, this job defaults to running under the context
    of the SQL Server service account, but you can also configure it to run under
    a proxy account.


    We also use this tab to configure how long the backup files should be retained
    on the secondary server before they are deleted. I usually recommend keeping this
    value in line with the value that you specify for retaining the backups on the
    primary server for consistency.


    ![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig5_HTML.jpg](images/333037_2_En_15_Chapter/333037_2_En_15_Fig5_HTML.jpg)


    **Figure 15-5** The Copy Files tab


    The `Job Name` field is automatically populated with the default name for a log
    shipping copy job, and, using the Schedule button, you can invoke the New Job
    Schedule screen, where you can configure the schedule for the copy job. As illustrated
    in Figure [15-6](#333037_2_En_15_Chapter.xhtml#Fig6), we have configured this
    job to run every 5 minutes, which is in line with our RPO requirement of 10 minutes.
    It takes 5 minutes before the log is backed up, and then another 5 minutes before
    it is moved to the secondary server. Once the file has been moved to the secondary
    server, we can be confident that, except in the most extreme circumstances, we
    will be able to retrieve the backup from either the primary or the secondary server,
    thus achieving our 10-minute RPO.


    ![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig6_HTML.jpg](images/333037_2_En_15_Chapter/333037_2_En_15_Fig6_HTML.jpg)


    **Figure 15-6** The New Job Schedule screen


    ## Restore Transaction Log Tab


    On the Restore Transaction Log tab, we configure the job that is responsible for
    restoring the backups on the secondary server. The most important option on this
    screen is what database state we choose when restoring. Selecting the No Recovery
    Mode option is the applicable choice for a DR server. This is because if you choose
    Standby Mode, uncommitted transactions are saved to a Transaction Undo File, which
    means the database can be brought online in read-only mode (as discussed in Chapter
    [13](#333037_2_En_13_Chapter.xhtml)). However, this action increases the recovery
    time, because these transactions then need to be reapplied before the redo phase
    of the next restore.


    On this tab, we also use the `Delay Restoring Backups For At Least` option to
    apply the load delay, which gives users a chance to report data issues. We can
    also specify how long the delay should be before we are alerted that no restore
    operation has occurred. The Restore Transaction Log tab is illustrated in Figure
    [15-7](#333037_2_En_15_Chapter.xhtml#Fig7).


    ![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig7_HTML.jpg](images/333037_2_En_15_Chapter/333037_2_En_15_Fig7_HTML.jpg)


    **Figure 15-7** The Restore Transaction Log tab


    The Schedule button invokes the New Job Schedule screen, displayed in Figure [15-8](#333037_2_En_15_Chapter.xhtml#Fig8).
    On this screen, we can configure the job schedule for the restore of our transaction
    logs. Although doing so is not mandatory, for consistency, I usually recommend
    configuring this value so it is the same as the backup and copy jobs.


    ![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig8_HTML.jpg](images/333037_2_En_15_Chapter/333037_2_En_15_Fig8_HTML.jpg)


    **Figure 15-8** New Job Schedule screen


    ## Monitor Server Configuration


    Once back on the Transaction Log Shipping page, we need to decide if we want to
    implement a monitor server. This option allows us to configure an instance, which
    acts as a centralized point for monitoring our Log Shipping topology. This is
    an important decision to make at this point, because after the configuration is
    complete, there is no official way to add a monitor server to the topology without
    tearing down and reconfiguring log shipping.


    ### Tip


    It is technically possible to force in a monitor server at a later time, but the
    process involves manually updating log shipping metadata tables in `MSDB`. Therefore,
    it is not recommended or supported.


    To add a monitor server, we check the option to Use A Monitor Server Instance
    and enter the server\instance name. Clicking the Settings button causes the Log
    Shipping Monitor Settings screen to display. We use this screen, shown in Figure
    [15-9](#333037_2_En_15_Chapter.xhtml#Fig9), to configure how connections are made
    to the monitor server and the history retention settings.


    ![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig9_HTML.jpg](images/333037_2_En_15_Chapter/333037_2_En_15_Fig9_HTML.jpg)


    **Figure 15-9** The Log Shipping Monitor Settings screen


    ## Completing the Configuration


    Now that our Log Shipping topology is fully configured, we can choose to script
    the configuration, which can be helpful for the purposes of documentation and
    change control. We can then complete the configuration. The progress of the configuration
    displays in the Save Log Shipping Configuration window (see Figure [15-10](#333037_2_En_15_Chapter.xhtml#Fig10)).
    Once configuration is complete, we should check this window for any errors that
    may have occurred during configuration and resolve them as needed. The most common
    cause of issues with log shipping configuration tends to be permissions related,
    so we need to ensure that the SQL Server service account (or proxy account) has
    the correct permissions on the file shares and instances before we continue.


    ![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig10_HTML.jpg](images/333037_2_En_15_Chapter/333037_2_En_15_Fig10_HTML.jpg)


    **Figure 15-10** The Save Log Shipping Configuration page'
