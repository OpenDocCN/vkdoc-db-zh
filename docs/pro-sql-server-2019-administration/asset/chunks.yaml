    #### Creating a Simple SQL Server Agent Job


    We start by creating a simple Server Agent job, which uses an operating system
    command to delete backup files that are older than 30 days, and schedule this
    job to run on a monthly basis. We create the SQL Server Agent artifacts using
    the New Job dialog box. To invoke this dialog box, drill through SQL Server Agent
    in Object Explorer, and select New Job from the Jobs context menu. Figure [22-2](#333037_2_En_22_Chapter.xhtml#Fig2)
    illustrates the General page of the New Job dialog box.


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig2_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig2_HTML.jpg)


    Figure 22-2


    The General page


    On this page, we name our job DeleteOldBackups and change the job owner to be
    the sa account. We can also optionally add a description for the job and choose
    a category.


    On the Steps page, we use the New button to invoke the New Job Step dialog box.
    The General tab of this dialog box is illustrated in Figure [22-3](#333037_2_En_22_Chapter.xhtml#Fig3).


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig3_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig3_HTML.jpg)


    Figure 22-3


    The General page


    On this page, we give our job step a name, specify that the step is an operating
    system command in the Type drop-down, and confirm in the Run As drop-down that
    the step runs under the security context of the SQL Server Agent service account.
    In the Command section, we enter a batch command, which deletes all files from
    our default backup location that are older than 30 days and have a file extension
    of `.bak`. You can find this batch command in Listing [22-3](#333037_2_En_22_Chapter.xhtml#PC3).


    ```

    forfiles -p "C:\Program Files\Microsoft SQL Server\MSSQL12.MASTERSERVER\MSSQL\Backup"
    -s -m *.bak /D -30 /C "cmd /c del @path"

    Listing 22-3

    Removing Old Backups

    ```


    On the Advanced page of the New Job Step dialog box, shown in Figure [22-4](#333037_2_En_22_Chapter.xhtml#Fig4),
    we leave the default settings. We could use this page, however, in more complex
    scenarios, to configure logging and to control decision-tree logic. We discuss
    this in the next section.


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig4_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig4_HTML.jpg)


    Figure 22-4


    The Advanced page


    Once we have configured our job step, we can exit out of the New Job Step dialog
    box and return to the New Job dialog box. Here, we now move to the Schedules page.
    On this page, we use the New button to invoke the New Job Schedule dialog box,
    illustrated in Figure [22-5](#333037_2_En_22_Chapter.xhtml#Fig5).


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig5_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig5_HTML.jpg)


    Figure 22-5


    The New Job Schedule dialog box


    In the New Job Schedule dialog box, we first enter a name for our schedule. The
    default schedule type is Recurring, but the screen changes dynamically if we choose
    other options. In the Frequency section of the screen, we select Monthly. Again,
    the screen changes dynamically if we select weekly or daily in this drop-down.


    We can now configure the date and time that we would like the schedule to invoke
    job execution. In our scenario, we leave the default option of midnight, on the
    first day of each month.


    On the Notifications page of the New Job dialog box, we configure any actions
    that we want to occur when the job completes. As illustrated in Figure [22-6](#333037_2_En_22_Chapter.xhtml#Fig6),
    we configure an entry to write to the Windows Application Log if the job fails.
    This is an especially useful option if your enterprise is managed by a monitoring
    tool such as SCOM, because you can configure SCOM to monitor for a failure entry
    in the Windows application log and send an alert to the DBA team. In the next
    section, we discuss how to configure e-mail notifications directly from SQL Server
    Agent.


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig6_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig6_HTML.jpg)


    Figure 22-6


    The Notifications page'
