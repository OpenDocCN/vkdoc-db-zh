    ## Restoring a Database


    You can restore a database either through SSMS or via T-SQL. We explore both of
    these options in the following sections.


    ### Restoring in SQL Server Management Studio


    To begin a restore in SSMS, select Restore Database from the context menu of Databases
    in Object Explorer. This causes the General page of the Restore Database dialog
    box to display, as illustrated in Figure [12-5](#333037_2_En_12_Chapter.xhtml#Fig5).
