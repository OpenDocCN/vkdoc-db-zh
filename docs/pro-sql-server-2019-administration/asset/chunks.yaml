    # 日志碎片化


    当因完整恢复模型中的备份或简单恢复模型中的检查点操作导致日志被截断时，实际发生的是任何可重用的虚拟日志文件（VLF）被截断。VLF 可能无法被重用的原因包括：包含与活动事务关联的日志记录的
    VLF，或者包含尚未发送到复制或 AlwaysOn 拓扑中其他数据库的事务的 VLF。类似地，如果缩小日志文件，则会从文件末尾移除 VLF，直到遇到第一个活动的
    VLF。


    对于日志文件内的最佳 VLF 数量，没有硬性规定，但对于大型事务日志（达到数十 GB 范围），我尝试维持大约每 GB 两个 VLF。对于较小的事务日志，这个比率可能会更高。如果
    VLF 过多，你可能会观察到任何使用事务日志的活动性能下降。另一方面，VLF 过少也可能带来问题。在这种情况下，如果每个 VLF 达到数 GB 大小，那么每个
    VLF 被截断时，将需要大量时间来清除，在此过程中你可能会观察到系统变慢。因此，对于大型日志文件，建议以 8GB 为块来增长事务日志，以维持 VLF 的最佳数量和大小。


    为了演示这一现象，我们将创建一个名为 `Chapter6LogFragmentation` 的新数据库，该数据库在主文件组上有一个名为 `Inserts`
    的表，然后使用清单 6-17 中的脚本用 100 万行填充它。这将导致创建大量 VLF，从而对性能产生负面影响。


    ```sql

    --创建 Chapter6LogFragmentation 数据库

    CREATE DATABASE [Chapter6LogFragmentation]

    CONTAINMENT = NONE

    ON  PRIMARY

    ( NAME = N''Chapter6LogFragmentation'', FILENAME = N''F:\MSSQL\MSSQL15.PROSQLADMIN\MSSQL\DATA\Chapter6LogFragmentation.mdf'',
    SIZE = 5120KB, FILEGROWTH = 1024KB )

    LOG ON

    ( NAME = N''Chapter6LogFragmentation_log'', FILENAME = N''E:\MSSQL\MSSQL15.PROSQLADMIN\MSSQL\DATA\Chapter6LogFragmentation_log.ldf'',
    SIZE = 1024KB, FILEGROWTH = 10%);

    GO

    USE Chapter6LogFragmentation

    GO

    --创建 Inserts 表

    CREATE TABLE dbo.Inserts

    (ID        INT        IDENTITY,

    DummyText    NVARCHAR(50)

    );

    --创建一个 Numbers 表来辅助填充数据

    DECLARE @Numbers TABLE

    (

    Number    INT

    )

    --填充 Numbers 表

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number +1

    FROM CTE

    WHERE Number <= 99

    )

    INSERT INTO @Numbers

    SELECT *

    FROM CTE;

    --用虚拟文本填充示例表，共 100 行

    INSERT INTO dbo.Inserts

    SELECT ''DummyText''

    FROM @Numbers a

    CROSS JOIN @Numbers b

    CROSS JOIN @Numbers c;

    ```

