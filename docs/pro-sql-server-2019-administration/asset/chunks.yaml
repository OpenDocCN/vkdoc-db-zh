    ## Summary


    `Filegroup`s are logical containers for data files. Special `filegroup`s also
    exist for `FILESTREAM`/`FileTable` data and for memory-optimized data. When tables
    and indexes are created, they are created on a `filegroup` as opposed to a file,
    and the data in the object is distributed evenly across the files within that
    `filegroup`.


    You can adopt various strategies for `filegroup`s to assist with performance,
    backup/restore activities, or even storage tiering. For performance, you can either
    choose to place frequently joined objects into separate `filegroup`s or distribute
    all objects across all spindles on the server in order to maximize IO throughput.


    To support backups of very large databases when there is a limited maintenance
    window, you can split data across `filegroup`s and you can back up those `filegroup`s
    on alternate nights. To improve recovery times for critical data, you can isolate
    critical data in a separate `filegroup` and then restore it before other `filegroup`s.


    To support manual storage tiering, implement table partitioning so that each partition
    is stored on a separate `filegroup`. You can then place the files within each
    `filegroup` on an appropriate storage device.


    Both `FILESTREAM` and memory-optimized `filegroup`s point to folders in the operating
    system, as opposed to containing files. Each folder location is known as a container.
    For memory-optimized `filegroup`s, consider having two containers for each disk
    array you use in order to evenly distribute IO.


    You can expand and shrink data files. Shrinking files, especially auto-shrink,
    however, is considered bad practice and can result in serious fragmentation issues,
    which lead to performance problems. When expanding files, you should use larger
    increments to reduce repeated overhead.


    You can also expand and shrink log files, although it is rare that you need to
    shrink them. Expanding log files in small increments can lead to log fragmentation,
    which is where your log file contains a vast amount of `VLF`s. You can resolve
    log fragmentation by shrinking the log and then growing it again in larger increments.


    # 7. Table Optimizations


    During the lifecycle of your data-tier applications, you may need to perform a
    number of maintenance tasks and performance optimizations against the tables that
    hold your application’s data. These operations may include partitioning a table,
    compressing a table, or migrating data to a memory-optimized table. In this chapter,
    we will explore these three concepts in detail.


    ## Table Partitioning


    *Partitioning* is a performance optimization for large tables and indexes that
    splits the object horizontally into smaller units. When the tables or indexes
    are subsequently accessed, `SQL Server` can perform an optimization called *partition
    elimination*, which allows only the required partitions to be read, as opposed
    to the entire table. Additionally, each partition can be stored on a separate
    `filegroup`; this allows you to store different partitions on different storage
    tiers. For example, you can store older, less frequently accessed data on less
    expensive storage. Figure [7-1](#333037_2_En_7_Chapter.xhtml#Fig1) illustrates
    how a large `Orders` table may be structured.


    ![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig1_HTML.jpg](images/333037_2_En_7_Chapter/333037_2_En_7_Fig1_HTML.jpg)


    Figure 7-1


    Partitioning structure


    ### Partitioning Concepts


    Before drilling into the technical implementation of partitioning, it helps if
    you understand the concepts, such as partitioning keys, partition functions, partition
    schemes, and partition alignment. These concepts are discussed in the following
    sections.'
