- fmt: '### Caution


    `physloc`函数是未文档化的。因此，Microsoft不会提供对它们使用的技术支持。


    标准数据和索引存储在一系列 8KB 页面中；这些页面由包含页面元数据的 96 字节页眉和用于存储数据本身的 8096 字节组成。这些 8KB 页面然后被组织成八个连续页面的单元，合在一起称为一个区（extent）。一个*区（extent）*
    是 SQL Server 可以从磁盘读取的最小单位。


    ### FILESTREAM Filegroups


    FILESTREAM 是一种允许您以非结构化方式存储二进制数据的技术。二进制数据通常存储在操作系统中，而不是数据库中，而 FILESTREAM 使您能够继续这样做，同时在这类非结构化数据与存储在数据库中的结构化元数据之间提供事务一致性。使用此技术将使您能够克服
    SQL Server 单个对象 2GB 的最大大小限制。对于大型二进制对象，您还将看到比将其存储在数据库中更好的性能。如果文件大小超过 1MB，使用 FILESTREAM
    的读取性能可能会更快。


    然而，您需要记住，使用 FILESTREAM 存储的对象使用的是 Windows 缓存，而不是 SQL Server 缓冲区缓存。这样做的好处是，您不会有大文件填满缓冲区缓存，导致其他数据被刷写到缓冲区缓存扩展或磁盘。另一方面，这意味着在为实例配置“最大服务器内存”设置时，您应该记住，如果您计划缓存这些对象，Windows
    需要额外的内存，因为使用的是 Windows 二进制缓存，而不是 SQL Server 的缓冲区缓存。


    FILESTREAM 数据需要单独的文件组。这些文件组不包含文件，而是指向操作系统中的文件夹位置。每个位置称为一个*容器（container）*。必须在实例上启用
    FILESTREAM 才能创建 FILESTREAM 文件组。您可以在实例设置期间执行此操作，如第 2 章所述，或者可以在 SQL Server Management
    Studio 的实例属性中配置它。


    我们可以通过使用“数据库属性”对话框的“文件组”选项卡上的“添加文件组”按钮，然后在“名称”字段中为文件组添加名称，如图 6-3 所示，将 FILESTREAM
    文件组添加到我们的 Chapter6 数据库。


    ![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig3_HTML.jpg](images/333037_2_En_6_Chapter/333037_2_En_6_Fig3_HTML.jpg)


    图 6-3  文件组选项卡


    然后，我们可以使用“数据库属性”对话框的“文件”选项卡来添加容器。在这里，我们需要为容器输入一个名称，并将文件类型指定为 FILESTREAM 数据。然后，我们可以从“文件组”下拉框中选择我们的
    FILESTREAM 文件组，如图 6-4 所示。


    ![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig4_HTML.jpg](images/333037_2_En_6_Chapter/333037_2_En_6_Fig4_HTML.jpg)


    图 6-4  文件选项卡


    我们可以通过运行清单 6-2 中的 T-SQL 命令来实现相同的结果。该脚本创建一个 FILESTREAM 文件组，然后添加一个容器。您应该更改脚本中的目录以匹配您自己的配置。


    ```sql

    ALTER DATABASE [Chapter6] ADD FILEGROUP [Chapter6_FS_FG] CONTAINS FILESTREAM;

    GO

    ALTER DATABASE [Chapter6] ADD FILE ( NAME = N''Chapter6_FA_File1'', FILENAME =
    N''F:\MSSQL\MSSQL15.PROSQLADMIN\MSSQL\DATA\Chapter6_FA_File1'' ) TO FILEGROUP
    [Chapter6_FS_FG];

    GO

    ```


    清单 6-2  添加 FILESTREAM 文件组


    为了探索 FILESTREAM 容器的文件夹结构，我们首先需要创建一个表并填充数据。清单 6-3 中的脚本创建了一个表，该表包含一个唯一标识符（所有包含 FILESTREAM
    数据的表都需要此标识符）、二进制对象的文本描述，以及一个我们将用于存储本章前面图 6-1 中插图的 `VARBINARY(MAX)` 列。我们使用的文件并不重要，因此要自己运行脚本，请将正在导入文件的名称和位置更改为系统上的文件。


    ```sql

    USE Chapter6

    GO

    CREATE TABLE dbo.FilestreamExample

    (

    ID                UNIQUEIDENTIFIER ROWGUIDCOL NOT NULL UNIQUE,

    PictureDescription    NVARCHAR(500),

    Picture              VARBINARY(MAX) FILESTREAM

    );

    GO

    INSERT INTO FilestreamExample

    SELECT NEWID(), ''Figure 6-1. Diagram showing the SQL Server storage hierachy.'',
    * FROM

    OPENROWSET(BULK N''c:\Figure_6-1.jpg'', SINGLE_BLOB) AS import;

    ```


    清单 6-3  创建包含 FILESTREAM 数据的表


    ### Note


    我们使用了 `UNIQUE` 约束，而不是主键，因为 GUID 通常不是一个好的主键选择。如果表必须有主键，添加一个指定 `IDENTITY` 属性的额外整数列可能更合理。我们使用了
    GUID 并设置了 `ROWGUIDCOL` 属性，因为这是 SQL Server 映射到 FILESTREAM 对象所必需的。


    如果我们现在在文件系统中打开容器的位置，我们可以看到我们有一个文件夹，其名称是一个 GUID。这代表我们创建的表。在这个文件夹内是另一个同样具有 GUID
    名称的文件夹。此文件夹代表我们创建的 `FILESTREAM` 列。在此文件夹中，我们将找到一个文件，该文件是我们插入到列中的图片。此文件的名称是文件创建时的日志序列号。理论上可以将此文件的扩展名更改为原始扩展名，然后打开它。但是，这当然不推荐，因为它可能在
    SQL Server 中产生不良影响。在容器的根级别，您还会找到一个名为 `filestream.hdr` 的文件，其中包含容器的元数据，以及一个名为 `$FSLog`
    的文件夹。此文件夹包含构成 FILESTREAM 事务日志等效项的一系列文件。此文件夹层次结构如图 6-5 所示。'
  raw: '### Caution


    The `physloc` functions are undocumented. Therefore, Microsoft will not provide
    support for their use.


    Standard data and indexes are stored in a series of 8KB pages; these are made
    up of a 96-byte header that contains metadata about the page and 8096 bytes for
    storing the data itself. These 8KB pages are then organized into units of eight
    continuous pages, which together are called an extent. An *extent* is the smallest
    unit the SQL Server can read from disk.


    ### FILESTREAM Filegroups


    FILESTREAM is a technology that allows you to store binary data in an unstructured
    manner. Binary data is often stored in the operating system, as opposed to the
    database, and FILESTREAM gives you the ability to continue this while at the same
    time offering transactional consistency between this unstructured data and the
    structured metadata stored in the database. Using this technology will allow you
    to overcome SQL Server’s 2GB maximum size limitation for a single object. You
    will also see a performance improvement for large binary objects over storing
    them in the database. If files are over 1MB in size, the read performance is likely
    to be faster with FILESTREAM.


    You do need to bear in mind, however, that objects stored with FILESTREAM use
    Windows cache instead of the SQL Server buffer cache. This has the advantage that
    you do not have large files filling up your buffer cache causing other data to
    be flushed to either the buffer cache extension or to disk. On the flip side,
    it means that when you are configuring the Max Server Memory setting for the instance,
    you should remember that Windows requires extra memory if you plan to cache the
    objects, because the binary cache in Windows is used, as opposed to SQL Server’s
    buffer cache.


    Separate filegroups are required for FILESTREAM data. Instead of containing files,
    these filegroups point to folder locations in the operating system. Each of these
    locations is called a *container* . FILESTREAM must be enabled on the instance
    in order to create a FILESTREAM filegroup. You can do this during the setup of
    the instance, as discussed in Chapter [2](#333037_2_En_2_Chapter.xhtml), or you
    can configure it in the properties of the instance in SQL Server Management Studio.


    We can add a FILESTREAM filegroup to our Chapter6 database by using the Add Filegroup
    button on the Filegroups tab of the Database Properties dialog box and then adding
    a name for the filegroup in the Name field, as shown in Figure [6-3](#333037_2_En_6_Chapter.xhtml#Fig3).


    ![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig3_HTML.jpg](images/333037_2_En_6_Chapter/333037_2_En_6_Fig3_HTML.jpg)


    Figure 6-3


    The Filegroups tab


    We can then use the Files tab of the Database Properties dialog box to add the
    container. Here, we need to enter a name for the container and specify the file
    type as FILESTEAM data. We are then able to select our FILESTREAM filegroup from
    the Filegroup drop-down box , as illustrated in Figure [6-4](#333037_2_En_6_Chapter.xhtml#Fig4).


    ![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig4_HTML.jpg](images/333037_2_En_6_Chapter/333037_2_En_6_Fig4_HTML.jpg)


    Figure 6-4


    The Files tab


    We can achieve the same results by running the T-SQL commands in Listing [6-2](#333037_2_En_6_Chapter.xhtml#PC2).
    The script creates a FILESTREAM filegroup and then adds a container. You should
    change the directories in the script to match your own configuration.


    ```

    ALTER DATABASE [Chapter6] ADD FILEGROUP [Chapter6_FS_FG] CONTAINS FILESTREAM;

    GO

    ALTER DATABASE [Chapter6] ADD FILE ( NAME = N''Chapter6_FA_File1'', FILENAME =
    N''F:\MSSQL\MSSQL15.PROSQLADMIN\MSSQL\DATA\Chapter6_FA_File1'' ) TO FILEGROUP
    [Chapter6_FS_FG];

    GO

    Listing 6-2

    Adding a FILESTREAM Filegroup

    ```


    In order to explore the folder structure of a FILESTREAM container, we first need
    to create a table and populate it with data. The script in Listing [6-3](#333037_2_En_6_Chapter.xhtml#PC3)
    creates a table, which consists of a unique identifier—which is required for all
    tables that contain FILESTREAM data—a text description of the binary object, and
    a `VARBINARY(MAX)` column that we will use to store the illustration from Figure
    [6-1](#333037_2_En_6_Chapter.xhtml#Fig1), earlier in this chapter. The file that
    we have used is unimportant, so to run the script yourself, change the name and
    location of the file being imported to a file on your system.


    ```

    USE Chapter6

    GO

    CREATE TABLE dbo.FilestreamExample

    (

    ID                UNIQUEIDENTIFIER ROWGUIDCOL NOT NULL UNIQUE,

    PictureDescription    NVARCHAR(500),

    Picture              VARBINARY(MAX) FILESTREAM

    );

    GO

    INSERT INTO FilestreamExample

    SELECT NEWID(), ''Figure 6-1\. Diagram showing the SQL Server storage hierachy.'',
    * FROM

    OPENROWSET(BULK N''c:\Figure_6-1.jpg'', SINGLE_BLOB) AS import;

    Listing 6-3

    Creating a Table with FILESTREAM Data

    ```


    ### Note


    We have used a `UNIQUE` constraint, as opposed to a primary key, since a GUID
    is not usually a good choice as a primary key. If the table must have a primary
    key, it may be more sensible to add an additional integer column with the `IDENTITY`
    property specified. We have used a GUID and set the `ROWGUIDCOL` property, since
    this is required by SQL Server to map to the FILESTREAM objects.


    If we now open the location of the container in the file system, we can see that
    we have a folder , which has a GUID as its name. This represents the table that
    we created. Inside this folder is another folder that also has a GUID as its name.
    This folder represents the `FILESTREAM` column that we created. Inside this folder,
    we will find a file, which is the picture that we inserted into the column. This
    file’s name is the log sequence number from when the file was created. It is theoretically
    possible to change the extension of this file to its original extension and then
    open it. This is certainly not recommended, however, because it may have undesirable
    effects within SQL Server. At the root level of the container, you will also find
    a file called `filestream.hdr`, which contains the metadata for the container
    and a folder called `$FSLog`. This folder contains a series of files that make
    up the FILESTREAM equivalent of the transaction log. This folder hierarchy is
    illustrated in Figure [6-5](#333037_2_En_6_Chapter.xhtml#Fig5).'
  trans: '

    ### 注意


    `physloc`函数未被文档化。因此，Microsoft 不会提供对其使用的**技术支持**。


    标准数据和索引存储在一系列 8KB 的页面中；这些页面由包含页面元数据的 96 字节页眉和用于存储数据本身的 8096 字节组成。这些 8KB 页面随后被组织成由八个连续页面组成的单元，合在一起称为一个*区（extent）*。一个*区（extent）*
    是 SQL Server 可以从磁盘读取的最小单位。


    ### FILESTREAM 文件组


    FILESTREAM 是一种允许您以非结构化方式存储二进制数据的技术。二进制数据通常存储在操作系统中，而不是数据库中，而 FILESTREAM 使您能够继续这样做，同时在这类非结构化数据与存储在数据库中的结构化元数据之间提供事务一致性。使用此技术将使您能够克服
    SQL Server 单个对象 2GB 的最大大小限制。对于大型二进制对象，您还将看到比将其存储在数据库中更好的性能。如果文件大小超过 1MB，使用 FILESTREAM
    的读取性能可能会更快。


    然而，您需要记住，使用 FILESTREAM 存储的对象使用的是 Windows 缓存，而不是 SQL Server 缓冲区缓存。这样做的好处是，您不会有大文件填满缓冲区缓存，导致其他数据被刷写到缓冲区缓存扩展或磁盘。另一方面，这意味着在为实例配置“最大服务器内存”设置时，您应该记住，如果您计划缓存这些对象，Windows
    需要额外的内存，因为使用的是 Windows 二进制缓存，而不是 SQL Server 的缓冲区缓存。


    FILESTREAM 数据需要单独的文件组。这些文件组不包含文件，而是指向操作系统中的文件夹位置。每个位置称为一个*容器（container）*。必须在实例上启用
    FILESTREAM 才能创建 FILESTREAM 文件组。您可以在实例设置期间执行此操作，如第 2 章所述，或者可以在 SQL Server Management
    Studio 的实例属性中配置它。


    我们可以通过使用“数据库属性”对话框的“文件组”选项卡上的“添加文件组”按钮，然后在“名称”字段中为文件组添加名称，如图 6-3 所示，将 FILESTREAM
    文件组添加到我们的 Chapter6 数据库。


    ![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig3_HTML.jpg](img/333037_2_En_6_Fig3_HTML.jpg)


    图 6-3  文件组选项卡


    然后，我们可以使用“数据库属性”对话框的“文件”选项卡来添加容器。在这里，我们需要为容器输入一个名称，并将文件类型指定为 FILESTREAM 数据。然后，我们可以从“文件组”下拉框中选择我们的
    FILESTREAM 文件组，如图 6-4 所示。


    ![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig4_HTML.jpg](img/333037_2_En_6_Fig4_HTML.jpg)


    图 6-4  文件选项卡


    我们可以通过运行清单 6-2 中的 T-SQL 命令来实现相同的结果。该脚本创建一个 FILESTREAM 文件组，然后添加一个容器。您应该更改脚本中的目录以匹配您自己的配置。


    ```sql

    ALTER DATABASE [Chapter6] ADD FILEGROUP [Chapter6_FS_FG] CONTAINS FILESTREAM;

    GO

    ALTER DATABASE [Chapter6] ADD FILE ( NAME = N''Chapter6_FA_File1'', FILENAME =
    N''F:\MSSQL\MSSQL15.PROSQLADMIN\MSSQL\DATA\Chapter6_FA_File1'' ) TO FILEGROUP
    [Chapter6_FS_FG];

    GO

    ```


    清单 6-2  添加 FILESTREAM 文件组


    为了探索 FILESTREAM 容器的文件夹结构，我们首先需要创建一个表并填充数据。清单 6-3 中的脚本创建了一个表，该表包含一个唯一标识符（所有包含 FILESTREAM
    数据的表都需要此标识符）、二进制对象的文本描述，以及一个我们将用于存储本章前面图 6-1 中插图的 `VARBINARY(MAX)` 列。我们使用的文件并不重要，因此要自己运行脚本，请将正在导入文件的名称和位置更改为系统上的文件。


    ```sql

    USE Chapter6

    GO

    CREATE TABLE dbo.FilestreamExample

    (

    ID                UNIQUEIDENTIFIER ROWGUIDCOL NOT NULL UNIQUE,

    PictureDescription    NVARCHAR(500),

    Picture              VARBINARY(MAX) FILESTREAM

    );

    GO

    INSERT INTO FilestreamExample

    SELECT NEWID(), ''Figure 6-1. Diagram showing the SQL Server storage hierachy.'',
    * FROM

    OPENROWSET(BULK N''c:\Figure_6-1.jpg'', SINGLE_BLOB) AS import;

    ```


    清单 6-3  创建包含 FILESTREAM 数据的表


    ### 注意


    我们使用了 `UNIQUE` 约束，而不是主键，因为 GUID 通常不是一个好的主键选择。如果表必须有主键，添加一个指定 `IDENTITY` 属性的额外整数列可能更合理。我们使用了
    GUID 并设置了 `ROWGUIDCOL` 属性，因为这是 SQL Server 映射到 FILESTREAM 对象所必需的。


    如果我们现在在文件系统中打开容器的位置，我们可以看到我们有一个文件夹，其名称是一个 GUID。这代表我们创建的表。在这个文件夹内是另一个同样具有 GUID
    名称的文件夹。此文件夹代表我们创建的 `FILESTREAM` 列。在此文件夹中，我们将找到一个文件，该文件是我们插入到列中的图片。此文件的名称是文件创建时的日志序列号。理论上可以将此文件的扩展名更改为原始扩展名，然后打开它。但是，这当然不推荐，因为它可能在
    SQL Server 中产生不良影响。在容器的根级别，您还会找到一个名为 `filestream.hdr` 的文件，其中包含容器的元数据，以及一个名为 `$FSLog`
    的文件夹。此文件夹包含构成 FILESTREAM 事务日志等效项的一系列文件。此文件夹层次结构如图 6-5 所示。

