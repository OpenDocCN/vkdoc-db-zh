    ### 提示


    如果你使用先前 SQL Server 安装创建的配置文件作为自己配置文件的模板，你会注意到以下参数被指定：`MATRIXCMBRICKCOMMPORT`、`MATRIXCMSERVERNAME`、`MATRIXNAME`、`COMMFABRICENCRYPTION`、`COMMFABRICNETWORKLEVEL`
    和 `COMMFABRICPORT`。这些参数仅供 Microsoft 内部使用，应予以忽略。它们对构建没有影响。


    假设此配置文件已保存为 `c:\SQL2019\configuration1.ini`，那么可以使用清单 3-8 中的代码从 PowerShell 运行 `setup.exe`。


    ```

    .\setup.exe /CONFIGURATIONFILE="c:\SQL2019\Configuration1.ini"

    清单 3-8

    使用配置文件安装 SQL Server

    ```


    尽管这是对配置文件的完全有效的用法，但你实际上可以更进一步，使用此方法创建一个可重用的脚本，该脚本可以在任何服务器上运行，以帮助你引入一致的构建过程。本质上，你是在使用
    Windows Server Core 的准备式独立映像的脚本化版本。如果你们的 Windows 运维团队尚未采用 Sysprep 或使用其他方法来构建服务器，这将特别有用。


    在清单 3-9 中，你会看到另一个配置文件。然而，这次它仅包含你期望在整个环境中保持一致的静态参数。每次安装时会变化的参数（如实例名称和服务帐户详细信息）已被省略。


    ```

    ;SQL Server 2019 配置文件

    [OPTIONS]

    ; 接受 SQL Server 许可协议

    IACCEPTSQLSERVERLICENSETERMS

    ; 指定安装工作流，如 INSTALL、UNINSTALL 或 UPGRADE。

    ; 这是一个必需参数。

    ACTION="Install"

    ; 安装程序将仅显示进度，无需任何用户交互。

    QUIETSIMPLE="True"

    ; 指定要安装、卸载或升级的功能。

    FEATURES=SQLENGINE,REPLICATION,CONN

    ; 安装后自动启动服务。

    AGTSVCSTARTUPTYPE="Automatic"

    ; 启用 FILESTREAM 功能的级别（0、1、2 或 3）。

    FILESTREAMLEVEL="1"

    ; 指定数据库引擎要使用的 Windows 排序规则或 SQL 排序规则。

    SQLCOLLATION="Latin1_General_CI_AS"

    ; 要配置为 SQL Server 系统管理员的 Windows 帐户。

    SQLSYSADMINACCOUNTS="MyDomain\SQLDBA"

    ; 指定 0 以禁用或 1 以启用 TCP/IP 协议。

    TCPENABLED="1"

    ; 指定 0 以禁用或 1 以启用 Named Pipes 协议。

    NPENABLED="1"

    清单 3-9

    用于 PROSQLADMINCONF2 的配置文件

    ```


    这意味着要成功安装实例，你将需要使用来自配置文件的参数和运行 `setup.exe` 的命令中的行内参数的组合，如清单 3-10 所示。此示例假设清单 3-9
    中的配置已保存为 `C:\SQL2019\Configuration2.ini`，并将安装名为 `PROSQLADMINCONF2` 的实例。


    ```

    .\SETUP.EXE /INSTANCENAME="PROSQLADMINCONF2" /SQLSVCACCOUNT="MyDomain\SQLServiceAccount1"
    /SQLSVCPASSWORD="Pa$$w0rd" /AGTSVCACCOUNT="MyDomain\SQLServiceAccount1" /AGTSVCPASSWORD="Pa$$w0rd"
    /CONFIGURATIONFILE="C:\SQL2019\Configuration2.ini"

    清单 3-10

    使用混合参数和配置文件安装 SQL Server

    ```


    ## 自动化安装例程


    这种方法的好处是，我们拥有一个一致的配置文件，无需在每次构建新实例时进行修改。然而，这个想法可以更进一步。如果我们将 PowerShell 命令保存为 PowerShell
    脚本，那么我们可以运行该脚本并传入参数，而不是每次重写命令。这将提供一个用于构建新实例的一致脚本，我们可以将其置于变更控制之下。清单 3-11 中的代码演示了如何构造一个参数化的
    PowerShell 脚本，该脚本将使用相同的配置文件。该脚本假设 `D:\` 是安装介质的根文件夹。


    ```

    param(

    [string] $InstanceName,

    [string] $SQLServiceAccount,

    [string] $SQLServiceAccountPassword,

    [string] $AgentServiceAccount,

    [string] $AgentServiceAccountPassword

    )

    D:\SETUP.EXE /INSTANCENAME=$InstanceName /SQLSVCACCOUNT=$SQLServiceAccount /SQLSVCPASSWORD=$SQLServiceAccountPassword
    /AGTSVCACCOUNT=$AgentServiceAccount /AGTSVCPASSWORD=$AgentServiceAccountPassword
    /CONFIGURATIONFILE="C:\SQL2019\Configuration2.ini"

    清单 3-11

    用于自动安装的 PowerShell 脚本

    ```


    假设此脚本保存为 `SQLAutoInstall.ps1`，则可以使用清单 3-12 中的命令来构建名为 `PROSQLADMINAUTO1` 的实例。此命令运行
    PowerShell 脚本，传入参数，这些参数随后用于 `setup.exe` 命令。


    ```

    ./SQLAutoInstall.ps1 -InstanceName ''PROSQLADMIN1'' -SQLServiceAccount ''MyDomain\SQLServiceAccount1''
    -SQLServiceAccountPassword ''Pa$$w0rd'' -AgentServiceAccount ''MyDomain\SQLServiceAccount1''
    -AgentServiceAccountPassword ''Pa$$w0rd''

    清单 3-12

    运行 SQLAutoInstall.ps1

    ```


    ### 提示


    因为我已经指定了参数的名称，所以不需要按照它们在脚本中声明的顺序来指定。这也使代码更具可读性。


    ### 增强安装例程


    你还可以进一步扩展 `SQLAutoInstall.ps1` 脚本，并利用你在第 1 章学到的用于配置操作系统组件的技术和本章前面学到的用于执行冒烟测试的技术。


    安装实例后，修改后的脚本（清单 3-13，我们将其称为 `SQLAutoInstall2.ps1`）使用 `powercfg` 设置高性能电源计划，并使用
    `set-ItemProperty` 优先考虑后台服务而非前台应用程序。然后运行冒烟测试以确保 SQL Server 和 SQL Agent 服务都在运行并且实例可访问。


    ```

    param(

    [string] $InstanceName,

    [string] $SQLServiceAccount,

    [string] $SQLServiceAccountPassword,

    [string] $AgentServiceAccount,

    [string] $AgentServiceAccountPassword

    )

    # 初始化 ConnectionString 变量

    $ServerName = $env:computername

    $ConnectionString = $ServerName + ''\'' + $InstanceName

    #安装实例

    ./SETUP.EXE /INSTANCENAME=$InstanceName /SQLSVCACCOUNT=$SQLServiceAccount /SQLSVCPASSWORD=$SQLServiceAccountPassword
    /AGTSVCACCOUNT=$AgentServiceAccount /AGTSVCPASSWORD=$AgentServiceAccountPassword
    /CONFIGURATIONFILE="C:\SQL2019\Configuration2.ini"

    # 配置操作系统设置

    powercfg -setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c

    Set-ItemProperty -path HKLM:\SYSTEM\CurrentControlSet\Control\PriorityControl
    -name Win32PrioritySeparation -Type DWORD -Value 24

    # 运行冒烟测试

    Get-service -displayname *$InstanceName*

    Invoke-sqlcmd -Serverinstance $ConnectionString -Query "SELECT @@SERVERNAME"

    清单 3-13

    增强的 PowerShell 自动安装脚本

    ```


    除了将变量传递到 `setup.exe` 命令外，此脚本还使用 `$InstanceName` 参数作为冒烟测试的输入。该参数可以直接传递给 `get-service`
    cmdlet，两侧使用通配符。然而，对于 `invoke-sqlcmd`，我们需要做一点额外的工作。`invoke-sqlcmd` 需要实例的全名，包括服务器名称或
    `local`（假设脚本始终在本地运行）。该脚本从 `ComputerName` 环境变量中提取服务器名称，然后将其与 `$InstanceName` 变量连接，两者之间放置一个
    `\`。这个连接后的值填充了 `$ConnectionString` 变量，然后可以将其传递给 `-Serverinstance` 开关。

    '
- fmt: '### Production Readiness


    Finally, you may wish to add some defensive coding to your script in order to
    make it production ready. Although `PowerShell` has `try`/`catch` functionality
    due to `setup.exe` being an external application, which will generate its own
    messages and errors, the most effective technique for ensuring the smooth running
    of this script is to enforce mandatory parameters.


    The code in Listing 3-14 is a modified version of the script, which we will refer
    to as `SQLAutoInstall3.ps1`. This version of the script uses the `Parameter` keyword
    to set the `Mandatory` attribute to `true` for each of the parameters. This is
    important, because if the person running this script were to omit any of the parameters,
    or if there was a typo in the parameter name, the installation would fail. This
    provides a fail-safe by ensuring that all of the parameters have been entered
    before allowing the script to run. The additional change that we have made in
    this script is to add annotations before and after each step, so that if the script
    does fail, we can easily see where the error occurred.


    ```powershell

    param(

    [Parameter(Mandatory=$true)]

    [string] $InstanceName,

    [Parameter(Mandatory=$true)]

    [string] $SQLServiceAccount,

    [Parameter(Mandatory=$true)]

    [string] $SQLServiceAccountPassword,

    [Parameter(Mandatory=$true)]

    [string] $AgentServiceAccount,

    [Parameter(Mandatory=$true)]

    [string] $AgentServiceAccountPassword

    )

    # Initialize ConnectionString variable

    $ServerName = $env:computername

    $ConnectionString = $ServerName + ''\'' + $InstanceName

    "Initialize variables complete..."

    #Install the instance

    ./SETUP.EXE /INSTANCENAME=$InstanceName /SQLSVCACCOUNT=$SQLServiceAccount /SQLSVCPASSWORD=$SQLServiceAccountPassword
    /AGTSVCACCOUNT=$AgentServiceAccount /AGTSVCPASSWORD=$AgentServiceAccountPassword
    /CONFIGURATIONFILE="C:\SQL2019\Configuration2.ini"

    "Instance installation complete..."

    # Configure OS settings

    powercfg -setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c

    "High Performance power plan configured..."

    Set-ItemProperty -path HKLM:\SYSTEM\CurrentControlSet\Control\PriorityControl
    -name Win32PrioritySeparation -Type DWORD -Value 24

    "Optimize for background services configured..."

    # Run smoke tests

    Get-service -displayname *$InstanceName* -ErrorAction Stop

    "Service running check complete..."

    Invoke-sqlcmd -Serverinstance $ConnectionString -Query "SELECT @@SERVERNAME"

    "Instance accessibility check complete..."

    ```


    Listing 3-14 Auto-install Script with Defensive Code


    The `SQLAutoInstall3.ps1` script has been run, but without any parameters specified.
    In previous versions of the script, `PowerShell` would have gone ahead and executed
    the code, only for `setup.exe` to fail, since no values were specified for the
    required parameters. In this version, however, you can see that you will be prompted
    to enter a value for each parameter in turn.


    When running the script, you will notice that after each phase of the script execution,
    our annotations are shown. This can aid you in responding to errors, because you
    can easily see which command caused an issue before you even begin to decipher
    any error messages that may be displayed.


    ## Summary


    Installing `SQL Server` on `Windows Server Core` can be as simple as running a
    single command from `PowerShell` and passing in the appropriate parameters. However,
    for consistency across the enterprise and to reduce manual effort, you may wish
    to automate your build process. You can do this by using a configuration file,
    but you can also expand this process out to fully automate the installation, including
    OS configuration. You will then be able to keep a `PowerShell` script under change
    control and simply run it, passing parameters, every time you wish to build a
    new instance.


    After installing an instance, you should run smoke tests to ensure that the services
    are running and that the instance is accessible. This will highlight any show-stopping
    issues. If you do need to troubleshoot a build, then your starting point should
    be to check the `summary.txt` log file and if you need to, the `detail.txt` log
    file.


    In addition to installing the base binaries, you can use `SQL Server`’s Product
    Update functionality to install the latest cumulative update at the same time.
    Product Update can be configured to check Microsoft Update, a folder location,
    or network folder. If you store the latest fully tested update on a network share,
    then you can use this when installing any instance on the network, and when you
    wish to increase the level of update that you support, you can simply replace
    the update file on the network share.


    # 4. Installation on Heterogeneous Operating Systems


    The last two major releases of `SQL Server` have focused heavily on providing
    capability to install `SQL Server` in a variety of nontraditional environments.
    In this chapter, we will explore how to install `SQL Server` on `Linux` and how
    to build and run `Docker` images and containers that include `SQL Server`.


    ### Tip


    The commands used to install and configure `SQL Server` on `Linux` vary slightly
    between distributions. This chapter focused on `Ubuntu`, as it is arguably the
    friendliest, for `Windows`-based `DBAs` and this chapter’s intent is to familiarize
    you with the concepts and process. Microsoft provides quick start guides for each
    distribution, at [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup?view=sql-server-2019`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup?view=sql-server-2019)
    .


    ## Installing SQL Server on Linux


    Table 4-1 details the distributions and versions of `Linux`, on which `SQL Server`
    is supported. The version is important as, for example, the current version of
    `Ubuntu`, at the time of writing, is 19.4.1. `SQL Server` is supported on version
    16.4. In my own personal tests, `SQL Server` could be successfully installed on
    `Ubuntu` 19.4.1, but the `Pacemaker` and `PCS` services (at the time of writing)
    could not be installed on this version, meaning it is not possible to configure
    `AlwaysOn Availability Groups`, for `HA`/`DR`, on this version of `Ubuntu`.


    Table 4-1 Supported Linux Distributions and Versions


    | Distribution | Supported Version(s) |

    | --- | --- |

    | Red Hat Enterprise | 7.3–7.6 |

    | SUSE Enterprise Server | V12 SP2 |

    | Ubuntu | 16.4 |


    In the following sections, we will look at how to install `SQL Server` manually
    on `Linux` and how to create an unattended install.'
