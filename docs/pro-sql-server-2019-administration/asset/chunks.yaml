- fmt: '# SQL Server 安全基础


    ## 登录名


    您可以通过 SSMS 或 T-SQL 创建登录名。要通过 SSMS 创建登录名，请在`Security` -> `Logins`的上下文菜单中选择`New
    Login`。图 10-3 显示了`Login - New`对话框的常规选项卡。


    ![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig3_HTML.jpg](images/333037_2_En_10_Chapter/333037_2_En_10_Fig3_HTML.jpg)


    图 10-3 常规选项卡


    您可以看到，我们将登录名命名为`Danielle`，并指定了 SQL Server 身份验证而非 Windows 身份验证。这意味着我们还必须指定一个密码并确认它。您可能还会注意到有三个框被选中：`Enforce
    Password Policy`、`Enforce Password Expiration`和`User Must Change Password At Next
    Login`。这三个选项是累加的，这意味着如果您没有同时选中`Enforce Password Policy`，则无法选中`Enforce Password
    Expiration`。同样，如果不选中`Enforce Password Expiration`选项，也无法选中`User Must Change Password
    At Next Login`。


    当您选中`Enforce Password Policy`选项时，SQL Server 会在域级别检查 Windows 用户的密码策略，并将其应用于 SQL
    Server 登录名。因此，例如，如果您有一个域策略要求网络用户的密码长度为八个字符或更长，那么这对 SQL Server 登录名也同样适用。如果您未选中此选项，则不会对登录名的密码强制执行任何密码策略。类似地，如果您选中了强制密码过期的选项，则过期时间取自域策略。


    我们还将登录名的默认数据库设置为`Chapter10`。这并没有为用户分配对`Chapter10`数据库的任何权限，但它指定了当用户对实例进行身份验证时，该数据库将是登录名的着陆区。这也意味着，如果用户没有对`Chapter10`数据库的权限，或者`Chapter10`数据库被删除或变得不可访问，用户将无法登录到该实例。


    在`Server Roles`选项卡上，您可以将登录名添加到服务器角色中。在我们的例子中，我们选择不将登录名添加到任何其他服务器角色中。将登录名添加到服务器角色的内容将在本章的下一节讨论。


    在`User Mapping`选项卡上，我们可以将登录名映射到数据库级别的用户。在此屏幕上，您应该在`Chapter10`数据库中创建一个数据库用户。每个数据库中的数据库用户名称默认与登录名相同。这不是强制性的，您可以更改数据库用户的名称；但是，保持名称一致是良好的实践。不这样做只会导致混淆，并增加您管理安全主体所需的时间。此时，我们还没有将用户添加到任何数据库角色中。数据库角色将在本章后面讨论。


    在`Securables`选项卡上，我们可以搜索要在其上授予登录名权限的特定实例级对象。在`Status`选项卡上，我们可以授予或拒绝登录名登录到实例的权限，以及启用或禁用登录名。此外，如果因为输入错误密码次数过多而导致登录名被锁定，我们可以为用户解锁。失败的密码尝试次数基于服务器的组策略设置，但必须在登录名上使用`CHECK_POLICY`选项。


    可以通过运行清单 10-4 中的脚本通过 T-SQL 创建相同的用户。您可以看到，为了达到相同的结果，需要多个命令。第一个创建登录名，其他的创建映射到该登录名的数据库用户。


    ```sql

    USE Master

    GO

    CREATE LOGIN Danielle

    WITH PASSWORD=N''Pa$$w0rd'' MUST_CHANGE, DEFAULT_DATABASE=Chapter10,

    CHECK_EXPIRATION=ON, CHECK_POLICY=ON ;

    GO

    USE Chapter10

    GO

    CREATE USER Danielle FOR LOGIN Danielle ;

    GO

    ```


    清单 10-4 创建 SQL Server 登录名


    我们也可以使用`New Login`对话框或 T-SQL 来创建 Windows 登录名。如果使用 GUI，我们可以选择`Windows authentication`选项而不是`SQL
    Server authentication`，然后搜索我们要将登录名映射到的用户或组。清单 10-5 演示了如何使用 T-SQL 创建 Windows 登录名。它将登录名映射到一个名为`Pete`的域用户，配置与`Danielle`相同。


    ```sql

    CREATE LOGIN [PROSQLADMIN\pete] FROM WINDOWS WITH DEFAULT_DATABASE=Chapter10 ;

    GO

    USE Chapter10

    GO

    CREATE USER [PROSQLADMIN\pete] FOR LOGIN [PROSQLADMIN\pete] ;

    ```


    清单 10-5 创建 Windows 登录名


    ## 授予权限


    向登录名分配权限时，可以使用以下操作：


    *   `GRANT`

    *   `DENY`

    *   `REVOKE`


    `GRANT`授予主体对安全对象的权限。您可以将`WITH`选项与`GRANT`一起使用，以向主体提供将相同权限分配给其他主体的能力。`DENY`明确拒绝主体对安全对象的权限；`DENY`优先于`GRANT`。因此，如果一个登录名是某个或某些服务器角色的成员，这些角色赋予了该登录名更改端点的权限，但该主体被明确拒绝了更改同一端点的权限，则该主体将无法管理该端点。`REVOKE`会移除与安全对象的权限关联。这包括`DENY`关联和`GRANT`关联。但是，如果登录名已通过服务器角色分配了权限，那么撤销针对该登录名本身对该安全对象的权限是没有效果的。为了产生效果，您需要使用`DENY`、从角色中移除权限或更改分配给角色的权限。


    清单 10-6 中的命令授予`Danielle`更改任何登录名的权限，但随后明确拒绝了她更改服务帐户的权限。


    ```sql

    GRANT ALTER ANY LOGIN TO Danielle ;

    GO

    DENY ALTER ON LOGIN::[NT Service\MSSQL$PROSQLADMIN] TO Danielle ;

    ```


    清单 10-6 授予和拒绝权限


    请注意为对象类（在此例中是登录名）分配权限与为特定对象分配权限在语法上的区别。对于对象类型，使用`ANY [Object Type]`语法，但对于特定对象，我们使用`[Object
    Class]::[Securable]`。


    我们可以使用`ALTER SERVER ROLE`语句向服务器角色添加或从中删除登录名。清单 10-7 演示了如何将`Danielle`添加到`sysadmin`角色，然后再将她移除。


    ```sql

    --Add Danielle to the sysadmin Role

    ALTER SERVER ROLE sysadmin ADD MEMBER Danielle ;

    GO

    --Remove Danielle from the sysadmin role

    ALTER SERVER ROLE sysadmin DROP MEMBER Danielle ;

    GO

    ```


    清单 10-7 添加和移除服务器角色


    ## 实现数据库级安全性


    我们已经了解了如何使用登录名和服务器角色管理实例级的安全性。在单个数据库级别的安全性具有类似的模型，由数据库用户和数据库角色组成。以下各节将描述此功能。'
  raw: '### Logins


    You can create a login through SSMS or through T-SQL. To create a login through
    SSMS, select New Login from the context menu of Security ➤ Logins. Figure [10-3](#333037_2_En_10_Chapter.xhtml#Fig3)
    shows the General tab of the Login - New dialog box.


    ![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig3_HTML.jpg](images/333037_2_En_10_Chapter/333037_2_En_10_Fig3_HTML.jpg)


    Figure 10-3


    The General tab


    You can see that we have named the login Danielle, and we have specified SQL Server
    authentication as opposed to Windows authentication. This means that we have also
    had to specify a password and then confirm it. You may also note that three boxes
    are checked: Enforce Password Policy, Enforce Password Expiration, and User Must
    Change Password At Next Login. These three options are cumulative, meaning that
    you cannot select Enforce Password Expiration without also having Enforce Password
    Policy selected. You also cannot select User Must Change Password At Next Login
    without also selecting the Enforce Password Expiration option.


    When you select the Enforce Password Policy option, SQL Server checks the password
    policies for Windows users at the domain level and applies them to SQL Server
    logins as well. So, for example, if you have a domain policy that enforces that
    network user’s passwords are eight characters or longer, then the same applies
    to the SQL Server login. If you do not select this option, then no password policies
    are enforced against the login’s password. In a similar vein, if you select the
    option to enforce password expiration, the expiration period is taken from the
    domain policies.


    We have also set the login’s default database to be `Chapter10`. This does not
    assign the user any permissions to the `Chapter10` database, but it specifies
    that this database will be the login’s landing zone, when the user authenticate
    to the instance. It also means that if the user does not have permissions to the
    `Chapter10` database, or if the `Chapter10` database is dropped or becomes inaccessible,
    the user will not be able to log in to the instance.


    On the Server Roles tab, you can add the login to server roles. In our case, we
    have chosen not to add the login to any additional server roles. Adding logins
    to server roles is discussed in the next section of this chapter.


    On the User Mapping tab, we can map the login to users at the database level.
    On this screen, you should create a database user within the `Chapter10` database.
    The name of the database user in each database has defaulted to the same name
    as the login. This is not mandatory, and you can change the names of the database
    users; however, it is good practice to keep the names consistent. Failure to do
    so only leads to confusion and increases the time you must spend managing your
    security principals. We have not added the users to any database roles at this
    point. Database roles are discussed later in this chapter.


    On the Securables tab, we can search for specific instance-level objects on which
    to grant the login permissions. In the Status tab, we can grant or deny the login
    permissions to log in to the instance and enable or disable the login. Also, if
    the login has become locked out because an incorrect password has been entered
    too many times, we can unlock the user. The number of failed password attempts
    is based on the Group Policy settings for the Server, but the `CHECK_POLICY` option
    must be used on the login.


    The same user can be created through T-SQL by running the script in Listing [10-4](#333037_2_En_10_Chapter.xhtml#PC4).
    You can see that in order to achieve the same results, multiple commands are required.
    The first creates the login and the others create database users that map to the
    login.


    ```

    USE Master

    GO

    CREATE LOGIN Danielle

    WITH PASSWORD=N''Pa$$w0rd'' MUST_CHANGE, DEFAULT_DATABASE=Chapter10,

    CHECK_EXPIRATION=ON, CHECK_POLICY=ON ;

    GO

    USE Chapter10

    GO

    CREATE USER Danielle FOR LOGIN Danielle ;

    GO

    Listing 10-4

    Creating a SQL Server Login

    ```


    We can also use either the New Login dialog box or T-SQL to create Windows logins.
    If using the GUI, we can select the Windows login as opposed to the SQL Server
    login option and then search for the user or group that we want the login to map
    to. Listing [10-5](#333037_2_En_10_Chapter.xhtml#PC5) demonstrates how to create
    a Windows login using T-SQL. It maps the login to a domain user called Pete, with
    the same configuration as Danielle.


    ```

    CREATE LOGIN [PROSQLADMIN\pete] FROM WINDOWS WITH DEFAULT_DATABASE=Chapter10 ;

    GO

    USE Chapter10

    GO

    CREATE USER [PROSQLADMIN\pete] FOR LOGIN [PROSQLADMIN\pete] ;

    Listing 10-5

    Creating a Windows Login

    ```


    ### Granting Permissions


    When assigning permissions to logins, you can use the following actions:


    *   `GRANT`


    *   `DENY`


    *   `REVOKE`


    `GRANT` gives principal permissions on a securable. You can use the `WITH` option
    with `GRANT` to also provide a principal with the ability to assign the same permission
    to other principals. `DENY` specifically denies login permissions on a securable;
    `DENY` overrules `GRANT`. Therefore, if a login is a member of a server role or
    roles that give the login permissions to alter an endpoint, but the principal
    was explicitly denied permissions to alter the same endpoint, then the principal
    is not able to manage the endpoint. `REVOKE` removes a permission association
    to a securable. This includes `DENY` associations as well as `GRANT` associations.
    If a login has been assigned permissions through a server role, however, then
    revoking the permissions to that securable, against the login itself, has no effect.
    In order to have an effect, you would need to use `DENY`, remove the permissions
    from the role, or change the permissions assigned to the role.


    The command in Listing [10-6](#333037_2_En_10_Chapter.xhtml#PC6) grants Danielle
    permission to alter any login, but then it specifically denies her the permissions
    to alter the service account.


    ```

    GRANT ALTER ANY LOGIN TO Danielle ;

    GO

    DENY ALTER ON LOGIN::[NT Service\MSSQL$PROSQLADMIN] TO Danielle ;

    Listing 10-6

    Granting and Denying Permissions

    ```


    Note the difference in syntax between assigning permissions on a class of object,
    in this case, logins, and assigning permissions on a specific object. For an object
    type, the `ANY [Object Type]` syntax is used, but for a specific object, we use
    `[Object Class]::[Securable]`.


    We can add or remove logins from a server role by using the `ALTER SERVER ROLE`
    statement. Listing [10-7](#333037_2_En_10_Chapter.xhtml#PC7) demonstrates how
    to add Danielle to the `sysadmin` role and then remove her again.


    ```

    --Add Danielle to the sysadmin Role

    ALTER SERVER ROLE sysadmin ADD MEMBER Danielle ;

    GO

    --Remove Danielle from the sysadmin role

    ALTER SERVER ROLE sysadmin DROP MEMBER Danielle ;

    GO

    Listing 10-7

    Adding and Removing Server Roles

    ```


    ## Implementing Database-Level Security


    We have seen how security at the instance level is managed using logins and server
    roles. Security at the level of the individual database has a similar model, consisting
    of database users and database roles. The following sections describe this functionality.'
