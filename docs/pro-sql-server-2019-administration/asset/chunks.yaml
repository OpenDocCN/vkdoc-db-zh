    LastName          NVARCHAR(30),

    CreditCardNumber  VARBINARY(8000)

    ) ;

    GO

    --Populate the table

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE

    DECLARE @Names TABLE

    (

    FirstName        VARCHAR(30),

    LastName         VARCHAR(30)

    ) ;

    INSERT INTO @Names

    VALUES(''Peter'', ''Carter''),

    (''Michael'', ''Smith''),

    (''Danielle'', ''Mead''),

    (''Reuben'', ''Roberts''),

    (''Iris'', ''Jones''),

    (''Sylvia'', ''Davies''),

    (''Finola'', ''Wright''),

    (''Edward'', ''James''),

    (''Marie'', ''Andrews''),

    (''Jennifer'', ''Abraham''),

    (''Margaret'', ''Jones'')

    INSERT INTO App1Customers(Firstname, LastName, CreditCardNumber)

    SELECT  FirstName, LastName, CreditCardNumber FROM

    (SELECT

    (SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName

    ,(SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName

    ,(SELECT CONVERT(VARBINARY(8000)

    ,(SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()))) CreditCardNumber

    FROM @Numbers a

    CROSS JOIN @Numbers b

    CROSS JOIN @Numbers c

    ) d ;

    CREATE DATABASE Chapter14App1Sales ;

    GO

    ALTER DATABASE Chapter14App1Sales SET RECOVERY FULL ;

    GO

    USE Chapter14App1Sales

    GO

    CREATE TABLE [dbo].Orders NOT NULL PRIMARY KEY CLUSTERED,

    [OrderDate] [date]  NOT NULL,

    [CustomerID] [int]  NOT NULL,

    [ProductID] [int]   NOT NULL,

    [Quantity] [int]    NOT NULL,

    [NetAmount] [money] NOT NULL,

    [TaxAmount] [money] NOT NULL,

    [InvoiceAddressID] [int] NOT NULL,

    [DeliveryAddressID] [int] NOT NULL,

    [DeliveryDate] [date] NULL,

    ) ;

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE

    --Populate ExistingOrders with data

    INSERT INTO Orders

    SELECT

    (SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number

    FROM @Numbers

    ORDER BY NEWID()),getdate())as DATE)),

    (SELECT TOP 1 Number -10 FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    500,

    100,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number - 10

    FROM @Numbers

    ORDER BY NEWID()),getdate()) as DATE))

    FROM @Numbers a

    CROSS JOIN @Numbers b

    CROSS JOIN @Numbers c ;

    CREATE DATABASE Chapter14App2Customers ;

    GO

    ALTER DATABASE Chapter14App2Customers SET RECOVERY FULL ;

    GO

    USE Chapter14App2Customers

    GO

    CREATE TABLE App2Customers

    (

    ID                INT                PRIMARY KEY        IDENTITY,

    FirstName         NVARCHAR(30),

    LastName          NVARCHAR(30),

    CreditCardNumber  VARBINARY(8000)

    ) ;

    GO

    --Populate the table

    DECLARE @Numbers TABLE

    (

    Number        INT

    ) ;

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE ;

    DECLARE @Names TABLE

    (

    FirstName        VARCHAR(30),

    LastName        VARCHAR(30)

    ) ;

    INSERT INTO @Names

    VALUES(''Peter'', ''Carter''),

    (''Michael'', ''Smith''),

    (''Danielle'', ''Mead''),

    (''Reuben'', ''Roberts''),

    (''Iris'', ''Jones''),

    (''Sylvia'', ''Davies''),

    (''Finola'', ''Wright''),

    (''Edward'', ''James''),

    (''Marie'', ''Andrews''),

    (''Jennifer'', ''Abraham''),

    (''Margaret'', ''Jones'')

    INSERT INTO App2Customers(Firstname, LastName, CreditCardNumber)

    SELECT  FirstName, LastName, CreditCardNumber FROM

    (SELECT

    (SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName

    ,(SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName

    ,(SELECT CONVERT(VARBINARY(8000)

    ,(SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()))) CreditCardNumber

    FROM @Numbers a

    CROSS JOIN @Numbers b

    CROSS JOIN @Numbers c

    ) d ;

    ```


    代码清单 14-1


    ## 配置 SQL Server


    配置 AlwaysOn 可用性组的第一步是在 SQL Server 服务上启用此功能。要通过 GUI 启用该功能，我们打开 **SQL Server 配置管理器**，导航到
    **SQL Server 服务**，然后从 SQL Server 服务的上下文菜单中选择**属性**。此时会显示服务属性，我们导航到 **AlwaysOn
    高可用性**选项卡，如图 14-1 所示。


    在此选项卡上，我们勾选 **启用 AlwaysOn 可用性组**复选框，并确保 **Windows 故障转移群集名称**框中显示的群集名称正确无误。然后我们需要重新启动
    SQL Server 服务。由于 AlwaysOn 可用性组使用的是**独立实例**（它们安装在群集的每个节点上），而不是跨多个节点的**故障转移群集实例**，因此我们需要在群集上托管的每个独立实例上重复这些步骤。


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig1_HTML.jpg](img/333037_2_En_14_Fig1_HTML.jpg)


    图 14-1：AlwaysOn 高可用性选项卡


    我们也可以使用 PowerShell 来启用 AlwaysOn 可用性组。为此，我们使用代码清单 14-2 中的 PowerShell 命令。该脚本假定 `CLUSTERNODE1`
    是服务器名称，`PRIMARYREPLICA` 是 SQL Server 实例的名称。


    ```powershell

    Enable-SqlAlwaysOn -Path SQLSERVER:\SQL\CLUSTERNODE1\PRIMARYREPLICA

    ```


    代码清单 14-2：启用 AlwaysOn 可用性组


    下一步是对将成为可用性组一部分的所有数据库进行完整备份。完成此操作之前，我们将无法将它们添加到可用性组。我们分别为 `App1` 和 `App2` 创建单独的可用性组，因此要为
    `App1` 创建可用性组，我们需要备份 `Chapter14App1Customers` 和 `Chapter14App1Sales` 数据库。我们通过运行代码清单
    14-3 中的脚本来完成此操作。


    ```sql

    BACKUP DATABASE Chapter14App1Customers

    TO  DISK = N''C:\Backups\Chapter14App1Customers.bak''

    WITH NAME = N''Chapter14App1Customers-Full Database Backup'' ;

    GO

    BACKUP DATABASE Chapter14App1Sales

    TO  DISK = N''C:\Backups\Chapter14App1Sales.bak''

    WITH NAME = N''Chapter14App1Sales-Full Database Backup'' ;

    GO

    ```


    代码清单 14-3：备份数据库


    ### 注意


    备份将在第 12 章中讨论。


    ## 创建可用性组


    您可以通过多种方式在 SQL Server 中创建可用性组拓扑。可以主要通过对话框手动创建，通过 T-SQL 创建，或者通过向导创建。在本章中，我们将探讨向导和对话框。'
- fmt: '# Using the New Availability Group Wizard


    When the backups complete successfully, we invoke the New Availability Group wizard
    by drilling through AlwaysOn High Availability in Object Explorer and selecting
    the New Availability Group wizard from the context menu of the Availability Groups
    folder. The Introduction page of the wizard is displayed, giving us an overview
    of the steps that we need to undertake.


    On the Specify Name page (see Figure [14-2](#333037_2_En_14_Chapter.xhtml#Fig2)),
    we are prompted to enter a name for our availability group. We will also select
    Windows Server Failover Cluster as the Cluster Type. Other options for cluster
    type are external, which supports Pacemaker on Linux and None, which is used for
    Clusterless Availability Groups. The Database Level Health Detection option will
    cause the Availability Group to fail over, should any database within the group
    go offline. The Per Database DTC Support option will specify if cross-database
    transactions are supported, using MSDTC (Microsoft Distributed Transaction Coordinator).
    A full discussion of configuring DTC is beyond the scope of this book, but further
    details can be found at [`https://docs.microsoft.com/en-us/previous-versions/windows/desktop/ms681291(v=vs.85)`](https://docs.microsoft.com/en-us/previous-versions/windows/desktop/ms681291%2528v%25253Dvs.85%2529).


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig2_HTML.jpg](images/333037_2_En_14_Chapter/333037_2_En_14_Fig2_HTML.jpg)


    Figure 14-2: The Specify Name page


    On the Select Databases page, we are prompted to select the database(s) that we
    wish to participate in the availability group, as illustrated in Figure [14-3](#333037_2_En_14_Chapter.xhtml#Fig3).
    On this screen, notice that we cannot select the `Chapter14App2Customers` database,
    because we have not yet taken a full backup of the database.


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig3_HTML.jpg](images/333037_2_En_14_Chapter/333037_2_En_14_Fig3_HTML.jpg)


    Figure 14-3: The Select Databases page


    The Specify Replicas page consists of four tabs. We use the first tab, Replicas,
    to add the secondary replicas to the topology. Checking the Synchronous Commit
    option causes data to be committed on the secondary replica before it is committed
    on the primary replica. (This is also referred to as hardening the log on the
    secondary before the primary.) This means that, in the event of a failover, data
    loss is not possible, meaning that we can meet an SLA (service-level agreement)
    with an RPO (recovery point objective) of 0 (zero). It also means that there will
    be a performance degradation, however. If we choose Asynchronous Commit, then
    the replica operates in Asynchronous Commit mode. This means that data is committed
    on the primary replica before being committed on the secondary replica. This stops
    us from suffering performance degradation, but it also means that, in the event
    of failover, the RPO is nondeterministic. Performance considerations for synchronous
    replicas are discussed later in this chapter.


    When we check the Automatic Failover option, the Synchronous Commit option is
    also selected automatically if we have not already selected it. This is because
    automatic failover is only possible in Synchronous Commit mode. We can set the
    Readable Secondary drop-down to No, Yes, or Read-intent. When we set it to No,
    the database is not accessible on replicas that are in a secondary role. When
    we set it to Read-intent, the Availability Group Listener can redirect read-only
    workloads to this secondary replica, but only if the application has specified
    `Application Intent=Read-only` in the connection string. Setting it to Yes enables
    the listener to redirect read-only traffic, regardless of whether the `Application
    Intent` parameter is present in the application’s connection string. Although
    we can change the value of Readable Secondary through the GUI while at the same
    time configuring a replica for automatic failover without error, this is simply
    a quirk of the wizard. In fact, the replica is not accessible, since active secondaries
    are not supported when configured for automatic failover. The Replicas tab is
    illustrated in Figure [14-4](#333037_2_En_14_Chapter.xhtml#Fig4). To meet our
    requirement of achieving HA and DR, we have configured the secondary server within
    the same site as a synchronous replica and configured the server in a different
    site as asynchronous. This means that the latency between data centers will not
    compound the performance degradation, which is associated with synchronous commits.


    ### Note


    Using secondary replicas for read-only workloads is discussed in more depth in
    Chapter [16](#333037_2_En_16_Chapter.xhtml).


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig4_HTML.jpg](images/333037_2_En_14_Chapter/333037_2_En_14_Fig4_HTML.jpg)


    Figure 14-4: The Replicas tab


    On the Endpoints tab of the Specify Replicas page, illustrated in Figure [14-5](#333037_2_En_14_Chapter.xhtml#Fig5),
    we specify the port number for each endpoint. The default port is 5022, but we
    can specify a different port if we need to. On this tab, we also specify if data
    should be encrypted when it is sent between the endpoints. It is usually a good
    idea to check this option, and if we do, then AES (Advanced Encryption Standard)
    is used as the encryption algorithm.


    Optionally, you can also change the name of the endpoint that is created. Because
    only one database mirroring endpoint is allowed per instance, however, and because
    the default name is fairly descriptive, there is not always a reason to change
    it. Some DBAs choose to rename it to include the name of the instance, since this
    can simplify the management of multiple servers. This is a good idea if your enterprise
    has many availability group clusters.


    The service account each instance uses is displayed for informational purposes.
    It simplifies security administration if you ensure that the same service account
    is used by both instances. If you fail to do this, you will need to grant each
    instance permissions to each service account. This means that instead of reducing
    the security footprint of each service account by using it for one instance only,
    you simply push the footprint up to the SQL Server level instead of the operating
    system level.


    The endpoint URL specifies the URL of the endpoint that availability groups will
    use to communicate. The format of the URL is `[Transport Protocol]://[Path]:[Port]`.
    The transport protocol for a database mirroring endpoint is always TCP (Transmission
    Control Protocol). The path can either be the fully qualified domain name (FQDN)
    of the server, the server name on its own, or an IP address, which is unique across
    the network. I recommend using the FQDN of the server, because this is always
    guaranteed to work. It is also the default value populated. The port should match
    the port number that you specify for the endpoint.'
