    \ SQL Server Agent Proxy Accounts\n\n默认情况下，所有作业步骤都在 SQL Server Agent 服务账户的上下文下运行。然而，采用这种方法可能存在安全风险，因为你可能需要授予该服务账户对实例和操作系统内对象的大量权限。对于需要跨服务器访问的作业，需要授予服务账户的权限量尤为重要。\n\
