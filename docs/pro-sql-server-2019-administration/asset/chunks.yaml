    MAXDOP will set the maximum number of cores that will be made available to each
    individual execution of a query. The thought of this may initially sound counterintuitive.
    Surely you would want every query to be parallelized as much as possible? Well,
    this is not always the case.


    Although some data warehousing queries may benefit from high levels of parallelization,
    many OLTP (online transaction processing) workloads may perform better with a
    lower degree of parallelization. This is because if a query executes over many
    parallel threads, and one thread takes much longer than the others to complete,
    then the other threads may sit waiting for the final thread to finish so that
    their streams can be synchronized. If this is occurring, you are likely to see
    a high number of waits with the wait type `CXPACKET`.


    In many OLTP systems, high levels of parallelization being chosen by the Query
    Optimizer actually indicate issues such as missing or highly fragmented indexes
    or out-of-date statistics. Resolving these issues will improve performance far
    more than running queries with a high degree of parallelism.


    For instances that support heavy data warehousing workloads, different MAXDOP
    configurations should be tested and set accordingly, with the understanding that
    MAXDOP can also be set at the query level, through the use of a query hint, if
    a handful of queries would benefit from a different setting to the majority of
    the instance’s workload. In the vast majority of cases, however, the instance-level
    setting for MAXDOP should be configured to the lowest of the following three values:


    *   `8`


    *   Number of cores available to the instance (the default value for MAXDOP)


    *   The number of cores within a NUMA node


    The default value for MAXDOP is 0, which means that queries are only limited by
    the number of cores that are visible to the instance. You can configure MAXDOP
    via the GUI by configuring the Max Degree of Parallelism setting on the Advanced
    tab of the Server Properties. Figure [5-3](#333037_2_En_5_Chapter.xhtml#Fig3)
    illustrates this setting being configured to 8.


    ![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig3_HTML.jpg](images/333037_2_En_5_Chapter/333037_2_En_5_Fig3_HTML.jpg)


    Figure 5-3


    The Advanced tab


    You can also configure MAXDOP using `sp_configure`. Listing [5-4](#333037_2_En_5_Chapter.xhtml#PC4)
    demonstrates using `sp_configure` to set MAXDOP to a value of `8`.


    ```

    EXEC sys.sp_configure max degree of parallelism'', 8

    RECONFIGURE

    Listing 5-4

    Configuring MAXDOP with sp_configure

    ```


    An adjunct to lowering the MAXDOP setting is to increase the threshold at which
    the Query Optimizer will choose a parallel plan over a serial plan. The default
    setting for this is an estimated serial execution time of 5 seconds, but you can
    configure this to anything between 0 and 32767 seconds. A practical limit in many
    environments is around 30 seconds, but of course, this is workload specific and
    should always be tested. The cost threshold for the parallelism option will be
    ignored, however, if you have MAXDOP configured to 1, or if there is only one
    core available to the instance. The script in Listing [5-5](#333037_2_En_5_Chapter.xhtml#PC5)
    will increase the cost threshold for parallelism to 10 seconds.


    ```

    EXEC sp_configure ''cost threshold for parallelism'', 10

    RECONFIGURE

    Listing 5-5

    Configuring Cost Threshold for Parallelism

    ```


    #### Min and Max Server Memory


    The Min Server Memory (MB) and Max Server Memory (MB) settings are used to control
    how much memory SQL Server has available for its memory pool. The memory pool
    contains many components. Some of the largest components are detailed in Table
    [5-4](#333037_2_En_5_Chapter.xhtml#Tab4).


    Table 5-4


    SQL Server Memory Pool


    | Component | Description |

    | --- | --- |

    | Buffer cache | The buffer cache stores data and index pages before and after
    being read from or written to disk. Even if the pages your query requires are
    not in the cache, they will still be written to the buffer cache first and then
    retrieved from memory, as opposed to being written directly from disk. |

    | Procedure cache | The procedure cache contains execution plans, not just for
    stored procedures but also for ad hoc queries, prepared statements, and triggers.
    When SQL Server begins to optimize a query, it first checks this cache to see
    if a suitable plan already exists. |

    | Log cache | The log cache stores log records before they are written to the
    transaction log. |

    | Log pool | A hash table that allows HA/DR and data distribution technologies,
    such as AlwaysOn, Mirroring, and Replication, to quickly access required log records.
    |

    | CLR | CLR refers to .NET code that is used inside the instance. In older versions
    of SQL Server, CLR sat outside of the main memory pool, as the memory pool only
    dealt with single, 8KB page allocations. From SQL Server 2012 onward, the memory
    pool now deals with both single and multipage allocations, so CLR has been brought
    in. |


    In many environments, it is likely that you will want to provide the same value
    for both Min and Max Server Memory. This will avoid the overhead of SQL Server
    dynamically managing the amount of memory it has reserved.


    If you have multiple instances, however, then dynamic memory management may be
    beneficial so that the instance with the heaviest workload at any given time can
    consume the most resources. You must give extra consideration if your instances
    are hosted on an active/active cluster. I have seen one example of a client turning
    on Lock Pages In Memory and then configuring the min and max memory for the instances
    on each node as if they were stand-alone boxes. At the point of failover, the
    remaining node crashed, because there was not enough RAM to support the memory
    requirements of all instances on one box.


    No matter how your environment is configured, you will always want to leave enough
    memory for the operating system. Assuming that you have one instance and no other
    applications, such as SSIS packages, running on the server, you would normally
    set both the min and max memory setting to be the lowest value from the following:


    *   RAM - 2GB


    *   (RAM / 8) ∗ 7


    If you have multiple instances, you would, of course, divide this number appropriately
    between the instances, depending on their requirements. If you have other applications
    running on the server, then you must also take their memory requirements into
    account and add those to the operating system requirements.


    Min Server Memory (MB) and Max Server Memory (MB) can both be configured by using
    the Memory tab in the Server Properties dialog box, as shown in Figure [5-4](#333037_2_En_5_Chapter.xhtml#Fig4).


    ![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig4_HTML.jpg](images/333037_2_En_5_Chapter/333037_2_En_5_Fig4_HTML.jpg)


    Figure 5-4


    The Memory tab


    You can also configure both the settings through T-SQL by using the `sp_configure`
    stored procedure. Listing [5-6](#333037_2_En_5_Chapter.xhtml#PC6) demonstrates
    this.


    ```

    DECLARE @MemOption1 INT = (SELECT physical_memory_kb/1024 - 2048 FROM sys.dm_os_sys_info)

    DECLARE @MemOption2 INT = (SELECT ((physical_Memory_kb/1024)/8) * 7 FROM sys.dm_os_sys_info)

    IF @MemOption1 <= 0

    BEGIN

    EXEC sys.sp_configure ''min server memory (MB)'', @MemOption2

    EXEC sys.sp_configure ''max server memory (MB)'', @MemOption2

    RECONFIGURE

    END

    ELSE IF @MemOption2 < @MemOption1

    BEGIN

    EXEC sys.sp_configure ''min server memory (MB)'', @MemOption2

    EXEC sys.sp_configure ''max server memory (MB)'', @MemOption2

    RECONFIGURE

    END

    ELSE

    BEGIN

    EXEC sys.sp_configure ''min server memory (MB)'', @MemOption1

    EXEC sys.sp_configure ''max server memory (MB)'', @MemOption1

    RECONFIGURE

    END

    Listing 5-6

    Configuring Min and Max Server Memory

    ```'
  trans: "\n## 最大并行度 (MAXDOP)\n\n**最大并行度 (MAXDOP)** 将设置为每个独立查询执行可用的最大核心数。这个想法初听起来可能有些反直觉。你肯定希望每个查询都尽可能地并行化吧？嗯，情况并非总是如此。\n\
    \n虽然一些数据仓库查询可能从高并行度中受益，但许多联机事务处理 (OLTP) 工作负载在较低的并行度下可能表现更好。这是因为如果一个查询在多个并行线程上执行，而有一个线程比其他线程花费更长的时间才能完成，那么其他线程可能需要等待最后一个线程结束，以便同步它们的数据流。如果发生这种情况，你很可能会看到大量的等待，且等待类型为\
    \ `CXPACKET`。\n\n在许多 OLTP 系统中，查询优化器选择高并行度实际上表明存在索引缺失或高度碎片化、统计信息过时等问题。解决这些问题带来的性能提升，远比以高并行度运行查询要大得多。\n\
    \n对于支持繁重数据仓库工作负载的实例，应测试并相应设置不同的 `MAXDOP` 配置。需要理解的是，如果少数查询与实例的大部分工作负载相比受益于不同的设置，也可以通过使用查询提示在查询级别设置\
    \ `MAXDOP`。然而，在绝大多数情况下，实例级别的 `MAXDOP` 设置应配置为以下三个值中的最低值：\n\n*   `8`\n*   实例可用的核心数\
    \ (`MAXDOP` 的默认值)\n*   一个 NUMA 节点内的核心数\n\n`MAXDOP` 的默认值是 `0`，这意味着查询仅受实例可见的核心数限制。你可以通过图形用户界面\
    \ (GUI) 配置 `MAXDOP`，方法是在服务器属性的“高级”选项卡上配置 `最大并行度` 设置。图 5-3 展示了此设置被配置为 `8`。\n\n\
    ![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig3_HTML.jpg](img/333037_2_En_5_Fig3_HTML.jpg)\n\
    \n图 5-3\n高级选项卡\n\n你也可以使用 `sp_configure` 配置 `MAXDOP`。代码清单 5-4 演示了使用 `sp_configure`\
    \ 将 `MAXDOP` 设置为 `8`。\n\n```\nEXEC sys.sp_configure 'max degree of parallelism',\
    \ 8\nRECONFIGURE\n```\n\n代码清单 5-4\n使用 sp_configure 配置 MAXDOP\n\n降低 `MAXDOP` 设置的一个辅助措施是提高查询优化器选择并行计划而非串行计划的阈值。此阈值的默认设置是估计串行执行时间为\
    \ 5 秒，但你可以将其配置为 0 到 32767 秒之间的任何值。在许多环境中，一个实际的限制是大约 30 秒，但这当然是具体工作负载相关的，并且应该始终进行测试。然而，如果你将\
    \ `MAXDOP` 配置为 `1`，或者实例只有一个核心可用，`并行度的成本阈值` 选项将被忽略。代码清单 5-5 中的脚本将 `并行度的成本阈值` 增加到\
    \ `10` 秒。\n\n```\nEXEC sp_configure 'cost threshold for parallelism', 10\nRECONFIGURE\n\
    ```\n\n代码清单 5-5\n配置并行度的成本阈值\n\n## 最小和最大服务器内存\n\n`最小服务器内存 (MB)` 和 `最大服务器内存 (MB)`\
    \ 设置用于控制 SQL Server 内存池可用的内存量。内存池包含许多组件。其中一些最大的组件详见表 5-4。\n\n表 5-4\nSQL Server\
    \ 内存池\n\n| 组件 | 描述 |\n| --- | --- |\n| 缓冲池 | 缓冲池在数据和索引页从磁盘读取或写入磁盘之前和之后存储它们。即使你的查询所需的页面不在缓存中，它们也会先写入缓冲池，然后从内存中检索，而不是直接从磁盘写入。\
    \ |\n| 过程缓存 | 过程缓存包含执行计划，不仅用于存储过程，还用于即席查询、预 pared 语句和触发器。当 SQL Server 开始优化查询时，它首先检查此缓存以查看是否存在合适的计划。\
    \ |\n| 日志缓存 | 日志缓存存储日志记录，然后将它们写入事务日志。 |\n| 日志池 | 一个哈希表，允许高可用性/灾难恢复 (HA/DR) 和数据分发技术（如\
    \ AlwaysOn、镜像和复制）快速访问所需的日志记录。 |\n| CLR | CLR 指在实例内部使用的 .NET 代码。在旧版本的 SQL Server\
    \ 中，CLR 位于主内存池之外，因为内存池仅处理单个 8KB 页面分配。从 SQL Server 2012 开始，内存池现在同时处理单页和多页分配，因此\
    \ CLR 已被纳入其中。 |\n\n在许多环境中，你可能希望为 `最小` 和 `最大` 服务器内存提供相同的值。这将避免 SQL Server 动态管理其保留内存量的开销。\n\
    \n但是，如果你有多个实例，动态内存管理可能是有益的，这样在任何给定时间工作负载最重的实例可以消耗最多的资源。如果你的实例托管在主动/主动集群上，你必须额外考虑。我曾见过一个例子，客户启用了\
    \ `锁定内存页`，然后像配置独立服务器一样配置了每个节点上实例的最小和最大内存。在故障转移发生时，剩余节点崩溃了，因为没有足够的 RAM 来支持一台服务器上所有实例的内存需求。\n\
    \n无论你的环境如何配置，你总是需要为操作系统留出足够的内存。假设你只有一个实例，并且服务器上没有运行其他应用程序（如 SSIS 包），你通常应将 `最小`\
    \ 和 `最大` 内存设置配置为以下两者中的较低值：\n\n*   RAM - 2GB\n*   (RAM / 8) ∗ 7\n\n如果你有多个实例，你当然会根据它们的需求，在这些实例之间适当分配这个数字。如果你在服务器上运行其他应用程序，那么你还必须考虑它们的内存需求，并将其加入操作系统需求中。\n\
    \n`最小服务器内存 (MB)` 和 `最大服务器内存 (MB)` 都可以通过使用服务器属性对话框中的“内存”选项卡进行配置，如图 5-4 所示。\n\n\
    ![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig4_HTML.jpg](img/333037_2_En_5_Fig4_HTML.jpg)\n\
    \n图 5-4\n内存选项卡\n\n你也可以通过 T-SQL 使用 `sp_configure` 存储过程配置这两个设置。代码清单 5-6 演示了这一点。\n\
    \n```\nDECLARE @MemOption1 INT = (SELECT physical_memory_kb/1024 - 2048 FROM sys.dm_os_sys_info)\n\
    DECLARE @MemOption2 INT = (SELECT ((physical_Memory_kb/1024)/8) * 7 FROM sys.dm_os_sys_info)\n\
    IF @MemOption1 <= 0\nBEGIN\n    EXEC sys.sp_configure 'min server memory (MB)',\
    \ @MemOption2\n    EXEC sys.sp_configure 'max server memory (MB)', @MemOption2\n\
    \    RECONFIGURE\nEND\nELSE IF @MemOption2 < @MemOption1\nBEGIN\n    EXEC sys.sp_configure\
    \ 'min server memory (MB)', @MemOption2\n    EXEC sys.sp_configure 'max server\
    \ memory (MB)', @MemOption2\n    RECONFIGURE\nEND\nELSE\nBEGIN\n    EXEC sys.sp_configure\
    \ 'min server memory (MB)', @MemOption1\n    EXEC sys.sp_configure 'max server\
    \ memory (MB)', @MemOption1\n    RECONFIGURE\nEND\n```\n\n代码清单 5-6\n配置最小和最大服务器内存\n"
- fmt: '### Trace Flags


    Trace flags are switches within SQL Server that can be used to toggle functionality
    on and off. Within the instance, they can be set at the session level, or they
    can be applied to the instance globally, using a DBCC command called `DBCC TRACEON`.
    Not all trace flags can be set at the session level due to their nature. An example
    of this is trace flag 634. Setting this flag turns off the background thread responsible
    for periodically compressing rowgroups within columnstore indexes. Obviously,
    this would not apply to a specific session. The sample in Listing 5-7 uses `DBCC
    TRACEON` to set trace flag 634 globally. It also turns on 1211 for the current
    session only. Trace flag 1211 disables lock escalation based on memory pressure
    or number of locks. The script then uses `DBCC TRACESTATUS` to show the status
    of the flags before finally using `DBCC TRACEOFF` to toggle the behavior back
    to default. You can see that to specify the global scope, we use a second parameter
    of `-1`. The default is to set the flag at the session level.


    ```

    DBCC TRACEON(634, -1)

    DBCC TRACEON(1211)

    DBCC TRACESTATUS

    DBCC TRACEOFF(634, -1)

    DBCC TRACEOFF(1211)

    Listing 5-7

    Setting Trace Flags with DBCC TRACEON

    ```


    ### Caution


    Trace flag 1211 is used here for the purpose of demonstrating `DBCC TRACEON`.
    However, it may cause an excessive number of locks and should be used with extreme
    caution. It may even cause SQL Server to throw errors due to lack of memory for
    allocating locks.


    Figure 5-5 shows the results screen that is produced from running this script,
    assuming that no other trace flags have currently been toggled away from their
    default setting. There are no results to display from the `DBCC TRACEON` and `DBCC
    TRACEOFF` commands. The messages windows, however, will display execution completed
    messages or inform you of any errors.


    ![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig5_HTML.jpg](images/333037_2_En_5_Chapter/333037_2_En_5_Fig5_HTML.jpg)


    Figure 5-5: `DBCC TRACESTATUS` results


    The limitation of using `DBCC TRACEON`, even with a global scope, is that the
    settings are transient and will not be persisted after the instance has been restarted.
    Therefore, if you wish to make permanent configuration changes to your instance,
    then you must use the `-T` startup parameter on the SQL Server service.


    Startup parameters can be configured in SQL Server Configuration Manager. Expanding
    Service in the left hand window will display a list of all SQL Server–related
    services on the server. Entering the properties for the Database Engine Service
    and selecting the Startup Parameters tab will then allow you to add or remove
    startup parameters. Figure 5-6 illustrates setting trace flag 809. (Please refer
    to the “Hybrid Buffer Pool” section of this chapter to understand the effect of
    this trace flag.)


    ![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig6_HTML.jpg](images/333037_2_En_5_Chapter/333037_2_En_5_Fig6_HTML.jpg)


    Figure 5-6: Startup parameters


    If your instance is running on Windows Server Core, or if you want to script the
    configuration on a GUI-based server, then you could achieve the same results by
    running the PowerShell script in Listing 5-8. This script allows you to specify
    the instance name and trace flag to be configured in the top two variables. These
    could also be parameterized if you wish to create a reusable script. Similarly,
    the script could be added to the automatic installation script that we created
    in Chapter 3.


    The PowerShell script works by determining the Registry path to the startup parameters
    and then by counting the number of arguments that already exist. Counting the
    arguments allows the next argument number in sequence to be determined. It then
    adds the new argument, specifying the required trace flag.


    ```

    # Define initial variables

    $InstanceName = "PROSQLADMINCORE"

    $TraceFlag = "809"

    # Configure full service name to be inserted into Registry path

    $Instance = "MSSQL12.$InstanceName"

    #Create full registry path

    $RegistryPath = "HKLM:\SOFTWARE\Microsoft\Microsoft SQL Server\MSSQL12.$InstanceName\MSSQLServer\Parameters"

    # Gather all properties from the Registry path

    $Properties = Get-ItemProperty $RegistryPath

    # Count the number of SQLArg properties that already exist so that the next number
    in sequence can be determined

    $Arguments = $Properties.psobject.properties | ?{$_.Name -like ''SQLArg*''} |
    select Name, Value

    # Create the name of the new argument based on the next argument number in sequence

    $NewArgument = "SQLArg"+($Arguments.Count)

    # Construct the complete value of the argument

    $FullTraceFlag = "-T$TraceFlag"

    # Set the trace flag

    Set-ItemProperty -Path $RegistryPath -Name $NewArgument -Value $FullTraceFlag

    Listing 5-8

    Configuring Trace Flags on Windows Server Core

    ```


    Many trace flags can be specified as startup parameters, and the vast majority
    of them are only helpful in very specific circumstances. There are a few that
    stand out, however, as having the potential for more widespread use. These trace
    flags are detailed in the following sections.


    ### Note


    Two often configured trace flags, in older versions of SQL Server, were T1117
    and T1118, which, respectively, caused all files with a filegroup to grow at the
    same rate and caused all extents (even for small tables) to be uniform. These
    features are now documented, database-level options, however. Therefore T1117
    and T1118 have no effect and should not be used.


    #### Trace Flag 3042


    When you are performing backups using backup compression in SQL Server, a preallocation
    algorithm is used to allocate a defined percentage of the database size to the
    backup file. This gives you a performance advantage over growing the size of the
    backup file, as required, on the fly. On the flip side, however, if you need to
    preserve disk space on your backup volume and use only the minimum amount of space
    required, then you can use trace flag 3042 to turn off this behavior and grow
    the file as required.


    #### Trace Flag 3226


    By default, every time you take a backup, a message will be recorded in the SQL
    Server log. If you take frequent log backups, however, then this can very quickly
    cause so much “noise” in the log that troubleshooting issues can become more difficult
    and time-consuming. If this is the case, then you can turn on trace flag 3226.
    This will cause successful backup messages to be suppressed in the log, resulting
    in a smaller, more manageable log. Another method of avoiding noise would be to
    create a script, which uses the `sys.xp_readerrorlog` system stored procedure
    to read the log. You can write the results to a table and filter them, for “interesting”
    events.


    #### Trace Flag 3625


    SQL Server enforces tight controls on the visibility of metadata. Users can only
    view metadata for objects they own or where they have explicitly been granted
    permissions to view metadata. This method of protection is still fallible, however,
    and a skilled attacker could still gain information. One way in which they could
    achieve this is by manipulating the order of precedence in queries in order to
    produce error messages.


    In order to mitigate this risk, you can set trace flag 3625. This trace flag will
    limit the amount of metadata visible in error messages by masking certain data
    with asterisks. The downside of this defensive tactic, however, is that error
    messages become less meaningful and harder to understand. This can make troubleshooting
    issues more difficult.'
