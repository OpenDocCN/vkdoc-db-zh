- fmt: '### Filtered Indexes


    A filtered index is an index built on a subset of the data stored within a table,
    as opposed to one that is built on all of the data in the table. Because the indexes
    are smaller, they can lead to improved query performance and reduced storage cost.
    They also have the potential to cause less overhead for DML operations, since
    they only need to be updated if the DML operation affects the data within the
    index. For example, if an index was filtered on `OrderDate >= ''2019-01-01'' AND
    OrderDate <= ''2019-12-31''` and subsequently updated all rows in the table where
    the `OrderDate >= ''2020-01-01''`, then the performance of the update would be
    the same as if the index did not exist.


    Filtered indexes are constructed by using a `WHERE` clause on index creation.
    There are many things that you can do in the `WHERE` clause, such as filter on
    `NULL` or `NOT NULL` values; use equality and inequality operators, such as `=`,
    `>`, `<`, and `IN`; and use logical operators, such as `AND` and `OR`. There are
    also limitations, however. For example, you cannot use `BETWEEN`, `CASE`, or `NOT
    IN`. Also, you can only use simple predicates; for example, using a date/time
    function is prohibited, so creating a rolling filter is not possible. You also
    cannot compare a column to other columns.


    The statement in Listing 8-5 creates a filtered index on `DeliveryDate`, where
    the value is `NULL`. This allows you to make performance improvements on queries
    that are run to determine which orders are yet to have their delivery scheduled.


    ```

    CREATE NONCLUSTERED INDEX NonDeliveredItems ON dbo.OrdersDisk(DeliveryDate)

    WHERE DeliveryDate IS NULL ;

    Listing 8-5

    Creating Filtered Index

    ```


    ### Indexes for Specialized Application


    In addition to traditional B-tree indexes, SQL Server also provides several types
    of special indexes to help query performance against memory-optimized tables and
    Columnstore indexes that help query performance in data warehouse scenarios. The
    following sections discuss these special indexes. Although beyond the scope of
    this book, SQL Server also offers special indexes for geospatial data, XML and
    JSON.


    ### Columnstore Indexes


    As you have seen, traditional indexes store rows of data on data pages. This is
    known as a `rowstore`. SQL Server also supports `Columnstore` indexes. These indexes
    flip data around and use a page to store a column, as opposed to a set of rows.
    This is illustrated in Figure 8-5.


    ![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig5_HTML.jpg](images/333037_2_En_8_Chapter/333037_2_En_8_Fig5_HTML.jpg)


    Figure 8-5

    Columnstore index structure


    A Columnstore index slices the rows of a table into chunks of between 102,400
    and 1,048,576 rows each. Each slice is called a `rowgroup`. The data in each rowgroup
    is then split down into columns and compressed using VertiPaq technology. Each
    column within a rowgroup is called a `column segment`.


    Columnstore indexes offer several benefits over traditional indexes, given appropriate
    usage scenarios. First, because they are highly compressed, they can improve IO
    efficiency and reduce memory overhead. They can achieve such a high compression
    rate because data within a single column is often very similar between rows. Also,
    because a query is able to retrieve just the data pages of the column it requires,
    IO can again be reduced. This is helped even further by the fact that each column
    segment contains a header with metadata about the data within the segment. This
    means that SQL Server can access just the segments it needs, as opposed to the
    whole column. A new query execution mechanism has also been introduced to support
    Columnstore indexes. It is called batch execution mode, and it allows data to
    be processed in chunks of 1000 rows, as opposed to a row-by-row basis. This means
    that CPU usage is much more efficient. Columnstore indexes are not a magic bullet,
    however, and are designed to be optimal for data warehouse–style queries that
    perform read-only operations on very large tables. OLTP-style queries are not
    likely to see any benefit and, in some cases, may actually execute slower. SQL
    Server supports both clustered and nonclustered Columnstore indexes, and these
    are discussed in the following sections.'
