    ### Using File Stats for Capacity Analysis


    When combined together, you can use the three metadata objects described in the
    previous section to produce powerful reports that can help you with capacity planning
    and diagnosing performance issues. For example, the query in Listing [17-9](#333037_2_En_17_Chapter.xhtml#PC9)
    provides the file size, amount of free space remaining, and IO stalls for each
    file in the database. Because `sys.dm_io_virtual_file_stats` is a function as
    opposed to a view, we `CROSS APPLY` the function to the result set, passing in
    the `database_id` and the `file_id` of each row as parameters.


    ```

    SELECT m.name

    ,m.physical_name

    ,CAST(fsu.total_page_count / 128\. AS NUMERIC(12,4)) [Fie Size (MB)]

    ,CAST(fsu.unallocated_extent_page_count / 128\. AS NUMERIC(12,4)) [Free Space
    (MB)]

    ,vfs.io_stall_read_ms

    ,vfs.io_stall_write_ms

    FROM sys.dm_db_file_space_usage fsu

    CROSS APPLY sys.dm_io_virtual_file_stats(fsu.database_id, fsu.file_id) vfs

    INNER JOIN sys.master_files m

    ON fsu.database_id = m.database_id

    AND fsu.file_id = m.file_id ;

    Listing 17-9

    File Capacity Details

    ```


    The script in Listing [17-10](#333037_2_En_17_Chapter.xhtml#PC10) demonstrates
    how you can use `sys.master_files` to analyze drive capacity for each volume by
    detailing the current size of each file, the amount each file will grow by the
    next time it grows, and the current free capacity of the drive. You can obtain
    the free space on the drive by using the `xp_fixeddrives` stored procedure.


    ```

    DECLARE @fixeddrives TABLE

    (

    Drive        CHAR(1),

    MBFree        BIGINT

    ) ;

    INSERT INTO @fixeddrives

    EXEC xp_fixeddrives ;

    SELECT

    Drive

    ,SUM([File Space Used (MB)]) TotalSpaceUsed

    , SUM([Next Growth Amount (MB)]) TotalNextGrowth

    , SpaceLeftOnVolume

    FROM (

    SELECT Drive

    ,size * 1.0 / 128 [File Space Used (MB)]

    ,CASE

    WHEN is_percent_growth = 0

    THEN growth * 1.0 / 128

    WHEN is_percent_growth = 1

    THEN (size * 1.0 / 128 * growth / 100)

    END [Next Growth Amount (MB)]

    ,f.MBFree SpaceLeftOnVolume

    FROM sys.master_files m

    INNER JOIN @fixeddrives f

    ON LEFT(m.physical_name, 1) = f.Drive ) a

    GROUP BY Drive, SpaceLeftOnVolume

    ORDER BY drive ;

    Listing 17-10

    Analyzing Drive Space with xp_fixeddrives

    ```


