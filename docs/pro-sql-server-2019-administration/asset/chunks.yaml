  trans: '

    ### 一致性


    一致性属性意味着事务将数据库从一个一致状态转移到另一个一致状态；在事务结束时，所有数据必须符合所有的数据规则，这些规则通过约束、数据类型等方式来强制实施。


    SQL Server 完全支持这一属性，但存在一些变通方法。例如，如果你在表上有一个检查约束或外键，并且你希望执行大规模的批量插入，你可以先禁用约束，插入数据，然后使用
    `NOCHECK` 重新启用约束。当你使用 `NOCHECK` 时，约束会强制执行新数据修改的规则，但不会对表中已存在的数据强制执行该规则。然而，当你这样做时，SQL
    Server 会将该约束标记为不可信，查询优化器会忽略该约束，直到你使用以下命令验证了表中的现有数据：


    ```sql

    ALTER TABLE MyTable WITH CHECK CHECK CONSTRAINT ALL

    ```


    ### 隔离性


    隔离性指的是并发事务在其他事务提交之前，查看其数据修改的能力。隔离事务可以避免事务异常，并通过获取锁或维护行的多个版本来强制实施。每个事务都在定义的隔离级别下运行。在我们讨论可用的隔离级别之前，我们首先需要了解可能发生的事务异常。


    #### 事务异常


    事务异常可能导致查询返回不可预测的结果。在 SQL Server 中，可能发生三种类型的事务异常：脏读、不可重复读和幻读。这些将在以下部分进行讨论。


    ##### 脏读


    `脏读` 发生在一个事务读取了从未在数据库中存在过的数据时。表 18-7 概述了这种异常如何发生的一个例子。


    表 18-7


    一次脏读


    | 事务 1 | 事务 2 |

    | --- | --- |

    | 将 `row1` 插入 `Table1` |   |

    |   | 从 `Table1` 读取 `row1` |

    | 回滚 |   |


    在此示例中，由于 `事务 1` 回滚了，`事务 2` 读取了一行从未在数据库中存在的数据。如果在读取时未获取共享锁，则可能发生此异常，因为没有锁与 `事务
    1` 获取的排他锁冲突。


    ##### 不可重复读


    当一个事务两次读取同一行但每次得到不同结果时，就发生了不可重复读。表 18-8 概述了这种异常如何发生的一个例子。


    表 18-8


    一次不可重复读


    | 事务 1 | 事务 2 |

    | --- | --- |

    | 从 `Table1` 读取 `row1` |   |

    |   | 更新 `Table1` 中的 `row1` |

    |   | 提交 |

    | 从 `Table1` 读取 `row1` |   |


    在此示例中，你可以看到 `事务 1` 两次从 `Table1` 读取了 `row1`。然而，第二次读取时，它得到了不同的结果，因为 `事务 2` 已经更新了该行。如果
    `事务 1` 获取了共享锁但没有在事务持续期间一直持有它们，就可能发生此异常。


    ##### 幻读


    当一个事务两次读取一个行范围，但第二次读取该范围时得到的行数不同，就发生了幻读。表 18-9 概述了这种异常如何发生的一个例子。


    表 18-9


    幻读


    | 事务 1 | 事务 2 |

    | --- | --- |

    | 读取 `Table1` 中的所有行 |   |

    |   | 向 `Table1` 插入十行 |

    |   | 提交 |

    | 读取 `Table1` 中的所有行 |   |


    在此示例中，你可以看到 `事务 1` 两次读取了 `Table1` 中的所有行。然而，第二次读取时，它多读了十行，因为 `事务 2` 向表中插入了十行。当
    `事务 1` 没有获取键范围锁并在事务持续期间持有它时，就可能发生此异常。


    #### 隔离级别


    SQL Server 为涉及基于磁盘表的事务提供了四种悲观和两种乐观事务隔离级别。悲观隔离级别使用锁来防止事务异常，乐观隔离级别使用行版本控制。


    ##### 悲观隔离级别


    `未提交读` 是限制性最低的隔离级别。它通过为写操作获取锁，而不为读操作获取任何锁来工作。这意味着在此隔离级别下，读操作不会阻塞其他读取器或写入器。其结果是，前文描述的所有事务异常都可能发生。


    `已提交读` 是默认的隔离级别。它通过为读操作获取共享锁，也为写操作获取锁来工作。共享锁仅在读取特定行的读取阶段持有，一旦记录被读取，锁就会释放。这样可以防止脏读，但不可重复读和幻读仍然可能发生。


    **提示**


    在某些情况下，共享锁可能会一直持有到语句结束。当物理运算符需要将数据假脱机到磁盘时，就会发生这种情况。


    除了为写操作获取锁外，`可重复读` 还会获取它所触及的所有行上的共享锁，然后持有这些锁直到事务结束。其结果是，脏读和不可重复读不再可能，尽管幻读仍然可能发生。由于读取在整个事务期间都保持持有状态，因此发生死锁的可能性比使用
    `已提交读` 或 `未提交读` 隔离级别时更高。


    `可序列化` 是限制性最强的隔离级别，也是最有可能发生死锁的级别。它的工作方式不仅是为写操作获取锁，还为读操作获取键范围锁，然后在整个事务期间持有它们。因为键范围锁是以这种方式持有的，所以任何事务异常都不可能发生，包括幻读。

    '
- fmt: '# Optimistic Isolation Levels


    Optimistic isolation levels work without acquiring any locks for either read or
    write operations. Instead, they use a technique called `row versioning`. `Row
    versioning` works by maintaining a new copy of a row in `TempDB` for uncommitted
    transactions every time the row is updated. This means that there is always a
    consistent copy of the data that transactions can refer to. This can dramatically
    reduce contention on highly concurrent systems. The trade-off is that you need
    to scale `TempDB` appropriately, in terms of both size and throughput capacity,
    since the extra IO can have a negative impact on performance.


    `Snapshot isolation` uses optimistic concurrency for both read and write operations.
    It works by assigning each transaction a transaction sequence number at the point
    the transaction begins. It is then able to read the version of the row from `TempDB`
    that was current at the start of the transaction by looking for the closest sequence
    number that is lower than the transaction’s own sequence number. This means that
    although other versions of the row may exist with modifications, it cannot see
    them, since the sequence numbers are higher. If two transactions try to update
    the same row at the same time, instead of a deadlock occurring, the second transaction
    throws error `3960` and the transaction is rolled back. The result of this behavior
    is that dirty reads, nonrepeatable reads, and phantom reads are not possible.


    The `Read Committed Snapshot` uses pessimistic concurrency for write operations
    and optimistic concurrency for read operations. For read operations, it uses the
    version of the row that is current at the beginning of each statement within the
    transaction, as opposed to the version that was current at the beginning of the
    transaction. This means that you achieve the same level of isolation as you would
    by using the pessimistic `Read Committed` isolation level.


    Unlike the pessimistic isolation levels, you need to turn on optimistic isolation
    levels at the database level. When you turn on `Read Committed Snapshot`, this
    replaces the functionality of `Read Committed`. This is important to bear in mind,
    because `Read Committed Snapshot` becomes your default isolation level and is
    used for all transactions that do not specifically set an isolation level. The
    script in Listing 18-4 demonstrates how to turn on `Snapshot isolation` and `Read
    Committed Snapshot isolation` for the `Chapter18` database. The script first checks
    to make sure that `Read Committed` and `Read Committed Snapshot` are not already
    enabled. If they are not, it kills any sessions that are currently connected to
    the `Chapter18` database before finally running the `ALTER DATABASE` statements.


    ```sql

    --Check if already enabled

    IF EXISTS (

    SELECT name

    ,snapshot_isolation_state_desc

    ,is_read_committed_snapshot_on

    FROM sys.databases

    WHERE name = ''Chapter18''

    AND snapshot_isolation_state_desc = ''OFF''

    AND is_read_committed_snapshot_on = 0 )

    BEGIN

    --Kill any existing sessions

    IF EXISTS(

    SELECT * FROM sys.dm_exec_sessions where database_id = DB_id(''Chapter18'')

    )

    BEGIN

    PRINT ''Killing Sessions to Chapter18 database''

    DECLARE @SQL NVARCHAR(MAX)

    SET @SQL = (SELECT ''KILL '' + CAST(Session_id AS NVARCHAR(3)) + ''; '' [data()]

    FROM sys.dm_exec_sessions

    WHERE database_id = DB_id(''Chapter18'')

    FOR XML PATH('''')

    )

    EXEC(@SQL)

    END

    PRINT ''Enabling Snapshot and Read Committed Sanpshot Isolation''

    ALTER DATABASE Chapter18

    SET ALLOW_SNAPSHOT_ISOLATION ON ;

    ALTER DATABASE Chapter18

    SET READ_COMMITTED_SNAPSHOT ON ;

    END

    ELSE

    PRINT ''Snapshot Isolation already enabled''

    Listing 18-4

    Turning On Optimistic Isolation

    ```


    ## Durable


    For a transaction to be durable, after it has been committed, it stays committed,
    even in a catastrophic event. This means that the change must be written to disk,
    since the change within memory will not withstand a power failure, a restart of
    the instance, and so on. SQL Server achieves this by using a process called write-ahead
    logging (WAL). This process flushes the log cache to disk at the point the transaction
    commits, and the commit only completes once this flush finishes.


    SQL Server relaxed these rules, however, by introducing a feature called delayed
    durability. This feature works by delaying the flush of the log cache to disk
    until one of the following events occurs:


    *   The log cache becomes full and automatically flushes to disk.

    *   A fully durable transaction in the same database commits.

    *   The `sp_flush_log` system stored procedure is run against the database.


    When delayed durability is used, the data is visible to other transactions as
    soon as the transaction commits; however, the data committed within the transaction
    could potentially be lost, if the instance goes down or is restarted, until the
    log records have been flushed. Support for delayed durability is configured at
    the database level, using one of the three options detailed in Table 18-10.


    Table 18-10

    Support Levels for Delayed Durability


    | Support Level | Description |

    | --- | --- |

    | `ALLOWED` | Delayed durability is supported within the database and specified
    on a transaction level basis. |

    | `FORCED` | All transactions within the database will use delayed durability.
    |

    | `DISABLED` | The default setting. No transactions within the database are permitted
    to use delayed durability. |


    The command in Listing 18-5 shows how to allow delayed durability in the `Chapter18`
    database.


    ```sql

    ALTER DATABASE Chapter18

    SET DELAYED_DURABILITY  = ALLOWED ;

    Listing 18-5

    Allowing Delayed Durability

    ```


    If a database is configured to allow delayed durability, then `Full` or `Delayed`
    durability is configured at the transaction level, in the `COMMIT` statement.
    The script in Listing 18-6 demonstrates how to commit a transaction with delayed
    durability.


    ```sql

    USE Chapter18

    GO

    BEGIN TRANSACTION

    UPDATE dbo.Customers

    SET DeliveryAddressID = 1

    WHERE CustomerID = 10 ;

    COMMIT WITH (DELAYED_DURABILITY = ON)

    Listing 18-6

    Committing with Delayed Durability

    ```


    ## Caution


    The most important thing to remember, when using delayed durability, is the potential
    for data loss. If any transactions have committed but the associated log records
    have not been flushed to disk when the instance goes down, this data is lost.


    In the event of an issue, such as an IO error, it is possible for uncommitted
    transactions to enter a state where they cannot be committed or rolled back. This
    occurs when you are bringing a database back online and it fails during both the
    redo phase and the undo phase. This is called a `deferred transaction`. Deferred
    transactions stop the VLF that they are in from being truncated, meaning that
    the transaction log continues to grow.


    Resolving the issue depends on the cause of the problem. If the problem is caused
    by a corrupt page, then you may be able to restore this page from a backup. If
    the issue is caused because a filegroup was offline, then you must either restore
    the filegroup or mark the filegroup as defunct. If you mark a filegroup as defunct,
    you cannot recover it.


    ## Transaction with In-Memory OLTP


    Memory-optimized tables do not support locks to improve concurrency; this changes
    the way isolation levels can work, since pessimistic concurrency is no longer
    an option. We discuss isolation levels supported for In-Memory OLTP, along with
    considerations for cross-container queries, in the following sections.


    ### Isolation Levels


    Because all isolation levels used with In-Memory OLTP must be optimistic, each
    isolation level implements row versioning. Unlike row versioning for disk-based
    tables, however, row versions for memory-optimized tables are not maintained in
    `TempDB`. Instead, they are maintained in the memory-optimized table that they
    relate to.'
