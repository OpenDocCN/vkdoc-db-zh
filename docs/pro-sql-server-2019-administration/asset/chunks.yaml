    This report consists of four charts, representing execution duration, execution
    count, CPU Time, and Logical Reads, aggregated over time intervals.


    ![../images/333037_2_En_20_Chapter/333037_2_En_20_Fig2_HTML.jpg](images/333037_2_En_20_Chapter/333037_2_En_20_Fig2_HTML.jpg)


    Figure 20-2


    Overall Resource Consumption


    Hovering your mouse over a bar will cause a box with further details to be displayed,
    as you can see in Figure [20-3](#333037_2_En_20_Chapter.xhtml#Fig3).


    ![../images/333037_2_En_20_Chapter/333037_2_En_20_Fig3_HTML.jpg](images/333037_2_En_20_Chapter/333037_2_En_20_Fig3_HTML.jpg)


    Figure 20-3


    Viewing additional details


    Clicking the Standard Grid button will replace the bar charts with a grid, with
    one row per time interval, showing aggregated runtime statistics. This grid can
    be copied to Excel for further analysis. The grid is illustrated in Figure [20-4](#333037_2_En_20_Chapter.xhtml#Fig4).


    ![../images/333037_2_En_20_Chapter/333037_2_En_20_Fig4_HTML.jpg](images/333037_2_En_20_Chapter/333037_2_En_20_Fig4_HTML.jpg)


    Figure 20-4


    Standard grid view'
  trans: '

    # 使用查询存储数据


    在我们了解如何使用查询存储数据之前，首先需要运行一些查询，以便查询存储有数据可收集。`清单 [20-4]` 中的脚本将对 `Chapter20` 数据库运行一系列查询。


    ```

    SELECT

    CustomerID

    , FirstName

    , LastName

    , CreditLimit

    , Balance

    FROM dbo.Customers

    WHERE LastName = ''Carter''

    GO

    SELECT TOP (1000) [CustomerID]

    ,[FirstName]

    ,[LastName]

    ,[BillingAddressID]

    ,[DeliveryAddressID]

    ,[CreditLimit]

    ,[Balance]

    FROM [Chapter20].[dbo].[Customers]

    GO

    SELECT *

    FROM dbo.Customers A

    INNER JOIN dbo.Customers B

    ON a.CustomerID = b.CustomerID

    UNION

    SELECT *

    FROM dbo.Customers A

    INNER JOIN dbo.Customers B

    ON a.CustomerID = b.CustomerID

    GO

    清单 20-4

    查询 Chapter20 数据库

    ```


    ## SSMS 报告


    既然我们已经运行了一些查询，查询存储就会捕获关于这些查询的数据。我们可以通过一系列 SSMS 报告来查看这些数据。标准报告包括：


    *   查看性能下降的查询

    *   查看总体资源消耗

    *   查看具有强制计划的查询

    *   查看高差异的查询

    *   查询等待统计信息

    *   查看已跟踪的查询


    这些报告可以通过浏览 `数据库` ➤ `[数据库名称]`，然后从 `查询存储` 节点的上下文菜单中选择相应的报告来访问。在本章中，我们将研究一些我认为最有用的报告，但我鼓励你尝试所有这些报告。


    ### 提示


    由于报告的性质，当你首次设置查询存储时，数据会非常少。随着查询存储启用后时间的推移，数据点将会增长。


    总体资源消耗报告如 `图 [20-2]` 所示。该报告包含四个图表，分别代表按时间间隔聚合的执行持续时间、执行次数、CPU 时间和逻辑读取。


    ![../images/333037_2_En_20_Chapter/333037_2_En_20_Fig2_HTML.jpg](img/333037_2_En_20_Fig2_HTML.jpg)


    图 20-2

    总体资源消耗


    将鼠标悬停在一个柱形上会显示一个包含更多详细信息的框，如 `图 [20-3]` 所示。


    ![../images/333037_2_En_20_Chapter/333037_2_En_20_Fig3_HTML.jpg](img/333037_2_En_20_Fig3_HTML.jpg)


    图 20-3

    查看其他详细信息


    点击“标准网格”按钮将用一个网格替换柱形图，网格中每个时间间隔一行，显示聚合的运行时统计数据。此网格可以复制到 Excel 中进行进一步分析。网格视图如 `图
    [20-4]` 所示。


    ![../images/333037_2_En_20_Chapter/333037_2_En_20_Fig4_HTML.jpg](img/333037_2_En_20_Fig4_HTML.jpg)


    图 20-4

    标准网格视图

    '
- fmt: '### Tip


    You will notice that the execution count is far higher than the number of queries
    we have run. This is because SQL Server runs queries in the background, as part
    of many different processes, including queries that are run when you navigate
    `SSMS`.


    Figure [20-5](#333037_2_En_20_Chapter.xhtml#Fig5) illustrates the Top Resource
    Consumers Report. The top left corner of this report shows a bar chart, representing
    the most resource-intensive queries. The `Metric` drop-down defaults to `Duration`,
    but many different metrics can be selected, including degree of parallelism (`DOP`),
    `CPU Time`, `Row Count`, `Wait Time` even `CLR Time`, or `Log Memory Used`, to
    name but a few.


    The top right corner of the report shows a scatter chart, detailing resource utilization
    and execution time of each plan. This is helpful when a query has been executed
    using multiple plans, as you can easily assess the most efficient plans for a
    query.


    The bottom half of the plan shows the accrual execution plan that was used. As
    with any other graphical query plan representation in `SSMS`, hovering over a
    physical operator will show cost information for that operator.


    ![../images/333037_2_En_20_Chapter/333037_2_En_20_Fig5_HTML.jpg](images/333037_2_En_20_Chapter/333037_2_En_20_Fig5_HTML.jpg)

    Figure 20-5: Top Resource Consumers


    The front page of the Query Wait Statistics report can be seen in Figure [20-6](#333037_2_En_20_Chapter.xhtml#Fig6).
    The bar chart at the top of the screen shows a summary of resources that the highest
    cumulative wait times have been against.


    ![../images/333037_2_En_20_Chapter/333037_2_En_20_Fig6_HTML.jpg](images/333037_2_En_20_Chapter/333037_2_En_20_Fig6_HTML.jpg)

    Figure 20-6: Query Wait Statistics report


    Each bar in the bar chart is clickable. For example, if I were to click the `CPU`
    bar, then the drill-through report in Figure [20-7](#333037_2_En_20_Chapter.xhtml#Fig7)
    would be displayed.


    ![../images/333037_2_En_20_Chapter/333037_2_En_20_Fig7_HTML.jpg](images/333037_2_En_20_Chapter/333037_2_En_20_Fig7_HTML.jpg)

    Figure 20-7: `CPU` drill-through report


    By default, the top half of the grid will show the most expensive queries (labelled
    by `Plan ID`), based on `Total Wait Time`, but as you can see, the `Based On`
    drop-down list can be changed to base the results on average, min, max wait time,
    or the standard deviation.


    The lower half of the report shows the graphical representation of the Query Plan
    that has been selected in the top half of the report.


    ### Query Store T-SQL Objects


    As well as graphical reports, SQL Server also exposes a number of catalog views
    which can be used to retrieve Query Store data. Table [20-3](#333037_2_En_20_Chapter.xhtml#Tab3)
    details the catalog views which are exposed.

    Table 20-3: Query Store Catalog Views


    | `Catalog View` | `Description` |

    | --- | --- |

    | `Query_store_plan` | Stores information about every query plan that is associated
    with a query. |

    | `Query_store_query` | Stores query information and aggregated runtime statistics.
    |

    | `Query_store_wait_stats` | Stores wait statistic details. Please see Table [20-4](#333037_2_En_20_Chapter.xhtml#Tab4)
    for mappings of each wait type. |

    | `Query_store_query_text` | Stores the `SQL handle` and `SQL text` of each query.
    |

    | `Query_store_runtime_stats` | Stores the runtime statistics for each query.
    |


    Table [20-4](#333037_2_En_20_Chapter.xhtml#Tab4) details how each wait type category
    maps to underlying wait types.

    Table 20-4: Wait Statistics Mappings


    | `Wait Category` | `Wait Types` |

    | --- | --- |

    | `CPU` | `SOS_SCHEDULER_YIELD` |

    | `Worker Thread` | `THREADPOOL` |

    | `Lock` | `LCK_M_*` |

    | `Latch` | `LATCH_*` |

    | `Buffer Latch` | `PAGELATCH_*` |

    | `Buffer IO` | `PAGEIOLATCH_*` |

    | `SQL CLR` | `CLR*SQLCLR*` |

    | `Mirroring` | `DBMIRROR*` |

    | `Transaction` | `ACT*DTC*TRAN_MARKLATCH_*MSQL_XACT_*TRANSACTION_MUTEX` |

    | `Idle` | `SLEEP_*LAZYWRITER_SLEEPSQLTRACE_BUFFER_FLUSHSQLTRACE_INCREMENTAL_FLUSH_SLEEPSQLTRACE_WAIT_ENTRIESFT_IFTS_SCHEDULER_IDLE_WAITXE_DISPATCHER_WAITREQUEST_FOR_DEADLOCK_SEARCHLOGMGR_QUEUEONDEMAND_TASK_QUEUECHECKPOINT_QUEUEXE_TIMER_EVENT`
    |

    | `Preemptive (Preemptive IO)` | `PREEMPTIVE_*` |

    | `Service Broker` | `BROKER_*` |

    | `Transaction Log IO` | `LOGMGRLOGBUFFERLOGMGR_RESERVE_APPENDLOGMGR_FLUSHLOGMGR_PMM_LOGCHKPTWRITELOG`
    |

    | `Network IO` | `ASYNC_NETWORK_IONET_WAITFOR_PACKETPROXY_NETWORK_IOEXTERNAL_SCRIPT_NETWORK_IOF`
    |

    | `Parallelism` | `CXPACKETEXCHANGE` |

    | `Memory` | `RESOURCE_SEMAPHORE, CMEMTHREADCMEMPARTITIONED, EE_PMOLOCKMEMORY_ALLOCATION_EXTRESERVED_MEMORY_ALLOCATION_EXTMEMORY_GRANT_UPDATE`
    |

    | `User Wait` | `WAITFORWAIT_FOR_RESULTSBROKER_RECEIVE_WAITFOR` |

    | `Tracing` | `TRACEWRITESQLTRACE_LOCKSQLTRACE_FILE_BUFFERSQLTRACE_FILE_WRITE_IO_COMPLETIONSQLTRACE_FILE_READ_IO_COMPLETIONSQLTRACE_PENDING_BUFFER_WRITERS,
    SQLTRACE_SHUTDOWN, QUERY_TRACEOUTTRACE_EVTNOTIFF` |

    | `Full Text Search` | `FT_RESTART_CRAWLFULLTEXT GATHERERMSSEARCHFT_METADATA_MUTEXFT_IFTSHC_MUTEXFT_IFTSISM_MUTEXFT_IFTS_RWLOCKFT_COMPROWSET_RWLOCKFT_MASTER_MERGEFT_PROPERTYLIST_CACHEFT_MASTER_MERGE_COORDINATORPWAIT_RESOURCE_SEMAPHORE_FT_PARALLEL_QUERY_SYNC`
    |

    | `Other IO` | `ASYNC_IO_COMPLETION, IO_COMPLETIONBACKUPIO, WRITE_COMPLETIONIO_QUEUE_LIMITIO_RETRY`
    |

    | `Replication` | `SE_REPL_*REPL_*, HADR_*PWAIT_HADR_*, REPLICA_WRITESFCB_REPLICA_WRITE,
    FCB_REPLICA_READPWAIT_HADRSIM` |

    | `Log Rate Governor` | `LOG_RATE_GOVERNORPOOL_LOG_RATE_GOVERNORHADR_THROTTLE_LOG_RATE_GOVERNORINSTANCE_LOG_RATE_GOVERNOR`
    |


    `*` Denotes a wildcard, where all waits that match the portion to the left of
    the `*` are included.


    ### Tip


    `Idle` and `User Wait` are unlike other Wait Type categories, in the respect that
    they are not waiting for a resource, they are waiting for work to do.


    For example, the query in Listing [20-5](#333037_2_En_20_Chapter.xhtml#PC5) will
    return the three highest wait categories, by total wait time, excluding idle and
    user waits, which are “healthy” waits.


    ```sql

    SELECT TOP 3

    wait_category_desc

    , SUM(total_query_wait_time_ms) TotalWaitTime

    FROM sys.query_store_wait_stats

    WHERE wait_category_desc NOT IN (''Idle'', ''User Wait'')

    GROUP BY wait_category_desc

    ORDER BY SUM(total_query_wait_time_ms) DESC

    ```

    Listing 20-5: Return Top 3 Wait Types


    ## Resolving Issues with Query Store


    Figure [20-8](#333037_2_En_20_Chapter.xhtml#Fig8) illustrates the Regressed Query
    report. This report displays queries whose impact in terms of duration or execution
    count has increased over time. These queries are illustrated with a bar chart
    in the top left of the report. The top right of the report illustrates the plans
    that have been used to execute the query, with their associated duration. At the
    bottom of the report, we can see the actual execution plan for the current selection
    of query and plan in the top half of the screen.


    ![../images/333037_2_En_20_Chapter/333037_2_En_20_Fig8_HTML.jpg](images/333037_2_En_20_Chapter/333037_2_En_20_Fig8_HTML.jpg)

    Figure 20-8: Regressed Query report


    In this particular example, we can see that the query has run using two distinct
    plans and that the plan with an ID of `168` took significantly less time to execute
    than the plan with an ID of `110`. Therefore, with the more efficient plan selected,
    we can use the `Force Plan` button, in the middle of the report, to ensure that
    the more efficient plan is always used to execute this query. Once we have used
    this feature, the `Unforce Plan` button will become active, allowing us to undo
    our action, if required.'
