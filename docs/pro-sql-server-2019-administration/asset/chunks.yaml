    ## SSMS Reports


    Now we have run some queries, the Query Store will have captured data about those
    queries. We can view this data through a series of SSMS reports. The standard
    reports are


    *   View Regressed Queries


    *   View Overall Resource Consumption


    *   View Queries with Forced Plans


    *   View Queries with High Variation


    *   Query Wait Statistics


    *   View Tracked Queries


    These reports can be accessed by drilling through Databases ➤ `[Database Name]`
    and then selecting the appropriate report from the context menu of the `Query
    Store` node. In this chapter, we will examine some of the reports that I find
    most useful, but I encourage you to experiment with all of them.


