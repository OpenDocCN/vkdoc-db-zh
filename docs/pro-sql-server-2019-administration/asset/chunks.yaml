    ### Working with Distributed Replay


    现在分布式重播实用程序已经配置好了，我们使用 Extended Events 创建一个跟踪，然后再同步目标。然后，我们使用分布式重播来重放该跟踪，以测试性能调整，模拟两个客户端上的并发活动。然而，在执行此操作之前，我们首先使用清单
    [21-5](#333037_2_En_21_Chapter.xhtml#PC5) 中的脚本在控制器上创建 `Chapter21` 数据库。


    ```

    --Create the database

    CREATE DATABASE Chapter21 ;

    GO

    USE Chapter21

    GO

    --Create and populate numbers table

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE;

    --Create and populate name pieces

