    | `/SQMREPORTING` | Specifies if SQL Reporting will be enabled. Use a value of
    `0` to disable or `1` to enable. |

    | `/SQLSVCINSTANTFILEINIT` | Specifies that the Database Engine Service account
    should be granted the Perform Volume Maintenance Tasks privilege. Acceptable values
    are **true** or **false**. |

    | `/TCPENABLED` | Specifies if TCP will be enabled. Use a value of `0` to disable
    or `1` to enable. |

    | `/UPDATEENABLED` | Specifies if Product Update functionality will be used. Pass
    a value of `0` to disable or `1` to enable. |

    | `/UPDATESOURCE` | Specifies a location for Product Update to search for updates.
    A value of `MU` will search Windows Update, but you can also pass a file share
    or UNC. |'
  trans: '#### 其他日志文件


    SQL Server 安装例程会生成许多额外的日志文件，包括一个名为 `Datastore` 的文件夹，其中包含一系列 `XML` 文件，每个文件代表一个已配置的独立设置。同样值得注意的是，您会找到安装程序生成的配置文件副本和一个名为
    `settings.xml` 的文件。此文件定义了配置选项的元数据，包括配置值的来源，例如默认值或用户指定值。


    安装过程中运行的每个 `MSI` 都会创建一个详细日志。这些日志的数量当然取决于您选择安装的功能。在 `Windows Server Core` 上，只要您不是仅执行
    `SSAS` 安装，至少会有一个与 SQL 引擎相关的 `.log` 文件。这些 `.log` 文件可以提供关于其特定 `MSI` 更为详细的粒度信息，有助于您进行故障排除。


    然而，使用 `MSI` 日志并非完全直接明了，因为您可能会发现许多错误是由前一个错误引起的，而不是问题的根本原因。要使用这些日志文件，您应该按创建时间对它们进行排序。然后，您可以从后往前处理它们。您找到的最后一个错误将是根本原因问题。要在这些文件中搜索错误，请搜索字符串
    `Return value 3`。但这可能会变得更复杂，因为并非所有出现的 `Return value 3` 都与意外错误相关。其中一些可能是预期结果。


    ### 可选参数


    有许多开关和参数可以可选地用于自定义您正在安装的实例的配置。可用于安装数据库引擎的可选开关和参数列于表 3-7 中。


    表 3-7 可选参数


    | 参数 | 用法 |

    | --- | --- |

    | `/AGTSVCSTARTUPTYPE` | 指定 SQL Agent 服务的启动模式。可设置为 `Automatic`、`Manual` 或 `Disabled`。
    |

    | `/BROWSERSVCSTARTUPTYPE` | 指定 SQL Browser 服务的启动模式。可设置为 `Automatic`、`Manual`
    或 `Disabled`。 |

    | `/CONFIGURATIONFILE` | 指定配置文件的路径，该文件包含开关和参数列表，从而在运行安装程序时无需内联指定它们。 |

    | `/ENU` | 指示将使用英文版 SQL Server。如果您在具有本地化设置的服务器上安装英文版 SQL Server，且安装介质同时包含英文和本地化操作系统的语言包，请使用此开关。
    |

    | `/FILESTREAMLEVEL` | 用于启用 `FILESTREAM` 并设置所需的访问级别。可设置为 `0` 禁用 `FILESTREAM`，`1`
    仅允许通过 SQL Server 连接，`2` 允许 IO 流式传输，或 `3` 允许远程流式传输。选项 `1` 到 `3` 是逐级递进的，因此指定级别 `3`
    即隐式指定了级别 `1` 和 `2`。 |

    | `/FILESTREAMSHARENAME` | 指定存储 `FILESTREAM` 数据的 Windows 文件共享名称。当 `/FILESTREAMLEVEL`
    设置为 `2` 或 `3` 时，此参数成为必需项。 |

    | `/FTSVCACCOUNT` | 用于运行全文筛选器启动器服务的账户。 |

    | `/FTSVCPASSWORD` | 用于运行全文筛选器启动器服务的账户密码。 |

    | `/HIDECONSOLE` | 指定应隐藏控制台。 |

    | `/INDICATEPROGRESS` | 使用此开关时，安装日志将在安装过程中输出到屏幕。 |

    | `/IACCEPTPYTHONLICENSETERMS` | 如果使用 `/q` 或 `/qs` 安装 Anaconda Python 包，则必须指定此项。
    |

    | `/IACCEPTROPENLICENSETERMS` | 使用 `/q` 或 `/qs` 安装 Microsoft R 包时必须指定。 |

    | `/INSTANCEDIR` | 指定实例的文件夹位置。 |

    | `/INSTANCEID` | 指定实例的 ID。使用此参数被认为是不好的做法，如第 2 章所述。 |

    | `/INSTALLSHAREDDIR` | 指定实例间共享的 64 位组件的文件夹位置。 |

    | `/INSTALLSHAREDWOWDIR` | 指定实例间共享的 32 位组件的文件夹位置。此位置不能与 64 位共享组件的位置相同。 |

    | `/INSTALLSQLDATADIR` | 指定实例数据的默认文件夹位置。 |

    | `/NPENABLED` | 指定是否应启用命名管道。可设置为 `0` 禁用或 `1` 启用。 |

    | `/PID` | 指定 SQL Server 的 `PID`。除非安装介质已预置 PID，否则未指定此参数将导致安装评估版。 |

    | `/PBENGSVCACCOUNT` | 指定用于运行 Polybase 服务的账户。 |

    | `/PBDMSSVCPASSWORD` | 指定将运行 Polybase 服务的账户密码。 |

    | `/PBENGSVCSTARTUPTYPE` | 指定 Polybase 的启动模式。可设置为 `Automatic`、`Manual` 或 `Disabled`。
    |

    | `/PBPORTRANGE` | 指定 PolyBase 服务要监听的端口范围。必须包含至少六个端口。 |

    | `/PBSCALEOUT` | 指定数据库引擎是否是 PolyBase 横向扩展组的一部分。 |

    | `/SAPWD` | 指定 `SA` 账户的密码。当使用 `/SECURITYMODE` 将实例配置为混合模式身份验证时使用此参数。如果 `/SECURITYMODE`
    设置为 `SQL`，则此参数成为必需项。 |

    | `/SECURITYMODE` | 使用此参数，值为 `SQL`，以指定混合模式。如果不使用此参数，则将使用 Windows 身份验证。 |

    | `/SQLBACKUPDIR` | 指定 SQL Server 备份的默认位置。 |

    | `/SQLCOLLATION` | 指定实例将使用的排序规则。 |

    | `/SQLMAXDOP` | 指定针对实例运行的查询的最大并行度。 |

    | `/SQLMAXMEMORY` | 指定应分配给数据库引擎的最大 `RAM` 量。 |

    | `/SQLMINMEMORY` | 指定应分配给数据库引擎的最小内存量。实例启动时，数据库引擎将立即消耗此内存量。 |

    | `/SQLSVCSTARTUPTYPE` | 指定数据库引擎服务的启动模式。可设置为 `Automatic`、`Manual` 或 `Disabled`。
    |

    | `/SQLTEMPDBDIR` | 指定 `TempDB` 数据文件的文件夹位置。 |

    | `/SQLTEMPDBLOGDIR` | 指定 `TempDB` 日志文件的文件夹位置。 |

    | `/SQLTEMPDBFILECOUNT` | 指定应创建的 `TempDB` 数据文件数量。 |

    | `/SQLTEMPDBFILESIZE` | 指定每个 `TempDB` 数据文件的大小。 |

    | `/SQLTEMPDBFILEGROWTH` | 指定 `TempDB` 数据文件的增长增量。 |

    | `/SQLTEMPDBLOGFILESIZE` | 指定 `TempDB` 日志文件的初始大小。 |

    | `/SQLTEMPDBLOGFILEGROWTH` | 指定 `TempDB` 日志文件的增长增量。 |

    | `/SQLUSERDBDIR` | 指定用户数据库数据文件的默认位置。 |

    | `/SQLUSERDBLOGDIR` | 指定用户数据库日志文件的默认文件夹位置。 |

    | `/SQMREPORTING` | 指定是否启用 SQL Reporting。使用值 `0` 禁用或 `1` 启用。 |

    | `/SQLSVCINSTANTFILEINIT` | 指定应授予数据库引擎服务账户执行卷维护任务的权限。可接受的值为 `true` 或 `false`。
    |

    | `/TCPENABLED` | 指定是否启用 `TCP`。使用值 `0` 禁用或 `1` 启用。 |

    | `/UPDATEENABLED` | 指定是否使用产品更新功能。传递值 `0` 禁用或 `1` 启用。 |

    | `/UPDATESOURCE` | 指定产品更新搜索更新的位置。值 `MU` 将搜索 Windows Update，但您也可以传递文件共享或 `UNC`
    路径。 |'
- fmt: '## 产品更新与配置安装指南


    ### 注意事项

    如果使用的账户是 MSA/gMSA，则不应指定账户密码。这包括数据库引擎和 SQL Server Agent 服务的账户，否则这些是必需项。


    ### 功能概述

    **产品更新**功能取代了 SQL Server 已弃用的“流式安装”功能，使您能够在安装 SQL Server 基础二进制文件的同时，安装最新的 CU（累积更新）或
    GDR（一般分发发布—针对安全问题的修补程序）。此功能可以节省 DBA 在安装 SQL Server 实例后立即安装最新更新所需的时间和精力，也有助于确保新构建的实例具有一致的修补级别。


    > **提示：** 从 SQL Server 2017 开始，不再发布服务包。所有更新均为 CU 或 GDR。


    ### 命令行安装参数

    要使用此功能，必须在命令行安装过程中使用两个参数。第一个是 `/UPDATEENABLED` 参数。应将此参数的值指定为 `1` 或 `True`。第二个是
    `/UPDATESOURCE` 参数。此参数将告诉安装程序在哪里查找产品更新。如果向此参数传入值 `MU`，则安装程序将检查 Microsoft Update
    或 WSUS 服务；或者，您也可以提供文件夹的相对路径或网络共享的 UNC（通用命名约定）路径。


    ### 包含 CU 的安装示例

    以下示例将研究如何使用此功能安装包含 CU1 的 SQL Server 2019，该 CU 位于网络共享中。当您下载 GDR 或 CU 时，它们将以自解压可执行文件的形式提供。这非常有用，因为即使您的环境中未使用
    WSUS，一旦您确认了新的修补级别，只需替换网络共享中的 CU 即可；执行此操作后，所有新构建都可以接收最新更新，而您无需更改用于构建新实例的 PowerShell
    脚本。


    > **注意：** 用于运行安装的账户需要对文件共享具有访问权限。


    清单 3-5 中的 PowerShell 命令将安装一个名为 `PROSQLADMINCU1` 的 SQL Server 实例，同时安装位于文件服务器上的
    CU1。


    ```

    .\SETUP.EXE / IACCEPTSQLSERVERLICENSETERMS /ACTION="Install" /FEATURES=SQLEngine,Replication,Conn
    /INSTANCENAME="PROSQLADMINCU1" /SQLSVCACCOUNT="MyDomain\SQLServiceAccount1" /SQLSVCPASSWORD="Pa$$w0rd"
    /AGTSVCACCOUNT="MyDomain\SQLServiceAccount1" /AGTSVCPASSWORD="Pa$$w0rd" /SQLSYSADMINACCOUNTS="MyDomain\SQLDBA"
    /UPDATEENABLED=1 /UPDATESOURCE="\\192.168.183.1\SQL2019_CU1\" /qs

    ```

    清单 3-5 安装期间安装 CU


    ### 验证实例版本

    清单 3-6 中的代码演示了如何查询两个实例之间的差异。该代码使用 `invoke-sqlcmd` 连接到 `PROSQLADMINCORE2` 实例并返回包含该实例完整版本详细信息（包括内部版本号）的系统变量。为了便于我们识别结果，其中也包含了实例的名称。


    ```

    $parameters = @{

    ServerInstance = ''localhost\PROSQLADMINCORE2''

    Query               = "

    SELECT

    @@SERVERNAME

    , @@VERSION

    "

    }

    Invoke-sqlcmd @parameters

    ```

    清单 3-6 确定每个实例的构建版本


    在此示例中，我们使用了名为“Splatting”的 PowerShell 技术。通过预先定义参数，这使我们的代码更具可读性。因为我们可以在 `invoke-sqlcmd`
    语句中使用多个 Splatting 组，所以也可以使用 Splatting 使代码可重用。例如，我们可以将查询放在与其他参数单独的 Splatting 组中，这意味着每次调用
    `invoke-sqlcmd` 都可以使用相同的参数集。结果如图 3-4 所示。


    ![../images/333037_2_En_3_Chapter/333037_2_En_3_Fig4_HTML.jpg](images/333037_2_En_3_Chapter/333037_2_En_3_Fig4_HTML.jpg)

    图 3-4 PROSQLADMINCORE2 版本详细信息


    从结果中我们可以看到，`PROSQLADMINCORE2` 运行在 SQL Server 内部版本号 `15.0.1100.94` 上，这是 SQL Server
    2019 CTP 2.1 的版本号。


    ## 使用配置文件

    本书前面已在多处提及使用配置文件来生成一致的构建。清单 3-7 中的示例是一个配置文件的内容，该文件已填充了在 Windows Server Core 上安装名为
    `PROSQLADMINCONF1` 的实例所需的所有必需参数。它还包含启用命名管道和 TCP/IP 的可选参数、将 FILESTREAM 启用级别设置为只能通过
    T-SQL 访问、将 SQL Agent 服务设置为自动启动以及将排序规则配置为 `Latin1_General_CI_AS`。在此 `.ini` 文件中，以分号开头的行定义为注释。


    ```

    ; SQL Server 2019 Configuration File

    [OPTIONS]

    ; Accept the SQL Server License Agreement

    IACCEPTSQLSERVERLICENSETERMS

    ; Specifies a Setup work flow, like INSTALL, UNINSTALL, or UPGRADE.

    ; This is a required parameter.

    ACTION="Install"

    ; Setup will display progress only, without any user interaction.

    QUIETSIMPLE="True"

    ; Specifies features to install, uninstall, or upgrade.

    FEATURES=SQLENGINE,REPLICATION,CONN

    ; Specify a default or named instance. MSSQLSERVER is the default instance for

    ; non-Express editions and SQLExpress is for Express editions. This parameter
    is

    ; required when installing the SQL Server Database Engine (SQL), Analysis

    ; Services (AS)

    INSTANCENAME="PROSQLADMINCONF1"

    ; Agent account name

    AGTSVCACCOUNT="MyDomain\SQLServiceAccount1"

    ; Agent account password

    AGTSVCPASSWORD="Pa$$w0rd"

    ; Auto-start service after installation.

    AGTSVCSTARTUPTYPE="Automatic"

    ; Level to enable FILESTREAM feature at (0, 1, 2 or 3).

    FILESTREAMLEVEL="1"

    ; Specifies a Windows collation or an SQL collation to use for the Database

    ; Engine.

    SQLCOLLATION="Latin1_General_CI_AS"

    ; Account for SQL Server service: Domain\User or system account.

    SQLSVCACCOUNT="MyDomain\SQLServiceAccount1"

    ; Password for the SQL Server service account.

    SQLSVCPASSWORD="Pa$$w0rd"

    ; Windows account(s) to provision as SQL Server system administrators.

    SQLSYSADMINACCOUNTS="MyDomain\SQLDBA"

    ; Specify 0 to disable or 1 to enable the TCP/IP protocol.

    TCPENABLED="1"

    ; Specify 0 to disable or 1 to enable the Named Pipes protocol.

    NPENABLED="1"

    ```

    清单 3-7 用于 PROSQLADMINCONF1 的配置文件'
  raw: '### Tip


    Account passwords should not be specified if the account being used is a MSA/gMSA.
    This includes the accounts for the Database Engine and SQL Server Agent services,
    which are otherwise mandatory.


    ### Product Update


    The Product Update functionality replaces the deprecated slipstream installation
    functionality of SQL Server and provides you with the ability to install the latest
    CU (cumulative update) or GDR (General Distribution Release—a hotfix for security
    issues) at the same time you are installing the SQL Server base binaries. This
    functionality can save DBAs the time and effort associated with installing the
    latest update immediately after installing a SQL Server instance and can also
    help provide consistent patching levels across new builds.


    ### Tip


    From SQL Server 2017 onward, service packs are no longer released. All updates
    are either CUs or GDRs.


    In order to use this functionality, you must use two parameters during the command-line
    install. The first of these is the `/UPDATEENABLED` parameter. You should specify
    this parameter with a value of `1` or `True`. The second is the `/UPDATESOURCE`
    parameter. This parameter will tell setup where to look for the product update.
    If you pass a value of `MU` into this parameter, then setup will check Microsoft
    Update, or a WSUS service, or alternatively, you can supply a relative path to
    a folder or the UNC (Uniform Naming Convention) of a network share.


    In the following example, we will examine how to use this functionality to install
    SQL Server 2019, with CU1 included, which will be located in a network share.
    When you download a GDR or CU, they will arrive wrapped in a self-extracting executable.
    This is extremely useful, because even if WSUS is not in use in your environment,
    once you have signed off on a new patching level, you can simply replace the CU
    within your network share; when you do, all new builds can receive the latest
    update, without you needing to change the PowerShell script that you use for building
    new instances.


    The PowerShell command in Listing [3-5](#333037_2_En_3_Chapter.xhtml#PC5) will
    install an instance of SQL Server, named PROSQLADMINCU1, and install CU1 at the
    same time, which is located on a file server.


    ### Note


    The account that you are using to run the installation will require permissions
    to the file share.


    ```

    .\SETUP.EXE / IACCEPTSQLSERVERLICENSETERMS /ACTION="Install" /FEATURES=SQLEngine,Replication,Conn
    /INSTANCENAME="PROSQLADMINCU1" /SQLSVCACCOUNT="MyDomain\SQLServiceAccount1" /SQLSVCPASSWORD="Pa$$w0rd"
    /AGTSVCACCOUNT="MyDomain\SQLServiceAccount1" /AGTSVCPASSWORD="Pa$$w0rd" /SQLSYSADMINACCOUNTS="MyDomain\SQLDBA"
    /UPDATEENABLED=1 /UPDATESOURCE="\\192.168.183.1\SQL2019_CU1\" /qs

    Listing 3-5

    Installing CU During Setup

    ```


    The code in Listing [3-6](#333037_2_En_3_Chapter.xhtml#PC6) demonstrates how you
    can interrogate the difference between the two instances. The code uses invoke-sqlcmd
    to connect to the PROSQLADMINCORE2 instance and return the systems variable that
    contains the full version details of the instance, including the build number.
    The name of the instance is also included to help us easily identify the results.


    ```

    $parameters = @{

    ServerInstance = ''localhost\PROSQLADMINCORE2''

    Query               = "

    SELECT

    @@SERVERNAME

    , @@VERSION

    "

    }

    Invoke-sqlcmd @parameters

    Listing 3-6

    Determining Build Version of Each Instance

    ```


    In this example, we have used a PowerShell technique called splatting. This allows
    us to make our code more readable, by defining the parameters in advance. Because
    we can use multiple splatting groups in our invoke-sqlcmd statement, we could
    also use splatting to make our code reusable. For example, we could have our query
    in a separate splatting group to the other parameters, meaning that each invocation
    of invoke-sqlcmd could use the same parameter set. The results are shown in Figure
    [3-4](#333037_2_En_3_Chapter.xhtml#Fig4).


    ![../images/333037_2_En_3_Chapter/333037_2_En_3_Fig4_HTML.jpg](images/333037_2_En_3_Chapter/333037_2_En_3_Fig4_HTML.jpg)


    Figure 3-4


    PROSQLADMINCORE2 version details


    We can see from the results that PROSQLADMINCORE2 is running on SQL Server build
    version 15.0.1100.94, which is the build number of SQL Server 2019 CTP 2.1.


    ## Using a Config File


    We have touched on using configuration files to produce consistent builds at several
    points already in this book. The sample in Listing [3-7](#333037_2_En_3_Chapter.xhtml#PC7)
    is the content of a configuration file, which has been populated with all of the
    required parameters that are needed to install an instance named PROSQLADMINCONF1
    on Windows Server Core. It also contains the optional parameters to enable named
    pipes and TCP/IP, enables FILESTREAM at the access level where it can only be
    accessed via T-SQL, sets the SQL Agent service to start automatically, and configures
    the collation to be Latin1_General_CI_AS. In this .ini file, comments are defined
    with a semicolon at the beginning of the line.


    ```

    ; SQL Server 2019 Configuration File

    [OPTIONS]

    ; Accept the SQL Server License Agreement

    IACCEPTSQLSERVERLICENSETERMS

    ; Specifies a Setup work flow, like INSTALL, UNINSTALL, or UPGRADE.

    ; This is a required parameter.

    ACTION="Install"

    ; Setup will display progress only, without any user interaction.

    QUIETSIMPLE="True"

    ; Specifies features to install, uninstall, or upgrade.

    FEATURES=SQLENGINE,REPLICATION,CONN

    ; Specify a default or named instance. MSSQLSERVER is the default instance for

    ; non-Express editions and SQLExpress is for Express editions. This parameter
    is

    ; required when installing the SQL Server Database Engine (SQL), Analysis

    ; Services (AS)

    INSTANCENAME="PROSQLADMINCONF1"

    ; Agent account name

    AGTSVCACCOUNT="MyDomain\SQLServiceAccount1"

    ; Agent account password

    AGTSVCPASSWORD="Pa$$w0rd"

    ; Auto-start service after installation.

    AGTSVCSTARTUPTYPE="Automatic"

    ; Level to enable FILESTREAM feature at (0, 1, 2 or 3).

    FILESTREAMLEVEL="1"

    ; Specifies a Windows collation or an SQL collation to use for the Database

    ; Engine.

    SQLCOLLATION="Latin1_General_CI_AS"

    ; Account for SQL Server service: Domain\User or system account.

    SQLSVCACCOUNT="MyDomain\SQLServiceAccount1"

    ; Password for the SQL Server service account.

    SQLSVCPASSWORD="Pa$$w0rd"

    ; Windows account(s) to provision as SQL Server system administrators.

    SQLSYSADMINACCOUNTS="MyDomain\SQLDBA"

    ; Specify 0 to disable or 1 to enable the TCP/IP protocol.

    TCPENABLED="1"

    ; Specify 0 to disable or 1 to enable the Named Pipes protocol.

    NPENABLED="1"

    Listing 3-7

    Configuration File for SQLPROSQLADMINCONF1

    ```'
