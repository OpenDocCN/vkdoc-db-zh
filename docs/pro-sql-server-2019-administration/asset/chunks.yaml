- fmt: '## Synchronous Failover


    If you wish to fail over a replica that is in Synchronous Commit mode, launch
    the Failover Availability Group wizard by selecting Failover from the context
    menu of your availability group in Object Explorer. After moving past the Introduction
    page, you find the Select New Primary Replica page (see Figure 14-13). On this
    page, check the box of the replica to which you want to fail over. Before doing
    so, however, review the Failover Readiness column to ensure that the replicas
    are synchronized and that no data loss will occur.


    ![The Select New Primary Replica page](images/333037_2_En_14_Chapter/333037_2_En_14_Fig13_HTML.jpg)


    *Figure 14-13: The Select New Primary Replica page*


    On the Connect to Replica page, illustrated in Figure 14-14, use the Connect button
    to establish a connection to the new primary replica.


    ![The Connect to Replica page](images/333037_2_En_14_Chapter/333037_2_En_14_Fig14_HTML.jpg)


    *Figure 14-14: The Connect to Replica page*


    On the Summary page, you are given details of the task to be performed, followed
    by a progress indicator on the Results page. Once the failover completes, check
    that all tasks were successful, and investigate any errors or warnings that you
    receive.


    We can also use T-SQL to fail over the availability group. The command in Listing
    14-18 achieves the same results. Make sure to run this script from the replica
    that will be the new primary replica. If you run it from the current primary replica,
    use SQLCMD mode and connect to the new primary within the script.


    ```sql

    ALTER AVAILABILITY GROUP App2 FAILOVER ;

    GO

    ```


    *Listing 14-18: Failing Over an Availability Group*


    ## Asynchronous Failover


    If your availability group is in Asynchronous Commit mode, then from a technical
    standpoint, you can fail over in a similar way to the way you can for a replica
    running in Synchronous Commit mode, except for the fact that you need to force
    the failover, thereby accepting the risk of data loss. You can force failover
    by using the command in Listing 14-19. You should run this script on the instance
    that will be the new primary. For it to work, the cluster must have quorum. If
    it doesn’t, then you need to force the cluster online before you force the availability
    group online.


    ```sql

    ALTER AVAILABILITY GROUP App2 FORCE_FAILOVER_ALLOW_DATA_LOSS ;

    ```


    *Listing 14-19: Forcing Failover*


    From a process perspective, you should only ever do this if your primary site
    is completely unavailable. If this is not the case, first put the application
    into a safe state. This avoids any possibility of data loss. The way that I normally
    achieve this in a production environment is by performing the following steps:


    1.  Disable logins.

    2.  Change the mode of the replica to Synchronous Commit mode.

    3.  Fail over.

    4.  Change the replica back to Asynchronous Commit mode.

    5.  Enable the logins.


    You can perform these steps with the script in Listing 14-20. When run from the
    DR instance, this script places the databases in `App2` into a safe state before
    failing over, and then it reconfigures the application to work under normal operations.


    ```sql

    --DISABLE LOGINS

    DECLARE @AOAGDBs TABLE

    (

    DBName NVARCHAR(128)

    ) ;

    INSERT INTO @AOAGDBs

    SELECT database_name

    FROM sys.availability_groups AG

    INNER JOIN sys.availability_databases_cluster ADC

    ON AG.group_id = ADC.group_id

    WHERE AG.name = ''App2'' ;


    DECLARE @Mappings TABLE

    (

    LoginName NVARCHAR(128),

    DBname NVARCHAR(128),

    Username NVARCHAR(128),

    AliasName NVARCHAR(128)

    ) ;

    INSERT INTO @Mappings

    EXEC sp_msloginmappings ;


    DECLARE @SQL NVARCHAR(MAX)

    SELECT DISTINCT @SQL =

    (

    SELECT ''ALTER LOGIN ['' + LoginName + ''] DISABLE; '' AS [data()]

    FROM @Mappings M

    INNER JOIN @AOAGDBs A

    ON M.DBname = A.DBName

    WHERE LoginName  SUSER_NAME()

    FOR XML PATH ('''')

    )

    EXEC(@SQL)

    GO


    --SWITCH TO SYNCHRONOUS COMMIT MODE

    ALTER AVAILABILITY GROUP App2

    MODIFY REPLICA ON N''CLUSTERNODE3\ASYNCDR'' WITH (AVAILABILITY_MODE = SYNCHRONOUS_COMMIT)
    ;

    GO


    --FAIL OVER

    ALTER AVAILABILITY GROUP App2 FAILOVER

    GO


    --SWITCH BACK TO ASYNCHRONOUS COMMIT MODE

    ALTER AVAILABILITY GROUP App2

    MODIFY REPLICA ON N''CLUSTERNODE3\ASYNCDR'' WITH (AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT)
    ;

    GO


    --ENABLE LOGINS

    DECLARE @AOAGDBs TABLE

    (

    DBName NVARCHAR(128)

    ) ;

    INSERT INTO @AOAGDBs

    SELECT database_name

    FROM sys.availability_groups AG

    INNER JOIN sys.availability_databases_cluster ADC

    ON AG.group_id = ADC.group_id

    WHERE AG.name = ''App2'' ;


    DECLARE @Mappings TABLE

    (

    LoginName NVARCHAR(128),

    DBname NVARCHAR(128),

    Username NVARCHAR(128),

    AliasName NVARCHAR(128)

    ) ;

    INSERT INTO @Mappings

    EXEC sp_msloginmappings


    DECLARE @SQL NVARCHAR(MAX)

    SELECT DISTINCT @SQL =

    (

    SELECT ''ALTER LOGIN ['' + LoginName + ''] ENABLE; '' AS [data()]

    FROM @Mappings M

    INNER JOIN @AOAGDBs A

    ON M.DBname = A.DBName

    WHERE LoginName  SUSER_NAME()

    FOR XML PATH ('''')

    ) ;

    EXEC(@SQL)

    ```


    *Listing 14-20: Safe-Stating an Application and Failing Over*


    ## Synchronizing Uncontained Objects


    Regardless of the method you use to fail over, assuming that all of the databases
    within the availability group are not contained, then you need to ensure that
    instance-level objects are synchronized. The most straightforward way to keep
    your instance-level objects synchronized is by implementing an SSIS package, which
    is scheduled to run on a periodic basis.


    Whether you choose to schedule an SSIS package to execute, or you choose a different
    approach, such as a SQL Server Agent job that scripts and re-creates the objects
    on the secondary servers, these are the objects that you should consider synchronizing:


    *   Logins

    *   Credentials

    *   SQL Server Agent jobs

    *   Custom error messages

    *   Linked servers

    *   Server-level event notifications

    *   Stored procedures in Master

    *   Server-level triggers

    *   Encryption keys and certificates


    ## Monitoring


    Once you have implemented availability groups, you need to monitor them and respond
    to any errors or warnings that could affect the availability of your data. If
    you have many availability groups implemented throughout the enterprise, then
    the only way to monitor them effectively and holistically is by using an enterprise
    monitoring tool, such as SOC (Systems Operations Center). If you only have a small
    number of availability groups, however, or if you are troubleshooting a specific
    issue, then SQL Server provides the AlwaysOn Dashboard and the AlwaysOn Health
    Trace. The following sections examine these two features.


    ### AlwaysOn Dashboard


    The AlwaysOn Dashboard is an interactive report that allows you to view the health
    of your AlwaysOn environment and drill through or roll up elements within the
    topology. You can invoke the report from the context menu of the Availability
    Groups folder in Object Explorer, or from the context menu of the availability
    group itself. Figure 14-15 shows the report that is generated from the context
    menu of the `App2` availability group. You can see that currently synchronization
    of both replicas is in a healthy state.


    The three possible synchronization states that a database can be in are `SYNCHRONIZED`,
    `SYNCRONIZING`, and `NOT SYNCHRONIZING`. A synchronous replica should be in the
    `SYNCHRONIZED` state, and any other state is unhealthy. An asynchronous replica,
    however, will never be in the `SYNCHRONIZED` state, and a state of `SYNCHRONIZING`
    is considered healthy. Regardless of the mode, `NOT SYNCHRONIZING` indicates that
    the replica is not connected.


    ![The availability group dashboard](images/333037_2_En_14_Chapter/333037_2_En_14_Fig15_HTML.jpg)


    *Figure 14-15: The availability group dashboard*'
  raw: '#### Synchronous Failover


    If you wish to fail over a replica that is in Synchronous Commit mode, launch
    the Failover Availability Group wizard by selecting Failover from the context
    menu of your availability group in Object Explorer. After moving past the Introduction
    page, you find the Select New Primary Replica page (see Figure [14-13](#333037_2_En_14_Chapter.xhtml#Fig13)).
    On this page, check the box of the replica to which you want to fail over. Before
    doing so, however, review the Failover Readiness column to ensure that the replicas
    are synchronized and that no data loss will occur.


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig13_HTML.jpg](images/333037_2_En_14_Chapter/333037_2_En_14_Fig13_HTML.jpg)


    Figure 14-13


    The Select New Primary Replica page


    On the Connect to Replica page, illustrated in Figure [14-14](#333037_2_En_14_Chapter.xhtml#Fig14),
    use the Connect button to establish a connection to the new primary replica.


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig14_HTML.jpg](images/333037_2_En_14_Chapter/333037_2_En_14_Fig14_HTML.jpg)


    Figure 14-14


    The Connect to Replica page


    On the Summary page, you are given details of the task to be performed, followed
    by a progress indicator on the Results page. Once the failover completes, check
    that all tasks were successful, and investigate any errors or warnings that you
    receive.


    We can also use T-SQL to fail over the availability group. The command in Listing
    [14-18](#333037_2_En_14_Chapter.xhtml#PC18) achieves the same results. Make sure
    to run this script from the replica that will be the new primary replica. If you
    run it from the current primary replica, use SQLCMD mode and connect to the new
    primary within the script.


    ```

    ALTER AVAILABILITY GROUP App2 FAILOVER ;

    GO

    Listing 14-18

    Failing Over an Availability Group

    ```


    #### Asynchronous Failover


    If your availability group is in Asynchronous Commit mode, then from a technical
    standpoint, you can fail over in a similar way to the way you can for a replica
    running in Synchronous Commit mode, except for the fact that you need to force
    the failover, thereby accepting the risk of data loss. You can force failover
    by using the command in Listing [14-19](#333037_2_En_14_Chapter.xhtml#PC19). You
    should run this script on the instance that will be the new primary. For it to
    work, the cluster must have quorum. If it doesn’t, then you need to force the
    cluster online before you force the availability group online.


    ```

    ALTER AVAILABILITY GROUP App2 FORCE_FAILOVER_ALLOW_DATA_LOSS ;

    Listing 14-19

    Forcing Failover

    ```


    From a process perspective, you should only ever do this if your primary site
    is completely unavailable. If this is not the case, first put the application
    into a safe state. This avoids any possibility of data loss. The way that I normally
    achieve this in a production environment is by performing the following steps:


    1.  Disable logins.


    2.  Change the mode of the replica to Synchronous Commit mode.


    3.  Fail over.


    4.  Change the replica back to Asynchronous Commit mode.


    5.  Enable the logins.


    You can perform these steps with the script in Listing [14-20](#333037_2_En_14_Chapter.xhtml#PC20).
    When run from the DR instance, this script places the databases in `App2` into
    a safe state before failing over, and then it reconfigures the application to
    work under normal operations.


    ```

    --DISABLE LOGINS

    DECLARE @AOAGDBs TABLE

    (

    DBName NVARCHAR(128)

    ) ;

    INSERT INTO @AOAGDBs

    SELECT database_name

    FROM sys.availability_groups AG

    INNER JOIN sys.availability_databases_cluster ADC

    ON AG.group_id = ADC.group_id

    WHERE AG.name = ''App2'' ;

    DECLARE @Mappings TABLE

    (

    LoginName NVARCHAR(128),

    DBname NVARCHAR(128),

    Username NVARCHAR(128),

    AliasName NVARCHAR(128)

    ) ;

    INSERT INTO @Mappings

    EXEC sp_msloginmappings ;

    DECLARE @SQL NVARCHAR(MAX)

    SELECT DISTINCT @SQL =

    (

    SELECT ''ALTER LOGIN ['' + LoginName + ''] DISABLE; '' AS [data()]

    FROM @Mappings M

    INNER JOIN @AOAGDBs A

    ON M.DBname = A.DBName

    WHERE LoginName  SUSER_NAME()

    FOR XML PATH ('''')

    )

    EXEC(@SQL)

    GO

    --SWITCH TO SYNCHRONOUS COMMIT MODE

    ALTER AVAILABILITY GROUP App2

    MODIFY REPLICA ON N''CLUSTERNODE3\ASYNCDR'' WITH (AVAILABILITY_MODE = SYNCHRONOUS_COMMIT)
    ;

    GO

    --FAIL OVER

    ALTER AVAILABILITY GROUP App2 FAILOVER

    GO

    --SWITCH BACK TO ASYNCHRONOUS COMMIT MODE

    ALTER AVAILABILITY GROUP App2

    MODIFY REPLICA ON N''CLUSTERNODE3\ASYNCDR'' WITH (AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT)
    ;

    GO

    --ENABLE LOGINS

    DECLARE @AOAGDBs TABLE

    (

    DBName NVARCHAR(128)

    ) ;

    INSERT INTO @AOAGDBs

    SELECT database_name

    FROM sys.availability_groups AG

    INNER JOIN sys.availability_databases_cluster ADC

    ON AG.group_id = ADC.group_id

    WHERE AG.name = ''App2'' ;

    DECLARE @Mappings TABLE

    (

    LoginName NVARCHAR(128),

    DBname NVARCHAR(128),

    Username NVARCHAR(128),

    AliasName NVARCHAR(128)

    ) ;

    INSERT INTO @Mappings

    EXEC sp_msloginmappings

    DECLARE @SQL NVARCHAR(MAX)

    SELECT DISTINCT @SQL =

    (

    SELECT ''ALTER LOGIN ['' + LoginName + ''] ENABLE; '' AS [data()]

    FROM @Mappings M

    INNER JOIN @AOAGDBs A

    ON M.DBname = A.DBName

    WHERE LoginName  SUSER_NAME()

    FOR XML PATH ('''')

    ) ;

    EXEC(@SQL)

    Listing 14-20

    Safe-Stating an Application and Failing Over

    ```


    ### Synchronizing Uncontained Objects


    Regardless of the method you use to fail over, assuming that all of the databases
    within the availability group are not contained, then you need to ensure that
    instance-level objects are synchronized. The most straightforward way to keep
    your instance-level objects synchronized is by implementing an SSIS package, which
    is scheduled to run on a periodic basis.


    Whether you choose to schedule an SSIS package to execute, or you choose a different
    approach, such as a SQL Server Agent job that scripts and re-creates the objects
    on the secondary servers, these are the objects that you should consider synchronizing:


    *   Logins


    *   Credentials


    *   SQL Server Agent jobs


    *   Custom error messages


    *   Linked servers


    *   Server-level event notifications


    *   Stored procedures in Master


    *   Server-level triggers


    *   Encryption keys and certificates


    ### Monitoring


    Once you have implemented availability groups, you need to monitor them and respond
    to any errors or warnings that could affect the availability of your data. If
    you have many availability groups implemented throughout the enterprise, then
    the only way to monitor them effectively and holistically is by using an enterprise
    monitoring tool, such as SOC (Systems Operations Center). If you only have a small
    number of availability groups, however, or if you are troubleshooting a specific
    issue, then SQL Server provides the AlwaysOn Dashboard and the AlwaysOn Health
    Trace. The following sections examine these two features.


    #### AlwaysOn Dashboard


    The AlwaysOn Dashboard is an interactive report that allows you to view the health
    of your AlwaysOn environment and drill through or roll up elements within the
    topology. You can invoke the report from the context menu of the Availability
    Groups folder in Object Explorer, or from the context menu of the availability
    group itself. Figure [14-15](#333037_2_En_14_Chapter.xhtml#Fig15) shows the report
    that is generated from the context menu of the `App2` availability group. You
    can see that currently synchronization of both replicas is in a healthy state.


    The three possible synchronization states that a database can be in are `SYNCHRONIZED`,
    `SYNCRONIZING`, and `NOT SYNCHRONIZING`. A synchronous replica should be in the
    `SYNCHRONIZED` state, and any other state is unhealthy. An asynchronous replica,
    however, will never be in the `SYNCHRONIZED` state, and a state of `SYNCHRONIZING`
    is considered healthy. Regardless of the mode, `NOT SYNCHRONIZING` indicates that
    the replica is not connected.


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig15_HTML.jpg](images/333037_2_En_14_Chapter/333037_2_En_14_Fig15_HTML.jpg)


    Figure 14-15


    The availability group dashboard'
  trans: '## 同步故障转移


    如果您希望故障转移一个处于**同步提交**模式的副本，请通过在对象资源管理器中右键单击您的可用性组，然后从上下文菜单中选择“故障转移”来启动“故障转移可用性组向导”。在跳过“简介”页面后，您将看到“选择新的主副本”页面（参见图
    14-13）。在此页面上，勾选您想要故障转移到的副本对应的复选框。但在执行此操作之前，请检查“故障转移准备情况”列，以确保副本已同步且不会发生数据丢失。


    ![选择新的主副本页面](img/333037_2_En_14_Fig13_HTML.jpg)


    *图 14-13：“选择新的主副本”页面*


    在“连接到副本”页面（如图 14-14 所示），使用“连接”按钮建立到新主副本的连接。


