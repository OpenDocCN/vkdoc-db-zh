    ```


    在“新建作业步骤”对话框的“高级”页面（如图 22-4 所示）中，我们保留默认设置。然而，在更复杂的场景中，我们可以使用此页面来配置日志记录和控制决策树逻辑。我们将在下一节中讨论这一点。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig4_HTML.jpg](img/333037_2_En_22_Fig4_HTML.jpg)

    图 22-4 高级页面


    一旦配置了作业步骤，我们就可以退出“新建作业步骤”对话框并返回到“新建作业”对话框。现在，我们转到“计划”页面。在此页面上，我们使用“新建”按钮调用“新建作业计划”对话框，如图
    22-5 所示。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig5_HTML.jpg](img/333037_2_En_22_Fig5_HTML.jpg)

    图 22-5 “新建作业计划”对话框


    在“新建作业计划”对话框中，我们首先输入计划的名称。默认计划类型是“重复出现”，但如果我们选择其他选项，屏幕会动态变化。在屏幕的“频率”部分，我们选择“每月”。同样，如果我们在该下拉列表中选择“每周”或“每天”，屏幕也会动态变化。


    我们现在可以配置希望计划调用作业执行的日期和时间。在我们的场景中，我们保留午夜、每月第一天的默认选项。


    在“新建作业”对话框的“通知”页面上，我们配置希望在作业完成时发生的任何操作。如图 22-6 所示，我们配置了一个条目，如果作业失败，则写入 Windows
    应用程序日志。如果你的企业由 SCOM 等监控工具管理，这是一个特别有用的选项，因为你可以配置 SCOM 监控 Windows 应用程序日志中的失败条目并向
    DBA 团队发送警报。在下一节中，我们将讨论如何直接从 SQL Server 代理配置电子邮件通知。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig6_HTML.jpg](img/333037_2_En_22_Fig6_HTML.jpg)

    图 22-6 通知页面

    '
- fmt: '#### Creating a Complex SQL Server Agent Job


    In the following sections, we create a more complex SQL Server Agent job, which
    backs up the `Chapter22` database. The job then checks that the `SQL Server Browser`
    service is running. We use `Run As` to set the context under which the T-SQL job
    step runs and a proxy to run the `PowerShell` job step. We also configure `Database
    Mail` so that an operator can be notified of the success or failure of the job
    and schedule the job to run periodically. You can also see how to create the `SQL
    Server Agent` artifacts using T-SQL, which may prove useful when you are working
    in `Server Core` environments.


    ##### Creating the Credential


    Now that our environment is prepared, we create a `SQL Server Agent` job, which
    first backs up the `Chapter22` database. The job then checks to ensure that the
    `SQL Server Browser` service is running. Checking that the browser service is
    running is a useful practice, because if it stops, then applications are only
    able to connect to the instance if they specify the port number of the instance
    in their connection strings. We run the backup as a T-SQL command under the context
    of `SQL User`, and we use `PowerShell` to check that the browser service is running
    by using the `WinUser` account. Therefore, our first step is to create a credential,
    which uses the `WinUser` account. We can achieve this in `SQL Server Management
    Studio` by drilling through `Security` and selecting `New Credential` from the
    `Credentials` context menu. This causes the `New Credential` dialog box to be
    invoked, as shown in Figure [22-7](#333037_2_En_22_Chapter.xhtml#Fig7).


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig7_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig7_HTML.jpg)

    Figure 22-7: The New Credential dialog box


    In this dialog box, use the `Credential Name` field to specify a name for your
    new credential. In the `Identity` field, specify the name of the Windows security
    principle that you wish to use and then type the Windows password in the `Password`
    and `Confirm Password` fields. You can also link the credential to an `EKM` provider.
    If you wish to do this, check `Use Encryption Provider` and select your provider
    from the drop-down list. `EKM` is discussed further in Chapter [11](#333037_2_En_11_Chapter.xhtml).


    ##### Creating the Proxy


    Next, let’s create a `SQL Server Agent` proxy account, which uses this credential.
    We configure this proxy account to be able to run `PowerShell` job steps. We can
    achieve this through `SSMS` by drilling through `SQL Server Agent` in `Object
    Explorer` and selecting `New Proxy` from the `Proxies` context menu. This causes
    the `General` page of the `New Proxy Account` dialog box to display, illustrated
    in Figure [22-8](#333037_2_En_22_Chapter.xhtml#Fig8).


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig8_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig8_HTML.jpg)

    Figure 22-8: The New Proxy Account dialog box


    On this page, we specify a name for our proxy account and give it a description.
    We use the `Credential Name` field to select our `WinUserCredential` credential
    and then use the `Active To The Following Subsystems` section to authorize the
    proxy to run `PowerShell` job steps.


    ### Tip


    If you enter the new proxy account from the node of the relevant subsystem located
    under the `Proxies` node in `Object Explorer`, the relevant subsystem is automatically
    selected within the dialog box.


    On the `Principals` page, we can add logins or server roles that have permissions
    to use the proxy. In our case, this is not required, because we are using `SQL
    Server` with an administrator account, and administrators automatically have permissions
    to proxy accounts.


    ##### Creating the Schedule


    Now that our proxy account is configured, we create the schedule to be used by
    our job. We need our maintenance job to run on a nightly basis, so we configure
    the schedule to run at 1 AM every morning. To invoke the `New Job Schedule` dialog
    box from `SSMS`, we select `New` > `Schedule` from the `SQL Server Agent` context
    menu in `Object Explorer`. This dialog box is shown in Figure [22-9](#333037_2_En_22_Chapter.xhtml#Fig9).


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig9_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig9_HTML.jpg)

    Figure 22-9: The New Job Schedule dialog box


    In this dialog box, we specify a name for the schedule in the `Name` field and
    select the condition for the schedule in the `Schedule Type` field. Selecting
    any condition other than `Recurring` causes the `Frequency` and `Duration` sections
    to become unavailable. Selecting any condition other than `One Time` causes the
    `One-Time Occurrence` section to become unavailable. We also ensure that the `Enabled`
    box is checked so that the schedule can be used.


    In the `Frequency` section, we select `Daily` in the `Occurs` drop-down list.
    Our selection in this field causes the options within the `Frequency` and `Daily
    Frequency` sections to be altered dynamically to suit our selection. Since we
    want our schedule to run daily at 1 AM, we ensure that `1` is specified in the
    `Recurs Every` field and change the `Occurs Once At` field to be `1 AM`. Because
    we want our job to start running immediately and never expire, we do not need
    to edit the fields in the `Duration` section.


    ##### Configuring Database Mail


    We would like our DBA’s distribution list to be notified if our job fails. Therefore,
    we need to create an operator. Before we do this, however, we need to configure
    the `Database Mail` on the instance so that the notifications can be delivered.
    Our first step is to enable the `Database Mail` extended stored procedures, which
    are disabled by default, to reduce the attack surface. We can activate these using
    `sp_configure`, as demonstrated in Listing [22-4](#333037_2_En_22_Chapter.xhtml#PC4).'
