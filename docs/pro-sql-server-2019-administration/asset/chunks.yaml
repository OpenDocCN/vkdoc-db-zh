    时检测兼容性问题，并推荐性能和可靠性方面的增强功能。


    ### 安装选项卡


    如图 2-2 所示，安装中心的 `Installation` 选项卡包含您将用于安装新的 SQL Server 实例、向现有实例添加新功能或从 SQL Server
    2005、2008 或 2012 升级实例的工具。要安装独立的 SQL Server 实例，您应选择 `New SQL Server Stand-Alone
    Instance Or Add New Features To An Existing Instance` 选项。


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig2_HTML.jpg](img/333037_2_En_2_Fig2_HTML.jpg)

    图 2-2: 安装选项卡


    除了安装独立实例、向实例添加新功能以及将现有实例升级到最新版本外，此屏幕上还有用于安装 SQL Server 故障转移群集实例以及向现有故障转移群集添加新节点的选项。*故障转移群集*
    是一个系统，其中 2 到 64 台服务器协同工作，以提供冗余并防止因一台或多台服务器停止功能而导致的故障。参与群集的每台服务器称为 *节点*。


    `SQL Server Database Engine` 和 `SQL Server Analysis Services` 都是“群集感知”应用程序，这意味着它们可以安装在
    Windows 群集上并利用其故障转移功能。当安装在故障转移群集上时，数据库和事务日志位于共享存储上，群集中的任何节点都可以使用该存储，但二进制文件则本地安装在每个节点上。


    还有一些指向 SQL Server 组件下载页面的链接，这些组件不再随数据库安装介质一起提供。这些包括用于 T-SQL 和 BI 开发的工作室 `SQL Server
    Data Tools`、用于 SQL Server 的管理和开发界面 `SQL Server Management Studio`，以及允许服务器托管和分发报表的
    `SQL Server Reporting Services`。


    最后，此页面包含安装独立 `Machine Learning Server` 实例的选项。这不需要安装 SQL Server 实例，并提供对 R 和 Python
    语言的支持。它还提供了一系列 R 包、Python 包、解释器和基础设施——从而提供了创建数据科学和机器学习解决方案的能力。这些解决方案随后可以导入、探索和分析异构数据集。


    ### 维护选项卡


    `Maintenance` 选项卡包含用于执行版本升级、修复损坏的实例以及从群集中移除节点的工具；如图 2-3 所示，它还包含一个用于运行 Windows
    Update 的链接。


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig3_HTML.jpg](img/333037_2_En_2_Fig3_HTML.jpg)

    图 2-3: 维护选项卡


    您可以使用 `Edition Upgrade` 选项将现有的 SQL Server 2019 实例从一个版本升级到另一个版本；例如，您可能希望将一个安装为开发人员版的实例升级到企业版。


    您可以使用 `Repair` 选项尝试解决 SQL Server 安装损坏的问题。例如，如果注册表项或二进制文件损坏导致实例无法启动，您可以使用此工具。


    ### 提示


    如果 Master 数据库损坏并导致实例无法启动，此 `Repair` 选项将无济于事。在这种情况下，您应使用命令行或 PowerShell 运行 `setup.exe`，并将
    `ACTION` 参数设置为 `REBUILDDATABASE`。


    使用 `Remove Node From A SQL Server Failover Cluster` 选项可从故障转移群集中的某个节点移除 SQL Server。您可以将此选项作为驱逐节点过程的一部分。不幸的是，安装中心没有卸载实例的功能。您必须通过控制面板来完成此操作。


    不出所料，您可以使用 `Launch Windows Update To Search For Product Updates` 选项来启动 Windows
    Update。然后，您可以选择安装可用于 SQL Server 的更新和修复程序。


    ### 工具选项卡


    `Tools` 选项卡包含一系列将帮助您安装 SQL Server 的工具，如图 2-4 所示。这包括我本章前面介绍的 `System Configuration
    Checker`；一个用于查找本地服务器上已安装的 SQL Server 组件的发现工具；以及 `Microsoft Assessment and Planning
    (MAP) tool`。


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig4_HTML.jpg](img/333037_2_En_2_Fig4_HTML.jpg)

    图 2-4: 工具选项卡


    选择 `Installed SQL Server Features Discovery Report` 选项可分析本地服务器并返回所有已安装的 SQL Server
    功能和组件的列表。这将包括从 SQL Server 2005 开始的所有版本的功能。


    `Microsoft Assessment And Planning (MAP) Toolkit For SQL Server` 选项将为您提供一个链接，您可以从该链接下载适用于
    SQL Server 的 MAP 工具。当您运行此工具时，它将在整个网络范围内搜索 SQL Server、Oracle 和 MySQL 安装。它将生成一份详细报告，对于
    SQL Server，将包括组件的名称、版本和版本。对于 Oracle，它将包括每个架构的大小和使用情况，包括迁移复杂性的估计。您还可以使用此工具来规划迁移和整合策略，以及审核整个企业范围内的许可要求。


    ### 资源选项卡


    如图 2-5 所示，`Resources` 选项卡包含指向有关 SQL Server 的有用信息的链接。这包括指向 `SQL Server Books Online`、`Developer
    Center` 和 `SQL Server product evaluation` 站点的链接。此外，在此选项卡上，您还会找到指向 Microsoft 隐私声明和完整
    SQL Server 许可协议的链接。另一个非常有用的链接是指向 `CodePlex samples site` 的链接。从此站点，您可以下载 `WideWorldImporters`
    数据库，该数据库将帮助您使用预创建的数据库来测试 SQL Server 的功能。


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig5_HTML.jpg](img/333037_2_En_2_Fig5_HTML.jpg)

    图 2-5: 资源选项卡

