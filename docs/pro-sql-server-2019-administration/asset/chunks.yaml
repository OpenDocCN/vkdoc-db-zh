- fmt: '## Analyzing Data with T-SQL


    If you require more complex analysis of the data, then you can achieve this via
    T-SQL. The `sys.fn_xe_file_target_read_file` function makes this possible by reading
    the target file and returning one row per event in XML format. The `sys.fn_xe_file_target_read_file`
    accepts the parameters detailed in Table 19-5.


    **Table 19-5: `sys.fn_xe_file_target_read_file` Parameters**


    | Parameter | Description |

    | --- | --- |

    | `path` | The file path and file name of the `.XEL` file. This can contain the
    `*` wildcard so that rollover files can be included. |

    | `mdpath` | The file path and name of the metadata file. This is not required
    for SQL Server 2012 and above but is for backward compatibility only, so you should
    always pass `NULL`. |

    | `initial_file_name` | The first file in the path to read. If this parameter
    is not `NULL`, then you must also specify `initial_offset`. |

    | `initial_offset` | Specifies the last offset that was read so that all events
    prior are skipped. If specified, then you must also specify `initial_file_name`.
    |


    The `sys.fn_xe_file_target_read_file` procedure returns the columns detailed in
    Table 19-6.


    **Table 19-6: `sys.fn_xe_file_target_read_file` Results**


    | Column | Description |

    | --- | --- |

    | `module_guid` | The GUID of the module that contains the package |

    | `package_guid` | The GUID of the package that contains the event |

    | `object_name` | The name of the event |

    | `event_data` | The event data, in XML format |

    | `file_name` | The name of the XEL file that contains the event |

    | `file_offset` | The offset of the block within the file that contains the event
    |


    Because the event data is returned in `XML` format, we need to use `XQuery` to
    shred the nodes into relational data. A full description of `XQuery` is beyond
    the scope of this book, but Microsoft provides an `XQuery` language reference
    on [`https://msdn.microsoft.com`](https://msdn.microsoft.com).


    The script in Listing 19-7 runs the `UpdateCustomersWithPageSplits` and `UpdateCustomersWithoutPageSplits`
    procedures in the `Chapter19` database before extracting the event data using
    the `sys.fn_xe_file_target_read_file`. We then use the `XQuery` `Value` method
    to extract relational values from the `XML` results. Finally, because we have
    turned on causality tracking, we group the data by the correlation `GUID` to see
    how many page splits each stored procedure caused. `UpdateWithoutPageSplits` provides
    a contrast.


    ### Tip

    Remember to update file paths to match your own configuration before running the
    query.


    ```

    --Run the update procedures

    EXEC UpdateCustomersWithoutPageSplits ;

    GO

    EXEC UpdateCustomerWithPageSplits ;

    GO

    --Wait 30 seconds to allow for the XE buffers to be flushed to the target

    WAITFOR DELAY ''00:00:30'' ;

    --Query the XE Target

    SELECT c.procedurename, d.pagesplits

    FROM

    (

    SELECT

    correlationid,

    COUNT(*) -1 PageSplits -- -1 to remove the count of the module_start event

    FROM

    (

    SELECT CapturedEvent,

    xml_data.value(''(/event/data[@name="object_name"]/value)[1]'', ''nvarchar(max)'')
    procedurename,  --extract procedure name

    xml_data.value(''(/event/action[@name="attach_activity_id"]/value)[1]'', ''uniqueidentifier'')
    correlationid --extract Correlation ID

    FROM

    (

    --Query the fn_xe_file_target_read_file function, to extract the raw XML

    SELECT

    OBJECT_NAME CapturedEvent,

    CAST(event_data AS XML) xml_data

    FROM

    sys.fn_xe_file_target_read_file(''C:\mssql\pagesplits*.xel'', NULL , NULL, NULL)
    as XE ) a

    ) b

    GROUP BY correlationid

    ) d

    INNER JOIN --Self join, to allow the count of page splits

    (

    SELECT CapturedEvent,

    xml_data.value(''(/event/data[@name="object_name"]/value)[1]'', ''nvarchar(max)'')
    procedurename,

    xml_data.value(''(/event/action[@name="attach_activity_id"]/value)[1]'', ''uniqueidentifier'')
    correlationid

    FROM

    (

    SELECT object_name CapturedEvent,

    CAST(event_data AS XML) xml_data

    FROM

    sys.fn_xe_file_target_read_file(''C:\mssql\pagesplits*.xel'', NULL , NULL, NULL)
    as XE ) a

    ) c

    ON c.correlationid = d.correlationid

    AND c.procedurename IS NOT NULL ;

    ```


    ### Tip

    Using `XQuery` allows you to query on every event field and action that is captured
    within your trace, so you can create very complex queries, providing rich and
    powerful analysis of the activity within your instance.


    ## Correlating Extended Events with Operating System Data


    Extended Events offer the capability to integrate with operating system–level
    data. This gives useful insights, such as the queries that were running when CPU
    spiked, and so on. The following sections discuss how to correlate SQL Server
    events with `Perfmon` data and other operating system–level events.


    ### Correlating Events with Perfmon Data


    Before Extended Events were introduced, DBAs used a tool called SQL Trace and
    its GUI, Profiler, to capture traces from SQL Server; it was possible to correlate
    this data with data from `Perfmon`. With Extended Events, you do not often need
    to make this correlation, because Extended Events include `Perfmon` counters for
    processor, logical disk, and system performance objects, such as context switches
    and file writes. Therefore, you can correlate SQL Server events with operating
    system counters by adding these objects to the session and by following the T-SQL
    analysis techniques discussed in the previous section.'
