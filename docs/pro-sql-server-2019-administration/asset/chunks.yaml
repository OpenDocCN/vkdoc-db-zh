    to add it to the `PAL`, as shown in Figure [16-27](#333037_2_En_16_Chapter.xhtml#Fig27).


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig27_HTML.jpg](images/333037_2_En_16_Chapter/333037_2_En_16_Fig27_HTML.jpg)

