- fmt: '## Implementing Resource Governor


    To configure Resource Governor on an instance, you must create and configure one
    or more resource pools, each with one or more workload groups. In addition, you
    must also create a classifier function. Finally, you need to enable Resource Governor,
    which results in all subsequent sessions being classified. These topics are discussed
    in the following sections.


    ### Creating Resource Pools


    It is possible to create a maximum of 64 resource pools per instance. Let’s create
    a resource pool through SQL Server Management Studio, drill through Management
    ➤ Resource Governor in Object Explorer, and then select New Resource Pool from
    the Resource Pools context menu. This causes the Resource Governor Properties
    dialog box to be invoked.


    In the Resource Pools section of this dialog box, create a new row in the grid
    and populate it with the information we need to create our new resource pool.
    In our case, you should add the details for a resource pool named `SalesApplication`,
    which has a Minimum CPU % of 25, a Maximum CPU % of 75, a Minimum Memory % of
    25, and a Maximum Memory % of 40.


    ### Tip


    Highlighting a resource pool causes the workload groups associated with that resource
    pool to display in the Workload Groups For Resource Pool section of the screen.
    Here, you can add, amend, or remove resource pools at the same time. However,
    you can also access this dialog box by drilling through Management ➤ Resource
    Governor ➤ [*Resource Pool name*] and then selecting New Workload Group from the
    Workload Groups context menu.


    In this scenario, the maximum memory limit is a hard limit. This means that no
    more than 40% of the memory available to this instance is ever allocated to this
    resource pool. Also, even if no sessions are using this resource pool, 25% of
    the memory available to the instance is still allocated to this resource pool
    and is unavailable to other resource pools.


    In contrast, the maximum CPU limit is soft, or opportunistic. This means that
    if more CPU is available, the resource pool utilizes it. The cap only kicks in
    when there is contention on the processor.


    ### Tip


    It is possible to configure a hard cap on CPU usage. This is helpful in PaaS (Platform
    as a Service) or DaaS (Database as a Service) environments where clients are charged
    based on CPU usage, and you need to ensure consistent billing for their applications.
    A client can easily dispute a bill if they have agreed to pay for 40% of a core,
    but the soft cap allows them to reach 50%, resulting in a higher charge automatically
    being applied. Implementing this is discussed later in this section.


    You can also create resource pools via T-SQL. When you do so, you have access
    to more functionality than you do through the GUI, which allows you to configure
    minimum and maximum IOPS (input/output per second), set hard caps on CPU usage,
    and affinitize a resource pool with specific CPUs or NUMA nodes. Creating an affinity
    between a resource pool and a subset of CPUs means that the resource pool will
    only use the CPUs, to which it is aligned. You can use the `CREATE RESOURCE POOL
    DDL` statement to create a resource pool in T-SQL. The settings you can configure
    on a resource pool are detailed in Table [24-3](#333037_2_En_24_Chapter.xhtml#Tab3).


    Table 24-3: `CREATE RESOURCE POOL` Arguments


    | Argument | Description |

    | --- | --- |

    | `pool_name` | The name that you assign to the resource pool. |

    | `MIN_CPU_PERCENT` | Specifies the guaranteed average minimum CPU resource available
    to the resource pool as a percentage of the CPU bandwidth available to the instance.
    |

    | `MAX_CPU_PERCENT` | Specifies the average maximum CPU resource available to
    the resource pool as a percentage of the CPU bandwidth available to the instance.
    This is a soft limit that applies when there is contention for the CPU resource.
    |

    | `CAP_CPU_PERCENT` | Specifies a hard limit on the amount of CPU resource available
    to the resource pool as a percentage of the CPU bandwidth available to the instance.
    |

    | `MIN_MEMORY_PERCENT` | Specifies the minimum amount of memory that is reserved
    for the resource pool as a percentage of the memory available to the instance.
    |

    | `MAX_MEMORY_PERCENT` | Specifies the maximum amount of memory that the resource
    pool can use as a percentage of the memory available to the instance. |

    | `MIN_IOPS_PER_VOLUME` | Specifies the number of IOPS per volume that is reserved
    for the resource pool. Unlike CPU and memory thresholds, IOPS are expressed as
    an absolute value, as opposed to a percentage. |

    | `MAX_IOPS_PER_VOLUME` | Specifies the maximum number of IOPS per volume that
    the resource pool can use. Like the minimum IOPS threshold, this is expressed
    as an absolute number, as opposed to a percentage. |

    | `AFFINITY SCHEDULER`* | Specifies that the resource pool should be bound to
    specific SQLOS (SQL operating system) schedulers, which in turn map to specific
    virtual cores within the server. Cannot be used with `AFFINITY NUMANODE`. Specify
    `AUTO` to allow SQL Server to manage the schedulers that are used by the resource
    pool. Specify the range of scheduler IDs. For example (`0, 1, 32 TO 64`). |

    | `AFFINITY NUMANODE`* | Specifies that the resource pool should be bound to a
    specific range of NUMA nodes. For example (`1 TO 4`). Cannot be used with `AFFINITY
    SCHEDULER`. |


    *For further details of CPU and NUMA affinity, refer to Chapter [5](#333037_2_En_5_Chapter.xhtml).*


    When we are working with minimum- and maximum-IOPS-per-volume thresholds, we need
    to take a few things into account. First, if we do not set a maximum IOPS limit,
    SQL Server does not govern the IOPS for the resource pool at all. This means that
    if you configure minimum IOPS limits for other resource pools, they are not respected.
    Therefore, if you want Resource Governor to govern IO, always set a maximum IOPS
    threshold for every resource pool.'
