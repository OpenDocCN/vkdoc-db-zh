    However, if we now turn off `MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT`, which you
    can do using the script in Listing [18-9](#333037_2_En_18_Chapter.xhtml#PC9),
    the same transaction now fails with the error message shown in Figure [18-4](#333037_2_En_18_Chapter.xhtml#Fig4).


    ![../images/333037_2_En_18_Chapter/333037_2_En_18_Fig4_HTML.jpg](images/333037_2_En_18_Chapter/333037_2_En_18_Fig4_HTML.jpg)


    Figure 18-4


    Join disk and memory tables without automatic elevation


    ```

    ALTER DATABASE Chapter18

    SET MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT=OFF

    GO

    Listing 18-9

    Turning Off MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT

    ```


    The query in Listing [18-10](#333037_2_En_18_Chapter.xhtml#PC10) demonstrates
    how we can join the `Customers` table with the `CustomersMem` table using the
    Snapshot isolation level for the memory-optimized table and the Serializable isolation
    level for the disk-based table. Because we are using interpreted SQL, the Snapshot
    isolation level is the only level we can use to access the memory-optimized table,
    and we must specify this as a query hint. If we specify it at the transaction
    level instead of at serializable, the transaction fails.


    ```

    BEGIN TRANSACTION

    SET TRANSACTION ISOLATION LEVEL SERIALIZABLE

    SELECT *

    FROM dbo.Customers C

    INNER JOIN dbo.CustomersMem CM (SNAPSHOT)

    ON C.CustomerID = CM.CustomerID ;

    COMMIT TRANSACTION

    Listing 18-10

    Joining Disk and Memory-Optimized Tables Using Query Hints

    ```


    If we use a natively compiled stored procedure instead of interpreted SQL, we
    add the required transaction isolation level to the `ATOMIC` block of the procedure
    definition. The script in Listing [18-11](#333037_2_En_18_Chapter.xhtml#PC11)
    demonstrates creating a natively compiled stored procedure that updates the `CustomersMem`
    table using the Serializable isolation level. Because natively compiled stored
    procedures are not able to access disk-based tables, you do not need to be concerned
    with locking hints to support cross-container transactions.


    ```

    CREATE PROCEDURE dbo.UpdateCreditLimit

    WITH native_compilation, schemabinding, execute as owner

    AS

    BEGIN ATOMIC

    WITH(TRANSACTION ISOLATION LEVEL = SERIALIZABLE, LANGUAGE = ''English'')

    UPDATE dbo.CustomersMem

    SET CreditLimit = CreditLimit * 1.1

    WHERE Balance < CreditLimit / 4 ;

    UPDATE dbo.CustomersMem

    SET CreditLimit = CreditLimit * 1.05

    WHERE Balance < CreditLimit / 2 ;

    END

    Listing 18-11

    Using Serializable Isolation in a Natively Compiled Stored Procedure

    ```'
  trans: '### 已提交读


    `已提交读`隔离级别在针对内存优化表时受到支持，但前提是您使用的是自动提交事务。在显式或隐式事务中无法使用`已提交读`。在本地编译存储过程的`ATOMIC`块中也无法使用`已提交读`。由于`已提交读`是
    SQL Server 的默认隔离级别，您必须确保所有涉及内存优化表的事务都明确指定了隔离级别，或者必须设置`MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT`数据库属性。此选项会将所有涉及内存优化表但未指定隔离级别的事务提升到快照隔离级别，这是限制最少的隔离级别，并且完全适用于内存
    OLTP。


    清单 18-7 中的命令展示了如何为 `Chapter18` 数据库设置 `MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT` 属性。


    ```sql

    ALTER DATABASE Chapter18

    SET MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT = ON ;

    ```

    清单 18-7

    提升到快照


    ### 已提交读快照


    `已提交读快照`隔离级别在针对内存优化表时受到支持，但仅限于您使用自动提交事务时。当事务访问基于磁盘的表时，此隔离级别不受支持。


    ### 快照


    `快照`隔离级别使用行版本控制来确保事务始终看到事务开始时的数据。仅当您使用解释型 SQL 且指定的是查询提示而非事务级别时，快照隔离级别才在针对内存优化表时受到支持。它在本地编译存储过程的`ATOMIC`块中完全受支持。


    如果一个事务尝试修改已被另一个事务更新的行，则冲突检测机制会回滚该事务，并抛出错误 41302。如果一个事务尝试插入与另一个事务已插入的行具有相同主键值的行，则冲突检测会回滚该事务并抛出错误
    41352。如果一个事务尝试修改已被另一个事务删除的表中的数据，则会抛出错误 41305，并且该事务将被回滚。


    ### 可重复读


    `可重复读`隔离级别提供与`快照`相同的保护，但此外，它还保证自事务开始以来，事务读取的行未被其他行修改。如果事务尝试读取已被另一个事务修改的行，则会抛出错误
    41305 并且回滚该事务。然而，在使用解释型 SQL 时，`可重复读`隔离不支持针对内存优化表。它仅在本地编译存储过程的`ATOMIC`块中受支持。


    ### 可序列化


    `可序列化`隔离级别提供了`可重复读`所提供的相同保护，但此外，它还保证在事务所访问的查询范围内没有插入新行。如果使用`可序列化`隔离级别的事务无法满足其保证，则冲突检测机制将回滚该事务并抛出错误
    41325。然而，在使用解释型 SQL 时，`可序列化`隔离不支持针对内存优化表。它仅在本地编译存储过程的`ATOMIC`块中受支持。


    ## 跨容器事务


    由于隔离级别的使用受到限制，当一个事务同时访问内存优化表和基于磁盘的表时，您可能需要指定隔离级别和查询提示的组合。清单 18-8 中的查询将 `Customers`
    和 `CustomersMem` 表连接在一起。它之所以成功，仅仅是因为我们启用了 `MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT`。这意味着该查询使用默认的
    `已提交读快照` 隔离级别访问基于磁盘的表，并自动将 `CustomersMem` 表的读取提升到使用 `快照` 隔离。


    ```sql

    BEGIN TRANSACTION

    SELECT *

    FROM dbo.Customers C

    INNER JOIN dbo.CustomersMem CM

    ON C.CustomerID = CM.CustomerID ;

    COMMIT TRANSACTION

    ```

    清单 18-8

    通过自动提升连接磁盘和内存表


    但是，如果我们现在关闭 `MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT`（您可以使用清单 18-9 中的脚本完成此操作），相同的事务现在将失败，并显示图
    18-4 中的错误消息。


    ![../images/333037_2_En_18_Chapter/333037_2_En_18_Fig4_HTML.jpg](img/333037_2_En_18_Fig4_HTML.jpg)


    图 18-4


    在没有自动提升的情况下连接磁盘和内存表


    ```sql

    ALTER DATABASE Chapter18

    SET MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT=OFF

    GO

    ```

    清单 18-9

    关闭 `MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT`


    清单 18-10 中的查询演示了如何将 `Customers` 表与 `CustomersMem` 表连接，其中对内存优化表使用 `快照` 隔离级别，对基于磁盘的表使用
    `可序列化` 隔离级别。因为我们使用的是解释型 SQL，`快照` 隔离级别是我们可以用来访问内存优化表的唯一级别，并且我们必须将其指定为查询提示。如果我们在事务级别指定它而不是指定
    serializable，事务将失败。


    ```sql

    BEGIN TRANSACTION

    SET TRANSACTION ISOLATION LEVEL SERIALIZABLE

    SELECT *

    FROM dbo.Customers C

    INNER JOIN dbo.CustomersMem CM (SNAPSHOT)

    ON C.CustomerID = CM.CustomerID ;

    COMMIT TRANSACTION

    ```

    清单 18-10

    使用查询提示连接磁盘和内存优化表


    如果我们使用本机编译存储过程而不是解释型 SQL，我们会将所需的事务隔离级别添加到过程定义的 `ATOMIC` 块中。清单 18-11 中的脚本演示了创建一个本机编译存储过程，该过程使用
    `可序列化` 隔离级别更新 `CustomersMem` 表。由于本机编译存储过程无法访问基于磁盘的表，因此您无需担心用于支持跨容器事务的锁提示。


    ```sql

    CREATE PROCEDURE dbo.UpdateCreditLimit

    WITH native_compilation, schemabinding, execute as owner

    AS

    BEGIN ATOMIC

    WITH(TRANSACTION ISOLATION LEVEL = SERIALIZABLE, LANGUAGE = ''English'')

    UPDATE dbo.CustomersMem

    SET CreditLimit = CreditLimit * 1.1

    WHERE Balance < CreditLimit / 4 ;

    UPDATE dbo.CustomersMem

    SET CreditLimit = CreditLimit * 1.05

    WHERE Balance < CreditLimit / 2 ;

    END

    ```

    清单 18-11

    在本机编译存储过程中使用 `可序列化` 隔离级别'
- fmt: '### Retry Logic


    Whether you are using interpreted SQL or a natively compiled stored procedure,
    always ensure that you use retry logic when you are running transactions against
    memory-optimized tables. This is because of the optimistic concurrency model,
    which means that the conflict detection mechanism rolls transactions back, as
    opposed to managing concurrency with locking. It is also important to remember
    that SQL Server even rolls back read-only transactions if the required level of
    isolation cannot be guaranteed. For example, if you are using serializable isolation
    in a read-only transaction, and another transaction inserts rows that match your
    query filters, the transaction is rolled back.


    The script in Listing 18-12 creates a wrapper stored procedure for the `UpdateCreditLimit`
    procedure, which retries the procedure up to ten times should the procedure fail,
    with a 1-second gap between each iteration. You should change this delay to match
    the average duration of conflicting transactions.


    ```sql

    CREATE PROCEDURE UpdateCreditLimitWrapper

    AS

    BEGIN

    DECLARE @Retries INT = 1 ;

    WHILE @Retries <= 10

    BEGIN

    BEGIN TRY

    EXEC dbo.UpdateCreditLimit ;

    END TRY

    BEGIN CATCH

    WAITFOR DELAY ''00:00:01'' ;

    SET @Retries = @Retries + 1 ;

    END CATCH

    END

    END

    ```

    Listing 18-12 Retry Logic for Memory-Optimized Tables


    ## Observing Transactions, Locks, and Deadlocks


    SQL Server provides a set of DMVs that expose information about current transactions
    and locks. The following sections explore the metadata available.


    ### Observing Transactions


    The `sys.dm_tran_active_transactions` DMV details the current transactions within
    the instance. This DMV returns the columns described in Table 18-11.


    Table 18-11 Columns Returned by `sys.dm_tran_active_transactions`


    | Column | Description |

    | --- | --- |

    | `transaction_id` | The unique ID of the transaction. |

    | `name` | The name of the transaction. If the transaction has not been marked
    with a name, then the default name is displayed—e.g., `"user_transaction"`. |

    | `transaction_begin_time` | The date and time that the transaction started. |

    | `transaction_type` | An integer value depicting the type of transaction.<br>• `1`
    indicates a read/write transaction.<br>• `2` indicates a read-only transaction.<br>• `3`
    indicates a system transaction.<br>• `4` indicates a distributed transaction.
    |

    | `transaction_uow` | A unit of work ID that MSDTC (Microsoft Distributed Transaction
    Coordinator) uses to work with distributed transactions. |

    | `transaction_state` | The current status of the transaction.<br>• `0` indicates
    that the transaction is still initializing.<br>• `1` indicates that the transaction
    is initialized but has not yet started.<br>• `2` indicates that the transaction
    is active.<br>• `3` indicates that the transaction has ended. This status is only
    applicable to read-only transactions.<br>• `4` indicates that the commit has been
    initiated. This status is only applicable to distributed transactions.<br>• `5`
    indicates that the transaction is prepared and awaiting resolution.<br>• `6` indicates
    that the transaction has been committed.<br>• `7` indicates that the transaction
    is being rolled back.<br>• `8` indicates that the rollback of a transaction has
    finished. |

    | `dtc_state` | Indicates the state of a transaction on an Azure database.<br>• `1`
    indicates that the transaction is active.<br>• `2` indicates that the transaction
    is prepared.<br>• `3` indicates that the transaction is committed.<br>• `4` indicates
    that the transaction is aborted.<br>• `5` indicates that the transaction is recovered.
    |


    ### Note


    Undocumented columns have been omitted from DMVs in this chapter.


    The script in Listing 18-13 indicates how to use `sys.dm_tran_active_transactions`
    to find details of long-running transactions. The query looks for transactions
    that have been running for longer than 10 minutes and returns information including
    their current state, the amount of resources they are consuming, and the login
    that is executing them.


    ### Tip


    In a test environment, begin a transaction but do not commit it 10 minutes before
    running this query.


    ```sql

    SELECT

    name

    ,transaction_begin_time

    ,CASE transaction_type

    WHEN 1 THEN ''Read/Write''

    WHEN 2 THEN ''Read-Only''

    WHEN 3 THEN ''System''

    WHEN 4 THEN ''Distributed''

    END TransactionType,

    CASE transaction_state

    WHEN 0 THEN ''Initializing''

    WHEN 1 THEN ''Initialized But Not Started''

    WHEN 2 THEN ''Active''

    WHEN 3 THEN ''Ended''

    WHEN 4 THEN ''Committing''

    WHEN 5 THEN ''Prepared''

    WHEN 6 THEN ''Committed''

    WHEN 7 THEN ''Rolling Back''

    WHEN 8 THEN ''Rolled Back''

    END State

    , SUBSTRING(TXT.text, ( er.statement_start_offset / 2 ) + 1,

    ( ( CASE WHEN er.statement_end_offset = -1

    THEN LEN(CONVERT(NVARCHAR(MAX), TXT.text)) * 2

    ELSE er.statement_end_offset

    END - er.statement_start_offset ) / 2 ) + 1) AS CurrentQuery

    , TXT.text AS ParentQuery

    , es.host_name

    , CASE tat.transaction_type

    WHEN 1 THEN ''Read/Write Transaction''

    WHEN 2 THEN ''Read-Only Transaction''

    WHEN 3 THEN ''System Transaction''

    WHEN 4 THEN ''Distributed Transaction''

    ELSE ''Unknown''

    END AS TransactionType

    ,SUSER_SNAME(es.security_id) LoginRunningTransaction

    ,es.memory_usage * 8 MemUsageKB

    ,es.reads

    ,es.writes

    ,es.cpu_time

    FROM sys.dm_tran_active_transactions tat

    INNER JOIN sys.dm_tran_session_transactions st

    ON tat.transaction_id = st.transaction_id

    INNER JOIN sys.dm_exec_sessions es

    ON st.session_id = es.session_id

    INNER JOIN sys.dm_exec_requests er

    ON er.session_id = es.session_id

    CROSS APPLY sys.dm_exec_sql_text(er.sql_handle) TXT

    WHERE st.is_user_transaction = 1

    AND tat.transaction_begin_time < DATEADD(MINUTE,-10,GETDATE()) ;

    ```

    Listing 18-13 Long-Running Transactions


    The query works by joining to `sys.dm_exec_sessions` via `sys.dm_tran_session_transactions`.
    This DMV can be used to correlate transactions with sessions, and it returns the
    columns described in Table 18-12.


    Table 18-12 `sys.dm_tran_session_transactions` Columns


    | Column | Description |

    | --- | --- |

    | `session_id` | The ID of the session in which the transaction is running. |

    | `transaction_id` | The unique ID of the transaction. |

    | `transaction_descriptor` | The ID used to communicate with the client driver.
    |

    | `enlist_count` | The number of active requests in the session. |

    | `is_user_transaction` | Indicates if the transaction is a user or a system transaction.
    `0` indicates a system transaction and `1` indicates a user transaction. |

    | `is_local` | Indicates if the transaction is distributed. `0` indicates a distributed
    transaction and `1` indicates a local transaction. |

    | `is_enlisted` | Indicates that a distributed transaction is enlisted. |

    | `is_bound` | Indicates if the transaction is running in a bound session. |

    | `open_transaction_count` | A count of open transactions within the session.
    |'
