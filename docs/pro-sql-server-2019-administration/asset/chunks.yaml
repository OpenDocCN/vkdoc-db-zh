    ALTER DATABASE Chapter8 SET AUTO_CREATE_STATISTICS ON  (INCREMENTAL=ON) ;

    GO

    --Turn on Auto_Update_Stats_Async

    ALTER DATABASE Chapter8 SET AUTO_UPDATE_STATISTICS ON WITH NO_WAIT ;

    GO

    --Turn on Auto_Update_Stats_Async

    ALTER DATABASE Chapter8 SET AUTO_UPDATE_STATISTICS_ASYNC ON WITH NO_WAIT ;

    GO

    Listing 8-22

    Toggling Automatic Statistics Options

    ```


    ### Filtered Statistics


    Filtered statistics allow you to create statistics on a subset of data within
    a column through the use of a `WHERE` clause in the statistic creation. This allows
    the Query Optimizer to generate an even better plan, since the statistics only
    contain the distribution of values within the well-defined subset of data. For
    example, if we create filtered statistics on the `NetAmount` column of our `OrdersDisk`
    table filtered by `OrderDate` being greater than 1 Jan 2019, then the statistics
    will not include rows that contain old orders, allowing us to search for large,
    recent orders more efficiently.


    ### Incremental Statistics


    Incremental statistics can help reduce table scans caused by statistics updates
    on large partitioned tables. When enabled, statistics are created and updated
    on a per-partition basis, as opposed to globally, for the entire table. This can
    significantly reduce the amount of time you need to update statistics on large
    partitioned tables, since partitions where the statistics are not outdated are
    not touched, therefore reducing unnecessary overhead.


    Incremental statistics are not supported in all scenarios, however. A warning
    is generated and the setting is ignored if the option is used with the following
    types of statistics:


    *   Statistics on views


    *   Statistics on XML columns


    *   Statistics on Geography or Geometry columns


    *   Statistics on filtered indexes


    *   Statistics for indexes that are not partition aligned


    Additionally, you cannot use incremental statistics on read-only databases or
    on databases that are participating in an AlwaysOn Availability Group as a readable
    secondary replica.'
  trans: '

    ### 提示


    唯一的例外是在创建索引时。当你创建索引时，无论`AUTO_CREATE_STATS`设置如何，系统总会生成统计信息（包括多列统计信息）来覆盖索引键。这还包括在筛选索引上创建的筛选统计信息。


    `Auto Create Incremental Stats`选项导致分区表上的统计信息按分区自动创建，而不是为整个表生成。这可以减少争用，因为它避免了扫描整个表的需要。


    随着 DML 操作在表上执行，统计信息会变得过时。数据库级别的选项`AUTO_UPDATE_STATISTICS`会在统计信息过时时重建它们。表 8-3 中列出了用于确定统计信息是否过时的规则。


    表 8-3 统计信息更新算法


    | 表中行数 | 规则 |

    | --- | --- |

    | 0 | 表行数大于 0。 |

    | <= 500 | 统计信息对象的第一列中有 500 个或更多值发生了变化。 |

    | > 500 | 统计信息对象的第一列中有 500 + 20%或更多值发生了变化。 |

    | 具有`INCREMENTAL`统计信息的分区表 | 特定分区的统计信息对象的第一列中有 20%或更多值发生了变化。 |


    `AUTO_UPDATE_STATISTICS`过程非常有用，通常建议启用它。然而，可能会出现一个问题，因为这个过程是同步且阻塞的。因此，当运行查询时，SQL
    Server 会检查统计信息是否需要更新。如果需要，SQL Server 会更新它们，但这会阻塞该查询以及任何其他需要相同统计信息的查询，直到操作完成。在高读写负载期间，例如针对超大表的
    ETL 过程，这可能会导致性能问题。解决此问题是另一个数据库级别的选项，称为`AUTO_UPDATE_STATISTICS_ASYNC`。即使启用了此选项，它也仅在`AUTO_UPDATE_STATISTICS`同时启用时才会生效。启用后，`AUTO_UPDATE_STATS_ASYNC`会强制统计信息对象的更新作为后台异步进程运行。这意味着触发更新的查询和其他查询不会被阻塞。然而，代价是这些查询无法从更新后的统计信息中受益。


    前面提到的选项可以在“数据库属性”对话框的“选项”页上进行配置。或者，你也可以使用`ALTER DATABASE`命令来配置它们，如清单 8-22 所示。


    ```

    --开启 Auto_Create_Stats

    ALTER DATABASE Chapter8 SET AUTO_CREATE_STATISTICS ON ;

    GO

    --开启 Auto_Create_Incremental_Stats

    ALTER DATABASE Chapter8 SET AUTO_CREATE_STATISTICS ON  (INCREMENTAL=ON) ;

    GO

    --开启 Auto_Update_Stats_Async

    ALTER DATABASE Chapter8 SET AUTO_UPDATE_STATISTICS ON WITH NO_WAIT ;

    GO

    --开启 Auto_Update_Stats_Async

    ALTER DATABASE Chapter8 SET AUTO_UPDATE_STATISTICS_ASYNC ON WITH NO_WAIT ;

    GO

    清单 8-22 切换自动统计信息选项

    ```


    ### 筛选统计信息


    筛选统计信息允许你在创建统计信息时通过`WHERE`子句，基于列中数据的子集创建统计信息。这使得查询优化器能够生成更好的执行计划，因为统计信息只包含明确定义的子集内的值分布。例如，如果我们在`OrdersDisk`表的`NetAmount`列上创建筛选统计信息，筛选条件为`OrderDate`大于
    2019 年 1 月 1 日，那么统计信息将不包含旧订单的行，从而使我们能够更高效地搜索大额的新近订单。


    ### 增量统计信息


    增量统计信息有助于减少在大型分区表上因更新统计信息而导致的表扫描。启用后，统计信息按分区创建和更新，而不是全局地为整个表进行更新。这可以显著减少在大型分区表上更新统计信息所需的时间，因为未过时的统计信息所在的分区不会被触及，从而减少了不必要的开销。


    然而，增量统计信息并非在所有场景下都受支持。如果将此选项与以下类型的统计信息一起使用，系统会生成警告并忽略该设置：


    *   视图上的统计信息

    *   XML 列上的统计信息

    *   Geography 或 Geometry 列上的统计信息

    *   筛选索引上的统计信息

    *   非分区对齐的索引的统计信息


    此外，你无法在只读数据库上使用增量统计信息，也无法在作为可读辅助副本参与`AlwaysOn 可用性组`的数据库上使用。

    '
- fmt: '## Managing Statistics


    In addition to being automatically created and updated by SQL Server, you can
    also create and update statistics manually using the `CREATE STATISTICS` statement.
    If you wish to create filtered statistics, add a `WHERE` clause at the end of
    the statement. The script in Listing [8-23](#333037_2_En_8_Chapter.xhtml#PC23)
    creates a multicolumn statistic on the `FirstName` and `LastName` columns of the
    `CustomersDisk` table. It then creates a filtered statistic on the `NetAmount`
    column of the `OrdersDisk` table, built only on rows where the `OrderDate` is
    greater than 1st Jan 2019.


    ```

    USE Chapter8

    GO

    --Create multicolumn statistic on FirstName and LastName

    CREATE STATISTICS Stat_FirstName_LastName ON dbo.CustomersDisk(FirstName, LastName)
    ;

    GO

    --Create filtered statistic on NetAmount

    CREATE STATISTICS Stat_NetAmount_Filter_OrderDate ON dbo.OrdersDisk(NetAmount)

    WHERE OrderDate > ''2019-01-01'' ;

    GO

    Listing 8-23

    Creating Statistics

    ```


    When creating statistics, you can use the options detailed in Table [8-4](#333037_2_En_8_Chapter.xhtml#Tab4).


    Table 8-4 Creating Statistics Options


    | Option | Description |

    | --- | --- |

    | `FULLSCAN` | Creates the statistic object on a sample of 100% of rows in the
    table. This option creates the most accurate statistics but takes the longest
    time to generate. |

    | `SAMPLE` | Specifies the number of rows or percentage of rows you need to use
    to build the statistic object. The larger the sample, the more accurate the statistic,
    but the longer it takes to generate. Specifying 0 creates the statistic but does
    not populate it. |

    | `NORECOMPUTE` | Excludes the statistic object from being automatically updated
    with `AUTO_UPDATE_STATISTICS`. |

    | `INCREMENTAL` | Overrides the database-level setting for incremental statistics.
    |


    Individual statistics, or all statistics on an individual table, can be updated
    by using the `UPDATE STATISTICS` statement. The script in Listing [8-24](#333037_2_En_8_Chapter.xhtml#PC24)
    first updates the `Stat_NetAmount_Filter_OrderDate` statistics object that we
    created on the `OrdersDisk` table and then updates all statistics on the `CustomersDisk`
    table.


    ```

    --Update a single statistics object

    UPDATE STATISTICS dbo.OrdersDisk Stat_NetAmount_Filter_OrderDate ;

    GO

    --Update all statistics on a table

    UPDATE STATISTICS dbo.CustomersDisk ;

    GO

    Listing 8-24

    Updating Statistics

    ```


    When using `UPDATE STATISTICS`, in addition to the options specified in Table
    [8-4](#333037_2_En_8_Chapter.xhtml#Tab4) for creating statistics, which are all
    valid when updating statistics, the options detailed in Table [8-5](#333037_2_En_8_Chapter.xhtml#Tab5)
    are also available.


    Table 8-5 Updating Statistics Options


    | Option | Description |

    | --- | --- |

    | `RESAMPLE` | Uses the most recent sample rate to update the statistics. |

    | `ON PARTITIONS` | Causes statistics to be generated for the partitions listed
    and then merges them together to create global statistics. |

    | `ALL | COLUMNS | INDEX` | Specifies if statistics should be updated for just
    columns, just indexes, or both. The default is `ALL`. |


    You can also update statistics for an entire database by using the `sp_updatestats`
    system stored procedure. This procedure updates out-of-date statistics on disk-based
    tables and all statistics on memory-optimized tables regardless of whether they
    are out of date or not. Listing [8-25](#333037_2_En_8_Chapter.xhtml#PC25) demonstrates
    this system stored procedure’s usage to update statistics in the `Chapter8` database.
    Passing in the `RESAMPLE` parameter causes the most recent sample rate to be used.
    Omitting this parameter causes the default sample rate to be used.


    ```

    EXEC sp_updatestats ''RESAMPLE'' ;

    Listing 8-25

    Sp_updatestats

    ```


    ### Note


    Updating statistics causes queries that use those statistics to be recompiled
    the next time they run. The only time this is not the case is if there is only
    one possible plan for the tables and indexes referenced. For example, `SELECT
    * FROM MyTable` always performs a clustered index scan, assuming that the table
    has a clustered index.


    SQL Server 2019 introduces additional metadata information, to help diagnose issues
    that are caused by queries waiting for synchronous statistics updates to occur.
    Firstly, a new wait type has been added, called `WAIT_ON_SYNC_STATISTICS_REFRESH`.
    This wait type denotes the amount of time that queries have spent waiting on the
    completion of synchronous statistics updates. Secondly, a new command type, called
    `SELECT (STATMAN)`, has been added to the `sys.dm_exec_requests` DMV. This command
    type indicates that a `SELECT` statement is currently waiting for a synchronous
    statistics update to complete, before it can continue.'
