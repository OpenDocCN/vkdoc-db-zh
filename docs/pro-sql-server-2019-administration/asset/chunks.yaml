- fmt: '# Restoring a Database


    You can restore a database either through SSMS or via T-SQL. We explore both of
    these options in the following sections.


    ## Restoring in SQL Server Management Studio


    To begin a restore in SSMS, select `Restore Database` from the context menu of
    `Databases` in `Object Explorer`. This causes the `General` page of the `Restore
    Database` dialog box to display, as illustrated in Figure 12-5. Selecting the
    database to be restored from the drop-down list causes the rest of the tab to
    be automatically populated.


    ![../images/333037_2_En_12_Chapter/333037_2_En_12_Fig5_HTML.jpg](images/333037_2_En_12_Chapter/333037_2_En_12_Fig5_HTML.jpg)

    **Figure 12-5**

    The `General` page


    You can see that the contents of the `Chapter12` media set are displayed in the
    `Backup Sets To Restore` pane of the page. In this case, we can see the contents
    of the `Chapter12` media set. The `Restore` check boxes allow you to select the
    backup sets that you wish to restore.


    The `Timeline` button provides a graphical illustration of when each backup set
    was created, as illustrated in Figure 12-6. This allows you to easily see how
    much data loss exposure you have, depending on the backup sets that you choose
    to restore. In the `Timeline` window, you can also specify if you want to recover
    to the end of the log or if you wish to restore to a specific date/time.


    ![../images/333037_2_En_12_Chapter/333037_2_En_12_Fig6_HTML.jpg](images/333037_2_En_12_Chapter/333037_2_En_12_Fig6_HTML.jpg)

    **Figure 12-6**

    The `Backup Timeline` page


    Clicking the `Verify Backup Media` button on the `General` page causes a `RESTORE
    WITH VERIFYONLY` operation to be carried out. This operation verifies the backup
    media without attempting to restore it. In order to do this, it performs the following
    checks:


    *   The backup set is complete.

    *   All backup devices are readable.

    *   The `CHECKSUM` is valid (only applies if `WITH CHECKSUM` was specified during
    the backup operation).

    *   Page headers are verified.

    *   There is enough space on the target restore volume for the backups to be restored.


    On the `Files` page, illustrated in Figure 12-7, you can select a different location
    to which to restore each file. The default behavior is to restore the files to
    the current location. You can use the ellipses, next to each file, to specify
    a different location for each individual file, or you can use the `Relocate All
    Files To Folder` option to specify a single folder for all data files and a single
    folder for all log files.


    ![../images/333037_2_En_12_Chapter/333037_2_En_12_Fig7_HTML.jpg](images/333037_2_En_12_Chapter/333037_2_En_12_Fig7_HTML.jpg)

    **Figure 12-7**

    The `Files` page


    On the `Options` page, shown in Figure 12-8, you are able to specify the restore
    options that you plan to use. In the `Restore Options` section of the page, you
    can specify that you want to overwrite an existing database, preserve the replication
    settings within the database (which you should use if you are configuring log
    shipping to work with replication), and restore the database with restricted access.
    This last option makes the database accessible only to administrators and members
    of the `db_owner` and `db_creator` roles after the restore completes. This can
    be helpful if you want to verify the data, or perform any data repairs, before
    you make the database accessible to users.


    In the `Restore Options` section, you can also specify the recovery state of the
    database. Restoring the database with `RECOVERY` brings the database online when
    the restore completes. `NORECOVERY` leaves the database in a restoring state,
    which means that further backups can be applied. `STANDBY` brings the database
    online but leaves it in a read-only state. This option can be helpful if you are
    failing over to a secondary server. If you choose this option, you are also able
    to specify the location of the `Transaction Undo` file.


    ### Tip


    If you specify `WITH PARTIAL` during the restore of the first backup file, you
    are able to apply additional backups, even if you restore `WITH RECOVERY`. There
    is no GUI support for piecemeal restores, however. Performing piecemeal restores
    via T-SQL is discussed later in this chapter.


    In the `Tail-Log Backup` section of the screen, you can choose to attempt a tail-log
    backup before the restore operation begins, and if you choose to do so, you can
    choose to leave the database in a restoring state. A tail-log backup may be possible
    even if the database is damaged. Leaving the source database in a restoring state
    essentially safe-states it to mitigate the risk of data loss. If you choose to
    take a tail-log backup, you can also specify the file path for the backup device
    to use. You can also specify if you want to close existing connections to the
    destination database before the restore begins and if you want to be prompted
    before restoring each individual backup set.


    ![../images/333037_2_En_12_Chapter/333037_2_En_12_Fig8_HTML.jpg](images/333037_2_En_12_Chapter/333037_2_En_12_Fig8_HTML.jpg)

    **Figure 12-8**

    The `Options` page


    If we want to back up the transaction log of the `Chapter12` database, again appending
    the backup set to the same media set, we can use the command in Listing 12-6.
    Before running this script, modify the path of the backup device to meet your
    system’s configuration.


    ```sql

    BACKUP LOG Chapter12

    TO  DISK = ''H:\MSSQL\Backup\Chapter12.bak''

    WITH  RETAINDAYS = 90

    , NOINIT

    , MEDIANAME = ''Chapter12''

    , NAME = ''Chapter12-Log Backup''

    , COMPRESSION ;

    GO

    ```

    **Listing 12-6**

    Performing a Transaction Log Backup


    ### Tip


    In enterprise scenarios, you may wish to store full, differential, and log backups
    in different folders, to assist administrators, when looking for files to recover.


    If we are implementing a filegroup backup strategy and want to back up only `FileGroupA`,
    we can use the command in Listing 12-7. We create a new media set for this backup
    set. Before running this script, modify the path of the backup device to meet
    your system’s configuration.


    ```sql

    BACKUP DATABASE Chapter12 FILEGROUP = ''FileGroupA''

    TO  DISK = ''H:\MSSQL\Backup\Chapter12FGA.bak''

    WITH  RETAINDAYS = 90

    , FORMAT

    , INIT

    , MEDIANAME = ''Chapter12FG''

    , NAME = ''Chapter12-Full Database Backup-FilegroupA''

    , COMPRESSION ;

    GO

    ```

    **Listing 12-7**

    Performing a Filegroup Backup


    To repeat the full backup of the `Chapter12` but stripe the backup set across
    two backup devices, we can use the command in Listing 12-8. This helps increase
    the throughput of the backup. Before running this script, you should modify the
    paths of the backup devices to meet your system’s configuration.


    ```sql

    BACKUP DATABASE Chapter12

    TO  DISK = ''H:\MSSQL\Backup\Chapter12Stripe1.bak'',

    DISK = ''G:\MSSQL\Backup\Chapter12Stripe2.bak''

    WITH  RETAINDAYS = 90

    , FORMAT

    , INIT

    , MEDIANAME = ''Chapter12Stripe''

    , NAME = ''Chapter12-Full Database Backup-Stripe''

    , COMPRESSION ;

    GO

    ```

    **Listing 12-8**

    Using Multiple Backup Devices


    For increased redundancy, we can create a mirrored media set by using the command
    in Listing 12-9. Before running this script, modify the paths of the backup devices
    to meet your system’s configuration.


    ```sql

    BACKUP DATABASE Chapter12

    TO  DISK = ''H:\MSSQL\Backup\Chapter12Stripe1.bak'',

    DISK = ''G:\MSSQL\Backup\Chapter12Stripe2.bak''

    MIRROR TO DISK = ''J:\MSSQL\Backup\Chapter12Mirror1.bak'',

    DISK = ''K:\MSSQL\Backup\Chapter12Mirror2.bak''

    WITH  RETAINDAYS = 90

    , FORMAT

    , INIT

    , MEDIANAME = ''Chapter12Mirror''

    , NAME = ''Chapter12-Full Database Backup-Mirror''

    , COMPRESSION ;

    GO

    ```

    **Listing 12-9**

    Using a Mirrored Media Set'
