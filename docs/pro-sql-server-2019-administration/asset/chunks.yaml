    `Contacts` table in the `Chapter16` database; we can recover this data by reinserting
    it from the snapshot, as demonstrated in Listing [16-4](#333037_2_En_16_Chapter.xhtml#PC4).


    ```

    --Truncate the table

    TRUNCATE TABLE Chapter16.dbo.Customers ;

    --Allow Identity values to be re-inserted

    SET IDENTITY_INSERT Chapter16.dbo.Customers ON ;

    --Insert the data

    INSERT INTO Chapter16.dbo.Customers(ID, FirstName, LastName, CreditCardNumber)

    SELECT *

    FROM Chapter16_ss_0630.dbo.Customers ;

    --Turn off IDENTITY_INSERT

    SET IDENTITY_INSERT Chapter16.dbo.Customers OFF ;

    Listing 16-4

    Recovering Lost Data

    ```


    If a large portion of the source database has been damaged by user error, then
    instead of fixing each data issue individually, it may be quicker to recover the
    entire database from the snapshot. You can do this using the `RESTORE` command
    with the `FROM DATABASE_SNAPSHOT` syntax, as demonstrated in Listing [16-5](#333037_2_En_16_Chapter.xhtml#PC5).


    ### Note


    If more than one snapshot of the database that you wish to recover exists, then
    you must drop all the snapshots but the one you are going to restore from before
    you run this script.


    ```

    USE Master

    GO

    RESTORE DATABASE Chapter16

    FROM DATABASE_SNAPSHOT = ''Chapter16_ss_0630'' ;

    Listing 16-5

    Recovering from a Database Snapshot

    ```


    ## Replication


    SQL Server provides a suite of replication technologies, which you can use to
    disperse data between instances. You can use replication for many purposes, including
    offloading reporting, integrating data from multiple sites, supporting data warehousing,
    and exchanging data with mobile users.


    ### Replication Concepts


    Replication draws its terminology from the publishing industry. The components
    of a Replication topology are described in Table [16-1](#333037_2_En_16_Chapter.xhtml#Tab1).


    Table 16-1


    Replication Components


    | Component | Description |

    | --- | --- |

    | Publisher | The publisher is the instance that makes data available to other
    locations. This is essentially the primary server. |

    | Subscriber | The subscriber is the instance that receives data from the publisher.
    This is essentially the secondary server. A Replication topology can have multiple
    subscribers. |

    | Distributor | The distributor is the instance that stores the metadata for the
    replication technology and may also take the workload of processing. This instance
    may be the same instance as the publisher. |

    | Article | An article is a database object that is replicated, such as a table
    or a view. The article can be filtered to reduce the amount of data that needs
    to be replicated. |

    | Publication | A publication is a collection of articles from a database that
    is replicated as a single unit. |

    | Subscription | A subscription is a request from a subscriber to receive publications.
    It defines which publications are received by the subscriber. There are two types
    of subscription: push and pull. In a pull subscription model, the distribution
    or merge agent that is responsible for moving the data runs on each subscriber.
    In a push model, the distribution or merge agent runs on the distributor. |

    | Replication Agents | Replication agents are applications that sit outside of
    SQL Server that are used to perform various tasks. The agents that are used depend
    on the type of replication that you implement. |


    Figure [16-3](#333037_2_En_16_Chapter.xhtml#Fig3) illustrates how the replication
    components fit together within a Replication topology. In this example, two subscribers
    each receiving the same publication and the distributor have been separated from
    the publisher. This is known as a *remote distributor* . If the publisher and
    distributor shared an instance, then it is known as a *local distributor* .


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig3_HTML.png](images/333037_2_En_16_Chapter/333037_2_En_16_Fig3_HTML.png)


    Figure 16-3


    Replication component overview


    ### Types of Replication


    SQL Server offers three broad types of replication: snapshot, transactional, and
    merge. These replication technologies are introduced in the following sections.


    #### Snapshot


    Snapshot replication works by taking a complete copy of all articles at the point
    when synchronizations occur; therefore, it does not need to track data changes
    between synchronizations. If you have defined a filter on the article, then only
    the filtered data is copied. This means that snapshot replication has no overhead,
    except when synchronization is occurring. When synchronization does occur, however,
    the resource overhead can be very high if there is a large amount of data to replicate.


    The Snapshot Agent creates a system view and system stored procedure for each
    article in the publication. It uses these objects to generate the contents of
    the articles. It also creates schema files, which it applies to the subscription
    database before it uses BCP (Bulk Copy Program) to bulk copy the data.


    Because of the resource utilization profile, snapshot replication is most suited
    to situations in which the dataset being replicated is small and changes infrequently,
    or in cases in which many changes happen in a short time period. (An example of
    this may include a price list, which is updated monthly.) Additionally, snapshot
    replication is the default mechanism you use to perform the initial synchronization
    for transactional and merge replication.


    When you are using snapshot replication, the Snapshot Agent runs on the publisher
    to generate the publication. The Distribution Agent (which runs either on the
    distributor or on each subscriber) then applies the publication to the subscribers.
    Snapshot replication always works in a single direction only, meaning that the
    subscribers can never update the publisher.'
