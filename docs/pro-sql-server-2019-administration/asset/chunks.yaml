    ## 日志传送维护


    配置日志传送后，你仍然有持续的维护任务需要执行，例如在需要时故障转移到辅助服务器，以及切换主服务器和辅助服务器角色。以下部分将讨论这些主题。我们还将讨论如何使用监视服务器来监视日志传送环境。


    ### 故障转移日志传送


    如果你的主服务器出现问题，或者你的主站点发生故障，你需要故障转移到辅助服务器。为此，首先要备份日志的末尾部分。我们将在第 [15](#333037_2_En_15_Chapter.xhtml)
    章中完整讨论此过程，但该过程本质上涉及备份事务日志而不截断它，并使用 `NORECOVERY`。这会阻止用户连接到数据库，从而避免任何进一步的数据丢失。显然，这仅在主数据库可访问时才可能。你可以使用列表
    [15-7](#333037_2_En_15_Chapter.xhtml#PC7) 中的脚本对 `Chapter15` 数据库执行此操作。


    ```

    BACKUP LOG Chapter15

    TO  DISK = N''c:\logshippingprimary\Chapter15_tail.trn''

    WITH  NO_TRUNCATE, NAME = N''Chapter15-Full Database Backup'', NORECOVERY

    GO

    Listing 15-7

    备份日志的末尾部分

    ```


    下一步是手动复制日志的末尾部分以及任何其他尚未复制到辅助服务器的日志。完成后，你需要按顺序手动将未完成的事务日志备份还原到辅助服务器。你需要应用备份时使用
    `NORECOVERY`，直到达到最后一个备份。这个最后的备份使用 `RECOVERY` 应用。这会导致任何未提交的事务被回滚，并且数据库上线。列表 [15-8](#333037_2_En_15_Chapter.xhtml#PC8)
    演示了将最后两个事务日志应用到辅助数据库。


    ```

    --Restore the first transaction log

    RESTORE LOG Chapter15

    FROM  DISK = N''C:\LogShippingDR\Chapter15.trn''

    WITH  FILE = 1,  NORECOVERY,  STATS = 10 ;

    GO

    --Restore the tail end of the log

    RESTORE LOG Chapter15

    FROM  DISK = N''C:\LogShippingDR\Chapter15_tail.trn''

    WITH  FILE = 1,  RECOVERY, STATS = 10 ;

    GO

    Listing 15-8

    应用事务日志

    ```


    ### 切换角色


    将日志传送故障转移到辅助服务器后，你可能希望交换服务器角色，以便你故障转移到的辅助服务器成为新的主服务器，而原始主服务器变为辅助服务器。为了实现这一点，首先你需要禁用主服务器上的备份作业以及辅助服务器上的复制和还原作业。我们可以使用列表
    [15-9](#333037_2_En_15_Chapter.xhtml#PC9) 中的脚本为我们的日志传送拓扑执行此任务。因为我们连接到多个服务器，我们需要在
    SQLCMD 模式下运行此脚本。


    ```

    :connect primaryserver\prosqladmin

    USE [msdb]

    GO

    --Disable backup job

    EXEC msdb.dbo.sp_update_job @job_name = ''LSBackup_Chapter15'',

    @enabled=0 ;

    GO

    :connect drserver\prosqldr

    USE [msdb]

    GO

    --Diable copy job

    EXEC msdb.dbo.sp_update_job @job_name=''LSCopy_primaryserver\prosqladmin_Chapter15'',

    @enabled=0 ;

    GO

    --Disable restore job

    EXEC msdb.dbo.sp_update_job @job_name=''LSRestore_primaryserver\prosqladmin_Chapter15'',

    @enabled=0 ;

    GO

    Listing 15-9

    禁用日志传送作业

    ```


    下一步是在新的主服务器上重新配置日志传送。执行此操作时，请配置以下内容：


    *   确保你使用与原始主服务器相同的备份共享。

    *   确保添加辅助数据库时，指定最初是主数据库的数据库。

    *   指定同步选项为“否，辅助数据库已初始化”。


    列表 [15-10](#333037_2_En_15_Chapter.xhtml#PC10) 中的脚本为我们的新辅助服务器执行此操作。由于我们连接到多个服务器，我们应该在
    SQLCMD 模式下运行脚本。'
