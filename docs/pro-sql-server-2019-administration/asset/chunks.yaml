    ### Synchronizing the Target


    Because we replay a trace that includes DML statements, we need to synchronize
    our target database immediately before we start capturing the trace to ensure
    that the IDs align. We perform this task by backing up the `Chapter21` database
    on the controller and restoring it on the target. We can achieve this by using
    the script in Listing [21-6](#333037_2_En_21_Chapter.xhtml#PC6).'
  trans: '### 配置重播


    重播是通过管理工具启动的，该工具依赖于两个配置文件：`DReplay.exe.preprocess.config` 和 `DReplay.exe.replay.config`。第一个配置文件控制中间文件的构建，第二个控制重播选项和输出选项。两个文件都位于
    32 位共享目录中，因此在默认安装下，完整限定路径分别是 `C:\Program Files (x86)\Microsoft SQL Server\150\Tools\Binn\DReplay.exe.preprocess.config`
    和 `C:\Program Files (x86)\Microsoft SQL Server\150\Tools\Binn\DReplay.exe.replay.config`。表
    21-2 详细说明了可以在 `DReplay.exe.preprocess.config` 中配置的选项。


    **表 21-2 DReplay.exe.preprocess.config 选项**


    | 选项 | 描述 |

    | --- | --- |

    | `IncSystemSession` | 指定是否应将从系统会话捕获的活动包含在重播中。 |

    | `MaxIdleTime` | 指定空闲时间的上限（以秒为单位）。 • `-1` 指定活动之间的空闲时间应与原始跟踪相同。 • `0` 指定活动之间不应有空闲时间。
    |


    `DReplay.exe.preprocess.config` 文件的默认内容如清单 21-3 所示。


    ```

    No


    清单 21-3

    DReplay.exe.preprocess.config

    ```


    表 21-3 详细说明了可以在 `DReplay.exe.replay.config` 中配置的选项。


    **表 21-3 DReplay.exe.replay.config 选项**


    | 选项 | 类别 | 描述 |

    | --- | --- | --- |

    | `Server` | 重播选项 | 目标服务器的服务器\实例名称。 |

    | `SequencingMode` | 重播选项 | 指定用于调度事件的模式。可能的选项包括： • `Synchronization`，表示事务顺序受基于时间的跨客户端同步约束，这对于性能测试很有用。
    • `Stress`（默认选项）表示事务尽快触发，无需基于时间的同步。这对于负载测试很有用。 |

    | `StressScaleGranularity` | 重播选项 | 当 `SequenceMode` 设置为 `Stress` 时，`StressScaleGranularity`
    确定如何在 SPID 上扩展活动。 • `SPID` 表示单个 SPID 上的连接应作为单个 SPID 进行扩展。 • `Connection` 表示单个
    SPID 上的连接应作为单独的连接进行扩展。 |

    | `ConnectTimeScale` | 重播选项 | 一个百分比值，指示当 `SequenceMode` 为 `Stress` 时，重播期间是否应减少连接时间。`100`
    表示包含 100% 的连接时间。较低的值会相应减少模拟的连接时间。 |

    | `ThinkTimeScale` | 重播选项 | 一个百分比值，指示当 `SequenceMode` 为 `Stress` 时，重播期间是否应减少用户思考时间。`100`
    表示包含 100% 的思考时间，因此事务以捕获时的速度重播。指定较低的值会减少间隔。 |

    | `UseConnectionPooling` | 重播选项 | 指定客户端上是否应使用连接池。*连接池* 是后续连接可以重用的连接缓存。 |

    | `HealthmonInterval` | 重播选项 | 当 `SequenceMode` 设置为 `Synchronization` 时，`HealthmonInterval`
    确定运行运行状况监视器的频率，以秒为单位。`-1` 表示禁用运行状况监视器。 |

    | `QueryTimeout` | 重播选项 | 以秒为单位指定查询超时值。`-1` 表示禁用。 |

    | `ThreadsPerClient` | 重播选项 | 指定每个客户端用于重播的线程数。 |

    | `RecordRowCount` | 输出选项 | 指定是否应包含每个结果集的行数。 |

    | `RecordResultSet` | 输出选项 | 指定是否应保存每个记录集的内容。 |


    清单 21-4 展示了 `DReplay.exe.replay.config` 文件的示例，该示例已根据我们的环境进行了修改，以允许我们通过模拟多个连接来执行性能测试。


    ```

