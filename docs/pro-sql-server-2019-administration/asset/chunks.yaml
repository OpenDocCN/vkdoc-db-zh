    ## 用于故障排除和性能调优的元数据


    你可以使用许多元数据对象来调优 SQL Server 的性能和排除故障。在接下来的章节中，我们将探讨如何从 SQL Server 内部捕获性能计数器，如何分析等待，以及如何使用
    DMV 来排除昂贵查询的问题。

    '
- fmt: '### Retrieving Perfmon Counters


    Perfmon is a Windows tool that captures performance counters for the operating
    system, plus many SQL Server–specific counters. DBAs who are trying to diagnose
    performance issues find this very useful. The problem is that many DBAs do not
    have administrative access to the underlying operating system, which makes them
    reliant on Windows administrators to assist with the troubleshooting process.
    A workaround for this issue is the `sys.dm_os_performance_counters` DMV, which
    exposes the SQL Server Perfmon counters within SQL Server. The columns returned
    by `sys.dm_os_performance_counters` are described in Table [17-7](#333037_2_En_17_Chapter.xhtml#Tab7).


    Table 17-7

    `sys.dm_os_performance_counters` Columns


    | Column | Description |

    | --- | --- |

    | `object_name` | The category of the counter. |

    | `counter_name` | The name of the counter. |

    | `instance_name` | The instance of the counter. For example, database-related
    counters have an instance for each database. |

    | `cntr_value` | The value of the counter. |

    | `cntr_type` | The type of counter. Counter types are described in Table [17-8](#333037_2_En_17_Chapter.xhtml#Tab8).
    |


    The `sys.dm_os_performance_counters` DMV exposes different types of counters that
    can be identified by the `cntr_type` column, which relates to the underlying WMI
    performance counter type. You need to handle different counter types in different
    ways. The counter types exposed are described in Table [17-8](#333037_2_En_17_Chapter.xhtml#Tab8).


    Table 17-8

    Counter Types


    | Counter Type | Description |

    | --- | --- |

    | `1073939712` | You will use `PERF_LARGE_RAW_BASE` as a base value in conjunction
    with the `PERF_LARGE_RAW_FRACTION` type to calculate a counter percentage or with
    `PERF_AVERAGE_BULK` to calculate an average. |

    | `537003264` | Use `PERF_LARGE_RAW_FRACTION` as a fractional value in conjunction
    with `PERF_LARGE_RAW_BASE` to calculate a counter percentage. |

    | `1073874176` | `PERF_AVERAGE_BULK` is a cumulative average that you use in conjunction
    with `PERF_LARGE_RAW_BASE` to calculate a counter average. The counter, along
    with the base, is sampled twice to calculate the metric over a period of time.
    |

    | `272696320` | `PERF_COUNTER_COUNTER` is a 32-bit cumulative rate counter. The
    value should be sampled twice to calculate the metric over a period of time. |

    | `272696576` | `PERF_COUNTER_BULK_COUNT` is a 64-bit cumulative rate counter.
    The value should be sampled twice to calculate the metric over a period of time.
    |

    | `65792` | `PERF_COUNTER_LARGE_RAWCOUNT` returns the last sampled result for
    the counter. |


    The query in Listing [17-12](#333037_2_En_17_Chapter.xhtml#PC12) demonstrates
    how to use `sys.dm_os_performance_counters` to capture metrics of the `PERF_COUNTER_LARGE_RAWCOUNT`
    type, which is the simplest form of counter to capture. The query returns the
    number of memory grants that are currently pending.


    ```

    SELECT *

    FROM sys.dm_os_performance_counters

    WHERE counter_name = ''Memory Grants Pending'' ;

    Listing 17-12

    Using Counter Type 65792

    ```


    The script in Listing [17-13](#333037_2_En_17_Chapter.xhtml#PC13) demonstrates
    capturing the number of lock requests that are occurring per second over the space
    of one minute. The lock requests/sec counter uses the `PERF_COUNTER_BULK_COUNT`
    counter type, but the same method applies to capturing counters relating to In-Memory
    OLTP, which uses the `PERF_COUNTER_COUNTER` counter type.


    ```

    DECLARE @cntr_value1 BIGINT = (

    SELECT cntr_value

    FROM sys.dm_os_performance_counters

    WHERE counter_name = ''Lock Requests/sec''

    AND instance_name = ''_Total'') ;

    WAITFOR DELAY ''00:01:00''

    DECLARE @cntr_value2 BIGINT = (

    SELECT cntr_value

    FROM sys.dm_os_performance_counters

    WHERE counter_name = ''Lock Requests/sec''

    AND instance_name = ''_Total'') ;

    SELECT (@cntr_value2 - @cntr_value1) / 60 ''Lock Requests/sec'' ;

    Listing 17-13

    Using Counter Types 272696576 and 272696320

    ```


    The script in Listing [17-14](#333037_2_En_17_Chapter.xhtml#PC14) demonstrates
    capturing the plan cache hit ratio for the instance. The Plan Cache Hit Ratio
    counter is counter type 537003264. Therefore, we need to multiply the value by
    100 and then divide by the base counter to calculate the percentage. Before running
    the script, you should change the instance name to match your own.


    ```

    SELECT

    100 *

    (

    SELECT cntr_value

    FROM sys.dm_os_performance_counters

    WHERE object_name = ''MSSQL$PROSQLADMIN:Plan Cache''

    AND counter_name = ''Cache hit ratio''

    AND instance_name = ''_Total'')

    /

    (

    SELECT cntr_value

    FROM sys.dm_os_performance_counters

    WHERE object_name = ''MSSQL$PROSQLADMIN:Plan Cache''

    AND counter_name = ''Cache hit ratio base''

    AND instance_name = ''_Total'') [Plan cache hit ratio %] ;

    Listing 17-14

    Using Counter Type 537003264

    ```


    The script in Listing [17-15](#333037_2_En_17_Chapter.xhtml#PC15) demonstrates
    how to capture the Average Latch Wait Time (ms) counter. Because this counter
    is of type `PERF_AVERAGE_BULK`, we need to capture the value and its corresponding
    base counter twice. We then need to deduct the first capture of the counter from
    the second capture, deduct the first capture of the base counter from the second
    capture, and then divide the fractional counter value by its base value to calculate
    the average over the time period. Because it is possible that no latches will
    be requested within the time period, we have wrapped the `SELECT` statement in
    an `IF/ELSE` block to avoid the possibility of a divide-by-0 error being thrown.


    ```

    DECLARE @cntr TABLE

    (

    ID        INT        IDENTITY,

    counter_name NVARCHAR(256),

    counter_value BIGINT,

    [Time] DATETIME

    ) ;

    INSERT INTO @cntr

    SELECT

    counter_name

    ,cntr_value

    ,GETDATE()

    FROM sys.dm_os_performance_counters

    WHERE counter_name IN(''Average Latch Wait Time (ms)'',

    ''Average Latch Wait Time base'') ;

    --Adds an artificial delay

    WAITFOR DELAY ''00:01:00'' ;

    INSERT INTO @cntr

    SELECT

    counter_name

    ,cntr_value

    ,GETDATE()

    FROM sys.dm_os_performance_counters

    WHERE counter_name IN(''Average Latch Wait Time (ms)'',

    ''Average Latch Wait Time base'') ;

    IF (SELECT COUNT(DISTINCT counter_value)

    FROM @cntr

    WHERE counter_name = ''Average Latch Wait Time (ms)'') > 2

    BEGIN

    SELECT

    (

    (

    SELECT TOP 1 counter_value

    FROM @cntr

    WHERE counter_name = ''Average Latch Wait Time (ms)''

    ORDER BY [Time] DESC

    )

    -

    (

    SELECT TOP 1 counter_value

    FROM @cntr

    WHERE counter_name = ''Average Latch Wait Time (ms)''

    ORDER BY [Time] ASC

    )

    )

    /

    (

    (

    SELECT TOP 1 counter_value

    FROM @cntr

    WHERE counter_name = ''Average Latch Wait Time base''

    ORDER BY [Time] DESC

    )

    -

    (

    SELECT TOP 1 counter_value

    FROM @cntr

    WHERE counter_name = ''Average Latch Wait Time base''

    ORDER BY [Time] ASC

    )

    ) [Average Latch Wait Time (ms)] ;

    END

    ELSE

    BEGIN

    SELECT 0 [Average Latch Wait Time (ms)] ;

    END

    Listing 17-15

    Using Counter Type 1073874176

    ```


    ### Analyzing Waits


    Waits are a natural aspect of any RDBMS, but they can also indicate a performance
    bottleneck. A full explanation of all wait types can be found at `https://msdn.microsoft.com`,
    but all wait types break down into three categories: resource waits, queue waits,
    and external waits.'
  raw: '### Retrieving Perfmon Counters


    Perfmon is a Windows tool that captures performance counters for the operating
    system, plus many SQL Server–specific counters. DBAs who are trying to diagnose
    performance issues find this very useful. The problem is that many DBAs do not
    have administrative access to the underlying operating system, which makes them
    reliant on Windows administrators to assist with the troubleshooting process.
    A workaround for this issue is the `sys_dm_os_performance_counters` DMV, which
    exposes the SQL Server Perfmon counters within SQL Server. The columns returned
    by `sys.dm_os_performance_counters` are described in Table [17-7](#333037_2_En_17_Chapter.xhtml#Tab7).


    Table 17-7


    sys.dm_os_performance_counters Columns


    | Column | Description |

    | --- | --- |

    | `object_name` | The category of the counter. |

    | `counter_name` | The name of the counter. |

    | `instance_name` | The instance of the counter. For example, database-related
    counters have an instance for each database. |

    | `cntr_value` | The value of the counter. |

    | `cntr_type` | The type of counter. Counter types are described in Table [17-8](#333037_2_En_17_Chapter.xhtml#Tab8).
    |


    The sys`.dm_os_performance_counters` DMV exposes different types of counters that
    can be identified by the `cntr_type` column, which relates to the underlying WMI
    performance counter type. You need to handle different counter types in different
    ways. The counter types exposed are described in Table [17-8](#333037_2_En_17_Chapter.xhtml#Tab8).


    Table 17-8


    Counter Types


    | Counter Type | Description |

    | --- | --- |

    | `1073939712` | You will use `PERF_LARGE_RAW_BASE` as a base value in conjunction
    with the `PERF_LARGE_RAW_FRACTION` type to calculate a counter percentage or with
    `PERF_AVERAGE_BULK` to calculate an average. |

    | `537003264` | Use `PERF_LARGE_RAW_FRACTION` as a fractional value in conjunction
    with `PERF_LARGE_RAW_BASE` to calculate a counter percentage. |

    | `1073874176` | `PERF_AVERAGE_BULK` is a cumulative average that you use in conjunction
    with `PERF_LARGE_RAW_BASE` to calculate a counter average. The counter, along
    with the base, is sampled twice to calculate the metric over a period of time.
    |

    | `272696320` | `PERF_COUNTER_COUNTER` is a 32-bit cumulative rate counter. The
    value should be sampled twice to calculate the metric over a period of time. |

    | `272696576` | `PERF_COUNTER_BULK_COUNT` is a 64-bit cumulative rate counter.
    The value should be sampled twice to calculate the metric over a period of time.
    |

    | `65792` | `PERF_COUNTER_LARGE_RAWCOUNT` returns the last sampled result for
    the counter. |


    The query in Listing [17-12](#333037_2_En_17_Chapter.xhtml#PC12) demonstrates
    how to use `sys.dm_os_performance_counters` to capture metrics of the `PERF_COUNTER_LARGE_RAWCOUNT`
    type, which is the simplest form of counter to capture. The query returns the
    number of memory grants that are currently pending.


    ```

    SELECT *

    FROM sys.dm_os_performance_counters

    WHERE counter_name = ''Memory Grants Pending'' ;

    Listing 17-12

    Using Counter Type 65792

    ```


    The script in Listing [17-13](#333037_2_En_17_Chapter.xhtml#PC13) demonstrates
    capturing the number of lock requests that are occurring per second over the space
    of one minute. The lock requests/sec counter uses the `PERF_COUNTER_BULK_COUNT`
    counter type, but the same method applies to capturing counters relating to In-Memory
    OLTP, which uses the `PERF_COUNTER_COUNTER` counter type.


    ```

    DECLARE @cntr_value1 BIGINT = (

    SELECT cntr_value

    FROM sys.dm_os_performance_counters

    WHERE counter_name = ''Lock Requests/sec''

    AND instance_name = ''_Total'') ;

    WAITFOR DELAY ''00:01:00''

    DECLARE @cntr_value2 BIGINT = (

    SELECT cntr_value

    FROM sys.dm_os_performance_counters

    WHERE counter_name = ''Lock Requests/sec''

    AND instance_name = ''_Total'') ;

    SELECT (@cntr_value2 - @cntr_value1) / 60 ''Lock Requests/sec'' ;

    Listing 17-13

    Using Counter Types 272696576 and 272696320

    ```


    The script in Listing [17-14](#333037_2_En_17_Chapter.xhtml#PC14) demonstrates
    capturing the plan cache hit ratio for the instance. The Plan Cache Hit Ratio
    counter is counter type 537003264\. Therefore, we need to multiply the value by
    100 and then divide by the base counter to calculate the percentage. Before running
    the script, you should change the instance name to match your own.


    ```

    SELECT

    100 *

    (

    SELECT cntr_value

    FROM sys.dm_os_performance_counters

    WHERE object_name = ''MSSQL$PROSQLADMIN:Plan Cache''

    AND counter_name = ''Cache hit ratio''

    AND instance_name = ''_Total'')

    /

    (

    SELECT cntr_value

    FROM sys.dm_os_performance_counters

    WHERE object_name = ''MSSQL$PROSQLADMIN:Plan Cache''

    AND counter_name = ''Cache hit ratio base''

    AND instance_name = ''_Total'') [Plan cache hit ratio %] ;

    Listing 17-14

    Using Counter Type 537003264

    ```


    The script in Listing [17-15](#333037_2_En_17_Chapter.xhtml#PC15) demonstrates
    how to capture the Average Latch Wait Time (ms) counter. Because this counter
    is of type `PERF_AVERAGE_BULK`, we need to capture the value and its corresponding
    base counter twice. We then need to deduct the first capture of the counter from
    the second capture, deduct the first capture of the base counter from the second
    capture, and then divide the fractional counter value by its base value to calculate
    the average over the time period. Because it is possible that no latches will
    be requested within the time period, we have wrapped the `SELECT` statement in
    an `IF/ELSE` block to avoid the possibility of a divide-by-0 error being thrown.


    ```

    DECLARE @cntr TABLE

    (

    ID        INT        IDENTITY,

    counter_name NVARCHAR(256),

    counter_value BIGINT,

    [Time] DATETIME

    ) ;

    INSERT INTO @cntr

    SELECT

    counter_name

    ,cntr_value

    ,GETDATE()

    FROM sys.dm_os_performance_counters

    WHERE counter_name IN(''Average Latch Wait Time (ms)'',

    ''Average Latch Wait Time base'') ;

    --Adds an artificial delay

    WAITFOR DELAY ''00:01:00'' ;

    INSERT INTO @cntr

    SELECT

    counter_name

    ,cntr_value

    ,GETDATE()

    FROM sys.dm_os_performance_counters

    WHERE counter_name IN(''Average Latch Wait Time (ms)'',

    ''Average Latch Wait Time base'') ;

    IF (SELECT COUNT(DISTINCT counter_value)

    FROM @cntr

    WHERE counter_name = ''Average Latch Wait Time (ms)'') > 2

    BEGIN

    SELECT

    (

    (

    SELECT TOP 1 counter_value

    FROM @cntr

    WHERE counter_name = ''Average Latch Wait Time (ms)''

    ORDER BY [Time] DESC

    )

    -

    (

    SELECT TOP 1 counter_value

    FROM @cntr

    WHERE counter_name = ''Average Latch Wait Time (ms)''

    ORDER BY [Time] ASC

    )

    )

    /

    (

    (

    SELECT TOP 1 counter_value

    FROM @cntr

    WHERE counter_name = ''Average Latch Wait Time base''

    ORDER BY [Time] DESC

    )

    -

    (

    SELECT TOP 1 counter_value

    FROM @cntr

    WHERE counter_name = ''Average Latch Wait Time base''

    ORDER BY [Time] ASC

    )

    ) [Average Latch Wait Time (ms)] ;

    END

    ELSE

    BEGIN

    SELECT 0 [Average Latch Wait Time (ms)] ;

    END

    Listing 17-15

    Using Counter Type 1073874176

    ```


    ### Analyzing Waits


    Waits are a natural aspect of any RDBMS, but they can also indicate a performance
    bottleneck. A full explanation of all wait types can be found at [`https://msdn.microsoft.com`](https://msdn.microsoft.com)
    , but all wait types break down into three categories: resource waits, queue waits,
    and external waits.'
  trans: '### 检索性能监视器计数器


    Perfmon 是一个 Windows 工具，用于捕获操作系统以及许多 SQL Server 特定的性能计数器。试图诊断性能问题的 DBA 会发现它非常有用。问题在于，许多
    DBA 没有对底层操作系统的管理访问权限，这使得他们在故障排除过程中必须依赖 Windows 管理员。解决此问题的一个变通方法是使用 `sys.dm_os_performance_counters`
    这个 DMV，它可以在 SQL Server 内部公开 SQL Server 的性能监视器计数器。`sys.dm_os_performance_counters`
    返回的列在表 17-7 中描述。


    表 17-7

    `sys.dm_os_performance_counters` 的列


    | 列名 | 描述 |

    | --- | --- |

    | `object_name` | 计数器的类别。 |

    | `counter_name` | 计数器的名称。 |

    | `instance_name` | 计数器的实例。例如，与数据库相关的计数器为每个数据库有一个实例。 |

    | `cntr_value` | 计数器的值。 |

    | `cntr_type` | 计数器的类型。计数器类型在表 17-8 中描述。 |


    `sys.dm_os_performance_counters` DMV 公开了不同类型的计数器，可以通过 `cntr_type` 列来识别，该列与底层 WMI
    性能计数器类型相关。您需要以不同的方式处理不同的计数器类型。公开的计数器类型在表 17-8 中描述。


    表 17-8

    计数器类型


    | 计数器类型 | 描述 |

    | --- | --- |

    | `1073939712` | 您将 `PERF_LARGE_RAW_BASE` 作为基础值，与 `PERF_LARGE_RAW_FRACTION` 类型结合使用来计算计数器百分比，或与
    `PERF_AVERAGE_BULK` 结合使用来计算平均值。 |

    | `537003264` | 使用 `PERF_LARGE_RAW_FRACTION` 作为分数值，与 `PERF_LARGE_RAW_BASE` 结合使用来计算计数器百分比。
    |

    | `1073874176` | `PERF_AVERAGE_BULK` 是一个累积平均值，您将其与 `PERF_LARGE_RAW_BASE` 结合使用来计算计数器平均值。该计数器及其基础值需在时间段内采样两次以计算度量值。
    |

    | `272696320` | `PERF_COUNTER_COUNTER` 是一个 32 位累积速率计数器。该值应采样两次以计算时间段内的度量值。 |

    | `272696576` | `PERF_COUNTER_BULK_COUNT` 是一个 64 位累积速率计数器。该值应采样两次以计算时间段内的度量值。
    |

    | `65792` | `PERF_COUNTER_LARGE_RAWCOUNT` 返回计数器的最后一个采样结果。 |


    清单 17-12 中的查询演示了如何使用 `sys.dm_os_performance_counters` 来捕获 `PERF_COUNTER_LARGE_RAWCOUNT`
    类型的度量值，这是最简单的计数器捕获形式。该查询返回当前正在等待的内存授予数量。


    ```

    SELECT *

    FROM sys.dm_os_performance_counters

    WHERE counter_name = ''Memory Grants Pending'' ;

    清单 17-12

    使用计数器类型 65792

    ```


    清单 17-13 中的脚本演示了如何在一分钟内捕获每秒发生的锁请求次数。锁请求/秒计数器使用 `PERF_COUNTER_BULK_COUNT` 计数器类型，但相同的方法也适用于捕获与内存中
    OLTP 相关的计数器，后者使用 `PERF_COUNTER_COUNTER` 计数器类型。


    ```

    DECLARE @cntr_value1 BIGINT = (

    SELECT cntr_value

    FROM sys.dm_os_performance_counters

    WHERE counter_name = ''Lock Requests/sec''

    AND instance_name = ''_Total'') ;

    WAITFOR DELAY ''00:01:00''

    DECLARE @cntr_value2 BIGINT = (

    SELECT cntr_value

    FROM sys.dm_os_performance_counters

    WHERE counter_name = ''Lock Requests/sec''

    AND instance_name = ''_Total'') ;

    SELECT (@cntr_value2 - @cntr_value1) / 60 ''Lock Requests/sec'' ;

    清单 17-13

    使用计数器类型 272696576 和 272696320

    ```


    清单 17-14 中的脚本演示了如何捕获实例的计划缓存命中率。计划缓存命中率计数器是计数器类型 537003264。因此，我们需要将该值乘以 100，然后除以基础计数器来计算百分比。在运行脚本之前，您应该将实例名称更改为您自己的实例名称。


    ```

    SELECT

    100 *

    (

    SELECT cntr_value

    FROM sys.dm_os_performance_counters

    WHERE object_name = ''MSSQL$PROSQLADMIN:Plan Cache''

    AND counter_name = ''Cache hit ratio''

    AND instance_name = ''_Total'')

    /

    (

    SELECT cntr_value

    FROM sys.dm_os_performance_counters

    WHERE object_name = ''MSSQL$PROSQLADMIN:Plan Cache''

    AND counter_name = ''Cache hit ratio base''

    AND instance_name = ''_Total'') [Plan cache hit ratio %] ;

    清单 17-14

    使用计数器类型 537003264

    ```


    清单 17-15 中的脚本演示了如何捕获平均闩锁等待时间（毫秒）计数器。由于此计数器是 `PERF_AVERAGE_BULK` 类型，我们需要捕获其值及其对应的基础计数器两次。然后，我们需要用该计数器的第二次捕获值减去第一次捕获值，用基础计数器的第二次捕获值减去第一次捕获值，然后将分数计数器值除以其基础值以计算时间段内的平均值。由于在时间段内可能没有请求任何闩锁，我们将
    `SELECT` 语句包装在 `IF/ELSE` 块中，以避免可能出现除以零错误的情况。


    ```

    DECLARE @cntr TABLE

    (

    ID        INT        IDENTITY,

    counter_name NVARCHAR(256),

    counter_value BIGINT,

    [Time] DATETIME

    ) ;

    INSERT INTO @cntr

    SELECT

    counter_name

    ,cntr_value

    ,GETDATE()

    FROM sys.dm_os_performance_counters

    WHERE counter_name IN(''Average Latch Wait Time (ms)'',

    ''Average Latch Wait Time base'') ;

    --添加一个人为延迟

    WAITFOR DELAY ''00:01:00'' ;

    INSERT INTO @cntr

    SELECT

    counter_name

    ,cntr_value

    ,GETDATE()

    FROM sys.dm_os_performance_counters

    WHERE counter_name IN(''Average Latch Wait Time (ms)'',

    ''Average Latch Wait Time base'') ;

    IF (SELECT COUNT(DISTINCT counter_value)

    FROM @cntr

    WHERE counter_name = ''Average Latch Wait Time (ms)'') > 2

    BEGIN

    SELECT

    (

    (

    SELECT TOP 1 counter_value

    FROM @cntr

    WHERE counter_name = ''Average Latch Wait Time (ms)''

    ORDER BY [Time] DESC

    )

    -

    (

    SELECT TOP 1 counter_value

    FROM @cntr

    WHERE counter_name = ''Average Latch Wait Time (ms)''

    ORDER BY [Time] ASC

    )

    )

    /

    (

    (

    SELECT TOP 1 counter_value

    FROM @cntr

    WHERE counter_name = ''Average Latch Wait Time base''

    ORDER BY [Time] DESC

    )

    -

    (

    SELECT TOP 1 counter_value

    FROM @cntr

    WHERE counter_name = ''Average Latch Wait Time base''

    ORDER BY [Time] ASC

    )

    ) [Average Latch Wait Time (ms)] ;

    END

    ELSE

    BEGIN

    SELECT 0 [Average Latch Wait Time (ms)] ;

    END

    清单 17-15

    使用计数器类型 1073874176

    ```


    ### 分析等待


    等待是任何 RDBMS 的一个自然方面，但它们也可能表明存在性能瓶颈。所有等待类型的完整解释可以在 `https://msdn.microsoft.com`
    找到，但所有等待类型可分为三类：资源等待、队列等待和外部等待。'
- fmt: '### Note


    A query in SQL Server is either running, waiting for its turn on the processor
    (runnable), or waiting for another resource (suspended). If it is waiting for
    another resource, SQL Server records the reason why it is waiting and the duration
    of this wait.


    `Resource` waits occur when a thread requires access to an object, but that object
    is already in use, and therefore, the thread has to wait. This can include the
    thread waiting to take a lock out on an object or waiting for a disk resource
    to respond. `Queue` waits occur when a thread is idle and is waiting for a task
    to be assigned. This does not necessarily indicate a performance bottleneck, since
    it is often a background task, such as the Deadlock Monitor or Lazy Writer waiting
    until it is needed. `External` waits occur when a thread is waiting for an external
    resource, such as a linked server. The hidden gotcha here is that an external
    wait does not always mean that the thread is actually waiting. It could be performing
    an operation external to SQL Server, such as an extended stored procedure running
    external code.


    Any task that has been issued is in one of three states: running, runnable, or
    suspended. If a task is in the running state, then it is actually being executed
    on a processor. When a task is in the runnable state, it sits on the processor
    queue, awaiting its turn to run. This is known as a `signal wait`. When a task
    is suspended, it means that the task is waiting for any reason other than a signal
    wait. In other words, it is experiencing a resource wait, a queue wait, or an
    external wait. Each query is likely to alternate between the three states as it
    progresses.


    The `sys.dm_os_wait_stats` returns details of the cumulative waits for each wait
    type, since the instance started or since the statistics exposed by the DMV were
    reset. You can reset the statistics by running the command in Listing 17-16. This
    is important, as it gives a holistic view, as to the source of bottlenecks.


    ```

    DBCC SQLPERF (''sys.dm_os_wait_stats'', CLEAR) ;

    ```

    Listing 17-16

    Resetting Wait Stats


    The columns returned by `sys.dm_os_wait_stats` are detailed in Table 17-9.


    Table 17-9

    `sys.dm_os_wait_stats` Columns


    | Column | Description |

    | --- | --- |

    | `wait_type` | The name of the wait type that has occurred. |

    | `waiting_tasks_count` | The number of tasks that have occurred on this wait
    type. |

    | `wait_time_ms` | The cumulative time of all waits against this wait type, displayed
    in milliseconds. This includes signal wait times. |

    | `max_wait_time_ms` | The maximum duration of a single wait against this wait
    type. |

    | `signal_wait_time_ms` | The cumulative time for all signal waits against this
    wait type. |


    To find the wait types that are responsible for the highest cumulative wait time,
    run the query in Listing 17-17. This query adds a calculated column to the result
    set, which deducts the signal wait time from the overall wait time to avoid CPU
    pressure from skewing the results.


    ```

    SELECT *

    , wait_time_ms - signal_wait_time_ms ResourceWaits

    FROM sys.dm_os_wait_stats

    ORDER BY wait_time_ms - signal_wait_time_ms DESC ;

    ```

    Listing 17-17

    Finding the Highest Waits


    Of course, signal wait time can be a cause for concern in its own right, potentially
    identifying the processor as a bottleneck, and you should analyze it. Therefore,
    use the query in Listing 17-18 to calculate the percentage of overall waits, which
    are due to a task waiting for its turn on the processor. The value is displayed
    for each wait type, and it is followed by a row that displays the overall percentage
    for all wait types.


    ```

    SELECT ISNULL(wait_type, ''Overall Percentage:'') wait_type

    ,PercentageSignalWait

    FROM (

    SELECT wait_type

    ,CAST(100\. * SUM(signal_wait_time_ms)

    / SUM(wait_time_ms) AS NUMERIC(20,2)) PercentageSignalWait

    FROM sys.dm_os_wait_stats

    WHERE wait_time_ms > 0

    GROUP BY wait_type WITH ROLLUP

    ) a

    ORDER BY PercentageSignalWait DESC ;

    ```

    Listing 17-18

    Calculating Signal Waits


    To find the highest waits over a defined period, you need to sample the data twice
    and then deduct the first sample from the second sample. The script in Listing
    17-19 samples the data twice with a 10-minute interval and then displays the details
    of the five highest waits within that interval.


    ```

    DECLARE @Waits1 TABLE

    (

    wait_type NVARCHAR(128),

    wait_time_ms BIGINT

    ) ;

    DECLARE @Waits2 TABLE

    (

    wait_type NVARCHAR(128),

    wait_time_ms BIGINT

    ) ;

    INSERT INTO @waits1

    SELECT wait_type

    ,wait_time_ms

    FROM sys.dm_os_wait_stats ;

    WAITFOR DELAY ''00:10:00'' ;

    INSERT INTO @Waits2

    SELECT wait_type

    ,wait_time_ms

    FROM sys.dm_os_wait_stats ;

    SELECT TOP 5

    w2.wait_type

    ,w2.wait_time_ms - w1.wait_time_ms

    FROM @Waits1 w1

    INNER JOIN @Waits2 w2

    ON w1.wait_type = w2.wait_type

    ORDER BY w2.wait_time_ms - w1.wait_time_ms DESC ;

    ```

