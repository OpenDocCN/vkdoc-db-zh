    ## 总结


    SQL Server 数据库可以在三种恢复模式下运行。`SIMPLE` 恢复模式会在 `CHECKPOINT` 操作发生后自动截断事务日志。这意味着无法进行日志备份，因此也不支持时间点还原。在
    `FULL` 恢复模式下，事务日志仅在执行日志备份操作后才会被截断。这意味着你必须同时进行事务日志备份以用于灾难恢复和日志空间管理。`BULK LOGGED`
    恢复模式仅在进行批量插入操作时使用。也就是说，如果你通常使用 `FULL` 恢复模式，则仅在执行此类操作时切换到此模式。


    SQL Server 支持三种备份类型。完整备份将所有数据库页复制到备份设备。差异备份将自上次完整备份以来所有已修改的数据库页复制到备份设备。事务日志备份则将事务日志的内容复制到备份设备。


    数据库管理员可以采用多种备份策略，以便在发生需要还原数据库的灾难时提供尽可能最佳的恢复时间目标（RTO）和恢复点目标（RPO）。这些策略包括：仅执行完整备份（适用于
    `SIMPLE` 恢复模式）；安排完整备份与事务日志备份一起进行；或者安排完整备份、差异备份和事务日志备份。如果频繁进行日志备份，安排差异备份有助于改善数据库的
    RTO。数据库管理员也可以选择实施文件组备份策略；这允许他们将备份分散到更易管理的时间窗口中，或执行部分备份（即仅备份读/写文件组）。


    可以通过 T-SQL 或 SQL Server Management Studio (SSMS) 进行临时备份。在生产环境中，你通常需要安排定期运行的备份，我们将在第
    22 章讨论如何自动化此操作。


    你也可以通过 SSMS 或 T-SQL 执行还原。但是，只有通过 T-SQL 才能执行复杂的还原场景，例如分段还原。SQL Server 还为你提供了还原单个页面或文件的能力。你可以将还原损坏页面作为联机操作进行，通常，对于小规模的损坏，这比还原整个数据库或使用带有
    `ALLOW_DATA_LOSS` 选项的 `DBCC CHECKDB` 提供了更好的替代方案。有关 `DBCC CHECKDB` 的更多详细信息，请参见第
    9 章。


    ### 提示


    许多其他还原场景超出了本书的范围，因为全面描述每种可能场景本身就值得单独成书。我鼓励你在沙盒环境中探索各种还原场景，以备将来实际使用之需！


    # 13. 高可用性与灾难恢复概念


    在当今运行关键业务应用程序的 7×24 小时环境中，企业严重依赖于其数据的可用性。尽管服务器及其软件通常是可靠的，但始终存在硬件故障或软件缺陷的风险，这两者都可能导致服务器宕机。为了减轻这些风险，关键业务应用程序通常依赖冗余硬件来提供容错能力。如果主系统发生故障，应用程序可以自动故障转移到冗余系统。这是高可用性（HA）的基本原理。


    即使实施了 HA 技术，仍然存在导致应用程序不可用的小概率事件风险。这可能是由于重大事件，例如自然灾害或恐怖行为导致数据中心的损毁。也可能是由于数据损坏或人为错误，导致应用程序数据丢失或损坏到无法修复的程度。


    在这些情况下，一些应用程序可能依赖于还原最新的备份以尽可能多地恢复数据。然而，更关键的应用程序可能需要一台冗余服务器在辅助位置保存数据的同步副本。这是灾难恢复（DR）的核心概念。本章首先讨论
    HA 和 DR 背后的概念，然后概述可用于实现这些概念的技术。


    ## 可用性概念


    为了分析应用程序的 HA 和 DR 需求并实施最合适的解决方案，你需要理解各种概念。我们将在以下章节中讨论这些概念。

