- fmt: '## Piecemeal Restores


    A piecemeal restore involves bringing the filegroups of a database online one
    by one. This can offer a big benefit for a large database, since you can make
    some data accessible, while other data is still being restored. In order to demonstrate
    this technique, we first take filegroup backups of all filegroups in the `Chapter12`
    database and follow this with a transaction log backup. The script in Listing
    12-18 performs this task. Before running the script, modify the locations of the
    backup devices to reflect your own configurations.


    ```

    BACKUP DATABASE Chapter12

    FILEGROUP = N''PRIMARY'',  FILEGROUP = N''FileGroupA'',  FILEGROUP = N''FileGroupB''

    TO  DISK = N''H:\MSSQL\Backup\Chapter12Piecemeal.bak''

    WITH FORMAT

    , NAME = N''Chapter12-Fiegroup Backup''

    , STATS = 10 ;

    BACKUP LOG Chapter12

    TO  DISK = N''H:\MSSQL\Backup\Chapter12Piecemeal.bak''

    WITH NOFORMAT, NOINIT

    ,  NAME = N''Chapter12-Full Database Backup''

    ,  STATS = 10 ;

    ```

    Listing 12-18 Filegroup Backup


    The script in Listing 12-19 now brings the filegroups online, one by one, starting
    with the primary filegroup, followed by `FileGroupA`, and finally, `FileGroupB`.
    Before beginning the restore, we back up the tail of the log. This backup is restored
    `WITH RECOVERY` after each filegroup is restored. This brings the restored databases
    back online. It is possible to restore further backups because we specify the
    `PARTIAL` option on the first restore operation.


    ```

    USE master

    GO

    BACKUP LOG Chapter12

    TO  DISK = N''H:\MSSQL\Backup\Chapter12_LogBackup_2012-02-17_27-29-46.bak''

    WITH NOFORMAT, NOINIT

    , NAME = N''Chapter12_LogBackup_2012-02-17_17-29-46''

    , NOSKIP

    , NORECOVERY

    , NO_TRUNCATE

    , STATS = 5 ;

    RESTORE DATABASE Chapter12

    FILEGROUP = N''PRIMARY''

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12Piecemeal.bak''

    WITH  FILE = 1

    , NORECOVERY

    , PARTIAL

    , STATS = 10 ;

    RESTORE LOG Chapter12

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12Piecemeal.bak''

    WITH  FILE = 2

    , NORECOVERY

    , STATS = 10 ;

    RESTORE LOG Chapter12

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12_LogBackup_2012-02-17_27-29-46.bak''

    WITH  FILE = 1

    , STATS = 10

    , RECOVERY ;

    -----------------The PRIMARY Filegroup is now online--------------------

    RESTORE DATABASE Chapter12

    FILEGROUP = N''FileGroupA''

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12Piecemeal.bak''

    WITH  FILE = 1

    , NORECOVERY

    , STATS = 10 ;

    RESTORE LOG Chapter12

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12Piecemeal.bak''

    WITH  FILE = 2

    , NORECOVERY

    , STATS = 10 ;

    RESTORE LOG Chapter12

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12_LogBackup_2012-02-17_27-29-46.bak''

    WITH  FILE = 1

    , STATS = 10

    , RECOVERY ;

    -----------------The FilegroupA Filegroup is now online--------------------

    RESTORE DATABASE Chapter12

    FILEGROUP = N''FileGroupB''

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12Piecemeal.bak''

    WITH  FILE = 1

    , NORECOVERY

    , STATS = 10 ;

    RESTORE LOG Chapter12

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12Piecemeal.bak''

    WITH  FILE = 2

    , NORECOVERY

    , STATS = 10 ;

    RESTORE LOG Chapter12

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12_LogBackup_2012-02-17_27-29-46.bak''

    WITH  FILE = 1

    , STATS = 10

    , RECOVERY ;

    -----------------The database is now fully online--------------------

    ```

