  trans: '

    ### DBCC CHECKIDENT


    `DBCC CHECKIDENT` 扫描指定表中的所有行，以查找 `IDENTITY` 列中的最大值。然后，它会检查确保存储在表元数据中的下一个 `IDENTITY`
    值高于表中 `IDENTITY` 列的最大值。`DBCC CHECKIDENT` 接受表 9-6 中详述的参数。


    表 9-6


    DBCC CHECKIDENT 参数


    | 参数 | 描述 |

    | --- | --- |

    | 表名 | 要检查的表的名称。 |

    | `NORESEED` | 返回 `IDENTITY` 列的最大值和当前的 `IDENTITY` 值，但即使需要，也不会重新设定该列的种子值。 |

    | `RESEED` | 将当前的 `IDENTITY` 值重新设定为表中 `IDENTITY` 的最大值。 |

    | 新重新设定值 | 与 `RESEED` 一起使用，为 `IDENTITY` 值指定一个种子值。应谨慎使用此参数，因为将 `IDENTITY` 值设置为低于表中的最大值，如果
    `IDENTITY` 列上有主键或唯一约束，可能会导致生成错误。 |

    | `WITH NO_INFOMSGS` | 抑制信息性消息的显示。 |


    我们可以通过使用代码清单 9-13 中的命令，来检查我们的 `CorruptTable` 表中的 `IDENTITY` 值与最大 `IDENTITY` 值是否一致。


    ```

    DBCC CHECKIDENT(''CorruptTable'',NORESEED) ;

    代码清单 9-13

    DBCC CHECKIDENT

    ```


    结果显示在图 9-15 中，其中 `IDENTITY` 列的最大值和当前的 `IDENTITY` 值都是 `10201`，这意味着目前我们表中的 `IDENTITY`
    值没有问题。


    ![../images/333037_2_En_9_Chapter/333037_2_En_9_Fig15_HTML.jpg](img/333037_2_En_9_Fig15_HTML.jpg)


    图 9-15


    DBCC CHECKIDENT 结果


    ### DBCC CHECKCONSTRAINTS


    `DBCC CHECKCONSTRAINTS` 可以检查表中特定的外键或检查约束的完整性，检查单个表上的所有约束，或者检查数据库中所有表上的所有约束。`DBCC
    CHECKCONSTRAINTS` 接受表 9-7 中详述的参数。


    表 9-7


    DBCC CHECKCONSTRAINTS 参数


    | 参数 | 描述 |

    | --- | --- |

    | 表或约束 | 指定您希望检查的约束的名称或 ID，或者指定表的名称或 ID 以检查该表上所有已启用的约束。省略此参数会导致检查数据库中所有表上所有已启用的约束。
    |

    | `ALL_CONSTRAINTS` | 如果 `DBCC CHECKCONSTRAINTS` 是针对整个表或整个数据库运行的，那么此选项将强制检查已禁用和已启用的约束。
    |

    | `ALL_ERRORMSGS` | 默认情况下，如果 `DBCC CHECKCONSTRAINTS` 发现违反约束的行，它将返回这些行中的前 200 行。指定
    `ALL_ERRORMSGS` 会导致返回所有违反约束的行，即使其数量超过 200 行。 |

    | `NO_INFOMSGS` | 抑制信息性消息的显示。 |


    代码清单 9-14 中的脚本创建了一个名为 `BadConstraint` 的表并插入了一行数据。然后，它在表上创建了一个检查约束，并指定了 `NOCHECK`
    选项，这使我们能够创建一个立即被我们已添加的现有行所违反的约束。最后，我们对该表运行 `DBCC CHECKCONSTRAINTS`。


    ```

    USE Chapter9

    GO

    --创建 BadConstraint 表

    CREATE TABLE dbo.BadConstraint

    (

    ID        INT PRIMARY KEY

    ) ;

    --向 BadConstraint 表中插入一个负值

    INSERT INTO dbo.BadConstraint

    VALUES(-1) ;

    --创建一个 CHECK 约束，强制 ID 列的值为正数

    ALTER TABLE dbo.BadConstraint WITH NOCHECK ADD CONSTRAINT chkBadConstraint CHECK
    (ID > 0) ;

    GO

    --对表运行 DBCC CHECKCONSTRAINTS

    DBCC CHECKCONSTRAINTS(''dbo.BadConstraint'') ;

    代码清单 9-14

    DBCC CHECKCONSTRAINTS

    ```


    运行此脚本的结果如图 9-16 所示。您可以看到 `DBCC CHECKCONSTRAINTS` 已返回了违反约束的行的详细信息。


    ![../images/333037_2_En_9_Chapter/333037_2_En_9_Fig16_HTML.jpg](img/333037_2_En_9_Fig16_HTML.jpg)


    图 9-16


    DBCC CHECKCONSTRAINTS 结果


    ### 提示


    在运行 `DBCC CHECKDB` 或其他 DBCC 命令来修复损坏后，运行 `DBCC CHECKCONSTRAINTS` 是一个好习惯。这是因为 DBCC
    命令的修复选项不会考虑约束完整性。


    即使 `DBCC CHECKCONSTRAINTS` 没有发现任何坏数据，它仍然不会将约束标记为可信。您必须手动完成此操作。代码清单 9-15 中的脚本首先运行一个查询来查看约束是否可信，然后手动将其标记为可信。


    ```

    SELECT

    is_not_trusted

    FROM sys.check_constraints

    WHERE name = ''chkBadConstraint'' ;

    ALTER TABLE dbo.BadConstraint WITH CHECK CHECK CONSTRAINT chkDadConstraint ;

    代码清单 9-15

    将约束标记为可信

    ```


    ### 超大型数据库的一致性检查


    如果您有超大型数据库，可能很难找到足够长的维护窗口来运行 `DBCC CHECKDB`，并且在用户或 ETL 进程连接时运行它可能会导致性能问题。如果您拥有大量使用公共基础架构（如
    SAN 或私有云）的小型数据库，也可能会遇到类似问题。然而，确保数据库的一致性应该是您议程上的优先事项，因此您应该尝试找到一个既能满足维护需求又能满足性能目标的策略。以下部分讨论了您可以选择采用来实现这种平衡的策略。


    #### 使用 PHYSICAL_ONLY 选项的 DBCC CHECKDB


    您可以采取的一种策略是定期（最好每晚）使用 `PHYSICAL_ONLY` 选项运行 `DBCC CHECKDB`，然后在周期性但频率较低的基础上（最好每周一次）运行一次完整的检查。当您使用
    `PHYSICAL_ONLY` 选项运行 `DBCC CHECKDB` 时，会执行系统目录和分配结构的一致性检查，并扫描和验证每个表的每个页面。其最终结果是捕获由
    IO 错误引起的损坏，但会识别其他问题，例如逻辑一致性错误。这就是为什么每周运行一次完整扫描仍然很重要。


    #### 使用 WITH CHECKSUM 备份和 DBCC CHECKALLOC


    如果您所有的数据库每晚都有完整备份，并且所有数据库都配置了 `CHECKSUM` 作为 `PAGE_VERIFY` 选项，那么除了前面提到的策略外，另一种方法是在您的完整备份中添加
    `WITH CHECKSUM` 选项，然后运行 `DBCC CHECKALLOC` 来代替每晚指定 `PHYSICAL_ONLY` 选项的 `DBCC CHECKDB`。`DBCC
    CHECKALLOC` 命令实际上是 `DBCC CHECKDB` 命令的一个子集，它验证数据库内的分配结构。当执行带 `WITH CHECKSUM` 的完整备份时，这就满足了扫描和验证每个表的每个页面以检查
    IO 错误的要求。就像运行指定了 `PHYSICAL_ONLY` 选项的 `DBCC CHECKDB` 一样，这可以识别由 IO 操作引起的任何损坏以及任何坏的校验和。但是，在内存中发生的页面错误将不会被识别。这意味着与
    `PHYSICAL_ONLY` 策略一样，您仍然需要每周完整运行一次 `DBCC CHECKDB` 来捕获逻辑一致性错误或在内存中发生的损坏。如果您的环境具有公共基础架构，并且正在对所有数据库执行每晚完整备份，那么此选项非常有用，因为您将减少每晚的总体
    IO 量。然而，这是以备份窗口时长为代价的，并且在此期间会增加资源的使用。

    '
- fmt: '### Splitting the Workload


    Another strategy for VLDBs may be to split the load of `DBCC CHECKDB` over multiple
    nights. For example, if your VLDB has multiple filegroups, then you could run
    `DBCC CHECKFILEGROUP` against half of the filegroups on Monday, Wednesday, and
    Friday and against the other half of the filegroups on Tuesday, Thursday, and
    Saturday. You could reserve Sunday for a full run of `DBCC CHECKDB`. A full run
    of `DBCC CHECKDB` is still advised on a weekly basis, since `DBCC CHECKFILEGROUP`
    does not perform checks, such as validating Service Broker objects.


    If your issue is common infrastructure, as opposed to VLDBs, then you can adapt
    the concept just described so that you run `DBCC CHECKDB` on a subset of databases
    on alternate nights. This can be a little complex, since the approach here, in
    order to avoid swamping the SAN, is to segregate the databases intelligently,
    and based on size, as opposed to a random 50/50 split. This will often involve
    centralizing the maintenance routines, on a central server, known as a central
    management server (CMS). A CMS is a SQL Server instance, which sits in the middle
    of your SQL Server estate and provides centralized monitoring and maintenance.
    Often, for intelligent maintenance, such as I am describing here, the CMS will
    control maintenance routines by scheduling PowerShell scripts, which will interact
    with metadata, stored on the CMS, to decide which maintenance jobs to run.


    ### Offloading to a Secondary Server


    The final strategy for reducing the load on production systems caused by `DBCC
    CHECKDB` is to offload the work to a secondary server. If you decide to take this
    approach, it involves taking a full backup of the VLDB and then restoring it on
    a secondary server before you run `DBCC CHECKDB` on the secondary server. This
    approach has several disadvantages, however. First, and most obviously, it means
    that you have the expense of procuring and maintaining a secondary server, just
    for the purpose of running consistency checks. This makes it the most expensive
    of the options discussed (unless, of course, you reuse an existing server, such
    as a UAT server). Also, if you find corruption, you will not know if the corruption
    was generated on the production system and copied over in the backup or if the
    corruption was actually generated on the secondary server. This means that if
    errors are found, you still have to run `DBCC CHECKDB` on the production server.


    ### Summary


    Many types of corruption can occur in SQL Server. These include pages that have
    been damaged at the file system level, logical consistency errors, and corrupt
    pages that have a bad checksum. Pages can also be damaged in memory, which would
    not be identified through a checksum.


    Three page verification options can be selected for a database. The `NONE` option
    leaves you totally exposed to issues and is regarded as bad practice. The `TORN_PAGE_DETECTION`
    option is deprecated and should not be used, since it only checks the first 2
    bytes in every 512-byte sector. The final option is `CHECKSUM`. This is the default
    option and should always be selected.


    Pages that are damaged are stored in a table called `dbo.suspect_pages` in the
    MSDB database. Here, the error count is increased every time the error is encountered,
    and the event type of the page is updated to indicate that it has been repaired
    or restored as appropriate.


    If a system database, especially Master, becomes corrupt, you may be unable to
    start your instance. If this is the case, then you can rectify the issue by running
    setup with the `ACTION` parameter set to `Rebuilddatabases`. Alternatively, if
    the instance itself has become corrupt, then you can run setup with the `ACTION`
    parameter set to repair. This resolves issues such as corrupt Registry keys or
    corruption to the Resource database.


    `DBCC CHECKDB` is a command that you should run on a regular basis to check for
    corruption. If you find corruption, then you can also use this command to fix
    the issue. There are two repair modes that are available, depending on the nature
    of the corruption: `REPAIR_REBUILD` and `REPAIR_ALLOW_DATA_LOSS`. You should only
    use the `REPAIR_ALLOW_DATA_LOSS` option as a last resort in the event that no
    backup is available from which to restore the database or corrupt pages. This
    is because the `REPAIR_ALLOW_DATA_LOSS` option is liable to deallocate the corrupt
    pages, causing all data on these pages to be lost.


    Other DBCC commands can be used to perform a subset of `DBCC CHECKDB` functionality.
    These include `DBCC CHECKTABLE`, which can validate the integrity of a specific
    table, and `DBCC CONSTRAINTS`, which you can use to verify the integrity of foreign
    keys and check constraints, especially after you run `DBCC CHECKDB` with a repair
    option.


    For VLDBs or estates that share infrastructure, running `DBCC CHECKDB` can be
    an issue because of performance impact and resource utilization. You can mitigate
    this by adopting a strategy that offers a trade-off between maintenance and performance
    goals. These strategies include splitting the workload, offloading the workload
    to a secondary server, or running only subsets of the checking functionality on
    a nightly basis and then performing a full check on a weekly basis.


    # Part III Security, Resilience, and Scaling Workloads


    ## 10. SQL Server Security Model


    SQL Server 2019 offers a complex security model with overlapping layers of security
    that help database administrators (DBAs) counter the risks and threats in a manageable
    way. It is important for DBAs to understand the SQL Server security model so that
    they can implement the technologies in the way that best fits the needs of their
    organization and applications. This chapter discusses the SQL Server security
    hierarchy before demonstrating how to implement security at the instance, database,
    and object levels. We will also discuss auditing with SQL Audit, and assisting
    regulatory compliance with security reports, such as Data Discovery and Classification
    and Vulnerability Assessment.'
