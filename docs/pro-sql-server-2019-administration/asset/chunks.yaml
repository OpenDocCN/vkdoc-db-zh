    was created, as illustrated in Figure [12-6](#333037_2_En_12_Chapter.xhtml#Fig6).
    This allows you to easily see how much data loss exposure you have, depending
    on the backup sets that you choose to restore. In the Timeline window, you can
    also specify if you want to recover to the end of the log or if you wish to restore
    to a specific date/time.


    ![../images/333037_2_En_12_Chapter/333037_2_En_12_Fig6_HTML.jpg](images/333037_2_En_12_Chapter/333037_2_En_12_Fig6_HTML.jpg)


