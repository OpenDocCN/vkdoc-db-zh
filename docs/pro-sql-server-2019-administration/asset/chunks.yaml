- fmt: '## Migrating an Encrypted Database


    By the very nature of TDE, if we attempt to move our `Chapter11Encrypted` database
    to a new instance, the operation fails, unless we take our cryptographic artifacts
    into account. Figure [11-3](#333037_2_En_11_Chapter.xhtml#Fig3) illustrates the
    message we receive if we take a backup of the `Chapter11Encrypted` database and
    try to restore it on a new instance. You can find a full discussion of backups
    and restores in Chapter [12](#333037_2_En_12_Chapter.xhtml).


    ![../images/333037_2_En_11_Chapter/333037_2_En_11_Fig3_HTML.jpg](images/333037_2_En_11_Chapter/333037_2_En_11_Fig3_HTML.jpg)


    Figure 11-3: An attempt to restore an encrypted database on a new instance


    We would receive the same error if we detached the database and attempted to attach
    it to the new instance. Instead, we must first create a Database Master Key with
    the same password and then restore the server certificate and private key to the
    new instance. We can restore the server certificate that we created earlier, using
    the script in Listing [11-9](#333037_2_En_11_Chapter.xhtml#PC9).


    ```sql

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''Pa$$w0rd'' ;

    GO

    CREATE CERTIFICATE TDECert

    FROM FILE = ''C:\Certificates\TDECert''

    WITH PRIVATE KEY

    (

    FILE = ''C:\Certificates\TDECertKey'',

    DECRYPTION BY PASSWORD = ''Pa$$w0rd''

    ) ;

    Listing 11-9: Restoring the Server Certificate

    ```


    ### Tip


    Make sure that the SQL Server service account has permissions to the certificate
    and key files in the operating system. Otherwise you will receive an error stating
    that the certificate is not valid, does not exist, or that you do not have permissions
    to it. This means that you should check the restore immediately and periodically
    repeat the test.


    ## Managing Cell-Level Encryption


    Cell-level encryption allows you to encrypt a single column, or even specific
    cells from a column, using a symmetric key, an asymmetric key, a certificate,
    or a password. Although this can offer an extra layer of security for your data,
    it can also cause a significant performance impact and a large amount of `bloat`.
    `Bloat` means that the size of the data is much larger after the data has been
    encrypted than it was before. Additionally, implementing cell-level encryption
    is a manual process that requires you to make code changes to applications. Therefore,
    encrypting data should not be your default position, and you should only do it
    when you have a regulatory requirement or clear business justification.


    Although it is common practice to encrypt data using a symmetric key, it is also
    possible to encrypt data using an asymmetric key, a certificate, or even a passphrase.
    If you encrypt data using a passphrase, then the TRIPLE DES algorithm is used
    to encrypt the data. Table [11-1](#333037_2_En_11_Chapter.xhtml#Tab1) lists the
    cryptographic functions that you can use to encrypt or decrypt data using these
    methods.


    Table 11-1: Cryptographic Functions


    | Encryption Method | Encryption Function | Decryption Function |

    | --- | --- | --- |

    | Asymmetric key | `ENCRYPTBYASYMKEY()` | `DECRYPTBYASYMKEY()` |

    | Certificate | `ENCRYPTBYCERT()` | `DECRYPTBYCERT()` |

    | Passphrase | `ENCRYPTBYPASSPHRASE()` | `DECRYPTBYPASSPHRASE()` |


    When we created the `SensitiveData` table in our database, you may have noticed
    that we used the `VARBINARY(8000)` data type for the `CreditCardNumber` column
    when the obvious choice would have been a `CHAR(19)`. This is because encrypted
    data must be stored as one of the binary data types. We have set the length to
    8000 bytes, because this is the maximum length of the data that is returned from
    the function used to encrypt it.


    The script in Listing [11-10](#333037_2_En_11_Chapter.xhtml#PC10) will create
    a duplicate of the `Chapter11Encrypted` database. The script then creates a Database
    Master Key for this database and a certificate. After that, it creates a symmetric
    key that will be encrypted using the certificate. Finally, it opens the symmetric
    key and uses it to encrypt the `CreditCardNumber` column in our `SensitiveData`
    table.


    ```sql

    --Create the duplicate Database

    CREATE DATABASE Chapter11CellEncrypted ;

    GO

    USE Chapter11CellEncrypted

    GO

    --Create the table

    CREATE TABLE dbo.SensitiveData

    (

    ID                INT                PRIMARY KEY        IDENTITY,

    FirstName        NVARCHAR(30),

    LastName        NVARCHAR(30),

    CreditCardNumber        VARBINARY(8000)

    )

    GO

    --Populate the table

    SET identity_insert dbo.SensitiveData ON

    INSERT INTO dbo.SensitiveData(id, firstname, lastname, CreditCardNumber)

    SELECT id

    ,firstname

    ,lastname

    ,CreditCardNumber

    FROM  Chapter11Encrypted.dbo.SensitiveData

    SET identity_insert dbo.SensitiveData OFF

    --Create Database Master Key

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''Pa$$w0rd'';

    GO

    --Create Certificate

    CREATE CERTIFICATE CreditCardCert

    WITH SUBJECT = ''Credit Card Numbers'';

    GO

    --Create Symmetric Key

    CREATE SYMMETRIC KEY CreditCardKey

    WITH ALGORITHM = AES_128

    ENCRYPTION BY CERTIFICATE CreditCardCert;

    GO

    --Open Symmetric Key

    OPEN SYMMETRIC KEY CreditCardKey

    DECRYPTION BY CERTIFICATE CreditCardCert;

    --Encrypt the CreditCardNumber column

    UPDATE dbo.SensitiveData

    SET CreditCardNumber = ENCRYPTBYKEY(KEY_GUID(''CreditCardKey''), CreditCardNumber);

    GO

    CLOSE SYMMETRIC KEY CreditCardKey --Close the key so it cannot be used again,
    unless reopened

    Listing 11-10: Encrypting a Column of Data

    ```


    Notice that the `UPDATE` statement that we used to encrypt the data uses a function
    called `ENCRYPTBYKEY()` to encrypt the data. Table [11-2](#333037_2_En_11_Chapter.xhtml#Tab2)
    describes the parameters the `ENCRYPTBYKEY()` function accepts. If we wish only
    to encrypt a subset of cells, we can add a `WHERE` clause to the `UPDATE` statement.


    Table 11-2: EncryptByKey() Parameters


    | Parameter | Description |

    | --- | --- |

    | `Key_GUID` | The GUID of the symmetric key that is used to encrypt the data
    |

    | `ClearText` | The binary representation of the data that you wish to encrypt
    |

    | `Add_authenticator` | A `BIT` parameter that indicates if an authenticator column
    should be added |

    | `Authenticator` | A parameter that specifies the column that should be used
    as an authenticator |


    Also notice that before we use the key to encrypt the data, we issue a statement
    to open the key. The key must always be opened before it is used for either encrypting
    or decrypting data. To do this, the user must have permissions to open the key.


    When you encrypt a column of data using the method shown in Listing [11-10](#333037_2_En_11_Chapter.xhtml#PC10),
    you still have a security risk caused by the deterministic nature of the algorithm
    used for encryption, which means when you encrypt the same value, you get the
    same hash. Imagine a scenario in which a user has access to the `SensitiveData`
    table but is not authorized to view the credit card numbers. If that user is also
    a customer with a record in that table, they could update their own credit card
    number with the same hashed value as that of another customer in the table. They
    have then successfully stolen another customer’s credit card number, without having
    to decrypt the data in the `CreditCardNumber` column. This is known as a `whole-value
    substitution attack`.


    To protect against this scenario, you can add an authenticator column, which is
    also known as a `salt value`. This can be any column but is usually the primary
    key column of the table. When the data is encrypted, the authenticator column
    is encrypted along with the data. At the point of decryption, the authenticator
    value is then checked, and if it does not match, then the decryption fails.'
