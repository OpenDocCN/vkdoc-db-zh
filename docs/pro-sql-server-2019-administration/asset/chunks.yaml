    ## 版本与许可模型


    选择 SQL Server 2019 的版本以支持你的数据层应用，听起来可能是一项简单的任务，但实际上，你应该花时间仔细考虑这个决定，并与业务相关人员及其他
    IT 部门协商，将他们的意见纳入决策中。首先要考虑的是 SQL Server 有五个版本。这些版本不仅在功能级别上有所不同，而且在许可考量方面也存在差异。此外，从运营支持的角度来看，你可能会发现，如果允许数据层应用托管在你的环境中未进行战略性部署的
    SQL Server 版本上，那么该环境的`TCO`（总体拥有成本）就会增加。


    关于功能和许可考量的详细讨论超出了本书的范围；不过，表 1-1 详细列出了 SQL Server 各个版本可用的许可模式，而表 1-2 则概述了每个版本的主要用途。


    表 1-1: `SQL Server 版本许可模式`


    | 版本 | 许可模式 | 说明 |

    | --- | --- | --- |

    | 企业版 | 按处理器核心许可 | – |

    | 标准版 | • 按处理器核心许可 • `服务器 + 客户端访问许可证` | – |

    | Web 版 | 仅限第三方托管 | – |

    | 开发者版 | 免费用于非商业用途 | 不得用于生产环境 |

    | Express 版 | SQL Server 的免费版本 | 功能有限且容量上限较小，例如数据库大小上限为 10GB、内存限制为 1GB、CPU 限制为单路或四核
    |


    `CAL` 是客户端访问许可证，其中客户端可以指用户或设备。你可以根据哪种方式对你的环境成本更低，来选择购买用户 CAL 或设备 CAL。


    例如，如果你的组织有一台支持呼叫中心的 SQL Server，该中心有 100 台计算机，并且 24/7 运行，分为三个 8 小时轮班，那么你将有 100
    台设备和 300 名用户，因此设备`CAL`将是你最明智的选择。


    另一方面，如果你的组织有一台支持 25 人销售团队的 SQL Server，这些人员不仅通过笔记本电脑，还通过 iPad 连接到销售应用，那么你将有 25
    名用户和 50 台设备，因此选择用户`CAL`会是更明智的选项。


    总结来说，如果你的用户数量多于设备数量，则应选择设备`CAL`。反之，如果你的设备数量多于用户数量，则应选择用户`CAL`。微软还提供了一个名为 SQL Server
    评估和规划 (`MAP`) 工具包的工具，可帮助你规划许可需求。`MAP` 工具包可从 `www.microsoft.com/en-gb/download/details.aspx?id=7826`
    下载。


    表 1-2: `SQL Server 版本概览`


    | 版本 | 版本概览 |

    | --- | --- |

    | 企业版 | SQL Server 的全功能版本，适用于企业系统和关键应用 |

    | 标准版 | 核心数据库和`BI`（商业智能）功能，面向部门级系统和非关键应用 |

    | Web 版 | 仅适用于托管使用 SQL Server 的公共网站的服务提供商 |

    | 开发者版 | 全功能版本，与企业版功能级别相同，但仅供开发使用，不允许在生产系统上使用 |

    | Express 版 | SQL Server 的免费入门级版本，面向具有本地数据需求的小型应用 |


    你选择在企业应用中支持的 SQL Server 版本将取决于项目需求、组织要求和底层基础设施。例如，如果你的组织在其私有云中托管整个 SQL Server
    环境，那么你可能只会支持企业版，因为你将对底层基础设施进行许可。


    或者，如果你的组织主要使用物理服务器，那么你很可能需要支持混合的 SQL Server 版本，例如企业版和标准版。这将为项目提供灵活性，如果它们只需要功能的子集且不期望高负载工作量，从而可以接受标准版对`RAM`和`CPU`施加的限制，进而降低成本。


    在选择使用哪个版本之前，你应该考虑的下一件事是是否使用`Windows Server Core`安装 SQL Server。在`Server Core`上安装可以通过减少服务器的受攻击面来帮助提高安全性。`Server
    Core`是最小化安装，因此受攻击面更小，安全漏洞也更少。它还可以提高性能，因为你没有`GUI`（图形用户界面）的开销，并且许多资源密集型应用无法安装。如果你决定使用`Server
    Core`，那么了解这样做的各种影响也很重要。


    从 SQL Server 的角度来看，以下功能无法使用：


    -   Reporting Services

    -   `SQL Server Data Tools (SSDT)`

    -   Client Tools Backward Compatibility

    -   Client Tools SDK

    -   `SQL Server Books Online`

    -   Distributed Replay Controller

    -   `Master Data Services (MDS)`

    -   `Data Quality Services (DQS)`


    以下功能可以使用，但只能从远程服务器使用：


    -   Management Tools

    -   Distributed Replay Client


    从更广泛的运营支持角度来看，你需要确保所有的运营团队（DBA、Windows 运维等）都能够支持`Server Core`。例如，如果你的 DBA 团队严重依赖某个第三方图形工具来分析执行计划，这个工具是否需要安装在服务器本地？是否有可以满足他们需求的替代工具？从
    Windows 运维的角度来看，团队是否拥有用于远程监控和管理服务器的工具？他们是否依赖任何需要被替换的第三方工具？


    你还应该考虑你的运营团队是否具备主要使用命令行流程来管理系统的技能。如果没有，那么你应该考虑可能需要哪些培训或技能提升。


    ## 硬件考量


    在规划服务器的硬件需求时，理想情况下，你应该实施一次完整的容量规划，以便能够估算服务器将要支持的应用程序的硬件需求。在进行此项工作时，请确保考虑到你公司标准的硬件生命周期，而不是仅仅为当前规划。根据你的组织情况，这可能在
    1 到 5 年之间，但通常会是 3 年。


    这对于避免服务器配置不足或过度配置非常重要。项目团队通常希望过度配置其服务器以确保性能。这种方法不仅在企业范围内扩展时成本高昂，而且在某些环境中，实际上可能对性能产生不利影响。例如，一个具有共享资源的私有云基础设施就是这种情况。在这种情况下，过度配置服务器可能对整个环境（包括被过度配置的服务器本身）产生负面影响。

    '
- fmt: '# Specifying Strategic Minimum Requirements


    When specifying the minimum hardware requirements for SQL Server within your environment,
    you may choose to specify the minimum requirements for installing SQL Server—`4GB`
    RAM and a single `2GHz` CPU (based on Enterprise edition). However, you may be
    better served to think about operational supportability within your enterprise.


    For example, if your environment consists predominantly of a private cloud infrastructure,
    then you may wish to specify a minimum of `2 vCores` and `4GB RAM + (number of
    cores ∗ 1GB)` since this may be in line with your enterprise standards.


    On the other hand, if you have a highly dispersed enterprise, which has grown
    organically, and you wish to help persuade projects to use a shared SQL Server
    farm, you may choose to enforce much higher minimum specifications, such as `32GB
    RAM` and `2 sockets/4 cores`. The reasoning here is that any projects without
    large throughput requirements would be “forced” to use your shared farm to avoid
    the heavy costs associated with an unnecessarily large system.


    # Storage


    Storage is a very important consideration for any SQL Server installation. The
    following sections will discuss locally attached storage and SAN (storage area
    network) storage, as well as considerations for file placement.


    ## Locally Attached Storage


    If your server will use locally attached storage, then you should carefully consider
    file layout. By its very nature, SQL Server is often input/output (`IO`) bound,
    and therefore, configuring the `IO` subsystem is one of the critical aspects for
    performance. You first need to separate your user databases’ data files and log
    files onto separate disks or arrays and also to separate `TempDB`, which is the
    most heavily used system database. If all of these files reside on a single volume,
    then you are likely to experience disk contention while SQL Server attempts to
    write to all of them at the same time.


    Typically, locally attached storage will be presented to your server as `RAID`
    (redundant array of inexpensive disks) arrays and various `RAID` levels are available.
    There are many `RAID` levels available, but the most common are outlined in the
    following sections, together with their advantages and disadvantages. Hopefully,
    this will help you select the most appropriate `RAID` level, with the most appropriate
    balance between performance and fault tolerance.


    ### RAID 0


    A `RAID 0` volume consists of between two and `n` spindles, and the data bits
    are striped across all of the disks within the array. This provides excellent
    performance; however, it provides no fault tolerance. The loss of any disk within
    the array means that the whole array will fail. This is illustrated in Figure
    [1-1](#333037_2_En_1_Chapter.xhtml#Fig1).


    ![../images/333037_2_En_1_Chapter/333037_2_En_1_Fig1_HTML.jpg](images/333037_2_En_1_Chapter/333037_2_En_1_Fig1_HTML.jpg)


    *Figure 1-1: The RAID 0 array provides no redundancy*


    ### Caution


    Because `RAID 0` provides no redundancy, it should not be used for production
    systems.


    ### RAID 1


    A `RAID 1` volume will consist of two spindles, working together as a mirrored
    pair. This provides redundancy in the event of failure of one of the spindles,
    but it comes at the expense of write performance, because every write to the volume
    needs to be made twice. This method of redundancy is illustrated in Figure [1-2](#333037_2_En_1_Chapter.xhtml#Fig2).


    ![../images/333037_2_En_1_Chapter/333037_2_En_1_Fig2_HTML.jpg](images/333037_2_En_1_Chapter/333037_2_En_1_Fig2_HTML.jpg)


    *Figure 1-2: RAID 1 provides redundancy by mirroring the disk*


    ### Note


    The formula for calculating the total `IOPS` (input/output per second) against
    a `RAID 1` array is as follows: `IOPS = Reads + (Writes * 2)`.


    ### RAID 5


    A `RAID 5` volume will consist of between three and `n` spindles and provides
    redundancy of exactly one disk within the array. Because the blocks of data are
    striped across multiple spindles, read performance of the volume will be very
    good, but again, this is at the expense of write performance. Write performance
    is impaired because redundancy is achieved by distributing parity bits across
    all spindles in the array. This means that there is a performance penalty of four
    writes for every one write to the volume. This is regardless of the number of
    disks in the array. The reason for this arbitrary penalty is because the parity
    bits are striped in the same way the data is. The controller will read the original
    data and the original parity and then write the new data and the new parity, without
    needing to read all of the other disks in the array. This method of redundancy
    is illustrated in Figure [1-3](#333037_2_En_1_Chapter.xhtml#Fig3).


    It is worthy of note, however, that should a spindle within the array fail, performance
    will be noticeably impaired. It is also worthy of note that rebuilding a disk
    from the parity bits contained on its peers can take an extended amount of time,
    especially for a disk with a large capacity.


    ![../images/333037_2_En_1_Chapter/333037_2_En_1_Fig3_HTML.jpg](images/333037_2_En_1_Chapter/333037_2_En_1_Fig3_HTML.jpg)


    *Figure 1-3: RAID 5 provides redundancy through parity bits*


    ### Note


    The formula for calculating total `IOPS` against a `RAID 5` array is as follows:
    `IOPS = Read + (Writes * 4)`. To calculate the expected `IOPS` per spindle, you
    can divide this value for `IOPS` by the number of disks in the array. This can
    help you calculate the minimum number of disks that should be in the array to
    achieve your performance goals.


    ### RAID 10


    A `RAID 10` volume will consist of four to `n` disks, but it will always be an
    even number. It provides the best combination of redundancy and performance. It
    works by creating a stripe of mirrors. The bits are striped, without parity, across
    half of the disks within the array, as they are for `RAID 0`, but they are then
    mirrored to the other half of the disks in the array.


    This is known as a nested or hybrid `RAID` level, and it means that half of the
    disks within the array can be lost, providing that none of the failed disks are
    within the same mirrored pair. This is illustrated in Figure [1-4](#333037_2_En_1_Chapter.xhtml#Fig4).


    ![../images/333037_2_En_1_Chapter/333037_2_En_1_Fig4_HTML.jpg](images/333037_2_En_1_Chapter/333037_2_En_1_Fig4_HTML.jpg)


    *Figure 1-4: RAID 10 provides redundancy by mirroring each disk within the stripe*


    ### Note


    The formula for calculating total `IOPS` against a `RAID 10` array is as follows:
    `IOPS = Read + (Writes * 2)`. In the same way as for `RAID 5`, in order to calculate
    the expected `IOPS` per spindle, you can divide the value for `IOPS` by the number
    of disks in the array. This can help you calculate the minimum number of disks
    that should be in the array to achieve your performance goals.'
