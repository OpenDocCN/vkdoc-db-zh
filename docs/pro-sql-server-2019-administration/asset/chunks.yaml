- fmt: '### Consistent


    The consistent property means that the transaction moves the database from one
    consistent state to another; at the end of the transaction, all data must conform
    to all data rules, which are enforced with constraints, data types, and so on.


    SQL Server fully enforces this property, but there are workarounds. For example,
    if you have a check constraint, or a foreign key on a table, and you wish to perform
    a large bulk insert, you can disable the constraint, insert the data, and then
    re-enable the constraint with `NOCHECK`. When you use `NOCHECK`, the constraint
    enforces the rules for new data modification, but it does not enforce the rule
    for data that already exists in the table. When you do this, however, SQL Server
    marks the constraint as not trusted, and the Query Optimizer ignores the constraint
    until you have validated the existing data in the table using an


    ```sql

    ALTER TABLE MyTable WITH CHECK CHECK CONSTRAINT ALL

    ```


    command.


    ### Isolated


    Isolation refers to the concurrent transaction’s ability to see data modifications
    made by a transaction before they are committed. Isolating transactions avoids
    transactional anomalies and is enforced by either acquiring locks or maintaining
    multiple versions of rows. Each transaction runs with a defined isolation level.
    Before we discuss available isolation levels, however, we first need to examine
    the transactional anomalies that can occur.


    #### Transactional Anomalies


    Transactional anomalies can cause queries to return unpredictable results. Three
    types of transactional anomalies are possible within SQL Server: dirty reads,
    nonrepeatable reads, and phantom reads. These are discussed in the following sections.


    ##### Dirty Reads


    A `dirty read` occurs when a transaction reads data that never existed in the
    database. An example of how this anomaly can occur is outlined in Table [18-7](#333037_2_En_18_Chapter.xhtml#Tab7).


    Table 18-7


    A Dirty Read


    | Transaction1 | Transaction2 |

    | --- | --- |

    | Inserts `row1` into `Table1` |   |

    |   | Reads `row1` from `Table1` |

    | Rolls back |   |


    In this example, because `Transaction1` rolled back, `Transaction2` read a row
    that never existed in the database. This anomaly can occur if shared locks are
    not acquired for reads, since there is no lock to conflict with the exclusive
    lock taken out by `Transaction1`.


    ##### Nonrepeatable Read


    A nonrepeatable read occurs when a transaction reads the same row twice but receives
    different results each time. An example of how this anomaly can occur is outlined
    in Table [18-8](#333037_2_En_18_Chapter.xhtml#Tab8).


    Table 18-8


    A Nonrepeatable Read


    | Transaction1 | Transaction2 |

    | --- | --- |

    | Reads `row1` from `Table1` |   |

    |   | Updates `row1` in `Table1` |

    |   | Commits |

    | Reads `row1` from `Table1` |   |


    In this example, you can see that `Transaction1` has read `row1` from `Table1`
    twice. The second time, however, it receives a different result, because `Transaction2`
    has updated the row. This anomaly can occur if `Transaction1` takes out shared
    locks but does not hold them for the duration of the transaction.


    ##### Phantom Read


    A phantom read occurs when a transaction reads a range of rows twice but receives
    a different number of rows the second time it reads the range. An example of how
    this anomaly can occur is outlined in Table [18-9](#333037_2_En_18_Chapter.xhtml#Tab9).


    Table 18-9


    Phantom Reads


    | Transaction1 | Transaction2 |

    | --- | --- |

    | Reads all rows from `Table1` |   |

    |   | Inserts ten rows into `Table1` |

    |   | Commits |

    | Reads all rows from `Table1` |   |


    In this example, you can see that `Transaction1` has read all rows from `Table1`
    twice. The second time, however, it reads an extra ten rows, because `Transaction2`
    has inserted ten rows into the table. This anomaly can occur when `Transaction1`
    does not acquire a key-range lock and hold it for the duration of the transaction.


    #### Isolation Levels


    SQL Server provides four pessimistic and two optimistic transaction isolation
    levels for transactions that involve disk-based tables. Pessimistic isolation
    levels use locks to protect against transactional anomalies, and optimistic isolation
    levels use row versioning.


    ##### Pessimistic Isolation Levels


    `Read Uncommitted` is the least restrictive isolation level. It works by acquiring
    locks for write operations but not acquiring any locks for read operations. This
    means that under this isolation level, read operations do not block other readers
    or writers. The result is that all transactional anomalies described in the previous
    sections are possible.


    `Read Committed` is the default isolation level. It works by acquiring shared
    locks for read operations as well as locks for write operations. The shared locks
    are only held during the read phase of a specific row, and the lock is released
    as soon as the record has been read. This results in protection against dirty
    reads, but nonrepeatable reads and phantom reads are still possible.


    **Tip**


    In some circumstances, shared locks may be held until the end of the statement.
    This occurs when a physical operator is required to spool data to disk.


    In addition to acquiring locks for write operations, `Repeatable Read` acquires
    shared locks on all rows that it touches and then it holds these locks until the
    end of the transaction. The result is that dirty reads and nonrepeatable reads
    are not possible, although phantom reads can still occur. Because the reads are
    held for the duration of the transaction, deadlocks are more likely to occur than
    when you are using `Read Committed` or `Read Uncommitted` isolation levels.


    `Serializable` is the most restrictive isolation level, and the level where deadlocks
    are most likely to occur. It works by not only acquiring locks for write operations
    but also by acquiring key-range locks for read operations and then holding them
    for the duration of the transaction. Because key-range locks are held in this
    manner, no transactional anomalies are possible, including phantom reads.'
