    | `0` | `NOTHING` | The log was able to cycle on its last attempt. |

    | `1` | `CHECKPOINT` | Normally indicates that a `CHECKPOINT` has not occurred
    since the last time the log was truncated. |

    | `2` | `LOG_BACKUP` | The log cannot be truncated until a log backup has been
    taken. |

    | `3` | `ACTIVE_BACKUP_OR_RESTORE` | A backup or restore operation is currently
    in progress on the database. |

    | `4` | `ACTIVE_TRANSACTION` | There is a long-running or deferred transaction.
    Deferred transactions will be discussed in Chapter [18](#333037_2_En_18_Chapter.xhtml).
    |

    | `5` | `DATABASE_MIRRORING` | Either an asynchronous replica is still synchronizing
    or mirroring has been paused. |

    | `6` | `REPLICATION` | There are transactions in the log that have not yet been
    received by the distributor. |

    | `7` | `DATABASE_SNAPSHOT_CREATION` | A database snapshot is currently being
    created. Database snapshots will be discussed in Chapter [16](#333037_2_En_16_Chapter.xhtml).
    |

    | `8` | `LOG_SCAN` | A log scan operation is in progress. |

    | `9` | `AVAILABILITY_REPLICA` | Secondary replicas are not fully synchronized
    or the availability group has been paused. |

    | `13` | `OLDEST_PAGE` | The oldest page of the database is older than the checkpoint
    LSN. This occurs when indirect checkpoints are being used. |

    | `16` | `XPT_CHECKPOINT` | A memory-optimized `CHECKPOINT` is required before
    the log can be truncated. |


    In our scenario, in order to mark the `VLF`s as reusable, we need to back up our
    transaction log. Theoretically, we could also switch to the `SIMPLE` recovery
    model, but this would break our log chain. Before we do this, we need to take
    a full backup. This is because all backup sequences must begin with a full backup.
    (Backups and restores will be discussed in Chapter [12](#333037_2_En_12_Chapter.xhtml).)
    This will leave only the `VLF` with an `FSeqNo` of 83 as active and the others
    will be marked as reusable.


    In order to improve log fragmentation, we need to shrink the log file and then
    expand it again, with a larger increment. So in our case, we would shrink the
    log as far as possible, which will be to `VLF` `FSeqNo` 83, because this is the
    last active `VLF` in the file. We then expand it back to 500MB. We can perform
    these tasks with the script in Listing [6-20](#333037_2_En_6_Chapter.xhtml#PC20).


    ```

    USE Chapter6LogFragmentation

    GO

    DBCC SHRINKFILE (''Chapter6LogFragmentation _log'', 0, TRUNCATEONLY);

    GO

    ALTER DATABASE Chapter6LogFragmentation MODIFY FILE ( NAME = ''Chapter6LogFragmentation
    _log'', SIZE = 512000KB );

    GO

    Listing 6-20

    Defragmenting the Transaction Log

    ```


