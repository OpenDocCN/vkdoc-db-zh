  trans: '

    ## 摘要


    分布式重放提供了一种机制，用于重放使用 `Profiler` 或 `扩展事件` 捕获的跟踪。与它的前身——已弃用于 `数据库引擎` 的 `Profiler`
    不同，分布式重放可以重放来自多个服务器的工作负载，这使您能够执行负载测试并模拟多个并发连接。


    `控制器` 是运行分布式重放控制器服务的服务器，它同步重放过程，并可配置为两种不同的工作模式：`压力` 模式和 `同步` 模式。在 `压力` 模式下，控制器会尽快触发事件；而在
    `同步` 模式下，它会按照事件被捕获的顺序触发它们。


    `客户端` 是运行分布式重放客户端服务的服务器，用于重放跟踪。分布式重放最多支持 16 个客户端。`目标` 是客户端向其分发事件的实例。


    尽管可以重放在 `Profiler` 中捕获的跟踪，但 `扩展事件` 使用的资源更少并提供更大的灵活性。因此，请考虑使用此方法来捕获跟踪。然而，为了用分布式重放重放
    `扩展事件` 会话，您首先需要将 `.xel` 文件转换为 `.trc` 文件。您可以使用 `RML Utilities` 来完成此操作，该工具可从 [`www.microsoft.com`](http://www.microsoft.com)
    下载。


    分布式重放管理工具是一个命令行工具，用于预处理和运行跟踪。在预处理模式下运行时，它会创建一个中间文件。在重放模式下运行时，它会在客户端上生成分发文件，并使用这些文件将事件分发到目标。


    # 22. 自动化维护例程


    自动化是数据库管理的关键部分，因为它通过允许以很少或无需人工干预的方式执行可重复的任务，降低了企业的总拥有成本 (`TCO`)。SQL Server 提供了一套丰富的功能来自动化常规的
    DBA 活动，包括调度引擎、决策树逻辑和一个全面的安全模型。在本章中，我们将讨论如何利用 `SQL Server 代理` 来减少您在维护工作上的时间负担。我们还将探讨如何通过使用多服务器作业来减少工作量，这允许您在整个企业中执行一组一致的例程。


    ## SQL Server 代理


    `SQL Server 代理` 是一项服务，它提供了创建具有基于决策的逻辑的自动化例程并将其调度为仅运行一次、定期运行、在 `SQL Server 代理`
    服务启动时运行或在 `CPU` 空闲条件下运行的能力。


    `SQL Server 代理` 还控制 `警报`，这允许您响应各种条件，包括错误、性能条件或 `WMI`（Windows 管理规范）事件。响应可以包括发送电子邮件或运行任务。


    在向您介绍了围绕 `SQL Server 代理` 的概念之后，以下部分将讨论 `SQL Server 代理` 安全模型、如何创建和管理作业以及如何创建警报。


    ### SQL Server 代理概念


    `SQL Server 代理` 通过 `作业`（协调运行的任务）、`计划`（定义任务运行的时间）、`警报`（可响应 SQL Server 中发生的事件）和
    `操作员`（通常是 DBA，负责接收诸如作业状态或已触发的警报等事件通知的用户）来实现。以下部分将向您介绍这些概念中的每一个。


    #### 计划


    `计划` 定义了触发作业开始运行的时间或条件。计划可以定义为：


    -   `一次性`：允许您指定特定的日期和时间。

    -   `在 SQL Server 代理启动时自动启动`：如果希望一组任务在实例启动时运行（假设 `SQL Server 代理` 服务配置为自动启动），则很有用。

    -   `在 CPU 变得空闲时启动`：如果您有资源密集型作业，不希望影响用户活动，则很有用。

    -   `重复`：允许您定义一个复杂的计划，包含开始和结束日期，可以按天、周或月重复。如果您将作业调度为每周运行，那么您还可以定义它应在哪些天运行。如果将计划定义为按天，您可以选择触发器每天发生一次、每小时一次、每分钟一次，甚至频繁到每
    10 秒一次。如果计划基于秒、分或小时重复，则可以在一天内定义开始和停止时间。这意味着您可以调度一个作业在例如 18:00 到 20:00 之间每分钟运行一次。


    ### 提示


    一个每日重复计划实际上用于定义按天、小时、分钟或秒运行的计划。


    您可以为每个作业创建单独的计划，也可以选择定义一个计划并用它来触发您需要同时运行的多个作业——例如，当您有多个希望在 `CPU` 空闲时运行的维护作业时。在这种情况下，您对所有这些作业使用相同的计划。另一个例子是当您有多个
    `ETL` 在不同数据库上运行时。如果 `ETL` 窗口很小，您可能希望所有这些作业同时运行。同样，您可以定义一个单一计划并将其用于所有 `ETL` 作业。这种方法可以减少管理工作；例如，如果
    `ETL` 窗口发生变化，您只需更改一个计划，而不是多个计划。


    #### 操作员


    `操作员` 是配置为接收作业状态通知或警报触发时通知的个人或团队。您可以配置通过电子邮件、`NET SEND` 或 `寻呼机` 来通知操作员。然而，值得注意的是，`寻呼机`
    和 `NET SEND` 选项已弃用，您应避免使用它们。


    如果您选择配置操作员通过电子邮件接收通知，那么您还必须配置本章后面讨论的 `数据库邮件`，指定传递消息的 `SMTP 中继服务器` 的地址和端口。如果您配置操作员通过
    `NET SEND` 接收通知，那么 `SQL Server Agent` Windows 服务依赖于 `NET SEND` 服务以及 `SQL Server`
    服务才能启动。如果您配置操作员通过 `寻呼机` 接收通知，那么您必须使用 `数据库邮件` 将消息中继到电子邮件转寻呼机服务。


    ### 注意


    通过引入对 `NET SEND` 服务的依赖，您会增加操作风险。


    使用 `寻呼机` 警报时，您可以为每个操作员配置其当班的日期和时间。您可以在提供支持轮班或为运营支持采用“追随太阳”支持模式的 `24/7` 组织中配置此功能，这种模式将轮班交接给不同全球区域的支持团队。此功能还允许您为每个操作员配置工作日、星期六和星期日的不同轮班模式。

    '
- fmt: "#### Jobs\n\n一个作业由一系列你应该执行的操作组成。每个操作被称为一个`job step`（作业步骤）。你可以将每个作业步骤配置为执行以下类别之一的操作：\n\
    \n*   SSIS 包\n*   T-SQL 命令\n*   PowerShell 脚本\n*   操作系统命令\n*   复制分发器任务\n*   复制合并代理任务\n\
    *   复制队列读取器代理任务\n*   复制快照代理任务\n*   复制事务日志读取器任务\n*   分析服务命令\n*   分析服务查询\n\n除了 T-SQL\
    \ 命令外，你可以配置每个作业步骤，使其在运行 SQL Server Agent 服务的服务账户上下文下运行，或者在代理账户下运行（代理账户链接到凭据）。你还可以配置每个步骤重试特定的次数，以及每次重试之间的间隔。\n\
    \n此外，你可以为每个作业步骤单独配置“成功时”和“失败时”的操作。这使得数据库管理员能够实现基于决策的逻辑和错误处理，如图[22-1](#333037_2_En_22_Chapter.xhtml#Fig1)所示。\n\
    \n![图 22-1 决策树逻辑](images/333037_2_En_22_Chapter/333037_2_En_22_Fig1_HTML.png)\n\
    \n你可以在专为正在配置的作业创建的计划上运行每个作业，也可以在多个作业之间共享计划（这些作业都应在同一计划上运行）。\n\n你还可以为每个作业配置通知。通知会向操作员提醒作业的成功或失败，但你也可以配置它将条目写入\
    \ Windows 应用程序事件日志，甚至删除该作业。\n\n#### Alerts\n\n`Alerts`（警报）响应写入 Windows 应用程序事件日志的\
    \ SQL Server 中发生的事件。警报可以响应以下类别的活动：\n\n*   SQL Server 事件\n*   SQL Server 性能条件\n\
    *   WMI 事件\n\n当你针对 SQL Server 事件类别创建警报时，可以配置它响应特定的错误消息或发生的特定错误严重级别。你还可以过滤警报，使其仅在错误或警告包含特定文本时触发。它们也可以按发生错误的具体数据库进行过滤。\n\
    \n当你针对 SQL Server 性能条件类别创建警报时，它们的配置使得当计数器低于、等于或高于指定值时触发。配置此类警报时，你需要选择本质上是性能条件类别的性能对象、该性能对象内的计数器，以及你希望针对其发出警报的计数器实例。例如，要触发一个警报，在`Chapter22`数据库的“日志使用百分比”计数器超过\
    \ 70% 时，你需要选择 Databases（数据库）对象、Percent Log Used（日志使用百分比）计数器和`Chapter22`实例，并配置警报在该计数器超过\
    \ 70 时触发。运行清单[22-1](#333037_2_En_22_Chapter.xhtml#PC1)中的查询可以显示性能对象及其关联性能计数器的完整列表。\n\
    \n```sql\nSELECT\n    object_name\n    , counter_name\nFROM msdb.dbo.sysalerts_performance_counters_view\n\
