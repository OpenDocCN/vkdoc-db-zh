    或者，我们可以使用 T-SQL 执行相同的操作。代码清单 10-19 中的脚本创建了相同的服务器审计。


    ```sql

    USE Master

    GO

    CREATE SERVER AUDIT [Audit-ProSQLAdmin]

    TO FILE

    (        FILEPATH = N''c:\audit''

    ,MAXSIZE = 512 MB

    ,MAX_ROLLOVER_FILES = 2147483647

    ,RESERVE_DISK_SPACE = OFF

    )

    WITH

    (        QUEUE_DELAY = 1000

    ,ON_FAILURE = CONTINUE

    )

    WHERE object_name = ''sysadmin'' ;

    ```

    **代码清单 10-19 创建服务器审计**


    ## 创建服务器审计规范


    要通过 SSMS 创建服务器审计规范，我们可以在对象资源管理器中浏览到“安全性”，然后从“服务器审计规范”上下文菜单中选择“新建服务器审计规范”。这将显示“创建服务器审计规范”对话框，如图
    10-7 所示。


    ![创建服务器审计规范对话框图片](img/333037_2_En_10_Fig7_HTML.jpg)


    **图 10-7 服务器审计规范对话框**


    您可以看到我们选择了 `SERVER_ROLE_MEMBER_CHANGE_GROUP` 作为审计操作类型。这将审计服务器角色成员资格的任何添加或删除。但是，结合我们在服务器审计对象上设置的筛选器，新结果是将只记录对
    `sysadmin` 服务器角色的更改。我们还从“审计”下拉框中选择了 `Audit-ProSQLAdmin` 审计，以将对象关联起来。


    或者，我们可以通过运行代码清单 10-20 中的命令使用 T-SQL 创建相同的服务器审计规范。在此命令中，我们使用 `FOR SERVER AUDIT`
    子句将服务器审计规范链接到 `Audit-ProSQLAdmin` 服务器审计，并使用 `ADD` 子句指定要捕获的审计操作类型。


    ```sql

    CREATE SERVER AUDIT SPECIFICATION [ServerAuditSpecification-ProSQLAdmin]

    FOR SERVER AUDIT [Audit-ProSQLAdmin]

    ADD (SERVER_ROLE_MEMBER_CHANGE_GROUP) ;

    ```

    **代码清单 10-20 创建服务器审计规范**'
- fmt: '### Enabling and Invoking Audits


    Even though we have created the server audit and server audit specification, we
    need to enable them before any data starts to be collected. We can achieve this
    by choosing `Enable` from the context menu of each of the objects in Object Explorer
    or by altering the objects and setting their `STATE = ON` in T-SQL. This is demonstrated
    in Listing 10-21.


    ```

    ALTER SERVER AUDIT [Audit-ProSQLAdmin] WITH (STATE = ON) ;

    ALTER SERVER AUDIT SPECIFICATION [ServerAuditSpecification-ProSQLAdmin]

    WITH (STATE = ON) ;

    Listing 10-21

    Enabling Auditing

    ```


    We now add the Danielle login to the `sysadmin` server roles using the script
    in Listing 10-22 so that we can check that our audit is working.


    ```

    ALTER SERVER ROLE sysadmin ADD MEMBER Danielle ;

    Listing 10-22

    Triggering the Audit

    ```


    We expect that our server audit specification’s definition has captured both actions,
    but that the `WHERE` clause has filtered out the first action we applied to the
    server audit. If we view the audit log by selecting `View Audit Log` from the
    context menu of the `Audit-ProSQLAdmin` server audit in Object Explorer, as illustrated
    in Figure 10-8, we can see that this is working as expected and review the audit
    entry that has been captured.


    ![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig8_HTML.jpg](images/333037_2_En_10_Chapter/333037_2_En_10_Fig8_HTML.jpg)


    Figure 10-8


    Audit Log File Viewer


    We can see that a granular level of information has been captured. Most notably,
    this information includes the full statement that caused the audit to fire, the
    database and object involved, the target login, and the login that ran the statement.


    ### Database Audit Specifications


    A database audit specification is similar to a server audit specification but
    specifies audit requirements at the database level, as opposed to at the instance
    level. In order to demonstrate this functionality, we map the Danielle login to
    a user in this database and assign `SELECT` permissions to the `SensitiveData`
    table. We also create a new server audit, called `Audit-Chapter10`, which we use
    as the audit to which our database audit specification attaches. These actions
    are performed in Listing 10-23. Before executing the script, change the file path
    to match your own configuration.


    ```

    USE Master

    GO

    --Create Chapter10Audit Database

    CREATE DATABASE Chapter10Audit

    GO

    USE Chapter10Audit

    GO

    CREATE TABLE dbo.SensitiveData (

    ID    INT    PRIMARY KEY    NOT NULL,

    Data    NVARCHAR(256) NOT NULL

    ) ;

    --Create Server Audit

    USE master

    GO

    CREATE SERVER AUDIT [Audit-Chapter10Audit]

    TO FILE

    (        FILEPATH = N''C:\Audit''

    ,MAXSIZE = 512 MB

    ,MAX_ROLLOVER_FILES = 2147483647

    ,RESERVE_DISK_SPACE = OFF

    )

    WITH

    (        QUEUE_DELAY = 1000

    ,ON_FAILURE = CONTINUE

    ) ;

    USE Chapter10Audit

    GO

    --Create database user from Danielle Login

    CREATE USER Danielle FOR LOGIN Danielle WITH DEFAULT_SCHEMA=dbo ;

    GO

    GRANT SELECT ON dbo.SensitiveData TO Danielle ;

    Listing 10-23

    Creating the Chapter10Audit Database

    ```


    We now look to create a database audit specification that captures any `INSERT`
    statements made against the `SensitiveData` table by any user but also captures
    `SELECT` statements run specifically by Danielle.


    We can create the database audit specification in SQL Server Management Studio
    by drilling through the `Chapter10Audit` database ➤ `Security` and selecting `New
    Database Audit Specification` from the context menu of `Database Audit Specifications`.
    This invokes the `Create Database Audit Specification` dialog box, as illustrated
    in Figure 10-9.


    ![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig9_HTML.jpg](images/333037_2_En_10_Chapter/333037_2_En_10_Fig9_HTML.jpg)


    Figure 10-9


    Database Audit Specification dialog box


    You can see that we named the database audit specification `DatabaseAuditSpecification-Chapter10-SensitiveData`
    and linked it to the `Audit-Chapter10` server audit using the drop-down list.
    In the lower half of the screen, we specified two audit action types, `INSERT`
    and `SELECT`. Because we specified an object class of `OBJECT`, as opposed to
    the other available options of `DATABASE` or `SCHEMA`, we also need to specify
    the object name of the table that we want to audit. Because we only want Danielle’s
    `SELECT` activity to be audited, we add this user to the Principal field for the
    `SELECT` action type, but we add the `Public` role as the principal for the `INSERT`
    action type. This is because all database users will be members of the `Public`
    role, and hence, all `INSERT` activity will be captured, regardless of the user.


    ### Tip


    You can display a complete list of audit class types by running the query `SELECT
    * FROM sys.dm_audit_class_type_map`. You can find a complete list of auditable
    actions by running the query `SELECT * FROM sys.dm_audit_actions`.


    We can create the same database audit specification in T-SQL by using the `CREATE
    DATABASE AUDIT SPECIFICATION` statement, as demonstrated in Listing 10-24.


    ```

    USE Chapter10Audit

    GO

    CREATE DATABASE AUDIT SPECIFICATION [DatabaseAuditSpecification-Chapter10-SensitiveData]

    FOR SERVER AUDIT [Audit-Chapter10]

    ADD (INSERT ON OBJECT::dbo.SensitiveData BY public),

    ADD (SELECT ON OBJECT::dbo.SensitiveData BY Danielle) ;

    Listing 10-24

    Creating the Database Audit Specification

    ```


    Just as we would with a server audit specification, we need to enable the database
    audit specification before any information starts to be collected. The script
    in Listing 10-25 enables both `Audit-Chapter10` and `DatabaseAuditSpecification-Chapter10-SensitiveData`.


    ```

    USE Chapter10Audit

    GO

    ALTER DATABASE AUDIT SPECIFICATION [DatabaseAuditSpecification-Chapter10-SensitiveData]

    WITH (STATE = ON) ;

    GO

    USE Master

    GO

    ALTER SERVER AUDIT [Audit-Chapter10] WITH (STATE = ON) ;

    Listing 10-25

    Enabling the Database Audit Specification

    ```


    To test security, SQL Server allows you to impersonate a user. To do this, you
    must be a sysadmin or be granted the `Impersonate` permissions on the user in
    question. The script in Listing 10-26 impersonates the user Danielle in order
    to check that the auditing is successful. It does this by using the `EXECUTE AS
    USER` command. The `REVERT` command switches the security context back to the
    user who ran the script.


    ```

    USE Chapter10Audit

    GO

    GRANT INSERT, UPDATE ON dbo.sensitiveData TO Danielle ;

    GO

    INSERT INTO dbo.SensitiveData (SensitiveText)

    VALUES (''testing'') ;

    GO

    UPDATE dbo.SensitiveData

    SET SensitiveText = ''Boo''

    WHERE ID = 2 ;

    GO

    EXECUTE AS USER =''Danielle''

    GO

    INSERT dbo.SensitiveData (SensitiveText)

    VALUES (''testing again'') ;

    GO

    UPDATE dbo.SensitiveData

    SET SensitiveText = ''Boo''

    WHERE ID = 1 ;

    GO

    REVERT

    Listing 10-26

    Testing Security with Impersonation

    ```'
