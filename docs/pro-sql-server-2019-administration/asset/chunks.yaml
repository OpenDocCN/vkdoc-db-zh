- fmt: '## Using the New Session Dialog Box


    You can access the New Session dialog box from SQL Server Management Studio by
    first drilling through Management ➤ Extended Events in Object Explorer and then
    by selecting New Session from the Sessions context menu. We use the New Session
    dialog box to create a session that monitors page splits and correlates them with
    the stored procedures that caused them to occur. To allow this, we need to enable
    causality tracking, which gives each event an additional GUID value, called an
    `ActivityID`, and a sequence number; together, these allow the events to be correlated.


    When you invoke the dialog box, the General page displays, as illustrated in Figure
    19-1. On this page, you can specify a name for the session, choose whether or
    not it should start automatically after it is completed and automatically when
    the instance starts, whether the live data view launches after the session completes,
    and if causality tracking should be enabled.


    Because we are going to monitor page splits, we name the session `PageSplits`
    and specify that the session should start automatically, both after creation and
    also when the instance starts. We also turn on causality tracking.


    ![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig1_HTML.jpg](images/333037_2_En_19_Chapter/333037_2_En_19_Fig1_HTML.jpg)

    Figure 19-1: The General page


    On the Events page, we first search for and select the `page_split` and `module_start`
    events, as shown in Figure 19-2. The `module_start` event is triggered every time
    a programmable object fires.


    ![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig2_HTML.jpg](images/333037_2_En_19_Chapter/333037_2_En_19_Fig2_HTML.jpg)

    Figure 19-2: The Events page


    We now need to use the Configure button to configure each of the events. In the
    Global Fields (Actions) tab of the Configure screen, we select the `nt_username`
    and `database_name` actions for the `module_start` event, as illustrated in Figure
    19-3.


    ![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig3_HTML.jpg](images/333037_2_En_19_Chapter/333037_2_En_19_Fig3_HTML.jpg)

    Figure 19-3: The Global Fields (Actions) tab


    ### Tip


    If you need to configure the same actions for multiple events, you can multiselect
    the events.


    On the Filter (Predicate) tab, we configure the `page_split` event to be filtered
    on the `database_name`, which is `Chapter19` in this case, as shown in Figure
    19-4. This means that only page splits relating to this database are captured.
    We do not filter the `module_start` event on the `database_name`, because the
    procedure that caused the page splits could, in theory, have been fired from any
    database.


    ![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig4_HTML.jpg](images/333037_2_En_19_Chapter/333037_2_En_19_Fig4_HTML.jpg)

    Figure 19-4: The Filter (Predicate) tab


    In the Event Fields tab of the Configure screen, the fields that relate to the
    event are displayed. If there are any optional fields, then we are able to select
    them. Figure 19-5 shows that we have selected the `statement` field for the `module_start`
    event.


    ![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig5_HTML.jpg](images/333037_2_En_19_Chapter/333037_2_En_19_Fig5_HTML.jpg)

    Figure 19-5: The Event Fields tab


    On the Data Storage page of the New Session dialog box, we configure the target(s).
    For our scenario, we configure a single event file target, as demonstrated in
    Figure 19-6. The parameters are context sensitive, depending on the type of target
    that you select. Because we have selected a file target, we need to configure
    the location and maximum size of the file. We also need to specify if we want
    new files to be created if the initial file becomes full, and if so, how many
    times this should happen.


    ![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig6_HTML.jpg](images/333037_2_En_19_Chapter/333037_2_En_19_Fig6_HTML.jpg)

    Figure 19-6: The Data Storage page


    On the Advanced page, we can specify the desired behavior in the event of memory
    pressure: whether single-event loss is acceptable, whether multiple-event loss
    is acceptable, or whether there should be no event loss at all. We can also set
    the minimum and maximum size for events and how memory partitioning should be
    applied. This is discussed in more detail in the following section. Additionally,
    we can configure dispatch latency. This indicates the maximum amount of time that
    an event remains in the buffers before it is flushed to disk.


    ## Using T-SQL


    You can also create event sessions via T-SQL using the `CREATE EVENT SESSION`
    DDL statement. The command accepts the arguments detailed in Table 19-3.


    Table 19-3: Create Event Session Arguments


    | Argument | Description |

    | --- | --- |

    | `event_session_name` | The name of the event session that you are creating.
    |

    | `ADD EVENT` / `SET` | Specified for every event that is added to the session,
    followed by the name of the event, in the format `package.event`. You can use
    the `SET` statement to set event-specific customizations, such as including nonmandatory
    event fields. |

    | `ACTION` | Specified after each `ADD EVENT` argument if global fields should
    be captured for that event. |

    | `WHERE` | Specified after each `ADD EVENT` argument if the event should be filtered.
    |

    | `ADD TARGET` / `SET` | Specified for each target that will be added to the session.
    You can use the `SET` statement to populate target-specific parameters, such as
    the filename parameter for the `event_file` target. |


    The statement also accepts the `WITH` options, detailed in Table 19-4. The `WITH`
    statement is specified once, at the end of the `CREATE EVENT SESSION` statement.


    Table 19-4: Create Event Session WITH Options


    | Option | Description |

    | --- | --- |

    | `MAX_MEMORY` | The maximum amount of memory that the event session can use for
    buffering events before dispatching them to the target(s). |

    | `EVENT_RETENTION_MODE` | Specifies the behavior if the buffers become full.
    Acceptable values are `ALLOW_SINGLE_EVENT_LOSS`, which indicates that a single
    event can be dropped if all buffers are full; `ALLOW_MULTIPLE_EVENT_LOSS`, which
    indicates that an entire buffer can be dropped if all buffers are full; and `NO_EVENT_LOSS`,
    which indicates that tasks that cause events to fire are to wait until there is
    space in the buffer. |

    | `MAX_DISPATCH_LATENCY` | The maximum amount of time that events can reside in
    the session buffers before being flushed to the target(s), specified in seconds.
    |

    | `MAX_EVENT_SIZE` | The maximum possible size for event data from any single
    event. It can be specified in kilobytes or megabytes and should only be configured
    to allow events that are larger than the `MAX_MEMORY` setting. |

    | `MEMORY_PARTITION_MODE` | Specifies where event buffers are created. Acceptable
    values are `NONE`, which indicates that the buffers will be created within the
    instance; `PER_NODE`, which indicates that the buffers will be created for each
    NUMA node; and `PER_CPU`, which means that buffers will be created for each CPU.
    |

    | `TRACK_CAUSALITY` | Specifies that an additional GUID and sequence number will
    be stored with each event so that events can be correlated. |

    | `STARTUP_STATE` | Specifies if the session automatically starts when the instance
    starts. `ON` indicates it does, `OFF` indicates it does not. |


    ```sql

    CREATE EVENT SESSION [event_session_name] ON SERVER

    ADD EVENT ...

    ADD TARGET ...

    WITH ( ... );

    ```'
