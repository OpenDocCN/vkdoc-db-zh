- fmt: '# Observing Locks and Contention


    当前实例上锁的详细信息通过一个名为 `sys.dm_tran_locks` 的 DMV 暴露。此 DMV 返回表 18-13 中详述的列。


    表 18-13

    `sys.dm_tran_locks`


    | Column | Description |

    | --- | --- |

    | `resource_type` | 锁已放置在其上的资源类型。 |

    | `resource_subtype` | 已被放置锁的资源类型的子类型。例如，如果你正在更新数据库的属性，那么 `resource_type` 是 `METADATA`，而
    `resource_subtype` 是 `DATABASE`。 |

    | `resource_database_id` | 包含已加锁资源的数据库的 ID。 |

    | `resource_description` | 关于该资源的其他信息，这些信息未包含在其他列中。 |

    | `resource_associated_entity_id` | 与该资源关联的数据库实体的 ID。 |

    | `resource_lock_partition` | 锁的分区号（如果正在使用锁分区）。 |

    | `request_mode` | 已请求或已获取的锁定模式。例如，共享锁为 `S`，排他锁为 `X`。 |

    | `request_type` | `request_type` 始终为 `LOCK`。 |

    | `request_status` | 锁请求的当前状态。可能的值为 `ABORT_BLOCKERS`、`CONVERT`、`GRANTED`、`LOW_PRIORITY_CONVERT`、`LOW_PRIORITY_WAIT`
    和 `WAIT`。 |

    | `request_reference_count` | 请求者对同一资源请求锁的次数。 |

    | `request_session_id` | 当前拥有该请求的会话 ID。如果事务是分布式的，则会话 ID 可能会改变。 |

    | `request_exec_context_id` | 请求锁的进程的执行 ID。 |

    | `request_request_id` | 当前拥有该请求的批处理的批处理 ID。如果应用程序正在使用 Multiple Active Result
    Sets (MARS)，此 ID 可能会改变。 |

    | `request_owner_type` | 锁请求所有者的类型。对于用户操作，可能的值为 `TRANSACTION`、`SESSION` 和 `CURSOR`。值也可以是
    `SHARED_TRANSACTION_WORKSPACE` 和 `EXCLUSIVE_TRANSACTION_WORKSPACE`，它们在内部用于保存已登记事务的锁，或者是
    `NOTIFICATION_OBJECT`，由内部 SQL Server 操作使用。 |

    | `request_owner_id` | 拥有锁请求的事务的 ID，除非请求是由 FileTable 发出的，此时 `-3` 表示表锁，`-4` 表示数据库锁，其他值表示文件的文件句柄。
    |

    | `request_owner_guid` | 标识请求所有者的 GUID。仅适用于分布式事务。 |

    | `lock_owner_address` | 请求的内部数据结构的内存地址。 |


    `sys.dm_os_waiting_tasks` DMV 返回有关等待资源（包括锁）的任务的信息。此 DMV 返回的列详见表 18-14。此 DMV 可与
    `sys.dm_tran_locks` 结合使用，以查找由于锁而被阻塞和正在阻塞的进程的详细信息。


    表 18-14

    `sys.dm_os_waiting_tasks` Columns


    | Column | Description |

    | --- | --- |

    | `waiting_task_address` | 正在等待的任务的地址。 |

    | `session_id` | 运行等待任务的会话的 ID。 |

    | `exec_context_id` | 运行该任务的线程和子线程的 ID。 |

    | `wait_duration_ms` | 等待的持续时间，以毫秒为单位。 |

    | `wait_type` | 正在经历的等待类型。等待在第 17 章中讨论。 |

    | `resource_address` | 任务正在等待的资源的地址。 |

    | `blocking_task_address` | 指示当前正在使用该资源的任务的地址。 |

    | `blocking_session_id` | 当前正在使用该资源的任务的会话 ID。 |

    | `blocking_exec_context_id` | 当前正在使用该资源的任务的线程和子线程的 ID。 |

    | `resource_description` | 关于资源的其他信息，这些信息未包含在其他列中，包括锁资源所有者。 |


    清单 18-14 中的脚本演示了如何使用 `sys.dm_tran_locks` 和 `sys.dm_os_waiting_tasks` 来识别实例上的阻塞。该脚本包含三个部分，每个部分都应在单独的查询窗口中运行。脚本的前两部分导致争用。第三部分识别争用的来源。


    ```

    --Part 1 - Run in 1st query window

    BEGIN TRANSACTION

    UPDATE Customers

    SET CreditLimit = CreditLimit ;

    --Part 2 - Run in 2nd query window

    SELECT creditlimit

    FROM dbo.Customers (SERIALIZABLE) ;

    --Part 3 - Run in 3rd query window

    SELECT

    DB_NAME(tl.resource_database_id) DatabaseName

    ,tl.resource_type

    ,tl.resource_subtype

    ,tl.resource_description

    ,tl.request_mode

    ,tl.request_status

    ,os.session_id BlockedSession

    ,os.blocking_session_id BlockingSession

    ,os.resource_description

    ,OBJECT_NAME(

    CAST(

    SUBSTRING(os.resource_description,

    CHARINDEX(''objid='',os.resource_description,0)+6,9)

    AS INT)

    ) LockedTable

    FROM sys.dm_os_waiting_tasks os

    INNER JOIN sys.dm_tran_locks tl

    ON os.session_id = tl.request_session_id

    WHERE tl.request_owner_type IN (''TRANSACTION'', ''SESSION'', ''CURSOR'') ;

    ```

    清单 18-14

    使用 `sys.dm_tran_locks`


    ## Tip


    要停止阻塞，请在第一个查询窗口中运行 `ROLLBACK`。


    图 18-5 中的结果显示，脚本的第二部分正被脚本的第一部分阻塞。最后一列从 `resource_description` 列中提取对象 ID，并识别发生争用的表。


    ![../images/333037_2_En_18_Chapter/333037_2_En_18_Fig5_HTML.jpg](images/333037_2_En_18_Chapter/333037_2_En_18_Fig5_HTML.jpg)


    图 18-5

    `sys.dm_tran_locks` 结果


    # Observing Deadlocks


    通过打开跟踪标志 1204 和 1222，可以捕获死锁的详细信息并将其写入错误日志。跟踪标志 1204 捕获死锁中涉及的资源和锁类型的详细信息。它包含死锁中涉及的每个节点的一个部分，后面是一个详细说明死锁受害者的内容。跟踪标志
    1222 返回三个部分。第一部分给出死锁受害者的详细信息；第二部分给出死锁中涉及的进程的详细信息；最后一部分描述死锁中涉及的资源。


    在现代 SQL Server 世界中，通常不需要打开这些跟踪标志，因为你可以通过查看系统运行状况会话（`system_health`）来回溯死锁的详细信息，这是每个
    SQL Server 实例上默认启用的 Extended Events 会话。除其他重要详细信息外，系统运行状况会话捕获发生的任何死钻的详细信息。你可以通过在
    SQL Server Management Studio 中深入到 Management ➤ Extended Events ➤ Sessions ➤ `system_health`，然后从
    `Package0.eventfile` 的上下文菜单中选择 View Target Data 来访问系统运行状况会话。如果在 name 列中搜索 `xml_deadlock_report`，你将看到已发生的死锁事件的详细信息。Details
    选项卡提供完整的死锁报告，包括关于死锁受害者以及死锁中涉及的进程、资源和所有者的信息。Deadlock 选项卡显示死锁图，如图 18-6 所示，对应于我们在清单
    18-2 中生成的死锁。


    ## Caution


    如果系统运行状况会话有回滚大小限制，则死锁的详细信息可能会丢失。


    ![../images/333037_2_En_18_Chapter/333037_2_En_18_Fig6_HTML.jpg](images/333037_2_En_18_Chapter/333037_2_En_18_Fig6_HTML.jpg)


    图 18-6

    死锁图'
  raw: '### Observing Locks and Contention


    Details of current locks on the instance are exposed through a DMV called `sys.dm_tran_locks`.
    This DMV returns the columns detailed in Table [18-13](#333037_2_En_18_Chapter.xhtml#Tab13).


    Table 18-13


    sys.dm_tran_locks


    | Column | Description |

    | --- | --- |

    | `resource_type` | The resource type on which the lock has been placed. |

    | `resource_subtype` | The subtype of the resource type that has a lock placed
    on it. For example, if you are updating the properties of a database, then the
    `resource_type` is `METADATA` and the `resource_subtype` is `DATABASE`. |

    | `resource_database_id` | The ID of the database that contains the resource that
    has a lock placed on it. |

    | `resource_description` | Additional information about the resource that is not
    contained in other columns. |

    | `resource_associated_entity_id` | The ID of the database entity with which the
    resource is associated. |

    | `resource_lock_partition` | The partition number of the lock, if lock partitioning
    is being used. |

    | `request_mode` | The locking mode that has been requested or acquired. For example,
    `S` for a shared lock or `X` for an exclusive lock. |

    | `request_type` | The `request_typ`e is always `LOCK`. |

    | `request_status` | The current status of the lock request. Possible values are
    `ABORT_BLOCKERS`, `CONVERT`, `GRANTED`, `LOW_PRIORITY_CONVERT`, `LOW_PRIORITY_WAIT`,
    and `WAIT`. |

    | `request_reference_count` | The number of times that the requestor has requested
    a lock on the same resource. |

    | `request_session_id` | The session ID that currently owns the request. It is
    possible for the session ID to change if the transaction is distributed. |

    | `request_exec_context_id` | The execution ID of the process that requested the
    lock. |

    | `request_request_id` | The Batch ID of the batch that currently owns the request.
    This ID can change if Multiple Active Result Sets (MARS) are being used by the
    application. |

    | `request_owner_type` | The type of the owner of the lock request. Possible vales
    are `TRANSACTION`, `SESSION`, and `CURSOR` for user operations. Values can also
    be `SHARED_TRANSACTION_WORKSPACE` and `EXCLUSIVE_TRANSACTION_WORKSPACE`, which
    are used internally to hold locks for enlisted transactions, or `NOTIFICATION_OBJECT`,
    which is used by internal SQL Server operations. |

    | `request_owner_id` | The ID of the transaction that owns the lock request, unless
    the request was made by a FileTable, in which case `-3` indicates a table lock,
    `-4` indicates a database lock, and other values indicate the file handle of the
    file. |

    | `request_owner_guid` | A GUID identifying the request owner. Only applicable
    to distributed transactions. |

    | `lock_owner_address` | Memory address of the request’s internal data structure.
    |


    The `sys.dm_os_waiting_tasks` DMV returns information about tasks that are waiting
    on resources, including locks. The columns returned by this DMV are detailed in
    Table [18-14](#333037_2_En_18_Chapter.xhtml#Tab14). This DMV can be used with
    `sys.dm_tran_locks` to find the details of processes that are blocked and blocking,
    due to locks.


    Table 18-14


    sys.dm_os_waiting_tasks Columns


    | Column | Description |

    | --- | --- |

    | `waiting_task_address` | The address of the task that is waiting. |

    | `session_id` | The ID of the session in which the waiting task is running. |

    | `exec_context_id` | The ID of the thread and sub-thread that is running the
    task. |

    | `wait_duration_ms` | The duration of the wait, specified in milliseconds. |

    | `wait_type` | The type of wait that is being experienced. Waits are discussed
    in Chapter [17](#333037_2_En_17_Chapter.xhtml). |

    | `resource_address` | The address of the resource the task is waiting for. |

    | `blocking_task_address` | Indicates the address of the task that is currently
    consuming the resource. |

    | `blocking_session_id` | The Session ID of the task that is currently consuming
    the resource. |

    | `blocking_exec_context_id` | The ID of the thread and sub-thread of the task
    that is currently consuming the resource. |

    | `resource_description` | Additional information about the resource, which is
    not contained in other columns, including the lock resource owner. |


    The script in Listing [18-14](#333037_2_En_18_Chapter.xhtml#PC14) demonstrates
    how to use `sys.dm_tran_locks` and `sys.dm_os_waiting_tasks` to identify blocking
    on the instance. The script contains three parts, each of which you should run
    in a separate query window. The first two parts of the script cause contention.
    The third part identifies the source of the contention.


    ```

    --Part 1 - Run in 1st query window

    BEGIN TRANSACTION

    UPDATE Customers

    SET CreditLimit = CreditLimit ;

    --Part 2 - Run in 2nd query window

    SELECT creditlimit

    FROM dbo.Customers (SERIALIZABLE) ;

    --Part 3 - Run in 3rd query window

    SELECT

    DB_NAME(tl.resource_database_id) DatabaseName

    ,tl.resource_type

    ,tl.resource_subtype

    ,tl.resource_description

    ,tl.request_mode

    ,tl.request_status

    ,os.session_id BlockedSession

    ,os.blocking_session_id BlockingSession

    ,os.resource_description

    ,OBJECT_NAME(

    CAST(

    SUBSTRING(os.resource_description,

    CHARINDEX(''objid='',os.resource_description,0)+6,9)

    AS INT)

    ) LockedTable

    FROM sys.dm_os_waiting_tasks os

    INNER JOIN sys.dm_tran_locks tl

    ON os.session_id = tl.request_session_id

    WHERE tl.request_owner_type IN (''TRANSACTION'', ''SESSION'', ''CURSOR'') ;

    Listing 18-14

    Using sys.dm_tran_locks

    ```


    ### Tip


    To stop the blocking, run `ROLLBACK` in the first query window.


    The results in Figure [18-5](#333037_2_En_18_Chapter.xhtml#Fig5) show that the
    second part of our script is being blocked by the first part of the script. The
    final column pulls the Object ID out of the `resource_description` column and
    identifies the table on which the contention is occurring.


    ![../images/333037_2_En_18_Chapter/333037_2_En_18_Fig5_HTML.jpg](images/333037_2_En_18_Chapter/333037_2_En_18_Fig5_HTML.jpg)


    Figure 18-5


    sys.dm_tran_locks results


    ### Observing Deadlocks


    You can capture details of deadlocks and have them written to the error log by
    turning on trace flags 1204 and 1222\. Trace flag 1204 captures details of the
    resources and types of lock involved in a deadlock. It contains a section for
    each node involved in the deadlock, followed by a section detailing the deadlock
    victim. Trace flag 1222 returns three sections. The first gives details of the
    deadlock victim; the second gives details of the processes involved in the deadlock;
    and the final section describes the resources that are involved in the deadlock.


    In the modern world of SQL Server, it is often not necessary to turn on these
    trace flags, since you can find details of deadlocks retrospectively, by looking
    at the system health session, which is an Extended Event session enabled by default
    on every instance of SQL Server. Among other important details, the system health
    session captures details of any deadlocks that occur. You can access the System
    Health Session by drilling through Management ➤ Extended Events ➤ Sessions ➤ `system_health`
    in SQL Server Management Studio, and then by selecting View Target Data from the
    context menu of `Package0.eventfile`. If you search for `xml_deadlock_report`
    in the name column, you will expose details of deadlock incidents that have occurred.
    The Details tab provides the full deadlock report, including information about
    the deadlock victim, and the processes, resources, and owners involved in the
    deadlock. The Deadlock tab displays the Deadlock Graph, as shown in Figure [18-6](#333037_2_En_18_Chapter.xhtml#Fig6),
    for the deadlock that we generated in Listing [18-2](#333037_2_En_18_Chapter.xhtml#PC2).


    ### Caution


    If the system health session has a rollover size limit, then details of deadlock
    can be lost.


    ![../images/333037_2_En_18_Chapter/333037_2_En_18_Fig6_HTML.jpg](images/333037_2_En_18_Chapter/333037_2_En_18_Fig6_HTML.jpg)


    Figure 18-6


    Deadlock Graph'
