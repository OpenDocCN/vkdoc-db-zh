  trans: '### 数据库角色


    正如实例级别存在帮助管理权限的服务器角色一样，数据库级别也存在数据库角色，可以将主体分组在一起以分配共同的权限。有内置的数据库角色，但也可以定义自己的角色，以满足特定数据层应用程序的需求。


    SQL Server 2019 中可用的内置数据库角色如表 10-2 所示。


    表 10-2

    数据库角色


    | 数据库角色 | 说明 |

    | --- | --- |

    | `db_accessadmin` | 此角色的成员可以向数据库添加用户或从中删除数据库用户。 |

    | `db_backupoperator` | `db_backupoperator` 角色赋予用户原生备份数据库所需的权限。对于第三方备份工具（如 CommVault
    或 Backup Exec），它可能不起作用，因为这些工具通常需要 `sysadmin` 权限。 |

    | `db_datareader` | `db_datareader` 角色的成员可以对数据库中的任何表执行 `SELECT` 语句。可以通过明确拒绝用户对特定表的权限来覆盖此设置。`DENY`
    会覆盖 `GRANT`。 |

    | `db_datawriter` | `db_datawriter` 角色的成员可以对数据库中的任何表执行 `DML`（数据操作语言）语句。可以通过明确拒绝用户对特定表的权限来覆盖此设置。`DENY`
    将覆盖 `GRANT`。 |

    | `db_denydatareader` | `db_denydatareader` 角色拒绝其成员对数据库中每个表的 `SELECT` 权限。 |

    | `db_denydatawriter` | `db_denydatawriter` 角色拒绝其成员对数据库中每个表执行 `DML` 语句的权限。 |

    | `db_ddladmin` | 此角色的成员被授予对数据库中任何对象运行 `CREATE`、`ALTER` 和 `DROP` 语句的能力。此角色很少使用，但我曾见过一些示例或编写不佳的应用程序会动态创建数据库对象。如果你负责管理此类应用程序，那么
    `ddl_admin` 角色可能很有用。 |

    | `db_owner` | `db_owner` 角色的成员可以在数据库中执行任何未被明确拒绝的操作。 |

    | `db_securityadmin` | 此角色的成员可以授予、拒绝和撤销用户对安全对象的权限。他们还可以添加或删除角色成员，但 `db_owner`
    角色除外。 |


    你可以在 SQL Server Management Studio 中创建自己的数据库角色，操作路径为：依次展开 `数据库` ➤ `你的数据库` ➤ `安全性`，然后在对象资源管理器中数据库角色的上下文菜单中选择
    `新建数据库角色`。这将显示 `数据库角色 - 新建` 对话框的 `常规` 选项卡。在这里，你应将角色名称指定为 `db_ReadOnlyUsers`，并声明该角色将由
    `dbo` 所有。`dbo` 是 `sysadmin` 服务器角色成员所映射的系统用户。然后，我们使用了 `添加` 按钮将 Danielle 添加到该角色。


    在 `安全对象` 选项卡上，我们可以搜索要授予权限的对象，然后为这些对象选择适当的权限。图 10-4 展示了搜索属于 `dbo` 架构对象的结果。接着，我们选择了该角色应对
    `SensitiveData` 表拥有 `SELECT` 权限，但应明确拒绝 `DELETE`、`INSERT` 和 `UPDATE` 权限。


    ![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig4_HTML.jpg](img/333037_2_En_10_Fig4_HTML.jpg)


    图 10-4

    安全对象选项卡


    因为当前我们的 `Chapter10` 数据库中只有一个表，所以此角色在功能上等同于将 Danielle 添加到内置的 `db_datareader` 和
    `db_denydatawriter` 数据库角色。最大的区别在于，当我们在数据库中创建新表时，分配给我们的 `db_ReadOnlyUsers` 角色的权限将继续仅适用于
    `SensitiveData` 表。这与 `db_datareader` 和 `db_denydatawriter` 角色形成对比，后者会为任何新建的表分配相同的权限集。


    创建 `db_ReadOnlyUsers` 角色的另一种方法是使用清单 10-8 中的 T-SQL 脚本。你可以看到我们不得不使用多个命令来设置该角色。第一条命令创建角色并使用
    `AUTHORIZATION` 子句指定所有者。第二条命令将 Danielle 添加为角色的成员，随后的命令使用 `GRANT` 和 `DENY` 关键字为该主体分配对安全对象的适当权限。


    ```

    --Set Up the Role

    CREATE ROLE db_ReadOnlyUsers AUTHORIZATION dbo ;

    GO

    ALTER ROLE db_ReadOnlyUsers ADD MEMBER Danielle ;

    GRANT SELECT ON dbo.SensitiveData TO db_ReadOnlyUsers ;

    DENY DELETE ON dbo.SensitiveData TO db_ReadOnlyUsers ;

    DENY INSERT ON dbo.SensitiveData TO db_ReadOnlyUsers ;

    DENY UPDATE ON dbo.SensitiveData TO db_ReadOnlyUsers ;

    GO

    ```


    清单 10-8

    创建数据库角色


    #### 提示


    尽管 `DENY` 赋值在某些场景下可能很有帮助——例如，当你想为除一个表之外的所有表分配安全对象权限时——但在结构良好的安全层级中，请谨慎使用它们。`DENY`
    赋值会增加安全管理的复杂性，并且在大多数情况下，你可以通过专门使用 `GRANT` 赋值来实施最小权限原则。'
- fmt: '### Schemas


    Schemas provide a logical namespace for database objects while at the same time
    abstracting an object from its owner. Every object within a database must be owned
    by a database user. In much older versions of SQL Server, this ownership was direct.
    In other words, a user named Bob could have owned ten individual tables. From
    SQL Server 2005 onward, however, this model has changed so that Bob now owns a
    schema, and the ten tables are part of that schema.


    This abstraction simplifies changing the ownership of database objects; in this
    example, to change the owner of the ten tables from Bob to Colin, you need to
    change the ownership in one single place (the schema) as opposed to changing it
    on all ten tables.


    Well-defined schemas can also help simplify the management of permissions, because
    you can assign principal permissions on a schema, as opposed to the individual
    objects within that schema. For example, if you had five sales-related tables—`OrderHeaders`,
    `OrderDetails`, `StockList`, `PriceList`, and `Customers`—putting all five tables
    within a single schema named `Sales` allows you to apply the `SELECT`, `UPDATE`,
    and `INSERT` permissions on the `Sales` schema to the `SalesUsers` database role.
    Assigning permissions to an entire schema does not just affect tables, however.
    For example, granting `SELECT` on a schema also gives `SELECT` permissions to
    all views within the schema. Granting the `EXECUTE` permission on a schema grants
    `EXECUTE` on all procedures and functions within the schema.


    For this reason, well-designed schemas group tables by business rules, as opposed
    to technical joins. Consider the entity relationship diagram in Figure 10-5.


    ![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig5_HTML.jpg](images/333037_2_En_10_Chapter/333037_2_En_10_Fig5_HTML.jpg)


    Figure 10-5


    Entity relationship diagram


    A good schema design for this example would involve three schemas, which are split
    by business responsibility—`Sales`, `Procurement`, and `Accounts`. Table 10-3
    demonstrates how these tables can be split and permissions can then be assigned
    to the tables via database roles.


    Table 10-3


    Schema Permissions


    | Schema | Table | Database Role | Permissions |

    | --- | --- | --- | --- |

    | `Sales` | `OrderHeader``OrderDetails``Customers``Addresses` | `Sales` | `SELECT`,
    `INSERT`, `UPDATE` |

    | `Accounts` | `SELECT` |

    | `Procurement` | `Products``Vendors` | `Purchasing` | `SELECT`, `INSERT`, `UPDATE`
    |

    | `Sales` | `SELECT` |

    |   |   | `Accounts` | `SELECT` |

    | `Accounts` | `Invoices``CustAccountHistory``VendAccountHistory` | `Accounts`
    | `SELECT`, `INSERT`, `UPDATE` |


    The command in Listing 10-9 creates a schema called `CH10` and then grants the
    user Danielle `SELECT` permissions on the `dbo` schema. This will implicitly give
    her `SELECT` permissions on all tables within this schema, including new tables,
    which are yet to be created.


    ```sql

    CREATE SCHEMA CH10 ;

    GO

    GRANT SELECT ON SCHEMA::CH10 TO Danielle ;

    ```


    Listing 10-9


    Granting Permissions on a Schema


    To change a table’s schema post creation, use the `ALTER SCHEMA TRANSFER` command,
    as demonstrated in Listing 10-10. This script creates a table without specifying
    a schema. This means that it is automatically placed in the `dbo` schema. It is
    then moved to the `CH10` schema.


    ```sql

    CREATE TABLE TransferTest

    (

    ID int

    ) ;

    GO

    ALTER SCHEMA CH10 TRANSFER dbo.TransferTest ;

    GO

    ```


    Listing 10-10


    Transferring an Object Between Schemas


    ### Creating and Managing Contained Users


    We have already seen how to create a database user, which maps to a login at the
    instance level. It is also possible to create a database user, which does not
    map to a server principal, however. This is to support a technology called `contained
    databases`.


    `Contained databases` allow you to reduce a database’s dependency on the instance
    by isolating aspects such as security. This makes the database easier to move
    between instances and helps support technologies such as AlwaysOn Availability
    Groups, which are discussed in Chapter 14.


    Currently, SQL Server supports the database containment levels of `NONE`, which
    is the default, and `PARTIAL`. `PARTIAL` indicates that the database supports
    contained database users and that metadata is stored inside the database using
    the same collation. However, the database can still interact with no-contained
    features, such as users mapped to logins at the instance level. There is currently
    no option for `FULL` containment, since there is no way to stop the database from
    interacting with objects outside its boundaries.


    In order to use contained databases, you must enable them at both the instance
    and the database level. You can enable them at both levels by using the Server
    Properties and Database Properties dialog boxes in SQL Server Management Studio.
    Alternatively, you can enable them at the instance level by using `sp_configure`
    and at the database level by using the `ALTER DATABASE` statement. The script
    in Listing 10-11 demonstrates how to enable contained databases for the instance
    and the `Chapter10` database using T-SQL. To use the `ALTER DATABASE` command,
    you need to disconnect users from the database.


    ```sql

    --Enable contained databases at the instance level

    EXEC sp_configure ''show advanced options'', 1 ;

    GO

    RECONFIGURE ;

    GO

    EXEC sp_configure ''contained database authentication'', ''1'' ;

    GO

    RECONFIGURE WITH OVERRIDE ;

    GO

    --Set Chapter10 database to use partial containment

    USE Master

    GO

    ALTER DATABASE [Chapter10] SET CONTAINMENT = PARTIAL WITH NO_WAIT ;

    GO

    ```


    Listing 10-11


    Enabling Contained Databases


    Once you have enabled contained databases, you can create database users that
    are not associated with a login at the instance level. You can create a user from
    a Windows user or group by using the syntax demonstrated in Listing 10-12. This
    script creates a database user that maps to the `Chapter10Users` domain group.
    It specifies that `dbo` is the default schema.


    ```sql

    USE Chapter10

    GO

    CREATE USER [PROSQLADMIN\Chapter10Users] WITH DEFAULT_SCHEMA=dbo ;

    GO

    ```


    Listing 10-12


    Creating a Database User from a Windows Login


    Alternatively, to create a database user who is not mapped to a login at the instance
    level but who still relies on second tier authentication, you can use the syntax
    in Listing 10-13. This script creates a user in the `Chapter10` database called
    `ContainedUser`.


    ```sql

    USE Chapter10

    GO

    CREATE USER ContainedUser WITH PASSWORD=N''Pa$$w0rd'', DEFAULT_SCHEMA=dbo ;

    GO

    ```


    Listing 10-13


    Creating a Database User with Second Tier Authentication'
