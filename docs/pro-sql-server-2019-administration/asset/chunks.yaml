  raw: '#### Jobs


    A job is comprised of a series of actions that you should perform. Each action
    is known as a *job step*. You can configure each job step to perform an action
    within one of the following categories:


    *   SSIS packages


    *   T-SQL commands


    *   PowerShell scripts


    *   Operating system commands


    *   Replication Distributor tasks


    *   Replication Merge Agent tasks


    *   Replication Queue Reader Agent tasks


    *   Replication Snapshot Agent tasks


    *   Replication Transaction Log Reader tasks


    *   Analysis Services commands


    *   Analysis Services queries


    You can configure each job step, with the exception of T-SQL commands, to run
    under the context of the service account running the SQL Server Agent service
    or to run under a proxy account, which is linked to a credential. You can also
    configure each step to retry a specific number of times, with an interval between
    each retry.


    Additionally, you can configure On Success and On Failure actions individually
    for each job step. This allows DBAs to implement decision-based logic and error
    handling, as outlined in Figure [22-1](#333037_2_En_22_Chapter.xhtml#Fig1).


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig1_HTML.png](images/333037_2_En_22_Chapter/333037_2_En_22_Fig1_HTML.png)


    Figure 22-1


    Decision-tree logic


    You can run each job on a schedule that you can create specifically for the job
    that you are configuring, or share between multiple jobs, which should all run
    on the same schedule.


    You can also configure notifications for each job. A notification alerts an operator
    to the success or failure of a job, but you can also configure it to write entries
    to the Windows Application Event Log or even delete the job.


    #### Alerts


    *Alerts* respond to events that occur in SQL Server and have been written to the
    Windows application event log. Alerts can respond to the following categories
    of activity:


    *   SQL Server events


    *   SQL Server performance conditions


    *   WMI events


    When you create an alert against a SQL Server events category, you can configure
    it to respond to a specific error message or to a specific error severity level
    that occurs. You can also filter alerts so that they only fire if the error or
    warning contains specific text. They can also be filtered by the specific database
    in which they occur.


    When you create alerts against the SQL Server performance conditions category,
    they are configured so they are triggered if a counter falls below, becomes equal
    to, or rises above a specified value. When configuring such an alert, you need
    to select the performance object that is essentially the category of performance
    condition, the counter within that performance object, and the instance of the
    counter that you wish to alert against. So, for example, to trigger an alert in
    the event that the Percentage Log Used for the `Chapter22` database rises above
    70%, you would select the Databases object, the Percent Log Used counter, and
    the `Chapter22` instance and configure the alert to be triggered if this counter
    rises above 70. A complete list of performance objects and their associated performance
    counters can be revealed by running the query in Listing [22-1](#333037_2_En_22_Chapter.xhtml#PC1).


    ```

    SELECT

    object_name

    , counter_name

    FROM msdb.dbo.sysalerts_performance_counters_view

    ORDER BY object_name

    Listing 22-1

    Listing Performance Objects and Counters

    ```


    ### SQL Server Agent Security


    You control access to SQL Server Agent via database roles, and you can run job
    steps under the context of the SQL Server Agent service account or by using separate
    proxy accounts that map to credentials. Both of these concepts are explored in
    the following sections.


    #### SQL Server Agent Database Roles


    Other than members of the sysadmin server role, who have full access to SQL Server
    Agent, access can be granted to SQL Server Agent using fixed database roles within
    the MSDB database. The following roles are provided:


    *   `SQLAgentUserRole`


    *   `SQLAgentReaderRole`


    *   `SQLAgentOperatorRole`


    The permissions provided by the roles are detailed in Table [22-1](#333037_2_En_22_Chapter.xhtml#Tab1).
    Members of the sysadmin role are granted all permissions to SQL Server Agent.
    This includes permissions that are not provided by any of the SQL Server Agent
    roles, such as editing multiserver job properties. Actions that are not possible
    through SQL Server Agent role membership can only be actioned by members of the
    sysadmin role.


    Table 22-1


    SQL Server Agent Permissions Matrix


    | Permission | SQLAgentUserRole | SQLAgentReaderRole | SQLAgentOperatorRole |

    | --- | --- | --- | --- |

    | `CREATE`/`ALTER`/`DROP` operator | No | No | No |

    | `CREATE`/`ALTER`/`DROP` local job | Yes (Owned only) | Yes (Owned only) | Yes
    (Owned only) |

    | `CREATE`/`ALTER`/`DROP` multiserver job | No | No | No |

    | `CREATE`/`ALTER`/`DROP` schedule | Yes (Owned only) | Yes (Owned only) | Yes
    (Owned only) |

    | `CREATE`/`ALTER`/`DROP` proxy | No | No | No |

    | `CREATE`/`ALTER`/`DROP` alerts | No | No | No |

    | View list of operators | Yes | Yes | Yes |

    | View list of local jobs | Yes (Owned only) | Yes | Yes |

    | View list of multiserver jobs | No | Yes | Yes |

    | View list of schedules | Yes (Owned only) | Yes | Yes |

    | View list of proxies | Yes | Yes | Yes |

    | View list of alerts | No | No | No |

    | Enable/disable operators | No | No | No |

    | Enable/disable local jobs | Yes (Owned only) | Yes (Owned only) | Yes |

    | Enable/disable multiserver jobs | No | No | No |

    | Enable/disable schedules | Yes (Owned only) | Yes (Owned only) | Yes |

    | Enable/disable alerts | No | No | No |

    | View operator properties | No | No | Yes |

    | View local job properties | Yes (Owned only) | Yes | Yes |

    | View multiserver job properties | No | Yes | Yes |

    | View schedule properties | Yes (Owned only) | Yes | Yes |

    | View proxy properties | No | No | Yes |

    | View alert properties | No | No | Yes |

    | Edit operator properties | No | No | No |

    | Edit local job properties | No | Yes (Owned only) | Yes (Owned only) |

    | Edit multiserver job properties | No | No | No |

    | Edit schedule properties | No | Yes (Owned only) | Yes (Owned only) |

    | Edit proxy properties | No | No | No |

    | Edit alert properties | No | No | No |

    | Start/stop local jobs | Yes (Owned only) | Yes (Owned only) | Yes |

    | Start/stop multiserver jobs | No | No | No |

    | View local job history | Yes (Owned only) | Yes | Yes |

    | View multiserver job history | No | Yes | Yes |

    | Delete local job history | No | No | Yes |

    | Delete multiserver job history | No | No | No |

    | Attach/detach schedules | Yes (Owned only) | Yes (Owned only) | Yes (Owned only)
    |


    #### SQL Server Agent Proxy Accounts


    By default, all job steps run under the context of the SQL Server Agent service
    account. Adopting this approach, however, can be a security risk, since you may
    need to grant the service account a large number of permissions to the instance
    and objects within the operating system. The amount of permissions you need to
    grant the service account is especially important for jobs that require cross-server
    access.


    To mitigate this risk and follow the principle of least privilege, you should
    instead consider using proxy accounts. Proxies are mapped to credentials within
    the instance level and you can configure them to run only a subset of step types.
    For example, you can configure one proxy to be able to run operating system commands
    while configuring another to be able to run only PowerShell scripts. This means
    that you can reduce the permissions that each proxy requires.


    For job steps with the Transact-SQL (T-SQL) script step type, it is not possible
    to select a proxy account. Instead, the Run As User option allows you to select
    a database user to use as the security context to run the script. This option
    uses the `EXECUTE AS` functionality in T-SQL to change the security context.'
  trans: "#### 作业\n\n一个作业由一系列你应该执行的操作组成。每个操作被称为一个 `job step`（作业步骤）。你可以将每个作业步骤配置为执行以下类别之一的操作：\n\
    \n*   SSIS 包\n*   T-SQL 命令\n*   PowerShell 脚本\n*   操作系统命令\n*   复制分发器任务\n*   复制合并代理任务\n\
    *   复制队列读取器代理任务\n*   复制快照代理任务\n*   复制事务日志读取器任务\n*   分析服务命令\n*   分析服务查询\n\n除了 T-SQL\
    \ 命令外，你可以配置每个作业步骤，使其在运行 SQL Server Agent 服务的服务账户上下文下运行，或者在代理账户下运行（代理账户链接到凭据）。你还可以配置每个步骤重试特定的次数，以及每次重试之间的间隔。\n\
    \n此外，你可以为每个作业步骤单独配置“成功时”和“失败时”的操作。这使得数据库管理员能够实现基于决策的逻辑和错误处理，如图 22-1 所示。\n\n![图\
    \ 22-1 决策树逻辑](img/333037_2_En_22_Fig1_HTML.png)\n\n你可以在专为正在配置的作业创建的计划上运行每个作业，也可以在多个作业之间共享计划（这些作业都应在同一计划上运行）。\n\
    \n你还可以为每个作业配置通知。通知会向操作员提醒作业的成功或失败，但你也可以配置它将条目写入 Windows 应用程序事件日志，甚至删除该作业。\n\n\
    #### 警报\n\n`Alerts`（警报）响应写入 Windows 应用程序事件日志的 SQL Server 中发生的事件。警报可以响应以下类别的活动：\n\
    \n*   SQL Server 事件\n*   SQL Server 性能条件\n*   WMI 事件\n\n当你针对 SQL Server 事件类别创建警报时，可以配置它响应特定的错误消息或发生的特定错误严重级别。你还可以过滤警报，使其仅在错误或警告包含特定文本时触发。它们也可以按发生错误的具体数据库进行过滤。\n\
    \n当你针对 SQL Server 性能条件类别创建警报时，它们的配置使得当计数器低于、等于或高于指定值时触发。配置此类警报时，你需要选择本质上是性能条件类别的性能对象、该性能对象内的计数器，以及你希望针对其发出警报的计数器实例。例如，要触发一个警报，在`Chapter22`数据库的“日志使用百分比”计数器超过\
    \ 70% 时，你需要选择 Databases（数据库）对象、Percent Log Used（日志使用百分比）计数器和`Chapter22`实例，并配置警报在该计数器超过\
    \ 70 时触发。运行清单 22-1 中的查询可以显示性能对象及其关联性能计数器的完整列表。\n\n```sql\nSELECT\n    object_name\n\
