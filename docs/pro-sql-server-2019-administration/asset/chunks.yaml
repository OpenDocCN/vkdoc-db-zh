    \ = 'AEAD_AES_256_CBC_HMAC_SHA_256') NOT NULL,\n    CustomerID INT NOT NULL\n\
    ) ;\nListing 11-19\nCreate the CreditCards Table with Encrypted Columns\n```"
  raw: '### Note


    Be sure to change the server and key names to match your own.


    ```

    Add-HgsAttestationHostKey -Name WIN-2RDHRBC9VK8 -Path c:\keys\WIN-2RDHRBC9VK8key.cer

    Listing 11-15

    Import Client Key into Attestation Service

    ```


    The final step in the registration process is to configure the client, which can
    be achieved using the script in Listing [11-16](#333037_2_En_11_Chapter.xhtml#PC16).
    Be sure to change the IP address of the attestation service to match your own,
    before running the script.


    ```

    $params = @{

    AttestationServerUrl   = ''http://10.0.0.3/Attestation''

    KeyProtectionServerUrl = ''http://10.0.0.3/KeyProtection''

    }

    Set-HgsClientConfiguration @params

    Listing 11-16

    Configure the Client

    ```


    Now that our server is registered as a guarded host, we can create the certificate
    and keys which will be used by Always Encrypted. This can be done using the script
    in Listing [11-17](#333037_2_En_11_Chapter.xhtml#PC17).


    ```

    # Create a certificate, to encrypt the column master key. It will be stored in
    the Windows Certificate Store, under Current User

    $params = @{

    Subject           = "AlwaysEncryptedCert"

    CertStoreLocation = ''Cert:\CurrentUser\My''

    KeyExportPolicy   = ''Exportable''

    Type              = ''DocumentEncryptionCert''

    KeyUsage          = ''DataEncipherment''

    KeySpec           = ''KeyExchange''

    }

    $certificate = New-SelfSignedCertificate @params

    # Import the SqlServer module.

    Import-Module "SqlServer"

    # Connect to the Chapter11AlwaysEncrypted database

    $serverName = "{0}\prosqladmin" -f $env:COMPUTERNAME

    $databaseName = "Chapter11AlwaysEncrypted"

    $connectionString = "Data Source = {0}; Initial Catalog = {1}; Integrated Security
    = true" -f @(

    $serverName

    $databaseName

    )

    $database = Get-SqlDatabase -ConnectionString $connectionString

    # Create a settings object, specifying -AllowEnclaveComputations to make the key
    Enclave Enabled

    $params = @{

    CertificateStoreLocation = ''CurrentUser''

    Thumbprint = $certificate.Thumbprint

    AllowEnclaveComputations = $true

    }

    $cmkSettings = New-SqlCertificateStoreColumnMasterKeySettings @params

    # Create the Column Master Key.

    $cmkName = ''ColumnMasterKey''

    $params = @{

    Name = $cmkName

    InputObject = $database

    ColumnMasterKeySettings = $cmkSettings

    }

    New-SqlColumnMasterKey @params

    # Create a Column Encryption Key, encrypted with the Column Master Key

    $params = @{

    Name = ''ColumnEncryptionKey''

    InputObject = $database

    ColumnMasterKey = $cmkName

    }

    New-SqlColumnEncryptionKey @params

    Listing 11-17

    Create the Always Encrypted Cryptographic Objects

    ```


    When creating the Column Master Key, we specified a Key Store parameter. Table
    [11-4](#333037_2_En_11_Chapter.xhtml#Tab4) details the key stores that are supported
    for Always Encrypted. If we wish to use Secure Enclaves, however, we must not
    choose the CNG store.


    Table 11-4


    Key Store Values


    | Key Store Type | Description |

    | --- | --- |

    | Windows Certificate Store—Current User | The key or certificate is stored in
    the area of the Windows Certificate Store that is reserved for the profile of
    the user that created the certificate. This option may be appropriate if you use
    the database engine’s service account interactively to create the certificate.
    |

    | Windows Certificate Store—Local Machine | The key or certificate is stored in
    the area of the Windows Certificate Store that is reserved for the local machine.
    |

    | Azure Key Vault | The key or certificate is stored in the Azure Key Vault EKM
    service. |

    | Key Storage Provider (CNG) | The key or certificate is stored in an EKM store
    that supports Cryptography API: Next Generation. |


    The next step is to enable secure enclaves within the SQL Server instance. Unlike
    most instance configurations, the instance must be restarted for the change to
    take effect. The script in Listing [11-18](#333037_2_En_11_Chapter.xhtml#PC18)
    will change the configuration.


    ```

    EXEC sys.sp_configure ''column encryption enclave type'', 1;

    RECONFIGURE ;

    Listing 11-18

    Enable Secure Enclaves

    ```


    ### Tip


    In prerelease versions of SQL Server 2019, Trace Flag 127 must be enabled globally,
    to enable rich computations.


    We now want to encrypt the `CreditCardNumber`, `ExpMonth`, and `ExpYear` columns
    of the `dbo.CreditCards` table, which is loosely based on the `Sales.CreditCard`
    table of the `AdventureWorks` database.


    When encrypting the data, we have a choice of two methods: deterministic or randomized.
    This is an important decision to understand, as it may have an impact on performance,
    security, and the features that are available with secure enclaves.


    Deterministic encryption will always produce the same encrypted value for the
    same plaintext value. This means that if deterministic encryption is used, operations
    including equality joins, grouping, and indexing are possible on an encrypted
    column, proving a BIN2 collation is used for the column. This leaves the possibility
    of attacks against the encryption, however.


    If you use randomized encryption, then different encrypted values can be generated
    for the same plaintext values. This means that while encryption loopholes are
    plugged, for standard Always Encrypted implementations, equality joins, grouping,
    and indexing are not supported against the encrypted data.


    When implementing Always Encrypted with secure enclaves, however, more functionality
    is available when using randomized encryption, than it is when using deterministic
    encryption. Table [11-5](#333037_2_En_11_Chapter.xhtml#Tab5) details the compatibility
    of deterministic and randomized encryption, with and without secure enclaves.


    Table 11-5


    Encryption Types and Feature Compatibility


    | Encryption Type | In-Place Encryption | Equality Comparisons | Rich Computations
    | Like |

    | --- | --- | --- | --- | --- |

    | Deterministic Without Enclaves | No | Yes | No | No |

    | Deterministic With Enclaves | Yes | Yes | No | No |

    | Randomized Without Enclaves | No | No | No | No |

    | Randomized With Enclaves | Yes | Yes (Inside Enclave) | Yes | Yes |


    We will use randomized encryption, so that we can fully benefit from secure enclave
    functionality. The script in Listing [11-19](#333037_2_En_11_Chapter.xhtml#PC19)
    will create the `Chapter11AlwaysEncrypted` database, before creating the `dbo.CreditCards`
    table, which is loosely based on the `Sales.CreditCards` table from the `AdventureWorks`
    database.


    ```

    CREATE TABLE dbo.CreditCards

    (

    CardID     INT      IDENTITY     NOT NULL,

    CardType   NVARCHAR(20)  NOT NULL,

    CardNumber NVARCHAR(20)  COLLATE Latin1_General_BIN2 ENCRYPTED WITH (

    COLUMN_ENCRYPTION_KEY = [ColumnEncryptionKey],

    ENCRYPTION_TYPE = Randomized,

    ALGORITHM = ''AEAD_AES_256_CBC_HMAC_SHA_256'') NOT NULL,

    ExpMonth   INT ENCRYPTED WITH (

    COLUMN_ENCRYPTION_KEY = [ColumnEncryptionKey],

    ENCRYPTION_TYPE = Randomized,

    ALGORITHM = ''AEAD_AES_256_CBC_HMAC_SHA_256'') NOT NULL,

    ExpYear    INT ENCRYPTED WITH (

    COLUMN_ENCRYPTION_KEY = [ColumnEncryptionKey],

    ENCRYPTION_TYPE = Randomized,

    ALGORITHM = ''AEAD_AES_256_CBC_HMAC_SHA_256'') NOT NULL,

    CustomerID INT NOT NULL

    ) ;

    Listing 11-19

    Create the CreditCards Table with Encrypted Columns

    ```'
