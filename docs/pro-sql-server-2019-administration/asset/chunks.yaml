    # 11. 加密


    ## 概要


    SQL Server 提供了一个复杂的安全框架来管理权限，该框架包含多个相互重叠的层级。在实例级别，您可以基于 Windows 用户或组创建登录名，也可以创建二级登录名，其密码存储在数据库引擎内部。二级身份验证要求在实例级别启用混合模式身份验证。


    服务器角色允许将登录名分组，以便可以为它们分配共同的权限。这减轻了安全管理的管理开销。SQL Server 为常见场景提供了内置的服务器角色，您也可以创建满足数据层应用程序需求的自定义服务器角色。


    在数据库级别，登录名可以映射到数据库用户。如果您使用的是包含数据库，那么还可以创建直接映射到 Windows 安全主体或具有自己二级身份验证凭据的数据库用户。这可以通过消除对实例级别登录名的依赖，帮助将数据库与实例隔离。这有助于提高数据库的可移植性，但需要额外考虑安全问题。


    细粒度权限可能变得难以管理，尤其是在需要在列级别保护数据时。SQL Server 提供了所有权链，可以降低这种复杂性。通过所有权链，可以针对视图分配权限，而不是针对底层表。甚至可以跨多个数据库使用所有权链，当然，这本身也会带来复杂性。为了使所有权链成功，链中的所有对象必须共享同一个所有者。否则所有权链将被中断，并且需要对底层对象的权限进行评估。


    服务器审核允许在实例和数据库级别对活动进行细粒度审计。它还包括审计审计本身的能力，从而消除了特权用户恶意绕过审计的威胁。您可以将审核保存到操作系统中的文件，并通过
    NTFS 控制权限。或者，您可以将审核保存到 Windows 安全日志或 Windows 应用程序日志中。


    加密是一种使用算法（该算法使用密钥和证书）来混淆数据的过程，因此如果安全性被绕过，数据被未授权用户访问或窃取，那么这些数据将变得无用，除非同时也获得了用于加密它的密钥。这在访问控制之上增加了一个额外的安全层，但它并不能取代访问控制实施的需要。加密数据也有可能显著降低性能，因此您应该基于需要来使用它，而不是作为常规操作在所有数据上实施。


    在本章中，我们将讨论 SQL Server 加密层次结构，然后演示如何实现透明数据加密（TDE）以及单元级加密。我们还将讨论 Always Encrypted
    和安全飞地。


    ## 加密层次结构


    SQL Server 提供了通过密钥和证书的层次结构对数据进行加密的能力。层次结构中的每一层都对它下面的一层进行加密。


    ### 加密概念


    在我们详细讨论层次结构之前，了解与加密相关的概念很重要。以下各节概述了加密中涉及的主要组件。


    #### 对称密钥


    `对称密钥`是一种可用于加密数据的算法。它是最弱的一种加密形式，因为它使用相同的算法来加密和解密数据。它也是性能开销最小的加密方法。您可以使用密码或另一个密钥或证书来加密对称密钥。


    #### 非对称密钥


    与使用相同算法加密和解密数据的对称密钥相比，`非对称密钥`使用一对密钥或算法。您可以使用一个仅用于加密，另一个仅用于解密。用于加密数据的密钥称为`私钥`，用于解密数据的密钥称为`公钥`。


    #### 证书


    证书由称为`证书颁发机构 (CA)`的可信来源颁发。它使用非对称密钥，并提供数字签名声明，将公钥绑定到持有相应私钥的主体或设备。


    #### Windows 数据保护 API


    `Windows 数据保护 API (DPAPI)` 是随 Windows 操作系统一起提供的加密应用程序编程接口 (API)。它允许使用用户或域机密信息对密钥进行加密。`DPAPI`
    用于加密 `服务主密钥`，该密钥是 SQL Server 加密层次结构的顶层。


    ### SQL Server 加密概念


    SQL Server 的加密功能依赖于密钥和证书的层次结构，根级别是 `服务主密钥`。以下各节描述了主密钥的用途以及 SQL Server 的加密层次结构。


    #### 主密钥


    SQL Server 加密层次结构的根级别是 `服务主密钥`。`服务主密钥`在实例构建时自动创建，并用于使用 `DPAPI` 加密数据库主密钥、凭据和链接服务器的密码。`服务主密钥`存储在
    Master 数据库中，每个实例始终只有一个。在 SQL Server 2012 及更高版本中，`服务主密钥`是使用 `AES 256` 算法生成的对称密钥。这与使用
    `Triple DES` 算法的旧版 SQL Server 形成对比。


    由于 SQL Server 2012 及更高版本使用了新的加密算法，当您从 SQL Server 2008 R2 或更早版本升级实例时，建议重新生成密钥。


    然而，重新生成 `服务主密钥`的问题在于，它涉及解密然后重新加密层次结构中位于其下方的每个密钥和证书。这是一个非常耗费资源的过程，应仅在维护窗口期间尝试。


    您可以使用清单 11-1 中的命令重新生成 `服务主密钥`。但您应该注意，如果该过程未能解密和重新加密其层次结构下方的任何密钥，则整个重新生成过程将失败。您可以使用
    `FORCE` 关键字更改此行为。`FORCE` 关键字强制该过程在错误后继续。请注意，这将导致任何无法解密和重新加密的数据变得不可用。您将无法重新获得对这些数据的访问权限。


    ```sql

    ALTER SERVICE MASTER KEY REGENERATE

    ```


    *清单 11-1*

    *重新生成服务主密钥*


    由于 `服务主密钥`至关重要，因此必须在创建或重新生成后备份它，并将其存储在安全、异地的位置，以便用于灾难恢复。如果您将实例迁移到其他服务器以避免加密层次结构出现问题，也可以还原此密钥的备份。清单
    11-2 中的脚本演示了如何备份和还原 `服务主密钥`。如果您还原的主密钥相同，则 SQL Server 会通知您，并且无需重新加密数据。


    ```sql

    BACKUP SERVICE MASTER KEY

    TO FILE = ''c:\keys\service_master_key''

    ENCRYPTION BY PASSWORD = ''Pa$$w0rd''


    RESTORE SERVICE MASTER KEY

    FROM FILE = ''c:\keys\service_master_key''

    DECRYPTION BY PASSWORD = ''Pa$$w0rd''

    ```


    *清单 11-2*

    *备份和还原服务主密钥*

    '
- fmt: '### Tip


    `service_master_key` 是密钥文件的名称，而不是文件夹。按照惯例，它没有文件扩展名。


    与重新生成服务主密钥时一样，在还原它时，也可以使用 `FORCE` 关键字，但这会产生相同的后果。


    数据库主密钥是一个对称密钥，使用 AES 256 算法加密，用于加密存储在数据库内的私钥和证书。它使用一个密码进行加密，但会创建一份副本，该副本使用服务主密钥进行加密。这使得数据库主密钥在需要时可以自动打开。如果此副本不存在，则需要手动打开它。这意味着必须显式地打开密钥，才能使用它加密的密钥。数据库主密钥的副本存储在数据库内，另一份副本存储在
    `Master` 数据库内。可以使用清单 [11-3](#333037_2_En_11_Chapter.xhtml#PC3) 中的命令创建数据库主密钥。


    ```

    CREATE DATABASE Chapter11MasterKeyExample ;

    GO

    USE Chapter11MasterKeyExample

    GO

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''Pa$$w0rd''

    Listing 11-3

    Creating a Database Master Key

    ```


    与服务主密钥一样，数据库主密钥应该备份并存储在安全的异地位置。可以使用清单 [11-4](#333037_2_En_11_Chapter.xhtml#PC4)
    中的命令备份和还原数据库主密钥。


    ```

    BACKUP MASTER KEY TO FILE = ''c:\keys\Chapter11_master_key''

    ENCRYPTION BY PASSWORD = ''Pa$$w0rd'';

    RESTORE MASTER KEY

    FROM FILE = ''c:\keys\Chapter11_master_key''

    DECRYPTION BY PASSWORD = ''Pa$$w0rd'' --The password in the backup file

    ENCRYPTION BY PASSWORD = ''Pa$$w0rd''; --The password it will be encrypted within
    the database

    Listing 11-4

    Backing Up and Restoring a Database Master Key

    ```


    与服务主密钥一样，如果还原过程无法解密和重新加密层次结构中位于其下方的任何密钥，则还原会失败。可以使用 `FORCE` 关键字强制还原成功，但这样做会永久失去对使用那些无法解密和重新加密的密钥加密的数据的访问权限。


    #### Hierarchy


    SQL Server 加密层次结构如图 [11-1](#333037_2_En_11_Chapter.xhtml#Fig1) 所示。


    ![../images/333037_2_En_11_Chapter/333037_2_En_11_Fig1_HTML.jpg](images/333037_2_En_11_Chapter/333037_2_En_11_Fig1_HTML.jpg)


    图 11-1

    加密层次结构


    该图显示服务主密钥和一份数据库主密钥副本存储在实例级别，而数据库主密钥也存储在数据库内。使用数据库主密钥加密的证书、对称密钥和非对称密钥也存储在数据库内。


    在图的右侧，您可以看到一个名为 `EKM Module` 的部分。可扩展密钥管理（EKM）模块允许您在第三方硬件安全模块中生成和管理用于保护 SQL Server
    数据的密钥和证书，这些模块使用 Microsoft 加密 API（MSCAPI）与 SQL Server 接口。这更安全，因为密钥不与数据一起存储，但这也意味着您可以受益于第三方供应商可能提供的高级功能，例如密钥轮换和安全密钥处置。


    在使用第三方 EKM 模块之前，需要使用 `sp_configure` 在实例级别启用 EKM，并且必须通过将 `.dll` 文件导入 SQL Server
    来注册 EKM。有许多 EKM 提供程序可用，但清单 [11-5](#333037_2_En_11_Chapter.xhtml#PC5) 中的示例脚本演示了在安装数据库安全包后如何导入
    Thales EKM 模块。


    ```

    --Enable EKM

    sp_configure ''show advanced'', 1

    GO

    RECONFIGURE

    GO

    sp_configure ''EKM provider enabled'', 1

    GO

    RECONFIGURE

    GO

    --Register provider

    CREATE CRYPTOGRAPHIC PROVIDER nCipher_Provider FROM FILE =

    ''C:\Program Files\nCipher\nfast\bin\ncsqlekm64.dll''

    Listing 11-5

    Enabling EKM and Importing the EKM Module

    ```


    ### Note


    关于 EKM 的全面讨论超出了本书的范围，但您可以从您的加密提供程序处获取更多信息。


    ## Transparent Data Encryption


    在为敏感数据实施安全策略时，需要考虑的一个重要方面是数据被盗的风险。想象这样一种情况：一个怀有恶意的特权用户使用分离/附加操作将数据库移动到新实例，以获取他们无权查看的数据。或者，如果恶意用户获得了数据库备份的访问权限，他们可以将备份还原到新服务器以获取数据。


    透明数据加密（TDE）通过加密数据库的数据页和日志文件，并将密钥（称为数据库加密密钥）存储在数据库的引导记录中来防范这些场景。一旦在数据库上启用 TDE，页在写入磁盘之前会被加密，而在读入内存时会被解密。


    TDE 相对于本章稍后将讨论的单元级加密还提供了几个优点。首先，它不会导致膨胀。使用 TDE 加密的数据库与其加密前的大小相同。此外，尽管存在性能开销，但这比单元级加密相关的性能开销显著降低。另一个显著优点是加密对应用程序是透明的，这意味着开发人员无需修改代码即可访问数据。


    在规划 TDE 的实施时，请注意它与其他技术的交互方式。例如，您可以加密使用内存中 OLTP 的数据库，但内存中文件组内的数据不会被加密，因为数据驻留在内存中，而
    TDE 仅加密静态数据，即当数据位于磁盘上时。尽管内存优化数据未加密，但与内存中事务相关的日志记录会被加密。


    也可以加密使用 FILESTREAM 的数据库，但同样，`FILESTREAM` 文件组内的数据不会被加密。如果使用全文索引，则新的全文索引将被加密。现有的全文索引仅在升级期间导入后才会被加密。然而，将全文索引与
    TDE 一起使用被认为是不良做法。这是因为在全文索引扫描操作期间，数据以明文形式写入磁盘，这为攻击者访问敏感数据留下了机会窗口。


    高可用性和灾难恢复技术，如数据库镜像、AlwaysOn 可用性组和日志传送，都支持启用了 TDE 的数据库。副本数据库上的数据也被加密，日志中的数据也被加密，这意味着它在服务器之间发送时无法被拦截。复制也支持
    TDE，但订阅服务器中的数据不会自动加密。您必须在订阅服务器和分发服务器上手动启用 TDE。'
  raw: '### Tip


    `service_master_key` is the name of the key file as opposed to a folder. By convention,
    it does not have an extension.


    As when you are regenerating a Service Master Key, when you restore it, you can
    also use the `FORCE` keyword with the same consequences.


    A Database Master Key is a symmetric key, encrypted using the AES 256 algorithm,
    that is used to encrypt the private keys and certificates that are stored within
    a database. It is encrypted using a password, but a copy is created that is encrypted
    using the Service Master Key. This allows the Database Master Key to be opened
    automatically when it is needed. If this copy does not exist, then you need to
    open it manually. This means that the key needs to be explicitly opened in order
    for you to use a key that has been encrypted by it. A copy of the Database Master
    Key is stored within the database, and another copy is stored within the Master
    database. You can create a Database Master Key using the command in Listing [11-3](#333037_2_En_11_Chapter.xhtml#PC3).


    ```

    CREATE DATABASE Chapter11MasterKeyExample ;

    GO

    USE Chapter11MasterKeyExample

    GO

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''Pa$$w0rd''

    Listing 11-3

    Creating a Database Master Key

    ```


    As with the Service Master Key, Database Master Keys should be backed up and stored
    in a secure offsite location. You can back up and restore a Database Master Key
    by using the commands in Listing [11-4](#333037_2_En_11_Chapter.xhtml#PC4).


    ```

    BACKUP MASTER KEY TO FILE = ''c:\keys\Chapter11_master_key''

    ENCRYPTION BY PASSWORD = ''Pa$$w0rd'';

    RESTORE MASTER KEY

    FROM FILE = ''c:\keys\Chapter11_master_key''

    DECRYPTION BY PASSWORD = ''Pa$$w0rd'' --The password in the backup file

    ENCRYPTION BY PASSWORD = ''Pa$$w0rd''; --The password it will be encrypted within
    the database

    Listing 11-4

    Backing Up and Restoring a Database Master Key

    ```


    As with the Service Master Key, if the restore is unable to decrypt and re-encrypt
    any of the keys below it in the hierarchy, the restore fails. You are able to
    use the `FORCE` keyword to force the restore to succeed, but when you do so, you
    permanently lose access to the data encrypted using the key(s) that could not
    be decrypted and re-encrypted.


    #### Hierarchy


    The SQL Server encryption hierarchy is illustrated in Figure [11-1](#333037_2_En_11_Chapter.xhtml#Fig1).


    ![../images/333037_2_En_11_Chapter/333037_2_En_11_Fig1_HTML.jpg](images/333037_2_En_11_Chapter/333037_2_En_11_Fig1_HTML.jpg)


    Figure 11-1


    Encryption hierarchy


    The diagram shows that the Service Master Key and a copy of the Database Master
    Key are stored at the instance level, with the Database Master Key also being
    stored within the database. The certificates, symmetric keys, and asymmetric keys
    that are encrypted using the Database Master Key are also stored within the database.


    To the right of the diagram, you see a section called the EKM Module. An Extensible
    Key Management (EKM) module allows you to generate and manage keys and certificates
    used to secure SQL Server data in third-party hardware security modules, which
    interface with SQL Server using the Microsoft Cryptographic API (MSCAPI). This
    is more secure, because the key is not being stored with the data, but it also
    means that you can benefit from advanced features that may be offered by the third-party
    vendor, such as key rotation and secure key disposal.


    Before you can use a third-party EKM module, you need to enable EKM at the instance
    level using `sp_configure`, and you must register the EKM by importing the `.dll`
    into SQL Server. Many EKM providers are available, but the sample script in Listing
    [11-5](#333037_2_En_11_Chapter.xhtml#PC5) demonstrates how you might import the
    Thales EKM module after you install the database security pack.


    ```

    --Enable EKM

    sp_configure ''show advanced'', 1

    GO

    RECONFIGURE

    GO

    sp_configure ''EKM provider enabled'', 1

    GO

    RECONFIGURE

    GO

    --Register provider

    CREATE CRYPTOGRAPHIC PROVIDER nCipher_Provider FROM FILE =

    ''C:\Program Files\nCipher\nfast\bin\ncsqlekm64.dll''

    Listing 11-5

    Enabling EKM and Importing the EKM Module

    ```


    ### Note


    A full discussion of EKM is beyond the scope of this book, but you can obtain
    further information from your cryptographic provider.


    ## Transparent Data Encryption


    When implementing a security strategy for your sensitive data, one important aspect
    to consider is the risk of data being stolen. Imagine a situation in which a privileged
    user with malicious intent uses detach/attach to move a database to a new instance
    in order to gain access to data they are not authorized to view. Alternatively,
    if a malicious user gains access to the database backups, they can restore the
    backups to a new server in order to gain access to the data.


    Transparent Data Encryption (TDE) protects against these scenarios by encrypting
    the data pages and log file of a database and by storing the key, known as a Database
    Encryption Key, in the boot record of the database. Once you enable TDE on a database,
    pages are encrypted before they are written to disk, and they are decrypted when
    they are read into memory.


    TDE also provides several advantages over cell-level encryption, which will be
    discussed later in this chapter. First, it does not cause bloat. A database encrypted
    with TDE is the same size as it was before it was encrypted. Also, although there
    is a performance overhead, this is significantly less than the performance overhead
    associated with cell-level encryption. Another significant advantage is that the
    encryption is transparent to applications, meaning that developers do not need
    to modify their code to access the data.


    When planning the implementation of TDE, be mindful of how it interacts with other
    technologies. For example, you are able to encrypt a database that uses In-Memory
    OLTP, but the data within the In-Memory filegroup is not encrypted because the
    data resides in memory, and TDE only encrypts data at rest, meaning when it is
    on disk. Even though the memory-optimized data is not encrypted, log records associated
    with in-memory transactions are encrypted.


    It is also possible to encrypt databases that use FILESTREAM, but again, data
    within a FILESTREAM filegroup is not encrypted. If you use full-text indexes,
    then new full-text indexes are encrypted. Existing full-text indexes are only
    encrypted after they are imported during an upgrade. It is regarded as bad practice
    to use full-text indexing with TDE, however. This is because data is written to
    disk in plaintext during the full-text indexing scan operation, which leaves a
    window of opportunity for attackers to access sensitive data.


    High availability and disaster recovery technologies such as database mirroring,
    AlwaysOn Availability Groups, and log shipping are supported with databases that
    have TDE enabled. Data on the replica database is also encrypted, and the data
    within the log is encrypted, meaning that it cannot be intercepted as it is being
    sent between the servers. Replication is also supported with TDE, but the data
    in the subscriber is not automatically encrypted. You must enable TDE manually
    on subscribers and the distributor.'
  trans: '### 提示


    `service_master_key` 是密钥文件的名称，而非文件夹。按照惯例，它没有文件扩展名。


    与重新生成服务主密钥时一样，在还原它时也可以使用 `FORCE` 关键字，但这会产生相同的后果。


    数据库主密钥是一个对称密钥，使用 AES 256 算法加密，用于加密存储在数据库内的私钥和证书。它使用一个密码进行加密，但会创建一份副本，该副本使用服务主密钥进行加密。这使得数据库主密钥在需要时可以自动打开。如果此副本不存在，则需要手动打开它。这意味着必须显式地打开密钥，才能使用它加密的密钥。数据库主密钥的副本存储在数据库内，另一份副本存储在
    `Master` 数据库内。可以使用清单 11-3 中的命令创建数据库主密钥。


    ```

    CREATE DATABASE Chapter11MasterKeyExample ;

    GO

    USE Chapter11MasterKeyExample

    GO

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''Pa$$w0rd''

    清单 11-3

    创建数据库主密钥

    ```


    与服务主密钥一样，数据库主密钥应该备份并存储在安全的异地位置。可以使用清单 11-4 中的命令备份和还原数据库主密钥。


    ```

    BACKUP MASTER KEY TO FILE = ''c:\keys\Chapter11_master_key''

    ENCRYPTION BY PASSWORD = ''Pa$$w0rd'';

    RESTORE MASTER KEY

    FROM FILE = ''c:\keys\Chapter11_master_key''

    DECRYPTION BY PASSWORD = ''Pa$$w0rd'' --备份文件中的密码

    ENCRYPTION BY PASSWORD = ''Pa$$w0rd''; --数据库中将用于加密的密码

    清单 11-4

    备份和还原数据库主密钥

    ```


    与服务主密钥一样，如果还原过程无法解密和重新加密层次结构中位于其下方的任何密钥，则还原会失败。可以使用 `FORCE` 关键字强制还原成功，但这样做会永久失去对使用那些无法解密和重新加密的密钥加密的数据的访问权限。


    #### 层次结构


    SQL Server 加密层次结构如图 11-1 所示。


    ![../images/333037_2_En_11_Chapter/333037_2_En_11_Fig1_HTML.jpg](img/333037_2_En_11_Fig1_HTML.jpg)


    图 11-1

    加密层次结构


    该图显示服务主密钥和一份数据库主密钥副本存储在实例级别，而数据库主密钥也存储在数据库内。使用数据库主密钥加密的证书、对称密钥和非对称密钥也存储在数据库内。


    在图的右侧，您可以看到一个名为 `EKM Module` 的部分。可扩展密钥管理（EKM）模块允许您在第三方硬件安全模块中生成和管理用于保护 SQL Server
    数据的密钥和证书，这些模块使用 Microsoft 加密 API（MSCAPI）与 SQL Server 接口。这更安全，因为密钥不与数据一起存储，但这也意味着您可以受益于第三方供应商可能提供的高级功能，例如密钥轮换和安全密钥处置。


    在使用第三方 EKM 模块之前，需要使用 `sp_configure` 在实例级别启用 EKM，并且必须通过将 `.dll` 文件导入 SQL Server
    来注册 EKM。有许多 EKM 提供程序可用，但清单 11-5 中的示例脚本演示了在安装数据库安全包后如何导入 Thales EKM 模块。


    ```

    --启用 EKM

    sp_configure ''show advanced'', 1

    GO

    RECONFIGURE

    GO

    sp_configure ''EKM provider enabled'', 1

    GO

    RECONFIGURE

    GO

    --注册提供程序

    CREATE CRYPTOGRAPHIC PROVIDER nCipher_Provider FROM FILE =

    ''C:\Program Files\nCipher\nfast\bin\ncsqlekm64.dll''

    清单 11-5

    启用 EKM 并导入 EKM 模块

    ```


    ### 注意


    关于 EKM 的全面讨论超出了本书的范围，但您可以从您的加密提供程序处获取更多信息。


    ## 透明数据加密


    在为敏感数据实施安全策略时，需要考虑的一个重要方面是数据被盗的风险。想象这样一种情况：一个怀有恶意的特权用户使用分离/附加操作将数据库移动到新实例，以获取他们无权查看的数据。或者，如果恶意用户获得了数据库备份的访问权限，他们可以将备份还原到新服务器以获取数据。


    透明数据加密（TDE）通过加密数据库的数据页和日志文件，并将密钥（称为数据库加密密钥）存储在数据库的引导记录中来防范这些场景。一旦在数据库上启用 TDE，页在写入磁盘之前会被加密，而在读入内存时会被解密。


    TDE 相对于本章稍后将讨论的单元级加密还提供了几个优点。首先，它不会导致膨胀。使用 TDE 加密的数据库与其加密前的大小相同。此外，尽管存在性能开销，但这比单元级加密相关的性能开销显著降低。另一个显著优点是加密对应用程序是透明的，这意味着开发人员无需修改代码即可访问数据。


    在规划 TDE 的实施时，请注意它与其他技术的交互方式。例如，您可以加密使用内存中 OLTP 的数据库，但内存中文件组内的数据不会被加密，因为数据驻留在内存中，而
    TDE 仅加密静态数据，即当数据位于磁盘上时。尽管内存优化数据未加密，但与内存中事务相关的日志记录会被加密。


    也可以加密使用 FILESTREAM 的数据库，但同样，`FILESTREAM` 文件组内的数据不会被加密。如果使用全文索引，则新的全文索引将被加密。现有的全文索引仅在升级期间导入后才会被加密。然而，将全文索引与
    TDE 一起使用被认为是不良做法。这是因为在全文索引扫描操作期间，数据以明文形式写入磁盘，这为攻击者访问敏感数据留下了机会窗口。


    高可用性和灾难恢复技术，如数据库镜像、AlwaysOn 可用性组和日志传送，都支持启用了 TDE 的数据库。副本数据库上的数据也被加密，日志中的数据也被加密，这意味着它在服务器之间发送时无法被拦截。复制也支持
    TDE，但订阅服务器中的数据不会自动加密。您必须在订阅服务器和分发服务器上手动启用 TDE。'
- fmt: '### Caution


    即使您在订阅者服务器上启用了`TDE`，数据在中间文件中仍以明文形式存储。这无疑比使用`FTE`（全文索引）带来更大的风险，因此您应仔细考虑风险/收益情况。


    同样重要的是要注意，在实例中为任何数据库启用`TDE`都会导致在`TempDB`上启用`TDE`。这是因为`TempDB`用于在排序操作、假脱机操作等过程中存储中间结果集的用户数据。当您使用临时表或发生行版本控制操作时，`TempDB`也会存储用户数据。这可能会产生不良影响，即降低未启用`TDE`的其他用户数据库的性能。


    从数据库维护性能的角度来看，同样重要的是要注意，`TDE`与即时文件初始化不兼容。即时文件初始化可加快创建或扩展文件的操作速度，因为文件无需被清零。如果您的实例配置为使用即时文件初始化，那么它将不再适用于与您加密的任何数据库关联的文件。当`TDE`启用时，文件必须被清零，这是一个严格的技术要求。


    ### Implementing TDE


    要实现透明数据加密，您必须首先创建一个数据库主密钥。此密钥就位后，您可以创建证书。您必须使用数据库主密钥来加密该证书。如果您尝试仅使用密码加密证书，那么在您尝试使用它来加密数据库加密密钥时，它将被拒绝。数据库加密密钥是您接下来需要创建的对象，并且如前所述，您使用证书对其进行加密。最后，您可以更改数据库以打开加密。


    ### Note


    您可以使用非对称密钥（而不是服务器证书）来加密数据库加密密钥，但前提是该非对称密钥受到`EKM`模块的保护。


    当您为数据库启用`TDE`时，一个后台进程会遍历每个数据文件中的每个页面并对其进行加密。这不会阻止数据库被访问，但会获取锁，从而阻止维护操作进行。在加密扫描进行期间，无法执行以下操作：


    - 删除文件

    - 删除文件组

    - 删除数据库

    - 分离数据库

    - 使数据库脱机

    - 将数据库设置为`read_only`


    幸运的是，`SQL Server 2019`的一项新功能使数据库管理员能够通过`ALTER DATABASE`语句指定`SET ENCRYPTION SUSPEND`或`SET
    ENCRYPTION RESTART`选项，来暂停和重启加密扫描，从而更好地控制此过程。


    同样重要的是要注意，如果数据库中的任何文件组被标记为`read_only`，则启用`TDE`的操作将失败。这是因为启用`TDE`时需要加密所有文件中的所有页面，这涉及到更改页面内的数据以混淆它们。


    清单 [11-6](#333037_2_En_11_Chapter.xhtml#PC6) 中的脚本创建了一个名为`Chapter11Encrypted`的数据库，然后创建了一个填充了数据的表。最后，它创建了一个数据库主密钥和一个服务器证书。


    ```sql

    --Create the Database

    CREATE DATABASE Chapter11Encrypted ;

    GO

    USE Chapter11Encrypted

    GO

    --Create the table

    CREATE TABLE dbo.SensitiveData

    (

    ID                INT                PRIMARY KEY        IDENTITY,

    FirstName        NVARCHAR(30),

    LastName        NVARCHAR(30),

    CreditCardNumber        VARBINARY(8000)

    ) ;

    GO

    --Populate the table

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE ;

    DECLARE @Names TABLE

    (

    FirstName        VARCHAR(30),

    LastName        VARCHAR(30)

    ) ;

    INSERT INTO @Names

    VALUES(''Peter'', ''Carter''),

    (''Michael'', ''Smith''),

    (''Danielle'', ''Mead''),

    (''Reuben'', ''Roberts''),

    (''Iris'', ''Jones''),

    (''Sylvia'', ''Davies''),

    (''Finola'', ''Wright''),

    (''Edward'', ''James''),

    (''Marie'', ''Andrews''),

    (''Jennifer'', ''Abraham''),

    (''Margaret'', ''Jones'') ;

    INSERT INTO dbo.SensitiveData(Firstname, LastName, CreditCardNumber)

    SELECT  FirstName, LastName, CreditCardNumber FROM

    (SELECT

    (SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName

    ,(SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName

    ,(SELECT CONVERT(VARBINARY(8000)

    ,(SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()) + ''-'' +

    (SELECT TOP 1 CAST(Number ∗ 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()))) CreditCardNumber

    FROM @Numbers a

    CROSS JOIN @Numbers b

    CROSS JOIN @Numbers c

    ) d ;

    USE Master

    GO

    --Create the Database Master Key

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''Pa$$w0rd'';

    GO

    --Create the Server Certificate

    CREATE CERTIFICATE TDECert WITH SUBJECT = ''Certificate For TDE'';

    GO

    -- Listing 11-6

    -- Creating the Chapter11Encrypted Database

    ```


    现在我们已经创建了数据库以及数据库主密钥和证书，我们现在可以加密我们的数据库。要通过`SQL Server Management Studio`执行此操作，我们可以在数据库的上下文菜单中，从“任务”下选择“管理数据库加密”。这将调用“管理数据库加密”向导，如图
    [11-2](#333037_2_En_11_Chapter.xhtml#Fig2) 所示。


    ![../images/333037_2_En_11_Chapter/333037_2_En_11_Fig2_HTML.jpg](images/333037_2_En_11_Chapter/333037_2_En_11_Fig2_HTML.jpg)


    图 11-2 管理数据库加密向导


    您可以看到我们已经从下拉框中选择了服务器证书，并选择了启用数据库加密。在“加密算法”下拉框中，我们选择了`AES 128`，这是默认选项。


    ### Note


    选择算法本质上是安全性与性能之间的权衡。较长的密钥消耗更多的`CPU`资源，但更难以破解。


    透明数据加密也可以通过`T-SQL`进行配置。我们可以通过执行清单 [11-7](#333037_2_En_11_Chapter.xhtml#PC7) 中的脚本来实现相同的结果。


    ```sql

    USE CHAPTER11Encrypted

    GO

    --Create the Database Encryption Key

    CREATE DATABASE ENCRYPTION KEY

    WITH ALGORITHM = AES_128

    ENCRYPTION BY SERVER CERTIFICATE TDECert ;

    GO

    --Enable TDE on the database

    ALTER DATABASE CHAPTER11Encrypted SET ENCRYPTION ON ;

    GO

    -- Listing 11-7

    -- Enabling Transparent Data Encryption

    ```


    ### Managing TDE


    配置`TDE`时，我们会收到一个警告，提示用于加密数据库加密密钥的证书尚未备份。备份此证书至关重要，您应在配置`TDE`之前或之后立即执行此操作。如果证书变得不可用，您将无法恢复数据库中的数据。您可以使用清单
    [11-8](#333037_2_En_11_Chapter.xhtml#PC8) 中的脚本来备份证书。


    ```sql

    USE Master

    GO

    BACKUP CERTIFICATE TDECert

    TO FILE = ''C:\certificates\TDECert''

    WITH PRIVATE KEY (file=''C:\certificates\TDECertKey'',

    ENCRYPTION BY PASSWORD=''Pa$$w0rd'')

    -- Listing 11-8

    -- Backing Up the Certificate

    ```'
  raw: '### Caution


    Even if you enable TDE at the subscriber, data is still stored in plaintext while
    it is in intermediate files. This, arguably, poses a greater risk than using FTE
    (full-text indexes), so you should closely consider the risk/benefit scenario.


    It is also important to note that enabling TDE for any database within an instance
    causes TDE to be enabled on TempDB. The reason for this is that TempDB is used
    to store user data for intermediate result sets, during sort operations, spool
    operations, and so on. TempDB also stores user data when you are using Temp Tables,
    or row versioning operations occur. This can have the undesirable effect of decreasing
    the performance of other user databases that have not had TDE enabled.


    It is also important to note, from the viewpoint of the performance of database
    maintenance, that TDE is incompatible with instant file initialization. Instant
    file initialization speeds up operations that create or expand files, as the files
    do not need to be zeroed out. If your instance is configured to use instant file
    initialization, then it no longer works for the files associated with any databases
    that you encrypt. It is a hard technical requirement that files are zeroed out
    when TDE is enabled.


    ### Implementing TDE


    To implement Transparent Data Encryption, you must first create a Database Master
    Key. Once this key is in place, you can create a certificate. You must use the
    Database Master Key to encrypt the certificate. If you attempt to encrypt the
    certificate using a password only, then it will be rejected when you attempt to
    use it to encrypt the Database Encryption Key. The Database Encryption Key is
    the next object that you need to create, and as implied earlier, you encrypt this
    using the certificate. Finally, you can alter the database to turn encryption
    on.


    ### Note


    It is possible to encrypt the Database Encryption Key using an asymmetric key
    as opposed to a server certificate, but only if the asymmetric key is protected
    using an EKM module.


    When you enable TDE for a database, a background process moves through each page
    in every data file and encrypts it. This does not stop the database from being
    accessible, but it does take out locks, which stop maintenance operations from
    taking place. While the encryption scan is in progress, the following operations
    cannot be performed:


    *   Dropping a file


    *   Dropping a filegroup


    *   Dropping the database


    *   Detaching the database


    *   Taking the database offline


    *   Setting the database as `read_only`


    Luckily, a new feature of SQL Server 2019 gives DBAs more control over this process,
    with the ability to pause and restart the encryption scan, using an `ALTER DATABASE`
    statement, with either `SET ENCRYPTION SUSPEND` or `SET ENCRYPTION RESTART` options
    specified.


    It is also important to note that the operation to enable TDE will fail if any
    of the filegroups within a database are marked as `read_only`. This is because
    all pages within all files need to be encrypted when TDE is enabled, and this
    involves changing the data within the pages to obfuscate them.


    The script in Listing [11-6](#333037_2_En_11_Chapter.xhtml#PC6) creates a database
    called `Chapter11Encrypted` and then creates a table that is populated with data.
    Finally, it creates a Database Master Key and a server certificate.


    ```

    --Create the Database

    CREATE DATABASE Chapter11Encrypted ;

    GO

    USE Chapter11Encrypted

    GO

    --Create the table

    CREATE TABLE dbo.SensitiveData

    (

    ID                INT                PRIMARY KEY        IDENTITY,

    FirstName        NVARCHAR(30),

    LastName        NVARCHAR(30),

    CreditCardNumber        VARBINARY(8000)

    ) ;

    GO

    --Populate the table

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE ;

    DECLARE @Names TABLE

    (

    FirstName        VARCHAR(30),

    LastName        VARCHAR(30)

    ) ;

    INSERT INTO @Names

    VALUES(''Peter'', ''Carter''),

    (''Michael'', ''Smith''),

    (''Danielle'', ''Mead''),

    (''Reuben'', ''Roberts''),

    (''Iris'', ''Jones''),

    (''Sylvia'', ''Davies''),

    (''Finola'', ''Wright''),

    (''Edward'', ''James''),

    (''Marie'', ''Andrews''),

    (''Jennifer'', ''Abraham''),

    (''Margaret'', ''Jones'') ;

    INSERT INTO dbo.SensitiveData(Firstname, LastName, CreditCardNumber)

    SELECT  FirstName, LastName, CreditCardNumber FROM

    (SELECT

    (SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName

    ,(SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName

    ,(SELECT CONVERT(VARBINARY(8000)

    ,(SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()) + ''-'' +

    (SELECT TOP 1 CAST(Number ∗ 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()))) CreditCardNumber

    FROM @Numbers a

    CROSS JOIN @Numbers b

    CROSS JOIN @Numbers c

    ) d ;

    USE Master

    GO

    --Create the Database Master Key

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''Pa$$w0rd'';

    GO

    --Create the Server Certificate

    CREATE CERTIFICATE TDECert WITH SUBJECT = ''Certificate For TDE'';

    GO

    Listing 11-6

    Creating the Chapter11Encrypted Database

    ```


    Now that we have created our database, along with the Database Master Key and
    certificate, we can now encrypt our database. To do this through SQL Server Management
    Studio, we can select Manage Database Encryption, from under Tasks, in the context
    menu of our database. This invokes the Manage Database Encryption wizard, illustrated
    in Figure [11-2](#333037_2_En_11_Chapter.xhtml#Fig2).


    ![../images/333037_2_En_11_Chapter/333037_2_En_11_Fig2_HTML.jpg](images/333037_2_En_11_Chapter/333037_2_En_11_Fig2_HTML.jpg)


    Figure 11-2


    Manage Database Encryption wizard


    You can see that we have selected our server certificate from the drop-down box
    and have chosen to enable database encryption. In the Encryption Algorithm drop-down
    box, we have selected AES 128, which is the default option.


    ### Note


    Choosing an algorithm is essentially a trade-off between security and performance.
    Longer keys consume more CPU resources but are more difficult to crack.


    Transparent Data Encryption can also be configured through T-SQL. We can achieve
    the same results via T-SQL by executing the script in Listing [11-7](#333037_2_En_11_Chapter.xhtml#PC7).


    ```

    USE CHAPTER11Encrypted

    GO

    --Create the Database Encryption Key

    CREATE DATABASE ENCRYPTION KEY

    WITH ALGORITHM = AES_128

    ENCRYPTION BY SERVER CERTIFICATE TDECert ;

    GO

    --Enable TDE on the database

    ALTER DATABASE CHAPTER11Encrypted SET ENCRYPTION ON ;

    GO

    Listing 11-7

    Enabling Transparent Data Encryption

    ```


    ### Managing TDE


    When configuring TDE, we are given a warning that the certificate used to encrypt
    the Database Encryption Key has not been backed up. Backing up this certificate
    is critical, and you should do so before you configure TDE or immediately afterward.
    If the certificate becomes unavailable, you have no way to recover the data within
    your database. You can back up the certificate by using the script in Listing
    [11-8](#333037_2_En_11_Chapter.xhtml#PC8).


    ```

    USE Master

    GO

    BACKUP CERTIFICATE TDECert

    TO FILE = ''C:\certificates\TDECert''

    WITH PRIVATE KEY (file=''C:\certificates\TDECertKey'',

    ENCRYPTION BY PASSWORD=''Pa$$w0rd'')

    Listing 11-8

    Backing Up the Certificate

    ```'
  trans: '

    ### 注意


    即使您在订阅者服务器上启用了`TDE`，数据在中间文件中仍以明文形式存储。这无疑比使用`FTE`（全文索引）带来更大的风险，因此您应仔细考虑风险/收益情况。


    同样重要的是要注意，在实例中为任何数据库启用`TDE`都会导致在`TempDB`上启用`TDE`。这是因为`TempDB`用于在排序操作、假脱机操作等过程中存储中间结果集的用户数据。当您使用临时表或发生行版本控制操作时，`TempDB`也会存储用户数据。这可能会产生不良影响，即降低未启用`TDE`的其他用户数据库的性能。


    从数据库维护性能的角度来看，同样重要的是要注意，`TDE`与即时文件初始化不兼容。即时文件初始化可加快创建或扩展文件的操作速度，因为文件无需被清零。如果您的实例配置为使用即时文件初始化，那么它将不再适用于与您加密的任何数据库关联的文件。当`TDE`启用时，文件必须被清零，这是一个严格的技术要求。


    ### 实现透明数据加密


    要实现透明数据加密，您必须首先创建一个数据库主密钥。此密钥就位后，您可以创建证书。您必须使用数据库主密钥来加密该证书。如果您尝试仅使用密码加密证书，那么在您尝试使用它来加密数据库加密密钥时，它将被拒绝。数据库加密密钥是您接下来需要创建的对象，并且如前所述，您使用证书对其进行加密。最后，您可以更改数据库以打开加密。


    ### 注意


    您可以使用非对称密钥（而不是服务器证书）来加密数据库加密密钥，但前提是该非对称密钥受到`EKM`模块的保护。


    当您为数据库启用`TDE`时，一个后台进程会遍历每个数据文件中的每个页面并对其进行加密。这不会阻止数据库被访问，但会获取锁，从而阻止维护操作进行。在加密扫描进行期间，无法执行以下操作：


    -   删除文件

    -   删除文件组

    -   删除数据库

    -   分离数据库

    -   使数据库脱机

    -   将数据库设置为`read_only`


    幸运的是，`SQL Server 2019`的一项新功能使数据库管理员能够通过`ALTER DATABASE`语句指定`SET ENCRYPTION SUSPEND`或`SET
    ENCRYPTION RESTART`选项，来暂停和重启加密扫描，从而更好地控制此过程。


    同样重要的是要注意，如果数据库中的任何文件组被标记为`read_only`，则启用`TDE`的操作将失败。这是因为启用`TDE`时需要加密所有文件中的所有页面，这涉及到更改页面内的数据以混淆它们。


    清单 11-6 中的脚本创建了一个名为`Chapter11Encrypted`的数据库，然后创建了一个填充了数据的表。最后，它创建了一个数据库主密钥和一个服务器证书。


    ```sql

    --创建数据库

    CREATE DATABASE Chapter11Encrypted ;

    GO

    USE Chapter11Encrypted

    GO

    --创建表

    CREATE TABLE dbo.SensitiveData

    (

    ID                INT                PRIMARY KEY        IDENTITY,

    FirstName        NVARCHAR(30),

    LastName        NVARCHAR(30),

    CreditCardNumber        VARBINARY(8000)

    ) ;

    GO

    --填充表数据

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE ;

    DECLARE @Names TABLE

    (

    FirstName        VARCHAR(30),

    LastName        VARCHAR(30)

    ) ;

    INSERT INTO @Names

    VALUES(''Peter'', ''Carter''),

    (''Michael'', ''Smith''),

    (''Danielle'', ''Mead''),

    (''Reuben'', ''Roberts''),

    (''Iris'', ''Jones''),

    (''Sylvia'', ''Davies''),

    (''Finola'', ''Wright''),

    (''Edward'', ''James''),

    (''Marie'', ''Andrews''),

    (''Jennifer'', ''Abraham''),

    (''Margaret'', ''Jones'') ;

    INSERT INTO dbo.SensitiveData(Firstname, LastName, CreditCardNumber)

    SELECT  FirstName, LastName, CreditCardNumber FROM

    (SELECT

    (SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName

    ,(SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName

    ,(SELECT CONVERT(VARBINARY(8000)

    ,(SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()) + ''-'' +

    (SELECT TOP 1 CAST(Number ∗ 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()))) CreditCardNumber

    FROM @Numbers a

    CROSS JOIN @Numbers b

    CROSS JOIN @Numbers c

    ) d ;

    USE Master

    GO

    --创建数据库主密钥

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''Pa$$w0rd'';

    GO

    --创建服务器证书

    CREATE CERTIFICATE TDECert WITH SUBJECT = ''Certificate For TDE'';

    GO

    -- 清单 11-6

    -- 创建 Chapter11Encrypted 数据库

    ```


    现在我们已经创建了数据库以及数据库主密钥和证书，我们现在可以加密我们的数据库。要通过`SQL Server Management Studio`执行此操作，我们可以在数据库的上下文菜单中，从“任务”下选择“管理数据库加密”。这将调用“管理数据库加密”向导，如图
    11-2 所示。


    ![../images/333037_2_En_11_Chapter/333037_2_En_11_Fig2_HTML.jpg](img/333037_2_En_11_Fig2_HTML.jpg)


    图 11-2 管理数据库加密向导


    您可以看到我们已经从下拉框中选择了服务器证书，并选择了启用数据库加密。在“加密算法”下拉框中，我们选择了`AES 128`，这是默认选项。


    ### 注意


    选择算法本质上是安全性与性能之间的权衡。较长的密钥消耗更多的`CPU`资源，但更难以破解。


    透明数据加密也可以通过`T-SQL`进行配置。我们可以通过执行清单 11-7 中的脚本来实现相同的结果。


    ```sql

    USE CHAPTER11Encrypted

    GO

    --创建数据库加密密钥

    CREATE DATABASE ENCRYPTION KEY

    WITH ALGORITHM = AES_128

    ENCRYPTION BY SERVER CERTIFICATE TDECert ;

    GO

    --在数据库上启用 TDE

    ALTER DATABASE CHAPTER11Encrypted SET ENCRYPTION ON ;

    GO

    -- 清单 11-7

    -- 启用透明数据加密

    ```


    ### 管理透明数据加密


    配置`TDE`时，我们会收到一个警告，提示用于加密数据库加密密钥的证书尚未备份。备份此证书至关重要，您应在配置`TDE`之前或之后立即执行此操作。如果证书变得不可用，您将无法恢复数据库中的数据。您可以使用清单
    11-8 中的脚本来备份证书。


    ```sql

    USE Master

    GO

    BACKUP CERTIFICATE TDECert

    TO FILE = ''C:\certificates\TDECert''

    WITH PRIVATE KEY (file=''C:\certificates\TDECertKey'',

    ENCRYPTION BY PASSWORD=''Pa$$w0rd'')

    -- 清单 11-8

    -- 备份证书

    ```

