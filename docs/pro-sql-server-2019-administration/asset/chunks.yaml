- fmt: '### Covering Indexes


    Although having all required columns within the nonclustered index means that
    you do not have to retrieve data from the underlying table, the trade-off is that
    having many columns within a nonclustered index can lead to very wide, inefficient
    indexes. In order to gain a better balance, SQL Server offers you the option of
    included columns.


    Included columns are included at the leaf level of the index only, as opposed
    to the index key values, which continue to be included at every level of the B-tree.
    This feature can help you cover your queries while maintaining the narrowest index
    keys possible. This concept is illustrated in Figure [8-4](#333037_2_En_8_Chapter.xhtml#Fig4).
    This diagram illustrates that the index has been built using `Balance` as the
    index key, but the `FirstName` and `LastName` columns have also been included
    at the leaf level. You can see that `CustomerID` has also been included at all
    levels; this is because `CustomerID` is the clustered index key. Because the clustered
    index key is included at all levels, this implies that the index is not unique.
    If it is unique, then the clustered key is only included at the leaf level of
    the B-tree. This means that unique, nonclustered indexes are always narrower than
    their nonunique equivalents. This index is perfect for a query that filters on
    `Balance` in the `WHERE` clause and returns the `FirstName` and `LastName` columns.
    It also covers queries that returned `CustomerID` in the results.


    ### Tip


    If both the clustered and nonclustered indexes are nonunique, each level of the
    nonclustered B-tree includes the clustering uniquifier as well as the clustered
    key.


    ![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig4_HTML.jpg](images/333037_2_En_8_Chapter/333037_2_En_8_Fig4_HTML.jpg)

    *Figure 8-4: Nonclustered index with included columns*


    You can also use the index illustrated in Figure [8-4](#333037_2_En_8_Chapter.xhtml#Fig4)
    to cover queries that filter on `FirstName` or `LastName` in the `WHERE` clause
    providing that other columns from the table are not returned. To process the query,
    however, SQL Server needs to perform an index scan, as opposed to an index seek
    or range scan, which is, of course, less efficient.


    ### Administering Nonclustered Indexes


    You can create nonclustered indexes using the `CREATE NONCLUSTERED INDEX` T-SQL
    statement. The script in Listing [8-3](#333037_2_En_8_Chapter.xhtml#PC3) creates
    a table called `Customers` and a table called `Orders` within the `Chapter8` database.
    It then creates a foreign key constraint on the `CustomerID` column. Finally,
    a nonclustered index is created on the `Balance` column of the `Customers` table.
    Clustered indexes are created automatically on the primary key columns of each
    table.


    ```sql

    USE Chapter8

    GO

    --Create and populate numbers table

    DECLARE @Numbers TABLE

    (

    Number    INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE ;

    --Create and populate name pieces

    DECLARE @Names TABLE

    (

    FirstName    VARCHAR(30),

    LastName     VARCHAR(30)

    ) ;

    INSERT INTO @Names

    VALUES(''Peter'', ''Carter''),

    (''Michael'', ''Smith''),

    (''Danielle'', ''Mead''),

    (''Reuben'', ''Roberts''),

    (''Iris'', ''Jones''),

    (''Sylvia'', ''Davies''),

    (''Finola'', ''Wright''),

    (''Edward'', ''James''),

    (''Marie'', ''Andrews''),

    (''Jennifer'', ''Abraham'') ;

    --Create and populate Customers table

    CREATE TABLE dbo.CustomersDisk

    (

    CustomerID         INT          NOT NULL    IDENTITY    PRIMARY KEY,

    FirstName          VARCHAR(30)  NOT NULL,

    LastName           VARCHAR(30)  NOT NULL,

    BillingAddressID   INT          NOT NULL,

    DeliveryAddressID  INT          NOT NULL,

    CreditLimit        MONEY        NOT NULL,

    Balance            MONEY        NOT NULL

    ) ;

    SELECT * INTO #CustomersDisk

    FROM

    (SELECT

    (SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName,

    (SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) BillingAddressID,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID())  DeliveryAddressID,

    (SELECT TOP 1

    CAST(RAND() * Number AS INT) * 10000

    FROM @Numbers

    ORDER BY NEWID()) CreditLimit,

    (SELECT TOP 1

    CAST(RAND() * Number AS INT) * 9000

    FROM @Numbers

    ORDER BY NEWID()) Balance

    FROM @Numbers a

    CROSS JOIN @Numbers b

    ) a ;

    INSERT INTO dbo.CustomersDisk

    SELECT * FROM #CustomersDisk ;

    GO

    --Create Numbers table

    DECLARE @Numbers TABLE

    (

    Number    INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE ;

    --Create the Orders table

    CREATE TABLE dbo.OrdersDisk

    (

    OrderNumber     INT      NOT NULL    IDENTITY    PRIMARY KEY,

    OrderDate       DATE     NOT NULL,

    CustomerID      INT      NOT NULL,

    ProductID       INT      NOT NULL,

    Quantity        INT      NOT NULL,

    NetAmount       MONEY    NOT NULL,

    DeliveryDate    DATE        NULL

    )  ON [PRIMARY] ;

    --Populate Orders with data

    SELECT * INTO #OrdersDisk

    FROM

    (SELECT

    (SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number

    FROM @Numbers

    ORDER BY NEWID()),GETDATE())as DATE)) OrderDate,

    (SELECT TOP 1 CustomerID FROM CustomersDisk ORDER BY NEWID()) CustomerID,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) ProductID,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) Quantity,

    (SELECT TOP 1 CAST(RAND() * Number AS INT) +10 * 100

    FROM @Numbers

    ORDER BY NEWID()) NetAmount,

    (SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number - 10

    FROM @Numbers

    ORDER BY NEWID()),GETDATE()) as DATE)) DeliveryDate

    FROM @Numbers a

    CROSS JOIN @Numbers b

    CROSS JOIN @Numbers c

    ) a ;

    INSERT INTO OrdersDisk

    SELECT * FROM #OrdersDisk ;

    --Clean-up Temp Tables

    DROP TABLE #CustomersDisk ;

    DROP TABLE #OrdersDisk ;

    --Add foreign key on CustomerID

    ALTER TABLE dbo.OrdersDisk ADD CONSTRAINT

    FK_OrdersDisk_CustomersDisk FOREIGN KEY

    (

    CustomerID

    ) REFERENCES dbo.CustomersDisk

    (

    CustomerID

    ) ON UPDATE  NO ACTION

    ON DELETE  NO ACTION ;

    --Create a nonclustered index on Balance

    CREATE NONCLUSTERED INDEX NCI_Balance ON dbo.CustomersDisk(Balance) ;

    ```

    *Listing 8-3: Creating Tables and Then Adding a Nonclustered Index*


    We can change the definition of the `NCI_Balance` index to include the `FirstName`
    and `LastName` columns by using the `CREATE NONCLUSTERED INDEX` statement and
    specifying the `DROP_EXISTING` option as demonstrated in Listing [8-4](#333037_2_En_8_Chapter.xhtml#PC4).


    ```sql

    CREATE NONCLUSTERED INDEX NCI_Balance ON dbo.CustomersDisk(Balance)

    INCLUDE(LastName, FirstName)

    WITH(DROP_EXISTING = ON) ;

    ```

    *Listing 8-4: Altering the Index to Include Columns*


    You can drop the index in the same way that we dropped the clustered index earlier
    in this chapter—using a `DROP INDEX` statement. In this case, the full statement
    would be `DROP INDEX NCI_Balance ON dbo.CustomersDisk`.'
