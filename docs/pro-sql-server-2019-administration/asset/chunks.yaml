    # 元数据驱动自动化


    你可以使用元数据来驱动智能脚本，以自动化日常的 DBA 维护任务，同时结合业务逻辑。在接下来的章节中，你将看到如何使用元数据来生成滚动的数据库快照，以及仅重建那些已碎片化的索引。

