    ## Summary


    A SQL Server database can operate in three recovery models. The `SIMPLE` recovery
    model automatically truncates the transaction log after `CHECKPOINT` operations
    occur. This means that log backups cannot be taken and, therefore, point-in-time
    restores are not available. In `FULL` recovery model, the transaction log is only
    truncated after a log backup operation. This means that you must take transaction
    log backups for both disaster recovery and log space. The `BULK LOGGED` recovery
    model is meant to be used only while a bulk insert operation is happening. In
    this case, you switch to this model if you normally use the `FULL` recovery model.


    SQL Server supports three types of backup. A full backup copies all database pages
    to the backup device. A differential backup copies all database pages that have
    been modified since the last full backup to the backup device. A transaction log
    backup copies the contents of the transaction log to the backup device.


    A DBA can adopt many backup strategies to provide the best possible RTO and RPO
    in the event of a disaster that requires a database to be restored. These include
    taking full backups only, which is applicable to `SIMPLE` recovery model; scheduling
    full backups along with transaction log backups; or scheduling full, differential,
    and transaction log backups. Scheduling differential backups can help improve
    the RTO of a database if frequent log backups are taken. DBAs may also elect to
    implement a filegroup backup strategy; this allows them to stagger their backups
    into more manageable windows or perform a partial backup, which involves backing
    up only read/write filegroups.


    Ad hoc backups can be taken via T-SQL or SQL Server Management Studio (SSMS).
    In production environments, you invariably want to schedule the backups to run
    periodically, and we discuss how to automate this action in Chapter 22.


    You can also perform restores either through SSMS or with T-SQL. However, you
    can only perform complex restore scenarios, such as piecemeal restores, via T-SQL.
    SQL Server also provides you with the ability to restore a single page or file.
    You can restore a corrupt page as an online operation, and doing so usually provides
    a better alternative to fixing small-scale corruption than either restoring a
    whole database or using `DBCC CHECKDB` with the `ALLOW_DATA_LOSS` option. More
    details on `DBCC CHECKDB` can be found in Chapter 9.


    ### Tip


    Many other restore scenarios are beyond the scope of this book, because a full
    description of every possible scenario would be worthy of a volume in its own
    right. I encourage you to explore various restore scenarios in a sandpit environment
    before you need to use them for real!


    # 13. High Availability and Disaster Recovery Concepts


    In today’s 24×7 environments that are running mission-critical applications, businesses
    rely heavily on the availability of their data. Although servers and their software
    are generally reliable, there is always the risk of a hardware failure or a software
    bug, each of which could bring a server down. To mitigate these risks, business-critical
    applications often rely on redundant hardware to provide fault tolerance. If the
    primary system fails, then the application can automatically fail over to the
    redundant system. This is the underlying principle of high availability (HA).


    Even with the implementation of HA technologies, there is always a small risk
    of an event that causes the application to become unavailable. This could be due
    to a major incident, such as the loss of a data center, due to a natural disaster,
    or due to an act of terrorism. It could also be caused by data corruption or human
    error, resulting in the application’s data becoming lost or damaged beyond repair.


    In these situations, some applications may rely on restoring the latest backup
    to recover as much data as possible. However, more critical applications may require
    a redundant server to hold a synchronized copy of the data in a secondary location.
    This is the underpinning concept of disaster recovery (DR). This chapter discusses
    the concepts behind HA and DR before providing an overview of the technologies
    that are available to implement these concepts.


    ## Availability Concepts


    In order to analyze the HA and DR requirements of an application and implement
    the most appropriate solution, you need to understand various concepts. We discuss
    these concepts in the following sections.'
  raw: '## Piecemeal Restores


    A piecemeal restore involves bringing the filegroups of a database online one
    by one. This can offer a big benefit for a large database, since you can make
    some data accessible, while other data is still being restored. In order to demonstrate
    this technique, we first take filegroup backups of all filegroups in the `Chapter12`
    database and follow this with a transaction log backup. The script in Listing
    [12-18](#333037_2_En_12_Chapter.xhtml#PC18) performs this task. Before running
    the script, modify the locations of the backup devices to reflect your own configurations.


    ```

    BACKUP DATABASE Chapter12

    FILEGROUP = N''PRIMARY'',  FILEGROUP = N''FileGroupA'',  FILEGROUP = N''FileGroupB''

    TO  DISK = N''H:\MSSQL\Backup\Chapter12Piecemeal.bak''

    WITH FORMAT

    , NAME = N''Chapter12-Fiegroup Backup''

    , STATS = 10 ;

    BACKUP LOG Chapter12

    TO  DISK = N''H:\MSSQL\Backup\Chapter12Piecemeal.bak''

    WITH NOFORMAT, NOINIT

    ,  NAME = N''Chapter12-Full Database Backup''

    ,  STATS = 10 ;

    Listing 12-18

    Filegroup Backup

    ```


    The script in Listing [12-19](#333037_2_En_12_Chapter.xhtml#PC19) now brings the
    filegroups online, one by one, starting with the primary filegroup, followed by
    `FileGroupA`, and finally, `FileGroupB`. Before beginning the restore, we back
    up the tail of the log. This backup is restored `WITH RECOVERY` after each filegroup
    is restored. This brings the restored databases back online. It is possible to
    restore further backups because we specify the `PARTIAL` option on the first restore
    operation.


    ```

    USE master

    GO

    BACKUP LOG Chapter12

    TO  DISK = N''H:\MSSQL\Backup\Chapter12_LogBackup_2012-02-17_27-29-46.bak''

    WITH NOFORMAT, NOINIT

    , NAME = N''Chapter12_LogBackup_2012-02-17_17-29-46''

    , NOSKIP

    , NORECOVERY

    , NO_TRUNCATE

    , STATS = 5 ;

    RESTORE DATABASE Chapter12

    FILEGROUP = N''PRIMARY''

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12Piecemeal.bak''

    WITH  FILE = 1

    , NORECOVERY

    , PARTIAL

    , STATS = 10 ;

    RESTORE LOG Chapter12

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12Piecemeal.bak''

    WITH  FILE = 2

    , NORECOVERY

    , STATS = 10 ;

    RESTORE LOG Chapter12

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12_LogBackup_2012-02-17_27-29-46.bak''

    WITH  FILE = 1

    , STATS = 10

    , RECOVERY ;

    -----------------The PRIMARY Filegroup is now online--------------------

    RESTORE DATABASE Chapter12

    FILEGROUP = N''FileGroupA''

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12Piecemeal.bak''

    WITH  FILE = 1

    , NORECOVERY

    , STATS = 10 ;

    RESTORE LOG Chapter12

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12Piecemeal.bak''

    WITH  FILE = 2

    , NORECOVERY

    , STATS = 10 ;

    RESTORE LOG Chapter12

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12_LogBackup_2012-02-17_27-29-46.bak''

    WITH  FILE = 1

    , STATS = 10

    , RECOVERY ;

    -----------------The FilegroupA Filegroup is now online--------------------

    RESTORE DATABASE Chapter12

    FILEGROUP = N''FileGroupB''

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12Piecemeal.bak''

    WITH  FILE = 1

    , NORECOVERY

    , STATS = 10 ;

    RESTORE LOG Chapter12

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12Piecemeal.bak''

    WITH  FILE = 2

    , NORECOVERY

    , STATS = 10 ;

    RESTORE LOG Chapter12

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12_LogBackup_2012-02-17_27-29-46.bak''

    WITH  FILE = 1

    , STATS = 10

    , RECOVERY ;

    -----------------The database is now fully online--------------------

    Listing 12-19

    Piecemeal Restore

    ```


    ## Summary


    A SQL Server database can operate in three recovery models. The `SIMPLE` recovery
    model automatically truncates the transaction log after `CHECKPOINT` operations
    occur. This means that log backups cannot be taken and, therefore, point-in-time
    restores are not available. In `FULL` recovery model, the transaction log is only
    truncated after a log backup operation. This means that you must take transaction
    log backups for both disaster recovery and log space. The `BULK LOGGED` recovery
    model is meant to be used only while a bulk insert operation is happening. In
    this case, you switch to this model if you normally use the `FULL` recovery model.


    SQL Server supports three types of backup. A full backup copies all database pages
    to the backup device. A differential backup copies all database pages that have
    been modified since the last full backup to the backup device. A transaction log
    backup copies the contents of the transaction log to the backup device.


    A DBA can adopt many backup strategies to provide the best possible RTO and RPO
    in the event of a disaster that requires a database to be restored. These include
    taking full backups only, which is applicable to `SIMPLE` recovery model; scheduling
    full backups along with transaction log backups; or scheduling full, differential,
    and transaction log backups. Scheduling differential backups can help improve
    the RTO of a database if frequent log backups are taken. DBAs may also elect to
    implement a filegroup backup strategy; this allows them to stagger their backups
    into more manageable windows or perform a partial backup, which involves backing
    up only read/write filegroups.


    Ad hoc backups can be taken via T-SQL or SQL Server Management Studio (SSMS).
    In production environments, you invariably want to schedule the backups to run
    periodically, and we discuss how to automate this action in Chapter [22](#333037_2_En_22_Chapter.xhtml).


    You can also perform restores either through SSMS or with T-SQL. However, you
    can only perform complex restore scenarios, such as piecemeal restores, via T-SQL.
    SQL Server also provides you with the ability to restore a single page or file.
    You can restore a corrupt page as an online operation, and doing so usually provides
    a better alternative to fixing small-scale corruption than either restoring a
    whole database or using DBCC CHECKDB with the `ALLOW_DATA_LOSS` option. More details
    on DBCC CHECKDB can be found in Chapter [9](#333037_2_En_9_Chapter.xhtml).


    ### Tip


    Many other restore scenarios are beyond the scope of this book, because a full
    description of every possible scenario would be worthy of a volume in its own
    right. I encourage you to explore various restore scenarios in a sandpit environment
    before you need to use them for real!


    # 13. High Availability and Disaster Recovery Concepts


    In today’s 24`×`7 environments that are running mission-critical applications,
    businesses rely heavily on the availability of their data. Although servers and
    their software are generally reliable, there is always the risk of a hardware
    failure or a software bug, each of which could bring a server down. To mitigate
    these risks, business-critical applications often rely on redundant hardware to
    provide fault tolerance. If the primary system fails, then the application can
    automatically fail over to the redundant system. This is the underlying principle
    of high availability (HA).


    Even with the implementation of HA technologies, there is always a small risk
    of an event that causes the application to become unavailable. This could be due
    to a major incident, such as the loss of a data center, due to a natural disaster,
    or due to an act of terrorism. It could also be caused by data corruption or human
    error, resulting in the application’s data becoming lost or damaged beyond repair.


    In these situations, some applications may rely on restoring the latest backup
    to recover as much data as possible. However, more critical applications may require
    a redundant server to hold a synchronized copy of the data in a secondary location.
    This is the underpinning concept of disaster recovery (DR). This chapter discusses
    the concepts behind HA and DR before providing an overview of the technologies
    that are available to implement these concepts.


    ## Availability Concepts


    In order to analyze the HA and DR requirements of an application and implement
    the most appropriate solution, you need to understand various concepts. We discuss
    these concepts in the following sections.'
