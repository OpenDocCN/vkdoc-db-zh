- fmt: '### Emergency Mode


    If your database files are damaged to the extent that your database is inaccessible
    and unrecoverable, even by using the `REPAIR_ALLOW_DATA_LOSS` option, and you
    do not have usable backups, then your last resort is to run `DBCC CHECKDB` in
    emergency mode using the `REPAIR_ALLOW_DATA_LOSS` option. Remember, emergency
    mode is a last resort option for repairing your databases, and if you cannot access
    them through this mode, you will not be able to access them via any other means.
    When you perform this action with the database in emergency mode, `DBCC CHECKDB`
    treats pages that are inaccessible due to corruption as if they do not have errors
    in an attempt to recover data.


    This operation can also back up databases that are inaccessible due to log corruption.
    This is because it attempts to force the transaction log to recover, even if it
    encounters errors. If this fails, it rebuilds the transaction log. Of course,
    this may lead to transaction inconsistencies, but as mentioned, this is an option
    of last resort.


    As an example, we will delete the transaction log file for the `Chapter9` database
    in the operating system. You can find the operating system location of the transaction
    log file by running the query in Listing [9-11](#333037_2_En_9_Chapter.xhtml#PC12).


    ```sql

    SELECT physical_name

    FROM sys.master_files

    WHERE database_id = DB_ID(''Chapter9'')

    AND type_desc = ''Log'' ;

    ```

    Listing 9-11 Finding the Transaction Log Path


    Because data and log files are locked by the SQL Server process, we first need
    to stop the instance. After starting the instance again, we can see that our `Chapter9`
    database has been marked as Recovery Pending, as shown in Figure [9-13](#333037_2_En_9_Chapter.xhtml#Fig13).


    ![../images/333037_2_En_9_Chapter/333037_2_En_9_Fig13_HTML.jpg](images/333037_2_En_9_Chapter/333037_2_En_9_Fig13_HTML.jpg)

    Figure 9-13 Database in Recovery Pending


    Since we have no backup available for the `Chapter9` database, the only option
    that we have is to use `DBCC CHECKDB` in emergency mode. The script in Listing
    [9-12](#333037_2_En_9_Chapter.xhtml#PC13) puts the `Chapter9` database in emergency
    mode and then uses `DBCC CHECKDB` with the `REPAIR_ALLOW_DATA_LOSS` option to
    fix the error.


    ```sql

    ALTER DATABASE Chapter9 SET EMERGENCY ;

    GO

    ALTER DATABASE Chapter9 SET SINGLE_USER ;

    GO

    DBCC CHECKDB (''Chapter9'', REPAIR_ALLOW_DATA_LOSS) ;

    GO

    ALTER DATABASE Chapter9 SET MULTI_USER ;

    GO

    ```

    Listing 9-12 `DBCC CHECKDB` in Emergency Mode


    The partial results, displayed in Figure [9-14](#333037_2_En_9_Chapter.xhtml#Fig14),
    show that SQL Server was able to bring the database online by rebuilding the transaction
    log. However, it also shows that this means that transactional consistency has
    been lost and the restore chain has been broken. Because we have lost transactional
    consistency, we should now run `DBCC CHECKCONSTRAINTS` to find errors in foreign
    key constraints, and CHECK constraints. `DBCC CHECKCONSTRAINTS` is covered later
    in this chapter.


    ![../images/333037_2_En_9_Chapter/333037_2_En_9_Fig14_HTML.jpg](images/333037_2_En_9_Chapter/333037_2_En_9_Fig14_HTML.jpg)

    Figure 9-14 Results of `DBCC CHECKDB` in emergency mode


    ### Note


    If running `DBCC CHECKDB` in emergency mode fails, then there is no other way
    that the database can be repaired.


    ### Other DBCC Commands for Corruption


    A number of other DBCC commands perform a subset of the work carried out by `DBCC
    CHECKDB`. These are discussed in the following sections.


    #### DBCC CHECKCATALOG


    In SQL Server the system catalog is a collection of metadata that describes the
    database and data held within it. When `DBCC CHECKCATALOG` is run, it performs
    consistency checks on this catalog. This command is run as part of `DBCC CHECKDB`
    but can also run as a command in its own right. When run in its own right, it
    accepts the same arguments as `DBCC CHECKDB`, with the exception of `PHYSICAL_ONLY`
    and `DATA_PURITY`, which are not available for this command.


    #### DBCC CHECKALLOC


    `DBCC CHECKALLOC` performs consistency checks against the disk allocation structures
    within a database. It is run as part of `DBCC CHECKDB` but can also be run as
    a command in its own right. When run in its own right, it accepts many of the
    same arguments as `DBCC CHECKDB`, with the exception of `PHYSICAL_ONLY`, `DATA_PURITY`,
    and `REPAIR_REBUILD`, which are not available for this command. The output is
    by table, index, and partition.


    #### DBCC CHECKTABLE


    `DBCC CHECKTABLE` is run against every table and indexed view in a database as
    part of `DBCC CHECKDB`. However, it can also be run as a separate command in its
    own right against a specific table and the indexes of that table. It performs
    consistency checks against that specific table, and if any indexed views reference
    the table, it also performs cross-table consistency checks. It accepts the same
    arguments as `DBCC CHECKDB`, but with it, you also need to specify the name or
    ID of the table that you want to check.


    ### Caution


    I have witnessed people split their tables into two buckets and replace `DBCC
    CHECKDB` with a run `DBCC CHECKTABLE` against half of their tables on alternate
    nights. This not only leaves gaps in what is being checked, but a new database
    snapshot is generated for every table that is checked, as opposed to one snapshot
    being generated for all checks to be performed. This can lead to longer runtimes,
    per table.


    #### DBCC CHECKFILEGROUP


    `DBCC CHECKFILEGROUP` performs consistency checks on the system catalog, the allocation
    structures, tables, and indexed views within a specified filegroup. There are
    some limitations to this, however, when a table has indexes that are stored on
    a different filegroup. In this scenario, the indexes are not checked for consistency.
    This still applies if it is the indexes that are stored on the filegroup that
    you are checking, but the corresponding base table is on a different filegroup.


    If you have a partitioned table, which is stored on multiple filegroups, `DBCC
    CHECKFILEGROUP` only checks the consistency of the partition(s) that are stored
    on the filegroup being checked. The arguments for `DBCC CHECKFILEGROUP` are the
    same as those for `DBCC CHECKDB`, with the exception of `DATA_PURITY`, which is
    not valid and you cannot specify any repair options. You also need to specify
    the filegroup name or ID.'
