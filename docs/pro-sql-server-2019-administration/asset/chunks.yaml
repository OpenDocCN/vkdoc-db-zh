    GDR（一般分发发布—针对安全问题的修补程序）。此功能可以节省 DBA 在安装 SQL Server 实例后立即安装最新更新所需的时间和精力，也有助于确保新构建的实例具有一致的修补级别。


    > **提示：** 从 SQL Server 2017 开始，不再发布服务包。所有更新均为 CU 或 GDR。


    ### 命令行安装参数

    要使用此功能，必须在命令行安装过程中使用两个参数。第一个是 `/UPDATEENABLED` 参数。应将此参数的值指定为 `1` 或 `True`。第二个是
    `/UPDATESOURCE` 参数。此参数将告诉安装程序在哪里查找产品更新。如果向此参数传入值 `MU`，则安装程序将检查 Microsoft Update
    或 WSUS 服务；或者，您也可以提供文件夹的相对路径或网络共享的 UNC（通用命名约定）路径。


    ### 包含 CU 的安装示例

    以下示例将研究如何使用此功能安装包含 CU1 的 SQL Server 2019，该 CU 位于网络共享中。当您下载 GDR 或 CU 时，它们将以自解压可执行文件的形式提供。这非常有用，因为即使您的环境中未使用
    WSUS，一旦您确认了新的修补级别，只需替换网络共享中的 CU 即可；执行此操作后，所有新构建都可以接收最新更新，而您无需更改用于构建新实例的 PowerShell
    脚本。


    > **注意：** 用于运行安装的账户需要对文件共享具有访问权限。


    清单 3-5 中的 PowerShell 命令将安装一个名为 `PROSQLADMINCU1` 的 SQL Server 实例，同时安装位于文件服务器上的
    CU1。


    ```

    .\SETUP.EXE / IACCEPTSQLSERVERLICENSETERMS /ACTION="Install" /FEATURES=SQLEngine,Replication,Conn
    /INSTANCENAME="PROSQLADMINCU1" /SQLSVCACCOUNT="MyDomain\SQLServiceAccount1" /SQLSVCPASSWORD="Pa$$w0rd"
    /AGTSVCACCOUNT="MyDomain\SQLServiceAccount1" /AGTSVCPASSWORD="Pa$$w0rd" /SQLSYSADMINACCOUNTS="MyDomain\SQLDBA"
    /UPDATEENABLED=1 /UPDATESOURCE="\\192.168.183.1\SQL2019_CU1\" /qs

    ```

    清单 3-5 安装期间安装 CU


    ### 验证实例版本

    清单 3-6 中的代码演示了如何查询两个实例之间的差异。该代码使用 `invoke-sqlcmd` 连接到 `PROSQLADMINCORE2` 实例并返回包含该实例完整版本详细信息（包括内部版本号）的系统变量。为了便于我们识别结果，其中也包含了实例的名称。


    ```

    $parameters = @{

    ServerInstance = ''localhost\PROSQLADMINCORE2''

    Query               = "

    SELECT

    @@SERVERNAME

    , @@VERSION

    "

    }

    Invoke-sqlcmd @parameters

    ```

    清单 3-6 确定每个实例的构建版本


    在此示例中，我们使用了名为“Splatting”的 PowerShell 技术。通过预先定义参数，这使我们的代码更具可读性。因为我们可以在 `invoke-sqlcmd`
    语句中使用多个 Splatting 组，所以也可以使用 Splatting 使代码可重用。例如，我们可以将查询放在与其他参数单独的 Splatting 组中，这意味着每次调用
    `invoke-sqlcmd` 都可以使用相同的参数集。结果如图 3-4 所示。


    ![../images/333037_2_En_3_Chapter/333037_2_En_3_Fig4_HTML.jpg](img/333037_2_En_3_Fig4_HTML.jpg)

    图 3-4 PROSQLADMINCORE2 版本详细信息


    从结果中我们可以看到，`PROSQLADMINCORE2` 运行在 SQL Server 内部版本号 `15.0.1100.94` 上，这是 SQL Server
    2019 CTP 2.1 的版本号。


    ## 使用配置文件

    本书前面已在多处提及使用配置文件来生成一致的构建。清单 3-7 中的示例是一个配置文件的内容，该文件已填充了在 Windows Server Core 上安装名为
    `PROSQLADMINCONF1` 的实例所需的所有必需参数。它还包含启用命名管道和 TCP/IP 的可选参数、将 FILESTREAM 启用级别设置为只能通过
    T-SQL 访问、将 SQL Agent 服务设置为自动启动以及将排序规则配置为 `Latin1_General_CI_AS`。在此 `.ini` 文件中，以分号开头的行定义为注释。


    ```

    ; SQL Server 2019 Configuration File

    [OPTIONS]

    ; Accept the SQL Server License Agreement

    IACCEPTSQLSERVERLICENSETERMS

    ; Specifies a Setup work flow, like INSTALL, UNINSTALL, or UPGRADE.

    ; This is a required parameter.

    ACTION="Install"

    ; Setup will display progress only, without any user interaction.

    QUIETSIMPLE="True"

    ; Specifies features to install, uninstall, or upgrade.

    FEATURES=SQLENGINE,REPLICATION,CONN

    ; Specify a default or named instance. MSSQLSERVER is the default instance for

    ; non-Express editions and SQLExpress is for Express editions. This parameter
    is

    ; required when installing the SQL Server Database Engine (SQL), Analysis

    ; Services (AS)

    INSTANCENAME="PROSQLADMINCONF1"

    ; Agent account name

    AGTSVCACCOUNT="MyDomain\SQLServiceAccount1"

    ; Agent account password

    AGTSVCPASSWORD="Pa$$w0rd"

    ; Auto-start service after installation.

    AGTSVCSTARTUPTYPE="Automatic"

    ; Level to enable FILESTREAM feature at (0, 1, 2 or 3).

    FILESTREAMLEVEL="1"

    ; Specifies a Windows collation or an SQL collation to use for the Database

    ; Engine.

    SQLCOLLATION="Latin1_General_CI_AS"

    ; Account for SQL Server service: Domain\User or system account.

    SQLSVCACCOUNT="MyDomain\SQLServiceAccount1"

    ; Password for the SQL Server service account.

    SQLSVCPASSWORD="Pa$$w0rd"

    ; Windows account(s) to provision as SQL Server system administrators.

    SQLSYSADMINACCOUNTS="MyDomain\SQLDBA"

    ; Specify 0 to disable or 1 to enable the TCP/IP protocol.

    TCPENABLED="1"

    ; Specify 0 to disable or 1 to enable the Named Pipes protocol.

    NPENABLED="1"

    ```

    清单 3-7 用于 PROSQLADMINCONF1 的配置文件'
- fmt: '### Tip


    如果你使用先前 SQL Server 安装创建的配置文件作为自己配置文件的模板，你会注意到以下参数被指定：`MATRIXCMBRICKCOMMPORT`、`MATRIXCMSERVERNAME`、`MATRIXNAME`、`COMMFABRICENCRYPTION`、`COMMFABRICNETWORKLEVEL`
    和 `COMMFABRICPORT`。这些参数仅供 Microsoft 内部使用，应予以忽略。它们对构建没有影响。


    假设此配置文件已保存为 `c:\SQL2019\configuration1.ini`，那么可以使用清单 [3-8](#333037_2_En_3_Chapter.xhtml#PC8)
    中的代码从 PowerShell 运行 `setup.exe`。


    ```

    .\setup.exe /CONFIGURATIONFILE="c:\SQL2019\Configuration1.ini"

    Listing 3-8

    使用配置文件安装 SQL Server

    ```


    尽管这是对配置文件的完全有效的用法，但你实际上可以更进一步，使用此方法创建一个可重用的脚本，该脚本可以在任何服务器上运行，以帮助你引入一致的构建过程。本质上，你是在使用
    Windows Server Core 的准备式独立映像的脚本化版本。如果你们的 Windows 运维团队尚未采用 Sysprep 或使用其他方法来构建服务器，这将特别有用。


    在清单 [3-9](#333037_2_En_3_Chapter.xhtml#PC9) 中，你会看到另一个配置文件。然而，这次它仅包含你期望在整个环境中保持一致的静态参数。每次安装时会变化的参数（如实例名称和服务帐户详细信息）已被省略。


    ```

    ;SQL Server 2019 Configuration File

    [OPTIONS]

    ; Accept the SQL Server License Agreement

    IACCEPTSQLSERVERLICENSETERMS

    ; Specifies a Setup work flow, like INSTALL, UNINSTALL, or UPGRADE.

    ; This is a required parameter.

    ACTION="Install"

    ; Setup will display progress only, without any user interaction.

    QUIETSIMPLE="True"

    ; Specifies features to install, uninstall, or upgrade.

    FEATURES=SQLENGINE,REPLICATION,CONN

    ; Auto-start service after installation.

    AGTSVCSTARTUPTYPE="Automatic"

    ; Level to enable FILESTREAM feature at (0, 1, 2 or 3).

    FILESTREAMLEVEL="1"

    ; Specifies a Windows collation or an SQL collation to use for the Database Engine.

    SQLCOLLATION="Latin1_General_CI_AS"

    ; Windows account(s) to provision as SQL Server system administrators.

    SQLSYSADMINACCOUNTS="MyDomain\SQLDBA"

    ; Specify 0 to disable or 1 to enable the TCP/IP protocol.

    TCPENABLED="1"

    ; Specify 0 to disable or 1 to enable the Named Pipes protocol.

    NPENABLED="1"

    Listing 3-9

    用于 PROSQLADMINCONF2 的配置文件

    ```


    这意味着要成功安装实例，你将需要使用来自配置文件的参数和运行 `setup.exe` 的命令中的行内参数的组合，如清单 [3-10](#333037_2_En_3_Chapter.xhtml#PC10)
    所示。此示例假设清单 [3-9](#333037_2_En_3_Chapter.xhtml#PC9) 中的配置已保存为 `C:\SQL2019\Configuration2.ini`，并将安装名为
    `PROSQLADMINCONF2` 的实例。


    ```

    .\SETUP.EXE /INSTANCENAME="PROSQLADMINCONF2" /SQLSVCACCOUNT="MyDomain\SQLServiceAccount1"
    /SQLSVCPASSWORD="Pa$$w0rd" /AGTSVCACCOUNT="MyDomain\SQLServiceAccount1" /AGTSVCPASSWORD="Pa$$w0rd"
    /CONFIGURATIONFILE="C:\SQL2019\Configuration2.ini"

    Listing 3-10

    使用混合参数和配置文件安装 SQL Server

    ```


    ## 自动化安装例程


    这种方法的好处是，我们拥有一个一致的配置文件，无需在每次构建新实例时进行修改。然而，这个想法可以更进一步。如果我们将 PowerShell 命令保存为 PowerShell
    脚本，那么我们可以运行该脚本并传入参数，而不是每次重写命令。这将提供一个用于构建新实例的一致脚本，我们可以将其置于变更控制之下。清单 [3-11](#333037_2_En_3_Chapter.xhtml#PC11)
    中的代码演示了如何构造一个参数化的 PowerShell 脚本，该脚本将使用相同的配置文件。该脚本假设 `D:\` 是安装介质的根文件夹。


    ```

    param(

    [string] $InstanceName,

    [string] $SQLServiceAccount,

    [string] $SQLServiceAccountPassword,

    [string] $AgentServiceAccount,

    [string] $AgentServiceAccountPassword

    )

    D:\SETUP.EXE /INSTANCENAME=$InstanceName /SQLSVCACCOUNT=$SQLServiceAccount /SQLSVCPASSWORD=$SQLServiceAccountPassword
    /AGTSVCACCOUNT=$AgentServiceAccount /AGTSVCPASSWORD=$AgentServiceAccountPassword
    /CONFIGURATIONFILE="C:\SQL2019\Configuration2.ini"

    Listing 3-11

    用于自动安装的 PowerShell 脚本

    ```


    假设此脚本保存为 `SQLAutoInstall.ps1`，则可以使用清单 [3-12](#333037_2_En_3_Chapter.xhtml#PC12)
    中的命令来构建名为 `PROSQLADMINAUTO1` 的实例。此命令运行 PowerShell 脚本，传入参数，这些参数随后用于 `setup.exe`
    命令。


    ```

    ./SQLAutoInstall.ps1 -InstanceName ''PROSQLADMIN1'' -SQLServiceAccount ''MyDomain\SQLServiceAccount1''
    -SQLServiceAccountPassword ''Pa$$w0rd'' -AgentServiceAccount ''MyDomain\SQLServiceAccount1''
    -AgentServiceAccountPassword ''Pa$$w0rd''

    Listing 3-12

    运行 SQLAutoInstall.ps1

    ```


    ### Tip


    因为我已经指定了参数的名称，所以不需要按照它们在脚本中声明的顺序来指定。这也使代码更具可读性。


    ### 增强安装例程


    你还可以进一步扩展 `SQLAutoInstall.ps1` 脚本，并利用你在第 [1](#333037_2_En_1_Chapter.xhtml) 章学到的用于配置操作系统组件的技术和本章前面学到的用于执行冒烟测试的技术。


    安装实例后，修改后的脚本（清单 [3-13](#333037_2_En_3_Chapter.xhtml#PC13)，我们将其称为 `SQLAutoInstall2.ps1`）使用
    `powercfg` 设置高性能电源计划，并使用 `set-ItemProperty` 优先考虑后台服务而非前台应用程序。然后运行冒烟测试以确保 SQL Server
    和 SQL Agent 服务都在运行并且实例可访问。


    ```

    param(

    [string] $InstanceName,

    [string] $SQLServiceAccount,

    [string] $SQLServiceAccountPassword,

    [string] $AgentServiceAccount,

    [string] $AgentServiceAccountPassword

    )

    # Initialize ConnectionString variable

    $ServerName = $env:computername

    $ConnectionString = $ServerName + ''\'' + $InstanceName

    #Install the instance

    ./SETUP.EXE /INSTANCENAME=$InstanceName /SQLSVCACCOUNT=$SQLServiceAccount /SQLSVCPASSWORD=$SQLServiceAccountPassword
    /AGTSVCACCOUNT=$AgentServiceAccount /AGTSVCPASSWORD=$AgentServiceAccountPassword
    /CONFIGURATIONFILE="C:\SQL2019\Configuration2.ini"

    # Configure OS settings

    powercfg -setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c

    Set-ItemProperty -path HKLM:\SYSTEM\CurrentControlSet\Control\PriorityControl
    -name Win32PrioritySeparation -Type DWORD -Value 24

    # Run smoke tests

    Get-service -displayname *$InstanceName*

    Invoke-sqlcmd -Serverinstance $ConnectionString -Query "SELECT @@SERVERNAME"

    Listing 3-13

    增强的 PowerShell 自动安装脚本

    ```


    除了将变量传递到 `setup.exe` 命令外，此脚本还使用 `$InstanceName` 参数作为冒烟测试的输入。该参数可以直接传递给 `get-service`
    cmdlet，两侧使用通配符。然而，对于 `invoke-sqlcmd`，我们需要做一点额外的工作。`invoke-sqlcmd` 需要实例的全名，包括服务器名称或
    `local`（假设脚本始终在本地运行）。该脚本从 `ComputerName` 环境变量中提取服务器名称，然后将其与 `$InstanceName` 变量连接，两者之间放置一个
    `\`。这个连接后的值填充了 `$ConnectionString` 变量，然后可以将其传递给 `-Serverinstance` 开关。'
  raw: '### Tip


    If you use a configuration file created by a previous SQL Server installation
    as a template for your own config file, you will notice that the following parameters
    are specified: MATRIXCMBRICKCOMMPORT, MATRIXCMSERVERNAME, MATRIXNAME, COMMFABRICENCRYPTION,
    COMMFABRICNETWORKLEVEL, and COMMFABRICPORT. These parameters are intended for
    internal use by Microsoft only and should be ignored. They have no effect on the
    build.


    Assuming that this configuration file had been saved as c:\SQL2019\configuration1.ini,
    then the code in Listing [3-8](#333037_2_En_3_Chapter.xhtml#PC8) could be used
    to run setup.exe from PowerShell.


    ```

    .\setup.exe /CONFIGURATIONFILE="c:\SQL2019\Configuration1.ini"

    Listing 3-8

    Installing SQL Server Using a Configuration File

    ```


    Although this is a perfectly valid use of a configuration file, you can actually
    be a little bit more sophisticated and use this approach to create a reusable
    script, which can be run on any server, to help you introduce a consistent build
    process. Essentially, you are using a scripted version of a prepared stand-alone
    image for Windows Server Core. This is particularly useful if your Windows operational
    teams have not adopted the use of Sysprep or use other methods to build servers.


    In Listing [3-9](#333037_2_En_3_Chapter.xhtml#PC9), you will see another configuration
    file. This time, however, it only includes the static parameters that you expect
    to be consistent across your estate. Parameters that will vary for each installation,
    such as instance name and service account details, have been omitted.


    ```

    ;SQL Server 2019 Configuration File

    [OPTIONS]

    ; Accept the SQL Server License Agreement

    IACCEPTSQLSERVERLICENSETERMS

    ; Specifies a Setup work flow, like INSTALL, UNINSTALL, or UPGRADE.

    ; This is a required parameter.

    ACTION="Install"

    ; Setup will display progress only, without any user interaction.

    QUIETSIMPLE="True"

    ; Specifies features to install, uninstall, or upgrade.

    FEATURES=SQLENGINE,REPLICATION,CONN

    ; Auto-start service after installation.

    AGTSVCSTARTUPTYPE="Automatic"

    ; Level to enable FILESTREAM feature at (0, 1, 2 or 3).

    FILESTREAMLEVEL="1"

    ; Specifies a Windows collation or an SQL collation to use for the Database Engine.

    SQLCOLLATION="Latin1_General_CI_AS"

    ; Windows account(s) to provision as SQL Server system administrators.

    SQLSYSADMINACCOUNTS="MyDomain\SQLDBA"

    ; Specify 0 to disable or 1 to enable the TCP/IP protocol.

    TCPENABLED="1"

    ; Specify 0 to disable or 1 to enable the Named Pipes protocol.

    NPENABLED="1"

    Listing 3-9

    Configuration File for PROSQLADMINCONF2

    ```


    This means that to successfully install the instance, you will need to use a mix
    of parameters from the configuration file and also inline with the command that
    runs setup.exe, as demonstrated in Listing [3-10](#333037_2_En_3_Chapter.xhtml#PC10).
    This example assumes that the configuration in Listing [3-9](#333037_2_En_3_Chapter.xhtml#PC9)
    has been saved as C:\SQL2019\Configuration2.ini and will install an instance named
    PROSQLADMINCONF2.


    ```

    .\SETUP.EXE /INSTANCENAME="PROSQLADMINCONF2" /SQLSVCACCOUNT="MyDomain\SQLServiceAccount1"
    /SQLSVCPASSWORD="Pa$$w0rd" /AGTSVCACCOUNT="MyDomain\SQLServiceAccount1" /AGTSVCPASSWORD="Pa$$w0rd"
    /CONFIGURATIONFILE="C:\SQL2019\Configuration2.ini"

    Listing 3-10

    Installing SQL Server Using a Mix of Parameters and a Configuration File

    ```


    ## Automatic Installation Routines


    This approach gives us the benefit of having a consistent configuration file that
    we do not need to modify every time we build out a new instance. This idea can
    be taken even further, however. If we were to save our PowerShell command as a
    PowerShell script, then we could run the script and pass in parameters, rather
    than rewrite the command each time. This will give a consistent script for building
    new instances, which we can place under change control. The code in Listing [3-11](#333037_2_En_3_Chapter.xhtml#PC11)
    demonstrates how to construct a parameterized PowerShell script, which will use
    the same configuration file. The script assumes `D:\` is the root folder of the
    installation media.


    ```

    param(

    [string] $InstanceName,

    [string] $SQLServiceAccount,

    [string] $SQLServiceAccountPassword,

    [string] $AgentServiceAccount,

    [string] $AgentServiceAccountPassword

    )

    D:\SETUP.EXE /INSTANCENAME=$InstanceName /SQLSVCACCOUNT=$SQLServiceAccount /SQLSVCPASSWORD=$SQLServiceAccountPassword
    /AGTSVCACCOUNT=$AgentServiceAccount /AGTSVCPASSWORD=$AgentServiceAccountPassword
    /CONFIGURATIONFILE="C:\SQL2019\Configuration2.ini"

    Listing 3-11

    PowerShell Script for Auto-install

    ```


    Assuming that this script is saved as SQLAutoInstall.ps1, the command in Listing
    [3-12](#333037_2_En_3_Chapter.xhtml#PC12) can be used to build an instance named
    PROSQLADMINAUTO1\. This command runs the PowerShell script, passing in parameters,
    which are then used in the setup.exe command.


    ```

    ./SQLAutoInstall.ps1 -InstanceName ''PROSQLADMIN1'' -SQLServiceAccount ''MyDomain\SQLServiceAccount1''
    -SQLServiceAccountPassword ''Pa$$w0rd'' -AgentServiceAccount ''MyDomain\SQLServiceAccount1''
    -AgentServiceAccountPassword ''Pa$$w0rd''

    Listing 3-12

    Running SQLAutoInstall.ps1

    ```


    ### Tip


    Because I have specified the parameter’s names, they do not need to be specified
    in the order they are declared in the script. It also makes the code more readable.


    ### Enhancing the Installation Routine


    You could also extend the SQLAutoInstall.ps1 script further and use it to incorporate
    thetechniques that you learned in Chapter [1](#333037_2_En_1_Chapter.xhtml) for
    the configuration of operating system components and the techniques that you learned
    earlier in this chapter for performing smoke tests.


    After installing an instance, the amended script in Listing [3-13](#333037_2_En_3_Chapter.xhtml#PC13),
    which we will refer to as SQLAutoInstall2.ps1, uses powercfg to set the High Performance
    power plan and set-ItemProperty to prioritize background services over foreground
    applications. It then runs smoke tests to ensure that the SQL Server and SQL Agent
    services are both running and that the instance is accessible.


    ```

    param(

    [string] $InstanceName,

    [string] $SQLServiceAccount,

    [string] $SQLServiceAccountPassword,

    [string] $AgentServiceAccount,

    [string] $AgentServiceAccountPassword

    )

    # Initialize ConnectionString variable

    $ServerName = $env:computername

    $ConnectionString = $ServerName + ''\'' + $InstanceName

    #Install the instance

    ./SETUP.EXE /INSTANCENAME=$InstanceName /SQLSVCACCOUNT=$SQLServiceAccount /SQLSVCPASSWORD=$SQLServiceAccountPassword
    /AGTSVCACCOUNT=$AgentServiceAccount /AGTSVCPASSWORD=$AgentServiceAccountPassword
    /CONFIGURATIONFILE="C:\SQL2019\Configuration2.ini"

    # Configure OS settings

    powercfg -setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c

    Set-ItemProperty -path HKLM:\SYSTEM\CurrentControlSet\Control\PriorityControl
    -name Win32PrioritySeparation -Type DWORD -Value 24

    # Run smoke tests

    Get-service -displayname *$InstanceName*

    Invoke-sqlcmd -Serverinstance $ConnectionString -Query "SELECT @@SERVERNAME"

    Listing 3-13

    Enhanced PowerShell Auto-install Script

    ```


    As well as passing variables into the setup.exe command, this script also uses
    the $InstanceName parameter as input for the smoke tests. The parameter can be
    passed straight into to get-service cmdlet, with wildcards on either side. For
    invoke-sqlcmd, however, we need to do a little extra work. Invoke-sqlcmd requires
    the full name of the instance, including the server name, or local, assuming that
    the script is always run locally. The script pulls the name of the server from
    the ComputerName environmental variable and then concatenates this with the $InstanceName
    variable, placing a \ between the two. This concatenated value populates the $ConnectionString
    variable, which can then be passed into the `-Serverinstance` switch.'
