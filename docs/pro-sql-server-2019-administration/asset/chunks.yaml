    \

    /SECURITYMODE=SQL /SAPWD="Passw0rd" /SQLSVCACCOUNT="NT AUTHORITY\System" \

    /AGTSVCACCOUNT="NT AUTHORITY\System" /SQLSYSADMINACCOUNTS="BUILTIN\Administrators"
    \

    /IACCEPTSQLSERVERLICENSETERMS=1 /TCPENABLED=1 /UPDATEENABLED=False

    #Install Chocolatey and SQL Server Command Line Utilities

    RUN @"%SystemRoot%\System32\WindowsPowerShell\v1.0\powershell.exe" -NoProfile
    -InputFormat None -ExecutionPolicy Bypass -Command "iex ((New-Object System.Net.WebClient).DownloadString(''https://chocolatey.org/install.ps1''))"
    && SET "PATH=%PATH%;%ALLUSERSPROFILE%\chocolatey\bin"

    RUN choco install sqlserver-cmdlineutils -y

    #Set SQL Server to start automaticaly

    RUN powershell -Command (Set-Service MSSQLSERVER -StartupType Automatic)

    #Remove the installation media

    RUN powershell -Command (Remove-Item -Path C:/SQL2019 -Recurse -Force)

    #Create a mountpoint for data files

    VOLUME C:/DataFiles

    #Copy start.ps1 to container

    COPY \start.ps1 /

    WORKDIR /

    CMD powershell -Command (.\start.ps1)

    Listing 4-20

    Dockerfile

    ```


    Working through the contents of the file, even without experience of Docker, it
    is fairly easy to see what is happening. Our first statement indicates that our
    build will be based upon the Windows Server 2019 Core build, supplied by Microsoft.
    We then use the RUN and COPY instructions to copy the SQL Server media to the
    container.


    After this, we move straight into the installation of SQL Server. Installing SQL
    Server via PowerShell is discussed in Chapter [3](#333037_2_En_3_Chapter.xhtml).
    There is no difference in this code as to when you install SQL Server on a traditional
    server running Windows Server Core. The only interesting thing to note is that
    because the command spans multiple lines, we have used the \ at the end of each
    line, to let Docker know that it is a single instruction.


    The next part of the script is quite interesting. We are installing Chocolatey.
    Chocolatey is a package manager for Windows, which has a large gallery of prepackaged
    applications. In this case, it is helpful, because it allows us to easily install
    SQL Server Command Line Utilities, which is available on the Chocolatey gallery.


    ### Tip


    Chocolatey can also be used to package your own SQL Server builds. I did this
    for a client recently, and it fits very nicely into a DevOps/configuration management
    style of operations.


    Next, we use the RUN instruction, to run PowerShell commands, which will clean
    up our installation files and ensure that the Database Engine Service is started.
    Our next step is to use the VOLUME instruction to create a mount point for DataFiles.
    When we run an instance of the container, we will be able to map this to a folder
    on our host, to allow our data to be persisted.


    Finally, we copy a file called Start.ps1 to our container and run it. The content
    of Start.ps1 is shown in Listing [4-21](#333037_2_En_4_Chapter.xhtml#PC21). This
    script is used to run an infinite loop. If we did not do this, then the container
    would stop, as soon as the last instruction was sent.


    ```

    $lastCheck = (Get-Date).AddSeconds(-2)

    while ($true)

    {

    $lastCheck = Get-Date

    Start-Sleep -Seconds 2

    }

    Listing 4-21

    Start.ps1

    ```


    After saving both of these files in the C:\DockerBuild folder of the host, we
    can build the image, by running the command in Listing [4-22](#333037_2_En_4_Chapter.xhtml#PC22).
