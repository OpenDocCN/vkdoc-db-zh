    ## Metadata for Troubleshooting and Performance Tuning


    You can use many metadata objects to tune performance and troubleshoot issues
    within SQL Server. In the following sections, we explore how to capture performance
    counters from within SQL Server, how to analyze waits, and how to use DMVs to
    troubleshoot issues with expensive queries.'
