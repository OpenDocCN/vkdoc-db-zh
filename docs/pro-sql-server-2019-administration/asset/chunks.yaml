    # SQL Server 安装配置


    ## FILESTREAM 配置


    数据库引擎配置的 **FILESTREAM** 选项卡允许您启用和配置 SQL Server **FILESTREAM** 功能的访问级别，如图 2-28
    所示。如果您希望使用 SQL Server 的 **FileTable** 功能，则也必须启用 **FILESTREAM**。**FILESTREAM**
    和 **FileTable** 提供了在 Windows 文件夹结构中以非结构化方式存储数据的能力，同时保留了从 SQL Server 管理和查询这些数据的能力。


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig28_HTML.jpg](img/333037_2_En_2_Fig28_HTML.jpg)


    图 2-28 FILESTREAM 选项卡


    选择“为 Transact-SQL 访问启用 FILESTREAM”将启用 **FILESTREAM**，但数据只能从 SQL Server 内部访问。此外，选择“为文件
    I/O 访问启用 FILESTREAM”使应用程序能够直接从操作系统访问数据，绕过 SQL Server。如果选择此选项，则还需要提供一个预先存在的文件共享的名称，该共享将用于直接应用程序访问。“允许远程客户端访问
    FILESTREAM 数据”选项使数据可供远程应用程序使用。这三个选项是逐层构建的，例如，如果不先选择“为 Transact-SQL 访问启用 FILESTREAM”，就不可能选择“为文件
    I/O 访问启用 FILESTREAM”。**FILESTREAM** 和 **FileTable** 将在第 6 章进一步讨论。


    ## 配置分布式重放


    如图 2-29 所示，向导的下一页将提示您指定将被授予访问 **Distributed Replay Controller** 服务的用户。与授予实例管理权限的方式相同，您可以使用“添加当前用户”按钮添加您当前的安全上下文，也可以使用“添加”按钮浏览
    Windows 用户和组。


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig29_HTML.jpg](img/333037_2_En_2_Fig29_HTML.jpg)


    图 2-29 Distributed Replay Controller 页面


    在向导的下一页，您可以配置 **Distributed Replay** 客户端，如图 2-30 所示。“工作目录”是客户端上保存调度文件的文件夹。“结果目录”是客户端上保存跟踪文件的文件夹。每次运行跟踪时，这两个位置中的文件都将被覆盖。如果您有已配置的现有
    **Distributed Replay Controller**，则应在“控制器名称”字段中输入其名称。但是，如果您正在配置一个新的控制器，则该字段应留空，稍后在
    `DReplayClient.config` 配置文件中进行修改。**Distributed Replay** 的配置和使用将在第 21 章讨论。


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig30_HTML.jpg](img/333037_2_En_2_Fig30_HTML.jpg)


    图 2-30 Distributed Replay Client 页面


    ## 完成安装


    向导的“准备安装”页面是安装开始前的最后一页，如图 2-31 所示。此屏幕提供了将要安装的功能摘要，但此页面最有趣的部分可能是“配置文件路径”部分。它提供了一个配置文件的路径，您可以重用该文件来安装具有相同配置的更多实例。配置文件将在第
    3 章进一步讨论。


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig31_HTML.jpg](img/333037_2_En_2_Fig31_HTML.jpg)


    图 2-31 准备安装页面


    安装向导将在安装过程中显示进度条。安装完成后，将显示一个摘要屏幕，如图 2-32 所示。您应检查以确保每个正在安装的组件状态均为“成功”。至此，SQL Server
    安装完成。


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig32_HTML.jpg](img/333037_2_En_2_Fig32_HTML.jpg)


    图 2-32 完成页面


    ## 总结


    SQL Server 的安装中心提供了许多有用的工具和链接，用于指导和协助您的安装过程。您可以使用安装中心安装故障转移群集实例以及独立的 SQL Server
    实例。还有一些工具可帮助满足高级安装要求，例如 SQL Server 的准备映像以及基于配置文件的安装。


    除了使用 SQL Server 2019 安装向导安装数据库引擎实例外，您还可以使用同一工具安装 BI 和 ETL 套件中的工具，例如 **Analysis
    Services**、**Integration Services**、**Data Quality Services** 和 **Master Data
    Services**。如果您使用向导安装 **Analysis Services**，则可以使用多维模型或表模型配置该工具。


    虽然您可以使用默认值成功安装 SQL Server，但为了您的实例乃至您整个环境的长期可维护性，请务必考虑安装的诸多方面。这尤其适用于排序规则、服务帐户和其他安全注意事项，例如添加最合适的管理员组以及实施身份验证模型。


    # 3. Server Core 安装


    由于 SQL Server 不支持远程安装，并且 Windows Server Core 仅提供命令行界面（CLI）而没有图形用户界面（GUI），因此您必须在
    Windows Server Core 上将 SQL Server 安装作为命令行操作执行。您还可以使用配置文件来生成一致、可重复的安装。


    在本章中，我们将回顾在 Windows Server Core 上安装 SQL Server 的注意事项，然后演示如何在此平台上执行安装。我们还将讨论使用配置文件以及如何利用它们来简化未来的安装并确保一致性。


    在第 1 章中，您可能记得我们讨论了 SQL Server 在 Windows Server Core 上的限制，以及某些功能（如 **Reporting
    Services**、**Master Data Services** 和 **Data Quality Services**）不受支持，而其他功能（如 **Management
    Tools** 和 **Distributed Replay Client**）仅受远程支持。您还应确保在组织内的各种能力范围内具有操作可维护性，包括 **PowerShell**
    的熟练程度以及操作工具的兼容性。


    ## 安装实例


    在 Windows Server Core 中安装 SQL Server 需要从 **PowerShell** 终端运行 `setup.exe`。`setup.exe`
    可在 SQL Server 安装介质的根目录中找到。从 **PowerShell** 终端运行 `setup.exe` 时，可以使用开关和参数传入值，这些值将用于配置实例。


    > 注意：如果需要，您可以遵循相同的过程在基于 GUI 的 Windows 版本上安装 SQL Server。

