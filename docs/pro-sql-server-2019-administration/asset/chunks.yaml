  trans: '

    ### 通过 T-SQL 进行备份


    当您通过 T-SQL 备份数据库或日志时，可以指定许多参数。这些参数可以分为以下几类：


    #### 杂项选项


    | 参数 | 描述 |

    | --- | --- |

    | `BUFFERCOUNT` | 备份操作使用的 IO 缓冲区总数。 |

    | `MAXTRANSFERSIZE` | SQL Server 与备份媒体之间可能的最大传输单元，以字节为单位指定。 |

    | `STATS` | 指定应多久显示一次进度消息。默认设置是每完成 10% 显示一条进度消息。 |


    #### 日志特定选项


    | 参数 | 描述 |

    | --- | --- |

    | `NORECOVERY/STANDBY` | `NORECOVERY` 使数据库在备份完成后保持还原状态，用户无法访问。`STANDBY` 使数据库在备份完成后保持只读状态。`STANDBY`
    要求您指定事务撤消文件的路径和文件名，因此应使用格式 `STANDBY = transaction_undo_file`。如果未指定任一选项，则数据库在备份完成后将保持联机状态。
    |

    | `NO_TRUNCATE` | 指定即使数据库不处于健康状态，也应尝试进行日志备份。它也不会尝试截断日志的非活动部分。执行尾日志备份涉及使用指定的 `NORECOVERY`
    和 `NO_TRUNCATE` 来备份日志。 |


    #### 错误管理选项


    | 参数 | 描述 |

    | --- | --- |

    | `CHECKSUM/NO_CHECKSUM` | 指定在将每个页面写入媒体集之前是否应验证其页面校验和。 |

    | `CONTINUE_AFTER_ERROR/STOP_ON_ERROR` | `STOP_ON_ERROR` 是默认行为，如果在验证页面校验和时发现错误的校验和，则会导致备份失败。`CONTINUE_AFTER_ERROR`
    允许在发现错误校验和时继续进行备份。 |


    #### 媒体集选项


    | 参数 | 描述 |

    | --- | --- |

    | `INIT/NOINIT` | `INIT` 尝试覆盖媒体集中现有的备份集，但保留媒体头完整。除非指定了 `SKIP`，否则它会首先检查备份集的名称和过期日期。`NOINIT`
    将备份集追加到媒体集，这是默认行为。 |

    | `SKIP/NOSKIP` | `SKIP` 导致跳过对备份集名称和过期日期的 `INIT` 检查。`NOSKIP` 强制执行这些检查，这是默认行为。
    |

    | `FORMAT/NOFORMAT` | `FORMAT` 导致媒体头被覆盖，使媒体集中的任何备份集都不可用。这实质上是创建一个新的媒体集。不检查备份集名称和过期日期。`NOFORMAT`
    保留现有的媒体头，这是默认行为。 |

    | `MEDIANAME` | 指定媒体集的名称。 |

    | `MEDIADESCRIPTION` | 添加媒体集的描述。 |

    | `BLOCKSIZE` | 指定用于备份的块大小（以字节为单位）。`BLOCKSIZE` 对于磁盘和 URL 默认为 512，对于磁带默认为 65,536。
    |


    #### 备份集选项


    | 参数 | 描述 |

    | --- | --- |

    | `COPY_ONLY` | 指定应对数据库或日志进行 `copy_only` 备份。如果您执行差异备份，则忽略此选项。 |

    | `COMPRESSION/NO COMPRESSION` | 默认情况下，SQL Server 根据实例级设置决定是否应压缩备份。（可以在 `sys.configurations`
    中查看这些设置。）但是，您可以通过根据需要指定 `COMPRESSION` 或 `NO COMPRESSION` 来覆盖此设置。备份压缩仅在 SQL Server
    Enterprise、Business Intelligence 和 Standard Editions 中可用。 |

    | `NAME` | 为备份集指定名称。 |

    | `DESCRIPTION` | 向备份集添加描述。 |

    | `EXPIRYDATE/RETAINEDDAYS` | 使用 `EXPIRYDATE = datetime` 指定备份集过期的确切日期和时间。在此日期之后，备份集可以被覆盖。指定
    `RETAINDAYS = int` 以指定备份集过期前的天数。 |


    #### WITH 选项


    | 参数 | 描述 |

    | --- | --- |

    | `CREDENTIAL` | 备份到 Windows Azure Blob 时使用。 |

    | `DIFFERENTIAL` | 指定应执行差异备份。如果省略此选项，则执行完整备份。 |

    | `ENCRYPTION` | 指定用于备份加密的算法。如果不打算加密备份，则可以指定 `NO_ENCRYPTION`，这是默认选项。备份加密仅在 SQL
    Server Enterprise、Business Intelligence 和 Standard Editions 中可用。 |

    | `encryptor_name` | 加密程序的名称，格式为 `SERVER CERTIFICATE = encryptor name` 或 `SERVER
    ASYMMETRIC KEY = encryptor name`。 |


    #### 备份选项


    | 参数 | 描述 |

    | --- | --- |

    | `DATABASE/LOG` | 指定 `DATABASE` 以执行完整或差异备份。指定 `LOG` 以执行事务日志备份。 |

    | `database_name` | 要执行备份操作的数据库名称。也可以是包含数据库名称的变量。 |

    | `file_or_filegroup` | 要备份的文件或文件组的逗号分隔列表，格式为 `FILE = logical file name` 或 `FILEGROUP
    = Logical filegroup name`。 |

    | `READ_WRITE_FILEGROUPS` | 通过备份所有读/写文件组来执行部分备份。可选地，在此子句后使用逗号分隔的 `FILEGROUP =
    syntax` 添加只读文件组。 |

    | `TO` | 要条带化备份集的备份设备的逗号分隔列表，语法为 `DISK = physical device`、`TAPE = physical device`
    或 `URL = physical device`。 |

    | `MIRROR TO` | 要镜像备份集的备份设备的逗号分隔列表。如果使用 `MIRROR TO` 子句，则指定的备份设备数量必须等于 `TO` 子句中指定的备份设备数量。
    |


    *   备份选项（在表 12-1 中描述）。

    *   `WITH` 选项（在表 12-2 中描述）。

    *   备份集选项（在表 12-3 中描述）。

    *   媒体集选项（在表 12-4 中描述）。

    *   错误管理选项（在表 12-5 中描述）。

    *   磁带选项已弃用多个版本，不应使用。因此，本章省略了磁带选项的详细信息。

    *   日志特定选项（在表 12-6 中描述）。

    *   杂项选项（在表 12-7 中描述）。


    为了执行我们之前通过 GUI 演示的 `Chapter12` 数据库的完整数据库备份，我们可以使用清单 12-4 中的命令。在运行此脚本之前，请修改备份设备的路径以满足您系统的配置。


    ```sql

    BACKUP DATABASE Chapter12

    TO  DISK = ''H:\MSSQL\Backup\Chapter12.bak''

    WITH  RETAINDAYS = 90

    , FORMAT

    , INIT

    , MEDIANAME = ''Chapter12''

    , NAME = ''Chapter12-Full Database Backup''

    , COMPRESSION ;

    GO

    ```

    清单 12-4：执行完整备份


    如果我们想要对 `Chapter12` 数据库执行差异备份并将备份追加到同一媒体集，我们可以在语句中添加 `WITH DIFFERENTIAL` 选项，如清单
    12-5 所示。在运行此脚本之前，请修改备份设备的路径以满足您系统的配置。


    ```sql

    BACKUP DATABASE Chapter12

    TO  DISK = ''H:\MSSQL\Backup\Chapter12.bak''

    WITH  DIFFERENTIAL

    , RETAINDAYS = 90

    , NOINIT

    , MEDIANAME = ''Chapter12''

    , NAME = ''Chapter12-Diff Database Backup''

