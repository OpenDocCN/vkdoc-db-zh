    ## 添加 AlwaysOn 可读辅助副本


    为了实现横向扩展的报表功能，在 `AlwaysOn 可用性组` 拓扑中添加可读辅助副本会非常有用。当您使用此策略时，数据库通过日志流保持同步，其延迟是可变的，但通常较低。可读辅助副本的额外优势在于，即使主副本脱机，它们也能保持在线。可读辅助副本可以添加到为
    `HA` 和/或 `DR` 配置的现有 `可用性组` 中。或者，如果数据库没有 `HA` 或 `DR` 要求，但读取扩展是有利的，则可以专门创建一个 `可用性组`
    用于读取扩展。


    ### 优势与注意事项


    除了纯粹的横向扩展之外，可读辅助副本还提供其他优势，例如临时统计信息，您也可以使用它来优化只读工作负载。此外，即使明确请求了其他隔离级别或锁定提示，在可读辅助副本上也**专门**使用快照隔离。这有助于避免争用，但也意味着
    `TempDB` 应进行适当扩展并放置在快速磁盘阵列上。


    使用可读辅助副本的主要风险是，在辅助副本上实现快照隔离实际上可能导致主副本上的已删除记录无法被清理。这是因为幽灵记录清理任务仅在不再需要辅助副本上的行后，才会从主副本中移除它们。在这种情况下，主副本上的日志截断也会被延迟。这意味着您可能不得不终止正在针对可读辅助副本执行的长时间运行的查询。如果辅助副本与主副本断开连接，此问题也可能发生。因此，存在您可能需要将辅助副本从
    `可用性组` 中移除并随后重新添加的风险。


    ### 实现可读辅助副本


    在本节中，我们将使用在章节 14 中也使用过的 `PROSQLADMIN-C` 集群。然而，这次在站点 1 中为集群添加了一个额外的节点。该服务器名为 `CLUSTERNODE4`，并承载了一个名为
    `READABLE` 的实例。此实例已在服务上启用了 `AlwaysOn 可用性组`。


    ### 提示


    在本节中，我们将涉及 `可用性组` 的通用配置，但更多详细信息可在章节 14 中找到，因为此处的主要重点将是配置一个可读辅助副本。


    在我们创建 `可用性组` 之前，我们将首先使用清单 16-6 中的脚本创建一个名为 `Chapter16ReadScale` 的数据库。


    ```sql

    CREATE DATABASE Chapter16ReadScale ;

    GO

    USE Chapter16ReadScale

    GO

    CREATE TABLE Customers

    (

    ID                  INT            PRIMARY KEY        IDENTITY,

    FirstName           NVARCHAR(30),

    LastName            NVARCHAR(30),

    CreditCardNumber    VARBINARY(8000)

    ) ;

    GO

    --Populate the table

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE ;

    DECLARE @Names TABLE

    (

    FirstName       VARCHAR(30),

    LastName        VARCHAR(30)

    ) ;

    INSERT INTO @Names

    VALUES(''Peter'', ''Carter''),

    (''Michael'', ''Smith''),

    (''Danielle'', ''Mead''),

    (''Reuben'', ''Roberts''),

    (''Iris'', ''Jones''),

    (''Sylvia'', ''Davies''),

    (''Finola'', ''Wright''),

    (''Edward'', ''James''),

    (''Marie'', ''Andrews''),

    (''Jennifer'', ''Abraham''),

    (''Margaret'', ''Jones'') ;

    INSERT INTO Customers(Firstname, LastName, CreditCardNumber)

    SELECT  FirstName, LastName, CreditCardNumber FROM

    (SELECT

    (SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName

    ,(SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName

    ,(SELECT CONVERT(VARBINARY(8000)

    ,(SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99

    ORDER BY NEWID()) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99

    ORDER BY NEWID()) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99

    ORDER BY NEWID()) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99

    ORDER BY NEWID()))) CreditCardNumber

    FROM @Numbers a

    CROSS JOIN @Numbers b

    ) d

    ```

    *清单 16-6：创建 `Chapter16ReadScale` 数据库*


    接下来，我们将使用 `可用性组` 向导创建一个 `可用性组`。在向导的第一页（图 16-28）中，我们将为新的 `可用性组` 提供一个名称。在我们的例子中，我们将其命名为
    `Chapter16`。我们还将集群类型指定为 `Windows 故障转移集群`。


