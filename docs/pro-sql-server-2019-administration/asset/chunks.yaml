    it is possible to install SQL Server in a predefined role, using the /ROLE parameter.
    The roles supported by the `/ROLE` parameter are detailed in Table [3-4](#333037_2_En_3_Chapter.xhtml#Tab4).


    Table 3-4


    Available Values for the `/ROLE` Parameter


    | Parameter Value | Description |

    | --- | --- |

    | `SPI_AS_ExistingFarm` | Installs SSAS as a PowerPivot instance in an existing
    SharePoint farm |

    | `SPI_AS_NewFarm` | Installs the Database Engine and SSAS as a PowerPivot instance
    in a new and unconfigured SharePoint farm |

    | `AllFeatures_WithDefaults` | Installs all features of SQL Server and its components.
    I do not recommend using this option, except in the most occasional circumstances,
    as installing more features than are actually required increases the security
    and resource utilization footprints of SQL Server |


    ### Basic Installation


    When you are working with command-line parameters for setup.exe, you should observe
    the rules outlined in Table [3-5](#333037_2_En_3_Chapter.xhtml#Tab5) with regard
    to syntax.


    Table 3-5


    Syntax Rules for Command-Line Parameters


    | Parameter Type | Syntax |

    | --- | --- |

    | Simple switch | `/SWITCH` |

    | True/False | `/PARAMETER=true/false` |

    | Boolean | `/PARAMETER=0/1` |

    | Text | `/PARAMETER="Value"` |

    | Multivalued text | `/PARAMETER="Value1" "Value2"` |

    | `/FEATURES` parameter | `/FEATURES=Feature1,Feature2` |


    ### Tip


    For text parameters, the quotation marks are only required if the value contains
    spaces. However, it is considered good practice to always include them.


    Assuming that you have already navigated to the root directory of the installation
    media, then the command in Listing [3-1](#333037_2_En_3_Chapter.xhtml#PC1) provides
    PowerShell syntax for installing the Database Engine, Replication, and Client
    Connectivity components. It uses default values for all optional parameters, with
    the exception of the collation, which we will set to the Windows collation Latin1_General_CI_AS.


    ### Tip


    When Windows Server Core boots, the interface you see is the command prompt, not
    the PowerShell prompt. Type powershell to enter a PowerShell prompt.


    ```

    .\SETUP.EXE /IACCEPTSQLSERVERLICENSETERMS /ACTION="Install" /FEATURES=SQLEngine,Replication,Conn
    /INSTANCENAME="PROSQLADMINCORE2" /SQLSYSADMINACCOUNTS="Administrator" /SQLCOLLATION="Latin1_General_CI_AS"
    /qs

    Listing 3-1

    Installing SQL Server from PowerShell

    ```


    ### Note


    If using the command prompt, instead of PowerShell, the leading `.\` characters
    are not required.


    In this example, a SQL Server instance named PROSQLADMINCORE will be installed.
    Both the Database Engine and the SQL Agent services will run under the SQLServiceAccount1
    account, and the Windows group called SQLDBA will be made administrator. When
    installation begins, a pared down, noninteractive version of the installation
    wizard will appear to keep you updated on progress.'
  trans: '

    ### 必需参数


    虽然许多开关和参数是可选的，但有些参数必须始终包含。当您安装数据库引擎的独立实例时，表 3-1 中列出的参数始终是必需的。


    表 3-1


    必需参数


    | 参数 | 用法 |

    | --- | --- |

    | `/IACCEPTSQLSERVERLICENSETERMS` | 确认您接受 SQL Server 许可条款 |

    | `/ACTION` | 指定您想要执行的操作，例如“安装”或“升级” |

    | `/FEATURES` 或 `/ROLE` | 指定您希望安装的功能 |

    | `/INSTANCENAME` | 将分配给该实例的名称 |

    | `/SQLSYSADMINACCOUNTS` | 将在数据库引擎实例中被授予管理权限的 Windows 安全上下文 |

    | `/AGTSVCACCOUNT` | 将用于运行 SQL Server 代理服务的帐户 |

    | `/SQLSVCACCOUNT` | 将用于运行数据库引擎服务的帐户 |

    | `/qs` | 执行无人参与安装。在 Windows Server Core 上这是必需的，因为不支持安装向导 |


    #### IACCEPTSQLSERVERLICENSETERMS 开关


    因为 `/IACCEPTSQLSERVERLICENSETERMS` 是一个表示您接受许可条款的简单开关，所以它不需要传递任何参数值。


    #### ACTION 参数


    当您执行独立实例的基本安装时，传递给 `/ACTION` 参数的值将是 `install`；但是，`/ACTION` 参数的可能值的完整列表如表 3-2 所示。


    表 3-2


    `/ACTION` 参数接受的值


    | 值 | 用法 |

    | --- | --- |

    | `install` | 安装独立实例 |

    | `PrepareImage` | 准备一个纯净的独立映像，不包含帐户、计算机或网络的特定详细信息 |

    | `CompleteImage` | 通过添加帐户、计算机和网络详细信息来完成已准备的独立映像的安装 |

    | `Upgrade` | 从 SQL Server 2012、2014、2017 或 2019 升级实例 |

    | `EditonUpgrade` | 将 SQL Server 2019 从较低版本（如开发者版）升级到较高级别（如企业版） |

    | `Repair` | 修复损坏的实例 |

    | `RebuildDatabase` | 重建损坏的系统数据库 |

    | `Uninstall` | 卸载独立实例 |

    | `InstallFailoverCluster` | 安装故障转移群集实例 |

    | `PrepareFailoverCluster` | 准备一个纯净的群集映像，不包含帐户、计算机或网络的特定详细信息 |

    | `CompleteFailoverCluster` | 通过添加帐户、计算机和网络详细信息来完成已准备的群集映像的安装 |

    | `AddNode` | 向故障转移群集添加节点 |

    | `RemoveNode` | 从故障转移群集中移除节点 |


    #### FEATURES 参数


    如表 3-3 所示，`/FEATURES` 参数用于指定一个以逗号分隔的功能列表，这些功能将由安装程序安装，但并非所有功能都可以在 Windows Server
    Core 上使用。


    表 3-3


    `/FEATURES` 参数的可接受值


    | 参数值 | 在 Windows Core 上使用 | 描述 |

    | --- | --- | --- |

    | `SQL` | 否 | 完整的 SQL 引擎，包括全文搜索、复制和数据质量服务器 |

    | `SQLEngine` | 是 | 数据库引擎 |

    | `FullText` | 是 | 全文搜索 |

    | `Replication` | 是 | 复制组件 |

    | `DQ` | 否 | 数据质量服务器 |

    | `PolyBase` | 是 | PolyBase 组件 |

    | `AdvancedAnalytics` | 是 | 机器学习解决方案和数据库内的 R 服务 |

    | `SQL_INST_MR` | 是 | 用于机器学习的 R 包 |

    | `SQL_INST_MPY` | 是 | 用于机器学习的 Anaconda 和 Python 包 |

    | `AS` | 是 | 分析服务 |

    | `DQC` | 否 | 数据质量客户端 |

    | `IS` | 是 | 集成服务 |

    | `MDS` | 否 | 主数据服务 |

    | `Tools` | 否 | 所有客户端工具 |

    | `BC` | 否 | 向后兼容组件 |

    | `Conn` | 是 | 连接组件 |

    | `DREPLAY_CTLR` | 否 | 分布式重播控制器 |

    | `DREPLAY_CLT` | 否 | 分布式重播客户端 |

    | `SNAC_SDK` | 否 | 客户端连接 SDK |

    | `SDK` | 否 | 客户端工具 SDK |

    | `LocalDB` | 是 | SQL Server Express 的一种执行模式，供应用程序开发人员使用 |


    ### 注意


    如果您选择安装其他 SQL Server 功能，例如分析服务或集成服务，那么其他参数也会变为必需。


    ### 角色参数


    除了使用 `/FEATURES` 参数指定要安装的功能列表外，还可以使用 `/ROLE` 参数以预定义的角色安装 SQL Server。`/ROLE` 参数支持的角色详见表
    3-4。


    表 3-4


    `/ROLE` 参数的可用值


    | 参数值 | 描述 |

    | --- | --- |

    | `SPI_AS_ExistingFarm` | 在现有的 SharePoint 场中将 SSAS 安装为 PowerPivot 实例 |

    | `SPI_AS_NewFarm` | 在新的未配置的 SharePoint 场中将数据库引擎和 SSAS 安装为 PowerPivot 实例 |

    | `AllFeatures_WithDefaults` | 安装 SQL Server 及其组件的所有功能。我不建议使用此选项，除非在极少数情况下，因为安装比实际需要更多的功能会增加
    SQL Server 的安全性和资源利用 footprint |


    ### 基本安装


    当您使用 `setup.exe` 的命令行参数时，您应遵守表 3-5 中概述的语法规则。


    表 3-5


    命令行参数的语法规则


    | 参数类型 | 语法 |

    | --- | --- |

    | 简单开关 | `/SWITCH` |

    | 真/假 | `/PARAMETER=true/false` |

    | 布尔值 | `/PARAMETER=0/1` |

    | 文本 | `/PARAMETER="值"` |

    | 多值文本 | `/PARAMETER="值 1" "值 2"` |

    | `/FEATURES` 参数 | `/FEATURES=功能 1,功能 2` |


    ### 提示


    对于文本参数，仅当值包含空格时才需要引号。但是，始终包含它们被认为是良好的实践。


    假设您已经导航到安装媒体根目录，那么清单 3-1 中的命令提供了用于安装数据库引擎、复制和客户端连接组件的 PowerShell 语法。它对所有可选参数使用默认值，但我们将排序规则设置为
    Windows 排序规则 `Latin1_General_CI_AS` 除外。


    ### 提示


    当 Windows Server Core 启动时，您看到的界面是命令提示符，而不是 PowerShell 提示符。键入 `powershell` 以进入
    PowerShell 提示符。


    ```

    .\SETUP.EXE /IACCEPTSQLSERVERLICENSETERMS /ACTION="Install" /FEATURES=SQLEngine,Replication,Conn
    /INSTANCENAME="PROSQLADMINCORE2" /SQLSYSADMINACCOUNTS="Administrator" /SQLCOLLATION="Latin1_General_CI_AS"
    /qs

    ```

    清单 3-1

    从 PowerShell 安装 SQL Server


    ### 注意


    如果使用命令提示符而不是 PowerShell，则不需要开头的 `.\` 字符。


    在此示例中，将安装一个名为 `PROSQLADMINCORE` 的 SQL Server 实例。数据库引擎和 SQL 代理服务都将在 `SQLServiceAccount1`
    帐户下运行，名为 `SQLDBA` 的 Windows 组将被设为管理员。安装开始时，会出现一个精简的、非交互式的安装向导版本，让您了解安装进度。

    '
- fmt: '## Smoke Tests


    在 Windows Server Core 上安装实例后（安装结束时没有摘要屏幕），执行一些冒烟测试总是一个好主意。这里的 `smoke tests` 指的是快速、高层次的测试，用于确保服务正在运行并且实例可以访问。


    清单 [3-2](#333037_2_En_3_Chapter.xhtml#PC2) 中的代码将使用 PowerShell 的 `Get-Service`
    cmdlet，以确保与 `PROSQLADMINCORE` 实例相关的服务存在并检查它们的状态。此脚本使用星号作为通配符，返回所有包含我们实例名称的服务。这当然意味着，像
    SQL Browser 这样的服务不会被返回。


    ```

    Get-Service -displayname *PROSQLADMINCORE2* | Select-Object name, displayname,
    status

    Listing 3-2

    Checking Status of Services

    ```


    结果如图 [3-1](#333037_2_En_3_Chapter.xhtml#Fig1) 所示。你可以看到 SQL Server 和 SQL Agent
    服务都已安装。你还可以看到 SQL Server 服务已启动，而 SQL Agent 服务已停止。这符合我们的预期，因为我们没有为任何服务使用启动模式参数。SQL
    Server 服务的默认启动模式是自动，而 SQL Agent 服务的默认启动模式是手动。


    ![../images/333037_2_En_3_Chapter/333037_2_En_3_Fig1_HTML.jpg](images/333037_2_En_3_Chapter/333037_2_En_3_Fig1_HTML.jpg)

    *图 3-1*

    *检查服务状态冒烟测试的结果*


    第二个推荐的冒烟测试是使用 `invoke-sqlcmd` 运行一个返回实例名称的 T-SQL 语句。要使用 `invoke-sqlcmd` cmdlet（或任何其他
    SQL Server PowerShell cmdlet），需要安装 `sqlserver` PowerShell 模块。此模块取代了已弃用的 `SQLPS`
    模块，并且包含更多的 cmdlet。


    如果你运行的是带桌面体验的 Windows Server，那么安装 SQL Server Management Studio（可从 [`https://docs.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms`](https://docs.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms)
    下载）时就会包含 `sqlserver` 模块。但是，如果你使用的是核心模式的 Windows Server（或者你选择不安装 SSMS），那么 `sqlserver`
    模块可以从 PowerShell Gallery 下载。或者，如果你的服务器可以访问互联网，清单 [3-3](#333037_2_En_3_Chapter.xhtml#PC3)
    中的脚本将首先找到该模块的最新版本，然后下载并安装它。


    ```

    #Locate and list the current version of the sqlserver module

    Find-Module sqlserver

    #Download and install the sqlserver module

    Install-Module sqlserver

    Listing 3-3

    Install the sqlserver Module

    ```


    ### Tip


    第一次运行 `Find-Module` 时，系统会提示你安装 NuGet 提供程序。


    一旦安装了 `sqlserver` 模块，就可以使用清单 [3-4](#333037_2_En_3_Chapter.xhtml#PC4) 中的脚本来返回实例的名称。


    ### Note


    这也是集群执行的 `IsAlive` 测试所使用的查询。它对系统影响很小，只是检查实例是否可以访问。


    ```

    Invoke-Sqlcmd –serverinstance "localhost\PROSQLADMINCORE2" -query "SELECT @@SERVERNAME"

    Listing 3-4

    Checking If Instance Is Accessible

    ```


    在这个例子中，`- serverinstance` 开关用于指定你要连接到的实例名称，`-query` 开关指定了将要运行的查询。此冒烟测试的结果如图 [3-2](#333037_2_En_3_Chapter.xhtml#Fig2)
    所示。如你所见，查询成功解析并返回了实例的名称。


    ![../images/333037_2_En_3_Chapter/333037_2_En_3_Fig2_HTML.jpg](images/333037_2_En_3_Chapter/333037_2_En_3_Fig2_HTML.jpg)

    *图 3-2*

    *检查实例可访问性冒烟测试的结果*


    ## Troubleshooting the Installation


    如果在实例安装过程中发生错误，或者你的冒烟测试失败，那么你将需要对安装进行故障排除。没有 GUI，这看起来可能是一项艰巨的任务，但幸运的是，SQL Server
    安装过程提供了一套完整的详细日志，你可以用它们来识别问题。这些日志中最有用的列在表 [3-6](#333037_2_En_3_Chapter.xhtml#Tab6)
    中。


    *表 3-6*

    *SQL Server 安装日志*


    | 日志文件 | 位置 |

    | --- | --- |

    | `Summary.txt` | `%programfiles%\Microsoft SQL Server\150\Setup Bootstrap\Log\`
    |

    | `Detail.txt` | `%programfiles%\Microsoft SQL Server\150\Setup\Bootstrap\Log\<YYYYMMDD_HHMM>\`
    |

    | `SystemConfigurationCheck_Report.htm` | `%programfiles%\Microsoft SQL Server\150\Setup
    Bootstrap\Log\<YYYYMMDD_HHMM>\` |


    ### Summary.txt


    当对 SQL Server 安装问题进行故障排除时，`Summary.txt` 通常是你第一个查看的文件。它提供了有关安装的基本信息，通常可以用来确定问题。例如，图
    [3-3](#333037_2_En_3_Chapter.xhtml#Fig3) 中的样本清楚地在退出消息中显示，由于指定的实例名称过长，导致实例安装失败。


    ![../images/333037_2_En_3_Chapter/333037_2_En_3_Fig3_HTML.jpg](images/333037_2_En_3_Chapter/333037_2_En_3_Fig3_HTML.jpg)

    *图 3-3*

    *Summary.txt*


    除了返回高级信息（如退出代码、退出消息以及安装的开始和结束时间）外，`summary.txt` 还会提供有关操作系统环境的详细信息。此外，它还将详细说明安装程序尝试安装的组件、每个执行的
    MSI（Microsoft 安装程序）的状态，以及指定的任何命令行参数。在文件的末尾，你还会找到一个异常摘要，其中包括堆栈跟踪。


    你可以在 Windows Server Core 中使用记事本打开文本文件。所以，假设你已经导航到 `%programfiles%\Microsoft SQL
    Server\150\Setup Bootstrap\Log\` 文件夹，你可以使用命令 `notepad summary.txt` 来打开这个文件。


    ### Detail.txt


    如果 `summary.txt` 没有提供你需要的详细粒度，那么你的下一个查看点将是 `detail.txt`。这是安装执行动作的详细日志，这些动作是按执行发生的时间组织的，而不是按执行它们的组件组织的。要在此日志中查找错误，你应该搜索字符串
    `error` 和 `exception`。


    ### SystemConfigurationCheck_Report.htm


    `SystemConfigurationCheck_Report.htm` 文件以网页格式提供了安装期间发生的每条规则检查的描述和状态。不幸的是，Windows
    Server Core 不支持渲染 HTML。因此，要查看此文件，你有两个选择。第一个是在记事本中查看，这会给你所需的细节，但它会被埋在 HTML 标签之间，没有直观的格式。这几乎违背了
    Microsoft 以用户友好格式提供信息的初衷。


    第二个选择是从安装了 GUI 的远程计算机打开该文件。这听起来是一个更好的选择，而且确实如此，前提是你在服务器上有一个可以快速放入并访问该文件的共享。然而，如果情况并非如此，并且如果你的环境没有提供快速将此文件移动到另一台机器的能力，你可能不想在这方面花太多时间——特别是因为你通常访问它的唯一原因是安装刚刚失败，而项目团队可能要求你快速解决问题。'
  raw: '### Smoke Tests


    After installing an instance on Windows Server Core, where you have no summary
    screen at the end of installation, it is always a good idea to perform some smoke
    tests. In this context, *smoke tests* refer to quick, high-level tests that ensure
    that the services are running and the instance is accessible.


    The code in Listing [3-2](#333037_2_En_3_Chapter.xhtml#PC2) will use the PowerShell
    `Get-Service` cmdlet, to ensure that the services relating to the PROSQLADMINCORE
    instance exist and to check their status. This script uses asterisks as wildcards
    to return all services that contain our instance name. This, of course, means
    that services such as SQL Browser will not be returned.


    ```

    Get-Service -displayname *PROSQLADMINCORE2* | Select-Object name, displayname,
    status

    Listing 3-2

    Checking Status of Services

    ```


    The results are displayed in Figure [3-1](#333037_2_En_3_Chapter.xhtml#Fig1).
    You can see that both the SQL Server and SQL Agent services have been installed.
    You can also see that the SQL Server service is started and the SQL Agent service
    is stopped. This aligns with our expectations, because we did not use the startup
    mode parameters for either service. The default startup mode for the SQL Server
    service is automatic, whereas the default startup mode for the SQL Agent service
    is manual.


    ![../images/333037_2_En_3_Chapter/333037_2_En_3_Fig1_HTML.jpg](images/333037_2_En_3_Chapter/333037_2_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Results of check service status smoke test


    The second recommended smoke test is to use invoke-sqlcmd to run a T-SQL statement
    which returns the instance name. To use the invoke-sqlcmd cmdlet (or any other
    SQL Server PowerShell cmdlets), the sqlserver PowerShell module needs to be installed.
    This module replaces the deprecated SQLPS module and contains many more cmdlets.


    If you are running Windows Server with Desktop Experience, then the sqlserver
    module is included when you install SQL Server Management Studio, which can be
    downloaded from [`https://docs.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms`](https://docs.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms)
    . If you are using Windows Server in core mode, however (or if you simply don’t
    choose to install SSMS), then the sqlserver module can be downloaded from the
    PowerShell Gallery. Alternatively, if your server has Internet access, the script
    in Listing [3-3](#333037_2_En_3_Chapter.xhtml#PC3) will firstly find the latest
    version of the module, before downloading and installing it.


    ```

    #Locate and list the current version of the sqlserver module

    Find-Module sqlserver

    #Download and install the sqlserver module

    Install-Module sqlserver

    Listing 3-3

    Install the sqlserver Module

    ```


    ### Tip


    The first time you run Find-Module, you will be prompted to install the NuGet
    provider.


    Once the sqlserver module has been installed, the script in Listing [3-4](#333037_2_En_3_Chapter.xhtml#PC4)
    can be used to return the name of the instance.


    ### Note


    This is also the query that is used by the IsAlive test, which is performed by
    a cluster. It has little system impact and just checks that the instance is accessible.


    ```

    Invoke-Sqlcmd –serverinstance "localhost\PROSQLADMINCORE2" -query "SELECT @@SERVERNAME"

    Listing 3-4

    Checking If Instance Is Accessible

    ```


    In this example, the `-serverinstance` switch is used to specify the instance
    name that you will connect to, and the `-query` switch specifies the query that
    will be run. The results of this smoke test are illustrated in Figure [3-2](#333037_2_En_3_Chapter.xhtml#Fig2).
    As you can see, the query resolved successfully and returned the name of the instance.


    ![../images/333037_2_En_3_Chapter/333037_2_En_3_Fig2_HTML.jpg](images/333037_2_En_3_Chapter/333037_2_En_3_Fig2_HTML.jpg)


    Figure 3-2


    Results of check instance accessible smoke test


    ### Troubleshooting the Installation


    If an error occurs during the installation of the instance, or if your smoke tests
    fail, then you will need to troubleshoot the installation. With no GUI, this may
    seem like a daunting task, but luckily the SQL Server installation process provides
    a full set of verbose logs, which you can use to identify the issue. The most
    useful of these logs are listed in Table [3-6](#333037_2_En_3_Chapter.xhtml#Tab6).


    Table 3-6


    SQL Server Installation Logs


    | Log File | Location |

    | --- | --- |

    | Summary.txt | `%programfiles%\Microsoft SQL Server\150\Setup Bootstrap\Log\`
    |

    | Detail.txt | `%programfiles%\Microsoft SQL Server\150\Setup\Bootstrap\Log\<YYYYMMDD_HHMM>\`
    |

    | SystemConfigurationCheck_Report.htm | `%programfiles%\Microsoft SQL Server\150\Setup
    Bootstrap\Log\<YYYYMMDD_HHMM>\` |


    #### Summary.txt


    Summary.txt will normally be your first point of call when you troubleshoot SQL
    Server installation issues. It provides basic information regarding the installation
    and can often be used to determine the issue. The sample in Figure [3-3](#333037_2_En_3_Chapter.xhtml#Fig3),
    for example, clearly shows in exit message that the installation of an instance
    failed because the instance name specified was too long.


    ![../images/333037_2_En_3_Chapter/333037_2_En_3_Fig3_HTML.jpg](images/333037_2_En_3_Chapter/333037_2_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Summary.txt


    In addition to returning high-level information, such as the exit code, exit message,
    and start and end time of the installation, summary.txt will also provide you
    with details about the OS environment. Additionally, it will detail the components
    that setup tried to install with the status of each MSI (Microsoft Installer)
    that was executed, and it will list any command-line parameters that were specified.
    At the end of the file, you will also find an exception summary, which includes
    a stack trace.


    You can use Notepad to open a text file in Windows Server Core. So, assuming that
    you had already navigated to the `%programfiles%\Microsoft SQL Server\150\Setup
    Bootstrap\Log\` folder, you could use the command `notepad summary.txt` to open
    this file.


    #### Detail.txt


    If summary.txt does not provide the granular detail that you need, then your next
    stop will be detail.txt. This is a verbose log of actions performed by the installation,
    which are organized by the time at which the execution occurred, rather than by
    the component that executed them. To find errors in this log, you should search
    for the strings *error* and *exception*.


    #### SystemConfigurationCheck_Report.htm


    The SystemConfigurationCheck_Report.htm file provides a description and the status
    of each of the rule checks that happened during the installation in a web page
    format. Unfortunately, Windows Server Core has no support for rendering HTML.
    Therefore, in order to view this file, you have two options. The first is to view
    it in Notepad, which will give you the detail you are looking for, but it will
    be buried in between HTML tags, with no intuitive formatting. This pretty much
    misses the point of Microsoft providing the information in a user-friendly format.


    The second option is to open the file remotely from a machine that has a GUI installed.
    This sounds like a much better option, and indeed it is, as long as you have a
    share created on the server that you can drop the file into and from which you
    can access it quickly. If this is not the case, however, and if your environment
    does not provide the capability to quickly move this file onto another machine,
    you may not want to spend too much time on this—especially since the only reason
    you would normally be accessing it is because your installation has just failed
    and you are likely to have project teams requesting that you resolve the issue
    quickly.'
  trans: '## 冒烟测试


    在 Windows Server Core 上安装实例后（安装结束时没有摘要屏幕），执行一些冒烟测试总是一个好主意。这里的 `smoke tests` 指的是快速、高层次的测试，用于确保服务正在运行并且实例可以访问。


    清单 3-2 中的代码将使用 PowerShell 的 `Get-Service` cmdlet，以确保与 `PROSQLADMINCORE` 实例相关的服务存在并检查它们的状态。此脚本使用星号作为通配符，返回所有包含我们实例名称的服务。这当然意味着，像
    SQL Browser 这样的服务不会被返回。


    ```

    Get-Service -displayname *PROSQLADMINCORE2* | Select-Object name, displayname,
    status

    清单 3-2

    检查服务状态

    ```


    结果如图 3-1 所示。你可以看到 SQL Server 和 SQL Agent 服务都已安装。你还可以看到 SQL Server 服务已启动，而 SQL
    Agent 服务已停止。这符合我们的预期，因为我们没有为任何服务使用启动模式参数。SQL Server 服务的默认启动模式是自动，而 SQL Agent 服务的默认启动模式是手动。


    ![../images/333037_2_En_3_Chapter/333037_2_En_3_Fig1_HTML.jpg](img/333037_2_En_3_Fig1_HTML.jpg)

    *图 3-1*

    *检查服务状态冒烟测试的结果*


    第二个推荐的冒烟测试是使用 `invoke-sqlcmd` 运行一个返回实例名称的 T-SQL 语句。要使用 `invoke-sqlcmd` cmdlet（或任何其他
    SQL Server PowerShell cmdlet），需要安装 `sqlserver` PowerShell 模块。此模块取代了已弃用的 `SQLPS`
    模块，并且包含更多的 cmdlet。


    如果你运行的是带桌面体验的 Windows Server，那么安装 SQL Server Management Studio（可从 [`https://docs.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms`](https://docs.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms)
    下载）时就会包含 `sqlserver` 模块。但是，如果你使用的是核心模式的 Windows Server（或者你选择不安装 SSMS），那么 `sqlserver`
    模块可以从 PowerShell Gallery 下载。或者，如果你的服务器可以访问互联网，清单 3-3 中的脚本将首先找到该模块的最新版本，然后下载并安装它。


    ```

    #查找并列出 sqlserver 模块的当前版本

    Find-Module sqlserver

    #下载并安装 sqlserver 模块

    Install-Module sqlserver

    清单 3-3

    安装 sqlserver 模块

    ```


    ### 提示


    第一次运行 `Find-Module` 时，系统会提示你安装 NuGet 提供程序。


    一旦安装了 `sqlserver` 模块，就可以使用清单 3-4 中的脚本来返回实例的名称。


    ### 注意


    这也是集群执行的 `IsAlive` 测试所使用的查询。它对系统影响很小，只是检查实例是否可以访问。


    ```

    Invoke-Sqlcmd –serverinstance "localhost\PROSQLADMINCORE2" -query "SELECT @@SERVERNAME"

    清单 3-4

    检查实例是否可访问

    ```


    在这个例子中，`- serverinstance` 开关用于指定你要连接到的实例名称，`-query` 开关指定了将要运行的查询。此冒烟测试的结果如图 3-2
    所示。如你所见，查询成功解析并返回了实例的名称。


    ![../images/333037_2_En_3_Chapter/333037_2_En_3_Fig2_HTML.jpg](img/333037_2_En_3_Fig2_HTML.jpg)

    *图 3-2*

    *检查实例可访问性冒烟测试的结果*


    ## 故障排除安装


    如果在实例安装过程中发生错误，或者你的冒烟测试失败，那么你将需要对安装进行故障排除。没有 GUI，这看起来可能是一项艰巨的任务，但幸运的是，SQL Server
    安装过程提供了一套完整的详细日志，你可以用它们来识别问题。这些日志中最有用的列在表 3-6 中。


    *表 3-6*

    *SQL Server 安装日志*


    | 日志文件 | 位置 |

    | --- | --- |

    | `Summary.txt` | `%programfiles%\Microsoft SQL Server\150\Setup Bootstrap\Log\`
    |

    | `Detail.txt` | `%programfiles%\Microsoft SQL Server\150\Setup\Bootstrap\Log\<YYYYMMDD_HHMM>\`
    |

    | `SystemConfigurationCheck_Report.htm` | `%programfiles%\Microsoft SQL Server\150\Setup
    Bootstrap\Log\<YYYYMMDD_HHMM>\` |


    ### Summary.txt


    当对 SQL Server 安装问题进行故障排除时，`Summary.txt` 通常是你第一个查看的文件。它提供了有关安装的基本信息，通常可以用来确定问题。例如，图
    3-3 中的样本清楚地在退出消息中显示，由于指定的实例名称过长，导致实例安装失败。


    ![../images/333037_2_En_3_Chapter/333037_2_En_3_Fig3_HTML.jpg](img/333037_2_En_3_Fig3_HTML.jpg)

    *图 3-3*

    *Summary.txt*


    除了返回高级信息（如退出代码、退出消息以及安装的开始和结束时间）外，`summary.txt` 还会提供有关操作系统环境的详细信息。此外，它还将详细说明安装程序尝试安装的组件、每个执行的
    MSI（Microsoft 安装程序）的状态，以及指定的任何命令行参数。在文件的末尾，你还会找到一个异常摘要，其中包括堆栈跟踪。


    你可以在 Windows Server Core 中使用记事本打开文本文件。所以，假设你已经导航到 `%programfiles%\Microsoft SQL
    Server\150\Setup Bootstrap\Log\` 文件夹，你可以使用命令 `notepad summary.txt` 来打开这个文件。


    ### Detail.txt


    如果 `summary.txt` 没有提供你需要的详细粒度，那么你的下一个查看点将是 `detail.txt`。这是安装执行动作的详细日志，这些动作是按执行发生的时间组织的，而不是按执行它们的组件组织的。要在此日志中查找错误，你应该搜索字符串
    `error` 和 `exception`。


    ### SystemConfigurationCheck_Report.htm


    `SystemConfigurationCheck_Report.htm` 文件以网页格式提供了安装期间发生的每条规则检查的描述和状态。不幸的是，Windows
    Server Core 不支持渲染 HTML。因此，要查看此文件，你有两个选择。第一个是在记事本中查看，这会给你所需的细节，但它会被埋在 HTML 标签之间，没有直观的格式。这几乎违背了
    Microsoft 以用户友好格式提供信息的初衷。


    第二个选择是从安装了 GUI 的远程计算机打开该文件。这听起来是一个更好的选择，而且确实如此，前提是你在服务器上有一个可以快速放入并访问该文件的共享。然而，如果情况并非如此，并且如果你的环境没有提供快速将此文件移动到另一台机器的能力，你可能不想在这方面花太多时间——特别是因为你通常访问它的唯一原因是安装刚刚失败，而项目团队可能要求你快速解决问题。'
- fmt: '#### Other Log Files


    Many additional log files are produced by the SQL Server setup routine, including
    a folder named `Datastore`, which contains a series of `XML` files, each of which
    represent individual settings that have been configured. Also of interest, you
    will find a copy on the configuration file that setup generated and a file called
    `settings.xml`. This file defines the metadata for the configuration options,
    including the source of where the value of the configuration was contained, such
    as a default value or user specified.


    A verbose log will also be created for every `MSI` that was run during the setup
    process. The quantity of these logs will of course depend on the features that
    you have chosen to install. On `Windows Server Core`, as long as you are not performing
    an `SSAS`-only installation, at a minimum, there will be a `.log` file relating
    to the SQL Engine. These `.log` files can provide even more granular detail regarding
    their specific `MSI`, which can assist you in troubleshooting.


    Using the `MSI` logs is not totally straightforward, however, since you may find
    many errors that are caused by a preceding error, as opposed to being the root
    cause of the issue. To use these log files, you should order them by the time
    that they were created. You can then work through them backward. The last error
    that you find will be the root cause issue. To search these files for errors,
    search for the string `Return value 3`. It can get even more complicated, however,
    because not all `Return value 3` occurrences will relate to unexpected errors.
    Some of them may be expected results.


    ### Optional Parameters


    There are many switches and parameters that can optionally be used to customize
    the configuration of the instance that you are installing. The optional switches
    and parameters that you can use for the installation of the Database Engine are
    listed in Table [3-7](#333037_2_En_3_Chapter.xhtml#Tab7).


    Table 3-7 Optional Parameters


    | Parameter | Usage |

    | --- | --- |

    | `/AGTSVCSTARTUPTYPE` | Specifies the startup mode of the SQL Agent service.
    This can be set to `Automatic`, `Manual`, or `Disabled`. |

    | `/BROWSERSVCSTARTUPTYPE` | Specifies the startup mode of the SQL Browser service.
    This can be set to `Automatic`, `Manual`, or `Disabled`. |

    | `/CONFIGURATIONFILE` | Specifies the path to a configuration file, which contains
    a list of switches and parameters, so that they do not have to be specified inline,
    when running setup. |

    | `/ENU` | Dictates that the English version of SQL Server will be used. Use this
    switch if you are installing the English version of SQL Server on a server with
    localized settings and the media contains language packs for both English and
    the localized operating system. |

    | `/FILESTREAMLEVEL` | Used to enable `FILESTREAM` and set the required level
    of access. This can be set to `0` to disable `FILESTREAM`, `1` to allow connections
    via SQL Server only, `2` to allow IO streaming, or `3` to allow remote streaming.
    The options from `1` to `3` build on each other, so by specifying level `3`, you
    are implicitly specifying levels `1` and `2` as well. |

    | `/FILESTREAMSHARENAME` | Specifies the name of the Windows file share where
    `FILESTREAM` data will be stored. This parameter becomes required when `/FILESTREAMLEVEL`
    is set to a value of `2` or `3`. |

    | `/FTSVCACCOUNT` | The account used to run the Full-Text filter launcher service.
    |

    | `/FTSVCPASSWORD` | The password of the account used to run the Full-text filter
    launcher service. |

    | `/HIDECONSOLE` | Specifies that the console should be hidden. |

    | `/INDICATEPROGRESS` | When this switch is used, the setup log is piped to the
    screen during installation. |

    | `/IACCEPTPYTHONLICENSETERMS` | Must be specified if installing the Anaconda
    Python package, using `/q` or `/qs`. |

    | `/IACCEPTROPENLICENSETERMS` | Must be specified when installing Microsoft R
    package, using `/q` or `/qs`. |

    | `/INSTANCEDIR` | Specifies a folder location for the instance. |

    | `/INSTANCEID` | Specifies an ID for the instance. It is considered bad practice
    to use this parameter, as discussed in Chapter [2](#333037_2_En_2_Chapter.xhtml).
    |

    | `/INSTALLSHAREDDIR` | Specifies a folder location for 64-bit components that
    are shared between instances. |

    | `/INSTALLSHAREDWOWDIR` | Specifies a folder location for 32-bit components that
    are shared between instances. This location cannot be the same as the location
    for 64-bit shared components. |

    | `/INSTALLSQLDATADIR` | Specifies the default folder location for instance data.
    |

    | `/NPENABLED` | Specifies if named pipes should be enabled. This can be set to
    `0` for disabled or `1` for enabled. |

    | `/PID` | Specifies the `PID` for SQL Server. Unless the media is pre-pidded,
    failure to specify this parameter will cause Evaluation edition to be installed.
    |

    | `/PBENGSVCACCOUNT` | Specifies the account that will be used to run the Polybase
    service. |

    | `/PBDMSSVCPASSWORD` | Specifies the password for the account that will run the
    Polybase service. |

    | `/PBENGSVCSTARTUPTYPE` | Specifies the startup mode of the Polybase. This can
    be set to `Automatic`, `Manual`, or `Disabled`. |

    | `/PBPORTRANGE` | Specifies a range of ports for the PolyBase service to listen
    on. Must contain a minimum of six ports. |

    | `/PBSCALEOUT` | Specifies if the Database Engine is part of a PolyBase scale-out
    group. |

    | `/SAPWD` | Specifies the password for the `SA` account. This parameter is used
    when `/SECURITYMODE` is used to configure the instance as mixed-mode authentication.
    This parameter becomes required if `/SECURITYMODE` is set to `SQL`. |

    | `/SECURITYMODE` | Use this parameter, with a value of `SQL`, to specify mixed
    mode. If you do not use this parameter, then Windows authentication will be used.
    |

    | `/SQLBACKUPDIR` | Specifies the default location for SQL Server backups. |

    | `/SQLCOLLATION` | Specifies the collation the instance will use. |

    | `/SQLMAXDOP` | Specifies a maximum degree of parallelism for queries run against
    the instance. |

    | `/SQLMAXMEMORY` | Specifies the maximum amount of `RAM` that should ever be
    allocated to the database engine. |

    | `/SQLMINMEMORY` | Specifies the minimum amount of memory that should ever be
    allocated to the database engine. When the instance starts, the database engine
    will immediately consume this amount of memory. |

    | `/SQLSVCSTARTUPTYPE` | Specifies the startup mode of the Database Engine Service.
    This can be set to `Automatic`, `Manual`, or `Disabled`. |

    | `/SQLTEMPDBDIR` | Specifies a folder location for `TempDB` data files. |

    | `/SQLTEMPDBLOGDIR` | Specifies a folder location for `TempDB` log files. |

    | `/SQLTEMPDBFILECOUNT` | Specifies the number of `TempDB` data files that should
    be created. |

    | `/SQLTEMPDBFILESIZE` | Specifies the size of each `TempDB` data file. |

    | `/SQLTEMPDBFILEGROWTH` | Specifies the growth increment for `TempDB` data files.
    |

    | `/SQLTEMPDBLOGFILESIZE` | Specifies the initial size for the `TempDB` log file.
    |

    | `/SQLTEMPDBLOGFILEGROWTH` | Specifies the growth increment for `TempDB` log
    files. |

    | `/SQLUSERDBDIR` | Specifies a default location for the data files or user databases.
    |

    | `/SQLUSERDBLOGDIR` | Specifies the default folder location for log files or
    user databases. |

    | `/SQMREPORTING` | Specifies if SQL Reporting will be enabled. Use a value of
    `0` to disable or `1` to enable. |

    | `/SQLSVCINSTANTFILEINIT` | Specifies that the Database Engine Service account
    should be granted the Perform Volume Maintenance Tasks privilege. Acceptable values
    are `true` or `false`. |

    | `/TCPENABLED` | Specifies if `TCP` will be enabled. Use a value of `0` to disable
    or `1` to enable. |

    | `/UPDATEENABLED` | Specifies if Product Update functionality will be used. Pass
    a value of `0` to disable or `1` to enable. |

    | `/UPDATESOURCE` | Specifies a location for Product Update to search for updates.
    A value of `MU` will search Windows Update, but you can also pass a file share
    or `UNC`. |'
