    同样值得注意的是，您可以通过资源管理器控制的大部分 IO 是读取操作。这是因为写入操作（例如 Lazy Writer 和 Log Flush 操作）是作为系统操作发生的，并且属于内部资源池的范围。由于您无法更改内部资源池，因此无法管理大多数写入操作。这意味着，当您拥有一个报表应用程序或其他具有高读写比例的应用程序时，使用资源管理器来限制
    IO 操作是最合适的。


    最后，您应该意识到，资源管理器只能控制 IOPS 的数量；它无法控制 IOPS 的大小。这意味着您不能使用资源管理器来控制应用程序使用的 SAN 带宽量。


    要创建外部资源池，应使用 `CREATE EXTERNAL RESOURCE POOL` DDL 语句。可以在外部资源池上配置的设置详见表 24-4。


    **表 24-4**

    `CREATE EXTERNAL RESOURCE POOL` 参数


    | 参数 | 说明 |

    | --- | --- |

    | `pool_name` | 您分配给资源池的名称。 |

    | `MAX_CPU_PERCENT` | 指定资源池可用的最大平均 CPU 资源占实例可用 CPU 带宽的百分比。这是一个软限制，在 CPU 资源存在争用时适用。
    |

    | `AFFINITY SCHEDULER` | 指定资源池应绑定到特定的 SQLOS（SQL 操作系统）调度器，这些调度器进而映射到服务器内的特定虚拟核心。不能与
    `AFFINITY NUMANODE` 一起使用。指定 `AUTO` 以允许 SQL Server 管理资源池使用的调度器。指定调度器 ID 范围。例如 (`0,
    1, 32 TO 64`)。 |

    | `MAX_MEMORY_PERCENT` | 指定资源池可以使用的最大内存量占实例可用内存的百分比。 |

    | `MAX_PROCESSES` | 指定在任何给定时间池内允许的最大进程数。默认值为 0，仅通过服务器资源限制进程数。 |


    如果您想创建一个名为 `ReportingApp` 的资源池，该池设置最小 CPU 百分比为 50，最大 CPU 百分比为 80，最小 IOPS 预留为 20，最大
    IOPS 预留为 100，则可以使用代码清单 24-1 中的脚本。脚本的最后一条语句使用 `ALTER RESOURCE GOVERNOR` 来应用新配置。在创建工作负载组或应用分类器函数后，也应运行此语句。


    ```sql

    CREATE RESOURCE POOL ReportingApp

    WITH(

    MIN_CPU_PERCENT=50,

    MAX_CPU_PERCENT=80,

    MIN_IOPS_PER_VOLUME = 20,

    MAX_IOPS_PER_VOLUME = 100

