    #### 事务复制


    事务复制的工作原理是读取发布服务器上事务日志中的事务，然后将这些事务重新应用到订阅服务器上。运行在发布服务器上的`日志读取器代理`负责读取事务，在标记为复制的所有日志记录被处理完毕之前，`VLF`不会被截断。这意味着，如果同步间隔时间很长且发生了大量数据修改，则您的事务日志存在增长甚至空间耗尽的风险。从日志中读取事务后，`分发代理`会将这些事务应用到订阅服务器。该代理在推送订阅模型中运行于分发服务器上，或在拉取订阅模型中运行于每个订阅服务器上。同步由`SQL
    Server 代理`作业调度，这些作业配置为运行复制代理。您可以根据需求配置同步，使其连续或定期发生。默认情况下，初始数据同步使用`快照代理`执行。


    事务复制通常用于服务器到服务器的场景，其中发布服务器上存在大量的数据修改，并且发布服务器与订阅服务器之间有可靠的网络连接。全局数据仓库就是这样一个例子，它将数据子集复制到区域数据仓库。


    标准的事务复制始终单向工作，这意味着订阅服务器无法更新发布服务器。不过，SQL Server 还提供了对等事务复制。在对等拓扑中，每个服务器既充当发布服务器，又充当拓扑中其他服务器的订阅服务器。这意味着您在任何一台服务器上所做的更改都会被复制到拓扑中的所有其他服务器。


    由于所有服务器都可以接受更新，因此有可能发生冲突。因此，当每个对等节点在数据的不同分区上接受更新时，对等复制最为合适。如果确实发生冲突，您可以配置 SQL
    Server 应用具有最高`OriginatorID`（分配给拓扑中每个节点的唯一整数）的事务，或者选择手动解决冲突，这是推荐的方法。


    ### 提示


    如果您无法在节点之间对可更新数据进行分区，并且冲突很可能发生，那么您可能会发现合并复制是更好的技术选择。


    #### 合并复制


    合并复制允许您同时更新发布服务器和订阅服务器。这对于客户端-服务器场景是一个很好的选择，例如移动销售人员可以在他们的笔记本电脑上输入订单，然后与主销售数据库同步。它在一些服务器到服务器的场景中也很有用——例如，通过`ETL`过程更新的区域数据仓库，然后汇总到全局数据仓库中。


    合并复制通过在每个作为发布中文章的表上维护一个`rowguid`来工作。如果该表没有设置了`ROWGUID`属性的`uniqueidentifier`列，合并复制会添加一个。当对表进行数据修改时，会触发一个触发器，该触发器维护一系列更改跟踪表。当`合并代理`运行时，它只应用行的最新版本。这意味着跟踪发生的更改会消耗大量资源，但作为权衡，合并复制在实际同步更改时的开销是最低的。


    由于订阅服务器和发布服务器都可以被更新，因此存在行之间发生冲突的风险。您可以使用冲突解决程序来管理这些冲突。合并复制提供了 12 个开箱即用的冲突解决程序，包括“最早者胜出”、“最新者胜出”和“订阅者总是胜出”。您也可以编程自定义基于`COM`的冲突解决程序，或选择手动解决冲突。


    由于您可以在客户端-服务器场景中使用合并复制，它提供了一种称为“Web 同步”的技术来更新订阅服务器。使用 Web 同步时，在提取更改后，`合并代理`会向`IIS`发出`HTTPS`请求，并以`XML`消息的形式将数据更改发送给订阅服务器。运行在订阅服务器上的`复制侦听器`和`合并复制协调器`进程会处理这些数据更改，然后将订阅服务器上进行的任何数据修改发送回发布服务器。


    ### 实现事务复制


    最适合用于扩展工作负载的复制类型是标准事务复制。我们将在以下部分讨论如何实现该技术。


    ### 注意


    对于本节的演示，我们使用两个实例：`WIN-KIAGK4GN1MJ\PROSQLADMIN` 和 `WIN-KIAGK4GN1MJ\PROSQLADMIN2`。


    #### 实现分发服务器


    在为第 16 章的数据库配置事务复制之前，我们将先把我们的实例配置为分发服务器。这可以通过`配置分发向导`实现，可以通过右键单击`复制`并选择`配置分发`来调用该向导。向导的第一页是`分发服务器`页面，如图
    16-4 所示。在此页面上，我们可以选择使用当前实例作为分发服务器，或指定一个不同的实例。


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig4_HTML.jpg](img/333037_2_En_16_Fig4_HTML.jpg)


    *图 16-4 分发服务器页面*


    由于我们的实例当前未配置为自动启动`SQL Server 代理`服务，我们现在看到`SQL Server 代理启动`页面，它警告我们此情况。这是因为复制代理依赖`SQL
    Server 代理`进行调度和运行。我们选择将`SQL Server 代理`配置为自动启动的选项，如图 16-5 所示。


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig5_HTML.jpg](img/333037_2_En_16_Fig5_HTML.jpg)


    *图 16-5 SQL Server 代理启动页面*


    在向导的`快照文件夹`页面上，我们选择`快照代理`用于存储初始同步数据的位置。这可以是本地文件夹或网络共享，但如果指定本地文件夹，则不支持拉取订阅，因为订阅服务器无法访问它。在我们的案例中，我们使用网络共享。`快照文件夹`页面如图
    16-6 所示。


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig6_HTML.jpg](img/333037_2_En_16_Fig6_HTML.jpg)


    *图 16-6 快照文件夹页面*


    接下来，在向导的`分发数据库`页面上，我们必须为分发数据库指定一个名称，并提供两个文件夹位置，用于存储数据和日志文件。如图 16-7 所示。


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig7_HTML.jpg](img/333037_2_En_16_Fig7_HTML.jpg)


    *图 16-7 分发数据库页面*


    在向导的`发布服务器`页面上，如图 16-8 所示，我们指定将用作该分发服务器的发布服务器的实例。当前实例将被自动添加，但可以取消选中。页面右下角的`添加`按钮可用于添加其他
    SQL Server 实例或 Oracle 数据库。


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig8_HTML.jpg](img/333037_2_En_16_Fig8_HTML.jpg)


    *图 16-8 发布服务器页面*


    最后，我们可以选择配置分发服务器、编写配置脚本，或两者都做。在本例中，我们将立即配置分发服务器。

    '
- fmt: '## Implementing the Publication


    Now that the Distributor is configured, we will set up a Publication, for the
    Chapter16 database. To begin configuring transaction replication, we select **New
    Publication** from the context menu of **Replication ➤ Local Publications** in
    Object Explorer. This causes the **New Publication Wizard** to be invoked. After
    passing through the welcome screen, we see the **Publication Database** page,
    shown in Figure 16-9. Here, we select the database that contains the objects that
    we wish to use as articles in our publication. All articles within a publication
    must reside in the same database, so we can only select one database on this screen.
    To replicate articles from multiple databases, we must have multiple publications.


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig9_HTML.jpg](images/333037_2_En_16_Chapter/333037_2_En_16_Fig9_HTML.jpg)


    Figure 16-9 The Publication Database page


    On the **Publication Type** page, shown in Figure 16-10, we select the type of
    replication we wish to use for the publication—in our case, transactional.


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig10_HTML.jpg](images/333037_2_En_16_Chapter/333037_2_En_16_Fig10_HTML.jpg)


    Figure 16-10 The Publication Type page


    On the **Articles** page of the wizard, illustrated in Figure 16-11, we select
    the objects that we wish to include in our publication. All tables that you wish
    to publish must have a primary key, or you are not able to select them. Within
    a table, you can also select individual columns to replicate, if you need to.


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig11_HTML.jpg](images/333037_2_En_16_Chapter/333037_2_En_16_Fig11_HTML.jpg)


    Figure 16-11 The Articles page


    The **Article Properties** button allows us to alter the properties, either for
    the selected article or for all articles within the **Article Properties** dialog
    box, which is shown in Figure 16-12. You should usually leave most properties
    as the default unless you have a specific reason to change them. However, you
    should pay particular attention to some properties.


    You use the **Action If Name Is In Use** property to determine the behavior if
    a table with the same name already exists in the subscriber database. The possible
    options are as follows:


    *   Keep the existing object unchanged.

    *   Drop the existing object and create a new one.

    *   Delete data. If the article has a row filter, delete only the data that matches
    the filter.

    *   Truncate all data in the existing object.


    The **Copy Permissions** property determines if object-level permissions are copied
    to the subscriber. This is important, since you may or may not want to configure
    the permissions the same as they are for the publisher depending on how you are
    using the environment.


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig12_HTML.jpg](images/333037_2_En_16_Chapter/333037_2_En_16_Fig12_HTML.jpg)


    Figure 16-12 The Article Properties dialog box


    On the **Filter Table Rows** page of the wizard, shown in Figure 16-13, we can
    use the **Add**, **Edit**, and **Delete** buttons to manage filters. Filters essentially
    add a `WHERE` clause to the article so that you can limit the number of rows that
    are replicated. You’ll find this is especially useful for partitioning the data
    across multiple subscribers.


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig13_HTML.jpg](images/333037_2_En_16_Chapter/333037_2_En_16_Fig13_HTML.jpg)


    Figure 16-13 The Filter Table Rows page


    Figure 16-14 illustrates the **Add Filter** dialog box. In our case, we are creating
    a filter so that only customers with an `ID > 500` are replicated. The ways you
    can use this in production scenarios include filtering based on region, account
    status, and so on.


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig14_HTML.jpg](images/333037_2_En_16_Chapter/333037_2_En_16_Fig14_HTML.jpg)


    Figure 16-14 The Add Filter dialog box


    On the **Snapshot Agent** page, illustrated in Figure 16-15, you can configure
    the initial snapshot to be created immediately, as we have done here, or you can
    schedule the Snapshot Agent to run at a specific time.


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig15_HTML.jpg](images/333037_2_En_16_Chapter/333037_2_En_16_Fig15_HTML.jpg)


    Figure 16-15 The Snapshot Agent page


    On the **Agent Security** page, illustrated in Figure 16-16, you are invited to
    configure the accounts that are used for running each of the replication agents.
    At a minimum, the account that runs the Snapshot Agent should have the following
    permissions:


    *   Be a member of the `db_owner` database role in the distribution database

    *   Have read, write, and modify permissions on the share that contains the snapshot


    At a minimum, the account that runs the Log Reader Agent must have the following
    permissions:


    *   Be a member of the `db_owner` database role in the distribution database


    When you create the subscription, choose the `sync_type`. This configuration choice
    affects the Log Reader account’s required permissions in the following ways:


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig16_HTML.jpg](images/333037_2_En_16_Chapter/333037_2_En_16_Fig16_HTML.jpg)


    Figure 16-16 The Agent Security page


    *   **Automatic**: No additional permissions required

    *   **Anything else**: `sysadmin` on the distributor


    Clicking the **Security Settings** button for the Snapshot Agent causes the **Snapshot
    Agent Security** dialog box to display, as shown in Figure 16-17. In this dialog
    box, you can choose to run the Snapshot Agent under the context of the Server
    Agent service account, or you can specify a different Windows account to use.
    To follow the principle of least privilege, you should use a separate account.
    It is also possible to specify a different account from which to make connections
    to the publisher instance. In our case though, we specify that the same account
    should make all the connections.


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig17_HTML.jpg](images/333037_2_En_16_Chapter/333037_2_En_16_Fig17_HTML.jpg)


    Figure 16-17 The Snapshot Agent Security dialog box


    Back on the **Agent Security** page, you can elect to specify the details for
    the account that will run the Log Reader Agent, or you can clone the information
    you have already entered for the account that will run the Snapshot Agent.


    On the **Wizard Actions** page, you can elect to either generate the publication,
    as we have done, script the generation of the publication, or both. We will create
    the Publication immediately. Finally, on the **Completion** page, specify a name
    for the Publication. We will call ours **Chapter16**.'
