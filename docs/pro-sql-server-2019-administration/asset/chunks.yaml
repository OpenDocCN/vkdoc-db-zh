    ## 实现资源管理器


    要在实例上配置资源管理器，您必须创建并配置一个或多个资源池，每个池包含一个或多个工作负载组。此外，您还需要创建一个分类器函数。最后，您需要启用资源管理器，这将使所有后续会话都被分类。这些主题将在以下章节中讨论。


    ### 创建资源池


    每个实例最多可以创建 64 个资源池。让我们通过 SQL Server Management Studio 创建一个资源池：在对象资源管理器中依次展开 **Management**
    ➤ **Resource Governor**，然后从资源池的上下文菜单中选择 **New Resource Pool**。这将调出资源管理器属性对话框。


    在此对话框的**资源池**部分，在网格中新建一行，并填入创建新资源池所需的信息。在我们的例子中，您应该添加一个名为 `SalesApplication` 的资源池的详细信息，其**最小
    CPU %** 为 25，**最大 CPU %** 为 75，**最小内存 %** 为 25，**最大内存 %** 为 40。


    ### 提示


    高亮显示一个资源池会导致与该资源池关联的工作负载组显示在屏幕的**资源池的工作负载组**部分。在这里，您可以同时添加、修改或删除资源池。但是，您也可以通过依次展开
    **Management** ➤ **Resource Governor** ➤ [*资源池名称*]，然后从工作负载组的上下文菜单中选择 **New Workload
    Group** 来访问此对话框。


    在此场景中，最大内存限制是硬限制。这意味着分配给此资源池的内存永远不会超过此实例可用内存的 40%。此外，即使没有会话使用此资源池，实例可用内存的 25%
    仍会分配给该池，且对其他资源池不可用。


    相比之下，最大 CPU 限制是软性的，或称机会性的。这意味着如果有更多 CPU 可用，资源池会加以利用。只有当处理器存在争用时，该上限才会生效。


    ### 提示


    可以配置 CPU 使用率的硬上限。这在 PaaS（平台即服务）或 DaaS（数据库即服务）环境中很有帮助，这些环境根据 CPU 使用量向客户收费，并且您需要确保其应用程序的计费一致。如果客户已同意支付
    40% 的一个核心费用，但软性上限允许他们达到 50%，导致自动收取更高的费用，客户很容易对此提出争议。本节稍后将讨论如何实现这一点。


    您也可以通过 T-SQL 创建资源池。这样做时，您可以使用比 GUI 更多的功能，这些功能允许您配置最小和最大 IOPS（每秒输入/输出操作数），设置 CPU
    使用率的硬上限，以及将资源池与特定的 CPU 或 NUMA 节点关联。在资源池和 CPU 子集之间建立关联意味着该资源池将只使用与其对齐的 CPU。您可以使用
    `CREATE RESOURCE POOL DDL` 语句在 T-SQL 中创建资源池。可在资源池上配置的设置详见表 24-3。


    表 24-3：`CREATE RESOURCE POOL` 参数


    | 参数 | 描述 |

    | --- | --- |

    | `pool_name` | 分配给资源池的名称。 |

    | `MIN_CPU_PERCENT` | 指定资源池可用的有保证的平均最小 CPU 资源，作为实例可用 CPU 带宽的百分比。 |

    | `MAX_CPU_PERCENT` | 指定资源池可用的平均最大 CPU 资源，作为实例可用 CPU 带宽的百分比。这是一个软限制，在 CPU 资源存在争用时适用。
    |

    | `CAP_CPU_PERCENT` | 指定资源池可用 CPU 资源数量的硬限制，作为实例可用 CPU 带宽的百分比。 |

    | `MIN_MEMORY_PERCENT` | 指定为资源池保留的最小内存量，作为实例可用内存的百分比。 |

    | `MAX_MEMORY_PERCENT` | 指定资源池可以使用的最大内存量，作为实例可用内存的百分比。 |

    | `MIN_IOPS_PER_VOLUME` | 指定为资源池保留的每卷 IOPS 数量。与 CPU 和内存阈值不同，IOPS 以绝对值（而非百分比）表示。
    |

    | `MAX_IOPS_PER_VOLUME` | 指定资源池可以使用的每卷最大 IOPS 数量。与最小 IOPS 阈值一样，它以绝对数字（而非百分比）表示。
    |

    | `AFFINITY SCHEDULER`* | 指定资源池应绑定到特定的 SQLOS（SQL 操作系统）调度程序，这些调度程序进而映射到服务器内的特定虚拟核心。不能与
    `AFFINITY NUMANODE` 一起使用。指定 `AUTO` 以允许 SQL Server 管理资源池使用的调度程序。指定调度程序 ID 的范围，例如
    (`0, 1, 32 TO 64`)。 |

    | `AFFINITY NUMANODE`* | 指定资源池应绑定到特定的 NUMA 节点范围，例如 (`1 TO 4`)。不能与 `AFFINITY SCHEDULER`
    一起使用。 |


    *有关 CPU 和 NUMA 关联的更多详细信息，请参阅第 5 章。*


    在使用每卷最小和最大 IOPS 阈值时，我们需要考虑几点。首先，如果我们没有设置最大 IOPS 限制，SQL Server 根本不会管理资源池的 IOPS。这意味着如果您为其他资源池配置了最小
    IOPS 限制，这些限制不会被遵守。因此，如果您希望资源管理器管理 IO，请务必为每个资源池设置最大 IOPS 阈值。

    '
- fmt: 'It is also worth noting that the majority of IO that you can control through
    Resource Governor is read operations. This is because write operations, such as
    Lazy Writer and Log Flush operations, occur as system operations and fall inside
    the scope of the internal resource pool. Because you cannot alter the internal
    resource pool, you cannot govern the majority of write operations. This means
    that using Resource Governor to limit IO operations is most appropriate when you
    have a reporting application or another application with a high ratio of reads
    to writes.


    Finally, you should be aware that Resource Governor can only control the number
    of IOPS; it cannot control the size of the IOPS. This means that you cannot use
    Resource Governor to control the amount of bandwidth into a SAN an application
    is using.


    To create an external resource pool, the `CREATE EXTERNAL RESOURCE POOL` DDL statement
    should be used. The settings that can be configured on an external resource pool
    are detailed in Table 24-4.


    **Table 24-4**

    `CREATE EXTERNAL RESOURCE POOL` Arguments


    | Argument | Description |

    | --- | --- |

    | `pool_name` | The name that you assign to the resource pool. |

    | `MAX_CPU_PERCENT` | Specifies the average maximum CPU resource available to
    the resource pool as a percentage of the CPU bandwidth available to the instance.
    This is a soft limit that applies when there is contention for the CPU resource.
    |

    | `AFFINITY SCHEDULER` | Specifies that the resource pool should be bound to specific
    SQLOS (SQL operating system) schedulers, which in turn map to specific virtual
    cores within the server. Cannot be used with `AFFINITY NUMANODE`.Specify `AUTO`
    to allow SQL Server to manage the schedulers that are used by the resource pool.Specify
    the range of scheduler IDs. For example (`0, 1, 32 TO 64`). |

    | `MAX_MEMORY_PERCENT` | Specifies the maximum amount of memory that the resource
    pool can use as a percentage of the memory available to the instance. |

    | `MAX_PROCESSES` | Specifies the maximum number of processes allowed within the
    pool at any given time. The default is 0, which limits the number of processes
    by server resources only. |


    If you want to create a resource pool called `ReportingApp` that sets a minimum
    CPU percentage of 50, a maximum CPU percentage of 80, a minimum IOPS reservation
    of 20, and a maximum IOPS reservation of 100, you can use the script in Listing
    24-1. The final statement of the script uses `ALTER RESOURCE GOVERNOR` to apply
    the new configuration. You should also run this statement after you create workload
    groups or apply a classifier function.


    ```sql

    CREATE RESOURCE POOL ReportingApp

    WITH(

    MIN_CPU_PERCENT=50,

    MAX_CPU_PERCENT=80,

    MIN_IOPS_PER_VOLUME = 20,

    MAX_IOPS_PER_VOLUME = 100

    ) ;

    GO

    ALTER RESOURCE GOVERNOR RECONFIGURE ;

    GO

    ```

    Listing 24-1: Creating a Resource Pool


    ### Creating Workload Groups


    Each resource pool can contain multiple workload groups. To begin creating a workload
    group for our `SalesApplication` resource pool, we drill through Management ➤
    Resource Governor ➤ Resource Pools. We then drill through our `SalesApplication`
    resource pool and select New Workload Group from the Workload Groups context menu.
    This invokes the Resource Governor Properties dialog box, which is displayed in
    Figure 24-1.


    ![The Resource Governor Properties dialog box](images/333037_2_En_24_Chapter/333037_2_En_24_Fig1_HTML.jpg)

    Figure 24-1: The Resource Governor Properties dialog box


    You can see that with the `SalesApplication` resource pool highlighted in the
    Resource Pools section of the dialog box, we have created two rows within the
    Workload Groups section of the screen. Each of these rows represents a workload
    group that is associated with the `SalesApplication` resource pool.


    We have configured the `SalesUsers` workload group to allow a maximum of 100 simultaneous
    requests and a `MAXDOP` of 4, meaning that requests classified under this workload
    group are able to use a maximum of four schedulers.


    We have configured the `Managers` workload group to allow a maximum of ten simultaneous
    requests and use a maximum of one scheduler. We have also configured this workload
    group to be able to use a maximum of 10% of the memory that the resource pool
    can reserve, as opposed to the default of 25%.


    If the `Memory Grant %` setting is set to 0, then any requests classified under
    that workload group are blocked from running any operations that require a `SORT`
    or `HASH JOIN` physical operator. If queries need more than the specified amount
    of RAM, then SQL Server reduces the `DOP` for that query in an attempt to reduce
    the memory requirement. If the `DOP` reaches 1 and there is still not enough memory,
    then `Error 8657` is thrown.


    To create a resource pool via T-SQL, use the `CREATE WORKLOAD GROUP` DDL statement.
    This statement accepts the arguments detailed in Table 24-5.


    **Table 24-5**

    `CREATE WORKLOAD GROUP` Arguments


    | Argument | Description |

    | --- | --- |

    | `group_name` | Specifies the name of the workload group. |

    | `IMPORTANCE` | Can be configured to `HIGH`, `MEDIUM`, or `LOW` and allows you
    to prioritize requests in one workload group above another. |

    | `REQUEST_MAX_MEMORY_GRANT_PERCENT` | Specifies the maximum amount of memory
    that any one query can use from the resource pool expressed as a percentage of
    the memory available to the resource pool. |

    | `REQUEST_MAX_CPU_TIME_SEC` | Specifies the amount of CPU time, in seconds, that
    any one query can use. It is important to note that if the threshold is exceeded,
    then an event is generated that can be captured with Extended Events. The query
    is not cancelled, however. |

    | `REQUEST_MEMORY_GRANT_TIMEOUT_SEC` | Specifies the maximum amount of time that
    a query can wait for a work buffer memory to become available before it times
    out. The query only times out under memory contention, however. Otherwise, the
    query receives the minimum memory grant. This results in performance degradation
    for the query. The maximum wait time is expressed in seconds. |

    | `MAX_DOP` | The maximum number of processors that a single parallel query can
    use. The `MAXDOP` for a query can be further restrained by using query hints,
    by changing the `MAXDOP` setting for the instance, or when the relational engine
    chooses a serial plan. |

    | `GROUP_MAX_REQUESTS` | Specifies the maximum number of concurrent requests that
    can be executed within the workload group. If the number of concurrent requests
    reaches this value, then further queries are placed in a waiting state until the
    number of concurrent queries falls below the threshold. |

    | `USING` | Specifies the resource pool with which the workload group is associated.
    If not specified, then the group is associated with the default pool. |


    ### Caution


    Workload group names must be unique, even if they are associated with different
    pools. This is so they can be returned by the classifier function.


    If we create two workload groups we want associated with our `ReportingApp` resource
    pool—one named `InternalReports` with a `MAXDOP` of 4 and a 25% maximum memory
    grant and the other named `ExternalReports` with a `MAXDOP` of 8 and a maximum
    memory grant percentage of 75%—we could use the script in Listing 24-2.


    ```sql

    CREATE WORKLOAD GROUP InternalReports

    WITH(

    GROUP_MAX_REQUESTS=100,

    IMPORTANCE=Medium,

    REQUEST_MAX_CPU_TIME_SEC=0,

    REQUEST_MAX_MEMORY_GRANT_PERCENT=25,

    REQUEST_MEMORY_GRANT_TIMEOUT_SEC=0,

    MAX_DOP=4

    ) USING ReportingApp ;

    GO

    CREATE WORKLOAD GROUP ExternalReports

    WITH(

    GROUP_MAX_REQUESTS=100,

    IMPORTANCE=Medium,

    REQUEST_MAX_CPU_TIME_SEC=0,

    REQUEST_MAX_MEMORY_GRANT_PERCENT=75,

    REQUEST_MEMORY_GRANT_TIMEOUT_SEC=0,

    MAX_DOP=8

    ) USING ReportingApp ;

    GO

    ALTER RESOURCE GOVERNOR RECONFIGURE;

    GO

    ```

    Listing 24-2: Creating Workload Groups'
