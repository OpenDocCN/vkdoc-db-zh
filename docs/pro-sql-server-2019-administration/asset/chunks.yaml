    sudo systemctl start ufw

    #Enable ufw

    sudo systemctl enable ufw

    #Set default Firewall Rules

    sudo ufw default allow outgoing

    sudo ufw default deny incoming

    #Add A Rule For SQL

    sudo ufw allow 50001/tcp

    #Restart ufw

    sudo ufw reload

    #Show ufw Status

    sudo ufw status

    Listing 4-9

    Working with ufw

    ```


    ### Note


    In SQL Server 2019, TempDB will automatically be configured with one data file
    per core, to a maximum of eight files. For previous versions, however, only a
    single data file will be created during setup.


    ### Unattended Installation


    Because Bash is a scripting language, the SQL Server installation can be scripted,
    in the same way that you can use PowerShell to script installation in a Windows
    environment. To do this, we will first create a text file, with the text editor,
    vi. The command in Listing [4-10](#333037_2_En_4_Chapter.xhtml#PC10) will create
    and open a file called `sqlconfig.sh`. sh is a commonly used extension for bash
    scripts.


    ```

    vi sqlconfig.sh

    Listing 4-10

    Create a Bash Script with Vi

    ```


    A full discussion of vi commands is beyond the scope of this book. To insert text,
    however, use the `i` command. When finished, use `ESC` to return to command mode.
    Here, `:q!` will exit vi without saving, or `:wq` will save and exit.


    The script in Listing [4-11](#333037_2_En_4_Chapter.xhtml#PC11) can be added to
    the bash script. The first line of the file indicates that it is executable. You
    will also notice that we are installing full-text indexing for this instance and
    configuring both a trace flag and a maximum memory limit for SQL Server.


    Possibly the most interesting thing to note, however, is that we are also installing
    a package called mssql-tools. This package contains the command-line tools for
    SQL Server on Linux, including sqlcmd. We will use this to create a new user and
    add them to the sysadmins fixed server role, at the end of the script.'
  trans: '

    ## 配置 SQL Server


    尽管 SQL Server 现已安装并已完成基本配置，但要使其完全满足你的需求功能，在操作系统和实例级别可能仍有许多配置方面需要处理。在本节中，我们将探讨在
    Linux 环境中可能需要执行的一些常见配置要求。


    配置 SQL Server 实例的主要工具是 `mssql-conf`，这也是我们在安装过程中用来配置版本、语言以及为 `sa` 账户设置密码的同一个工具。该工具还提供了许多其他可配置参数，这些参数在表
    4-2 中有详细说明。


    表 4-2 `mssql-conf` 参数


    | 参数 | 描述 |

    | --- | --- |

    | Agent | 启用或禁用 SQL Server 代理 |

    | Collation | 设置实例排序规则 |

    | Customer feedback | 指定是否向 Microsoft 发送客户反馈。默认开启，且对于免费版本无法关闭 |

    | Database Mail profile | 用于电子邮件警报的数据库邮件配置文件 |

    | Default data directory | 用户数据库文件的默认目录 |

    | Default log directory | 用户数据库事务日志文件的默认目录 |

    | Default Master database directory | Master 数据库数据和日志文件的目录 |

    | Default Master database file name | 更改 Master 数据库的数据库文件名 |

    | Default dump directory | 内存转储文件的目录 |

    | Default error log directory | 用于新的 SQL Server 错误日志、默认分析器跟踪、系统运行状况会话 XE 和 Hekaton
    会话 XE 文件的目录 |

    | Default backup directory | 新备份的目录 |

    | Dump type | 指定要捕获的内存转储文件类型。除了迷你转储外，还允许捕获完全转储。还允许你指定转储文件类型（mini、miniplus、filtered
    和 full） |

    | High availability | 启用或禁用 AlwaysOn 可用性组 |

    | Local Audit directory | 本地审核文件的目录 |

    | Locale | SQL Server 实例的区域设置 |

    | Memory limit | 分配给 SQL Server 实例的物理内存量 |

    | TCP port | SQL Server 将监听连接的端口 |

    | TLS | 用于配置 SQL Server 实例的网络方面，包括 `forceencryption`、`tlscert`、`tlskey`、`tlsprotocols`、`tlsciphers`
    和 `kerberoskeytabfile` |

    | Traceflags | 在实例上设置全局跟踪标志 |


    最常见的配置需求之一可能是启动 SQL Server 代理。这可以通过 `Agent` 参数来实现，如代码清单 4-5 所示。


    ```

    sudo /opt/mssql/bin/mssql-conf set sqlagent.enabled true

    代码清单 4-5

    启动服务器代理

    ```


    另一个展示如何使用该工具的好例子是 `TCP port` 参数。与在 Windows 环境中一样，TCP 1433 是 SQL Server 的默认端口号。然而，你可能希望更改此端口，例如在高安全环境中，以避免使用可能被攻击的知名端口号。


    代码清单 4-6 中的命令将配置 SQL Server 实例监听端口 50001。50001-500xx 是我经常使用的端口范围，因为它未被保留。


    ```

    sudo /opt/mssql/bin/mssql-conf set network.tcpport 50001

    代码清单 4-6

    配置端口

    ```


    要使设置生效，我们首先需要重新启动 SQL Server 服务。这可以使用 `systemctl` 来完成，它是一个用于管理服务的 Linux 工具。代码清单
    4-7 中的命令将重新启动 SQL Server 服务。


    ```

    sudo systemctl restart mssql-server

    代码清单 4-7

    重新启动 SQL Server 服务

    ```


    `systemctl` 工具也可用于检查服务是否正在运行，如代码清单 4-8 所示。


    ```

    sudo systemctl status mssql-server

    代码清单 4-8

    检查服务是否正在运行

    ```


    现在我们已将 SQL Server 配置为监听端口 50001，我们还需要配置本地防火墙，以允许通过此端口的流量。本地防火墙使用一个名为 `ufw`（简单防火墙）的工具进行管理。代码清单
    4-9 中的脚本演示了如何安装 `ufw`、设置默认规则、允许通过端口 50001 的流量，然后重置它以使规则生效。最后，该脚本将显示已配置的规则。


    ```

    #安装 ufw

    sudo apt-get install ufw

    #启动 ufw

    sudo systemctl start ufw

    #启用 ufw

    sudo systemctl enable ufw

    #设置默认防火墙规则

    sudo ufw default allow outgoing

    sudo ufw default deny incoming

    #添加 SQL 规则

    sudo ufw allow 50001/tcp

    #重新加载 ufw

    sudo ufw reload

    #显示 ufw 状态

    sudo ufw status

    代码清单 4-9

    使用 ufw

    ```


    ### 注意


    在 SQL Server 2019 中，`TempDB` 将自动配置为每个核心一个数据文件，最多八个文件。但对于早期版本，安装过程中只会创建一个数据文件。


    ## 无人参与安装


    因为 Bash 是一种脚本语言，所以 SQL Server 安装可以编写脚本，就像你可以在 Windows 环境中使用 PowerShell 编写安装脚本一样。为此，我们将首先使用文本编辑器
    `vi` 创建一个文本文件。代码清单 4-10 中的命令将创建并打开一个名为 `sqlconfig.sh` 的文件。`.sh` 是 bash 脚本常用的扩展名。


    ```

    vi sqlconfig.sh

    代码清单 4-10

    用 Vi 创建 Bash 脚本

    ```


    全面讨论 `vi` 命令超出了本书的范围。但是，要插入文本，请使用 `i` 命令。完成后，使用 `ESC` 返回命令模式。在这里，`:q!` 将不保存退出
    `vi`，而 `:wq` 将保存并退出。


    代码清单 4-11 中的脚本可以添加到 bash 脚本中。文件的第一行表明它是可执行的。你还会注意到我们正在为此实例安装全文索引，并为 SQL Server
    配置一个跟踪标志和最大内存限制。


    然而，最有趣的事情可能是，我们还在安装一个名为 `mssql-tools` 的包。此包包含 Linux 上 SQL Server 的命令行工具，包括 `sqlcmd`。我们将在脚本末尾使用它来创建一个新用户并将其添加到
    `sysadmins` 固定服务器角色中。

    '
- fmt: '### Tip


    Microsoft is working on a new multiplatform command-line interface for SQL Server,
    called `mssql-cli`. This tool can be used on Linux, Windows, and Mac. At the time
    of writing, the tool was in preview, but further information can be found at [`https://github.com/dbcli/mssql-cli`](https://github.com/dbcli/mssql-cli).


    ```bash

    #! /bin/bash

    MSSQL_SA_PASSWORD=''Pa££w0rd''

    MSSQL_PID=''developer''

    SQL_USER=''SQLAdmin''

    SQL_USER_PASSWORD=''Pa££w0rd''

    wget -qO- https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add
    -

    sudo add-apt-repository "$(wget -qO- https://packages.microsoft.com/config/ubuntu/16.04/mssql-server-2019.list)"

    sudo add-apt-repository "$(wget -qO- https://packages.microsoft.com/config/ubuntu/16.04/prod.list)"

    sudo apt-get update -y

    sudo apt-get install -y mssql-server

    sudo ACCEPT_EULA=Y apt-get install -y mssql-tools unixodbc-dev

    sudo MSSQL_SA_PASSWORD=$MSSQL_SA_PASSWORD \

    MSSQL_PID=$MSSQL_PID \

    /opt/mssql/bin/mssql-conf -n setup accept-eula

    sudo /opt/mssql/bin/mssql-conf set sqlagent.enabled true

    sudo /opt/mssql/bin/mssql-conf set memory.memorylimitmb 2048

    sudo /opt/mssql/bin/mssql-conf traceflag 3226 on

    sudo apt-get install -y mssql-server-fts

    sudo systemctl restart mssql-server

    /opt/mssql-tools/bin/sqlcmd \

    -S localhost \

    -U SA \

    -P $MSSQL_SA_PASSWORD \

    -Q "CREATE LOGIN [$SQL_USER] WITH PASSWORD=N''$SQL_INSTALL_PASSWORD''; ALTER SERVER
    ROLE [sysadmin] ADD MEMBER [$SQL_USER]"

    Listing 4-11

    Scripted SQL Server Installation

    ```


    The command in Listing [4-12](#333037_2_En_4_Chapter.xhtml#PC12) will grant the
    execute permission on the script.


    ```bash

    chmod +x sqlconfig.sh

    Listing 4-12

    Grant Execute Permissions

    ```


    The script can be executed using the command in Listing [4-13](#333037_2_En_4_Chapter.xhtml#PC13).


    ```bash

    sh sqlconfig.sh

    Listing 4-13

    Execute the Installation

    ```


    ## Installing SQL Server in a Docker Container


    Containers are isolated, lightweight units, which can be used to run applications.
    Unlike virtual machines, which emulate hardware, containers sit on top of an operating
    system and emulate the kernel. Kernel emulation with containers is referred to
    as containerization. Containers are becoming popular in organizations of all sizes,
    because they are efficient and portable. The portability of containers also simplifies
    deployment processes and makes them very popular in DevOps environments.


    Docker is the application platform that is used to run containers. It was originally
    developed for Linux but is now also supported on Windows. This means that SQL
    Server can utilize containers, regardless of the required base operating system.


    A Docker image is a single file, which contains a fully packaged application.
    So, in terms of SQL Server, a Docker image may be built on an operating system
    such as Windows Server 2019 Core and the SQL Server binaries. Your instance would
    be fully configured, following your best practices, so that every time you create
    a container from your image, it will be ready to use.


    ### Caution


    An important consideration, when containerizing SQL Server, is that containers
    are stateless. One of their advantages is that you can drop a container and spin
    it up again, very quickly and easily, and it will be exactly the same as it was
    originally. A side effect of this is that if you have data files inside a container,
    when you drop the container, the data files are also destroyed. For this reason,
    user data files and `msdb` data files should be stored outside of the container.
    I usually recommend keeping the data files for `master` inside the container,
    as this database stores many of your instance configuration details, but in certain
    circumstances, you may wish to store these outside of the container as well.


    ### Running a Microsoft-Supplied Docker Image


    Microsoft supply a small number of Docker images for SQL Server. For example,
    at the time of writing, there is a SQL Server 2017 for Ubuntu 16.4 and a Windows
    Server Core 2016 image, running SQL Server 2017 Developer edition. In the following
    example, we will configure containers for Windows Server 2016 Core and deploy
    the standard SQL Server 2017 Developer edition container.


    Our first step will be to install the containers feature and restart the computer.
    This can be done by running the PowerShell script in Listing [4-14](#333037_2_En_4_Chapter.xhtml#PC14).


    ```powershell

    Install-WindowsFeature -name Containers

    Restart-Computer -Force

    Listing 4-14

    Install Containers Feature

    ```


    We now need to install the Docker engine and the Microsoft Docker provider. This
    can be achieved with the script in Listing [4-15](#333037_2_En_4_Chapter.xhtml#PC15).


    ```powershell

    Install-Module -Name DockerMsftProvider -Repository PSGallery -Force

    Install-Package -Name docker -ProviderName DockerMsftProvider -Force

    Listing 4-15

    Install Docker Engine

    ```


    ### Tip


    The script in Listing [4-15](#333037_2_En_4_Chapter.xhtml#PC15) will prompt you
    to install the `NuGet` provider, if it’s not already installed. You should accept
    this, as `NuGet` is a package manager required for installing other packages,
    such as Docker.


    The final step in Docker installation is to start the Docker service. Using PowerShell,
    this can be achieved with the command in Listing [4-16](#333037_2_En_4_Chapter.xhtml#PC16).


    ```powershell

    Start-Service docker

    Listing 4-16

    Start the Docker Service

    ```


    We can now pull the image from the Microsoft Container Registry (MCR). This is
    a repository of base Windows containers. The Docker Hub is the default repository
    for container images, but even though Windows images are listed on Docker Hub,
    they are stored on the MCR. We can pull the image using the command in Listing
    [4-17](#333037_2_En_4_Chapter.xhtml#PC17).


    ```bash

    Docker image pull microsoft/mssql-server-windows-developer

    Listing 4-17

    Pull the Docker Image

    ```


    Finally, we will need to start the container. We can start our container using
    the command in Listing [4-18](#333037_2_En_4_Chapter.xhtml#PC18). In this example,
    the `-d` switch is used to denote that the container should be detached. This
    means that the container will run as a background process, as opposed to interactively.
    We are also using `-p` to publish the containers port to the host and `-e` to
    set the environment variables. In this case, we are setting the password for the
    `sa` account and accepting the SQL Server license terms.


    ```bash

    docker run -d -p 1433:1433 -e sa_password=Pa££w0rd -e ACCEPT_EULA=Y microsoft/mssql-server-windows-developer

    Listing 4-18

    Run the Container

    ```


    ### Creating a Simple Docker Image for SQL Server


    While the Microsoft image may be suitable for some purposes, in most cases, you
    will need to create your own Docker image, with your own required configuration.
    In this section, we will explore how to use a Docker file to create an image that
    will install SQL Server 2019 and SQL Server command-line tools on Windows Server
    Core.'
