  trans: '## 实施发布


    现在分发服务器已经配置完毕，我们将为 Chapter16 数据库设置一个**发布**。要开始配置事务复制，我们首先在对象资源管理器中的**复制 ➤ 本地发布**上点击右键，选择**新建发布**。这将调用**新建发布向导**。通过欢迎屏幕后，我们会看到**发布数据库**页面，如图
    16-9 所示。在这里，我们选择包含希望作为发布中文章使用的对象的数据库。一个发布中的所有文章必须位于同一个数据库中，因此在此屏幕我们只能选择一个数据库。若要复制来自多个数据库的文章，我们必须创建多个发布。


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig9_HTML.jpg](img/333037_2_En_16_Fig9_HTML.jpg)


    图 16-9 发布数据库页面


    在**发布类型**页面，如图 16-10 所示，我们选择希望该发布使用的复制类型——在本例中，我们选择事务复制。


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig10_HTML.jpg](img/333037_2_En_16_Fig10_HTML.jpg)


    图 16-10 发布类型页面


    在向导的**文章**页面，如图 16-11 所示，我们选择希望包含在发布中的对象。所有你希望发布的表都必须具有主键，否则你将无法选择它们。在表内部，如果需要，你还可以选择复制单个列。


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig11_HTML.jpg](img/333037_2_En_16_Fig11_HTML.jpg)


    图 16-11 文章页面


    **文章属性**按钮允许我们通过**文章属性**对话框（如图 16-12 所示）来更改选定文章或所有文章的属性。除非有特殊理由，否则你通常应将大多数属性保留为默认值。然而，你应该特别注意一些属性。


    你使用**名称如果已使用则执行操作**属性来确定如果订阅者数据库中已存在同名表时的行为。可能的选项如下：


    *   保持现有对象不变。

    *   删除现有对象并创建新对象。

    *   删除数据。如果文章有行筛选器，则仅删除匹配筛选器的数据。

    *   截断现有对象中的所有数据。


    **复制权限**属性决定是否将对象级权限复制到订阅者。这很重要，因为根据你使用环境的方式，你可能希望或不希望权限配置得与发布者相同。


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig12_HTML.jpg](img/333037_2_En_16_Fig12_HTML.jpg)


    图 16-12 文章属性对话框


    在向导的**筛选表行**页面，如图 16-13 所示，我们可以使用**添加**、**编辑**和**删除**按钮来管理筛选器。筛选器本质上是为文章添加一个`WHERE`子句，从而限制复制的行数。你会发现这对于在多个订阅者之间划分数据特别有用。


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig13_HTML.jpg](img/333037_2_En_16_Fig13_HTML.jpg)


    图 16-13 筛选表行页面


    图 16-14 展示了**添加筛选器**对话框。在我们的例子中，我们创建了一个筛选器，以便只复制`ID > 500`的客户。在生产场景中，你可以通过基于区域、账户状态等方式进行筛选来运用此功能。


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig14_HTML.jpg](img/333037_2_En_16_Fig14_HTML.jpg)


    图 16-14 添加筛选器对话框


    在**快照代理**页面，如图 16-15 所示，你可以配置初始快照立即创建（如此处所示），或者你可以安排快照代理在特定时间运行。


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig15_HTML.jpg](img/333037_2_En_16_Fig15_HTML.jpg)


    图 16-15 快照代理页面


    在**代理安全性**页面，如图 16-16 所示，系统会邀请你配置用于运行每个复制代理的账户。至少，运行快照代理的账户应具有以下权限：


    *   是分发数据库中`db_owner`数据库角色的成员

    *   对包含快照的共享文件夹具有读取、写入和修改权限


    运行日志读取器代理的账户至少必须具有以下权限：


    *   是分发数据库中`db_owner`数据库角色的成员


    当你创建订阅时，需要选择`sync_type`。此配置选择会通过以下方式影响日志读取器账户所需的权限：


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig16_HTML.jpg](img/333037_2_En_16_Fig16_HTML.jpg)


    图 16-16 代理安全性页面


    *   **Automatic**：无需额外权限

    *   **其他任何选项**：在分发服务器上具有`sysadmin`权限


    点击快照代理的**安全设置**按钮会显示**快照代理安全性**对话框，如图 16-17 所示。在此对话框中，你可以选择在服务器代理服务账户的上下文中运行快照代理，也可以指定要使用的其他
    Windows 账户。为了遵循最小权限原则，你应使用一个单独的账户。你还可以指定用于连接到发布者实例的不同账户。但在我们的例子中，我们指定使用同一账户进行所有连接。


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig17_HTML.jpg](img/333037_2_En_16_Fig17_HTML.jpg)


    图 16-17 快照代理安全性对话框


    回到**代理安全性**页面，你可以选择指定运行日志读取器代理账户的详细信息，或者克隆你已为运行快照代理账户输入的信息。


    在**向导操作**页面，你可以选择生成发布（如此处所示）、生成发布的脚本，或者两者都做。我们将立即创建发布。最后，在**完成**页面，为发布指定一个名称。我们将我们的发布命名为**Chapter16**。'
- fmt: '#### Implementing the Subscriber


    Now that the `PROSQLADMIN` instance is configured as a distributor and publisher
    and our publication has been created, we need to configure our `PROSQLADMIN2`
    instance as a subscriber. We can perform this task from either the publisher or
    from the subscriber. From the subscriber, we perform this task by connecting to
    the `PROSQLADMIN2` instance and then by drilling through replication and selecting
    **New Subscription** from the context menu of **Local Subscriptions**. This causes
    the **New Subscription Wizard** to be invoked. After passing through the **Welcome**
    page of this wizard, you are presented with the **Publication** page, as illustrated
    in Figure [16-18](#333037_2_En_16_Chapter.xhtml#Fig18). On this page, you use
    the **Publisher** drop-down box to connect to the instance that is configured
    as the publisher, and then you select the appropriate publication from the **Databases
    And Publications** area of the screen.


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig18_HTML.jpg](images/333037_2_En_16_Chapter/333037_2_En_16_Fig18_HTML.jpg)

    *Figure 16-18: The Publication page*


    On the **Distribution Agent Location** page, you choose if you want to use push
    subscriptions or pull subscriptions. The appropriate choice here depends on your
    topology. If you have many subscribers, then you may choose to implement a remote
    distributor. If this is the case, then it is likely that you will use push subscriptions
    so that the server configured as the distributor has the impact of agents running.
    If you have many subscribers and you are using a local distributor, however, then
    it is likely that you will use pull subscriptions so that you can spread the cost
    of the agents between the subscribers. In our case, we have a local distributor,
    but we also only have a single subscriber, so from a performance perspective,
    it is an obvious choice of which server is most equipped to deal with the workload.
    We also must consider security when we place the distribution agent, however;
    we discuss this later in this section. For this demonstration, we use push subscriptions.
    The **Distribution Agent Location** page is illustrated in Figure [16-19](#333037_2_En_16_Chapter.xhtml#Fig19).


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig19_HTML.jpg](images/333037_2_En_16_Chapter/333037_2_En_16_Fig19_HTML.jpg)

    *Figure 16-19: The Distribution Agent Location page*


    On the **Subscribers** page, we can select the name of our subscription database
    from the drop-down list. Because our subscription database doesn’t already exist,
    however, we select **New Database**, as shown in Figure [16-20](#333037_2_En_16_Chapter.xhtml#Fig20),
    which causes the **New Database** dialog box to be invoked.


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig20_HTML.jpg](images/333037_2_En_16_Chapter/333037_2_En_16_Fig20_HTML.jpg)

    *Figure 16-20: The Subscribers page*


    On the **General** page of the **New Database** dialog box, shown in Figure [16-21](#333037_2_En_16_Chapter.xhtml#Fig21),
    you need to enter appropriate settings for the subscription database based upon
    its planned usage. If you need to, you can configure many of the database properties
    on the **Options** page.


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig21_HTML.jpg](images/333037_2_En_16_Chapter/333037_2_En_16_Fig21_HTML.jpg)

    *Figure 16-21: The General page*


    On the **Distribution Agent Security** page, illustrated in Figure [16-22](#333037_2_En_16_Chapter.xhtml#Fig22),
    click the ellipses to invoke the **Distribution Agent Security** dialog box.


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig22_HTML.jpg](images/333037_2_En_16_Chapter/333037_2_En_16_Fig22_HTML.jpg)

    *Figure 16-22: The Distribution Agent Security page*


    In the **Distribution Agent Security** dialog box, illustrated in Figure [16-23](#333037_2_En_16_Chapter.xhtml#Fig23),
    specify the details of the account that runs the **Distribution Agent**. When
    you are using push subscription, at a minimum, the account that runs the **Distribution
    Agent** should have the following permissions:


    *   Be a member of the `db_owner` role on the Distribution database

    *   Be a member of the publication access list (We discuss configuring publication
    access later in this chapter.)

    *   Have read permissions on the share where the snapshot is located


    The account that is used to connect to the subscriber must have the following
    permissions:


    *   Be a member of the `db_owner` role in the subscription database

    *   Have permissions to view server state on the subscribers (This only applies
    if you plan to use multiple subscription streams.)


    When you are using pull subscriptions, at a minimum, the account that runs the
    distribution agent needs the following permissions:


    *   Be a member of the `db_owner` role on the subscription database

    *   Be a member of the publication access list (We discuss configuring publication
    access later in this chapter.)

    *   Have read permissions on the share where the snapshot is located

    *   Have permissions to view server state on the subscriber (This only applies
    if you plan to use multiple subscription streams.)


    In the first section of the dialog box, you select if you want to impersonate
    the `SQL Server` service account or specify a different account on which to run
    the agent. To enforce the principle of least privilege, you should use a different
    account. In the second section of the dialog box, you specify how the **Distribution
    Agent** connects to the distributor. If you are using push subscriptions, then
    the agent must use the account that runs the **Distribution Agent**. In the third
    section of the dialog box, you specify how the **Distribution Agent** connects
    to the subscriber. If you are using pull subscriptions, then you must use the
    same account that is running the **Distribution Agent**.


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig23_HTML.jpg](images/333037_2_En_16_Chapter/333037_2_En_16_Fig23_HTML.jpg)

    *Figure 16-23: The Distribution Agent Security dialog box*


    On the **Synchronization Schedule** page, you define a schedule for the **Distribution
    Agent** to run. You can choose to run the agent continuously, run the agent only
    on demand, or define a new server agent schedule on which to run the **Distribution
    Agent**, as illustrated in Figure [16-24](#333037_2_En_16_Chapter.xhtml#Fig24).
    We choose to run the agent continuously.


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig24_HTML.jpg](images/333037_2_En_16_Chapter/333037_2_En_16_Fig24_HTML.jpg)

    *Figure 16-24: The Synchronization Schedule page*


    On the **Initialize Subscriptions** page, depicted in Figure [16-25](#333037_2_En_16_Chapter.xhtml#Fig25),
    you choose if you want the subscription to be initialized immediately, or if you
    want to wait for the first synchronization and then initialize it from the snapshot
    at that point. For this demonstration, we initialize the subscription immediately.
    If you select the **Memory Optimized** check box, then the tables will be replicated
    into memory-optimized tables on the Subscriber. To select this option, you must
    have already created the memory-optimized filegroup. You must also have configured
    the **Enable Memory Optimization** property of the Article to True.


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig25_HTML.jpg](images/333037_2_En_16_Chapter/333037_2_En_16_Fig25_HTML.jpg)

    *Figure 16-25: The Initialize Subscriptions page*


    On the **Wizard Actions** page, you need to choose whether you want to create
    the subscription immediately or if you want to script the process. We choose to
    create the subscription immediately. Finally, on the **Complete The Wizard** page,
    you are given a summary of the actions that the wizard performs.'
