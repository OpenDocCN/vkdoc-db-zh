  trans: '### 提示


    仅当 8-16 清单中的命令尚未执行完毕时，8-17 清单中的命令才会生效。


    ```sql

    ALTER INDEX NCI_CustomerID ON dbo.OrdersDisk PAUSE

    Listing 8-17

    暂停索引重建

    ```


    运行此脚本后，索引重建操作将暂停，并显示如图 8-11 所示的消息。


    ![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig11_HTML.jpg](img/333037_2_En_8_Fig11_HTML.jpg)

    *图 8-11：索引操作暂停时抛出的消息*


    8-18 清单中的脚本将根据分配给`@Action`变量的值，恢复或中止索引重建。


    ```sql

    DECLARE @Action NVARCHAR(6) = ''Resume''

    IF (@Action = ''Resume'')

    BEGIN

    ALTER INDEX NCI_CustomerID ON dbo.OrdersDisk RESUME

    END

    ELSE

    BEGIN

    ALTER INDEX NCI_CustomerID ON dbo.OrdersDisk ABORT

    END

    Listing 8-18

    恢复或中止索引操作

    ```


    您不必为每个单独的索引操作开启`ONLINE`和`RESUMABLE`选项，而是可以通过使用数据库作用域配置，在数据库级别全局开启它们。`ELEVATE_ONLINE`配置将把数据库内受支持的索引操作的`ONLINE`默认值更改为`ON`。`ELEVATE_RESUMABLE`配置则会将`RESUMABLE`的默认值设为`ON`。


    `ELEVATE_ONLINE`和`ELEVATE_RESUMABLE`均可配置为`OFF`（默认行为）、`WHEN_SUPPORTED`或`FAIL_UNSUPPORTED`。当设置为`WHEN_SUPPORTED`时，不兼容的操作（如重建
    XML 索引）将以离线且不可恢复的方式执行。但如果设置为`FAIL_UNSUPPORTED`，此类操作将失败并抛出错误。


    8-19 清单中的脚本演示了如何为`Chapter8`数据库将`ELEVATE_ONLINE`和`ELEVATE_RESUMABLE`设置为`WHEN_SUPPORTED`。


    ```sql

    USE Chapter8

    GO

    ALTER DATABASE SCOPED CONFIGURATION SET ELEVATE_ONLINE = WHEN_SUPPORTED ;

    GO

    ALTER DATABASE SCOPED CONFIGURATION SET ELEVATE_RESUMABLE = WHEN_SUPPORTED ;

    GO

    Listing 8-19

    默认为 ONLINE 和 RESUMABLE

    ```


    ### 分区索引


    如第 7 章所述，不仅可以对表进行分区，也可以对索引进行分区。聚集索引总是与基础表共享相同的分区方案，因为聚集索引的叶级由表的实际数据页组成。而非聚集索引则可以选择与表对齐或不对齐。如果索引共享相同的分区方案或在相同的分区方案上创建，则这些索引是对齐的。


    在大多数情况下，将非聚集索引与基表对齐是良好的实践，但有时您可能希望偏离此策略。例如，即使基表未分区，您仍可以为性能而对索引进行分区。此外，如果您的索引键是唯一的且不包含分区键，则它需要是不对齐的。如果表涉及在不同列上与其他表进行排序规则连接，不对齐的非聚集索引也有可能带来性能提升。


    您可以使用`ON`子句指定分区方案来创建分区索引，方式与创建分区表相同。如果索引已存在，您可以重建它，并在`ON`子句中指定分区方案。8-20 清单中的脚本创建了一个分区函数和一个分区方案。然后，它重建`OrdersDisk`表的聚集索引以将其移动到新的分区方案。最后，它创建了一个新的非聚集索引，该索引与表分区对齐。


    **提示：** 运行脚本前，请将主键名称更改为您自己的名称。


    ```sql

    --创建分区函数

    CREATE PARTITION FUNCTION OrdersPartFunc(int)

    AS RANGE LEFT

    FOR VALUES(250000,500000,750000) ;

    GO

    --创建分区方案

    CREATE PARTITION SCHEME OrdersPartScheme

    AS PARTITION OrdersPartFunc

    ALL TO([PRIMARY]) ;

    GO

    --对 OrdersDisk 表进行分区

    ALTER TABLE dbo.OrdersDisk DROP CONSTRAINT PK__OrdersDi__CAC5E7420B016A9F ;

    GO

    ALTER TABLE dbo.OrdersDisk

    ADD PRIMARY KEY CLUSTERED(OrderNumber) ON OrdersPartScheme(OrderNumber) ;

    GO

    --创建分区对齐的非聚集索引

    CREATE NONCLUSTERED INDEX NCI_Part_CustID ON dbo.OrdersDisk(CustomerID, OrderNumber)

    ON OrdersPartScheme(OrderNumber) ;

    Listing 8-20

    重建和创建分区索引

    ```


    重建索引时，您还可以指定仅重建特定分区。8-21 清单中的示例仅重建`NCI_Part_CustID`索引的分区 1。


    ```sql

    ALTER INDEX NCI_Part_CustID ON dbo.OrdersDisk REBUILD PARTITION = 1 ;

    Listing 8-21

    重建特定分区

    ```


    ## 统计信息


    SQL Server 维护关于列或列组内数据分布的统计信息。这些列可以位于表或非聚集索引中。当统计信息建立在一组列上时，它们也包括这些列值分布之间的相关性统计信息。查询优化器随后可以利用这些统计信息，基于查询预期返回的行数来构建高效的查询计划。缺乏统计信息可能导致生成低效的计划。例如，当查找操作更高效时，查询优化器可能决定执行索引扫描。


    您可以允许 SQL Server 自动管理统计信息。一个名为`AUTO_CREATE_STATISTICS`的数据库级别选项会在 SQL Server 认为更好的基数估计有助于查询性能时自动生成单列统计信息。但这存在限制。例如，筛选的统计信息或多列统计信息无法自动创建。'
- fmt: '### Tip


    The only exception to this is when an index is created. When you create an index,
    statistics are always generated, even multicolumn statistics, to cover the index
    key. It also includes filtered statistics on filtered indexes. This is regardless
    of the `AUTO_CREATE_STATS` setting.


    `Auto Create Incremental Stats` causes statistics on partitioned tables to be
    automatically created on a per-partition basis, as opposed to being generated
    for the whole table. This can reduce contention by stopping a scan of the full
    table from being required.


    Statistics become out of date as DML operations are performed against a table.
    The database-level option, `AUTO_UPDATE_STATISTICS`, rebuilds statistics when
    they become outdated. The rules in Table 8-3 are used to determine if statistics
    are out of date.


    Table 8-3 Statistics Update Algorithms


    | No of Rows in Table | Rule |

    | --- | --- |

    | 0 | Table has greater than 0 rows. |

    | <= 500 | 500 or more values in the first column of the statistics object have
    changed. |

    | > 500 | 500 + 20% or more values in the first column of the statistics object
    have changed. |

    | Partitioned table with `INCREMENTAL` statistics | 20% or more values in the
    first column of the statistics object for a specific partition have changed. |


    The `AUTO_UPDATE_STATISTICS` process is very useful, and it is normally a good
    idea to use it. An issue can arise, however, because the process is synchronous
    and blocking. Therefore, if a query is run, SQL Server checks to see if the statistics
    need to be updated. If they do, SQL Server updates them, but this blocks the query
    and any other queries that require the same statistics, until the operation completes.
    During times of high read/write load, such as an ETL process against very large
    tables, this can cause performance problems. The workaround for this is another
    database-level option, called `AUTO_UPDATE_STATISTICS_ASYNC`. Even when this option
    is turned on, it only takes effect if `AUTO_UPDATE_STATISTICS` is also turned
    on. When enabled, `AUTO_UPDATE_STATS_ASYNC` forces the update of the statistics
    object to run as an asynchronous background process. This means that the query
    that caused it to run and other queries are not blocked. The trade-off, however,
    is that these queries do not benefit from the updated statistics.


    The options mentioned earlier can be configured on the Options page of the Database
    Properties dialog box. Alternatively, you can configure them using `ALTER DATABASE`
    commands, as demonstrated in Listing 8-22.


    ```

    --Turn on Auto_Create_Stats

    ALTER DATABASE Chapter8 SET AUTO_CREATE_STATISTICS ON ;

    GO

    --Turn on Auto_Create_Incremental_Stats

    ALTER DATABASE Chapter8 SET AUTO_CREATE_STATISTICS ON  (INCREMENTAL=ON) ;

    GO

    --Turn on Auto_Update_Stats_Async

    ALTER DATABASE Chapter8 SET AUTO_UPDATE_STATISTICS ON WITH NO_WAIT ;

    GO

    --Turn on Auto_Update_Stats_Async

    ALTER DATABASE Chapter8 SET AUTO_UPDATE_STATISTICS_ASYNC ON WITH NO_WAIT ;

    GO

    Listing 8-22 Toggling Automatic Statistics Options

    ```


    ### Filtered Statistics


    Filtered statistics allow you to create statistics on a subset of data within
    a column through the use of a `WHERE` clause in the statistic creation. This allows
    the Query Optimizer to generate an even better plan, since the statistics only
    contain the distribution of values within the well-defined subset of data. For
    example, if we create filtered statistics on the `NetAmount` column of our `OrdersDisk`
    table filtered by `OrderDate` being greater than 1 Jan 2019, then the statistics
    will not include rows that contain old orders, allowing us to search for large,
    recent orders more efficiently.


    ### Incremental Statistics


    Incremental statistics can help reduce table scans caused by statistics updates
    on large partitioned tables. When enabled, statistics are created and updated
    on a per-partition basis, as opposed to globally, for the entire table. This can
    significantly reduce the amount of time you need to update statistics on large
    partitioned tables, since partitions where the statistics are not outdated are
    not touched, therefore reducing unnecessary overhead.


    Incremental statistics are not supported in all scenarios, however. A warning
    is generated and the setting is ignored if the option is used with the following
    types of statistics:


    *   Statistics on views

    *   Statistics on XML columns

    *   Statistics on Geography or Geometry columns

    *   Statistics on filtered indexes

    *   Statistics for indexes that are not partition aligned


    Additionally, you cannot use incremental statistics on read-only databases or
    on databases that are participating in an `AlwaysOn Availability Group` as a readable
    secondary replica.'
