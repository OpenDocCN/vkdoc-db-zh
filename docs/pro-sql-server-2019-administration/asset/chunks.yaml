    ### Integrating Event Sessions with Operating System–Level Events


    ### Note


    To follow the demonstrations in this section, you need to install Windows Performance
    Toolkit, which you can download from [`https://msdn.microsoft.com`](https://msdn.microsoft.com)
    as part of the Windows Deployment and Assessment Toolkit.


    There are instances in which you may need to integrate event session data with
    operating system data other than Perfmon counters that SQL Server provides. For
    example, imagine a scenario in which you have an application that exports SQL
    Server data to flat files in the operating system so that a middleware product,
    such as BizTalk, can pick them up. You are having trouble generating some files
    and you need to view the process flow—from SQL statement being run through to
    the WMI events being triggered in the operating system. For this, you need to
    merge event session data with a trace of WMI events. You can achieve this through
    the ETW (Event Tracking for Windows) architecture.


    To demonstrate this, we first create an event trace session in Performance Monitor
    using the WMI provider, and then we integrate it with the event session that we
    created in the previous section. (You can find Performance Monitor in Administrative
    Tools in Windows.) After we open Performance Monitor, we select New ➤ Data Collector
    Set from the Event Trace Sessions context menu, which causes the Create New Data
    Collector Set wizard to be invoked. On the first page of the wizard, specify a
    name for the Collector Set, as illustrated in Figure [19-12](#333037_2_En_19_Chapter.xhtml#Fig12),
    and specify if the Data Collector set should be configured manually or based on
    a template. In our scenario, we choose to configure it manually.


    ![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig12_HTML.jpg](images/333037_2_En_19_Chapter/333037_2_En_19_Fig12_HTML.jpg)


