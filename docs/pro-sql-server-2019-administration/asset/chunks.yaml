  trans: '# 数据库恢复


    您可以通过 SSMS 或 T-SQL 来恢复数据库。我们将在以下章节探讨这两种选项。


    ## 在 SQL Server Management Studio 中恢复


    要在 SSMS 中开始恢复，请在`对象资源管理器`中的`数据库`上右键点击上下文菜单，选择`还原数据库`。这将显示`还原数据库`对话框的`常规`页，如图 12-5
    所示。从下拉列表中选择要还原的数据库，会自动填充选项卡的其余部分。


    ![../images/333037_2_En_12_Chapter/333037_2_En_12_Fig5_HTML.jpg](img/333037_2_En_12_Fig5_HTML.jpg)

    **图 12-5**

    `常规`页


    您可以看到，`Chapter12`媒体集的内容显示在该页面的`要还原的备份集`窗格中。在这种情况下，我们可以看到`Chapter12`媒体集的内容。`还原`复选框允许您选择希望还原的备份集。


    `时间线`按钮以图形方式显示了每个备份集的创建时间，如图 12-6 所示。这使您可以轻松地根据所选还原的备份集查看可能面临的数据丢失风险。在`时间线`窗口中，您还可以指定是希望恢复到日志结尾，还是希望恢复到特定的日期/时间。


    ![../images/333037_2_En_12_Chapter/333037_2_En_12_Fig6_HTML.jpg](img/333037_2_En_12_Fig6_HTML.jpg)

    **图 12-6**

    `备份时间线`页


    点击`常规`页上的`验证备份媒体`按钮，将执行 `RESTORE WITH VERIFYONLY` 操作。此操作仅验证备份媒体而不尝试还原。为此，它执行以下检查：


    *   备份集是完整的。

    *   所有备份设备都可读。

    *   `CHECKSUM` 有效（仅在备份操作期间指定了 `WITH CHECKSUM` 时适用）。

    *   页头已验证。

    *   目标还原卷上有足够的空间用于还原备份。


    在`文件`页上，如图 12-7 所示，您可以选择还原每个文件的不同位置。默认行为是将文件还原到当前位置。您可以使用每个文件旁边的省略号 (...) 为每个单独的文件指定不同的位置，或者您可以使用`将所有文件重新定位到文件夹`选项为所有数据文件指定一个文件夹，并为所有日志文件指定一个文件夹。


    ![../images/333037_2_En_12_Chapter/333037_2_En_12_Fig7_HTML.jpg](img/333037_2_En_12_Fig7_HTML.jpg)

    **图 12-7**

    `文件`页


    在`选项`页上，如图 12-8 所示，您可以指定计划使用的还原选项。在该页面的`还原选项`部分，您可以指定是要覆盖现有数据库、保留数据库内的复制设置（如果您正在配置日志传送以与复制一起使用，则应使用此选项），以及以受限访问权限还原数据库。最后一个选项使得数据库在还原完成后仅对管理员和
    `db_owner` 及 `db_creator` 角色的成员可访问。如果您想在让数据库对用户可用之前验证数据或执行任何数据修复，这会很有帮助。


    在`还原选项`部分，您还可以指定数据库的恢复状态。使用 `RECOVERY` 选项恢复数据库会在恢复完成时将数据库置于在线状态。`NORECOVERY` 会使数据库保持正在还原状态，这意味着可以应用更多备份。`STANDBY`
    会使数据库在线但使其处于只读状态。如果您正在故障转移到辅助服务器，此选项可能很有用。如果您选择此选项，还可以指定`事务撤消`文件的位置。


    ### 提示


    如果您在还原第一个备份文件时指定了 `WITH PARTIAL`，即使您使用 `WITH RECOVERY` 进行还原，也能够应用其他备份。但是，GUI 不支持分段还原。本章后面将讨论通过
    T-SQL 执行分段还原。


    在屏幕的`尾日志备份`部分，您可以选择尝试在还原操作开始前进行尾日志备份，如果您选择这样做，可以选择让数据库保持正在还原状态。即使数据库已损坏，尾日志备份也可能是可行的。将源数据库保持在正在还原状态本质上是一种安全状态，以降低数据丢失的风险。如果您选择进行尾日志备份，还可以指定要使用的备份设备的文件路径。您还可以指定是否要在还原开始前关闭到目标数据库的现有连接，以及是否希望在还原每个单独备份集之前收到提示。


    ![../images/333037_2_En_12_Chapter/333037_2_En_12_Fig8_HTML.jpg](img/333037_2_En_12_Fig8_HTML.jpg)

    **图 12-8**

    `选项`页


    如果我们想要备份 `Chapter12` 数据库的事务日志，并再次将备份集追加到同一媒体集，可以使用清单 12-6 中的命令。在运行此脚本前，请修改备份设备的路径以符合您系统的配置。


    ```sql

    BACKUP LOG Chapter12

    TO  DISK = ''H:\MSSQL\Backup\Chapter12.bak''

    WITH  RETAINDAYS = 90

    , NOINIT

    , MEDIANAME = ''Chapter12''

    , NAME = ''Chapter12-Log Backup''

    , COMPRESSION ;

    GO

    ```

    **清单 12-6**

    执行事务日志备份


    ### 提示


    在企业场景中，您可能希望将完整备份、差异备份和日志备份存储在不同的文件夹中，以便在管理员查找要恢复的文件时提供帮助。


    如果我们正在实施文件组备份策略，并且只想备份 `FileGroupA`，可以使用清单 12-7 中的命令。我们为此备份集创建一个新的媒体集。在运行此脚本前，请修改备份设备的路径以符合您系统的配置。


    ```sql

    BACKUP DATABASE Chapter12 FILEGROUP = ''FileGroupA''

    TO  DISK = ''H:\MSSQL\Backup\Chapter12FGA.bak''

    WITH  RETAINDAYS = 90

    , FORMAT

    , INIT

    , MEDIANAME = ''Chapter12FG''

    , NAME = ''Chapter12-Full Database Backup-FilegroupA''

    , COMPRESSION ;

    GO

    ```

    **清单 12-7**

    执行文件组备份


    要重复 `Chapter12` 的完整备份，但将备份集条带化跨两个备份设备，可以使用清单 12-8 中的命令。这有助于提高备份的吞吐量。在运行此脚本前，您应修改备份设备的路径以符合您系统的配置。


    ```sql

    BACKUP DATABASE Chapter12

    TO  DISK = ''H:\MSSQL\Backup\Chapter12Stripe1.bak'',

    DISK = ''G:\MSSQL\Backup\Chapter12Stripe2.bak''

    WITH  RETAINDAYS = 90

    , FORMAT

    , INIT

    , MEDIANAME = ''Chapter12Stripe''

    , NAME = ''Chapter12-Full Database Backup-Stripe''

    , COMPRESSION ;

    GO

    ```

    **清单 12-8**

    使用多个备份设备


    为了增加冗余，我们可以使用清单 12-9 中的命令创建镜像媒体集。在运行此脚本前，请修改备份设备的路径以符合您系统的配置。


    ```sql

    BACKUP DATABASE Chapter12

    TO  DISK = ''H:\MSSQL\Backup\Chapter12Stripe1.bak'',

    DISK = ''G:\MSSQL\Backup\Chapter12Stripe2.bak''

    MIRROR TO DISK = ''J:\MSSQL\Backup\Chapter12Mirror1.bak'',

    DISK = ''K:\MSSQL\Backup\Chapter12Mirror2.bak''

    WITH  RETAINDAYS = 90

    , FORMAT

    , INIT

    , MEDIANAME = ''Chapter12Mirror''

    , NAME = ''Chapter12-Full Database Backup-Mirror''

    , COMPRESSION ;

    GO

    ```

    **清单 12-9**

    使用镜像媒体集'
- fmt: '## Restoring via T-SQL


    When using the `RESTORE` command in T-SQL, in addition to restoring a database,
    the options detailed in Table 12-8 are available.


    ### Table 12-8: Restore Options


    | Restore Option | Description |

    | --- | --- |

    | `RESTORE FILELISTONLY` | Returns a list of all files in the backup device. |

    | `RESTORE HEADERONLY` | Returns the backup headers for all backup sets within
    a backup device. |

    | `RESTORE LABELONLY` | Returns information regarding the media set and media
    family to which the backup device belongs. |

    | `RESTORE REWINDONLY` | Closes and rewinds the tape. Only works if the backup
    device is a tape. |

    | `RESTORE VERIFYONLY` | Checks that all backup devices exist and are readable.
    Also performs other high-level verification checks, such as ensuring there is
    enough space on the destination drive, checking the `CHECKSUM` (providing the
    backup was taken with `CHECKSUM`), and checking key Page Header fields. |


    When using the `RESTORE` command to perform a restore, you can use many arguments
    to allow many restore scenarios to take place. These arguments can be categorized
    as follows:


    ### Table 12-14: Miscellaneous Options


    | Argument | Description |

    | --- | --- |

    | `BUFFERCOUNT` | The total number of IO buffers used for the restore operation.
    |

    | `MAXTRANSFERSIZE` | The largest possible unit of transfer between SQL Server
    and the backup media, specified in bytes. |

    | `STATS` | Specifies how often progress messages should be displayed. The default
    is to display a progress message in 5% increments. |

    | `FILESTREAM (DIRECTORY_NAME)` | Specifies the name of the folder to which `FILESTREAM`
    data should be restored. |

    | `KEEP_REPLICATION` | Preserves the replication settings. Use this option when
    configuring log shipping with replication. |

    | `KEEP_CDC` | Preserves the change data capture (CDC) settings of a database
    when it is being restored. Only relevant if CDC was enabled at the time of the
    backup operation. |

    | `ENABLE_BROKER`/`ERROR_BROKER_CONVERSATIONS`/`NEW BROKER` | `ENABLE_BROKER`
    specifies that service broker message delivery will be enabled after the restore
    operation completes so that messages can immediately be sent. `ERROR_BROKER_CONVERSATIONS`
    specifies that all conversations will be terminated with an error message before
    message delivery is enabled. `NEW_BROKER` specifies that conversations will be
    removed without throwing an error and the database will be assigned a new Service
    Broker identifier. Only relevant if Service Broker was enabled when the backup
    was created. |

    | `STOPAT`/`STOPATMARK`/`STOPBEFOREMARK` | Used for point-in-time recovery and
    only supported in `FULL` recovery model. `STOPAT` specifies a datetime value,
    which will determine the time of the last transaction to restore. `STOPATMARK`
    specifies either an LSN (log sequence number) to restore to or the name of a marked
    transaction, which will be the final transaction that is restored. `STOPBEFOREMARK`
    restores up to the transaction prior to the LSN or marked transaction specified.
    |


    ### Table 12-13: Error Management Options


    | Argument | Description |

    | --- | --- |

    | `CHECKSUM`/`NOCHECKSUM` | If `CHECKSUM` was specified during the backup operation,
    then specifying `CHECKSUM` during the restore operation will verify page integrity
    during the restore operation. Specifying `NOCHECKSUM` disables this verification.
    |

    | `CONTINUE_AFTER_ERROR`/`STOP_ON_ERROR` | `STOP_ON_ERROR` causes the restore
    operation to terminate if any damaged pages are discovered. `CONTINUE_AFTER_ERROR`
    causes the restore operation to continue, even if damaged pages are discovered.
    |


    ### Table 12-12: Media Set Options


    | Argument | Description |

    | --- | --- |

    | `MEDIANAME` | If you use this argument, then the `MEDIANAME` must match the
    name of the media set allocated during the creation of the media set. |

    | `MEDIAPASSWORD` | If you are restoring from a media set created using SQL Server
    2008 or earlier and a password was specified for the media set, then you must
    use this argument during the restore operation. |

    | `BLOCKSIZE` | Specifies the block size to use for the restore operation, in
    bytes, to override the default value of 65,536 for tape and 512 for disk or URL.
    |


    ### Table 12-11: Backup Set Options


    | Argument | Description |

    | --- | --- |

    | `FILE` | Indicates the sequential number of the backup set, within the media
    set, to be used. |

    | `PASSWORD` | If you are restoring a backup that was taken in SQL Server 2008
    or earlier where a password was specified during the backup operation, then you
    need to use this argument to be able to restore the backup. |


    ### Table 12-10: WITH Options


    | Argument | Description |

    | --- | --- |

    | `PARTIAL` | Indicates that this is the first restore in a piecemeal restore,
    which is discussed later in this chapter. |

    | `RECOVERY`/`NORECOVERY`/`STANDBY` | Specifies the state that the database should
    be left in when the restore operation completes. `RECOVERY` indicates that the
    database will be brought online. `NORECOVERY` indicates that the database will
    remain in a restoring state so that subsequent restores can be applied. `STANDBY`
    indicates that the database will be brought online in read-only mode. |

    | `MOVE` | Used to specify the file system location that the files should be restored
    to if this is different from the original location. |

    | `CREDENTIAL` | Used when performing a restore from a Windows Azure Blob. |

    | `REPLACE` | If a database already exists on the instance with the target database
    name that you have specified in the restore statement, or if the files already
    exist in the operating system with the same name or location, then `REPLACE` indicates
    that the database or files should be overwritten. |

    | `RESTART` | Indicates that if the restore operation is interrupted, it should
    be restarted from that point. |

    | `RESTRICTED_USER` | Indicates that only administrators and members of the `db_owner`
    and `db_creator` roles should have access to the database after the restore operation
    completes. |


    ### Table 12-9: Restore Arguments


    | Argument | Description |

    | --- | --- |

    | `DATABASE`/`LOG` | Specify `DATABASE` to which to restore all or some of the
    files that constitute the database. Specify `LOG` to restore a transaction log
    backup. |

    | `database_name` | Specifies the name of the target database that will be restored.
    |

    | `file_or_filegroup_or_pages` | Specifies a comma-separated list of the files,
    filegroups, or pages to be restored. If restoring pages, use the format `PAGE
    = FileID:PageID`. In `SIMPLE` recovery model, files and filegroups can only be
    specified if they are read-only or if you are performing a partial restore using
    `WITH PARTIAL`. |

    | `READ_WRITE_FILEGROUPS` | Restores all read/write filegroups but no read-only
    filegroups. |

    | `FROM` | A comma-separated list of backup devices that contains the backup set
    to restore or the name of the database snapshot from which you wish to restore.
    Database snapshots are discussed in Chapter 16. |


    - Restore arguments (described in Table 12-9)

    - `WITH` options (described in Table 12-10)

    - Backup set options (described in Table 12-11)

    - Media set options (described in Table 12-12)

    - Error management options (described in Table 12-13)

    - Miscellaneous options (described in Table 12-14)'
