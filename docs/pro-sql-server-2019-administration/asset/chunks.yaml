  trans: '

    ### 手动安装 SQL Server


    在 Windows 上安装 SQL Server 时，你可以在安装前指定实例的配置方式。在 Linux 上则相反，你首先安装一个基础版本的 SQL Server，然后在部署后配置实例。在本节中，我们将回顾在
    Linux 平台上手动安装 SQL Server 的过程。本次演示将使用 Ubuntu 16.4。


    #### 导入公共 GPG 密钥


    安装 SQL Server 的第一步是导入公共 gpg 密钥，这将使我们能够访问 SQL Server 软件仓库（repository）。这可以通过清单 4-1
    中的 `bash` 命令来实现。


    ```

    wget -qO- https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add
    –

    清单 4-1

    导入公共 GPG 密钥

    ```


    如果我们分解这个命令，我们是使用 `wget` 命令从 Microsoft 网站拉取密钥。`wget` 是一个用于获取网页内容的命令。然后我们使用 `|`
    操作符将密钥传递给 `apt-key` 命令，这是一个密钥管理工具。`add` 命令将密钥添加到受信任密钥列表中。一旦 SQL Server 软件包使用受信任密钥进行验证，该软件包就会变为受信任状态。使用
    `sudo` 类似于 Windows 平台上的“以管理员身份运行”原则。它用于将用户权限提升至 `root` 级别（相当于 Windows 的管理员）。


    #### 注册 SQL Server 软件仓库


    下一步是注册 SQL Server 软件仓库。这可以使用清单 4-2 中的 `bash` 命令完成。该命令使用 `add-apt-repository` 脚本来添加一个外部仓库。其中嵌入的
    `wget` 命令从 Microsoft 网站拉取软件包列表。


    ```

    sudo add-apt-repository "$(wget -qO- https://packages.microsoft.com/config/ubuntu/16.04/mssql-server-2019.list)"

    清单 4-2

    注册 SQL Server 软件仓库

    ```


    #### 更新软件包列表


    接下来，我们将使用 `apt-get`（Linux 的软件包管理器）从软件仓库拉取软件包列表，并用软件包的最新版本更新这些列表。清单 4-3 演示了这一点。


    ```

    sudo apt-get update

    清单 4-3

    更新软件仓库的软件包列表

    ```


    #### 安装 SQL Server 软件包


    在清单 4-4 中，我们将再次使用 `apt-get`，这次配合 `install` 命令来安装 SQL Server 软件包。`-y` 开关用于自动接受用户提示。


    ```

    sudo apt-get install -y mssql-server

    清单 4-4

    安装 SQL Server 软件包

    ```


    #### 配置实例


    软件包安装完成后，输出将提示你运行 `sudo /opt/mssql/bin/mssql-conf setup`，这是 SQL Server 配置工具，允许你配置实例。运行
    `mssql-conf setup` 工具后，系统将提示你选择希望使用的 SQL Server 版本，如图 4-1 所示。使用数字 1 到 8 进行选择。


    ![../images/333037_2_En_4_Chapter/333037_2_En_4_Fig1_HTML.jpg](img/333037_2_En_4_Fig1_HTML.jpg)

    图 4-1. 选择版本


    接下来，系统会要求你接受 SQL Server 许可条款，如图 4-2 所示。键入 `Yes` 即可接受。


    ![../images/333037_2_En_4_Chapter/333037_2_En_4_Fig2_HTML.jpg](img/333037_2_En_4_Fig2_HTML.jpg)

    图 4-2. 接受许可条款


    如图 4-3 所示，接下来你需要使用数字 1 到 11 选择你的语言。


    ![../images/333037_2_En_4_Chapter/333037_2_En_4_Fig3_HTML.jpg](img/333037_2_En_4_Fig3_HTML.jpg)

    图 4-3. 语言选择


    **提示**：在图 4-3 中未正确显示的语言是多字符语言，例如中文。


    现在，系统将提示你输入并确认 `sa` 账户的密码，如图 4-4 所示。


    ![../images/333037_2_En_4_Chapter/333037_2_En_4_Fig4_HTML.jpg](img/333037_2_En_4_Fig4_HTML.jpg)

    图 4-4. 添加 `sa` 密码


    #### 连接到实例


    你的实例现已配置完成，你可以通过 `sqlcmd`（作为 SQL Server 工具包的一部分安装在 Linux 服务器上——在本章的“无人参与安装”部分讨论）连接，或者使用
    SSMS（SQL Server Management Studio）远程连接。

    '
- fmt: '## Configuring SQL Server


    Although SQL Server is now installed and basic configuration has been performed,
    there are many configuration aspects that may need to be addressed, at both the
    operating system and instance levels, to make the instance fully functional for
    your requirements. In this section, we will explore some of the common configuration
    requirements that may need to be performed in a Linux environment.


    The main tool for configuring the SQL Server instance is `mssql-conf`, the same
    tool that we used during the installation process, to configure the edition and
    language as well as to set the password for the `sa` account. This tool also offers
    many other parameters that can be configured, and these parameters are detailed
    in Table [4-2](#333037_2_En_4_Chapter.xhtml#Tab2).


    Table 4-2 `mssql-conf` Parameters


    | Parameter | Description |

    | --- | --- |

    | Agent | Enables or disables SQL Server Agent |

    | Collation | Sets the instance collation |

    | Customer feedback | Specifies if customer feedback is sent to Microsoft. This
    is on by default and cannot be turned off for free editions |

    | Database Mail profile | Sets the Database Mail profile that is used for e-mail
    alerts |

    | Default data directory | Sets the default directory for user database files
    |

    | Default log directory | Sets the default directory for user database’s transaction
    log files |

    | Default Master database directory | Sets the directory for Master database data
    and log files |

    | Default Master database file name | Changes the name of the database files for
    the Master database |

    | Default dump directory | Sets the directory to be used for memory dump files
    |

    | Default error log directory | Sets the directory to be used for new SQL Server
    error log, Default Profiler Trace, System Health Session XE, and Hekaton Session
    XE files |

    | Default backup directory | Sets the directory to be used for new backups |

    | Dump type | Specifies the type of memory dump file to capture. Allows full dumps
    to be captured in addition to mini dumps. Also allows you to specify the type
    of dump file (mini, miniplus, filtered, and full) |

    | High availability | Enables or disables AlwaysOn Availability Groups |

    | Local Audit directory | Sets the directory to be used for Local Audit files
    |

    | Locale | Sets the locale for the SQL Server instance |

    | Memory limit | Sets the amount of physical memory available to the SQL Server
    instance |

    | TCP port | Sets the port, on which SQL Server will listen for connections |

    | TLS | Used to configure various networking aspects of the SQL Server instance,
    including `forceencryption`, `tlscert`, `tlskey`, `tlsprotocols`, `tlsciphers`,
    and the `kerberoskeytabfile` |

    | Traceflags | Sets global trace flags on the instance |


    Probably the most common configuration requirement is to start SQL Server Agent.
    This can be achieved using the `Agent` parameter, as shown in Listing [4-5](#333037_2_En_4_Chapter.xhtml#PC5).


    ```

    sudo /opt/mssql/bin/mssql-conf set sqlagent.enabled true

    Listing 4-5

    Start Server Agent

    ```


    Another good example of how to use the tool is the `TCP port` parameter. Just
    as in a Windows environment, TCP 1433 is used as the default port number for SQL
    Server. There are reasons why you would want to change this, however, such as
    in high security environments, to avoid a well-known port number that can be attacked.


    The command in Listing [4-6](#333037_2_En_4_Chapter.xhtml#PC6) will configure
    the SQL Server instance to listen on Port 50001. 50001-500xx is a port range I
    often use, as it is not reserved.


    ```

    sudo /opt/mssql/bin/mssql-conf set network.tcpport 50001

    Listing 4-6

    Configure the Port

    ```


    For the setting to take effect, we will first need to restart the SQL Server service.
    This can be achieved using the `systemctl`, which is a Linux tool for managing
    services. The command in Listing [4-7](#333037_2_En_4_Chapter.xhtml#PC7) will
    restart the SQL Server service.


    ```

    sudo systemctl restart mssql-server

    Listing 4-7

    Restart the SQL Server Service

    ```


    The `systemctl` tool can also be used to check if a service is running, as demonstrated
    in Listing [4-8](#333037_2_En_4_Chapter.xhtml#PC8).


    ```

    sudo systemctl status mssql-server

    Listing 4-8

    Check a Service Is Running

    ```


    Now that we have configured SQL Server to listen on Port 50001, we also need to
    configure the local Firewall, to allow traffic through this port. The local Firewall
    is managed using a tool called `ufw` (Uncomplicated Firewall). The script in Listing
    [4-9](#333037_2_En_4_Chapter.xhtml#PC9) illustrates how to install `ufw`, set
    default rules, allow traffic through port 50001, and then reset it, for the rules
    to take effect. Finally, the script will display the configured rules.


    ```

    #Install ufw

    sudo apt-get install ufw

    #Start ufw

    sudo systemctl start ufw

    #Enable ufw

    sudo systemctl enable ufw

    #Set default Firewall Rules

    sudo ufw default allow outgoing

    sudo ufw default deny incoming

    #Add A Rule For SQL

    sudo ufw allow 50001/tcp

    #Restart ufw

    sudo ufw reload

    #Show ufw Status

    sudo ufw status

    Listing 4-9

    Working with ufw

    ```


    ### Note


    In SQL Server 2019, `TempDB` will automatically be configured with one data file
    per core, to a maximum of eight files. For previous versions, however, only a
    single data file will be created during setup.


    ## Unattended Installation


    Because Bash is a scripting language, the SQL Server installation can be scripted,
    in the same way that you can use PowerShell to script installation in a Windows
    environment. To do this, we will first create a text file, with the text editor,
    `vi`. The command in Listing [4-10](#333037_2_En_4_Chapter.xhtml#PC10) will create
    and open a file called `sqlconfig.sh`. `.sh` is a commonly used extension for
    bash scripts.


    ```

    vi sqlconfig.sh

    Listing 4-10

    Create a Bash Script with Vi

    ```


    A full discussion of `vi` commands is beyond the scope of this book. To insert
    text, however, use the `i` command. When finished, use `ESC` to return to command
    mode. Here, `:q!` will exit `vi` without saving, or `:wq` will save and exit.


    The script in Listing [4-11](#333037_2_En_4_Chapter.xhtml#PC11) can be added to
    the bash script. The first line of the file indicates that it is executable. You
    will also notice that we are installing full-text indexing for this instance and
    configuring both a trace flag and a maximum memory limit for SQL Server.


    Possibly the most interesting thing to note, however, is that we are also installing
    a package called `mssql-tools`. This package contains the command-line tools for
    SQL Server on Linux, including `sqlcmd`. We will use this to create a new user
    and add them to the `sysadmins` fixed server role, at the end of the script.'
