    ## Introduction


    *Pro SQL Server 2019 Administration* is a book designed for DBAs who manage on-premise
    SQL Server estates. The book starts by covering the installation of SQL Server
    in both Windows and Linux environments. It also examines how to install and configure
    SQL Server in containers, which I believe to be the future of hosting many data-tier
    applications.


    The book then moves on to discuss the configuration and maintenance aspects of
    managing SQL Server. This includes optimizing tables, creating indexes, and running
    data consistency checks. These are the core elements that every DBA should be
    familiar with.


    Next, we will look at ensuring the security and resilience of SQL Server. This
    is an important topic, and we will dive into areas such as the SQL Server security
    model and encryption. We will then look at how to provide high availability and
    disaster recovery for your databases. This includes everything from taking backups
    (and restoring them) through to implementing complex AlwaysOn topologies.


    Finally, this book will guide you through many of the performance troubleshooting
    and maintenance tasks that DBAs should understand. This ranges from understanding
    locking and performing traces with Extended Events through to utilizing some really
    great SQL Server features, such as the Query Store, Distributed Replay, and Policy-Based
    Management (PBM). We will also explore how to use metadata to automate maintenance
    routines and schedule these with SQL Server Agent.


    When running code samples in this book, you should change the “personalized” aspect
    of the code, such as folder structures and file names, to match your own configuration.


    ## Acknowledgments


    I want to extend my gratitude to Chris Dent, a leading automation expert, specializing
    in PowerShell. He assisted me with enhancing the quality of PowerShell code used
    in some chapters of this book.


    ## About the Author and About the Technical Reviewer


    ## About the Author


    ## About the Technical Reviewer


    # Part I Installation and Configuration


    ## 1. Planning the Deployment


    Planning a deployment of SQL Server 2019, in order to best support the business’s
    needs, can be a complicated task. You should make sure to consider many areas,
    including edition, licensing requirements, on-premises vs. cloud hosting, hardware
    considerations, software configuration, and even if Windows is the best platform.
    For example, if your new instance will be supporting a PHP web app, hosted on
    Linux, then maybe your instance should also be hosted on Linux? And all of this
    is before you even start to consider which features of SQL Server you may need
    to install to support the application.


    This chapter will guide you through the key decisions that you should make when
    you are planning your deployment. You will also learn how to perform some essential
    operating system configurations, should you decide to host your instance on Windows
    Server. This chapter will also give you an overview of the top-level features
    that you can choose to install and discuss why selecting the appropriate features
    is important.'
