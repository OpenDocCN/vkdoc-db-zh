    a reusable script. Similarly, the script could be added to the automatic installation
    script that we created in Chapter [3](#333037_2_En_3_Chapter.xhtml).


    The PowerShell script works by determining the Registry path to the startup parameters
    and then by counting the number of arguments that already exist. Counting the
    arguments allows the next argument number in sequence to be determined. It then
    adds the new argument, specifying the required trace flag.


    ```

    # Define initial variables

    $InstanceName = "PROSQLADMINCORE"

    $TraceFlag = "809"

    # Configure full service name to be inserted into Registry path

    $Instance = "MSSQL12.$InstanceName"

    #Create full registry path

    $RegistryPath = "HKLM:\SOFTWARE\Microsoft\Microsoft SQL Server\MSSQL12.$InstanceName\MSSQLServer\Parameters"

    # Gather all properties from the Registry path

    $Properties = Get-ItemProperty $RegistryPath

    # Count the number of SQLArg properties that already exist so that the next number
    in sequence can be determined

    $Arguments = $Properties.psobject.properties | ?{$_.Name -like ''SQLArg*''} |
    select Name, Value

    # Create the name of the new argument based on the next argument number in sequence

    $NewArgument = "SQLArg"+($Arguments.Count)

    # Construct the complete value of the argument

    $FullTraceFlag = "-T$TraceFlag"

    # Set the trace flag

    Set-ItemProperty -Path $RegistryPath -Name $NewArgument -Value $FullTraceFlag

    Listing 5-8

    Configuring Trace Flags on Windows Server Core

    ```


    Many trace flags can be specified as startup parameters, and the vast majority
    of them are only helpful in very specific circumstances. There are a few that
    stand out, however, as having the potential for more widespread use. These trace
    flags are detailed in the following sections.


    ### Note


    Two often configured trace flags, in older versions of SQL Server, were T1117
    and T1118, which, respectively, caused all files with a filegroup to grow at the
    same rate and caused all extents (even for small tables) to be uniform. These
    features are now documented, database-level options, however. Therefore T1117
    and T1118 have no effect and should not be used.


    #### Trace Flag 3042


    When you are performing backups using backup compression in SQL Server, a preallocation
    algorithm is used to allocate a defined percentage of the database size to the
    backup file. This gives you a performance advantage over growing the size of the
    backup file, as required, on the fly. On the flip side, however, if you need to
    preserve disk space on your backup volume and use only the minimum amount of space
    required, then you can use trace flag 3042 to turn off this behavior and grow
    the file as required.


    #### Trace Flag 3226


    By default, every time you take a backup, a message will be recorded in the SQL
    Server log. If you take frequent log backups, however, then this can very quickly
    cause so much “noise” in the log that troubleshooting issues can become more difficult
    and time-consuming. If this is the case, then you can turn on trace flag 3226\.
    This will cause successful backup messages to be suppressed in the log, resulting
    in a smaller, more manageable log. Another method of avoiding noise would be to
    create a script, which uses the `sys.xp_readerrorlog` system stored procedure
    to read the log. You can write the results to a table and filter them, for “interesting”
    events.


    #### Trace Flag 3625


    SQL Server enforces tight controls on the visibility of metadata. Users can only
    view metadata for objects they own or where they have explicitly been granted
    permissions to view metadata. This method of protection is still fallible, however,
    and a skilled attacker could still gain information. One way in which they could
    achieve this is by manipulating the order of precedence in queries in order to
    produce error messages.


    In order to mitigate this risk, you can set trace flag 3625\. This trace flag
    will limit the amount of metadata visible in error messages by masking certain
    data with asterisks. The downside of this defensive tactic, however, is that error
    messages become less meaningful and harder to understand. This can make troubleshooting
    issues more difficult.'
  trans: '

    ### 跟踪标志


    跟踪标志是 SQL Server 中的开关，可用于开启或关闭特定功能。在实例范围内，它们可以在会话级别进行设置，也可以通过名为 `DBCC TRACEON`
    的 DBCC 命令全局应用于实例。并非所有跟踪标志都能在会话级别设置，这取决于其性质。跟踪标志 634 就是一个例子。设置此标志会关闭负责定期压缩列存储索引中行组的后台线程。显然，这并不适用于特定的会话。代码清单
    5-7 使用 `DBCC TRACEON` 全局设置跟踪标志 634。它还仅为当前会话开启了 1211。跟踪标志 1211 会基于内存压力或锁的数量禁用锁升级。然后，脚本使用
    `DBCC TRACESTATUS` 显示标志的状态，最后使用 `DBCC TRACEOFF` 将行为切换回默认值。可以看到，要指定全局作用域，我们使用参数
    `-1`。默认是在会话级别设置标志。


    ```

    DBCC TRACEON(634, -1)

    DBCC TRACEON(1211)

    DBCC TRACESTATUS

    DBCC TRACEOFF(634, -1)

    DBCC TRACEOFF(1211)

    Listing 5-7

    使用 DBCC TRACEON 设置跟踪标志

    ```


    ### 注意


    此处使用跟踪标志 1211 仅为演示 `DBCC TRACEON` 的目的。然而，它可能导致过多的锁，应极其谨慎地使用。它甚至可能因为分配锁的内存不足而导致
    SQL Server 抛出错误。


    图 5-5 显示了运行此脚本后产生的结果屏幕，假设当前没有其他跟踪标志偏离其默认设置。`DBCC TRACEON` 和 `DBCC TRACEOFF` 命令没有结果显示。但是，消息窗口将显示执行完成消息或通知您任何错误。


    ![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig5_HTML.jpg](img/333037_2_En_5_Fig5_HTML.jpg)


    图 5-5：`DBCC TRACESTATUS` 结果


    即使使用全局作用域，使用 `DBCC TRACEON` 的局限性在于设置是临时的，实例重启后不会持久化。因此，如果您希望对实例进行永久性的配置更改，则必须在
    SQL Server 服务上使用 `-T` 启动参数。


    启动参数可以在 SQL Server 配置管理器中配置。展开左侧窗口中的“服务”将显示服务器上所有与 SQL Server 相关的服务列表。进入数据库引擎服务的属性并选择“启动参数”选项卡，即可添加或删除启动参数。图
    5-6 说明了如何设置跟踪标志 809。（请参考本章的“混合缓冲池”部分以了解此跟踪标志的作用。）


    ![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig6_HTML.jpg](img/333037_2_En_5_Fig6_HTML.jpg)


    图 5-6：启动参数


    如果您的实例运行在 Windows Server Core 上，或者您想在基于 GUI 的服务器上编写配置脚本，那么可以通过运行代码清单 5-8 中的 PowerShell
    脚本来实现相同的结果。此脚本允许您在顶部的两个变量中指定要配置的实例名称和跟踪标志。如果您希望创建可重用的脚本，这些也可以参数化。同样，该脚本可以添加到我们在第
    3 章创建的自动安装脚本中。


    PowerShell 脚本通过确定启动参数的注册表路径，然后计算已有的参数数量来工作。计算参数数量可以确定序列中的下一个参数编号。然后，它添加新参数，并指定所需的跟踪标志。


    ```

    # 定义初始变量

    $InstanceName = "PROSQLADMINCORE"

    $TraceFlag = "809"

    # 配置要插入到注册表路径中的完整服务名称

    $Instance = "MSSQL12.$InstanceName"

    # 创建完整的注册表路径

    $RegistryPath = "HKLM:\SOFTWARE\Microsoft\Microsoft SQL Server\MSSQL12.$InstanceName\MSSQLServer\Parameters"

    # 从注册表路径收集所有属性

    $Properties = Get-ItemProperty $RegistryPath

    # 计算已存在的 SQLArg 属性的数量，以便确定序列中的下一个编号

    $Arguments = $Properties.psobject.properties | ?{$_.Name -like ''SQLArg*''} |
    select Name, Value

    # 根据序列中的下一个参数编号创建新参数的名称

    $NewArgument = "SQLArg"+($Arguments.Count)

    # 构造参数的完整值

    $FullTraceFlag = "-T$TraceFlag"

    # 设置跟踪标志

    Set-ItemProperty -Path $RegistryPath -Name $NewArgument -Value $FullTraceFlag

    Listing 5-8

    在 Windows Server Core 上配置跟踪标志

    ```


    许多跟踪标志可以指定为启动参数，其中绝大多数仅在非常特定的情况下才有帮助。然而，有少数几个脱颖而出，具有更广泛使用的潜力。这些跟踪标志将在以下部分详细说明。


    ### 注意


    在旧版本的 SQL Server 中，经常配置的两个跟踪标志是 T1117 和 T1118，它们分别导致文件组中的所有文件以相同速率增长，以及导致所有区（即使是小表的区）都是统一区。然而，这些功能现在已成为有文档记录的、数据库级别的选项。因此，T1117
    和 T1118 不再有效，不应使用。


    #### 跟踪标志 3042


    当您在 SQL Server 中使用备份压缩执行备份时，会使用一种预分配算法为备份文件分配数据库大小的一定百分比。与动态按需增长备份文件大小相比，这为您提供了性能优势。但另一方面，如果您需要在备份卷上保留磁盘空间，仅使用所需的最小空间量，那么您可以使用跟踪标志
    3042 来关闭此行为，并按需增长文件。


    #### 跟踪标志 3226


    默认情况下，每次执行备份时，SQL Server 日志中都会记录一条消息。但是，如果您执行频繁的日志备份，这很快就会在日志中产生大量“噪音”，使得故障排除问题变得更加困难和耗时。如果是这种情况，那么您可以开启跟踪标志
    3226。这将导致成功的备份消息在日志中被抑制，从而产生更小、更易于管理的日志。另一种避免噪音的方法是创建一个使用 `sys.xp_readerrorlog`
    系统存储过程读取日志的脚本。您可以将结果写入表并过滤出“感兴趣的”事件。


    #### 跟踪标志 3625


    SQL Server 对元数据的可见性实施严格控制。用户只能查看他们拥有的对象或已明确授予查看元数据权限的对象的元数据。然而，这种保护方法仍然有缺陷，熟练的攻击者仍然可以获取信息。他们实现这一点的一种方式是通过操纵查询中的优先级顺序以产生错误消息。


    为了减轻这种风险，您可以设置跟踪标志 3625。此跟踪标志将通过用星号屏蔽某些数据来限制错误消息中可见的元数据量。然而，这种防御策略的缺点是错误消息变得不那么有意义且更难理解。这可能会使故障排除问题变得更加困难。

    '
- fmt: '# Ports and Firewalls


    在现代企业网络拓扑中，你的 SQL Server 实例很可能需要通过至少两个防火墙进行通信。其中一个将是硬件防火墙，另一个将是 Windows 防火墙，也称为本地防火墙。为了让你的实例能够与其他接口（无论是网络上的应用程序还是其他实例）通信，同时保持防火墙提供的安全性，就需要开放端口，以便
    SQL Server 可以通过这些端口进行通信。


    ## Process of Communication


    为了理解需要开放哪些端口来允许 SQL Server 流量，你首先必须理解客户端如何与 SQL Server 通信。图 [5-7](#333037_2_En_5_Chapter.xhtml#Fig7)
    展示了 TCP/IP 连接的过程流。此示例假设实例正在监听端口 `1433`——这将在本章后面详细讨论。它还假设客户端运行在 Windows Vista/Windows
    Server 2008 或更高版本上。


    ![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig7_HTML.jpg](images/333037_2_En_5_Chapter/333037_2_En_5_Fig7_HTML.jpg)


    图 5-7 通信过程流


    如果你希望客户端通过命名管道而非 TCP/IP 访问实例，那么 SQL Server 将通过端口 `445` 进行通信。这与文件和打印机共享使用的端口相同。


    ## Ports Required by SQL Server


    如果你安装的是 SQL Server 的默认实例，那么安装程序将自动分配端口 `1433`，这是 IANA（互联网号码分配机构）为 SQL Server 注册的端口。然而，许多
    DBA 出于增强安全性的考虑，会选择更改此端口号。攻击者会知道你很可能在端口 `1433` 上运行实例，因此知道要攻击哪个端口。在较小的环境中，除非你对网络的安全性有信心，否则使用非标准端口号可能是增加一层混淆的好主意。然而，在大型企业中，你需要考虑对运营可支持性的影响。例如，如果每个实例都有不同的端口号，你将需要一种记录并能在浏览器服务故障时快速获取给定实例端口号的方法。在允许多个命名实例共存于每台服务器的环境中，这将不那么令人担忧，因为你已经拥有了用于记录这些端口号的清单工具。


    ## Note


    IANA，即互联网号码分配机构，负责协调互联网协议资源的分配，如 IP 地址、域名、协议参数和网络服务的端口号。其网站是 `www.internetassignednumbersauthority.org/`。


    如果你安装的是 SQL Server 的命名实例，那么安装程序将配置该实例使用动态端口。当配置了动态端口时，每次实例启动时，它都会向操作系统请求一个端口号。操作系统随后会从动态范围中分配一个随机的可用端口，假设你运行的是
    Windows Server 2008 或更高版本，该范围是 `49152` 到 `65535`。在早期版本的 Windows 中，动态端口范围是 `1024`
    到 `5000`，但微软在 Windows Vista 和 Windows Server 2008 中更改了此范围以符合 IANA 规定。


    如果你的实例配置为使用动态端口，那么配置防火墙可能具有挑战性。在 Windows 防火墙级别，可以将特定服务配置为在任何端口上通信，但这在硬件防火墙级别可能难以复制。或者，你需要双向保持整个动态端口范围开放。因此，我建议将实例配置为使用特定端口。


    重要的是要记住，SQL Server 为各种功能使用许多其他端口。数据库引擎可能需要的完整端口集列在表 [5-5](#333037_2_En_5_Chapter.xhtml#Tab5)
    中。如果你安装了数据库引擎之外的功能，如 SSAS 或 SSRS，则将需要额外的端口。如果你计划在实例中使用其他服务，如用于加密的 IPSec、用于分布式事务的
    `MSDTC`（Microsoft 分布式事务协调器）或用于监控的 `SCOM`（System Center Operations Manager），也将有额外的要求。


    ## Table 5-5: Ports Required by the Database Engine


    | Feature | Port |

    | --- | --- |

    | Browser Service | `UDP 1433`. |

    | Instance over TCP/IP | `TCP 1433`, dynamic or static configured. |

    | Instance over named pipes | `TCP 445`. |

    | DAC (Dedicated Administrator Connection) | `TCP 1434`. If `TCP 1434` is already
    in use, the port will be printed to the SQL Server log during instance startup.
    |

    | Service Broker | `TCP 4022` or as per configuration. |

    | AlwaysOn Availability Groups | `TCP 5022` or as per configuration. |

    | Merge Replication with Web Sync | `TCP 21`, `TCP 80`, `UDP 137`, `UDP 138`,
    `TCP 139`, `TCP 445`. |

    | T-SQL Debugger | `TCP 135`. |


    ## Configuring the Port That the Instance Will Listen On


    如本章前面所述，如果你有一个命名实例，那么在配置防火墙之前，你可能希望为该实例配置一个静态端口。该端口可以在 SQL Server 配置管理器中 TCP/IP
    协议的“TCP/IP 属性”对话框内配置。要导航到此对话框，请在 SQL Server 配置管理器的左侧窗格中展开 `SQL Server Network
    Configuration` ➤ `Protocols for *INSTANCENAME*`（其中 `*INSTANCENAME*` 是你的实例名称）。在右侧窗格中双击
    `TCP/IP` 将显示该对话框。


    在“协议”选项卡上，你会注意到一个名为 `Listen All` 的设置，其默认值为“是”，如图 [5-8](#333037_2_En_5_Chapter.xhtml#Fig8)
    所示。此设置的意义稍后会变得清晰。


    ![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig8_HTML.jpg](images/333037_2_En_5_Chapter/333037_2_En_5_Fig8_HTML.jpg)


    图 5-8 “协议”选项卡


    在“IP 地址”选项卡上，你会注意到有多个 IP 地址的配置详细信息。但是，由于 `Listen All` 设置为“是”，SQL Server 将忽略所有这些配置。相反，它将只查看对话框最底部为
    `IP All` 指定的设置。`TCP Dynamic Ports` 字段将显示操作系统分配的随机端口，而 `TCP Port` 字段将为空，如图 [5-9](#333037_2_En_5_Chapter.xhtml#Fig9)
    所示。要分配静态端口号，我们需要反转此设置。我们需要清空 `TCP Dynamic Ports` 字段，并在 `TCP Port` 字段中填入我们选择的端口号
    `1433`。SQL Server 服务需要重启后此更改才能生效。


    ![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig9_HTML.jpg](images/333037_2_En_5_Chapter/333037_2_En_5_Fig9_HTML.jpg)


    图 5-9 “IP 地址”选项卡'
  raw: '## Ports and Firewalls


    In modern enterprise topologies, it is likely that your SQL Server instance will
    need to communicate through at least two firewalls. One of these will be a hardware
    firewall and the other will be the Windows Firewall, also known as the local firewall.
    In order for your instance to communicate with other interfaces—whether those
    are applications or other instances on the network—while still maintaining the
    security provided by a firewall, ports will need to be opened so that SQL Server
    can communicate through those ports.


    ### Process of Communication


    In order to understand which ports will need to be opened to allow SQL Server
    traffic, you must first understand how clients communicate with SQL Server. Figure
    [5-7](#333037_2_En_5_Chapter.xhtml#Fig7) illustrates the process flow for TCP/IP
    connections. This example assumes that the instance is listening on Port 1433—this
    will be discussed in more detail later in this chapter. It also assumes that the
    client is running on Windows Vista/Windows Server 2008 or higher.


    ![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig7_HTML.jpg](images/333037_2_En_5_Chapter/333037_2_En_5_Fig7_HTML.jpg)


    Figure 5-7


    Communication process flow


    If you wish clients to access the instance via named pipes, as opposed to TCP/IP,
    then SQL Server will communicate over port 445\. This is the same port used by
    file and printer sharing.


    ### Ports Required by SQL Server


    If you install a default instance of SQL Server, then setup will automatically
    assign port 1433, which is the port registered for SQL Server in IANA (Internet
    Assigned Numbers Authority). Many DBAs choose to change this port number, however,
    for enhanced security. An attacker will know that you are likely to have instances
    running on port 1433 and will therefore know which port to attack. In smaller
    estates, unless you are confident of the security of your network, using nonstandard
    port numbers may be a good idea to add an extra layer of obfuscation. In larger
    enterprises, however, you will need to consider the impact on operational supportability.
    For example, if each instance has a different port number, you will need a method
    of recording and very quickly obtaining the port number for a given instance in
    case of failure of the browser service. This will be less of a concern in environments
    where multiple named instances are permitted on each server, since you will already
    have the inventory tooling for recording these port numbers.


    ### Note


    IANA, the Internet Assigned Numbers Authority, is responsible for coordinating
    the allocation of Internet Protocol resources, such as IP addresses, domain names,
    protocol parameters, and port numbers of network services. Its web site is [`www.internetassignednumbersauthority.org/`](http://www.internetassignednumbersauthority.org/)
    .


    If you install a named instance of SQL Server, then setup will configure the instance
    to use dynamic ports. When dynamic ports are configured, then every time the instance
    starts, it will request a port number from the operating system. The OS will then
    assign it a random available port from the dynamic range, which is from 49152
    to 65535, assuming that you are running on Windows Server 2008 or above. In earlier
    versions of Windows, the dynamic port range was from 1024 to 5000, but Microsoft
    changed this in Windows Vista and Windows Server 2008 to comply with IANA.


    If your instance is configured to use dynamic ports, then configuring firewalls
    can be challenging. At the Windows Firewall level, it is possible to configure
    a specific service to communicate on any port, but this can be hard to replicate
    at the hardware firewall level. Alternatively, you need to keep the full dynamic
    port range open bidirectionally. Therefore, I recommend that the instance is configured
    to use a specific port.


    It is important to remember that SQL Server uses many other ports for various
    features. The full set of ports that may be required by the Database Engine is
    listed in Table [5-5](#333037_2_En_5_Chapter.xhtml#Tab5). If you install features
    outside of the Database Engine, such as SSAS or SSRS, then additional ports will
    be required. There will also be additional requirements if you plan to use additional
    services with your instance, such as IPSec for encryption, MSDTC (Microsoft Distributed
    Transaction Coordinator) for distributed transactions, or SCOM (System Center
    Operations Manager) for monitoring.


    Table 5-5


    Ports Required by the Database Engine


    | Feature | Port |

    | --- | --- |

    | Browser Service | UDP 1433. |

    | Instance over TCP/IP | TCP 1433, dynamic or static configured. |

    | Instance over named pipes | TCP 445. |

    | DAC (Dedicated Administrator Connection) | TCP 1434. If TCP 1434 is already
    in use, the port will be printed to the SQL Server log during instance startup.
    |

    | Service Broker | TCP 4022 or as per configuration. |

    | AlwaysOn Availability Groups | TCP 5022 or as per configuration. |

    | Merge Replication with Web Sync | TCP 21, TCP 80, UDP 137, UDP 138, TCP 139,
    TCP 445. |

    | T-SQL Debugger | TCP 135. |


    ### Configuring the Port That the Instance Will Listen On


    As mentioned earlier in this chapter, if you have a named instance, then before
    configuring your firewall, it is likely that you will want to configure a static
    port for the instance. The port can be configured within the TCP/IP Properties
    dialog box of the TCP/IP protocol in SQL Server Configuration Manager. To navigate
    to this dialog box, drill down through SQL Server Network Configuration ➤ Protocols
    for *INSTANCENAME* (where *INSTANCENAME* is the name of your instance) in the
    left hand pane of SQL Server Configuration Manager. Entering TCP/IP in the right
    hand pane will display the dialog box.


    On the Protocol tab, you will notice a setting named *Listen All*, which has a
    default value of Yes, as shown in Figure [5-8](#333037_2_En_5_Chapter.xhtml#Fig8).
    The significance of this setting will become apparent shortly.


    ![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig8_HTML.jpg](images/333037_2_En_5_Chapter/333037_2_En_5_Fig8_HTML.jpg)


    Figure 5-8


    The Protocol tab


    In the IP Addresses tab, you will notice that there are configuration details
    for multiple IP addresses. Because the Listen All setting is set to Yes, however,
    SQL Server will ignore all of these configurations. Instead, it will look solely
    at the settings specified for IP All at the very bottom of the dialog box. The
    TCP Dynamic Ports field will display the random port that has been assigned by
    the operating system and the TCP Port field will be blank, as illustrated in Figure
    [5-9](#333037_2_En_5_Chapter.xhtml#Fig9). To assign a static port number, we need
    to flip this around. We will need to clear the TCP Dynamic Ports field and populate
    the TCP Port field with 1433, which is our chosen port number. The SQL Server
    service will need to be restarted before this change can take effect.


    ![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig9_HTML.jpg](images/333037_2_En_5_Chapter/333037_2_En_5_Fig9_HTML.jpg)


    Figure 5-9


    IP Addresses tab'
