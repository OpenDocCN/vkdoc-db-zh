    ## 总结


    扩展事件引入了一些新概念，你必须理解这些概念才能充分发挥其威力。事件是在跟踪中捕获的关注点，而操作则在事件列之外提供额外的信息。谓词允许你筛选事件以提供更有针对性的跟踪，而目标定义了数据的存储方式。会话本身是跟踪对象，可以配置为包含多个事件、操作、谓词和目标。


    你可以通过新建会话向导创建事件会话，这是一种简便快捷的方法，并公开了模板；也可以通过新建会话对话框；当然，还可以通过 T-SQL。通过 T-SQL 创建会话时，你使用
    `CREATE EVENT SESSION` DDL 语句来配置跟踪的所有方面。


    每个扩展事件构件都包含在四个包之一中：`Package0`、`Sqlserver`、`Sqlos` 和 `SecAudit`。然而，`SecAudit` 的内容不会被公开，因为这些内容在内部用于支持
    SQL 审核功能，这在章节 9 中讨论过。


    你可以使用数据查看器查看数据。数据查看器允许你监视会话缓冲区中的实时数据，并且还支持查看来自事件文件、事件计数和直方图目标类型的目标数据。数据查看器提供基本的数据分析功能，包括对数据进行分组和聚合。


    对于更复杂的数据分析，你可以在 T-SQL 中打开目标。要打开事件文件目标，请使用 `sys.fn_xe_file_target_read_file` 结果系统存储过程。然后，你就可以利用
    T-SQL 的强大功能来处理复杂的分析需求。


    你可以通过将会话内的因果关系跟踪开启来关联事件。这会为每个事件添加一个 `GUID` 和一个序列号，以便你识别关系。你还可以轻松地将 SQL 事件与性能监视器数据关联起来，因为扩展事件公开了处理器、逻辑磁盘和系统性能计数器。要将事件与其他操作系统级别的事件关联，事件会话可以使用
    ETW 目标，然后你可以将其与其他数据收集器集合并，以将扩展事件映射到 ETW 架构中其他提供程序的事件。


    # 20. 查询存储


    查询存储是 SQL Server 2016 中引入的一项功能，它捕获查询、其计划和统计信息的历史记录。它使 DBA 能够轻松查看查询使用的计划并排除性能问题。在本章中，我们将讨论如何启用和配置查询存储。我们还将探讨如何使用查询存储来诊断和解决性能问题。


    ## 启用和配置查询存储


    查询存储在数据库级别启用和配置，因此我们要做的第一件事是创建一个名为 `Chapter20` 的数据库。这可以使用清单 20-1 中的脚本来实现。


