  trans: '## 使用 T-SQL 分析数据


    如果你需要对数据进行更复杂的分析，则可以通过 T-SQL 实现。`sys.fn_xe_file_target_read_file` 函数通过读取目标文件并以
    XML 格式返回每个事件的一行使这成为可能。`sys.fn_xe_file_target_read_file` 接受表 19-5 中详述的参数。


    **表 19-5: `sys.fn_xe_file_target_read_file` 参数**


    | 参数 | 描述 |

    | --- | --- |

    | `path` | `.XEL` 文件的文件路径和文件名。可以包含 `*` 通配符以包含回滚文件。 |

    | `mdpath` | 元数据文件的文件路径和名称。对于 SQL Server 2012 及以上版本不是必需的，仅为向后兼容而保留，因此你应始终传递 `NULL`。
    |

    | `initial_file_name` | 路径中要读取的第一个文件。如果此参数不为 `NULL`，则还必须指定 `initial_offset`。 |

    | `initial_offset` | 指定最后读取的偏移量，以便跳过之前的所有事件。如果指定此参数，则还必须指定 `initial_file_name`。
    |


    `sys.fn_xe_file_target_read_file` 过程返回表 19-6 中详述的列。


    **表 19-6: `sys.fn_xe_file_target_read_file` 结果**


    | 列 | 描述 |

    | --- | --- |

    | `module_guid` | 包含包的模块的 GUID |

    | `package_guid` | 包含事件的包的 GUID |

    | `object_name` | 事件的名称 |

    | `event_data` | 事件数据，XML 格式 |

    | `file_name` | 包含事件的 XEL 文件名 |

    | `file_offset` | 文件中包含事件的块的偏移量 |


    由于事件数据以 `XML` 格式返回，我们需要使用 `XQuery` 将节点分解为关系数据。对 `XQuery` 的完整描述超出了本书的范围，但 Microsoft
    在 [`https://msdn.microsoft.com`](https://msdn.microsoft.com) 上提供了 `XQuery` 语言参考。


    清单 19-7 中的脚本在 `Chapter19` 数据库中运行 `UpdateCustomersWithPageSplits` 和 `UpdateCustomersWithoutPageSplits`
    过程，然后使用 `sys.fn_xe_file_target_read_file` 提取事件数据。接着，我们使用 `XQuery` 的 `Value` 方法从
    `XML` 结果中提取关系值。最后，因为我们启用了因果跟踪，我们按关联 `GUID` 对数据进行分组，以查看每个存储过程导致了多少次页面拆分。`UpdateWithoutPageSplits`
    提供了一个对比。


    ### 提示

    运行查询前，请记得更新文件路径以匹配你自己的配置。


    ```

    --运行更新过程

    EXEC UpdateCustomersWithoutPageSplits ;

    GO

    EXEC UpdateCustomerWithPageSplits ;

    GO

    --等待 30 秒，以便 XE 缓冲区刷新到目标

    WAITFOR DELAY ''00:00:30'' ;

    --查询 XE 目标

    SELECT c.procedurename, d.pagesplits

    FROM

    (

    SELECT

    correlationid,

    COUNT(*) -1 PageSplits -- -1 以移除 module_start 事件的计数

    FROM

    (

    SELECT CapturedEvent,

    xml_data.value(''(/event/data[@name="object_name"]/value)[1]'', ''nvarchar(max)'')
    procedurename,  --提取过程名称

    xml_data.value(''(/event/action[@name="attach_activity_id"]/value)[1]'', ''uniqueidentifier'')
    correlationid --提取关联 ID

    FROM

    (

    --查询 fn_xe_file_target_read_file 函数以提取原始 XML

    SELECT

    OBJECT_NAME CapturedEvent,

    CAST(event_data AS XML) xml_data

    FROM

    sys.fn_xe_file_target_read_file(''C:\mssql\pagesplits*.xel'', NULL , NULL, NULL)
    as XE ) a

    ) b

    GROUP BY correlationid

    ) d

    INNER JOIN --自连接，以便计算页面拆分次数

    (

    SELECT CapturedEvent,

    xml_data.value(''(/event/data[@name="object_name"]/value)[1]'', ''nvarchar(max)'')
    procedurename,

    xml_data.value(''(/event/action[@name="attach_activity_id"]/value)[1]'', ''uniqueidentifier'')
    correlationid

    FROM

    (

    SELECT object_name CapturedEvent,

    CAST(event_data AS XML) xml_data

    FROM

    sys.fn_xe_file_target_read_file(''C:\mssql\pagesplits*.xel'', NULL , NULL, NULL)
    as XE ) a

    ) c

    ON c.correlationid = d.correlationid

    AND c.procedurename IS NOT NULL ;

    ```


    ### 提示

    使用 `XQuery` 允许你查询跟踪中捕获的每个事件字段和操作，因此你可以创建非常复杂的查询，为你实例中的活动提供丰富而强大的分析。


    ## 将扩展事件与操作系统数据关联起来


    扩展事件提供了与操作系统级数据集成的功能。这提供了有用的见解，例如 CPU 飙升时正在运行的查询等等。以下部分讨论如何将 SQL Server 事件与 `Perfmon`
    数据和其他操作系统级事件关联起来。


    ### 将事件与 Perfmon 数据关联


    在引入扩展事件之前，DBA 使用一个名为 SQL Trace 及其 GUI 工具 Profiler 来捕获来自 SQL Server 的跟踪；可以将此数据与来自
    `Perfmon` 的数据关联起来。使用扩展事件时，你通常不需要进行这种关联，因为扩展事件包含了处理器、逻辑磁盘和系统性能对象（例如上下文切换和文件写入）的
    `Perfmon` 计数器。因此，通过将这些对象添加到会话中并遵循上一节讨论的 T-SQL 分析技术，你可以将 SQL Server 事件与操作系统计数器关联起来。'
- fmt: '### Tip


    > `Perfmon counters` are in the `Analytic channel` but have no category.


    The script in Listing 19-8 demonstrates creating an event session that captures
    statements executed within the instance, alongside processor counters. Processor
    counters are captured every 15 seconds for each processor in the system. The results
    are saved to an `event file target` and an `ETW target`.


    ```sql

    CREATE EVENT SESSION Statements_with_Perf_Counters

    ON SERVER

    --Add the Events and Actions relating to each Event

    ADD EVENT sqlserver.error_reported(

    ACTION(sqlserver.client_app_name,sqlserver.database_id,sqlserver.query_hash,sqlserver.session_id)

    WHERE ([package0].[greater_than_uint64]([sqlserver].[database_id],(4)) AND

    [package0].[equal_boolean]([sqlserver].[is_system],(0)))),

    ADD EVENT sqlserver.module_end(SET collect_statement=(1)

    ACTION(sqlserver.client_app_name,sqlserver.database_id,sqlserver.query_hash,sqlserver.session_id)

    WHERE ([package0].[greater_than_uint64]([sqlserver].[database_id],(4)) AND

    [package0].[equal_boolean]([sqlserver].[is_system],(0)))),

    ADD EVENT sqlserver.perfobject_processor,

    ADD EVENT sqlserver.rpc_completed(

    ACTION(sqlserver.client_app_name,sqlserver.database_id,sqlserver.query_hash,sqlserver.session_id)

    WHERE ([package0].[greater_than_uint64]([sqlserver].[database_id],(4)) AND

    [package0].[equal_boolean]([sqlserver].[is_system],(0)))),

    ADD EVENT sqlserver.sp_statement_completed(SET collect_object_name=(1)

    ACTION(sqlserver.client_app_name,sqlserver.database_id,sqlserver.query_hash,sqlserver.query_plan_hash,sqlserver.session_id)

    WHERE ([package0].[greater_than_uint64]([sqlserver].[database_id],(4)) AND [package0].[equal_boolean]([sqlserver].[is_system],(0)))),

    ADD EVENT sqlserver.sql_batch_completed(

    ACTION(sqlserver.client_app_name,sqlserver.database_id,sqlserver.query_hash,sqlserver.session_id)

    WHERE ([package0].[greater_than_uint64]([sqlserver].[database_id],(4)) AND

    [package0].[equal_boolean]([sqlserver].[is_system],(0)))),

    ADD EVENT sqlserver.sql_statement_completed(

    ACTION(sqlserver.client_app_name,sqlserver.database_id,sqlserver.query_hash,sqlserver.query_plan_hash,sqlserver.session_id)

    WHERE ([package0].[greater_than_uint64]([sqlserver].[database_id],(4)) AND

    [package0].[equal_boolean]([sqlserver].[is_system],(0))))

    --Add the Targets

    ADD TARGET package0.event_file(SET filename=N''C:\MSSQL\StatementsAndProcessorUtilization.xel''),

    ADD TARGET package0.etw_classic_sync_target(SET default_etw_session_logfile_path=N''C:\MSSQL\StatementsWithPerfCounters.etl'')

    WITH (MAX_MEMORY=4096 KB,EVENT_RETENTION_MODE=ALLOW_SINGLE_EVENT_LOSS,MAX_DISPATCH_LATENCY=30
    SECONDS,MAX_EVENT_SIZE=0 KB,MEMORY_PARTITION_MODE=NONE,TRACK_CAUSALITY=ON,STARTUP_STATE=OFF)
    ;

    GO

    --Start the instance

    ALTER EVENT SESSION Statements_with_Perf_Counters

    ON SERVER

    STATE = start;

    ```

    *Listing 19-8* *Creating an Event Session with Perfmon Counters*


    ### Tip


    > The `SQL Server` service account must be in the `Performance Log Users` group,
    or an error is thrown.


    ## Integrating Event Sessions with Operating System–Level Events


    ### Note


    > To follow the demonstrations in this section, you need to install `Windows Performance
    Toolkit`, which you can download from [`https://msdn.microsoft.com`](https://msdn.microsoft.com)
    as part of the `Windows Deployment and Assessment Toolkit`.


    There are instances in which you may need to integrate event session data with
    operating system data other than `Perfmon counters` that `SQL Server` provides.
    For example, imagine a scenario in which you have an application that exports
    `SQL Server` data to flat files in the operating system so that a middleware product,
    such as `BizTalk`, can pick them up. You are having trouble generating some files
    and you need to view the process flow—from SQL statement being run through to
    the `WMI` events being triggered in the operating system. For this, you need to
    merge event session data with a trace of `WMI` events. You can achieve this through
    the `ETW` (`Event Tracking for Windows`) architecture.


    To demonstrate this, we first create an event trace session in `Performance Monitor`
    using the `WMI` provider, and then we integrate it with the event session that
    we created in the previous section. (You can find `Performance Monitor` in Administrative
    Tools in Windows.) After we open `Performance Monitor`, we select **New** ➤ **Data
    Collector Set** from the **Event Trace Sessions** context menu, which causes the
    **Create New Data Collector Set** wizard to be invoked. On the first page of the
    wizard, specify a name for the Collector Set, as illustrated in Figure 19-12,
    and specify if the Data Collector set should be configured manually or based on
    a template. In our scenario, we choose to configure it manually.


    ![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig12_HTML.jpg](images/333037_2_En_19_Chapter/333037_2_En_19_Fig12_HTML.jpg)

    *Figure 19-12* *The Create New Data Collector Set wizard*


    On the page for enabling event trace providers, we can use the **Add** button
    to add the `WMI-Activity` provider, as illustrated in Figure 19-13.


    ![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig13_HTML.jpg](images/333037_2_En_19_Chapter/333037_2_En_19_Fig13_HTML.jpg)

