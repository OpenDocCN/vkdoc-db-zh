  trans: '

    ## 概要


    SQL Server 代理是 SQL Server 的一个调度引擎，允许你基于决策逻辑在各种计划上创建强大的维护作业。作业是要执行的任务的容器，其中每个任务被称为一个步骤。每个作业步骤可以在不同的账户上下文下运行，并且可以在不同的子系统或类型（如
    T-SQL、PowerShell、操作系统命令或 SSIS 包）下运行任务。


    计划附加到作业上，可以在特定的日期和时间、当 CPU 空闲时，或在重复性计划（如每日、每周或每月）上触发。计划也可以在日内重复，例如每小时、每分钟，甚至频繁到每
    10 秒一次。


    操作员是接收作业成功或失败通知以及警报触发通知的个人或团队。操作员可以通过电子邮件、寻呼机或 `NET SEND` 接收作业状态通知；但是，`NET SEND`
    和寻呼机支持已弃用。要让操作员通过电子邮件接收通知，必须配置数据库邮件，以便可以通过你的 SMTP 中继服务器发送电子邮件。


    默认情况下，作业在 SQL Server 代理服务账户的上下文中运行。但是，出于良好的安全实践，你应考虑使用代理账户来运行作业步骤。代理账户映射到实例级别的凭据，而凭据又映射到
    Windows 级别的安全主体。代理可用于除 T-SQL 之外的所有子系统。T-SQL 作业步骤使用 `EXECUTE AS` 在数据库用户的上下文中执行命令。这是使用“以以下身份运行”属性配置的。


    当数据库引擎中引发错误或警告、发生 WMI 事件或满足性能条件时，会触发警报。当警报触发时，响应包括通知操作员或运行作业以解决问题。


    多服务器作业允许 DBA 在整个企业中一致地运行作业。在多服务器场景中，有一个主服务器（MSX），用于创建和修改作业，以及多个目标服务器（TSX）。TSX
    定期轮询 MSX 并检索应运行的作业列表。


    # 23. 基于策略的管理


    基于策略的管理（PBM）是一个系统，DBA 可以将其与中央管理服务器结合使用，以报告或强制执行整个企业的标准。本章首先介绍 PBM 使用的概念，然后演示如何通过
    GUI 和 PowerShell 使用 PBM 来有效管理环境。


    ## PBM 概念


    基于策略的管理使用 `目标`、`方面`、`条件` 和 `策略` 的概念。`目标` 是 PBM 管理的实体，例如数据库或表。`方面` 是与目标相关的属性集合。例如，数据库方面包括与数据库名称相关的属性。`条件`
    是可以针对属性进行评估的布尔表达式。`策略` 将条件绑定到目标。以下各节将讨论这些概念。


    ### 方面


    方面是与一种目标类型相关的属性集合，例如 `视图`，其属性包括 `IsSchemaBound`、`HasIndex` 和 `HasAfterTrigger`；`数据库角色`，其属性包括
    `Name Owner` 和 `IsFixedRole`；以及 `索引`，其属性包括 `IsClustered`、`IsPartitioned` 和 `IsUnique`。`索引`
    方面还公开了与地理空间索引、内存优化索引、XML 索引和全文索引相关的属性。其他值得注意的方面包括 `数据库`、`存储过程`、`表面区域配置`、`链接服务器`
    和 `审核`。SQL Server 2019 总共提供了 96 个方面，你可以在本章的“评估模式”部分找到完整列表。你也可以通过运行清单 23-1 中的命令来访问方面列表。


    ```sql

    SELECT name

    FROM msdb.dbo.syspolicy_management_facets ;

    ```

    清单 23-1: 查找方面列表


    ### 条件


    条件是一个布尔表达式，针对对象属性进行评估，以确定其是否符合你的要求。每个方面都包含多个属性，你可以针对这些属性创建条件，但每个条件只能访问来自单个方面的属性。条件可以使用以下运算符进行评估：


    *   `=`

    *   `!=`

    *   `LIKE`

    *   `NOT LIKE`

    *   `IN`

    *   `NOT IN`


    例如，你可以使用 `LIKE` 运算符和表达式 `Database.Name LIKE ''Chapter%''` 来确保所有数据库名称以 `Chapter`
    开头。


    ### 目标


    目标是可以应用策略的实体。这可以是表、数据库、整个实例或 SQL Server 中的大多数其他对象。将目标添加到策略时，可以使用条件来限制目标数量。这意味着，例如，如果你创建一个策略来强制执行实例上的数据库命名约定，你可以使用一个条件来避免针对包含“SharePoint”、“bdc”或“wss”字样的数据库名称检查策略，因为这些是你的
    SharePoint 数据库，它们可能包含在你的标准命名约定中可能被禁止的 GUID。


    ### 策略


    策略包含一个条件，并将其绑定到一个或多个目标（目标也可以通过单独的条件进行筛选）和一个评估模式。根据你选择的评估模式，策略还可能包含你希望检查策略的计划。策略支持四种评估模式，将在下一节中讨论。


    ### 评估模式


    策略支持一到四种评估模式，具体取决于你在条件中使用的方面。评估模式如下：


    *   `按需`

    *   `按计划`

    *   `更改时：仅记录`

    *   `更改时：阻止`


    如果评估模式配置为 `按需`，则策略仅在 DBA 手动评估时进行评估。如果评估模式配置为 `按计划`，则在创建策略时创建计划；这将导致策略定期进行评估。


    ### 提示


    即使策略配置了不同的评估模式，也可以 `按需` 进行评估。


    如果选择 `更改时：仅记录` 评估模式，则每当目标的相关属性更改时，策略验证的结果都会记录到 SQL Server 日志中。如果策略被触发但未通过验证，则会在日志中生成一条消息。当目标的配置方式违反了你的某个策略时，就会发生这种情况。如果违反策略，则会引发错误
    34053，严重级别为 16（表示问题可由用户修复）。


    ### 提示


    创建对象时，评估属性的方式与更改现有对象属性时的评估方式相同。


    如果选择 `更改时：阻止` 作为评估模式，则当属性更改时，SQL Server 会评估该属性，如果存在违规，则会引发错误消息，并且导致策略违规的语句将被回滚。


    因为策略是基于触发的 DDL 事件工作的，所以根据方面内的属性，并非所有评估模式都适用于所有方面。确定特定方面支持的评估模式的规则相当不透明，因此你可以通过运行清单
    23-2 中的查询来发现它们。


    ```sql

    SELECT

    name ,

    ''Yes'' AS on_demand,

    CASE

    WHEN (CONVERT(BIT, execution_mode & 4)) = 1

    THEN ''Yes''

    ELSE ''No''

    END  AS on_schedule,

    CASE

    WHEN (CONVERT(BIT, execution_mode & 2)) = 1

    THEN ''Yes''

    ELSE ''No''

    END  AS on_change_log,

    CASE

    WHEN (CONVERT(BIT, execution_mode & 1)) = 1

    THEN ''Yes''

    ELSE ''No''

    END  AS on_change_prevent

    FROM msdb.dbo.syspolicy_management_facets ;

    ```

    清单 23-2: 列出每个方面支持的执行类型

    '
- fmt: '## Central Management Servers


    SQL Server Management Studio 提供了一项名为中央管理服务器的功能。此功能允许你将一个实例注册为中央管理服务器，然后将其他实例注册为该中央管理服务器的已注册服务器。一旦在中央管理服务器下注册了服务器，你就可以针对组中的所有服务器运行查询，或者对组内的所有服务器运行策略。


    CMS 是一个非常出色的功能，在与基于策略的管理结合使用时如此，其本身亦然。在管理中型或大型 SQL Server 环境时，我总是会实施 CMS，用于针对多个服务器运行即席查询等目的。这使我能够快速回答管理和容量问题，例如“我们的环境中有多少个数据库？”


    要注册中央管理服务器，请在 SQL Server Management Studio 的“视图”菜单中选择“已注册服务器”。这将导致“已注册服务器”窗口出现，如图[23-1](#333037_2_En_23_Chapter.xhtml#Fig1)所示。


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig1_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig1_HTML.jpg)
    *图 23-1：已注册服务器窗口*


    让我们通过在中央管理服务器的上下文菜单中选择“注册中央管理服务器”，将我们的`SQLSERVER\MASTERSERVER`实例（这是我们本节演示中使用的服务器\实例名称）注册为中央管理服务器。这将显示“新建服务器注册”对话框的“常规”选项卡，如图[23-2](#333037_2_En_23_Chapter.xhtml#Fig2)所示。


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig2_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig2_HTML.jpg)
    *图 23-2：“常规”选项卡*


    在此选项卡上，我们在“服务器名称”框中输入中央管理服务器的服务器\实例名称。这将导致“已注册服务器名称”字段自动更新，但你可以手动编辑它以赋予其新名称。你还可以选择为该实例添加描述。


    在如图[23-3](#333037_2_En_23_Chapter.xhtml#Fig3)所示的“连接属性”选项卡上，我们指定连接到该实例的首选项。


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig3_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig3_HTML.jpg)
    *图 23-3：“连接属性”选项卡*


    在此选项卡上，我们输入一个数据库作为登陆区域。如果我们将选项保留为“默认”，则会连接到默认数据库。在选项卡的“网络”部分，你可以指定要使用的特定网络协议，或保留设置为“默认”（我们在此处就是如此）。将其保留为“默认”会使连接使用实例网络配置中指定的最高优先级协议。虽然通常不建议更改网络数据包大小，因为在大多数场景中，这会产生负面影响，但在非典型场景中，这样做可以通过让连接受益于巨型帧（可以支持更大有效载荷并因此减少流量碎片的以太网帧）来提高性能。


    在屏幕的“连接”部分，我们指定连接超时和执行超时的持续时间。你还可以指定是否加密到中央管理服务器的连接。如果你在单个 SQL Server Management
    Studio 实例中管理多个实例，“使用自定义颜色”选项对于颜色编码实例非常有用。选中此选项并指定一种颜色有助于避免查询意外针对不正确的服务器运行。当我调试失败的代码发布时，我发现对实例进行颜色编码特别有用，因为我不想意外地将开发/测试代码运行到生产环境！


    “始终加密”选项卡允许你为连接启用始终加密并指定适当的验证服务器。此选项卡如图[23-4](#333037_2_En_23_Chapter.xhtml#Fig4)所示。有关始终加密的更多信息，请参见第[11](#333037_2_En_11_Chapter.xhtml)章。


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig4_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig4_HTML.jpg)
    *图 23-4：“始终加密”选项卡*


    如图[23-5](#333037_2_En_23_Chapter.xhtml#Fig5)所示的“其他连接参数”选项卡允许你手动指定连接字符串属性。然而，你应该注意，如果你输入了已在其他选项卡上指定的连接属性，手动指定的属性将覆盖你在其他选项卡中的选择。


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig5_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig5_HTML.jpg)
    *图 23-5：“其他连接参数”选项卡*


    单击“新建服务器注册”窗口底部的“测试”按钮，允许你在保存之前测试到实例的连接。这总是一个好主意，因为它有助于避免日后不必要的故障排除。


    一旦我们注册了中央管理服务器，我们可以选择直接在中央管理服务器下注册服务器，或者在中央管理服务器下创建服务器组。你在此处选择的策略应基于环境的要求。例如，如果中央管理服务器管理的所有服务器都应应用相同的策略，那么直接在中央管理服务器下注册服务器可能就足够了。但是，如果你的中央管理服务器将管理来自不同环境（例如生产和开发/测试）的服务器，那么你可能希望针对不同环境实施不同的策略集；在这种情况下，创建不同的服务器组是有意义的。在新创建的中央管理服务器的上下文菜单中选择“新建服务器组”将调用“新建服务器组属性”对话框，如图[23-6](#333037_2_En_23_Chapter.xhtml#Fig6)所示。


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig6_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig6_HTML.jpg)
    *图 23-6：“新建服务器组属性”对话框*


    你可以看到我们正在使用此对话框输入服务器组的名称和描述，该组将我们的开发/测试服务器分组在一起。退出对话框后，我们重复该过程为我们的生产服务器创建一个服务器组，并将其命名为
    Prod。'
  raw: '## Central Management Servers


    SQL Server Management Studio provides a feature called a central management server.
    This feature allows you to register an instance as a central management server
    and then register other instances as registered servers of this central management
    server. Once you have registered servers under a central management server, you
    can run queries against all servers in the group or run policies against all servers
    within a group.


    ### Tip


    CMS is a great feature, when used with Policy-Based Management, but also in its
    own right. I always implement CMS when I am looking after medium or large SQL
    Server estates, for purposes such as running ad hoc queries against multiple servers.
    This allows me to quickly answer management and capacity questions, such as “How
    many databases do we have in our estate?”


    To register a central management server, select Registered Servers from the View
    menu in SQL Server Management Studio. This causes the Registered Servers window
    to appear, which is illustrated in Figure [23-1](#333037_2_En_23_Chapter.xhtml#Fig1).


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig1_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig1_HTML.jpg)


    Figure 23-1


    The Registered Servers window


    Let’s register our `SQLSERVER\MASTERSERVER` instance (which is the server\instance
    name we use in the demonstrations within this section) as a central management
    server by selecting Register Central Management Server from the context menu of
    Central Management Servers. This causes the General tab of the New Server Registration
    dialog box to display, as illustrated in Figure [23-2](#333037_2_En_23_Chapter.xhtml#Fig2).


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig2_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig2_HTML.jpg)


    Figure 23-2


    The General tab


    On this tab, we enter the server\instance name of the central management server
    in the Server Name box. This causes the Registered Server Name field to update,
    but you can edit this manually to give it a new name if you wish. Optionally,
    you can also add a description for the instance.


    On the Connection Properties tab, displayed in Figure [23-3](#333037_2_En_23_Chapter.xhtml#Fig3),
    we specify our preferences for connecting to the instance.


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig3_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig3_HTML.jpg)


    Figure 23-3


    The Connection Properties tab


    On this tab, we enter a database as a landing zone. If we leave the option as
    Default, then the connection is made to our default database. In the Network section
    of the tab, you can specify a specific network protocol to use or leave the setting
    as Default, which is what we have done here. Leaving this as Default causes the
    connection to use the highest priority protocol specified in the instance’s network
    configuration. Although changing the network packet size is not normally advised,
    because in most scenarios, it will have a negative effect, doing so can improve
    performance in atypical scenarios by allowing the connection to benefit from jumbo
    frames, which are Ethernet frames that can support a larger payload and therefore
    cause less fragmentation of traffic.


    In the Connection section of the screen, we specify durations for connection timeouts
    and execution timeouts. You can also specify whether to encrypt connections made
    to the central management server. If you are managing multiple instances within
    a single instance of SQL Server Management Studio, the Use Custom Color option
    is very useful for color coding the instance. Checking this option and specifying
    a color helps avoid queries accidently being run against an incorrect server.
    I find color coding instances particularly useful when I’m troubleshooting failed
    code releases, since I don’t want to accidently run Dev/Test code against production!


    The Always Encrypted tab allows you to enable Always Encrypted for the connection
    and specify the appropriate attestation server. This tab is illustrated in Figure
    [23-4](#333037_2_En_23_Chapter.xhtml#Fig4). For further information on Always
    Encrypted, please see Chapter [11](#333037_2_En_11_Chapter.xhtml).


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig4_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig4_HTML.jpg)


    Figure 23-4


    Always Encrypted tab


    The Additional Connection Parameters tab, shown in Figure [23-5](#333037_2_En_23_Chapter.xhtml#Fig5),
    allows you to specify connection string properties manually. You should be aware,
    however, that if you enter connection properties that you have already specified
    on the other tabs, the manually specified properties will override your selections
    in the other tabs.


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig5_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig5_HTML.jpg)


    Figure 23-5


    Additional Connection Parameters tab


    Clicking the Test button at the bottom of the New Server Registration window allows
    you to test the connection to the instance before you save it. This is always
    a good idea because it helps you avoid unnecessary troubleshooting at a later
    date.


    Once we have registered the central management server, we can choose to either
    register servers directly below the central management server or create server
    groups below the central management server. Base the strategy you choose here
    on the requirements of your environment. For example, if all servers that the
    central management server manages should have the same policies applied, it is
    probably sufficient to register the servers directly below the central management
    server. If your central management server will manage servers from different environments,
    however, such as Prod and Dev/Test, then you probably want to enforce different
    sets of policies against different environments; in such cases, it makes sense
    to create different server groups. Selecting New Server Group from the context
    menu of your newly created central management server invokes the New Server Group
    Properties dialog box, as illustrated in Figure [23-6](#333037_2_En_23_Chapter.xhtml#Fig6).


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig6_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig6_HTML.jpg)


    Figure 23-6


    New Server Group Properties dialog box


    You can see that we are using this dialog box to enter the name and description
    of the server group that will group our Dev/Test servers together. After exiting
    the dialog box, we repeat the process to create a server group for our production
    servers, which we name Prod.'
