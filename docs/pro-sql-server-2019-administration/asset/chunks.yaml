    DENY ALTER ON LOGIN::[NT Service\MSSQL$PROSQLADMIN] TO Danielle ;

    ```


    清单 10-6 授予和拒绝权限


    请注意为对象类（在此例中是登录名）分配权限与为特定对象分配权限在语法上的区别。对于对象类型，使用`ANY [Object Type]`语法，但对于特定对象，我们使用`[Object
    Class]::[Securable]`。


    我们可以使用`ALTER SERVER ROLE`语句向服务器角色添加或从中删除登录名。清单 10-7 演示了如何将`Danielle`添加到`sysadmin`角色，然后再将她移除。


    ```sql

    --Add Danielle to the sysadmin Role

    ALTER SERVER ROLE sysadmin ADD MEMBER Danielle ;

    GO

    --Remove Danielle from the sysadmin role

    ALTER SERVER ROLE sysadmin DROP MEMBER Danielle ;

    GO

    ```


    清单 10-7 添加和移除服务器角色


    ## 实现数据库级安全性


    我们已经了解了如何使用登录名和服务器角色管理实例级的安全性。在单个数据库级别的安全性具有类似的模型，由数据库用户和数据库角色组成。以下各节将描述此功能。

    '
- fmt: '### Database Roles


    Just as there are server roles at the instance level that help manage permissions,
    there are also database roles at the database level that can group principals
    together to assign common permissions. There are built-in database roles, but
    it is also possible to define your own, ones that meet the requirements of your
    specific data-tier application.


    The built-in database roles that are available in SQL Server 2019 are described
    in Table 10-2.


    Table 10-2

    Database Roles


    | Database Role | Description |

    | --- | --- |

    | `db_accessadmin` | Members of this role can add and remove database users from
    the database. |

    | `db_backupoperator` | The `db_backupoperator` role gives users the permissions
    they need to back up the database, natively. It may not work for third-party backup
    tools, such as CommVault or Backup Exec, since these tools often require `sysadmin`
    rights. |

    | `db_datareader` | Members of the `db_datareader` role can run `SELECT` statements
    against any table in the database. It is possible to override this for specific
    tables by explicitly denying a user permissions to those tables. `DENY` overrides
    the `GRANT`. |

    | `db_datawriter` | Members of the `db_datawriter` role can perform `DML` (Data
    Manipulation Language) statements against any table in the database. It is possible
    to override this for specific tables by specifically denying a user permissions
    against a table. The `DENY` will override the `GRANT`. |

    | `db_denydatareader` | The `db_denydatareader` role denies the `SELECT` permission
    against every table in the database. |

    | `db_denydatawriter` | The `db_denydatawriter` role denies its members the permissions
    to perform `DML` statements against every table in the database. |

    | `db_ddladmin` | Members of this role are given the ability to run `CREATE`,
    `ALTER`, and `DROP` statements against any object in the database. This role is
    rarely used, but I have seen a couple of examples or poorly written applications
    that create database objects on the fly. If you are responsible for administering
    an application such as this, then the `ddl_admin` role may be useful. |

    | `db_owner` | Members of the `db_owner` role can perform any action within the
    database that has not been specifically denied. |

    | `db_securityadmin` | Members of this role can grant, deny, and revoke a user’s
    permissions to securables. They can also add or remove role memberships, with
    the exception of the `db_owner` role. |


    You can create your own database roles in SQL Server Management Studio by drilling
    down through `Databases` ➤ `Your Database` ➤ `Security` and then selecting `New
    Database Role` from the context menu of database roles in Object Explorer. This
    displays the `General` tab of the `Database Role - New` dialog box. Here, you
    should specify `db_ReadOnlyUsers` as the name of our role and state that the role
    will be owned by `dbo`. `dbo` is the system user that members of the `sysadmin`
    server role map to. We have then used the `Add` button to add Danielle to the
    role.


    On the `Securables` tab, we can search for objects that we want to grant permissions
    on, and then we can select the appropriate permissions for the objects. Figure
    10-4 illustrates the results of searching for objects that are part of the `dbo`
    schema. We have then selected that the role should have `SELECT` permissions against
    the `SensitiveData` table, but that `DELETE`, `INSERT`, and `UPDATE` permissions
    should be specifically denied.


    ![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig4_HTML.jpg](images/333037_2_En_10_Chapter/333037_2_En_10_Fig4_HTML.jpg)


    Figure 10-4

    The Securables tab


    Because there is currently only one table in our `Chapter10` database, this role
    is functionally equivalent to adding Danielle to the `db_datareader` and `db_denydatawriter`
    built-in database roles. The big difference is that when we create new tables
    in our database, the permissions assigned to our `db_ReadOnlyUsers` role continue
    to apply only to the `SensitiveData` table. This is in contrast to the `db_datareader`
    and `db_denydatawriter` roles, which assign the same permission set to any new
    tables that are created.


    An alternative way to create the `db_ReadOnlyUsers` role is to use the T-SQL script
    in Listing 10-8. You can see that we have had to use several commands to set up
    the role. The first command creates the role and uses the `AUTHORIZATION` clause
    to specify the owner. The second command adds Danielle as a member of the role,
    and the subsequent commands use `GRANT` and `DENY` keywords to assign the appropriate
    permissions on the securable to the principal.


    ```

    --Set Up the Role

    CREATE ROLE db_ReadOnlyUsers AUTHORIZATION dbo ;

    GO

    ALTER ROLE db_ReadOnlyUsers ADD MEMBER Danielle ;

    GRANT SELECT ON dbo.SensitiveData TO db_ReadOnlyUsers ;

    DENY DELETE ON dbo.SensitiveData TO db_ReadOnlyUsers ;

    DENY INSERT ON dbo.SensitiveData TO db_ReadOnlyUsers ;

    DENY UPDATE ON dbo.SensitiveData TO db_ReadOnlyUsers ;

    GO

    ```


    Listing 10-8

    Creating a Database Role


    #### Tip


    Although `DENY` assignments can be helpful in some scenarios—for example, if you
    want to assign securable permissions to all but one table—in a well-structured
    security hierarchy, use them with caution. `DENY` assignments can increase the
    complexity of managing security, and you can enforce the principle of least privilege
    by exclusively using `GRANT` assignments in the majority of cases.'
