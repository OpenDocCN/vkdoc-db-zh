- fmt: '## Summary


    The SQL Server encryption hierarchy begins with the Service Master Key, which
    is encrypted using the Data Protection API (DPAPI) in the Windows operating system.
    You can then use this key to encrypt the Database Master Key. In turn, you can
    use this key to encrypt keys and certificates stored within the database. SQL
    Server also supports third-party Extensible Key Management (EKM) providers to
    allow for advanced key management of keys used to secure data.


    Transparent Data Encryption (TDE) gives administrators the ability to encrypt
    an entire database with no bloat and an acceptable performance overhead. This
    offers protection against the theft of data by malicious users attaching a database
    to a new instance or stealing the backup media. TDE gives developers the advantage
    of not needing to modify their code in order to access the data.


    Cell-level encryption is a technique used to encrypt data at the column level,
    or even the specific rows within a column, using a symmetric key, an asymmetric
    key, or a certificate. Although this functionality is very flexible, it is also
    very manual and causes a large amount of bloat and a large performance overhead.
    For this reason, I recommended that you only use cell-level encryption to secure
    the minimum amount of data you need in order to fulfill a regulatory requirement
    or that you have clear business justification for using it.


    In order to mitigate the impact of bloat and performance degradation when using
    cell-level encryption, it is recommended that you encrypt data using a symmetric
    key. You can then encrypt the symmetric key using an asymmetric key or certificate.


    # 12. Backups and Restores


    Backing up a database is one of the most important tasks that a DBA can perform.
    Therefore, after discussing the principles of backups, we look at some of the
    backup strategies that you can implement for SQL Server databases. We then discuss
    how to perform the backup of a database before we finally look in-depth at restoring
    it, including restoring to a point in time, restoring individual files and pages,
    and performing piecemeal restores.


    ## Backup Fundamentals


    Depending on the recovery model you are using, you can take three types of backup
    within SQL Server: full, differential, and log. We discuss the recovery models
    in addition to each of the backup types in the following sections.


    ### Recovery Models


    As discussed in Chapter [6](#333037_2_En_6_Chapter.xhtml), you can configure a
    database in one of three recovery models: `SIMPLE`, `FULL`, and `BULK LOGGED`.
    These models are discussed in the following sections.


    #### SIMPLE Recovery Model


    When configured in `SIMPLE` recovery model, the transaction log (or to be more
    specific, VLFs [virtual log files] within the transaction log that contain transactions
    that are no longer required) is truncated after each `CHECKPOINT` operation. This
    means that usually you do not have to administer the transaction log. However,
    it also means that you can’t take transaction log backups.


    The `SIMPLE` recovery model can increase performance, for some operations, because
    transactions are minimally logged. Operations that can benefit from minimal logging
    are as follows:


    *   Bulk imports


    *   `SELECT INTO`


    *   `UPDATE` statements against large data types that use the `.WRITE` clause


    *   `WRITETEXT`


    *   `UPDATETEXT`


    *   Index creation


    *   Index rebuilds


    The main disadvantage of the `SIMPLE` recovery model is that it is not possible
    to recover to a specific point in time; you can only restore to the end of a full
    backup. This disadvantage is amplified by the fact that full backups can have
    a performance impact, so you are unlikely to be able to take them as frequently
    as you would take a transaction log backup without causing an impact to users.
    Another disadvantage is that the `SIMPLE` recovery model is incompatible with
    some SQL Server HA/DR features, namely


    *   AlwaysOn Availability Groups


    *   Database mirroring


    *   Log shipping


    Therefore, in production environments, the most appropriate way to use the `SIMPLE`
    recovery model is for large data warehouse–style applications where you have a
    nightly ETL load, followed by read-only reporting for the rest of the day. This
    is because this model provides the benefit of minimally logged transactions, while
    at the same time, it does not have an impact on recovery, since you can take a
    full backup after the nightly ETL run.


    #### FULL Recovery Model


    When a database is configured in `FULL` recovery model, the log truncation does
    not occur after a `CHECKPOINT` operation. Instead, it occurs after a transaction
    log backup, as long as a `CHECKPOINT` operation has occurred since the previous
    transaction log backup. This means that you must schedule transaction log backups
    to run on a frequent basis. Failing to do so not only leaves your database at
    risk of being unrecoverable in the event of a failure, but it also means that
    your transaction log continues to grow until it runs out of space and a 9002 error
    is thrown.


    When a database is in `FULL` recovery model, many factors can cause the VLFs within
    a transaction log not to be truncated. This is known as *delayed truncation*.
    You can find the last reason for delayed truncation to occur in the `log_reuse_wait_desc`
    column of `sys.databases`; a full list of reasons for delayed truncation appears
    in Chapter [6](#333037_2_En_6_Chapter.xhtml).


    The main advantage of the `FULL` recovery model is that point-in-time recovery
    is possible, which means that you can restore your database to a point in the
    middle of a transaction log backup, as opposed to only being able to restore it
    to the end of a backup. Point-in-time recovery is discussed in detail later in
    this chapter. Additionally, `FULL` recovery model is compatible with all SQL Server
    functionality. It is usually the best choice of recovery model for production
    databases.


    ### Tip


    If you switch from `SIMPLE` recovery model to `FULL` recovery model, you are not
    actually in `FULL` recovery model until after you take a transaction log backup.
    Therefore, make sure to back up your transaction log immediately.'
  raw: '## Summary


    The SQL Server encryption hierarchy begins with the Service Master Key, which
    is encrypted using the Data Protection API (DPAPI) in the Windows operating system.
    You can then use this key to encrypt the Database Master Key. In turn, you can
    use this key to encrypt keys and certificates stored within the database. SQL
    Server also supports third-party Extensible Key Management (EKM) providers to
    allow for advanced key management of keys used to secure data.


    Transparent Data Encryption (TDE) gives administrators the ability to encrypt
    an entire database with no bloat and an acceptable performance overhead. This
    offers protection against the theft of data by malicious users attaching a database
    to a new instance or stealing the backup media. TDE gives developers the advantage
    of not needing to modify their code in order to access the data.


    Cell-level encryption is a technique used to encrypt data at the column level,
    or even the specific rows within a column, using a symmetric key, an asymmetric
    key, or a certificate. Although this functionality is very flexible, it is also
    very manual and causes a large amount of bloat and a large performance overhead.
    For this reason, I recommended that you only use cell-level encryption to secure
    the minimum amount of data you need in order to fulfill a regulatory requirement
    or that you have clear business justification for using it.


    In order to mitigate the impact of bloat and performance degradation when using
    cell-level encryption, it is recommended that you encrypt data using a symmetric
    key. You can then encrypt the symmetric key using an asymmetric key or certificate.


    # 12. Backups and Restores


    Backing up a database is one of the most important tasks that a DBA can perform.
    Therefore, after discussing the principles of backups, we look at some of the
    backup strategies that you can implement for SQL Server databases. We then discuss
    how to perform the backup of a database before we finally look in- depth at restoring
    it, including restoring to a point in time, restoring individual files and pages,
    and performing piecemeal restores.


    ## Backup Fundamentals


    Depending on the recovery model you are using, you can take three types of backup
    within SQL Server: full, differential, and log. We discuss the recovery models
    in addition to each of the backup types in the following sections.


    ### Recovery Models


    As discussed in Chapter [6](#333037_2_En_6_Chapter.xhtml), you can configure a
    database in one of three recovery models: `SIMPLE`, `FULL`, and `BULK LOGGED`.
    These models are discussed in the following sections.


    #### SIMPLE Recovery Model


    When configured in `SIMPLE` recovery model, the transaction log (or to be more
    specific, VLFs [virtual log files] within the transaction log that contain transactions
    that are no longer required) is truncated after each checkpoint operation. This
    means that usually you do not have to administer the transaction log. However,
    it also means that you can’t take transaction log backups.


    The `SIMPLE` recovery model can increase performance, for some operations, because
    transactions are minimally logged. Operations that can benefit from minimal logging
    are as follows:


    *   Bulk imports


    *   `SELECT INTO`


    *   `UPDATE` statements against large data types that use the `.WRITE` clause


    *   `WRITETEXT`


    *   `UPDATETEXT`


    *   Index creation


    *   Index rebuilds


    The main disadvantage of the `SIMPLE` recovery model is that it is not possible
    to recover to a specific point in time; you can only restore to the end of a full
    backup. This disadvantage is amplified by the fact that full backups can have
    a performance impact, so you are unlikely to be able to take them as frequently
    as you would take a transaction log backup without causing an impact to users.
    Another disadvantage is that the `SIMPLE` recovery model is incompatible with
    some SQL Server HA/DR features, namely


    *   AlwaysOn Availability Groups


    *   Database mirroring


    *   Log shipping


    Therefore, in production environments, the most appropriate way to use the `SIMPLE`
    recovery model is for large data warehouse–style applications where you have a
    nightly ETL load, followed by read-only reporting for the rest of the day. This
    is because this model provides the benefit of minimally logged transactions, while
    at the same time, it does not have an impact on recovery, since you can take a
    full backup after the nightly ETL run.


    #### FULL Recovery Model


    When a database is configured in `FULL` recovery model, the log truncation does
    not occur after a `CHECKPOINT` operation. Instead, it occurs after a transaction
    log backup, as long as a `CHECKPOINT` operation has occurred since the previous
    transaction log backup. This means that you must schedule transaction log backups
    to run on a frequent basis. Failing to do so not only leaves your database at
    risk of being unrecoverable in the event of a failure, but it also means that
    your transaction log continues to grow until it runs out of space and a 9002 error
    is thrown.


    When a database is in `FULL` recovery model, many factors can cause the VLFs within
    a transaction log not to be truncated. This is known as *delayed truncation*.
    You can find the last reason for delayed truncation to occur in the `log_reuse_wait_desc`
    column of `sys.databases`; a full list of reasons for delayed truncation appears
    in Chapter [6](#333037_2_En_6_Chapter.xhtml).


    The main advantage of the `FULL` recovery model is that point-in-time recovery
    is possible, which means that you can restore your database to a point in the
    middle of a transaction log backup, as opposed to only being able to restore it
    to the end of a backup. Point-in-time recovery is discussed in detail later in
    this chapter. Additionally, `FULL` recovery model is compatible with all SQL Server
    functionality. It is usually the best choice of recovery model for production
    databases.


    ### Tip


    If you switch from `SIMPLE` recovery model to `FULL` recovery model, you are not
    actually in `FULL` recovery model until after you take a transaction log backup.
    Therefore, make sure to back up your transaction log immediately.'
  trans: '

    ## 概要


    SQL Server 的加密层次结构始于服务主密钥，该密钥使用 Windows 操作系统中的数据保护 API (DPAPI) 进行加密。然后，您可以使用此密钥来加密数据库主密钥。进而，又可以使用该密钥来加密存储在数据库内的密钥和证书。SQL
    Server 还支持第三方可扩展密钥管理 (EKM) 提供程序，以实现对用于保护数据的密钥进行高级密钥管理。


    透明数据加密 (TDE) 使管理员能够加密整个数据库，而不会产生数据膨胀，且性能开销在可接受范围内。这可以防止恶意用户通过将数据库附加到新实例或窃取备份介质来盗取数据。TDE
    为开发者提供了优势，使其无需修改代码即可访问数据。


    单元格级加密是一种在列级别、甚至特定行内使用对称密钥、非对称密钥或证书加密数据的技术。尽管此功能非常灵活，但它也需要大量手动操作，并会导致大量数据膨胀和显著的性能开销。因此，我建议您仅使用单元格级加密来保护满足监管要求所需的最少数据量，或者您有明确的业务理由需要使用它。


    为了减轻使用单元格级加密时数据膨胀和性能下降的影响，建议您使用对称密钥加密数据。然后，您可以使用非对称密钥或证书来加密该对称密钥。


    # 12. 备份与还原


    备份数据库是数据库管理员 (DBA) 可执行的最重要的任务之一。因此，在讨论了备份原理之后，我们将探讨您可以为 SQL Server 数据库实施的一些备份策略。接着，我们将讨论如何执行数据库备份，最后深入探讨如何还原数据库，包括还原到特定时间点、还原单个文件和页面，以及执行部分还原。


    ## 备份基础


    根据您使用的恢复模型，可以在 SQL Server 中执行三种类型的备份：完整备份、差异备份和日志备份。我们将在以下各节中讨论恢复模型以及每种备份类型。


    ### 恢复模型


    如第 6 章所述，您可以将数据库配置为以下三种恢复模型之一：`SIMPLE`、`FULL` 和 `BULK LOGGED`。这些模型将在以下章节中讨论。


    #### SIMPLE 恢复模型


    配置为 `SIMPLE` 恢复模型时，事务日志（更准确地说，是事务日志中包含不再需要的事务的 VLF [虚拟日志文件]）会在每次 `CHECKPOINT`
    操作后被截断。这意味着通常您不必管理事务日志。然而，这也意味着您无法执行事务日志备份。


    `SIMPLE` 恢复模型可以提高某些操作的性能，因为事务是 minimal logged（最小日志记录）的。可以从 minimal logging 中受益的操作如下：


    *   批量导入


    *   `SELECT INTO`


    *   使用 `.WRITE` 子句针对大数据类型的 `UPDATE` 语句


    *   `WRITETEXT`


    *   `UPDATETEXT`


    *   索引创建


    *   索引重建


    `SIMPLE` 恢复模型的主要缺点是无法恢复到特定时间点；您只能还原到完整备份的结尾。这一缺点被另一个事实放大了，即完整备份可能会影响性能，因此您不太可能在不造成用户影响的情况下，像执行事务日志备份那样频繁地执行完整备份。另一个缺点是，`SIMPLE`
    恢复模型与某些 SQL Server 高可用性/灾难恢复 (HA/DR) 功能不兼容，具体包括：


    *   AlwaysOn 可用性组


    *   数据库镜像


    *   事务日志传送


    因此，在生产环境中，使用 `SIMPLE` 恢复模型最合适的场景是大型数据仓库类型的应用程序，这类应用程序通常有每晚的 ETL 加载作业，然后在当天其余时间进行只读报告。这是因为此模型提供了
    minimal logged transactions（最小日志记录事务）的优势，同时由于您可以在每晚 ETL 运行后执行完整备份，因此对恢复操作没有影响。


    #### FULL 恢复模型


    当数据库配置为 `FULL` 恢复模型时，`CHECKPOINT` 操作后不会发生日志截断。相反，它会在执行事务日志备份后发生，前提是自上一次事务日志备份以来已经发生过
    `CHECKPOINT` 操作。这意味着您必须安排频繁运行的事务日志备份。未能执行此操作不仅会使您的数据库在发生故障时面临无法恢复的风险，而且还会导致您的事务日志持续增长，直到空间耗尽并抛出
    9002 错误。


    当数据库处于 `FULL` 恢复模型时，许多因素可能导致事务日志中的 VLF 无法被截断。这被称为*延迟截断*。您可以在 `sys.databases` 的
    `log_reuse_wait_desc` 列中找到最近一次发生延迟截断的原因；延迟截断的完整原因列表见第 6 章。


    `FULL` 恢复模型的主要优点是可能进行时间点恢复，这意味着您可以将数据库还原到事务日志备份中间的某个时间点，而不仅仅是备份结束时的时间点。时间点恢复将在本章后面详细讨论。此外，`FULL`
    恢复模型与所有 SQL Server 功能兼容。它通常是生产数据库恢复模型的最佳选择。


    ### 提示


    如果您从 `SIMPLE` 恢复模型切换到 `FULL` 恢复模型，实际上在您执行事务日志备份之前，您并未真正处于 `FULL` 恢复模型。因此，请确保立即备份您的事务日志。

    '
- fmt: '#### BULK LOGGED Recovery Model


    The `BULK LOGGED` recovery model is designed to be used on a short-term basis
    while a bulk import operation takes place. The idea is that your normal model
    of operations is to use `FULL` recovery model and then temporarily switch to the
    `BULK LOGGED` recovery model just before a bulk import takes place; you then switch
    back to `FULL` recovery model when the import completes. This may give you a performance
    benefit and also stop the transaction log from filling up, since bulk import operations
    are minimally logged.


    Immediately before you switch to the `BULK LOGGED` recovery model, and immediately
    after you switch back to `FULL` recovery model, it is good practice to take a
    transaction log backup. This is because you cannot use any transaction log backups
    that contain minimally logged transactions for point-in-time recovery. For the
    same reason, it is also good practice to safe-state your application before you
    switch to the `BULK LOGGED` recovery model. You normally achieve this by disabling
    any logins, except for the login that performs the bulk import and logins that
    are administrators, to ensure that no other data modifications take place. You
    should also ensure that the data you are importing is recoverable by a means other
    than a restore. Following these rules mitigates the risk of data loss in the event
    of a disaster.


    Although the minimally logged inserts keep the transaction log small and reduce
    the amount of IO to the log, during the bulk import, the transaction log backup
    is more expensive than it is in `FULL` recovery model in terms of IO. This is
    because when you back up a transaction log that contains minimally logged transactions,
    SQL Server also backs up any data extents, which contain pages that have been
    altered using minimally logged transactions. SQL Server keeps track of these pages
    by using bitmap pages, called ML (minimally logged) pages. ML pages occur once
    in every 64,000 extents and use a flag to indicate if each extent in the corresponding
    block of extents contains minimally logged pages.


    ### Caution


    `BULK LOGGED` recovery model may not be faster than `FULL` recovery model for
    bulk imports unless you have a very fast IO subsystem. This is because the `BULK
    LOGGED` recovery model forces data pages updated with minimally logged pages to
    flush to disk as soon as the operation completes instead of waiting for a checkpoint
    operation.


    ### Changing the Recovery Model


    Before we show you how to change the recovery model of a database, let’s first
    create the `Chapter12` database, which we use for demonstrations in this chapter.
    You can create this database using the script in Listing [12-1](#333037_2_En_12_Chapter.xhtml#PC1).


    ```sql

    CREATE DATABASE Chapter12

    ON  PRIMARY

    ( NAME = ''Chapter12'', FILENAME = ''C:\MSSQL\DATA\Chapter12.mdf''),

    FILEGROUP FileGroupA

    ( NAME = ''Chapter12FileA'', FILENAME = ''C:\MSSQL\DATA\Chapter12FileA.ndf'' ),

    FILEGROUP FileGroupB

    ( NAME = ''Chapter12FileB'', FILENAME = ''C:\MSSQL\DATA\Chapter12FileB.ndf'' )

    LOG ON

    ( NAME = ''Chapter12_log'', FILENAME = ''C:\MSSQL\DATA\Chapter12_log.ldf'' ) ;

    GO

    ALTER DATABASE [Chapter12] SET RECOVERY FULL ;

    GO

    USE Chapter12

    GO

    CREATE TABLE dbo.Contacts

    (

    ContactID        INT        NOT NULL        IDENTITY        PRIMARY KEY,

    FirstName        NVARCHAR(30),

    LastName        NVARCHAR(30),

    AddressID        INT

    ) ON FileGroupA ;

    CREATE TABLE dbo.Addresses

    (

    AddressID        INT        NOT NULL        IDENTITY        PRIMARY KEY,

    AddressLine1        NVARCHAR(50),

    AddressLine2        NVARCHAR(50),

    AddressLine3        NVARCHAR(50),

    PostCode        NCHAR(8)

    ) ON FileGroupB ;

    ```

    Listing 12-1

    Creating the Chapter12 Database


    You can change the recovery model of a database from SQL Server Management Studio
    (`SSMS`) by selecting `Properties` from the context menu of the database and navigating
    to the `Options` page, as illustrated in Figure [12-1](#333037_2_En_12_Chapter.xhtml#Fig1).
    You can then select the appropriate recovery model from the `Recovery Model` drop-down
    list.


    ![../images/333037_2_En_12_Chapter/333037_2_En_12_Fig1_HTML.jpg](images/333037_2_En_12_Chapter/333037_2_En_12_Fig1_HTML.jpg)

    Figure 12-1

    The `Options` tab


    We can also use the script in Listing [12-2](#333037_2_En_12_Chapter.xhtml#PC2)
    to switch our `Chapter12` database from the `FULL` recovery model to the `SIMPLE`
    recovery model and then back again.


    ```sql

    ALTER DATABASE Chapter12 SET RECOVERY SIMPLE ;

    GO

    ALTER DATABASE Chapter12 SET RECOVERY FULL ;

    GO

    ```

    Listing 12-2

    Switching Recovery Models


    ### Tip


    After changing the recovery model, refresh the database in `Object Explorer` to
    ensure that the correct recovery model displays.


    ### Backup Types


    You can take three types of backup in SQL Server: full, differential, and log.
    We discuss these backup types in the following sections.


    #### Full Backup


    You can take a full backup in any recovery model. When you issue a `backup` command,
    SQL Server first issues a `CHECKPOINT`, which causes any dirty pages to be written
    to disk. It then backs up every page within the database (this is known as the
    data read phase) before it finally backs up enough of the transaction log (this
    is known as the log read phase) to be able to guarantee transactional consistency.
    This ensures that you are able to restore your database to the most recent point,
    including any transactions that are committed during the data read phase of the
    backup.


    #### Differential Backup


    A differential backup backs up every page in the database that has been modified
    since the last full backup. SQL Server keeps track of these pages by using bitmap
    pages called `DIFF` pages, which occur once in every 64,000 extents. These pages
    use flags to indicate if each extent in their corresponding block of extents contains
    pages that have been updated since the last full backup.


    The cumulative nature of differential backups means that your restore chain only
    ever needs to include one differential backup—the latest one. Only ever needing
    to restore one differential backup is very useful if there is a significant time
    lapse between full backups, but log backups are taken very frequently, because
    restoring the last differential can drastically decrease the number of transaction
    log backups you need to restore.


    #### Log Backup


    A transaction log backup can only be taken in the `FULL` or `BULK LOGGED` recovery
    models. When a transaction log backup is issued in the `FULL` recovery model,
    it backs up all transaction log records since the last backup. When it is performed
    in the `BULK LOGGED` recovery model, it also backs up any pages that include minimally
    logged transactions. When the backup is complete, SQL Server truncates `VLF`s
    within the transaction log until the first active `VLF` is reached.


    Transaction log backups are especially important on databases that support `OLTP`
    (online transaction processing), since they allow a point-in-time recovery to
    the point immediately before the disaster occurred. They are also the least resource-intensive
    type of backup, meaning that you can perform them more frequently than you can
    perform a full or differential backup without having a significant impact on database
    performance.


    ### Backup Media


    Databases can be backed up to `disk`, `tape`, or `URL`. Tape backups are deprecated
    however, so you should avoid using them; their support will be removed in a future
    version of SQL Server. The terminology surrounding backup media consists of backup
    devices, logical backup devices, media sets, media families, and backup sets.
    The structure of a media set is depicted in Figure [12-2](#333037_2_En_12_Chapter.xhtml#Fig2),
    and the concepts are discussed in the following sections.


    ![../images/333037_2_En_12_Chapter/333037_2_En_12_Fig2_HTML.jpg](images/333037_2_En_12_Chapter/333037_2_En_12_Fig2_HTML.jpg)

    Figure 12-2

    Backup media diagram'
