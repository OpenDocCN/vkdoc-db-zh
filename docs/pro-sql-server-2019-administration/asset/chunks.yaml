    Calculating the Highest Waits over a Defined Period


    ## Database Metadata


    In previous versions of SQL Server, if a DBA needed to discover information about
    specific pages within a database, he had no choice but to use the well-known,
    but undocumented, DBCC command, `DBCC PAGE`. SQL Server addresses this issue,
    by adding a new dynamic management view, called `sys.dm_db_page_info`. It is fully
    documented and supported by Microsoft, and provides the ability to return a page
    header, in a table-valued format. The function accepts the parameters detailed
    in Table 17-10.


    Table 17-10

    Parameters Accepted by `sys.dm_db_page_info`


    | Parameter | Description |

    | --- | --- |

    | Database_id | The `database_id` of the database that you wish to return details
    for. |

    | File_id | The `file_id` of the file that you wish to return details for. |

    | Page_id | The page_id of the page that you are interested in. |

    | Mode | Mode can be set to either `LIMITED` or `DETAILED`. The only difference
    between the modes is that when LIMITED is used, the description columns are not
    populated. This can improve performance against large tables. |


    In order to populate these parameters, an additional system function has been
    added, called `sys.fn_PageResCracker` . This function can be cross applied to
    a table, passing `%%physloc%%` as a parameter. Alternatively, if cross applied
    to the `sys.dm_exec_requests` DMV, or `sys.sysprocesses,` a deprecated system
    view, an additional column has been added, called `page_resource`, which can be
    passed as a parameter to the function. This is helpful, if you are diagnosing
    an issue with page waits. When passed a page resource/physical location object,
    the function will return the `database_id`, `file_id`, and `page_id` of each row
    in a result set.


    ### Caution


    When used with `%%physloc%%` as opposed to a `page_resource` object, the `sys.fn_PageResCracker`
    function returns a `slot_id`, as opposed to a `database_id`. Therefore, when used
    with `%%physloc%%`, the `DB_ID()` function should be used to obtain the database_id,
    and the `database_id` column returned by the function should be discarded.


    Table 17-11 details the columns that are returned by the `sys.dm_db_page_info`
    DMF.


    Table 17-11

    Columns Returned by `sys.dm_db_page_info`'
  raw: '### Note


    A query in SQL Server is either running, waiting for its turn on the processor
    (runnable), or waiting for another resource (suspended). If it is waiting for
    another resource, SQL Server records the reason why it is waiting and the duration
    of this wait.


    *Resource* *waits* occur when a thread requires access to an object, but that
    object is already in use, and therefore, the thread has to wait. This can include
    the thread waiting to take a lock out on an object or waiting for a disk resource
    to respond. *Queue waits* occur when a thread is idle and is waiting for a task
    to be assigned. This does not necessarily indicate a performance bottleneck, since
    it is often a background task, such as the Deadlock Monitor or Lazy Writer waiting
    until it is needed. *External waits* occur when a thread is waiting for an external
    resource, such as a linked server. The hidden gotcha here is that an external
    wait does not always mean that the thread is actually waiting. It could be performing
    an operation external to SQL Server, such as an extended stored procedure running
    external code.


    Any task that has been issued is in one of three states: running, runnable, or
    suspended. If a task is in the running state, then it is actually being executed
    on a processor. When a task is in the runnable state, it sits on the processor
    queue, awaiting its turn to run. This is known as a *signal wait*. When a task
    is suspended, it means that the task is waiting for any reason other than a signal
    wait. In other words, it is experiencing a resource wait, a queue wait, or an
    external wait. Each query is likely to alternate between the three states as it
    progresses.


    The `sys.dm_os_wait_stats` returns details of the cumulative waits for each wait
    type, since the instance started or since the statistics exposed by the DMV were
    reset. You can reset the statistics by running the command in Listing [17-16](#333037_2_En_17_Chapter.xhtml#PC16).
    This is important, as it gives a holistic view, as to the source of bottlenecks.


    ```

    DBCC SQLPERF (''sys.dm_os_wait_stats'', CLEAR) ;

    Listing 17-16

    Resetting Wait Stats

    ```


    The columns returned by `sys.dm_os_wait_stats` are detailed in Table [17-9](#333037_2_En_17_Chapter.xhtml#Tab9).


    Table 17-9


    sys.dm_os_wait_stats Columns


    | Column | Description |

    | --- | --- |

    | `wait_type` | The name of the wait type that has occurred. |

    | `waiting_tasks_count` | The number of tasks that have occurred on this wait
    type. |

    | `wait_time_ms` | The cumulative time of all waits against this wait type, displayed
    in milliseconds. This includes signal wait times. |

    | `max_wait_time_ms` | The maximum duration of a single wait against this wait
    type. |

    | `signal_wait_time_ms` | The cumulative time for all signal waits against this
    wait type. |


    To find the wait types that are responsible for the highest cumulative wait time,
    run the query in Listing [17-17](#333037_2_En_17_Chapter.xhtml#PC17). This query
    adds a calculated column to the result set, which deducts the signal wait time
    from the overall wait time to avoid CPU pressure from skewing the results.


    ```

    SELECT *

    , wait_time_ms - signal_wait_time_ms ResourceWaits

    FROM sys.dm_os_wait_stats

    ORDER BY wait_time_ms - signal_wait_time_ms DESC ;

    Listing 17-17

    Finding the Highest Waits

    ```


    Of course, signal wait time can be a cause for concern in its own right, potentially
    identifying the processor as a bottleneck, and you should analyze it. Therefore,
    use the query in Listing [17-18](#333037_2_En_17_Chapter.xhtml#PC18) to calculate
    the percentage of overall waits, which are due to a task waiting for its turn
    on the processor. The value is displayed for each wait type, and it is followed
    by a row that displays the overall percentage for all wait types.


    ```

    SELECT ISNULL(wait_type, ''Overall Percentage:'') wait_type

    ,PercentageSignalWait

    FROM (

    SELECT wait_type

    ,CAST(100\. * SUM(signal_wait_time_ms)

    / SUM(wait_time_ms) AS NUMERIC(20,2)) PercentageSignalWait

    FROM sys.dm_os_wait_stats

    WHERE wait_time_ms > 0

    GROUP BY wait_type WITH ROLLUP

    ) a

    ORDER BY PercentageSignalWait DESC ;

    Listing 17-18

    Calculating Signal Waits

    ```


    To find the highest waits over a defined period, you need to sample the data twice
    and then deduct the first sample from the second sample. The script in Listing
    [17-19](#333037_2_En_17_Chapter.xhtml#PC19) samples the data twice with a 10-minute
    interval and then displays the details of the five highest waits within that interval.


    ```

    DECLARE @Waits1 TABLE

    (

    wait_type NVARCHAR(128),

    wait_time_ms BIGINT

    ) ;

    DECLARE @Waits2 TABLE

    (

    wait_type NVARCHAR(128),

    wait_time_ms BIGINT

    ) ;

    INSERT INTO @waits1

    SELECT wait_type

    ,wait_time_ms

    FROM sys.dm_os_wait_stats ;

    WAITFOR DELAY ''00:10:00'' ;

    INSERT INTO @Waits2

    SELECT wait_type

    ,wait_time_ms

    FROM sys.dm_os_wait_stats ;

    SELECT TOP 5

    w2.wait_type

    ,w2.wait_time_ms - w1.wait_time_ms

    FROM @Waits1 w1

    INNER JOIN @Waits2 w2

    ON w1.wait_type = w2.wait_type

    ORDER BY w2.wait_time_ms - w1.wait_time_ms DESC ;

    Listing 17-19

    Calculating the Highest Waits over a Defined Period

    ```


    ## Database Metadata


    In previous versions of SQL Server, if a DBA needed to discover information about
    specific pages within a database, he had no choice but to use the well-known,
    but undocumented, DBCC command, `DBCC PAGE`. SQL Server addresses this issue,
    by adding a new dynamic management view, called `sys.dm_db_page_info`. It is fully
