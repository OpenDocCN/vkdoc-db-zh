    `Listing 15-10` Reconfiguring Log Shipping


    The final step is to reconfigure monitoring so it correctly monitors our new configuration.
    We can achieve this for our log shipping environment by using the script in `Listing
    15-11`. This script connects to both the primary and secondary servers, so we
    should run it in `SQLCMD` mode.


    ```

    :connect drserver\prosqldr

    USE msdb

    GO

    EXEC master.dbo.sp_change_log_shipping_secondary_database

    @secondary_database = N''database_name'',

    @threshold_alert_enabled = 0 ;

    GO

    :connect primaryserver\prosqladmin

    USE msdb

    GO

    EXEC master.dbo.sp_change_log_shipping_primary_database

    @database=N''database_name'',

    @threshold_alert_enabled = 0 ;

    GO

    ```

    `Listing 15-11` Reconfiguring Monitoring


    Because we have now created the backup, copy, and restore jobs on both servers,
    switching the roles after subsequent failovers is much more straightforward. From
    now on, after we have failed over, we can switch roles by simply disabling the
    backup job on the original primary server and the copy and restore jobs on the
    secondary server, and then enabling the backup job on the new primary server and
    the copy and restore jobs on the new secondary server.'
