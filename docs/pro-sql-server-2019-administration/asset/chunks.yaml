  raw: '### Configuring the Replay


    The replay is started using the Administration Tool, which relies on two configuration
    files, `DReplay.exe.preprocess.config` and `DReplay.exe.replay.config`. The first
    of these configuration files controls the building of the intermediate files and
    the second controls replay options and output options. Both files are located
    within the 32-bit shared directory, so with a default installation, the fully
    qualified paths are `C:\Program Files (x86)\Microsoft SQL Server\150\Tools\Binn\DReplay.exe.preprocess.config`
    and `C:\Program Files (x86)\Microsoft SQL Server\150\Tools\Binn\DReplay.exe.replay.config`,
    respectively. Table [21-2](#333037_2_En_21_Chapter.xhtml#Tab2) details the options
    you can configure in `DReplay.exe.preprocess.config` .


    Table 21-2


    DReplay.exe.preprocess.config Options


    | Option | Description |

    | --- | --- |

    | `IncSystemSession` | Specifies if activity captured from system sessions should
    be included in the replay. |

    | `MaxIdleTime` | Specifies a limit for the amount of idle time in seconds.• `-1`
    specifies that the idle time between activities should be the same as the original
    trace.• `0` specifies that there should be no idle time between activities. |


    The default contents of the `DReplay.exe.preprocess.config` file are shown in
    Listing [21-3](#333037_2_En_21_Chapter.xhtml#PC3).


    ```


    No


    Listing 21-3

    DReplay.exe.preprocess.config

    ```


    Table [21-3](#333037_2_En_21_Chapter.xhtml#Tab3) details the options you can configure
    within `DReplay.exe.replay.config` .


    Table 21-3


    DReplay.exe.replay.config Options


    | Option | Category | Description |

    | --- | --- | --- |

    | `Server` | Replay options | The server\instance name of the target server. |

    | `SequencingMode` | Replay options | Specifies the mode to be used for scheduling
    events. The possible options are• Synchronization, which indicates that the order
    of transactions is subject to time-based synchronization, across the clients,
    which is useful for performance testing.• Stress, which is the default option,
    indicates that transactions are fired as quickly as possible, without time-based
    synchronization. This is useful for load testing. |

    | `StressScaleGranularity` | Replay options | When the `SequenceMode` is set to
    `Stress`, `StressScaleGranularity` determines how to scale activity on a SPID.• `SPID`
    indicates that connections on a single SPID should be scaled as if they were a
    single SPID.• `Connection` indicates that connections on a single SPID should
    be scaled as if they were separate connections. |

    | `ConnectTimeScale` | Replay options | A percentage value that indicates if connection
    time should be reduced during the replay when the `SequenceMode` is `Stress`.
    `100` indicates 100% of connection time is included. Lower values reduce the simulated
    connection times accordingly. |

    | `ThinkTimeScale` | Replay options | A percentage value that indicates if the
    user thinks time should be reduced during the replay when `SequenceMode` is `Stress`.
    `100` indicates 100% of think time is included, so transactions replay at the
    speed they were captured. Specifying lower values reduces the interval. |

    | `UseConnectionPooling` | Replay options | Specifies if connection pooling should
    be used on the clients. A *connection pool* is a cache of connections that subsequent
    connection can reuse. |

    | `HealthmonInterval` | Replay options | When `SequenceMode` is set to `Synchronization`,
    `HealthmonInterval` determines how often the health monitor runs, specified in
    seconds. `-1` indicates that the health monitor is disabled. |

    | `QueryTimeout` | Replay options | Specifies the query timeout value in seconds.
    `-1` indicates that it is disabled. |

    | `ThreadsPerClient` | Replay options | Specifies the number of threads to use
    for the replay on each client. |

    | `RecordRowCount` | Output options | Specifies if you should include a row count
    for each result set. |

    | `RecordResultSet` | Output options | Specifies if you should save the contents
    of each record set. |


    Listing [21-4](#333037_2_En_21_Chapter.xhtml#PC4) shows an example of the `DReplay.exe.replay.config`
    file, which has been modified for our environment to allow us to perform a performance
    test by simulating multiple connections.


    ```


