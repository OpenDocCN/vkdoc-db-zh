- fmt: '### Tip


    If you wish to evaluate multiple policies, select **Evaluate** from the context
    menu of the **Policies** folder in **Object Explorer**, and then select which
    policies you would like to evaluate. All selected policies are then evaluated
    and displayed in the **Evaluation Results** page.


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig13_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig13_HTML.jpg)


    Figure 23-13


    The **Evaluate Policies** dialog box


    ### Tip


    We created the `Chapter22` database in Chapter [22](#333037_2_En_22_Chapter.xhtml)
    of this book. If you do not have a `Chapter22` database, you can create it using
    the statement `CREATE DATABASE Chapter22 ;`


    Click the **View** link in the **Details** column to invoke the **Results Detailed
    View** dialog box, as illustrated in Figure [23-14](#333037_2_En_23_Chapter.xhtml#Fig14).
    This information is useful for failed policy evaluations because it provides the
    details of the actual value that did not meet the policy’s condition.


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig14_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig14_HTML.jpg)


    Figure 23-14


    The **Results Detailed View** dialog box


    #### Creating a Policy That Prevents Unwanted Activity


    Another very useful simple policy is one that helps you prevent developers from
    obfuscating their stored procedures. Procedure obfuscation arguably has a place
    in third-party software, in order to prevent the theft of intellectual property.
    For in-house applications, however, there is no need to use obfuscation, and doing
    so can lead to issues with diagnosing performance issues. Additionally, if the
    development teams are not using source control, it can lead to the loss of code,
    in the event of a disaster. In this instance, rather than just evaluating the
    policy on an ad hoc basis, we want to prevent stored procedures that are obfuscated
    from being created. This means that during code releases, you do not need to review
    every stored procedure for the `WITH ENCRYPTION` syntax. Instead, you can expect
    the policy to be evaluated and the `CREATE PROCEDURE` statement to be rolled back,
    preventing this from occurring.


    Before we create this policy, we need to ensure that nested triggers are enabled
    on the instance. This is because the policy will be enforced using DDL triggers,
    and nested triggers are a hard technical requirement for the **On Change: Prevent**
    mode. You can enable nested triggers using `sp_configure`, with the script in
    Listing [23-5](#333037_2_En_23_Chapter.xhtml#PC5); however, they are turned on
    by default.


    ```

    EXEC sp_configure ''nested triggers'', 1 ;

    RECONFIGURE

    Listing 23-5

    Enabling Nested Triggers

    ```


    After creating the policy, you need to create a condition. When creating the condition,
    as illustrated in Figure [23-15](#333037_2_En_23_Chapter.xhtml#Fig15), we use
    the `@IsEncrypted` property of the **StoredProcedure** facet.


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig15_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig15_HTML.jpg)


    Figure 23-15


    The **Create New Condition** dialog box


    In the **Create New Policy** dialog box, illustrated in Figure [23-16](#333037_2_En_23_Chapter.xhtml#Fig16),
    we could use the **Against Targets** area to configure which targets should be
    evaluated by the policy; the setting defaults to **Every Stored Procedure In Every
    Database**, however. This suits our needs, so we do not need to create a condition.
    In the **Evaluation Mode** drop-down, we select **On Change: Prevent**; this makes
    it so it is not possible to create stored procedures on our `SQLSERVER\MASTERSERVER`
    instance if it is obfuscated. We also make sure to check the **Enabled** box so
    that the policy is enabled when it is created.


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig16_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig16_HTML.jpg)


    Figure 23-16


    The **Create New Policy** dialog box


    To demonstrate the prevention in action, we attempt to create a stored procedure
    using the script in Listing [23-6](#333037_2_En_23_Chapter.xhtml#PC6).


    ```

    CREATE PROCEDURE ObfuscatedProc

    WITH ENCRYPTION

    AS

    BEGIN

    SELECT *

    FROM sys.tables

    END

    Listing 23-6

    Creating a Stored Procedure with NOLOCK

    ```


    Figure [23-17](#333037_2_En_23_Chapter.xhtml#Fig17) shows the error that is thrown
    when we attempt to run this `CREATE PROCEDURE` statement.


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig17_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig17_HTML.jpg)


    Figure 23-17


    The error thrown by the policy trigger


    ### Creating an Advanced Policy


    PBM is extensible, and if you can’t create the required condition using the built-in
    facet properties, the **Expression Advanced Editor** allows you to use a wide
    range of functions. These functions include `ExecuteSql()` and `ExecuteWql()`,
    which allow you to build your own SQL and WQL (Windows Query Language), respectively.
    The `ExecuteSql()` and `ExecuteWql()` functions are not T-SQL functions. They
    are part of the PBM framework.


    You can use these functions to write queries against either the Database Engine
    or Windows and evaluate the result. The functions are called once for each target.
    So, for example, if they are used with the **Server** facet, they only run once,
    but if they are used against the **Table** facet, they are evaluated for every
    target table. If multiple columns are returned when you are using `ExecuteSql()`,
    then the first column of the first row is evaluated. If multiple columns are returned
    when you are using `ExecuteWql()`, then an error is thrown. For example, imagine
    that you want to ensure that the SQL Server Agent service starts. You can achieve
    this in T-SQL by running the query in Listing [23-7](#333037_2_En_23_Chapter.xhtml#PC7).
    This query uses the `LIKE` operator because the `servicename` column also includes
    the name of the service, and the `LIKE` operator makes the query generic so that
    it can be run on any instance, without needing to be modified.


    ```

    SELECT status_desc

    FROM sys.dm_server_services

    WHERE servicename LIKE ''SQL Server Agent%'' ;

    Listing 23-7

    Checking to Make Sure SQL Server Agent Is Running with T-SQL

    ```


    Or alternatively, you can achieve the same result by using the WQL query in Listing
    [23-8](#333037_2_En_23_Chapter.xhtml#PC8).


    ### Note


    You can find an WQL reference at [`https://msdn.microsoft.com/en-us/library/aa394606`](https://msdn.microsoft.com/en-us/library/aa394606)
    `(v=vs.85).aspx`.


    ```

    SELECT State FROM Win32_Service  WHERE Name ="SQLSERVERAGENT$MASTERSERVER"

    Listing 23-8

    Checking That SQL Server Agent Is Running with WQL

    ```


    To use the T-SQL version of the query, you need to use the `ExecuteSql()` function,
    which accepts the parameters in Table [23-1](#333037_2_En_23_Chapter.xhtml#Tab1).


    Table 23-1


    `ExecuteSQL()` Parameters


    | Parameter | Description |

    | --- | --- |

    | `returnType` | Specifies the return type expected from the query. Acceptable
    values are `Numeric`, `String`, `Bool`, `DateTime`, `Array`, and `GUID`. |

    | `sqlQuery` | Specifies the query that should run. |


    To use the WQL version of the query, you need to use `ExecuteWql()`, which accepts
    the parameters described in Table [23-2](#333037_2_En_23_Chapter.xhtml#Tab2).


    Table 23-2


    `ExecuteWQL()` Parameters


    | Parameter | Description |

    | --- | --- |

    | `returnType` | Specifies the return type expected from the query. Acceptable
    values are `Numeric`, `String`, `Bool`, `DateTime`, `Array`, and `GUID`. |

    | `namespace` | Specifies the WQL namespace that the query should be executed
    against. |

    | `wqlQuery` | Specifies the query that should run. |


    Therefore, if you are using the T-SQL approach, your condition would use the script
    in Listing [23-9](#333037_2_En_23_Chapter.xhtml#PC9) in the Conditions editor
    of PBM (it will not work directly in SSMS).


    ```

    ExecuteSql(''string'', ''SELECT status_desc FROM sys.dm_server_services WHERE
    servicename LIKE "SQL Server Agent%"'')

    Listing 23-9

    ExecuteSQL()

    ```'
