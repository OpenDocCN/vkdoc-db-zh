  trans: '# 生成要跟踪的活动


    根据您的具体场景，您可能希望捕获真实的用户活动；为此，您需要使用如 `SQLStress` 这样的工具，或者编写脚本活动。在我们的情况下，我们编写脚本活动以供跟踪（参见
    清单 21-9）。


    ```sql

    USE Chapter21

    GO

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number  1000000

    GO 50

    SELECT TOP 10 PERCENT *

    FROM dbo.Customers

    GO 100

    ```

    清单 21-9: 生成活动


    现在，我们可以使用 清单 21-10 中的命令停止跟踪。


    ```sql

    ALTER EVENT SESSION DReplay

    ON SERVER

    STATE = stop;

    GO

    ```

    清单 21-10: 停止跟踪


    ## 重放跟踪


    现在我们已经捕获了一个跟踪，我们将其转换为 `.trc` 文件，然后使用分布式重放管理工具从命令行进行预处理，然后再进行重放。


    ### 转换跟踪文件


    为了将我们的 `.xel` 文件用于分布式重放，我们首先需要将其转换为 `.trc` 文件。我们借助 `readtrace.exe` 命令行工具来完成此操作，该工具使用
    RML（重放标记语言）来转换数据。`ReadTrace` 是 Microsoft 的 SQL Server RML 实用工具包的一部分，您可以从 [`www.microsoft.com/en-gb/download/details.aspx?id=4511`](http://www.microsoft.com/en-gb/download/details.aspx%253Fid%253D4511)
    下载。以下示例假设您已安装此工具包。


    > **提示**

    > 前面的链接包含了所有 RML 实用工具，本章使用的是此版本的工具。不过，可以下载更新版本的 `ReadTrace`，作为 DEA（数据库实验助手）的一部分，该工具可在
    [`www.microsoft.com/en-us/download/details.aspx?id=54090`](http://www.microsoft.com/en-us/download/details.aspx%253Fid%253D54090)
    找到。


    在这里，我们通过导航到 `C:\Program Files\Microsoft Corporation\RMLUtils` 文件夹并运行带有 表 21-5
    中详细参数的 `ReadTrace.exe` 来转换我们的跟踪文件。


    表 21-5: ReadTrace 参数


    | 参数 | 描述 |

    | --- | --- |

    | `-I` | 要转换的 `.xel` 文件的完全限定文件名。 |

    | `-O` | 用于输出结果的文件夹。这包括日志文件以及 `.trc` 文件。 |

    | `-a` | 阻止分析处理。 |

    | `-MS` | 镜像到单个 `.trc` 文件，而不是为每个 SPID 创建单独的文件。 |


    > **提示**

    > 您可以在 SQL Server 的 RML 实用工具帮助文件中找到所有 `ReadTrace` 参数的完整描述。


    我们使用 清单 21-11 中的命令运行 `ReadTrace`。


    > **提示**

    > 在运行此脚本前，请记得更改输入和输出文件的文件名及路径。即使您使用了相同的位置，您的 `.xel` 文件名也会包含一个不同的唯一标识符。


    ```cmd

    readtrace.exe -I"C:\MSSQL\DReplay_0_130737313343740000.xel" -O"C:\MSSQL\DReplayTraceFile"
    -a -MS

    ```

    清单 21-11: 使用 ReadTrace 转换为 .trc


    ### 预处理跟踪数据


    管理工具是一个命令行实用程序，可以使用 表 21-6 中的选项运行。


    表 21-6: 管理工具选项


    | 选项 | 描述 |

    | --- | --- |

    | `Preprocess` | 通过创建中间文件来准备跟踪数据 |

    | `Replay` | 将跟踪分派到客户端并开始重放 |

    | `Status` | 显示控制器的当前状态 |

    | `Cancel` | 取消当前操作 |


    当使用 `preprocess` 选项运行时，管理工具接受 表 21-7 中详细说明的参数。


    表 21-7: 预处理参数


    | 参数 | 全名 | 描述 |

    | --- | --- | --- |

    | `-m` | `Controller` | 托管分布式重放控制器的服务器名称。 |

    | `-i` | `input_trace_file` | 跟踪文件的完全限定文件名。如果存在滚动更新文件，请指定一个逗号分隔的列表。 |

    | `-d` | `controller_working_dir` | 存储中间文件的文件夹。 |

    | `-c` | `config_file` | `DReplay.exe.preprocess.config` 配置文件的完全限定文件名。 |

    | `-f` | `status_interval` | 显示状态消息的频率，以毫秒为单位指定。 |


    要预处理我们的跟踪文件，可以使用 清单 21-12 中的命令。此过程会创建一个中间文件，然后可以将该文件分派到客户端，准备进行重放。


    > **提示**

    > 在运行此脚本前，请更改文件路径以匹配您的配置。


    ```cmd

    dreplay preprocess -m controller  -i "C:\MSSQL\DReplayTraceFile\SPID00000.trc"
    -d "c:\Distributed Replay\WorkingDir" -c "C:\Program Files (x86)\Microsoft SQL
    Server\150\Tools\Binn\DReplay.exe.preprocess.config"

    ```

    清单 21-12: 预处理跟踪


    ### 开始重放


    您可以使用分布式重放管理工具开始重放。当工具与 `replay` 选项一起使用时，接受的参数在 表 21-8 中详细说明。


    表 21-8: 重放参数


    | 参数 | 全名 | 描述 |

    | --- | --- | --- |

    | `-m` | `Controller` | 托管分布式重放控制器的服务器名称 |

    | `-d` | `controller_working_dir` | 存储中间文件的文件夹 |

    | `-o` | `output` | 指定应捕获客户端的重放活动并保存到结果目录 |

    | `-s` | `target_server` | 目标服务器的服务器\实例名称 |

    | `-w` | `clients` | 一个逗号分隔的客户端列表 |

    | `-c` | `config_file` | `DReplay.exe.replay.config` 配置文件的完全限定名称 |

    | `-f` | `status_interval` | 显示状态的频率，以秒为单位指定 |


    因此，要针对我们的目标服务器重放跟踪，使用 `Client1` 和 `Client2`，我们使用 清单 21-13 中的命令。


    ```cmd

    dreplay replay -m controller -d "c:\Distributed Replay\WorkingDir" -s Target -o
    -w Client1,Client2 -c "C:\Program Files (x86)\Microsoft SQL Server\150\Tools\Binn\DReplay.Exe.Replay.config"

    ```

    清单 21-13: 重放跟踪


    > **提示**

    > 输出的第一行可能指示没有事件被分派。这不是问题——这只是意味着事件分派尚未开始。'
- fmt: '## Summary


    Distributed Replay provides a mechanism to replay traces captured with either
    `Profiler` or `Extended Events`. Unlike its predecessor, `Profiler`, which is
    deprecated for use with the `Database Engine`, Distributed Replay can replay the
    workload from multiple servers, which allows you to perform load testing and simulate
    multiple concurrent connections.


    The `controller` is the server running the Distributed Replay Controller service,
    which synchronizes the replay and can be configured to work in two different modes:
    `stress` and `synchronization`. In `stress` mode, the controller fires the events
    as quickly as possible, while in `synchronization` mode, it fires the events in
    the order in which they were captured.


    The `clients` are the servers running the Distributed Replay Client service, which
    replays the trace. Distributed Replay supports a maximum of 16 clients. The `target`
    is the instance to which the events are dispatched by the clients.


    Although it is possible to replay a trace captured in `Profiler`, `Extended Events`
    use less resources and provide more flexibility. Therefore, consider using this
    method to capture the trace. In order to replay an `Extended Event` session with
    Distributed Replay, however, you first need to convert the `.xel` file to a `.trc`
    file. You can do this using `RML Utilities`, which are available for download
    at [`www.microsoft.com`](http://www.microsoft.com).


    The Distributed Replay Administration Tool is a command-line tool that is used
    to both preprocess and run the trace. When run in preprocess mode, it creates
    an intermediate file. When run in replay mode, it generates dispatch files on
    the clients and uses these files to dispatch the events to the target.


    # 22. Automating Maintenance Routines


    Automation is a critical part of database administration because it reduces the
    total cost of ownership (`TCO`) of the enterprise by allowing repeatable tasks
    to be carried out with little or no human intervention. SQL Server provides a
    rich set of functionality for automating routine DBA activity, including a scheduling
    engine, decision-tree logic, and a comprehensive security model. In this chapter,
    we discuss how you can harness `SQL Server Agent` to reduce the maintenance burden
    on your time. We also look at how you can reduce effort by using multiserver jobs,
    which allow you to operate a consistent set of routines across the enterprise.


    ## SQL Server Agent


    `SQL Server Agent` is a service that provides the ability to create automated
    routines with decision-based logic and schedule them to run one time only, on
    a reoccurring basis, when the `SQL Server Agent` service starts or when a `CPU`
    idle condition occurs.


    `SQL Server Agent` also controls `alerts`, which allow you to respond to a wide
    range of conditions, including errors, performance conditions, or `WMI` (Windows
    Management Instrumentation) events. Responses can include sending e-mails or running
    tasks.


    After introducing you to the concepts surrounding `SQL Server Agent`, the following
    sections discuss the `SQL Server Agent` security model, how to create and manage
    jobs, and how to create alerts.


    ### SQL Server Agent Concepts


    `SQL Server Agent` is implemented using `jobs`, which orchestrate the tasks that
    are run; `schedules`, which define when the tasks run; `alerts`, which can respond
    to events that occur within SQL Server; and `operators`, which are users (usually
    DBAs) who are notified of occurrences, such as job status or alerts that have
    been triggered. The following sections introduce you to each of these concepts.


    #### Schedules


    A `schedule` defines the time or condition that triggers a job to start running.
    A schedule can be defined as follows:


    - `One time`: Allows you to specify a specific date and time.

    - `Start automatically when SQL Server Agent starts`: Useful if a set of tasks
    should run when the instance starts, assuming that the `SQL Server Agent` service
    is configured to start automatically.

    - `Start when CPU becomes idle`: Useful if you have resource-intensive jobs that
    you do not wish to impact user activity.

    - `Recurring`: Allows you to define a complex schedule, with start and end dates,
    that can reoccur daily, weekly, or monthly. If you schedule a job to run weekly,
    then you can also define multiple days on which it should run. If you define the
    schedule as daily, you can opt to have the trigger occur once daily, on an hourly
    basis, every minute, or even as frequently as every 10 seconds. If the schedule
    is reoccurring based on second, minute, or hour, then it is possible to define
    start and stop times within a day. This means that you can schedule a job to run
    every minute, between 18:00 and 20:00, for example.


    ### Tip


    A recurring daily schedule is actually used to define a schedule that runs daily,
    hourly, every minute, or every second.


    You can create individual schedules for each job, or you can choose to define
    a schedule and use this to trigger multiple jobs that you need to run at the same
    time—for example, when you have multiple maintenance jobs you want to run when
    the `CPU` is idle. In this case, you use the same schedule for all of these jobs.
    Another example is when you have multiple `ETL` running against different databases.
    If you have a small `ETL` window, you may want all of these jobs to run at the
    same time. Here again, you can define a single schedule and use it for all of
    the `ETL` jobs. This approach can reduce administration; if, for example, the
    `ETL` window moves, you can change a single schedule rather than many schedules.


    #### Operators


    An `operator` is an individual or team that is configured to receive a notification
    of job status or when an alert is triggered. You can configure operators to be
    notified via e-mail, `NET SEND`, or the `pager`. It is worth noting, however,
    that the `pager` and `NET SEND` options are deprecated and you should avoid using
    them.


    If you choose to configure operators so they are notified through e-mail, then
    you must also configure `Database Mail`, discussed later in this chapter, specifying
    the address and port of the `SMTP Replay server` that delivers the messages. If
    you configure operators to be notified via `NET SEND`, then the `SQL Server Agent`
    Windows service is dependent on the `NET SEND` service, as well as the `SQL Server`
    service, in order to start. If you configure operators to be notified by `pager`,
    then you must use `Database Mail` to relay the messages to the e-mail to pager
    service.


    ### Caution


    You increase your operational risk by introducing reliance on the `NET SEND` service.


    When using `pager` alerts, you can configure each operator with days and times
    that they are on duty. You can configure this in `24/7` organizations that run
    support shifts or “follow the sun” support models for operational support, which
    see shifts being passed to support teams in different global regions. This functionality
    also allows you to configure each operator with different shift patterns on weekdays,
    Saturdays, and Sundays.'
