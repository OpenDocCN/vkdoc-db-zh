- fmt: '# 15. Implementing Log Shipping


    As discussed in Chapter [13](#333037_2_En_13_Chapter.xhtml), log shipping is a
    technology you can use to implement disaster recovery and the scale out of read-only
    reporting. It works by taking the transaction log backups of a database, copying
    them to one or more secondary servers, and then restoring them, in order to keep
    the secondary server(s) synchronized. This chapter demonstrates how to implement
    log shipping for disaster recovery (DR). You also discover how to monitor and
    fail over log shipping.


    > **Note:** For the purpose of the demonstrations in this chapter, we use a domain,
    consisting of a domain controller and four stand-alone servers, each with an instance
    of SQL Server installed. The server\instance names are `PRIMARYSERVER\PROSQLADMIN`,
    `DRSERVER\PROSQLDR`, `REPORTSERVER\PROSQLREPORTS`, and `MONITORSERVER\PROSQLMONITOR`,
    respectively.


    ## Implementing Log Shipping for DR


    Before we begin to implement log shipping for disaster recovery, we first create
    a database that we will use for the demonstrations in this chapter. The script
    in Listing [15-1](#333037_2_En_15_Chapter.xhtml#PC1) creates a database called
    `Chapter15` with its recovery model set to `FULL`. We create one table within
    the database and populate it with data.


    ```sql

    --Create the database

    CREATE DATABASE Chapter15;

    GO

    ALTER DATABASE Chapter15 SET RECOVERY FULL;

    GO

    USE Chapter15

    GO

    --Create and populate numbers table

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE;

    --Create and populate name pieces

    DECLARE @Names TABLE

    (

    FirstName        VARCHAR(30),

    LastName        VARCHAR(30)

    );

    INSERT INTO @Names

    VALUES(''Peter'', ''Carter''),

    (''Michael'', ''Smith''),

    (''Danielle'', ''Mead''),

    (''Reuben'', ''Roberts''),

    (''Iris'', ''Jones''),

    (''Sylvia'', ''Davies''),

    (''Finola'', ''Wright''),

    (''Edward'', ''James''),

    (''Marie'', ''Andrews''),

    (''Jennifer'', ''Abraham'') ;

    --Create and populate Customers table

    CREATE TABLE dbo.Customers

    (

    CustomerID          INT            NOT NULL    IDENTITY    PRIMARY KEY,

    FirstName           VARCHAR(30)    NOT NULL,

    LastName            VARCHAR(30)    NOT NULL,

    BillingAddressID    INT            NOT NULL,

    DeliveryAddressID   INT            NOT NULL,

    CreditLimit         MONEY          NOT NULL,

    Balance             MONEY          NOT NULL

    );

    SELECT * INTO #Customers

    FROM

    (SELECT

    (SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName,

    (SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) BillingAddressID,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) DeliveryAddressID,

    (SELECT TOP 1 CAST(RAND() * Number AS INT) * 10000

    FROM @Numbers

    ORDER BY NEWID()) CreditLimit,

    (SELECT TOP 1 CAST(RAND() * Number AS INT) * 9000

    FROM @Numbers

    ORDER BY NEWID()) Balance

    FROM @Numbers a

    CROSS JOIN @Numbers b

    ) a;

    INSERT INTO dbo.Customers

    SELECT * FROM #Customers;

    GO

    ```


    **Listing 15-1** Creating the Database to Be Log Shipped


    For the purpose of this demonstration, we would like to configure disaster recovery
    for the `Chapter15` database so that we have an RPO (recovery point objective)
    of 10 minutes. We will also implement a 10-minute load delay on the DR server.
    This means that if an application team notifies us immediately of an incident
    that has led to data loss—for example, a user accidently deletes rows from a table—then
    we are able to rectify the issue by using the data on the DR server before the
    log that contains the erroneous transaction is restored.


    ### GUI Configuration


    We can configure log shipping for our `Chapter15` database through SQL Server
    Management Studio (SSMS). To do this, we select **Properties** from the context
    menu of the database and navigate to the **Transaction Log Shipping** page, which
    is displayed in Figure [15-1](#333037_2_En_15_Chapter.xhtml#Fig1). The first task
    on this page is to check the **Enable This As The Primary Database In A Log Shipping
    Configuration** check box.


    ![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig1_HTML.jpg](images/333037_2_En_15_Chapter/333037_2_En_15_Fig1_HTML.jpg)


    **Figure 15-1** The Transaction Log Shipping page


    We can now use the **Backup Settings** button to display the **Transaction Log
    Backup Settings** screen. On this screen, we enter the UNC (Universal Naming Convention)
    to the share that will be used for storing the log backups that log shipping takes.
    Because this share is actually configured on our primary server, we also enter
    the local path in the field below. The account that will be used to run the backup
    job needs to be granted read and change permissions on this share. By default,
    this will be the SQL Server service account, but for more granular security, it
    is possible to configure log shipping jobs to run under a proxy account. Proxy
    accounts are discussed in Chapter [22](#333037_2_En_22_Chapter.xhtml).


    We then configure how long we want our backup files to be retained before they
    are deleted. The value that you select for this depends on your enterprise’s requirements,
    but if your backup files are offloaded to tape, then you should make the files
    available long enough to allow the enterprise backup job to run, and you should
    potentially build in enough time for it to fail and then succeed on the following
    cycle. You should also consider your requirements for ad hoc restores. For example,
    if a project notices a data issue and requests a restore, you want to be able
    to retrieve the relevant backups from local disk, if possible. Therefore, consider
    how long you should give projects to notice an issue and request a restore before
    SQL Server removes the local copy of the backups. Backup strategies are discussed
    further in Chapter [12](#333037_2_En_12_Chapter.xhtml).


    You should also specify how soon you want an alert to be generated if no log backup
    occurs. To be notified of any backup failure, you can configure the value to be
    a minute longer than your backup schedule. In some environments, however, it may
    be acceptable to miss a few backups. In such an instance, you may set the value
    to a larger interval so that you are not flooded with failed backup alerts during
    maintenance windows and other such situations.


    The **Set Backup Compression** drop-down determines if backup compression should
    be used to reduce network traffic. The default is to take the configuration from
    the instance, but you can override this by specifically choosing to use it, or
    not use it, for the backups taken by the log shipping job. The **Transaction Log
    Backup Settings** screen is illustrated in Figure [15-2](#333037_2_En_15_Chapter.xhtml#Fig2).


    ![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig2_HTML.jpg](images/333037_2_En_15_Chapter/333037_2_En_15_Fig2_HTML.jpg)


    **Figure 15-2** The Transaction Log Backup Settings screen


    Clicking the **Schedule** button causes the **New Job Schedule** screen to be
    invoked. This screen, which is illustrated in Figure [15-3](#333037_2_En_15_Chapter.xhtml#Fig3),
    is the standard SQL Server Agent screen used for creating job schedules, except
    that it has been prepopulated with the default name of the log shipping backup
    job. Because we are trying to achieve an RPO of 10 minutes, we configure the backup
    job to run every 5 minutes. This is because we also need to allow time for the
    copy job to run. In a DR planning, we cannot assume that the primary server will
    be available for retrieving our log backup.


    ![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig3_HTML.jpg](images/333037_2_En_15_Chapter/333037_2_En_15_Fig3_HTML.jpg)


    **Figure 15-3**'
  raw: '# 15. Implementing Log Shipping


    As discussed in Chapter [13](#333037_2_En_13_Chapter.xhtml), log shipping is a
    technology you can use to implement disaster recovery and the scale out of read-only
    reporting. It works by taking the transaction log backups of a database, copying
    them to one or more secondary servers, and then restoring them, in order to keep
    the secondary server(s) synchronized. This chapter demonstrates how to implement
    log shipping for disaster recovery (DR). You also discover how to monitor and
    fail over log shipping.


    ### Note


    For the purpose of the demonstrations in this chapter, we use a domain, consisting
    of a domain controller and four stand-alone servers, each with an instance of
    SQL Server installed. The server\instance names are `PRIMARYSERVER\PROSQLADMIN`,
    `DRSERVER\PROSQLDR`, `REPORTSERVER\PROSQLREPORTS`, and `MONITORSERVER\PROSQLMONITOR`,
    respectively.


    ## Implementing Log Shipping for DR


    Before we begin to implement log shipping for disaster recovery, we first create
    a database that we will use for the demonstrations in this chapter. The script
    in Listing [15-1](#333037_2_En_15_Chapter.xhtml#PC1) creates a database called
    `Chapter15` with its recovery model set to `FULL`. We create one table within
    the database and populate it with data.


    ```

    --Create the database

    CREATE DATABASE Chapter15;

    GO

    ALTER DATABASE Chapter15 SET RECOVERY FULL;

    GO

    USE Chapter15

    GO

    --Create and populate numbers table

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE;

    --Create and populate name pieces

    DECLARE @Names TABLE

    (

    FirstName        VARCHAR(30),

    LastName        VARCHAR(30)

    );

    INSERT INTO @Names

    VALUES(''Peter'', ''Carter''),

    (''Michael'', ''Smith''),

    (''Danielle'', ''Mead''),

    (''Reuben'', ''Roberts''),

    (''Iris'', ''Jones''),

    (''Sylvia'', ''Davies''),

    (''Finola'', ''Wright''),

    (''Edward'', ''James''),

    (''Marie'', ''Andrews''),

    (''Jennifer'', ''Abraham'') ;

    --Create and populate Customers table

    CREATE TABLE dbo.Customers

    (

    CustomerID          INT            NOT NULL    IDENTITY    PRIMARY KEY,

    FirstName           VARCHAR(30)    NOT NULL,

    LastName            VARCHAR(30)    NOT NULL,

    BillingAddressID    INT            NOT NULL,

    DeliveryAddressID   INT            NOT NULL,

    CreditLimit         MONEY          NOT NULL,

    Balance             MONEY          NOT NULL

    );

    SELECT * INTO #Customers

    FROM

    (SELECT

    (SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName,

    (SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) BillingAddressID,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) DeliveryAddressID,

    (SELECT TOP 1 CAST(RAND() * Number AS INT) * 10000

    FROM @Numbers

    ORDER BY NEWID()) CreditLimit,

    (SELECT TOP 1 CAST(RAND() * Number AS INT) * 9000

    FROM @Numbers

    ORDER BY NEWID()) Balance

    FROM @Numbers a

    CROSS JOIN @Numbers b

    ) a;

    INSERT INTO dbo.Customers

    SELECT * FROM #Customers;

    GO

    Listing 15-1

    Creating the Database to Be Log Shipped

    ```


    For the purpose of this demonstration, we would like to configure disaster recovery
    for the `Chapter15` database so that we have an RPO (recovery point objective)
    of 10 minutes. We will also implement a 10-minute load delay on the DR server.
    This means that if an application team notifies us immediately of an incident
    that has led to data loss—for example, a user accidently deletes rows from a table—then
    we are able to rectify the issue by using the data on the DR server before the
    log that contains the erroneous transaction is restored.


    ### GUI Configuration


    We can configure log shipping for our `Chapter15` database through SQL Server
    Management Studio (SSMS). To do this, we select Properties from the context menu
    of the database and navigate to the Transaction Log Shipping page, which is displayed
    in Figure [15-1](#333037_2_En_15_Chapter.xhtml#Fig1). The first task on this page
    is to check the Enable This As The Primary Database In A Log Shipping Configuration
    check box.


    ![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig1_HTML.jpg](images/333037_2_En_15_Chapter/333037_2_En_15_Fig1_HTML.jpg)


    Figure 15-1


    The Transaction Log Shipping page


    We can now use the Backup Settings button to display the Transaction Log Backup
    Settings screen. On this screen, we enter the UNC (Universal Naming Convention)
    to the share that will be used for storing the log backups that log shipping takes.
    Because this share is actually configured on our primary server, we also enter
    the local path in the field below. The account that will be used to run the backup
    job needs to be granted read and change permissions on this share. By default,
    this will be the SQL Server service account, but for more granular security, it
    is possible to configure log shipping jobs to run under a proxy account. Proxy
    accounts are discussed in Chapter [22](#333037_2_En_22_Chapter.xhtml).


    We then configure how long we want our backup files to be retained before they
    are deleted. The value that you select for this depends on your enterprise’s requirements,
    but if your backup files are offloaded to tape, then you should make the files
    available long enough to allow the enterprise backup job to run, and you should
    potentially build in enough time for it to fail and then succeed on the following
    cycle. You should also consider your requirements for ad hoc restores. For example,
    if a project notices a data issue and requests a restore, you want to be able
    to retrieve the relevant backups from local disk, if possible. Therefore, consider
    how long you should give projects to notice an issue and request a restore before
    SQL Server removes the local copy of the backups. Backup strategies are discussed
    further in Chapter [12](#333037_2_En_12_Chapter.xhtml).


    You should also specify how soon you want an alert to be generated if no log backup
    occurs. To be notified of any backup failure, you can configure the value to be
    a minute longer than your backup schedule. In some environments, however, it may
    be acceptable to miss a few backups. In such an instance, you may set the value
    to a larger interval so that you are not flooded with failed backup alerts during
    maintenance windows and other such situations.


    The Set Backup Compression drop-down determines if backup compression should be
    used to reduce network traffic. The default is to take the configuration from
    the instance, but you can override this by specifically choosing to use it, or
    not use it, for the backups taken by the log shipping job. The Transaction Log
    Backup Settings screen is illustrated in Figure [15-2](#333037_2_En_15_Chapter.xhtml#Fig2).


    ![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig2_HTML.jpg](images/333037_2_En_15_Chapter/333037_2_En_15_Fig2_HTML.jpg)


    Figure 15-2


    The Transaction Log Backup Settings screen


    Clicking the Schedule button causes the New Job Schedule screen to be invoked.
    This screen, which is illustrated in Figure [15-3](#333037_2_En_15_Chapter.xhtml#Fig3),
    is the standard SQL Server Agent screen used for creating job schedules, except
    that it has been prepopulated with the default name of the log shipping backup
    job. Because we are trying to achieve an RPO of 10 minutes, we configure the backup
    job to run every 5 minutes. This is because we also need to allow time for the
    copy job to run. In a DR planning, we cannot assume that the primary server will
    be available for retrieving our log backup.


    ![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig3_HTML.jpg](images/333037_2_En_15_Chapter/333037_2_En_15_Fig3_HTML.jpg)


    Figure 15-3'
