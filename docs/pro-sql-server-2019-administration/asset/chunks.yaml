  raw: '## Summary


    SQL Server offers a complex security framework for managing permissions that contains
    multiple, overlapping layers. At the instance level, you can create logins from
    Windows users or groups, or you can create them as second tier logins, with passwords
    stored inside the database engine. Second tier authentication requires that you
    enable mixed-mode authentication at the instance level.


    Server roles allow logins to be grouped together so that you can assign them common
    permissions. This eases the administrative overhead of managing security. SQL
    Server provides built-in server roles for common scenarios, or you can create
    your own server roles that meet the needs of your data-tier applications.


    At the database level, logins can map to database users. If you are using contained
    databases, then it is also possible to create database users that map directly
    to a Windows security principal or have their own second tier authentication credentials.
    This can help isolate the database from the instance by removing the dependency
    on an instance-level login. This can help you make the database more portable,
    but at the expense of additional security considerations.


    Fine-grained permissions can become difficult to manage, especially when you need
    to secure data at the column level. SQL Server offers ownership chaining, which
    can reduce this complexity. With ownership chaining, it is possible to assign
    permissions on a view, as opposed to on the underlying tables. It is even possible
    to use ownership chasing across multiple databases, which, of course, is not without
    its own complexities. For ownership chaining to succeed, all of the objects in
    the chain must share the same owner. Otherwise the ownership chain is broken and
    permissions on the underlying objects are evaluated.


    Server audit allows a fine-grained audit of activity at both the instance and
    database levels. It also includes the ability to audit the audit itself, thus
    removing the threat of a privileged user bypassing the audit with malicious intent.
    You can save audits to a file in the operating system and control permissions
    through NTFS. Alternatively, you can save audits to the Windows Security log or
    Windows Application log.


    # 11. Encryption


    Encryption is a process of obfuscating data with an algorithm that uses keys and
    certificates so that if security is bypassed and data is accessed or stolen by
    unauthorized users, then it will be useless, unless the keys that were used to
    encrypt it are also obtained. This adds an additional layer of security over and
    above access control, but it does not replace the need for an access control implementation.
    Encrypting data also has the potential to considerably degrade performance, so
    you should use it on the basis of need, as opposed to implementing it on all data
    as a matter of routine.


    In this chapter, we discuss the SQL Server encryption hierarchy before demonstrating
    how to implement Transparent Data Encryption (TDE) as well as cell-level encryption.
    We also discuss Always Encrypted and secure enclaves.


    ## Encryption Hierarchy


    SQL Server offers the ability to encrypt data through a hierarchy of keys and
    certificates. Each layer within the hierarchy encrypts the layer below it.


    ### Encryption Concepts


    Before we discuss the hierarchy in detail, it is important to understand the concepts
    that relate to encryption. The following sections provide an overview of the main
    artifacts that are involved in encryption.


    #### Symmetric Keys


    A *symmetric key* is an algorithm that you can use to encrypt data. It is the
    weakest form of encryption because it uses the same algorithm for both encrypting
    and decrypting the data. It is also the encryption method that has the least performance
    overhead. You can encrypt a symmetric key with a password or with another key
    or certificate.


    #### Asymmetric Keys


    In contrast to a symmetric key, which uses the same algorithm to both encrypt
    and decrypt data, an *asymmetric key* uses a pair of keys or algorithms. You can
    use one for encryption only and the other for decryption only. The key that is
    used to encrypt the data is called the *private key* and the key that is used
    to decrypt the data is known as the *public key*.


    #### Certificates


    A certificate is issued by a trusted source, known as a *certificate authority
    (CA)*. It uses an asymmetric key and provides a digitally signed statement, which
    binds the public key to a principal or device, which holds the corresponding private
    key.


    #### Windows Data Protection API


    The Windows Data Protection API (DPAPI) is a cryptographic application programming
    interface (API) that ships with the Windows operating system. It allows keys to
    be encrypted by using user or domain secret information. DPAPI is used to encrypt
    the Service Master Key, which is the top level of the SQL Server encryption hierarchy.


    ### SQL Server Encryption Concepts


    SQL Server’s cryptography functionality relies on a hierarchy of keys and certificates,
    with the root level being the Service Master Key. The following sections describe
    the use of master keys, as well as SQL Server’s encryption hierarchy.


    #### Master Keys


    The root level of the SQL Server encryption hierarchy is the Service Master Key.
    The Service Master Key is created automatically when the instance is built, and
    it is used to encrypt database master keys, credentials, and linked servers’ passwords
    using the DPAPI. The Service Master Key is stored in the Master database, and
    there is always precisely one per instance. In SQL Server 2012 and above, the
    Service Master Key is a symmetric key that is generated using the AES 256 algorithm.
    This is in contrast to older versions of SQL Server, which use the Triple DES
    algorithm.


    Because of the new encryption algorithm used in SQL Server 2012 and above, when
    you upgrade an instance from SQL Server 2008 R2 or below, it is good practice
    to regenerate the key.


    The issue with regenerating the Service Master Key, however, is that it involves
    decrypting and then re-encrypting every key and certificate that sits below it
    in the hierarchy. This is a very resource-intensive process and should only be
    attempted during a maintenance window.


    You can regenerate the Service Master Key using the command in Listing [11-1](#333037_2_En_11_Chapter.xhtml#PC1).
    You should be aware, however, that if the process fails to decrypt and re-encrypt
    any key that is below it in the hierarchy, then the whole regeneration process
    fails. You can change this behavior by using the `FORCE` keyword. The `FORCE`
    keyword forces the process to continue, after errors. Be warned that this will
    leave any data that cannot be decrypted and re-encrypted unusable. You will have
    no way to regain access to this data.


    ```

    ALTER SERVICE MASTER KEY REGENERATE

    Listing 11-1

    Regenerating the Service Master Key

    ```


    Because the Service Master Key is so vital, you must take a backup of it after
    it has been created or regenerated and store it in a secure, offsite location
    for the purpose of disaster recovery. You can also restore the backup of this
    key if you are migrating an instance to a different server to avoid issues with
    the encryption hierarchy. The script in Listing [11-2](#333037_2_En_11_Chapter.xhtml#PC2)
    demonstrates how to back up and restore the Service Master Key. If the master
    key you restore is identical, then SQL Server lets you know and data does not
    need to be re-encrypted.


    ```

    BACKUP SERVICE MASTER KEY

    TO FILE = ''c:\keys\service_master_key''

    ENCRYPTION BY PASSWORD = ''Pa$$w0rd''

    RESTORE SERVICE MASTER KEY

    FROM FILE = ''c:\keys\service_master_key''

    DECRYPTION BY PASSWORD = ''Pa$$w0rd''

    Listing 11-2

    Backing Up and Restoring the Service Master Key

    ```'
