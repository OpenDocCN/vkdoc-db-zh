  trans: '### 恢复点目标与恢复时间目标


    应用程序的恢复点目标（RPO）指明了在发生故障时可接受的数据丢失量。例如，对于一个支持报表应用程序的数据仓库，鉴于它可能仅由 ETL 过程每天更新一次，且其他所有活动都是只读报表，这个
    RPO 可能是一个较长的时段，比如 24 小时。然而，对于高度事务性的系统，例如支持交易平台或 Web 应用程序的 OLTP 数据库，RPO 将为零。RPO
    为零意味着不可接受任何数据丢失。


    应用程序针对高可用性和灾难恢复可能具有不同的 RPO。例如，出于成本或应用程序性能的考虑，站点内故障转移可能需要 RPO 为零。但是，如果同一应用程序故障转移到灾难恢复数据中心，那么
    5 或 10 分钟的数据丢失可能是可以接受的。这是因为实现站点内可用性和站点间恢复所使用的技术存在差异。


    应用程序的恢复时间目标（RTO）指定了应用程序在恢复完成且用户可以重新连接之前可以停机的最长时间。在计算应用程序可实现的 RTO 时，您需要考虑许多方面。例如，集群从一个节点故障转移到另一个节点以及
    SQL Server 服务重新启动可能需要不到一分钟；然而，数据库恢复可能需要更长得多的时间。数据库恢复所需的时间取决于许多因素，包括数据库的大小、实例内的数据库数量，以及故障转移发生时有多少事务处于活动状态。这是因为所有未提交的事务都需要回滚。


    就像 RPO 一样，站点内或站点间故障转移具有不同的 RTO 是很常见的。同样，这主要是由于技术差异造成的，但也考虑到如果主数据中心丢失，在灾难恢复数据中心启动整个环境所需的时间。


    在发生数据损坏时，应用程序的 RPO 和 RTO 也可能有所不同。根据损坏的性质以及已实施的 HA/DR 技术，数据损坏可能导致您需要从备份中还原数据库。


    如果您必须还原数据库，最坏的情况是可实现的恢复点可能是上次备份的时间。这意味着您必须将特定 RPO 的硬性业务要求纳入您的备份策略。（备份将在第 12 章中详细讨论。）然而，如果只有部分数据库损坏，您或许可以从实时数据库中抢救一些数据，并且仅从还原的数据库中还原损坏的数据。


    数据损坏也可能对 RTO 产生影响。最大的影响因素之一是备份是本地存储在服务器上，还是需要从磁带中检索。从磁带甚至异地位置检索备份文件可能会显著增加恢复过程的时间。


    另一个影响因素是导致损坏的原因。如果是由有故障的 I/O 子系统引起的，那么您可能需要考虑让 Windows 管理员对卷运行磁盘检查命令（`CHKDSK`）所需的时间，以及可能更换磁盘所需的更多时间。然而，如果损坏是由用户意外截断表或删除数据文件引起的，则无需担心。


    ### 停机成本


    如果您询问任何业务负责人，他们的应用程序可接受多少停机时间以及可接受多少数据丢失，答案无一例外分别是零和零。当然，永远无法保证零停机时间，而且一旦您开始解释不同可用性级别相关的成本，就更容易协商出双方可接受的服务水平。


    决定您应尝试达到多少个“9”的关键因素是停机成本。停机成本分为两类：有形成本和无形成本。有形成本通常相当容易计算。让我们以销售应用程序为例。在这种情况下，最明显的有形成本是由于销售人员无法接收订单而导致的收入损失。无形成本更难量化，但可能昂贵得多。例如，如果客户无法向您的公司下单，他们可能会向竞争对手公司下单，并且永不回头。其他无形成本可能包括员工士气低落，导致员工流失率更高，甚至公司声誉受损。由于无形成本的本质决定了它们只能被估算，行业经验法则是将有形成本乘以三，用这个数字来代表您的无形成本。


    一旦您有了应用程序每小时总停机成本的数字，您就可以在整个应用程序的预测生命周期内扩展这个数字，并比较实施不同可用性级别的成本。例如，假设您计算出您的总停机成本为每小时
    2,000 美元，您应用程序的预期生命周期为 3 年。表 13-2 展示了您的应用程序的停机成本，比较了您为实施每个可用性级别计算出的成本（在考虑了硬件、许可证、电力、布线、额外存储以及额外支持设备，如新机架、管理成本等之后）。这被称为解决方案的总拥有成本（TCO）。


    表 13-2


    停机成本


    | 可用性级别 | 停机成本（3 年） | 可用性解决方案成本 |

    | --- | --- | --- |

    | 99% | $525,600 | $108,000 |

    | 99.9% | $52,560 | $224,000 |

    | 99.99% | $5,256 | $462,000 |

    | 99.999% | $526 | $910,000 |


    在此表中，您可以看到实施五个 9 的可用性比两个 9 的解决方案节省了 $525,474，但实施解决方案的成本额外增加了 $802,000，这意味着它并不经济。四个
    9 的可用性比两个 9 的解决方案节省了 $520,334，并且实施成本仅额外增加了 $354,000。因此，对于此特定应用程序，设计为四个 9 的解决方案是最合适的服务水平。


    ## 备用服务器的分类


    备用解决方案分为三类。您可以使用不同的技术来实现每一类，尽管某些技术可用于实现多个类别的备用服务器。表 13-3 概述了您可以实现的不同备用类别。


    表 13-3


    备用分类


    | 类别 | 描述 | 技术示例 |

    | --- | --- | --- |

    | 热备 | 一种同步解决方案，故障转移可以自动或手动发生。通常用于高可用性。 | 集群、AlwaysOn 可用性组（同步） |

    | 温备 | 一种同步解决方案，故障转移只能手动发生。通常用于灾难恢复。 | 日志传送、AlwaysOn 可用性组（异步） |

    | 冷备 | 一种非同步解决方案，故障转移只能手动发生。这只适用于从不修改的只读数据。 | – |


    ### 注


    冷备没有列出示例技术，因为不需要同步，因此也不需要技术实现。例如，在云场景中，您可能在 AWS 可用区中有一个 VMWare SDDC。如果一个可用区丢失，自动化会在不同的可用区中启动一个
    SDDC，并从 S3 存储桶还原 VM 快照。'
- fmt: '## High Availability and Recovery Technologies


    SQL Server provides a full suite of technologies for implementing high availability
    and disaster recovery. The following sections provide an overview of these technologies
    and discuss their most appropriate uses.


    ### AlwaysOn Failover Clustering


    A Windows cluster is a technology for providing high availability in which a group
    of up to 64 servers works together to provide redundancy. An `AlwaysOn Failover
    Clustered Instance (FCI)` is an instance of `SQL Server` that spans the servers
    within this group. If one of the servers within this group fails, another server
    takes ownership of the instance. Its most appropriate usage is for high availability
    scenarios where the databases are large or have high write profiles. This is because
    clustering relies on shared storage, meaning the data is only written to disk
    once. With `SQL Server`–level HA technologies, write operations occur on the primary
    database and then again on all secondary databases, before the commit on the primary
    completes. This can cause performance issues. Even though it is possible to stretch
    a cluster across multiple sites, this involves `SAN` replication, which means
    that a cluster is normally configured within a single site.


    Each server within a cluster is called a `node`. Therefore, if a cluster consists
    of three servers, it is known as a three-node cluster. Each node within the cluster
    has the `SQL Server` binaries installed, but the `SQL Server` service is only
    started on one of the nodes, which is known as the `active node`. Each node within
    the cluster also shares the same storage for the `SQL Server` data and log files.
    The storage, however, is only attached to the active node.


    ### Tip


    In geographically dispersed clusters (`geoclusters`), each server is attached
    to different storage. The volumes are updated by `SAN` replication or `Windows
    Storage Replica` (a `Windows Server` technology, introduced in `Windows Server
    2016`, which performs storage replication). The cluster regards the two volumes
    as a single, shared volume, which can only be attached to one node at a time.


    If the active node fails, then the `SQL Server` service is stopped and the storage
    is detached. The storage is then reattached to one of the other nodes in the cluster,
    and the `SQL Server` service is started on this node, which is now the active
    node. The instance is also assigned its own network name and `IP` address, which
    are also bound to the active node. This means that applications can connect seamlessly
    to the instance, regardless of which node has ownership.


    The diagram in Figure 13-1 illustrates a two-node cluster. It shows that although
    the databases are stored on a shared storage array, each node still has a dedicated
    system volume. This volume contains the `SQL Server` binaries. It also illustrates
    how the shared storage, `IP` address, and network name are rebound to the passive
    node in the event of failover.


    ![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig1_HTML.png](images/333037_2_En_13_Chapter/333037_2_En_13_Fig1_HTML.png)


    Figure 13-1: Two-node cluster


    #### Active/Active Configuration


    Although the diagram in Figure 13-1 illustrates an active/passive configuration,
    it is also possible to have an active/active configuration. It is not possible
    for more than one node at a time to own a single instance, and therefore it is
    not possible to implement load balancing. It is, however, possible to install
    multiple instances on a cluster, and a different node may own each instance. In
    this scenario, each node has its own unique network name and `IP` address. Each
    instance’s shared storage also consists of a unique set of volumes.


    Therefore, in an active/active configuration, during normal operations, `Node1`
    may host `Instance1` and `Node2` may host `Instance2`. If `Node1` fails, both
    instances are then hosted by `Node2`, and vice versa. The diagram in Figure 13-2
    illustrates a two-node active/active cluster.


    ![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig2_HTML.png](images/333037_2_En_13_Chapter/333037_2_En_13_Fig2_HTML.png)


    Figure 13-2: Active/active cluster


    ### Caution


    In an active/active cluster, it is important to consider resources in the event
    of failover. For example, if each node has 128GB of `RAM` and the instance hosted
    on each node is using 96GB of `RAM` and locking pages in memory, then when one
    node fails over to the other node, this node fails as well, because it does not
    have enough memory to allocate to both instances. Make sure you plan both memory
    and processor requirements as if the two nodes are a single server. For this reason,
    active/active clusters are not generally recommended for `SQL Server`.


    #### Three-Plus Node Configurations


    As previously mentioned, it is possible to have up to 64 nodes in a cluster. When
    you have three or more nodes, it is unlikely that you will want to have a single
    active node and two redundant nodes, due to the associated costs. Instead, you
    can choose to implement an `N+1` or `N+M` configuration.


    In an `N+1` configuration, you have multiple active nodes and a single passive
    node. If a failure occurs on any of the active nodes, they fail over to the passive
    node. The diagram in Figure 13-3 depicts a three-node `N+1` cluster.


    ![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig3_HTML.png](images/333037_2_En_13_Chapter/333037_2_En_13_Fig3_HTML.png)


    Figure 13-3: Three-node N+1 configuration


    In an `N+1` configuration, in a multifailure scenario, multiple nodes may fail
    over to the passive node. For this reason, you must be very careful when you plan
    resources to ensure that the passive node is able to support multiple instances.
    However, you can mitigate this issue by using an `N+M` configuration.


    Whereas an `N+1` configuration has multiple active nodes and a single passive
    node, an `N+M` cluster has multiple active nodes and multiple passive nodes, although
    there are usually fewer passive nodes than there are active nodes. The diagram
    in Figure 13-4 shows a five-node `N+M` configuration. The diagram shows that `Instance3`
    is configured to always fail over to one of the passive nodes, whereas `Instance1`
    and `Instance2` are configured to always fail over to the other passive node.
    This gives you the flexibility to control resources on the passive nodes, but
    you can also configure the cluster to allow any of the active nodes to fail over
    to either of the passive nodes, if this is a more appropriate design for your
    environment.


    ![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig4_HTML.png](images/333037_2_En_13_Chapter/333037_2_En_13_Fig4_HTML.png)


    Figure 13-4: Five-node N+M configuration'
