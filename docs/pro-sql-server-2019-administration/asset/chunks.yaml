    `deadlock monitor` 遇到死锁时，它会检查进程是否已被分配了事务优先级。如果进程的事务优先级不同，它会终止优先级最低的进程。如果它们的优先级相同，则会终止资源消耗最少的进程。如果两个进程的消耗成本相同，它会随机选择一个进程并将其终止。


