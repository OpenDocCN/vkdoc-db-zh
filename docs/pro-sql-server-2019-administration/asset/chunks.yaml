    ### Minimizing Deadlocks


    Your developers can take various steps to minimize the risk of deadlocks. Because
    it is you (the DBA) who is responsible for supporting the instance in production,
    it is prudent to check to make sure the development team’s code meets standards
    for minimizing deadlocks before you release the code to production.


    When reviewing code, prior to code release, you should look to ensure that the
    following guidelines are being followed:


    *   Optimistic isolation levels are being used where appropriate (you should also
    consider the trade-offs regarding TempDB usage, disk overhead, etc.).

    *   There should be no user interaction within transactions (this can avoid locks
    being held for extended periods).

    *   Transactions are as short as possible and within the same batch (this can
    avoid long-running transactions, which hold locks for longer than necessary).

    *   All programmable objects access objects in the same order (this can offset
    the likelihood of deadlocks and replace at the expense of contention on the first
    table).


    ## Understanding Transactions


    Every action that causes data or objects to be modified happens within the context
    of a transaction. SQL Server supports three types of transaction: autocommit,
    explicit, and implicit. Autocommit transactions are the default behavior and mean
    that each statement is performed in the context of its own transaction. Explicit
    transactions are started and ended manually. They start with a `BEGIN TRANSACTION`
    statement and end with either a `COMMIT TRANSACTION` statement, which causes the
    associated log records to be hardened to disk, or a `ROLLBACK` statement, which
    causes all actions within the transaction to be undone. If implicit transactions
    are turned on for a connection, then the default autocommit behavior no longer
    works for that connection. Instead, transactions are started automatically, and
    then committed manually, using a `COMMIT TRANSACTION` statement.


    ### Transactional Properties


    Transactions exhibit properties known as ACID (atomic, consistent, isolated, and
    durable). Each of these is discussed in the following sections.


    #### Atomic


    For a transaction to be atomic, all actions within a transaction must either commit
    together or roll back together. It is not possible for only part of a transaction
    to commit. SQL Server’s implementation of this property is slightly more flexible,
    however, through the implementation of save points.


    A `Save point` is a marker within a transaction where, in the event of a rollback,
    everything before the `Save point` is committed, and everything after the `Save
    point` can be either committed or rolled back. This can be helpful in trapping
    occasional errors that may occur. For example, the script in Listing [18-3](#333037_2_En_18_Chapter.xhtml#PC3)
    performs a large insert into the `Customers` table before performing a small insert
    into the `Addresses` table. If the insert into the `Addresses` table fails, the
    large insert into the `Customers` table is still committed.


    ```

    SELECT COUNT(*) InitialCustomerCount FROM dbo.Customers ;

    SELECT COUNT(*) InitialAddressesCount FROM dbo.Addresses ;

    BEGIN TRANSACTION

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE;

    --Create and populate name pieces

    DECLARE @Names TABLE

    (

    FirstName        VARCHAR(30),

    LastName        VARCHAR(30)

    );

    INSERT INTO @Names

    VALUES(''Peter'', ''Carter''),

    (''Michael'', ''Smith''),

    (''Danielle'', ''Mead''),

    (''Reuben'', ''Roberts''),

    (''Iris'', ''Jones''),

    (''Sylvia'', ''Davies''),

    (''Finola'', ''Wright''),

    (''Edward'', ''James''),

    (''Marie'', ''Andrews''),

    (''Jennifer'', ''Abraham'');

    --Populate Customers table

    SELECT * INTO #Customers

    FROM

    (SELECT

    (SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName,

    (SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) BillingAddressID,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) DeliveryAddressID,

    (SELECT TOP 1 CAST(RAND() * Number AS INT) * 10000

    FROM @Numbers

    ORDER BY NEWID()) CreditLimit,

    (SELECT TOP 1 CAST(RAND() * Number AS INT) * 9000

    FROM @Numbers

    ORDER BY NEWID()) Balance

    FROM @Numbers a

    CROSS JOIN @Numbers b

    ) a;

    INSERT INTO dbo.Customers

    SELECT * FROM #Customers;

    SAVE TRANSACTION CustomerInsert

    BEGIN TRY

    --Populate Addresses table - Will fail, due to length of Post Code

    INSERT INTO dbo.Addresses

    VALUES(''1 Apress Towers'', ''Hedge End'', ''Southampton'', ''SA206 2BQ'') ;

    END TRY

    BEGIN CATCH

    ROLLBACK TRANSACTION CustomerInsert

    END CATCH

    COMMIT TRANSACTION

    SELECT COUNT(*) FinalCustomerCount FROM dbo.Customers ;

    SELECT COUNT(*) FinalAddressesCount FROM dbo.Addresses ;

    Listing 18-3

    Save points

    ```


    The results of the row counts, illustrated in Figure [18-3](#333037_2_En_18_Chapter.xhtml#Fig3),
    show that the insert to the `Customers` table committed, while the insert to the
    `Addresses` table rolled back. It is also possible to create multiple save points
    within a single transaction and then roll back to the most appropriate point.


