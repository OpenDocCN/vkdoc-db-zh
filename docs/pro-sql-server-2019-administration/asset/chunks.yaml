  trans: '

    ## 高可用性与灾难恢复技术


    SQL Server 提供了一整套用于实现高可用性和灾难恢复的技术。以下各节将概述这些技术，并讨论其最适用的场景。


    ### AlwaysOn 故障转移集群


    Windows 集群是一种提供高可用性的技术，其中一组最多 64 台服务器协同工作以提供冗余。一个 `AlwaysOn 故障转移集群实例 (FCI)` 是一个跨该组内服务器的
    `SQL Server` 实例。如果组内某台服务器发生故障，另一台服务器将接管该实例的所有权。其最适用的场景是数据库规模庞大或写入负载较高的高可用性方案。这是因为集群依赖于共享存储，意味着数据仅需写入磁盘一次。而使用
    `SQL Server` 级别的高可用性技术时，写入操作会在主数据库上执行，然后在所有辅助数据库上再次执行，之后主数据库上的提交才会完成。这可能导致性能问题。尽管可以将集群扩展到多个站点，但这涉及
    `SAN` 复制，这意味着集群通常配置在单个站点内。


    集群中的每台服务器称为一个`节点`。因此，如果一个集群由三台服务器组成，则称为三节点集群。集群中的每个节点都安装了 `SQL Server` 二进制文件，但
    `SQL Server` 服务仅在其中一个节点上启动，该节点称为`活动节点`。集群中的每个节点还共享相同的 `SQL Server` 数据和日志文件存储。然而，该存储仅附加到活动节点。


    ### 提示


    在地理分散的集群（`地理集群`）中，每台服务器连接到不同的存储。卷通过 `SAN` 复制或 `Windows 存储副本`（一项在 `Windows Server
    2016` 中引入的 `Windows Server` 技术，用于执行存储复制）进行更新。集群将这两个卷视为一个单一的共享卷，该卷一次只能附加到一个节点。


    如果活动节点发生故障，则 `SQL Server` 服务将停止，存储将被分离。然后，存储将重新附加到集群中的另一个节点，并且 `SQL Server` 服务将在该节点上启动，该节点现在成为活动节点。该实例还被分配了其自己的网络名称和
    `IP` 地址，这些也绑定到活动节点。这意味着应用程序可以无缝连接到该实例，无论哪个节点拥有所有权。


    图 13-1 中的图表展示了一个双节点集群。它显示尽管数据库存储在共享存储阵列上，但每个节点仍然拥有一个专用的系统卷。该卷包含 `SQL Server` 二进制文件。图表还说明了在发生故障转移时，共享存储、`IP`
    地址和网络名称如何重新绑定到被动节点。


    ![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig1_HTML.png](img/333037_2_En_13_Fig1_HTML.png)


    图 13-1：双节点集群


    #### 主动/主动配置


    虽然图 13-1 中的图表展示了主动/被动配置，但也可以采用主动/主动配置。一次只能有一个节点拥有单个实例，因此无法实现负载均衡。但是，可以在集群上安装多个实例，并且不同的节点可以拥有每个实例。在此场景中，每个节点都有其唯一的网络名称和
    `IP` 地址。每个实例的共享存储也由一组唯一的卷组成。


    因此，在主动/主动配置中，在正常运行期间，`节点 1` 可能托管 `实例 1`，`节点 2` 可能托管 `实例 2`。如果 `节点 1` 发生故障，则两个实例都将由
    `节点 2` 托管，反之亦然。图 13-2 中的图表展示了一个双节点主动/主动集群。


    ![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig2_HTML.png](img/333037_2_En_13_Fig2_HTML.png)


    图 13-2：主动/主动集群


    ### 注意


    在主动/主动集群中，必须考虑故障转移时的资源情况。例如，如果每个节点有 128GB 的 `RAM`，并且托管在每个节点上的实例使用了 96GB 的 `RAM`
    并在内存中锁定页面，那么当一个节点故障转移到另一个节点时，该节点也会失败，因为它没有足够的内存分配给两个实例。请确保规划内存和处理器需求时，将两个节点视为单台服务器。因此，通常不建议为
    `SQL Server` 采用主动/主动集群。


    #### 三节点及以上配置


    如前所述，集群中最多可以有 64 个节点。当您有三个或更多节点时，由于相关成本，您可能不希望只有一个活动节点和两个冗余节点。相反，您可以选择实施 `N+1`
    或 `N+M` 配置。


    在 `N+1` 配置中，您有多个活动节点和一个被动节点。如果任何一个活动节点发生故障，它们将故障转移到被动节点。图 13-3 中的图表描绘了一个三节点的 `N+1`
    集群。


    ![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig3_HTML.png](img/333037_2_En_13_Fig3_HTML.png)


    图 13-3：三节点 N+1 配置


    在 `N+1` 配置中，在多重故障场景下，多个节点可能会故障转移到被动节点。因此，在规划资源时必须非常小心，以确保被动节点能够支持多个实例。但是，您可以通过使用
    `N+M` 配置来缓解此问题。


    `N+1` 配置拥有多个活动节点和一个被动节点，而 `N+M` 集群拥有多个活动节点和多个被动节点，尽管被动节点的数量通常少于活动节点。图 13-4 中的图表展示了一个五节点的
    `N+M` 配置。图表显示 `实例 3` 被配置为总是故障转移到其中一个被动节点，而 `实例 1` 和 `实例 2` 被配置为总是故障转移到另一个被动节点。这为您提供了控制被动节点上资源的灵活性，但您也可以配置集群以允许任何活动节点故障转移到任意一个被动节点，如果这对于您的环境是更合适的设计。


    ![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig4_HTML.png](img/333037_2_En_13_Fig4_HTML.png)


    图 13-4：五节点 N+M 配置

