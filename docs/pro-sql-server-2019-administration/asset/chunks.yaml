    --Create the Logins and Users

    CREATE LOGIN SalesUser

    WITH PASSWORD=N''Pa$$w0rd'', DEFAULT_DATABASE=Chapter24,

    CHECK_EXPIRATION=OFF, CHECK_POLICY=OFF ;

    GO

    CREATE LOGIN ReportsUser

    WITH PASSWORD=N''Pa$$w0rd'', DEFAULT_DATABASE=Chapter24,

    CHECK_EXPIRATION=OFF, CHECK_POLICY=OFF ;

    GO

    CREATE LOGIN SalesManager

    WITH PASSWORD=N''Pa$$w0rd'', DEFAULT_DATABASE=Chapter24,

    CHECK_EXPIRATION=OFF, CHECK_POLICY=OFF ;

    GO

    USE Chapter24

    GO

    CREATE USER SalesUser FOR LOGIN SalesUser ;

    GO

    CREATE USER ReportsUser FOR LOGIN ReportsUser ;

    GO

    CREATE USER SalesManager FOR LOGIN SalesManager ;

    GO

    ```

    清单 24-3

    准备实例


    为了实现关于每个请求应放置到哪个工作负载组的业务规则，我们使用表 24-6 中详述的系统函数。


    表 24-6


    用于实现业务规则的系统函数


    | 函数 | 描述 | 业务规则 |

    | --- | --- | --- |

    | `SUSER_SNAME()` | 返回登录名 | 1, 2, 3, 4 |

    | `HOST_NAME()` | 发出请求的主机名 | 3, 4 |


    创建分类器函数时，它必须遵循特定规则。首先，函数必须是**架构绑定**的。这意味着任何被该函数引用的基础对象，如果不先删除该函数，就无法被更改。该函数还必须返回
    `SYSNAME` 数据类型且没有参数。


    值得注意的是，要求函数是架构绑定的这一点很重要，它对资源调控器的灵活性带来了限制。例如，如果能够基于数据库角色成员身份来委派工作负载将非常有用；然而，这是不可能的，因为架构绑定函数无法直接或间接访问其他数据库中的对象。由于分类器函数必须驻留在
    Master 数据库中，你无法访问有关其他数据库中数据库角色的信息。


    和所有情况一样，这个问题也有变通方法。例如，你可以在 Master 数据库中创建一个表来维护来自用户数据库的角色成员身份。你甚至可以通过结合使用用户数据库中的视图和触发器来自动保持此表的更新。该视图将基于
    `sys.sysusers` 目录视图，而触发器将基于你创建的视图。然而，这将是一个复杂的设计，会带来维护上的操作挑战。


    清单 24-4 中的脚本创建了分类器函数，该函数在将函数与资源调控器关联之前实现了我们的业务规则。和往常一样，然后重新配置资源调控器以使我们的更改生效。


    ```sql

    USE Master

    GO

    CREATE FUNCTION dbo.Classifier()

    RETURNS SYSNAME

    WITH SCHEMABINDING

    AS

    BEGIN

    --Declare variables

    DECLARE @WorkloadGroup        SYSNAME ;

    SET @WorkloadGroup = ''Not Assigned'' ;

    --Implement business rule 1

    IF (SUSER_NAME() = ''SalesUser'')

    BEGIN

    SET @WorkloadGroup = ''SalesUsers'' ;

    END

    --Implement business rule 2

    ELSE IF (SUSER_NAME() = ''SalesManager'')

    BEGIN

    SET @WorkloadGroup = ''Managers'' ;

    END

    --Implement business rules 3 & 4

    ELSE IF (SUSER_SNAME() = ''ReportsUser'')

    BEGIN

    IF (HOST_NAME() = ''ReportsApp'')

    BEGIN

    SET @WorkloadGroup = ''InternalReports''

    END

    ELSE

    BEGIN

    SET @WorkloadGroup = ''ExternalReports''

    END

    END

    --Implement business rule 5 (Put all other requests into the default workload
    group)

    ELSE IF @WorkloadGroup = ''Not Assigned''

    BEGIN

    SET @WorkloadGroup = ''default''

    END

    --Return the apropriate Workload Group name

    RETURN @WorkloadGroup

    END

    GO

    --Associate the Classifier Function with Resource Governor

    ALTER RESOURCE GOVERNOR WITH (CLASSIFIER_FUNCTION = dbo.Classifier) ;

    ALTER RESOURCE GOVERNOR RECONFIGURE ;

    ```

    清单 24-4

    创建分类器函数


    ### 测试分类器函数


    创建分类器函数后，我们需要测试它是否有效。我们可以使用 `EXECUTE AS` 语句更改系统上下文，然后调用分类器函数来测试业务规则 1 和 2。清单 24-5
    展示了这一点。该脚本临时允许所有登录直接访问分类器函数，这使得查询能够工作。它通过在脚本结束前授予 Public 角色 `EXECUTE` 权限，然后再撤销此权限来实现这一点。


    ```sql

    USE MASTER

    GO

    GRANT EXECUTE ON dbo.Classifier TO public ;

    GO

    EXECUTE AS LOGIN = ''SalesUser'' ;

    SELECT dbo.Classifier() AS ''Workload Group'' ;

    REVERT

    EXECUTE AS LOGIN = ''SalesManager'' ;

    SELECT dbo.Classifier() as ''Workload Group'' ;

    REVERT

    REVOKE EXECUTE ON dbo.Classifier TO public ;

    GO

    ```

    清单 24-5

    测试业务规则 1 和 2


    运行这两个查询的结果表明，业务规则 1 和 2 正常工作。


    要测试业务规则 4，我们可以使用与验证业务规则 1 和 2 相同的过程。唯一的区别是将执行上下文更改为 `ReportsUser`。为了验证规则 3，我们使用相同的过程，但这次从名为
    `ReportsApp` 的服务器调用查询。


    > **提示**

    >

    > 如果你没有名为 `ReportsApp` 的服务器的访问权限，那么请更新函数定义以使用你有权访问的服务器名称。


    ## 监控资源调控器


    SQL Server 提供了动态管理视图 (DMV)，可用于返回与资源池和工作负载组相关的统计信息。不过，你也可以使用 Windows 的性能监视器工具来监控资源调控器的使用情况，这为你提供了图形化表示的优势。接下来的章节将讨论这两种监控资源调控器的方法。'
- fmt: '### Monitoring with Performance Monitor


    DBAs can monitor how resource pools and their associated workload groups are being
    utilized by using Performance Monitor, which is built into Windows. You can access
    Performance Monitor from Control Panel ➤ Administrative Tools or by searching
    for `Perfmon` in the Start menu.


    ### Note


    To follow the demonstrations in this section, you should be running a Windows
    Server operating system.


    Two categories are available to Performance Monitor that relate to Resource Governor.
    The first is `MSSQL$[INSTANCE NAME]:Resource Pool Stats`. This contains counters
    that relate to the consumption of resources, which have been made available to
    resource groups. An instance of each counter is available for each resource group
    that has been configured on the instance.


    The second category is `MSSQL$[INSTANCE NAME]:Workload Group Stats`, which contains
    counters that relate to the utilization of each workload group that has been configured
    on the instance. Figure [24-4](#333037_2_En_24_Chapter.xhtml#Fig4) illustrates
    how we can add the `InternalReports`, `ExternalReports`, `SalesUsers`, and `Managers`
    instances of the CPU Usage % counter from within the Workload Group Stats category.
    After highlighting the instances, we will use the Add button, to move them to
    the Added Counters section. We can invoke the Add Counters dialog box by selecting
    Monitoring Tools ➤ Performance Monitor from the left pane and then using the Plus
    (`+`) symbol on the toolbar in the right hand pane.


    ![../images/333037_2_En_24_Chapter/333037_2_En_24_Fig2_HTML.jpg](images/333037_2_En_24_Chapter/333037_2_En_24_Fig2_HTML.jpg)


    Figure 24-2: Adding Workload Group Stats


    Now that we have added this counter, we also need to add the `ReportingApp` and
    `SalesApplication` app instances of the Active Memory Grant Amount (KB) counter
    from within the Resource Pool Stats category, as illustrated in Figure [24-3](#333037_2_En_24_Chapter.xhtml#Fig3).


    ![../images/333037_2_En_24_Chapter/333037_2_En_24_Fig3_HTML.jpg](images/333037_2_En_24_Chapter/333037_2_En_24_Fig3_HTML.jpg)


    Figure 24-3: Resource Pool Stats


    To test our Resource Governor configuration, we can use the script in Listing
    [24-6](#333037_2_En_24_Chapter.xhtml#PC6). This script is designed to run in two
    separate query windows. The first part of the script should run in a query window
    that is connected to your instance using the `SalesUser` login, and the second
    part of the script should run in a query window that is connected to your instance
    by using the `SalesManager` login. The two scripts should run simultaneously and
    cause Performance Monitor to generate a graph similar to the one in Figure [24-4](#333037_2_En_24_Chapter.xhtml#Fig4).
    Although the scripts do not cause the classifier function to be called, they act
    as an interactive way of testing our logic.


    ### Note


    The following scripts are likely to return a lot of data.


    ```sql

    --Script Part 1 - To be run in a query windows that is connected using the SalesManager
    Login

    EXECUTE AS LOGIN = ''SalesManager''

    DECLARE @i INT = 0 ;

    WHILE (@i < 10000)

    BEGIN

    SELECT DBName = (

    SELECT Name AS [data()]

    FROM sys.databases

    FOR XML PATH('''')

    ) ;

    SET @i = @i + 1 ;

    END

    --Script Part 2 - To be run in a query windows that is connected using the SalesUser
    Login

    EXECUTE AS LOGIN = ''SalesUser''

    DECLARE @i INT = 0 ;

    WHILE (@i < 10000)

    BEGIN

    SELECT DBName = (

    SELECT Name AS [data()]

    FROM sys.databases

    FOR XML PATH('''')

    ) ;

    SET @i = @i + 1 ;

    END

    ```


    Listing 24-6: Generating Load Against the SalesUsers and Managers Workload Groups


    ![../images/333037_2_En_24_Chapter/333037_2_En_24_Fig4_HTML.jpg](images/333037_2_En_24_Chapter/333037_2_En_24_Fig4_HTML.jpg)


    Figure 24-4: Viewing CPU utilization


    You can see that the CPU usage for the `SalesUsers` and `Managers` workload groups
    is almost identical, which means that the Resource Governor implementation is
    working as expected.


    ### Monitoring with DMVs


    SQL Server provides the `sys.dm_resource_governor_resource_pools` and `sys.dm_resource_governor_workload_groups`
    DMVs that DBAs can use to examine Resource Governor statistics. The `sys.dm_resource_governor_resource_pools`
    DMV returns the columns detailed in Table [24-7](#333037_2_En_24_Chapter.xhtml#Tab7).


    Table 24-7: Columns Returned by `sys.dm_resource_governor_resource_pools`


    | Column | Description |

    | --- | --- |

    | `pool_id` | The unique ID of the resource pool |

    | `name` | The name of the resource pool |

    | `statistics_start_time` | The date/time of the last time the resource pool’s
    statistics were reset |

    | `total_cpu_usage_ms` | The total CPU time used by the resource pool since the
    statistics last reset |

    | `cache_memory_kb` | The total cache memory currently being used by the resource
    pool |

    | `compile_memory_kb` | The total memory the resource pool is currently using
    for compilation and optimization |

    | `used_memgrant_kb` | The total memory the resource pool is using for memory
    grants |

    | `total_memgrant_count` | A count of memory grants in the resource pool since
    the statistics were reset |

    | `total_memgrant_timeout_count` | A count of memory grant timeouts in the resource
    pool since the statistics were last reset |

    | `active_memgrant_count` | A count of current memory grants within the resource
    pool |

    | `active_memgrant_kb` | The total amount of memory currently being used for memory
    grants in the resource pool |

    | `memgrant_waiter_count` | A count of queries currently pending, waiting for
    memory grants within the resource pool |

    | `max_memory_kb` | The maximum amount of memory the resource pool can reserve
    |

    | `used_memory_kb` | The amount of memory the resource pool currently has reserved
    |

    | `target_memory_kb` | The amount of memory that the resource pool is currently
    trying to maintain |

    | `out_of_memory_count` | A count of failed memory allocations for the resource
    pool |

    | `min_cpu_percent` | The guaranteed average minimum CPU % for the resource pool
    |

    | `max_cpu_percent` | The average maximum CPU % for the resource pool |

    | `min_memory_percent` | The guaranteed minimum amount of memory that is available
    to the resource pool during periods of memory contention |

    | `max_memory_percent` | The maximum percentage of server memory that can be allocated
    to the resource pool |

    | `cap_cpu_percent` | The hard limit on the maximum CPU % available to the resource
    pool |


    The `sys.dm_resource_governor_workload_groups` DMV returns the columns detailed
    in Table [24-8](#333037_2_En_24_Chapter.xhtml#Tab8).


    Table 24-8: Columns Returned by `sys.dm_resource_governor_workload_groups`'
