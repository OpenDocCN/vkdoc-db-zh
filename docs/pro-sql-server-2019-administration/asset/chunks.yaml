  trans: '

    ## 文件与文件组维护


    在数据层应用程序的生命周期中，有时出于性能或容量管理等原因，你可能需要对数据库文件和文件组执行维护活动。以下部分将描述如何添加、扩展和收缩文件。


    ### 添加文件


    出于容量和性能的双重原因，你可能需要向文件组添加文件。如果你的数据库增长超出了容量估算，并且承载数据文件的卷无法调整大小，那么你可以向文件组添加位于不同 LUN
    上的额外文件。


    如果存储子系统成为应用程序的瓶颈，你可能还需要向文件组添加额外文件以提高 IO 吞吐量。我们可以通过“数据库属性”对话框的“文件”选项卡向 `Chapter6`
    数据库添加一个额外文件。在此，我们将使用“添加”按钮，然后指定文件的逻辑名称、文件要驻留的文件组、文件的初始大小、自动增长设置、文件的最大大小以及文件将存储的物理路径。


    或者，我们可以使用清单 6-7 中的脚本来达到相同的结果。你应该将脚本中的目录路径更改为与你自己的目录结构相匹配。


    ```sql

    ALTER DATABASE [Chapter6] ADD FILE ( NAME = N''Chapter6_File4'', FILENAME = N''G:\DATA\Chapter6_File4.ndf'',
    SIZE = 5120KB, FILEGROWTH = 1024KB ) TO FILEGROUP [PRIMARY];

    GO

    ```


    清单 6-7

    使用 T-SQL 添加新文件


    然而，在这种情况下，重要的是要记住比例填充算法。如果你向文件组添加文件，那么 SQL Server 将首先针对空文件，直到它们剩余的可用空间与原始文件相同。这意味着如果你创建它们时与原始文件大小相同，你可能无法获得预期的益处。你可以通过运行清单
    6-8 中的脚本来见证此行为。该脚本使用了我们在最初创建和填充 `RoundRobin` 表时使用的相同技术，来生成额外的 10,000 行，然后识别每个文件中有多少行。


    ```sql

    --Create a Numbers table that will be used to assit the population of the table

    DECLARE @Numbers TABLE

    (

    Number    INT

    )

    --Populate the Numbers table

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number +1

    FROM CTE

    WHERE Number <= 99

    )

    INSERT INTO @Numbers

    SELECT *

    FROM CTE;

    --Populate the example table with 10000 rows of dummy text

    INSERT INTO dbo.RoundRobinTable

    SELECT ''DummyText''

    FROM @Numbers a

    CROSS JOIN @Numbers b;

    --Select all the data from the table, plus the details of the rows'' physical
    location.

    --Then group the row count

    --by file ID

    SELECT b.file_id, COUNT(*)

    FROM

    (

    SELECT ID, DummyTxt, a.file_id

    FROM dbo.RoundRobinTable

    CROSS APPLY sys.fn_PhysLocCracker(%%physloc%%) a

    ) b

    GROUP BY b.file_id;

    ```


    清单 6-8

    向 RoundRobin 表添加额外行


    从图 6-9 的结果中，你可以看到比例填充算法专门使用了新文件，直到其填满，然后才在每个文件之间重新启动轮询分配。然而，在重新启动比例填充算法后，文件组中的第一个文件发生了一次自动增长事件。这意味着第一个文件现在比其他文件有更多的可用空间，并接收了大部分剩余的新行。


    ![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig9_HTML.jpg](img/333037_2_En_6_Fig9_HTML.jpg)

    图 6-9

    分配给新文件的行


    解决新文件首先被填满的方法是创建更小的文件或增大现有文件的大小。这两种方法都可以均衡每个文件中剩余的可用空间，使 SQL Server 能够均匀地分布写入操作。


    另一种选择是使用数据库作用域配置，以强制文件组中的所有文件在每次发生自动增长事件时都增长。这将在本章的“数据库作用域配置”部分进一步讨论。


    ### 提示


    我们已经讨论了添加新文件对轮询算法的影响。然而，同样值得一提的是，当你最初创建文件组时，你应该在该文件组中创建大小相等的文件，以充分利用该算法。


    ### 扩展文件


    如果你是使用 GUI 而不是脚本添加文件的，那么你可能已经注意到，每个文件旁边指示的初始大小分别为 11MB、6MB 和 7MB，而不是本章前面我们配置的
    5MB。这是因为“初始大小”字段的更准确名称实际上是“当前大小”。因为我们为文件配置了自动增长，当它们变满时，SQL Server 已自动为我们扩展了文件。


    这是一个非常实用的故障安全功能，但理想情况下，我们应该仅将其用作故障安全。扩展文件会消耗资源，并且会导致获取锁，从而阻塞其他进程。因此，建议根据容量估算预设数据库文件的大小，而不是从一个较小的文件开始并依赖自动增长。


    出于同样的原因，在指定文件的自动增长设置时，你应该避免使用默认的 1MB，并指定一个大得多的值。如果不这样做，当你的文件变满并触发自动增长时，你的文件将以非常小的增量增长，这可能会损害性能，即使你使用的是即时文件初始化。你应该将文件增长值设置为多少取决于你的环境。例如，你应该考虑卷上可用的可用空间量以及共享该卷的其他数据库的数量。你可以使用
    `sys.dm_db_file_space_usage` 动态管理视图 (DMV) 查看文件中剩余的空间量。此 DMV 将返回一个名为 `unallocated_extent_page_count`
    的列，该列将告诉我们还有多少空闲页可供分配。我们可以使用它来计算每个文件中的剩余可用空间，如清单 6-9 所示。


    ```sql

    SELECT

    file_id

    ,unallocated_extent_page_count * 1.0 / 128 ''Free Space (MB)''

    FROM sys.dm_db_file_space_usage;

    ```


    清单 6-9

    计算每个文件中的可用空间


    如果我们想扩展一个文件，我们不需要等待自动增长触发。我们可以通过更改“数据库属性”对话框“文件”选项卡中的“初始大小”字段的值，或使用 `ALTER DATABASE`
    命令来手动扩展文件。清单 6-10 中的命令将把 `Chapter6` 数据库中最新的文件大小调整为 20MB。


    ```sql

    ALTER DATABASE [Chapter6] MODIFY FILE ( NAME = N''Chapter6_File4'', SIZE = 20480KB
    );

    ```


    清单 6-10

    扩展文件

    '
- fmt: '## Shrinking Files


    Just as you can expand database files, you can also shrink them. There are various
    methods for achieving this, including shrinking a single file, shrinking all files
    within a database including the log, or even setting an `Auto Shrink` option at
    the database level.


    To shrink an individual file, you need to use the `DBCC SHRINKFILE` command. When
    you use this option, you can specify either the target size of the file or you
    can specify the `EMPTYFILE` option. The `EMPTYFILE` option will move all data
    within the file to other files within the same filegroup. This means that you
    can subsequently remove the file from the database.


    If you specify a target size for the database, then you can choose to specify
    either `TRUNCATEONLY` or `NOTRUNCATE`. If you select the former, then SQL Server
    will start at the end of the file and reclaim space until it reaches the last
    allocated extent. If you choose the latter, then beginning at the end of the file,
    SQL Server will begin a process of moving allocated extents to the first free
    space at the start of the file.


    To remove the unused space at the end of our expanded `Chapter6_File4` file, we
    could use the Shrink File screen in SQL Server Management Studio, which can be
    found by right-clicking the database and drilling through Tasks ➤ Shrink ➤ Files.
    In the Shrink File screen, we can select the appropriate file from the File Name
    drop-down box and then ensure that the Release Unused Space radio button is selected.
    This option enforces `TRUNCATEONLY`.


    We could also achieve the same result by running the command in Listing [6-11](#333037_2_En_6_Chapter.xhtml#PC11).


    ```sql

    USE [Chapter6]

    GO

    DBCC SHRINKFILE (N''Chapter6_File4'', 0, TRUNCATEONLY);

    ```

    Listing 6-11

    Shrinking a File with `TRUNCATEONLY`


    If we wanted to reclaim the unused space at the end of all files in the database,
    we could right-click the database and drill down through Tasks ➤ Shrink ➤ Database.
    We would then ensure that the Reorganize Files Before Releasing Unused Space option
    is not selected and click OK.


    We could achieve the same result via T-SQL by running the command in Listing [6-12](#333037_2_En_6_Chapter.xhtml#PC12).


    ```sql

    USE [Chapter6]

    GO

    DBCC SHRINKDATABASE(N''Chapter6'' );

    ```

    Listing 6-12

    Shrinking a Database via T-SQL


    There are very few occasions when it is acceptable to shrink a database or even
    an individual file. There is a misconception that large, empty files take longer
    to back up, but this is a fallacy. In fact, I have had only one occasion in my
    career when I needed to shrink data files. This instance happened after we removed
    several hundred gigabytes of archive data from a database and were approaching
    our 2TB LUN limit, but this was an exceptional circumstance. Generally speaking,
    you should not look to shrink your database files, and you should certainly never
    ever use the `Auto Shrink` option on a database.


    In the event that you do have to shrink a database, be prepared for the process
    to be slow. It is a single-threaded operation and will consume resources while
    running. You should also never consider using the `NOTRUNCATE` option. As described
    earlier, this will cause extents to be moved around inside the file and will lead
    to massive fragmentation issues like those you can see using the script in Listing
    [6-13](#333037_2_En_6_Chapter.xhtml#PC13). This script first creates a clustered
    index on our `RoundRobin` table. It then uses the `sys.dm_db_index_physical_stats`
    DMV to examine the level of fragmentation at the leaf level of the clustered index.
    Subsequently, it shrinks the database and then reexamines the level of fragmentation
    of the leaf level of our clustered index.


    ```sql

    USE Chapter6

    GO

    --Create a clustered index on RoundRobinTable

    CREATE UNIQUE CLUSTERED INDEX CIX_RoundRobinTable ON dbo.RoundRobinTable(ID);

    GO

    --Examine Fragmentation on new index

    SELECT * FROM sys.dm_db_index_physical_stats(DB_ID(''Chapter6''),OBJECT_ID(''dbo.RoundRobinTable''),1,NULL,''DETAILED'')

    WHERE index_level = 0;

    --Shrink the database

    DBCC SHRINKDATABASE(N''Chapter6'', NOTRUNCATE);

    GO

    --Re-examine index fragmentation

    SELECT * FROM sys.dm_db_index_physical_stats(DB_ID(''Chapter6''),OBJECT_ID(''dbo.RoundRobinTable''),1,NULL,''DETAILED'')

    WHERE index_level = 0;

    GO

    ```

    Listing 6-13

    Fragmentation Caused by Shrinking


    As you can see from the results shown in Figure [6-10](#333037_2_En_6_Chapter.xhtml#Fig10),
    the fragmentation of the leaf level of the index has increased from 0.08% to a
    massive 71.64%, which will severely impact queries run against the index. Indexes
    and fragmentation will be discussed in detail in Chapter [8](#333037_2_En_8_Chapter.xhtml).


    ### Note


    The fragmentation level may vary depending on the layout of extents within your
    file(s).


    ![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig10_HTML.jpg](images/333037_2_En_6_Chapter/333037_2_En_6_Fig10_HTML.jpg)


    Figure 6-10

    Results of fragmentation


    ## Database Scoped Configurations


    Prior to SQL Server 2016, Trace Flags could be configured on the SQL Server service
    (see Chapter [5](#333037_2_En_5_Chapter.xhtml)), which changed the default behavior
    of how SQL Server stored data and performed autogrowth events. The first of these
    was `T1117`, which was used to make all files within a filegroup grow at the same
    time, which was helpful for distributing data evenly, especially in data warehousing
    scenarios. The other was `T1118`, which was used to force uniform extents to be
    used exclusively—essentially turning off mixed extents (where different pages
    within an extent can be allocated to different tables). `T1118` was useful for
    optimizing `TempDB`, but could also prove useful in data warehousing scenarios.


    From SQL Server 2016 onward, `T1117` and `T1118` have no effect, if they are turned
    on. They have been replaced by database scoped configurations, which have two
    main benefits. Firstly, database scoped configurations are configured at the database
    level, instead of the instance level. This means that a single consolidated instance
    can easily support databases with different workload profiles. Secondly, database
    scoped configurations are documented and supported by Microsoft. While `T1117`
    and `T1118` were well known and well used, they had no official support from Microsoft.


    ### Note


    The equivalent behavior of `T1117` and `T1118` is assumed by default on the `TempDB`
    database. For user databases, however, the traditional default behavior is assumed.


    We could assume the equivalent of `T1117` for the `Primary` filegroup, in the
    `Chapter6` database, by using the command in Listing [6-14](#333037_2_En_6_Chapter.xhtml#PC14).


    ```sql

    ALTER DATABASE Chapter6 MODIFY FILEGROUP [Primary] AUTOGROW_ALL_FILES

    ```

    Listing 6-14

    Turn On Autogrow All Files


    The command in Listing [6-15](#333037_2_En_6_Chapter.xhtml#PC15) will assume the
    equivalent behavior of `T1118` for the `Chapter6` database.


    ```sql

    ALTER DATABASE Chapter6 SET MIXED_PAGE_ALLOCATION OFF

    ```

    Listing 6-15

    Turn Off Mixed Page Allocations'
  raw: '### Shrinking Files


    Just as you can expand database files, you can also shrink them. There are various
    methods for achieving this, including shrinking a single file, shrinking all files
    within a database including the log, or even setting an Auto Shrink option at
    the database level.


    To shrink an individual file, you need to use the `DBCC SHRINKFILE` command. When
    you use this option, you can specify either the target size of the file or you
    can specify the `EMPTYFILE` option. The `EMPTYFILE` option will move all data
    within the file to other files within the same filegroup. This means that you
    can subsequently remove the file from the database.


    If you specify a target size for the database, then you can choose to specify
    either `TRUNCATEONLY` or `NOTRUNCATE`. If you select the former, then SQL Server
    will start at the end of the file and reclaim space until it reaches the last
    allocated extent. If you choose the latter, then beginning at the end of the file,
    SQL Server will begin a process of moving allocated extents to the first free
    space at the start of the file.


    To remove the unused space at the end of our expanded `Chapter6_File4` file, we
    could use the Shrink File screen in SQL Server Management Studio, which can be
    found by right-clicking the database and drilling through Tasks ➤ Shrink ➤ Files.
    In the Shrink File screen, we can select the appropriate file from the File Name
    drop-down box and then ensure that the Release Unused Space radio button is selected.
    This option enforces `TRUNCATEONLY`.


    We could also achieve the same result by running the command in Listing [6-11](#333037_2_En_6_Chapter.xhtml#PC11).


    ```

    USE [Chapter6]

    GO

    DBCC SHRINKFILE (N''Chapter6_File4'', 0, TRUNCATEONLY);

    Listing 6-11

    Shrinking a File with TRUNCATEONLY

    ```


    If we wanted to reclaim the unused space at the end of all files in the database,
    we could right-click the database and drill down through Tasks ➤ Shrink ➤ Database.
    We would then ensure that the Reorganize Files Before Releasing Unused Space option
    is not selected and click OK.


    We could achieve the same result via T-SQL by running the command in Listing [6-12](#333037_2_En_6_Chapter.xhtml#PC12).


    ```

    USE [Chapter6]

    GO

    DBCC SHRINKDATABASE(N''Chapter6'' );

    Listing 6-12

    Shrinking a Database via T-SQL

    ```


    There are very few occasions when it is acceptable to shrink a database or even
    an individual file. There is a misconception that large, empty files take longer
    to back up, but this is a fallacy. In fact, I have had only one occasion in my
    career when I needed to shrink data files. This instance happened after we removed
    several hundred gigabytes of archive data from a database and were approaching
    our 2TB LUN limit, but this was an exceptional circumstance. Generally speaking,
    you should not look to shrink your database files, and you should certainly never
    ever use the Auto Shrink option on a database.


    In the event that you do have to shrink a database, be prepared for the process
    to be slow. It is a single-threaded operation and will consume resources while
    running. You should also never consider using the `NOTRUNCATE` option. As described
    earlier, this will cause extents to be moved around inside the file and will lead
    to massive fragmentation issues like those you can see using the script in Listing
    [6-13](#333037_2_En_6_Chapter.xhtml#PC13). This script first creates a clustered
    index on our `RoundRobin` table. It then uses the `sys.dm_db_index_physical_stats`
    DMV to examine the level of fragmentation at the leaf level of the clustered index.
    Subsequently, it shrinks the database and then reexamines the level of fragmentation
    of the leaf level of our clustered index.


    ```

    USE Chapter6

    GO

    --Create a clustered index on RoundRobinTable

    CREATE UNIQUE CLUSTERED INDEX CIX_RoundRobinTable ON dbo.RoundRobinTable(ID);

    GO

    --Examine Fragmentation on new index

    SELECT * FROMsys.dm_db_index_physical_stats(DB_ID(''Chapter6''),OBJECT_ID(''dbo.RoundRobinTable''),1,NULL,''DETAILED'')

    WHERE index_level = 0;

    --Shrink the database

    DBCC SHRINKDATABASE(N''Chapter6'', NOTRUNCATE);

    GO

    --Re-examine index fragmentation

    SELECT * FROM sys.dm_db_index_physical_stats(DB_ID(''Chapter6''),OBJECT_ID(''dbo.RoundRobinTable''),1,NULL,''DETAILED'')

    WHERE index_level = 0;

    GO

    Listing 6-13

    Fragmentation Caused by Shrinking

    ```


    As you can see from the results shown in Figure [6-10](#333037_2_En_6_Chapter.xhtml#Fig10),
    the fragmentation of the leaf level of the index has increased from 0.08% to a
    massive 71.64%, which will severely impact queries run against the index. Indexes
    and fragmentation will be discussed in detail in Chapter [8](#333037_2_En_8_Chapter.xhtml).


    ### Note


    The fragmentation level may vary depending on the layout of extents within your
    file(s).


    ![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig10_HTML.jpg](images/333037_2_En_6_Chapter/333037_2_En_6_Fig10_HTML.jpg)


    Figure 6-10


    Results of fragmentation


    ## Database Scoped Configurations


    Prior to SQL Server 2016, Trace Flags could be configured on the SQL Server service
    (see Chapter [5](#333037_2_En_5_Chapter.xhtml)), which changed the default behavior
    of how SQL Server stored data and performed autogrowth events. The first of these
    was T1117, which was used to make all files within a filegroup grow at the same
    time, which was helpful for distributing data evenly, especially in data warehousing
    scenarios. The other was T1118, which was used to force uniform extents to be
    used exclusively—essentially turning off mixed extents (where different pages
    within an extent can be allocated to different tables). T1118 was useful for optimizing
    TempDB, but could also prove useful in data warehousing scenarios.


    From SQL Server 2016 onward, T1117 and T1118 have no effect, if they are turned
    on. They have been replaced by database scoped configurations, which have two
    main benefits. Firstly, database scoped configurations are configured at the database
    level, instead of the instance level. This means that a single consolidated instance
    can easily support databases with different workload profiles. Secondly, database
    scoped configurations are documented and supported by Microsoft. While T1117 and
    T1118 were well known and well used, they had no official support from Microsoft.


    ### Note


    The equivalent behavior of T1117 and T1118 is assumed by default on the TempDB
    database. For user databases, however, the traditional default behavior is assumed.


    We could assume the equivalent of T1117 for the Primary filegroup, in the Chapter6
    database, by using the command in Listing [6-14](#333037_2_En_6_Chapter.xhtml#PC14).


    ```

    ALTER DATABASE Chapter6 MODIFY FILEGROUP [Primary] AUTOGROW_ALL_FILES

    Listing 6-14

    Turn On Autogrow All Files

    ```


    The command in Listing [6-15](#333037_2_En_6_Chapter.xhtml#PC15) will assume the
    equivalent behavior of T1118 for the Chapter6 database.


    ```

    ALTER DATABASE Chapter6 SET MIXED_PAGE_ALLOCATION OFF

    Listing 6-15

    Turn Off Mixed Page Allocations

    ```'
  trans: '## 收缩文件


    正如你可以扩展数据库文件一样，你也可以收缩它们。实现此目的有多种方法，包括收缩单个文件、收缩数据库中的所有文件（包括日志文件），甚至可以在数据库级别设置 `自动收缩`
    选项。


    要收缩单个文件，你需要使用 `DBCC SHRINKFILE` 命令。使用此选项时，你可以指定文件的目标大小，或者指定 `EMPTYFILE` 选项。`EMPTYFILE`
    选项会将文件内的所有数据移动到同一文件组内的其他文件中。这意味着你随后可以从数据库中删除该文件。


    如果你为数据库指定了目标大小，那么你可以选择指定 `TRUNCATEONLY` 或 `NOTRUNCATE`。如果你选择前者，那么 SQL Server 将从文件末尾开始回收空间，直到达到最后一个已分配的区。如果你选择后者，那么
    SQL Server 将从文件末尾开始，将已分配的区移动到文件开头的第一个可用空间。


    为了移除我们已扩展的 `Chapter6_File4` 文件末尾的未使用空间，我们可以使用 SQL Server Management Studio 中的“收缩文件”屏幕，可以通过右键单击数据库并依次选择“任务”➤“收缩”➤“文件”来找到。在“收缩文件”屏幕中，我们可以从“文件名”下拉框中选择相应的文件，然后确保选中“释放未使用的空间”单选按钮。此选项强制执行
    `TRUNCATEONLY`。


    我们也可以通过运行清单 6-11 中的命令来实现相同的结果。


    ```sql

    USE [Chapter6]

    GO

    DBCC SHRINKFILE (N''Chapter6_File4'', 0, TRUNCATEONLY);

    ```

    清单 6-11

    使用 `TRUNCATEONLY` 收缩文件


    如果我们想要回收数据库中所有文件末尾的未使用空间，我们可以右键单击数据库并依次选择“任务”➤“收缩”➤“数据库”。然后，确保“在释放未使用的空间前重新组织文件”选项未被选中，并单击“确定”。


    我们可以通过运行清单 6-12 中的 T-SQL 命令来实现相同的结果。


    ```sql

    USE [Chapter6]

    GO

    DBCC SHRINKDATABASE(N''Chapter6'' );

    ```

    清单 6-12

    通过 T-SQL 收缩数据库


    需要收缩数据库甚至单个文件的情况非常少见。有一种误解认为大型的空文件备份需要更长时间，但这是错误的。事实上，在我的职业生涯中，我只有一次需要收缩数据文件。那次发生在我们从数据库中移除了几百
    GB 的存档数据后，接近 2TB LUN 限制时，但这属于特殊情况。一般来说，你不应该考虑收缩数据库文件，并且绝对不应该在数据库上使用 `自动收缩` 选项。


    如果你确实必须收缩数据库，请做好过程缓慢的准备。这是一个单线程操作，运行时会消耗资源。你也绝不应该考虑使用 `NOTRUNCATE` 选项。如前所述，这将导致区在文件内部移动，并导致严重的碎片化问题，就像你可以使用清单
    6-13 中的脚本看到的那样。此脚本首先在我们的 `RoundRobin` 表上创建一个聚集索引。然后使用 `sys.dm_db_index_physical_stats`
    DMV 来检查聚集索引叶级别的碎片级别。随后，它收缩数据库，然后重新检查我们聚集索引叶级别的碎片级别。


    ```sql

    USE Chapter6

    GO

    --在 RoundRobinTable 上创建聚集索引

    CREATE UNIQUE CLUSTERED INDEX CIX_RoundRobinTable ON dbo.RoundRobinTable(ID);

    GO

    --检查新索引的碎片

    SELECT * FROM sys.dm_db_index_physical_stats(DB_ID(''Chapter6''),OBJECT_ID(''dbo.RoundRobinTable''),1,NULL,''DETAILED'')

    WHERE index_level = 0;

    --收缩数据库

    DBCC SHRINKDATABASE(N''Chapter6'', NOTRUNCATE);

    GO

    --重新检查索引碎片

    SELECT * FROM sys.dm_db_index_physical_stats(DB_ID(''Chapter6''),OBJECT_ID(''dbo.RoundRobinTable''),1,NULL,''DETAILED'')

    WHERE index_level = 0;

    GO

    ```

    清单 6-13

    由收缩引起的碎片


    如图 6-10 所示的结果，索引叶级别的碎片从 0.08% 增加到了惊人的 71.64%，这将严重影响针对该索引运行的查询。索引和碎片将在第 8 章中详细讨论。


    ### 注意


    碎片级别可能因文件内区的布局而异。


    ![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig10_HTML.jpg](img/333037_2_En_6_Fig10_HTML.jpg)


    图 6-10

    碎片结果


    ## 数据库范围配置


    在 SQL Server 2016 之前，可以在 SQL Server 服务上配置跟踪标志（参见第 5 章），这些标志改变了 SQL Server 存储数据和执行自动增长事件的默认行为。其中第一个是
    `T1117`，用于使文件组中的所有文件同时增长，这有助于均匀分布数据，尤其是在数据仓库场景中。另一个是 `T1118`，用于强制专门使用统一区——本质上是关闭了混合区（其中区内的不同页可以分配给不同的表）。`T1118`
    对于优化 `TempDB` 很有用，但在数据仓库场景中也可能被证明是有用的。


    从 SQL Server 2016 开始，如果启用 `T1117` 和 `T1118`，它们将不再有效。它们已被数据库范围配置所取代，这些配置有两个主要好处。首先，数据库范围配置是在数据库级别配置的，而不是实例级别。这意味着一个统一的整合实例可以轻松支持具有不同工作负载配置文件的数据库。其次，数据库范围配置有
    Microsoft 的文档记录和支持。虽然 `T1117` 和 `T1118` 众所周知且被广泛使用，但它们没有来自 Microsoft 的官方支持。


    ### 注意


    `T1117` 和 `T1118` 的等效行为在 `TempDB` 数据库上默认启用。然而，对于用户数据库，则采用传统的默认行为。


    我们可以使用清单 6-14 中的命令，在 `Chapter6` 数据库的 `Primary` 文件组上启用等同于 `T1117` 的行为。


    ```sql

    ALTER DATABASE Chapter6 MODIFY FILEGROUP [Primary] AUTOGROW_ALL_FILES

    ```

    清单 6-14

    开启“自动增长所有文件”


    清单 6-15 中的命令将为 `Chapter6` 数据库启用等同于 `T1118` 的行为。


    ```sql

    ALTER DATABASE Chapter6 SET MIXED_PAGE_ALLOCATION OFF

    ```

    清单 6-15

    关闭“混合页分配”'
- fmt: '## Log Maintenance


    The transaction log is a vital tool in SQL Server’s armory; it provides recovery
    functionality but also supports many features, such as AlwaysOn Availability Groups,
    transactional replication, change data capture, and many more.


    Internally, the log file is split down into a series of VLFs (virtual log files).
    When the final VLF in the log file becomes full, SQL Server will attempt to wrap
    around to the first VLF at the beginning of the log. If this VLF has not been
    truncated and cannot be reused, then SQL Server will attempt to grow the log file.
    If it is not able to expand the file due to lack of disk space or max size settings,
    then a 9002 error will be thrown and the transaction will be rolled back. Figure
    [6-11](#333037_2_En_6_Chapter.xhtml#Fig11) illustrates the structure of the log
    file and its circular usage.


    ![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig11_HTML.jpg](images/333037_2_En_6_Chapter/333037_2_En_6_Fig11_HTML.jpg)


    Figure 6-11: Log file structure


    The amount of VLFs inside a log file is determined by the size of the log when
    it was initially created and also the size that it is expanded by each time it
    grows. If the log file is created at or grows in increments of less than 64MB,
    then 4 VLFs will be added to the file. If it is created at or grows in increments
    between 64MB and 1GB, then 8 VLFs will be added to the file. If it is created
    at or grows by more than 1GB, then 16 VLFs will be added.


    The transaction log is a fairly low-maintenance component of the SQL Server stack.
    There will be times, however, when maintenance scenarios occur; these are discussed
    in the following sections.


    ### Recovery Model


    The `recovery model` is a database-level property that controls how transactions
    are logged and, therefore, it has an impact on transaction log maintenance. The
    three recovery models within SQL Server are described in Table [6-1](#333037_2_En_6_Chapter.xhtml#Tab1).


    Table 6-1: Recovery Models


    | Recovery Model | Description |

    | --- | --- |

    | `SIMPLE` | In the `SIMPLE` recovery model, it is not possible to back up the
    transaction log. Transactions are minimally logged and the log will automatically
    be truncated. In `SIMPLE` recovery model, the transaction log only exists to allow
    transactions to be rolled back. It is incompatible with several HADR (high availability/disaster
    recovery) technologies, such as AlwaysOn Availability Groups, Log Shipping, and
    database mirroring. This model is appropriate for reporting databases where updates
    only occur on an infrequent basis. This is because point-in-time recovery is not
    possible. The recovery point objective will be the time of the last `FULL` or
    `DIFFERENTIAL` backup. |

    | `FULL` | In the `FULL` recovery model, transaction log backups must be taken.
    The log will only be truncated during the log backup process. Transactions are
    fully logged and this means that point-in-time recovery is possible. It also means
    that you must have a complete chain of log file backups to restore a database
    to the most recent point. |

    | `BULK LOGGED` | The `BULK_LOGGED` recovery model is meant to be used on a temporary
    basis when you are using the `FULL` recovery model but need to perform a large
    `BULK INSERT` operation. When you switch to this mode, `BULK INSERT` operations
    are minimally logged. You then switch back to `FULL` recovery model when the import
    is complete. In this recovery model, you can restore to the end of any backup,
    but not to a specific point in time between backups. |


    ### Note


    Recovery models will be discussed further in Chapter [12](#333037_2_En_12_Chapter.xhtml).


    ### Log File Count


    Several times I have witnessed a misconception that having multiple log files
    can improve the performance of a database. This is a fallacy. The idea is driven
    by the belief that if you have multiple log files on separate drives, you can
    distribute IO and relieve the log as a bottleneck.


    The truth is that the transaction log is sequential, and even if you add multiple
    log files, SQL Server treats them as if they are a single file. This means that
    the second file will only be used after the first file becomes full. As a result,
    no performance benefit can be gained from this practice. In fact, the only possible
    reason that you would ever need more than one transaction log file is if you ran
    out of space on the LUN that was hosting the log, and for some reason it cannot
    be moved elsewhere and the volume can’t be expanded. In my professional career,
    although I have encountered multiple log files on several occasions, I have never
    encountered a valid reason for having them.


    ### Shrinking the Log


    Shrinking your log file should never be part of your standard maintenance routines.
    There is no benefit to adopting this policy. There are some occasions, however,
    when you may have to shrink a log file, and, thankfully, it does not come with
    the same hazards as shrinking a data file.


    The usual reason for needing to shrink your log file is when an atypical activity
    occurs in your database, such as an initial data population or a one-time ETL
    load. If this is the case, and your log file expands past the point where space
    thresholds on your volume are being breached, then reducing the size of the file
    is likely to be the best course of action, as opposed to expanding the volume
    that is hosting it. In this eventuality, however, you should carefully analyze
    the situation to ensure that it really is an atypical event. If it seems like
    it could occur again, then you should consider increasing capacity to deal with
    it.


    To shrink a log file, you can use the Shrink File dialog box. Here, select Log
    in the File Type drop-down box. This causes the Filegroup drop-down box to be
    grayed out and, assuming you only have one log file, it will automatically be
    selected in the File Name drop-down. If you have multiple transaction log files,
    you will be able to select the appropriate file from the drop-down list. As with
    shrinking a data file, choosing the Release Unused Space option will cause `TRUNCATEONLY`
    to be used.


    Alternatively, you can use the script in Listing [6-16](#333037_2_En_6_Chapter.xhtml#PC16)
    to achieve the same results. It is important to note, however, that shrinking
    the log file may not actually result in any space being reclaimed. This happens
    if the last VLF in the file cannot be reused. A full list of reasons why it may
    not be possible to reuse a VLF is included later in this chapter.


    ```

    USE [Chapter6]

    GO

    DBCC SHRINKFILE (N''Chapter6_log'', 0, TRUNCATEONLY);

    GO

    Listing 6-16: Shrinking a Log with TRUNCATEONLY

    ```


    ### Tip


    Because shrinking the transaction log always involves reclaiming space from the
    end of the log, until the first active VLF is reached, it is sensible to take
    a log backup and place the database in single user mode before performing this
    activity.'
