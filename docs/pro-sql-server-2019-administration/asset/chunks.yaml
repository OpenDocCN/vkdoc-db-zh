  trans: '

    ### TempDB


    TempDB 是 SQL Server 在需要创建临时对象时使用的一个工作区。这既适用于用户创建的临时表，也适用于一个较少被提及的场景：表变量。表变量总是在
    TempDB 中创建对象，但数据只有在超过大小阈时才会被溢出到磁盘。此外，SQL Server 还有很多内部原因需要创建临时对象。部分关键原因如下：


    *   排序和溢出数据

    *   哈希数据，例如用于联接和聚合分组

    *   在线索引操作

    *   结果需要在 TempDB 中排序的索引操作

    *   触发器

    *   DBCC 命令

    *   DML 语句的 `OUTPUT` 子句

    *   快照隔离、已提交读快照隔离、在 MARS 上查询等场景的行版本控制


    由于 TempDB 负责如此多的任务，在高吞吐量的实例中，它很可能具有非常高的吞吐量。因此，为了确保数据层应用程序的最佳性能，它是你最应该花时间配置的系统数据库。


    你首先应该考虑的是 TempDB 的大小。理想情况下，对于大型或高事务量的实例，应进行 TempDB 的容量规划。完整的容量规划讨论超出了本书范围，但理想情况下，这涉及到使用一台测试服务器，将实例上所有用户数据库扩展到通过它们自身的容量规划活动所预期的增长大小。然后，你会通过这些数据库运行代表性工作负载，并监控
    TempDB 的使用情况。此外，你还应该对已扩展到预期大小的数据库执行管理任务。具体来说，这包括诸如重建索引等活动，以便你可以检查 TempDB 在这些活动期间的使用情况。有多个
    `DMV`（动态管理视图）可以协助你进行此规划。其中最有用的一些在表 5-6 中描述。


    表 5-6：用于 TempDB 容量规划的 DMV


    | DMV | 描述 |

    | --- | --- |

    | `sys.dm_db_session_space_usage` | 显示为每个当前会话分配的页数。这将包括以下对象的页数：• 用户表和系统表• 用户索引和系统索引•
    临时表• 临时索引• 表变量• 函数返回的表• 用于排序和哈希操作的内部对象• 用于溢出和大型对象操作的内部对象 |

    | `sys.dm_db_task_space_usage` | 显示由任务分配的页数。这将包括与 `sys.dm_db_session_space_usage`
    相同的对象类型的页数。 |

    | `sys.dm_db_file_space_usage` | 显示数据库中所有文件的完整使用信息，包括页数和区数。要返回 TempDB 的数据，你必须在
    TempDB 数据库的上下文中查询此 `DMV`，因为它也可以返回用户数据库的数据。 |

    | `sys.dm_tran_version_store` | 为版本存储区中的每条记录返回一行。你可以查看原始数据或聚合它以获取大小总计。 |

    | `sys.dm_tran_active_snapshot_database_transactions` | 为每一个当前可能需要访问版本存储区的事务返回一行，原因可能是隔离级别、触发器、`MARS`（多活动结果集）或在线索引操作。
    |


    #### 优化 TempDB


    除了 TempDB 的大小，你还应仔细考虑所需的文件数量。这很重要，因为许多对象被非常快速地创建和删除，如果文件太少，你可能会遇到 `GAM` 和 `SGAM`
    页的争用。另一方面，如果文件太多，开销可能会增加。这是因为 SQL Server 为了保持比例填充，会在文件组内依次为每个文件分配页。当文件数量很多时，为了确定是否应更改每个文件的分配权重，将会有额外的同步开销。


    ### 提示


    一些 SQL Server 专家建议不应显式删除临时表，而应由垃圾回收线程来清理。就我个人而言，虽然我理解这样做的好处，但我认为需要权衡其他考虑因素，例如代码质量，尤其是在大型、复杂的存储过程中。


    当前的通用建议是，应该为实例可用的每个核心分配一个 TempDB 文件，最少两个文件，最多八个文件。只有当你明确观察到 `GAM/SGAM` 争用时，才应添加超过八个文件。这将表现为针对
    TempDB 的 `PAGELATCH` 等待。你将在第 6 章找到关于如何添加文件及其大小调整的讨论。


    ### 提示


    `PAGEIOLATCH` 等待表明的问题与 `PAGELATCH` 等待不同。如果你看到针对 TempDB 的 `PAGEIOLATCH` 等待，这表明底层存储是瓶颈。等待类型将在第
    17 章中更详细地讨论。


    SQL Server 2019 引入了一项针对 TempDB 的新优化，称为内存优化 TempDB 元数据。顾名思义，此功能将负责管理 TempDB 元数据的系统表存储在非持久化的内存优化表中。


    ### 提示


    有关内存优化表的更多详细信息，请参阅第 7 章。


    这是一项重要的新功能，通过消除 TempDB 系统页上的争用瓶颈，提高了 SQL Server 的可扩展性。然而，它并非没有代价，在实施此功能之前，你必须意识到单个事务不能跨多个数据库访问内存优化表。如果你有执行诸如自定义监控等活动的脚本，这可能会导致问题。


    例如，你可能有一个如代码清单 5-10 所示的记录脚本。该脚本的第一部分创建了 `Chapter5` 数据库。`CaptureTempTableCount`
    存储过程将临时表的数量插入到一个内存优化表中。假设此过程配置为通过 SQL Server Agent 每分钟运行一次（参见第 22 章）。然后，你可以在持续的容量规划工作中使用
    `TempTableCount` 表。


    ```sql

    --创建 Chapter5 数据库

    CREATE DATABASE Chapter5

    GO

    USE Chapter5

    GO

    --添加一个内存优化文件组

    ALTER DATABASE Chapter5 ADD FILEGROUP memopt

    CONTAINS MEMORY_OPTIMIZED_DATA;

    ALTER DATABASE Chapter5 ADD (

    name=''memopt1'', filename=''c:\data\memopt1''

    ) TO FILEGROUP memopt ;

    ALTER DATABASE Chapter5

    SET MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT = ON ;

    GO

    CREATE TABLE TempTableCount (

    ID                INT                IDENTITY(1,1)    NOT NULL   PRIMARY KEY NONCLUSTERED,

    TableCount   INT               NOT NULL,

    DateTime     DateTime2         NOT NULL

    ) WITH(MEMORY_OPTIMIZED=ON) ;

    GO

    CREATE PROCEDURE CaptureTempTableCount

    AS

    BEGIN

    BEGIN TRANSACTION

    INSERT INTO TempTableCount (TableCount, DateTime)

    SELECT COUNT(*) As TableCount, SYSDATETIME() AS DateTime

    FROM tempdb.sys.tables t

    WHERE type = ''U''

    COMMIT

    END

    GO

    --代码清单 5-10

    --在 TempDB 中使用内存优化表

    ```


    如果你测试此过程，会发现它按预期工作。但现在，让我们使用代码清单 5-11 中的命令开启内存优化 TempDB 元数据。


    ```sql

    ALTER SERVER CONFIGURATION SET MEMORY_OPTIMIZED TEMPDB_METADATA = ON ;

    --代码清单 5-11

    --启用内存优化 TempDB 元数据

    ```


    如果你再次测试该过程，会注意到它现在失败了，因为它试图访问多个数据库中的内存优化表。要解决此问题，你需要使用基于磁盘的表，而不是内存优化表。

    '
- fmt: '## Buffer Pool Extension


    As already mentioned, the buffer pool is an area of memory that SQL Server uses
    to cache pages before they are written to disk and after they have been read from
    disk. There are two distinct types of pages that exist in the buffer cache: clean
    pages and dirty pages. A `clean page` is a page to which no modifications have
    been made. Clean pages usually exist in the cache because they have been accessed
    by read operations, such as `SELECT` statements. Once in the cache, they can support
    all statements. For example, a DML statement can access the clean page, modify
    it, and then update its dirty page marker.


    Dirty pages are pages that have been modified by statements such as `INSERT`,
    `UPDATE`, and `DELETE`, among others. These pages need to have their associated
    log record written to disk and, subsequently, the dirty pages themselves will
    be flushed to disk, before they are regarded as clean. The process of writing
    the log record first is known as WAL (write-ahead logging), and it is how SQL
    Server ensures that no committed data can ever be lost, even in the event of a
    system failure.


    Dirty pages are always kept in the cache until they are flushed to disk. Clean
    pages, on the other hand, are kept in cache for as long as possible, but are removed
    when space is required for new pages to be cached. SQL Server evicts pages based
    on a least recently used policy. This means that read-intensive workloads can
    rapidly start to suffer from memory pressure if the buffer cache is not correctly
    sized.


    The issue here is that RAM is expensive, compared to storage, and it may not be
    possible to keep throwing more and more memory at the problem. In order to address
    this, Microsoft introduced a technology in SQL Server 2014 called buffer pool
    extensions.


    A buffer pool extension is designed to be used with very fast SSDs, which will
    normally be locally attached to the server, as opposed to being located on a SAN.
    In short, the storage needs to operate as fast as possible. The extension will
    then become a secondary cache for clean pages only. When clean pages are evicted
    from the cache, they will be moved to the buffer pool extension, where they can
    be retrieved faster than by going back to the main IO subsystem.


    This is a very useful feature, but it is not a magic bullet. First, it is important
    to remember that the buffer pool extension will never be able to provide the same
    performance improvement as a correctly sized buffer cache will without an extension.
    Second, the performance gain that you will experience from using a buffer pool
    extension is workload specific. For example, a read-intensive OLTP workload will
    probably benefit substantially from buffer pool extensions, whereas a write-intensive
    workload will see little benefit at all. This is because dirty pages cannot be
    flushed to the extension. Large data warehouses are also unlikely to benefit dramatically
    from buffer pool extensions. This is because the tables are likely to be so large
    that a full table scan, which is common with this workload scenario, is likely
    to consume the majority of both the cache and the extension. This means that it
    will wipe out other data from the extension and will be unlikely to benefit subsequent
    queries.


    It is sensible to use a resilient SSD volume such as a RAID 10 stripe. This is
    because if the volume were to fail, with no resilience, your server would immediately
    see a drop in performance. In the event that the SSD drive that your extension
    is stored on fails, SQL Server will automatically disable the extension. It can
    be re-enabled manually, or it will automatically attempt to re-enable itself when
    the instance is restarted.


    I also recommend that you size the extension between four and eight times the
    size of your `Max Server Memory` setting in order to obtain optimum performance.
    The maximum possible size of the extension is 32 times the size of the `Max Server
    Memory` setting.


    Buffer pool extension can be enabled using the statement shown in Listing [5-12](#333037_2_En_5_Chapter.xhtml#PC12).
    This script assumes that the SSD drive that you wish to use is mapped as the `S:\`
    volume. It also assumes that we have 32GB set as the `Max Server Memory` setting,
    so we will configure the extension to be 128GB, which is four times the size.


    ```sql

    ALTER SERVER CONFIGURATION

    SET BUFFER POOL EXTENSION ON

    (FILENAME = ''S:\SSDCache.BPE'', SIZE = 128 GB )

    ```

    Listing 5-12

    Enable Buffer Pool Extension


    If required, the buffer pool extension can be disabled by using the command in
    Listing [5-13](#333037_2_En_5_Chapter.xhtml#PC13). Be warned, however, that removing
    a buffer pool extension is likely to result in a sudden drop in performance.


    ```sql

    ALTER SERVER CONFIGURATION

    SET BUFFER POOL EXTENSION OFF

    ```

    Listing 5-13

    Disable Buffer Pool Extension


    ## Hybrid Buffer Pool


    SQL Server 2019 introduces the Hybrid Buffer Pool, offering support for PMEM (persistent
    memory). PMEM is also known as SCM (storage class memory). A PMEM device resides
    on the memory bus and is solid-state and byte-addressable. This makes it faster
    than flash disks and cheaper than DRAM. The data stored on a PMEM device persists,
    after the server has been powered off.


    When formatting a PMEM device in Windows (PMEM devices are supported by Windows
    Server 2016 and higher) for use with a Hybrid Buffer Pool, you should enable `DirectAccess`
    and use an allocation unit size of 2MB on Windows Server 2019, or the largest
    available size, on other versions of Windows Server.


    Once the drive has been created, SQL Server transaction logs can be stored on
    the device. SQL Server will then use memory-mapped IO (also known as enlightenment)
    when reading clean pages from the buffer pool. This mitigates the need to copy
    the page into DRAM, before accessing it, therefore reducing IO latency.


    Enlightenment can only be used for clean pages. If a page becomes dirty, then
    it will be written to DRAM, before finally being flushed back to the PMEM device.


    To enable PMEM support in SQL Server, running on a Windows operating system, simply
    enable Trace Flag `809` on the SQL Server service. For SQL Server running on Linux,
    Trace Flag `3979` must be enabled on the SQL Server service. (Please see the “Trace
    Flags” section of this chapter for information on how to enable a trace flag.)'
  raw: '## Buffer Pool Extension


    As already mentioned, the buffer pool is an area of memory that SQL Server uses
    to cache pages before they are written to disk and after they have been read from
    disk. There are two distinct types of pages that exist in the buffer cache: clean
    pages and dirty pages. A *clean page* is a page to which no modifications have
    been made. Clean pages usually exist in the cache because they have been accessed
    by read operations, such as `SELECT` statements. Once in the cache, they can support
    all statements. For example, a DML statement can access the clean page, modify
    it, and then update its dirty page marker.


    Dirty pages are pages that have been modified by statements such as `INSERT`,
    `UPDATE`, and `DELETE`, among others. These pages need to have their associated
    log record written to disk and, subsequently, the dirty pages themselves will
    be flushed to disk, before they are regarded as clean. The process of writing
    the log record first is known as WAL (write-ahead logging), and it is how SQL
    Server ensures that no committed data can ever be lost, even in the event of a
    system failure.


    Dirty pages are always kept in the cache until they are flushed to disk. Clean
    pages, on the other hand, are kept in cache for as long as possible, but are removed
    when space is required for new pages to be cached. SQL Server evicts pages based
    on a least recently used policy. This means that read-intensive workloads can
    rapidly start to suffer from memory pressure if the buffer cache is not correctly
    sized.


    The issue here is that RAM is expensive, compared to storage, and it may not be
    possible to keep throwing more and more memory at the problem. In order to address
    this, Microsoft introduced a technology in SQL Server 2014 called buffer pool
    extensions.


    A buffer pool extension is designed to be used with very fast SSDs, which will
    normally be locally attached to the server, as opposed to being located on a SAN.
    In short, the storage needs to operate as fast as possible. The extension will
    then become a secondary cache for clean pages only. When clean pages are evicted
    from the cache, they will be moved to the buffer pool extension, where they can
    be retrieved faster than by going back to the main IO subsystem.


    This is a very useful feature, but it is not a magic bullet. First, it is important
    to remember that the buffer pool extension will never be able to provide the same
    performance improvement as a correctly sized buffer cache will without an extension.
    Second, the performance gain that you will experience from using a buffer pool
    extension is workload specific. For example, a read-intensive OLTP workload will
    probably benefit substantially from buffer pool extensions, whereas a write-intensive
    workload will see little benefit at all. This is because dirty pages cannot be
    flushed to the extension. Large data warehouses are also unlikely to benefit dramatically
    from buffer pool extensions. This is because the tables are likely to be so large
    that a full table scan, which is common with this workload scenario, is likely
    to consume the majority of both the cache and the extension. This means that it
    will wipe out other data from the extension and will be unlikely to benefit subsequent
    queries.


    It is sensible to use a resilient SSD volume such as a RAID 10 stripe. This is
    because if the volume were to fail, with no resilience, your server would immediately
    see a drop in performance. In the event that the SSD drive that your extension
    is stored on fails, SQL Server will automatically disable the extension. It can
    be re-enabled manually, or it will automatically attempt to re-enable itself when
    the instance is restarted.


    I also recommend that you size the extension between four and eight times the
    size of your Max Server Memory setting in order to obtain optimum performance.
    The maximum possible size of the extension is 32 times the size of the Max Server
    Memory setting.


    Buffer pool extension can be enabled using the statement shown in Listing [5-12](#333037_2_En_5_Chapter.xhtml#PC12).
    This script assumes that the SSD drive that you wish to use is mapped as the `S:\`
    volume. It also assumes that we have 32GB set as the Max Server Memory setting,
    so we will configure the extension to be 128GB, which is four times the size.


    ```

    ALTER SERVER CONFIGURATION

    SET BUFFER POOL EXTENSION ON

    (FILENAME = ''S:\SSDCache.BPE'', SIZE = 128 GB )

    Listing 5-12

    Enable Buffer Pool Extension

    ```


    If required, the buffer pool extension can be disabled by using the command in
    Listing [5-13](#333037_2_En_5_Chapter.xhtml#PC13). Be warned, however, that removing
    a buffer pool extension is likely to result in a sudden drop in performance.


    ```

    ALTER SERVER CONFIGURATION

    SET BUFFER POOL EXTENSION OFF

    Listing 5-13

    Disable Buffer Pool Extension

    ```


    ## Hybrid Buffer Pool


    SQL Server 2019 introduces the Hybrid Buffer Pool, offering support for PMEM (persistent
    memory). PMEM is also known as SCM (storage class memory). A PMEM device resides
    on the memory bus and is solid-state and byte-addressable. This makes it faster
    than flash disks and cheaper than DRAM. The data stored on a PMEM device persists,
    after the server has been powered off.


    When formatting a PMEM device in Windows (PMEM devices are supported by Windows
    Server 2016 and higher) for use with a Hybrid Buffer Pool, you should enable DirectAccess
    and use an allocation unit size of 2MB on Windows Server 2019, or the largest
    available size, on other versions of Windows Server.


    Once the drive has been created, SQL Server transaction logs can be stored on
    the device. SQL Server will then use memory-mapped IO (also known as enlightenment)
    when reading clean pages from the buffer pool. This mitigates the need to copy
    the page into DRAM, before accessing it, therefore reducing IO latency.


    Enlightenment can only be used for clean pages. If a page becomes dirty, then
    it will be written to DRAM, before finally being flushed back to the PMEM device.


    To enable PMEM support in SQL Server, running on a Windows operating system, simply
    enable Trace Flag 809 on the SQL Server service. For SQL Server running on Linux,
    Trace Flag 3979 must be enabled on the SQL Server service. (Please see the “Trace
    Flags” section of this chapter for information on how to enable a trace flag.)'
  trans: '

    ## 缓冲池扩展


    如前所述，缓冲池是 SQL Server 使用的一块内存区域，用于在页面写入磁盘前进行缓存，以及在页面从磁盘读取后进行缓存。缓冲区缓存中存在的页面有两种不同类型：干净页和脏页。一个`干净页`是指未经过任何修改的页面。干净页通常存在于缓存中是因为它们已被读取操作（例如
    `SELECT` 语句）访问过。一旦进入缓存，它们可以支持所有语句。例如，一个 DML 语句可以访问干净页，修改它，然后更新其脏页标记。


    脏页是已被诸如 `INSERT`、`UPDATE` 和 `DELETE` 等语句修改过的页面。这些页面需要将其关联的日志记录写入磁盘，随后，脏页本身才会被刷新到磁盘，之后它们才被视为干净页。先写入日志记录的过程被称为
    WAL（预写式日志），这是 SQL Server 确保即使发生系统故障，已提交数据也不会丢失的机制。


    脏页总是保留在缓存中，直到它们被刷新到磁盘。另一方面，干净页则会在缓存中尽可能长时间地保留，但当需要为要缓存的新页面腾出空间时，它们会被移除。SQL Server
    基于最近最少使用策略来淘汰页面。这意味着，如果缓冲区缓存的大小设置不当，读取密集型工作负载可能很快就会开始受到内存压力的影响。


    这里的问题在于，与存储相比，RAM 很昂贵，而且可能无法通过不断增加更多内存来解决问题。为了解决这个问题，微软在 SQL Server 2014 中引入了一项名为缓冲池扩展的技术。


    缓冲池扩展设计用于非常快速的 SSD，这些 SSD 通常直接连接到服务器，而不是位于 SAN 上。简而言之，存储需要尽可能快地运行。该扩展随后将成为仅用于缓存干净页的二级缓存。当干净页从缓存中被淘汰时，它们将被移动到缓冲池扩展中，在那里它们可以比返回主
    I/O 子系统更快地被检索。


    这是一个非常有用的功能，但它并非万能药。首先，必须记住，缓冲池扩展永远无法提供与正确调整大小、无需扩展的缓冲区缓存相同的性能提升。其次，使用缓冲池扩展所能获得的性能提升是特定于工作负载的。例如，一个读取密集型的
    OLTP 工作负载可能会从缓冲池扩展中显著受益，而写入密集型工作负载则几乎看不到任何好处。这是因为脏页不能被刷新到扩展中。大型数据仓库也不太可能从缓冲池扩展中获得显著收益。这是因为表可能非常大，以至于全表扫描（在此类工作负载场景中很常见）可能会消耗缓存和扩展中的大部分空间。这意味着它会从扩展中清除其他数据，并且不太可能使后续查询受益。


    使用弹性 SSD 卷（例如 RAID 10 条带化）是明智的。这是因为如果卷发生故障，而没有冗余，你的服务器性能将立即下降。如果存储扩展的 SSD 驱动器发生故障，SQL
    Server 将自动禁用该扩展。它可以手动重新启用，或者在实例重新启动时自动尝试重新启用。


    我还建议你将扩展的大小设置为 `Max Server Memory` 设置的四到八倍，以获得最佳性能。扩展的最大可能大小是 `Max Server Memory`
    设置大小的 32 倍。


    可以使用清单 5-12 中所示的语句启用缓冲池扩展。此脚本假定你希望使用的 SSD 驱动器映射为 `S:\` 卷。它还假设我们将 `Max Server Memory`
    设置为 32GB，因此我们将把扩展配置为 128GB，即大小的四倍。


    ```sql

    ALTER SERVER CONFIGURATION

    SET BUFFER POOL EXTENSION ON

    (FILENAME = ''S:\SSDCache.BPE'', SIZE = 128 GB )

    ```

    清单 5-12

    启用缓冲池扩展


    如果需要，可以使用清单 5-13 中的命令禁用缓冲池扩展。但请注意，移除缓冲池扩展可能会导致性能突然下降。


    ```sql

    ALTER SERVER CONFIGURATION

    SET BUFFER POOL EXTENSION OFF

    ```

    清单 5-13

    禁用缓冲池扩展


    ## 混合缓冲池


    SQL Server 2019 引入了混合缓冲池，提供对 PMEM（持久内存）的支持。PMEM 也称为 SCM（存储级内存）。PMEM 设备位于内存总线上，是固态且可按字节寻址的。这使其比闪存磁盘更快，比
    DRAM 更便宜。存储在 PMEM 设备上的数据在服务器断电后仍然保持。


    在 Windows（Windows Server 2016 及更高版本支持 PMEM 设备）中格式化用于混合缓冲池的 PMEM 设备时，应在 Windows
    Server 2019 上启用 `DirectAccess` 并使用 2MB 的分配单元大小，或在其他版本的 Windows Server 上使用最大的可用大小。


    驱动器创建后，可以将 SQL Server 事务日志存储在该设备上。然后，SQL Server 在从缓冲池读取干净页时将使用内存映射 I/O（也称为 enlightenment）。这减少了在访问页面之前将其复制到
    DRAM 的需要，从而降低了 I/O 延迟。


    Enlightenment 只能用于干净页。如果页面变脏，那么它将被写入 DRAM，最终再刷新回 PMEM 设备。


    要在运行 Windows 操作系统的 SQL Server 中启用 PMEM 支持，只需在 SQL Server 服务上启用跟踪标志 `809`。对于在 Linux
    上运行的 SQL Server，必须在 SQL Server 服务上启用跟踪标志 `3979`。（有关如何启用跟踪标志的信息，请参阅本章的“跟踪标志”部分。）

    '
- fmt: '## Summary


    你应该考虑如何为实例配置处理器和内存。关于处理器，这些考虑应包括多实例的亲和性掩码设置，或在 I/O 操作期间避免上下文切换。你还应该考虑环境中 `MAXDOP`
    的适当设置。


    关于内存，你应该考虑 `Min Server Memory` 和 `Max Server Memory` 最合适的用法，以及是否适合将它们配置为相同的值。你还应该考虑缓冲池扩展是否有助于系统性能，如果是，你应该使用
    `Max Server Memory` 作为计算此暖缓存正确大小的基础。


    跟踪标志用于切换设置，将它们添加为启动参数可确保你的实例始终按需配置。许多跟踪标志用于非常特定的目的，但有些具有更通用的用途，例如 `3226`，它会抑制成功的备份消息，以避免日志中的噪声掩盖问题。


    为了使你的 SQL Server 实例能够与网络上的应用程序和其他实例通信，你应该适当地配置实例端口和本地防火墙。通常认为为 SQL Server 连接使用动态端口是不好的做法，因此你应该将实例配置为使用特定的
    TCP 端口。


    所有五个系统数据库对于实例的正常运行都至关重要。然而，在配置方面，你应该最关注 `TempDB`。`TempDB` 被许多 SQL Server 功能大量使用，因此在繁忙的系统中它可能迅速成为瓶颈。你应该确保有正确数量的文件并且它们的大小设置正确。


    可以从控制面板或命令行卸载实例或从中移除功能。你应该注意，即使在实例卸载后，文件系统和注册表中仍会留有残留。


    ## Part II Database Administration


    ## 6. Database Configuration


    在数据库中，数据存储在一个或多个数据文件中。这些文件被分组到称为文件组的逻辑容器中。每个数据库还至少有一个日志文件。日志文件位于文件组容器之外，并且不遵循与数据文件相同的规则。本章首先讨论数据库管理员
    (DBA) 可以采用的文件组策略，然后再探讨 DBA 如何维护数据和日志文件。


    ### Data Storage


    在考虑采用哪种文件组策略之前，理解 SQL Server 如何存储数据非常重要。图 6-1 中的图表说明了数据库内的存储层次结构。


    ![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig1_HTML.jpg](images/333037_2_En_6_Chapter/333037_2_En_6_Fig1_HTML.jpg)


    *图 6-1 SQL Server 如何存储数据*


    数据库总是由至少一个文件组组成，该文件组至少包含一个文件。数据库中的第一个文件称为 *主文件*。默认情况下，此文件具有 `.mdf` 文件扩展名。但是，如果需要，你可以更改此扩展名。此文件可用于存储数据，但也用于存储提供数据库启动信息和指向数据库内其他文件指针的元数据。包含主文件的文件组称为
    *主文件组*。


    如果在数据库中创建了其他文件，则它们称为 *辅助文件*，默认情况下具有 `.ndf` 扩展名。但是，如果需要，你可以更改此扩展名。这些文件可以在主文件组和/或辅助文件组中创建。辅助文件和文件组是可选的，但正如我们将在本章后面讨论的那样，它们对数据库管理员非常有用。


    ### Tip


    保留默认的文件扩展名是一个好主意。使用不同的扩展名没有真正的好处，而且这样做会增加额外的复杂性。例如，你不仅需要记住使用了哪些扩展名，而且如果你的防病毒软件使用文件扩展名作为其排除列表，你可能会突然看到性能的严重下降。


    ### Filegroups


    表和索引存储在文件组上，而不是容器内的特定文件中。这意味着对于包含多个文件的文件组，你无法控制使用哪个文件来存储对象。事实上，由于 SQL Server 使用轮询方式分配数据到文件，存储在文件组中的每个对象极有可能被分割到文件组内的每个文件上。


    为了见证此行为，请运行清单 6-1 中的脚本。该脚本创建一个数据库，其主文件组包含三个文件。然后在该文件组上创建一个表并填充数据。最后，使用 `%%physloc%%`
    来确定表中每一行的存储位置。然后脚本计算每个文件中的行数。


    ### Tip


    将文件路径更改为匹配你自己的首选位置。


    ```sql

    USE Master

    GO

    --创建一个数据库，主文件组中有三个文件。

    CREATE DATABASE [Chapter6]

    CONTAINMENT = NONE

    ON  PRIMARY

    ( NAME = N''Chapter6'', FILENAME = N''F:\MSSQL\MSSQL15.PROSQLADMIN\MSSQL\DATA\Chapter6.mdf''),

    ( NAME = N''Chapter6_File2'',

    FILENAME = N''F:\MSSQL\MSSQL15.PROSQLADMIN\MSSQL\DATA\Chapter6_File2.ndf''),

    ( NAME = N''Chapter6_File3'',

    FILENAME = N''F:\MSSQL\MSSQL15.PROSQLADMIN\MSSQL\DATA\Chapter6_File3.ndf'')

    LOG ON

    ( NAME = N''Chapter6_log'',

    FILENAME = N''E:\MSSQL\MSSQL15.PROSQLADMIN\MSSQL\DATA\Chapter6_log.ldf'');

    GO

    IF NOT EXISTS (SELECT name FROM sys.filegroups WHERE is_default=1 AND name = N''PRIMARY'')

    ALTER DATABASE [Chapter6] MODIFY FILEGROUP [PRIMARY] DEFAULT;

    GO

    USE Chapter6

    GO

    --在新数据库中创建一个表。该表包含一个宽的、固定长度的列

    --以增加分配的数量。

    CREATE TABLE dbo.RoundRobinTable

    (

    ID       INT     IDENTITY    PRIMARY KEY,

    DummyTxt    NCHAR(1000),

    );

    GO

    --创建一个 Numbers 表，用于辅助表的填充。

    DECLARE @Numbers TABLE

    (

    Number    INT

    )

    --填充 Numbers 表。

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number +1

    FROM CTE

    WHERE Number <= 99

    )

    INSERT INTO @Numbers

    SELECT *

    FROM CTE;

    --用100行虚拟文本来填充示例表。

    INSERT INTO dbo.RoundRobinTable

    SELECT ''DummyText''

    FROM @Numbers a

    CROSS JOIN @Numbers b;

    --从表中选择所有数据，以及行物理位置的详细信息。

    --然后按文件 ID 分组计算行数。

    SELECT b.file_id, COUNT(*) AS [RowCount]

    FROM

    (

    SELECT ID, DummyTxt, a.file_id

    FROM dbo.RoundRobinTable

    CROSS APPLY sys.fn_PhysLocCracker(%%physloc%%) a

    ) b

    GROUP BY b.file_id;

    ```

    *清单 6-1 SQL Server 轮询分配*


    图 6-2 中显示的结果表明，行已均匀分布在文件组内的三个文件上。如果文件大小不同，那么空间最多的文件会由于比例填充算法而接收到更多的行，该算法试图权衡分配到每个文件的数据量，以便在每个文件之间均匀分布数据。


    ### Tip


    你可能会注意到没有为文件 2 返回行。这是因为 `file_id` 2 始终是事务日志文件（或者如果你有多个日志文件，则是第一个事务日志文件）。`file_id`
    1 始终是主数据库文件。


    ![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig2_HTML.jpg](images/333037_2_En_6_Chapter/333037_2_En_6_Fig2_HTML.jpg)


    *图 6-2 均匀分布的行*'
  raw: '## Summary


    You should consider how you should configure your processor and memory for the
    instance. With regard to the processor, these considerations should include affinity
    mask settings for multiple instances, or avoiding context switching during IO
    operations. You should also consider the appropriate settings for MAXDOP in your
    environment.


    With regard to memory, you should consider the most appropriate usage of Min and
    Max Server Memory and if it is appropriate to configure these to the same value.
    You should also consider if buffer pool extensions would help your system performance,
    and if so, you should use Max Server Memory as the base for calculating the correct
    size of this warm cache.


    Trace flags toggle settings on and off, and adding them as startup parameters
    will ensure that your instance is always configured as you require it to be. Many
    trace flags are for very specific purposes, but some have more generic usage,
    such as 3226, which will suppress successful backup messages to avoid noise in
    the logs masking issues.


    For your SQL Server instance to be able to communicate with applications and other
    instances on the network, you should configure the instance port and local firewall
    appropriately. It is generally considered bad practice to use a dynamic port for
    SQL Server connections, so you should configure the instance to use a specific
    TCP port.


    All five of the system databases are critical to the proper functioning of the
    instance. In terms of configuration, however, you should give most consideration
    to TempDB. TempDB is heavily used by many SQL Server features, and therefore it
    can quickly become a bottleneck in busy systems. You should ensure that you have
    the correct number of files and that they are sized correctly.


    Uninstalling an instance or removing features from an instance can be done either
    from Control Panel or from the command line. You should be mindful of the fact
    that even after an instance is uninstalled, there will still be a residue left
    in the file system and also in the Registry.


    # Part IIDatabase Administration


    # 6. Database Configuration


    Within a database, data is stored in one or more data files. These files are grouped
    into logical containers called filegroups. Every database also has at least one
    log file. Log files sit outside of filegroup containers and do not follow the
    same rules as data files. This chapter begins by discussing filegroup strategies
    that database administrators (DBAs) can adopt before it looks at how DBAs can
    maintain data and log files.


    ## Data Storage


    Before considering which filegroup strategies to adopt, it is important that you
    understand how SQL Server stores data. The diagram in Figure [6-1](#333037_2_En_6_Chapter.xhtml#Fig1)
    illustrates the storage hierarchy within a database.


    ![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig1_HTML.jpg](images/333037_2_En_6_Chapter/333037_2_En_6_Fig1_HTML.jpg)


    Figure 6-1


    How SQL Server stores data


    A database always consists of at least one filegroup, which contains a minimum
    of one file. The first file in the database is known as the *primary file*. This
    file is given an `.mdf` file extension by default. You can, however, change this
    extension if you wish. This file can be used to store data, but it is also used
    to store metadata that provides database startup information and pointers to other
    files within the database. The filegroup that contains the primary file is called
    the *primary filegroup* .


    If additional files are created within the database, they are known as *secondary
    files* and are given the `.ndf` extension by default. You can, however, change
    this extension if you wish. These files can be created in the primary filegroup
    and/or in secondary filegroups. Secondary files and filegroups are optional, but
    they can prove very useful to database administrators, as we will discuss later
    in this chapter.


    ### Tip


    It is a good idea to keep default file extensions. There are no real benefits
    in using different extensions and doing so adds extra complexity. For example,
    not only do you need to remember what extensions you used, but also, if your antivirus
    software uses file extensions for its exclusions list, you could suddenly see
    a nasty drop in performance.


    ### Filegroups


    Tables and indexes are stored on a filegroup, as opposed to a specific file within
    the container. This means that for filegroups containing more than one file, you
    have no control over which file is used to store the object. In fact, because
    SQL Server allocates data to files using a round-robin approach, each object stored
    in the filegroup has a very high chance of being split over every file within
    the filegroup.


    To witness this behavior, run the script in Listing [6-1](#333037_2_En_6_Chapter.xhtml#PC1).
    This script creates a database that has a single filegroup that contains three
    files. A table is then created on the filegroup and populated. Finally, `%%physloc%%`
    is used to determine where each of the rows within the table is stored. The script
    then counts the number of rows in each file.


    ### Tip


    Change the file paths to match your own preferred locations.


    ```

    USE Master

    GO

    --Create a database with three files in the primary filegroup.

    CREATE DATABASE [Chapter6]

    CONTAINMENT = NONE

    ON  PRIMARY

    ( NAME = N''Chapter6'', FILENAME = N''F:\MSSQL\MSSQL15.PROSQLADMIN\MSSQL\DATA\Chapter6.mdf''),

    ( NAME = N''Chapter6_File2'',

    FILENAME = N''F:\MSSQL\MSSQL15.PROSQLADMIN\MSSQL\DATA\Chapter6_File2.ndf''),

    ( NAME = N''Chapter6_File3'',

    FILENAME = N''F:\MSSQL\MSSQL15.PROSQLADMIN\MSSQL\DATA\Chapter6_File3.ndf'')

    LOG ON

    ( NAME = N''Chapter6_log'',

    FILENAME = N''E:\MSSQL\MSSQL15.PROSQLADMIN\MSSQL\DATA\Chapter6_log.ldf'');

    GO

    IF NOT EXISTS (SELECT name FROM sys.filegroups WHERE is_default=1 AND name = N''PRIMARY'')

    ALTER DATABASE [Chapter6] MODIFY FILEGROUP [PRIMARY] DEFAULT;

    GO

    USE Chapter6

    GO

    --Create a table in the new database. The table contains a wide, fixed-length
    column

    --to increase the number of allocations.

    CREATE TABLE dbo.RoundRobinTable

    (

    ID       INT     IDENTITY    PRIMARY KEY,

    DummyTxt    NCHAR(1000),

    );

    GO

    --Create a Numbers table that will be used to assist the population of the table.

    DECLARE @Numbers TABLE

    (

    Number    INT

    )

    --Populate the Numbers table.

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number +1

    FROM CTE

    WHERE Number <= 99

    )

    INSERT INTO @Numbers

    SELECT *

    FROM CTE;

    --Populate the example table with 100 rows of dummy text.

    INSERT INTO dbo.RoundRobinTable

    SELECT ''DummyText''

    FROM @Numbers a

    CROSS JOIN @Numbers b;

    --Select all the data from the table, plus the details of the row’s physical location.

    --Then group the row count.

    --by file ID

    SELECT b.file_id, COUNT(*) AS [RowCount]

    FROM

    (

    SELECT ID, DummyTxt, a.file_id

    FROM dbo.RoundRobinTable

    CROSS APPLY sys.fn_PhysLocCracker(%%physloc%%) a

    ) b

    GROUP BY b.file_id;

    Listing 6-1

    SQL Server Round-Robin Allocation

    ```


    The results displayed in Figure [6-2](#333037_2_En_6_Chapter.xhtml#Fig2) show
    that the rows have been distributed evenly over the three files within the filegroup.
    If the files are different sizes, then the file with the most space receives more
    of the rows due to the proportional fill algorithm, which attempts to weigh the
    allocations to each file in order to evenly distribute data across each of the
    files.


    ### Tip


    You may notice that there are no rows returned for File 2\. This is because file_id
    2 is always the transaction log file (or first transaction log file if you have
    more than one). file_id 1 is always the primary database file.


    ![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig2_HTML.jpg](images/333037_2_En_6_Chapter/333037_2_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Evenly distributed rows'
  trans: '

    ## 概要


    你需要考虑如何为实例配置处理器和内存。对于处理器，这些考虑应包括多实例的**亲和性掩码**设置，或在 I/O 操作期间避免上下文切换。你还应该考虑环境中 `MAXDOP`
    的适当设置。


    关于内存，你需要考虑 `最小服务器内存` 和 `最大服务器内存` 最合适的用法，以及是否适合将它们配置为相同的值。你还应该考虑缓冲池扩展是否有助于提升系统性能，如果是，你应该使用
    `最大服务器内存` 作为计算此暖缓存正确大小的基础。


    跟踪标志用于切换设置，将它们添加为启动参数可确保你的实例始终按需配置。许多跟踪标志用于非常特定的目的，但有些具有更通用的用途，例如 `3226`，它会抑制成功的备份消息，以避免日志中的噪声掩盖问题。


    为了使你的 SQL Server 实例能够与网络上的应用程序和其他实例通信，你应该适当地配置实例端口和本地防火墙。通常认为为 SQL Server 连接使用动态端口是不好的做法，因此你应该将实例配置为使用特定的
    TCP 端口。


    所有五个系统数据库对于实例的正常运行都至关重要。然而，在配置方面，你应该最关注 `TempDB`。`TempDB` 被许多 SQL Server 功能大量使用，因此在繁忙的系统中它可能迅速成为瓶颈。你应该确保有正确数量的文件并且它们的大小设置正确。


    可以从控制面板或命令行卸载实例或从中移除功能。你应该注意，即使在实例卸载后，文件系统和注册表中仍会留有残留。


    ## 第二部分 数据库管理


    ## 6. 数据库配置


    在数据库中，数据存储在一个或多个数据文件中。这些文件被分组到称为文件组的逻辑容器中。每个数据库还至少有一个日志文件。日志文件位于文件组容器之外，并且不遵循与数据文件相同的规则。本章首先讨论数据库管理员
    (DBA) 可以采用的文件组策略，然后再探讨 DBA 如何维护数据和日志文件。


    ### 数据存储


    在考虑采用哪种文件组策略之前，理解 SQL Server 如何存储数据非常重要。图 6-1 中的图表说明了数据库内的存储层次结构。


    ![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig1_HTML.jpg](img/333037_2_En_6_Fig1_HTML.jpg)


    *图 6-1 SQL Server 如何存储数据*


    数据库总是由至少一个文件组组成，该文件组至少包含一个文件。数据库中的第一个文件称为 *主文件*。默认情况下，此文件具有 `.mdf` 文件扩展名。但是，如果需要，你可以更改此扩展名。此文件可用于存储数据，但也用于存储提供数据库启动信息和指向数据库内其他文件指针的元数据。包含主文件的文件组称为
    *主文件组*。


    如果在数据库中创建了其他文件，则它们称为 *辅助文件*，默认情况下具有 `.ndf` 扩展名。但是，如果需要，你可以更改此扩展名。这些文件可以在主文件组和/或辅助文件组中创建。辅助文件和文件组是可选的，但正如我们将在本章后面讨论的那样，它们对数据库管理员非常有用。


    ### 提示


    保留默认的文件扩展名是一个好主意。使用不同的扩展名没有真正的好处，而且这样做会增加额外的复杂性。例如，你不仅需要记住使用了哪些扩展名，而且如果你的防病毒软件使用文件扩展名作为其排除列表，你可能会突然看到性能的严重下降。


    ### 文件组


    表和索引存储在文件组上，而不是容器内的特定文件中。这意味着对于包含多个文件的文件组，你无法控制使用哪个文件来存储对象。事实上，由于 SQL Server 使用轮询方式分配数据到文件，存储在文件组中的每个对象极有可能被分割到文件组内的每个文件上。


    为了见证此行为，请运行清单 6-1 中的脚本。该脚本创建一个数据库，其主文件组包含三个文件。然后在该文件组上创建一个表并填充数据。最后，使用 `%%physloc%%`
    来确定表中每一行的物理位置。然后脚本计算每个文件中的行数。


    ### 提示


    将文件路径更改为匹配你自己的首选位置。


    ```sql

    USE Master

    GO

    --创建一个数据库，主文件组中有三个文件。

    CREATE DATABASE [Chapter6]

    CONTAINMENT = NONE

    ON  PRIMARY

    ( NAME = N''Chapter6'', FILENAME = N''F:\MSSQL\MSSQL15.PROSQLADMIN\MSSQL\DATA\Chapter6.mdf''),

    ( NAME = N''Chapter6_File2'',

    FILENAME = N''F:\MSSQL\MSSQL15.PROSQLADMIN\MSSQL\DATA\Chapter6_File2.ndf''),

    ( NAME = N''Chapter6_File3'',

    FILENAME = N''F:\MSSQL\MSSQL15.PROSQLADMIN\MSSQL\DATA\Chapter6_File3.ndf'')

    LOG ON

    ( NAME = N''Chapter6_log'',

    FILENAME = N''E:\MSSQL\MSSQL15.PROSQLADMIN\MSSQL\DATA\Chapter6_log.ldf'');

    GO

    IF NOT EXISTS (SELECT name FROM sys.filegroups WHERE is_default=1 AND name = N''PRIMARY'')

    ALTER DATABASE [Chapter6] MODIFY FILEGROUP [PRIMARY] DEFAULT;

    GO

    USE Chapter6

    GO

    --在新数据库中创建一个表。该表包含一个宽的、固定长度的列

    --以增加分配的数量。

    CREATE TABLE dbo.RoundRobinTable

    (

    ID       INT     IDENTITY    PRIMARY KEY,

    DummyTxt    NCHAR(1000),

    );

    GO

    --创建一个 Numbers 表，用于辅助表的填充。

    DECLARE @Numbers TABLE

    (

    Number    INT

    )

    --填充 Numbers 表。

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number +1

    FROM CTE

    WHERE Number <= 99

    )

    INSERT INTO @Numbers

    SELECT *

    FROM CTE;

    --用 100 行虚拟文本来填充示例表。

    INSERT INTO dbo.RoundRobinTable

    SELECT ''DummyText''

    FROM @Numbers a

    CROSS JOIN @Numbers b;

    --从表中选择所有数据，以及行物理位置的详细信息。

    --然后按文件 ID 分组计算行数。

    SELECT b.file_id, COUNT(*) AS [RowCount]

    FROM

    (

    SELECT ID, DummyTxt, a.file_id

    FROM dbo.RoundRobinTable

    CROSS APPLY sys.fn_PhysLocCracker(%%physloc%%) a

    ) b

    GROUP BY b.file_id;

    ```

    *清单 6-1 SQL Server 轮询分配*


    图 6-2 中显示的结果表明，行已均匀分布在文件组内的三个文件上。如果文件大小不同，那么空间最多的文件会由于比例填充算法而接收到更多的行，该算法试图权衡分配到每个文件的数据量，以便在每个文件之间均匀分布数据。


    ### 提示


    你可能会注意到没有为文件 2 返回行。这是因为 `file_id` 2 始终是事务日志文件（或者如果你有多个日志文件，则是第一个事务日志文件）。`file_id`
    1 始终是主数据库文件。


    ![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig2_HTML.jpg](img/333037_2_En_6_Fig2_HTML.jpg)


    *图 6-2 均匀分布的行*

