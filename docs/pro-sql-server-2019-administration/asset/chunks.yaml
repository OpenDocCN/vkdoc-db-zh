    ### 覆盖索引


    虽然将所有必需的列都包含在非聚集索引中意味着你无需从基础表中检索数据，但权衡之处在于，非聚集索引中包含过多列会导致索引变得非常宽且低效。为了取得更好的平衡，SQL
    Server 为你提供了“包含列”的选项。


    包含列仅包含在索引的叶级，而索引键值则继续包含在 B 树的每一级。此功能可以帮助你在保持索引键尽可能窄的同时，覆盖你的查询。此概念在图 8-4 中有说明。该图展示了索引是使用
    `Balance` 作为索引键构建的，但 `FirstName` 和 `LastName` 列也被包含在叶级。你可以看到 `CustomerID` 也被包含在所有级中；这是因为
    `CustomerID` 是聚集索引键。由于聚集索引键包含在所有级中，这意味着该索引不是唯一的。如果它是唯一的，那么聚集键只包含在 B 树的叶级。这意味着唯一的非聚集索引总是比其非唯一等效索引更窄。此索引非常适合于在
    `WHERE` 子句中过滤 `Balance` 并返回 `FirstName` 和 `LastName` 列的查询。它也覆盖那些在结果中返回 `CustomerID`
    的查询。


    ### 提示


    如果聚集索引和非聚集索引都是非唯一的，则非聚集 B 树的每一级都包括聚集唯一标识符以及聚集键。


    ![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig4_HTML.jpg](img/333037_2_En_8_Fig4_HTML.jpg)

    *图 8-4：包含列的非聚集索引*


    你也可以使用图 8-4 所示的索引来覆盖那些在 `WHERE` 子句中过滤 `FirstName` 或 `LastName` 的查询，前提是不返回表中的其他列。然而，为了处理查询，SQL
    Server 需要执行索引扫描，而不是索引查找或范围扫描，这当然效率较低。


    ### 管理非聚集索引


    你可以使用 `CREATE NONCLUSTERED INDEX` T-SQL 语句创建非聚集索引。代码清单 8-3 中的脚本在 `Chapter8` 数据库中创建了一个名为
    `Customers` 的表和一个名为 `Orders` 的表。然后，它在 `CustomerID` 列上创建了一个外键约束。最后，在 `Customers`
    表的 `Balance` 列上创建了一个非聚集索引。聚集索引会自动在每个表的主键列上创建。


    ```sql

    USE Chapter8

    GO

    --Create and populate numbers table

    DECLARE @Numbers TABLE

    (

    Number    INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE ;

    --Create and populate name pieces

    DECLARE @Names TABLE

    (

    FirstName    VARCHAR(30),

    LastName     VARCHAR(30)

    ) ;

    INSERT INTO @Names

    VALUES(''Peter'', ''Carter''),

    (''Michael'', ''Smith''),

    (''Danielle'', ''Mead''),

    (''Reuben'', ''Roberts''),

    (''Iris'', ''Jones''),

    (''Sylvia'', ''Davies''),

    (''Finola'', ''Wright''),

    (''Edward'', ''James''),

    (''Marie'', ''Andrews''),

    (''Jennifer'', ''Abraham'') ;

    --Create and populate Customers table

    CREATE TABLE dbo.CustomersDisk

    (

    CustomerID         INT          NOT NULL    IDENTITY    PRIMARY KEY,

    FirstName          VARCHAR(30)  NOT NULL,

    LastName           VARCHAR(30)  NOT NULL,

    BillingAddressID   INT          NOT NULL,

    DeliveryAddressID  INT          NOT NULL,

    CreditLimit        MONEY        NOT NULL,

    Balance            MONEY        NOT NULL

    ) ;

    SELECT * INTO #CustomersDisk

    FROM

    (SELECT

    (SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName,

    (SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) BillingAddressID,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID())  DeliveryAddressID,

    (SELECT TOP 1

    CAST(RAND() * Number AS INT) * 10000

    FROM @Numbers

    ORDER BY NEWID()) CreditLimit,

    (SELECT TOP 1

    CAST(RAND() * Number AS INT) * 9000

    FROM @Numbers

    ORDER BY NEWID()) Balance

    FROM @Numbers a

    CROSS JOIN @Numbers b

    ) a ;

    INSERT INTO dbo.CustomersDisk

    SELECT * FROM #CustomersDisk ;

    GO

    --Create Numbers table

    DECLARE @Numbers TABLE

    (

    Number    INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE ;

    --Create the Orders table

    CREATE TABLE dbo.OrdersDisk

    (

    OrderNumber     INT      NOT NULL    IDENTITY    PRIMARY KEY,

    OrderDate       DATE     NOT NULL,

    CustomerID      INT      NOT NULL,

    ProductID       INT      NOT NULL,

    Quantity        INT      NOT NULL,

    NetAmount       MONEY    NOT NULL,

    DeliveryDate    DATE        NULL

    )  ON [PRIMARY] ;

    --Populate Orders with data

    SELECT * INTO #OrdersDisk

    FROM

    (SELECT

    (SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number

    FROM @Numbers

    ORDER BY NEWID()),GETDATE())as DATE)) OrderDate,

    (SELECT TOP 1 CustomerID FROM CustomersDisk ORDER BY NEWID()) CustomerID,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) ProductID,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) Quantity,

    (SELECT TOP 1 CAST(RAND() * Number AS INT) +10 * 100

    FROM @Numbers

    ORDER BY NEWID()) NetAmount,

    (SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number - 10

    FROM @Numbers

    ORDER BY NEWID()),GETDATE()) as DATE)) DeliveryDate

    FROM @Numbers a

    CROSS JOIN @Numbers b

    CROSS JOIN @Numbers c

    ) a ;

    INSERT INTO OrdersDisk

    SELECT * FROM #OrdersDisk ;

    --Clean-up Temp Tables

    DROP TABLE #CustomersDisk ;

    DROP TABLE #OrdersDisk ;

    --Add foreign key on CustomerID

    ALTER TABLE dbo.OrdersDisk ADD CONSTRAINT

    FK_OrdersDisk_CustomersDisk FOREIGN KEY

    (

    CustomerID

    ) REFERENCES dbo.CustomersDisk

    (

    CustomerID

    ) ON UPDATE  NO ACTION

    ON DELETE  NO ACTION ;

    --Create a nonclustered index on Balance

    CREATE NONCLUSTERED INDEX NCI_Balance ON dbo.CustomersDisk(Balance) ;

    ```

    *代码清单 8-3：创建表，然后添加非聚集索引*


    我们可以通过使用 `CREATE NONCLUSTERED INDEX` 语句并指定 `DROP_EXISTING` 选项，来更改 `NCI_Balance`
    索引的定义以包含 `FirstName` 和 `LastName` 列，如代码清单 8-4 所示。


    ```sql

    CREATE NONCLUSTERED INDEX NCI_Balance ON dbo.CustomersDisk(Balance)

    INCLUDE(LastName, FirstName)

    WITH(DROP_EXISTING = ON) ;

    ```

    *代码清单 8-4：修改索引以包含列*


    你可以像本章前面删除聚集索引那样删除该索引——使用 `DROP INDEX` 语句。在这种情况下，完整的语句是 `DROP INDEX NCI_Balance
    ON dbo.CustomersDisk`。

