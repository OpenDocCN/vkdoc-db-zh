  trans: '## 性能策略


    在为性能设计文件组策略时，需考虑对象放置与应用程序查询执行的联接操作之间的关系。例如，想象一个大型数据仓库。您有一个包含数十万行的宽大事实表，该表与两个维度表进行联接，每个维度表有数百万行。如果将这三个对象都放置在同一个文件组上，您可以通过使用多个文件来分散
    I/O，将每个文件放置在不同的磁盘轴上。然而，这里的问题在于，即使可以分散 I/O，您也无法对哪些表放置在哪些逻辑单元号上进行精细控制。正如本章前面所演示的，所有对象都将使用
    `round-robin` 和 `proportional fill` 算法的组合，均匀地跨每个文件进行条带化。因此，通过将这三个表拆分到三个独立的文件组上，每个文件组创建在独立的逻辑单元号上，有可能获得性能优势。这可能会让
    SQL Server 提高表扫描的并行化程度。


    另一种可能的场景是，您有一个海量数据仓库，达到数十 TB，以及一个具有平衡吞吐量的超大服务器，例如使用 Fast Track Data Warehouse
    参考架构构建的服务器（详细信息可在 MSDB 库中找到）；在这种情况下，通过在每个可用磁盘上创建文件组，您可能会获得最佳性能。这为服务器提供了 I/O 吞吐量方面的最佳性能，并有助于防止
    I/O 子系统成为瓶颈。


    同时，请考虑可能进行水平分区的表的放置。想象一个非常大的表，其数据按月分区。如果您的应用程序工作负载意味着经常需要同时读取几个月的数据，那么将每个月拆分到独立的文件组上可能会提高性能，每个文件组使用一组独立的磁盘轴，类似于前面提到的联接示例。关于分区的详细讨论将在第
    7 章进行。


    ### 注意


    这种方法的缺点是，将分区放置在不同的文件组上会妨碍您使用分区功能，例如 `SWITCH`。


    ## 备份和恢复策略


    SQL Server 允许您在文件和文件组级别以及数据库级别进行备份。随后，您可以执行所谓的 ``片段恢复``。片段恢复允许您分阶段将数据库联机。这对于恢复时间目标非常短的大型数据库非常有用。


    想象一下，您有一个大型数据库，其中包含少量非常关键的数据，业务中断时间不能超过最多 2 小时。该数据库还包含大量历史数据，业务需要每天访问这些数据用于报告，但并非必须在
    2 小时窗口内恢复。在此场景下，最佳实践是拥有两个辅助文件组。第一个包含关键数据，第二个包含历史数据。在发生灾难时，您可以先恢复主文件组和第一个辅助文件组。此时，您可以将数据库联机，业务将能够访问这些数据。随后，可以将包含历史报告数据的文件组联机。


    文件组也可以协助备份策略。想象一个场景：您有一个大型数据库，需要 2 小时进行备份。不幸的是，您有一个长时间运行的 ETL 过程，只有 1 小时的窗口可以每晚备份数据库。如果是这种情况，那么您可以将数据拆分到两个文件组之间。第一个文件组可以在周一、周三和周五备份，第二个文件组可以在周二、周四和周六备份。备份和恢复将在第
    12 章详细讨论。


    ## 存储分层策略


    一些组织可能决定希望为大型数据库实施存储分层。如果是这种情况，那么通常需要通过使用分区来实现。例如，假设一个表包含 6 年的数据。当前年份的数据每天被多次访问和更新。前
    3 年的数据在月度报告中被访问，除此之外很少使用。距今 6 年的数据必须能够即时访问（如果出于监管原因需要的话），但实际上很少访问。


    在刚刚描述的场景中，可以使用分区，并按年分区。包含当前年份数据的文件组可以由本地连接的 `RAID 10` 逻辑单元号上的文件组成，以获得最佳性能。存放第
    2 年和第 3 年数据的分区可以放置在企业级 `SAN` 设备的优质层级上。超过 3 年的分区可以放置在 SAN 内的近线存储中，从而以最具成本效益的方式满足监管要求。


    一些组织还引入了自动存储分层技术，例如 `AO（自适应优化）`。尽管自动存储分层技术在某些环境中效果极佳，但其在 SQL Server 上的实施有时可能会出现问题。这是因为它分为两个阶段工作。第一阶段是分析阶段，决定每个块或文件应驻留在哪个层级上，以实现成本与开销的最佳平衡。第二阶段将实际数据移动到最合适的层级。


    问题在于，数据移动的窗口往往会降低 SAN 的性能。因此，频繁（例如每小时）运行分析然后移动数据可能会导致不可接受的性能下降。然而，另一方面，减少运行分析的频率（例如在工作时间），并在夜间移动数据，有时与
    SQL Server 的使用模式不符。例如，想象一个需要最佳性能的报表应用程序，但其每周报告在周五生成。由于此高峰时段前的最后一个分析窗口是周四，当时活动不多，数据很可能驻留在较慢但更具成本效益的层级上，这意味着性能将受损。然而，当周六到来时，应用程序几乎再次空闲，由于周五高峰使用期间的分析窗口，数据将驻留在优质层级上。因此，自动存储分层通常在数据库具有固定运行时间且日常使用模式变化不大的环境中效果最佳。


    ## 内存优化文件组策略


    与结构化文件组一样，内存优化文件组将使用 `round-robin` 方法在容器之间分配数据。通常做法是将这些多个容器放置在独立的磁盘轴上，以最大化 I/O
    吞吐量。然而，问题是，如果您将一个容器放在磁盘轴 A 上，另一个容器放在磁盘轴 B 上，那么 `round-robin` 方法会将所有数据文件放在一个卷上，所有增量文件放在另一个卷上。


    为避免此问题，最佳实践是在您希望用于内存优化文件组的每个卷上放置两个容器。这将确保您获得平衡的 I/O 分布，如图 6-8 所示。这与 Microsoft
    推荐的最佳实践一致。


    ![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig8_HTML.jpg](img/333037_2_En_6_Fig8_HTML.jpg)


    图 6-8


    内存优化文件组的平衡 I/O 分布'
- fmt: '## File and Filegroup Maintenance


    During the lifecycle of a data-tier application, at times you may need to perform
    maintenance activities on your database files and filegroups for reasons such
    as performance or capacity management. The following sections will describe how
    to add, expand, and shrink files.


    ### Adding Files


    You may need to add files to a filegroup for both capacity and performance reasons.
    If your database grows past your capacity estimates and the volume that hosts
    your data files cannot be resized, then you can add additional files to the filegroup,
    which is hosted on different LUNs.


    You may also need to add additional files to the filegroup in order to increase
    the IO throughput if the storage subsystem becomes a bottleneck for your application.
    We could add an additional file to our `Chapter6` database by using the Files
    tab of the Database Properties dialog box. Here, we will use the Add button and
    then specify the logical name of the file, the filegroup that we want the file
    to reside in, the initial size of the file, the autogrowth settings, the maximum
    size of the file, and the physical path to where the file will be stored.


    Alternatively, we could use the script in Listing [6-7](#333037_2_En_6_Chapter.xhtml#PC7)
    to achieve the same results. You should change the directory path in the script
    to match your own directory structure.


    ```sql

    ALTER DATABASE [Chapter6] ADD FILE ( NAME = N''Chapter6_File4'', FILENAME = N''G:\DATA\Chapter6_File4.ndf'',
    SIZE = 5120KB, FILEGROWTH = 1024KB ) TO FILEGROUP [PRIMARY];

    GO

    ```


    Listing 6-7

    Adding a New File Using T-SQL


    In this scenario, however, it is important to remember the proportional fill algorithm.
    If you add files to a filegroup, then SQL Server will target the empty files first,
    until they have the same amount of free space remaining as the original files.
    This means that if you create them with the same size as the original files, you
    may not receive the benefit that you are expecting. You can witness this behavior
    by running the script in Listing [6-8](#333037_2_En_6_Chapter.xhtml#PC8). This
    script uses the same technique we used when we initially created and populated
    the `RoundRobin` table to generate an additional 10,000 rows and then identify
    how many rows are in each file.


    ```sql

    --Create a Numbers table that will be used to assit the population of the table

    DECLARE @Numbers TABLE

    (

    Number    INT

    )

    --Populate the Numbers table

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number +1

    FROM CTE

    WHERE Number <= 99

    )

    INSERT INTO @Numbers

    SELECT *

    FROM CTE;

    --Populate the example table with 10000 rows of dummy text

    INSERT INTO dbo.RoundRobinTable

    SELECT ''DummyText''

    FROM @Numbers a

    CROSS JOIN @Numbers b;

    --Select all the data from the table, plus the details of the rows'' physical
    location.

    --Then group the row count

    --by file ID

    SELECT b.file_id, COUNT(*)

    FROM

    (

    SELECT ID, DummyTxt, a.file_id

    FROM dbo.RoundRobinTable

    CROSS APPLY sys.fn_PhysLocCracker(%%physloc%%) a

    ) b

    GROUP BY b.file_id;

    ```


    Listing 6-8

    Adding Additional Rows to the RoundRobin Table


    You can see from the results in Figure [6-9](#333037_2_En_6_Chapter.xhtml#Fig9)
    that the proportional fill algorithm used the new file exclusively until it was
    full and then restarted the round-robin allocation between each file. After restarting
    the proportional fill algorithm, however, an autogrowth event has occurred on
    the first file in the filegroup. This means that the first file now has a lot
    more empty space than the other files and has received most of the remaining new
    rows.


    ![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig9_HTML.jpg](images/333037_2_En_6_Chapter/333037_2_En_6_Fig9_HTML.jpg)

    Figure 6-9

    Row allocations to new file


    The workaround for the new file being filled up first would be to either create
    smaller files or increase the size of the existing files. Either of these approaches
    would level out the amount of free space left in each file and make SQL Server
    distribute the writes evenly.


    The other alternative is to use a database scoped configuration, to force all
    files within the filegroup to grow every time an autogrowth event occurs. This
    will be discussed further in the “Database Scoped Configurations” section of this
    chapter.


    ### Tip


    We have discussed the implications for adding new files on the round-robin algorithm.
    It is also worth mentioning, however, that when you initially create your filegroup,
    you should create the files within that filegroup, with equal sizes, to take advantage
    of the algorithm.


    ### Expanding Files


    If you had added files using the GUI, rather than a script, then you may have
    noticed that the initial sizes, indicated next to each of our files, were 11MB,
    6MB, and 7MB, respectively, as opposed to the 5MB that we configured for them
    earlier in this chapter. This is because a more accurate name for the Initial
    Size field would actually be Current Size. Because we have configured autogrowth
    for the files, as they have become full, SQL Server has automatically grown the
    files for us.


    This is a very useful fail-safe feature, but ideally we should use it as just
    that—a fail-safe. Growing files uses resources and also causes locks to be taken
    out, blocking other processes. It is therefore advisable to presize the database
    files in line with capacity estimates, as opposed to starting with a small file
    and relying on autogrow.


    For the same reason, when specifying a file’s autogrowth settings, you should
    shy away from the default value of 1MB and specify a much larger value. If you
    don’t, if your file becomes full and autogrowth kicks in, your files will grow
    in very tiny increments, which is likely to impair performance, even if you are
    using instant file initialization. The value that you should set your files to
    grow by will depend on your environment. You should take into account, for example,
    the amount of free space that is available on the volume and the number of other
    databases that share the volume. You can see how much space is left in a file
    by using the `sys.dm_db_file_space_usage` dynamic management view (DMV). This
    DMV will return a column named `unallocated_extent_page_count`, which will tell
    us how many free pages there are left to be allocated. We can use this to calculate
    the remaining free space in each file, as demonstrated in Listing [6-9](#333037_2_En_6_Chapter.xhtml#PC9).


    ```sql

    SELECT

    file_id

    ,unallocated_extent_page_count * 1.0 / 128 ''Free Space (MB)''

    FROM sys.dm_db_file_space_usage;

    ```


    Listing 6-9

    Calculating Free Space in Each File


    If we want to expand a file, we do not need to wait for autogrowth to kick in.
    We can expand the file manually by changing the value of the Initial Size field
    in the Files tab of the Database Properties dialog box or by using the `ALTER
    DATABASE` command. The command in Listing [6-10](#333037_2_En_6_Chapter.xhtml#PC10)
    will resize the newest file in our `Chapter6` database to be 20MB.


    ```sql

    ALTER DATABASE [Chapter6] MODIFY FILE ( NAME = N''Chapter6_File4'', SIZE = 20480KB
    );

    ```


    Listing 6-10

    Expanding a File'
