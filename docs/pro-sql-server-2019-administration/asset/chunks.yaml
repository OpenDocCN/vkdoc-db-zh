    ## Adding AlwaysOn Readable Secondary Replicas


    It can be very useful to add readable secondary replicas to an `AlwaysOn Availability
    Group` topology in order to implement horizontal scaled reporting. When you use
    this strategy, the databases are kept synchronized, with variable, but typically
    low latency, using log streaming. The additional advantage of readable secondary
    replicas is that they stay online, even if the primary replica is offline. Readable
    secondary replicas can be added to an existing `Availability Group`, which is
    configured for `HA` and/or `DR`. Alternatively, if there is no `HA` or `DR` requirement
    for a database, but read scaling would be advantageous, an `Availability Group`
    can be created, specifically for the purpose of read scaling.


    ### Benefits and Considerations


    Over and above pure horizontal scaling, readable secondary replicas offer other
    advantages, such as temporary statistics, which you can also use to optimize read-only
    workloads. Also, snapshot isolation is used exclusively on readable secondary
    replicas, even if other isolation levels or locking hints are explicitly requested.
    This helps avoid contention, but it also means that `TempDB` should be suitably
    scaled and on a fast disk array.


    The main risk of using readable secondary replicas is that implementing snapshot
    isolation on the secondary replica can actually cause deleted records not to be
    cleaned up on the primary replica. This is because the ghost record cleanup task
    only removes rows from the primary once they are no longer required at the secondary.
    In this scenario, log truncation is also delayed on the primary replica. This
    means that you potentially risk having to kill long-running queries that are being
    satisfied against the readable secondary. This issue can also occur if the secondary
    replica becomes disconnected from the primary. Therefore, there is a risk that
    you may need to remove the secondary replica from the `Availability Group` and
    subsequently re-add it.


    ### Implementing Readable Secondaries


    In this section, we will use the `PROSQLADMIN-C` cluster that we also used in
    Chapter [14](#333037_2_En_14_Chapter.xhtml). This time, however, an additional
    node has been added to the cluster, in Site 1\. The server is called `CLUSTERNODE4`
    and hosts an instance called `READABLE`. This instance has had `AlwaysOn Availability
    Groups` enabled on the service.


    ### Tip


    In this section, we will touch upon the generic configuration of `Availability
    Groups`, but further details can be found in Chapter [14](#333037_2_En_14_Chapter.xhtml),
    as the primary focus here will be configuring a readable secondary.


    Before we create an `Availability Group`, we will first create a database called
    `Chapter16ReadScale` , by using the script in Listing [16-6](#333037_2_En_16_Chapter.xhtml#PC6).


    ```sql

    CREATE DATABASE Chapter16ReadScale ;

    GO

    USE Chapter16ReadScale

    GO

    CREATE TABLE Customers

    (

    ID                  INT            PRIMARY KEY        IDENTITY,

    FirstName           NVARCHAR(30),

    LastName            NVARCHAR(30),

    CreditCardNumber    VARBINARY(8000)

    ) ;

    GO

    --Populate the table

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE ;

    DECLARE @Names TABLE

    (

    FirstName       VARCHAR(30),

    LastName        VARCHAR(30)

    ) ;

    INSERT INTO @Names

    VALUES(''Peter'', ''Carter''),

    (''Michael'', ''Smith''),

    (''Danielle'', ''Mead''),

    (''Reuben'', ''Roberts''),

    (''Iris'', ''Jones''),

    (''Sylvia'', ''Davies''),

    (''Finola'', ''Wright''),

    (''Edward'', ''James''),

    (''Marie'', ''Andrews''),

    (''Jennifer'', ''Abraham''),

    (''Margaret'', ''Jones'') ;

    INSERT INTO Customers(Firstname, LastName, CreditCardNumber)

    SELECT  FirstName, LastName, CreditCardNumber FROM

    (SELECT

    (SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName

    ,(SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName

    ,(SELECT CONVERT(VARBINARY(8000)

    ,(SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99

    ORDER BY NEWID()) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99

    ORDER BY NEWID()) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99

    ORDER BY NEWID()) + ''-'' +

    (SELECT TOP 1 CAST(Number * 100 AS CHAR(4))

    FROM @Numbers

    WHERE Number BETWEEN 10 AND 99

    ORDER BY NEWID()))) CreditCardNumber

    FROM @Numbers a

    CROSS JOIN @Numbers b

    ) d

    ```

    *Listing 16-6: Create the `Chapter16ReadScale` Database*


    Next, we will create an `Availability Group`, using the `Availability Group` wizard.
    On the first page of the wizard (Figure [16-28](#333037_2_En_16_Chapter.xhtml#Fig28)),
    we will provide a name for our new `Availability Group`. In our case, we will
    call it `Chapter16`. We will also specify the Cluster Type as a `Windows Failover
    Cluster`.


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig28_HTML.jpg](images/333037_2_En_16_Chapter/333037_2_En_16_Fig28_HTML.jpg)

    *Figure 16-28: Specify Availability Group Options page*


    On the Select Databases page of the wizard, illustrated in Figure [16-29](#333037_2_En_16_Chapter.xhtml#Fig29),
    we will select the database that we want to add to the `Availability Group`.


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig29_HTML.jpg](images/333037_2_En_16_Chapter/333037_2_En_16_Fig29_HTML.jpg)

    *Figure 16-29: Select Databases page*


    The Replicas tab of the Specify Replicas page is shown in Figure [16-30](#333037_2_En_16_Chapter.xhtml#Fig30).
    Here, we have added `CLUSTERNODE1`, `CLUSTERNODE2`, and `CLUSTERNODE3` as the
    initial Primary Replica, `HA` Replica, and `DR` Replica, respectively. You will
    notice, however, that we have also added `CLUSTERNODE4` as an asynchronous Replica
    and marked it as a Readable Secondary.


    ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig30_HTML.jpg](images/333037_2_En_16_Chapter/333037_2_En_16_Fig30_HTML.jpg)

    *Figure 16-30: Specify Replicas page—Replicas tab*


    On the Endpoints tab, shown in Figure [16-31](#333037_2_En_16_Chapter.xhtml#Fig31),
    you will see that the endpoints for `CLUSTERNODE1`, `CLUSTERNODE2`, and `CLUSTERNODE3`
    are grayed out. This is because you can only have one database mirroring endpoint
    per instance, and on these instances, the endpoints already exist, due to our
    work in Chapter [14](#333037_2_En_14_Chapter.xhtml).'
