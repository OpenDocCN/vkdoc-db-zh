- fmt: "# 工作负载组的统计列说明\n\n以下是 `sys.dm_resource_governor_workload_groups` 视图中返回的列：\n\
    \n| Column | Description |\n| --- | --- |\n| `group_id` | 工作负载组的唯一 ID。 |\n| `name`\
    \ | 工作负载组的名称。 |\n| `pool_id` | 工作负载组所关联的资源池的唯一 ID。 |\n| `statistics_start_time`\
    \ | 上次重置工作负载组统计信息的时间。 |\n| `total_request_count` | 自上次重置统计信息以来，工作负载组中的请求数量计数。\
    \ |\n| `total_queued_request_count` | 由于达到 `GROUP_MAX_REQUESTS` 阈值而被排队的工作负载组内的请求数量。\
    \ |\n| `active_request_count` | 工作负载组中当前活动的请求数量计数。 |\n| `queued_request_count`\
    \ | 由于达到 `GROUP_MAX_REQUESTS` 阈值而当前在工作负载组中排队的请求数量。 |\n| `total_cpu_limit_violation_count`\
    \ | 自上次重置统计信息以来，工作负载组中超出 CPU 限制的请求数量计数。 |\n| `total_cpu_usage_ms` | 自上次重置统计信息以来，工作负载组内请求使用的总\
    \ CPU 时间。 |\n| `max_request_cpu_time_ms` | 自上次重置统计信息以来，工作负载组内任何单个请求使用的最大 CPU 时间。\
    \ |\n| `blocked_task_count` | 工作负载组中当前被阻塞的任务数量计数。 |\n| `total_lock_wait_count`\
    \ | 自上次重置统计信息以来，工作负载组内请求发生的所有锁等待的数量计数。 |\n| `total_lock_wait_time_ms` | 自上次重置统计信息以来，工作负载组内请求持有锁的时间总和。\
    \ |\n| `total_query_optimization_count` | 自上次重置统计信息以来，工作负载组内发生的所有查询优化的数量计数。 |\n\
    | `total_suboptimal_plan_generation_count` | 自上次重置统计信息以来，工作负载组内生成的所有次优计划的数量计数。这些次优计划表明工作负载组正经历内存压力。\
    \ |\n| `total_reduced_memgrant_count` | 自上次重置统计信息以来，工作负载组内达到最大大小限制的所有内存授予的数量计数。\
    \ |\n| `max_request_grant_memory_kb` | 自上次重置统计信息以来，工作负载组内发生的最大单个内存授予的大小。 |\n|\
    \ `active_parallel_thread_count` | 工作负载组中当前使用的并行线程数量计数。 |\n| `importance` | 为工作负载组重要性设置指定的当前值。\
    \ |\n| `request_max_memory_grant_percent` | 为工作负载组的最大内存授予百分比指定的当前值。 |\n| `request_max_cpu_time_sec`\
    \ | 为工作负载组的 CPU 限制指定的当前值。 |\n| `request_memory_grant_timeout_sec` | 为工作负载组的内存授予超时指定的当前值。\
    \ |\n| `group_max_requests` | 为工作负载组的最大并发请求数指定的当前值。 |\n| `max_dop` | 为工作负载组的 MAXDOP\
    \ 指定的当前值。 |\n\n## 连接 DMV 并生成报告\n\n您可以使用 `pool_id` 列连接 `sys.dm_resource_governor_resource_pools`\
    \ 和 `sys.dm_resource_governor_workload_groups` DMV。清单 24-7 中的脚本演示了如何实现这一点，以便返回一份报告，展示各工作负载组的\
    \ CPU 使用情况与资源池总体 CPU 使用情况的对比。\n\n```sql\nSELECT\n    rp.name ResourcePoolName\n\
    \    , wg.name WorkgroupName\n    , rp.total_cpu_usage_ms ResourcePoolCPUUsage\n\
    \    , wg.total_cpu_usage_ms WorkloadGroupCPUUsage\n    , CAST(ROUND(CASE\n  \
    \                  WHEN rp.total_cpu_usage_ms = 0\n                    THEN 100\n\
    \                    ELSE (wg.total_cpu_usage_ms * 1.)\n                     \
    \    / (rp.total_cpu_usage_ms * 1.) * 100\n                  END, 3) AS FLOAT)\
    \ WorkloadGroupPercentageOfResourcePool\nFROM sys.dm_resource_governor_resource_pools\
    \ rp\nINNER JOIN sys.dm_resource_governor_workload_groups wg\n    ON rp.pool_id\
    \ = wg.pool_id\nORDER BY rp.pool_id ;\n```\n**清单 24-7** CPU 使用情况报告\n\n## 重置统计信息\n\
    \n您可以使用清单 24-8 中的命令重置由 `sys.resource_governor_resource_pools` 和 `sys.dm_resource_governor_workload_groups`\
    \ DMV 暴露的累积统计信息。\n\n```sql\nALTER RESOURCE GOVERNOR RESET STATISTICS ;\n```\n\
    **清单 24-8** 重置资源治理器统计信息\n\n## 资源池处理器关联性 DMV\n\nSQL Server 暴露了第三个名为 `sys.dm_resource_governor_resource_pool_affinity`\
    \ 的 DMV，它返回表 24-9 中详述的列。\n\n**表 24-9** `dm_resource_governor_resource_pool_affinity`\
    \ 返回的列\n\n| Column | Description |\n| --- | --- |\n| `pool_id` | 资源池的唯一 ID。 |\n\
    | `processor_group` | 逻辑处理器组的 ID。 |\n| `scheduler_mask` | 表示与资源池关联的调度程序的二进制掩码。有关解释此二进制掩码的更多详细信息，请参阅第\
    \ 5 章。 |\n\n您可以使用 `pool_id` 列将 `sys.dm_resource_governor_resource_pool_affinity`\
    \ DMV 连接到 `sys.resource_governor_resource_pools` DMV。清单 24-9 演示了这一点；它首先更改默认资源池，使其仅使用处理器\
    \ 0，然后显示已配置处理器关联性的每个资源池的调度程序二进制掩码。\n\n```sql\nALTER RESOURCE POOL [Default] WITH(AFFINITY\
    \ SCHEDULER = (0)) ;\nALTER RESOURCE GOVERNOR RECONFIGURE ;\nSELECT\n    rp.name\
    \ ResourcePoolName\n    , pa.scheduler_mask\nFROM sys.dm_resource_governor_resource_pool_affinity\
    \ pa\nINNER JOIN sys.dm_resource_governor_resource_pools rp\n    ON pa.pool_id\
    \ = rp.pool_id ;\n```\n**清单 24-9** 为每个资源池调度二进制掩码\n\n## 资源池卷 DMV\n\n有一个名为 `sys.dm_resource_governor_resource_pool_volumes`\
    \ 的 DMV，它返回每个资源池的 IO 统计信息的详细信息。该 DMV 的列在表 24-10 中描述。\n\n**表 24-10** `dm_resource_governor_resource_pool_volumes`\
    \ 返回的列"
  raw: '| Column | Description |

    | --- | --- |

    | `group_id` | The unique ID of the workload group. |

    | `name` | The name of the workload group. |

    | `pool_id` | The unique ID of the resource pool with which the workload group
    is associated. |

    | `statistics_start_time` | The date/time of the last time the workload group’s
    statistics were reset. |

    | `total_request_count` | A count of the number of requests in the workload group
    since the statistics were last reset. |

    | `total_queued_request_count` | The number of requests within the workload group
    that have been queued as a result of the `GROUP_MAX_REQUESTS` threshold being
    reached since the statistics were last reset. |

    | `active_request_count` | A count of requests that are currently active within
    the workload group. |

    | `queued_request_count` | The number of requests within the workload group that
    are currently queued as a result of the `GROUP_MAX_REQUESTS` threshold being reached.
    |

    | `total_cpu_limit_violation_count` | A count of requests in the workload group
    that have exceeded the CPU limit since the statistics were last reset. |

    | `total_cpu_usage_ms` | The total CPU time used by requests within the workload
    group since the statistics were last reset. |

    | `max_request_cpu_time_ms` | The maximum CPU time used by any request within
    the workload group since the last time the statistics were reset. |

    | `blocked_task_count` | A count of tasks within the workload group that are currently
    blocked. |

    | `total_lock_wait_count` | A count of all lock waits that have occurred for requests
    within the workload group since the last time the statistics were reset. |

    | `total_lock_wait_time_ms` | A sum of time that locks have been held by requests
    within the workload group since statistics were last reset. |

    | `total_query_optimization_count` | A count of all query optimizations that have
    occurred within the workload group since the statistics were reset. |

    | `total_suboptimal_plan_generation_count` | A count of all suboptimal plans that
    have been generated within the workload group, since the last time the statistics
    were reset. These suboptimal plans indicate that the workload group was experiencing
    memory pressure. |

    | `total_reduced_memgrant_count` | A count of all memory grants that have reached
    the maximum size limit within the workload group since the last time the statistics
    were reset. |

    | `max_request_grant_memory_kb` | The size of the largest single memory grant
    that has occurred within the workload group since the last time the statistics
    were reset. |

    | `active_parallel_thread_count` | A count of how many parallel threads are currently
    in use within the workload group. |

    | `importance` | The current value specified for the workload group’s importance
    setting. |

    | `request_max_memory_grant_percent` | The current value specified for the workload
    group’s maximum memory grant percentage. |

    | `request_max_cpu_time_sec` | The current value specified for the workload group’s
    CPU limit. |

    | `request_memory_grant_timeout_sec` | The current value specified for the workload
    group’s memory grant timeout. |

    | `group_max_requests` | The current value specified for the workload group’s
    maximum concurrent requests. |

    | `max_dop` | The current value specified for the workload group’s MAXDOP. |


    You can join the `sys.dm_resource_governor_resource_pools` and `sys.dm_resource_governor_workload_groups`
    DMVs, using the `pool_id` column in each view. The script in Listing [24-7](#333037_2_En_24_Chapter.xhtml#PC7)
    demonstrates how you can achieve this so you can return a report of CPU usage
    across the workload groups as compared to the overall CPU usage of the resource
    pool.


    ```

    SELECT

    rp.name ResourcePoolName

    ,wg.name WorkgroupName

    ,rp.total_cpu_usage_ms ResourcePoolCPUUsage

    ,wg.total_cpu_usage_ms WorkloadGroupCPUUsage

    ,CAST(ROUND(CASE

    WHEN rp.total_cpu_usage_ms = 0

    THEN 100

    ELSE (wg.total_cpu_usage_ms * 1.)

    / (rp.total_cpu_usage_ms * 1.) * 100 Percentage

    END, 3) AS FLOAT) WorkloadGroupPercentageOfResourcePool

    FROM sys.dm_resource_governor_resource_pools rp

    INNER JOIN sys.dm_resource_governor_workload_groups wg

    ON rp.pool_id = wg.pool_id

    ORDER BY rp.pool_id ;

    Listing 24-7

    Reporting on CPU Usage

    ```


    You can reset the cumulative statistics exposed by the `sys.resource_governor_resource_pools`
    and `sys.dm_resource_governor_workload_groups` DMVs using the command in Listing
    [24-8](#333037_2_En_24_Chapter.xhtml#PC8).


    ```

    ALTER RESOURCE GOVERNOR RESET STATISTICS ;

    Listing 24-8

    Resetting Resource Governor Statistics

    ```


    SQL Server exposes a third DMV named `sys.dm_resource_governor_resource_pool_affinity`,
    which returns the columns detailed in Table [24-9](#333037_2_En_24_Chapter.xhtml#Tab9).


    Table 24-9


    Columns Returned by dm_resource_  governor_resource_pool_affinity


    | Column | Description |

    | --- | --- |

    | `pool_id` | The unique ID of the resource pool. |

    | `processor_group` | The ID of the logical processor group. |

    | `scheduler_mask` | The binary mask, which represents the schedulers that are
    affinitized with the resource pool. For further details on interpreting this binary
    mask, please refer to Chapter [5](#333037_2_En_5_Chapter.xhtml). |


    You can join the `sys.dm_resource_governor_resource_pool_affinity` DMV to the
    `sys.resource_governor_resource_pools` DMV using the `pool_id` column in each
    view. Listing [24-9](#333037_2_En_24_Chapter.xhtml#PC9) demonstrates this; it
    first alters the default resource pool so that it only uses processor 0 before
    it displays the scheduler binary mask for each resource pool that has processor
    affinity configured.


    ```

    ALTER RESOURCE POOL [Default] WITH(AFFINITY SCHEDULER = (0)) ;

    ALTER RESOURCE GOVERNOR RECONFIGURE ;

    SELECT

    rp.name ResourcePoolName

    ,pa.scheduler_mask

    FROM sys.dm_resource_governor_resource_pool_affinity pa

    INNER JOIN sys.dm_resource_governor_resource_pools rp

    ON pa.pool_id = rp.pool_id ;

    Listing 24-9

    Scheduling a Binary Mask for Each Resource Pool

    ```


    There is a DMV called `sys.dm_resource_governor_resource_pool_volumes` which returns
    details of the IO statistics for each resource pool. This DMV’s columns are described
    in Table [24-10](#333037_2_En_24_Chapter.xhtml#Tab10).


    Table 24-10


    Columns Returned by dm_resource_  governor_resource_pool_volumes'
