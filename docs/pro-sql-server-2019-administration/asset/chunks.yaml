  trans: '

    # 指定战略性最低要求


    在为您的环境指定 SQL Server 的最低硬件要求时，您可以选择指定安装 SQL Server 的最低要求——`4GB` 内存和单个 `2GHz` CPU（基于企业版）。然而，您可能更需要考虑企业内的运营可支持性。


    例如，如果您的环境主要由私有云基础设施组成，那么您可能希望指定最低 `2 个虚拟核心` 和 `4GB 内存 +（核心数 ∗ 1GB）`，因为这可能符合您的企业标准。


    另一方面，如果您有一个高度分散、自然成长的企业，并且您希望帮助说服项目使用共享的 SQL Server 场，您可能会选择强制执行更高的最低规格，例如 `32GB
    内存` 和 `2 插槽/4 核心`。这里的理由是，任何没有大吞吐量需求的项目都会被“强制”使用您的共享场，以避免与不必要的庞大系统相关的高昂成本。


    # 存储


    存储是任何 SQL Server 安装的一个非常重要的考虑因素。以下部分将讨论本地连接存储和 SAN（存储区域网络）存储，以及文件放置的考虑因素。


    ## 本地连接存储


    如果您的服务器将使用本地连接存储，那么您应该仔细考虑文件布局。从本质上讲，SQL Server 通常受到输入/输出（`IO`）的限制，因此，配置 `IO`
    子系统是性能的关键方面之一。您首先需要将用户数据库的数据文件和日志文件分离到不同的磁盘或阵列上，并且还要分离使用最频繁的系统数据库 `TempDB`。如果所有这些文件都驻留在单个卷上，那么当
    SQL Server 试图同时写入所有文件时，您很可能会遇到磁盘争用。


    通常，本地连接存储会以 `RAID`（独立磁盘冗余阵列）阵列的形式呈现给您的服务器，并且有各种 `RAID` 级别可供选择。有许多 `RAID` 级别可用，但最常见的在以下部分中概述，并附有它们的优缺点。希望这将帮助您选择最合适的
    `RAID` 级别，在性能和容错能力之间实现最佳平衡。


    ### RAID 0


    一个 `RAID 0` 卷由两个到 `n` 个主轴组成，数据位被条带化分布在阵列中的所有磁盘上。这提供了出色的性能；然而，它不提供容错能力。阵列中任何磁盘的丢失都意味着整个阵列将失败。如图
    1-1 所示。


    ![../images/333037_2_En_1_Chapter/333037_2_En_1_Fig1_HTML.jpg](img/333037_2_En_1_Fig1_HTML.jpg)


    *图 1-1：RAID 0 阵列不提供冗余*


    ### 注意


    由于 `RAID 0` 不提供冗余，因此不应用于生产系统。


    ### RAID 1


    一个 `RAID 1` 卷将由两个主轴组成，作为镜像对一起工作。这在一个主轴发生故障时提供了冗余，但这是以牺牲写入性能为代价的，因为对卷的每次写入都需要执行两次。这种冗余方法如图
    1-2 所示。


    ![../images/333037_2_En_1_Chapter/333037_2_En_1_Fig2_HTML.jpg](img/333037_2_En_1_Fig2_HTML.jpg)


    *图 1-2：RAID 1 通过镜像磁盘提供冗余*


    ### 注意


    计算 `RAID 1` 阵列总 `IOPS`（每秒输入/输出操作数）的公式如下：`IOPS = 读取次数 + (写入次数 * 2)`。


    ### RAID 5


    一个 `RAID 5` 卷将由三个到 `n` 个主轴组成，并提供阵列中恰好一个磁盘的冗余。因为数据块被条带化分布在多个主轴上，卷的读取性能会非常好，但同样，这是以牺牲写入性能为代价的。写入性能受到损害，因为冗余是通过将奇偶校验位分布在阵列中的所有主轴上来实现的。这意味着对卷的每一次写入都会有四次写入的性能损失。这与阵列中的磁盘数量无关。这种固定损失的原因是奇偶校验位与数据以相同的方式条带化。控制器将读取原始数据和原始奇偶校验，然后写入新数据和新的奇偶校验，而无需读取阵列中的所有其他磁盘。这种冗余方法如图
    1-3 所示。


    然而，值得注意的是，如果阵列中的一个主轴发生故障，性能将明显下降。同样值得注意的是，从其对等盘包含的奇偶校验位重建磁盘可能需要相当长的时间，尤其是对于大容量的磁盘。


    ![../images/333037_2_En_1_Chapter/333037_2_En_1_Fig3_HTML.jpg](img/333037_2_En_1_Fig3_HTML.jpg)


    *图 1-3：RAID 5 通过奇偶校验位提供冗余*


    ### 注意


    计算 `RAID 5` 阵列总 `IOPS` 的公式如下：`IOPS = 读取次数 + (写入次数 * 4)`。要计算每个主轴的预期 `IOPS`，您可以将此
    `IOPS` 值除以阵列中的磁盘数量。这可以帮助您计算为实现性能目标，阵列中应有的最小磁盘数量。


    ### RAID 10


    一个 `RAID 10` 卷将由四到 `n` 个磁盘组成，但它始终是一个偶数。它提供了冗余和性能的最佳组合。它的工作原理是创建一个镜像条带。位被条带化（没有奇偶校验）分布在阵列中一半的磁盘上，就像
    `RAID 0` 一样，但然后它们被镜像到阵列中的另一半磁盘上。


    这被称为嵌套或混合 `RAID` 级别，这意味着只要没有故障的磁盘在同一个镜像对中，阵列中一半的磁盘可以丢失。如图 1-4 所示。


    ![../images/333037_2_En_1_Chapter/333037_2_En_1_Fig4_HTML.jpg](img/333037_2_En_1_Fig4_HTML.jpg)


    *图 1-4：RAID 10 通过镜像条带内的每个磁盘提供冗余*


    ### 注意


    计算 `RAID 10` 阵列总 `IOPS` 的公式如下：`IOPS = 读取次数 + (写入次数 * 2)`。与 `RAID 5` 类似，为了计算每个主轴的预期
    `IOPS`，您可以将 `IOPS` 值除以阵列中的磁盘数量。这可以帮助您计算为实现性能目标，阵列中应有的最小磁盘数量。

    '
- fmt: '### File Placement


    It is generally accepted that `RAID 0` should not be used for any `SQL Server`
    files. I have known people to suggest that `RAID 0` may be acceptable for `TempDB`
    files. The rationale here is that a heavily used `TempDB` often requires very
    fast performance, and because it is re-created every time the instance restarts,
    it does not require redundancy. This sounds perfectly reasonable, but if you think
    in terms of uptime, you may realize why I disagree with this opinion.


    Your `SQL Server` instance requires `TempDB` in order to function. If you lose
    `TempDB`, then your instance will go down, and if `TempDB` cannot be re-created,
    then you will not be able to bring your instance back up. Therefore, if you host
    `TempDB` on a `RAID 0` array and one of the disks within that array fails, you
    will not be able to bring the instance back up until you have performed one of
    the following actions:


    1.  Wait for the storage team to bring the `RAID 0` array back online.

    2.  Start the instance in “minimal configuration mode” and use `SQLCMD` to change
    the location of `TempDB`.


    By the time either of these steps is complete, you may find that stakeholders
    are jumping up and down, so you may find it best to avoid this option. For this
    reason, `TempDB` is generally best placed on a `RAID 10` array, whenever possible.
    This will provide the best level of performance for the database, and because
    its size is significantly smaller than the user database files, you do not have
    the same level of cost implication.


    In an ideal world, where money is no object, the data files of your user databases
    will be stored on `RAID 10` arrays, since `RAID 10` provides the best combination
    of redundancy and performance. In the real world, however, if the applications
    you are supporting are not mission critical, this may not be justifiable. If this
    is the situation, then `RAID 5` can be a good choice, as long as your applications
    have a fairly high ratio of reads to writes. I would normally use a ratio of three
    to one in favor of reads as being a good baseline, but of course, it can vary
    in every scenario.


    If your databases are only using basic features of `SQL Server`, then you will
    likely find that `RAID 1` is a good choice for your log files. `RAID 5` is not
    generally suitable, because of the write-intensive nature of the transaction log.
    In some cases, I have even known `RAID 1` to perform better than `RAID 10` for
    the transaction log. This is because of the sequential nature of the write activity.


    However, some features of `SQL Server` can generate substantial read activity
    from the transaction log. If this is the case, then you may find that `RAID 10`
    is a requirement for your transaction log as well as your data files. Features
    that cause transaction log reads include the following:


    *   AlwaysOn Availability Groups

    *   Database mirroring

    *   Snapshot creation

    *   Backups

    *   `DBCC CHECKDB`

    *   Change data capture

    *   Log shipping (both backups, and also if restoring logs `WITH STANDBY`)


    ### Solid-State Drives (SSDs)


    One common reason to use locally attached storage, as opposed to a storage area
    network (`SAN`), is to optimize the performance of `SQL Server` components, which
    require extremely fast `IO`. These components include `TempDB` and buffer cache
    extensions. It is not uncommon to find that a database’s data and log files are
    stored on a `SAN`, but `TempDB` and buffer cache extensions are stored on locally
    attached storage.


    In this example, it would make good sense to use `SSDs` in the locally attached
    array. Solid-state drives (`SSDs`) can offer very high `IO` rates, but at a higher
    cost, compared to traditional disks. `SSDs` are also not a “magic bullet.” Although
    they offer a very high number of `IOPS` for random disk access, they can be less
    efficient for sequential scan activities, which are common in certain database
    workload profiles, such as data warehouses. `SSDs` are also prone to sudden failure,
    as opposed to the gradual decline of a traditional disk. Therefore, having a fault-tolerant
    `RAID` level and hot spares in the array is a very good idea.


    ### Working with a SAN


    Storage area network are three words that can strike fear into the heart of a
    database administrator (`DBA`). The modern `DBA` must embrace concepts such as
    `SAN` and virtualization; however, although they pose fundamental change, they
    also ease the overall manageability of the estate and reduce the total cost of
    ownership (`TCO`).


    The most important thing for a `DBA` to remember about a `SAN` is that it changes
    the fundamental principles of the `IO` subsystem, and `DBAs` must change their
    thinking accordingly. For example, in the world of locally attached storage, the
    most fundamental principle is to separate your data files, log files, and `TempDB`
    and to ensure that they are all hosted on the most appropriate `RAID` level.


    In the world of the `SAN`, however, you may initially be alarmed to find that
    your `SAN` administrators do not offer a choice of `RAID` level, and if they do,
    they may not offer `RAID 10`. If you find this to be the case, it is likely because
    the `SAN` is, behind the scenes, actually stripping the data across every disk
    in the array. This means that although the `RAID` level can still have some impact
    on throughput, the more important consideration is which storage tier to choose.


    Many organizations choose to tier the storage on their `SAN`, offering three or
    more tiers. Tier 1 will be the highest tier and may well consist of a combination
    of `SSDs` and small, highly performing Fiber Channel drives. Tier 2 will normally
    consist of larger drives—potentially `SATA` (serial advanced technology attachment)—and
    Tier 3 will often use near-line storage. Near-line storage consists of a large
    number of inexpensive disks, such as `SATA` disks, which are usually stopped.
    The disks only spin up when there is a requirement to access the data that they
    contain. As you have probably guessed, you will want to ensure that any applications
    that require good performance will need to be located on Tier 1 of your `SAN`.
    Tier 2 could possibly be an option for small, rarely used databases with little
    or no concurrency, and Tier 3 should rarely, if ever, be used to store `SQL Server`
    databases or logs.


    Your real throughput will be determined by these factors, but also many others,
    such as the number of network paths between your server and the `SAN`, how many
    servers are concurrently accessing the `SAN`, and so on. Another interesting quirk
    of a `SAN` is that you will often find that your write performance is far superior
    to your read performance. This is because some `SANs` use a battery-backed write
    cache, but when reading, they need to retrieve the data from the spindles.


    Next, consider that because all of your data may well be striped across all of
    the spindles in the array—and even if it isn’t, the likelihood is that all files
    on a single server will probably all reside on the same `CPG` (Common Provisioning
    Group)—you should not expect to see an instant performance improvement from separating
    your data, log, and `TempDB` files. Many `DBAs`, however, still choose to place
    their data, log, and `TempDB` files on separate volumes for logical separation
    and consistency with other servers that use locally attached storage. In some
    cases, however, if you are using `SAN` snapshots or `SAN` replication for redundancy,
    you may be required to have the data and log files of a database on the same volume.
    You should check this with your storage team.'
