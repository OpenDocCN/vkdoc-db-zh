    CreditCardNumber        VARBINARY(8000)

    )

    GO

    --Populate the table

    SET identity_insert dbo.SensitiveData ON

    INSERT INTO dbo.SensitiveData(id, firstname, lastname, CreditCardNumber)

    SELECT id

    ,firstname

    ,lastname

    ,CreditCardNumber

    FROM  Chapter11Encrypted.dbo.SensitiveData

    SET identity_insert dbo.SensitiveData OFF

    --Create Database Master Key

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''Pa$$w0rd'';

    GO

    --Create Certificate

    CREATE CERTIFICATE CreditCardCert

    WITH SUBJECT = ''Credit Card Numbers'';

    GO

    --Create Symmetric Key

    CREATE SYMMETRIC KEY CreditCardKey

    WITH ALGORITHM = AES_128

    ENCRYPTION BY CERTIFICATE CreditCardCert;

    GO

    --Open Symmetric Key

    OPEN SYMMETRIC KEY CreditCardKey

    DECRYPTION BY CERTIFICATE CreditCardCert;

    --Encrypt the CreditCardNumber column

    UPDATE dbo.SensitiveData

    SET CreditCardNumber = ENCRYPTBYKEY(KEY_GUID(''CreditCardKey''), CreditCardNumber);

    GO

    CLOSE SYMMETRIC KEY CreditCardKey --Close the key so it cannot be used again,
    unless reopened

    Listing 11-10

    Encrypting a Column of Data

    ```


    Notice that the `UPDATE` statement that we used to encrypt the data uses a function
    called `ENCRYPTBYKEY()` to encrypt the data. Table [11-2](#333037_2_En_11_Chapter.xhtml#Tab2)
    describes the parameters the `ENCRYPTBYKEY()` function accepts. If we wish only
    to encrypt a subset of cells, we can add a `WHERE` clause to the `UPDATE` statement.


    Table 11-2


    EncryptByKey() Parameters


    | Parameter | Description |

    | --- | --- |

    | `Key_GUID` | The GUID of the symmetric key that is used to encrypt the data
    |

    | `ClearText` | The binary representation of the data that you wish to encrypt
    |

    | `Add_authenticator` | A `BIT` parameter that indicates if an authenticator column
    should be added |

    | `Authenticator` | A parameter that specifies the column that should be used
    as an authenticator |


    Also notice that before we use the key to encrypt the data, we issue a statement
    to open the key. The key must always be opened before it is used for either encrypting
    or decrypting data. To do this, the user must have permissions to open the key.


    When you encrypt a column of data using the method shown in Listing [11-10](#333037_2_En_11_Chapter.xhtml#PC10),
    you still have a security risk caused by the deterministic nature of the algorithm
    used for encryption, which means when you encrypt the same value, you get the
    same hash. Imagine a scenario in which a user has access to the `SensitiveData`
    table but is not authorized to view the credit card numbers. If that user is also
    a customer with a record in that table, they could update their own credit card
    number with the same hashed value as that of another customer in the table. They
    have then successfully stolen another customer’s credit card number, without having
    to decrypt the data in the `CreditCardNumber` column. This is known as a *whole-value
    substitution attack* .


    To protect against this scenario, you can add an authenticator column, which is
    also known as a *salt value* . This can be any column but is usually the primary
    key column of the table. When the data is encrypted, the authenticator column
    is encrypted along with the data. At the point of decryption, the authenticator
    value is then checked, and if it does not match, then the decryption fails.'
  trans: '## 迁移加密数据库


    就 TDE 的本质而言，如果我们试图将`Chapter11Encrypted`数据库移动到新实例，除非我们考虑到加密要素，否则操作会失败。图 11-3 展示了如果我们对`Chapter11Encrypted`数据库进行备份，并尝试在新实例上还原时收到的消息。你可以在第
    12 章找到关于备份和还原的完整讨论。


    ![../images/333037_2_En_11_Chapter/333037_2_En_11_Fig3_HTML.jpg](img/333037_2_En_11_Fig3_HTML.jpg)


    图 11-3：在新实例上还原加密数据库的尝试


    如果我们分离数据库并尝试将其附加到新实例，也会收到相同的错误。相反，我们必须先创建一个具有相同密码的数据库主密钥，然后将服务器证书和私钥还原到新实例。我们可以使用清单
    11-9 中的脚本来还原我们之前创建的服务器证书。


    ```sql

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''Pa$$w0rd'' ;

    GO

    CREATE CERTIFICATE TDECert

    FROM FILE = ''C:\Certificates\TDECert''

    WITH PRIVATE KEY

    (

    FILE = ''C:\Certificates\TDECertKey'',

    DECRYPTION BY PASSWORD = ''Pa$$w0rd''

    ) ;

    清单 11-9：还原服务器证书

    ```


    ### 提示


    确保 SQL Server 服务帐户在操作系统中对证书和密钥文件拥有权限。否则，你将收到错误，指出证书无效、不存在或你没有权限访问它。这意味着你应该立即检查还原结果并定期重复测试。


    ## 管理单元格级加密


    单元格级加密允许你使用对称密钥、非对称密钥、证书或密码来加密单个列，甚至是列中的特定单元格。虽然这可以为你的数据提供额外的安全层，但它也可能导致显著的性能影响和大量的
    `膨胀`。`膨胀` 意味着加密后的数据大小比加密前大得多。此外，实现单元格级加密是一个手动过程，需要你修改应用程序代码。因此，加密数据不应成为你的默认操作，只有在存在监管要求或明确的业务理由时才应执行。


    尽管使用对称密钥加密数据是常见做法，但也可以使用非对称密钥、证书甚至密码短语来加密数据。如果使用密码短语加密数据，则会使用三重 DES 算法进行加密。表 11-1
    列出了你可以用于通过这些方法加密或解密数据的加密函数。


    表 11-1：加密函数


    | 加密方法 | 加密函数 | 解密函数 |

    | --- | --- | --- |

    | 非对称密钥 | `ENCRYPTBYASYMKEY()` | `DECRYPTBYASYMKEY()` |

    | 证书 | `ENCRYPTBYCERT()` | `DECRYPTBYCERT()` |

    | 密码短语 | `ENCRYPTBYPASSPHRASE()` | `DECRYPTBYPASSPHRASE()` |


    当我们在数据库中创建 `SensitiveData` 表时，你可能注意到，对于 `CreditCardNumber` 列，我们使用了 `VARBINARY(8000)`
    数据类型，而明显的选择应该是 `CHAR(19)`。这是因为加密数据必须存储为二进制数据类型之一。我们将长度设置为 8000 字节，因为这是用于加密它的函数返回数据的最大长度。


    清单 11-10 中的脚本将创建 `Chapter11Encrypted` 数据库的副本。然后，脚本为该数据库创建一个数据库主密钥和一个证书。之后，它会创建一个将使用该证书加密的对称密钥。最后，它打开对称密钥并用它来加密我们
    `SensitiveData` 表中的 `CreditCardNumber` 列。


    ```sql

    --创建副本数据库

    CREATE DATABASE Chapter11CellEncrypted ;

    GO

    USE Chapter11CellEncrypted

    GO

    --创建表

    CREATE TABLE dbo.SensitiveData

    (

    ID                INT                PRIMARY KEY        IDENTITY,

    FirstName        NVARCHAR(30),

    LastName        NVARCHAR(30),

    CreditCardNumber        VARBINARY(8000)

    )

    GO

    --填充表数据

    SET identity_insert dbo.SensitiveData ON

    INSERT INTO dbo.SensitiveData(id, firstname, lastname, CreditCardNumber)

    SELECT id

    ,firstname

    ,lastname

    ,CreditCardNumber

    FROM  Chapter11Encrypted.dbo.SensitiveData

    SET identity_insert dbo.SensitiveData OFF

    --创建数据库主密钥

    CREATE MASTER KEY ENCRYPTION BY PASSWORD = ''Pa$$w0rd'';

    GO

    --创建证书

    CREATE CERTIFICATE CreditCardCert

    WITH SUBJECT = ''Credit Card Numbers'';

    GO

    --创建对称密钥

    CREATE SYMMETRIC KEY CreditCardKey

    WITH ALGORITHM = AES_128

    ENCRYPTION BY CERTIFICATE CreditCardCert;

    GO

    --打开对称密钥

    OPEN SYMMETRIC KEY CreditCardKey

    DECRYPTION BY CERTIFICATE CreditCardCert;

    --加密 CreditCardNumber 列

    UPDATE dbo.SensitiveData

    SET CreditCardNumber = ENCRYPTBYKEY(KEY_GUID(''CreditCardKey''), CreditCardNumber);

    GO

    CLOSE SYMMETRIC KEY CreditCardKey --关闭密钥，除非重新打开，否则无法再次使用

    清单 11-10：加密列数据

    ```


    请注意，我们用于加密数据的 `UPDATE` 语句使用了一个名为 `ENCRYPTBYKEY()` 的函数。表 11-2 描述了 `ENCRYPTBYKEY()`
    函数接受的参数。如果我们只想加密单元格的子集，可以在 `UPDATE` 语句中添加一个 `WHERE` 子句。


    表 11-2：EncryptByKey() 参数


    | 参数 | 描述 |

    | --- | --- |

    | `Key_GUID` | 用于加密数据的对称密钥的 GUID |

    | `ClearText` | 你希望加密的数据的二进制表示 |

    | `Add_authenticator` | 一个 `BIT` 参数，指示是否应添加验证器列 |

    | `Authenticator` | 指定应用作验证器的列的参数 |


    还要注意，在我们使用密钥加密数据之前，我们发出了一条语句来打开密钥。在用于加密或解密数据之前，密钥必须始终处于打开状态。为此，用户必须拥有打开密钥的权限。


    当你使用清单 11-10 所示的方法加密列数据时，由于所用加密算法的确定性特性，你仍然面临安全风险，这意味着当你加密相同的值时，会得到相同的哈希值。想象一下这样的场景：一个用户可以访问
    `SensitiveData` 表，但没有授权查看信用卡号。如果该用户同时也是该表中有记录的客户，他们可以用表中另一位客户的相同哈希值来更新自己的信用卡号。这样，他们就成功窃取了另一位客户的信用卡号，而无需解密
    `CreditCardNumber` 列中的数据。这被称为 `全值替换攻击`。


    为了防范这种情况，你可以添加一个验证器列，也称为 `盐值`。这可以是任何列，但通常是表的主键列。加密数据时，验证器列会与数据一起加密。在解密时，会检查验证器值，如果不匹配，则解密失败。'
- fmt: '# SQL Server 加密技术


    ### 警告


    **重要提示**：验证器列中的值**绝不**应被更新。如果被更新，您可能会丢失对敏感数据的访问。


    清单 [11-11](#333037_2_En_11_Chapter.xhtml#PC11) 中的脚本展示了如何使用验证器列，利用表的主键作为验证器列来加密
    `CreditCardNumber` 列。这里，我们使用 `HASHBYTES()` 函数创建验证器列的哈希值，然后使用该哈希表示来加密数据。如果列已被加密，其值将被更新以包含盐值。


    ### 提示


    此脚本仅作为示例包含在内，但您应避免在此时运行它，以便能够遵循后续的代码示例。


    ```sql

    OPEN SYMMETRIC KEY CreditCardKey

    DECRYPTION BY CERTIFICATE CreditCardCert;

    --Encrypt the CreditCardNumber column

    UPDATE SensitiveData

    SET CreditCardNumber = ENCRYPTBYKEY(Key_GUID(''CreditCardKey'')

    ,CreditCardNumber

    ,1

    ,HASHBYTES(''SHA1'', CONVERT(VARBINARY(8000), ID)));

    GO

    CLOSE SYMMETRIC KEY CreditCardKey ;

    ```

    **清单 11-11** 使用验证器加密列


    在脚本末尾，我们关闭了密钥。如果我们没有显式关闭它，它将在会话的剩余时间内保持打开状态。如果我们计划使用同一密钥执行多个活动，这可能很有用，但良好的做法是在会话中最终使用后立即将其显式关闭。


    尽管出于性能原因，可以使用对称密钥、非对称密钥或证书来加密数据，但通常会选择使用对称密钥，然后使用非对称密钥或证书来加密该对称密钥。


    ## 访问加密数据


    为了读取使用 `ENCRYPTBYKEY()` 加密的列中的数据，我们需要使用 `DECRYPTBYKEY()` 函数对其进行解密。表 [11-3](#333037_2_En_11_Chapter.xhtml#Tab3)
    描述了此函数的参数。


    **表 11-3** `DecryptByKey` 参数


    | 参数 | 描述 |

    | --- | --- |

    | `Cyphertext` | 要解密的加密数据 |

    | `AddAuthenticator` | 一个 `BIT` 值，指定是否需要验证器 |

    | `Authenticator` | 用作验证器的列 |


    清单 [11-12](#333037_2_En_11_Chapter.xhtml#PC12) 中的脚本演示了在不使用验证器加密后，如何使用 `DECRYPTBYKEY()`
    函数读取 `CreditCardNumber` 列中的加密数据。


    ```sql

    --Open Key

    OPEN SYMMETRIC KEY CreditCardKey

    DECRYPTION BY CERTIFICATE CreditCardCert;

    --Read the Data using DECRYPTBYKEY()

    SELECT

    FirstName

    ,LastName

    ,CreditCardNumber AS [Credit Card Number Encrypted]

    ,CONVERT(VARCHAR(30), DECRYPTBYKEY(CreditCardNumber)) AS [Credit Card Number Decrypted]

    ,CONVERT(VARCHAR(30), CreditCardNumber)

    AS [Credit Card Number Converted Without Decryption]

    FROM dbo.SensitiveData ;

    --Close the Key

    CLOSE SYMMETRIC KEY CreditCardKey ;

    ```

    **清单 11-12** 读取加密列


    此脚本最终查询结果示例如图 [11-4](#333037_2_En_11_Chapter.xhtml#Fig4) 所示。您可以看到，直接查询加密列会返回加密的二进制值。对加密列直接转换为
    `VARCHAR` 数据类型的查询虽然成功，但不返回数据。然而，使用 `DECRYPTBYKEY()` 函数查询加密列，并在值转换为 `VARCHAR` 数据类型时，会返回正确的结果。


    ![../images/333037_2_En_11_Chapter/333037_2_En_11_Fig4_HTML.jpg](images/333037_2_En_11_Chapter/333037_2_En_11_Fig4_HTML.jpg)

    **图 11-4** `DECRYPTBYKEY()` 的结果


    ## Always Encrypted


    Always Encrypted 是 SQL Server 2016 中引入的一项技术，也是首个能够保护数据免受特权用户（例如 `sysadmin` 角色成员）访问的
    SQL Server 加密技术。由于数据库管理员无法查看加密数据，Always Encrypted 提供了真正的职责隔离。当您的平台支持外包给第三方供应商时，这有助于解决敏感数据的合规性问题。如果您有监管要求，规定数据不得提供给本国司法管辖区之外，而第三方供应商使用的是离岸团队，则这一点尤其重要。


    Always Encrypted 使用两种独立类型的密钥：列加密密钥和列主密钥。列加密密钥用于加密列内的数据，列主密钥用于加密列加密密钥。


    ### 提示


    列主密钥是位于外部存储区中的密钥或证书。


    拥有第二层密钥意味着 SQL Server 只需存储列加密密钥的加密值，而不是以明文形式存储。列主密钥根本不存储在数据库引擎中，而是存储在外部密钥存储区中。使用的密钥存储区可以是
    HSM（硬件安全模块）、Windows 证书存储区或 EKM 提供程序，例如 Azure Key Vault 或 Thales。然后，SQL Server
    在数据库元数据中存储列主密钥的位置。


    数据的加密和解密责任不再由 SQL Server 承担，而是由客户端驱动程序处理。当然，这意味着应用程序必须使用受支持的驱动程序，以下链接包含有关使用受支持驱动程序的详细信息：[`https://msdn.microsoft.com/en-gb/library/mt147923.aspx`](https://msdn.microsoft.com/en-gb/library/mt147923.aspx)。


    当应用程序发出需要加密或解密数据的请求时，客户端驱动程序会与数据库引擎协商以确定列主密钥的位置。数据库引擎还提供加密的列加密密钥及其用于加密的算法。


    现在，客户端驱动程序可以联系外部密钥存储区并检索列主密钥，然后使用它来解密列加密密钥。列加密密钥的明文版本随后可用于根据需要加密或解密数据。


    整个过程对应用程序是透明的，这意味着不需要更改应用程序的代码即可使用 Always Encrypted。唯一可能需要的更改是使用更新的受支持驱动程序。'
  raw: '### Caution


    It is very important that the values in the authenticator column are never updated.
    If they are, you may lose access to your sensitive data.


    The script in Listing [11-11](#333037_2_En_11_Chapter.xhtml#PC11) shows how we
    can use an authenticator column to encrypt the `CreditCardNumbe`r column using
    the primary key of the table as an `Authenticator` column. Here, we use the `HASHBYTES()`
    function to create a hash value of the `Authenticator` column, and then we use
    the hash representation to encrypt the data. If you have already encrypted the
    column, the values are updated to include the salt.


    ### Tip


    This script is included as an example, but you should avoid running it at this
    point so you are able to follow later code examples.


    ```

    OPEN SYMMETRIC KEY CreditCardKey

    DECRYPTION BY CERTIFICATE CreditCardCert;

    --Encrypt the CreditCardNumber column

    UPDATE SensitiveData

    SET CreditCardNumber = ENCRYPTBYKEY(Key_GUID(''CreditCardKey'')

    ,CreditCardNumber

    ,1

    ,HASHBYTES(''SHA1'', CONVERT(VARBINARY(8000), ID)));

    GO

    CLOSE SYMMETRIC KEY CreditCardKey ;

    Listing 11-11

    Encrypting a Column Using an Authenticator

    ```


    At the end of the script, we close the key. If we do not close it explicitly,
    then it remains open for the rest of the session. This can be useful if we are
    going to perform multiple activities using the same key, but it is good practice
    to explicitly close it immediately following its final usage within a session.


    Even though it is possible to encrypt data using symmetric keys, asymmetric keys,
    or certificates for performance reasons, you will usually choose to use a symmetric
    key and then encrypt that key using either an asymmetric key or a certificate.


    ### Accessing Encrypted Data


    In order to read the data in the column encrypted using `ENCRYPTBYKEY()`, we need
    to decrypt it using the `DECRYPTBYKEY()` function. Table [11-3](#333037_2_En_11_Chapter.xhtml#Tab3)
    describes the parameters for this function.


    Table 11-3


    DecryptByKey Parameters


    | Parameter | Description |

    | --- | --- |

    | `Cyphertext` | The encrypted data that you want to decrypt |

    | `AddAuthenticator` | A `BIT` value specifying if an authenticator column is
    required |

    | `Authenticator` | The column to be used as an authenticator |


    The script in Listing [11-12](#333037_2_En_11_Chapter.xhtml#PC12) demonstrates
    how to read the encrypted data in the `CreditCardNumber` column using the `DECRYPTBYKEY()`
    function after it has been encrypted without an authenticator.


    ```

    --Open Key

    OPEN SYMMETRIC KEY CreditCardKey

    DECRYPTION BY CERTIFICATE CreditCardCert;

    --Read the Data using DECRYPTBYKEY()

    SELECT

    FirstName

    ,LastName

    ,CreditCardNumber AS [Credit Card Number Encrypted]

    ,CONVERT(VARCHAR(30), DECRYPTBYKEY(CreditCardNumber)) AS [Credit Card Number Decrypted]

    ,CONVERT(VARCHAR(30), CreditCardNumber)

    AS [Credit Card Number Converted Without Decryption]

    FROM dbo.SensitiveData ;

    --Close the Key

    CLOSE SYMMETRIC KEY CreditCardKey ;

    Listing 11-12

    Reading an Encrypted Column

    ```


    The sample of the results from the final query in this script is shown in Figure
    [11-4](#333037_2_En_11_Chapter.xhtml#Fig4). You can see that querying the encrypted
    column directly returns the encrypted binary value. Querying the encrypted column
    with a straight conversion to the `VARCHAR` data type succeeds, but no data is
    returned. Querying the encrypted column using the `DECRYPTBYKEY()` function, however,
    returns the correct result when the value is converted to the `VARCHAR` data type.


    ![../images/333037_2_En_11_Chapter/333037_2_En_11_Fig4_HTML.jpg](images/333037_2_En_11_Chapter/333037_2_En_11_Fig4_HTML.jpg)


    Figure 11-4


    Results of DECRYPTBYKEY( )


    ## Always Encrypted


    Always Encrypted is a technology introduced in SQL Server 2016 and is the first
    SQL Server encryption technology which protects data against privileged users,
    such as members of the sysadmin role. Because DBAs cannot view the encrypted data,
    Always Encrypted provides true segregation of duties. This can help with compliance
    issues for sensitive data when your platform support is outsourced to a third-party
    vendor. This is especially true if you have a regulatory requirement not to make
    your data available outside of your country’s jurisdiction and the third-party
    vendor is using offshore teams.


    Always Encrypted uses two separate types of key: a column encryption key and a
    column master key. The column encryption key is used to encrypt the data within
    a column, and the column master key is used to encrypt the column encryption keys.


    ### Tip


    The column master key is a key or a certificate located within an external store.


    Having the second layer of key means that SQL Server need only store an encrypted
    value of the column encryption key, instead of storing it in plaintext. The column
    master key is not stored in the database engine at all. Instead, it is stored
    in an external key store. The key store used could be an HSM (hardware security
    module), Windows Certificate Store, or an EKM provider, such as Azure Key Vault
    or Thales. SQL Server then stores the location of the column master key, within
    the database metadata.


    Instead of SQL Server being responsible for the encryption and decryption of data,
    this responsibility is handled by the client driver. Of course, this means that
    the application must be using a supported driver, and the following link contains
    details of working with supported drivers: [`https://msdn.microsoft.com/en-gb/library/mt147923.aspx`](https://msdn.microsoft.com/en-gb/library/mt147923.aspx)


    When an application issues a request, which will require data to either be encrypted
    or decrypted, the client driver liaises with the database engine to determine
    the location of the column master key. The database engine also provides the encrypted
    column encryption key and the algorithm used to encrypt it.


    The client driver can now contact the external key store and retrieve the column
    master key, which it uses to decrypt the column encryption key. The plaintext
    version of the column encryption key can then be used to encrypt or decrypt the
    data, as required.


    The entire process is transparent to the application, meaning that changes are
    not required to the application’s code, in order to use Always Encrypted. The
    only change that may be required is to use a later supported driver.'
  trans: '

    # SQL Server 加密技术


    ### 警告


    **重要提示**：验证器列中的值**绝不**应被更新。如果被更新，您可能会丢失对敏感数据的访问。


    清单 11-11 中的脚本展示了如何使用验证器列，利用表的主键作为验证器列来加密 `CreditCardNumber` 列。这里，我们使用 `HASHBYTES()`
    函数创建验证器列的哈希值，然后使用该哈希表示来加密数据。如果列已被加密，其值将被更新以包含盐值。


    ### 提示


    此脚本仅作为示例包含在内，但您应避免在此时运行它，以便能够遵循后续的代码示例。


    ```sql

    OPEN SYMMETRIC KEY CreditCardKey

    DECRYPTION BY CERTIFICATE CreditCardCert;

    --Encrypt the CreditCardNumber column

    UPDATE SensitiveData

    SET CreditCardNumber = ENCRYPTBYKEY(Key_GUID(''CreditCardKey'')

    ,CreditCardNumber

    ,1

    ,HASHBYTES(''SHA1'', CONVERT(VARBINARY(8000), ID)));

    GO

    CLOSE SYMMETRIC KEY CreditCardKey ;

    ```

    **清单 11-11** 使用验证器加密列


    在脚本末尾，我们关闭了密钥。如果我们没有显式关闭它，它将在会话的剩余时间内保持打开状态。如果我们计划使用同一密钥执行多个活动，这可能很有用，但良好的做法是在会话中最终使用后立即将其显式关闭。


    尽管出于性能原因，可以使用对称密钥、非对称密钥或证书来加密数据，但通常会选择使用对称密钥，然后使用非对称密钥或证书来加密该对称密钥。


    ## 访问加密数据


    为了读取使用 `ENCRYPTBYKEY()` 加密的列中的数据，我们需要使用 `DECRYPTBYKEY()` 函数对其进行解密。表 11-3 描述了此函数的参数。


    **表 11-3** `DecryptByKey` 参数


    | 参数 | 描述 |

    | --- | --- |

    | `Cyphertext` | 要解密的加密数据 |

    | `AddAuthenticator` | 一个 `BIT` 值，指定是否需要验证器 |

    | `Authenticator` | 用作验证器的列 |


    清单 11-12 中的脚本演示了在不使用验证器加密后，如何使用 `DECRYPTBYKEY()` 函数读取 `CreditCardNumber` 列中的加密数据。


    ```sql

    --Open Key

    OPEN SYMMETRIC KEY CreditCardKey

    DECRYPTION BY CERTIFICATE CreditCardCert;

    --Read the Data using DECRYPTBYKEY()

    SELECT

    FirstName

    ,LastName

    ,CreditCardNumber AS [Credit Card Number Encrypted]

    ,CONVERT(VARCHAR(30), DECRYPTBYKEY(CreditCardNumber)) AS [Credit Card Number Decrypted]

    ,CONVERT(VARCHAR(30), CreditCardNumber)

    AS [Credit Card Number Converted Without Decryption]

    FROM dbo.SensitiveData ;

    --Close the Key

    CLOSE SYMMETRIC KEY CreditCardKey ;

    ```

    **清单 11-12** 读取加密列


    此脚本最终查询结果示例如图 11-4 所示。您可以看到，直接查询加密列会返回加密的二进制值。对加密列直接转换为 `VARCHAR` 数据类型的查询虽然成功，但不返回数据。然而，使用
    `DECRYPTBYKEY()` 函数查询加密列，并在值转换为 `VARCHAR` 数据类型时，会返回正确的结果。


    ![../images/333037_2_En_11_Chapter/333037_2_En_11_Fig4_HTML.jpg](img/333037_2_En_11_Fig4_HTML.jpg)

    **图 11-4** `DECRYPTBYKEY()` 的结果


    ## Always Encrypted


    Always Encrypted 是 SQL Server 2016 中引入的一项技术，也是首个能够保护数据免受特权用户（例如 `sysadmin` 角色成员）访问的
    SQL Server 加密技术。由于数据库管理员无法查看加密数据，Always Encrypted 提供了真正的职责隔离。当您的平台支持外包给第三方供应商时，这有助于解决敏感数据的合规性问题。如果您有监管要求，规定数据不得提供给本国司法管辖区之外，而第三方供应商使用的是离岸团队，则这一点尤其重要。


    Always Encrypted 使用两种独立类型的密钥：列加密密钥和列主密钥。列加密密钥用于加密列内的数据，列主密钥用于加密列加密密钥。


    ### 提示


    列主密钥是位于外部存储区中的密钥或证书。


    拥有第二层密钥意味着 SQL Server 只需存储列加密密钥的加密值，而不是以明文形式存储。列主密钥根本不存储在数据库引擎中，而是存储在外部密钥存储区中。使用的密钥存储区可以是
    HSM（硬件安全模块）、Windows 证书存储区或 EKM 提供程序，例如 Azure Key Vault 或 Thales。然后，SQL Server
    在数据库元数据中存储列主密钥的位置。


    数据的加密和解密责任不再由 SQL Server 承担，而是由客户端驱动程序处理。当然，这意味着应用程序必须使用受支持的驱动程序，以下链接包含有关使用受支持驱动程序的详细信息：[`https://msdn.microsoft.com/en-gb/library/mt147923.aspx`](https://msdn.microsoft.com/en-gb/library/mt147923.aspx)。


    当应用程序发出需要加密或解密数据的请求时，客户端驱动程序会与数据库引擎协商以确定列主密钥的位置。数据库引擎还提供加密的列加密密钥及其用于加密的算法。


    现在，客户端驱动程序可以联系外部密钥存储区并检索列主密钥，然后使用它来解密列加密密钥。列加密密钥的明文版本随后可用于根据需要加密或解密数据。


    整个过程对应用程序是透明的，这意味着不需要更改应用程序的代码即可使用 Always Encrypted。唯一可能需要的更改是使用更新的受支持驱动程序。

    '
- fmt: '### Note


    客户端驱动程序将作为一项优化，缓存列加密密钥的明文版本，以避免重复往返于外部密钥存储。


    Always Encrypted 存在一些显著的限制，包括无法执行非相等比较（即使是相等比较也只在确定性加密下可用）。SQL Server 2019 引入了
    Secure Enclaves 来解决其中一些问题。使用安全飞地时，支持 `<`、`>` 甚至 `LIKE` 等操作符，前提是使用了随机化加密。Secure
    Enclaves 还支持就地加密。


    Secure Enclaves 的工作原理是，在 SQL Server 进程内部使用一块受保护的内存区域作为可信执行环境。在此内存区域中，数据会被解密并进行计算。SQL
    Server 进程的其他部分或服务器上的任何其他进程都无法访问该安全内存，这意味着即使使用调试工具，解密后的数据也不会泄露。


    如果 SQL Server 确定需要安全飞地来满足查询，客户端驱动程序会使用安全通道将加密密钥发送到安全飞地。然后，客户端驱动程序提交查询和加密的查询参数以供执行。由于数据（甚至加密的参数）只在飞地内部被解密，因此数据、参数和加密密钥永远不会以明文形式暴露。


    由于解密后的数据和密钥在飞地内部可用，客户端驱动程序需要验证飞地的真实性。为此，它需要一个外部仲裁者，称为证明服务，例如 Windows Server Host
    Guardian Service。在向飞地发送任何数据之前，客户端驱动程序将联系证明服务以确定飞地的有效性。


    使用 Always Encrypted 有许多限制。例如，不支持高级数据类型。完整的限制列表可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-database-engine?view=sql-server-2019#feature-details`](https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-database-engine%253Fview%253Dsql-server-2019%2523feature-details)
    找到。


    ## Implementing Always Encrypted


    在本节中，我们将使用带有 Secure Enclaves 的 Always Encrypted 对一个名为 `Chapter11AlwaysEncrypted`
    的数据库中的数据进行加密。我们将使用基于虚拟化的安全（VBS）飞地。在生产环境中，您应确保您的飞地使用可信平台模块（TPM）证明以增强安全性。TPM 是基于硬件的证明，超出了本章的范围。更多细节可以在
    [`https://docs.microsoft.com/en-us/windows-server/identity/ad-ds/manage/component-updates/tpm-key-attestation`](https://docs.microsoft.com/en-us/windows-server/identity/ad-ds/manage/component-updates/tpm-key-attestation)
    找到。


    在本节中，我们将配置第二台服务器作为证明服务，并将我们的 SQL Server 注册到它，以便在客户端希望使用飞地时进行仲裁。


    第一步是使用清单 [11-13](#333037_2_En_11_Chapter.xhtml#PC13) 中的 PowerShell 脚本将第二台服务器配置为证明服务。此服务器必须运行
    Windows Server 2019。此过程要求服务器执行多次重启。因此，脚本使用注释来标记各个部分。运行脚本的每个部分后，直到重启完成才应运行后续部分。请记住，不能使用托管
    SQL Server 实例的同一台服务器。还值得注意的是，在配置时，充当证明服务的服务器可能未加入域。这是因为为主护盾创建了一个新域。


    ### Tip


    为了使脚本成功执行，PowerShell 终端应以管理员身份运行。


    ```

    #Part 1 - Install the Host Guardian Service role

    Install-WindowsFeature -Name HostGuardianServiceRole -IncludeManagementTools -Restart

    #Part 2 - Install the Host Guardian Service & configure its domain

    $DSRepairModePassword = ConvertTo-SecureString -AsPlainText ''MyVerySecurePa$$w0rd''
    –Force

    Install-HgsServer -HgsDomainName ''HostGuardian.local'' -SafeModeAdministratorPassword
    $DSRepairModePassword -Restart

    #After the reboot, log-in using the admin account, which will now be elevated
    to Domain Admin of the HostGuardian.local domain

    #Part 3 - Configure Host Ket Attestation

    Initialize-HgsAttestation -HgsServiceName ''hgs'' -TrustHostKey

    ```

    Listing 11-13

    Configure the Attestation Server


    现在，我们需要将托管 SQL Server 实例的服务器注册为受防护的主机。我们可以使用清单 [11-14](#333037_2_En_11_Chapter.xhtml#PC14)
    中的脚本为此做准备。同样，该脚本使用注释将其分成几个部分。这是因为在此过程中需要重启。同样，PowerShell 终端应以管理员身份运行。


    ```

    #Part 1 - Enable the HostGuardian feature

    Enable-WindowsOptionalFeature -Online -FeatureName HostGuardian -All

    #Part 2 - Remove VBS requirement. Only required if you are using a VM

    Set-ItemProperty -Path HKLM:\SYSTEM\CurrentControlSet\Control\DeviceGuard -Name
    RequirePlatformSecurityFeatures -Value 0

    shutdown /r

    #Part 3 - Generate a host key pair and export public key to a file

    #Generate the host key pair

    Set-HgsClientHostKey

    #Create a folder to store the keys

    New-Item -Path c:\ -Name Keys -ItemType directory

    #Export the public key to a file

    Get-HgsClientHostKey -Path ("c:\Keys\{0}key.cer" -f $env:computername)

    ```

    Listing 11-14

    Prepare to Register the Host As a Guarded Host


    此时，您应该手动将 `c:\keys` 文件夹中生成的证书文件复制到证明服务器。假设您将证书复制到名为 `c:\keys` 的文件夹，清单 [11-15](#333037_2_En_11_Chapter.xhtml#PC15)
    中的脚本会将密钥导入证明服务。'
  raw: '### Note


    The client driver will cache the plaintext version of column encryption keys as
    an optimization, which attempts to avoid repeated round trips to the external
    key store.


    Always Encrypted has some significant limitations, including an inability to perform
    non-equality comparisons (even equality comparisons are only available with deterministic
    encryption). SQL Server 2019 introduces Secure Enclaves, to address some of these
    issues. With secure enclaves, operators such as `<`, `>`, and even `LIKE` are
    supported, providing that randomized encryption is used. Secure Enclaves also
    support in-place encryption.


    Secure Enclaves work, by using a protected area of memory, inside the SQL Server
    process, as a trusted execution environment. Within this memory region, data is
    decrypted and computations performed. It is not possible for the rest of the SQL
    Server process, or any other process on the server, to access the secure memory,
    meaning that the decrypted data cannot be leaked, even when using debugging tools.


    If SQL Server determines that a secure enclave is required to satisfy a query,
    then the client driver uses a secure channel, to send the encryption keys to the
    secure enclave. The client driver then submits the query, and encrypted query
    parameters, for execution. Because the data (even the encrypted parameters) are
    only ever decrypted inside the enclave, the data, parameters, and encryption keys
    are never exposed, in plaintext.


    Because the decrypted data and keys are available inside of the enclave, the client
    driver needs to verify that the enclave is genuine. To do this, it requires an
    external arbiter, known as an attestation service, such as the Windows Server
    Host Guardian Service. Before sending any data to the enclave, the client driver
    will contact the attestation service, to determine the enclave’s validity.


    When using Always Encrypted, there are many limitations. For example, advanced
    data types are not supported. A full list of limitations can be found at [`https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-database-engine?view=sql-server-2019#feature-details`](https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-database-engine%253Fview%253Dsql-server-2019%2523feature-details)
    .


    ### Implementing Always Encrypted


    In this section, we will encrypt data, within a database called `Chapter11AlwaysEncrypted`,
    using Always Encrypted with Secure Enclaves. We will use VBS (virtualization-based
    security) enclaves. In production environments, you should ensure that your enclaves
    use TPM (Trusted Platform Module) attestation, for enhanced security. TPM is a
    hardware-based attestation and is beyond the scope of this chapter. Further details
    can be found at [`https://docs.microsoft.com/en-us/windows-server/identity/ad-ds/manage/component-updates/tpm-key-attestation`](https://docs.microsoft.com/en-us/windows-server/identity/ad-ds/manage/component-updates/tpm-key-attestation)
    .


    In this section, we will configure a second server as the attestation service
    and register our SQL Server with it, so that it may arbitrate, when clients wish
    to use the enclave.


    The first step is to use the PowerShell script in Listing [11-13](#333037_2_En_11_Chapter.xhtml#PC13),
    to configure a second server as the attestation service. This server must be running
    Windows Server 2019\. The process requires the server to perform several reboots.
    Therefore, the script uses comments to mark the sections. After running each section
    of the script, the subsequent section should not be run, until the reboot is complete.
    Remember that you cannot use the same server, which hosts your SQL Server instance.
    It is also worthy of note that the server acting as the attestation service may
    not be domain joined, at the point it is configured. This is because a new domain
    is created for the host guardian.


    ### Tip


    The PowerShell terminal should be run as Administrator for the script to execute
    successfully.


    ```

    #Part 1 - Install the Host Guardian Service role

    Install-WindowsFeature -Name HostGuardianServiceRole -IncludeManagementTools -Restart

    #Part 2 - Install the Host Guardian Service & configure its domain

    $DSRepairModePassword = ConvertTo-SecureString -AsPlainText ''MyVerySecurePa$$w0rd''
    –Force

    Install-HgsServer -HgsDomainName ''HostGuardian.local'' -SafeModeAdministratorPassword
    $DSRepairModePassword -Restart

    #After the reboot, log-in using the admin account, which will now be elevated
    to Domain Admin of the HostGuardian.local domain

    #Part 3 - Configure Host Ket Attestation

    Initialize-HgsAttestation -HgsServiceName ''hgs'' -TrustHostKey

    Listing 11-13

    Configure the Attestation Server

    ```


    We now need to register the server hosting the SQL Server instance as a guarded
    host. We can prepare for this using the script in Listing [11-14](#333037_2_En_11_Chapter.xhtml#PC14).
    Once again, the script uses comments to split it into sections. This is because
    restarts are required during the process. Again, the PowerShell terminal should
    be run as Administrator.


    ```

    #Part 1 - Enable the HostGuardian feature

    Enable-WindowsOptionalFeature -Online -FeatureName HostGuardian -All

    #Part 2 - Remove VBS requirement. Only required if you are using a VM

    Set-ItemProperty -Path HKLM:\SYSTEM\CurrentControlSet\Control\DeviceGuard -Name
    RequirePlatformSecurityFeatures -Value 0

    shutdown /r

    #Part 3 - Generate a host key pair and export public key to a file

    #Generate the host key pair

    Set-HgsClientHostKey

    #Create a folder to store the keys

    New-Item -Path c:\ -Name Keys -ItemType directory

    #Export the public key to a file

    Get-HgsClientHostKey -Path ("c:\Keys\{0}key.cer" -f $env:computername)

    Listing 11-14

    Prepare to Register the Host As a Guarded Host

    ```


    At this point, you should manually copy the certificate file that is generated
    in the c:\keys folder to the attestation server. Assuming that you copy the certificate
    to a folder called c:\keys, the script in Listing [11-15](#333037_2_En_11_Chapter.xhtml#PC15)
    will import the key into the attestation service.'
