    ## Log Shipping Maintenance


    After you configure log shipping, you still have ongoing maintenance tasks to
    perform, such as failing over to the secondary server, if you need to, and switching
    the primary and secondary roles. These topics are discussed in the following sections.
    We also discuss how to use the monitor server to monitor the log shipping environment.


    ### Failing Over Log Shipping


    If your primary server has an issue, or your primary site fails, you need to fail
    over to your secondary server. To do this, first back up the tail end of the log.
    We discuss this process fully in Chapter [15](#333037_2_En_15_Chapter.xhtml),
    but the process essentially involves backing up the transaction log without truncating
    it and with `NORECOVERY`. This stops users from being able to connect to the database,
    therefore avoiding any further data loss. Obviously, this is only possible if
    the primary database is accessible. You can perform this action for the `Chapter15`
    database by using the script in Listing [15-7](#333037_2_En_15_Chapter.xhtml#PC7).


    ```

    BACKUP LOG Chapter15

    TO  DISK = N''c:\logshippingprimary\Chapter15_tail.trn''

    WITH  NO_TRUNCATE, NAME = N''Chapter15-Full Database Backup'', NORECOVERY

    GO

    Listing 15-7

    Backing Up the Tail End of the Log

    ```


    The next step is to manually copy the tail end of the log and any other logs that
    have not yet been copied to the secondary server. Once this is complete, you need
    to manually restore the outstanding transaction log backups to the secondary server,
    in sequence. You need to apply the backups with `NORECOVERY` until the final backup
    is reached. This final backup is applied with `RECOVERY`. This causes any uncommitted
    transactions to be rolled back and the database to be brought online. Listing
    [15-8](#333037_2_En_15_Chapter.xhtml#PC8) demonstrates applying the final two
    transaction logs to the secondary database.


    ```

    --Restore the first transaction log

    RESTORE LOG Chapter15

    FROM  DISK = N''C:\LogShippingDR\Chapter15.trn''

    WITH  FILE = 1,  NORECOVERY,  STATS = 10 ;

    GO

    --Restore the tail end of the log

    RESTORE LOG Chapter15

    FROM  DISK = N''C:\LogShippingDR\Chapter15_tail.trn''

    WITH  FILE = 1,  RECOVERY, STATS = 10 ;

    GO

    Listing 15-8

    Applying Transaction Logs

    ```


    ### Switching Roles


    After you have failed over log shipping to the secondary server, you may want
    to swap the server roles so that the secondary that you failed over to becomes
    the new primary server and the original primary server becomes the secondary.
    In order to achieve this, first you need to disable the backup job on the primary
    server and the copy and restore jobs on the secondary server. We can perform this
    task for our Log Shipping topology by using the script in Listing [15-9](#333037_2_En_15_Chapter.xhtml#PC9).
    Because we are connecting to multiple servers, we need to run this script in SQLCMD
    mode.


    ```

    :connect primaryserver\prosqladmin

    USE [msdb]

    GO

    --Disable backup job

    EXEC msdb.dbo.sp_update_job @job_name = ''LSBackup_Chapter15'',

    @enabled=0 ;

    GO

    :connect drserver\prosqldr

    USE [msdb]

    GO

    --Diable copy job

    EXEC msdb.dbo.sp_update_job @job_name=''LSCopy_primaryserver\prosqladmin_Chapter15'',

    @enabled=0 ;

    GO

    --Disable restore job

    EXEC msdb.dbo.sp_update_job @job_name=''LSRestore_primaryserver\prosqladmin_Chapter15'',

    @enabled=0 ;

    GO

    Listing 15-9

    Disabling Log Shipping Jobs

    ```


    The next step is to reconfigure log shipping on the new primary server. When you
    do this, configure the following:


    *   Ensure that you use the same backup share that you used for the original primary
    server.


    *   Ensure that when you add the secondary database, you specify the database
    that was originally the primary database.


    *   Specify the synchronization No, The Secondary Database Is Initialized option.


    The script in Listing [15-10](#333037_2_En_15_Chapter.xhtml#PC10) performs this
    action for our new secondary server. Since we are connecting to multiple servers,
