    ## Summary


    Database snapshots use copy-on-write technology to create a point-in-time copy
    of a database. The snapshot must exist on the same instance as the source database,
    so although you cannot use them to distribute load between servers, you can use
    them to reduce contention between read and write operations.


    Snapshots can be used to recover data that has been lost due to human error as
    well as for reporting purposes. You can either copy the data back to the source
    database or restore the source database from a snapshot, as long as it is the
    only snapshot linked with the source database. Snapshots do not offer a protection
    against failure or corruption, however, and they are not a suitable alternative
    to backups.


    Replication is a suite of technologies, offered by SQL Server, that allows you
    to distribute data between systems. For the purpose of scaling workloads, transactional
    replication is the most appropriate choice. Transactional replication can be implemented
    by configuring a distributor, which will hold replication metadata and potentially
    take the weight off the synchronization; a publisher, which hosts the data that
    is synchronized; and subscribers, which are the targets for synchronization. Replication
    is a complex technology, and as a DBA, you should understand how to implement
    it using `T-SQL`, as well as the GUI, since you will encounter situations in which
    you need to tear down and rebuild replication. Replication also exposes the `RMO`
    (Replication Management Objects) API, which is a replication programming interface
    for .NET.


    You can configure readable secondary replicas within an AlwaysOn Availability
    Group topology; these allow for horizontal scaling of read-only workloads. Readable
    secondary replicas stay online even if the primary replica goes offline. The caveat
    here is that connections must be made directly to the instance.


    In order to implement readable secondary replicas, you must configure read-only
    routing. This involves giving the secondary a URL for read-only reporting and
    then updating the read-only routing list on the primary replica. The risk of using
    this strategy for scale-out reporting is that long-running transactions at the
    secondary, or the secondary becoming disconnected, can lead to log truncation
    delays and delays in ghost records being cleaned up.


    # Part IV Performance and Maintenance


    ## 17. SQL Server Metadata


    Metadata is data that describes other data. SQL Server exposes a vast array of
    metadata including structural metadata, which describes every object, and descriptive
    metadata, which describes the data itself. Metadata is exposed through a series
    of


    *   Catalog views

    *   Information schema views

    *   Dynamic management views and functions

    *   System functions

    *   System stored procedures


    In this chapter, we will discuss how metadata can be used to perform actions at
    the instance level, such as expose registry values, examine how metadata can assist
    in capacity planning, and discuss how metadata can be used for troubleshooting
    and performance tuning. Finally, we will see how metadata can be used to drive
    automated maintenance.


    ### Tip

    Metadata is a high topic worthy of a book in its own right. I therefore encourage
    you to play with other metadata objects, which may not be covered in this chapter.'
