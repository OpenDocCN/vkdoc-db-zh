- fmt: '### The Advanced Tab


    在 **高级** 选项卡上（如图 [2-6](#333037_2_En_2_Chapter.xhtml#Fig6) 所示），可以找到用于执行 SQL Server
    高级安装的工具，包括作为独立实例和作为集群的安装。这些工具包括 `Install Based On Configuration File`、`Advanced
    Cluster Preparation`、`Advanced Cluster Completion`、`Image Preparation Of A Stand-Alone
    Instance Of SQL Server` 和 `Image Completion Of A Stand-Alone Instance Of SQL Server`。


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig6_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig6_HTML.jpg)


    图 2-6


    高级选项卡


    安装 SQL Server 时，会自动创建一个配置文件。也可以手动创建此配置文件。然后，您可以使用此配置文件来安装具有相同配置的其他 SQL Server
    实例。这对于在企业内推广一致性非常有用。创建此配置文件后，您可以使用 `Install Based On Configuration File` 选项，基于预先创建的配置来安装更多实例。配置文件对于命令行安装也很有用，这将在第
    [3](#333037_2_En_3_Chapter.xhtml) 章中讨论。此外，您还可以使用配置文件进行集群准备。


    如果您希望使用配置文件进行集群准备，那么您应该选择 **高级** 选项卡上的 `Advanced Cluster Preparation` 选项，而不是通过
    **安装** 选项卡上可用的 `New SQL Server Failover Cluster Installation` 和 `Add Node To A
    SQL Server Failover Cluster` 向导来安装集群。您最初应在可以作为 SQL Server 实例的可能所有者的集群节点之一上运行此选项，系统将生成一个配置文件。随后在集群的所有其他可能所有者节点上运行
    `Advanced Cluster Preparation` 向导，将导致使用该配置文件来确保整个集群安装的一致性。这种方法甚至适用于多子网集群（也称为地理集群），因为
    SQL Server 会自动检测子网之间的关系，系统将提示您为每个子网选择一个 IP 地址。然后，安装程序将使用 OR 约束将每个 IP 地址作为依赖项添加到集群角色，其中每个节点不能是每个
    IP 地址的可能所有者。或者，它将使用 AND 约束，其中每个节点可以是每个 IP 地址的可能所有者。


    在每个作为集群实例可能所有者的节点上运行 `Advanced Cluster Preparation` 向导后，您可以运行 `Advanced Cluster
    Completion` 向导。您只需运行此向导一次，并且可以在任何可能所有者的节点上运行。此向导成功完成后，集群实例将完全正常运行。


    `Image Preparation Of A Stand-Alone Instance Of SQL Server` 选项将使用 `Sysprep` 来安装
    SQL Server 的“纯净”实例，该实例未配置账户、计算机或网络特定信息。它可以与 `Windows Sysprep` 结合使用，以构建带有已准备 SQL
    Server 实例的完整 Windows 模板，然后用于在整个企业范围内进行部署。这有助于强制保持一致性。在 SQL Server 2019 中，`Sysprep`
    支持独立实例的所有功能；但是，不支持修复安装。这意味着如果在准备阶段或完成阶段的安装过程中失败，则必须卸载该实例。


    要完成已准备映像的安装，您可以使用 `Image Completion Of A Prepared Stand-Alone Instance Of SQL
    Server` 选项。此选项允许您通过输入账户、计算机和网络特定信息来完成实例的配置。


    ### The Options Tab


    如图 [2-7](#333037_2_En_2_Chapter.xhtml#Fig7) 所示，SQL Server 安装中心的 **选项** 选项卡显示了您可以根据服务器中的处理器类型用于安装
    SQL Server 的处理器架构。它还允许您指定安装媒体的路径。如果您在服务器本地存储了媒体副本，这会很有用。


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig7_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig7_HTML.jpg)


    图 2-7


    选项选项卡


    ## 安装独立数据库引擎实例


    如前一节所述，SQL Server 实例可以通过多种方式安装，包括通过命令行、结合使用 `Sysprep` 与高级安装和配置文件，或使用 **安装** 选项卡上的
    `New SQL Server Stand-Alone Installation Or Add Features To An Existing Installation`
    选项。在下面的演示中，我们将使用最后一个选项来安装 SQL Server。在接下来的章节中，我们将安装一个包含将在本书中进一步详细研究的功能的数据库引擎实例，包括
    `FILESTREAM` 和 `Distributed Replay`。我们还将深入探讨为实例选择正确的排序规则和服务账户。


    ### 准备步骤


    当您选择安装新的 SQL Server 实例时，向导的第一个屏幕将提示您输入 SQL Server 的产品密钥，如图 [2-8](#333037_2_En_2_Chapter.xhtml#Fig8)
    所示。


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig8_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig8_HTML.jpg)


    图 2-8


    产品密钥页面


    如果在此屏幕上不输入产品密钥，您将只能安装 SQL Server 的 Express 版、Developer 版或 Evaluation 版。Developer
    版提供与 Enterprise 版相同级别的功能，但未授权用于生产环境。Evaluation 版具有与 Enterprise 版相同级别的功能，但会在 180
    天后过期。


    向导的下一个屏幕将要求您阅读并接受 SQL Server 的许可条款，如图 [2-9](#333037_2_En_2_Chapter.xhtml#Fig9)
    所示。此屏幕上提供的链接将为您提供有关 Microsoft 隐私政策的更多详细信息。


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig9_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig9_HTML.jpg)


    图 2-9


    许可条款页面


    接受许可条款后，SQL Server 安装程序将运行规则检查以确保可以继续安装，如图 [2-10](#333037_2_En_2_Chapter.xhtml#Fig10)
    所示。这与您可以从 SQL Server 安装中心的 **计划** 选项卡独立运行的配置检查相同，如本章前面所述。


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig10_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig10_HTML.jpg)


    图 2-10


    全局规则页面


    假设所有检查均成功通过，向导的屏幕（如图 [2-11](#333037_2_En_2_Chapter.xhtml#Fig11) 所示）将提示您选择是否希望
    `Microsoft Update` 检查 SQL Server 补丁和 hotfix。此处的选择取决于您组织的修补策略。一些组织对补丁的测试和验收实施严格的修补方案，然后是修补周期，通常由
    `WSUS (Windows Server Update Services)` 等软件支持。如果您的组织中存在这样的方案，则不应选择此选项。


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig11_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig11_HTML.jpg)


    图 2-11


    Microsoft Update 页面'
  raw: '### The Advanced Tab


    On the Advanced tab, illustrated in Figure [2-6](#333037_2_En_2_Chapter.xhtml#Fig6),
    you will find tools for performing advanced installations of SQL Server, both
    as a stand-alone instance and also as a cluster. These tools include Install Based
    On Configuration File, Advanced Cluster Preparation, Advanced Cluster Completion,
    Image Preparation Of A Stand-Alone Instance Of SQL Server, and Image Completion
    Of A Stand-Alone Instance Of SQL Server.


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig6_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig6_HTML.jpg)


    Figure 2-6


    The Advanced tab


    When you are installing SQL Server, a configuration file will automatically be
    created. It is also possible to create this configuration file manually. You can
    then use this configuration file to install other instances of SQL Server with
    an identical configuration. This can be useful for promoting consistency across
    the enterprise. Once this configuration file has been created, you can use the
    Install Based On Configuration File option to install further instances based
    on the precreated configuration. Configuration files can also be useful for command-line
    installs, which will be discussed in Chapter [3](#333037_2_En_3_Chapter.xhtml).
    Additionally, you can also use a configuration file for cluster preparation.


    If you wish to use a configuration file for cluster preparation, then instead
    of choosing to install the cluster via the New SQL Server Failover Cluster Installation
    and Add Node To A SQL Server Failover Cluster wizards, which are available on
    the Installation tab, you should choose the Advanced Cluster Preparation option
    on the Advanced tab. You will initially run this on one of the cluster nodes that
    can be a possible owner of the SQL Server instance, and a configuration file will
    be generated. Subsequently running the Advanced Cluster Preparation wizard on
    all other nodes of the cluster that can be possible owners will result in the
    configuration file being used to ensure consistency of installation across the
    cluster. This approach will even work for multi-subnet clusters (also known as
    geoclusters), since SQL Server will automatically detect the relationship between
    the subnets and you will be prompted to select an IP address for each subnet.
    The installation will then add each of the IP addresses as dependencies to the
    cluster role, using the OR constraint, where each node cannot be the possible
    owner of every IP address. Alternatively, it will use the AND constraint, where
    each node can be the possible owner of every IP address.


    Once you have run the Advanced Cluster Preparation wizard on every node that is
    a possible owner of the clustered instance, you can run the Advanced Cluster Completion
    wizard. You only have to run this wizard once, and you can run it on any of the
    nodes that are possible owners. After this wizard has completed successfully,
    the clustered instance will be fully functioning.


    The Image Preparation Of A Stand-Alone Instance Of SQL Server option will use
    Sysprep for SQL Server to install a vanilla instance of SQL Server, which is not
    configured with account-, computer-, or network-specific information. It can be
    used in conjunction with Windows Sysprep to build a complete template of Windows
    with prepared SQL Server instances, which can then be used for deployments across
    the enterprise. This helps enforce consistency. In SQL Server 2019, all features
    of a stand-alone instance are supported by Sysprep; however, repairing an installation
    is not supported. This means that if an installation fails during either the prepare
    phase or the complete phase of the process, the instance must be uninstalled.


    To finish the installation of a prepared image, you can use the Image Completion
    Of A Prepared Stand-Alone Instance Of SQL Server option. This option will allow
    you to complete the configuration of the instance by inputting the account-, computer-,
    and network-specific information.


    ### The Options Tab


    As illustrated in Figure [2-7](#333037_2_En_2_Chapter.xhtml#Fig7), the Options
    tab of the SQL Server Installation Center displays the processor architecture
    that you can use to install SQL Server, based on the processor type in your server.
    It also allows you to specify a path to the installation media. This can be useful
    if you have a copy of the media stored locally on the server.


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig7_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig7_HTML.jpg)


    Figure 2-7


    The Options tab


    ## Installing a Stand-Alone Database Engine Instance


    As discussed in the preceding section, an instance of SQL Server can be installed
    in various ways, including via the command line, by using Sysprep with an advanced
    installation using a configuration file, or by using the New SQL Server Stand-Alone
    Installation Or Add Features To An Existing Installation option on the Installation
    tab. It is the last of these options that we will use to install SQL Server in
    the following demonstration. In the following sections, we will install a Database
    Engine instance with features that will be examined in further detail throughout
    this book, including FILESTREAM and Distributed Replay. We will also take an in-depth
    look at choosing the correct collation and service account for the instance.


    ### Preparation Steps


    When you choose to install a new instance of SQL Server, the first screen of the
    wizard that you are presented with will prompt you to enter the product key for
    SQL Server, as illustrated in Figure [2-8](#333037_2_En_2_Chapter.xhtml#Fig8).


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig8_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig8_HTML.jpg)


    Figure 2-8


    Product Key page


    If you do not enter a product key on this screen, you will only be able to install
    either the Express edition of SQL Server, the Developer edition, or the Evaluation
    edition. The Developer edition provides the same level of functionality as Enterprise,
    but is not licensed for production use. The Evaluation edition has the same level
    of functionality as the Enterprise edition, but it expires after 180 days.


    The next screen of the wizard will ask you to read and accept the license terms
    of SQL Server, as illustrated in Figure [2-9](#333037_2_En_2_Chapter.xhtml#Fig9).
    A link provided on this screen will give you further details of Microsoft’s privacy
    policy.


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig9_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig9_HTML.jpg)


    Figure 2-9


    License Terms page


    After you accept the license terms, SQL Server setup will run a rule check to
    ensure that it can continue with the installation, as illustrated in Figure [2-10](#333037_2_En_2_Chapter.xhtml#Fig10).
    This is the same configuration check that you can run independently from the Planning
    tab of SQL Server Installation Center, as discussed earlier in this chapter.


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig10_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig10_HTML.jpg)


    Figure 2-10


    Global Rules page


    Assuming that all checks pass successfully, the screen of the wizard illustrated
    in Figure [2-11](#333037_2_En_2_Chapter.xhtml#Fig11) will prompt you to choose
    if you want Microsoft Update to check for SQL Server patches and hotfixes. The
    choice here will depend on your organization’s patching policy. Some organizations
    implement a ridged patching regime for the testing and acceptance of patches,
    followed by a patching cycle, which is often supported with software such as WSUS
    (Windows Server Update Services). If such a regime exists in your organization,
    then you should not select this option.


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig11_HTML.jpg](images/333037_2_En_2_Chapter/333037_2_En_2_Fig11_HTML.jpg)


    Figure 2-11


    Microsoft Update page'
