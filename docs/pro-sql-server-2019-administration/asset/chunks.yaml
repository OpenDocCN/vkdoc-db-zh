- fmt: "### Note\n\n确保将服务器和密钥名称更改为与您自己环境匹配的名称。\n\n```\nAdd-HgsAttestationHostKey -Name\
    \ WIN-2RDHRBC9VK8 -Path c:\\keys\\WIN-2RDHRBC9VK8key.cer\nListing 11-15\nImport\
    \ Client Key into Attestation Service\n```\n\n注册流程的最后一步是配置客户端，这可以使用清单 [11-16](#333037_2_En_11_Chapter.xhtml#PC16)\
    \ 中的脚本来完成。在运行脚本前，请务必确保证证服务的 IP 地址已更改为与您自己环境匹配的地址。\n\n```\n$params = @{\n    AttestationServerUrl\
    \   = 'http://10.0.0.3/Attestation'\n    KeyProtectionServerUrl = 'http://10.0.0.3/KeyProtection'\n\
    }\nSet-HgsClientConfiguration @params\nListing 11-16\nConfigure the Client\n```\n\
