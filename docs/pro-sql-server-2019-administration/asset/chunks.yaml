- fmt: '### Dynamically Cycling Database Snapshots


    As discussed in Chapter [16](#333037_2_En_16_Chapter.xhtml), we can use database
    snapshots to create a read-only copy of the database that can reduce contention
    for read-only reporting. The issue is that the data becomes stale, as data in
    the source database is modified. For this reason, a useful tool for managing snapshots
    is a stored procedure, which dynamically creates a new snapshot and drops the
    oldest existing snapshot. You can then schedule this procedure to run periodically,
    using SQL Server Agent (SQL Server Agent is discussed in Chapter [22](#333037_2_En_22_Chapter.xhtml)).
    The script in Listing [17-21](#333037_2_En_17_Chapter.xhtml#PC21) creates a stored
    procedure that, when passed the name of the source database, drops the oldest
    snapshot and creates a new one.


    The procedure accepts two parameters. The first specifies the name of the database
    that should be used to generate the snapshot. The second parameter specifies how
    many snapshots you should have at any one time. For example, if you pass in a
    value of `Chapter17` to the `@DBName` parameter and a value of `2` to the `@RequiredSnapshots`
    parameter, the procedure creates a snapshot against the `Chapter17` database but
    only removes the oldest snapshot if at least two snapshots already exist against
    the `Chapter17` database.


    The procedure builds up the `CREATE DATABASE` script in three parts (see Listing
    [17-21](#333037_2_En_17_Chapter.xhtml#PC21)). The first part contains the initial
    `CREATE DATABASE` statement. The second part creates the file list, based on the
    files that are recorded as being part of the database in `sys.master_files`. The
    third part contains the `AS SNAPSHOT OF` statement. The three strings are then
    concatenated together before being executed. The script appends a sequence number
    to the name of the snapshot, and the name of each file within the snapshot, to
    ensure uniqueness.


    ```sql

    CREATE PROCEDURE dbo.DynamicSnapshot @DBName NVARCHAR(128), @RequiredSnapshots
    INT

    AS

    BEGIN

    DECLARE @SQL NVARCHAR(MAX)

    DECLARE @SQLStart NVARCHAR(MAX)

    DECLARE @SQLEnd NVARCHAR(MAX)

    DECLARE @SQLFileList NVARCHAR(MAX)

    DECLARE @DBID INT

    DECLARE @SS_Seq_No INT

    DECLARE @SQLDrop NVARCHAR(MAX)

    SET @DBID = (SELECT DB_ID(@DBName)) ;

    --Generate sequence number

    IF (SELECT COUNT(*) FROM sys.databases WHERE source_database_id = @DBID) > 0

    SET @SS_Seq_No = (SELECT TOP 1 CAST(SUBSTRING(name, LEN(Name), 1) AS INT)

    FROM sys.databases

    WHERE source_database_id = @DBID

    ORDER BY create_date DESC) + 1

    ELSE

    SET @SS_Seq_No = 1

    --Generate the first part of the CREATE DATABASE statement

    SET @SQLStart = ''CREATE DATABASE ''

    + QUOTENAME(@DBName + CAST(CAST(GETDATE() AS DATE) AS NCHAR(10))

    + ''_ss'' + CAST(@SS_Seq_No AS NVARCHAR(4))) + '' ON '' ;

    --Generate the file list for the CREATE DATABASE statement

    SELECT @SQLFileList =

    (

    SELECT

    ''(NAME = N'''''' + mf.name + '''''', FILENAME = N''''''

    + SUBSTRING(mf.physical_name, 1, LEN(mf.physical_name) - 4)

    + CAST(@SS_Seq_No AS NVARCHAR(4)) + ''.ss'' + ''''''),'' AS [data()]

    FROM  sys.master_files mf

    WHERE mf.database_id = @DBID

    AND mf.type = 0

    FOR XML PATH ('''')

    ) ;

    --Remove the extra comma from the end of the file list

    SET @SQLFileList = SUBSTRING(@SQLFileList, 1, LEN(@SQLFileList) - 2) ;

    --Generate the final part of the CREATE DATABASE statement

    SET @SQLEnd = '') AS SNAPSHOT OF '' + @DBName ;

    --Concatenate the strings and run the completed statement

    SET @SQL = @SQLStart + @SQLFileList + @SQLEnd ;

    EXEC(@SQL) ;

    --Check to see if the required number of snapshots exists for the database,

    --and if so, delete the oldest

    IF (SELECT COUNT(*)

    FROM sys.databases

    WHERE source_database_id = @DBID) > @RequiredSnapshots

    BEGIN

    SET @SQLDrop = ''DROP DATABASE '' + (

    SELECT TOP 1

    QUOTENAME(name)

    FROM sys.databases

    WHERE source_database_id = @DBID

    ORDER BY create_date ASC )

    EXEC(@SQLDrop)

    END ;

    END

    ```

    Listing 17-21 Dynamically Cycling Database Snapshots


    The command in Listing [17-22](#333037_2_En_17_Chapter.xhtml#PC22) runs the `DynamicSnapshot`
    procedure against the `Chapter17` database, specifying that two snapshots should
    exist at any one time.


    ```sql

    EXEC dbo.DynamicSnapshot ''Chapter17'', 2 ;

    ```

    Listing 17-22 Running the DynamicSnapshot Procedure


    ### Rebuilding Only Fragmented Indexes


    When you rebuild all indexes with a maintenance plan, which we discuss in Chapter
    [22](#333037_2_En_22_Chapter.xhtml), SQL Server supplies no intelligent logic
    out of the box. Therefore, all indexes are rebuilt, regardless of their fragmentation
    level, which requires unnecessary time and resource utilization. A workaround
    for this issue is to write a custom script that rebuilds indexes only if they
    are fragmented.


    The script in Listing [17-23](#333037_2_En_17_Chapter.xhtml#PC23) demonstrates
    how you can use `SQLCMD` to identify indexes that have more than 25% fragmentation
    and then rebuild them dynamically. The reason that the code is in a `SQLCMD` script,
    as opposed to a stored procedure, is because `sys.dm_db_index_physical_stats`
    must be called from within the database that you wish to run it against. Therefore,
    when you run it via `SQLCMD`, you can use a scripting variable to specify the
    database you require; doing so makes the script reusable for all databases. When
    you run the script from the command line, you can simply pass in the name of the
    database as a variable.


    ```sql

    USE $(DBName)

    GO

    DECLARE @SQL NVARCHAR(MAX)

    SET @SQL =

    (

    SELECT ''ALTER INDEX ''

    + i.name

    + '' ON '' + s.name

    + ''.''

    + OBJECT_NAME(i.object_id)

    + '' REBUILD ; ''

    FROM sys.dm_db_index_physical_stats(DB_ID(''$(DBName)''),NULL,NULL,NULL,''DETAILED'')
    ps

    INNER JOIN sys.indexes i

    ON ps.object_id = i.object_id

    AND ps.index_id = i.index_id

    INNER JOIN sys.objects o

    ON ps.object_id = o.object_id

    INNER JOIN sys.schemas s

    ON o.schema_id = s.schema_id

    WHERE index_level = 0

    AND avg_fragmentation_in_percent > 25

    FOR XML PATH('''')

    ) ;

    EXEC(@SQL) ;

    ```

    Listing 17-23 Rebuilding Only Required Indexes


    When this script is saved as in the root of `C:\` as `RebuildIndexes.sql`, it
    can be run from the command line. The command in Listing [17-24](#333037_2_En_17_Chapter.xhtml#PC24)
    demonstrates running it against the `Chapter17` database.


    ```cmd

    Sqlcmd -v DBName="Chapter17" -I c:\RebuildIndexes.sql -S ./PROSQLADMIN

    ```

    Listing 17-24 Running RebuildIndexes.sql'
