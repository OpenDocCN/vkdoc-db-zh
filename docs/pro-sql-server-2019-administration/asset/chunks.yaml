    ### 提示


    请记住，默认实例默认情况下将使用端口 `1433`。因此，如果服务器上已经存在一个默认实例，那么在创建命名实例时，你必须使用一个不同的端口。


    我们可以通过运行清单 5-9 中的 PowerShell 脚本来实现相同的结果。该脚本顶部有两个变量，你需要插入你的实例名称和你想要分配的端口号。这些也可以被参数化，以创建一个可复用的脚本。该脚本加载了相关的
    SMO 程序集。然后，它创建一个新的 SMO 对象并连接到该对象的 TCP 属性以配置端口。该脚本必须以管理员身份运行。


    ```powershell

    # Initialize variables

    $Instance = "PROSQLADMIN"

    $Port = "1433"

    # Load SMO Wmi.ManagedComputer assembly

    [System.Reflection.Assembly]::LoadWithPartialName("Microsoft.SqlServer.SqlWmiManagement")
    | out-null

    # Create a new smo object

    $m = New-Object (''Microsoft.SqlServer.Management.Smo.Wmi.ManagedComputer'')

    #Disable dynamic ports

    $m.ServerInstances[$Instance].ServerProtocols[''Tcp''].IPAddresses[''IPAll''].IPAddressProperties[''TcpDynamicPorts''].Value
    = ""

    # Set static port

    $m.ServerInstances[$Instance].ServerProtocols[''Tcp''].IPAddresses[''IPAll''].IPAddressProperties[''TcpPort''].Value
    = "$Port"

    # Reconfigure TCP

    $m.ServerInstances[$Instance].ServerProtocols[''Tcp''].Alter()

    ```


    清单 5-9: 分配静态端口


    ## 系统数据库


    SQL Server 维护五个系统数据库，每个数据库对于实例的高效运行都至关重要。以下各节描述了这些数据库中的每一个，并详细说明了配置它们时的任何特殊注意事项。


    ### mssqlsystemresource (Resource)


    虽然被称为 Resource，但 Resource 数据库的全名是 `mssqlsystemresource`。它是用于存储出现在每个数据库的 `sys`
    架构中的系统对象的物理存储库。它是只读的，除了在 Microsoft 的指导下，否则绝不应修改。它在 Management Studio 中不可见，如果你尝试从查询窗口连接它，将会失败，除非你处于单用户模式。配置
    Resource 没有需要考虑的事项。


    ### MSDB


    `MSDB` 被用作许多 SQL Server 功能的元数据存储库，包括服务器代理、备份/还原、数据库邮件、日志传送、策略等。尽管这显然是一个关键且有用的数据库，但没有特定的配置选项需要考虑。话虽如此，在一个由大量数据库组成且所有数据库都有频繁日志备份的非常大的实例中，该数据库可能会变得非常大。这意味着你将需要清理旧数据，有时还需要考虑索引策略。可以使用
    `sp_deletebackuphistory` 存储过程或维护计划中的历史记录清理任务来清理历史备份数据。自动例行维护任务将在第 22 章中更详细地讨论。


    ### Master


    `Master` 是系统数据库，包含实例级对象的元数据，例如登录名、链接服务器、TCP 终端点以及用于实现加密的主密钥和证书。`Master` 数据库最大的考虑因素是备份策略。虽然它不需要像用户数据库那样频繁备份，但你应始终确保你有一个当前的备份。至少，在创建或更改登录名、链接服务器和系统配置后；创建或更改密钥和证书后；或者在创建或删除用户数据库后，应该备份数据库。许多人选择每周对
    `Master` 进行一次完整备份的计划，但这将取决于你的操作要求，例如你创建新用户的频率。


    ### 注意


    登录名和用户将在第 9 章讨论，备份将在第 15 章讨论，密钥和证书将在第 10 章讨论。


    虽然技术上可行，但将用户对象存储在 `Master` 数据库中被认为是不好的做法。我见过客户为需要由实例上所有数据库共享的存储过程而这样做，但它增加了复杂性，因为他们分散了用户对象的存储，同时也增加了必须备份
    `Master` 的频率。


    ### 提示


    因为开发人员通常不设置默认数据库，他们最终会错误地在 `Master` 数据库中创建存储过程。你应该在代码部署过程中检查此问题。


    ### Model


    `Model` 用作实例上创建的所有新数据库的模板。这意味着花一些时间配置这个数据库，可以在你创建用户数据库时节省时间并减少人为错误。例如，如果你在 `Model`
    数据库上将恢复模式设置为完整，那么所有新的用户数据库将自动以相同方式配置。你仍然可以选择在 `CREATE DATABASE` 语句中覆盖此设置。此外，如果你需要某个特定对象（如维护存储过程或数据库角色）存在于所有数据库中，那么在
    `Model` 中创建它将意味着该对象将自动在每个新数据库中创建。`Model` 也用于在每次实例启动时创建 `TempDB`。这意味着如果你在 `Model`
    数据库中创建对象，它们将在实例重启时自动添加到 `TempDB` 中。


    ### 提示


    当你配置或向 `Model` 添加新对象时，现有数据库不会被更新。更改将仅适用于你随后创建的新数据库。

