    When this script is saved as in the root of `C:\` as `RebuildIndexes.sql`, it
    can be run from the command line. The command in Listing [17-24](#333037_2_En_17_Chapter.xhtml#PC24)
    demonstrates running it against the `Chapter17` database.


    ```

    Sqlcmd -v DBName="Chapter17" -I c:\RebuildIndexes.sql -S ./PROSQLADMIN

    Listing 17-24

    Running RebuildIndexes.sql

    ```'
  trans: '

    ### 动态循环数据库快照


    正如第 16 章所讨论的，我们可以使用数据库快照来创建数据库的只读副本，以减少只读报告的争用。问题在于，随着源数据库中数据的修改，快照中的数据会变得陈旧。因此，管理快照的一个实用工具是存储过程，它可以动态创建新快照并删除最旧的现有快照。然后，你可以使用
    SQL Server Agent（SQL Server Agent 在第 22 章讨论）定期调度此过程运行。清单 17-21 中的脚本创建了一个存储过程，该过程在传入源数据库名称时，会删除最旧的快照并创建一个新快照。


    该过程接受两个参数。第一个参数指定用于生成快照的数据库名称。第二个参数指定在任何时间点应保留的快照数量。例如，如果你向 `@DBName` 参数传入值 `Chapter17`，并向
    `@RequiredSnapshots` 参数传入值 `2`，该过程将针对 `Chapter17` 数据库创建一个快照，但仅当已存在至少两个针对 `Chapter17`
    数据库的快照时，才会删除最旧的那个。


    该过程分三部分构建 `CREATE DATABASE` 脚本（参见清单 17-21）。第一部分包含初始的 `CREATE DATABASE` 语句。第二部分基于在
    `sys.master_files` 中记录为数据库组成部分的文件创建文件列表。第三部分包含 `AS SNAPSHOT OF` 语句。然后，这三个字符串在执行前被连接在一起。脚本在快照名称及其内部每个文件的名称后附加一个序列号，以确保唯一性。


    ```sql

    CREATE PROCEDURE dbo.DynamicSnapshot @DBName NVARCHAR(128), @RequiredSnapshots
    INT

    AS

    BEGIN

    DECLARE @SQL NVARCHAR(MAX)

    DECLARE @SQLStart NVARCHAR(MAX)

    DECLARE @SQLEnd NVARCHAR(MAX)

    DECLARE @SQLFileList NVARCHAR(MAX)

    DECLARE @DBID INT

    DECLARE @SS_Seq_No INT

    DECLARE @SQLDrop NVARCHAR(MAX)

    SET @DBID = (SELECT DB_ID(@DBName)) ;

    --Generate sequence number

    IF (SELECT COUNT(*) FROM sys.databases WHERE source_database_id = @DBID) > 0

    SET @SS_Seq_No = (SELECT TOP 1 CAST(SUBSTRING(name, LEN(Name), 1) AS INT)

    FROM sys.databases

    WHERE source_database_id = @DBID

    ORDER BY create_date DESC) + 1

    ELSE

    SET @SS_Seq_No = 1

    --Generate the first part of the CREATE DATABASE statement

    SET @SQLStart = ''CREATE DATABASE ''

    + QUOTENAME(@DBName + CAST(CAST(GETDATE() AS DATE) AS NCHAR(10))

    + ''_ss'' + CAST(@SS_Seq_No AS NVARCHAR(4))) + '' ON '' ;

    --Generate the file list for the CREATE DATABASE statement

    SELECT @SQLFileList =

    (

    SELECT

    ''(NAME = N'''''' + mf.name + '''''', FILENAME = N''''''

    + SUBSTRING(mf.physical_name, 1, LEN(mf.physical_name) - 4)

    + CAST(@SS_Seq_No AS NVARCHAR(4)) + ''.ss'' + ''''''),'' AS [data()]

    FROM  sys.master_files mf

    WHERE mf.database_id = @DBID

    AND mf.type = 0

    FOR XML PATH ('''')

    ) ;

    --Remove the extra comma from the end of the file list

    SET @SQLFileList = SUBSTRING(@SQLFileList, 1, LEN(@SQLFileList) - 2) ;

    --Generate the final part of the CREATE DATABASE statement

    SET @SQLEnd = '') AS SNAPSHOT OF '' + @DBName ;

    --Concatenate the strings and run the completed statement

    SET @SQL = @SQLStart + @SQLFileList + @SQLEnd ;

    EXEC(@SQL) ;

    --Check to see if the required number of snapshots exists for the database,

    --and if so, delete the oldest

    IF (SELECT COUNT(*)

    FROM sys.databases

    WHERE source_database_id = @DBID) > @RequiredSnapshots

    BEGIN

    SET @SQLDrop = ''DROP DATABASE '' + (

    SELECT TOP 1

    QUOTENAME(name)

    FROM sys.databases

    WHERE source_database_id = @DBID

    ORDER BY create_date ASC )

    EXEC(@SQLDrop)

    END ;

    END

    ```

    清单 17-21 动态循环数据库快照


    清单 17-22 中的命令针对 `Chapter17` 数据库运行 `DynamicSnapshot` 过程，指定在任何时间点应存在两个快照。


    ```sql

    EXEC dbo.DynamicSnapshot ''Chapter17'', 2 ;

    ```

    清单 17-22 运行 DynamicSnapshot 过程


    ### 仅重建碎片化的索引


    当你使用维护计划重建所有索引时（我们将在第 22 章讨论），SQL Server 并未提供开箱即用的智能逻辑。因此，无论索引碎片级别如何，所有索引都会被重建，这需要不必要的时间和资源消耗。解决此问题的一个变通方法是编写一个自定义脚本，仅在索引碎片化时才重建它们。


    清单 17-23 中的脚本演示了如何使用 `SQLCMD` 来识别碎片超过 25% 的索引，然后动态重建它们。将代码放在 `SQLCMD` 脚本中而不是存储过程中的原因是，`sys.dm_db_index_physical_stats`
    必须在你希望针对其运行的数据库内部调用。因此，当你通过 `SQLCMD` 运行它时，可以使用脚本变量来指定所需的数据库；这样做使脚本可重用于所有数据库。从命令行运行脚本时，可以简单地将数据库名称作为变量传入。


    ```sql

    USE $(DBName)

    GO

    DECLARE @SQL NVARCHAR(MAX)

    SET @SQL =

    (

    SELECT ''ALTER INDEX ''

    + i.name

    + '' ON '' + s.name

    + ''.''

    + OBJECT_NAME(i.object_id)

    + '' REBUILD ; ''

    FROM sys.dm_db_index_physical_stats(DB_ID(''$(DBName)''),NULL,NULL,NULL,''DETAILED'')
    ps

    INNER JOIN sys.indexes i

    ON ps.object_id = i.object_id

    AND ps.index_id = i.index_id

    INNER JOIN sys.objects o

    ON ps.object_id = o.object_id

    INNER JOIN sys.schemas s

    ON o.schema_id = s.schema_id

    WHERE index_level = 0

    AND avg_fragmentation_in_percent > 25

    FOR XML PATH('''')

    ) ;

    EXEC(@SQL) ;

    ```

    清单 17-23 仅重建所需的索引


    当此脚本以 `RebuildIndexes.sql` 为名保存在 `C:\` 根目录时，可以从命令行运行它。清单 17-24 中的命令演示了针对 `Chapter17`
    数据库运行它。


    ```cmd

    Sqlcmd -v DBName="Chapter17" -I c:\RebuildIndexes.sql -S ./PROSQLADMIN

    ```

    清单 17-24 运行 RebuildIndexes.sql

    '
- fmt: '## Summary


    SQL Server exposes a vast array of metadata, which describes the data structures
    within SQL Server as well as the data itself. Metadata is exposed through a series
    of catalog views, dynamic management views and functions, system functions, and
    the `INFORMATION_SCHEMA`. Normally you only use the `INFORMATION_SCHEMA` if you
    need your scripts to be transferable to other RDBMS products. This is because
    it provides less detail than SQL Server–specific metadata but conforms to ISO
    standards, and therefore, it works on all major RDBMS.


    This chapter also covered much useful information about the underlying operating
    system, as well as SQLOS. For example, you can use the `dm_server` category of
    DMV to find details of the instance’s Registry keys and expose details of the
    instance’s services. You can use the `dm_os` category of DMV to expose many internal
    details regarding the SQLOS, including the current contents of the buffer cache.


    SQL Server also exposes metadata that you can use for capacity planning, such
    as the usage statistics for all files within a database (e.g., IO stalls) and
    the amount of free space remaining. You can use this information to proactively
    plan additional capacity requirements before alerts start being triggered and
    applications are put at risk.


    Metadata can also help in the pursuit of troubleshooting and performance tuning.
    The `sys.dm_os_performance_counters` DMV allows DBAs to retrieve Perfmon counters,
    even if they do not have access to the operating system. This can remove inter-team
    dependencies. You can use `sys.dm_os_wait_stats` to identify the most common cause
    of waits within the instance, which can in turn help diagnose hardware bottlenecks,
    such as memory or CPU pressure. The `dm_exec` category of DMV can help identify
    expensive queries, which may be tuned, to improve performance.


    DBAs can also use metadata to create intelligent scripts, which can reduce their
    workload by adding business rules to common maintenance tasks. For example, a
    DBA can use metadata for tasks such as dynamically rebuilding only indexes that
    have become fragmented or dynamically managing the cycling of database snapshots.
    I encourage you to explore the possibilities of metadata-driven automation further;
    the possibilities are endless.


    # 18. Locking and Blocking


    Locking is an essential aspect of any RDBMS, because it allows concurrent users
    to access the same data, without the risk of their updates conflicting and causing
    data integrity issues. This chapter discusses how locking, deadlocks, and transactions
    work in SQL Server; it then moves on to discuss how transactions impact In-Memory
    transaction functionality and how the DBA can observe lock metadata regarding
    transactions and contention.


    ## Understanding Locking


    The following sections discuss how processes can take locks at various levels
    of granularity, which types of locks are compatible with others, and features
    for controlling lock behavior during online maintenance operations and lock partitioning,
    which can improve performance on large systems.


    ### Lock Granularity


    Processes can take out locks at many different levels of granularity, depending
    on the nature of the operation requesting the lock. To reduce the impact of operations
    blocking each other, it is sensible to take out a lock at the lowest possible
    level of granularity. The trade-off, however, is that taking out locks uses system
    resources, so if an operation requires acquiring millions of locks at the lowest
    level of granularity, then this is highly inefficient, and locking at a higher
    level is a more suitable choice. Table 18-1 describes the levels of granularity
    at which locks can be taken out.


    Table 18-1

    Locking Granularity


    | Level | Description |

    | --- | --- |

    | `RID/KEY` | A row identifier on a heap or an index key. Use locks on index keys
    in serializable transactions to lock ranges of rows. Serializable transactions
    are discussed later in this chapter. |

    | `PAGE` | A data or index page. |

    | `EXTENT` | Eight continuous pages. |

    | `HoBT (Heap or B-Tree)` | A heap of a single index (`B-tree`). |

    | `TABLE` | An entire table, including all indexes. |

    | `FILE` | A file within a database. |

    | `METADATA` | A metadata resource. |

    | `ALLOCATION_UNIT` | Tables are split into three allocation units: row data,
    row overflow data, and LOB (Large Object Block) data. A lock on an allocation
    unit locks one of the three allocation units of a table. |

    | `DATABASE` | The entire database. |


    When SQL Server locks a resource within a table, it takes out what is known as
    a `intent lock` on the resource directly above it in the hierarchy. For example,
    if SQL Server needs to lock a `RID` or `KEY`, it also takes out an intent lock
    on the page containing the row. If the Lock Manager decides that it is more efficient
    to lock at a higher level of the hierarchy, then it escalates the lock to a higher
    level. It is worth noting, however, that row locks are not escalated to page locks;
    they are escalated directly to table locks. If the table is partitioned, then
    SQL Server can lock the partition as opposed to the whole table. The thresholds
    that SQL Server uses for lock escalation are as follows:


    *   An operation requires more than 5000 locks on a table, or a partition, if
    the table is partitioned.

    *   The number of locks acquired within the instance causes memory thresholds
    to be exceeded.


    You can change this behavior for specific tables, however, by using the `LOCK_ESCALATION`
    option of a table. This option has three possible values, as described in Table
    18-2.


    Table 18-2

    LOCK_ESCALATION Values


    | Value | Description |

    | --- | --- |

    | `TABLE` | Locks escalate to the table level, even when you are using partitioned
    tables. |

    | `AUTO` | This value allows locks to escalate to a partition, rather than the
    table, on partitioned tables. |

    | `DISABLE` | The value disables locks being escalated to the table level except
    when a table lock is required to protect data integrity. |


    ### Locking Behaviors for Online Maintenance


    In SQL Server, you can also control the behavior of locking for online index rebuilds
    and partition `SWITCH` operations. The available options are described in Table
    18-3.


    Table 18-3

    Blocking Behaviors


    | Option | Description |

    | --- | --- |

    | `MAX_DURATION` | The duration, specified in minutes, that an online index rebuild
    or `SWITCH` operation waits before the `ABORT_AFTER_WAIT` action is triggered.
    |

    | `ABORT_AFTER_WAIT` | These are the available actions:• `NONE` specifies that
    the operation will continue to wait, with normal priority.• `SELF` means that
    the operation will be terminated.• `BLOCKERS` means that all user transactions
    that are currently blocking the operation will be killed. |

    | `WAIT_AT_LOW_PRIORITY` | Functionally equivalent to `MAX_DURATION = 0, ABORT_AFTER_WAIT
    = NONE`. |


    The script in Listing 18-1 creates the `Chapter18` database, which includes a
    table called `Customers` that is populated with data. The script then demonstrates
    configuring `LOCK_ESCALATION` before rebuilding the nonclustered index on `dbo.customers`,
    specifying that any operations should be killed if they are blocking the rebuild
    for more than 1 minute.'
