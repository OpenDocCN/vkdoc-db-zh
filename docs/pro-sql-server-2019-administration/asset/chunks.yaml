- fmt: '### T-SQL Configuration


    要通过T-SQL配置日志传送，我们需要运行一系列系统存储过程。第一个过程是`sp_add_log_shipping_primary_database`，用于配置备份作业并监控主数据库。该过程使用的参数描述见表[15-1](#333037_2_En_15_Chapter.xhtml#Tab1)。


    表 15-1


    `sp_add_log_shipping_primary_database`参数


    | 参数 | 描述 |

    | --- | --- |

    | `@database` | 要为其配置日志传送的数据库名称。 |

    | `@backup_directory` | 备份文件夹的本地路径。 |

    | `@backup_share` | 备份文件夹的网络路径。 |

    | `@backup_job_name` | 用于日志备份作业的名称。 |

    | `@backup_retention_period` | 日志备份应保留的时长，以分钟为单位。 |

    | `@monitor_server` | 监控服务器的服务器\实例名。 |

    | `@monitor_server_Security_mode` | 连接到监控服务器时使用的身份验证模式。`0` 表示SQL身份验证，`1` 表示Windows身份验证。
    |

    | `@monitor_server_login` | 用于连接到监控服务器的账户（仅在使用SQL身份验证时指定）。 |

    | `@monitor_server_password` | 用于连接到监控服务器的账户密码（仅在使用SQL身份验证时指定）。 |

    | `@backup_threshold` | 在触发警报之前，可以经过多长时间而没有进行日志备份。 |

    | `@threshold_alert` | 如果超过备份阈值将引发的警报。 |

    | `@threshold_alert_enabled` | 指定是否应触发警报。`0` 禁用警报，`1` 启用警报。 |

    | `@history_retention_period` | 日志备份作业历史记录将保留的时长，以分钟为单位。 |

    | `@backup_job_id` | 一个`OUTPUT`参数，指定过程创建的备份作业的GUID。 |

    | `@primary_id` | 一个`OUTPUT`参数，指定主数据库的ID。 |

    | `@backup_compression` | 指定是否应使用备份压缩。`0` 表示禁用，`1` 表示启用，`2` 表示使用实例的默认配置。 |


    列表[15-2](#333037_2_En_15_Chapter.xhtml#PC2)演示了如何使用`sp_add_log_shipping_primary_database`过程为`Chapter15`配置日志传送。此脚本使用`@backup_job_id
    output`参数将作业的GUID传递给`sp_update_job`存储过程。它还使用`sp_add_schedule`和`sp_attach_schedule`系统存储过程来创建作业计划并将其附加到作业。由于配置日志传送涉及连接到多个实例，我们添加了到主实例的连接。这意味着我们应该在SQLCMD模式下运行脚本。


    ### 注意


    `sp_update_job`、`sp_add_schedule`和`sp_attach_schedule`是用于操作SQL Server代理对象的系统存储过程。关于SQL
    Server代理的完整讨论可以在第[22](#333037_2_En_22_Chapter.xhtml)章找到。


    ```

    --注意：此脚本应在 sqlcmd 模式下运行

    :connect primaryserver\prosqladmin

    DECLARE @LS_BackupJobId         UNIQUEIDENTIFIER

    DECLARE @LS_BackUpScheduleID        INT

    --将 Chapter15 数据库配置为日志传送的主数据库

    EXEC master.dbo.sp_add_log_shipping_primary_database

    @database = N''Chapter15''

    ,@backup_directory = N''c:\logshippingprimary''

    ,@backup_share = N''\\primaryserver\logshippingprimary''

    ,@backup_job_name = N''LSBackup_Chapter15''

    ,@backup_retention_period = 2880

    ,@backup_compression = 2

    ,@monitor_server = N''monitorserver.prosqladmin.com\prosqlmonitor''

    ,@monitor_server_security_mode = 1

    ,@backup_threshold = 60

    ,@threshold_alert_enabled = 1

    ,@history_retention_period = 5760

    ,@backup_job_id = @LS_BackupJobId OUTPUT ;

    --为备份作业创建作业计划

    EXEC msdb.dbo.sp_add_schedule

    @schedule_name =N''LSBackupSchedule_primaryserver\prosqladmin1''

    ,@enabled = 1

    ,@freq_type = 4

    ,@freq_interval = 1

    ,@freq_subday_type = 4

    ,@freq_subday_interval = 5

    ,@freq_recurrence_factor = 0

    ,@active_start_date = 20190517

    ,@active_end_date = 99991231

    ,@active_start_time = 0

    ,@active_end_time = 235900

    ,@schedule_id = @LS_BackUpScheduleID OUTPUT ;

    --将作业计划附加到作业

    EXEC msdb.dbo.sp_attach_schedule

    @job_id = @LS_BackupJobId

    ,@schedule_id = @LS_BackUpScheduleID  ;

    --启用备份作业

    EXEC msdb.dbo.sp_update_job

    @job_id = @LS_BackupJobId

    ,@enabled = 1 ;

    Listing 15-2

    sp_add_log_shipping_primary_database

    ```


    我们使用`sp_add_log_shipping_primary_secondary`系统存储过程更新主服务器上的元数据，以便在日志传送拓扑中为每个辅助服务器添加一条记录。它接受的参数描述见表[15-2](#333037_2_En_15_Chapter.xhtml#Tab2)。


    表 15-2


    `sp_add_log_shipping_primary_secondary`参数


    | 参数 | 描述 |

    | --- | --- |

    | `@primary_database` | 主数据库的名称 |

    | `@secondary_server` | 辅助服务器的服务器\实例 |

    | `@secondary_database` | 辅助服务器上数据库的名称 |


    列表[15-3](#333037_2_En_15_Chapter.xhtml#PC3)演示了如何使用`sp_add_log_shipping_primary_secondary`过程将我们的`DRSERVER\PROSQLDR`实例记录添加到主服务器。同样，我们专门连接到主服务器，这意味着脚本应在SQLCMS模式下运行。


    ```

    :connect primaryserver\prosqladmin

    EXEC master.dbo.sp_add_log_shipping_primary_secondary

    @primary_database = N''Chapter15''

    ,@secondary_server = N''drserver\prosqldr''

    ,@secondary_database = N''Chapter15''

    Listing 15-3

    sp_add_log_shipping_primary_secondary

    ```


    我们现在需要配置我们的DR服务器。此过程中的第一个任务是运行`sp_add_log_shipping_secondary_primary`系统存储过程。此过程创建将事务日志复制到辅助服务器并还原它们的SQL
    Server代理作业。它还配置监控。此存储过程接受的参数详见表[15-3](#333037_2_En_15_Chapter.xhtml#Tab3)。


    表 15-3


    `sp_add_log_shipping_secondary_primary`参数'
  raw: '### T-SQL Configuration


    To configure log shipping through T-SQL, we need to run a number of system stored
    procedures. The first of these procedures is `sp_add_log_shipping_primary_database`,
    which we use to configure the backup job and monitor the primary database. The
    parameters used by this procedure are described in Table [15-1](#333037_2_En_15_Chapter.xhtml#Tab1).


    Table 15-1


    sp_add_log_shipping_primary_database Parameters


    | Parameter | Description |

    | --- | --- |

    | `@database` | The name of the database for which you are configuring log shipping.
    |

    | `@backup_directory` | The local path to the backup folder. |

    | `@backup_share` | The network path to the backup folder. |

    | `@backup_job_name` | The name to use for the job that backs up the log. |

    | `@backup_retention_period` | The duration that log backups should be kept for,
    specified in minutes. |

    | `@monitor_server` | The server\instance name of the monitor server. |

    | `@monitor_server_Security_mode` | The authentication mode to use to connect
    to the monitor server. `0` is SQL authentication and `1` is Windows authentication.
    |

    | `@monitor_server_login` | The account used to connect to the monitor server
    (only use if SQL authentication is specified). |

    | `@monitor_server_password` | The password of the account used to connect to
    the monitor server (only use if SQL authentication is specified). |

    | `@backup_threshold` | The amount of time that can elapse, without a log backup
    being taken, before an alert is triggered. |

    | `@threshold_alert` | The alert to be raised if the backup threshold is exceeded.
    |

    | `@threshold_alert_enabled` | Specifies if an alert should be fired. `0` disables
    the alert, `1` enables it. |

    | `@history_retention_period` | The duration for which the log backup job history
    will be retained, specified in minutes. |

    | `@backup_job_id` | An `OUTPUT` parameter that specifies the GUID of the backup
    job that is created by the procedure. |

    | `@primary_id` | An `OUTPUT` parameter that specifies the ID of the primary database.
    |

    | `@backup_compression` | Specifies if backup compression should be used. `0`
    means disabled, 1 means enabled, and 2 means use the instance''s default configuration.
    |


    Listing [15-2](#333037_2_En_15_Chapter.xhtml#PC2) demonstrates how we can use
    the `sp_add_log_shipping_primary_database` procedure to configure `Chapter15`
    for log shipping. This script uses the `@backup_job_id output` parameter to pass
    the job’s GUID into the `sp_update_job` stored procedure. It also uses the `sp_add_schedule`
    and `sp_attach_schedule` system stored procedures to create the job schedule and
    attach it to the job. Because configuring log shipping involves connecting to
    multiple instances, we have added a connection to the primary instance. This means
    that we should run the script in SQLCMD mode.


    ### Note


    `sp_update_job`, `sp_add_schedule`, and `sp_attach_schedule` are system stored
    procedures used to manipulate SQL Server Agent objects. A full discussion of SQL
    Server Agent can be found in Chapter [22](#333037_2_En_22_Chapter.xhtml).


    ```

    --Note that this script should be run in sqlcmd mode

    :connect primaryserver\prosqladmin

    DECLARE @LS_BackupJobId         UNIQUEIDENTIFIER

    DECLARE @LS_BackUpScheduleID        INT

    --Configure Chapter15 database as the Primary for Log Shipping

    EXEC master.dbo.sp_add_log_shipping_primary_database

    @database = N''Chapter15''

    ,@backup_directory = N''c:\logshippingprimary''

    ,@backup_share = N''\\primaryserver\logshippingprimary''

    ,@backup_job_name = N''LSBackup_Chapter15''

    ,@backup_retention_period = 2880

    ,@backup_compression = 2

    ,@monitor_server = N''monitorserver.prosqladmin.com\prosqlmonitor''

    ,@monitor_server_security_mode = 1

    ,@backup_threshold = 60

    ,@threshold_alert_enabled = 1

    ,@history_retention_period = 5760

    ,@backup_job_id = @LS_BackupJobId OUTPUT ;

    --Create a job schedule for the backup job

