    ## Caution


    Because of the power and flexibility of the `ExecuteWql()` and `ExecuteSql()`
    functions, it is possible that they will be abused to create security holes. Therefore,
    make sure you carefully control who has permissions to create policies.


    ## Managing Policies


    Policies are installed on an instance of SQL Server, but you can export them to
    XML files, which in turn allows them to be ported to other servers or to central
    management servers so that they can be evaluated against multiple instances at
    the same time. The following sections discuss how to import and export policies,
    as well as how to use policies in conjunction with central management servers.
    We also discuss how to manage policies with PowerShell.


    ## Importing and Exporting Policies


    Policies can be exported to and imported from the file system, as XML files. To
    export our `DatabaseNameConvention` policy to the `default file location`, we
    select Export Policy from the context menu of the `DatabaseNameConvention` policy
    in Object Explorer, causing the Export Policy dialog box before to be invoked.
    Here, we can simply choose a name for the file and click Save, as shown in Figure
    [23-19](#333037_2_En_23_Chapter.xhtml#Fig19).


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig19_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig19_HTML.jpg)


    Figure 23-19 The Export Policy dialog box


    We now import the policy into our `SQLSERVER\TARGETSERVER1` instance. To do this,
    we connect to the `TARGETSERVER1` instance in Object Explorer and then drill through
    Management ➤ Policy-Based Management, before selecting Import Policy from the
    Policies context menu. This invokes the Import dialog box, as displayed in Figure
    [23-20](#333037_2_En_23_Chapter.xhtml#Fig20).


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig20_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig20_HTML.jpg)


    Figure 23-20 The Import dialog box


    In this dialog box, we use the Files To Import ellipses button to select our `DatabaseNameConvention`
    policy. We can also choose the state of the policy after it is imported from the
    Policy State drop-down and specify whether policies that already exist on the
    instance with the same name should be overwritten.


    ## Enterprise Management with Policies


    Although being able to evaluate a policy against a single instance of SQL Server
    is useful, to maximize the power of PBM, you can combine policies with central
    management servers so that the policy can be evaluated against the SQL Server
    Enterprise in a single execution.


    For example, imagine that we want to evaluate the `DatabaseNameConvention` policy
    against all servers within the Prod group that we created when we registered the
    `SQLSERVER\MASTERSERVER` instance as a central management server. To do this,
    we drill through Central Management Servers ➤ `SQLSERVER\MASTERSERVER` in the
    Registered Servers window before we select Evaluate Policies from the Prod context
    menu.


    This invokes the Evaluate Policies dialog box. Here, you can use the Source ellipses
    button to invoke the Select Source dialog box and choose the policy or policies
    that you would like to evaluate against the group, as shown in Figure [23-21](#333037_2_En_23_Chapter.xhtml#Fig21).


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig21_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig21_HTML.jpg)


    Figure 23-21 The Evaluate Policies dialog box


    In the Select Source dialog box, either select policies stored as XML files from
    the file system or specify the connection details of an instance where the policy
    is installed. In our case, we select the `DatabaseNameConvention` by clicking
    the Files ellipses button.


    Selected policies then display in the Policies section of the screen, as shown
    in Figure [23-22](#333037_2_En_23_Chapter.xhtml#Fig22). If you selected a source
    with multiple policies, you can use the check boxes to define which policies to
    evaluate. Clicking the Evaluate button causes the selected policies to be evaluated
    against all servers in the group.


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig22_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig22_HTML.jpg)


    Figure 23-22 The Evaluate Policies dialog box


    ## Evaluating Policies with PowerShell


    When policies are installed on an instance, they can be evaluated using the methods
    already described in this chapter. If your policies are stored as XML files, however,
    then you can still evaluate them using PowerShell. This can be helpful if your
    SQL Server enterprise includes SQL Server 2000 or 2005 instances, as many still
    do. Because PBM was only introduced in SQL Server 2008, policies cannot be imported
    into older instances, but PowerShell offers a useful workaround for this issue.


    To evaluate our `DatabaseNameConvention` policy against our `SQLSERVER\MASTERSERVER`
    instance, from the XML file using PowerShell, we need to run the script in Listing
    [23-11](#333037_2_En_23_Chapter.xhtml#PC11). The first line of this script changes
    the path to the folder where the policy is stored. The second line actually evaluates
    the policy.


    If the property we were configuring was settable and deterministic (which ours
    is not), then we could add the `-AdHocPolicyExecutionMode` parameter and set it
    to `"Configure"`. This would cause the setting to change to fall in line with
    our policy.


    ```powershell

    sl "C:\Users\Administrator\Documents\SQL Server Management Studio\Policies"

    Invoke-PolicyEvaluation -Policy "C:\Users\Administrator\Documents\SQL Server Management
    Studio\Policies\DatabaseNameConvention.xml" -TargetServerName ".\MASTERSERVER"

    ```


    Listing 23-11 Evaluating a Policy with PowerShell


    The output of this policy evaluation is shown in Figure [23-23](#333037_2_En_23_Chapter.xhtml#Fig23).


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig23_HTML.jpg](images/333037_2_En_23_Chapter/333037_2_En_23_Fig23_HTML.jpg)


    Figure 23-23 Results of policy evaluation


    ## Tip


    To evaluate multiple properties, provide a comma-separated list for the `-Policy`
    parameter.'
