  trans: '

    ### 生产环境就绪


    最后，你可能希望为脚本添加一些防御性编码，使其达到生产环境就绪状态。尽管`PowerShell`具备`try`/`catch`功能，但由于`setup.exe`是外部应用程序，它会生成自己的消息和错误，因此确保此脚本平稳运行的最有效技术是强制使用必填参数。


    清单 3-14 中的代码是脚本的修改版本，我们将其称为`SQLAutoInstall3.ps1`。此版本的脚本使用`Parameter`关键字为每个参数将`Mandatory`属性设置为`true`。这很重要，因为如果运行此脚本的人遗漏了任何参数，或者参数名称存在拼写错误，安装将会失败。这通过确保在允许脚本运行前已输入所有参数，提供了一种故障保护机制。我们在此脚本中所做的另一项更改是在每个步骤前后添加注释，这样如果脚本确实失败，我们可以轻松查看错误发生的位置。


    ```powershell

    param(

    [Parameter(Mandatory=$true)]

    [string] $InstanceName,

    [Parameter(Mandatory=$true)]

    [string] $SQLServiceAccount,

    [Parameter(Mandatory=$true)]

    [string] $SQLServiceAccountPassword,

    [Parameter(Mandatory=$true)]

    [string] $AgentServiceAccount,

    [Parameter(Mandatory=$true)]

    [string] $AgentServiceAccountPassword

    )

    # 初始化连接字符串变量

    $ServerName = $env:computername

    $ConnectionString = $ServerName + ''\'' + $InstanceName

    "初始化变量完成..."

    # 安装实例

    ./SETUP.EXE /INSTANCENAME=$InstanceName /SQLSVCACCOUNT=$SQLServiceAccount /SQLSVCPASSWORD=$SQLServiceAccountPassword
    /AGTSVCACCOUNT=$AgentServiceAccount /AGTSVCPASSWORD=$AgentServiceAccountPassword
    /CONFIGURATIONFILE="C:\SQL2019\Configuration2.ini"

    "实例安装完成..."

    # 配置操作系统设置

    powercfg -setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c

    "高性能电源计划配置完成..."

    Set-ItemProperty -path HKLM:\SYSTEM\CurrentControlSet\Control\PriorityControl
    -name Win32PrioritySeparation -Type DWORD -Value 24

    "后台服务优化配置完成..."

    # 运行冒烟测试

    Get-service -displayname *$InstanceName* -ErrorAction Stop

    "服务运行检查完成..."

    Invoke-sqlcmd -Serverinstance $ConnectionString -Query "SELECT @@SERVERNAME"

    "实例可访问性检查完成..."

    ```


    清单 3-14 带有防御性代码的自动安装脚本


    `SQLAutoInstall3.ps1`脚本已被运行，但未指定任何参数。在脚本的先前版本中，`PowerShell`会继续执行代码，然后`setup.exe`会因为未为所需参数指定值而失败。然而，在此版本中，你可以看到系统会依次提示你为每个参数输入一个值。


    运行脚本时，你会注意到在脚本执行的每个阶段之后，都会显示我们的注释。这可以帮助你响应错误，因为你甚至可以在开始解读可能显示的任何错误消息之前，轻松查看是哪个命令导致了问题。


    ## 总结


    在`Windows Server Core`上安装`SQL Server`可以简单到从`PowerShell`运行单个命令并传递适当的参数。然而，为了保持企业内的一致性并减少手动工作量，你可能希望自动化构建过程。你可以通过使用配置文件来实现这一点，但也可以将此过程扩展为完全自动化安装，包括操作系统配置。然后，你就能将`PowerShell`脚本置于变更控制之下，每次希望构建新实例时，只需运行它并传递参数即可。


    安装实例后，应运行冒烟测试以确保服务正在运行且实例可访问。这将突出显示任何阻碍性问题。如果你确实需要对构建进行故障排除，那么你的起点应是检查`summary.txt`日志文件，如果需要，再检查`detail.txt`日志文件。


    除了安装基础二进制文件外，你还可以使用`SQL Server`的产品更新功能同时安装最新的累积更新。产品更新可以配置为检查 Microsoft 更新、文件夹位置或网络文件夹。如果你将最新且经过充分测试的更新存储在网络共享上，那么就可以在网络中的任何实例安装时使用它，并且当你希望提高所支持的更新级别时，只需替换网络共享上的更新文件即可。


    # 4. 在异构操作系统上安装


    `SQL Server`的最后两个主要版本都非常注重提供在各种非传统环境中安装`SQL Server`的能力。在本章中，我们将探讨如何在`Linux`上安装`SQL
    Server`，以及如何构建和运行包含`SQL Server`的`Docker`镜像和容器。


    ### 提示


    在`Linux`上安装和配置`SQL Server`的命令因发行版而略有不同。本章重点关注`Ubuntu`，因为它可以说对基于`Windows`的`DBA`最友好，本章的目的是让你熟悉概念和流程。Microsoft
    为每个发行版提供了快速入门指南，网址为[`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup?view=sql-server-2019`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup?view=sql-server-2019)。


    ## 在 Linux 上安装 SQL Server


    表 4-1 详细列出了`SQL Server`支持的`Linux`发行版和版本。版本很重要，例如，在撰写本文时，`Ubuntu`的当前版本是 19.4.1。`SQL
    Server`支持版本 16.4。在我个人的测试中，`SQL Server`可以成功安装在`Ubuntu`19.4.1 上，但（在撰写本文时）`Pacemaker`和`PCS`服务无法安装在此版本上，这意味着无法在此版本的`Ubuntu`上为高可用性/灾难恢复配置`AlwaysOn
    可用性组`。


    表 4-1 支持的 Linux 发行版和版本


    | 发行版 | 支持的版本 |

    | --- | --- |

    | Red Hat Enterprise | 7.3–7.6 |

    | SUSE Enterprise Server | V12 SP2 |

    | Ubuntu | 16.4 |


    在以下各节中，我们将探讨如何在`Linux`上手动安装`SQL Server`以及如何创建无人参与安装。

    '
- fmt: '### Installing SQL Server Manually


    Unlike the installation of SQL Server on Windows, where you specify the way in
    which you would like your instance to be configured, prior to the installation,
    on Linux the reverse is true. You initially install a base version of SQL Server,
    and then configure the instance, post deployment. In this section, we will review
    the process of manually installing SQL Server on a Linux platform. For this demonstration,
    we will use Ubuntu 16.4.


    #### Importing Public GPG Keys


    The first step in installing SQL Server is to import the public gpg keys, which
    will give us access to the SQL Server repo (repository). This can be achieved
    using the `bash` command in Listing [4-1](#333037_2_En_4_Chapter.xhtml#PC1).


    ```

    wget -qO- https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add
    –

    Listing 4-1

    Import the Public GPG Key

    ```


    If we break this command down, we are using the `wget` command to pull the keys
    from Microsoft’s web site. `wget` is a command that is used to get web content.
    We then use the `|` operator to pass the key into the `apt-key` command, which
    is a key management tool. The `add` command adds the key to a list of trusted
    keys. Once the SQL Server package is authenticated using the trusted key, the
    package will become trusted. Using `sudo` is similar to the principle of Run As
    Administrator on a Windows platform. It is used to elevate the user’s permissions
    to that of `root` (which is the equivalent of the Windows administrator).


    #### Registering SQL Server Repository


    The next step is to register the SQL Server repository. This can be done using
    the `bash` command in Listing [4-2](#333037_2_En_4_Chapter.xhtml#PC2). This command
    uses the `add-apt-repository` script, to add an external repository. The embedded
    `wget` command pulls the package from Microsoft’s web site.


    ```

    sudo add-apt-repository "$(wget -qO- https://packages.microsoft.com/config/ubuntu/16.04/mssql-server-2019.list)"

    Listing 4-2

    Register the SQL Server Repository

    ```


    #### Updating Package Lists


    Next, we will use the `apt-get`, which is the Linux package manager, to pull a
    list of packages from the package repos and update these lists, with the most
    recent versions of the packages. Listing [4-3](#333037_2_En_4_Chapter.xhtml#PC3)
    demonstrates this.


    ```

    sudo apt-get update

    Listing 4-3

    Update Repo Package Lists

    ```


    #### Installing the SQL Server Package


    In Listing [4-4](#333037_2_En_4_Chapter.xhtml#PC4), we will use `apt-get` again,
    this time with the `install` command, to install the SQL Server package. The `-y`
    switch is used to provide automatic acceptance on user prompts.


    ```

    sudo apt-get install -y mssql-server

    Listing 4-4

    Install the SQL Server Package

    ```


    #### Configuring the Instance


    When package installation is complete, the output will prompt you to run `sudo
    /opt/mssql/bin/mssql-conf setup` which is the SQL Server configuration tool that
    will allow you to configure the instance. Running `mssql-conf setup` tool will
    be prompted to select the edition of SQL Server that you wish to use, as illustrated
    in Figure [4-1](#333037_2_En_4_Chapter.xhtml#Fig1). Use numbers 1 through to 8
    to make your selection.


    ![../images/333037_2_En_4_Chapter/333037_2_En_4_Fig1_HTML.jpg](images/333037_2_En_4_Chapter/333037_2_En_4_Fig1_HTML.jpg)

    Figure 4-1. Selecting the edition


    Next, you will be asked to accept the SQL Server license terms, as illustrated
    in Figure [4-2](#333037_2_En_4_Chapter.xhtml#Fig2). They can be accepted by typing
    `Yes`.


    ![../images/333037_2_En_4_Chapter/333037_2_En_4_Fig2_HTML.jpg](images/333037_2_En_4_Chapter/333037_2_En_4_Fig2_HTML.jpg)

    Figure 4-2. Accept license terms


    As illustrated in Figure [4-3](#333037_2_En_4_Chapter.xhtml#Fig3), you will next
    need to select your language, using numbers 1 through to 11.


    ![../images/333037_2_En_4_Chapter/333037_2_En_4_Fig3_HTML.jpg](images/333037_2_En_4_Chapter/333037_2_En_4_Fig3_HTML.jpg)

    Figure 4-3. Language selection


    **Tip**: The languages that have not rendered correctly in Figure [4-3](#333037_2_En_4_Chapter.xhtml#Fig3)
    are multicharacter languages, such as Chinese.


    You will now be prompted to enter and confirm the password for the `sa` account,
    as shown in Figure [4-4](#333037_2_En_4_Chapter.xhtml#Fig4).


    ![../images/333037_2_En_4_Chapter/333037_2_En_4_Fig4_HTML.jpg](images/333037_2_En_4_Chapter/333037_2_En_4_Fig4_HTML.jpg)

    Figure 4-4. Adding the `sa` password


    #### Connecting to the Instance


    Your instance is now configured and you can connect to it, either using `sqlcmd`
    (which is installed on the Linux server as part of the SQL Server Tools package—discussed
    in the “Unattended Installation” section of this chapter) or remotely, by using
    SSMS (SQL Server Management Studio).'
  raw: '### Installing SQL Server Manually


