    ### 创建警报


    创建警报允许您通过通知操作员、运行作业或两者兼而有之，来主动响应实例中发生的状况。在我们的实例上，我们希望在 `Chapter22` 日志文件使用率超过 75%
    时通知 DBATeam 操作员。


    要在 SQL Server Management Studio 中创建此警报，我们浏览对象资源管理器中的 **SQL Server 代理**，从“**警报**”上下文菜单中选择“**新建警报**”。这将显示“新建警报”对话框的“常规”页面。此页面如图
    22-26 所示。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig26_HTML.jpg](img/333037_2_En_22_Fig26_HTML.jpg)


    图 22-26

    常规页面


    在此对话框页面上，我们使用“**名称**”字段为警报指定名称，并从“**类型**”下拉列表中选择“**SQL Server 性能条件警报**”。这会导致页面内的选项动态更新。然后，我们从“**数据库**”对象中选择“**日志已用百分比**”计数器，并指定我们对该对象的
    `Chapter22` 实例感兴趣。（此计数器针对实例上的每个数据库都有一个实例。）最后，我们指定当此计数器的值在页面的“**警报条件**”部分上升到 75
    以上时应触发警报。


    在对话框的“**响应**”页面上（如图 22-27 所示），如果条件满足，我们选中“**通知操作员**”框，然后为我们的 DBATeam 操作员选择电子邮件通知。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig27_HTML.jpg](img/333037_2_En_22_Fig27_HTML.jpg)


    图 22-27

    响应页面


    在对话框的“**选项**”页面上，您可以指定是否应在通知中包含警报错误文本，以及要包含的附加信息。您还可以配置在响应被触发后发生延迟。这可以帮助您避免重复通知或不必要地运行作业来修复已经正在解决的问题。图
    22-28 显示我们在通知中包含了服务器\实例名称以帮助 DBA 识别警报来源。


