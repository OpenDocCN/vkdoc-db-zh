    \ Server 2019 的预发布版本中，必须全局启用跟踪标志 127 才能启用丰富计算。\n\n我们现在想要加密 `dbo.CreditCards` 表的\
    \ `CreditCardNumber`、`ExpMonth` 和 `ExpYear` 列，该表大致基于 `AdventureWorks` 数据库的 `Sales.CreditCard`\
    \ 表。\n\n在加密数据时，我们有两种方法可以选择：确定性或随机化。这是一个需要理解的重要决定，因为它可能对性能、安全性以及安全飞地可用的功能产生影响。\n\
