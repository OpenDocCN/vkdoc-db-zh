- fmt: '### TempDB


    TempDB is a workspace used by SQL Server when it needs to create temporary objects.
    This applies to temporary tables created by users, and less commonly known, it
    also applies to table variables. Table variables always cause an object to be
    created in TempDB, but data is only spooled to disk if it breaches size thresholds.
    There are also many internal reasons why SQL Server will require temporary objects
    to be created. Some of the key reasons are as follows:


    *   Sorting and spooling data

    *   Hashing data, such as for joins and aggregate grouping

    *   Online index operations

    *   Index operations where results are sorted in TempDB

    *   Triggers

    *   DBCC commands

    *   The `OUTPUT` clause of a DML statement

    *   Row versioning for snapshot isolation, read-committed snapshot isolation,
    queries over MARS, and so on


    Because TempDB is responsible for so many tasks, in high-volume instances, it
    is likely to have a very high throughput. For this reason, it is the system database
    that you should spend the most time configuring in order to ensure the best performance
    for your data-tier applications.


    The first thing you should consider is the size of TempDB. Ideally, TempDB will
    be subject to capacity planning for large or highly transactional instances. A
    full discussion of capacity planning is beyond the scope of this book, but ideally,
    this will involve using a test server to expand all of the user databases on the
    instance out to the size that they are expected to grow to, discovered through
    their own capacity planning exercises. You would then run representative workloads
    through those databases and monitor the usage of TempDB. Additionally, you should
    also perform administrative tasks against the databases that you have expanded
    to their expected size. Specifically, this would include activities such as rebuilding
    indexes so that you can examine the usage profile of TempDB during these activities.
    There are a number of `DMVs` (dynamic management views) that can help you with
    this planning. Some of the most useful are described in Table 5-6.


    Table 5-6: DMVs for TempDB Capacity Planning


    | DMV | Description |

    | --- | --- |

    | `sys.dm_db_session_space_usage` | Displays the number of pages allocated for
    each current session. This will include page counts for the following objects:•
    User and system tables• User and system indexes• Temporary tables• Temporary indexes•
    Table variables• Tables returned by functions• Internal objects for sorting and
    hashing operations• Internal objects for spools and large object operations |

    | `sys.dm_db_task_space_usage` | Displays the number of pages allocated by tasks.
    This will include page counts from the same object types as `sys.dm_db_session_space_usage`.
    |

    | `sys.dm_db_file_space_usage` | Displays full usage information for all files
    in the database, including page counts and extent counts. To return data for TempDB,
    you must query this `DMV` from the context of the TempDB database, since it can
    also return data from user databases. |

    | `sys.dm_tran_version_store` | Returns a row for every record within the version
    store. You can view this data raw or aggregate it to get size totals. |

    | `sys.dm_tran_active_snapshot_database_transactions` | Returns a row for every
    current transaction that may need to access the version store, due to isolation
    level, triggers, `MARS` (Multiple Active Result Sets), or online index operations.
    |


    #### Optimizing TempDB


    In addition to the size of TempDB, you should also carefully consider the number
    of files that you will require. This is important because due to the nature of
    many objects being very rapidly created and dropped, if you have too few files,
    then you can suffer contention of the `GAM` and `SGAM` pages. If you have too
    many files, on the other hand, you may experience increased overhead. This is
    because SQL Server allocates pages to each file within the filegroup in turn in
    order to maintain proportional fill. With a large number of files, there will
    be an extra synchronization effort to determine if the allocation weighting for
    each file should be altered.


    ### Tip


    Some SQL Server experts suggest that temp tables should not be explicitly dropped
    and should be cleaned up by the garbage collector thread. Personally, while I
    see the benefits of this, I feel it needs to be traded off against other considerations,
    such as code quality, especially in large, complex stored procedures.


    The current, general recommendation is that you should have one TempDB file for
    every core available to the instance, with a minimum of two files and a maximum
    of eight files. You should only add more than eight files if you specifically
    witness `GAM/SGAM` contention. This will manifest itself as `PAGELATCH` waits
    occurring against TempDB. You will find a discussion of how to add files and alter
    their size in Chapter 6.


    ### Tip


    `PAGEIOLATCH` waits indicate a different issue than `PAGELATCH` waits. If you
    see `PAGEIOLATCH` waits against TempDB, this indicates that the underlying storage
    is the bottleneck. Wait types will be discussed in more detail in Chapter 17.


    SQL Server 2019 introduces a new optimization for TempDB, called Memory-Optimized
    TempDB Metadata. As its name suggests, this feature stores the system tables that
    are responsible for managing TempDB metadata in non-durable memory-optimized tables.


    ### Tip


    Please see Chapter 7 for further details of memory-optimized tables.


    This is an important new feature, which increases the scalability of SQL Server,
    by removing the contention bottleneck, on TempDB system pages. It does not come
    without a cost, however, and before implementing the feature, you must be aware
    that a single transaction cannot access memory-optimized tables across multiple
    databases. This may cause issues if you have scripts which perform activities
    such as custom monitoring.


    For example, you may have a script which records the script in Listing 5-10. The
    first section of the script creates the `Chapter5` database. The `CaptureTempTableCount`
    procedure inserts a count of temp tables into a memory-optimized table. Imagine
    that this procedure is configured to run once a minute with SQL Server Agent (see
    Chapter 22). You then use the `TempTableCount` table in your ongoing capacity
    planning endeavors.


    ```sql

    --Create The Chapter5 Database

    CREATE DATABASE Chapter5

    GO

    USE Chapter5

    GO

    --Add a memory-optimized filegroup

    ALTER DATABASE Chapter5 ADD FILEGROUP memopt

    CONTAINS MEMORY_OPTIMIZED_DATA;

    ALTER DATABASE Chapter5 ADD FILE (

    name=''memopt1'', filename=''c:\data\memopt1''

    ) TO FILEGROUP memopt ;

    ALTER DATABASE Chapter5

    SET MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT = ON ;

    GO

    CREATE TABLE TempTableCount (

    ID                INT                IDENTITY(1,1)    NOT NULL   PRIMARY KEY NONCLUSTERED,

    TableCount   INT               NOT NULL,

    DateTime     DateTime2         NOT NULL

    ) WITH(MEMORY_OPTIMIZED=ON) ;

    GO

    CREATE PROCEDURE CaptureTempTableCount

    AS

    BEGIN

    BEGIN TRANSACTION

    INSERT INTO TempTableCount (TableCount, DateTime)

    SELECT COUNT(*) As TableCount, SYSDATETIME() AS DateTime

    FROM tempdb.sys.tables t

    WHERE type = ''U''

    COMMIT

    END

    GO

    --Listing 5-10

    --Using Memory-Optimized Tables with TempDB

    ```


    If you test this procedure, you will see that it works as expected. But now, let’s
    turn on Memory-Optimized TempDB Metadata, using the command in Listing 5-11.


    ```sql

    ALTER SERVER CONFIGURATION SET MEMORY_OPTIMIZED TEMPDB_METADATA = ON ;

    --Listing 5-11

    --Enable Memory-Optimized TempDB MetaData

    ```


    If you test the procedure again, you will notice that it now fails, because it
    is attempting to access memory-optimized tables in multiple databases. To work
    around this issue, you would need to use a disk-based table, rather than a memory-optimized
    table.'
