  trans: '

    #### 创建复杂的 SQL Server Agent 作业


    在以下章节中，我们将创建一个更复杂的 SQL Server Agent 作业，该作业用于备份 `Chapter22` 数据库。然后，该作业将检查 `SQL
    Server Browser` 服务是否正在运行。我们使用 `Run As` 来设置 T-SQL 作业步骤运行的上下文，并使用代理来运行 `PowerShell`
    作业步骤。我们还将配置 `Database Mail`，以便可以在作业成功或失败时通知操作员，并将作业设置为定期运行。您还可以了解如何使用 T-SQL 创建
    `SQL Server Agent` 对象，这在您于 `Server Core` 环境中工作时可能很有用。


    ##### 创建凭据


    现在我们的环境已准备就绪，我们创建一个 `SQL Server Agent` 作业，该作业首先备份 `Chapter22` 数据库。然后，该作业将检查以确保
    `SQL Server Browser` 服务正在运行。检查浏览器服务是否正在运行是一种有用的做法，因为如果它停止，那么应用程序只有在其连接字符串中指定实例的端口号才能连接到该实例。我们在
    `SQL User` 的上下文下将备份作为 T-SQL 命令运行，并使用 `WinUser` 帐户通过 `PowerShell` 检查浏览器服务是否正在运行。因此，我们的第一步是创建一个使用
    `WinUser` 帐户的凭据。我们可以在 `SQL Server Management Studio` 中通过浏览到 `Security` 并从 `Credentials`
    上下文菜单中选择 `New Credential` 来实现这一点。这将调用 `New Credential` 对话框，如图 22-7 所示。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig7_HTML.jpg](img/333037_2_En_22_Fig7_HTML.jpg)

    图 22-7：新建凭据对话框


    在此对话框中，使用 `Credential Name` 字段指定新凭据的名称。在 `Identity` 字段中，指定您希望使用的 Windows 安全主体的名称，然后在
    `Password` 和 `Confirm Password` 字段中输入 Windows 密码。您还可以将凭据链接到 `EKM` 提供程序。如果您希望这样做，请勾选
    `Use Encryption Provider` 并从下拉列表中选择您的提供程序。`EKM` 将在第 11 章中进一步讨论。


    ##### 创建代理


    接下来，让我们创建一个使用此凭据的 `SQL Server Agent` 代理帐户。我们配置此代理帐户能够运行 `PowerShell` 作业步骤。我们可以通过
    `SSMS` 浏览到 `Object Explorer` 中的 `SQL Server Agent`，然后从 `Proxies` 上下文菜单中选择 `New
    Proxy` 来实现这一点。这将显示 `New Proxy Account` 对话框的 `General` 页面，如图 22-8 所示。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig8_HTML.jpg](img/333037_2_En_22_Fig8_HTML.jpg)

    图 22-8：新建代理帐户对话框


    在此页面上，我们为代理帐户指定一个名称并提供描述。我们使用 `Credential Name` 字段选择我们的 `WinUserCredential` 凭据，然后使用
    `Active To The Following Subsystems` 部分授权该代理运行 `PowerShell` 作业步骤。


    ### 提示


    如果您从 `Object Explorer` 的 `Proxies` 节点下相关子系统的节点进入新的代理帐户，则对话框内会自动选择相关的子系统。


    在 `Principals` 页面上，我们可以添加有权使用该代理的登录名或服务器角色。在我们的案例中，这不是必需的，因为我们使用管理员帐户运行 `SQL Server`，而管理员自动拥有代理帐户的权限。


    ##### 创建计划


    现在我们的代理帐户已配置完毕，我们创建作业要使用的计划。我们需要维护作业在每晚运行，因此我们将计划配置为每天凌晨 1 点运行。要从 `SSMS` 调用 `New
    Job Schedule` 对话框，我们在 `Object Explorer` 中从 `SQL Server Agent` 上下文菜单中选择 `New` >
    `Schedule`。此对话框如图 22-9 所示。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig9_HTML.jpg](img/333037_2_En_22_Fig9_HTML.jpg)

    图 22-9：新建作业计划对话框


    在此对话框中，我们在 `Name` 字段中指定计划的名称，并在 `Schedule Type` 字段中选择计划的条件。选择 `Recurring` 以外的任何条件将导致
    `Frequency` 和 `Duration` 部分变为不可用。选择 `One Time` 以外的任何条件将导致 `One-Time Occurrence`
    部分变为不可用。我们还确保勾选 `Enabled` 框，以便可以使用该计划。


    在 `Frequency` 部分，我们在 `Occurs` 下拉列表中选择 `Daily`。我们在此字段中的选择会导致 `Frequency` 和 `Daily
    Frequency` 部分中的选项根据我们的选择动态更改。由于我们希望计划每天凌晨 1 点运行，因此我们确保在 `Recurs Every` 字段中指定 `1`，并将
    `Occurs Once At` 字段更改为 `1 AM`。因为我们希望作业立即开始运行且永不过期，所以我们不需要编辑 `Duration` 部分中的字段。


    ##### 配置数据库邮件


    我们希望如果作业失败，能通知到我们的 DBA 邮件列表。因此，我们需要创建一个操作员。然而，在此之前，我们需要在实例上配置 `Database Mail`，以便可以发送通知。我们的第一步是启用
    `Database Mail` 扩展存储过程，这些过程默认是禁用的，以减少攻击面。我们可以使用 `sp_configure` 来激活它们，如清单 22-4
    所示。

    '
- fmt: '### Note


    If you do not have access to an SMTP Replay server, then the examples in this
    section will still work, but you will not receive e-mail.


    ```sql

    EXEC sp_configure ''show advanced options'', 1 ;

    GO

    RECONFIGURE

    GO

    EXEC sp_configure ''Database Mail XPs'', 1 ;

    GO

    RECONFIGURE

    GO

    Listing 22-4

    Enabling Database Mail XPs

    ```


    We can now launch the Database Mail Configuration Wizard by drilling through Management
    in Object Explorer and selecting Database Mail. After passing through the Welcome
    page, we see the Select Configuration Task page shown in Figure [22-10](#333037_2_En_22_Chapter.xhtml#Fig10).


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig10_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig10_HTML.jpg)


    Figure 22-10 The Select Configuration Task page


    On this page, we should ensure that the `Set Up Database Mail By Performing The
    Following Tasks` option is selected. On the New Profile page, we specify a name
    for our profile. A profile is an alias for one or more mail accounts, which are
    used to send the notification to the operator. It is good practice to add multiple
    accounts to a profile; that way, if one account fails, you can use a different
    one. This page is illustrated in Figure [22-11](#333037_2_En_22_Chapter.xhtml#Fig11).


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig11_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig11_HTML.jpg)


    Figure 22-11 The New Profile page


    Let’s now use the Add button to add one or more SMTP (Simple Mail Transfer Protocol)
    email accounts to the profile via the New Database Mail Account dialog box, shown
    in Figure [22-12](#333037_2_En_22_Chapter.xhtml#Fig12).


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig12_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig12_HTML.jpg)


    Figure 22-12 The New Database Mail Account dialog box


    In this dialog box, we specify a name for the account and, optionally, a description.
    We then need to specify the email address that we will use to send mails, along
    with the name and port of the SMTP server that will deliver the messages. You
    can also specify a display name for when the e-mails are received. For DBAs who
    receive the notification, it helps if the display name includes the `server\instance`
    from which the notification was generated. We have selected Anonymous authentication.
    This implies that access to the SMTP server is controlled with firewall rules,
    as opposed to authentication. This is a relatively common approach in enterprise
    environments.


    After adding the account, we can move to the Manage Profile Security page of the
    wizard. This page has two tabs: Public Profiles and Private Profiles. We configure
    our profile as public and also mark it as the default profile. Making the profile
    public means that any user with access to the MSDB database can send e-mail from
    that profile. If we make the profile private, then we need to specify a list of
    users or roles who may use the profile for sending e-mail. Marking the profile
    as default makes the profile default for the user or role. Each user or role can
    have one default profile. The Public Profiles tab is displayed in Figure [22-13](#333037_2_En_22_Chapter.xhtml#Fig13).


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig13_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig13_HTML.jpg)


    Figure 22-13 The Public Profiles tab


    On the Configure System Parameters page of the wizard, illustrated in Figure [22-14](#333037_2_En_22_Chapter.xhtml#Fig14),
    you can alter the default system properties, which control how mail is handled.
    This includes specifying the number of times an account should be retried and
    the time lapse between retries. It also involves setting the maximum allowable
    size of an e-mail and configuring a blacklist of extensions. The `Database Mail
    Executable Minimum Lifetime (Seconds)` setting configures how long the Database
    Mail process should remain active when there are no e-mails in the queue waiting
    to be sent. The logging level can be configured with the following settings:


    *   `Normal`: Logs errors

    *   `Extended`: Logs errors, warnings, and informational messages

    *   `Verbose`: Logs errors, warnings, informational messages, success messages,
    and internal messages


    ### Caution


    Unfortunately, attachment exclusions are implemented as a blacklist, as opposed
    to a whitelist. This means that to achieve the best balance of security and operational
    support, you should give time and thought to the file types that should be excluded.


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig14_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig14_HTML.jpg)


    Figure 22-14 The Configure System Parameters page


    On the Complete the Wizard page, you are provided with a summary of the tasks
    that will be performed. In our scenario, this includes creating a new account,
    creating a new profile, adding the account to the profile, and configuring the
    profile’s security.


    We now need to configure SQL Server Agent to use our mail profile. To do this,
    we select Properties from the SQL Server Agent context menu in Object Explorer
    to invoke the SQL Server Agent Properties dialog box and navigate to the Alert
    System page, shown in Figure [22-15](#333037_2_En_22_Chapter.xhtml#Fig15).


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig15_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig15_HTML.jpg)


    Figure 22-15 The Alert System page


    On this page, we check the Enable Mail Profile check box before selecting the
    `DBA-DL` profile from the drop-down list. After we exit the dialog box, operators
    are able to use Database Mail.


    ##### Creating the Operator


    Now that Database Mail has been configured, we need to create an operator that
    will receive e-mails in the event that our job fails. We can access the New Operator
    dialog box by drilling through SQL Server Agent in Object Explorer and by selecting
    New Operator from the Operators context menu. The General page of the New Operator
    dialog box is shown in Figure [22-16](#333037_2_En_22_Chapter.xhtml#Fig16).


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig16_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig16_HTML.jpg)


    Figure 22-16 The General page


    On this page, we specify a name for the operator and also add the e-mail address
    that the operator will be using. This must match the e-mail address that has been
    configured within Database Mail. The Notifications page displays details of the
    alerts and notifications that are already configured for the operator, so it is
    irrelevant to us at this point.'
  raw: '### Note


    If you do not have access to an SMTP Replay server, then the examples in this
    section will still work, but you will not receive e-mail.


    ```

    EXEC sp_configure ''show advanced options'', 1 ;

    GO

    RECONFIGURE

    GO

    EXEC sp_configure ''Database Mail XPs'', 1 ;

    GO

    RECONFIGURE

    GO

    Listing 22-4

    Enabling Database Mail XPs

    ```


    We can now launch the Database Mail Configuration Wizard by drilling through Management
    in Object Explorer and selecting Database Mail. After passing through the Welcome
    page, we see the Select Configuration Task page shown in Figure [22-10](#333037_2_En_22_Chapter.xhtml#Fig10).


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig10_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig10_HTML.jpg)


    Figure 22-10


    The Select Configuration Task page


    On this page, we should ensure that the `Set Up Database Mail By Performing The
    Following Tasks` option is selected. On the New Profile page, we specify a name
    for our profile. A profile is an alias for one or more mail accounts, which are
    used to send the notification to the operator. It is good practice to add multiple
    accounts to a profile; that way, if one account fails, you can use a different
    one. This page is illustrated in Figure [22-11](#333037_2_En_22_Chapter.xhtml#Fig11).


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig11_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig11_HTML.jpg)


    Figure 22-11


    The New Profile page


    Let’s now use the Add button to add one or more SMTP (Simple Mail Transfer Protocol)
    email accounts to the profile via the New Database Mail Account dialog box, shown
    in Figure [22-12](#333037_2_En_22_Chapter.xhtml#Fig12).


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig12_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig12_HTML.jpg)


    Figure 22-12


    The New Database Mail Account dialog box


    In this dialog box, we specify a name for the account and, optionally, a description.
    We then need to specify the email address that we will use to send mails, along
    with the name and port of the SMTP server that will deliver the messages. You
    can also specify a display name for when the e-mails are received. For DBAs who
    receive the notification, it helps if the display name includes the server\instance
    from which the notification was generated. We have selected Anonymous authentication.
    This implies that access to the SMTP server is controlled with firewall rules,
    as opposed to authentication. This is a relatively common approach in enterprise
    environments.


    After adding the account, we can move to the Manage Profile Security page of the
    wizard. This page has two tabs: Public Profiles and Private Profiles. We configure
    our profile as public and also mark it as the default profile. Making the profile
    public means that any user with access to the MSDB database can send e-mail from
    that profile. If we make the profile private, then we need to specify a list of
    users or roles who may use the profile for sending e-mail. Marking the profile
    as default makes the profile default for the user or role. Each user or role can
    have one default profile. The Public Profiles tab is displayed in Figure [22-13](#333037_2_En_22_Chapter.xhtml#Fig13).


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig13_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig13_HTML.jpg)


    Figure 22-13


    The Public Profiles tab


    On the Configure System Parameters page of the wizard, illustrated in Figure [22-14](#333037_2_En_22_Chapter.xhtml#Fig14),
    you can alter the default system properties, which control how mail is handled.
    This includes specifying the number of times an account should be retried and
    the time lapse between retries. It also involves setting the maximum allowable
    size of an e-mail and configuring a blacklist of extensions. The Database Mail
    Executable Minimum Lifetime (Seconds) setting configures how long the Database
    Mail process should remain active when there are no e-mails in the queue waiting
    to be sent. The logging level can be configured with the following settings:


    *   **Normal**: Logs errors


    *   **Extended**: Logs errors, warnings, and informational messages


    *   **Verbose**: Logs errors, warnings, informational messages, success messages,
    and internal messages


    ### Caution


    Unfortunately, attachment exclusions are implemented as a blacklist, as opposed
    to a whitelist. This means that to achieve the best balance of security and operational
    support, you should give time and thought to the file types that should be excluded.


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig14_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig14_HTML.jpg)


    Figure 22-14


    The Configure System Parameters page


    On the Complete the Wizard page, you are provided with a summary of the tasks
    that will be performed. In our scenario, this includes creating a new account,
    creating a new profile, adding the account to the profile, and configuring the
    profile’s security.


    We now need to configure SQL Server Agent to use our mail profile. To do this,
    we select Properties from the SQL Server Agent context menu in Object Explorer
    to invoke the SQL Server Agent Properties dialog box and navigate to the Alert
    System page, shown in Figure [22-15](#333037_2_En_22_Chapter.xhtml#Fig15).


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig15_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig15_HTML.jpg)


    Figure 22-15


    The Alert System page


    On this page, we check the Enable Mail Profile check box before selecting the
    DBA-DL profile from the drop-down list. After we exit the dialog box, operators
    are able to use Database Mail.


    ##### Creating the Operator


    Now that Database Mail has been configured, we need to create an operator that
    will receive e-mails in the event that our job fails. We can access the New Operator
    dialog box by drilling through SQL Server Agent in Object Explorer and by selecting
    New Operator from the Operators context menu. The General page of the New Operator
    dialog box is shown in Figure [22-16](#333037_2_En_22_Chapter.xhtml#Fig16).


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig16_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig16_HTML.jpg)


    Figure 22-16


    The General page


    On this page, we specify a name for the operator and also add the e-mail address
    that the operator will be using. This must match the e-mail address that has been
    configured within Database Mail. The Notifications page displays details of the
    alerts and notifications that are already configured for the operator, so it is
    irrelevant to us at this point.'
  trans: '### 注意


    如果您没有访问 SMTP 中继服务器的权限，那么本节中的示例仍然有效，但您将不会收到电子邮件。


    ```sql

    EXEC sp_configure ''show advanced options'', 1 ;

    GO

    RECONFIGURE

    GO

    EXEC sp_configure ''Database Mail XPs'', 1 ;

    GO

    RECONFIGURE

    GO

    清单 22-4

    启用 Database Mail XPs

    ```


    现在，我们可以通过在对象资源管理器中浏览到“管理”，然后选择“Database Mail”来启动“数据库邮件配置向导”。在通过欢迎页面后，我们将看到如图 22-10
    所示的“选择配置任务”页面。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig10_HTML.jpg](img/333037_2_En_22_Fig10_HTML.jpg)


    图 22-10 “选择配置任务”页面


    在此页面上，我们应确保选中了 `通过执行以下任务设置数据库邮件` 选项。在“新建配置文件”页面上，我们指定配置文件的名称。配置文件是一个或多个邮件帐户的别名，用于向操作员发送通知。最佳实践是向一个配置文件添加多个帐户；这样，如果一个帐户失败，您可以使用另一个。此页面如图
    22-11 所示。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig11_HTML.jpg](img/333037_2_En_22_Fig11_HTML.jpg)


    图 22-11 “新建配置文件”页面


    现在，让我们使用“添加”按钮，通过如图 22-12 所示的“新建数据库邮件帐户”对话框，向配置文件中添加一个或多个 SMTP（简单邮件传输协议）电子邮件帐户。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig12_HTML.jpg](img/333037_2_En_22_Fig12_HTML.jpg)


    图 22-12 “新建数据库邮件帐户”对话框


    在此对话框中，我们指定帐户的名称和可选的描述。然后，我们需要指定用于发送邮件的电子邮件地址，以及将传递邮件的 SMTP 服务器的名称和端口。您还可以指定接收电子邮件时显示的显示名称。对于接收通知的
    DBA 来说，如果显示名称包含生成通知的 `服务器\实例`，将会很有帮助。我们选择了匿名身份验证。这意味着对 SMTP 服务器的访问是通过防火墙规则控制的，而不是通过身份验证。这在企业环境中是相对常见的方法。


    添加帐户后，我们可以转到向导的“管理配置文件安全性”页面。此页面有两个选项卡：“公共配置文件”和“专用配置文件”。我们将配置文件配置为公共的，并将其标记为默认配置文件。将配置文件公开意味着任何有权访问
    MSDB 数据库的用户都可以使用该配置文件发送电子邮件。如果我们将配置文件设为专用，则需要指定可以使用该配置文件发送电子邮件的用户或角色列表。将配置文件标记为默认配置文件会将该配置文件设为该用户或角色的默认配置文件。每个用户或角色可以有一个默认配置文件。“公共配置文件”选项卡如图
    22-13 所示。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig13_HTML.jpg](img/333037_2_En_22_Fig13_HTML.jpg)


    图 22-13 “公共配置文件”选项卡


    在向导的“配置系统参数”页面上，如图 22-14 所示，您可以更改默认系统属性，这些属性控制邮件的处理方式。这包括指定帐户应重试的次数以及重试之间的时间间隔。它还涉及设置电子邮件的最大允许大小以及配置文件扩展名黑名单。`数据库邮件可执行文件最短生存期（秒）`
    设置配置当队列中没有等待发送的电子邮件时，数据库邮件进程应保持活动状态的时间。可以使用以下设置配置日志记录级别：


    *   `常规`：记录错误

    *   `扩展`：记录错误、警告和信息性消息

    *   `详细`：记录错误、警告、信息性消息、成功消息和内部消息


    ### 注意


    遗憾的是，附件排除是作为黑名单实现的，而不是白名单。这意味着，为了实现安全性和操作支持的最佳平衡，您应该花时间并认真考虑应排除的文件类型。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig14_HTML.jpg](img/333037_2_En_22_Fig14_HTML.jpg)


    图 22-14 “配置系统参数”页面


    在“完成向导”页面上，系统会提供将要执行的任务摘要。在我们的场景中，这包括创建新帐户、创建新配置文件、将帐户添加到配置文件以及配置配置文件的安全性。


    我们现在需要配置 SQL Server 代理以使用我们的邮件配置文件。为此，我们在对象资源管理器中右键单击 SQL Server 代理的上下文菜单，选择“属性”以调用“SQL
    Server 代理属性”对话框，并导航到“警报系统”页面，如图 22-15 所示。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig15_HTML.jpg](img/333037_2_En_22_Fig15_HTML.jpg)


    图 22-15 “警报系统”页面


    在此页面上，我们选中“启用邮件配置文件”复选框，然后从下拉列表中选择 `DBA-DL` 配置文件。退出对话框后，操作员就可以使用数据库邮件了。


    ##### 创建操作员


    既然数据库邮件已配置好，我们需要创建一个操作员，以便在作业失败时接收电子邮件。我们可以通过在对象资源管理器中浏览到 SQL Server 代理，然后从“操作员”上下文菜单中选择“新建操作员”来访问“新建操作员”对话框。“新建操作员”对话框的“常规”页面如图
    22-16 所示。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig16_HTML.jpg](img/333037_2_En_22_Fig16_HTML.jpg)


    图 22-16 “常规”页面


    在此页面上，我们指定操作员的名称，并添加操作员将使用的电子邮件地址。这必须与在数据库邮件中配置的电子邮件地址匹配。“通知”页面显示已为操作员配置的警报和通知的详细信息，因此目前与我们无关。'
- fmt: '##### Creating the Job


    现在所有的先决条件都已就绪，我们可以创建 SQL Server Agent 作业了。我们可以在 SQL Server Management Studio 中通过依次展开对象资源管理器中的
    `SQL Server Agent`，然后从“作业”上下文菜单中选择“新建作业”来实现。这将打开“新建作业”对话框的“常规”页面，如图 [22-17](#333037_2_En_22_Chapter.xhtml#Fig17)
    所示。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig17_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig17_HTML.jpg)

    *图 22-17: 常规页面*


    在此页面上，我们使用“名称”字段为作业指定一个名称，并可选择性地在“描述”字段中添加描述。将作业添加到某个类别也是可选的；在我们的实例中，我们通过从下拉列表中选择，将作业添加到了“数据库维护”类别。我们还选中了“已启用”复选框，以便作业在创建后立即处于活动状态。


    我们还指定作业所有者将是 `sa`。这是一个有争议的话题，但我通常推荐采用这种方法，原因如下：作业所有权并不那么重要。无论谁拥有该作业，它的功能都是一样的。但是，如果所有者的账户被删除，那么作业将不再起作用。如果将
    `sa` 设置为所有者，则这种情况就不会发生。但是，如果您使用的是 Windows 身份验证模型（而非混合模式身份验证），那么使用 SQL Server Agent
    服务账户作为替代是合理的。这是因为，尽管您有可能更改服务账户并删除关联的登录名，但这比删除其他用户的登录名（例如 DBA 离职时删除其登录名）的可能性要小。


    在对话框的“步骤”页面上，我们使用“新建”按钮来添加我们的第一个步骤——备份 `Chapter22` 数据库。“新建作业步骤”对话框的“常规”页面如图 [22-18](#333037_2_En_22_Chapter.xhtml#Fig18)
    所示。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig18_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig18_HTML.jpg)

    *图 22-18: “新建作业步骤”对话框的常规页面*


    在此页面上，我们输入 `Backup` 作为作业步骤的名称，并在“命令”字段中键入 `BACKUP DATABASE` 命令。“类型”字段允许我们选择要使用的子系统，但它默认为
    `T-SQL`，因此我们不需要更改此项。清单 [22-5](#333037_2_En_22_Chapter.xhtml#PC5) 包含了备份脚本。


    ###### Tip

    务必要在将脚本添加到作业之前进行测试。


    ```

    BACKUP DATABASE Chapter22

    TO DISK =

    N''C:\Microsoft SQL Server\MSSQL15.PROSQLADMIN\MSSQL\Backup\Chapter22.bak''

    WITH NOINIT

    ,NAME = N''Chapter22-Full Database Backup''

    ,SKIP

    ,STATS = 10 ;

    ```

    *清单 22-5: 备份脚本*


    在如图 [22-19](#333037_2_En_22_Chapter.xhtml#Fig19) 所示的“高级”页面上，我们使用“成功时的操作”和“失败时的操作”下拉框来配置该步骤，使其无论步骤成功或失败，都转到下一步。我们这样做是因为我们的两个步骤是无关的。我们还配置该步骤在失败前重试三次，间隔为
    1 分钟。


    我们选中“在历史记录中包含步骤输出”复选框，以便将步骤输出包含在作业历史记录中（这样做有助于 DBA 排查任何问题），并配置该步骤以 `SQLUser` 用户身份运行。我们配置“以以下用户身份运行”选项是因为，如前所述，`T-SQL`
    类型的作业步骤使用 `EXECUTE AS` 技术（而不是代理账户）来实现安全性。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig19_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig19_HTML.jpg)

    *图 22-19: 高级页面*


    退出对话框后，我们需要再次使用“新建作业”对话框“步骤”页面上的“新建”按钮来添加我们的第二个作业步骤。这一次，在“常规”页面上，我们指定 `PowerShell`
    类型并输入用于检查 SQL Server Browser 服务状态的 PowerShell 脚本。我们还使用“运行身份”框指定该步骤在 `PowerShellProxy`
    代理的上下文中运行。如图 [22-20](#333037_2_En_22_Chapter.xhtml#Fig20) 所示。清单 [22-6](#333037_2_En_22_Chapter.xhtml#PC6)
    显示了我们使用的命令。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig20_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig20_HTML.jpg)

    *图 22-20: 常规页面*


    ```

    Get-Service | Where {$_.name -eq "SQLBrowser"}

    ```

    *清单 22-6: 检查 Browser 服务*


    在“高级”页面上，我们选择将步骤输出包含在作业历史记录中。我们可以将所有其他选项保留为其默认值。


    当我们返回到“新建作业”对话框的“步骤”页面时，我们会看到两个步骤按正确的顺序列出，如图 [22-21](#333037_2_En_22_Chapter.xhtml#Fig21)
    所示。但是，如果我们希望更改步骤的顺序，可以使用“移动步骤”部分中的上箭头和下箭头。我们还可以通过使用“起始步骤”下拉列表选择从后面的步骤开始作业来跳过前面的步骤。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig21_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig21_HTML.jpg)

    *图 22-21: 步骤页面*


    在向导的“计划”页面上，我们单击“选取”按钮；这样做将显示“为作业选取计划”对话框中现有的计划列表（参见图 [22-22](#333037_2_En_22_Chapter.xhtml#Fig22)）。我们使用此对话框来选择我们的维护计划。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig22_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig22_HTML.jpg)

    *图 22-22: “为作业选取计划”对话框*


    退出对话框后，计划将显示在“作业属性”对话框的“计划”页面上。


    您可以使用“警报”页面来为作业组织警报。这与我们当前的场景无关，但本章后面会讨论警报。


    在“通知”页面上，我们配置希望在作业失败时通过电子邮件收到通知的 `DBATeam` 操作员。我们通过选中“电子邮件”复选框并从下拉列表中选择我们的 `DBATeam`
    操作员来实现，如图 [22-23](#333037_2_En_22_Chapter.xhtml#Fig23) 所示。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig23_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig23_HTML.jpg)

    *图 22-23: 通知页面*


    您可以使用“目标”页面来配置多服务器作业，这与我们当前的场景无关，但我们将在本章后面讨论它们。


    ##### Monitoring and Managing Jobs


    尽管作业通常被安排为自动运行，但您仍然会遇到监控和维护需求，例如手动执行作业和查看作业历史记录。以下部分将讨论这些任务。'
  raw: '##### Creating the Job


    Now that all of the prerequisites are in place, we can create the SQL Server Agent
    job. We can achieve this in SQL Server Management Studio by drilling through SQL
    Server Agent in Object Explorer and choosing New Job from the Jobs context menu.
    This causes the General page of the New Job dialog box to display, as illustrated
    in Figure [22-17](#333037_2_En_22_Chapter.xhtml#Fig17).


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig17_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig17_HTML.jpg)


    Figure 22-17


    The General page


    On this page, we use the Name field to specify a name for our job and, optionally,
    add a description in the Description field. It’s also optional to add the job
    to a category; in our instance, we have added the job to the Database Maintenance
    category by selecting it from the drop-down list. We also check the Enabled box
    so that the job will be active as soon as it is created.


    We also specify that the job owner will be sa. This is a controversial topic,
    but I generally recommend this approach for the following reason: job ownership
    does not matter much. No matter who owns the job, it functions in the same way.
    If the owner’s account is dropped, however, then the job no longer functions.
    If you make sa the owner, then there is no chance of this situation occurring.
    If you are using the Windows authentication model as opposed to mixed-mode authentication,
    however, then it is reasonable to use the SQL Server Agent service account as
    an alternative. This is because, although it is possible that you will change
    the service account and drop the associated login, it is more unlikely than dropping
    other user’s logins, such as a DBA’s login, when he leaves the company.


    On the Steps page of the dialog box, we use the New button to add our first step—backing
    up the `Chapter22` database. The General page of the New Job Step dialog box is
    illustrated in Figure [22-18](#333037_2_En_22_Chapter.xhtml#Fig18).


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig18_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig18_HTML.jpg)


    Figure 22-18


    The General page of the New Job Step dialog box


    On this page, we enter Backup as the name of the job step and type the `BACKUP
    DATABASE` command in the Command field. The Type field allows us to select the
    subsystem to use, but it defaults to T-SQL, so we do not need to alter this. Listing
    [22-5](#333037_2_En_22_Chapter.xhtml#PC5) contains the backup script.


    ### Tip


    Make sure to always test scripts before you add them to your jobs.


    ```

    BACKUP DATABASE Chapter22

    TO DISK =

    N''C:\Microsoft SQL Server\MSSQL15.PROSQLADMIN\MSSQL\Backup\Chapter22.bak''

    WITH NOINIT

    ,NAME = N''Chapter22-Full Database Backup''

    ,SKIP

    ,STATS = 10 ;

    Listing 22-5

    Backup Script

    ```


    On the Advanced page of the dialog box, shown in Figure [22-19](#333037_2_En_22_Chapter.xhtml#Fig19),
    we use the On Success Action and On Failure Action drop-down boxes to configure
    the step so that it moves to the next step, regardless of whether the step succeeds
    or fails. We do this because our two steps are unrelated. We also configure the
    step to retry three times, at 1-minute intervals, before it fails.


    We check the Include Step Output In History box so that the step output is included
    in the job history (doing so helps DBAs troubleshoot any issues) and configure
    the step to run as the `SQLUser` user. We configure the Run as User option because,
    as previously discussed, job steps of the T-SQL type use `EXECUTE AS` technology,
    instead of a proxy account, to implement security.


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig19_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig19_HTML.jpg)


    Figure 22-19


    The Advanced page


    Once we exit the dialog box, we need to use the New button on the Steps page of
    the New Job dialog box again to add our second job step. This time, on the General
    page, we specify the PowerShell type and enter the PowerShell script that checks
    the status of the SQL Server Browser service. We also use the Run As box to specify
    that the step runs under the context of the PowerShellProxy proxy. This is demonstrated
    in Figure [22-20](#333037_2_En_22_Chapter.xhtml#Fig20). Listing [22-6](#333037_2_En_22_Chapter.xhtml#PC6)
    shows the command that we use.


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig20_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig20_HTML.jpg)


    Figure 22-20


    The General page


    ```

    Get-Service | Where {$_.name -eq "SQLBrowser"}

    Listing 22-6

    Checking Browser Service

    ```


    On the Advanced page, we choose to include the step output in the job history.
    We can leave all other options with their default values.


    When we return to the Steps page of the New Job dialog box, we see both of our
    steps listed in the correct order, as shown in Figure [22-21](#333037_2_En_22_Chapter.xhtml#Fig21).
    If we wish to change the order of the steps, however, we can use the up and down
    arrows in the Move Step section. We can also bypass early steps by selecting to
    start the job at a later step using the Start Step drop-down list.


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig21_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig21_HTML.jpg)


    Figure 22-21


    The Steps page


    On the Schedules page of the wizard, we click the Pick button; doing so displays
    a list of existing schedules in the Pick Schedule for Job dialog box (see Figure
    [22-22](#333037_2_En_22_Chapter.xhtml#Fig22)). We use this dialog box to select
    our maintenance schedule.


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig22_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig22_HTML.jpg)


    Figure 22-22


    The Pick Schedule for Job dialog box


    After we exit the dialog box, the Schedule displays on the Schedules page of the
    Job Properties dialog box.


    You can use the Alerts page to organize alerts for the job. This is not relevant
    to our scenario right now, but alerts are discussed later in the chapter.


    On the Notifications page, we configure the DBATeam operator we want notified
    by e-mail in the event that the job fails. We do this by checking the E-mail check
    box and selecting our DBATeam operator from the drop-down list, as shown in Figure
    [22-23](#333037_2_En_22_Chapter.xhtml#Fig23).


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig23_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig23_HTML.jpg)


    Figure 22-23


    The Notifications page


    You can use the Targets page to configure multiserver jobs, which are not relevant
    to our current scenario, but we do discuss them later in this chapter.


    ### Monitoring and Managing Jobs


    Although jobs are usually scheduled to run automatically, you still encounter
    monitoring and maintenance requirements, such as executing jobs manually and viewing
    job history. These tasks are discussed in the following sections.'
  trans: '##### 创建作业


    现在所有先决条件都已就绪，我们可以开始创建 SQL Server Agent 作业了。在 SQL Server Management Studio 中，我们可以通过依次展开对象资源管理器中的
    `SQL Server Agent`，然后从“作业”上下文菜单中选择“新建作业”来完成此操作。这将打开“新建作业”对话框的“常规”页面，如图 22-17 所示。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig17_HTML.jpg](img/333037_2_En_22_Fig17_HTML.jpg)

    *图 22-17: 常规页面*


    在此页面上，我们使用“名称”字段为作业指定一个名称，并可以选择在“描述”字段中添加说明。将作业归入某个类别也是可选的；在我们的示例中，我们通过从下拉列表中选择，将作业添加到了“数据库维护”类别。我们还选中了“已启用”复选框，以便作业在创建后立即处于活动状态。


    我们还指定作业所有者为 `sa`。这是一个有争议的话题，但我通常推荐这种方法，原因如下：作业所有权并不那么重要。无论谁拥有该作业，其功能都是相同的。但是，如果所有者的账户被删除，那么作业将不再运行。如果将
    `sa` 设置为所有者，则这种情况就不会发生。但是，如果您使用的是 Windows 身份验证模型（而非混合模式身份验证），那么使用 SQL Server Agent
    服务账户作为替代是合理的。这是因为，尽管您更改服务账户并删除关联登录名的可能性存在，但这比删除其他用户登录名的可能性（例如 DBA 离职时删除其登录名）要小。


    在对话框的“步骤”页面上，我们使用“新建”按钮来添加第一个步骤——备份 `Chapter22` 数据库。“新建作业步骤”对话框的“常规”页面如图 22-18
    所示。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig18_HTML.jpg](img/333037_2_En_22_Fig18_HTML.jpg)

    *图 22-18: “新建作业步骤”对话框的常规页面*


    在此页面上，我们输入 `Backup` 作为作业步骤的名称，并在“命令”字段中键入 `BACKUP DATABASE` 命令。“类型”字段允许我们选择要使用的子系统，但它默认为
    `T-SQL`，因此我们不需要更改此项。清单 22-5 包含了备份脚本。


    ###### 提示

    务必要在将脚本添加到作业之前对其进行测试。


    ```

    BACKUP DATABASE Chapter22

    TO DISK =

    N''C:\Microsoft SQL Server\MSSQL15.PROSQLADMIN\MSSQL\Backup\Chapter22.bak''

    WITH NOINIT

    ,NAME = N''Chapter22-Full Database Backup''

    ,SKIP

    ,STATS = 10 ;

    ```

    *清单 22-5: 备份脚本*


    在如图 22-19 所示的“高级”页面上，我们使用“成功时的操作”和“失败时的操作”下拉框来配置该步骤，使其无论成功或失败都转到下一步。我们这样做是因为我们的两个步骤是相互独立的。我们还配置该步骤在失败前重试三次，间隔为
    1 分钟。


    我们选中“在历史记录中包含步骤输出”复选框，以便将步骤输出包含在作业历史记录中（这有助于 DBA 排查任何问题），并配置该步骤以 `SQLUser` 用户身份运行。我们配置“以以下用户身份运行”选项是因为，如前所述，`T-SQL`
    类型的作业步骤使用 `EXECUTE AS` 技术（而不是代理账户）来实现安全性。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig19_HTML.jpg](img/333037_2_En_22_Fig19_HTML.jpg)

    *图 22-19: 高级页面*


    关闭对话框后，我们需要再次使用“新建作业”对话框“步骤”页面上的“新建”按钮来添加第二个作业步骤。这一次，在“常规”页面上，我们指定 `PowerShell`
    类型并输入用于检查 SQL Server Browser 服务状态的 PowerShell 脚本。我们还使用“运行身份”框指定该步骤在 `PowerShellProxy`
    代理的上下文中运行，如图 22-20 所示。清单 22-6 显示了我们使用的命令。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig20_HTML.jpg](img/333037_2_En_22_Fig20_HTML.jpg)

    *图 22-20: 常规页面*


    ```

    Get-Service | Where {$_.name -eq "SQLBrowser"}

    ```

    *清单 22-6: 检查 Browser 服务*


    在“高级”页面上，我们选择将步骤输出包含在作业历史记录中。我们可以将所有其他选项保留为其默认值。


    当我们返回到“新建作业”对话框的“步骤”页面时，会看到两个步骤按正确的顺序列出，如图 22-21 所示。但是，如果我们希望更改步骤的顺序，可以使用“移动步骤”部分中的上箭头和下箭头。我们还可以通过使用“起始步骤”下拉列表选择从后面的步骤开始作业来跳过前面的步骤。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig21_HTML.jpg](img/333037_2_En_22_Fig21_HTML.jpg)

    *图 22-21: 步骤页面*


    在向导的“计划”页面上，我们单击“选取”按钮；这将显示“为作业选取计划”对话框中现有的计划列表（参见图 22-22）。我们使用此对话框来选择我们的维护计划。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig22_HTML.jpg](img/333037_2_En_22_Fig22_HTML.jpg)

    *图 22-22: “为作业选取计划”对话框*


    关闭对话框后，计划将显示在“作业属性”对话框的“计划”页面上。


    您可以使用“警报”页面来为作业配置警报。这与我们当前的场景无关，但本章后面会讨论警报。


    在“通知”页面上，我们配置希望当作业失败时通过电子邮件收到通知的 `DBATeam` 操作员。我们通过选中“电子邮件”复选框并从下拉列表中选择我们的 `DBATeam`
    操作员来实现，如图 22-23 所示。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig23_HTML.jpg](img/333037_2_En_22_Fig23_HTML.jpg)

    *图 22-23: 通知页面*


    您可以使用“目标”页面来配置多服务器作业，这与我们当前的场景无关，但我们将在本章后面讨论它们。


    ##### 监控与管理作业


    尽管作业通常被安排为自动运行，但您仍然会遇到监控和维护需求，例如手动执行作业和查看作业历史记录。以下部分将讨论这些任务。'
- fmt: '### 执行作业


    即使作业被安排为自动运行，有时您也可能希望按需执行作业。例如，如果您有一个作业被安排为每晚运行，以对实例中的数据库进行完整备份，您可能希望在代码发布或软件升级之前手动执行它。


    在 SQL Server Management Studio 中，可以通过在对象资源管理器中浏览到 SQL Server 代理 ➤ 作业，然后从作业的上下文菜单中选择“开始作业”来手动执行作业；这样做会调用“开始作业”对话框。图
    [22-24](#333037_2_En_22_Chapter.xhtml#Fig24) 显示了 BackupAndCheckBrowser 作业的“开始作业”对话框。在此对话框中，您可以在使用“开始”按钮执行作业之前，选择要运行的作业的第一步。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig24_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig24_HTML.jpg)


    图 22-24

    开始作业对话框


    要使用 T-SQL 执行作业，您可以使用 `sp_start_job` 系统存储过程。此过程接受表 [22-2](#333037_2_En_22_Chapter.xhtml#Tab2)
    中详述的参数。


    表 22-2

    sp_start_job 参数


    | 参数 | 描述 |

    | --- | --- |

    | `@job_name` | 要执行的作业的名称。如果为 `NULL`，则必须指定 `@job_name` 参数。 |

    | `@job_id` | 要执行的作业的 ID。如果为 `NULL`，则必须指定 `@job_name` 参数。 |

    | `@server_name` | 用于多服务器作业。指定在其上运行作业的目标服务器。 |

    | `@step_name` | 开始执行的作业步骤的名称。 |


    要运行我们的 BackupAndCheckBrowser 作业，我们执行清单 [22-7](#333037_2_En_22_Chapter.xhtml#PC7)
    中的命令。一旦作业被执行，在它完成之前无法再次执行。


    ```

    EXEC sp_start_job @job_name=N''BackupAndCheckBrowser'' ;

    ```


    清单 22-7

    执行作业


    如果我们希望作业从后面的步骤开始执行，可以使用 `@step_name` 参数。例如，在我们的场景中，假设我们希望执行作业以检查 SQL Server Browser
    服务是否正在运行，但不希望数据库备份在之前发生。为此，我们执行清单 [22-8](#333037_2_En_22_Chapter.xhtml#PC8) 中的命令。


    ```

    EXEC sp_start_job @job_name=N''BackupAndCheckBrowser'', @step_name = ''CheckBrowser''
    ;

    ```


    清单 22-8

    从特定步骤开始作业


    ### 查看作业历史记录


    您可以通过在对象资源管理器中的 SQL Server 代理 ➤ 作业下，从作业上下文菜单中选择“查看历史记录”来查看特定作业的作业历史记录，或者通过打开“作业活动监视器”（您可以在对象资源管理器的
    SQL Server 代理节点下找到它）来查看所有作业的历史记录。图 [22-25](#333037_2_En_22_Chapter.xhtml#Fig25)
    显示了在我们的 BackupAndCheckBrowser 作业执行一次后，其作业历史记录的样子。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig25_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig25_HTML.jpg)


    图 22-25

    作业历史记录


    在这里，您可以看到我们浏览了“作业历史记录”以查看每个单独步骤的历史记录。突出显示第 2 步的进度条目后，我们可以看到 PowerShell 脚本的结果已写入步骤历史记录，并且它们显示
    SQL Server Browser 服务正如预期那样正在运行。


    ### 创建警报


    创建警报允许您通过通知操作员、运行作业或两者兼而有之，来主动响应实例中发生的状况。在我们的实例上，我们希望在 `Chapter22` 日志文件使用率超过 75%
    时通知 DBATeam 操作员。


    要在 SQL Server Management Studio 中创建此警报，我们浏览对象资源管理器中的 SQL Server 代理，从“警报”上下文菜单中选择“新建警报”。这将显示“新建警报”对话框的“常规”页面。此页面如图
    [22-26](#333037_2_En_22_Chapter.xhtml#Fig26) 所示。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig26_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig26_HTML.jpg)


    图 22-26

    常规页面


    在此对话框页面上，我们使用“名称”字段为警报指定名称，并从“类型”下拉列表中选择“SQL Server 性能条件警报”。这会导致页面内的选项动态更新。然后，我们从“数据库”对象中选择“日志已用百分比”计数器，并指定我们对该对象的
    `Chapter22` 实例感兴趣。（此计数器针对实例上的每个数据库都有一个实例。）最后，我们指定当此计数器的值在页面的“警报条件”部分上升到 75 以上时应触发警报。


    在对话框的“响应”页面上（如图 [22-27](#333037_2_En_22_Chapter.xhtml#Fig27) 所示），如果条件满足，我们选中“通知操作员”框，然后为我们的
    DBATeam 操作员选择电子邮件通知。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig27_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig27_HTML.jpg)


    图 22-27

    响应页面


    在对话框的“选项”页面上，您可以指定是否应在通知中包含警报错误文本，以及要包含的附加信息。您还可以配置在响应被触发后发生延迟。这可以帮助您避免重复通知或不必要地运行作业来修复已经正在解决的问题。图
    [22-28](#333037_2_En_22_Chapter.xhtml#Fig28) 显示我们在通知中包含了服务器\实例名称以帮助 DBA 识别警报来源。


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig28_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig28_HTML.jpg)


    图 22-28

    选项页面


    ### 多服务器作业


    使用多服务器管理可以极大地简化管理。在多服务器环境中，您可以将一个实例配置为主服务器 (MSX)，然后将其他服务器配置为目标服务器 (TSX)。然后，您可以在
    MSX 上创建一组维护作业，并配置它们在 TSX 上或 TSX 的子集上运行。


    #### 配置 MSX 和 TSX 服务器


    在创建多服务器作业之前，您必须首先准备环境。第一步是编辑 MSX 上的注册表，并将 `AllowDownloadedJobsToMatchProxyName
    REG_DWORD` 的值设置为 `1`，这允许作业匹配代理名称。您可以在注册表中 `Software\Microsoft\Microsoft SQL Server\[YOUR
    INSTANCE NAME]` 键下的 SQL Server 代理键中找到此值。您还需要确保 TSX 配置了代理账户，其名称与将在其上运行作业的 MSX 上的代理账户名称相同。


    我们还需要配置 TSX 在与 MSX 通信时如何加密数据。我们使用 TSX 的 `MsxEncryptChannelOptions` 注册表键来实现这一点。您可以在注册表中
    `Software\Microsoft\Microsoft SQL Server\[YOUR INSTANCE NAME]` 键下的 SQL Server
    代理键中找到此键。值为 `0` 表示不使用加密。`1` 表示使用加密，但不验证证书，`2` 表示使用完整的 SSL 加密和证书验证。在我们的环境中，由于所有实例都在同一台物理机上，我们禁用加密。


    因此，为了准备我们的 `SQLSERVER\MASTERSERVER` 实例作为 MSX，并准备我们的 `SQLSERVER\TARGETSERVER1`
    和 `SQLSERVER\TARGETSERVER2` 实例作为 TSX，我们运行清单 [22-9](#333037_2_En_22_Chapter.xhtml#PC9)
    中的脚本来更新注册表。'
  raw: '#### Executing Jobs


    Even if a job is scheduled to run automatically, at times you may wish to execute
    a job on an ad hoc basis. For example, if you have a job that is scheduled to
    run nightly to take full backups of the databases within your instance, you may
    wish to execute it manually just before a code release or software upgrade.


    A job can be executed manually in SQL Server Management Studio by drilling through
    SQL Server Agent ➤ Jobs in Object Explorer and then selecting Start Job at Step
    from the Job’s context menu; doing this invokes the Start Job dialog box. Figure
    [22-24](#333037_2_En_22_Chapter.xhtml#Fig24) displays the Start Job dialog box
    for the BackupAndCheckBrowser job. In this dialog box, you can select the first
    step of the job you want to run before you use the Start button to execute the
    job.


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig24_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig24_HTML.jpg)


    Figure 22-24


    Start Job dialog box


    To execute a job using T-SQL, you can use the `sp_start_job` system stored procedure.
    This procedure accepts the parameters detailed in Table [22-2](#333037_2_En_22_Chapter.xhtml#Tab2).


    Table 22-2


    sp_start_ job Parameters


    | Parameter | Description |

    | --- | --- |

    | @job_name | The name of the job to execute. If `NULL`, then the `@job_name`
    parameter must be specified. |

    | @job_id | The ID of the job to execute. If `NULL`, then the `@job_name` parameter
    must be specified. |

    | @server_name | Used for multiserver jobs. Specifies the target server on which
    to run the job. |

    | @step_name | The name of the job step where execution should begin. |


    To run our BackupAndCheckBrowser job, we execute the command in Listing [22-7](#333037_2_En_22_Chapter.xhtml#PC7).
    Once a job has been executed, it cannot be executed again until it has completed.


    ```

    EXEC sp_start_job @job_name=N''BackupAndCheckBrowser'' ;

    Listing 22-7

    Executing a Job

    ```


    If we wanted the job to start executing at a later step, we can use the `@step_name`
    parameter. For example, in our scenario, imagine that we want to execute our job
    in order to check that the SQL Server Browser service is running, but do not want
    the database backup to occur beforehand. To achieve this, we execute the command
    in Listing [22-8](#333037_2_En_22_Chapter.xhtml#PC8).


    ```

    EXEC sp_start_job @job_name=N''BackupAndCheckBrowser'', @step_name = ''CheckBrowser''
    ;

    Listing 22-8

    Starting a Job from a Specific Step

    ```


    #### Viewing Job History


    You can view the job history for a specific job by selecting View History from
    the Job context menu in SQL Server Agent ➤ Jobs within Object Explorer, or for
    all jobs by opening Job Activity Monitor, which you can find under the SQL Server
    Agent node in Object Explorer. Figure [22-25](#333037_2_En_22_Chapter.xhtml#Fig25)
    shows what the job history of our BackupAndCheckBrowser job looks like after a
    single execution.


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig25_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig25_HTML.jpg)


    Figure 22-25


    The job history


    Here, you can see that we have drilled through Job History to see the history
    of each individual step. After highlighting the Step 2 progress entry, we can
    see that the results of the PowerShell script have been written to the step history,
    and they show us that the SQL Server Browser service is running, as expected.


    ### Creating Alerts


    Creating an alert allows you to proactively respond to conditions that occur within
    your instance by either notifying an operator, running a job, or both. On our
    instance, we want to notify the DBATeam operator in the event that our `Chapter22`
    log file becomes more than 75% full.


    To create this alert in SQL Server Management Studio, we drill through SQL Server
    Agent in Object Explorer and select New Alert from the Alerts context menu. This
    causes the General page of the New Alert dialog box to display. This page is shown
    in Figure [22-26](#333037_2_En_22_Chapter.xhtml#Fig26).


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig26_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig26_HTML.jpg)


    Figure 22-26


    The General page


    On this page of the dialog box, we use the Name field to specify a name for our
    alert and select SQL Server Performance Condition Alert from the Type drop-down
    list. This causes the options within the page to dynamically update. We then select
    the Percent Log Used counter from the Databases object and specify that we are
    interested in the `Chapter22` instance of our object. (There is an instance of
    this counter for each database that resides on the instance.) Finally, we specify
    that the alert should be triggered if the value of this counter rises above 75
    within the Alert If Counter section of the page.


    On the Response page of the dialog box, shown in Figure [22-27](#333037_2_En_22_Chapter.xhtml#Fig27),
    we check the Notify Operators box if the condition is met, and then select an
    e-mail notification for our DBATeam operator.


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig27_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig27_HTML.jpg)


    Figure 22-27


    Response page


    On the Options page of the dialog box, you can specify if alert error text should
    be included in the notification and also additional information to include. You
    can also configure a delay to occur between occurrences of the response being
    triggered. This can help you avoid duplicate notifications or needlessly running
    a job to fix an issue that is already being resolved. Figure [22-28](#333037_2_En_22_Chapter.xhtml#Fig28)
    shows that we included the server\instance name in our notification to assist
    the DBAs in identifying the source of the alert.


    ![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig28_HTML.jpg](images/333037_2_En_22_Chapter/333037_2_En_22_Fig28_HTML.jpg)


    Figure 22-28


    The Options page


    ## Multiserver Jobs


    Administration can be drastically simplified when you use multiserver administration.
    In a multiserver environment, you can configure one instance as a master server
    (MSX) and then other servers as target servers (TSX). You can then create a set
    of maintenance jobs on the MSX and configure them to run on the TSXs, or a subset
    of the TSXs.


    ### Configuring the MSX and TSX Servers


    Before creating multiserver jobs, you must first prepare the environment. The
    first step is to edit the Registry on the MSX and set the value of the `AllowDownloadedJobsToMatchProxyName
    REG_DWORD` to `1`, which allows jobs to match the proxy name. You can find this
    value under the SQL Server Agent key, which is located under the `Software\Microsoft\Microsoft
    SQL Server\[YOUR INSTANCE NAME]` key in the Registry. You also need to ensure
    that the TSXs have a proxy account configured with the same name as the proxy
    account on the MSX that will be running the job.


    We also need to configure how the TSXs encrypt the data when they communicate
    with the MSX. We achieve this using the `MsxEncryptChannelOptions` Registry key
    for the TSX. You can find this key in the SQL Server Agent key, which is located
    under the `Software\Microsoft\Microsoft SQL Server\[YOUR INSTANCE NAME]` key in
    the Registry. A value of `0` means that encryption is not used. `1` indicates
    that encryption is used, but the certificate is not validated, and an option of
    `2` indicates that full SSL encryption and certificate validation is used. In
    our environment, since all instances are on the same physical box, we disable
    encryption.


    Therefore, to prepare our `SQLSERVER\MASTERSERVER` instance to be an MSX and to
    prepare our `SQLSERVER\TARGETSERVER1` and `SQLSERVER\TARGETSERVER2` instances
    to be TSXs, we run the script in Listing [22-9](#333037_2_En_22_Chapter.xhtml#PC9)
    to update the Registry.'
