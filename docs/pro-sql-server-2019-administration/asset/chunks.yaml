    ## Fixing Errors


    When we use `DBCC CHECKDB` to repair a corruption in the database, we need to
    specify an additional argument that determines the repair level to use. The options
    available are `REPAIR_REBUILD` and `REPAIR_ALLOW_DATA_LOSS`. `REPAIR_REBUILD`
    is, of course, the preferred option, and it can be used to resolve issues that
    will not cause data loss, such as bad page pointers, or corruption inside a nonclustered
    index. `REPAIR_ALLOW_DATA_LOSS` attempts to fix all errors it encounters, but
    as its name suggests, this may involve data being lost. You should only use this
    option to restore the data if no backup is available.


    Before specifying a repair option for `DBCC CHECKDB`, always run it without a
    repair option first. This is because when you do so, it will tell you the minimum
    repair option that you can use to resolve the errors. If we look again at the
    output of the run against the `Chapter9` database, then we can see that the end
    of the output advises the most appropriate repair option to use. This is illustrated
    in Figure 9-10.


    ![Suggested repair option](images/333037_2_En_9_Chapter/333037_2_En_9_Fig10_HTML.jpg)


    **Figure 9-10** Suggested repair option


    In our case, we are informed that we need to use the `REPAIR_ALLOW_DATA_LOSS`
    option. If we try to use the `REPAIR_REBUILD` option, we receive the following
    message, from `DBCC CHECKDB`:


    ```

    CHECKDB found 0 allocation errors and 4 consistency errors in database ''chapter9''.

    repair_allow_data_loss is the minimum repair level for the errors found by DBCC
    CHECKDB (chapter9, repair_rebuild)

    ```


    Since we do not have a backup of the `Chapter9` database, this is our only chance
    of fixing the corruption. In order to use the repair options, we also have to
    put our database in `SINGLE_USER` mode. The script in Listing 9-10 places the
    `Chapter9` database in `SINGLE_USER` mode, runs the repair, and then alters the
    database again to allow multiple connections.


    ```sql

    ALTER DATABASE Chapter9 SET SINGLE_USER ;

    GO

    DBCC CHECKDB (Chapter9, REPAIR_ALLOW_DATA_LOSS) ;

    GO

    ALTER DATABASE Chapter9 SET MULTI_USER ;

    GO

    ```


    **Listing 9-10** Repairing Corruption with `DBCC CHECKDB`


    The partial results in Figure 9-11 show that the errors in `CorruptTable` have
    been fixed. It also shows that the page has been deallocated. This means that
    we have lost all data on the page.


    ![Results of repairing corruption with DBCC CHECKDB](images/333037_2_En_9_Chapter/333037_2_En_9_Fig11_HTML.jpg)


    **Figure 9-11** Results of repairing corruption with `DBCC CHECKDB`


    If we query the `msdb.dbo.suspect_pages` table again using the same query as demonstrated
    in Listing 9-4, we see that the `Event` column has been updated to state that
    the page has been deallocated. We can also see that the `error_count` column has
    been incremented every time we accessed the page, through either `SELECT` statements
    or `DBCC CHECKDB`. These results are displayed in Figure 9-12.


    ![suspect_pages table, following repair](images/333037_2_En_9_Chapter/333037_2_En_9_Fig12_HTML.jpg)


    **Figure 9-12** `suspect_pages` table, following repair'
