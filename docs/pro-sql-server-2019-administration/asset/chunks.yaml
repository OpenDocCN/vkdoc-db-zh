    `Advanced Cluster Preparation` 向导，将导致使用该配置文件来确保整个集群安装的一致性。这种方法甚至适用于多子网集群（也称为地理集群），因为
    SQL Server 会自动检测子网之间的关系，系统将提示您为每个子网选择一个 IP 地址。然后，安装程序将使用 OR 约束将每个 IP 地址作为依赖项添加到集群角色，其中每个节点不能是每个
    IP 地址的可能所有者。或者，它将使用 AND 约束，其中每个节点可以是每个 IP 地址的可能所有者。


    在每个作为集群实例可能所有者的节点上运行 `Advanced Cluster Preparation` 向导后，您可以运行 `Advanced Cluster
    Completion` 向导。您只需运行此向导一次，并且可以在任何可能所有者的节点上运行。此向导成功完成后，集群实例将完全正常运行。


    `Image Preparation Of A Stand-Alone Instance Of SQL Server` 选项将使用 `Sysprep` 来安装
    SQL Server 的“纯净”实例，该实例未配置账户、计算机或网络特定信息。它可以与 `Windows Sysprep` 结合使用，以构建带有已准备 SQL
    Server 实例的完整 Windows 模板，然后用于在整个企业范围内进行部署。这有助于强制保持一致性。在 SQL Server 2019 中，`Sysprep`
    支持独立实例的所有功能；但是，不支持修复安装。这意味着如果在准备阶段或完成阶段的安装过程中失败，则必须卸载该实例。


    要完成已准备映像的安装，您可以使用 `Image Completion Of A Prepared Stand-Alone Instance Of SQL
    Server` 选项。此选项允许您通过输入账户、计算机和网络特定信息来完成实例的配置。


    ### 选项选项卡


    如图 2-7 所示，SQL Server 安装中心的**选项**选项卡显示了您可以根据服务器中的处理器类型用于安装 SQL Server 的处理器架构。它还允许您指定安装媒体的路径。如果您在服务器本地存储了媒体副本，这会很有用。


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig7_HTML.jpg](img/333037_2_En_2_Fig7_HTML.jpg)


    图 2-7


    选项选项卡


    ## 安装独立数据库引擎实例


    如前一节所述，SQL Server 实例可以通过多种方式安装，包括通过命令行、结合使用 `Sysprep` 与高级安装和配置文件，或使用**安装**选项卡上的
    `New SQL Server Stand-Alone Installation Or Add Features To An Existing Installation`
    选项。在下面的演示中，我们将使用最后一个选项来安装 SQL Server。在接下来的章节中，我们将安装一个包含将在本书中进一步详细研究的功能的数据库引擎实例，包括
    `FILESTREAM` 和 `Distributed Replay`。我们还将深入探讨为实例选择正确的排序规则和服务账户。


    ### 准备步骤


    当您选择安装新的 SQL Server 实例时，向导的第一个屏幕将提示您输入 SQL Server 的产品密钥，如图 2-8 所示。


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig8_HTML.jpg](img/333037_2_En_2_Fig8_HTML.jpg)


    图 2-8


    产品密钥页面


    如果在此屏幕上不输入产品密钥，您将只能安装 SQL Server 的 Express 版、Developer 版或 Evaluation 版。Developer
    版提供与 Enterprise 版相同级别的功能，但未授权用于生产环境。Evaluation 版具有与 Enterprise 版相同级别的功能，但会在 180
    天后过期。


    向导的下一个屏幕将要求您阅读并接受 SQL Server 的许可条款，如图 2-9 所示。此屏幕上提供的链接将为您提供有关 Microsoft 隐私政策的更多详细信息。


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig9_HTML.jpg](img/333037_2_En_2_Fig9_HTML.jpg)


    图 2-9


    许可条款页面


    接受许可条款后，SQL Server 安装程序将运行规则检查以确保可以继续安装，如图 2-10 所示。这与您可以从 SQL Server 安装中心的**计划**选项卡独立运行的配置检查相同，如本章前面所述。


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig10_HTML.jpg](img/333037_2_En_2_Fig10_HTML.jpg)


    图 2-10


    全局规则页面


    假设所有检查均成功通过，向导的屏幕（如图 2-11 所示）将提示您选择是否希望 `Microsoft Update` 检查 SQL Server 补丁和 hotfix。此处的选择取决于您组织的修补策略。一些组织对补丁的测试和验收实施严格的修补方案，然后是修补周期，通常由
    `WSUS (Windows Server Update Services)` 等软件支持。如果您的组织中存在这样的方案，则不应选择此选项。


    ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig11_HTML.jpg](img/333037_2_En_2_Fig11_HTML.jpg)


    图 2-11


    Microsoft Update 页面

