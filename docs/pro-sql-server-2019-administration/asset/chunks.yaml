  trans: '

    ## 创建新的分区表


    现在我们已经有了分区函数和分区方案，剩下的就是创建分区表了。清单 7-3 中的脚本创建了一个名为 `Orders` 的表，并基于 `OrderDate` 列进行分区。尽管
    `OrderNumber` 为我们的表提供了天然的主键，但我们仍需要将 `OrderDate` 包含在键中，以便它能用作分区列。显然，`OrderDate`
    列本身并不适合作为主键，因为它无法保证唯一性。


    ```sql

    CREATE TABLE dbo.Orders

    (

    OrderNumber int    NOT NULL,

    OrderDate date     NOT NULL,

    CustomerID int     NOT NULL,

    ProductID int      NOT NULL,

    Quantity int       NOT NULL,

    NetAmount money    NOT NULL,

    TaxAmount money    NOT NULL,

    InvoiceAddressID int    NOT NULL,

    DeliveryAddressID int   NOT NULL,

    DeliveryDate date       NULL

    )  ON PartScheme(OrderDate)  ;

    GO

    ALTER TABLE dbo.Orders ADD CONSTRAINT

    PK_Orders PRIMARY KEY CLUSTERED

    (

    OrderNumber,

    OrderDate

    ) WITH( STATISTICS_NORECOMPUTE = OFF, IGNORE_DUP_KEY = OFF,

    ALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS = ON) ON PartScheme(OrderDate) ;

    GO

    ```


    清单 7-3

    创建分区表


    这个脚本中需要注意的重要部分是 `ON` 子句。通常，你会在文件组上创建表，但在这里，我们是在分区方案上创建表，并传入将用作分区键的列名。分区键的数据类型必须与分区函数中指定的数据类型相匹配。


    ## 分区现有表


    由于聚集索引总是与基表对齐，因此将表移动到分区方案的过程非常简单：只需删除聚集索引，然后在分区方案上重新创建聚集索引即可。清单 7-4 中的脚本创建了一个名为
    `ExistingOrders` 的表并填充数据。


    ```sql

    --Create the ExistingOrders table

    CREATE TABLE dbo.ExistingOrders

    (

    OrderNumber int    IDENTITY    NOT NULL,

    OrderDate date     NOT NULL,

    CustomerID int     NOT NULL,

    ProductID int      NOT NULL,

    Quantity int           NOT NULL,

    NetAmount money        NOT NULL,

    TaxAmount money        NOT NULL,

    InvoiceAddressID int   NOT NULL,

    DeliveryAddressID int  NOT NULL,

    DeliveryDate date      NULL

    )  ON [PRIMARY] ;

    GO

    ALTER TABLE dbo.ExistingOrders ADD CONSTRAINT

    PK_ExistingOrders PRIMARY KEY CLUSTERED

    (

    OrderNumber,

    OrderDate

    ) WITH( STATISTICS_NORECOMPUTE = OFF, IGNORE_DUP_KEY = OFF,

    ALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS = ON) ON [PRIMARY] ;

    GO

    --We will now populate the data with data so that we can view the storage properties

    --and then partition the table when the data already exists.

    --Build a numbers table for the data population

    DECLARE @Numbers TABLE

    (

    Number    INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 20

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE ;

    --Populate ExistingOrders with data

    INSERT INTO dbo.ExistingOrders

    SELECT

    (SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number

    FROM @Numbers

    ORDER BY NEWID(), a.Number, b.Number),GETDATE()) AS DATE)),

    (SELECT TOP 1 Number -10 FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    500,

    100,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number - 10

    FROM @Numbers

    ORDER BY NEWID(), a.Number, b.Number),GETDATE()) as DATE))

    FROM @Numbers a

    CROSS JOIN @Numbers b ;

    ```


    清单 7-4

    创建新表并用数据填充


    如图 7-3 所示，通过查看“表属性”对话框的“存储”选项卡，我们可以看到该表是在 PRIMARY 文件组上创建的，并且未进行分区。


    ![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig3_HTML.jpg](img/333037_2_En_7_Fig3_HTML.jpg)


    图 7-3

    未分区的表属性


    清单 7-5 中的脚本现在删除了 `ExistingOrders` 表的聚集索引，并在 `PartScheme` 分区方案上重新创建它。同样，需要注意的关键行是
    `ON` 子句，它指定了 `PartScheme` 作为目标分区方案，并传入 `OrderDate` 作为分区键。


    ```sql

    --Drop Clustered Index

    ALTER TABLE dbo.ExistingOrders DROP CONSTRAINT PK_ExistingOrders ;

    GO

    --Re-created clustered index on PartScheme

    ALTER TABLE dbo.ExistingOrders ADD  CONSTRAINT PK_ExistingOrders PRIMARY KEY CLUSTERED

    (

    OrderNumber ASC,

    OrderDate ASC

    )WITH (PAD_INDEX = OFF, STATISTICS_NORECOMPUTE = OFF, SORT_IN_TEMPDB = OFF,

    IGNORE_DUP_KEY = OFF, ONLINE = OFF, ALLOW_ROW_LOCKS = ON,

    ALLOW_PAGE_LOCKS = ON) ON PartScheme(OrderDate) ;

    GO

    ```


    清单 7-5

    将现有表移动到分区方案上


    在图 7-4 中，您可以看到，再次查看“表属性”对话框的“存储”选项卡，会发现该表现在已针对 `PartScheme` 分区方案进行了分区。


    ![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig4_HTML.jpg](img/333037_2_En_7_Fig4_HTML.jpg)


    图 7-4

    已分区的表属性


    ### 监视分区表


    您可能希望跟踪表中每个分区的行数。这样做可以确保您的行分布均匀。如果不是，您可能需要重新评估分区策略，以确保您能从该技术中获得全部收益。有两种方法可以实现这一点：`$PARTITION`
    函数和 SSMS 的“按分区的磁盘使用情况”报表。

    '
- fmt: '## $PARTITION Function


    You can determine how many rows are in each partition of your table by using the
    `$PARTITION` function. When you run this function against the partition function,
    it accepts the column name of your partitioning key as a parameter, as demonstrated
    in Listing 7-6.


    ```sql

    SELECT

    COUNT(*) ''Number of Rows''

    ,$PARTITION.PartFunc(OrderDate) ''Partition''

    FROM dbo.ExistingOrders

    GROUP BY $PARTITION.PartFunc(OrderDate) ;

    ```

    *Listing 7-6 Using the $PARTITION Function*


    From the results in Figure 7-5, you can see that all of the rows in our table
    sit in the same partition, which pretty much defies the point of partitioning
    and means that we should reassess our strategy.


    ![Figure 7-5: The $PARTITION function run against a partitioned table](images/333037_2_En_7_Chapter/333037_2_En_7_Fig5_HTML.jpg)


    We can also use the `$PARTITION` function to assess how a table would be partitioned
    against a different partition function. This can help us plan to resolve the issue
    with our `ExistingOrders` table. The script in Listing 7-7 creates a new partition
    function, called `PartFuncWeek`, which creates weekly partitions for the month
    of November 2019. It then uses the `$PARTITION` function to determine how the
    rows of our `ExistingOrders` table will be split if we implemented this strategy.
    For the time being, we do not need to create a partition scheme or repartition
    the table. Before running the script, change the boundary point values so they
    are based upon the date when you run the script. This is because the data in the
    table is generated using the `GETDATE()` function.


    ```sql

    --Create new partition function

    CREATE PARTITION FUNCTION PartFuncWeek(DATE)

    AS RANGE LEFT

    FOR VALUES (''2019-03-7'',''2019-03-14'',''2019-03-21'',''2019-03-28'') ;

    --Assess spread of rows

    SELECT

    COUNT(*) ''Number of Rows''

    ,$PARTITION.PartFuncWeek(OrderDate) ''Partition''

    FROM dbo.ExistingOrders

    GROUP BY $PARTITION.PartFuncWeek(OrderDate) ;

    ```

    *Listing 7-7: $PARTITION Function Against a New Partition Function*


    The results in Figure 7-6 show that the rows of the `ExistingOrders` table are
    fairly evenly distributed among the weekly partitions, so this may provide a suitable
    strategy for our table.


    ![Figure 7-6: $PARTITION function against a new partition function](images/333037_2_En_7_Chapter/333037_2_En_7_Fig6_HTML.jpg)


    ### Sliding Windows


    Our weekly partitioning strategy seems to work well, but what about when we reach
    December? As it currently stands, all new order placed after 28th November 2019
    will all end up in the same partition, which will just grow and grow. To combat
    this issue, SQL Server provides us with the tools to create sliding windows. In
    our case, this means that each week, a new partition will be created for the following
    week and the earliest partition will be removed.


    To achieve this, we can use the `SPLIT`, `MERGE`, and `SWITCH` operations. The
    `SPLIT` operation adds a new boundary point, thus creating a new partition. The
    `MERGE` operation removes a boundary point, thus merging two partitions together.
    The `SWITCH` operation moves a partition into an empty table or partition.


    In our scenario, we create a staging table, called `OldOrdersStaging`. We use
    this table as a staging area to hold the data from our earliest partition. Once
    in the staging table, you can perform whatever operations or transformation may
    be required. For example, your developers may wish to create a script, to roll
    the data up, and to transfer it to a historical `Orders` table. Even though the
    `OldOrdersStaging` table is designed as a temporary object, it is important to
    note that you cannot use a temporary table. Instead, you must use a permanent
    table and `drop` it at the end. This is because temporary tables reside in TempDB,
    which means that they will be on a different filegroup, and `SWITCH` will not
    work. `SWITCH` is a metadata operation, and therefore, both partitions involved
    must reside on the same filegroup.


    The script in Listing 7-8 implements a sliding window. First, it creates a staging
    table for the older orders. The indexes and constraints of this table must be
    the same as those of the partitioned table. The table must also reside on the
    same filegroup in order for the `SWITCH` operation to succeed. It then determines
    the highest and lowest boundary point values in the partitioned table, which it
    will use as parameters for the `SPLIT` and `MERGE` operations. It then uses the
    `ALTER PARTITION FUNCTION` command to remove the lowest boundary point value and
    add in the new boundary point. Finally, it reruns the `$PARTITION` function to
    display the new distribution of rows and interrogates the `sys.partition_functions`
    and `sys.partition_range_values` catalog views to display the new boundary point
    values for the `PartFuncWeek` partition function. The script assumes that the
    `PartSchemeWeek` partition scheme has been created and the `ExistingOrders` table
    has been moved to this partition scheme.'
  raw: '#### $PARTITION Function


    You can determine how many rows are in each partition of your table by using the
    `$PARTITION` function . When you run this function against the partition function,
    it accepts the column name of your partitioning key as a parameter, as demonstrated
    in Listing [7-6](#333037_2_En_7_Chapter.xhtml#PC6).


    ```

    SELECT

    COUNT(*) ''Number of Rows''

    ,$PARTITION.PartFunc(OrderDate) ''Partition''

    FROM dbo.ExistingOrders

    GROUP BY $PARTITION.PartFunc(OrderDate) ;

    Listing 7-6

    Using the $PARTITION Function

    ```


    From the results in Figure [7-5](#333037_2_En_7_Chapter.xhtml#Fig5), you can see
    that all of the rows in our table sit in the same partition, which pretty much
    defies the point of partitioning and means that we should reassess our strategy.


    ![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig5_HTML.jpg](images/333037_2_En_7_Chapter/333037_2_En_7_Fig5_HTML.jpg)


    Figure 7-5


    The $PARTITION function run against a partitioned table


    We can also use the `$PARTITION` function to assess how a table would be partitioned
    against a different partition function. This can help us plan to resolve the issue
    with our `ExistingOrders` table. The script in Listing [7-7](#333037_2_En_7_Chapter.xhtml#PC7)
    creates a new partition function, called `PartFuncWeek`, which creates weekly
    partitions for the month of November 2019\. It then uses the `$PARTITION` function
    to determine how the rows of our `ExistingOrders` table will be split if we implemented
    this strategy. For the time being, we do not need to create a partition scheme
    or repartition the table. Before running the script, change the boundary point
    values so they are based upon the date when you run the script. This is because
    the data in the table is generated using the `GETDATE()` function .


    ```

    --Create new partition function

    CREATE PARTITION FUNCTION PartFuncWeek(DATE)

    AS RANGE LEFT

    FOR VALUES (''2019-03-7'',''2019-03-14'',''2019-03-21'',''2019-03-28'') ;

    --Assess spread of rows

    SELECT

    COUNT(*) ''Number of Rows''

    ,$PARTITION.PartFuncWeek(OrderDate) ''Partition''

    FROM dbo.ExistingOrders

    GROUP BY $PARTITION.PartFuncWeek(OrderDate) ;

    Listing 7-7

    $PARTITION Function Against a New Partition Function

    ```


    The results in Figure [7-6](#333037_2_En_7_Chapter.xhtml#Fig6) show that the rows
    of the `ExistingOrders` table are fairly evenly distributed among the weekly partitions,
    so this may provide a suitable strategy for our table.


    ![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig6_HTML.jpg](images/333037_2_En_7_Chapter/333037_2_En_7_Fig6_HTML.jpg)


    Figure 7-6


    $PARTITION function against a new partition function


    ### Sliding Windows


    Our weekly partitioning strategy seems to work well, but what about when we reach
    December? As it currently stands, all new order placed after 28th November 2019
    will all end up in the same partition, which will just grow and grow. To combat
    this issue, SQL Server provides us with the tools to create sliding windows. In
    our case, this means that each week, a new partition will be created for the following
    week and the earliest partition will be removed.


    To achieve this, we can use the `SPLIT`, `MERGE`, and `SWITCH` operations. The
    `SPLIT` operation adds a new boundary point, thus creating a new partition. The
    `MERGE` operation removes a boundary point, thus merging two partitions together.
    The `SWITCH` operation moves a partition into an empty table or partition.


    In our scenario, we create a staging table, called `OldOrdersStaging`. We use
    this table as a staging area to hold the data from our earliest partition. Once
    in the staging table, you can perform whatever operations or transformation may
    be required. For example, your developers may wish to create a script, to roll
    the data up, and to transfer it to a historical `Orders` table. Even though the
    `OldOrdersStaging` table is designed as a temporary object, it is important to
    note that you cannot use a temporary table. Instead, you must use a permanent
    table and *drop* it at the end. This is because temporary tables reside in TempDB,
    which means that they will be on a different filegroup, and `SWITCH` will not
    work. `SWITCH` is a metadata operation, and therefore, both partitions involved
    must reside on the same filegroup.


    The script in Listing [7-8](#333037_2_En_7_Chapter.xhtml#PC8) implements a sliding
    window. First, it creates a staging table for the older orders. The indexes and
    constraints of this table must be the same as those of the partitioned table.
    The table must also reside on the same filegroup in order for the `SWITCH` operation
    to succeed. It then determines the highest and lowest boundary point values in
    the partitioned table, which it will use as parameters for the `SPLIT` and `MERGE`
    operations. It then uses the `ALTER PARTITION FUNCTION` command to remove the
    lowest boundary point value and add in the new boundary point. Finally, it reruns
    the `$PARTITION` function to display the new distribution of rows and interrogates
    the `sys.partition_functions` and `sys.partition_range_values` catalog views to
    display the new boundary point values for the `PartFuncWeek` partition function.
    The script assumes that the `PartSchemeWeek` partition scheme has been created
    and the `ExistingOrders` table has been moved to this partition scheme.'
  trans: '

    ## $PARTITION 函数


    你可以使用 `$PARTITION` 函数来确定表中每个分区包含多少行。当你对分区函数运行此函数时，它接受分区键的列名作为参数，如代码清单 7-6 所示。


    ```sql

    SELECT

    COUNT(*) ''Number of Rows''

    ,$PARTITION.PartFunc(OrderDate) ''Partition''

    FROM dbo.ExistingOrders

    GROUP BY $PARTITION.PartFunc(OrderDate) ;

    ```

    *代码清单 7-6 使用 $PARTITION 函数*


    从图 7-5 的结果可以看出，我们表中的所有行都位于同一个分区中，这基本上违背了分区的意义，意味着我们应该重新评估我们的策略。


    ![图 7-5：针对已分区表运行 $PARTITION 函数](img/333037_2_En_7_Fig5_HTML.jpg)


    我们也可以使用 `$PARTITION` 函数来评估一个表在不同分区函数下的分区情况。这可以帮助我们规划如何解决 `ExistingOrders` 表的问题。代码清单
    7-7 中的脚本创建了一个名为 `PartFuncWeek` 的新分区函数，该函数为 2019 年 11 月创建每周分区。然后，它使用 `$PARTITION`
    函数来确定，如果实施此策略，我们的 `ExistingOrders` 表中的行将如何分布。目前，我们不需要创建分区方案或重新分区表。运行脚本前，请更改边界点值，使其基于你运行脚本的日期。这是因为表中的数据是使用
    `GETDATE()` 函数生成的。


    ```sql

    --Create new partition function

    CREATE PARTITION FUNCTION PartFuncWeek(DATE)

    AS RANGE LEFT

    FOR VALUES (''2019-03-7'',''2019-03-14'',''2019-03-21'',''2019-03-28'') ;

    --Assess spread of rows

    SELECT

    COUNT(*) ''Number of Rows''

    ,$PARTITION.PartFuncWeek(OrderDate) ''Partition''

    FROM dbo.ExistingOrders

    GROUP BY $PARTITION.PartFuncWeek(OrderDate) ;

    ```

    *代码清单 7-7：针对新分区函数使用 $PARTITION 函数*


    图 7-6 中的结果显示，`ExistingOrders` 表中的行在每周分区之间分布得相当均匀，因此这可能为我们的表提供了一个合适的策略。


    ![图 7-6：针对新分区函数使用 $PARTITION 函数](img/333037_2_En_7_Fig6_HTML.jpg)


    ### 滑动窗口


    我们的每周分区策略似乎运行良好，但当我们进入 12 月会怎样呢？目前看来，2019 年 11 月 28 日之后的所有新订单都将进入同一个分区，该分区将不断增长。为了解决这个问题，SQL
    Server 为我们提供了创建滑动窗口的工具。在我们的案例中，这意味着每周都会为下一周创建一个新分区，并移除最早的分区。


    为了实现这一点，我们可以使用 `SPLIT`、`MERGE` 和 `SWITCH` 操作。`SPLIT` 操作添加一个新的边界点，从而创建一个新分区。`MERGE`
    操作移除一个边界点，从而将两个分区合并在一起。`SWITCH` 操作将一个分区移动到一个空表或分区中。


    在我们的场景中，我们创建了一个暂存表，名为 `OldOrdersStaging`。我们使用此表作为暂存区来保存来自最早分区的数据。一旦数据进入暂存表，你就可以执行任何所需的操作或转换。例如，你的开发人员可能希望创建一个脚本来汇总数据，并将其传输到历史
    `Orders` 表中。尽管 `OldOrdersStaging` 表被设计为临时对象，但需要注意的是，你不能使用临时表。相反，你必须使用永久表，并在最后
    `drop` 它。这是因为临时表驻留在 TempDB 中，这意味着它们将位于不同的文件组上，而 `SWITCH` 将无法工作。`SWITCH` 是一个元数据操作，因此，所涉及的两个分区必须驻留在同一个文件组上。


    代码清单 7-8 中的脚本实现了一个滑动窗口。首先，它为旧订单创建一个暂存表。该表的索引和约束必须与分区表的索引和约束相同。该表还必须位于同一个文件组上，以便
    `SWITCH` 操作能够成功。然后，它确定分区表中的最高和最低边界点值，这些值将用作 `SPLIT` 和 `MERGE` 操作的参数。接着，它使用 `ALTER
    PARTITION FUNCTION` 命令来移除最低的边界点值并添加新的边界点。最后，它重新运行 `$PARTITION` 函数以显示新的行分布情况，并查询
    `sys.partition_functions` 和 `sys.partition_range_values` 目录视图以显示 `PartFuncWeek`
    分区函数的新边界点值。该脚本假设 `PartSchemeWeek` 分区方案已创建，并且 `ExistingOrders` 表已移动到该分区方案。

    '
- fmt: '# 实现滑动窗口


    ```sql

    --Create the OldOrders table

    CREATE TABLE dbo.OldOrdersStaging(

    [OrderNumber] [int] IDENTITY(1,1) NOT NULL,

    [OrderDate] [date] NOT NULL,

    [CustomerID] [int] NOT NULL,

    [ProductID] [int] NOT NULL,

    [Quantity] [int] NOT NULL,

    [NetAmount] [money] NOT NULL,

    [TaxAmount] [money] NOT NULL,

    [InvoiceAddressID] [int] NOT NULL,

    [DeliveryAddressID] [int] NOT NULL,

    [DeliveryDate] [date] NULL,

    CONSTRAINT PK_OldOrdersStaging PRIMARY KEY CLUSTERED

    (

    OrderNumber ASC,

    OrderDate ASC

    )WITH (PAD_INDEX = OFF, STATISTICS_NORECOMPUTE = OFF, IGNORE_DUP_KEY = OFF,

    ALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS = ON)

    ) ;

    GO

    --Calculate the lowest boundary point value

    DECLARE @LowestBoundaryPoint DATE = (

    SELECT TOP 1 CAST(value  AS DATE)

    FROM sys.partition_functions pf

    INNER JOIN sys.partition_range_values prv

    ON pf.function_id = prv.function_id

    WHERE pf.name = ''PartFuncWeek''

    ORDER BY value ASC) ;

    --Calculate the newest boundary point value

    DECLARE @HighestboundaryPoint DATE = (

    SELECT TOP 1 CAST(value  AS DATE)

    FROM sys.partition_functions pf

    INNER JOIN sys.partition_range_values prv

    ON pf.function_id = prv.function_id

    WHERE pf.name = ''PartFuncWeek''

    ORDER BY value DESC) ;

    --Add 7 days to the newest boundary point value to determine the new boundary
    point

    DECLARE @NewSplitRange DATE = (

    SELECT DATEADD(dd,7,@HighestboundaryPoint)) ;

    --Switch the oldest partition to the OldOrders table

    ALTER TABLE ExistingOrders

    SWITCH PARTITION 1 TO OldOrdersStaging PARTITION 2 ;

    --Remove the oldest partition

    ALTER PARTITION FUNCTION PartFuncWeek()

    MERGE RANGE(@LowestBoundaryPoint) ;

    --Create the new partition

    ALTER PARTITION FUNCTION PartFuncWeek()

    SPLIT RANGE(@NewSplitRange) ;

    GO

    --Re-run $PARTITION to assess new spread of rows

    SELECT

    COUNT(*) ''Number of Rows''

    ,$PARTITION.PartFuncWeek(OrderDate) ''Partition''

    FROM dbo.ExistingOrders

    GROUP BY $PARTITION.PartFuncWeek(OrderDate) ;

    SELECT name, value FROM SYS.partition_functions PF

    INNER JOIN SYS.partition_range_values PFR ON PF.function_id = PFR.function_id

    WHERE name = ''PARTFUNCWEEK'' ;

    ```


    显示在图[7-7](#333037_2_En_7_Chapter.xhtml#Fig7)中的结果展示了分区是如何重新对齐的。


    ![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig7_HTML.jpg](images/333037_2_En_7_Chapter/333037_2_En_7_Fig7_HTML.jpg)


    图 7-7 新分区对齐


    当使用`SWITCH`函数时，有几个限制。首先，表的所有非聚集索引必须与基表对齐。此外，您要移入数据的空表或分区必须具有相同的索引结构。它还必须与切换出的分区位于同一文件组上。这是因为`SWITCH`函数实际上并不移动任何数据，它是一个元数据操作，更改构成分区的页面的指针。


    您可以使用不同的文件组执行`MERGE`和`SPLIT`，但这会带来性能上的阻碍。与`SWITCH`类似，如果涉及的所有分区都位于同一文件组上，`MERGE`和`SPLIT`可以作为元数据操作执行。但是，如果它们位于不同的文件组上，那么SQL
    Server就需要执行物理数据移动，这可能会花费更长的时间。


    ### 分区消除


    分区的一个关键优势是，查询优化器能够只访问满足查询结果所需的分区，而不是整个表。要使分区消除成功，分区键必须作为筛选条件包含在`WHERE`子句中。我们可以通过针对`ExistingOrders`表运行清单[7-9](#333037_2_En_7_Chapter.xhtml#PC9)中的查询，并选择包含实际执行计划的选项来见证此功能。


    ```sql

    SELECT OrderNumber, OrderDate

    FROM dbo.ExistingOrders

    WHERE OrderDate BETWEEN ''2019-03-01'' AND ''2019-03-07'' ;

    ```


    如果我们现在查看执行计划，并通过SQL Server Management Studio检查索引扫描运算符的属性，我们会看到只有一个分区被访问，如图[7-8](#333037_2_En_7_Chapter.xhtml#Fig8)所示。


    ![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig8_HTML.jpg](images/333037_2_En_7_Chapter/333037_2_En_7_Fig8_HTML.jpg)


    图 7-8 启用分区消除后的索引扫描运算符属性


    然而，分区消除功能可能有点脆弱。例如，如果您以任何方式操作`OrderDate`列，而不仅仅是将其用于求值，那么就无法发生分区消除。例如，如果您将`OrderDate`列转换为`DATETIME2`数据类型，如清单[7-10](#333037_2_En_7_Chapter.xhtml#PC10)所示，那么所有分区都将需要被访问。此问题也会影响分区索引。


    ```sql

    SELECT OrderNumber, OrderDate

    FROM dbo.ExistingOrders

    WHERE CAST(OrderDate AS DATETIME2) BETWEEN ''2019-03-01'' AND ''2019-03-31'' ;

    ```


    图[7-9](#333037_2_En_7_Chapter.xhtml#Fig9)展示了通过SQL Server Management Studio查看到的索引扫描运算符的相同属性。在这里，您可以看到所有分区都被访问了，而不仅仅是一个。


    ![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig9_HTML.jpg](images/333037_2_En_7_Chapter/333037_2_En_7_Fig9_HTML.jpg)


    图 7-9 索引扫描属性，无分区消除


    ## 表压缩


    当您想到压缩时，很自然会认为这是以牺牲性能为代价来节省空间。然而，这对于SQL Server表压缩来说并不总是成立。SQL Server中的压缩实际上可以提供性能优势。这是因为SQL
    Server通常是一个受IO限制的应用程序，而不是受CPU限制。这意味着，如果SQL Server需要从磁盘读取的页面数量急剧减少，那么即使这会消耗CPU周期，性能也会提高。当然，如果您的数据库实际上受CPU限制（例如，因为您的磁盘速度非常快且只有一个CPU核心），那么压缩可能会产生负面影响，但这并不典型。为了理解表压缩，深入了解SQL
    Server如何在页面内存储数据会有所帮助。尽管对页面内部的完整讨论超出了本书的范围，但图[7-10](#333037_2_En_7_Chapter.xhtml#Fig10)从高层次上展示了磁盘上页面和行的默认结构。


    ![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig10_HTML.jpg](images/333037_2_En_7_Chapter/333037_2_En_7_Fig10_HTML.jpg)


    图 7-10 页面结构


    在行内，行元数据包含诸如行是否存在版本控制信息以及行是否具有`NULL`值等详细信息。固定长度列元数据记录页面固定长度部分的长度。可变长度元数据包括一个可变长度列的列偏移数组，以便SQL
    Server可以跟踪每个列相对于行开始的位置。'
