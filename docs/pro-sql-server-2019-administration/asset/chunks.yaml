    虽然图数据库超出了本书的范围，但值得一提的是，SQL Server 2019 引入了对分区图数据库表和索引的支持，它将数据划分为单元，这些单元可以分布在多个文件组上。


    ## 实现分区


    实现分区涉及创建分区函数和分区方案，然后在分区方案上创建表。如果表已存在，则需要删除并重新创建表的聚集索引。这些任务将在以下部分中讨论。


    ### 创建分区对象


    你需要创建的第一个对象是分区函数。这可以使用`CREATE PARTITION FUNCTION`语句创建，如代码清单 7-1 所示。此脚本创建一个名为`Chapter7`的数据库，然后创建一个名为`PartFunc`的分区函数。该函数指定分区键的数据类型为`DATE`，并为
    2019 年 1 月 1 日和 2017 年 1 月 1 日设置边界点。表 7-1 详细说明了日期将如何分布在分区之间。


    表 7-1

    日期分布


    | 日期 | 分区 | 备注 |

    | --- | --- | --- |

    | 2015 年 6 月 6 日 | 1 | |

    | 2016 年 1 月 1 日 | 1 | 如果使用了`RANGE RIGHT`，此值将在分区 2 中。 |

    | 2017 年 10 月 11 日 | 2 | |

    | 2018 年 1 月 1 日 | 2 | 如果使用了`RANGE RIGHT`，此值将在分区 3 中。 |

    | 2019 年 5 月 9 日 | 3 | |


    ```sql

    USE Master

    GO

    --Create Database Chapter7 using default settings from Model

    CREATE DATABASE Chapter7 ;

    GO

    USE Chapter7

    GO

    --Create Partition Function

    CREATE PARTITION FUNCTION PartFunc(Date)

    AS RANGE LEFT

    FOR VALUES(''2017-01-01'', ''2019-01-01'') ;

    Listing 7-1

    创建分区函数

    ```


    我们需要创建的下一个对象是分区方案。这可以使用`CREATE PARTITION SCHEME`语句创建，如代码清单 7-2 所示。此脚本创建一个名为`PartScheme`的分区方案，它基于`PartFunc`分区函数，并指定所有分区都将存储在`PRIMARY`文件组上。虽然将所有分区存储在同一个文件组上不允许我们实现存储分层，但它确实使我们能够自动化滑动窗口。


    ```sql

    CREATE PARTITION SCHEME PartScheme

    AS PARTITION PartFunc

    ALL TO ([PRIMARY]) ;

    Listing 7-2

    创建分区方案

    ```

    '
- fmt: '## Creating a New Partitioned Table


    Now that we have a partition function and partition scheme in place, all that
    remains is to create our partitioned table. The script in Listing [7-3](#333037_2_En_7_Chapter.xhtml#PC3)
    creates a table called `Orders` and partitions it based on the `OrderDate` column.
    Even though `OrderNumber` provides a natural primary key for our table, we need
    to include `OrderDate` in the key so that it can be used as our partitioning column.
    Obviously, the `OrderDate` column is not suitable for the primary key on its own,
    since it is not guaranteed to be unique.


    ```sql

    CREATE TABLE dbo.Orders

    (

    OrderNumber int    NOT NULL,

    OrderDate date     NOT NULL,

    CustomerID int     NOT NULL,

    ProductID int      NOT NULL,

    Quantity int       NOT NULL,

    NetAmount money    NOT NULL,

    TaxAmount money    NOT NULL,

    InvoiceAddressID int    NOT NULL,

    DeliveryAddressID int   NOT NULL,

    DeliveryDate date       NULL

    )  ON PartScheme(OrderDate)  ;

    GO

    ALTER TABLE dbo.Orders ADD CONSTRAINT

    PK_Orders PRIMARY KEY CLUSTERED

    (

    OrderNumber,

    OrderDate

    ) WITH( STATISTICS_NORECOMPUTE = OFF, IGNORE_DUP_KEY = OFF,

    ALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS = ON) ON PartScheme(OrderDate) ;

    GO

    ```


    Listing 7-3

    Creating the Partition Table


    The important thing to notice in this script is the `ON` clause. Normally, you
    would create a table “on” a filegroup, but in this case, we are creating the table
    “on” the partition scheme and passing in the name of the column that will be used
    as the partitioning key. The data type of the partitioning key must match the
    data type specified in the partition function.


    ## Partitioning an Existing Table


    Because the clustered index is always aligned with the base table, the process
    of moving a table to a partition scheme is as simple as dropping the clustered
    index and then re-creating the clustered index on the partition scheme. The script
    in Listing [7-4](#333037_2_En_7_Chapter.xhtml#PC4) creates a table called `ExistingOrders`
    and populates it with data.


    ```sql

    --Create the ExistingOrders table

    CREATE TABLE dbo.ExistingOrders

    (

    OrderNumber int    IDENTITY    NOT NULL,

    OrderDate date     NOT NULL,

    CustomerID int     NOT NULL,

    ProductID int      NOT NULL,

    Quantity int           NOT NULL,

    NetAmount money        NOT NULL,

    TaxAmount money        NOT NULL,

    InvoiceAddressID int   NOT NULL,

    DeliveryAddressID int  NOT NULL,

    DeliveryDate date      NULL

    )  ON [PRIMARY] ;

    GO

    ALTER TABLE dbo.ExistingOrders ADD CONSTRAINT

    PK_ExistingOrders PRIMARY KEY CLUSTERED

    (

    OrderNumber,

    OrderDate

    ) WITH( STATISTICS_NORECOMPUTE = OFF, IGNORE_DUP_KEY = OFF,

    ALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS = ON) ON [PRIMARY] ;

    GO

    --We will now populate the data with data so that we can view the storage properties

    --and then partition the table when the data already exists.

    --Build a numbers table for the data population

    DECLARE @Numbers TABLE

    (

    Number    INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 20

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE ;

    --Populate ExistingOrders with data

    INSERT INTO dbo.ExistingOrders

    SELECT

    (SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number

    FROM @Numbers

    ORDER BY NEWID(), a.Number, b.Number),GETDATE()) AS DATE)),

    (SELECT TOP 1 Number -10 FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    500,

    100,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number - 10

    FROM @Numbers

    ORDER BY NEWID(), a.Number, b.Number),GETDATE()) as DATE))

    FROM @Numbers a

    CROSS JOIN @Numbers b ;

    ```


    Listing 7-4

    Creating a New Table and Populating It with Data


    As shown in Figure [7-3](#333037_2_En_7_Chapter.xhtml#Fig3), by looking at the
    Storage tab of the Table Properties dialog box, we can see that the table has
    been created on the PRIMARY filegroup and is not partitioned.


    ![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig3_HTML.jpg](images/333037_2_En_7_Chapter/333037_2_En_7_Fig3_HTML.jpg)


    Figure 7-3

    Table properties nonpartitioned


    The script in Listing [7-5](#333037_2_En_7_Chapter.xhtml#PC5) now drops the clustered
    index of the `ExistingOrders` table and re-creates it on the `PartScheme` partition
    scheme. Again, the key line to note is the `ON` clause, which specifies `PartScheme`
    as the target partition function and passes in `OrderDate` as the partitioning
    key.


    ```sql

    --Drop Clustered Index

    ALTER TABLE dbo.ExistingOrders DROP CONSTRAINT PK_ExistingOrders ;

    GO

    --Re-created clustered index on PartScheme

    ALTER TABLE dbo.ExistingOrders ADD  CONSTRAINT PK_ExistingOrders PRIMARY KEY CLUSTERED

    (

    OrderNumber ASC,

    OrderDate ASC

    )WITH (PAD_INDEX = OFF, STATISTICS_NORECOMPUTE = OFF, SORT_IN_TEMPDB = OFF,

    IGNORE_DUP_KEY = OFF, ONLINE = OFF, ALLOW_ROW_LOCKS = ON,

    ALLOW_PAGE_LOCKS = ON) ON PartScheme(OrderDate) ;

    GO

    ```


    Listing 7-5

    Moving the Existing Table onto the Partition Scheme


    In Figure [7-4](#333037_2_En_7_Chapter.xhtml#Fig4), you can see that if you look
    again at the Storage tab of the Table Properties dialog box, you find that the
    table is now partitioned against the `PartScheme` partition scheme.


    ![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig4_HTML.jpg](images/333037_2_En_7_Chapter/333037_2_En_7_Fig4_HTML.jpg)


    Figure 7-4

    Table properties partitioned


    ### Monitoring Partitioned Tables


    You may wish to keep track of the number of rows in each partition of your table.
    Doing so allows you to ensure that your rows are being distributed evenly. If
    they are not, then you may wish to reassess you partitioning strategy to ensure
    you get the full benefit from the technology. There are two methods that you can
    use for this: the `$PARTITION` function and the Disk Usage by Partition SSMS Report.'
