    ## 分布式可用性组


    分布式可用性组（DAG）是可用性组的扩展，允许在两个独立的可用性组之间同步数据。这是一项令人兴奋的技术，具有许多不同的用例。例如，它允许在 Windows
    和 Linux 基础的可用性组之间进行数据同步，允许将可读辅助副本的数量扩展到超过 8 个（这是标准可用性组的限制），并且允许跨站点复制，而无需伸缩集群的复杂性。DAG
    还可以通过在无法进行就地升级而需要进行并行迁移时提供数据同步来帮助服务器迁移。


    虽然 DAG 的每一侧都可以是 Windows 故障转移群集，但这并不是必需的，因为其重点主要在于维护数据库，而不涉及集群配置。


    在本节中，我们将通过为我们的 App1 可用性组在 PROSQLADMIN-C 集群和托管在两个参与 Pacemaker 集群的 Linux 服务器上的 `Linux_AOAG`
    可用性组之间配置 DAG 来说明该技术。


    第一步是在 Linux 集群上创建分布式可用性组。这可以通过使用清单 14-16 中的脚本来实现。注意 `WITH (DISTRIBUTED)` 语法，其后是每个可用性组的规范。


    ### 注意


    开始之前，您应该从 App1 可用性组中删除现有数据库；否则它将无法加入分布式可用性组，因为辅助可用性组必须为空。


    ```sql

    CREATE AVAILABILITY GROUP DistributedAG

    WITH (DISTRIBUTED)

    AVAILABILITY GROUP ON

    ''App1'' WITH

    (

    LISTENER_URL = ''tcp://App1Listener.prosqladmin.com:1433'',

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    FAILOVER_MODE = MANUAL,

    SEEDING_MODE = AUTOMATIC

    ),

    ''Linux_AOAG'' WITH

    (

    LISTENER_URL = ''tcp://LinuxListener:5022'',

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    FAILOVER_MODE = MANUAL,

    SEEDING_MODE = AUTOMATIC

    );

    GO

    ```


    *清单 14-16 创建分布式可用性组*


