  trans: '

    ### 启用和调用审计


    尽管我们已经创建了服务器审计和服务器审计规范，但在开始收集任何数据之前，我们需要先启用它们。我们可以通过在对象资源管理器中右键单击每个对象并从上下文菜单中选择
    `启用`，或者通过修改对象并在 T-SQL 中将其 `STATE` 设置为 `ON` 来实现这一点。如代码清单 10-21 所示。


    ```

    ALTER SERVER AUDIT [Audit-ProSQLAdmin] WITH (STATE = ON) ;

    ALTER SERVER AUDIT SPECIFICATION [ServerAuditSpecification-ProSQLAdmin]

    WITH (STATE = ON) ;

    代码清单 10-21

    启用审计

    ```


    现在，我们使用代码清单 10-22 中的脚本将 Danielle 登录名添加到 `sysadmin` 服务器角色中，以便检查我们的审计是否正在工作。


    ```

    ALTER SERVER ROLE sysadmin ADD MEMBER Danielle ;

    代码清单 10-22

    触发审计

    ```


    我们期望服务器审计规范的定义能捕获这两个操作，但 `WHERE` 子句已将应用于服务器审计的第一个操作过滤掉了。如果我们在对象资源管理器中右键单击 `Audit-ProSQLAdmin`
    服务器审计并选择 `查看审计日志`，如图 10-8 所示，我们可以看到它按预期工作，并可以查看已捕获的审计条目。


    ![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig8_HTML.jpg](img/333037_2_En_10_Fig8_HTML.jpg)


    图 10-8

    审计日志文件查看器


    我们可以看到已捕获了细粒度的信息。最值得注意的是，这些信息包括触发审计的完整语句、涉及的数据库和对象、目标登录名以及运行该语句的登录名。


    ### 数据库审计规范


    数据库审计规范类似于服务器审计规范，但它指定的是数据库级别而非实例级别的审计要求。为了演示此功能，我们将 Danielle 登录映射到此数据库中的一个用户，并授予其对
    `SensitiveData` 表的 `SELECT` 权限。我们还创建了一个名为 `Audit-Chapter10` 的新服务器审计，我们的数据库审计规范将附加到该审计。这些操作在代码清单
    10-23 中执行。在执行脚本前，请根据你自己的配置修改文件路径。


    ```

    USE Master

    GO

    --创建 Chapter10Audit 数据库

    CREATE DATABASE Chapter10Audit

    GO

    USE Chapter10Audit

    GO

    CREATE TABLE dbo.SensitiveData (

    ID    INT    PRIMARY KEY    NOT NULL,

    Data    NVARCHAR(256) NOT NULL

    ) ;

    --创建服务器审计

    USE master

    GO

    CREATE SERVER AUDIT [Audit-Chapter10Audit]

    TO FILE

    (        FILEPATH = N''C:\Audit''

    ,MAXSIZE = 512 MB

    ,MAX_ROLLOVER_FILES = 2147483647

    ,RESERVE_DISK_SPACE = OFF

    )

    WITH

    (        QUEUE_DELAY = 1000

    ,ON_FAILURE = CONTINUE

    ) ;

    USE Chapter10Audit

    GO

    --根据 Danielle 登录创建数据库用户

    CREATE USER Danielle FOR LOGIN Danielle WITH DEFAULT_SCHEMA=dbo ;

    GO

    GRANT SELECT ON dbo.SensitiveData TO Danielle ;

    代码清单 10-23

    创建 Chapter10Audit 数据库

    ```


    我们现在希望创建一个数据库审计规范，用于捕获任何用户对 `SensitiveData` 表进行的任何 `INSERT` 语句，同时也专门捕获 Danielle
    运行的 `SELECT` 语句。


    我们可以通过在 SQL Server Management Studio 中导航到 `Chapter10Audit` 数据库 ➤ `安全性`，然后右键单击
    `数据库审计规范` 并选择 `新建数据库审计规范` 来创建数据库审计规范。这将调用 `新建数据库审计规范` 对话框，如图 10-9 所示。


    ![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig9_HTML.jpg](img/333037_2_En_10_Fig9_HTML.jpg)


    图 10-9

    数据库审计规范对话框


    你可以看到，我们将数据库审计规范命名为 `DatabaseAuditSpecification-Chapter10-SensitiveData`，并使用下拉列表将其链接到
    `Audit-Chapter10` 服务器审计。在屏幕的下半部分，我们指定了两种审计操作类型：`INSERT` 和 `SELECT`。因为我们指定的对象类是
    `OBJECT`，而不是其他可用选项 `DATABASE` 或 `SCHEMA`，所以我们还需要指定要审计的表的对象名称。因为我们只想审计 Danielle
    的 `SELECT` 活动，所以我们为 `SELECT` 操作类型的主体字段添加此用户，但我们为 `INSERT` 操作类型的主体添加了 `Public`
    角色。这是因为所有数据库用户都将是 `Public` 角色的成员，因此，无论用户是谁，所有 `INSERT` 活动都将被捕获。


    ### 提示


    你可以通过运行查询 `SELECT * FROM sys.dm_audit_class_type_map` 来显示完整的审计类类型列表。你可以通过运行查询
    `SELECT * FROM sys.dm_audit_actions` 来找到可审计操作的完整列表。


    我们可以使用 `CREATE DATABASE AUDIT SPECIFICATION` 语句在 T-SQL 中创建相同的数据库审计规范，如代码清单 10-24
    所示。


    ```

    USE Chapter10Audit

    GO

    CREATE DATABASE AUDIT SPECIFICATION [DatabaseAuditSpecification-Chapter10-SensitiveData]

    FOR SERVER AUDIT [Audit-Chapter10]

    ADD (INSERT ON OBJECT::dbo.SensitiveData BY public),

    ADD (SELECT ON OBJECT::dbo.SensitiveData BY Danielle) ;

    代码清单 10-24

    创建数据库审计规范

    ```


    就像处理服务器审计规范一样，我们需要在开始收集任何信息之前启用数据库审计规范。代码清单 10-25 中的脚本启用了 `Audit-Chapter10` 和
    `DatabaseAuditSpecification-Chapter10-SensitiveData`。


    ```

    USE Chapter10Audit

    GO

    ALTER DATABASE AUDIT SPECIFICATION [DatabaseAuditSpecification-Chapter10-SensitiveData]

    WITH (STATE = ON) ;

    GO

    USE Master

    GO

    ALTER SERVER AUDIT [Audit-Chapter10] WITH (STATE = ON) ;

    代码清单 10-25

    启用数据库审计规范

    ```


    为了测试安全性，SQL Server 允许你模拟用户。为此，你必须是系统管理员，或者已被授予对该用户的 `模拟` 权限。代码清单 10-26 中的脚本模拟用户
    Danielle 以检查审计是否成功。它通过使用 `EXECUTE AS USER` 命令来实现这一点。`REVERT` 命令将安全上下文切换回运行脚本的用户。


    ```

    USE Chapter10Audit

    GO

    GRANT INSERT, UPDATE ON dbo.sensitiveData TO Danielle ;

    GO

    INSERT INTO dbo.SensitiveData (SensitiveText)

    VALUES (''testing'') ;

    GO

    UPDATE dbo.SensitiveData

    SET SensitiveText = ''Boo''

    WHERE ID = 2 ;

    GO

    EXECUTE AS USER =''Danielle''

    GO

    INSERT dbo.SensitiveData (SensitiveText)

    VALUES (''testing again'') ;

    GO

    UPDATE dbo.SensitiveData

    SET SensitiveText = ''Boo''

    WHERE ID = 1 ;

    GO

    REVERT

    代码清单 10-26

    使用模拟测试安全性

    '
- fmt: '### Auditing the Audit


    With the auditing that we have implemented up to this point, there is a security
    hole. If an administrator with the permissions to manage server audit has ill
    intent, then it is possible for them to change the audit specification before
    performing a malicious action and then finally reconfiguring the audit to its
    original state in order to remove reputability.


    Server audit allows you to protect against this threat, however, by giving you
    the ability to audit the audit itself. If you add the `AUDIT_CHANGE_GROUP` to
    your server audit specification or database audit specification, then any changes
    to the specification are captured.


    Using the `Audit-Chapter10` server audit and the `DatabaseAuditSpecification-Chapter10`
    database audit specification as an example, we are auditing any `INSERT` statements,
    by any user, to the `SensitiveData` table. To avoid a privileged user with ill
    intent inserting data into this table without traceability, we can use the script
    in Listing [10-27](#333037_2_En_10_Chapter.xhtml#PC27) to add the `AUDIT_CHANGE_GROUP`
    . Note that we have to disable the database audit specification before we make
    the change and then re-enable it.


    ```sql

    USE Chapter10Audit

    GO

    ALTER DATABASE AUDIT SPECIFICATION [DatabaseAuditSpecification-Chapter10-SensitiveData]

    WITH (STATE=OFF) ;

    GO

    ALTER DATABASE AUDIT SPECIFICATION [DatabaseAuditSpecification-Chapter10-SensitiveData]

    ADD (AUDIT_CHANGE_GROUP) ;

    GO

    ALTER DATABASE AUDIT SPECIFICATION [DatabaseAuditSpecification-Chapter10-SensitiveData]

    WITH(STATE = ON) ;

    GO

    Listing 10-27

    Adding AUDIT_CHANGE_GROUP

    ```


    After executing this command, any changes we make to the auditing are captured.
    If you view the audit log, you can see that the `Administrator` login has been
    audited, removing the `INSERT` audit on the `SensitiveData` table.


    ## Security Reports


    When implementing security, DBAs should also think about regulatory compliance,
    such as GDPR and SOX. Many regulations require companies to demonstrate that they
    know what sensitive data they are holding and who has access to it.


    SQL Server helps this process, with features called SQL Data Discovery and Classification
    and Vulnerability Assessment. Each of these features will be discussed in the
    following sections.


    ### Tip


    In the following sections, demonstrations will use the `WideWorldImporters` sample
    database. This can be obtained from [`https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0`](https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0).


    ### SQL Data Discovery and Classification


    A feature called SQL Data Discovery and Classification, which is built into SQL
    Server Management Studio, firstly analyzes the columns in your database and attempts
    to discover columns that may contain sensitive information, based on their name.
    After you have reviewed and amended these classifications, columns can be tagged,
    with labels indicating the type of sensitive information that they hold. This
    information can then be viewed in a report, which can also be exported, for communications
    with auditors.


    To access this feature, select `Tasks` ➤ `Data Discovery and Classification` ➤
    `Classify Data` from the context menu of the database in question. This will cause
    the `Data Classification` dialog box to be displayed. Here, you can use the `Add
    Classification` to display the `Add Classification` pane or click the `Recommendations`
    bar at the bottom of the window to display classification suggestions, based on
    column names, as depicted in Figure [10-10](#333037_2_En_10_Chapter.xhtml#Fig10).


    ![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig10_HTML.jpg](images/333037_2_En_10_Chapter/333037_2_En_10_Fig10_HTML.jpg)

    *Figure 10-10: View Classification Recommendations*


    Here , you can use the check boxes to select the recommendations that you would
    like to accept or modify them by using the drop-downs, which allow you to change
    the information type and sensitivity labels. You can ignore recommendations by
    leaving the check boxes blank, or `Add Classification` pane can be used to add
    any columns that the classification may have missed. Once you are happy with the
    selection, use the `Accept selected recommendations` button, followed by the `Save`
    button, to add extended properties to the columns.


    The `View Report` button will generate a drill-through report, which can be exported
    to Word, Excel, or a pdf, allowing it to easily be passed to auditors. A sample
    of the report output can be seen in Figure [10-11](#333037_2_En_10_Chapter.xhtml#Fig11).


    ![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig11_HTML.jpg](images/333037_2_En_10_Chapter/333037_2_En_10_Fig11_HTML.jpg)

    *Figure 10-11: SQL Data Classification Report*


    ### Vulnerability Assessment


    The Vulnerability Assessment is a very useful tool, built into SQL Server Management
    Studio, which will scan for and report on potential security issues within a database.
    This saves a DBA from having to either check everything manually after a deployment
    or create a script that can be periodically run. The feature can be accessed by
    selecting `Tasks` ➤ `Vulnerability Assessment` ➤ `Scan For Vulnerabilities` from
    the context menu of the relevant database. This will cause the `Scan For Vulnerabilities`
    dialog box to be displayed, where you can select the path that you would like
    the report to be saved.


    After exiting this dialog box, a report will be generated, as shown in Figure
    [10-12](#333037_2_En_10_Chapter.xhtml#Fig12). The report consists of two tabs.
    The first tab details checks that have failed, while the second tab details checks
    that were performed and passed. The issues will be categorized by risk (either
    `Low`, `Medium`, or `High`).


    ![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig12_HTML.jpg](images/333037_2_En_10_Chapter/333037_2_En_10_Fig12_HTML.jpg)

    *Figure 10-12: Vulnerability Assessment Results*


    Selecting a result will cause an additional pane to be displayed on the report,
    with a more detailed view of the issue, as illustrated in Figure [10-13](#333037_2_En_10_Chapter.xhtml#Fig13).
    Here, you will be given a description of the issue, with details on how to remediate
    the problem and a copy of the query that was used to determine the result of the
    check.


    ![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig13_HTML.jpg](images/333037_2_En_10_Chapter/333037_2_En_10_Fig13_HTML.jpg)

    *Figure 10-13: Detailed view*


    If the result of the failed check is expected for a specific database, for example,
    there is no requirement to implement TDE on a specific database, then you can
    use the `Approve as Baseline` button for the issue. This means that when the next
    scan is run, the result will not appear as a failure. The baseline can be set
    back to the default settings, by using the `Clear Baseline` button.'
