  trans: '### 审核审计行为


    截至目前我们所实施的审计机制存在一个安全漏洞。若拥有服务器审计管理权限的管理员怀有恶意，他们可在执行恶意操作前更改审计规范，并在事后将审计配置恢复原状以消除痕迹，从而逃避追责。


    不过，服务器审计功能允许您对审计行为本身进行审核，以此抵御此类威胁。若在服务器审计规范或数据库审计规范中添加 `AUDIT_CHANGE_GROUP`，则任何对规范的修改都将被记录。


    以 `Audit-Chapter10` 服务器审计和 `DatabaseAuditSpecification-Chapter10` 数据库审计规范为例，我们正在审核任何用户对
    `SensitiveData` 表执行的所有 `INSERT` 语句。为防止特权用户恶意向该表插入数据且不留痕迹，可使用清单 10-27 中的脚本添加 `AUDIT_CHANGE_GROUP`。注意：在进行更改前必须先禁用数据库审计规范，修改完成后再重新启用。


    ```sql

    USE Chapter10Audit

    GO

    ALTER DATABASE AUDIT SPECIFICATION [DatabaseAuditSpecification-Chapter10-SensitiveData]

    WITH (STATE=OFF) ;

    GO

    ALTER DATABASE AUDIT SPECIFICATION [DatabaseAuditSpecification-Chapter10-SensitiveData]

    ADD (AUDIT_CHANGE_GROUP) ;

    GO

    ALTER DATABASE AUDIT SPECIFICATION [DatabaseAuditSpecification-Chapter10-SensitiveData]

    WITH(STATE = ON) ;

    GO

    清单 10-27

    添加 AUDIT_CHANGE_GROUP

    ```


    执行此命令后，我们对审计配置所做的任何修改都将被记录。若查看审计日志，可看到 `Administrator` 登录账户对 `SensitiveData` 表移除
    `INSERT` 审核的操作已被捕获。


    ## 安全报告


    在实施安全措施时，数据库管理员还应考虑法规遵从性，例如 GDPR 和 SOX。许多法规要求企业证明其清楚自身持有的敏感数据及访问权限情况。


    SQL Server 通过两项名为“SQL 数据发现与分类”和“漏洞评估”的功能为此过程提供支持。后续章节将分别讨论这两项功能。


    ### 提示


    后续章节的演示将使用 `WideWorldImporters` 示例数据库。可从 [`https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0`](https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0)
    获取该数据库。


    ### SQL 数据发现与分类


    SQL 数据发现与分类功能内置于 SQL Server Management Studio 中，它会首先分析数据库中的列，根据列名尝试识别可能包含敏感信息的列。在您审核并修正这些分类后，可为列添加标签，标明其包含的敏感信息类型。这些信息可通过报告查看，也可导出用于与审计人员沟通。


    要使用此功能，请在目标数据库的右键菜单中选择 `任务` ➤ `数据发现和分类` ➤ `分类数据`。此时将显示 `数据分类` 对话框。您可点击 `添加分类`
    展开侧边栏，或点击窗口底部的 `建议` 栏查看基于列名生成的分类建议，如图 10-10 所示。


    ![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig10_HTML.jpg](img/333037_2_En_10_Fig10_HTML.jpg)

    *图 10-10：查看分类建议*


    在此界面中，您可通过复选框选择要接受的建议，或使用下拉菜单修改建议（更改信息类型和敏感度标签）。保持复选框空白可忽略某些建议，也可使用 `添加分类` 侧边栏手动添加分类可能遗漏的列。确认选择后，点击
    `接受所选建议` 按钮，再点击 `保存` 按钮，即可为列添加扩展属性。


    点击 `查看报告` 按钮将生成详细报告，可导出为 Word、Excel 或 PDF 格式，便于提交给审计人员。报告输出示例如图 10-11 所示。


    ![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig11_HTML.jpg](img/333037_2_En_10_Fig11_HTML.jpg)

    *图 10-11：SQL 数据分类报告*


    ### 漏洞评估


    漏洞评估是 SQL Server Management Studio 内置的实用工具，可扫描并报告数据库中的潜在安全问题。这免去了数据库管理员在部署后手动检查所有项目或编写定期运行脚本的麻烦。在目标数据库的右键菜单中选择
    `任务` ➤ `漏洞评估` ➤ `扫描漏洞` 即可使用该功能。此时将显示 `扫描漏洞` 对话框，您可在此选择报告保存路径。


    退出此对话框后将生成报告，如图 10-12 所示。报告包含两个选项卡：第一个选项卡详细列出未通过的检查项，第二个选项卡详细列出已执行并通过的检查项。问题将按风险等级（`低`、`中`
    或 `高`）分类显示。


    ![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig12_HTML.jpg](img/333037_2_En_10_Fig12_HTML.jpg)

    *图 10-12：漏洞评估结果*


    选择某个结果后，报告中将显示附加面板，提供问题的详细视图，如图 10-13 所示。此处将提供问题描述、修复方法详情以及用于确定检查结果的查询脚本副本。


    ![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig13_HTML.jpg](img/333037_2_En_10_Fig13_HTML.jpg)

    *图 10-13：详细视图*


    若某项未通过检查的结果在特定数据库中属于预期情况（例如该数据库无需实施透明数据加密），则可对该问题点击 `批准为基线` 按钮。这意味着下次扫描时该结果将不再显示为失败。通过点击
    `清除基线` 按钮，可将基线重置为默认设置。'
- fmt: "# 11. Encryption\n\n## Summary\n\nSQL Server offers a complex security framework\
    \ for managing permissions that contains multiple, overlapping layers. At the\
    \ instance level, you can create logins from Windows users or groups, or you can\
    \ create them as second tier logins, with passwords stored inside the database\
    \ engine. Second tier authentication requires that you enable mixed-mode authentication\
    \ at the instance level.\n\nServer roles allow logins to be grouped together so\
    \ that you can assign them common permissions. This eases the administrative overhead\
    \ of managing security. SQL Server provides built-in server roles for common scenarios,\
    \ or you can create your own server roles that meet the needs of your data-tier\
    \ applications.\n\nAt the database level, logins can map to database users. If\
    \ you are using contained databases, then it is also possible to create database\
    \ users that map directly to a Windows security principal or have their own second\
    \ tier authentication credentials. This can help isolate the database from the\
    \ instance by removing the dependency on an instance-level login. This can help\
    \ you make the database more portable, but at the expense of additional security\
    \ considerations.\n\nFine-grained permissions can become difficult to manage,\
    \ especially when you need to secure data at the column level. SQL Server offers\
    \ ownership chaining, which can reduce this complexity. With ownership chaining,\
    \ it is possible to assign permissions on a view, as opposed to on the underlying\
    \ tables. It is even possible to use ownership chasing across multiple databases,\
    \ which, of course, is not without its own complexities. For ownership chaining\
    \ to succeed, all of the objects in the chain must share the same owner. Otherwise\
    \ the ownership chain is broken and permissions on the underlying objects are\
    \ evaluated.\n\nServer audit allows a fine-grained audit of activity at both the\
    \ instance and database levels. It also includes the ability to audit the audit\
    \ itself, thus removing the threat of a privileged user bypassing the audit with\
    \ malicious intent. You can save audits to a file in the operating system and\
    \ control permissions through NTFS. Alternatively, you can save audits to the\
    \ Windows Security log or Windows Application log.\n\nEncryption is a process\
    \ of obfuscating data with an algorithm that uses keys and certificates so that\
    \ if security is bypassed and data is accessed or stolen by unauthorized users,\
    \ then it will be useless, unless the keys that were used to encrypt it are also\
    \ obtained. This adds an additional layer of security over and above access control,\
    \ but it does not replace the need for an access control implementation. Encrypting\
    \ data also has the potential to considerably degrade performance, so you should\
    \ use it on the basis of need, as opposed to implementing it on all data as a\
    \ matter of routine.\n\nIn this chapter, we discuss the SQL Server encryption\
    \ hierarchy before demonstrating how to implement Transparent Data Encryption\
    \ (TDE) as well as cell-level encryption. We also discuss Always Encrypted and\
    \ secure enclaves.\n\n## Encryption Hierarchy\n\nSQL Server offers the ability\
    \ to encrypt data through a hierarchy of keys and certificates. Each layer within\
    \ the hierarchy encrypts the layer below it.\n\n### Encryption Concepts\n\nBefore\
    \ we discuss the hierarchy in detail, it is important to understand the concepts\
    \ that relate to encryption. The following sections provide an overview of the\
    \ main artifacts that are involved in encryption.\n\n#### Symmetric Keys\n\nA\
    \ `symmetric key` is an algorithm that you can use to encrypt data. It is the\
    \ weakest form of encryption because it uses the same algorithm for both encrypting\
    \ and decrypting the data. It is also the encryption method that has the least\
    \ performance overhead. You can encrypt a symmetric key with a password or with\
    \ another key or certificate.\n\n#### Asymmetric Keys\n\nIn contrast to a symmetric\
    \ key, which uses the same algorithm to both encrypt and decrypt data, an `asymmetric\
    \ key` uses a pair of keys or algorithms. You can use one for encryption only\
    \ and the other for decryption only. The key that is used to encrypt the data\
    \ is called the `private key` and the key that is used to decrypt the data is\
    \ known as the `public key`.\n\n#### Certificates\n\nA certificate is issued by\
    \ a trusted source, known as a `certificate authority (CA)`. It uses an asymmetric\
    \ key and provides a digitally signed statement, which binds the public key to\
    \ a principal or device, which holds the corresponding private key.\n\n#### Windows\
    \ Data Protection API\n\nThe `Windows Data Protection API (DPAPI)` is a cryptographic\
    \ application programming interface (API) that ships with the Windows operating\
    \ system. It allows keys to be encrypted by using user or domain secret information.\
    \ `DPAPI` is used to encrypt the `Service Master Key`, which is the top level\
    \ of the SQL Server encryption hierarchy.\n\n### SQL Server Encryption Concepts\n\
    \nSQL Server’s cryptography functionality relies on a hierarchy of keys and certificates,\
    \ with the root level being the `Service Master Key`. The following sections describe\
    \ the use of master keys, as well as SQL Server’s encryption hierarchy.\n\n####\
    \ Master Keys\n\nThe root level of the SQL Server encryption hierarchy is the\
    \ `Service Master Key`. The `Service Master Key` is created automatically when\
    \ the instance is built, and it is used to encrypt database master keys, credentials,\
    \ and linked servers’ passwords using the `DPAPI`. The `Service Master Key` is\
    \ stored in the Master database, and there is always precisely one per instance.\
    \ In SQL Server 2012 and above, the `Service Master Key` is a symmetric key that\
    \ is generated using the `AES 256` algorithm. This is in contrast to older versions\
    \ of SQL Server, which use the `Triple DES` algorithm.\n\nBecause of the new encryption\
