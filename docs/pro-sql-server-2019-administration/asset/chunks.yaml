- fmt: '### Tip


    对于后续脚本的成功执行，运行 Pacemaker 服务的 Linux 用户应该被授予副本上的 `VIEW SERVER STATE` 权限，以及在可用性组上的
    `ALTER`、`CONTROL` 和 `VIEW DEFINITION` 权限。


    ```sql

    ALTER AVAILABILITY GROUP Linux_AOAG JOIN WITH (CLUSTER_TYPE = EXTERNAL) ;

    GO

    ALTER AVAILABILITY GROUP Linux_AOAG GRANT CREATE ANY DATABASE ;

    GO

    ```


    *Listing 14-13 加入辅助副本*


    现在可以向可用性组添加数据库。清单 [14-14](#333037_2_En_14_Chapter.xhtml#PC14) 中的脚本将创建一个名为 `LinuxDB`
    的数据库并填充数据。然后，它将执行所需的备份，再将其添加到 `Linux_AOAG` 可用性组。


    ```sql

    CREATE DATABASE LinuxDB ;

    GO

    ALTER DATABASE LinuxDB SET RECOVERY FULL ;

    GO

    USE LinuxDB

    GO

    CREATE TABLE [dbo].[Orders](

    [OrderNumber] [int] IDENTITY(1,1) NOT NULL PRIMARY KEY CLUSTERED,

    [OrderDate] [date]  NOT NULL,

    [CustomerID] [int]  NOT NULL,

    [ProductID] [int]   NOT NULL,

    [Quantity] [int]    NOT NULL,

    [NetAmount] [money] NOT NULL,

    [TaxAmount] [money] NOT NULL,

    [InvoiceAddressID] [int] NOT NULL,

    [DeliveryAddressID] [int] NOT NULL,

    [DeliveryDate] [date] NULL,

    ) ;

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE

    --Populate ExistingOrders with data

    INSERT INTO Orders

    SELECT

    (SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number

    FROM @Numbers

    ORDER BY NEWID()),getdate())as DATE)),

    (SELECT TOP 1 Number -10 FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    500,

    100,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number - 10

    FROM @Numbers

    ORDER BY NEWID()),getdate()) as DATE))

    FROM @Numbers a

    CROSS JOIN @Numbers b

    CROSS JOIN @Numbers c ;

    --Backup Database

    BACKUP DATABASE LinuxDB

    TO DISK = N''/var/opt/mssql/data/LinuxDB.bak'';

    GO

    --Add database to Availability Group

    USE master

    GO

    ALTER AVAILABILITY GROUP Linux_AOAG ADD DATABASE LinuxDB

    GO

    ```


    *Listing 14-14 添加数据库*


    现在，使用 SSMS 连接到主实例，应该会显示可用性组已配置并包含您的数据库，如图 [14-12](#333037_2_En_14_Chapter.xhtml#Fig12)
    所示。


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig12_HTML.jpg](images/333037_2_En_14_Chapter/333037_2_En_14_Fig12_HTML.jpg)


    *Figure 14-12 Linux 服务器上已配置的可用性组*


    最后，我们将使用清单 [14-15](#333037_2_En_14_Chapter.xhtml#PC15) 中的命令为可用性组创建一个侦听器。


    ```sql

    ALTER AVAILABILITY GROUP Linux_AOAG

    ADD LISTENER N''LinuxListener'' (

    WITH IP

    (

    (''192.168.1.62'', N''255.255.255.0'')

    )

    , PORT=5022) ;

    GO

    ```


    *Listing 14-15 创建可用性组侦听器*


    ## 分布式可用性组


    分布式可用性组（DAG）是可用性组的扩展，允许在两个独立的可用性组之间同步数据。这是一项令人兴奋的技术，具有许多不同的用例。例如，它允许在 Windows
    和 Linux 基础的可用性组之间进行数据同步，允许将可读辅助副本的数量扩展到超过 8 个（这是标准可用性组的限制），并且允许跨站点复制，而无需伸缩集群的复杂性。DAG
    还可以通过在无法进行就地升级而需要进行并行迁移时提供数据同步来帮助服务器迁移。


    虽然 DAG 的每一侧都可以是 Windows 故障转移群集，但这并不是必需的，因为其重点主要在于维护数据库，而不涉及集群配置。


    在本节中，我们将通过为我们的 App1 可用性组在 PROSQLADMIN-C 集群和托管在两个参与 Pacemaker 集群的 Linux 服务器上的 `Linux_AOAG`
    可用性组之间配置 DAG 来说明该技术。


    第一步是在 Linux 集群上创建分布式可用性组。这可以通过使用清单 [14-16](#333037_2_En_14_Chapter.xhtml#PC16)
    中的脚本来实现。注意 `WITH (DISTRIBUTED)` 语法，其后是每个可用性组的规范。


    ### Note


    开始之前，您应该从 App1 可用性组中删除现有数据库；否则它将无法加入分布式可用性组，因为辅助可用性组必须为空。


    ```sql

    CREATE AVAILABILITY GROUP DistributedAG

    WITH (DISTRIBUTED)

    AVAILABILITY GROUP ON

    ''App1'' WITH

    (

    LISTENER_URL = ''tcp://App1Listener.prosqladmin.com:1433'',

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    FAILOVER_MODE = MANUAL,

    SEEDING_MODE = AUTOMATIC

    ),

    ''Linux_AOAG'' WITH

    (

    LISTENER_URL = ''tcp://LinuxListener:5022'',

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    FAILOVER_MODE = MANUAL,

    SEEDING_MODE = AUTOMATIC

    );

    GO

    ```


    *Listing 14-16 创建分布式可用性组*


    现在，我们可以针对 PROSQLADMIN-C 集群运行清单 [14-17](#333037_2_En_14_Chapter.xhtml#PC17) 中的命令，以将其加入分布式可用性组。


    ```sql

    ALTER AVAILABILITY GROUP DistributedAG

    JOIN

    AVAILABILITY GROUP ON

    ''App1'' WITH

    (

    LISTENER_URL = ''tcp://App1Listener.prosqladmin.com:1433'',

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    FAILOVER_MODE = MANUAL,

    SEEDING_MODE = AUTOMATIC

    ),

    ''Linux_AOAG'' WITH

    (

    LISTENER_URL = ''tcp://LinuxListener:5022'',

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    FAILOVER_MODE = MANUAL,

    SEEDING_MODE = AUTOMATIC

    ) ;

    GO

    ```


    *Listing 14-17 加入第二个可用性组*


    ### Tip


    数据库需要手动加入到辅助可用性组内的辅助副本。


    ## 管理 AlwaysOn 可用性组


    初始设置完成后，您仍然需要执行管理任务。这些任务包括故障转移可用性组、监控，以及在极少数情况下添加额外的侦听器。以下各节将讨论这些主题。


    ### 故障转移


    如果某个副本处于同步提交模式并配置为自动故障转移，则在主副本上满足错误条件时，可用性组会自动移动到冗余副本。然而，有时您会希望手动故障转移可用性组。这可能是由于灾难恢复测试、主动维护，或者在主副本或主数据中心发生故障后需要启动异步副本所致。'
  raw: '### Tip


    For the following script to succeed, the Linux user running the Pacemaker service
    should be granted `VIEW SERVER STATE` on the replica and `ALTER`, `CONTROL`, and
    `VIEW DEFINITION` on the Availability Group.


    ```

    ALTER AVAILABILITY GROUP Linux_AOAG JOIN WITH (CLUSTER_TYPE = EXTERNAL) ;

    GO

    ALTER AVAILABILITY GROUP Linux_AOAG GRANT CREATE ANY DATABASE ;

    GO

    Listing 14-13

    Join the Secondary Replica

    ```


    Databases can now be added to the Availability Group. The script in Listing [14-14](#333037_2_En_14_Chapter.xhtml#PC14)
    will create a database called LinuxDB and populate it with data. It will then
    take the required backup, before adding it to the Linux_AOAG Availability Group.


    ```

    CREATE DATABASE LinuxDB ;

    GO

    ALTER DATABASE LinuxDB SET RECOVERY FULL ;

    GO

    USE LinuxDB

    GO

    CREATE TABLE [dbo].[Orders](

    [OrderNumber] [int] IDENTITY(1,1) NOT NULL PRIMARY KEY CLUSTERED,

    [OrderDate] [date]  NOT NULL,

    [CustomerID] [int]  NOT NULL,

    [ProductID] [int]   NOT NULL,

    [Quantity] [int]    NOT NULL,

    [NetAmount] [money] NOT NULL,

    [TaxAmount] [money] NOT NULL,

    [InvoiceAddressID] [int] NOT NULL,

    [DeliveryAddressID] [int] NOT NULL,

    [DeliveryDate] [date] NULL,

    ) ;

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE

    --Populate ExistingOrders with data

    INSERT INTO Orders

    SELECT

    (SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number

    FROM @Numbers

    ORDER BY NEWID()),getdate())as DATE)),

    (SELECT TOP 1 Number -10 FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    500,

    100,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),

    (SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number - 10

    FROM @Numbers

    ORDER BY NEWID()),getdate()) as DATE))

    FROM @Numbers a

    CROSS JOIN @Numbers b

    CROSS JOIN @Numbers c ;

    --Backup Database

    BACKUP DATABASE LinuxDB

    TO DISK = N''/var/opt/mssql/data/LinuxDB.bak'';

    GO

    --Add database to Availability Group

    USE master

    GO

    ALTER AVAILABILITY GROUP Linux_AOAG ADD DATABASE LinuxDB

    GO

    Listing 14-14

    Adding a Database

    ```


    Connecting to the primary instance, with SSMS, should now show that the Availability
    Group is configured and contains your database, as illustrated in Figure [14-12](#333037_2_En_14_Chapter.xhtml#Fig12).


    ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig12_HTML.jpg](images/333037_2_En_14_Chapter/333037_2_En_14_Fig12_HTML.jpg)


    Figure 14-12


    Configured Availability Group on Linux server


    Finally, we will create a Listener for the Availability Group, using the command
    in Listing [14-15](#333037_2_En_14_Chapter.xhtml#PC15).


    ```

    ALTER AVAILABILITY GROUP Linux_AOAG

    ADD LISTENER N''LinuxListener'' (

    WITH IP

    (

    (''192.168.1.62'', N''255.255.255.0'')

    )

    , PORT=5022) ;

    GO

    Listing 14-15

    Create an Availability Group Listener

    ```


    ## Distributed Availability Groups


    Distributed Availability Groups (DAG) are an extension of Availability Groups,
    which allow for data to be synchronized between two separate Availability Groups.
    This is an exciting technology, with many different use cases. For example, it
    allows data synchronization between Windows- and Linux-based Availability Groups,
    it allows the number of readable secondary replicas to be extended beyond 8 (which
    is the limit for a standard Availability Group), and it allows cross-site replication,
    without the complexity of a stretch cluster. DAGs can also help server migrations,
    by providing data synchronization when an in-place upgrade is not possible, and
    a side-by-side migration is required.


    While each side of the DAG can be a Windows Failover Cluster, this is not a requirement,
    as the focus is very much on maintaining the databases, and no cluster configuration
    occurs.


    In this section, we will illustrate the technology, by configuring DAGs for our
    App1 Availability Group, between our PROSQLADMIN-C Cluster and the Linux_AOAG
    Availability Group hosted on two Linux servers, participating in a Pacemaker cluster.


    The first step is to create the Distributed Availability Group on the Linux cluster.
    This can be achieved by using the script in Listing [14-16](#333037_2_En_14_Chapter.xhtml#PC16).
    Note the `WITH (DISTRIBUTED)` syntax, followed by the specifications of each Availability
    Group.


    ### Note


    Before starting, you should remove existing databases from the App1 Availability
    Group; otherwise it will not be able to join the Distributed Availability Group,
    as the secondary Availability Group must be empty.


    ```

    CREATE AVAILABILITY GROUP DistributedAG

    WITH (DISTRIBUTED)

    AVAILABILITY GROUP ON

    ''App1'' WITH

    (

    LISTENER_URL = ''tcp://App1Listener.prosqladmin.com:1433'',

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    FAILOVER_MODE = MANUAL,

    SEEDING_MODE = AUTOMATIC

    ),

    ''Linux_AOAG'' WITH

    (

    LISTENER_URL = ''tcp://LinuxListener:5022'',

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    FAILOVER_MODE = MANUAL,

    SEEDING_MODE = AUTOMATIC

    );

    GO

    Listing 14-16

    Create the Distributed Availability Group

    ```


    We can now run the command in Listing [14-17](#333037_2_En_14_Chapter.xhtml#PC17),
    against the PROSQLADMIN-C cluster, to join it to the Distributed Availability
    Group.


    ```

    ALTER AVAILABILITY GROUP DistributedAG

    JOIN

    AVAILABILITY GROUP ON

    ''App1'' WITH

    (

    LISTENER_URL = ''tcp://App1Listener.prosqladmin.com:1433'',

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    FAILOVER_MODE = MANUAL,

    SEEDING_MODE = AUTOMATIC

    ),

    ''Linux_AOAG'' WITH

    (

    LISTENER_URL = ''tcp://LinuxListener:5022'',

    AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,

    FAILOVER_MODE = MANUAL,

    SEEDING_MODE = AUTOMATIC

    ) ;

    GO

    Listing 14-17

    Join the Second Availability Group

    ```


    ### Tip


    Databases will need to be manually joined to secondary replicas within the secondary
    Availability Group.


    ## Managing AlwaysOn Availability Groups


    Once the initial setup of your availability group is complete, you still need
    to perform administrative tasks. These include failing over the availability group,
    monitoring, and on rare occasions, adding additional listeners. These topics are
    discussed in the following sections.


    ### Failover


    If a replica is in Synchronous Commit mode and is configured for automatic failover,
    then the availability group automatically moves to a redundant replica in the
    event of an error condition being met on the primary replica. There are occasions,
    however, when you will want to manually fail over an availability group. This
    could be because of DR testing, proactive maintenance, or because you need to
    bring up an asynchronous replica following a failure of the primary replica or
    the primary data center.'
