  trans: '

    ## 通过 T-SQL 还原


    在 T-SQL 中使用 `RESTORE` 命令时，除了还原数据库外，还可使用表 12-8 中详述的选项。


    ### 表 12-8：还原选项


    | 还原选项 | 描述 |

    | --- | --- |

    | `RESTORE FILELISTONLY` | 返回备份设备中所有文件的列表。 |

    | `RESTORE HEADERONLY` | 返回备份设备中所有备份集的备份头信息。 |

    | `RESTORE LABELONLY` | 返回有关备份设备所属的介质集和介质家族的信息。 |

    | `RESTORE REWINDONLY` | 关闭并倒回磁带。仅当备份设备是磁带时有效。 |

    | `RESTORE VERIFYONLY` | 检查所有备份设备是否存在且可读。同时执行其他高级验证检查，例如确保目标驱动器上有足够空间、检查 `CHECKSUM`（如果备份时使用了
    `CHECKSUM`）以及检查关键的页头字段。 |


    使用 `RESTORE` 命令执行还原时，可以使用许多参数来实现多种还原场景。这些参数可分为以下几类：


    ### 表 12-14：杂项选项


    | 参数 | 描述 |

    | --- | --- |

    | `BUFFERCOUNT` | 用于还原操作的 IO 缓冲区总数。 |

    | `MAXTRANSFERSIZE` | SQL Server 与备份介质之间可能的最大传输单元，以字节为单位。 |

    | `STATS` | 指定应显示进度消息的频率。默认情况下，每完成 5% 显示一条进度消息。 |

    | `FILESTREAM (DIRECTORY_NAME)` | 指定应将 `FILESTREAM` 数据还原到的文件夹名称。 |

    | `KEEP_REPLICATION` | 保留复制设置。在配置日志传送与复制一起使用时，请使用此选项。 |

    | `KEEP_CDC` | 在还原数据库时，保留其变更数据捕获 (CDC) 设置。仅当备份操作时启用了 CDC 才相关。 |

    | `ENABLE_BROKER`/`ERROR_BROKER_CONVERSATIONS`/`NEW BROKER` | `ENABLE_BROKER`
    指定还原操作完成后将启用 Service Broker 消息传递，以便可以立即发送消息。`ERROR_BROKER_CONVERSATIONS` 指定在启用消息传递之前，所有会话都将因错误消息而终止。`NEW_BROKER`
    指定将移除会话而不引发错误，并为数据库分配一个新的 Service Broker 标识符。仅当创建备份时启用了 Service Broker 才相关。 |

    | `STOPAT`/`STOPATMARK`/`STOPBEFOREMARK` | 用于时间点恢复，仅在 `FULL` 恢复模式下支持。`STOPAT`
    指定一个日期时间值，该值将确定要还原的最后一个事务的时间。`STOPATMARK` 指定要还原到的 LSN（日志序列号）或标记事务的名称，这将是最终要还原的事务。`STOPBEFOREMARK`
    还原到指定的 LSN 或标记事务之前的事务。 |


    ### 表 12-13：错误管理选项


    | 参数 | 描述 |

    | --- | --- |

    | `CHECKSUM`/`NOCHECKSUM` | 如果在备份操作期间指定了 `CHECKSUM`，那么在还原操作期间指定 `CHECKSUM` 将验证还原操作期间的页面完整性。指定
    `NOCHECKSUM` 则会禁用此验证。 |

    | `CONTINUE_AFTER_ERROR`/`STOP_ON_ERROR` | `STOP_ON_ERROR` 导致如果发现任何损坏的页面，则终止还原操作。`CONTINUE_AFTER_ERROR`
    导致即使发现损坏页面，还原操作也会继续。 |


    ### 表 12-12：介质集选项


    | 参数 | 描述 |

    | --- | --- |

    | `MEDIANAME` | 如果使用此参数，则 `MEDIANAME` 必须与创建介质集时分配的介质集名称匹配。 |

    | `MEDIAPASSWORD` | 如果要从使用 SQL Server 2008 或更早版本创建的介质集还原，并且在创建时为介质集指定了密码，则必须在还原操作期间使用此参数。
    |

    | `BLOCKSIZE` | 指定用于还原操作的块大小（以字节为单位），以覆盖磁带的默认值 65,536 或磁盘/URL 的默认值 512。 |


    ### 表 12-11：备份集选项


    | 参数 | 描述 |

    | --- | --- |

    | `FILE` | 指示要在介质集中使用的备份集的序号。 |

    | `PASSWORD` | 如果要还原的备份是在 SQL Server 2008 或更早版本中创建的，并且在备份操作期间指定了密码，则需要使用此参数才能还原备份。
    |


    ### 表 12-10：WITH 选项


    | 参数 | 描述 |

    | --- | --- |

    | `PARTIAL` | 表示这是逐步还原中的首次还原，本章稍后将讨论逐步还原。 |

    | `RECOVERY`/`NORECOVERY`/`STANDBY` | 指定还原操作完成后数据库应处的状态。`RECOVERY` 表示数据库将处于联机状态。`NORECOVERY`
    表示数据库将保持正在还原状态，以便可以应用后续还原。`STANDBY` 表示数据库将以只读模式联机。 |

    | `MOVE` | 用于指定如果文件应还原到的文件系统位置与原始位置不同。 |

    | `CREDENTIAL` | 在从 Windows Azure Blob 还原时使用。 |

    | `REPLACE` | 如果实例上已存在与还原语句中指定的目标数据库同名的数据库，或者操作系统中已存在相同名称或位置的文件，则 `REPLACE` 表示应覆盖数据库或文件。
    |

    | `RESTART` | 表示如果还原操作中断，则应从该点重新启动。 |

    | `RESTRICTED_USER` | 表示还原操作完成后，只有管理员以及 `db_owner` 和 `db_creator` 角色的成员才能访问数据库。
    |


    ### 表 12-9：还原参数


    | 参数 | 描述 |

    | --- | --- |

    | `DATABASE`/`LOG` | 指定 `DATABASE` 以还原构成数据库的部分或全部文件。指定 `LOG` 以还原事务日志备份。 |

    | `database_name` | 指定要还原的目标数据库的名称。 |

    | `file_or_filegroup_or_pages` | 指定要还原的文件、文件组或页面的逗号分隔列表。如果还原页面，请使用格式 `PAGE = FileID:PageID`。在
    `SIMPLE` 恢复模式下，只有文件或文件组是只读的，或者您正在使用 `WITH PARTIAL` 执行部分还原时，才能指定它们。 |

    | `READ_WRITE_FILEGROUPS` | 还原所有读/写文件组，但不还原只读文件组。 |

    | `FROM` | 包含要还原的备份集的备份设备的逗号分隔列表，或者您希望从中还原的数据库快照的名称。数据库快照将在第 16 章讨论。 |


    - 还原参数（在表 12-9 中描述）

    - `WITH` 选项（在表 12-10 中描述）

    - 备份集选项（在表 12-11 中描述）

    - 介质集选项（在表 12-12 中描述）

    - 错误管理选项（在表 12-13 中描述）

    - 杂项选项（在表 12-14 中描述）

    '
- fmt: 'To perform the same restore operation that we performed through SSMS, we use
    the command in Listing [12-10](#333037_2_En_12_Chapter.xhtml#PC10). Before running
    the script, change the path of the backup devices to match your own configuration.


    ```

    USE master

    GO

    --Back Up the tail of the log

    BACKUP LOG Chapter12

    TO  DISK = N''H:\MSSQL\Backup\Chapter12_LogBackup_2012-02-16_12-17-49.bak''

    WITH NOFORMAT,

    NAME = N''Chapter12_LogBackup_2012-02-16_12-17-49'',

    NORECOVERY,

    STATS = 5 ;

    --Restore the full backup

    RESTORE DATABASE Chapter12

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12.bak''

    WITH  FILE = 1,

    NORECOVERY,

    STATS = 5 ;

    --Restore the differential

    RESTORE DATABASE Chapter12

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12.bak''

    WITH  FILE = 2,

    NORECOVERY,

    STATS = 5 ;

    --Restore the transaction log

    RESTORE LOG Chapter12

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12.bak''

    WITH  FILE = 3,

    STATS = 5 ;

    GO

    Listing 12-10

    Restoring a Database

    ```


    ## Restoring to a Point in Time


    In order to demonstrate restoring a database to a point in time, we first take
    a series of backups, manipulating data between each one. The script in Listing
    [12-11](#333037_2_En_12_Chapter.xhtml#PC11) first creates a base full backup of
    the `Chapter12` database. It then inserts some rows into the `Addresses` table
    before it takes a transaction log backup. It then inserts some further rows into
    the `Addresses` table before truncating the table; and then finally, it takes
    another transaction log backup.


    ```

    USE Chapter12

    GO

    BACKUP DATABASE Chapter12

    TO  DISK = ''H:\MSSQL\Backup\Chapter12PointinTime.bak''

    WITH  RETAINDAYS = 90

    , FORMAT

    , INIT, SKIP

    , MEDIANAME = ''Chapter12Point-in-time''

    , NAME = ''Chapter12-Full Database Backup''

    , COMPRESSION ;

    INSERT INTO dbo.Addresses

    VALUES(''1 Carter Drive'', ''Hedge End'', ''Southampton'', ''SO32 6GH'')

    ,(''10 Apress Way'', NULL, ''London'', ''WC10 2FG'') ;

    BACKUP LOG Chapter12

    TO  DISK = ''H:\MSSQL\Backup\Chapter12PointinTime.bak''

    WITH  RETAINDAYS = 90

    , NOINIT

    , MEDIANAME = ''Chapter12Point-in-time''

    , NAME = ''Chapter12-Log Backup''

    , COMPRESSION ;

    INSERT INTO dbo.Addresses

    VALUES(''12 SQL Street'', ''Botley'', ''Southampton'', ''SO32 8RT'')

    ,(''19 Springer Way'', NULL, ''London'', ''EC1 5GG'') ;

    TRUNCATE TABLE dbo.Addresses ;

    BACKUP LOG Chapter12

    TO  DISK = ''H:\MSSQL\Backup\Chapter12PointinTime.bak''

    WITH  RETAINDAYS = 90

    , NOINIT

    , MEDIANAME = ''Chapter12Point-in-time''

    , NAME = ''Chapter12-Log Backup''

    , COMPRESSION ;

    GO

    Listing 12-11

    Preparing the Chapter12 Database

    ```


    Imagine that after the series of events that occurred in this script, we discover
    that the `Addresses` table was truncated in error and we need to restore to the
    point immediately before this truncation occurred. To do this, we either need
    to know the exact time of the truncation and need to restore to the date/time
    immediately before, or to be more accurate, we need to discover the LSN of the
    transaction where the truncation occurred and restore up to this transaction.
    In this demonstration, we choose the latter option.


    We can use a system function called `sys.fn_dump_dblog()` to display the contents
    of the final log backup that includes the second insert statement and the table
    truncation. The procedure accepts a massive 68 parameters, and none of them can
    be omitted!


    The first and second parameters allow you to specify a beginning and end LSN with
    which to filter the results. These parameters can both be set to `NULL` to return
    all entries in the backup. The third parameter specifies if the backup set is
    disk or tape, whereas the fourth parameter specifies the sequential ID of the
    backup set within the device. The next 64 parameters accept the names of the backup
    devices within the media set. If the media set contains less than 64 devices,
    then you should use the value `DEFAULT` for any parameters that are not required.


    The script in Listing [12-12](#333037_2_En_12_Chapter.xhtml#PC12) uses the undocumented
    `fn_dump_dblog()` system function to identify the starting LSN of the autocommit
    transaction in which the truncation occurred. The issue with this function is
    that it does not return the LSN in the same format required by the `RESTORE` command.
    Therefore, the calculated column, `ConvertedLSN`, converts each of the three sections
    of the LSN from binary to decimal, pads them out with zeros as required, and finally
    concatenates them back together to produce an LSN that can be passed into the
    `RESTORE` operation.


    ```

    SELECT

    CAST(

    CAST(

    CONVERT(VARBINARY, ''0x''

    + RIGHT(REPLICATE(''0'', 8)

    + SUBSTRING([Current LSN], 1, 8), 8), 1

    ) AS INT

    ) AS VARCHAR(11)

    ) +

    RIGHT(REPLICATE(''0'', 10) +

    CAST(

    CAST(

    CONVERT(VARBINARY, ''0x''

    + RIGHT(REPLICATE(''0'', 8)

    + SUBSTRING([Current LSN], 10, 8), 8), 1

    ) AS INT

    ) AS VARCHAR(10)), 10) +

    RIGHT(REPLICATE(''0'',5) +

    CAST(

    CAST(CONVERT(VARBINARY, ''0x''

    + RIGHT(REPLICATE(''0'', 8)

    + SUBSTRING([Current LSN], 19, 4), 8), 1

    ) AS INT

    ) AS VARCHAR

    ), 5) AS ConvertedLSN

    ,*

    FROM

    sys.fn_dump_dblog (

    NULL, NULL, N''DISK'', 3, N''H:\MSSQL\Backup\Chapter12PointinTime.bak''

    DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT,

    DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT,

    DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT,

    DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT,

    DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT,

    DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT,

    DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT,

    DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT,

    DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT)

    WHERE [Transaction Name] = ''TRUNCATE TABLE'' ;

    Listing 12-12

    Finding the LSN of the Truncation

    ```


    Now that we have discovered the LSN of the transaction that truncated the `Addresses`
    table, we can restore the `Chapter12` database to this point. The script in Listing
    [12-13](#333037_2_En_12_Chapter.xhtml#PC13) restores the full and first transaction
    log backups in their entirety. It then restores the final transaction log but
    uses the `STOPBEFOREMARK` argument to specify the first LSN that should not be
    restored. Before running the script, change the locations of the backup devices,
    as per your own configuration. You should also replace the LSN with the LSN that
    you generated using `sys.fn_dump_dblog()`.


    ```

    USE master

    GO

    RESTORE DATABASE Chapter12

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12PointinTime.bak''

    WITH  FILE = 1

    ,  NORECOVERY

    ,  STATS = 5

    , REPLACE ;

    RESTORE LOG Chapter12

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12PointinTime.bak''

    WITH  FILE = 2

    ,  NORECOVERY

    ,  STATS = 5

    , REPLACE ;

    RESTORE LOG Chapter12

    FROM  DISK = N''H:\MSSQL\Backup\Chapter12PointinTime.bak''

    WITH  FILE = 3

    ,  STATS = 5

    , STOPBEFOREMARK = ''lsn:35000000036000001''

    , RECOVERY

    , REPLACE ;

    Listing 12-13

    Restoring to a Point in Time

    ```


    ## Restoring Files and Pages


    The ability to restore a filegroup, a file, or even a page gives you great control
    and flexibility in disaster recovery scenarios. The following sections demonstrate
    how to perform a file restore and a page restore.'
