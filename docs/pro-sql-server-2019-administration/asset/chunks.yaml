    ### 提示


    通过将存储以 iSCSI 连接方式直接呈现给客户机操作系统，可以规避 VMware 功能中围绕共享磁盘的限制，但这会以**性能下降**为代价。


    当你有主动故障转移需求但又不需要实现负载延迟时，`AOAG` 是适用于 `DR` 的最合适技术。如果你希望利用 `DR` 服务器来卸载报表负载，`AOAG`
    也可能适用于灾难恢复场景。这样可以使冗余服务器得到利用。用于灾难恢复时，`AOAG` 以异步模式工作。这意味着在发生故障转移时可能会丢失数据。其 `RPO`
    是不确定的，取决于最后一次未提交事务的时间。


    在过去数据库镜像的时代，辅助数据库始终处于离线状态。这意味着你无法使用辅助数据库来卸载任何报表或其他只读活动。可以通过对辅助数据库创建数据库快照并将只读活动指向该快照来绕过此限制。然而，这仍然很复杂，因为你必须配置应用程序以针对不同的网络名称和
    IP 地址发出只读语句。另一方面，`可用性组` 允许你将一个或多个副本配置为可读。唯一的限制是，可读副本和自动故障转移不能配置在同一个辅助副本上。不过，通常的做法是将可读的辅助副本配置为异步提交模式，以免影响性能。


    为了进一步简化这一点，`可用性组` 副本会检查应用程序连接字符串中的 `只读` 或 `读意向` 属性，并将应用程序指向适当的节点。这意味着你可以轻松地以水平扩展方式扩展报表和数据库维护例程，只需很少的开发工作量，并且应用程序能够使用单一的连接字符串。


    因为 `AOAG` 允许你结合同步副本（带或不带自动故障转移）、异步副本和用于只读访问的副本，所以它允许你使用单一技术来满足高可用性、灾难恢复和报表横向扩展的需求。如果你唯一的需求是读取扩展，而不是
    `HA` 或 `DR`，那么从 `SQL Server 2017` 开始，实际上可以配置不依赖于故障转移群集的 `可用性组`。在这种情况下，没有群集服务，因此也没有自动重定向。`可用性组`
    内的副本在相互通信时使用证书。如果你在没有 `AD` 的工作组或跨域环境中配置 `可用性组`，情况也是如此。


    当你使用 `AOAG` 时，故障转移既不发生在数据库级别，也不发生在实例级别。相反，故障转移发生在可用性组级别。可用性组是一个概念，允许你将相关的数据库分组在一起，以便它们作为一个原子单元进行故障转移。这在整合环境中特别有用，因为它允许你将映射到单个应用程序的数据库分组。然后，你可以出于
    `DR` 测试或其他原因，将此应用程序故障转移到另一个副本，而不会影响托管在同一实例上的其他数据层应用程序。


    对于一个实例上可以配置的可用性组数量，以及可以参与 `AOAG` 的实例上的数据库数量，微软并未施加硬性限制。然而，微软经过测试并正式建议，每个实例最多 100
    个数据库和 10 个可用性组。扩展数据库数量的主要限制因素是 `AOAG` 使用数据库镜像端点，并且每个实例只能有一个。这意味着所有数据修改的日志流都通过同一个端点发送。


    图 13-5 描绘了如何将数据层应用程序映射到可用性组以实现独立故障转移。在此示例中，单个实例托管了两个数据层应用程序。每个应用程序都已添加到单独的可用性组中。第一个可用性组已故障转移到
    `Node2`。因此，可用性组侦听器将 Application1 的流量指向 `Node2`，将 Application2 的流量指向 `Node1`。因为每个可用性组都有自己的网络名称和
    IP 地址，并且这些资源随 `AOAG` 一起故障转移，所以应用程序能够在故障转移后无缝地重新连接到数据库。


    ![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig5_HTML.png](img/333037_2_En_13_Fig5_HTML.png)


    图 13-5


    可用性组故障转移


    图 13-6 中的图表描述了一个 AlwaysOn 可用性组拓扑。在此示例中，群集中有四个节点和一个磁盘见证。`Node1` 托管数据库的主副本，`Node2`
    用于自动故障转移，`Node3` 用于卸载报表负载，`Node4` 用于 `DR`。由于群集跨越两个数据中心，因此已实现多子网群集。然而，由于没有共享存储，站点之间不需要进行
    `SAN` 复制。


    ![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig6_HTML.png](img/333037_2_En_13_Fig6_HTML.png)


    图 13-6


    AlwaysOn 可用性组拓扑


    ### 注


    AlwaysOn 可用性组在第 14 章和第 16 章中有更详细的讨论。

