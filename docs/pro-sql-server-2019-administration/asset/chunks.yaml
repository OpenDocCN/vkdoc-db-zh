    ```


    ## 在 Docker 容器中安装 SQL Server


    容器是一种隔离、轻量级的运行单元，可用于运行应用程序。与模拟硬件的虚拟机不同，容器运行在操作系统之上并模拟内核。使用容器进行内核模拟被称为容器化。容器因其高效和可移植性，正日益受到各类组织的青睐。容器的可移植性也简化了部署流程，使其在
    DevOps 环境中非常流行。


    Docker 是用于运行容器的应用平台。它最初为 Linux 开发，但现在也支持 Windows。这意味着，无论所需的底层操作系统是什么，SQL Server
    都能利用容器技术。


    Docker 镜像是一个单一文件，其中包含完全打包好的应用程序。因此，就 SQL Server 而言，一个 Docker 镜像可能基于 Windows Server
    2019 Core 等操作系统以及 SQL Server 二进制文件构建。你的实例将按照最佳实践进行完全配置，这样每次从镜像创建容器时，它都可以直接使用。


    ### 注意


    对 SQL Server 进行容器化时，一个重要的考虑因素是容器是无状态的。它们的一个优势是，你可以非常快速轻松地删除并重启一个容器，并且它会和原来完全一样。由此带来的一个副作用是，如果容器内有数据文件，当删除容器时，这些数据文件也会被销毁。因此，用户数据文件和
    `msdb` 数据文件应存储在容器外部。我通常建议将 `master` 的数据文件保留在容器内，因为此数据库存储了许多实例配置详情，但在某些情况下，你可能也希望将这些文件存储在容器外部。


    ### 运行 Microsoft 提供的 Docker 镜像


    微软为 SQL Server 提供少量 Docker 镜像。例如，在撰写本文时，有一个用于 Ubuntu 16.4 的 SQL Server 2017 镜像，以及一个运行
    SQL Server 2017 开发人员版的 Windows Server Core 2016 镜像。在下面的示例中，我们将为 Windows Server
    2016 Core 配置容器并部署标准的 SQL Server 2017 开发人员版容器。


    我们的第一步是安装容器功能并重新启动计算机。这可以通过运行代码清单 4-14 中的 PowerShell 脚本完成。


    ```powershell

    Install-WindowsFeature -name Containers

    Restart-Computer -Force

    代码清单 4-14

    安装容器功能

    ```


    现在，我们需要安装 Docker 引擎和 Microsoft Docker 提供程序。这可以通过代码清单 4-15 中的脚本实现。


    ```powershell

    Install-Module -Name DockerMsftProvider -Repository PSGallery -Force

    Install-Package -Name docker -ProviderName DockerMsftProvider -Force

    代码清单 4-15

    安装 Docker 引擎

    ```


    ### 提示


    如果尚未安装，代码清单 4-15 中的脚本将提示你安装 `NuGet` 提供程序。你应该接受此安装，因为 `NuGet` 是安装 Docker 等其他软件包所必需的包管理器。


    Docker 安装的最后一步是启动 Docker 服务。使用 PowerShell，可以通过代码清单 4-16 中的命令完成。


    ```powershell

    Start-Service docker

    代码清单 4-16

    启动 Docker 服务

    ```


    现在，我们可以从 Microsoft 容器注册表 (MCR) 拉取镜像。这是一个基础 Windows 容器的仓库。Docker Hub 是容器镜像的默认仓库，但即使
    Windows 镜像在 Docker Hub 上列出，它们也存储在 MCR 中。我们可以使用代码清单 4-17 中的命令拉取镜像。


    ```bash

    Docker image pull microsoft/mssql-server-windows-developer

    代码清单 4-17

    拉取 Docker 镜像

    ```


    最后，我们需要启动容器。我们可以使用代码清单 4-18 中的命令启动容器。在此示例中，`-d` 开关表示容器应在分离模式下运行。这意味着容器将作为后台进程运行，而不是交互式运行。我们还使用
    `-p` 将容器的端口发布到主机，并使用 `-e` 设置环境变量。在此例中，我们设置了 `sa` 帐户的密码并接受 SQL Server 许可条款。


    ```bash

    docker run -d -p 1433:1433 -e sa_password=Pa££w0rd -e ACCEPT_EULA=Y microsoft/mssql-server-windows-developer

    代码清单 4-18

    运行容器

    ```


    ### 创建用于 SQL Server 的简单 Docker 镜像


    虽然 Microsoft 的镜像可能适用于某些目的，但在大多数情况下，你需要根据自己的配置要求创建自己的 Docker 镜像。在本节中，我们将探讨如何使用
    Docker 文件创建一个镜像，该镜像将在 Windows Server Core 上安装 SQL Server 2019 和 SQL Server 命令行工具。'
- fmt: '## Tip


    In this section, we will use a Windows Server 2019 host, which has had the containers
    feature, Docker module, and Microsoft Docker provider installed. Details of how
    to perform these preparation steps can be found in the "Running a Microsoft-Supplied
    Docker Image" section of this chapter.


    A Docker file is a deployment script, which specifies how the container image
    should be built. The file consists of a set of instructions. The instructions
    that are most relevant to creating SQL Server containers based on Windows are
    detailed in Table 4-3.


    Table 4-3: Docker File Instructions


    | Instruction | Description |

    | --- | --- |

    | `FROM` | The container image, on which your new image should be based |

    | `RUN` | Specifies a command that should be run |

    | `COPY` | Copies files from the host to the container image |

    | `ADD` | Similar to COPY, but allows files to be copied from a remote source
    |

    | `WORKDIR` | Specifies the working directory, for other Docker instructions |

    | `CMD` | Sets a default command to run, when an instance of the container image
    is deployed |

    | `VOLUME` | Creates a mount point |


    The first step in creating our own container image is to pull the Windows Server
    2019 Core image from the MCR. This is the image that we will use as a base for
    our image. We can do this with PowerShell by using the command in Listing 4-19.


    ```

    docker pull mcr.microsoft.com/windows/servercore:ltsc2019

    ```

    **Listing 4-19:** Pull the Base Image


    Our next step will be to create a simple folder structure on the host. Firstly,
    we will create a folder called `C:\DockerBuild`. This folder will store our build
    scripts. We will also create a folder underneath, called `C:\DockerBuild\SQL2019`.
    This folder should contain the SQL Server 2019 installation media.


    We will now need to create two scripts, both of which we will place in the `C:\DockerBuild`
    folder. The first of these files is the Docker file. This file must be called
    `Dockerfile` and have no extension.


    ### Tip


    When saving `dockerfile`, ensure that your text/code editor has not automatically
    appended a default file extension to the file. If it has, then the build of the
    image will fail.


    The script in Listing 4-20 contains the contents of the Docker file we will use.


    ```

    #Use the Server Core base image

    FROM mcr.microsoft.com/windows/servercore:ltsc2019

    #Make temp folders for the SQL Server and SQL Command Line Utilities media

    RUN powershell -Command (mkdir C:\SQL2019)

    #Copy the SQL Server  media into the container

    COPY \SQL2019 C:/SQL2019

    #Install SQL Server

    RUN C:/SQL2019/SETUP.exe /Q /ACTION=INSTALL /FEATURES=SQLENGINE /INSTANCENAME=MSSQLSERVER
    \

    /SECURITYMODE=SQL /SAPWD="Passw0rd" /SQLSVCACCOUNT="NT AUTHORITY\System" \

    /AGTSVCACCOUNT="NT AUTHORITY\System" /SQLSYSADMINACCOUNTS="BUILTIN\Administrators"
    \

    /IACCEPTSQLSERVERLICENSETERMS=1 /TCPENABLED=1 /UPDATEENABLED=False

    #Install Chocolatey and SQL Server Command Line Utilities

    RUN @"%SystemRoot%\System32\WindowsPowerShell\v1.0\powershell.exe" -NoProfile
    -InputFormat None -ExecutionPolicy Bypass -Command "iex ((New-Object System.Net.WebClient).DownloadString(''https://chocolatey.org/install.ps1''))"
    && SET "PATH=%PATH%;%ALLUSERSPROFILE%\chocolatey\bin"

    RUN choco install sqlserver-cmdlineutils -y

    #Set SQL Server to start automaticaly

    RUN powershell -Command (Set-Service MSSQLSERVER -StartupType Automatic)

    #Remove the installation media

    RUN powershell -Command (Remove-Item -Path C:/SQL2019 -Recurse -Force)

    #Create a mountpoint for data files

    VOLUME C:/DataFiles

    #Copy start.ps1 to container

    COPY \start.ps1 /

    WORKDIR /

    CMD powershell -Command (.\start.ps1)

    ```

    **Listing 4-20:** Dockerfile


    Working through the contents of the file, even without experience of Docker, it
    is fairly easy to see what is happening. Our first statement indicates that our
    build will be based upon the Windows Server 2019 Core build, supplied by Microsoft.
    We then use the `RUN` and `COPY` instructions to copy the SQL Server media to
    the container.


    After this, we move straight into the installation of SQL Server. Installing SQL
    Server via PowerShell is discussed in Chapter 3. There is no difference in this
    code as to when you install SQL Server on a traditional server running Windows
    Server Core. The only interesting thing to note is that because the command spans
    multiple lines, we have used the `\` at the end of each line, to let Docker know
    that it is a single instruction.


    The next part of the script is quite interesting. We are installing Chocolatey.
    Chocolatey is a package manager for Windows, which has a large gallery of prepackaged
    applications. In this case, it is helpful, because it allows us to easily install
    SQL Server Command Line Utilities, which is available on the Chocolatey gallery.


    ### Tip


    Chocolatey can also be used to package your own SQL Server builds. I did this
    for a client recently, and it fits very nicely into a DevOps/configuration management
    style of operations.


    Next, we use the `RUN` instruction, to run PowerShell commands, which will clean
    up our installation files and ensure that the Database Engine Service is started.
    Our next step is to use the `VOLUME` instruction to create a mount point for `DataFiles`.
    When we run an instance of the container, we will be able to map this to a folder
    on our host, to allow our data to be persisted.


    Finally, we copy a file called `Start.ps1` to our container and run it. The content
    of `Start.ps1` is shown in Listing 4-21. This script is used to run an infinite
    loop. If we did not do this, then the container would stop, as soon as the last
    instruction was sent.


    ```

    $lastCheck = (Get-Date).AddSeconds(-2)

    while ($true)

    {

    $lastCheck = Get-Date

    Start-Sleep -Seconds 2

    }

    ```

    **Listing 4-21:** Start.ps1


    After saving both of these files in the `C:\DockerBuild` folder of the host, we
    can build the image, by running the command in Listing 4-22. We use the `-t` switch
    to tag the build. I have used the `major.minor` notation to indicate a build version.'
