  raw: '| SET Option | Description |

    | --- | --- |

    | ON | Enables the Query Store for the specified database. |

    | OFF | Disables the Query Store for the specified database. |

    | CLEAR | Clears the contents of the Query Store. |

    | OPERATION_MODE | Can be configured as READ_ONLY or the default of READ_WRITE.
    When configured as READ_WRITE, data is written to the Query Store and can be read
    from the Query Store. When set to READ_ONLY, data can still be read from the Query
    Store, but no further data will be written to it. The Query Store will automatically
    switch to READ_ONLY, if it runs out of space for storing new data. |

    | CLEANUP_POLICY | Accepts STALE_QUERY_THRESHOLD_DAYS and a number of days. This
    determines how many days data for each query should be retained. |

    | DATA_FLUSH_INTERVAL_SECONDS | Query Store data is flushed to disk asynchronously.
    DATA_FLUSH_INTERVAL_SECONDS specifies how frequently data should be flushed. |

    | MAX_STORAGE_SIZE_MB | Specifies the maximum amount of space that can be used
    by Query Store data. If this value overflows, the Query Store will switch to READ_ONLY
    operational mode. |

    | INTERVAL_LENGTH_MINUTES | Specifies the time interval at which runtime execution
    statistics data is aggregated. |

    | SIZE_BASED_CLEANUP_MODE | Specifies if an automatic cleanup is triggered, when
    the Query Store reaches 90% of its maximum size threshold. Can be set to AUTO
    or OFF. When set to AUTO, the oldest, least expensive queries will be removed,
    until the size drops to around 80% of the Query Store’s maximum size threshold.
    |

    | QUERY_CAPTURE_MODE | Specifies which queries data should be captured for. Can
    be configured as ALL, NONE, AUTO, or CUSTOM. When set to ALL, statistics will
    be captured for all queries. When set to NONE, statistics will only be captured
    for queries which already exist in the Query Store. When configured as AUTO, SQL
    Server will capture statistics for the most expensive queries, based on execution
    count and resource utilization. When configured as CUSTOM, then you will have
    more granular control over which queries have statistics captured. When CUSTOM
    is specified, QUERY_CAPTURE_POLICY should also be specified. |

    | MAX_PLANS_PER_QUERY | Specifies the maximum number of plans that will be captured
    for each query, defaulting to 200. |

    | WAIT_STATS_CAPTURE_MODE | Specifies if wait statistics should be captured for
    queries. This is, of course, very useful, but comes at the expense of extra disk
    space consumed. |

    | QUERY_CAPTURE_POLICY | Can be used when QUERY_CAPTURE_MODE is set to CUSTOM.
    Please see Table [20-2](#333037_2_En_20_Chapter.xhtml#Tab2) for details of the
    available options that can be passed. |


    Table [20-2](#333037_2_En_20_Chapter.xhtml#Tab2) details the options that can
    be configured for `QUERY_CAPTURE_POLICY`.


    Table 20-2


    QUERY_CAPTURE_POLICY Options


    | Option | Description |

    | --- | --- |

    | STALE_CAPTURE_POLICY_THRESHOLD | Specifies an evaluation period, which is used
    by the other parameters, to determine if a query should have its statistics captured.
    Can be specified in hours or days. |

    | EXECUTION_COUNT | Specifies the minimum number of executions within the evaluation
    period that should occur for a query to be captured. |

    | TOTAL_COMPILE_CPU_TIME_MS | Specifies the total amount of CPU compilation time
    within the evaluation period that should occur for a query to be captured. |

    | TOTAL_EXECUTION_CPU_TIME_MS | Specifies the total amount of CPU execution time
    within the evaluation period that should occur for a query to be captured. |


    Let’s use the command in Listing [20-3](#333037_2_En_20_Chapter.xhtml#PC3) to
    configure the Query Store for the `Chapter20` database. Here, we are configuring
    the Query Store to retain data for 30 days, persist data to disk every 5 minutes,
    capture wait statistics for queries, and run an automatic cleanup when 90% of
    a 2GB threshold is reached.


    ```

    ALTER DATABASE Chapter20

    SET QUERY_STORE = ON (

    OPERATION_MODE = READ_WRITE,

    CLEANUP_POLICY = ( STALE_QUERY_THRESHOLD_DAYS = 30 ),

    DATA_FLUSH_INTERVAL_SECONDS = 300,

    MAX_STORAGE_SIZE_MB = 2048,

    SIZE_BASED_CLEANUP_MODE = AUTO,

    WAIT_STATS_CAPTURE_MODE = ON

    ) ;

    Listing 20-3

    Configure the Query Store

    ```


    The Query Store can also be configured using SSMS. To do this, drill through Databases
    in Object Explorer and select Properties from the context menu of the database,
    for which you wish to configure the Query Store. In the Properties page, you can
    select the Query Store tab, which is illustrated in Figure [20-1](#333037_2_En_20_Chapter.xhtml#Fig1).


