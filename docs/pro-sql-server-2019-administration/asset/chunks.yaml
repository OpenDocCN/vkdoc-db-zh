  trans: '

    ### 文件放置


    普遍认为，`RAID 0` 不应用于任何 `SQL Server` 文件。我知道有些人建议 `RAID 0` 可能适用于 `TempDB` 文件。其理由是，频繁使用的
    `TempDB` 通常需要非常快的性能，而且由于它在每次实例重启时都会重新创建，因此不需要冗余。这听起来完全合理，但如果你从正常运行时间的角度考虑，可能就会明白我为何不同意这个观点。


    你的 `SQL Server` 实例需要 `TempDB` 才能运行。如果你丢失了 `TempDB`，那么你的实例就会宕机，如果 `TempDB` 无法重新创建，你将无法使实例恢复运行。因此，如果你将
    `TempDB` 托管在 `RAID 0` 阵列上，而该阵列中的一个磁盘发生故障，你将无法使实例恢复运行，直到你完成以下操作之一：


    1.  等待存储团队将 `RAID 0` 阵列恢复上线。

    2.  以“最小配置模式”启动实例，并使用 `SQLCMD` 更改 `TempDB` 的位置。


    到完成这些步骤中的任何一个时，你可能会发现利益相关者已经急得跳脚了，因此你可能会发现最好避免这个选项。为此，`TempDB` 通常最好尽可能放置在 `RAID
    10` 阵列上。这将为数据库提供最佳的性能水平，而且由于其大小远小于用户数据库文件，因此成本影响没有那么大。


    在理想的世界里，资金不是问题，用户数据库的数据文件将存储在 `RAID 10` 阵列上，因为 `RAID 10` 提供了冗余性和性能的最佳组合。然而，在现实世界中，如果你支持的应用程序并非关键任务，这可能就不合理了。如果是这种情况，那么
    `RAID 5` 可能是一个不错的选择，前提是你的应用程序具有相当高的读写比。我通常以读操作三倍于写操作作为良好的基准，当然，这在每个场景中可能有所不同。


    如果你的数据库仅使用 `SQL Server` 的基本功能，那么你可能会发现 `RAID 1` 是日志文件的一个好选择。`RAID 5` 通常不适合，因为事务日志具有写入密集型的性质。在某些情况下，我甚至发现
    `RAID 1` 对于事务日志的性能优于 `RAID 10`。这是因为写入活动的顺序性质。


    然而，`SQL Server` 的某些功能可能会从事务日志产生大量的读取活动。如果是这种情况，那么你可能会发现你的事务日志以及数据文件都需要 `RAID 10`。导致事务日志读取的功能包括：


    *   AlwaysOn 可用性组

    *   数据库镜像

    *   快照创建

    *   备份

    *   `DBCC CHECKDB`

    *   变更数据捕获

    *   日志传送（包括备份，以及使用 `WITH STANDBY` 还原日志时）


    ### 固态硬盘 (SSD)


    使用本地连接存储而非存储区域网络 (`SAN`) 的一个常见原因，是为了优化 `SQL Server` 组件中需要极快速 `IO` 的性能。这些组件包括 `TempDB`
    和缓冲池扩展。数据库的数据文件和日志文件存储在 `SAN` 上，而 `TempDB` 和缓冲池扩展存储在本地连接存储上，这种情况并不少见。


    在这个例子中，在本地连接阵列中使用 `SSD` 是很有意义的。固态硬盘 (`SSD`) 可以提供非常高的 `IO` 速率，但与传统磁盘相比成本更高。`SSD`
    也不是“万能药”。尽管它们为随机磁盘访问提供了非常高的 `IOPS`，但对于某些数据库工作负载配置文件（如数据仓库）中常见的顺序扫描活动，效率可能较低。`SSD`
    也容易发生突然故障，而不像传统磁盘那样逐渐老化。因此，在阵列中配置容错 `RAID` 级别和热备盘是一个非常好的主意。


    ### 使用 SAN


    存储区域网络这三个词可能会让数据库管理员 (`DBA`) 心生畏惧。现代的 `DBA` 必须接受诸如 `SAN` 和虚拟化等概念；然而，尽管它们带来了根本性的变化，但也简化了环境的总体管理并降低了总拥有成本
    (`TCO`)。


    `DBA` 关于 `SAN` 最需要记住的是，它改变了 `IO` 子系统的基本原则，`DBA` 必须相应地调整他们的思维。例如，在本地连接存储的世界里，最基本的原则是分离你的数据文件、日志文件和
    `TempDB`，并确保它们都托管在最合适的 `RAID` 级别上。


    然而，在 `SAN` 的世界里，你最初可能会惊讶地发现你的 `SAN` 管理员不提供 `RAID` 级别的选择，即使提供，也可能不提供 `RAID 10`。如果你发现情况如此，很可能是因为
    `SAN` 在后台实际上是将数据条带化跨越阵列中的每个磁盘。这意味着尽管 `RAID` 级别仍然可能对吞吐量产生一些影响，但更重要的考虑是选择哪个存储层级。


    许多组织选择在他们的 `SAN` 上对存储进行分层，提供三个或更多层级。第 1 层将是最顶层，很可能由 `SSD` 和小型、高性能的光纤通道驱动器组合而成。第
    2 层通常由更大的驱动器组成——可能是 `SATA`（串行高级技术附件）——第 3 层通常使用近线存储。近线存储由大量廉价的磁盘组成，例如通常处于停止状态的
    `SATA` 磁盘。只有当需要访问它们包含的数据时，磁盘才会旋转启动。正如你可能已经猜到的，你需要确保任何需要良好性能的应用程序都必须位于 `SAN` 的第
    1 层。第 2 层可能适用于小型、很少使用、并发很少或没有的数据库，而第 3 层应该很少（甚至从不）用于存储 `SQL Server` 数据库或日志。


    你的实际吞吐量将由这些因素以及许多其他因素决定，例如服务器与 `SAN` 之间的网络路径数量、同时访问 `SAN` 的服务器数量等等。`SAN` 的另一个有趣之处在于，你经常会发现你的写入性能远远优于读取性能。这是因为一些
    `SAN` 使用电池支持的写入缓存，但在读取时，它们需要从主轴检索数据。


    接下来要考虑的是，由于你的所有数据很可能都条带化分布在阵列的所有主轴上——即使不是这样，单个服务器上的所有文件也很可能都位于同一个 `CPG`（通用配置组）上——你不应该期望通过分离数据、日志和
    `TempDB` 文件来立即看到性能提升。然而，许多 `DBA` 仍然选择将他们的数据、日志和 `TempDB` 文件放在单独的卷上，以实现逻辑分离并与使用本地连接存储的其他服务器保持一致。然而，在某些情况下，如果你使用
    `SAN` 快照或 `SAN` 复制实现冗余，你可能需要将数据库的数据文件和日志文件放在同一个卷上。你应该与你的存储团队确认这一点。

    '
- fmt: "# Disk Block Size\n\nAnother thing to consider for disk configuration, whether\
    \ it is locally attached or on a SAN, is the disk block size. Depending on your\
    \ storage, it is likely that the default NTFS (New Technology File System) allocation\
    \ unit size will be set to 4KB. The issue is that SQL Server organizes data into\
    \ eight continuous 8KB pages, known as an `extent`. To get optimum performance\
    \ for SQL Server, the block sizes of the volumes hosting data, logs, and TempDB\
    \ should be aligned with this and set to 64KB.\n\nYou can check the disk block\
    \ size by running the Windows PowerShell script in Listing 1-1, which uses `fsutil`\
    \ to gather the NTFS properties of the volume. The script assumes that `f:` is\
    \ the volume whose block size you wish to determine. Be sure to change this to\
    \ the drive letter that you wish to check. Also ensure that the script is run\
    \ as Administrator.\n\n```\n# Populate the drive letter you want to check\n$drive\
    \ = \"f:\"\n# Initialize outputarray\n$outputarray = new-object PSObject\n$outputarray\
    \ | add-member NoteProperty Drive $drive\n# Initialize output\n$output = (fsutil\
    \ fsinfo ntfsinfo $drive)\n# Split each line of fsutil into a seperate array value\n\
    foreach ($line in $output) {\n    $info = $line.split(':')\n    $outputarray |\
    \ add-member NoteProperty $info[0].trim().Replace(' ','_') $info[1].trim()\n \
    \   $info = $null\n}\n# Format and display results\n$results = 'Disk Block Size\
    \ for ' + $drive + ' ' + $outputarray.Bytes_Per_Cluster/1024 + 'KB'\n$results\n\
    Listing 1-1\nDetermine Disk Block Size\n```\n\n## Operating Systems Considerations\n\
    \nSQL Server has support for many operating systems, including many versions of\
    \ Windows. It is unlikely, however, that you will want to allow SQL Server to\
    \ be installed on any version of any operating system that is supported. For example,\
    \ within your Windows estate, it is advisable to align a version of SQL Server\
    \ with a specific version of Windows. This gives you two benefits.\n\nFirst, it\
    \ drastically reduces the amount of testing that you need to perform to sign off\
    \ your build. For example, imagine that you decide you will only allow Enterprise\
    \ edition within your environment. In theory, you would still need to gain operational\
    \ sign-off on more than a dozen versions of Windows. In contrast, if you allow\
    \ both SQL Server Enterprise and Standard editions of SQL Server, but you align\
    \ both editions with Windows Server 2019 Standard edition, then you would only\
    \ require sign-off once for each of your supported editions of SQL Server.\n\n\
    The second benefit is related to end-of-life cycle (EOL) for your platforms. If\
    \ you allow SQL Server 2017 to be installed on Windows Server 2012, the end of\
    \ mainstream support for Windows is January 2015, as opposed to July 2021 for\
    \ SQL. At best, this will cause complexity and outage while you upgrade Windows,\
    \ and at worst, it could lead to extended support costs that you could have avoided.\n\
    \n## Configuring the Operating System\n\nDoes your Windows administration team\
    \ have a “gold build” for Windows Server 2019? Even if they do, is it optimized\
    \ for SQL Server? Unless they have produced a separate build just for the purposes\
    \ of hosting SQL Server, then the chances are that it will not be. The exact customizations\
    \ that you will need to make are dependent on how the Windows build is configured,\
    \ your environmental requirements, and the requirements of the data-tier application\
    \ that your server will be hosting. The following sections highlight some of the\
    \ changes that are often required.\n\n### Note\n\nA *gold build* is a predefined\
    \ template for the operating system that can be easily installed on new servers\
    \ to reduce deployment time and enforce consistency.\n\n### Setting the Power\
    \ Plan\n\nIt is important that you set your server to use the High Performance\
    \ power plan. This is because if the Balanced power plan is used, then your CPU\
    \ may be throttled back during a period of inactivity. When activity on the server\
    \ kicks in again, you may experience a performance issue.\n\nYou can set the power\
    \ plan through the Windows GUI by opening the Power Options console in Control\
    \ Panel and selecting the High Performance or you can use PowerShell/the command\
    \ line. Listing 1-2 illustrates this by passing in the GUID of the High Performance\
    \ power plan as a value for the `-setactive` parameter of the `powercfg` executable.\n\
    \n```\npowercfg -setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c\nListing 1-2\n\
    Set High Performance Power Plan with PowerShell\n```\n\n### Optimizing for Background\
    \ Services\n\nIt is good practice to ensure that your server is configured to\
    \ prioritize background services over foreground applications. In practice, this\
    \ means that Windows will adapt its context switching algorithm to allow background\
    \ services, including those used by SQL Server, to have more time on the processor\
    \ than foreground applications have.\n\nTo ensure that Optimize for Background\
    \ Service is turned on, enter the System console in Control Panel and choose Advanced\
    \ System Settings. In the System Properties dialog box, select Settings within\
    \ the Performance section.\n\nOptimizing for background services can also be set\
    \ by using PowerShell. Listing 1-3 demonstrates using the set-property command\
    \ to update the `Win32PrioritySeperation` key in the Registry. The script must\
    \ be run as Administrator.\n\n```\nSet-ItemProperty -path HKLM:\\SYSTEM\\CurrentControlSet\\\
    Control\\PriorityControl -name Win32PrioritySeparation -Type DWORD -Value 24\n\
    Listing 1-3\nSetting Optimize for Background Services with Powershell\n```\n\n\
    ### Assigning User Rights\n\nDepending on the features of SQL Server that you\
    \ wish to use, you may need to grant the service account that will be running\
    \ the SQL Server service user rights assignments. These assignments allow security\
    \ principles to perform tasks on a computer. In the case of the SQL Server service\
    \ account, they provide the permissions for enabling some SQL Server functionality\
    \ where that functionality interacts with the operating system. The three most\
    \ common user rights assignments, which are not automatically granted to the service\
    \ account during installation, are discussed in the following pages.\n\n#### Initializing\
    \ the Instant File\n\nBy default, when you create or expand a file, the file is\
    \ filled with 0s. This is a process known as “zeroing out” the file, and it overwrites\
    \ any data that previously occupied the same disk space. The issue with this is\
    \ that it can take some time, especially for large files.\n\nIt is possible to\
    \ override this behavior, however, so that the files are not zeroed out. This\
    \ introduces a very small security risk, in the respect that the data that previously\
    \ existed within that disk location could still theoretically be discovered, but\
    \ this risk is so small that it is generally thought to be far outweighed by the\
    \ performance benefits.\n\nIn order to use instant file initialization, the Perform\
    \ Volume Maintenance Tasks User Rights Assignment must be granted to the service\
    \ account that is running the SQL Server Database Engine. Once this has been granted,\
    \ SQL Server will automatically use instant file initialization. No other configuration\
    \ is required.\n\nTo grant the assignment through Windows GUI, open the Local\
    \ Security Policy from Control Panel ➤ System and Security ➤ Administrative Tools,\
    \ before drilling through Local Policies ➤ User Rights Assignment. This will display\
    \ a full list of assignments. Scroll down until you find Perform Volume Maintenance\
    \ Tasks. This is illustrated in Figure 1-5.\n\n![../images/333037_2_En_1_Chapter/333037_2_En_1_Fig5_HTML.jpg](images/333037_2_En_1_Chapter/333037_2_En_1_Fig5_HTML.jpg)\n\
    \nFigure 1-5 Local Security Policy\n\nRight-clicking the assignment and entering\
    \ its properties will allow you to add your service account."
  raw: '#### Disk Block Size


    Another thing to consider for disk configuration, whether it is locally attached
    or on a SAN, is the disk block size. Depending on your storage, it is likely that
    the default NTFS (New Technology File System) allocation unit size will be set
    to 4KB. The issue is that SQL Server organizes data into eight continuous 8KB
    pages, known as an *extent*. To get optimum performance for SQL Server, the block
    sizes of the volumes hosting data, logs, and TempDB should be aligned with this
    and set to 64KB.


    You can check the disk block size by running the Windows PowerShell script in
    Listing [1-1](#333037_2_En_1_Chapter.xhtml#PC1), which uses `fsutil` to gather
    the NTFS properties of the volume. The script assumes that `f:` is the volume
    whose block size you wish to determine. Be sure to change this to the drive letter
    that you wish to check. Also ensure that the script is run as Administrator.


    ```

    # Populate the drive letter you want to check

    $drive = "f:"

    # Initialize outputarray

    $outputarray = new-object PSObject

    $outputarray | add-member NoteProperty Drive $drive

    # Initialize output

    $output = (fsutil fsinfo ntfsinfo $drive)

    # Split each line of fsutil into a seperate array value

    foreach ($line in $output) {

    $info = $line.split('':'')

    $outputarray | add-member NoteProperty $info[0].trim().Replace('' '',''_'') $info[1].trim()

    $info = $null

    }

    # Format and display results

    $results = ''Disk Block Size for '' + $drive + '' '' + $outputarray.Bytes_Per_Cluster/1024
    + ''KB''

    $results

    Listing 1-1

    Determine Disk Block Size

    ```


    ## Operating Systems Considerations


    SQL Server has support for many operating systems, including many versions of
    Windows. It is unlikely, however, that you will want to allow SQL Server to be
    installed on any version of any operating system that is supported. For example,
    within your Windows estate, it is advisable to align a version of SQL Server with
    a specific version of Windows. This gives you two benefits.


    First, it drastically reduces the amount of testing that you need to perform to
    sign off your build. For example, imagine that you decide you will only allow
    Enterprise edition within your environment. In theory, you would still need to
    gain operational sign-off on more than a dozen versions of Windows. In contrast,
    if you allow both SQL Server Enterprise and Standard editions of SQL Server, but
    you align both editions with Windows Server 2019 Standard edition, then you would
    only require sign-off once for each of your supported editions of SQL Server.


    The second benefit is related to end-of-life cycle (EOL ) for your platforms.
    If you allow SQL Server 2017 to be installed on Windows Server 2012, the end of
    mainstream support for Windows is January 2015, as opposed to July 2021 for SQL.
    At best, this will cause complexity and outage while you upgrade Windows, and
    at worst, it could lead to extended support costs that you could have avoided.


    ## Configuring the Operating System


    Does your Windows administration team have a “gold build” for Windows Server 2019?
    Even if they do, is it optimized for SQL Server? Unless they have produced a separate
    build just for the purposes of hosting SQL Server, then the chances are that it
    will not be. The exact customizations that you will need to make are dependent
    on how the Windows build is configured, your environmental requirements, and the
    requirements of the data-tier application that your server will be hosting. The
    following sections highlight some of the changes that are often required.


    ### Note


    A *gold build* is a predefined template for the operating system that can be easily
    installed on new servers to reduce deployment time and enforce consistency.


    ### Setting the Power Plan


    It is important that you set your server to use the High Performance power plan.
    This is because if the Balanced power plan is used, then your CPU may be throttled
    back during a period of inactivity. When activity on the server kicks in again,
    you may experience a performance issue.


    You can set the power plan through the Windows GUI by opening the Power Options
    console in Control Panel and selecting the High Performance or you can use PowerShell/the
    command line. Listing [1-2](#333037_2_En_1_Chapter.xhtml#PC2) illustrates this
    by passing in the GUID of the High Performance power plan as a value for the `-setactive`
    parameter of the `powercfg` executable.


    ```

    powercfg -setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c

    Listing 1-2

    Set High Performance Power Plan with PowerShell

    ```


    ### Optimizing for Background Services


    It is good practice to ensure that your server is configured to prioritize background
    services over foreground applications. In practice, this means that Windows will
    adapt its context switching algorithm to allow background services, including
    those used by SQL Server, to have more time on the processor than foreground applications
    have.


    To ensure that Optimize for Background Service is turned on, enter the System
    console in Control Panel and choose Advanced System Settings. In the System Properties
    dialog box, select Settings within the Performance section.


    Optimizing for background services can also be set by using PowerShell. Listing
    [1-3](#333037_2_En_1_Chapter.xhtml#PC3) demonstrates using the set-property command
    to update the `Win32PrioritySeperation` key in the Registry. The script must be
    run as Administrator.


    ```

    Set-ItemProperty -path HKLM:\SYSTEM\CurrentControlSet\Control\PriorityControl
    -name Win32PrioritySeparation -Type DWORD -Value 24

    Listing 1-3

    Setting Optimize for Background Services with Powershell

    ```


    ### Assigning User Rights


    Depending on the features of SQL Server that you wish to use, you may need to
    grant the service account that will be running the SQL Server service user rights
    assignments. These assignments allow security principles to perform tasks on a
    computer. In the case of the SQL Server service account, they provide the permissions
    for enabling some SQL Server functionality where that functionality interacts
    with the operating system. The three most common user rights assignments, which
    are not automatically granted to the service account during installation, are
    discussed in the following pages.


    #### Initializing the Instant File


    By default, when you create or expand a file, the file is filled with 0s. This
    is a process known as “zeroing out” the file, and it overwrites any data that
    previously occupied the same disk space. The issue with this is that it can take
    some time, especially for large files.


    It is possible to override this behavior, however, so that the files are not zeroed
    out. This introduces a very small security risk, in the respect that the data
    that previously existed within that disk location could still theoretically be
    discovered, but this risk is so small that it is generally thought to be far outweighed
    by the performance benefits.


    In order to use instant file initialization, the Perform Volume Maintenance Tasks
    User Rights Assignment must be granted to the service account that is running
    the SQL Server Database Engine. Once this has been granted, SQL Server will automatically
    use instant file initialization. No other configuration is required.


    To grant the assignment through Windows GUI, open the Local Security Policy from
    Control Panel ➤ System and Security ➤ Administrative Tools, before drilling through
    Local Policies ➤ User Rights Assignment. This will display a full list of assignments.
    Scroll down until you find Perform Volume Maintenance Tasks. This is illustrated
    in Figure [1-5](#333037_2_En_1_Chapter.xhtml#Fig5).


    ![../images/333037_2_En_1_Chapter/333037_2_En_1_Fig5_HTML.jpg](images/333037_2_En_1_Chapter/333037_2_En_1_Fig5_HTML.jpg)


    Figure 1-5


    Local Security Policy


    Right-clicking the assignment and entering its properties will allow you to add
    your service account.'
  trans: "# 磁盘块大小\n\n配置磁盘时（无论是本地连接还是 SAN 上的磁盘），另一个需要考虑的因素是磁盘块大小。根据你的存储情况，默认的 NTFS（新技术文件系统）分配单元大小很可能被设置为\
    \ 4KB。问题在于，SQL Server 将数据组织为八个连续的 8KB 页面，称为一个`区`。为了获得 SQL Server 的最佳性能，托管数据、日志和\
    \ TempDB 的卷的块大小应该与此对齐，并设置为 64KB。\n\n你可以通过运行清单 1-1 中的 Windows PowerShell 脚本来检查磁盘块大小，该脚本使用`fsutil`来收集卷的\
    \ NTFS 属性。脚本假定`f:`是你希望确定其块大小的卷。请务必将此更改为你希望检查的驱动器盘符。同时确保以管理员身份运行该脚本。\n\n```\n#\
    \ 填入你要检查的驱动器盘符\n$drive = \"f:\"\n# 初始化输出对象\n$outputarray = new-object PSObject\n\
    $outputarray | add-member NoteProperty Drive $drive\n# 初始化输出\n$output = (fsutil\
    \ fsinfo ntfsinfo $drive)\n# 将 fsutil 的每一行拆分为单独的数组值\nforeach ($line in $output)\
    \ {\n    $info = $line.split(':')\n    $outputarray | add-member NoteProperty\
    \ $info[0].trim().Replace(' ','_') $info[1].trim()\n    $info = $null\n}\n# 格式化并显示结果\n\
    $results = 'Disk Block Size for ' + $drive + ' ' + $outputarray.Bytes_Per_Cluster/1024\
    \ + 'KB'\n$results\nListing 1-1\n确定磁盘块大小\n```\n\n## 操作系统考虑因素\n\nSQL Server 支持许多操作系统，包括多个版本的\
    \ Windows。然而，你很可能不希望允许在支持的任何操作系统版本上安装 SQL Server。例如，在你的 Windows 环境中，建议将特定版本的 SQL\
    \ Server 与特定版本的 Windows 对齐。这会带来两个好处。\n\n首先，这极大地减少了你为验收构建所需的测试工作量。例如，假设你决定只允许在你的环境中使用企业版。理论上，你仍然需要对十几个\
    \ Windows 版本进行操作验收。相反，如果你同时允许 SQL Server 企业版和标准版，但都将这两个版本与 Windows Server 2019\
    \ 标准版对齐，那么你只需要为你支持的每个 SQL Server 版本进行一次验收。\n\n第二个好处与平台的生命周期结束（EOL）相关。如果你允许 SQL\
    \ Server 2017 安装在 Windows Server 2012 上，Windows 的主流支持结束日期是 2015 年 1 月，而 SQL Server\
    \ 是 2021 年 7 月。往好了说，这会在你升级 Windows 时导致复杂性和停机；往坏了说，可能会导致本可避免的扩展支持成本。\n\n## 配置操作系统\n\
    \n你的 Windows 管理团队是否有针对 Windows Server 2019 的“黄金构建”？即使他们有，这个构建是针对 SQL Server 优化的吗？除非他们专门为托管\
    \ SQL Server 制作了一个单独的构建，否则很可能没有。你需要的确切定制取决于 Windows 构建的配置方式、你的环境要求以及你的服务器将托管的数据层应用程序的要求。以下部分重点介绍了一些通常需要的更改。\n\
    \n### 注意\n\n*黄金构建*是操作系统的预定义模板，可以轻松安装到新服务器上，以减少部署时间并确保一致性。\n\n### 设置电源计划\n\n将你的服务器设置为使用高性能电源计划非常重要。这是因为如果使用平衡电源计划，那么在空闲期间你的\
    \ CPU 可能会被限制。当服务器活动再次开始时，你可能会遇到性能问题。\n\n你可以通过 Windows GUI 设置电源计划：打开控制面板中的“电源选项”控制台并选择“高性能”；或者你也可以使用\
    \ PowerShell/命令行。清单 1-2 通过将高性能电源计划的 GUID 作为`powercfg`可执行文件的`-setactive`参数的值传入来说明了这一点。\n\
    \n```\npowercfg -setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c\nListing 1-2\n\
    使用 PowerShell 设置高性能电源计划\n```\n\n### 优化后台服务\n\n确保你的服务器配置为优先考虑后台服务而非前台应用程序是良好实践。在实践中，这意味着\
    \ Windows 将调整其上下文切换算法，允许后台服务（包括 SQL Server 使用的那些）在处理器上拥有比前台应用程序更多的时间。\n\n要确保“优化后台服务”已开启，进入控制面板的“系统”控制台，选择“高级系统设置”。在“系统属性”对话框中，选择“性能”部分内的“设置”。\n\
    \n优化后台服务也可以通过使用 PowerShell 来设置。清单 1-3 演示了使用 set-property 命令更新注册表中的`Win32PrioritySeperation`键。该脚本必须以管理员身份运行。\n\
    \n```\nSet-ItemProperty -path HKLM:\\SYSTEM\\CurrentControlSet\\Control\\PriorityControl\
    \ -name Win32PrioritySeparation -Type DWORD -Value 24\nListing 1-3\n使用 PowerShell\
    \ 设置“优化后台服务”\n```\n\n### 分配用户权限\n\n根据你希望使用的 SQL Server 功能，你可能需要为运行 SQL Server\
    \ 服务的服务账户授予用户权限分配。这些分配允许安全主体在计算机上执行任务。对于 SQL Server 服务账户而言，它们为那些与操作系统交互的功能提供了启用某些\
    \ SQL Server 功能的权限。以下将讨论三个最常见的用户权限分配，这些权限在安装期间不会自动授予服务账户。\n\n#### 初始化即时文件\n\n\
    默认情况下，当你创建或扩展文件时，该文件会被填充为 0。这个过程被称为“清零”文件，它会覆盖先前占用同一磁盘空间的任何数据。这样做的问题在于它可能需要一些时间，特别是对于大文件。\n\
    \n然而，可以覆盖此行为，使文件不清零。这会引入一个非常小的安全风险，即理论上仍然可以发现先前存在于该磁盘位置的数据，但这个风险如此之小，通常认为其远小于带来的性能收益。\n\
    \n为了使用即时文件初始化，必须向运行 SQL Server 数据库引擎的服务账户授予“执行卷维护任务”用户权限分配。一旦授予，SQL Server 将自动使用即时文件初始化。无需其他配置。\n\
    \n要通过 Windows GUI 授予该分配，从控制面板 ➤ 系统和安全 ➤ 管理工具中打开“本地安全策略”，然后依次展开“本地策略” ➤ “用户权限分配”。这将显示完整的分配列表。向下滚动直到找到“执行卷维护任务”。如图\
    \ 1-5 所示。\n\n![../images/333037_2_En_1_Chapter/333037_2_En_1_Fig5_HTML.jpg](img/333037_2_En_1_Fig5_HTML.jpg)\n\
    \n图 1-5 本地安全策略\n\n右键单击该分配并进入其属性，将允许你添加你的服务账户。"
- fmt: '#### Locking Pages in Memory


    If Windows is experiencing memory pressure, it will attempt to page data from
    RAM into virtual memory on disk. This can cause an issue within SQL Server. In
    order to provide acceptable performance, SQL Server caches recently used data
    pages in the buffer cache, which is an area of memory reserved by the `Database
    Engine`. In fact, all data pages are read from the buffer cache, even if they
    need to be read from disk first. If Windows decides to move pages from the buffer
    cache out to disk, the performance of your instance will be severely impaired.


    In order to avoid this occurrence, it is possible to lock the pages of the buffer
    cache in memory, as long as you are using the Enterprise or Standard edition of
    SQL Server 2019. To do this, you simply need to grant the service account that
    is running the `Database Engine` the `Lock Pages in Memory` assignment using the
    same method as for `Perform Volume Maintenance Tasks`.


    ### Caution


    If you are installing SQL Server on a virtual machine, depending on the configuration
    of your virtual platform, you may not be able to set `Lock Pages in Memory`, because
    it may interfere with the balloon driver. The balloon driver is used by the virtualization
    platform to reclaim memory from the guest operating system. You should discuss
    this with your virtual platform administrator.


    #### SQL Audit to the Event Log


    If you are planning to use `SQL Audit` to capture activity within your instance,
    you will have the option of saving the generated events to a file, to the security
    log, or to the application log. The security log will be the most appropriate
    location if your enterprise has high security requirements.


    In order to allow generated events to be written to the security log, the service
    account that runs the `Database Engine` must be granted the `Generate Security
    Audits` User Rights Assignment. This can be achieved through the `Local Security
    Policy` console.


    An additional step, in order for SQL Server to be able to write audit events to
    the security log, is to configure the `Audit Application Generated` setting. This
    can be located in the `Local Security Policy` console, by drilling through `Advanced
    Audit Policy Configuration` ➤ `System Audit Policies` ➤ `Object Access`. The properties
    of the `Audit Application Generated` event can then be modified as illustrated
    in Figure [1-6](#333037_2_En_1_Chapter.xhtml#Fig6).


    ![../images/333037_2_En_1_Chapter/333037_2_En_1_Fig6_HTML.jpg](images/333037_2_En_1_Chapter/333037_2_En_1_Fig6_HTML.jpg)


    Figure 1-6


    Audit Application Generated Properties


    ### Caution


    You need to ensure that your policies are not overridden by policies implemented
    at the `GPO` level. If this is the case, you should ask your `AD` (Active Directory)
    administrator to move your servers into a separate `OU` (Organizational Unit)
    with a less restrictive policy.


    ## Selecting Features


    When installing SQL Server, it may be tempting to install every feature in case
    you need it at some point. For the performance, manageability, and security of
    your environment, however, you should always adhere to the `YAGNI` (you aren’t
    going to need it) principle. The `YAGNI` principle derives from extreme programming
    methodology, but it also holds true for the platform. The premise is that you
    do the simplest thing that will work. This will save you from issues related to
    complexity. Remember that additional features can be installed later. The following
    sections provide an overview of the main features you can select during an installation
    of SQL Server 2019 Enterprise edition.


    ### Database Engine Service


    The `Database Engine` is the core service within the SQL Server suite. It contains
    the `SQLOS` (the part of the database engine responsible for tasks such as memory
    management, scheduling, lock and deadlock management), the `Storage Engine`, and
    the `Relational Engine`, as illustrated in Figure [1-7](#333037_2_En_1_Chapter.xhtml#Fig7).
    It is responsible for securing, processing, and optimizing access to relational
    data. It also contains replication components, in-database machine learning services,
    full-text and semantic extractions for search, the `Polybase` query service, and
    the `DQS` Server features, which can be selected optionally. Replication is a
    set of tools that allows you to disperse data. In-database machine learning services
    provide `Python` and `R` integration; semantic extractions allow you to use full
    text to search for the meaning of words rather than just keywords themselves.
    `Polybase` query service allows you to run `T-SQL` against `Hadoop` data sources.
    `DQS` Server is a tool that allows you to easily find and cleanse inconsistent
    data. This book focuses primarily on core `Database Engine` functionality.


    ![../images/333037_2_En_1_Chapter/333037_2_En_1_Fig7_HTML.jpg](images/333037_2_En_1_Chapter/333037_2_En_1_Fig7_HTML.jpg)


    Figure 1-7


    Database Engine architecture


    ### Analysis Services


    `SSAS` (SQL Server Analysis Services) is a set of tools that can be harnessed
    for the analytical processing and data mining of data. It can be installed in
    one of three modes:


    *   Multidimensional and data mining


    *   Tabular


    *   PowerPivot for SharePoint


    Multidimensional and data mining mode will provide the capability to host multidimensional
    cubes. Cubes offer the ability to store aggregated data, known as *measures*,
    that can be sliced and diced across multiple dimensions, and provide the basis
    of responsive, intuitive, and complex reports and pivot tables. Developers can
    query the cubes by using the multidimensional expressions (`MDX`) language.


    Tabular mode gives users the ability to host data in Microsoft’s BI semantic model.
    This model uses `xVelocity` to provide in-memory analytics, offering integration
    between relational and nonrelational data sources, and provides `KPIs` (key performance
    indicators), calculations, and multilevel hierarchies. Instead of using dimensions
    and measures, the tabular model uses tables, columns, and relationships.


    PowerPivot is an extension for `Excel`, which, like the tabular model, uses `xVelocity`
    to perform in-memory analytics and can be used for data sets up to 2GB in size.
    The `PowerPivot for SharePoint` installation expands on this by running `Analysis
    Services` in SharePoint mode, and it offers both server-side processing and browser-based
    interaction with PowerPivot workbooks; it also supports `Power View` reports and
    `Excel` workbooks through `SharePoint Excel Services`.


    ### Machine Learning Server


    The `Machine Learning Server` is a service which provides support for the `R`
    and `Python` languages. It also provides a combination of `R` packages, `Python`
    packages, interpreters, and infrastructure, providing the ability to create both
    data science and machine learning solutions. These solutions can then import,
    explore, and analyze heterogeneous data sets.


    ### Data Quality Client


    The `Data Quality Server` is installed as an optional component of the `Database
    Engine`, as mentioned earlier. The `Data Quality Client`, however, can be installed
    as a shared feature. A shared feature is installed only once on a server and is
    shared by all instances of SQL Server on that machine. The Client is a `GUI` that
    allows you to administer `DQS` as well as perform data-matching and data-cleansing
    activities.


    ### Client Connectivity Tools


    `Client Connectivity Tools` is a set of components for client/server communication.
    This includes the `OLEDB`, `ODBC`, `ADODB`, and `OLAP` network libraries.'
  raw: '#### Locking Pages in Memory


    If Windows is experiencing memory pressure, it will attempt to page data from
    RAM into virtual memory on disk. This can cause an issue within SQL Server. In
    order to provide acceptable performance, SQL Server caches recently used data
    pages in the buffer cache, which is an area of memory reserved by the Database
    Engine. In fact, all data pages are read from the buffer cache, even if they need
    to be read from disk first. If Windows decides to move pages from the buffer cache
    out to disk, the performance of your instance will be severely impaired.


    In order to avoid this occurrence, it is possible to lock the pages of the buffer
    cache in memory, as long as you are using the Enterprise or Standard edition of
    SQL Server 2019\. To do this, you simply need to grant the service account that
    is running the Database Engine the Lock Pages in Memory assignment using the same
    method as for Perform Volume Maintenance Tasks.


    ### Caution


    If you are installing SQL Server on a virtual machine, depending on the configuration
    of your virtual platform, you may not be able to set Lock Pages in Memory, because
    it may interfere with the balloon driver. The balloon driver is used by the virtualization
    platform to reclaim memory from the guest operating system. You should discuss
    this with your virtual platform administrator.


    #### SQL Audit to the Event Log


    If you are planning to use SQL Audit to capture activity within your instance,
    you will have the option of saving the generated events to a file, to the security
    log, or to the application log. The security log will be the most appropriate
    location if your enterprise has high security requirements.


    In order to allow generated events to be written to the security log, the service
    account that runs the Database Engine must be granted the Generate Security Audits
    User Rights Assignment. This can be achieved through the Local Security Policy
    console.


    An additional step, in order for SQL Server to be able to write audit events to
    the security log, is to configure the Audit Application Generated setting. This
    can be located in the Local Security Policy console, by drilling through Advanced
    Audit Policy Configuration ➤ System Audit Policies ➤ Object Access. The properties
    of the Audit Application Generated event can then be modified as illustrated in
    Figure [1-6](#333037_2_En_1_Chapter.xhtml#Fig6).


    ![../images/333037_2_En_1_Chapter/333037_2_En_1_Fig6_HTML.jpg](images/333037_2_En_1_Chapter/333037_2_En_1_Fig6_HTML.jpg)


    Figure 1-6


    Audit Application Generated Properties


    ### Caution


    You need to ensure that your policies are not overridden by policies implemented
    at the GPO level. If this is the case, you should ask your AD (Active Directory)
    administrator to move your servers into a separate OU (Organizational Unit) with
    a less restrictive policy.


    ## Selecting Features


    When installing SQL Server, it may be tempting to install every feature in case
    you need it at some point. For the performance, manageability, and security of
    your environment, however, you should always adhere to the YAGNI (you aren’t going
    to need it) principle. The YAGNI principle derives from extreme programming methodology,
    but it also holds true for the platform. The premise is that you do the simplest
    thing that will work. This will save you from issues related to complexity. Remember
    that additional features can be installed later. The following sections provide
    an overview of the main features you can select during an installation of SQL
    Server 2019 Enterprise edition.


    ### Database Engine Service


    The Database Engine is the core service within the SQL Server suite. It contains
    the SQLOS (the part of the database engine responsible for tasks such as memory
    management, scheduling, lock and deadlock management), the Storage Engine, and
    the Relational Engine, as illustrated in Figure [1-7](#333037_2_En_1_Chapter.xhtml#Fig7).
    It is responsible for securing, processing, and optimizing access to relational
    data. It also contains replication components, in-database machine learning services,
    full-text and semantic extractions for search, the Polybase query service, and
    the DQS Server features, which can be selected optionally. Replication is a set
    of tools that allows you to disperse data. In-database machine learning services
    provide Python and R integration; semantic extractions allow you to use full text
    to search for the meaning of words rather than just keywords themselves. Polybase
    query service allows you to run T-SQL against Hadoop data sources. DQS Server
    is a tool that allows you to easily find and cleanse inconsistent data. This book
    focuses primarily on core Database Engine functionality.


    ![../images/333037_2_En_1_Chapter/333037_2_En_1_Fig7_HTML.jpg](images/333037_2_En_1_Chapter/333037_2_En_1_Fig7_HTML.jpg)


    Figure 1-7


    Database Engine architecture


    ### Analysis Services


    SSAS (SQL Server Analysis Services) is a set of tools that can be harnessed for
    the analytical processing and data mining of data. It can be installed in one
    of three modes:


    *   Multidimensional and data mining


    *   Tabular


    *   PowerPivot for SharePoint


    Multidimensional and data mining mode will provide the capability to host multidimensional
    cubes. Cubes offer the ability to store aggregated data, known as *measures*,
    that can be sliced and diced across multiple dimensions, and provide the basis
    of responsive, intuitive, and complex reports and pivot tables. Developers can
    query the cubes by using the multidimensional expressions (MDX) language.


    Tabular mode gives users the ability to host data in Microsoft’s BI semantic model.
    This model uses xVelocity to provide in-memory analytics, offering integration
    between relational and nonrelational data sources, and provides KPIs (key performance
    indicators), calculations, and multilevel hierarchies. Instead of using dimensions
    and measures, the tabular model uses tables, columns, and relationships.


    PowerPivot is an extension for Excel, which, like the tabular model, uses xVelocity
    to perform in-memory analytics and can be used for data sets up to 2GB in size.
    The PowerPivot for SharePoint installation expands on this by running Analysis
    Services in SharePoint mode, and it offers both server-side processing and browser-based
    interaction with PowerPivot workbooks; it also supports Power View reports and
    Excel workbooks through SharePoint Excel Services.


    ### Machine Learning Server


    The Machine Learning Server is a service which provides support for the R and
    Python languages. It also provides a combination of R packages, Python packages,
    interpreters, and infrastructure, providing the ability to create both data science
    and machine learning solutions. These solutions can then import, explore, and
    analyze heterogeneous data sets.


    ### Data Quality Client


    The Data Quality Server is installed as an optional component of the Database
    Engine, as mentioned earlier. The Data Quality Client, however, can be installed
    as a shared feature. A shared feature is installed only once on a server and is
    shared by all instances of SQL Server on that machine. The Client is a GUI that
    allows you to administer DQS as well as perform data-matching and data-cleansing
    activities.


    ### Client Connectivity Tools


    Client Connectivity Tools is a set of components for client/server communication.
    This includes the OLEDB, ODBC, ADODB, and OLAP network libraries.'
  trans: '

    #### 在内存中锁定页面


    如果 Windows 遇到内存压力，它会尝试将数据页从 RAM 分页到磁盘上的虚拟内存。这可能会在 SQL Server 内引发问题。为了提供可接受的性能，SQL
    Server 会将最近使用的数据页缓存在缓冲区缓存中，这是由 `数据库引擎` 保留的内存区域。实际上，所有数据页都是从缓冲区缓存中读取的，即使它们需要先从磁盘读取。如果
    Windows 决定将页面从缓冲区缓存移出到磁盘，你的实例性能将受到严重影响。


    为了避免这种情况的发生，只要使用的是 SQL Server 2019 企业版或标准版，就可以将缓冲区缓存的页面锁定在内存中。为此，你只需使用与授予 `执行卷维护任务`
    权限相同的方法，授予运行 `数据库引擎` 的服务账户 `在内存中锁定页面` 的权限。


    ### 注意


    如果你在虚拟机上安装 SQL Server，根据虚拟平台的配置，你可能无法设置 `在内存中锁定页面`，因为它可能会干扰气球驱动程序。气球驱动程序是虚拟化平台用来从客户操作系统回收内存的。你应该与你的虚拟平台管理员讨论此事。


    #### SQL 审核到事件日志


    如果你计划使用 `SQL 审核` 来捕获实例内的活动，你可以选择将生成的事件保存到文件、安全日志或应用程序日志。如果你的企业有高安全性要求，安全日志将是最合适的位置。


    为了允许将生成的事件写入安全日志，必须授予运行 `数据库引擎` 的服务账户 `生成安全审核` 的用户权限分配。这可以通过 `本地安全策略` 控制台实现。


    另一个必要的步骤是，为了使 SQL Server 能够将审核事件写入安全日志，需要配置 `审核应用程序生成的` 设置。这可以在 `本地安全策略` 控制台中找到，路径是：`高级审核策略配置`
    ➤ `系统审核策略` ➤ `对象访问`。然后，可以如图 1-6 所示，修改 `审核应用程序生成的` 事件的属性。


    ![../images/333037_2_En_1_Chapter/333037_2_En_1_Fig6_HTML.jpg](img/333037_2_En_1_Fig6_HTML.jpg)


    图 1-6


    审核应用程序生成的属性


    ### 注意


    你需要确保你的策略没有被 `组策略对象` 级别实施的策略覆盖。如果是这种情况，你应该要求你的 `AD`（活动目录）管理员将你的服务器移动到具有限制性较弱策略的单独
    `OU`（组织单位）中。


    ## 选择功能


    在安装 SQL Server 时，可能会诱人安装所有功能，以备将来不时之需。然而，为了你的环境的性能、可管理性和安全性，你应该始终遵循 `YAGNI`（你不会需要它）原则。`YAGNI`
    原则源于极限编程方法学，但它同样适用于该平台。其前提是做最简单且能工作的事情。这将使你免于复杂性相关的问题。请记住，额外的功能可以在以后安装。以下各节概述了在安装
    SQL Server 2019 企业版时可以选择的主要功能。


    ### 数据库引擎服务


    `数据库引擎` 是 SQL Server 套件中的核心服务。它包含 `SQLOS`（数据库引擎中负责内存管理、调度、锁和死锁管理等任务的部分）、`存储引擎`
    和 `关系引擎`，如图 1-7 所示。它负责保护、处理和优化对关系数据的访问。它还包含可选择安装的复制组件、数据库内机器学习服务、用于搜索的全文和语义提取、`Polybase`
    查询服务和 `DQS` 服务器功能。复制是一组允许你分散数据的工具。数据库内机器学习服务提供 `Python` 和 `R` 集成；语义提取允许你使用全文来搜索词语的含义，而不仅仅是关键字本身。`Polybase`
    查询服务允许你针对 `Hadoop` 数据源运行 `T-SQL`。`DQS` 服务器是一个工具，可让你轻松查找和清理不一致的数据。本书主要关注核心的 `数据库引擎`
    功能。


    ![../images/333037_2_En_1_Chapter/333037_2_En_1_Fig7_HTML.jpg](img/333037_2_En_1_Fig7_HTML.jpg)


    图 1-7


    数据库引擎架构


    ### 分析服务


    `SSAS`（SQL Server 分析服务）是一组可用于数据分析和处理与数据挖掘的工具。它可以通过以下三种模式之一安装：


    *   多维和数据挖掘


    *   表格


    *   用于 SharePoint 的 PowerPivot


    多维和数据挖掘模式将提供托管多维数据集的能力。数据集聚合数据（称为 *度量值*）并存储，可以跨多个维度进行切片和切块，并提供响应迅速、直观且复杂的报告和数据透视表的基础。开发人员可以使用多维表达式（`MDX`）语言查询数据集。


    表格模式使用户能够以 Microsoft 的 BI 语义模型托管数据。该模型使用 `xVelocity` 提供内存中分析功能，实现关系和非关系数据源之间的集成，并提供
    `KPI`（关键绩效指标）、计算和多级层次结构。与使用维度和度量值不同，表格模型使用表、列和关系。


    PowerPivot 是 `Excel` 的一个扩展，与表格模型类似，它使用 `xVelocity` 执行内存中分析，可用于大小不超过 2GB 的数据集。`用于
    SharePoint 的 PowerPivot` 安装在此基础上进行了扩展，它在 SharePoint 模式下运行 `分析服务`，提供服务器端处理以及基于浏览器与
    PowerPivot 工作簿交互；它还通过 `SharePoint Excel Services` 支持 `Power View` 报告和 `Excel`
    工作簿。


    ### 机器学习服务器


    `机器学习服务器` 是一项为 `R` 和 `Python` 语言提供支持的服务。它还提供了一套 `R` 包、`Python` 包、解释器和基础设施的组合，提供了创建数据科学和机器学习解决方案的能力。这些解决方案随后可以导入、探索和分析异构数据集。


    ### 数据质量客户端


    如前所述，`数据质量服务器` 作为 `数据库引擎` 的可选组件安装。然而，`数据质量客户端` 可以作为共享功能安装。共享功能仅在服务器上安装一次，并由该机器上的所有
    SQL Server 实例共享。该客户端是一个 `GUI`，允许你管理 `DQS` 以及执行数据匹配和数据清理活动。


    ### 客户端连接工具


    `客户端连接工具` 是一套用于客户端/服务器通信的组件。这包括 `OLEDB`、`ODBC`、`ADODB` 和 `OLAP` 网络库。

