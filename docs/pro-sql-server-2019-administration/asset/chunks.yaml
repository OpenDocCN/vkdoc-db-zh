  trans: '## 概要


    SQL Server 暴露了大量元数据，这些元数据描述了 SQL Server 内部的数据结构以及数据本身。元数据通过一系列目录视图、动态管理视图与函数、系统函数以及
    `INFORMATION_SCHEMA` 来提供访问。通常，只有当你的脚本需要迁移到其他关系型数据库管理系统产品时，才会使用 `INFORMATION_SCHEMA`。这是因为相较于
    SQL Server 特有的元数据，它提供的信息较少，但遵循 ISO 标准，因此能在所有主流关系型数据库管理系统上工作。


    本章还涵盖了关于底层操作系统以及 SQLOS 的许多有用信息。例如，你可以使用 `dm_server` 类别的动态管理视图来查找实例注册表键的详细信息，并获取实例服务的详细信息。你可以使用
    `dm_os` 类别的动态管理视图来获取许多关于 SQLOS 的内部细节，包括缓冲区缓存的当前内容。


    SQL Server 还暴露了可用于容量规划的元数据，例如数据库内所有文件的使用统计信息（例如，IO 停顿）以及剩余的自由空间量。你可以在警报开始触发、应用程序面临风险之前，主动利用这些信息来规划额外的容量需求。


    元数据也有助于故障排除和性能调优。`sys.dm_os_performance_counters` 动态管理视图允许数据库管理员检索性能监视器计数器，即使他们没有操作系统的访问权限。这可以消除团队间的依赖关系。你可以使用
    `sys.dm_os_wait_stats` 来识别实例中最常见的等待原因，这反过来有助于诊断硬件瓶颈，例如内存或 CPU 压力。`dm_exec` 类别的动态管理视图可以帮助识别开销大的查询，这些查询可以通过调优来改善性能。


    数据库管理员还可以利用元数据创建智能脚本，通过向常规维护任务中添加业务规则来减少工作量。例如，数据库管理员可以使用元数据来执行诸如动态重建仅已发生碎片的索引，或动态管理数据库快照的循环等任务。我鼓励你进一步探索元数据驱动的自动化可能性；其潜力是无穷的。


    # 18. 锁与阻塞


    锁机制是任何关系型数据库管理系统的一个基本方面，因为它允许多个并发用户访问相同数据，而不会出现其更新操作冲突并导致数据完整性问题的风险。本章讨论 SQL Server
    中锁、死锁和事务的工作原理；接着讨论事务如何影响内存中事务功能，以及数据库管理员如何观察与事务和争用相关的锁元数据。


    ## 理解锁机制


    以下部分讨论了进程如何在不同粒度级别上获取锁、哪些类型的锁彼此兼容，以及在线维护操作期间控制锁行为和锁分区的特性，后者可以提升大型系统的性能。


    ### 锁粒度


    根据请求锁的操作性质，进程可以在许多不同的粒度级别上获取锁。为了降低操作相互阻塞的影响，明智的做法是在尽可能低的粒度级别上获取锁。然而，权衡之处在于，获取锁会使用系统资源，因此如果一个操作需要在最低粒度级别上获取数百万个锁，那么效率会非常低，而在更高级别上加锁则是更合适的选择。表
    18-1 描述了可以获取锁的粒度级别。


    表 18-1

    锁粒度


    | 级别 | 描述 |

    | --- | --- |

    | `RID/KEY` | 堆上的行标识符或索引键。在可序列化事务中使用索引键锁来锁定行范围。可序列化事务将在本章后面讨论。 |

    | `PAGE` | 数据页或索引页。 |

    | `EXTENT` | 八个连续的页。 |

    | `HoBT (堆或 B 树)` | 单个索引 (`B 树`) 的堆。 |

    | `TABLE` | 整个表，包括所有索引。 |

    | `FILE` | 数据库中的一个文件。 |

    | `METADATA` | 元数据资源。 |

    | `ALLOCATION_UNIT` | 表被拆分为三个分配单元：行数据、行溢出数据和 LOB（大型对象块）数据。对分配单元的锁会锁定表的三个分配单元之一。
    |

    | `DATABASE` | 整个数据库。 |


    当 SQL Server 锁定表内的资源时，它会在层次结构中直接位于其上方的资源上获取所谓的 `意向锁`。例如，如果 SQL Server 需要锁定一个 `RID`
    或 `KEY`，它也会在包含该行的页上获取一个意向锁。如果锁管理器认为在层次结构的更高级别上加锁效率更高，则会将锁升级到更高级别。然而，值得注意的是，行锁不会升级为页锁；它们会直接升级为表锁。如果表是分区的，那么
    SQL Server 可以锁定分区而不是整个表。SQL Server 用于锁升级的阈值如下：


    *   操作在表或分区（如果表已分区）上请求超过 5000 个锁。

    *   实例内获取的锁数量超过了内存阈值。


    不过，你可以通过使用表的 `LOCK_ESCALATION` 选项来更改特定表的此行为。此选项有三个可能的值，如表 18-2 所述。


    表 18-2

    LOCK_ESCALATION 值


    | 值 | 描述 |

    | --- | --- |

    | `TABLE` | 锁升级到表级别，即使你使用的是分区表。 |

    | `AUTO` | 此值允许在分区表上将锁升级到分区，而不是整个表。 |

    | `DISABLE` | 此值禁用将锁升级到表级别，除非需要表锁来保护数据完整性。 |


    ### 在线维护的锁定行为


    在 SQL Server 中，你还可以为在线索引重建和分区 `SWITCH` 操作控制锁的行为。可用选项如表 18-3 所述。


    表 18-3

    阻塞行为


    | 选项 | 描述 |

    | --- | --- |

    | `MAX_DURATION` | 以分钟为单位指定的持续时间，在线索引重建或 `SWITCH` 操作在此时间内等待，然后触发 `ABORT_AFTER_WAIT`
    操作。 |

    | `ABORT_AFTER_WAIT` | 这些是可用的操作：• `NONE` 指定操作将继续以正常优先级等待。• `SELF` 意味着操作将被终止。• `BLOCKERS`
    意味着所有当前阻塞该操作的用户事务将被终止。 |

    | `WAIT_AT_LOW_PRIORITY` | 功能上等同于 `MAX_DURATION = 0, ABORT_AFTER_WAIT = NONE`。
    |


    清单 18-1 中的脚本创建了 `Chapter18` 数据库，其中包含一个名为 `Customers` 的表，并填充了数据。然后，该脚本演示了在重建 `dbo.customers`
    上的非聚集索引之前配置 `LOCK_ESCALATION`，指定如果任何操作阻塞重建超过 1 分钟，则应终止这些操作。'
- fmt: '### Tip


    Be sure to change the file paths to match your own configuration, before running
    the script.


    ```sql

    --Create the database

    CREATE DATABASE Chapter18

    ON  PRIMARY

    ( NAME = N''Chapter18'', FILENAME = ''F:\MSSQL\DATA\Chapter18.mdf'' ),

    FILEGROUP MemOpt CONTAINS MEMORY_OPTIMIZED_DATA  DEFAULT

    ( NAME = N''MemOpt'', FILENAME = ''F:\MSSQL\DATA\MemOpt'' )

    LOG ON

    ( NAME = N''Chapter18_log'', FILENAME = ''E:\MSSQL\DATA\Chapter18_log.ldf'' )
    ;

    GO

    USE Chapter18

    GO

    --Create and populate numbers table

    DECLARE @Numbers TABLE

    (

    Number        INT

    )

    ;WITH CTE(Number)

    AS

    (

    SELECT 1 Number

    UNION ALL

    SELECT Number + 1

    FROM CTE

    WHERE Number < 100

    )

    INSERT INTO @Numbers

    SELECT Number FROM CTE;

    --Create and populate name pieces

    DECLARE @Names TABLE

    (

    FirstName        VARCHAR(30),

    LastName        VARCHAR(30)

    );

    INSERT INTO @Names

    VALUES(''Peter'', ''Carter''),

    (''Michael'', ''Smith''),

    (''Danielle'', ''Mead''),

    (''Reuben'', ''Roberts''),

    (''Iris'', ''Jones''),

    (''Sylvia'', ''Davies''),

    (''Finola'', ''Wright''),

    (''Edward'', ''James''),

    (''Marie'', ''Andrews''),

    (''Jennifer'', ''Abraham'');

    --Create and populate Addresses table

    CREATE TABLE dbo.Addresses

    (

    AddressID        INT           NOT NULL        IDENTITY        PRIMARY KEY,

    AddressLine1     NVARCHAR(50),

    AddressLine2     NVARCHAR(50),

    AddressLine3     NVARCHAR(50),

    PostCode         NCHAR(8)

    ) ;

    INSERT INTO dbo.Addresses

    VALUES(''1 Carter Drive'', ''Hedge End'', ''Southampton'', ''SO32 6GH'')

    ,(''10 Apress Way'', NULL, ''London'', ''WC10 2FG'')

    ,(''12 SQL Street'', ''Botley'', ''Southampton'', ''SO32 8RT'')

    ,(''19 Springer Way'', NULL, ''London'', ''EC1 5GG'') ;

    --Create and populate Customers table

    CREATE TABLE dbo.Customers

    (

    CustomerID          INT          NOT NULL   IDENTITY   PRIMARY KEY,

    FirstName           VARCHAR(30)  NOT NULL,

    LastName            VARCHAR(30)  NOT NULL,

    BillingAddressID    INT          NOT NULL,

    DeliveryAddressID   INT          NOT NULL,

    CreditLimit         MONEY        NOT NULL,

    Balance             MONEY        NOT NULL

    );

    SELECT * INTO #Customers

    FROM

    (SELECT

    (SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName,

    (SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) BillingAddressID,

    (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) DeliveryAddressID,

    (SELECT TOP 1 CAST(RAND() * Number AS INT) * 10000

    FROM @Numbers

    ORDER BY NEWID()) CreditLimit,

    (SELECT TOP 1 CAST(RAND() * Number AS INT) * 9000

    FROM @Numbers

    ORDER BY NEWID()) Balance

    FROM @Numbers a

    CROSS JOIN @Numbers b

    ) a;

    INSERT INTO dbo.Customers

    SELECT * FROM #Customers;

    GO

    --This table will be used later in the chapter

    CREATE TABLE dbo.CustomersMem

    (

    CustomerID         INT            NOT NULL    IDENTITY

    PRIMARY KEY NONCLUSTERED HASH WITH(BUCKET_COUNT = 20000),

    FirstName          VARCHAR(30)    NOT NULL,

    LastName           VARCHAR(30)    NOT NULL,

    BillingAddressID   INT            NOT NULL,

    DeliveryAddressID  INT            NOT NULL,

    CreditLimit        MONEY          NOT NULL,

    Balance            MONEY          NOT NULL

    ) WITH(MEMORY_OPTIMIZED = ON) ;

    INSERT INTO dbo.CustomersMem

    SELECT

    FirstName

    , LastName

    , BillingAddressID

    , DeliveryAddressID

    , CreditLimit

    , Balance

    FROM dbo.Customers ;

    GO

    CREATE INDEX idx_LastName ON dbo.Customers(LastName)

    --Set LOCK_ESCALATION to AUTO

    ALTER TABLE dbo.Customers SET (LOCK_ESCALATION = AUTO) ;

    --Set WAIT_AT_LOW_PRIORITY

    ALTER INDEX idx_LastName ON dbo.Customers REBUILD

    WITH

    (ONLINE = ON (WAIT_AT_LOW_PRIORITY (MAX_DURATION = 1 MINUTES, ABORT_AFTER_WAIT
    = BLOCKERS))) ;

    Listing 18-1

    Configuring Table Locking Options

    ```


    ## Lock Compatibility


    A process can acquire different types of locks. These lock types are described
    in Table [18-4](#333037_2_En_18_Chapter.xhtml#Tab4).


    Table 18-4


    Lock Types


    | Type | Description |

    | --- | --- |

    | `Shared (S)` | Used for read operations. |

    | `Update (U)` | Taken out on resources that may be updated. |

    | `Exclusive (X)` | Used when data is modified. |

    | `Schema Modification (Sch-M) / Schema Stability (Sch-S)` | Schema modification
    locks are taken out when DDL statements are being run against a table. Schema
    stability locks are taken out while queries are being compiled and executed. Stability
    locks only block operations that require a schema modification lock, whereas schema
    modification locks block all access to a table. |

    | `Bulk Update (BU)` | Bulk update locks are used during bulk load operations
    to allow multiple threads to parallel load data to a table while blocking other
    processes. |

    | `Key-range` | Key-range locks are taken on a range of rows when using pessimistic
    isolation levels. Isolation levels are discussed later in this chapter. |

    | `Intent` | Intent locks are used to protect resources lower in the lock hierarchy
    by signaling their intent to acquire a shared or exclusive lock. |


    Intent locks improve performance, because they are only examined at the table
    level, which negates the need to examine every row or page before another operation
    acquires a lock. The types of intent lock that can be acquired are described in
    Table [18-5](#333037_2_En_18_Chapter.xhtml#Tab5).


    Table 18-5


    Intent Lock Types


    | Type | Description |

    | --- | --- |

    | Intent shared (`IS`) | Protects shared locks on some resources at the lower
    level of the hierarchy |

    | Intent exclusive (`IX`) | Protects shared and exclusive locks on some resources
    at the lower level of the hierarchy |

    | Shared with intent exclusive (`SIX`) | Protects shared locks on all resources
    and exclusive locks on some resources at the lower level of the hierarchy |

    | Intent update (`IU`) | Protects update locks on all resources at the lower level
    of the hierarchy |

    | Shared intent update (`SIU`) | The resultant set of `S` and `IU` locks |

    | Update intent exclusive (`UIX`) | The resultant set of `X` and `IU` locks |


    The matrix in Figure [18-1](#333037_2_En_18_Chapter.xhtml#Fig1) shows basic lock
    compatibility. You can find a complete matrix of lock compatibility at `[http://msdn.microsoft.com](http://msdn.microsoft.com)`.


    ![`../images/333037_2_En_18_Chapter/333037_2_En_18_Fig1_HTML.jpg`](images/333037_2_En_18_Chapter/333037_2_En_18_Fig1_HTML.jpg)


    Figure 18-1


    Lock compatibility matrix


    ## Lock Partitioning


    It is possible for locks on frequently accessed resources to become a bottleneck.
    For this reason, SQL Server automatically applies a feature called lock partitioning
    for any instance that has affinity with more than 16 cores. Lock partitioning
    reduces contention by dividing a single lock resource into multiple resources.
    This means that contention is reduced on shared resources such as the memory used
    by the lock resource structure.


    ## Understanding Deadlocks


    Because of the very nature of locking, operations need to wait until a lock has
    been released before they can acquire their own lock on a resource. A problem
    can occur, however, if two separate processes have taken out locks on different
    resources, but both are blocked, waiting for the other to complete. This is known
    as a deadlock.'
