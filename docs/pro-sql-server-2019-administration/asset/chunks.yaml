- fmt: '| Column | Description |

    | --- | --- |

    | `pool_id` | The unique ID of the resource pool |

    | `volume_name` | The name of the disk volume |

    | `min_iops_per_volume` | The current configuration for the minimum number of
    IOPS per volume for the resource pool |

    | `max_iops_per_volume` | The current configuration for the maximum number of
    IOPS per volume for the resource pool |

    | `read_ios_queued_total` | The total read IOs queued for the resource pool against
    this volume since the last time the statistics were reset |

    | `read_ios_issued_total` | The total read IOs issued for the resource pool against
    this volume since the last time the statistics were reset |

    | `read_ios_completed_total` | The total read IOs completed for the resource pool
    against this volume since the last time the statistics were reset |

    | `read_bytes_total` | The total bytes read for the resource pool against this
    volume since the last time the statistics were reset |

    | `read_io_stall_total_ms` | The cumulative time between read IO operations being
    issued and completed for the resource pool against this volume since the last
    time the statistics were reset |

    | `read_io_stall_queued_ms` | The cumulative time between read IO operations arriving
    and being completed for the resource pool against this volume since the last time
    the statistics were reset |

    | `write_ios_queued_total` | The total write IOs queued for the resource pool
    against this volume since the last time the statistics were reset |

    | `write_ios_issued_total` | The total write IOs issued for the resource pool
    against this volume since the last time the statistics were reset |

    | `write_ios_completed_total` | The total write IOs completed for the resource
    pool against this volume since the last time the statistics were reset |

    | `write_bytes_total` | The total bytes written for the resource pool against
    this volume since the last time the statistics were reset |

    | `write_io_stall_total_ms` | The cumulative time between write IO operations
    being issued and completed for the resource pool against this volume since the
    last time the statistics were reset |

    | `write_io_stall_queued_ms` | The cumulative time between write IO operations
    arriving and being completed for the resource pool against this volume since the
    last time the statistics were reset |

    | `io_issue_violations_total` | The total number of times that more IO operations
    were performed against the resource pool and volume than are allowed by the configuration
    |

    | `io_issue_delay_total_ms` | The total time between when IO operations were scheduled
    to be issued and when they were actually issued |


    You can use the `sys.dm_resource_governor_resource_pool_volumes` DMV to determine
    if your resource pool configuration is causing latency by adding the `read_io_stall_queued_ms`
    and `write_io_stall_queued_ms` and then subtracting this value from the total
    of `read_io_stall_total_ms` added to `write_io_stall_total_ms`, as shown in Listing
    [24-10](#333037_2_En_24_Chapter.xhtml#PC10). This script first alters the default
    resource pool so that IOPS are governed before subsequently reporting on IO stalls.


    ### Tip


    Remember that you are likely to see far fewer write operations than read operations
    in user-defined resource pools. This is because the vast majority of write operations
    are system operations and, therefore, they take place within the internal resource
    pool.


    ```

    ALTER RESOURCE POOL [default] WITH(

    min_iops_per_volume=50,

    max_iops_per_volume=100) ;

    ALTER RESOURCE GOVERNOR RECONFIGURE ;

    SELECT

    rp.name ResourcePoolName

    ,pv.volume_name

    ,pv.read_io_stall_total_ms

    ,pv.write_io_stall_total_ms

    ,pv.read_io_stall_queued_ms

    ,pv.write_io_stall_queued_ms

    ,(pv.read_io_stall_total_ms + pv.write_io_stall_total_ms)

    - (pv.read_io_stall_queued_ms + pv.write_io_stall_queued_ms) GovernorLatency

    FROM sys.dm_resource_governor_resource_pool_volumes pv

    RIGHT JOIN sys.dm_resource_governor_resource_pools rp

    ON pv.pool_id = rp.pool_id ;

    ```

    Listing 24-10: Discovering If Resource Pool Configuration Is Causing Disk Latency


    ### Tip


    If you do not see any IO stalls, create a database on a low-performance drive
    and run some intensive queries against it before you rerun the query in Listing
    [24-10](#333037_2_En_24_Chapter.xhtml#PC10).


    ## Summary


    Resource Governor allows you to throttle applications at the SQL Server instance
    level. You can use it to limit a request’s memory, CPU, and disk usage. You can
    also use it to affinitize a category of requests with specific scheduler or NUMA
    ranges or to reduce the `MAXDOP` for a category of requests.


    A resource pool represents a set of server resources, and a workload group is
    a logical container for similar requests that have been classified in the same
    way. Resource Governor provides an internal resource pool and workload group for
    system requests and a default resource pool and workload group as a catch-all
    for any requests that have not been classified. Although the internal resource
    pool cannot be modified, user-defined resource pools have a one-to-many relationship
    with workload groups.


    Requests made to SQL Server are classified using a user-defined function, which
    the DBA must create. This function must be a scalar function that returns the
    `sysname` data type. It must also be schema-bound and reside in the Master database.
    DBAs can use system functions, such as `USER_SNAME()`, `IS_MEMBER()`, and `HOST_NAME()`,
    to assist them with the classification.


    SQL Server provides four dynamic management views (DMVs) that DBAs can use to
    help monitor Resource Governor configuration and usage. DBAs can also monitor
    Resource Governor usage using Performance Monitor, however, and this gives them
    the advantage of a visual representation of the data. When taking this approach,
    you will find that Performance Monitor exposes counter categories for resource
    pools and workload groups for each instance that resides on the server. The counters
    within these categories have one instance for each resource pool or workload group,
    respectively, that is currently configured on the instance.


