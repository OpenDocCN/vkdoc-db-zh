    The potential occasions where this data may prove invaluable are almost limitless.
    The script in Listing 17-20 demonstrates how this data could be used to determine
    the maximum log sequence number in a critical table, in preparation for a restore
    activity. The DBA can then use the maximum LSN, to ensure that a point-in-time
    restore captures the latest modifications to the critical data.


    ```sql

    CREATE DATABASE Chapter17

    GO

    ALTER DATABASE Chapter17

    SET RECOVERY FULL

    GO

    USE Chapter17

    GO

    CREATE TABLE dbo.CriticalData (

    ID    INT    IDENTITY    PRIMARY KEY    NOT NULL,

    ImportantData    NVARCHAR(128) NOT NULL

    )

    INSERT INTO dbo.CriticalData(ImportantData)

    VALUES(''My Very Important Value'')

    GO

    SELECT MAX(page_info.page_lsn)

    FROM dbo.CriticalData c

    CROSS APPLY sys.fn_PageResCracker(%%physloc%%) AS r

    CROSS APPLY sys.dm_db_page_info(DB_ID(), r.file_id, r.page_id, ''DETAILED'') AS
    page_info

    ```

    Listing 17-20 Find the Most Recent LSN to Modify a Table


    # 元数据驱动自动化


    You can use metadata to drive intelligent scripts that you can use to automate
    routine DBA maintenance tasks while at the same time incorporating business logic.
    In the following sections, you see how you can use metadata to generate rolling
    database snapshots and also to rebuild only those indexes that are fragmented.'
