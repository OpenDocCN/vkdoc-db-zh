- fmt: 'So these are the events, event fields, and actions that we include in our
    session definition (see Listing [21-8](#333037_2_En_21_Chapter.xhtml#PC8)).


    ### Tip


    If you do not include all recommended events, event fields, and actions, then
    errors may be thrown when you convert the `.xel` file to a `.trc` file. A workaround
    here is to use trace flag `-T28` when running `ReadTrace` in order to ignore the
    RML requirements. This can lead to unpredictable results, however, and is not
    advised.'
  raw: 'So these are the events, event fields, and actions that we include in our
    session definition (see Listing [21-8](#333037_2_En_21_Chapter.xhtml#PC8)).


    ### Tip


    If you do not include all recommended events, event fields, and actions, then
    errors may be thrown when you convert the `.xel` file to a `.trc` file. A workaround
    here is to use trace flag -T28 when running `ReadTrace` in order to ignore the
    RML requirements. This can lead to unpredictable results, however, and is not
    advised.'
  trans: '

    因此，以上即为我们包含在会话定义中的事件、事件字段与操作（参见清单 21-8）。


    ### 提示


    若未包含所有推荐的事件、事件字段和操作，则在将`.xel`文件转换为`.trc`文件时可能会引发错误。此处的解决方法是运行`ReadTrace`时使用跟踪标志`-T28`来忽略
    RML 要求。但这可能导致不可预知的结果，故不建议采用。

