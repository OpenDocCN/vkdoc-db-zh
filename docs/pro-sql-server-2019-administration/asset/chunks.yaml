    表 18-13

    `sys.dm_tran_locks`


    | 列名 | 描述 |

    | --- | --- |

    | `resource_type` | 锁已放置在其上的资源类型。 |

    | `resource_subtype` | 已被放置锁的资源类型的子类型。例如，如果你正在更新数据库的属性，那么 `resource_type` 是 `METADATA`，而
    `resource_subtype` 是 `DATABASE`。 |

    | `resource_database_id` | 包含已加锁资源的数据库的 ID。 |

    | `resource_description` | 关于该资源的其他信息，这些信息未包含在其他列中。 |

    | `resource_associated_entity_id` | 与该资源关联的数据库实体的 ID。 |

    | `resource_lock_partition` | 锁的分区号（如果正在使用锁分区）。 |

    | `request_mode` | 已请求或已获取的锁定模式。例如，共享锁为 `S`，排他锁为 `X`。 |

    | `request_type` | `request_type` 始终为 `LOCK`。 |

    | `request_status` | 锁请求的当前状态。可能的值为 `ABORT_BLOCKERS`、`CONVERT`、`GRANTED`、`LOW_PRIORITY_CONVERT`、`LOW_PRIORITY_WAIT`
    和 `WAIT`。 |

    | `request_reference_count` | 请求者对同一资源请求锁的次数。 |

    | `request_session_id` | 当前拥有该请求的会话 ID。如果事务是分布式的，则会话 ID 可能会改变。 |

    | `request_exec_context_id` | 请求锁的进程的执行 ID。 |

    | `request_request_id` | 当前拥有该请求的批处理的批处理 ID。如果应用程序正在使用 Multiple Active Result
    Sets (MARS)，此 ID 可能会改变。 |

    | `request_owner_type` | 锁请求所有者的类型。对于用户操作，可能的值为 `TRANSACTION`、`SESSION` 和 `CURSOR`。值也可以是
    `SHARED_TRANSACTION_WORKSPACE` 和 `EXCLUSIVE_TRANSACTION_WORKSPACE`，它们在内部用于保存已登记事务的锁，或者是
    `NOTIFICATION_OBJECT`，由内部 SQL Server 操作使用。 |

    | `request_owner_id` | 拥有锁请求的事务的 ID，除非请求是由 FileTable 发出的，此时 `-3` 表示表锁，`-4` 表示数据库锁，其他值表示文件的文件句柄。
    |

    | `request_owner_guid` | 标识请求所有者的 GUID。仅适用于分布式事务。 |

    | `lock_owner_address` | 请求的内部数据结构的内存地址。 |


    `sys.dm_os_waiting_tasks` DMV 返回有关等待资源（包括锁）的任务的信息。此 DMV 返回的列详见表 18-14。此 DMV 可与
    `sys.dm_tran_locks` 结合使用，以查找由于锁而被阻塞和正在阻塞的进程的详细信息。


    表 18-14

    `sys.dm_os_waiting_tasks` 列


    | 列名 | 描述 |

    | --- | --- |

    | `waiting_task_address` | 正在等待的任务的地址。 |

    | `session_id` | 运行等待任务的会话的 ID。 |

    | `exec_context_id` | 运行该任务的线程和子线程的 ID。 |

    | `wait_duration_ms` | 等待的持续时间，以毫秒为单位。 |

    | `wait_type` | 正在经历的等待类型。等待在第 17 章中讨论。 |

    | `resource_address` | 任务正在等待的资源的地址。 |

    | `blocking_task_address` | 指示当前正在使用该资源的任务的地址。 |

    | `blocking_session_id` | 当前正在使用该资源的任务的会话 ID。 |

    | `blocking_exec_context_id` | 当前正在使用该资源的任务的线程和子线程的 ID。 |

    | `resource_description` | 关于资源的其他信息，这些信息未包含在其他列中，包括锁资源所有者。 |


    清单 18-14 中的脚本演示了如何使用 `sys.dm_tran_locks` 和 `sys.dm_os_waiting_tasks` 来识别实例上的阻塞。该脚本包含三个部分，每个部分都应在单独的查询窗口中运行。脚本的前两部分导致争用。第三部分识别争用的来源。


    ```

    --Part 1 - 在第 1 个查询窗口中运行

    BEGIN TRANSACTION

    UPDATE Customers

    SET CreditLimit = CreditLimit ;

    --Part 2 - 在第 2 个查询窗口中运行

    SELECT creditlimit

    FROM dbo.Customers (SERIALIZABLE) ;

    --Part 3 - 在第 3 个查询窗口中运行

    SELECT

    DB_NAME(tl.resource_database_id) DatabaseName

    ,tl.resource_type

    ,tl.resource_subtype

    ,tl.resource_description

    ,tl.request_mode

    ,tl.request_status

    ,os.session_id BlockedSession

    ,os.blocking_session_id BlockingSession

    ,os.resource_description

    ,OBJECT_NAME(

    CAST(

    SUBSTRING(os.resource_description,

    CHARINDEX(''objid='',os.resource_description,0)+6,9)

    AS INT)

    ) LockedTable

    FROM sys.dm_os_waiting_tasks os

    INNER JOIN sys.dm_tran_locks tl

    ON os.session_id = tl.request_session_id

    WHERE tl.request_owner_type IN (''TRANSACTION'', ''SESSION'', ''CURSOR'') ;

    ```

    清单 18-14

    使用 `sys.dm_tran_locks`


    ## 提示


    要停止阻塞，请在第一个查询窗口中运行 `ROLLBACK`。


    图 18-5 中的结果显示，脚本的第二部分正被脚本的第一部分阻塞。最后一列从 `resource_description` 列中提取对象 ID，并识别发生争用的表。


    ![../images/333037_2_En_18_Chapter/333037_2_En_18_Fig5_HTML.jpg](img/333037_2_En_18_Fig5_HTML.jpg)


    图 18-5

    `sys.dm_tran_locks` 结果


    # 观察死锁


    通过打开跟踪标志 1204 和 1222，可以捕获死锁的详细信息并将其写入错误日志。跟踪标志 1204 捕获死锁中涉及的资源和锁类型的详细信息。它包含死锁中涉及的每个节点的一个部分，后面是一个详细说明死锁受害者的内容。跟踪标志
    1222 返回三个部分。第一部分给出死锁受害者的详细信息；第二部分给出死锁中涉及的进程的详细信息；最后一部分描述死锁中涉及的资源。


    在现代 SQL Server 世界中，通常不需要打开这些跟踪标志，因为你可以通过查看系统运行状况会话（`system_health`）来回溯死锁的详细信息，这是每个
    SQL Server 实例上默认启用的 Extended Events 会话。除其他重要详细信息外，系统运行状况会话捕获发生的任何死锁的详细信息。你可以通过在
    SQL Server Management Studio 中深入到 Management ➤ Extended Events ➤ Sessions ➤ `system_health`，然后从
    `Package0.eventfile` 的上下文菜单中选择 View Target Data 来访问系统运行状况会话。如果在 name 列中搜索 `xml_deadlock_report`，你将看到已发生的死锁事件的详细信息。Details
    选项卡提供完整的死锁报告，包括关于死锁受害者以及死锁中涉及的进程、资源和所有者的信息。Deadlock 选项卡显示死锁图，如图 18-6 所示，对应于我们在清单
    18-2 中生成的死锁。


    ## 注意


    如果系统运行状况会话有回滚大小限制，则死锁的详细信息可能会丢失。


    ![../images/333037_2_En_18_Chapter/333037_2_En_18_Fig6_HTML.jpg](img/333037_2_En_18_Fig6_HTML.jpg)


    图 18-6

    死锁图'
- fmt: '## Summary


    锁可以在不同的粒度级别上被获取。在较低级别进行锁定可以减少争用，但会为内部锁内存结构使用额外资源。在较高级别进行锁定可能会增加其他进程的等待时间，并增加死锁的可能性。SQL
    Server 2014 引入了新功能，使数据库管理员能够控制联机维护操作（如索引重建和分区切换操作）的锁定行为。在拥有 16 个或更多内核实例的大型系统上，SQL
    Server 会自动实现锁分区，通过将单个锁资源拆分为多个资源来减少争用。


    事务具有 ACID 属性，使其具备原子性、一致性、隔离性和持久性。然而，SQL Server 提供了放宽其中一些规则的功能，以提高性能并简化编码。针对磁盘表有六种隔离级别可用，其中两种是乐观的，其余是悲观的。悲观隔离级别通过获取锁来避免事务异常，而乐观并发则依赖于行版本控制。


    由于内存优化表不支持锁，因此针对内存优化表的所有事务都使用乐观并发。SQL Server 实现了乐观隔离级别，这些级别只能用于内存优化表。由于事务的乐观特性，您应该为只读和读写事务都实现重试逻辑。


    SQL Server 提供了丰富的元数据，可以帮助数据库管理员观察事务、锁、争用和死锁。`Sys.dm_tran_active_transactions`
    显示当前在实例上处于活动状态的事务的详细信息。`Sys.dm_tran_locks` 提供有关当前在实例中被请求或已授予的锁的信息。您可以通过启用跟踪标志
    1204 和 1222 在 SQL Server 错误日志中捕获死锁信息，但系统运行状况跟踪默认也会捕获死锁信息。这意味着您可以事后检索死锁信息，而无需执行预先配置或跟踪。


    # 19. Extended Events


    扩展事件是 SQL Server 提供的一种轻量级监视系统。由于其架构使用的系统资源非常少，因此扩展性很好，并且允许您以对用户活动影响最小的方式监视实例。它们还具有高度可配置性，这使您在数据库管理员角色中拥有广泛的选项来捕获从非常细粒度（如页面拆分）到更高级别详细信息（如
    CPU 利用率）的详细信息。您还可以将扩展事件与操作系统数据关联起来，以便在排查问题时提供整体视图。扩展事件的前身是 SQL Trace 及其 GUI 工具
    Profiler。该工具现已不推荐用于数据库引擎，建议仅将其用于跟踪 Analysis Service 活动。


    在本章中，我们将讨论与扩展事件相关的概念，然后讨论如何实现该技术。最后，我们将讨论如何将其与操作系统计数器集成。


    ## Extended Events Concepts


    扩展事件具有丰富的架构，由事件、目标、操作、类型、谓词和映射组成。这些对象存储在包内，而包又存储在模块内，模块可以是 `.dll` 文件或可执行文件。我们将在以下部分讨论这些概念。


    ### Packages


    *包* 是扩展事件中使用的对象的容器。以下是 SQL Server 的四种包类型：


    *   `Package0`：默认包，用于扩展事件系统对象。

    *   `Sqlserver`：用于 SQL Server 相关对象。

    *   `Sqlos`：用于 SQLOS 相关对象。

    *   `SecAudit`：由 SQL 审计使用；但其对象不对外暴露。


    ### Events


    *事件* 是您可以跟踪的感兴趣的发生事项。它可以是一个 SQL 批处理完成、一次缓存未命中、一次页面拆分，或者根据您配置的跟踪性质，几乎任何可能发生在数据库引擎内部的事情。每个事件都通过通道和关键字（也称为类别）进行分类。*通道*
    是高级分类，SQL Server 2019 中的所有事件都属于表 [19-1](#333037_2_En_19_Chapter.xhtml#Tab1) 中描述的通道之一。


    表 19-1 通道


    | 通道 | 描述 |

    | --- | --- |

    | Admin | 具有明确解决方案的已知事件。例如，死锁、服务器启动、CPU 阈值被超过以及使用已弃用的功能。 |

    | Operational | 用于排查问题。例如，检测到坏内存、AlwaysOn 可用性组副本更改其状态以及检测到长时间 I/O，这些都是属于 Operational
    通道的事件。 |

    | Analytic | 可用于排查性能等问题的高容量事件。例如，事务开始、获取锁以及文件读取完成，这些都是属于 Analytic 通道的事件。 |

    | Debug | 开发人员用于通过返回内部数据来诊断问题。Debug 通道中的事件在 SQL Server 的未来版本中可能会更改，因此应尽可能避免使用它们。
    |


    关键字，也称为类别，粒度要细得多。SQL Server 2019 中有 88 个类别。可以通过运行清单 [19-1](#333037_2_En_19_Chapter.xhtml#PC1)
    中的查询来列出这些类别。


    ```

    SELECT DISTINCT map_value AS Category

    FROM sys.dm_xe_map_values map

    WHERE map.name = ''keyword_map''

    ORDER BY map.map_value

    ```


    清单 19-1 返回类别列表


    ### Targets


    *目标* 是事件的消费者；本质上，它是跟踪数据将被写入的设备。SQL Server 2019 中可用的目标详见表 [19-2](#333037_2_En_19_Chapter.xhtml#Tab2)。


    表 19-2 目标


    | 目标 | 同步/异步 | 描述 |

    | --- | --- | --- |

    | Event counter | 同步 | 统计会话期间发生的事件数量 |

    | Event file | 异步 | 将事件输出写入内存缓冲区，然后将其刷新到磁盘 |

    | Event pairing | 异步 | 确定是否发生了配对事件而没有其匹配事件，例如，一个语句开始但从未完成 |

    | ETW* | 同步 | 用于将扩展事件与操作系统数据关联 |

    | Histogram | 异步 | 根据操作或事件列统计会话期间发生的事件数量 |

    | Ring buffer | 异步 | 使用先进先出方法将数据存储在内存缓冲区中 |


    ***Event Tracking for Windows**


    ### Actions


    *操作* 是允许在事件触发时捕获附加信息的命令。当事件发生时，操作会同步触发，事件本身并不知道该操作。SQL Server 2019 中有 64 个可用操作，允许您捕获丰富的信息数组，包括导致事件触发的语句、运行该语句的登录名、事务
    ID、CPU ID 以及调用堆栈。'
  raw: '## Summary


    Locks can be taken at different levels of granularity. Locking at a lower level
    reduces contention but uses additional resources for internal lock memory structures.
    Locking at a higher level can increase the wait time of other processes and increase
    the likelihood of deadlocks. SQL Server 2014 introduces new features that give
    DBAs the ability to control locking behaviors for online maintenance operations,
    such as index rebuilds and partition switching operations. On large systems with
    16 or more cores available to the instance, SQL Server automatically implements
    lock partitioning, which can reduce contention by splitting a single lock resource
    into multiple resources.


    Transactions have ACID properties, making them atomic, consistent, isolated, and
    durable. SQL Server offers the functionality to relax some of these rules, however,
    in order to improve performance and make coding easier. Six isolation levels are
    available against disk tables, two of which are optimistic, and the others are
    pessimistic. Pessimistic isolation levels work by acquiring locks to avoid transactional
    anomalies, whereas optimistic concurrency relies on row versioning.


    Because memory-optimized tables do not support locks, all transactions against
    memory-optimized tables use optimistic concurrency. SQL Server has implemented
    optimistic isolation levels, which can only be used against memory-optimized tables.
    Because of the optimistic nature of the transactions, you should implement retry
    logic for both read-only and read/write transactions.


    SQL Server offers a wide array of metadata that can help you, as a DBA, observe
    transactions, locks, contention, and deadlocks. `Sys.dm_tran_active_transactions`
    show details of transactions that are currently active on the instance. `Sys.dm_tran_locks`
    exposes information about locks that have currently been requested or granted
    within the instance. You can capture deadlock information in the SQL Server error
    log by enabling trace flags 1204 and 1222, but the system health trace also captures
    deadlock information by default. This means that you can retrieve deadlock information
    after the fact, without having to perform upfront configuration or tracing.


    # 19. Extended Events


    Extended Events are a lightweight monitoring system offered by SQL Server. Because
    the architecture uses so few system resources, they scale very well and allow
    you to monitor their instances, with minimal impact on user activity. They are
    also highly configurable, which gives you in your role as a DBA a wide range of
    options for capturing details from a very fine grain, such as page splits, to
    higher-level detail, such as CPU utilization. You can also correlate Extended
    Events with operating system data to provide a holistic picture when troubleshooting
    issues. The predecessor to Extended Events was SQL Trace, and its GUI, called
    Profiler. This is now deprecated for use with the Database Engine, and it is recommended
    that you only use it for tracing Analysis Service activity.


    In this chapter, we will discuss the concepts associated with Extended Events,
    before discussing how to implement the technology. Finally, we will discuss how
    to integrate them with operating system counters.


    ## Extended Events Concepts


    Extended Events have a rich architecture, which consists of events, targets, actions,
    types, predicates, and maps. These artifacts are stored within a package, which
    is, in turn, stored within a module, which can be either a `.dll` or an executable.
    We discuss these concepts in the following sections.


    ### Packages


    A *package* is a container for the objects used within Extended Events. Here are
    the four types of SQL Server package:


    *   `Package0`: The default package, used for Extended Events system objects.


    *   `Sqlserver`: Used for SQL Server–related objects.


    *   `Sqlos`: Used for SQLOS-related objects.


    *   `SecAudit`: Used by SQL Audit; however, its objects are not exposed.


    ### Events


    An *event* is an occurrence of interest that you can trace. It may be a SQL batch
    completing, a cache miss, or a page split, or virtually anything else that can
    happen within the Database Engine, depending on the nature of the trace that you
    are configuring. Each event is categorized by channel and keyword (also known
    as category). A *channel* is a high-level categorization, and all events in SQL
    Server 2019 fall into one of the channels described in Table [19-1](#333037_2_En_19_Chapter.xhtml#Tab1).


    Table 19-1


    Channels


    | Channel | Description |

    | --- | --- |

    | Admin | Well-known events with well-known resolutions. For example, deadlocks,
    server starts, CPU thresholds being exceeded, and the use of deprecated features.
    |

    | Operational | Used for troubleshooting issues. For example, bad memory being
    detected, an AlwaysOn Availability Group replica changing its state, and a long
    IO being detected are all events that fall within the Operational channel. |

    | Analytic | High-volume events that you can use for troubleshooting issues such
    as performance. For example, a transaction beginning, a lock being acquired, and
    a file read completing are all events that fall within the Analytic channel. |

    | Debug | Used by developers to diagnose issues by returning internal data. The
    events in the Debug channel are subject to change in future versions of SQL Server,
    so you should avoid them when possible. |


    Keywords, also known as categories, are much more fine grain. There are 88 categories
    within SQL Server 2019\. These categories can be listed, by running the query
    in Listing [19-1](#333037_2_En_19_Chapter.xhtml#PC1).


    ```

    SELECT DISTINCT map_value AS Category

    FROM sys.dm_xe_map_values map

    WHERE map.name = ''keyword_map''

    ORDER BY map.map_value

    Listing 19-1

    Return List of Categories

    ```


    ### Targets


    A *target* is the consumer of the events; essentially, it is the device to which
    the trace data will be written. The targets available within SQL Server 2019 are
    detailed in Table [19-2](#333037_2_En_19_Chapter.xhtml#Tab2).


    Table 19-2


    Targets


    | Target | Synchronous/Asynchronous | Description |

    | --- | --- | --- |

    | Event counter | Synchronous | Counts the number of events that occur during
    a session |

    | Event file | Asynchronous | Writes the event output to memory buffers and then
    flushes them to disk |

    | Event pairing | Asynchronous | Determines if a paired event occurs without its
    matching event, e.g., if a statement started but never completed |

    | ETW* | Synchronous | Used to correlate Extended Events with operating system
    data |

    | Histogram | Asynchronous | Counts the number of events that occur during a session,
    based on an action or event column |

    | Ring buffer | Asynchronous | Stores data in a memory buffer, using First In
    First Out (FIFO) methodology |


    **Event Tracking for Windows*


    ### Actions


    *Actions* are commands that allow additional information to be captured when an
    event fires. An action is fired synchronously when an event occurs and the event
    is unaware of the action. There are 64 actions available in SQL Server 2019, which
    allow you to capture a rich array of information, including the statement that
    caused the event to fire, the login that ran this statement, the transaction ID,
    the CPU ID, and the call stack.'
