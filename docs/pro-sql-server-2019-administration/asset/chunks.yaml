  trans: '### 配置控制器


    您可以在 SQL Server 的 32 位共享目录中的 `Tools\DReplayController` 文件夹内找到 `DReplayController.config`
    文件。因此，如果 SQL Server 安装在默认路径下，则完整路径为 `C:\Program Files (x86)\Microsoft SQL Server\150\Tools\DReplayController\DReplayController.config`。您可以使用此配置文件来控制日志记录级别。可能的选项如下：


    *   `INFORMATIONAL`: 将所有消息记录到控制器日志。

    *   `WARNINGS`: 过滤掉信息性消息，但记录所有错误和警告。

    *   `CRITICAL`: 仅记录严重错误。这是默认值。


    `DReplayController.config` 文件的默认内容如代码清单 21-1 所示。


    ```

    CRITICAL

    ```


    代码清单 21-1

    `DReplayController.config`


    由于服务在启动时从配置文件中读取此日志记录级别，因此如果您在启动服务后更改了日志级别，则需要重新启动该服务。日志本身在服务启动时创建，其中包含启动信息，例如正在使用的服务账户。您可以在
    `\DReplayController\Log` 文件夹中找到名为 `DReplay Controller Log_<唯一标识符>` 的日志文件。每次服务启动时都会生成一个新日志。


    如果您在不同于分布式重播控制器服务的服务账户下运行分布式重播客户端服务，那么您还需要在分布式重播控制器服务上配置 DCOM 权限。您可以通过 Windows
    管理工具中的“组件服务”来完成此操作。


    调用“组件服务”后，您需要逐级展开 控制台根节点 ➤ 组件服务 ➤ 计算机 ➤ 我的电脑 ➤ DCOM 配置，然后从 `DReplayController`
    的上下文菜单中选择“属性”。这将调用“属性”对话框。从这里，您应导航到“安全”选项卡。


    现在，使用“启动和激活权限”部分中的“编辑”按钮来启动“权限”对话框。在此处，使用“添加”按钮添加分布式重播客户端服务的服务账户，然后授予其“本地激活”和“远程激活”权限。


    您现在需要在“访问权限”部分重复此过程，以授予该服务账户“本地访问”和“远程访问”权限。


    您还需要确保将分布式重播客户端服务账户添加到运行分布式重播控制器的服务器上的“分布式 COM 用户”Windows 组中。应用这些更改后，您需要重新启动分布式重播控制器服务和分布式重播客户端服务，更改才能生效。


    ### 提示


    关于防火墙配置，控制器和客户端使用端口 135 和动态端口进行通信；因此，您必须确保服务器之间的这些端口是开放的。然而，开放动态端口范围可能会违反某些组织的安全最佳实践。解决方法是配置
    Windows 防火墙，允许分布式重播可执行文件通过任何端口进行通信。然而，这本身也会带来问题，因为某些企业防火墙未配置为提供此功能，这意味着即使 Windows
    防火墙允许流量通过，数据包也可能在企业防火墙层面被丢弃。


    ### 配置客户端


    您可以在 SQL Server 的 32 位共享目录中的 `Tools\DReplayClient` 文件夹内找到 `DReplayClient.config`
    文件。因此，如果 SQL Server 安装在默认路径下，则完整路径为 `C:\Program Files (x86)\Microsoft SQL Server\150\Tools\DReplayController\DReplayClient.config`。您可以使用此配置文件来配置表
    21-1 中详述的设置。


    表 21-1

    `DReplayClient.config` 选项


    | 选项 | 描述 |

    | --- | --- |

    | `Controller` | 托管分布式重播控制器的服务器名称。请注意，这是服务器名称，而不是服务器\实例名称。 |

    | `WorkingDirectory` | 客户端上存储调度文件的位置。如果配置文件中未包含此选项，则使用存储配置文件的文件夹。 |

    | `ResultsDirectory` | 存储重播结果文件的位置。如果配置文件中未指定此选项，则使用存储配置文件的文件夹。 |

    | `Logging` | 使用此选项控制日志记录级别。可能的选项有：• `INFORMATIONAL`，将所有消息记录到控制器日志。• `WARNINGS`，过滤掉信息性消息，但记录所有错误和警告。•
    `CRITICAL`，仅记录严重错误。这是默认值。 |


    代码清单 21-2 展示了经过编辑的 `DReplayClient.config` 文件版本，该文件已配置为指向我们的控制器服务器以及工作目录和结果目录。


    ```

    controller

    C:\DistributedReplay\WorkingDir\

    C:\DistributedReplay\ResultDir\

    CRITICAL

    ```


    代码清单 21-2

    `DReplayClient.config`


    ### 提示


    您必须在每个客户端上启动分布式重播客户端服务之前，先启动分布式重播控制器服务。


    由于我们使用了两个客户端，因此需要在每个客户端上重复这些操作。在我们的环境中，这些客户端是服务器 Client1 和 Client2。


    ### 提示


    关于防火墙配置，客户端和目标使用 SQL Server 端口进行通信。在标准配置中，这意味着使用 TCP 端口 1433，如果使用命名实例，则还需使用 UDP
    端口 1434 用于浏览器服务。如果使用非标准端口，请相应地配置防火墙。'
- fmt: '### Configuring the Replay


    重播是通过管理工具启动的，该工具依赖于两个配置文件：`DReplay.exe.preprocess.config` 和 `DReplay.exe.replay.config`。第一个配置文件控制中间文件的构建，第二个控制重播选项和输出选项。两个文件都位于
    32 位共享目录中，因此在默认安装下，完整限定路径分别是 `C:\Program Files (x86)\Microsoft SQL Server\150\Tools\Binn\DReplay.exe.preprocess.config`
    和 `C:\Program Files (x86)\Microsoft SQL Server\150\Tools\Binn\DReplay.exe.replay.config`。表
    [21-2](#333037_2_En_21_Chapter.xhtml#Tab2) 详细说明了可以在 `DReplay.exe.preprocess.config`
    中配置的选项。


    **表 21-2 DReplay.exe.preprocess.config 选项**


    | Option | Description |

    | --- | --- |

    | `IncSystemSession` | 指定是否应将从系统会话捕获的活动包含在重播中。 |

    | `MaxIdleTime` | 指定空闲时间的上限（以秒为单位）。 • `-1` 指定活动之间的空闲时间应与原始跟踪相同。 • `0` 指定活动之间不应有空闲时间。
    |


    `DReplay.exe.preprocess.config` 文件的默认内容如清单 [21-3](#333037_2_En_21_Chapter.xhtml#PC3)
    所示。


    ```

    No


    Listing 21-3

    DReplay.exe.preprocess.config

    ```


    表 [21-3](#333037_2_En_21_Chapter.xhtml#Tab3) 详细说明了可以在 `DReplay.exe.replay.config`
    中配置的选项。


    **表 21-3 DReplay.exe.replay.config 选项**


    | Option | Category | Description |

    | --- | --- | --- |

    | `Server` | Replay options | 目标服务器的服务器\实例名称。 |

    | `SequencingMode` | Replay options | 指定用于调度事件的模式。可能的选项包括： • `Synchronization`，表示事务顺序受基于时间的跨客户端同步约束，这对于性能测试很有用。
    • `Stress`（默认选项）表示事务尽快触发，无需基于时间的同步。这对于负载测试很有用。 |

    | `StressScaleGranularity` | Replay options | 当 `SequenceMode` 设置为 `Stress` 时，`StressScaleGranularity`
    确定如何在 SPID 上扩展活动。 • `SPID` 表示单个 SPID 上的连接应作为单个 SPID 进行扩展。 • `Connection` 表示单个
    SPID 上的连接应作为单独的连接进行扩展。 |

    | `ConnectTimeScale` | Replay options | 一个百分比值，指示当 `SequenceMode` 为 `Stress` 时，重播期间是否应减少连接时间。`100`
    表示包含 100% 的连接时间。较低的值会相应减少模拟的连接时间。 |

    | `ThinkTimeScale` | Replay options | 一个百分比值，指示当 `SequenceMode` 为 `Stress` 时，重播期间是否应减少用户思考时间。`100`
    表示包含 100% 的思考时间，因此事务以捕获时的速度重播。指定较低的值会减少间隔。 |

    | `UseConnectionPooling` | Replay options | 指定客户端上是否应使用连接池。*连接池* 是后续连接可以重用的连接缓存。
    |

    | `HealthmonInterval` | Replay options | 当 `SequenceMode` 设置为 `Synchronization`
    时，`HealthmonInterval` 确定运行运行状况监视器的频率，以秒为单位。`-1` 表示禁用运行状况监视器。 |

    | `QueryTimeout` | Replay options | 以秒为单位指定查询超时值。`-1` 表示禁用。 |

    | `ThreadsPerClient` | Replay options | 指定每个客户端用于重播的线程数。 |

    | `RecordRowCount` | Output options | 指定是否应包含每个结果集的行数。 |

    | `RecordResultSet` | Output options | 指定是否应保存每个记录集的内容。 |


