    ## 策略管理


    策略安装在 SQL Server 实例上，但你可以将它们导出为 XML 文件，这反过来又允许它们被移植到其他服务器或中央管理服务器，以便能够同时针对多个实例进行评估。以下部分将讨论如何导入和导出策略，以及如何将策略与中央管理服务器结合使用。我们还将讨论如何使用
    PowerShell 管理策略。


    ## 导入和导出策略


    策略可以导出到文件系统，也可以从文件系统导入为 XML 文件。要将我们的 `DatabaseNameConvention` 策略导出到 `默认文件位置`，我们在对象资源管理器中右键单击
    `DatabaseNameConvention` 策略，从上下文菜单中选择“导出策略”，这将调出“导出策略”对话框。在这里，我们只需为文件选择一个名称并单击“保存”，如图
    23-19 所示。


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig19_HTML.jpg](img/333037_2_En_23_Fig19_HTML.jpg)

    图 23-19 “导出策略”对话框


    现在我们将该策略导入到我们的 `SQLSERVER\TARGETSERVER1` 实例中。为此，我们在对象资源管理器中连接到 `TARGETSERVER1`
    实例，然后依次展开“管理” ➤ “基于策略的管理”，接着从“策略”的上下文菜单中选择“导入策略”。这将调出“导入”对话框，如图 23-20 所示。


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig20_HTML.jpg](img/333037_2_En_23_Fig20_HTML.jpg)

    图 23-20 “导入”对话框


    在此对话框中，我们使用“要导入的文件”省略号按钮来选择我们的 `DatabaseNameConvention` 策略。我们还可以从“策略状态”下拉列表中选择策略导入后的状态，并指定是否应覆盖实例上已存在的同名策略。


    ## 使用策略进行企业管理


    虽然能够针对单个 SQL Server 实例评估策略很有用，但为了最大限度地发挥 PBM 的威力，你可以将策略与中央管理服务器结合使用，以便在单次执行中针对整个
    SQL Server 企业环境评估策略。


    例如，假设我们希望针对在将 `SQLSERVER\MASTERSERVER` 实例注册为中央管理服务器时创建的 Prod 组中的所有服务器，来评估 `DatabaseNameConvention`
    策略。为此，我们在“已注册的服务器”窗口中依次展开“中央管理服务器” ➤ `SQLSERVER\MASTERSERVER`，然后从 Prod 的上下文菜单中选择“评估策略”。


    这将调出“评估策略”对话框。在这里，你可以使用“源”省略号按钮调出“选择源”对话框，并选择你想要针对该组评估的一个或多个策略，如图 23-21 所示。


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig21_HTML.jpg](img/333037_2_En_23_Fig21_HTML.jpg)

    图 23-21 “评估策略”对话框


    在“选择源”对话框中，要么从文件系统中选择存储为 XML 文件的策略，要么指定安装了该策略的实例的连接详细信息。在我们的例子中，我们通过单击“文件”省略号按钮来选择
    `DatabaseNameConvention`。


    选中的策略随后会显示在屏幕的“策略”部分，如图 23-22 所示。如果你选择了一个包含多个策略的源，可以使用复选框来定义要评估哪些策略。单击“评估”按钮会导致所选策略针对组中的所有服务器进行评估。


    ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig22_HTML.jpg](img/333037_2_En_23_Fig22_HTML.jpg)

    图 23-22 “评估策略”对话框


    ## 使用 PowerShell 评估策略


    当策略安装在实例上时，可以使用本章已描述的方法进行评估。但是，如果你的策略存储为 XML 文件，你仍然可以使用 PowerShell 来评估它们。如果你的
    SQL Server 企业环境包含 SQL Server 2000 或 2005 实例（许多环境仍然如此），这会很有帮助。因为 PBM 仅在 SQL Server
    2008 中引入，策略无法导入到旧版实例中，但 PowerShell 为此问题提供了一个有用的变通方法。


    要使用 PowerShell 从 XML 文件评估我们的 `DatabaseNameConvention` 策略是否符合我们的 `SQLSERVER\MASTERSERVER`
    实例，我们需要运行清单 23-11 中的脚本。该脚本的第一行将路径更改为存储策略的文件夹。第二行实际评估策略。


    如果我们配置的属性是可设置且确定性的（而我们的这个不是），那么我们可以添加 `-AdHocPolicyExecutionMode` 参数并将其设置为 `"Configure"`。这将使设置更改为符合我们的策略。


    ```powershell

    sl "C:\Users\Administrator\Documents\SQL Server Management Studio\Policies"

    Invoke-PolicyEvaluation -Policy "C:\Users\Administrator\Documents\SQL Server Management
    Studio\Policies\DatabaseNameConvention.xml" -TargetServerName ".\MASTERSERVER"

    ```

