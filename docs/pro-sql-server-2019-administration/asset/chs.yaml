  ADD EVENT sqlserver.server_memory_change(\nACTION(package0.collect_current_thread_id,package0.event_sequence,sqlos.cpu_id,sqlos.scheduler_id,sqlos.system_thread_id,sqlos.task_address,sqlos.worker_address,sqlserver.database_id,sqlserver.database_name,sqlserver.is_system,sqlserver.plan_handle,sqlserver.request_id,sqlserver.session_id,sqlserver.transaction_id)),\n\
  ADD EVENT sqlserver.sql_batch_completed(SET collect_batch_text=(1)\nACTION(package0.collect_current_thread_id,package0.event_sequence,sqlos.cpu_id,sqlos.scheduler_id,sqlos.system_thread_id,sqlos.task_address,sqlos.worker_address,sqlserver.database_id,sqlserver.database_name,sqlserver.is_system,sqlserver.plan_handle,sqlserver.request_id,sqlserver.session_id,sqlserver.transaction_id)),\n\
  ADD EVENT sqlserver.sql_batch_starting(SET collect_batch_text=(1)\nACTION(package0.collect_current_thread_id,package0.event_sequence,sqlos.cpu_id,sqlos.scheduler_id,sqlos.system_thread_id,sqlos.task_address,sqlos.worker_address,sqlserver.database_id,sqlserver.database_name,sqlserver.is_system,sqlserver.plan_handle,sqlserver.request_id,sqlserver.session_id,sqlserver.transaction_id)),\n\
  ADD EVENT sqlserver.sql_transaction(\nACTION(package0.collect_current_thread_id,package0.event_sequence,sqlos.cpu_id,sqlos.scheduler_id,sqlos.system_thread_id,sqlos.task_address,sqlos.worker_address,sqlserver.database_id,sqlserver.database_name,sqlserver.is_system,sqlserver.plan_handle,sqlserver.request_id,sqlserver.session_id,sqlserver.transaction_id)),\n\
  ADD EVENT sqlserver.trace_flag_changed(\nACTION(package0.collect_current_thread_id,package0.event_sequence,sqlos.cpu_id,sqlos.scheduler_id,sqlos.system_thread_id,sqlos.task_address,sqlos.worker_address,sqlserver.database_id,sqlserver.database_name,sqlserver.is_system,sqlserver.plan_handle,sqlserver.request_id,sqlserver.session_id,sqlserver.transaction_id)),\n\
  ADD EVENT sqlserver.unprepare_sql(\nACTION(package0.collect_current_thread_id,package0.event_sequence,sqlos.cpu_id,sqlos.scheduler_id,sqlos.system_thread_id,sqlos.task_address,sqlos.worker_address,sqlserver.database_id,sqlserver.database_name,sqlserver.is_system,sqlserver.plan_handle,sqlserver.request_id,sqlserver.session_id,sqlserver.transaction_id))\n\
  ADD TARGET package0.event_file(SET filename=N'C:\\MSSQL\\DReplay.xel')\nWITH (MAX_MEMORY=4096\
  \ KB,EVENT_RETENTION_MODE=ALLOW_SINGLE_EVENT_LOSS,MAX_DISPATCH_LATENCY=30 SECONDS,MAX_EVENT_SIZE=0\
  \ KB,MEMORY_PARTITION_MODE=NONE,TRACK_CAUSALITY=ON,STARTUP_STATE=ON) ;\nGO\nALTER\
  \ EVENT SESSION DReplay\nON SERVER\nSTATE = start;\nGO\n```\n\n\n### 生成要跟踪的活动\n\n\
  根据您的具体场景，您可能希望捕获真实的用户活动；为此，您需要使用如 `SQLStress` 这样的工具，或者编写脚本活动。在我们的情况下，我们编写脚本活动以供跟踪（参见\
  \ 清单 21-9）。\n\n```sql\nUSE Chapter21\nGO\nDECLARE @Numbers TABLE\n(\nNumber    \
  \    INT\n)\n;WITH CTE(Number)\nAS\n(\nSELECT 1 Number\nUNION ALL\nSELECT Number\
  \ + 1\nFROM CTE\nWHERE Number  1000000\nGO 50\nSELECT TOP 10 PERCENT *\nFROM dbo.Customers\n\
  GO 100\n```\n清单 21-9: 生成活动\n\n现在，我们可以使用 清单 21-10 中的命令停止跟踪。\n\n```sql\nALTER EVENT\
  \ SESSION DReplay\nON SERVER\nSTATE = stop;\nGO\n```\n清单 21-10: 停止跟踪\n\n### 重放跟踪\n\
  \n现在我们已经捕获了一个跟踪，我们将其转换为 `.trc` 文件，然后使用分布式重放管理工具从命令行进行预处理，然后再进行重放。\n\n#### 转换跟踪文件\n\
  \n为了将我们的 `.xel` 文件用于分布式重放，我们首先需要将其转换为 `.trc` 文件。我们借助 `readtrace.exe` 命令行工具来完成此操作，该工具使用\
  \ RML（重放标记语言）来转换数据。`ReadTrace` 是 Microsoft 的 SQL Server RML 实用工具包的一部分，您可以从 [`www.microsoft.com/en-gb/download/details.aspx?id=4511`](http://www.microsoft.com/en-gb/download/details.aspx%253Fid%253D4511)\
  \ 下载。以下示例假设您已安装此工具包。\n\n> **提示**\n> 前面的链接包含了所有 RML 实用工具，本章使用的是此版本的工具。不过，可以下载更新版本的\
  \ `ReadTrace`，作为 DEA（数据库实验助手）的一部分，该工具可在 [`www.microsoft.com/en-us/download/details.aspx?id=54090`](http://www.microsoft.com/en-us/download/details.aspx%253Fid%253D54090)\
  \ 找到。\n\n在这里，我们通过导航到 `C:\\Program Files\\Microsoft Corporation\\RMLUtils` 文件夹并运行带有\
  \ 表 21-5 中详细参数的 `ReadTrace.exe` 来转换我们的跟踪文件。\n\n表 21-5: ReadTrace 参数\n\n| 参数 | 描述\
  \ |\n| --- | --- |\n| `-I` | 要转换的 `.xel` 文件的完全限定文件名。 |\n| `-O` | 用于输出结果的文件夹。这包括日志文件以及\
  \ `.trc` 文件。 |\n| `-a` | 阻止分析处理。 |\n| `-MS` | 镜像到单个 `.trc` 文件，而不是为每个 SPID 创建单独的文件。\
  \ |\n\n> **提示**\n> 您可以在 SQL Server 的 RML 实用工具帮助文件中找到所有 `ReadTrace` 参数的完整描述。\n\n\
  我们使用 清单 21-11 中的命令运行 `ReadTrace`。\n\n> **提示**\n> 在运行此脚本前，请记得更改输入和输出文件的文件名及路径。即使您使用了相同的位置，您的\
  \ `.xel` 文件名也会包含一个不同的唯一标识符。\n\n```cmd\nreadtrace.exe -I\"C:\\MSSQL\\DReplay_0_130737313343740000.xel\"\
  \ -O\"C:\\MSSQL\\DReplayTraceFile\" -a -MS\n```\n清单 21-11: 使用 ReadTrace 转换为 .trc\n\
  \n#### 预处理跟踪数据\n\n管理工具是一个命令行实用程序，可以使用 表 21-6 中的选项运行。\n\n表 21-6: 管理工具选项\n\n| 选项 |\
  \ 描述 |\n| --- | --- |\n| `Preprocess` | 通过创建中间文件来准备跟踪数据 |\n| `Replay` | 将跟踪分派到客户端并开始重放\
  \ |\n| `Status` | 显示控制器的当前状态 |\n| `Cancel` | 取消当前操作 |\n\n当使用 `preprocess` 选项运行时，管理工具接受\
  \ 表 21-7 中详细说明的参数。\n\n表 21-7: 预处理参数\n\n| 参数 | 全名 | 描述 |\n| --- | --- | --- |\n|\
  \ `-m` | `Controller` | 托管分布式重放控制器的服务器名称。 |\n| `-i` | `input_trace_file` | 跟踪文件的完全限定文件名。如果存在滚动更新文件，请指定一个逗号分隔的列表。\
  \ |\n| `-d` | `controller_working_dir` | 存储中间文件的文件夹。 |\n| `-c` | `config_file` |\
  \ `DReplay.exe.preprocess.config` 配置文件的完全限定文件名。 |\n| `-f` | `status_interval` |\
  \ 显示状态消息的频率，以毫秒为单位指定。 |\n\n要预处理我们的跟踪文件，可以使用 清单 21-12 中的命令。此过程会创建一个中间文件，然后可以将该文件分派到客户端，准备进行重放。\n\
  \n> **提示**\n> 在运行此脚本前，请更改文件路径以匹配您的配置。\n\n```cmd\ndreplay preprocess -m controller\
  \  -i \"C:\\MSSQL\\DReplayTraceFile\\SPID00000.trc\" -d \"c:\\Distributed Replay\\\
  WorkingDir\" -c \"C:\\Program Files (x86)\\Microsoft SQL Server\\150\\Tools\\Binn\\\
  DReplay.exe.preprocess.config\"\n```\n清单 21-12: 预处理跟踪\n\n#### 开始重放\n\n您可以使用分布式重放管理工具开始重放。当工具与\
  \ `replay` 选项一起使用时，接受的参数在 表 21-8 中详细说明。\n\n表 21-8: 重放参数\n\n| 参数 | 全名 | 描述 |\n| ---\
  \ | --- | --- |\n| `-m` | `Controller` | 托管分布式重放控制器的服务器名称 |\n| `-d` | `controller_working_dir`\
  \ | 存储中间文件的文件夹 |\n| `-o` | `output` | 指定应捕获客户端的重放活动并保存到结果目录 |\n| `-s` | `target_server`\
  \ | 目标服务器的服务器\\实例名称 |\n| `-w` | `clients` | 一个逗号分隔的客户端列表 |\n| `-c` | `config_file`\
  \ | `DReplay.exe.replay.config` 配置文件的完全限定名称 |\n| `-f` | `status_interval` | 显示状态的频率，以秒为单位指定\
  \ |\n\n因此，要针对我们的目标服务器重放跟踪，使用 `Client1` 和 `Client2`，我们使用 清单 21-13 中的命令。\n\n```cmd\n\
  dreplay replay -m controller -d \"c:\\Distributed Replay\\WorkingDir\" -s Target\
  \ -o -w Client1,Client2 -c \"C:\\Program Files (x86)\\Microsoft SQL Server\\150\\\
  Tools\\Binn\\DReplay.Exe.Replay.config\"\n```\n清单 21-13: 重放跟踪\n\n> **提示**\n> 输出的第一行可能指示没有事件被分派。这不是问题——这只是意味着事件分派尚未开始。\n\
  \n\n### 摘要\n\n分布式重放提供了一种机制，用于重放使用 `Profiler` 或 `扩展事件` 捕获的跟踪。与它的前身——已弃用于 `数据库引擎`\
  \ 的 `Profiler` 不同，分布式重放可以重放来自多个服务器的工作负载，这使您能够执行负载测试并模拟多个并发连接。\n\n`控制器` 是运行分布式重放控制器服务的服务器，它同步重放过程，并可配置为两种不同的工作模式：`压力`\
  \ 模式和 `同步` 模式。在 `压力` 模式下，控制器会尽快触发事件；而在 `同步` 模式下，它会按照事件被捕获的顺序触发它们。\n\n`客户端` 是运行分布式重放客户端服务的服务器，用于重放跟踪。分布式重放最多支持\
  \ 16 个客户端。`目标` 是客户端向其分发事件的实例。\n\n尽管可以重放在 `Profiler` 中捕获的跟踪，但 `扩展事件` 使用的资源更少并提供更大的灵活性。因此，请考虑使用此方法来捕获跟踪。然而，为了用分布式重放重放\
  \ `扩展事件` 会话，您首先需要将 `.xel` 文件转换为 `.trc` 文件。您可以使用 `RML Utilities` 来完成此操作，该工具可从 [`www.microsoft.com`](http://www.microsoft.com)\
  \ 下载。\n\n分布式重放管理工具是一个命令行工具，用于预处理和运行跟踪。在预处理模式下运行时，它会创建一个中间文件。在重放模式下运行时，它会在客户端上生成分发文件，并使用这些文件将事件分发到目标。\n\
  \n# 22. 自动化维护例程\n\n自动化是数据库管理的关键部分，因为它通过允许以很少或无需人工干预的方式执行可重复的任务，降低了企业的总拥有成本 (`TCO`)。SQL\
  \ Server 提供了一套丰富的功能来自动化常规的 DBA 活动，包括调度引擎、决策树逻辑和一个全面的安全模型。在本章中，我们将讨论如何利用 `SQL Server\
  \ 代理` 来减少您在维护工作上的时间负担。我们还将探讨如何通过使用多服务器作业来减少工作量，这允许您在整个企业中执行一组一致的例程。\n\n### SQL Server\
  \ 代理\n\n`SQL Server 代理` 是一项服务，它提供了创建具有基于决策的逻辑的自动化例程并将其调度为仅运行一次、定期运行、在 `SQL Server\
  \ 代理` 服务启动时运行或在 `CPU` 空闲条件下运行的能力。\n\n`SQL Server 代理` 还控制 `警报`，这允许您响应各种条件，包括错误、性能条件或\
  \ `WMI`（Windows 管理规范）事件。响应可以包括发送电子邮件或运行任务。\n\n在向您介绍了围绕 `SQL Server 代理` 的概念之后，以下部分将讨论\
  \ `SQL Server 代理` 安全模型、如何创建和管理作业以及如何创建警报。\n\n#### SQL Server 代理概念\n\n`SQL Server\
  \ 代理` 通过 `作业`（协调运行的任务）、`计划`（定义任务运行的时间）、`警报`（可响应 SQL Server 中发生的事件）和 `操作员`（通常是 DBA，负责接收诸如作业状态或已触发的警报等事件通知的用户）来实现。以下部分将向您介绍这些概念中的每一个。\n\
  \n##### 计划\n\n`计划` 定义了触发作业开始运行的时间或条件。计划可以定义为：\n\n-   `一次性`：允许您指定特定的日期和时间。\n-   `在\
  \ SQL Server 代理启动时自动启动`：如果希望一组任务在实例启动时运行（假设 `SQL Server 代理` 服务配置为自动启动），则很有用。\n-\
  \   `在 CPU 变得空闲时启动`：如果您有资源密集型作业，不希望影响用户活动，则很有用。\n-   `重复`：允许您定义一个复杂的计划，包含开始和结束日期，可以按天、周或月重复。如果您将作业调度为每周运行，那么您还可以定义它应在哪些天运行。如果将计划定义为按天，您可以选择触发器每天发生一次、每小时一次、每分钟一次，甚至频繁到每\
  \ 10 秒一次。如果计划基于秒、分或小时重复，则可以在一天内定义开始和停止时间。这意味着您可以调度一个作业在例如 18:00 到 20:00 之间每分钟运行一次。\n\
  \n#### 提示\n\n一个每日重复计划实际上用于定义按天、小时、分钟或秒运行的计划。\n\n您可以为每个作业创建单独的计划，也可以选择定义一个计划并用它来触发您需要同时运行的多个作业——例如，当您有多个希望在\
  \ `CPU` 空闲时运行的维护作业时。在这种情况下，您对所有这些作业使用相同的计划。另一个例子是当您有多个 `ETL` 在不同数据库上运行时。如果 `ETL`\
  \ 窗口很小，您可能希望所有这些作业同时运行。同样，您可以定义一个单一计划并将其用于所有 `ETL` 作业。这种方法可以减少管理工作；例如，如果 `ETL` 窗口发生变化，您只需更改一个计划，而不是多个计划。\n\
  \n##### 操作员\n\n`操作员` 是配置为接收作业状态通知或警报触发时通知的个人或团队。您可以配置通过电子邮件、`NET SEND` 或 `寻呼机` 来通知操作员。然而，值得注意的是，`寻呼机`\
  \ 和 `NET SEND` 选项已弃用，您应避免使用它们。\n\n如果您选择配置操作员通过电子邮件接收通知，那么您还必须配置本章后面讨论的 `数据库邮件`，指定传递消息的\
  \ `SMTP 中继服务器` 的地址和端口。如果您配置操作员通过 `NET SEND` 接收通知，那么 `SQL Server Agent` Windows 服务依赖于\
  \ `NET SEND` 服务以及 `SQL Server` 服务才能启动。如果您配置操作员通过 `寻呼机` 接收通知，那么您必须使用 `数据库邮件` 将消息中继到电子邮件转寻呼机服务。\n\
  \n#### 注意\n\n通过引入对 `NET SEND` 服务的依赖，您会增加操作风险。\n\n使用 `寻呼机` 警报时，您可以为每个操作员配置其当班的日期和时间。您可以在提供支持轮班或为运营支持采用“追随太阳”支持模式的\
  \ `24/7` 组织中配置此功能，这种模式将轮班交接给不同全球区域的支持团队。此功能还允许您为每个操作员配置工作日、星期六和星期日的不同轮班模式。\n\n\n\
  ##### 作业\n\n一个作业由一系列你应该执行的操作组成。每个操作被称为一个 `job step`（作业步骤）。你可以将每个作业步骤配置为执行以下类别之一的操作：\n\
  \n*   SSIS 包\n*   T-SQL 命令\n*   PowerShell 脚本\n*   操作系统命令\n*   复制分发器任务\n*   复制合并代理任务\n\
  *   复制队列读取器代理任务\n*   复制快照代理任务\n*   复制事务日志读取器任务\n*   分析服务命令\n*   分析服务查询\n\n除了 T-SQL\
  \ 命令外，你可以配置每个作业步骤，使其在运行 SQL Server Agent 服务的服务账户上下文下运行，或者在代理账户下运行（代理账户链接到凭据）。你还可以配置每个步骤重试特定的次数，以及每次重试之间的间隔。\n\
  \n此外，你可以为每个作业步骤单独配置“成功时”和“失败时”的操作。这使得数据库管理员能够实现基于决策的逻辑和错误处理，如图 22-1 所示。\n\n![图 22-1\
  \ 决策树逻辑](img/333037_2_En_22_Fig1_HTML.png)\n\n你可以在专为正在配置的作业创建的计划上运行每个作业，也可以在多个作业之间共享计划（这些作业都应在同一计划上运行）。\n\
  \n你还可以为每个作业配置通知。通知会向操作员提醒作业的成功或失败，但你也可以配置它将条目写入 Windows 应用程序事件日志，甚至删除该作业。\n\n#####\
  \ 警报\n\n`Alerts`（警报）响应写入 Windows 应用程序事件日志的 SQL Server 中发生的事件。警报可以响应以下类别的活动：\n\n\
  *   SQL Server 事件\n*   SQL Server 性能条件\n*   WMI 事件\n\n当你针对 SQL Server 事件类别创建警报时，可以配置它响应特定的错误消息或发生的特定错误严重级别。你还可以过滤警报，使其仅在错误或警告包含特定文本时触发。它们也可以按发生错误的具体数据库进行过滤。\n\
  \n当你针对 SQL Server 性能条件类别创建警报时，它们的配置使得当计数器低于、等于或高于指定值时触发。配置此类警报时，你需要选择本质上是性能条件类别的性能对象、该性能对象内的计数器，以及你希望针对其发出警报的计数器实例。例如，要触发一个警报，在`Chapter22`数据库的“日志使用百分比”计数器超过\
  \ 70% 时，你需要选择 Databases（数据库）对象、Percent Log Used（日志使用百分比）计数器和`Chapter22`实例，并配置警报在该计数器超过\
  \ 70 时触发。运行清单 22-1 中的查询可以显示性能对象及其关联性能计数器的完整列表。\n\n```sql\nSELECT\n    object_name\n\
  \    , counter_name\nFROM msdb.dbo.sysalerts_performance_counters_view\nORDER BY\
  \ object_name\n-- 清单 22-1\n-- 列出性能对象和计数器\n```\n\n#### SQL Server Agent 安全性\n\n你通过数据库角色控制对\
  \ SQL Server Agent 的访问，并且可以让作业步骤在 SQL Server Agent 服务账户的上下文下运行，或者使用映射到凭据的单独代理账户运行。这两个概念将在以下部分探讨。\n\
  \n##### SQL Server Agent 数据库角色\n\n除了 `sysadmin` 服务器角色的成员（他们拥有对 SQL Server Agent\
  \ 的完全访问权限）外，可以使用 MSDB 数据库中的固定数据库角色授予对 SQL Server Agent 的访问权限。提供了以下角色：\n\n*   `SQLAgentUserRole`\n\
  *   `SQLAgentReaderRole`\n*   `SQLAgentOperatorRole`\n\n这些角色提供的权限详见表 22-1。`sysadmin`\
  \ 角色的成员被授予对 SQL Server Agent 的所有权限。这包括任何 SQL Server Agent 角色都未提供的权限，例如编辑多服务器作业属性。无法通过\
  \ SQL Server Agent 角色成员资格执行的操作只能由 `sysadmin` 角色的成员执行。\n\n**表 22-1 SQL Server Agent\
  \ 权限矩阵**\n\n| 权限 | SQLAgentUserRole | SQLAgentReaderRole | SQLAgentOperatorRole\
  \ |\n| --- | --- | --- | --- |\n| `创建`/`更改`/`删除` 操作员 | 否 | 否 | 否 |\n| `创建`/`更改`/`删除`\
  \ 本地作业 | 是（仅限所有者） | 是（仅限所有者） | 是（仅限所有者） |\n| `创建`/`更改`/`删除` 多服务器作业 | 否 | 否 | 否 |\n\
  | `创建`/`更改`/`删除` 计划 | 是（仅限所有者） | 是（仅限所有者） | 是（仅限所有者） |\n| `创建`/`更改`/`删除` 代理 | 否\
  \ | 否 | 否 |\n| `创建`/`更改`/`删除` 警报 | 否 | 否 | 否 |\n| 查看操作员列表 | 是 | 是 | 是 |\n| 查看本地作业列表\
  \ | 是（仅限所有者） | 是 | 是 |\n| 查看多服务器作业列表 | 否 | 是 | 是 |\n| 查看计划列表 | 是（仅限所有者） | 是 | 是\
  \ |\n| 查看代理列表 | 是 | 是 | 是 |\n| 查看警报列表 | 否 | 否 | 否 |\n| 启用/禁用操作员 | 否 | 否 | 否 |\n\
  | 启用/禁用本地作业 | 是（仅限所有者） | 是（仅限所有者） | 是 |\n| 启用/禁用多服务器作业 | 否 | 否 | 否 |\n| 启用/禁用计划\
  \ | 是（仅限所有者） | 是（仅限所有者） | 是 |\n| 启用/禁用警报 | 否 | 否 | 否 |\n| 查看操作员属性 | 否 | 否 | 是 |\n\
  | 查看本地作业属性 | 是（仅限所有者） | 是 | 是 |\n| 查看多服务器作业属性 | 否 | 是 | 是 |\n| 查看计划属性 | 是（仅限所有者）\
  \ | 是 | 是 |\n| 查看代理属性 | 否 | 否 | 是 |\n| 查看警报属性 | 否 | 否 | 是 |\n| 编辑操作员属性 | 否 | 否 |\
  \ 否 |\n| 编辑本地作业属性 | 否 | 是（仅限所有者） | 是（仅限所有者） |\n| 编辑多服务器作业属性 | 否 | 否 | 否 |\n| 编辑计划属性\
  \ | 否 | 是（仅限所有者） | 是（仅限所有者） |\n| 编辑代理属性 | 否 | 否 | 否 |\n| 编辑警报属性 | 否 | 否 | 否 |\n\
  | 启动/停止本地作业 | 是（仅限所有者） | 是（仅限所有者） | 是 |\n| 启动/停止多服务器作业 | 否 | 否 | 否 |\n| 查看本地作业历史记录\
  \ | 是（仅限所有者） | 是 | 是 |\n| 查看多服务器作业历史记录 | 否 | 是 | 是 |\n| 删除本地作业历史记录 | 否 | 否 | 是 |\n\
  | 删除多服务器作业历史记录 | 否 | 否 | 否 |\n| 附加/分离计划 | 是（仅限所有者） | 是（仅限所有者） | 是（仅限所有者） |\n\n#####\
  \ SQL Server Agent 代理账户\n\n默认情况下，所有作业步骤都在 SQL Server Agent 服务账户的上下文下运行。然而，采用这种方法可能存在安全风险，因为你可能需要授予该服务账户对实例和操作系统内对象的大量权限。对于需要跨服务器访问的作业，需要授予服务账户的权限量尤为重要。\n\
  \n为了减轻这种风险并遵循最小权限原则，你应该考虑使用代理账户。代理在实例级别映射到凭据，并且你可以配置它们仅运行步骤类型的一个子集。例如，你可以配置一个代理能够运行操作系统命令，同时配置另一个代理只能运行\
  \ PowerShell 脚本。这意味着你可以减少每个代理所需的权限。\n\n对于脚本步骤类型为 Transact-SQL (T-SQL) 的作业步骤，无法选择代理账户。相反，“以以下用户运行”选项允许你选择一个数据库用户作为运行脚本的安全上下文。此选项使用\
  \ T-SQL 中的 `EXECUTE AS` 功能来更改安全上下文。\n\n\n### 创建 SQL Server 代理作业\n\n在接下来的章节中，我们将创建一个简单的\
  \ SQL Server 代理作业，该作业运行一个操作系统命令来删除旧的备份文件。然后，我们将创建一个更复杂的 SQL Server 代理作业，该作业备份数据库并运行一个\
  \ PowerShell 脚本来确保 SQL Server 浏览器服务正在运行。然而，在创建 SQL Server 代理作业之前，我们首先需要创建 `Chapter22`\
  \ 数据库以及在后续章节中使用的安全主体。\n\n你可以在清单 22-2 中找到执行这些任务的脚本。该脚本使用 PowerShell 创建两个域用户：`SQLUser`\
  \ 和 `WinUser`。然后它使用 `SQLCMD` 来创建 `Chapter22` 数据库，之后为 `SQLUser` 创建一个登录名，并将其映射到具有备份权限的\
  \ `Chapter22` 数据库。你可以从 PowerShell ISE（集成脚本环境）或 PowerShell 命令提示符运行该脚本。你应该在 Windows\
  \ Server 操作系统上运行该脚本；如果你在其他操作系统上运行，则需要手动准备环境。\n\n```powershell\nSet-ExecutionPolicy\
  \ Unrestricted\nimport-module SQLPS\nimport-module servermanager\nAdd-WindowsFeature\
  \ -Name \"RSAT-AD-PowerShell\" -IncludeAllSubFeature\nNew-ADUser SQLUser -AccountPassword\
  \ (ConvertTo-SecureString -AsPlainText \"Pa$$w0rd\" -Force) -Server \"PROSQLADMIN.COM\"\
  \nEnable-ADAccount -Identity SQLUser\nNew-ADUser WinUser -AccountPassword (ConvertTo-SecureString\
  \ -AsPlainText \"Pa$$w0rd\" -Force) -Server \"PROSQLADMIN.COM\"\nEnable-ADAccount\
  \ -Identity WinUser\n$perm = [ADSI]\"WinNT://SQLServer/Administrators,group\"\n\
  $perm.psbase.Invoke(\"Add\",([ADSI]\"WinNT://PROSQLADMIN/WinUser\").path)\ninvoke-sqlcmd\
  \ -ServerInstance .\\MasterServer -Query \"--创建数据库\nCREATE DATABASE Chapter22 ;\n\
  GO\nUSE Chapter22\nGO\n--创建并填充数字表\nDECLARE @Numbers TABLE\n(\nNumber        INT\n\
  )\n;WITH CTE(Number)\nAS\n(\nSELECT 1 Number\nUNION ALL\nSELECT Number + 1\nFROM\
  \ CTE\nWHERE Number < 100\n)\nINSERT INTO @Numbers\nSELECT Number FROM CTE;\n--创建并填充名字片段表\n\
  DECLARE @Names TABLE\n(\nFirstName       VARCHAR(30),\nLastName        VARCHAR(30)\n\
  );\nINSERT INTO @Names\nVALUES('Peter', 'Carter'),\n('Michael', 'Smith'),\n('Danielle',\
  \ 'Mead'),\n('Reuben', 'Roberts'),\n('Iris', 'Jones'),\n('Sylvia', 'Davies'),\n\
  ('Finola', 'Wright'),\n('Edward', 'James'),\n('Marie', 'Andrews'),\n('Jennifer',\
  \ 'Abraham');\n--创建并填充 Customers 表\nCREATE TABLE dbo.Customers\n(\nCustomerID  \
  \     INT           NOT NULL    IDENTITY    PRIMARY KEY,\nFirstName          VARCHAR(30)\
  \   NOT NULL,\nLastName           VARCHAR(30)   NOT NULL,\nBillingAddressID   INT\
  \           NOT NULL,\nDeliveryAddressID  INT           NOT NULL,\nCreditLimit \
  \       MONEY         NOT NULL,\nBalance            MONEY         NOT NULL\n);\n\
  SELECT * INTO #Customers\nFROM\n(SELECT\n(SELECT TOP 1 FirstName FROM @Names ORDER\
  \ BY NEWID()) FirstName,\n(SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName,\n\
  (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) BillingAddressID,\n(SELECT\
  \ TOP 1 Number FROM @Numbers ORDER BY NEWID()) DeliveryAddressID,\n(SELECT TOP 1\
  \ CAST(RAND() * Number AS INT) * 10000\nFROM @Numbers\nORDER BY NEWID()) CreditLimit,\n\
  (SELECT TOP 1 CAST(RAND() * Number AS INT) * 9000\nFROM @Numbers\nORDER BY NEWID())\
  \ Balance\nFROM @Numbers a\n) a;\n--创建 SQLUser 登录和数据库用户\nUSE Master\nGO\nCREATE\
  \ LOGIN [PROSQLADMIN\\sqluser] FROM WINDOWS WITH DEFAULT_DATABASE=Chapter22 ;\n\
  GO\nUSE Chapter22\nGO\nCREATE USER [PROSQLADMIN\\sqluser] FOR LOGIN [PROSQLADMIN\\\
  sqluser] ;\nGO\n--将 SQLUser 添加到 db_backupoperator 角色\nALTER ROLE db_backupoperator\
  \ ADD MEMBER [PROSQLADMIN\\sqluser] ;\nGO\"\n清单 22-2\n准备环境\n```\n\n### 创建简单的 SQL\
  \ Server 代理作业\n\n我们首先创建一个简单的代理作业，该作业使用操作系统命令删除超过 30 天的备份文件，并将此作业安排为每月运行一次。我们使用“新建作业”对话框创建\
  \ SQL Server 代理对象。要调用此对话框，请在对象资源管理器中浏览到 `SQL Server 代理`，并从“作业”上下文菜单中选择“新建作业”。图 22-2\
  \ 说明了“新建作业”对话框的“常规”页面。\n\n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig2_HTML.jpg](img/333037_2_En_22_Fig2_HTML.jpg)\n\
  图 22-2 常规页面\n\n在此页面上，我们将作业命名为 `DeleteOldBackups`，并将作业所有者更改为 `sa` 帐户。我们还可以选择添加作业的描述并选择一个类别。\n\
  \n在“步骤”页面上，我们使用“新建”按钮调用“新建作业步骤”对话框。此对话框的“常规”选项卡如图 22-3 所示。\n\n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig3_HTML.jpg](img/333037_2_En_22_Fig3_HTML.jpg)\n\
  图 22-3 常规页面\n\n在此页面上，我们为作业步骤指定一个名称，在“类型”下拉列表中指定该步骤是操作系统命令，并在“运行身份”下拉列表中确认该步骤在 SQL\
  \ Server 代理服务帐户的安全上下文下运行。在“命令”部分，我们输入一个批处理命令，该命令从我们的默认备份位置删除所有超过 30 天且文件扩展名为 `.bak`\
  \ 的文件。你可以在清单 22-3 中找到此批处理命令。\n\n```cmd\nforfiles -p \"C:\\Program Files\\Microsoft\
  \ SQL Server\\MSSQL12.MASTERSERVER\\MSSQL\\Backup\" -s -m *.bak /D -30 /C \"cmd\
  \ /c del @path\"\n清单 22-3\n删除旧备份\n```\n\n在“新建作业步骤”对话框的“高级”页面（如图 22-4 所示）中，我们保留默认设置。然而，在更复杂的场景中，我们可以使用此页面来配置日志记录和控制决策树逻辑。我们将在下一节中讨论这一点。\n\
  \n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig4_HTML.jpg](img/333037_2_En_22_Fig4_HTML.jpg)\n\
  图 22-4 高级页面\n\n一旦配置了作业步骤，我们就可以退出“新建作业步骤”对话框并返回到“新建作业”对话框。现在，我们转到“计划”页面。在此页面上，我们使用“新建”按钮调用“新建作业计划”对话框，如图\
  \ 22-5 所示。\n\n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig5_HTML.jpg](img/333037_2_En_22_Fig5_HTML.jpg)\n\
  图 22-5 “新建作业计划”对话框\n\n在“新建作业计划”对话框中，我们首先输入计划的名称。默认计划类型是“重复出现”，但如果我们选择其他选项，屏幕会动态变化。在屏幕的“频率”部分，我们选择“每月”。同样，如果我们在该下拉列表中选择“每周”或“每天”，屏幕也会动态变化。\n\
  \n我们现在可以配置希望计划调用作业执行的日期和时间。在我们的场景中，我们保留午夜、每月第一天的默认选项。\n\n在“新建作业”对话框的“通知”页面上，我们配置希望在作业完成时发生的任何操作。如图\
  \ 22-6 所示，我们配置了一个条目，如果作业失败，则写入 Windows 应用程序日志。如果你的企业由 SCOM 等监控工具管理，这是一个特别有用的选项，因为你可以配置\
  \ SCOM 监控 Windows 应用程序日志中的失败条目并向 DBA 团队发送警报。在下一节中，我们将讨论如何直接从 SQL Server 代理配置电子邮件通知。\n\
  \n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig6_HTML.jpg](img/333037_2_En_22_Fig6_HTML.jpg)\n\
  图 22-6 通知页面\n\n\n\n#### 创建复杂的 SQL Server Agent 作业\n\n在以下章节中，我们将创建一个更复杂的 SQL Server\
  \ Agent 作业，该作业用于备份 `Chapter22` 数据库。然后，该作业将检查 `SQL Server Browser` 服务是否正在运行。我们使用\
  \ `Run As` 来设置 T-SQL 作业步骤运行的上下文，并使用代理来运行 `PowerShell` 作业步骤。我们还将配置 `Database Mail`，以便可以在作业成功或失败时通知操作员，并将作业设置为定期运行。您还可以了解如何使用\
  \ T-SQL 创建 `SQL Server Agent` 对象，这在您于 `Server Core` 环境中工作时可能很有用。\n\n##### 创建凭据\n\
  \n现在我们的环境已准备就绪，我们创建一个 `SQL Server Agent` 作业，该作业首先备份 `Chapter22` 数据库。然后，该作业将检查以确保\
  \ `SQL Server Browser` 服务正在运行。检查浏览器服务是否正在运行是一种有用的做法，因为如果它停止，那么应用程序只有在其连接字符串中指定实例的端口号才能连接到该实例。我们在\
  \ `SQL User` 的上下文下将备份作为 T-SQL 命令运行，并使用 `WinUser` 帐户通过 `PowerShell` 检查浏览器服务是否正在运行。因此，我们的第一步是创建一个使用\
  \ `WinUser` 帐户的凭据。我们可以在 `SQL Server Management Studio` 中通过浏览到 `Security` 并从 `Credentials`\
  \ 上下文菜单中选择 `New Credential` 来实现这一点。这将调用 `New Credential` 对话框，如图 22-7 所示。\n\n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig7_HTML.jpg](img/333037_2_En_22_Fig7_HTML.jpg)\n\
  图 22-7：新建凭据对话框\n\n在此对话框中，使用 `Credential Name` 字段指定新凭据的名称。在 `Identity` 字段中，指定您希望使用的\
  \ Windows 安全主体的名称，然后在 `Password` 和 `Confirm Password` 字段中输入 Windows 密码。您还可以将凭据链接到\
  \ `EKM` 提供程序。如果您希望这样做，请勾选 `Use Encryption Provider` 并从下拉列表中选择您的提供程序。`EKM` 将在第 11\
  \ 章中进一步讨论。\n\n##### 创建代理\n\n接下来，让我们创建一个使用此凭据的 `SQL Server Agent` 代理帐户。我们配置此代理帐户能够运行\
  \ `PowerShell` 作业步骤。我们可以通过 `SSMS` 浏览到 `Object Explorer` 中的 `SQL Server Agent`，然后从\
  \ `Proxies` 上下文菜单中选择 `New Proxy` 来实现这一点。这将显示 `New Proxy Account` 对话框的 `General`\
  \ 页面，如图 22-8 所示。\n\n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig8_HTML.jpg](img/333037_2_En_22_Fig8_HTML.jpg)\n\
  图 22-8：新建代理帐户对话框\n\n在此页面上，我们为代理帐户指定一个名称并提供描述。我们使用 `Credential Name` 字段选择我们的 `WinUserCredential`\
  \ 凭据，然后使用 `Active To The Following Subsystems` 部分授权该代理运行 `PowerShell` 作业步骤。\n\n\
  #### 提示\n\n如果您从 `Object Explorer` 的 `Proxies` 节点下相关子系统的节点进入新的代理帐户，则对话框内会自动选择相关的子系统。\n\
  \n在 `Principals` 页面上，我们可以添加有权使用该代理的登录名或服务器角色。在我们的案例中，这不是必需的，因为我们使用管理员帐户运行 `SQL Server`，而管理员自动拥有代理帐户的权限。\n\
  \n##### 创建计划\n\n现在我们的代理帐户已配置完毕，我们创建作业要使用的计划。我们需要维护作业在每晚运行，因此我们将计划配置为每天凌晨 1 点运行。要从\
  \ `SSMS` 调用 `New Job Schedule` 对话框，我们在 `Object Explorer` 中从 `SQL Server Agent` 上下文菜单中选择\
  \ `New` > `Schedule`。此对话框如图 22-9 所示。\n\n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig9_HTML.jpg](img/333037_2_En_22_Fig9_HTML.jpg)\n\
  图 22-9：新建作业计划对话框\n\n在此对话框中，我们在 `Name` 字段中指定计划的名称，并在 `Schedule Type` 字段中选择计划的条件。选择\
  \ `Recurring` 以外的任何条件将导致 `Frequency` 和 `Duration` 部分变为不可用。选择 `One Time` 以外的任何条件将导致\
  \ `One-Time Occurrence` 部分变为不可用。我们还确保勾选 `Enabled` 框，以便可以使用该计划。\n\n在 `Frequency`\
  \ 部分，我们在 `Occurs` 下拉列表中选择 `Daily`。我们在此字段中的选择会导致 `Frequency` 和 `Daily Frequency`\
  \ 部分中的选项根据我们的选择动态更改。由于我们希望计划每天凌晨 1 点运行，因此我们确保在 `Recurs Every` 字段中指定 `1`，并将 `Occurs\
  \ Once At` 字段更改为 `1 AM`。因为我们希望作业立即开始运行且永不过期，所以我们不需要编辑 `Duration` 部分中的字段。\n\n#####\
  \ 配置数据库邮件\n\n我们希望如果作业失败，能通知到我们的 DBA 邮件列表。因此，我们需要创建一个操作员。然而，在此之前，我们需要在实例上配置 `Database\
  \ Mail`，以便可以发送通知。我们的第一步是启用 `Database Mail` 扩展存储过程，这些过程默认是禁用的，以减少攻击面。我们可以使用 `sp_configure`\
  \ 来激活它们，如清单 22-4 所示。\n\n\n#### 注意\n\n如果您没有访问 SMTP 中继服务器的权限，那么本节中的示例仍然有效，但您将不会收到电子邮件。\n\
  \n```sql\nEXEC sp_configure 'show advanced options', 1 ;\nGO\nRECONFIGURE\nGO\n\
  EXEC sp_configure 'Database Mail XPs', 1 ;\nGO\nRECONFIGURE\nGO\n清单 22-4\n启用 Database\
  \ Mail XPs\n```\n\n现在，我们可以通过在对象资源管理器中浏览到“管理”，然后选择“Database Mail”来启动“数据库邮件配置向导”。在通过欢迎页面后，我们将看到如图\
  \ 22-10 所示的“选择配置任务”页面。\n\n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig10_HTML.jpg](img/333037_2_En_22_Fig10_HTML.jpg)\n\
  \n图 22-10 “选择配置任务”页面\n\n在此页面上，我们应确保选中了 `通过执行以下任务设置数据库邮件` 选项。在“新建配置文件”页面上，我们指定配置文件的名称。配置文件是一个或多个邮件帐户的别名，用于向操作员发送通知。最佳实践是向一个配置文件添加多个帐户；这样，如果一个帐户失败，您可以使用另一个。此页面如图\
  \ 22-11 所示。\n\n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig11_HTML.jpg](img/333037_2_En_22_Fig11_HTML.jpg)\n\
  \n图 22-11 “新建配置文件”页面\n\n现在，让我们使用“添加”按钮，通过如图 22-12 所示的“新建数据库邮件帐户”对话框，向配置文件中添加一个或多个\
  \ SMTP（简单邮件传输协议）电子邮件帐户。\n\n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig12_HTML.jpg](img/333037_2_En_22_Fig12_HTML.jpg)\n\
  \n图 22-12 “新建数据库邮件帐户”对话框\n\n在此对话框中，我们指定帐户的名称和可选的描述。然后，我们需要指定用于发送邮件的电子邮件地址，以及将传递邮件的\
  \ SMTP 服务器的名称和端口。您还可以指定接收电子邮件时显示的显示名称。对于接收通知的 DBA 来说，如果显示名称包含生成通知的 `服务器\\实例`，将会很有帮助。我们选择了匿名身份验证。这意味着对\
  \ SMTP 服务器的访问是通过防火墙规则控制的，而不是通过身份验证。这在企业环境中是相对常见的方法。\n\n添加帐户后，我们可以转到向导的“管理配置文件安全性”页面。此页面有两个选项卡：“公共配置文件”和“专用配置文件”。我们将配置文件配置为公共的，并将其标记为默认配置文件。将配置文件公开意味着任何有权访问\
  \ MSDB 数据库的用户都可以使用该配置文件发送电子邮件。如果我们将配置文件设为专用，则需要指定可以使用该配置文件发送电子邮件的用户或角色列表。将配置文件标记为默认配置文件会将该配置文件设为该用户或角色的默认配置文件。每个用户或角色可以有一个默认配置文件。“公共配置文件”选项卡如图\
  \ 22-13 所示。\n\n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig13_HTML.jpg](img/333037_2_En_22_Fig13_HTML.jpg)\n\
  \n图 22-13 “公共配置文件”选项卡\n\n在向导的“配置系统参数”页面上，如图 22-14 所示，您可以更改默认系统属性，这些属性控制邮件的处理方式。这包括指定帐户应重试的次数以及重试之间的时间间隔。它还涉及设置电子邮件的最大允许大小以及配置文件扩展名黑名单。`数据库邮件可执行文件最短生存期（秒）`\
  \ 设置配置当队列中没有等待发送的电子邮件时，数据库邮件进程应保持活动状态的时间。可以使用以下设置配置日志记录级别：\n\n*   `常规`：记录错误\n* \
  \  `扩展`：记录错误、警告和信息性消息\n*   `详细`：记录错误、警告、信息性消息、成功消息和内部消息\n\n#### 注意\n\n遗憾的是，附件排除是作为黑名单实现的，而不是白名单。这意味着，为了实现安全性和操作支持的最佳平衡，您应该花时间并认真考虑应排除的文件类型。\n\
  \n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig14_HTML.jpg](img/333037_2_En_22_Fig14_HTML.jpg)\n\
  \n图 22-14 “配置系统参数”页面\n\n在“完成向导”页面上，系统会提供将要执行的任务摘要。在我们的场景中，这包括创建新帐户、创建新配置文件、将帐户添加到配置文件以及配置配置文件的安全性。\n\
  \n我们现在需要配置 SQL Server 代理以使用我们的邮件配置文件。为此，我们在对象资源管理器中右键单击 SQL Server 代理的上下文菜单，选择“属性”以调用“SQL\
  \ Server 代理属性”对话框，并导航到“警报系统”页面，如图 22-15 所示。\n\n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig15_HTML.jpg](img/333037_2_En_22_Fig15_HTML.jpg)\n\
  \n图 22-15 “警报系统”页面\n\n在此页面上，我们选中“启用邮件配置文件”复选框，然后从下拉列表中选择 `DBA-DL` 配置文件。退出对话框后，操作员就可以使用数据库邮件了。\n\
  \n##### 创建操作员\n\n既然数据库邮件已配置好，我们需要创建一个操作员，以便在作业失败时接收电子邮件。我们可以通过在对象资源管理器中浏览到 SQL Server\
  \ 代理，然后从“操作员”上下文菜单中选择“新建操作员”来访问“新建操作员”对话框。“新建操作员”对话框的“常规”页面如图 22-16 所示。\n\n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig16_HTML.jpg](img/333037_2_En_22_Fig16_HTML.jpg)\n\
  \n图 22-16 “常规”页面\n\n在此页面上，我们指定操作员的名称，并添加操作员将使用的电子邮件地址。这必须与在数据库邮件中配置的电子邮件地址匹配。“通知”页面显示已为操作员配置的警报和通知的详细信息，因此目前与我们无关。\n\
  \n##### 创建作业\n\n现在所有先决条件都已就绪，我们可以开始创建 SQL Server Agent 作业了。在 SQL Server Management\
  \ Studio 中，我们可以通过依次展开对象资源管理器中的 `SQL Server Agent`，然后从“作业”上下文菜单中选择“新建作业”来完成此操作。这将打开“新建作业”对话框的“常规”页面，如图\
  \ 22-17 所示。\n\n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig17_HTML.jpg](img/333037_2_En_22_Fig17_HTML.jpg)\n\
  *图 22-17: 常规页面*\n\n在此页面上，我们使用“名称”字段为作业指定一个名称，并可以选择在“描述”字段中添加说明。将作业归入某个类别也是可选的；在我们的示例中，我们通过从下拉列表中选择，将作业添加到了“数据库维护”类别。我们还选中了“已启用”复选框，以便作业在创建后立即处于活动状态。\n\
  \n我们还指定作业所有者为 `sa`。这是一个有争议的话题，但我通常推荐这种方法，原因如下：作业所有权并不那么重要。无论谁拥有该作业，其功能都是相同的。但是，如果所有者的账户被删除，那么作业将不再运行。如果将\
  \ `sa` 设置为所有者，则这种情况就不会发生。但是，如果您使用的是 Windows 身份验证模型（而非混合模式身份验证），那么使用 SQL Server Agent\
  \ 服务账户作为替代是合理的。这是因为，尽管您更改服务账户并删除关联登录名的可能性存在，但这比删除其他用户登录名的可能性（例如 DBA 离职时删除其登录名）要小。\n\
  \n在对话框的“步骤”页面上，我们使用“新建”按钮来添加第一个步骤——备份 `Chapter22` 数据库。“新建作业步骤”对话框的“常规”页面如图 22-18\
  \ 所示。\n\n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig18_HTML.jpg](img/333037_2_En_22_Fig18_HTML.jpg)\n\
  *图 22-18: “新建作业步骤”对话框的常规页面*\n\n在此页面上，我们输入 `Backup` 作为作业步骤的名称，并在“命令”字段中键入 `BACKUP\
  \ DATABASE` 命令。“类型”字段允许我们选择要使用的子系统，但它默认为 `T-SQL`，因此我们不需要更改此项。清单 22-5 包含了备份脚本。\n\n\
  #### 提示\n务必要在将脚本添加到作业之前对其进行测试。\n\n```\nBACKUP DATABASE Chapter22\nTO DISK =\nN'C:\\\
  Microsoft SQL Server\\MSSQL15.PROSQLADMIN\\MSSQL\\Backup\\Chapter22.bak'\nWITH NOINIT\n\
  ,NAME = N'Chapter22-Full Database Backup'\n,SKIP\n,STATS = 10 ;\n```\n*清单 22-5:\
  \ 备份脚本*\n\n在如图 22-19 所示的“高级”页面上，我们使用“成功时的操作”和“失败时的操作”下拉框来配置该步骤，使其无论成功或失败都转到下一步。我们这样做是因为我们的两个步骤是相互独立的。我们还配置该步骤在失败前重试三次，间隔为\
  \ 1 分钟。\n\n我们选中“在历史记录中包含步骤输出”复选框，以便将步骤输出包含在作业历史记录中（这有助于 DBA 排查任何问题），并配置该步骤以 `SQLUser`\
  \ 用户身份运行。我们配置“以以下用户身份运行”选项是因为，如前所述，`T-SQL` 类型的作业步骤使用 `EXECUTE AS` 技术（而不是代理账户）来实现安全性。\n\
  \n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig19_HTML.jpg](img/333037_2_En_22_Fig19_HTML.jpg)\n\
  *图 22-19: 高级页面*\n\n关闭对话框后，我们需要再次使用“新建作业”对话框“步骤”页面上的“新建”按钮来添加第二个作业步骤。这一次，在“常规”页面上，我们指定\
  \ `PowerShell` 类型并输入用于检查 SQL Server Browser 服务状态的 PowerShell 脚本。我们还使用“运行身份”框指定该步骤在\
  \ `PowerShellProxy` 代理的上下文中运行，如图 22-20 所示。清单 22-6 显示了我们使用的命令。\n\n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig20_HTML.jpg](img/333037_2_En_22_Fig20_HTML.jpg)\n\
  *图 22-20: 常规页面*\n\n```\nGet-Service | Where {$_.name -eq \"SQLBrowser\"}\n```\n\
  *清单 22-6: 检查 Browser 服务*\n\n在“高级”页面上，我们选择将步骤输出包含在作业历史记录中。我们可以将所有其他选项保留为其默认值。\n\n\
  当我们返回到“新建作业”对话框的“步骤”页面时，会看到两个步骤按正确的顺序列出，如图 22-21 所示。但是，如果我们希望更改步骤的顺序，可以使用“移动步骤”部分中的上箭头和下箭头。我们还可以通过使用“起始步骤”下拉列表选择从后面的步骤开始作业来跳过前面的步骤。\n\
  \n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig21_HTML.jpg](img/333037_2_En_22_Fig21_HTML.jpg)\n\
  *图 22-21: 步骤页面*\n\n在向导的“计划”页面上，我们单击“选取”按钮；这将显示“为作业选取计划”对话框中现有的计划列表（参见图 22-22）。我们使用此对话框来选择我们的维护计划。\n\
  \n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig22_HTML.jpg](img/333037_2_En_22_Fig22_HTML.jpg)\n\
  *图 22-22: “为作业选取计划”对话框*\n\n关闭对话框后，计划将显示在“作业属性”对话框的“计划”页面上。\n\n您可以使用“警报”页面来为作业配置警报。这与我们当前的场景无关，但本章后面会讨论警报。\n\
  \n在“通知”页面上，我们配置希望当作业失败时通过电子邮件收到通知的 `DBATeam` 操作员。我们通过选中“电子邮件”复选框并从下拉列表中选择我们的 `DBATeam`\
  \ 操作员来实现，如图 22-23 所示。\n\n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig23_HTML.jpg](img/333037_2_En_22_Fig23_HTML.jpg)\n\
  *图 22-23: 通知页面*\n\n您可以使用“目标”页面来配置多服务器作业，这与我们当前的场景无关，但我们将在本章后面讨论它们。\n\n##### 监控与管理作业\n\
  \n尽管作业通常被安排为自动运行，但您仍然会遇到监控和维护需求，例如手动执行作业和查看作业历史记录。以下部分将讨论这些任务。\n\n\n### 执行作业\n\n\
  即使作业被设置为自动运行，有时您也可能希望按需执行它。例如，如果您有一个被安排每晚运行以对实例中的数据库进行完整备份的作业，您可能希望在代码发布或软件升级之前手动执行一次。\n\
  \n在 SQL Server Management Studio 中，可以通过在对象资源管理器中浏览到 **SQL Server 代理** ➤ **作业**，然后从作业的上下文菜单中选择“**启动作业**”来手动执行作业；这样做会调用“启动作业”对话框。图\
  \ 22-24 显示了 BackupAndCheckBrowser 作业的“启动作业”对话框。在此对话框中，您可以在使用“启动”按钮执行作业之前，选择要运行的作业的第一步。\n\
  \n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig24_HTML.jpg](img/333037_2_En_22_Fig24_HTML.jpg)\n\
  \n图 22-24\n启动作业对话框\n\n要使用 T-SQL 执行作业，您可以使用 `sp_start_job` 系统存储过程。此过程接受表 22-2 中详述的参数。\n\
  \n表 22-2\nsp_start_job 参数\n\n| 参数 | 描述 |\n| --- | --- |\n| `@job_name` | 要执行的作业的名称。如果为\
  \ `NULL`，则必须指定 `@job_id` 参数。 |\n| `@job_id` | 要执行的作业的 ID。如果为 `NULL`，则必须指定 `@job_name`\
  \ 参数。 |\n| `@server_name` | 用于多服务器作业。指定在其上运行作业的目标服务器。 |\n| `@step_name` | 开始执行的作业步骤的名称。\
  \ |\n\n要运行我们的 BackupAndCheckBrowser 作业，我们执行清单 22-7 中的命令。一旦作业被执行，在它完成之前无法再次启动。\n\n\
  ```\nEXEC sp_start_job @job_name=N'BackupAndCheckBrowser' ;\n```\n\n清单 22-7\n执行作业\n\
  \n如果我们希望作业从后面的步骤开始执行，可以使用 `@step_name` 参数。例如，在我们的场景中，假设我们希望执行作业以检查 SQL Server Browser\
  \ 服务是否正在运行，但不希望数据库备份在之前发生。为此，我们执行清单 22-8 中的命令。\n\n```\nEXEC sp_start_job @job_name=N'BackupAndCheckBrowser',\
  \ @step_name = 'CheckBrowser' ;\n```\n\n清单 22-8\n从特定步骤启动作业\n\n### 查看作业历史记录\n\n您可以通过在对象资源管理器中的\
  \ **SQL Server 代理** ➤ **作业**下，从作业上下文菜单中选择“**查看历史记录**”来查看特定作业的作业历史记录，或者通过打开“**作业活动监视器**”（您可以在对象资源管理器的\
  \ **SQL Server 代理**节点下找到它）来查看所有作业的历史记录。图 22-25 显示了在我们的 BackupAndCheckBrowser 作业执行一次后，其作业历史记录的样子。\n\
  \n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig25_HTML.jpg](img/333037_2_En_22_Fig25_HTML.jpg)\n\
  \n图 22-25\n作业历史记录\n\n在这里，您可以看到我们浏览了“作业历史记录”以查看每个单独步骤的历史记录。突出显示第 2 步的进度条目后，我们可以看到\
  \ PowerShell 脚本的结果已写入步骤历史记录，并且它们显示 SQL Server Browser 服务正如预期那样正在运行。\n\n### 创建警报\n\
  \n创建警报允许您通过通知操作员、运行作业或两者兼而有之，来主动响应实例中发生的状况。在我们的实例上，我们希望在 `Chapter22` 日志文件使用率超过 75%\
  \ 时通知 DBATeam 操作员。\n\n要在 SQL Server Management Studio 中创建此警报，我们浏览对象资源管理器中的 **SQL\
  \ Server 代理**，从“**警报**”上下文菜单中选择“**新建警报**”。这将显示“新建警报”对话框的“常规”页面。此页面如图 22-26 所示。\n\
  \n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig26_HTML.jpg](img/333037_2_En_22_Fig26_HTML.jpg)\n\
  \n图 22-26\n常规页面\n\n在此对话框页面上，我们使用“**名称**”字段为警报指定名称，并从“**类型**”下拉列表中选择“**SQL Server\
  \ 性能条件警报**”。这会导致页面内的选项动态更新。然后，我们从“**数据库**”对象中选择“**日志已用百分比**”计数器，并指定我们对该对象的 `Chapter22`\
  \ 实例感兴趣。（此计数器针对实例上的每个数据库都有一个实例。）最后，我们指定当此计数器的值在页面的“**警报条件**”部分上升到 75 以上时应触发警报。\n\
  \n在对话框的“**响应**”页面上（如图 22-27 所示），如果条件满足，我们选中“**通知操作员**”框，然后为我们的 DBATeam 操作员选择电子邮件通知。\n\
  \n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig27_HTML.jpg](img/333037_2_En_22_Fig27_HTML.jpg)\n\
  \n图 22-27\n响应页面\n\n在对话框的“**选项**”页面上，您可以指定是否应在通知中包含警报错误文本，以及要包含的附加信息。您还可以配置在响应被触发后发生延迟。这可以帮助您避免重复通知或不必要地运行作业来修复已经正在解决的问题。图\
  \ 22-28 显示我们在通知中包含了服务器\\实例名称以帮助 DBA 识别警报来源。\n\n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig28_HTML.jpg](img/333037_2_En_22_Fig28_HTML.jpg)\n\
  \n图 22-28\n选项页面\n\n### 多服务器作业\n\n使用多服务器管理可以极大地简化管理。在多服务器环境中，您可以将一个实例配置为主服务器 (MSX)，然后将其他服务器配置为目标服务器\
  \ (TSX)。然后，您可以在 MSX 上创建一组维护作业，并配置它们在 TSX 上或 TSX 的子集上运行。\n\n#### 配置 MSX 和 TSX 服务器\n\
  \n在创建多服务器作业之前，您必须首先准备环境。第一步是编辑 MSX 上的注册表，并将 `AllowDownloadedJobsToMatchProxyName\
  \ REG_DWORD` 的值设置为 `1`，这允许作业匹配代理名称。您可以在注册表中 `Software\\Microsoft\\Microsoft SQL\
  \ Server\\[YOUR INSTANCE NAME]` 键下的 SQL Server 代理键中找到此值。您还需要确保 TSX 配置了代理账户，其名称与将在其上运行作业的\
  \ MSX 上的代理账户名称相同。\n\n我们还需要配置 TSX 在与 MSX 通信时如何加密数据。我们使用 TSX 的 `MsxEncryptChannelOptions`\
  \ 注册表键来实现这一点。您可以在注册表中 `Software\\Microsoft\\Microsoft SQL Server\\[YOUR INSTANCE\
  \ NAME]` 键下的 SQL Server 代理键中找到此键。值为 `0` 表示不使用加密。`1` 表示使用加密，但不验证证书，`2` 表示使用完整的 SSL\
  \ 加密和证书验证。在我们的环境中，由于所有实例都在同一台物理机上，我们禁用加密。\n\n因此，为了准备我们的 `SQLSERVER\\MASTERSERVER`\
  \ 实例作为 MSX，并准备我们的 `SQLSERVER\\TARGETSERVER1` 和 `SQLSERVER\\TARGETSERVER2` 实例作为 TSX，我们运行清单\
  \ 22-9 中的脚本来更新注册表。\n\n\n#### 注意\n\n本节中的演示使用了三个实例：`SQLSERVER\\MASTERSERVER`（我们将其配置为\
  \ MSX），以及 `SQLSERVER\\TARGETSERVER1` 和 `SQLSERVER\\TARGETSERVER2`（我们将它们配置为 TSX）。\n\
  \n```\nUSE Master\nGO\nEXEC xp_regwrite\n@rootkey = N'HKEY_LOCAL_MACHINE'\n,@key\
  \ = N'Software\\Microsoft\\Microsoft SQL Server\\MasterServer\\SQL Server Agent'\n\
  ,@value_name = N'AllowDownloadedJobsToMatchProxyName'\n,@type = N'REG_DWORD'\n,@value\
  \ = 1 ;\nEXEC xp_regwrite\n@rootkey='HKEY_LOCAL_MACHINE',\n@key='SOFTWARE\\Microsoft\\\
  Microsoft SQL Server\\MSSQL15.TARGETSERVER1\\SQLServerAgent',\n@value_name='MsxEncryptChannelOptions',\n\
  @type='REG_DWORD',\n@value=0 ;\nEXEC xp_regwrite\n@rootkey='HKEY_LOCAL_MACHINE',\n\
  @key='SOFTWARE\\Microsoft\\Microsoft SQL Server\\MSSQL15.TARGETSERVER2\\SQLServerAgent',\n\
  @value_name='MsxEncryptChannelOptions',\n@type='REG_DWORD',\n@value=0 ;\nGO\n清单\
  \ 22-9\n更新注册表\n```\n\n#### 提示\n\n由于我们所有的实例都位于同一台服务器上，因此可以从这三个实例中的任何一个运行此脚本。如果你的实例位于不同的服务器上，那么第一条命令将在\
  \ MSX 上运行，而其他两条命令应针对其对应的 TSX 运行。你还需要注意，运行数据库引擎的服务帐户需要拥有注册表项的权限，脚本才能成功执行。\n\n我们现在使用清单\
  \ 22-10 中的 `SQLCMD` 脚本在 `TARGETSERVER1` 和 `TARGETSERVER2` 上创建 PowerShell 代理帐户。该脚本必须在\
  \ SQLCMD 模式下运行才能生效，因为它需要连接到多个实例。\n\n```\n:connect sqlserver\\targetserver1\nCREATE\
  \ CREDENTIAL WinUserCredential\nWITH IDENTITY = N'PROSQLADMIN\\WinUser', SECRET\
  \ = N'Pa$$w0rd' ;\nGO\nEXEC msdb.dbo.sp_add_proxy\n@proxy_name=N'PowerShellProxy',\n\
  @credential_name=N'WinUserCredential',\n@enabled=1,\n@description=N'用于检查浏览器服务状态的代理'\
  \ ;\nGO\nEXEC msdb.dbo.sp_grant_proxy_to_subsystem\n@proxy_name=N'PowerShellProxy',\n\
  @subsystem_id=12 ;\nGO\n:connect sqlserver\\targetserver2\nCREATE CREDENTIAL WinUserCredential\n\
  WITH IDENTITY = N'PROSQLADMIN\\WinUser', SECRET = N'Pa$$w0rd' ;\nGO\nEXEC msdb.dbo.sp_add_proxy\n\
  @proxy_name=N'PowerShellProxy',\n@credential_name=N'WinUserCredential',\n@enabled=1,\n\
  @description=N'用于检查浏览器服务状态的代理' ;\nGO\nEXEC msdb.dbo.sp_grant_proxy_to_subsystem\n\
  @proxy_name=N'PowerShellProxy',\n@subsystem_id=12 ;\nGO\n清单 22-10\n创建代理\n```\n\n\
  我们现在可以开始将 `SQLSERVER\\MASTERSERVER` 实例配置为 MSX。要通过 SQL Server Management Studio 完成此操作，我们右键单击对象资源管理器中的\
  \ SQL Server Agent 上下文菜单，选择“多服务器管理” ➤ “将其设为 MSX”，从而启动“主服务器向导”。\n\n通过向导的欢迎页面后，我们会看到“主服务器操作员”页面（见图\
  \ 22-29）。在此页面上，我们输入一个操作员的详细信息，该操作员将接收多服务器作业状态的通知。\n\n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig29_HTML.jpg](img/333037_2_En_22_Fig29_HTML.jpg)\n\
  \n图 22-29：主服务器操作员页面\n\n在向导的“目标服务器”页面（如图 22-30 所示）中，我们从“已注册的服务器”窗格中的已注册服务器列表中选择目标服务器，并使用箭头按钮将它们移动到“目标服务器”窗格中。在“目标服务器”窗格中高亮显示一个服务器后，我们可以使用“连接”按钮来确保连通性。\n\
  \n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig30_HTML.jpg](img/333037_2_En_22_Fig30_HTML.jpg)\n\
  \n图 22-30：目标服务器页面\n\n#### 提示\n\n我们所有的实例都出现在“已注册的服务器”窗格的“本地服务器组”节点中，因为它们都在同一台服务器上。如果你希望作为目标服务器的实例不是本地的，可以通过“已注册的服务器”窗口注册服务器，该窗口可以通过\
  \ SQL Server Management Studio 的“视图”菜单访问。\n\n在向导的“主服务器登录凭据”页面上，系统会询问我们是否需要时创建新的登录名。这是\
  \ TSX 用来连接到 MSX 并下载它们应运行的作业的登录名。如果 SQL Server Agent 的实例与 MSX 共享相同的服务帐户，则不需要此操作。\n\
  \n现在，在向导的“完成”页面上，我们会看到将执行操作的摘要，然后会显示一个进度窗口，告知我们每项任务是成功还是失败。\n\n### 创建主作业\n\n您可以按照与创建本地作业相同的方式创建主作业，唯一的区别是指定其应在哪些目标服务器上运行。然而，使用多服务器作业的一个限制是，T-SQL\
  \ 作业步骤无法在另一个用户的上下文下运行；它们必须在服务帐户的上下文下运行。因此，在我们将 `BackupAndCheckBrowser` 作业转换为多服务器作业之前，必须编辑它以移除\
  \ `运行身份帐户`。我们可以通过使用 `sp_update_jobstep` 存储过程来实现这一点，如清单 22-11 所示。\n\n```\nUSE MSDB\n\
  GO\nEXEC msdb.dbo.sp_update_jobstep\n@job_name=N'BackupAndCheckBrowser',\n@step_id=1\
  \ ,\n@database_user_name=N\" ;\nGO\n清单 22-11\n更新作业步骤\n```\n\n多服务器作业的另一个限制是，唯一允许的操作员是\
  \ `MSXOperator`，他接收所有多服务器作业的通知。因此，在继续之前，我们还需要将 `DBATeam` 操作员更改为 `MSXOperator` 操作员。我们可以使用\
  \ `sp_update_job` 存储过程，通过清单 22-12 中的脚本来实现这一点。\n\n```\nUSE msdb\nGO\nEXEC msdb.dbo.sp_update_job\n\
  @job_name=N'BackupAndCheckBrowser',\n@notify_email_operator_name=N'MSXOperator'\
  \ ;\nGO\n清单 22-12\n更新作业\n```\n\n我们现在可以继续通过 Management Studio 将我们的 `BackupAndCheckBrowser`\
  \ 作业转换为多服务器作业，方法是打开“作业属性”对话框并导航到“目标”页面。如图 22-31 所示，我们可以使用此页面将作业更改为多服务器作业，并从已使用 `sp_msx_enlist`\
  \ 存储过程登记的目标服务器列表中指定它应针对运行的目标服务器。关闭属性对话框后，该作业将针对 `TargetServer1` 和 `TargetServer2`\
  \ 实例运行，而不是 `MASTERSERVER` 实例。\n\n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig31_HTML.jpg](img/333037_2_En_22_Fig31_HTML.jpg)\n\
  \n图 22-31：转换为多服务器作业\n\n要通过 T-SQL 实现相同的结果，我们使用 `sp_delete_jobserver` 系统存储过程来停止作业针对\
  \ MSX 运行，并使用 `sp_add_jobserver` 系统存储过程来配置作业针对 TSX 运行。这两个过程都接受表 22-3 中详述的参数。\n\n\
  表 22-3：`sp_delete_jobserver` 和 `sp_add_jobserver` 参数\n\n| 参数 | 描述 |\n| --- | ---\
  \ |\n| `@job_id` | 您要转换为多服务器作业的作业的 GUID。如果为 `NULL`，则必须指定 `@job_name` 参数。 |\n| `@job_name`\
  \ | 您要转换为多服务器作业的作业的名称。如果为 `NULL`，则必须指定 `@job_id` 参数。 |\n| `@server_name` | 您希望作业针对运行的服务器\\\
  实例名称。 |\n\n在我们的场景中，我们可以使用清单 22-13 中的脚本来转换作业。\n\n```\nEXEC msdb.dbo.sp_delete_jobserver\n\
  @job_name=N'BackupAndCheckBrowser',\n@server_name = N'SQLSERVER\\MASTERSERVER' ;\n\
  GO\nEXEC msdb.dbo.sp_add_jobserver\n@job_name=N'BackupAndCheckBrowser',\n@server_name\
  \ = N'SQLSERVER\\TARGETSERVER1' ;\nGO\nEXEC msdb.dbo.sp_add_jobserver\n@job_name=N'BackupAndCheckBrowser',\n\
  @server_name = N'SQLSERVER\\TARGETSERVER2' ;\nGO\n清单 22-13\n转换为多服务器作业\n```\n\n###\
  \ 管理目标服务器\n\n在配置 MSX 时，请确保考虑针对 TSX 的各种维护活动。这些活动包括轮询 TSX、跨服务器同步时间、运行临时作业以及使 TSX 脱离（取消登记）。\n\
  \n我们可以在“目标服务器状态”对话框中完成这些任务。可以通过在 MSX 上右键单击 SQL Server Agent，选择“多服务器管理”->“管理目标服务器”来调用此对话框。此对话框的“目标服务器状态”选项卡如图\
  \ 22-32 所示。\n\n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig32_HTML.jpg](img/333037_2_En_22_Fig32_HTML.jpg)\n\
  \n图 22-32：“目标服务器状态”选项卡\n\n在此选项卡上，我们可以使用“强制轮询”按钮使目标服务器轮询 MSX。当 TSX 轮询 MSX 时，我们强制它下载其配置为运行的作业的最新副本。如果您更新了主作业，这非常有用。\n\
  \n“强制脱离”按钮会导致高亮显示的 TSX 从 MSX 取消登记。取消登记后，选定的 TSX 将不再轮询或运行多服务器作业。\n\n“发布指令”按钮调用“发布下载指令”对话框，您可以在其中向\
  \ TSX 发送以下指令之一：\n\n*   脱离\n*   设置轮询间隔\n*   同步时钟\n*   启动作业\n\n要同步所有服务器上的时间，您需要选择“同步时钟”指令类型，并确保在“收件人”部分选择了“所有目标服务器”，如图\
  \ 22-33 所示。然后，当时钟在目标服务器下次轮询主服务器时进行同步。\n\n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig33_HTML.jpg](img/333037_2_En_22_Fig33_HTML.jpg)\n\
  \n图 22-33：同步时钟\n\n在另一种场景中，可能有时我们希望临时运行 `BackupAndCheckBrowser` 作业到 `TARGETSERVER1`。我们可以通过选择“启动作业”作为指令类型，然后从“作业名称”下拉列表中选择我们的作业来实现这一点。然后，我们使用屏幕的“收件人”部分来选择\
  \ `TARGETSERVER1`。如图 22-34 所示。\n\n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig34_HTML.jpg](img/333037_2_En_22_Fig34_HTML.jpg)\n\
  \n图 22-34：在 TARGETSERVER1 上启动作业\n\n在“目标服务器状态”对话框的“下载指令”选项卡上，如图 22-35 所示，我们看到了已发送到目标的指令列表。我们可以使用屏幕顶部的下拉列表按作业或目标服务器筛选指令。\n\
  \n![../images/333037_2_En_22_Chapter/333037_2_En_22_Fig35_HTML.jpg](img/333037_2_En_22_Fig35_HTML.jpg)\n\
  \n图 22-35：“下载指令”选项卡\n\n\n### 概要\n\nSQL Server 代理是 SQL Server 的一个调度引擎，允许你基于决策逻辑在各种计划上创建强大的维护作业。作业是要执行的任务的容器，其中每个任务被称为一个步骤。每个作业步骤可以在不同的账户上下文下运行，并且可以在不同的子系统或类型（如\
  \ T-SQL、PowerShell、操作系统命令或 SSIS 包）下运行任务。\n\n计划附加到作业上，可以在特定的日期和时间、当 CPU 空闲时，或在重复性计划（如每日、每周或每月）上触发。计划也可以在日内重复，例如每小时、每分钟，甚至频繁到每\
  \ 10 秒一次。\n\n操作员是接收作业成功或失败通知以及警报触发通知的个人或团队。操作员可以通过电子邮件、寻呼机或 `NET SEND` 接收作业状态通知；但是，`NET\
  \ SEND` 和寻呼机支持已弃用。要让操作员通过电子邮件接收通知，必须配置数据库邮件，以便可以通过你的 SMTP 中继服务器发送电子邮件。\n\n默认情况下，作业在\
  \ SQL Server 代理服务账户的上下文中运行。但是，出于良好的安全实践，你应考虑使用代理账户来运行作业步骤。代理账户映射到实例级别的凭据，而凭据又映射到\
  \ Windows 级别的安全主体。代理可用于除 T-SQL 之外的所有子系统。T-SQL 作业步骤使用 `EXECUTE AS` 在数据库用户的上下文中执行命令。这是使用“以以下身份运行”属性配置的。\n\
  \n当数据库引擎中引发错误或警告、发生 WMI 事件或满足性能条件时，会触发警报。当警报触发时，响应包括通知操作员或运行作业以解决问题。\n\n多服务器作业允许\
  \ DBA 在整个企业中一致地运行作业。在多服务器场景中，有一个主服务器（MSX），用于创建和修改作业，以及多个目标服务器（TSX）。TSX 定期轮询 MSX\
  \ 并检索应运行的作业列表。\n\n# 23. 基于策略的管理\n\n基于策略的管理（PBM）是一个系统，DBA 可以将其与中央管理服务器结合使用，以报告或强制执行整个企业的标准。本章首先介绍\
  \ PBM 使用的概念，然后演示如何通过 GUI 和 PowerShell 使用 PBM 来有效管理环境。\n\n### PBM 概念\n\n基于策略的管理使用\
  \ `目标`、`方面`、`条件` 和 `策略` 的概念。`目标` 是 PBM 管理的实体，例如数据库或表。`方面` 是与目标相关的属性集合。例如，数据库方面包括与数据库名称相关的属性。`条件`\
  \ 是可以针对属性进行评估的布尔表达式。`策略` 将条件绑定到目标。以下各节将讨论这些概念。\n\n#### 方面\n\n方面是与一种目标类型相关的属性集合，例如\
  \ `视图`，其属性包括 `IsSchemaBound`、`HasIndex` 和 `HasAfterTrigger`；`数据库角色`，其属性包括 `Name\
  \ Owner` 和 `IsFixedRole`；以及 `索引`，其属性包括 `IsClustered`、`IsPartitioned` 和 `IsUnique`。`索引`\
  \ 方面还公开了与地理空间索引、内存优化索引、XML 索引和全文索引相关的属性。其他值得注意的方面包括 `数据库`、`存储过程`、`表面区域配置`、`链接服务器`\
  \ 和 `审核`。SQL Server 2019 总共提供了 96 个方面，你可以在本章的“评估模式”部分找到完整列表。你也可以通过运行清单 23-1 中的命令来访问方面列表。\n\
  \n```sql\nSELECT name\nFROM msdb.dbo.syspolicy_management_facets ;\n```\n清单 23-1:\
  \ 查找方面列表\n\n#### 条件\n\n条件是一个布尔表达式，针对对象属性进行评估，以确定其是否符合你的要求。每个方面都包含多个属性，你可以针对这些属性创建条件，但每个条件只能访问来自单个方面的属性。条件可以使用以下运算符进行评估：\n\
  \n*   `=`\n*   `!=`\n*   `LIKE`\n*   `NOT LIKE`\n*   `IN`\n*   `NOT IN`\n\n例如，你可以使用\
  \ `LIKE` 运算符和表达式 `Database.Name LIKE 'Chapter%'` 来确保所有数据库名称以 `Chapter` 开头。\n\n####\
  \ 目标\n\n目标是可以应用策略的实体。这可以是表、数据库、整个实例或 SQL Server 中的大多数其他对象。将目标添加到策略时，可以使用条件来限制目标数量。这意味着，例如，如果你创建一个策略来强制执行实例上的数据库命名约定，你可以使用一个条件来避免针对包含“SharePoint”、“bdc”或“wss”字样的数据库名称检查策略，因为这些是你的\
  \ SharePoint 数据库，它们可能包含在你的标准命名约定中可能被禁止的 GUID。\n\n#### 策略\n\n策略包含一个条件，并将其绑定到一个或多个目标（目标也可以通过单独的条件进行筛选）和一个评估模式。根据你选择的评估模式，策略还可能包含你希望检查策略的计划。策略支持四种评估模式，将在下一节中讨论。\n\
  \n#### 评估模式\n\n策略支持一到四种评估模式，具体取决于你在条件中使用的方面。评估模式如下：\n\n*   `按需`\n*   `按计划`\n*  \
  \ `更改时：仅记录`\n*   `更改时：阻止`\n\n如果评估模式配置为 `按需`，则策略仅在 DBA 手动评估时进行评估。如果评估模式配置为 `按计划`，则在创建策略时创建计划；这将导致策略定期进行评估。\n\
  \n#### 提示\n\n即使策略配置了不同的评估模式，也可以 `按需` 进行评估。\n\n如果选择 `更改时：仅记录` 评估模式，则每当目标的相关属性更改时，策略验证的结果都会记录到\
  \ SQL Server 日志中。如果策略被触发但未通过验证，则会在日志中生成一条消息。当目标的配置方式违反了你的某个策略时，就会发生这种情况。如果违反策略，则会引发错误\
  \ 34053，严重级别为 16（表示问题可由用户修复）。\n\n#### 提示\n\n创建对象时，评估属性的方式与更改现有对象属性时的评估方式相同。\n\n\
  如果选择 `更改时：阻止` 作为评估模式，则当属性更改时，SQL Server 会评估该属性，如果存在违规，则会引发错误消息，并且导致策略违规的语句将被回滚。\n\
  \n因为策略是基于触发的 DDL 事件工作的，所以根据方面内的属性，并非所有评估模式都适用于所有方面。确定特定方面支持的评估模式的规则相当不透明，因此你可以通过运行清单\
  \ 23-2 中的查询来发现它们。\n\n```sql\nSELECT\nname ,\n'Yes' AS on_demand,\nCASE\nWHEN (CONVERT(BIT,\
  \ execution_mode & 4)) = 1\nTHEN 'Yes'\nELSE 'No'\nEND  AS on_schedule,\nCASE\n\
  WHEN (CONVERT(BIT, execution_mode & 2)) = 1\nTHEN 'Yes'\nELSE 'No'\nEND  AS on_change_log,\n\
  CASE\nWHEN (CONVERT(BIT, execution_mode & 1)) = 1\nTHEN 'Yes'\nELSE 'No'\nEND  AS\
  \ on_change_prevent\nFROM msdb.dbo.syspolicy_management_facets ;\n```\n清单 23-2:\
  \ 列出每个方面支持的执行类型\n\n\n\n### 中央管理服务器\n\nSQL Server Management Studio 提供了一项名为中央管理服务器的功能。此功能允许你将一个实例注册为中央管理服务器，然后将其他实例注册为该中央管理服务器的已注册服务器。一旦在中央管理服务器下注册了服务器，你就可以针对组中的所有服务器运行查询，或者对组内的所有服务器运行策略。\n\
  \nCMS 是一个非常出色的功能，在与基于策略的管理结合使用时如此，其本身亦然。在管理中型或大型 SQL Server 环境时，我总是会实施 CMS，用于针对多个服务器运行即席查询等目的。这使我能够快速回答管理和容量问题，例如“我们的环境中有多少个数据库？”\n\
  \n要注册中央管理服务器，请在 SQL Server Management Studio 的“视图”菜单中选择“已注册服务器”。这将导致“已注册服务器”窗口出现，如图\
  \ 23-1 所示。\n\n![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig1_HTML.jpg](img/333037_2_En_23_Fig1_HTML.jpg)\
  \ *图 23-1：已注册服务器窗口*\n\n让我们通过在中央管理服务器的上下文菜单中选择“注册中央管理服务器”，将我们的`SQLSERVER\\MASTERSERVER`实例（这是我们本节演示中使用的服务器\\\
  实例名称）注册为中央管理服务器。这将显示“新建服务器注册”对话框的“常规”选项卡，如图 23-2 所示。\n\n![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig2_HTML.jpg](img/333037_2_En_23_Fig2_HTML.jpg)\
  \ *图 23-2：“常规”选项卡*\n\n在此选项卡上，我们在“服务器名称”框中输入中央管理服务器的服务器\\实例名称。这将导致“已注册服务器名称”字段自动更新，但你可以手动编辑它以赋予其新名称。你还可以选择为该实例添加描述。\n\
  \n在如图 23-3 所示的“连接属性”选项卡上，我们指定连接到该实例的首选项。\n\n![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig3_HTML.jpg](img/333037_2_En_23_Fig3_HTML.jpg)\
  \ *图 23-3：“连接属性”选项卡*\n\n在此选项卡上，我们输入一个数据库作为登陆区域。如果我们将选项保留为“默认”，则会连接到默认数据库。在选项卡的“网络”部分，你可以指定要使用的特定网络协议，或保留设置为“默认”（我们在此处就是如此）。将其保留为“默认”会使连接使用实例网络配置中指定的最高优先级协议。虽然通常不建议更改网络数据包大小，因为在大多数场景中，这会产生负面影响，但在非典型场景中，这样做可以通过让连接受益于巨型帧（可以支持更大有效载荷并因此减少流量碎片的以太网帧）来提高性能。\n\
  \n在屏幕的“连接”部分，我们指定连接超时和执行超时的持续时间。你还可以指定是否加密到中央管理服务器的连接。如果你在单个 SQL Server Management\
  \ Studio 实例中管理多个实例，“使用自定义颜色”选项对于颜色编码实例非常有用。选中此选项并指定一种颜色有助于避免查询意外针对不正确的服务器运行。当我调试失败的代码发布时，我发现对实例进行颜色编码特别有用，因为我不想意外地将开发/测试代码运行到生产环境！\n\
  \n“始终加密”选项卡允许你为连接启用始终加密并指定适当的验证服务器。此选项卡如图 23-4 所示。有关始终加密的更多信息，请参见第 11 章。\n\n![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig4_HTML.jpg](img/333037_2_En_23_Fig4_HTML.jpg)\
  \ *图 23-4：“始终加密”选项卡*\n\n如图 23-5 所示的“其他连接参数”选项卡允许你手动指定连接字符串属性。然而，你应该注意，如果你输入了已在其他选项卡上指定的连接属性，手动指定的属性将覆盖你在其他选项卡中的选择。\n\
  \n![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig5_HTML.jpg](img/333037_2_En_23_Fig5_HTML.jpg)\
  \ *图 23-5：“其他连接参数”选项卡*\n\n单击“新建服务器注册”窗口底部的“测试”按钮，允许你在保存之前测试到实例的连接。这总是一个好主意，因为它有助于避免日后不必要的故障排除。\n\
  \n一旦我们注册了中央管理服务器，我们可以选择直接在中央管理服务器下注册服务器，或者在中央管理服务器下创建服务器组。你在此处选择的策略应基于环境的要求。例如，如果中央管理服务器管理的所有服务器都应应用相同的策略，那么直接在中央管理服务器下注册服务器可能就足够了。但是，如果你的中央管理服务器将管理来自不同环境（例如生产和开发/测试）的服务器，那么你可能希望针对不同环境实施不同的策略集；在这种情况下，创建不同的服务器组是有意义的。在新创建的中央管理服务器的上下文菜单中选择“新建服务器组”将调用“新建服务器组属性”对话框，如图\
  \ 23-6 所示。\n\n![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig6_HTML.jpg](img/333037_2_En_23_Fig6_HTML.jpg)\
  \ *图 23-6：“新建服务器组属性”对话框*\n\n你可以看到我们正在使用此对话框输入服务器组的名称和描述，该组将我们的开发/测试服务器分组在一起。退出对话框后，我们重复该过程为我们的生产服务器创建一个服务器组，并将其命名为\
  \ Prod。\n\n\n#### 提示\n\n你还可以嵌套服务器组。因此，在更复杂的拓扑结构中，你可以为每个地理区域设置一个服务器组，其中包含每个环境的服务器组。\n\
  \n现在，让我们从每个服务器组的上下文菜单中选择“新建服务器注册”选项，将我们的实例添加到相应的组中。我们将`SQLSERVER\\TARGETSERVER1`和`SQLSERVER\\\
  TARGETSERVER2`添加到 Prod 组，并将`SQLSERVER`的默认实例添加到 DevTest 组。你可以使用与注册中央管理服务器时相同的“新建服务器注册”对话框来添加服务器。图\
  \ 23-7 显示了添加服务器后的“已注册服务器”屏幕。\n\n![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig7_HTML.jpg](img/333037_2_En_23_Fig7_HTML.jpg)\n\
  \n图 23-7\n\n“已注册服务器”窗口\n\n中央管理服务器的一个非常有用的功能是能够针对服务器组内的所有服务器或它们管理的所有服务器运行查询。例如，我们可以从\
  \ Prod 服务器组的上下文菜单中选择“新建查询”，然后运行清单 23-3 中的查询。\n\n```\nSELECT name\nFROM sys.Databases\
  \ ;\n-- 清单 23-3\n-- 列出服务器组中的所有数据库\n```\n\n此查询返回的结果如图 23-8 所示。\n\n![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig8_HTML.jpg](img/333037_2_En_23_Fig8_HTML.jpg)\n\
  \n图 23-8\n\n列出服务器组中所有服务器的结果\n\n你首先会注意到，查询结果下方的状态栏是粉红色而不是黄色。这表示查询已在多个服务器上运行。其次，状态栏没有显示实例名称，而是显示了查询针对的服务器组；在我们的例子中，是\
  \ Prod。最后，请注意结果集中添加了一个额外的列。此列名为“服务器名称”，它指示该行是从组内的哪个实例返回的。由于`SQLSERVER\\TARGETSERVER1`和`SQLSERVER\\\
  TARGETSERVER2`上不存在用户数据库，因此从每个实例返回了四个系统数据库。\n\n### 创建策略\n\n你可以使用 SQL Server Management\
  \ Studio 或 T-SQL 创建策略。以下部分讨论如何创建简单的静态策略，然后再讨论如何创建高级的动态策略。\n\n#### 创建简单策略\n\nPBM\
  \ 在其预定义的方面、属性和条件中提供了极大的灵活性。你可以利用这种灵活性为企业创建一套全面的策略。以下部分讨论如何使用 PBM 的内置功能创建简单策略。\n\n\
  ##### 创建可手动评估的策略\n\n你可能已经注意到，本书中的示例数据库使用`Chapter<ChapterNumber>`的命名格式。因此，我们在这里创建一个策略来强制执行此命名约定，方法是使任何违反此策略的策略回滚并生成错误。为此，我们通过在主服务器的对象资源管理器中依次展开“管理”->“策略管理”，然后从“策略”上下文菜单中选择“新建策略”，来调用“创建新策略”对话框。图\
  \ 23-9 显示了该对话框的“常规”页面。\n\n![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig9_HTML.jpg](img/333037_2_En_23_Fig9_HTML.jpg)\n\
  \n图 23-9\n\n“创建新策略”对话框，“常规”页面\n\n在此页面上，我们为策略命名，但发现“针对目标”和“评估模式”选项不可用。这是因为我们尚未创建条件。因此，我们的下一步是使用“检查条件”下拉框选择“新建条件”。这将显示“创建新条件”对话框的“常规”页面，如图\
  \ 23-10 所示。\n\n![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig10_HTML.jpg](img/333037_2_En_23_Fig10_HTML.jpg)\n\
  \n图 23-10\n\n“创建新条件”对话框，“常规”页面\n\n在此页面上，我们为条件命名并选择“数据库”方面。在屏幕的“表达式”区域，我们选择`@Name`字段应该`LIKE\
  \ 'Chapter%'`，其中`%`是零个或多个字符的通配符。在“描述”页面上，我们可以选择为条件指定文本描述。\n\n回到“创建新策略”对话框的“常规”页面，我们确保“评估模式”下拉列表设置为“按需”，这意味着除非我们显式评估该策略，否则不会对其进行评估。唯一可用的其他选项是安排评估。这是因为“数据库”方面不支持“更改时：仅记录”或“更改时：阻止”评估模式。\n\
  \n我们的策略显然不适用于系统数据库。这很重要，因为我们可以使用该策略检查现有数据库以及我们创建的新数据库。因此，在页面的“针对目标”部分，我们使用下拉框进入“创建新条件”对话框，并创建一个排除数据库\
  \ ID 小于或等于 4 的数据库的条件，如图 23-11 所示。\n\n![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig11_HTML.jpg](img/333037_2_En_23_Fig11_HTML.jpg)\n\
  \n图 23-11\n\n创建 ExcludeSystemDatabases 条件\n\n回到“创建新策略”对话框，我们可以创建一个条件来强制执行服务器限制，该限制筛选要评估策略的实例。但是，因为我们仅针对`SQLSERVER\\\
  MASTERSERVER`实例评估策略，所以不需要这样做。相反，我们导航到“描述”页面，如图 23-12 所示。\n\n![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig12_HTML.jpg](img/333037_2_En_23_Fig12_HTML.jpg)\n\
  \n图 23-12\n\n“描述”页面\n\n在此页面上，我们使用“新建”按钮创建一个新类别`CodeRelease`，它帮助我们在 UAT（用户验收测试）或\
  \ OAT（操作验收测试）环境中检查代码质量，然后再将代码推广到生产环境。我们还可以选择添加策略的自由文本描述和帮助超链接，以及网站地址或电子邮件链接。\n\n\
  ##### 手动评估策略\n\n在评估我们的策略之前，我们首先通过执行清单 23-4 中的命令创建一个不符合我们命名约定的数据库。\n\n```\nCREATE\
  \ DATABASE BrokenPolicy ;\n-- 清单 23-4\n-- 创建一个 BrokenPolicy 数据库\n```\n\n我们可以通过使用“评估策略”对话框来评估我们的新策略，该对话框可以通过在对象资源管理器中依次展开“管理”->“策略管理”->“策略”，并从我们的策略的上下文菜单中选择“评估”来调用。\n\
  \n#### 提示\n\n即使策略被禁用，你也可以手动评估它。\n\n在“评估策略”对话框中，如图 23-13 所示，你会在窗口上半部分看到已评估策略的列表；状态指示器会告知是否有任何策略被破坏。在窗口的下半部分，你会看到高亮显示的策略所评估的目标列表；这里的状态指示器会逐个目标地告知你策略的状态。\n\
  \n#### 提示\n\n若要评估多个策略，请在**对象资源管理器**中的**策略**文件夹的右键菜单中选择**评估**，然后选择您希望评估的策略。所有选定的策略将被评估，并显示在**评估结果**页面中。\n\
  \n![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig13_HTML.jpg](img/333037_2_En_23_Fig13_HTML.jpg)\n\
  \n图 23-13\n\n**评估策略**对话框\n\n#### 提示\n\n我们在本书的第 22 章创建了 `Chapter22` 数据库。如果您没有 `Chapter22`\
  \ 数据库，可以使用语句 `CREATE DATABASE Chapter22 ;` 来创建它。\n\n点击**详细信息**列中的**查看**链接，以调用**结果详细视图**对话框，如图\
  \ 23-14 所示。此信息对于失败的策略评估很有用，因为它提供了未满足策略条件的实际值的详细信息。\n\n![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig14_HTML.jpg](img/333037_2_En_23_Fig14_HTML.jpg)\n\
  \n图 23-14\n\n**结果详细视图**对话框\n\n##### 创建一个防止不良活动的策略\n\n另一个非常有用的简单策略是帮助您防止开发人员混淆其存储过程的策略。可以说，过程混淆在第三方软件中有其位置，以防止知识产权被盗。然而，对于内部应用程序，则无需使用混淆，这样做可能导致诊断性能问题时出现困难。此外，如果开发团队没有使用源代码控制，在发生灾难时可能导致代码丢失。在这种情况下，我们不仅仅是临时评估策略，而是要阻止创建被混淆的存储过程。这意味着在代码发布期间，您不需要审查每个存储过程是否包含\
  \ `WITH ENCRYPTION` 语法。相反，您可以期望策略被评估，并且 `CREATE PROCEDURE` 语句被回滚，从而防止这种情况发生。\n\n\
  在创建此策略之前，我们需要确保实例上启用了嵌套触发器。这是因为策略将使用 DDL 触发器来强制执行，而嵌套触发器是 **变更时：防止** 模式的硬性技术要求。您可以使用\
  \ `sp_configure` 来启用嵌套触发器，脚本如清单 23-5 所示；不过，它们默认是开启的。\n\n```\nEXEC sp_configure 'nested\
  \ triggers', 1 ;\nRECONFIGURE\n清单 23-5\n启用嵌套触发器\n```\n\n创建策略后，您需要创建一个条件。创建条件时，如图\
  \ 23-15 所示，我们使用了 **存储过程** 属性方面的 `@IsEncrypted` 属性。\n\n![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig15_HTML.jpg](img/333037_2_En_23_Fig15_HTML.jpg)\n\
  \n图 23-15\n\n**创建新条件**对话框\n\n在**创建新策略**对话框中，如图 23-16 所示，我们可以使用**针对目标**区域来配置哪些目标应由该策略评估；但是，该设置默认为**每个数据库中的每个存储过程**。这符合我们的需求，因此我们不需要创建条件。在**评估模式**下拉列表中，我们选择**变更时：防止**；这使得如果存储过程被混淆，则无法在我们的\
  \ `SQLSERVER\\MASTERSERVER` 实例上创建存储过程。我们还确保选中**已启用**框，以便策略在创建时即被启用。\n\n![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig16_HTML.jpg](img/333037_2_En_23_Fig16_HTML.jpg)\n\
  \n图 23-16\n\n**创建新策略**对话框\n\n为了演示实际的防止效果，我们尝试使用清单 23-6 中的脚本创建一个存储过程。\n\n```\nCREATE\
  \ PROCEDURE ObfuscatedProc\nWITH ENCRYPTION\nAS\nBEGIN\nSELECT *\nFROM sys.tables\n\
  END\n清单 23-6\n使用 WITH ENCRYPTION 创建存储过程\n```\n\n图 23-17 显示了我们尝试运行此 `CREATE PROCEDURE`\
  \ 语句时抛出的错误。\n\n![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig17_HTML.jpg](img/333037_2_En_23_Fig17_HTML.jpg)\n\
  \n图 23-17\n\n策略触发器抛出的错误\n\n#### 创建高级策略\n\n基于策略的管理是可扩展的，如果您无法使用内置的属性方面创建所需的条件，**表达式高级编辑器**允许您使用广泛的函数。这些函数包括\
  \ `ExecuteSql()` 和 `ExecuteWql()`，它们允许您分别构建自己的 SQL 和 WQL（Windows 查询语言）。`ExecuteSql()`\
  \ 和 `ExecuteWql()` 函数不是 T-SQL 函数，它们是 PBM 框架的一部分。\n\n您可以使用这些函数针对数据库引擎或 Windows 编写查询并评估结果。函数对每个目标调用一次。因此，例如，如果它们与**服务器**属性方面一起使用，则只运行一次，但如果它们针对**表**属性方面使用，则会对每个目标表进行评估。当您使用\
  \ `ExecuteSql()` 时如果返回了多列，则评估第一行的第一列。当您使用 `ExecuteWql()` 时如果返回了多列，则会抛出错误。例如，假设您想要确保\
  \ SQL Server Agent 服务已启动。您可以通过运行清单 23-7 中的查询在 T-SQL 中实现这一点。此查询使用 `LIKE` 运算符，因为 `servicename`\
  \ 列也包含服务名称，而 `LIKE` 运算符使查询通用化，因此可以在任何实例上运行而无需修改。\n\n```\nSELECT status_desc\nFROM\
  \ sys.dm_server_services\nWHERE servicename LIKE 'SQL Server Agent%' ;\n清单 23-7\n\
  使用 T-SQL 检查确保 SQL Server Agent 正在运行\n```\n\n或者，您也可以使用清单 23-8 中的 WQL 查询实现相同的结果。\n\
  \n#### 注意\n\n您可以在 [`https://msdn.microsoft.com/en-us/library/aa394606`](https://msdn.microsoft.com/en-us/library/aa394606)\
  \ `(v=vs.85).aspx` 找到 WQL 参考。\n\n```\nSELECT State FROM Win32_Service  WHERE Name\
  \ =\"SQLSERVERAGENT$MASTERSERVER\"\n清单 23-8\n使用 WQL 检查 SQL Server Agent 是否正在运行\n\
  ```\n\n要使用 T-SQL 版本的查询，您需要使用 `ExecuteSql()` 函数，该函数接受表 23-1 中的参数。\n\n表 23-1\n\n`ExecuteSQL()`\
  \ 参数\n\n| 参数 | 描述 |\n| --- | --- |\n| `returnType` | 指定查询的预期返回类型。可接受的值为 `Numeric`、`String`、`Bool`、`DateTime`、`Array`\
  \ 和 `GUID`。 |\n| `sqlQuery` | 指定应运行的查询。 |\n\n要使用 WQL 版本的查询，您需要使用 `ExecuteWql()`，它接受表\
  \ 23-2 中描述的参数。\n\n表 23-2\n\n`ExecuteWQL()` 参数\n\n| 参数 | 描述 |\n| --- | --- |\n| `returnType`\
  \ | 指定查询的预期返回类型。可接受的值为 `Numeric`、`String`、`Bool`、`DateTime`、`Array` 和 `GUID`。 |\n\
  | `namespace` | 指定应针对哪个 WQL 命名空间执行查询。 |\n| `wqlQuery` | 指定应运行的查询。 |\n\n因此，如果您使用\
  \ T-SQL 方法，您的条件将在 PBM 的条件编辑器中使用清单 23-9 中的脚本（它不会直接在 SSMS 中工作）。\n\n```\nExecuteSql('string',\
  \ 'SELECT status_desc FROM sys.dm_server_services WHERE servicename LIKE \"SQL Server\
  \ Agent%\"')\n清单 23-9\nExecuteSQL()\n```\n\n\n### 策略管理\n\n此处需要注意，我们必须在查询中转义单引号，以确保它们在执行时能被正确识别。\n\
  \n如果你使用 WQL 方法，你的条件需要使用清单 23-10 中的脚本。\n\n```sql\nExecuteWql('String', 'root\\CIMV2',\
  \ 'SELECT State FROM Win32_Service  WHERE Name =\"SQLSERVERAGENT$MASTERSERVER\"\
  ')\n```\n清单 23-10 `ExecuteWQL()`\n\n图 23-18 展示了如何使用 WQL 方法创建条件。\n\n![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig18_HTML.jpg](img/333037_2_En_23_Fig18_HTML.jpg)\n\
  图 23-18 使用 `ExecuteWql()` 创建条件\n\n#### 提示\n\n此处需要注意，我们必须在查询中转义单引号，以确保它们在执行时能被正确识别。\n\
  \n如果你使用 WQL 方法，你的条件需要使用清单 23-10 中的脚本。\n\n```sql\nExecuteWql('String', 'root\\CIMV2',\
  \ 'SELECT State FROM Win32_Service  WHERE Name =\"SQLSERVERAGENT$MASTERSERVER\"\
  ')\n```\n清单 23-10 `ExecuteWQL()`\n\n#### 注意\n\n由于 `ExecuteWql()` 和 `ExecuteSql()`\
  \ 函数的强大功能和灵活性，它们可能被滥用以制造安全漏洞。因此，请确保你严格控制谁有创建策略的权限。\n\n### 策略管理\n\n策略安装在 SQL Server\
  \ 实例上，但你可以将它们导出为 XML 文件，这反过来又允许它们被移植到其他服务器或中央管理服务器，以便能够同时针对多个实例进行评估。以下部分将讨论如何导入和导出策略，以及如何将策略与中央管理服务器结合使用。我们还将讨论如何使用\
  \ PowerShell 管理策略。\n\n### 导入和导出策略\n\n策略可以导出到文件系统，也可以从文件系统导入为 XML 文件。要将我们的 `DatabaseNameConvention`\
  \ 策略导出到 `默认文件位置`，我们在对象资源管理器中右键单击 `DatabaseNameConvention` 策略，从上下文菜单中选择“导出策略”，这将调出“导出策略”对话框。在这里，我们只需为文件选择一个名称并单击“保存”，如图\
  \ 23-19 所示。\n\n![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig19_HTML.jpg](img/333037_2_En_23_Fig19_HTML.jpg)\n\
  图 23-19 “导出策略”对话框\n\n现在我们将该策略导入到我们的 `SQLSERVER\\TARGETSERVER1` 实例中。为此，我们在对象资源管理器中连接到\
  \ `TARGETSERVER1` 实例，然后依次展开“管理” ➤ “基于策略的管理”，接着从“策略”的上下文菜单中选择“导入策略”。这将调出“导入”对话框，如图\
  \ 23-20 所示。\n\n![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig20_HTML.jpg](img/333037_2_En_23_Fig20_HTML.jpg)\n\
  图 23-20 “导入”对话框\n\n在此对话框中，我们使用“要导入的文件”省略号按钮来选择我们的 `DatabaseNameConvention` 策略。我们还可以从“策略状态”下拉列表中选择策略导入后的状态，并指定是否应覆盖实例上已存在的同名策略。\n\
  \n### 使用策略进行企业管理\n\n虽然能够针对单个 SQL Server 实例评估策略很有用，但为了最大限度地发挥 PBM 的威力，你可以将策略与中央管理服务器结合使用，以便在单次执行中针对整个\
  \ SQL Server 企业环境评估策略。\n\n例如，假设我们希望针对在将 `SQLSERVER\\MASTERSERVER` 实例注册为中央管理服务器时创建的\
  \ Prod 组中的所有服务器，来评估 `DatabaseNameConvention` 策略。为此，我们在“已注册的服务器”窗口中依次展开“中央管理服务器”\
  \ ➤ `SQLSERVER\\MASTERSERVER`，然后从 Prod 的上下文菜单中选择“评估策略”。\n\n这将调出“评估策略”对话框。在这里，你可以使用“源”省略号按钮调出“选择源”对话框，并选择你想要针对该组评估的一个或多个策略，如图\
  \ 23-21 所示。\n\n![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig21_HTML.jpg](img/333037_2_En_23_Fig21_HTML.jpg)\n\
  图 23-21 “评估策略”对话框\n\n在“选择源”对话框中，要么从文件系统中选择存储为 XML 文件的策略，要么指定安装了该策略的实例的连接详细信息。在我们的例子中，我们通过单击“文件”省略号按钮来选择\
  \ `DatabaseNameConvention`。\n\n选中的策略随后会显示在屏幕的“策略”部分，如图 23-22 所示。如果你选择了一个包含多个策略的源，可以使用复选框来定义要评估哪些策略。单击“评估”按钮会导致所选策略针对组中的所有服务器进行评估。\n\
  \n![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig22_HTML.jpg](img/333037_2_En_23_Fig22_HTML.jpg)\n\
  图 23-22 “评估策略”对话框\n\n### 使用 PowerShell 评估策略\n\n当策略安装在实例上时，可以使用本章已描述的方法进行评估。但是，如果你的策略存储为\
  \ XML 文件，你仍然可以使用 PowerShell 来评估它们。如果你的 SQL Server 企业环境包含 SQL Server 2000 或 2005\
  \ 实例（许多环境仍然如此），这会很有帮助。因为 PBM 仅在 SQL Server 2008 中引入，策略无法导入到旧版实例中，但 PowerShell 为此问题提供了一个有用的变通方法。\n\
  \n要使用 PowerShell 从 XML 文件评估我们的 `DatabaseNameConvention` 策略是否符合我们的 `SQLSERVER\\MASTERSERVER`\
  \ 实例，我们需要运行清单 23-11 中的脚本。该脚本的第一行将路径更改为存储策略的文件夹。第二行实际评估策略。\n\n如果我们配置的属性是可设置且确定性的（而我们的这个不是），那么我们可以添加\
  \ `-AdHocPolicyExecutionMode` 参数并将其设置为 `\"Configure\"`。这将使设置更改为符合我们的策略。\n\n```powershell\n\
  sl \"C:\\Users\\Administrator\\Documents\\SQL Server Management Studio\\Policies\"\
  \nInvoke-PolicyEvaluation -Policy \"C:\\Users\\Administrator\\Documents\\SQL Server\
  \ Management Studio\\Policies\\DatabaseNameConvention.xml\" -TargetServerName \"\
  .\\MASTERSERVER\"\n```\n清单 23-11 使用 PowerShell 评估策略\n\n此策略评估的输出如图 23-23 所示。\n\n\
  ![../images/333037_2_En_23_Chapter/333037_2_En_23_Fig23_HTML.jpg](img/333037_2_En_23_Fig23_HTML.jpg)\n\
  图 23-23 策略评估结果\n\n#### 提示\n\n要评估多个属性，请为 `-Policy` 参数提供一个逗号分隔的列表。\n\n\n\n### 摘要\n\
  \n基于策略的管理 (PBM) 提供了一种强大而灵活的方法，用于确保在整个企业中满足编码标准和托管标准。**目标**是 PBM 管理的实体。**条件**是策略针对目标进行评估的布尔表达式，而\
  \ **Facet** 是与特定类型目标相关联的属性集合。\n\n根据您使用的 Facet，一个策略最多可提供四种策略评估模式：`按需`、`按计划`、`仅更改：记录`和`更改：阻止`。`按需`、`按计划`和`仅更改：记录`可视为反应性的，而`更改：阻止`可视为主动性的，因为它会主动阻止违反策略的配置更改。由于`更改`模式依赖于\
  \ DDL 触发器，您必须在实例级别启用嵌套触发器，并且并非所有 Facet 都支持这些模式。\n\n策略是可扩展的，通过使用 `ExecuteSql()` 和\
  \ `ExecuteWql()` 函数，您可以评估 T-SQL 或 WQL 查询的结果。这些函数提供了极大的灵活性，但其强大的功能也可能导致安全漏洞，因此在授予创建策略的权限时需谨慎。\n\
  \n一个实例可以注册为中央管理服务器，其他服务器可以直接或分组注册在其下方。这使数据库管理员 (DBA) 能够同时跨多个实例运行查询，并且还为他们提供了同时针对多个服务器评估策略的能力。这意味着您可以在企业级别使用基于策略的管理来强制实施标准。\n\
  \n您可以从 SQL Server 内部或使用带有 `-InvokePolicyEvaluation` cmdlet 的 PowerShell 来评估策略。这为您管理包含较旧\
  \ SQL Server 实例（如 2000 或 2005）的环境提供了更大的灵活性。这是因为 PowerShell 允许 DBA 从 XML 文件评估策略，而不仅仅是导入到\
  \ `MSDB` 后才能评估。\n\n# 24. 资源调控器\n\n资源调控器提供了一种在 SQL Server 层对应用程序进行节流的方法，通过对不同分类的连接施加\
  \ CPU、内存和物理 IO 的限制。本章首先讨论资源调控器使用的概念，然后演示如何实现它。接着，我们将探讨如何监控资源调控器对资源利用率的影响。\n\n###\
  \ 资源调控器概念\n\n资源调控器使用**资源池**来定义服务器资源的子集，使用**工作负荷组**作为类似会话请求的逻辑容器，并使用**分类器函数**来确定应将特定请求分配给哪个工作负荷组。以下各节将讨论这些概念。\n\
  \n#### 资源池\n\n一个*资源池*定义了会话可以利用的服务器资源子集。启用资源调控器时，会自动创建三个池：内部池、默认池和默认外部池。*内部池*代表实例使用的服务器资源。此池无法修改。*默认池*设计为一个全池，用于将资源分配给任何未分配到用户定义资源池的会话。您不能删除此池；但是，可以修改其设置。默认外部池用于管理由机器学习服务使用的\
  \ `rterm.exe`、`BxlServer.exe` 和 `python.exe` 进程所使用的资源。默认外部资源池可以修改但不能删除，并且可以添加新的外部资源池。\n\
  \n资源池允许您配置将分配给分配到该池的会话的可用资源（CPU、内存和物理 IO）的最小和最大数量。当您添加其他池时，现有池的最大值会进行透明调整，以便它们不会与分配给所有池的最小资源百分比冲突。例如，假设您配置了资源池（如表\
  \ 24-1 所示）来限制 CPU 使用率。\n\n表 24-1\n资源池的简单有效最大百分比\n\n| 资源池* | 最小 CPU % | 最大 CPU %\
  \ | 有效最大 CPU % | 计算 |\n| --- | --- | --- | --- | --- |\n| `默认` | 0 | 100 | 75 |\
  \ `最小值(75,(100–0-25)) = 75` |\n| `销售应用程序` | 25 | 75 | 75 | `最小值(75,(100–0-0)) =\
  \ 75` |\n| `默认外部` | 0 | 100 | 75 | `最小值(75,(100–0-25)) = 75` |\n\n*∗此处未提及内部资源池，因为它既不能直接配置，也不能隐式配置。相反，它可以消耗其所需的任何资源，并且最小\
  \ CPU 为 0；因此，它不会影响其他池的有效最大 CPU 计算。*\n\n在此示例中，实际的“最大 CPU %”设置将如您所配置。但是，假设您现在添加了一个名为\
  \ `会计应用程序` 的额外资源池，其配置的最小 CPU % 为 50，最大 CPU % 为 80。最小 CPU 百分比之和现在大于最大 CPU 百分比之和。这意味着每个资源池的有效最大\
  \ CPU 百分比将相应降低。此计算的公式是 `最小值(默认最大值, 默认最大值 – SUM(其他最小 CPU))`，如表 24-2 所示。\n\n表 24-2\n\
  隐式降低后的资源池有效最大百分比\n\n| 资源池* | 最小 CPU % | 最大 CPU % | 有效最大 CPU % | 计算 |\n| --- | ---\
  \ | --- | --- | --- |\n| `默认` | 0 | 100 | 25 | `最小值(100,(100-sum(25,50,0))) = 25`\
  \ |\n| `销售应用程序` | 25 | 75 | 50 | `最小值(75,(100-50-0)) = 50` |\n| `会计应用程序` | 50 |\
  \ 80 | 75 | `最小值(80,(100-25-0)) = 75` |\n| `默认外部` | 0 | 100 | 25 | `最小值(100,(100-sum(25,50,0)))\
  \ = 25` |\n\n*∗此处未提及内部资源池，因为它既不能直接配置，也不能隐式配置。相反，它可以消耗其所需的任何资源，并且最小 CPU 为 0；因此，它不会影响其他池的有效最大\
  \ CPU 计算。*\n\n#### 工作负荷组\n\n一个资源池可以包含一个或多个工作负荷组。一个*工作负荷组*代表一个逻辑容器，用于存放通过执行分类器函数（下一节介绍）被归类为相似的会话。例如，在前面提到的\
  \ `销售应用程序` 资源池中，我们可以创建两个工作负荷组。我们可以将其中一个工作负荷组用作普通用户会话的容器，而将第二个用作报表会话的容器。\n\n这种方法使我们能够分别监控会话组。它还允许我们为每组会话定义不同的策略。例如，我们可以选择指定用于报表的会话具有比标准用户会话更低的\
  \ `MAXDOP`（最大并行度）设置，或者用于报表的会话只能指定有限数量的并发请求。这些设置是除了我们可以在资源池级别配置的设置之外的额外设置。\n\n####\
  \ 分类器函数\n\n一个*分类器函数*是在 Master 数据库中创建的标量函数。它用于确定每个会话应分配到哪个工作负荷组。除 DAC（专用管理员连接）外，每个新会话都使用单个分类器函数进行分类，DAC\
  \ 不受资源调控器约束。分类器函数可以基于几乎任何可以在解释型 SQL 中编码的属性对会话进行分组。例如，您可以选择基于用户名、角色成员身份、应用程序名称、主机名、登录属性、连接属性甚至时间来对请求进行分类。\n\
  \n\n\n### 实现资源管理器\n\n要在实例上配置资源管理器，您必须创建并配置一个或多个资源池，每个池包含一个或多个工作负载组。此外，您还需要创建一个分类器函数。最后，您需要启用资源管理器，这将使所有后续会话都被分类。这些主题将在以下章节中讨论。\n\
  \n#### 创建资源池\n\n每个实例最多可以创建 64 个资源池。让我们通过 SQL Server Management Studio 创建一个资源池：在对象资源管理器中依次展开\
  \ **Management** ➤ **Resource Governor**，然后从资源池的上下文菜单中选择 **New Resource Pool**。这将调出资源管理器属性对话框。\n\
  \n在此对话框的**资源池**部分，在网格中新建一行，并填入创建新资源池所需的信息。在我们的例子中，您应该添加一个名为 `SalesApplication` 的资源池的详细信息，其**最小\
  \ CPU %** 为 25，**最大 CPU %** 为 75，**最小内存 %** 为 25，**最大内存 %** 为 40。\n\n#### 提示\n\n\
  高亮显示一个资源池会导致与该资源池关联的工作负载组显示在屏幕的**资源池的工作负载组**部分。在这里，您可以同时添加、修改或删除资源池。但是，您也可以通过依次展开\
  \ **Management** ➤ **Resource Governor** ➤ [*资源池名称*]，然后从工作负载组的上下文菜单中选择 **New Workload\
  \ Group** 来访问此对话框。\n\n在此场景中，最大内存限制是硬限制。这意味着分配给此资源池的内存永远不会超过此实例可用内存的 40%。此外，即使没有会话使用此资源池，实例可用内存的\
  \ 25% 仍会分配给该池，且对其他资源池不可用。\n\n相比之下，最大 CPU 限制是软性的，或称机会性的。这意味着如果有更多 CPU 可用，资源池会加以利用。只有当处理器存在争用时，该上限才会生效。\n\
  \n#### 提示\n\n可以配置 CPU 使用率的硬上限。这在 PaaS（平台即服务）或 DaaS（数据库即服务）环境中很有帮助，这些环境根据 CPU 使用量向客户收费，并且您需要确保其应用程序的计费一致。如果客户已同意支付\
  \ 40% 的一个核心费用，但软性上限允许他们达到 50%，导致自动收取更高的费用，客户很容易对此提出争议。本节稍后将讨论如何实现这一点。\n\n您也可以通过\
  \ T-SQL 创建资源池。这样做时，您可以使用比 GUI 更多的功能，这些功能允许您配置最小和最大 IOPS（每秒输入/输出操作数），设置 CPU 使用率的硬上限，以及将资源池与特定的\
  \ CPU 或 NUMA 节点关联。在资源池和 CPU 子集之间建立关联意味着该资源池将只使用与其对齐的 CPU。您可以使用 `CREATE RESOURCE\
  \ POOL DDL` 语句在 T-SQL 中创建资源池。可在资源池上配置的设置详见表 24-3。\n\n表 24-3：`CREATE RESOURCE POOL`\
  \ 参数\n\n| 参数 | 描述 |\n| --- | --- |\n| `pool_name` | 分配给资源池的名称。 |\n| `MIN_CPU_PERCENT`\
  \ | 指定资源池可用的有保证的平均最小 CPU 资源，作为实例可用 CPU 带宽的百分比。 |\n| `MAX_CPU_PERCENT` | 指定资源池可用的平均最大\
  \ CPU 资源，作为实例可用 CPU 带宽的百分比。这是一个软限制，在 CPU 资源存在争用时适用。 |\n| `CAP_CPU_PERCENT` | 指定资源池可用\
  \ CPU 资源数量的硬限制，作为实例可用 CPU 带宽的百分比。 |\n| `MIN_MEMORY_PERCENT` | 指定为资源池保留的最小内存量，作为实例可用内存的百分比。\
  \ |\n| `MAX_MEMORY_PERCENT` | 指定资源池可以使用的最大内存量，作为实例可用内存的百分比。 |\n| `MIN_IOPS_PER_VOLUME`\
  \ | 指定为资源池保留的每卷 IOPS 数量。与 CPU 和内存阈值不同，IOPS 以绝对值（而非百分比）表示。 |\n| `MAX_IOPS_PER_VOLUME`\
  \ | 指定资源池可以使用的每卷最大 IOPS 数量。与最小 IOPS 阈值一样，它以绝对数字（而非百分比）表示。 |\n| `AFFINITY SCHEDULER`*\
  \ | 指定资源池应绑定到特定的 SQLOS（SQL 操作系统）调度程序，这些调度程序进而映射到服务器内的特定虚拟核心。不能与 `AFFINITY NUMANODE`\
  \ 一起使用。指定 `AUTO` 以允许 SQL Server 管理资源池使用的调度程序。指定调度程序 ID 的范围，例如 (`0, 1, 32 TO 64`)。\
  \ |\n| `AFFINITY NUMANODE`* | 指定资源池应绑定到特定的 NUMA 节点范围，例如 (`1 TO 4`)。不能与 `AFFINITY\
  \ SCHEDULER` 一起使用。 |\n\n*有关 CPU 和 NUMA 关联的更多详细信息，请参阅第 5 章。*\n\n在使用每卷最小和最大 IOPS 阈值时，我们需要考虑几点。首先，如果我们没有设置最大\
  \ IOPS 限制，SQL Server 根本不会管理资源池的 IOPS。这意味着如果您为其他资源池配置了最小 IOPS 限制，这些限制不会被遵守。因此，如果您希望资源管理器管理\
  \ IO，请务必为每个资源池设置最大 IOPS 阈值。\n\n\n\n同样值得注意的是，您可以通过资源管理器控制的大部分 IO 是读取操作。这是因为写入操作（例如\
  \ Lazy Writer 和 Log Flush 操作）是作为系统操作发生的，并且属于内部资源池的范围。由于您无法更改内部资源池，因此无法管理大多数写入操作。这意味着，当您拥有一个报表应用程序或其他具有高读写比例的应用程序时，使用资源管理器来限制\
  \ IO 操作是最合适的。\n\n最后，您应该意识到，资源管理器只能控制 IOPS 的数量；它无法控制 IOPS 的大小。这意味着您不能使用资源管理器来控制应用程序使用的\
  \ SAN 带宽量。\n\n要创建外部资源池，应使用 `CREATE EXTERNAL RESOURCE POOL` DDL 语句。可以在外部资源池上配置的设置详见表\
  \ 24-4。\n\n**表 24-4**\n`CREATE EXTERNAL RESOURCE POOL` 参数\n\n| 参数 | 说明 |\n| ---\
  \ | --- |\n| `pool_name` | 您分配给资源池的名称。 |\n| `MAX_CPU_PERCENT` | 指定资源池可用的最大平均 CPU\
  \ 资源占实例可用 CPU 带宽的百分比。这是一个软限制，在 CPU 资源存在争用时适用。 |\n| `AFFINITY SCHEDULER` | 指定资源池应绑定到特定的\
  \ SQLOS（SQL 操作系统）调度器，这些调度器进而映射到服务器内的特定虚拟核心。不能与 `AFFINITY NUMANODE` 一起使用。指定 `AUTO`\
  \ 以允许 SQL Server 管理资源池使用的调度器。指定调度器 ID 范围。例如 (`0, 1, 32 TO 64`)。 |\n| `MAX_MEMORY_PERCENT`\
  \ | 指定资源池可以使用的最大内存量占实例可用内存的百分比。 |\n| `MAX_PROCESSES` | 指定在任何给定时间池内允许的最大进程数。默认值为\
  \ 0，仅通过服务器资源限制进程数。 |\n\n如果您想创建一个名为 `ReportingApp` 的资源池，该池设置最小 CPU 百分比为 50，最大 CPU\
  \ 百分比为 80，最小 IOPS 预留为 20，最大 IOPS 预留为 100，则可以使用代码清单 24-1 中的脚本。脚本的最后一条语句使用 `ALTER\
  \ RESOURCE GOVERNOR` 来应用新配置。在创建工作负载组或应用分类器函数后，也应运行此语句。\n\n```sql\nCREATE RESOURCE\
  \ POOL ReportingApp\nWITH(\nMIN_CPU_PERCENT=50,\nMAX_CPU_PERCENT=80,\nMIN_IOPS_PER_VOLUME\
  \ = 20,\nMAX_IOPS_PER_VOLUME = 100\n) ;\nGO\nALTER RESOURCE GOVERNOR RECONFIGURE\
  \ ;\nGO\n```\n代码清单 24-1：创建资源池\n\n#### 创建工作负载组\n\n每个资源池可以包含多个工作负载组。要开始为我们的 `SalesApplication`\
  \ 资源池创建工作负载组，我们依次展开 管理 ➤ 资源管理器 ➤ 资源池。然后展开我们的 `SalesApplication` 资源池，并从工作负载组上下文菜单中选择\
  \ 新建工作负载组。这将调用资源管理器属性对话框，如图 24-1 所示。\n\n![资源管理器属性对话框](img/333037_2_En_24_Fig1_HTML.jpg)\n\
  图 24-1：资源管理器属性对话框\n\n您可以看到，在对话框的“资源池”部分选中 `SalesApplication` 资源池的情况下，我们在屏幕的“工作负载组”部分创建了两行。每一行都表示一个与\
  \ `SalesApplication` 资源池关联的工作负载组。\n\n我们将 `SalesUsers` 工作负载组配置为最多允许 100 个并发请求，`MAXDOP`\
  \ 为 4，这意味着归类到此工作负载组下的请求最多可以使用四个调度器。\n\n我们将 `Managers` 工作负载组配置为最多允许 10 个并发请求并使用最多一个调度器。我们还将此工作负载组配置为最多可使用资源池可预留内存的\
  \ 10%，而不是默认的 25%。\n\n如果 `Memory Grant %` 设置为 0，则归类到该工作负载组下的任何请求都将被阻止运行任何需要 `SORT`\
  \ 或 `HASH JOIN` 物理运算符的操作。如果查询需要的 RAM 超过指定量，则 SQL Server 会降低该查询的 `DOP`，以尝试减少内存需求。如果\
  \ `DOP` 达到 1 且内存仍然不足，则会抛出 `Error 8657`。\n\n要通过 T-SQL 创建工作负载组，请使用 `CREATE WORKLOAD\
  \ GROUP` DDL 语句。此语句接受表 24-5 中详述的参数。\n\n**表 24-5**\n`CREATE WORKLOAD GROUP` 参数\n\n\
  | 参数 | 说明 |\n| --- | --- |\n| `group_name` | 指定工作负载组的名称。 |\n| `IMPORTANCE` | 可配置为\
  \ `HIGH`、`MEDIUM` 或 `LOW`，允许您将一个工作负载组中的请求优先级设置为高于另一个。 |\n| `REQUEST_MAX_MEMORY_GRANT_PERCENT`\
  \ | 指定任何单个查询可以从资源池使用的最大内存量，表示为资源池可用内存的百分比。 |\n| `REQUEST_MAX_CPU_TIME_SEC` | 指定任何单个查询可以使用的\
  \ CPU 时间（以秒为单位）。需要注意的是，如果超过阈值，则会生成一个事件，该事件可以通过扩展事件捕获。但是，查询不会被取消。 |\n| `REQUEST_MEMORY_GRANT_TIMEOUT_SEC`\
  \ | 指定查询在超时之前可以等待工作缓冲区内存变为可用的最大时间量。然而，查询仅在内存争用时才会超时。否则，查询将获得最小内存授予。这会导致查询性能下降。最长时间以秒表示。\
  \ |\n| `MAX_DOP` | 单个并行查询可以使用的最大处理器数。查询的 `MAXDOP` 可以通过使用查询提示、更改实例的 `MAXDOP` 设置或在关系引擎选择串行计划时进一步限制。\
  \ |\n| `GROUP_MAX_REQUESTS` | 指定可以在工作负载组内执行的最大并发请求数。如果并发请求数达到此值，则进一步的查询将置于等待状态，直到并发查询数降至阈值以下。\
  \ |\n| `USING` | 指定工作负载组与之关联的资源池。如果未指定，则该组与默认池关联。 |\n\n#### 注意\n\n工作负载组名称必须是唯一的，即使它们与不同的池关联也是如此。这样它们才能由分类器函数返回。\n\
  \n如果我们创建两个工作负载组，并希望它们与我们的 `ReportingApp` 资源池关联——一个名为 `InternalReports`，`MAXDOP`\
  \ 为 4，最大内存授予百分比为 25%；另一个名为 `ExternalReports`，`MAXDOP` 为 8，最大内存授予百分比为 75%——我们可以使用代码清单\
  \ 24-2 中的脚本。\n\n```sql\nCREATE WORKLOAD GROUP InternalReports\nWITH(\nGROUP_MAX_REQUESTS=100,\n\
  IMPORTANCE=Medium,\nREQUEST_MAX_CPU_TIME_SEC=0,\nREQUEST_MAX_MEMORY_GRANT_PERCENT=25,\n\
  REQUEST_MEMORY_GRANT_TIMEOUT_SEC=0,\nMAX_DOP=4\n) USING ReportingApp ;\nGO\nCREATE\
  \ WORKLOAD GROUP ExternalReports\nWITH(\nGROUP_MAX_REQUESTS=100,\nIMPORTANCE=Medium,\n\
  REQUEST_MAX_CPU_TIME_SEC=0,\nREQUEST_MAX_MEMORY_GRANT_PERCENT=75,\nREQUEST_MEMORY_GRANT_TIMEOUT_SEC=0,\n\
  MAX_DOP=8\n) USING ReportingApp ;\nGO\nALTER RESOURCE GOVERNOR RECONFIGURE;\nGO\n\
  ```\n代码清单 24-2：创建工作负载组\n\n\n#### 创建分类器函数\n\n分类器函数是驻留在 Master 数据库中的标量 UDF（用户定义函数）。它返回类型为\
  \ `SYSNAME` 的值，这是系统定义的类型，等同于 `NVARCHAR(128)`。函数返回的值对应于每个请求应归入的工作负载组名称。函数内的逻辑决定返回哪个工作负载组名称。每个实例通常只有一个分类器函数，因此如果添加了额外的工作负载组，则需要修改该函数。\n\
  \n现在，让我们使用本章构建的资源调控器环境创建一个分类器函数。该函数将根据以下规则对每个针对我们实例的请求进行分类：\n\n1.  如果请求是在 `SalesUser`\
  \ 登录的上下文中发出的，则该请求应归入 `SalesUsers` 工作负载组。\n2.  如果请求由 `SalesManager` 登录发出，则请求应放置在\
  \ `Managers` 工作负载组中。\n3.  如果请求由 `ReportsUser` 登录发出，并且请求来自名为 `ReportsApp` 的服务器，则该请求应归入\
  \ `InternalReports` 工作负载组。\n4.  如果请求由 `ReportsUser` 登录发出但并非源自 `ReportsApp` 服务器，则它应归入\
  \ `ExternalReports` 工作负载组。\n5.  所有其他请求都应放置到默认工作负载组。\n\n在创建分类器函数之前，我们需要准备实例。为此，我们首先创建\
  \ `Chapter24` 数据库。然后创建 `SalesUser`、`ReportsUser` 和 `SalesManager` 登录，并将 `Users`\
  \ 映射到 `Chapter24` 数据库。（关于安全原则的更多详细信息，请参见第 10 章。）清单 24-3 包含了准备实例所需的代码。\n\n> **注意**\n\
  >\n> 出于本示例的目的，用户被映射到 `Chapter24` 数据库，但你可以针对实例中的任何数据库进行查询。\n\n```sql\n--Create the\
  \ database\nUSE [master]\nGO\nCREATE DATABASE Chapter24 ;\n--Create the Logins and\
  \ Users\nCREATE LOGIN SalesUser\nWITH PASSWORD=N'Pa$$w0rd', DEFAULT_DATABASE=Chapter24,\n\
  CHECK_EXPIRATION=OFF, CHECK_POLICY=OFF ;\nGO\nCREATE LOGIN ReportsUser\nWITH PASSWORD=N'Pa$$w0rd',\
  \ DEFAULT_DATABASE=Chapter24,\nCHECK_EXPIRATION=OFF, CHECK_POLICY=OFF ;\nGO\nCREATE\
  \ LOGIN SalesManager\nWITH PASSWORD=N'Pa$$w0rd', DEFAULT_DATABASE=Chapter24,\nCHECK_EXPIRATION=OFF,\
  \ CHECK_POLICY=OFF ;\nGO\nUSE Chapter24\nGO\nCREATE USER SalesUser FOR LOGIN SalesUser\
  \ ;\nGO\nCREATE USER ReportsUser FOR LOGIN ReportsUser ;\nGO\nCREATE USER SalesManager\
  \ FOR LOGIN SalesManager ;\nGO\n```\n清单 24-3\n准备实例\n\n为了实现关于每个请求应放置到哪个工作负载组的业务规则，我们使用表\
  \ 24-6 中详述的系统函数。\n\n表 24-6\n\n用于实现业务规则的系统函数\n\n| 函数 | 描述 | 业务规则 |\n| --- | --- |\
  \ --- |\n| `SUSER_SNAME()` | 返回登录名 | 1, 2, 3, 4 |\n| `HOST_NAME()` | 发出请求的主机名 |\
  \ 3, 4 |\n\n创建分类器函数时，它必须遵循特定规则。首先，函数必须是**架构绑定**的。这意味着任何被该函数引用的基础对象，如果不先删除该函数，就无法被更改。该函数还必须返回\
  \ `SYSNAME` 数据类型且没有参数。\n\n值得注意的是，要求函数是架构绑定的这一点很重要，它对资源调控器的灵活性带来了限制。例如，如果能够基于数据库角色成员身份来委派工作负载将非常有用；然而，这是不可能的，因为架构绑定函数无法直接或间接访问其他数据库中的对象。由于分类器函数必须驻留在\
  \ Master 数据库中，你无法访问有关其他数据库中数据库角色的信息。\n\n和所有情况一样，这个问题也有变通方法。例如，你可以在 Master 数据库中创建一个表来维护来自用户数据库的角色成员身份。你甚至可以通过结合使用用户数据库中的视图和触发器来自动保持此表的更新。该视图将基于\
  \ `sys.sysusers` 目录视图，而触发器将基于你创建的视图。然而，这将是一个复杂的设计，会带来维护上的操作挑战。\n\n清单 24-4 中的脚本创建了分类器函数，该函数在将函数与资源调控器关联之前实现了我们的业务规则。和往常一样，然后重新配置资源调控器以使我们的更改生效。\n\
  \n```sql\nUSE Master\nGO\nCREATE FUNCTION dbo.Classifier()\nRETURNS SYSNAME\nWITH\
  \ SCHEMABINDING\nAS\nBEGIN\n--Declare variables\nDECLARE @WorkloadGroup        SYSNAME\
  \ ;\nSET @WorkloadGroup = 'Not Assigned' ;\n--Implement business rule 1\nIF (SUSER_NAME()\
  \ = 'SalesUser')\nBEGIN\nSET @WorkloadGroup = 'SalesUsers' ;\nEND\n--Implement business\
  \ rule 2\nELSE IF (SUSER_NAME() = 'SalesManager')\nBEGIN\nSET @WorkloadGroup = 'Managers'\
  \ ;\nEND\n--Implement business rules 3 & 4\nELSE IF (SUSER_SNAME() = 'ReportsUser')\n\
  BEGIN\nIF (HOST_NAME() = 'ReportsApp')\nBEGIN\nSET @WorkloadGroup = 'InternalReports'\n\
  END\nELSE\nBEGIN\nSET @WorkloadGroup = 'ExternalReports'\nEND\nEND\n--Implement\
  \ business rule 5 (Put all other requests into the default workload group)\nELSE\
  \ IF @WorkloadGroup = 'Not Assigned'\nBEGIN\nSET @WorkloadGroup = 'default'\nEND\n\
  --Return the apropriate Workload Group name\nRETURN @WorkloadGroup\nEND\nGO\n--Associate\
  \ the Classifier Function with Resource Governor\nALTER RESOURCE GOVERNOR WITH (CLASSIFIER_FUNCTION\
  \ = dbo.Classifier) ;\nALTER RESOURCE GOVERNOR RECONFIGURE ;\n```\n清单 24-4\n创建分类器函数\n\
  \n#### 测试分类器函数\n\n创建分类器函数后，我们需要测试它是否有效。我们可以使用 `EXECUTE AS` 语句更改系统上下文，然后调用分类器函数来测试业务规则\
  \ 1 和 2。清单 24-5 展示了这一点。该脚本临时允许所有登录直接访问分类器函数，这使得查询能够工作。它通过在脚本结束前授予 Public 角色 `EXECUTE`\
  \ 权限，然后再撤销此权限来实现这一点。\n\n```sql\nUSE MASTER\nGO\nGRANT EXECUTE ON dbo.Classifier\
  \ TO public ;\nGO\nEXECUTE AS LOGIN = 'SalesUser' ;\nSELECT dbo.Classifier() AS\
  \ 'Workload Group' ;\nREVERT\nEXECUTE AS LOGIN = 'SalesManager' ;\nSELECT dbo.Classifier()\
  \ as 'Workload Group' ;\nREVERT\nREVOKE EXECUTE ON dbo.Classifier TO public ;\n\
  GO\n```\n清单 24-5\n测试业务规则 1 和 2\n\n运行这两个查询的结果表明，业务规则 1 和 2 正常工作。\n\n要测试业务规则 4，我们可以使用与验证业务规则\
  \ 1 和 2 相同的过程。唯一的区别是将执行上下文更改为 `ReportsUser`。为了验证规则 3，我们使用相同的过程，但这次从名为 `ReportsApp`\
  \ 的服务器调用查询。\n\n> **提示**\n>\n> 如果你没有名为 `ReportsApp` 的服务器的访问权限，那么请更新函数定义以使用你有权访问的服务器名称。\n\
  \n### 监控资源调控器\n\nSQL Server 提供了动态管理视图 (DMV)，可用于返回与资源池和工作负载组相关的统计信息。不过，你也可以使用 Windows\
  \ 的性能监视器工具来监控资源调控器的使用情况，这为你提供了图形化表示的优势。接下来的章节将讨论这两种监控资源调控器的方法。\n\n\n#### 使用性能监视器进行监控\n\
  \n数据库管理员可以使用内置于 Windows 的性能监视器来监控资源池及其关联的工作负载组的使用情况。您可以从“控制面板” ➤ “管理工具” 访问性能监视器，或者通过在开始菜单中搜索\
  \ `Perfmon` 来打开它。\n\n#### 注意\n\n要跟随本节的演示操作，您应该运行 Windows Server 操作系统。\n\n性能监视器中有两个与资源调控器相关的类别。第一个是\
  \ `MSSQL$[实例名称]:Resource Pool Stats`。它包含与已分配给资源组的资源消耗相关的计数器。对于实例上配置的每个资源组，每个计数器都有一个对应的实例。\n\
  \n第二个类别是 `MSSQL$[实例名称]:Workload Group Stats`，它包含与实例上配置的每个工作负载组的利用率相关的计数器。图 24-4\
  \ 展示了我们如何从“工作负载组统计信息”类别中添加“CPU 使用率 %”计数器的 `InternalReports`、`ExternalReports`、`SalesUsers`\
  \ 和 `Managers` 实例。选中这些实例后，我们将使用“添加”按钮将它们移动到“已添加的计数器”部分。我们可以通过在左侧窗格中选择“监控工具” ➤ “性能监视器”，然后在右侧窗格的工具栏上使用加号\
  \ (`+`) 符号来调用“添加计数器”对话框。\n\n![../images/333037_2_En_24_Chapter/333037_2_En_24_Fig2_HTML.jpg](img/333037_2_En_24_Fig2_HTML.jpg)\n\
  \n图 24-2: 添加工作负载组统计信息\n\n现在我们已经添加了这个计数器，我们还需要从“资源池统计信息”类别中添加“活动内存授予量 (KB)”计数器的 `ReportingApp`\
  \ 和 `SalesApplication` 应用程序实例，如图 24-3 所示。\n\n![../images/333037_2_En_24_Chapter/333037_2_En_24_Fig3_HTML.jpg](img/333037_2_En_24_Fig3_HTML.jpg)\n\
  \n图 24-3: 资源池统计信息\n\n要测试我们的资源调控器配置，我们可以使用清单 24-6 中的脚本。该脚本设计为在两个独立的查询窗口中运行。脚本的第一部分应在使用\
  \ `SalesUser` 登录名连接到实例的查询窗口中运行，第二部分应在使用 `SalesManager` 登录名连接到实例的查询窗口中运行。这两个脚本应同时运行，并使性能监视器生成类似于图\
  \ 24-4 中的图表。尽管这些脚本不会导致调用分类器函数，但它们作为一种交互式方式来测试我们的逻辑。\n\n#### 注意\n\n以下脚本可能会返回大量数据。\n\
  \n```sql\n--脚本第 1 部分 - 在使用 SalesManager 登录名连接的查询窗口中运行\nEXECUTE AS LOGIN = 'SalesManager'\n\
  DECLARE @i INT = 0 ;\nWHILE (@i < 10000)\nBEGIN\nSELECT DBName = (\nSELECT Name\
  \ AS [data()]\nFROM sys.databases\nFOR XML PATH('')\n) ;\nSET @i = @i + 1 ;\nEND\n\
  --脚本第 2 部分 - 在使用 SalesUser 登录名连接的查询窗口中运行\nEXECUTE AS LOGIN = 'SalesUser'\nDECLARE\
  \ @i INT = 0 ;\nWHILE (@i < 10000)\nBEGIN\nSELECT DBName = (\nSELECT Name AS [data()]\n\
  FROM sys.databases\nFOR XML PATH('')\n) ;\nSET @i = @i + 1 ;\nEND\n```\n\n清单 24-6:\
  \ 针对 SalesUsers 和 Managers 工作负载组生成负载\n\n![../images/333037_2_En_24_Chapter/333037_2_En_24_Fig4_HTML.jpg](img/333037_2_En_24_Fig4_HTML.jpg)\n\
  \n图 24-4: 查看 CPU 利用率\n\n您可以看到 `SalesUsers` 和 `Managers` 工作负载组的 CPU 使用率几乎相同，这意味着资源调控器的实现正在按预期工作。\n\
  \n#### 使用动态管理视图进行监控\n\nSQL Server 提供了 `sys.dm_resource_governor_resource_pools`\
  \ 和 `sys.dm_resource_governor_workload_groups` 动态管理视图，数据库管理员可以使用它们来检查资源调控器统计信息。`sys.dm_resource_governor_resource_pools`\
  \ 动态管理视图返回表 24-7 中详述的列。\n\n表 24-7: `sys.dm_resource_governor_resource_pools` 返回的列\n\
  \n| 列名 | 描述 |\n| --- | --- |\n| `pool_id` | 资源池的唯一 ID |\n| `name` | 资源池的名称 |\n|\
  \ `statistics_start_time` | 上次重置资源池统计信息的日期/时间 |\n| `total_cpu_usage_ms` | 自上次重置统计信息以来资源池使用的总\
  \ CPU 时间 |\n| `cache_memory_kb` | 资源池当前正在使用的总缓存内存 |\n| `compile_memory_kb` | 资源池当前用于编译和优化的总内存\
  \ |\n| `used_memgrant_kb` | 资源池用于内存授予的总内存 |\n| `total_memgrant_count` | 自上次重置统计信息以来资源池中的内存授予总数\
  \ |\n| `total_memgrant_timeout_count` | 自上次重置统计信息以来资源池中的内存授予超时总数 |\n| `active_memgrant_count`\
  \ | 资源池内当前内存授予的数量 |\n| `active_memgrant_kb` | 资源池内当前用于内存授予的总内存量 |\n| `memgrant_waiter_count`\
  \ | 资源池内当前正在等待内存授予的查询数量 |\n| `max_memory_kb` | 资源池可以保留的最大内存量 |\n| `used_memory_kb`\
  \ | 资源池当前已保留的内存量 |\n| `target_memory_kb` | 资源池当前试图维持的内存量 |\n| `out_of_memory_count`\
  \ | 资源池内存分配失败的次数 |\n| `min_cpu_percent` | 保证分配给资源池的平均最小 CPU 百分比 |\n| `max_cpu_percent`\
  \ | 资源池的平均最大 CPU 百分比 |\n| `min_memory_percent` | 在内存争用期间保证可用于资源池的最小内存量 |\n| `max_memory_percent`\
  \ | 可分配给资源池的最大服务器内存百分比 |\n| `cap_cpu_percent` | 资源池可用的最大 CPU 百分比的硬性限制 |\n\n`sys.dm_resource_governor_workload_groups`\
  \ 动态管理视图返回表 24-8 中详述的列。\n\n表 24-8: `sys.dm_resource_governor_workload_groups` 返回的列\n\
  \n\n\n##### 工作负载组的统计列说明\n\n以下是 `sys.dm_resource_governor_workload_groups` 视图中返回的列：\n\
  \n| 列名 | 说明 |\n| --- | --- |\n| `group_id` | 工作负载组的唯一 ID。 |\n| `name` | 工作负载组的名称。\
  \ |\n| `pool_id` | 工作负载组所关联的资源池的唯一 ID。 |\n| `statistics_start_time` | 上次重置工作负载组统计信息的时间。\
  \ |\n| `total_request_count` | 自上次重置统计信息以来，工作负载组中的请求数量计数。 |\n| `total_queued_request_count`\
  \ | 由于达到 `GROUP_MAX_REQUESTS` 阈值而被排队的工作负载组内的请求数量。 |\n| `active_request_count` |\
  \ 工作负载组中当前活动的请求数量计数。 |\n| `queued_request_count` | 由于达到 `GROUP_MAX_REQUESTS` 阈值而当前在工作负载组中排队的请求数量。\
  \ |\n| `total_cpu_limit_violation_count` | 自上次重置统计信息以来，工作负载组中超出 CPU 限制的请求数量计数。 |\n\
  | `total_cpu_usage_ms` | 自上次重置统计信息以来，工作负载组内请求使用的总 CPU 时间。 |\n| `max_request_cpu_time_ms`\
  \ | 自上次重置统计信息以来，工作负载组内任何单个请求使用的最大 CPU 时间。 |\n| `blocked_task_count` | 工作负载组中当前被阻塞的任务数量计数。\
  \ |\n| `total_lock_wait_count` | 自上次重置统计信息以来，工作负载组内请求发生的所有锁等待的数量计数。 |\n| `total_lock_wait_time_ms`\
  \ | 自上次重置统计信息以来，工作负载组内请求持有锁的时间总和。 |\n| `total_query_optimization_count` | 自上次重置统计信息以来，工作负载组内发生的所有查询优化的数量计数。\
  \ |\n| `total_suboptimal_plan_generation_count` | 自上次重置统计信息以来，工作负载组内生成的所有次优计划的数量计数。这些次优计划表明工作负载组正经历内存压力。\
  \ |\n| `total_reduced_memgrant_count` | 自上次重置统计信息以来，工作负载组内达到最大大小限制的所有内存授予的数量计数。\
  \ |\n| `max_request_grant_memory_kb` | 自上次重置统计信息以来，工作负载组内发生的最大单个内存授予的大小。 |\n| `active_parallel_thread_count`\
  \ | 工作负载组中当前使用的并行线程数量计数。 |\n| `importance` | 为工作负载组重要性设置指定的当前值。 |\n| `request_max_memory_grant_percent`\
  \ | 为工作负载组的最大内存授予百分比指定的当前值。 |\n| `request_max_cpu_time_sec` | 为工作负载组的 CPU 限制指定的当前值。\
  \ |\n| `request_memory_grant_timeout_sec` | 为工作负载组的内存授予超时指定的当前值。 |\n| `group_max_requests`\
  \ | 为工作负载组的最大并发请求数指定的当前值。 |\n| `max_dop` | 为工作负载组的 MAXDOP 指定的当前值。 |\n\n### 连接 DMV\
  \ 并生成报告\n\n您可以使用 `pool_id` 列连接 `sys.dm_resource_governor_resource_pools` 和 `sys.dm_resource_governor_workload_groups`\
  \ DMV。清单 24-7 中的脚本演示了如何实现这一点，以便返回一份报告，展示各工作负载组的 CPU 使用情况与资源池总体 CPU 使用情况的对比。\n\n\
  ```sql\nSELECT\n    rp.name ResourcePoolName\n    , wg.name WorkgroupName\n    ,\
  \ rp.total_cpu_usage_ms ResourcePoolCPUUsage\n    , wg.total_cpu_usage_ms WorkloadGroupCPUUsage\n\
  \    , CAST(ROUND(CASE\n                    WHEN rp.total_cpu_usage_ms = 0\n   \
  \                 THEN 100\n                    ELSE (wg.total_cpu_usage_ms * 1.)\n\
  \                         / (rp.total_cpu_usage_ms * 1.) * 100\n               \
  \   END, 3) AS FLOAT) WorkloadGroupPercentageOfResourcePool\nFROM sys.dm_resource_governor_resource_pools\
  \ rp\nINNER JOIN sys.dm_resource_governor_workload_groups wg\n    ON rp.pool_id\
  \ = wg.pool_id\nORDER BY rp.pool_id ;\n```\n**清单 24-7** CPU 使用情况报告\n\n### 重置统计信息\n\
  \n您可以使用清单 24-8 中的命令重置由 `sys.resource_governor_resource_pools` 和 `sys.dm_resource_governor_workload_groups`\
  \ DMV 暴露的累积统计信息。\n\n```sql\nALTER RESOURCE GOVERNOR RESET STATISTICS ;\n```\n**清单\
  \ 24-8** 重置资源治理器统计信息\n\n### 资源池处理器关联性 DMV\n\nSQL Server 暴露了第三个名为 `sys.dm_resource_governor_resource_pool_affinity`\
  \ 的 DMV，它返回表 24-9 中详述的列。\n\n**表 24-9** `dm_resource_governor_resource_pool_affinity`\
  \ 返回的列\n\n| 列名 | 说明 |\n| --- | --- |\n| `pool_id` | 资源池的唯一 ID。 |\n| `processor_group`\
  \ | 逻辑处理器组的 ID。 |\n| `scheduler_mask` | 表示与资源池关联的调度程序的二进制掩码。有关解释此二进制掩码的更多详细信息，请参阅第\
  \ 5 章。 |\n\n您可以使用 `pool_id` 列将 `sys.dm_resource_governor_resource_pool_affinity`\
  \ DMV 连接到 `sys.resource_governor_resource_pools` DMV。清单 24-9 演示了这一点；它首先更改默认资源池，使其仅使用处理器\
  \ 0，然后显示已配置处理器关联性的每个资源池的调度程序二进制掩码。\n\n```sql\nALTER RESOURCE POOL [Default] WITH(AFFINITY\
  \ SCHEDULER = (0)) ;\nALTER RESOURCE GOVERNOR RECONFIGURE ;\nSELECT\n    rp.name\
  \ ResourcePoolName\n    , pa.scheduler_mask\nFROM sys.dm_resource_governor_resource_pool_affinity\
  \ pa\nINNER JOIN sys.dm_resource_governor_resource_pools rp\n    ON pa.pool_id =\
  \ rp.pool_id ;\n```\n**清单 24-9** 为每个资源池调度二进制掩码\n\n### 资源池卷 DMV\n\n有一个名为 `sys.dm_resource_governor_resource_pool_volumes`\
  \ 的 DMV，它返回每个资源池的 IO 统计信息的详细信息。该 DMV 的列在表 24-10 中描述。\n\n**表 24-10** `dm_resource_governor_resource_pool_volumes`\
  \ 返回的列\n\n\n\n| 列名 | 描述 |\n| --- | --- |\n| `pool_id` | 资源池的唯一标识符 |\n| `volume_name`\
  \ | 磁盘卷的名称 |\n| `min_iops_per_volume` | 当前为资源池配置的每个磁盘卷的最小 IOPS 数 |\n| `max_iops_per_volume`\
  \ | 当前为资源池配置的每个磁盘卷的最大 IOPS 数 |\n| `read_ios_queued_total` | 自上次重置统计信息以来，针对此磁盘卷为资源池排队的读取\
  \ IO 操作总数 |\n| `read_ios_issued_total` | 自上次重置统计信息以来，针对此磁盘卷为资源池发出的读取 IO 操作总数 |\n\
  | `read_ios_completed_total` | 自上次重置统计信息以来，针对此磁盘卷为资源池完成的读取 IO 操作总数 |\n| `read_bytes_total`\
  \ | 自上次重置统计信息以来，针对此磁盘卷为资源池读取的总字节数 |\n| `read_io_stall_total_ms` | 自上次重置统计信息以来，针对此磁盘卷为资源池发出的读取\
  \ IO 操作到其完成之间的累计时间 |\n| `read_io_stall_queued_ms` | 自上次重置统计信息以来，针对此磁盘卷为资源池的读取 IO\
  \ 操作从到达至完成的累计时间 |\n| `write_ios_queued_total` | 自上次重置统计信息以来，针对此磁盘卷为资源池排队的写入 IO 操作总数\
  \ |\n| `write_ios_issued_total` | 自上次重置统计信息以来，针对此磁盘卷为资源池发出的写入 IO 操作总数 |\n| `write_ios_completed_total`\
  \ | 自上次重置统计信息以来，针对此磁盘卷为资源池完成的写入 IO 操作总数 |\n| `write_bytes_total` | 自上次重置统计信息以来，针对此磁盘卷为资源池写入的总字节数\
  \ |\n| `write_io_stall_total_ms` | 自上次重置统计信息以来，针对此磁盘卷为资源池发出的写入 IO 操作到其完成之间的累计时间\
  \ |\n| `write_io_stall_queued_ms` | 自上次重置统计信息以来，针对此磁盘卷为资源池的写入 IO 操作从到达至完成的累计时间 |\n\
  | `io_issue_violations_total` | 自上次重置统计信息以来，针对资源池和磁盘卷执行的 IO 操作超出配置允许的总次数 |\n| `io_issue_delay_total_ms`\
  \ | IO 操作计划发出与实际发出之间的总时间 |\n\n您可以使用 `sys.dm_resource_governor_resource_pool_volumes`\
  \ DMV 来判断您的资源池配置是否导致了延迟。方法是将 `read_io_stall_queued_ms` 和 `write_io_stall_queued_ms`\
  \ 相加，然后从 `read_io_stall_total_ms` 与 `write_io_stall_total_ms` 的总和中减去这个值，如清单 24-10\
  \ 所示。此脚本首先修改默认资源池，以便对 IOPS 进行限制，随后报告 IO 停顿情况。\n\n#### 提示\n\n请记住，在用户定义的资源池中，您可能会看到远少于读取操作的写入操作。这是因为绝大多数写入操作是系统操作，因此它们发生在内部资源池中。\n\
  \n```\nALTER RESOURCE POOL [default] WITH(\nmin_iops_per_volume=50,\nmax_iops_per_volume=100)\
  \ ;\nALTER RESOURCE GOVERNOR RECONFIGURE ;\nSELECT\nrp.name ResourcePoolName\n,pv.volume_name\n\
  ,pv.read_io_stall_total_ms\n,pv.write_io_stall_total_ms\n,pv.read_io_stall_queued_ms\n\
  ,pv.write_io_stall_queued_ms\n,(pv.read_io_stall_total_ms + pv.write_io_stall_total_ms)\n\
  - (pv.read_io_stall_queued_ms + pv.write_io_stall_queued_ms) GovernorLatency\nFROM\
  \ sys.dm_resource_governor_resource_pool_volumes pv\nRIGHT JOIN sys.dm_resource_governor_resource_pools\
  \ rp\nON pv.pool_id = rp.pool_id ;\n```\n清单 24-10: 发现资源池配置是否导致磁盘延迟\n\n#### 提示\n\n\
  如果您没有看到任何 IO 停顿，请在性能较低的驱动器上创建一个数据库，并对其运行一些密集型查询，然后再重新运行清单 24-10 中的查询。\n\n### 总结\n\
  \n资源调控器允许您在 SQL Server 实例级别对应用程序进行节流。您可以使用它来限制请求的内存、CPU 和磁盘使用量。您还可以使用它将一类请求与特定的调度程序或\
  \ NUMA 范围关联，或者降低一类请求的 `MAXDOP`。\n\n资源池代表一组服务器资源，而工作负载组则是对以相同方式分类的相似请求的逻辑容器。资源调控器为系统请求提供了内部资源池和工作负载组，并为任何未分类的请求提供了一个默认资源池和工作负载组作为兜底方案。虽然内部资源池无法修改，但用户定义的资源池与工作负载组之间存在一对多的关系。\n\
  \n对 SQL Server 的请求使用用户定义的函数进行分类，该函数必须由 DBA 创建。此函数必须是返回 `sysname` 数据类型的标量函数，并且必须是绑定到架构的，并驻留在\
  \ Master 数据库中。DBA 可以使用系统函数（如 `USER_SNAME()`、`IS_MEMBER()` 和 `HOST_NAME()`）来辅助分类。\n\
  \nSQL Server 提供了四个动态管理视图 (DMV)，DBA 可以使用它们来帮助监控资源调控器的配置和使用情况。DBA 也可以使用性能监视器来监控资源调控器的使用情况，这为其提供了数据的可视化表示。采用这种方法时，您会发现性能监视器为服务器上存在的每个实例公开了资源池和工作负载组的计数器类别。这些类别中的计数器分别针对实例上当前配置的每个资源池或工作负载组都有一个实例。\n\
