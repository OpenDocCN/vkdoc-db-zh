- "# 第一部分 安装与配置\n\n## 第 1 章 规划部署\n\n规划 SQL Server 2019 的部署，以最好地支持业务需求，可能是一项复杂的任务。您应确保考虑许多方面，包括版本、许可要求、本地托管与云托管、硬件注意事项、软件配置，甚至\
  \ Windows 是否是最佳平台。例如，如果您的新实例将支持托管在 Linux 上的 PHP Web 应用程序，那么也许您的实例也应该托管在 Linux 上？而所有这些甚至是在您开始考虑可能需要安装哪些\
  \ SQL Server 功能来支持应用程序之前。\n\n本章将指导您在规划部署时应做出的关键决策。如果您决定在 Windows Server 上托管实例，您还将学习如何执行一些基本的操作系统配置。本章还将概述您可以选择安装的主要功能，并讨论为何选择适当的功能很重要。\n\
  \n\n\n### 版本与许可模型\n\n选择 SQL Server 2019 的版本以支持你的数据层应用，听起来可能是一项简单的任务，但实际上，你应该花时间仔细考虑这个决定，并与业务相关人员及其他\
  \ IT 部门协商，将他们的意见纳入决策中。首先要考虑的是 SQL Server 有五个版本。这些版本不仅在功能级别上有所不同，而且在许可考量方面也存在差异。此外，从运营支持的角度来看，你可能会发现，如果允许数据层应用托管在你的环境中未进行战略性部署的\
  \ SQL Server 版本上，那么该环境的`TCO`（总体拥有成本）就会增加。\n\n关于功能和许可考量的详细讨论超出了本书的范围；不过，表 1-1 详细列出了\
  \ SQL Server 各个版本可用的许可模式，而表 1-2 则概述了每个版本的主要用途。\n\n表 1-1: `SQL Server 版本许可模式`\n\n\
  | 版本 | 许可模式 | 说明 |\n| --- | --- | --- |\n| 企业版 | 按处理器核心许可 | – |\n| 标准版 | • 按处理器核心许可\
  \ • `服务器 + 客户端访问许可证` | – |\n| Web 版 | 仅限第三方托管 | – |\n| 开发者版 | 免费用于非商业用途 | 不得用于生产环境\
  \ |\n| Express 版 | SQL Server 的免费版本 | 功能有限且容量上限较小，例如数据库大小上限为 10GB、内存限制为 1GB、CPU\
  \ 限制为单路或四核 |\n\n`CAL` 是客户端访问许可证，其中客户端可以指用户或设备。你可以根据哪种方式对你的环境成本更低，来选择购买用户 CAL 或设备\
  \ CAL。\n\n例如，如果你的组织有一台支持呼叫中心的 SQL Server，该中心有 100 台计算机，并且 24/7 运行，分为三个 8 小时轮班，那么你将有\
  \ 100 台设备和 300 名用户，因此设备`CAL`将是你最明智的选择。\n\n另一方面，如果你的组织有一台支持 25 人销售团队的 SQL Server，这些人员不仅通过笔记本电脑，还通过\
  \ iPad 连接到销售应用，那么你将有 25 名用户和 50 台设备，因此选择用户`CAL`会是更明智的选项。\n\n总结来说，如果你的用户数量多于设备数量，则应选择设备`CAL`。反之，如果你的设备数量多于用户数量，则应选择用户`CAL`。微软还提供了一个名为\
  \ SQL Server 评估和规划 (`MAP`) 工具包的工具，可帮助你规划许可需求。`MAP` 工具包可从 `www.microsoft.com/en-gb/download/details.aspx?id=7826`\
  \ 下载。\n\n表 1-2: `SQL Server 版本概览`\n\n| 版本 | 版本概览 |\n| --- | --- |\n| 企业版 | SQL Server\
  \ 的全功能版本，适用于企业系统和关键应用 |\n| 标准版 | 核心数据库和`BI`（商业智能）功能，面向部门级系统和非关键应用 |\n| Web 版 | 仅适用于托管使用\
  \ SQL Server 的公共网站的服务提供商 |\n| 开发者版 | 全功能版本，与企业版功能级别相同，但仅供开发使用，不允许在生产系统上使用 |\n| Express\
  \ 版 | SQL Server 的免费入门级版本，面向具有本地数据需求的小型应用 |\n\n你选择在企业应用中支持的 SQL Server 版本将取决于项目需求、组织要求和底层基础设施。例如，如果你的组织在其私有云中托管整个\
  \ SQL Server 环境，那么你可能只会支持企业版，因为你将对底层基础设施进行许可。\n\n或者，如果你的组织主要使用物理服务器，那么你很可能需要支持混合的\
  \ SQL Server 版本，例如企业版和标准版。这将为项目提供灵活性，如果它们只需要功能的子集且不期望高负载工作量，从而可以接受标准版对`RAM`和`CPU`施加的限制，进而降低成本。\n\
  \n在选择使用哪个版本之前，你应该考虑的下一件事是是否使用`Windows Server Core`安装 SQL Server。在`Server Core`上安装可以通过减少服务器的受攻击面来帮助提高安全性。`Server\
  \ Core`是最小化安装，因此受攻击面更小，安全漏洞也更少。它还可以提高性能，因为你没有`GUI`（图形用户界面）的开销，并且许多资源密集型应用无法安装。如果你决定使用`Server\
  \ Core`，那么了解这样做的各种影响也很重要。\n\n从 SQL Server 的角度来看，以下功能无法使用：\n\n-   Reporting Services\n\
  -   `SQL Server Data Tools (SSDT)`\n-   Client Tools Backward Compatibility\n- \
  \  Client Tools SDK\n-   `SQL Server Books Online`\n-   Distributed Replay Controller\n\
  -   `Master Data Services (MDS)`\n-   `Data Quality Services (DQS)`\n\n以下功能可以使用，但只能从远程服务器使用：\n\
  \n-   Management Tools\n-   Distributed Replay Client\n\n从更广泛的运营支持角度来看，你需要确保所有的运营团队（DBA、Windows\
  \ 运维等）都能够支持`Server Core`。例如，如果你的 DBA 团队严重依赖某个第三方图形工具来分析执行计划，这个工具是否需要安装在服务器本地？是否有可以满足他们需求的替代工具？从\
  \ Windows 运维的角度来看，团队是否拥有用于远程监控和管理服务器的工具？他们是否依赖任何需要被替换的第三方工具？\n\n你还应该考虑你的运营团队是否具备主要使用命令行流程来管理系统的技能。如果没有，那么你应该考虑可能需要哪些培训或技能提升。\n\
  \n### 硬件考量\n\n在规划服务器的硬件需求时，理想情况下，你应该实施一次完整的容量规划，以便能够估算服务器将要支持的应用程序的硬件需求。在进行此项工作时，请确保考虑到你公司标准的硬件生命周期，而不是仅仅为当前规划。根据你的组织情况，这可能在\
  \ 1 到 5 年之间，但通常会是 3 年。\n\n这对于避免服务器配置不足或过度配置非常重要。项目团队通常希望过度配置其服务器以确保性能。这种方法不仅在企业范围内扩展时成本高昂，而且在某些环境中，实际上可能对性能产生不利影响。例如，一个具有共享资源的私有云基础设施就是这种情况。在这种情况下，过度配置服务器可能对整个环境（包括被过度配置的服务器本身）产生负面影响。\n\
  \n\n\n#### 指定战略性最低要求\n\n在为您的环境指定 SQL Server 的最低硬件要求时，您可以选择指定安装 SQL Server 的最低要求——`4GB`\
  \ 内存和单个 `2GHz` CPU（基于企业版）。然而，您可能更需要考虑企业内的运营可支持性。\n\n例如，如果您的环境主要由私有云基础设施组成，那么您可能希望指定最低\
  \ `2 个虚拟核心` 和 `4GB 内存 +（核心数 ∗ 1GB）`，因为这可能符合您的企业标准。\n\n另一方面，如果您有一个高度分散、自然成长的企业，并且您希望帮助说服项目使用共享的\
  \ SQL Server 场，您可能会选择强制执行更高的最低规格，例如 `32GB 内存` 和 `2 插槽/4 核心`。这里的理由是，任何没有大吞吐量需求的项目都会被“强制”使用您的共享场，以避免与不必要的庞大系统相关的高昂成本。\n\
  \n#### 存储\n\n存储是任何 SQL Server 安装的一个非常重要的考虑因素。以下部分将讨论本地连接存储和 SAN（存储区域网络）存储，以及文件放置的考虑因素。\n\
  \n##### 本地连接存储\n\n如果您的服务器将使用本地连接存储，那么您应该仔细考虑文件布局。从本质上讲，SQL Server 通常受到输入/输出（`IO`）的限制，因此，配置\
  \ `IO` 子系统是性能的关键方面之一。您首先需要将用户数据库的数据文件和日志文件分离到不同的磁盘或阵列上，并且还要分离使用最频繁的系统数据库 `TempDB`。如果所有这些文件都驻留在单个卷上，那么当\
  \ SQL Server 试图同时写入所有文件时，您很可能会遇到磁盘争用。\n\n通常，本地连接存储会以 `RAID`（独立磁盘冗余阵列）阵列的形式呈现给您的服务器，并且有各种\
  \ `RAID` 级别可供选择。有许多 `RAID` 级别可用，但最常见的在以下部分中概述，并附有它们的优缺点。希望这将帮助您选择最合适的 `RAID` 级别，在性能和容错能力之间实现最佳平衡。\n\
  \n###### RAID 0\n\n一个 `RAID 0` 卷由两个到 `n` 个主轴组成，数据位被条带化分布在阵列中的所有磁盘上。这提供了出色的性能；然而，它不提供容错能力。阵列中任何磁盘的丢失都意味着整个阵列将失败。如图\
  \ 1-1 所示。\n\n![../images/333037_2_En_1_Chapter/333037_2_En_1_Fig1_HTML.jpg](img/333037_2_En_1_Fig1_HTML.jpg)\n\
  \n*图 1-1：RAID 0 阵列不提供冗余*\n\n#### 注意\n\n由于 `RAID 0` 不提供冗余，因此不应用于生产系统。\n\n###### RAID\
  \ 1\n\n一个 `RAID 1` 卷将由两个主轴组成，作为镜像对一起工作。这在一个主轴发生故障时提供了冗余，但这是以牺牲写入性能为代价的，因为对卷的每次写入都需要执行两次。这种冗余方法如图\
  \ 1-2 所示。\n\n![../images/333037_2_En_1_Chapter/333037_2_En_1_Fig2_HTML.jpg](img/333037_2_En_1_Fig2_HTML.jpg)\n\
  \n*图 1-2：RAID 1 通过镜像磁盘提供冗余*\n\n#### 注意\n\n计算 `RAID 1` 阵列总 `IOPS`（每秒输入/输出操作数）的公式如下：`IOPS\
  \ = 读取次数 + (写入次数 * 2)`。\n\n###### RAID 5\n\n一个 `RAID 5` 卷将由三个到 `n` 个主轴组成，并提供阵列中恰好一个磁盘的冗余。因为数据块被条带化分布在多个主轴上，卷的读取性能会非常好，但同样，这是以牺牲写入性能为代价的。写入性能受到损害，因为冗余是通过将奇偶校验位分布在阵列中的所有主轴上来实现的。这意味着对卷的每一次写入都会有四次写入的性能损失。这与阵列中的磁盘数量无关。这种固定损失的原因是奇偶校验位与数据以相同的方式条带化。控制器将读取原始数据和原始奇偶校验，然后写入新数据和新的奇偶校验，而无需读取阵列中的所有其他磁盘。这种冗余方法如图\
  \ 1-3 所示。\n\n然而，值得注意的是，如果阵列中的一个主轴发生故障，性能将明显下降。同样值得注意的是，从其对等盘包含的奇偶校验位重建磁盘可能需要相当长的时间，尤其是对于大容量的磁盘。\n\
  \n![../images/333037_2_En_1_Chapter/333037_2_En_1_Fig3_HTML.jpg](img/333037_2_En_1_Fig3_HTML.jpg)\n\
  \n*图 1-3：RAID 5 通过奇偶校验位提供冗余*\n\n#### 注意\n\n计算 `RAID 5` 阵列总 `IOPS` 的公式如下：`IOPS =\
  \ 读取次数 + (写入次数 * 4)`。要计算每个主轴的预期 `IOPS`，您可以将此 `IOPS` 值除以阵列中的磁盘数量。这可以帮助您计算为实现性能目标，阵列中应有的最小磁盘数量。\n\
  \n###### RAID 10\n\n一个 `RAID 10` 卷将由四到 `n` 个磁盘组成，但它始终是一个偶数。它提供了冗余和性能的最佳组合。它的工作原理是创建一个镜像条带。位被条带化（没有奇偶校验）分布在阵列中一半的磁盘上，就像\
  \ `RAID 0` 一样，但然后它们被镜像到阵列中的另一半磁盘上。\n\n这被称为嵌套或混合 `RAID` 级别，这意味着只要没有故障的磁盘在同一个镜像对中，阵列中一半的磁盘可以丢失。如图\
  \ 1-4 所示。\n\n![../images/333037_2_En_1_Chapter/333037_2_En_1_Fig4_HTML.jpg](img/333037_2_En_1_Fig4_HTML.jpg)\n\
  \n*图 1-4：RAID 10 通过镜像条带内的每个磁盘提供冗余*\n\n#### 注意\n\n计算 `RAID 10` 阵列总 `IOPS` 的公式如下：`IOPS\
  \ = 读取次数 + (写入次数 * 2)`。与 `RAID 5` 类似，为了计算每个主轴的预期 `IOPS`，您可以将 `IOPS` 值除以阵列中的磁盘数量。这可以帮助您计算为实现性能目标，阵列中应有的最小磁盘数量。\n\
  \n\n\n###### 文件放置\n\n普遍认为，`RAID 0` 不应用于任何 `SQL Server` 文件。我知道有些人建议 `RAID 0` 可能适用于\
  \ `TempDB` 文件。其理由是，频繁使用的 `TempDB` 通常需要非常快的性能，而且由于它在每次实例重启时都会重新创建，因此不需要冗余。这听起来完全合理，但如果你从正常运行时间的角度考虑，可能就会明白我为何不同意这个观点。\n\
  \n你的 `SQL Server` 实例需要 `TempDB` 才能运行。如果你丢失了 `TempDB`，那么你的实例就会宕机，如果 `TempDB` 无法重新创建，你将无法使实例恢复运行。因此，如果你将\
  \ `TempDB` 托管在 `RAID 0` 阵列上，而该阵列中的一个磁盘发生故障，你将无法使实例恢复运行，直到你完成以下操作之一：\n\n1.  等待存储团队将\
  \ `RAID 0` 阵列恢复上线。\n2.  以“最小配置模式”启动实例，并使用 `SQLCMD` 更改 `TempDB` 的位置。\n\n到完成这些步骤中的任何一个时，你可能会发现利益相关者已经急得跳脚了，因此你可能会发现最好避免这个选项。为此，`TempDB`\
  \ 通常最好尽可能放置在 `RAID 10` 阵列上。这将为数据库提供最佳的性能水平，而且由于其大小远小于用户数据库文件，因此成本影响没有那么大。\n\n在理想的世界里，资金不是问题，用户数据库的数据文件将存储在\
  \ `RAID 10` 阵列上，因为 `RAID 10` 提供了冗余性和性能的最佳组合。然而，在现实世界中，如果你支持的应用程序并非关键任务，这可能就不合理了。如果是这种情况，那么\
  \ `RAID 5` 可能是一个不错的选择，前提是你的应用程序具有相当高的读写比。我通常以读操作三倍于写操作作为良好的基准，当然，这在每个场景中可能有所不同。\n\
  \n如果你的数据库仅使用 `SQL Server` 的基本功能，那么你可能会发现 `RAID 1` 是日志文件的一个好选择。`RAID 5` 通常不适合，因为事务日志具有写入密集型的性质。在某些情况下，我甚至发现\
  \ `RAID 1` 对于事务日志的性能优于 `RAID 10`。这是因为写入活动的顺序性质。\n\n然而，`SQL Server` 的某些功能可能会从事务日志产生大量的读取活动。如果是这种情况，那么你可能会发现你的事务日志以及数据文件都需要\
  \ `RAID 10`。导致事务日志读取的功能包括：\n\n*   AlwaysOn 可用性组\n*   数据库镜像\n*   快照创建\n*   备份\n*\
  \   `DBCC CHECKDB`\n*   变更数据捕获\n*   日志传送（包括备份，以及使用 `WITH STANDBY` 还原日志时）\n\n######\
  \ 固态硬盘 (SSD)\n\n使用本地连接存储而非存储区域网络 (`SAN`) 的一个常见原因，是为了优化 `SQL Server` 组件中需要极快速 `IO`\
  \ 的性能。这些组件包括 `TempDB` 和缓冲池扩展。数据库的数据文件和日志文件存储在 `SAN` 上，而 `TempDB` 和缓冲池扩展存储在本地连接存储上，这种情况并不少见。\n\
  \n在这个例子中，在本地连接阵列中使用 `SSD` 是很有意义的。固态硬盘 (`SSD`) 可以提供非常高的 `IO` 速率，但与传统磁盘相比成本更高。`SSD`\
  \ 也不是“万能药”。尽管它们为随机磁盘访问提供了非常高的 `IOPS`，但对于某些数据库工作负载配置文件（如数据仓库）中常见的顺序扫描活动，效率可能较低。`SSD`\
  \ 也容易发生突然故障，而不像传统磁盘那样逐渐老化。因此，在阵列中配置容错 `RAID` 级别和热备盘是一个非常好的主意。\n\n###### 使用 SAN\n\
  \n存储区域网络这三个词可能会让数据库管理员 (`DBA`) 心生畏惧。现代的 `DBA` 必须接受诸如 `SAN` 和虚拟化等概念；然而，尽管它们带来了根本性的变化，但也简化了环境的总体管理并降低了总拥有成本\
  \ (`TCO`)。\n\n`DBA` 关于 `SAN` 最需要记住的是，它改变了 `IO` 子系统的基本原则，`DBA` 必须相应地调整他们的思维。例如，在本地连接存储的世界里，最基本的原则是分离你的数据文件、日志文件和\
  \ `TempDB`，并确保它们都托管在最合适的 `RAID` 级别上。\n\n然而，在 `SAN` 的世界里，你最初可能会惊讶地发现你的 `SAN` 管理员不提供\
  \ `RAID` 级别的选择，即使提供，也可能不提供 `RAID 10`。如果你发现情况如此，很可能是因为 `SAN` 在后台实际上是将数据条带化跨越阵列中的每个磁盘。这意味着尽管\
  \ `RAID` 级别仍然可能对吞吐量产生一些影响，但更重要的考虑是选择哪个存储层级。\n\n许多组织选择在他们的 `SAN` 上对存储进行分层，提供三个或更多层级。第\
  \ 1 层将是最顶层，很可能由 `SSD` 和小型、高性能的光纤通道驱动器组合而成。第 2 层通常由更大的驱动器组成——可能是 `SATA`（串行高级技术附件）——第\
  \ 3 层通常使用近线存储。近线存储由大量廉价的磁盘组成，例如通常处于停止状态的 `SATA` 磁盘。只有当需要访问它们包含的数据时，磁盘才会旋转启动。正如你可能已经猜到的，你需要确保任何需要良好性能的应用程序都必须位于\
  \ `SAN` 的第 1 层。第 2 层可能适用于小型、很少使用、并发很少或没有的数据库，而第 3 层应该很少（甚至从不）用于存储 `SQL Server` 数据库或日志。\n\
  \n你的实际吞吐量将由这些因素以及许多其他因素决定，例如服务器与 `SAN` 之间的网络路径数量、同时访问 `SAN` 的服务器数量等等。`SAN` 的另一个有趣之处在于，你经常会发现你的写入性能远远优于读取性能。这是因为一些\
  \ `SAN` 使用电池支持的写入缓存，但在读取时，它们需要从主轴检索数据。\n\n接下来要考虑的是，由于你的所有数据很可能都条带化分布在阵列的所有主轴上——即使不是这样，单个服务器上的所有文件也很可能都位于同一个\
  \ `CPG`（通用配置组）上——你不应该期望通过分离数据、日志和 `TempDB` 文件来立即看到性能提升。然而，许多 `DBA` 仍然选择将他们的数据、日志和\
  \ `TempDB` 文件放在单独的卷上，以实现逻辑分离并与使用本地连接存储的其他服务器保持一致。然而，在某些情况下，如果你使用 `SAN` 快照或 `SAN`\
  \ 复制实现冗余，你可能需要将数据库的数据文件和日志文件放在同一个卷上。你应该与你的存储团队确认这一点。\n\n\n##### 磁盘块大小\n\n配置磁盘时（无论是本地连接还是\
  \ SAN 上的磁盘），另一个需要考虑的因素是磁盘块大小。根据你的存储情况，默认的 NTFS（新技术文件系统）分配单元大小很可能被设置为 4KB。问题在于，SQL\
  \ Server 将数据组织为八个连续的 8KB 页面，称为一个`区`。为了获得 SQL Server 的最佳性能，托管数据、日志和 TempDB 的卷的块大小应该与此对齐，并设置为\
  \ 64KB。\n\n你可以通过运行清单 1-1 中的 Windows PowerShell 脚本来检查磁盘块大小，该脚本使用`fsutil`来收集卷的 NTFS\
  \ 属性。脚本假定`f:`是你希望确定其块大小的卷。请务必将此更改为你希望检查的驱动器盘符。同时确保以管理员身份运行该脚本。\n\n```\n##### 填入你要检查的驱动器盘符\n\
  $drive = \"f:\"\n##### 初始化输出对象\n$outputarray = new-object PSObject\n$outputarray\
  \ | add-member NoteProperty Drive $drive\n##### 初始化输出\n$output = (fsutil fsinfo\
  \ ntfsinfo $drive)\n##### 将 fsutil 的每一行拆分为单独的数组值\nforeach ($line in $output) {\n\
  \    $info = $line.split(':')\n    $outputarray | add-member NoteProperty $info[0].trim().Replace('\
  \ ','_') $info[1].trim()\n    $info = $null\n}\n##### 格式化并显示结果\n$results = 'Disk\
  \ Block Size for ' + $drive + ' ' + $outputarray.Bytes_Per_Cluster/1024 + 'KB'\n\
  $results\nListing 1-1\n确定磁盘块大小\n```\n\n### 操作系统考虑因素\n\nSQL Server 支持许多操作系统，包括多个版本的\
  \ Windows。然而，你很可能不希望允许在支持的任何操作系统版本上安装 SQL Server。例如，在你的 Windows 环境中，建议将特定版本的 SQL\
  \ Server 与特定版本的 Windows 对齐。这会带来两个好处。\n\n首先，这极大地减少了你为验收构建所需的测试工作量。例如，假设你决定只允许在你的环境中使用企业版。理论上，你仍然需要对十几个\
  \ Windows 版本进行操作验收。相反，如果你同时允许 SQL Server 企业版和标准版，但都将这两个版本与 Windows Server 2019 标准版对齐，那么你只需要为你支持的每个\
  \ SQL Server 版本进行一次验收。\n\n第二个好处与平台的生命周期结束（EOL）相关。如果你允许 SQL Server 2017 安装在 Windows\
  \ Server 2012 上，Windows 的主流支持结束日期是 2015 年 1 月，而 SQL Server 是 2021 年 7 月。往好了说，这会在你升级\
  \ Windows 时导致复杂性和停机；往坏了说，可能会导致本可避免的扩展支持成本。\n\n### 配置操作系统\n\n你的 Windows 管理团队是否有针对\
  \ Windows Server 2019 的“黄金构建”？即使他们有，这个构建是针对 SQL Server 优化的吗？除非他们专门为托管 SQL Server\
  \ 制作了一个单独的构建，否则很可能没有。你需要的确切定制取决于 Windows 构建的配置方式、你的环境要求以及你的服务器将托管的数据层应用程序的要求。以下部分重点介绍了一些通常需要的更改。\n\
  \n#### 注意\n\n*黄金构建*是操作系统的预定义模板，可以轻松安装到新服务器上，以减少部署时间并确保一致性。\n\n#### 设置电源计划\n\n将你的服务器设置为使用高性能电源计划非常重要。这是因为如果使用平衡电源计划，那么在空闲期间你的\
  \ CPU 可能会被限制。当服务器活动再次开始时，你可能会遇到性能问题。\n\n你可以通过 Windows GUI 设置电源计划：打开控制面板中的“电源选项”控制台并选择“高性能”；或者你也可以使用\
  \ PowerShell/命令行。清单 1-2 通过将高性能电源计划的 GUID 作为`powercfg`可执行文件的`-setactive`参数的值传入来说明了这一点。\n\
  \n```\npowercfg -setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c\nListing 1-2\n使用\
  \ PowerShell 设置高性能电源计划\n```\n\n#### 优化后台服务\n\n确保你的服务器配置为优先考虑后台服务而非前台应用程序是良好实践。在实践中，这意味着\
  \ Windows 将调整其上下文切换算法，允许后台服务（包括 SQL Server 使用的那些）在处理器上拥有比前台应用程序更多的时间。\n\n要确保“优化后台服务”已开启，进入控制面板的“系统”控制台，选择“高级系统设置”。在“系统属性”对话框中，选择“性能”部分内的“设置”。\n\
  \n优化后台服务也可以通过使用 PowerShell 来设置。清单 1-3 演示了使用 set-property 命令更新注册表中的`Win32PrioritySeperation`键。该脚本必须以管理员身份运行。\n\
  \n```\nSet-ItemProperty -path HKLM:\\SYSTEM\\CurrentControlSet\\Control\\PriorityControl\
  \ -name Win32PrioritySeparation -Type DWORD -Value 24\nListing 1-3\n使用 PowerShell\
  \ 设置“优化后台服务”\n```\n\n#### 分配用户权限\n\n根据你希望使用的 SQL Server 功能，你可能需要为运行 SQL Server 服务的服务账户授予用户权限分配。这些分配允许安全主体在计算机上执行任务。对于\
  \ SQL Server 服务账户而言，它们为那些与操作系统交互的功能提供了启用某些 SQL Server 功能的权限。以下将讨论三个最常见的用户权限分配，这些权限在安装期间不会自动授予服务账户。\n\
  \n##### 初始化即时文件\n\n默认情况下，当你创建或扩展文件时，该文件会被填充为 0。这个过程被称为“清零”文件，它会覆盖先前占用同一磁盘空间的任何数据。这样做的问题在于它可能需要一些时间，特别是对于大文件。\n\
  \n然而，可以覆盖此行为，使文件不清零。这会引入一个非常小的安全风险，即理论上仍然可以发现先前存在于该磁盘位置的数据，但这个风险如此之小，通常认为其远小于带来的性能收益。\n\
  \n为了使用即时文件初始化，必须向运行 SQL Server 数据库引擎的服务账户授予“执行卷维护任务”用户权限分配。一旦授予，SQL Server 将自动使用即时文件初始化。无需其他配置。\n\
  \n要通过 Windows GUI 授予该分配，从控制面板 ➤ 系统和安全 ➤ 管理工具中打开“本地安全策略”，然后依次展开“本地策略” ➤ “用户权限分配”。这将显示完整的分配列表。向下滚动直到找到“执行卷维护任务”。如图\
  \ 1-5 所示。\n\n![../images/333037_2_En_1_Chapter/333037_2_En_1_Fig5_HTML.jpg](img/333037_2_En_1_Fig5_HTML.jpg)\n\
  \n图 1-5 本地安全策略\n\n右键单击该分配并进入其属性，将允许你添加你的服务账户。\n\n\n##### 在内存中锁定页面\n\n如果 Windows\
  \ 遇到内存压力，它会尝试将数据页从 RAM 分页到磁盘上的虚拟内存。这可能会在 SQL Server 内引发问题。为了提供可接受的性能，SQL Server\
  \ 会将最近使用的数据页缓存在缓冲区缓存中，这是由 `数据库引擎` 保留的内存区域。实际上，所有数据页都是从缓冲区缓存中读取的，即使它们需要先从磁盘读取。如果\
  \ Windows 决定将页面从缓冲区缓存移出到磁盘，你的实例性能将受到严重影响。\n\n为了避免这种情况的发生，只要使用的是 SQL Server 2019\
  \ 企业版或标准版，就可以将缓冲区缓存的页面锁定在内存中。为此，你只需使用与授予 `执行卷维护任务` 权限相同的方法，授予运行 `数据库引擎` 的服务账户 `在内存中锁定页面`\
  \ 的权限。\n\n#### 注意\n\n如果你在虚拟机上安装 SQL Server，根据虚拟平台的配置，你可能无法设置 `在内存中锁定页面`，因为它可能会干扰气球驱动程序。气球驱动程序是虚拟化平台用来从客户操作系统回收内存的。你应该与你的虚拟平台管理员讨论此事。\n\
  \n##### SQL 审核到事件日志\n\n如果你计划使用 `SQL 审核` 来捕获实例内的活动，你可以选择将生成的事件保存到文件、安全日志或应用程序日志。如果你的企业有高安全性要求，安全日志将是最合适的位置。\n\
  \n为了允许将生成的事件写入安全日志，必须授予运行 `数据库引擎` 的服务账户 `生成安全审核` 的用户权限分配。这可以通过 `本地安全策略` 控制台实现。\n\
  \n另一个必要的步骤是，为了使 SQL Server 能够将审核事件写入安全日志，需要配置 `审核应用程序生成的` 设置。这可以在 `本地安全策略` 控制台中找到，路径是：`高级审核策略配置`\
  \ ➤ `系统审核策略` ➤ `对象访问`。然后，可以如图 1-6 所示，修改 `审核应用程序生成的` 事件的属性。\n\n![../images/333037_2_En_1_Chapter/333037_2_En_1_Fig6_HTML.jpg](img/333037_2_En_1_Fig6_HTML.jpg)\n\
  \n图 1-6\n\n审核应用程序生成的属性\n\n#### 注意\n\n你需要确保你的策略没有被 `组策略对象` 级别实施的策略覆盖。如果是这种情况，你应该要求你的\
  \ `AD`（活动目录）管理员将你的服务器移动到具有限制性较弱策略的单独 `OU`（组织单位）中。\n\n### 选择功能\n\n在安装 SQL Server\
  \ 时，可能会诱人安装所有功能，以备将来不时之需。然而，为了你的环境的性能、可管理性和安全性，你应该始终遵循 `YAGNI`（你不会需要它）原则。`YAGNI`\
  \ 原则源于极限编程方法学，但它同样适用于该平台。其前提是做最简单且能工作的事情。这将使你免于复杂性相关的问题。请记住，额外的功能可以在以后安装。以下各节概述了在安装\
  \ SQL Server 2019 企业版时可以选择的主要功能。\n\n#### 数据库引擎服务\n\n`数据库引擎` 是 SQL Server 套件中的核心服务。它包含\
  \ `SQLOS`（数据库引擎中负责内存管理、调度、锁和死锁管理等任务的部分）、`存储引擎` 和 `关系引擎`，如图 1-7 所示。它负责保护、处理和优化对关系数据的访问。它还包含可选择安装的复制组件、数据库内机器学习服务、用于搜索的全文和语义提取、`Polybase`\
  \ 查询服务和 `DQS` 服务器功能。复制是一组允许你分散数据的工具。数据库内机器学习服务提供 `Python` 和 `R` 集成；语义提取允许你使用全文来搜索词语的含义，而不仅仅是关键字本身。`Polybase`\
  \ 查询服务允许你针对 `Hadoop` 数据源运行 `T-SQL`。`DQS` 服务器是一个工具，可让你轻松查找和清理不一致的数据。本书主要关注核心的 `数据库引擎`\
  \ 功能。\n\n![../images/333037_2_En_1_Chapter/333037_2_En_1_Fig7_HTML.jpg](img/333037_2_En_1_Fig7_HTML.jpg)\n\
  \n图 1-7\n\n数据库引擎架构\n\n#### 分析服务\n\n`SSAS`（SQL Server 分析服务）是一组可用于数据分析和处理与数据挖掘的工具。它可以通过以下三种模式之一安装：\n\
  \n*   多维和数据挖掘\n\n*   表格\n\n*   用于 SharePoint 的 PowerPivot\n\n多维和数据挖掘模式将提供托管多维数据集的能力。数据集聚合数据（称为\
  \ *度量值*）并存储，可以跨多个维度进行切片和切块，并提供响应迅速、直观且复杂的报告和数据透视表的基础。开发人员可以使用多维表达式（`MDX`）语言查询数据集。\n\
  \n表格模式使用户能够以 Microsoft 的 BI 语义模型托管数据。该模型使用 `xVelocity` 提供内存中分析功能，实现关系和非关系数据源之间的集成，并提供\
  \ `KPI`（关键绩效指标）、计算和多级层次结构。与使用维度和度量值不同，表格模型使用表、列和关系。\n\nPowerPivot 是 `Excel` 的一个扩展，与表格模型类似，它使用\
  \ `xVelocity` 执行内存中分析，可用于大小不超过 2GB 的数据集。`用于 SharePoint 的 PowerPivot` 安装在此基础上进行了扩展，它在\
  \ SharePoint 模式下运行 `分析服务`，提供服务器端处理以及基于浏览器与 PowerPivot 工作簿交互；它还通过 `SharePoint Excel\
  \ Services` 支持 `Power View` 报告和 `Excel` 工作簿。\n\n#### 机器学习服务器\n\n`机器学习服务器` 是一项为 `R`\
  \ 和 `Python` 语言提供支持的服务。它还提供了一套 `R` 包、`Python` 包、解释器和基础设施的组合，提供了创建数据科学和机器学习解决方案的能力。这些解决方案随后可以导入、探索和分析异构数据集。\n\
  \n#### 数据质量客户端\n\n如前所述，`数据质量服务器` 作为 `数据库引擎` 的可选组件安装。然而，`数据质量客户端` 可以作为共享功能安装。共享功能仅在服务器上安装一次，并由该机器上的所有\
  \ SQL Server 实例共享。该客户端是一个 `GUI`，允许你管理 `DQS` 以及执行数据匹配和数据清理活动。\n\n#### 客户端连接工具\n\n\
  `客户端连接工具` 是一套用于客户端/服务器通信的组件。这包括 `OLEDB`、`ODBC`、`ADODB` 和 `OLAP` 网络库。\n\n\n\n####\
  \ 集成服务\n\n集成服务是 SQL Server 随附的一个功能强大、基于图形界面的 ETL（提取、转换和加载）工具。从 SQL Server 2012 开始，集成服务被纳入数据库引擎。尽管如此，仍需安装集成服务选项才能使该功能正常工作，因为它包含了该功能所依赖的二进制文件。\n\
  \n集成服务包由一个*控制流*组成，负责管理和流程操作，包括批量插入、循环和事务。控制流还包含零个或多个数据流。*数据流*是一组数据源、转换和目标，它为合并、分散和转换数据提供了一个强大的框架。\n\
  \n集成服务可以在多台服务器上进行横向扩展，包含一个主服务器和 `n` 个工作服务器。因此，在 SQL Server 的较新版本中，您可以选择安装经典的、独立的集成服务，或者在服务器上安装横向扩展主服务器，或横向扩展工作服务器。\n\
  \n#### 客户端工具向后兼容性\n\n客户端工具向后兼容性为 SQL Server 已停止支持的功能提供支持。安装此功能将安装 SQL 分布式管理对象和决策支持对象。\n\
  \n#### 客户端工具 SDK\n\n安装客户端工具 SDK 将提供 `SMO（服务器管理对象）` 程序集。这允许您从 `.NET` 应用程序中以编程方式控制\
  \ SQL Server 和集成服务。\n\n#### 分布式重放控制器\n\n分布式重放是一项功能，允许您捕获跟踪信息，然后在另一台服务器上重放。这使您可以测试性能调优或软件升级的影响。如果您觉得这听起来像是您可能熟悉的\
  \ Profiler 中的某个功能，那么您是正确的，两者有部分重叠。然而，分布式重放具有以下优势：\n\n1.  分布式重放对资源的影响低于 Profiler，这意味着您正在跟踪的服务器在跟踪运行期间遭受性能问题的风险更低。\n\
  2.  分布式重放允许您从多台服务器（客户端）捕获工作负载，然后在单台主机上重放。\n\n在分布式重放拓扑中，您需要将一台服务器配置为控制器。正是控制器将针对客户端和目标服务器协调工作。\n\
  \n#### 分布式重放客户端\n\n如前所述，多个客户端服务器可以协同工作以创建将在目标服务器上重放的工作负载。分布式重放客户端应安装在您希望使用分布式重放捕获跟踪信息的任何服务器上。\n\
  \n#### SQL 客户端连接 SDK\n\n客户端连接 SDK 为 SQL Native Client 提供了一个 SDK 以支持应用程序开发。它还提供了其他接口，例如支持在客户端应用程序中进行堆栈跟踪。\n\
  \n#### 主数据服务\n\n主数据服务是用于管理企业内主数据的工具。它允许您对映射到业务实体的数据域进行建模，并通过层次结构、业务规则和数据版本控制来帮助您管理这些域。选择此功能时，将安装以下组件：\n\
  \n*   一个用于提供管理功能的 Web 控制台\n*   一个允许您配置 MDM 数据库和 Web 控制台的配置工具\n*   一个为开发人员提供可扩展性的\
  \ Web 服务\n*   一个用于创建新实体和属性的 Excel 插件\n\n#### 注意\n\n在 SQL Server 2016 及更高版本中，管理工具不包含在\
  \ SQL Server 安装介质中。要安装它们，您可以使用 SQL Server 安装中心“安装”页面上的 `安装 SQL Server 管理工具` 链接。在\
  \ SQL Server 2019 中，报表服务也不包含在安装介质中。可以使用 SQL Server 安装中心“安装”页面上的 `安装 SQL Server 报表服务`\
  \ 链接来安装它。\n\n### 总结\n\n规划部署可能是一项复杂的任务，需要与业务和技术利益相关者进行讨论，以确保您的平台将满足应用程序要求并最终满足业务需求。有许多因素需要考虑。\n\
  \n请确保考虑安装哪个版本的 SQL Server 是合适的，以及该版本的相关许可注意事项。在做出此决定时，您应考虑整个环境的整体可支持性，而不仅仅是特定应用程序的需求。您还应考虑\
  \ Azure 托管选项是否适合您的应用程序，或者甚至可能是涉及本地和云托管的混合方法。\n\n在规划部署时，请确保进行彻底的容量规划。同时考虑应用程序的硬件要求。您将需要多少\
  \ RAM 和多少个处理器内核是重要的考虑因素，但也许主要的考虑因素是存储。SQL Server 通常是一个 I/O 密集型应用程序，因此存储通常可能成为瓶颈。\n\
  \n您还应考虑操作系统的要求。这不应仅限于最合适的 Windows 版本，还应包括操作系统的配置。仅仅因为有一个 Windows 金牌镜像可用，这是否意味着它针对您的\
  \ SQL Server 安装进行了最优配置？\n\n最后，考虑应选择安装哪些功能。大多数应用程序只需要一小部分功能，通过仔细选择您需要的功能，您可以减少安装的安全足迹，同时降低管理开销。\n\
  \n"
- "# 2. GUI 安装\n\n您可以通过运行 SQL Server 的 `setup.exe` 应用程序来调用 SQL Server 安装中心。安装中心提供了许多实用程序，将帮助您安装实例；这些包括链接和工具，以帮助您规划部署、独立和群集安装功能，以及高级工具，这些工具将允许您使用配置文件或基于准备好的镜像来构建实例。\n\
  \n本章将概述安装中心提供的选项，然后指导您使用图形用户界面安装 SQL Server 的过程。它还将针对对实例的持续可支持性至关重要的决策提供实用的建议。\n\
  \n### 安装中心\n\nSQL Server 安装中心是与规划、安装和升级 SQL Server 实例相关的所有活动的一站式平台。当您运行 SQL Server\
  \ 安装介质时，首先看到的就是这个应用程序。安装中心由七个选项卡组成，以下部分将描述这些选项卡的内容。\n\n\n\n#### 规划选项卡\n\n规划选项卡如图\
  \ 2-1 所示，包含指向 MSDN（Microsoft Developer Network）页面的众多链接，这些页面为您提供关于 SQL Server 的重要文档，例如完整的硬件和软件要求以及\
  \ SQL Server 安全模型的文档。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig1_HTML.jpg](img/333037_2_En_2_Fig1_HTML.jpg)\n\
  图 2-1: 规划选项卡\n\n除了通过提供的链接访问文档外，您还可以使用两个工具。第一个是 `System Configuration Checker`。此工具在安装过程中运行，以确定是否存在任何会阻止\
  \ SQL Server 安装的条件。这些检查包括确保服务器未配置为域控制器，以及检查 WMI（Windows Management Instrumentation）服务是否正在运行。在您开始安装\
  \ SQL Server 之前运行此工具，它可以预先警告您任何可能导致安装失败的问题，以便您在开始安装前进行修复。`System Configuration Checker`\
  \ 也可在安装中心的 `Tools` 选项卡上找到。\n\n第二个工具（或者更准确地说，是其下载页面的链接）是 `Data Migration Assistant`。此工具可用于在升级到\
  \ SQL Server 2019 时检测兼容性问题，并推荐性能和可靠性方面的增强功能。\n\n#### 安装选项卡\n\n如图 2-2 所示，安装中心的 `Installation`\
  \ 选项卡包含您将用于安装新的 SQL Server 实例、向现有实例添加新功能或从 SQL Server 2005、2008 或 2012 升级实例的工具。要安装独立的\
  \ SQL Server 实例，您应选择 `New SQL Server Stand-Alone Instance Or Add New Features To\
  \ An Existing Instance` 选项。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig2_HTML.jpg](img/333037_2_En_2_Fig2_HTML.jpg)\n\
  图 2-2: 安装选项卡\n\n除了安装独立实例、向实例添加新功能以及将现有实例升级到最新版本外，此屏幕上还有用于安装 SQL Server 故障转移群集实例以及向现有故障转移群集添加新节点的选项。*故障转移群集*\
  \ 是一个系统，其中 2 到 64 台服务器协同工作，以提供冗余并防止因一台或多台服务器停止功能而导致的故障。参与群集的每台服务器称为 *节点*。\n\n`SQL\
  \ Server Database Engine` 和 `SQL Server Analysis Services` 都是“群集感知”应用程序，这意味着它们可以安装在\
  \ Windows 群集上并利用其故障转移功能。当安装在故障转移群集上时，数据库和事务日志位于共享存储上，群集中的任何节点都可以使用该存储，但二进制文件则本地安装在每个节点上。\n\
  \n还有一些指向 SQL Server 组件下载页面的链接，这些组件不再随数据库安装介质一起提供。这些包括用于 T-SQL 和 BI 开发的工作室 `SQL Server\
  \ Data Tools`、用于 SQL Server 的管理和开发界面 `SQL Server Management Studio`，以及允许服务器托管和分发报表的\
  \ `SQL Server Reporting Services`。\n\n最后，此页面包含安装独立 `Machine Learning Server` 实例的选项。这不需要安装\
  \ SQL Server 实例，并提供对 R 和 Python 语言的支持。它还提供了一系列 R 包、Python 包、解释器和基础设施——从而提供了创建数据科学和机器学习解决方案的能力。这些解决方案随后可以导入、探索和分析异构数据集。\n\
  \n#### 维护选项卡\n\n`Maintenance` 选项卡包含用于执行版本升级、修复损坏的实例以及从群集中移除节点的工具；如图 2-3 所示，它还包含一个用于运行\
  \ Windows Update 的链接。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig3_HTML.jpg](img/333037_2_En_2_Fig3_HTML.jpg)\n\
  图 2-3: 维护选项卡\n\n您可以使用 `Edition Upgrade` 选项将现有的 SQL Server 2019 实例从一个版本升级到另一个版本；例如，您可能希望将一个安装为开发人员版的实例升级到企业版。\n\
  \n您可以使用 `Repair` 选项尝试解决 SQL Server 安装损坏的问题。例如，如果注册表项或二进制文件损坏导致实例无法启动，您可以使用此工具。\n\
  \n#### 提示\n\n如果 Master 数据库损坏并导致实例无法启动，此 `Repair` 选项将无济于事。在这种情况下，您应使用命令行或 PowerShell\
  \ 运行 `setup.exe`，并将 `ACTION` 参数设置为 `REBUILDDATABASE`。\n\n使用 `Remove Node From A\
  \ SQL Server Failover Cluster` 选项可从故障转移群集中的某个节点移除 SQL Server。您可以将此选项作为驱逐节点过程的一部分。不幸的是，安装中心没有卸载实例的功能。您必须通过控制面板来完成此操作。\n\
  \n不出所料，您可以使用 `Launch Windows Update To Search For Product Updates` 选项来启动 Windows\
  \ Update。然后，您可以选择安装可用于 SQL Server 的更新和修复程序。\n\n#### 工具选项卡\n\n`Tools` 选项卡包含一系列将帮助您安装\
  \ SQL Server 的工具，如图 2-4 所示。这包括我本章前面介绍的 `System Configuration Checker`；一个用于查找本地服务器上已安装的\
  \ SQL Server 组件的发现工具；以及 `Microsoft Assessment and Planning (MAP) tool`。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig4_HTML.jpg](img/333037_2_En_2_Fig4_HTML.jpg)\n\
  图 2-4: 工具选项卡\n\n选择 `Installed SQL Server Features Discovery Report` 选项可分析本地服务器并返回所有已安装的\
  \ SQL Server 功能和组件的列表。这将包括从 SQL Server 2005 开始的所有版本的功能。\n\n`Microsoft Assessment\
  \ And Planning (MAP) Toolkit For SQL Server` 选项将为您提供一个链接，您可以从该链接下载适用于 SQL Server\
  \ 的 MAP 工具。当您运行此工具时，它将在整个网络范围内搜索 SQL Server、Oracle 和 MySQL 安装。它将生成一份详细报告，对于 SQL\
  \ Server，将包括组件的名称、版本和版本。对于 Oracle，它将包括每个架构的大小和使用情况，包括迁移复杂性的估计。您还可以使用此工具来规划迁移和整合策略，以及审核整个企业范围内的许可要求。\n\
  \n#### 资源选项卡\n\n如图 2-5 所示，`Resources` 选项卡包含指向有关 SQL Server 的有用信息的链接。这包括指向 `SQL Server\
  \ Books Online`、`Developer Center` 和 `SQL Server product evaluation` 站点的链接。此外，在此选项卡上，您还会找到指向\
  \ Microsoft 隐私声明和完整 SQL Server 许可协议的链接。另一个非常有用的链接是指向 `CodePlex samples site` 的链接。从此站点，您可以下载\
  \ `WideWorldImporters` 数据库，该数据库将帮助您使用预创建的数据库来测试 SQL Server 的功能。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig5_HTML.jpg](img/333037_2_En_2_Fig5_HTML.jpg)\n\
  图 2-5: 资源选项卡\n\n\n\n#### 高级选项卡\n\n在**高级**选项卡上（如图 2-6 所示），可以找到用于执行 SQL Server 高级安装的工具，包括作为独立实例和作为集群的安装。这些工具包括\
  \ `Install Based On Configuration File`、`Advanced Cluster Preparation`、`Advanced\
  \ Cluster Completion`、`Image Preparation Of A Stand-Alone Instance Of SQL Server`\
  \ 和 `Image Completion Of A Stand-Alone Instance Of SQL Server`。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig6_HTML.jpg](img/333037_2_En_2_Fig6_HTML.jpg)\n\
  \n图 2-6\n\n高级选项卡\n\n安装 SQL Server 时，会自动创建一个配置文件。也可以手动创建此配置文件。然后，您可以使用此配置文件来安装具有相同配置的其他\
  \ SQL Server 实例。这对于在企业内推广一致性非常有用。创建此配置文件后，您可以使用 `Install Based On Configuration\
  \ File` 选项，基于预先创建的配置来安装更多实例。配置文件对于命令行安装也很有用，这将在第 3 章中讨论。此外，您还可以使用配置文件进行集群准备。\n\n\
  如果您希望使用配置文件进行集群准备，那么您应该选择**高级**选项卡上的 `Advanced Cluster Preparation` 选项，而不是通过**安装**选项卡上可用的\
  \ `New SQL Server Failover Cluster Installation` 和 `Add Node To A SQL Server Failover\
  \ Cluster` 向导来安装集群。您最初应在可以作为 SQL Server 实例的可能所有者的集群节点之一上运行此选项，系统将生成一个配置文件。随后在集群的所有其他可能所有者节点上运行\
  \ `Advanced Cluster Preparation` 向导，将导致使用该配置文件来确保整个集群安装的一致性。这种方法甚至适用于多子网集群（也称为地理集群），因为\
  \ SQL Server 会自动检测子网之间的关系，系统将提示您为每个子网选择一个 IP 地址。然后，安装程序将使用 OR 约束将每个 IP 地址作为依赖项添加到集群角色，其中每个节点不能是每个\
  \ IP 地址的可能所有者。或者，它将使用 AND 约束，其中每个节点可以是每个 IP 地址的可能所有者。\n\n在每个作为集群实例可能所有者的节点上运行 `Advanced\
  \ Cluster Preparation` 向导后，您可以运行 `Advanced Cluster Completion` 向导。您只需运行此向导一次，并且可以在任何可能所有者的节点上运行。此向导成功完成后，集群实例将完全正常运行。\n\
  \n`Image Preparation Of A Stand-Alone Instance Of SQL Server` 选项将使用 `Sysprep` 来安装\
  \ SQL Server 的“纯净”实例，该实例未配置账户、计算机或网络特定信息。它可以与 `Windows Sysprep` 结合使用，以构建带有已准备 SQL\
  \ Server 实例的完整 Windows 模板，然后用于在整个企业范围内进行部署。这有助于强制保持一致性。在 SQL Server 2019 中，`Sysprep`\
  \ 支持独立实例的所有功能；但是，不支持修复安装。这意味着如果在准备阶段或完成阶段的安装过程中失败，则必须卸载该实例。\n\n要完成已准备映像的安装，您可以使用\
  \ `Image Completion Of A Prepared Stand-Alone Instance Of SQL Server` 选项。此选项允许您通过输入账户、计算机和网络特定信息来完成实例的配置。\n\
  \n#### 选项选项卡\n\n如图 2-7 所示，SQL Server 安装中心的**选项**选项卡显示了您可以根据服务器中的处理器类型用于安装 SQL Server\
  \ 的处理器架构。它还允许您指定安装媒体的路径。如果您在服务器本地存储了媒体副本，这会很有用。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig7_HTML.jpg](img/333037_2_En_2_Fig7_HTML.jpg)\n\
  \n图 2-7\n\n选项选项卡\n\n### 安装独立数据库引擎实例\n\n如前一节所述，SQL Server 实例可以通过多种方式安装，包括通过命令行、结合使用\
  \ `Sysprep` 与高级安装和配置文件，或使用**安装**选项卡上的 `New SQL Server Stand-Alone Installation Or\
  \ Add Features To An Existing Installation` 选项。在下面的演示中，我们将使用最后一个选项来安装 SQL Server。在接下来的章节中，我们将安装一个包含将在本书中进一步详细研究的功能的数据库引擎实例，包括\
  \ `FILESTREAM` 和 `Distributed Replay`。我们还将深入探讨为实例选择正确的排序规则和服务账户。\n\n#### 准备步骤\n\n\
  当您选择安装新的 SQL Server 实例时，向导的第一个屏幕将提示您输入 SQL Server 的产品密钥，如图 2-8 所示。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig8_HTML.jpg](img/333037_2_En_2_Fig8_HTML.jpg)\n\
  \n图 2-8\n\n产品密钥页面\n\n如果在此屏幕上不输入产品密钥，您将只能安装 SQL Server 的 Express 版、Developer 版或 Evaluation\
  \ 版。Developer 版提供与 Enterprise 版相同级别的功能，但未授权用于生产环境。Evaluation 版具有与 Enterprise 版相同级别的功能，但会在\
  \ 180 天后过期。\n\n向导的下一个屏幕将要求您阅读并接受 SQL Server 的许可条款，如图 2-9 所示。此屏幕上提供的链接将为您提供有关 Microsoft\
  \ 隐私政策的更多详细信息。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig9_HTML.jpg](img/333037_2_En_2_Fig9_HTML.jpg)\n\
  \n图 2-9\n\n许可条款页面\n\n接受许可条款后，SQL Server 安装程序将运行规则检查以确保可以继续安装，如图 2-10 所示。这与您可以从 SQL\
  \ Server 安装中心的**计划**选项卡独立运行的配置检查相同，如本章前面所述。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig10_HTML.jpg](img/333037_2_En_2_Fig10_HTML.jpg)\n\
  \n图 2-10\n\n全局规则页面\n\n假设所有检查均成功通过，向导的屏幕（如图 2-11 所示）将提示您选择是否希望 `Microsoft Update`\
  \ 检查 SQL Server 补丁和 hotfix。此处的选择取决于您组织的修补策略。一些组织对补丁的测试和验收实施严格的修补方案，然后是修补周期，通常由 `WSUS\
  \ (Windows Server Update Services)` 等软件支持。如果您的组织中存在这样的方案，则不应选择此选项。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig11_HTML.jpg](img/333037_2_En_2_Fig11_HTML.jpg)\n\
  \n图 2-11\n\nMicrosoft Update 页面\n\n\n\n#### 注意\n\n仅当您的服务器尚未配置为接收 SQL Server 的产品更新时，此屏幕才会出现。\n\
  \n向导的下一个屏幕将尝试扫描 SQL Server 更新，以确保您在安装过程中安装了最新的 `CUs`（累积更新）和 `SPs`（服务包）。它将检查本地服务器上的\
  \ Microsoft 更新服务以获取这些更新，并列出任何可用的更新。这是流式安装功能的扩展，允许您通过指定更新位置，在安装基础二进制文件的同时安装更新，但此功能现已**已弃用**。产品更新页面也可以配置为在本地文件夹或网络位置中查找更新。此功能将在第\
  \ 3 章中详细讨论。\n\n#### 注意\n\n如果未找到产品更新，则不会出现此屏幕。\n\n随着安装程序进入向导的下一个页面（如图 2-12 所示），SQL\
  \ Server 安装所需文件的提取和安装开始，并显示进度。此屏幕还显示产品更新找到的任何更新包的下载和提取进度。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig12_HTML.jpg](img/333037_2_En_2_Fig12_HTML.jpg)\n\
  \n图 2-12：安装程序文件页面\n\n如图 2-13 所示，向导的下一个屏幕运行安装规则检查，并显示在安装开始前您可能需要解决的错误或警告。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig13_HTML.jpg](img/333037_2_En_2_Fig13_HTML.jpg)\n\
  \n图 2-13：安装规则页面\n\n在图 2-13 中，请注意显示的 Windows 防火墙警告。这不会阻止安装继续，但它会警告您服务器已开启 Windows\
  \ 防火墙。默认情况下，Windows 防火墙未配置为允许 SQL Server 流量，因此必须创建规则才能使客户端应用程序能够与您正在安装的实例通信。我们将在第\
  \ 5 章详细讨论 SQL Server 端口和防火墙配置。\n\n假设在继续之前未发现需要解决的错误，向导的下一页将允许您选择应安装的功能。这将在下一节详细讨论。\n\
  \n#### 功能选择页面\n\n安装向导的“功能选择”页面允许您选择要安装的选项。每个可用选项的概述可以在第 1 章中找到。功能选择页面如图 2-14 所示。\n\
  \n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig14_HTML.jpg](img/333037_2_En_2_Fig14_HTML.jpg)\n\
  \n图 2-14：功能选择页面\n\n我们将选择以下功能，因为它们将用于本书中的演示和讨论。\n\n*   数据库引擎服务\n    *   SQL Server\
  \ 复制\n*   客户端工具连接性\n*   分布式重放控制器\n*   分布式重放客户端\n\n此外，向导的此页面要求您指定实例根目录和共享功能目录的文件夹位置。您可能希望将这些位置移动到不同的驱动器，以便将\
  \ `C:\\` 驱动器留给操作系统。您可能出于空间原因或仅仅为了将 SQL Server 二进制文件与其他应用程序隔离而这样做。实例根目录通常将包含您在服务器上创建的每个实例的一个文件夹，并且数据库引擎、`SSAS`\
  \ 和 `SSRS` 安装将有单独的文件夹。与数据库引擎关联的文件夹将称为 `MSSQL15.[实例名称]`，其中实例名称是您的实例名称，对于默认实例则为 `MSSQLSERVER`。此文件夹名称中的数字\
  \ `15` 与 SQL Server 的版本相关，SQL Server 2019 对应为 `15`。此文件夹将包含一个名为 `MSSQL` 的子文件夹，该子文件夹又将包含与您的实例关联的文件所在的文件夹，包括一个名为\
  \ `Binn` 的文件夹（其中包含与您的实例关联的应用程序文件、应用程序扩展和 XML 配置）、一个名为 `Backup` 的文件夹（它将作为数据库备份的默认位置）以及一个名为\
  \ `Data` 的文件夹（它将是系统数据库的默认位置）。`TempDB`、用户数据库和备份的默认文件夹可以在安装过程的后期修改，并且如第 1 章所述，在许多环境中将这些数据库拆分到单独的卷中是一种良好实践。这里还将创建其他文件夹，包括一个名为\
  \ `LOGS` 的文件夹，它将是错误日志和默认扩展事件运行状况跟踪文件的默认位置。\n\n如果您在 64 位环境中安装 SQL Server，系统将要求您同时输入\
  \ 32 位和 64 位版本的共享功能目录的文件夹。这是因为某些 SQL Server 组件始终作为 32 位进程安装。32 位和 64 位组件不能共享目录，因此为了使安装继续，您必须为这些选项中的每一个指定不同的文件夹。共享功能目录成为所有\
  \ SQL Server 实例共享的功能（例如 `SDKs` 和管理工具）的根级目录。\n\n在向导的下一页（如图 2-15 所示），将执行额外的规则检查，以确保您选择的功能可以安装。\n\
  \n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig15_HTML.jpg](img/333037_2_En_2_Fig15_HTML.jpg)\n\
  \n图 2-15：功能规则页面\n\n检查的规则将根据您选择的功能而有所不同。\n\n\n### 实例配置页面\n\n规则检查成功完成后，安装向导的以下屏幕将允许您指定是要安装默认实例还是命名实例，如图\
  \ 2-16 所示。屏幕下半部分的框将为您提供服务器上已安装的任何其他实例或共享功能的详细信息。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig16_HTML.jpg](img/333037_2_En_2_Fig16_HTML.jpg)\n\
  \n图 2-16\n\n实例配置页面\n\n默认实例与命名实例的区别在于，默认实例使用其安装所在的服务器名称，而命名实例则被赋予一个扩展名称。这有一个明显的副作用：一个服务器上只能有一个\
  \ `SQL Server` 默认实例，但可以有多个命名实例。使用 `SQL Server 2019`，单个服务器最多可托管 50 个独立实例。当然，这些实例将共享服务器的物理资源。对于故障转移群集，如果您的数据托管在\
  \ `SMB` 文件共享上，此数字保持不变；但如果使用共享群集磁盘进行存储，则减少到 25 个。\n\n安装命名实例之前，并不需要先安装默认实例。服务器上只有命名实例而没有默认实例是一种完全有效的配置。许多\
  \ `DBA` 团队选择只在他们的环境中支持命名实例，以便能够在 `SQL Server` 层强制执行有意义的命名约定，而不是依赖构建服务器或虚拟机的基础设施团队所施加的命名约定。实例名称的最大长度为\
  \ 16 个字符。默认情况下，`InstanceID` 将设置为实例名称，对于默认实例则为 `MSSQLSERVER`。虽然可以更改此 `ID`，但这是一种不良做法，因为此\
  \ `ID` 用于标识注册表项和安装目录。\n\n### 选择服务帐户\n\n向导的下一个屏幕分为两个选项卡。第一个选项卡允许您为每个 `SQL Server`\
  \ 服务指定服务帐户，如图 2-17 所示，第二个选项卡允许您指定实例的排序规则。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig17_HTML.jpg](img/333037_2_En_2_Fig17_HTML.jpg)\n\
  \n图 2-17\n\n服务帐户配置页面\n\n`SQL Server 2019` 支持使用本地和域帐户、内置帐户、虚拟帐户、`MSAs`（托管服务帐户）和 `gMSAs`（组托管服务帐户）作为运行服务的安全上下文。您选择的服务帐户模型对您环境的安全性和可管理性都至关重要。\n\
  \n不同的组织对服务帐户模型有不同的要求，您可能会受到合规性要求和许多其他因素的限制。本质上，您所做的选择是在环境的安全性和操作支持性之间进行权衡。例如，`Microsoft`\
  \ 的最佳实践是为每个服务使用单独的服务帐户，并确保您环境中的每个服务器都使用一组离散的服务帐户，因为这完全强制执行了*最小权限原则*。*最小权限原则*规定，每个安全上下文将被授予执行其日常活动所需的最小权限集。\n\
  \n然而，在现实中，您会发现这种方法给您的 `SQL Server` 环境带来了显著的复杂性，并且可能增加操作支持的成本，同时在灾难场景中还可能增加停机窗口。另一方面，我也曾在服务帐户模型非常粗略的组织中工作过，以至于每个区域只有一组\
  \ `SQL Server` 服务帐户。这种方法也可能导致重大问题。假设您有一个大型环境，并且整个环境使用相同的服务帐户。再想象一下，您有一个合规性要求，需要每\
  \ 90 天更改一次服务帐户密码。这意味着您将同时导致整个 `SQL Server` 环境的停机。这根本不实际。\n\n这个问题没有绝对的对错答案，解决方案将取决于各个组织的需求和约束。然而，对于使用域帐户作为服务帐户的组织，我倾向于为每个数据层应用程序推荐一组不同的服务帐户。因此，想象一个环境，如图\
  \ 2-18 所示，您的数据层应用程序在主站点由一个双节点群集和一个 `ETL` 服务器组成，在辅助站点有两台灾备服务器，这种设计将涉及所有这些实例共用的一组服务帐户，但其他数据层应用程序不允许使用这些帐户，需要它们自己的一组。\n\
  \n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig18_HTML.jpg](img/333037_2_En_2_Fig18_HTML.jpg)\n\
  \n图 2-18\n\n按数据层应用程序划分的服务帐户模型\n\n当然，这种模型也带来了它自身的挑战。例如，如果您开始合并过程，就需要审查和修改此策略。由于围绕服务帐户管理的挑战，`Microsoft`\
  \ 引入了虚拟帐户和 `MSA`。*虚拟帐户*是没有密码管理要求的本地帐户。它们可以使用创建它们的服务器的计算机身份访问域。另一方面，*托管服务帐户*是域级帐户。它们在\
  \ `AD`（活动目录）中提供自动密码管理，并且只要您的域运行的功能级别是 `Windows Server 2008 R2` 或更高版本，它们还会自动维护其 `Kerberos\
  \ SPN`（服务主体名称）。\n\n然而，这两种类型的帐户都有一个限制。它们只能在单个服务器上使用。如前所述，这可能会给您的 `SQL Server` 环境引入复杂性，特别是对于高可用的多服务器应用程序。这个问题已通过引入组\
  \ `MSA` 得到解决，它使您能够将 `MSA` 与域中的多个服务器关联起来。但是，要使用此功能，您的林需要运行在 `Windows Server 2012`\
  \ 或更高版本的功能级别上。\n\n此外，在此向导页面上，您可以选择授予 `SQL Server` 服务帐户“执行卷维护任务”用户权限分配。如果选择此选项，那么\
  \ `SQL Server` 将能够创建数据库文件和增长数据库文件，而无需用零填充空闲空间。这显著提高了文件创建和增长操作的性能。\n\n权衡之处在于它打开了一个非常小的安全漏洞。如果数据库文件创建位置所在的磁盘区域存储了任何数据，那么使用专门的工具，有可能检索到该数据，因为它没有被覆盖。然而，利用此安全漏洞的机会非常渺茫，因此我总是建议授予此权限，即使在安全性要求最高的环境之外。\n\
  \n#### 注意\n\n此功能仅适用于数据库文件。事务日志文件中的空闲空间在创建或增长时总是需要用零填充。\n\n\n### 选择排序规则\n\n服务器配置页面的第二个选项卡允许您自定义排序规则，如图\
  \ 2-19 所示。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig19_HTML.jpg](img/333037_2_En_2_Fig19_HTML.jpg)\n\
  \n图 2-19：排序规则配置页面\n\n*排序规则*决定了 SQL Server 将如何排序数据，并定义了 SQL Server 在区分重音、假名、宽度和大小写方面的匹配行为。您还可以指定排序和匹配应在二进制或二进制代码点表示上进行。\n\
  \n如果您的排序规则是区分重音的，那么在比较时，SQL Server 不会将 `è` 视为与 `e` 相同的字符；而如果指定了不区分重音，SQL Server\
  \ 则会将这些字符视为相等。假名敏感性定义日文平假名字符集是否与片假名字符集相等。宽度敏感性定义字符的单字节表示是否与其双字节等价形式相等。\n\n大小写敏感性定义在比较时大写字母是否与其小写等价形式相等。例如，清单\
  \ 2-1 中的代码将创建并填充一个临时表，然后使用两种不同的排序规则运行相同的查询。\n\n```sql\n--创建一个局部临时表\nCREATE TABLE\
  \ #CaseExample\n(\n    Name        VARCHAR(20)\n)\n--填充值\nINSERT INTO #CaseExample\n\
  VALUES('James'), ('james'), ('John'), ('john')\n--使用区分大小写的排序规则，计算名称为 James 的条目数\n\
  SELECT COUNT(*) AS 'Case Sensitive'\nFROM #CaseExample\nWHERE Name = 'John' COLLATE\
  \ Latin1_General_CS_AI\n--使用不区分大小写的排序规则，计算名称为 James 的条目数\nSELECT COUNT(*) AS 'Case\
  \ Insensitive'\nFROM #CaseExample\nWHERE Name = 'John' COLLATE Latin1_General_CI_AI\n\
  --删除临时表\nDROP TABLE #CaseExample\n```\n\n清单 2-1：匹配时区分大小写的效果\n\n从图 2-20 中的结果可以看出，第一个查询只找到了一个\
  \ `John`，因为它使用了区分大小写的排序规则；但第二个查询使用了不区分大小写的排序规则，因此匹配到了两个结果。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig20_HTML.jpg](img/333037_2_En_2_Fig20_HTML.jpg)\n\
  \n图 2-20：区分大小写示例的结果\n\n尽管各种排序规则敏感性的影响可能相当直接，但一个稍微令人困惑的方面是排序规则如何影响排序顺序。数据肯定只有一种正确的排序方式吧？嗯，这个问题的答案是否定的。数据可以通过多种方式正确排序。例如，虽然一些排序规则按字母顺序排序数据，但其他排序规则可能使用非字母书写系统，例如中文，可以使用一种称为部首和笔画排序的方法进行排序。这个系统会识别共同的字符组成部分，然后按笔画数量排序。清单\
  \ 2-2 演示了一个排序规则如何影响排序顺序的例子。\n\n```sql\n--创建一个临时表\nCREATE TABLE #SortOrderExample\n\
  (\n    Food        VARCHAR(20)\n)\n--填充表\nINSERT INTO #SortOrderExample\nVALUES\
  \ ('Coke'), ('Chips'), ('Crisps'), ('Cake')\n--使用 Latin1_General 排序规则选择食物\nSELECT\
  \ Food AS 'Latin1_General collation'\nFROM #SortOrderExample\nORDER BY Food\n  \
  \  COLLATE Latin1_General_CI_AI\n--使用 Traditional_Spanish 排序规则选择食物\nSELECT Food\
  \ AS 'Traditional_Spanish colation'\nFROM #SortOrderExample\nORDER BY Food\n   \
  \ COLLATE Traditional_Spanish_CI_AI\n```\n\n清单 2-2：排序规则对排序顺序的影响\n\n图 2-21 中的结果显示，`Chips`\
  \ 这个值使用两种排序规则排序的结果不同。这是因为在传统西班牙语中，`ch` 被视为一个单独的字符，并且排序在 `cz` 之后。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig21_HTML.jpg](img/333037_2_En_2_Fig21_HTML.jpg)\n\
  \n图 2-21：排序顺序示例的结果\n\n有两种类型的二进制排序规则可供选择。较旧样式的二进制排序规则仅出于向后兼容性而包含，并以 `BIN` 后缀标识。如果您选择这种类型的二进制排序规则，那么字符将基于每个字符的位模式进行匹配和排序。如果您选择现代二进制排序规则（以\
  \ `BIN2` 后缀标识），那么对于 Unicode 数据，数据将基于 Unicode 代码点进行排序和匹配；对于非 Unicode 数据，则基于相关 ANSI\
  \ 代码页的代码点进行排序和匹配。清单 2-3 中的示例演示了二进制（`BIN2`）排序规则与区分大小写和不区分大小写排序规则相比的行为。\n\n```sql\n\
  CREATE TABLE #CaseExample\n(\n    Name        VARCHAR(20)\n)\n--填充值\nINSERT INTO\
  \ #CaseExample\nVALUES('James'), ('james'), ('John'), ('john')\n--使用区分大小写的排序规则选择所有行\n\
  SELECT name as [Case Sensitive]\nFROM #CaseExample\nOrder by Name COLLATE Latin1_General_CS_AI\n\
  --使用不区分大小写的排序规则选择所有行\nSELECT name as [Case Insensitive]\nFROM #CaseExample\nOrder\
  \ by Name COLLATE  Latin1_General_CI_AI\nSELECT name as [binary]\nFROM #CaseExample\n\
  Order by Name COLLATE  Latin1_General_BIN2\n--删除临时表\nDROP TABLE #CaseExample\n```\n\
  \n清单 2-3：二进制排序规则的排序顺序\n\n图 2-22 中的结果显示，因为数据是按代码点而非字母顺序排序的，所以以大写字母开头的值排在以小写字母开头的值之前，这与字符的代码点相匹配。\n\
  \n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig22_HTML.jpg](img/333037_2_En_2_Fig22_HTML.jpg)\n\
  \n图 2-22：二进制排序规则的排序顺序\n\n排序规则可能具有挑战性，理想情况下，您应在整个企业中保持一致的排序规则。这在当今的全球化组织中并非总是可行，但您应努力做到。在安装实例时，您还应小心选择正确的排序规则。之后更改排序规则可能具有挑战性，因为数据库和表内的列都有自己的排序规则，并且如果其他对象依赖于某个排序规则，则无法更改它。从高层次来看，最坏的情况将涉及以下操作来在日后更改您的排序规则：\n\
  \n1.  重新创建所有数据库。\n2.  将所有数据导出到新创建的数据库副本中。\n3.  删除原始数据库。\n4.  使用所需的排序规则重建 Master\
  \ 数据库。\n5.  重新创建数据库。\n6.  从您创建的副本中将数据导回您的数据库。\n7.  删除数据库的副本。\n\n除非您有特定的向后兼容性要求，否则应避免使用\
  \ SQL 排序规则，而仅使用 Windows 排序规则。使用 Windows 排序规则是最佳实践，因为 SQL 排序规则已被弃用，并且并非所有都与 Windows\
  \ 排序规则完全兼容。此外，在选择较新的排序规则（如挪威语或波斯尼亚语 _ 拉丁文）时应谨慎。尽管这类新的排序规则系列映射到 Windows Server 2008\
  \ 或更高版本中的代码页，但它们不映射到较旧操作系统中的代码页。因此，如果您从较旧的操作系统（如 Windows XP）对实例运行 `SELECT *` 查询，代码页将不匹配，并会抛出异常。\n\
  \n#### 注意\n\n本书中的示例，您应该使用 `Latin1_General_CI_AS`。\n\n\n\n#### 配置实例安全\n\n设置向导的下一页允许您配置数据库引擎。它由六个选项卡组成。在第一个选项卡中，您可以指定实例的身份验证模式以及实例管理员，如图\
  \ 2-23 所示。第二个选项卡允许您指定将用作默认数据目录的文件夹，以及用户数据库和 `TempDB` 的特定位置。第三个选项卡提供了 `TempDB` 的配置选项，而第四个选项卡允许您配置实例的最大并行度；第五个选项卡用于配置实例内存设置，最后一个选项卡将允许您配置\
  \ `FILESTREAM`。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig23_HTML.jpg](img/333037_2_En_2_Fig23_HTML.jpg)\n\
  \n图 2-23：服务器配置选项卡\n\n`Windows 身份验证模式`意味着用户登录 Windows 时提供的凭据将传递给 SQL Server，用户无需任何额外凭据即可访问实例。使用`混合模式`，虽然仍可使用\
  \ Windows 凭据访问实例，但也可以为用户设置二级凭据。如果选择了此选项，则 SQL Server 将在实例内部维护自己的用户名和密码，用户可以提供这些信息以获得访问权限，即使他们的\
  \ Windows 身份没有权限。\n\n出于安全最佳实践考虑，最好只允许对实例进行 Windows 身份验证。这有两个原因。首先，仅使用 Windows 身份验证时，即使攻击者访问了您的网络，他们仍然无法访问\
  \ SQL Server，因为他们没有具有正确权限的有效 Windows 帐户。然而，使用混合模式身份验证，一旦进入网络，攻击者就可以使用暴力攻击或其他黑客方法尝试通过二级用户帐户获得访问权限。其次，如果指定了混合模式身份验证，则需要创建一个\
  \ `SA` 帐户。`SA` 帐户是一个 SQL Server 用户帐户，对实例拥有管理权限。如果此帐户的密码泄露，攻击者可能会获得对 SQL Server 的管理控制权。\n\
  \n然而，在某些情况下，混合模式身份验证是必需的。例如，您可能有一个不支持 Windows 身份验证的旧版应用程序，或者一个具有使用二级身份验证的硬编码连接的第三方应用程序。这些可能是需要混合模式身份验证的两个有效理由。另一个有效理由是如果您有用户需要从不受信任的域访问实例。\n\
  \n#### 注意\n\n仅作为例外使用混合模式身份验证，以减少 SQL Server 的安全攻击面。\n\n##### 配置实例\n\n在“服务器配置”选项卡上，您还需要至少输入一个实例管理员。您可以使用“添加当前用户”按钮添加当前的\
  \ Windows 安全上下文，或使用“添加”按钮搜索 Windows 安全主体（如用户或组）。理想情况下，您应该选择一个包含所有需要实例管理访问权限的 DBA\
  \ 的 Windows 组，因为这可以简化安全性。\n\n数据库引擎配置页面的“数据目录”选项卡如图 2-24 所示。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig24_HTML.jpg](img/333037_2_En_2_Fig24_HTML.jpg)\n\
  \n图 2-24：数据目录选项卡\n\n“数据目录”选项卡允许您更改数据根目录的默认位置。在此屏幕上，您还可以更改用户数据库及其日志文件的默认位置，并指定 `TempDB`\
  \ 数据和日志文件的创建位置。正如您可能从第 1 章回忆起的，这一点尤其重要，因为您可能希望将用户数据文件与其日志以及 `TempDB` 分开存放。最后，此选项卡允许您指定将来创建的数据库备份的默认位置。\n\
  \n`TempDB` 选项卡（图 2-25）允许您配置 `TempDB` 的文件选项。`TempDB` 所需的文件数量很重要，因为文件过少可能导致系统页面（如\
  \ `GAM`（全局分配映射）和 `SGAM`（共享全局分配映射））上的争用。最佳文件数可以使用以下公式计算：\n```\nSMALLEST(逻辑核心数, 8)\n\
  ```\n如果您的服务器启用了超线程，则逻辑核心数将是物理核心数乘以二。在 VMWare 上，逻辑核心数将等于虚拟核心数。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig25_HTML.jpg](img/333037_2_En_2_Fig25_HTML.jpg)\n\
  \n图 2-25：TempDB 选项卡\n\n在考虑文件的初始大小时，我通常遵循以下规则：\n```\nSUM(所有用户数据库的数据文件大小) / 3\n```\n\
  适用于繁忙的 `OLTP` 系统，但这将根据您的要求和用户数据库的工作负载情况而有所不同。\n\n向导的 `MaxDOP` 选项卡（如图 2-26 所示）允许您配置任何单个查询可以使用的最大\
  \ CPU 核心数。安装程序会计算一个默认推荐值，但您可以根据需要覆盖此值。有关如何配置 `MaxDOP` 的详细讨论，请参阅本书第 5 章。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig26_HTML.jpg](img/333037_2_En_2_Fig26_HTML.jpg)\n\
  \n图 2-26：MaxDOP 选项卡\n\n图 2-27 展示了“内存”选项卡。在这里，您可以指定是使用可分配给实例的最小和最大内存量的默认配置，使用安装向导计算的建议值，还是指定您自己的值。要指定您自己首选的值，请选择“建议”选项，输入您的值，并勾选“单击此处以接受\
  \ SQL Server 数据库引擎的推荐内存配置”复选框。如果您希望遵循安装程序的建议，也必须使用此复选框。有关如何为数据库引擎最佳配置最小和最大内存设置的详细讨论，请参阅本书第\
  \ 5 章。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig27_HTML.jpg](img/333037_2_En_2_Fig27_HTML.jpg)\n\
  \n图 2-27：内存选项卡\n\n\n\n### SQL Server 安装配置\n\n### FILESTREAM 配置\n\n数据库引擎配置的 **FILESTREAM**\
  \ 选项卡允许您启用和配置 SQL Server **FILESTREAM** 功能的访问级别，如图 2-28 所示。如果您希望使用 SQL Server 的\
  \ **FileTable** 功能，则也必须启用 **FILESTREAM**。**FILESTREAM** 和 **FileTable** 提供了在 Windows\
  \ 文件夹结构中以非结构化方式存储数据的能力，同时保留了从 SQL Server 管理和查询这些数据的能力。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig28_HTML.jpg](img/333037_2_En_2_Fig28_HTML.jpg)\n\
  \n图 2-28 FILESTREAM 选项卡\n\n选择“为 Transact-SQL 访问启用 FILESTREAM”将启用 **FILESTREAM**，但数据只能从\
  \ SQL Server 内部访问。此外，选择“为文件 I/O 访问启用 FILESTREAM”使应用程序能够直接从操作系统访问数据，绕过 SQL Server。如果选择此选项，则还需要提供一个预先存在的文件共享的名称，该共享将用于直接应用程序访问。“允许远程客户端访问\
  \ FILESTREAM 数据”选项使数据可供远程应用程序使用。这三个选项是逐层构建的，例如，如果不先选择“为 Transact-SQL 访问启用 FILESTREAM”，就不可能选择“为文件\
  \ I/O 访问启用 FILESTREAM”。**FILESTREAM** 和 **FileTable** 将在第 6 章进一步讨论。\n\n### 配置分布式重放\n\
  \n如图 2-29 所示，向导的下一页将提示您指定将被授予访问 **Distributed Replay Controller** 服务的用户。与授予实例管理权限的方式相同，您可以使用“添加当前用户”按钮添加您当前的安全上下文，也可以使用“添加”按钮浏览\
  \ Windows 用户和组。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig29_HTML.jpg](img/333037_2_En_2_Fig29_HTML.jpg)\n\
  \n图 2-29 Distributed Replay Controller 页面\n\n在向导的下一页，您可以配置 **Distributed Replay**\
  \ 客户端，如图 2-30 所示。“工作目录”是客户端上保存调度文件的文件夹。“结果目录”是客户端上保存跟踪文件的文件夹。每次运行跟踪时，这两个位置中的文件都将被覆盖。如果您有已配置的现有\
  \ **Distributed Replay Controller**，则应在“控制器名称”字段中输入其名称。但是，如果您正在配置一个新的控制器，则该字段应留空，稍后在\
  \ `DReplayClient.config` 配置文件中进行修改。**Distributed Replay** 的配置和使用将在第 21 章讨论。\n\n\
  ![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig30_HTML.jpg](img/333037_2_En_2_Fig30_HTML.jpg)\n\
  \n图 2-30 Distributed Replay Client 页面\n\n### 完成安装\n\n向导的“准备安装”页面是安装开始前的最后一页，如图 2-31\
  \ 所示。此屏幕提供了将要安装的功能摘要，但此页面最有趣的部分可能是“配置文件路径”部分。它提供了一个配置文件的路径，您可以重用该文件来安装具有相同配置的更多实例。配置文件将在第\
  \ 3 章进一步讨论。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig31_HTML.jpg](img/333037_2_En_2_Fig31_HTML.jpg)\n\
  \n图 2-31 准备安装页面\n\n安装向导将在安装过程中显示进度条。安装完成后，将显示一个摘要屏幕，如图 2-32 所示。您应检查以确保每个正在安装的组件状态均为“成功”。至此，SQL\
  \ Server 安装完成。\n\n![../images/333037_2_En_2_Chapter/333037_2_En_2_Fig32_HTML.jpg](img/333037_2_En_2_Fig32_HTML.jpg)\n\
  \n图 2-32 完成页面\n\n### 总结\n\nSQL Server 的安装中心提供了许多有用的工具和链接，用于指导和协助您的安装过程。您可以使用安装中心安装故障转移群集实例以及独立的\
  \ SQL Server 实例。还有一些工具可帮助满足高级安装要求，例如 SQL Server 的准备映像以及基于配置文件的安装。\n\n除了使用 SQL Server\
  \ 2019 安装向导安装数据库引擎实例外，您还可以使用同一工具安装 BI 和 ETL 套件中的工具，例如 **Analysis Services**、**Integration\
  \ Services**、**Data Quality Services** 和 **Master Data Services**。如果您使用向导安装 **Analysis\
  \ Services**，则可以使用多维模型或表模型配置该工具。\n\n虽然您可以使用默认值成功安装 SQL Server，但为了您的实例乃至您整个环境的长期可维护性，请务必考虑安装的诸多方面。这尤其适用于排序规则、服务帐户和其他安全注意事项，例如添加最合适的管理员组以及实施身份验证模型。\n\
  \n"
- '# 3. Server Core 安装


  由于 SQL Server 不支持远程安装，并且 Windows Server Core 仅提供命令行界面（CLI）而没有图形用户界面（GUI），因此您必须在
  Windows Server Core 上将 SQL Server 安装作为命令行操作执行。您还可以使用配置文件来生成一致、可重复的安装。


  在本章中，我们将回顾在 Windows Server Core 上安装 SQL Server 的注意事项，然后演示如何在此平台上执行安装。我们还将讨论使用配置文件以及如何利用它们来简化未来的安装并确保一致性。


  在第 1 章中，您可能记得我们讨论了 SQL Server 在 Windows Server Core 上的限制，以及某些功能（如 **Reporting Services**、**Master
  Data Services** 和 **Data Quality Services**）不受支持，而其他功能（如 **Management Tools** 和
  **Distributed Replay Client**）仅受远程支持。您还应确保在组织内的各种能力范围内具有操作可维护性，包括 **PowerShell**
  的熟练程度以及操作工具的兼容性。


  ##### 安装实例


  在 Windows Server Core 中安装 SQL Server 需要从 **PowerShell** 终端运行 `setup.exe`。`setup.exe`
  可在 SQL Server 安装介质的根目录中找到。从 **PowerShell** 终端运行 `setup.exe` 时，可以使用开关和参数传入值，这些值将用于配置实例。


  > 注意：如果需要，您可以遵循相同的过程在基于 GUI 的 Windows 版本上安装 SQL Server。




  #### 必需参数


  虽然许多开关和参数是可选的，但有些参数必须始终包含。当您安装数据库引擎的独立实例时，表 3-1 中列出的参数始终是必需的。


  表 3-1


  必需参数


  | 参数 | 用法 |

  | --- | --- |

  | `/IACCEPTSQLSERVERLICENSETERMS` | 确认您接受 SQL Server 许可条款 |

  | `/ACTION` | 指定您想要执行的操作，例如“安装”或“升级” |

  | `/FEATURES` 或 `/ROLE` | 指定您希望安装的功能 |

  | `/INSTANCENAME` | 将分配给该实例的名称 |

  | `/SQLSYSADMINACCOUNTS` | 将在数据库引擎实例中被授予管理权限的 Windows 安全上下文 |

  | `/AGTSVCACCOUNT` | 将用于运行 SQL Server 代理服务的帐户 |

  | `/SQLSVCACCOUNT` | 将用于运行数据库引擎服务的帐户 |

  | `/qs` | 执行无人参与安装。在 Windows Server Core 上这是必需的，因为不支持安装向导 |


  ##### IACCEPTSQLSERVERLICENSETERMS 开关


  因为 `/IACCEPTSQLSERVERLICENSETERMS` 是一个表示您接受许可条款的简单开关，所以它不需要传递任何参数值。


  ##### ACTION 参数


  当您执行独立实例的基本安装时，传递给 `/ACTION` 参数的值将是 `install`；但是，`/ACTION` 参数的可能值的完整列表如表 3-2 所示。


  表 3-2


  `/ACTION` 参数接受的值


  | 值 | 用法 |

  | --- | --- |

  | `install` | 安装独立实例 |

  | `PrepareImage` | 准备一个纯净的独立映像，不包含帐户、计算机或网络的特定详细信息 |

  | `CompleteImage` | 通过添加帐户、计算机和网络详细信息来完成已准备的独立映像的安装 |

  | `Upgrade` | 从 SQL Server 2012、2014、2017 或 2019 升级实例 |

  | `EditonUpgrade` | 将 SQL Server 2019 从较低版本（如开发者版）升级到较高级别（如企业版） |

  | `Repair` | 修复损坏的实例 |

  | `RebuildDatabase` | 重建损坏的系统数据库 |

  | `Uninstall` | 卸载独立实例 |

  | `InstallFailoverCluster` | 安装故障转移群集实例 |

  | `PrepareFailoverCluster` | 准备一个纯净的群集映像，不包含帐户、计算机或网络的特定详细信息 |

  | `CompleteFailoverCluster` | 通过添加帐户、计算机和网络详细信息来完成已准备的群集映像的安装 |

  | `AddNode` | 向故障转移群集添加节点 |

  | `RemoveNode` | 从故障转移群集中移除节点 |


  ##### FEATURES 参数


  如表 3-3 所示，`/FEATURES` 参数用于指定一个以逗号分隔的功能列表，这些功能将由安装程序安装，但并非所有功能都可以在 Windows Server
  Core 上使用。


  表 3-3


  `/FEATURES` 参数的可接受值


  | 参数值 | 在 Windows Core 上使用 | 描述 |

  | --- | --- | --- |

  | `SQL` | 否 | 完整的 SQL 引擎，包括全文搜索、复制和数据质量服务器 |

  | `SQLEngine` | 是 | 数据库引擎 |

  | `FullText` | 是 | 全文搜索 |

  | `Replication` | 是 | 复制组件 |

  | `DQ` | 否 | 数据质量服务器 |

  | `PolyBase` | 是 | PolyBase 组件 |

  | `AdvancedAnalytics` | 是 | 机器学习解决方案和数据库内的 R 服务 |

  | `SQL_INST_MR` | 是 | 用于机器学习的 R 包 |

  | `SQL_INST_MPY` | 是 | 用于机器学习的 Anaconda 和 Python 包 |

  | `AS` | 是 | 分析服务 |

  | `DQC` | 否 | 数据质量客户端 |

  | `IS` | 是 | 集成服务 |

  | `MDS` | 否 | 主数据服务 |

  | `Tools` | 否 | 所有客户端工具 |

  | `BC` | 否 | 向后兼容组件 |

  | `Conn` | 是 | 连接组件 |

  | `DREPLAY_CTLR` | 否 | 分布式重播控制器 |

  | `DREPLAY_CLT` | 否 | 分布式重播客户端 |

  | `SNAC_SDK` | 否 | 客户端连接 SDK |

  | `SDK` | 否 | 客户端工具 SDK |

  | `LocalDB` | 是 | SQL Server Express 的一种执行模式，供应用程序开发人员使用 |


  #### 注意


  如果您选择安装其他 SQL Server 功能，例如分析服务或集成服务，那么其他参数也会变为必需。


  #### 角色参数


  除了使用 `/FEATURES` 参数指定要安装的功能列表外，还可以使用 `/ROLE` 参数以预定义的角色安装 SQL Server。`/ROLE` 参数支持的角色详见表
  3-4。


  表 3-4


  `/ROLE` 参数的可用值


  | 参数值 | 描述 |

  | --- | --- |

  | `SPI_AS_ExistingFarm` | 在现有的 SharePoint 场中将 SSAS 安装为 PowerPivot 实例 |

  | `SPI_AS_NewFarm` | 在新的未配置的 SharePoint 场中将数据库引擎和 SSAS 安装为 PowerPivot 实例 |

  | `AllFeatures_WithDefaults` | 安装 SQL Server 及其组件的所有功能。我不建议使用此选项，除非在极少数情况下，因为安装比实际需要更多的功能会增加
  SQL Server 的安全性和资源利用 footprint |


  #### 基本安装


  当您使用 `setup.exe` 的命令行参数时，您应遵守表 3-5 中概述的语法规则。


  表 3-5


  命令行参数的语法规则


  | 参数类型 | 语法 |

  | --- | --- |

  | 简单开关 | `/SWITCH` |

  | 真/假 | `/PARAMETER=true/false` |

  | 布尔值 | `/PARAMETER=0/1` |

  | 文本 | `/PARAMETER="值"` |

  | 多值文本 | `/PARAMETER="值 1" "值 2"` |

  | `/FEATURES` 参数 | `/FEATURES=功能 1,功能 2` |


  #### 提示


  对于文本参数，仅当值包含空格时才需要引号。但是，始终包含它们被认为是良好的实践。


  假设您已经导航到安装媒体根目录，那么清单 3-1 中的命令提供了用于安装数据库引擎、复制和客户端连接组件的 PowerShell 语法。它对所有可选参数使用默认值，但我们将排序规则设置为
  Windows 排序规则 `Latin1_General_CI_AS` 除外。


  #### 提示


  当 Windows Server Core 启动时，您看到的界面是命令提示符，而不是 PowerShell 提示符。键入 `powershell` 以进入 PowerShell
  提示符。


  ```

  .\SETUP.EXE /IACCEPTSQLSERVERLICENSETERMS /ACTION="Install" /FEATURES=SQLEngine,Replication,Conn
  /INSTANCENAME="PROSQLADMINCORE2" /SQLSYSADMINACCOUNTS="Administrator" /SQLCOLLATION="Latin1_General_CI_AS"
  /qs

  ```

  清单 3-1

  从 PowerShell 安装 SQL Server


  #### 注意


  如果使用命令提示符而不是 PowerShell，则不需要开头的 `.\` 字符。


  在此示例中，将安装一个名为 `PROSQLADMINCORE` 的 SQL Server 实例。数据库引擎和 SQL 代理服务都将在 `SQLServiceAccount1`
  帐户下运行，名为 `SQLDBA` 的 Windows 组将被设为管理员。安装开始时，会出现一个精简的、非交互式的安装向导版本，让您了解安装进度。



  ### 冒烟测试


  在 Windows Server Core 上安装实例后（安装结束时没有摘要屏幕），执行一些冒烟测试总是一个好主意。这里的 `smoke tests` 指的是快速、高层次的测试，用于确保服务正在运行并且实例可以访问。


  清单 3-2 中的代码将使用 PowerShell 的 `Get-Service` cmdlet，以确保与 `PROSQLADMINCORE` 实例相关的服务存在并检查它们的状态。此脚本使用星号作为通配符，返回所有包含我们实例名称的服务。这当然意味着，像
  SQL Browser 这样的服务不会被返回。


  ```

  Get-Service -displayname *PROSQLADMINCORE2* | Select-Object name, displayname, status

  清单 3-2

  检查服务状态

  ```


  结果如图 3-1 所示。你可以看到 SQL Server 和 SQL Agent 服务都已安装。你还可以看到 SQL Server 服务已启动，而 SQL Agent
  服务已停止。这符合我们的预期，因为我们没有为任何服务使用启动模式参数。SQL Server 服务的默认启动模式是自动，而 SQL Agent 服务的默认启动模式是手动。


  ![../images/333037_2_En_3_Chapter/333037_2_En_3_Fig1_HTML.jpg](img/333037_2_En_3_Fig1_HTML.jpg)

  *图 3-1*

  *检查服务状态冒烟测试的结果*


  第二个推荐的冒烟测试是使用 `invoke-sqlcmd` 运行一个返回实例名称的 T-SQL 语句。要使用 `invoke-sqlcmd` cmdlet（或任何其他
  SQL Server PowerShell cmdlet），需要安装 `sqlserver` PowerShell 模块。此模块取代了已弃用的 `SQLPS`
  模块，并且包含更多的 cmdlet。


  如果你运行的是带桌面体验的 Windows Server，那么安装 SQL Server Management Studio（可从 [`https://docs.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms`](https://docs.microsoft.com/en-us/sql/ssms/download-sql-server-management-studio-ssms)
  下载）时就会包含 `sqlserver` 模块。但是，如果你使用的是核心模式的 Windows Server（或者你选择不安装 SSMS），那么 `sqlserver`
  模块可以从 PowerShell Gallery 下载。或者，如果你的服务器可以访问互联网，清单 3-3 中的脚本将首先找到该模块的最新版本，然后下载并安装它。


  ```

  #查找并列出 sqlserver 模块的当前版本

  Find-Module sqlserver

  #下载并安装 sqlserver 模块

  Install-Module sqlserver

  清单 3-3

  安装 sqlserver 模块

  ```


  #### 提示


  第一次运行 `Find-Module` 时，系统会提示你安装 NuGet 提供程序。


  一旦安装了 `sqlserver` 模块，就可以使用清单 3-4 中的脚本来返回实例的名称。


  #### 注意


  这也是集群执行的 `IsAlive` 测试所使用的查询。它对系统影响很小，只是检查实例是否可以访问。


  ```

  Invoke-Sqlcmd –serverinstance "localhost\PROSQLADMINCORE2" -query "SELECT @@SERVERNAME"

  清单 3-4

  检查实例是否可访问

  ```


  在这个例子中，`- serverinstance` 开关用于指定你要连接到的实例名称，`-query` 开关指定了将要运行的查询。此冒烟测试的结果如图 3-2
  所示。如你所见，查询成功解析并返回了实例的名称。


