  ### 修复错误


  当我们使用 `DBCC CHECKDB` 来修复数据库中的损坏时，我们需要指定一个额外的参数来决定要使用的修复级别。可用的选项是 `REPAIR_REBUILD`
  和 `REPAIR_ALLOW_DATA_LOSS`。`REPAIR_REBUILD` 当然是首选选项，它可用于解决不会导致数据丢失的问题，例如错误的页指针或非聚集索引内部的损坏。`REPAIR_ALLOW_DATA_LOSS`
  会尝试修复它遇到的所有错误，但如其名所示，这可能涉及数据丢失。你应仅在没有备份可用时，才使用此选项来恢复数据。


  在为 `DBCC CHECKDB` 指定修复选项之前，务必先不带修复选项运行一次。这是因为当你这样做时，它会告诉你可用于解决错误的最低修复级别选项。如果我们再次查看针对
  `Chapter9` 数据库运行的输出，我们可以看到输出的末尾建议了要使用的最合适的修复选项。如图 9-10 所示。


  ![建议的修复选项](img/333037_2_En_9_Fig10_HTML.jpg)


  **图 9-10** 建议的修复选项


  在我们的案例中，我们被告知需要使用 `REPAIR_ALLOW_DATA_LOSS` 选项。如果我们尝试使用 `REPAIR_REBUILD` 选项，我们会收到来自
  `DBCC CHECKDB` 的以下消息：


  ```

  CHECKDB found 0 allocation errors and 4 consistency errors in database ''chapter9''.

  repair_allow_data_loss is the minimum repair level for the errors found by DBCC
  CHECKDB (chapter9, repair_rebuild)

  ```


  由于我们没有 `Chapter9` 数据库的备份，这是我们修复损坏的唯一机会。为了使用修复选项，我们还必须将数据库置于 `SINGLE_USER` 模式。清单
  9-10 中的脚本将 `Chapter9` 数据库置于 `SINGLE_USER` 模式，运行修复，然后再次更改数据库以允许多个连接。


  ```sql

  ALTER DATABASE Chapter9 SET SINGLE_USER ;

  GO

  DBCC CHECKDB (Chapter9, REPAIR_ALLOW_DATA_LOSS) ;

  GO

  ALTER DATABASE Chapter9 SET MULTI_USER ;

  GO

  ```


  **清单 9-10** 使用 `DBCC CHECKDB` 修复损坏


  图 9-11 中的部分结果显示 `CorruptTable` 中的错误已被修复。它还显示该页已被释放。这意味着我们丢失了该页上的所有数据。


  ![使用 DBCC CHECKDB 修复损坏的结果](img/333037_2_En_9_Fig11_HTML.jpg)


  **图 9-11** 使用 `DBCC CHECKDB` 修复损坏的结果


  如果我们再次使用与清单 9-4 中演示的相同的查询来查询 `msdb.dbo.suspect_pages` 表，我们会看到 `Event` 列已被更新，表明该页已被释放。我们还可以看到，每次我们访问该页（无论是通过
  `SELECT` 语句还是 `DBCC CHECKDB`），`error_count` 列都会递增。这些结果如图 9-12 所示。


  ![修复后的 suspect_pages 表](img/333037_2_En_9_Fig12_HTML.jpg)


  **图 9-12** 修复后的 `suspect_pages` 表



  #### 紧急模式


  如果您的数据库文件损坏到数据库无法访问且无法恢复的程度，即使使用了 `REPAIR_ALLOW_DATA_LOSS` 选项也不行，并且您没有可用的备份，那么您最后的手段就是使用
  `REPAIR_ALLOW_DATA_LOSS` 选项在紧急模式下运行 `DBCC CHECKDB`。请记住，紧急模式是修复数据库的最后手段选项，如果您无法通过此模式访问数据库，那么您将无法通过任何其他方式访问它们。当您在数据库处于紧急模式下执行此操作时，`DBCC
  CHECKDB` 会将因损坏而无法访问的数据页视为没有错误，以尝试恢复数据。


  此操作还可以备份因日志损坏而无法访问的数据库。这是因为它会尝试强制事务日志恢复，即使遇到错误也是如此。如果失败，它会重建事务日志。当然，这可能导致事务不一致，但如前所述，这是一个最后的选择。


  举个例子，我们将在操作系统中删除 `Chapter9` 数据库的事务日志文件。您可以通过运行清单 9-11 中的查询来找到事务日志文件的操作系统位置。


  ```sql

  SELECT physical_name

  FROM sys.master_files

  WHERE database_id = DB_ID(''Chapter9'')

  AND type_desc = ''Log'' ;

  ```

  清单 9-11 查找事务日志路径


  由于数据和日志文件被 SQL Server 进程锁定，我们首先需要停止实例。重新启动实例后，我们可以看到我们的 `Chapter9` 数据库已被标记为“恢复挂起”，如图
  9-13 所示。


  ![../images/333037_2_En_9_Chapter/333037_2_En_9_Fig13_HTML.jpg](img/333037_2_En_9_Fig13_HTML.jpg)

  图 9-13 处于恢复挂起状态的数据库


  由于我们没有 `Chapter9` 数据库的可用备份，我们唯一的选择就是使用紧急模式下的 `DBCC CHECKDB`。清单 9-12 中的脚本将 `Chapter9`
  数据库置于紧急模式，然后使用带有 `REPAIR_ALLOW_DATA_LOSS` 选项的 `DBCC CHECKDB` 来修复错误。


  ```sql

  ALTER DATABASE Chapter9 SET EMERGENCY ;

  GO

  ALTER DATABASE Chapter9 SET SINGLE_USER ;

  GO

  DBCC CHECKDB (''Chapter9'', REPAIR_ALLOW_DATA_LOSS) ;

  GO

  ALTER DATABASE Chapter9 SET MULTI_USER ;

  GO

  ```

  清单 9-12 紧急模式下的 `DBCC CHECKDB`


  如图 9-14 所示的部分结果表明，SQL Server 能够通过重建事务日志使数据库重新联机。然而，这也意味着事务一致性已经丢失，备份链已中断。由于我们失去了事务一致性，我们现在应该运行
  `DBCC CHECKCONSTRAINTS` 来查找外键约束和 CHECK 约束中的错误。本章稍后将介绍 `DBCC CHECKCONSTRAINTS`。


  ![../images/333037_2_En_9_Chapter/333037_2_En_9_Fig14_HTML.jpg](img/333037_2_En_9_Fig14_HTML.jpg)

  图 9-14 紧急模式下 `DBCC CHECKDB` 的结果


  #### 注意


  如果在紧急模式下运行 `DBCC CHECKDB` 失败，那么数据库将无法通过其他方式修复。


  #### 其他用于处理损坏的 DBCC 命令


  还有一些其他 DBCC 命令执行 `DBCC CHECKDB` 所做工作的一个子集。这些将在以下部分讨论。


  ##### DBCC CHECKCATALOG


  在 SQL Server 中，系统目录是描述数据库及其内部数据的元数据的集合。运行 `DBCC CHECKCATALOG` 时，它会对此目录执行一致性检查。此命令作为
  `DBCC CHECKDB` 的一部分运行，但也可以作为独立命令运行。作为独立命令运行时，它接受与 `DBCC CHECKDB` 相同的参数，但 `PHYSICAL_ONLY`
  和 `DATA_PURITY` 除外，这些参数对此命令不可用。


  ##### DBCC CHECKALLOC


  `DBCC CHECKALLOC` 对数据库内的磁盘分配结构执行一致性检查。它作为 `DBCC CHECKDB` 的一部分运行，但也可以作为独立命令运行。作为独立命令运行时，它接受许多与
  `DBCC CHECKDB` 相同的参数，但 `PHYSICAL_ONLY`、`DATA_PURITY` 和 `REPAIR_REBUILD` 除外，这些参数对此命令不可用。输出按表、索引和分区列出。


  ##### DBCC CHECKTABLE


  `DBCC CHECKTABLE` 作为 `DBCC CHECKDB` 的一部分针对数据库中的每个表和索引视图运行。但是，它也可以作为单独的命令针对特定表及其索引运行。它对该特定表执行一致性检查，如果有任何索引视图引用该表，它还会执行跨表一致性检查。它接受与
  `DBCC CHECKDB` 相同的参数，但使用它时，还需要指定要检查的表的名称或 ID。


  ##### 谨慎


  我曾见过人们将他们的表分成两组，然后用在隔夜对一半表运行 `DBCC CHECKTABLE` 来代替 `DBCC CHECKDB`。这不仅会在检查内容上留下空白，而且为每个被检查的表都会生成一个新的数据库快照，而不是为所有检查生成一个快照。这可能导致每个表的运行时间更长。


  ##### DBCC CHECKFILEGROUP


  `DBCC CHECKFILEGROUP` 对指定文件组内的系统目录、分配结构、表和索引视图执行一致性检查。然而，当表的索引存储在不同的文件组上时，存在一些限制。在这种情况下，索引不会被检查一致性。即使索引存储在您正在检查的文件组上，但对应的基表在另一个文件组上时，此限制同样适用。


  如果您有一个分区表，该表存储在多个文件组上，`DBCC CHECKFILEGROUP` 仅检查存储在被检查文件组上的分区的分区。`DBCC CHECKFILEGROUP`
  的参数与 `DBCC CHECKDB` 相同，但 `DATA_PURITY` 除外，该参数无效，并且您不能指定任何修复选项。您还需要指定文件组名称或 ID。



  ##### DBCC CHECKIDENT


  `DBCC CHECKIDENT` 扫描指定表中的所有行，以查找 `IDENTITY` 列中的最大值。然后，它会检查确保存储在表元数据中的下一个 `IDENTITY`
  值高于表中 `IDENTITY` 列的最大值。`DBCC CHECKIDENT` 接受表 9-6 中详述的参数。


  表 9-6


  DBCC CHECKIDENT 参数


  | 参数 | 描述 |

  | --- | --- |

  | 表名 | 要检查的表的名称。 |

  | `NORESEED` | 返回 `IDENTITY` 列的最大值和当前的 `IDENTITY` 值，但即使需要，也不会重新设定该列的种子值。 |

  | `RESEED` | 将当前的 `IDENTITY` 值重新设定为表中 `IDENTITY` 的最大值。 |

  | 新重新设定值 | 与 `RESEED` 一起使用，为 `IDENTITY` 值指定一个种子值。应谨慎使用此参数，因为将 `IDENTITY` 值设置为低于表中的最大值，如果
  `IDENTITY` 列上有主键或唯一约束，可能会导致生成错误。 |

  | `WITH NO_INFOMSGS` | 抑制信息性消息的显示。 |


  我们可以通过使用代码清单 9-13 中的命令，来检查我们的 `CorruptTable` 表中的 `IDENTITY` 值与最大 `IDENTITY` 值是否一致。


  ```

  DBCC CHECKIDENT(''CorruptTable'',NORESEED) ;

  代码清单 9-13

  DBCC CHECKIDENT

  ```


  结果显示在图 9-15 中，其中 `IDENTITY` 列的最大值和当前的 `IDENTITY` 值都是 `10201`，这意味着目前我们表中的 `IDENTITY`
  值没有问题。


  ![../images/333037_2_En_9_Chapter/333037_2_En_9_Fig15_HTML.jpg](img/333037_2_En_9_Fig15_HTML.jpg)


  图 9-15


  DBCC CHECKIDENT 结果


  ##### DBCC CHECKCONSTRAINTS


  `DBCC CHECKCONSTRAINTS` 可以检查表中特定的外键或检查约束的完整性，检查单个表上的所有约束，或者检查数据库中所有表上的所有约束。`DBCC
  CHECKCONSTRAINTS` 接受表 9-7 中详述的参数。


  表 9-7


  DBCC CHECKCONSTRAINTS 参数


  | 参数 | 描述 |

  | --- | --- |

  | 表或约束 | 指定您希望检查的约束的名称或 ID，或者指定表的名称或 ID 以检查该表上所有已启用的约束。省略此参数会导致检查数据库中所有表上所有已启用的约束。
  |

  | `ALL_CONSTRAINTS` | 如果 `DBCC CHECKCONSTRAINTS` 是针对整个表或整个数据库运行的，那么此选项将强制检查已禁用和已启用的约束。
  |

  | `ALL_ERRORMSGS` | 默认情况下，如果 `DBCC CHECKCONSTRAINTS` 发现违反约束的行，它将返回这些行中的前 200 行。指定
  `ALL_ERRORMSGS` 会导致返回所有违反约束的行，即使其数量超过 200 行。 |

  | `NO_INFOMSGS` | 抑制信息性消息的显示。 |


  代码清单 9-14 中的脚本创建了一个名为 `BadConstraint` 的表并插入了一行数据。然后，它在表上创建了一个检查约束，并指定了 `NOCHECK`
  选项，这使我们能够创建一个立即被我们已添加的现有行所违反的约束。最后，我们对该表运行 `DBCC CHECKCONSTRAINTS`。


  ```

  USE Chapter9

  GO

  --创建 BadConstraint 表

  CREATE TABLE dbo.BadConstraint

  (

  ID        INT PRIMARY KEY

  ) ;

  --向 BadConstraint 表中插入一个负值

  INSERT INTO dbo.BadConstraint

  VALUES(-1) ;

  --创建一个 CHECK 约束，强制 ID 列的值为正数

  ALTER TABLE dbo.BadConstraint WITH NOCHECK ADD CONSTRAINT chkBadConstraint CHECK
  (ID > 0) ;

  GO

  --对表运行 DBCC CHECKCONSTRAINTS

  DBCC CHECKCONSTRAINTS(''dbo.BadConstraint'') ;

  代码清单 9-14

  DBCC CHECKCONSTRAINTS

  ```


  运行此脚本的结果如图 9-16 所示。您可以看到 `DBCC CHECKCONSTRAINTS` 已返回了违反约束的行的详细信息。


  ![../images/333037_2_En_9_Chapter/333037_2_En_9_Fig16_HTML.jpg](img/333037_2_En_9_Fig16_HTML.jpg)


  图 9-16


  DBCC CHECKCONSTRAINTS 结果


  #### 提示


  在运行 `DBCC CHECKDB` 或其他 DBCC 命令来修复损坏后，运行 `DBCC CHECKCONSTRAINTS` 是一个好习惯。这是因为 DBCC
  命令的修复选项不会考虑约束完整性。


  即使 `DBCC CHECKCONSTRAINTS` 没有发现任何坏数据，它仍然不会将约束标记为可信。您必须手动完成此操作。代码清单 9-15 中的脚本首先运行一个查询来查看约束是否可信，然后手动将其标记为可信。


  ```

  SELECT

  is_not_trusted

  FROM sys.check_constraints

  WHERE name = ''chkBadConstraint'' ;

  ALTER TABLE dbo.BadConstraint WITH CHECK CHECK CONSTRAINT chkDadConstraint ;

  代码清单 9-15

  将约束标记为可信

  ```


  #### 超大型数据库的一致性检查


  如果您有超大型数据库，可能很难找到足够长的维护窗口来运行 `DBCC CHECKDB`，并且在用户或 ETL 进程连接时运行它可能会导致性能问题。如果您拥有大量使用公共基础架构（如
  SAN 或私有云）的小型数据库，也可能会遇到类似问题。然而，确保数据库的一致性应该是您议程上的优先事项，因此您应该尝试找到一个既能满足维护需求又能满足性能目标的策略。以下部分讨论了您可以选择采用来实现这种平衡的策略。


  ##### 使用 PHYSICAL_ONLY 选项的 DBCC CHECKDB


  您可以采取的一种策略是定期（最好每晚）使用 `PHYSICAL_ONLY` 选项运行 `DBCC CHECKDB`，然后在周期性但频率较低的基础上（最好每周一次）运行一次完整的检查。当您使用
  `PHYSICAL_ONLY` 选项运行 `DBCC CHECKDB` 时，会执行系统目录和分配结构的一致性检查，并扫描和验证每个表的每个页面。其最终结果是捕获由
  IO 错误引起的损坏，但会识别其他问题，例如逻辑一致性错误。这就是为什么每周运行一次完整扫描仍然很重要。


  ##### 使用 WITH CHECKSUM 备份和 DBCC CHECKALLOC


  如果您所有的数据库每晚都有完整备份，并且所有数据库都配置了 `CHECKSUM` 作为 `PAGE_VERIFY` 选项，那么除了前面提到的策略外，另一种方法是在您的完整备份中添加
  `WITH CHECKSUM` 选项，然后运行 `DBCC CHECKALLOC` 来代替每晚指定 `PHYSICAL_ONLY` 选项的 `DBCC CHECKDB`。`DBCC
  CHECKALLOC` 命令实际上是 `DBCC CHECKDB` 命令的一个子集，它验证数据库内的分配结构。当执行带 `WITH CHECKSUM` 的完整备份时，这就满足了扫描和验证每个表的每个页面以检查
  IO 错误的要求。就像运行指定了 `PHYSICAL_ONLY` 选项的 `DBCC CHECKDB` 一样，这可以识别由 IO 操作引起的任何损坏以及任何坏的校验和。但是，在内存中发生的页面错误将不会被识别。这意味着与
  `PHYSICAL_ONLY` 策略一样，您仍然需要每周完整运行一次 `DBCC CHECKDB` 来捕获逻辑一致性错误或在内存中发生的损坏。如果您的环境具有公共基础架构，并且正在对所有数据库执行每晚完整备份，那么此选项非常有用，因为您将减少每晚的总体
  IO 量。然而，这是以备份窗口时长为代价的，并且在此期间会增加资源的使用。




  ##### 分工作业


  针对超大型数据库（VLDB）的另一项策略，可能是将 `DBCC CHECKDB` 的负载分散到多个晚上进行。例如，如果你的 VLDB 有多个文件组，那么你可以在周一、周三和周五对一半的文件组运行
  `DBCC CHECKFILEGROUP`，然后在周二、周四和周六对另一半的文件组运行。你可以将周日留出来，用于完整运行 `DBCC CHECKDB`。尽管如此，仍建议每周至少完整运行一次
  `DBCC CHECKDB`，因为 `DBCC CHECKFILEGROUP` 不会执行某些检查，例如验证 Service Broker 对象。


  如果你的问题是通用基础设施（而非 VLDB），那么你可以调整上述概念，在隔夜对数据库的子集轮流运行 `DBCC CHECKDB`。这可能有点复杂，因为此方法为了避开存储区域网络（SAN）的负载，需要基于大小（而非随机
  50/50 分割）智能地隔离数据库。这通常涉及到将维护例程集中到一个中央服务器，即中央管理服务器（CMS）。CMS 是一个 SQL Server 实例，位于你的
  SQL Server 环境中心，提供集中监控和维护功能。通常，对于像我这里描述的智能维护，CMS 会通过调度 PowerShell 脚本来控制维护例程，这些脚本会与存储在
  CMS 上的元数据交互，以决定运行哪些维护作业。


  ##### 卸载到辅助服务器


  减轻 `DBCC CHECKDB` 对生产系统负载的最终策略是将工作卸载到辅助服务器。如果你决定采用这种方法，需要先对 VLDB 进行完整备份，然后在辅助服务器上恢复该备份，之后才能在辅助服务器上运行
  `DBCC CHECKDB`。然而，这种方法有几个缺点。首先，也是最明显的一点是，这意味着你需要承担购买和维护一台专用辅助服务器的费用，仅用于运行一致性检查。这使它成为所讨论选项中最昂贵的一种（当然，除非你重复使用现有服务器，如用户验收测试（UAT）服务器）。此外，如果你发现损坏，你将无法确定损坏是在生产系统上产生并随备份复制过来的，还是实际上在辅助服务器上产生的。这意味着如果发现错误，你仍然需要在生产服务器上运行
  `DBCC CHECKDB`。


  ### 总结


  SQL Server 中可能发生多种类型的损坏。这些包括在文件系统级别损坏的页面、逻辑一致性错误以及校验和错误的损坏页面。页面也可能在内存中损坏，这种情况无法通过校验和识别。


  可以选择三种页面验证选项用于数据库。`NONE` 选项会让你完全暴露于各种问题之下，被认为是不良实践。`TORN_PAGE_DETECTION` 选项已弃用，不应使用，因为它仅检查每个
  512 字节扇区的前 2 个字节。最后一个选项是 `CHECKSUM`。这是默认选项，应始终选择。


  损坏的页面存储在 MSDB 数据库中一个名为 `dbo.suspect_pages` 的表中。在这里，每次遇到错误时，错误计数都会增加，并且页面的事件类型会更新，以指示它已根据情况被修复或还原。


  如果系统数据库（尤其是 Master）损坏，你可能无法启动实例。如果是这种情况，你可以通过运行安装程序并将 `ACTION` 参数设置为 `Rebuilddatabases`
  来纠正问题。或者，如果实例本身已损坏，则可以运行安装程序并将 `ACTION` 参数设置为 repair。这可以解决诸如注册表项损坏或资源数据库损坏等问题。


  `DBCC CHECKDB` 是你应该定期运行以检查损坏的命令。如果发现损坏，你也可以使用此命令来修复问题。根据损坏的性质，有两种可用的修复模式：`REPAIR_REBUILD`
  和 `REPAIR_ALLOW_DATA_LOSS`。仅当没有可用于还原数据库或损坏页面的备份时，才应将 `REPAIR_ALLOW_DATA_LOSS` 选项作为最后手段使用。这是因为
  `REPAIR_ALLOW_DATA_LOSS` 选项可能会释放损坏页面的空间，导致这些页面上的所有数据丢失。


  其他 DBCC 命令可用于执行 `DBCC CHECKDB` 功能的一个子集。这些包括 `DBCC CHECKTABLE`（可验证特定表的完整性）和 `DBCC
  CONSTRAINTS`（可用于验证外键和检查约束的完整性，尤其是在使用修复选项运行 `DBCC CHECKDB` 之后）。


  对于 VLDB 或共享基础设施的环境，运行 `DBCC CHECKDB` 可能会因为性能影响和资源利用率而成为问题。你可以通过采用在维护和性能目标之间提供折衷方案的策略来缓解此问题。这些策略包括分工作业、将工作负载卸载到辅助服务器，或者每晚仅运行检查功能的子集，然后每周执行一次完整检查。


  '
- "# 第三部分 安全、弹性与工作负载扩展\n\n## 10. SQL Server 安全模型\n\nSQL Server 2019 提供了一个复杂的安全模型，具有重叠的安全层，帮助数据库管理员（DBA）以可管理的方式应对风险和威胁。DBA\
  \ 理解 SQL Server 安全模型非常重要，这样他们才能以最符合其组织和应用程序需求的方式实施技术。本章讨论 SQL Server 安全层次结构，然后演示如何在实例、数据库和对象级别实施安全。我们还将讨论使用\
  \ SQL Audit 进行审核，以及通过安全报告（如数据发现与分类和漏洞评估）来协助法规遵从性。\n\n\n### 安全层级\n\nSQL Server 的安全层级始于\
  \ Windows 域级别，并逐级向下延伸，经过本地服务器、SQL Server 实例、数据库，直至对象级别。该模型基于 *主体*、*安全对象* 和 *权限*\
  \ 的概念。*主体* 是被授予权限、拒绝权限或撤销权限的实体。撤销权限意味着删除现有的授予或拒绝分配。组和角色是包含零个或多个安全主体的主体，通过允许你将权限作为一个单一单元分配给相似的主体，简化了安全管理。\n\
  \n*安全对象* 是可以被授予权限的对象——例如，实例级别的端点，或数据库内的表。因此，你将安全对象上的权限授予某个主体。图 10-1 中的图表概述了安全层级的每一级以及主体是如何分层的。\n\
  \n![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig1_HTML.jpg](img/333037_2_En_10_Fig1_HTML.jpg)\n\
  \n*图 10-1：安全主体层级*\n\n该图显示，在 SQL Server 实例中创建的登录名可以映射到本地 Windows 用户或组，或域用户或组。通常，在企业环境中，这是一个域用户或组。（*组*\
  \ 是被作为一个单元授予权限的用户集合。）这简化了安全管理。想象一下，一个新成员加入了销售团队。当他被添加到名为 `SalesTeam` 的域组时——该组已经拥有了访问文件系统位置、SQL\
  \ Server 数据库等所需的所有权限——他立即继承了履行其角色所需的所有权限。\n\n该图还说明了本地服务器帐户或域帐户及组如何映射到数据库级别的用户（一个没有登录名的数据库用户）。这是包含数据库功能的一部分。这项技术早在\
  \ SQL Server 2012 中就已引入，以支持使用 AlwaysOn 可用性组的高可用性。本章稍后将讨论包含数据库身份验证。\n\n然后，你可以将 Windows\
  \ 登录名（你在 SQL Server 实例级别创建的）或二级 SQL Server 登录名（如果你使用的是混合模式身份验证）添加到实例级别的固定服务器角色和用户定义服务器角色中。这样做允许你将通用权限集授予用户，用于实例级别的对象，如链接服务器和端点。你也可以将登录名映射到数据库用户。\n\
  \n数据库用户位于层级的数据库级别。你可以直接在数据库内的架构和对象上授予他们权限，或者可以将他们添加到数据库角色中。数据库角色类似于服务器角色，不同之处在于它们被授予了对数据库内部对象（如架构、表、视图、存储过程等）的通用权限集。\n\
  \n#### 创建 Chapter10 数据库\n\n在继续之前，我们现在将创建 `Chapter10` 数据库，本章中的示例将使用该数据库。这可以通过运行清单\
  \ 10-1 中的脚本来实现。\n\n```sql\n--Create Chapter10 database\nCREATE DATABASE Chapter10\
  \ ;\nGO\nUSE Chapter10\nGO\n--Create SensitiveData table\nCREATE TABLE dbo.SensitiveData\n\
  (\nID    INT    PRIMARY KEY    IDENTITY,\nSensitiveText        NVARCHAR(100)\n)\
  \ ;\n--Populate SensitiveData table\nDECLARE @Numbers TABLE\n(\nID        INT\n\
  )\n;WITH CTE(Num)\nAS\n(\nSELECT 1 AS Num\nUNION ALL\nSELECT Num + 1\nFROM CTE\n\
  WHERE Num < 100\n)\nINSERT INTO @Numbers\nSELECT Num\nFROM CTE ;\nINSERT INTO dbo.SensitiveData\n\
  SELECT 'SampleData'\nFROM @Numbers ;\n```\n\n### 实现实例级安全\n\n除非你使用的是包含数据库（本章稍后讨论），否则所有用户都必须在实例级别进行身份验证。你可以使用两种身份验证模式：Windows\
  \ 身份验证和混合模式身份验证。当你选择 Windows 身份验证时，会创建一个实例级别的登录名，并将其映射到 Windows 用户或组，该用户或组存在于域级别或本地服务器级别。\n\
  \n例如，假设有两个用户 Pete 和 Danielle。两人都有域帐户，`PROSQLADMIN\\Pete` 和 `PROSQLADMIN\\Danielle`。两人也是一个名为\
  \ `PROSQLADMIN\\SQLUsers` 的 Windows 组的成员。创建两个登录名，一个映射到 Pete 的帐户，一个映射到 Danielle 的帐户，在功能上等同于创建一个登录名，映射到\
  \ `SQLUsers` 组，前提是你授予完全相同的权限集。然而，创建两个单独的登录名可以对权限进行更精细的控制。\n\n当你创建一个映射到 Windows 用户或组的登录名时，SQL\
  \ Server 会记录此主体的 SID（安全标识符）并将其存储在 Master 数据库中。然后，它使用此 SID 来识别尝试连接的用户，依据是他们用来登录服务器或域的上下文。\n\
  \n除了创建映射到 Windows 用户或组的登录名外，你还可以将登录名映射到证书或非对称密钥。这样做并不允许用户使用证书进行实例身份验证，但它确实允许代码签名，从而可以将权限抽象到存储过程，而不是直接授予登录名。这在你使用动态\
  \ SQL（这会打破所有权链）时很有帮助；在这种场景下，当你运行存储过程时，SQL Server 会结合调用该过程的用户和映射到证书的用户的权限。所有权链将在本章稍后讨论。\n\
  \n但是，如果你为实例选择混合模式身份验证，那么除了使用前面描述的 Windows 身份验证外，用户还可以使用二级身份验证进行连接。当你使用二级身份验证时，你会创建一个\
  \ SQL 登录名，该登录名具有用户名和密码。此用户名和密码及其自身的 SID 一起存储在 Master 数据库中。当用户尝试进行实例身份验证时，她提供用户名和密码，系统会将其与存储的凭据进行验证。\n\
  \n当使用混合模式身份验证时，会存在一个名为 `SA` 的特殊用户。这是系统管理员帐户，它对整个实例拥有管理权限。这可能是一个安全漏洞，因为任何试图入侵 SQL\
  \ Server 实例的人都会首先尝试破解 `SA` 帐户的密码。因此，必须为该帐户使用非常强的密码。\n\n另一个安全提示是重命名 `SA` 帐户。这意味着潜在的黑客将不知道管理帐户的名称，这使得入侵实例变得更加困难。你可以使用清单\
  \ 10-2 中的命令重命名 `SA` 帐户。\n\n```sql\nALTER LOGIN sa WITH NAME = PROSQLADMINSA ;\n\
  ```\n\n就其本质而言，Windows 身份验证比二级身份验证更安全。因此，除非你有特定需要使用二级身份验证，否则最佳实践是将你的实例配置为仅使用 Windows\
  \ 身份验证。你可以在 SQL Server Management Studio 的“服务器属性”对话框的“安全性”选项卡中设置身份验证模式。你需要重启 SQL\
  \ Server 服务才能使更改生效。\n\n\n### 服务器角色\n\nSQL Server 提供了一套开箱即用的服务器角色，允许你将实例级权限分配给满足常见需求的登录名。这些被称为\
  \ `固定服务器角色`，你无法更改分配给它们的权限；只能添加或删除登录名。表 10-1 描述了这些固定服务器角色。\n\n**表 10-1** 固定服务器角色\n\
  \n| 角色 | 描述 |\n| --- | --- |\n| `sysadmin` | `sysadmin` 角色授予对整个实例的管理权限。`sysadmin`\
  \ 角色的成员可以在 SQL Server 关系引擎实例内执行任何操作。 |\n| `blkadmin` | 结合对数据库中目标表的 `INSERT` 权限，`bulkadmin`\
  \ 角色允许用户使用 `BULK INSERT` 语句从文件导入数据。此角色通常授予运行 ETL 过程的服务账户。 |\n| `dbcreator` | `dbcreator`\
  \ 角色允许其成员在实例中创建新数据库。用户创建数据库后，他将自动成为该数据库的所有者，并能够在其中执行任何操作。 |\n| `diskadmin` | `diskadmin`\
  \ 角色授予其成员在 SQL Server 中管理备份设备的权限。 |\n| `processadmin` | `processadmin` 角色的成员能够从\
  \ T-SQL 或 SSMS 停止实例。他们还能够终止正在运行的进程。 |\n| `public` | 所有 SQL Server 登录名都会添加到 `public`\
  \ 角色。虽然可以向 `public` 角色分配权限，但这不符合最小权限原则。此角色通常仅用于内部 SQL Server 操作，例如对 TempDB 进行身份验证。\
  \ |\n| `securityadmin` | `securityadmin` 角色的成员能够在实例级别管理登录名。例如，成员可以将登录名添加到服务器角色（`sysadmin`\
  \ 除外）或向实例级资源（如端点）分配权限。但是，他们无法在数据库内向数据库用户分配权限。 |\n| `serveradmin` | `Serveradmin`\
  \ 角色结合了 `diskadmin` 和 `processadmin` 角色的功能。此外，该角色的成员不仅能够启动或停止实例，还可以使用 `SHUTDOWN`\
  \ T-SQL 命令关闭实例。此处的细微差别在于，如果使用 `NOWAIT` 选项，`SHUTDOWN` 命令允许你选择不在每个数据库中运行 `CHECKPOINT`。此外，该角色的成员可以修改端点并查看所有实例元数据。\
  \ |\n| `setupadmin` | `setupadmin` 角色的成员能够创建和管理链接服务器。 |\n\n你还可以创建自己的服务器角色，将需要一组针对你的环境定制的常用权限的用户分组。例如，如果你有一个依赖于可用性组的高可用性环境，那么你可能希望创建一个名为\
  \ `AOAG` 的服务器角色，并向该组授予以下权限：\n\n*   `ALTER ANY AVAILABILITY GROUP`\n*   `ALTER ANY\
  \ ENDPOINT`\n*   `CREATE AVAILABILITY GROUP`\n*   `CREATE ENDPOINT`\n\n然后，你可以将初级\
  \ DBA 添加到此角色，他们不被授权拥有完整的 `sysadmin` 权限，但你希望他们管理实例的高可用性。你可以在 SSMS 中，通过右键单击 **安全性**\
  \ ➤ **服务器角色** 并选择 **新建服务器角色** 来创建此服务器角色。**新建服务器角色** 对话框的 **常规** 选项卡如图 10-2 所示。\n\
  \n![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig2_HTML.jpg](img/333037_2_En_10_Fig2_HTML.jpg)\n\
  \n**图 10-2** 常规选项卡\n\n你可以看到，我们已将角色名称指定为 `AOAG`，为角色指定了所有者，并选择了正在配置的实例下所需的权限。在对话框的\
  \ **成员** 选项卡中，我们可以搜索要添加到角色的现有登录名；在 **成员身份** 选项卡中，我们可以选择将角色嵌套在另一个服务器角色中。\n\n或者，你也可以通过\
  \ T-SQL 创建该组。清单 10-3 中的脚本也创建了这个组。我们将在本章后面将登录名添加到该角色。\n\n```sql\nUSE Master\nGO\n\
  CREATE SERVER ROLE AOAG AUTHORIZATION [WIN-KIAGK4GN1MJ\\Administrator] ;\nGO\nGRANT\
  \ ALTER ANY AVAILABILITY GROUP TO AOAG ;\nGRANT ALTER ANY ENDPOINT TO AOAG ;\nGRANT\
  \ CREATE AVAILABILITY GROUP TO AOAG ;\nGRANT CREATE ENDPOINT TO AOAG ;\nGO\n```\n\
  \n**清单 10-3** 创建服务器角色并分配权限\n\n\n\n### SQL Server 安全基础\n\n#### 登录名\n\n您可以通过 SSMS\
  \ 或 T-SQL 创建登录名。要通过 SSMS 创建登录名，请在`Security` -> `Logins`的上下文菜单中选择`New Login`。图 10-3\
  \ 显示了`Login - New`对话框的常规选项卡。\n\n![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig3_HTML.jpg](img/333037_2_En_10_Fig3_HTML.jpg)\n\
  \n图 10-3 常规选项卡\n\n您可以看到，我们将登录名命名为`Danielle`，并指定了 SQL Server 身份验证而非 Windows 身份验证。这意味着我们还必须指定一个密码并确认它。您可能还会注意到有三个框被选中：`Enforce\
  \ Password Policy`、`Enforce Password Expiration`和`User Must Change Password At Next\
  \ Login`。这三个选项是累加的，这意味着如果您没有同时选中`Enforce Password Policy`，则无法选中`Enforce Password\
  \ Expiration`。同样，如果不选中`Enforce Password Expiration`选项，也无法选中`User Must Change Password\
  \ At Next Login`。\n\n当您选中`Enforce Password Policy`选项时，SQL Server 会在域级别检查 Windows\
  \ 用户的密码策略，并将其应用于 SQL Server 登录名。因此，例如，如果您有一个域策略要求网络用户的密码长度为八个字符或更长，那么这对 SQL Server\
  \ 登录名也同样适用。如果您未选中此选项，则不会对登录名的密码强制执行任何密码策略。类似地，如果您选中了强制密码过期的选项，则过期时间取自域策略。\n\n我们还将登录名的默认数据库设置为`Chapter10`。这并没有为用户分配对`Chapter10`数据库的任何权限，但它指定了当用户对实例进行身份验证时，该数据库将是登录名的着陆区。这也意味着，如果用户没有对`Chapter10`数据库的权限，或者`Chapter10`数据库被删除或变得不可访问，用户将无法登录到该实例。\n\
  \n在`Server Roles`选项卡上，您可以将登录名添加到服务器角色中。在我们的例子中，我们选择不将登录名添加到任何其他服务器角色中。将登录名添加到服务器角色的内容将在本章的下一节讨论。\n\
  \n在`User Mapping`选项卡上，我们可以将登录名映射到数据库级别的用户。在此屏幕上，您应该在`Chapter10`数据库中创建一个数据库用户。每个数据库中的数据库用户名称默认与登录名相同。这不是强制性的，您可以更改数据库用户的名称；但是，保持名称一致是良好的实践。不这样做只会导致混淆，并增加您管理安全主体所需的时间。此时，我们还没有将用户添加到任何数据库角色中。数据库角色将在本章后面讨论。\n\
  \n在`Securables`选项卡上，我们可以搜索要在其上授予登录名权限的特定实例级对象。在`Status`选项卡上，我们可以授予或拒绝登录名登录到实例的权限，以及启用或禁用登录名。此外，如果因为输入错误密码次数过多而导致登录名被锁定，我们可以为用户解锁。失败的密码尝试次数基于服务器的组策略设置，但必须在登录名上使用`CHECK_POLICY`选项。\n\
  \n可以通过运行清单 10-4 中的脚本通过 T-SQL 创建相同的用户。您可以看到，为了达到相同的结果，需要多个命令。第一个创建登录名，其他的创建映射到该登录名的数据库用户。\n\
  \n```sql\nUSE Master\nGO\nCREATE LOGIN Danielle\nWITH PASSWORD=N'Pa$$w0rd' MUST_CHANGE,\
  \ DEFAULT_DATABASE=Chapter10,\nCHECK_EXPIRATION=ON, CHECK_POLICY=ON ;\nGO\nUSE Chapter10\n\
  GO\nCREATE USER Danielle FOR LOGIN Danielle ;\nGO\n```\n\n清单 10-4 创建 SQL Server\
  \ 登录名\n\n我们也可以使用`New Login`对话框或 T-SQL 来创建 Windows 登录名。如果使用 GUI，我们可以选择`Windows authentication`选项而不是`SQL\
  \ Server authentication`，然后搜索我们要将登录名映射到的用户或组。清单 10-5 演示了如何使用 T-SQL 创建 Windows 登录名。它将登录名映射到一个名为`Pete`的域用户，配置与`Danielle`相同。\n\
  \n```sql\nCREATE LOGIN [PROSQLADMIN\\pete] FROM WINDOWS WITH DEFAULT_DATABASE=Chapter10\
  \ ;\nGO\nUSE Chapter10\nGO\nCREATE USER [PROSQLADMIN\\pete] FOR LOGIN [PROSQLADMIN\\\
  pete] ;\n```\n\n清单 10-5 创建 Windows 登录名\n\n#### 授予权限\n\n向登录名分配权限时，可以使用以下操作：\n\n*\
  \   `GRANT`\n*   `DENY`\n*   `REVOKE`\n\n`GRANT`授予主体对安全对象的权限。您可以将`WITH`选项与`GRANT`一起使用，以向主体提供将相同权限分配给其他主体的能力。`DENY`明确拒绝主体对安全对象的权限；`DENY`优先于`GRANT`。因此，如果一个登录名是某个或某些服务器角色的成员，这些角色赋予了该登录名更改端点的权限，但该主体被明确拒绝了更改同一端点的权限，则该主体将无法管理该端点。`REVOKE`会移除与安全对象的权限关联。这包括`DENY`关联和`GRANT`关联。但是，如果登录名已通过服务器角色分配了权限，那么撤销针对该登录名本身对该安全对象的权限是没有效果的。为了产生效果，您需要使用`DENY`、从角色中移除权限或更改分配给角色的权限。\n\
  \n清单 10-6 中的命令授予`Danielle`更改任何登录名的权限，但随后明确拒绝了她更改服务帐户的权限。\n\n```sql\nGRANT ALTER\
  \ ANY LOGIN TO Danielle ;\nGO\nDENY ALTER ON LOGIN::[NT Service\\MSSQL$PROSQLADMIN]\
  \ TO Danielle ;\n```\n\n清单 10-6 授予和拒绝权限\n\n请注意为对象类（在此例中是登录名）分配权限与为特定对象分配权限在语法上的区别。对于对象类型，使用`ANY\
  \ [Object Type]`语法，但对于特定对象，我们使用`[Object Class]::[Securable]`。\n\n我们可以使用`ALTER SERVER\
  \ ROLE`语句向服务器角色添加或从中删除登录名。清单 10-7 演示了如何将`Danielle`添加到`sysadmin`角色，然后再将她移除。\n\n```sql\n\
  --Add Danielle to the sysadmin Role\nALTER SERVER ROLE sysadmin ADD MEMBER Danielle\
  \ ;\nGO\n--Remove Danielle from the sysadmin role\nALTER SERVER ROLE sysadmin DROP\
  \ MEMBER Danielle ;\nGO\n```\n\n清单 10-7 添加和移除服务器角色\n\n### 实现数据库级安全性\n\n我们已经了解了如何使用登录名和服务器角色管理实例级的安全性。在单个数据库级别的安全性具有类似的模型，由数据库用户和数据库角色组成。以下各节将描述此功能。\n\
  \n\n#### 数据库角色\n\n正如实例级别存在帮助管理权限的服务器角色一样，数据库级别也存在数据库角色，可以将主体分组在一起以分配共同的权限。有内置的数据库角色，但也可以定义自己的角色，以满足特定数据层应用程序的需求。\n\
  \nSQL Server 2019 中可用的内置数据库角色如表 10-2 所示。\n\n表 10-2\n数据库角色\n\n| 数据库角色 | 说明 |\n| ---\
  \ | --- |\n| `db_accessadmin` | 此角色的成员可以向数据库添加用户或从中删除数据库用户。 |\n| `db_backupoperator`\
  \ | `db_backupoperator` 角色赋予用户原生备份数据库所需的权限。对于第三方备份工具（如 CommVault 或 Backup Exec），它可能不起作用，因为这些工具通常需要\
  \ `sysadmin` 权限。 |\n| `db_datareader` | `db_datareader` 角色的成员可以对数据库中的任何表执行 `SELECT`\
  \ 语句。可以通过明确拒绝用户对特定表的权限来覆盖此设置。`DENY` 会覆盖 `GRANT`。 |\n| `db_datawriter` | `db_datawriter`\
  \ 角色的成员可以对数据库中的任何表执行 `DML`（数据操作语言）语句。可以通过明确拒绝用户对特定表的权限来覆盖此设置。`DENY` 将覆盖 `GRANT`。\
  \ |\n| `db_denydatareader` | `db_denydatareader` 角色拒绝其成员对数据库中每个表的 `SELECT` 权限。 |\n\
  | `db_denydatawriter` | `db_denydatawriter` 角色拒绝其成员对数据库中每个表执行 `DML` 语句的权限。 |\n|\
  \ `db_ddladmin` | 此角色的成员被授予对数据库中任何对象运行 `CREATE`、`ALTER` 和 `DROP` 语句的能力。此角色很少使用，但我曾见过一些示例或编写不佳的应用程序会动态创建数据库对象。如果你负责管理此类应用程序，那么\
  \ `ddl_admin` 角色可能很有用。 |\n| `db_owner` | `db_owner` 角色的成员可以在数据库中执行任何未被明确拒绝的操作。 |\n\
  | `db_securityadmin` | 此角色的成员可以授予、拒绝和撤销用户对安全对象的权限。他们还可以添加或删除角色成员，但 `db_owner` 角色除外。\
  \ |\n\n你可以在 SQL Server Management Studio 中创建自己的数据库角色，操作路径为：依次展开 `数据库` ➤ `你的数据库`\
  \ ➤ `安全性`，然后在对象资源管理器中数据库角色的上下文菜单中选择 `新建数据库角色`。这将显示 `数据库角色 - 新建` 对话框的 `常规` 选项卡。在这里，你应将角色名称指定为\
  \ `db_ReadOnlyUsers`，并声明该角色将由 `dbo` 所有。`dbo` 是 `sysadmin` 服务器角色成员所映射的系统用户。然后，我们使用了\
  \ `添加` 按钮将 Danielle 添加到该角色。\n\n在 `安全对象` 选项卡上，我们可以搜索要授予权限的对象，然后为这些对象选择适当的权限。图 10-4\
  \ 展示了搜索属于 `dbo` 架构对象的结果。接着，我们选择了该角色应对 `SensitiveData` 表拥有 `SELECT` 权限，但应明确拒绝 `DELETE`、`INSERT`\
  \ 和 `UPDATE` 权限。\n\n![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig4_HTML.jpg](img/333037_2_En_10_Fig4_HTML.jpg)\n\
  \n图 10-4\n安全对象选项卡\n\n因为当前我们的 `Chapter10` 数据库中只有一个表，所以此角色在功能上等同于将 Danielle 添加到内置的\
  \ `db_datareader` 和 `db_denydatawriter` 数据库角色。最大的区别在于，当我们在数据库中创建新表时，分配给我们的 `db_ReadOnlyUsers`\
  \ 角色的权限将继续仅适用于 `SensitiveData` 表。这与 `db_datareader` 和 `db_denydatawriter` 角色形成对比，后者会为任何新建的表分配相同的权限集。\n\
  \n创建 `db_ReadOnlyUsers` 角色的另一种方法是使用清单 10-8 中的 T-SQL 脚本。你可以看到我们不得不使用多个命令来设置该角色。第一条命令创建角色并使用\
  \ `AUTHORIZATION` 子句指定所有者。第二条命令将 Danielle 添加为角色的成员，随后的命令使用 `GRANT` 和 `DENY` 关键字为该主体分配对安全对象的适当权限。\n\
  \n```\n--Set Up the Role\nCREATE ROLE db_ReadOnlyUsers AUTHORIZATION dbo ;\nGO\n\
  ALTER ROLE db_ReadOnlyUsers ADD MEMBER Danielle ;\nGRANT SELECT ON dbo.SensitiveData\
  \ TO db_ReadOnlyUsers ;\nDENY DELETE ON dbo.SensitiveData TO db_ReadOnlyUsers ;\n\
  DENY INSERT ON dbo.SensitiveData TO db_ReadOnlyUsers ;\nDENY UPDATE ON dbo.SensitiveData\
  \ TO db_ReadOnlyUsers ;\nGO\n```\n\n清单 10-8\n创建数据库角色\n\n#### 提示\n\n尽管 `DENY` 赋值在某些场景下可能很有帮助——例如，当你想为除一个表之外的所有表分配安全对象权限时——但在结构良好的安全层级中，请谨慎使用它们。`DENY`\
  \ 赋值会增加安全管理的复杂性，并且在大多数情况下，你可以通过专门使用 `GRANT` 赋值来实施最小权限原则。\n\n\n### 架构（Schemas）\n\n\
  架构（Schemas）为数据库对象提供了一个逻辑命名空间，同时将对象与其所有者抽象分离。数据库中的每个对象都必须归某个数据库用户所有。在非常早期的 SQL Server\
  \ 版本中，这种所有权是直接的。换句话说，一个名为 Bob 的用户可能直接拥有十个独立的表。然而，从 SQL Server 2005 开始，这个模型发生了变化：现在\
  \ Bob 拥有一个架构，而这十个表则成为该架构的一部分。\n\n这种抽象简化了更改数据库对象所有权的过程；在这个例子中，要将十个表的所有者从 Bob 更改为\
  \ Colin，你只需在一处（架构）更改所有权，而不必在全部十个表上逐一更改。\n\n定义清晰的架构也有助于简化权限管理，因为你可以为主体分配对架构的权限，而不是对架构内各个对象的权限。例如，假设你有五个与销售相关的表——`OrderHeaders`、`OrderDetails`、`StockList`、`PriceList`\
  \ 和 `Customers`——将它们全部放入一个名为 `Sales` 的架构中，就可以将 `SELECT`、`UPDATE` 和 `INSERT` 权限应用在\
  \ `Sales` 架构上，从而授予 `SalesUsers` 数据库角色。然而，将权限分配给整个架构并不仅影响表。例如，授予对架构的 `SELECT` 权限也会授予对该架构内所有视图的\
  \ `SELECT` 权限。授予对架构的 `EXECUTE` 权限则会授予对该架构内所有存储过程和函数的 `EXECUTE` 权限。\n\n因此，设计良好的架构会按业务规则而非技术连接来分组表。请思考图\
  \ 10-5 中的实体关系图。\n\n![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig5_HTML.jpg](img/333037_2_En_10_Fig5_HTML.jpg)\n\
  \n图 10-5\n\n实体关系图\n\n对于此示例，一个良好的架构设计会涉及三个按业务职责划分的架构：`Sales`（销售）、`Procurement`（采购）和\
  \ `Accounts`（财务）。表 10-3 演示了如何划分这些表，以及如何通过数据库角色为这些表分配权限。\n\n表 10-3\n\n架构权限\n\n| 架构\
  \ | 表 | 数据库角色 | 权限 |\n| --- | --- | --- | --- |\n| `Sales` | `OrderHeader` `OrderDetails`\
  \ `Customers` `Addresses` | `Sales` | `SELECT`, `INSERT`, `UPDATE` |\n| | | `Accounts`\
  \ | `SELECT` |\n| `Procurement` | `Products` `Vendors` | `Purchasing` | `SELECT`,\
  \ `INSERT`, `UPDATE` |\n| | | `Sales` | `SELECT` |\n| | | `Accounts` | `SELECT`\
  \ |\n| `Accounts` | `Invoices` `CustAccountHistory` `VendAccountHistory` | `Accounts`\
  \ | `SELECT`, `INSERT`, `UPDATE` |\n\n清单 10-9 中的命令创建了一个名为 `CH10` 的架构，然后授予用户 Danielle\
  \ 对 `dbo` 架构的 `SELECT` 权限。这将隐式地授予她对所有在此架构内的表（包括尚未创建的新表）的 `SELECT` 权限。\n\n```sql\n\
  CREATE SCHEMA CH10 ;\nGO\nGRANT SELECT ON SCHEMA::CH10 TO Danielle ;\n```\n\n清单\
  \ 10-9\n\n授予对架构的权限\n\n若要在表创建后更改其所属架构，请使用 `ALTER SCHEMA TRANSFER` 命令，如清单 10-10 所示。此脚本在创建表时未指定架构，这意味着它会自动放入\
  \ `dbo` 架构，然后被移动到 `CH10` 架构。\n\n```sql\nCREATE TABLE TransferTest\n(\nID int\n)\
  \ ;\nGO\nALTER SCHEMA CH10 TRANSFER dbo.TransferTest ;\nGO\n```\n\n清单 10-10\n\n\
  在架构之间传输对象\n\n### 创建和管理包含式用户（Contained Users）\n\n我们已经了解了如何创建一个数据库用户，该用户映射到实例级别的登录名。然而，也可以创建一个不映射到服务器主体的数据库用户。这是为了支持一种称为\
  \ `包含式数据库（contained databases）` 的技术。\n\n`包含式数据库` 允许你通过隔离安全性等方面，减少数据库对实例的依赖。这使得数据库更容易在实例之间迁移，并有助于支持如第\
  \ 14 章讨论的 AlwaysOn 可用性组等技术。\n\n目前，SQL Server 支持 `NONE`（默认）和 `PARTIAL` 两种数据库包含级别。`PARTIAL`\
  \ 表示数据库支持包含式数据库用户，并且元数据使用相同的排序规则存储在数据库内部。但是，该数据库仍可以与非包含式功能（例如，映射到实例级别登录名的用户）进行交互。目前没有\
  \ `FULL`（完全）包含的选项，因为无法阻止数据库与其边界外的对象进行交互。\n\n要使用包含式数据库，你必须在实例和数据库两个级别启用它们。你可以通过 SQL\
  \ Server Management Studio 中的“服务器属性”和“数据库属性”对话框在两个级别启用它们。或者，你可以使用 `sp_configure`\
  \ 在实例级别启用，并使用 `ALTER DATABASE` 语句在数据库级别启用。清单 10-11 中的脚本演示了如何使用 T-SQL 为实例和 `Chapter10`\
  \ 数据库启用包含式数据库。要使用 `ALTER DATABASE` 命令，你需要将用户从数据库中断开连接。\n\n```sql\n--在实例级别启用包含式数据库\n\
  EXEC sp_configure 'show advanced options', 1 ;\nGO\nRECONFIGURE ;\nGO\nEXEC sp_configure\
  \ 'contained database authentication', '1' ;\nGO\nRECONFIGURE WITH OVERRIDE ;\n\
  GO\n--将 Chapter10 数据库设置为使用部分包含\nUSE Master\nGO\nALTER DATABASE [Chapter10] SET CONTAINMENT\
  \ = PARTIAL WITH NO_WAIT ;\nGO\n```\n\n清单 10-11\n\n启用包含式数据库\n\n一旦启用了包含式数据库，你就可以创建不与实例级别登录名关联的数据库用户。你可以使用清单\
  \ 10-12 中演示的语法，从 Windows 用户或组创建用户。此脚本创建了一个映射到 `Chapter10Users` 域组的数据库用户，并指定 `dbo`\
  \ 为默认架构。\n\n```sql\nUSE Chapter10\nGO\nCREATE USER [PROSQLADMIN\\Chapter10Users]\
  \ WITH DEFAULT_SCHEMA=dbo ;\nGO\n```\n\n清单 10-12\n\n从 Windows 登录名创建数据库用户\n\n或者，要创建一个不映射到实例级别登录名但仍然依赖第二层身份验证的数据库用户，可以使用清单\
  \ 10-13 中的语法。此脚本在 `Chapter10` 数据库中创建了一个名为 `ContainedUser` 的用户。\n\n```sql\nUSE Chapter10\n\
  GO\nCREATE USER ContainedUser WITH PASSWORD=N'Pa$$w0rd', DEFAULT_SCHEMA=dbo ;\n\
  GO\n```\n\n清单 10-13\n\n使用第二层身份验证创建数据库用户\n\n\n### 包含式数据库用户\n\n当使用包含式数据库用户时，你需要考虑许多额外的安全因素。首先，某些应用程序可能要求一个用户拥有多个数据库的权限。如果该用户映射到一个\
  \ Windows 用户或组，那么事情就很简单，因为被验证的 SID 就是该 Windows 对象的 SID。然而，如果数据库用户使用的是二级验证，那么就有可能复制第一个数据库中用户的\
  \ SID。例如，我们可以在 `Chapter10` 数据库中创建一个名为 `ContainedUser` 的用户，该用户将使用二级验证。然后，我们可以通过指定\
  \ SID，将此用户复制到 `Chapter10Twain` 数据库中，如代码清单 10-14 所示。在复制用户之前，该脚本首先创建了 `Chapter10Twain`\
  \ 数据库并将其配置为包含式。\n\n```sql\nUSE Master\nGO\nCREATE DATABASE Chapter10Twain ;\nGO\n\
  ALTER DATABASE Chapter10Twain SET CONTAINMENT = PARTIAL WITH NO_WAIT ;\nGO\nUSE\
  \ Chapter10Twain\nGO\nCREATE USER ContainedUser WITH PASSWORD = 'Pa$$w0rd',\nSID\
  \ = 0x0105000000000009030000009134B23303A7184590E152AE6A1197DF ;\n```\n代码清单 10-14\n\
  创建重复用户\n\n我们可以通过查询 `Chapter10` 数据库中的 `sys.database_principals` 目录视图来确定 SID，如代码清单\
  \ 10-15 所示。\n\n```sql\nSELECT sid\nFROM sys.database_principals\nWHERE name = 'ContainedUser'\
  \ ;\n```\n代码清单 10-15\n查找用户的 SID\n\n一旦我们在第二个数据库中复制了用户，我们还需要启用第一个数据库的 `TRUSTWORTHY`\
  \ 属性，以便允许进行跨数据库查询。我们可以使用代码清单 10-16 中的命令在 `Chapter10` 数据库中启用 `TRUSTWORTHY`。\n\n```sql\n\
  ALTER DATABASE Chapter10 SET TRUSTWORTHY ON ;\n```\n代码清单 10-16\n启用 TRUSTWORTHY\n\
  \n即使我们没有创建重复用户，如果启用了另一个数据库的 Guest 账户，包含式用户仍然可以通过该 Guest 账户访问其他数据库。这是一个技术要求，目的是让包含式用户能够访问\
  \ TempDB。\n\nDBA 在将包含式数据库附加到实例时也应谨慎，以确保不会无意中将权限授予本不应访问的用户。当你将数据库从预生产环境迁移到生产实例，而附加前未从数据库中移除\
  \ UAT（用户验收测试）或开发用户时，就可能发生这种情况。\n\n### 实现对象级安全性\n\n为数据库用户授予对象权限有两种语法变体。第一种使用 `OBJECT`\
  \ 短语，而第二种不使用。例如，代码清单 10-17 中的两个命令在功能上是等效的。\n\n```sql\nUSE Chapter10\nGO\n--使用 OBJECT\
  \ 符号授权\nGRANT SELECT ON OBJECT::dbo.SensitiveData TO [PROSQLADMIN\\Chapter10Users]\
  \ ;\nGO\n--不使用 OBJECT 符号授权\nGRANT SELECT ON dbo.SensitiveData TO [PROSQLADMIN\\\
  Chapter10Users] ;\nGO\n```\n代码清单 10-17\n分配权限\n\n许多权限可以被授予，但并非所有权限都与每个对象相关。例如，`SELECT`\
  \ 权限可以授予表或视图，但不能授予存储过程。而 `EXECUTE` 权限可以授予存储过程，但不能授予表或视图。\n\n在授予表权限时，可以授予特定列的权限，而不是整个表的权限。代码清单\
  \ 10-18 中的脚本授予用户 `ContainedUser` 对 `Chapter10` 数据库中 `SensitiveData` 表的 `SELECT`\
  \ 权限。但是，用户不能读取整个表，权限仅被授予 `SensitiveText` 列。\n\n```sql\nGRANT SELECT ON dbo.SensitiveData\
  \ ([SensitiveText]) TO ContainedUser ;\n```\n代码清单 10-18\n授予列级权限\n\n### 服务器审计\n\n\
  SQL Server 审计使 DBA 能够捕获针对实例级和数据库级活动的细粒度审计信息，并将此活动保存到文件、Windows 安全日志或 Windows 应用程序日志中。保存审计数据的位置称为*目标*。SQL\
  \ Server 审计对象位于实例级别，定义了审计和目标的属性。每个实例中可以有多个服务器审计。这在需要审计繁忙环境中的许多事件时很有用，因为你可以通过使用文件作为目标并将每个目标文件放在单独的卷上来分散\
  \ IO。\n\n从安全角度来看，选择正确的目标很重要。如果你选择 Windows 应用程序日志作为目标，那么任何经过服务器认证的 Windows 用户都能访问它。安全日志比应用程序日志安全得多，但为\
  \ SQL Server 审计进行配置也可能更复杂。运行 SQL Server 服务的服务账户需要在服务器的本地安全策略中拥有“生成安全审计”用户权限分配。还需要在审计策略中为成功和失败启用应用程序生成的审计。目标的另一个考虑因素是大小。如果你决定使用应用程序日志或安全日志，那么在开始将其用于审计之前，考虑并可能增加这些日志的大小是很重要的。此外，与你的\
  \ Windows 管理团队合作，决定当日志满时如何循环覆盖，以及是否通过将其备份到磁带进行归档。\n\n然后，SQL Server 审计可以与一个或多个服务器审计规范和数据库审计规范关联。这些规范分别定义了将在实例级和数据库级审计的活动。如果你正在审计许多操作，拥有多个服务器或数据库审计规范是有帮助的，因为你可以对它们进行分类以简化管理，同时仍将它们与同一个服务器审计关联。如果你计划在多个数据库中审计活动，实例内的每个数据库都需要自己的数据库审计规范。\n\
  \n### 创建服务器审计\n\n创建服务器审计时，可以使用表 10-4 中详述的选项。\n\n**表 10-4 服务器审计选项**\n\n| 选项 | 描述\
  \ |\n| --- | --- |\n| `FILEPATH` | 仅在选择文件目标时适用。指定将生成审计日志的文件路径。 |\n| `MAXSIZE` |\
  \ 仅在选择文件目标时适用。指定审计文件可以增长到的最大大小。可以为此指定的最小大小为 2MB。 |\n| `MAX_ROLLOVER_FILES` | 仅在选择文件目标时适用。当审计文件已满时，您可以循环该文件或生成一个新文件。`MAX_ROLLOVER_FILES`\
  \ 设置控制在开始循环之前可以生成多少个新文件。默认值为 `UNLIMITED`，但指定一个数字会将文件数量限制在此上限内。如果将其设置为 0，则将始终只有一个文件，并且每次文件填满时都会循环。任何大于\
  \ 0 的值表示允许的滚动文件数。例如，如果指定 5，那么总共最多将有六个文件。 |\n| `MAX_FILES` | 仅在选择文件目标时适用。作为 `MAX_ROLLOVER_FILES`\
  \ 的替代选项，`MAX_FILES` 设置指定了可以生成的审计文件数量的限制，但当达到此数目时，日志不会循环。相反，审计将失败，并且导致审计操作发生的事件将根据\
  \ `ON_FAILURE` 的设置进行处理。 |\n| `RESERVE_DISK_SPACE` | 仅在选择文件目标时适用。预分配与 `MAXSIZE` 中设置的值相等的卷上空间，而不是允许审计日志按需增长。\
  \ |\n| `QUEUE_DELAY` | 指定审计事件是同步写入还是异步写入。如果设置为 0，事件将同步写入日志。否则，指定在强制写入事件之前可以经过的持续时间（以毫秒为单位）。默认值为\
  \ 1000（1 秒），这也是最小值。 |\n| `ON_FAILURE` | 指定如果导致审计的事件无法审计到日志中时应该发生的情况。可接受的值为 `CONTINUE`、`SHUTDOWN`\
  \ 或 `FAIL_OPERATION`。当指定 `CONTINUE` 时，允许操作继续。这可能导致发生未经审计的活动。`FAIL_OPERATION` 使可审计事件失败，但允许其他操作继续。`SHUTDOWN`\
  \ 强制在实例无法将可审计事件写入日志时停止实例。 |\n| `AUDIT_GUID` | 由于服务器和数据库审计规范通过 GUID 链接到服务器审计，因此有时审计规范可能会成为孤立状态。这包括将数据库附加到实例时或实施诸如数据库镜像等技术时。此选项允许您为服务器审计指定特定的\
  \ GUID，而不是让 SQL Server 生成一个新的 GUID。 |\n\n也可以在服务器审计上创建筛选器。当您的审计规范捕获针对整个对象类的活动，但您只对审计其中的一个子集感兴趣时，这可能很有用。例如，您可能配置了一个服务器审计规范来记录对服务器角色的任何成员更改；但是，您实际上只对\
  \ `sysadmin` 服务器角色成员被修改感兴趣。在这种情况下，您可以筛选 `sysadmin` 角色。\n\n您可以通过 SQL Server Management\
  \ Studio (SSMS) 中的 GUI 创建服务器审计：在对象资源管理器中浏览到“安全性”，然后从“审计”节点中选择“新建审计”。图 10-6 展示了“创建审计”对话框。\n\
  \n![创建审计对话框图片](img/333037_2_En_10_Fig6_HTML.jpg)\n\n**图 10-6 “常规”选项卡**\n\n您可以看到我们决定将审计保存到平面文件，而不是\
  \ Windows 日志。因此，我们需要指定与文件相关的参数。我们将文件设置为滚动，并将任何单个文件的最大大小强制为 512MB。我们保留审计条目在强制写入日志之前的持续时间的默认值\
  \ 1 秒（1000 毫秒），并将审计命名为 `Audit-ProSQLAdmin`。\n\n在“创建审计”对话框的“筛选器”选项卡上，您应指定希望基于 `object_name`\
  \ 进行筛选，并且仅审计对 `sysadmin` 角色的更改。\n\n或者，我们可以使用 T-SQL 执行相同的操作。代码清单 10-19 中的脚本创建了相同的服务器审计。\n\
  \n```sql\nUSE Master\nGO\nCREATE SERVER AUDIT [Audit-ProSQLAdmin]\nTO FILE\n(  \
  \      FILEPATH = N'c:\\audit'\n,MAXSIZE = 512 MB\n,MAX_ROLLOVER_FILES = 2147483647\n\
  ,RESERVE_DISK_SPACE = OFF\n)\nWITH\n(        QUEUE_DELAY = 1000\n,ON_FAILURE = CONTINUE\n\
  )\nWHERE object_name = 'sysadmin' ;\n```\n**代码清单 10-19 创建服务器审计**\n\n### 创建服务器审计规范\n\
  \n要通过 SSMS 创建服务器审计规范，我们可以在对象资源管理器中浏览到“安全性”，然后从“服务器审计规范”上下文菜单中选择“新建服务器审计规范”。这将显示“创建服务器审计规范”对话框，如图\
  \ 10-7 所示。\n\n![创建服务器审计规范对话框图片](img/333037_2_En_10_Fig7_HTML.jpg)\n\n**图 10-7 服务器审计规范对话框**\n\
  \n您可以看到我们选择了 `SERVER_ROLE_MEMBER_CHANGE_GROUP` 作为审计操作类型。这将审计服务器角色成员资格的任何添加或删除。但是，结合我们在服务器审计对象上设置的筛选器，新结果是将只记录对\
  \ `sysadmin` 服务器角色的更改。我们还从“审计”下拉框中选择了 `Audit-ProSQLAdmin` 审计，以将对象关联起来。\n\n或者，我们可以通过运行代码清单\
  \ 10-20 中的命令使用 T-SQL 创建相同的服务器审计规范。在此命令中，我们使用 `FOR SERVER AUDIT` 子句将服务器审计规范链接到 `Audit-ProSQLAdmin`\
  \ 服务器审计，并使用 `ADD` 子句指定要捕获的审计操作类型。\n\n```sql\nCREATE SERVER AUDIT SPECIFICATION [ServerAuditSpecification-ProSQLAdmin]\n\
  FOR SERVER AUDIT [Audit-ProSQLAdmin]\nADD (SERVER_ROLE_MEMBER_CHANGE_GROUP) ;\n\
  ```\n**代码清单 10-20 创建服务器审计规范**\n\n\n#### 启用和调用审计\n\n尽管我们已经创建了服务器审计和服务器审计规范，但在开始收集任何数据之前，我们需要先启用它们。我们可以通过在对象资源管理器中右键单击每个对象并从上下文菜单中选择\
  \ `启用`，或者通过修改对象并在 T-SQL 中将其 `STATE` 设置为 `ON` 来实现这一点。如代码清单 10-21 所示。\n\n```\nALTER\
  \ SERVER AUDIT [Audit-ProSQLAdmin] WITH (STATE = ON) ;\nALTER SERVER AUDIT SPECIFICATION\
  \ [ServerAuditSpecification-ProSQLAdmin]\nWITH (STATE = ON) ;\n代码清单 10-21\n启用审计\n\
  ```\n\n现在，我们使用代码清单 10-22 中的脚本将 Danielle 登录名添加到 `sysadmin` 服务器角色中，以便检查我们的审计是否正在工作。\n\
  \n```\nALTER SERVER ROLE sysadmin ADD MEMBER Danielle ;\n代码清单 10-22\n触发审计\n```\n\
  \n我们期望服务器审计规范的定义能捕获这两个操作，但 `WHERE` 子句已将应用于服务器审计的第一个操作过滤掉了。如果我们在对象资源管理器中右键单击 `Audit-ProSQLAdmin`\
  \ 服务器审计并选择 `查看审计日志`，如图 10-8 所示，我们可以看到它按预期工作，并可以查看已捕获的审计条目。\n\n![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig8_HTML.jpg](img/333037_2_En_10_Fig8_HTML.jpg)\n\
  \n图 10-8\n审计日志文件查看器\n\n我们可以看到已捕获了细粒度的信息。最值得注意的是，这些信息包括触发审计的完整语句、涉及的数据库和对象、目标登录名以及运行该语句的登录名。\n\
  \n#### 数据库审计规范\n\n数据库审计规范类似于服务器审计规范，但它指定的是数据库级别而非实例级别的审计要求。为了演示此功能，我们将 Danielle\
  \ 登录映射到此数据库中的一个用户，并授予其对 `SensitiveData` 表的 `SELECT` 权限。我们还创建了一个名为 `Audit-Chapter10`\
  \ 的新服务器审计，我们的数据库审计规范将附加到该审计。这些操作在代码清单 10-23 中执行。在执行脚本前，请根据你自己的配置修改文件路径。\n\n```\n\
  USE Master\nGO\n--创建 Chapter10Audit 数据库\nCREATE DATABASE Chapter10Audit\nGO\nUSE\
  \ Chapter10Audit\nGO\nCREATE TABLE dbo.SensitiveData (\nID    INT    PRIMARY KEY\
  \    NOT NULL,\nData    NVARCHAR(256) NOT NULL\n) ;\n--创建服务器审计\nUSE master\nGO\n\
  CREATE SERVER AUDIT [Audit-Chapter10Audit]\nTO FILE\n(        FILEPATH = N'C:\\\
  Audit'\n,MAXSIZE = 512 MB\n,MAX_ROLLOVER_FILES = 2147483647\n,RESERVE_DISK_SPACE\
  \ = OFF\n)\nWITH\n(        QUEUE_DELAY = 1000\n,ON_FAILURE = CONTINUE\n) ;\nUSE\
  \ Chapter10Audit\nGO\n--根据 Danielle 登录创建数据库用户\nCREATE USER Danielle FOR LOGIN Danielle\
  \ WITH DEFAULT_SCHEMA=dbo ;\nGO\nGRANT SELECT ON dbo.SensitiveData TO Danielle ;\n\
  代码清单 10-23\n创建 Chapter10Audit 数据库\n```\n\n我们现在希望创建一个数据库审计规范，用于捕获任何用户对 `SensitiveData`\
  \ 表进行的任何 `INSERT` 语句，同时也专门捕获 Danielle 运行的 `SELECT` 语句。\n\n我们可以通过在 SQL Server Management\
  \ Studio 中导航到 `Chapter10Audit` 数据库 ➤ `安全性`，然后右键单击 `数据库审计规范` 并选择 `新建数据库审计规范` 来创建数据库审计规范。这将调用\
  \ `新建数据库审计规范` 对话框，如图 10-9 所示。\n\n![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig9_HTML.jpg](img/333037_2_En_10_Fig9_HTML.jpg)\n\
  \n图 10-9\n数据库审计规范对话框\n\n你可以看到，我们将数据库审计规范命名为 `DatabaseAuditSpecification-Chapter10-SensitiveData`，并使用下拉列表将其链接到\
  \ `Audit-Chapter10` 服务器审计。在屏幕的下半部分，我们指定了两种审计操作类型：`INSERT` 和 `SELECT`。因为我们指定的对象类是\
  \ `OBJECT`，而不是其他可用选项 `DATABASE` 或 `SCHEMA`，所以我们还需要指定要审计的表的对象名称。因为我们只想审计 Danielle\
  \ 的 `SELECT` 活动，所以我们为 `SELECT` 操作类型的主体字段添加此用户，但我们为 `INSERT` 操作类型的主体添加了 `Public`\
  \ 角色。这是因为所有数据库用户都将是 `Public` 角色的成员，因此，无论用户是谁，所有 `INSERT` 活动都将被捕获。\n\n#### 提示\n\n\
  你可以通过运行查询 `SELECT * FROM sys.dm_audit_class_type_map` 来显示完整的审计类类型列表。你可以通过运行查询 `SELECT\
  \ * FROM sys.dm_audit_actions` 来找到可审计操作的完整列表。\n\n我们可以使用 `CREATE DATABASE AUDIT SPECIFICATION`\
  \ 语句在 T-SQL 中创建相同的数据库审计规范，如代码清单 10-24 所示。\n\n```\nUSE Chapter10Audit\nGO\nCREATE\
  \ DATABASE AUDIT SPECIFICATION [DatabaseAuditSpecification-Chapter10-SensitiveData]\n\
  FOR SERVER AUDIT [Audit-Chapter10]\nADD (INSERT ON OBJECT::dbo.SensitiveData BY\
  \ public),\nADD (SELECT ON OBJECT::dbo.SensitiveData BY Danielle) ;\n代码清单 10-24\n\
  创建数据库审计规范\n```\n\n就像处理服务器审计规范一样，我们需要在开始收集任何信息之前启用数据库审计规范。代码清单 10-25 中的脚本启用了 `Audit-Chapter10`\
  \ 和 `DatabaseAuditSpecification-Chapter10-SensitiveData`。\n\n```\nUSE Chapter10Audit\n\
  GO\nALTER DATABASE AUDIT SPECIFICATION [DatabaseAuditSpecification-Chapter10-SensitiveData]\n\
  WITH (STATE = ON) ;\nGO\nUSE Master\nGO\nALTER SERVER AUDIT [Audit-Chapter10] WITH\
  \ (STATE = ON) ;\n代码清单 10-25\n启用数据库审计规范\n```\n\n为了测试安全性，SQL Server 允许你模拟用户。为此，你必须是系统管理员，或者已被授予对该用户的\
  \ `模拟` 权限。代码清单 10-26 中的脚本模拟用户 Danielle 以检查审计是否成功。它通过使用 `EXECUTE AS USER` 命令来实现这一点。`REVERT`\
  \ 命令将安全上下文切换回运行脚本的用户。\n\n```\nUSE Chapter10Audit\nGO\nGRANT INSERT, UPDATE ON dbo.sensitiveData\
  \ TO Danielle ;\nGO\nINSERT INTO dbo.SensitiveData (SensitiveText)\nVALUES ('testing')\
  \ ;\nGO\nUPDATE dbo.SensitiveData\nSET SensitiveText = 'Boo'\nWHERE ID = 2 ;\nGO\n\
  EXECUTE AS USER ='Danielle'\nGO\nINSERT dbo.SensitiveData (SensitiveText)\nVALUES\
  \ ('testing again') ;\nGO\nUPDATE dbo.SensitiveData\nSET SensitiveText = 'Boo'\n\
  WHERE ID = 1 ;\nGO\nREVERT\n代码清单 10-26\n使用模拟测试安全性\n\n\n#### 审核审计行为\n\n截至目前我们所实施的审计机制存在一个安全漏洞。若拥有服务器审计管理权限的管理员怀有恶意，他们可在执行恶意操作前更改审计规范，并在事后将审计配置恢复原状以消除痕迹，从而逃避追责。\n\
  \n不过，服务器审计功能允许您对审计行为本身进行审核，以此抵御此类威胁。若在服务器审计规范或数据库审计规范中添加 `AUDIT_CHANGE_GROUP`，则任何对规范的修改都将被记录。\n\
  \n以 `Audit-Chapter10` 服务器审计和 `DatabaseAuditSpecification-Chapter10` 数据库审计规范为例，我们正在审核任何用户对\
  \ `SensitiveData` 表执行的所有 `INSERT` 语句。为防止特权用户恶意向该表插入数据且不留痕迹，可使用清单 10-27 中的脚本添加 `AUDIT_CHANGE_GROUP`。注意：在进行更改前必须先禁用数据库审计规范，修改完成后再重新启用。\n\
  \n```sql\nUSE Chapter10Audit\nGO\nALTER DATABASE AUDIT SPECIFICATION [DatabaseAuditSpecification-Chapter10-SensitiveData]\n\
  WITH (STATE=OFF) ;\nGO\nALTER DATABASE AUDIT SPECIFICATION [DatabaseAuditSpecification-Chapter10-SensitiveData]\n\
  ADD (AUDIT_CHANGE_GROUP) ;\nGO\nALTER DATABASE AUDIT SPECIFICATION [DatabaseAuditSpecification-Chapter10-SensitiveData]\n\
  WITH(STATE = ON) ;\nGO\n清单 10-27\n添加 AUDIT_CHANGE_GROUP\n```\n\n执行此命令后，我们对审计配置所做的任何修改都将被记录。若查看审计日志，可看到\
  \ `Administrator` 登录账户对 `SensitiveData` 表移除 `INSERT` 审核的操作已被捕获。\n\n### 安全报告\n\n\
  在实施安全措施时，数据库管理员还应考虑法规遵从性，例如 GDPR 和 SOX。许多法规要求企业证明其清楚自身持有的敏感数据及访问权限情况。\n\nSQL Server\
  \ 通过两项名为“SQL 数据发现与分类”和“漏洞评估”的功能为此过程提供支持。后续章节将分别讨论这两项功能。\n\n#### 提示\n\n后续章节的演示将使用\
  \ `WideWorldImporters` 示例数据库。可从 [`https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0`](https://github.com/Microsoft/sql-server-samples/releases/tag/wide-world-importers-v1.0)\
  \ 获取该数据库。\n\n#### SQL 数据发现与分类\n\nSQL 数据发现与分类功能内置于 SQL Server Management Studio 中，它会首先分析数据库中的列，根据列名尝试识别可能包含敏感信息的列。在您审核并修正这些分类后，可为列添加标签，标明其包含的敏感信息类型。这些信息可通过报告查看，也可导出用于与审计人员沟通。\n\
  \n要使用此功能，请在目标数据库的右键菜单中选择 `任务` ➤ `数据发现和分类` ➤ `分类数据`。此时将显示 `数据分类` 对话框。您可点击 `添加分类`\
  \ 展开侧边栏，或点击窗口底部的 `建议` 栏查看基于列名生成的分类建议，如图 10-10 所示。\n\n![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig10_HTML.jpg](img/333037_2_En_10_Fig10_HTML.jpg)\n\
  *图 10-10：查看分类建议*\n\n在此界面中，您可通过复选框选择要接受的建议，或使用下拉菜单修改建议（更改信息类型和敏感度标签）。保持复选框空白可忽略某些建议，也可使用\
  \ `添加分类` 侧边栏手动添加分类可能遗漏的列。确认选择后，点击 `接受所选建议` 按钮，再点击 `保存` 按钮，即可为列添加扩展属性。\n\n点击 `查看报告`\
  \ 按钮将生成详细报告，可导出为 Word、Excel 或 PDF 格式，便于提交给审计人员。报告输出示例如图 10-11 所示。\n\n![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig11_HTML.jpg](img/333037_2_En_10_Fig11_HTML.jpg)\n\
  *图 10-11：SQL 数据分类报告*\n\n#### 漏洞评估\n\n漏洞评估是 SQL Server Management Studio 内置的实用工具，可扫描并报告数据库中的潜在安全问题。这免去了数据库管理员在部署后手动检查所有项目或编写定期运行脚本的麻烦。在目标数据库的右键菜单中选择\
  \ `任务` ➤ `漏洞评估` ➤ `扫描漏洞` 即可使用该功能。此时将显示 `扫描漏洞` 对话框，您可在此选择报告保存路径。\n\n退出此对话框后将生成报告，如图\
  \ 10-12 所示。报告包含两个选项卡：第一个选项卡详细列出未通过的检查项，第二个选项卡详细列出已执行并通过的检查项。问题将按风险等级（`低`、`中` 或 `高`）分类显示。\n\
  \n![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig12_HTML.jpg](img/333037_2_En_10_Fig12_HTML.jpg)\n\
  *图 10-12：漏洞评估结果*\n\n选择某个结果后，报告中将显示附加面板，提供问题的详细视图，如图 10-13 所示。此处将提供问题描述、修复方法详情以及用于确定检查结果的查询脚本副本。\n\
  \n![../images/333037_2_En_10_Chapter/333037_2_En_10_Fig13_HTML.jpg](img/333037_2_En_10_Fig13_HTML.jpg)\n\
  *图 10-13：详细视图*\n\n若某项未通过检查的结果在特定数据库中属于预期情况（例如该数据库无需实施透明数据加密），则可对该问题点击 `批准为基线` 按钮。这意味着下次扫描时该结果将不再显示为失败。通过点击\
  \ `清除基线` 按钮，可将基线重置为默认设置。\n\n\n# 11. 加密\n\n### 概要\n\nSQL Server 提供了一个复杂的安全框架来管理权限，该框架包含多个相互重叠的层级。在实例级别，您可以基于\
  \ Windows 用户或组创建登录名，也可以创建二级登录名，其密码存储在数据库引擎内部。二级身份验证要求在实例级别启用混合模式身份验证。\n\n服务器角色允许将登录名分组，以便可以为它们分配共同的权限。这减轻了安全管理的管理开销。SQL\
  \ Server 为常见场景提供了内置的服务器角色，您也可以创建满足数据层应用程序需求的自定义服务器角色。\n\n在数据库级别，登录名可以映射到数据库用户。如果您使用的是包含数据库，那么还可以创建直接映射到\
  \ Windows 安全主体或具有自己二级身份验证凭据的数据库用户。这可以通过消除对实例级别登录名的依赖，帮助将数据库与实例隔离。这有助于提高数据库的可移植性，但需要额外考虑安全问题。\n\
  \n细粒度权限可能变得难以管理，尤其是在需要在列级别保护数据时。SQL Server 提供了所有权链，可以降低这种复杂性。通过所有权链，可以针对视图分配权限，而不是针对底层表。甚至可以跨多个数据库使用所有权链，当然，这本身也会带来复杂性。为了使所有权链成功，链中的所有对象必须共享同一个所有者。否则所有权链将被中断，并且需要对底层对象的权限进行评估。\n\
  \n服务器审核允许在实例和数据库级别对活动进行细粒度审计。它还包括审计审计本身的能力，从而消除了特权用户恶意绕过审计的威胁。您可以将审核保存到操作系统中的文件，并通过\
  \ NTFS 控制权限。或者，您可以将审核保存到 Windows 安全日志或 Windows 应用程序日志中。\n\n加密是一种使用算法（该算法使用密钥和证书）来混淆数据的过程，因此如果安全性被绕过，数据被未授权用户访问或窃取，那么这些数据将变得无用，除非同时也获得了用于加密它的密钥。这在访问控制之上增加了一个额外的安全层，但它并不能取代访问控制实施的需要。加密数据也有可能显著降低性能，因此您应该基于需要来使用它，而不是作为常规操作在所有数据上实施。\n\
  \n在本章中，我们将讨论 SQL Server 加密层次结构，然后演示如何实现透明数据加密（TDE）以及单元级加密。我们还将讨论 Always Encrypted\
  \ 和安全飞地。\n\n### 加密层次结构\n\nSQL Server 提供了通过密钥和证书的层次结构对数据进行加密的能力。层次结构中的每一层都对它下面的一层进行加密。\n\
  \n#### 加密概念\n\n在我们详细讨论层次结构之前，了解与加密相关的概念很重要。以下各节概述了加密中涉及的主要组件。\n\n##### 对称密钥\n\n\
  `对称密钥`是一种可用于加密数据的算法。它是最弱的一种加密形式，因为它使用相同的算法来加密和解密数据。它也是性能开销最小的加密方法。您可以使用密码或另一个密钥或证书来加密对称密钥。\n\
  \n##### 非对称密钥\n\n与使用相同算法加密和解密数据的对称密钥相比，`非对称密钥`使用一对密钥或算法。您可以使用一个仅用于加密，另一个仅用于解密。用于加密数据的密钥称为`私钥`，用于解密数据的密钥称为`公钥`。\n\
  \n##### 证书\n\n证书由称为`证书颁发机构 (CA)`的可信来源颁发。它使用非对称密钥，并提供数字签名声明，将公钥绑定到持有相应私钥的主体或设备。\n\
  \n##### Windows 数据保护 API\n\n`Windows 数据保护 API (DPAPI)` 是随 Windows 操作系统一起提供的加密应用程序编程接口\
  \ (API)。它允许使用用户或域机密信息对密钥进行加密。`DPAPI` 用于加密 `服务主密钥`，该密钥是 SQL Server 加密层次结构的顶层。\n\n\
  #### SQL Server 加密概念\n\nSQL Server 的加密功能依赖于密钥和证书的层次结构，根级别是 `服务主密钥`。以下各节描述了主密钥的用途以及\
  \ SQL Server 的加密层次结构。\n\n##### 主密钥\n\nSQL Server 加密层次结构的根级别是 `服务主密钥`。`服务主密钥`在实例构建时自动创建，并用于使用\
  \ `DPAPI` 加密数据库主密钥、凭据和链接服务器的密码。`服务主密钥`存储在 Master 数据库中，每个实例始终只有一个。在 SQL Server 2012\
  \ 及更高版本中，`服务主密钥`是使用 `AES 256` 算法生成的对称密钥。这与使用 `Triple DES` 算法的旧版 SQL Server 形成对比。\n\
  \n由于 SQL Server 2012 及更高版本使用了新的加密算法，当您从 SQL Server 2008 R2 或更早版本升级实例时，建议重新生成密钥。\n\
  \n然而，重新生成 `服务主密钥`的问题在于，它涉及解密然后重新加密层次结构中位于其下方的每个密钥和证书。这是一个非常耗费资源的过程，应仅在维护窗口期间尝试。\n\
  \n您可以使用清单 11-1 中的命令重新生成 `服务主密钥`。但您应该注意，如果该过程未能解密和重新加密其层次结构下方的任何密钥，则整个重新生成过程将失败。您可以使用\
  \ `FORCE` 关键字更改此行为。`FORCE` 关键字强制该过程在错误后继续。请注意，这将导致任何无法解密和重新加密的数据变得不可用。您将无法重新获得对这些数据的访问权限。\n\
  \n```sql\nALTER SERVICE MASTER KEY REGENERATE\n```\n\n*清单 11-1*\n*重新生成服务主密钥*\n\n\
  由于 `服务主密钥`至关重要，因此必须在创建或重新生成后备份它，并将其存储在安全、异地的位置，以便用于灾难恢复。如果您将实例迁移到其他服务器以避免加密层次结构出现问题，也可以还原此密钥的备份。清单\
  \ 11-2 中的脚本演示了如何备份和还原 `服务主密钥`。如果您还原的主密钥相同，则 SQL Server 会通知您，并且无需重新加密数据。\n\n```sql\n\
  BACKUP SERVICE MASTER KEY\nTO FILE = 'c:\\keys\\service_master_key'\nENCRYPTION\
  \ BY PASSWORD = 'Pa$$w0rd'\n\nRESTORE SERVICE MASTER KEY\nFROM FILE = 'c:\\keys\\\
  service_master_key'\nDECRYPTION BY PASSWORD = 'Pa$$w0rd'\n```\n\n*清单 11-2*\n*备份和还原服务主密钥*\n\
  \n\n#### 提示\n\n`service_master_key` 是密钥文件的名称，而非文件夹。按照惯例，它没有文件扩展名。\n\n与重新生成服务主密钥时一样，在还原它时也可以使用\
  \ `FORCE` 关键字，但这会产生相同的后果。\n\n数据库主密钥是一个对称密钥，使用 AES 256 算法加密，用于加密存储在数据库内的私钥和证书。它使用一个密码进行加密，但会创建一份副本，该副本使用服务主密钥进行加密。这使得数据库主密钥在需要时可以自动打开。如果此副本不存在，则需要手动打开它。这意味着必须显式地打开密钥，才能使用它加密的密钥。数据库主密钥的副本存储在数据库内，另一份副本存储在\
  \ `Master` 数据库内。可以使用清单 11-3 中的命令创建数据库主密钥。\n\n```\nCREATE DATABASE Chapter11MasterKeyExample\
  \ ;\nGO\nUSE Chapter11MasterKeyExample\nGO\nCREATE MASTER KEY ENCRYPTION BY PASSWORD\
  \ = 'Pa$$w0rd'\n清单 11-3\n创建数据库主密钥\n```\n\n与服务主密钥一样，数据库主密钥应该备份并存储在安全的异地位置。可以使用清单\
  \ 11-4 中的命令备份和还原数据库主密钥。\n\n```\nBACKUP MASTER KEY TO FILE = 'c:\\keys\\Chapter11_master_key'\n\
  ENCRYPTION BY PASSWORD = 'Pa$$w0rd';\nRESTORE MASTER KEY\nFROM FILE = 'c:\\keys\\\
  Chapter11_master_key'\nDECRYPTION BY PASSWORD = 'Pa$$w0rd' --备份文件中的密码\nENCRYPTION\
  \ BY PASSWORD = 'Pa$$w0rd'; --数据库中将用于加密的密码\n清单 11-4\n备份和还原数据库主密钥\n```\n\n与服务主密钥一样，如果还原过程无法解密和重新加密层次结构中位于其下方的任何密钥，则还原会失败。可以使用\
  \ `FORCE` 关键字强制还原成功，但这样做会永久失去对使用那些无法解密和重新加密的密钥加密的数据的访问权限。\n\n##### 层次结构\n\nSQL Server\
  \ 加密层次结构如图 11-1 所示。\n\n![../images/333037_2_En_11_Chapter/333037_2_En_11_Fig1_HTML.jpg](img/333037_2_En_11_Fig1_HTML.jpg)\n\
  \n图 11-1\n加密层次结构\n\n该图显示服务主密钥和一份数据库主密钥副本存储在实例级别，而数据库主密钥也存储在数据库内。使用数据库主密钥加密的证书、对称密钥和非对称密钥也存储在数据库内。\n\
  \n在图的右侧，您可以看到一个名为 `EKM Module` 的部分。可扩展密钥管理（EKM）模块允许您在第三方硬件安全模块中生成和管理用于保护 SQL Server\
  \ 数据的密钥和证书，这些模块使用 Microsoft 加密 API（MSCAPI）与 SQL Server 接口。这更安全，因为密钥不与数据一起存储，但这也意味着您可以受益于第三方供应商可能提供的高级功能，例如密钥轮换和安全密钥处置。\n\
  \n在使用第三方 EKM 模块之前，需要使用 `sp_configure` 在实例级别启用 EKM，并且必须通过将 `.dll` 文件导入 SQL Server\
  \ 来注册 EKM。有许多 EKM 提供程序可用，但清单 11-5 中的示例脚本演示了在安装数据库安全包后如何导入 Thales EKM 模块。\n\n```\n\
  --启用 EKM\nsp_configure 'show advanced', 1\nGO\nRECONFIGURE\nGO\nsp_configure 'EKM\
  \ provider enabled', 1\nGO\nRECONFIGURE\nGO\n--注册提供程序\nCREATE CRYPTOGRAPHIC PROVIDER\
  \ nCipher_Provider FROM FILE =\n'C:\\Program Files\\nCipher\\nfast\\bin\\ncsqlekm64.dll'\n\
  清单 11-5\n启用 EKM 并导入 EKM 模块\n```\n\n#### 注意\n\n关于 EKM 的全面讨论超出了本书的范围，但您可以从您的加密提供程序处获取更多信息。\n\
  \n### 透明数据加密\n\n在为敏感数据实施安全策略时，需要考虑的一个重要方面是数据被盗的风险。想象这样一种情况：一个怀有恶意的特权用户使用分离/附加操作将数据库移动到新实例，以获取他们无权查看的数据。或者，如果恶意用户获得了数据库备份的访问权限，他们可以将备份还原到新服务器以获取数据。\n\
  \n透明数据加密（TDE）通过加密数据库的数据页和日志文件，并将密钥（称为数据库加密密钥）存储在数据库的引导记录中来防范这些场景。一旦在数据库上启用 TDE，页在写入磁盘之前会被加密，而在读入内存时会被解密。\n\
  \nTDE 相对于本章稍后将讨论的单元级加密还提供了几个优点。首先，它不会导致膨胀。使用 TDE 加密的数据库与其加密前的大小相同。此外，尽管存在性能开销，但这比单元级加密相关的性能开销显著降低。另一个显著优点是加密对应用程序是透明的，这意味着开发人员无需修改代码即可访问数据。\n\
  \n在规划 TDE 的实施时，请注意它与其他技术的交互方式。例如，您可以加密使用内存中 OLTP 的数据库，但内存中文件组内的数据不会被加密，因为数据驻留在内存中，而\
  \ TDE 仅加密静态数据，即当数据位于磁盘上时。尽管内存优化数据未加密，但与内存中事务相关的日志记录会被加密。\n\n也可以加密使用 FILESTREAM 的数据库，但同样，`FILESTREAM`\
  \ 文件组内的数据不会被加密。如果使用全文索引，则新的全文索引将被加密。现有的全文索引仅在升级期间导入后才会被加密。然而，将全文索引与 TDE 一起使用被认为是不良做法。这是因为在全文索引扫描操作期间，数据以明文形式写入磁盘，这为攻击者访问敏感数据留下了机会窗口。\n\
  \n高可用性和灾难恢复技术，如数据库镜像、AlwaysOn 可用性组和日志传送，都支持启用了 TDE 的数据库。副本数据库上的数据也被加密，日志中的数据也被加密，这意味着它在服务器之间发送时无法被拦截。复制也支持\
  \ TDE，但订阅服务器中的数据不会自动加密。您必须在订阅服务器和分发服务器上手动启用 TDE。\n\n\n#### 注意\n\n即使您在订阅者服务器上启用了`TDE`，数据在中间文件中仍以明文形式存储。这无疑比使用`FTE`（全文索引）带来更大的风险，因此您应仔细考虑风险/收益情况。\n\
  \n同样重要的是要注意，在实例中为任何数据库启用`TDE`都会导致在`TempDB`上启用`TDE`。这是因为`TempDB`用于在排序操作、假脱机操作等过程中存储中间结果集的用户数据。当您使用临时表或发生行版本控制操作时，`TempDB`也会存储用户数据。这可能会产生不良影响，即降低未启用`TDE`的其他用户数据库的性能。\n\
  \n从数据库维护性能的角度来看，同样重要的是要注意，`TDE`与即时文件初始化不兼容。即时文件初始化可加快创建或扩展文件的操作速度，因为文件无需被清零。如果您的实例配置为使用即时文件初始化，那么它将不再适用于与您加密的任何数据库关联的文件。当`TDE`启用时，文件必须被清零，这是一个严格的技术要求。\n\
  \n#### 实现透明数据加密\n\n要实现透明数据加密，您必须首先创建一个数据库主密钥。此密钥就位后，您可以创建证书。您必须使用数据库主密钥来加密该证书。如果您尝试仅使用密码加密证书，那么在您尝试使用它来加密数据库加密密钥时，它将被拒绝。数据库加密密钥是您接下来需要创建的对象，并且如前所述，您使用证书对其进行加密。最后，您可以更改数据库以打开加密。\n\
  \n#### 注意\n\n您可以使用非对称密钥（而不是服务器证书）来加密数据库加密密钥，但前提是该非对称密钥受到`EKM`模块的保护。\n\n当您为数据库启用`TDE`时，一个后台进程会遍历每个数据文件中的每个页面并对其进行加密。这不会阻止数据库被访问，但会获取锁，从而阻止维护操作进行。在加密扫描进行期间，无法执行以下操作：\n\
  \n-   删除文件\n-   删除文件组\n-   删除数据库\n-   分离数据库\n-   使数据库脱机\n-   将数据库设置为`read_only`\n\
  \n幸运的是，`SQL Server 2019`的一项新功能使数据库管理员能够通过`ALTER DATABASE`语句指定`SET ENCRYPTION SUSPEND`或`SET\
  \ ENCRYPTION RESTART`选项，来暂停和重启加密扫描，从而更好地控制此过程。\n\n同样重要的是要注意，如果数据库中的任何文件组被标记为`read_only`，则启用`TDE`的操作将失败。这是因为启用`TDE`时需要加密所有文件中的所有页面，这涉及到更改页面内的数据以混淆它们。\n\
  \n清单 11-6 中的脚本创建了一个名为`Chapter11Encrypted`的数据库，然后创建了一个填充了数据的表。最后，它创建了一个数据库主密钥和一个服务器证书。\n\
  \n```sql\n--创建数据库\nCREATE DATABASE Chapter11Encrypted ;\nGO\nUSE Chapter11Encrypted\n\
  GO\n--创建表\nCREATE TABLE dbo.SensitiveData\n(\nID                INT            \
  \    PRIMARY KEY        IDENTITY,\nFirstName        NVARCHAR(30),\nLastName    \
  \    NVARCHAR(30),\nCreditCardNumber        VARBINARY(8000)\n) ;\nGO\n--填充表数据\n\
  DECLARE @Numbers TABLE\n(\nNumber        INT\n)\n;WITH CTE(Number)\nAS\n(\nSELECT\
  \ 1 Number\nUNION ALL\nSELECT Number + 1\nFROM CTE\nWHERE Number < 100\n)\nINSERT\
  \ INTO @Numbers\nSELECT Number FROM CTE ;\nDECLARE @Names TABLE\n(\nFirstName  \
  \      VARCHAR(30),\nLastName        VARCHAR(30)\n) ;\nINSERT INTO @Names\nVALUES('Peter',\
  \ 'Carter'),\n('Michael', 'Smith'),\n('Danielle', 'Mead'),\n('Reuben', 'Roberts'),\n\
  ('Iris', 'Jones'),\n('Sylvia', 'Davies'),\n('Finola', 'Wright'),\n('Edward', 'James'),\n\
  ('Marie', 'Andrews'),\n('Jennifer', 'Abraham'),\n('Margaret', 'Jones') ;\nINSERT\
  \ INTO dbo.SensitiveData(Firstname, LastName, CreditCardNumber)\nSELECT  FirstName,\
  \ LastName, CreditCardNumber FROM\n(SELECT\n(SELECT TOP 1 FirstName FROM @Names\
  \ ORDER BY NEWID()) FirstName\n,(SELECT TOP 1 LastName FROM @Names ORDER BY NEWID())\
  \ LastName\n,(SELECT CONVERT(VARBINARY(8000)\n,(SELECT TOP 1 CAST(Number * 100 AS\
  \ CHAR(4))\nFROM @Numbers\nWHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()) + '-'\
  \ +\n(SELECT TOP 1 CAST(Number * 100 AS CHAR(4))\nFROM @Numbers\nWHERE Number BETWEEN\
  \ 10 AND 99 ORDER BY NEWID()) + '-' +\n(SELECT TOP 1 CAST(Number * 100 AS CHAR(4))\n\
  FROM @Numbers\nWHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()) + '-' +\n(SELECT\
  \ TOP 1 CAST(Number ∗ 100 AS CHAR(4))\nFROM @Numbers\nWHERE Number BETWEEN 10 AND\
  \ 99 ORDER BY NEWID()))) CreditCardNumber\nFROM @Numbers a\nCROSS JOIN @Numbers\
  \ b\nCROSS JOIN @Numbers c\n) d ;\nUSE Master\nGO\n--创建数据库主密钥\nCREATE MASTER KEY\
  \ ENCRYPTION BY PASSWORD = 'Pa$$w0rd';\nGO\n--创建服务器证书\nCREATE CERTIFICATE TDECert\
  \ WITH SUBJECT = 'Certificate For TDE';\nGO\n-- 清单 11-6\n-- 创建 Chapter11Encrypted\
  \ 数据库\n```\n\n现在我们已经创建了数据库以及数据库主密钥和证书，我们现在可以加密我们的数据库。要通过`SQL Server Management Studio`执行此操作，我们可以在数据库的上下文菜单中，从“任务”下选择“管理数据库加密”。这将调用“管理数据库加密”向导，如图\
  \ 11-2 所示。\n\n![../images/333037_2_En_11_Chapter/333037_2_En_11_Fig2_HTML.jpg](img/333037_2_En_11_Fig2_HTML.jpg)\n\
  \n图 11-2 管理数据库加密向导\n\n您可以看到我们已经从下拉框中选择了服务器证书，并选择了启用数据库加密。在“加密算法”下拉框中，我们选择了`AES 128`，这是默认选项。\n\
  \n#### 注意\n\n选择算法本质上是安全性与性能之间的权衡。较长的密钥消耗更多的`CPU`资源，但更难以破解。\n\n透明数据加密也可以通过`T-SQL`进行配置。我们可以通过执行清单\
  \ 11-7 中的脚本来实现相同的结果。\n\n```sql\nUSE CHAPTER11Encrypted\nGO\n--创建数据库加密密钥\nCREATE\
  \ DATABASE ENCRYPTION KEY\nWITH ALGORITHM = AES_128\nENCRYPTION BY SERVER CERTIFICATE\
  \ TDECert ;\nGO\n--在数据库上启用 TDE\nALTER DATABASE CHAPTER11Encrypted SET ENCRYPTION\
  \ ON ;\nGO\n-- 清单 11-7\n-- 启用透明数据加密\n```\n\n#### 管理透明数据加密\n\n配置`TDE`时，我们会收到一个警告，提示用于加密数据库加密密钥的证书尚未备份。备份此证书至关重要，您应在配置`TDE`之前或之后立即执行此操作。如果证书变得不可用，您将无法恢复数据库中的数据。您可以使用清单\
  \ 11-8 中的脚本来备份证书。\n\n```sql\nUSE Master\nGO\nBACKUP CERTIFICATE TDECert\nTO FILE\
  \ = 'C:\\certificates\\TDECert'\nWITH PRIVATE KEY (file='C:\\certificates\\TDECertKey',\n\
  ENCRYPTION BY PASSWORD='Pa$$w0rd')\n-- 清单 11-8\n-- 备份证书\n```\n\n\n### 迁移加密数据库\n\n\
  就 TDE 的本质而言，如果我们试图将`Chapter11Encrypted`数据库移动到新实例，除非我们考虑到加密要素，否则操作会失败。图 11-3 展示了如果我们对`Chapter11Encrypted`数据库进行备份，并尝试在新实例上还原时收到的消息。你可以在第\
  \ 12 章找到关于备份和还原的完整讨论。\n\n![../images/333037_2_En_11_Chapter/333037_2_En_11_Fig3_HTML.jpg](img/333037_2_En_11_Fig3_HTML.jpg)\n\
  \n图 11-3：在新实例上还原加密数据库的尝试\n\n如果我们分离数据库并尝试将其附加到新实例，也会收到相同的错误。相反，我们必须先创建一个具有相同密码的数据库主密钥，然后将服务器证书和私钥还原到新实例。我们可以使用清单\
  \ 11-9 中的脚本来还原我们之前创建的服务器证书。\n\n```sql\nCREATE MASTER KEY ENCRYPTION BY PASSWORD\
  \ = 'Pa$$w0rd' ;\nGO\nCREATE CERTIFICATE TDECert\nFROM FILE = 'C:\\Certificates\\\
  TDECert'\nWITH PRIVATE KEY\n(\nFILE = 'C:\\Certificates\\TDECertKey',\nDECRYPTION\
  \ BY PASSWORD = 'Pa$$w0rd'\n) ;\n清单 11-9：还原服务器证书\n```\n\n#### 提示\n\n确保 SQL Server\
  \ 服务帐户在操作系统中对证书和密钥文件拥有权限。否则，你将收到错误，指出证书无效、不存在或你没有权限访问它。这意味着你应该立即检查还原结果并定期重复测试。\n\
  \n### 管理单元格级加密\n\n单元格级加密允许你使用对称密钥、非对称密钥、证书或密码来加密单个列，甚至是列中的特定单元格。虽然这可以为你的数据提供额外的安全层，但它也可能导致显著的性能影响和大量的\
  \ `膨胀`。`膨胀` 意味着加密后的数据大小比加密前大得多。此外，实现单元格级加密是一个手动过程，需要你修改应用程序代码。因此，加密数据不应成为你的默认操作，只有在存在监管要求或明确的业务理由时才应执行。\n\
  \n尽管使用对称密钥加密数据是常见做法，但也可以使用非对称密钥、证书甚至密码短语来加密数据。如果使用密码短语加密数据，则会使用三重 DES 算法进行加密。表 11-1\
  \ 列出了你可以用于通过这些方法加密或解密数据的加密函数。\n\n表 11-1：加密函数\n\n| 加密方法 | 加密函数 | 解密函数 |\n| --- |\
  \ --- | --- |\n| 非对称密钥 | `ENCRYPTBYASYMKEY()` | `DECRYPTBYASYMKEY()` |\n| 证书 | `ENCRYPTBYCERT()`\
  \ | `DECRYPTBYCERT()` |\n| 密码短语 | `ENCRYPTBYPASSPHRASE()` | `DECRYPTBYPASSPHRASE()`\
  \ |\n\n当我们在数据库中创建 `SensitiveData` 表时，你可能注意到，对于 `CreditCardNumber` 列，我们使用了 `VARBINARY(8000)`\
  \ 数据类型，而明显的选择应该是 `CHAR(19)`。这是因为加密数据必须存储为二进制数据类型之一。我们将长度设置为 8000 字节，因为这是用于加密它的函数返回数据的最大长度。\n\
  \n清单 11-10 中的脚本将创建 `Chapter11Encrypted` 数据库的副本。然后，脚本为该数据库创建一个数据库主密钥和一个证书。之后，它会创建一个将使用该证书加密的对称密钥。最后，它打开对称密钥并用它来加密我们\
  \ `SensitiveData` 表中的 `CreditCardNumber` 列。\n\n```sql\n--创建副本数据库\nCREATE DATABASE\
  \ Chapter11CellEncrypted ;\nGO\nUSE Chapter11CellEncrypted\nGO\n--创建表\nCREATE TABLE\
  \ dbo.SensitiveData\n(\nID                INT                PRIMARY KEY       \
  \ IDENTITY,\nFirstName        NVARCHAR(30),\nLastName        NVARCHAR(30),\nCreditCardNumber\
  \        VARBINARY(8000)\n)\nGO\n--填充表数据\nSET identity_insert dbo.SensitiveData\
  \ ON\nINSERT INTO dbo.SensitiveData(id, firstname, lastname, CreditCardNumber)\n\
  SELECT id\n,firstname\n,lastname\n,CreditCardNumber\nFROM  Chapter11Encrypted.dbo.SensitiveData\n\
  SET identity_insert dbo.SensitiveData OFF\n--创建数据库主密钥\nCREATE MASTER KEY ENCRYPTION\
  \ BY PASSWORD = 'Pa$$w0rd';\nGO\n--创建证书\nCREATE CERTIFICATE CreditCardCert\nWITH\
  \ SUBJECT = 'Credit Card Numbers';\nGO\n--创建对称密钥\nCREATE SYMMETRIC KEY CreditCardKey\n\
  WITH ALGORITHM = AES_128\nENCRYPTION BY CERTIFICATE CreditCardCert;\nGO\n--打开对称密钥\n\
  OPEN SYMMETRIC KEY CreditCardKey\nDECRYPTION BY CERTIFICATE CreditCardCert;\n--加密\
  \ CreditCardNumber 列\nUPDATE dbo.SensitiveData\nSET CreditCardNumber = ENCRYPTBYKEY(KEY_GUID('CreditCardKey'),\
  \ CreditCardNumber);\nGO\nCLOSE SYMMETRIC KEY CreditCardKey --关闭密钥，除非重新打开，否则无法再次使用\n\
  清单 11-10：加密列数据\n```\n\n请注意，我们用于加密数据的 `UPDATE` 语句使用了一个名为 `ENCRYPTBYKEY()` 的函数。表 11-2\
  \ 描述了 `ENCRYPTBYKEY()` 函数接受的参数。如果我们只想加密单元格的子集，可以在 `UPDATE` 语句中添加一个 `WHERE` 子句。\n\
  \n表 11-2：EncryptByKey() 参数\n\n| 参数 | 描述 |\n| --- | --- |\n| `Key_GUID` | 用于加密数据的对称密钥的\
  \ GUID |\n| `ClearText` | 你希望加密的数据的二进制表示 |\n| `Add_authenticator` | 一个 `BIT` 参数，指示是否应添加验证器列\
  \ |\n| `Authenticator` | 指定应用作验证器的列的参数 |\n\n还要注意，在我们使用密钥加密数据之前，我们发出了一条语句来打开密钥。在用于加密或解密数据之前，密钥必须始终处于打开状态。为此，用户必须拥有打开密钥的权限。\n\
  \n当你使用清单 11-10 所示的方法加密列数据时，由于所用加密算法的确定性特性，你仍然面临安全风险，这意味着当你加密相同的值时，会得到相同的哈希值。想象一下这样的场景：一个用户可以访问\
  \ `SensitiveData` 表，但没有授权查看信用卡号。如果该用户同时也是该表中有记录的客户，他们可以用表中另一位客户的相同哈希值来更新自己的信用卡号。这样，他们就成功窃取了另一位客户的信用卡号，而无需解密\
  \ `CreditCardNumber` 列中的数据。这被称为 `全值替换攻击`。\n\n为了防范这种情况，你可以添加一个验证器列，也称为 `盐值`。这可以是任何列，但通常是表的主键列。加密数据时，验证器列会与数据一起加密。在解密时，会检查验证器值，如果不匹配，则解密失败。\n\
  \n\n### SQL Server 加密技术\n\n#### 警告\n\n**重要提示**：验证器列中的值**绝不**应被更新。如果被更新，您可能会丢失对敏感数据的访问。\n\
  \n清单 11-11 中的脚本展示了如何使用验证器列，利用表的主键作为验证器列来加密 `CreditCardNumber` 列。这里，我们使用 `HASHBYTES()`\
  \ 函数创建验证器列的哈希值，然后使用该哈希表示来加密数据。如果列已被加密，其值将被更新以包含盐值。\n\n#### 提示\n\n此脚本仅作为示例包含在内，但您应避免在此时运行它，以便能够遵循后续的代码示例。\n\
  \n```sql\nOPEN SYMMETRIC KEY CreditCardKey\nDECRYPTION BY CERTIFICATE CreditCardCert;\n\
  --Encrypt the CreditCardNumber column\nUPDATE SensitiveData\nSET CreditCardNumber\
  \ = ENCRYPTBYKEY(Key_GUID('CreditCardKey')\n,CreditCardNumber\n,1\n,HASHBYTES('SHA1',\
  \ CONVERT(VARBINARY(8000), ID)));\nGO\nCLOSE SYMMETRIC KEY CreditCardKey ;\n```\n\
  **清单 11-11** 使用验证器加密列\n\n在脚本末尾，我们关闭了密钥。如果我们没有显式关闭它，它将在会话的剩余时间内保持打开状态。如果我们计划使用同一密钥执行多个活动，这可能很有用，但良好的做法是在会话中最终使用后立即将其显式关闭。\n\
  \n尽管出于性能原因，可以使用对称密钥、非对称密钥或证书来加密数据，但通常会选择使用对称密钥，然后使用非对称密钥或证书来加密该对称密钥。\n\n### 访问加密数据\n\
  \n为了读取使用 `ENCRYPTBYKEY()` 加密的列中的数据，我们需要使用 `DECRYPTBYKEY()` 函数对其进行解密。表 11-3 描述了此函数的参数。\n\
  \n**表 11-3** `DecryptByKey` 参数\n\n| 参数 | 描述 |\n| --- | --- |\n| `Cyphertext` | 要解密的加密数据\
  \ |\n| `AddAuthenticator` | 一个 `BIT` 值，指定是否需要验证器 |\n| `Authenticator` | 用作验证器的列\
  \ |\n\n清单 11-12 中的脚本演示了在不使用验证器加密后，如何使用 `DECRYPTBYKEY()` 函数读取 `CreditCardNumber`\
  \ 列中的加密数据。\n\n```sql\n--Open Key\nOPEN SYMMETRIC KEY CreditCardKey\nDECRYPTION BY\
  \ CERTIFICATE CreditCardCert;\n--Read the Data using DECRYPTBYKEY()\nSELECT\nFirstName\n\
  ,LastName\n,CreditCardNumber AS [Credit Card Number Encrypted]\n,CONVERT(VARCHAR(30),\
  \ DECRYPTBYKEY(CreditCardNumber)) AS [Credit Card Number Decrypted]\n,CONVERT(VARCHAR(30),\
  \ CreditCardNumber)\nAS [Credit Card Number Converted Without Decryption]\nFROM\
  \ dbo.SensitiveData ;\n--Close the Key\nCLOSE SYMMETRIC KEY CreditCardKey ;\n```\n\
  **清单 11-12** 读取加密列\n\n此脚本最终查询结果示例如图 11-4 所示。您可以看到，直接查询加密列会返回加密的二进制值。对加密列直接转换为 `VARCHAR`\
  \ 数据类型的查询虽然成功，但不返回数据。然而，使用 `DECRYPTBYKEY()` 函数查询加密列，并在值转换为 `VARCHAR` 数据类型时，会返回正确的结果。\n\
  \n![../images/333037_2_En_11_Chapter/333037_2_En_11_Fig4_HTML.jpg](img/333037_2_En_11_Fig4_HTML.jpg)\n\
  **图 11-4** `DECRYPTBYKEY()` 的结果\n\n### Always Encrypted\n\nAlways Encrypted 是 SQL\
  \ Server 2016 中引入的一项技术，也是首个能够保护数据免受特权用户（例如 `sysadmin` 角色成员）访问的 SQL Server 加密技术。由于数据库管理员无法查看加密数据，Always\
  \ Encrypted 提供了真正的职责隔离。当您的平台支持外包给第三方供应商时，这有助于解决敏感数据的合规性问题。如果您有监管要求，规定数据不得提供给本国司法管辖区之外，而第三方供应商使用的是离岸团队，则这一点尤其重要。\n\
  \nAlways Encrypted 使用两种独立类型的密钥：列加密密钥和列主密钥。列加密密钥用于加密列内的数据，列主密钥用于加密列加密密钥。\n\n####\
  \ 提示\n\n列主密钥是位于外部存储区中的密钥或证书。\n\n拥有第二层密钥意味着 SQL Server 只需存储列加密密钥的加密值，而不是以明文形式存储。列主密钥根本不存储在数据库引擎中，而是存储在外部密钥存储区中。使用的密钥存储区可以是\
  \ HSM（硬件安全模块）、Windows 证书存储区或 EKM 提供程序，例如 Azure Key Vault 或 Thales。然后，SQL Server\
  \ 在数据库元数据中存储列主密钥的位置。\n\n数据的加密和解密责任不再由 SQL Server 承担，而是由客户端驱动程序处理。当然，这意味着应用程序必须使用受支持的驱动程序，以下链接包含有关使用受支持驱动程序的详细信息：[`https://msdn.microsoft.com/en-gb/library/mt147923.aspx`](https://msdn.microsoft.com/en-gb/library/mt147923.aspx)。\n\
  \n当应用程序发出需要加密或解密数据的请求时，客户端驱动程序会与数据库引擎协商以确定列主密钥的位置。数据库引擎还提供加密的列加密密钥及其用于加密的算法。\n\n\
  现在，客户端驱动程序可以联系外部密钥存储区并检索列主密钥，然后使用它来解密列加密密钥。列加密密钥的明文版本随后可用于根据需要加密或解密数据。\n\n整个过程对应用程序是透明的，这意味着不需要更改应用程序的代码即可使用\
  \ Always Encrypted。唯一可能需要的更改是使用更新的受支持驱动程序。\n\n\n\n#### 注意\n\n客户端驱动程序将作为一项优化，缓存列加密密钥的明文版本，以避免反复从外部密钥存储中获取。\n\
  \nAlways Encrypted 存在一些显著的限制，包括无法执行非相等比较（即使是相等比较也仅在确定性加密下可用）。SQL Server 2019 引入了\
  \ **Secure Enclaves** 来解决其中部分问题。使用安全飞地时，支持 `<`、`>` 甚至 `LIKE` 等运算符，前提是使用了随机化加密。Secure\
  \ Enclaves 还支持就地加密。\n\nSecure Enclaves 的工作原理是在 SQL Server 进程内部使用一块受保护的内存区域作为可信执行环境。在此内存区域中，数据会被解密并进行计算。SQL\
  \ Server 进程的其他部分或服务器上的任何其他进程都无法访问该安全内存，这意味着即使使用调试工具，解密后的数据也不会泄露。\n\n如果 SQL Server\
  \ 确定查询需要使用安全飞地，客户端驱动程序会通过安全通道将加密密钥发送到安全飞地。然后，客户端驱动程序提交查询和加密的查询参数以供执行。由于数据（甚至加密的参数）只在飞地内部被解密，因此数据、参数和加密密钥永远不会以明文形式暴露。\n\
  \n由于解密后的数据和密钥在飞地内部可用，客户端驱动程序需要验证飞地的真实性。为此，它需要一个外部仲裁者，称为证明服务，例如 Windows Server Host\
  \ Guardian Service。在向飞地发送任何数据之前，客户端驱动程序将联系证明服务以确定飞地的有效性。\n\n使用 Always Encrypted\
  \ 有许多限制。例如，不支持高级数据类型。完整的限制列表可以在 [`https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-database-engine?view=sql-server-2019#feature-details`](https://docs.microsoft.com/en-us/sql/relational-databases/security/encryption/always-encrypted-database-engine%253Fview%253Dsql-server-2019%2523feature-details)\
  \ 找到。\n\n### 实现 Always Encrypted\n\n在本节中，我们将使用带有 Secure Enclaves 的 Always Encrypted\
  \ 对一个名为 `Chapter11AlwaysEncrypted` 的数据库中的数据进行加密。我们将使用基于虚拟化的安全（VBS）飞地。在生产环境中，您应确保您的飞地使用可信平台模块（TPM）证明以增强安全性。TPM\
  \ 是基于硬件的证明，超出了本节的范围。更多细节可以在 [`https://docs.microsoft.com/en-us/windows-server/identity/ad-ds/manage/component-updates/tpm-key-attestation`](https://docs.microsoft.com/en-us/windows-server/identity/ad-ds/manage/component-updates/tpm-key-attestation)\
  \ 找到。\n\n在本节中，我们将配置第二台服务器作为证明服务，并将我们的 SQL Server 注册到它，以便在客户端希望使用飞地时进行仲裁。\n\n第一步是使用清单\
  \ 11-13 中的 PowerShell 脚本将第二台服务器配置为证明服务。此服务器必须运行 Windows Server 2019。此过程要求服务器执行多次重启。因此，脚本使用注释来标记各个部分。运行脚本的每个部分后，直到重启完成才应运行后续部分。请记住，不能使用托管\
  \ SQL Server 实例的同一台服务器。还值得注意的是，在配置时，充当证明服务的服务器可能未加入域。这是因为为主护盾创建了一个新域。\n\n#### 提示\n\
  \n为使脚本成功执行，PowerShell 终端应以管理员身份运行。\n\n```\n#Part 1 - Install the Host Guardian Service\
  \ role\nInstall-WindowsFeature -Name HostGuardianServiceRole -IncludeManagementTools\
  \ -Restart\n#Part 2 - Install the Host Guardian Service & configure its domain\n\
  $DSRepairModePassword = ConvertTo-SecureString -AsPlainText 'MyVerySecurePa$$w0rd'\
  \ –Force\nInstall-HgsServer -HgsDomainName 'HostGuardian.local' -SafeModeAdministratorPassword\
  \ $DSRepairModePassword -Restart\n#After the reboot, log-in using the admin account,\
  \ which will now be elevated to Domain Admin of the HostGuardian.local domain\n\
  #Part 3 - Configure Host Ket Attestation\nInitialize-HgsAttestation -HgsServiceName\
  \ 'hgs' -TrustHostKey\n```\n清单 11-13\n配置证明服务器\n\n现在，我们需要将托管 SQL Server 实例的服务器注册为受防护的主机。我们可以使用清单\
  \ 11-14 中的脚本为此做准备。同样，该脚本使用注释将其分成几个部分。这是因为在此过程中需要重启。同样，PowerShell 终端应以管理员身份运行。\n\n\
  ```\n#Part 1 - Enable the HostGuardian feature\nEnable-WindowsOptionalFeature -Online\
  \ -FeatureName HostGuardian -All\n#Part 2 - Remove VBS requirement. Only required\
  \ if you are using a VM\nSet-ItemProperty -Path HKLM:\\SYSTEM\\CurrentControlSet\\\
  Control\\DeviceGuard -Name RequirePlatformSecurityFeatures -Value 0\nshutdown /r\n\
  #Part 3 - Generate a host key pair and export public key to a file\n#Generate the\
  \ host key pair\nSet-HgsClientHostKey\n#Create a folder to store the keys\nNew-Item\
  \ -Path c:\\ -Name Keys -ItemType directory\n#Export the public key to a file\n\
  Get-HgsClientHostKey -Path (\"c:\\Keys\\{0}key.cer\" -f $env:computername)\n```\n\
  清单 11-14\n准备将主机注册为受防护主机\n\n此时，您应该手动将 `c:\\keys` 文件夹中生成的证书文件复制到证明服务器。假设您将证书复制到名为\
  \ `c:\\keys` 的文件夹，清单 11-15 中的脚本会将密钥导入证明服务。\n\n\n\n#### 注意\n\n确保将服务器和密钥名称更改为与您自己环境匹配的名称。\n\
  \n```\nAdd-HgsAttestationHostKey -Name WIN-2RDHRBC9VK8 -Path c:\\keys\\WIN-2RDHRBC9VK8key.cer\n\
  清单 11-15\n将客户端密钥导入证明服务\n```\n\n注册流程的最后一步是配置客户端，这可以使用清单 11-16 中的脚本来完成。在运行脚本前，请务必确保证明服务的\
  \ IP 地址已更改为与您自己环境匹配的地址。\n\n```\n$params = @{\n    AttestationServerUrl   = 'http://10.0.0.3/Attestation'\n\
  \    KeyProtectionServerUrl = 'http://10.0.0.3/KeyProtection'\n}\nSet-HgsClientConfiguration\
  \ @params\n清单 11-16\n配置客户端\n```\n\n现在，我们的服务器已注册为受防护主机，我们可以创建 Always Encrypted 将使用的证书和密钥。这可以使用清单\
  \ 11-17 中的脚本完成。\n\n```\n##### 创建一个证书，用于加密列主密钥。它将被存储在 Windows 证书存储的“当前用户”部分。\n$params\
  \ = @{\n    Subject           = \"AlwaysEncryptedCert\"\n    CertStoreLocation =\
  \ 'Cert:\\CurrentUser\\My'\n    KeyExportPolicy   = 'Exportable'\n    Type     \
  \         = 'DocumentEncryptionCert'\n    KeyUsage          = 'DataEncipherment'\n\
  \    KeySpec           = 'KeyExchange'\n}\n$certificate = New-SelfSignedCertificate\
  \ @params\n##### 导入 SqlServer 模块。\nImport-Module \"SqlServer\"\n##### 连接到 Chapter11AlwaysEncrypted\
  \ 数据库\n$serverName = \"{0}\\prosqladmin\" -f $env:COMPUTERNAME\n$databaseName =\
  \ \"Chapter11AlwaysEncrypted\"\n$connectionString = \"Data Source = {0}; Initial\
  \ Catalog = {1}; Integrated Security = true\" -f @(\n    $serverName\n    $databaseName\n\
  )\n$database = Get-SqlDatabase -ConnectionString $connectionString\n##### 创建一个设置对象，指定\
  \ -AllowEnclaveComputations 以使密钥支持安全飞地计算\n$params = @{\n    CertificateStoreLocation\
  \ = 'CurrentUser'\n    Thumbprint = $certificate.Thumbprint\n    AllowEnclaveComputations\
  \ = $true\n}\n$cmkSettings = New-SqlCertificateStoreColumnMasterKeySettings @params\n\
  ##### 创建列主密钥。\n$cmkName = 'ColumnMasterKey'\n$params = @{\n    Name = $cmkName\n\
  \    InputObject = $database\n    ColumnMasterKeySettings = $cmkSettings\n}\nNew-SqlColumnMasterKey\
  \ @params\n##### 创建一个列加密密钥，使用列主密钥进行加密\n$params = @{\n    Name = 'ColumnEncryptionKey'\n\
  \    InputObject = $database\n    ColumnMasterKey = $cmkName\n}\nNew-SqlColumnEncryptionKey\
  \ @params\n清单 11-17\n创建 Always Encrypted 加密对象\n```\n\n在创建列主密钥时，我们指定了一个密钥存储参数。表 11-4\
  \ 详细列出了 Always Encrypted 支持的密钥存储。然而，如果我们希望使用安全飞地，则不能选择 CNG 存储。\n\n**表 11-4**\n\n\
  **密钥存储类型值**\n\n| 密钥存储类型 | 描述 |\n| --- | --- |\n| Windows 证书存储—当前用户 | 密钥或证书存储在 Windows\
  \ 证书存储中为创建证书的用户配置文件保留的区域。如果您使用数据库引擎的服务帐户交互式地创建证书，此选项可能是合适的。 |\n| Windows 证书存储—本地计算机\
  \ | 密钥或证书存储在 Windows 证书存储中为本地机器保留的区域。 |\n| Azure Key Vault | 密钥或证书存储在 Azure Key\
  \ Vault EKM 服务中。 |\n| 密钥存储提供程序 (CNG) | 密钥或证书存储在支持 Cryptography API: Next Generation\
  \ 的 EKM 存储中。 |\n\n下一步是在 SQL Server 实例中启用安全飞地。与大多数实例配置不同，此更改需要重启实例才能生效。清单 11-18 中的脚本将更改配置。\n\
  \n```\nEXEC sys.sp_configure 'column encryption enclave type', 1;\nRECONFIGURE ;\n\
  清单 11-18\n启用安全飞地\n```\n\n#### 提示\n\n在 SQL Server 2019 的预发布版本中，必须全局启用跟踪标志 127 才能启用丰富计算。\n\
  \n我们现在想要加密 `dbo.CreditCards` 表的 `CreditCardNumber`、`ExpMonth` 和 `ExpYear` 列，该表大致基于\
  \ `AdventureWorks` 数据库的 `Sales.CreditCard` 表。\n\n在加密数据时，我们有两种方法可以选择：确定性加密或随机化加密。这是一个需要理解的重要决定，因为它可能对性能、安全性以及安全飞地可用的功能产生影响。\n\
  \n确定性加密对于相同的明文值总是产生相同的加密值。这意味着，如果使用确定性加密，并且列使用 BIN2 排序规则，则可以在加密列上执行包括等值连接、分组和索引在内的操作。然而，这留下了针对加密进行攻击的可能性。\n\
  \n如果使用随机化加密，则可以为相同的明文值生成不同的加密值。这意味着，虽然加密漏洞被堵上，但对于标准的 Always Encrypted 实现，等值连接、分组和索引不支持对加密数据进行操作。\n\
  \n然而，在使用安全飞地实施 Always Encrypted 时，随机化加密比确定性加密提供更多功能。表 11-5 详细说明了确定性加密和随机化加密在有无安全飞地情况下的功能兼容性。\n\
  \n**表 11-5**\n\n**加密类型与功能兼容性**\n\n| 加密类型 | 原地加密 | 等值比较 | 丰富计算 | Like 操作 |\n| ---\
  \ | --- | --- | --- | --- |\n| 无飞地，确定性加密 | 否 | 是 | 否 | 否 |\n| 有飞地，确定性加密 | 是 | 是\
  \ | 否 | 否 |\n| 无飞地，随机化加密 | 否 | 否 | 否 | 否 |\n| 有飞地，随机化加密 | 是 | 是（在飞地内） | 是 | 是 |\n\
  \n我们将使用随机化加密，以便能充分利用安全飞地功能。清单 11-19 中的脚本将创建 `Chapter11AlwaysEncrypted` 数据库，然后创建\
  \ `dbo.CreditCards` 表，该表大致基于 `AdventureWorks` 数据库的 `Sales.CreditCards` 表。\n\n```\n\
  CREATE TABLE dbo.CreditCards\n(\n    CardID     INT      IDENTITY     NOT NULL,\n\
  \    CardType   NVARCHAR(20)  NOT NULL,\n    CardNumber NVARCHAR(20)  COLLATE Latin1_General_BIN2\
  \ ENCRYPTED WITH (\n        COLUMN_ENCRYPTION_KEY = [ColumnEncryptionKey],\n   \
  \     ENCRYPTION_TYPE = Randomized,\n        ALGORITHM = 'AEAD_AES_256_CBC_HMAC_SHA_256')\
  \ NOT NULL,\n    ExpMonth   INT ENCRYPTED WITH (\n        COLUMN_ENCRYPTION_KEY\
  \ = [ColumnEncryptionKey],\n        ENCRYPTION_TYPE = Randomized,\n        ALGORITHM\
  \ = 'AEAD_AES_256_CBC_HMAC_SHA_256') NOT NULL,\n    ExpYear    INT ENCRYPTED WITH\
  \ (\n        COLUMN_ENCRYPTION_KEY = [ColumnEncryptionKey],\n        ENCRYPTION_TYPE\
  \ = Randomized,\n        ALGORITHM = 'AEAD_AES_256_CBC_HMAC_SHA_256') NOT NULL,\n\
  \    CustomerID INT NOT NULL\n) ;\n清单 11-19\n创建具有加密列的 CreditCards 表\n```\n\n\n\n\
  #### 注意事项\n\n如果加密现有数据，仅应在维护窗口期间执行该操作，因为在加密进行时针对表执行的 DML 语句有可能导致数据丢失。\n\n我们现在将使用\
  \ PowerShell 来演示客户端如何向加密列中插入数据。请注意，连接字符串包含了 `Column Encryption Setting`。该技术在清单 11-20\
  \ 中演示。\n\n```powershell\n#创建 SqlConnection 对象，并指定 Column Encryption Setting = enabled\n\
  $sqlConn = New-Object System.Data.SqlClient.SqlConnection\n$sqlConn.ConnectionString\
  \ = \"Server=localhost\\prosqladmin;Integrated Security=true; Initial Catalog=Chapter11AlwaysEncrypted;\
  \ Column Encryption Setting=enabled;\"\n#打开连接\n$sqlConn.Open()\n#创建 SqlCommand 对象，并添加查询和参数\n\
  $sqlcmd = New-Object System.Data.SqlClient.SqlCommand\n$sqlcmd.Connection = $sqlConn\n\
  $sqlcmd.CommandText = \"INSERT INTO dbo.CreditCards (CardType, CardNumber, ExpMonth,\
  \ ExpYear, CustomerID) VALUES (@CardType, @CardNumber, @ExpMonth, @ExpYear, @CustomerID)\"\
  \n$sqlcmd.Parameters.Add((New-Object Data.SqlClient.SqlParameter(\"@CardType\",[Data.SQLDBType]::nVarChar,20)))\n\
  $sqlcmd.Parameters[\"@CardType\"].Value = \"SuperiorCard\"\n$sqlcmd.Parameters.Add((New-Object\
  \ Data.SqlClient.SqlParameter(\"@CardNumber\",[Data.SQLDBType]::nVarChar,20)))\n\
  $sqlcmd.Parameters[\"@CardNumber\"].Value = \"33332664695310\"\n$sqlcmd.Parameters.Add((New-Object\
  \ Data.SqlClient.SqlParameter(\"@ExpMonth\",[Data.SQLDBType]::Int)))\n$sqlcmd.Parameters[\"\
  @ExpMonth\"].Value = \"12\"\n$sqlcmd.Parameters.Add((New-Object Data.SqlClient.SqlParameter(\"\
  @ExpYear\",[Data.SQLDBType]::Int)))\n$sqlcmd.Parameters[\"@ExpYear\"].Value = \"\
  22\"\n$sqlcmd.Parameters.Add((New-Object Data.SqlClient.SqlParameter(\"@CustomerID\"\
  ,[Data.SQLDBType]::Int)))\n$sqlcmd.Parameters[\"@CustomerID\"].Value = \"1\"\n#插入数据\n\
  $sqlcmd.ExecuteNonQuery();\n#关闭连接\n$sqlConn.Close()\n```\n清单 11-20 向加密列插入数据\n\n\
  #### 管理密钥\n\n正如您所料，有关密钥的元数据通过系统表和动态管理视图公开。有关列主密钥的详细信息可在 `sys.column_master_keys`\
  \ 表中找到。该表返回的列详见表 11-6。\n\n表 11-6 `sys.column_master_keys` 的列\n\n| 列 | 描述 |\n| ---\
  \ | --- |\n| Name | 列主密钥的名称。 |\n| Column_master_key_id | 列主密钥的内部标识符。 |\n| Create_date\
  \ | 创建密钥的日期和时间。 |\n| Modify_date | 最后修改密钥的日期和时间。 |\n| Key_store_provider_name |\
  \ 密钥存储提供程序的类型，指示密钥存储的位置。 |\n| Key_path | 密钥在密钥存储中的路径。 |\n| Allow_enclave_computations\
  \ | 指定密钥是否启用安全区域计算。 |\n| Signature | 数字签名，结合了 `key_path` 和 `allow_enclave_computations`。这可以防止恶意管理员更改密钥的安全区域启用设置。\
  \ |\n\n列加密密钥的详细信息可在 `sys.column_encryption_keys` 系统表中找到。该表返回表 11-7 中详述的列。\n\n表 11-7\
  \ `sys.column_encryption_keys` 返回的列\n\n| 名称 | 描述 |\n| --- | --- |\n| Name | 列加密密钥的名称\
  \ |\n| Column_encryption_key_id | 列加密密钥的内部 ID |\n| Create_date | 创建密钥的日期和时间 |\n\
  | Modify_date | 最后修改密钥的日期和时间 |\n\n一个名为 `sys.column_encryption_key_values` 的附加系统表提供了\
  \ `sys.column_master_keys` 和 `sys.column_encryption_keys` 系统表之间的联接，同时提供列加密密钥被列主密钥加密后的加密值。表\
  \ 11-8 详述了该系统表返回的列。\n\n表 11-8 `sys.column_encryption_key_values` 的列\n\n| 名称 | 描述\
  \ |\n| --- | --- |\n| Column_encryption_key_id | 列加密密钥的内部 ID |\n| Column_master_key_id\
  \ | 列主密钥的内部 ID |\n| Encrypted_value | 列加密密钥的加密值 |\n| Encrypted_algorithm_name |\
  \ 用于加密列加密密钥的算法 |\n\n因此，我们可以使用清单 11-21 中的查询来查找数据库中所有使用支持安全区域的密钥加密的列。\n\n#### 提示\n\
  \n移除 WHERE 子句可返回所有受 Always Encrypted 保护的列，并确定哪些列支持安全区域，哪些不支持。\n\n```sql\nSELECT\n\
  c.name AS ColumnName\n, OBJECT_NAME(c.object_id) AS TableName\n, cek.name AS ColumnEncryptionKey\n\
  , cmk.name AS ColumnMasterKey\n, CASE\nWHEN cmk.allow_enclave_computations = 1\n\
  THEN 'Yes'\nELSE 'No'\nEND AS SecureEnclaves\nFROM sys.columns c\nINNER JOIN sys.column_encryption_keys\
  \ cek\nON c.column_encryption_key_id = cek.column_encryption_key_id\nINNER JOIN\
  \ sys.column_encryption_key_values cekv\nON cekv.column_encryption_key_id = cek.column_encryption_key_id\n\
  INNER JOIN sys.column_master_keys cmk\nON cmk.column_master_key_id = cekv.column_master_key_id\n\
  WHERE allow_enclave_computations = 1\n```\n清单 11-21 返回使用安全区域的列的详细信息\n\n管理员无法在启用和不启用安全区域之间切换密钥。这是微软的一项刻意设计决策，旨在防范恶意管理员。但是，可以轮换密钥，并且在轮换密钥时，您可以轮换掉一个不支持安全区域的密钥，并替换为一个支持的密钥（反之亦然）。\n\
  \n#### 提示\n\n以下演示假设在 `Chapter11AlwaysEncrypted` 数据库中存在一个额外的列主密钥。\n\n轮换密钥的最简单方法是使用\
  \ SQL Server Management Studio。依次展开 `数据库` -> `Chapter11AlwaysEncrypted` -> `安全性`\
  \ -> `Always Encrypted 密钥` -> `列主密钥`，然后从您希望轮换掉的密钥的右键菜单中选择 `轮换`。这将显示“列主密钥轮换”对话框，如图\
  \ 11-5 所示。在这里，您可以选择应用于加密底层列加密密钥的新密钥。\n\n![../images/333037_2_En_11_Chapter/333037_2_En_11_Fig5_HTML.jpg](img/333037_2_En_11_Fig5_HTML.jpg)\n\
  图 11-5 列主密钥轮换对话框\n\n现在，加密密钥已使用新密钥重新加密，旧的密钥值需要被清理。这可以通过从旧列主密钥的右键菜单中选择 `清理` 来完成，从而调用“列主密钥清理”对话框。如图\
  \ 11-6 所示。\n\n![../images/333037_2_En_11_Chapter/333037_2_En_11_Fig6_HTML.jpg](img/333037_2_En_11_Fig6_HTML.jpg)\n\
  图 11-6 列主密钥清理对话框\n\n\n\n### 概要\n\nSQL Server 的加密层次结构始于服务主密钥，该密钥使用 Windows 操作系统中的数据保护\
  \ API (DPAPI) 进行加密。然后，您可以使用此密钥来加密数据库主密钥。进而，又可以使用该密钥来加密存储在数据库内的密钥和证书。SQL Server 还支持第三方可扩展密钥管理\
  \ (EKM) 提供程序，以实现对用于保护数据的密钥进行高级密钥管理。\n\n透明数据加密 (TDE) 使管理员能够加密整个数据库，而不会产生数据膨胀，且性能开销在可接受范围内。这可以防止恶意用户通过将数据库附加到新实例或窃取备份介质来盗取数据。TDE\
  \ 为开发者提供了优势，使其无需修改代码即可访问数据。\n\n单元格级加密是一种在列级别、甚至特定行内使用对称密钥、非对称密钥或证书加密数据的技术。尽管此功能非常灵活，但它也需要大量手动操作，并会导致大量数据膨胀和显著的性能开销。因此，我建议您仅使用单元格级加密来保护满足监管要求所需的最少数据量，或者您有明确的业务理由需要使用它。\n\
  \n为了减轻使用单元格级加密时数据膨胀和性能下降的影响，建议您使用对称密钥加密数据。然后，您可以使用非对称密钥或证书来加密该对称密钥。\n\n# 12. 备份与还原\n\
  \n备份数据库是数据库管理员 (DBA) 可执行的最重要的任务之一。因此，在讨论了备份原理之后，我们将探讨您可以为 SQL Server 数据库实施的一些备份策略。接着，我们将讨论如何执行数据库备份，最后深入探讨如何还原数据库，包括还原到特定时间点、还原单个文件和页面，以及执行部分还原。\n\
  \n### 备份基础\n\n根据您使用的恢复模型，可以在 SQL Server 中执行三种类型的备份：完整备份、差异备份和日志备份。我们将在以下各节中讨论恢复模型以及每种备份类型。\n\
  \n#### 恢复模型\n\n如第 6 章所述，您可以将数据库配置为以下三种恢复模型之一：`SIMPLE`、`FULL` 和 `BULK LOGGED`。这些模型将在以下章节中讨论。\n\
  \n##### SIMPLE 恢复模型\n\n配置为 `SIMPLE` 恢复模型时，事务日志（更准确地说，是事务日志中包含不再需要的事务的 VLF [虚拟日志文件]）会在每次\
  \ `CHECKPOINT` 操作后被截断。这意味着通常您不必管理事务日志。然而，这也意味着您无法执行事务日志备份。\n\n`SIMPLE` 恢复模型可以提高某些操作的性能，因为事务是\
  \ minimal logged（最小日志记录）的。可以从 minimal logging 中受益的操作如下：\n\n*   批量导入\n\n*   `SELECT\
  \ INTO`\n\n*   使用 `.WRITE` 子句针对大数据类型的 `UPDATE` 语句\n\n*   `WRITETEXT`\n\n*   `UPDATETEXT`\n\
  \n*   索引创建\n\n*   索引重建\n\n`SIMPLE` 恢复模型的主要缺点是无法恢复到特定时间点；您只能还原到完整备份的结尾。这一缺点被另一个事实放大了，即完整备份可能会影响性能，因此您不太可能在不造成用户影响的情况下，像执行事务日志备份那样频繁地执行完整备份。另一个缺点是，`SIMPLE`\
  \ 恢复模型与某些 SQL Server 高可用性/灾难恢复 (HA/DR) 功能不兼容，具体包括：\n\n*   AlwaysOn 可用性组\n\n*   数据库镜像\n\
  \n*   事务日志传送\n\n因此，在生产环境中，使用 `SIMPLE` 恢复模型最合适的场景是大型数据仓库类型的应用程序，这类应用程序通常有每晚的 ETL\
  \ 加载作业，然后在当天其余时间进行只读报告。这是因为此模型提供了 minimal logged transactions（最小日志记录事务）的优势，同时由于您可以在每晚\
  \ ETL 运行后执行完整备份，因此对恢复操作没有影响。\n\n##### FULL 恢复模型\n\n当数据库配置为 `FULL` 恢复模型时，`CHECKPOINT`\
  \ 操作后不会发生日志截断。相反，它会在执行事务日志备份后发生，前提是自上一次事务日志备份以来已经发生过 `CHECKPOINT` 操作。这意味着您必须安排频繁运行的事务日志备份。未能执行此操作不仅会使您的数据库在发生故障时面临无法恢复的风险，而且还会导致您的事务日志持续增长，直到空间耗尽并抛出\
  \ 9002 错误。\n\n当数据库处于 `FULL` 恢复模型时，许多因素可能导致事务日志中的 VLF 无法被截断。这被称为*延迟截断*。您可以在 `sys.databases`\
  \ 的 `log_reuse_wait_desc` 列中找到最近一次发生延迟截断的原因；延迟截断的完整原因列表见第 6 章。\n\n`FULL` 恢复模型的主要优点是可能进行时间点恢复，这意味着您可以将数据库还原到事务日志备份中间的某个时间点，而不仅仅是备份结束时的时间点。时间点恢复将在本章后面详细讨论。此外，`FULL`\
  \ 恢复模型与所有 SQL Server 功能兼容。它通常是生产数据库恢复模型的最佳选择。\n\n#### 提示\n\n如果您从 `SIMPLE` 恢复模型切换到\
  \ `FULL` 恢复模型，实际上在您执行事务日志备份之前，您并未真正处于 `FULL` 恢复模型。因此，请确保立即备份您的事务日志。\n\n\n\n\n#####\
  \ BULK LOGGED 恢复模型\n\n`BULK LOGGED`恢复模型旨在在执行大容量导入操作期间短期使用。其核心思想是：你的常规操作模式是使用`FULL`恢复模型，然后在大容量导入即将发生时，临时切换到`BULK\
  \ LOGGED`恢复模型；待导入完成后，再切换回`FULL`恢复模型。这样做可能带来性能优势，并防止事务日志被填满，因为大容量导入操作是**最小化日志记录**的。\n\
  \n在切换到`BULK LOGGED`恢复模型**之前**，以及切换回`FULL`恢复模型**之后**，立即进行一次事务日志备份是良好实践。这是因为，任何包含最小化日志记录事务的事务日志备份都无法用于时间点恢复。出于同样原因，在切换到`BULK\
  \ LOGGED`恢复模型之前，对你的应用程序进行“安全状态”处理也是良好实践。通常，这通过禁用除执行大容量导入的登录名和管理员登录名之外的所有登录名来实现，以确保没有其他数据修改发生。你还应确保你正在导入的数据可以通过还原以外的其他方式恢复。遵循这些规则可以降低在发生灾难时数据丢失的风险。\n\
  \n尽管在导入期间，最小化日志记录插入使事务日志保持较小并减少了日志的 IO 量，但在`FULL`恢复模型下，事务日志备份在 IO 方面的开销反而可能比在`BULK\
  \ LOGGED`模型下更小。这是因为当你备份一个包含最小化日志记录事务的事务日志时，SQL Server 还会备份所有包含已通过最小化日志记录事务修改页面的**数据区**。SQL\
  \ Server 通过使用称为 ML（最小化日志记录）页面的位图页面来跟踪这些页面。ML 页面每 64,000 个区出现一次，并使用标志来指示相应区块中的每个区是否包含最小化日志记录页面。\n\
  \n#### 注意\n\n除非你拥有非常快速的 IO 子系统，否则对于大容量导入操作，`BULK LOGGED`恢复模型可能并不比`FULL`恢复模型更快。这是因为`BULK\
  \ LOGGED`恢复模型强制使用最小化日志记录页面更新的数据页在操作完成后立即刷写到磁盘，而不是等待检查点操作。\n\n#### 更改恢复模型\n\n在向你展示如何更改数据库的恢复模型之前，让我们首先创建`Chapter12`数据库，我们将使用它在本章中进行演示。你可以使用清单\
  \ 12-1 中的脚本创建此数据库。\n\n```sql\nCREATE DATABASE Chapter12\nON  PRIMARY\n( NAME = 'Chapter12',\
  \ FILENAME = 'C:\\MSSQL\\DATA\\Chapter12.mdf'),\nFILEGROUP FileGroupA\n( NAME =\
  \ 'Chapter12FileA', FILENAME = 'C:\\MSSQL\\DATA\\Chapter12FileA.ndf' ),\nFILEGROUP\
  \ FileGroupB\n( NAME = 'Chapter12FileB', FILENAME = 'C:\\MSSQL\\DATA\\Chapter12FileB.ndf'\
  \ )\nLOG ON\n( NAME = 'Chapter12_log', FILENAME = 'C:\\MSSQL\\DATA\\Chapter12_log.ldf'\
  \ ) ;\nGO\nALTER DATABASE [Chapter12] SET RECOVERY FULL ;\nGO\nUSE Chapter12\nGO\n\
  CREATE TABLE dbo.Contacts\n(\nContactID        INT        NOT NULL        IDENTITY\
  \        PRIMARY KEY,\nFirstName        NVARCHAR(30),\nLastName        NVARCHAR(30),\n\
  AddressID        INT\n) ON FileGroupA ;\nCREATE TABLE dbo.Addresses\n(\nAddressID\
  \        INT        NOT NULL        IDENTITY        PRIMARY KEY,\nAddressLine1 \
  \       NVARCHAR(50),\nAddressLine2        NVARCHAR(50),\nAddressLine3        NVARCHAR(50),\n\
  PostCode        NCHAR(8)\n) ON FileGroupB ;\n```\n清单 12-1\n创建 Chapter12 数据库\n\n\
  你可以通过在 SQL Server Management Studio (`SSMS`)中右键单击数据库并选择“属性”，然后导航到“选项”页面（如图 12-1\
  \ 所示）来更改数据库的恢复模型。然后，你可以从“恢复模型”下拉列表中选择适当的恢复模型。\n\n![../images/333037_2_En_12_Chapter/333037_2_En_12_Fig1_HTML.jpg](img/333037_2_En_12_Fig1_HTML.jpg)\n\
  图 12-1\n“选项”选项卡\n\n我们也可以使用清单 12-2 中的脚本，将我们的`Chapter12`数据库从`FULL`恢复模型切换到`SIMPLE`恢复模型，然后再切换回来。\n\
  \n```sql\nALTER DATABASE Chapter12 SET RECOVERY SIMPLE ;\nGO\nALTER DATABASE Chapter12\
  \ SET RECOVERY FULL ;\nGO\n```\n清单 12-2\n切换恢复模型\n\n#### 提示\n\n更改恢复模型后，请在“对象资源管理器”中刷新数据库，以确保显示的恢复模型是正确的。\n\
  \n#### 备份类型\n\n在 SQL Server 中，你可以执行三种类型的备份：完整备份、差异备份和日志备份。我们将在以下各节讨论这些备份类型。\n\n\
  ##### 完整备份\n\n你可以在任何恢复模型下执行完整备份。当你发出`backup`命令时，SQL Server 首先会发出一个`CHECKPOINT`，这将导致所有脏页被写入磁盘。然后它备份数据库中的每个页面（这称为**数据读取阶段**），最后备份足够的事务日志（这称为**日志读取阶段**）以保证事务一致性。这确保了你能够将数据库还原到最近的时点，包括备份的数据读取阶段期间提交的任何事务。\n\
  \n##### 差异备份\n\n差异备份会备份自上次完整备份以来数据库中所有已修改的页面。SQL Server 通过使用称为`DIFF`页面的位图页面来跟踪这些页面，这些页面每\
  \ 64,000 个区出现一次。这些页面使用标志来指示其对应区块中的每个区是否包含自上次完整备份以来已更新的页面。\n\n差异备份的累积性质意味着你的还原链只需要包含一个差异备份——即最新的那个。只需要还原一个差异备份在完整备份之间间隔时间很长但日志备份非常频繁的情况下非常有用，因为还原最后一个差异备份可以显著减少你需要还原的事务日志备份数量。\n\
  \n##### 日志备份\n\n事务日志备份只能在`FULL`或`BULK LOGGED`恢复模型下执行。当在`FULL`恢复模型下发出事务日志备份时，它会备份自上次备份以来的所有事务日志记录。当在`BULK\
  \ LOGGED`恢复模型下执行时，它还会备份任何包含最小化日志记录事务的页面。备份完成后，SQL Server 会截断事务日志中的`VLF`（虚拟日志文件），直到遇到第一个活动的`VLF`。\n\
  \n事务日志备份对于支持`OLTP`（联机事务处理）的数据库尤其重要，因为它们允许进行时间点恢复，恢复到灾难发生前的时刻。它们也是资源消耗最少的备份类型，这意味着你可以比执行完整或差异备份更频繁地执行它们，而不会对数据库性能产生显著影响。\n\
  \n#### 备份介质\n\n数据库可以备份到`磁盘`、`磁带`或`URL`。但是，磁带备份已被弃用，因此你应避免使用它们；其支持将在未来版本的 SQL Server\
  \ 中移除。围绕备份介质的术语包括备份设备、逻辑备份设备、介质集、介质族和备份集。介质集的结构如图 12-2 所示，相关概念将在以下各节中讨论。\n\n![../images/333037_2_En_12_Chapter/333037_2_En_12_Fig2_HTML.jpg](img/333037_2_En_12_Fig2_HTML.jpg)\n\
  图 12-2\n备份介质示意图\n\n\n\n\n##### 备份设备\n\n一个`备份设备`是磁盘上的物理文件、磁带或一个 Windows Azure Blob。当设备是磁盘时，该磁盘可以位于服务器本地，也可以位于通过\
  \ URL 指定的备份共享上。一个媒体集最多可以包含 64 个备份设备，数据可以**条带化**分布 across 这些备份设备，也可以被**镜像**。在图 12-2\
  \ 中，有六个备份设备，被分成三个镜像对。这意味着备份集被条带化分布在其中三个设备上，然后镜像到另外三个设备上。\n\n对大型数据库进行条带化备份可能很有用，因为这样可以将每个设备放置在不同的驱动器阵列上以提高吞吐量。然而，这也可能带来管理上的挑战；如果条带中某个设备里的一个磁盘变得不可用，您将无法还原备份。您可以通过使用**镜像**来缓解这个问题。当您使用镜像时，每个设备的内容会被复制到一个额外的设备以实现冗余。如果一个媒体集中的一个备份设备被镜像，那么该媒体集中的所有设备都必须被镜像。每个备份设备或镜像的备份设备集被称为一个`介质族`。每个设备最多可以有四个镜像。\n\
  \n一个媒体集中的所有备份设备必须都是磁盘或都是磁带。如果它们被镜像，那么镜像设备必须具有相似的属性；否则会引发错误。因此，Microsoft 建议为镜像使用相同品牌和型号的设备。\n\
  \n也可以创建逻辑备份设备，它对物理备份设备进行了抽象。使用逻辑设备可以简化管理，特别是当您计划在同一物理位置使用许多备份设备时。一个`逻辑备份设备`是实例级别的对象，可以通过在\
  \ SSMS 中，右键单击**服务器对象** ➤ **备份设备**，然后从上下文菜单中选择**新建备份设备**来创建；这会显示**备份设备**对话框，您可以在其中指定逻辑设备名称和物理路径。\n\
  \n或者，您也可以通过 T-SQL 使用 `sp_addumpdevice` 系统存储过程来创建相同的逻辑备份设备。清单 12-3 中的命令使用 `sp_addumpdevice`\
  \ 过程创建了 `Chapter12Backup` 逻辑备份设备。在此示例中，我们使用 `@devtype` 参数传入设备的类型，在我们的例子中是 `disk`。然后，我们将设备的抽象名称传入\
  \ `@logicalname` 参数，将物理文件传入 `@physicalname` 参数。\n\n```\nEXEC sp_addumpdevice  @devtype\
  \ = 'disk',\n@logicalname = 'Chapter12Backup',\n@physicalname = 'C:\\MSSQL\\Backup\\\
  Chapter12Backup.bak' ;\nGO\n清单 12-3\n创建逻辑备份设备\n```\n\n##### 媒体集\n\n一个媒体集包含备份所写入的备份设备。媒体集内的每个介质族根据其在媒体集中的位置被分配一个序列号。这被称为`族序列号`。此外，每个物理设备被分配一个`物理序列号`，以标识其在媒体集内的物理位置。\n\
  \n创建媒体集时，备份设备（文件或磁带）会被格式化，并且一个媒体标头会被写入每个设备。该媒体标头会一直保留到设备被再次格式化，其中包含详细信息，例如媒体集的名称、媒体集的\
  \ GUID、介质族的 GUID 和序列号、集中的镜像数量以及标头写入的日期/时间。\n\n##### 备份集\n\n每次进行备份到媒体集时，都被称为一个`备份集`。新的备份集可以追加到媒体上，或者您可以覆盖现有的备份集。如果媒体集只包含一个介质族，那么该介质族包含整个备份集。否则，备份集会分布\
  \ across 各个介质族。媒体集内的每个备份集都会被赋予一个序列号；这允许您选择要还原哪个备份集。\n\n##### 备份策略\n\nDBA 可以为数据库实施多种备份策略，但您的策略应始终基于数据层应用程序的\
  \ RTO（恢复时间目标）和 RPO（恢复点目标）要求。例如，如果一个应用程序的 RPO 为 60 分钟，而您每 24 小时才备份一次数据库，那么您将无法实现此目标。\n\
  \n###### 仅完整备份\n\n仅进行完整备份的策略是最不灵活的。如果数据库更新不频繁，并且有足够长的定期备份窗口来进行完整备份，那么这可能是一种合适的策略。此外，仅完整备份策略通常用于\
  \ `Master` 和 `MSDB` 系统数据库。\n\n对于仅用于报告且不被用户更新的用户数据库，这也可能适用。在这种情况下，数据库的唯一更新可能是通过 ETL\
  \ 加载进行的。如果是这样，那么您的备份只需要与此加载一样频繁即可。但是，您应该考虑在 ETL 加载和完整备份之间添加依赖关系，例如将它们放在同一个 SQL Server\
  \ Agent 作业中。这是因为如果您的备份在 ETL 加载过程中进行，那么在您需要还原时，可能会导致备份无法使用——至少，在最终重新运行 ETL 加载之前，您需要先撤销包含在备份中的、由\
  \ ETL 加载执行的事务，否则备份是无用的。\n\n使用仅完整备份策略也限制了您还原的灵活性。如果您只进行完整备份，那么您唯一的还原选项是从最后一次完整备份的时间点还原数据库。这可能带来两个问题。第一个是，如果您在每晚午夜进行夜间备份，而您的数据库在晚上\
  \ 23:00 损坏，那么您将丢失 23 小时的数据修改。\n\n第二个问题发生在用户在晚上 23:00 误删了一个表时。数据库最早的还原点是前一天的午夜。在此场景下，再次说明，您此次事件的\
  \ RPO 是 23 小时，意味着 23 小时的数据修改丢失了。\n\n###### 完整备份和事务日志备份\n\n如果您的数据库处于 `FULL`（完整）恢复模式，那么您除了完整备份外，还可以进行事务日志备份。这意味着您可以进行更频繁的备份，因为事务日志备份比完整备份更快且使用更少的资源。这对于全天都在更新的数据库是合适的，并且它也提供了更灵活的还原选项，因为您可以还原到灾难发生前的某个时间点。\n\
  \n如果您正在执行事务日志备份，那么您应按照您的 RPO 来安排日志备份。例如，如果您的 RPO 是 1 小时，那么您可以安排每 60 分钟进行一次日志备份，因为这意味着您最多只会丢失一小时的数据。（只要您拥有完整的日志链，所有备份都未损坏，并且备份存储的共享或文件夹在您需要时是可访问的，这就是成立的。）\n\
  \n当您使用此策略时，您还应该考虑您的 RTO。想象一下，您的 RPO 是 30 分钟，因此您每半小时进行一次事务日志备份，但您每周只进行一次完整备份，时间是周六凌晨\
  \ 01:00。如果您的数据库在周五晚上 23:00 损坏，您需要还原 330 个备份。从技术角度来看，这完全可行，但如果您有一个 1 小时的 RTO，那么您可能无法在规定时间内完成数据库的还原。\n\
  \n\n\n### 数据库备份\n\n#### 完全、差异和事务日志备份\n\n为了克服刚刚描述的问题，您可以在策略中添加差异备份。由于差异备份是累积性的，这与日志备份的增量方式相反，如果您在每天晚上\
  \ 01:00 进行一次差异备份，那么您只需要恢复 43 个备份即可将数据库恢复到故障发生前的状态。此恢复序列包括完全备份、在星期五早上 01:00 进行的差异备份，然后是从\
  \ 01:30 到 23:00 按顺序恢复的事务日志。\n\n#### 文件组备份\n\n对于非常庞大的数据库，可能找不到足够大的维护窗口来执行整个数据库的完全备份。在这种情况下，您可以将数据分散到多个文件组中，并在交替的晚上备份一半的文件组。当您需要进行恢复时，只要拥有从文件组备份时间点到日志末尾的完整日志链，您就可以仅恢复包含损坏数据的文件组。\n\
  \n#### 提示\n\n虽然可以备份单个文件以及整个文件组，但我觉得这样帮助不大，因为表是分散在文件组内的所有文件中的。因此，如果一个表损坏了，您需要恢复文件组内的所有文件；或者，如果只有少数几个页面损坏，则可以只恢复这些页面。\n\
  \n#### 部分备份\n\n部分备份涉及备份所有读/写文件组，但不备份任何只读文件组。如果数据库中有大量存档数据，这会非常有用。T-SQL 中的`BACKUP\
  \ DATABASE`命令也支持`READ_WRITE_FILEGROUP`选项。这意味着您可以轻松地对数据库执行部分备份，而不必列出所有读/写文件组——如果文件组很多，手动列出当然容易出错。\n\
  \n数据库可以通过`SSMS`或 T-SQL 进行备份。我们将在以下章节中探讨这些技术。通常，定期备份是通过`SQL Server Agent`计划运行的，或者被纳入维护计划中。这些主题在第\
  \ 22 章中讨论。\n\n#### 在 SQL Server Management Studio 中备份\n\n您可以通过在数据库的上下文菜单中选择`任务 ➤\
  \ 备份`来备份数据库；这将显示“备份数据库”对话框的`常规`页面，如图 12-3 所示。\n\n![../images/333037_2_En_12_Chapter/333037_2_En_12_Fig3_HTML.jpg](img/333037_2_En_12_Fig3_HTML.jpg)\n\
  \n图 12-3：`常规`页面\n\n在`数据库`下拉列表中，选择您希望备份的数据库，在`备份类型`下拉菜单中，选择执行完全备份、差异备份或事务日志备份。`仅复制备份`复选框允许您执行一个不影响恢复序列的备份。因此，如果您进行一次仅复制完全备份，它不会影响差异基准。这意味着`DIFF`页面不会被重置。进行一次仅复制日志备份不会影响日志归档点，因此日志不会被截断。进行仅复制日志备份在某些在线恢复场景中可能很有用。无法进行仅复制差异备份。\n\
  \n如果您在`备份组件`部分选择了完全或差异备份，请选择是备份整个数据库还是特定的文件和文件组。选择`文件和文件组`单选按钮将显示“选择文件和文件组”对话框，如图\
  \ 12-4 所示。在这里，您可以选择单个文件或整个文件组进行备份。\n\n![../images/333037_2_En_12_Chapter/333037_2_En_12_Fig4_HTML.jpg](img/333037_2_En_12_Fig4_HTML.jpg)\n\
  \n图 12-4：`选择文件和文件组`对话框\n\n在屏幕的`备份到`部分，您可以从下拉列表中选择`磁带`、`磁盘`或`URL`，然后使用`添加`和`删除`按钮来指定构成媒体集定义的备份设备。最多可以指定\
  \ 64 个备份设备。备份设备可以包含多个备份（备份集），当您单击`内容`按钮时，将显示备份设备中包含的每个备份集的详细信息。\n\n在`媒体选项`页面上，您可以指定是要使用现有媒体集还是新建一个。如果选择使用现有媒体集，则指定是要覆盖媒体集的内容还是向媒体集追加新的备份集。如果选择新建媒体集，则可以指定媒体集的名称，以及可选的描述。如果使用现有媒体集，您可以验证媒体集和备份集的过期日期和时间。这些检查可能会导致备份集被追加到现有备份设备，而不是覆盖备份集。\n\
  \n在`可靠性`部分，指定备份完成后是否应进行验证。这通常是个好主意，特别是如果您备份到`URL`，因为通过网络的备份容易损坏。选择`写入媒体前执行校验和`选项会在每个数据库页面写入备份设备之前验证其页面校验和。这会导致备份操作使用额外的资源，但如果您没有像执行备份那样频繁地运行`DBCC\
  \ CHECKDB`，那么此选项可以提前警告任何数据库损坏。（更多详情请参见第 9 章。）`遇到错误时继续`选项使得即使在页面验证过程中发现错误的校验和，备份也会继续进行。\n\
  \n在`备份选项`页面上，您可以设置备份集的过期日期，以及选择是否要压缩或加密备份集。对于压缩，您可以选择使用实例默认设置，或者通过专门选择压缩或不压缩来覆盖此设置。\n\
  \n如果选择加密备份，则需要选择一个预先存在的证书。（您可以在第 11 章中找到有关如何创建证书的详细信息。）然后，您需要选择用于加密备份的算法。`SQL Server\
  \ 2019`中的可用算法是`AES 128`、`AES 192`、`AES 256`或`3DES (Triple_DES_3Key)`。您通常应选择`AES`算法，因为对`3DES`的支持将在未来版本的`SQL\
  \ Server`中移除。\n\n\n\n#### 通过 T-SQL 进行备份\n\n当您通过 T-SQL 备份数据库或日志时，可以指定许多参数。这些参数可以分为以下几类：\n\
  \n##### 杂项选项\n\n| 参数 | 描述 |\n| --- | --- |\n| `BUFFERCOUNT` | 备份操作使用的 IO 缓冲区总数。\
  \ |\n| `MAXTRANSFERSIZE` | SQL Server 与备份媒体之间可能的最大传输单元，以字节为单位指定。 |\n| `STATS` |\
  \ 指定应多久显示一次进度消息。默认设置是每完成 10% 显示一条进度消息。 |\n\n##### 日志特定选项\n\n| 参数 | 描述 |\n| --- |\
  \ --- |\n| `NORECOVERY/STANDBY` | `NORECOVERY` 使数据库在备份完成后保持还原状态，用户无法访问。`STANDBY`\
  \ 使数据库在备份完成后保持只读状态。`STANDBY` 要求您指定事务撤消文件的路径和文件名，因此应使用格式 `STANDBY = transaction_undo_file`。如果未指定任一选项，则数据库在备份完成后将保持联机状态。\
  \ |\n| `NO_TRUNCATE` | 指定即使数据库不处于健康状态，也应尝试进行日志备份。它也不会尝试截断日志的非活动部分。执行尾日志备份涉及使用指定的\
  \ `NORECOVERY` 和 `NO_TRUNCATE` 来备份日志。 |\n\n##### 错误管理选项\n\n| 参数 | 描述 |\n| --- |\
  \ --- |\n| `CHECKSUM/NO_CHECKSUM` | 指定在将每个页面写入媒体集之前是否应验证其页面校验和。 |\n| `CONTINUE_AFTER_ERROR/STOP_ON_ERROR`\
  \ | `STOP_ON_ERROR` 是默认行为，如果在验证页面校验和时发现错误的校验和，则会导致备份失败。`CONTINUE_AFTER_ERROR` 允许在发现错误校验和时继续进行备份。\
  \ |\n\n##### 媒体集选项\n\n| 参数 | 描述 |\n| --- | --- |\n| `INIT/NOINIT` | `INIT` 尝试覆盖媒体集中现有的备份集，但保留媒体头完整。除非指定了\
  \ `SKIP`，否则它会首先检查备份集的名称和过期日期。`NOINIT` 将备份集追加到媒体集，这是默认行为。 |\n| `SKIP/NOSKIP` | `SKIP`\
  \ 导致跳过对备份集名称和过期日期的 `INIT` 检查。`NOSKIP` 强制执行这些检查，这是默认行为。 |\n| `FORMAT/NOFORMAT` |\
  \ `FORMAT` 导致媒体头被覆盖，使媒体集中的任何备份集都不可用。这实质上是创建一个新的媒体集。不检查备份集名称和过期日期。`NOFORMAT` 保留现有的媒体头，这是默认行为。\
  \ |\n| `MEDIANAME` | 指定媒体集的名称。 |\n| `MEDIADESCRIPTION` | 添加媒体集的描述。 |\n| `BLOCKSIZE`\
  \ | 指定用于备份的块大小（以字节为单位）。`BLOCKSIZE` 对于磁盘和 URL 默认为 512，对于磁带默认为 65,536。 |\n\n#####\
  \ 备份集选项\n\n| 参数 | 描述 |\n| --- | --- |\n| `COPY_ONLY` | 指定应对数据库或日志进行 `copy_only`\
  \ 备份。如果您执行差异备份，则忽略此选项。 |\n| `COMPRESSION/NO COMPRESSION` | 默认情况下，SQL Server 根据实例级设置决定是否应压缩备份。（可以在\
  \ `sys.configurations` 中查看这些设置。）但是，您可以通过根据需要指定 `COMPRESSION` 或 `NO COMPRESSION`\
  \ 来覆盖此设置。备份压缩仅在 SQL Server Enterprise、Business Intelligence 和 Standard Editions\
  \ 中可用。 |\n| `NAME` | 为备份集指定名称。 |\n| `DESCRIPTION` | 向备份集添加描述。 |\n| `EXPIRYDATE/RETAINEDDAYS`\
  \ | 使用 `EXPIRYDATE = datetime` 指定备份集过期的确切日期和时间。在此日期之后，备份集可以被覆盖。指定 `RETAINDAYS =\
  \ int` 以指定备份集过期前的天数。 |\n\n##### WITH 选项\n\n| 参数 | 描述 |\n| --- | --- |\n| `CREDENTIAL`\
  \ | 备份到 Windows Azure Blob 时使用。 |\n| `DIFFERENTIAL` | 指定应执行差异备份。如果省略此选项，则执行完整备份。\
  \ |\n| `ENCRYPTION` | 指定用于备份加密的算法。如果不打算加密备份，则可以指定 `NO_ENCRYPTION`，这是默认选项。备份加密仅在\
  \ SQL Server Enterprise、Business Intelligence 和 Standard Editions 中可用。 |\n| `encryptor_name`\
  \ | 加密程序的名称，格式为 `SERVER CERTIFICATE = encryptor name` 或 `SERVER ASYMMETRIC KEY =\
  \ encryptor name`。 |\n\n##### 备份选项\n\n| 参数 | 描述 |\n| --- | --- |\n| `DATABASE/LOG`\
  \ | 指定 `DATABASE` 以执行完整或差异备份。指定 `LOG` 以执行事务日志备份。 |\n| `database_name` | 要执行备份操作的数据库名称。也可以是包含数据库名称的变量。\
  \ |\n| `file_or_filegroup` | 要备份的文件或文件组的逗号分隔列表，格式为 `FILE = logical file name` 或\
  \ `FILEGROUP = Logical filegroup name`。 |\n| `READ_WRITE_FILEGROUPS` | 通过备份所有读/写文件组来执行部分备份。可选地，在此子句后使用逗号分隔的\
  \ `FILEGROUP = syntax` 添加只读文件组。 |\n| `TO` | 要条带化备份集的备份设备的逗号分隔列表，语法为 `DISK = physical\
  \ device`、`TAPE = physical device` 或 `URL = physical device`。 |\n| `MIRROR TO` |\
  \ 要镜像备份集的备份设备的逗号分隔列表。如果使用 `MIRROR TO` 子句，则指定的备份设备数量必须等于 `TO` 子句中指定的备份设备数量。 |\n\n\
  *   备份选项（在表 12-1 中描述）。\n*   `WITH` 选项（在表 12-2 中描述）。\n*   备份集选项（在表 12-3 中描述）。\n*\
  \   媒体集选项（在表 12-4 中描述）。\n*   错误管理选项（在表 12-5 中描述）。\n*   磁带选项已弃用多个版本，不应使用。因此，本章省略了磁带选项的详细信息。\n\
  *   日志特定选项（在表 12-6 中描述）。\n*   杂项选项（在表 12-7 中描述）。\n\n为了执行我们之前通过 GUI 演示的 `Chapter12`\
  \ 数据库的完整数据库备份，我们可以使用清单 12-4 中的命令。在运行此脚本之前，请修改备份设备的路径以满足您系统的配置。\n\n```sql\nBACKUP\
  \ DATABASE Chapter12\nTO  DISK = 'H:\\MSSQL\\Backup\\Chapter12.bak'\nWITH  RETAINDAYS\
  \ = 90\n, FORMAT\n, INIT\n, MEDIANAME = 'Chapter12'\n, NAME = 'Chapter12-Full Database\
  \ Backup'\n, COMPRESSION ;\nGO\n```\n清单 12-4：执行完整备份\n\n如果我们想要对 `Chapter12` 数据库执行差异备份并将备份追加到同一媒体集，我们可以在语句中添加\
  \ `WITH DIFFERENTIAL` 选项，如清单 12-5 所示。在运行此脚本之前，请修改备份设备的路径以满足您系统的配置。\n\n```sql\nBACKUP\
  \ DATABASE Chapter12\nTO  DISK = 'H:\\MSSQL\\Backup\\Chapter12.bak'\nWITH  DIFFERENTIAL\n\
  , RETAINDAYS = 90\n, NOINIT\n, MEDIANAME = 'Chapter12'\n, NAME = 'Chapter12-Diff\
  \ Database Backup'\n, COMPRESSION ;\nGO\n```\n清单 12-5：执行差异备份\n\n\n### 数据库恢复\n\n\
  您可以通过 SSMS 或 T-SQL 来恢复数据库。我们将在以下章节探讨这两种选项。\n\n#### 在 SQL Server Management Studio\
  \ 中恢复\n\n要在 SSMS 中开始恢复，请在`对象资源管理器`中的`数据库`上右键点击上下文菜单，选择`还原数据库`。这将显示`还原数据库`对话框的`常规`页，如图\
  \ 12-5 所示。从下拉列表中选择要还原的数据库，会自动填充选项卡的其余部分。\n\n![../images/333037_2_En_12_Chapter/333037_2_En_12_Fig5_HTML.jpg](img/333037_2_En_12_Fig5_HTML.jpg)\n\
  **图 12-5**\n`常规`页\n\n您可以看到，`Chapter12`媒体集的内容显示在该页面的`要还原的备份集`窗格中。在这种情况下，我们可以看到`Chapter12`媒体集的内容。`还原`复选框允许您选择希望还原的备份集。\n\
  \n`时间线`按钮以图形方式显示了每个备份集的创建时间，如图 12-6 所示。这使您可以轻松地根据所选还原的备份集查看可能面临的数据丢失风险。在`时间线`窗口中，您还可以指定是希望恢复到日志结尾，还是希望恢复到特定的日期/时间。\n\
  \n![../images/333037_2_En_12_Chapter/333037_2_En_12_Fig6_HTML.jpg](img/333037_2_En_12_Fig6_HTML.jpg)\n\
  **图 12-6**\n`备份时间线`页\n\n点击`常规`页上的`验证备份媒体`按钮，将执行 `RESTORE WITH VERIFYONLY` 操作。此操作仅验证备份媒体而不尝试还原。为此，它执行以下检查：\n\
  \n*   备份集是完整的。\n*   所有备份设备都可读。\n*   `CHECKSUM` 有效（仅在备份操作期间指定了 `WITH CHECKSUM` 时适用）。\n\
  *   页头已验证。\n*   目标还原卷上有足够的空间用于还原备份。\n\n在`文件`页上，如图 12-7 所示，您可以选择还原每个文件的不同位置。默认行为是将文件还原到当前位置。您可以使用每个文件旁边的省略号\
  \ (...) 为每个单独的文件指定不同的位置，或者您可以使用`将所有文件重新定位到文件夹`选项为所有数据文件指定一个文件夹，并为所有日志文件指定一个文件夹。\n\
  \n![../images/333037_2_En_12_Chapter/333037_2_En_12_Fig7_HTML.jpg](img/333037_2_En_12_Fig7_HTML.jpg)\n\
  **图 12-7**\n`文件`页\n\n在`选项`页上，如图 12-8 所示，您可以指定计划使用的还原选项。在该页面的`还原选项`部分，您可以指定是要覆盖现有数据库、保留数据库内的复制设置（如果您正在配置日志传送以与复制一起使用，则应使用此选项），以及以受限访问权限还原数据库。最后一个选项使得数据库在还原完成后仅对管理员和\
  \ `db_owner` 及 `db_creator` 角色的成员可访问。如果您想在让数据库对用户可用之前验证数据或执行任何数据修复，这会很有帮助。\n\n在`还原选项`部分，您还可以指定数据库的恢复状态。使用\
  \ `RECOVERY` 选项恢复数据库会在恢复完成时将数据库置于在线状态。`NORECOVERY` 会使数据库保持正在还原状态，这意味着可以应用更多备份。`STANDBY`\
  \ 会使数据库在线但使其处于只读状态。如果您正在故障转移到辅助服务器，此选项可能很有用。如果您选择此选项，还可以指定`事务撤消`文件的位置。\n\n#### 提示\n\
  \n如果您在还原第一个备份文件时指定了 `WITH PARTIAL`，即使您使用 `WITH RECOVERY` 进行还原，也能够应用其他备份。但是，GUI 不支持分段还原。本章后面将讨论通过\
  \ T-SQL 执行分段还原。\n\n在屏幕的`尾日志备份`部分，您可以选择尝试在还原操作开始前进行尾日志备份，如果您选择这样做，可以选择让数据库保持正在还原状态。即使数据库已损坏，尾日志备份也可能是可行的。将源数据库保持在正在还原状态本质上是一种安全状态，以降低数据丢失的风险。如果您选择进行尾日志备份，还可以指定要使用的备份设备的文件路径。您还可以指定是否要在还原开始前关闭到目标数据库的现有连接，以及是否希望在还原每个单独备份集之前收到提示。\n\
  \n![../images/333037_2_En_12_Chapter/333037_2_En_12_Fig8_HTML.jpg](img/333037_2_En_12_Fig8_HTML.jpg)\n\
  **图 12-8**\n`选项`页\n\n如果我们想要备份 `Chapter12` 数据库的事务日志，并再次将备份集追加到同一媒体集，可以使用清单 12-6 中的命令。在运行此脚本前，请修改备份设备的路径以符合您系统的配置。\n\
  \n```sql\nBACKUP LOG Chapter12\nTO  DISK = 'H:\\MSSQL\\Backup\\Chapter12.bak'\n\
  WITH  RETAINDAYS = 90\n, NOINIT\n, MEDIANAME = 'Chapter12'\n, NAME = 'Chapter12-Log\
  \ Backup'\n, COMPRESSION ;\nGO\n```\n**清单 12-6**\n执行事务日志备份\n\n#### 提示\n\n在企业场景中，您可能希望将完整备份、差异备份和日志备份存储在不同的文件夹中，以便在管理员查找要恢复的文件时提供帮助。\n\
  \n如果我们正在实施文件组备份策略，并且只想备份 `FileGroupA`，可以使用清单 12-7 中的命令。我们为此备份集创建一个新的媒体集。在运行此脚本前，请修改备份设备的路径以符合您系统的配置。\n\
  \n```sql\nBACKUP DATABASE Chapter12 FILEGROUP = 'FileGroupA'\nTO  DISK = 'H:\\MSSQL\\\
  Backup\\Chapter12FGA.bak'\nWITH  RETAINDAYS = 90\n, FORMAT\n, INIT\n, MEDIANAME\
  \ = 'Chapter12FG'\n, NAME = 'Chapter12-Full Database Backup-FilegroupA'\n, COMPRESSION\
  \ ;\nGO\n```\n**清单 12-7**\n执行文件组备份\n\n要重复 `Chapter12` 的完整备份，但将备份集条带化跨两个备份设备，可以使用清单\
  \ 12-8 中的命令。这有助于提高备份的吞吐量。在运行此脚本前，您应修改备份设备的路径以符合您系统的配置。\n\n```sql\nBACKUP DATABASE\
  \ Chapter12\nTO  DISK = 'H:\\MSSQL\\Backup\\Chapter12Stripe1.bak',\nDISK = 'G:\\\
  MSSQL\\Backup\\Chapter12Stripe2.bak'\nWITH  RETAINDAYS = 90\n, FORMAT\n, INIT\n\
  , MEDIANAME = 'Chapter12Stripe'\n, NAME = 'Chapter12-Full Database Backup-Stripe'\n\
  , COMPRESSION ;\nGO\n```\n**清单 12-8**\n使用多个备份设备\n\n为了增加冗余，我们可以使用清单 12-9 中的命令创建镜像媒体集。在运行此脚本前，请修改备份设备的路径以符合您系统的配置。\n\
  \n```sql\nBACKUP DATABASE Chapter12\nTO  DISK = 'H:\\MSSQL\\Backup\\Chapter12Stripe1.bak',\n\
  DISK = 'G:\\MSSQL\\Backup\\Chapter12Stripe2.bak'\nMIRROR TO DISK = 'J:\\MSSQL\\\
  Backup\\Chapter12Mirror1.bak',\nDISK = 'K:\\MSSQL\\Backup\\Chapter12Mirror2.bak'\n\
  WITH  RETAINDAYS = 90\n, FORMAT\n, INIT\n, MEDIANAME = 'Chapter12Mirror'\n, NAME\
  \ = 'Chapter12-Full Database Backup-Mirror'\n, COMPRESSION ;\nGO\n```\n**清单 12-9**\n\
  使用镜像媒体集\n\n\n#### 通过 T-SQL 还原\n\n在 T-SQL 中使用 `RESTORE` 命令时，除了还原数据库外，还可使用表 12-8 中详述的选项。\n\
  \n##### 表 12-8：还原选项\n\n| 还原选项 | 描述 |\n| --- | --- |\n| `RESTORE FILELISTONLY` |\
  \ 返回备份设备中所有文件的列表。 |\n| `RESTORE HEADERONLY` | 返回备份设备中所有备份集的备份头信息。 |\n| `RESTORE\
  \ LABELONLY` | 返回有关备份设备所属的介质集和介质家族的信息。 |\n| `RESTORE REWINDONLY` | 关闭并倒回磁带。仅当备份设备是磁带时有效。\
  \ |\n| `RESTORE VERIFYONLY` | 检查所有备份设备是否存在且可读。同时执行其他高级验证检查，例如确保目标驱动器上有足够空间、检查 `CHECKSUM`（如果备份时使用了\
  \ `CHECKSUM`）以及检查关键的页头字段。 |\n\n使用 `RESTORE` 命令执行还原时，可以使用许多参数来实现多种还原场景。这些参数可分为以下几类：\n\
  \n##### 表 12-14：杂项选项\n\n| 参数 | 描述 |\n| --- | --- |\n| `BUFFERCOUNT` | 用于还原操作的 IO\
  \ 缓冲区总数。 |\n| `MAXTRANSFERSIZE` | SQL Server 与备份介质之间可能的最大传输单元，以字节为单位。 |\n| `STATS`\
  \ | 指定应显示进度消息的频率。默认情况下，每完成 5% 显示一条进度消息。 |\n| `FILESTREAM (DIRECTORY_NAME)` | 指定应将\
  \ `FILESTREAM` 数据还原到的文件夹名称。 |\n| `KEEP_REPLICATION` | 保留复制设置。在配置日志传送与复制一起使用时，请使用此选项。\
  \ |\n| `KEEP_CDC` | 在还原数据库时，保留其变更数据捕获 (CDC) 设置。仅当备份操作时启用了 CDC 才相关。 |\n| `ENABLE_BROKER`/`ERROR_BROKER_CONVERSATIONS`/`NEW\
  \ BROKER` | `ENABLE_BROKER` 指定还原操作完成后将启用 Service Broker 消息传递，以便可以立即发送消息。`ERROR_BROKER_CONVERSATIONS`\
  \ 指定在启用消息传递之前，所有会话都将因错误消息而终止。`NEW_BROKER` 指定将移除会话而不引发错误，并为数据库分配一个新的 Service Broker\
  \ 标识符。仅当创建备份时启用了 Service Broker 才相关。 |\n| `STOPAT`/`STOPATMARK`/`STOPBEFOREMARK`\
  \ | 用于时间点恢复，仅在 `FULL` 恢复模式下支持。`STOPAT` 指定一个日期时间值，该值将确定要还原的最后一个事务的时间。`STOPATMARK`\
  \ 指定要还原到的 LSN（日志序列号）或标记事务的名称，这将是最终要还原的事务。`STOPBEFOREMARK` 还原到指定的 LSN 或标记事务之前的事务。\
  \ |\n\n##### 表 12-13：错误管理选项\n\n| 参数 | 描述 |\n| --- | --- |\n| `CHECKSUM`/`NOCHECKSUM`\
  \ | 如果在备份操作期间指定了 `CHECKSUM`，那么在还原操作期间指定 `CHECKSUM` 将验证还原操作期间的页面完整性。指定 `NOCHECKSUM`\
  \ 则会禁用此验证。 |\n| `CONTINUE_AFTER_ERROR`/`STOP_ON_ERROR` | `STOP_ON_ERROR` 导致如果发现任何损坏的页面，则终止还原操作。`CONTINUE_AFTER_ERROR`\
  \ 导致即使发现损坏页面，还原操作也会继续。 |\n\n##### 表 12-12：介质集选项\n\n| 参数 | 描述 |\n| --- | --- |\n\
  | `MEDIANAME` | 如果使用此参数，则 `MEDIANAME` 必须与创建介质集时分配的介质集名称匹配。 |\n| `MEDIAPASSWORD`\
  \ | 如果要从使用 SQL Server 2008 或更早版本创建的介质集还原，并且在创建时为介质集指定了密码，则必须在还原操作期间使用此参数。 |\n| `BLOCKSIZE`\
  \ | 指定用于还原操作的块大小（以字节为单位），以覆盖磁带的默认值 65,536 或磁盘/URL 的默认值 512。 |\n\n##### 表 12-11：备份集选项\n\
  \n| 参数 | 描述 |\n| --- | --- |\n| `FILE` | 指示要在介质集中使用的备份集的序号。 |\n| `PASSWORD` | 如果要还原的备份是在\
  \ SQL Server 2008 或更早版本中创建的，并且在备份操作期间指定了密码，则需要使用此参数才能还原备份。 |\n\n##### 表 12-10：WITH\
  \ 选项\n\n| 参数 | 描述 |\n| --- | --- |\n| `PARTIAL` | 表示这是逐步还原中的首次还原，本章稍后将讨论逐步还原。 |\n\
  | `RECOVERY`/`NORECOVERY`/`STANDBY` | 指定还原操作完成后数据库应处的状态。`RECOVERY` 表示数据库将处于联机状态。`NORECOVERY`\
  \ 表示数据库将保持正在还原状态，以便可以应用后续还原。`STANDBY` 表示数据库将以只读模式联机。 |\n| `MOVE` | 用于指定如果文件应还原到的文件系统位置与原始位置不同。\
  \ |\n| `CREDENTIAL` | 在从 Windows Azure Blob 还原时使用。 |\n| `REPLACE` | 如果实例上已存在与还原语句中指定的目标数据库同名的数据库，或者操作系统中已存在相同名称或位置的文件，则\
  \ `REPLACE` 表示应覆盖数据库或文件。 |\n| `RESTART` | 表示如果还原操作中断，则应从该点重新启动。 |\n| `RESTRICTED_USER`\
  \ | 表示还原操作完成后，只有管理员以及 `db_owner` 和 `db_creator` 角色的成员才能访问数据库。 |\n\n##### 表 12-9：还原参数\n\
  \n| 参数 | 描述 |\n| --- | --- |\n| `DATABASE`/`LOG` | 指定 `DATABASE` 以还原构成数据库的部分或全部文件。指定\
  \ `LOG` 以还原事务日志备份。 |\n| `database_name` | 指定要还原的目标数据库的名称。 |\n| `file_or_filegroup_or_pages`\
  \ | 指定要还原的文件、文件组或页面的逗号分隔列表。如果还原页面，请使用格式 `PAGE = FileID:PageID`。在 `SIMPLE` 恢复模式下，只有文件或文件组是只读的，或者您正在使用\
  \ `WITH PARTIAL` 执行部分还原时，才能指定它们。 |\n| `READ_WRITE_FILEGROUPS` | 还原所有读/写文件组，但不还原只读文件组。\
  \ |\n| `FROM` | 包含要还原的备份集的备份设备的逗号分隔列表，或者您希望从中还原的数据库快照的名称。数据库快照将在第 16 章讨论。 |\n\n\
  - 还原参数（在表 12-9 中描述）\n- `WITH` 选项（在表 12-10 中描述）\n- 备份集选项（在表 12-11 中描述）\n- 介质集选项（在表\
  \ 12-12 中描述）\n- 错误管理选项（在表 12-13 中描述）\n- 杂项选项（在表 12-14 中描述）\n\n\n\n要执行与通过 SSMS 执行的相同还原操作，我们使用清单\
  \ 12-10 中的命令。在运行脚本前，请将备份设备的路径更改为符合你自身配置的路径。\n\n```\nUSE master\nGO\n--备份日志尾部\nBACKUP\
  \ LOG Chapter12\nTO  DISK = N'H:\\MSSQL\\Backup\\Chapter12_LogBackup_2012-02-16_12-17-49.bak'\n\
  WITH NOFORMAT,\nNAME = N'Chapter12_LogBackup_2012-02-16_12-17-49',\nNORECOVERY,\n\
  STATS = 5 ;\n--还原完整备份\nRESTORE DATABASE Chapter12\nFROM  DISK = N'H:\\MSSQL\\Backup\\\
  Chapter12.bak'\nWITH  FILE = 1,\nNORECOVERY,\nSTATS = 5 ;\n--还原差异备份\nRESTORE DATABASE\
  \ Chapter12\nFROM  DISK = N'H:\\MSSQL\\Backup\\Chapter12.bak'\nWITH  FILE = 2,\n\
  NORECOVERY,\nSTATS = 5 ;\n--还原事务日志\nRESTORE LOG Chapter12\nFROM  DISK = N'H:\\MSSQL\\\
  Backup\\Chapter12.bak'\nWITH  FILE = 3,\nSTATS = 5 ;\nGO\n清单 12-10\n还原数据库\n```\n\
  \n### 还原到时间点\n\n为了演示将数据库还原到某个时间点，我们首先进行一系列备份，并在每次备份之间操作数据。清单 12-11 中的脚本首先创建 `Chapter12`\
  \ 数据库的基础完整备份。然后在进行事务日志备份之前，向 `Addresses` 表插入一些行。接着，在截断该表之前，再向 `Addresses` 表插入一些行；最后，再进行一次事务日志备份。\n\
  \n```\nUSE Chapter12\nGO\nBACKUP DATABASE Chapter12\nTO  DISK = 'H:\\MSSQL\\Backup\\\
  Chapter12PointinTime.bak'\nWITH  RETAINDAYS = 90\n, FORMAT\n, INIT, SKIP\n, MEDIANAME\
  \ = 'Chapter12Point-in-time'\n, NAME = 'Chapter12-Full Database Backup'\n, COMPRESSION\
  \ ;\nINSERT INTO dbo.Addresses\nVALUES('1 Carter Drive', 'Hedge End', 'Southampton',\
  \ 'SO32 6GH')\n,('10 Apress Way', NULL, 'London', 'WC10 2FG') ;\nBACKUP LOG Chapter12\n\
  TO  DISK = 'H:\\MSSQL\\Backup\\Chapter12PointinTime.bak'\nWITH  RETAINDAYS = 90\n\
  , NOINIT\n, MEDIANAME = 'Chapter12Point-in-time'\n, NAME = 'Chapter12-Log Backup'\n\
  , COMPRESSION ;\nINSERT INTO dbo.Addresses\nVALUES('12 SQL Street', 'Botley', 'Southampton',\
  \ 'SO32 8RT')\n,('19 Springer Way', NULL, 'London', 'EC1 5GG') ;\nTRUNCATE TABLE\
  \ dbo.Addresses ;\nBACKUP LOG Chapter12\nTO  DISK = 'H:\\MSSQL\\Backup\\Chapter12PointinTime.bak'\n\
  WITH  RETAINDAYS = 90\n, NOINIT\n, MEDIANAME = 'Chapter12Point-in-time'\n, NAME\
  \ = 'Chapter12-Log Backup'\n, COMPRESSION ;\nGO\n清单 12-11\n准备 Chapter12 数据库\n```\n\
  \n设想在这个脚本中发生的一系列事件之后，我们发现 `Addresses` 表被错误地截断了，需要将其还原到紧接这次截断操作发生之前的点。为此，我们需要知道截断的确切时间，并还原到该日期/时间之前，或者更精确地说，我们需要找到发生截断操作的事务的\
  \ LSN，并还原到该事务之前。在这个演示中，我们选择后一种方法。\n\n我们可以使用一个名为 `sys.fn_dump_dblog()` 的系统函数来显示包含第二个\
  \ INSERT 语句和表截断操作的最后一个日志备份的内容。该过程接受多达 68 个参数，并且**没有一个参数可以省略！**\n\n第一和第二个参数允许你指定一个开始和结束的\
  \ LSN，用于筛选结果。这两个参数都可以设置为 `NULL` 以返回备份中的所有条目。第三个参数指定备份集是磁盘还是磁带，而第四个参数指定设备内备份集的序列\
  \ ID。接下来的 64 个参数接受介质集内的备份设备名称。如果介质集包含的设备少于 64 个，那么对于任何不需要的参数，你应使用 `DEFAULT` 值。\n\
  \n清单 12-12 中的脚本使用了未公开的 `fn_dump_dblog()` 系统函数来识别发生截断操作的自动提交事务的起始 LSN。这个函数的问题在于，它返回的\
  \ LSN 格式与 `RESTORE` 命令所需的格式不同。因此，计算列 `ConvertedLSN` 将 LSN 的三个部分从二进制转换为十进制，根据需要填充零，最后将它们连接回一起，生成一个可以传递给\
  \ `RESTORE` 操作的 LSN。\n\n```\nSELECT\nCAST(\nCAST(\nCONVERT(VARBINARY, '0x'\n+ RIGHT(REPLICATE('0',\
  \ 8)\n+ SUBSTRING([Current LSN], 1, 8), 8), 1\n) AS INT\n) AS VARCHAR(11)\n) +\n\
  RIGHT(REPLICATE('0', 10) +\nCAST(\nCAST(\nCONVERT(VARBINARY, '0x'\n+ RIGHT(REPLICATE('0',\
  \ 8)\n+ SUBSTRING([Current LSN], 10, 8), 8), 1\n) AS INT\n) AS VARCHAR(10)), 10)\
  \ +\nRIGHT(REPLICATE('0',5) +\nCAST(\nCAST(CONVERT(VARBINARY, '0x'\n+ RIGHT(REPLICATE('0',\
  \ 8)\n+ SUBSTRING([Current LSN], 19, 4), 8), 1\n) AS INT\n) AS VARCHAR\n), 5) AS\
  \ ConvertedLSN\n,*\nFROM\nsys.fn_dump_dblog (\nNULL, NULL, N'DISK', 3, N'H:\\MSSQL\\\
  Backup\\Chapter12PointinTime.bak'\nDEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT,\
  \ DEFAULT, DEFAULT,\nDEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT,\n\
  DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT,\nDEFAULT, DEFAULT,\
  \ DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT,\nDEFAULT, DEFAULT, DEFAULT, DEFAULT,\
  \ DEFAULT, DEFAULT, DEFAULT,\nDEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT,\
  \ DEFAULT,\nDEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT,\nDEFAULT,\
  \ DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT, DEFAULT,\nDEFAULT, DEFAULT, DEFAULT,\
  \ DEFAULT, DEFAULT, DEFAULT, DEFAULT)\nWHERE [Transaction Name] = 'TRUNCATE TABLE'\
  \ ;\n清单 12-12\n查找截断操作的 LSN\n```\n\n既然我们已经找到了截断 `Addresses` 表的事务的 LSN，我们就可以将 `Chapter12`\
  \ 数据库还原到这个时间点。清单 12-13 中的脚本完整地还原了完整备份和第一个事务日志备份。然后还原最后一个事务日志，但使用 `STOPBEFOREMARK`\
  \ 参数来指定不应还原的第一个 LSN。在运行脚本前，请根据你自己的配置更改备份设备的位置。你还应该将 LSN 替换为你使用 `sys.fn_dump_dblog()`\
  \ 生成的 LSN。\n\n```\nUSE master\nGO\nRESTORE DATABASE Chapter12\nFROM  DISK = N'H:\\\
  MSSQL\\Backup\\Chapter12PointinTime.bak'\nWITH  FILE = 1\n,  NORECOVERY\n,  STATS\
  \ = 5\n, REPLACE ;\nRESTORE LOG Chapter12\nFROM  DISK = N'H:\\MSSQL\\Backup\\Chapter12PointinTime.bak'\n\
  WITH  FILE = 2\n,  NORECOVERY\n,  STATS = 5\n, REPLACE ;\nRESTORE LOG Chapter12\n\
  FROM  DISK = N'H:\\MSSQL\\Backup\\Chapter12PointinTime.bak'\nWITH  FILE = 3\n, \
  \ STATS = 5\n, STOPBEFOREMARK = 'lsn:35000000036000001'\n, RECOVERY\n, REPLACE ;\n\
  清单 12-13\n还原到时间点\n```\n\n### 还原文件和页面\n\n能够还原文件组、文件甚至页面，使你在灾难恢复场景中拥有极大的控制力和灵活性。以下部分演示如何执行文件还原和页面还原。\n\
  \n\n#### 恢复文件\n\n您可能会遇到数据库中只有某些文件或文件组损坏的情况。如果出现这种情况，并且您拥有从进行文件或文件组备份时到日志结尾之间完整的日志链，则可以仅恢复损坏的文件。为了演示此功能，我们首先在备份主文件组和\
  \ `FileGroupA` 之前，向 `Chapter12` 数据库的 `Contacts` 表中插入一些行。然后，在进行事务日志备份之前，我们向位于 `FileGroupB`\
  \ 上的 `Addresses` 表中插入一些行。这些任务由清单 12-14 中的脚本执行。\n\n```sql\nINSERT INTO dbo.Contacts\n\
  VALUES('Peter', 'Carter', 1),\n('Danielle', 'Carter', 1) ;\nBACKUP DATABASE Chapter12\
  \ FILEGROUP = N'PRIMARY',  FILEGROUP = N'FileGroupA'\nTO  DISK = N'H:\\MSSQL\\Backup\\\
  Chapter12FileRestore.bak'\nWITH FORMAT\n, NAME = N'Chapter12-Filegroup Backup'\n\
  , STATS = 10 ;\nINSERT INTO dbo.Addresses\nVALUES('SQL House', 'Server Buildings',\
  \ NULL, 'SQ42 4BY'),\n('Carter Mansions', 'Admin Road', 'London', 'E3 3GJ') ;\n\
  BACKUP LOG Chapter12\nTO  DISK = N'H:\\MSSQL\\Backup\\Chapter12FileRestore.bak'\n\
  WITH NOFORMAT\n, NOINIT\n,  NAME = N'Chapter12-Log Backup'\n, NOSKIP\n, STATS =\
  \ 10 ;\n```\n清单 12-14 准备数据库\n\n如果我们假设 `Chapter12FileA` 已损坏，即使我们没有 `Chapter12FileB`\
  \ 的相应备份，也能够恢复此文件，并通过使用清单 12-15 中的脚本恢复到最新时间点。此脚本先对文件 `Chapter12FileA` 执行文件恢复，然后进行事务日志的尾日志备份，最后按顺序应用所有事务日志。在运行此脚本前，请更改备份设备的位置以反映您自己的配置。\n\
  \n#### 注意\n\n如果我们没有进行尾日志备份，那么我们将无法再访问 `Contacts` 表（位于 `FileGroupB` 中），除非我们也能恢复 `Chapter12FileB`\
  \ 文件。\n\n```sql\nUSE master\nGO\nRESTORE DATABASE Chapter12 FILE = N'Chapter12FileA'\n\
  FROM  DISK = N'H:\\MSSQL\\Backup\\Chapter12FileRestore.bak'\nWITH  FILE = 1\n, NORECOVERY\n\
  , STATS = 10\n, REPLACE ;\nGO\nBACKUP LOG Chapter12\nTO  DISK = N'H:\\MSSQL\\Backup\\\
  Chapter12_LogBackup_2012-02-17_12-26-09.bak'\nWITH NOFORMAT\n, NOINIT\n,  NAME =\
  \ N'Chapter12_LogBackup_2012-02-17_12-26-09'\n, NOSKIP\n, NORECOVERY\n,  STATS =\
  \ 5 ;\nRESTORE LOG Chapter12\nFROM  DISK = N'H:\\MSSQL\\Backup\\Chapter12FileRestore.bak'\n\
  WITH  FILE = 2\n, STATS = 10\n, NORECOVERY ;\nRESTORE LOG Chapter12\nFROM  DISK\
  \ = N'H:\\MSSQL\\Backup\\Chapter12_LogBackup_2012-02-17_12-26-09.bak'\nWITH FILE\
  \ = 1\n, STATS = 10\n, RECOVERY ;\nGO\n```\n清单 12-15 恢复文件\n\n#### 恢复页面\n\n如果页面损坏，则可以恢复此页面，而不是恢复整个文件甚至整个数据库。在轻微的灾难恢复场景中，这可以显著减少停机时间。为了演示此功能，我们首先对\
  \ `Chapter12` 数据库进行完整备份，然后使用未公开的 `DBCC WRITEPAGE` 命令在 `Contacts` 表的某个页面上制造损坏。这些步骤在清单\
  \ 12-16 中执行。\n\n#### 注意\n\n`DBCC WRITEPAGE` 在此仅供教学使用。它未公开，且极其危险。绝不应在生产系统上使用，并且只应在任何数据库上极其谨慎地使用。\n\
  \n```sql\n--Back up the database\nBACKUP DATABASE Chapter12\nTO  DISK = N'H:\\MSSQL\\\
  Backup\\Chapter12PageRestore.bak'\nWITH FORMAT\n, NAME = N'Chapter12-Full Backup'\n\
  , STATS = 10 ;\n--Corrupt a page in the Contacts table\nALTER DATABASE Chapter12\
  \ SET SINGLE_USER WITH NO_WAIT ;\nGO\nDECLARE @SQL NVARCHAR(MAX)\nSELECT @SQL =\
  \ 'DBCC WRITEPAGE(' +\n(\nSELECT CAST(DB_ID('Chapter12') AS NVARCHAR)\n) +\n', '\
  \ +\n(\nSELECT TOP 1 CAST(file_id AS NVARCHAR)\nFROM dbo.Contacts\nCROSS APPLY sys.fn_PhysLocCracker(%%physloc%%)\n\
  ) +\n', ' +\n(\nSELECT TOP 1 CAST(page_id AS NVARCHAR)\nFROM dbo.Contacts\nCROSS\
  \ APPLY sys.fn_PhysLocCracker(%%physloc%%)\n) +\n', 2000, 1, 0x61, 1)' ;\nEXEC(@SQL)\
  \ ;\nALTER DATABASE Chapter12 SET MULTI_USER ;\nGO\n```\n清单 12-16 准备数据库\n\n在运行脚本后，如果我们尝试访问\
  \ `Contacts` 表，会收到一条警告我们存在基于逻辑一致性的 I/O 错误的错误消息，并且语句会失败。错误消息还提供了损坏页面的详细信息，我们可以在 `RESTORE`\
  \ 语句中使用这些信息。为了解决这个问题，我们可以运行清单 12-17 中的脚本。该脚本先恢复损坏的页面，然后进行尾日志备份，最后应用尾日志。在运行脚本前，请修改备份设备的位置以反映您的配置。您还应该更新\
  \ `PageID` 以反映您版本的 `Chapter12` 数据库中损坏的页面。以 `FileID:PageID` 格式指定要恢复的页面。\n\n#### 提示\n\
  \n损坏页面的详细信息也可以在 `MSDB.dbo.suspect_pages` 中找到。\n\n```sql\nUSE Master\nGO\nRESTORE\
  \ DATABASE Chapter12 PAGE='3:8'\nFROM  DISK = N'H:\\MSSQL\\Backup\\Chapter12PageRestore.bak'\n\
  WITH  FILE = 1\n, NORECOVERY\n,  STATS = 5 ;\nBACKUP LOG Chapter12\nTO  DISK = N'H:\\\
  MSSQL\\Backup\\Chapter12_LogBackup_2012-02-17_16-47-46.bak'\nWITH NOFORMAT, NOINIT\n\
  , NAME = N'Chapter12_LogBackup_2012-02-17_16-32-46'\n, NOSKIP\n, STATS = 5 ;\nRESTORE\
  \ LOG Chapter12\nFROM  DISK = N'H:\\MSSQL\\Backup\\Chapter12_LogBackup_2012-02-17_16-47-46.bak'\n\
  WITH  STATS = 5\n, RECOVERY ;\nGO\n```\n清单 12-17 恢复页面\n\n\n### 分段还原\n\n分段还原是指逐个将数据库的文件组联机。这对于大型数据库来说好处显著，因为你可以让部分数据先可用，而其他数据仍在还原过程中。为了演示此技术，我们首先对\
  \ `Chapter12` 数据库中的所有文件组进行文件组备份，然后进行一次事务日志备份。清单 12-18 中的脚本执行此任务。运行脚本前，请修改备份设备的位置以符合你自己的配置。\n\
  \n```\nBACKUP DATABASE Chapter12\nFILEGROUP = N'PRIMARY',  FILEGROUP = N'FileGroupA',\
  \  FILEGROUP = N'FileGroupB'\nTO  DISK = N'H:\\MSSQL\\Backup\\Chapter12Piecemeal.bak'\n\
  WITH FORMAT\n, NAME = N'Chapter12-Fiegroup Backup'\n, STATS = 10 ;\nBACKUP LOG Chapter12\n\
  TO  DISK = N'H:\\MSSQL\\Backup\\Chapter12Piecemeal.bak'\nWITH NOFORMAT, NOINIT\n\
  ,  NAME = N'Chapter12-Full Database Backup'\n,  STATS = 10 ;\n```\n清单 12-18 文件组备份\n\
  \n清单 12-19 中的脚本现在将文件组逐个联机，从主文件组开始，然后是 `FileGroupA`，最后是 `FileGroupB`。在开始还原之前，我们先备份日志尾部。每个文件组还原后，此备份将使用\
  \ `WITH RECOVERY` 进行还原。这会使还原的数据库重新联机。由于我们在第一个还原操作中指定了 `PARTIAL` 选项，因此可以进一步还原其他备份。\n\
  \n```\nUSE master\nGO\nBACKUP LOG Chapter12\nTO  DISK = N'H:\\MSSQL\\Backup\\Chapter12_LogBackup_2012-02-17_27-29-46.bak'\n\
  WITH NOFORMAT, NOINIT\n, NAME = N'Chapter12_LogBackup_2012-02-17_17-29-46'\n, NOSKIP\n\
  , NORECOVERY\n, NO_TRUNCATE\n, STATS = 5 ;\nRESTORE DATABASE Chapter12\nFILEGROUP\
  \ = N'PRIMARY'\nFROM  DISK = N'H:\\MSSQL\\Backup\\Chapter12Piecemeal.bak'\nWITH\
  \  FILE = 1\n, NORECOVERY\n, PARTIAL\n, STATS = 10 ;\nRESTORE LOG Chapter12\nFROM\
  \  DISK = N'H:\\MSSQL\\Backup\\Chapter12Piecemeal.bak'\nWITH  FILE = 2\n, NORECOVERY\n\
  , STATS = 10 ;\nRESTORE LOG Chapter12\nFROM  DISK = N'H:\\MSSQL\\Backup\\Chapter12_LogBackup_2012-02-17_27-29-46.bak'\n\
  WITH  FILE = 1\n, STATS = 10\n, RECOVERY ;\n-----------------主文件组现已联机--------------------\n\
  RESTORE DATABASE Chapter12\nFILEGROUP = N'FileGroupA'\nFROM  DISK = N'H:\\MSSQL\\\
  Backup\\Chapter12Piecemeal.bak'\nWITH  FILE = 1\n, NORECOVERY\n, STATS = 10 ;\n\
  RESTORE LOG Chapter12\nFROM  DISK = N'H:\\MSSQL\\Backup\\Chapter12Piecemeal.bak'\n\
  WITH  FILE = 2\n, NORECOVERY\n, STATS = 10 ;\nRESTORE LOG Chapter12\nFROM  DISK\
  \ = N'H:\\MSSQL\\Backup\\Chapter12_LogBackup_2012-02-17_27-29-46.bak'\nWITH  FILE\
  \ = 1\n, STATS = 10\n, RECOVERY ;\n-----------------FileGroupA 文件组现已联机--------------------\n\
  RESTORE DATABASE Chapter12\nFILEGROUP = N'FileGroupB'\nFROM  DISK = N'H:\\MSSQL\\\
  Backup\\Chapter12Piecemeal.bak'\nWITH  FILE = 1\n, NORECOVERY\n, STATS = 10 ;\n\
  RESTORE LOG Chapter12\nFROM  DISK = N'H:\\MSSQL\\Backup\\Chapter12Piecemeal.bak'\n\
  WITH  FILE = 2\n, NORECOVERY\n, STATS = 10 ;\nRESTORE LOG Chapter12\nFROM  DISK\
  \ = N'H:\\MSSQL\\Backup\\Chapter12_LogBackup_2012-02-17_27-29-46.bak'\nWITH  FILE\
  \ = 1\n, STATS = 10\n, RECOVERY ;\n-----------------数据库现已完全联机--------------------\n\
  ```\n清单 12-19 分段还原\n\n### 总结\n\nSQL Server 数据库可以在三种恢复模式下运行。`SIMPLE` 恢复模式会在 `CHECKPOINT`\
  \ 操作发生后自动截断事务日志。这意味着无法进行日志备份，因此也不支持时间点还原。在 `FULL` 恢复模式下，事务日志仅在执行日志备份操作后才会被截断。这意味着你必须同时进行事务日志备份以用于灾难恢复和日志空间管理。`BULK\
  \ LOGGED` 恢复模式仅在进行批量插入操作时使用。也就是说，如果你通常使用 `FULL` 恢复模式，则仅在执行此类操作时切换到此模式。\n\nSQL Server\
  \ 支持三种备份类型。完整备份将所有数据库页复制到备份设备。差异备份将自上次完整备份以来所有已修改的数据库页复制到备份设备。事务日志备份则将事务日志的内容复制到备份设备。\n\
  \n数据库管理员可以采用多种备份策略，以便在发生需要还原数据库的灾难时提供尽可能最佳的恢复时间目标（RTO）和恢复点目标（RPO）。这些策略包括：仅执行完整备份（适用于\
  \ `SIMPLE` 恢复模式）；安排完整备份与事务日志备份一起进行；或者安排完整备份、差异备份和事务日志备份。如果频繁进行日志备份，安排差异备份有助于改善数据库的\
  \ RTO。数据库管理员也可以选择实施文件组备份策略；这允许他们将备份分散到更易管理的时间窗口中，或执行部分备份（即仅备份读/写文件组）。\n\n可以通过 T-SQL\
  \ 或 SQL Server Management Studio (SSMS) 进行临时备份。在生产环境中，你通常需要安排定期运行的备份，我们将在第 22 章讨论如何自动化此操作。\n\
  \n你也可以通过 SSMS 或 T-SQL 执行还原。但是，只有通过 T-SQL 才能执行复杂的还原场景，例如分段还原。SQL Server 还为你提供了还原单个页面或文件的能力。你可以将还原损坏页面作为联机操作进行，通常，对于小规模的损坏，这比还原整个数据库或使用带有\
  \ `ALLOW_DATA_LOSS` 选项的 `DBCC CHECKDB` 提供了更好的替代方案。有关 `DBCC CHECKDB` 的更多详细信息，请参见第\
  \ 9 章。\n\n#### 提示\n\n许多其他还原场景超出了本书的范围，因为全面描述每种可能场景本身就值得单独成书。我鼓励你在沙盒环境中探索各种还原场景，以备将来实际使用之需！\n\
  \n# 13. 高可用性与灾难恢复概念\n\n在当今运行关键业务应用程序的 7×24 小时环境中，企业严重依赖于其数据的可用性。尽管服务器及其软件通常是可靠的，但始终存在硬件故障或软件缺陷的风险，这两者都可能导致服务器宕机。为了减轻这些风险，关键业务应用程序通常依赖冗余硬件来提供容错能力。如果主系统发生故障，应用程序可以自动故障转移到冗余系统。这是高可用性（HA）的基本原理。\n\
  \n即使实施了 HA 技术，仍然存在导致应用程序不可用的小概率事件风险。这可能是由于重大事件，例如自然灾害或恐怖行为导致数据中心的损毁。也可能是由于数据损坏或人为错误，导致应用程序数据丢失或损坏到无法修复的程度。\n\
  \n在这些情况下，一些应用程序可能依赖于还原最新的备份以尽可能多地恢复数据。然而，更关键的应用程序可能需要一台冗余服务器在辅助位置保存数据的同步副本。这是灾难恢复（DR）的核心概念。本章首先讨论\
  \ HA 和 DR 背后的概念，然后概述可用于实现这些概念的技术。\n\n### 可用性概念\n\n为了分析应用程序的 HA 和 DR 需求并实施最合适的解决方案，你需要理解各种概念。我们将在以下章节中讨论这些概念。\n\
  \n\n\n### 可用性级别\n\n解决方案对最终用户的可用时间量被称为`可用性级别`或`运行时间`。为了真实反映运行时间，公司应从用户桌面的角度来衡量解决方案的可用性。换句话说，即使您的\
  \ SQL Server 已连续运行超过一个月，用户仍可能因其他因素而经历解决方案中断。这些因素可能包括网络中断或应用程序服务器故障。\n\n然而，在某些情况下，您别无选择，只能在\
  \ SQL Server 级别衡量可用性级别。这可能是因为企业内部缺乏整体监控工具。但更常见的是，在实例级别衡量可用性级别的要求是出于政治原因，而非技术原因。在\
  \ IT 行业，将数据中心管理外包给第三方提供商已成为趋势。在这种情况下，负责管理 SQL Server 的提供商不一定同时负责网络或应用程序服务器。在这种情形下，您需要在\
  \ SQL Server 级别监控运行时间，以准确评判服务提供商的性能。\n\n可用性级别是以应用或服务器可用时间占总时间的百分比来衡量的。公司通常力求达到 99%、99.9%、99.99%\
  \ 或 99.999% 的可用性。因此，可用性级别通常以 9 的个数来称呼。例如，五个 9 的可用性意味着 99.999% 的运行时间，三个 9 意味着 99.9%\
  \ 的运行时间。\n\n表 13-1 详细列出了每个可用性级别每周、每月和每年可接受的停机时间量。\n\n表 13-1：可用性级别\n\n| 可用性级别 | 每周停机时间\
  \ | 每月停机时间 | 每年停机时间 |\n| --- | --- | --- | --- |\n| 99% | 1 小时 40 分钟 48 秒 | 7 小时\
  \ 18 分钟 17 秒 | 3 天 15 小时 39 分钟 28 秒 |\n| 99.9% | 10 分钟 4 秒 | 43 分钟 49 秒 | 8 小时 45\
  \ 分钟 56 秒 |\n| 99.99% | 1 分钟 | 4 分钟 23 秒 | 52 分钟 35 秒 |\n| 99.999% | 6 秒 | 26 秒\
  \ | 5 分钟 15 秒 |\n\n*所有值均向下取整到最接近的秒。*\n\n要计算其他可用性级别，您可以使用清单 13-1 中的脚本。在运行此脚本前，请将\
  \ `@Uptime` 的值替换为您希望计算的运行时间级别。您还应替换 `@UptimeInterval` 的值以反映每周、每月或每年的运行时间。\n\n```\n\
  DECLARE @Uptime        DECIMAL(5,3) ;\n--指定要计算的运行时间级别\nSET @Uptime = 99.9 ;\nDECLARE\
  \ @UptimeInterval VARCHAR(5) ;\n--指定 WEEK, MONTH, 或 YEAR\nSET @UptimeInterval =\
  \ 'YEAR' ;\nDECLARE @SecondsPerInterval FLOAT ;\n--计算每个时间间隔的秒数\nSET @SecondsPerInterval\
  \ =\n(\nSELECT CASE\nWHEN @UptimeInterval = 'YEAR'\nTHEN 60*60*24*365.243\nWHEN\
  \ @UptimeInterval = 'MONTH'\nTHEN 60*60*24*30.437\nWHEN @UptimeInterval = 'WEEK'\n\
  THEN 60*60*24*7\nEND\n) ;\nDECLARE @UptimeSeconds DECIMAL(12,4) ;\n--计算停机秒数\nSET\
  \ @UptimeSeconds = @SecondsPerInterval * (100-@Uptime) / 100 ;\n--格式化结果\nSELECT\n\
  CONVERT(VARCHAR(12),  FLOOR(@UptimeSeconds /60/60/24))   + ' 天, '\n+ CONVERT(VARCHAR(12),\
  \  FLOOR(@UptimeSeconds /60/60 % 24)) + ' 小时, '\n+ CONVERT(VARCHAR(12),  FLOOR(@UptimeSeconds\
  \ /60 % 60))    + ' 分钟, '\n+ CONVERT(VARCHAR(12),  FLOOR(@UptimeSeconds % 60)) \
  \       + ' 秒。' ;\n```\n\n清单 13-1：计算可用性级别\n\n### 服务级别协议与服务级别目标\n\n当第三方提供商负责管理服务器时，合同通常包含服务级别协议。这些\
  \ SLA 定义了许多参数，包括多少停机时间是可接受的、服务器发生故障时允许的最大中断时长，以及故障发生时可接受的数据丢失量。通常，如果未能满足这些 SLA，提供商将面临经济处罚。\n\
  \n如果服务器由内部管理，数据库管理员仍然有“客户”的概念。这些客户通常是应用程序的最终用户，主要联系人是业务负责人。应用程序的业务负责人是业务中委托该应用程序并负责签署资金增强等事项的干系人。\n\
  \n在内部管理场景中，仍然可以定义 SLA。在这种情况下，如果未能满足这些 SLA，IT 基础架构或平台部门可能需要向业务团队承担费用。然而，在内部场景中，IT\
  \ 部门与业务团队协商服务级别目标而非 SLA 要常见得多。SLO 在性质上与 SLA 非常相似，但使用 SLO 意味着如果未能达成目标，业务部门不会对 IT\
  \ 部门实施经济处罚。\n\n### 主动维护\n\n重要的是要记住，停机不仅由故障引起，也由主动维护引起。例如，如果您需要为操作系统或 SQL Server\
  \ 本身安装最新的服务包，那么在安装期间就必须有一段停机时间。\n\n根据您所应用的更新，这种情况下的停机时间可能相当长——对于独立服务器可能需要几个小时。对于许多关键业务应用程序而言，在这种情况下，高可用性至关重要——不是为了防范计划外停机，而是为了避免在计划维护期间发生长时间中断。\n\
  \n\n#### 恢复点目标与恢复时间目标\n\n应用程序的恢复点目标（RPO）指明了在发生故障时可接受的数据丢失量。例如，对于一个支持报表应用程序的数据仓库，鉴于它可能仅由\
  \ ETL 过程每天更新一次，且其他所有活动都是只读报表，这个 RPO 可能是一个较长的时段，比如 24 小时。然而，对于高度事务性的系统，例如支持交易平台或\
  \ Web 应用程序的 OLTP 数据库，RPO 将为零。RPO 为零意味着不可接受任何数据丢失。\n\n应用程序针对高可用性和灾难恢复可能具有不同的 RPO。例如，出于成本或应用程序性能的考虑，站点内故障转移可能需要\
  \ RPO 为零。但是，如果同一应用程序故障转移到灾难恢复数据中心，那么 5 或 10 分钟的数据丢失可能是可以接受的。这是因为实现站点内可用性和站点间恢复所使用的技术存在差异。\n\
  \n应用程序的恢复时间目标（RTO）指定了应用程序在恢复完成且用户可以重新连接之前可以停机的最长时间。在计算应用程序可实现的 RTO 时，您需要考虑许多方面。例如，集群从一个节点故障转移到另一个节点以及\
  \ SQL Server 服务重新启动可能需要不到一分钟；然而，数据库恢复可能需要更长得多的时间。数据库恢复所需的时间取决于许多因素，包括数据库的大小、实例内的数据库数量，以及故障转移发生时有多少事务处于活动状态。这是因为所有未提交的事务都需要回滚。\n\
  \n就像 RPO 一样，站点内或站点间故障转移具有不同的 RTO 是很常见的。同样，这主要是由于技术差异造成的，但也考虑到如果主数据中心丢失，在灾难恢复数据中心启动整个环境所需的时间。\n\
  \n在发生数据损坏时，应用程序的 RPO 和 RTO 也可能有所不同。根据损坏的性质以及已实施的 HA/DR 技术，数据损坏可能导致您需要从备份中还原数据库。\n\
  \n如果您必须还原数据库，最坏的情况是可实现的恢复点可能是上次备份的时间。这意味着您必须将特定 RPO 的硬性业务要求纳入您的备份策略。（备份将在第 12 章中详细讨论。）然而，如果只有部分数据库损坏，您或许可以从实时数据库中抢救一些数据，并且仅从还原的数据库中还原损坏的数据。\n\
  \n数据损坏也可能对 RTO 产生影响。最大的影响因素之一是备份是本地存储在服务器上，还是需要从磁带中检索。从磁带甚至异地位置检索备份文件可能会显著增加恢复过程的时间。\n\
  \n另一个影响因素是导致损坏的原因。如果是由有故障的 I/O 子系统引起的，那么您可能需要考虑让 Windows 管理员对卷运行磁盘检查命令（`CHKDSK`）所需的时间，以及可能更换磁盘所需的更多时间。然而，如果损坏是由用户意外截断表或删除数据文件引起的，则无需担心。\n\
  \n#### 停机成本\n\n如果您询问任何业务负责人，他们的应用程序可接受多少停机时间以及可接受多少数据丢失，答案无一例外分别是零和零。当然，永远无法保证零停机时间，而且一旦您开始解释不同可用性级别相关的成本，就更容易协商出双方可接受的服务水平。\n\
  \n决定您应尝试达到多少个“9”的关键因素是停机成本。停机成本分为两类：有形成本和无形成本。有形成本通常相当容易计算。让我们以销售应用程序为例。在这种情况下，最明显的有形成本是由于销售人员无法接收订单而导致的收入损失。无形成本更难量化，但可能昂贵得多。例如，如果客户无法向您的公司下单，他们可能会向竞争对手公司下单，并且永不回头。其他无形成本可能包括员工士气低落，导致员工流失率更高，甚至公司声誉受损。由于无形成本的本质决定了它们只能被估算，行业经验法则是将有形成本乘以三，用这个数字来代表您的无形成本。\n\
  \n一旦您有了应用程序每小时总停机成本的数字，您就可以在整个应用程序的预测生命周期内扩展这个数字，并比较实施不同可用性级别的成本。例如，假设您计算出您的总停机成本为每小时\
  \ 2,000 美元，您应用程序的预期生命周期为 3 年。表 13-2 展示了您的应用程序的停机成本，比较了您为实施每个可用性级别计算出的成本（在考虑了硬件、许可证、电力、布线、额外存储以及额外支持设备，如新机架、管理成本等之后）。这被称为解决方案的总拥有成本（TCO）。\n\
  \n表 13-2\n\n停机成本\n\n| 可用性级别 | 停机成本（3 年） | 可用性解决方案成本 |\n| --- | --- | --- |\n| 99%\
  \ | $525,600 | $108,000 |\n| 99.9% | $52,560 | $224,000 |\n| 99.99% | $5,256 | $462,000\
  \ |\n| 99.999% | $526 | $910,000 |\n\n在此表中，您可以看到实施五个 9 的可用性比两个 9 的解决方案节省了 $525,474，但实施解决方案的成本额外增加了\
  \ $802,000，这意味着它并不经济。四个 9 的可用性比两个 9 的解决方案节省了 $520,334，并且实施成本仅额外增加了 $354,000。因此，对于此特定应用程序，设计为四个\
  \ 9 的解决方案是最合适的服务水平。\n\n### 备用服务器的分类\n\n备用解决方案分为三类。您可以使用不同的技术来实现每一类，尽管某些技术可用于实现多个类别的备用服务器。表\
  \ 13-3 概述了您可以实现的不同备用类别。\n\n表 13-3\n\n备用分类\n\n| 类别 | 描述 | 技术示例 |\n| --- | --- | ---\
  \ |\n| 热备 | 一种同步解决方案，故障转移可以自动或手动发生。通常用于高可用性。 | 集群、AlwaysOn 可用性组（同步） |\n| 温备 | 一种同步解决方案，故障转移只能手动发生。通常用于灾难恢复。\
  \ | 日志传送、AlwaysOn 可用性组（异步） |\n| 冷备 | 一种非同步解决方案，故障转移只能手动发生。这只适用于从不修改的只读数据。 | – |\n\
  \n#### 注\n\n冷备没有列出示例技术，因为不需要同步，因此也不需要技术实现。例如，在云场景中，您可能在 AWS 可用区中有一个 VMWare SDDC。如果一个可用区丢失，自动化会在不同的可用区中启动一个\
  \ SDDC，并从 S3 存储桶还原 VM 快照。\n\n\n### 高可用性与灾难恢复技术\n\nSQL Server 提供了一整套用于实现高可用性和灾难恢复的技术。以下各节将概述这些技术，并讨论其最适用的场景。\n\
  \n#### AlwaysOn 故障转移集群\n\nWindows 集群是一种提供高可用性的技术，其中一组最多 64 台服务器协同工作以提供冗余。一个 `AlwaysOn\
  \ 故障转移集群实例 (FCI)` 是一个跨该组内服务器的 `SQL Server` 实例。如果组内某台服务器发生故障，另一台服务器将接管该实例的所有权。其最适用的场景是数据库规模庞大或写入负载较高的高可用性方案。这是因为集群依赖于共享存储，意味着数据仅需写入磁盘一次。而使用\
  \ `SQL Server` 级别的高可用性技术时，写入操作会在主数据库上执行，然后在所有辅助数据库上再次执行，之后主数据库上的提交才会完成。这可能导致性能问题。尽管可以将集群扩展到多个站点，但这涉及\
  \ `SAN` 复制，这意味着集群通常配置在单个站点内。\n\n集群中的每台服务器称为一个`节点`。因此，如果一个集群由三台服务器组成，则称为三节点集群。集群中的每个节点都安装了\
  \ `SQL Server` 二进制文件，但 `SQL Server` 服务仅在其中一个节点上启动，该节点称为`活动节点`。集群中的每个节点还共享相同的 `SQL\
  \ Server` 数据和日志文件存储。然而，该存储仅附加到活动节点。\n\n#### 提示\n\n在地理分散的集群（`地理集群`）中，每台服务器连接到不同的存储。卷通过\
  \ `SAN` 复制或 `Windows 存储副本`（一项在 `Windows Server 2016` 中引入的 `Windows Server` 技术，用于执行存储复制）进行更新。集群将这两个卷视为一个单一的共享卷，该卷一次只能附加到一个节点。\n\
  \n如果活动节点发生故障，则 `SQL Server` 服务将停止，存储将被分离。然后，存储将重新附加到集群中的另一个节点，并且 `SQL Server` 服务将在该节点上启动，该节点现在成为活动节点。该实例还被分配了其自己的网络名称和\
  \ `IP` 地址，这些也绑定到活动节点。这意味着应用程序可以无缝连接到该实例，无论哪个节点拥有所有权。\n\n图 13-1 中的图表展示了一个双节点集群。它显示尽管数据库存储在共享存储阵列上，但每个节点仍然拥有一个专用的系统卷。该卷包含\
  \ `SQL Server` 二进制文件。图表还说明了在发生故障转移时，共享存储、`IP` 地址和网络名称如何重新绑定到被动节点。\n\n![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig1_HTML.png](img/333037_2_En_13_Fig1_HTML.png)\n\
  \n图 13-1：双节点集群\n\n##### 主动/主动配置\n\n虽然图 13-1 中的图表展示了主动/被动配置，但也可以采用主动/主动配置。一次只能有一个节点拥有单个实例，因此无法实现负载均衡。但是，可以在集群上安装多个实例，并且不同的节点可以拥有每个实例。在此场景中，每个节点都有其唯一的网络名称和\
  \ `IP` 地址。每个实例的共享存储也由一组唯一的卷组成。\n\n因此，在主动/主动配置中，在正常运行期间，`节点 1` 可能托管 `实例 1`，`节点 2`\
  \ 可能托管 `实例 2`。如果 `节点 1` 发生故障，则两个实例都将由 `节点 2` 托管，反之亦然。图 13-2 中的图表展示了一个双节点主动/主动集群。\n\
  \n![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig2_HTML.png](img/333037_2_En_13_Fig2_HTML.png)\n\
  \n图 13-2：主动/主动集群\n\n#### 注意\n\n在主动/主动集群中，必须考虑故障转移时的资源情况。例如，如果每个节点有 128GB 的 `RAM`，并且托管在每个节点上的实例使用了\
  \ 96GB 的 `RAM` 并在内存中锁定页面，那么当一个节点故障转移到另一个节点时，该节点也会失败，因为它没有足够的内存分配给两个实例。请确保规划内存和处理器需求时，将两个节点视为单台服务器。因此，通常不建议为\
  \ `SQL Server` 采用主动/主动集群。\n\n##### 三节点及以上配置\n\n如前所述，集群中最多可以有 64 个节点。当您有三个或更多节点时，由于相关成本，您可能不希望只有一个活动节点和两个冗余节点。相反，您可以选择实施\
  \ `N+1` 或 `N+M` 配置。\n\n在 `N+1` 配置中，您有多个活动节点和一个被动节点。如果任何一个活动节点发生故障，它们将故障转移到被动节点。图\
  \ 13-3 中的图表描绘了一个三节点的 `N+1` 集群。\n\n![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig3_HTML.png](img/333037_2_En_13_Fig3_HTML.png)\n\
  \n图 13-3：三节点 N+1 配置\n\n在 `N+1` 配置中，在多重故障场景下，多个节点可能会故障转移到被动节点。因此，在规划资源时必须非常小心，以确保被动节点能够支持多个实例。但是，您可以通过使用\
  \ `N+M` 配置来缓解此问题。\n\n`N+1` 配置拥有多个活动节点和一个被动节点，而 `N+M` 集群拥有多个活动节点和多个被动节点，尽管被动节点的数量通常少于活动节点。图\
  \ 13-4 中的图表展示了一个五节点的 `N+M` 配置。图表显示 `实例 3` 被配置为总是故障转移到其中一个被动节点，而 `实例 1` 和 `实例 2`\
  \ 被配置为总是故障转移到另一个被动节点。这为您提供了控制被动节点上资源的灵活性，但您也可以配置集群以允许任何活动节点故障转移到任意一个被动节点，如果这对于您的环境是更合适的设计。\n\
  \n![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig4_HTML.png](img/333037_2_En_13_Fig4_HTML.png)\n\
  \n图 13-4：五节点 N+M 配置\n\n\n\n##### 仲裁\n\n为了实现自动故障转移，集群服务需要知道节点是否宕机。为此，必须形成一个**仲裁**。仲裁的定义是“为开展业务所需的最少成员数量”。在高可用性语境下，这意味着集群中的每个节点，以及可选的一个见证设备（可以是一个集群磁盘或集群外部的文件共享），都获得一票投票权。如果超过半数的投票成员无法与某个节点通信，则集群服务便知该节点已宕机，其上任何具备集群感知能力的应用程序将故障转移至另一节点。要求超过半数的投票成员无法与该节点通信，是为了避免一种称为\
  \ `脑裂` 的情形。\n\n要解释脑裂场景，可以想象数据中心 1 有三个节点，数据中心 2 也有三个节点。现在假设两个数据中心之间的网络连接中断，但所有六个节点仍保持在线。数据中心\
  \ 1 的三个节点认为数据中心 2 的所有节点均不可用。反之，数据中心 2 的节点也认为数据中心 1 的节点不可用。这导致集群的两侧（称为分区）都认为自己应该取得控制权。这对于成功连接到任一分区的应用程序可能产生不可预测且不良的后果。公式\
  \ `仲裁 = (投票成员数 / 2) + 1` 可防止此场景发生。\n\n#### 提示\n\n如果您的集群丢失了仲裁，可以通过使用 `/fq` 开关启动集群服务来强制一个分区联机。如果您使用的是\
  \ Windows Server 2012 R2 或更高版本，则强制联机的分区被视为 `权威分区`。这意味着当连接恢复时，其他分区可以自动重新加入集群。\n\n\
  有多种仲裁模型可用，最合适的选择取决于您的环境。表 13-4 列出了您可以使用的模型，并详细说明了最适用的方式。\n\n表 13-4\n\n仲裁模型\n\n|\
  \ 仲裁模型 | 适用情况 |\n| --- | --- |\n| 节点多数 | 当集群中有奇数个节点时 |\n| 节点+磁盘见证多数 | 当集群中有偶数个节点时\
  \ |\n| 节点+文件共享见证多数 | 当节点分布在多个站点，或当您有偶数个节点且需要避免共享磁盘时∗ |\n\n**由于虚拟化而需要避免共享磁盘的原因将在本章后面讨论。*\n\
  \n虽然默认选项是一节点一票，但可以通过将 `NodeWeight` 属性更改为零来手动移除一个节点的投票权。这在您拥有 `多子网集群`（节点分布在多个站点的集群）时很有用。在此场景中，建议您在第三个站点使用文件共享见证。这有助于避免因数据中心之间网络故障而导致的集群中断。然而，如果您的仲裁节点数为奇数，添加文件共享见证将导致投票数为偶数，这是危险的。从辅助数据中心的一个节点移除投票可以消除此问题。\n\
  \n#### 注意\n\n文件共享见证不存储仲裁数据库的完整副本。这意味着带有文件共享见证的两节点集群容易受到一种称为 `时间点分区` 的场景影响。在此场景中，如果您正在为第二个节点修补或更改集群服务时有一个节点发生故障，则没有最新的仲裁数据库副本。这将使您处于需要销毁并重建集群的境地。\n\
  \n现代版本的 Windows Server 还支持动态仲裁和针对 50%节点分裂的平局决胜器概念。启用动态仲裁时，集群服务会根据集群中的节点数量自动决定是否给予仲裁见证投票权。如果您有偶数个节点，则分配投票权；如果是奇数个节点，则不分配。针对\
  \ 50%节点分裂的平局决胜器扩展了这一概念。如果您有偶数个节点和一个见证，而见证发生故障，则集群服务会自动从集群中一个随机节点移除一票。这保持了仲裁中投票数为奇数，并降低了因见证故障导致集群脱机的风险。\n\
  \n#### 提示\n\n如果您的集群运行在 Windows Server 2016 或更高版本的数据中心版上，则支持存储空间直通。这允许使用本地附加的物理存储，通过软件定义的存储层来实现高可用性。关于存储空间直通的完整讨论超出了本书范围，但更多细节可以在\
  \ [`https://docs.microsoft.com/en-us/windows-server/storage/storage-spaces/storage-spaces-direct-overview`](https://docs.microsoft.com/en-us/windows-server/storage/storage-spaces/storage-spaces-direct-overview)\
  \ 找到。\n\n#### AlwaysOn 可用性组\n\nAlwaysOn 可用性组 (`AOAG`) 取代了数据库镜像，本质上是数据库镜像和集群技术的融合。SQL\
  \ Server 在集群的每个节点上作为独立实例安装（与 AlwaysOn 故障转移集群实例相对）。然后，一个名为可用性组侦听器的集群感知应用程序安装在集群上；它用于将流量定向到正确的节点。然而，`AOAG`\
  \ 不依赖共享磁盘，而是压缩日志流并将其发送到其他节点，方式与数据库镜像类似。\n\n在您拥有小型数据库且写入配置文件较低的情况下，`AOAG` 是最合适的高可用技术。这是因为，当同步使用时，它要求在所有同步副本上提交数据后，才会在主数据库上提交。您最多可以拥有八个副本，包括三个同步副本。在虚拟化环境中实现高可用性时，`AOAG`\
  \ 也可能是最合适的技术。这是因为集群所需的共享磁盘可能与虚拟资产的某些功能不兼容。例如，当虚拟机使用通过光纤通道呈现的共享磁盘时，VMware 不支持使用 vMotion（用于在物理服务器之间手动移动虚拟机）和分布式资源调度程序（DRS，用于根据资源利用率在物理服务器之间自动移动虚拟机）。\n\
  \n\n\n#### 提示\n\n通过将存储以 iSCSI 连接方式直接呈现给客户机操作系统，可以规避 VMware 功能中围绕共享磁盘的限制，但这会以**性能下降**为代价。\n\
  \n当你有主动故障转移需求但又不需要实现负载延迟时，`AOAG` 是适用于 `DR` 的最合适技术。如果你希望利用 `DR` 服务器来卸载报表负载，`AOAG`\
  \ 也可能适用于灾难恢复场景。这样可以使冗余服务器得到利用。用于灾难恢复时，`AOAG` 以异步模式工作。这意味着在发生故障转移时可能会丢失数据。其 `RPO`\
  \ 是不确定的，取决于最后一次未提交事务的时间。\n\n在过去数据库镜像的时代，辅助数据库始终处于离线状态。这意味着你无法使用辅助数据库来卸载任何报表或其他只读活动。可以通过对辅助数据库创建数据库快照并将只读活动指向该快照来绕过此限制。然而，这仍然很复杂，因为你必须配置应用程序以针对不同的网络名称和\
  \ IP 地址发出只读语句。另一方面，`可用性组` 允许你将一个或多个副本配置为可读。唯一的限制是，可读副本和自动故障转移不能配置在同一个辅助副本上。不过，通常的做法是将可读的辅助副本配置为异步提交模式，以免影响性能。\n\
  \n为了进一步简化这一点，`可用性组` 副本会检查应用程序连接字符串中的 `只读` 或 `读意向` 属性，并将应用程序指向适当的节点。这意味着你可以轻松地以水平扩展方式扩展报表和数据库维护例程，只需很少的开发工作量，并且应用程序能够使用单一的连接字符串。\n\
  \n因为 `AOAG` 允许你结合同步副本（带或不带自动故障转移）、异步副本和用于只读访问的副本，所以它允许你使用单一技术来满足高可用性、灾难恢复和报表横向扩展的需求。如果你唯一的需求是读取扩展，而不是\
  \ `HA` 或 `DR`，那么从 `SQL Server 2017` 开始，实际上可以配置不依赖于故障转移群集的 `可用性组`。在这种情况下，没有群集服务，因此也没有自动重定向。`可用性组`\
  \ 内的副本在相互通信时使用证书。如果你在没有 `AD` 的工作组或跨域环境中配置 `可用性组`，情况也是如此。\n\n当你使用 `AOAG` 时，故障转移既不发生在数据库级别，也不发生在实例级别。相反，故障转移发生在可用性组级别。可用性组是一个概念，允许你将相关的数据库分组在一起，以便它们作为一个原子单元进行故障转移。这在整合环境中特别有用，因为它允许你将映射到单个应用程序的数据库分组。然后，你可以出于\
  \ `DR` 测试或其他原因，将此应用程序故障转移到另一个副本，而不会影响托管在同一实例上的其他数据层应用程序。\n\n对于一个实例上可以配置的可用性组数量，以及可以参与\
  \ `AOAG` 的实例上的数据库数量，微软并未施加硬性限制。然而，微软经过测试并正式建议，每个实例最多 100 个数据库和 10 个可用性组。扩展数据库数量的主要限制因素是\
  \ `AOAG` 使用数据库镜像端点，并且每个实例只能有一个。这意味着所有数据修改的日志流都通过同一个端点发送。\n\n图 13-5 描绘了如何将数据层应用程序映射到可用性组以实现独立故障转移。在此示例中，单个实例托管了两个数据层应用程序。每个应用程序都已添加到单独的可用性组中。第一个可用性组已故障转移到\
  \ `Node2`。因此，可用性组侦听器将 Application1 的流量指向 `Node2`，将 Application2 的流量指向 `Node1`。因为每个可用性组都有自己的网络名称和\
  \ IP 地址，并且这些资源随 `AOAG` 一起故障转移，所以应用程序能够在故障转移后无缝地重新连接到数据库。\n\n![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig5_HTML.png](img/333037_2_En_13_Fig5_HTML.png)\n\
  \n图 13-5\n\n可用性组故障转移\n\n图 13-6 中的图表描述了一个 AlwaysOn 可用性组拓扑。在此示例中，群集中有四个节点和一个磁盘见证。`Node1`\
  \ 托管数据库的主副本，`Node2` 用于自动故障转移，`Node3` 用于卸载报表负载，`Node4` 用于 `DR`。由于群集跨越两个数据中心，因此已实现多子网群集。然而，由于没有共享存储，站点之间不需要进行\
  \ `SAN` 复制。\n\n![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig6_HTML.png](img/333037_2_En_13_Fig6_HTML.png)\n\
  \n图 13-6\n\nAlwaysOn 可用性组拓扑\n\n#### 注\n\nAlwaysOn 可用性组在第 14 章和第 16 章中有更详细的讨论。\n\n\
  \n\n##### 自动页面修复\n\n如果数据库中某个页面损坏，且该数据库配置为 AlwaysOn 可用性组拓扑中的副本，则 SQL Server 会尝试从某个辅助副本获取该页面的副本来修复损坏。这意味着无需你执行还原或运行带修复选项的\
  \ `DBCC CHECKDB`，即可解决逻辑损坏问题。但是，自动页面修复不适用于以下页面类型：\n\n*   文件头页面\n*   数据库引导页面\n*  \
  \ 分配页面\n    *   GAM（全局分配映射）\n    *   SGAM（共享全局分配映射）\n    *   PFS（页面可用空间）\n\n如果主副本因页面损坏而无法读取该页面，它会首先将该页面记录到\
  \ `MSDB.dbo.suspect_pages` 表中。然后，它会检查是否至少有一个副本处于 `SYNCHRONIZED`（已同步）状态，并且事务仍在发送到该副本。如果满足这些条件，主副本将向所有副本发送一个广播，指定\
  \ `PageID` 和刷新日志结束时的 LSN（日志序列号）。随后，该页面会被标记为还原挂起，这意味着任何访问它的尝试都将失败，并返回错误代码 829。\n\n\
  收到广播后，辅助副本将等待，直到它们重做的事务达到广播消息中指定的 LSN。此时，它们会尝试访问该页面。如果无法访问，则返回错误。如果它们**可以**访问该页面，则会将该页面发送回主副本。主副本接受第一个响应的辅助副本发送来的页面。\n\
  \n然后，主副本将用从辅助副本接收到的版本替换损坏的页面副本。此过程完成后，它会更新 `MSDB.dbo.suspect_pages` 表中的页面记录，通过将\
  \ `event_type` 列设置为 `5 (已修复)` 值来反映页面已被修复。\n\n如果辅助副本在重做日志时因页面损坏而无法读取该页面，它会将该辅助副本置于\
  \ `SUSPENDED`（已挂起）状态。然后，它将该页面记录到 `MSDB.dbo.suspect_pages` 表中，并向主副本请求该页面的副本。主副本尝试访问该页面。如果无法访问，则返回错误，辅助副本将保持在\
  \ `SUSPENDED` 状态。\n\n如果主副本可以访问该页面，则会将其发送给发出请求的辅助副本。辅助副本用从主副本获取的版本替换损坏的页面。然后，它使用\
  \ `event_id` 为 `5` 更新 `MSDB.dbo.suspect_pages` 表。最后，它尝试恢复 AOAG（AlwaysOn 可用性组）会话。\n\
  \n#### 注意\n\n可以手动恢复会话，但如果你这样做，在同步期间再次遇到损坏页面时会出错。请务必首先在主副本上修复或还原该页面。\n\n#### 日志传送\n\
  \n日志传送是一种可用于实现灾难恢复的技术。它的工作原理是在主服务器上备份事务日志，将其复制到辅助服务器，然后进行还原。当你需要加载延迟的灾难恢复场景中，最适合使用日志传送，因为这在\
  \ AOAG 中无法实现。例如，在用户意外删除表中所有数据的场景中，如果灾难恢复服务器上的数据库在更新前存在延迟，则有可能从该服务器恢复此表的数据，然后重新填充生产服务器。这意味着你无需还原备份来恢复数据。日志传送不适用于高可用性，因为它没有自动故障转移功能。图\
  \ 13-7 中的示意图展示了一个日志传送拓扑。\n\n![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig7_HTML.png](img/333037_2_En_13_Fig7_HTML.png)\n\
  \n图 13-7：日志传送拓扑\n\n#### 恢复模式\n\n在日志传送拓扑中，始终恰好有一个主服务器，即生产服务器。然而，可以有多个辅助服务器，这些服务器可以是灾难恢复服务器和用于分担报表负载的服务器的混合体。\n\
  \n当你还原事务日志时，可以指定三种恢复模式：Recovery（恢复）、NoRecovery（不恢复）和 Standby（待机）。Recovery 模式使数据库联机，但日志传送不支持此模式。NoRecovery\
  \ 模式使数据库保持脱机，以便可以还原更多备份。这是日志传送的常规配置，也是灾难恢复场景的合适选择。\n\nStandby 选项使数据库联机，但处于只读状态，因此你可以还原更多备份。此功能通过维护一个\
  \ `TUF`（事务撤消文件）来实现。`TUF` 文件记录事务日志中任何未提交的事务。这意味着你可以回滚事务日志中的这些未提交事务，从而使数据库更易于访问（尽管它是只读的）。下次需要应用还原时，你可以在下一个日志还原的重做阶段开始之前，将\
  \ `TUF` 文件中的未提交事务重新应用到日志中。\n\n图 13-8 展示了一个同时使用灾难恢复服务器和报表服务器的日志传送拓扑。\n\n![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig8_HTML.png](img/333037_2_En_13_Fig8_HTML.png)\n\
  \n图 13-8：带有灾难恢复和报表服务器的日志传送\n\n#### 远程监视服务器\n\n可选地，你可以在日志传送拓扑中配置一个监视服务器。这有助于你集中监视和警报。当你实现监视服务器时，所有备份、复制和还原操作的历史记录和状态都存储在该监视服务器上。监视服务器还允许你拥有一个单一的警报作业，该作业配置为监视所有服务器上的备份、复制和还原操作，而不需要在拓扑中的每台服务器上设置单独的警报。\n\
  \n#### 注意\n\n如果要使用监视服务器，在设置日志传送时配置它至关重要。日志传送配置完成后，添加监视服务器的唯一方法是拆解并重新配置日志传送。\n\n\
  #### 故障转移\n\n与其他高可用性和灾难恢复技术不同，日志传送故障转移需要付出一定的管理努力。要进行日志传送故障转移，你必须备份事务日志的尾部，并将其连同任何其他未复制的备份文件一起复制到辅助服务器。\n\
  \n现在你需要按顺序将剩余的事务日志备份应用到辅助服务器，最后应用尾日志备份。你使用 `WITH RECOVERY` 选项应用最终还原，以使数据库以一致状态重新联机。如果你不打算故障恢复回去，可以将日志传送重新配置为以辅助服务器作为新的主服务器。\n\
  \n#### 注意\n\n第 15 章将更详细地讨论日志传送。第 12 章将更详细地讨论备份和还原。\n\n\n### 技术结合\n\n要满足您的业务目标和非功能性需求（NFRs），您需要将多种高可用性和灾难恢复技术结合起来，以创建一个可靠且可扩展的平台。一个经典的例子就是将\
  \ `AlwaysOn 故障转移集群` 与 `AlwaysOn 可用性组` 结合的需求。\n\n您可能需要结合这些技术的原因是，当您在同步模式下使用 `AlwaysOn\
  \ 可用性组` 时（这是实现自动故障转移所必须的），它可能会导致性能障碍。如本章前面所讨论的，性能问题源于事务在提交到主服务器之前，先在辅助服务器上提交。然而，集群技术不会遇到此问题，因为它依赖于共享磁盘资源，因此事务只提交一次。\n\
  \n因此，常见的做法是首先使用集群来实现高可用性，然后使用 `AlwaysOn 可用性组` 来执行灾难恢复（DR）和/或卸载报告工作负载。图 13-9 中的图表说明了一种结合集群和\
  \ `AOAG` 的高可用性/灾难恢复拓扑，分别用于实现高可用性和灾难恢复。\n\n![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig9_HTML.png](img/333037_2_En_13_Fig9_HTML.png)\n\
  图 13-9\n\n集群与 AlwaysOn 可用性组的结合\n\n图 13-9 显示，数据库的主副本托管在一个双节点主动/被动集群上。如果活动节点发生故障，则应用集群规则，共享存储、网络名称和\
  \ IP 地址会重新附加到被动节点，该节点随后成为活动节点。但是，如果两个节点都不可访问，则可用性组侦听器会将流量指向集群的第三个节点，该节点位于灾难恢复站点，并使用日志流复制进行同步。当然，当使用异步模式时，数据库必须由\
  \ `DBA` 手动进行故障转移。\n\n另一个常见场景是集群和日志传送的结合，分别用于实现高可用性和灾难恢复。这种组合的工作方式与集群结合 `AlwaysOn\
  \ 可用性组` 非常相似，如图 13-10 所示。\n\n![../images/333037_2_En_13_Chapter/333037_2_En_13_Fig10_HTML.png](img/333037_2_En_13_Fig10_HTML.png)\n\
  图 13-10\n\n集群结合日志传送\n\n该图显示，在主数据中心配置了一个双节点主动/被动集群。托管在此实例上的数据库的事务日志然后被传送到灾难恢复数据中心的一台独立服务器。由于集群使用共享存储，您还应该为备份卷使用共享存储，并将备份卷作为资源添加到角色中。这意味着当实例故障转移到另一个节点时，备份共享也会随之故障转移，日志传送将继续同步，不会中断。\n\
  \n#### 注意\n\n如果在日志传送备份或复制作业进行期间发生故障转移，日志传送可能会失去同步并需要手动干预。这意味着在故障转移后，您应该检查日志传送作业的健康状态。\n\
  \n### 总结\n\n理解可用性的概念是为您需要高可用性和灾难恢复的应用程序做出正确实施选择的关键。您应该计算停机成本，并将其与实施高可用性/灾难恢复解决方案选择的成本进行比较，以帮助企业了解每个选项的成本/收益概况。在选择技术实现时，您也应该注意服务级别协议（SLA），因为如果未能满足\
  \ SLA，可能会产生财务处罚。\n\n`SQL Server` 提供了一套完整的高可用性和灾难恢复技术，使您能够灵活地实施最适合数据层应用程序需求的解决方案。对于高可用性，您可以实施故障转移集群或\
  \ `AlwaysOn 可用性组 (AOAG)`。故障转移集群使用共享磁盘资源，故障转移发生在实例级别。而 `AOAG` 则通过维护数据库的冗余副本来在数据库级别同步数据，使用同步日志流。\n\
  \n要实现灾难恢复，您可以选择实施 `AOAG` 或日志传送。日志传送通过备份、复制和还原数据库的事务日志来工作，而 `AOAG` 则使用异步日志流来同步数据。\n\
  \n您还可以将多种高可用性和灾难恢复技术结合在一起，以实施最合适的可用性策略。常见的例子是将用于高可用性的故障转移集群与用于提供灾难恢复的 `AOAG` 或日志传送相结合。\n\
  \n## 14. 实施 AlwaysOn 可用性组\n\n`AlwaysOn 可用性组` 为实现高可用性、从灾难中恢复以及扩展只读工作负载提供了一个灵活的选择。该技术在数据库级别同步数据，但健康监控和仲裁由\
  \ `Windows` 集群提供。\n\n`AlwaysOn 可用性组` 有不同的变体。传统的类型建立在 `Windows 故障转移集群` 上，但如果 `SQL\
  \ Server` 安装在 `Linux` 上，则可以使用 `Pacemaker`。自 `SQL Server 2017` 起，`AlwaysOn 可用性组`\
  \ 也可以在完全没有集群的情况下配置。这对于卸载报告工作负载是可接受的，但不是有效的高可用性或灾难恢复配置。当使用 `SQL Server 2019` 和 `Windows\
  \ Server 2019` 时，可用性组甚至可以为容器化的 `SQL` 配置，例如与 `Kubernetes` 结合。\n\n本章重点介绍在 `Windows\
  \ 故障转移集群` 上配置可用性组，旨在同时提供高可用性（HA）和灾难恢复（DR）。我们还将讨论 `Linux` 上的可用性组和分布式可用性组。使用可用性组来扩展只读工作负载将在第\
  \ 16 章中讨论。\n\n#### 注意\n\n在本章的演示中，我们使用一个包含域控制器和一个三节点集群的域。集群没有用于数据的共享存储，也没有 `AlwaysOn\
  \ 故障转移集群实例`。每个节点上都安装了一个独立的 `SQL Server` 实例，分别命名为 `ClusterNode1\\PrimaryReplica`、`ClusterNode2\\\
  SyncHA` 和 `ClusterNode3\\AsyncDR`。`CLUSTERNODE1` 和 `CLUSTERNODE2` 位于 `Site1`，`CLUSTERNODE3`\
  \ 位于 `Site2`，这意味着集群跨越了子网。关于如何构建故障转移集群或故障转移集群实例的完整细节超出了本书的范围，但完整细节可以在 `Apress` 出版的《`SQL\
  \ Server AlwaysOn Revealed`》一书中找到，网址为 [`www.apress.com/gb/book/9781484223963`](http://www.apress.com/gb/book/9781484223963)。\n\
  \n### 实施 AlwaysOn 可用性组\n\n在实施 `AlwaysOn 可用性组` 之前，我们首先创建三个数据库，它们将在本章的演示中使用。其中两个数据库与虚构的应用程序\
  \ `App1` 相关，第三个数据库与虚构的应用程序 `App2` 相关。每个数据库包含一个表，我们向其中填充了数据。每个数据库的恢复模式都设置为 `FULL`。这是数据库使用\
  \ `AlwaysOn 可用性组` 的硬性要求，因为数据是通过日志流同步的。清单 14-1 中的脚本创建了这些数据库。\n\n### 创建数据库\n\n```sql\n\
  CREATE DATABASE Chapter14App1Customers ;\nGO\nALTER DATABASE Chapter14App1Customers\
  \ SET RECOVERY FULL ;\nGO\nUSE Chapter14App1Customers\nGO\nCREATE TABLE App1Customers\n\
  (\nID                INT                PRIMARY KEY        IDENTITY,\nFirstName\
  \         NVARCHAR(30),\nLastName          NVARCHAR(30),\nCreditCardNumber  VARBINARY(8000)\n\
  ) ;\nGO\n--Populate the table\nDECLARE @Numbers TABLE\n(\nNumber        INT\n)\n\
  ;WITH CTE(Number)\nAS\n(\nSELECT 1 Number\nUNION ALL\nSELECT Number + 1\nFROM CTE\n\
  WHERE Number < 100\n)\nINSERT INTO @Numbers\nSELECT Number FROM CTE\nDECLARE @Names\
  \ TABLE\n(\nFirstName        VARCHAR(30),\nLastName         VARCHAR(30)\n) ;\nINSERT\
  \ INTO @Names\nVALUES('Peter', 'Carter'),\n('Michael', 'Smith'),\n('Danielle', 'Mead'),\n\
  ('Reuben', 'Roberts'),\n('Iris', 'Jones'),\n('Sylvia', 'Davies'),\n('Finola', 'Wright'),\n\
  ('Edward', 'James'),\n('Marie', 'Andrews'),\n('Jennifer', 'Abraham'),\n('Margaret',\
  \ 'Jones')\nINSERT INTO App1Customers(Firstname, LastName, CreditCardNumber)\nSELECT\
  \  FirstName, LastName, CreditCardNumber FROM\n(SELECT\n(SELECT TOP 1 FirstName\
  \ FROM @Names ORDER BY NEWID()) FirstName\n,(SELECT TOP 1 LastName FROM @Names ORDER\
  \ BY NEWID()) LastName\n,(SELECT CONVERT(VARBINARY(8000)\n,(SELECT TOP 1 CAST(Number\
  \ * 100 AS CHAR(4))\nFROM @Numbers\nWHERE Number BETWEEN 10 AND 99 ORDER BY NEWID())\
  \ + '-' +\n(SELECT TOP 1 CAST(Number * 100 AS CHAR(4))\nFROM @Numbers\nWHERE Number\
  \ BETWEEN 10 AND 99 ORDER BY NEWID()) + '-' +\n(SELECT TOP 1 CAST(Number * 100 AS\
  \ CHAR(4))\nFROM @Numbers\nWHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()) + '-'\
  \ +\n(SELECT TOP 1 CAST(Number * 100 AS CHAR(4))\nFROM @Numbers\nWHERE Number BETWEEN\
  \ 10 AND 99 ORDER BY NEWID()))) CreditCardNumber\nFROM @Numbers a\nCROSS JOIN @Numbers\
  \ b\nCROSS JOIN @Numbers c\n) d ;\nCREATE DATABASE Chapter14App1Sales ;\nGO\nALTER\
  \ DATABASE Chapter14App1Sales SET RECOVERY FULL ;\nGO\nUSE Chapter14App1Sales\n\
  GO\nCREATE TABLE [dbo].Orders NOT NULL PRIMARY KEY CLUSTERED,\n[OrderDate] [date]\
  \  NOT NULL,\n[CustomerID] [int]  NOT NULL,\n[ProductID] [int]   NOT NULL,\n[Quantity]\
  \ [int]    NOT NULL,\n[NetAmount] [money] NOT NULL,\n[TaxAmount] [money] NOT NULL,\n\
  [InvoiceAddressID] [int] NOT NULL,\n[DeliveryAddressID] [int] NOT NULL,\n[DeliveryDate]\
  \ [date] NULL,\n) ;\nDECLARE @Numbers TABLE\n(\nNumber        INT\n)\n;WITH CTE(Number)\n\
  AS\n(\nSELECT 1 Number\nUNION ALL\nSELECT Number + 1\nFROM CTE\nWHERE Number < 100\n\
  )\nINSERT INTO @Numbers\nSELECT Number FROM CTE\n--Populate ExistingOrders with\
  \ data\nINSERT INTO Orders\nSELECT\n(SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number\n\
  FROM @Numbers\nORDER BY NEWID()),getdate())as DATE)),\n(SELECT TOP 1 Number -10\
  \ FROM @Numbers ORDER BY NEWID()),\n(SELECT TOP 1 Number FROM @Numbers ORDER BY\
  \ NEWID()),\n(SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),\n500,\n100,\n\
  (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),\n(SELECT TOP 1 Number FROM\
  \ @Numbers ORDER BY NEWID()),\n(SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number - 10\n\
  FROM @Numbers\nORDER BY NEWID()),getdate()) as DATE))\nFROM @Numbers a\nCROSS JOIN\
  \ @Numbers b\nCROSS JOIN @Numbers c ;\nCREATE DATABASE Chapter14App2Customers ;\n\
  GO\nALTER DATABASE Chapter14App2Customers SET RECOVERY FULL ;\nGO\nUSE Chapter14App2Customers\n\
  GO\nCREATE TABLE App2Customers\n(\nID                INT                PRIMARY\
  \ KEY        IDENTITY,\nFirstName         NVARCHAR(30),\nLastName          NVARCHAR(30),\n\
  CreditCardNumber  VARBINARY(8000)\n) ;\nGO\n--Populate the table\nDECLARE @Numbers\
  \ TABLE\n(\nNumber        INT\n) ;\n;WITH CTE(Number)\nAS\n(\nSELECT 1 Number\n\
  UNION ALL\nSELECT Number + 1\nFROM CTE\nWHERE Number < 100\n)\nINSERT INTO @Numbers\n\
  SELECT Number FROM CTE ;\nDECLARE @Names TABLE\n(\nFirstName        VARCHAR(30),\n\
  LastName        VARCHAR(30)\n) ;\nINSERT INTO @Names\nVALUES('Peter', 'Carter'),\n\
  ('Michael', 'Smith'),\n('Danielle', 'Mead'),\n('Reuben', 'Roberts'),\n('Iris', 'Jones'),\n\
  ('Sylvia', 'Davies'),\n('Finola', 'Wright'),\n('Edward', 'James'),\n('Marie', 'Andrews'),\n\
  ('Jennifer', 'Abraham'),\n('Margaret', 'Jones')\nINSERT INTO App2Customers(Firstname,\
  \ LastName, CreditCardNumber)\nSELECT  FirstName, LastName, CreditCardNumber FROM\n\
  (SELECT\n(SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName\n,(SELECT\
  \ TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName\n,(SELECT CONVERT(VARBINARY(8000)\n\
  ,(SELECT TOP 1 CAST(Number * 100 AS CHAR(4))\nFROM @Numbers\nWHERE Number BETWEEN\
  \ 10 AND 99 ORDER BY NEWID()) + '-' +\n(SELECT TOP 1 CAST(Number * 100 AS CHAR(4))\n\
  FROM @Numbers\nWHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()) + '-' +\n(SELECT\
  \ TOP 1 CAST(Number * 100 AS CHAR(4))\nFROM @Numbers\nWHERE Number BETWEEN 10 AND\
  \ 99 ORDER BY NEWID()) + '-' +\n(SELECT TOP 1 CAST(Number * 100 AS CHAR(4))\nFROM\
  \ @Numbers\nWHERE Number BETWEEN 10 AND 99 ORDER BY NEWID()))) CreditCardNumber\n\
  FROM @Numbers a\nCROSS JOIN @Numbers b\nCROSS JOIN @Numbers c\n) d ;\n```\n\n代码清单\
  \ 14-1\n\n### 配置 SQL Server\n\n配置 AlwaysOn 可用性组的第一步是在 SQL Server 服务上启用此功能。要通过 GUI\
  \ 启用该功能，我们打开 **SQL Server 配置管理器**，导航到 **SQL Server 服务**，然后从 SQL Server 服务的上下文菜单中选择**属性**。此时会显示服务属性，我们导航到\
  \ **AlwaysOn 高可用性**选项卡，如图 14-1 所示。\n\n在此选项卡上，我们勾选 **启用 AlwaysOn 可用性组**复选框，并确保 **Windows\
  \ 故障转移群集名称**框中显示的群集名称正确无误。然后我们需要重新启动 SQL Server 服务。由于 AlwaysOn 可用性组使用的是**独立实例**（它们安装在群集的每个节点上），而不是跨多个节点的**故障转移群集实例**，因此我们需要在群集上托管的每个独立实例上重复这些步骤。\n\
  \n![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig1_HTML.jpg](img/333037_2_En_14_Fig1_HTML.jpg)\n\
  \n图 14-1：AlwaysOn 高可用性选项卡\n\n我们也可以使用 PowerShell 来启用 AlwaysOn 可用性组。为此，我们使用代码清单 14-2\
  \ 中的 PowerShell 命令。该脚本假定 `CLUSTERNODE1` 是服务器名称，`PRIMARYREPLICA` 是 SQL Server 实例的名称。\n\
  \n```powershell\nEnable-SqlAlwaysOn -Path SQLSERVER:\\SQL\\CLUSTERNODE1\\PRIMARYREPLICA\n\
  ```\n\n代码清单 14-2：启用 AlwaysOn 可用性组\n\n下一步是对将成为可用性组一部分的所有数据库进行完整备份。完成此操作之前，我们将无法将它们添加到可用性组。我们分别为\
  \ `App1` 和 `App2` 创建单独的可用性组，因此要为 `App1` 创建可用性组，我们需要备份 `Chapter14App1Customers` 和\
  \ `Chapter14App1Sales` 数据库。我们通过运行代码清单 14-3 中的脚本来完成此操作。\n\n```sql\nBACKUP DATABASE\
  \ Chapter14App1Customers\nTO  DISK = N'C:\\Backups\\Chapter14App1Customers.bak'\n\
  WITH NAME = N'Chapter14App1Customers-Full Database Backup' ;\nGO\nBACKUP DATABASE\
  \ Chapter14App1Sales\nTO  DISK = N'C:\\Backups\\Chapter14App1Sales.bak'\nWITH NAME\
  \ = N'Chapter14App1Sales-Full Database Backup' ;\nGO\n```\n\n代码清单 14-3：备份数据库\n\n\
  #### 注意\n\n备份将在第 12 章中讨论。\n\n### 创建可用性组\n\n您可以通过多种方式在 SQL Server 中创建可用性组拓扑。可以主要通过对话框手动创建，通过\
  \ T-SQL 创建，或者通过向导创建。在本章中，我们将探讨向导和对话框。\n\n### 使用新建可用性组向导\n\n当备份成功完成后，我们通过在对象资源管理器中展开\
  \ AlwaysOn 高可用性，然后从“可用性组”文件夹的上下文菜单中选择“新建可用性组向导”来启动该向导。向导的“简介”页面将显示出来，为我们概述需要执行的步骤。\n\
  \n在“指定名称”页面（参见图 14-2），系统会提示我们为可用性组输入一个名称。我们还需要选择“Windows Server 故障转移群集”作为群集类型。其他群集类型选项包括“外部”（支持\
  \ Linux 上的 Pacemaker）和“无”（用于无群集的可用性组）。“数据库级别运行状况检测”选项将使得组中任何数据库脱机时，可用性组都会发生故障转移。“每数据库\
  \ DTC 支持”选项将指定是否支持使用 MSDTC（Microsoft 分布式事务处理协调器）的跨数据库事务。关于配置 DTC 的完整讨论超出了本书范围，但可以在\
  \ [`https://docs.microsoft.com/en-us/previous-versions/windows/desktop/ms681291(v=vs.85)`](https://docs.microsoft.com/en-us/previous-versions/windows/desktop/ms681291%2528v%25253Dvs.85%2529)\
  \ 找到更多详细信息。\n\n![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig2_HTML.jpg](img/333037_2_En_14_Fig2_HTML.jpg)\n\
  \n图 14-2：指定名称页面\n\n在“选择数据库”页面，系统会提示我们选择希望参与可用性组的数据库，如图 14-3 所示。在此屏幕上，请注意我们无法选择 `Chapter14App2Customers`\
  \ 数据库，因为我们尚未对该数据库进行完整备份。\n\n![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig3_HTML.jpg](img/333037_2_En_14_Fig3_HTML.jpg)\n\
  \n图 14-3：选择数据库页面\n\n“指定副本”页面包含四个选项卡。我们使用第一个选项卡“副本”将辅助副本添加到拓扑中。选中“同步提交”选项会导致数据在提交到主副本之前，先在辅助副本上提交。（这也被称为在主副本之前，先在辅助副本上固化日志。）这意味着在发生故障转移时，不可能丢失数据，即我们可以满足\
  \ RPO（恢复点目标）为 0（零）的 SLA（服务级别协议）。然而，这也意味着性能会有所下降。如果我们选择“异步提交”，那么副本将以异步提交模式运行。这意味着数据在提交到辅助副本之前，先在主副本上提交。这避免了性能下降，但也意味着在发生故障转移时，RPO\
  \ 是不确定的。同步副本的性能考虑因素将在本章后面讨论。\n\n当我们选中“自动故障转移”选项时，如果我们尚未选择“同步提交”，该选项也会被自动选中。这是因为自动故障转移仅在同步提交模式下才可能。我们可以将“可读辅助副本”下拉列表设置为“否”、“是”或“仅读意向”。当设置为“否”时，处于辅助角色的副本上的数据库不可访问。当设置为“仅读意向”时，可用性组侦听器可以将只读工作负载重定向到此辅助副本，但前提是应用程序在连接字符串中指定了\
  \ `Application Intent=Read-only`。将其设置为“是”则启用侦听器重定向只读流量，无论应用程序的连接字符串中是否存在 `Application\
  \ Intent` 参数。尽管我们可以通过 GUI 更改“可读辅助副本”的值，同时为副本配置自动故障转移而不报错，但这只是向导的一个特性。实际上，该副本是不可访问的，因为配置为自动故障转移时不支持活动辅助副本。“副本”选项卡如图\
  \ 14-4 所示。为满足我们实现高可用性和灾难恢复的要求，我们将同一站点内的辅助服务器配置为同步副本，将不同站点中的服务器配置为异步副本。这意味着数据中心之间的延迟不会加剧与同步提交相关的性能下降。\n\
  \n#### 注意\n\n将辅助副本用于只读工作负载在第 16 章中有更深入的讨论。\n\n![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig4_HTML.jpg](img/333037_2_En_14_Fig4_HTML.jpg)\n\
  \n图 14-4：副本选项卡\n\n在“指定副本”页面的“端点”选项卡上（如图 14-5 所示），我们为每个端点指定端口号。默认端口为 5022，但如果需要，我们可以指定不同的端口。在此选项卡上，我们还指定在端点之间发送数据时是否应进行加密。选中此选项通常是个好主意，如果选中，则使用\
  \ AES（高级加密标准）作为加密算法。\n\n可选地，您还可以更改创建的端点的名称。但是，由于每个实例只允许一个数据库镜像端点，而且默认名称已经相当具有描述性，因此并不总是需要更改它。一些\
  \ DBA 选择将其重命名以包含实例名称，因为这可以简化多服务器的管理。如果您的企业有许多可用性组群集，这是一个好主意。\n\n显示每个实例使用的服务帐户仅供参考。如果您确保两个实例使用相同的服务帐户，可以简化安全管理。如果未能做到这一点，您将需要为每个服务帐户授予每个实例的权限。这意味着，您没有通过仅将一个服务帐户用于一个实例来减小每个服务帐户的安全范围，而是将安全范围从操作系统级别提升到了\
  \ SQL Server 级别。\n\n端点 URL 指定了可用性组用于通信的端点的 URL。URL 的格式是 `[传输协议]://[路径]:[端口]`。数据库镜像端点的传输协议始终是\
  \ TCP（传输控制协议）。路径可以是服务器的完全限定域名 (FQDN)、单独的服务器名称或网络中唯一的 IP 地址。我建议使用服务器的 FQDN，因为这总是保证有效。这也是填充的默认值。端口号应与您为端点指定的端口号匹配。\n\
  \n\n#### 注意\n\n可用性组通过数据库镜像端点进行通信。虽然数据库镜像已弃用，但这些端点仍然有效。\n\n![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig5_HTML.jpg](img/333037_2_En_14_Fig5_HTML.jpg)\n\
  \n图 14-5 端点选项卡\n\n##### 备份首选项选项卡\n\n在“备份首选项”选项卡（见图 14-6）上，我们可以指定执行自动备份的副本。AlwaysOn\
  \ 可用性组的一个主要优点是，使用它们时，可以将备份等维护任务扩展到辅助服务器。因此，自动备份可以无缝地定向到活动辅助副本。可能的选项包括“首选辅助”、“仅限辅助”、“主副本”或“任意副本”。还可以为每个副本设置优先级。在确定针对哪个副本运行备份作业时，SQL\
  \ Server 会评估每个节点的备份优先级，并更有可能选择优先级最高的副本。\n\n尽管减少主副本 I/O 的优势显而易见，但在许多情况下，我有些争议地建议不要将自动备份扩展到辅助副本。当应用程序的恢复时间目标（`RTO`）是优先考虑事项时，尤其如此，因为存在操作可支持性问题。设想这样一种情况：备份正在辅助副本上进行，而用户打电话说他们意外删除了关键表中的所有数据。现在你需要恢复数据库副本并重新填充该表。然而，备份文件位于辅助副本上。因此，在开始恢复数据库（或通过网络执行恢复）之前，你需要将备份文件复制到主副本。这会立即增加你的\
  \ `RTO`。\n\n此外，当配置为允许在多台服务器上备份时，`SQL Server` 仍然只在进行备份的实例上维护备份历史记录。这意味着你可能需要在服务器之间慌乱地查找，试图检索所有备份文件，却不知道每个文件存放在哪里。如果其中一台服务器发生完全系统中断，情况会变得更糟。你可能会发现自己处于日志链断裂的困境中。\n\
  \n对于我刚才提到的大多数问题，解决方法是使用文件服务器上的共享，并将每个实例配置为备份到同一个共享。然而，这样设置的问题是，你现在正通过网络传输所有备份，而不是在本地进行备份。这会增加备份的持续时间以及网络流量。\n\
  \n![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig6_HTML.jpg](img/333037_2_En_14_Fig6_HTML.jpg)\n\
  \n图 14-6 备份首选项选项卡\n\n##### 侦听器选项卡\n\n在如图 14-7 所示的“侦听器”选项卡上，我们选择是创建可用性组侦听器，还是希望将此任务推迟到以后。如果选择创建侦听器，则需要指定侦听器的名称、它应侦听的端口以及它应使用的\
  \ IP 地址。在多子网群集中，我们为每个子网指定一个地址。此处提供的详细信息用于在可用性组的群集角色中创建客户端访问点资源。你可能会注意到我们为侦听器指定了端口\
  \ `1433`，而我们的实例也运行在端口 `1433` 上。这是一个有效的配置，因为侦听器配置的 IP 地址与 `SQL Server` 实例不同。使用相同的端口号并非强制要求，但如果你在现有实例上实现\
  \ AlwaysOn 可用性组，这可能有益，因为指定端口号连接的应用程序可能需要更少的更改。请记住，服务器名称仍将不同，因为应用程序将连接到侦听器的虚拟名称，而不是物理服务器\\\
  实例的名称。在我们的示例中，应用程序连接到 `APP1LISTEN\\PRIMARYREPLICA` 而不是 `CLUSTERNODE1\\PRIMARYREPLICA`。虽然通过\
  \ `CLUSTERNODE1` 的连接仍然允许，但它们无法从高可用性或扩展我们的报告中受益。\n\n由于我们的 App1 可用性组跨越两个子网，因此我们的侦听器必须有两个\
  \ IP 地址，每个子网一个。这使得侦听器在我们的任一站点中都可用。\n\n#### 提示\n\n如果你在组织单位（`OU`）中没有“创建计算机对象”权限，那么侦听器的\
  \ `VCO`（虚拟计算机对象）必须存在于活动目录（`AD`）中，并且你必须被分配对该对象的“完全控制”权限。\n\n![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig7_HTML.jpg](img/333037_2_En_14_Fig7_HTML.jpg)\n\
  \n图 14-7 侦听器选项卡\n\n##### 选择初始数据同步\n\n在如图 14-8 所示的“选择初始数据同步”屏幕上，我们选择如何执行副本的初始数据同步。如果选择“完整”，则参与可用性组的每个数据库都将执行完整备份，然后是日志备份。备份文件备份到你指定的共享，然后还原到辅助服务器。共享路径可以使用\
  \ `Windows` 或 `Linux` 格式指定，具体取决于你的要求。还原完成后，通过日志流的数据同步开始。\n\n如果你已经备份了数据库并将它们还原到辅助副本上，则可以选择“仅连接”选项。这将启动可用性组内数据库通过日志流的数据同步。选择“跳过初始数据同步”允许你在完成设置后自行备份和还原数据库。\n\
  \n如果选择“自动种子设定”选项，则最初会在每个副本上创建一个空数据库。然后使用 `VDI` 通过日志流传输进行数据种子设定。此选项比使用备份初始化慢，但避免了在共享之间传输大型备份文件。\n\
  \n#### 提示\n\n如果你的可用性组将包含许多数据库，那么最好自行执行备份/还原。这是因为内置工具将按顺序执行操作，因此可能需要很长时间才能完成。\n\n\
  ![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig8_HTML.jpg](img/333037_2_En_14_Fig8_HTML.jpg)\n\
  \n图 14-8 选择数据同步页面\n\n##### 验证和完成\n\n在“验证”页面上，会检查可能导致设置失败的规则。如果任何结果返回为“失败”，则需要在尝试继续之前解决它们。\n\
  \n验证测试完成后，我们转到“摘要”页面，其中显示了在设置过程中要执行的任务列表。\n\n随着设置的进行，每个配置任务的结果显示在“结果”页面上。如果此页面上出现任何错误，请务必调查它们，但这并不一定意味着整个可用性组需要重新配置。例如，如果由于\
  \ `VCO` 尚未在 `AD` 中呈现而导致创建可用性组侦听器失败，那么你可以重新创建侦听器，而无需重新创建整个可用性组。\n\n作为使用“新建可用性组向导”的替代方法，你可以使用“新建可用性组”对话框，然后使用“添加侦听器”对话框来执行可用性组的配置。本章稍后将探讨这种创建可用性组的方法。\n\
  \n\n\n### 使用“新建可用性组”对话框\n\n既然我们已经成功创建了第一个可用性组，现在让我们为 `App2` 创建第二个可用性组。这次，我们使用“新建可用性组”和“添加侦听器”对话框。我们首先通过备份\
  \ `Chapter14App2Customers` 数据库来开始此过程。就像创建 `App1` 可用性组时一样，在我们执行备份之前，数据库是不可选择的。然而，与使用向导时不同，我们无法通过备份/还原选项让\
  \ SQL Server 执行初始数据库同步。因此，我们必须将数据库备份到我们在上一个演示中创建的共享中，然后将备份连同事务日志备份还原到辅助实例，或者使用**自动种子设定**。在此示例中，我们将使用自动种子设定，因此无需提前将数据库还原到辅助副本。清单\
  \ 14-4 中的脚本将对 `Chapter14App2Customers` 数据库执行完整备份。\n\n#### 提示\n\n要使自动种子设定生效，必须在辅助服务器上为可用性组授予\
  \ `CREATE ANY DATABASE` 权限。有关授予权限的更多信息，请参见第 10 章。\n\n```\n--Back Up Database\nBACKUP\
  \ DATABASE [Chapter14App2Customers] TO  DISK = N'\\\\CLUSTERNODE1\\AOAGShare\\Chapter14App2Customers.bak'\
  \ WITH  COPY_ONLY, FORMAT, INIT, REWIND, COMPRESSION,  STATS = 5 ;\nGO\n清单 14-4\n\
  备份和还原数据库\n```\n\n如果我们尚未创建可用性组，那么我们的下一步将是创建一个 TCP 终结点，以便实例可以通信。然后，我们需要在每个实例上为服务账户创建登录名，并授予其在终结点上的连接权限。然而，由于每个实例只能有一个数据库镜像终结点，因此我们不需要创建新的终结点，而且显然我们也没有理由为服务账户授予额外的权限。因此，我们继续创建可用性组。为此，我们在对象资源管理器中展开“AlwaysOn\
  \ 高可用性”，然后从可用性组的上下文菜单中选择“新建可用性组”。\n\n这将显示“新建可用性组”对话框的“常规”选项卡，如图 14-9 所示。在此界面上，我们在第一个字段中输入可用性组的名称。然后，我们在“可用性数据库”窗口下单击“添加”按钮，再输入我们希望添加到组中的数据库名称。接着，我们需要在“可用性副本”窗口下单击“添加”按钮，然后在新增的行中输入辅助副本的“服务器\\\
  实例”名称。对于我们的用例，无需指定“每数据库 DTC 支持”或“数据库级别运行状况检测”设置，因为可用性组内只有一个数据库。但是，我们将“要提交的同步辅助副本数”设置为\
  \ 1。此设置是 SQL Server 2017 中的新增功能，它保证在提交每个事务之前，指定数量的辅助副本已将事务数据写入日志。在我们的场景中，我们只有一个同步辅助副本，如果主副本发生故障，故障转移将自动发生，但在原始主副本重新联机之前，辅助副本将不允许用户事务写入数据库。这绝对保证了在任何情况下都不会丢失数据。如果我们将此设置保留为\
  \ 0（如本章第一个示例中那样），那么在主副本发生故障、用户在辅助副本也发生故障之前向其写入事务的情况下，就可能发生数据丢失，因为另一个唯一副本使用的是异步提交模式。\n\
  \n![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig9_HTML.jpg](img/333037_2_En_14_Fig9_HTML.jpg)\n\
  *图 14-9：新建可用性组对话框*\n\n现在我们可以开始设置副本属性。在创建 `App1` 可用性组时，我们讨论了“角色”、“可用性模式”、“故障转移模式”、“可读辅助副本”和“终结点\
  \ URL”属性。“连接中的主角色”属性定义了当副本处于主角色时可以建立哪些连接。您可以将其配置为“允许所有连接”或“允许读/写连接”。当指定“读/写”时，其连接字符串中使用\
  \ `Application Intent = Read only` 参数的应用程序将无法连接到该副本。\n\n“会话超时”属性设置了副本在多长时间内未收到彼此的\
  \ ping 后，会进入 `DISCONNECTED` 状态并结束会话。虽然可以将此值设置为低至 5 秒，但通常最好将设置保持为 60 秒；否则，您可能会面临误报响应的风险，导致不必要的故障转移。如果副本超时，则需要重新同步，因为即使辅助副本以同步提交模式运行，主副本上的事务也不再会等待它。\n\
  \n在对话框的“备份首选项”选项卡上，我们定义用于自动备份作业的首选副本，如图 14-10 所示。就像使用向导时一样，我们可以指定“主副本”，也可以选择强制或偏好在辅助副本上进行备份。我们还可以为每个副本配置一个介于\
  \ 0 到 100 之间的权重，并使用“排除副本”复选框来避免在特定节点上进行备份。\n\n#### 提示\n\n如果您使用的是软件保障，尽管您的许可允许您将辅助副本同步用于高可用性或灾难恢复目的，但不允许您在此辅助服务器上执行其他任务（例如备份），此时排除副本进行备份会很有帮助。\n\
  \n![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig10_HTML.jpg](img/333037_2_En_14_Fig10_HTML.jpg)\n\
  *图 14-10：“备份首选项”选项卡*\n\n创建可用性组后，我们需要创建可用性组侦听器。为此，我们从现在应在对象资源管理器中可见的 `App2` 可用性组的上下文菜单中选择“新建侦听器”。这将调用“新建可用性组侦听器”对话框，如图\
  \ 14-11 所示。\n\n在此对话框中，我们首先输入侦听器的虚拟名称。然后，我们定义它将侦听的端口以及将分配给它的 IP 地址。\n\n#### 提示\n\n\
  我们能够为两个侦听器以及 SQL Server 实例使用相同的端口，因为所有三者使用的是不同的 IP 地址。\n\n![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig11_HTML.jpg](img/333037_2_En_14_Fig11_HTML.jpg)\n\
  *图 14-11：新建可用性组侦听器对话框*\n\n### Linux 上的可用性组\n\n除了在 Windows 故障转移群集上工作外，还可以在 Linux\
  \ 上运行的 SQL Server 实例上配置可用性组。在本节中，我们将讨论如何在 Linux 上为高可用性配置可用性组。在我们的具体场景中，我们有两个服务器，即\
  \ `ubuntu-primary` 和 `ubuntu-secondary`，它们将构成我们的服务器拓扑。\n\n\n\n#### 提示\n\n有关在 Linux\
  \ 上安装 SQL Server 的更多信息，请参见第 4 章。\n\n正如在 Windows 环境中一样，在 Linux 上配置可用性组的第一步是在服务级别启用该功能。清单\
  \ 14-5 中的脚本演示了如何启用可用性组然后重启服务。此脚本需要在将成为副本的每个服务器上执行。\n\n#### 提示\n\n如第 4 章所讨论的，`sudo`相当于\
  \ Windows 中的“以管理员身份运行”。使用`sudo`时，系统会提示您输入`root`密码。\n\n```\nsudo /opt/mssql/bin/mssql-conf\
  \ set hadr.hadrenabled  1\nsudo systemctl restart mssql-server\n清单 14-5\n启用 AlwaysOn\
  \ 可用性组\n```\n\n由于 Linux 服务器无法使用 AD 身份验证相互进行身份验证，因此下一步是创建可用于身份验证的证书。您可以通过连接到主服务器并运行清单\
  \ 14-6 中的脚本来创建证书。该脚本在 SQL Server 实例中创建证书，然后将其备份到操作系统，以便我们可以将其复制到辅助服务器。请记住，您可以通过使用`sqlcmd`或从安装在\
  \ Windows 机器上的 SSMS 进行连接，来连接到在 Linux 上运行的 SQL Server 实例。\n\n#### 提示\n\n有关创建证书的更多详细信息，请参见第\
  \ 11 章。\n\n```\nCREATE MASTER KEY ENCRYPTION BY PASSWORD = 'Pa$$w0rd';\nGO\nCREATE\
  \ CERTIFICATE aoag_certificate WITH SUBJECT = 'AvailabilityGroups';\nGO\nBACKUP\
  \ CERTIFICATE aoag_certificate\nTO FILE = '/var/opt/mssql/data/aoag_certificate.cer'\n\
  WITH PRIVATE KEY (\nFILE = '/var/opt/mssql/data/aoag_certificate.pvk',\nENCRYPTION\
  \ BY PASSWORD = 'Pa$$w0rd'\n);\nGO\n清单 14-6\n创建证书\n```\n\n我们现在需要将密钥复制到辅助服务器。为此，我们首先需要授予用户对`/var/opt/mssql/`数据文件夹的权限。我们可以使用清单\
  \ 14-7 中的命令来完成此操作，该命令需要在两台服务器上运行。\n\n```\nsudo chmod -R 777 /var/opt/mssql/data\n\
  清单 14-7\n授予权限\n```\n\n在清单 14-8 中的命令，如果在主服务器上运行，将把证书的公钥和私钥复制到辅助服务器。为了使此命令正常工作，每台服务器上应安装并配置\
  \ SSH。关于 SSH 的完整讨论超出了本书的范围，但可以在 [`http://ubuntuhandbook.org/index.php/2014/09/enable-ssh-in-ubuntu-14-10-server-desktop/`](http://ubuntuhandbook.org/index.php/2014/09/enable-ssh-in-ubuntu-14-10-server-desktop/)\
  \ 找到指南。\n\n#### 提示\n\n您应更改用户和服务器名称以匹配您自己的配置。\n\n```\nscp aoag_certificate.* pete@ubuntu-secondary:/var/opt/mssql/data\n\
  清单 14-8\n复制密钥\n```\n\n我们现在需要通过从文件系统导入证书和密钥，在辅助服务器上创建证书。这可以使用清单 14-9 中的脚本实现。\n\n\
  ```\nCREATE MASTER KEY ENCRYPTION BY PASSWORD = 'Pa$$w0rd' ;\nGO\nCREATE CERTIFICATE\
  \ aoag_certificate\nFROM FILE = '/var/opt/mssql/data/aoag_certificate.cer'\nWITH\
  \ PRIVATE KEY (\nFILE = '/var/opt/mssql/data/aoag_certificate.pvk',\nDECRYPTION\
  \ BY PASSWORD = 'Pa$$w0rd'\n) ;\nGO\n清单 14-9\n在辅助服务器上创建证书\n```\n\n现在我们的证书已就位，我们需要创建用于连接的端点。清单\
  \ 14-10 中的脚本将创建一个名为`AOAG_Endpoint`的端点，该端点侦听端口`5022`并使用我们的证书进行身份验证。此脚本应在两个实例上运行。\n\
  \n```\nCREATE ENDPOINT AOAG_Endpoint\nSTATE = STARTED\nAS TCP (LISTENER_PORT = 5022)\n\
  FOR DATABASE_MIRRORING (\nROLE = ALL,\nAUTHENTICATION = CERTIFICATE aoag_certificate,\n\
  ENCRYPTION = REQUIRED ALGORITHM AES\n);\n清单 14-10\n创建端点\n```\n\n接下来，我们可以在主副本上创建可用性组。这可以使用清单\
  \ 14-11 中的命令来实现。我们这里不讨论 `CREATE AVAILABILITY GROUP` 命令的完整语法（可在 [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-availability-group-transact-sql?view=sql-server-2019`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-availability-group-transact-sql%253Fview%253Dsql-server-2019)\
  \ 找到），但有几个具体的要点我想指出。首先，您会注意到 `CLUSTER_TYPE` 被设置为 `EXTERNAL`。当底层群集是 Linux 上的 Pacemaker\
  \ 时，这是唯一有效的选项。您还会注意到 `FAILOVER_MODE` 被设置为 `manual`。当 `CLUSTER_TYPE` 设置为 `EXTERNAL`\
  \ 时，这是唯一有效的选项。这意味着永远不应通过 T-SQL 执行故障转移。故障转移应仅由外部群集管理器管理。\n\n```\nCREATE AVAILABILITY\
  \ GROUP Linux_AOAG\nWITH (CLUSTER_TYPE = EXTERNAL)\nFOR REPLICA ON 'ubuntu-primary'\
  \ WITH (\nENDPOINT_URL = N'tcp://ubuntu-primary:5022',\nAVAILABILITY_MODE = SYNCHRONOUS_COMMIT,\n\
  FAILOVER_MODE = EXTERNAL,\nSEEDING_MODE = AUTOMATIC\n),\n'ubuntu-secondary' WITH\
  \ (\nENDPOINT_URL = N'tcp://ubuntu-secondary:5022',\nAVAILABILITY_MODE = SYNCHRONOUS_COMMIT,\n\
  FAILOVER_MODE = EXTERNAL,\nSEEDING_MODE = AUTOMATIC\n) ;\nGO\n清单 14-11\n创建可用性组\n\
  ```\n\n我们现在将使用清单 14-12 中的命令来授予可用性组创建数据库的权限。\n\n```\nALTER AVAILABILITY GROUP Linux_AOAG\
  \ GRANT CREATE ANY DATABASE ;\nGO\n清单 14-12\n授予权限\n```\n\n我们现在可以将辅助副本加入可用性组，并通过在连接到辅助实例时运行清单\
  \ 14-13 中的脚本来确保其具有适当的权限。\n\n\n#### 提示\n\n为了确保后续脚本能够成功执行，运行 Pacemaker 服务的 Linux 用户应被授予副本上的\
  \ `VIEW SERVER STATE` 权限，以及在可用性组上的 `ALTER`、`CONTROL` 和 `VIEW DEFINITION` 权限。\n\n\
  ```sql\nALTER AVAILABILITY GROUP Linux_AOAG JOIN WITH (CLUSTER_TYPE = EXTERNAL)\
  \ ;\nGO\nALTER AVAILABILITY GROUP Linux_AOAG GRANT CREATE ANY DATABASE ;\nGO\n```\n\
  \n*清单 14-13 加入辅助副本*\n\n现在可以向可用性组添加数据库。清单 14-14 中的脚本将创建一个名为 `LinuxDB` 的数据库并填充数据。然后，它将执行所需的备份，再将其添加到\
  \ `Linux_AOAG` 可用性组。\n\n```sql\nCREATE DATABASE LinuxDB ;\nGO\nALTER DATABASE LinuxDB\
  \ SET RECOVERY FULL ;\nGO\nUSE LinuxDB\nGO\nCREATE TABLE [dbo].Orders NOT NULL PRIMARY\
  \ KEY CLUSTERED,\n[OrderDate] [date]  NOT NULL,\n[CustomerID] [int]  NOT NULL,\n\
  [ProductID] [int]   NOT NULL,\n[Quantity] [int]    NOT NULL,\n[NetAmount] [money]\
  \ NOT NULL,\n[TaxAmount] [money] NOT NULL,\n[InvoiceAddressID] [int] NOT NULL,\n\
  [DeliveryAddressID] [int] NOT NULL,\n[DeliveryDate] [date] NULL,\n) ;\nDECLARE @Numbers\
  \ TABLE\n(\nNumber        INT\n)\n;WITH CTE(Number)\nAS\n(\nSELECT 1 Number\nUNION\
  \ ALL\nSELECT Number + 1\nFROM CTE\nWHERE Number < 100\n)\nINSERT INTO @Numbers\n\
  SELECT Number FROM CTE\n--Populate ExistingOrders with data\nINSERT INTO Orders\n\
  SELECT\n(SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number\nFROM @Numbers\nORDER BY NEWID()),getdate())as\
  \ DATE)),\n(SELECT TOP 1 Number -10 FROM @Numbers ORDER BY NEWID()),\n(SELECT TOP\
  \ 1 Number FROM @Numbers ORDER BY NEWID()),\n(SELECT TOP 1 Number FROM @Numbers\
  \ ORDER BY NEWID()),\n500,\n100,\n(SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),\n\
  (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),\n(SELECT CAST(DATEADD(dd,(SELECT\
  \ TOP 1 Number - 10\nFROM @Numbers\nORDER BY NEWID()),getdate()) as DATE))\nFROM\
  \ @Numbers a\nCROSS JOIN @Numbers b\nCROSS JOIN @Numbers c ;\n--Backup Database\n\
  BACKUP DATABASE LinuxDB\nTO DISK = N'/var/opt/mssql/data/LinuxDB.bak';\nGO\n--Add\
  \ database to Availability Group\nUSE master\nGO\nALTER AVAILABILITY GROUP Linux_AOAG\
  \ ADD DATABASE LinuxDB\nGO\n```\n\n*清单 14-14 添加数据库*\n\n现在，使用 SSMS 连接到主实例，应该会显示可用性组已配置并包含您的数据库，如图\
  \ 14-12 所示。\n\n![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig12_HTML.jpg](img/333037_2_En_14_Fig12_HTML.jpg)\n\
  \n*图 14-12 Linux 服务器上已配置的可用性组*\n\n最后，我们将使用清单 14-15 中的命令为可用性组创建一个侦听器。\n\n```sql\n\
  ALTER AVAILABILITY GROUP Linux_AOAG\nADD LISTENER N'LinuxListener' (\nWITH IP\n\
  (\n('192.168.1.62', N'255.255.255.0')\n)\n, PORT=5022) ;\nGO\n```\n\n*清单 14-15 创建可用性组侦听器*\n\
  \n### 分布式可用性组\n\n分布式可用性组（DAG）是可用性组的扩展，允许在两个独立的可用性组之间同步数据。这是一项令人兴奋的技术，具有许多不同的用例。例如，它允许在\
  \ Windows 和 Linux 基础的可用性组之间进行数据同步，允许将可读辅助副本的数量扩展到超过 8 个（这是标准可用性组的限制），并且允许跨站点复制，而无需伸缩集群的复杂性。DAG\
  \ 还可以通过在无法进行就地升级而需要进行并行迁移时提供数据同步来帮助服务器迁移。\n\n虽然 DAG 的每一侧都可以是 Windows 故障转移群集，但这并不是必需的，因为其重点主要在于维护数据库，而不涉及集群配置。\n\
  \n在本节中，我们将通过为我们的 App1 可用性组在 PROSQLADMIN-C 集群和托管在两个参与 Pacemaker 集群的 Linux 服务器上的 `Linux_AOAG`\
  \ 可用性组之间配置 DAG 来说明该技术。\n\n第一步是在 Linux 集群上创建分布式可用性组。这可以通过使用清单 14-16 中的脚本来实现。注意 `WITH\
  \ (DISTRIBUTED)` 语法，其后是每个可用性组的规范。\n\n#### 注意\n\n开始之前，您应该从 App1 可用性组中删除现有数据库；否则它将无法加入分布式可用性组，因为辅助可用性组必须为空。\n\
  \n```sql\nCREATE AVAILABILITY GROUP DistributedAG\nWITH (DISTRIBUTED)\nAVAILABILITY\
  \ GROUP ON\n'App1' WITH\n(\nLISTENER_URL = 'tcp://App1Listener.prosqladmin.com:1433',\n\
  AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,\nFAILOVER_MODE = MANUAL,\nSEEDING_MODE\
  \ = AUTOMATIC\n),\n'Linux_AOAG' WITH\n(\nLISTENER_URL = 'tcp://LinuxListener:5022',\n\
  AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,\nFAILOVER_MODE = MANUAL,\nSEEDING_MODE\
  \ = AUTOMATIC\n);\nGO\n```\n\n*清单 14-16 创建分布式可用性组*\n\n现在，我们可以针对 PROSQLADMIN-C 集群运行清单\
  \ 14-17 中的命令，以将其加入分布式可用性组。\n\n```sql\nALTER AVAILABILITY GROUP DistributedAG\nJOIN\n\
  AVAILABILITY GROUP ON\n'App1' WITH\n(\nLISTENER_URL = 'tcp://App1Listener.prosqladmin.com:1433',\n\
  AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,\nFAILOVER_MODE = MANUAL,\nSEEDING_MODE\
  \ = AUTOMATIC\n),\n'Linux_AOAG' WITH\n(\nLISTENER_URL = 'tcp://LinuxListener:5022',\n\
  AVAILABILITY_MODE = ASYNCHRONOUS_COMMIT,\nFAILOVER_MODE = MANUAL,\nSEEDING_MODE\
  \ = AUTOMATIC\n) ;\nGO\n```\n\n*清单 14-17 加入第二个可用性组*\n\n#### 提示\n\n数据库需要手动加入到辅助可用性组内的辅助副本。\n\
  \n### 管理 AlwaysOn 可用性组\n\n初始设置完成后，您仍然需要执行管理任务。这些任务包括故障转移可用性组、监控，以及在极少数情况下添加额外的侦听器。以下各节将讨论这些主题。\n\
  \n#### 故障转移\n\n如果某个副本处于同步提交模式并配置为自动故障转移，则在主副本上满足错误条件时，可用性组会自动移动到冗余副本。然而，有时您会希望手动故障转移可用性组。这可能是由于灾难恢复测试、主动维护，或者在主副本或主数据中心发生故障后需要启动异步副本所致。\n\
  \n### 同步故障转移\n\n如果您希望故障转移一个处于**同步提交**模式的副本，请通过在对象资源管理器中右键单击您的可用性组，然后从上下文菜单中选择“故障转移”来启动“故障转移可用性组向导”。在跳过“简介”页面后，您将看到“选择新的主副本”页面（参见图\
  \ 14-13）。在此页面上，勾选您想要故障转移到的副本对应的复选框。但在执行此操作之前，请检查“故障转移准备情况”列，以确保副本已同步且不会发生数据丢失。\n\
  \n![选择新的主副本页面](img/333037_2_En_14_Fig13_HTML.jpg)\n\n*图 14-13：“选择新的主副本”页面*\n\n在“连接到副本”页面（如图\
  \ 14-14 所示），使用“连接”按钮建立到新主副本的连接。\n\n![连接到副本页面](img/333037_2_En_14_Fig14_HTML.jpg)\n\
  \n*图 14-14：“连接到副本”页面*\n\n在“摘要”页面上，将显示要执行的任务详情，随后在“结果”页面上显示进度指示器。故障转移完成后，请检查所有任务是否成功，并调查收到的任何错误或警告。\n\
  \n我们也可以使用 T-SQL 来故障转移可用性组。清单 14-18 中的命令实现了相同的结果。请确保从将要成为新主副本的副本上运行此脚本。如果您从当前主副本运行它，请使用\
  \ SQLCMD 模式并在脚本中连接到新主副本。\n\n```sql\nALTER AVAILABILITY GROUP App2 FAILOVER ;\nGO\n\
  ```\n\n*清单 14-18: 故障转移可用性组*\n\n### 异步故障转移\n\n如果您的可用性组处于**异步提交**模式，那么从技术角度来看，您可以以类似于同步提交模式副本的方式进行故障转移，不同之处在于您需要强制故障转移，从而接受数据丢失的风险。您可以使用清单\
  \ 14-19 中的命令强制故障转移。您应在将成为新主副本的实例上运行此脚本。为使其工作，集群必须具有仲裁。如果没有，则需要在强制可用性组联机之前强制集群联机。\n\
  \n```sql\nALTER AVAILABILITY GROUP App2 FORCE_FAILOVER_ALLOW_DATA_LOSS ;\n```\n\n\
  *清单 14-19: 强制故障转移*\n\n从流程角度来看，只有在您的主站点完全不可用时才应执行此操作。如果情况并非如此，首先应将应用程序置于安全状态。这可以避免任何数据丢失的可能性。我在生产环境中通常通过执行以下步骤来实现这一点：\n\
  \n1.  禁用登录名。\n2.  将副本的模式更改为同步提交模式。\n3.  进行故障转移。\n4.  将副本更改回异步提交模式。\n5.  启用登录名。\n\
  \n您可以使用清单 14-20 中的脚本来执行这些步骤。当从灾难恢复实例运行时，此脚本会在故障转移前将 `App2` 中的数据库置于安全状态，然后重新配置应用程序以在正常操作下工作。\n\
  \n```sql\n--DISABLE LOGINS\nDECLARE @AOAGDBs TABLE\n(\nDBName NVARCHAR(128)\n) ;\n\
  INSERT INTO @AOAGDBs\nSELECT database_name\nFROM sys.availability_groups AG\nINNER\
  \ JOIN sys.availability_databases_cluster ADC\nON AG.group_id = ADC.group_id\nWHERE\
  \ AG.name = 'App2' ;\n\nDECLARE @Mappings TABLE\n(\nLoginName NVARCHAR(128),\nDBname\
  \ NVARCHAR(128),\nUsername NVARCHAR(128),\nAliasName NVARCHAR(128)\n) ;\nINSERT\
  \ INTO @Mappings\nEXEC sp_msloginmappings ;\n\nDECLARE @SQL NVARCHAR(MAX)\nSELECT\
  \ DISTINCT @SQL =\n(\nSELECT 'ALTER LOGIN [' + LoginName + '] DISABLE; ' AS [data()]\n\
  FROM @Mappings M\nINNER JOIN @AOAGDBs A\nON M.DBname = A.DBName\nWHERE LoginName\
  \  SUSER_NAME()\nFOR XML PATH ('')\n)\nEXEC(@SQL)\nGO\n\n--SWITCH TO SYNCHRONOUS\
  \ COMMIT MODE\nALTER AVAILABILITY GROUP App2\nMODIFY REPLICA ON N'CLUSTERNODE3\\\
  ASYNCDR' WITH (AVAILABILITY_MODE = SYNCHRONOUS_COMMIT) ;\nGO\n\n--FAIL OVER\nALTER\
  \ AVAILABILITY GROUP App2 FAILOVER\nGO\n\n--SWITCH BACK TO ASYNCHRONOUS COMMIT MODE\n\
  ALTER AVAILABILITY GROUP App2\nMODIFY REPLICA ON N'CLUSTERNODE3\\ASYNCDR' WITH (AVAILABILITY_MODE\
  \ = ASYNCHRONOUS_COMMIT) ;\nGO\n\n--ENABLE LOGINS\nDECLARE @AOAGDBs TABLE\n(\nDBName\
  \ NVARCHAR(128)\n) ;\nINSERT INTO @AOAGDBs\nSELECT database_name\nFROM sys.availability_groups\
  \ AG\nINNER JOIN sys.availability_databases_cluster ADC\nON AG.group_id = ADC.group_id\n\
  WHERE AG.name = 'App2' ;\n\nDECLARE @Mappings TABLE\n(\nLoginName NVARCHAR(128),\n\
  DBname NVARCHAR(128),\nUsername NVARCHAR(128),\nAliasName NVARCHAR(128)\n) ;\nINSERT\
  \ INTO @Mappings\nEXEC sp_msloginmappings\n\nDECLARE @SQL NVARCHAR(MAX)\nSELECT\
  \ DISTINCT @SQL =\n(\nSELECT 'ALTER LOGIN [' + LoginName + '] ENABLE; ' AS [data()]\n\
  FROM @Mappings M\nINNER JOIN @AOAGDBs A\nON M.DBname = A.DBName\nWHERE LoginName\
  \  SUSER_NAME()\nFOR XML PATH ('')\n) ;\nEXEC(@SQL)\n```\n\n*清单 14-20: 将应用程序置于安全状态并进行故障转移*\n\
  \n### 同步未包含对象\n\n无论您使用哪种方法进行故障转移，假设可用性组中的所有数据库都是非包含的，那么您需要确保实例级对象已同步。保持实例级对象同步的最直接方法是实现一个\
  \ SSIS 包，并将其计划为定期运行。\n\n无论您选择计划执行 SSIS 包，还是选择不同的方法，例如使用 SQL Server Agent 作业在辅助服务器上编写脚本并重新创建对象，以下是您应考虑同步的对象：\n\
  \n*   登录名\n*   凭据\n*   SQL Server Agent 作业\n*   自定义错误消息\n*   链接服务器\n*   服务器级事件通知\n\
  *   Master 数据库中的存储过程\n*   服务器级触发器\n*   加密密钥和证书\n\n#### 监控\n\n实现可用性组后，您需要监控它们，并响应可能影响数据可用性的任何错误或警告。如果您在整个企业中实现了许多可用性组，那么有效且全面监控它们的唯一方法是使用企业监控工具，例如\
  \ SOC（系统操作中心）。但是，如果您只有少量可用性组，或者您正在对特定问题进行故障排除，那么 SQL Server 提供了 AlwaysOn 仪表板和 AlwaysOn\
  \ 健康跟踪。以下部分将探讨这两个功能。\n\n#### AlwaysOn 仪表板\n\nAlwaysOn 仪表板是一个交互式报告，允许您查看 AlwaysOn\
  \ 环境的运行状况，并钻取或汇总拓扑中的元素。您可以从对象资源管理器中“可用性组”文件夹的上下文菜单，或从可用性组本身的上下文菜单调用此报告。图 14-15 显示了从\
  \ `App2` 可用性组的上下文菜单生成的报告。您可以看到当前两个副本的同步状态都是健康的。\n\n数据库可能处于的三种同步状态是 `SYNCHRONIZED`（已同步）、`SYNCRONIZING`（正在同步）和\
  \ `NOT SYNCHRONIZING`（未同步）。同步副本应处于 `SYNCHRONIZED` 状态，任何其他状态都是不健康的。然而，异步副本永远不会处于\
  \ `SYNCHRONIZED` 状态，而 `SYNCHRONIZING` 状态被认为是健康的。无论哪种模式，`NOT SYNCHRONIZING` 都表示副本未连接。\n\
  \n![可用性组仪表板](img/333037_2_En_14_Fig15_HTML.jpg)\n\n*图 14-15: 可用性组仪表板*\n\n\n### AlwaysOn\
  \ 可用性组管理注意事项\n\n#### 注意\n\n除了同步状态，副本还具有以下操作状态之一：`PENDING_FAILOVER`、`PENDING`、`ONLINE`、`OFFLINE`、`FAILED`、`FAILED_NO_QUORUM`\
  \ 和 `NULL`（当副本断开连接时）。可以通过 `sys.dm_hadr_availability_replica_states` DMV 查看副本的操作状态。\n\
  \n在报告的右上角，有指向故障转移向导（本章前面讨论过）、AlwaysOn 健康事件（下一节讨论）以及查看集群仲裁信息的链接。此链接调用的“集群仲裁信息”屏幕如图\
  \ 14-16 所示。您还可以在“可用性副本”窗口中深入查看每个副本，以获取特定于副本的详细信息。\n\n![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig16_HTML.jpg](img/333037_2_En_14_Fig16_HTML.jpg)\n\
  \n图 14-16\n集群仲裁信息屏幕\n\n##### AlwaysOn 健康跟踪\n\nAlwaysOn 健康跟踪是一个扩展事件会话，在您创建第一个可用性组时创建。它可以在\
  \ SQL Server Management Studio 中找到，位于“扩展事件”➤“会话”下。通过其上下文菜单，您可以查看正在捕获的实时数据，或者进入会话属性以更改捕获事件的配置。\n\
  \n深入查看会话会显示其程序包，从程序包的上下文菜单中，您可以查看先前捕获的事件。图 14-17 显示了最近捕获的事件，即数据库 5（在我们的例子中是 `Chapter14App2Customers`）正在等待日志在同步副本上被固化。第\
  \ 19 章详细讨论了扩展事件。\n\n![../images/333037_2_En_14_Chapter/333037_2_En_14_Fig17_HTML.jpg](img/333037_2_En_14_Fig17_HTML.jpg)\n\
  \n图 14-17\n目标数据\n\n#### 其他管理注意事项\n\n当使用 AlwaysOn 可用性组使数据库保持高可用性时，会施加一些限制。其中最具限制性的是，数据库不能被置于\
  \ `single_user` 模式或设置为 `read only`。这在您需要为维护而将应用程序置于安全状态时会产生影响。这就是为什么在本章的“故障转移”一节中，我们禁用了映射到这些数据库用户的登录账户。如果您必须将数据库置于单用户模式，则必须首先将其从可用性组中移除。\n\
  \n可以通过执行清单 14-21 中的命令从可用性组中移除数据库。此命令将 `Chapter14App2Customers` 数据库从可用性组中移除。\n\n\
  ```\nALTER DATABASE Chapter14App2Customers SET HADR OFF ;\n```\n清单 14-21\n从可用性组中移除数据库\n\
  \n也可能有些情况下，您希望数据库保留在可用性组中，但希望暂停向其他副本的数据移动。这通常是因为可用性组处于同步提交模式，并且您在高使用期间需要提升性能。您可以使用清单\
  \ 14-22 中的命令暂停数据库的数据移动，该命令暂停 `Chapter14App1Sales` 数据库的数据移动，然后恢复它。\n\n#### 注意\n\n\
  如果暂停数据移动，主副本上的事务日志会继续增长，并且在数据移动恢复且数据库同步之前，您无法截断它。\n\n```\nALTER DATABASE Chapter14App2Customers\
  \ SET HADR SUSPEND ;\nGO\nALTER DATABASE Chapter14App2Customers SET HADR RESUME\
  \ ;\nGO\n```\n清单 14-22\n暂停数据移动\n\n另一个重要的注意事项是数据库和日志文件的位置。这些文件在每个副本上必须位于相同的位置。这意味着，如果您使用命名实例，则必须为数据和日志更改默认文件位置，因为默认位置包含实例名称。当然，这是假设您不在每个节点上使用相同的实例名称，否则将违背使用命名实例的许多好处。\n\
  \n### 总结\n\nAlwaysOn 可用性组最多可实现八个辅助副本，结合了同步和异步提交模式。在使用可用性组实现高可用性时，始终使用同步提交模式，因为异步提交模式不支持自动故障转移。然而，在实现同步提交模式时，您必须意识到在事务在主副本上提交之前先在辅助副本上提交所带来的相关性能损失。对于灾难恢复，您通常会选择实现异步提交模式。\n\
  \n可以通过“新建可用性组”向导、对话框、T-SQL 甚至 PowerShell 来创建可用性组。如果使用对话框创建可用性组，则某些方面（例如端点和相关权限）必须使用\
  \ T-SQL 或 PowerShell 进行脚本编写。\n\n如果您使用可用性组实现灾难恢复，则需要配置多子网集群。然而，这并不意味着您必须在站点之间使用 SAN\
  \ 复制，因为可用性组不依赖于共享存储。您需要做的是为管理集群访问点以及可用性组侦听器添加额外的 IP 地址。您还需要注意支持客户端重新连接的集群属性，以确保客户端不会遇到大量的超时。\n\
  \n在主副本发生故障时，故障转移到同步副本是自动的。然而，有些情况下您也需要手动进行故障转移。这可能是因为需要故障转移到灾难恢复站点的灾难，或者是为了主动维护。虽然可以故障转移到异步副本并存在数据丢失的可能性，但良好的做法是首先将数据库置于安全状态。因为如果数据库参与了可用性组，您就不能将其置于\
  \ `read only` 或 `single_user` 模式，所以安全状态通常包括禁用登录账户，然后在故障转移前切换到同步提交模式。\n\n要在整个企业中监控可用性组，您需要使用监控工具，例如\
  \ Systems Operation Center。但是，如果您需要监控少量的可用性组或对特定问题进行故障排除，请使用 SQL Server 附带的工具之一，例如用于监控拓扑运行状况的仪表板，以及称为\
  \ AlwaysOn 健康跟踪的扩展事件会话。\n\n您还应考虑其他维护任务。这些任务包括将数据库和日志文件放置在何处（因为它们必须在每个副本上具有相同的位置），以及从可用性组中移除数据库以便将其置于\
  \ `single_user` 模式（例如）。更改为 `single_user` 模式可能是由于需要以修复模式运行 `DBCC CHECKDB` 并暂停数据移动。暂停数据移动允许您在高使用期间消除性能开销，但要注意，它也会导致主副本上的事务日志增长，并且在数据移动恢复且数据库再次同步之前，没有选项可以截断它。\n\
  \n\n\n# 第 15 章 实施日志传送\n\n正如第 13 章所讨论的，日志传送是一项可用于实现灾难恢复和横向扩展只读报告的技术。其工作原理是获取数据库的事务日志备份，将它们复制到一个或多个辅助服务器，然后进行还原，以保持辅助服务器同步。本章将演示如何为灾难恢复（DR）实施日志传送。你还将了解如何监视和故障转移日志传送。\n\
  \n> **注意：** 为便于本章的演示，我们将使用一个域，该域包含一个域控制器和四台独立服务器，每台服务器都安装了 SQL Server 实例。服务器\\实例名称分别为\
  \ `PRIMARYSERVER\\PROSQLADMIN`、`DRSERVER\\PROSQLDR`、`REPORTSERVER\\PROSQLREPORTS`\
  \ 和 `MONITORSERVER\\PROSQLMONITOR`。\n\n### 为灾难恢复实施日志传送\n\n在我们开始为灾难恢复实施日志传送之前，我们首先创建一个用于本章演示的数据库。代码清单\
  \ 15-1 中的脚本创建了一个名为 `Chapter15` 的数据库，其恢复模式设置为 `FULL`。我们在数据库内创建一个表并向其填充数据。\n\n```sql\n\
  --Create the database\nCREATE DATABASE Chapter15;\nGO\nALTER DATABASE Chapter15\
  \ SET RECOVERY FULL;\nGO\nUSE Chapter15\nGO\n--Create and populate numbers table\n\
  DECLARE @Numbers TABLE\n(\nNumber        INT\n)\n;WITH CTE(Number)\nAS\n(\nSELECT\
  \ 1 Number\nUNION ALL\nSELECT Number + 1\nFROM CTE\nWHERE Number < 100\n)\nINSERT\
  \ INTO @Numbers\nSELECT Number FROM CTE;\n--Create and populate name pieces\nDECLARE\
  \ @Names TABLE\n(\nFirstName        VARCHAR(30),\nLastName        VARCHAR(30)\n\
  );\nINSERT INTO @Names\nVALUES('Peter', 'Carter'),\n('Michael', 'Smith'),\n('Danielle',\
  \ 'Mead'),\n('Reuben', 'Roberts'),\n('Iris', 'Jones'),\n('Sylvia', 'Davies'),\n\
  ('Finola', 'Wright'),\n('Edward', 'James'),\n('Marie', 'Andrews'),\n('Jennifer',\
  \ 'Abraham') ;\n--Create and populate Customers table\nCREATE TABLE dbo.Customers\n\
  (\nCustomerID          INT            NOT NULL    IDENTITY    PRIMARY KEY,\nFirstName\
  \           VARCHAR(30)    NOT NULL,\nLastName            VARCHAR(30)    NOT NULL,\n\
  BillingAddressID    INT            NOT NULL,\nDeliveryAddressID   INT          \
  \  NOT NULL,\nCreditLimit         MONEY          NOT NULL,\nBalance            \
  \ MONEY          NOT NULL\n);\nSELECT * INTO #Customers\nFROM\n(SELECT\n(SELECT\
  \ TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName,\n(SELECT TOP 1 LastName\
  \ FROM @Names ORDER BY NEWID()) LastName,\n(SELECT TOP 1 Number FROM @Numbers ORDER\
  \ BY NEWID()) BillingAddressID,\n(SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID())\
  \ DeliveryAddressID,\n(SELECT TOP 1 CAST(RAND() * Number AS INT) * 10000\nFROM @Numbers\n\
  ORDER BY NEWID()) CreditLimit,\n(SELECT TOP 1 CAST(RAND() * Number AS INT) * 9000\n\
  FROM @Numbers\nORDER BY NEWID()) Balance\nFROM @Numbers a\nCROSS JOIN @Numbers b\n\
  ) a;\nINSERT INTO dbo.Customers\nSELECT * FROM #Customers;\nGO\n```\n\n**代码清单 15-1**\
  \ 创建用于日志传送的数据库\n\n出于本次演示的目的，我们希望为 `Chapter15` 数据库配置灾难恢复，使其恢复点目标（RPO）为 10 分钟。同时，我们将在\
  \ DR 服务器上实现 10 分钟的加载延迟。这意味着，如果应用团队在发生导致数据丢失的事件（例如，用户意外删除了表中的行）后立即通知我们，那么我们能够在包含错误事务的日志被还原之前，利用\
  \ DR 服务器上的数据来纠正问题。\n\n#### GUI 配置\n\n我们可以通过 SQL Server Management Studio（SSMS）为\
  \ `Chapter15` 数据库配置日志传送。为此，我们从数据库的右键上下文菜单中选择**属性**，并导航到**事务日志传送**页面，如图 15-1 所示。此页面上的首要任务是选中**启用此为日志传送配置中的主数据库**复选框。\n\
  \n![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig1_HTML.jpg](img/333037_2_En_15_Fig1_HTML.jpg)\n\
  \n**图 15-1** 事务日志传送页面\n\n现在，我们可以使用**备份设置**按钮来显示**事务日志备份设置**屏幕。在此屏幕上，我们输入用于存储日志传送所生成日志备份的共享文件夹的\
  \ UNC（通用命名约定）路径。由于此共享文件夹实际上配置在我们的主服务器上，因此我们还需要在下方的字段中输入本地路径。用于运行备份作业的帐户需要被授予对此共享文件夹的读取和更改权限。默认情况下，这将是\
  \ SQL Server 服务帐户，但为了更精细的安全性，可以将日志传送作业配置为在代理帐户下运行。代理帐户将在第 22 章讨论。\n\n然后，我们配置备份文件在删除前需要保留多长时间。你选择的值取决于你企业的需求，但如果你的备份文件被卸载到磁带，那么你应该让文件保留足够长的时间以允许企业备份作业运行，并且可能还需要为其失败后在下一个周期成功预留足够的时间。你还应考虑对临时还原的需求。例如，如果一个项目发现数据问题并请求还原，你希望能够从本地磁盘检索相关的备份（如果可能的话）。因此，请考虑在\
  \ SQL Server 删除备份的本地副本之前，应给予项目多长时间来发现问题并请求还原。备份策略将在第 12 章进一步讨论。\n\n你还应指定如果未发生日志备份，希望在多久后生成警报。为了能收到任何备份失败的通知，你可以将该值配置为比你的备份计划时间长一分钟。然而，在某些环境中，错过几次备份可能是可以接受的。在这种情况下，你可以将值设置为更大的间隔，以便在维护窗口和其他类似情况下不会被备份失败的警报淹没。\n\
  \n**设置备份压缩**下拉列表决定是否应使用备份压缩来减少网络流量。默认是从实例继承配置，但你可以通过明确选择使用或不使用它来覆盖日志传送作业所进行的备份的设置。**事务日志备份设置**屏幕如图\
  \ 15-2 所示。\n\n![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig2_HTML.jpg](img/333037_2_En_15_Fig2_HTML.jpg)\n\
  \n**图 15-2** 事务日志备份设置屏幕\n\n点击**计划**按钮将调用**新建作业计划**屏幕。如图 15-3 所示，这个屏幕是用于创建作业计划的标准\
  \ SQL Server Agent 界面，只不过它已预先填入了日志传送备份作业的默认名称。由于我们试图实现 10 分钟的 RPO，我们将备份作业配置为每 5\
  \ 分钟运行一次。这是因为我们还需要留出时间让复制作业运行。在灾难恢复规划中，我们不能假定主服务器始终可用以供我们检索日志备份。\n\n![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig3_HTML.jpg](img/333037_2_En_15_Fig3_HTML.jpg)\n\
  \n**图 15-3**\n\n\n\n### 新建作业计划屏幕与日志传送配置\n\n返回到“事务日志传送”页面后，我们可以使用“添加”按钮来为我们的日志传送拓扑配置辅助服务器。点击此按钮将显示“辅助数据库设置”页面。该页面包含三个选项卡。第一个是“初始化辅助数据库”选项卡，如图\
  \ 15-4 所示。\n\n### 初始化辅助数据库选项卡\n\n在此选项卡上，我们配置如何初始化辅助数据库。我们可以通过执行数据库完整备份，然后使用 `NORECOVERY`\
  \ 选项手动将其还原到辅助服务器来预初始化数据库。在这种情况下，我们将选择“否，辅助数据库已初始化”选项。\n\n如果我们已有可用的完整备份，则可以将其放置在\
  \ SQL Server 服务帐户具有读取和修改权限的文件共享中，然后选择“是，将主数据库的现有备份还原到辅助数据库”选项并指定备份文件的位置。\n\n然而，在我们这种情况下，我们没有\
  \ `Chapter15` 数据库的现有完整备份，因此我们选择“是，生成主数据库的完整备份并将其还原到辅助数据库”选项。这将显示“还原选项”窗口；正是在这里，我们输入希望在辅助服务器上创建数据库和事务日志文件的位置，如图\
  \ 15-4 所示。\n\n![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig4_HTML.jpg](img/333037_2_En_15_Fig4_HTML.jpg)\n\
  \n**图 15-4** 初始化辅助数据库选项卡\n\n### 复制文件选项卡\n\n在“复制文件”选项卡上（如图 15-5 所示），我们配置负责将事务日志文件从主服务器复制到辅助服务器的作业。首先，我们指定辅助服务器上用于复制事务日志的共享文件夹。运行复制作业的帐户必须配置对该共享文件夹的读取和修改权限。与备份作业一样，此作业默认在\
  \ SQL Server 服务帐户的上下文中运行，但您也可以将其配置为在代理帐户下运行。\n\n我们还使用此选项卡配置备份文件在删除前应在辅助服务器上保留多长时间。我通常建议将此值与您在主服务器上指定的备份保留值保持一致，以确保一致性。\n\
  \n![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig5_HTML.jpg](img/333037_2_En_15_Fig5_HTML.jpg)\n\
  \n**图 15-5** 复制文件选项卡\n\n`作业名称`字段会自动填充日志传送复制作业的默认名称，使用“计划”按钮可以调用“新建作业计划”屏幕，在其中配置复制作业的计划。如图\
  \ 15-6 所示，我们已将此作业配置为每 5 分钟运行一次，这与我们 10 分钟的恢复点目标要求一致。日志备份需要 5 分钟，然后再过 5 分钟它会被移动到辅助服务器。一旦文件被移动到辅助服务器，我们可以确信，除了最极端的情况外，我们都能够从主服务器或辅助服务器检索到备份，从而实现\
  \ 10 分钟的恢复点目标。\n\n![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig6_HTML.jpg](img/333037_2_En_15_Fig6_HTML.jpg)\n\
  \n**图 15-6** 新建作业计划屏幕\n\n### 还原事务日志选项卡\n\n在“还原事务日志”选项卡上，我们配置负责在辅助服务器上还原备份的作业。此屏幕上最重要的选项是还原时选择的数据库状态。选择“无恢复模式”选项是适用于灾难恢复服务器的选择。这是因为如果您选择“备用模式”，未提交的事务将保存到一个事务撤消文件中，这意味着数据库可以以只读模式联机（如第\
  \ 13 章所述）。然而，此操作会增加恢复时间，因为在下一次还原的重做阶段之前需要重新应用这些事务。\n\n在此选项卡上，我们还使用 `延迟还原备份至少` 选项来应用加载延迟，这为用户提供了报告数据问题的机会。我们还可以指定在发出没有发生还原操作的警报之前应延迟多长时间。“还原事务日志”选项卡如图\
  \ 15-7 所示。\n\n![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig7_HTML.jpg](img/333037_2_En_15_Fig7_HTML.jpg)\n\
  \n**图 15-7** 还原事务日志选项卡\n\n“计划”按钮调用“新建作业计划”屏幕，如图 15-8 所示。在此屏幕上，我们可以为事务日志的还原配置作业计划。虽然这样做不是强制性的，但为了保持一致性，我通常建议配置此值，使其与备份和复制作业相同。\n\
  \n![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig8_HTML.jpg](img/333037_2_En_15_Fig8_HTML.jpg)\n\
  \n**图 15-8** 新建作业计划屏幕\n\n### 监视服务器配置\n\n返回到“事务日志传送”页面后，我们需要决定是否实现监视服务器。此选项允许我们配置一个实例，作为监视我们的日志传送拓扑的集中点。此时做出这个决定很重要，因为在配置完成后，没有官方方法可以在不拆除并重新配置日志传送的情况下向拓扑中添加监视服务器。\n\
  \n#### 提示\n\n从技术上讲，可以在以后强制添加监视服务器，但此过程涉及手动更新 `MSDB` 中的日志传送元数据表。因此，不建议或不支持此操作。\n\n\
  要添加监视服务器，我们勾选“使用监视服务器实例”选项并输入服务器\\实例名称。单击“设置”按钮将显示“日志传送监视器设置”屏幕。我们使用此屏幕（如图 15-9\
  \ 所示）来配置如何连接到监视服务器以及历史记录保留设置。\n\n![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig9_HTML.jpg](img/333037_2_En_15_Fig9_HTML.jpg)\n\
  \n**图 15-9** 日志传送监视器设置屏幕\n\n### 完成配置\n\n现在我们的日志传送拓扑已完全配置，我们可以选择对配置进行脚本编写，这对于文档编制和变更控制的目的很有帮助。然后我们可以完成配置。配置进度显示在“保存日志传送配置”窗口中（参见图\
  \ 15-10）。配置完成后，我们应该检查此窗口以查看在配置过程中是否发生了任何错误，并根据需要解决它们。日志传送配置问题最常见的原因是权限相关的，因此在我们继续之前，需要确保\
  \ SQL Server 服务帐户（或代理帐户）在文件共享和实例上具有正确的权限。\n\n![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig10_HTML.jpg](img/333037_2_En_15_Fig10_HTML.jpg)\n\
  \n**图 15-10** 保存日志传送配置页面\n\n\n\n#### T-SQL 配置\n\n要通过 T-SQL 配置日志传送，我们需要运行一系列系统存储过程。第一个过程是`sp_add_log_shipping_primary_database`，用于配置备份作业并监控主数据库。该过程使用的参数描述见表\
  \ 15-1。\n\n表 15-1\n\n`sp_add_log_shipping_primary_database`参数\n\n| 参数 | 描述 |\n|\
  \ --- | --- |\n| `@database` | 要为其配置日志传送的数据库名称。 |\n| `@backup_directory` | 备份文件夹的本地路径。\
  \ |\n| `@backup_share` | 备份文件夹的网络路径。 |\n| `@backup_job_name` | 用于日志备份作业的名称。 |\n\
  | `@backup_retention_period` | 日志备份应保留的时长，以分钟为单位。 |\n| `@monitor_server` | 监控服务器的服务器\\\
  实例名。 |\n| `@monitor_server_Security_mode` | 连接到监控服务器时使用的身份验证模式。`0` 表示 SQL 身份验证，`1`\
  \ 表示 Windows 身份验证。 |\n| `@monitor_server_login` | 用于连接到监控服务器的账户（仅在使用 SQL 身份验证时指定）。\
  \ |\n| `@monitor_server_password` | 用于连接到监控服务器的账户密码（仅在使用 SQL 身份验证时指定）。 |\n| `@backup_threshold`\
  \ | 在触发警报之前，可以经过多长时间而没有进行日志备份。 |\n| `@threshold_alert` | 如果超过备份阈值将引发的警报。 |\n| `@threshold_alert_enabled`\
  \ | 指定是否应触发警报。`0` 禁用警报，`1` 启用警报。 |\n| `@history_retention_period` | 日志备份作业历史记录将保留的时长，以分钟为单位。\
  \ |\n| `@backup_job_id` | 一个`OUTPUT`参数，指定过程创建的备份作业的 GUID。 |\n| `@primary_id` | 一个`OUTPUT`参数，指定主数据库的\
  \ ID。 |\n| `@backup_compression` | 指定是否应使用备份压缩。`0` 表示禁用，`1` 表示启用，`2` 表示使用实例的默认配置。\
  \ |\n\n列表 15-2 演示了如何使用`sp_add_log_shipping_primary_database`过程为`Chapter15`配置日志传送。此脚本使用`@backup_job_id\
  \ output`参数将作业的 GUID 传递给`sp_update_job`存储过程。它还使用`sp_add_schedule`和`sp_attach_schedule`系统存储过程来创建作业计划并将其附加到作业。由于配置日志传送涉及连接到多个实例，我们添加了到主实例的连接。这意味着我们应该在\
  \ SQLCMD 模式下运行脚本。\n\n#### 注意\n\n`sp_update_job`、`sp_add_schedule`和`sp_attach_schedule`是用于操作\
  \ SQL Server 代理对象的系统存储过程。关于 SQL Server 代理的完整讨论可以在第 22 章找到。\n\n```\n--注意：此脚本应在 sqlcmd\
  \ 模式下运行\n:connect primaryserver\\prosqladmin\nDECLARE @LS_BackupJobId         UNIQUEIDENTIFIER\n\
  DECLARE @LS_BackUpScheduleID        INT\n--将 Chapter15 数据库配置为日志传送的主数据库\nEXEC master.dbo.sp_add_log_shipping_primary_database\n\
  @database = N'Chapter15'\n,@backup_directory = N'c:\\logshippingprimary'\n,@backup_share\
  \ = N'\\\\primaryserver\\logshippingprimary'\n,@backup_job_name = N'LSBackup_Chapter15'\n\
  ,@backup_retention_period = 2880\n,@backup_compression = 2\n,@monitor_server = N'monitorserver.prosqladmin.com\\\
  prosqlmonitor'\n,@monitor_server_security_mode = 1\n,@backup_threshold = 60\n,@threshold_alert_enabled\
  \ = 1\n,@history_retention_period = 5760\n,@backup_job_id = @LS_BackupJobId OUTPUT\
  \ ;\n--为备份作业创建作业计划\nEXEC msdb.dbo.sp_add_schedule\n@schedule_name =N'LSBackupSchedule_primaryserver\\\
  prosqladmin1'\n,@enabled = 1\n,@freq_type = 4\n,@freq_interval = 1\n,@freq_subday_type\
  \ = 4\n,@freq_subday_interval = 5\n,@freq_recurrence_factor = 0\n,@active_start_date\
  \ = 20190517\n,@active_end_date = 99991231\n,@active_start_time = 0\n,@active_end_time\
  \ = 235900\n,@schedule_id = @LS_BackUpScheduleID OUTPUT ;\n--将作业计划附加到作业\nEXEC msdb.dbo.sp_attach_schedule\n\
  @job_id = @LS_BackupJobId\n,@schedule_id = @LS_BackUpScheduleID  ;\n--启用备份作业\nEXEC\
  \ msdb.dbo.sp_update_job\n@job_id = @LS_BackupJobId\n,@enabled = 1 ;\nListing 15-2\n\
  sp_add_log_shipping_primary_database\n```\n\n我们使用`sp_add_log_shipping_primary_secondary`系统存储过程更新主服务器上的元数据，以便在日志传送拓扑中为每个辅助服务器添加一条记录。它接受的参数描述见表\
  \ 15-2。\n\n表 15-2\n\n`sp_add_log_shipping_primary_secondary`参数\n\n| 参数 | 描述 |\n\
  | --- | --- |\n| `@primary_database` | 主数据库的名称 |\n| `@secondary_server` | 辅助服务器的服务器\\\
  实例 |\n| `@secondary_database` | 辅助服务器上数据库的名称 |\n\n列表 15-3 演示了如何使用`sp_add_log_shipping_primary_secondary`过程将我们的`DRSERVER\\\
  PROSQLDR`实例记录添加到主服务器。同样，我们专门连接到主服务器，这意味着脚本应在 SQLCMD 模式下运行。\n\n```\n:connect primaryserver\\\
  prosqladmin\nEXEC master.dbo.sp_add_log_shipping_primary_secondary\n@primary_database\
  \ = N'Chapter15'\n,@secondary_server = N'drserver\\prosqldr'\n,@secondary_database\
  \ = N'Chapter15'\nListing 15-3\nsp_add_log_shipping_primary_secondary\n```\n\n我们现在需要配置我们的\
  \ DR 服务器。此过程中的第一个任务是运行`sp_add_log_shipping_secondary_primary`系统存储过程。此过程创建将事务日志复制到辅助服务器并还原它们的\
  \ SQL Server 代理作业。它还配置监控。此存储过程接受的参数详见表 15-3。\n\n表 15-3\n\n`sp_add_log_shipping_secondary_primary`参数\n\
  \n\n\n| 参数 | 描述 |\n| --- | --- |\n| `@primary_server` | 主服务器的服务器\\实例名称。 |\n| `@primary_database`\
  \ | 主数据库的名称。 |\n| `@backup_source_directory` | 日志备份被复制出来的源文件夹。 |\n| `@backup_destination_directory`\
  \ | 日志备份被复制到的目标文件夹。 |\n| `@copy_job_name` | 分配给用于复制事务日志的 SQL Server Agent 作业的名称。\
  \ |\n| `@restore_job_name` | 分配给用于还原事务日志的 SQL Server Agent 作业的名称。 |\n| `@file_retention_period`\
  \ | 日志备份历史记录应保留的时长，以分钟为单位指定。 |\n| `@monitor_server` | 监视服务器的服务器\\实例名称。 |\n| `@monitor_server_security_mode`\
  \ | 用于连接到监视服务器的身份验证模式。`0` 表示 SQL 身份验证，`1` 表示 Windows 身份验证。 |\n| `@monitor_server_login`\
  \ | 用于连接到监视服务器的帐户（仅在指定了 SQL 身份验证时使用）。 |\n| `@monitor_server_password` | 用于连接到监视服务器的帐户密码（仅在指定了\
  \ SQL 身份验证时使用）。 |\n| `@copy_job_id` | `OUTPUT` 参数，指定为复制事务日志而创建的作业的 GUID。 |\n| `@restore_job_id`\
  \ | `OUTPUT` 参数，指定为还原事务日志而创建的作业的 GUID。 |\n| `@secondary_id` | 一个 `OUTPUT` 参数，指定辅助数据库的\
  \ ID。 |\n\n清单 15-4 演示了如何使用 `sp_add_log_shipping_secondary_primary` 存储过程将我们的 `DRSERVER\\\
  PROSQLDR` 实例配置为日志传送拓扑中的辅助服务器。该脚本显式连接到 DR 实例，因此我们应在 SQL 命令模式下运行它。就像设置主服务器时一样，我们使用输出参数传递给\
  \ SQL Server Agent 存储过程，以创建作业计划并启用作业。\n\n```sql\n--Note This script should be run\
  \ in sqlcmd mode\n:connect drserver\\prosqldr\nDECLARE @LS_Secondary__CopyJobId\
  \        AS uniqueidentifier\nDECLARE @LS_Secondary__RestoreJobId        AS uniqueidentifier\n\
  DECLARE @LS_SecondaryCopyJobScheduleID        AS int\nDECLARE @LS_SecondaryRestoreJobScheduleID\
  \        AS int\n--Configure the secondary server\nEXEC master.dbo.sp_add_log_shipping_secondary_primary\n\
  @primary_server = N'primaryserver\\prosqladmin'\n@primary_database = N'Chapter15'\n\
  ,@backup_source_directory = N'\\\\primaryserver\\logshippingprimary'\n,@backup_destination_directory\
  \ = N'\\\\drserver\\logshippingdr'\n,@copy_job_name = N'LSCopy_primaryserver\\prosqladmin_Chapter15'\n\
  ,@restore_job_name = N'LSRestore_primaryserver\\prosqladmin_Chapter15'\n,@file_retention_period\
  \ = 2880\n,@monitor_server = N'monitorserver.prosqladmin.com\\prosqlmonitor'\n,@monitor_server_security_mode\
  \ = 1\n,@copy_job_id = @LS_Secondary__CopyJobId OUTPUT\n,@restore_job_id = @LS_Secondary__RestoreJobId\
  \ OUTPUT ;\n--Create the schedule for the copy job\nEXEC msdb.dbo.sp_add_schedule\n\
  @schedule_name =N'DefaultCopyJobSchedule'\n,@enabled = 1\n,@freq_type = 4\n,@freq_interval\
  \ = 1\n,@freq_subday_type = 4\n,@freq_subday_interval = 15\n,@freq_recurrence_factor\
  \ = 0\n,@active_start_date = 20190517\n,@active_end_date = 99991231\n,@active_start_time\
  \ = 0\n,@active_end_time = 235900\n,@schedule_id = @LS_SecondaryCopyJobScheduleID\
  \ OUTPUT ;\n--Attach the schedule to the copy job\nEXEC msdb.dbo.sp_attach_schedule\n\
  @job_id = @LS_Secondary__CopyJobId\n,@schedule_id = @LS_SecondaryCopyJobScheduleID\
  \  ;\n--Create the job schedule for the restore job\nEXEC msdb.dbo.sp_add_schedule\n\
  @schedule_name =N'DefaultRestoreJobSchedule'\n,@enabled = 1\n,@freq_type = 4\n,@freq_interval\
  \ = 1\n,@freq_subday_type = 4\n,@freq_subday_interval = 15\n,@freq_recurrence_factor\
  \ = 0\n,@active_start_date = 20190517\n,@active_end_date = 99991231\n,@active_start_time\
  \ = 0\n,@active_end_time = 235900\n,@schedule_id = @LS_SecondaryRestoreJobScheduleID\
  \ OUTPUT ;\n--Attch the schedule to the restore job\nEXEC msdb.dbo.sp_attach_schedule\n\
  @job_id = @LS_Secondary__RestoreJobId\n,@schedule_id = @LS_SecondaryRestoreJobScheduleID\
  \  ;\n--Enable the jobs\nEXEC msdb.dbo.sp_update_job\n@job_id = @LS_Secondary__CopyJobId\n\
  ,@enabled = 1 ;\nEXEC msdb.dbo.sp_update_job\n@job_id = @LS_Secondary__RestoreJobId\n\
  ,@enabled = 1 ;\nListing 15-4\nsp_add_log_shipping_secondary_primary\n```\n\n我们的下一步是配置辅助数据库。我们可以通过使用\
  \ `sp_add_log_shipping_secondary_database` 存储过程来执行此任务。此过程接受的参数详见表 15-4。\n\n表 15-4\n\
  \nsp_add_log_shipping_secondary_database 参数\n\n| 参数 | 描述 |\n| --- | --- |\n| `@secondary_database`\
  \ | 辅助数据库的名称。 |\n| `@primary_server` | 主服务器的服务器\\实例。 |\n| `@primary_database` |\
  \ 主数据库的名称。 |\n| `@restore_delay` | 指定负载延迟（以分钟为单位）。 |\n| `@restore_all` | 设置为 `1`\
  \ 时，还原作业会还原所有可用的日志备份。设置为 `0` 时，还原作业仅应用单个日志备份。 |\n| `@restore_mode` | 指定还原作业要使用的备份模式。`1`\
  \ 表示 `STANDBY`，`0` 表示 `NORECOVERY`。 |\n| `@disconnect_users` | 确定在应用事务日志备份时是否应断开用户与数据库的连接。`1`\
  \ 表示断开连接，`0` 表示不断开连接。仅在 `STANDBY` 模式下还原日志时适用。 |\n| `@block_size` | 指定备份设备的块大小（以字节为单位）。\
  \ |\n| `@buffer_count` | 指定还原操作可使用的内存缓冲区总数。 |\n| `@max_transfer_size` | 指定可以发送到备份设备的请求的最大大小（以字节为单位）。\
  \ |\n| `@restore_threshold` | 在生成警报之前，可以经过的、未应用还原操作的时间量；以分钟为单位指定。 |\n| `@threshold_alert`\
  \ | 如果超过还原阈值将引发的警报。 |\n| `@threshold_alert_enabled` | 指定是否启用警报。`1` 表示启用，`0` 表示禁用。\
  \ |\n| `@history_retention_period` | 还原历史记录的保留期，以分钟为单位指定。 |\n| `@Ignoreremotemonitor`\
  \ | 一个未公开记录的参数，部分控制内部日志传送数据库日志的更新方式。 |\n\n清单 15-5 演示了如何使用 `sp_add_log_shipping_secondary_database`\
  \ 为日志传送配置我们的辅助数据库。由于我们显式连接到 `DRSERVER\\PROSQLDR` 实例，因此该脚本应在 SQLCMD 模式下运行。\n\n```sql\n\
  :connect drserver\\prosqldr\nEXEC master.dbo.sp_add_log_shipping_secondary_database\n\
  @secondary_database = N'Chapter15'\n,@primary_server = N'primaryserver\\prosqladmin'\n\
  ,@primary_database = N'Chapter15'\n,@restore_delay = 10\n,@restore_mode = 0\n,@disconnect_users\
  \         = 0\n,@restore_threshold        = 30\n,@threshold_alert_enabled  = 1\n\
  ,@history_retention_period = 5760\n,@ignoreremotemonitor = 1\nListing 15-5\nsp_add_log_shipping_secondary_database\n\
  ```\n\n最后的任务是同步监视服务器和 DR 服务器。我们通过使用（令人惊讶地）未公开记录的存储过程 `sp_processlogshippingmonitorsecondary`\
  \ 来完成此操作。此过程接受的参数详见表 15-5。\n\n表 15-5\n\nsp_processlogshippingmonitorsecondary\n\n\
  \n\n| **参数** | **描述** |\n| --- | --- |\n| `@mode` | 数据库使用的恢复模式。`0` 表示 `NORECOVERY`，`1`\
  \ 表示 `STANDBY`。 |\n| `@secondary_server` | 辅助服务器的 `server\\instance`。 |\n| `@secondary_database`\
  \ | 辅助数据库的名称。 |\n| `@secondary_id` | 辅助服务器的 ID。 |\n| `@primary_server` | 主服务器的 `server\\\
  instance`。 |\n| `@monitor_server` | 监视服务器的 `server\\instance`。 |\n| `@monitor_server_security_mode`\
  \ | 连接到监视服务器时使用的身份验证模式。 |\n| `@primary_database` | 主数据库的名称。 |\n| `@restore_threshold`\
  \ | 在触发警报之前，可以经过而不应用还原的时间量；以分钟为单位指定。 |\n| `@threshold_alert` | 如果超过警报还原阈值则触发的警报。\
  \ |\n| `@threshold_alert_enabled` | 指定警报是启用还是禁用。 |\n| `@last_copied_file` | 最后一次复制到辅助服务器的日志备份的文件名。\
  \ |\n| `@last_copied_date` | 上次将日志复制到辅助服务器的日期和时间。 |\n| `@last_copied_date_utc` |\
  \ 上次将日志复制到辅助服务器的日期和时间，已转换为 UTC（协调世界时）。 |\n| `@last_restored_file` | 最后在辅助服务器上还原的事务日志备份的文件名。\
  \ |\n| `@last_restored_date` | 上次在辅助服务器上还原日志的日期和时间。 |\n| `@last_restored_date_utc`\
  \ | 上次在辅助服务器上还原日志的日期和时间，已转换为 UTC。 |\n| `@last_restored_latency` | 主服务器上最后一次日志备份与其在辅助服务器上对应的还原操作完成之间经过的时间。\
  \ |\n| `@history_retention_period` | 历史记录保留的持续时间，以分钟为单位。 |\n\n列表 15-6 中的脚本演示了如何使用\
  \ `sp_processlogshippingmonitorsecondary` 存储过程来同步我们的 DR 服务器和监视服务器之间的信息。我们应该在监视服务器上运行该脚本，并且由于我们显式连接到\
  \ `MONITORSERVER\\PROSQLMONITOR` 实例，我们应该在 SQLCMD 模式下运行脚本。\n\n```\n:connect monitorserver\\\
  prosqlmonitor\nEXEC msdb.dbo.sp_processlogshippingmonitorsecondary\n@mode = 1\n\
  ,@secondary_server = N'drserver\\prosqldr'\n,@secondary_database = N'Chapter15'\n\
  ,@secondary_id = N''\n,@primary_server = N'primaryserver\\prosqladmin'\n,@primary_database\
  \ = N'Chapter15'\n,@restore_threshold = 30\n,@threshold_alert = 14420\n,@threshold_alert_enabled\
  \ = 1\n,@history_retention_period        = 5760\n,@monitor_server = N'monitorserver.prosqladmin.com\\\
  prosqlmonitor'\n,@monitor_server_security_mode = 1\nListing 15-6\nsp_processlogshippingmonitorsecondary\n\
  ```\n\n### 日志传送维护\n\n配置日志传送后，你仍然有持续的维护任务需要执行，例如在需要时故障转移到辅助服务器，以及切换主服务器和辅助服务器角色。以下部分将讨论这些主题。我们还将讨论如何使用监视服务器来监视日志传送环境。\n\
  \n#### 故障转移日志传送\n\n如果你的主服务器出现问题，或者你的主站点发生故障，你需要故障转移到辅助服务器。为此，首先要备份日志的末尾部分。我们将在第\
  \ 15 章中完整讨论此过程，但该过程本质上涉及备份事务日志而不截断它，并使用 `NORECOVERY`。这会阻止用户连接到数据库，从而避免任何进一步的数据丢失。显然，这仅在主数据库可访问时才可能。你可以使用列表\
  \ 15-7 中的脚本对 `Chapter15` 数据库执行此操作。\n\n```\nBACKUP LOG Chapter15\nTO  DISK = N'c:\\\
  logshippingprimary\\Chapter15_tail.trn'\nWITH  NO_TRUNCATE, NAME = N'Chapter15-Full\
  \ Database Backup', NORECOVERY\nGO\nListing 15-7\n备份日志的末尾部分\n```\n\n下一步是手动复制日志的末尾部分以及任何其他尚未复制到辅助服务器的日志。完成后，你需要按顺序手动将未完成的事务日志备份还原到辅助服务器。你需要应用备份时使用\
  \ `NORECOVERY`，直到达到最后一个备份。这个最后的备份使用 `RECOVERY` 应用。这会导致任何未提交的事务被回滚，并且数据库上线。列表 15-8\
  \ 演示了将最后两个事务日志应用到辅助数据库。\n\n```\n--Restore the first transaction log\nRESTORE LOG\
  \ Chapter15\nFROM  DISK = N'C:\\LogShippingDR\\Chapter15.trn'\nWITH  FILE = 1, \
  \ NORECOVERY,  STATS = 10 ;\nGO\n--Restore the tail end of the log\nRESTORE LOG\
  \ Chapter15\nFROM  DISK = N'C:\\LogShippingDR\\Chapter15_tail.trn'\nWITH  FILE =\
  \ 1,  RECOVERY, STATS = 10 ;\nGO\nListing 15-8\n应用事务日志\n```\n\n#### 切换角色\n\n将日志传送故障转移到辅助服务器后，你可能希望交换服务器角色，以便你故障转移到的辅助服务器成为新的主服务器，而原始主服务器变为辅助服务器。为了实现这一点，首先你需要禁用主服务器上的备份作业以及辅助服务器上的复制和还原作业。我们可以使用列表\
  \ 15-9 中的脚本为我们的日志传送拓扑执行此任务。因为我们连接到多个服务器，我们需要在 SQLCMD 模式下运行此脚本。\n\n```\n:connect\
  \ primaryserver\\prosqladmin\nUSE [msdb]\nGO\n--Disable backup job\nEXEC msdb.dbo.sp_update_job\
  \ @job_name = 'LSBackup_Chapter15',\n@enabled=0 ;\nGO\n:connect drserver\\prosqldr\n\
  USE [msdb]\nGO\n--Diable copy job\nEXEC msdb.dbo.sp_update_job @job_name='LSCopy_primaryserver\\\
  prosqladmin_Chapter15',\n@enabled=0 ;\nGO\n--Disable restore job\nEXEC msdb.dbo.sp_update_job\
  \ @job_name='LSRestore_primaryserver\\prosqladmin_Chapter15',\n@enabled=0 ;\nGO\n\
  Listing 15-9\n禁用日志传送作业\n```\n\n下一步是在新的主服务器上重新配置日志传送。执行此操作时，请配置以下内容：\n\n*   确保你使用与原始主服务器相同的备份共享。\n\
  *   确保添加辅助数据库时，指定最初是主数据库的数据库。\n*   指定同步选项为“否，辅助数据库已初始化”。\n\n列表 15-10 中的脚本为我们的新辅助服务器执行此操作。由于我们连接到多个服务器，我们应该在\
  \ SQLCMD 模式下运行脚本。\n\n\n\n```\n:connect drserver\\prosqldr\nDECLARE @LS_BackupJobId\
  \        AS uniqueidentifier\nDECLARE @SP_Add_RetCode        As int\nDECLARE @LS_BackUpScheduleID\
  \   AS int\nEXEC @SP_Add_RetCode = master.dbo.sp_add_log_shipping_primary_database\n\
  @database = N'Chapter15'\n,@backup_directory = N'\\\\primaryserver\\logshippingprimary'\n\
  ,@backup_share = N'\\\\primaryserver\\logshippingprimary'\n,@backup_job_name = N'LSBackup_Chapter15'\n\
  ,@backup_retention_period = 2880\n,@backup_compression = 2\n,@backup_threshold =\
  \ 60\n,@threshold_alert_enabled = 1\n,@history_retention_period = 5760\n,@backup_job_id\
  \ = @LS_BackupJobId OUTPUT\n,@overwrite = 1\nEXEC msdb.dbo.sp_add_schedule\n@schedule_name\
  \ =N'LSBackupSchedule_DRSERVER\\PROSQLDR1'\n,@enabled = 1\n,@freq_type = 4\n,@freq_interval\
  \ = 1\n,@freq_subday_type = 4\n,@freq_subday_interval = 5\n,@freq_recurrence_factor\
  \ = 0\n,@active_start_date = 20190517\n,@active_end_date = 99991231\n,@active_start_time\
  \ = 0\n,@active_end_time = 235900\n,@schedule_id = @LS_BackUpScheduleID OUTPUT\n\
  EXEC msdb.dbo.sp_attach_schedule\n@job_id = @LS_BackupJobId\n,@schedule_id = @LS_BackUpScheduleID\n\
  EXEC msdb.dbo.sp_update_job\n@job_id = @LS_BackupJobId\n,@enabled = 1\nEXEC master.dbo.sp_add_log_shipping_primary_secondary\n\
  @primary_database = N'Chapter15'\n,@secondary_server = N'primaryserver\\prosqladmin'\n\
  ,@secondary_database = N'Chapter15'\n,@overwrite = 1\n:connect primaryserver\\prosqladmin\n\
  DECLARE @LS_Secondary__CopyJobId        AS uniqueidentifier\nDECLARE @LS_Secondary__RestoreJobId\
  \        AS uniqueidentifier\nDECLARE @LS_Add_RetCode        As int\nDECLARE @LS_SecondaryCopyJobScheduleID\
  \        AS int\nDECLARE @LS_SecondaryRestoreJobScheduleID        AS int\nEXEC @LS_Add_RetCode\
  \ = master.dbo.sp_add_log_shipping_secondary_primary\n@primary_server = N'DRSERVER\\\
  PROSQLDR'\n,@primary_database = N'Chapter15'\n,@backup_source_directory = N'\\\\\
  primaryserver\\logshippingprimary'\n,@backup_destination_directory = N'\\\\primaryserver\\\
  logshippingprimary'\n,@copy_job_name = N'LSCopy_DRSERVER\\PROSQLDR_Chapter15'\n\
  ,@restore_job_name = N'LSRestore_DRSERVER\\PROSQLDR_Chapter15'\n,@file_retention_period\
  \ = 2880\n,@overwrite = 1\n,@copy_job_id = @LS_Secondary__CopyJobId OUTPUT\n,@restore_job_id\
  \ = @LS_Secondary__RestoreJobId OUTPUT\nEXEC msdb.dbo.sp_add_schedule\n@schedule_name\
  \ =N'DefaultCopyJobSchedule'\n,@enabled = 1\n,@freq_type = 4\n,@freq_interval =\
  \ 1\n,@freq_subday_type = 4\n,@freq_subday_interval = 5\n,@freq_recurrence_factor\
  \ = 0\n,@active_start_date = 20190517\n,@active_end_date = 99991231\n,@active_start_time\
  \ = 0\n,@active_end_time = 235900\n,@schedule_id = @LS_SecondaryCopyJobScheduleID\
  \ OUTPUT\nEXEC msdb.dbo.sp_attach_schedule\n@job_id = @LS_Secondary__CopyJobId\n\
  ,@schedule_id = @LS_SecondaryCopyJobScheduleID\nEXEC msdb.dbo.sp_add_schedule\n\
  @schedule_name =N'DefaultRestoreJobSchedule'\n,@enabled = 1\n,@freq_type = 4\n,@freq_interval\
  \ = 1\n,@freq_subday_type = 4\n,@freq_subday_interval = 5\n,@freq_recurrence_factor\
  \ = 0\n,@active_start_date = 20190517\n,@active_end_date = 99991231\n,@active_start_time\
  \ = 0\n,@active_end_time = 235900\n,@schedule_id = @LS_SecondaryRestoreJobScheduleID\
  \ OUTPUT\nEXEC msdb.dbo.sp_attach_schedule\n@job_id = @LS_Secondary__RestoreJobId\n\
  ,@schedule_id = @LS_SecondaryRestoreJobScheduleID\nEXEC master.dbo.sp_add_log_shipping_secondary_database\n\
  @secondary_database = N'Chapter15'\n,@primary_server = N'DRSERVER\\PROSQLDR'\n,@primary_database\
  \ = N'Chapter15'\n,@restore_delay = 10\n,@restore_mode = 0\n,@disconnect_users \
  \        = 0\n,@restore_threshold        = 30\n,@threshold_alert_enabled  = 1\n\
  ,@history_retention_period = 5760\n,@overwrite = 1\nEXEC msdb.dbo.sp_update_job\n\
  @job_id = @LS_Secondary__CopyJobId\n,@enabled = 1\nEXEC msdb.dbo.sp_update_job\n\
  @job_id = @LS_Secondary__RestoreJobId\n,@enabled = 1\n```\n`清单 15-10` 重新配置日志传送\n\
  \n最后一步是重新配置监控，使其能正确监控我们的新配置。我们可以通过使用`清单 15-11`中的脚本，为我们的日志传送环境实现这一点。该脚本会连接到主服务器和辅助服务器，因此我们应该在\
  \ `SQLCMD` 模式下运行它。\n\n```\n:connect drserver\\prosqldr\nUSE msdb\nGO\nEXEC master.dbo.sp_change_log_shipping_secondary_database\n\
  @secondary_database = N'database_name',\n@threshold_alert_enabled = 0 ;\nGO\n:connect\
  \ primaryserver\\prosqladmin\nUSE msdb\nGO\nEXEC master.dbo.sp_change_log_shipping_primary_database\n\
  @database=N'database_name',\n@threshold_alert_enabled = 0 ;\nGO\n```\n`清单 15-11`\
  \ 重新配置监控\n\n因为我们现在已经在两台服务器上创建了备份、复制和还原作业，所以在后续故障转移后切换角色会变得非常直接。从现在开始，故障转移后，我们只需禁用原主服务器上的备份作业以及辅助服务器上的复制和还原作业，然后启用新主服务器上的备份作业以及新辅助服务器上的复制和还原作业，即可切换角色。\n\
  \n\n\n#### 监控\n\n监控日志传送拓扑最重要的方面是确保备份在主服务器上执行，并在辅助服务器上被还原。因此，在本章中配置日志传送时，我们调整了备份和还原的可接受阈值，并在监控服务器上创建了服务器代理警报。然而，要使这些警报有用，我们需要为它们配置一个操作员来接收通知。\n\
  \n在监控服务器上，我们配置了两个警报。第一个名为 **日志传送主服务器警报**，查看其属性的 **常规** 选项卡时，可以看到它被配置为响应 `错误 14420`，如图\
  \ 15-11 所示。`错误 14420` 表示在定义的时限内未对主数据库进行备份。\n\n![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig11_HTML.jpg](img/333037_2_En_15_Fig11_HTML.jpg)\n\
  图 15-11: **常规** 选项卡\n\n在 **响应** 选项卡（如图 15-12 所示）中，我们需要配置一个操作员来接收警报。你可以使用 **新建操作员**\
  \ 按钮配置一个新操作员，或者像我们这样，只需在列表中为相应的操作员选择适当的通知通道。你还可以选择运行一个 SQL Server 代理作业来尝试修复该状况。\n\
  \n![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig12_HTML.jpg](img/333037_2_En_15_Fig12_HTML.jpg)\n\
  图 15-12: **响应** 选项卡\n\n你应该以配置 **日志传送主服务器警报** 的相同方式来配置 **日志传送辅助服务器警报**。辅助服务器警报的工作方式相同，只是它监控的是\
  \ `错误 14421` 而不是 `14420`。`错误 14421` 表示在时限内未将事务日志还原到辅助服务器。\n\n可以从 **SQL Server Management\
  \ Studio** 运行日志传送报告。在监控服务器上运行时，它会显示主服务器和每个辅助服务器的状态。在主服务器上运行时，它会基于备份作业显示每个数据库的状态，并包含每个辅助服务器的一行信息。在灾难恢复服务器上运行时，它会基于还原作业显示每个数据库的状态。你可以通过调用实例的上下文菜单，依次选择\
  \ **报告** -> **标准报告**，然后选择 **事务日志传送状态** 报告来访问该报告。\n\n图 15-13 展示了在主服务器上运行的报告。你可以看到备份作业的状态已设置为\
  \ **警报**，并且文本以红色高亮显示。这表明主数据库上成功备份的阈值已被突破。在我们的案例中，我们通过禁用备份作业模拟了这种情况。我们本可以通过使用 `sp_help_log_shipping_monitor`\
  \ 存储过程获得相同的信息。\n\n![../images/333037_2_En_15_Chapter/333037_2_En_15_Fig13_HTML.jpg](img/333037_2_En_15_Fig13_HTML.jpg)\n\
  图 15-13: **日志传送** 报告\n\n### 摘要\n\n日志传送是一种可用于为数据库实现灾难恢复的技术。它通过备份主数据库的事务日志、将其复制到辅助服务器，然后将其还原来同步数据。如果使用\
  \ `STANDBY` 选项还原日志，那么未提交的事务将存储在一个事务撤消文件中，你可以在后续备份之前重新应用它们。这意味着你可以将数据库联机为只读模式以进行报告。然而，如果使用\
  \ `NORECOVERY` 选项还原日志，那么服务器就为灾难恢复调用做好了准备，但数据库处于脱机状态。\n\n将数据库故障转移到辅助服务器涉及备份事务日志的尾端，然后将所有未完成的日志备份应用到辅助数据库，最后通过使用\
  \ `RECOVERY` 选项执行最终还原来使数据库联机。如果你希望切换服务器角色，则需要禁用当前的日志传送作业，重新配置日志传送使辅助服务器现在成为主服务器，然后重新配置监控。然而，在后续故障转移之后，切换角色会变得更容易，因为你可以简单地禁用和启用日志传送所使用的相应\
  \ **SQL Server 代理** 作业。\n\n要监控日志传送拓扑的运行状况，你应该配置日志传送警报，并添加一个在警报触发时将收到通知的操作员。主服务器的警报监控\
  \ `错误 14420`，这表示已超出备份阈值。辅助服务器的警报监控 `错误 14421`，这表示已超出还原阈值。\n\n提供了一个日志传送报告；它返回有关主数据库、辅助数据库或拓扑中所有服务器的数据，具体取决于它是从主服务器、辅助服务器还是监控服务器调用的。相同的信息可以从\
  \ `sp_help_log_shipping_monitor` 存储过程获得。\n\n# 16. 扩展工作负载\n\nSQL Server 提供了多种技术，允许数据库管理员在多个数据库之间水平扩展其工作负载以避免锁争用，或在服务器之间水平扩展以分散资源利用率。这些技术包括数据库快照、复制和\
  \ **AlwaysOn** 可用性组。本章讨论这些技术的注意事项并演示如何实施它们。\n\n\n\n### 数据库快照\n\n一个`数据库快照`是数据库在某个时间点的视图，一旦生成便永不改变。它使用写入时复制技术工作；这意味着如果源数据库中的某个页面被修改，该页面的原始版本会被复制到一个\
  \ NTFS 稀疏文件中，该文件由数据库快照使用。`稀疏文件`是一种起始为空、不分配磁盘空间的文件。随着源数据库中的页面被更新，且这些页面被复制到稀疏文件中，文件会相应增长以容纳它们。此过程如图\
  \ 16-1 所示。\n\n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig1_HTML.png](img/333037_2_En_16_Fig1_HTML.png)\n\
  \n图 16-1 数据库快照\n\n如果用户对数据库快照运行查询，SQL Server 会检查所需的页面是否存在于数据库快照中。任何存在的页面都从数据库快照返回，而其他任何页面则从源数据库中检索，如图\
  \ 16-2 所示。在此示例中，为了满足查询，SQL Server 需要返回`页面 1:100`和`页面 1:101`。自快照创建以来，`页面 1:100`在源数据库中已被修改。因此，该页面的原始版本已被复制到稀疏文件中，SQL\
  \ Server 从那里检索它。另一方面，自快照创建以来，`页面 1:101`在源数据库中未被修改。因此，它不存在于稀疏文件中，SQL Server 从源数据库检索它。\n\
  \n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig2_HTML.png](img/333037_2_En_16_Fig2_HTML.png)\n\
  \n图 16-2 查询数据库快照\n\n如果您的数据层应用程序正遭受由锁引起的争用，那么您可以将报表查询外扩到数据库快照。然而，需要注意的重要一点是，因为数据库快照必须与源数据库驻留在同一实例上，它无助于克服资源利用率问题。事实上，情况恰恰相反。因为任何修改过的页面都必须复制到稀疏文件中，所以`IO`开销会增加。内存占用也会增加，因为每个数据库的缓冲区高速缓存中页面都被复制了。\n\
  \n#### 提示\n\n在执行`IO`密集型任务时，可能存在数据库快照可能是不合适的。我见过几个场景——一个涉及在`VLDB`上重建索引，另一个涉及在复制拓扑中订阅者数据库上的快照——其中写入时复制线程和鬼影清理线程相互阻塞得如此严重，以至于进程永远无法完成。如果您遇到此场景，并且必须在`IO`密集型任务期间保留快照，那么唯一的解决方法是使用`跟踪标志\
  \ 661`禁用鬼影清理任务。然而，需要警告的是，如果您采用此方法，已删除的行将永远不会自动移除，您必须通过其他方式清理它们，例如重建所有索引。\n\n除了数据库快照的资源开销外，当您使用它们来减少报表查询的争用时，遇到的另一个问题是，随着源数据库中的页面被修改，数据会变得陈旧。为了克服这一点，您可以创建一个元数据驱动的脚本来定期刷新快照。这将在第\
  \ 17 章演示。\n\n然而，数据变旧的问题也可能是一个优势，因为它带来两个好处：首先，这意味着您可以将快照用于历史报表目的；其次，这意味着您可以在发生用户错误后使用数据库快照恢复数据。需要警告的是，这些快照不能提供针对`IO`错误或数据库故障的弹性，您不能用它们来替代数据库备份。\n\
  \n### 实现数据库快照\n\n在演示如何创建数据库快照之前，我们首先创建`Chapter16`数据库，本章的演示都将使用此数据库。代码清单 16-1 中的脚本创建此数据库并用数据填充它。\n\
  \n```sql\nCREATE DATABASE Chapter16 ;\nGO\nUSE Chapter16\nGO\nCREATE TABLE Customers\n\
  (\nID                  INT            PRIMARY KEY        IDENTITY,\nFirstName  \
  \         NVARCHAR(30),\nLastName            NVARCHAR(30),\nCreditCardNumber   \
  \ VARBINARY(8000)\n) ;\nGO\n--Populate the table\nDECLARE @Numbers TABLE\n(\nNumber\
  \        INT\n)\n;WITH CTE(Number)\nAS\n(\nSELECT 1 Number\nUNION ALL\nSELECT Number\
  \ + 1\nFROM CTE\nWHERE Number < 100\n)\nINSERT INTO @Numbers\nSELECT Number FROM\
  \ CTE ;\nDECLARE @Names TABLE\n(\nFirstName       VARCHAR(30),\nLastName       \
  \ VARCHAR(30)\n) ;\nINSERT INTO @Names\nVALUES('Peter', 'Carter'),\n('Michael',\
  \ 'Smith'),\n('Danielle', 'Mead'),\n('Reuben', 'Roberts'),\n('Iris', 'Jones'),\n\
  ('Sylvia', 'Davies'),\n('Finola', 'Wright'),\n('Edward', 'James'),\n('Marie', 'Andrews'),\n\
  ('Jennifer', 'Abraham'),\n('Margaret', 'Jones') ;\nINSERT INTO Customers(Firstname,\
  \ LastName, CreditCardNumber)\nSELECT  FirstName, LastName, CreditCardNumber FROM\n\
  (SELECT\n(SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName\n,(SELECT\
  \ TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName\n,(SELECT CONVERT(VARBINARY(8000)\n\
  ,(SELECT TOP 1 CAST(Number * 100 AS CHAR(4))\nFROM @Numbers\nWHERE Number BETWEEN\
  \ 10 AND 99\nORDER BY NEWID()) + '-' +\n(SELECT TOP 1 CAST(Number * 100 AS CHAR(4))\n\
  FROM @Numbers\nWHERE Number BETWEEN 10 AND 99\nORDER BY NEWID()) + '-' +\n(SELECT\
  \ TOP 1 CAST(Number * 100 AS CHAR(4))\nFROM @Numbers\nWHERE Number BETWEEN 10 AND\
  \ 99\nORDER BY NEWID()) + '-' +\n(SELECT TOP 1 CAST(Number * 100 AS CHAR(4))\nFROM\
  \ @Numbers\nWHERE Number BETWEEN 10 AND 99\nORDER BY NEWID()))) CreditCardNumber\n\
  FROM @Numbers a\nCROSS JOIN @Numbers b\n) d ;\n```\n代码清单 16-1 创建 `Chapter16` 数据库\n\
  \n要在`Chapter16`数据库上创建数据库快照，我们使用`CREATE DATABASE`语法，并添加`AS SNAPSHOT OF`子句，如代码清单 16-2\
  \ 所示。文件数量必须与源数据库的文件数量匹配，并且快照必须使用唯一的名称创建。`.ss`文件扩展名是标准的，但不是强制性的。我知道一些`DBA`会使用`.ndf`扩展名，如果他们无法获得额外文件扩展名的防病毒例外。然而，如果可能，我建议使用`.ss`扩展名，因为它清楚地标识文件与快照相关联。\n\
  \n```sql\nCREATE DATABASE Chapter16_ss_0630\nON PRIMARY\n( NAME = N'Chapter16',\
  \ FILENAME = N'F:\\MSSQL\\DATA\\Chapter16_ss_0630.ss' )\nAS SNAPSHOT OF Chapter16\
  \ ;\n```\n代码清单 16-2 创建数据库快照\n\n每个数据库快照必须具有唯一名称的事实，如果您计划使用多个快照，可能会给连接的应用程序带来问题；这是因为应用程序不知道它们应该连接到哪个数据库的名称。您可以通过以编程方式将应用程序指向最新的数据库快照来解决此问题。您可以在代码清单\
  \ 16-3 中找到如何执行此操作的示例。此脚本创建并运行一个返回`Customers`表中所有数据的存储过程。它首先动态检查基于`Chapter16`数据库的最近快照的名称，这意味着数据将始终从最近的快照返回。\n\
  \n```sql\nUSE Chapter16\nGO\nCREATE PROCEDURE dbo.usp_Dynamic_Snapshot_Query\nAS\n\
  BEGIN\nDECLARE @LatestSnashot NVARCHAR(128)\nDECLARE @SQL NVARCHAR(MAX)\nSET @LatestSnashot\
  \ = (\nSELECT TOP 1 name from sys.databases\nWHERE source_database_id = DB_ID('Chapter16')\n\
  ORDER BY create_date DESC ) ;\nSET @SQL = 'SELECT * FROM ' + @LatestSnashot + '.dbo.Customers'\
  \ ;\nEXEC(@SQL) ;\nEND\nEXEC dbo.usp_Dynamic_Snapshot_Query ;\n```\n代码清单 16-3 将客户端定向到最新快照\n\
  \n\n\n#### 从快照中恢复数据\n\n如果用户错误导致数据丢失，那么数据库快照可以让数据库管理员无需从备份中恢复数据库就能找回数据，这可以减少解决问题的恢复时间目标。假设一个用户意外截断了\
  \ `Chapter16` 数据库中的 `Contacts` 表；我们可以通过从快照中重新插入来恢复这些数据，如代码清单 16-4 所示。\n\n```\n--Truncate\
  \ the table\nTRUNCATE TABLE Chapter16.dbo.Customers ;\n--Allow Identity values to\
  \ be re-inserted\nSET IDENTITY_INSERT Chapter16.dbo.Customers ON ;\n--Insert the\
  \ data\nINSERT INTO Chapter16.dbo.Customers(ID, FirstName, LastName, CreditCardNumber)\n\
  SELECT *\nFROM Chapter16_ss_0630.dbo.Customers ;\n--Turn off IDENTITY_INSERT\nSET\
  \ IDENTITY_INSERT Chapter16.dbo.Customers OFF ;\n代码清单 16-4\n恢复丢失的数据\n```\n\n如果源数据库的大部分内容因用户错误而损坏，那么与逐个修复数据问题相比，从快照中恢复整个数据库可能更快。你可以使用带有\
  \ `FROM DATABASE_SNAPSHOT` 语法的 `RESTORE` 命令来完成此操作，如代码清单 16-5 所示。\n\n**注意**\n\n如果你希望恢复的数据库存在多个快照，那么在运行此脚本之前，你必须删除除你计划用于恢复的那个快照之外的所有其他快照。\n\
  \n```\nUSE Master\nGO\nRESTORE DATABASE Chapter16\nFROM DATABASE_SNAPSHOT = 'Chapter16_ss_0630'\
  \ ;\n代码清单 16-5\n从数据库快照中恢复\n```\n\n### 复制\n\nSQL Server 提供了一套复制技术，可用于在实例之间分散数据。你可以将复制用于多种目的，包括卸载报表处理、整合来自多个站点的数据、支持数据仓库以及与移动用户交换数据。\n\
  \n#### 复制概念\n\n复制的术语借鉴自出版业。复制拓扑的组成部分在表 16-1 中描述。\n\n**表 16-1**\n\n**复制组件**\n\n|\
  \ 组件 | 描述 |\n| --- | --- |\n| 发布服务器 | 发布服务器是向其他位置提供数据的实例。这本质上是主服务器。 |\n| 订阅服务器 |\
  \ 订阅服务器是从发布服务器接收数据的实例。这本质上是从属服务器。一个复制拓扑可以有多个订阅服务器。 |\n| 分发服务器 | 分发服务器是存储复制技术元数据的实例，也可能承担处理工作负载。该实例可能与发布服务器是同一个实例。\
  \ |\n| 项目 | 项目是一个被复制的数据库对象，例如表或视图。可以对项目进行筛选，以减少需要复制的数据量。 |\n| 发布 | 发布是来自数据库的一组项目，作为一个单元进行复制。\
  \ |\n| 订阅 | 订阅是订阅服务器接收发布的请求。它定义了订阅服务器接收哪些发布。订阅有两种类型：推送订阅和请求订阅。在请求订阅模型中，负责移动数据的分发代理或合并代理运行在每个订阅服务器上。在推送模型中，分发代理或合并代理运行在分发服务器上。\
  \ |\n| 复制代理 | 复制代理是位于 SQL Server 之外的应用程序，用于执行各种任务。使用的代理取决于你实现的复制类型。 |\n\n图 16-3\
  \ 说明了复制组件如何在复制拓扑中组合在一起。在此示例中，两个订阅服务器各自接收相同的发布，并且分发服务器已与发布服务器分离。这被称为*远程分发器*。如果发布服务器和分发服务器共享同一个实例，则称为*本地分发器*。\n\
  \n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig3_HTML.png](img/333037_2_En_16_Fig3_HTML.png)\n\
  \n**图 16-3**\n\n**复制组件概览**\n\n#### 复制类型\n\nSQL Server 提供了三种主要的复制类型：快照复制、事务性复制和合并复制。这些复制技术将在以下部分介绍。\n\
  \n##### 快照\n\n快照复制的工作原理是在同步发生时获取所有项目的完整副本；因此，它不需要跟踪同步之间的数据更改。如果你在项目上定义了筛选器，则只会复制筛选后的数据。这意味着快照复制除了在同步发生时之外，没有额外开销。然而，当同步确实发生时，如果要复制的数据量很大，资源开销可能会非常高。\n\
  \n快照代理为发布中的每个项目创建一个系统视图和一个系统存储过程。它使用这些对象来生成项目的内容。它还创建架构文件，在使用 `BCP`（大容量复制程序）批量复制数据之前，先将这些架构文件应用到订阅数据库。\n\
  \n由于其资源利用特性，快照复制最适合以下情况：被复制的数据集较小且不常更改，或者在短时间内发生大量更改。（例如，这可能包括每月更新的价目表。）此外，快照复制是你用于对事务性复制和合并复制执行初始同步的默认机制。\n\
  \n使用快照复制时，快照代理在发布服务器上运行以生成发布。然后，分发代理（运行在分发服务器或每个订阅服务器上）将发布应用到订阅服务器。快照复制始终单向工作，这意味着订阅服务器永远无法更新发布服务器。\n\
  \n\n\n##### 事务复制\n\n事务复制的工作原理是读取发布服务器上事务日志中的事务，然后将这些事务重新应用到订阅服务器上。运行在发布服务器上的`日志读取器代理`负责读取事务，在标记为复制的所有日志记录被处理完毕之前，`VLF`不会被截断。这意味着，如果同步间隔时间很长且发生了大量数据修改，则您的事务日志存在增长甚至空间耗尽的风险。从日志中读取事务后，`分发代理`会将这些事务应用到订阅服务器。该代理在推送订阅模型中运行于分发服务器上，或在拉取订阅模型中运行于每个订阅服务器上。同步由`SQL\
  \ Server 代理`作业调度，这些作业配置为运行复制代理。您可以根据需求配置同步，使其连续或定期发生。默认情况下，初始数据同步使用`快照代理`执行。\n\n\
  事务复制通常用于服务器到服务器的场景，其中发布服务器上存在大量的数据修改，并且发布服务器与订阅服务器之间有可靠的网络连接。全局数据仓库就是这样一个例子，它将数据子集复制到区域数据仓库。\n\
  \n标准的事务复制始终单向工作，这意味着订阅服务器无法更新发布服务器。不过，SQL Server 还提供了对等事务复制。在对等拓扑中，每个服务器既充当发布服务器，又充当拓扑中其他服务器的订阅服务器。这意味着您在任何一台服务器上所做的更改都会被复制到拓扑中的所有其他服务器。\n\
  \n由于所有服务器都可以接受更新，因此有可能发生冲突。因此，当每个对等节点在数据的不同分区上接受更新时，对等复制最为合适。如果确实发生冲突，您可以配置 SQL\
  \ Server 应用具有最高`OriginatorID`（分配给拓扑中每个节点的唯一整数）的事务，或者选择手动解决冲突，这是推荐的方法。\n\n#### 提示\n\
  \n如果您无法在节点之间对可更新数据进行分区，并且冲突很可能发生，那么您可能会发现合并复制是更好的技术选择。\n\n##### 合并复制\n\n合并复制允许您同时更新发布服务器和订阅服务器。这对于客户端-服务器场景是一个很好的选择，例如移动销售人员可以在他们的笔记本电脑上输入订单，然后与主销售数据库同步。它在一些服务器到服务器的场景中也很有用——例如，通过`ETL`过程更新的区域数据仓库，然后汇总到全局数据仓库中。\n\
  \n合并复制通过在每个作为发布中文章的表上维护一个`rowguid`来工作。如果该表没有设置了`ROWGUID`属性的`uniqueidentifier`列，合并复制会添加一个。当对表进行数据修改时，会触发一个触发器，该触发器维护一系列更改跟踪表。当`合并代理`运行时，它只应用行的最新版本。这意味着跟踪发生的更改会消耗大量资源，但作为权衡，合并复制在实际同步更改时的开销是最低的。\n\
  \n由于订阅服务器和发布服务器都可以被更新，因此存在行之间发生冲突的风险。您可以使用冲突解决程序来管理这些冲突。合并复制提供了 12 个开箱即用的冲突解决程序，包括“最早者胜出”、“最新者胜出”和“订阅者总是胜出”。您也可以编程自定义基于`COM`的冲突解决程序，或选择手动解决冲突。\n\
  \n由于您可以在客户端-服务器场景中使用合并复制，它提供了一种称为“Web 同步”的技术来更新订阅服务器。使用 Web 同步时，在提取更改后，`合并代理`会向`IIS`发出`HTTPS`请求，并以`XML`消息的形式将数据更改发送给订阅服务器。运行在订阅服务器上的`复制侦听器`和`合并复制协调器`进程会处理这些数据更改，然后将订阅服务器上进行的任何数据修改发送回发布服务器。\n\
  \n### 实现事务复制\n\n最适合用于扩展工作负载的复制类型是标准事务复制。我们将在以下部分讨论如何实现该技术。\n\n#### 注意\n\n对于本节的演示，我们使用两个实例：`WIN-KIAGK4GN1MJ\\\
  PROSQLADMIN` 和 `WIN-KIAGK4GN1MJ\\PROSQLADMIN2`。\n\n##### 实现分发服务器\n\n在为第 16 章的数据库配置事务复制之前，我们将先把我们的实例配置为分发服务器。这可以通过`配置分发向导`实现，可以通过右键单击`复制`并选择`配置分发`来调用该向导。向导的第一页是`分发服务器`页面，如图\
  \ 16-4 所示。在此页面上，我们可以选择使用当前实例作为分发服务器，或指定一个不同的实例。\n\n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig4_HTML.jpg](img/333037_2_En_16_Fig4_HTML.jpg)\n\
  \n*图 16-4 分发服务器页面*\n\n由于我们的实例当前未配置为自动启动`SQL Server 代理`服务，我们现在看到`SQL Server 代理启动`页面，它警告我们此情况。这是因为复制代理依赖`SQL\
  \ Server 代理`进行调度和运行。我们选择将`SQL Server 代理`配置为自动启动的选项，如图 16-5 所示。\n\n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig5_HTML.jpg](img/333037_2_En_16_Fig5_HTML.jpg)\n\
  \n*图 16-5 SQL Server 代理启动页面*\n\n在向导的`快照文件夹`页面上，我们选择`快照代理`用于存储初始同步数据的位置。这可以是本地文件夹或网络共享，但如果指定本地文件夹，则不支持拉取订阅，因为订阅服务器无法访问它。在我们的案例中，我们使用网络共享。`快照文件夹`页面如图\
  \ 16-6 所示。\n\n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig6_HTML.jpg](img/333037_2_En_16_Fig6_HTML.jpg)\n\
  \n*图 16-6 快照文件夹页面*\n\n接下来，在向导的`分发数据库`页面上，我们必须为分发数据库指定一个名称，并提供两个文件夹位置，用于存储数据和日志文件。如图\
  \ 16-7 所示。\n\n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig7_HTML.jpg](img/333037_2_En_16_Fig7_HTML.jpg)\n\
  \n*图 16-7 分发数据库页面*\n\n在向导的`发布服务器`页面上，如图 16-8 所示，我们指定将用作该分发服务器的发布服务器的实例。当前实例将被自动添加，但可以取消选中。页面右下角的`添加`按钮可用于添加其他\
  \ SQL Server 实例或 Oracle 数据库。\n\n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig8_HTML.jpg](img/333037_2_En_16_Fig8_HTML.jpg)\n\
  \n*图 16-8 发布服务器页面*\n\n最后，我们可以选择配置分发服务器、编写配置脚本，或两者都做。在本例中，我们将立即配置分发服务器。\n\n\n###\
  \ 实施发布\n\n现在分发服务器已经配置完毕，我们将为 Chapter16 数据库设置一个**发布**。要开始配置事务复制，我们首先在对象资源管理器中的**复制\
  \ ➤ 本地发布**上点击右键，选择**新建发布**。这将调用**新建发布向导**。通过欢迎屏幕后，我们会看到**发布数据库**页面，如图 16-9 所示。在这里，我们选择包含希望作为发布中文章使用的对象的数据库。一个发布中的所有文章必须位于同一个数据库中，因此在此屏幕我们只能选择一个数据库。若要复制来自多个数据库的文章，我们必须创建多个发布。\n\
  \n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig9_HTML.jpg](img/333037_2_En_16_Fig9_HTML.jpg)\n\
  \n图 16-9 发布数据库页面\n\n在**发布类型**页面，如图 16-10 所示，我们选择希望该发布使用的复制类型——在本例中，我们选择事务复制。\n\n\
  ![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig10_HTML.jpg](img/333037_2_En_16_Fig10_HTML.jpg)\n\
  \n图 16-10 发布类型页面\n\n在向导的**文章**页面，如图 16-11 所示，我们选择希望包含在发布中的对象。所有你希望发布的表都必须具有主键，否则你将无法选择它们。在表内部，如果需要，你还可以选择复制单个列。\n\
  \n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig11_HTML.jpg](img/333037_2_En_16_Fig11_HTML.jpg)\n\
  \n图 16-11 文章页面\n\n**文章属性**按钮允许我们通过**文章属性**对话框（如图 16-12 所示）来更改选定文章或所有文章的属性。除非有特殊理由，否则你通常应将大多数属性保留为默认值。然而，你应该特别注意一些属性。\n\
  \n你使用**名称如果已使用则执行操作**属性来确定如果订阅者数据库中已存在同名表时的行为。可能的选项如下：\n\n*   保持现有对象不变。\n*   删除现有对象并创建新对象。\n\
  *   删除数据。如果文章有行筛选器，则仅删除匹配筛选器的数据。\n*   截断现有对象中的所有数据。\n\n**复制权限**属性决定是否将对象级权限复制到订阅者。这很重要，因为根据你使用环境的方式，你可能希望或不希望权限配置得与发布者相同。\n\
  \n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig12_HTML.jpg](img/333037_2_En_16_Fig12_HTML.jpg)\n\
  \n图 16-12 文章属性对话框\n\n在向导的**筛选表行**页面，如图 16-13 所示，我们可以使用**添加**、**编辑**和**删除**按钮来管理筛选器。筛选器本质上是为文章添加一个`WHERE`子句，从而限制复制的行数。你会发现这对于在多个订阅者之间划分数据特别有用。\n\
  \n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig13_HTML.jpg](img/333037_2_En_16_Fig13_HTML.jpg)\n\
  \n图 16-13 筛选表行页面\n\n图 16-14 展示了**添加筛选器**对话框。在我们的例子中，我们创建了一个筛选器，以便只复制`ID > 500`的客户。在生产场景中，你可以通过基于区域、账户状态等方式进行筛选来运用此功能。\n\
  \n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig14_HTML.jpg](img/333037_2_En_16_Fig14_HTML.jpg)\n\
  \n图 16-14 添加筛选器对话框\n\n在**快照代理**页面，如图 16-15 所示，你可以配置初始快照立即创建（如此处所示），或者你可以安排快照代理在特定时间运行。\n\
  \n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig15_HTML.jpg](img/333037_2_En_16_Fig15_HTML.jpg)\n\
  \n图 16-15 快照代理页面\n\n在**代理安全性**页面，如图 16-16 所示，系统会邀请你配置用于运行每个复制代理的账户。至少，运行快照代理的账户应具有以下权限：\n\
  \n*   是分发数据库中`db_owner`数据库角色的成员\n*   对包含快照的共享文件夹具有读取、写入和修改权限\n\n运行日志读取器代理的账户至少必须具有以下权限：\n\
  \n*   是分发数据库中`db_owner`数据库角色的成员\n\n当你创建订阅时，需要选择`sync_type`。此配置选择会通过以下方式影响日志读取器账户所需的权限：\n\
  \n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig16_HTML.jpg](img/333037_2_En_16_Fig16_HTML.jpg)\n\
  \n图 16-16 代理安全性页面\n\n*   **Automatic**：无需额外权限\n*   **其他任何选项**：在分发服务器上具有`sysadmin`权限\n\
  \n点击快照代理的**安全设置**按钮会显示**快照代理安全性**对话框，如图 16-17 所示。在此对话框中，你可以选择在服务器代理服务账户的上下文中运行快照代理，也可以指定要使用的其他\
  \ Windows 账户。为了遵循最小权限原则，你应使用一个单独的账户。你还可以指定用于连接到发布者实例的不同账户。但在我们的例子中，我们指定使用同一账户进行所有连接。\n\
  \n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig17_HTML.jpg](img/333037_2_En_16_Fig17_HTML.jpg)\n\
  \n图 16-17 快照代理安全性对话框\n\n回到**代理安全性**页面，你可以选择指定运行日志读取器代理账户的详细信息，或者克隆你已为运行快照代理账户输入的信息。\n\
  \n在**向导操作**页面，你可以选择生成发布（如此处所示）、生成发布的脚本，或者两者都做。我们将立即创建发布。最后，在**完成**页面，为发布指定一个名称。我们将我们的发布命名为**Chapter16**。\n\
  \n\n\n##### 实现订阅者\n\n现在 `PROSQLADMIN` 实例已配置为分发者和发布者，并且我们的发布已经创建，我们需要将 `PROSQLADMIN2`\
  \ 实例配置为订阅者。我们可以从发布者或订阅者端执行此任务。从订阅者端，我们通过连接到 `PROSQLADMIN2` 实例，然后在**本地订阅**的上下文菜单中导航至复制并选择**新建订阅**来执行此任务。这将调用**新建订阅向导**。通过此向导的**欢迎**页后，您将看到**发布**页面，如图\
  \ 16-18 所示。在此页面上，您使用**发布者**下拉框连接到配置为发布者的实例，然后从屏幕的**数据库和发布**区域中选择相应的发布。\n\n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig18_HTML.jpg](img/333037_2_En_16_Fig18_HTML.jpg)\n\
  *图 16-18: 发布页面*\n\n在**分发代理位置**页面上，您可以选择是使用推送订阅还是拉取订阅。此处的选择取决于您的拓扑结构。如果您有许多订阅者，那么您可能会选择实现远程分发者。如果是这种情况，那么您很可能会使用推送订阅，以便让配置为分发者的服务器承担代理运行的影响。然而，如果您有许多订阅者并且使用的是本地分发者，那么您很可能会使用拉取订阅，以便在订阅者之间分摊代理的成本。在我们的情况中，我们有一个本地分发者，但我们也只有一个订阅者，因此从性能角度来看，选择处理工作负载能力最强的服务器是显而易见的。然而，在部署分发代理时，我们也必须考虑安全性；我们将在本节后面讨论这一点。在此演示中，我们使用推送订阅。**分发代理位置**页面如图\
  \ 16-19 所示。\n\n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig19_HTML.jpg](img/333037_2_En_16_Fig19_HTML.jpg)\n\
  *图 16-19: 分发代理位置页面*\n\n在**订阅者**页面上，我们可以从下拉列表中选择订阅数据库的名称。但是，由于我们的订阅数据库尚不存在，因此我们选择**新建数据库**，如图\
  \ 16-20 所示，这将调用**新建数据库**对话框。\n\n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig20_HTML.jpg](img/333037_2_En_16_Fig20_HTML.jpg)\n\
  *图 16-20: 订阅者页面*\n\n在**新建数据库**对话框的**常规**页面上，如图 16-21 所示，您需要根据其计划用途为订阅数据库输入适当的设置。如果需要，您可以在**选项**页面上配置许多数据库属性。\n\
  \n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig21_HTML.jpg](img/333037_2_En_16_Fig21_HTML.jpg)\n\
  *图 16-21: 常规页面*\n\n在**分发代理安全性**页面上，如图 16-22 所示，点击省略号以调用**分发代理安全性**对话框。\n\n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig22_HTML.jpg](img/333037_2_En_16_Fig22_HTML.jpg)\n\
  *图 16-22: 分发代理安全性页面*\n\n在**分发代理安全性**对话框中，如图 16-23 所示，指定运行**分发代理**的帐户的详细信息。当您使用推送订阅时，运行**分发代理**的帐户至少应具有以下权限：\n\
  \n*   是分发数据库上 `db_owner` 角色的成员\n*   是发布访问列表的成员（我们将在本章后面讨论配置发布访问。）\n*   对快照所在的共享具有读取权限\n\
  \n用于连接到订阅者的帐户必须具有以下权限：\n\n*   是订阅数据库中 `db_owner` 角色的成员\n*   在订阅者上具有查看服务器状态的权限（仅当您计划使用多个订阅流时才适用。）\n\
  \n当您使用拉取订阅时，运行分发代理的帐户至少需要以下权限：\n\n*   是订阅数据库上 `db_owner` 角色的成员\n*   是发布访问列表的成员（我们将在本章后面讨论配置发布访问。）\n\
  *   对快照所在的共享具有读取权限\n*   在订阅者上具有查看服务器状态的权限（仅当您计划使用多个订阅流时才适用。）\n\n在对话框的第一部分，您可以选择是模拟\
  \ `SQL Server` 服务帐户还是指定一个不同的帐户来运行代理。为了遵循最小权限原则，您应该使用一个不同的帐户。在对话框的第二部分，您指定**分发代理**如何连接到分发者。如果您使用推送订阅，则代理必须使用运行**分发代理**的帐户。在对话框的第三部分，您指定**分发代理**如何连接到订阅者。如果您使用拉取订阅，则必须使用运行**分发代理**的相同帐户。\n\
  \n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig23_HTML.jpg](img/333037_2_En_16_Fig23_HTML.jpg)\n\
  *图 16-23: 分发代理安全性对话框*\n\n在**同步计划**页面上，您可以定义**分发代理**运行的计划。您可以选择连续运行代理、仅按需运行代理，或者定义一个新的服务器代理计划来运行**分发代理**，如图\
  \ 16-24 所示。我们选择连续运行代理。\n\n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig24_HTML.jpg](img/333037_2_En_16_Fig24_HTML.jpg)\n\
  *图 16-24: 同步计划页面*\n\n在**初始化订阅**页面上，如图 16-25 所示，您可以选择是立即初始化订阅，还是等待第一次同步，然后从那时的快照进行初始化。在此演示中，我们立即初始化订阅。如果您选中**内存优化**复选框，则表将被复制到订阅者上的内存优化表中。要选择此选项，您必须已创建内存优化文件组。还必须将文章的**启用内存优化**属性配置为\
  \ True。\n\n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig25_HTML.jpg](img/333037_2_En_16_Fig25_HTML.jpg)\n\
  *图 16-25: 初始化订阅页面*\n\n在**向导操作**页面上，您需要选择是立即创建订阅还是对过程进行脚本编写。我们选择立即创建订阅。最后，在**完成向导**页面上，您将看到向导执行的操作的摘要。\n\
  \n\n\n##### 修改 PAL\n\n`PAL`（发布访问列表）用于控制对发布访问的安全性。当代理连接到发布时，系统会将其凭据与 `PAL` 进行比较，以确保它们拥有正确的权限。`PAL`\
  \ 的优点在于，它将安全性从发布数据库中抽象出来，并防止客户端应用程序需要直接修改它。\n\n要在 `SSMS` 中查看 `Chapter16` 发布的 `PAL`\
  \ 并添加一个名为 `ReplicationAdmin` 的登录名，您需要依次展开 复制 ➤ 本地发布者，并在 `Chapter16` 发布的右键上下文菜单中选择\
  \ 属性。这将调用 属性 对话框，您应导航到 发布访问列表 页面，如图 16-26 所示。\n\n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig26_HTML.jpg](img/333037_2_En_16_Fig26_HTML.jpg)\n\
  *图 16-26：发布访问列表页面*\n\n现在，您可以使用 添加 按钮来显示当前没有访问该发布权限的登录名列表。您应从列表中选择适当的登录名将其添加到 `PAL`\
  \ 中，如图 16-27 所示。\n\n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig27_HTML.jpg](img/333037_2_En_16_Fig27_HTML.jpg)\n\
  *图 16-27：添加发布访问*\n\n### 添加 AlwaysOn 可读辅助副本\n\n为了实现横向扩展的报表功能，在 `AlwaysOn 可用性组` 拓扑中添加可读辅助副本会非常有用。当您使用此策略时，数据库通过日志流保持同步，其延迟是可变的，但通常较低。可读辅助副本的额外优势在于，即使主副本脱机，它们也能保持在线。可读辅助副本可以添加到为\
  \ `HA` 和/或 `DR` 配置的现有 `可用性组` 中。或者，如果数据库没有 `HA` 或 `DR` 要求，但读取扩展是有利的，则可以专门创建一个 `可用性组`\
  \ 用于读取扩展。\n\n#### 优势与注意事项\n\n除了纯粹的横向扩展之外，可读辅助副本还提供其他优势，例如临时统计信息，您也可以使用它来优化只读工作负载。此外，即使明确请求了其他隔离级别或锁定提示，在可读辅助副本上也**专门**使用快照隔离。这有助于避免争用，但也意味着\
  \ `TempDB` 应进行适当扩展并放置在快速磁盘阵列上。\n\n使用可读辅助副本的主要风险是，在辅助副本上实现快照隔离实际上可能导致主副本上的已删除记录无法被清理。这是因为幽灵记录清理任务仅在不再需要辅助副本上的行后，才会从主副本中移除它们。在这种情况下，主副本上的日志截断也会被延迟。这意味着您可能不得不终止正在针对可读辅助副本执行的长时间运行的查询。如果辅助副本与主副本断开连接，此问题也可能发生。因此，存在您可能需要将辅助副本从\
  \ `可用性组` 中移除并随后重新添加的风险。\n\n#### 实现可读辅助副本\n\n在本节中，我们将使用在章节 14 中也使用过的 `PROSQLADMIN-C`\
  \ 集群。然而，这次在站点 1 中为集群添加了一个额外的节点。该服务器名为 `CLUSTERNODE4`，并承载了一个名为 `READABLE` 的实例。此实例已在服务上启用了\
  \ `AlwaysOn 可用性组`。\n\n#### 提示\n\n在本节中，我们将涉及 `可用性组` 的通用配置，但更多详细信息可在章节 14 中找到，因为此处的主要重点将是配置一个可读辅助副本。\n\
  \n在我们创建 `可用性组` 之前，我们将首先使用清单 16-6 中的脚本创建一个名为 `Chapter16ReadScale` 的数据库。\n\n```sql\n\
  CREATE DATABASE Chapter16ReadScale ;\nGO\nUSE Chapter16ReadScale\nGO\nCREATE TABLE\
  \ Customers\n(\nID                  INT            PRIMARY KEY        IDENTITY,\n\
  FirstName           NVARCHAR(30),\nLastName            NVARCHAR(30),\nCreditCardNumber\
  \    VARBINARY(8000)\n) ;\nGO\n--Populate the table\nDECLARE @Numbers TABLE\n(\n\
  Number        INT\n)\n;WITH CTE(Number)\nAS\n(\nSELECT 1 Number\nUNION ALL\nSELECT\
  \ Number + 1\nFROM CTE\nWHERE Number < 100\n)\nINSERT INTO @Numbers\nSELECT Number\
  \ FROM CTE ;\nDECLARE @Names TABLE\n(\nFirstName       VARCHAR(30),\nLastName  \
  \      VARCHAR(30)\n) ;\nINSERT INTO @Names\nVALUES('Peter', 'Carter'),\n('Michael',\
  \ 'Smith'),\n('Danielle', 'Mead'),\n('Reuben', 'Roberts'),\n('Iris', 'Jones'),\n\
  ('Sylvia', 'Davies'),\n('Finola', 'Wright'),\n('Edward', 'James'),\n('Marie', 'Andrews'),\n\
  ('Jennifer', 'Abraham'),\n('Margaret', 'Jones') ;\nINSERT INTO Customers(Firstname,\
  \ LastName, CreditCardNumber)\nSELECT  FirstName, LastName, CreditCardNumber FROM\n\
  (SELECT\n(SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName\n,(SELECT\
  \ TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName\n,(SELECT CONVERT(VARBINARY(8000)\n\
  ,(SELECT TOP 1 CAST(Number * 100 AS CHAR(4))\nFROM @Numbers\nWHERE Number BETWEEN\
  \ 10 AND 99\nORDER BY NEWID()) + '-' +\n(SELECT TOP 1 CAST(Number * 100 AS CHAR(4))\n\
  FROM @Numbers\nWHERE Number BETWEEN 10 AND 99\nORDER BY NEWID()) + '-' +\n(SELECT\
  \ TOP 1 CAST(Number * 100 AS CHAR(4))\nFROM @Numbers\nWHERE Number BETWEEN 10 AND\
  \ 99\nORDER BY NEWID()) + '-' +\n(SELECT TOP 1 CAST(Number * 100 AS CHAR(4))\nFROM\
  \ @Numbers\nWHERE Number BETWEEN 10 AND 99\nORDER BY NEWID()))) CreditCardNumber\n\
  FROM @Numbers a\nCROSS JOIN @Numbers b\n) d\n```\n*清单 16-6：创建 `Chapter16ReadScale`\
  \ 数据库*\n\n接下来，我们将使用 `可用性组` 向导创建一个 `可用性组`。在向导的第一页（图 16-28）中，我们将为新的 `可用性组` 提供一个名称。在我们的例子中，我们将其命名为\
  \ `Chapter16`。我们还将集群类型指定为 `Windows 故障转移集群`。\n\n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig28_HTML.jpg](img/333037_2_En_16_Fig28_HTML.jpg)\n\
  *图 16-28：指定可用性组选项页面*\n\n在向导的 选择数据库 页面，如图 16-29 所示，我们将选择要添加到 `可用性组` 的数据库。\n\n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig29_HTML.jpg](img/333037_2_En_16_Fig29_HTML.jpg)\n\
  *图 16-29：选择数据库页面*\n\n指定副本 页面的 副本 选项卡如图 16-30 所示。在这里，我们已将 `CLUSTERNODE1`、`CLUSTERNODE2`\
  \ 和 `CLUSTERNODE3` 分别添加为初始主副本、`HA` 副本和 `DR` 副本。但是，您会注意到我们还添加了 `CLUSTERNODE4` 作为异步副本，并将其标记为可读辅助副本。\n\
  \n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig30_HTML.jpg](img/333037_2_En_16_Fig30_HTML.jpg)\n\
  *图 16-30：指定副本页面—副本选项卡*\n\n在 图 16-31 所示的 端点 选项卡上，您会看到 `CLUSTERNODE1`、`CLUSTERNODE2`\
  \ 和 `CLUSTERNODE3` 的端点显示为灰色。这是因为每个实例只能有一个数据库镜像端点，并且由于我们在章节 14 中的工作，这些实例上的端点已经存在。\n\
  \n\n\n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig31_HTML.jpg](img/333037_2_En_16_Fig31_HTML.jpg)\n\
  图 16-31 指定副本页面 — 端点选项卡\n\n在“备份首选项”选项卡（如图 16-32 所示）上，我们配置了副本，以便在辅助副本不可用时，备份仅在主副本上进行。我们排除了位于\
  \ `CLUSTERNODE2` 上的同步副本，并为我们的可读辅助副本设置了更高的优先级。这意味着，如果可读辅助副本可用，备份将在此进行。如果不可用，备份将在灾难恢复副本上进行。只有当前两者均不可用时，才会在主副本上执行备份。备份永远不会在高可用性同步副本上进行。\n\
  \n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig32_HTML.jpg](img/333037_2_En_16_Fig32_HTML.jpg)\n\
  图 16-32 指定副本页面 — 备份首选项选项卡\n\n在“侦听器”选项卡（如图 16-33 所示）上，我们为侦听器指定了名称和端口。我们还添加了两个 IP\
  \ 地址，每个侦听器跨越的子网一个。\n\n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig33_HTML.jpg](img/333037_2_En_16_Fig33_HTML.jpg)\n\
  图 16-33 指定副本页面 — 侦听器选项卡\n\n“只读路由”选项卡是从可读辅助副本的角度看变得有趣的地方。每个可读辅助副本都必须分配一个只读路由 URL。这是只读请求将被发送到的路径，由协议（TCP）后跟托管可读辅助副本的服务器的完全限定地址（包括端口号）组成。\n\
  \n指定此只读 URL 后，我们就可以添加只读路由列表。这指定了只读请求将被路由到的副本。路由列表仅适用于在可用性组内具有主角色的节点。因此，可以为每个节点提供不同的路由列表。当您在不同站点有多个可读辅助副本时，这非常有用。例如，如果我们在站点\
  \ 2 有第二个可读辅助副本，那么我们可以配置位于 `CLUSTERNODE3` 上的副本，以便在其持有主角色时将只读请求路由到该可读辅助副本。\n\n如果存在多个可读辅助副本，您还可以在每个路由列表中指定多个可读辅助副本。只读请求将被路由到列表中的第一台服务器。但是，如果该服务器不可用，则请求将被路由到列表中的第二台服务器，依此类推。如果您希望使用此功能，则服务器之间应用逗号分隔。\n\
  \n从 SQL Server 2016 开始，还可以对只读请求进行负载平衡。在这种情况下，请求将在每个负载平衡服务器之间交替路由。如果您希望使用此功能，则应将构成负载平衡组一部分的服务器用括号括起来。例如，假设我们的配置中有六个群集节点。`CLUSTERNODE1`\
  \ 具有主角色。`CLUSTERNODE2` 是同步高可用性服务器，`CLUSTERNODE3` 是灾难恢复服务器，而 `CLUSTERNODE4`、`CLUSTERNODE5`\
  \ 和 `CLUSTERNODE6` 都是可读辅助副本。清单 16-7 中的只读路由列表将在 `CLUSTERNODE4` 和 `CLUSTERNODE5` 之间交替只读请求。如果这两台服务器都不可用，则只读请求将被路由到\
  \ `CLUSTERNODE6`。\n\n```\n(CLUSTERNODE4\\READABLE, CLUSTERNODE5\\READABLE2), CLUSTERNODE6\\\
  READABLE3\n清单 16-7\n复杂的只读路由列表\n```\n\n然而，在我们的场景中，我们只有一个可读辅助副本，因此我们可以使用“添加”按钮（如图\
  \ 16-34 所示）将该副本添加到每个节点。\n\n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig34_HTML.jpg](img/333037_2_En_16_Fig34_HTML.jpg)\n\
  图 16-34 指定副本页面 — 只读路由选项卡\n\n我们现在可以使用向导的“选择初始数据同步”页面（如图 16-35 所示）来指定我们希望如何同步可用性组。\n\
  \n![../images/333037_2_En_16_Chapter/333037_2_En_16_Fig35_HTML.jpg](img/333037_2_En_16_Fig35_HTML.jpg)\n\
  图 16-35 选择初始数据同步页面\n\n在向导运行验证测试后，您现在可以创建并同步可用性组。\n\n### 总结\n\n数据库快照使用写时复制技术创建数据库的时间点副本。快照必须与源数据库存在于同一实例上，因此虽然不能使用它们在服务器之间分配负载，但可以使用它们来减少读写操作之间的争用。\n\
  \n快照可用于恢复因人为错误而丢失的数据，也可用于报告目的。您可以将数据复制回源数据库，或者从快照还原源数据库，只要它是与源数据库链接的唯一快照。但是，快照不能提供针对故障或损坏的保护，也不是备份的合适替代方案。\n\
  \n复制是 SQL Server 提供的一套技术，允许您在系统之间分发数据。为了扩展工作负载，事务复制是最合适的选择。事务复制可以通过配置分发服务器（它将保存复制元数据，并可能减轻同步负担）、发布服务器（托管要同步的数据）和订阅服务器（同步的目标）来实现。复制是一项复杂的技术，作为\
  \ DBA，您应该了解如何使用 `T-SQL` 以及 GUI 来实现它，因为您会遇到需要拆除和重建复制的情况。复制还公开了 `RMO`（复制管理对象）API，这是一个用于\
  \ .NET 的复制编程接口。\n\n您可以在 AlwaysOn 可用性组拓扑中配置可读辅助副本；这些副本允许横向扩展只读工作负载。即使主副本脱机，可读辅助副本也保持联机。这里需要注意的是，连接必须直接建立到实例。\n\
  \n为了实现可读辅助副本，您必须配置只读路由。这包括为辅助副本提供一个用于只读报告的 URL，然后更新主副本上的只读路由列表。使用此策略进行横向扩展报告的风险在于，辅助副本上的长时间运行事务或辅助副本断开连接可能导致日志截断延迟以及延迟清理\
  \ ghost 记录。\n\n# 第四部分 性能与维护\n\n## 17. SQL Server 元数据\n\n元数据是描述其他数据的数据。SQL Server\
  \ 公开大量的元数据，包括描述每个对象的结构元数据和描述数据本身的描述性元数据。元数据通过一系列\n\n*   目录视图\n*   信息架构视图\n*   动态管理视图和函数\n\
  *   系统函数\n*   系统存储过程\n\n公开。在本章中，我们将讨论如何使用元数据在实例级别执行操作，例如公开注册表值，研究元数据如何协助容量规划，并讨论如何将元数据用于故障排除和性能调优。最后，我们将了解如何使用元数据驱动自动化维护。\n\
  \n#### 提示\n元数据是一个高级主题，值得单独写一本书。因此，我鼓励您探索本章可能未涉及的其他元数据对象。\n\n\n### 介绍元数据对象\n\n目录视图位于\
  \ `sys` 架构中。目录视图有很多，其中一些最有用的视图，例如 `sys.master_files`，将在本章探讨。清单 17-1 展示了如何使用目录视图生成处于\
  \ `FULL` 恢复模式的数据库列表的示例。\n\n```sql\nSELECT name\nFROM sys.databases\nWHERE recovery_model_desc\
  \ = 'FULL' ;\n```\n*清单 17-1 使用目录视图*\n\n信息模式视图位于 `INFORMATION_SCHEMA` 架构中。它们返回的细节不如目录视图多，但基于\
  \ ISO 标准。这意味着你可以在不同的关系数据库管理系统之间移植你的查询。清单 17-2 展示了使用信息模式视图生成已被授予对 `Chapter10.dbo.SensitiveData`\
  \ 表 `SELECT` 访问权限的主体列表的示例。\n\n```sql\nUSE Chapter10\nGO\nSELECT GRANTEE, PRIVILEGE_TYPE\n\
  FROM INFORMATION_SCHEMA.TABLE_PRIVILEGES\nWHERE TABLE_SCHEMA = 'dbo'\nAND TABLE_NAME\
  \ = 'SensitiveData'\nAND PRIVILEGE_TYPE = 'SELECT' ;\n```\n*清单 17-2 使用信息模式视图*\n\n\
  SQL Server 中提供了许多动态管理视图和函数。它们统称为 DMV，提供了有关实例当前状态的信息，可用于故障排除和性能调优。SQL Server 2019\
  \ 中公开了以下类别的 DMV：\n\n*   AlwaysOn 可用性组\n*   变更数据捕获\n*   变更跟踪\n*   公共语言运行时 (CLR)\n\
  *   数据库镜像\n*   数据库\n*   执行\n*   扩展事件\n*   FILESTREAM 和 FileTable\n*   全文搜索和语义搜索\n\
  *   地理复制\n*   索引\n*   I/O\n*   内存优化表\n*   对象\n*   查询通知\n*   复制\n*   资源调控器\n*   安全性\n\
  *   服务器\n*   服务代理\n*   空间\n*   SQL 数据仓库和 PDW\n*   SQL Server 操作系统\n*   延伸数据库\n*\
  \   事务\n\n我们将在本章多处演示和讨论如何使用 DMV。DMV 总是以 `dm_` 前缀开头，后接两到四个描述对象类别的字符——例如，`os_` 代表操作系统，`db_`\
  \ 代表数据库，`exec_` 代表执行。其后是对象的名称。在清单 17-3 中，你可以看到两点：一个是如何使用动态管理视图查找当前连接到 `Chapter16`\
  \ 数据库的登录名列表的示例；另一个是你可以使用一个动态管理函数来生成与 `Chapter16.dbo.Customers` 表相关的数据所存储页面的详细信息。\n\
  \n```sql\nUSE Chapter16 –如果你遵循了本书第 16 章的示例，此数据库将存在\nGO\n--查找连接到 Chapter16 数据库的登录名\n\
  SELECT login_name\nFROM sys.dm_exec_sessions\nWHERE database_id = DB_ID('Chapter16')\
  \ ;\n--返回存储 Chapter16.dbo.Customers 表的数据页的详细信息\nSELECT *\nFROM sys.dm_db_database_page_allocations(DB_ID('Chapter16'),\n\
  OBJECT_ID('dbo.Customers'),\nNULL,\nNULL,\n'DETAILED') ;\n```\n*清单 17-3 使用动态管理视图和函数*\n\
  \nSQL Server 还提供了许多与元数据相关的系统函数，例如我们在清单 17-3 中使用的 `DB_ID()` 和 `OBJECT_ID()`。另一个与元数据相关的系统函数例子是\
  \ `DATALENGTH`，我们在清单 17-4 中使用它来返回 `Chapter16.dbo.Customers` 表 `LastName` 列中每个值的长度。\n\
  \n```sql\nUSE Chapter16\nGO\nSELECT DATALENGTH(LastName)\nFROM dbo.Customers ;\n\
  ```\n*清单 17-4 使用系统函数*\n\n### 服务器级和实例级元数据\n\n服务器和实例有多种形式的元数据可用。服务器级元数据对于需要查找配置信息或在无法访问底层操作系统时进行故障排除的数据库管理员非常有用。例如，`dm_server`\
  \ 类别的 DMV 提供了允许你检查服务器审核状态、查看 SQL Server 的注册表项、查找内存转储文件的位置以及查找实例服务详细信息的视图。在以下部分中，我们将讨论如何查看与实例关联的注册表项、公开\
  \ SQL Server 服务的详细信息以及查看缓冲区缓存的内容。\n\n#### 公开注册表值\n\n`sys.dm_server_registry` DMV\
  \ 公开了与实例相关的关键注册表项。该视图返回三列，如表 17-1 所述。\n\n*表 17-1 sys.dm_server_registry 列*\n\n|\
  \ 列 | 描述 |\n| --- | --- |\n| `Registry_key` | 注册表项的名称 |\n| `Value_name` | 项的值的名称\
  \ |\n| `Value_data` | 值中包含的数据 |\n\n你可以在 `sys.dm_server_registry` DMV 中找到的一个非常有用的信息是\
  \ SQL Server 当前正在侦听的端口号。清单 17-5 中的查询使用 `sys.dm_server_registry` DMV 返回实例正在侦听的端口，前提是实例配置为侦听所有\
  \ IP 地址。\n\n```sql\nSELECT *\nFROM (\nSELECT\nCASE\nWHEN value_name = 'tcpport'\
  \ AND value_data != ''\nTHEN value_data\nWHEN value_name = 'tcpport' AND value_data\
  \ = ''\nTHEN (\nSELECT value_data\nFROM sys.dm_server_registry\nWHERE registry_key\
  \ LIKE '%ipall'\nAND value_name = 'tcpdynamicports' )\nEND PortNumber\nFROM sys.dm_server_registry\n\
  WHERE registry_key LIKE '%IPAll' ) a\nWHERE a.PortNumber IS NOT NULL ;\n```\n*清单\
  \ 17-5 查找端口号*\n\n此 DMV 的另一个有用功能是能够返回 SQL Server 服务的启动参数。如果你想了解是否为实例配置了 `-E` 这样的开关，这将特别有用。`-E`\
  \ 开关增加了在轮询算法中分配给每个文件的区数量。清单 17-6 中的查询显示为实例配置的启动参数。\n\n```sql\nSELECT *\nFROM sys.dm_server_registry\n\
  WHERE value_name LIKE 'SQLArg%' ;\n```\n*清单 17-6 查找启动参数*\n\n#### 公开服务详细信息\n\n`dm_server`\
  \ 类别中另一个有用的 DMV 是 `sys.dm_server_services`，它公开了实例正在使用的服务的详细信息。表 17-2 描述了返回的列。\n\n\
  *表 17-2 sys.dm_server_services 列*\n\n| 列 | 描述 |\n| --- | --- |\n| `Servicename`\
  \ | 服务的名称。 |\n| `Startup_type` | 表示服务启动类型的整数。 |\n| `Startup_desc` | 服务启动类型的文本描述。\
  \ |\n| `Status` | 表示服务当前状态的整数。 |\n| `Status_desc` | 当前服务状态的文本描述。 |\n| `Process_id`\
  \ | 服务的进程 ID。 |\n| `Last_startup_time` | 服务上次启动的日期和时间。 |\n| `Service_account` |\
  \ 用于运行服务的帐户。 |\n| `Filename` | 服务的文件名，包括完整文件路径。 |\n| `Is_clustered` | `1` 表示服务是集群的；`0`\
  \ 表示它是独立的。 |\n| `Clusternodename` | 如果服务是集群的，此列指示服务正在其上运行的节点的名称。 |\n\n清单 17-7 中的查询返回每个服务的名称、其启动类型、当前状态以及运行该服务的服务帐户名称。\n\
  \n```sql\nSELECT servicename\n,startup_type_desc\n,status_desc\n,service_account\n\
  FROM sys.dm_server_services ;\n```\n*清单 17-7 公开服务详细信息*\n\n### 分析缓冲区缓存使用情况\n\n`dm_os`类别的\
  \ DMV 暴露了 41 个包含 SQLOS 当前状态信息的对象，尽管其中只有 31 个有文档记录。`dm_os`类别中一个特别有用的、暴露缓冲区缓存内容的 DMV\
  \ 是`sys.dm_os_buffer_descriptors`。查询此对象时，将返回表 17-3 中详述的列。\n\n**表 17-3** `sys.dm_os_buffer_descriptors`\
  \ 列\n\n| 列 | 说明 |\n| --- | --- |\n| `Database_id` | 页面所属数据库的 ID |\n| `File_id` |\
  \ 页面所属文件的 ID |\n| `Page_id` | 页面的 ID |\n| `Page_level` | 页面的索引级别 |\n| `Allocation_unit_id`\
  \ | 页面所属分配单元的 ID |\n| `Page_type` | 页面类型，例如 `DATA_PAGE`, `INDEX_PAGE`, `IAM_PAGE`\
  \ 或 `PFS_PAGE` |\n| `Row_count` | 存储在页面上的行数 |\n| `Free_space_in_bytes` | 页面上的可用空间量\
  \ |\n| `Is_modified` | 指示页面是否为脏页的标志 |\n| `Numa_node` | 缓冲区的 NUMA 节点 |\n| `Read_microset`\
  \ | 将页面读入缓存所花费的时间，以微秒为单位 |\n\n清单 17-8 中的脚本演示了如何使用`sys.dm_os_buffer_descriptors`\
  \ DMV 来确定实例上每个数据库使用缓冲区缓存的百分比。这可以在性能调优期间帮助你，也可为你提供在容量规划或整合规划时使用的宝贵见解。\n\n```sql\n\
  DECLARE @DB_PageTotals TABLE\n(\nCachedPages INT,\nDatabase_name NVARCHAR(128),\n\
  database_id INT\n) ;\nINSERT INTO @DB_PageTotals\nSELECT COUNT(*) CachedPages\n\
  ,CASE\nWHEN database_id = 32767\nTHEN 'ResourceDb'\nELSE DB_NAME(database_id)\n\
  END Database_name\n,database_id\nFROM sys.dm_os_buffer_descriptors a\nGROUP BY DB_NAME(database_id)\n\
  ,database_id ;\nDECLARE @Total FLOAT = (SELECT SUM(CachedPages) FROM @DB_PageTotals)\
  \ ;\nSELECT      Database_name,\nCachedPages,\nSUM(cachedpages) over(partition by\
  \ database_name)\n/ @total * 100 AS RunningPercentage\nFROM        @DB_PageTotals\
  \ a\nORDER BY    CachedPages DESC ;\n```\n**清单 17-8** 确定每个数据库的缓冲区缓存使用情况\n\n####\
  \ 注意\n本章的“用于故障排除和性能调整的元数据”部分将讨论`dm_os`类别中的更多 DMV。\n\n### 用于容量规划的元数据\n\n使用元数据最有用的方式之一是在你进行主动容量管理时。SQL\
  \ Server 暴露的元数据为你提供了关于数据库文件当前大小和使用情况的信息，你可以利用这些信息提前规划并安排额外的容量，而无需等到企业监控软件开始发出严重警报。\n\
  \n#### 暴露文件统计信息\n\n`sys.dm_db_file_space_usage` DMV 返回在其上运行的数据库中每个数据文件的使用空间详细信息。此对象返回的列详见表\
  \ 17-4。\n\n**表 17-4** `sys.dm_db_file_space_usage` 列\n\n| 列 | 说明 |\n| --- | ---\
  \ |\n| `database_id` | 文件所属数据库的 ID。 |\n| `file_id` | 数据库内文件的 ID。这些 ID 在数据库间重复。例如，主文件的\
  \ ID 始终为`1`，第一个日志文件的 ID 始终为`2`。 |\n| `filegroup_id` | 文件所在文件组的 ID。 |\n| `total_page_count`\
  \ | 文件中的总页数。 |\n| `allocated_extent_page_count` | 文件中位于已分配区中的页数。 |\n| `unallocated_extent_page_count`\
  \ | 文件中位于未分配区中的页数。 |\n| `version_store_reserved_page_count` | 为支持使用快照隔离的事务而保留的页数。仅适用于\
  \ TempDB。 |\n| `user_object_reserved_page_count` | 为用户对象保留的页数。仅适用于 TempDB。 |\n|\
  \ `internal_object_reserved_page_count` | 为内部对象保留的页数。仅适用于 TempDB。 |\n| `mixed_extent_page_count`\
  \ | 其中页分配给不同对象的区的数量。 |\n\n`sys.dm_io_virtual_file_stats` DMV 返回数据库和日志文件的 IO 统计信息。这可以帮助你确定写入每个文件的数据量，并警告你高\
  \ IO 延迟。此对象接受`database_id`和`file_id`作为参数，并返回表 17-5 中详述的列。\n\n#### 提示\n*IO 延迟* 是\
  \ IO 子系统响应 SQL Server 所花费的时间。\n\n**表 17-5** `sys.dm_io_virtual_file_stats` 列\n\n\
  | 列 | 说明 |\n| --- | --- |\n| `database_id` | 文件所属数据库的 ID。 |\n| `file_id` | 数据库内文件的\
  \ ID。这些 ID 在数据库间重复。例如，主文件的 ID 始终为`1`，第一个日志文件的 ID 始终为`2`。 |\n| `sample_ms` | 自计算机启动以来的毫秒数。\
  \ |\n| `num_of_reads` | 对文件执行的读取总次数。 |\n| `num_of_bytes_read` | 从文件读取的总字节数。 |\n\
  | `io_stall_read_ms` | 等待对文件发出读取的总时间，以毫秒为单位。 |\n| `num_of_writes` | 对文件执行的写操作总次数。\
  \ |\n| `num_of_bytes_written` | 写入文件的总字节数。 |\n| `io_stall_write_ms` | 等待写入完成的总时间，以毫秒为单位。\
  \ |\n| `io_stall` | 等待文件的所有 IO 请求完成的总时间，以毫秒为单位。 |\n| `size_on_disk_bytes` | 文件在磁盘上使用的总空间，以字节为单位。\
  \ |\n| `file_handle` | Windows 文件句柄。 |\n| `io_stall_queued_read_ms` | 由资源调控器引起的对文件读取操作的总\
  \ IO 延迟。资源调控器将在第 24 章讨论。 |\n| `io_stall_queued_write_ms` | 由资源调控器引起的对文件写入操作的总 IO\
  \ 延迟。资源调控器将在第 24 章讨论。 |\n\n与本节讨论的前两个 DMV 不同，`sys.master_files`目录视图是一个系统范围的视图，这意味着它返回实例上每个数据库中每个文件的一条记录。此视图返回的列描述见表\
  \ 17-6。\n\n**表 17-6** `sys.master_files` 列\n\n\n| 列 | 描述 |\n| --- | --- |\n| `database_id`\
  \ | 文件所属数据库的 ID。 |\n| `file_id` | 文件在数据库内的 ID。这些 ID 在不同数据库间可能重复。例如，主数据文件的 ID 始终为`1`，第一个日志文件的\
  \ ID 始终为`2`。 |\n| `file_guid` | 文件的 GUID。 |\n| `type` | 表示文件类型的整数。 |\n| `type_desc`\
  \ | 文件类型的文本描述。 |\n| `data_space_id` | 文件所在文件组的 ID。 |\n| `name` | 文件的逻辑名称。 |\n| `physical_name`\
  \ | 文件的物理路径和名称。 |\n| `state` | 指示文件当前状态的整数。 |\n| `state_desc` | 文件当前状态的文本描述。 |\n\
  | `size` | 文件的当前大小，以页数计。 |\n| `max_size` | 文件的最大大小，以页数计。 |\n| `growth` | 文件的增长设置。`0`\
  \ 表示禁用自动增长。如果 `is_percent_growth` 为 `0`，则该值表示以页数为单位的增长增量。如果 `is_percent_growth`\
  \ 为 `1`，则该值表示整数百分比增量。 |\n| `is_media_read_only` | 指定文件所在的介质是否为只读。 |\n| `is_read_only`\
  \ | 指定文件是否位于只读文件组中。 |\n| `is_sparse` | 指定文件属于数据库快照。 |\n| `is_percent_growth` | 指示增长量是百分比还是固定速率。\
  \ |\n| `is_name_reserved` | 指定文件名是否可重用。 |\n| `create_lsn` | 创建文件时的 LSN（日志序列号）。 |\n\
  | `drop_lsn` | 删除文件时的 LSN（如果适用）。 |\n| `read_only_lsn` | 文件组最近被标记为只读时的 LSN。 |\n|\
  \ `read_write_lsn` | 文件组最近被标记为读/写时的 LSN。 |\n| `differential_base_lsn` | 文件中的更改开始在差异页中被标记的\
  \ LSN。 |\n| `differential_base_guid` | 文件所基于的完整备份的 GUID，该备份用于进行文件的差异备份。 |\n| `differential_base_time`\
  \ | 文件所基于的完整备份的时间，该备份用于进行文件的差异备份。 |\n| `redo_start_lsn` | 下一次前滚操作将开始的 LSN。 |\n|\
  \ `redo_start_fork_guid` | 恢复分支的 GUID。 |\n| `redo_target_lsn` | 文件可以停止在线前滚操作的 LSN。\
  \ |\n| `redo_target_fork_guid` | 恢复分支的 GUID。 |\n| `backup_lsn` | 最近一次执行完整或差异备份时的\
  \ LSN。 |\n\n#### 使用文件统计信息进行容量分析\n\n将上一节描述的三个元数据对象结合起来，你可以生成强大的报表，以帮助进行容量规划和诊断性能问题。例如，清单\
  \ 17-9 中的查询提供了数据库中每个文件的文件大小、剩余可用空间以及 IO 停顿时间。因为 `sys.dm_io_virtual_file_stats` 是一个函数而非视图，我们使用\
  \ `CROSS APPLY` 将函数应用于结果集，将每行的 `database_id` 和 `file_id` 作为参数传入。\n\n```sql\nSELECT\
  \ m.name\n,m.physical_name\n,CAST(fsu.total_page_count / 128\\. AS NUMERIC(12,4))\
  \ [文件大小 (MB)]\n,CAST(fsu.unallocated_extent_page_count / 128\\. AS NUMERIC(12,4))\
  \ [可用空间 (MB)]\n,vfs.io_stall_read_ms\n,vfs.io_stall_write_ms\nFROM sys.dm_db_file_space_usage\
  \ fsu\nCROSS APPLY sys.dm_io_virtual_file_stats(fsu.database_id, fsu.file_id) vfs\n\
  INNER JOIN sys.master_files m\nON fsu.database_id = m.database_id\nAND fsu.file_id\
  \ = m.file_id ;\n```\n清单 17-9: 文件容量详细信息\n\n清单 17-10 中的脚本演示了如何使用 `sys.master_files`\
  \ 来分析每个卷的磁盘容量，方法是详细列出每个文件的当前大小、文件下次增长时的增长量以及驱动器的当前可用容量。你可以使用 `xp_fixeddrives` 存储过程来获取驱动器上的可用空间。\n\
  \n```sql\nDECLARE @fixeddrives TABLE\n(\nDrive        CHAR(1),\nMBFree        BIGINT\n\
  ) ;\nINSERT INTO @fixeddrives\nEXEC xp_fixeddrives ;\nSELECT\nDrive\n,SUM([已使用文件空间\
  \ (MB)]) 总已使用空间\n, SUM([下次增长量 (MB)]) 总下次增长量\n, 卷上剩余空间\nFROM (\nSELECT Drive\n,size\
  \ * 1.0 / 128 [已使用文件空间 (MB)]\n,CASE\nWHEN is_percent_growth = 0\nTHEN growth * 1.0\
  \ / 128\nWHEN is_percent_growth = 1\nTHEN (size * 1.0 / 128 * growth / 100)\nEND\
  \ [下次增长量 (MB)]\n,f.MBFree 卷上剩余空间\nFROM sys.master_files m\nINNER JOIN @fixeddrives\
  \ f\nON LEFT(m.physical_name, 1) = f.Drive ) a\nGROUP BY Drive, 卷上剩余空间\nORDER BY\
  \ drive ;\n```\n清单 17-10: 使用 `xp_fixeddrives` 分析磁盘空间\n\n`xp_fixeddrives` 的问题在于它无法查看映射的网络驱动器。因此，作为替代方案，你可以使用清单\
  \ 17-11 中的脚本，该脚本使用 PowerShell 返回信息。\n\n#### 注意\n\n这种方法的缺点是它需要启用 `xp_cmdshell`，这违背了安全最佳实践。\n\
  \n```sql\nUSE [master];\nDECLARE @t TABLE\n(\nname varchar(150),\nminimum tinyint,\n\
  maximum tinyint ,\nconfig_value tinyint ,\nrun_value tinyint\n)\nDECLARE @psinfo\
  \ TABLE(data  NVARCHAR(100)) ;\nINSERT INTO @psinfo\nEXEC xp_cmdshell 'Powershell.exe\
  \ \"Get-WMIObject Win32_LogicalDisk -filter \"DriveType=3\"| Format-Table DeviceID,\
  \ FreeSpace, Size\"'  ;\nDELETE FROM @psinfo WHERE data IS NULL  OR data LIKE '%DeviceID%'\
  \ OR data LIKE '%----%';\nUPDATE @psinfo SET data = REPLACE(data,' ',',');\n;WITH\
  \ DriveSpace AS\n(\nSELECT LEFT(data,2)  as [驱动器],\nREPLACE((LEFT((SUBSTRING(data,(PATINDEX('%[0-9]%',data))\n\
  , LEN(data))),CHARINDEX(',',\n(SUBSTRING(data,(PATINDEX('%[0-9]%',data))\n, LEN(data))))-1)),',','')\
  \ AS 可用空间,\nREPLACE(RIGHT((SUBSTRING(data,(PATINDEX('%[0-9]%',data))\n, LEN(data))),PATINDEX('%,%',\n\
  (SUBSTRING(data,(PATINDEX('%[0-9]%',data)) , LEN(data))))) ,',','')\nAS [总大小]\n\
  FROM @psinfo\n)\nSELECT\nmf.Drive\n,CAST(sizeMB as numeric(18,2)) as [已使用文件空间 (MB)]\n\
  ,CAST(growth as numeric(18,2)) as [下次增长量 (MB)]\n,CAST((CAST(可用空间 as numeric(18,2))\n\
  /(POWER(1024., 3))) as numeric(6,2)) AS 可用空间 GB\n,CAST((CAST(总大小 as numeric(18,2))/(POWER(1024.,\
  \ 3))) as numeric(6,2)) AS 总大小 GB\n,CAST(CAST((CAST(可用空间 as numeric(18,2))/(POWER(1024.,\
  \ 3))) as numeric(6,2))\n/ CAST((CAST(总大小 as numeric(18,2))/(POWER(1024., 3))) as\
  \ numeric(6,2))\n* 100 AS numeric(5,2)) [剩余百分比]\nFROM DriveSpace\nJOIN\n(      \
  \  SELECT DISTINCT  LEFT(physical_name, 2) Drive, SUM(size / 128.0) sizeMB\n,SUM(CASE\n\
  WHEN is_percent_growth = 0\nTHEN growth / 128.\nWHEN is_percent_growth = 1\nTHEN\
  \ (size / 128\\. * growth / 100)\nEND) growth\nFROM master.sys.master_files\nWHERE\
  \ db_name(database_id) NOT IN('master','model','msdb')\nGROUP BY LEFT(physical_name,\
  \ 2)\n)                mf ON DriveSpace.Drive = mf.drive ;\n```\n清单 17-11: 使用 PowerShell\
  \ 分析磁盘空间\n\n### 用于故障排除和性能调优的元数据\n\n你可以使用许多元数据对象来调优 SQL Server 的性能和排除故障。在接下来的章节中，我们将探讨如何从\
  \ SQL Server 内部捕获性能计数器，如何分析等待，以及如何使用 DMV 来排除昂贵查询的问题。\n\n\n#### 检索性能监视器计数器\n\nPerfmon\
  \ 是一个 Windows 工具，用于捕获操作系统以及许多 SQL Server 特定的性能计数器。试图诊断性能问题的 DBA 会发现它非常有用。问题在于，许多\
  \ DBA 没有对底层操作系统的管理访问权限，这使得他们在故障排除过程中必须依赖 Windows 管理员。解决此问题的一个变通方法是使用 `sys.dm_os_performance_counters`\
  \ 这个 DMV，它可以在 SQL Server 内部公开 SQL Server 的性能监视器计数器。`sys.dm_os_performance_counters`\
  \ 返回的列在表 17-7 中描述。\n\n表 17-7\n`sys.dm_os_performance_counters` 的列\n\n| 列名 | 描述 |\n\
  | --- | --- |\n| `object_name` | 计数器的类别。 |\n| `counter_name` | 计数器的名称。 |\n| `instance_name`\
  \ | 计数器的实例。例如，与数据库相关的计数器为每个数据库有一个实例。 |\n| `cntr_value` | 计数器的值。 |\n| `cntr_type`\
  \ | 计数器的类型。计数器类型在表 17-8 中描述。 |\n\n`sys.dm_os_performance_counters` DMV 公开了不同类型的计数器，可以通过\
  \ `cntr_type` 列来识别，该列与底层 WMI 性能计数器类型相关。您需要以不同的方式处理不同的计数器类型。公开的计数器类型在表 17-8 中描述。\n\
  \n表 17-8\n计数器类型\n\n| 计数器类型 | 描述 |\n| --- | --- |\n| `1073939712` | 您将 `PERF_LARGE_RAW_BASE`\
  \ 作为基础值，与 `PERF_LARGE_RAW_FRACTION` 类型结合使用来计算计数器百分比，或与 `PERF_AVERAGE_BULK` 结合使用来计算平均值。\
  \ |\n| `537003264` | 使用 `PERF_LARGE_RAW_FRACTION` 作为分数值，与 `PERF_LARGE_RAW_BASE`\
  \ 结合使用来计算计数器百分比。 |\n| `1073874176` | `PERF_AVERAGE_BULK` 是一个累积平均值，您将其与 `PERF_LARGE_RAW_BASE`\
  \ 结合使用来计算计数器平均值。该计数器及其基础值需在时间段内采样两次以计算度量值。 |\n| `272696320` | `PERF_COUNTER_COUNTER`\
  \ 是一个 32 位累积速率计数器。该值应采样两次以计算时间段内的度量值。 |\n| `272696576` | `PERF_COUNTER_BULK_COUNT`\
  \ 是一个 64 位累积速率计数器。该值应采样两次以计算时间段内的度量值。 |\n| `65792` | `PERF_COUNTER_LARGE_RAWCOUNT`\
  \ 返回计数器的最后一个采样结果。 |\n\n清单 17-12 中的查询演示了如何使用 `sys.dm_os_performance_counters` 来捕获\
  \ `PERF_COUNTER_LARGE_RAWCOUNT` 类型的度量值，这是最简单的计数器捕获形式。该查询返回当前正在等待的内存授予数量。\n\n```\n\
  SELECT *\nFROM sys.dm_os_performance_counters\nWHERE counter_name = 'Memory Grants\
  \ Pending' ;\n清单 17-12\n使用计数器类型 65792\n```\n\n清单 17-13 中的脚本演示了如何在一分钟内捕获每秒发生的锁请求次数。锁请求/秒计数器使用\
  \ `PERF_COUNTER_BULK_COUNT` 计数器类型，但相同的方法也适用于捕获与内存中 OLTP 相关的计数器，后者使用 `PERF_COUNTER_COUNTER`\
  \ 计数器类型。\n\n```\nDECLARE @cntr_value1 BIGINT = (\nSELECT cntr_value\nFROM sys.dm_os_performance_counters\n\
  WHERE counter_name = 'Lock Requests/sec'\nAND instance_name = '_Total') ;\nWAITFOR\
  \ DELAY '00:01:00'\nDECLARE @cntr_value2 BIGINT = (\nSELECT cntr_value\nFROM sys.dm_os_performance_counters\n\
  WHERE counter_name = 'Lock Requests/sec'\nAND instance_name = '_Total') ;\nSELECT\
  \ (@cntr_value2 - @cntr_value1) / 60 'Lock Requests/sec' ;\n清单 17-13\n使用计数器类型 272696576\
  \ 和 272696320\n```\n\n清单 17-14 中的脚本演示了如何捕获实例的计划缓存命中率。计划缓存命中率计数器是计数器类型 537003264。因此，我们需要将该值乘以\
  \ 100，然后除以基础计数器来计算百分比。在运行脚本之前，您应该将实例名称更改为您自己的实例名称。\n\n```\nSELECT\n100 *\n(\nSELECT\
  \ cntr_value\nFROM sys.dm_os_performance_counters\nWHERE object_name = 'MSSQL$PROSQLADMIN:Plan\
  \ Cache'\nAND counter_name = 'Cache hit ratio'\nAND instance_name = '_Total')\n\
  /\n(\nSELECT cntr_value\nFROM sys.dm_os_performance_counters\nWHERE object_name\
  \ = 'MSSQL$PROSQLADMIN:Plan Cache'\nAND counter_name = 'Cache hit ratio base'\n\
  AND instance_name = '_Total') [Plan cache hit ratio %] ;\n清单 17-14\n使用计数器类型 537003264\n\
  ```\n\n清单 17-15 中的脚本演示了如何捕获平均闩锁等待时间（毫秒）计数器。由于此计数器是 `PERF_AVERAGE_BULK` 类型，我们需要捕获其值及其对应的基础计数器两次。然后，我们需要用该计数器的第二次捕获值减去第一次捕获值，用基础计数器的第二次捕获值减去第一次捕获值，然后将分数计数器值除以其基础值以计算时间段内的平均值。由于在时间段内可能没有请求任何闩锁，我们将\
  \ `SELECT` 语句包装在 `IF/ELSE` 块中，以避免可能出现除以零错误的情况。\n\n```\nDECLARE @cntr TABLE\n(\n\
  ID        INT        IDENTITY,\ncounter_name NVARCHAR(256),\ncounter_value BIGINT,\n\
  [Time] DATETIME\n) ;\nINSERT INTO @cntr\nSELECT\ncounter_name\n,cntr_value\n,GETDATE()\n\
  FROM sys.dm_os_performance_counters\nWHERE counter_name IN('Average Latch Wait Time\
  \ (ms)',\n'Average Latch Wait Time base') ;\n--添加一个人为延迟\nWAITFOR DELAY '00:01:00'\
  \ ;\nINSERT INTO @cntr\nSELECT\ncounter_name\n,cntr_value\n,GETDATE()\nFROM sys.dm_os_performance_counters\n\
  WHERE counter_name IN('Average Latch Wait Time (ms)',\n'Average Latch Wait Time\
  \ base') ;\nIF (SELECT COUNT(DISTINCT counter_value)\nFROM @cntr\nWHERE counter_name\
  \ = 'Average Latch Wait Time (ms)') > 2\nBEGIN\nSELECT\n(\n(\nSELECT TOP 1 counter_value\n\
  FROM @cntr\nWHERE counter_name = 'Average Latch Wait Time (ms)'\nORDER BY [Time]\
  \ DESC\n)\n-\n(\nSELECT TOP 1 counter_value\nFROM @cntr\nWHERE counter_name = 'Average\
  \ Latch Wait Time (ms)'\nORDER BY [Time] ASC\n)\n)\n/\n(\n(\nSELECT TOP 1 counter_value\n\
  FROM @cntr\nWHERE counter_name = 'Average Latch Wait Time base'\nORDER BY [Time]\
  \ DESC\n)\n-\n(\nSELECT TOP 1 counter_value\nFROM @cntr\nWHERE counter_name = 'Average\
  \ Latch Wait Time base'\nORDER BY [Time] ASC\n)\n) [Average Latch Wait Time (ms)]\
  \ ;\nEND\nELSE\nBEGIN\nSELECT 0 [Average Latch Wait Time (ms)] ;\nEND\n清单 17-15\n\
  使用计数器类型 1073874176\n```\n\n#### 分析等待\n\n等待是任何 RDBMS 的一个自然方面，但它们也可能表明存在性能瓶颈。所有等待类型的完整解释可以在\
  \ `https://msdn.microsoft.com` 找到，但所有等待类型可分为三类：资源等待、队列等待和外部等待。\n\n#### 注意\n\nSQL\
  \ Server 中的查询要么正在运行，要么在处理器上等待轮次（可运行），要么在等待其他资源（已暂停）。如果它在等待其他资源，SQL Server 会记录其等待的原因以及此等待的持续时间。\n\
  \n`资源`等待发生在线程需要访问某个对象，但该对象已被使用，因此线程必须等待时。这可能包括线程等待对对象加锁，或等待磁盘资源响应。`队列`等待发生在线程空闲并等待分配任务时。这不一定表示性能瓶颈，因为它通常是后台任务，如死锁监视器或惰性写入器，等待直到被需要。`外部`等待发生在线程等待外部资源时，例如链接服务器。这里隐藏的陷阱是，外部等待并不总是意味着线程真正在等待。它可能正在执行\
  \ SQL Server 外部的操作，例如运行外部代码的扩展存储过程。\n\n任何已发出的任务都处于三种状态之一：正在运行、可运行或已暂停。如果任务处于正在运行状态，则它正在处理器上执行。当任务处于可运行状态时，它位于处理器队列中，等待轮到其运行。这被称为\
  \ `信号等待`。当任务暂停时，意味着该任务因信号等待以外的任何原因而等待。换句话说，它正在经历资源等待、队列等待或外部等待。每个查询在执行过程中都可能在这三种状态之间交替。\n\
  \n`sys.dm_os_wait_stats` 返回自实例启动或动态管理视图 (DMV) 所暴露的统计信息被重置以来，每种等待类型的累计等待详细信息。你可以通过运行清单\
  \ 17-16 中的命令来重置统计信息。这一点很重要，因为它提供了关于瓶颈来源的整体视图。\n\n```\nDBCC SQLPERF ('sys.dm_os_wait_stats',\
  \ CLEAR) ;\n```\n清单 17-16\n重置等待统计信息\n\n`sys.dm_os_wait_stats` 返回的列详见表 17-9。\n\n\
  表 17-9\n`sys.dm_os_wait_stats` 的列\n\n| 列 | 描述 |\n| --- | --- |\n| `wait_type` |\
  \ 已发生的等待类型的名称。 |\n| `waiting_tasks_count` | 此等待类型上已发生的任务数。 |\n| `wait_time_ms` |\
  \ 针对此等待类型的所有等待的累计时间，以毫秒显示。这包括信号等待时间。 |\n| `max_wait_time_ms` | 针对此等待类型的单次等待的最长时间。\
  \ |\n| `signal_wait_time_ms` | 针对此等待类型的所有信号等待的累计时间。 |\n\n要查找导致最高累计等待时间的等待类型，请运行清单\
  \ 17-17 中的查询。此查询在结果集中添加了一个计算列，该列从总等待时间中扣除信号等待时间，以避免 CPU 压力扭曲结果。\n\n```\nSELECT *\n\
  , wait_time_ms - signal_wait_time_ms ResourceWaits\nFROM sys.dm_os_wait_stats\n\
  ORDER BY wait_time_ms - signal_wait_time_ms DESC ;\n```\n清单 17-17\n查找最高等待\n\n当然，信号等待时间本身也可能是一个值得关注的问题，可能将处理器识别为瓶颈，你应该对其进行分析。因此，请使用清单\
  \ 17-18 中的查询来计算因任务等待处理器轮次而导致的等待占总等待的百分比。该值按等待类型显示，后面有一行显示所有等待类型的总体百分比。\n\n```\n\
  SELECT ISNULL(wait_type, 'Overall Percentage:') wait_type\n,PercentageSignalWait\n\
  FROM (\nSELECT wait_type\n,CAST(100\\. * SUM(signal_wait_time_ms)\n/ SUM(wait_time_ms)\
  \ AS NUMERIC(20,2)) PercentageSignalWait\nFROM sys.dm_os_wait_stats\nWHERE wait_time_ms\
  \ > 0\nGROUP BY wait_type WITH ROLLUP\n) a\nORDER BY PercentageSignalWait DESC ;\n\
  ```\n清单 17-18\n计算信号等待\n\n要查找特定时间段内的最高等待，你需要对数据进行两次采样，然后用第一次采样减去第二次采样。清单 17-19 中的脚本以\
  \ 10 分钟的间隔对数据进行两次采样，然后显示该时间段内前五个最高等待的详细信息。\n\n```\nDECLARE @Waits1 TABLE\n(\nwait_type\
  \ NVARCHAR(128),\nwait_time_ms BIGINT\n) ;\nDECLARE @Waits2 TABLE\n(\nwait_type\
  \ NVARCHAR(128),\nwait_time_ms BIGINT\n) ;\nINSERT INTO @waits1\nSELECT wait_type\n\
  ,wait_time_ms\nFROM sys.dm_os_wait_stats ;\nWAITFOR DELAY '00:10:00' ;\nINSERT INTO\
  \ @Waits2\nSELECT wait_type\n,wait_time_ms\nFROM sys.dm_os_wait_stats ;\nSELECT\
  \ TOP 5\nw2.wait_type\n,w2.wait_time_ms - w1.wait_time_ms\nFROM @Waits1 w1\nINNER\
  \ JOIN @Waits2 w2\nON w1.wait_type = w2.wait_type\nORDER BY w2.wait_time_ms - w1.wait_time_ms\
  \ DESC ;\n```\n清单 17-19\n计算特定时间段内的最高等待\n\n### 数据库元数据\n\n在 SQL Server 的早期版本中，如果 DBA\
  \ 需要发现数据库中有关特定页面的信息，他除了使用众所周知但未公开的 `DBCC PAGE` 命令外别无选择。SQL Server 通过添加一个名为 `sys.dm_db_page_info`\
  \ 的新动态管理视图来解决这个问题。该视图有完整的文档记录并受 Microsoft 支持，它能够以表值格式返回页面头信息。该函数接受的参数详见表 17-10。\n\
  \n表 17-10\n`sys.dm_db_page_info` 接受的参数\n\n| 参数 | 描述 |\n| --- | --- |\n| Database_id\
  \ | 你希望返回详细信息的数据库的 `database_id`。 |\n| File_id | 你希望返回详细信息的文件的 `file_id`。 |\n| Page_id\
  \ | 你感兴趣的页面的 page_id。 |\n| Mode | 模式可设置为 `LIMITED` 或 `DETAILED`。模式之间的唯一区别是，使用 LIMITED\
  \ 时，描述列不会被填充。这可以提高针对大表的性能。 |\n\n为了填充这些参数，添加了一个额外的系统函数，名为 `sys.fn_PageResCracker`。该函数可以\
  \ cross apply 到表，将 `%%physloc%%` 作为参数传递。或者，如果 cross apply 到 `sys.dm_exec_requests`\
  \ DMV 或 `sys.sysprocesses`（一个已弃用的系统视图），则添加了一个名为 `page_resource` 的额外列，该列可以作为参数传递给该函数。如果你正在诊断页面等待问题，这很有帮助。当传入一个页面资源/物理位置对象时，该函数将在结果集中为每一行返回\
  \ `database_id`、`file_id` 和 `page_id`。\n\n#### 注意\n\n当与 `%%physloc%%` 而不是 `page_resource`\
  \ 对象一起使用时，`sys.fn_PageResCracker` 函数返回的是 `slot_id`，而不是 `database_id`。因此，当与 `%%physloc%%`\
  \ 一起使用时，应使用 `DB_ID()` 函数来获取 database_id，并且应丢弃该函数返回的 `database_id` 列。\n\n表 17-11\
  \ 详细说明了 `sys.dm_db_page_info` DMF 返回的列。\n\n表 17-11\n`sys.dm_db_page_info` 返回的列\n\
  \n\n### 页面元数据字段参考\n\n| 列名 | 描述 |\n| --- | --- |\n| `` `Database_id` `` | 数据库的 ID\
  \ |\n| `` `File_id` `` | 文件的 ID |\n| `` `Page_id` `` | 页面的 ID |\n| `` `page_type`\
  \ `` | 与页面类型描述关联的内部 ID |\n| `` `page_type_desc` `` | 页面类型。例如，数据页、索引页、IAM 页、PFS 页等。\
  \ |\n| `` `page_type_flag_bits` `` | 表示页面标志的十六进制值 |\n| `` `page_type_flag_bits_desc`\
  \ `` | 页面标志的描述 |\n| `` `object_id` `` | 页面所属对象的 ID |\n| `` `index_id` `` | 页面所属索引的\
  \ ID |\n| `` `partition_id` `` | 页面所属分区的分区 ID |\n| `` `alloc_unit_id` `` | 存储该页面的分配单元的\
  \ ID |\n| `` `page_level` `` | 页面在 B 树结构中的层级 |\n| `` `slot_count` `` | 页面内的槽位数 |\n\
  | `` `ghost_rec_count` `` | 页面中已被标记为删除但尚未物理移除的记录数 |\n| `` `torn_bits` `` | 用于检测数据损坏，通过存储检测到的每次\
  \ torn write 对应的 1 个比特位 |\n| `` `is_iam_pg` `` | 指示页面是否为 IAM 页面 |\n| `` `is_mixed_ext`\
  \ `` | 指示页面是否属于混合区（分配给多个对象的区） |\n| `` `pfs_file_id` `` | 存储该页面关联的 PFS（页面可用空间）页面的文件\
  \ ID |\n| `` `pfs_page_id` `` | 与该页面关联的 PFS 页面的页面 ID |\n| `` `pfs_alloc_percent`\
  \ `` | 页面上的可用空间量 |\n| `` `pfs_status` `` | 页面 PFS 字节的值 |\n| `` `pfs_status_desc`\
  \ `` | 页面 PFS 字节的描述 |\n| `` `gam_file_id` `` | 存储该页面关联的 GAM（全局分配图）页面的文件 ID |\n|\
  \ `` `gam_page_id` `` | 与该页面关联的 GAM 页面的页面 ID |\n| `` `gam_status` `` | 指示页面是否在 GAM\
  \ 中已分配 |\n| `` `gam_status_desc` `` | 描述 GAM 状态标记 |\n| `` `sgam_file_id` `` | 存储该页面关联的\
  \ SGAM（共享全局分配图）页面的文件 ID |\n| `` `sgam_page_id` `` | 与该页面关联的 SGAM 页面的页面 ID |\n| ``\
  \ `sgam_status` `` | 指示页面是否在 SGAM 中已分配 |\n| `` `sgam_status_desc` `` | 描述 SGAM 状态标记\
  \ |\n| `` `diff_map_file_id` `` | 包含该页面关联的差异位图页面的文件 ID |\n| `` `diff_map_page_id`\
  \ `` | 与该页面关联的差异位图页面的页面 ID |\n| `` `diff_status` `` | 指示页面自上次差异备份以来是否已更改 |\n| ``\
  \ `diff_status_desc` `` | 描述差异状态标记 |\n| `` `ml_file_id` `` | 存储该页面关联的最小日志记录位图页面的文件\
  \ ID |\n| `` `ml_page_id` `` | 与该页面关联的最小日志记录位图页面的页面 ID |\n| `` `ml_status` `` |\
  \ 指示页面是否为最小日志记录 |\n| `` `ml_status_desc` `` | 描述最小日志记录状态标记 |\n| `` `free_bytes`\
  \ `` | 页面上的可用空间量（以字节为单位） |\n| `` `free_data_offset` `` | 页面偏移量，指向页面上可用空间的起始位置 |\n\
  | `` `reserved_bytes` `` | 如果页面是叶级索引页，表示等待幽灵清理的行数。如果页面位于堆上，则表示所有事务保留的空闲字节数。 |\n\
  | `` `reserved_xdes_id` `` | 用于微软支持进行调试 |\n| `` `xdes_id` `` | 用于微软支持进行调试 |\n| ``\
  \ `prev_page_file_id` `` | IAM 链中前一个页面的文件 ID |\n| `` `prev_page_page_id` `` | IAM\
  \ 链中前一个页面的页面 ID |\n| `` `next_page_file_id` `` | IAM 链中下一个页面的文件 ID |\n| `` `next_page_page_id`\
  \ `` | IAM 链中下一个页面的页面 ID |\n| `` `min_len` `` | 固定宽度行的长度 |\n| `` `page_lsn` `` |\
  \ 最后一次修改该页面的 LSN（日志序列号） |\n| `` `header_version` `` | 页面头的版本 |\n\n这些数据可能被证明具有价值的场合几乎是无限的。代码清单\
  \ 17-20 中的脚本展示了如何使用这些数据来确定关键表中的最大日志序列号，为恢复活动做准备。DBA 随后可以使用这个最大 LSN，来确保时间点恢复捕获了关键数据的最新修改。\n\
  \n```sql\nCREATE DATABASE Chapter17\nGO\nALTER DATABASE Chapter17\nSET RECOVERY\
  \ FULL\nGO\nUSE Chapter17\nGO\nCREATE TABLE dbo.CriticalData (\nID    INT    IDENTITY\
  \    PRIMARY KEY    NOT NULL,\nImportantData    NVARCHAR(128) NOT NULL\n)\nINSERT\
  \ INTO dbo.CriticalData(ImportantData)\nVALUES('My Very Important Value')\nGO\n\
  SELECT MAX(page_info.page_lsn)\nFROM dbo.CriticalData c\nCROSS APPLY sys.fn_PageResCracker(%%physloc%%)\
  \ AS r\nCROSS APPLY sys.dm_db_page_info(DB_ID(), r.file_id, r.page_id, 'DETAILED')\
  \ AS page_info\n```\n代码清单 17-20 查找修改表的最新 LSN\n\n### 元数据驱动自动化\n\n你可以使用元数据来驱动智能脚本，以自动化日常的\
  \ DBA 维护任务，同时结合业务逻辑。在接下来的章节中，你将看到如何使用元数据来生成滚动的数据库快照，以及仅重建那些已碎片化的索引。\n\n\n\n####\
  \ 动态循环数据库快照\n\n正如第 16 章所讨论的，我们可以使用数据库快照来创建数据库的只读副本，以减少只读报告的争用。问题在于，随着源数据库中数据的修改，快照中的数据会变得陈旧。因此，管理快照的一个实用工具是存储过程，它可以动态创建新快照并删除最旧的现有快照。然后，你可以使用\
  \ SQL Server Agent（SQL Server Agent 在第 22 章讨论）定期调度此过程运行。清单 17-21 中的脚本创建了一个存储过程，该过程在传入源数据库名称时，会删除最旧的快照并创建一个新快照。\n\
  \n该过程接受两个参数。第一个参数指定用于生成快照的数据库名称。第二个参数指定在任何时间点应保留的快照数量。例如，如果你向 `@DBName` 参数传入值 `Chapter17`，并向\
  \ `@RequiredSnapshots` 参数传入值 `2`，该过程将针对 `Chapter17` 数据库创建一个快照，但仅当已存在至少两个针对 `Chapter17`\
  \ 数据库的快照时，才会删除最旧的那个。\n\n该过程分三部分构建 `CREATE DATABASE` 脚本（参见清单 17-21）。第一部分包含初始的 `CREATE\
  \ DATABASE` 语句。第二部分基于在 `sys.master_files` 中记录为数据库组成部分的文件创建文件列表。第三部分包含 `AS SNAPSHOT\
  \ OF` 语句。然后，这三个字符串在执行前被连接在一起。脚本在快照名称及其内部每个文件的名称后附加一个序列号，以确保唯一性。\n\n```sql\nCREATE\
  \ PROCEDURE dbo.DynamicSnapshot @DBName NVARCHAR(128), @RequiredSnapshots INT\n\
  AS\nBEGIN\nDECLARE @SQL NVARCHAR(MAX)\nDECLARE @SQLStart NVARCHAR(MAX)\nDECLARE\
  \ @SQLEnd NVARCHAR(MAX)\nDECLARE @SQLFileList NVARCHAR(MAX)\nDECLARE @DBID INT\n\
  DECLARE @SS_Seq_No INT\nDECLARE @SQLDrop NVARCHAR(MAX)\nSET @DBID = (SELECT DB_ID(@DBName))\
  \ ;\n--Generate sequence number\nIF (SELECT COUNT(*) FROM sys.databases WHERE source_database_id\
  \ = @DBID) > 0\nSET @SS_Seq_No = (SELECT TOP 1 CAST(SUBSTRING(name, LEN(Name), 1)\
  \ AS INT)\nFROM sys.databases\nWHERE source_database_id = @DBID\nORDER BY create_date\
  \ DESC) + 1\nELSE\nSET @SS_Seq_No = 1\n--Generate the first part of the CREATE DATABASE\
  \ statement\nSET @SQLStart = 'CREATE DATABASE '\n+ QUOTENAME(@DBName + CAST(CAST(GETDATE()\
  \ AS DATE) AS NCHAR(10))\n+ '_ss' + CAST(@SS_Seq_No AS NVARCHAR(4))) + ' ON ' ;\n\
  --Generate the file list for the CREATE DATABASE statement\nSELECT @SQLFileList\
  \ =\n(\nSELECT\n'(NAME = N''' + mf.name + ''', FILENAME = N'''\n+ SUBSTRING(mf.physical_name,\
  \ 1, LEN(mf.physical_name) - 4)\n+ CAST(@SS_Seq_No AS NVARCHAR(4)) + '.ss' + '''),'\
  \ AS [data()]\nFROM  sys.master_files mf\nWHERE mf.database_id = @DBID\nAND mf.type\
  \ = 0\nFOR XML PATH ('')\n) ;\n--Remove the extra comma from the end of the file\
  \ list\nSET @SQLFileList = SUBSTRING(@SQLFileList, 1, LEN(@SQLFileList) - 2) ;\n\
  --Generate the final part of the CREATE DATABASE statement\nSET @SQLEnd = ') AS\
  \ SNAPSHOT OF ' + @DBName ;\n--Concatenate the strings and run the completed statement\n\
  SET @SQL = @SQLStart + @SQLFileList + @SQLEnd ;\nEXEC(@SQL) ;\n--Check to see if\
  \ the required number of snapshots exists for the database,\n--and if so, delete\
  \ the oldest\nIF (SELECT COUNT(*)\nFROM sys.databases\nWHERE source_database_id\
  \ = @DBID) > @RequiredSnapshots\nBEGIN\nSET @SQLDrop = 'DROP DATABASE ' + (\nSELECT\
  \ TOP 1\nQUOTENAME(name)\nFROM sys.databases\nWHERE source_database_id = @DBID\n\
  ORDER BY create_date ASC )\nEXEC(@SQLDrop)\nEND ;\nEND\n```\n清单 17-21 动态循环数据库快照\n\
  \n清单 17-22 中的命令针对 `Chapter17` 数据库运行 `DynamicSnapshot` 过程，指定在任何时间点应存在两个快照。\n\n```sql\n\
  EXEC dbo.DynamicSnapshot 'Chapter17', 2 ;\n```\n清单 17-22 运行 DynamicSnapshot 过程\n\
  \n#### 仅重建碎片化的索引\n\n当你使用维护计划重建所有索引时（我们将在第 22 章讨论），SQL Server 并未提供开箱即用的智能逻辑。因此，无论索引碎片级别如何，所有索引都会被重建，这需要不必要的时间和资源消耗。解决此问题的一个变通方法是编写一个自定义脚本，仅在索引碎片化时才重建它们。\n\
  \n清单 17-23 中的脚本演示了如何使用 `SQLCMD` 来识别碎片超过 25% 的索引，然后动态重建它们。将代码放在 `SQLCMD` 脚本中而不是存储过程中的原因是，`sys.dm_db_index_physical_stats`\
  \ 必须在你希望针对其运行的数据库内部调用。因此，当你通过 `SQLCMD` 运行它时，可以使用脚本变量来指定所需的数据库；这样做使脚本可重用于所有数据库。从命令行运行脚本时，可以简单地将数据库名称作为变量传入。\n\
  \n```sql\nUSE $(DBName)\nGO\nDECLARE @SQL NVARCHAR(MAX)\nSET @SQL =\n(\nSELECT 'ALTER\
  \ INDEX '\n+ i.name\n+ ' ON ' + s.name\n+ '.'\n+ OBJECT_NAME(i.object_id)\n+ ' REBUILD\
  \ ; '\nFROM sys.dm_db_index_physical_stats(DB_ID('$(DBName)'),NULL,NULL,NULL,'DETAILED')\
  \ ps\nINNER JOIN sys.indexes i\nON ps.object_id = i.object_id\nAND ps.index_id =\
  \ i.index_id\nINNER JOIN sys.objects o\nON ps.object_id = o.object_id\nINNER JOIN\
  \ sys.schemas s\nON o.schema_id = s.schema_id\nWHERE index_level = 0\nAND avg_fragmentation_in_percent\
  \ > 25\nFOR XML PATH('')\n) ;\nEXEC(@SQL) ;\n```\n清单 17-23 仅重建所需的索引\n\n当此脚本以 `RebuildIndexes.sql`\
  \ 为名保存在 `C:\\` 根目录时，可以从命令行运行它。清单 17-24 中的命令演示了针对 `Chapter17` 数据库运行它。\n\n```cmd\n\
  Sqlcmd -v DBName=\"Chapter17\" -I c:\\RebuildIndexes.sql -S ./PROSQLADMIN\n```\n\
  清单 17-24 运行 RebuildIndexes.sql\n\n\n### 概要\n\nSQL Server 暴露了大量元数据，这些元数据描述了 SQL Server\
  \ 内部的数据结构以及数据本身。元数据通过一系列目录视图、动态管理视图与函数、系统函数以及 `INFORMATION_SCHEMA` 来提供访问。通常，只有当你的脚本需要迁移到其他关系型数据库管理系统产品时，才会使用\
  \ `INFORMATION_SCHEMA`。这是因为相较于 SQL Server 特有的元数据，它提供的信息较少，但遵循 ISO 标准，因此能在所有主流关系型数据库管理系统上工作。\n\
  \n本章还涵盖了关于底层操作系统以及 SQLOS 的许多有用信息。例如，你可以使用 `dm_server` 类别的动态管理视图来查找实例注册表键的详细信息，并获取实例服务的详细信息。你可以使用\
  \ `dm_os` 类别的动态管理视图来获取许多关于 SQLOS 的内部细节，包括缓冲区缓存的当前内容。\n\nSQL Server 还暴露了可用于容量规划的元数据，例如数据库内所有文件的使用统计信息（例如，IO\
  \ 停顿）以及剩余的自由空间量。你可以在警报开始触发、应用程序面临风险之前，主动利用这些信息来规划额外的容量需求。\n\n元数据也有助于故障排除和性能调优。`sys.dm_os_performance_counters`\
  \ 动态管理视图允许数据库管理员检索性能监视器计数器，即使他们没有操作系统的访问权限。这可以消除团队间的依赖关系。你可以使用 `sys.dm_os_wait_stats`\
  \ 来识别实例中最常见的等待原因，这反过来有助于诊断硬件瓶颈，例如内存或 CPU 压力。`dm_exec` 类别的动态管理视图可以帮助识别开销大的查询，这些查询可以通过调优来改善性能。\n\
  \n数据库管理员还可以利用元数据创建智能脚本，通过向常规维护任务中添加业务规则来减少工作量。例如，数据库管理员可以使用元数据来执行诸如动态重建仅已发生碎片的索引，或动态管理数据库快照的循环等任务。我鼓励你进一步探索元数据驱动的自动化可能性；其潜力是无穷的。\n\
  \n# 18. 锁与阻塞\n\n锁机制是任何关系型数据库管理系统的一个基本方面，因为它允许多个并发用户访问相同数据，而不会出现其更新操作冲突并导致数据完整性问题的风险。本章讨论\
  \ SQL Server 中锁、死锁和事务的工作原理；接着讨论事务如何影响内存中事务功能，以及数据库管理员如何观察与事务和争用相关的锁元数据。\n\n### 理解锁机制\n\
  \n以下部分讨论了进程如何在不同粒度级别上获取锁、哪些类型的锁彼此兼容，以及在线维护操作期间控制锁行为和锁分区的特性，后者可以提升大型系统的性能。\n\n####\
  \ 锁粒度\n\n根据请求锁的操作性质，进程可以在许多不同的粒度级别上获取锁。为了降低操作相互阻塞的影响，明智的做法是在尽可能低的粒度级别上获取锁。然而，权衡之处在于，获取锁会使用系统资源，因此如果一个操作需要在最低粒度级别上获取数百万个锁，那么效率会非常低，而在更高级别上加锁则是更合适的选择。表\
  \ 18-1 描述了可以获取锁的粒度级别。\n\n表 18-1\n锁粒度\n\n| 级别 | 描述 |\n| --- | --- |\n| `RID/KEY`\
  \ | 堆上的行标识符或索引键。在可序列化事务中使用索引键锁来锁定行范围。可序列化事务将在本章后面讨论。 |\n| `PAGE` | 数据页或索引页。 |\n\
  | `EXTENT` | 八个连续的页。 |\n| `HoBT (堆或 B 树)` | 单个索引 (`B 树`) 的堆。 |\n| `TABLE` | 整个表，包括所有索引。\
  \ |\n| `FILE` | 数据库中的一个文件。 |\n| `METADATA` | 元数据资源。 |\n| `ALLOCATION_UNIT` | 表被拆分为三个分配单元：行数据、行溢出数据和\
  \ LOB（大型对象块）数据。对分配单元的锁会锁定表的三个分配单元之一。 |\n| `DATABASE` | 整个数据库。 |\n\n当 SQL Server\
  \ 锁定表内的资源时，它会在层次结构中直接位于其上方的资源上获取所谓的 `意向锁`。例如，如果 SQL Server 需要锁定一个 `RID` 或 `KEY`，它也会在包含该行的页上获取一个意向锁。如果锁管理器认为在层次结构的更高级别上加锁效率更高，则会将锁升级到更高级别。然而，值得注意的是，行锁不会升级为页锁；它们会直接升级为表锁。如果表是分区的，那么\
  \ SQL Server 可以锁定分区而不是整个表。SQL Server 用于锁升级的阈值如下：\n\n*   操作在表或分区（如果表已分区）上请求超过 5000\
  \ 个锁。\n*   实例内获取的锁数量超过了内存阈值。\n\n不过，你可以通过使用表的 `LOCK_ESCALATION` 选项来更改特定表的此行为。此选项有三个可能的值，如表\
  \ 18-2 所述。\n\n表 18-2\nLOCK_ESCALATION 值\n\n| 值 | 描述 |\n| --- | --- |\n| `TABLE`\
  \ | 锁升级到表级别，即使你使用的是分区表。 |\n| `AUTO` | 此值允许在分区表上将锁升级到分区，而不是整个表。 |\n| `DISABLE` |\
  \ 此值禁用将锁升级到表级别，除非需要表锁来保护数据完整性。 |\n\n#### 在线维护的锁定行为\n\n在 SQL Server 中，你还可以为在线索引重建和分区\
  \ `SWITCH` 操作控制锁的行为。可用选项如表 18-3 所述。\n\n表 18-3\n阻塞行为\n\n| 选项 | 描述 |\n| --- | ---\
  \ |\n| `MAX_DURATION` | 以分钟为单位指定的持续时间，在线索引重建或 `SWITCH` 操作在此时间内等待，然后触发 `ABORT_AFTER_WAIT`\
  \ 操作。 |\n| `ABORT_AFTER_WAIT` | 这些是可用的操作：• `NONE` 指定操作将继续以正常优先级等待。• `SELF` 意味着操作将被终止。• `BLOCKERS`\
  \ 意味着所有当前阻塞该操作的用户事务将被终止。 |\n| `WAIT_AT_LOW_PRIORITY` | 功能上等同于 `MAX_DURATION = 0,\
  \ ABORT_AFTER_WAIT = NONE`。 |\n\n清单 18-1 中的脚本创建了 `Chapter18` 数据库，其中包含一个名为 `Customers`\
  \ 的表，并填充了数据。然后，该脚本演示了在重建 `dbo.customers` 上的非聚集索引之前配置 `LOCK_ESCALATION`，指定如果任何操作阻塞重建超过\
  \ 1 分钟，则应终止这些操作。\n\n#### 提示\n\n在运行脚本前，请务必根据您自己的配置修改文件路径。\n\n```sql\n--创建数据库\nCREATE\
  \ DATABASE Chapter18\nON  PRIMARY\n( NAME = N'Chapter18', FILENAME = 'F:\\MSSQL\\\
  DATA\\Chapter18.mdf' ),\nFILEGROUP MemOpt CONTAINS MEMORY_OPTIMIZED_DATA  DEFAULT\n\
  ( NAME = N'MemOpt', FILENAME = 'F:\\MSSQL\\DATA\\MemOpt' )\nLOG ON\n( NAME = N'Chapter18_log',\
  \ FILENAME = 'E:\\MSSQL\\DATA\\Chapter18_log.ldf' ) ;\nGO\nUSE Chapter18\nGO\n--创建并填充数字表\n\
  DECLARE @Numbers TABLE\n(\nNumber        INT\n)\n;WITH CTE(Number)\nAS\n(\nSELECT\
  \ 1 Number\nUNION ALL\nSELECT Number + 1\nFROM CTE\nWHERE Number < 100\n)\nINSERT\
  \ INTO @Numbers\nSELECT Number FROM CTE;\n--创建并填充名字片段\nDECLARE @Names TABLE\n(\n\
  FirstName        VARCHAR(30),\nLastName        VARCHAR(30)\n);\nINSERT INTO @Names\n\
  VALUES('Peter', 'Carter'),\n('Michael', 'Smith'),\n('Danielle', 'Mead'),\n('Reuben',\
  \ 'Roberts'),\n('Iris', 'Jones'),\n('Sylvia', 'Davies'),\n('Finola', 'Wright'),\n\
  ('Edward', 'James'),\n('Marie', 'Andrews'),\n('Jennifer', 'Abraham');\n--创建并填充地址表\n\
  CREATE TABLE dbo.Addresses\n(\nAddressID        INT           NOT NULL        IDENTITY\
  \        PRIMARY KEY,\nAddressLine1     NVARCHAR(50),\nAddressLine2     NVARCHAR(50),\n\
  AddressLine3     NVARCHAR(50),\nPostCode         NCHAR(8)\n) ;\nINSERT INTO dbo.Addresses\n\
  VALUES('1 Carter Drive', 'Hedge End', 'Southampton', 'SO32 6GH')\n,('10 Apress Way',\
  \ NULL, 'London', 'WC10 2FG')\n,('12 SQL Street', 'Botley', 'Southampton', 'SO32\
  \ 8RT')\n,('19 Springer Way', NULL, 'London', 'EC1 5GG') ;\n--创建并填充客户表\nCREATE TABLE\
  \ dbo.Customers\n(\nCustomerID          INT          NOT NULL   IDENTITY   PRIMARY\
  \ KEY,\nFirstName           VARCHAR(30)  NOT NULL,\nLastName            VARCHAR(30)\
  \  NOT NULL,\nBillingAddressID    INT          NOT NULL,\nDeliveryAddressID   INT\
  \          NOT NULL,\nCreditLimit         MONEY        NOT NULL,\nBalance      \
  \       MONEY        NOT NULL\n);\nSELECT * INTO #Customers\nFROM\n(SELECT\n(SELECT\
  \ TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName,\n(SELECT TOP 1 LastName\
  \ FROM @Names ORDER BY NEWID()) LastName,\n(SELECT TOP 1 Number FROM @Numbers ORDER\
  \ BY NEWID()) BillingAddressID,\n(SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID())\
  \ DeliveryAddressID,\n(SELECT TOP 1 CAST(RAND() * Number AS INT) * 10000\nFROM @Numbers\n\
  ORDER BY NEWID()) CreditLimit,\n(SELECT TOP 1 CAST(RAND() * Number AS INT) * 9000\n\
  FROM @Numbers\nORDER BY NEWID()) Balance\nFROM @Numbers a\nCROSS JOIN @Numbers b\n\
  ) a;\nINSERT INTO dbo.Customers\nSELECT * FROM #Customers;\nGO\n--此表将在本章后面使用\nCREATE\
  \ TABLE dbo.CustomersMem\n(\nCustomerID         INT            NOT NULL    IDENTITY\n\
  PRIMARY KEY NONCLUSTERED HASH WITH(BUCKET_COUNT = 20000),\nFirstName          VARCHAR(30)\
  \    NOT NULL,\nLastName           VARCHAR(30)    NOT NULL,\nBillingAddressID  \
  \ INT            NOT NULL,\nDeliveryAddressID  INT            NOT NULL,\nCreditLimit\
  \        MONEY          NOT NULL,\nBalance            MONEY          NOT NULL\n\
  ) WITH(MEMORY_OPTIMIZED = ON) ;\nINSERT INTO dbo.CustomersMem\nSELECT\nFirstName\n\
  , LastName\n, BillingAddressID\n, DeliveryAddressID\n, CreditLimit\n, Balance\n\
  FROM dbo.Customers ;\nGO\nCREATE INDEX idx_LastName ON dbo.Customers(LastName)\n\
  --将 LOCK_ESCALATION 设置为 AUTO\nALTER TABLE dbo.Customers SET (LOCK_ESCALATION = AUTO)\
  \ ;\n--设置 WAIT_AT_LOW_PRIORITY\nALTER INDEX idx_LastName ON dbo.Customers REBUILD\n\
  WITH\n(ONLINE = ON (WAIT_AT_LOW_PRIORITY (MAX_DURATION = 1 MINUTES, ABORT_AFTER_WAIT\
  \ = BLOCKERS))) ;\n代码清单 18-1\n配置表锁选项\n```\n\n### 锁兼容性\n\n一个进程可以获取不同类型的锁。这些锁类型在 **表\
  \ 18-4** 中描述。\n\n**表 18-4**\n\n**锁类型**\n\n| 类型 | 描述 |\n| --- | --- |\n| `共享 (S)`\
  \ | 用于读操作。 |\n| `更新 (U)` | 在可能被更新的资源上获取。 |\n| `排他 (X)` | 在修改数据时使用。 |\n| `架构修改 (Sch-M)\
  \ / 架构稳定性 (Sch-S)` | 当对表运行 DDL 语句时，会获取架构修改锁。在查询编译和执行期间，会获取架构稳定性锁。稳定性锁只阻止需要架构修改锁的操作，而架构修改锁会阻止对表的所有访问。\
  \ |\n| `批量更新 (BU)` | 批量更新锁在批量加载操作期间使用，允许多个线程并行向表加载数据，同时阻止其他进程。 |\n| `键范围` | 使用悲观隔离级别时，会在行范围上获取键范围锁。隔离级别将在本章后面讨论。\
  \ |\n| `意向` | 意向锁用于通过发出获取共享或排他锁的意向来保护锁层次结构中较低级别的资源。 |\n\n意向锁提高了性能，因为它们只在表级被检查，这避免了在其他操作获取锁之前检查每一行或每一页的需要。可以获取的意向锁类型在\
  \ **表 18-5** 中描述。\n\n**表 18-5**\n\n**意向锁类型**\n\n| 类型 | 描述 |\n| --- | --- |\n| 意向共享\
  \ (`IS`) | 保护层次结构较低级别的某些资源上的共享锁 |\n| 意向排他 (`IX`) | 保护层次结构较低级别的某些资源上的共享锁和排他锁 |\n\
  | 共享意向排他 (`SIX`) | 保护层次结构较低级别所有资源上的共享锁和某些资源上的排他锁 |\n| 意向更新 (`IU`) | 保护层次结构较低级别所有资源上的更新锁\
  \ |\n| 共享意向更新 (`SIU`) | `S` 和 `IU` 锁的结果集 |\n| 更新意向排他 (`UIX`) | `X` 和 `IU` 锁的结果集\
  \ |\n\n**图 18-1** 中的矩阵显示了基本的锁兼容性。您可以在 `[`msdn.microsoft.com`](http://msdn.microsoft.com)`\
  \ 找到完整的锁兼容性矩阵。\n\n![`../images/333037_2_En_18_Chapter/333037_2_En_18_Fig1_HTML.jpg`](img/333037_2_En_18_Fig1_HTML.jpg)\n\
  \n**图 18-1**\n\n**锁兼容性矩阵**\n\n### 锁分区\n\n对于频繁访问的资源，其锁可能成为瓶颈。因此，对于任何关联超过 16 个内核的实例，SQL\
  \ Server 会自动应用一项称为**锁分区**的功能。锁分区通过将单个锁资源划分为多个资源来减少争用。这意味着在诸如锁资源结构所使用的内存等共享资源上的争用得以减少。\n\
  \n### 理解死锁\n\n由于锁的本质，操作需要等待锁被释放后才能获取它们自己在资源上的锁。然而，如果两个独立的进程已经在不同资源上获取了锁，但两者都被阻塞，正在等待对方完成，这时就可能出现问题。这被称为**死锁**。\n\
  \n\n#### 死锁如何发生\n\n要了解此问题如何产生，请查阅表 18-6。\n\n表 18-6\n死锁时间线\n\n| 进程 A | 进程 B |\n|\
  \ --- | --- |\n| 获取 `Table1` 中 `Row1` 的排他锁 |   |\n|   | 获取 `Table2` 中 `Row2` 的排他锁\
  \ |\n| 尝试获取 `Table2` 中 `Row2` 的锁，但被进程 B 阻塞 |   |\n|   | 尝试获取 `Table1` 中 `Row1` 的锁，但被进程\
  \ A 阻塞 |\n\n在此描述的序列中，进程 A 和进程 B 均无法继续，这意味着死锁已经发生。SQL Server 通过一个名为 `deadlock monitor`\
  \ 的内部进程来检测死锁。当 `deadlock monitor` 遇到死锁时，它会检查进程是否已被分配了事务优先级。如果进程的事务优先级不同，它会终止优先级最低的进程。如果它们的优先级相同，则会终止资源消耗最少的进程。如果两个进程的消耗成本相同，它会随机选择一个进程并将其终止。\n\
  \n清单 18-2 中的脚本会产生一个死锁。您必须在不同于第二个和第四个部分的查询窗口中运行该脚本的第一个和第三个部分。您必须按顺序运行脚本的每个部分。\n\n\
  ```\n--Part 1 - Run in 1st query window\nBEGIN TRANSACTION\nUPDATE dbo.Customers\n\
  SET LastName = 'Andrews'\nWHERE CustomerID = 1\n--Part 2 - Run in 2nd query window\n\
  BEGIN TRANSACTION\nUPDATE dbo.Addresses\nSET PostCode = 'SA12 9BD'\nWHERE AddressID\
  \ = 2\n--Part 3 - Run in 1st query window\nUPDATE dbo.Addresses\nSET PostCode =\
  \ 'SA12 9BD'\nWHERE AddressID = 2\n--Part 4 - Run in 2nd query window\nUPDATE dbo.Customers\n\
  SET LastName = 'Colins'\nWHERE CustomerID = 1\nListing 18-2\n生成死锁\n```\n\nSQL Server\
  \ 会选择一个进程作为死锁牺牲品并终止它。这会导致牺牲品的查询窗口中抛出错误消息，如图 18-2 所示。\n\n![../images/333037_2_En_18_Chapter/333037_2_En_18_Fig2_HTML.jpg](img/333037_2_En_18_Fig2_HTML.jpg)\n\
  \n图 18-2\n死锁牺牲品错误\n\n#### 最小化死锁\n\n您的开发人员可以采取各种措施来最小化死锁风险。因为是您（DBA）负责在生产环境中支持该实例，所以在将代码发布到生产环境之前，审慎的做法是检查开发团队的代码是否符合最小化死锁的标准。\n\
  \n在代码发布前进行审查时，您应确保遵循以下准则：\n\n*   在适当的地方使用乐观隔离级别（您还应该考虑有关 TempDB 使用、磁盘开销等方面的权衡）。\n\
  *   事务内不应有用户交互（这可以避免锁被长时间持有）。\n*   事务应尽可能短，并且在同一批处理中（这可以避免长时间运行的事务，这些事务会超出必要地长时间持有锁）。\n\
  *   所有可编程对象都以相同的顺序访问对象（这可以降低死锁发生的可能性，代价是第一个表上的争用）。\n\n### 理解事务\n\n每个导致数据或对象被修改的操作都发生在事务的上下文中。SQL\
  \ Server 支持三种类型的事务：自动提交、显式和隐式。自动提交事务是默认行为，意味着每条语句都在其自身的事务上下文中执行。显式事务是手动开始和结束的。它们以\
  \ `BEGIN TRANSACTION` 语句开始，并以 `COMMIT TRANSACTION` 语句（导致相关日志记录被固化到磁盘）或 `ROLLBACK`\
  \ 语句（导致事务内的所有操作被撤销）结束。如果为连接启用了隐式事务，则该连接的默认自动提交行为将不再有效。相反，事务会自动启动，然后使用 `COMMIT TRANSACTION`\
  \ 语句手动提交。\n\n#### 事务属性\n\n事务表现出称为 ACID（原子性、一致性、隔离性和持久性）的属性。以下各节将分别讨论这些属性。\n\n#####\
  \ 原子性\n\n对于一个具有原子性的事务，事务内的所有操作必须同时提交或同时回滚。只提交部分事务是不可能的。然而，SQL Server 对此属性的实现稍微灵活一些，它通过实现保存点来做到这一点。\n\
  \n`保存点`是事务中的一个标记，在发生回滚时，`保存点`之前的所有内容都会被提交，而`保存点`之后的所有内容可以被提交或回滚。这有助于捕获偶尔可能发生的错误。例如，清单\
  \ 18-3 中的脚本在向 `Addresses` 表执行一个小插入之前，先向 `Customers` 表执行了一个大插入。如果向 `Addresses` 表的插入失败，向\
  \ `Customers` 表的大插入仍然会被提交。\n\n```\nSELECT COUNT(*) InitialCustomerCount FROM dbo.Customers\
  \ ;\nSELECT COUNT(*) InitialAddressesCount FROM dbo.Addresses ;\nBEGIN TRANSACTION\n\
  DECLARE @Numbers TABLE\n(\nNumber        INT\n)\n;WITH CTE(Number)\nAS\n(\nSELECT\
  \ 1 Number\nUNION ALL\nSELECT Number + 1\nFROM CTE\nWHERE Number < 100\n)\nINSERT\
  \ INTO @Numbers\nSELECT Number FROM CTE;\n--Create and populate name pieces\nDECLARE\
  \ @Names TABLE\n(\nFirstName        VARCHAR(30),\nLastName        VARCHAR(30)\n\
  );\nINSERT INTO @Names\nVALUES('Peter', 'Carter'),\n('Michael', 'Smith'),\n('Danielle',\
  \ 'Mead'),\n('Reuben', 'Roberts'),\n('Iris', 'Jones'),\n('Sylvia', 'Davies'),\n\
  ('Finola', 'Wright'),\n('Edward', 'James'),\n('Marie', 'Andrews'),\n('Jennifer',\
  \ 'Abraham');\n--Populate Customers table\nSELECT * INTO #Customers\nFROM\n(SELECT\n\
  (SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName,\n(SELECT TOP 1\
  \ LastName FROM @Names ORDER BY NEWID()) LastName,\n(SELECT TOP 1 Number FROM @Numbers\
  \ ORDER BY NEWID()) BillingAddressID,\n(SELECT TOP 1 Number FROM @Numbers ORDER\
  \ BY NEWID()) DeliveryAddressID,\n(SELECT TOP 1 CAST(RAND() * Number AS INT) * 10000\n\
  FROM @Numbers\nORDER BY NEWID()) CreditLimit,\n(SELECT TOP 1 CAST(RAND() * Number\
  \ AS INT) * 9000\nFROM @Numbers\nORDER BY NEWID()) Balance\nFROM @Numbers a\nCROSS\
  \ JOIN @Numbers b\n) a;\nINSERT INTO dbo.Customers\nSELECT * FROM #Customers;\n\
  SAVE TRANSACTION CustomerInsert\nBEGIN TRY\n--Populate Addresses table - Will fail,\
  \ due to length of Post Code\nINSERT INTO dbo.Addresses\nVALUES('1 Apress Towers',\
  \ 'Hedge End', 'Southampton', 'SA206 2BQ') ;\nEND TRY\nBEGIN CATCH\nROLLBACK TRANSACTION\
  \ CustomerInsert\nEND CATCH\nCOMMIT TRANSACTION\nSELECT COUNT(*) FinalCustomerCount\
  \ FROM dbo.Customers ;\nSELECT COUNT(*) FinalAddressesCount FROM dbo.Addresses ;\n\
  Listing 18-3\n保存点\n```\n\n行数的结果如图 18-3 所示，显示向 `Customers` 表的插入已提交，而向 `Addresses`\
  \ 表的插入已回滚。还可以在单个事务中创建多个保存点，然后回滚到最合适的点。\n\n![../images/333037_2_En_18_Chapter/333037_2_En_18_Fig3_HTML.jpg](img/333037_2_En_18_Fig3_HTML.jpg)\n\
  \n图 18-3\n行数统计\n\n\n\n##### 一致性\n\n一致性属性意味着事务将数据库从一个一致状态转移到另一个一致状态；在事务结束时，所有数据必须符合所有的数据规则，这些规则通过约束、数据类型等方式来强制实施。\n\
  \nSQL Server 完全支持这一属性，但存在一些变通方法。例如，如果你在表上有一个检查约束或外键，并且你希望执行大规模的批量插入，你可以先禁用约束，插入数据，然后使用\
  \ `NOCHECK` 重新启用约束。当你使用 `NOCHECK` 时，约束会强制执行新数据修改的规则，但不会对表中已存在的数据强制执行该规则。然而，当你这样做时，SQL\
  \ Server 会将该约束标记为不可信，查询优化器会忽略该约束，直到你使用以下命令验证了表中的现有数据：\n\n```sql\nALTER TABLE MyTable\
  \ WITH CHECK CHECK CONSTRAINT ALL\n```\n\n##### 隔离性\n\n隔离性指的是并发事务在其他事务提交之前，查看其数据修改的能力。隔离事务可以避免事务异常，并通过获取锁或维护行的多个版本来强制实施。每个事务都在定义的隔离级别下运行。在我们讨论可用的隔离级别之前，我们首先需要了解可能发生的事务异常。\n\
  \n###### 事务异常\n\n事务异常可能导致查询返回不可预测的结果。在 SQL Server 中，可能发生三种类型的事务异常：脏读、不可重复读和幻读。这些将在以下部分进行讨论。\n\
  \n####### 脏读\n\n`脏读` 发生在一个事务读取了从未在数据库中存在过的数据时。表 18-7 概述了这种异常如何发生的一个例子。\n\n表 18-7\n\
  \n一次脏读\n\n| 事务 1 | 事务 2 |\n| --- | --- |\n| 将 `row1` 插入 `Table1` |   |\n|   | 从\
  \ `Table1` 读取 `row1` |\n| 回滚 |   |\n\n在此示例中，由于 `事务 1` 回滚了，`事务 2` 读取了一行从未在数据库中存在的数据。如果在读取时未获取共享锁，则可能发生此异常，因为没有锁与\
  \ `事务 1` 获取的排他锁冲突。\n\n####### 不可重复读\n\n当一个事务两次读取同一行但每次得到不同结果时，就发生了不可重复读。表 18-8 概述了这种异常如何发生的一个例子。\n\
  \n表 18-8\n\n一次不可重复读\n\n| 事务 1 | 事务 2 |\n| --- | --- |\n| 从 `Table1` 读取 `row1` |\
  \   |\n|   | 更新 `Table1` 中的 `row1` |\n|   | 提交 |\n| 从 `Table1` 读取 `row1` |   |\n\
  \n在此示例中，你可以看到 `事务 1` 两次从 `Table1` 读取了 `row1`。然而，第二次读取时，它得到了不同的结果，因为 `事务 2` 已经更新了该行。如果\
  \ `事务 1` 获取了共享锁但没有在事务持续期间一直持有它们，就可能发生此异常。\n\n####### 幻读\n\n当一个事务两次读取一个行范围，但第二次读取该范围时得到的行数不同，就发生了幻读。表\
  \ 18-9 概述了这种异常如何发生的一个例子。\n\n表 18-9\n\n幻读\n\n| 事务 1 | 事务 2 |\n| --- | --- |\n| 读取\
  \ `Table1` 中的所有行 |   |\n|   | 向 `Table1` 插入十行 |\n|   | 提交 |\n| 读取 `Table1` 中的所有行\
  \ |   |\n\n在此示例中，你可以看到 `事务 1` 两次读取了 `Table1` 中的所有行。然而，第二次读取时，它多读了十行，因为 `事务 2` 向表中插入了十行。当\
  \ `事务 1` 没有获取键范围锁并在事务持续期间持有它时，就可能发生此异常。\n\n#### 隔离级别\n\nSQL Server 为涉及基于磁盘表的事务提供了四种悲观和两种乐观事务隔离级别。悲观隔离级别使用锁来防止事务异常，乐观隔离级别使用行版本控制。\n\
  \n####### 悲观隔离级别\n\n`未提交读` 是限制性最低的隔离级别。它通过为写操作获取锁，而不为读操作获取任何锁来工作。这意味着在此隔离级别下，读操作不会阻塞其他读取器或写入器。其结果是，前文描述的所有事务异常都可能发生。\n\
  \n`已提交读` 是默认的隔离级别。它通过为读操作获取共享锁，也为写操作获取锁来工作。共享锁仅在读取特定行的读取阶段持有，一旦记录被读取，锁就会释放。这样可以防止脏读，但不可重复读和幻读仍然可能发生。\n\
  \n**提示**\n\n在某些情况下，共享锁可能会一直持有到语句结束。当物理运算符需要将数据假脱机到磁盘时，就会发生这种情况。\n\n除了为写操作获取锁外，`可重复读`\
  \ 还会获取它所触及的所有行上的共享锁，然后持有这些锁直到事务结束。其结果是，脏读和不可重复读不再可能，尽管幻读仍然可能发生。由于读取在整个事务期间都保持持有状态，因此发生死锁的可能性比使用\
  \ `已提交读` 或 `未提交读` 隔离级别时更高。\n\n`可序列化` 是限制性最强的隔离级别，也是最有可能发生死锁的级别。它的工作方式不仅是为写操作获取锁，还为读操作获取键范围锁，然后在整个事务期间持有它们。因为键范围锁是以这种方式持有的，所以任何事务异常都不可能发生，包括幻读。\n\
  \n\n####### 乐观隔离级别\n\n乐观隔离级别在工作时无需对读取或写入操作获取任何锁。相反，它们使用一种称为 `行版本控制` 的技术。`行版本控制`\
  \ 的工作原理是：每当行被更新时，它都会在 `TempDB` 中为未提交的事务维护该行的一个新副本。这意味着始终存在一个事务可以引用的数据一致副本。这可以显著减少高并发系统上的争用。代价是需要根据大小和吞吐量容量来适当扩展\
  \ `TempDB`，因为额外的 I/O 可能对性能产生负面影响。\n\n`快照隔离` 对读取和写入操作都使用乐观并发控制。它的工作原理是在事务开始时为每个事务分配一个事务序列号。然后，它能够通过查找最接近且小于该事务自身序列号的序列号，从\
  \ `TempDB` 中读取该事务开始时行的版本。这意味着，尽管可能存在包含修改的其他行版本，但由于序列号较高，该事务无法看到它们。如果两个事务同时尝试更新同一行，则不会发生死锁，而是第二个事务会抛出错误\
  \ `3960` 并且回滚该事务。这种行为的结果是，脏读、不可重复读和幻读都不可能发生。\n\n`已提交读快照` 对写入操作使用悲观并发控制，对读取操作使用乐观并发控制。对于读取操作，它使用事务内每个语句开始时行的当前版本，而不是事务开始时行的版本。这意味着你获得的隔离级别与使用悲观的\
  \ `已提交读` 隔离级别相同。\n\n与悲观隔离级别不同，你需要在数据库级别开启乐观隔离级别。当你开启 `已提交读快照` 时，它将替代 `已提交读` 的功能。这一点很重要，因为\
  \ `已提交读快照` 成为你的默认隔离级别，并用于所有未显式设置隔离级别的事务。清单 18-4 中的脚本演示了如何为 `Chapter18` 数据库开启 `快照隔离`\
  \ 和 `已提交读快照隔离`。该脚本首先检查以确保 `已提交读` 和 `已提交读快照` 尚未启用。如果未启用，它会先终止当前连接到 `Chapter18` 数据库的所有会话，最后才运行\
  \ `ALTER DATABASE` 语句。\n\n```sql\n--Check if already enabled\nIF EXISTS (\nSELECT\
  \ name\n,snapshot_isolation_state_desc\n,is_read_committed_snapshot_on\nFROM sys.databases\n\
  WHERE name = 'Chapter18'\nAND snapshot_isolation_state_desc = 'OFF'\nAND is_read_committed_snapshot_on\
  \ = 0 )\nBEGIN\n--Kill any existing sessions\nIF EXISTS(\nSELECT * FROM sys.dm_exec_sessions\
  \ where database_id = DB_id('Chapter18')\n)\nBEGIN\nPRINT 'Killing Sessions to Chapter18\
  \ database'\nDECLARE @SQL NVARCHAR(MAX)\nSET @SQL = (SELECT 'KILL ' + CAST(Session_id\
  \ AS NVARCHAR(3)) + '; ' [data()]\nFROM sys.dm_exec_sessions\nWHERE database_id\
  \ = DB_id('Chapter18')\nFOR XML PATH('')\n)\nEXEC(@SQL)\nEND\nPRINT 'Enabling Snapshot\
  \ and Read Committed Sanpshot Isolation'\nALTER DATABASE Chapter18\nSET ALLOW_SNAPSHOT_ISOLATION\
  \ ON ;\nALTER DATABASE Chapter18\nSET READ_COMMITTED_SNAPSHOT ON ;\nEND\nELSE\n\
  PRINT 'Snapshot Isolation already enabled'\nListing 18-4\n启用乐观隔离级别\n```\n\n#####\
  \ 持久性\n\n要使事务具有持久性，它在提交后必须保持已提交状态，即使在发生灾难性事件时也是如此。这意味着更改必须写入磁盘，因为内存中的更改无法承受断电、实例重启等情况。SQL\
  \ Server 通过使用一种称为预写日志（WAL）的过程来实现这一点。该过程在事务提交时将日志缓存刷新到磁盘，并且只有在此刷新完成后提交才算完成。\n\n然而，SQL\
  \ Server 通过引入一项称为延迟持久性的功能放宽了这些规则。此功能的工作原理是延迟将日志缓存刷新到磁盘，直到发生以下事件之一：\n\n*   日志缓存变满并自动刷新到磁盘。\n\
  *   同一数据库中的一个完全持久性事务提交。\n*   针对数据库运行了 `sp_flush_log` 系统存储过程。\n\n使用延迟持久性时，数据在事务提交后立即对其他事务可见；但是，在日志记录被刷新之前，如果实例宕机或重启，该事务内提交的数据可能会丢失。延迟持久性的支持在数据库级别配置，使用表\
  \ 18-10 中详述的三个选项之一。\n\n表 18-10\n延迟持久性的支持级别\n\n| 支持级别 | 描述 |\n| --- | --- |\n| `ALLOWED`\
  \ | 数据库支持延迟持久性，并在事务级别指定。 |\n| `FORCED` | 数据库中的所有事务都将使用延迟持久性。 |\n| `DISABLED` | 默认设置。不允许数据库中的任何事务使用延迟持久性。\
  \ |\n\n清单 18-5 中的命令显示了如何在 `Chapter18` 数据库中允许延迟持久性。\n\n```sql\nALTER DATABASE Chapter18\n\
  SET DELAYED_DURABILITY  = ALLOWED ;\nListing 18-5\n允许延迟持久性\n```\n\n如果数据库配置为允许延迟持久性，则在\
  \ `COMMIT` 语句中配置事务级别的 `FULL` 或 `DELAYED` 持久性。清单 18-6 中的脚本演示了如何以延迟持久性提交事务。\n\n```sql\n\
  USE Chapter18\nGO\nBEGIN TRANSACTION\nUPDATE dbo.Customers\nSET DeliveryAddressID\
  \ = 1\nWHERE CustomerID = 10 ;\nCOMMIT WITH (DELAYED_DURABILITY = ON)\nListing 18-6\n\
  以延迟持久性提交\n```\n\n#### 注意事项\n\n使用延迟持久性时，最重要的是要记住存在数据丢失的可能性。如果任何事务已提交，但相关的日志记录在实例宕机时尚未刷新到磁盘，这些数据将会丢失。\n\
  \n在发生问题（例如 I/O 错误）时，未提交的事务可能进入既无法提交也无法回滚的状态。当您将数据库联机并在重做阶段和回滚阶段都失败时，就会发生这种情况。这称为\
  \ `延迟事务`。延迟事务会阻止它们所在的 VLF 被截断，这意味着事务日志会持续增长。\n\n解决问题取决于问题的原因。如果问题是由损坏的页引起的，那么您可以尝试从备份中还原此页。如果问题是由于文件组脱机引起的，那么您必须还原该文件组或将该文件组标记为可疑。如果您将文件组标记为可疑，则无法恢复它。\n\
  \n### 使用内存中 OLTP 的事务\n\n内存优化表不支持锁来提高并发性；这改变了隔离级别工作的方式，因为悲观并发控制不再是可选项。我们将在以下各节中讨论内存中\
  \ OLTP 支持的隔离级别，以及跨容器查询的注意事项。\n\n#### 隔离级别\n\n因为与内存中 OLTP 一起使用的所有隔离级别都必须是乐观的，所以每个隔离级别都实现行版本控制。然而，与基于磁盘的表的行版本控制不同，内存优化表的行版本不在\
  \ `TempDB` 中维护。相反，它们在它们相关的内存优化表中维护。\n\n##### 已提交读\n\n`已提交读`隔离级别在针对内存优化表时受到支持，但前提是您使用的是自动提交事务。在显式或隐式事务中无法使用`已提交读`。在本地编译存储过程的`ATOMIC`块中也无法使用`已提交读`。由于`已提交读`是\
  \ SQL Server 的默认隔离级别，您必须确保所有涉及内存优化表的事务都明确指定了隔离级别，或者必须设置`MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT`数据库属性。此选项会将所有涉及内存优化表但未指定隔离级别的事务提升到快照隔离级别，这是限制最少的隔离级别，并且完全适用于内存\
  \ OLTP。\n\n清单 18-7 中的命令展示了如何为 `Chapter18` 数据库设置 `MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT`\
  \ 属性。\n\n```sql\nALTER DATABASE Chapter18\nSET MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT\
  \ = ON ;\n```\n清单 18-7\n提升到快照\n\n##### 已提交读快照\n\n`已提交读快照`隔离级别在针对内存优化表时受到支持，但仅限于您使用自动提交事务时。当事务访问基于磁盘的表时，此隔离级别不受支持。\n\
  \n##### 快照\n\n`快照`隔离级别使用行版本控制来确保事务始终看到事务开始时的数据。仅当您使用解释型 SQL 且指定的是查询提示而非事务级别时，快照隔离级别才在针对内存优化表时受到支持。它在本地编译存储过程的`ATOMIC`块中完全受支持。\n\
  \n如果一个事务尝试修改已被另一个事务更新的行，则冲突检测机制会回滚该事务，并抛出错误 41302。如果一个事务尝试插入与另一个事务已插入的行具有相同主键值的行，则冲突检测会回滚该事务并抛出错误\
  \ 41352。如果一个事务尝试修改已被另一个事务删除的表中的数据，则会抛出错误 41305，并且该事务将被回滚。\n\n##### 可重复读\n\n`可重复读`隔离级别提供与`快照`相同的保护，但此外，它还保证自事务开始以来，事务读取的行未被其他行修改。如果事务尝试读取已被另一个事务修改的行，则会抛出错误\
  \ 41305 并且回滚该事务。然而，在使用解释型 SQL 时，`可重复读`隔离不支持针对内存优化表。它仅在本地编译存储过程的`ATOMIC`块中受支持。\n\n\
  ##### 可序列化\n\n`可序列化`隔离级别提供了`可重复读`所提供的相同保护，但此外，它还保证在事务所访问的查询范围内没有插入新行。如果使用`可序列化`隔离级别的事务无法满足其保证，则冲突检测机制将回滚该事务并抛出错误\
  \ 41325。然而，在使用解释型 SQL 时，`可序列化`隔离不支持针对内存优化表。它仅在本地编译存储过程的`ATOMIC`块中受支持。\n\n#### 跨容器事务\n\
  \n由于隔离级别的使用受到限制，当一个事务同时访问内存优化表和基于磁盘的表时，您可能需要指定隔离级别和查询提示的组合。清单 18-8 中的查询将 `Customers`\
  \ 和 `CustomersMem` 表连接在一起。它之所以成功，仅仅是因为我们启用了 `MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT`。这意味着该查询使用默认的\
  \ `已提交读快照` 隔离级别访问基于磁盘的表，并自动将 `CustomersMem` 表的读取提升到使用 `快照` 隔离。\n\n```sql\nBEGIN\
  \ TRANSACTION\nSELECT *\nFROM dbo.Customers C\nINNER JOIN dbo.CustomersMem CM\n\
  ON C.CustomerID = CM.CustomerID ;\nCOMMIT TRANSACTION\n```\n清单 18-8\n通过自动提升连接磁盘和内存表\n\
  \n但是，如果我们现在关闭 `MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT`（您可以使用清单 18-9 中的脚本完成此操作），相同的事务现在将失败，并显示图\
  \ 18-4 中的错误消息。\n\n![../images/333037_2_En_18_Chapter/333037_2_En_18_Fig4_HTML.jpg](img/333037_2_En_18_Fig4_HTML.jpg)\n\
  \n图 18-4\n\n在没有自动提升的情况下连接磁盘和内存表\n\n```sql\nALTER DATABASE Chapter18\nSET MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT=OFF\n\
  GO\n```\n清单 18-9\n关闭 `MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT`\n\n清单 18-10 中的查询演示了如何将\
  \ `Customers` 表与 `CustomersMem` 表连接，其中对内存优化表使用 `快照` 隔离级别，对基于磁盘的表使用 `可序列化` 隔离级别。因为我们使用的是解释型\
  \ SQL，`快照` 隔离级别是我们可以用来访问内存优化表的唯一级别，并且我们必须将其指定为查询提示。如果我们在事务级别指定它而不是指定 serializable，事务将失败。\n\
  \n```sql\nBEGIN TRANSACTION\nSET TRANSACTION ISOLATION LEVEL SERIALIZABLE\nSELECT\
  \ *\nFROM dbo.Customers C\nINNER JOIN dbo.CustomersMem CM (SNAPSHOT)\nON C.CustomerID\
  \ = CM.CustomerID ;\nCOMMIT TRANSACTION\n```\n清单 18-10\n使用查询提示连接磁盘和内存优化表\n\n如果我们使用本机编译存储过程而不是解释型\
  \ SQL，我们会将所需的事务隔离级别添加到过程定义的 `ATOMIC` 块中。清单 18-11 中的脚本演示了创建一个本机编译存储过程，该过程使用 `可序列化`\
  \ 隔离级别更新 `CustomersMem` 表。由于本机编译存储过程无法访问基于磁盘的表，因此您无需担心用于支持跨容器事务的锁提示。\n\n```sql\n\
  CREATE PROCEDURE dbo.UpdateCreditLimit\nWITH native_compilation, schemabinding,\
  \ execute as owner\nAS\nBEGIN ATOMIC\nWITH(TRANSACTION ISOLATION LEVEL = SERIALIZABLE,\
  \ LANGUAGE = 'English')\nUPDATE dbo.CustomersMem\nSET CreditLimit = CreditLimit\
  \ * 1.1\nWHERE Balance < CreditLimit / 4 ;\nUPDATE dbo.CustomersMem\nSET CreditLimit\
  \ = CreditLimit * 1.05\nWHERE Balance < CreditLimit / 2 ;\nEND\n```\n清单 18-11\n\
  在本机编译存储过程中使用 `可序列化` 隔离级别\n\n\n##### 重试逻辑\n\n无论您使用的是解释型 SQL 还是原生编译的存储过程，在针对内存优化表运行事务时，都必须确保使用重试逻辑。这是因为乐观并发模型意味着冲突检测机制会回滚事务，而不是通过锁来管理并发。同样重要的是要记住，如果无法保证所需的隔离级别，SQL\
  \ Server 甚至会回滚只读事务。例如，如果您在只读事务中使用可序列化隔离级别，而另一个事务插入了与您的查询筛选条件匹配的行，则该事务将被回滚。\n\n清单\
  \ 18-12 中的脚本为 `UpdateCreditLimit` 过程创建了一个包装器存储过程，如果过程失败，该过程最多重试十次，每次迭代之间间隔 1 秒。您应更改此延迟以匹配冲突事务的平均持续时间。\n\
  \n```sql\nCREATE PROCEDURE UpdateCreditLimitWrapper\nAS\nBEGIN\nDECLARE @Retries\
  \ INT = 1 ;\nWHILE @Retries <= 10\nBEGIN\nBEGIN TRY\nEXEC dbo.UpdateCreditLimit\
  \ ;\nEND TRY\nBEGIN CATCH\nWAITFOR DELAY '00:00:01' ;\nSET @Retries = @Retries +\
  \ 1 ;\nEND CATCH\nEND\nEND\n```\n清单 18-12 内存优化表的重试逻辑\n\n### 观察事务、锁和死锁\n\nSQL Server\
  \ 提供了一组 DMV（动态管理视图），用于公开有关当前事务和锁的信息。以下各节探讨可用的元数据。\n\n#### 观察事务\n\n`sys.dm_tran_active_transactions`\
  \ DMV 详细列出了实例中的当前事务。此 DMV 返回表 18-11 中描述的列。\n\n表 18-11 `sys.dm_tran_active_transactions`\
  \ 返回的列\n\n| 列 | 描述 |\n| --- | --- |\n| `transaction_id` | 事务的唯一 ID。 |\n| `name`\
  \ | 事务的名称。如果事务未标记名称，则显示默认名称——例如 `\"user_transaction\"`。 |\n| `transaction_begin_time`\
  \ | 事务开始的日期和时间。 |\n| `transaction_type` | 描述事务类型的整数值。<br>• `1` 表示读写事务。<br>• `2`\
  \ 表示只读事务。<br>• `3` 表示系统事务。<br>• `4` 表示分布式事务。 |\n| `transaction_uow` | MSDTC（Microsoft\
  \ 分布式事务协调器）用于处理分布式事务的工作单元 ID。 |\n| `transaction_state` | 事务的当前状态。<br>• `0` 表示事务仍在初始化。<br>• `1`\
  \ 表示事务已初始化但尚未开始。<br>• `2` 表示事务处于活动状态。<br>• `3` 表示事务已结束。此状态仅适用于只读事务。<br>• `4` 表示已启动提交。此状态仅适用于分布式事务。<br>• `5`\
  \ 表示事务已准备好并等待解决。<br>• `6` 表示事务已提交。<br>• `7` 表示事务正在回滚。<br>• `8` 表示事务回滚已完成。 |\n| `dtc_state`\
  \ | 指示 Azure 数据库上事务的状态。<br>• `1` 表示事务处于活动状态。<br>• `2` 表示事务已准备好。<br>• `3` 表示事务已提交。<br>• `4`\
  \ 表示事务已中止。<br>• `5` 表示事务已恢复。 |\n\n#### 注意\n\n本章中的 DMV 已省略未文档化的列。\n\n清单 18-13 中的脚本展示了如何使用\
  \ `sys.dm_tran_active_transactions` 查找长时间运行事务的详细信息。该查询查找运行时间超过 10 分钟的事务，并返回信息，包括它们的当前状态、消耗的资源量以及执行它们的登录名。\n\
  \n#### 提示\n\n在测试环境中，在运行此查询前 10 分钟开始一个事务但不提交它。\n\n```sql\nSELECT\nname\n,transaction_begin_time\n\
  ,CASE transaction_type\nWHEN 1 THEN '读写'\nWHEN 2 THEN '只读'\nWHEN 3 THEN '系统'\nWHEN\
  \ 4 THEN '分布式'\nEND TransactionType,\nCASE transaction_state\nWHEN 0 THEN '正在初始化'\n\
  WHEN 1 THEN '已初始化但未启动'\nWHEN 2 THEN '活动'\nWHEN 3 THEN '已结束'\nWHEN 4 THEN '正在提交'\n\
  WHEN 5 THEN '已准备好'\nWHEN 6 THEN '已提交'\nWHEN 7 THEN '正在回滚'\nWHEN 8 THEN '已回滚'\nEND\
  \ State\n, SUBSTRING(TXT.text, ( er.statement_start_offset / 2 ) + 1,\n( ( CASE\
  \ WHEN er.statement_end_offset = -1\nTHEN LEN(CONVERT(NVARCHAR(MAX), TXT.text))\
  \ * 2\nELSE er.statement_end_offset\nEND - er.statement_start_offset ) / 2 ) + 1)\
  \ AS CurrentQuery\n, TXT.text AS ParentQuery\n, es.host_name\n, CASE tat.transaction_type\n\
  WHEN 1 THEN '读写事务'\nWHEN 2 THEN '只读事务'\nWHEN 3 THEN '系统事务'\nWHEN 4 THEN '分布式事务'\n\
  ELSE '未知'\nEND AS TransactionType\n,SUSER_SNAME(es.security_id) LoginRunningTransaction\n\
  ,es.memory_usage * 8 MemUsageKB\n,es.reads\n,es.writes\n,es.cpu_time\nFROM sys.dm_tran_active_transactions\
  \ tat\nINNER JOIN sys.dm_tran_session_transactions st\nON tat.transaction_id = st.transaction_id\n\
  INNER JOIN sys.dm_exec_sessions es\nON st.session_id = es.session_id\nINNER JOIN\
  \ sys.dm_exec_requests er\nON er.session_id = es.session_id\nCROSS APPLY sys.dm_exec_sql_text(er.sql_handle)\
  \ TXT\nWHERE st.is_user_transaction = 1\nAND tat.transaction_begin_time < DATEADD(MINUTE,-10,GETDATE())\
  \ ;\n```\n清单 18-13 长时间运行的事务\n\n该查询通过 `sys.dm_tran_session_transactions` 连接到 `sys.dm_exec_sessions`\
  \ 来工作。此 DMV 可用于将事务与会话关联起来，它返回表 18-12 中描述的列。\n\n表 18-12 `sys.dm_tran_session_transactions`\
  \ 列\n\n| 列 | 描述 |\n| --- | --- |\n| `session_id` | 运行事务的会话 ID。 |\n| `transaction_id`\
  \ | 事务的唯一 ID。 |\n| `transaction_descriptor` | 用于与客户端驱动程序通信的 ID。 |\n| `enlist_count`\
  \ | 会话中活动请求的数量。 |\n| `is_user_transaction` | 指示事务是用户事务还是系统事务。`0` 表示系统事务，`1` 表示用户事务。\
  \ |\n| `is_local` | 指示事务是否为分布式事务。`0` 表示分布式事务，`1` 表示本地事务。 |\n| `is_enlisted` | 指示已征用分布式事务。\
  \ |\n| `is_bound` | 指示事务是否在绑定会话中运行。 |\n| `open_transaction_count` | 会话中打开事务的计数。\
  \ |\n\n\n#### 观察锁与争用\n\n当前实例上锁的详细信息通过一个名为 `sys.dm_tran_locks` 的 DMV 暴露。此 DMV 返回表\
  \ 18-13 中详述的列。\n\n表 18-13\n`sys.dm_tran_locks`\n\n| 列名 | 描述 |\n| --- | --- |\n|\
  \ `resource_type` | 锁已放置在其上的资源类型。 |\n| `resource_subtype` | 已被放置锁的资源类型的子类型。例如，如果你正在更新数据库的属性，那么\
  \ `resource_type` 是 `METADATA`，而 `resource_subtype` 是 `DATABASE`。 |\n| `resource_database_id`\
  \ | 包含已加锁资源的数据库的 ID。 |\n| `resource_description` | 关于该资源的其他信息，这些信息未包含在其他列中。 |\n\
  | `resource_associated_entity_id` | 与该资源关联的数据库实体的 ID。 |\n| `resource_lock_partition`\
  \ | 锁的分区号（如果正在使用锁分区）。 |\n| `request_mode` | 已请求或已获取的锁定模式。例如，共享锁为 `S`，排他锁为 `X`。 |\n\
  | `request_type` | `request_type` 始终为 `LOCK`。 |\n| `request_status` | 锁请求的当前状态。可能的值为\
  \ `ABORT_BLOCKERS`、`CONVERT`、`GRANTED`、`LOW_PRIORITY_CONVERT`、`LOW_PRIORITY_WAIT`\
  \ 和 `WAIT`。 |\n| `request_reference_count` | 请求者对同一资源请求锁的次数。 |\n| `request_session_id`\
  \ | 当前拥有该请求的会话 ID。如果事务是分布式的，则会话 ID 可能会改变。 |\n| `request_exec_context_id` | 请求锁的进程的执行\
  \ ID。 |\n| `request_request_id` | 当前拥有该请求的批处理的批处理 ID。如果应用程序正在使用 Multiple Active\
  \ Result Sets (MARS)，此 ID 可能会改变。 |\n| `request_owner_type` | 锁请求所有者的类型。对于用户操作，可能的值为\
  \ `TRANSACTION`、`SESSION` 和 `CURSOR`。值也可以是 `SHARED_TRANSACTION_WORKSPACE` 和 `EXCLUSIVE_TRANSACTION_WORKSPACE`，它们在内部用于保存已登记事务的锁，或者是\
  \ `NOTIFICATION_OBJECT`，由内部 SQL Server 操作使用。 |\n| `request_owner_id` | 拥有锁请求的事务的\
  \ ID，除非请求是由 FileTable 发出的，此时 `-3` 表示表锁，`-4` 表示数据库锁，其他值表示文件的文件句柄。 |\n| `request_owner_guid`\
  \ | 标识请求所有者的 GUID。仅适用于分布式事务。 |\n| `lock_owner_address` | 请求的内部数据结构的内存地址。 |\n\n`sys.dm_os_waiting_tasks`\
  \ DMV 返回有关等待资源（包括锁）的任务的信息。此 DMV 返回的列详见表 18-14。此 DMV 可与 `sys.dm_tran_locks` 结合使用，以查找由于锁而被阻塞和正在阻塞的进程的详细信息。\n\
  \n表 18-14\n`sys.dm_os_waiting_tasks` 列\n\n| 列名 | 描述 |\n| --- | --- |\n| `waiting_task_address`\
  \ | 正在等待的任务的地址。 |\n| `session_id` | 运行等待任务的会话的 ID。 |\n| `exec_context_id` | 运行该任务的线程和子线程的\
  \ ID。 |\n| `wait_duration_ms` | 等待的持续时间，以毫秒为单位。 |\n| `wait_type` | 正在经历的等待类型。等待在第\
  \ 17 章中讨论。 |\n| `resource_address` | 任务正在等待的资源的地址。 |\n| `blocking_task_address`\
  \ | 指示当前正在使用该资源的任务的地址。 |\n| `blocking_session_id` | 当前正在使用该资源的任务的会话 ID。 |\n| `blocking_exec_context_id`\
  \ | 当前正在使用该资源的任务的线程和子线程的 ID。 |\n| `resource_description` | 关于资源的其他信息，这些信息未包含在其他列中，包括锁资源所有者。\
  \ |\n\n清单 18-14 中的脚本演示了如何使用 `sys.dm_tran_locks` 和 `sys.dm_os_waiting_tasks` 来识别实例上的阻塞。该脚本包含三个部分，每个部分都应在单独的查询窗口中运行。脚本的前两部分导致争用。第三部分识别争用的来源。\n\
  \n```\n--Part 1 - 在第 1 个查询窗口中运行\nBEGIN TRANSACTION\nUPDATE Customers\nSET CreditLimit\
  \ = CreditLimit ;\n--Part 2 - 在第 2 个查询窗口中运行\nSELECT creditlimit\nFROM dbo.Customers\
  \ (SERIALIZABLE) ;\n--Part 3 - 在第 3 个查询窗口中运行\nSELECT\nDB_NAME(tl.resource_database_id)\
  \ DatabaseName\n,tl.resource_type\n,tl.resource_subtype\n,tl.resource_description\n\
  ,tl.request_mode\n,tl.request_status\n,os.session_id BlockedSession\n,os.blocking_session_id\
  \ BlockingSession\n,os.resource_description\n,OBJECT_NAME(\nCAST(\nSUBSTRING(os.resource_description,\n\
  CHARINDEX('objid=',os.resource_description,0)+6,9)\nAS INT)\n) LockedTable\nFROM\
  \ sys.dm_os_waiting_tasks os\nINNER JOIN sys.dm_tran_locks tl\nON os.session_id\
  \ = tl.request_session_id\nWHERE tl.request_owner_type IN ('TRANSACTION', 'SESSION',\
  \ 'CURSOR') ;\n```\n清单 18-14\n使用 `sys.dm_tran_locks`\n\n#### 提示\n\n要停止阻塞，请在第一个查询窗口中运行\
  \ `ROLLBACK`。\n\n图 18-5 中的结果显示，脚本的第二部分正被脚本的第一部分阻塞。最后一列从 `resource_description` 列中提取对象\
  \ ID，并识别发生争用的表。\n\n![../images/333037_2_En_18_Chapter/333037_2_En_18_Fig5_HTML.jpg](img/333037_2_En_18_Fig5_HTML.jpg)\n\
  \n图 18-5\n`sys.dm_tran_locks` 结果\n\n#### 观察死锁\n\n通过打开跟踪标志 1204 和 1222，可以捕获死锁的详细信息并将其写入错误日志。跟踪标志\
  \ 1204 捕获死锁中涉及的资源和锁类型的详细信息。它包含死锁中涉及的每个节点的一个部分，后面是一个详细说明死锁受害者的内容。跟踪标志 1222 返回三个部分。第一部分给出死锁受害者的详细信息；第二部分给出死锁中涉及的进程的详细信息；最后一部分描述死锁中涉及的资源。\n\
  \n在现代 SQL Server 世界中，通常不需要打开这些跟踪标志，因为你可以通过查看系统运行状况会话（`system_health`）来回溯死锁的详细信息，这是每个\
  \ SQL Server 实例上默认启用的 Extended Events 会话。除其他重要详细信息外，系统运行状况会话捕获发生的任何死锁的详细信息。你可以通过在\
  \ SQL Server Management Studio 中深入到 Management ➤ Extended Events ➤ Sessions ➤ `system_health`，然后从\
  \ `Package0.eventfile` 的上下文菜单中选择 View Target Data 来访问系统运行状况会话。如果在 name 列中搜索 `xml_deadlock_report`，你将看到已发生的死锁事件的详细信息。Details\
  \ 选项卡提供完整的死锁报告，包括关于死锁受害者以及死锁中涉及的进程、资源和所有者的信息。Deadlock 选项卡显示死锁图，如图 18-6 所示，对应于我们在清单\
  \ 18-2 中生成的死锁。\n\n#### 注意\n\n如果系统运行状况会话有回滚大小限制，则死锁的详细信息可能会丢失。\n\n![../images/333037_2_En_18_Chapter/333037_2_En_18_Fig6_HTML.jpg](img/333037_2_En_18_Fig6_HTML.jpg)\n\
  \n图 18-6\n死锁图\n\n### 概述\n\n锁可以在不同的**粒度**级别上被获取。在较低级别进行锁定可以减少争用，但会为内部锁内存结构使用额外资源。在较高级别进行锁定可能会增加其他进程的等待时间，并增加死锁的可能性。SQL\
  \ Server 2014 引入了新功能，使数据库管理员能够控制联机维护操作（如索引重建和分区切换操作）的锁定行为。在拥有 16 个或更多内核实例的大型系统上，SQL\
  \ Server 会自动实现锁分区，通过将单个锁资源拆分为多个资源来减少争用。\n\n事务具有 **ACID** 属性，使其具备原子性、一致性、隔离性和持久性。然而，SQL\
  \ Server 提供了放宽其中一些规则的功能，以提高性能并简化编码。针对磁盘表有六种隔离级别可用，其中两种是乐观的，其余是悲观的。悲观隔离级别通过获取锁来避免事务异常，而乐观并发则依赖于行版本控制。\n\
  \n由于内存优化表不支持锁，因此针对内存优化表的所有事务都使用乐观并发。SQL Server 实现了乐观隔离级别，这些级别只能用于内存优化表。由于事务的乐观特性，您应该为只读和读写事务都实现重试逻辑。\n\
  \nSQL Server 提供了丰富的元数据，可以帮助数据库管理员观察事务、锁、争用和死锁。`Sys.dm_tran_active_transactions`\
  \ 显示当前在实例上处于活动状态的事务的详细信息。`Sys.dm_tran_locks` 提供有关当前在实例中被请求或已授予的锁的信息。您可以通过启用跟踪标志\
  \ 1204 和 1222 在 SQL Server 错误日志中捕获死锁信息，但系统运行状况跟踪默认也会捕获死锁信息。这意味着您可以事后检索死锁信息，而无需执行预先配置或跟踪。\n\
  \n# 19. 扩展事件\n\n扩展事件是 SQL Server 提供的一种轻量级监视系统。由于其架构使用的系统资源非常少，因此扩展性很好，并且允许您以对用户活动影响最小的方式监视实例。它们还具有高度可配置性，这使您在数据库管理员角色中拥有广泛的选项来捕获从非常细粒度（如页面拆分）到更高级别详细信息（如\
  \ **CPU** 利用率）的详细信息。您还可以将扩展事件与操作系统数据关联起来，以便在排查问题时提供整体视图。扩展事件的前身是 **SQL Trace** 及其\
  \ **GUI** 工具 **Profiler**。该工具现已不推荐用于数据库引擎，建议仅将其用于跟踪 **Analysis Service** 活动。\n\n\
  在本章中，我们将讨论与扩展事件相关的概念，然后讨论如何实现该技术。最后，我们将讨论如何将其与操作系统计数器集成。\n\n### 扩展事件概念\n\n扩展事件具有丰富的架构，由事件、目标、操作、类型、谓词和映射组成。这些对象存储在包内，而包又存储在模块内，模块可以是\
  \ `.dll` 文件或可执行文件。我们将在以下部分讨论这些概念。\n\n#### 包\n\n*包* 是扩展事件中使用的对象的容器。以下是 SQL Server\
  \ 的四种包类型：\n\n*   `Package0`：默认包，用于扩展事件系统对象。\n*   `Sqlserver`：用于 SQL Server 相关对象。\n\
  *   `Sqlos`：用于 SQLOS 相关对象。\n*   `SecAudit`：由 SQL 审计使用；但其对象不对外暴露。\n\n#### 事件\n\n\
  *事件* 是您可以跟踪的感兴趣的发生事项。它可以是一个 SQL 批处理完成、一次缓存未命中、一次页面拆分，或者根据您配置的跟踪性质，几乎任何可能发生在数据库引擎内部的事情。每个事件都通过通道和关键字（也称为类别）进行分类。*通道*\
  \ 是高级分类，SQL Server 2019 中的所有事件都属于表 19-1 中描述的通道之一。\n\n表 19-1 通道\n\n| 通道 | 描述 |\n\
  | --- | --- |\n| Admin | 具有明确解决方案的已知事件。例如，死锁、服务器启动、CPU 阈值被超过以及使用已弃用的功能。 |\n| Operational\
  \ | 用于排查问题。例如，检测到坏内存、AlwaysOn 可用性组副本更改其状态以及检测到长时间 I/O，这些都是属于 Operational 通道的事件。\
  \ |\n| Analytic | 可用于排查性能等问题的高容量事件。例如，事务开始、获取锁以及文件读取完成，这些都是属于 Analytic 通道的事件。 |\n\
  | Debug | 开发人员用于通过返回内部数据来诊断问题。Debug 通道中的事件在 SQL Server 的未来版本中可能会更改，因此应尽可能避免使用它们。\
  \ |\n\n关键字，也称为类别，粒度要细得多。SQL Server 2019 中有 88 个类别。可以通过运行清单 19-1 中的查询来列出这些类别。\n\n\
  ```\nSELECT DISTINCT map_value AS Category\nFROM sys.dm_xe_map_values map\nWHERE\
  \ map.name = 'keyword_map'\nORDER BY map.map_value\n```\n\n清单 19-1 返回类别列表\n\n####\
  \ 目标\n\n*目标* 是事件的消费者；本质上，它是跟踪数据将被写入的设备。SQL Server 2019 中可用的目标详见表 19-2。\n\n表 19-2\
  \ 目标\n\n| 目标 | 同步/异步 | 描述 |\n| --- | --- | --- |\n| Event counter | 同步 | 统计会话期间发生的事件数量\
  \ |\n| Event file | 异步 | 将事件输出写入内存缓冲区，然后将其刷新到磁盘 |\n| Event pairing | 异步 | 确定是否发生了配对事件而没有其匹配事件，例如，一个语句开始但从未完成\
  \ |\n| ETW* | 同步 | 用于将扩展事件与操作系统数据关联 |\n| Histogram | 异步 | 根据操作或事件列统计会话期间发生的事件数量\
  \ |\n| Ring buffer | 异步 | 使用先进先出方法将数据存储在内存缓冲区中 |\n\n***Event Tracking for Windows**\n\
  \n#### 操作\n\n*操作* 是允许在事件触发时捕获附加信息的命令。当事件发生时，操作会同步触发，事件本身并不知道该操作。SQL Server 2019\
  \ 中有 64 个可用操作，允许您捕获丰富的信息数组，包括导致事件触发的语句、运行该语句的登录名、事务 **ID**、**CPU ID** 以及调用堆栈。\n\n\
  \n#### 谓词\n\n`Predicates`是系统在向目标发送事件之前可以应用的筛选条件。您可以创建简单的谓词，例如基于数据库 ID 筛选完成的语句；也可以创建更复杂的谓词，例如仅捕获持续时间超过\
  \ 5 秒的长 IO，或者仅当 AlwaysOn 可用性组副本的角色更改发生超过两次时才捕获该事件。\n\n谓词也完全支持短路求值。这意味着如果您在谓词中使用多个条件，那么谓词的顺序就很重要，因为如果第一个谓词的评估失败，第二个谓词将不会被评估。由于谓词是同步评估的，这可能会对性能产生影响。因此，明智的做法是设计您的谓词，使最不可能评估为`true`的谓词排在非常可能评估为`true`的谓词之前。例如，假设您计划筛选一个特定数据库（数据库\
  \ ID 为`6`），该数据库是实例上高比例活动的目标，但您也计划筛选一个特定用户 ID（`MyUser`），该用户负责较低比例的活动。在此场景中，您将使用`WHERE\
  \ (([sqlserver].[username]=N'MyUser') AND ([sqlserver].[database_id]=(6)))`谓词，首先筛选掉与`MyUser`无关的活动，然后筛选掉与数据库\
  \ ID`6`无关的活动。\n\n#### 类型和映射\n\n包中的所有对象都被分配了一个类型。此类型用于解释存储在对象字节集合中的数据。对象被分配为以下类型之一：\n\
  \n*   `Action`\n*   `Event`\n*   `Pred_compare`（从事件中检索数据）\n*   `Pred_source`（比较数据类型）\n\
  *   `Target`\n*   `Type`\n\n您可以通过执行清单[19-2]中的查询来找到谓词比较器和谓词源的列表。\n\n```\n--Retrieve\
  \ list of predicate comparators\nSELECT name\n,description,\n(SELECT name\nFROM\
  \ sys.dm_xe_packages\nWHERE guid = xo.package_guid) Package\nFROM sys.dm_xe_objects\
  \ xo\nWHERE object_type = 'pred_compare'\nORDER BY name ;\n--Retrieve list of predicate\
  \ sources\nSELECT name\n,description,\n(SELECT name\nFROM sys.dm_xe_packages\nWHERE\
  \ guid = xo.package_guid) Package\nFROM sys.dm_xe_objects xo\nWHERE object_type\
  \ = 'pred_source'\nORDER BY name ;\nListing 19-2\nRetrieving Predicate Comparators\
  \ and Sources\n```\n\n*映射*是一个字典，将内部 ID 值映射为 DBA 可以理解的字符串。映射键仅在其上下文中是唯一的，并在不同上下文之间重复。例如，在`statement_recompile_cause`上下文中，`map_key`为`1`对应于`map_value`为`Schema\
  \ Changed`。然而，在`database_sql_statement`类型的上下文中，`map_key`为`1`对应于`map_value`为`CREATE\
  \ DATABASE`。您可以使用`sys.dm_xe_map_values` DMV 查找完整的映射列表，如清单[19-3]所示。要检查特定上下文的映射，请对\
  \ name 列进行筛选。\n\n```\nSELECT\nmap_key\n, map_value\n, name\nFROM sys.dm_xe_map_values\
  \ ;\nListing 19-3\nSys.dm_xe_map_values\n```\n\n#### 会话\n\n*会话*本质上是一个跟踪。它可以包含来自多个包、操作、目标和谓词的事件。当您启动或停止会话时，就是在打开或关闭跟踪。会话启动时，事件被写入内存缓冲区，并在发送到目标之前应用谓词。因此，在创建会话时，您需要配置属性，例如会话可用于缓冲的内存量、如果会话遇到内存压力可以丢弃哪些事件，以及事件发送到目标前的最大延迟。\n\
  \n### 创建事件会话\n\n您可以使用新建会话向导、新建会话对话框或通过 T-SQL 创建事件会话。我们将在以下部分探讨这些选项。然而，在创建任何事件会话之前，我们首先创建`Chapter19`数据库，用数据填充它，并创建存储过程，这些将在后面的示例中使用。清单[19-4]包含执行此操作的脚本。\n\
  \n```\n--Create the database\nCREATE DATABASE Chapter19 ;\nGO\nUSE Chapter19\nGO\n\
  --Create and populate numbers table\nDECLARE @Numbers TABLE\n(\nNumber        INT\n\
  )\n;WITH CTE(Number)\nAS\n(\nSELECT 1 Number\nUNION ALL\nSELECT Number + 1\nFROM\
  \ CTE\nWHERE Number < 100\n)\nINSERT INTO @Numbers\nSELECT Number FROM CTE;\n--Create\
  \ and populate name pieces\nDECLARE @Names TABLE\n(\nFirstName        VARCHAR(30),\n\
  LastName        VARCHAR(30)\n);\nINSERT INTO @Names\nVALUES('Peter', 'Carter'),\n\
  ('Michael', 'Smith'),\n('Danielle', 'Mead'),\n('Reuben', 'Roberts'),\n('Iris', 'Jones'),\n\
  ('Sylvia', 'Davies'),\n('Finola', 'Wright'),\n('Edward', 'James'),\n('Marie', 'Andrews'),\n\
  ('Jennifer', 'Abraham');\n--Create and populate Customers table\nCREATE TABLE dbo.Customers\n\
  (\nCustomerID           INT                NOT NULL        IDENTITY            \
  \        PRIMARY KEY,\nFirstName            VARCHAR(30)        NOT NULL,\nLastName\
  \             VARCHAR(30)        NOT NULL,\nBillingAddressID     INT           \
  \     NOT NULL,\nDeliveryAddressID    INT                NOT NULL,\nCreditLimit\
  \          MONEY              NOT NULL,\nBalance              MONEY            \
  \  NOT NULL\n);\nSELECT * INTO #Customers\nFROM\n(SELECT\n(SELECT TOP 1 FirstName\
  \ FROM @Names ORDER BY NEWID()) FirstName,\n(SELECT TOP 1 LastName FROM @Names ORDER\
  \ BY NEWID()) LastName,\n(SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) BillingAddressID,\n\
  (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) DeliveryAddressID,\n(SELECT\
  \ TOP 1 CAST(RAND() * Number AS INT) * 10000\nFROM @Numbers\nORDER BY NEWID()) CreditLimit,\n\
  (SELECT TOP 1 CAST(RAND() * Number AS INT) * 9000\nFROM @Numbers\nORDER BY NEWID())\
  \ Balance\nFROM @Numbers a\nCROSS JOIN @Numbers b\n) a;\nINSERT INTO dbo.Customers\n\
  SELECT * FROM #Customers;\nGO\nCREATE INDEX idx_LastName ON dbo.Customers(LastName)\n\
  GO\nCREATE PROCEDURE UpdateCustomerWithPageSplits\nAS\nBEGIN\nUPDATE dbo.Customers\n\
  SET FirstName = cast(FirstName + replicate(FirstName,10) as varchar(30))\n,LastName\
  \ = cast(LastName + replicate(LastName,10) as varchar(30)) ;\nEND ;\nGO\nCREATE\
  \ PROCEDURE UpdateCustomersWithoutPageSplits\nAS\nBEGIN\nUPDATE dbo.Customers\n\
  SET CreditLimit = CreditLimit * 1.5\nWHERE Balance < CreditLimit - 10000 ;\nEND\
  \ ;\nGO\nListing 19-4\nCreating the Chapter19 Database\n```\n\n\n\n### 使用新建会话对话框\n\
  \n在 SQL Server Management Studio 中，首先在对象资源管理器中依次展开“管理” ➤ “扩展事件”，然后从“会话”上下文菜单中选择“新建会话”，即可访问新建会话对话框。我们使用此对话框来创建一个会话，用于监视页拆分并将其与引发拆分的存储过程关联起来。为实现这一点，我们需要启用**因果跟踪**，这会为每个事件赋予一个额外的\
  \ GUID 值（称为 `ActivityID`）和一个序列号；这两者共同作用，使得事件可以相互关联。\n\n当你调用此对话框时，首先显示的是“常规”页面，如图\
  \ 19-1 所示。在此页面上，你可以指定会话的名称，选择是否在创建完成后自动启动会话、是否在实例启动时自动启动，是否在会话完成后启动实时数据视图，以及是否应启用因果跟踪。\n\
  \n由于我们将监视页拆分，因此将此会话命名为 `PageSplits`，并指定会话应在创建后和实例启动时均自动启动。同时，我们也开启了因果跟踪。\n\n![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig1_HTML.jpg](img/333037_2_En_19_Fig1_HTML.jpg)\n\
  图 19-1: “常规”页面\n\n在“事件”页面上，我们首先搜索并选择 `page_split` 和 `module_start` 事件，如图 19-2 所示。每当可编程对象触发时，都会触发\
  \ `module_start` 事件。\n\n![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig2_HTML.jpg](img/333037_2_En_19_Fig2_HTML.jpg)\n\
  图 19-2: “事件”页面\n\n现在，我们需要使用“配置”按钮来配置每个事件。在配置屏幕的“全局字段（操作）”选项卡中，我们为 `module_start`\
  \ 事件选择 `nt_username` 和 `database_name` 操作，如图 19-3 所示。\n\n![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig3_HTML.jpg](img/333037_2_En_19_Fig3_HTML.jpg)\n\
  图 19-3: “全局字段（操作）”选项卡\n\n#### 提示\n\n如果需要为多个事件配置相同的操作，可以多选这些事件。\n\n在“筛选器（谓词）”选项卡中，我们将\
  \ `page_split` 事件配置为基于 `database_name` 进行筛选，本例中该名称为 `Chapter19`，如图 19-4 所示。这意味着仅捕获与该数据库相关的页拆分。我们不对\
  \ `module_start` 事件按 `database_name` 进行筛选，因为理论上，导致页拆分的存储过程可能来自任何数据库。\n\n![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig4_HTML.jpg](img/333037_2_En_19_Fig4_HTML.jpg)\n\
  图 19-4: “筛选器（谓词）”选项卡\n\n在配置屏幕的“事件字段”选项卡中，显示了与该事件相关的字段。如果有任何可选字段，我们可以选择它们。图 19-5\
  \ 显示我们已为 `module_start` 事件选择了 `statement` 字段。\n\n![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig5_HTML.jpg](img/333037_2_En_19_Fig5_HTML.jpg)\n\
  图 19-5: “事件字段”选项卡\n\n在新建会话对话框的“数据存储”页面上，我们配置目标。针对我们的场景，我们配置了一个事件文件目标，如图 19-6 所示。参数是上下文相关的，具体取决于你选择的目标类型。由于我们选择了文件目标，因此需要配置文件的位置和最大大小。我们还需要指定当初始文件变满时是否要创建新文件，以及如果创建，应发生多少次。\n\
  \n![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig6_HTML.jpg](img/333037_2_En_19_Fig6_HTML.jpg)\n\
  图 19-6: “数据存储”页面\n\n在“高级”页面上，我们可以指定内存压力下的期望行为：是否可接受单个事件丢失，是否可接受多个事件丢失，或者是否应完全无事件丢失。我们还可以设置事件的最小和最大大小，以及应如何应用内存分区。这一点将在下一节中更详细地讨论。此外，我们还可以配置分发延迟。这表示事件在刷新到磁盘前保留在缓冲区中的最长时间。\n\
  \n### 使用 T-SQL\n\n你也可以使用 `CREATE EVENT SESSION` DDL 语句通过 T-SQL 创建事件会话。该命令接受表 19-3\
  \ 中详述的参数。\n\n表 19-3: 创建事件会话的参数\n\n| 参数 | 说明 |\n| --- | --- |\n| `event_session_name`\
  \ | 你正在创建的事件会话的名称。 |\n| `ADD EVENT` / `SET` | 为添加到会话的每个事件指定，后跟事件名称，格式为 `package.event`。你可以使用\
  \ `SET` 语句来设置事件特定的自定义项，例如包含非必需的事件字段。 |\n| `ACTION` | 如果应为该事件捕获全局字段，则在每个 `ADD EVENT`\
  \ 参数之后指定。 |\n| `WHERE` | 如果应对事件进行筛选，则在每个 `ADD EVENT` 参数之后指定。 |\n| `ADD TARGET` /\
  \ `SET` | 为将添加到会话的每个目标指定。你可以使用 `SET` 语句来填充目标特定的参数，例如 `event_file` 目标的文件名参数。 |\n\n\
  该语句还接受 `WITH` 选项，详见表 19-4。`WITH` 语句在 `CREATE EVENT SESSION` 语句的末尾指定一次。\n\n表 19-4:\
  \ 创建事件会话的 WITH 选项\n\n| 选项 | 说明 |\n| --- | --- |\n| `MAX_MEMORY` | 事件会话在将事件分发到目标之前可用于缓冲事件的最大内存量。\
  \ |\n| `EVENT_RETENTION_MODE` | 指定缓冲区变满时的行为。可接受的值为 `ALLOW_SINGLE_EVENT_LOSS`（表示如果所有缓冲区已满，可以丢弃单个事件）；`ALLOW_MULTIPLE_EVENT_LOSS`（表示如果所有缓冲区已满，可以丢弃整个缓冲区）；以及\
  \ `NO_EVENT_LOSS`（表示触发事件的任务将等待，直到缓冲区中有空间）。 |\n| `MAX_DISPATCH_LATENCY` | 事件在刷新到目标之前可在会话缓冲区中驻留的最长时间，以秒为单位。\
  \ |\n| `MAX_EVENT_SIZE` | 任何单个事件的事件数据的最大可能大小。可以千字节或兆字节为单位指定，仅应配置为允许大于 `MAX_MEMORY`\
  \ 设置的事件。 |\n| `MEMORY_PARTITION_MODE` | 指定在何处创建事件缓冲区。可接受的值为 `NONE`（表示缓冲区将在实例内创建）；`PER_NODE`（表示缓冲区将为每个\
  \ NUMA 节点创建）；以及 `PER_CPU`（表示缓冲区将为每个 CPU 创建）。 |\n| `TRACK_CAUSALITY` | 指定将为每个事件存储一个额外的\
  \ GUID 和序列号，以便可以关联事件。 |\n| `STARTUP_STATE` | 指定会话是否在实例启动时自动启动。`ON` 表示是，`OFF` 表示否。\
  \ |\n\n```sql\nCREATE EVENT SESSION [event_session_name] ON SERVER\nADD EVENT ...\n\
  ADD TARGET ...\nWITH ( ... );\n```\n\n\n\n#### 注意\n\n使用 `EVENT_RETENTION_MODE` 的\
  \ `NO_EVENT_LOSS` 选项可能会导致实例出现性能问题，因为任务可能必须等待，直到事件会话的缓冲区中有空间容纳事件数据才能完成。\n\n清单 19-5\
  \ 中的脚本演示了如何使用 T-SQL 创建一个名为 `LogFileIO` 的会话。此会话类似于通过 GUI 提供的“数据库日志文件 IO 跟踪”模板。不同之处在于，我们额外捕获了\
  \ `sqlos.wait_completed` 事件和 `sqlserver.DatabaseName` 全局字段，并且我们还对此进行了筛选，以便仅跟踪 `Chapter19`\
  \ 事务日志的详细信息。\n\n跟踪结果将写入 `C:\\Logs` 文件夹中名为 `LogFileIO.xel` 的文件（该文件夹需要预先创建）。`STARTUP_STATE`\
  \ 选项用于启动会话。\n\n```sql\nCREATE EVENT SESSION [LogFileIO] ON SERVER\nADD EVENT sqlos.async_io_completed(\n\
  ACTION(sqlserver.database_name)\nWHERE ([sqlserver].[database_name]=N'Chapter19')),\n\
  ADD EVENT sqlos.async_io_requested(\nACTION(sqlserver.database_name)\nWHERE ([sqlserver].[database_name]=N'Chapter19')),\n\
  ADD EVENT sqlos.spinlock_backoff(\nACTION(sqlserver.database_name,sqlserver.sql_text)\n\
  WHERE (([package0].equal_uint64)) AND ([sqlserver].[database_name]=N'Chapter19'))),\n\
  ADD EVENT sqlos.wait_completed(\nACTION(sqlserver.database_name)\nWHERE ([sqlserver].[database_name]=N'Chapter19')),\n\
  ADD EVENT sqlos.wait_info(\nACTION(sqlserver.client_app_name,sqlserver.database_name,sqlserver.is_system,sqlserver.session_id)\n\
  WHERE ((([package0].equal_uint64)) AND ([package0].equal_uint64))) AND ([sqlserver].[database_name]=N'Chapter19'))),\n\
  ADD EVENT sqlserver.databases_log_flush(\nACTION(sqlserver.database_name)\nWHERE\
  \ ([sqlserver].[database_name]=N'Chapter19')),\nADD EVENT sqlserver.databases_log_flush_wait(\n\
  ACTION(sqlserver.database_name)\nWHERE ([sqlserver].[database_name]=N'Chapter19')),\n\
  ADD EVENT sqlserver.file_write_completed(SET collect_path=(1)\nACTION(sqlserver.database_name)\n\
  WHERE (([package0].equal_uint64)) AND ([sqlserver].[database_name]=N'Chapter19'))),\n\
  ADD EVENT sqlserver.file_written(SET collect_path=(1)\nACTION(sqlserver.database_name)\n\
  WHERE (([package0].equal_uint64)) AND ([sqlserver].[database_name]=N'Chapter19')))\n\
  ADD TARGET package0.event_file(SET filename=N'C:\\Logs\\LogFileIO.xel',max_file_size=(512)),\n\
  ADD TARGET package0.histogram(SET filtering_event_name=N'sqlos.spinlock_backoff',source=N'sqlserver.sql_text'),\n\
  ADD TARGET package0.ring_buffer\nWITH (MAX_MEMORY=4096 KB, EVENT_RETENTION_MODE=ALLOW_SINGLE_EVENT_LOSS,MAX_DISPATCH_LATENCY=30\
  \ SECONDS,MAX_EVENT_SIZE=0 KB, MEMORY_PARTITION_MODE=NONE,TRACK_CAUSALITY=OFF,STARTUP_STATE=ON)\n\
  GO\n```\n清单 19-5 创建事件会话\n\n#### 注意\n\n由于 `STARTUP_STATE` 配置为 `ON`，此会话将自动启动。\n\n\
  ### 查看收集的数据\n\nSQL Server 提供了一个数据查看器，您可以使用它对来自文件或缓冲区的实时事件数据进行基本分析。然而，对于更复杂的分析，您可以通过\
  \ T-SQL 访问和操作事件数据。以下各节讨论了这些分析方法。\n\n#### 使用数据分析器分析数据\n\n您可以通过在对象资源管理器中依次展开“管理”➜“扩展事件”➜“会话”，然后从会话上下文菜单中选择“查看实时数据”，来使用数据分析器观察数据到达缓冲区时的实时情况。或者，您可以通过展开会话并从目标上下文菜单中选择“查看目标数据”来查看目标中的数据。\n\
  \n#### 提示\n\n数据分析器不支持环形缓冲区或 ETW 目标类型。\n\n清单 19-6 中的脚本向 `Chapter19` 数据库中的 `Customers`\
  \ 表插入数据，这会导致事务日志产生 IO 活动，该活动会被我们的 `LogFileIO` 会话捕获。\n\n```sql\nUSE Chapter19\nGO\n\
  --Create and populate numbers table\nDECLARE @Numbers TABLE\n(\nNumber        INT\n\
  )\n;WITH CTE(Number)\nAS\n(\nSELECT 1 Number\nUNION ALL\nSELECT Number + 1\nFROM\
  \ CTE\nWHERE Number < 100\n)\nINSERT INTO @Numbers\nSELECT Number FROM CTE;\n--Create\
  \ and populate name pieces\nDECLARE @Names TABLE\n(\nFirstName        VARCHAR(30),\n\
  LastName        VARCHAR(30)\n);\nINSERT INTO @Names\nVALUES('Peter', 'Carter'),\n\
  ('Michael', 'Smith'),\n('Danielle', 'Mead'),\n('Reuben', 'Roberts'),\n('Iris', 'Jones'),\n\
  ('Sylvia', 'Davies'),\n('Finola', 'Wright'),\n('Edward', 'James'),\n('Marie', 'Andrews'),\n\
  ('Jennifer', 'Abraham');\n--Insert to Customers\nSELECT * INTO #Customers\nFROM\n\
  (SELECT\n(SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName,\n(SELECT\
  \ TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName,\n(SELECT TOP 1 Number FROM\
  \ @Numbers ORDER BY NEWID()) BillingAddressID,\n(SELECT TOP 1 Number FROM @Numbers\
  \ ORDER BY NEWID()) DeliveryAddressID,\n(SELECT TOP 1 CAST(RAND() * Number AS INT)\
  \ * 10000\nFROM @Numbers\nORDER BY NEWID()) CreditLimit,\n(SELECT TOP 1 CAST(RAND()\
  \ * Number AS INT) * 9000\nFROM @Numbers\nORDER BY NEWID()) Balance\nFROM @Numbers\
  \ a\nCROSS JOIN @Numbers b\nCROSS JOIN @Numbers c\n) a;\nINSERT INTO dbo.Customers\n\
  SELECT * FROM #Customers ;\nGO\n```\n清单 19-6 插入数据到 Customers 表\n\n如果现在在对象资源管理器中为\
  \ `LogFileIO` 会话下的 `event_file` 目标打开数据分析器，我们会看到图 19-7 所示的结果。查看器在网格中显示每个事件和时间戳；选择一个事件会显示该事件的“详细信息”窗格。\n\
  \n![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig7_HTML.jpg](img/333037_2_En_19_Fig7_HTML.jpg)\n\
  图 19-7 event_file 目标的数据视图\n\n请注意，SQL Server Management Studio 中会显示一个数据分析器工具栏，如图\
  \ 19-8 所示。您可以使用此工具栏向网格添加或删除列，以及执行分组和聚合操作。\n\n![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig8_HTML.jpg](img/333037_2_En_19_Fig8_HTML.jpg)\n\
  图 19-8 数据分析器工具栏\n\n单击“选择列”按钮会调用“选择列”对话框。我们使用此对话框将 `duration` 和 `wait_type` 列添加到网格，如图\
  \ 19-9 所示。\n\n![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig9_HTML.jpg](img/333037_2_En_19_Fig9_HTML.jpg)\n\
  图 19-9 “选择列”对话框\n\n我们现在可以右键单击 `Wait_Type` 列并选择 `Group By This Column` 选项。这将导致所有事件按“等待类型”级别进行汇总。\n\
  \n我们现在可以使用“聚合”按钮调用“聚合”对话框。我们可以使用此对话框将聚合函数（如 `SUM`、`AVG` 或 `COUNT`）应用于数据。也可以按聚合值对数据进行排序。图\
  \ 19-10 显示我们正在使用此对话框添加等待持续时间的 `SUM`。\n\n![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig10_HTML.jpg](img/333037_2_En_19_Fig10_HTML.jpg)\n\
  图 19-10 “聚合”对话框\n\n在数据分析器网格中，我们现在可以看到 `wait_type` 对应的 `duration` 列的 `SUM`，如果展开此分组，则会显示详细粒度信息，如图\
  \ 19-11 所示。\n\n![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig11_HTML.jpg](img/333037_2_En_19_Fig11_HTML.jpg)\n\
  图 19-11 数据分析器网格\n\n\n### 使用 T-SQL 分析数据\n\n如果你需要对数据进行更复杂的分析，则可以通过 T-SQL 实现。`sys.fn_xe_file_target_read_file`\
  \ 函数通过读取目标文件并以 XML 格式返回每个事件的一行使这成为可能。`sys.fn_xe_file_target_read_file` 接受表 19-5\
  \ 中详述的参数。\n\n**表 19-5: `sys.fn_xe_file_target_read_file` 参数**\n\n| 参数 | 描述 |\n|\
  \ --- | --- |\n| `path` | `.XEL` 文件的文件路径和文件名。可以包含 `*` 通配符以包含回滚文件。 |\n| `mdpath`\
  \ | 元数据文件的文件路径和名称。对于 SQL Server 2012 及以上版本不是必需的，仅为向后兼容而保留，因此你应始终传递 `NULL`。 |\n|\
  \ `initial_file_name` | 路径中要读取的第一个文件。如果此参数不为 `NULL`，则还必须指定 `initial_offset`。 |\n\
  | `initial_offset` | 指定最后读取的偏移量，以便跳过之前的所有事件。如果指定此参数，则还必须指定 `initial_file_name`。\
  \ |\n\n`sys.fn_xe_file_target_read_file` 过程返回表 19-6 中详述的列。\n\n**表 19-6: `sys.fn_xe_file_target_read_file`\
  \ 结果**\n\n| 列 | 描述 |\n| --- | --- |\n| `module_guid` | 包含包的模块的 GUID |\n| `package_guid`\
  \ | 包含事件的包的 GUID |\n| `object_name` | 事件的名称 |\n| `event_data` | 事件数据，XML 格式 |\n\
  | `file_name` | 包含事件的 XEL 文件名 |\n| `file_offset` | 文件中包含事件的块的偏移量 |\n\n由于事件数据以 `XML`\
  \ 格式返回，我们需要使用 `XQuery` 将节点分解为关系数据。对 `XQuery` 的完整描述超出了本书的范围，但 Microsoft 在 [`https://msdn.microsoft.com`](https://msdn.microsoft.com)\
  \ 上提供了 `XQuery` 语言参考。\n\n清单 19-7 中的脚本在 `Chapter19` 数据库中运行 `UpdateCustomersWithPageSplits`\
  \ 和 `UpdateCustomersWithoutPageSplits` 过程，然后使用 `sys.fn_xe_file_target_read_file`\
  \ 提取事件数据。接着，我们使用 `XQuery` 的 `Value` 方法从 `XML` 结果中提取关系值。最后，因为我们启用了因果跟踪，我们按关联 `GUID`\
  \ 对数据进行分组，以查看每个存储过程导致了多少次页面拆分。`UpdateWithoutPageSplits` 提供了一个对比。\n\n#### 提示\n运行查询前，请记得更新文件路径以匹配你自己的配置。\n\
  \n```\n--运行更新过程\nEXEC UpdateCustomersWithoutPageSplits ;\nGO\nEXEC UpdateCustomerWithPageSplits\
  \ ;\nGO\n--等待 30 秒，以便 XE 缓冲区刷新到目标\nWAITFOR DELAY '00:00:30' ;\n--查询 XE 目标\nSELECT\
  \ c.procedurename, d.pagesplits\nFROM\n(\nSELECT\ncorrelationid,\nCOUNT(*) -1 PageSplits\
  \ -- -1 以移除 module_start 事件的计数\nFROM\n(\nSELECT CapturedEvent,\nxml_data.value('(/event/data[@name=\"\
  object_name\"]/value)[1]', 'nvarchar(max)') procedurename,  --提取过程名称\nxml_data.value('(/event/action[@name=\"\
  attach_activity_id\"]/value)[1]', 'uniqueidentifier') correlationid --提取关联 ID\n\
  FROM\n(\n--查询 fn_xe_file_target_read_file 函数以提取原始 XML\nSELECT\nOBJECT_NAME CapturedEvent,\n\
  CAST(event_data AS XML) xml_data\nFROM\nsys.fn_xe_file_target_read_file('C:\\mssql\\\
  pagesplits*.xel', NULL , NULL, NULL) as XE ) a\n) b\nGROUP BY correlationid\n) d\n\
  INNER JOIN --自连接，以便计算页面拆分次数\n(\nSELECT CapturedEvent,\nxml_data.value('(/event/data[@name=\"\
  object_name\"]/value)[1]', 'nvarchar(max)') procedurename,\nxml_data.value('(/event/action[@name=\"\
  attach_activity_id\"]/value)[1]', 'uniqueidentifier') correlationid\nFROM\n(\nSELECT\
  \ object_name CapturedEvent,\nCAST(event_data AS XML) xml_data\nFROM\nsys.fn_xe_file_target_read_file('C:\\\
  mssql\\pagesplits*.xel', NULL , NULL, NULL) as XE ) a\n) c\nON c.correlationid =\
  \ d.correlationid\nAND c.procedurename IS NOT NULL ;\n```\n\n#### 提示\n使用 `XQuery`\
  \ 允许你查询跟踪中捕获的每个事件字段和操作，因此你可以创建非常复杂的查询，为你实例中的活动提供丰富而强大的分析。\n\n### 将扩展事件与操作系统数据关联起来\n\
  \n扩展事件提供了与操作系统级数据集成的功能。这提供了有用的见解，例如 CPU 飙升时正在运行的查询等等。以下部分讨论如何将 SQL Server 事件与 `Perfmon`\
  \ 数据和其他操作系统级事件关联起来。\n\n#### 将事件与 Perfmon 数据关联\n\n在引入扩展事件之前，DBA 使用一个名为 SQL Trace\
  \ 及其 GUI 工具 Profiler 来捕获来自 SQL Server 的跟踪；可以将此数据与来自 `Perfmon` 的数据关联起来。使用扩展事件时，你通常不需要进行这种关联，因为扩展事件包含了处理器、逻辑磁盘和系统性能对象（例如上下文切换和文件写入）的\
  \ `Perfmon` 计数器。因此，通过将这些对象添加到会话中并遵循上一节讨论的 T-SQL 分析技术，你可以将 SQL Server 事件与操作系统计数器关联起来。\n\
  \n\n#### 提示\n\n> `Perfmon 计数器`位于`分析通道`中，但没有类别。\n\n清单 19-8 中的脚本演示了创建一个事件会话，该会话捕获实例内执行的语句以及处理器计数器。系统每\
  \ 15 秒捕获一次每个处理器的处理器计数器。结果保存到`事件文件目标`和`ETW 目标`。\n\n```sql\nCREATE EVENT SESSION Statements_with_Perf_Counters\n\
  ON SERVER\n--Add the Events and Actions relating to each Event\nADD EVENT sqlserver.error_reported(\n\
  ACTION(sqlserver.client_app_name,sqlserver.database_id,sqlserver.query_hash,sqlserver.session_id)\n\
  WHERE ([package0].greater_than_uint64) AND\n[package0].equal_boolean))),\nADD EVENT\
  \ sqlserver.module_end(SET collect_statement=(1)\nACTION(sqlserver.client_app_name,sqlserver.database_id,sqlserver.query_hash,sqlserver.session_id)\n\
  WHERE ([package0].greater_than_uint64) AND\n[package0].equal_boolean))),\nADD EVENT\
  \ sqlserver.perfobject_processor,\nADD EVENT sqlserver.rpc_completed(\nACTION(sqlserver.client_app_name,sqlserver.database_id,sqlserver.query_hash,sqlserver.session_id)\n\
  WHERE ([package0].greater_than_uint64) AND\n[package0].equal_boolean))),\nADD EVENT\
  \ sqlserver.sp_statement_completed(SET collect_object_name=(1)\nACTION(sqlserver.client_app_name,sqlserver.database_id,sqlserver.query_hash,sqlserver.query_plan_hash,sqlserver.session_id)\n\
  WHERE ([package0].greater_than_uint64) AND [package0].equal_boolean))),\nADD EVENT\
  \ sqlserver.sql_batch_completed(\nACTION(sqlserver.client_app_name,sqlserver.database_id,sqlserver.query_hash,sqlserver.session_id)\n\
  WHERE ([package0].greater_than_uint64) AND\n[package0].equal_boolean))),\nADD EVENT\
  \ sqlserver.sql_statement_completed(\nACTION(sqlserver.client_app_name,sqlserver.database_id,sqlserver.query_hash,sqlserver.query_plan_hash,sqlserver.session_id)\n\
  WHERE ([package0].greater_than_uint64) AND\n[package0].equal_boolean)))\n--Add the\
  \ Targets\nADD TARGET package0.event_file(SET filename=N'C:\\MSSQL\\StatementsAndProcessorUtilization.xel'),\n\
  ADD TARGET package0.etw_classic_sync_target(SET default_etw_session_logfile_path=N'C:\\\
  MSSQL\\StatementsWithPerfCounters.etl')\nWITH (MAX_MEMORY=4096 KB,EVENT_RETENTION_MODE=ALLOW_SINGLE_EVENT_LOSS,MAX_DISPATCH_LATENCY=30\
  \ SECONDS,MAX_EVENT_SIZE=0 KB,MEMORY_PARTITION_MODE=NONE,TRACK_CAUSALITY=ON,STARTUP_STATE=OFF)\
  \ ;\nGO\n--Start the instance\nALTER EVENT SESSION Statements_with_Perf_Counters\n\
  ON SERVER\nSTATE = start;\n```\n*清单 19-8* *创建包含 Perfmon 计数器的事件会话*\n\n#### 提示\n\n\
  > `SQL Server`服务账户必须属于`性能日志用户`组，否则将引发错误。\n\n### 将事件会话与操作系统级事件集成\n\n#### 注意\n\n>\
  \ 要遵循本节中的演示，你需要安装`Windows 性能工具包`，你可以从 [`https://msdn.microsoft.com`](https://msdn.microsoft.com)\
  \ 下载它，作为`Windows 部署和评估工具包`的一部分。\n\n在某些情况下，你可能需要将事件会话数据与`SQL Server`提供的`Perfmon 计数器`以外的操作系统数据集成。例如，想象这样一个场景：你有一个应用程序，它将`SQL\
  \ Server`数据导出到操作系统中的平面文件，以便中间件产品（如`BizTalk`）可以拾取它们。你遇到了生成某些文件的问题，需要查看进程流——从运行的 SQL\
  \ 语句到操作系统中触发的`WMI`事件。为此，你需要将事件会话数据与`WMI`事件的跟踪合并。你可以通过`ETW`（`Windows 事件跟踪`）架构实现这一点。\n\
  \n为了演示这一点，我们首先使用`WMI`提供程序在`性能监视器`中创建一个事件跟踪会话，然后将其与我们在前一节中创建的事件会话集成。（你可以在 Windows\
  \ 的管理工具中找到`性能监视器`。）打开`性能监视器`后，我们从**事件跟踪会话**的上下文菜单中选择**新建** ➤ **数据收集器集**，这将调用**创建新数据收集器集**向导。在向导的第一页，指定收集器集的名称，如图\
  \ 19-12 所示，并指定数据收集器集是手动配置还是基于模板配置。在我们的场景中，我们选择手动配置。\n\n![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig12_HTML.jpg](img/333037_2_En_19_Fig12_HTML.jpg)\n\
  *图 19-12* *创建新数据收集器集向导*\n\n在启用事件跟踪提供程序的页面上，我们可以使用**添加**按钮来添加`WMI-Activity`提供程序，如图\
  \ 19-13 所示。\n\n![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig13_HTML.jpg](img/333037_2_En_19_Fig13_HTML.jpg)\n\
  *图 19-13* *添加 WMI 提供程序*\n\n现在，我们使用**编辑**按钮调用**属性**对话框。在这里，我们通过复选框添加**跟踪**和**操作**类别，如图\
  \ 19-14 所示。\n\n![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig14_HTML.jpg](img/333037_2_En_19_Fig14_HTML.jpg)\n\
  *图 19-14* *属性对话框*\n\n退出**属性**对话框后，我们转到向导的下一页，在那里可以配置跟踪文件的存储位置。我们将跟踪文件配置为保存到与我们的事件会话跟踪相同的位置，如图\
  \ 19-15 所示。\n\n![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig15_HTML.jpg](img/333037_2_En_19_Fig15_HTML.jpg)\n\
  *图 19-15* *配置跟踪文件位置*\n\n在向导的最后一页，我们保留使用默认账户运行跟踪的默认选项，然后保存并关闭跟踪。\n\n在`性能监视器`中，我们的跟踪现在在**事件跟踪会话**文件夹中可见，但显示为已停止。我们可以使用跟踪的上下文菜单来启动数据收集器集，如图\
  \ 19-16 所示。另请注意，有一个名为`XE_DEFAULT_ETW_SESSION`的数据收集器集。我们的扩展事件会话创建了这个，因为我们创建了一个`ETW\
  \ 目标`。集成数据需要此会话。\n\n![../images/333037_2_En_19_Chapter/333037_2_En_19_Fig16_HTML.jpg](img/333037_2_En_19_Fig16_HTML.jpg)\n\
  *图 19-16* *启动数据收集器集*\n\n\n\n现在，`WMISession` 和 `Statements_with_Perf_Counters` 会话都已启动，我们使用清单\
  \ 19-9 中的 `bcp` 命令来生成活动，这会导致两个会话中的事件触发。\n\n```cmd\nbcp chapter19.dbo.customers out\
  \ c:\\mssql\\dump.dat -S .\\PROSQLADMIN -T -c\n清单 19-9\n生成活动\n```\n\n现在我们需要确保两个会话的缓冲区都刷新到磁盘。我们通过停止这两个会话来实现这一点。停止\
  \ `Statements_with_Perf_Counters` 会话后，我们还需要在性能监视器中停止 `XE_DEFAULT_ETW_SESSION` ETW\
  \ 会话。你可以使用清单 19-10 中的 T-SQL 命令来停止 `Statements_with_Perf_Counters` 会话。\n\n```sql\n\
  ALTER EVENT SESSION Statements_with_Perf_Counters\nON SERVER\nSTATE = stop;\n清单\
  \ 19-10\n停止事件会话\n```\n\n你可以在性能监视器中，通过选择各自上下文菜单中的“停止”来停止 `WMISession` 和 `XE_DEFAULT_ETW_SESSION`。\n\
  \n下一步是将两个跟踪文件合并在一起。你可以通过命令行使用 `XPERF` 实用程序配合 `-Merge` 开关来实现（如清单 19-11 所示）。该命令将文件合并在一起，其中\
  \ `StatementsWithPerfCounters.etl` 是目标文件。在运行脚本之前，你应该导航到 `C:\\Program Files (x86)\\\
  Windows Kits\\8.1\\Windows Performance Toolkit` 文件夹。\n\n```cmd\nxperf -merge c:\\\
  mssql\\wmisession.etl C:\\MSSQL\\StatementsWithPerfCounters.etl\n清单 19-11\n合并跟踪文件\n\
  ```\n\n现在所有事件都在同一个文件中，你可以使用 Windows Performance Analyzer 打开并分析这个 `.etl` 文件，如图 19-17\
  \ 所示。Windows Performance Analyzer 是 Windows Performance Toolkit 的一部分。安装后，你可以通过 Windows\
  \ 开始菜单访问 Windows Performance Analyzer。对 Windows Performance Analyzer 的完整讨论超出了本书的范围，但安装后你可以在\
  \ Windows 的管理工具中找到它。你可以在 [`https://msdn.microsoft.com`](https://msdn.microsoft.com)\
  \ 找到完整的文档。\n\n![`../images/333037_2_En_19_Chapter/333037_2_En_19_Fig17_HTML.jpg`](img/333037_2_En_19_Fig17_HTML.jpg)\n\
  \n**图 19-17**\n**Windows 性能分析器**\n\n### 总结\n\n扩展事件引入了一些新概念，你必须理解这些概念才能充分发挥其威力。事件是在跟踪中捕获的关注点，而操作则在事件列之外提供额外的信息。谓词允许你筛选事件以提供更有针对性的跟踪，而目标定义了数据的存储方式。会话本身是跟踪对象，可以配置为包含多个事件、操作、谓词和目标。\n\
  \n你可以通过新建会话向导创建事件会话，这是一种简便快捷的方法，并公开了模板；也可以通过新建会话对话框；当然，还可以通过 T-SQL。通过 T-SQL 创建会话时，你使用\
  \ `CREATE EVENT SESSION` DDL 语句来配置跟踪的所有方面。\n\n每个扩展事件构件都包含在四个包之一中：`Package0`、`Sqlserver`、`Sqlos`\
  \ 和 `SecAudit`。然而，`SecAudit` 的内容不会被公开，因为这些内容在内部用于支持 SQL 审核功能，这在章节 9 中讨论过。\n\n你可以使用数据查看器查看数据。数据查看器允许你监视会话缓冲区中的实时数据，并且还支持查看来自事件文件、事件计数和直方图目标类型的目标数据。数据查看器提供基本的数据分析功能，包括对数据进行分组和聚合。\n\
  \n对于更复杂的数据分析，你可以在 T-SQL 中打开目标。要打开事件文件目标，请使用 `sys.fn_xe_file_target_read_file` 结果系统存储过程。然后，你就可以利用\
  \ T-SQL 的强大功能来处理复杂的分析需求。\n\n你可以通过将会话内的因果关系跟踪开启来关联事件。这会为每个事件添加一个 `GUID` 和一个序列号，以便你识别关系。你还可以轻松地将\
  \ SQL 事件与性能监视器数据关联起来，因为扩展事件公开了处理器、逻辑磁盘和系统性能计数器。要将事件与其他操作系统级别的事件关联，事件会话可以使用 ETW 目标，然后你可以将其与其他数据收集器集合并，以将扩展事件映射到\
  \ ETW 架构中其他提供程序的事件。\n\n# 20. 查询存储\n\n查询存储是 SQL Server 2016 中引入的一项功能，它捕获查询、其计划和统计信息的历史记录。它使\
  \ DBA 能够轻松查看查询使用的计划并排除性能问题。在本章中，我们将讨论如何启用和配置查询存储。我们还将探讨如何使用查询存储来诊断和解决性能问题。\n\n###\
  \ 启用和配置查询存储\n\n查询存储在数据库级别启用和配置，因此我们要做的第一件事是创建一个名为 `Chapter20` 的数据库。这可以使用清单 20-1\
  \ 中的脚本来实现。\n\n```sql\n--创建数据库\nCREATE DATABASE Chapter20 ;\nGO\nUSE Chapter20\n\
  GO\n--创建并填充数字表\nDECLARE @Numbers TABLE\n(\nNumber        INT\n)\n;WITH CTE(Number)\n\
  AS\n(\nSELECT 1 Number\nUNION ALL\nSELECT Number + 1\nFROM CTE\nWHERE Number < 100\n\
  )\nINSERT INTO @Numbers\nSELECT Number FROM CTE;\n--创建并填充名字片段\nDECLARE @Names TABLE\n\
  (\nFirstName        VARCHAR(30),\nLastName        VARCHAR(30)\n);\nINSERT INTO @Names\n\
  VALUES('Peter', 'Carter'),\n('Michael', 'Smith'),\n('Danielle', 'Mead'),\n('Reuben',\
  \ 'Roberts'),\n('Iris', 'Jones'),\n('Sylvia', 'Davies'),\n('Finola', 'Wright'),\n\
  ('Edward', 'James'),\n('Marie', 'Andrews'),\n('Jennifer', 'Abraham');\n--创建并填充 Customers\
  \ 表\nCREATE TABLE dbo.Customers\n(\nCustomerID           INT                NOT\
  \ NULL                       IDENTITY             PRIMARY KEY,\nFirstName      \
  \      VARCHAR(30)        NOT NULL,\nLastName             VARCHAR(30)        NOT\
  \ NULL,\nBillingAddressID     INT                NOT NULL,\nDeliveryAddressID  \
  \  INT                NOT NULL,\nCreditLimit          MONEY              NOT NULL,\n\
  Balance              MONEY              NOT NULL\n);\nSELECT * INTO #Customers\n\
  FROM\n(SELECT\n(SELECT TOP 1 FirstName FROM @Names ORDER BY NEWID()) FirstName,\n\
  (SELECT TOP 1 LastName FROM @Names ORDER BY NEWID()) LastName,\n(SELECT TOP 1 Number\
  \ FROM @Numbers ORDER BY NEWID()) BillingAddressID,\n(SELECT TOP 1 Number FROM @Numbers\
  \ ORDER BY NEWID()) DeliveryAddressID,\n(SELECT TOP 1 CAST(RAND() * Number AS INT)\
  \ * 10000\nFROM @Numbers\nORDER BY NEWID()) CreditLimit,\n(SELECT TOP 1 CAST(RAND()\
  \ * Number AS INT) * 9000\nFROM @Numbers\nORDER BY NEWID()) Balance\nFROM @Numbers\
  \ a\nCROSS JOIN @Numbers b\n) a;\nINSERT INTO dbo.Customers\nSELECT * FROM #Customers;\n\
  GO\nCREATE INDEX idx_LastName ON dbo.Customers(LastName)\nGO\n清单 20-1\n创建 Chapter20\
  \ 数据库\n```\n\n现在我们有了一个数据库，可以使用清单 20-2 中的命令为该数据库启用查询存储。\n\n```sql\nALTER DATABASE\
  \ Chapter20 SET QUERY_STORE = ON\n清单 20-2\n启用查询存储\n```\n\n除了使用 `ALTER DATABASE`\
  \ 命令启用查询存储外，此方法还用于配置查询存储属性。表 20-1 详细列出了可用的与查询存储相关的 `SET` 选项。\n\n**表 20-1**\n**查询存储\
  \ SET 选项**\n\n\n\n### 使用查询存储数据\n\n在我们了解如何使用查询存储数据之前，首先需要运行一些查询，以便查询存储有数据可收集。`清单\
  \ [20-4]` 中的脚本将对 `Chapter20` 数据库运行一系列查询。\n\n```\nSELECT\nCustomerID\n, FirstName\n\
  , LastName\n, CreditLimit\n, Balance\nFROM dbo.Customers\nWHERE LastName = 'Carter'\n\
  GO\nSELECT TOP (1000) [CustomerID]\n,[FirstName]\n,[LastName]\n,[BillingAddressID]\n\
  ,[DeliveryAddressID]\n,[CreditLimit]\n,[Balance]\nFROM [Chapter20].[dbo].[Customers]\n\
  GO\nSELECT *\nFROM dbo.Customers A\nINNER JOIN dbo.Customers B\nON a.CustomerID\
  \ = b.CustomerID\nUNION\nSELECT *\nFROM dbo.Customers A\nINNER JOIN dbo.Customers\
  \ B\nON a.CustomerID = b.CustomerID\nGO\n清单 20-4\n查询 Chapter20 数据库\n```\n\n### SSMS\
  \ 报告\n\n既然我们已经运行了一些查询，查询存储就会捕获关于这些查询的数据。我们可以通过一系列 SSMS 报告来查看这些数据。标准报告包括：\n\n*  \
  \ 查看性能下降的查询\n*   查看总体资源消耗\n*   查看具有强制计划的查询\n*   查看高差异的查询\n*   查询等待统计信息\n*   查看已跟踪的查询\n\
  \n这些报告可以通过浏览 `数据库` ➤ `[数据库名称]`，然后从 `查询存储` 节点的上下文菜单中选择相应的报告来访问。在本章中，我们将研究一些我认为最有用的报告，但我鼓励你尝试所有这些报告。\n\
  \n#### 提示\n\n由于报告的性质，当你首次设置查询存储时，数据会非常少。随着查询存储启用后时间的推移，数据点将会增长。\n\n总体资源消耗报告如 `图\
  \ [20-2]` 所示。该报告包含四个图表，分别代表按时间间隔聚合的执行持续时间、执行次数、CPU 时间和逻辑读取。\n\n![../images/333037_2_En_20_Chapter/333037_2_En_20_Fig2_HTML.jpg](img/333037_2_En_20_Fig2_HTML.jpg)\n\
  \n图 20-2\n总体资源消耗\n\n将鼠标悬停在一个柱形上会显示一个包含更多详细信息的框，如 `图 [20-3]` 所示。\n\n![../images/333037_2_En_20_Chapter/333037_2_En_20_Fig3_HTML.jpg](img/333037_2_En_20_Fig3_HTML.jpg)\n\
  \n图 20-3\n查看其他详细信息\n\n点击“标准网格”按钮将用一个网格替换柱形图，网格中每个时间间隔一行，显示聚合的运行时统计数据。此网格可以复制到 Excel\
  \ 中进行进一步分析。网格视图如 `图 [20-4]` 所示。\n\n![../images/333037_2_En_20_Chapter/333037_2_En_20_Fig4_HTML.jpg](img/333037_2_En_20_Fig4_HTML.jpg)\n\
  \n图 20-4\n标准网格视图\n\n\n#### 提示\n\n您会注意到，执行计数远高于我们已运行的查询数量。这是因为 SQL Server 会在后台运行查询，作为许多不同进程的一部分，包括在导航\
  \ `SSMS` 时运行的查询。\n\n图 20-5 展示了**资源消耗最高查询报告**。该报告的左上角显示了一个条形图，代表了资源消耗最密集的查询。`指标`下拉菜单默认为`持续时间`，但可以选择许多不同的指标，包括并行度\
  \ (`DOP`)、`CPU 时间`、`行数`、`等待时间`，甚至 `CLR 时间`或`日志内存使用量`等等。\n\n报告的右上角显示了一个散点图，详细说明了每个计划的资源利用率和执行时间。当一个查询已使用多个计划执行时，这很有帮助，因为您可以轻松评估某个查询最高效的计划。\n\
  \n报告的下半部分显示了实际使用的执行计划。与 `SSMS` 中任何其他图形化查询计划表示一样，将鼠标悬停在物理运算符上将显示该运算符的成本信息。\n\n![../images/333037_2_En_20_Chapter/333037_2_En_20_Fig5_HTML.jpg](img/333037_2_En_20_Fig5_HTML.jpg)\n\
  图 20-5: 资源消耗最高查询报告\n\n图 20-6 显示了**查询等待统计报告**的首页。屏幕顶部的条形图显示了累计等待时间最高的资源汇总。\n\n![../images/333037_2_En_20_Chapter/333037_2_En_20_Fig6_HTML.jpg](img/333037_2_En_20_Fig6_HTML.jpg)\n\
  图 20-6: 查询等待统计报告\n\n条形图中的每个柱子都是可点击的。例如，如果我点击 `CPU` 柱，那么将显示图 20-7 中的详细报告。\n\n![../images/333037_2_En_20_Chapter/333037_2_En_20_Fig7_HTML.jpg](img/333037_2_En_20_Fig7_HTML.jpg)\n\
  图 20-7: `CPU` 详细报告\n\n默认情况下，网格的上半部分将显示开销最大的查询（由`计划 ID`标记），基于`总等待时间`，但如您所见，`基于`下拉列表可以更改为基于平均、最小、最大等待时间或标准差来显示结果。\n\
  \n报告的下半部分显示了在上半部分选定的查询计划的图形化表示。\n\n### 查询存储 T-SQL 对象\n\n除了图形化报告，SQL Server 还公开了许多可用于检索查询存储数据的目录视图。表\
  \ 20-3 详细列出了公开的目录视图。\n表 20-3: 查询存储目录视图\n\n| `目录视图` | `描述` |\n| --- | --- |\n| `Query_store_plan`\
  \ | 存储与查询关联的每个查询计划的信息。 |\n| `Query_store_query` | 存储查询信息和聚合的运行时统计信息。 |\n| `Query_store_wait_stats`\
  \ | 存储等待统计信息的详细信息。有关每种等待类型的映射，请参见表 20-4。 |\n| `Query_store_query_text` | 存储每个查询的\
  \ `SQL 句柄`和 `SQL 文本`。 |\n| `Query_store_runtime_stats` | 存储每个查询的运行时统计信息。 |\n\n表\
  \ 20-4 详细说明了每个等待类型类别如何映射到基础等待类型。\n表 20-4: 等待统计信息映射\n\n| `等待类别` | `等待类型` |\n| ---\
  \ | --- |\n| `CPU` | `SOS_SCHEDULER_YIELD` |\n| `工作线程` | `THREADPOOL` |\n| `锁` |\
  \ `LCK_M_*` |\n| `门` | `LATCH_*` |\n| `缓冲区门` | `PAGELATCH_*` |\n| `缓冲区 IO` | `PAGEIOLATCH_*`\
  \ |\n| `SQL CLR` | `CLR*SQLCLR*` |\n| `镜像` | `DBMIRROR*` |\n| `事务` | `ACT*DTC*TRAN_MARKLATCH_*MSQL_XACT_*TRANSACTION_MUTEX`\
  \ |\n| `空闲` | `SLEEP_*LAZYWRITER_SLEEPSQLTRACE_BUFFER_FLUSHSQLTRACE_INCREMENTAL_FLUSH_SLEEPSQLTRACE_WAIT_ENTRIESFT_IFTS_SCHEDULER_IDLE_WAITXE_DISPATCHER_WAITREQUEST_FOR_DEADLOCK_SEARCHLOGMGR_QUEUEONDEMAND_TASK_QUEUECHECKPOINT_QUEUEXE_TIMER_EVENT`\
  \ |\n| `抢占式 (抢占式 IO)` | `PREEMPTIVE_*` |\n| `Service Broker` | `BROKER_*` |\n| `事务日志\
  \ IO` | `LOGMGRLOGBUFFERLOGMGR_RESERVE_APPENDLOGMGR_FLUSHLOGMGR_PMM_LOGCHKPTWRITELOG`\
  \ |\n| `网络 IO` | `ASYNC_NETWORK_IONET_WAITFOR_PACKETPROXY_NETWORK_IOEXTERNAL_SCRIPT_NETWORK_IOF`\
  \ |\n| `并行性` | `CXPACKETEXCHANGE` |\n| `内存` | `RESOURCE_SEMAPHORE, CMEMTHREADCMEMPARTITIONED,\
  \ EE_PMOLOCKMEMORY_ALLOCATION_EXTRESERVED_MEMORY_ALLOCATION_EXTMEMORY_GRANT_UPDATE`\
  \ |\n| `用户等待` | `WAITFORWAIT_FOR_RESULTSBROKER_RECEIVE_WAITFOR` |\n| `跟踪` | `TRACEWRITESQLTRACE_LOCKSQLTRACE_FILE_BUFFERSQLTRACE_FILE_WRITE_IO_COMPLETIONSQLTRACE_FILE_READ_IO_COMPLETIONSQLTRACE_PENDING_BUFFER_WRITERS,\
  \ SQLTRACE_SHUTDOWN, QUERY_TRACEOUTTRACE_EVTNOTIFF` |\n| `全文搜索` | `FT_RESTART_CRAWLFULLTEXT\
  \ GATHERERMSSEARCHFT_METADATA_MUTEXFT_IFTSHC_MUTEXFT_IFTSISM_MUTEXFT_IFTS_RWLOCKFT_COMPROWSET_RWLOCKFT_MASTER_MERGEFT_PROPERTYLIST_CACHEFT_MASTER_MERGE_COORDINATORPWAIT_RESOURCE_SEMAPHORE_FT_PARALLEL_QUERY_SYNC`\
  \ |\n| `其他 IO` | `ASYNC_IO_COMPLETION, IO_COMPLETIONBACKUPIO, WRITE_COMPLETIONIO_QUEUE_LIMITIO_RETRY`\
  \ |\n| `复制` | `SE_REPL_*REPL_*, HADR_*PWAIT_HADR_*, REPLICA_WRITESFCB_REPLICA_WRITE,\
  \ FCB_REPLICA_READPWAIT_HADRSIM` |\n| `日志速率调节器` | `LOG_RATE_GOVERNORPOOL_LOG_RATE_GOVERNORHADR_THROTTLE_LOG_RATE_GOVERNORINSTANCE_LOG_RATE_GOVERNOR`\
  \ |\n\n`*` 表示通配符，其中包含匹配 `*` 左侧部分的所有等待。\n\n#### 提示\n\n`空闲`和`用户等待`与其他等待类型类别不同，因为它们不是在等待资源，而是在等待工作要做。\n\
  \n例如，清单 20-5 中的查询将返回总等待时间最高的前三个等待类别，不包括空闲和用户等待，这些是“健康”的等待。\n\n```sql\nSELECT TOP\
  \ 3\nwait_category_desc\n, SUM(total_query_wait_time_ms) TotalWaitTime\nFROM sys.query_store_wait_stats\n\
  WHERE wait_category_desc NOT IN ('Idle', 'User Wait')\nGROUP BY wait_category_desc\n\
  ORDER BY SUM(total_query_wait_time_ms) DESC\n```\n清单 20-5: 返回前 3 个等待类型\n\n### 解决查询存储问题\n\
  \n图 20-8 展示了**性能退化查询报告**。此报告显示了在持续时间或执行次数方面影响随时间增加的查询。这些查询在报告左上角用条形图显示。报告的右上角显示了用于执行查询的计划及其关联的持续时间。在报告底部，我们可以看到在屏幕上半部分当前选择的查询和计划的实执行计划。\n\
  \n![../images/333037_2_En_20_Chapter/333037_2_En_20_Fig8_HTML.jpg](img/333037_2_En_20_Fig8_HTML.jpg)\n\
  图 20-8: 性能退化查询报告\n\n在这个特定的例子中，我们可以看到该查询使用了两个不同的计划运行，并且 ID 为 `168` 的计划执行所需时间明显少于\
  \ ID 为 `110` 的计划。因此，在选择了更高效的计划后，我们可以使用报告中间的`强制计划`按钮，来确保始终使用更高效的计划来执行此查询。一旦我们使用了此功能，`取消强制计划`按钮将变为可用状态，允许我们在需要时撤销我们的操作。\n\
  \n\n#### 提示\n\n只要查询存储报告中可以选择特定的计划，`强制`和`取消强制`按钮在所有报告中都是可用的。\n\n除了使用图形用户界面来提升查询性能外，系统还提供了许多可用的存储过程。这些过程在表\
  \ 20-5 中详细列出，可用于管理查询计划和查询存储本身。\n\n表 20-5\n\n查询存储存储过程\n\n| 过程 | 描述 |\n| --- | ---\
  \ |\n| `Sp_query_store_flush_db` | 将查询存储数据刷新到磁盘 |\n| `Sp_query_store_force_plan`\
  \ | 强制查询使用特定计划 |\n| `Sp_query_store_unforce_plan` | 从查询中移除强制计划 |\n| `Sp_query_store_reset_exec_stats`\
  \ | 清除查询存储中特定查询的运行时统计信息 |\n| `Sp_query_store_remove_plan` | 从查询存储中移除特定计划 |\n| `Sp_query_store_remove_query`\
  \ | 从查询存储中移除查询及其所有关联信息 |\n\n例如，要取消我们在前一个例子中强制应用于查询的计划，我们可以使用清单 20-6 中的查询。\n\n```\n\
  EXEC sp_query_store_unforce_plan @query_id=109, @plan_id=168\n清单 20-6\n取消强制查询计划\n\
  ```\n\n### 总结\n\n查询存储是 SQL Server 的一项非常强大的功能，它允许数据库管理员监控特定查询及其计划的性能。由于数据会被刷新到磁盘，这意味着即使实例重启后，数据也会持久保存。\n\
  \n提供了六种标准报告，允许数据库管理员查看诸如退化查询、资源消耗最多的查询，甚至按查询查看等待统计等信息。\n\n除了查看有问题的查询，数据库管理员还可以强制使用性能最优的计划。这可以通过交互式报告实现，也可以通过使用\
  \ T-SQL 的自动化方式实现。自动化方法将通过目录视图检查查询存储数据，然后将相关数据传递给系统存储过程的参数。\n\nSQL Server 2019 为数据库管理员提供了对查询存储捕获哪些查询的更细粒度控制。这是通过自定义捕获策略实现的，其中可以使用执行计数和执行时间等详细信息来捕获性能影响最高的查询。这不仅节省了磁盘空间，还避免了处理捕获数据时的“噪音”。\n\
  \n# 21. 分布式重放\n\n分布式重放是 SQL Server 附带的一个实用工具，它使您能够在一台或多台客户端上重放跟踪，并将事件分发到目标服务器。这对于测试软件更新（例如操作系统级别和\
  \ SQL Server 级别的 Service Pack）、测试性能调整、负载测试和整合规划等场景非常有用。\n\n在旧版本的 SQL Server 中，通常使用\
  \ SQL Trace 及其图形界面 Profiler 来生成和重放跟踪。然而，这存在一些限制，例如捕获跟踪的开销以及无法在多台服务器上重放跟踪。因此，SQL\
  \ Trace 和 Profiler 对于数据库引擎已被弃用，建议您仅对分析服务活动使用 Profiler 进行跟踪。相反，建议使用扩展事件（在第 19 章中讨论）以更低的开销捕获跟踪，然后使用分布式重放来重放它们。\n\
  \n#### 注意\n\n在本章的演示中，我们将使用四台服务器，分别命名为 Controller、Client1、Client2 和 Target。每台服务器都安装了\
  \ SQL Server 的默认实例，并且所有服务器都是 `PROSQLADMIN` 域的一部分。分布式重放控制器功能安装在控制器服务器上，分布式重放客户端安装在\
  \ Client1 和 Client2 服务器上。分布式重放控制器和分布式重放客户端都是共享功能，因此即使安装了多个实例，每台服务器也只需安装一次。尽管分布式重放客户端应安装在目标实例上以进行应用程序兼容性测试，但在我们的场景中，我们研究的是在模拟并发活动时进行性能测试，因此分布式重放客户端不安装在目标服务器上，因为对于这些目的不推荐这样做。分布式重放管理工具已安装在控制器上。\n\
  \n### 分布式重放概念\n\n要利用分布式重放的强大功能，理解其概念非常重要，例如控制器、客户端和目标服务器。理解分布式重放的架构也很重要。这些主题将在以下部分讨论。\n\
  \n#### 分布式重放组件\n\n分布式重放控制器位于分布式重放基础设施的核心，用于协调每个分布式重放客户端的活动。当分布式重放控制器服务启动时，它会从 `DReplayController.config`\
  \ 文件中提取其设置，因此您可能需要编辑此文件来配置日志记录选项。我们将在本章后面讨论这一点。一个分布式重放拓扑中只有一个控制器。\n\n分布式重放客户端是您用来重放工作负载的服务器。当分布式重放客户端服务启动时，它会从\
  \ `DReplayClient.config` 文件中提取其配置，因此您可能需要编辑此文件来配置日志记录选项以及存储跟踪结果和中间文件的文件夹。我们将在本章后面讨论这一点。您可以在分布式重放拓扑中配置多个客户端，最多支持\
  \ 16 个客户端。\n\n目标是重放跟踪的实例。一个分布式重放拓扑中总有一个目标。因为您可以有多个客户端对应一个目标的比例，所以您可以使用分布式重放作为负载测试工具，使用通用硬件或模拟并发工作负载。\n\
  \n分布式重放管理工具是一个命令行工具，允许您准备和重放跟踪。可执行文件名为 `DReplay.exe`；它依赖于 `DReplay.exe.preprocess.config`\
  \ 文件来获取处理中间跟踪文件所需的配置，以及 `DReplay.exe.replay.config` 文件来获取重放跟踪所需的配置。这意味着您可能需要编辑每个配置文件以指定设置，例如是否应包含系统活动，以及指定查询超时值，我们将在本章后面讨论这些。\n\
  \n#### 分布式重放架构\n\n图 21-1 中的图表概述了分布式重放组件以及重放过程如何在预处理和重放阶段工作。在预处理阶段，会在控制器的工作目录中创建一个中间文件。在重放阶段，事件被分发到目标之前，会在客户端创建分发文件。\n\
  \n![分布式重放架构](img/333037_2_En_21_Fig1_HTML.png)\n\n图 21-1\n\n分布式重放架构\n\n### 配置环境\n\
  \n在开始重放跟踪之前，我们需要配置分布式重放控制器、分布式重放客户端和分布式重放管理工具。这些活动将在以下部分讨论。\n\n\n#### 配置控制器\n\n\
  您可以在 SQL Server 的 32 位共享目录中的 `Tools\\DReplayController` 文件夹内找到 `DReplayController.config`\
  \ 文件。因此，如果 SQL Server 安装在默认路径下，则完整路径为 `C:\\Program Files (x86)\\Microsoft SQL Server\\\
  150\\Tools\\DReplayController\\DReplayController.config`。您可以使用此配置文件来控制日志记录级别。可能的选项如下：\n\
  \n*   `INFORMATIONAL`: 将所有消息记录到控制器日志。\n*   `WARNINGS`: 过滤掉信息性消息，但记录所有错误和警告。\n* \
  \  `CRITICAL`: 仅记录严重错误。这是默认值。\n\n`DReplayController.config` 文件的默认内容如代码清单 21-1 所示。\n\
  \n```\nCRITICAL\n```\n\n代码清单 21-1\n`DReplayController.config`\n\n由于服务在启动时从配置文件中读取此日志记录级别，因此如果您在启动服务后更改了日志级别，则需要重新启动该服务。日志本身在服务启动时创建，其中包含启动信息，例如正在使用的服务账户。您可以在\
  \ `\\DReplayController\\Log` 文件夹中找到名为 `DReplay Controller Log_<唯一标识符>` 的日志文件。每次服务启动时都会生成一个新日志。\n\
  \n如果您在不同于分布式重播控制器服务的服务账户下运行分布式重播客户端服务，那么您还需要在分布式重播控制器服务上配置 DCOM 权限。您可以通过 Windows\
  \ 管理工具中的“组件服务”来完成此操作。\n\n调用“组件服务”后，您需要逐级展开 控制台根节点 ➤ 组件服务 ➤ 计算机 ➤ 我的电脑 ➤ DCOM 配置，然后从\
  \ `DReplayController` 的上下文菜单中选择“属性”。这将调用“属性”对话框。从这里，您应导航到“安全”选项卡。\n\n现在，使用“启动和激活权限”部分中的“编辑”按钮来启动“权限”对话框。在此处，使用“添加”按钮添加分布式重播客户端服务的服务账户，然后授予其“本地激活”和“远程激活”权限。\n\
  \n您现在需要在“访问权限”部分重复此过程，以授予该服务账户“本地访问”和“远程访问”权限。\n\n您还需要确保将分布式重播客户端服务账户添加到运行分布式重播控制器的服务器上的“分布式\
  \ COM 用户”Windows 组中。应用这些更改后，您需要重新启动分布式重播控制器服务和分布式重播客户端服务，更改才能生效。\n\n#### 提示\n\n\
  关于防火墙配置，控制器和客户端使用端口 135 和动态端口进行通信；因此，您必须确保服务器之间的这些端口是开放的。然而，开放动态端口范围可能会违反某些组织的安全最佳实践。解决方法是配置\
  \ Windows 防火墙，允许分布式重播可执行文件通过任何端口进行通信。然而，这本身也会带来问题，因为某些企业防火墙未配置为提供此功能，这意味着即使 Windows\
  \ 防火墙允许流量通过，数据包也可能在企业防火墙层面被丢弃。\n\n#### 配置客户端\n\n您可以在 SQL Server 的 32 位共享目录中的 `Tools\\\
  DReplayClient` 文件夹内找到 `DReplayClient.config` 文件。因此，如果 SQL Server 安装在默认路径下，则完整路径为\
  \ `C:\\Program Files (x86)\\Microsoft SQL Server\\150\\Tools\\DReplayController\\\
  DReplayClient.config`。您可以使用此配置文件来配置表 21-1 中详述的设置。\n\n表 21-1\n`DReplayClient.config`\
  \ 选项\n\n| 选项 | 描述 |\n| --- | --- |\n| `Controller` | 托管分布式重播控制器的服务器名称。请注意，这是服务器名称，而不是服务器\\\
  实例名称。 |\n| `WorkingDirectory` | 客户端上存储调度文件的位置。如果配置文件中未包含此选项，则使用存储配置文件的文件夹。 |\n|\
  \ `ResultsDirectory` | 存储重播结果文件的位置。如果配置文件中未指定此选项，则使用存储配置文件的文件夹。 |\n| `Logging` |\
  \ 使用此选项控制日志记录级别。可能的选项有：• `INFORMATIONAL`，将所有消息记录到控制器日志。• `WARNINGS`，过滤掉信息性消息，但记录所有错误和警告。•\
  \ `CRITICAL`，仅记录严重错误。这是默认值。 |\n\n代码清单 21-2 展示了经过编辑的 `DReplayClient.config` 文件版本，该文件已配置为指向我们的控制器服务器以及工作目录和结果目录。\n\
  \n```\ncontroller\nC:\\DistributedReplay\\WorkingDir\\\nC:\\DistributedReplay\\\
  ResultDir\\\nCRITICAL\n```\n\n代码清单 21-2\n`DReplayClient.config`\n\n#### 提示\n\n您必须在每个客户端上启动分布式重播客户端服务之前，先启动分布式重播控制器服务。\n\
  \n由于我们使用了两个客户端，因此需要在每个客户端上重复这些操作。在我们的环境中，这些客户端是服务器 Client1 和 Client2。\n\n#### 提示\n\
  \n关于防火墙配置，客户端和目标使用 SQL Server 端口进行通信。在标准配置中，这意味着使用 TCP 端口 1433，如果使用命名实例，则还需使用 UDP\
  \ 端口 1434 用于浏览器服务。如果使用非标准端口，请相应地配置防火墙。\n\n#### 配置重播\n\n重播是通过管理工具启动的，该工具依赖于两个配置文件：`DReplay.exe.preprocess.config`\
  \ 和 `DReplay.exe.replay.config`。第一个配置文件控制中间文件的构建，第二个控制重播选项和输出选项。两个文件都位于 32 位共享目录中，因此在默认安装下，完整限定路径分别是\
  \ `C:\\Program Files (x86)\\Microsoft SQL Server\\150\\Tools\\Binn\\DReplay.exe.preprocess.config`\
  \ 和 `C:\\Program Files (x86)\\Microsoft SQL Server\\150\\Tools\\Binn\\DReplay.exe.replay.config`。表\
  \ 21-2 详细说明了可以在 `DReplay.exe.preprocess.config` 中配置的选项。\n\n**表 21-2 DReplay.exe.preprocess.config\
  \ 选项**\n\n| 选项 | 描述 |\n| --- | --- |\n| `IncSystemSession` | 指定是否应将从系统会话捕获的活动包含在重播中。\
  \ |\n| `MaxIdleTime` | 指定空闲时间的上限（以秒为单位）。 • `-1` 指定活动之间的空闲时间应与原始跟踪相同。 • `0` 指定活动之间不应有空闲时间。\
  \ |\n\n`DReplay.exe.preprocess.config` 文件的默认内容如清单 21-3 所示。\n\n```\nNo\n\n清单 21-3\n\
  DReplay.exe.preprocess.config\n```\n\n表 21-3 详细说明了可以在 `DReplay.exe.replay.config`\
  \ 中配置的选项。\n\n**表 21-3 DReplay.exe.replay.config 选项**\n\n| 选项 | 类别 | 描述 |\n| ---\
  \ | --- | --- |\n| `Server` | 重播选项 | 目标服务器的服务器\\实例名称。 |\n| `SequencingMode` | 重播选项\
  \ | 指定用于调度事件的模式。可能的选项包括： • `Synchronization`，表示事务顺序受基于时间的跨客户端同步约束，这对于性能测试很有用。 • `Stress`（默认选项）表示事务尽快触发，无需基于时间的同步。这对于负载测试很有用。\
  \ |\n| `StressScaleGranularity` | 重播选项 | 当 `SequenceMode` 设置为 `Stress` 时，`StressScaleGranularity`\
  \ 确定如何在 SPID 上扩展活动。 • `SPID` 表示单个 SPID 上的连接应作为单个 SPID 进行扩展。 • `Connection` 表示单个\
  \ SPID 上的连接应作为单独的连接进行扩展。 |\n| `ConnectTimeScale` | 重播选项 | 一个百分比值，指示当 `SequenceMode`\
  \ 为 `Stress` 时，重播期间是否应减少连接时间。`100` 表示包含 100% 的连接时间。较低的值会相应减少模拟的连接时间。 |\n| `ThinkTimeScale`\
  \ | 重播选项 | 一个百分比值，指示当 `SequenceMode` 为 `Stress` 时，重播期间是否应减少用户思考时间。`100` 表示包含 100%\
  \ 的思考时间，因此事务以捕获时的速度重播。指定较低的值会减少间隔。 |\n| `UseConnectionPooling` | 重播选项 | 指定客户端上是否应使用连接池。*连接池*\
  \ 是后续连接可以重用的连接缓存。 |\n| `HealthmonInterval` | 重播选项 | 当 `SequenceMode` 设置为 `Synchronization`\
  \ 时，`HealthmonInterval` 确定运行运行状况监视器的频率，以秒为单位。`-1` 表示禁用运行状况监视器。 |\n| `QueryTimeout`\
  \ | 重播选项 | 以秒为单位指定查询超时值。`-1` 表示禁用。 |\n| `ThreadsPerClient` | 重播选项 | 指定每个客户端用于重播的线程数。\
  \ |\n| `RecordRowCount` | 输出选项 | 指定是否应包含每个结果集的行数。 |\n| `RecordResultSet` | 输出选项\
  \ | 指定是否应保存每个记录集的内容。 |\n\n清单 21-4 展示了 `DReplay.exe.replay.config` 文件的示例，该示例已根据我们的环境进行了修改，以允许我们通过模拟多个连接来执行性能测试。\n\
  \n```\nTarget\nsynchronization\n\nNo\n\nYes\nNo\n\n清单 21-4\nDReplay.exe.replay.config\n\
  ```\n\n### 使用分布式重播\n\n现在分布式重播实用程序已经配置好了，我们使用扩展事件创建一个跟踪，然后再同步目标。然后，我们使用分布式重播来重放该跟踪，以测试性能调整，模拟两个客户端上的并发活动。然而，在执行此操作之前，我们首先使用清单\
  \ 21-5 中的脚本在控制器上创建 `Chapter21` 数据库。\n\n```\n--创建数据库\nCREATE DATABASE Chapter21 ;\n\
  GO\nUSE Chapter21\nGO\n--创建并填充数字表\nDECLARE @Numbers TABLE\n(\nNumber        INT\n\
  )\n;WITH CTE(Number)\nAS\n(\nSELECT 1 Number\nUNION ALL\nSELECT Number + 1\nFROM\
  \ CTE\nWHERE Number < 100\n)\nINSERT INTO @Numbers\nSELECT Number FROM CTE;\n--创建并填充姓名片段表\n\
  DECLARE @Names TABLE\n(\nFirstName        VARCHAR(30),\nLastName        VARCHAR(30)\n\
  );\nINSERT INTO @Names\nVALUES('Peter', 'Carter'),\n('Michael', 'Smith'),\n('Danielle',\
  \ 'Mead'),\n('Reuben', 'Roberts'),\n('Iris', 'Jones'),\n('Sylvia', 'Davies'),\n\
  ('Finola', 'Wright'),\n('Edward', 'James'),\n('Marie', 'Andrews'),\n('Jennifer',\
  \ 'Abraham');\n--创建并填充地址表\nCREATE TABLE dbo.Addresses\n(\nAddressID        INT \
  \       NOT NULL        IDENTITY        PRIMARY KEY,\nAddressLine1        NVARCHAR(50),\n\
  AddressLine2        NVARCHAR(50),\nAddressLine3        NVARCHAR(50),\nPostCode \
  \       NCHAR(8)\n) ;\nINSERT INTO dbo.Addresses\nVALUES('1 Carter Drive', 'Hedge\
  \ End', 'Southampton', 'SO32 6GH')\n,('10 Apress Way', NULL, 'London', 'WC10 2FG')\n\
  ,('12 SQL Street', 'Botley', 'Southampton', 'SO32 8RT')\n,('19 Springer Way', NULL,\
  \ 'London', 'EC1 5GG') ;\n--创建并填充客户表\nCREATE TABLE dbo.Customers\n(\nCustomerID\
  \            INT          NOT NULL   IDENTITY   PRIMARY KEY,\nFirstName        \
  \     VARCHAR(30)  NOT NULL,\nLastName              VARCHAR(30)  NOT NULL,\nBillingAddressID\
  \      INT          NOT NULL,\nDeliveryAddressID     INT          NOT NULL,\nCreditLimit\
  \           MONEY        NOT NULL,\nBalance               MONEY        NOT NULL\n\
  );\nSELECT * INTO #Customers\nFROM\n(SELECT\n(SELECT TOP 1 FirstName FROM @Names\
  \ ORDER BY NEWID()) FirstName,\n(SELECT TOP 1 LastName FROM @Names ORDER BY NEWID())\
  \ LastName,\n(SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) BillingAddressID,\n\
  (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) DeliveryAddressID,\n(SELECT\
  \ TOP 1 CAST(RAND() * Number AS INT) * 10000\nFROM @Numbers ORDER BY NEWID()) CreditLimit,\n\
  (SELECT TOP 1 CAST(RAND() * Number AS INT) * 9000\nFROM @Numbers ORDER BY NEWID())\
  \ Balance\nFROM @Numbers a\nCROSS JOIN @Numbers b\nCROSS JOIN @Numbers c\n) a;\n\
  INSERT INTO dbo.Customers\nSELECT * FROM #Customers;\nGO\n清单 21-5\n创建 Chapter21\
  \ 数据库\n```\n\n#### 同步目标\n\n由于我们重放的跟踪包含 DML 语句，因此我们需要在开始捕获跟踪之前立即同步目标数据库，以确保 ID 对齐。我们通过备份控制器上的\
  \ `Chapter21` 数据库并在目标上还原来执行此任务。我们可以使用清单 21-6 中的脚本来实现这一点。\n\n\n#### 提示\n\n在运行脚本前，请记得根据您自身的配置修改文件路径。\n\
  \n```\n--第 1 部分 - 在控制器上运行\nBACKUP DATABASE Chapter21\nTO  DISK = N'F:\\MSSQL\\Backup\\\
  Chapter21.bak'\nWITH NOFORMAT, NOINIT,  NAME = N'Chapter21-Full Database Backup',\
  \ SKIP,  STATS = 10\nGO\n--第 2 部分 - 在客户端运行，需在备份文件转移后执行\nRESTORE DATABASE Chapter21\n\
  FROM  DISK = N'F:\\MSSQL\\Backup\\Chapter21.bak'\nWITH  FILE = 1, STATS = 5\nGO\n\
  清单 21-6\n同步 Chapter21 数据库\n```\n\n理想情况下，数据库在每个服务器上应具有相同的 `DatabaseID`。但如果这不可行，则应确保事件会话中捕获了\
  \ `Database_name` 操作，以便进行映射。您还应确保跟踪中包含的所有登录账户都已在目标服务器上创建，且拥有相同的权限和相同的默认数据库。如果未能做到这一点，将会导致重放错误。\n\
  \n由于我们的演示是为了测试性能增强，您可能希望借此机会，在已同步的数据库中为 `Customers` 和 `Addresses` 表创建适当的索引。您可以在清单\
  \ 21-7 中找到一个包含适用于我们跟踪工作负载的索引建议的脚本。\n\n```\nUSE Chapter21\nGO\nCREATE INDEX IDX_Customers_LastName\
  \ ON dbo.Customers(LastName) INCLUDE(FirstName) ;\nGO\nCREATE INDEX IDX_Customers_AddressID\
  \ ON dbo.Customers(DeliveryAddressID) ;\nGO\nCREATE INDEX IDX_Addresses_AddressID\
