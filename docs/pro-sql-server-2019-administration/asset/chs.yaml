  | 参数 | 描述 |

  | --- | --- |

  | `/ACTION` | 指定操作参数为 `Repair`。 |

  | `/INSTANCENAME` | 指定包含损坏系统数据库的实例的名称。 |

  | `/Q` | 此参数是安静模式。使用它可以在没有任何用户交互的情况下运行。 |

  | `/ENU` | 一个可选参数，您可以在本地化操作系统上使用它来指定应使用 SQL Server 的英文版本。 |

  | `/FEATURES` | 一个可选参数，您可以用它来指定要修复的组件列表。 |

  | `/HIDECONSOLE` | 一个可选参数，用于隐藏控制台。 |


