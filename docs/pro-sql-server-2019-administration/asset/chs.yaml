  | `/INSTALLSHAREDWOWDIR` | 指定实例间共享的 32 位组件的文件夹位置。此位置不能与 64 位共享组件的位置相同。 |

  | `/INSTALLSQLDATADIR` | 指定实例数据的默认文件夹位置。 |

  | `/NPENABLED` | 指定是否应启用命名管道。可设置为 `0` 禁用或 `1` 启用。 |

