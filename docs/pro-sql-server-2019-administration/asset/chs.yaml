  ### 产品更新与配置安装指南


  #### 注意事项

  如果使用的账户是 MSA/gMSA，则不应指定账户密码。这包括数据库引擎和 SQL Server Agent 服务的账户，否则这些是必需项。


  #### 功能概述

  **产品更新**功能取代了 SQL Server 已弃用的“流式安装”功能，使您能够在安装 SQL Server 基础二进制文件的同时，安装最新的 CU（累积更新）或
  GDR（一般分发发布—针对安全问题的修补程序）。此功能可以节省 DBA 在安装 SQL Server 实例后立即安装最新更新所需的时间和精力，也有助于确保新构建的实例具有一致的修补级别。


  > **提示：** 从 SQL Server 2017 开始，不再发布服务包。所有更新均为 CU 或 GDR。


  #### 命令行安装参数

  要使用此功能，必须在命令行安装过程中使用两个参数。第一个是 `/UPDATEENABLED` 参数。应将此参数的值指定为 `1` 或 `True`。第二个是 `/UPDATESOURCE`
  参数。此参数将告诉安装程序在哪里查找产品更新。如果向此参数传入值 `MU`，则安装程序将检查 Microsoft Update 或 WSUS 服务；或者，您也可以提供文件夹的相对路径或网络共享的
  UNC（通用命名约定）路径。


  #### 包含 CU 的安装示例

  以下示例将研究如何使用此功能安装包含 CU1 的 SQL Server 2019，该 CU 位于网络共享中。当您下载 GDR 或 CU 时，它们将以自解压可执行文件的形式提供。这非常有用，因为即使您的环境中未使用
  WSUS，一旦您确认了新的修补级别，只需替换网络共享中的 CU 即可；执行此操作后，所有新构建都可以接收最新更新，而您无需更改用于构建新实例的 PowerShell
  脚本。


  > **注意：** 用于运行安装的账户需要对文件共享具有访问权限。


  清单 3-5 中的 PowerShell 命令将安装一个名为 `PROSQLADMINCU1` 的 SQL Server 实例，同时安装位于文件服务器上的 CU1。


  ```

  .\SETUP.EXE / IACCEPTSQLSERVERLICENSETERMS /ACTION="Install" /FEATURES=SQLEngine,Replication,Conn
  /INSTANCENAME="PROSQLADMINCU1" /SQLSVCACCOUNT="MyDomain\SQLServiceAccount1" /SQLSVCPASSWORD="Pa$$w0rd"
  /AGTSVCACCOUNT="MyDomain\SQLServiceAccount1" /AGTSVCPASSWORD="Pa$$w0rd" /SQLSYSADMINACCOUNTS="MyDomain\SQLDBA"
  /UPDATEENABLED=1 /UPDATESOURCE="\\192.168.183.1\SQL2019_CU1\" /qs

  ```

  清单 3-5 安装期间安装 CU


  #### 验证实例版本

  清单 3-6 中的代码演示了如何查询两个实例之间的差异。该代码使用 `invoke-sqlcmd` 连接到 `PROSQLADMINCORE2` 实例并返回包含该实例完整版本详细信息（包括内部版本号）的系统变量。为了便于我们识别结果，其中也包含了实例的名称。


  ```

  $parameters = @{

  ServerInstance = ''localhost\PROSQLADMINCORE2''

  Query               = "

  SELECT

  @@SERVERNAME

  , @@VERSION

  "

  }

  Invoke-sqlcmd @parameters

  ```

  清单 3-6 确定每个实例的构建版本


  在此示例中，我们使用了名为“Splatting”的 PowerShell 技术。通过预先定义参数，这使我们的代码更具可读性。因为我们可以在 `invoke-sqlcmd`
  语句中使用多个 Splatting 组，所以也可以使用 Splatting 使代码可重用。例如，我们可以将查询放在与其他参数单独的 Splatting 组中，这意味着每次调用
  `invoke-sqlcmd` 都可以使用相同的参数集。结果如图 3-4 所示。


  ![../images/333037_2_En_3_Chapter/333037_2_En_3_Fig4_HTML.jpg](img/333037_2_En_3_Fig4_HTML.jpg)

  图 3-4 PROSQLADMINCORE2 版本详细信息


  从结果中我们可以看到，`PROSQLADMINCORE2` 运行在 SQL Server 内部版本号 `15.0.1100.94` 上，这是 SQL Server
  2019 CTP 2.1 的版本号。


  ### 使用配置文件

  本书前面已在多处提及使用配置文件来生成一致的构建。清单 3-7 中的示例是一个配置文件的内容，该文件已填充了在 Windows Server Core 上安装名为
  `PROSQLADMINCONF1` 的实例所需的所有必需参数。它还包含启用命名管道和 TCP/IP 的可选参数、将 FILESTREAM 启用级别设置为只能通过
  T-SQL 访问、将 SQL Agent 服务设置为自动启动以及将排序规则配置为 `Latin1_General_CI_AS`。在此 `.ini` 文件中，以分号开头的行定义为注释。


  ```

  ; SQL Server 2019 Configuration File

  [OPTIONS]

  ; Accept the SQL Server License Agreement

  IACCEPTSQLSERVERLICENSETERMS

  ; Specifies a Setup work flow, like INSTALL, UNINSTALL, or UPGRADE.

  ; This is a required parameter.

  ACTION="Install"

  ; Setup will display progress only, without any user interaction.

  QUIETSIMPLE="True"

  ; Specifies features to install, uninstall, or upgrade.

  FEATURES=SQLENGINE,REPLICATION,CONN

  ; Specify a default or named instance. MSSQLSERVER is the default instance for

  ; non-Express editions and SQLExpress is for Express editions. This parameter is

  ; required when installing the SQL Server Database Engine (SQL), Analysis

  ; Services (AS)

  INSTANCENAME="PROSQLADMINCONF1"

  ; Agent account name

  AGTSVCACCOUNT="MyDomain\SQLServiceAccount1"

  ; Agent account password

  AGTSVCPASSWORD="Pa$$w0rd"

  ; Auto-start service after installation.

  AGTSVCSTARTUPTYPE="Automatic"

  ; Level to enable FILESTREAM feature at (0, 1, 2 or 3).

  FILESTREAMLEVEL="1"

  ; Specifies a Windows collation or an SQL collation to use for the Database

  ; Engine.

  SQLCOLLATION="Latin1_General_CI_AS"

  ; Account for SQL Server service: Domain\User or system account.

  SQLSVCACCOUNT="MyDomain\SQLServiceAccount1"

  ; Password for the SQL Server service account.

  SQLSVCPASSWORD="Pa$$w0rd"

  ; Windows account(s) to provision as SQL Server system administrators.

  SQLSYSADMINACCOUNTS="MyDomain\SQLDBA"

  ; Specify 0 to disable or 1 to enable the TCP/IP protocol.

  TCPENABLED="1"

  ; Specify 0 to disable or 1 to enable the Named Pipes protocol.

  NPENABLED="1"

  ```

  清单 3-7 用于 PROSQLADMINCONF1 的配置文件



  #### 提示


  如果你使用先前 SQL Server 安装创建的配置文件作为自己配置文件的模板，你会注意到以下参数被指定：`MATRIXCMBRICKCOMMPORT`、`MATRIXCMSERVERNAME`、`MATRIXNAME`、`COMMFABRICENCRYPTION`、`COMMFABRICNETWORKLEVEL`
  和 `COMMFABRICPORT`。这些参数仅供 Microsoft 内部使用，应予以忽略。它们对构建没有影响。


  假设此配置文件已保存为 `c:\SQL2019\configuration1.ini`，那么可以使用清单 3-8 中的代码从 PowerShell 运行 `setup.exe`。


  ```

  .\setup.exe /CONFIGURATIONFILE="c:\SQL2019\Configuration1.ini"

  清单 3-8

  使用配置文件安装 SQL Server

  ```


  尽管这是对配置文件的完全有效的用法，但你实际上可以更进一步，使用此方法创建一个可重用的脚本，该脚本可以在任何服务器上运行，以帮助你引入一致的构建过程。本质上，你是在使用
  Windows Server Core 的准备式独立映像的脚本化版本。如果你们的 Windows 运维团队尚未采用 Sysprep 或使用其他方法来构建服务器，这将特别有用。


  在清单 3-9 中，你会看到另一个配置文件。然而，这次它仅包含你期望在整个环境中保持一致的静态参数。每次安装时会变化的参数（如实例名称和服务帐户详细信息）已被省略。


  ```

  ;SQL Server 2019 配置文件

  [OPTIONS]

  ; 接受 SQL Server 许可协议

  IACCEPTSQLSERVERLICENSETERMS

  ; 指定安装工作流，如 INSTALL、UNINSTALL 或 UPGRADE。

  ; 这是一个必需参数。

  ACTION="Install"

  ; 安装程序将仅显示进度，无需任何用户交互。

  QUIETSIMPLE="True"

  ; 指定要安装、卸载或升级的功能。

  FEATURES=SQLENGINE,REPLICATION,CONN

  ; 安装后自动启动服务。

  AGTSVCSTARTUPTYPE="Automatic"

  ; 启用 FILESTREAM 功能的级别（0、1、2 或 3）。

  FILESTREAMLEVEL="1"

  ; 指定数据库引擎要使用的 Windows 排序规则或 SQL 排序规则。

  SQLCOLLATION="Latin1_General_CI_AS"

  ; 要配置为 SQL Server 系统管理员的 Windows 帐户。

  SQLSYSADMINACCOUNTS="MyDomain\SQLDBA"

  ; 指定 0 以禁用或 1 以启用 TCP/IP 协议。

  TCPENABLED="1"

  ; 指定 0 以禁用或 1 以启用 Named Pipes 协议。

  NPENABLED="1"

  清单 3-9

  用于 PROSQLADMINCONF2 的配置文件

  ```


  这意味着要成功安装实例，你将需要使用来自配置文件的参数和运行 `setup.exe` 的命令中的行内参数的组合，如清单 3-10 所示。此示例假设清单 3-9
  中的配置已保存为 `C:\SQL2019\Configuration2.ini`，并将安装名为 `PROSQLADMINCONF2` 的实例。


  ```

  .\SETUP.EXE /INSTANCENAME="PROSQLADMINCONF2" /SQLSVCACCOUNT="MyDomain\SQLServiceAccount1"
  /SQLSVCPASSWORD="Pa$$w0rd" /AGTSVCACCOUNT="MyDomain\SQLServiceAccount1" /AGTSVCPASSWORD="Pa$$w0rd"
  /CONFIGURATIONFILE="C:\SQL2019\Configuration2.ini"

  清单 3-10

  使用混合参数和配置文件安装 SQL Server

  ```


  ### 自动化安装例程


  这种方法的好处是，我们拥有一个一致的配置文件，无需在每次构建新实例时进行修改。然而，这个想法可以更进一步。如果我们将 PowerShell 命令保存为 PowerShell
  脚本，那么我们可以运行该脚本并传入参数，而不是每次重写命令。这将提供一个用于构建新实例的一致脚本，我们可以将其置于变更控制之下。清单 3-11 中的代码演示了如何构造一个参数化的
  PowerShell 脚本，该脚本将使用相同的配置文件。该脚本假设 `D:\` 是安装介质的根文件夹。


  ```

  param(

  [string] $InstanceName,

  [string] $SQLServiceAccount,

  [string] $SQLServiceAccountPassword,

  [string] $AgentServiceAccount,

  [string] $AgentServiceAccountPassword

  )

  D:\SETUP.EXE /INSTANCENAME=$InstanceName /SQLSVCACCOUNT=$SQLServiceAccount /SQLSVCPASSWORD=$SQLServiceAccountPassword
  /AGTSVCACCOUNT=$AgentServiceAccount /AGTSVCPASSWORD=$AgentServiceAccountPassword
  /CONFIGURATIONFILE="C:\SQL2019\Configuration2.ini"

  清单 3-11

  用于自动安装的 PowerShell 脚本

  ```


  假设此脚本保存为 `SQLAutoInstall.ps1`，则可以使用清单 3-12 中的命令来构建名为 `PROSQLADMINAUTO1` 的实例。此命令运行
  PowerShell 脚本，传入参数，这些参数随后用于 `setup.exe` 命令。


  ```

  ./SQLAutoInstall.ps1 -InstanceName ''PROSQLADMIN1'' -SQLServiceAccount ''MyDomain\SQLServiceAccount1''
  -SQLServiceAccountPassword ''Pa$$w0rd'' -AgentServiceAccount ''MyDomain\SQLServiceAccount1''
  -AgentServiceAccountPassword ''Pa$$w0rd''

  清单 3-12

  运行 SQLAutoInstall.ps1

  ```


  #### 提示


  因为我已经指定了参数的名称，所以不需要按照它们在脚本中声明的顺序来指定。这也使代码更具可读性。


  #### 增强安装例程


  你还可以进一步扩展 `SQLAutoInstall.ps1` 脚本，并利用你在第 1 章学到的用于配置操作系统组件的技术和本章前面学到的用于执行冒烟测试的技术。


  安装实例后，修改后的脚本（清单 3-13，我们将其称为 `SQLAutoInstall2.ps1`）使用 `powercfg` 设置高性能电源计划，并使用 `set-ItemProperty`
  优先考虑后台服务而非前台应用程序。然后运行冒烟测试以确保 SQL Server 和 SQL Agent 服务都在运行并且实例可访问。


  ```

  param(

  [string] $InstanceName,

  [string] $SQLServiceAccount,

  [string] $SQLServiceAccountPassword,

  [string] $AgentServiceAccount,

  [string] $AgentServiceAccountPassword

  )

  ##### 初始化 ConnectionString 变量

  $ServerName = $env:computername

  $ConnectionString = $ServerName + ''\'' + $InstanceName

  #安装实例

  ./SETUP.EXE /INSTANCENAME=$InstanceName /SQLSVCACCOUNT=$SQLServiceAccount /SQLSVCPASSWORD=$SQLServiceAccountPassword
  /AGTSVCACCOUNT=$AgentServiceAccount /AGTSVCPASSWORD=$AgentServiceAccountPassword
  /CONFIGURATIONFILE="C:\SQL2019\Configuration2.ini"

  ##### 配置操作系统设置

  powercfg -setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c

  Set-ItemProperty -path HKLM:\SYSTEM\CurrentControlSet\Control\PriorityControl -name
  Win32PrioritySeparation -Type DWORD -Value 24

  ##### 运行冒烟测试

  Get-service -displayname *$InstanceName*

  Invoke-sqlcmd -Serverinstance $ConnectionString -Query "SELECT @@SERVERNAME"

  清单 3-13

  增强的 PowerShell 自动安装脚本

  ```


  除了将变量传递到 `setup.exe` 命令外，此脚本还使用 `$InstanceName` 参数作为冒烟测试的输入。该参数可以直接传递给 `get-service`
  cmdlet，两侧使用通配符。然而，对于 `invoke-sqlcmd`，我们需要做一点额外的工作。`invoke-sqlcmd` 需要实例的全名，包括服务器名称或
  `local`（假设脚本始终在本地运行）。该脚本从 `ComputerName` 环境变量中提取服务器名称，然后将其与 `$InstanceName` 变量连接，两者之间放置一个
  `\`。这个连接后的值填充了 `$ConnectionString` 变量，然后可以将其传递给 `-Serverinstance` 开关。




  #### 生产环境就绪


  最后，你可能希望为脚本添加一些防御性编码，使其达到生产环境就绪状态。尽管`PowerShell`具备`try`/`catch`功能，但由于`setup.exe`是外部应用程序，它会生成自己的消息和错误，因此确保此脚本平稳运行的最有效技术是强制使用必填参数。


  清单 3-14 中的代码是脚本的修改版本，我们将其称为`SQLAutoInstall3.ps1`。此版本的脚本使用`Parameter`关键字为每个参数将`Mandatory`属性设置为`true`。这很重要，因为如果运行此脚本的人遗漏了任何参数，或者参数名称存在拼写错误，安装将会失败。这通过确保在允许脚本运行前已输入所有参数，提供了一种故障保护机制。我们在此脚本中所做的另一项更改是在每个步骤前后添加注释，这样如果脚本确实失败，我们可以轻松查看错误发生的位置。


  ```powershell

  param(

  [Parameter(Mandatory=$true)]

  [string] $InstanceName,

  [Parameter(Mandatory=$true)]

  [string] $SQLServiceAccount,

  [Parameter(Mandatory=$true)]

  [string] $SQLServiceAccountPassword,

  [Parameter(Mandatory=$true)]

  [string] $AgentServiceAccount,

  [Parameter(Mandatory=$true)]

  [string] $AgentServiceAccountPassword

  )

  ##### 初始化连接字符串变量

  $ServerName = $env:computername

  $ConnectionString = $ServerName + ''\'' + $InstanceName

  "初始化变量完成..."

  ##### 安装实例

  ./SETUP.EXE /INSTANCENAME=$InstanceName /SQLSVCACCOUNT=$SQLServiceAccount /SQLSVCPASSWORD=$SQLServiceAccountPassword
  /AGTSVCACCOUNT=$AgentServiceAccount /AGTSVCPASSWORD=$AgentServiceAccountPassword
  /CONFIGURATIONFILE="C:\SQL2019\Configuration2.ini"

  "实例安装完成..."

  ##### 配置操作系统设置

  powercfg -setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c

  "高性能电源计划配置完成..."

  Set-ItemProperty -path HKLM:\SYSTEM\CurrentControlSet\Control\PriorityControl -name
  Win32PrioritySeparation -Type DWORD -Value 24

  "后台服务优化配置完成..."

  ##### 运行冒烟测试

  Get-service -displayname *$InstanceName* -ErrorAction Stop

  "服务运行检查完成..."

  Invoke-sqlcmd -Serverinstance $ConnectionString -Query "SELECT @@SERVERNAME"

  "实例可访问性检查完成..."

  ```


  清单 3-14 带有防御性代码的自动安装脚本


  `SQLAutoInstall3.ps1`脚本已被运行，但未指定任何参数。在脚本的先前版本中，`PowerShell`会继续执行代码，然后`setup.exe`会因为未为所需参数指定值而失败。然而，在此版本中，你可以看到系统会依次提示你为每个参数输入一个值。


  运行脚本时，你会注意到在脚本执行的每个阶段之后，都会显示我们的注释。这可以帮助你响应错误，因为你甚至可以在开始解读可能显示的任何错误消息之前，轻松查看是哪个命令导致了问题。


  ### 总结


  在`Windows Server Core`上安装`SQL Server`可以简单到从`PowerShell`运行单个命令并传递适当的参数。然而，为了保持企业内的一致性并减少手动工作量，你可能希望自动化构建过程。你可以通过使用配置文件来实现这一点，但也可以将此过程扩展为完全自动化安装，包括操作系统配置。然后，你就能将`PowerShell`脚本置于变更控制之下，每次希望构建新实例时，只需运行它并传递参数即可。


  安装实例后，应运行冒烟测试以确保服务正在运行且实例可访问。这将突出显示任何阻碍性问题。如果你确实需要对构建进行故障排除，那么你的起点应是检查`summary.txt`日志文件，如果需要，再检查`detail.txt`日志文件。


  除了安装基础二进制文件外，你还可以使用`SQL Server`的产品更新功能同时安装最新的累积更新。产品更新可以配置为检查 Microsoft 更新、文件夹位置或网络文件夹。如果你将最新且经过充分测试的更新存储在网络共享上，那么就可以在网络中的任何实例安装时使用它，并且当你希望提高所支持的更新级别时，只需替换网络共享上的更新文件即可。


  '
- "# 4. 在异构操作系统上安装\n\n`SQL Server`的最后两个主要版本都非常注重提供在各种非传统环境中安装`SQL Server`的能力。在本章中，我们将探讨如何在`Linux`上安装`SQL\
  \ Server`，以及如何构建和运行包含`SQL Server`的`Docker`镜像和容器。\n\n#### 提示\n\n在`Linux`上安装和配置`SQL\
  \ Server`的命令因发行版而略有不同。本章重点关注`Ubuntu`，因为它可以说对基于`Windows`的`DBA`最友好，本章的目的是让你熟悉概念和流程。Microsoft\
  \ 为每个发行版提供了快速入门指南，网址为[`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup?view=sql-server-2019`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-setup?view=sql-server-2019)。\n\
  \n### 在 Linux 上安装 SQL Server\n\n表 4-1 详细列出了`SQL Server`支持的`Linux`发行版和版本。版本很重要，例如，在撰写本文时，`Ubuntu`的当前版本是\
  \ 19.4.1。`SQL Server`支持版本 16.4。在我个人的测试中，`SQL Server`可以成功安装在`Ubuntu`19.4.1 上，但（在撰写本文时）`Pacemaker`和`PCS`服务无法安装在此版本上，这意味着无法在此版本的`Ubuntu`上为高可用性/灾难恢复配置`AlwaysOn\
  \ 可用性组`。\n\n表 4-1 支持的 Linux 发行版和版本\n\n| 发行版 | 支持的版本 |\n| --- | --- |\n| Red Hat\
  \ Enterprise | 7.3–7.6 |\n| SUSE Enterprise Server | V12 SP2 |\n| Ubuntu | 16.4\
  \ |\n\n在以下各节中，我们将探讨如何在`Linux`上手动安装`SQL Server`以及如何创建无人参与安装。\n\n\n\n#### 手动安装 SQL\
  \ Server\n\n在 Windows 上安装 SQL Server 时，你可以在安装前指定实例的配置方式。在 Linux 上则相反，你首先安装一个基础版本的\
  \ SQL Server，然后在部署后配置实例。在本节中，我们将回顾在 Linux 平台上手动安装 SQL Server 的过程。本次演示将使用 Ubuntu\
  \ 16.4。\n\n##### 导入公共 GPG 密钥\n\n安装 SQL Server 的第一步是导入公共 gpg 密钥，这将使我们能够访问 SQL Server\
  \ 软件仓库（repository）。这可以通过清单 4-1 中的 `bash` 命令来实现。\n\n```\nwget -qO- https://packages.microsoft.com/keys/microsoft.asc\
  \ | sudo apt-key add –\n清单 4-1\n导入公共 GPG 密钥\n```\n\n如果我们分解这个命令，我们是使用 `wget` 命令从\
  \ Microsoft 网站拉取密钥。`wget` 是一个用于获取网页内容的命令。然后我们使用 `|` 操作符将密钥传递给 `apt-key` 命令，这是一个密钥管理工具。`add`\
  \ 命令将密钥添加到受信任密钥列表中。一旦 SQL Server 软件包使用受信任密钥进行验证，该软件包就会变为受信任状态。使用 `sudo` 类似于 Windows\
  \ 平台上的“以管理员身份运行”原则。它用于将用户权限提升至 `root` 级别（相当于 Windows 的管理员）。\n\n##### 注册 SQL Server\
  \ 软件仓库\n\n下一步是注册 SQL Server 软件仓库。这可以使用清单 4-2 中的 `bash` 命令完成。该命令使用 `add-apt-repository`\
  \ 脚本来添加一个外部仓库。其中嵌入的 `wget` 命令从 Microsoft 网站拉取软件包列表。\n\n```\nsudo add-apt-repository\
  \ \"$(wget -qO- https://packages.microsoft.com/config/ubuntu/16.04/mssql-server-2019.list)\"\
  \n清单 4-2\n注册 SQL Server 软件仓库\n```\n\n##### 更新软件包列表\n\n接下来，我们将使用 `apt-get`（Linux\
  \ 的软件包管理器）从软件仓库拉取软件包列表，并用软件包的最新版本更新这些列表。清单 4-3 演示了这一点。\n\n```\nsudo apt-get update\n\
  清单 4-3\n更新软件仓库的软件包列表\n```\n\n##### 安装 SQL Server 软件包\n\n在清单 4-4 中，我们将再次使用 `apt-get`，这次配合\
  \ `install` 命令来安装 SQL Server 软件包。`-y` 开关用于自动接受用户提示。\n\n```\nsudo apt-get install\
  \ -y mssql-server\n清单 4-4\n安装 SQL Server 软件包\n```\n\n##### 配置实例\n\n软件包安装完成后，输出将提示你运行\
  \ `sudo /opt/mssql/bin/mssql-conf setup`，这是 SQL Server 配置工具，允许你配置实例。运行 `mssql-conf\
  \ setup` 工具后，系统将提示你选择希望使用的 SQL Server 版本，如图 4-1 所示。使用数字 1 到 8 进行选择。\n\n![../images/333037_2_En_4_Chapter/333037_2_En_4_Fig1_HTML.jpg](img/333037_2_En_4_Fig1_HTML.jpg)\n\
  图 4-1. 选择版本\n\n接下来，系统会要求你接受 SQL Server 许可条款，如图 4-2 所示。键入 `Yes` 即可接受。\n\n![../images/333037_2_En_4_Chapter/333037_2_En_4_Fig2_HTML.jpg](img/333037_2_En_4_Fig2_HTML.jpg)\n\
  图 4-2. 接受许可条款\n\n如图 4-3 所示，接下来你需要使用数字 1 到 11 选择你的语言。\n\n![../images/333037_2_En_4_Chapter/333037_2_En_4_Fig3_HTML.jpg](img/333037_2_En_4_Fig3_HTML.jpg)\n\
  图 4-3. 语言选择\n\n**提示**：在图 4-3 中未正确显示的语言是多字符语言，例如中文。\n\n现在，系统将提示你输入并确认 `sa` 账户的密码，如图\
  \ 4-4 所示。\n\n![../images/333037_2_En_4_Chapter/333037_2_En_4_Fig4_HTML.jpg](img/333037_2_En_4_Fig4_HTML.jpg)\n\
  图 4-4. 添加 `sa` 密码\n\n##### 连接到实例\n\n你的实例现已配置完成，你可以通过 `sqlcmd`（作为 SQL Server 工具包的一部分安装在\
  \ Linux 服务器上——在本章的“无人参与安装”部分讨论）连接，或者使用 SSMS（SQL Server Management Studio）远程连接。\n\
  \n\n\n### 配置 SQL Server\n\n尽管 SQL Server 现已安装并已完成基本配置，但要使其完全满足你的需求功能，在操作系统和实例级别可能仍有许多配置方面需要处理。在本节中，我们将探讨在\
  \ Linux 环境中可能需要执行的一些常见配置要求。\n\n配置 SQL Server 实例的主要工具是 `mssql-conf`，这也是我们在安装过程中用来配置版本、语言以及为\
  \ `sa` 账户设置密码的同一个工具。该工具还提供了许多其他可配置参数，这些参数在表 4-2 中有详细说明。\n\n表 4-2 `mssql-conf` 参数\n\
  \n| 参数 | 描述 |\n| --- | --- |\n| Agent | 启用或禁用 SQL Server 代理 |\n| Collation | 设置实例排序规则\
  \ |\n| Customer feedback | 指定是否向 Microsoft 发送客户反馈。默认开启，且对于免费版本无法关闭 |\n| Database\
  \ Mail profile | 用于电子邮件警报的数据库邮件配置文件 |\n| Default data directory | 用户数据库文件的默认目录 |\n\
  | Default log directory | 用户数据库事务日志文件的默认目录 |\n| Default Master database directory\
  \ | Master 数据库数据和日志文件的目录 |\n| Default Master database file name | 更改 Master 数据库的数据库文件名\
  \ |\n| Default dump directory | 内存转储文件的目录 |\n| Default error log directory | 用于新的\
  \ SQL Server 错误日志、默认分析器跟踪、系统运行状况会话 XE 和 Hekaton 会话 XE 文件的目录 |\n| Default backup\
  \ directory | 新备份的目录 |\n| Dump type | 指定要捕获的内存转储文件类型。除了迷你转储外，还允许捕获完全转储。还允许你指定转储文件类型（mini、miniplus、filtered\
  \ 和 full） |\n| High availability | 启用或禁用 AlwaysOn 可用性组 |\n| Local Audit directory\
  \ | 本地审核文件的目录 |\n| Locale | SQL Server 实例的区域设置 |\n| Memory limit | 分配给 SQL Server\
  \ 实例的物理内存量 |\n| TCP port | SQL Server 将监听连接的端口 |\n| TLS | 用于配置 SQL Server 实例的网络方面，包括\
  \ `forceencryption`、`tlscert`、`tlskey`、`tlsprotocols`、`tlsciphers` 和 `kerberoskeytabfile`\
  \ |\n| Traceflags | 在实例上设置全局跟踪标志 |\n\n最常见的配置需求之一可能是启动 SQL Server 代理。这可以通过 `Agent`\
  \ 参数来实现，如代码清单 4-5 所示。\n\n```\nsudo /opt/mssql/bin/mssql-conf set sqlagent.enabled\
  \ true\n代码清单 4-5\n启动服务器代理\n```\n\n另一个展示如何使用该工具的好例子是 `TCP port` 参数。与在 Windows 环境中一样，TCP\
  \ 1433 是 SQL Server 的默认端口号。然而，你可能希望更改此端口，例如在高安全环境中，以避免使用可能被攻击的知名端口号。\n\n代码清单 4-6\
  \ 中的命令将配置 SQL Server 实例监听端口 50001。50001-500xx 是我经常使用的端口范围，因为它未被保留。\n\n```\nsudo\
  \ /opt/mssql/bin/mssql-conf set network.tcpport 50001\n代码清单 4-6\n配置端口\n```\n\n要使设置生效，我们首先需要重新启动\
  \ SQL Server 服务。这可以使用 `systemctl` 来完成，它是一个用于管理服务的 Linux 工具。代码清单 4-7 中的命令将重新启动 SQL\
  \ Server 服务。\n\n```\nsudo systemctl restart mssql-server\n代码清单 4-7\n重新启动 SQL Server\
  \ 服务\n```\n\n`systemctl` 工具也可用于检查服务是否正在运行，如代码清单 4-8 所示。\n\n```\nsudo systemctl status\
  \ mssql-server\n代码清单 4-8\n检查服务是否正在运行\n```\n\n现在我们已将 SQL Server 配置为监听端口 50001，我们还需要配置本地防火墙，以允许通过此端口的流量。本地防火墙使用一个名为\
  \ `ufw`（简单防火墙）的工具进行管理。代码清单 4-9 中的脚本演示了如何安装 `ufw`、设置默认规则、允许通过端口 50001 的流量，然后重置它以使规则生效。最后，该脚本将显示已配置的规则。\n\
  \n```\n#安装 ufw\nsudo apt-get install ufw\n#启动 ufw\nsudo systemctl start ufw\n#启用\
  \ ufw\nsudo systemctl enable ufw\n#设置默认防火墙规则\nsudo ufw default allow outgoing\n\
  sudo ufw default deny incoming\n#添加 SQL 规则\nsudo ufw allow 50001/tcp\n#重新加载 ufw\n\
  sudo ufw reload\n#显示 ufw 状态\nsudo ufw status\n代码清单 4-9\n使用 ufw\n```\n\n#### 注意\n\
  \n在 SQL Server 2019 中，`TempDB` 将自动配置为每个核心一个数据文件，最多八个文件。但对于早期版本，安装过程中只会创建一个数据文件。\n\
  \n### 无人参与安装\n\n因为 Bash 是一种脚本语言，所以 SQL Server 安装可以编写脚本，就像你可以在 Windows 环境中使用 PowerShell\
  \ 编写安装脚本一样。为此，我们将首先使用文本编辑器 `vi` 创建一个文本文件。代码清单 4-10 中的命令将创建并打开一个名为 `sqlconfig.sh`\
  \ 的文件。`.sh` 是 bash 脚本常用的扩展名。\n\n```\nvi sqlconfig.sh\n代码清单 4-10\n用 Vi 创建 Bash 脚本\n\
  ```\n\n全面讨论 `vi` 命令超出了本书的范围。但是，要插入文本，请使用 `i` 命令。完成后，使用 `ESC` 返回命令模式。在这里，`:q!` 将不保存退出\
  \ `vi`，而 `:wq` 将保存并退出。\n\n代码清单 4-11 中的脚本可以添加到 bash 脚本中。文件的第一行表明它是可执行的。你还会注意到我们正在为此实例安装全文索引，并为\
  \ SQL Server 配置一个跟踪标志和最大内存限制。\n\n然而，最有趣的事情可能是，我们还在安装一个名为 `mssql-tools` 的包。此包包含 Linux\
  \ 上 SQL Server 的命令行工具，包括 `sqlcmd`。我们将在脚本末尾使用它来创建一个新用户并将其添加到 `sysadmins` 固定服务器角色中。\n\
  \n\n#### 提示\n\n微软正在为 SQL Server 开发一款新的跨平台命令行工具，名为 `mssql-cli`。此工具可在 Linux、Windows\
  \ 和 Mac 上使用。在撰写本文时，该工具处于预览阶段，但更多详细信息请访问 [`https://github.com/dbcli/mssql-cli`](https://github.com/dbcli/mssql-cli)。\n\
  \n```bash\n#! /bin/bash\nMSSQL_SA_PASSWORD='Pa££w0rd'\nMSSQL_PID='developer'\nSQL_USER='SQLAdmin'\n\
  SQL_USER_PASSWORD='Pa££w0rd'\nwget -qO- https://packages.microsoft.com/keys/microsoft.asc\
  \ | sudo apt-key add -\nsudo add-apt-repository \"$(wget -qO- https://packages.microsoft.com/config/ubuntu/16.04/mssql-server-2019.list)\"\
  \nsudo add-apt-repository \"$(wget -qO- https://packages.microsoft.com/config/ubuntu/16.04/prod.list)\"\
  \nsudo apt-get update -y\nsudo apt-get install -y mssql-server\nsudo ACCEPT_EULA=Y\
  \ apt-get install -y mssql-tools unixodbc-dev\nsudo MSSQL_SA_PASSWORD=$MSSQL_SA_PASSWORD\
  \ \\\nMSSQL_PID=$MSSQL_PID \\\n/opt/mssql/bin/mssql-conf -n setup accept-eula\n\
  sudo /opt/mssql/bin/mssql-conf set sqlagent.enabled true\nsudo /opt/mssql/bin/mssql-conf\
  \ set memory.memorylimitmb 2048\nsudo /opt/mssql/bin/mssql-conf traceflag 3226 on\n\
  sudo apt-get install -y mssql-server-fts\nsudo systemctl restart mssql-server\n\
  /opt/mssql-tools/bin/sqlcmd \\\n-S localhost \\\n-U SA \\\n-P $MSSQL_SA_PASSWORD\
  \ \\\n-Q \"CREATE LOGIN [$SQL_USER] WITH PASSWORD=N'$SQL_INSTALL_PASSWORD'; ALTER\
  \ SERVER ROLE [sysadmin] ADD MEMBER [$SQL_USER]\"\n代码清单 4-11\n脚本化安装 SQL Server\n\
  ```\n\n代码清单 4-12 中的命令将授予该脚本执行权限。\n\n```bash\nchmod +x sqlconfig.sh\n代码清单 4-12\n\
  授予执行权限\n```\n\n可以使用代码清单 4-13 中的命令来执行此脚本。\n\n```bash\nsh sqlconfig.sh\n代码清单 4-13\n\
  执行安装\n```\n\n### 在 Docker 容器中安装 SQL Server\n\n容器是一种隔离、轻量级的运行单元，可用于运行应用程序。与模拟硬件的虚拟机不同，容器运行在操作系统之上并模拟内核。使用容器进行内核模拟被称为容器化。容器因其高效和可移植性，正日益受到各类组织的青睐。容器的可移植性也简化了部署流程，使其在\
  \ DevOps 环境中非常流行。\n\nDocker 是用于运行容器的应用平台。它最初为 Linux 开发，但现在也支持 Windows。这意味着，无论所需的底层操作系统是什么，SQL\
  \ Server 都能利用容器技术。\n\nDocker 镜像是一个单一文件，其中包含完全打包好的应用程序。因此，就 SQL Server 而言，一个 Docker\
  \ 镜像可能基于 Windows Server 2019 Core 等操作系统以及 SQL Server 二进制文件构建。你的实例将按照最佳实践进行完全配置，这样每次从镜像创建容器时，它都可以直接使用。\n\
  \n#### 注意\n\n对 SQL Server 进行容器化时，一个重要的考虑因素是容器是无状态的。它们的一个优势是，你可以非常快速轻松地删除并重启一个容器，并且它会和原来完全一样。由此带来的一个副作用是，如果容器内有数据文件，当删除容器时，这些数据文件也会被销毁。因此，用户数据文件和\
  \ `msdb` 数据文件应存储在容器外部。我通常建议将 `master` 的数据文件保留在容器内，因为此数据库存储了许多实例配置详情，但在某些情况下，你可能也希望将这些文件存储在容器外部。\n\
  \n#### 运行 Microsoft 提供的 Docker 镜像\n\n微软为 SQL Server 提供少量 Docker 镜像。例如，在撰写本文时，有一个用于\
  \ Ubuntu 16.4 的 SQL Server 2017 镜像，以及一个运行 SQL Server 2017 开发人员版的 Windows Server\
  \ Core 2016 镜像。在下面的示例中，我们将为 Windows Server 2016 Core 配置容器并部署标准的 SQL Server 2017\
  \ 开发人员版容器。\n\n我们的第一步是安装容器功能并重新启动计算机。这可以通过运行代码清单 4-14 中的 PowerShell 脚本完成。\n\n```powershell\n\
  Install-WindowsFeature -name Containers\nRestart-Computer -Force\n代码清单 4-14\n安装容器功能\n\
  ```\n\n现在，我们需要安装 Docker 引擎和 Microsoft Docker 提供程序。这可以通过代码清单 4-15 中的脚本实现。\n\n```powershell\n\
  Install-Module -Name DockerMsftProvider -Repository PSGallery -Force\nInstall-Package\
  \ -Name docker -ProviderName DockerMsftProvider -Force\n代码清单 4-15\n安装 Docker 引擎\n\
  ```\n\n#### 提示\n\n如果尚未安装，代码清单 4-15 中的脚本将提示你安装 `NuGet` 提供程序。你应该接受此安装，因为 `NuGet` 是安装\
  \ Docker 等其他软件包所必需的包管理器。\n\nDocker 安装的最后一步是启动 Docker 服务。使用 PowerShell，可以通过代码清单 4-16\
  \ 中的命令完成。\n\n```powershell\nStart-Service docker\n代码清单 4-16\n启动 Docker 服务\n```\n\
  \n现在，我们可以从 Microsoft 容器注册表 (MCR) 拉取镜像。这是一个基础 Windows 容器的仓库。Docker Hub 是容器镜像的默认仓库，但即使\
  \ Windows 镜像在 Docker Hub 上列出，它们也存储在 MCR 中。我们可以使用代码清单 4-17 中的命令拉取镜像。\n\n```bash\n\
  Docker image pull microsoft/mssql-server-windows-developer\n代码清单 4-17\n拉取 Docker\
  \ 镜像\n```\n\n最后，我们需要启动容器。我们可以使用代码清单 4-18 中的命令启动容器。在此示例中，`-d` 开关表示容器应在分离模式下运行。这意味着容器将作为后台进程运行，而不是交互式运行。我们还使用\
  \ `-p` 将容器的端口发布到主机，并使用 `-e` 设置环境变量。在此例中，我们设置了 `sa` 帐户的密码并接受 SQL Server 许可条款。\n\n\
  ```bash\ndocker run -d -p 1433:1433 -e sa_password=Pa££w0rd -e ACCEPT_EULA=Y microsoft/mssql-server-windows-developer\n\
  代码清单 4-18\n运行容器\n```\n\n#### 创建用于 SQL Server 的简单 Docker 镜像\n\n虽然 Microsoft 的镜像可能适用于某些目的，但在大多数情况下，你需要根据自己的配置要求创建自己的\
  \ Docker 镜像。在本节中，我们将探讨如何使用 Docker 文件创建一个镜像，该镜像将在 Windows Server Core 上安装 SQL Server\
  \ 2019 和 SQL Server 命令行工具。\n\n#### 提示\n\n在本节中，我们将使用一台 Windows Server 2019 主机，该主机已安装容器功能、Docker\
  \ 模块和 Microsoft Docker 提供程序。如何执行这些准备步骤的详细信息，请参阅本章的“运行 Microsoft 提供的 Docker 镜像”部分。\n\
  \nDockerfile 是一个部署脚本，它指定了应如何构建容器镜像。该文件由一组指令构成。与基于 Windows 创建 SQL Server 容器最相关的指令在表\
  \ 4-3 中详述。\n\n表 4-3：Dockerfile 指令\n\n| 指令 | 描述 |\n| --- | --- |\n| `FROM` | 你的新镜像所应基于的容器镜像\
  \ |\n| `RUN` | 指定要运行的命令 |\n| `COPY` | 将文件从主机复制到容器镜像 |\n| `ADD` | 类似于 COPY，但允许从远程源复制文件\
  \ |\n| `WORKDIR` | 为其他 Docker 指令指定工作目录 |\n| `CMD` | 设置当容器镜像实例部署时要运行的默认命令 |\n| `VOLUME`\
  \ | 创建一个挂载点 |\n\n创建我们自己的容器镜像的第一步是从 MCR 拉取 Windows Server 2019 Core 镜像。这将是我们镜像的基础镜像。我们可以使用\
  \ PowerShell 来完成此操作，使用的是清单 4-19 中的命令。\n\n```\ndocker pull mcr.microsoft.com/windows/servercore:ltsc2019\n\
  ```\n**清单 4-19：** 拉取基础镜像\n\n我们的下一步是在主机上创建一个简单的文件夹结构。首先，我们将创建一个名为 `C:\\DockerBuild`\
  \ 的文件夹。此文件夹将存储我们的构建脚本。我们还将在其下创建一个名为 `C:\\DockerBuild\\SQL2019` 的文件夹。此文件夹应包含 SQL\
  \ Server 2019 安装介质。\n\n我们现在需要创建两个脚本，都将放置在 `C:\\DockerBuild` 文件夹中。第一个文件是 Dockerfile。此文件必须命名为\
  \ `Dockerfile` 且没有扩展名。\n\n#### 提示\n\n保存 `dockerfile` 时，请确保你的文本/代码编辑器没有自动向文件附加默认文件扩展名。如果附加了，那么镜像的构建将失败。\n\
  \n清单 4-20 中的脚本包含了我们将要使用的 Dockerfile 的内容。\n\n```\n#使用 Server Core 基础镜像\nFROM mcr.microsoft.com/windows/servercore:ltsc2019\n\
  #为 SQL Server 和 SQL 命令行实用工具介质创建临时文件夹\nRUN powershell -Command (mkdir C:\\SQL2019)\n\
  #将 SQL Server 介质复制到容器中\nCOPY \\SQL2019 C:/SQL2019\n#安装 SQL Server\nRUN C:/SQL2019/SETUP.exe\
  \ /Q /ACTION=INSTALL /FEATURES=SQLENGINE /INSTANCENAME=MSSQLSERVER \\\n/SECURITYMODE=SQL\
  \ /SAPWD=\"Passw0rd\" /SQLSVCACCOUNT=\"NT AUTHORITY\\System\" \\\n/AGTSVCACCOUNT=\"\
  NT AUTHORITY\\System\" /SQLSYSADMINACCOUNTS=\"BUILTIN\\Administrators\" \\\n/IACCEPTSQLSERVERLICENSETERMS=1\
  \ /TCPENABLED=1 /UPDATEENABLED=False\n#安装 Chocolatey 和 SQL Server 命令行实用工具\nRUN @\"\
  %SystemRoot%\\System32\\WindowsPowerShell\\v1.0\\powershell.exe\" -NoProfile -InputFormat\
  \ None -ExecutionPolicy Bypass -Command \"iex ((New-Object System.Net.WebClient).DownloadString('https://chocolatey.org/install.ps1'))\"\
  \ && SET \"PATH=%PATH%;%ALLUSERSPROFILE%\\chocolatey\\bin\"\nRUN choco install sqlserver-cmdlineutils\
  \ -y\n#设置 SQL Server 自动启动\nRUN powershell -Command (Set-Service MSSQLSERVER -StartupType\
  \ Automatic)\n#移除安装介质\nRUN powershell -Command (Remove-Item -Path C:/SQL2019 -Recurse\
  \ -Force)\n#为数据文件创建一个挂载点\nVOLUME C:/DataFiles\n#将 start.ps1 复制到容器中\nCOPY \\start.ps1\
  \ /\nWORKDIR /\nCMD powershell -Command (.\\start.ps1)\n```\n**清单 4-20：** Dockerfile\n\
  \n即使没有 Docker 经验，通过理解文件内容，也很容易看出发生了什么。我们的第一条语句表明，我们的构建将基于由 Microsoft 提供的 Windows\
  \ Server 2019 Core 构建。然后我们使用 `RUN` 和 `COPY` 指令将 SQL Server 介质复制到容器中。\n\n之后，我们直接进入\
  \ SQL Server 的安装。通过 PowerShell 安装 SQL Server 在第 3 章中讨论过。这段代码与在传统的运行 Windows Server\
  \ Core 的服务器上安装 SQL Server 没有区别。唯一值得注意的是，由于命令跨越多行，我们在每行末尾使用了 `\\`，以告知 Docker 这是一条指令。\n\
  \n脚本的下一部分相当有趣。我们正在安装 Chocolatey。Chocolatey 是 Windows 的一个包管理器，拥有一个庞大的预打包应用程序库。在这种情况下，它很有帮助，因为它允许我们轻松安装\
  \ SQL Server 命令行实用工具，该工具在 Chocolatey 库中可用。\n\n#### 提示\n\nChocolatey 也可用于打包你自己的 SQL\
  \ Server 构建。我最近为一个客户做了这件事，它非常契合 DevOps/配置管理式的运维风格。\n\n接下来，我们使用 `RUN` 指令来运行 PowerShell\
  \ 命令，这些命令将清理我们的安装文件并确保数据库引擎服务已启动。我们的下一步是使用 `VOLUME` 指令为 `DataFiles` 创建一个挂载点。当我们运行容器实例时，我们将能够将其映射到主机上的一个文件夹，以允许我们的数据被持久化。\n\
  \n最后，我们将一个名为 `Start.ps1` 的文件复制到我们的容器中并运行它。`Start.ps1` 的内容如清单 4-21 所示。此脚本用于运行一个无限循环。如果我们不这样做，那么一旦最后一条指令发送完毕，容器就会停止。\n\
  \n```\n$lastCheck = (Get-Date).AddSeconds(-2)\nwhile ($true)\n{\n$lastCheck = Get-Date\n\
  Start-Sleep -Seconds 2\n}\n```\n**清单 4-21：** Start.ps1\n\n将这两个文件保存在主机的 `C:\\DockerBuild`\
  \ 文件夹中之后，我们可以通过运行清单 4-22 中的命令来构建镜像。我们使用 `-t` 开关来标记构建。我使用了 `major.minor` 表示法来指示构建版本。\n\
  \n#### 提示\n\n确保在运行命令前位于`C:\\DockerBuild`目录。\n\n```\ndocker build -t sql2019:1.0\
  \ .\n清单 4-22\n构建镜像\n```\n\n构建完成后，我们可以使用清单 4-23 中的命令创建一个容器实例。\n\n```\ndocker run\
  \ -p 1433:1433 --name sql-2019 -d --volume c:\\Datafiles:c:\\datafiles sql2019:1.0\n\
  清单 4-23\n运行 Docker 容器\n```\n\n在这个命令中，我们使用`-p`来向主机暴露一个端口，并使用`-d`将容器作为后台进程运行。我们还使用`--name`来标识容器。最有趣的是，我们使用`--volume`将容器中的挂载点映射到主机上的一个文件夹。其格式为`source:target`。\n\
  \n我们没有为容器指定 IP 地址，因此可以使用清单 4-24 中的命令检查它被分配的 IP 地址。这个命令使用 Docker inspect 从基于 JSON\
  \ 的配置中提取特定节点，后跟您感兴趣的容器名称。\n\n```\ndocker inspect --format \"{{ .NetworkSettings.Networks.nat.IPAddress\
  \ }}\" sql-2019\n清单 4-24\n获取容器的 IP 地址\n```\n\n现在，我们可以从容器外部，使用 SSMS（或其他 SQL 客户端）通过这个\
  \ IP 地址连接到实例。\n\n让我们使用清单 4-25 中的脚本在挂载卷上创建一个数据库。\n\n```\nCREATE DATABASE PersistedData\n\
  ON  PRIMARY\n( NAME = N'PersistedData', FILENAME = N'C:\\Datafiles\\PersistedData.mdf'\
  \ , SIZE = 8192KB , FILEGROWTH = 65536KB )\nLOG ON\n( NAME = N'PersistedData_log',\
  \ FILENAME = N'C:\\Datafiles\\PersistedData.ldf' , SIZE = 8192KB , FILEGROWTH =\
  \ 65536KB )\nGO\n清单 4-25\n创建数据库\n```\n\n如果我们现在销毁容器，数据将会持久保存。我们可以使用清单 4-26 中的脚本来删除容器。该脚本首先停止容器，然后将其移除。\n\
  \n```\ndocker stop sql-2019\ndocker rm sql-2019\n清单 4-26\n移除容器\n```\n\n如果你现在使用清单\
  \ 4-23 中的脚本重新创建容器，并使用清单 4-24 中的脚本获取新的 IP 地址，当你连接到实例时，会注意到`PersistedData`数据库不再在实例上。这是因为在构建过程中数据库没有被附加。然而，由于文件存储在主机上，你可以使用清单\
  \ 4-27 中的命令简单地重新附加数据库。\n\n```\nCREATE DATABASE PersistedData ON\n( FILENAME = N'C:\\\
  datafiles\\PersistedData.mdf' ),\n( FILENAME = N'C:\\datafiles\\PersistedData.ldf'\
  \ )\nFOR ATTACH\nGO\n清单 4-27\n重新附加数据库\n```\n\n### 创建可配置的 SQL Server Docker 镜像\n\n\
  虽然“为 SQL Server 创建一个简单的 Docker 镜像”一节中讨论的构建过程易于遵循，但它也相当不灵活。所有内容都是硬编码的，并且没有在构建过程中附加数据库的方法。因此，在接下来的演示中，我们将对构建进行重大更改，允许我们对其进行参数化，使构建在现实场景中更加可用。\n\
  \n遵循与之前相同的过程，并使用主机上相同的文件夹结构，让我们首先创建一个新的 Docker 文件。我们将使用的`Dockerfile`内容可以在清单 4-28\
  \ 中找到。该文件相似，但你会注意到一些变化。首先，我们删除了安装 SQL Server 命令行实用工具的代码。这是因为我们将使用`sqlserver` PowerShell\
  \ provider 代替。\n\n我们还将 SQL Server 安装步骤中硬编码的 sa 密码更改为`TempPassw0rd`。这是因为当我们运行容器实例时，我们将传入想要使用的密码。\n\
  \n最显著的是，你会注意到对`Start.ps1`的调用被扩展为传递参数。在这个构建中，`Start.ps1`是所有魔法发生的地方。你会注意到我们将环境变量传递给脚本的每个参数。\n\
  \n```\n#使用 Server Core 基础镜像\nFROM mcr.microsoft.com/windows/servercore:ltsc2019\n\
  #为 SQL Server 和 SQL 命令行实用工具媒体创建临时文件夹\nRUN powershell -Command (mkdir C:\\SQL2019)\n\
  #将 SQL Server 媒体复制到容器中\nCOPY \\SQL2019 C:/SQL2019\n#安装 SQL Server\nRUN C:/SQL2019/SETUP.exe\
  \ /Q /ACTION=INSTALL /FEATURES=SQLENGINE /INSTANCENAME=MSSQLSERVER \\\n/SECURITYMODE=SQL\
  \ /SAPWD=\"TempPassw0rd\" /SQLSVCACCOUNT=\"NT AUTHORITY\\System\" \\\n/AGTSVCACCOUNT=\"\
  NT AUTHORITY\\System\" /SQLSYSADMINACCOUNTS=\"BUILTIN\\Administrators\" \\\n/IACCEPTSQLSERVERLICENSETERMS=1\
  \ /TCPENABLED=1 /UPDATEENABLED=False\n#设置 SQL Server 自动启动\nRUN powershell -Command\
  \ (Set-Service MSSQLSERVER -StartupType Automatic)\n#移除安装媒体\nRUN powershell -Command\
  \ (Remove-Item -Path C:/SQL2019 -Recurse -Force)\n#为数据文件创建挂载点\nVOLUME C:/DataFiles\n\
  #将 shell 切换到 PowerShell\n#SHELL [\"powershell\", \"-Command\", \"$ErrorActionPreference\
  \ = 'Stop'; $ProgressPreference = 'SilentlyContinue';\"]\n#将 start.ps1 复制到容器\nCOPY\
  \ \\start.ps1 /\nWORKDIR /\nCMD powershell -Command (.\\start.ps1 -saPassword $env:saPassword\
  \ -databases $env:databases -agentStartupType $env:agentStartupType)\n清单 4-28\n\
  Dockerfile\n```\n\n我们的下一步将是创建一个新的`Start.ps1`文件。这次，如清单 4-29 所示，该文件要复杂得多。该脚本接受三个参数，允许我们传入\
  \ sa 帐户的密码、实例上应该存在的数据库数组以及 SQL Server 代理服务所需的启动类型。\n\n脚本中的第一个命令用于从 PowerShell 库安装`sqlserver`\
  \ PowerShell 模块。这使我们能够使用`Invoke-SqlCmd` cmdlet。然后，脚本使用 sa 帐户的临时密码对 SQL 实例运行查询，并将密码更改为传入的密码。\n\
  \n脚本的下一部分是最复杂的部分。此部分检查传入的数据库名称数组中的每个数据库是否存在于实例上。如果不存在，它会尝试从挂载卷附加数据库。如果数据库文件不存在，它将检查挂载卷中是否存在备份文件并还原数据库。最后，如果其他所有方法都失败，则将创建一个新数据库。\n\
  \n\n#### 提示\n\n此版本的脚本严重依赖于数据库和备份文件的命名约定。它还假设始终只有一个`.mdf`和`.ldf`文件。当然，你可以编辑此脚本，以添加对`.ndf`文件、你自己的命名约定或应用程序需求的支持。\n\
  \n脚本中的下一个命令将修改 SQL Server 代理服务以使用传递给脚本的启动类型。最后，脚本进入与上一个示例相同的无限循环。这可以防止容器在最后一个指令传递后停止。\n\
  \n```powershell\nparam(\n    [Parameter(Mandatory=$true)]\n    [string]$saPassword,\n\
  \    [Parameter(Mandatory=$false)]\n    [string]$databases,\n    [Parameter(Mandatory=$false)]\n\
  \    [String]$agentStartupType\n)\n\n#Install SQL Server PowerShell Provider\nIf(-not(Get-InstalledModule\
  \ SQLServer -ErrorAction silentlycontinue)){\n    Install-Module SQLServer -Confirm:$False\
  \ -Force\n}\n\n#Update sa Password\n$params = @{\n    ServerInstance = \"localhost\"\
  \n    Username = \"sa\"\n    Password = \"TempPassw0rd\"\n    Query = \"ALTER LOGIN\
  \ [sa] WITH PASSWORD='{0}'; ALTER LOGIN sa ENABLE ;\" -f $saPassword\n}\nInvoke-Sqlcmd\
  \ @params\n\n#Shred the database array\n$databasesClean = $databases -split \",\"\
  \n\n#Create each database\nForEach ($database in $databasesClean) {\n    $params\
  \ = @{\n        ServerInstance = \"localhost\"\n        Username = \"sa\"\n    \
  \    Password = $saPassword\n        Variable = \"dbName='{0}'\" -f $database\n\
  \        Query = \"SELECT COUNT(*) AS dbExists FROM sys.databases WHERE name = `$(dbName)\"\
  \n    }\n    $dbExists = Invoke-Sqlcmd @params\n\n    if ($dbexists.dbExists -eq\
  \ 0) {\n        $mdf = \"C:\\DataFiles\\{0}.mdf\" -f $database\n        if (Test-Path\
  \ $mdf) {\n            $params = @{\n                ServerInstance = \"localhost\"\
  \n                Username = \"sa\"\n                Password = $saPassword\n  \
  \              Variable = \"dbName='{0}'\" -f $database\n                Query =\
  \ \"DECLARE @SQL NVARCHAR(MAX) = 'CREATE DATABASE [' + `$(dbName) + '] ON ( FILENAME\
  \ = N'C:\\datafiles\\' + `$(dbName) + '.mdf' ),( FILENAME = N'C:\\datafiles\\' +\
  \ `$(dbName) + '.ldf' ) FOR ATTACH'; EXEC(@SQL)\"\n            }\n            Invoke-Sqlcmd\
  \ @params\n        } else {\n            $bak = \"C:\\DataFiles\\{0}.bak\" -f $database\n\
  \            if (Test-Path $bak) {\n                $params = @{\n             \
  \       ServerInstance = \"localhost\"\n                    Username = \"sa\"\n\
  \                    Password = $saPassword\n                    Variable = \"dbName='{0}'\"\
  \ -f $database\n                    Query = \"DECLARE @SQL NVARCHAR(MAX) = 'RESTORE\
  \ DATABASE [' + `$(dbName) + '] FROM  DISK = N'C:\\Datafiles\\' + `$(dbName) + '.bak';';\
  \ EXEC(@SQL)\"\n                }\n                Invoke-Sqlcmd @params\n     \
  \       } else {\n                $params = @{\n                    ServerInstance\
  \ = \"localhost\"\n                    Username = \"sa\"\n                    Password\
  \ = $saPassword\n                    Variable = \"dbName='{0}'\" -f $database\n\
  \                    Query = \"DECLARE @SQL NVARCHAR(MAX) = 'CREATE DATABASE ['\
  \ + `$(dbName) + ']' EXEC(@SQL)\"\n                }\n                Invoke-Sqlcmd\
  \ @params\n            }\n        }\n    }\n}\n\n#Set Agent service startup type\n\
  Set-Service SQLSERVERAGENT -StartupType $agentStartupType\n\n#Start infinite loop\n\
  $lastCheck = (Get-Date).AddSeconds(-2)\nwhile ($true)\n{\n    $lastCheck = Get-Date\n\
  \    Start-Sleep -Seconds 2\n}\n```\n\n*清单 4-29*\n*Start.ps1*\n\n#### 提示\n\n环境变量不支持数组。因此，我们需要将数据库列表作为逗号分隔的字符串传递。然后，我们在\
  \ PowerShell 中使用 `Split` 来创建数组。\n\n现在我们可以使用清单 [4-30] 中的命令来构建镜像。请注意，我已增加主版本号。\n\n\
  ```bash\ndocker build -t sql-2019:2.0 .\n```\n\n*清单 4-30*\n*构建 Docker 镜像*\n\n最后，我们可以如清单\
  \ [4-31] 所示运行容器。请注意，我们使用 `-e` 开关在容器中创建环境变量。\n\n```bash\ndocker run -p 1433:1433\
  \ --name sql-2019 -e \"saPassword=PermPassw0rd\" -e \"databases=test,persisteddata\"\
  \ -e \"agentStartupType=Automatic\" -d --volume c:\\Datafiles:c:\\datafiles sql-2019:2.0\n\
  ```\n\n*清单 4-31*\n*运行容器*\n\n#### 提示\n\n容器自动化的可能性本身就值得写一本书，我鼓励你进行实验。例如，你可以尝试将运行容器的命令包装在\
  \ PowerShell 脚本中，在其中传递所需的容器名称。该脚本随后可以在主机上创建一个包含容器名称的文件夹，使其具有唯一性。容器的挂载卷可以映射到一个唯一的文件夹名称。你还应该尝试将\
  \ `sa` 密码作为加密文件的路径传递，因为在生产环境中将其作为环境变量传递并不安全。你也可以尝试向容器添加 gMSA（组托管服务账户）。这将允许 SQL Server\
  \ 与 AD 交互，尽管容器不支持域加入。\n\n#### Kubernetes 支持\n\nKubernetes 是一个容器编排器。它允许在服务器集群上运行容器，为容器提供高可用性。使用最新版本的\
  \ Kubernetes，Windows Server 2019 服务器可以与 Linux 服务器一起添加到集群中。\n\nSQL Server 2019 远非忽视这一事实，并引入了一项名为大数据集群（Big\
  \ Data Clusters）的新技术。该技术利用 Kubernetes 的力量来部署可扩展的 SQL Server、Spark 和 HDFS 容器集群。大数据集群超出了本书的范围，但更多细节可以在\
  \ [`https://docs.microsoft.com/en-us/sql/big-data-cluster/big-data-cluster-overview`](https://docs.microsoft.com/en-us/sql/big-data-cluster/big-data-cluster-overview)\
  \ 找到。\n\n此外，从 SQL Server 2019 开始，AlwaysOn 可用性组也可用于在 Kubernetes 编排的容器中，为托管容器的数据库提供高可用性和灾难恢复。这利用了\
  \ SQL Server Kubernetes 操作员（operator）的概念，它是一个扩展 Kubernetes API 的应用程序特定软件。在这种情况下，结果是一个操作员，它协助在集群内打包、部署和管理\
  \ AlwaysOn 容器。在 Kubernetes 集群中构建可用性组超出了本书的范围，但更多细节可以在 [`https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-kubernetes-deploy`](https://docs.microsoft.com/en-us/sql/linux/sql-server-linux-kubernetes-deploy)\
  \ 找到。在这里，你会发现一个使用 Azure 托管 Kubernetes 服务配置可用性组的演练。\n\n### 总结\n\nSQL Server 现在不仅可以安装在\
  \ Windows 上，还可以安装在 Linux 上和容器内。这为数据库架构师提供了更大的灵活性，可以将 SQL Server 托管在最适合其应用程序需求的平台上。\n\
  \nSQL Server 可以安装在 Ubuntu、Red Hat 和 Suse Linux 发行版上。在规划部署时，你应确保使用的是受支持的 Linux 版本以及受支持的\
  \ Linux 发行版。\n\nSQL Server 可以安装在 Windows 和 Linux 容器上。Microsoft 提供了一些基本的 Docker 镜像，但对于大多数用途，你将需要构建自己的自定义\
  \ Docker 镜像来部署 SQL Server。除了独立的 Docker 容器外，SQL Server 2019 还引入了对 Kubernetes 的支持，包括大数据集群和\
  \ SQL Server Kubernetes 操作员，这允许在 Kubernetes 集群内安装 AlwaysOn 可用性组。\n\n"
- "# 5. 配置实例\n\nSQL Server 实例的安装和配置在安装成功完成时并未结束。无论是在数据库引擎内部还是外部（使用诸如 SQL Server 配置管理器之类的工具），你都需要考虑许多其他因素。在本章中，我们将讨论许多最重要的实例级配置选项，包括\
  \ SQL Server 新的缓冲池扩展技术以及系统数据库的重要配置选择。我们还将了解如何配置你的实例以使其与防火墙协同工作。\n\n### 实例配置\n\n\
  在实例层面，有无数可以配置的设置和标志。在以下部分中，我们将探讨使用诸如 `sp_configure`、`sys.configurations`、`DBCC TRACEON`\
  \ 和 `ALTER SERVER` 等工具来查看和配置这些设置。\n\n\n\n#### 使用 sp_configure\n\n您可以使用系统存储过程 `sp_configure`\
  \ 更改许多可在实例级别配置的设置。您可以使用 `sp_configure` 过程来查看和更改实例级设置。本书的许多示例都将使用此过程，因此理解其工作原理非常重要。如果过程是批处理中的第一条语句，则可以在没有\
  \ `EXEC` 关键字的情况下运行它；但如果前面有任何语句，则必须使用 `EXEC` 关键字。如果该过程在没有参数的情况下运行，它将返回一个包含五列的结果集。这些列的含义详见表\
  \ 5-1。\n\n表 5-1\n\nsp_configure 返回的结果集\n\n| 列 | 描述 |\n| --- | --- |\n| `Name` |\
  \ 实例级设置的名称。 |\n| `Minimum` | 该设置可接受的最小值。 |\n| `Maximum` | 该设置可接受的最大值。 |\n| `Config_value`\
  \ | 为此设置配置的值。如果此值与 `Run_value` 列中的值不同，则需要重新启动或重新配置实例才能使此配置生效。 |\n| `Run_value` |\
  \ 该设置当前正在使用的值。 |\n\n如果您希望使用 `sp_configure` 更改某个设置的值（而不仅仅是查看），则必须在运行该过程时传入两个参数。第一个参数名为\
  \ `configname`，其数据类型定义为 `VARCHAR(35)`。此参数用于传递您希望更改的设置的名称。第二个参数名为 `configvalue`，定义为整数。此参数用于传递该设置的新值。使用\
  \ `sp_configure` 更改实例级设置后，它不会立即生效。要激活该设置，您需要重新启动数据库引擎服务或重新配置实例。\n\n重新配置实例有两个选项。第一个是名为\
  \ `RECONFIGURE` 的命令。第二个是名为 `RECONFIGURE WITH OVERRIDE` 的命令。只要新配置的值被 SQL Server 视为“合理”，`RECONFIGURE`\
  \ 命令就会更改设置的运行值。例如，当实例上存在包含数据库时，`RECONFIGURE` 将不允许您禁用它们。但是，如果您使用 `RECONFIGURE WITH\
  \ OVERRIDE` 命令，则将允许此操作，即使您的包含数据库将无法再访问。即便如此，SQL Server 仍然会运行检查以确保您输入的值在设置的 `Min`\
  \ 和 `Max` 值之间。它也不允许您执行任何会导致严重错误的操作。例如，它不会允许您将“最小服务器内存 (MB)”设置配置为高于“最大服务器内存 (MB)”设置，因为这会导致数据库引擎出现致命错误。\n\
  \n在 SQL Server 2019 中，首次运行不带参数的 `sp_configure` 存储过程时，它将返回 18 行。这些行包含实例的基本配置选项。其中一个选项称为“显示高级选项”。如果您打开此选项然后重新配置实例，如代码清单\
  \ 5-1 所示，那么当您再次运行该过程时，将显示另外 52 个高级设置。如果您在打开“显示高级选项”设置之前尝试更改某个高级选项的值，则命令将失败。\n\n\
  ```\nEXEC sp_configure 'show advanced options', 1\nRECONFIGURE\nListing 5-1\n显示高级选项\n\
  ```\n\n作为使用 sp_configure 查看这些设置的替代方法，您也可以通过查询 `sys.configurations` 来检索相同的信息。如果使用\
  \ `sys.configurations` 返回信息，则会返回两个额外的列。其中一列称为 `is_dynamic`，它指定该选项是否可以使用 `RECONFIGURE`\
  \ 命令配置 (1)，或者是否需要重新启动实例 (0)。另一列称为 `is_Advanced`，它指示该设置是否无需打开“显示高级选项”即可配置。\n\n####\
  \ 处理器和内存配置\n\n配置实例时，首要考虑事项之一应是处理器和内存资源的配置。对于处理器，您应主要考虑两个方面：处理器亲和性以及 MAXDOP（最大并行度）。\n\
  \n##### 处理器亲和性\n\n默认情况下，您的实例将能够使用服务器中的所有处理器核心。（物理处理器，也称为插槽或 CPU，由多个核心组成，每个核心都是独立的处理器）。但是，如果您使用处理器亲和性，则特定的处理器核心将与您的实例对齐，这些将是该实例唯一可以访问的核心。通过这种方式限制您的实例主要有两个原因。第一个原因是您在同一服务器上运行多个实例。在这种配置下，您可能会发现实例竞争相同的处理器资源并因此相互阻塞。处理器亲和性通过一个名为\
  \ `affinity mask` 的设置来控制。\n\n假设您有一台具有四个物理处理器的服务器，每个处理器有两个核心。为本例目的假设超线程已关闭，则 SQL\
  \ Server 总共有八个可用核心。如果您在服务器上有四个实例，那么为了避免实例竞争资源，您可以将核心 0 和 1 与实例 1 对齐，核心 2 和 3 与实例\
  \ 2 对齐，核心 4 和 5 与实例 3 对齐，核心 6 和 7 与实例 4 对齐。当然，这样做的缺点是，如果一个实例处于空闲状态，CPU 资源将无法得到利用。\n\
  \n如果您在服务器上运行其他服务，例如 SQL Server Integration Services (SSIS)，您可能希望保留一个核心供 Windows\
  \ 和其他应用程序使用，任何实例都不能使用它。在这种情况下，您可能已经发现实例 4 比其他实例使用的处理器资源少。例如，它可能是一个专用于 ETL（提取、转换和加载）的实例，主要用于托管\
  \ SSIS 目录。在这种情况下，您可能只将实例 4 与核心 6 对齐。这将把核心 7 留作其他用途。此设计如图 5-1 所示。\n\n#### 注意\n\n\
  SSIS 已集成到数据库引擎中。但是，当 SSIS 包运行时，它们在单独的 DTSHost 进程中运行，因此不与实例的处理器和内存配置对齐。\n\n![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig1_HTML.jpg](img/333037_2_En_5_Fig1_HTML.jpg)\n\
  \n图 5-1\n\n处理器亲和性图示\n\n使用处理器亲和性时，为了获得最佳性能，将实例与同一 NUMA（非统一内存访问）节点上的核心对齐至关重要。这是因为如果处理器需要远程访问不同\
  \ NUMA 节点的内存，它需要通过互连进行，这比访问本地 NUMA 节点要慢得多。在图 5-1 所示的示例中，如果我们将实例 1 与核心 0 和 7 对齐，那么我们将跨越\
  \ NUMA 边界，性能将会受损。\n\n\n#### 注意事项\n\n虽然对于 SQL Server 不推荐，但一些虚拟环境使用一种称为 `over-subscribed\
  \ processors` 的技术。这意味着分配给客户的内核数多于物理主机上实际存在的内核数。在这种情况下，你不应使用处理器亲和性，因为 NUMA 边界将不会被尊重。\n\
  \n减少争用的亲和性掩码同样适用于集群环境。想象一个主动/主动配置的双节点集群。集群的每个节点托管一个实例。对于你的业务而言，确保在发生故障转移时具有一致的性能可能很重要。在这种情况下，假设你的每个节点有八个核心，那么在节点\
  \ 1 上，你可以将实例 1 配置为使用核心 0、1、2 和 3。在节点 2 上，你可以将实例 2 配置为使用核心 4、5、6 和 7。现在，在发生故障转移时，你的实例将继续使用相同的处理器核心，而不会争夺资源。\n\
  \n使用处理器亲和性的第二个原因是为了避免操作系统级别线程在处理器之间移动带来的开销。当你的实例处于高负载时，通过将 SQL Server 线程与特定核心对齐，你可能会看到性能提升。在这种情况下，可以将标准\
  \ SQL Server 任务与 SQL Server IO 相关任务分开。\n\n想象你有一台单处理器服务器，它有两个核心。超线程已关闭，并且你安装了一个实例。你可以选择将与\
  \ IO 亲和性相关的任务（如 `Lazy Writer`）与核心 0 对齐，而将其他 SQL Server 线程与核心 1 对齐。要将 IO 任务与特定处理器对齐，你需要使用一个额外的设置，称为\
  \ `Affinity I/O Mask`。启用此设置后，会创建一个隐藏的调度程序，专门用于 `Lazy Writer`。因此，重要的是不要将亲和性掩码和 `Affinity\
  \ I/O Masks` 与同一个核心对齐。否则，你将无意中造成你试图避免的争用。\n\n### 关于 I/O 掩码的注意事项\n\n很少需要使用 `Affinity\
  \ I/O Mask`。要对齐来自多个实例的工作负载，`Affinity Mask` 就足够了。它通常只适用于在 32 位系统上运行的非常大的数据库。对于具有更大内存容量的\
  \ 64 位系统，IO 抖动较少；因此上下文切换也较少。\n\n`Affinity Mask` 和 `Affinity I/O Mask` 都可以通过 SQL\
  \ Server Management Studio 中的 GUI 进行设置，方法是在实例属性对话框中选择“处理器”选项卡，如图 5-2 所示。\n\n![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig2_HTML.jpg](img/333037_2_En_5_Fig2_HTML.jpg)\n\
  \n图 5-2\n“处理器”选项卡\n\n处理器亲和性基于位图工作。因此，如果你希望使用 `sp_configure` 来设置处理器亲和性，那么你首先需要计算位图值的整数表示。这变得更加复杂，因为\
  \ `INT` 数据类型是 32 位有符号整数，意味着某些表示将是负数。分配给每个处理器的值列于表 5-2。\n\n表 5-2\n处理器亲和性位图\n\n| 处理器编号\
  \ | 位掩码 | 有符号整数表示 |\n| --- | --- | --- |\n| 0 | 0000 0000 0000 0000 0000 0000 0000\
  \ 0001 | 1 |\n| 1 | 0000 0000 0000 0000 0000 0000 0000 0010 | 2 |\n| 2 | 0000 0000\
  \ 0000 0000 0000 0000 0000 0100 | 4 |\n| 3 | 0000 0000 0000 0000 0000 0000 0000\
  \ 1000 | 8 |\n| 4 | 0000 0000 0000 0000 0000 0000 0001 0000 | 16 |\n| 5 | 0000 0000\
  \ 0000 0000 0000 0000 0010 0000 | 32 |\n| 6 | 0000 0000 0000 0000 0000 0000 0100\
  \ 0000 | 64 |\n| 7 | 0000 0000 0000 0000 0000 0000 1000 0000 | 128 |\n| 8 | 0000\
  \ 0000 0000 0000 0000 0001 0000 0000 | 256 |\n| 9 | 0000 0000 0000 0000 0000 0010\
  \ 0000 0000 | 512 |\n| 10 | 0000 0000 0000 0000 0000 0100 0000 0000 | 1024 |\n|\
  \ 11 | 0000 0000 0000 0000 0000 1000 0000 0000 | 2028 |\n| 12 | 0000 0000 0000 0000\
  \ 0001 0000 0000 0000 | 4096 |\n| 13 | 0000 0000 0000 0000 0010 0000 0000 0000 |\
  \ 8192 |\n| 14 | 0000 0000 0000 0000 0100 0000 0000 0000 | 16384 |\n| 15 | 0000\
  \ 0000 0000 0000 1000 0000 0000 0000 | 32768 |\n| 16 | 0000 0000 0000 0001 0000\
  \ 0000 0000 0000 | 65536 |\n| 17 | 0000 0000 0000 0010 0000 0000 0000 0000 | 131072\
  \ |\n| 18 | 0000 0000 0000 0100 0000 0000 0000 0000 | 262144 |\n| 19 | 0000 0000\
  \ 0000 1000 0000 0000 0000 0000 | 524288 |\n| 20 | 0000 0000 0001 0000 0000 0000\
  \ 0000 0000 | 1048576 |\n| 21 | 0000 0000 0010 0000 0000 0000 0000 0000 | 2097152\
  \ |\n| 22 | 0000 0000 0100 0000 0000 0000 0000 0000 | 4194304 |\n| 23 | 0000 0000\
  \ 1000 0000 0000 0000 0000 0000 | 8388608 |\n| 24 | 0000 0001 0000 0000 0000 0000\
  \ 0000 0000 | 16777216 |\n| 25 | 0000 0010 0000 0000 0000 0000 0000 0000 | 33554432\
  \ |\n| 26 | 0000 0100 0000 0000 0000 0000 0000 0000 | 67108864 |\n| 27 | 0000 1000\
  \ 0000 0000 0000 0000 0000 0000 | 134217728 |\n| 28 | 0001 0000 0000 0000 0000 0000\
  \ 0000 0000 | 268435456 |\n| 29 | 0010 0000 0000 0000 0000 0000 0000 0000 | 536870912\
  \ |\n| 30 | 0100 0000 0000 0000 0000 0000 0000 0000 | 1073741824 |\n| 31 | 1000\
  \ 0000 0000 0000 0000 0000 0000 0000 | -2147483648 |\n\n#### 提示\n\n互联网上有很多免费的计算器可以帮助你将二进制转换为有符号整数。\n\
  \n在 32 核服务器上，处理器亲和性有 2.631308369336935e+35 种可能的组合，但表 5-3 中包含了一些示例。\n\n表 5-3\n亲和性掩码示例\n\
  \n| 对齐的处理器 | 位掩码 | 有符号整数表示 |\n| --- | --- | --- |\n| 0 和 1 | 0000 0000 0000 0000\
  \ 0000 0000 0000 0011 | 3 |\n| 0, 1, 2, 和 3 | 0000 0000 0000 0000 0000 0000 0000\
  \ 1111 | 15 |\n| 8 和 9 | 0000 0000 0000 0000 0000 0011 0000 0000 | 768 |\n| 8, 9,\
  \ 10, 和 11 | 0000 0000 0000 0000 0000 1111 0000 0000 | 3840 |\n| 30 和 31 | 1100\
  \ 0000 0000 0000 0000 0000 0000 0000 | -1073741824 |\n| 28, 29, 30, 和 31 | 1111\
  \ 0000 0000 0000 0000 0000 0000 0000 | -268435456 |\n\n由于亲和性掩码的性质以及整数数据类型的最大范围是\
  \ 2³²，如果你的服务器有 33 到 64 个处理器，那么你还需要设置 `Affinity64 Mask` 和 `Affinity64 I/O Mask` 设置。这些将为额外的处理器提供掩码。\n\
  \n本节讨论的所有设置都可以使用 `sp_configure` 进行配置。清单 5-2 中的示例演示了将实例与核心 0 到 3 对齐。\n\n```\nEXEC\
  \ sp_configure 'affinity mask', 15\nRECONFIGURE\n```\n清单 5-2\n设置处理器亲和性\n\n即使使用 64\
  \ 位掩码，使用此方法对齐前 64 个核心仍然存在限制，而 SQL Server 最多支持 256 个逻辑处理器。因此，新版本的 SQL Server 引入了一种增强的设置处理器亲和性的方法。这是通过一个名为\
  \ `ALTER SERVER CONFIGURATION` 的命令实现的。清单 5-3 演示了使用此命令的两种方式。第一种以我们迄今为止看到的方式将实例与特定处理器对齐。在此示例中，对齐的是\
  \ CPU 0、1、2 和 3。第二种将实例与两个 NUMA 节点内的所有处理器对齐，在本例中是节点 0 和 4。正如使用 `sp_configure` 进行更改一样，使用\
  \ `ALTER SERVER CONFIGURATION` 进行的更改将反映在 `sys.configurations` 中。\n\n```\nALTER SERVER\
  \ CONFIGURATION\nSET PROCESS AFFINITY CPU=0 TO 3\nALTER SERVER CONFIGURATION\nSET\
  \ PROCESS AFFINITY NUMANODE=0, 4\n```\n清单 5-3\n`ALTER SERVER CONFIGURATION`\n\n\n\
  ### 最大并行度 (MAXDOP)\n\n**最大并行度 (MAXDOP)** 将设置为每个独立查询执行可用的最大核心数。这个想法初听起来可能有些反直觉。你肯定希望每个查询都尽可能地并行化吧？嗯，情况并非总是如此。\n\
  \n虽然一些数据仓库查询可能从高并行度中受益，但许多联机事务处理 (OLTP) 工作负载在较低的并行度下可能表现更好。这是因为如果一个查询在多个并行线程上执行，而有一个线程比其他线程花费更长的时间才能完成，那么其他线程可能需要等待最后一个线程结束，以便同步它们的数据流。如果发生这种情况，你很可能会看到大量的等待，且等待类型为\
  \ `CXPACKET`。\n\n在许多 OLTP 系统中，查询优化器选择高并行度实际上表明存在索引缺失或高度碎片化、统计信息过时等问题。解决这些问题带来的性能提升，远比以高并行度运行查询要大得多。\n\
  \n对于支持繁重数据仓库工作负载的实例，应测试并相应设置不同的 `MAXDOP` 配置。需要理解的是，如果少数查询与实例的大部分工作负载相比受益于不同的设置，也可以通过使用查询提示在查询级别设置\
  \ `MAXDOP`。然而，在绝大多数情况下，实例级别的 `MAXDOP` 设置应配置为以下三个值中的最低值：\n\n*   `8`\n*   实例可用的核心数\
  \ (`MAXDOP` 的默认值)\n*   一个 NUMA 节点内的核心数\n\n`MAXDOP` 的默认值是 `0`，这意味着查询仅受实例可见的核心数限制。你可以通过图形用户界面\
  \ (GUI) 配置 `MAXDOP`，方法是在服务器属性的“高级”选项卡上配置 `最大并行度` 设置。图 5-3 展示了此设置被配置为 `8`。\n\n![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig3_HTML.jpg](img/333037_2_En_5_Fig3_HTML.jpg)\n\
  \n图 5-3\n高级选项卡\n\n你也可以使用 `sp_configure` 配置 `MAXDOP`。代码清单 5-4 演示了使用 `sp_configure`\
  \ 将 `MAXDOP` 设置为 `8`。\n\n```\nEXEC sys.sp_configure 'max degree of parallelism',\
  \ 8\nRECONFIGURE\n```\n\n代码清单 5-4\n使用 sp_configure 配置 MAXDOP\n\n降低 `MAXDOP` 设置的一个辅助措施是提高查询优化器选择并行计划而非串行计划的阈值。此阈值的默认设置是估计串行执行时间为\
  \ 5 秒，但你可以将其配置为 0 到 32767 秒之间的任何值。在许多环境中，一个实际的限制是大约 30 秒，但这当然是具体工作负载相关的，并且应该始终进行测试。然而，如果你将\
  \ `MAXDOP` 配置为 `1`，或者实例只有一个核心可用，`并行度的成本阈值` 选项将被忽略。代码清单 5-5 中的脚本将 `并行度的成本阈值` 增加到\
  \ `10` 秒。\n\n```\nEXEC sp_configure 'cost threshold for parallelism', 10\nRECONFIGURE\n\
  ```\n\n代码清单 5-5\n配置并行度的成本阈值\n\n### 最小和最大服务器内存\n\n`最小服务器内存 (MB)` 和 `最大服务器内存 (MB)`\
  \ 设置用于控制 SQL Server 内存池可用的内存量。内存池包含许多组件。其中一些最大的组件详见表 5-4。\n\n表 5-4\nSQL Server 内存池\n\
  \n| 组件 | 描述 |\n| --- | --- |\n| 缓冲池 | 缓冲池在数据和索引页从磁盘读取或写入磁盘之前和之后存储它们。即使你的查询所需的页面不在缓存中，它们也会先写入缓冲池，然后从内存中检索，而不是直接从磁盘写入。\
  \ |\n| 过程缓存 | 过程缓存包含执行计划，不仅用于存储过程，还用于即席查询、预 pared 语句和触发器。当 SQL Server 开始优化查询时，它首先检查此缓存以查看是否存在合适的计划。\
  \ |\n| 日志缓存 | 日志缓存存储日志记录，然后将它们写入事务日志。 |\n| 日志池 | 一个哈希表，允许高可用性/灾难恢复 (HA/DR) 和数据分发技术（如\
  \ AlwaysOn、镜像和复制）快速访问所需的日志记录。 |\n| CLR | CLR 指在实例内部使用的 .NET 代码。在旧版本的 SQL Server\
  \ 中，CLR 位于主内存池之外，因为内存池仅处理单个 8KB 页面分配。从 SQL Server 2012 开始，内存池现在同时处理单页和多页分配，因此 CLR\
  \ 已被纳入其中。 |\n\n在许多环境中，你可能希望为 `最小` 和 `最大` 服务器内存提供相同的值。这将避免 SQL Server 动态管理其保留内存量的开销。\n\
  \n但是，如果你有多个实例，动态内存管理可能是有益的，这样在任何给定时间工作负载最重的实例可以消耗最多的资源。如果你的实例托管在主动/主动集群上，你必须额外考虑。我曾见过一个例子，客户启用了\
  \ `锁定内存页`，然后像配置独立服务器一样配置了每个节点上实例的最小和最大内存。在故障转移发生时，剩余节点崩溃了，因为没有足够的 RAM 来支持一台服务器上所有实例的内存需求。\n\
  \n无论你的环境如何配置，你总是需要为操作系统留出足够的内存。假设你只有一个实例，并且服务器上没有运行其他应用程序（如 SSIS 包），你通常应将 `最小` 和\
  \ `最大` 内存设置配置为以下两者中的较低值：\n\n*   RAM - 2GB\n*   (RAM / 8) ∗ 7\n\n如果你有多个实例，你当然会根据它们的需求，在这些实例之间适当分配这个数字。如果你在服务器上运行其他应用程序，那么你还必须考虑它们的内存需求，并将其加入操作系统需求中。\n\
  \n`最小服务器内存 (MB)` 和 `最大服务器内存 (MB)` 都可以通过使用服务器属性对话框中的“内存”选项卡进行配置，如图 5-4 所示。\n\n![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig4_HTML.jpg](img/333037_2_En_5_Fig4_HTML.jpg)\n\
  \n图 5-4\n内存选项卡\n\n你也可以通过 T-SQL 使用 `sp_configure` 存储过程配置这两个设置。代码清单 5-6 演示了这一点。\n\n\
  ```\nDECLARE @MemOption1 INT = (SELECT physical_memory_kb/1024 - 2048 FROM sys.dm_os_sys_info)\n\
  DECLARE @MemOption2 INT = (SELECT ((physical_Memory_kb/1024)/8) * 7 FROM sys.dm_os_sys_info)\n\
  IF @MemOption1 <= 0\nBEGIN\n    EXEC sys.sp_configure 'min server memory (MB)',\
  \ @MemOption2\n    EXEC sys.sp_configure 'max server memory (MB)', @MemOption2\n\
  \    RECONFIGURE\nEND\nELSE IF @MemOption2 < @MemOption1\nBEGIN\n    EXEC sys.sp_configure\
  \ 'min server memory (MB)', @MemOption2\n    EXEC sys.sp_configure 'max server memory\
  \ (MB)', @MemOption2\n    RECONFIGURE\nEND\nELSE\nBEGIN\n    EXEC sys.sp_configure\
  \ 'min server memory (MB)', @MemOption1\n    EXEC sys.sp_configure 'max server memory\
  \ (MB)', @MemOption1\n    RECONFIGURE\nEND\n```\n\n代码清单 5-6\n配置最小和最大服务器内存\n\n\n\n\
  #### 跟踪标志\n\n跟踪标志是 SQL Server 中的开关，可用于开启或关闭特定功能。在实例范围内，它们可以在会话级别进行设置，也可以通过名为 `DBCC\
  \ TRACEON` 的 DBCC 命令全局应用于实例。并非所有跟踪标志都能在会话级别设置，这取决于其性质。跟踪标志 634 就是一个例子。设置此标志会关闭负责定期压缩列存储索引中行组的后台线程。显然，这并不适用于特定的会话。代码清单\
  \ 5-7 使用 `DBCC TRACEON` 全局设置跟踪标志 634。它还仅为当前会话开启了 1211。跟踪标志 1211 会基于内存压力或锁的数量禁用锁升级。然后，脚本使用\
  \ `DBCC TRACESTATUS` 显示标志的状态，最后使用 `DBCC TRACEOFF` 将行为切换回默认值。可以看到，要指定全局作用域，我们使用参数\
  \ `-1`。默认是在会话级别设置标志。\n\n```\nDBCC TRACEON(634, -1)\nDBCC TRACEON(1211)\nDBCC TRACESTATUS\n\
  DBCC TRACEOFF(634, -1)\nDBCC TRACEOFF(1211)\nListing 5-7\n使用 DBCC TRACEON 设置跟踪标志\n\
  ```\n\n#### 注意\n\n此处使用跟踪标志 1211 仅为演示 `DBCC TRACEON` 的目的。然而，它可能导致过多的锁，应极其谨慎地使用。它甚至可能因为分配锁的内存不足而导致\
  \ SQL Server 抛出错误。\n\n图 5-5 显示了运行此脚本后产生的结果屏幕，假设当前没有其他跟踪标志偏离其默认设置。`DBCC TRACEON`\
  \ 和 `DBCC TRACEOFF` 命令没有结果显示。但是，消息窗口将显示执行完成消息或通知您任何错误。\n\n![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig5_HTML.jpg](img/333037_2_En_5_Fig5_HTML.jpg)\n\
  \n图 5-5：`DBCC TRACESTATUS` 结果\n\n即使使用全局作用域，使用 `DBCC TRACEON` 的局限性在于设置是临时的，实例重启后不会持久化。因此，如果您希望对实例进行永久性的配置更改，则必须在\
  \ SQL Server 服务上使用 `-T` 启动参数。\n\n启动参数可以在 SQL Server 配置管理器中配置。展开左侧窗口中的“服务”将显示服务器上所有与\
  \ SQL Server 相关的服务列表。进入数据库引擎服务的属性并选择“启动参数”选项卡，即可添加或删除启动参数。图 5-6 说明了如何设置跟踪标志 809。（请参考本章的“混合缓冲池”部分以了解此跟踪标志的作用。）\n\
  \n![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig6_HTML.jpg](img/333037_2_En_5_Fig6_HTML.jpg)\n\
  \n图 5-6：启动参数\n\n如果您的实例运行在 Windows Server Core 上，或者您想在基于 GUI 的服务器上编写配置脚本，那么可以通过运行代码清单\
  \ 5-8 中的 PowerShell 脚本来实现相同的结果。此脚本允许您在顶部的两个变量中指定要配置的实例名称和跟踪标志。如果您希望创建可重用的脚本，这些也可以参数化。同样，该脚本可以添加到我们在第\
  \ 3 章创建的自动安装脚本中。\n\nPowerShell 脚本通过确定启动参数的注册表路径，然后计算已有的参数数量来工作。计算参数数量可以确定序列中的下一个参数编号。然后，它添加新参数，并指定所需的跟踪标志。\n\
  \n```\n##### 定义初始变量\n$InstanceName = \"PROSQLADMINCORE\"\n$TraceFlag = \"809\"\n\
  ##### 配置要插入到注册表路径中的完整服务名称\n$Instance = \"MSSQL12.$InstanceName\"\n##### 创建完整的注册表路径\n\
  $RegistryPath = \"HKLM:\\SOFTWARE\\Microsoft\\Microsoft SQL Server\\MSSQL12.$InstanceName\\\
  MSSQLServer\\Parameters\"\n##### 从注册表路径收集所有属性\n$Properties = Get-ItemProperty $RegistryPath\n\
  ##### 计算已存在的 SQLArg 属性的数量，以便确定序列中的下一个编号\n$Arguments = $Properties.psobject.properties\
  \ | ?{$_.Name -like 'SQLArg*'} | select Name, Value\n##### 根据序列中的下一个参数编号创建新参数的名称\n\
  $NewArgument = \"SQLArg\"+($Arguments.Count)\n##### 构造参数的完整值\n$FullTraceFlag = \"\
  -T$TraceFlag\"\n##### 设置跟踪标志\nSet-ItemProperty -Path $RegistryPath -Name $NewArgument\
  \ -Value $FullTraceFlag\nListing 5-8\n在 Windows Server Core 上配置跟踪标志\n```\n\n许多跟踪标志可以指定为启动参数，其中绝大多数仅在非常特定的情况下才有帮助。然而，有少数几个脱颖而出，具有更广泛使用的潜力。这些跟踪标志将在以下部分详细说明。\n\
  \n#### 注意\n\n在旧版本的 SQL Server 中，经常配置的两个跟踪标志是 T1117 和 T1118，它们分别导致文件组中的所有文件以相同速率增长，以及导致所有区（即使是小表的区）都是统一区。然而，这些功能现在已成为有文档记录的、数据库级别的选项。因此，T1117\
  \ 和 T1118 不再有效，不应使用。\n\n##### 跟踪标志 3042\n\n当您在 SQL Server 中使用备份压缩执行备份时，会使用一种预分配算法为备份文件分配数据库大小的一定百分比。与动态按需增长备份文件大小相比，这为您提供了性能优势。但另一方面，如果您需要在备份卷上保留磁盘空间，仅使用所需的最小空间量，那么您可以使用跟踪标志\
  \ 3042 来关闭此行为，并按需增长文件。\n\n##### 跟踪标志 3226\n\n默认情况下，每次执行备份时，SQL Server 日志中都会记录一条消息。但是，如果您执行频繁的日志备份，这很快就会在日志中产生大量“噪音”，使得故障排除问题变得更加困难和耗时。如果是这种情况，那么您可以开启跟踪标志\
  \ 3226。这将导致成功的备份消息在日志中被抑制，从而产生更小、更易于管理的日志。另一种避免噪音的方法是创建一个使用 `sys.xp_readerrorlog`\
  \ 系统存储过程读取日志的脚本。您可以将结果写入表并过滤出“感兴趣的”事件。\n\n##### 跟踪标志 3625\n\nSQL Server 对元数据的可见性实施严格控制。用户只能查看他们拥有的对象或已明确授予查看元数据权限的对象的元数据。然而，这种保护方法仍然有缺陷，熟练的攻击者仍然可以获取信息。他们实现这一点的一种方式是通过操纵查询中的优先级顺序以产生错误消息。\n\
  \n为了减轻这种风险，您可以设置跟踪标志 3625。此跟踪标志将通过用星号屏蔽某些数据来限制错误消息中可见的元数据量。然而，这种防御策略的缺点是错误消息变得不那么有意义且更难理解。这可能会使故障排除问题变得更加困难。\n\
  \n\n\n### 端口与防火墙\n\n在现代企业网络拓扑中，你的 SQL Server 实例很可能需要通过至少两个防火墙进行通信。其中一个将是硬件防火墙，另一个将是\
  \ Windows 防火墙，也称为本地防火墙。为了让你的实例能够与其他接口（无论是网络上的应用程序还是其他实例）通信，同时保持防火墙提供的安全性，就需要开放端口，以便\
  \ SQL Server 可以通过这些端口进行通信。\n\n#### 通信过程\n\n为了理解需要开放哪些端口来允许 SQL Server 流量，你首先必须理解客户端如何与\
  \ SQL Server 通信。图 5-7 展示了 TCP/IP 连接的过程流。此示例假设实例正在监听端口 `1433`——这将在本章后面详细讨论。它还假设客户端运行在\
  \ Windows Vista/Windows Server 2008 或更高版本上。\n\n![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig7_HTML.jpg](img/333037_2_En_5_Fig7_HTML.jpg)\n\
  \n图 5-7 通信过程流\n\n如果你希望客户端通过命名管道而非 TCP/IP 访问实例，那么 SQL Server 将通过端口 `445` 进行通信。这与文件和打印机共享使用的端口相同。\n\
  \n#### SQL Server 所需的端口\n\n如果你安装的是 SQL Server 的默认实例，那么安装程序将自动分配端口 `1433`，这是 IANA（互联网号码分配机构）为\
  \ SQL Server 注册的端口。然而，许多 DBA 出于增强安全性的考虑，会选择更改此端口号。攻击者会知道你很可能在端口 `1433` 上运行实例，因此知道要攻击哪个端口。在较小的环境中，除非你对网络的安全性有信心，否则使用非标准端口号可能是增加一层混淆的好主意。然而，在大型企业中，你需要考虑对运营可支持性的影响。例如，如果每个实例都有不同的端口号，你将需要一种记录并能在浏览器服务故障时快速获取给定实例端口号的方法。在允许多个命名实例共存于每台服务器的环境中，这将不那么令人担忧，因为你已经拥有了用于记录这些端口号的清单工具。\n\
  \n#### 注\n\nIANA，即互联网号码分配机构，负责协调互联网协议资源的分配，如 IP 地址、域名、协议参数和网络服务的端口号。其网站是 `www.internetassignednumbersauthority.org/`。\n\
  \n如果你安装的是 SQL Server 的命名实例，那么安装程序将配置该实例使用动态端口。当配置了动态端口时，每次实例启动时，它都会向操作系统请求一个端口号。操作系统随后会从动态范围中分配一个随机的可用端口，假设你运行的是\
  \ Windows Server 2008 或更高版本，该范围是 `49152` 到 `65535`。在早期版本的 Windows 中，动态端口范围是 `1024`\
  \ 到 `5000`，但微软在 Windows Vista 和 Windows Server 2008 中更改了此范围以符合 IANA 规定。\n\n如果你的实例配置为使用动态端口，那么配置防火墙可能具有挑战性。在\
  \ Windows 防火墙级别，可以将特定服务配置为在任何端口上通信，但这在硬件防火墙级别可能难以复制。或者，你需要双向保持整个动态端口范围开放。因此，我建议将实例配置为使用特定端口。\n\
  \n重要的是要记住，SQL Server 为各种功能使用许多其他端口。数据库引擎可能需要的完整端口集列在表 5-5 中。如果你安装了数据库引擎之外的功能，如 SSAS\
  \ 或 SSRS，则将需要额外的端口。如果你计划在实例中使用其他服务，如用于加密的 IPSec、用于分布式事务的 `MSDTC`（Microsoft 分布式事务协调器）或用于监控的\
  \ `SCOM`（System Center Operations Manager），也将有额外的要求。\n\n#### 表 5-5：数据库引擎所需的端口\n\n\
  | 功能 | 端口 |\n| --- | --- |\n| 浏览器服务 | `UDP 1433`。 |\n| 通过 TCP/IP 的实例 | `TCP 1433`，动态或静态配置。\
  \ |\n| 通过命名管道的实例 | `TCP 445`。 |\n| DAC（专用管理员连接） | `TCP 1434`。如果 `TCP 1434` 已被占用，端口号将在实例启动时打印到\
  \ SQL Server 日志中。 |\n| Service Broker | `TCP 4022` 或按配置设定。 |\n| AlwaysOn 可用性组 |\
  \ `TCP 5022` 或按配置设定。 |\n| 带 Web 同步的合并复制 | `TCP 21`、`TCP 80`、`UDP 137`、`UDP 138`、`TCP\
  \ 139`、`TCP 445`。 |\n| T-SQL 调试器 | `TCP 135`。 |\n\n#### 配置实例将监听的端口\n\n如本章前面所述，如果你有一个命名实例，那么在配置防火墙之前，你可能希望为该实例配置一个静态端口。该端口可以在\
  \ SQL Server 配置管理器中 TCP/IP 协议的“TCP/IP 属性”对话框内配置。要导航到此对话框，请在 SQL Server 配置管理器的左侧窗格中展开\
  \ `SQL Server Network Configuration` ➤ `Protocols for *INSTANCENAME*`（其中 `*INSTANCENAME*`\
  \ 是你的实例名称）。在右侧窗格中双击 `TCP/IP` 将显示该对话框。\n\n在“协议”选项卡上，你会注意到一个名为 `Listen All` 的设置，其默认值为“是”，如图\
  \ 5-8 所示。此设置的意义稍后会变得清晰。\n\n![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig8_HTML.jpg](img/333037_2_En_5_Fig8_HTML.jpg)\n\
  \n图 5-8 “协议”选项卡\n\n在“IP 地址”选项卡上，你会注意到有多个 IP 地址的配置详细信息。但是，由于 `Listen All` 设置为“是”，SQL\
  \ Server 将忽略所有这些配置。相反，它将只查看对话框最底部为 `IP All` 指定的设置。`TCP Dynamic Ports` 字段将显示操作系统分配的随机端口，而\
  \ `TCP Port` 字段将为空，如图 5-9 所示。要分配静态端口号，我们需要反转此设置。我们需要清空 `TCP Dynamic Ports` 字段，并在\
  \ `TCP Port` 字段中填入我们选择的端口号 `1433`。SQL Server 服务需要重启后此更改才能生效。\n\n![../images/333037_2_En_5_Chapter/333037_2_En_5_Fig9_HTML.jpg](img/333037_2_En_5_Fig9_HTML.jpg)\n\
  \n图 5-9 “IP 地址”选项卡\n\n\n\n#### 提示\n\n请记住，默认实例默认情况下将使用端口 `1433`。因此，如果服务器上已经存在一个默认实例，那么在创建命名实例时，你必须使用一个不同的端口。\n\
  \n我们可以通过运行清单 5-9 中的 PowerShell 脚本来实现相同的结果。该脚本顶部有两个变量，你需要插入你的实例名称和你想要分配的端口号。这些也可以被参数化，以创建一个可复用的脚本。该脚本加载了相关的\
  \ SMO 程序集。然后，它创建一个新的 SMO 对象并连接到该对象的 TCP 属性以配置端口。该脚本必须以管理员身份运行。\n\n```powershell\n\
  ##### Initialize variables\n$Instance = \"PROSQLADMIN\"\n$Port = \"1433\"\n#####\
  \ Load SMO Wmi.ManagedComputer assembly\n[System.Reflection.Assembly]::LoadWithPartialName(\"\
  Microsoft.SqlServer.SqlWmiManagement\") | out-null\n##### Create a new smo object\n\
  $m = New-Object ('Microsoft.SqlServer.Management.Smo.Wmi.ManagedComputer')\n#Disable\
  \ dynamic ports\n$m.ServerInstances[$Instance].ServerProtocols['Tcp'].IPAddresses['IPAll'].IPAddressProperties['TcpDynamicPorts'].Value\
  \ = \"\"\n##### Set static port\n$m.ServerInstances[$Instance].ServerProtocols['Tcp'].IPAddresses['IPAll'].IPAddressProperties['TcpPort'].Value\
  \ = \"$Port\"\n##### Reconfigure TCP\n$m.ServerInstances[$Instance].ServerProtocols['Tcp'].Alter()\n\
  ```\n\n清单 5-9: 分配静态端口\n\n### 系统数据库\n\nSQL Server 维护五个系统数据库，每个数据库对于实例的高效运行都至关重要。以下各节描述了这些数据库中的每一个，并详细说明了配置它们时的任何特殊注意事项。\n\
  \n#### mssqlsystemresource (Resource)\n\n虽然被称为 Resource，但 Resource 数据库的全名是 `mssqlsystemresource`。它是用于存储出现在每个数据库的\
  \ `sys` 架构中的系统对象的物理存储库。它是只读的，除了在 Microsoft 的指导下，否则绝不应修改。它在 Management Studio 中不可见，如果你尝试从查询窗口连接它，将会失败，除非你处于单用户模式。配置\
  \ Resource 没有需要考虑的事项。\n\n#### MSDB\n\n`MSDB` 被用作许多 SQL Server 功能的元数据存储库，包括服务器代理、备份/还原、数据库邮件、日志传送、策略等。尽管这显然是一个关键且有用的数据库，但没有特定的配置选项需要考虑。话虽如此，在一个由大量数据库组成且所有数据库都有频繁日志备份的非常大的实例中，该数据库可能会变得非常大。这意味着你将需要清理旧数据，有时还需要考虑索引策略。可以使用\
  \ `sp_deletebackuphistory` 存储过程或维护计划中的历史记录清理任务来清理历史备份数据。自动例行维护任务将在第 22 章中更详细地讨论。\n\
  \n#### Master\n\n`Master` 是系统数据库，包含实例级对象的元数据，例如登录名、链接服务器、TCP 终端点以及用于实现加密的主密钥和证书。`Master`\
  \ 数据库最大的考虑因素是备份策略。虽然它不需要像用户数据库那样频繁备份，但你应始终确保你有一个当前的备份。至少，在创建或更改登录名、链接服务器和系统配置后；创建或更改密钥和证书后；或者在创建或删除用户数据库后，应该备份数据库。许多人选择每周对\
  \ `Master` 进行一次完整备份的计划，但这将取决于你的操作要求，例如你创建新用户的频率。\n\n#### 注意\n\n登录名和用户将在第 9 章讨论，备份将在第\
  \ 15 章讨论，密钥和证书将在第 10 章讨论。\n\n虽然技术上可行，但将用户对象存储在 `Master` 数据库中被认为是不好的做法。我见过客户为需要由实例上所有数据库共享的存储过程而这样做，但它增加了复杂性，因为他们分散了用户对象的存储，同时也增加了必须备份\
  \ `Master` 的频率。\n\n#### 提示\n\n因为开发人员通常不设置默认数据库，他们最终会错误地在 `Master` 数据库中创建存储过程。你应该在代码部署过程中检查此问题。\n\
  \n#### Model\n\n`Model` 用作实例上创建的所有新数据库的模板。这意味着花一些时间配置这个数据库，可以在你创建用户数据库时节省时间并减少人为错误。例如，如果你在\
  \ `Model` 数据库上将恢复模式设置为完整，那么所有新的用户数据库将自动以相同方式配置。你仍然可以选择在 `CREATE DATABASE` 语句中覆盖此设置。此外，如果你需要某个特定对象（如维护存储过程或数据库角色）存在于所有数据库中，那么在\
  \ `Model` 中创建它将意味着该对象将自动在每个新数据库中创建。`Model` 也用于在每次实例启动时创建 `TempDB`。这意味着如果你在 `Model`\
  \ 数据库中创建对象，它们将在实例重启时自动添加到 `TempDB` 中。\n\n#### 提示\n\n当你配置或向 `Model` 添加新对象时，现有数据库不会被更新。更改将仅适用于你随后创建的新数据库。\n\
  \n\n\n#### TempDB\n\nTempDB 是 SQL Server 在需要创建临时对象时使用的一个工作区。这既适用于用户创建的临时表，也适用于一个较少被提及的场景：表变量。表变量总是在\
  \ TempDB 中创建对象，但数据只有在超过大小阈时才会被溢出到磁盘。此外，SQL Server 还有很多内部原因需要创建临时对象。部分关键原因如下：\n\n\
  *   排序和溢出数据\n*   哈希数据，例如用于联接和聚合分组\n*   在线索引操作\n*   结果需要在 TempDB 中排序的索引操作\n*   触发器\n\
  *   DBCC 命令\n*   DML 语句的 `OUTPUT` 子句\n*   快照隔离、已提交读快照隔离、在 MARS 上查询等场景的行版本控制\n\n\
  由于 TempDB 负责如此多的任务，在高吞吐量的实例中，它很可能具有非常高的吞吐量。因此，为了确保数据层应用程序的最佳性能，它是你最应该花时间配置的系统数据库。\n\
  \n你首先应该考虑的是 TempDB 的大小。理想情况下，对于大型或高事务量的实例，应进行 TempDB 的容量规划。完整的容量规划讨论超出了本书范围，但理想情况下，这涉及到使用一台测试服务器，将实例上所有用户数据库扩展到通过它们自身的容量规划活动所预期的增长大小。然后，你会通过这些数据库运行代表性工作负载，并监控\
  \ TempDB 的使用情况。此外，你还应该对已扩展到预期大小的数据库执行管理任务。具体来说，这包括诸如重建索引等活动，以便你可以检查 TempDB 在这些活动期间的使用情况。有多个\
  \ `DMV`（动态管理视图）可以协助你进行此规划。其中最有用的一些在表 5-6 中描述。\n\n表 5-6：用于 TempDB 容量规划的 DMV\n\n|\
  \ DMV | 描述 |\n| --- | --- |\n| `sys.dm_db_session_space_usage` | 显示为每个当前会话分配的页数。这将包括以下对象的页数：•\
  \ 用户表和系统表• 用户索引和系统索引• 临时表• 临时索引• 表变量• 函数返回的表• 用于排序和哈希操作的内部对象• 用于溢出和大型对象操作的内部对象 |\n\
  | `sys.dm_db_task_space_usage` | 显示由任务分配的页数。这将包括与 `sys.dm_db_session_space_usage`\
  \ 相同的对象类型的页数。 |\n| `sys.dm_db_file_space_usage` | 显示数据库中所有文件的完整使用信息，包括页数和区数。要返回\
  \ TempDB 的数据，你必须在 TempDB 数据库的上下文中查询此 `DMV`，因为它也可以返回用户数据库的数据。 |\n| `sys.dm_tran_version_store`\
  \ | 为版本存储区中的每条记录返回一行。你可以查看原始数据或聚合它以获取大小总计。 |\n| `sys.dm_tran_active_snapshot_database_transactions`\
  \ | 为每一个当前可能需要访问版本存储区的事务返回一行，原因可能是隔离级别、触发器、`MARS`（多活动结果集）或在线索引操作。 |\n\n##### 优化\
  \ TempDB\n\n除了 TempDB 的大小，你还应仔细考虑所需的文件数量。这很重要，因为许多对象被非常快速地创建和删除，如果文件太少，你可能会遇到 `GAM`\
  \ 和 `SGAM` 页的争用。另一方面，如果文件太多，开销可能会增加。这是因为 SQL Server 为了保持比例填充，会在文件组内依次为每个文件分配页。当文件数量很多时，为了确定是否应更改每个文件的分配权重，将会有额外的同步开销。\n\
  \n#### 提示\n\n一些 SQL Server 专家建议不应显式删除临时表，而应由垃圾回收线程来清理。就我个人而言，虽然我理解这样做的好处，但我认为需要权衡其他考虑因素，例如代码质量，尤其是在大型、复杂的存储过程中。\n\
  \n当前的通用建议是，应该为实例可用的每个核心分配一个 TempDB 文件，最少两个文件，最多八个文件。只有当你明确观察到 `GAM/SGAM` 争用时，才应添加超过八个文件。这将表现为针对\
  \ TempDB 的 `PAGELATCH` 等待。你将在第 6 章找到关于如何添加文件及其大小调整的讨论。\n\n#### 提示\n\n`PAGEIOLATCH`\
  \ 等待表明的问题与 `PAGELATCH` 等待不同。如果你看到针对 TempDB 的 `PAGEIOLATCH` 等待，这表明底层存储是瓶颈。等待类型将在第\
  \ 17 章中更详细地讨论。\n\nSQL Server 2019 引入了一项针对 TempDB 的新优化，称为内存优化 TempDB 元数据。顾名思义，此功能将负责管理\
  \ TempDB 元数据的系统表存储在非持久化的内存优化表中。\n\n#### 提示\n\n有关内存优化表的更多详细信息，请参阅第 7 章。\n\n这是一项重要的新功能，通过消除\
  \ TempDB 系统页上的争用瓶颈，提高了 SQL Server 的可扩展性。然而，它并非没有代价，在实施此功能之前，你必须意识到单个事务不能跨多个数据库访问内存优化表。如果你有执行诸如自定义监控等活动的脚本，这可能会导致问题。\n\
  \n例如，你可能有一个如代码清单 5-10 所示的记录脚本。该脚本的第一部分创建了 `Chapter5` 数据库。`CaptureTempTableCount`\
  \ 存储过程将临时表的数量插入到一个内存优化表中。假设此过程配置为通过 SQL Server Agent 每分钟运行一次（参见第 22 章）。然后，你可以在持续的容量规划工作中使用\
  \ `TempTableCount` 表。\n\n```sql\n--创建 Chapter5 数据库\nCREATE DATABASE Chapter5\nGO\n\
  USE Chapter5\nGO\n--添加一个内存优化文件组\nALTER DATABASE Chapter5 ADD FILEGROUP memopt\n\
  CONTAINS MEMORY_OPTIMIZED_DATA;\nALTER DATABASE Chapter5 ADD (\nname='memopt1',\
  \ filename='c:\\data\\memopt1'\n) TO FILEGROUP memopt ;\nALTER DATABASE Chapter5\n\
  SET MEMORY_OPTIMIZED_ELEVATE_TO_SNAPSHOT = ON ;\nGO\nCREATE TABLE TempTableCount\
  \ (\nID                INT                IDENTITY(1,1)    NOT NULL   PRIMARY KEY\
  \ NONCLUSTERED,\nTableCount   INT               NOT NULL,\nDateTime     DateTime2\
  \         NOT NULL\n) WITH(MEMORY_OPTIMIZED=ON) ;\nGO\nCREATE PROCEDURE CaptureTempTableCount\n\
  AS\nBEGIN\nBEGIN TRANSACTION\nINSERT INTO TempTableCount (TableCount, DateTime)\n\
  SELECT COUNT(*) As TableCount, SYSDATETIME() AS DateTime\nFROM tempdb.sys.tables\
  \ t\nWHERE type = 'U'\nCOMMIT\nEND\nGO\n--代码清单 5-10\n--在 TempDB 中使用内存优化表\n```\n\n\
  如果你测试此过程，会发现它按预期工作。但现在，让我们使用代码清单 5-11 中的命令开启内存优化 TempDB 元数据。\n\n```sql\nALTER SERVER\
  \ CONFIGURATION SET MEMORY_OPTIMIZED TEMPDB_METADATA = ON ;\n--代码清单 5-11\n--启用内存优化\
  \ TempDB 元数据\n```\n\n如果你再次测试该过程，会注意到它现在失败了，因为它试图访问多个数据库中的内存优化表。要解决此问题，你需要使用基于磁盘的表，而不是内存优化表。\n\
  \n\n\n### 缓冲池扩展\n\n如前所述，缓冲池是 SQL Server 使用的一块内存区域，用于在页面写入磁盘前进行缓存，以及在页面从磁盘读取后进行缓存。缓冲区缓存中存在的页面有两种不同类型：干净页和脏页。一个`干净页`是指未经过任何修改的页面。干净页通常存在于缓存中是因为它们已被读取操作（例如\
  \ `SELECT` 语句）访问过。一旦进入缓存，它们可以支持所有语句。例如，一个 DML 语句可以访问干净页，修改它，然后更新其脏页标记。\n\n脏页是已被诸如\
  \ `INSERT`、`UPDATE` 和 `DELETE` 等语句修改过的页面。这些页面需要将其关联的日志记录写入磁盘，随后，脏页本身才会被刷新到磁盘，之后它们才被视为干净页。先写入日志记录的过程被称为\
  \ WAL（预写式日志），这是 SQL Server 确保即使发生系统故障，已提交数据也不会丢失的机制。\n\n脏页总是保留在缓存中，直到它们被刷新到磁盘。另一方面，干净页则会在缓存中尽可能长时间地保留，但当需要为要缓存的新页面腾出空间时，它们会被移除。SQL\
  \ Server 基于最近最少使用策略来淘汰页面。这意味着，如果缓冲区缓存的大小设置不当，读取密集型工作负载可能很快就会开始受到内存压力的影响。\n\n这里的问题在于，与存储相比，RAM\
  \ 很昂贵，而且可能无法通过不断增加更多内存来解决问题。为了解决这个问题，微软在 SQL Server 2014 中引入了一项名为缓冲池扩展的技术。\n\n缓冲池扩展设计用于非常快速的\
  \ SSD，这些 SSD 通常直接连接到服务器，而不是位于 SAN 上。简而言之，存储需要尽可能快地运行。该扩展随后将成为仅用于缓存干净页的二级缓存。当干净页从缓存中被淘汰时，它们将被移动到缓冲池扩展中，在那里它们可以比返回主\
  \ I/O 子系统更快地被检索。\n\n这是一个非常有用的功能，但它并非万能药。首先，必须记住，缓冲池扩展永远无法提供与正确调整大小、无需扩展的缓冲区缓存相同的性能提升。其次，使用缓冲池扩展所能获得的性能提升是特定于工作负载的。例如，一个读取密集型的\
  \ OLTP 工作负载可能会从缓冲池扩展中显著受益，而写入密集型工作负载则几乎看不到任何好处。这是因为脏页不能被刷新到扩展中。大型数据仓库也不太可能从缓冲池扩展中获得显著收益。这是因为表可能非常大，以至于全表扫描（在此类工作负载场景中很常见）可能会消耗缓存和扩展中的大部分空间。这意味着它会从扩展中清除其他数据，并且不太可能使后续查询受益。\n\
  \n使用弹性 SSD 卷（例如 RAID 10 条带化）是明智的。这是因为如果卷发生故障，而没有冗余，你的服务器性能将立即下降。如果存储扩展的 SSD 驱动器发生故障，SQL\
  \ Server 将自动禁用该扩展。它可以手动重新启用，或者在实例重新启动时自动尝试重新启用。\n\n我还建议你将扩展的大小设置为 `Max Server Memory`\
  \ 设置的四到八倍，以获得最佳性能。扩展的最大可能大小是 `Max Server Memory` 设置大小的 32 倍。\n\n可以使用清单 5-12 中所示的语句启用缓冲池扩展。此脚本假定你希望使用的\
  \ SSD 驱动器映射为 `S:\\` 卷。它还假设我们将 `Max Server Memory` 设置为 32GB，因此我们将把扩展配置为 128GB，即大小的四倍。\n\
  \n```sql\nALTER SERVER CONFIGURATION\nSET BUFFER POOL EXTENSION ON\n(FILENAME =\
  \ 'S:\\SSDCache.BPE', SIZE = 128 GB )\n```\n清单 5-12\n启用缓冲池扩展\n\n如果需要，可以使用清单 5-13\
  \ 中的命令禁用缓冲池扩展。但请注意，移除缓冲池扩展可能会导致性能突然下降。\n\n```sql\nALTER SERVER CONFIGURATION\nSET\
  \ BUFFER POOL EXTENSION OFF\n```\n清单 5-13\n禁用缓冲池扩展\n\n### 混合缓冲池\n\nSQL Server 2019\
  \ 引入了混合缓冲池，提供对 PMEM（持久内存）的支持。PMEM 也称为 SCM（存储级内存）。PMEM 设备位于内存总线上，是固态且可按字节寻址的。这使其比闪存磁盘更快，比\
  \ DRAM 更便宜。存储在 PMEM 设备上的数据在服务器断电后仍然保持。\n\n在 Windows（Windows Server 2016 及更高版本支持\
  \ PMEM 设备）中格式化用于混合缓冲池的 PMEM 设备时，应在 Windows Server 2019 上启用 `DirectAccess` 并使用 2MB\
  \ 的分配单元大小，或在其他版本的 Windows Server 上使用最大的可用大小。\n\n驱动器创建后，可以将 SQL Server 事务日志存储在该设备上。然后，SQL\
  \ Server 在从缓冲池读取干净页时将使用内存映射 I/O（也称为 enlightenment）。这减少了在访问页面之前将其复制到 DRAM 的需要，从而降低了\
  \ I/O 延迟。\n\nEnlightenment 只能用于干净页。如果页面变脏，那么它将被写入 DRAM，最终再刷新回 PMEM 设备。\n\n要在运行 Windows\
  \ 操作系统的 SQL Server 中启用 PMEM 支持，只需在 SQL Server 服务上启用跟踪标志 `809`。对于在 Linux 上运行的 SQL\
  \ Server，必须在 SQL Server 服务上启用跟踪标志 `3979`。（有关如何启用跟踪标志的信息，请参阅本章的“跟踪标志”部分。）\n\n\n\n\
  ### 概要\n\n你需要考虑如何为实例配置处理器和内存。对于处理器，这些考虑应包括多实例的**亲和性掩码**设置，或在 I/O 操作期间避免上下文切换。你还应该考虑环境中\
  \ `MAXDOP` 的适当设置。\n\n关于内存，你需要考虑 `最小服务器内存` 和 `最大服务器内存` 最合适的用法，以及是否适合将它们配置为相同的值。你还应该考虑缓冲池扩展是否有助于提升系统性能，如果是，你应该使用\
  \ `最大服务器内存` 作为计算此暖缓存正确大小的基础。\n\n跟踪标志用于切换设置，将它们添加为启动参数可确保你的实例始终按需配置。许多跟踪标志用于非常特定的目的，但有些具有更通用的用途，例如\
  \ `3226`，它会抑制成功的备份消息，以避免日志中的噪声掩盖问题。\n\n为了使你的 SQL Server 实例能够与网络上的应用程序和其他实例通信，你应该适当地配置实例端口和本地防火墙。通常认为为\
  \ SQL Server 连接使用动态端口是不好的做法，因此你应该将实例配置为使用特定的 TCP 端口。\n\n所有五个系统数据库对于实例的正常运行都至关重要。然而，在配置方面，你应该最关注\
  \ `TempDB`。`TempDB` 被许多 SQL Server 功能大量使用，因此在繁忙的系统中它可能迅速成为瓶颈。你应该确保有正确数量的文件并且它们的大小设置正确。\n\
  \n可以从控制面板或命令行卸载实例或从中移除功能。你应该注意，即使在实例卸载后，文件系统和注册表中仍会留有残留。\n\n"
- "# 第二部分 数据库管理\n\n## 6. 数据库配置\n\n在数据库中，数据存储在一个或多个数据文件中。这些文件被分组到称为文件组的逻辑容器中。每个数据库还至少有一个日志文件。日志文件位于文件组容器之外，并且不遵循与数据文件相同的规则。本章首先讨论数据库管理员\
  \ (DBA) 可以采用的文件组策略，然后再探讨 DBA 如何维护数据和日志文件。\n\n### 数据存储\n\n在考虑采用哪种文件组策略之前，理解 SQL Server\
  \ 如何存储数据非常重要。图 6-1 中的图表说明了数据库内的存储层次结构。\n\n![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig1_HTML.jpg](img/333037_2_En_6_Fig1_HTML.jpg)\n\
  \n*图 6-1 SQL Server 如何存储数据*\n\n数据库总是由至少一个文件组组成，该文件组至少包含一个文件。数据库中的第一个文件称为 *主文件*。默认情况下，此文件具有\
  \ `.mdf` 文件扩展名。但是，如果需要，你可以更改此扩展名。此文件可用于存储数据，但也用于存储提供数据库启动信息和指向数据库内其他文件指针的元数据。包含主文件的文件组称为\
  \ *主文件组*。\n\n如果在数据库中创建了其他文件，则它们称为 *辅助文件*，默认情况下具有 `.ndf` 扩展名。但是，如果需要，你可以更改此扩展名。这些文件可以在主文件组和/或辅助文件组中创建。辅助文件和文件组是可选的，但正如我们将在本章后面讨论的那样，它们对数据库管理员非常有用。\n\
  \n#### 提示\n\n保留默认的文件扩展名是一个好主意。使用不同的扩展名没有真正的好处，而且这样做会增加额外的复杂性。例如，你不仅需要记住使用了哪些扩展名，而且如果你的防病毒软件使用文件扩展名作为其排除列表，你可能会突然看到性能的严重下降。\n\
  \n#### 文件组\n\n表和索引存储在文件组上，而不是容器内的特定文件中。这意味着对于包含多个文件的文件组，你无法控制使用哪个文件来存储对象。事实上，由于\
  \ SQL Server 使用轮询方式分配数据到文件，存储在文件组中的每个对象极有可能被分割到文件组内的每个文件上。\n\n为了见证此行为，请运行清单 6-1\
  \ 中的脚本。该脚本创建一个数据库，其主文件组包含三个文件。然后在该文件组上创建一个表并填充数据。最后，使用 `%%physloc%%` 来确定表中每一行的物理位置。然后脚本计算每个文件中的行数。\n\
  \n#### 提示\n\n将文件路径更改为匹配你自己的首选位置。\n\n```sql\nUSE Master\nGO\n--创建一个数据库，主文件组中有三个文件。\n\
  CREATE DATABASE [Chapter6]\nCONTAINMENT = NONE\nON  PRIMARY\n( NAME = N'Chapter6',\
  \ FILENAME = N'F:\\MSSQL\\MSSQL15.PROSQLADMIN\\MSSQL\\DATA\\Chapter6.mdf'),\n( NAME\
  \ = N'Chapter6_File2',\nFILENAME = N'F:\\MSSQL\\MSSQL15.PROSQLADMIN\\MSSQL\\DATA\\\
  Chapter6_File2.ndf'),\n( NAME = N'Chapter6_File3',\nFILENAME = N'F:\\MSSQL\\MSSQL15.PROSQLADMIN\\\
  MSSQL\\DATA\\Chapter6_File3.ndf')\nLOG ON\n( NAME = N'Chapter6_log',\nFILENAME =\
  \ N'E:\\MSSQL\\MSSQL15.PROSQLADMIN\\MSSQL\\DATA\\Chapter6_log.ldf');\nGO\nIF NOT\
  \ EXISTS (SELECT name FROM sys.filegroups WHERE is_default=1 AND name = N'PRIMARY')\n\
  ALTER DATABASE [Chapter6] MODIFY FILEGROUP [PRIMARY] DEFAULT;\nGO\nUSE Chapter6\n\
  GO\n--在新数据库中创建一个表。该表包含一个宽的、固定长度的列\n--以增加分配的数量。\nCREATE TABLE dbo.RoundRobinTable\n\
  (\nID       INT     IDENTITY    PRIMARY KEY,\nDummyTxt    NCHAR(1000),\n);\nGO\n\
  --创建一个 Numbers 表，用于辅助表的填充。\nDECLARE @Numbers TABLE\n(\nNumber    INT\n)\n--填充 Numbers\
  \ 表。\n;WITH CTE(Number)\nAS\n(\nSELECT 1 Number\nUNION ALL\nSELECT Number +1\nFROM\
  \ CTE\nWHERE Number <= 99\n)\nINSERT INTO @Numbers\nSELECT *\nFROM CTE;\n--用 100\
  \ 行虚拟文本来填充示例表。\nINSERT INTO dbo.RoundRobinTable\nSELECT 'DummyText'\nFROM @Numbers\
  \ a\nCROSS JOIN @Numbers b;\n--从表中选择所有数据，以及行物理位置的详细信息。\n--然后按文件 ID 分组计算行数。\nSELECT\
  \ b.file_id, COUNT(*) AS [RowCount]\nFROM\n(\nSELECT ID, DummyTxt, a.file_id\nFROM\
  \ dbo.RoundRobinTable\nCROSS APPLY sys.fn_PhysLocCracker(%%physloc%%) a\n) b\nGROUP\
  \ BY b.file_id;\n```\n*清单 6-1 SQL Server 轮询分配*\n\n图 6-2 中显示的结果表明，行已均匀分布在文件组内的三个文件上。如果文件大小不同，那么空间最多的文件会由于比例填充算法而接收到更多的行，该算法试图权衡分配到每个文件的数据量，以便在每个文件之间均匀分布数据。\n\
  \n#### 提示\n\n你可能会注意到没有为文件 2 返回行。这是因为 `file_id` 2 始终是事务日志文件（或者如果你有多个日志文件，则是第一个事务日志文件）。`file_id`\
  \ 1 始终是主数据库文件。\n\n![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig2_HTML.jpg](img/333037_2_En_6_Fig2_HTML.jpg)\n\
  \n*图 6-2 均匀分布的行*\n\n\n\n#### 注意\n\n`physloc`函数未被文档化。因此，Microsoft 不会提供对其使用的**技术支持**。\n\
  \n标准数据和索引存储在一系列 8KB 的页面中；这些页面由包含页面元数据的 96 字节页眉和用于存储数据本身的 8096 字节组成。这些 8KB 页面随后被组织成由八个连续页面组成的单元，合在一起称为一个*区（extent）*。一个*区（extent）*\
  \ 是 SQL Server 可以从磁盘读取的最小单位。\n\n#### FILESTREAM 文件组\n\nFILESTREAM 是一种允许您以非结构化方式存储二进制数据的技术。二进制数据通常存储在操作系统中，而不是数据库中，而\
  \ FILESTREAM 使您能够继续这样做，同时在这类非结构化数据与存储在数据库中的结构化元数据之间提供事务一致性。使用此技术将使您能够克服 SQL Server\
  \ 单个对象 2GB 的最大大小限制。对于大型二进制对象，您还将看到比将其存储在数据库中更好的性能。如果文件大小超过 1MB，使用 FILESTREAM 的读取性能可能会更快。\n\
  \n然而，您需要记住，使用 FILESTREAM 存储的对象使用的是 Windows 缓存，而不是 SQL Server 缓冲区缓存。这样做的好处是，您不会有大文件填满缓冲区缓存，导致其他数据被刷写到缓冲区缓存扩展或磁盘。另一方面，这意味着在为实例配置“最大服务器内存”设置时，您应该记住，如果您计划缓存这些对象，Windows\
  \ 需要额外的内存，因为使用的是 Windows 二进制缓存，而不是 SQL Server 的缓冲区缓存。\n\nFILESTREAM 数据需要单独的文件组。这些文件组不包含文件，而是指向操作系统中的文件夹位置。每个位置称为一个*容器（container）*。必须在实例上启用\
  \ FILESTREAM 才能创建 FILESTREAM 文件组。您可以在实例设置期间执行此操作，如第 2 章所述，或者可以在 SQL Server Management\
  \ Studio 的实例属性中配置它。\n\n我们可以通过使用“数据库属性”对话框的“文件组”选项卡上的“添加文件组”按钮，然后在“名称”字段中为文件组添加名称，如图\
  \ 6-3 所示，将 FILESTREAM 文件组添加到我们的 Chapter6 数据库。\n\n![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig3_HTML.jpg](img/333037_2_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3  文件组选项卡\n\n然后，我们可以使用“数据库属性”对话框的“文件”选项卡来添加容器。在这里，我们需要为容器输入一个名称，并将文件类型指定为\
  \ FILESTREAM 数据。然后，我们可以从“文件组”下拉框中选择我们的 FILESTREAM 文件组，如图 6-4 所示。\n\n![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig4_HTML.jpg](img/333037_2_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4  文件选项卡\n\n我们可以通过运行清单 6-2 中的 T-SQL 命令来实现相同的结果。该脚本创建一个 FILESTREAM 文件组，然后添加一个容器。您应该更改脚本中的目录以匹配您自己的配置。\n\
  \n```sql\nALTER DATABASE [Chapter6] ADD FILEGROUP [Chapter6_FS_FG] CONTAINS FILESTREAM;\n\
  GO\nALTER DATABASE [Chapter6] ADD FILE ( NAME = N'Chapter6_FA_File1', FILENAME =\
  \ N'F:\\MSSQL\\MSSQL15.PROSQLADMIN\\MSSQL\\DATA\\Chapter6_FA_File1' ) TO FILEGROUP\
  \ [Chapter6_FS_FG];\nGO\n```\n\n清单 6-2  添加 FILESTREAM 文件组\n\n为了探索 FILESTREAM 容器的文件夹结构，我们首先需要创建一个表并填充数据。清单\
  \ 6-3 中的脚本创建了一个表，该表包含一个唯一标识符（所有包含 FILESTREAM 数据的表都需要此标识符）、二进制对象的文本描述，以及一个我们将用于存储本章前面图\
  \ 6-1 中插图的 `VARBINARY(MAX)` 列。我们使用的文件并不重要，因此要自己运行脚本，请将正在导入文件的名称和位置更改为系统上的文件。\n\n\
  ```sql\nUSE Chapter6\nGO\nCREATE TABLE dbo.FilestreamExample\n(\nID            \
  \    UNIQUEIDENTIFIER ROWGUIDCOL NOT NULL UNIQUE,\nPictureDescription    NVARCHAR(500),\n\
  Picture              VARBINARY(MAX) FILESTREAM\n);\nGO\nINSERT INTO FilestreamExample\n\
  SELECT NEWID(), 'Figure 6-1. Diagram showing the SQL Server storage hierachy.',\
  \ * FROM\nOPENROWSET(BULK N'c:\\Figure_6-1.jpg', SINGLE_BLOB) AS import;\n```\n\n\
  清单 6-3  创建包含 FILESTREAM 数据的表\n\n#### 注意\n\n我们使用了 `UNIQUE` 约束，而不是主键，因为 GUID 通常不是一个好的主键选择。如果表必须有主键，添加一个指定\
  \ `IDENTITY` 属性的额外整数列可能更合理。我们使用了 GUID 并设置了 `ROWGUIDCOL` 属性，因为这是 SQL Server 映射到 FILESTREAM\
  \ 对象所必需的。\n\n如果我们现在在文件系统中打开容器的位置，我们可以看到我们有一个文件夹，其名称是一个 GUID。这代表我们创建的表。在这个文件夹内是另一个同样具有\
  \ GUID 名称的文件夹。此文件夹代表我们创建的 `FILESTREAM` 列。在此文件夹中，我们将找到一个文件，该文件是我们插入到列中的图片。此文件的名称是文件创建时的日志序列号。理论上可以将此文件的扩展名更改为原始扩展名，然后打开它。但是，这当然不推荐，因为它可能在\
  \ SQL Server 中产生不良影响。在容器的根级别，您还会找到一个名为 `filestream.hdr` 的文件，其中包含容器的元数据，以及一个名为 `$FSLog`\
  \ 的文件夹。此文件夹包含构成 FILESTREAM 事务日志等效项的一系列文件。此文件夹层次结构如图 6-5 所示。\n\n\n\n#### 提示\n\nSQL\
  \ Server 服务账户会被自动授予对 `FILESTREAM` 容器的文件系统权限。将此文件夹结构的权限授予任何其他用户被认为是**不良做法**。如果您尝试使用\
  \ Windows 管理员账户访问该文件夹，系统会给出权限警告，说明如果您继续操作，将永久授予您对该文件夹的权限。\n\n![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig5_HTML.jpg](img/333037_2_En_6_Fig5_HTML.jpg)\n\
  *图 6-5: FILESTREAM 文件夹层级结构*\n\n`FileTable` 是一种构建在 `FILESTREAM` 之上的技术，允许将数据存储在文件系统中。因此，要使用它，您必须启用具有流式访问权限的\
  \ `FILESTREAM`。然而，与 `FILESTREAM` 不同，`FileTable` 允许对数据进行非事务性访问。这意味着您可以将数据移动到 SQL\
  \ 引擎中存储，而不是存储在操作系统中，而无需修改现有应用程序。您还可以像处理操作系统中的任何其他文件一样，通过 Windows 资源管理器打开和修改这些文件。\n\
  \n为实现这一点，SQL Server 使 Windows 应用程序能够在没有事务的情况下请求文件句柄。由于此功能，您需要在数据库级别指定应用程序可以请求的非事务性访问级别。您可以配置以下访问级别：\n\
  \n*   `NONE`（默认值—仅允许事务性访问。）\n*   `READ_ONLY`（可以查看文件系统中的对象，但不能修改。）\n*   `FULL`（可以查看并修改文件系统中的对象。）\n\
  *   `IN_TRANSITION_TO_READ_ONLY`（正在转换为 `READ_ONLY`）\n*   `IN_TRANSITION_TO_OFF`（正在转换为\
  \ `NONE`）\n\n您还需要指定 `FileTable` 容器的根目录。这两项任务都可以使用同一条 `ALTER DATABASE` 语句来完成，如清单\
  \ 6-4 所示。\n\n```sql\nALTER DATABASE Chapter6\nSET FILESTREAM ( NON_TRANSACTED_ACCESS\
  \ = FULL, DIRECTORY_NAME = N'Chapter6_FileTable' );\n-- 清单 6-4: 设置非事务性访问级别\n```\n\
  \nSQL Server 现在会创建一个共享，其名称与您的实例名称相同。在此共享中，您将找到一个以您指定名称命名的文件夹。当您创建 `FileTable` 时，可以再次指定一个目录名称。这将创建一个以您指定名称命名的子文件夹。由于\
  \ `FileTable` 没有关系型架构，并且存储的关于文件的元数据是固定的，因此创建它们的语法仅包含表名、目录和要使用的排序规则。清单 6-5 中的代码演示了如何创建一个名为\
  \ `Chapter6_FileTable` 的 `FileTable`。\n\n```sql\nUSE Chapter6\nGO\nCREATE TABLE\
  \ dbo.ch06_test AS FILETABLE\nWITH\n(\n    FILETABLE_DIRECTORY = 'Chapter6_FileTable',\n\
  \    FILETABLE_COLLATE_FILENAME = database_default\n);\nGO\n-- 清单 6-5: 创建 FileTable\n\
  ```\n\n要将文件加载到表中，您可以简单地将它们复制或移动到该文件夹位置，或者开发人员可以在其应用程序中使用 `System.IO` 命名空间。SQL Server\
  \ 会相应地更新 `FileTable` 的元数据列。在我们的示例中，可以找到 `FileTable` 文件的容器的文件路径是 `\\\\127.0.0.1\\\
  prosqladmin\\Chapter6_FileTable\\Chapter6_FileTable`。这里，`127.0.0.1` 是我们服务器的环回地址，`prosqladmin`\
  \ 是基于我们的实例名称创建的共享，而 `Chapter6_FileTable\\Chapter6_FileTable FILESTREAM\\FileTable`\
  \ 是容器。\n\n#### 内存优化文件组\n\nSQL Server 2014 引入了一项名为 `内存优化表` 的功能。这些表完全存储在内存中；但是，数据也会写入磁盘上的文件中。这是为了持久性。针对内存中表的事务具有与传统的基于磁盘的表相同的\
  \ ACID（原子性、一致性、隔离性和持久性）属性。我们将在第 7 章进一步讨论内存中表，并在第 18 章讨论内存中事务。\n\n由于内存中表需要将数据的副本存储在磁盘上以实现持久性，因此我们有了内存优化文件组。这种类型的文件组类似于\
  \ `FILESTREAM` 文件组，但有一些细微的差别。首先，每个数据库只能创建一个内存优化文件组。其次，除非您计划同时使用这两个功能，否则不需要显式启用 `FILESTREAM`。\n\
  \n内存中数据通过使用两种文件类型持久化到磁盘。一种是数据文件，另一种是增量文件。这两种文件类型总是成对操作，并覆盖特定的事务范围，因此您应该始终拥有相同数量的文件。数据文件用于跟踪对内存中表进行的插入操作，增量文件用于跟踪删除操作。更新语句通过这两种文件的组合进行跟踪，因为更新被跟踪为一次删除和一次插入。这些文件是顺序写入的，并且是表不可知的，这意味着每个文件可能包含多个表的数据。\n\
  \n我们可以通过在“数据库属性”对话框的“文件组”选项卡中使用“内存优化数据”区域的“添加文件组”按钮，并指定文件组的名称，将内存优化文件组添加到我们的数据库中。如图\
  \ 6-6 所示。\n\n![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig6_HTML.jpg](img/333037_2_En_6_Fig6_HTML.jpg)\n\
  *图 6-6: 添加内存优化文件组*\n\n然后，我们可以通过在“数据库属性”对话框的“文件”选项卡中使用“添加文件”按钮，将容器添加到文件组中。在这里，我们需要指定文件的逻辑名称，并选择\
  \ `FILESTREAM` 文件类型。然后，我们可以使用下拉框选择将文件添加到我们的内存优化文件组中，如图 6-7 所示。\n\n![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig7_HTML.jpg](img/333037_2_En_6_Fig7_HTML.jpg)\n\
  *图 6-7: 添加内存优化容器*\n\n或者，我们可以使用清单 6-6 中的 T-SQL 脚本实现相同的结果。请务必将文件位置更改为与您的目录结构匹配。\n\n\
  ```sql\nALTER DATABASE [Chapter6] ADD FILEGROUP [Chapter6_InMemory] CONTAINS MEMORY_OPTIMIZED_DATA;\n\
  GO\nALTER DATABASE [Chapter6] ADD FILE ( NAME = N'InMemory', FILENAME = N'F:\\MSSQL\\\
  MSSQL15.PROSQLADMIN\\MSSQL\\DATA\\InMemory' ) TO FILEGROUP [Chapter6_InMemory];\n\
  GO\n-- 清单 6-6: 添加内存优化文件组和容器\n```\n\n#### 结构化文件组策略\n\nDBA 可以采用不同的文件组策略来帮助满足性能、备份时间、恢复时间目标和分层存储等要求。以下各节将探讨这些策略。\n\
  \n\n### 性能策略\n\n在为性能设计文件组策略时，需考虑对象放置与应用程序查询执行的联接操作之间的关系。例如，想象一个大型数据仓库。您有一个包含数十万行的宽大事实表，该表与两个维度表进行联接，每个维度表有数百万行。如果将这三个对象都放置在同一个文件组上，您可以通过使用多个文件来分散\
  \ I/O，将每个文件放置在不同的磁盘轴上。然而，这里的问题在于，即使可以分散 I/O，您也无法对哪些表放置在哪些逻辑单元号上进行精细控制。正如本章前面所演示的，所有对象都将使用\
  \ `round-robin` 和 `proportional fill` 算法的组合，均匀地跨每个文件进行条带化。因此，通过将这三个表拆分到三个独立的文件组上，每个文件组创建在独立的逻辑单元号上，有可能获得性能优势。这可能会让\
  \ SQL Server 提高表扫描的并行化程度。\n\n另一种可能的场景是，您有一个海量数据仓库，达到数十 TB，以及一个具有平衡吞吐量的超大服务器，例如使用\
  \ Fast Track Data Warehouse 参考架构构建的服务器（详细信息可在 MSDB 库中找到）；在这种情况下，通过在每个可用磁盘上创建文件组，您可能会获得最佳性能。这为服务器提供了\
  \ I/O 吞吐量方面的最佳性能，并有助于防止 I/O 子系统成为瓶颈。\n\n同时，请考虑可能进行水平分区的表的放置。想象一个非常大的表，其数据按月分区。如果您的应用程序工作负载意味着经常需要同时读取几个月的数据，那么将每个月拆分到独立的文件组上可能会提高性能，每个文件组使用一组独立的磁盘轴，类似于前面提到的联接示例。关于分区的详细讨论将在第\
  \ 7 章进行。\n\n#### 注意\n\n这种方法的缺点是，将分区放置在不同的文件组上会妨碍您使用分区功能，例如 `SWITCH`。\n\n### 备份和恢复策略\n\
  \nSQL Server 允许您在文件和文件组级别以及数据库级别进行备份。随后，您可以执行所谓的 ``片段恢复``。片段恢复允许您分阶段将数据库联机。这对于恢复时间目标非常短的大型数据库非常有用。\n\
  \n想象一下，您有一个大型数据库，其中包含少量非常关键的数据，业务中断时间不能超过最多 2 小时。该数据库还包含大量历史数据，业务需要每天访问这些数据用于报告，但并非必须在\
  \ 2 小时窗口内恢复。在此场景下，最佳实践是拥有两个辅助文件组。第一个包含关键数据，第二个包含历史数据。在发生灾难时，您可以先恢复主文件组和第一个辅助文件组。此时，您可以将数据库联机，业务将能够访问这些数据。随后，可以将包含历史报告数据的文件组联机。\n\
  \n文件组也可以协助备份策略。想象一个场景：您有一个大型数据库，需要 2 小时进行备份。不幸的是，您有一个长时间运行的 ETL 过程，只有 1 小时的窗口可以每晚备份数据库。如果是这种情况，那么您可以将数据拆分到两个文件组之间。第一个文件组可以在周一、周三和周五备份，第二个文件组可以在周二、周四和周六备份。备份和恢复将在第\
  \ 12 章详细讨论。\n\n### 存储分层策略\n\n一些组织可能决定希望为大型数据库实施存储分层。如果是这种情况，那么通常需要通过使用分区来实现。例如，假设一个表包含\
  \ 6 年的数据。当前年份的数据每天被多次访问和更新。前 3 年的数据在月度报告中被访问，除此之外很少使用。距今 6 年的数据必须能够即时访问（如果出于监管原因需要的话），但实际上很少访问。\n\
  \n在刚刚描述的场景中，可以使用分区，并按年分区。包含当前年份数据的文件组可以由本地连接的 `RAID 10` 逻辑单元号上的文件组成，以获得最佳性能。存放第\
  \ 2 年和第 3 年数据的分区可以放置在企业级 `SAN` 设备的优质层级上。超过 3 年的分区可以放置在 SAN 内的近线存储中，从而以最具成本效益的方式满足监管要求。\n\
  \n一些组织还引入了自动存储分层技术，例如 `AO（自适应优化）`。尽管自动存储分层技术在某些环境中效果极佳，但其在 SQL Server 上的实施有时可能会出现问题。这是因为它分为两个阶段工作。第一阶段是分析阶段，决定每个块或文件应驻留在哪个层级上，以实现成本与开销的最佳平衡。第二阶段将实际数据移动到最合适的层级。\n\
  \n问题在于，数据移动的窗口往往会降低 SAN 的性能。因此，频繁（例如每小时）运行分析然后移动数据可能会导致不可接受的性能下降。然而，另一方面，减少运行分析的频率（例如在工作时间），并在夜间移动数据，有时与\
  \ SQL Server 的使用模式不符。例如，想象一个需要最佳性能的报表应用程序，但其每周报告在周五生成。由于此高峰时段前的最后一个分析窗口是周四，当时活动不多，数据很可能驻留在较慢但更具成本效益的层级上，这意味着性能将受损。然而，当周六到来时，应用程序几乎再次空闲，由于周五高峰使用期间的分析窗口，数据将驻留在优质层级上。因此，自动存储分层通常在数据库具有固定运行时间且日常使用模式变化不大的环境中效果最佳。\n\
  \n### 内存优化文件组策略\n\n与结构化文件组一样，内存优化文件组将使用 `round-robin` 方法在容器之间分配数据。通常做法是将这些多个容器放置在独立的磁盘轴上，以最大化\
  \ I/O 吞吐量。然而，问题是，如果您将一个容器放在磁盘轴 A 上，另一个容器放在磁盘轴 B 上，那么 `round-robin` 方法会将所有数据文件放在一个卷上，所有增量文件放在另一个卷上。\n\
  \n为避免此问题，最佳实践是在您希望用于内存优化文件组的每个卷上放置两个容器。这将确保您获得平衡的 I/O 分布，如图 6-8 所示。这与 Microsoft\
  \ 推荐的最佳实践一致。\n\n![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig8_HTML.jpg](img/333037_2_En_6_Fig8_HTML.jpg)\n\
  \n图 6-8\n\n内存优化文件组的平衡 I/O 分布\n\n\n### 文件与文件组维护\n\n在数据层应用程序的生命周期中，有时出于性能或容量管理等原因，你可能需要对数据库文件和文件组执行维护活动。以下部分将描述如何添加、扩展和收缩文件。\n\
  \n#### 添加文件\n\n出于容量和性能的双重原因，你可能需要向文件组添加文件。如果你的数据库增长超出了容量估算，并且承载数据文件的卷无法调整大小，那么你可以向文件组添加位于不同\
  \ LUN 上的额外文件。\n\n如果存储子系统成为应用程序的瓶颈，你可能还需要向文件组添加额外文件以提高 IO 吞吐量。我们可以通过“数据库属性”对话框的“文件”选项卡向\
  \ `Chapter6` 数据库添加一个额外文件。在此，我们将使用“添加”按钮，然后指定文件的逻辑名称、文件要驻留的文件组、文件的初始大小、自动增长设置、文件的最大大小以及文件将存储的物理路径。\n\
  \n或者，我们可以使用清单 6-7 中的脚本来达到相同的结果。你应该将脚本中的目录路径更改为与你自己的目录结构相匹配。\n\n```sql\nALTER DATABASE\
  \ [Chapter6] ADD FILE ( NAME = N'Chapter6_File4', FILENAME = N'G:\\DATA\\Chapter6_File4.ndf',\
  \ SIZE = 5120KB, FILEGROWTH = 1024KB ) TO FILEGROUP [PRIMARY];\nGO\n```\n\n清单 6-7\n\
  使用 T-SQL 添加新文件\n\n然而，在这种情况下，重要的是要记住比例填充算法。如果你向文件组添加文件，那么 SQL Server 将首先针对空文件，直到它们剩余的可用空间与原始文件相同。这意味着如果你创建它们时与原始文件大小相同，你可能无法获得预期的益处。你可以通过运行清单\
  \ 6-8 中的脚本来见证此行为。该脚本使用了我们在最初创建和填充 `RoundRobin` 表时使用的相同技术，来生成额外的 10,000 行，然后识别每个文件中有多少行。\n\
  \n```sql\n--Create a Numbers table that will be used to assit the population of\
  \ the table\nDECLARE @Numbers TABLE\n(\nNumber    INT\n)\n--Populate the Numbers\
  \ table\n;WITH CTE(Number)\nAS\n(\nSELECT 1 Number\nUNION ALL\nSELECT Number +1\n\
  FROM CTE\nWHERE Number <= 99\n)\nINSERT INTO @Numbers\nSELECT *\nFROM CTE;\n--Populate\
  \ the example table with 10000 rows of dummy text\nINSERT INTO dbo.RoundRobinTable\n\
  SELECT 'DummyText'\nFROM @Numbers a\nCROSS JOIN @Numbers b;\n--Select all the data\
  \ from the table, plus the details of the rows' physical location.\n--Then group\
  \ the row count\n--by file ID\nSELECT b.file_id, COUNT(*)\nFROM\n(\nSELECT ID, DummyTxt,\
  \ a.file_id\nFROM dbo.RoundRobinTable\nCROSS APPLY sys.fn_PhysLocCracker(%%physloc%%)\
  \ a\n) b\nGROUP BY b.file_id;\n```\n\n清单 6-8\n向 RoundRobin 表添加额外行\n\n从图 6-9 的结果中，你可以看到比例填充算法专门使用了新文件，直到其填满，然后才在每个文件之间重新启动轮询分配。然而，在重新启动比例填充算法后，文件组中的第一个文件发生了一次自动增长事件。这意味着第一个文件现在比其他文件有更多的可用空间，并接收了大部分剩余的新行。\n\
  \n![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig9_HTML.jpg](img/333037_2_En_6_Fig9_HTML.jpg)\n\
  图 6-9\n分配给新文件的行\n\n解决新文件首先被填满的方法是创建更小的文件或增大现有文件的大小。这两种方法都可以均衡每个文件中剩余的可用空间，使 SQL\
  \ Server 能够均匀地分布写入操作。\n\n另一种选择是使用数据库作用域配置，以强制文件组中的所有文件在每次发生自动增长事件时都增长。这将在本章的“数据库作用域配置”部分进一步讨论。\n\
  \n#### 提示\n\n我们已经讨论了添加新文件对轮询算法的影响。然而，同样值得一提的是，当你最初创建文件组时，你应该在该文件组中创建大小相等的文件，以充分利用该算法。\n\
  \n#### 扩展文件\n\n如果你是使用 GUI 而不是脚本添加文件的，那么你可能已经注意到，每个文件旁边指示的初始大小分别为 11MB、6MB 和 7MB，而不是本章前面我们配置的\
  \ 5MB。这是因为“初始大小”字段的更准确名称实际上是“当前大小”。因为我们为文件配置了自动增长，当它们变满时，SQL Server 已自动为我们扩展了文件。\n\
  \n这是一个非常实用的故障安全功能，但理想情况下，我们应该仅将其用作故障安全。扩展文件会消耗资源，并且会导致获取锁，从而阻塞其他进程。因此，建议根据容量估算预设数据库文件的大小，而不是从一个较小的文件开始并依赖自动增长。\n\
  \n出于同样的原因，在指定文件的自动增长设置时，你应该避免使用默认的 1MB，并指定一个大得多的值。如果不这样做，当你的文件变满并触发自动增长时，你的文件将以非常小的增量增长，这可能会损害性能，即使你使用的是即时文件初始化。你应该将文件增长值设置为多少取决于你的环境。例如，你应该考虑卷上可用的可用空间量以及共享该卷的其他数据库的数量。你可以使用\
  \ `sys.dm_db_file_space_usage` 动态管理视图 (DMV) 查看文件中剩余的空间量。此 DMV 将返回一个名为 `unallocated_extent_page_count`\
  \ 的列，该列将告诉我们还有多少空闲页可供分配。我们可以使用它来计算每个文件中的剩余可用空间，如清单 6-9 所示。\n\n```sql\nSELECT\nfile_id\n\
  ,unallocated_extent_page_count * 1.0 / 128 'Free Space (MB)'\nFROM sys.dm_db_file_space_usage;\n\
  ```\n\n清单 6-9\n计算每个文件中的可用空间\n\n如果我们想扩展一个文件，我们不需要等待自动增长触发。我们可以通过更改“数据库属性”对话框“文件”选项卡中的“初始大小”字段的值，或使用\
  \ `ALTER DATABASE` 命令来手动扩展文件。清单 6-10 中的命令将把 `Chapter6` 数据库中最新的文件大小调整为 20MB。\n\n\
  ```sql\nALTER DATABASE [Chapter6] MODIFY FILE ( NAME = N'Chapter6_File4', SIZE =\
  \ 20480KB );\n```\n\n清单 6-10\n扩展文件\n\n\n### 收缩文件\n\n正如你可以扩展数据库文件一样，你也可以收缩它们。实现此目的有多种方法，包括收缩单个文件、收缩数据库中的所有文件（包括日志文件），甚至可以在数据库级别设置\
  \ `自动收缩` 选项。\n\n要收缩单个文件，你需要使用 `DBCC SHRINKFILE` 命令。使用此选项时，你可以指定文件的目标大小，或者指定 `EMPTYFILE`\
  \ 选项。`EMPTYFILE` 选项会将文件内的所有数据移动到同一文件组内的其他文件中。这意味着你随后可以从数据库中删除该文件。\n\n如果你为数据库指定了目标大小，那么你可以选择指定\
  \ `TRUNCATEONLY` 或 `NOTRUNCATE`。如果你选择前者，那么 SQL Server 将从文件末尾开始回收空间，直到达到最后一个已分配的区。如果你选择后者，那么\
  \ SQL Server 将从文件末尾开始，将已分配的区移动到文件开头的第一个可用空间。\n\n为了移除我们已扩展的 `Chapter6_File4` 文件末尾的未使用空间，我们可以使用\
  \ SQL Server Management Studio 中的“收缩文件”屏幕，可以通过右键单击数据库并依次选择“任务”➤“收缩”➤“文件”来找到。在“收缩文件”屏幕中，我们可以从“文件名”下拉框中选择相应的文件，然后确保选中“释放未使用的空间”单选按钮。此选项强制执行\
  \ `TRUNCATEONLY`。\n\n我们也可以通过运行清单 6-11 中的命令来实现相同的结果。\n\n```sql\nUSE [Chapter6]\n\
  GO\nDBCC SHRINKFILE (N'Chapter6_File4', 0, TRUNCATEONLY);\n```\n清单 6-11\n使用 `TRUNCATEONLY`\
  \ 收缩文件\n\n如果我们想要回收数据库中所有文件末尾的未使用空间，我们可以右键单击数据库并依次选择“任务”➤“收缩”➤“数据库”。然后，确保“在释放未使用的空间前重新组织文件”选项未被选中，并单击“确定”。\n\
  \n我们可以通过运行清单 6-12 中的 T-SQL 命令来实现相同的结果。\n\n```sql\nUSE [Chapter6]\nGO\nDBCC SHRINKDATABASE(N'Chapter6'\
  \ );\n```\n清单 6-12\n通过 T-SQL 收缩数据库\n\n需要收缩数据库甚至单个文件的情况非常少见。有一种误解认为大型的空文件备份需要更长时间，但这是错误的。事实上，在我的职业生涯中，我只有一次需要收缩数据文件。那次发生在我们从数据库中移除了几百\
  \ GB 的存档数据后，接近 2TB LUN 限制时，但这属于特殊情况。一般来说，你不应该考虑收缩数据库文件，并且绝对不应该在数据库上使用 `自动收缩` 选项。\n\
  \n如果你确实必须收缩数据库，请做好过程缓慢的准备。这是一个单线程操作，运行时会消耗资源。你也绝不应该考虑使用 `NOTRUNCATE` 选项。如前所述，这将导致区在文件内部移动，并导致严重的碎片化问题，就像你可以使用清单\
  \ 6-13 中的脚本看到的那样。此脚本首先在我们的 `RoundRobin` 表上创建一个聚集索引。然后使用 `sys.dm_db_index_physical_stats`\
  \ DMV 来检查聚集索引叶级别的碎片级别。随后，它收缩数据库，然后重新检查我们聚集索引叶级别的碎片级别。\n\n```sql\nUSE Chapter6\n\
  GO\n--在 RoundRobinTable 上创建聚集索引\nCREATE UNIQUE CLUSTERED INDEX CIX_RoundRobinTable\
  \ ON dbo.RoundRobinTable(ID);\nGO\n--检查新索引的碎片\nSELECT * FROM sys.dm_db_index_physical_stats(DB_ID('Chapter6'),OBJECT_ID('dbo.RoundRobinTable'),1,NULL,'DETAILED')\n\
  WHERE index_level = 0;\n--收缩数据库\nDBCC SHRINKDATABASE(N'Chapter6', NOTRUNCATE);\n\
  GO\n--重新检查索引碎片\nSELECT * FROM sys.dm_db_index_physical_stats(DB_ID('Chapter6'),OBJECT_ID('dbo.RoundRobinTable'),1,NULL,'DETAILED')\n\
  WHERE index_level = 0;\nGO\n```\n清单 6-13\n由收缩引起的碎片\n\n如图 6-10 所示的结果，索引叶级别的碎片从 0.08%\
  \ 增加到了惊人的 71.64%，这将严重影响针对该索引运行的查询。索引和碎片将在第 8 章中详细讨论。\n\n#### 注意\n\n碎片级别可能因文件内区的布局而异。\n\
  \n![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig10_HTML.jpg](img/333037_2_En_6_Fig10_HTML.jpg)\n\
  \n图 6-10\n碎片结果\n\n### 数据库范围配置\n\n在 SQL Server 2016 之前，可以在 SQL Server 服务上配置跟踪标志（参见第\
  \ 5 章），这些标志改变了 SQL Server 存储数据和执行自动增长事件的默认行为。其中第一个是 `T1117`，用于使文件组中的所有文件同时增长，这有助于均匀分布数据，尤其是在数据仓库场景中。另一个是\
  \ `T1118`，用于强制专门使用统一区——本质上是关闭了混合区（其中区内的不同页可以分配给不同的表）。`T1118` 对于优化 `TempDB` 很有用，但在数据仓库场景中也可能被证明是有用的。\n\
  \n从 SQL Server 2016 开始，如果启用 `T1117` 和 `T1118`，它们将不再有效。它们已被数据库范围配置所取代，这些配置有两个主要好处。首先，数据库范围配置是在数据库级别配置的，而不是实例级别。这意味着一个统一的整合实例可以轻松支持具有不同工作负载配置文件的数据库。其次，数据库范围配置有\
  \ Microsoft 的文档记录和支持。虽然 `T1117` 和 `T1118` 众所周知且被广泛使用，但它们没有来自 Microsoft 的官方支持。\n\n\
  #### 注意\n\n`T1117` 和 `T1118` 的等效行为在 `TempDB` 数据库上默认启用。然而，对于用户数据库，则采用传统的默认行为。\n\n\
  我们可以使用清单 6-14 中的命令，在 `Chapter6` 数据库的 `Primary` 文件组上启用等同于 `T1117` 的行为。\n\n```sql\n\
  ALTER DATABASE Chapter6 MODIFY FILEGROUP [Primary] AUTOGROW_ALL_FILES\n```\n清单 6-14\n\
  开启“自动增长所有文件”\n\n清单 6-15 中的命令将为 `Chapter6` 数据库启用等同于 `T1118` 的行为。\n\n```sql\nALTER\
  \ DATABASE Chapter6 SET MIXED_PAGE_ALLOCATION OFF\n```\n清单 6-15\n关闭“混合页分配”\n\n###\
  \ 日志维护\n\n事务日志是 SQL Server 武器库中的一项关键工具；它不仅提供恢复功能，还支持许多功能，例如 AlwaysOn 可用性组、事务复制、变更数据捕获等等。\n\
  \n在内部，日志文件被划分为一系列 VLF（虚拟日志文件）。当文件中的最后一个 VLF 变满时，SQL Server 会尝试回绕到日志开头的第一个 VLF。如果此\
  \ VLF 尚未被截断且无法被重用，那么 SQL Server 将尝试增长日志文件。如果由于磁盘空间不足或达到最大大小设置而无法扩展文件，则将引发 9002 错误，并且事务将被回滚。图\
  \ 6-11 说明了日志文件的结构及其循环使用方式。\n\n![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig11_HTML.jpg](img/333037_2_En_6_Fig11_HTML.jpg)\n\
  \n图 6-11：日志文件结构\n\n日志文件中 VLF 的数量由日志最初创建时的大小以及每次增长的大小决定。如果日志文件是以小于 64MB 的增量创建或增长的，则会向文件添加\
  \ 4 个 VLF。如果它是以介于 64MB 和 1GB 之间的增量创建或增长的，则会添加 8 个 VLF。如果它是以超过 1GB 的大小创建或增长的，则会添加\
  \ 16 个 VLF。\n\n事务日志是 SQL Server 组件中一个维护需求相当低的组件。然而，有时也会出现需要维护的场景；这些将在以下章节中讨论。\n\n\
  #### 恢复模型\n\n`恢复模型` 是一个数据库级别的属性，它控制着事务的记录方式，因此会影响事务日志维护。SQL Server 中的三种恢复模型描述于表\
  \ 6-1 中。\n\n表 6-1：恢复模型\n\n| 恢复模型 | 描述 |\n| --- | --- |\n| `SIMPLE` | 在 `SIMPLE`\
  \ 恢复模型中，无法备份事务日志。事务以最小方式记录，日志将自动截断。在 `SIMPLE` 恢复模型中，事务日志的存在仅是为了允许回滚事务。它与一些 HADR（高可用性/灾难恢复）技术不兼容，例如\
  \ AlwaysOn 可用性组、日志传送和数据库镜像。此模型适用于仅偶尔发生更新的报表数据库。这是因为不可能进行时间点恢复。恢复点目标将是上一次 `FULL`\
  \ 或 `DIFFERENTIAL` 备份的时间。 |\n| `FULL` | 在 `FULL` 恢复模型中，必须进行事务日志备份。日志仅在日志备份过程中被截断。事务被完整记录，这意味着可以进行时间点恢复。这也意味着您必须拥有完整的日志文件备份链才能将数据库恢复到最近的时间点。\
  \ |\n| `BULK LOGGED` | `BULK_LOGGED` 恢复模型旨在临时使用，当您正在使用 `FULL` 恢复模型但需要执行大型 `BULK\
  \ INSERT` 操作时。当您切换到此模式时，`BULK INSERT` 操作以最小方式记录。然后，在导入完成后，您可以切换回 `FULL` 恢复模型。在此恢复模型中，您可以恢复到任何备份的结尾，但无法恢复到备份之间的特定时间点。\
  \ |\n\n#### 注意\n\n恢复模型将在第 12 章中进一步讨论。\n\n#### 日志文件数量\n\n我曾多次目睹一种误解，认为拥有多个日志文件可以提高数据库的性能。这是一种谬论。这种想法源于这样一种信念：如果您在不同的驱动器上有多个日志文件，就可以分散\
  \ I/O 并缓解日志瓶颈。\n\n事实是，事务日志是顺序的，即使您添加了多个日志文件，SQL Server 也会将它们视为单个文件。这意味着只有在第一个文件变满后才会使用第二个文件。因此，这种做法无法获得任何性能收益。实际上，您唯一可能需要一个以上事务日志文件的情况是：承载日志的\
  \ LUN 空间已用完，并且由于某种原因无法将其移动到其他地方，也无法扩展卷。在我的职业生涯中，虽然我多次遇到多个日志文件，但我从未遇到过拥有它们的合理理由。\n\
  \n#### 收缩日志\n\n收缩日志文件绝不应该是您标准维护例程的一部分。采用此策略没有任何益处。然而，在某些情况下，您可能不得不收缩日志文件，而且值得庆幸的是，它不像收缩数据文件那样带来同样的风险。\n\
  \n通常需要收缩日志文件的原因是数据库中发生了非典型的活动，例如初始数据填充或一次性 ETL 加载。如果是这种情况，并且您的日志文件已扩展到超出卷上空间阈值的程度，那么减少文件大小可能是最佳行动方案，而不是扩展承载它的卷。然而，在这种情况下，您应该仔细分析情况，以确保这确实是一个非典型事件。如果它似乎可能再次发生，那么您应该考虑增加容量来处理它。\n\
  \n要收缩日志文件，您可以使用“收缩文件”对话框。在此处，从“文件类型”下拉框中选择“日志”。这会导致“文件组”下拉框变灰，并且假设您只有一个日志文件，它将在“文件名”下拉框中被自动选中。如果您有多个事务日志文件，您将能够从下拉列表中选择相应的文件。与收缩数据文件类似，选择“释放未使用的空间”选项将导致使用\
  \ `TRUNCATEONLY`。\n\n或者，您可以使用清单 6-16 中的脚本来实现相同的结果。然而，重要的是要注意，收缩日志文件实际上可能不会回收任何空间。如果文件中的最后一个\
  \ VLF 无法被重用，就会发生这种情况。本章后面将包含可能无法重用 VLF 的完整原因列表。\n\n```\nUSE [Chapter6]\nGO\nDBCC\
  \ SHRINKFILE (N'Chapter6_log', 0, TRUNCATEONLY);\nGO\n清单 6-16：使用 TRUNCATEONLY 收缩日志\n\
  ```\n\n#### 提示\n\n因为收缩事务日志总是涉及从日志末尾回收空间，直到遇到第一个活动的 VLF，所以在执行此活动之前，进行日志备份并将数据库置于单用户模式是明智的。\n\
  \n\n### 日志碎片化\n\n当因完整恢复模型中的备份或简单恢复模型中的检查点操作导致日志被截断时，实际发生的是任何可重用的虚拟日志文件（VLF）被截断。VLF\
  \ 可能无法被重用的原因包括：包含与活动事务关联的日志记录的 VLF，或者包含尚未发送到复制或 AlwaysOn 拓扑中其他数据库的事务的 VLF。类似地，如果缩小日志文件，则会从文件末尾移除\
  \ VLF，直到遇到第一个活动的 VLF。\n\n对于日志文件内的最佳 VLF 数量，没有硬性规定，但对于大型事务日志（达到数十 GB 范围），我尝试维持大约每\
  \ GB 两个 VLF。对于较小的事务日志，这个比率可能会更高。如果 VLF 过多，你可能会观察到任何使用事务日志的活动性能下降。另一方面，VLF 过少也可能带来问题。在这种情况下，如果每个\
  \ VLF 达到数 GB 大小，那么每个 VLF 被截断时，将需要大量时间来清除，在此过程中你可能会观察到系统变慢。因此，对于大型日志文件，建议以 8GB 为块来增长事务日志，以维持\
  \ VLF 的最佳数量和大小。\n\n为了演示这一现象，我们将创建一个名为 `Chapter6LogFragmentation` 的新数据库，该数据库在主文件组上有一个名为\
  \ `Inserts` 的表，然后使用清单 6-17 中的脚本用 100 万行填充它。这将导致创建大量 VLF，从而对性能产生负面影响。\n\n```sql\n\
  --创建 Chapter6LogFragmentation 数据库\nCREATE DATABASE [Chapter6LogFragmentation]\n\
  CONTAINMENT = NONE\nON  PRIMARY\n( NAME = N'Chapter6LogFragmentation', FILENAME\
  \ = N'F:\\MSSQL\\MSSQL15.PROSQLADMIN\\MSSQL\\DATA\\Chapter6LogFragmentation.mdf',\
  \ SIZE = 5120KB, FILEGROWTH = 1024KB )\nLOG ON\n( NAME = N'Chapter6LogFragmentation_log',\
  \ FILENAME = N'E:\\MSSQL\\MSSQL15.PROSQLADMIN\\MSSQL\\DATA\\Chapter6LogFragmentation_log.ldf',\
  \ SIZE = 1024KB, FILEGROWTH = 10%);\nGO\nUSE Chapter6LogFragmentation\nGO\n--创建\
  \ Inserts 表\nCREATE TABLE dbo.Inserts\n(ID        INT        IDENTITY,\nDummyText\
  \    NVARCHAR(50)\n);\n--创建一个 Numbers 表来辅助填充数据\nDECLARE @Numbers TABLE\n(\nNumber\
  \    INT\n)\n--填充 Numbers 表\n;WITH CTE(Number)\nAS\n(\nSELECT 1 Number\nUNION ALL\n\
  SELECT Number +1\nFROM CTE\nWHERE Number <= 99\n)\nINSERT INTO @Numbers\nSELECT\
  \ *\nFROM CTE;\n--用虚拟文本填充示例表，共 100 行\nINSERT INTO dbo.Inserts\nSELECT 'DummyText'\n\
  FROM @Numbers a\nCROSS JOIN @Numbers b\nCROSS JOIN @Numbers c;\n```\n清单 6-17\n创建\
  \ Chapter6LogFragmentation 数据库\n\n你可以通过运行清单 6-18 中的脚本来查看事务日志的大小以及日志中有多少 VLF。\n\n\
  ```sql\n--创建一个变量来存储 DBCC LOGINFO 的结果\nDECLARE @DBCCLogInfo TABLE\n(\nRecoveryUnitID\
  \    TINYINT\n,FieldID        TINYINT\n,FileSize        BIGINT\n,StartOffset   \
  \ BIGINT\n,FseqNo        INT\n,Status        TINYINT\n,Parity        TINYINT\n,CreateLSN\
  \    NUMERIC\n);\n--使用 DBCC LOGINFO 的结果填充表变量\nINSERT INTO @DBCCLogInfo\nEXEC('DBCC\
  \ LOGINFO');\n--显示日志文件大小，结合 VLF 数量和每 GB 的 VLF 数量\nSELECT\nname\n,[Size in MBs]\n\
  ,[Number of VLFs]\n,[Number of VLFs] / ([Size in MBs] / 1024) 'VLFs per GB'\nFROM\n\
  (\nSELECT\nname\n,size * 1.0 / 128 'Size in MBs'\n,(SELECT COUNT(*)\nFROM @DBCCLogInfo)\
  \ 'Number of VLFs'\nFROM sys.database_files\nWHERE type = 1\n) a;\n```\n清单 6-18\n\
  日志大小与 VLF 数量\n\n在 `Chapter6LogFragmentation` 数据库中运行此脚本的结果如图 6-12 所示。你可以看到有 61 个\
  \ VLF，考虑到日志大小仅为 345MB，这个数量是过多的。\n\n![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig12_HTML.jpg](img/333037_2_En_6_Fig12_HTML.jpg)\n\
  \n图 6-12\n每 GB 的 VLF 数量\n\n#### 注意\n\n`DBCC LOGINFO` 是未公开的文档，因此不会得到 Microsoft 的支持。例如，在\
  \ SQL Server 2012 中，Microsoft 在输出中添加了一个名为 `RecoverUnitID` 的列，但他们从未公开过其描述。\n\n`DBCC\
  \ LOGINFO` 返回的每个列的含义如表 6-2 所述。\n\n表 6-2\nDBCC LOGINFO 列\n\n| 列 | 描述 |\n| --- | ---\
  \ |\n| `FileID` | 物理文件的 ID。假设你只有一个文件，这应该总是返回相同的值。 |\n| `FileSize` | VLF 的大小（以字节为单位）。\
  \ |\n| `StartOffset` | 从物理文件的开始到 VLF 起始位置的字节数。 |\n| `FSeqNo` | 定义 VLF 的当前使用顺序。最高的\
  \ `FSeqNo` 表示当前正在写入的 VLF。 |\n| `Status` | 状态为 2 表示 VLF 当前是活动的。状态为 0 表示不是活动的，因此可以被重用。\
  \ |\n| `Parity` | 校验位从 0 开始。当 VLF 首次被使用时，它被设置为 64。随后，它可以设置为 64 或 128。每次 VLF 被重用时，此标志会切换到相反的值。\
  \ |\n| `CreateLSN` | `CreateLSN` 表示创建 VLF 时使用的日志序列号。 |\n\n了解了这些列之后，我们可以识别出前面所示结果的一些有趣事实。首先，因为前四个\
  \ VLF 的 `CreateLSN` 值为 0，我们知道这些是在日志文件本身生成时最初创建的 VLF。其余的则是由日志扩展而非循环使用创建的。我们还可以看到结果中的最后十个\
  \ VLF 尚未被使用，因为它们的 Parity 为 0。`FSeqNo` 为 83 的 VLF 是当前正在写入记录的 VLF，因为它具有最高的 `FSeqNo`。\n\
  \n最有趣的是，就本示例而言，我们可以看到前 51 个 VLF 被标记为活动状态，这意味着它们无法被重用。这意味着如果我们尝试收缩日志文件，只能移除十个 VLF，文件只能缩小它们文件大小的总和。\n\
  \n我们的日志增长且无法循环使用的原因是所有空间都在单个事务过程中被使用了，当然，我们的日志没有被备份。清单 6-19 中的查询将帮助你确定事务日志增长是否有其他原因。该查询检查\
  \ `sys.databases` 目录视图并返回 VLF 最后一次无法被重用的原因。\n\n```sql\nSELECT log_reuse_wait_desc\n\
  FROM sys.databases\nWHERE name = 'Chapter6LogFragmentation';\n```\n清单 6-19\nsys.databases\n\
  \n表 6-3 描述了在 SQL Server 2019 中仍在使用且并非仅供 Microsoft 内部使用的日志重用等待类型。重要的是要理解，日志重用等待适用于日志尝试循环的时刻，并且在你查询\
  \ `sys.databases` 时可能仍然无效。例如，如果在上一次尝试日志循环时存在一个活动事务，它会在 `sys.databases` 中反映出来，即使你在查询\
  \ `sys.databases` 时可能没有任何活动事务。\n\n表 6-3\n日志重用等待\n\n\n\n| `Log_reuse_wait` | `Log_reuse_wait_description`\
  \ | 描述 |\n| --- | --- | --- |\n| `0` | `NOTHING` | 日志在上次尝试时能够循环使用。 |\n| `1` | `CHECKPOINT`\
  \ | 通常表示自上次日志截断以来尚未发生 `CHECKPOINT`。 |\n| `2` | `LOG_BACKUP` | 在进行日志备份之前，日志无法被截断。\
  \ |\n| `3` | `ACTIVE_BACKUP_OR_RESTORE` | 数据库上当前正在进行备份或还原操作。 |\n| `4` | `ACTIVE_TRANSACTION`\
  \ | 存在长时间运行或已延迟的事务。延迟事务将在第 18 章讨论。 |\n| `5` | `DATABASE_MIRRORING` | 异步副本仍在同步中，或镜像已暂停。\
  \ |\n| `6` | `REPLICATION` | 日志中存在尚未被分发服务器接收的事务。 |\n| `7` | `DATABASE_SNAPSHOT_CREATION`\
  \ | 当前正在创建数据库快照。数据库快照将在第 16 章讨论。 |\n| `8` | `LOG_SCAN` | 正在进行日志扫描操作。 |\n| `9` |\
  \ `AVAILABILITY_REPLICA` | 未完全同步辅助副本，或可用性组已暂停。 |\n| `13` | `OLDEST_PAGE` | 数据库中最旧的页面比检查点\
  \ LSN 还要旧。当使用间接检查点时会发生这种情况。 |\n| `16` | `XPT_CHECKPOINT` | 在日志可以被截断之前，需要一次针对内存优化表的\
  \ `CHECKPOINT`。 |\n\n在我们的场景中，为了将 `VLF` 标记为可重用，我们需要备份事务日志。理论上，我们也可以切换到 `SIMPLE` 恢复模式，但这会破坏我们的日志链。在此之前，我们需要进行一次完整备份。这是因为所有备份序列都必须从完整备份开始。（备份和还原将在第\
  \ 12 章讨论。）这样操作后，只有 `FSeqNo` 为 83 的 `VLF` 保持活动状态，其他的将被标记为可重用。\n\n为了改善日志碎片化，我们需要先收缩日志文件，然后以更大的增量再次扩展它。因此，在我们的案例中，我们将日志文件尽可能收缩，这将收缩到\
  \ `FSeqNo` 为 83 的 `VLF`，因为这是文件中最后一个活动 `VLF`。然后我们将其扩展回 500MB。我们可以使用清单 6-20 中的脚本来执行这些任务。\n\
  \n```\nUSE Chapter6LogFragmentation\nGO\nDBCC SHRINKFILE ('Chapter6LogFragmentation\
  \ _log', 0, TRUNCATEONLY);\nGO\nALTER DATABASE Chapter6LogFragmentation MODIFY FILE\
  \ ( NAME = 'Chapter6LogFragmentation _log', SIZE = 512000KB );\nGO\n清单 6-20\n对事务日志进行碎片整理\n\
  ```\n\n最后，我们再次运行清单 6-18 中的查询，以便检查差异。图 6-13 显示，尽管日志增长了大约 155GB，但我们拥有的 `VLF` 数量比开始时更少。\n\
  \n![../images/333037_2_En_6_Chapter/333037_2_En_6_Fig13_HTML.jpg](img/333037_2_En_6_Fig13_HTML.jpg)\n\
  \n图 6-13\n\n收缩和扩展后的日志碎片化情况\n\n### 总结\n\n`文件组` 是数据文件的逻辑容器。也存在用于 `FILESTREAM`/`FileTable`\
  \ 数据以及内存优化数据的特殊 `文件组`。当创建表和索引时，它们是在 `文件组` 上创建的，而不是直接在文件上创建，并且对象中的数据会均匀分布在该 `文件组`\
  \ 内的各个文件上。\n\n你可以采用多种 `文件组` 策略来辅助性能、备份/恢复活动，甚至存储分层。为了提升性能，你可以选择将频繁连接的对象放入不同的 `文件组`，或者将所有对象分布到服务器的所有磁盘上以最大化\
  \ IO 吞吐量。\n\n为了在维护窗口有限的情况下支持超大型数据库的备份，你可以将数据分布在不同的 `文件组` 上，并在隔夜轮换备份这些 `文件组`。为了缩短关键数据的恢复时间，你可以将关键数据隔离在单独的\
  \ `文件组` 中，然后先于其他 `文件组` 恢复它。\n\n为了支持手动存储分层，请实现表分区，使每个分区存储在单独的 `文件组` 上。然后，你可以将每个 `文件组`\
  \ 内的文件放置在适当的存储设备上。\n\n`FILESTREAM` 和内存优化 `文件组` 都指向操作系统中的文件夹，而不是包含文件。每个文件夹位置被称为容器。对于内存优化\
  \ `文件组`，建议为你使用的每个磁盘阵列准备两个容器，以便均匀分布 IO。\n\n你可以扩展和收缩数据文件。但是，收缩文件（尤其是自动收缩）被认为是不良实践，并可能导致严重的碎片化问题，从而引发性能问题。扩展文件时，应使用较大的增量以减少重复开销。\n\
  \n你也可以扩展和收缩日志文件，尽管很少需要收缩它们。以小增量扩展日志文件可能导致日志碎片化，即你的日志文件包含大量的 `VLF`。你可以通过先收缩日志文件，然后以更大的增量再次扩展它来解决日志碎片化问题。\n\
  \n"
- "# 7. 表优化\n\n在你的数据层应用程序的生命周期中，你可能需要对保存应用程序数据的表执行许多维护任务和性能优化操作。这些操作可能包括对表进行分区、压缩表或将数据迁移到内存优化表。在本章中，我们将详细探讨这三个概念。\n\
  \n### 表分区\n\n*分区* 是针对大型表和索引的一种性能优化方法，它将对象水平拆分为更小的单元。当随后访问表或索引时，`SQL Server` 可以执行一种称为\
  \ *分区消除* 的优化，允许仅读取所需的分区，而不是整个表。此外，每个分区可以存储在单独的 `文件组` 上；这允许你将不同分区存储在不同的存储层上。例如，你可以将较旧、访问频率较低的数据存储在较便宜的存储上。图\
  \ 7-1 展示了一个大型 `Orders` 表可能的结构。\n\n![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig1_HTML.jpg](img/333037_2_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1\n\n分区结构\n\n#### 分区概念\n\n在深入探讨分区的技术实现之前，理解相关概念会有所帮助，例如分区键、分区函数、分区方案和分区对齐。这些概念将在以下各节中讨论。\n\
  \n\n\n##### 数据库分区\n\n##### 分区键\n\n`分区键`用于确定表中每一行应放置在哪个分区中。如果表具有聚集索引，则分区键必须是聚集索引键的子集。表上所有其他`UNIQUE`索引，包括主键（如果与聚集索引不同），也需要包含分区键。分区键可以由任何数据类型组成，但以下类型除外：`TEXT`、`NTEXT`、`IMAGE`、`XML`、`TIMESTAMP`、`VARCHAR(MAX)`、`NVARCHAR(MAX)`和`VARBINARY(MAX)`。它也不能是用户定义的\
  \ CLR 类型列或具有别名数据类型的列。但是，它可以是计算列，只要该列是持久化的。许多场景会使用日期或日期时间列作为分区键。这允许你基于时间实现滑动窗口。我们将在本章后面讨论滑动窗口。在图\
  \ 7-1 中，`OrderData`列被用作分区键。\n\n由于该列用于在分区之间分布行，因此你应使用能够实现行均匀分布的列，以从解决方案中获得最大收益。你选择的列也应该是查询用作筛选条件的列。这将允许你实现分区消除。\n\
  \n##### 分区函数\n\n你使用边界点来设置每个分区的上限和下限。在图 7-1 中，你可以看到边界点被设置为 2019 年 1 月 1 日和 2017 年\
  \ 1 月 1 日。这些边界点在一个称为`分区函数`的数据库对象中进行配置。在创建分区函数时，你可以指定范围是左对齐还是右对齐。如果将范围左对齐，则任何严格等于边界点值的值都将存储在该边界点左侧的分区中。如果将范围右对齐，则严格等于边界点值的值将被放置在该边界点右侧的分区中。分区函数还规定了分区键的数据类型。\n\
  \n##### 分区方案\n\n每个分区可以存储在单独的文件组上。`分区方案`是一个你创建的对象，用于指定每个分区将存储在哪个文件组上。从图 7-1 可以看出，分区的数量总是比边界点多一个。然而，当你创建分区方案时，可以指定一个“额外”的文件组。这将定义如果添加额外的边界点，下一个应使用的文件组。也可以指定`ALL`关键字，而不是指定各个文件组。这将强制所有分区存储在同一个文件组上。\n\
  \n##### 索引对齐\n\n如果索引建立在与表相同的分区函数上，则该索引被视为与表对齐。如果索引建立在不同的分区函数上，但两个函数完全相同（即它们共享相同的数据类型、相同数量的分区和相同的边界点值），则它也被视为对齐。\n\
  \n由于聚集索引的叶级由表的实际数据页组成，因此聚集索引始终与表对齐。然而，非聚集索引可以存储在与堆或聚集索引不同的文件组上。这延伸到分区，其中基础表或非聚集索引可以独立分区。如果非聚集索引存储在相同的分区方案或相同的分区方案上，则它们是对齐的。如果不是这种情况，则它们是非对齐的。\n\
  \n除非有特定原因不这样做，否则将索引与基础表对齐是良好的实践。这是因为对齐索引有助于实现分区消除。索引对齐也是某些操作（如`SWITCH`）所必需的，这将在本章后面讨论。\n\
  \n##### 分区层次结构\n\n涉及分区的对象以一对多的层次结构工作，因此多个表可以共享一个分区方案，多个分区方案可以共享一个分区函数，如图 7-2 所示。\n\
  \n![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig2_HTML.jpg](img/333037_2_En_7_Fig2_HTML.jpg)\n\
  \n图 7-2\n分区层次结构\n\n#### 提示\n\n虽然图数据库超出了本书的范围，但值得一提的是，SQL Server 2019 引入了对分区图数据库表和索引的支持，它将数据划分为单元，这些单元可以分布在多个文件组上。\n\
  \n### 实现分区\n\n实现分区涉及创建分区函数和分区方案，然后在分区方案上创建表。如果表已存在，则需要删除并重新创建表的聚集索引。这些任务将在以下部分中讨论。\n\
  \n#### 创建分区对象\n\n你需要创建的第一个对象是分区函数。这可以使用`CREATE PARTITION FUNCTION`语句创建，如代码清单 7-1\
  \ 所示。此脚本创建一个名为`Chapter7`的数据库，然后创建一个名为`PartFunc`的分区函数。该函数指定分区键的数据类型为`DATE`，并为 2019\
  \ 年 1 月 1 日和 2017 年 1 月 1 日设置边界点。表 7-1 详细说明了日期将如何分布在分区之间。\n\n表 7-1\n日期分布\n\n| 日期\
  \ | 分区 | 备注 |\n| --- | --- | --- |\n| 2015 年 6 月 6 日 | 1 | |\n| 2016 年 1 月 1 日 |\
  \ 1 | 如果使用了`RANGE RIGHT`，此值将在分区 2 中。 |\n| 2017 年 10 月 11 日 | 2 | |\n| 2018 年 1 月\
  \ 1 日 | 2 | 如果使用了`RANGE RIGHT`，此值将在分区 3 中。 |\n| 2019 年 5 月 9 日 | 3 | |\n\n```sql\n\
  USE Master\nGO\n--Create Database Chapter7 using default settings from Model\nCREATE\
  \ DATABASE Chapter7 ;\nGO\nUSE Chapter7\nGO\n--Create Partition Function\nCREATE\
  \ PARTITION FUNCTION PartFunc(Date)\nAS RANGE LEFT\nFOR VALUES('2017-01-01', '2019-01-01')\
  \ ;\nListing 7-1\n创建分区函数\n```\n\n我们需要创建的下一个对象是分区方案。这可以使用`CREATE PARTITION SCHEME`语句创建，如代码清单\
  \ 7-2 所示。此脚本创建一个名为`PartScheme`的分区方案，它基于`PartFunc`分区函数，并指定所有分区都将存储在`PRIMARY`文件组上。虽然将所有分区存储在同一个文件组上不允许我们实现存储分层，但它确实使我们能够自动化滑动窗口。\n\
  \n```sql\nCREATE PARTITION SCHEME PartScheme\nAS PARTITION PartFunc\nALL TO ([PRIMARY])\
  \ ;\nListing 7-2\n创建分区方案\n```\n\n\n\n##### 创建新的分区表\n\n现在我们已经有了分区函数和分区方案，剩下的就是创建分区表了。清单\
  \ 7-3 中的脚本创建了一个名为 `Orders` 的表，并基于 `OrderDate` 列进行分区。尽管 `OrderNumber` 为我们的表提供了天然的主键，但我们仍需要将\
  \ `OrderDate` 包含在键中，以便它能用作分区列。显然，`OrderDate` 列本身并不适合作为主键，因为它无法保证唯一性。\n\n```sql\n\
  CREATE TABLE dbo.Orders\n(\nOrderNumber int    NOT NULL,\nOrderDate date     NOT\
  \ NULL,\nCustomerID int     NOT NULL,\nProductID int      NOT NULL,\nQuantity int\
  \       NOT NULL,\nNetAmount money    NOT NULL,\nTaxAmount money    NOT NULL,\n\
  InvoiceAddressID int    NOT NULL,\nDeliveryAddressID int   NOT NULL,\nDeliveryDate\
  \ date       NULL\n)  ON PartScheme(OrderDate)  ;\nGO\nALTER TABLE dbo.Orders ADD\
  \ CONSTRAINT\nPK_Orders PRIMARY KEY CLUSTERED\n(\nOrderNumber,\nOrderDate\n) WITH(\
  \ STATISTICS_NORECOMPUTE = OFF, IGNORE_DUP_KEY = OFF,\nALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS\
  \ = ON) ON PartScheme(OrderDate) ;\nGO\n```\n\n清单 7-3\n创建分区表\n\n这个脚本中需要注意的重要部分是\
  \ `ON` 子句。通常，你会在文件组上创建表，但在这里，我们是在分区方案上创建表，并传入将用作分区键的列名。分区键的数据类型必须与分区函数中指定的数据类型相匹配。\n\
  \n##### 分区现有表\n\n由于聚集索引总是与基表对齐，因此将表移动到分区方案的过程非常简单：只需删除聚集索引，然后在分区方案上重新创建聚集索引即可。清单\
  \ 7-4 中的脚本创建了一个名为 `ExistingOrders` 的表并填充数据。\n\n```sql\n--Create the ExistingOrders\
  \ table\nCREATE TABLE dbo.ExistingOrders\n(\nOrderNumber int    IDENTITY    NOT\
  \ NULL,\nOrderDate date     NOT NULL,\nCustomerID int     NOT NULL,\nProductID int\
  \      NOT NULL,\nQuantity int           NOT NULL,\nNetAmount money        NOT NULL,\n\
  TaxAmount money        NOT NULL,\nInvoiceAddressID int   NOT NULL,\nDeliveryAddressID\
  \ int  NOT NULL,\nDeliveryDate date      NULL\n)  ON [PRIMARY] ;\nGO\nALTER TABLE\
  \ dbo.ExistingOrders ADD CONSTRAINT\nPK_ExistingOrders PRIMARY KEY CLUSTERED\n(\n\
  OrderNumber,\nOrderDate\n) WITH( STATISTICS_NORECOMPUTE = OFF, IGNORE_DUP_KEY =\
  \ OFF,\nALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS = ON) ON [PRIMARY] ;\nGO\n--We will\
  \ now populate the data with data so that we can view the storage properties\n--and\
  \ then partition the table when the data already exists.\n--Build a numbers table\
  \ for the data population\nDECLARE @Numbers TABLE\n(\nNumber    INT\n)\n;WITH CTE(Number)\n\
  AS\n(\nSELECT 1 Number\nUNION ALL\nSELECT Number + 1\nFROM CTE\nWHERE Number < 20\n\
  )\nINSERT INTO @Numbers\nSELECT Number FROM CTE ;\n--Populate ExistingOrders with\
  \ data\nINSERT INTO dbo.ExistingOrders\nSELECT\n(SELECT CAST(DATEADD(dd,(SELECT\
  \ TOP 1 Number\nFROM @Numbers\nORDER BY NEWID(), a.Number, b.Number),GETDATE())\
  \ AS DATE)),\n(SELECT TOP 1 Number -10 FROM @Numbers ORDER BY NEWID()),\n(SELECT\
  \ TOP 1 Number FROM @Numbers ORDER BY NEWID()),\n(SELECT TOP 1 Number FROM @Numbers\
  \ ORDER BY NEWID()),\n500,\n100,\n(SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),\n\
  (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),\n(SELECT CAST(DATEADD(dd,(SELECT\
  \ TOP 1 Number - 10\nFROM @Numbers\nORDER BY NEWID(), a.Number, b.Number),GETDATE())\
  \ as DATE))\nFROM @Numbers a\nCROSS JOIN @Numbers b ;\n```\n\n清单 7-4\n创建新表并用数据填充\n\
  \n如图 7-3 所示，通过查看“表属性”对话框的“存储”选项卡，我们可以看到该表是在 PRIMARY 文件组上创建的，并且未进行分区。\n\n![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig3_HTML.jpg](img/333037_2_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3\n未分区的表属性\n\n清单 7-5 中的脚本现在删除了 `ExistingOrders` 表的聚集索引，并在 `PartScheme` 分区方案上重新创建它。同样，需要注意的关键行是\
  \ `ON` 子句，它指定了 `PartScheme` 作为目标分区方案，并传入 `OrderDate` 作为分区键。\n\n```sql\n--Drop Clustered\
  \ Index\nALTER TABLE dbo.ExistingOrders DROP CONSTRAINT PK_ExistingOrders ;\nGO\n\
  --Re-created clustered index on PartScheme\nALTER TABLE dbo.ExistingOrders ADD \
  \ CONSTRAINT PK_ExistingOrders PRIMARY KEY CLUSTERED\n(\nOrderNumber ASC,\nOrderDate\
  \ ASC\n)WITH (PAD_INDEX = OFF, STATISTICS_NORECOMPUTE = OFF, SORT_IN_TEMPDB = OFF,\n\
  IGNORE_DUP_KEY = OFF, ONLINE = OFF, ALLOW_ROW_LOCKS = ON,\nALLOW_PAGE_LOCKS = ON)\
  \ ON PartScheme(OrderDate) ;\nGO\n```\n\n清单 7-5\n将现有表移动到分区方案上\n\n在图 7-4 中，您可以看到，再次查看“表属性”对话框的“存储”选项卡，会发现该表现在已针对\
  \ `PartScheme` 分区方案进行了分区。\n\n![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig4_HTML.jpg](img/333037_2_En_7_Fig4_HTML.jpg)\n\
  \n图 7-4\n已分区的表属性\n\n#### 监视分区表\n\n您可能希望跟踪表中每个分区的行数。这样做可以确保您的行分布均匀。如果不是，您可能需要重新评估分区策略，以确保您能从该技术中获得全部收益。有两种方法可以实现这一点：`$PARTITION`\
  \ 函数和 SSMS 的“按分区的磁盘使用情况”报表。\n\n\n\n##### $PARTITION 函数\n\n你可以使用 `$PARTITION` 函数来确定表中每个分区包含多少行。当你对分区函数运行此函数时，它接受分区键的列名作为参数，如代码清单\
  \ 7-6 所示。\n\n```sql\nSELECT\nCOUNT(*) 'Number of Rows'\n,$PARTITION.PartFunc(OrderDate)\
  \ 'Partition'\nFROM dbo.ExistingOrders\nGROUP BY $PARTITION.PartFunc(OrderDate)\
  \ ;\n```\n*代码清单 7-6 使用 $PARTITION 函数*\n\n从图 7-5 的结果可以看出，我们表中的所有行都位于同一个分区中，这基本上违背了分区的意义，意味着我们应该重新评估我们的策略。\n\
  \n![图 7-5：针对已分区表运行 $PARTITION 函数](img/333037_2_En_7_Fig5_HTML.jpg)\n\n我们也可以使用 `$PARTITION`\
  \ 函数来评估一个表在不同分区函数下的分区情况。这可以帮助我们规划如何解决 `ExistingOrders` 表的问题。代码清单 7-7 中的脚本创建了一个名为\
  \ `PartFuncWeek` 的新分区函数，该函数为 2019 年 11 月创建每周分区。然后，它使用 `$PARTITION` 函数来确定，如果实施此策略，我们的\
  \ `ExistingOrders` 表中的行将如何分布。目前，我们不需要创建分区方案或重新分区表。运行脚本前，请更改边界点值，使其基于你运行脚本的日期。这是因为表中的数据是使用\
  \ `GETDATE()` 函数生成的。\n\n```sql\n--Create new partition function\nCREATE PARTITION\
  \ FUNCTION PartFuncWeek(DATE)\nAS RANGE LEFT\nFOR VALUES ('2019-03-7','2019-03-14','2019-03-21','2019-03-28')\
  \ ;\n--Assess spread of rows\nSELECT\nCOUNT(*) 'Number of Rows'\n,$PARTITION.PartFuncWeek(OrderDate)\
  \ 'Partition'\nFROM dbo.ExistingOrders\nGROUP BY $PARTITION.PartFuncWeek(OrderDate)\
  \ ;\n```\n*代码清单 7-7：针对新分区函数使用 $PARTITION 函数*\n\n图 7-6 中的结果显示，`ExistingOrders` 表中的行在每周分区之间分布得相当均匀，因此这可能为我们的表提供了一个合适的策略。\n\
  \n![图 7-6：针对新分区函数使用 $PARTITION 函数](img/333037_2_En_7_Fig6_HTML.jpg)\n\n##### 滑动窗口\n\
  \n我们的每周分区策略似乎运行良好，但当我们进入 12 月会怎样呢？目前看来，2019 年 11 月 28 日之后的所有新订单都将进入同一个分区，该分区将不断增长。为了解决这个问题，SQL\
  \ Server 为我们提供了创建滑动窗口的工具。在我们的案例中，这意味着每周都会为下一周创建一个新分区，并移除最早的分区。\n\n为了实现这一点，我们可以使用\
  \ `SPLIT`、`MERGE` 和 `SWITCH` 操作。`SPLIT` 操作添加一个新的边界点，从而创建一个新分区。`MERGE` 操作移除一个边界点，从而将两个分区合并在一起。`SWITCH`\
  \ 操作将一个分区移动到一个空表或分区中。\n\n在我们的场景中，我们创建了一个暂存表，名为 `OldOrdersStaging`。我们使用此表作为暂存区来保存来自最早分区的数据。一旦数据进入暂存表，你就可以执行任何所需的操作或转换。例如，你的开发人员可能希望创建一个脚本来汇总数据，并将其传输到历史\
  \ `Orders` 表中。尽管 `OldOrdersStaging` 表被设计为临时对象，但需要注意的是，你不能使用临时表。相反，你必须使用永久表，并在最后\
  \ `drop` 它。这是因为临时表驻留在 TempDB 中，这意味着它们将位于不同的文件组上，而 `SWITCH` 将无法工作。`SWITCH` 是一个元数据操作，因此，所涉及的两个分区必须驻留在同一个文件组上。\n\
  \n代码清单 7-8 中的脚本实现了一个滑动窗口。首先，它为旧订单创建一个暂存表。该表的索引和约束必须与分区表的索引和约束相同。该表还必须位于同一个文件组上，以便\
  \ `SWITCH` 操作能够成功。然后，它确定分区表中的最高和最低边界点值，这些值将用作 `SPLIT` 和 `MERGE` 操作的参数。接着，它使用 `ALTER\
  \ PARTITION FUNCTION` 命令来移除最低的边界点值并添加新的边界点。最后，它重新运行 `$PARTITION` 函数以显示新的行分布情况，并查询\
  \ `sys.partition_functions` 和 `sys.partition_range_values` 目录视图以显示 `PartFuncWeek`\
  \ 分区函数的新边界点值。该脚本假设 `PartSchemeWeek` 分区方案已创建，并且 `ExistingOrders` 表已移动到该分区方案。\n\n\n\
  ###### 实现滑动窗口\n\n```sql\n--创建 OldOrders 表\nCREATE TABLE dbo.OldOrdersStaging(\n\
  [OrderNumber] [int] IDENTITY(1,1) NOT NULL,\n[OrderDate] [date] NOT NULL,\n[CustomerID]\
  \ [int] NOT NULL,\n[ProductID] [int] NOT NULL,\n[Quantity] [int] NOT NULL,\n[NetAmount]\
  \ [money] NOT NULL,\n[TaxAmount] [money] NOT NULL,\n[InvoiceAddressID] [int] NOT\
  \ NULL,\n[DeliveryAddressID] [int] NOT NULL,\n[DeliveryDate] [date] NULL,\nCONSTRAINT\
  \ PK_OldOrdersStaging PRIMARY KEY CLUSTERED\n(\nOrderNumber ASC,\nOrderDate ASC\n\
  )WITH (PAD_INDEX = OFF, STATISTICS_NORECOMPUTE = OFF, IGNORE_DUP_KEY = OFF,\nALLOW_ROW_LOCKS\
  \ = ON, ALLOW_PAGE_LOCKS = ON)\n) ;\nGO\n--计算最低边界点值\nDECLARE @LowestBoundaryPoint\
  \ DATE = (\nSELECT TOP 1 CAST(value  AS DATE)\nFROM sys.partition_functions pf\n\
  INNER JOIN sys.partition_range_values prv\nON pf.function_id = prv.function_id\n\
  WHERE pf.name = 'PartFuncWeek'\nORDER BY value ASC) ;\n--计算最高边界点值\nDECLARE @HighestboundaryPoint\
  \ DATE = (\nSELECT TOP 1 CAST(value  AS DATE)\nFROM sys.partition_functions pf\n\
  INNER JOIN sys.partition_range_values prv\nON pf.function_id = prv.function_id\n\
  WHERE pf.name = 'PartFuncWeek'\nORDER BY value DESC) ;\n--向最高边界点值加 7 天以确定新的边界点\n\
  DECLARE @NewSplitRange DATE = (\nSELECT DATEADD(dd,7,@HighestboundaryPoint)) ;\n\
  --将最旧的分区切换到 OldOrders 表\nALTER TABLE ExistingOrders\nSWITCH PARTITION 1 TO OldOrdersStaging\
  \ PARTITION 2 ;\n--移除最旧的分区\nALTER PARTITION FUNCTION PartFuncWeek()\nMERGE RANGE(@LowestBoundaryPoint)\
  \ ;\n--创建新分区\nALTER PARTITION FUNCTION PartFuncWeek()\nSPLIT RANGE(@NewSplitRange)\
  \ ;\nGO\n--重新运行 $PARTITION 以评估新的行分布\nSELECT\nCOUNT(*) 'Number of Rows'\n,$PARTITION.PartFuncWeek(OrderDate)\
  \ 'Partition'\nFROM dbo.ExistingOrders\nGROUP BY $PARTITION.PartFuncWeek(OrderDate)\
  \ ;\nSELECT name, value FROM SYS.partition_functions PF\nINNER JOIN SYS.partition_range_values\
  \ PFR ON PF.function_id = PFR.function_id\nWHERE name = 'PARTFUNCWEEK' ;\n```\n\n\
  图 7-7 中显示的结果展示了分区是如何重新对齐的。\n\n![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig7_HTML.jpg](img/333037_2_En_7_Fig7_HTML.jpg)\n\
  \n图 7-7 新分区对齐\n\n使用`SWITCH`函数有几个限制。首先，表的所有非聚集索引必须与基表对齐。此外，您要移入数据的空表或分区必须具有相同的索引结构。它还必须与切换出的分区位于同一文件组上。这是因为`SWITCH`函数实际上并不移动任何数据，它是一个元数据操作，更改构成分区的页面的指针。\n\
  \n您可以在不同的文件组上执行`MERGE`和`SPLIT`，但这会带来性能上的阻碍。与`SWITCH`类似，如果涉及的所有分区都位于同一文件组上，`MERGE`和`SPLIT`可以作为元数据操作执行。但是，如果它们位于不同的文件组上，那么\
  \ SQL Server 就需要执行物理数据移动，这可能会花费更长的时间。\n\n#### 分区消除\n\n分区的一个关键优势是，查询优化器能够只访问满足查询结果所需的分区，而不是整个表。要使分区消除成功，分区键必须作为筛选条件包含在`WHERE`子句中。我们可以通过针对`ExistingOrders`表运行清单\
  \ 7-9 中的查询，并选择包含实际执行计划的选项来见证此功能。\n\n```sql\nSELECT OrderNumber, OrderDate\nFROM\
  \ dbo.ExistingOrders\nWHERE OrderDate BETWEEN '2019-03-01' AND '2019-03-07' ;\n\
  ```\n\n如果我们现在查看执行计划，并通过 SQL Server Management Studio 检查索引扫描运算符的属性，我们会看到只有一个分区被访问，如图\
  \ 7-8 所示。\n\n![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig8_HTML.jpg](img/333037_2_En_7_Fig8_HTML.jpg)\n\
  \n图 7-8 启用分区消除后的索引扫描运算符属性\n\n然而，分区消除功能可能有点脆弱。例如，如果您以任何方式操作`OrderDate`列，而不仅仅是将其用于求值，那么分区消除就无法发生。例如，如果您将`OrderDate`列转换为`DATETIME2`数据类型，如清单\
  \ 7-10 所示，那么所有分区都将需要被访问。此问题也会影响分区索引。\n\n```sql\nSELECT OrderNumber, OrderDate\n\
  FROM dbo.ExistingOrders\nWHERE CAST(OrderDate AS DATETIME2) BETWEEN '2019-03-01'\
  \ AND '2019-03-31' ;\n```\n\n图 7-9 展示了通过 SQL Server Management Studio 查看到的索引扫描运算符的相同属性。在这里，您可以看到所有分区都被访问了，而不仅仅是一个。\n\
  \n![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig9_HTML.jpg](img/333037_2_En_7_Fig9_HTML.jpg)\n\
  \n图 7-9 索引扫描属性，无分区消除\n\n### 表压缩\n\n当您想到压缩时，很自然会认为这是以牺牲性能为代价来节省空间。然而，这对于 SQL Server\
  \ 表压缩来说并不总是成立。SQL Server 中的压缩实际上可以提供性能优势。这是因为 SQL Server 通常是一个受 IO 限制的应用程序，而不是受\
  \ CPU 限制。这意味着，如果 SQL Server 需要从磁盘读取的页面数量急剧减少，那么即使这会消耗 CPU 周期，性能也会提高。当然，如果您的数据库实际上受\
  \ CPU 限制（例如，因为您的磁盘速度非常快且只有一个 CPU 核心），那么压缩可能会产生负面影响，但这并不典型。为了理解表压缩，深入了解 SQL Server\
  \ 如何在页面内存储数据会有所帮助。尽管对页面内部的完整讨论超出了本书的范围，但图 7-10 从高层次上展示了磁盘上页面和行的默认结构。\n\n![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig10_HTML.jpg](img/333037_2_En_7_Fig10_HTML.jpg)\n\
  \n图 7-10 页面结构\n\n在行内，行元数据包含诸如行是否存在版本控制信息以及行是否具有`NULL`值等详细信息。固定长度列元数据记录页面固定长度部分的长度。可变长度元数据包括一个可变长度列的列偏移数组，以便\
  \ SQL Server 可以跟踪每个列相对于行开始的位置。\n\n#### 行压缩\n\n在未压缩的页面中，如前所述，SQL Server 会先存储固定长度列，然后是可变长度列。唯一可以是可变长度的列是具有可变长度数据类型的列，例如\
  \ `VARCHAR` 或 `VARBINARY`。当为表实现行压缩时，SQL Server 也会为其他数据类型使用最小的存储空间。例如，如果有一个整数列，其在第\
  \ 1 行包含一个 `NULL` 值，第 2 行值为 `50`，第 3 行值为 `40,000`，那么在第 1 行，该列根本不占用任何空间；在第 2 行它使用\
  \ 1 个字节，因为系统会将其存储为 `TINYINT`；在第 3 行它使用 4 个字节，因为系统需要将其存储为 `INT`。这与未压缩的表每行（包括第 1 行）都使用\
  \ 4 个字节形成对比。\n\n此外，SQL Server 还会压缩 Unicode 列，使得可以存储为单字节的字符只使用单字节，而不是像在未压缩页面中那样使用\
  \ 2 个字节。为了实现这些优化，SQL Server 必须使用不同的页面格式，如图 7-11 所示。\n\n![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig11_HTML.jpg](img/333037_2_En_7_Fig11_HTML.jpg)\n\
  *图 7-11：采用行压缩的页面结构*\n\n#### 注意\n\n短列是指 8 字节或更少的列。\n\n在图 7-11 中，行元数据的第一区域包含详细信息，例如是否存在有关该行的版本信息以及是否存在任何长数据列。列描述符包含短列的数量和每个长列的长度。元数据的第二区域包含详细信息，例如版本信息和堆的转发行指针。\n\
  \n#### 页压缩\n\n当实现页压缩时，会首先实现行压缩。页压缩本身实际上由两种不同的压缩形式组成。第一种是*前缀压缩*，第二种是*字典压缩*。这些压缩类型在以下部分概述。\n\
  \n##### 前缀压缩\n\n前缀压缩的工作原理是为页面内跨行的列建立一个公共前缀。一旦确定了最佳前缀值，SQL Server 会选择包含完整前缀的最长值作为锚点行，并将该列中的所有其他值存储为锚点行的差分，而不是存储值本身。例如，表\
  \ 7-2 详细说明了存储在列中的值，并随后描述了 SQL Server 将如何使用前缀压缩存储这些值。值 `Postfreeze` 被选为锚点值，因为它是最长的、包含已识别的完整前缀\
  \ `Post` 的值。`<>` 中的数字是使用了多少前缀字符的标记。\n\n*表 7-2：前缀压缩差分*\n\n| 列 A 值 | 列 A 存储 | 列 B\
  \ 值 | 列 B 存储 |\n| --- | --- | --- | --- |\n| `Postcode` | `<4>code` | `Teethings\
  \ (锚点)` | — |\n| `Postfreeze (锚点)` | — | `Teacher` | `<2>acher` |\n| `Postpones`\
  \ | `<4>pones` | `Teenager` | `<3>nager` |\n| `Postilion` | `<4>ilion` | `Teeth`\
  \ | `<5>` |\n| `Imposters` | `<0>Imposters` | `Tent` | `<2>nt` |\n| [`Poacher`](http://www.morewords.com/word/poacher/)\
  \ | `<2>acher` | `Rent` | `<0>Rent` |\n\n##### 字典压缩\n\n字典压缩是在所有列都使用前缀压缩之后执行的。它查看页面中的所有列，并找到匹配的值。匹配是使用值的二进制表示执行的，这使得该过程与数据类型无关。当它找到重复值时，会将它们添加到页面顶部的特殊字典中，并在行中简单地存储一个指向该值在字典中位置的指针。表\
  \ 7-3 扩展了上表，以便您对此有一个概览。\n\n*表 7-3：字典压缩指针*\n\n| 列 A 值 | 列 A 存储 | 列 B 值 | 列 B 存储 |\n\
  | --- | --- | --- | --- |\n| `Postcode` | `<4>code` | `Teethings (锚点)` | — |\n|\
  \ `Postfreeze (锚点)` | — | `Teacher` | `[指针 1]` |\n| `Postpones` | `<4>pones` | `Teenager`\
  \ | `<3>nager` |\n| `Postilion` | `<4>ilion` | `Teeth` | `<5>` |\n| `Imposters`\
  \ | `<0>Imposters` | `Tent` | `<2>nt` |\n| [`Poacher`](http://www.morewords.com/word/poacher/)\
  \ | `[指针 1]` | `Rent` | `<0>Rent` |\n\n在这里，您可以看到前一表中出现在两列中的值 `<2>acher` 已被指向存储该值的字典的指针所取代。\n\
  \n##### 页压缩结构\n\n为了便于页压缩，在页面头部之后立即插入一个特殊的行，该行包含有关锚点记录和字典的信息。此行称为压缩信息记录，如图 7-12 所示。\n\
  \n![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig12_HTML.jpg](img/333037_2_En_7_Fig12_HTML.jpg)\n\
  *图 7-12：采用页压缩的页面结构*\n\n压缩信息记录的行元数据指定了记录是否包含锚点记录和字典。更改计数记录了对页面进行了多少次更改，这可能会影响锚点和字典的有用性。当表重建时，SQL\
  \ Server 可以使用此信息来确定是否应重建页面。偏移量包含字典的开始和结束位置（从页面开头算起）。锚点记录包含每个列的前缀值，字典包含已为其创建指针的重复值。\n\
  \n#### 列存储压缩\n\n列存储索引始终是自动压缩的。这意味着如果您在表上创建聚集列存储索引，您的表也将被压缩，并且这不能与行压缩或页压缩结合使用。您有两种类型的列存储压缩可用：`COLUMNSTORE`（在\
  \ SQL Server 2012 中引入）和 `COLUMNSTORE_ARCHIVE`（在 SQL Server 2014 中引入）。\n\n您可以将 `COLUMNSTORE`\
  \ 视为列存储索引的标准压缩类型，并且应仅对不常访问的数据使用 `COLUMNSTORE_ARCHIVE` 算法。这是因为就性能而言，此压缩算法打破了 SQL\
  \ Server 数据压缩的规则。如果实现此算法，请预期会有非常高的压缩比，但也要准备好为此付出查询性能的代价。\n\n#### 实现行压缩和页压缩\n\n行压缩和页压缩的规划与实现是一个相当直接的过程，将在以下部分讨论。\n\
  \n##### 选择压缩级别\n\n正如你可能从前文关于行压缩和页压缩的描述中已经意识到的，页压缩提供比行压缩更高的压缩率，这意味着更好的 I/O 性能。然而，这是以牺牲\
  \ CPU 周期为代价的，无论是在压缩表时，还是在访问表时都会产生开销。因此，在开始压缩表之前，请务必了解每种压缩类型能减少多少表的大小，以便评估你能获得多少\
  \ I/O 效率提升。\n\n你可以通过使用一个名为 `sp_estimate_data_compression_savings` 的系统存储过程来实现这一点。该过程用于估算实施压缩可以节省的空间量。它接受表\
  \ 7-4 中列出的参数。\n\n表 7-4：`sp_estimate_data_compression_savings` 参数\n\n| 参数 | 说明 |\n\
  | --- | --- |\n| `@schema_name` | 包含你要对其运行该过程的表的架构名称。 |\n| `@object_name` | 你要对其运行该过程的表的名称。\
  \ |\n| `@index_ID` | 对所有索引传入 `NULL`。对于堆，索引 ID 始终为 `0`，而聚集索引的 ID 始终为 `1`。 |\n| `@partition_number`\
  \ | 对所有分区传入 `NULL`。 |\n| `@data_compression` | 传入 `ROW`、`PAGE`、`COLUMNSTORE`、`COLUMNSTORE_ARCHIVE`，或者如果你希望评估从已压缩的表中移除压缩的影响，则传入\
  \ `NONE`。 |\n\n代码清单 7-11 中对 `sp_estimate_data_compression_savings` 存储过程的两次执行，分别评估了行压缩和页压缩对我们\
  \ `ExistingOrders` 表所有分区的影响。\n\n```\nEXEC sp_estimate_data_compression_savings @schema_name\
  \ = 'dbo', @object_name = 'ExistingOrders',\n@index_id = NULL, @partition_number\
  \ = NULL, @data_compression ='ROW' ;\nEXEC sp_estimate_data_compression_savings\
  \ @schema_name = 'dbo', @object_name = 'ExistingOrders',\n@index_id = NULL, @partition_number\
  \ = NULL, @data_compression ='PAGE' ;\n```\n代码清单 7-11：`Sp_estimate_data_compression_savings`\n\
  \n图 7-13 中的结果显示，对于当前正在使用的两个分区，页压缩相比行压缩不会带来额外的好处。因此，增加与页压缩相关的额外 CPU 开销是没有意义的。这是因为行压缩总是对表中每个页面的每一行实施。而页压缩则是在逐页的基础上进行评估，只有那些从压缩中受益的页面才会被重建。由于我们插入该表的数据主要是数字且具有随机性，SQL\
  \ Server 已经确定我们表的页面不会从页压缩中受益。\n\n![sp_estimate_data_compression_savings 的结果](img/333037_2_En_7_Fig13_HTML.jpg)\n\
  图 7-13：`sp_estimate_data_compression_savings` 的结果\n\n**提示**\nSQL Server 2019 在 `sp_estimate_data_compression_savings`\
  \ 中引入了对列存储索引的支持。压缩类型 `COLUMNSTORE` 和 `COLUMNSTORE_ARCHIVE` 现在既可以作为源对象，也可以作为压缩类型使用。列存储压缩将在本章的“列存储压缩”一节中讨论。\n\
  \n##### 压缩表和分区\n\n我们已经确定行压缩减小了表的大小，但实施页压缩无法获得进一步的好处。因此，我们可以使用代码清单 7-12 中的命令来压缩整个表。\n\
  \n```\nALTER TABLE ExistingOrders\nREBUILD WITH (DATA_COMPRESSION = ROW) ;\n```\n\
  代码清单 7-12：对整个表实施行压缩\n\n然而，如果我们更仔细地查看结果，会发现实际上只有分区 1 受益于行压缩。分区 2 的大小保持不变。因此，压缩分区\
  \ 2 不值得其开销。运行代码清单 7-13 中的 `ALTER TABLE` 语句将仅重建分区 1。然后，它将通过使用 `DATA_COMPRESSION =\
  \ NONE` 重建整个表来移除压缩。\n\n```\n--使用 ROW 压缩压缩分区 1\nALTER TABLE ExistingOrders\nREBUILD\
  \ PARTITION = 1 WITH (DATA_COMPRESSION = ROW) ;\nGO\n--移除整个表的压缩\nALTER TABLE ExistingOrders\n\
  REBUILD WITH (DATA_COMPRESSION = NONE) ;\n```\n代码清单 7-13：对特定分区实施行压缩\n\n##### 数据压缩向导\n\
  \n数据压缩向导可以通过表的上下文菜单，依次点击 **存储 ➤ 管理压缩** 来访问。它提供了一个图形用户界面（GUI）来管理压缩。向导的主页如图 7-14 所示。在此屏幕上，你可以使用\
  \ **对所有分区使用相同压缩类型** 选项在表上统一实施一种压缩类型。或者，你可以为每个单独的分区指定不同的压缩类型。**计算** 按钮运行 `sp_estimate_data_compression_savings`\
  \ 存储过程，并显示每个分区的当前和预估结果。\n\n![数据压缩向导](img/333037_2_En_7_Fig14_HTML.jpg)\n图 7-14：数据压缩向导\n\
  \n在向导的最后一页，你可以选择立即运行该过程、将操作编写为脚本，或使用 SQL Server Agent 计划其运行。\n\n##### 维护堆上的压缩\n\n\
  当新页面被添加到堆（没有聚集索引的表）时，它们不会自动应用页压缩。这意味着重建压缩表应成为你在表没有聚集索引时的标准维护例程的一部分。要重建表上的压缩，你应该先移除压缩，然后再重新实施。\n\
  \n**提示**\n如果新堆页面是使用 `INSERT INTO...WITH (TABLOCK)` 插入的，或者作为启用了优化的大容量插入的一部分插入的，它们将会被压缩。\n\
  \n##### 维护压缩分区\n\n为了对分区使用 `SWITCH` 操作，两个分区必须选择相同的压缩级别。如果你使用 `MERGE`，则使用目标分区的压缩级别。当你使用\
  \ `SPLIT` 时，新分区从原始分区继承其压缩级别。\n\n就像非分区表一样，如果你删除表的聚集索引，则堆会继承聚集索引的压缩级别。但是，如果你是在修改分区方案的操作中删除聚集索引，则压缩会从表中移除。\n\
  \n\n### 内存优化表\n\n内存中 OLTP 是 SQL Server 的一项功能，它通过将所有表数据存储在内存中，从而提供显著的性能提升。当然，这可以极大地减少\
  \ IO，尽管这些表为了持久性也会保存到磁盘上。这是因为基于磁盘的表版本使用基于 FILESTREAM 的技术，以非结构化格式存储在数据库引擎之外。此外，内存优化的检查点操作发生得更为频繁。自从上一次自动检查点发生后，事务日志每增长\
  \ 512MB 就会进行一次自动检查点。这消除了与检查点活动相关的 IO 峰值。由于记录的数据更少，内存优化表也能减少事务日志上的 IO 争用。同样值得一提的是，只有表的变更会被记录，索引变更则不会。\n\
  \n除了最小化 IO，内存中 OLTP 还能降低 CPU 开销。这是因为可以使用本机编译存储过程来访问数据，而不是传统的、解释型的代码。本机编译存储过程使用的指令显著更少，这意味着消耗的\
  \ CPU 时间更少。然而，内存优化表无助于减少网络开销，因为仍然需要将相同数量的数据传送给客户端。\n\n就其本质而言，内存优化表会增加内存压力而非减少它，因为即使您从不使用这些数据，它仍然驻留在内存中，从而减少了传统资源可用于缓存的可用空间。这意味着内存中功能是为\
  \ OLTP 工作负载设计的，而不是数据仓库工作负载。预期是数据仓库中的事实表和维度表太大，无法驻留在内存中。\n\n除了较低的资源使用率，内存优化表还有助于减少争用。当您访问内存优化表中的数据时，SQL\
  \ Server 不会获取闩锁。这意味着闩锁和自旋锁争用会自动消除。由于一种用于实现隔离级别的新的乐观并发方法，读写事务之间的阻塞也可以减少。事务和隔离级别，包括内存优化的，将在第\
  \ 18 章中讨论。\n\n##### 持久性\n\n创建内存优化表时，您可以将持久性设置指定为 `SCHEMA_AND_DATA` 或 `SCHEMA_ONLY`。如果您选择\
  \ `SCHEMA_AND_DATA`，则表的所有数据都将持久化到磁盘，并且事务会被记录。然而，如果您选择 `SCHEMA_ONLY`，则数据不会被持久化，事务也不会被记录。这意味着在\
  \ SQL Server 服务重启后，表的结构将保持完整，但它将不包含任何数据。这对于临时过程很有用，例如 ETL 加载期间的数据暂存。\n\n#### 创建和管理内存优化表\n\
  \n> **提示**\n>\n> 乍一看，您可能很想在整个数据库中使用内存优化表。然而，它们有许多限制，事实上，您只应在例外情况下使用它们。这些限制将在本节后面讨论。\n\
  \n在创建内存优化表之前，必须已存在一个内存优化文件组。内存优化文件组在第 6 章中讨论。\n\n您可以像创建基于磁盘的表一样，使用 `CREATE TABLE\
  \ T-SQL` 语句创建内存优化表。不同之处在于，您必须指定一个 `WITH` 子句，该子句指明该表将进行内存优化。`WITH` 子句还用于指示您所需的持久性级别。\n\
  \n内存优化表还必须包含索引。我们将在第 8 章中全面讨论索引，包括内存优化表的索引，但现在您应该知道内存优化表支持以下索引类型：\n\n*   非聚集哈希索引\n\
  *   非聚集索引\n\n哈希索引组织到存储桶中，创建时必须使用 `BUCKET_COUNT` 参数指定存储桶计数。理想情况下，您的存储桶计数应该是索引键中不同值数量的两倍。您并不总是知道有多少个不同的值；在这种情况下，您可能希望显著增加\
  \ `BUCKET_COUNT`。权衡之处在于，存储桶越多，索引消耗的内存就越多。创建表后，索引大小是固定的，无法更改表或其索引。\n\n清单 7-14 中的脚本创建了一个名为\
  \ `OrdersMem` 的完全持久化内存优化表，并用数据填充它。它在 `ID` 列上创建了一个非聚集哈希索引，存储桶计数为 2,000,000，因为我们将插入\
  \ 1,000,000 行。该脚本假设内存优化文件组已经创建。\n\n```\nUSE [Chapter7]\nGO\nCREATE TABLE dbo.OrdersMem(\n\
  OrderNumber int IDENTITY(1,1) NOT NULL PRIMARY KEY NONCLUSTERED HASH\nWITH (BUCKET_COUNT=\
  \ 2000000),\nOrderDate date NOT NULL,\nCustomerID int NOT NULL,\nProductID int NOT\
  \ NULL,\nQuantity int NOT NULL,\nNetAmount money NOT NULL,\nTaxAmount money NOT\
  \ NULL,\nInvoiceAddressID int NOT NULL,\nDeliveryAddressID int NOT NULL,\nDeliveryDate\
  \ date NULL,\n)WITH (MEMORY_OPTIMIZED = ON, DURABILITY = SCHEMA_AND_DATA) ;\nDECLARE\
  \ @Numbers TABLE\n(\nNumber    INT\n)\n;WITH CTE(Number)\nAS\n(\nSELECT 1 Number\n\
  UNION ALL\nSELECT Number + 1\nFROM CTE\nWHERE Number < 100\n)\nINSERT INTO @Numbers\n\
  SELECT Number FROM CTE ;\n--Populate ExistingOrders with data\nINSERT INTO dbo.OrdersMem\n\
  SELECT\n(SELECT CAST(DATEADD(dd,(SELECT TOP 1 Number\nFROM @Numbers\nORDER BY NEWID()),getdate())as\
  \ DATE)),\n(SELECT TOP 1 Number -10 FROM @Numbers ORDER BY NEWID()),\n(SELECT TOP\
  \ 1 Number FROM @Numbers ORDER BY NEWID()),\n(SELECT TOP 1 Number FROM @Numbers\
  \ ORDER BY NEWID()),\n500,\n100,\n(SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),\n\
  (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()),\n(SELECT CAST(DATEADD(dd,(SELECT\
  \ TOP 1 Number - 10\nFROM @Numbers\nORDER BY NEWID()),getdate()) as DATE))\nFROM\
  \ @Numbers a\nCROSS JOIN @Numbers b\nCROSS JOIN @Numbers c ;\n```\n\n**清单 7-14**\
  \ 创建内存优化表\n\n#### 性能概况\n\n在内存优化表开发期间，它们被称为 `Hekaton`，这是一个文字游戏，意思是快 100 倍。那么让我们看看内存中表和基于磁盘的表在不同查询类型上的性能对比如何。清单\
  \ 7-15 中的代码创建了一个名为 `OrdersDisc` 的新表，并使用来自 `OrdersMem` 的数据填充它，以便您可以针对这两个表运行公平的测试。\n\
  \n\n#### 注意事项\n\n对于本次基准测试，测试运行在虚拟机（VM）上，配置为 2×2 核 vCPU、8GB 内存和混合式 SSHD（固态混合技术）SATA\
  \ 磁盘。\n\n```sql\nUSE [Chapter7]\nGO\nCREATE TABLE dbo.OrdersDisc(\nOrderNumber int\
  \ NOT NULL,\nOrderDate date NOT NULL,\nCustomerID int NOT NULL,\nProductID int NOT\
  \ NULL,\nQuantity int NOT NULL,\nNetAmount money NOT NULL,\nTaxAmount money NOT\
  \ NULL,\nInvoiceAddressID int NOT NULL,\nDeliveryAddressID int NOT NULL,\nDeliveryDate\
  \ date NULL,\nCONSTRAINT [PK_OrdersDisc] PRIMARY KEY CLUSTERED\n(\n[OrderNumber]\
  \ ASC,\n[OrderDate] ASC\n)\n) ;\nINSERT INTO dbo.OrdersDisc\nSELECT *\nFROM dbo.OrdersMem\
  \ ;\n```\n\n**清单 7-15** 创建基于磁盘的表并填充数据\n\n首先，我们将运行最基本的测试——对每个表执行 `SELECT *` 查询。清单\
  \ 7-16 中的脚本在清除计划缓存和缓冲区缓存后运行这些查询，以确保测试公平。\n\n```sql\nSET STATISTICS TIME ON\n--清除计划缓存\n\
  DBCC FREEPROCCACHE\n--清除缓冲区缓存\nDBCC DROPCLEANBUFFERS\n--运行基准测试\nSELECT *\nFROM dbo.OrdersMem\
  \ ;\nSELECT *\nFROM dbo.OrdersDisc ;\n```\n\n**清单 7-16** SELECT * 基准测试\n\n从图 7-15\
  \ 的结果中可以看出，内存优化表返回结果的速度刚好快了近 4.5%。\n\n#### 提示\n\n自然，您看到的结果可能会因运行脚本的系统而异。例如，如果您使用的是\
  \ SSD，那么针对基于磁盘的表的查询结果可能会更具可比性。另外请注意，此测试使用的是冷数据（不在缓冲区缓存中）。如果基于磁盘的表中的数据是温数据（在缓冲区缓存中），那么您可以预期结果会具有可比性，或者在某些情况下，针对基于磁盘的表的查询甚至可能略快一些。\n\
  \n![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig15_HTML.jpg](img/333037_2_En_7_Fig15_HTML.jpg)\n\
  \n**图 7-15** SELECT ∗ 基准测试结果\n\n在下一个测试中，我们看看如果加入聚合操作会发生什么。清单 7-17 中的脚本对每个表运行 `COUNT(*)`\
  \ 查询。\n\n```sql\nSET STATISTICS TIME ON\n--清除计划缓存\nDBCC FREEPROCCACHE\n--清除缓冲区缓存\n\
  DBCC DROPCLEANBUFFERS\n--运行基准测试\nSELECT COUNT(*)\nFROM dbo.OrdersMem ;\nSELECT COUNT(*)\n\
  FROM dbo.OrdersDisc ;\n```\n\n**清单 7-17** COUNT(*) 基准测试\n\n从图 7-16 的结果中，我们可以看到这次内存优化表的性能显著优于基于磁盘的表，相比基于磁盘的表提供了\
  \ 340% 的性能提升。\n\n![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig16_HTML.jpg](img/333037_2_En_7_Fig16_HTML.jpg)\n\
  \n**图 7-16** COUNT(∗) 基准测试结果\n\n观察在 `OrderNumber` 列上应用筛选器时，内存优化表与基于磁盘的表相比表现如何也很有趣，因为该列在两个表上都被索引覆盖。清单\
  \ 7-18 中的脚本汇总了 `NetAmount` 列的数据，但它也在 `OrderNumber` 列上进行了筛选，只考虑超过 950,000 的 `OrderNumber`。\n\
  \n```sql\nSET STATISTICS TIME ON\n--清除计划缓存\nDBCC FREEPROCCACHE\n--清除缓冲区缓存\nDBCC\
  \ DROPCLEANBUFFERS\n--运行基准测试\nSELECT SUM(NetAmount)\nFROM dbo.OrdersMem\nWHERE OrderNumber\
  \ > 950000 ;\nSELECT SUM(NetAmount)\nFROM dbo.OrdersDisc\nWHERE OrderNumber > 950000\
  \ ;\n```\n\n**清单 7-18** 主键筛选器基准测试\n\n在此情况下，由于内存优化表进行了扫描，而基于磁盘的表上的聚集索引能够执行索引查找，基于磁盘的表的执行速度大约是内存优化表的十倍。如图\
  \ 7-17 所示。\n\n![../images/333037_2_En_7_Chapter/333037_2_En_7_Fig17_HTML.jpg](img/333037_2_En_7_Fig17_HTML.jpg)\n\
  \n**图 7-17** SUM 主键筛选基准测试结果\n\n#### 注意事项\n\n如果我们实现的是非聚集索引，而不是非聚集哈希索引，那么内存优化表上最后一个查询的性能会优越得多。我们将在第\
  \ 8 章完整讨论索引的影响。\n\n#### 表内存优化顾问\n\n“表内存优化顾问”是一个向导，可针对现有的基于磁盘的表运行，它将引导您完成迁移过程。向导的第一页会检查您的表是否存在不兼容的功能，例如稀疏列和针对基于磁盘的表的外键约束。\n\
  \n下一页会提供一个警告，涉及内存优化表不支持的功能，例如分布式事务和 `TRUNCATE TABLE` 语句。\n\n向导的“迁移选项”页允许您指定表的持久性级别。勾选该框将导致表以\
  \ `DURABILITY = SCHEMA_ONLY` 创建。在此屏幕上，您还可以为正在迁移的基于磁盘的表选择一个新名称，因为显然新对象不能与现有对象共享名称。最后，您可以使用复选框指定是否要将现有表中的数据复制到新表。\n\
  \n“主键迁移”页允许您选择希望用来构成表主键的列，以及要在表上创建的索引。如果选择非聚集哈希索引，则需要指定桶计数；如果选择非聚集索引，则需要指定列和顺序。\n\
  \n向导的“摘要”屏幕提供了将执行的活动的概述。单击“迁移”按钮将开始迁移表。\n\n#### 注意\n\n尽管内存优化表与 SQL Server 功能集的兼容性在过去几个版本中已有显著改善，但仍有许多功能是内存优化表不支持的。不支持的\
  \ T-SQL 构造的完整列表可在 [`https://docs.microsoft.com/en-us/sql/relational-databases/in-memory-oltp/transact-sql-constructs-not-supported-by-in-memory-oltp?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/relational-databases/in-memory-oltp/transact-sql-constructs-not-supported-by-in-memory-oltp%253Fview%253Dsql-server-ver15)\
  \ 找到。\n\n#### 本机编译对象\n\n内存 OLTP 引入了本机编译，适用于内存优化表和存储过程。以下各节将讨论这些概念。\n\n### 原生编译表\n\
  \n当你创建一个内存优化表时，SQL Server 会使用本机代码将表编译成一个 DLL（动态链接库），并将该 DLL 加载到内存中。你可以通过运行清单 7-19\
  \ 中的查询来检查这些 DLL。该脚本检查 `dm_os_loaded_modules` DMV，然后根据 DLL 文件名中嵌入的表的 `object_id`\
  \ 与 `sys.tables` 进行联接。这使得查询能够返回表的名称。\n\n```sql\nSELECT\nm.name DLL\n,t.name TableName\n\
  ,description\nFROM sys.dm_os_loaded_modules m\nINNER JOIN sys.tables t\nON t.object_id\
  \ =\n(SELECT SUBSTRING(m.name, LEN(m.name) + 2 - CHARINDEX('_', REVERSE(m.name)),\n\
  len(m.name) - (LEN(m.name) + 2 - CHARINDEX('_', REVERSE(m.name)) + 3) ))\nWHERE\
  \ m.name like '%xtp_t_' + cast(db_id() as varchar(10)) + '%' ;\n-- 清单 7-19\n-- 查看内存优化表的\
  \ DLL\n```\n\n出于安全原因，每次 SQL Server 服务启动时，这些文件都会根据数据库元数据重新编译。这意味着如果 DLL 被篡改，所做的更改将不会持久化。此外，这些文件与\
  \ SQL Server 进程关联，以防止它们被修改。\n\n当不再需要时，SQL Server 会自动删除这些 DLL。在表被删除并随后发出检查点之后，这些\
  \ DLL 将在实例重启时，或者当数据库脱机或被删除时，从内存中卸载并从文件系统中物理删除。\n\n### 原生编译存储过程\n\n除了原生编译的内存优化表之外，SQL\
  \ Server 2019 还支持原生编译存储过程。如本章前面所述，与传统的解释型存储过程相比，这些过程可以减少 CPU 开销，并在执行时提供性能优势，因为它们所需的\
  \ CPU 周期更少。\n\n创建原生编译存储过程的语法与创建解释型存储过程的语法类似，但有一些细微的差别。首先，该过程必须以 `BEGIN ATOMIC` 子句开头。过程体必须包含且仅包含一个\
  \ `BEGIN ATOMIC` 子句。该块内的事务将在块结束时提交。该块必须以 `END` 语句终止。当你开始这个原子块时，你`必须`指定隔离级别和使用的语言。\n\
  \n你还会注意到 `WITH` 子句包含 `NATIVE_COMPILATION`、`SCHEMABINDING` 和 `EXECUTE AS` 选项。对于原生编译过程，必须指定\
  \ `SCHEMABINDING`。这可以防止它所依赖的对象被更改。你还必须指定 `EXECUTE AS` 子句，因为 `EXECUTE AS` 的默认值是 `Caller`，但这并非原生编译支持的选项。如果你希望将现有的解释型\
  \ SQL 代码迁移到原生编译过程，这一点具有重要影响，这意味着你应该在代码迁移前重新评估你的安全策略。这个选项的含义相当直观。\n\n你可以在清单 7-20\
  \ 中看到一个创建原生编译存储过程的示例。此过程可用于更新 `OrdersMem` 表。\n\n```sql\nCREATE PROCEDURE UpdateOrdersMem\n\
  WITH NATIVE_COMPILATION, SCHEMABINDING, EXECUTE AS OWNER\nAS\nBEGIN ATOMIC WITH\
  \ (TRANSACTION ISOLATION LEVEL = SNAPSHOT, LANGUAGE = 'English')\nUPDATE dbo.OrdersMem\n\
  SET DeliveryDate = DATEADD(dd,1,DeliveryDate)\nWHERE DeliveryDate < GETDATE()\n\
  END ;\n-- 清单 7-20\n-- 创建一个原生编译存储过程\n```\n\n在规划向原生编译过程的代码迁移时，你应该建议你的开发团队存在许多限制，他们将无法使用包括表变量、CTE（公用表表达式）、子查询、`WHERE`\
  \ 子句中的 `OR` 运算符以及 `UNION` 等特性。\n\n与内存优化表类似，也会为原生编译存储过程创建 DLL。清单 7-21 中修改后的脚本显示了与原生编译过程关联的\
  \ DLL 列表。\n\n```sql\nSELECT\nm.name DLL\n,o.name ProcedureName\n,description\nFROM\
  \ sys.dm_os_loaded_modules m\nINNER JOIN sys.objects o\nON o.object_id =\n(SELECT\
  \ SUBSTRING(m.name, LEN(m.name) + 2 - CHARINDEX('_', REVERSE(m.name)),\nlen(m.name)\
  \ - (LEN(m.name) + 2 - CHARINDEX('_', REVERSE(m.name)) + 3) ))\nWHERE m.name like\
  \ '%xtp_p_' + cast(db_id() as varchar(10)) + '%' ;\n-- 清单 7-21\n-- 查看原生编译过程的 DLL\n\
  ```\n\n### 总结\n\nSQL Server 提供了许多用于优化表的功能。分区允许将表拆分成更小的结构，这意味着 SQL Server 可以读取更少的页面来定位需要返回的行。此过程称为分区消除。分区还允许你通过将较旧的、访问频率较低的数据存储在廉价的存储设备上来执行存储分层。\n\
  \n`SWITCH`、`SPLIT` 和 `MERGE` 操作将帮助你为分区表实现滑动窗口。`SWITCH` 允许你将数据从其当前分区作为元数据操作移动到空分区或表中。`SPLIT`\
  \ 和 `MERGE` 允许你在分区函数中插入和删除边界点。\n\n基于行的表有两种压缩选项。这些压缩类型旨在作为性能增强，因为它们允许 SQL Server\
  \ 减少从表中读取所有所需行所需的 I/O 量。行压缩的工作原理是将数值和 Unicode 值存储在可接受值所需的最小空间中，而不是最大空间中。页面压缩实现了行压缩，并增加了前缀和字典压缩。这提供了更高的压缩比，意味着更少的\
  \ I/O，但以消耗 CPU 为代价。\n\n列存储索引有两种压缩方法。`COLUMNSTORE` 是标准压缩类型。`COLUMNSTORE_ARCHIVE`\
  \ 应仅用于不常访问的数据。\n\n内存优化表是 SQL Server 的一项功能，通过将整个表常驻内存来实现巨大的性能提升。这可以显著减少 I/O 压力。你可以将此类表与原生编译存储过程结合使用，后者通过与内存优化表的原生编译\
  \ DLL 直接交互，并减少所需的 CPU 周期（与解释型代码相比），也能提高性能。\n\n## 8. 索引和统计信息\n\n最近版本的 SQL Server\
  \ 支持多种不同类型的索引，用于增强查询性能。这些包括建立在 B 树（平衡树）结构上的传统聚集和非聚集索引，它们增强了基于磁盘的表的读取性能。还有支持复杂数据类型的索引，例如\
  \ XML、JSON 和地理空间数据类型。这些高级数据类型索引超出了本书的范围，但完整的讨论可以在 Apress 的书籍 *SQL Server Advanced\
  \ Data Types* 中找到，该书位于 [`www.apress.com/gp/book/9781484239001`](http://www.apress.com/gp/book/9781484239001)。DBA\
  \ 还可以创建列存储索引以支持数据仓库风格的查询，即在非常大的表上进行分析。SQL Server 还支持内存中索引，这些索引增强了使用内存 OLTP 存储的表的性能。本章讨论了数据库引擎内部许多可用的索引类型。\n\
  \nSQL Server 维护关于索引和表列的统计信息，通过改进基数估计来增强查询性能。这使得查询优化器能够生成高效的查询计划。本章还讨论了如何使用和维护统计信息。\n\
  \n\n### 聚集索引\n\n一个 `B 树` 是一种你可以用来组织键值的数据结构，使得用户可以比必须读取整张表快得多地搜索他们要查找的数据。它是一种基于树的结构，其中每个节点允许拥有两个以上的子节点。该树是平衡的，这意味着检索任何单行数据所需的步骤数始终相同。\n\
  \n一个 `聚集索引` 是一种 B 树结构，它使得表的数据页根据聚集索引键的逻辑顺序进行存储。聚集索引键可以是单个列，也可以是一组确保表中每行唯一性的列。该键通常是表的主键，尽管这是最典型的用法，但在某些情况下，你可能希望使用不同的列。本章稍后将更详细地讨论这一点。\n\
  \n#### 没有聚集索引的表\n\n当一张表存在但没有聚集索引时，它被称为 `堆`。一个堆由一个或多个 IAM（索引分配映射）页和一系列未链接在一起或未按顺序存储的数据页组成。SQL\
  \ Server 确定表的数据页的唯一方式是读取 IAM 页。当表作为堆存储，即没有索引时，每次访问该表，SQL Server 都必须读取表中的每一个数据页，即使你只想返回一行数据。图\
  \ 8-1 中的示意图说明了堆的结构。\n\n![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig1_HTML.jpg](img/333037_2_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1：堆结构\n\n当数据存储在堆上时，SQL Server 需要为每一行维护一个唯一标识符。它通过创建一个 RID（行标识符）来实现这一点。RID\
  \ 的格式为 `文件 ID:页 ID:槽号`，这是一个物理位置。即使一张表有非聚集索引，除非存在聚集索引，否则它仍然作为堆存储。当在堆上创建非聚集索引时，RID\
  \ 被用作指针，使得非聚集索引能够链接回基表中的正确行。\n\n#### 有聚集索引的表\n\n当你在表上创建聚集索引时，就会创建一个 B 树结构。这个 B 树基于聚集键的值，如果聚集索引不是唯一的，它还会包含一个唯一值生成器。一个\
  \ `唯一值生成器` 是一个用于在键值相同时识别行的值。这允许 SQL Server 通过创建到数据的分层指针集来执行更高效的搜索操作，如图 8-2 所示。此层次结构顶层的页面称为\
  \ `根节点`。结构的底层称为 `叶级别`，对于聚集索引，叶级别由表的实际数据页组成。根据表的大小，B 树结构可以有一个或多个中间级别。\n\n![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig2_HTML.jpg](img/333037_2_En_8_Fig2_HTML.jpg)\n\
  \n图 8-2：聚集索引结构\n\n图 8-2 显示，尽管叶级别是数据本身，但其上的级别包含指向其下方树中页面的指针。这使得 SQL Server 可以执行查找操作，这是一种返回少量行的非常高效的方法。它的工作原理是沿着\
  \ B 树向下导航，使用指针来找到所需的行。在此图中，我们可以看到，如果需要，SQL Server 仍然可以扫描所有表页面来检索所需的行——这被称为 `聚集索引扫描`。或者，SQL\
  \ Server 可能决定结合这两种方法来执行范围扫描。这里，SQL Server 查找所需范围的第一个值，然后扫描叶级别，直到遇到第一个不需要的值。SQL Server\
  \ 可以这样做，因为表是按照索引键排序的，这意味着它可以保证没有其他匹配值出现在表中更靠后的位置。\n\n#### 主键聚簇\n\n表的主键通常是聚集索引的自然选择，因为许多\
  \ OLTP 应用程序 99% 的数据访问是通过主键进行的。事实上，默认情况下，除非你另有指定，或者表上已存在聚集索引，否则创建主键会自动在该键上生成聚集索引。存在一些情况，主键不是聚集索引的正确选择。我亲身经历过的一个例子是一个第三方应用程序，它要求表的主键是一个\
  \ GUID。\n\n如果聚集索引要建立在主键上，那么在 GUID 上创建聚集索引会带来两个主要问题。第一个是大小。一个 GUID 长 16 字节。当表有非聚集索引时，聚集索引键会存储在每一个非聚集索引中。对于唯一的非聚集索引，它在叶级别为每一行存储；对于非唯一的非聚集索引，它也在索引的根级别和中间级别的每一行存储。当你将\
  \ 16 字节乘以数百万行时，这会极大地增加索引的大小，使其效率降低。\n\n第二个问题是，当 GUID 生成时，它是一个随机值。为了获得良好的性能，表中的数据按照聚集索引键的顺序存储，因此你需要此键的值按顺序生成。为聚集索引键生成随机值会导致每次插入新行时，索引变得越来越碎片化。碎片将在本章后面讨论。\n\
  \n不过，对于第二个问题有一个解决方法。SQL Server 有一个名为 `NEWSEQUENTIALID()` 的函数。此函数总是生成一个比之前在服务器上生成的值更高的\
  \ GUID 值。因此，如果你在主键的默认约束中使用此函数，就可以强制顺序插入。\n\n#### 注意\n\n服务器重启后，`NEWSEQUENTIALID()`\
  \ 可能从一个较低的值开始。这可能会导致碎片。\n\n如果主键必须是 GUID 或其他宽列（例如社会保障号），或者它必须是一组构成自然键的列（例如客户 ID、订单日期和产品\
  \ ID），那么强烈建议你在表中创建一个额外的列。你可以根据预期表中的行数，将此列设为 `INT` 或 `BIGINT`，并可以使用 `IDENTITY` 属性或\
  \ `SEQUENCE` 来为你的聚集索引创建一个窄的、顺序的键。\n\n#### 提示\n\n请记住，窄的聚集键很重要，因为它将包含在表的所有其他索引中。\n\
  \n#### 管理聚集索引\n\n你可以使用 `CREATE CLUSTERED INDEX` 语句创建聚集索引，如代码清单 8-1 所示。其他可用于创建聚集索引的方法包括：使用带有\
  \ `PRIMARY KEY` 子句的 `ALTER TABLE` 语句，以及在 `CREATE TABLE` 语句中使用 `INDEX` 子句（只要你使用的是\
  \ SQL Server 2014 或更高版本）。此脚本创建了一个名为 `Chapter8` 的数据库，然后创建了一个名为 `CIDemo` 的表。最后，它在表的\
  \ `ID` 列上创建了一个聚集索引。\n\n```sql\n-- 代码清单 8-1：创建聚集索引\nCREATE CLUSTERED INDEX IX_CIDemo_ID\
  \ ON dbo.CIDemo(ID);\n```\n\n\n\n#### 注意\n\n请记得修改文件路径以匹配您自己的配置。\n\n```sql\n--创建\
  \ Chapter8 数据库\nCREATE DATABASE Chapter8\nON  PRIMARY\n( NAME = N'Chapter8', FILENAME\
  \ =\nN'F:\\Program Files\\Microsoft SQL Server\\MSSQL15.PROSQLADMIN\\MSSQL\\DATA\\\
  Chapter8.mdf'),\nFILEGROUP [MEM] CONTAINS MEMORY_OPTIMIZED_DATA  DEFAULT\n( NAME\
  \ = N'MEM', FILENAME = N'H:\\DATA\\CH08')\nLOG ON\n( NAME = N'Chapter8_log', FILENAME\
  \ =\nN'E:\\Program Files\\Microsoft SQL Server\\MSSQL15.PROSQLADMIN\\MSSQL\\DATA\\\
  Chapter8_log.ldf') ;\nGO\nUSE Chapter8\nGO\n--创建 CIDemo 表\nCREATE TABLE dbo.CIDemo\n\
  (\nID       INT       IDENTITY,\nDummyText     VARCHAR(30)\n) ;\nGO\n--创建聚集索引\n\
  CREATE UNIQUE CLUSTERED INDEX CI_CIDemo ON dbo.CIDemo([ID]) ;\nGO\n清单 8-1\n创建聚集索引\n\
  ```\n\n当创建索引时，有许多 `WITH` 选项可以指定。这些选项在表 8-1 中概述。\n\n**表 8-1**\n**聚集索引的 WITH 选项**\n\
  \n| 选项 | 描述 |\n| --- | --- |\n| `MAXDOP` | 指定用于构建索引的核心数。每个使用的核心构建自己的索引部分。权衡之处在于，较高的\
  \ `MAXOP` 构建索引更快，但较低的 `MAXDOP` 意味着索引构建时产生的碎片更少。 |\n| `FILLFACTOR` | 指定应在索引叶子级的每个页面中保留多少可用空间。这有助于减少因插入导致的碎片，但代价是索引更宽，读取需要更多\
  \ IO。对于聚集索引，如果其键值不变且始终递增，请始终将其设置为 0，即 100% 满减去足够一行的空间。 |\n| `PAD_INDEX` | 将填充因子百分比应用于\
  \ B 树的中间级别。 |\n| `STATISTICS_NORECOMPUTE` | 打开或关闭分布统计信息的自动更新。本章后面将讨论统计信息。 |\n| `SORT_IN_TEMPDB`\
  \ | 指定索引的中间排序结果应存储在 TempDB 中。使用此选项可以将 IO 卸载到承载 TempDB 的磁盘，但代价是使用更多磁盘空间。如果 `RESUMABLE`\
  \ 为 `ON`，则此项不能为 `ON`。 |\n| `STATISTICS_INCREMENTAL` | 指定是否应按分区创建统计信息。本章后面将讨论其限制。\
  \ |\n| `DROP_EXISTING` | 用于删除并重建同名的现有索引。 |\n| `IGNORE_DUP_KEY` | 启用此选项后，尝试向唯一索引中插入重复键值的\
  \ `INSERT` 语句不会失败。而是会生成警告，只有违反唯一约束的行会失败。 |\n| `ONLINE` | 可设置为 `ON` 或 `OFF`，默认为 `OFF`。指定在索引构建或重建期间是否应对整个表和索引加锁。如果为\
  \ `ON`，则查询仍可在操作期间访问表。这以索引构建时间为代价。对于聚集索引，如果表包含 LOB 数据，则此选项不可用。* |\n| `OPTIMIZE_FOR_SEQUENTIAL_KEY`\
  \ | 优化高并发插入，其中索引键是顺序的。此功能于 SQL Server 2019 引入，专为遭受最后一页插入争用的索引设计。 |\n| `RESUMABLE`\
  \ | 可设置为 `ON` 或 `OFF`，默认为 `OFF`。指定索引创建或构建是否可以暂停和恢复，或者是否可以在失败后恢复。仅当 `ONLINE` 设置为\
  \ `ON` 时，此项才能设置为 `ON`。 |\n| `MAX_DURATION` | 以分钟为单位，指定索引重建或重新生成在暂停前将执行的最大时长。仅当 `ONLINE`\
  \ 设置为 `ON` 且 `RESUMABLE` 设置为 `ON` 时才能指定。 |\n| `ALLOW_ROW_LOCKS` | 指定在访问表时可以获取行锁。这并不意味着它们一定会被获取。\
  \ |\n| `ALLOW_PAGE_LOCKS` | 指定在访问表时可以获取页锁。这并不意味着它们一定会被获取。 |\n\n*空间数据被视为 LOB 数据。*\n\
  \n如本章前面所述，如果在表上创建主键，除非您指定了 `NONCLUSTERED` 关键字，或者已存在聚集索引，否则会自动创建一个聚集索引来覆盖主键的列。同时，请记住，有时如果主键很宽或者它不是始终递增的，您可能希望将聚集索引移动到更合适的列上。\n\
  \n为了实现这一点，您需要删除主键约束，然后使用 `NONCLUSTERED` 关键字重新创建它。这会强制 SQL Server 用唯一的非聚集索引覆盖主键。此操作完成后，您就可以在您选择的列上创建聚集索引。\n\
  \n如果您需要删除一个未覆盖主键的聚集索引，可以使用 `DROP INDEX` 语句来完成，如清单 8-2 所示，该语句删除了我们在上一个示例中创建的聚集索引。\n\
  \n```sql\nDROP INDEX CI_CIDemo ON dbo.CIDemo ;\n清单 8-2\n删除索引\n```\n\n### 非聚集索引\n\
  \n非聚集索引与聚集索引一样，基于 B 树结构。不同之处在于，非聚集索引的叶子级包含指向表数据页的指针，而不是表的数据页本身，如图 8-3 所示。这意味着一个表可以有多个非聚集索引来支持查询性能。\n\
  \n![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig3_HTML.jpg](img/333037_2_En_8_Fig3_HTML.jpg)\n\
  \n**图 8-3**\n**非聚集索引结构**\n\n与聚集索引一样，非聚集索引支持查找、扫描和范围扫描操作以查找所需数据。如果非聚集索引的索引键包含查询期间需要访问的所有列，那么您就不需要\
  \ SQL Server 访问基础表。如果访问的列仅包含在非聚集索引和聚集索引键中，这也同样成立。这是因为非聚集索引的叶子级总是包含聚集索引键。这被称为索引*覆盖查询*，将在下一节讨论。\n\
  \n如果查询需要返回未包含在非聚集索引或聚集索引键中的列，SQL Server 需要在基础表中找到匹配的行。这通过称为*键查找*的过程完成。键查找操作使用聚集索引键值或\
  \ RID（如果表没有聚集索引）从基础表访问所需的行。\n\n对于少量行来说，这可能是高效的，但如果查询返回许多行，它很快就会变得代价高昂。这意味着，如果将返回许多行，SQL\
  \ Server 可能决定忽略非聚集索引而使用聚集索引或堆的开销更低。此决策称为索引的*临界点*。临界点因表而异，但通常介于表的 0.5% 到 2% 之间。\n\
  \n\n\n#### 覆盖索引\n\n虽然将所有必需的列都包含在非聚集索引中意味着你无需从基础表中检索数据，但权衡之处在于，非聚集索引中包含过多列会导致索引变得非常宽且低效。为了取得更好的平衡，SQL\
  \ Server 为你提供了“包含列”的选项。\n\n包含列仅包含在索引的叶级，而索引键值则继续包含在 B 树的每一级。此功能可以帮助你在保持索引键尽可能窄的同时，覆盖你的查询。此概念在图\
  \ 8-4 中有说明。该图展示了索引是使用 `Balance` 作为索引键构建的，但 `FirstName` 和 `LastName` 列也被包含在叶级。你可以看到\
  \ `CustomerID` 也被包含在所有级中；这是因为 `CustomerID` 是聚集索引键。由于聚集索引键包含在所有级中，这意味着该索引不是唯一的。如果它是唯一的，那么聚集键只包含在\
  \ B 树的叶级。这意味着唯一的非聚集索引总是比其非唯一等效索引更窄。此索引非常适合于在 `WHERE` 子句中过滤 `Balance` 并返回 `FirstName`\
  \ 和 `LastName` 列的查询。它也覆盖那些在结果中返回 `CustomerID` 的查询。\n\n#### 提示\n\n如果聚集索引和非聚集索引都是非唯一的，则非聚集\
  \ B 树的每一级都包括聚集唯一标识符以及聚集键。\n\n![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig4_HTML.jpg](img/333037_2_En_8_Fig4_HTML.jpg)\n\
  *图 8-4：包含列的非聚集索引*\n\n你也可以使用图 8-4 所示的索引来覆盖那些在 `WHERE` 子句中过滤 `FirstName` 或 `LastName`\
  \ 的查询，前提是不返回表中的其他列。然而，为了处理查询，SQL Server 需要执行索引扫描，而不是索引查找或范围扫描，这当然效率较低。\n\n#### 管理非聚集索引\n\
  \n你可以使用 `CREATE NONCLUSTERED INDEX` T-SQL 语句创建非聚集索引。代码清单 8-3 中的脚本在 `Chapter8` 数据库中创建了一个名为\
  \ `Customers` 的表和一个名为 `Orders` 的表。然后，它在 `CustomerID` 列上创建了一个外键约束。最后，在 `Customers`\
  \ 表的 `Balance` 列上创建了一个非聚集索引。聚集索引会自动在每个表的主键列上创建。\n\n```sql\nUSE Chapter8\nGO\n--Create\
  \ and populate numbers table\nDECLARE @Numbers TABLE\n(\nNumber    INT\n)\n;WITH\
  \ CTE(Number)\nAS\n(\nSELECT 1 Number\nUNION ALL\nSELECT Number + 1\nFROM CTE\n\
  WHERE Number < 100\n)\nINSERT INTO @Numbers\nSELECT Number FROM CTE ;\n--Create\
  \ and populate name pieces\nDECLARE @Names TABLE\n(\nFirstName    VARCHAR(30),\n\
  LastName     VARCHAR(30)\n) ;\nINSERT INTO @Names\nVALUES('Peter', 'Carter'),\n\
  ('Michael', 'Smith'),\n('Danielle', 'Mead'),\n('Reuben', 'Roberts'),\n('Iris', 'Jones'),\n\
  ('Sylvia', 'Davies'),\n('Finola', 'Wright'),\n('Edward', 'James'),\n('Marie', 'Andrews'),\n\
  ('Jennifer', 'Abraham') ;\n--Create and populate Customers table\nCREATE TABLE dbo.CustomersDisk\n\
  (\nCustomerID         INT          NOT NULL    IDENTITY    PRIMARY KEY,\nFirstName\
  \          VARCHAR(30)  NOT NULL,\nLastName           VARCHAR(30)  NOT NULL,\nBillingAddressID\
  \   INT          NOT NULL,\nDeliveryAddressID  INT          NOT NULL,\nCreditLimit\
  \        MONEY        NOT NULL,\nBalance            MONEY        NOT NULL\n) ;\n\
  SELECT * INTO #CustomersDisk\nFROM\n(SELECT\n(SELECT TOP 1 FirstName FROM @Names\
  \ ORDER BY NEWID()) FirstName,\n(SELECT TOP 1 LastName FROM @Names ORDER BY NEWID())\
  \ LastName,\n(SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID()) BillingAddressID,\n\
  (SELECT TOP 1 Number FROM @Numbers ORDER BY NEWID())  DeliveryAddressID,\n(SELECT\
  \ TOP 1\nCAST(RAND() * Number AS INT) * 10000\nFROM @Numbers\nORDER BY NEWID())\
  \ CreditLimit,\n(SELECT TOP 1\nCAST(RAND() * Number AS INT) * 9000\nFROM @Numbers\n\
  ORDER BY NEWID()) Balance\nFROM @Numbers a\nCROSS JOIN @Numbers b\n) a ;\nINSERT\
  \ INTO dbo.CustomersDisk\nSELECT * FROM #CustomersDisk ;\nGO\n--Create Numbers table\n\
  DECLARE @Numbers TABLE\n(\nNumber    INT\n)\n;WITH CTE(Number)\nAS\n(\nSELECT 1\
  \ Number\nUNION ALL\nSELECT Number + 1\nFROM CTE\nWHERE Number < 100\n)\nINSERT\
  \ INTO @Numbers\nSELECT Number FROM CTE ;\n--Create the Orders table\nCREATE TABLE\
  \ dbo.OrdersDisk\n(\nOrderNumber     INT      NOT NULL    IDENTITY    PRIMARY KEY,\n\
  OrderDate       DATE     NOT NULL,\nCustomerID      INT      NOT NULL,\nProductID\
  \       INT      NOT NULL,\nQuantity        INT      NOT NULL,\nNetAmount      \
  \ MONEY    NOT NULL,\nDeliveryDate    DATE        NULL\n)  ON [PRIMARY] ;\n--Populate\
  \ Orders with data\nSELECT * INTO #OrdersDisk\nFROM\n(SELECT\n(SELECT CAST(DATEADD(dd,(SELECT\
  \ TOP 1 Number\nFROM @Numbers\nORDER BY NEWID()),GETDATE())as DATE)) OrderDate,\n\
  (SELECT TOP 1 CustomerID FROM CustomersDisk ORDER BY NEWID()) CustomerID,\n(SELECT\
  \ TOP 1 Number FROM @Numbers ORDER BY NEWID()) ProductID,\n(SELECT TOP 1 Number\
  \ FROM @Numbers ORDER BY NEWID()) Quantity,\n(SELECT TOP 1 CAST(RAND() * Number\
  \ AS INT) +10 * 100\nFROM @Numbers\nORDER BY NEWID()) NetAmount,\n(SELECT CAST(DATEADD(dd,(SELECT\
  \ TOP 1 Number - 10\nFROM @Numbers\nORDER BY NEWID()),GETDATE()) as DATE)) DeliveryDate\n\
  FROM @Numbers a\nCROSS JOIN @Numbers b\nCROSS JOIN @Numbers c\n) a ;\nINSERT INTO\
  \ OrdersDisk\nSELECT * FROM #OrdersDisk ;\n--Clean-up Temp Tables\nDROP TABLE #CustomersDisk\
  \ ;\nDROP TABLE #OrdersDisk ;\n--Add foreign key on CustomerID\nALTER TABLE dbo.OrdersDisk\
  \ ADD CONSTRAINT\nFK_OrdersDisk_CustomersDisk FOREIGN KEY\n(\nCustomerID\n) REFERENCES\
  \ dbo.CustomersDisk\n(\nCustomerID\n) ON UPDATE  NO ACTION\nON DELETE  NO ACTION\
  \ ;\n--Create a nonclustered index on Balance\nCREATE NONCLUSTERED INDEX NCI_Balance\
  \ ON dbo.CustomersDisk(Balance) ;\n```\n*代码清单 8-3：创建表，然后添加非聚集索引*\n\n我们可以通过使用 `CREATE\
  \ NONCLUSTERED INDEX` 语句并指定 `DROP_EXISTING` 选项，来更改 `NCI_Balance` 索引的定义以包含 `FirstName`\
  \ 和 `LastName` 列，如代码清单 8-4 所示。\n\n```sql\nCREATE NONCLUSTERED INDEX NCI_Balance\
  \ ON dbo.CustomersDisk(Balance)\nINCLUDE(LastName, FirstName)\nWITH(DROP_EXISTING\
  \ = ON) ;\n```\n*代码清单 8-4：修改索引以包含列*\n\n你可以像本章前面删除聚集索引那样删除该索引——使用 `DROP INDEX` 语句。在这种情况下，完整的语句是\
  \ `DROP INDEX NCI_Balance ON dbo.CustomersDisk`。\n\n\n\n#### 筛选索引\n\n筛选索引是建立在表中存储的数据子集上的索引，而不是建立在表的全部数据上。因为索引更小，它们可以带来查询性能的提升和存储成本的降低。它们还可能减少对\
  \ DML 操作的开销，因为只有当 DML 操作影响到索引内的数据时，才需要更新索引。例如，如果一个索引筛选条件为 `OrderDate >= '2019-01-01'\
  \ AND OrderDate <= '2019-12-31'`，随后更新了表中所有 `OrderDate >= '2020-01-01'` 的行，那么该更新操作的性能将与索引不存在时相同。\n\
  \n筛选索引是通过在创建索引时使用 `WHERE` 子句来构建的。在 `WHERE` 子句中可以进行许多操作，例如筛选 `NULL` 或 `NOT NULL`\
  \ 值；使用等于和不等于运算符，如 `=`、`>`、`<` 和 `IN`；以及使用逻辑运算符，如 `AND` 和 `OR`。然而，也存在一些限制。例如，不能使用\
  \ `BETWEEN`、`CASE` 或 `NOT IN`。此外，只能使用简单的谓词；例如，禁止使用日期/时间函数，因此无法创建滚动筛选器。也不能将列与其他列进行比较。\n\
  \n清单 8-5 中的语句在 `DeliveryDate` 列上创建了一个筛选索引，条件为值是 `NULL`。这允许你对运行以确定哪些订单尚未安排交付的查询进行性能优化。\n\
  \n```\nCREATE NONCLUSTERED INDEX NonDeliveredItems ON dbo.OrdersDisk(DeliveryDate)\n\
  WHERE DeliveryDate IS NULL ;\nListing 8-5\n创建筛选索引\n```\n\n#### 专业应用的索引\n\n除了传统的\
  \ B 树索引外，SQL Server 还提供了几种特殊类型的索引，以帮助提升针对内存优化表的查询性能，以及有助于数据仓库场景查询性能的列存储索引。以下各节将讨论这些特殊索引。虽然超出了本书的范围，但\
  \ SQL Server 还为地理空间数据、XML 和 JSON 提供了特殊索引。\n\n#### 列存储索引\n\n正如你所见，传统的索引在数据页上存储数据行。这被称为\
  \ `行存储`。SQL Server 还支持 `列存储` 索引。这些索引将数据翻转过来，使用一个页来存储一个列，而不是一组行。这在图 8-5 中进行了说明。\n\
  \n![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig5_HTML.jpg](img/333037_2_En_8_Fig5_HTML.jpg)\n\
  \n图 8-5\n列存储索引结构\n\n列存储索引将表中的行切片成每个 102,400 到 1,048,576 行之间的块。每个切片称为一个 `行组`。每个行组中的数据随后被按列拆分，并使用\
  \ VertiPaq 技术进行压缩。行组内的每个列称为一个 `列段`。\n\n在适当的应用场景下，列存储索引相对于传统索引提供了若干优势。首先，由于它们是高度压缩的，可以提高\
  \ IO 效率并减少内存开销。它们能够实现如此高的压缩率，是因为单列内的数据在行与行之间通常非常相似。此外，因为查询能够仅检索其所需列的数据页，IO 可以再次减少。这甚至得到了进一步的帮助，因为每个列段都包含一个带有段内数据元数据的标头。这意味着\
  \ SQL Server 可以仅访问其需要的段，而不是整个列。为了支持列存储索引，还引入了一种新的查询执行机制。它被称为批处理执行模式，允许以 1000 行为一块处理数据，而不是逐行处理。这意味着\
  \ CPU 使用率要高效得多。然而，列存储索引并非万能药，它们的设计目标是优化针对超大型表执行只读操作的数据仓库型查询。OLTP 型查询不太可能看到任何益处，在某些情况下，执行速度甚至可能更慢。SQL\
  \ Server 同时支持聚集和非聚集列存储索引，这些将在以下各节中讨论。\n\n\n#### 列存储索引\n\n##### 聚集列存储索引\n\n聚集列存储索引将整个表以列存储格式存储。对于具有聚集列存储索引的表，没有传统的行存储；但是，新插入到表中的行可能会暂时放置在一个称为*deltastore*的行存储表中。这是为了防止列存储索引碎片化并增强\
  \ DML 操作的性能。图 8-6 中的图示说明了这一点。\n\n![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig6_HTML.jpg](img/333037_2_En_8_Fig6_HTML.jpg)\n\
  \n图 8-6\n\n具有增量存储的聚集列存储索引\n\n该图显示，当数据插入到聚集列存储索引时，SQL Server 会评估行数。如果行数足够多以达到良好的压缩率，SQL\
  \ Server 会将它们视为一个或多个行组，并立即压缩它们并将其添加到列存储索引中。然而，如果行数太少，SQL Server 会将它们插入到内部的增量存储结构中。当您对表运行查询时，数据库引擎会无缝地连接这些结构并将结果作为一个整体返回。一旦有足够的行，增量存储就会被标记为关闭，一个称为*元组移动器*的后台进程会将这些行压缩到列存储索引的一个行组中。\n\
  \n每个聚集列存储索引可以有多个增量存储。这是因为当 SQL Server 确定插入操作需要使用增量存储时，它会尝试访问现有的增量存储。然而，如果所有现有的增量存储都被锁定，那么就会创建一个新的，而不是强制查询等待锁释放。\n\
  \n在聚集列存储索引中删除行时，该行仅被逻辑删除。数据在物理上仍保留在行组中，直到下次重建索引。SQL Server 维护一个指向已删除行的 B 树结构，以便轻松识别它们。如果被删除的行位于增量存储中而不是索引本身，则会被立即物理和逻辑删除。当您在聚集列存储索引中更新一行时，SQL\
  \ Server 会将该行标记为逻辑删除，并在增量存储中插入一个包含该行新值的新行。\n\n您可以使用 `CREATE CLUSTERED COLUMNSTORE\
  \ INDEX` 语句创建聚集列存储索引。清单 8-6 中的脚本将 `OrdersDisk` 表的内容复制到一个名为 `OrdersColumnstore` 的新表中，然后在该表上创建聚集列存储索引。创建索引时，您无需指定键列；这是因为所有列都被添加到列存储索引内的列段中。然后，您的查询可以使用该索引在需要满足查询的任何列上进行搜索。聚集列存储索引是表上唯一的索引。您无法创建传统的非聚集索引或非聚集列存储索引。此外，表不能有主键、外键或唯一约束。\n\
  \n```sql\nSELECT * INTO dbo.OrdersColumnstore\nFROM dbo.OrdersDisk ;\nGO\nCREATE\
  \ CLUSTERED COLUMNSTORE INDEX CCI_OrdersColumnstore ON dbo.OrdersColumnstore ;\n\
  清单 8-6\n创建聚集列存储索引\n```\n\n使用列存储索引时，并非所有数据类型都受支持。无法在包含以下数据类型的表上创建聚集列存储索引：\n\n*  \
  \ `TEXT`\n*   `NTEXT`\n*   `IMAGE`\n*   `VARCHAR(MAX)`\n*   `NVARCHAR(MAX)`\n* \
  \  `ROWVERSION`\n*   `SQL_VARIANT`\n*   `HIERARCHYID`\n*   `GEOGRAPHY`\n*   `GEOMETRY`\n\
  *   `XML`\n\n##### 非聚集列存储索引\n\n非聚集列存储索引不可更新。这意味着如果您在表上创建了非聚集列存储索引，该表将变为只读。更新或删除该表中数据的唯一方法是先删除或禁用列存储索引，然后在\
  \ DML 过程完成后重新创建它。要向具有非聚集列存储索引的表中插入数据，您必须首先删除或禁用列存储索引，或者使用分区切换来导入数据。分区切换在第 7 章中讨论。\n\
  \n当表支持多种工作负载时，使用非聚集列存储索引代替聚集列存储索引是合适的。在此场景中，非聚集列存储索引支持实时分析，而 OLTP 风格的查询可以利用传统的聚集索引。\n\
  \n清单 8-7 中的语句在 `CustomersDisk` 表的 `FirstName`、`LastName`、`Balance` 和 `CustomerID`\
  \ 列上创建了一个非聚集列存储索引。从创建此索引可以看出，与聚集列存储索引不同，非聚集列存储索引可以与传统索引共存，并且在本例中，我们甚至覆盖了一些相同的列。\n\
  \n```sql\nCREATE NONCLUSTERED COLUMNSTORE INDEX NCCI_FirstName_LastName_Balance_CustomerID\n\
  ON dbo.CustomersDisk(FirstName,LastName,Balance,CustomerID) ;\n清单 8-7\n创建非聚集列存储索引\n\
  ```\n\n### 内存优化索引\n\n正如我们在第 7 章中看到的，SQL Server 为内存优化表提供了两种索引类型：非聚集索引和非聚集哈希索引。每个内存优化表必须至少有一个索引，并且最多可以支持八个。所有内存优化索引都覆盖表中的所有列，因为它们使用内存指针链接到数据行。\n\
  \n内存优化表上的索引必须在 `CREATE TABLE` 语句中创建。没有用于内存优化索引的 `CREATE INDEX` 语句。基于内存优化表构建的索引始终仅存储在内存中，并且无论表的持久性设置如何，都永远不会持久化到磁盘。然后，它们会在实例从表的底层数据重新启动后重新创建。您无需担心内存优化索引的碎片，因为它们从不具有基于磁盘的结构。\n\
  \n#### 内存中非聚集哈希索引\n\n一个非聚集哈希索引由一组存储桶构成。对每个索引键运行一个哈希函数，然后将哈希后的键值放入存储桶中。所使用的哈希算法是确定性的，这意味着具有相同值的索引键总是具有相同的哈希值。这一点很重要，因为重复的哈希值总是会被放入同一个哈希存储桶中。当许多键位于同一个哈希存储桶中时，索引的性能可能会下降，因为需要扫描整个重复项链才能找到正确的键。因此，如果您在一个包含大量重复键的非唯一列上构建哈希索引，则应使用大得多的存储桶数量来创建索引。这个数量应该是唯一键值数量的\
  \ 20 到 100 倍，而不是通常为唯一索引推荐的唯一键数量的 2 倍。或者，在非唯一列上使用非聚集索引可能是一个更好的解决方案。哈希函数具有确定性的第二个后果是，同一行的不同版本总是存储在同一个哈希存储桶中。\n\
  \n即使是在唯一索引的情况下，即只存在一个当前行版本，哈希值在存储桶中的分布也不是均匀的。如果存储桶的数量等于唯一键值的数量，那么大约三分之一的存储桶是空的，三分之一包含一个值，三分之一包含多个值。当多个值共享一个存储桶时，这被称为`哈希冲突`，大量的`哈希冲突`会导致性能下降。因此，对于唯一索引，建议将存储桶数量设置为表中预期唯一值数量的两倍。\n\
  \n#### 提示\n\n当您有一个唯一的非聚集哈希索引时，在某些情况下，许多唯一值可能会哈希到同一个存储桶。如果您遇到这种情况，那么增加存储桶数量会有所帮助，这与处理非唯一索引的方式相同。\n\
  \n例如，如果您的表有 100 万行，并且索引列是唯一的，则最优的存储桶数量（称为`BUCKET_COUNT`）是 200 万。但是，如果您知道您的表预计将增长到\
  \ 200 万行，那么创建 400 万个哈希存储桶可能是明智之举。这个数量的存储桶足够低，不会对内存产生影响。同时，它也允许预期的行数增长，而不会因为存储桶太少而损害性能。索引值和哈希存储桶之间潜在映射关系的示意图如图\
  \ 8-7 所示。\n\n#### 提示\n\n非聚集哈希索引使用的内存量始终保持静态，因为存储桶的数量不会改变。\n\n![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig7_HTML.jpg](img/333037_2_En_8_Fig7_HTML.jpg)\n\
  \n图 8-7\n\n到非聚集哈希索引的映射\n\n哈希索引针对带有`=`谓词的查找操作进行了优化。然而，对于查找操作，谓词评估中必须存在完整的索引键。如果不存在，则需要进行完整的索引扫描。如果使用了诸如`<`或`>`之类的不等式谓词，也需要进行索引扫描。此外，由于索引是无序的，索引无法按照索引键的排序顺序返回数据。\n\
  \n#### 注意\n\n您可能还记得，在第 7 章中，我们观察到基于磁盘的表的性能优于内存优化表。这可以通过我们在查询中使用了`>`谓词来解释；这意味着尽管基于磁盘的索引能够执行索引查找，但我们的内存优化哈希索引却必须执行索引扫描。\n\
  \n现在，让我们使用清单 8-8 中的脚本，创建一个`OrdersDisk`表的内存优化版本，该版本包含在`OrderID`列上的非聚集哈希索引。最初，该表有\
  \ 100 万行，但我们预计这个数字会增长到 200 万，因此我们使用 400 万作为`BUCKET_COUNT`。\n\n```\nCREATE TABLE\
  \ dbo.OrdersMemHash\n(\n    OrderNumber    INT    NOT NULL    IDENTITY    PRIMARY\
  \ KEY\n        NONCLUSTERED HASH WITH(BUCKET_COUNT = 4000000),\n    OrderDate  \
  \    DATE    NOT NULL,\n    CustomerID     INT     NOT NULL,\n    ProductID    \
  \  INT     NOT NULL,\n    Quantity       INT     NOT NULL,\n    NetAmount      MONEY\
  \   NOT NULL,\n    DeliveryDate   DATE    NULL,\n) WITH(MEMORY_OPTIMIZED = ON, DURABILITY\
  \ = SCHEMA_AND_DATA) ;\n\nINSERT INTO dbo.OrdersMemHash(OrderDate,CustomerID,ProductID,Quantity,NetAmount,DeliveryDate)\n\
  SELECT OrderDate\n      ,CustomerID\n      ,ProductID\n      ,Quantity\n      ,NetAmount\n\
  \      ,DeliveryDate\nFROM dbo.OrdersDisk ;\n```\n清单 8-8\n创建带有非聚集哈希索引的表\n\n如果我们现在希望向表中添加一个额外的索引，我们需要先删除再重新创建它。然而，表中已有数据，因此我们首先需要创建一个临时表并将数据复制进去，然后才能删除并重新创建内存优化表。清单\
  \ 8-9 中的脚本向`OrderDate`列添加了一个非聚集索引。\n\n```\n--创建并填充临时表\nSELECT * INTO #OrdersMemHash\n\
  FROM dbo.OrdersMemHash ;\n\n--删除现有表\nDROP TABLE dbo.OrdersMemHash ;\n\n--使用新索引重新创建表\n\
  CREATE TABLE dbo.OrdersMemHash\n(\n    OrderNumber     INT     NOT NULL    IDENTITY\
  \    PRIMARY KEY\n        NONCLUSTERED HASH WITH(BUCKET_COUNT = 4000000),\n    OrderDate\
  \       DATE    NOT NULL     INDEX NCI_OrderDate NONCLUSTERED,\n    CustomerID \
  \     INT     NOT NULL,\n    ProductID       INT     NOT NULL,\n    Quantity   \
  \     INT     NOT NULL,\n    NetAmount       MONEY   NOT NULL,\n    DeliveryDate\
  \    DATE    NULL,\n) WITH(MEMORY_OPTIMIZED = ON, DURABILITY = SCHEMA_AND_DATA)\
  \ ;\nGO\n\n--允许向标识列插入值\nSET IDENTITY_INSERT OrdersMemHash ON ;\nGO\n\n--重新填充表\n\
  INSERT INTO\ndbo.OrdersMemHash(OrderNumber,OrderDate,CustomerID,ProductID,Quantity,NetAmount,DeliveryDate)\n\
  SELECT *\nFROM #OrdersMemHash ;\n\n--停止向标识列插入并清理临时表\nSET IDENTITY_INSERT OrdersMemHash\
  \ OFF ;\n\nDROP TABLE #OrdersMemHash ;\n```\n清单 8-9\n向内存优化表添加索引\n\n我们可以通过查询`sys.dm_db_xtp_hash_index_stats`\
  \ DMV 来检查哈希索引中的值分布。清单 8-10 中的查询演示了如何使用此 DMV 查看哈希冲突数并计算空存储桶的百分比。\n\n```\nSELECT\n\
  \    OBJECT_SCHEMA_NAME(HIS.OBJECT_ID) + '.' + OBJECT_NAME(HIS.OBJECT_ID) '表名',\n\
  \    I.name as '索引名',\n    HIS.total_bucket_count,\n    HIS.empty_bucket_count,\n\
  \    FLOOR((CAST(empty_bucket_count AS FLOAT)/total_bucket_count) * 100) '空存储桶百分比',\n\
  \    total_bucket_count - empty_bucket_count '已使用存储桶数',\n    HIS.avg_chain_length,\n\
  \    HIS.max_chain_length\nFROM sys.dm_db_xtp_hash_index_stats AS HIS\nINNER JOIN\
  \ sys.indexes AS I\n    ON HIS.object_id = I.object_id\n    AND HIS.index_id = I.index_id\
  \ ;\n```\n清单 8-10\n`sys.dm_db_xtp_hash_index_stats`\n\n\n##### 从结果看索引性能\n\n从图 8-8\
  \ 的结果可以看出，对于我们的哈希索引，78%的桶是空的。这个比例之所以这么高，是因为我们考虑到了表的增长而指定了一个较大的`BUCKET_COUNT`。如果这个比例低于\
  \ 33%，我们就会希望指定更高的桶数以避免哈希冲突。我们还可以看到，平均链长度为 1，最大链长度为 5。这是健康的。如果平均链计数增加，性能就会开始下降，因为\
  \ SQL Server 必须扫描多个值才能找到正确的键。如果平均链长度达到 10 或更高，则意味着键不是唯一的，并且键中有太多重复值，使得哈希索引不可行。此时，我们应该删除并重新创建表，为索引指定更高的桶数，或者理想情况下，考虑改用非聚集索引。\n\
  \n![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig8_HTML.jpg](img/333037_2_En_8_Fig8_HTML.jpg)\n\
  \n**图 8-8**\n\n`sys.dm_db_xtp_hash_index_stats`结果\n\n#### 内存中非聚集索引\n\n内存中的非聚集索引具有与基于磁盘的非聚集索引类似的结构，称为\
  \ *bw-tree*。这种结构使用页面映射表而不是指针，并使用“小于”而不是“大于”进行遍历（基于磁盘的索引使用“大于”）。索引的叶级别是一个单向链表。在查询使用不等式谓词（如`BETWEEN`、`>`或`<`）时，非聚集索引比非聚集哈希索引性能更好。在使用`=`谓词但不是键中的所有列都用于筛选时，内存中的非聚集索引也比非聚集哈希索引性能更好。非聚集索引也可以按照索引键的排序顺序返回数据。然而，与基于磁盘的索引不同，这些索引无法按照索引键的逆序返回结果。\n\
  \n### 维护索引\n\n索引创建后，DBA 的工作并未完成。索引需要持续维护。以下部分讨论索引维护的注意事项。\n\n#### 缺失索引\n\n当您运行查询时，数据库引擎会跟踪其在构建计划时希望使用的任何索引，以帮助提高查询性能。当您在\
  \ SSMS 中查看执行计划时，它会提供关于缺失索引的建议，但这些数据也可以通过 DMV 稍后获得。\n\n> **提示**\n> 由于建议是基于单个计划的，您应该审查它们，而不是盲目地实施。\n\
  \n为了演示此功能，我们可以执行清单 8-11 中的查询，并选择包含实际的执行计划。\n\n> **提示**\n> 您可以通过查看估计的查询计划来查看缺失索引信息。\n\
  \n```sql\nSELECT SUM(c.creditlimit) TotalExposure, SUM(o.netamount) 'TotalOrdersValue'\n\
  FROM dbo.CustomersDisk c\nINNER JOIN dbo.OrdersDisk o\nON c.CustomerID = o.CustomerID\
  \ ;\n```\n\n**清单 8-11 生成缺失索引详情**\n\n运行此查询后，我们可以检查执行计划，看看它告诉我们什么。此查询的执行计划如图 8-9 所示。\n\
  \n![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig9_HTML.jpg](img/333037_2_En_8_Fig9_HTML.jpg)\n\
  \n**图 8-9 显示缺失索引的执行计划**\n\n在图 8-9 的执行计划顶部，您可以看到 SQL Server 建议我们在`OrdersDisk`表的`CustomerID`列上创建一个索引，并在叶级别包含`NetAmount`列。我们还被告知，这应该能为查询提供\
  \ 75%的性能提升。\n\n如前所述，SQL Server 也通过 DMV 提供此信息。`sys.dm_db_missing_index_details` DMV\
  \ 通过中间 DMV `sys.dm_db_missing_index_groups`连接到`sys.dm_db_missing_index_group_stats`，以避免多对多关系。清单\
  \ 8-12 中的脚本演示了我们如何使用这些 DMV 来返回有关缺失索引的详细信息。\n\n```sql\nSELECT\n    mid.statement\
  \ TableName\n    ,ISNULL(mid.equality_columns, '')\n        + ','\n        + ISNULL(mid.inequality_columns,\
  \ '') IndexKeyColumns\n    ,mid.included_columns\n    ,migs.unique_compiles\n  \
  \  ,migs.user_seeks\n    ,migs.user_scans\n    ,migs.avg_total_user_cost\n    ,migs.avg_user_impact\n\
  FROM sys.dm_db_missing_index_details mid\nINNER JOIN sys.dm_db_missing_index_groups\
  \ mig\n    ON mid.index_handle = mig.index_handle\nINNER JOIN sys.dm_db_missing_index_group_stats\
  \ migs\n    ON mig.index_group_handle = migs.group_handle ;\n```\n\n**清单 8-12 缺失索引\
  \ DMV**\n\n此查询的结果如图 8-10 所示。它们显示了以下信息：具有缺失索引的表的名称；SQL Server 建议应构成索引键的列；SQL Server\
  \ 建议应添加为 B 树叶级别包含列的列；本应从索引中受益的查询已被编译的次数；如果索引存在，本应对索引执行的查找次数；如果索引存在，本应对索引执行的扫描次数；使用索引本可节省的平均成本；以及使用索引本可节省的平均成本百分比。在我们的例子中，我们可以看到，如果我们在运行查询时索引已经存在，查询的成本本可以降低\
  \ 95%。\n\n![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig10_HTML.jpg](img/333037_2_En_8_Fig10_HTML.jpg)\n\
  \n**图 8-10 缺失索引结果**\n\n\n#### 索引碎片化\n\n基于磁盘的索引会产生碎片化。B 树中可能发生两种形式的碎片化：内部碎片化和外部碎片化。\n\
  \n`内部碎片化` 指的是页面拥有大量空闲空间。如果页面存在大量空闲空间，那么 SQL Server 就需要读取比实际返回查询所需全部行更多的页数。\n\n`外部碎片化`\
  \ 指的是索引的页面在物理顺序上变得不连续。这会降低性能，因为数据无法从磁盘上被顺序读取。\n\n例如，假设你有一个包含 100 万行数据的表，并且当数据页 100%\
  \ 满时，所有这些数据行正好能放入 5000 个页中。这意味着 SQL Server 只需读取略多于 39MB 的数据就能扫描整个表（`8KB * 5000`）。然而，如果表的页只有\
  \ 50% 被填满，这就会使使用的页数增加到 10,000 个，同时也使需要读取的数据量增加到 78MB。这就是内部碎片化。\n\n当执行 `DELETE` 语句以及发生\
  \ `DML` 语句（例如插入一个非递增的键值）时，内部碎片化可能会自然发生。这是因为 SQL Server 可能会通过执行页拆分来响应这种情况。页拆分会创建一个新页，将现有页中一半的数据移动到新页，并将另一半留在现有页上，从而在两个页上都创建出\
  \ 50% 的空闲空间。然而，它们也可能由于误用 `FILLFACTOR` 和 `PAD_INDEX` 设置而人为产生。\n\n`FILLFACTOR` 控制在创建或重建索引时，其每个叶级页上保留多少空闲空间。默认情况下，`FILLFACTOR`\
  \ 设置为 `0`，这意味着它在页面上恰好为一行留出足够的空间。然而，在某些情况下，当由于 DML 操作导致大量页拆分发生时，数据库管理员可以通过调整 `FILLFACTOR`\
  \ 来减少碎片化。例如，设置 `FILLFACTOR` 为 `80` 会在页面上留下 20% 的空闲空间，这意味着新行可以被添加到该页面而无需发生页拆分。然而，许多\
  \ DBA 在并非必需的情况下也更改了 `FILLFACTOR`，这会在索引构建完成后立即自动导致内部碎片化。`PAD_INDEX` 只能在使用 `FILLFACTOR`\
  \ 时应用，它将相同百分比的空闲空间应用于 B 树的中间级别。\n\n外部碎片化同样由页拆分引起，它指的是按索引键排序的页面的逻辑顺序与磁盘上页面的物理顺序相比不连续。外部碎片化使得\
  \ SQL Server 较少能够使用顺序读取来执行扫描操作，因为磁头需要在磁盘上来回移动以定位文件中的页面。\n\n#### 注意\n\n这与文件系统级别的碎片化不同，后者是指一个数据文件可能被分散存储在多个无序的磁盘扇区中。\n\
  \n##### 检测碎片化\n\n你可以使用 `sys.dm_db_index_physical_stats` DMF 来识别索引的碎片化。此函数接受表 8-2\
  \ 中列出的参数。\n\n表 8-2\nsys.dm_db_index_physical_stats 参数\n\n| 参数 | 描述 |\n| --- | ---\
  \ |\n| `Database_ID` | 你想要对其运行此函数的数据库 ID。如果你不知道它，可以传入 `DB_ID('MyDatabase')`，其中 `MyDatabase`\
  \ 是你的数据库名称。 |\n| `Object_ID` | 你想要对其运行此函数的表的对象 ID。如果你不知道它，传入 `OBJECT_ID('MyTable')`，其中\
  \ `MyTable` 是你的表名。传入 `NULL` 则对数据库中的所有表运行此函数。 |\n| `Index_ID` | 你想要对其运行此函数的索引的索引\
  \ ID。对于聚集索引，此值始终为 `1`。传入 `NULL` 则对表上的所有索引运行此函数。 |\n| `Partition_Number` | 你想要对其运行此函数的分区\
  \ ID。如果你想对所有分区运行此函数或该表未分区，则传入 `NULL`。 |\n| `Mode` | 选择 `LIMITED`、`SAMPLED` 或 `DETAILED`。`LIMITED`\
  \ 仅扫描索引的非叶级。`SAMPLED` 扫描表中 1% 的页，除非该表的页数少于或等于 10,000 个，在这种情况下将使用 `DETAILED` 模式。`DETAILED`\
  \ 模式扫描表中 100% 的页。对于非常大的表，由于 `DETAILED` 模式返回数据所需的时间可能很长，通常更倾向于使用 `SAMPLED`。 |\n\n\
  清单 8-13 展示了如何使用 `sys.dm_db_index_physical_stats` 来检查我们的 `OrdersDisk` 表的碎片化水平。\n\n\
  ```sql\nUSE Chapter8\nGO\nSELECT\n    i.name\n    ,IPS.index_type_desc\n    ,IPS.index_level\n\
  \    ,IPS.avg_fragmentation_in_percent\n    ,IPS.avg_page_space_used_in_percent\n\
  \    ,i.fill_factor\n    ,CASE\n        WHEN i.fill_factor = 0\n            THEN\
  \ 100-IPS.avg_page_space_used_in_percent\n        ELSE i.fill_factor-ips.avg_page_space_used_in_percent\n\
  \     END Internal_Frag_With_Fillfactor_Offset\n    ,IPS.fragment_count\n    ,IPS.avg_fragment_size_in_pages\n\
  FROM sys.dm_db_index_physical_stats(DB_ID('Chapter8'),OBJECT_ID('dbo.OrdersDisk'),NULL,NULL,'DETAILED')\
  \ IPS\nINNER JOIN sys.indexes i\n    ON IPS.Object_id = i.object_id\n    AND IPS.index_id\
  \ = i.index_id ;\n```\n清单 8-13\n`sys.dm_db_index_physical_stats`\n\n从该查询的结果中，你可以看到每个\
  \ B 树的每个级别都返回了一行。如果表是分区的，这也会按分区进行细分。`index_level` 列指示该行代表的是 B 树的哪一级别。级别 0 表示 B 树的叶级，而级别\
  \ 1 是最低的中间级别，或者如果不存在中间级别则为根级别，依此类推，最高编号始终反映根节点。\n\n`avg_fragmentation_in_percent`\
  \ 列告诉我们存在多少外部碎片化。我们希望这个值尽可能接近零。\n\n`avg_page_space_used_in_percent` 告诉我们存在多少内部碎片化，所以我们希望这个值尽可能接近\
  \ 100。`Internal_Frag_With_FillFactor_Offset` 列也告诉我们存在多少内部碎片化，但这次，它应用了一个偏移量来考虑已应用于索引的填充因子。\n\
  \n`fragment_count` 列表示该索引级别存在多少个连续页的块，所以我们希望这个值尽可能低。\n\n`avg_fragment_size_in_pages`\
  \ 列告诉我们每个碎片的平均大小，所以显然这个数字也应该尽可能高。\n\n### 移除碎片\n\n你可以通过重组或重建索引来移除碎片。当你重组一个索引时，SQL\
  \ Server 会重新组织索引叶级别的数据。它会查看页面上是否有可用的空闲空间。如果有，它会将下一页的行移动到该页上。如果在此过程结束时存在空页面，则它们将被删除。SQL\
  \ Server 仅将页面填充到指定的 `FillFactor` 级别。一旦完成，叶级别页面内的数据会被重新排列，使其物理顺序更接近其逻辑键顺序。重组索引始终是一个\
  \ `ONLINE` 操作，这意味着在操作进行期间，其他进程仍可以使用该索引。由于它始终是一个 `ONLINE` 操作，如果 `ALLOW_PAGE_LOCKS`\
  \ 选项被关闭，它将会失败。重组索引的过程适用于移除内部碎片和 30% 或更低程度的外部碎片。然而，即使在这种使用模式下，它也不能保证操作完成后完全没有碎片。\n\
  \n清单 8-14 中的脚本在 `OrdersDisk` 表上创建了一个名为 `NCI_CustomerID` 的索引，然后演示了如何重组它。\n\n```\n\
  --创建将在后续示例中使用的索引\nCREATE NONCLUSTERED INDEX NCI_CustomerID ON dbo.OrdersDisk(CustomerID)\
  \ ;\nGO\n--重组索引\nALTER INDEX NCI_CustomerID ON dbo.OrdersDisk REORGANIZE ;\n```\n\
  清单 8-14\n重组索引\n\n当你重建一个索引时，现有索引会被删除然后完全重建。根据定义，这移除了内部和外部碎片，因为索引是从零开始构建的。然而，重要的是要注意，此操作之后你仍然不能保证达到\
  \ 100% 无碎片。这是因为 SQL Server 会将索引的不同部分分配给参与重建的每个 CPU 核心。每个 CPU 核心应该以完美的顺序构建自己的部分，但当这些部分同步时，可能会产生少量碎片。你可以通过指定\
  \ `MAXDOP = 1` 来最小化这个问题。即使设置了这个选项，在某些情况下你仍然可能遇到碎片。例如，如果 `ALLOW_PAGES_LOCKS` 被配置为\
  \ `OFF`，那么工作线程会共享分配缓存，这可能导致碎片。此外，当你设置 `MAXDOP = 1` 时，这是以重建索引所需的时间为代价的。\n\n你可以通过执行\
  \ `ONLINE` 或 `OFFLINE` 操作来重建索引。如果你选择以 `ONLINE` 操作重建索引，那么在操作进行时，原始版本的索引仍然可以访问。`ONLINE`\
  \ 操作是以时间和资源利用率为代价的。你需要启用 `ALLOW_PAGE_LOCKS` 才能使你的 `ONLINE` 重建成功。\n\n清单 8-15 中的脚本演示了如何重建\
  \ `OrdersDisk` 表上的 `NCI_Balance` 索引。因为我们没有指定 `ONLINE = ON`，所以它使用默认设置 `ONLINE = OFF`，并且在整个操作期间索引都被锁定。因为我们指定了\
  \ `MAXDOP = 1`，所以操作速度较慢，但没有碎片。\n\n```\nALTER INDEX NCI_CustomerID ON dbo.OrdersDisk\
  \ REBUILD WITH(MAXDOP = 1) ;\n```\n清单 8-15\n重建索引\n\n如果你创建一个维护计划来重建或重组索引，那么指定数据库内的所有索引都将被重建，无论它们是否需要——这可能是耗时且消耗资源的。你可以通过使用\
  \ `sys.dm_db_index_physical_stats` DMF 创建一个智能脚本来解决此问题，你可以从 SQL Server Agent 运行该脚本，并仅对需要操作的索引进行重组或重建。这在第\
  \ 17 章中有更详细的讨论。\n\n#### 提示\n\n有一种误解认为使用 SSD 可以消除索引碎片问题。这是不正确的。尽管 SSD 降低了乱序页面对性能的影响，但它们并没有消除这种影响。它们对内部碎片也没有影响。\n\
  \n#### 可恢复的索引操作\n\nSQL Server 2019 支持可恢复的联机索引创建和索引重建，适用于传统（聚集和非聚集）索引以及列存储索引。可恢复的索引操作允许你暂停一个联机索引操作（创建或重建），以便释放系统资源，然后当资源利用率不再是问题时，再从中断处重新启动。这些操作还允许在联机索引操作因常见原因（例如磁盘空间不足）失败后重新启动。\n\
  \n此功能为 DBA 带来的一些优势是显而易见的。例如，如果一个大型索引重建需要适应短暂的维护窗口，那么可以在维护窗口结束时暂停重建，并在下一个维护窗口开始时重新启动，而不是必须中止操作来释放系统资源。然而，还有一些隐藏的好处。例如，可恢复的索引操作不会消耗大量的日志空间，即使对大型索引执行也是如此。这是因为所有重启索引操作所需的数据都存储在数据库内。一个附带说明是，索引操作在暂停时不会保持一个长时间运行的事务。\n\
  \n在大多数情况下，使用可恢复索引操作的缺点很少。达到的碎片整理质量与标准联机索引操作的质量相当，并且可恢复操作与标准联机索引操作在速度上没有真正的区别（当然，不包括潜在的暂停时间）。然而，一如既往，天下没有免费的午餐，在暂停的可恢复操作期间，由于需要更新索引的两个版本，受影响表和索引的写入性能将会下降。在大多数情况下，这种下降不应超过\
  \ 10%。在暂停期间，对读取操作应该没有影响，因为它们继续使用原始版本的索引，直到操作完成。\n\n清单 8-16 中的命令演示了如何将 `OrdersDisk`\
  \ 表上的 `NCI_CustomerID` 索引重建为可恢复操作。\n\n```\nALTER INDEX NCI_CustomerID ON dbo.OrdersDisk\
  \ REBUILD WITH(MAXDOP = 1, ONLINE=ON, RESUMABLE=ON) ;\n```\n清单 8-16\n可恢复索引重建\n\n\
  清单 8-17 中的命令将暂停清单 8-16 中启动的索引重建。\n\n#### 提示\n\n仅当 8-16 清单中的命令尚未执行完毕时，8-17 清单中的命令才会生效。\n\
  \n```sql\nALTER INDEX NCI_CustomerID ON dbo.OrdersDisk PAUSE\nListing 8-17\n暂停索引重建\n\
  ```\n\n运行此脚本后，索引重建操作将暂停，并显示如图 8-11 所示的消息。\n\n![../images/333037_2_En_8_Chapter/333037_2_En_8_Fig11_HTML.jpg](img/333037_2_En_8_Fig11_HTML.jpg)\n\
  *图 8-11：索引操作暂停时抛出的消息*\n\n8-18 清单中的脚本将根据分配给`@Action`变量的值，恢复或中止索引重建。\n\n```sql\nDECLARE\
  \ @Action NVARCHAR(6) = 'Resume'\nIF (@Action = 'Resume')\nBEGIN\nALTER INDEX NCI_CustomerID\
  \ ON dbo.OrdersDisk RESUME\nEND\nELSE\nBEGIN\nALTER INDEX NCI_CustomerID ON dbo.OrdersDisk\
  \ ABORT\nEND\nListing 8-18\n恢复或中止索引操作\n```\n\n您不必为每个单独的索引操作开启`ONLINE`和`RESUMABLE`选项，而是可以通过使用数据库作用域配置，在数据库级别全局开启它们。`ELEVATE_ONLINE`配置将把数据库内受支持的索引操作的`ONLINE`默认值更改为`ON`。`ELEVATE_RESUMABLE`配置则会将`RESUMABLE`的默认值设为`ON`。\n\
  \n`ELEVATE_ONLINE`和`ELEVATE_RESUMABLE`均可配置为`OFF`（默认行为）、`WHEN_SUPPORTED`或`FAIL_UNSUPPORTED`。当设置为`WHEN_SUPPORTED`时，不兼容的操作（如重建\
  \ XML 索引）将以离线且不可恢复的方式执行。但如果设置为`FAIL_UNSUPPORTED`，此类操作将失败并抛出错误。\n\n8-19 清单中的脚本演示了如何为`Chapter8`数据库将`ELEVATE_ONLINE`和`ELEVATE_RESUMABLE`设置为`WHEN_SUPPORTED`。\n\
  \n```sql\nUSE Chapter8\nGO\nALTER DATABASE SCOPED CONFIGURATION SET ELEVATE_ONLINE\
  \ = WHEN_SUPPORTED ;\nGO\nALTER DATABASE SCOPED CONFIGURATION SET ELEVATE_RESUMABLE\
  \ = WHEN_SUPPORTED ;\nGO\nListing 8-19\n默认为 ONLINE 和 RESUMABLE\n```\n\n#### 分区索引\n\
  \n如第 7 章所述，不仅可以对表进行分区，也可以对索引进行分区。聚集索引总是与基础表共享相同的分区方案，因为聚集索引的叶级由表的实际数据页组成。而非聚集索引则可以选择与表对齐或不对齐。如果索引共享相同的分区方案或在相同的分区方案上创建，则这些索引是对齐的。\n\
  \n在大多数情况下，将非聚集索引与基表对齐是良好的实践，但有时您可能希望偏离此策略。例如，即使基表未分区，您仍可以为性能而对索引进行分区。此外，如果您的索引键是唯一的且不包含分区键，则它需要是不对齐的。如果表涉及在不同列上与其他表进行排序规则连接，不对齐的非聚集索引也有可能带来性能提升。\n\
  \n您可以使用`ON`子句指定分区方案来创建分区索引，方式与创建分区表相同。如果索引已存在，您可以重建它，并在`ON`子句中指定分区方案。8-20 清单中的脚本创建了一个分区函数和一个分区方案。然后，它重建`OrdersDisk`表的聚集索引以将其移动到新的分区方案。最后，它创建了一个新的非聚集索引，该索引与表分区对齐。\n\
  \n**提示：** 运行脚本前，请将主键名称更改为您自己的名称。\n\n```sql\n--创建分区函数\nCREATE PARTITION FUNCTION\
  \ OrdersPartFunc(int)\nAS RANGE LEFT\nFOR VALUES(250000,500000,750000) ;\nGO\n--创建分区方案\n\
  CREATE PARTITION SCHEME OrdersPartScheme\nAS PARTITION OrdersPartFunc\nALL TO([PRIMARY])\
  \ ;\nGO\n--对 OrdersDisk 表进行分区\nALTER TABLE dbo.OrdersDisk DROP CONSTRAINT PK__OrdersDi__CAC5E7420B016A9F\
  \ ;\nGO\nALTER TABLE dbo.OrdersDisk\nADD PRIMARY KEY CLUSTERED(OrderNumber) ON OrdersPartScheme(OrderNumber)\
  \ ;\nGO\n--创建分区对齐的非聚集索引\nCREATE NONCLUSTERED INDEX NCI_Part_CustID ON dbo.OrdersDisk(CustomerID,\
  \ OrderNumber)\nON OrdersPartScheme(OrderNumber) ;\nListing 8-20\n重建和创建分区索引\n```\n\
  \n重建索引时，您还可以指定仅重建特定分区。8-21 清单中的示例仅重建`NCI_Part_CustID`索引的分区 1。\n\n```sql\nALTER INDEX\
  \ NCI_Part_CustID ON dbo.OrdersDisk REBUILD PARTITION = 1 ;\nListing 8-21\n重建特定分区\n\
  ```\n\n### 统计信息\n\nSQL Server 维护关于列或列组内数据分布的统计信息。这些列可以位于表或非聚集索引中。当统计信息建立在一组列上时，它们也包括这些列值分布之间的相关性统计信息。查询优化器随后可以利用这些统计信息，基于查询预期返回的行数来构建高效的查询计划。缺乏统计信息可能导致生成低效的计划。例如，当查找操作更高效时，查询优化器可能决定执行索引扫描。\n\
  \n您可以允许 SQL Server 自动管理统计信息。一个名为`AUTO_CREATE_STATISTICS`的数据库级别选项会在 SQL Server 认为更好的基数估计有助于查询性能时自动生成单列统计信息。但这存在限制。例如，筛选的统计信息或多列统计信息无法自动创建。\n\
  \n\n#### 提示\n\n唯一的例外是在创建索引时。当你创建索引时，无论`AUTO_CREATE_STATS`设置如何，系统总会生成统计信息（包括多列统计信息）来覆盖索引键。这还包括在筛选索引上创建的筛选统计信息。\n\
  \n`Auto Create Incremental Stats`选项导致分区表上的统计信息按分区自动创建，而不是为整个表生成。这可以减少争用，因为它避免了扫描整个表的需要。\n\
  \n随着 DML 操作在表上执行，统计信息会变得过时。数据库级别的选项`AUTO_UPDATE_STATISTICS`会在统计信息过时时重建它们。表 8-3 中列出了用于确定统计信息是否过时的规则。\n\
  \n表 8-3 统计信息更新算法\n\n| 表中行数 | 规则 |\n| --- | --- |\n| 0 | 表行数大于 0。 |\n| <= 500 | 统计信息对象的第一列中有\
  \ 500 个或更多值发生了变化。 |\n| > 500 | 统计信息对象的第一列中有 500 + 20%或更多值发生了变化。 |\n| 具有`INCREMENTAL`统计信息的分区表\
  \ | 特定分区的统计信息对象的第一列中有 20%或更多值发生了变化。 |\n\n`AUTO_UPDATE_STATISTICS`过程非常有用，通常建议启用它。然而，可能会出现一个问题，因为这个过程是同步且阻塞的。因此，当运行查询时，SQL\
  \ Server 会检查统计信息是否需要更新。如果需要，SQL Server 会更新它们，但这会阻塞该查询以及任何其他需要相同统计信息的查询，直到操作完成。在高读写负载期间，例如针对超大表的\
  \ ETL 过程，这可能会导致性能问题。解决此问题是另一个数据库级别的选项，称为`AUTO_UPDATE_STATISTICS_ASYNC`。即使启用了此选项，它也仅在`AUTO_UPDATE_STATISTICS`同时启用时才会生效。启用后，`AUTO_UPDATE_STATS_ASYNC`会强制统计信息对象的更新作为后台异步进程运行。这意味着触发更新的查询和其他查询不会被阻塞。然而，代价是这些查询无法从更新后的统计信息中受益。\n\
  \n前面提到的选项可以在“数据库属性”对话框的“选项”页上进行配置。或者，你也可以使用`ALTER DATABASE`命令来配置它们，如清单 8-22 所示。\n\
  \n```\n--开启 Auto_Create_Stats\nALTER DATABASE Chapter8 SET AUTO_CREATE_STATISTICS\
  \ ON ;\nGO\n--开启 Auto_Create_Incremental_Stats\nALTER DATABASE Chapter8 SET AUTO_CREATE_STATISTICS\
  \ ON  (INCREMENTAL=ON) ;\nGO\n--开启 Auto_Update_Stats_Async\nALTER DATABASE Chapter8\
  \ SET AUTO_UPDATE_STATISTICS ON WITH NO_WAIT ;\nGO\n--开启 Auto_Update_Stats_Async\n\
  ALTER DATABASE Chapter8 SET AUTO_UPDATE_STATISTICS_ASYNC ON WITH NO_WAIT ;\nGO\n\
  清单 8-22 切换自动统计信息选项\n```\n\n#### 筛选统计信息\n\n筛选统计信息允许你在创建统计信息时通过`WHERE`子句，基于列中数据的子集创建统计信息。这使得查询优化器能够生成更好的执行计划，因为统计信息只包含明确定义的子集内的值分布。例如，如果我们在`OrdersDisk`表的`NetAmount`列上创建筛选统计信息，筛选条件为`OrderDate`大于\
  \ 2019 年 1 月 1 日，那么统计信息将不包含旧订单的行，从而使我们能够更高效地搜索大额的新近订单。\n\n#### 增量统计信息\n\n增量统计信息有助于减少在大型分区表上因更新统计信息而导致的表扫描。启用后，统计信息按分区创建和更新，而不是全局地为整个表进行更新。这可以显著减少在大型分区表上更新统计信息所需的时间，因为未过时的统计信息所在的分区不会被触及，从而减少了不必要的开销。\n\
  \n然而，增量统计信息并非在所有场景下都受支持。如果将此选项与以下类型的统计信息一起使用，系统会生成警告并忽略该设置：\n\n*   视图上的统计信息\n* \
  \  XML 列上的统计信息\n*   Geography 或 Geometry 列上的统计信息\n*   筛选索引上的统计信息\n*   非分区对齐的索引的统计信息\n\
  \n此外，你无法在只读数据库上使用增量统计信息，也无法在作为可读辅助副本参与`AlwaysOn 可用性组`的数据库上使用。\n\n\n### 管理统计信息\n\n\
  除了由 SQL Server 自动创建和更新之外，您还可以使用 `CREATE STATISTICS` 语句手动创建和更新统计信息。如果希望创建筛选统计信息，请在语句末尾添加一个\
  \ `WHERE` 子句。清单 8-23 中的脚本首先在 `CustomersDisk` 表的 `FirstName` 和 `LastName` 列上创建一个多列统计信息。然后，它在\
  \ `OrdersDisk` 表的 `NetAmount` 列上创建一个筛选统计信息，该统计信息仅基于 `OrderDate` 大于 2019 年 1 月 1\
  \ 日的行构建。\n\n```\nUSE Chapter8\nGO\n--在 FirstName 和 LastName 上创建多列统计信息\nCREATE STATISTICS\
  \ Stat_FirstName_LastName ON dbo.CustomersDisk(FirstName, LastName) ;\nGO\n--在 NetAmount\
  \ 上创建筛选统计信息\nCREATE STATISTICS Stat_NetAmount_Filter_OrderDate ON dbo.OrdersDisk(NetAmount)\n\
  WHERE OrderDate > '2019-01-01' ;\nGO\n清单 8-23\n创建统计信息\n```\n\n创建统计信息时，可以使用表 8-4\
  \ 中详述的选项。\n\n表 8-4 创建统计信息的选项\n\n| 选项 | 描述 |\n| --- | --- |\n| `FULLSCAN` | 在表中 100%\
  \ 的行样本上创建统计信息对象。此选项创建最准确的统计信息，但生成所需时间最长。 |\n| `SAMPLE` | 指定用于构建统计信息对象的行数或行百分比。样本越大，统计信息越准确，但生成时间也越长。指定\
  \ 0 会创建统计信息对象但不填充它。 |\n| `NORECOMPUTE` | 将统计信息对象排除在使用 `AUTO_UPDATE_STATISTICS` 自动更新的范围之外。\
  \ |\n| `INCREMENTAL` | 覆盖数据库级别的增量统计信息设置。 |\n\n可以使用 `UPDATE STATISTICS` 语句来更新单个统计信息，或单个表上的所有统计信息。清单\
  \ 8-24 中的脚本首先更新我们在 `OrdersDisk` 表上创建的 `Stat_NetAmount_Filter_OrderDate` 统计信息对象，然后更新\
  \ `CustomersDisk` 表上的所有统计信息。\n\n```\n--更新单个统计信息对象\nUPDATE STATISTICS dbo.OrdersDisk\
  \ Stat_NetAmount_Filter_OrderDate ;\nGO\n--更新表上的所有统计信息\nUPDATE STATISTICS dbo.CustomersDisk\
  \ ;\nGO\n清单 8-24\n更新统计信息\n```\n\n使用 `UPDATE STATISTICS` 时，除了表 8-4 中创建统计信息的选项（这些选项在更新统计信息时同样有效）之外，表\
  \ 8-5 中详述的选项也可用。\n\n表 8-5 更新统计信息的选项\n\n| 选项 | 描述 |\n| --- | --- |\n| `RESAMPLE`\
  \ | 使用最近的采样率来更新统计信息。 |\n| `ON PARTITIONS` | 为列出的分区生成统计信息，然后将它们合并以创建全局统计信息。 |\n|\
  \ `ALL \\| COLUMNS \\| INDEX` | 指定是仅更新列、仅更新索引，还是两者都更新。默认值为 `ALL`。 |\n\n您还可以使用系统存储过程\
  \ `sp_updatestats` 来更新整个数据库的统计信息。此过程会更新基于磁盘的表上的过时统计信息，以及内存优化表上的所有统计信息（无论其是否过时）。清单\
  \ 8-25 演示了使用此系统存储过程来更新 `Chapter8` 数据库中的统计信息。传入 `RESAMPLE` 参数会导致使用最近的采样率。省略此参数则使用默认采样率。\n\
  \n```\nEXEC sp_updatestats 'RESAMPLE' ;\n清单 8-25\nSp_updatestats\n```\n\n#### 注\n\
  \n更新统计信息会导致使用这些统计信息的查询在下次运行时重新编译。唯一例外的情况是，所引用的表和索引只有一个可能的执行计划。例如，`SELECT * FROM\
  \ MyTable` 总是执行聚集索引扫描（假设该表具有聚集索引）。\n\nSQL Server 2019 引入了额外的元数据信息，以帮助诊断因查询等待同步统计信息更新完成而引发的问题。首先，添加了一个新的等待类型，称为\
  \ `WAIT_ON_SYNC_STATISTICS_REFRESH`。此等待类型表示查询在等待同步统计信息更新完成所花费的时间。其次，在 `sys.dm_exec_requests`\
  \ DMV 中添加了一个新的命令类型，称为 `SELECT (STATMAN)`。此命令类型指示一条 `SELECT` 语句当前正在等待同步统计信息更新完成，然后才能继续执行。\n\
  \n\n### 摘要\n\n没有聚集索引的表称为堆，其数据页按无序方式存储。聚集索引基于聚集索引键构建 B 树结构，并使表中的数据按该键排序。由于聚集索引的叶级就是表的实际数据页，而数据页只能以一种方式进行物理排序，因此表上只能有一个聚集索引。聚集索引键的自然选择是表的主键，默认情况下，SQL\
  \ Server 会自动在主键上创建聚集索引。但在某些情况下，你可能会选择使用不同的列作为聚集索引键。这通常发生在表的主键非常宽、可更新或非始终递增时。\n\n\
  非聚集索引也是基于表中其他列构建的 B 树结构。不同之处在于，非聚集索引的叶级包含的是指向表数据页的指针，而非数据页本身。因为非聚集索引不会对表的实际数据页进行排序，所以可以创建多个非聚集索引。当在用于\
  \ `WHERE`、`JOIN` 和 `GROUP BY` 子句的列上创建非聚集索引时，它们可以提升查询性能。你还可以在 B 树的叶级包含其他列，以实现索引覆盖查询。当查询无需读取基础表中的数据时，该查询就被非聚集索引覆盖了。你还可以通过向索引定义中添加\
  \ `WHERE` 子句来筛选非聚集索引。这能为使用明确定义数据子集的查询提升性能。\n\n列存储索引压缩数据并将每个列存储在独立的一组页中。这可以显著提升数据仓库风格查询的性能，因为此类查询在大型数据集上执行分析，只需访问所需的列，而无需访问整行。每个列还会被拆分为段，每个段包含一个带有数据元数据的标头，以便\
  \ SQL Server 只需访问相关段即可满足查询，从而进一步提升性能。非聚集列存储索引不可更新，这意味着在基础表上执行 DML 语句之前，必须禁用或删除该索引。另一方面，你可以更新聚集列存储索引。\n\
  \n可以在内存优化表上创建两种类型的索引：非聚集索引和非聚集哈希索引。非聚集哈希索引对于点查询非常高效，但在执行范围扫描时效率可能低得多。非聚集索引在执行诸如不等式比较等操作时表现更佳，并且还能够按索引键的排序顺序返回数据。\n\
  \n索引需要随时间进行维护。由于 DML 语句导致页拆分，索引会产生碎片，可以通过重组或重建来减少或消除碎片。当页的顺序错乱时，这称为外部碎片；当页中有大量空闲空间时，则称为内部碎片。SQL\
  \ Server 存储有关索引碎片的元数据，并可通过名为 `sys.dm_db_index_physical_stats` 的 DMF 来显示这些信息。SQL\
  \ Server 还会维护其认为缺失的索引信息。缺失索引是指数据库中不存在，但如果创建则能提升查询性能的索引。数据库管理员可以利用这些数据来帮助改进其索引策略。\n\
  \nSQL Server 维护有关列或列组中值分布的统计信息，以帮助提升查询计划的质量。若没有高质量的统计信息，SQL Server 可能在选择使用哪个索引或索引操作符来满足查询时做出错误的选择。例如，它可能选择执行索引扫描，而实际上索引查找更为合适。你可以手动或自动更新统计信息，但无论哪种方式都会导致查询重新编译。SQL\
  \ Server 还支持增量统计信息，允许在每个分区上创建统计信息，而不是针对整个表全局创建。\n\n"
- '# 9. 数据库一致性


  数据库涉及大量 IO 操作。当 IO 操作频繁时，固有地存在损坏的风险。防范数据库损坏的主要方法是定期备份数据库，并周期性地测试这些备份是否可恢复。然而，你需要留意数据库损坏情况，SQL
  Server 提供了工具，可用于检查数据库的一致性，并在备份不可用时解决一致性问题。本章将探讨用于检查和修复一致性问题的各种选项。


  ### 一致性错误


  一致性错误可能发生在用户数据库或系统数据库中，导致表、数据库甚至整个实例处于不可访问状态。一致性错误可能由多种原因引起，包括硬件故障和数据库引擎问题。以下各节将讨论可能发生的错误类型、如何检测这些错误，以及如果系统数据库损坏应采取的措施。


  #### 理解一致性错误


  可能发生多种不同的数据库一致性错误；这些错误会导致查询失败或会话断开连接，并将消息写入 SQL Server 错误日志。最常见的错误将在以下各节中详述。


  ##### `605` 错误


  根据错误严重性级别，`605` 错误可能指向两个问题之一。如果严重性级别为 12，则表示发生了脏读。脏读是一种事务异常，当你使用 Read Uncommitted
  隔离级别或 `NOLOCK` 查询提示时会发生。当一个事务读取了一行在数据库中从未存在过的数据（由于另一个事务被回滚）时，就会发生脏读。事务异常将在第 18 章中更详细讨论。要解决此问题，可以重新运行查询直到成功，或者重写查询以避免使用
  Read Uncommitted 隔离级别或 `NOLOCK` 查询提示。


  然而，`605` 错误可能表明一个更严重的问题，通常指示硬件故障。如果严重性级别为 21，则可能是页面损坏，或者操作系统提供了错误的页面。如果是这种情况，你需要从备份恢复或使用
  `DBCC CHECKDB` 来修复问题（`DBCC CHECKDB` 将在本章后面讨论）。此外，你还应让 Windows 管理员和存储团队检查可能的硬件或磁盘级问题。


  ##### `823` 错误


  当 SQL Server 尝试执行 IO 操作，而用于执行此操作的 Windows API 向数据库引擎返回错误时，会发生 `823` 错误。`823` 错误几乎总是与硬件或驱动程序问题相关。


  如果发生 `823` 错误，你应该使用 `DBCC CHECKDB` 来检查数据库其余部分以及位于同一卷上的任何其他数据库的一致性。你应该与存储团队联系以解决存储问题。你的
  Windows 管理员还应检查 Windows 事件日志以查找相关的错误消息。最后，你应该从备份恢复数据库，或者使用 `DBCC CHECKDB` 来“修复”此问题。


  ##### `824` 错误


  如果对 Windows API 的调用成功，但返回的数据存在逻辑一致性问题，则会生成 `824` 错误。与 `823` 错误一样，`824` 错误通常意味着存储子系统存在问题。如果生成了
  `824` 错误，你应该遵循与处理 `823` 错误相同的步骤。




  ##### 5180 错误


  当发现无效的文件 ID 时，会发生 5180 错误。文件 ID 存储在页面指针以及每个文件开头的系统页面中。此错误通常由页面内的损坏指针引起，但也可能表示数据库引擎存在问题。如果遇到此错误，应从备份还原或运行
  `DBCC CHECKDB` 来修复错误。


  ##### 7105 错误


  当表中的某一行引用不存在的 LOB（大型对象块）结构时，会发生 7105 错误。这可能是由于脏读导致的，类似于严重级别 12 的 605 错误，也可能是页面损坏的结果。损坏可能发生在指向
  LOB 结构的数据页上，也可能发生在 LOB 结构本身的页面上。


  如果遇到 7105 错误，则应运行 `DBCC CHECKDB` 来检查错误。如果没有发现任何错误，那么该错误很可能是脏读的结果。但如果发现了错误，则应从备份还原数据库或使用
  `DBCC CHECKDB` 来修复问题。


  ### 检测一致性错误


  SQL Server 提供了在页面从磁盘读取和写入磁盘时验证其完整性的机制。它还提供了一个损坏页面的日志，帮助您识别发生的错误类型、发生的次数以及已损坏页面的当前状态。这些特性将在以下部分中讨论。


  #### 页面验证选项


  一个名为 `Page Verify` 的数据库级选项决定了 SQL Server 如何检查 I/O 子系统在读写页面到磁盘时引起的页面损坏。它可以配置为 `CHECKSUM`（默认选项）、`TORN_PAGE_DETECTION`
  或 `NONE`。


  建议将 `Page Verify` 设置为 `CHECKSUM`。选择此选项后，每次写入页面时，都会针对整个页面创建一个 `CHECKSUM` 值并保存在页面头部。`CHECKSUM`
  值是一个哈希和，它是确定性的，并且基于运行哈希函数的值是唯一的。然后在页面读入缓冲区缓存时重新计算此值，并与原始值进行比较。


  当指定 `TORN_PAGE_DETECTION` 时，每当页面写入磁盘时，页面每个 512 字节扇区的前 2 个字节都会写入页面的头部。当页面随后读入内存时，会检查这些值以确保它们相同。这里的缺陷显而易见；页面完全有可能已损坏，但这种损坏未被注意到，因为它不在被检查的字节内。`TORN_PAGE_DETECTION`
  是 SQL Server 的一项已弃用功能，这意味着它在未来版本中将不可用。您应避免使用它。如果 `Page Verify` 设置为 `NONE`，则 SQL
  Server 不执行任何页面验证。这不是好的做法。


  如果您所有的数据库都是在 SQL Server 2019 实例中创建的，那么它们都默认配置为使用 `CHECKSUM`。但是，如果您是从早期版本的 SQL Server
  迁移数据库，那么它们可能配置为使用 `TORN_PAGE_DETECTION`。您可以使用清单 9-1 中的脚本来检查数据库的 `Page Verify` 设置。


  ```sql

  --Create the Chapter9 database

  CREATE DATABASE Chapter9 ;

  GO

  --View page verify option, for all databases on the instance

  SELECT

  name

  ,page_verify_option_desc

  FROM sys.databases ;

  Listing 9-1

  Checking the Page Verify Option

  ```


  如果您发现某个数据库正在使用 `TORN_PAGE_DETECTION`，或者更糟，被设置为 `NONE`，那么您可以通过在“数据库属性”对话框的“选项”页中更改设置来解决此问题，如图
  9-1 所示。


  ![../images/333037_2_En_9_Chapter/333037_2_En_9_Fig1_HTML.jpg](img/333037_2_En_9_Fig1_HTML.jpg)


  图 9-1


  选项页


  #### 注意


  更改 `Page Verify` 选项不会立即导致针对数据页创建 `CHECKSUM`。`CHECKSUM` 仅在页面被修改后写回磁盘时生成。


  或者，您可以使用 T-SQL 通过 `ALTER DATABASE <DatabaseName> SET PAGE_VERIFY CHECKSUM WITH NO_WAIT`
  语句达到相同的结果。清单 9-2 中的脚本将当前设置为 `NONE` 或 `TORN_PAGE_DETECTION` 的所有数据库重新配置为使用 `CHECKSUM`。该脚本使用
  XQuery `data()` 函数避免了游标的需要。它通过为表中的每一行构建所需的语句来工作。它将每一行的数据转换为 XML，然后使用 `Data()` 函数剥离标签，只留下语句。然后将其转换回关系字符串并传递给
  Unicode 变量，该变量随后作为动态 SQL 执行。


  ```sql

  DECLARE @SQL NVARCHAR(MAX)

  SELECT @SQL =

  (

  SELECT

  ''ALTER DATABASE '' + QUOTENAME(Name) +

  '' SET PAGE_VERIFY CHECKSUM WITH NO_WAIT; '' AS [data()]

  FROM sys.databases

  WHERE page_verify_option_desc <> ''CHECKSUM''

  FOR XML PATH('''')

  ) ;

  BEGIN TRY

  EXEC(@SQL) ;

  END TRY

  BEGIN CATCH

  SELECT ''Failure executing the following SQL statement '' + CHAR(13) +CHAR(10) +
  @SQL ;

  END CATCH

  Listing 9-2

  Reconfiguring All Databases to Use CHECKSUM

  ```


  #### 提示


  任何时候您需要一个脚本来对多个数据库执行操作，都可以使用此技术。该代码比使用游标高效得多，并通过允许 DBA 以身作则来提倡良好的实践。您总是告诉您的开发人员不要使用游标，对吧？


  #### 可疑页


  如果 SQL Server 发现校验和错误或页撕裂的页面，它会在 `MSDB` 数据库中一个名为 `dbo.suspect_pages` 的表中记录这些页面。它还将遇到
  823 或 824 错误的任何页面记录在此表中。该表由六列组成，如表 9-1 所述。


  表 9-1


  `suspect_pages` 列


  | 列 | 描述 |

  | --- | --- |

  | `Database_id` | 包含可疑页面的数据库的 ID |

  | `File_id` | 包含可疑页面的文件的 ID |

  | `Page_id` | 可疑页面的 ID |

  | `Event_Type` | 导致可疑页面被更新的事件性质 |

  | `Error_count` | 记录事件发生次数的增量计数器 |

  | `Last_updated_date` | 行最后一次更新的时间 |


  `event_type` 列的可能值在表 9-2 中解释。


  表 9-2


  事件类型


  | Event_type | 描述 |

  | --- | --- |

  | `1` | 823 或 824 错误 |

  | `2` | 校验和错误 |

  | `3` | 页撕裂 |

  | `4` | 已还原 |

  | `5` | 已修复 |

  | `7` | 被 `DBCC CHECKDB` 释放 |


  在 `suspect_pages` 表中记录可疑页面后，SQL Server 在您通过从备份还原页面或使用 `DBCC CHECKDB` 修复问题后更新该行。每次遇到具有相同
  `event_type` 的错误时，它也会增加错误计数。您应监视此表中的新条目和更新条目，还应定期从此表中删除 `event_type` 为 `4` 或 `5`
  的行，以防止该表被填满。



  #### 注意


  页面恢复将在第 12 章讨论。


  清单 9-3 中的脚本创建了一个名为`Chapter9`的新数据库，其中包含一个名为`CorruptTable`的表，该表随后被填充数据。然后，它使表中的一个页面损坏。


  ```sql

  USE Chapter9

  GO

  --Create the table that we will corrupt

  CREATE TABLE dbo.CorruptTable

  (

  ID    INT    NOT NULL    PRIMARY KEY CLUSTERED    IDENTITY,

  SampleText NVARCHAR(50)

  ) ;

  --Populate the table

  DECLARE @Numbers TABLE

  (ID        INT)

  ;WITH CTE(Num)

  AS

  (

  SELECT 1 Num

  UNION ALL

  SELECT Num + 1

  FROM CTE

  WHERE Num <= 100

  )

  INSERT INTO @Numbers

  SELECT Num

  FROM CTE ;

  INSERT INTO dbo.CorruptTable

  SELECT ''SampleText''

  FROM @Numbers a

  CROSS JOIN @Numbers b ;

  --DBCC WRITEPAGE will be used to corrupt a page in the table. This requires the

  --database to be placed in single user mode.

  --THIS IS VERY DANGEROUS – DO NOT EVER USE THIS IN A PRODUCTION ENVIRONMENT

  ALTER DATABASE Chapter9 SET  SINGLE_USER WITH NO_WAIT ;

  GO

  DECLARE @SQL NVARCHAR(MAX) ;

  SELECT @SQL = ''DBCC WRITEPAGE('' +

  (

  SELECT CAST(DB_ID(''Chapter9'') AS NVARCHAR)

  ) +

  '', 1, '' +

  (

  SELECT TOP 1 CAST(page_id AS NVARCHAR)

  FROM dbo.CorruptTable

  CROSS APPLY sys.fn_PhysLocCracker(%%physloc%%)

  ) +

  '', 2000, 1, 0x61, 1)'' ;

  EXEC(@SQL) ;

  ALTER DATABASE Chapter9 SET  MULTI_USER WITH NO_WAIT ;

  GO

  SELECT *

  FROM dbo.CorruptTable ;

  ```


  清单 9-3

  损坏一个页面


  图 9-2 中的结果显示，脚本中尝试从表中读取数据的最终查询失败，因为其中一个页面已损坏，因此存在错误的校验和。


  ![../images/333037_2_En_9_Chapter/333037_2_En_9_Fig2_HTML.jpg](img/333037_2_En_9_Fig2_HTML.jpg)


  图 9-2

  校验和错误


  #### 小心


  `DBCC WRITEPAGE`在这里仅用于教育目的。它未公开且极其危险。它`never`应在生产系统上使用，并且只应在任何数据库上极其谨慎地使用。


  你可以使用清单 9-4 中的查询从`msdb.dbo.suspect_pages`表中生成友好的输出。此查询使用`DB_NAME()`函数查找数据库名称，连接到`sys.master_files`系统表以查找涉及的文件名称，并使用`CASE`语句将`event_type`转换为事件类型描述。


  ```sql

  SELECT

  DB_NAME(sp.database_id) [Database]

  ,mf.name

  ,sp.page_id

  ,CASE sp.event_type

  WHEN 1 THEN ''823 or 824 or Torn Page''

  WHEN 2 THEN ''Bad Checksum''

  WHEN 3 THEN ''Torn Page''

  WHEN 4 THEN ''Restored''

  WHEN 5 THEN ''Repaired (DBCC)''

  WHEN 7 THEN ''Deallocated (DBCC)''

  END AS [Event]

  ,sp.error_count

  ,sp.last_update_date

  FROM msdb.dbo.suspect_pages sp

  INNER JOIN sys.master_files mf

  ON sp.database_id = mf.database_id

  AND sp.file_id = mf.file_id ;

  ```


  清单 9-4

  查询 suspect_pages


  在损坏了我们的`CorruptTable`表的一个页面后，运行此查询将产生图 9-3 中的结果。显然，如果你在自己的系统上运行脚本，`page_id`很可能会不同，因为数据库引擎可能为你创建的表分配了不同的页面。


  ![../images/333037_2_En_9_Chapter/333037_2_En_9_Fig3_HTML.jpg](img/333037_2_En_9_Fig3_HTML.jpg)


  图 9-3

  查询 suspect_pages 的结果


  #### 注意


  我们将在本章后面修复错误，但这会丢失存储在页面上的数据。如果有备份可用，那么在此场景下，页面恢复是比修复更好的选择。


  ##### 内存优化表的一致性问题


  损坏通常发生在物理 IO 操作期间，因此你可以原谅自己认为内存优化表不受损坏影响，但这是一个谬误。正如你可能从第 7 章记得的，虽然内存优化表驻留在内存中，但表的副本——根据你的持久性设置，还包含你数据的副本——保存在物理文件中。这是为了确保在实例重启后表和数据仍然可用。这些文件可能会遭受损坏。由于诸如故障
  RAM 芯片等问题，内存中的数据也可能变得损坏。


  不幸的是，`DBCC CHECKDB`的修复选项不支持内存表。但是，当你备份包含内存优化文件组的数据库时，会对此文件组中的文件执行校验和验证。因此，至关重要的是，你不仅要定期备份，还要定期检查它们是否可以成功恢复。这是因为在内存优化表损坏的情况下，你唯一的选择是从最后一个已知完好的备份中恢复。


  #### 系统数据库损坏


  如果系统数据库损坏，你的实例可能会处于无法访问的状态。以下各节讨论如何响应主数据库和资源数据库中的损坏。


  ##### 主数据库损坏


  如果主数据库损坏，你的实例可能无法启动。如果是这种情况，那么你需要重建系统数据库，然后从备份中恢复最新的副本。第 12 章更详细地讨论了数据库备份策略，但这凸显了备份系统数据库的重要性。如果你需要重建系统数据库，并且无法从备份中恢复，你将丢失所有实例级信息，例如登录名、SQL
  Server Agent 作业、链接服务器等。甚至实例内用户数据库的知识也会丢失，你将需要重新附加数据库。


  为了重建系统数据库，你需要运行安装程序。当你使用安装程序重建系统数据库时，表 9-3 中描述的参数可用。


  表 9-3

  系统数据库重建参数


  | 参数 | 说明 |

  | --- | --- |

  | `/ACTION` | 指定操作参数为`Rebuilddatabase`。 |

  | `/INSTANCENAME` | 指定包含损坏系统数据库的实例的名称。 |

  | `/Q` | 此参数代表安静。使用它可以在没有任何用户交互的情况下运行安装程序。 |

  | `/SQLCOLLATION` | 这是一个可选参数，可用于指定实例的排序规则。如果省略，则使用 Windows 操作系统的排序规则。 |

  | `/SAPWD` | 如果你的实例使用混合模式身份验证，则使用此参数指定 SA 帐户的密码。 |

  | `/SQLSYSADMINACCOUNTS` | 使用此参数指定哪些帐户应成为实例的系统管理员。 |


  清单 9-5 中的 PowerShell 命令重建了`PROSQLADMIN`实例的系统数据库。


  ```powershell

  .\setup.exe /ACTION=rebuilddatabase /INSTANCENAME=PROSQLADMIN /SQLSYSADMINACCOUNTS=SQLAdministrator

  ```


  清单 9-5

  重建系统数据库


  如前所述，当此操作完成后，理想情况下我们从备份中恢复主数据库的最新副本。由于我们没有备份，我们需要重新附加我们的`Chapter9`数据库以继续。此外，`suspect_pages`表中损坏页面的详细信息也将丢失。但是，尝试读取`Chapter9`数据库中的`CorruptTable`表会导致这些数据被重新填充。清单
  9-6 中的脚本重新附加了`Chapter9`数据库。在运行脚本之前，你应该更改文件路径以匹配你自己的配置。


  ```sql

  CREATE DATABASE Chapter9 ON

  ( FILENAME = N''F:\MSSQL\DATA\Chapter9.mdf'' ),

  ( FILENAME = N''F:\MSSQL\DATA\Chapter9_log.ldf'' )

  FOR ATTACH ;

  ```


  清单 9-6

  重新附加数据库



  ##### 资源数据库或二进制文件损坏


  实例本身可能变得损坏。这可能包括注册表项损坏或资源数据库损坏。如果发生这种情况，请查找随 SQL Server 安装介质一起提供的修复实用工具。要调用此工具，请从
  `SQL Server 安装中心` 的 `维护` 选项卡中选择 `修复`。


  向导运行适当的规则检查后，您将看到“选择实例”页面，如图 9-4 所示。


  ![../images/333037_2_En_9_Chapter/333037_2_En_9_Fig4_HTML.jpg](img/333037_2_En_9_Fig4_HTML.jpg)

  *图 9-4. “选择实例”页面*


  选择需要修复的实例后，向导的下一页将运行额外的规则检查，以确保可以修复所需的功能。最后，在 `准备修复` 页面上，您会看到将要执行的操作摘要。选择修复后，您将看到修复进度报告。修复完成后，会显示一个
  `摘要` 页面，其中提供了每个已执行操作的状态，以及一个日志文件的链接，如果您需要进行故障排除，可能希望查看该日志。


  作为使用 `SQL Server 安装中心` 的替代方法，您可以通过命令行实现相同的重建。如果您的实例运行在 Windows Server Core 上，这非常有用。从命令行修复实例时，可用的参数是表
  9-4 中列出的那些。因为在修复实例时不会重建 `Master` 数据库，所以您不需要指定排序规则或管理员详细信息。


