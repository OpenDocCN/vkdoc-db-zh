  #### DBCC CHECKDB


  `DBCC CHECKDB` 是一个既可用于发现损坏也可用于修复错误的实用工具。当您运行 `DBCC CHECKDB` 时，默认情况下它会创建一个数据库快照并针对此快照运行一致性检查。这提供了一个可以执行检查的事务一致点，同时减少了数据库中的争用。它可以并行检查多个对象以提高性能，但这取决于可用的内核数量和实例的
  `MAXDOP` 设置。


  ##### 检查错误


  当您仅出于发现损坏的目的运行 `DBCC CHECKDB` 时，您可以指定表 9-5 中详述的参数。


  *表 9-5. DBCC CHECKDB 参数*


  | 参数 | 描述 |

  | --- | --- |

  | `NOINDEX` | 指定应对堆和聚集索引结构执行完整性检查，但不应对非聚集索引执行。 |

  | `EXTENDED_LOGICAL_CHECKS` | 强制对 XML 索引、索引视图和空间索引执行逻辑一致性检查。 |

  | `NO_INFOMSGS` | 防止在结果中返回信息性消息。当您正在搜索问题时，这可以减少噪音，因为只返回严重级别大于 10 的错误和警告。 |

  | `TABLOCK` | `DBCC CHECKDB` 创建一个数据库快照并针对此结构运行其一致性检查，以避免在数据库中获取锁，从而导致争用。指定此选项会更改该行为，因此不再创建快照，而是
  SQL Server 在数据库上获取临时排他锁，然后在正在检查的结构上获取排他锁。在写入负载高的情况下，这可以减少运行 `DBCC CHECKDB` 所需的时间，但代价是与其他可能正在运行的进程发生争用。它还会导致系统表元数据验证和
  Service Broker 验证被跳过。 |

  | `ESTIMATEONLY` | 指定此参数时，不执行任何检查。唯一发生的事情是根据指定的其他参数计算在 `TempDB` 中执行检查所需的空间。 |

  | `PHYSICAL_ONLY` | 使用此参数时，`DBCC CHECKDB` 仅限于对数据库执行分配一致性检查、系统目录一致性检查以及对数据库中每个表的每个页面进行验证。此选项不能与
  `DATA_PURITY` 结合使用。 |

  | `DATA_PURITY` | 指定执行列完整性检查，例如确保值在其数据类型边界内。仅适用于从 SQL Server 2000 或更早版本升级的数据库。对于任何较新的数据库，或已使用
  `DATA_PURITY` 扫描过的 SQL Server 2000 数据库，默认情况下会执行这些检查。 |

  | `ALL_ERRORMSGS` | 仅用于向后兼容。对 SQL 2019 数据库没有影响。 |


  `DBCC CHECKDB` 是一个非常密集的过程，会消耗大量 CPU 和 IO 资源。因此，建议在维护窗口期间运行它，以避免应用程序出现性能问题。数据库引擎会根据实例级别的
  `MAXDOP` 设置以及进程开始时服务器的吞吐量，自动决定为 `DBCC CHECKDB` 分配多少个 CPU 内核。但是，如果您预计在 `DBCC CHECKDB`
  运行期间负载会增加，那么您可以通过打开跟踪标志 2528 将进程限制为单个内核。但是，应谨慎使用此标志，因为它会导致 `DBCC CHECKDB` 完成所需的时间长得多。如果没有生成快照，无论是因为您指定了
  `TABLOCK` 还是因为磁盘上没有足够的空间来生成快照，它也会导致每个表被锁定更长的时间。


  清单 9-8 中的示例不执行任何检查，而是计算在 `TempDB` 中成功针对 `Chapter9` 数据库运行 `DBCC CHECKDB` 所需的空间量。


  ```

  USE Chapter9

  GO

  DBCC CHECKDB WITH ESTIMATEONLY ;

  ```

