  ## 引言


  *《Pro SQL Server 2019 Administration》*是一本为管理本地 SQL Server 实例的数据库管理员（DBA）设计的书籍。本书首先涵盖了在
  Windows 和 Linux 环境中安装 SQL Server 的内容。同时还探讨了如何在容器中安装和配置 SQL Server，我相信这是未来托管许多数据层应用程序的方向。


  然后，本书转向讨论管理 SQL Server 的配置和维护方面。这包括优化表、创建索引和运行数据一致性检查。这些都是每位 DBA 应该熟悉的核心要素。


  接下来，我们将探讨如何确保 SQL Server 的安全性和韧性。这是一个重要主题，我们将深入研究诸如 SQL Server 安全模型和加密等领域。然后，我们将介绍如何为数据库提供高可用性和灾难恢复。这包括从执行备份（和还原）到实现复杂的
  AlwaysOn 拓扑等所有内容。


  最后，本书将指导您了解 DBA 应该理解的许多性能故障排查和维护任务。范围从理解锁、使用 Extended Events 执行跟踪，到利用一些真正出色的 SQL
  Server 功能，如查询存储（Query Store）、分布式重放（Distributed Replay）和基于策略的管理（PBM）。我们还将探讨如何使用元数据来自动化维护例程，并使用
  SQL Server 代理来安排这些任务。


  在本书中运行代码示例时，您应更改代码中的“个性化”部分，例如文件夹结构和文件名，以匹配您自己的配置。


