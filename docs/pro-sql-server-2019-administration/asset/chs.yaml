  ### 故障排除安装


  如果在实例安装过程中发生错误，或者你的冒烟测试失败，那么你将需要对安装进行故障排除。没有 GUI，这看起来可能是一项艰巨的任务，但幸运的是，SQL Server
  安装过程提供了一套完整的详细日志，你可以用它们来识别问题。这些日志中最有用的列在表 3-6 中。


  *表 3-6*

  *SQL Server 安装日志*


  | 日志文件 | 位置 |

  | --- | --- |

  | `Summary.txt` | `%programfiles%\Microsoft SQL Server\150\Setup Bootstrap\Log\`
  |

  | `Detail.txt` | `%programfiles%\Microsoft SQL Server\150\Setup\Bootstrap\Log\<YYYYMMDD_HHMM>\`
  |

  | `SystemConfigurationCheck_Report.htm` | `%programfiles%\Microsoft SQL Server\150\Setup
  Bootstrap\Log\<YYYYMMDD_HHMM>\` |


  #### Summary.txt


  当对 SQL Server 安装问题进行故障排除时，`Summary.txt` 通常是你第一个查看的文件。它提供了有关安装的基本信息，通常可以用来确定问题。例如，图
  3-3 中的样本清楚地在退出消息中显示，由于指定的实例名称过长，导致实例安装失败。


  ![../images/333037_2_En_3_Chapter/333037_2_En_3_Fig3_HTML.jpg](img/333037_2_En_3_Fig3_HTML.jpg)

  *图 3-3*

  *Summary.txt*


  除了返回高级信息（如退出代码、退出消息以及安装的开始和结束时间）外，`summary.txt` 还会提供有关操作系统环境的详细信息。此外，它还将详细说明安装程序尝试安装的组件、每个执行的
  MSI（Microsoft 安装程序）的状态，以及指定的任何命令行参数。在文件的末尾，你还会找到一个异常摘要，其中包括堆栈跟踪。


  你可以在 Windows Server Core 中使用记事本打开文本文件。所以，假设你已经导航到 `%programfiles%\Microsoft SQL
  Server\150\Setup Bootstrap\Log\` 文件夹，你可以使用命令 `notepad summary.txt` 来打开这个文件。


  #### Detail.txt


  如果 `summary.txt` 没有提供你需要的详细粒度，那么你的下一个查看点将是 `detail.txt`。这是安装执行动作的详细日志，这些动作是按执行发生的时间组织的，而不是按执行它们的组件组织的。要在此日志中查找错误，你应该搜索字符串
  `error` 和 `exception`。


  #### SystemConfigurationCheck_Report.htm


  `SystemConfigurationCheck_Report.htm` 文件以网页格式提供了安装期间发生的每条规则检查的描述和状态。不幸的是，Windows
  Server Core 不支持渲染 HTML。因此，要查看此文件，你有两个选择。第一个是在记事本中查看，这会给你所需的细节，但它会被埋在 HTML 标签之间，没有直观的格式。这几乎违背了
  Microsoft 以用户友好格式提供信息的初衷。


  第二个选择是从安装了 GUI 的远程计算机打开该文件。这听起来是一个更好的选择，而且确实如此，前提是你在服务器上有一个可以快速放入并访问该文件的共享。然而，如果情况并非如此，并且如果你的环境没有提供快速将此文件移动到另一台机器的能力，你可能不想在这方面花太多时间——特别是因为你通常访问它的唯一原因是安装刚刚失败，而项目团队可能要求你快速解决问题。


  ##### 其他日志文件


  SQL Server 安装例程会生成许多额外的日志文件，包括一个名为 `Datastore` 的文件夹，其中包含一系列 `XML` 文件，每个文件代表一个已配置的独立设置。同样值得注意的是，您会找到安装程序生成的配置文件副本和一个名为
  `settings.xml` 的文件。此文件定义了配置选项的元数据，包括配置值的来源，例如默认值或用户指定值。


  安装过程中运行的每个 `MSI` 都会创建一个详细日志。这些日志的数量当然取决于您选择安装的功能。在 `Windows Server Core` 上，只要您不是仅执行
  `SSAS` 安装，至少会有一个与 SQL 引擎相关的 `.log` 文件。这些 `.log` 文件可以提供关于其特定 `MSI` 更为详细的粒度信息，有助于您进行故障排除。


  然而，使用 `MSI` 日志并非完全直接明了，因为您可能会发现许多错误是由前一个错误引起的，而不是问题的根本原因。要使用这些日志文件，您应该按创建时间对它们进行排序。然后，您可以从后往前处理它们。您找到的最后一个错误将是根本原因问题。要在这些文件中搜索错误，请搜索字符串
  `Return value 3`。但这可能会变得更复杂，因为并非所有出现的 `Return value 3` 都与意外错误相关。其中一些可能是预期结果。


  #### 可选参数


  有许多开关和参数可以可选地用于自定义您正在安装的实例的配置。可用于安装数据库引擎的可选开关和参数列于表 3-7 中。


  表 3-7 可选参数


  | 参数 | 用法 |

  | --- | --- |

  | `/AGTSVCSTARTUPTYPE` | 指定 SQL Agent 服务的启动模式。可设置为 `Automatic`、`Manual` 或 `Disabled`。
  |

  | `/BROWSERSVCSTARTUPTYPE` | 指定 SQL Browser 服务的启动模式。可设置为 `Automatic`、`Manual` 或
  `Disabled`。 |

  | `/CONFIGURATIONFILE` | 指定配置文件的路径，该文件包含开关和参数列表，从而在运行安装程序时无需内联指定它们。 |

  | `/ENU` | 指示将使用英文版 SQL Server。如果您在具有本地化设置的服务器上安装英文版 SQL Server，且安装介质同时包含英文和本地化操作系统的语言包，请使用此开关。
  |

  | `/FILESTREAMLEVEL` | 用于启用 `FILESTREAM` 并设置所需的访问级别。可设置为 `0` 禁用 `FILESTREAM`，`1`
  仅允许通过 SQL Server 连接，`2` 允许 IO 流式传输，或 `3` 允许远程流式传输。选项 `1` 到 `3` 是逐级递进的，因此指定级别 `3`
  即隐式指定了级别 `1` 和 `2`。 |

