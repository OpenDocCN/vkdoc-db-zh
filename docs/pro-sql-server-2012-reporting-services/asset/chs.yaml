  `解决方案` 中。解决方案就是一个或多个项目的集合，这些项目对 Visual Studio 可用。一个单一的解决方案可以包含一个报表服务项目、一个集成服务项目、一个分析服务项目，以及一个
  Windows 或 Web 应用程序项目。


