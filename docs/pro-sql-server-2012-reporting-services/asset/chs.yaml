- "# 安全管理\n\nSSRS 2012 不允许管理员通过基于 Web 的 `报表管理器` 来编辑角色可用的任务或添加新角色。这项工作被归于 `SSMS 2012`\
  \ 界面。打开 `SSMS`，通过点击 `连接` 按钮并选择 `Reporting Services` 来连接到 `Reporting Services` 实例。该对话框看起来与常规连接屏幕类似，但服务器类型将是\
  \ `Reporting Services`。输入 `SSRS` 服务器的名称并点击 `连接` 以查看可用选项。图 11-11 显示了连接屏幕。\n\n连接后，你将发现该实例下列出了三个部分。我们这里关注的是第二个部分，`安全性`。展开\
