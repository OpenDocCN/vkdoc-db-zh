  \n### 报表部件\n\n`SSRS 2008 R2` 新增了一项功能，它提供了即席报表的真正强大之处。正如我们之前简要提到的，报表部件可以被创建并部署到报表服务器，其唯一目的就是供其他报表开发人员或即席报表作者使用。报表部件不仅有助于通过可重用性保持一致性，还能提高报表制作的效率。报表部件令人惊叹的一点是，当报表使用报表部件后，如果对报表部件进行了更改，那么所有使用它的报表都会收到变更通知。报表作者可以选择使用新版本，或者保留报表当前使用的现有版本。我知道这很棒，它是\
  \ `报表生成器` 工具中一个非常受欢迎的新增功能。\n\n在开始示例之前，请注意并非所有报表项都能发布为报表部件。工具箱中的大多数报表项都可以用作报表部件，但并非全部。可以使用的报表项列表如下：\n\
  \n- `Tablix` – `表`、`列表` 和 `矩阵`\n- `图表`\n- `仪表`\n- `地图`\n- `矩形`\n- `图像`\n- `参数`\n\
  \n我们将把现有报表作为报表部件部署到 `报表服务器`。我们可以使用 `报表设计器` 或 `报表生成器` 来完成，但由于我们正在展示 `报表生成器 3.0` 的功能，我们将向您展示如何在\
  \ `报表生成器` 中打开现有报表并进行部署。部署完成后，我们将展示使用 `报表生成器 3.0` 的报表作者如何“消费”或重用已部署到 `报表服务器` 的报表部件。打开\
  \ `报表生成器`，我们开始吧。操作步骤如下：\n\n1.  启动 `报表生成器` 后，点击左上角的 `报表生成器` 图标，然后点击 `打开`。\n2.  导航到您解压\
  \ `Pro_SSRS` 解决方案的位置，并找到 `EmployeeSvcCost_RB3_ReportPart.rdl` 文件。点击 `打开` 以在 `报表生成器\
  \ 3.0` 中加载报表。\n3.  点击 `运行` 查看报表的实际效果。该报表显示了一个饼图，其中包含每个分支的预估成本，如 图 13-69 所示。\n  \
  \  ![Image](img/9781430238102_Fig13-69.jpg)\n    `图 13-69。` `EmployeeSvcCost_RB3_ReportPart`\
  \ 报表\n4.  点击 `设计` 按钮返回设计模式。再次点击 `报表生成器` 菜单按钮，并选择 `发布报表部件`，如 图 13-70 所示。\n    ![Image](img/9781430238102_Fig13-70.jpg)\n\
  \    `图 13-70。` 发布报表部件\n5.  在 `发布报表部件` 屏幕上，我们有两个选项：`使用默认设置发布所有报表部件` 或 `发布前审阅并修改报表部件`。我们可以选择前者，但为了展示部署单个报表项的能力，请选择后者：`发布前审阅并修改报表部件`，如\
  \ 图 13-71 所示。\n    ![Image](img/9781430238102_Fig13-71.jpg)\n    `图 13-71。` 发布前审阅\n\
  6.  如 图 13-72 所示，我们可以选择部署报表中的两个项目。第一个是 `EstimatedCostByBranch_Pie` 图表，第二个是我们的 `ServiceYear`\
  \ 报表参数。由于 `图表` 需要该参数，请确保两者都被选中，然后点击 `发布` 将我们的图表部署到报表服务器。\n    ![Image](img/9781430238102_Fig13-72.jpg)\n\
  \    `图 13-72。` 发布选定的报表部件\n7.  如果在报表服务器上权限设置恰当（`内容管理员`），您应该在选定的报表部件旁边看到两个绿色的勾选标记。点击\
  \ `关闭` 返回 `报表生成器`。\n8.  现在我们已部署了报表部件，是时候创建一个使用该报表部件的报表了。再次点击 `报表生成器` 菜单按钮，选择 `新建`，然后选择创建\
  \ `空白报表`。新报表加载后，将报表标题更改为“按分支预估成本”。\n9.  点击功能区中的 `插入` 选项卡，然后选择 `报表部件`。您应该会看到 `报表部件库`\
  \ 窗格在屏幕右侧显示，如 图 13-73 所示。从 `报表部件库` 窗口中，您可以搜索报表部件，查看有哪些报表部件可用以及是谁创建的。您甚至可以在缩略图视图下预览报表部件的外观。\n\
  \    ![Image](img/9781430238102_Fig13-73.jpg)\n    `图 13-73。` 查看报表部件库\n10. 在报表中使用报表部件非常简单，只需将其拖放到设计图面上即可。既然如此，将\
  \ `EstimatedCostByBranch_Pie` 图表拖到设计图面上，并使其左侧与标题对齐。点击 `开始` 选项卡，然后运行报表。使用 `服务年份 2009`\
  \ 执行报表的效果可以在 图 13-74 中看到。\n11. 将报表保存到 `报表服务器`，方法与前面的示例相同，名称为 `EstimatedCostByBranch_RB3_Report_Using_ReportPart`。在修改报表部件后，我们将稍后查看此报表。\n\
  \n![Image](img/9781430238102_Fig13-74.jpg)\n\n`图 13-74。` 使用已部署报表部件的报表\n\n\n正如您所见，部署和使用报表部件是一个相当直接的过程。如果架构设计得当并有扎实的报表开发人员，许多报表部件可以存储在报表服务器上，并供报表作者重复使用，以简化报表开发。\n\
  \n![Image](img/square.jpg) **注意** 本节（“报表部件”）中使用的报表名为 `EmployeeSvcCost_RB3_ReportPart.rdl`，它包含在我们本书自始至终都在使用的\
  \ `Pro_SSRS` 解决方案中。`Pro_SSRS` 解决方案可以在 Apress 网站 `(`[`www.apress.com`](http://www.apress.com)`)`\
  \ 的本书源代码/下载区域找到。\n\n您可能还记得，我之前提到过，当对报表部件进行更改并将其保存到报表服务器时，使用该报表部件的每个报表都会收到通知。请按照以下步骤查看实际操作：\n\
  \n> 1.  启动报表生成器后，点击左上角的 `Report Builder` 图标，然后点击 `Open`。\n> 2.  导航到您解压 `Pro_SSRS`\
  \ 解决方案的位置，并找到 `EmployeeSvcCost_RB3_ReportPart.rdl` 文件。点击 `Open` 以在报表生成器 3.0 中加载该报表。此报表与我们之前打开的报表相同。我们现在将对其进行微小更改，然后重新发布报表部件。\n\
  > 3.  将图表标题的字体颜色更改为蓝色并设置为斜体。不是重大更改，我们只是想看看更改报表部件时会发生什么。像之前一样，使用报表生成器菜单按钮中的 `Publish\
  \ Report Parts` 功能部署报表部件。这次仅发布图表。\n> 4.  现在，让我们打开我们保存到报表服务器上的 `EstimatedCostByBranch_RB3_Report_Using_ReportPart`，该报表包含原始报表部件的一个副本。点击\
  \ `Report Builder` 菜单按钮并选择 `Open`。导航到保存报表的报表服务器位置，并打开 `EstimatedCostByBranch_RB3_Report_Using_ReportPart`\
  \ 报表。当您打开报表时，您应该会看到一个标题为“Updated Report Parts”的消息框在选项卡条和报表设计区域之间弹出（`图 13-75`）。这表明我们使用的报表部件已被更改。\n\
  >\n>     ![Image](img/9781430238102_Fig13-75.jpg)\n>\n>     ***图 13-75.** 已更新报表部件的消息指示器*\n\
  >\n>\n> 5.  点击 `View Updates` 按钮查看发生了哪些变化。当“更新报表部件”屏幕出现时，我们应该能看到已更改的内容，以及在更改的报表部件旁边有一个复选框。如果我们将复选框留空，我们的报表将保持原样，不会接受这些新更改。相反，如果我们在复选框中打勾，它将用新的报表部件更新我们的报表。我们还可以在报表部件更新时禁用通知。这实质上是告诉\
  \ Reporting Services，该报表不关心报表部件是否曾经更改。如果您禁用此选项，将不会收到更改通知。点击复选框以更新 `EstimatedCostByBranch_Pie`\
  \ 报表部件，然后点击 `Update`，如 `图 13-76` 所示。\n\n![Image](img/9781430238102_Fig13-76.jpg)\n\
  \n***图 13-76.** 更新使用了已更新报表部件的报表*\n\n通过用更新后的报表部件更新我们的报表的结果可以看到，我们现在看到一个蓝色、斜体的图表标题。在我看来，内置于报表生成器\
  \ 3.0 中的报表部件功能是迄今为止对即席报表功能的最佳补充之一。如果您和我一样，当您在为最终用户（他们属于报表作者角色）思考要创建哪些新的报表部件时，您的大脑可能正在飞速运转——从而使他们能够快速高效地创建即席报表。\n\
  \n## 总结\n\n即席报表让用户能够即时创建自己的报表。这一直是任何报表平台高度要求的功能，Reporting Services 也不例外。如本章所示，Microsoft\
  \ 决定以报表生成器 1.0 的形式交付他们的第一个即席报表版本。他们在报表生成器 2.0 中显著增强了用户体验，允许从关系数据源和 OLAP 数据源报告数据。随着\
  \ SQL Server 2008 R2 的发布，推出了 Microsoft 的最新版本——报表生成器 3.0。此外，我们向您展示了一个名为“报表部件”的惊人功能，它允许报表作者重用现有报表的节，从而节省数小时甚至数天的报表开发时间。在本章中，您了解了它们各自的优点和一些局限性。您可能已经得到了关于报表生成器是否是您的用户会想要的工具这个问题的答案。如果答案是“是”，正如我们希望的那样，那么好消息是这些功能都是作为标准功能包含在内的。\n\
  \n"
