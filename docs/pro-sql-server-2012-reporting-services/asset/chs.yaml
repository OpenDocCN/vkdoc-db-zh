  \ Web 服务，你可以用 SSRS 实例中 `Chapter_9` 目录的报表项来填充下拉列表。你应当已经从本章的设置中在该文件夹中至少拥有一个报表。\n\n\
  你将使用刚刚注册的 Web 服务来检索 `Chapter_9` 目录中的所有报表项。你将用来执行此操作的 Web 服务方法是 `ListChildren`。此函数接受两个参数：从中收集列表的路径，以及一个用于确定搜索是否应为递归的布尔值。由于你只想从\
