  描述: {0} - ID: {1}\", s.Description, s.ScheduleID));\n                 }\n      \
  \           //将列表项绑定到组合框\n                 sharedSchedules.DataSource = aList;\n\
  \                 sharedSchedules.DisplayMember = \"Display\";\n               \
  \  sharedSchedules.ValueMember = \"Value\";\n                 }\n      }\n     \
  \ catch (SoapException ex) { MessageBox.Show(ex.Detail.InnerXml.ToString()); }\n\
  }\n```\n\n## 安排报表\n\n现在您有了可用调度选项的列表，您需要添加一些代码来处理用户选择根据共享计划之一或根据快照创建来计划报表交付的情况。为此，您将使用报表服务\
  \ Web 服务的另一个方法，`CreateSubscription`。API 的 `CreateSubscription` 方法接受六个参数：\n\n> *\
  \   `Report`：要为其创建订阅的报表的完整路径名。\n> *   `ExtensionSettings`：一个传递扩展，包含特定于该扩展的设置列表。SSRS\
  \ 2012 附带两个内置扩展：电子邮件传递扩展和文件共享传递扩展。\n> *   `Description`：显示给用户的有意义的描述。\n> *   `EventType`：触发订阅的事件类型。有效值为\
  \ `TimedSubscription` 和 `SnapshotUpdated`。\n> *   `MatchData`：与指定的 `EventType` 参数关联的数据。此参数由事件用于将订阅与已触发的事件进行匹配。\n\
  > *   `Parameters`：一个 `ParameterValue[]` 对象数组，包含报表的参数列表。\n\n在您的报表调度器中，您将创建一个新方法\
  \ `ScheduleReport`，每当用户选择安排报表时都会调用此方法。此方法将这些参数设置为适当的值，然后调用 SSRS 2012 报表服务器 Web 服务的\
  \ `CreateSubscription` 方法。大多数值只是字符串，设置起来很简单。\n\n检查用户是否选择了订阅，如果是，检查它是基于共享计划还是快照。您将据此设置\
  \ `EventType`。如果用户选择了共享计划，则将变量 `matchData` 设置为 `ScheduledlD`。如果不是，则将该变量设置为 `null`\
  \ 以告诉 SSRS 2012 基于快照触发它。\n\n```\nif (sharedSchedules.SelectedValue.ToString() ==\
  \ \"SS\")\n{\n      eventType = \"SnapshotUpdated\";\n      matchData = null;\n\
  }\nelse\n{\n      eventType = \"TimedSubscription\";\n      matchData = sharedSchedules.SelectedValue.ToStringQ;\n\
  }\n```\n\n要设置订阅，您必须向 SSRS 2012 提供有关如何传递订阅的一些信息。为此，通过 `ExtensionSettings` 对象设置传递扩展，该对象本身包含\
  \ `ParameterValue` 对象。`ParameterValue` 对象本质上是名称-值对，使得 `ExtensionSettings` 对象本质上是一个名称-值对数组。\n\
  \n要使用 `ExtensionSettings` 对象，需使用您的传递设置创建 `ParameterValue` 对象（您的名称-值对），然后将它们添加到 `ExtensionSettings`\
  \ 对象中。然后，您将调用 `CreateSubscription` 方法并传入 `ExtensionSettings` 对象，以向 SSRS 2012 提供订阅详细信息。（详见代码清单\
  \ 10-7。）\n\n如果用户决定使用基于共享计划的订阅，并且报表接受参数，那么您需要从报表查看器界面收集这些参数，以便在订阅中设置它们。这些是每当订阅运行报表时，报表将使用的运行参数值。为此，您将向\
  \ `PickSchedule` 窗体添加代码以调用 `GetParameters` 窗体。由于 `GetParameters` 类以 `Winforms.ReportParameters`\
  \ 的形式返回值，您必须将它们转换为报表服务器 Web 服务所需的 `ParameterValue` 对象数组。您唯一需要的另一个项是报表本身，您已经将其作为在窗体构造函数中设置的类级别变量。最终方法应类似于代码清单\
  \ 10-7；请将其添加到 `PickSchedule.cs` 中。\n\n***代码清单 10-7.** 报表调度器*\n\n\n\n## 实现调度报告功能\n\
  \n以下代码展示了 `ScheduleReport` 方法的实现，该方法负责创建报告订阅。\n\n```csharp\nprivate void ScheduleReport()\n\
  {\n     // See whether the user wants to schedule this versus run it now\n     if\
  \ (sharedSchedules.SelectedValue.ToString() != \"NS\")\n     {\n          string\
  \ desc = \"Send report via email\";\n          string eventType = String.Empty;\n\
  \          string matchData = String.Empty;\n\n          // If the user selected\
  \ SnapShot, then\n          // set up the parameters for a snapshot\n          if\
  \ (sharedSchedules.SelectedValue.ToString() == \"SS\")\n          {\n          \
  \     eventType = \"SnapshotUpdated\";\n               matchData = null;\n     \
  \     }\n          // otherwise the user is using a subscription\n          else\n\
  \          {\n               eventType = \"TimedSubscription\";\n              \
  \ matchData = sharedSchedules.SelectedValue.ToString();\n          }\n\n       \
  \   ParameterValue[] extensionParams = new ParameterValue[8];\n          extensionParams[0]\
  \ = new ParameterValue();\n          extensionParams[0].Name = \"TO\";\n       \
  \   extensionParams[0].Value = \"someone@company.com\";\n          extensionParams[1]\
  \ = new ParameterValue();\n          extensionParams[1].Name = \"ReplyTo\";\n  \
  \        extensionParams[1].Value = \"reporting@company.com\";\n          extensionParams[2]\
  \ = new ParameterValue();\n          extensionParams[2].Name = \"IncludeReport\"\
  ;\n          extensionParams[2].Value = \"True\";\n          extensionParams[3]\
  \ = new ParameterValue();\n          extensionParams[3].Name = \"RenderFormat\"\
  ;\n          extensionParams[3].Value = \"PDF\";\n          extensionParams[4] =\
  \ new ParameterValue();\n          extensionParams[4].Name = \"Subject\";\n    \
  \      extensionParams[4].Value = \"@ReportName was executed at @ExecutionTime\"\
  ;\n          extensionParams[5] = new ParameterValue();\n          extensionParams[5].Name\
  \ = \"Comment\";\n          extensionParams[5].Value = \"Here is your @ReportName\
  \ report.\";\n          extensionParams[6] = new ParameterValue();\n          extensionParams[6].Name\
  \ = \"IncludeLink\";\n          extensionParams[6].Value = \"True\";\n         \
  \ extensionParams[7] = new ParameterValue();\n          extensionParams[7].Name\
  \ = \"Priority\";\n          extensionParams[7].Value = \"NORMAL\";\n\n        \
  \  // Configure the extension settings required\n          // for the CreateSubscription\
  \ method\n          ExtensionSettings extSettings = new ExtensionSettings();\n \
  \         extSettings.ParameterValues = extensionParams;\n          extSettings.Extension\
  \ = \"Report Server Email\";\n\n          // Get the report parameters using the\
  \ GetParameters form\n          GetParameters reportParameters = new GetParameters(url);\n\
  \          reportParameters.ShowDialog();\n          Microsoft.Reporting.WinForms.ReportParameter[]\
  \ rps = reportParameters.Parameters;\n\n          // Convert the Winforms.ReportParameter\
  \ returned\n          // from the GetParameters to ParameterValues required for\n\
  \          // the CreateSubscription method\n          int i = 0;\n          foreach\
  \ (Microsoft.Reporting.WinForms.ReportParameter rp in rps)\n          {\n      \
  \         if (rp.Values.Count != 0) i++;\n          }\n\n          ParameterValue[]\
  \ pvs = new ParameterValue[i];\n          int j = 0;\n          foreach (Microsoft.Reporting.WinForms.ReportParameter\
  \ rp in rps)\n          {\n               if (rp.Values.Count != 0)\n          \
  \     {\n                    pvs[j] = new ParameterValue();\n                  \
  \  pvs[j].Name = rp.Name;\n                    pvs[j].Value = rp.Values[0]; j++;\n\
  \               }\n          }\n\n          // Now set up the subscription\n   \
  \       try\n          {\n               rs.CreateSubscription(report, extSettings,\
  \ desc, eventType, matchData, pvs);\n          }\n          catch (SoapException\
  \ ex)\n          {\n               MessageBox.Show(ex.Detail.InnerXml.ToString());\n\
  \          }\n     }\n}\n```\n\n要完成 `PickSchedule` 窗体，需要将 `setSchedule` 按钮的点击事件连接起来，使其调用\
  \ `ScheduleReport` 方法，从而根据用户选择的调度实际安排报告。在 `PickSchedule.cs` 的设计模式下，双击“确定”按钮。添加如\
  \ **代码清单 10-8** 所示的代码。\n\n**代码清单 10-8.** 将调度按钮的点击事件连接到 `ScheduleReport` 方法\n\n```csharp\n\
  private void setSchedule_Click(object sender, EventArgs e)\n{\n     ScheduleReport();\n\
