  ## 理解报表定义语言


  RDL 是一个标准，所有使用 Visual Studio 2010 内置 SSRS 工具及其他 SSRS 服务创建的报表都遵循此标准。RDL 是一种基于 XML
  的模式，它定义了报表的每个元素，例如格式、数据集信息、分组和排序以及参数和筛选器。当你向报表中添加项目时，RDL 代码会随之更改以包含每个新增项。


  在集成开发环境中，这些代码更改通常是不可见的，因为它们在后台进行。然而，偶尔你可能需要直接修改 RDL，以使用查找和替换方法进行全局更改。当源存储过程中的参数或字段名称发生更改时，我们不得不多次这样做。在
  Visual Studio 2010 中处理报表时，你可以通过点击菜单中的“视图”>“代码”或右键单击报表并选择“查看代码”来直接查看 RDL 代码。


  Visual Studio 2010 和 BIDS 是当前 SSRS 的主要报表设计器，但随着越来越多的公司采用 RDL，其他报表设计器可能会出现。事实上，在
  SQL Server 2005 中，Microsoft 引入了一个报表生成器应用程序，允许最终用户设计和发布 SSRS 报表。SQL Server 2008 包含了一个新版本，恰当地命名为
  Report Builder 2.0，它采用了 Microsoft Office Ribbon 技术并进行了彻底的改版，进一步将报表开发交到报表请求者的手中。随
  SQL Server 2008 R2 发布的 Report Builder 3.0 拥有更多用于临时最终用户报告的功能。Report Builder 1.0 和
  2.0 仍可用于向后兼容，并且 1.0 版本仍然依赖于报表模型作为其数据源，这与 2.0 和 3.0 版本不同。第 13 章将更详细地介绍 Report Builder
  1.0、2.0 和 3.0 应用程序及其组件。


  在本章中，我们将展示你正在处理的报表对象的 RDL 部分，以显示在设计报表时 RDL 是如何更新的。完整的 RDL 模式可在 [`http://schemas.microsoft.com/sqlserver/reporting/2008/01/reportdefinition`](http://schemas.microsoft.com/sqlserver/reporting/2008/01/reportdefinition)
  获取。


  ### 添加报表


  根据 Microsoft 的一般策略，有不止一种方法可以将报表添加到项目中。一种方法是使用向导来完成报表创建过程，但目前，我们只是将一个空白报表添加到我们的项目中。在解决方案资源管理器中右键单击“报表”文件夹，选择“添加”，然后选择“新建项”。请注意，你也有添加现有项的选项。如果你已经有一个要添加到项目的报表，或者你已经构建了一个模板报表文件作为基础起点，这个选项很有用。现在，在如图
  3-5 所示的“添加新项”对话框中选择“报表”，然后单击“添加”，在项目中创建一个名为 `Report1.rdl` 的空白报表。


  ![Image](img/9781430238102_Fig03-05.jpg)


  *图 3-5. BIDS 中的添加新项对话框*


  新报表应在设计环境中打开，但如果没有打开，请双击解决方案资源管理器中的新报表。默认情况下，报表名为 `Report##.rdl`，其中 `##` 是序列中下一个可用的报表编号。此时，报表是一张白纸。图
  3-6 显示了 IDE，包括解决方案资源管理器、工具箱和报表数据窗口。如果你熟悉在 Visual Studio 2005 中创建报表，你会注意到“数据”选项卡已从“设计”和“预览”选项卡中分离出来，现在位于一个专用的“报表数据”窗口中。在
  SQL Server 2008 R2 版本中，我们在报表数据窗格中被提供了另一个名为“数据源”的文件夹。现在，只需记住这个新的 IDE 旨在集中管理你的本地和共享数据源。同样，从
  VS 2005 过来，你会注意到新的“行组”和“列组”区域，旨在更轻松地管理 Tablix 风格的分组。与任何包含来自数据源数据的报表一样，第一步是在报表和数据源以及一个或多个数据集之间建立链接。我们将在下一节中完成这两项操作。


  ![Image](img/9781430238102_Fig03-06.jpg)


  *图 3-6. 加载了 `Report1.rdl` 的 BIDS IDE*


  ### 设置数据源和数据集


  在 SSRS 中创建的每个报表都包含一个*数据源*和一个*数据集*。数据源不仅定义了为检索数据而建立的连接类型（无论是 SQL Server、Analysis
  Services 还是 Oracle），还定义了特定的连接属性，例如服务器、数据库名称和安全凭据。另一方面，数据集是从数据源返回的数据、行和列或字段。数据集是通过构建一个从数据源检索信息的查询来创建的。这个查询，在
  SQL Server 数据源的情况下，可以是一个直接嵌入报表中的基于文本的查询，或者是一个存储过程。


  在第 2 章中，你创建了一个名为 `Emp_Svc_Cost` 的存储过程，其中包含员工和患者就诊信息。在本章中处理大多数报表对象时，你将使用该过程作为你的数据集。对于其他报表对象，例如图像报表对象，你将使用直接查询而不是
  `Emp_Svc_Cost` 存储过程。



  ### 创建数据源


  每份报表可以使用一个或多个数据源。使用相同数据源的报表——例如连接到特定 SQL Server 数据库的数据源——可以使用 SSRS 中所谓的 `共享数据源`。共享数据源会随报表一同发布，并可在部署后在报表服务器上进行修改。在
  BIDS 中，共享数据源包含若干属性，您必须先配置这些属性才能使用它们。


  让我们逐步完成为存储过程 `Emp_Svc_Cost` 创建共享数据源的过程。首先，在解决方案资源管理器中右键单击 `共享数据源`，然后选择 `添加新数据源`；此时将出现
  `共享数据源属性` 对话框。其次，单击对话框中的 `编辑` 按钮以创建连接字符串。在本例中，您知道包含源数据库和存储过程的服务器位于本地 SQL Server
  上，因此您可以键入 `localhost` 作为服务器名称。由于我们在上一窗口中保留了默认连接类型，因此数据源属性设置为 `Microsoft SQL Server
  (SqlClient)`。在键入 `localhost` 作为服务器后，您可以从数据库下拉选择列表中选择 `Pro_SSRS` 数据库。在本例中，由于数据库配置为同时使用
  Windows 和 SQL 身份验证，请选择 `使用 Windows 身份验证` 选项。如果您选择使用 SQL 身份验证，还可以选择存储 SQL 用户名和密码。通常，Windows
  身份验证是首选方法，因为它为用户提供了单一登录点（第 11 章 介绍了已部署报表的身份验证）。图 3-7 显示了数据源连接属性。您可以通过单击 `测试连接` 按钮来测试连接。


  ![Image](img/9781430238102_Fig03-07.jpg)


  `图 3-7. 数据源连接属性`


  ![Image](img/square.jpg) **注意** 在 Reporting Services 2012 中，您可以从多种数据源类型中选择。SQL Server
  恰好是默认值，但您可以从 SQL Azure、Analysis Services、Oracle、SAP 和 TERADATA 等来源获取数据。当然，您也可以使用通用的
  OLE DB 和 ODBC 数据源。


  现在您已经拥有一个共享数据源。请注意，其名称默认为 `DataSource1`。您可以通过右键单击它，选择 `重命名`，并输入 `Pro_SSRS.rds` 作为新名称来对其进行重命名。良好的做法是为每个数据源赋予一个有意义的名称，例如它将连接到的数据库的名称。在实际环境中，您将在不同的服务器上部署报表和/或数据库，因此不建议在数据源名称前加上包含数据库的服务器名称。换句话说，不建议将您的数据源命名为
  `DEV_Pro_SSRS` 来表示开发数据源，您也不会想将数据源命名为类似 `Server1_Pro_SSRS` 的名称。


  在实践中，我们使用相同的名称开发了所有报表。但是，由于我们的每个在线客户都有一个唯一标识他们的数据库名称，我们设计了一个应用程序，在发布后重置数据源中的数据库属性。这样，我们就可以对相同的数据库架构使用相同的报表，但可以将它们部署到同一报表服务器上的多个客户。


  在此示例中，您创建的数据源文件具有 `.rds` 扩展名，并与报表分开存储和发布。您可以在文本编辑器中打开 `.rds` 文件，因为它是一个 XML 文件，定义了您刚刚以图形方式创建的连接属性。清单
  3-1 显示了 `Pro_SSRS.rds` 文件。


