- "# 创建数据集\n\n你的下一步是前往“报表数据”区域以创建第一个数据集。无论你是否已在 BIDS 之外的应用程序中开发了查询或存储过程，或者你现在正从报表中开始创建，这都适用。在此示例中，你将使用一个已完成并测试过的存储过程，因此一半的战斗已经结束。\n\
  \n使用 BIDS 开发 SSRS 2008 R2 和 SSRS 2011 报表时，你通过两个步骤创建数据集：创建到数据源的链接和获取报表所需的数据。\n\n\
  > 1.  在“报表数据”框中，选择 `<新建数据集...>`，这将打开“数据集属性”对话框。每个数据集默认名称格式为 `DataSet##`，其中 `##`\
  \ 是序列中下一个未使用的数字。\n> 2.  你可以使用共享数据集，但在此示例中，你将使用嵌入在报表中的数据集。选择“使用嵌入在我报表中的数据集”选项。\n\
  > 3.  现在，在此数据集和我们之前创建的数据源之间建立链接。单击数据源下拉框旁边的“新建”按钮。\n> 4.  在“数据源属性”窗口中，将数据源命名为 `Pro_SSRS`\
  \ 并选择 *使用共享数据源引用*。\n> 5.  单击下拉列表框，选择我们之前创建的 `Pro_SSRS` 共享数据源。\n> 6.  图 3-8 显示了这些设置的数据源属性窗口。单击“确定”保存你的设置。\n\
  \n![Image](img/9781430238102_Fig03-08.jpg)\n\n**图 3-8.** 数据源属性\n\n现在我们有了到共享数据源的链接，我们可以将数据集指向我们的存储过程。在“查询类型”部分，将默认的“文本”更改为“存储过程”。在“选择或输入存储过程名称”文本框中，输入你的存储过程名称\
  \ `Emp_Svc_Cost`，如图 3-9 所示。最后，为新数据集输入 `Pro_SSRS_DS` 作为名称，并单击“确定”完成数据集配置。\n\n![Image](img/9781430238102_Fig03-09.jpg)\n\
  \n**图 3-9.** 数据集属性\n\n当你单击“确定”时，“报表数据”窗口后台会发生几件事。在“数据源”文件夹下创建了一个名为 `Pro_SSRS` 的数据源，在“数据集”文件夹下创建了一个名为\
  \ `Pro_SSRS_DS` 的数据集。此数据集填充了存储过程中的可用字段。同时，BIDS 会创建存储过程接受的所有参数。此时你无法看到实际数据，但你可以右键单击数据集并选择“查询…”以调出默认的通用查询编辑器，你可以在其中执行存储过程。在执行时，系统会提示你输入存储过程定义的任何参数；你必须在返回数据之前提供参数值。对于此存储过程，定义了五个参数：`@ServiceYear`、`@ServiceMonth`、`@BranchID`、`@EmployeeTblID`\
  \ 和 `@ServicesLogCtgryID`。当在“报表数据”框中执行存储过程时，参数的可用默认值是 `NULL` 或 `空白`。与 `NULL` 值不同，`空白`\
  \ 值可以是空字符串。`NULL` 值表示该值未知，并且 `NULL` 值不能与非 `NULL` 值一起进行计算。在第 2 章中，你已将逻辑构建到存储过程中以处理\
  \ `NULL` 参数值，以便当用户未提供值时，查询返回所有记录。如果用户选择了特定值，则仅返回与该参数值匹配的记录。使用 `NULL` 值执行存储过程，并确保你获得预期的结果。你可以在图\
  \ 3-10 中看到存储过程执行的结果。\n\n![Image](img/9781430238102_Fig03-10.jpg)\n\n**图 3-10.**\
  \ 从存储过程返回的数据\n\n![Image](img/square.jpg) **注意** 当系统提示你输入参数值时，`空白` 是默认值。为使存储过程执行时不出现数据类型错误，你必须选择\
  \ `NULL` 值。\n\n一个 SSRS 报表可以同时使用多个数据集。这扩展了报表的灵活性，因为你可以在单个报表中为用户提供更多数据。多个数据集对于填充参数下拉列表也很有用，你将在第\
  \ 6 章中执行此操作。但是，拥有过多数据集可能会影响报表的性能，因此确保每个结果集的执行时间在可接受的范围内非常重要。\n\n每个报表的 RDL 文件包含报表定义的每个数据集的一个部分。清单\
  \ 3-2 显示了你在本章定义的数据集的 RDL 示例。\n\n**清单 3-2.** RDL 的数据集部分\n\n```xml\n<DataSets>\n \
  \  <DataSet Name=\"Pro_SSRS_DS\">\n<Fields>\n   <Field Name=\"PatID\">\n<DataField>PatID</DataField>\n\
  \        <rd:TypeName>System.Int32</rd:TypeName>\n   </Field>\n   <Field Name=\"\
  Patient_Name\">\n<DataField>Patient Name</DataField>\n<rd:TypeName>System.String</rd:TypeName>\n\
  \   </Field>\n   <Field Name=\"BranchName\">\n<DataField>BranchName</DataField>\n\
  <rd:TypeName>System.String</rd:TypeName>\n   </Field>\n   <Field Name=\"EmployeeID\"\
  >\n<DataField>EmployeeID</DataField>\n<rd:TypeName>System.String</rd:TypeName>\n\
  \   </Field>\n   <Field Name=\"Employee_Name\">\n<DataField>Employee Name</DataField>\n\
  <rd:TypeName>System.String</rd:TypeName>\n   </Field>\n   <Field Name=\"EmployeeClassID\"\
  >\n<DataField>EmployeeClassID</DataField>\n<rd:TypeName>System.String</rd:TypeName>\n\
  \   </Field>\n   <Field Name=\"Service_Type\">\n...\n```\n\n创建数据集时，有几个附加选项卡包含其他配置属性：\n\
  \n> *字段*：定义其他字段，例如计算字段或未随数据源自动定义的字段。你根据表达式派生计算字段。\n>\n> *选项*：设置特定于从数据提供程序检索数据时的若干选项，例如区分大小写和排序规则。\n\
  >\n> *参数*：定义数据集的查询参数值及其评估顺序。声明了参数的存储过程会在 SSRS 中自动生成查询参数。\n>\n> *筛选器*：定义数据集的筛选器值，可在执行报表时使用。\n\
  \n## 创建其他数据源\n\nSSRS 有一个令人兴奋的特性，它不仅能查询 SQL Server，还能查询多种数据源类型。如前所述，任何 ODBC 或 OLE\
  \ DB 提供程序都可以作为 SSRS 的数据源，XML、SSIS 和 SAP 同样可以。为了展示一个使用 SQL Server 数据库之外数据源的简单示例，让我们看看用于\
  \ Microsoft 目录服务的 OLE DB 提供程序。创建到目录服务的数据源与您用于创建 SQL Server 数据源的过程类似，区别在于您需要在数据源属性中选择\
  \ OLE DB 作为数据源类型，并为 OLE DB 提供程序选择用于 Microsoft 目录服务的 OLE DB 提供程序。\n\n通过使用直接的 LDAP\
  \ 查询，您可以生成用于 SSRS 的字段信息，如下所示：\n\n```sql\nSELECT en,sn,objectcategory,department\n\
  FROM  'LDAP://DirectoryServerName/OU=OuName,DC=Company,DC=Com'\n```\n\n该查询使用标准的\
  \ SQL 方言，从 Active Directory 返回通用名称、姓氏、对象类别（计算机或人员）和部门。字段名称会自动创建，并可像报表中的任何其他数据字段一样使用。\n\
  \n在查询 Active Directory 或任何其他不支持 SSRS 图形化查询设计器的数据源时，您必须考虑几个注意事项：\n\n> *   查询参数在查询中不被直接支持。但是，您可以在查询中定义和使用报表参数——这被称为*动态查询*——来过滤数据。\n\
  > *   由于没有图形化查询设计器可用，您需要通过直接键入查询并在通用查询设计器中进行测试来开发查询。这需要了解 Active Directory 对象和名称。\n\
  \n`![Image](img/square.jpg)` **`提示`** 有几种工具可用于协助管理 Active Directory，例如 Active Directory\
  \ 应用程序模式（ADAM）；LDP，一个 Active Directory 工具；以及 ADSIEdit，一个图形化的 Active Directory 浏览器。两者都包含在\
  \ Windows 支持工具中。\n\n### 配置参数\n\nSSRS 中的参数有两种类型，*查询参数* 和 *报表参数*，这两者通常紧密相关。\n\n您使用基于\
  \ SQL 查询或存储过程的参数来限制返回到报表的记录集，通常位于查询的 `WHERE` 子句中。在源查询中，您通过在参数名称前加上 `@` 符号来定义参数，例如\
  \ `@MyParameter`。在 SSRS 的查询设计工具中，这会产生两个作用：它强制查询在执行时提示输入参数的值。其次，它会自动使用相同的名称创建另一个参数，即报表参数。对于存储过程，例如您在上一章创建并在此处使用的\
  \ `Emp_Svc_Cost`，存储过程中定义的任何参数也会为报表自动创建。\n\n报表参数可以独立于查询或存储过程而存在。例如，您可以有一个控制报表行为或布局属性的报表参数。当您以这种方式使用报表参数时，它通常链接到报表筛选器或用于控制报表项属性值的表达式中。在\
  \ 图 3-11 中，您可以看到当我们执行 `Emp_Svc_Cost` 存储过程时为我们自动创建的报表参数。您还可以看到单个参数（如 `ServiceMonth`）的报表参数对话框，您可以通过双击参数或右键单击并选择“参数属性”来打开它。报表参数在\
  \ Visual Studio 或 BIDS 中现在集中显示在“报表数据”框中，而在早期版本中，它们包含在自己的报表参数属性框中。报表参数在报表中用于设置数据集的条件以及控制报表设计布局元素，您将在\
  \ 第 6 章 中详细执行此操作。\n\n`![Image](img/9781430238102_Fig03-11.jpg)`\n\n***图 3-11.**\
  \ 报表参数对话框*\n\n图 3-11 还显示了“允许多值”复选框，这是 SQL Server 2005 的一个新 SSRS 功能。多值参数允许用户选择所有值或值的组合，以在报表中用于限制显示的数据。当选择多个值时，它们作为字符串数组传递给查询或存储过程。重要的是要注意，多值参数在报表中实现时需要以下特殊考虑：\n\
  \n> *不接受 NULL 值*：在决定将哪些参数设为多值时，这一点很重要，因为它会影响底层查询或存储过程的设计。在这种情况下，您在 `Emp_Svc_Cost`\
  \ 存储过程中构建了逻辑以接受 `NULL` 值，并在从参数传入 `NULL` 时返回所有数据。您将需要修改此存储过程以与多值参数配合工作。\n>\n> *将被视为字符串*：由于多值参数返回逗号分隔的字符串，您需要考虑存储过程参数的数据类型分配——报表参数与查询或存储过程参数需要具有相同的数据类型才能正常工作。\n\
  >\n> *影响性能*：当值列表相对较小时，最好使用多值参数。选择允许用户选择年份范围——例如“2010,2011,2012”——比允许他们基于 ID 选择 1,000\
  \ 名患者要好得多，因为这些值都将作为逗号分隔的字符串值传入存储过程，以使用 `IN` 或 `EXISTS` 子句进行评估。\n>\n> *不能用于筛选器*：与\
  \ SSRS 中的单值或可为空参数不同，多值参数只能用于传回查询或存储过程，因此不能将它们用于报表筛选器来限制数据。\n>\n> *在存储过程中需要字符串处理逻辑*：存储过程无法正确评估多值参数，因此，例如在存储过程中使用\
  \ `IN (@MyReportParameterArray)` 将不会返回预期的结果。这是 SQL 长期以来的一个问题，存在多种方法（无论好坏）来处理存储过程中的多值字符串数组。两种可能的选择是用户定义函数（UDF）和动态\
  \ SQL。在第 6 章中，涵盖了构建可部署报表的内容，我们将讨论如何使用一个特殊的 UDF，它将多值报表参数解析为一个表，该表将有效地将结果集限制为完全符合预期的内容。\n\
  \n\n## 第 4 章：布局报表\n\n现在，是时候深入 IDE 中你可能花费最多时间的区域了：`设计`选项卡。真正的创意魔法将从这里开始，我们这么说可不仅仅是因为其中可能会涉及一两个向导。\n\
  \n不同的报表需求和目标受众意味着每份报表的外观和感觉不会千篇一律。一位用户可能期待向下钻取功能，而其他人可能需要用于打印的完整、详细的数据列表。无论哪种情况，SSRS\
  \ 在 `工具箱` 中提供了许多工具，用于快速高效地构建高质量的报表，这些报表可以直接从 `BIDS` 中部署。在接下来的章节中，你将使用示例数据，并通过探索每个可用工具和数据区域的功能来实际应用它们。\n\
  \n对于我们演示的每一个对象，我们将同时展示其设计环境的图形化表示及其对应的 `RDL` 代码。请注意，`RDL` 文件中定义的部分包含了报表的每个方面，从整体布局到分页。这一点很重要，因为直接在\
  \ `RDL` 文件中修改报表通常更为简便。当我们演示如何为示例报表项目添加功能时，我们会指出那些将图形化报表设计转换为代码的 `RDL` 文件部分。\n\n\
  ### 设置筛选器\n\n与参数类似，报表筛选器可以限制报表上的数据结果；然而，你不一定需要将它们与参数结合使用。实际上，筛选器可以在报表的多个位置定义，它评估一个表达式并根据该执行结果来筛选数据。筛选器采用以下形式：\n\
  \n`<筛选表达式> <运算符> <筛选值>`\n\n筛选器的一个例子是，将报表上的数据限制为特定用户，或基于来自参数值的用户输入进行限制。\n\n`第 11\
  \ 章` 将演示如何使用一个基于内置 `全局` 集合（其中包括执行报表的用户名）来限制报表的筛选器。筛选器很有用，因为一旦报表呈现，你可以结合参数来使用它们，以限制报表中的数据，而无需重新查询数据源。在\
  \ `图 3-12` 中，你可以看到一个基于名为 `用户` 的参数来限制显示数据的筛选器。其逻辑是：如果 `用户` 的参数值等于 `用户` 字段的值，则只包含匹配的记录。否则，包含所有记录。参数和筛选器作为\
  \ `RDL` 报表文件的元素被包含其中。\n\n![Image](img/9781430238102_Fig03-12.jpg)\n\n`图 3-12`. 表数据区域上的示例筛选器\n\
  \n`清单 3-3` 展示了筛选器的示例 `RDL` 元素。\n\n`清单 3-3`. 参数和筛选器 `RDL` 元素\n\n```\n<Filters>\n\
  \   <Filter>\n      <FilterExpression>=IIF(Parameters!User.Value is nothing, \"\
  All\", Parameters!User.Value)\n      </FilterExpression>\n      <Operator>Equal</Operator>\n\
  \         <FilterValues>\n              <FilterValue>=IIF(Parameters!User.Value\
  \ is nothing, \"All\", Fields!LastName.Value)\n              </FilterValue>\n  \
  \       </FilterValues>\n   </Filter>\n</Filters>\n```\n\n### 表达式\n\n在本节中，你将使用数据集中的字段来创建示例报表片段。由于字段值源自本质上是\
  \ `VB.NET` 代码的 *表达式*，我们现在就来介绍它们，因为它们在报表设计过程中扮演着至关重要的角色。\n\n你可以使用表达式为任何使用它们的报表项生成一个值。在\
  \ `SSRS` 中，你可以将表达式分配给几乎任何报表属性，从颜色或内边距等格式到文本框的值。一个简单的表达式，比如字段赋值，在设计报表时经常使用。事实上，每次向报表的某个区域添加一个字段时，它都会自动转换为一个表达式，像这样：\n\
  \n`=Fields!FieldName.Value`\n\n表达式通过在内容前加上等号 (`=`) 来标识。你还可以将表达式与其他函数和字面量连接起来。我们将在本书中展示几个表达式的例子。这里我们将列出几个示例表达式，并展示如何将它们分配给报表项：\n\
  \n> `=Parameters!ParameterName.Value`: 用于将参数值分配给报表项，例如文本框或表格中的单元格。\n>\n> `=IIF(Fields!FieldName.Value\
  \ > 10, \"Red\", \"Black\")`: 用于条件表达式。在这个例子中，如果 `FieldName` 的值大于 10，则将文本颜色属性设置为红色，否则设置为黑色。\n\
  >\n> `=Fields!FieldNamel.Value & \" \" & Fields!FieldName2.Value`: 用于连接两个字段的值。\n\
  >\n> `=Avg(Fields!FieldName.Value)`: 用于聚合函数，如 `Sum`、`Avg`、`Min`、`Count` 和 `Max`，这些函数返回指定字段的聚合值、最小值或最大值。\n\
  >\n> `=RowNumber(Nothing)`: 用于维护报表中行号的运行总计。这里的 `Nothing` 是传递给函数的一个范围参数，指示一个分组或数据集。范围参数可以是组名或数据集，在这种情况下，行计数将在每个组或数据集结束时重新开始。\n\
  \n在用于 `SQL Server 2005` 的 `SSRS` 中，报告开发环境中使用的表达式生成器应用程序被重建，以提供协助用户轻松创建有用表达式所需的功能。值得庆幸的是，此后的所有版本都保留了更高级的表达式生成器，它列出了大多数常用函数及其语法示例；此外，它们按类型（`文本`、`转换`、`日期和时间`）分类。这使得更快地找到正确的函数并将其作为你正在构建的表达式的一部分放置变得容易得多。开发者们已经习惯并坦率地说离不开的另一个强大功能是\
  \ `IntelliSense`，这是一个上下文相关的、行内的命令完成功能。如你在 `图 3-13` 中所见，当你键入一个表达式（在本例中是一个来自存储过程的字段值表达式）时，系统会根据该表达式提示所有可能的选择。一旦表达式完整且语法正确，你可以单击\
  \ `确定` 使该表达式成为你关联它的报表对象的一部分。如果存在任何语法错误，标准的红色下划线会标示出问题，将鼠标悬停在其上会显示错误类型，在大多数情况下是“语法无效”。这是对\
  \ `SSRS` 中表达式的一个快速介绍，但在 `第 6 章`，我们将使用它们来执行诸如在运行时设置默认参数和属性值等任务。\n\n![Image](img/9781430238102_Fig03-13.jpg)\n\
  \n`图 3-13`. `IntelliSense`: 分配表达式\n\n## 总结\n\n至此，我们只是触及了开发环境所能提供功能的皮毛。在本章中，你了解了开发环境以及\
  \ `Reporting Services` 设计的一些基本元素。你了解到每份报表都由基于 `RDL` 中已定义架构的明确定义的元素组成，这为 `SSRS` 带来了标准化的优势。我们介绍了一些构成报表的报表对象，例如\
  \ `数据源` 和 `数据集`。在 `第 4 章` 和 `第 5 章`，你将了解用于显示或表示数据集返回的数据的所有对象，例如 `文本框`、`矩形` 以及 `数据区域`，如\
  \ `Tablix`、`列表` 和 `矩阵`。\n\n\n\n## 设置分页\n\n首先，查看新报表的常规报表属性。在“设计”选项卡上，选择“报表”，然后从工具栏的下拉菜单中选择“报表属性”。\n\
  \n“报表属性”对话框中有四个选项：页面设置、代码、引用和变量。目前，您需要关注的是“页面设置”选项。如图 4-1 所示，“页面设置”对话框包含用于分页的属性设置，例如页面宽度和边距。自\
  \ SSRS 2008 以来，我们才能够选择标准的页面格式选项，例如纵向或横向方向。您的选择会自动设置宽度和高度属性值。由于许多报表将以横向格式打印，请选择“横向”。将所有边距保留为\
  \ 1 英寸。如果您仍在使用 SSRS 2005，则需要将高度和宽度属性设置为代表横向特征的值，例如宽度 11 英寸，高度 8.5 英寸。\n\n![Image](img/9781430238102_Fig04-01.jpg)\n\
  \n***图 4-1.** 报表属性的“布局”选项卡*\n\n如果您使用的是 2005 版本，“布局”选项卡还会有一个“列”设置，您可以在其中指定列数。此部分在\
  \ 2008 版本中已被移除，但它仍然是报表的一个属性。我们在医疗行业经常使用多列报表，主要用于打印标签。\n\n## 使用报表对象\n\n在接下来的几个部分中，您将了解报表对象的基本功能，并学习在开发报表时如何利用每个对象的独特多功能性。此时，如果您尚未操作，请打开我们提供的包含起始点和完整示例的\
  \ `Pro_SSRS` 解决方案，并在学习各个对象部分时参考它。我们将介绍以下报表对象：\n\n> *列表:* 这是一个用于单一数据分组的自由格式容器对象。\n\
  > \n> *文本框:* SSRS 2008 中的文本框报表可能是期待已久的增强功能。在之前的 SSRS 版本中，文本框只不过是用于统一的字面文本字符串和/或来自数据集的字段值的容器；所有内容都必须具有相同的格式。自\
  \ SSRS 2008 版本发布以来，这种情况已不再存在。\n> \n> *表格:* 用于具有行和列的表格报表，但提供单个或多个数据分组。\n> \n> *矩形:*\
  \ 与列表类似，矩形是一个容器，尽管它不提供数据分组。\n> \n> *矩阵:* 此报表对象与表格类似，提供多个分组级别，但将数据布局为交叉表或透视表风格的报表。\n\
  \n在 SSRS 2008 中，Microsoft 引入了 Tablix 控件，其核心是行级分组和列级分组的集合。在 SSRS 2008 之前，很难创建结合这两个分组级别的报表。您可以在列表、矩阵和表格这三个控件中使用\
  \ Tablix 属性，在三个报表对象内的任何级别上动态创建列或行组。对 Tablix 支持的 RDL 代码也已添加，正如我们在介绍支持 Tablix 属性的报表对象时将看到的那样。在第\
  \ 6 章中，您将看到有关向报表添加 Tablix 属性的更多细节。\n\n## 实现列表\n\n列表数据区域是允许数据分组的两个自由格式容器对象之一，另一个是矩形。这两个对象类似，因为它们可以包含其他报表对象和数据区域。自由格式数据区域不会将字段布局限制为固定格式；创建报表的人员负责对齐对象。\n\
  \n由于列表包含一个分组级别，因此只能将列表数据区域与单个数据集一起使用。请注意，列表数据区域基于此分组一次显示数据集中的一个记录。默认情况下，列表没有分配分组。\n\
  \n为了学习如何将列表数据区域与 `Emp_Svc_Cost` 存储过程（该过程返回患者访问次数的详细记录）结合使用，您将向设计区域添加一个列表，并将数据集中的字段拖入其中。您将使用\
  \ `Employee_Name`、`Patient_Name`、`Visit_Count` 和 `Estimated_Cost` 来显示每个患者/员工组合的总访问次数和费用。\n\
  \n在 `Pro_SSRS` 解决方案中，列表示例的起点报告名为“列表开始”。该报表已为 `localhost` 服务器定义了一个名为 `emp_svc_cost`\
  \ 的数据源和数据集，如果您使用 BIDS 连接到本地 SQL Server，这应该与您的环境匹配。\n\n首先，打开“列表开始”报表，然后单击“布局”选项卡。在开始创建报表之前，单击“报表”\
  \ ![Image](img/U001.jpg) “视图” ![Image](img/U001.jpg) “标尺”以使标尺在设计器上可见。接下来，通过双击“工具箱”中的列表对象，将列表报表对象添加到报表中。列表控件会自动添加到设计网格的左上角区域。抓住列表的右下角并向下拖动，直到其宽度约为\
  \ 7 英寸，高度约为 1 英寸。\n\n接下来，在“报表数据”工具栏中选择“数据集”，展开 `emp_svc_cost` 数据集，将以下列表中的字段拖到设计区域，并将它们放置在列表数据区域中：\n\
  \n> *   `Patient_Name`\n> *   `Employee_Name`\n> *   `Service_Type`\n> *   `Estimated_Cost`\n\
  > *   `Visit_Count`\n\n现在，将 Sum 函数添加到 `Visit_Count` 和 `Estimate_Cost` 字段中，以便每个字段的语法为\
  \ `=Sum(Fields!fieldname.Value)`。如果您已向列表添加了分组级别（您稍后将执行此操作），则 `Sum` 函数将自动添加到这些字段中。\n\
  \n接下来，调整字段大小，完成后报表看起来如图 4-2 所示。在 Visual Studio 2010 和 BIDS 中，当您处理报表对象的布局时，设计环境已得到增强，可在您拖放对象时控制自动对齐，因此设计专业外观的报表要容易得多。然而，此时您关心的不是美观，而是功能。\n\
  \n![Image](img/9781430238102_Fig04-02.jpg)\n\n***图 4-2.** 包含未分组字段的列表数据区域*\n\n当您单击预览按钮时，报表将生成并显示每个患者和员工的访问信息（参见图\
  \ 4-3）。请注意，`Visit_Count` 和 `Estimated_Cost` 字段的总和对于每条记录都是相同的。每个总和金额对于所有患者和员工都是相同的，因为您尚未为列表本身定义任何分组。您将在下一步进行此操作。\n\
  \n![Image](img/9781430238102_Fig04-03.jpg)\n\n***图 4-3.** 列表数据区域的预览*\n\n对于我们添加的列表，在报表的“行组”区域中有一个默认的（详细信息）行分组作为证据。但是，当前没有分配任何字段值作为组；它只是空白。要添加分组，请单击“行组”（详细信息）上的向下箭头，然后选择“组属性”。通过在“组表达式”区域中单击“添加”来添加两个字段——`Patient_Name`，然后是\
  \ `Employee_Name`——作为组表达式。\n\n\n"
- "# 使用具有 Tablix 属性的 List 对象\n\n现在，带有分组级别的新 List 的预览正确地显示了每位患者和每位员工组合的就诊次数。但是，请注意，在图\
  \ 4-4 中，Bill Shakespeare 出现了多次，例如，对应员工 Bailey McDonald 有 37 次就诊，对应员工 Sherri McDonald\
  \ 有 8 次就诊。你真正希望看到的是 Bill Shakespeare 只出现一次，其所有的员工和就诊信息都归总在图中。你可以移除 List 中的员工分组，但这会导致报告将所有患者的就诊归到一个单一的员工下，从而不准确地反映数据。\n\
  \n在早期版本的 SSRS 中，只有嵌套的 `List` 才能实现这种多级分组，报告开发者可能需要考虑使用替代的报表对象，比如表格——那虽然能达到所需的分组级别，但会丧失报表的自由布局感觉。然而，自\
  \ SSRS 2008 起，`List` 对象包含了 `Tablix` 属性。换句话说，当你从工具箱将一个 `List` 对象添加到设计 surface 上时，实际上创建的是一个\
  \ `Tablix`。`Table` 和 `Matrix` 对象也共享 `Tablix` 属性，并且是作为 `Tablix` 实现的。借助 `Tablix` 属性，可以在默认的详细信息组之上创建一个父分组，并将患者姓名信息添加到那里，这样，所需的字段\
  \ `Patient_Name` 和 `Employee_Name` 现在就可以分层地进行分组了。\n\n![Image](img/9781430238102_Fig04-04.jpg)\n\
  \n**图 4-4.** 包含重复患者的预览报告\n\n在 SSRS 2005 中，你不得不添加两个 List，一个嵌套在另一个内部，才能在一个容器对象内实现多级分组。我们在本书前一版中展示了这种方法。然而，随着\
  \ `Tablix` 属性的引入，我们只需简单地在 `Employee_Name` 之上添加另一个分组即可。为此，请右键单击我们添加了字段的 `List` 框的详细信息行，选择\
  \ **添加分组**；然后在 **行分组** 子菜单下选择 **父分组**，如图 4-5 所示。对于分组，选择 `Patient_Name` 作为表达式。你会注意到，系统为新的\
  \ `Patient_Name` 分组添加了一个新列。选择我们之前添加的 `Patient_Name` 文本框，并将其从详细信息部分删除。\n\n![Image](img/9781430238102_Fig04-05.jpg)\n\
  \n**图 4-5.** 向 `List` 添加 `Patient_Name` 分组\n\n现在，经过对间距和对齐方式的一些修改后，当你预览按 `Patient_Name`\
  \ 和其子分组 `Employee_Name` 分组的报表时，你可以看到多个员工与一位患者相关联。每位员工都显示正确的就诊总数和预估费用（参见图 4-6）。\n\
  \n![Image](img/9781430238102_Fig04-06.jpg)\n\n**图 4-6.** 包含父分组的预览报告\n\n清单 4-1 展示了\
  \ `RDL` 文件的一部分，其中包含你刚创建的 `List` 数据区域的示例。请注意，在 XML 模式中，`<List>` 元素封装了所有图形化添加到 `List`\
  \ 数据区域的内容，包括所有格式和分组。正如你在 `RDL` 中看到的，我们选择的 `List` 控件继承了新的 `Tablix` 功能的属性。\n\n**清单\
  \ 4-1.** `RDL` 列表部分\n\n```xml\n<TablixRowHierarchy>\n    <TablixMembers>\n     \
  \   <TablixMember>\n            <Group Name=\"Patient_Name\">\n                <GroupExpressions>\n\
  \                    <GroupExpression>=Fields!Patient_Name.Value</GroupExpression>\n\
  \                </GroupExpressions>\n            </Group>\n            <TablixHeader>\n\
  \                <Size>1.08333in</Size>\n                <CellContents>\n      \
  \              <Textbox Name=\"Patient_Name1\">\n                        <CanGrow>true</CanGrow>\n\
  \                        <KeepTogether>true</KeepTogether>\n                   \
  \     <Paragraphs>\n                            <Paragraph>\n                  \
  \              <TextRuns>\n                                    <TextRun>\n     \
  \                                   <Value>=Fields!Patient_Name.Value</Value>\n\
  \                                        <Style />\n                           \
  \         </TextRun>\n                                </TextRuns>\n            \
  \                    <Style />\n                            </Paragraph>\n     \
  \                   </Paragraphs>\n                        <rd:DefaultName>Patient_Name1</rd:DefaultName>\n\
  \                        <Style>\n                            <Border>\n       \
  \                         <Style>None</Style>\n                            </Border>\n\
  \                            <PaddingLeft>2pt</PaddingLeft>\n                  \
  \          <PaddingRight>2pt</PaddingRight>\n                            <PaddingTop>2pt</PaddingTop>\n\
  \                            <PaddingBottom>2pt</PaddingBottom>\n              \
  \          </Style>\n                    </Textbox>\n                </CellContents>\n\
  \            </TablixHeader>\n        </TablixMember>\n    </TablixMembers>\n</TablixRowHierarchy>\n\
  ```\n\n**注意** 要在 `BIDS` 中访问完整的 `RDL` 文件，请在设计选项卡打开的情况下选择 **视图**，然后从下拉菜单中选择 **代码**。如果你使用的是\
  \ `Visual Studio 2010`，请按 `F7`，并使用 `Shift+F7` 在代码和设计器模式之间切换。\n\n`List` 对象的最终报告位于\
  \ `Pro_SSRS` 项目中，名为 `Lists.rdl`。\n\n\n## 实现文本框\n\n文本框控件从 SSRS 2005 到 2008 经历了一次重大升级，但此后便再无变动。值得庆幸的是，它现在支持对文本进行富格式化（请注意，这与“富文本格式”不同）。许多现在可以实现的功能，在\
  \ SSRS 2005 中是不可能的，或者至少是非常困难的。你现在可以格式化单个文本框内的独立文本块，也可以在文本框内使用占位符组合来自数据集的所有字段。这一切都是通过\
  \ HTML 标签实现的，这些标签可以作为表达式值导入到文本框本身，或者包含在数据集中并与报表一起呈现。\n\n要学习如何创建具有富格式化的文本框，请从包含空文本框控件的\
  \ `TextBox_Start.rdl` 报表开始。在 `Pro_SSRS` 解决方案中打开 `TextBox_Start.rdl`。初始报表将如 图 4-7\
  \ 所示。\n\n![Image](img/9781430238102_Fig04-07.jpg)\n\n**图 4-7.** 带有空白文本框的 `TextBox_Start`\
  \ 报表\n\n在这个例子中，我们假设你作为报表设计器，需要将字面文本与数据合并到一封表单信函中，该信函将作为调查发送给患者。这份调查（我们将在 第 6 章完成）将包含关于患者特定就诊的信息，但除此之外必须是一个通用模板，对每位患者提出相同的问题。报表还将在单个文本框中包含粗体、下划线和斜体字体属性。\n\
  \n要了解自 SSRS 2008 以来关于文本框的首要概念是 `占位符`。占位符本质上是文本框中的一个位置，它将包含文本框的各个部分，并且可以为其中的值或表达式设置自定义格式。每个占位符也有自己的属性，例如工具提示、操作和对齐方式。\n\
  \n首先，单击 `TextBox_Start` 报表中的文本框以选中它。然后，右键单击并选择“创建占位符”。你将看到文本框属性对话框，如 图 4-8 所示。\n\
  \n![Image](img/9781430238102_Fig04-08.jpg)\n\n**图 4-8.** 文本框占位符属性\n\n在这个演示中，你将添加一个简单的日期占位符、一个问候语和一个数据字段，每个都使用不同的格式样式。在\
  \ 第 6 章，你将通过创建一个患者调查表单信函来扩展这个示例，该信函会组合矩形和表格等多个对象，以提供详细的服务报告和调查问卷。对于像这样的简单文本框，数据集\
  \ `Pro_SSRS_DS` 不可用分组，因此在这个例子中，你将使用 `First` 函数从数据集中提取患者姓名。\n\n在占位符属性对话框仍打开的情况下，在“标签”字段中输入“Today”，在“值”字段中输入\
  \ `=NOW()`。关于格式化的一点重要说明是：如果在“常规”选项卡上选择了 HTML，则“数字”选项卡上的其他日期格式化规则将不会被应用。因此，对于此占位符，请选择“无\
  \ – 仅纯文本”，如 图 4-9 所示。\n\n![Image](img/9781430238102_Fig04-09.jpg)\n\n**图 4-9.**\
  \ 第一个文本框占位符的值属性\n\n在“数字”选项卡上，为“类别”选择“日期”，为“样式”选择“2000 年 1 月 31 日 星期一”，如 图 4-10 所示，然后单击“确定”。\n\
  \n![Image](img/9781430238102_Fig04-10.jpg)\n\n**图 4-10.** 文本框占位符的纯文本日期格式\n\n回到“设计”选项卡，在刚刚添加的占位符下方单击，转到文本框中的下一行。直接在文本框中输入单词“Dear”，后面跟一个空格。这将作为信函的问候语。现在，在你键入的空格正后方的位置右键单击，再次选择“创建占位符”。在“标签”中，输入“Patient\
  \ Name”。对于表达式，单击值字段右侧的表达式按钮以打开表达式生成器。在“类别”框中单击“数据集”，在“项”框中选择 `Pro_SSRS_DS`。在“值”框中选择\
  \ `First(Patient_Name)`。请注意，如 图 4-11 所示，该值被展开为 `=First(Fields!Patient_Name.Value,\
  \ \"Pro_SSRS_DS\")`。你会在这里以及本书各处注意到，在 SSRS 2012 中，为了便于使用和清晰明了，字段的完整表达式值已被简化。例如，`Fields!Patient_Name.Value`\
  \ 在设计模式下通常会简显示为 `[Patient_Name]`。\n\n![Image](img/9781430238102_Fig04-11.jpg)\n\n\
  **图 4-11.** 文本框的患者姓名值\n\n此时呈现报表并不能有效展示如何在单个文本框中实现多种格式。不过，此时添加单独的格式设置非常简单，只需选择你的占位符并选择任何你想要的格式即可。高亮显示“Today”占位符，确保选中整个标签。接着，单击工具栏上的斜体按钮。然后，选择“Patient\
  \ Name”占位符并单击粗体按钮。图 4-12 展示了一个具有多种格式的单个文本框对象的预览。\n\n![Image](img/9781430238102_Fig04-12.jpg)\n\
  \n**图 4-12.** 单个文本框的多种格式输出\n\n如前所述，即使是如此简单的自定义格式，在 SSRS 2005 中也是不可用的，因此 SSRS 2008\
  \ 代表了报表设计领域的巨大飞跃。在下一章中，你将通过直接从 SQL 表导入 HTML 格式，以及从多个数据集中导入记录，来制作更复杂的报表，从而创建一份完整的自定义患者调查信函。\n\
  \nTextbox 对象的完整报表名为 `TextBox.rdl`，位于 `Pro_SSRS` 项目中。\n\n\n## 实现表格\n\n表格数据区域提供了一种将数据组织成表格形式的行与列的方法，并可支持多级分组。默认情况下，每个表格数据区域都包含存放详细记录的行以及表格的页眉和页脚。你可以基于单个数据集中的个别字段，或是结合多个字段的表达式，对表格进行分组。由于表格的结构化特性，它使得设计统一格式的报告变得简单。数据集中的字段只需添加到表格内的单元格中，报告在呈现时就会自动格式化。列表数据区域提供了与表格大致相同的功能，但你需要手动定位和对齐字段。\n\
  \n我们将在本节演示的表格报告对象的起始报告名为 `Table Start.rdl`。你可以在 Apress 网站本书的源代码/下载区域的 `Pro_SSRS`\
  \ 项目中找到它。请在 BIDS 中打开 `Table Start.rdl` 文件开始操作。\n\n如同处理列表一样，你将从“设计”选项卡开始，双击“工具箱”中的表格。这会将一个表格添加到报告设计区域。接下来，将用于列表示例的相同字段拖放到表格的详细信息行中——`Employee_Name`、`Service_Type`、`Estimated_Cost`\
  \ 和 `Visit_Count` 作为详细信息，`Patient_Name` 用于分组。要将前四个字段添加到详细信息行，你需要向表格中添加第四列。这可以通过右键单击中间列顶部的栏并选择“在右侧插入列”来实现。现在你有了四列等宽的列，可以将四个字段拖放进去，使报告显示为如\
  \ 图 4-13 所示，字段放置在表格的详细信息行中。`Patient_Name` 字段将等到你添加分组级别时再添加。请注意，当字段被放入各个单元格时，它们的列标题会自动添加。\n\
  \n![Image](img/9781430238102_Fig04-13.jpg)\n***图 4-13.** 包含详细信息行的表格数据区域*\n\n要将 `Patient_Name`\
  \ 字段添加到表格中，使报告具有与你之前创建的列表相同的功能，你需要在表格中插入一个分组。为此，只需将 `emp_svc_cost` 数据集中的 `Patient_Name`\
  \ 字段拖放到“行组”区域，并在“(详细信息)”行组的上方释放，如下面的 图 4-14 所示。\n\n![Image](img/9781430238102_Fig04-14.jpg)\n\
  ***图 4-14.** 通过拖放创建行组*\n\n你可以通过单击 `Patient_Name` 分组右侧的向下箭头，然后选择“分组属性”选项来查看组属性（参见\
  \ 图 4-15）。\n\n![Image](img/9781430238102_Fig04-15.jpg)\n***图 4-15.** 分组属性对话框*\n\n\
  为了区分患者和员工，将 `Patient_Name` 单元格设为粗体。为了清晰起见，删除添加详细信息行字段时最初添加的每个标题——单击标题单元格，然后按 Delete\
  \ 键。接下来，如果需要，调整列宽以扩展患者姓名和员工姓名列。你可以通过将每列的右边缘向右拖动，或者选中整列并在“属性”窗口中输入以英寸为单位的所需宽度来完成此操作。你可以通过按\
  \ F4 键调出上下文相关的“属性”窗口。\n\n最后，你需要为详细信息行设置一个额外的分组级别，就像为包含 `Patient_Name` 字段的标题行所做的那样。右键单击“行组”中的“(详细信息)”，然后选择“分组属性”。单击“添加”，并选择\
  \ `Employee_Name` 字段作为详细信息行的分组依据。你还需要确保 `Estimated_Cost` 和 `Visit_Count` 字段应用了 `Sum`\
  \ 函数——例如，`=Sum(Fields!Estimated_Cost.Value)`——然后你就可以预览报告了。一个简单的方法是：在表格中高亮显示 Estimated\
  \ Cost 表达式，右键单击它，并在“ Summarize By（汇总依据）”子菜单下选择“Sum（求和）”。当报告呈现时，其功能与你之前创建的列表类似，如\
  \ 图 4-16 所示。\n\n如果需要，你现在可以向表格添加更多的分组级别，但接下来你将学习如何将表格与自由格式的矩形结合使用，以展示如何在保持多级分组的同时，扩展超越表格的结构化特性。\n\
  \n![Image](img/9781430238102_Fig04-16.jpg)\n***图 4-16.** 表格预览*\n\n你创建的表格的 RDL 清单将跨越许多页面，因此我们选择在适当地方包含每个数据区域的\
  \ RDL 输出部分。在 清单 4-2 中，你可以看到一个完整的 `<TablixCell>` 部分，它将是 `<TablixCell>`、`<TablixRow>`\
  \ 以及最终的 `<Tablix>` 元素的子节点。RDL 引用的表格中的特定单元格是你添加到其自身分组中的 `Patient_Name` 字段。另请注意，该字段有一段\
  \ RDL 定义了 `CanGrow`。为表格数据区域内的单元格分配 `CanGrow` 属性使其能够自动扩展以适应其包含数据的长度。通过分配 `CanShrink`\
  \ 属性也可以实现相反的效果。\n\n![Image](img/square.jpg) **注意** 自 SSRS 2008 以来的所有版本中，`Tablix`\
  \ 属性指的是表格、矩阵和列表对象，因此，以前专门引用表格或矩阵的 RDL，现在引用 `Tablix`。\n\n***清单 4-2.** 表格数据区域的 RDL\
  \ 部分*\n\n```xml\n<TablixCell>\n<CellContents>\n    <Textbox Name=\"textbox3\">\n\
  \    <CanGrow>true</CanGrow>\n    <KeepTogether>true</KeepTogether>\n    <Paragraphs>\n\
  \        <Paragraph>\n        <TextRuns>\n            <TextRun>\n            <Value\
  \ />\n            <Style />\n        </TextRun>\n        </TextRuns>\n        <Style\
  \ />\n        </Paragraph>\n    </Paragraphs>\n    <rd:DefaultName>textbox3</rd:DefaultName>\n\
  \    <ZIndex>17</ZIndex>\n    <Style>\n    <PaddingLeft>2pt</PaddingLeft>\n    <PaddingRight>2pt</PaddingRight>\n\
  \    <PaddingTop>2pt</PaddingTop>\n    <PaddingBottom>2pt</PaddingBottom>\n    </Style>\n\
  </CellContents>\n</TablixCell>\n```\n\n表格对象的完成报告名为 `Table.rdl`，位于 `Pro_SSRS` 项目中。\n\
  \n## 实现矩形\n\n如前所述，矩形数据区域类似于列表数据区域，它是一个用于容纳报表项的自由格式容器对象，并将所有对象封装在一个定义的区域内。因此，当矩形被重新定位或完全删除时，其内部的对象也会随之重新定位或被删除。与我们即将介绍的所有其他报表对象和数据区域一样，您可以将矩形放置在其他数据区域内，并限定其作用范围。\n\
  \n矩形数据区域比列表数据区域功能更有限，因为它不包含分组级别。不过，您可以对矩形内的对象或数据区域进行分组，并在 SSRS 报表中以几种创新方式使用矩形。您将在上一个示例的基础上继续操作，使用表格数据区域，并在表格内添加一个矩形作为占位符。这样，您就可以在保持表格数据区域提供的结构的同时，为报表增加一层自由格式设计。在此示例中，我们还将使用之前介绍的文本框报表对象。文本框可以包含文字字符串值，例如报表标题；也可以包含表达式。您可以使用文本框对象为放置在矩形内的自由格式对象添加标题。\n\
  \n本节的起始报表名为 `Rectangle Start.rdl`。它可以在 Apress 网站本书资源代码/下载区的 `Pro_SSRS` 项目中找到。\n\n\
  首先，打开 `Rectangle Start.rdl` 报表，并按照以下步骤向整个详细信息行添加一个矩形：\n\n> 1.  将一个矩形数据区域从工具箱拖到“矩形起始”报表中扩展的详细信息行内。\n\
  > 2.  将 `emp_svc_cost` 数据集中的两个字段 `Visit_Count` 和 `Estimated_Cost` 拖到详细信息区域。将它们垂直放置，使\
  \ `Visit_Count` 字段位于 `Estimated_Cost` 字段之上。请注意，SSRS 会自动为这些字段分配 `Sum` 聚合函数。\n> 3.\
  \  从工具箱中拖动两个文本框到矩形内，位于您刚刚添加的两个字段的左侧。文本框可以包含表达式或文字字符串，用作标签。在文本框中分别键入“访问次数”和“预计成本”。\n\
  > 4.  通过按住 Shift 键单击选中这两个文本框，然后将文本颜色属性设置为“砖红色”，字体大小设置为 12 磅，来为文本框添加格式。您还将把 `Estimated_Cost`\
  \ 和 `Visit_Count` 字段设置为粗体。您可以在标准格式工具栏或属性窗口中找到这些设置。完成后，报表布局将如图 4-17 所示。\n\n![Image](img/9781430238102_Fig04-17.jpg)\n\
  \n#### 图 4-17. 表格中带有格式的矩形\n\n当您预览报表时，`Estimated_Cost` 字段似乎格式不正确，它应该是货币格式。每个文本框都包含格式属性，您可以通过多种方式设置。在“布局”选项卡上，右键单击包含\
  \ `Estimated_Cost` 数据字段总和的文本框，然后选择“属性”。您可以在“文本框属性”对话框的“格式”选项卡上设置文本框值的格式。或者，您也可以在属性窗口中修改“格式”属性。选择“货币”（参见图\
  \ 4-18）。默认的货币格式代码为“C”，包含两位小数。如果您愿意，可以通过选择“自定义”并键入“C0”或“C1”来覆盖此设置，这将分别得到无小数位或一位小数位。对于本示例，请保留默认的两位小数。\n\
  \n![Image](img/9781430238102_Fig04-18.jpg)\n\n#### 图 4-18. 使用文本框对话框选择格式\n\n当您单击“确定”并预览报表时，您可以看到现在有了一个经过格式化的单个详细信息行，其中包含垂直对齐、格式适当的文本框，如图\
  \ 4-19 所示。以这种方式使用矩形，可以在向报表添加多个自由格式元素时提供更大的灵活性，同时仍能提供表格的多重分组级别。\n\n![Image](img/9781430238102_Fig04-19.jpg)\n\
  \n#### 图 4-19. 带有格式的表格预览\n\n您可以在清单 4-3 中看到您添加到表格中的矩形的 RDL 输出。\n\n#### 清单 4-3. 矩形的\
  \ RDL 输出\n\n```\n<Rectangle Name=\"rectangle1\">\n  <ReportItems>\n    <Textbox\
  \ Name=\"Visit_Count\">\n      <CanGrow>true</CanGrow>\n      <KeepTogether>true</KeepTogether>\n\
  \      <Paragraphs>\n        <Paragraph>\n          <TextRuns>\n            <TextRun>\n\
  \              <Value>=Sum(Fields!Visit_Count.Value)</Value>\n              <Style>\n\
  \                <FontWeight>Bold</FontWeight>\n              </Style>\n       \
  \     </TextRun>\n          </TextRuns>\n          <Style>\n            <TextAlign>Right</TextAlign>\n\
  \          </Style>\n```\n\n矩形对象的完成报表名为 `Rectangle.rdl`，位于 `Pro_SSRS` 项目中。\n\n##\
  \ 实现矩阵\n\n您可以使用 `Matrix` 数据区域来生成围绕聚合度量、按行和列格式化的输出。SSRS 中的矩阵类似于数据透视表或交叉表报表。您可以将数据字段与其他字段一起在\
  \ `Matrix` 中分组，从而形成自然的汇总和明细关系。简单单级的 `Matrix` 数据区域（仅包含一列和一行）提供了有价值的商业智能，可用于快速分析。无论是源自标准\
  \ SQL 查询的数据，还是用于 Analysis Services 的 MDX 查询（在第 12 章中介绍）得到的数据，情况都是如此。现在，我们将介绍 `Matrix`\
  \ 数据区域的一些属性，并使用存储过程 `Emp_Svc_Cost`，用特定时间段内每位患者的 `Estimated_Cost` 值来填充它。您需要连接 `Year`\
  \ 和 `Month` 的字段值，用于 `Matrix` 的列分组部分，并使用 `Patient_Name` 进行行分组。\n\n本节演示的 `Matrix`\
  \ 对象起始报表可在 Apress 网站本书的源代码/下载区域的 `Pro_SSRS` 项目中获取。此报表名为 `Matrix Start.rdl`。\n\n\
  默认情况下，`Matrix` 数据区域仅包含三个单元格，分别定义 `列`、`行` 和 `数据` 单元格，如图 4-20 所示。您可以使用左上角的第四个空白单元格作为标签，或用于控制\
  \ `Matrix` 布局的表达式与参数组合（例如交互式展开或折叠分组）——我们稍后将进行演示。\n\n![Image](img/9781430238102_Fig04-20.jpg)\n\
  `图 4-20. 矩阵数据区域`\n\n打开 `Matrix Start.rdl` 报表后，双击 `工具箱` 中的 `Matrix` 对象，这将自动向报表的设计区域添加一个\
  \ `Matrix`。接下来，从 `emp_svc_cost` 数据集将两个字段 `Patient_Name` 和 `Estimated_Cost` 拖放到 `Matrix`\
  \ 上。它们分别放入 `行` 和 `数据` 区域。对于 `列` 区域，定义一个连接 `Service_Year` 和 `Service_Month` 字段的表达式。请注意，您可能需要删除为\
  \ `Estimated Cost` 字段自动添加的标题。表达式如下：\n\n```\n=Fields!Year.Value & \" - \" & Fields!Month.Value\n\
  ```\n\n您还需要使用此表达式基于组合字段创建自定义分组。要在表达式上对 `列` 区域进行分组，请右键点击报表 `行和列组` 区域中的 `ColumnGroup`，然后选择\
  \ `分组属性`。将上述表达式放入 `分组依据` 部分，然后点击确定。接下来，将 `Estimated_Cost` 字段左对齐，并将格式设置为货币，如上一节所示。当您预览报表时，可以看到\
  \ `Matrix` 显示了熟悉的患者在每个月接受服务时的预估护理费用，如图 4-21 所示。\n\n![Image](img/9781430238102_Fig04-21.jpg)\n\
  `图 4-21. 矩阵数据区域预览`\n\n您可以在清单 4-4 中查看 `Matrix` 的 RDL 输出。\n\n`清单 4-4. 矩阵 RDL 清单`\n\
  \n```\n<Tablix Name=\"matrix1\">\n    <TablixCorner>\n        <TablixCornerRows>\n\
  \            <TablixCornerRow>\n                <TablixCornerCell>\n           \
  \         <CellContents>\n                        <Textbox Name=\"textbox1\">\n\
  \                            <CanGrow>true</CanGrow>\n                         \
  \   <KeepTogether>true</KeepTogether>\n                            <Paragraphs>\n\
  \                                <Paragraph>\n                                 \
  \   <TextRuns>\n                                        <TextRun>\n            \
  \                                <Value />\n                                   \
  \         <Style />\n                                        </TextRun>\n      \
  \                              </TextRuns>\n                                   \
  \ <Style />\n                                </Paragraph>\n                    \
  \        </Paragraphs>\n                            <ZIndex>3</ZIndex>\n       \
  \                     <DataElementOutput>NoOutput</DataElementOutput>\n        \
  \                    <Style>\n                                <PaddingLeft>2pt</PaddingLeft>\n\
  \                                <PaddingRight>2pt</PaddingRight>\n            \
  \                    <PaddingTop>2pt</PaddingTop>\n                            \
  \    <PaddingBottom>2pt</PaddingBottom>\n                            </Style>\n\
  \                        </Textbox>\n                    </CellContents>\n     \
  \           </TablixCornerCell>\n            </TablixCornerRow>\n        </TablixCornerRows>\n\
  \    </TablixCorner>\n</Tablix>\n```\n\n`Matrix` 对象的完整报表名为 `Matrix.rdl`，位于 `Pro_SSRS`\
  \ 项目中。\n\n## 总结\n\n在本章中，您了解到每份报表都由基于 RDL 中已定义架构的明确元素组成，这赋予了 SSRS 标准化的优势。我们介绍了构成报表的报表对象，并查看了它们的属性和功能。您还看到了在设计过程中，每个对象的图形设计组件如何直接转换为\
  \ RDL。既然您对设计环境更加熟悉了，接下来将学习如何使用它来设计和部署一些实际的报表。\n\n在下一章中，我们将展示如何通过添加图形和图表来让报表更加生动。您可以将图形或图表视为另一种类型的报表，但它们在视觉上差异显著，值得在单独的章节中进行介绍。\n\
  \n## 第 5 章\n\n### 实现仪表板风格的报表对象\n\n图表、地图、指示器和其他 Reporting Services 对象为报表增添了视觉趣味。其中许多对象还让您能够一目了然地传达大量信息，否则，从仅包含列式数据的报表中逐行阅读细节来发现这些信息将非常耗时。Reporting\
  \ Services 提供了多种图表类型和其他具有特定用途的报表对象。您可用的可视化报表对象包括：\n\n*   **图表：** SSRS 提供多种图表样式，可以与表格或矩阵等其他报表对象结合使用，也可以作为独立报表使用。\n\
  *   **仪表：** 随 SSRS 2008 发布，这些视觉吸引力强的控件提供了一目了然的视图，通常用作业务可衡量指标（如销售和利润趋势）的关键绩效指标。在\
  \ SSRS 2008 之前，仪表需要单独获取。\n*   **图像：** 此报表对象可以在报表中直接嵌入标准格式的图像，例如 JPEG 或 TIFF。您可以将图像直接嵌入报表（例如公司徽标），或直接从数据库表中提取。\n\
  *   **地图：** 地图对象允许开发人员在航拍地图上添加覆盖可视化效果，以表示通过地图库、空间查询或环境系统研究所公司 (ESRI) 对象和图层文件返回的数据。\n\
  *   **数据条：** 此报表项可用作水平条或垂直数据列。它通常用于在比传统条形图更小的空间内传达大量信息。例如，如果您想直观地表示一组学生在特定评估中获得的测试分数，可能会使用数据条。\n\
  *   **迷你图：** 与 *数据条* 类似，此报表对象通常用于可视化特定度量的大量趋势数据，但比传统图表提供的形式更紧凑。这很像描绘给定日期范围内股票价格的方式，很少或没有标签和图例。\n\
  *   **指示器：** 在 SSRS 2008 R2 中添加，此报表项可用于显示不同的图像，这些图像在视觉上代表某个预定义或数据驱动的值。此类对象的示例常见于提供与关键绩效指标\
  \ (KPI) 对比的报表部分。\n\n![Image](img/square.jpg) **注意** `地图`、`数据条`、`迷你图` 和 `指示器` 报表项是随\
  \ SSRS 2008 R2 发布的。这些项中的每一个都为报表开发人员提供了更复杂的报表对象，这些对象常见于仪表板和分析风格的报表中。\n\n本章的其余部分将带您浏览\
  \ SQL Server 2012 Reporting Service 的制图功能。首先，我们将介绍一些关于图表数据区域的必要知识。然后，我们将通过一些可用图表的示例进行讲解。\n\
  \n\n## 理解图表数据区域\n\nSSRS 中的图表数据区域与矩阵数据区域类似，允许从单个数据集进行多级分组。与 Tablix 数据区域（通过表格、矩阵和列表对象）提供的列级和行级分组不同，图表数据区域使用**系列**、**类别**和**值**。你可以为图表设置许多属性，并且与所有其他数据区域一样，图表可以使用表达式来定义其属性。此外，与其他数据区域一样，你可以将图表单独放置，也可以将其限定在另一个区域（如列表或表格数据区域）内。例如，你可以使用一个简单的图表来显示按临床医生类型划分的总体访问量，这在你的存储过程中由\
  \ `Service_Type` 字段确定。你也可以将图表添加到一个按患者和时间范围（如 `Month` 和 `Year`）分组的表格单元格中。该图表将为每个分组显示该患者随时间变化的访问次数。让我们向使用\
  \ `Emp_Svc_Cost` 存储过程的报表中添加一个图表。对于该图表，你将添加三个熟悉的字段，分别对应图表的三个区域：系列、类别和值将分别包含 `Patient_Name`、`Employee_Name`\
  \ 和 `Visit_Count`。\n\n本节演示的图表对象的起始报表可在 Apress 网站（[`www.apress.com`](http://www.apress.com)）上本书的“源代码/下载”区域中的\
  \ `Pro_SSRS` 项目里找到。这个报表很有创意地被命名为 `Chart Start.rdl`，它也是一种为企业高管们准备的早餐麦片。\n\n## 创建图表\n\
  \n1.  首先，打开 `Chart Start.rdl` 报表的“设计”选项卡，双击工具箱中的图表工具，调出“选择图表类型”对话框。SSRS 2008 中的图表对象得到了相当广泛的增强，但大部分更新主要是美化方面的。你将选择如图\
  \ 5-1 所示的堆积条形图。\n    ![Image](img/9781430238102_Fig05-01.jpg)\n    图 5-1. SSRS 图表选择\n\
  2.  双击图表的图形区域，这将调出“图表数据”窗口。\n3.  在“图表数据”窗口的“值”区域下，单击绿色加号，然后从下拉列表中选择 `Visit_Count`。\n\
  4.  接下来，单击“图表数据”窗口中“类别组”区域的绿色加号，选择 `Employee_Name`。\n5.  接着，单击“图表数据”窗口中“序列组”区域的绿色加号按钮，选择\
  \ `Patient_Name`。\n6.  最后，通过向右下方拖动图表的右下角来调整其大小，使其类似于图 5-2。\n\n![Image](img/9781430238102_Fig05-02.jpg)\n\
  图 5-2. 包含三个字段的图表\n\n在预览图表之前，让我们看看它的属性。你需要将默认的调色板更改为“浅色”，以获得更柔和、更美观的视图。右键单击图表内部，在“图表”子菜单下选择“图表属性”。选择名为“浅色”的调色板，然后单击“确定”。属性应如图\
  \ 5-3 所示。\n\n![Image](img/9781430238102_Fig05-03.jpg)\n图 5-3. 图表属性\n\n最后，在“设计”选项卡上右键单击图表图形区域内部，选择“3D\
  \ 效果”。接着，单击复选框启用 3D 效果，然后单击“确定”。在预览图表之前，将标题从“图表标题”重命名为 `按患者统计的访问次数`。现在你可以预览图表了，如图\
  \ 5-4 所示。\n\n![Image](img/9781430238102_Fig05-04.jpg)\n图 5-4. 具有自定义属性的图表\n\n![Image](img/square.jpg)\
  \ **注意** 我们选择将访问列表缩小到 2010 年发生的记录。这是有意为之，因为它将数据限制在易于查看的范围内；否则，图表中会填充过多的患者，显得杂乱无章。`Chart\
  \ Start.rdl` 报表的默认参数值也是 2010，因此你的结果将与之匹配。\n\n你可以在清单 5-1 中看到刚刚创建的图表的 RDL 输出。\n\n\
  清单 5-1. 图表 RDL 示例\n\n```\n<Chart Name=\"chart1\">\n   <ChartThreeDProperties>\n\
  \      <Enabled>true</Enabled>\n      <Rotation>30</Rotation>\n      <Inclination>20</Inclination>\n\
  \      <Shading>Simple</Shading>\n      <WallThickness>50</WallThickness>\n    \
  \  <DrawingStyle>Cylinder</DrawingStyle>\n   </ChartThreeDProperties>\n   <Style>\n\
  \      <BackgroundColor>White</BackgroundColor>\n   </Style>\n```\n\n图表对象的完整报告位于\
  \ `Pro_SSRS` 项目中，名为 `Chart.rdl`。\n\n\n\n## 实现图像\n\n在报告中加入图像能使其看起来更专业，同时提升其作为资源的价值。幸运的是，SSRS\
  \ 包含一个图像工具，可以从多种位置添加图像，并支持许多标准图像格式。我们的医疗保健应用程序将许多图像作为二进制大对象存储在 SQL Server 数据库中，作为患者电子病历的一部分。你可以通过前端图像检索应用程序加载任何类型的图像到数据库中，并将其与特定患者关联。一旦图像存入数据库并标记了患者的识别号码（这是数据库中的一个字段），你就可以使用\
  \ SSRS 在报告中显示该图像。在本例中，我们将延续著名作家患者的主题，将他们的图像添加到一个简单报告中。用于图像报告对象的起始报告名为 `Image Start.rdl`。由于该报告的大部分内容是使用你已熟悉的对象构建的，因此起始点已经包含了这些对象。此报告使用的数据集包含已将其照片存储在\
  \ `Pro_SSRS` 数据库中名为 `DocumentImage` 的表里的患者的人口统计信息。你可以使用名为 `Get_Image` 的预定义数据集（用于\
  \ `Image Start.rdl` 报告），该数据集通过如 图 5-5 所示的文本查询类型，简单地返回三名患者的人口统计信息及其照片。\n\n![images](img/9781430238102_Fig05-05.jpg)\n\
  \n`图 5-5.` Get Image 数据集属性\n\n首先，在 `Pro_SSRS` 项目中打开 `Image Start.rdl` 报告，然后单击 **设计**\
  \ 选项卡。接下来，从 **工具箱** 中选择 **图像** 工具，并单击该报告中已设置好的 **列表** 数据区域内的空白区域。如你在 图 5-6 中所见，当向列表添加\
  \ **图像** 工具时，会弹出 **图像** 对话框。你可以选择多种检索图像的方式。例如，可以使用已添加到项目中的图像，或者将图像直接嵌入到报告中。如果报告包含单个图像，该图像不会被重复使用，并且打算分发给可能无法从其他位置访问该图像的各种来源，那么此选项将非常适用。选择\
  \ **数据库** 作为图像源。接下来，你将选择包含图像的数据源和字段。对于本报告，选择 `=Fields!DocumentImage.Value` 作为值，或者如显示的\
  \ `[DocumentImage]`。将 **MIME 类型** 设置为 `image/jpeg`。\n\n`DocumentImage` 字段中存储的图像是患者照片。如果这是一个真实的报告，你可以使用患者记录中标准的其他图像，例如\
  \ X 光图像或患者伤口照片。即使是纸质文件或传真的扫描图像也可以存储在数据库中，并有效地添加到完整的报告中。\n\n![images](img/9781430238102_Fig05-06.jpg)\n\
  \n`图 5-6.` 图像源选择\n\n我想花点时间指出一个在 图 5-6 中未显示、但在使用 **图像** 对象时非常常用的属性。通常，图像需要根据所请求的报告进行适当缩放。例如，你可能需要覆盖\
  \ **按比例适应** 的默认设置，以按原始大小显示图像，或者仅显示其一部分。但是，在使用 **适应大小** 选项时要小心，因为这可能导致图像呈现拉伸外观。你可以在\
  \ **图像属性** 窗口的 **大小** 选项卡中设置缩放属性，或在 **属性** 窗口中的 **Sizing** 下设置，如 图 5-7 所示。\n\n![images](img/9781430238102_Fig05-07.jpg)\n\
  \n`图 5-7.` 图像属性 – 合适的缩放\n\n![images](img/square.jpg) **注意** 现在使用默认值；单击 **确定** 并预览报告。你可以看到照片图像已正确关联到患者，如\
  \ 图 5-8 所示。\n\n![images](img/9781430238102_Fig05-08.jpg)\n\n`图 5-8.` 包含图像的报告预览\n\
  \n清单 5-2 显示了图像的示例 RDL 元素。\n\n`清单 5-2.` 图像的 RDL 输出\n\n```\n<Image Name=\"image1\"\
  >\n   <ZIndex>10</ZIndex>\n   <Top>0.375in</Top>\n   <MIMEType>image/jpeg</MIMEType>\n\
  \   <Height>0.75in</Height>\n   <Width>0.75in</Width>\n   <Source>Database</Source>\n\
  \   <Style />\n   <Value>=Fields!DocumentImage.Value</Value>\n   <Left>2.875in</Left>\n\
  \   <Sizing>AutoSize</Sizing>\n</Image>\n```\n\n已完成的 **图像** 对象报告名为 `Images.rdl`，位于\
  \ `Pro_SSRS` 项目中。\n\n### 实现仪表\n\n仪表虽然在 SSRS 2008 中是新功能，但在 SSRS 2005 中已作为第三方插件可用。然而，此类第三方插件必须单独购买。在\
  \ SSRS 2008 及更高版本中，仪表默认包含，并提供了超越标准图表的功能。仪表控件的一个优点是，它们在为任何报告增添美感——可以说是某种吸引力的同时，还十分紧凑，并能提供数据的概览视图，这对于只想看到高低起伏、增长下降的业务主管来说通常很重要。借助仪表，任何值都可以设置一个阈值，并且这个阈值可以在控件本身中直观地体现出来。\n\
  \n首先打开解决方案中包含的 `Gauge Start.rdl` 报告。双击 **工具箱** 中的 **仪表** 控件。将打开 **选择仪表类型** 窗口，显示所有可用的仪表。你可以选择两种类型的仪表：**径向**\
  \ 或 **线性**。顾名思义，**径向** 仪表是圆形的，就像你汽车里的速度表，而 **线性** 仪表是直的，很像一个标准温度计。对于本例，选择 **180\
  \ 度北向** 仪表，如 图 5-9 所示。\n\n![images](img/9781430238102_Fig05-09.jpg)\n\n`图 5-9.`\
  \ 带范围的径向仪表\n\n我们将引导你创建一个简单的仪表范围，以展示如何通过值来控制仪表指针。在 **设计** 选项卡上，右键单击仪表，然后在 **仪表面板**\
  \ 子菜单下选择 **刻度属性**。将 **最大值** 更改为 `20,000` 并单击 **确定`。现在，当你将 `Visit_Count` 拖到仪表的数据区域时，总体访问计数（我们知道是\
  \ `9,687`）在预览仪表时将显示为一个范围（参见 图 5-10）。我们只是触及了仪表的皮毛，但我们将在 第 6 章 中介绍控制新仪表控件的更多详细方面。\n\
  \n![images](img/9781430238102_Fig05-10.jpg)\n\n`图 5-10.` 预览模式下的径向仪表\n\n清单 5-3 显示了仪表控件的示例\
  \ RDL 元素。\n\n`清单 5-3.` 仪表控件的 RDL 输出\n\n```\n<ReportItems>\n     <GaugePanel Name=\"\
  GaugePanel2\">\n     <RadialGauges>\n     <RadialGauge Name=\"RadialGauge1\"> <PivotY>75</PivotY>\n\
  \     <GaugeScales>     <RadialScale Name=\"RadialScale1\">\n          <Radius>54</Radius>\n\
  \          <StartAngle>90</StartAngle>\n          <SweepAngle>180</SweepAngle>\n\
  \          <GaugePointers>\n          <RadialPointer Name=\"RadialPointer1\"> <PointerCap>\n\
  \          <Style>\n```\n\n\n\n## 实现地图\n\n如同之前提到的 Gauge 报表项，在 Reporting Services\
  \ 报表中实现地图功能过去只能通过自定义或第三方工具。SQL Server 2008 R2 引入了地图功能，用于生成视觉上引人注目的报表，允许将多个图层叠加在地形图之上。每个图层可以来自不同的数据集。此外，您只需勾选一个复选框，即可轻松将地图与\
  \ Bing 地图集成。地图报表项可以从地图库、ESRI shapefile 或 SQL Server 空间查询中获取数据。\n\n地图库由包含坐标和嵌入式矢量多边形的\
  \ RDL 文件组成，这些文件通常使用 Mapwel、Map Maker Pro 和 ViLiDAR 等工具创建。标准安装中包含一些 RDL 文件，涵盖了整个美国以及各个州。但是，您可以扩展向导作为报表开发人员为您提供的地图。如上所述，您可以创建自己的矢量多边形，甚至可以从\
  \ CodePlex.com 等网站免费下载。无论哪种方式，为了让地图向导识别它们，您需要将 RDL 文件保存在向导读取的路径中。如果您像我一样使用 Visual\
  \ Studio 2010，该路径位于 Visual Studio 安装目录下的 `Program Files\\Microsoft Visual Studio\
  \ 10.0\\Common7\\IDE\\PrivateAssemblies\\MapGallery`。RDL 文件中的一些关键元素包括 `MapMeridians`、`MapParallels`、`MapLayers`\
  \ 和 `VectorData`。\n\nESRI shapefile 在扩展名为 .shp 和 .dbf 的文件中存储有关地理、几何形状和信息数据的类似信息。当您选择\
  \ ESRI shapefile 作为空间数据源时，系统会提示您选择一个 shapefile。导航到 shapefile 后，地理空间数据将被嵌入报表中。有关佛罗里达州杰克逊维尔市杜瓦尔县\
  \ ESRI shapefile 外观的示例，请参见图 5-11。\n\n![images](img/9781430238102_Fig05-11.jpg)\n\
  \n#### 图 5-11. 佛罗里达州杰克逊维尔市杜瓦尔县的 ESRI Shapefile\n\n获取空间数据的第三种方法是使用 SQL Server 空间查询。这允许您创建自己的查询来显示地理详细信息以及可量化数据。例如，创建一个返回美国各州总销售额列表的查询很容易。然后，您可以将这些详细信息叠加在地图上。\n\
  \n![images](img/square.jpg) **注意** 开箱即用，Reporting Services 附带的地图库包含美国以及美国境内的各个州。但是，您可以创建自己的地图。您还可以从\
  \ codeplex 网站 (`http://mapgallery.codeplex.com/releases`) 下载更多地图库。为了让地图向导看到您创建或下载的地图文件，在下载或创建后，您需要将它们保存在\
  \ `<drive>:\\Program Files (x86)\\Microsoft Visual Studio ##.0\\Common7\\IDE\\PrivateAssemblies\\\
  MapGallery`、`C:\\Program Files\\Microsoft Visual Studio ##.0\\Common7\\IDE\\PrivateAssemblies\\\
  MapGallery` 或 `<drive>:\\Program Files\\Microsoft SQL Server\\Report Builder 3.0\\\
  MapGallery`。\n\n我们通过打开本节包含的 Map Start.rdl 报表来开始本示例，该报表可在 Apress 网站 (`www.apress.com`)\
  \ 上本书的 Pro_SSRS 项目源代码/下载区域中找到。双击工具箱中的地图控件以启动地图向导。我们需要做的第一件事是让地图控件知道我们将从哪里获取空间数据。我们将使用地图库（这是默认设置），因此确保选中该单选按钮，然后在地图库树状列表中选择\
  \ USA by State Inset，如图 5-12 所示。选择特定的地图库时，会显示您所选内容的预览。\n\n![images](img/9781430238102_Fig05-12.jpg)\n\
  \n#### 图 5-12. 新建地图图层向导：选择空间数据源\n\n单击“下一步”按钮，继续进行向导的“选择空间数据和地图视图选项”步骤。在此屏幕上，您可以设置缩放级别、修改分辨率设置以及添加\
  \ Bing 地图图层。现在，我们暂时保留此页的默认设置，并单击“*下一步*”继续到“*选择地图可视化方式*”，如图 5-13 所示。\n\n![images](img/9781430238102_Fig05-13.jpg)\n\
  \n#### 图 5-13. 新建地图图层向导：选择地图可视化选项\n\n选择中间的可视化方式“颜色分析地图”并单击“下一步”。在“*选择分析数据集*”屏幕上，您需要选择或创建一个包含空间数据的数据集。我们将使用现有的数据集，因此选择\
  \ Emp_Svc_Cost_By_Patient_State 数据集并单击“下一步”继续。在“*为空间数据和分析数据指定匹配字段*”屏幕上，您需要选择数据集中与您选择的地图库匹配的字段。在本例中，向导检测到您有一个\
  \ `StateName` 字段并自动创建到它的链接，如图 5-14 所示。如果您没有 `StateName` 而是有州名缩写，则需要指定数据集中的哪个字段与之匹配。在那种情况下，您可以将您的\
  \ `State` 列与空间数据列 `STUSPS` 匹配。确保“匹配字段”中 `STATENAME` 旁边的复选框被选中，并且“分析数据集字段”设置为 `StateName`，然后单击“下一步”进入“*选择颜色主题和数据可视化*”屏幕。\n\
  \n![images](img/9781430238102_Fig05-14.jpg)\n\n#### 图 5-14. 新建地图图层向导：指定要匹配的字段\n\n\
  将“要可视化的字段”修改为使用 `[SUM(Visit_Count)]`，启用“显示标签”复选框选项，并将用作标签的“数据字段”也设置为 `[SUM(Visit_Count)]`。图\
  \ 5-15 显示了地图向导最终屏幕上的设置。\n\n![images](img/9781430238102_Fig05-15.jpg)\n\n#### 图 5-15.\
  \ 新建地图图层向导：选择颜色主题和可视化方式\n\n单击“完成”以完成地图向导，然后单击“预览”选项卡，如图 5-16 所示，查看地图的实际效果。\n\n![images](img/9781430238102_Fig05-16.jpg)\n\
  \n#### 图 5-16. 使用空间查询的地图\n\n代码清单 5-4 显示了用于地图控件的示例 RDL 元素。\n\n#### 代码清单 5-4. 地图控件的\
  \ RDL 输出\n\n```xml\n<ReportItems>\n          <Map Name=\"Map5\">\n            <MapViewport>\n\
  \              <MapCoordinateSystem>Geographic</MapCoordinateSystem>\n         \
  \     <MapProjection>Mercator</MapProjection>\n              <ProjectionCenterX>NaN</ProjectionCenterX>\n\
  \              <ProjectionCenterY>NaN</ProjectionCenterY>\n              <MapLimits>\n\
  \                <MinimumX>NaN</MinimumX>\n                <MinimumY>NaN</MinimumY>\n\
  \                <MaximumX>NaN</MaximumX>\n                <MaximumY>NaN</MaximumY>\n\
  \              </MapLimits>\n              <MaximumZoom>4000000</MaximumZoom>\n\
  \              <MapCustomView>\n                <CenterX>46.09375</CenterX>\n  \
  \              <CenterY>63.4690780639648</CenterY>\n                <Zoom>100</Zoom>\n\
  \              </MapCustomView>\n              <MapMeridians>\n                <Style>\n\
  ```\n\n已完成的地图对象报表名为 Map.rdl，位于 Pro_SSRS 项目中。\n\n\n\n## 实现数据条\n\n Reporting Services\
  \ 2008 R2 的另一个新增功能是数据条。如果您是精通 Excel 的用户，可能会在 Excel 中探索时认出这个报表对象。该对象本质上是一个单一条形图（通常水平显示），可以快速、一目了然地逐行进行比较。条形越长代表数值越高，条形越短则明确表示数值越低。\n\
  \n在本例中，我们将从 `Pro_SSRS` 项目中名为 `Data Bar Start.rdl` 的报表开始。您会注意到，已经定义了一个名为 `Emp_Svc_Cost_Data_Bar`\
  \ 的数据集，该数据集执行一个存储过程以返回指定 `ServiceMonth` 参数下的前十个 `States`（州）及其访问次数。我们还有一个只有两列的表格。展开\
  \ `Emp_Svc_Cost_Data_Bar` 数据集，并将 `StateName` 字段拖到表格详细信息行的第一列中。接下来，将数据条报表项拖到详细信息行的第二列。释放数据条时，系统将提示您选择所需的数据条类型。您的选项是：\n\
  \n*   条形图\n*   堆积条形图\n*   百分比堆积条形图\n*   柱形图\n*   堆积柱形图\n*   百分比堆积柱形图\n\n对于本示例，请选择\
  \ `Bar`（条形图），如 `Figure 5-17` 所示，然后单击 `OK`（确定）。\n\n![images](img/9781430238102_Fig05-17.jpg)\n\
  `Figure 5-17. 数据条类型选择`\n\n接下来，将 `Visit_Count_By_State` 字段拖到数据条上方，并在其上悬停，直到 `Chart\
  \ Data`（图表数据）对话框弹出。当您看到 `Chart Data` 对话框时，将所选字段拖到 `Values`（值）区域的空白处，如 `Figure 5-18`\
  \ 所示。\n\n![images](img/9781430238102_Fig05-18.jpg)\n`Figure 5-18. 数据条：图表数据值`\n\n\
  您可以在此停止，但让我们为报表增添一些亮点。将包含数据条的标题列标记为“访问计数”。然后将标题行设为 `Bold`（加粗）和 `Centered`（居中）。现在，选择数据条——是蓝色条形，而不是单元格——然后右键单击它以调出对话框，并选择\
  \ `Show Data Labels`（显示数据标签）。这将在您运行报表时显示数值。接下来，再次右键单击数据条，然后选择 `Series Properties…`（系列属性）。转到\
  \ `Fill`（填充）选项卡，选择 `Gradient`（渐变），并将 `Gradient style`（渐变样式）设置为 `Left right`（左右），如\
  \ `Figure 5-19` 所示。然后单击主色（顶部颜色）旁边的 `f[x]` 按钮以创建表达式。\n\n![images](img/9781430238102_Fig05-19.jpg)\n\
  `Figure 5-19. 数据条：系列属性填充选项`\n\n打开表达式编辑器后，输入以下表达式并单击 `OK`（确定）：\n\n```\n=IIF(Parameters!ServiceMonth.Label\
  \ <> \"ALL\",IIF(Fields!Visit_Count_By_State.Value > 75,\n\"Green\", \"Red\"),IIF(Fields!Visit_Count_By_State.Value\
  \ > 300, \"Green\", \"Red\"))\n```\n\n如本表达式所示，您可以嵌套条件语句。这里我们检查所选参数标签是否不是 `ALL`（全部）。然后检查\
  \ `Visit_Count_By_State`，查看所选月份的访问计数是否超过 75。如果是，则将数据条设为绿色；如果不是，则设为红色。外部的 `IIF` 语句检查计数是否大于\
  \ 300，并相应地设置颜色。单击 `Preview`（预览）以查看运行中的报表，如 `Figure 5-20` 所示。\n\n![images](img/9781430238102_Fig05-20.jpg)\n\
  `Figure 5-20. 数据条报表预览`\n\n`Listing 5-5` 显示了数据条报表项 RDL 文件的一个部分。\n`Listing 5-5. RDL\
  \ 数据条`\n\n```xml\n<Chart Name=\"DataBar1\">\n   <ChartCategoryHierarchy>\n     \
  \   <ChartMembers>\n            <ChartMember\n           …\n                  <ChartMember>\n\
  \                     <Label>Visit Count By State</Label>\n                    \
  \ </ChartMember>\n                     </ChartMembers>\n                     </ChartSeriesHierarchy>\n\
  \                      <ChartData>\n                        <ChartSeriesCollection>\n\
  \                          <ChartSeries Name=\"Visit_Count_By_State\">\n       \
  \                     <ChartDataPoints>\n                              <ChartDataPoint>\n\
  \                                <ChartDataPointValues>\n                      \
  \            <Y>=Sum(Fields!Visit_Count_By_State.Value)</Y>\n                  \
  \              </ChartDataPointValues>\n                                <ChartDataLabel>\n\
  \                                  <Style />\n                                 \
  \ <UseValueAsLabel>true</UseValueAsLabel>\n                                  <Visible>true</Visible>\n\
  \                                </ChartDataLabel>\n                           \
  \     <Style>\n                                  <Color>=IIF(Parameters!ServiceMonth.Label\
  \ <> \"ALL\",IIF(Fields!Visit_Count_By_State.Value > 75, \"Green\", \"Red\"),IIF(Fields!Visit_Count_By_State.Value\
  \ > 300, \"Green\", \"Red\"))</Color>\n                                  <BackgroundGradientType>LeftRight</BackgroundGradientType>\n\
  \                               </Style>\n```\n\n数据条的最终报表在 `Pro_SSRS` 解决方案中名为 `Data\
  \ Bar.rdl`。\n\n\n\n## 实现迷你图\n\n根据我的经验，领导层常见的报表需求之一是展示月度或年度趋势分析。虽然在早期版本的 Reporting\
  \ Services 中也能实现这种效果，但要做出真正具有趋势感的外观需要更多功夫。Reporting Services 2008 R2 版本引入了**迷你图控件**。这个开箱即用的报表项使用简单，能在很小的区域内展示大量数据。\n\
  \n在本例中，我们将首先在 Pro_SSRS Reporting Services 解决方案中打开名为 `Sparkline Start.rdl` 的报表。你会注意到我们已创建了一个数据集，它执行名为\
  \ `Emp_Svc_Cost_Sparkline` 的存储过程。此存储过程返回每次访问发生的 `Date`（日期）、`Month`（月份）和 `Year`（年份）。你还会发现一个\
  \ Tablix，其中包含数据集中的 `Month` 字段以及一些合适的标题。\n\n首先，从工具箱中拖动迷你图控件，将其放置在 \"Daily Trend\"\
  \ 标题下方的空白文本框中，并选择\"区域\"迷你图类型。这是\"区域\"部分下的第一种类型。其他三种类型可以是\"平滑区域\"、\"堆积区域\"和\"百分比堆积区域\"\
  。接下来，展开 `Emp_Svc_Cost_Sparkline` 数据集，并将 `Visit_Count` 字段拖到新的迷你图上方。如果在释放之前将鼠标悬停在迷你图上，你会看到如之前示例中见过的\"\
  图表数据\"屏幕。将 `Visit_Count` 字段释放到\"值\"部分，如图 5-21 所示。\n\n![images](img/9781430238102_Fig05-21.jpg)\n\
  `图 5-21. 迷你图：图表数据值`\n\n预览报表时，你应该会看到访问量的每日趋势。目前可能看起来有些粗糙，但我们稍后会让它变得更好一些。你还会看到一个 `MonthlyGoal`（月度目标）参数，我们即将实现它，作为关键绩效指标（KPI）的一种变体。就像在数据条示例中一样，我们将根据是否达到月度访问目标，将迷你图的颜色更改为红色或绿色的阴影。点击\"\
  设计\"选项卡，对迷你图报表进行更多编辑。\n\n双击你的迷你图控件，然后在图表数据窗口中右键单击 `Visit_Count`。选择\"序列属性\"，并导航到\"\
  填充\"选项卡。选择\"渐变\"作为填充样式，\"白色\"作为辅助颜色，渐变样式为\"上下\"。最后，让我们设置一个表达式，根据 `MonthlyGoal` 参数来改变颜色。点击顶部颜色选择右侧的\
  \ `f(x)` 按钮以创建表达式。清除默认文本，输入以下表达式，然后单击\"确定\"关闭表达式编辑器。序列属性窗口应如图 5-22 所示。\n\n`IIF(SUM(Fields!Visit_Count!Value,\"\
  Month\") >= Parameters!MonthlyGoal.Value, \"Green\", \"Red\")`\n![images](img/9781430238102_Fig05-22.jpg)\n\
  `图 5-22. 迷你图：序列填充选项`\n\n我们将在后面详细介绍表达式，但这个表达式本质上是比较月份组的访问总量与在月度目标参数中选择的值。图 5-23 展示了预览模式下的报表。将你的\
  \ `Monthly Goal` 更改为 2000，然后单击 `View Report` 按钮，以查看我们颜色表达式的动态特性。通常，KPI 并非以这种方式实现，但可以了解如何使用一个值来动态改变颜色，以提供关于是否达到预定目标的、一目了然的视觉指示。通常，这些值会存储在数据库中以便进行配置。\n\
  \n![images](img/9781430238102_Fig05-23.jpg)\n`图 5-23. 迷你图：预览报表`\n\n![images](img/square.jpg)\
  \ **注意** 我们将在本书中更详细地讨论这一点，但在本例中需要注意的一点是，我为 `Month` 创建了一个组并移除了 `Details`（详细信息）组。这使我能够在存储过程返回每日结果集的情况下，按月创建趋势。\n\
  \n清单 5-6 显示了迷你图控件 RDL 文件的一部分。\n`清单 5-6. RDL 迷你图`\n\n```\n<Chart Name=\"Sparkline4\"\
  >\n<ChartCategoryHierarchy>\n<ChartMembers>\n    <ChartMember>\n    <Group Name=\"\
  ChartGroup\" />\n    <Label />\n    </ChartMember>\n</ChartMembers>\n</ChartCategoryHierarchy>\n\
  <ChartSeriesHierarchy>\n<ChartMembers>\n    <ChartMember>\n    <Label>Visit Count</Label>\n\
  \    </ChartMember>\n</ChartMembers>\n</ChartSeriesHierarchy>\n<ChartData>\n<ChartSeriesCollection>\n\
  \    <ChartSeries Name=\"Visit_Count\">\n    <ChartDataPoints>\n        <ChartDataPoint>\n\
  \        <ChartDataPointValues>\n            <Y>=Sum(Fields!Visit_Count.Value)</Y>\n\
  \        </ChartDataPointValues>\n        <ChartDataLabel>\n            <Style />\n\
  \        </ChartDataLabel>\n        <Style>\n            <Color>=IIF(SUM(Fields!Visit_Count.Value,\"\
  Month\") &gt;=\n            Parameters!MonthlyGoal.Value, \"Green\", \"Red\")</Color>\n\
  \           <BackgroundGradientType>TopBottom</BackgroundGradientType>\n       \
  \    <BackgroundGradientEndColor>White</BackgroundGradientEndColor>\n       </Style>\n\
  ```\n\n迷你图的完整报表在 Pro_SSRS 解决方案中名为 `Sparkline.rdl`。\n\n\n### 实现指示器\n\n在 Reporting\
  \ Services 2005 和 2008 中，我们可以创建在包含 KPI 的报表中看到的功能。然而，这需要在表达式的使用上发挥一些创意。例如，如果希望基于结果集中的某个特定值显示图像，就需要根据表达式设置每个图像的可见性。这种方法实现起来并不太困难，但维护起来更复杂。在\
  \ 2008 R2 中，我们通过 `Indicator` 报表项直接获得了此功能，开箱即用。\n\n很多时候，我们报表的消费者希望看到一个视觉指示器，以基本的方向性方式显示趋势。例如，人们可能想知道总访问量是比上月增加、持平还是减少。如果我们看到负面结果的持续趋势，决策者可能希望更深入地探究可能的原因。这就是我们在本示例中将创建的报表风格。我们的决策者希望看到总访问量相对于上月的当前状态。\n\
  \n在本示例中，我们将从 Pro_SSRS 解决方案中的 `Indicator Start.rdl` 开始。`Indicator Start` 报表中包含一个返回四年样本访问数据的数据集。您还会注意到有一个包含三列的\
  \ `Tablix`。其中两列已经包含了报表所需的部分数据，第三列将用于我们的 `Indicator` 报表项。我们已经向您展示了一些将项目添加到报表设计 surface\
  \ 的方法，但与许多应用程序一样，通常可以通过多种不同的方式完成相同的任务。\n\n右键单击 `Tablix1` 中的空文本框，在子上下文菜单底部选择 `Insert`，然后选择\
  \ `Indicator`。当您向报表添加 `Indicator` 报表项时，会提示您使用 `Indicator Wizard`，如 图 5-24 所示。有四类指示器可供选择。但是，这些指示器中的每一个都可以自定义，包括颜色和用于控制它们的值。您甚至可以添加更多的指示器状态，使用自己的自定义图像，或将图像嵌入到\
  \ Gauge 控件中。\n\n![images](img/9781430238102_Fig05-24.jpg)\n\n**图 5-24.** 指示器：指示器类型选择\n\
  \n我们将使用默认的 `Directional` 指示器，即带有三个箭头的那个。确保该指示器被选中。然后单击 `OK` 返回报表设计器。此时，我们已经添加了一个指示器，但尚未告诉它使用哪个字段。右键单击指示器，选择\
  \ `Indicator Properties`，然后选择 `Values and States` 选项卡。这是大多数魔法发生的地方。将 `Value` 设置为\
  \ `=SUM(Fields!Diff.Value)`，因为您希望显示当前月份和上个月之间的差异，如 图 5-25 所示。接下来，将 `States Measurement\
  \ Unit` 从 `Percentage` 切换为 `Numeric`。如果您的结果是以变化百分比的形式返回的，那么请将其保留为默认设置。如果要添加或减少指示器状态的数量，可以分别单击\
  \ `Add` 或 `Delete` 按钮来实现。三个值将满足本示例的需求，因此对起始值和结束值进行以下更改：\n\n*   红色向下箭头 – 清除起始值并将\
  \ -1 设置为结束值。这本质上是告诉 SSRS，任何负值都应由红色向下箭头表示。\n*   黄色向右箭头 – 将起始值和结束值都设置为 0，以表示当前和上月的总访问计数没有变化。\n\
  *   绿色向上箭头 – 在起始值中输入 1，并清除结束值，以将所有正值显示为相对于上月的访问量增加。\n\n![images](img/9781430238102_Fig05-25.jpg)\n\
  \n**图 5-25.** 指示器属性\n\n完成所需的更改后，单击 `OK` 返回到 `Indicator Start` 报表。单击 `Preview` 选项卡以运行报表。如果所有设置都正确，您的报表应如\
  \ 图 5-26 所示。\n\n![images](img/9781430238102_Fig05-26.jpg)\n\n**图 5-26.** 预览“指示器开始”\n\
  \n清单 5-7 显示了 `Indicator` 报表项的 RDL 文件的整合部分。\n\n**清单 5-7.** RDL 指示器\n\n```\n<StateIndicator\
  \ Name=\"Indicator1\">\n <GaugeInputValue>\n   <Value>=Sum(Fields!Diff.Value)</Value>\n\
  \   <Multiplier>1</Multiplier>\n   <DataElementOutput>NoOutput</DataElementOutput>\n\
  \ </GaugeInputValue>\n <TransformationType>None</TransformationType>\n <TransformationScope>Tablix1</TransformationScope>\n\
  \ ...\n <IndicatorStates>\n   <IndicatorState Name=\"ArrowDown\">\n     <StartValue>\n\
  \       <Value />\n       <Multiplier>1</Multiplier>\n     </StartValue>\n     <EndValue>\n\
  \       <Value>-1</Value>\n       <Multiplier>1</Multiplier>\n     </EndValue>\n\
  \     <Color>Red</Color>\n     <ScaleFactor>0.99</ScaleFactor>\n     <IndicatorStyle>ArrowDown</IndicatorStyle>\n\
  \     <IndicatorImage>\n       <Source>External</Source>\n       <Value />\n   \
  \  </IndicatorImage>\n   </IndicatorState>\n   <IndicatorState Name=\"ArrowSide\"\
  >\n     ...\n   <IndicatorState Name=\"ArrowUp\">\n     ...\n   </IndicatorState>\n\
  \ </IndicatorStates>\n```\n\n完整的 `Indicator` 报表在 Pro_SSRS 解决方案中称为 `Indicator.rdl`。\n\
  \n### 小结\n\n在本章中，我们介绍了 Reporting Services 中一些视觉上更吸引人的对象，例如图表、地图和仪表。这些对象通常出现在仪表板风格的报表中，以提供一目了然的视角。我们还概述了图表数据区域，并逐步介绍了可用的不同图表类型的示例。既然您对设计环境更加熟悉了，您将学习如何使用它来设计和部署一些真实的报表。在下一章中，我们将展示如何采用循序渐进的方法，将这些报表项添加到作为医疗保健应用程序\
  \ SSRS 迁移一部分而设计的报表中。\n\n## 第 6 章\n\n\n"
- '# 构建报表


  在上一章中，你通过创建一个查询及后续的存储过程，为你的第一份报表奠定了基础。你也了解了用于构建报表的基本元素，并且现在对设计环境已经熟悉。现在，是时候将所有部分组合起来并开始构建报表了。你可以轻松地将本章介绍的概念应用到任何使用
  SQL Server 和关系数据库系统的公司。本章将主要关注基于 SQL Server 医疗保健数据库的数据创建报表解决方案；它将使用许多自 SSRS 在 SQL
  Server 2000 到 2012 版本中诞生以来就可用的报表元素。SSRS 2008 和 2008 R2 引入了许多新功能，例如报表变量、增强的图表和数据可视化。最重要的新增功能是
  `Tablix` 数据区域以及像 `火花线`、`数据条` 和 `指示器` 这样的仪表板风格元素。我们很高兴能将这些重要且期待已久的功能增强纳入本书中展示的报表。


  你将在本章创建的报表称为 `员工服务成本` 报表。该报表将利用相同的查询和存储过程 `Emp_Svc_Cost` 来提供报表数据，这个存储过程你从 第 2 章
  开始就在使用。提醒一下，该查询返回代表为患者执行的服务（例如专业护士或家庭健康助手的出诊）的详细记录。每种类型的服务对于医疗保健公司都有一个关联的成本。这份报表完成后，将根据查询提供的关联数据显示重要的成本点，例如患者的诊断、执行服务的员工、每项服务的日期以及患者的分支机构位置。通过在这些成本点对报表进行分组和排序，你将能够查看从单个患者一直到分支机构位置（可能服务于数百名患者）的服务成本。你将对每一级别进行分组并计算成本金额。


  具体来说，在以下部分中，你将首先使用 `报表向导` 创建 `员工服务成本` 报表（该向导基于预定义的选择生成报表），然后从头开始创建。我们将展示使用向导的过程仅用于演示目的，因此不会继续处理它生成的报表。对于你从头构建的报表，你将添加
  `报表向导` 能够添加的所有功能，以及更多功能。以下列表重点列出了 `员工服务成本` 报表的设计目标：


  *   逐步添加一个基础报表，该报表使用基于你为 `Emp_Svc_Cost` 查询定义的数据集的 `表格` 数据区域。

  *   向报表添加几个基本的格式化元素。

  *   向报表添加交互性，包括文档映射、可见性、超链接操作和交互式排序（在 SSRS 2005 中引入）。文档映射和超链接操作都允许用户导航到报表内或报表外（例如网站）的指定位置。在本章中，你将在报表中使用可见性属性来展开和折叠报表项，从摘要到详细信息。交互式排序赋予了
  SSRS 报表多功能性，允许其进行排序，其方式非常类似于 Microsoft Outlook 允许通过点击列标题进行排序。

  *   通过将数据集从查询更改为参数化存储过程，自动向报表添加参数。你还将添加其他数据集来填充存储过程定义的参数。

  *   学习如何使用修改后的存储过程和 `UDF` 来使用多值参数。

  *   向 `表格` 数据区域添加一个筛选器，以仅显示类型为“就诊”的服务。

  *   向报表添加一个用于前十大诊断的 `图表` 数据区域。

  *   向报表添加一个报表变量（在 2008 版中引入）以用作常量阈值。

  *   向报表添加一个仪表控件以显示阈值信息。

  *   向报表 `表格` 区域添加列分组。`表格` 区域内的列分组是 `表格`、`矩阵` 和 `列表` 数据区域的新 `Tablix` 功能的一部分。`Tablix`
  功能已在 第 4 章 中详细介绍。

  *   为报表添加最后的修饰，例如页眉和页脚、标题以及页码。


  此外，当你开始更深入地使用报表和查询参数时，你将学习如何使用多值参数。正如前面章节所述，多值参数在设计底层查询时需要特殊考虑。因此，在本章中，你将使用修改后的存储过程版本，该版本利用了
  `UDF`；这将教你如何最好地利用此功能。


  在前面的章节中，我们已经介绍了创建你的报表将使用的解决方案、项目和数据源的步骤，因此这里不再重复这些步骤。然而，我们将展示如何使用相同的数据源属性来连接到存储你的报表数据的医疗保健数据库。同一个数据库还包含你在
  第 2 章 创建的存储过程 `Emp_Svc_Cost`，你将在本章后面用到它。




  ### 使用报告向导创建报告


  在许多场景下，报告向导是创建基本报告的快捷方法，该报告可以在部署前进行进一步完善。报告向导适用于主要是数据列表且不需要太多特殊格式的报告。在本节中，你将逐步使用报告向导创建“员工服务成本”报告，然后再手动设计相同的报告。


  要在报告项目中打开报告向导，请右键单击“解决方案资源管理器”中的 `Reports` 文件夹，然后选择 `添加新报告`。向导的第一个屏幕定义了数据源。对于本例，勾选
  `新建数据源`；不过，你也可以选择使用已定义为项目一部分的共享数据源。提供与上一章相同的数据源信息以连接到 `Pro_SSRS` 数据库。连接字符串应类似于以下内容：


  `Data Source=localhost;Initial Catalog=Pro_SSRS`


  向导的下一个屏幕定义查询。将你在第 2 章中创建的查询粘贴到 `查询字符串` 区域（参见图 6-1）。你可以从本书代码下载的 `Query` 文件夹中打开此查询。文件名为
  `Report_Wizard_Query.sql`。单击 `查询生成器` 按钮将启动图形化查询设计器。


