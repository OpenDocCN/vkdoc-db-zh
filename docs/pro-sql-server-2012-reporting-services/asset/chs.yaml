  \ reportTitle.text;\n```\n\n> *   你可以允许用户设置报表的其他属性，例如添加一个在 Report Manager 详细列表视图中显示的说明。例如，你可以添加一个\
  \ Description 属性：\n\n```\nProperty[] itemProps = new Property[1];\nProperty itemProp\
  \ = new Property();\nitemProp.Name = \"Description\";\nitemProp.Value = \"按患者划分的员工服务成本\"\
  ;\nitemProps[0] = itemProp;\n```\n\n> *   然后，你可以将调用 `CreateReport` 的代码从以下内容：\n\n\
  ```\nrs.CreateCatalogItem(\"Report\", reportName, pathName, true, definition, null,\
  \ out warnings);\n```\n\n更改为以下代码：\n\n```\nrs.CreateCatalogItem(\"Report\", reportName,\
  \ pathName, true, definition, itemProps, out warnings);\n```\n\n使用 Report Server\
  \ Web 服务，几乎没有你做不到的事情。有关可以为报表设置的其他属性的更多详细信息，或要了解有关 SOAP API 的更多信息，请参阅 SQL Server\
  \ 2012 Books Online。我们将在下一章更深入地研究 Web 服务。\n\n## 总结\n\n在本章中，我们讨论并演示了如何使用 Report Builder\
  \ 3.0 实用程序、`rs.exe` 应用程序和 BIDS/Visual Studio 将报表部署到你的 SSRS 2012 服务器。此外，你通过 Report\
  \ Server Web 服务使用了 SOAP API 来列出所选服务器上的文件夹，然后允许用户选择一个 RDL 文件，并使用 Visual Studio C#\
  \ Windows 应用程序和 `rs.exe` 实用程序将其上传到所选报表服务器上的用户指定文件夹。我们还研究了一些额外的功能，这些功能可以通过使用 SSRS\
  \ 2012 Web 服务公开的众多方法和属性中的一部分来为应用程序提供。\n\n## 第 9 章\n\n\n\n## 从 .NET 应用程序渲染报表\n\n\
  报表渲染是将报表结果输出到特定格式的过程。你需要向 `SSRS` 传递适当的参数，告诉它你想运行哪个报表，以及可选地指定输出格式、任何用户凭据和实际的报表参数。`SSRS\
  \ 2012` 随后渲染报表并返回结果。\n\n你传递这些参数的方式以及结果返回的方式，取决于你用于渲染报表的 `SSRS 2012` 方法。一旦 `SSRS`\
  \ 获得了所需的信息（基于你运行的特定报表），它就会查询相应的数据源。`SSRS 2012` 会酌情使用传递的凭据和参数，将报表渲染成一种中间格式，然后将此中间格式渲染并过滤成最终请求的显示格式。\n\
  \n使用 `SSRS 2012`，你可以从 `.NET` 应用程序中通过三种方式渲染报表：\n\n### 使用 URL\n\n你可以构建一个 `URL`，让客户端能够访问报表服务器上的报表，并提供任何适当的参数，包括渲染格式、登录信息、报表条件和报表筛选器。这是最灵活的方法之一，因为它几乎适用于任何可以托管或使用\
  \ Web 浏览器或 Web 浏览器控件的语言和平台。事实上，它适用于任何能够创建格式正确的 `URL` 并能使用该 `URL` 启动 Web 浏览器的语言。我们可以使用\
  \ `.NET` 中内置的 `WebBrowser` 控件和格式化的 `URL` 来渲染报表。\n\n### 使用 SOAP API\n\n你可以使用 `SOAP\
  \ API`（也称为报表服务器 Web 服务）来渲染报表。它将渲染后的数据作为流返回，然后你再进行显示。这是一种更困难的渲染方法，因为你从服务器获得的信息本质上是二进制数据流，并且你无法受益于服务器-浏览器组合来完成实际显示数据的工作。但是，你可以使用报表服务器\
  \ Web 服务做更多的事情：你可以用它来访问报表服务器的全部功能。我们将展示如何在你的解决方案中使用报表服务器 Web 服务，以提供有关你正在渲染的报表的信息，例如报表所使用的报表参数。\n\
  \n### 使用报表查看器控件\n\n你可以使用 `Report Viewer control`。`SSRS 2012` 的这个选项提供了一个易于使用的 Windows\
  \ 窗体应用程序或 `ASP.NET` 用户控件，你只需将控件拖放到 Windows 窗体或 Web 窗体上，设置一些属性，即可渲染报表。`Report Viewer\
  \ control` 的主要优点之一是，它允许你渲染位于 `SSRS 2012` 报表服务器上的报表，也可以在本地渲染报表，而不需要报表服务器。\n\n![Image](img/square.jpg)\
  \ 注意 `Report Viewer controls` 包含在当前版本的 `SQL Server` 和 `Visual Studio` 中。你也可以为将要运行应用程序但未安装\
  \ `Visual Studio`/`SQL Server` 的机器下载可再发行组件包。\n\n虽然 `Report Viewer controls` 可能是大多数\
  \ `Visual Studio` 用户用来渲染报表的方法，但最通用的渲染方法是通过 `URL` 访问。在这种情况下，`SSRS 2012` 为大多数报表选项提供了一些默认值。例如，`SSRS`\
  \ 提供了一个默认的用户界面来输入参数和筛选信息。如果有必要，它会提示你输入登录信息，并且默认以 `HTML` 格式进行渲染。你只需在浏览器中传递报表的 `URL`\
  \ 即可获得所有这些功能。如果你仅使用 Web 浏览器渲染报表，而没有其他控制应用程序，这是最有用的。\n\n你可以选择随 `URL` 传递参数来更改这些默认行为，提供登录信息，更改渲染格式，隐藏参数工具栏等等。如果你有一个自定义应用程序并希望自己控制这些选项，而不是提供默认用户界面，这会很有用。\n\
  \n你可以使用报表服务器 Web 服务执行许多相同的操作，但没有真正的默认设置，并且返回数据的实际显示方式由应用程序开发人员决定。通过在 `ASP.NET` 应用程序中使用\
  \ Web 浏览器，或将其嵌入 Windows 窗体应用程序，你可以获得 `URL` 渲染方法的好处，同时又能对其加以控制。这为用户提供了更集成化的体验。本章介绍的方法在很大程度上适用于\
  \ Windows 窗体和 Web 窗体应用程序。对于其中一个项目，我们将展示如何构建一个基于 Windows 窗体的报表查看器，让你可以使用 `SSRS 2012`\
  \ 作为应用程序的报表解决方案。\n\n在本章中，你将执行以下操作：\n\n### URL 渲染访问\n\n学习如何构建一个 `URL`，客户端应用程序通过它来访问报表服务器上的报表。在示例中，你将使用\
  \ Employee Service Cost 报表（可在 Apress 网站的源代码/下载部分找到，网址为 [`www.apress.com`](http://www.apress.com)，包含在本章的代码下载中）。\n\
  \n### URL 报表参数\n\n探索在 `URL` 中指定的报表参数，这些参数控制报表的渲染方式。你可以指定实际格式（例如 `HTML` 或 `PDF`）。你可以指定渲染报表中的特定页面，或者你可以搜索特定单词并从该页面开始渲染。\n\
  \n### URL 查看器应用程序\n\n构建一个简单的 `.NET` Windows 窗体应用程序，通过嵌入窗体的 `WebBrowser` 控件访问和渲染报表。\n\
  \n### 报表服务器 Web 服务调用\n\n使用对报表服务器 Web 服务的调用来查询报表条件和筛选参数。这允许你在 Windows 窗体应用程序上显示这些信息。然后，你将再次使用\
  \ `SOAP API` 来查看参数是否有可供用户选择的值列表。如果有，你将使用这些值为每个参数填充组合框。你还将给用户一个组合框来选择渲染格式。然后，你将向用户显示所有选择，并使用他们选择的值来创建一个包含运行报表所需的所有信息的\
  \ `URL`。最后，你将使用这个 `URL` 和嵌入的 Web 浏览器，根据用户输入的报表参数和渲染命令来渲染报表。\n\n### 报表查看器控件，服务器端模式\n\
  \n使用 `Report Viewer control`，利用该控件的服务器端模式渲染相同的报表。\n\n### 报表查看器控件，本地渲染\n\n使用 `Report\
  \ Viewer control` 和本地填充的数据集，在没有 `SSRS` 报表服务器的情况下在本地渲染报表。\n\n### 在 ASP.NET 应用程序中使用报表查看器控件\n\
  \n使用 `Report Viewer control` 渲染服务器端报表。我们将利用 Web 服务来检索可供选择的报表列表。\n\n在运行包含的示例之前，请务必阅读\
  \ `ReadMe.htm`。它位于示例根文件夹中的一个文件里。如果你在 `Visual Studio` 中打开代码，它将在“解决方案项”文件夹下。它包含了运行示例之前所需的设置和配置步骤。\n\
  \n\n\n## 实现 URL 访问\n\n在本节中，我们将向您展示如何构建一个 URL，以便访问报告服务器上所需的报告，并向报告传递适当的参数。\n\n整个\
  \ URL 的语法分为两部分。第一部分指定报告文件的路径，第二部分指定参数。完整的 URL 语法如下：\n\n```\nhttp://server/virtualroot?[/pathinfo]&prefix:param=value[&prefix:param=value]...n\n\
  ```\n\n以 SharePoint 集成模式安装的 SSRS 的语法将类似于：\n\n```\nhttp://server/subSiteName/_vti_bin/reportserver?[/pathinfo]&prefix:param=value[&prefix:param=value]...n\n\
  ```\n\n![Image](img/tab_9_1.jpg)\n\n现在，我们将引导您逐步构建一个用于访问员工服务成本报告的 URL。\n\n## URL\
  \ 报告访问路径格式\n\n如前一节所述，访问相应报告的路径以报告服务器本身的名称开头；在本例中，我们将使用 `http://localhost` 并采用本机模式的\
  \ SSRS 安装。其后是 SSRS 2012 虚拟根文件夹的名称（例如 `/reportserver`，这是安装时的默认文件夹）。\n\n`注意` `/reports`\
  \ 虚拟根文件夹映射到 SSRS 2012 自带的报告管理器应用程序。如果您导航到此 URL，您会发现它通过报告管理器列出了您报告服务器上文件夹及其内的报告。\n\
  \n然后，您在路径后添加 `?`，以告知 SSRS 2012，URL 之后的所有内容都是参数。接下来是可选的路径信息，您可以在其中指定用于组织报告的基础文件夹内的任何子文件夹，例如\
  \ `/Pro_SSRS/Chapter_9`。最后，是实际报告的名称，例如 `EmployeeServiceCost`。\n\n因此，在本例中，访问员工服务成本报告的完整路径如下：\n\
  \n```\nhttp://localhost/reportserver?/Pro_SSRS/Chapter_9/EmployeeServiceCost\n```\n\
  \n现在，我们将介绍 URL 中指定任何必要参数的部分。\n\n#### URL 参数和前缀\n\n您现在需要向报告传递适当的参数。您需要关注几类参数：\n\n\
  > *报告参数（无前缀)*：这些参数提供给报告的底层查询，用于在报告呈现时作为信息的筛选器。因此，它们精确控制报告显示哪些数据。\n>\n> *HTML 查看器参数\
  \ (`rc:`)*：这些参数控制基于 Web 的报告查看器的哪些功能处于活动状态，以及报告查看器从哪一页开始显示报告。例如，您可以使用 `FindString`\
  \ 参数让查看器从第一个找到特定单词的页面开始显示报告。\n>\n> *报告服务器命令参数 (`rs:`)*：这些参数控制所发出的请求类型以及返回报告的格式。例如，我们将展示如何使用\
  \ `rs:Command=Render&rs:Format=HTML4.0` 参数在报告查看器中以 HTML 格式呈现您的报告。\n>\n> *报告查看器 Web\
  \ 部件命令参数 (`rv:`)*：这些参数控制 SharePoint 集成的 Web 部件。它们与 HTML 查看器参数非常相似，因为它们将控制您在 SharePoint\
  \ 站点上查看报告的门户。例如，您可以使用 `AsynchRender` 参数控制报告是异步还是同步呈现。除了 `rv:` 组之外，Web 部件还可以接受 `rs:ParameterLanguage`\
  \ 参数。\n\n## 报告参数\n\n报告参数是实际传递给底层报告的参数，而不是发送给报告服务器的指令。也就是说，您使用它们向报告传递条件，例如开始和结束日期、员工\
  \ ID 等。您可以将这些参数传递给报告的查询，它们是在您为数据源指定参数时创建的。您还可以在报告中将参数用作变量和筛选器的值。\n\n## HTML 查看器命令\n\
  \n您使用 HTML 查看器命令告诉 SSRS 2012 如何呈现报告。您可以使用表 9-2 中的命令来控制查看器向用户显示的方式，以及控制报告在查看器中显示的某些方面。\n\
  \n![Image](img/tab_9_2.jpg)\n\n## 报告服务器命令参数\n\n报告服务器命令参数以 `rs:` 为前缀，用于告知报告服务器所发出的请求类型（参见表\
  \ 9-3）。您使用它们以 XML 和 HTML 格式检索报告和数据源信息，并检索子元素，例如当前文件夹的报告名称。您还使用命令参数告诉服务器您想要呈现报告以及以何种格式呈现，以及是否希望基于现有的快照呈现该报告。\n\
  \n![Image](img/tab_9_3.jpg)\n\n## 凭据参数\n\n如果您在之前版本的 Reporting Services 中使用凭据参数来传递数据源连接信息，则必须修改这些报告才能将它们升级到\
  \ SSRS 2012 服务器。以前用于向报告服务器传递用户名和密码信息以进行呈现的凭据参数是以明文形式存储在浏览器缓存中的。这非常不安全，因此这组参数已从 SSRS\
  \ 2012 中移除。\n\n## 报告查看器 Web 部件命令\n\n报告 Web 部件查看器命令以 `rv:` 为前缀，用于定位在 SharePoint 模式下用于查看报告的\
  \ Web 部件。您可以使用这些参数控制报告及其控件在 Web 部件中的显示方式。您还可以使用这些参数控制报告的呈现方式。您可以在表 9.4 中查看这些参数。\n\
  \n![Image](img/tab_9_4.jpg)\n\n\n\n#### 示例 URL\n\n现在你已检查了 URL 的每个组成部分，查看几个完整的示例\
  \ URL 会很有帮助。你需要从本章下载的示例中包含 `readme.html` 文件来正确设置报告。下面的 URL 以 HTML 4 格式呈现报告，并通过将\
  \ `rc:Toolbar` 参数值设置为 `false` 来隐藏 HTML 查看器工具栏，同时将服务年份参数设置为 2009：\n\n`http://localhost/reportserver?/Pro_SSRS/Chapter_9/EmployeeServiceCost&rs:Command=Render&rs:Format=HTML4.0&rc:Toolbar=false&ServiceYear=2009`\n\
  \n下一个示例传递了 `ServiceYear` 为 2009 的报告参数，并隐藏了用户提供的参数的输入显示：\n\n`http://localhost/reportserver?/Pro_SSRS/Chapter_9/EmployeeServiceCost&rs:Command=Render&rs:Format=HTML4.0&rc:Parameters=false&ServiceYear=2009`\n\
  \n下一个使用 `rs:Format` 参数将默认输出格式设置为 PDF，服务年份为 2009：\n\n`http://localhost/reportserver?/Pro_SSRS/Chapter_9/EmployeeServiceCost&rs:Command=Render&rs:Format=PDF&serviceyear=2009`\n\
  \n此示例隐藏了报告文档地图：\n\n`http://localhost/reportserver?/Pro_SSRS/Chapter_9/EmployeeServiceCost&rs:Command=Render&rc:DocMap=false&ServiceYear=2009`\n\
  \n最后一个示例——适用于你可能尚未设置的 SharePoint 集成模式——将隐藏工具栏：\n\n`http://localhost/_layouts/ReportServer/RSViewerPage.aspx?rv:RelativeReportUrl=/Chapter\
  \ 9/EmployeeServiceCost.rdl&rv:Toolbar=None`\n\n你已经简要了解了在本机模式和 SharePoint 模式下通过\
  \ URL 呈现报告所需的命令。在本章的剩余部分，我们将展示如何创建你自己的报告查看器以及使用报告查看器控件。自定义查看器将使用 URL 命令将 SSRS 2012\
  \ 报告集成到基于.NET Windows Forms 的应用程序中，而报告查看器控件将在 ASP.NET 网页中使用。\n\n## 将 SSRS 2012 与\
  \ .NET 应用程序集成\n\n既然你对 URL 访问的工作原理有了一些了解，你将学习如何呈现报告。你将从构建一个 Windows Forms SSRS 2008\
  \ 查看器应用程序开始，该应用程序使用.NET 2.0 `WebBrowser` 控件和 URL 访问来为你的应用程序呈现报告。\n\n## 使用 WebBrowser\
  \ 控件构建自定义报告查看器\n\n我们将展示如何创建一个简单的 Windows Forms 应用程序，其中包含嵌入式浏览器，你将使用它来查看报告。\n\n#####\
  \ 创建查看器窗体\n\n在此示例中，你将使用 C#创建查看器应用程序。我们还将在额外的可下载内容中包含用 VB.NET 编写的相同应用程序。请按照以下步骤操作：\n\
  \n> 1.  打开 `Visual Studio 2010`。\n> 2.  创建一个新项目。\n> 3.  在“新建项目”对话框中，选择 `Visual C#`\
  \ > `Windows` > `Windows Forms Application`。将其命名为 `SSRS Viewer WBC`。在“解决方案”下，选择“创建新解决方案”，并将其命名为\
  \ `Chapter 9`。单击“确定”创建你的项目。\n\n现在你已经创建了项目，你将使用该窗体来创建报告查看器：\n\n> 1.  `Visual Studio\
  \ 2010` 会向项目添加一个名为 `Form1.cs` 的单个窗体。将该窗体重命名为 `ViewerWBC.cs`。\n> 2.  将空白窗体的大小调整为\
  \ 800×600。\n> 3.  从工具箱的“公共控件”部分将 `WebBrowser` 控件添加到窗体中。将其命名为 `WebBrowser`，并将该控件锚定到窗体的顶部、底部、左侧和右侧。调整\
  \ `WebBrowser` 控件的大小，使其从窗体的两侧延伸到窗体底部。\n> 4.  现在添加一个文本框，并将其命名为 `reportURL`。在文本框之后，添加一个名为\
  \ `reportRun` 的按钮，并将按钮文本设置为 `Run`。\n\n你现在应该拥有一个看起来像 `图 9-1` 的窗体。\n\n![Image](img/9781430238102_Fig09-01.jpg)\n\
  \n**`图 9-1.`** `ViewerWBC.cs` 窗体\n\n##### 为查看器窗体编写代码\n\n要编写查看器窗体的代码，你将添加必要的代码来使用此自定义报告查看器呈现\
  \ SSRS 2012 报告。你需要向按钮的点击事件添加一些代码，以确保你可以浏览并查看现有报告。确保 `ViewerWBC.cs` 窗体在设计视图中打开，然后双击\
  \ `Run` 按钮。这将创建一个空方法来处理按钮的点击事件。将 `代码清单 9-1` 中的代码添加到你的 `reportRun_Click` 方法中。\n\n\
  **`代码清单 9-1.`** `reportRun` 点击事件：浏览到 URL\n\n```\nprivate void reportRun_Click(object\
  \ sender, EventArgs e)\n{\n    webBrowser.Navigate(reportURL.Text);\n}\n```\n\n\
  现在在调试模式下运行项目。当窗体显示时，在文本框中输入以下 URL：\n\n`http://localhost/reportserver/?/Pro_SSRS/Chapter_9/EmployeeServiceCost&rs:Command=Render`\n\
  \n现在单击 `Run`。这将呈现“Employee Service Cost”报告。一旦报告开始在 Web 浏览器对象中呈现，系统将提示你提供参数。你可能还需要将上述\
  \ URL 中的 `localhost` 替换为你的报告服务器的名称。此时，你应该会看到类似 `图 9-2` 的内容。\n\n![Image](img/9781430238102_Fig09-02.jpg)\n\
  \n**`图 9-2.`** 运行“Employee Service Cost”报告的 SSRS Viewer WBC 应用程序\n\n接下来，我们将添加一些代码，以便在程序启动时在\
  \ URL 文本框中设置一个包含报告路径的默认字符串，这样你就不必每次都键入它。右键单击你的 `ViewerWBC.cs` 文件并选择“查看代码”，以打开你需要添加此代码的部分。\n\
  \n```\npublic ViewerWBC()\n{\n    InitializeComponent();\n    // 为示例方便设置初始 URL\n\
  \    reportURL.Text = \"http://localhost/reportserver/?/Pro_SSRS/Chapter_9/EmployeeServiceCost&rs:Command=Render\"\
  ;\n```\n\n这是一个非常简单的应用程序，使用了每个用户的客户端上都应可用的简单控件。你可以将这种类型的查看器与我们讨论过的 URL 命令结合使用，将自定义报告查看器包含在你可能构建的任何应用程序中。接下来，我们将使用一个不太常见但更强大的控件将我们的\
  \ SSRS 报告集成到 Windows 窗体或 ASP.NET 项目中。\n\n\n## 使用 Report Viewer 控件构建报表查看器\n\n现在，您将学习如何使用\
  \ Report Viewer 控件来呈现相同的员工服务成本报告。这很可能是呈现服务器端报告最受欢迎的方法，并且它还能够基于 RDL 在本地呈现报告，而无需报告服务器。\n\
  \n您可以使用两种 Report Viewer 控件：一种用于 Windows 窗体应用程序，另一种用于 ASP.NET 应用程序。这些控件使您能够更轻松地为\
  \ Windows 或 ASP.NET 应用程序添加丰富的报告功能。这些控件提供了 URL 呈现方法的能力，但通过在代码中以 Report Viewer 控件的属性设置大多数选项，使其更易于实现。换句话说，您不需要将它们包含在作为\
  \ URL 传递的字符串中。使用控件的另一个主要优点是，在 Visual Studio 2010 IDE 中，您可以获得所有选项的完整 IntelliSense\
  \ 支持。\n\n表 9-5 列出了 Report Viewer 控件的一些关键属性和方法。\n\n![Image](img/tab_9_5.jpg)\n\n\
  ![Image](img/square.jpg) **注意** 有关 Report Viewer 控件成员以及控件附带的其他属性、方法和事件的更多信息，请参阅\
  \ Visual Studio 2010 帮助。\n\n在本示例中，我们将介绍如何使用 Windows 窗体版本的 Report Viewer 控件。\n\n\
  ![Image](img/square.jpg) **注意** 在“使用报表服务器 Web 服务”部分，我们将展示如何扩展应用程序，使其使用 Report Server\
  \ Web 服务调用来查询报告服务器，以获取报告可以接受的参数以及每个参数可能的值。我们将展示如何使用这些参数为 Windows 窗体应用程序的用户创建下拉列表，然后呈现报告。\n\
  \n#### 创建查看器表单\n\n要在 C# 中创建查看器表单，您将首先通过执行以下步骤向解决方案添加一个新项目：\n\n> 1.  从菜单中选择 **文件**\
  \ ![Image](img/U004.jpg) **添加** ![Image](img/U004.jpg) **新建项目**。\n> 2.  在“新建项目”对话框中，选择\
  \ **Visual C#** ![Image](img/U004.jpg) **Windows** ![Image](img/U004.jpg) **Windows\
  \ 窗体应用程序**。将其命名为 `SSRS Viewer RVC`。\n> 3.  创建项目后，您将使用将创建报表查看器的窗体：\n> 4.  将刚刚创建的默认窗体重命名为\
  \ `ViewerRVC.cs`。\n> 5.  在解决方案资源管理器中双击 `ViewerRVC.cs` 文件，在设计模式下打开它。\n> 6.  将空白窗体的大小调整为大约\
  \ 800×600 像素，并在属性部分将窗体的文本更改为 `SSRS Viewer RVC`。\n> 7.  从工具箱的“Reporting”部分将 Report\
  \ Viewer 控件添加到窗体。在属性中将控件命名为 `reportViewer`，并将其锚定到窗体的顶部、底部、左侧和右侧。调整控件的大小以填充窗体，但要在顶部留出空间放置更多组件。（如果您没有报表查看器控件，可能需要从以下网址下载：`www.microsoft.com/download/en/details.aspx?id=6610`）\n\
  > 8.  现在添加一个文本框，命名为 `reportURL`，紧接着文本框添加三个按钮，分别命名为 `runServer`、`runLocal` 和 `getParameters`。将它们的\
  \ `Text` 属性分别设置为 `Run Server`、`Run Local` 和 `Parameters`。\n\n您现在应该有一个看起来像图 9-3 的窗体。\n\
  \n![Image](img/square.jpg) **注意** 在 Visual Studio 2010 中，您需要使用 .NET Framework 3.5\
  \ 或更高版本才能在 IDE 中获得 `ReportViewer` 控件。如果使用任何更早的版本，您将无法从工具箱中将查看器添加到项目中。\n\n现在，您将开始添加使用新的\
  \ Report Viewer 控件来呈现 SSRS 2012 报告所需的代码。\n\n![Image](img/9781430238102_Fig09-03.jpg)\n\
  \n***图 9-3.** ViewerRVC.cs 窗体*\n\n#### 编写查看器表单代码\n\n首先，将新的命名空间 `Microsoft.Reporting.WinForms`\
  \ 的 `using` 语句添加到类顶部的其他命名空间声明中。这样做将允许您访问该命名空间的成员，而无需在每次使用来自该命名空间的方法或属性时键入完整的命名空间。右键单击\
  \ `ViewerRVC.cs` 文件并选择“查看代码”，将此 `using` 语句添加到文件中。\n\n```\nusing Microsoft.Reporting.WinForms;\n\
  ```\n\n其次，将清单 9-2 中显示的代码添加到“Run Server”按钮的 `Click` 事件中。确保 `ViewerRVC.cs` 窗体在设计视图中打开，然后双击“Run\
  \ Server”按钮。这将创建一个空方法来处理按钮的 `Click` 事件。\n\n***清单 9-2.** runServer 点击事件：在远程模式下运行报告*\n\
  \n```\nprivate void runServer_Click(object sender, EventArgs e) {\n    reportURL.Text\
  \ = \"/Pro_SSRS/Chapter_9/EmployeeServiceCost\";\n    reportViewer.ProcessingMode\
  \ = ProcessingMode.Remote;\n    reportViewer.ServerReport.ReportServerUrl = new\
  \ Uri(@\"http://localhost/reportserver/\");\n    reportViewer.ServerReport.ReportPath\
  \ = reportURL.Text;\n    reportViewer.RefreshReport();\n}\n```\n\n现在以调试模式运行项目。然后单击“Run\
  \ Server”。这将呈现员工服务成本报告，您可以在其中输入报告的参数。当然，您需要在清单 9-2 中看到 `localhost` 的地方使用您的报告服务器的名称。此时，您应该看到类似图\
  \ 9-4 的内容。\n\n![Image](img/9781430238102_Fig09-04.jpg)\n\n***图 9-4.** SSRS Viewer\
  \ RVC 运行服务器呈现的报告*\n\n这就是使用 Report Viewer 控件在 SSRS 2012 服务器上呈现报告的全部内容。\n\n### 本地呈现报告\n\
  \n我们现在将介绍如何在不使用 SSRS 2012 服务器的情况下在本地呈现报告。这有点复杂，因为您需要负责用报告所需的数据填充数据源。但是，它确实为开发人员提供了极大的灵活性，因为您可以在没有服务器的情况下使用\
  \ SSRS 2012 报告功能。\n\n![Image](img/square.jpg) **注意** 服务器和本地报表定义文件并非 100% 兼容。这意味着无法将同一个\
  \ RDL 源文件同时用于本地和远程使用。实际上，您会注意到，默认情况下，用于服务器端或远程处理的报告创建时使用 `.rdl` 扩展名，而用于客户端或本地处理的报告创建时使用\
  \ `.rdlc` 扩展名。虽然它们并非 100% 可互换，但您可以通过对底层 RDL 进行一些更改来将一个用于另一个。\n\n### 创建报表的数据源\n首先，你需要通过添加之前创建的数据集来向项目添加数据源。要添加数据源，请按照以下步骤操作：\n\
  1.  在“项目资源管理器”中，右键单击项目名称 `SSRS Viewer RVC`，指向 `添加`，然后选择 `现有项`。\n2.  导航到包含第 9 章示例的文件夹，并在\
  \ `SRSS Viewer RVC` 文件夹中选择 `EmployeePay.xsd`。这是你将用于定义报表数据源的 XML 架构文件。当你将 `.xsd`\
  \ 文件添加到项目时，它也会出现在“数据源”窗口下。如果你没有看到“数据源”窗口，请从菜单中选择 `数据` > `显示数据源`。\n\n![Image](img/square.jpg)\
  \ **注意** 或者，你本可以使用通过选择 `数据` > `添加新数据源` 找到的数据源配置向导。使用它，你可以创建多种类型的数据源，包括那些源自数据库、Web\
  \ 服务甚至对象的数据源。请记住，就像本例一样，由你负责检索数据并用其填充数据源。\n\n接下来，你将创建一个本地 RDL 文件（`.rdlc`），该文件将使用报表查看器控件在本地处理模式下进行渲染。\n\
  \n### 设计报表\n要设计报表，请按照以下步骤操作：\n1.  要向项目添加报表，请在“解决方案资源管理器”中右键单击项目名称—`SSRS Viewer RVC`。\n\
  2.  在快捷菜单中，选择 `添加` > `新建项`。这将打开“添加新项”对话框。\n3.  在左侧列表中选择“报表”部分，然后单击“报表”图标，输入文件名 `EmployeePay.rdlc`，然后单击\
  \ `添加`。这将在 Visual Studio 中启动报表设计器功能。`.rdlc` 扩展名表示它是用于客户端或本地渲染的报表。\n4.  确保报表被选中。打开“工具箱”。从“工具箱”中，将“表”报表项拖放到报表上。\n\
  5.  现在应该会弹出“数据集属性”窗口。在此窗口中，从“数据源”下拉列表中选择 `Employees` 选项。你将看到来自此数据源的字段填充在右侧的“字段”数据网格中。将此数据集命名为\
  \ `Employees_EmployeePay`，然后单击 `确定`。\n6.  你现在应该在报表设计器中看到该表。在第一列的“数据”行中，单击右上角字段图标以选择一个字段。在第一列中选择\
  \ Employee ID 字段。\n7.  对第二列和第三列重复此操作。分别为第二列和第三列选择 `StartDate` 和 `Amount`。\n8.  在报表顶部添加一个文本框，并使用文本\
  \ “Employee Pay Report” 作为其值。\n\n你现在应该拥有一个类似于图 9-5 的报表。\n\n![Image](img/9781430238102_Fig09-05.jpg)\n\
  \n**图 9-5.** 设计器中的本地报表\n\n现在，你拥有一个使用你创建的数据集作为数据源的报表。将清单 9-3 中所示的代码添加到 `runLocal`\
  \ 按钮的单击事件中，以填充数据集并使用你创建的 `.rdlc` 文件在报表查看器控件中显示值。确保 `ViewerRVC.cs` 窗体在设计视图中打开，然后双击“运行本地”按钮。这将创建一个用于处理按钮单击事件的空方法。\n\
  \n**清单 9-3.** `runLocal` 单击事件：在本地模式下运行报表\n\n```\nprivate void runLocal_Click(object\
