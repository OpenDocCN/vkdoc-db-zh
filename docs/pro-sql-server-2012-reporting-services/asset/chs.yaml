  ## 创建数据源视图


  你通过关系型数据源为报表模型项目创建数据源视图，其中有一组可以通过连接来构成数据源视图基础的表。在 `Pro_SSRS_2008R2` 数据库中，你知道许多相关的表是通过列
  ID 字段连接的；例如，`Admissions`（入院）表通过 `PatID` 字段连接到 `Patient`（患者）表。这两个表中的字段可能都与设计报表的用户相关；然而，多余的数据可能只会让用户感到困惑。作为报表建模者，你的部分工作是简化架构的复杂性，同时提供一个包含直观或“友好”名称并且只提供有用数据的模型。为什么你要使用
  `Dscr` 来表示诊断代码，而实际上你应该直接将其命名为 Diagnosis Name（诊断名称）呢？既然也可以向数据源视图添加由自定义查询派生出的表（即衍生表），你将能更好地控制创建自定义数据源视图，并省去大量移除你所使用的所有表中包含的无关字段的工作。随着你逐步完成这个过程，这一点会变得更加明显。现在，我们将展示如何执行以下逻辑步骤，以保持数据源视图及后续模型的简单高效：


  > *   为数据源视图构建一个查询，而不是使用多个表

  > *   根据报表设计者的请求，只选择相关且可能有用的字段

  > *   为数据源视图字段和值使用友好的名称


