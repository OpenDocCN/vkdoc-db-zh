  ## 创建矩阵报告\n\n与表格报告不同，矩阵报告以二维方式显示聚合值，同时包含列组和行组。无论是总和、平均值还是计数，这些汇总值都会在行和列的分组层级相交。这创建了一个交叉表报告，类似于\
  \ Microsoft Excel 中的数据透视表。此报告的需求之一是显示患者的住院时长，从入院到出院的时间。另一个要求是报告中需显示出院原因。你可以将这两个需求完美结合到一个矩阵报告中。\n\
  \n那么，回到 Report Builder 1.0 的设计区域，在任务窗格的“报告布局”部分点击“矩阵（交叉表）报告”。这将打开一个新的空白矩阵模板，你可以像处理表格报告一样，将字段拖放到矩阵数据区域上。该模板不过是一个预定义的矩阵数据区域，你将向其添加几个字段，如\
  \ 图 13-32 所示。\n\n![Image](img/9781430238102_Fig13-32.jpg)\n\n**图 13-32.** 空白矩阵报告\n\
  \n要开始创建此报告，请展开“字段”列表中的 `Total Length of Stay` 属性。将模型生成时计算的 `Avg Length of Stay`\
  \ 属性拖到矩阵的汇总区域。对于行分组，添加 `Discharge Reason` 字段。最后，将 `Marital Status ID` 字段拖到列分组区域，使矩阵报告类似于\
  \ 图 13-33。需要调整 `Discharge Reason` 字段的大小，并将 `Marital Status ID` 字段设置为居中对齐。此时，你还需要为报告添加一个标题：“平均住院时长”。将标题设为粗体，并将字体类型设置为\
  \ Arial Rounded MT Bold。\n\n![Image](img/9781430238102_Fig13-33.jpg)\n\n**图 13-33.**\
  \ 包含数据的矩阵报告\n\n在预览时，报告已初具雏形，如 图 13-34 所示；然而，你需要处理一些异常情况。首先，数字格式并非你所期望或想要的。默认情况下分配给\
  \ `Avg Length of Stay` 字段的数据类型是常规数字，这并不理想。你需要为数字添加格式。其次，你会看到包含空值的行和列。这可能有两个原因：首先，你包含了尚未出院的患者，即活跃患者；其次，婚姻状况并非必填字段，因此某些记录会没有值。\n\
  \n![Image](img/9781430238102_Fig13-34.jpg)\n\n**图 13-34.** 矩阵报告的初始预览\n\n你可以通过返回设计区域，右键点击最后一列（即总计列），然后选择\
  \ `Format`（格式）来处理数字格式问题。在 `Format`（格式）对话框中，将定义的格式从 `General`（常规）更改为 `1234.56`，如\
  \ 图 13-35 所示，并将小数位数从 `2` 改为 `0`。然后点击 `OK`（确定）。对所有其他值字段执行相同的格式设置。\n\n![Image](img/9781430238102_Fig13-35.jpg)\n\
  \n**图 13-35.** 更改数字格式\n\n为了解决空列问题，请向报告添加一个筛选器，将数据限制为仅包含已出院且有出院原因的患者，以及定义了婚姻状况的患者。工具栏上的\
  \ `Filter`（筛选器）按钮将启动 `Filter Data`（筛选数据）对话框。在 图 13-36 中，你可以看到可以添加四个筛选条件：`MaritalStatusID`、`Discharge\
