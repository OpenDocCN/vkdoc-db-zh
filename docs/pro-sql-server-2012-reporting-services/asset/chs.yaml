  ## 引言


  从核心来看，设计报表的过程在过去 20 年里并没有发生实质性变化。报表设计者在诸如`Reporting Services`、`Business Objects
  Reports`或`Microsoft Access`等设计应用程序中，布局包含来自已知数据源的数据的报表对象。然后，他或她测试报表执行情况，验证结果的准确性，并将报表分发给目标受众。


  当然，不同的设计应用程序之间存在足够的差异，这意味着设计者必须熟悉每个特定的环境。然而，有足够的交叉功能使得学习曲线变得平缓。例如，`SUM`函数在`Business
  Objects Reports`中与在`Microsoft Access`中，以及在`结构化查询语言`（`SQL`）中是相同的。


  使用`Microsoft SQL Server 2012 Reporting Services`（本书中统称为`SSRS`），不同图形化报表设计应用程序之间的报表设计方式差异再次变得微小。因此，如果您有以前的报表设计经验，您对`SSRS`的学习曲线应该相对平缓。如果您来自`.NET`环境，这一点尤其正确，因为`SSRS
  2012`的报表设计器应用程序是`Visual Studio 2010`或随`SQL Server 2012`一起提供的应用程序`SQL Server Data
  Tools`（`SSDT`），以前称为`Business Intelligence Development Studio`（`BIDS`）。我们在本书中交替使用`BIDS`和`SSDT`，大多数引用使用`BIDS`。我们这样做主要是因为`Reporting
  Services`在`SQL Server`的`Business Intelligence`产品栈中所扮演的角色，同时也考虑到可能正在使用早期版本`Reporting
  Services`（如`SSRS 2008 R2`）的读者。


  尽管如此，有几点不同将`SSRS`与其他报表解决方案区分开来：


  *   它提供了一个基于`报表定义语言`（`RDL`）的标准报表平台，RDL 是规定所有`SSRS`报表通用结构的`XML`架构。这允许从任何支持`RDL`架构的第三方应用程序创建报表。

  *   `SSRS`是`SQL Server 2012`版本不可分割的一部分。

  *   `SSRS`开箱即用地提供了在其他产品中需要昂贵附加组件才能获得的功能。这些功能包括订阅服务、报表缓存、报表历史记录和报表执行计划安排。

  *   `SSRS`可以通过第三方插件、自定义代码和已编译的`DLL`进行扩展。

  *   `SSRS`作为一种基于 Web 的解决方案，可以部署在各种平台上。

  *   `SSRS`还能轻松与微软的企业协作软件`SharePoint 2010`集成。


  本书是与一个真实的医疗保健应用程序`SSRS`部署并行编写的，因此它涵盖了`SSRS`几乎所有的设计和部署考虑因素，始终从如何有效完成任务的角度出发。您将找到分步指南、实用技巧和最佳实践，以及您可以修改并在自己的`SSRS`应用程序中使用的代码示例。


  ### 本书面向的读者


  我们合著本书的意图是从多个角度演示如何使用`SSRS`。作为报表架构师和报表开发人员，我们使用`SSRS`标准工具（如`BIDS`中的`Report Designer`和`Report
  Manager`）来完成报表设计和部署过程。我们还展示了开发人员如何通过创建自定义`Windows`和`Web Forms`应用程序来扩展`SSRS`。




  ## 前提条件


  本书所有示例中使用的核心软件是：


  *   Microsoft SQL Server 2012

  *   Microsoft Visual Studio 2010 – 在第 7、8、9 和 10 章中使用

  *   Microsoft SharePoint 2010 – 在第 12 章中与 SSRS 集成时使用

  *   Microsoft SQL Server 2008 R2 – 在第 13 章中用于通过报表模型进行临时报告


  如果您，作为读者，希望跟随本书中的示例进行操作，则需要使用上述每项软件。大多数示例是使用 SQL Server 2012 构建的，但除了第 7、8 和 9 章外，它们也可以在
  SQL Server 2008 R2 上执行。


  ## 下载代码


  在本书中，我们使用了为某个医疗保健应用程序设计的真实数据库的子集，这是我们中一些人多年来开发的。您可以在 Apress 网站（[`www.apress.com`](http://www.apress.com)）的“源代码/下载”部分找到所有支持材料（数据库、第
  12 章中使用的数据仓库数据库和多维数据集文件、完成的 RDL 文件、查询、存储过程以及 .NET 应用程序项目）和完整的安装说明。由于多年来已有许多类似标题的书籍存在，使用本书的
  ISBN 号码可能更容易找到它。本书的 13 位行业标准 ISBN 号码是 978-1-4302-3810-2。


