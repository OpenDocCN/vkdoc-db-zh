  \n### 部署自定义程序集\n\n部署自定义程序集比通过 `Code` 元素嵌入报表中的代码更困难。这是因为以下原因：\n\n> *   自定义程序集不是报表本身的一部分，必须单独部署。\n\
  > *   自定义程序集不部署到与报表相同的文件夹。\n> *   Visual Studio 2010 中的内置项目部署方法不会自动部署你的自定义程序集。\n\
  > *   默认情况下，自定义程序集仅被授予 `Execution` 权限。`Execution` 权限允许代码运行，但不能使用受保护的资源。\n\n要在 SSRS\
  \ 2012 中使用你的自定义程序集，你需要采取以下步骤将它们放置在 SSRS 2012 可以找到的位置，并在必要时编辑控制安全策略的文件。文件的位置取决于你想在\
  \ Visual Studio 的报表设计器中使用它们还是在报表服务器上使用它们。\n\n1.  你需要将你的自定义程序集部署到报表设计器和/或 SSRS 2012\
  \ 应用程序文件夹。\n    *   对于报表设计器/Visual Studio，默认路径是 `C:\\Program Files (x86)\\Microsoft\
  \ Visual Studio 10.0\\Common7\\IDE\\PrivateAssemblies`。\n    *   对于 SSRS 2012，默认路径是\
  \ `C:\\Program Files\\Microsoft SQL Server\\MSRS11.MSSQLSERVER\\Reporting Services\\\
  ReportServer\\bin`。\n\n    ![Image](img/square.jpg) **注意** 你需要有必要的权限才能访问这些文件夹。默认情况下，标准\
  \ `Users` 组的成员没有对这些文件夹的必要写入/修改权限。以具有适当安全权限（如管理员）的用户身份登录后，你可以设置文件夹的权限，以允许权限较低的帐户登录用户进行必要的访问。或者，你可以在登录时或以具有必要权限的用户身份运行时，将文件移动到适当的文件夹。\n\
  \n2.  接下来，如果你的自定义程序集需要除 `Execution` 权限之外的额外权限，则需要编辑 SSRS 2012 安全策略配置文件。（对于 SSRS\
  \ 2012，默认位置是 `C:\\Program Files\\Microsoft SQL Server\\MSRS11.MSSQLSERVER\\Reporting\
  \ Services\\ReportServer\\rssrvpolicy.config`。）你也应在此时更新设计器权限配置文件。该文件的默认位置是 `C:\\\
  Program Files (x86)\\Microsoft Visual Studio 10.0\\Common7\\IDE\\PrivateAssemblies\\\
  RSPreviewPolicy.config`。不过，此配置文件使用的程序集路径将与你的 SSRS 实例略有不同，因为我们将在 Visual Studio 2010\
  \ 的私有程序集文件夹中放置 DLL 文件。\n\n    例如，如果你正在编写一个自定义程序集来计算员工每次访问的成本，你可能需要从文件中读取工资率。为了检索费率信息，你将需要向你的自定义程序集授予额外的安全权限。要给予你的自定义程序集\
  \ `FullTrust` 权限，你可以将 清单 7-4 中所示的 XML 文本添加到 `rssrvpolicy.config` 文件的相应 `CodeGroup`\
  \ 部分。\n\n***清单 7-4.** 为 SSRS 和 Visual Studio 的自定义程序集授予 FullTrust 权限*\n\n```xml\n\
  <CodeGroup class=\"UnionCodeGroup\"\n    version=\"1\"\n    PermissionSetName=\"\
  FullTrust\"\n    Name=\"EmployeePayCodeGroup\"\n    Description=\"Employee Cost\
  \ Per Visit\">\n    <IMembershipCondition\n        class=\"UrlMembershipCondition\"\
  \n        version=\"1\"\n        Url=\"C:\\Program Files\\Microsoft SQL Server\\\
  MSRS11.MSSQLSERVER\\Reporting Services\\ReportServer\\bin\\Employee.dll \"/>\n</CodeGroup>\n\
  ```\n\n或者，对于 Visual Studio：\n\n\n## 处理代码访问安全与自定义程序集\n\n```xml\n<CodeGroup class=\"\
  UnionCodeGroup\" version=\"1\"\n         PermissionSetName=\"FullTrust\"\n     \
  \    Name=\"EmployeePayCodeGroup\"\n         Description=\"Employee Cost Per Visit\"\
  >\n         <IMembershipCondition\n                  class=\"UrlMembershipCondition\"\
  \ version=\"1\"\n                  url=\"C:\\Program Files (x86)\\Microsoft Visual\
  \ Studio 10.0\\Common7\\IDE\\PrivateAssemblies\\Employee.dll\"/>\n  </CodeGroup>\n\
  ```\n\n![Image](img/square.jpg) `Note` 如果你运行报表后，在文本框中看到的是 `#Error` 文字而非预期结果，这很可能是一个某种权限问题。\n\
  \n因为通常来说，除非绝对必要，否则授予你的程序集 `FullTrust` 权限并不是一个好主意。你可以使用命名权限集，只为你的自定义程序集授予它所需的精确权限，而非\
  \ `FullTrust`。\n\n为了授予自定义程序集刚好足够的权限，以读取名为 `C:\\Temp\\ EmployeePay.xml` 和 `C:\\Temp\\\
  EmployeePay.xsd` 的数据文件，你首先需要在策略配置文件 `rssrvpolicy.config` 中添加一个命名权限集，该权限集授予对这些文件的读取权限。这将被放置在配置文件的\
  \ `NamedPermissionSets` 部分中。然后，你可以将特定的权限集应用于自定义程序集，如 清单 7-5 所示。\n\n### 清单 7-5. 用于读取文件的命名权限集\n\
  \n```xml\n<PermissionSet\n        class=\"NamedPermissionSet\"\n        version=\"\
  1\"\n        Name=\"EmployeePayFilePermissionSet\"\n        Description=\"Permission\
