  \        class=\"SecurityPermission\"\n                version=\"1\"\n         \
  \       Flags=\"Execution, Assertion\" />\n</PermissionSet>\n```\n\n接下来，如 清单 7-6\
  \ 所示，你向策略配置文件 `rssrvpolicy.config` 的 `CodeGroup` 部分添加一个代码组，该代码组授予程序集额外的权限。如果你已经为程序集添加了\
  \ `FullTrust` 权限，你可以用这个 `CodeGroup` 来替换它，或者直接修改它以使用新创建的权限集名称。\n\n### 清单 7-6. 授予对\
  \ Employee 程序集的文件 I/O 权限\n\n```xml\n<CodeGroup\n        class=\"UnionCodeGroup\"\
  \n        version=\"1\"\n        PermissionSetName=\" EmployeePayFilePermissionSet\
  \ \"\n        Name=\"EmployeePayCodeGroup\"\n        Description=\"Employee Cost\
  \ Per Visit\">\n        <IMembershipCondition\n                class=\"UrlMembershipCondition\"\
  \n                version=\"1\"\n                Url=\"C:\\Program Files\\Microsoft\
  \ SQL Server\\MSRS11.MSSQLSERVER\\Reporting Services\\ReportServer\\binEmployee.dll\
  \ \"/>\n</CodeGroup>\n```\n\n![Image](img/square.jpg) `Note` 你添加到配置文件中的程序集名称必须与在\
  \ RDL 文件的 `CodeModules` 元素下添加的名称匹配。这是你在“从嵌入式代码访问 .NET 程序集”一节中介绍的、在报表属性 ![Image](img/U001.jpg)\
  \ 引用菜单下为自定义程序集设置的名称；该名称在“向报表添加程序集引用”一节中有详细讨论。\n\n要应用自定义权限，你还必须在你的代码中断言（Assert）该权限。例如，如果你想为\
  \ XML 文件 `C:\\Temp\\EmployeePay.xsd` 和 `C:\\Temp\\EmployeePay.xml` 添加只读访问权限，你必须向你的方法中添加类似\
  \ 清单 7-7 所示的代码。\n\n### 清单 7-7. 使用代码断言权限\n\n```csharp\n// C#\nFileIOPermission permissionXSD\
  \ = new\n    FileIOPermission(FileIOPermissionAccess.Read,\n    @\" C:\\Temp\\EmployeePay.xml\"\
  );\n    permissionXSD.Assert();\n    // 加载架构文件\n    empDS.ReadXmlSchema(@\"C:\\\
  Temp\\EmployeePay.xsd\");\n\nFileIOPermission permissionXML = new\n    FileIOPermission(FileIOPermissionAccess.Read,\
  \ @\"\n    C:\\Temp\\EmployeePay.xml\");\n    permissionXML.Assert();\n    empDS.ReadXml(@\"\
  C:\\Temp\\EmployeePay.xml\");\n```\n\n你也可以将断言添加为方法特性，如 清单 7-8 所示。这是本章示例中展示的方法。\n\
  \n### 清单 7-8. 使用方法特性断言权限\n\n```csharp\n[FileIOPermissionAttribute(SecurityAction.Assert,\n\
  \    Read=@\" C:\\Temp\\EmployeePay.xsd\")]\n[FileIOPermissionAttribute(SecurityAction.Assert,\n\
  \    Read=@\" C:\\Temp\\EmployeePay.xml\")]\n```\n\n![Image](img/square.jpg) `Tip`\
  \ 有关代码访问安全和报表服务的更多信息，请参阅 SSRS 2012 联机丛书 (BOL) 中的“理解报表服务中的代码访问安全”。有关安全的更多信息，请参阅 .NET\
  \ Framework 开发人员指南中的“.NET Framework 安全”，该指南可在 Microsoft 开发人员网络 (MSDN) 网站 [`msdn.microsoft.com`](http://msdn.microsoft.com)\
  \ 上获取。你还需要了解有关使用全局程序集缓存 (GAC) 来存储自定义程序集的内容。\n\n\n\n### 向报表添加程序集引用\n\n选中 EmployeeServiceCost-NoCode\
  \ 报表并切换到“设计”选项卡后，从顶部菜单项中选择“报表” ![Image](img/U003.jpg) “报表属性”；或者，在报表设计区域内右键单击，然后选择“属性”。接着执行以下操作：\n\
  \n> 1.  在“引用”部分处于活动状态时，单击“程序集”部分中的“添加”按钮。\n> 2.  单击省略号按钮，然后单击“浏览”选项卡。浏览到 `Employee.dll`\
  \ 文件所在位置并选中它。如果您已将生成的 DLL 文件放置到 Visual Studio 的私有程序集文件夹中，您现在应该这样做，以便引用该位置。操作完成后，“报表属性”对话框应类似于图\
  \ 7-11。\n\n![Image](img/9781430238102_Fig07-11.jpg)\n\n***图 7-11.** 引用选项卡*\n\n![Image](img/square.jpg)\
  \ **注意** 报表属性对话框“引用”选项卡上的类列表仅由基于实例的成员使用，而非静态成员。\n\n要在报表表达式中使用程序集中的自定义代码，您必须调用程序集中某个类的成员。根据您声明方法的方式，可以通过不同的方式实现这一点。\n\
  \n如果方法被定义为静态的，它将在报表中全局可用。您可以通过命名空间、类和方法名称在表达式中访问它。以下示例调用了 `Pro_SSRS` 命名空间中 `Employee`\
  \ 类的静态方法 `CostPerVisit`，并传入一个 `EmployeeID` 值和访问日期。该方法将返回指定员工的每次访问成本。\n\n`=Pro_SSRS.Employee.CostPerVisitXML(empID,\
  \ visitDate)`\n\n如果自定义程序集包含实例方法，您必须将类和实例名称信息添加到报表引用中。对于静态方法，则无需添加此信息。\n\n#### 实例方法与静态方法\n\
  \n静态方法是可以从类调用但不对类的特定实例进行操作的方法。这意味着调用和使用该方法时，不需要实例化新对象。实例方法则确实需要创建一个对象才能使用，并且将在该特定类的对象（或类的实例）中执行其所有工作。静态方法在这里更可取，因为我们无需执行任何额外工作来创建该类类型的新对象即可开始使用这些方法。\n\
  \n基于实例的方法通过全局定义的 `Code` 成员提供。您通过引用 `Code` 成员，然后引用实例和方法名称来访问这些方法。以下展示了如何调用 `CostPerVisitXML`\
  \ 方法（如果它被声明为实例方法而非静态方法）：\n\n`=Code.Employee.CostPerVisitXML(empID, visitDate)`\n\
  \n![Image](img/square.jpg) **提示** 尽可能使用静态方法，因为它们比实例方法提供更高的性能。但是，如果使用静态字段和属性时要小心，因为它们会将数据暴露给同一报表的所有实例，这可能导致一个用户运行报表时使用的数据被另一个运行相同报表的用户看到。\n\
  \n在添加了对 Employee 自定义程序集的引用后，您将通过在报表表达式中调用 `CostPerVisitXML` 方法来使用它。在报表中选中 `Employee_Cost`\
  \ 文本框，如图 7-12 所示。\n\n![Image](img/9781430238102_Fig07-12.jpg)\n\n***图 7-12.** Employee_Cost\
  \ 文本框*\n\n右键单击，选择“表达式”，然后在“编辑表达式”对话框中输入清单 7-9 中所示的代码。\n\n***清单 7-9.** 在表达式中使用 CostPerVisitXML\
  \ 方法*\n\n```\n=Pro_SSRS.Employee.CostPerVisitXML(Fields!EmployeeID.Value,\nFields!ChargeServiceStartDate.Value)*\
  \ sum(Fields!Visit_Count.Value)\n```\n\n现在，如果您预览报表或生成并部署它，您应该会看到类似于图 7-13 的报表。您可以使用任何所需的参数来生成实际的报表。生成后，展开服务类型和患者名称树菜单项以查看新计算的成本估算值。\n\
  \n![Image](img/9781430238102_Fig07-13.jpg)\n\n***图 7-13**. 最终报表*\n\n在第 7 章的示例代码中，我们还包含了一个可以从自定义代码调用以访问员工薪酬信息的\
  \ Web 服务。这模拟了通过 Web 服务访问来自另一个系统的信息，旨在允许您将导出的 XML 文件替换为对 Web 服务的调用。示例代码中包含的 `Employee`\
  \ 类已经包含一个名为 `CostPerVisitWS` 的方法，该方法使用 Web 服务而非 XML 文件作为其数据源。您只需将表达式从以下形式：\n\n`=Pro_SSRS.Employee.CostPerVisitXML(Fields!EmployeeID.Value,\
  \ Fields!ChargeServiceStartDate.Value)* sum(Fields!Visit_Count.Value)`\n\n更改为以下形式：\n\
  \n`=Pro_SSRS.Employee.CostPerVisitWS(Fields!EmployeeID.Value, Fields!ChargeServiceStartDate.Value)*\
  \ sum(Fields!Visit_Count.Value)`\n\n即可让报表使用 Web 服务代替 XML 文件。\n\n要尝试此操作，只需打开本章的示例解决方案，并编辑\
  \ `EmployeeServiceCost.rdl` 文件中 `Employee_Cost` 字段的表达式。要尝试 Employee Web 服务，您还必须确保在\
  \ Visual Studio 中调试报表时 Web 服务正在运行，或者如果您已将报表部署到服务器，则 Web 服务已发布并在测试机器上运行。让我们浏览一下 `Employee`\
  \ 类中调用 Web 服务的代码，并展示该过程在我们报表中的工作方式。\n\n在设计模式下打开 EmployeeServiceCost 报表，转到表中的员工估算成本列。让我们使用前面为\
  \ Web 服务提供的示例来编辑表达式。将表达式编辑为使用 Web 服务调用后，它应类似于图 7-14。\n\n![Image](img/square.jpg)\
  \ **注意** 我们并未使用 `Employee` 类中包含的一个独立方法，该方法本可以使用 Web 服务来提取我们想要的数据，而不是使用 XML 文件。让我们从\
  \ `Employee` 类项目的 `Employee.cs` 中看看这个方法。您将在清单 7-10 中看到，它只是对我们项目中已构建并包含的 Web 服务进行的一次简单调用。我们向\
  \ Web 服务提供 `employeeID` 和访问日期，就像我们从 XML 提取信息时一样，但这次数据直接由 Web 服务提供，我们稍后会查看它。\n\n\
  ***清单 7-10:** 通过 Web 服务获取成本值*\n\n```\npublic static decimal CostPerVisitWS(string\
  \ employeeID, DateTime visitDate)\n{\n        EmployeeWS.Employee empWS = new EmployeeWS.Employee();\n\
  \        Decimal empAmt;\n        empAmt = empWS.GetCost(employeeID, visitDate);\n\
  \        return empAmt;\n}\n```\n\n如果您还不熟悉 Web 服务，我们将在第 8 章和第 9 章中进行更多相关操作。这看起来比我们解析\
  \ XML 文件的过程要简单得多，但大部分工作实际上是在解决方案中提供的 Web 服务上完成的。\n\n\n\n由于解决方案中提供的 Web 服务已设置为依赖于该\
  \ Web 服务，因此我们无需为此测试新的数据调用。请继续启动调试过程，确保报表项目在解决方案中仍设置为启动项目。您可以将 ServiceYear 参数设置为\
  \ 2010 并查看报表。一旦您向下钻取到某个患者，您将注意到报表正在处理并刷新数据。这次数据是通过 Web 服务获取的，该服务从数据库而非 XML 文件中获取数据。我们还包含了一个示例测试应用程序，它允许您通过\
  \ Windows 窗体应用程序调用 `Employee` 类的 `CostPerVisitXML` 和 `CostPerVisitWS` 方法。这使您能够演练该类并在\
  \ Windows 窗体环境中逐步调试代码，这更容易进行测试和调试。\n\n![Image](img/square.jpg) **提示** 编写测试应用程序是确保您的自定义代码在\
  \ SSRS 2012 报表中使用之前能够正确执行预期功能的好方法。您不仅可以像我们这样创建自定义的 Windows 窗体应用程序，而且使用适当版本的 Visual\
  \ Studio 2010，您还可以创建专门的测试代码和自动化测试例程。\n\n### 调试自定义程序集\n\n为了便于调试，设计、开发和测试自定义程序集的推荐方法是创建一个同时包含测试报表和自定义程序集的解决方案。这将使您能够轻松地从\
  \ Visual Studio 中同时访问报表和将在其中使用的代码。\n\n现在我们将向您展示如何设置 Visual Studio 以允许调试刚刚编写的 `Employee`\
  \ 程序集：\n\n> 1.  在“解决方案资源管理器”中，右键单击解决方案，然后选择“配置管理器”。这将允许您设置用于调试的生成和部署选项。\n> 2.  选择“调试”作为“活动解决方案配置”选项。单击“关闭”以完成此选项选择。\n\
  > 3.  在解决方案管理器中，右键单击包含报表的项目，然后选择“设为启动项目”，以确保在开始调试时此项目在您的解决方案中首先运行。\n> 4.  再次在解决方案资源管理器中右键单击包含报表的项目，然后选择“项目依赖项”。\n\
  > 5.  在“项目依赖项”对话框中，选择 Employee 项目作为依赖项项目，如图 7-14 所示。这将告诉 Visual Studio 您的报表依赖于您编写的自定义程序集。\n\
  >     \n>     ![Image](img/9781430238102_Fig07-14.jpg)\n>     \n>     ***图 7-14.**\
  \ “项目依赖项”对话框*\n>     \n>     \n> 6.  单击“确定”保存更改，并关闭“项目依赖项”对话框。\n> 7.  再次右键单击“报表”项目，然后选择“属性”。\n\
  > 8.  选择“StartItem”，并将其设置为您要调试的报表。在此案例中，选择我们设置为使用自定义程序集的报表。“StartItem”选项明确告知 Visual\
  \ Studio 在以调试方式运行时具体运行哪个报表。单击“确定”以完成此选择。\n> 9.  在“解决方案资源管理器”中，选择 Employee 自定义程序集项目。\n\
  > 10. 右键单击此项目，然后选择“属性”。\n> 11. 从左侧菜单中选择“生成”部分。\n> 12. 在“生成”页面上的“输出路径”文本框中，输入报表设计器文件夹的路径。（默认情况下，此路径为\
  \ `C:\\Program Files (x86)\\Microsoft Visual Studio 10.0\\Common7\\IDE\\PrivateAssemblies`。）\n\
  >     \n>     ![Image](img/square.jpg) **注意** 您需要拥有必要的权限才能将此文件夹用作输出路径。默认情况下，标准“用户”组的成员没有此文件夹所需的写入/修改权限。当您以具有适当安全权限的用户（如管理员）登录时，请确保设置\
  \ PrivateAssemblies 文件夹的权限，以便在您以权限较低的帐户登录时允许必要的访问。您可以保留默认输出路径，但更改它可以节省一些工作。使用默认路径，您必须生成然后手动复制自定义程序集，以便在\
  \ Visual Studio 中运行的报表设计器能够找到并运行它。\n>     \n>     \n> 13. 现在，在您的自定义程序集代码中设置断点。如果不熟悉设置断点，只需打开您的\
  \ `employee.cs` 文件，然后在代码左侧的灰色侧面板中单击。在方法读取 XML 数据文件的位置设置断点，如图 7-15 所示。\n> 14. 确保将\
  \ Report 设置为启动项目，然后按 F5 以调试模式启动解决方案。当报表在表达式中使用自定义代码时，调试器将在执行到您设置的任何断点时停止。现在，您可以使用\
  \ Visual Studio 的所有强大调试功能来调试代码。\n\n![Image](img/square.jpg) **注意** 也可以使用多个 Visual\
  \ Studio 副本调试您的自定义程序集。有关详细信息，请参阅 SSRS 2012 BOL。\n\n![Image](img/9781430238102_Fig07-15.jpg)\n\
  \n***图 7-15.** 在自定义程序集中设置断点*\n\n### 排查项目故障\n\n如果修改了自定义程序集并重新生成，则必须重新部署它，因为报表设计器仅在报表设计器应用程序文件夹中查找它。如果您遵循了我们在“调试自定义程序集”部分中的建议更改了输出路径，那么每次在调试时重新生成它，它都应该位于正确的位置。否则，您将需要按照“部署自定义程序集”部分中的说明将其移动到报表设计器应用程序文件夹。请记住，Visual\
  \ Studio 不会将您的自定义程序集部署到您的 SSRS 2012 服务器计算机；您必须手动复制它。最后，在开发期间，您可能希望将任何自定义程序集的版本保持为相同的值。每次更改自定义程序集的版本时，必须更改对它的引用，如本章前面所述，在“报表属性”对话框的“引用”选项卡上进行修改。一旦您的报表投入生产，而您希望跟踪版本信息，您可以使用\
  \ GAC，它可以容纳多个版本；这意味着您只需重新部署那些使用新版本新功能的报表。如果您希望所有报表都使用新版本，您可以设置绑定重定向，以便将所有对旧程序集的请求都发送到新程序集。您需要修改报表服务器的\
  \ `Web.config` 文件和 `Rsreportserver.config` 文件。\n\n如果您正在使用自定义程序集，并且报表输出显示 #Error，则您可能遇到了权限问题。有关如何正确设置权限的信息，请参阅本章中的“部署自定义程序集”部分。\n\
  \n### 小结\n\n在本章中，您学习了如何在报表中使用自定义代码，并且我们讨论了处理 SSRS 2012 的一些其他编程方面。第 8 章、9 和 10 章将在此基础上构建，因为我们将向您展示如何编写自定义应用程序来呈现报表、将它们部署到报表服务器，以及使用订阅安排它们运行。\n\
  \n## C H A P T E R  8\n\n\n\n## 部署报告\n\n在整个报告的生命周期中——从创建到维护——管理员、开发人员，甚至现在使用报表生成器的最终用户都需要持续地将报告部署到\
  \ SSRS 2012 服务器上。部署报告仅仅意味着将 RDL 文件上传到 SSRS 2012 服务器上，以便你的用户可以使用它（有关这些报告的 RDL 格式的具体信息，请参阅第\
  \ 3 章）。\n\n幸运的是，SSRS 2012 提供了几种部署报告的方式：\n\n> *通过 Web 浏览器使用报表管理器界面*：这个简单的方法允许任何拥有\
  \ RDL 文件和适当 SSRS 权限的人将其上传到 SSRS 2012 服务器。如果你在开发报告的 RDL 文件的应用程序没有提供上传到服务器的方法，这将非常有用。如果你想对\
  \ RDL 文件进行快速编辑——比如纠正一个拼写错误——使用像记事本这样的应用程序（它没有内置的上传报告的方法）时，这个方法也很有用。我们在第 8 章中介绍了这个场景，其中使用记事本来修改报告。\n\
  > \n> *使用报表生成器 3.0*：报表生成器 3.0 工具是 SSRS 2008 R2 的一个新特性，并且在 SSRS 2012 中仍在使用。它为不熟悉`Visual\
  \ Studio IDE`的用户提供了一个简单的界面来创建和编辑数据源及报告。\n> \n> *在 BIDS/Visual Studio 中使用部署选项*：这种方法允许你直接从开发环境中将报告部署到\
  \ SSRS 2012 服务器。如果你正在使用`BIDS/Visual Studio`并且可以直接访问要部署报告的报表服务器，这是最简单的方法之一。\n> \n\
  > *使用`rs.exe`命令行工具*：`rs.exe`命令行工具是一个运行时环境，用于以特殊格式的脚本文件形式执行`VB .NET`代码。你部署报告的方式与本列表下一项中的方法相同。在本节后面的“使用`rs.exe`工具”部分，我们将介绍如何使用`rs.exe`以编程方式部署报告和创建数据源。\n\
  > \n> *以编程方式使用 SSRS Web 服务*：这种方法让你完全控制部署过程，并额外具有创建任何你想要的 UI 的优势。与`rs`命令行工具不同，你可以选择编程语言，并拥有`Visual\
  \ Studio 2012`的全部功能来帮助你开发自定义界面。在第 6 章中，我们使用了 SOAP API（也称为报表服务器 Web 服务）从 SSRS 2012\
  \ 服务器检索有关报告的报告参数信息，然后使用该信息为参数选择生成了一个 Windows 窗体 UI。在本章中，你将使用报表服务器 Web 服务将报告发布到 SSRS\
  \ 2012 服务器。当你需要将报告的部署集成到你的自定义应用程序的安装、设置或运行时环境中时，这种类型的接口非常有用。\n\n## 使用报表管理器\n\n要使用报表管理器界面部署报告，只需打开浏览器并使用诸如\
  \ [`http://localhost/reports/`](http://localhost/reports/) 的地址导航到你的 SSRS 2012 服务器。你会看到一个类似于图\
  \ 8-1 所示的屏幕。\n\n![Image](img/9781430238102_Fig08-01.jpg)\n\n**图 8-1.** 报表管理器\n\n\
  如你所见，报表管理器工具栏上提供了一个“上传文件”选项。选择“上传文件”会打开一个标准的基于浏览器的上传对话框，如图 8-2 所示。\n\n![Image](img/9781430238102_Fig08-02.jpg)\n\
  \n**图 8-2.** 报表管理器“上传文件”对话框\n\n使用此对话框，你可以浏览到要上传的 RDL 文件并进行上传。你也可以在这里上传数据源文件以及 RDS\
  \ 文件，但它们不会被自动识别为数据源。我们将在本章后面向你展示如何正确创建数据源。\n\n浏览到第 6 章的示例文件，并选择报告文件夹中的`EmployeeServiceCost.rpt`文件上传到你的报表服务器。报表管理器会将文件放入当前文件夹（即你发起上传过程的文件夹）。\n\
  \n请注意，新上传的报告不再像某些旧版 SSRS 那样被标记为“新”。你上传的每个报告在报表管理器界面中都会有一个下拉菜单。此菜单允许你执行一些管理功能并打开属性编辑页面。这个“管理”选项可以在下面的图\
  \ 8-3 中看到。\n\n![Image](img/9781430238102_Fig08-03.jpg)\n\n**图 8-3.** 报表管理器及一个最近上传的报告\n\
  \n这个管理选项允许你修改报告的属性，例如名称和描述，如图 8-4 所示。\n\n在图 8-4 的底部中央，有一个复选框，位于“应用”按钮上方，它允许你执行以下操作：\n\
  \n> *在磁贴视图中隐藏报告*：如果你不想让能访问 SSRS 2012 服务器的用户知道某些报告的存在，或者不想让他们看到报告的详细信息，这可能很有用。请记住，这仅在磁贴视图中隐藏报告，而不是在详细视图中隐藏。当你需要防止用户查看文件夹内容或运行他们不应访问的报告时，你应该使用\
  \ SSRS 安全属性。\n\n然后，屏幕顶部的菜单允许你：\n\n> *删除报告*：这使你能够删除不再需要的报告。\n> \n> *将报告移动到报表服务器上的另一个位置*：这允许你将报告组织到文件夹中，以便进行组织和安全管理。\n\
  > \n> *创建链接报告*：此选项允许你基于原始报告创建一个链接报告。这使你可以在服务器上的某个位置保留一份报告用于部署，同时在服务器上的其他位置有多个副本可用，而无需在报告更改时重新部署它们。\n\
  > \n> *下载 RDL*：你可以将报告 RDL 下载为文件进行编辑。当你想要对报告进行微小修改（例如更改单词拼写或修改表达式）时，这可能很有用。请注意，此方法仅提供对\
  \ RDL 文件的访问；你仍然需要使用另一个程序来编辑文件，然后上传修改后的文件。\n> \n> *通过上传 RDL 文件的新副本来替换 RDL*：如果你已经下载并编辑了\
  \ RDL 文件，那么此选项允许你上传编辑后的副本。\n\n![Image](img/9781430238102_Fig08-04.jpg)\n\n**图 8-4.**\
  \ 报告属性页面\n\n使用图 8-4 中页面左侧的菜单，你可以执行以下操作：\n\n**注意：** 由于原始文本在此处结束，以下部分未完成。排版到此为止。\n\
  \n\n\n## 报表管理功能\n\n*   **修改报表参数**：在“参数”部分，您可以更改报表参数的一些选项，例如默认值、可见性、用户提示和参数显示文本。这种修改参数的能力很方便，因为您无需下载报表即可进行简单的参数更改。\n\
  \n*   **更改数据源**：“数据源”部分允许您更改报表使用的数据源。您可以更改为位于同一服务器上的另一个数据源，或者从头开始创建新的自定义数据源。\n\n\
  *   **管理订阅**：“订阅”部分允许您管理报表的订阅和数据驱动订阅。您可以从该部分创建、删除和修改您的报表订阅。\n\n*   **处理选项**：此部分允许您配置渲染报表时使用的数据缓存选项。它还允许您设置使用报表快照渲染报表，并配置报表超时属性。\n\
  \n*   **缓存刷新选项**：您可以从该部分设置新的缓存刷新计划或对当前计划进行修改。这些计划将创建刷新作业，用于更新供报表或共享数据源使用的缓存存储。如果您的报表设置为从缓存数据而非实时数据渲染，则将使用此数据。\n\
  \n*   **报表历史记录**：此部分允许您获取报表的快照或查看已渲染报表的历史快照。这些可以手动创建，也可以通过下一节中可配置的快照计划创建。\n\n* \
  \  **快照选项**：从该部分，您可以管理快照和快照计划。您可以创建新的快照计划或在共享计划上设置新的快照。您还可以管理快照安全性和快照存储限制的选项。\n\n\
  *   **管理安全设置**：您可以从页面的“安全性”部分管理报表的个别安全设置。默认情况下，报表继承父文件夹的安全设置，但您可以从此菜单中断该继承（或恢复它）。\n\
  \n![Image](img/square.jpg) **注意** 您也可以从详细信息视图访问管理部分。\n\n### 使用 Report Builder 3.0\n\
  \n在 `Reporting Services 2010` 中用于部署报表的另一种方法是新的 `Report Builder 3.0` 应用程序。`Report\
  \ Builder 3.0` 是一种更用户友好的部署报表方式，它不再使用 `BIDS/Visual Studio`。我们将在下一节介绍使用新的 `BIDS/Visual\
  \ Studio` 集成工具。您可以从报表管理器 `Web` 界面启动 `Report Builder` 工具。您也可以从 `Microsoft` 网站下载完整安装程序，将\
  \ `Report Builder 3.0` 作为一个单独的实用程序安装。Figure 8-5 将让您对这个新工具的视觉外观有所了解。\n\n![Image](img/9781430238102_Fig08-05.jpg)\n\
  \n*图 8-5. 新的 Report Builder 3.0 界面*\n\n`Report Builder 3.0` 对于 `Windows 7` 或较新 `Office`\
  \ 套件的用户来说会感觉更熟悉。该程序的主菜单位于屏幕左上角的“珍珠”（看起来像 `SQL Server` 符号）下方。单击“珍珠”一次以展开菜单并选择“打开”。这将允许您浏览到要打开以进行编辑或部署的报表。该报表可以从本地/远程磁盘上的文件加载，也可以直接从您连接到的报表服务器加载。文件加载后，报表将以设计模式显示在中心窗口中，数据将填充左侧的窗口。从这里，您可以在部署到服务器之前进行任何需要的更改。由于您是从\
  \ `Web` 界面打开的报表生成器，请继续从服务器加载报表，您的 `Report Builder` 应类似于 Figure 8-6。\n\n![Image](img/9781430238102_Fig08-06.jpg)\n\
  \n*图 8-6. Report Builder 3.0 中已加载的报表*\n\n您可以在 `Report Builder 3.0` 中执行 `BIDS/Visual\
  \ Studio 2010` 所包含的大部分功能。通过这个程序，您可以添加数据源、进行报表设计更改、管理参数和部署报表。唯一的缺点是此应用程序一次只允许修改一个报表。要执行大规模部署或管理项目的多个报表，您仍然需要使用\
  \ `Visual Studio 2010/BIDS` 或 `RS` 实用程序，我们将在本章后面介绍。要部署您刚刚打开的报表，并假设您是直接从报表服务器打开的报表，请返回“珍珠”菜单并选择“保存”。如果您是从硬盘打开了\
  \ `RDL` 文件，则使用“另存为”选项，并确保首先连接到报表服务器。要连接到报表服务器，只需单击 `Report Builder 3.0` 界面底部状态栏中的连接链接。连接到报表服务器后，您可以选择该服务器作为保存报表的目标。请参见\
  \ Figure 8-7 查看您将使用的“珍珠”菜单选项。由于我们直接从 `Web` 界面启动了 `Report Builder`，因此我们已经连接到报表服务器，无需指定要发布的服务器。继续对您的报表进行一些小的更改并将其部署，以在报表管理器\
  \ `Web` 界面上查看更改。\n\n![Image](img/9781430238102_Fig08-07.jpg)\n\n*图 8-7. Report Builder\
  \ 3.0 保存选项*\n\n## 使用 BIDS 和 Visual Studio 2012\n\n您也可以使用 `BIDS`（`Business Intelligence\
  \ Development Studio`）中的“部署”选项来部署报表，该选项直接集成到 `Visual Studio 2010` 中。这很方便，因为它是最强大的环境，在大多数情况下，您将使用此工具开发报表。\n\
  \n\n\n#### 配置报告部署选项\n\nBIDS/Visual Studio 2010 允许你为解决方案中的每个项目配置一组不同的属性。你还可以为项目可用的每个配置（例如\
  \ `Debug`、`DebugLocal` 和 `Release`）设置这些属性。对于报告项目的每个配置，你可以为以下属性定义唯一的值：\n\n> *   起始项：运行报告项目时要在预览窗口或浏览器窗口中显示的报告名称。\n\
  > *   `OverwriteDataSets`：一个布尔值，用于配置是否覆盖报表服务器上现有的数据集定义。将此值设置为 `true` 将在部署时覆盖任何数据集定义。\n\
  > *   `OverwriteDataSources`：一个布尔值，指示是否覆盖服务器上现有的数据源。将其设置为 `true` 以进行覆盖，这样每次选择 `Deploy`\
  \ 时都会重新部署你在项目中定义的任何数据源。如果你不希望现有数据源被覆盖，请将其设置为 `false`。\n> *   `TargetDataSetFolder`：放置你的共享数据集的文件夹名称，无论是报表服务器路径还是\
  \ SharePoint 库。\n> *   `TargetDataSourceFolder`：放置你的共享数据源的文件夹名称。\n> *   `TargetReportFolder`：放置你的报告的文件夹名称。默认情况下，这是报告项目的名称。\n\
  > *   `TargetReportPartFolder`：放置你与其他报告共享的报告部件的文件夹名称。\n> *   `TargetServerURL`：目标报表服务器的\
  \ URL，例如 `http://localhost/reportserver`。\n> *   `TargetServerVersion`：此选项允许你指定部署服务器运行的\
  \ SSRS 版本。如果你已经配置了目标服务器 URL，也可以让此选项自动检测版本。\n\n不同的配置对报告开发人员来说很方便，因为你可以在同一个项目中为测试和部署设置不同的服务器和/或文件夹。默认情况下，当你创建报告项目时，BIDS/Visual\
  \ Studio 2010 会为你创建三种不同的配置：`Debug`、`DebugLocal` 和 `Production`。你可以通过项目的属性页访问这些配置的属性。要进入配置属性页，请在解决方案资源管理器中，右键单击包含报告的项目，然后单击\
  \ `Properties`。要查看每个配置选项的属性设置，请从属性对话框顶部的 `Configuration` 下拉列表中选择。图 8-8 显示了 Apress\
  \ 网站（`http://www.apress.com`）源代码/下载区中本章提供的示例代码的一部分，即第 6 章 解决方案中报告项目的属性页。\n\n![Image](img/9781430238102_Fig08-08.jpg)\n\
  \n*图 8-8. 项目属性页*\n\n配置信息正确设置后，你可以使用配置管理器中的 `Build` 和 `Deploy` 选项，或者使用解决方案资源管理器将报告部署到服务器。\n\
  \n## 使用配置管理器设置部署\n\n配置管理器中的 `Build` 和 `Deploy` 选项决定了在 Visual Studio 2010 中启动项目时，是构建报告、部署报告，还是两者都做。\n\
  \n要打开配置管理器，请在解决方案资源管理器中，右键单击包含报告的项目，然后单击 `Properties`。然后，单击 `Configuration Manager`\
  \ 以打开如 图 8-9 所示的对话框。\n\n![Image](img/9781430238102_Fig08-09.jpg)\n\n*图 8-9. Visual\
  \ Studio 2012 配置管理器*\n\n默认情况下，你会看到当前活动配置的设置。你可以通过从 `Active solution configuration`\
  \ 下拉列表中选择来选择其他配置。如图所示，对于解决方案中的每个项目，在 `Build` 和 `Deploy` 列中都有复选框。\n\n每次启动项目时，你都希望构建它，以便始终运行报告的最新版本。如果\
  \ `Deploy` 复选框也被勾选，那么无论何时你在该配置下启动项目，Visual Studio 2012 都会将报告部署到报告项目属性中设置的指定服务器。然而，对于大多数配置，例如当你在本地调试时，你可能不希望每次启动项目时都部署报告，因此保持部署复选框不勾选是你想要的操作。\n\
  \n#### 通过解决方案资源管理器部署报告\n\n一旦你确信你的报告已准备好部署，也可以从解决方案资源管理器手动部署报告。以下是从解决方案资源管理器进行部署的选项列表。你通过右键单击以下每个项目并选择\
  \ `Deploy` 来部署报告：\n\n> *   *解决方案：* 将解决方案中所有报表服务器项目中的报告和数据源部署到在各自项目属性中设置的服务器。这将部署解决方案中的所有项目，因此仅在你需要部署所有内容时使用此选项。\n\
  > *   *项目：* 将解决方案中特定项目中的报告和数据源部署到在指定项目属性中设置的服务器。此选项仅对报表服务器项目可用。\n> *   *报告：* 将项目中单个报告或数据源部署到包含你要部署的报告的项目属性中设置的服务器。\n\
  \n图 8-10 展示了如何部署报告项目中的所有报告的示例。\n\n![Image](img/9781430238102_Fig08-10.jpg)\n\n*图\
  \ 8-10. 通过解决方案资源管理器部署解决方案*\n\n\n### 使用 rs.exe 实用程序\n\n为了访问 SSRS Web 服务之一，Reporting\
  \ Services 为我们提供了一个名为`rs.exe`的命令行实用程序。此实用程序使用用 VB .NET 编写的脚本文件（这是唯一可以与`rs`实用程序一起使用的语言）来访问\
  \ Web 服务，并允许我们调用 Web 服务中任何已发布的方法。在此示例中，您将通过`rs.exe`实用程序创建文件夹、部署报告并创建新的数据源。\n\n您可以在本书第\
  \ 8 章代码示例的`RS`文件夹下看到本示例使用的两个文件。您会找到一个包含报告定义的 RDL 文件（将用于部署）和一个包含用于部署报告及创建报告所需数据源的\
  \ VB .NET 代码的 RSS 文件。如果您的代码不在`C:\\Pro_SSRS\\CH8\\RS`文件夹中，则需要进行一些配置。\n\nRSS 文件在顶部声明了两个全局变量。这些变量保存了报告将在报告服务器上部署的位置以及您计算机上\
  \ RDL 文件存在的位置信息。您可以在清单 8-1 中看到这两个变量。您应根据您的设置对这些变量进行必要的更改。\n\n**清单 8-1. RSS 文件配置**\n\
  \n```vb\nDim parentPath As String = \"Pro_SSRS/Chapter 8\"\nDim reportPath As String\
  \ = \"C:\\Pro_SSRS\\CH8\\RS\\\"\n```\n\n配置好 RSS 文件后，我们将讨论所使用的三个 Web 服务方法。第一个是`CreateDataSource`。此方法在报告服务器上创建新的数据源，并接受以下五个参数：\n\
  \n> *   `DataSource`: 要创建的数据源的名称\n> *   `Parent`: 数据源将在报告服务器上创建的完整路径\n> *   `Overwrite`:\
  \ 一个布尔变量，用于表示是否覆盖同名的现有数据源\n> *   `Definition`: 一个`DataSourceDefinition`类型的对象，保存数据源的连接属性\n\
  > *   `Properties`: 一个`Property[]`对象的数组，保存数据源的属性名和值\n\n第二个使用的 Web 服务方法是`CreateReport`。此方法在服务器上创建新的报告，并接受以下五个参数：\n\
  \n> *   `Report`: 要创建的报告的名称\n> *   `Parent`: 报告将部署到的报告服务器上的完整路径\n> *   `Overwrite`:\
  \ 一个布尔变量，用于表示是否覆盖同名的现有报告\n> *   `Definition`: 保存报告定义的字节数组\n> *   `Properties`: 一个`Property[]`对象的数组，保存报告的属性名和值\n\
  \n最后一个使用的 Web 服务方法是`CreateFolder`。此方法在服务器上创建新文件夹，并接受以下三个参数：\n\n> *   `Folder`: 要创建的文件夹的名称\n\
  > *   `Parent`: 您正在创建的文件夹的父级名称\n> *   `Properties`: 一个`Property[]`对象的数组，保存新文件夹的属性名和值\n\
  \nRSS 文件中的`Main`函数调用了三个内部函数：一个利用`CreateFolder`方法，一个利用`CreateDataSource`方法，另一个利用`CreateReport`方法。根据您的需要，您可以使用这三个函数创建更多的文件夹和数据源，或部署更多的报告。在此示例中，我们每个函数调用了一次，但您可以修改此文件以部署任意数量的报告或数据源。您可以在清单\
  \ 8-2 中看到 RSS 文件的完整代码。\n\n**清单 8-2. RSS 文件内容**\n\n```vb\nDim parentPath As String\
  \ = \"Pro_SSRS/Chapter 8\"\nDim reportPath As String = \"C:\\PRO_SSRS\\Chapter 8\\\
  RS\\\"\n\nPublic Sub Main()\n\n    ' 初始化 Reporting Services 凭证\n    rs.Credentials\
  \ = System.Net.CredentialCache.DefaultCredentials\n\n       ' 传递我们的路径信息以创建文件夹结构\n\
         CreateFolder(parentPath, \"/\")\n\n    ' 传递我们的数据源信息到创建数据源函数\n    CreateDataSource(\"\
  Pro_SSRS\", \"SQL\", \"data source=(local);initial catalog=Pro_SSRS\")\n\n    '\
  \ 传递我们的报告名称到部署报告函数\n    DeployReport(\"EmployeeServiceCost\")\n\nEnd Sub\n\nPublic\
  \ Sub CreateDataSource(name As String, extension As String, connectionString As\
  \ String)\n    ' 定义数据源定义。\n    Dim dataSourceDefinition As New DataSourceDefinition()\n\
  \n    dataSourceDefinition.CredentialRetrieval = CredentialRetrievalEnum.Integrated\n\
      dataSourceDefinition.ConnectString = connectionString\n    dataSourceDefinition.Enabled\
  \ = True\n    dataSourceDefinition.EnabledSpecified = True\n    dataSourceDefinition.Extension\
  \ = extension\n    dataSourceDefinition.ImpersonateUser = False\n    dataSourceDefinition.ImpersonateUserSpecified\
  \ = True\n\n    '使用默认提示字符串。\n    dataSourceDefinition.Prompt = Nothing\n    dataSourceDefinition.WindowsCredentials\
  \ = False\n\n    Try\n        ' 通过 Web 服务方法创建数据源\n        rs.CreateDataSource(name,\
  \ \"/\" + parentPath, False, dataSourceDefinition, Nothing)\n\n        ' 创建成功时显示成功消息\n\
          Console.WriteLine(\"数据源 {0} 创建成功\", name)\n    Catch e As Exception\n        '\
  \ 如果创建失败，捕获异常并显示结果\n        Console.WriteLine(e.Message)\n    End Try\n\nEnd Sub\n\
  \nPublic Sub DeployReport(ByVal reportName As String)\n\n    Dim definition As [Byte]()\
  \ = Nothing\n    Dim warnings As Warning() = Nothing   \n\n    Try\n        ' 尝试将报告作为文件流打开以读取报告定义信息\n\
          Dim stream As FileStream = File.OpenRead(reportPath + reportName + \".rdl\"\
  )\n        definition = New Byte {}\n        stream.Read(definition, 0, CInt(stream.Length))\n\
          stream.Close()\n\n        Try\n           ' 尝试通过 Web 服务部署报告\n           warnings\
  \ = rs.CreateReport(reportName, \"/\" + parentPath, False, definition, Nothing)\n\
  \n           If Not (warnings Is Nothing) Then\n               Dim warning As Warning\n\
                 For Each warning In warnings\n                  Console.WriteLine(warning.Message)\n\
                    Next warning\n\n           Else\n               Console.WriteLine(\"\
  报告: {0} 成功发布，没有警告\", reportName)\n            End If\n\n        Catch e As Exception\n\
                  Console.WriteLine(e.Message)\n        End Try\n\n    Catch e As\
  \ IOException\n        Console.WriteLine(e.Message)\n    End Try\n\nEnd Sub\n\n\
  Public Sub CreateFolder(ByVal folderName as String, ByVal ParentFolder as String)\n\
         Dim extraName As String\n       Dim newFolder As String\n\n       if( folderName.IndexOf(\"\
  /\") <> -1 )\n              newFolder = folderName.Substring(0, folderName.IndexOf(\"\
  /\"))\n              extraName = folderName.Substring(folderName.IndexOf(\"/\")+1)\n\
         else\n              newFolder = folderName\n              extraName = \"\"\
  \n       end if\n\n       Dim props(0) As [Property]\n       Dim folderProp As new\
  \ [Property]()\n\n       folderProp.Name = \"文件夹名称\"\n       folderProp.Value  =\
  \ newFolder\n\n       props(0) = folderProp\n\n    rs.CreateFolder(newFolder, parentFolder,\
  \ props)\n       Console.WriteLine(\"文件夹 \" + newFolder + \" 已创建\")\n\n       if(\
  \ extraName <> \"\" and parentFolder = \"/\")\n              CreateFolder(extraName,\
  \ parentFolder + newFolder)\n       else if(extraName <> \"\")\n              CreateFolder(extraName,\
  \ parentFolder + \"/\" + newFolder)\n       end if\nEnd Sub\n```\n\n\n![Image](img/square.jpg)\
  \ **注意** 使用 `rs.exe` 工具，您可以轻松地将一组数据源和报表部署到多个 SSRS 服务器。若要使用相同的 RSS 脚本文件进行镜像部署，只需使用不同的服务器参数重新运行\
  \ RS 命令即可。创建一个批处理文件，在其中使用不同的服务器目标多次调用 `rs.exe`，是一种轻松将项目以完全相同的方式部署到多个位置的好方法。\n\n\
  唯一被多次调用的函数是我们用户定义的 `CreateFolder` 方法。这是一个递归函数，它将解析您想要创建的文件夹名称，并逐部分构建它。为了节省空间，这里没有进行错误检查。因此，如果您多次运行此示例，您需要清理此函数创建的文件夹，否则由于文件夹已存在，它将引发异常。\n\
  \n在命令提示符中，移动到存储 RDL 和 RSS 文件的目录。在命令提示符中键入以下命令，然后按 Enter 运行它。请将报表服务器 URL 更改以反映您的报表服务器。\n\
  \n```\nrs -i PublishReports.rss -s http://localhost/reportserver\n```\n\n您可以在图 8-11\
  \ 中查看命令和结果。\n\n现在，您已经将新的数据源和报表部署到您的报表服务器。示例代码中包含的 RSS 文件可以作为脚本编写您自己的自定义报表项目部署的起点。\n\
  \n![Image](img/9781430238102_Fig08-11.jpg)\n\n***图 8-11.** 使用 `rs.exe` 工具部署报表和数据源*\n\
  \n## 使用报表服务器 Web 服务\n\nSSRS 2012 提供的用于以编程方式部署报表的方法是使用报表服务器 Web 服务之一（通过 SOAP API，我们将在第\
  \ 9 章中再次使用它来编写报表查看器）。在本节中，我们将探讨如何使用 Windows 窗体应用程序将报表部署到 SSRS 2012，该应用程序模拟了客户在准备好用于部署的\
  \ RDL 文件后需要执行的操作：\n\n> *   选择一个报表服务器来发布他们的报表。\n> *   从该服务器上显示的文件夹列表中进行选择，以确定将报表发布到服务器上的哪个文件夹。\n\
  > *   浏览到要从本地计算机上传到其报表服务器的 RDL 文件。\n\n在处理 SSRS 2012 时，有多个 Web 服务端点可供您使用。每个 Web 服务的旧版本仍然存在以保持向后兼容性，并且能够分别管理本机模式或\
  \ SharePoint 模式的安装。这些旧版本已被弃用，建议升级到最新版本，该版本允许您通过一个 Web 服务控制两种类型的安装。在此示例中，我们将使用最新的管理\
  \ Web 服务。\n\n您将使用报表服务器 Web 服务获取服务器上的文件夹列表，然后将报表上传到服务器。在此示例中，您将上传为医疗保健提供者创建的一些报表。在医疗保健环境中，对报表文件夹及其在服务器上的权限进行严格控制非常重要，因此您不允许用户创建新文件夹；他们只能上传到已有权限使用的现有文件夹中。\n\
  \n报表服务器 Web 服务的 `CreateCatalogItem` 方法允许您通过从您提供的 RDL 文件在服务器上创建报表副本来将报表部署到报表服务器。这与前面“使用\
  \ `rs.exe` 工具”一节中描述的方法相同。\n\n![Image](img/square.jpg) **注意** `CreateReportEditSession`\
  \ 方法可能会通过网络传输敏感数据，包括用户凭据。在进行 Web 服务调用时，应尽可能使用 SSL 加密。\n\n首先，您将使用 Visual Studio 2008\
  \ 创建一个新的 C# Windows 窗体解决方案。将此项目命名为 `SSRS_Publisher`。此示例将使用 C# 编写，但网站上的源代码示例也将包含一个用\
  \ VB.NET 编写的可工作版本。新项目创建后，将 `Form1.cs` 文件重命名为 `Publisher.cs`，并允许 VS 更新所有引用。\n\n###\
  \ 访问 Web 服务\n\n您需要添加对 SSRS 2012 报表服务器 Web 服务的引用，这与您在第 5 章中为报表查看器所做的操作相同。您可以通过选择“项目”->“添加\
  \ Web 引用”，或者在解决方案资源管理器中右键单击“引用”并选择“添加 Web 引用”；或者，您可以在解决方案资源管理器中右键单击项目并选择“添加 Web\
  \ 引用”。根据您使用的 VS 和 .NET 版本，您可能不会立即看到“添加 Web 引用”的选项。\n\n如果您在那些位置没有看到“添加 Web 引用”的选项，您可能需要使用不同的方法来添加引用。您将需要选择“项目”->“添加服务引用”。在此屏幕中，您将单击窗口左下角的“高级”按钮。在高级设置窗口中，您将单击屏幕左下角的“添加\
  \ Web 引用”按钮以调出 Web 引用窗口。\n\n当对话框出现时，输入以下 URL：\n\n[`http://localhost/reportserver/reportservice2010.asmx`](http://localhost/reportserver/reportservice2010.asmx)\n\
  \n如果您使用的是远程服务器，请将上述 URL 中的 `localhost` 替换为您的服务器名称，然后单击 URL 旁边的箭头按钮。此时系统可能会提示您输入凭据，以验证您是否有权访问\
  \ Web 服务。您现在应该会看到一个类似于图 8-12 中的对话框。\n\n![Image](img/9781430238102_Fig08-12.jpg)\n\
  \n***图 8-12.** “添加 Web 引用”对话框*\n\n在“Web 引用名”文本框中，输入 `SSRSWebService`。此名称是在代码中引用\
  \ Web 服务的方式。在此对话框关闭并将引用添加到项目后，在 `publisher.cs` 代码顶部的其他标准 `using` 指令旁边，添加以下 `using`\
  \ 指令：\n\n```\nusing SSRS_Publisher.SSRSWebService;\n```\n\n现在您可以更轻松地引用 Web 服务，因为您无需输入完全限定的命名空间。您还将在此之下添加另外三个\
  \ `using` 指令，使您能够在代码中更轻松地访问 Web 服务和 I/O 特定功能，如清单 8-3 所示。您可以将所有这些组合在一起查看，效果应如图 8-13\
  \ 所示。\n\n***清单 8-3.** 使用指令*\n\n```\nusing System.IO;\nusing System.Text.RegularExpressions;\n\
  using System.Web.Services.Protocols;\n```\n\n![Image](img/9781430238102_Fig08-13.jpg)\n\
  \n***图 8-13.** 向您的发布者项目添加指令*\n\n\n\n#### 布局表单\n\n从工具箱中，在表单顶部附近添加一个标签、一个文本框和一个按钮。将标签文本设置为\
  \ `Report server`，并在文本框属性中将其命名为 `reportServer`。将按钮命名为 `getFolders` 并将其文本设置为 `Go`。你将使用\
  \ `reportServer` 文本框允许用户输入他们想要部署到的报表服务器名称。\n\n接下来，在表单中心添加一个 TreeView 控件，并将其命名为 `ssrsFolders`。当用户输入服务器名称并单击\
  \ `Go` 按钮时，你将使用此控件显示服务器上可用文件夹的列表，以便上传你的报表。\n\n在表单底部附近添加一个标签、一个文本框和一个按钮；将标签文本设置为\
  \ `Report file`；将文本框命名为 `reportFile`；将按钮命名为 `browseFile`；并将按钮的文本设置为 `Browse`。你将使用\
  \ `reportFile` 文本框接受或显示要上传到指定 SSRS 2012 服务器的报表文件的路径名和文件名。你将使用 `Browse` 按钮来选择接受用户输入并允许他们选择要部署的报表文件的表单。\n\
  \n添加完所有这些控件后，表单应类似于 图 8-14。\n\n![Image](img/9781430238102_Fig08-14.jpg)\n\n**图 8-14.**\
  \ 发布器，示例报表发布器\n\n#### 为表单编码\n\n现在表单布局已完成，你将添加代码来处理必要的功能，以允许用户执行以下操作：\n\n- 输入服务器名称。\n\
  - 获取该服务器上可用文件夹的列表。\n- 选择目标文件夹和要上传的 RDL 文件。\n\n### 允许用户输入服务器名称\n\n当用户在表单中输入服务器名称时，代码需要构建完全标识要部署\
  \ RDL 文件的目标 SSRS 2012 服务器的 URL。\n\n首先，你将创建一个类级别的变量来保存对报表服务器的引用，就像你在 第 5 章 的 SSRS\
  \ 查看器中所做的那样。你通过将变量定义 `private ReportingService2010 rs;` 添加到类中来实现这一点，如 清单 8-4 所示。\n\
  \n**清单 8-4.** 上下文中的类级别变量\n\n```csharp\npublic partial class Publisher  :   Form\
  \ {\nprivate ReportingService2010 rs;\npublic Publisher()\n```\n\n要基于用户输入构建标识服务器的\
  \ URL，你首先要实例化报表服务器 Web 服务，然后将 `URL` 属性设置为反映用户输入到 `reportServer` 文本框中的服务器名称。我们希望为用户构建此\
  \ URL，因此他们只需输入服务器名称即可连接。\n\n为此，首先创建一个简短的函数来检查用户输入的服务器名称，然后将剩余的路径名附加到 Reporting Services\
  \ Web 服务，以构成引用所需服务器上 Reporting Services Web 服务所需的完整 URL。通过根据用户的输入构建 URL，你可以在用户有权执行此操作的任何\
  \ SSRS 2012 服务器上使用报表部署应用程序来部署报表。首先将 清单 8-5 中所示的代码添加到 `Publisher` 类中。\n\n**清单 8-5.**\
  \ 获取报表服务器 URL\n\n```csharp\nprivate string GetRSURL() {\n        if (reportServer.Text.StartsWith(\"\
  `Error! Hyperlink reference not valid.`\"))\n                return reportServer.Text\
  \ + \"/reportserver/ReportService2010.asmx\";\n        else\n                return\
  \ \"`Error! Hyperlink reference not valid.`\" + reportServer.Text +\n        \"\
  /reportserver/ReportService2010.asmx\";\n}\n```\n\n#### 用文件夹列表填充 TreeView 控件\n\n\
  现在，你将使用 Reporting Services Web 服务从服务器检索对象列表，并使用它们来填充 `ssrsFolders` TreeView 控件。我们将通过调用报表服务器\
  \ Web 服务的 `ListChildren` 方法来实现这一点。`ListChildren` 方法接受两个参数：\n\n- `Item`：父文件夹的完整路径名。\n\
  - `Recursive`：一个布尔表达式，指示是否返回指定项目下的整个子项树。默认值为 false。\n\n![Image](img/square.jpg)\
  \ **注意** `ListChildren` 方法返回报表服务器上的所有对象，包括数据源、报表部件和报表，而不仅仅是文件夹。在此示例中，你将过滤掉除文件夹之外的所有内容，因为你只对向用户显示文件夹结构感兴趣。你通过使用子对象的\
  \ `ItemType` 属性，然后对照字符串 \"Folder\" 进行测试来实现这一点。\n\n确保 `Publisher.cs` 表单在设计视图中打开，然后双击\
  \ `Go` 按钮。这将创建一个处理按钮单击事件的空方法。将 清单 8-6 中的代码添加到该方法中。\n\n**清单 8-6.** 填充 TreeView 控件的代码\n\
  \n```csharp\nssrsFolders.Nodes.Clear();\nrs = new ReportingService2010();\nrs.Credentials\
  \ = System.Net.CredentialCache.DefaultCredentials;\nCatalogItem[] items = null;\n\
  rs.Url = GetRSURL();\n\nTreeNode root = new TreeNode();\nroot.Text = \"Root\";\n\
  ssrsFolders.Nodes.Add(root);\nssrsFolders.SelectedNode = ssrsFolders.TopNode;\n\n\
  // 从服务器检索项目列表\ntry\n{\n          items = rs.ListChildren(\"/\", true);\n       \
  \   int j = 1;\n\n          // 遍历项目列表并找到所有文件夹并将其显示给用户\n          foreach (CatalogItem\
  \ ci in items)\n          {\n                   if (ci.TypeName == \"Folder\")\n\
  \                   {\n                             Regex rx = new Regex(\"/\");\n\
  \                             int matchCnt = rx.Matches(ci.Path).Count;\n      \
  \                       if (matchCnt > j)\n                             {\n    \
  \                                  ssrsFolders.SelectedNode =ssrsFolders.SelectedNode.LastNode;\n\
  \                                      j = matchCnt;\n                         \
  \    }\n                             else if (matchCnt < j)\n                  \
  \           {\n                                      ssrsFolders.SelectedNode =ssrsFolders.SelectedNode.Parent;\n\
  \                                      j = matchCnt;\n                         \
  \    }\n                             AddNode(ci.Name);\n                   }\n \
  \         }\n}\n\ncatch (SoapException ex)\n{\n        MessageBox.Show(ex.Detail.InnerXml.ToString());\n\
  }\ncatch (Exception ex)\n{\n        MessageBox.Show(ex.Message);\n}\n\n// 确保用户默认能看到根文件夹被选中\n\
  ssrsFolders.HideSelection = false;\n```\n\n在 `Go` 按钮单击事件方法的下方，添加如 清单 8-7 所示的以下方法。\n\
  \n**清单 8-7.** `AddNode` 方法\n\n```csharp\nprivate void AddNode(string name) {\n \
  \       TreeNode newNode = new TreeNode(name);\n        ssrsFolders.SelectedNode.Nodes.Add(newNode);\n\
  }\n```\n\n你通过传入 \"/\" 作为起点来告诉 `ListChildren` 方法从根文件夹开始，并将递归选项设置为 true，这会导致 `ListChildren`\
  \ 方法遍历 SSRS 2008 服务器上的所有文件夹和子文件夹。你使用此信息在 TreeView 控件中创建节点，以层次结构显示每个文件夹，该层次结构代表服务器上文件夹的层次结构。使用正则表达式查找每个\
  \ `CatalogItem` 路径中 \"/\" 字符的数量，以确定你在层次结构中的深度（一级、两级等）。\n\n\n#### 浏览 RDL 文件并将其上传到服务器\n\
  \n现在，你需要添加一些代码，允许用户浏览他们想要上传的文件。你应该默认将用户限制为浏览以 “rdl” 结尾的文件，因为这是 SSRS 2008 报表定义文件的原生扩展名。你还需要读取\
  \ `ssrsFolders` `TreeView` 中选定的节点，以便知道用户选择在 SSRS 2008 服务器上将报表部署到哪个文件夹。\n\n首先，从 `TreeView`\
  \ 控件读取选定节点的路径，并将其转换为可用于 SSRS 2012 的 `CreateCatalogItem` 方法的路径名。\n\n请确保以设计视图打开 `Publisher.cs`\
  \ 窗体，然后双击“浏览”按钮。这将创建一个用于处理按钮单击事件的空方法。将清单 8-8 中的代码添加到该方法中。\n\n**清单 8-8.** 用于浏览 RDL\
  \ 文件的代码\n```csharp\nprivate void browseFile_Click(object sender, EventArgs e)\n\
  {\n    // 从 TreeView 控件获取完整路径名\n    string pathName = ssrsFolders.SelectedNode.FullPath;\n\
  \n    if (pathName == \"Root\")\n        pathName = \"/\";\n    else\n    {\n  \
  \      // 从路径中剥离 Root 名称，并为使用 SRS 修正路径分隔符\n        pathName = pathName.Substring(4,\
  \ pathName.Length - 4);\n        pathName = pathName.Replace(@\"\\\", \"/\");\n\
  \    }\n\n    byte[] definition = null;\n    Warning[] warnings = null;\n    string\
  \ warningMsg = String.Empty;\n\n    OpenFileDialog openFileDialog = new OpenFileDialog();\n\
  \    openFileDialog.Filter = \"RDL files (*.rdl)|*.rdl|All files (*.*)|*.*\";\n\
  \    openFileDialog.FilterIndex = 1;\n    if (openFileDialog.ShowDialog() == DialogResult.OK)\n\
  \    {\n        try\n        {\n            // 读取文件并将其放入字节数组以传递给 SRS\n         \
  \   FileStream stream = File.OpenRead(openFileDialog.FileName);\n            definition\
  \ = new byte[stream.Length];\n            stream.Read(definition, 0, (int)(stream.Length));\n\
  \            stream.Close();\n        }\n        catch (Exception ex)\n        {\n\
  \            MessageBox.Show(ex.Message);\n        }\n\n        // 我们将使用 rdl 文件的名称作为报表的名称\n\
  \        string reportName = Path.GetFileNameWithoutExtension(openFileDialog.FileName);\n\
  \        reportFile.Text = reportName;\n\n        // 现在让我们使用这些信息来发布报表\n        try\n\
  \        {\n            rs.CreateCatalogItem(\"Report\", reportName, pathName, true,\
  \ definition, null, out warnings);\n\n            if (warnings != null)\n      \
  \      {\n                foreach (Warning warning in warnings)\n              \
  \  {\n                    warningMsg += warning.Message + \"\\n\";\n           \
  \     }\n                MessageBox.Show(\"Report creation failed with the following\
  \ warnings:\\n\" + warningMsg);\n            }\n            else\n             \
  \   MessageBox.Show(String.Format(\"Report: {0} created successfully with no warnings\"\
  , reportName));\n        }\n        catch (SoapException ex)\n        {\n      \
  \      MessageBox.Show(ex.Detail.InnerXml.ToString());\n        }\n    }\n}\n```\n\
  \n该代码首先从 `ssrsFolders` `TreeView` 控件获取用户选择在 SSRS 2012 服务器上放置报表的完整路径，剥离路径开头的单词 *Root*，然后将字符串中所有出现的反斜杠替换为\
  \ SSRS 2012 所需的正斜杠。\n\n然后，你为 `openFileDialog` 控件设置选项，使其默认浏览具有 RDL 扩展名的文件，然后向用户显示对话框。如果用户进行了选择，则使用\
  \ `FileStream` 对象打开该文件并从流中读取到字节数组中。这是因为 SSRS 2012 的 `CreateCatalogItem` 方法期望 RDL\
  \ 文件的内容以字节数组的形式传入。\n\n接下来，读取用户选择的文件名并将其用作 SSRS 2012 中报表的标题。有了标题后，你就拥有了上传报表所需的一切，这通过调用\
  \ `CreateCatalogItem` 方法并传入你创建的值来完成。你可以在清单 8-8 的末尾看到，为完整清单添加了必要的代码。\n\n\n### 运行应用程序\n\
