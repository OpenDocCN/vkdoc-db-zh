  SQL Server 数据库中的视图。这是一个从其他对象查询派生出的对象。假设你选择了一个或多个表，你将会基于主键（如果存在）或使用相关的列 ID 值图形化地定义这些表之间的关系，而这些表将成为报表模型的数据源。无论你是使用带有关系的真实表对象，还是使用只包含你所需字段的
  `命名查询` 表，最终结果是相同的。区别在于，通过这种方式，你可以获得一个简单明了的表的好处，而不是使用许多表，并可能带来添加超出模型所需更多数据的潜在缺点。


