  `表格`，单击 `下一步`，然后选择分组和明细布局，将 `年份` 显示为主要分组，接下来是 `月份`、`员工类别 ID` 和 `员工姓名`。对于明细，你希望看到患者具体信息——`诊断`、`就诊次数`、`预估成本`
  和 `服务类型`——如图 6-2 所示。


