  `DSCR`（用于描述，如在 `Diag` 和 `PatEMR` 表中）进行同样的操作。我们还为每个表创建了别名。这减少了输入量，并使 SQL 更容易理解。你可以在
  SQL 代码部分为表名设置别名，也可以通过右键单击每个表的标题部分并选择 `属性` 来设置。你可以在属性窗口的 `别名` 部分输入别名。


