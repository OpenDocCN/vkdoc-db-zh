  \n`图 9-10.` 使用你的参数完成的报表\n\n现在，你已掌握了在 Windows 窗体应用程序中使用报表查看器控件的基础。本章的示例在 Web 浏览器控件中实现了\
  \ URL 访问，并使用报表查看器控件来渲染报表，为你提供了将报表集成到 Windows 窗体应用程序的多种选择。通过使用 SSRS 2012 基于 SOAP\
  \ 的 API 来访问 SSRS 的丰富功能，以检索可用的报表参数和可能值，你使查看器对用户更加友好。这让你能够为用户创建一个更熟悉且响应更灵敏的基于 Windows\
  \ 的用户界面。\n\n你也可以直接使用报表服务器 Web 服务来渲染报表。但是，你会失去诸如带有内置导航和导出功能的报表工具栏等特性。这意味着，如果你使用另一个\
  \ Web 服务进行渲染，就必须自己创建这些功能。\n\n#### 在 ASP.NET 中构建报表查看器\n\n使用 Visual Studio，你还可以选择在\
  \ ASP.NET 应用程序中使用报表查看器控件。这可以让你灵活地开发自定义报表应用程序，而不必分发给用户或在每次部署补丁时在最终用户的机器上更新。用户可以通过任何标准的\
  \ Web 浏览器访问你的自定义应用程序，并且任何修改对你的最终用户都可以是透明的。\n\n在这个项目中，你将使用许多与之前构建的窗体应用程序相同的概念和方法。首先创建一个新的\
  \ ASP.NET Web 应用程序项目。将此项目命名为 `SSRS_WebViewer`，并为你的源文件选择一个位置。\n\n![Image](img/square.jpg)\
  \ **提示** 如果你的开发机器上没有 IIS 也不用担心。使用 Visual Studio 的调试功能，你可以在 Web 浏览器中查看你的 ASP.NET\
