- "# 报告设计步骤\n\n## 布局调整\n\n现在你已经合并了患者的全名，可以通过点击数据单元格并按`Delete`键来删除“Pat Last Name”字段。在预览报告之前，还有一些其他任务需要完成。\n\
  \n首先是将“Zip”列移动到“State”列的右侧。只需点击包含“Zip”的单元格，并将其拖到“State”列的右侧即可。\n\n接下来，调整字段大小，使每条记录都能在一行内显示。在用于报告的字段中，“Diagnosis”和“Address”字段可能是最大的，因为它们是可变长度字段，通常包含\
  \ 20 到 50 个字符。然而，由于我们希望每列的标题显示在一行上，因此也需要调整“Start of Care”字段的大小。\n\n在此示例中，将“Pat ID”字段调整到约\
  \ 0.5 英寸，将“Diagnosis”、“Start of Care”和“Address 1”字段扩展到约 1.5 英寸，然后预览报告，如`Figure 13-27`所示。代表数据的`x`字符数量将与数据库字段中最大值中的字符数量一样多，这使得确定如何调整每列大小变得容易。\n\
  \n“Address”字段显示为`NA`的原因是，这些信息要么是经过混淆处理（例如患者姓名），要么被修改为`NA`以移除可识别信息。\n\n另请注意，在`Figure\
  \ 13-27`中，每个字段在列标题级别自动包含一个交互式排序图标。尽管点击图标会重新渲染报告，但在你配置排序之前，实际上不会执行任何排序操作。下一步我们将进行配置。\n\
  \n![Image](img/9781430238102_Fig13-27.jpg)\n\n**Figure 13-27.** 预览患者情况表报告\n\n##\
  \ 排序与分组\n\n点击工具栏上的“Design Report”按钮返回报告的设计区域。接下来，右键单击“Pat ID”数据单元格，然后在工具栏上选择“Sort\
  \ and Group”。这将打开“Sort”对话框。选中“Patient Census”组，选择首先按“Pat ID”排序，然后按“Patient Name”排序，最后按“Diagnosis”排序，如`Figure\
  \ 13-28`所示。你还可以选择在每个组后添加分页符作为组选项。此时请不要添加分页符。单击“OK”后，你可以预览报告，并看到每个定义列的排序工作正常。\n\n\
  ![Image](img/9781430238102_Fig13-28.jpg)\n\n**Figure 13-28.** 排序和分组选项\n\n关于将字段拖到报告的表区域，我们还需要提及一点：分组会自动从左到右定义。换句话说，将字段拖放到另一个字段的右侧会将该字段保留在同一组中（本例中为“Patient\
  \ Census”组）；但是，如果你已经将一个字段拖到表中，然后又将另一个字段拖到它的左侧，则会根据被放置字段的名称创建另一个组。你可以在`Figure 13-29`中看到这一点，例如将“Branch\
  \ Name”字段拖到“Pat ID”字段的左侧。\n\n如果你正在进行这些操作，请继续将“Branch Name”字段拖到报告中以查看自动分组效果。同时，请将表头行调整为一行高。然后将整个表拖得离标题更近一些。执行这些步骤后，应该会得到一个类似于`Figure\
  \ 13-29`所示的报告。\n\n![Image](img/9781430238102_Fig13-29.jpg)\n\n**Figure 13-29.**\
  \ 自动创建的分组\n\n## 保存与部署\n\n在将报告保存到报告服务器之前，你可以最后预览一次。请注意，在`Figure 13-30`中，新添加的“Branch\
