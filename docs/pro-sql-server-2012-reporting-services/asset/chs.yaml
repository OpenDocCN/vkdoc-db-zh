  \ `报表生成器` 角色的任务权限\n\n在 `SSRS` 中，你还可以添加新角色或编辑服务器的任何现有角色。如果你需要为需要略微高于标准 `SSRS` 角色权限的用户创建一个新的自定义角色，这很重要。该界面与角色编辑窗口相同，可以通过右键点击\
  \ `角色` 节点并选择 `新建角色` 来访问。\n\n## 测试 SSRS 角色分配\n\n在本节中，我们将完成添加文件夹和报表对象的过程，这些操作将与护士\
