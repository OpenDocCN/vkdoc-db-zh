  \ `角色` 部分。\n\n![Image](img/9781430238102_Fig11-11.jpg)\n`图 11-11.` 通过 `SSMS` 连接到\
  \ `SSRS`\n\n展开 `角色` 节点可以看到我们之前讨论过的五个默认角色。要查看角色的属性，请右键点击浏览器并选择 `属性`。你将看到该角色的描述，以及该角色可以执行的每项任务。图\
  \ 11-12 向你展示了其外观。从这个窗口，你可以编辑描述或编辑该角色可以执行哪些任务。你现在不想更改 `报表生成器` 角色的任务，所以可以四处查看以感受安全更改有哪些选项，但请点击\
