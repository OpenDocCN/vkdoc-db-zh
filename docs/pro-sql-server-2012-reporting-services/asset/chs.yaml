  \ `ScriptManager` 控件。它确保页面包含 `ReportViewer` 所需的所有前提代码。\n\n一旦你将控件放在页面上并调整大小以适合你的布局，请为刚创建的按钮添加一个单击动作。这可以通过在设计模式下查看页面并双击按钮来实现，就像\
