  ![Image](img/square.jpg) **注意** `ReportEmbeddedResource` 值必须包含你的项目命名空间。如果你在创建项目时为项目名称输入了空格，命名空间将使用下划线替代每个空格。\n\
  \n现在，在调试模式下运行项目（不是整个解决方案）。记住，你可以通过右键单击特定项目并选择 `调试` -> `启动新实例` 来执行此操作。当窗体显示时，单击 `运行本地`。这将渲染本地员工工资报表。此时，你应该看到类似于图\
  \ 9-6 的内容。你现在已经通过使用 WebBrowser 控件进行 URL 渲染和使用新的报表查看器控件，在 Windows 窗体应用程序中创建了一个报表查看器。你可以在此时停止，并仅使用这些方法来渲染报表以及显示报表参数、工具栏和报表。但是，在本示例中，你希望使用\
  \ SSRS 2012 报表服务器 Web 服务来获取所选报表的参数列表，并在 Windows 窗体中向用户显示它们。要获取此参数列表，你需要在 SSRS 2012\
  \ 报表服务器 Web 服务上调用 `GetReportParameters` 方法。\n\n![Image](img/9781430238102_Fig09-06.jpg)\n\
  \n**图 9-6.** 正在运行本地渲染报表的 SSRS Viewer RVC\n\n## 使用报表服务器 Web 服务\nSSRS 2012 Web 服务使用\
  \ SOAP API，允许你在报表服务器上调用各种方法，并使用该服务提供的一组丰富的对象与它们进行交互。\n\n在 SSRS 2012 中，有两个你应该关注的服务。第一个是\
  \ `ReportingService2010`，它处理报表服务器及其内部报表的管理。我们将在本章的剩余部分使用此服务。第二个服务 `ReportExecutionService`，处理无需浏览器或报表查看器即可程序化渲染报表。\n\
  \n## Web 服务方法类别\n报表服务器 Web 服务可以控制报表服务器的各个方面，由几个类别的方法组成，如表 9-6 所列。\n\n报表服务器 Web 服务使用其中许多方法来控制与直接控制报表不直接相关的\
  \ SSRS 2012 方面，因此我们不在本章中介绍它们。但是，你应该了解你的自定义应用程序对 SSRS 2012 的控制级别以及可以执行的功能类型，因为你可能希望从应用程序中为它们提供用户界面。请记住，Microsoft\
  \ 是使用 ASP.NET 和这些 Web 服务构建主要的 SSRS 2012 报表管理器应用程序的。\n\n对于 SSRS Viewer RVC，你正在使用报表查看器控件来渲染报表，但你希望提供一个基于\
  \ Windows 窗体的自定义用户界面，以允许用户输入他们的报表参数。本章的其余部分集中使用表 9-6 中列出的报表参数类别的方法。你将使用这些方法来获取报表期望的参数列表，并查找这些参数的可能值。\n\
  \n![Image](img/tab_9_6.jpg)\n\n你将使用此信息来创建和填充组合框，允许用户在 Windows 窗体对话框中输入他们的选择。\n\n\
  \n#### 创建 GetParameters 表单\n\n你已经拥有一个窗体 (`ViewerRVC.cs`)，用于在嵌入式报表查看器控件中呈现和显示报表。现在，你将向项目中添加第二个窗体，用于显示报表和呈现参数，并允许用户进行选择。\n\
  \n因此，通过选择 **Project** ![Image](img/U004.jpg) **Add Windows Form** 来向你的项目中添加一个 `GetParameters`\
  \ 窗体。将该窗体命名为 `GetParameters.cs`，并将其标题文本修改为 `Parameters`。接着，从工具箱中向此窗体添加两个控件；从“容器”部分添加一个名为\
  \ `parameterPanel` 的 `FlowLayoutPanel` 控件，并在按钮属性窗口中添加一个名为 `buttonOK` 的按钮控件。然后，在按钮属性窗口中将按钮的\
  \ `text` 属性设置为 `OK`。完成后，窗体应如 图 9-7 所示。\n\n![Image](img/9781430238102_Fig09-07.jpg)\n\
  \n##### 图 9-7. SSRS Viewer RVC 的 `GetParameters` 窗体\n\n现在，你需要将对 SSRS 2012 Web 服务的引用添加到你的项目中。具体操作是选择\
  \ **Project** ![Image](img/U004.jpg) **Add Service Reference**，或者在**解决方案资源管理器**中右键单击**服务引用**并选择**添加服务引用**。当对话框出现时，点击窗体底部的**高级**按钮。在下一个窗体上，点击**添加\
  \ Web 引用**按钮。然后，在此输入以下 URL：\n\n`http://localhost/reportserver/reportservice2010.asmx`\n\
  \n如果需要，请将 `localhost` 替换为你的服务器名称。接着点击**Go**按钮（即右箭头图标）。你将看到一个类似于 图 9-8 的对话框。\n\n\
  ![Image](img/9781430238102_Fig09-08.jpg)\n\n##### 图 9-8. 添加 SSRS 2008 Web 服务引用\n\
  \n在**Web 引用名称**文本框中，输入 `SSRSWebService`，这是你将在代码中引用该 Web 服务时使用的名称。然后，点击**添加引用**按钮以完成引用的添加。\n\
  \n关闭此对话框后，你需要在 `GetParameters` 类文件的代码顶部添加以下 `using` 语句。请注意，如果你的项目名称与 `SSRS Viewer\
  \ RVC` 不同，你应该更改引用以反映你的项目名称。\n\n```csharp\nusing SSRS_Viewer_RVC.SSRSWebService;\n\
  ```\n\n现在，你可以更轻松地引用 Web 服务公开的方法和属性，因为你无需输入完全限定的命名空间。另外，在你刚添加的语句下方添加以下其他指令：\n\n```csharp\n\
  using System.Web.Services.Protocols;\nusing System.Collections;\n```\n\n这样做将允许你访问这些命名空间的成员，而无需在每次使用该命名空间中的方法或属性时键入完整的命名空间。\n\
  \n由于你将使用此窗体作为对话框来显示报表参数及其可能值，并允许用户选择它们，因此你需要一种在主窗体和这个新创建的 `GetParameters` 窗体之间进行通信的方法。我们将在下一节中设置该通信。\n\
  \n#### 为报表参数窗体编码\n\n当你实例化报表参数窗体 (`GetParameters.cs`) 时，你需要传入用户在查看器窗体 (`ViewerRVC.cs`)\
  \ 中输入的报表 URL。你使用此 URL 来确定报表服务器名称和用户想要运行的具体报表。你需要同时知道这两者，以便调用报表服务器 Web 服务。因为你将在后续代码中贯穿使用这些信息，所以在你的\
  \ `GetParameter` 类中，你会将它们存储在一些类级别的私有变量中，如 清单 9-4 所示。将私有变量列表直接添加到你的 `GetParameter.cs`\
  \ 类代码中类声明的起始之后。\n\n##### 清单 9-4. 类级别的私有变量\n\n```csharp\npublic partial class GetParameters\
  \ : Form\n{\n    private string url;\n    private string server;\n    private string\
  \ report;\n    private Microsoft.Reporting.WinForms.ReportParameter[] parameters;\n\
  \    ReportingService2010 rs;\n```\n\n在窗体构造函数中（该函数将 URL 字符串作为唯一参数），我们将把报表服务器和报表名称分解为两个单独的字段。为了将\
  \ URL 分解为服务器和报表名称，请使用 `string` 的 `Split` 方法，并创建一个类似于 清单 9-5 的构造函数。将此构造函数代码（即创建类类型对象时首先运行的代码）直接添加在私有变量下方。你还需要在构造函数中添加名为\
  \ `URL` 的 `string` 参数。\n\n##### 清单 9-5. 报表参数窗体构造函数\n\n```csharp\npublic GetParameters\
  \ (string URL)\n{\n    InitializeComponent();\n    url = URL;\n    string[] reportInfo\
  \ = url.Split('?');\n    server = reportInfo[0];\n    report = reportInfo[1];\n\
  }\n```\n\n## GetParameters_Load 事件\n\n现在，你将进入此对话框实际工作的部分：`Form_Load` 事件。要自动创建此方法，请在显示模式下打开你的\
  \ `GetParameters` 窗体，然后在窗体上没有组件的位置（例如顶部标题栏）双击。这将在代码视图中打开你的窗体，并且 `GetParameters_Load`\
  \ 方法已被创建并链接到窗体的 Load 事件。\n\n接下来，创建一个 `ReportingService` 对象，以便通过你先前添加为引用的 Web 服务来访问\
  \ SSRS 2012。然后，将你的 Windows 凭据设置为调用 Web 服务时要使用的凭据，如下所示：\n\n```csharp\nrs = new ReportingService2005();\n\
  rs.Credentials = System.Net.CredentialCache.DefaultCredentials;\n```\n\n![Image](img/square.jpg)\
  \ **注意** 你也可以使用基本身份验证，通过 `rs.Credentials = new System.Net.NetworkCredential(\"username\"\
  , \"password\", \"domain\");`。你使用的方法取决于报表服务器虚拟目录的安全设置。默认情况下，它配置为使用 Windows 身份验证。\n\
  \n\n\n### 调用 Web 服务 GetItemParameters 方法\n\n`GetItemParameters` 方法接受五个参数：\n\n> *\
  \   `Item`: 报表或项的完整路径名。\n> *   `ForRendering`: 一个布尔值，指示应如何使用参数值。要获取每个参数的可能值列表，必须将其设置为\
  \ `true`。\n> *   `HistoryID`: 报表历史快照的 ID。因为不是从快照运行报表，所以将其设置为 `null`。\n> *   `ParameterValues`:\
  \ 可针对报表服务器管理的报表参数进行验证的参数值（`ParameterValue[]` 对象）。对于本示例，将其设置为 `null`。\n> *   `Credentials`:\
  \ 可用于验证查询参数的数据源凭据（`DataSourceCredential[]` 对象）。\n\n`GetItemParameters` 方法返回一个 `ItemParameter[]`\
  \ 对象数组，其中包含报表的参数。你可以使用此信息来渲染组合框，以便用户在运行报表时选择他们想要使用的参数值。\n\n以下代码设置需要使用的变量，然后调用 `GetItemParameters`\
  \ 方法来检索报表期望的参数列表，如 Listing 9-6 所示。\n\n***Listing 9-6.** 调用 GetReportParameters*\n\
  \n```csharp\nbool forRendering = true;\nstring historyID = null;\nParameterValue[]\
  \ values = new ParameterValue[1];\nDataSourceCredentials[] credentials = null;\n\
  ItemParameter[] parametersSSRS = null;\nparametersSSRS = rs.GetItemParameters(report,\
  \ historyID,\n    forRendering, values, credentials);\n```\n\n一旦从 SSRS 2012 获取了参数列表，就可以循环遍历它们，使用这些值在创建每个参数的组合框时创建标签，如下所示：\n\
  \n```csharp\nforeach (ItemParameter rp in parametersSSRS)\n```\n\n每个 `ItemParameter`\
  \ 对象都有一个名为 `ValidValues` 的只读属性。你可以使用 `ValidValues` 属性（它返回一个 `ValidValue` 对象数组）来填充每个组合框中的项，如\
  \ Listing 9-7 所示。\n\n***Listing 9-7.** 遍历 ValidValue 对象*\n\n```csharp\nif (rp.ValidValues\
  \ != null) {\n    // 构建列表项\n    ArrayList aList = new ArrayList();\n    pvs = rp.ValidValues;\n\
  \    foreach (ValidValue pv in pvs)\n    {\n        aList.Add(new ComboItem(pv.Label,pv.Value));\n\
  \    }\n    // 将列表项绑定到组合框\n    a.DataSource = aList;\n    a.DisplayMember=\"Display\"\
  ;\n    a.ValueMember=\"Value\";\n}\n```\n\n因此，对于每个 `ReportParameter`，你需要检查是否存在任何\
  \ `ValidValues` 属性。如果存在，则循环遍历它们，将每个项添加到组合框中。因为你想检索组合框中每个项的显示名称和实际值，所以必须创建一个组合框项类，并将这些对象绑定到组合框。Listing\
  \ 9-8 显示了完整的 `GetParameters_Load` 事件方法，Listing 9-9 显示了 `ComboItem` 类。\n\n由于我们对报表有所了解，已经知道某些参数依赖于其他参数值。如果只是遍历每个参数的\
  \ `ValidValues` 列表，其中一些将不会包含任何值。我们可以利用这一先前知识，向 `getItemParameters` 方法传递一些信息。我们将在\
  \ `values` 数组中放置一个 `ParameterValue` 项，以便为所有其他参数检索一些有效值。\n\n我们还需要检索组合框中每个项的显示名称和所选值。我们还将创建一个组合框项类，通过将每个组合项绑定到组合框来处理此问题。Listing\
  \ 9-8 显示了 `GetParameters_Load` 事件，Listing 9-9 显示了 `ComboItem` 类。\n\n![Image](img/square.jpg)\
  \ **注意** 我们仅根据一个可能的“服务年份”值来填充其余参数。由于在某些报表中，其他参数的有效值可能会发生变化，因此可以包含一个重写的事件方法，以便在年份更改时刷新每个其他参数值。\n\
