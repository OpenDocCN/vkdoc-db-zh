  \n*   `系统用户`\n    *   查看系统属性\n    *   查看共享计划\n    *   允许使用 `Report Builder` 或其他执行\
  \ `RDL` 的客户端\n*   `系统管理员`\n    *   查看/修改系统角色分配\n    *   查看/修改系统角色定义\n    *   查看/修改系统属性\n\
  \    *   查看/修改共享计划\n    *   拥有 `系统用户` 角色的所有其他访问权限\n\n![Image](img/9781430238102_Fig11-18.jpg)\n\
  \n**图 11-18.** `管理员可用的报表属性`\n\n要完成测试，你只需以 `jyoungblood` 身份执行 `Daily Schedule` 报表即可。你已经授予了\
  \ `RN` `Windows` 安全组继承 `SSRS 浏览器` 角色的权限，因此执行报表应该没有问题。报表执行成功。然而，图 11-19 显示了一个明显的问题——尽管\
  \ `jyoungblood` 执行了该报表，但她看到的是其他员工的预约访问。虽然她可以输入一个 `员工 ID` 参数值来将报表数据限制为仅她自己的数据，但如果她知道其他员工的\
  \ `ID`，她仍然可以通过输入他们的 `ID` 来查看他们的日程安排。尽管对于许多公司来说，这可能是可以接受的做法，但在下一节中，我们将展示如何更进一步，确保她只能查看自己的日程安排。\n\
  \n![Image](img/9781430238102_Fig11-19.jpg)\n\n**图 11-19.** `测试账户查看其他员工的数据`\n\n`提示`\
  \ 在构建测试环境时，有许多可用资源可以简化流程。虚拟化在当今几乎每个环境中都很常见。`Microsoft's Hyper-V` 或其他桌面虚拟化工具是测试的有利工具，因为它们允许你在单台机器上同时运行多个操作系统。\n\
  \n\n## 使用 User!UserID 过滤报告内容\n\n对于每日计划报告，假设你决定让用户只能查看自己的日程安排。SSRS 允许你通过创建一个报告过滤器来实现这一点，该过滤器使用执行报告的用户的登录账户值。登录名值是从\
  \ SSRS 中的一个全局集合返回的。你一直在使用全局集合——例如，当你使用表达式`=Fields!FieldName.Value`时，你实际上是从 `Fields`\
  \ 全局集合中返回一个值。你将用于报告过滤器的全局集合是 `User`，而你感兴趣的值是 `UserID`。因此，表达式将是`=User!UserID`。\n\n\
  要在过滤器中使用 `User!UserID`，你需要在数据集中有一个等于 `UserID` 值的字段。在每日计划报告的数据集中，你可能还记得有一个名为 `HWUserLogin`\
  \ 的字段，你可以用于此目的。当过滤器进行比较时，这两个值将是相同的——一个值随数据集提供，另一个在报告执行时提供。应用过滤器后，报告将仅显示那些执行报告的员工的用户名与数据集每条记录返回的\
  \ `HWUserLogin` 字段值相匹配的记录。\n\n与参数不同，过滤器不能通过报告管理器设置。要设置过滤器，你需要修改报告本身，可以直接在 RDL 文件中，或通过报表生成器或\
  \ Visual Studio 进行，如 图 11-20 所示。请注意，你可以使用 `RTRIM` 函数来去除尾随空格；否则，比较可能会失败。确保员工登录名与你创建的用户匹配，这样比较才能匹配。在本书示例中，这是\
  \ `PROSSRS\\Jyoungblood`，但你的示例可能不同。将过滤器添加到组属性中，以过滤掉除查看用户之外的任何其他用户。\n\n![Image](img/9781430238102_Fig11-20.jpg)\n\
  \n**图 11-20.** 每日计划报告的 `UserID` 过滤器\n\n由于此报告可能返回数百条记录，即使它会为每个用户自动过滤，也最好将报告缓存十分钟。缓存有助于减轻每次新用户访问报告时重新查询数据源所带来的性能影响。当用户\
  \ `jyoungblood` 再次执行报告时，你可以看到日程安排现在只反映她的日程，如 图 11-21 所示。\n\n![Image](img/9781430238102_Fig11-21.jpg)\n\
  \n**图 11-21.** 测试用户的过滤报告执行\n\n## 设置数据源安全性\n\n一旦你将数据源部署到报告服务器，就可以指定其连接属性。这是一个重要的步骤，因为属性设置决定了用户和\
  \ SSRS 如何连接到数据源。在执行无人参与的报告时——例如，用于用户订阅——SSRS 将控制向数据源传递身份验证凭据，并且必须有权访问有效的身份验证凭据。\n\
  \n在报告管理器中，数据源有四种连接选项可用：\n\n> *   *由运行报告的用户提供的凭据：* 使用此选项时，用户在执行报告时始终会被提示登录数据源。\n\
  > *   *安全存储在报告服务器中的凭据：* SSRS 使用存储在 `ReportServer` 数据库中的身份验证凭据。敏感的登录信息是加密的。\n> *\
  \   *Windows 集成安全性：* 此选项将当前用户的登录信息传递给数据源。如果数据源将用于无人参与的安装，或者 Windows 域未配置 `Kerberos`，则不要选择此选项。在从\
  \ SQL Server 进行多次跳转时使用此选项也会出现问题。除非 `Kerberos` 在整个域中正确安装和配置，否则这可能无法在所有情况下正常工作。\n\
  > *   *不需要凭据：* 这是最不安全的选项，在数据源不需要身份验证时使用。\n\n## 设置 SQL Server 权限\n\n在第 3 章中，当你创建名为\
  \ `Emp_Svc_Cost` 的存储过程时，你设置了权限以允许在报告设计期间进行公共执行。你当时的工作环境是安全的，因为它与其他网络隔离，并且没有被破坏的担忧。\n\
  \n现在你正在生产环境中部署存储过程，你还需要锁定存储过程。你可以通过 SSMS 右键单击存储过程并选择属性来完成此操作（参见 图 11-22）。接下来，单击权限页。使用搜索…按钮搜索\
  \ `RN` 组以加载其显式权限。选中授予列下的执行权限，这将允许 `RN` 组中的任何用户执行此存储过程。你不需要显式授予测试用户 `jyoungblood`\
  \ 执行权限，因为她是 `RN` 安全组的成员。\n\n![Image](img/9781430238102_Fig11-22.jpg)\n\n**图 11-22.**\
  \ 设置 SQL Server 存储过程权限\n\n## 审核报告\n\n能够了解报告执行的详细信息，特别是对于不需要的访问，是安全难题的重要组成部分。在本章中，我们将使用内置的报告执行日志和一个报告管理表来构建一个报告，该报告将显示谁运行了什么报告以及更多信息。拥有报告执行的审计跟踪对于深入了解用户行为和可能的安全漏洞至关重要。\n\
  \n## SSRS 审计\n\n在本节中，我们将展示如何使用 `ReportServer` 数据库中的内置视图来审计 SSRS 中的以下活动：\n\n> * \
  \  *报告执行活动：* 哪位用户在何时执行了哪份报告，以及报告以何种状态完成（以发现可能的问题）\n> *   *报告的参数输入：* 用户输入了哪些参数\n\n\
  后者很重要，因为尽管 SSRS 对某些类型的参数（如 `Integer` 和 `DateTime`）包含验证功能，但当报告参数使用字符串时，它就容易受到 SQL\
  \ 注入攻击。当网页或服务从用户或程序接收的输入中可能包含可在 SQL Server 机器上执行的注入代码时，SQL 注入攻击就成为可能。这些攻击本质上可能是恶意的，也可能导致报告或页面传递超出预期的数据。\n\
  \n我们简单地将报告从矩阵改为了表格，这更符合用于性能分析的数据透视表。在这个名为 `报告执行审计` 的修改版报告中（可在 `Pro_SSRS` 第 11 章\
  \ 文件中找到），您还将包含用户已选择的参数。请上传此报告以及一个指向您的 `ReportServer` 数据库的新数据源，将其放在 SSRS 安装根目录下一个名为\
  \ `Management` 的新文件夹中。您还需要将报告指向您正在创建的这个新数据源。您可以在代码清单 11-1 中查看我们用于提取此信息的查询。\n\n**代码清单\
  \ 11-1.** 执行日志查询\n\n```sql\nSELECT\n          Catalog.name\n        , ExecutionLog.UserName\n\
  \        , ExecutionLog.Parameters\n        , ExecutionLog.TimeStart\n        ,\
  \ ExecutionLog.TimeEnd\n        , ExecutionLog.Status\n FROM ExecutionLog\nINNER\
  \ JOIN Catalog ON ExecutionLog.ReportID = Catalog.ItemID\n```\n\n在图 11-23 中，您可以看到所选报告的执行时间以及输入的参数名称和值。除了通过\
  \ `参数` 字段显示用户如何与报告交互外，`报告执行审计` 报告还显示了报告的开始和结束时间。拥有这种级别的审计是维护机密信息安全斗争中的宝贵盟友。对于 HIPAA，还需要维护用户数据访问的审计跟踪。如果您怀疑有人正在访问其无权查看的信息，此报告可以与其他常规审计程序（如\
  \ Windows 事件日志）一起作为审计跟踪。\n\n![Image](img/9781430238102_Fig11-23.jpg)\n\n**图 11-23.**\
  \ 报告执行审计报告\n\n## 日志文件审计简介\n\n除了报告审计外，SSRS 还支持另外两种类型的日志记录：标准的 Windows 事件日志记录和跟踪文件日志记录。您可以使用这两种资源来搜索错误和警告，以及其他重要信息（如安全信息）。\n\
  \n所有跟踪文件都存储在默认安装位置 `驱动器:\\Program Files\\ Microsoft SQL Server\\MSRS11.MSSQLSERVER\\\
  Reporting Services\\LogFiles`。存在几种类型的日志文件：`ReportServerService` 和 `ReportServer`。每个文件都以时间戳命名，例如\
  \ `ReportServerService_05_31_2012_17_00_30.log` 和 `ReportServerService_HTTP_05_31_2012_17_00_30.log`，并包含特定于其各自服务的信息。您可以收集五个级别的跟踪日志信息——0\
  \ 到 4 级——这些级别在 `Reporting Services\\ReportServer\\Bin` 文件夹中的 `ReportingServicesService.exe.config`\
  \ 文件中控制。选择 `0` 将禁用跟踪，选择 `4` 将启用详细模式。每当 SSRS 出现问题时，管理员通常可以通过查看事件日志或某个跟踪文件来隔离问题。\n\
  \n### 小结\n\n在本章中，您研究了确保 SSRS 部署安全所必需的三项安全任务：加密、身份验证和审计。在内部，只有需要访问机密数据的员工才应该拥有该权限，您可以通过为报告部署应用特殊过滤器来确保这一点。作为一家处理大量机密患者信息的公司，我们必须遵守\
  \ HIPAA 规定的法规。然而，在其他行业，也存在许多类似的法规。对于任何公司来说，制定安全政策和程序都是良好的实践，即使不是在严格的监管下工作。幸运的是，SSRS\
  \ 设计用于通过 Windows 身份验证利用您组织中已存在的核心级安全机制，并且在需要时可以扩展以支持其他自定义身份验证方式。\n\n## 第 12 章\n\n\
  ## 使用 SSRS 交付商业智能\n\n大多数公司都会积累业务数据，如果分析得当，这些数据可以为公司指明实现最终成功的方向提供洞察。商业智能（BI）的主要目的是以可立即用于决策的方式提供数据。微软的\
  \ BI 平台包含许多协同工作的服务和应用程序，以促进关键业务数据的分析与交付。`SQL Server`是 BI 模型的核心，提供数据存储、数据转换、通知、调度、分析和报表服务。\n\
  \n拥有正确的数据只是构建有效 BI 系统挑战的第一部分。第二部分是确保这些数据以有效且易于访问的方式交付给所有需要查看它们以做出正确决策的人。这正是`SSRS`发挥作用的地方。在我们的组织中，我们发现通过将`SSRS`与\
  \ BI 平台的许多其他组件集成，我们能够通过在员工需要时、无论他们身在何处都能提供必要信息，从而显著改善整体业务战略。\n\n在本章中，您将了解我们为我们的软件开发公司扩展并纳入`SSRS`报表的以下应用程序：\n\
  \n*分析服务*：能够对数据进行多维度“切片”常常能产生意想不到且有意义的结果。当`OLAP 服务`随`SQL Server 7.0`引入时，我们被要求构建一个数据仓库，将我们的`OLTP`数据转换为`OLAP`多维数据集。我们使用随`SQL\
  \ Server 2000`一起发行的`分析服务`版本来维护该项目，并增加了一些新功能，例如数据挖掘模型。自那时起，微软一直在`OLAP`技术上大力投入。其中一个增强功能是`VertiPaq`引擎，它与`SharePoint\
  \ 2010`、`PowerPivot`和`Excel 服务`一起使用。使用`PowerPivot`模型并将其部署到已配置好的`SharePoint 2010`服务器上，可以在内存中快速生成一个`OLAP`多维数据集，以实现对数亿条记录的快速切片和切块。\n\
  \n*SharePoint 服务*：作为 Microsoft Office 的一部分，`SharePoint 服务`为我们公司提供了一个按部门划分的内网门户。任何与单个部门或整个公司相关的信息都会被索引并可搜索。将`SSRS`报表与`SharePoint`集成，使我们的员工能够轻松找到他们完成工作所需的数据。我将向您展示如何将`SSRS`报表添加到`SharePoint`。由于`SSRS`构建在`Windows\
  \ SharePoint 服务`之上，您在本章中完成的工作也将适用于`Windows Server 2003`附带的`Windows SharePoint 服务`。对于`SharePoint\
  \ 2010`和`Reporting Services 2012`的安装，您将需要`Windows Server 2008 SP2`的 64 位版本。\n\n\
  大多数公司都有与我们描述的应用程序类似的应用程序。我们提供这些示例是为了让您了解，只需付出少量努力，`SSRS`就能轻松增强这类业务应用程序。我们的目的不一定是提供逐步指南，而是展示您的公司可能如何使用`SSRS`。如果您使用了本章提到的任何技术，您可以轻松地将本章的想法整合到您自己的环境中。\n\
  \n### 为 SQL 分析服务构建 SSRS 报表\n\n当我们开始使用`SQL Server 2000 分析服务`为我们的医疗保健应用程序构建`OLAP`解决方案时，我们渴望在第一天早上就直接开始分析数据。我们很快成为了开发`SQL`查询来查询我们`OLTP`数据库的常驻专家。由于这是我们将要构建数据仓库的源数据库，我们的团队认为这不过是添加几个查询并处理多维数据集这么简单。但事实证明并非如此简单。然而，回想起来，从一个已知数据源创建`OLAP`多维数据集的过程是值得的，因为我们能够将学到的技能应用到许多其他项目中。随着`分析服务`的每个新版本发布，都交付了越来越多的功能。起初，这可能让人应接不暇，仅仅因为增强功能的数量庞大，以及不仅需要熟悉技术，还需要掌握它所需的时间。然而，在添加新功能的同时，微软也添加了许多简化耗时任务的新工具。以`Analysis\
  \ Services 2005`为例，这些新工具包括一个图形化的`MDX`查询生成器和一个多维数据集向导，它自动化了许多创建`分析服务`解决方案复杂部分的步骤。`SQL\
  \ Server Analysis Services 2008`和`2008 R2`更进一步，增加了节省时间的功能、增强的数据分析以及与`SharePoint`集成的能力。`SQL\
  \ Server 2012 分析服务`带来了新的增补功能，比如前面提到的`VertiPaq`引擎和`表格模型`，后者基于新的`商业智能语义模型`（`BISM`）。\n\
  \n在本节中，我们将展示如何使用一个简单的`分析服务`多维数据集作为数据源来构建和部署`SSRS` BI 报表。该多维数据集基于一个`SQL Server`数据库，该数据库作为贯穿本书的医疗保健应用程序的数据仓库。多维数据集填充了与医疗机构患者入院相关的数据。虽然我们设计该报表是为了分析患者入院历史的许多方面，例如多次重复入院的患者、变化的诊断和患者转诊来源，但我们将展示如何创建一个专门提供关于患者被转诊到机构与其实际入院之间时间间隔的分析信息的报表。随着时间的推移，收集到的数据可以帮助决策者定位问题区域，并改进可能导致患者转诊时间效率低下的流程。首先，让我们看一下您将创建的报表所基于的数据库和多维数据集。\n\
  \n您将用作`分析服务`项目源的数据仓库数据库名为`HW_Analysis`。这是一个简单的数据库，仅包含八个表，并使用`SQL Server 集成服务`（`SSIS`）填充数据。使用`SSIS`准备数据仓库数据库的典型过程是：从源`OLTP`数据库导出数据，转换数据使其更易于`SSAS`分析，最后将这些转换后的数据加载到数据仓库或数据集市中。\n\
  \n我们已经构建了`HW_Analysis`数据库和名为`Patient Referral`的`SSAS`多维数据集，并将部署这两个关键组件所需的文件以及详细的安装说明包含在本书代码下载附带的`ReadMe.txt`文件中。源代码和相关文件可在\
  \ Apress 网站（[`http://www.apress.com`](http://www.apress.com)）的本书`Source Code/Download`区域获取。一旦您按照`ReadMe.txt`文件中的说明还原了`HW_Analysis`数据仓库数据库，就可以打开包含`Patient\
  \ Referral`多维数据集的`Pro_SSRS`项目。图 12-1 显示了`BIDS`中简单的`Patient Referral`多维数据集结构。该多维数据集有六个维度和两个度量值。\n\
  \n\n\n![Image](img/square.jpg) **注意** 如果您跳读至此，请注意本书中 `Business Intelligence Development\
  \ Studio`（`BIDS`）与 `SQL Server Data Tools`（`SSDT`）是作为同义词使用的。如果您使用的是从 `SSRS 2005`\
  \ 到 `SSRS 2008 R2` 的版本，启动 `DEVENV.exe` 的快捷方式标签为 `SQL Server Business Intelligence\
  \ Development Studio`。而在 2012 版中，其标签已改为 `SQL Server Data Tools`。\n\n![Image](img/9781430238102_Fig12-01.jpg)\n\
  \n**图 12-1.** Patient Referral 多维数据集结构\n\n在这六个维度中，有多个您应该感到熟悉，因为您已在本书其他章节中使用过它们。维度包含描述事实数据的文本属性。您可以将多维数据集中的维度视为预聚合的数据组或类别，这些数据可与一个或多个度量值相关联。度量值，例如\
  \ `入院时间`（`Time to Admission`）和 `转诊事实计数`（`Fact Referral Count`），是在维度各层级计算出的值。存储在多维数据集中的多维数据由维度和度量值组成，当使用\
  \ `多维表达式`（`MDX`）进行查询时，不仅可以像 `T-SQL` 查询的行列那样进行二维分析，还能通过下钻和切片在多个维度上进行分析。\n\n想象一下 1974\
  \ 年发明的魔方，我们很多人小时候都玩过。它有三层高、三层宽、三层深。基于这个画面，假设魔方的绿色面代表 `入院日期`（`Date of Admission`）维度，红色面代表\
  \ `分支机构`（`Branch`）维度，黄色面代表 `入院时间`（`Time to Admission`）度量值。比解开魔方容易得多，您可以创建一个 `MDX`\
  \ 查询来返回这三个点的交集，如 图 12-4 所示。\n\n将在 Patient Referral 多维数据集中使用的维度如下：\n\n> *   `县`（`County`）\n\
  > *   `转诊来源`（`Referral Source`）\n> *   `诊断`（`Diagnosis`）\n> *   `支付方`（`Payer`）\n\
  > *   `分支机构`（`Branch`）\n> *   `入院日期`（`Date of Admission`）\n\n由于本练习的起点是一个已预填充并处理的多维数据集，因此在创建\
  \ `SSRS` 报表之前，确保能从多维数据集获取所需数据非常重要。在 `BIDS` 中打开 `Pro_SSRS` 项目后，在解决方案资源管理器中导航到 `Patient\
  \ Referral SSAS` 项目，展开至“多维数据集”，然后双击 `Patient Referral.cube`。这将在设计模式下打开该多维数据集。多维数据集打开后，选择“浏览器”选项卡。图\
  \ 12-2 显示了打开的多维数据集，其中组合的度量值和维度已准备好拖放到查询窗格中。如果浏览器选项卡中未出现数据，并且有消息指示存在权限问题或数据库不存在，这通常表示多维数据集需要处理，或者\
  \ `SSAS Patient Referral` 数据库需要部署。要在 `BIDS` 中部署 `Patient Referral OLAP` 数据库（即多维数据集），请右键单击\
  \ `Patient Referral` 项目，然后选择“部署”。如果默认权限设置对于您的 `Analysis Services` 实例不足，您可能需要为 `HW\
  \ Analysis` 数据源打开数据源设计器，并将 `模拟信息` 更改为使用特定的用户名和密码。例如，我的设置是使用具有相应权限的 Windows 用户 \"\
  `SQLBIGEEK\\bmcdonald`\" 来部署多维数据集。成功部署 `Patient Referral OLAP` 数据库后，您可以返回“浏览器”选项卡，并单击可用链接以重新连接到数据库。\n\
  \n![Image](img/9781430238102_Fig12-02.jpg)\n\n**图 12-2.** 在 BIDS 中查看 Patient Referral\
  \ 多维数据集\n\n请执行以下步骤以查看平均 `入院时间`：\n\n> 1.  首先，在多维数据集设计窗格左侧的多维数据集对象窗口中，展开 `度量值`，然后展开\
  \ `转诊事实`（`Fact Referral`）。\n> 2.  接着，将 `入院时间`（`Time of Admission`）度量值拖到查询窗格的 `将级别或度量值拖至此处以添加到查询`\
  \ 部分。通常，在浏览多维数据集或创建报表时，您需要先拖入度量值，然后再拖入维度属性。您应该会看到一个平均时间为 14.095 天。此计算是在多维数据集最初加载和处理时完成的，代表所有维度组合的总平均入院时间。图\
  \ 12-3 显示了查询窗格中的 `入院时间` 度量值。\n>     \n>     ![Image](img/9781430238102_Fig12-03.jpg)\n\
  >     \n>     **图 12-3.** 查看所有维度的总体入院时间度量值平均值\n>     \n>     \n> 3.  现在，将两个维度对象拖放到数据窗格。在\
  \ `分支机构`（`Branch`）对象下，将 `分支机构名称`（`Branch Name`）字段拖放到我们的 `入院时间` 度量值的左侧。\n> 4.  接下来，在\
  \ `入院日期`（`Date of Admission`）下，将 `年 - 月份名称 - 入院日期`（`Year - MonthName - admitdate`）层次结构拖放到数据窗格中\
  \ `分支机构名称` 的右侧。该层次结构看起来像一个由六个正方形组成的金字塔。完成后，多维数据集浏览器应如 图 12-4 所示。您现在可以看到每个 `admitDate`\
  \ 的结果，以及其对应的 `分支机构名称`、`年` 和 `月份名称` 属性。\n\n在早期版本的多维数据集浏览器中，您可以像在 `矩阵` 型报表中看到的那样，下钻层次结构并拥有列分组。然而，截至当前的\
  \ `SQL Server 2012` 版本，多维数据集浏览器以二维方式返回数据，很像 `T-SQL` 查询的结果。`SQL Server` 用户社区中的一些活跃成员表示，对于微软的多维数据集浏览器来说，这是一个奇怪的倒退，我个人认为他们应该恢复此功能。但是，从报表角度来看，并未发生实质性变化。如果您看到的是上面\
  \ 图 12-3 描绘的结果，那么您确实正在从多维数据集获取数据！现在是时候转到 `SSRS` 并创建您将部署到 `SharePoint` 的报表了。\n\n\
  ![Image](img/9781430238102_Fig12-04.jpg)\n\n**图 12-4.** 包含年份和分支机构的多维数据集浏览器\n\n##\
  \ 将 Analysis Services 多维数据集与 SSRS 配合使用\n\n既然您已确认 `Patient Referral` 多维数据集运行正常，下一步就是创建\
  \ `SSRS` 报表。在 `Pro_SSRS` 项目中，您会找到两个已完成的报表：`平均转诊至入院` 报表和 `转诊至入院图表` 报表。这两个报表都基于 `Patient\
  \ Referral` 多维数据集。由于创建报表的过程相同，我们将不会逐步演示构建这些报表的过程。不过，我们将通过 `平均转诊至入院` 报表演示以下内容：\n\n\
  > *   设置数据源以使用 `Analysis Services`\n> *   使用随 `SQL Server Reporting Services 2005`\
  \ 新增的图形化 `MDX` 查询生成器\n\n\n\n## 设置分析服务数据源\n\n打开 `Pro_SSRS` 项目后，导航至 `Reports` 文件夹，并打开“平均转诊至入院时间”报表。接着，打开“报表数据”窗口。右键单击\
  \ `Patient_Referral` 数据集，从子菜单中选择“查询”选项。请注意，该查询识别出您正在使用带有 `MDX` 的 OLAP 数据源，并会打开图形化的\
  \ `MDX` 查询设计器。如您所见，这与本书中访问查询时一直使用的 `T-SQL` 查询窗口截然不同。如果您选择筛选表达式并筛选 2010、2011 和 2012\
  \ 年，您应该会看到类似于 图 12-5 所示的结果。此报表中包含两个数据集：`Patient_Referral` 和 `DateofAdmissionYear`。\n\
  \n![Image](img/9781430238102_Fig12-05.jpg)\n\n图 12-5. 查看“平均转诊至入院时间”报表的 `Patient_Referral`\
  \ 数据集\n\n这两个数据集的数据源类型均为 Microsoft SQL Server Analysis Services。如果您的 Analysis Services\
  \ 实例不在您所连接的本地计算机上，则需要将报表中默认的 `localhost` 数据源服务器更改为您的 SSAS 服务器名称。您可以通过双击名为 `PatRef_DS`\
  \ 的共享数据源并编辑数据源属性以匹配您的环境来轻松完成此操作，如 图 12-6 所示。\n\n在数据集针对您的 SSAS 环境正确配置后，接下来您将了解如何构建\
  \ `MDX` 查询。\n\n![Image](img/9781430238102_Fig12-06.jpg)\n\n图 12-6. `PatRef_DS` 数据源的连接属性\n\
  \n## 使用图形化 MDX 查询生成器\n\n在 `SQL Server 2005` 的 `SSRS` 中引入并在 `2008` 版中进一步增强的一个重要新特性，就是图形化的\
  \ `MDX` 查询生成器。`MDX` 是一门相当庞大且复杂的语言，容易出现语法错误。您必须对其有内在的理解，才能真正从 SSAS 多维数据集中提供精确的数据。拥有并使用图形化查询工具来构建基础\
  \ `MDX` 查询（其方式与开发人员使用图形化查询设计器构建 `T-SQL` 查询非常相似），可以减少常见的语法错误并加快查询开发速度。\n\n打开“平均转诊至入院时间”报表的报表数据查询窗口，注意到列出了几个维度和度量值元素：`BranchName`、`Year`、`MonthName`、`Time\
  \ to Admission` 和 `Fact Referral Count`。默认情况下，报表将在图形设计模式下打开，如 图 12-7 所示，而不是通用查询设计器。设计模式通过工具栏右侧的“设计模式”按钮进行切换。在图形设计模式中，维度元素可以直接从列出这些元素的“元数据”窗格拖放到窗口中。如果选择了“自动执行”按钮（默认情况下已选择），则每当拖放元素时，查询就会执行，并显示数据结果。\n\
  \n![Image](img/9781430238102_Fig12-07.jpg)\n\n图 12-7. 图形化查询生成器的输出\n\n如同您在“患者转诊”多维数据集浏览器中查询同一多维数据集时所看到的数据多维视图一样，`SSRS`\
  \ 以二维方式（行和列）看待数据。`SSRS` 报表可以从多维数据集访问数据；然而，有必要以二维方式排列数据，因为报表在求和及总计度量值（本例中为 `Time\
  \ to Admission` 和 `Fact Referral Count`）时将以此方式聚合数据。我们还对查询应用了筛选器，以便仅选择 2010 年至 2012\
  \ 年的数据。\n\n正如您可能在 图 12-7 的左下角所注意到的，您可以使用工具栏上的几个按钮来修改查询的属性，例如显示空单元格或添加计算成员。计算成员是\
  \ `MDX` 查询的一部分，通过将一个或多个元素组合成一个可作为新元素独立使用的值而创建。例如，您可以创建计算成员，不仅显示每个维度元素（如 `BranchName`\
  \ 和 `Year`）的平均入院时间，还显示使用 `MIN` 函数计算的最短入院时间，或使用 `MAX` 函数计算的最长入院时间。这些计算成员将成为整个查询的一部分，可作为新的度量值使用，并在每个维度级别返回数据值。换句话说，如果您需要在报表层创建一个在多维数据集本身中并未创建为计算的计算，您可以在报表的数据集层创建一个“计算成员”。对于那些不擅长编写\
  \ `MDX` 计算的人来说，这是一种创建报表级计算的简便方法。\n\n图形化查询构建并运行后，现在让我们看看其背后生成的 `MDX` 代码。您可以通过单击“设计模式”工具栏按钮来查看。图\
  \ 12-8 显示了为报表返回所选维度元素和度量值的 `MDX` 查询。\n\n![Image](img/9781430238102_Fig12-08.jpg)\n\
  \n图 12-8. 以图形方式生成的 `MDX` 查询\n\n![Image](img/square.jpg) **注意** 如果您在文本模式下修改了 `MDX`\
  \ 查询并尝试返回设计模式，您可能会丢失对查询所做的任何手动更改，如 图 12-9 所示。\n\n![Image](img/9781430238102_Fig12-09.jpg)\n\
  \n图 12-9. 更改 `MDX` 查询时显示的警告消息\n\n“平均入院时间”和“转诊至入院时间图表”这两个报表都将在 SharePoint 中以紧凑的 Web\
  \ Part 形式显示，我们将在下一节介绍如何操作。因此，我们有意将报表尺寸设置得较小，使用 8 磅 Arial 字体和狭窄的单元格。图 12-10 显示了“平均入院时间”报表的“设计”选项卡。\n\
  \n![Image](img/9781430238102_Fig12-10.jpg)\n\n图 12-10. “平均转诊至入院时间”报表的布局选项卡\n\n此时，我们可以将两个报表都发布到报表服务实例，并将报表交付给用户。这两个报表结合了一定程度的商业智能，非常适合在仪表板或业务门户中视图。为此，我们将在设计环境中最后查看第二个基于图表的报表，然后转向完全集成的\
  \ Microsoft SharePoint 部署，在 SharePoint 本身内部查看和管理报表。图 12-11 显示了在 BIDS 中预览的“转诊至入院时间图表”报表。\n\
  \n![Image](img/9781430238102_Fig12-11.jpg)\n\n图 12-11. 在设计环境中预览“转诊至入院时间图表”报表\n\n\
  \n\n"
- "# 在 Microsoft SharePoint 2010 中整合 SSRS\n\nSSRS 和 SharePoint 技术都经历了相似的进展与成熟。两者在全球范围内都获得了企业日益增长的接纳与支持。因此，这两种技术最终结合成为\
  \ Microsoft 过去几年构建的整体**商业智能**平台的组成部分，是一个自然的演进过程。早期 SharePoint 对 SSRS 的支持包括可为 SharePoint\
  \ 安装的 SSRS Web 部件。这些 Web 部件提供了一种在 SharePoint 内查看已发布 SSRS 报告的手段。然而，这种结合并不像许多管理员和仪表盘设计师所期望的那样紧密。报告的管理仍然主要由\
  \ DBA 或报告内容管理员负责。`SQL Server 2005 Service Pack 2` 包含了对完全集成的 SSRS 和 SharePoint 基础设施的支持，使得报告可以在\
  \ SharePoint 内发布、管理和查看。`SSRS 2008` 和 `2008 R2` 延续了这种融合，许多组织已经采用了这种方法论，而不是采用不直接与\
  \ SharePoint 集成的纯原生 SSRS。\n\n这引出了 `SharePoint 2010` 和 `SQL Server 2012 Reporting\
  \ Services`。尽管在将 Reporting Services 与 SharePoint 集成方面与之前的版本相似，但其安装和配置过程却大不相同。在 Reporting\
  \ Services 的最新版本中，如果您希望以 `SharePoint 集成模式`运行，则需要先安装 SharePoint，然后以 SharePoint 集成模式安装\
  \ Reporting Services。这个过程实质上是在 `SharePoint 2010` 之上安装 Reporting Services。此过程与之前的版本不同，因为之前\
  \ SSRS 和 SharePoint 是独立的实体，可以使用配置工具进行集成。\n\n在本节中，您将逐步完成 SharePoint 和 SSRS 的独立安装，并将上一节的两个报告\
  \ `Average Time to Admission` 和 `Referral to Admission Chart` 部署到 SharePoint 站点并查看：\n\
  \n1.  首先，您将在同一台服务器上安装带有 `Service Pack 1` 的 `Microsoft SharePoint 2010` 和 `SSRS 2012`。\n\
  2.  接下来，您将报告部署到具有 `SharePoint 2010` 的 SSRS 集成服务器。\n3.  最后，您将使用 `SSRS Web 部件` 创建一个简单的仪表盘。\n\
  \n## 在独立服务器上安装 SharePoint 2010 和 SQL Server 2012\n\n`SQL Server 2012` 的安装程序多年来已得到极大改进。具体来说，对于\
  \ SSRS，您保留了安装核心程序集的能力，但可以在之后配置 SSRS 实例。然而，在 `SSRS 2012` 中，如果您计划同时部署 SSRS 和 SharePoint，则可以直接以\
  \ SharePoint 集成模式安装 SSRS。对于我们的安装，我们选择在同一台服务器（称为独立安装）上安装 `SSRS 2012` 和 `SharePoint\
  \ 2010`。对于任何想熟悉这两种技术如何协同工作的人来说，这是推荐的设置。其他部署场景，例如多服务器安装，在更大的环境中也是可能且预期的，但我们最初选择独立部署纯粹是为了测试和培训。我们建议任何不熟悉集成\
  \ SSRS 和 SharePoint 安装的人都走这条路径。\n\n![Image](img/square.jpg) **注意** 与大多数基于服务器的软件一样，`SharePoint\
  \ 2010` 和 `SQL Server 2012` 有一些必须在成功安装前满足的先决条件。这些要求可能会随时间变化，因此在开始安装软件之前，最好始终验证先决条件。例如，`SharePoint\
  \ 2010` 需要安装在基于服务器的操作系统上，如 `Windows Server 2008`。它还需要安装 `Service Pack 1`，至少 `4GB`\
  \ 内存和 `80 GB` 磁盘空间。服务器必须配置为域控制器。这些只是部分要求，您可以在 [`http://technet.microsoft.com/en-us/library/cc262485.aspx`](http://technet.microsoft.com/en-us/library/cc262485.aspx)\
  \ 查看更多 SharePoint 要求，在 [`http://msdn.microsoft.com/en-us/library/gg492276(v=sql.110).aspx`](http://msdn.microsoft.com/en-us/library/gg492276(v=sql.110).aspx)\
  \ 查看 SQL Server Reporting Services 要求。\n\n假设所有先决条件、软件和硬件要求都已满足，那么完成 SSRS 和 SharePoint\
  \ 的独立安装有六个主要步骤：\n\n1.  安装带有 `Service Pack 1` 的 `SharePoint 2010`。\n2.  以 SharePoint\
  \ 模式安装 `SQL Server 2012` 数据库引擎和 Reporting Services。\n3.  配置 `SharePoint 2010`。\n\
  4.  安装并启动 `Reporting Services SharePoint 服务`。\n5.  在 `SharePoint 管理中心` 创建一个 `Reporting\
  \ Services 服务应用程序`。\n6.  配置与 SharePoint 的 `Reporting Services 集成`。\n\n## 安装 SharePoint\
  \ 2010\n\n我们将首先引导您完成带有 `Service Pack 1` 的 `SharePoint 2010` 的安装。安装 `SharePoint 2010`\
  \ 是一个简单的过程，除了最后一步，安装向导会询问您是否要 `运行配置向导` (图 12-12)。此选项按钮默认是选中的，但对于 SharePoint 集成模式下的\
  \ Reporting Services，您稍后会进行配置。您将在安装 `SQL Server 2012` 数据库引擎实例之后再配置 SharePoint。取消选中该复选框并点击\
  \ `关闭` 以完成 `SharePoint 2010` 安装。\n\n![Image](img/9781430238102_Fig12-12.jpg)\n\n\
  ***图 12-12.** 安装 `SharePoint 2010`*\n\n### 在 SharePoint 模式下安装 SQL Server 2012 Reporting\
  \ Services\n\n现在 `SharePoint 2010` 已安装，是时候为 SharePoint 安装数据库引擎和 Reporting Services\
  \ 了。带有 SSRS 的 `SQL Server 2012` 安装是一个您可能已经熟悉的标准过程。详细介绍安装的每一步超出了本书的范围；但是，典型安装与包含集成\
  \ SharePoint 支持的安装之间的唯一区别可以在 `功能选择` 和 `Reporting Services 配置` 屏幕上看到。请继续选择 图 12-13\
  \ 中所示的选项。\n\n由于这是在本地虚拟机上进行，而不是在传统的企业网络上，我选择在此虚拟机上也安装 `Analysis Services`。这样，我可以复制\
  \ `Pro_SSRS` 项目，并将 `Patient Referral Analysis Services` 数据库（多维数据集）部署到同一台虚拟机上，用于本章的剩余示例。\n\
  \n![Image](img/square.jpg) **注意** 如果您也在专用虚拟机上执行 `SharePoint 2010` 安装，您还需要将您的 `Pro_SSRS`\
  \ 项目复制到虚拟机，并如本章前面讨论的那样部署多维数据集。\n\n![Image](img/9781430238102_Fig12-13.jpg)\n\n***图\
  \ 12-13.** 为 SharePoint 安装 SSRS*\n\n如 图 12-14 所示，您唯一的选项是 `Reporting Services SharePoint\
  \ 集成模式 – 仅安装`。在 `仅安装` 单选按钮下方的注释中，您可以看到一条消息，说明您需要使用 `管理中心` 配置 SharePoint 来完成安装。它还说明您需要启动\
  \ `Reporting Services` 服务并创建一个 `Reporting Services` 服务应用程序（前面列表中的安装步骤 4 和 5）。现在，您将安装\
  \ `Reporting Services SharePoint 服务`。\n\n![Image](img/9781430238102_Fig12-14.jpg)\n\
  \n***图 12-14.** 在 SharePoint 集成模式下安装 SSRS*\n\n\n\n## 配置 SharePoint 2010\n\nSSRS\
  \ 安装完成后，您需要执行安装过程中的第三个主要步骤。现在，让我们通过“所有程序”菜单下“Microsoft SharePoint 2010 Products”文件夹中的\
