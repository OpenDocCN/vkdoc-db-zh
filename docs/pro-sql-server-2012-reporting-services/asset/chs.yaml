  \ `Reports` 项目并双击 `Pro_SSRS.rds` 数据源来完成此操作。在“共享数据源”对话框中，选择“凭据”选项卡，然后选择“使用特定的用户名和密码”。输入运行此报告时要使用的适当用户名和密码。如果您使用\
  \ Windows 集成身份验证（例如在您的 Windows 帐户下运行报告），则需要使用报告管理器或 SSMS 来编辑数据源并选择“连接到数据源时用作 Windows\
  \ 凭据”选项。对于 Windows 帐户，请使用 `domain\\user` 格式指定登录名。\n\n现在运行程序，并选择一个您先前配置的调度。对于参数，输入\
  \ `ServiceYear 2009` 并选择“确定”以设置此报告的调度。\n\n![Image](img/square.jpg) **注意** 请记住使用\
