  管理控制台（MMC）的时代已经屈指可数，并将被新的集成开发环境（IDE）所取代，尽管正如任何开发人员都会告诉你的那样，IDE 本身也早已不是什么新鲜事物了。然而，系统管理员、DBA，甚至报表设计人员都不得不熟悉这种执行日常任务的新方式。正如你可能已经意识到的，你可以在
  Visual Studio 2005 及更高版本中，或在 BIDS/SSDT 中为 SSRS 创建报表。为了提醒你这些缩写，SSRS 2005 到 2008 R2
  版本中包含的设计器被标记为 Business Intelligence Development Studio（BIDS）。然而，在 2012 版本中，Microsoft
  决定将设计器重新命名为 SQL Server Data Tools（SSDT），因为其中包含了诸如与 SQL Azure 环境进一步开发集成等功能。能够使用 SSDT/BIDS
  对 Visual Studio 开发人员来说是一个优势，因为他们现在可以使用同一个 IDE 来创建报表和进行应用程序开发！对于我们其他人来说，在 Visual
  Studio 2010 中创建报表存在一个学习曲线。


  SQL Server 2005 引入了两个新的管理和开发环境：BIDS（Visual Studio 2005 的一个子集）和 SSMS。在 SQL Server
  2008、2008 R2 和 2012 中，这些应用程序得到了增强，以改进设计和管理功能在通用工具集中的集成。


  现在你已经开发了查询和存储过程，可以将注意力转向安装 SQL Server 时可用的报表设计工具。在接下来的三章中，我们将让你熟悉报表设计工具，然后在第 6 章中向你展示如何创建一个完整的
  SSRS 报表。我们将涵盖的主题包括：


