  \                `}`\n        `}`\n\n加载时，你会看到一个类似图 9-9 的表单，它显示了一系列组合框，每个组合框都包含报表参数的有效值。在我们添加从主表单打开此参数表单的代码之前，你无法在完整视图中看到这个界面。我们将在本章稍后执行此步骤。\n\
  \n![Image](img/9781430238102_Fig09-09.jpg)\n\n**图 9-9. 参数对话框**\n\n#### 渲染最终报表\n\n\
