- "# 第 1 章\n\n## 介绍 Reporting Services 架构\n\n微软在 2003 年宣布将作为 SQL Server 2000 的加载项发布\
  \ SQL Server Reporting Services (SSRS) 时，激起了一阵兴奋的狂热。该产品原计划与 SQL Server 2005 一起发布，因此这次提前发布对许多人来说是一个受欢迎的事件。我们的软件开发公司决定尽早采纳\
  \ SSRS，并有幸在 beta 阶段与微软合作。2004 年 1 月，也就是微软将 SSRS 发布到制造 (RTM) 的那个月，我们立即部署了它。我们打算将我们所有的现有报表（这些报表是在过去十年中使用多达五种报表应用程序和平台开发的）迁移到\
  \ SSRS。我们可以用一个词来概括这个看似仓促的决定：标准化。\n\n正如微软希望用报表定义语言 (RDL) —— 一种规定所有 SSRS 报表通用结构的可扩展标记语言\
  \ (XML) 模式 —— 创建行业标准一样，我们也希望为客户提供标准化的报表解决方案。即使在该产品的第一个版本中，SSRS 也提供了我们所需的几乎全部功能。得益于通过\
  \ SSRS 的 Web 服务提供的可扩展性，我们可以编程方式添加其他尚未直接支持的功能。此外，微软承诺在未来数年持续增强 SSRS。2005 版本中发布的一些功能包括客户端打印、交互式排序功能以及定义多值参数的能力。在自助式商业智能\
  \ (BI) 领域，随着微软首个临时报表生成器 ClickOnce 应用程序的推出，也取得了进展。\n\n微软的下一个版本是 SSRS 2008。新版本带来了许多期待已久的改进，包括对其架构的修改、完全重新设计的报表设计器，而\
  \ 2008 R2 为我们带来了对内置报表管理器应用程序的重要设计更新。随着 2008 版本中实施的大量更新，SSRS 已作为关键的 SQL Server 组件，在微软的商业智能产品套件中与\
  \ SQL Server Integration Services (SSIS) 和 SQL Server Analysis Services (SSAS) 并驾齐驱。现在没有人会认为\
  \ Reporting Services 只是一个附加组件了。\n\nSSRS 2008 和 SSRS 2008 R2 中的新功能将该技术进一步推向前进，使其成为程序员和设计师，尤其是那些已经熟练使用\
  \ Visual Studio (VS) 和 Visual Basic .NET (VB.NET) 的人的首选报表开发环境。与其前代产品 SSRS 2005、SSRS\
  \ 2008 和 SSRS 2008 R2 一样，SSRS 2012 中期待已久的功能大多是由用户社区的直接反馈驱动的。在本书中，当我们展示如何基于微软的 BI\
  \ 计划设计专业的报表、应用程序和解决方案时，我们将演示 2008、2008 R2 和 2012 版本中发布的每一项新功能。我们将以 SSRS 整体为重点，构建从\
  \ 2000 年到 2012 年各版本的功能；但是，我们将指出哪些功能是 SSRS 2008 R2 和 SSRS 2012 新增的。\n\n\n\n### 理解\
  \ SSRS 的优势\n\n我们公司决定立即迁移到 SSRS，是基于其为公司和客户带来的以下几项预期优势：\n\n> *   **标准平台**：除了提供以 `RDL`\
  \ 实现的标准外，我们的开发团队一直将 `VS .NET` 作为主要的开发环境。由于 `SSRS` 报表目前在此平台内开发，我们无需购买额外的开发软件。我们的客户只需购买低成本的设计工具——例如\
  \ `VB.NET`——即可获得开发自定义报表的优势。在 `SQL Server 2005` 中，微软纳入了商业智能开发工具 (BIDS) 作为一款免费的替代报表设计器。自此之后，这个免费的开发环境一直随\
  \ `SQL Server` 提供，但微软最近已将其更名为 `SQL Server Data Tools` (SSDT)。在本书中，我们将交替使用 `BIDS`\
  \ 和 `SSDT`。`BIDS` 环境运行在 `Visual Studio` (devenv.exe) 的外壳中，且在撰写本文时，它基于 `Visual Studio`——`SQL\
  \ Server 2008` 和 `2008 R2` 对应 `VS 2008`，而最新版 `SQL Server 2012` 则对应 `VS 2010`。任何学会使用\
  \ `BIDS` 设计报表的人，当他们转向完整版的 `Visual Studio` 时，都将受益于其界面的一致性，且无需额外培训。\n> \n> *   **成本优势**：`SSRS`\
  \ 是 `SQL Server 2012` 的组成部分，并提供多种版本，从 `2008` 的 `Express Advanced` 到 `Enterprise`，甚至\
  \ `2008 R2` 还有 `Datacenter` 版本。然而，由于 `SQL Server 2012` 取消了 `Datacenter` 版本，功能最丰富的版本将再次是\
  \ `Enterprise`。当你购买 `SQL Server` 时，也就同时获得了 `SSRS`。`SQL Server 2012` 的完整功能列表请参见 `http://tinyurl.com/SQL2012Features`。\n\
  > \n> *   **Web 支持**：由于 `SSRS` 是一个基于 `Web` 的报表解决方案；一份部署好的报表可被多种客户端访问，从浏览器到自定义的 `Windows\
  \ 窗体`。此外，由于报表主要通过 `超文本传输协议 (HTTP)` 或 `超文本传输安全协议 (HTTPS)` 访问，你可以从任何能访问 `SSRS` `Web`\
  \ 服务器的位置查看报表。除非你有一个需要随应用程序部署本地报表的胖客户端应用，否则你可以建立一个中央报表存储库，供整个组织使用。\n> \n> *   **可定制性**：`SSRS`\
  \ 提供了一个基于 `.NET` 的 `Web` 服务作为前端，可通过编程方式访问，从而将报表的交付方式扩展到浏览器之外。作为 `.NET` 程序员，我们知道我们会想要构建自定义应用程序来呈现报表，以便控制报表查看器的外观和感觉。我们在\
  \ 第 7 章 中展示了这样一个应用程序，该章涵盖了报表呈现。\n> \n> *   **订阅功能**：`SSRS` 的订阅功能为我们公司和客户带来了巨大优势，因为现在可以通过\
  \ `电子邮件` 或文件共享进行报表投递，以及进行非高峰时段处理。我们在 第 8 章 中展示了如何设置两种不同类型的订阅：标准订阅和数据驱动订阅。\n\n正如你将看到的，`SSRS`\
  \ 是一个完整的报表解决方案，涵盖了从报表设计到数据库管理的多个专业领域。在许多组织，尤其是中小型组织中，信息技术 (IT) 专业人员常常需要身兼多职。他们上午编写查询并设计报表，下午执行数据库备份或还原，在深夜更新所有系统后才回家。有时甚至直到凌晨！但我们确信，我们并非唯一一群如此以工作为荣、并始终努力超越业务需求的人。\n\
  \n在我们各自的职业生涯中，我们在那些我们倾注了时间和心血的公司里，都曾扮演过多种角色。我们深入参与了从内部部署到面向客户的外部 Web 应用程序部署的每一个部署阶段，从简单的实现到扩展\
  \ `Reporting Services` 功能的高级实现。通过开发高效的存储过程、经过彻底测试的安全机制，以及构建和维护设计精良的报表，我们从多个角度见证了\
  \ `SSRS` 的日常运作。\n\n我们也负责公司构建解决方案以分析和转换通过我们自有及第三方应用程序收集的数据的整体战略。为此，多年来我们工作的一个重要部分是将\
  \ `SSRS` 整合到包含以下内容的整体 `BI` 战略中：\n\n> *   异构数据源，如 `Analysis Services 多维数据集` 和 `SQL\
  \ Server` 关系数据库\n> *   应用程序和工具，如 `Microsoft Excel` 和 `Business Scorecards`\n> *\
  \   文档管理系统，如 `Microsoft SharePoint Portal Server`\n\n我们将在专门介绍 `BI` 的 第 12 章 深入探讨此类集成项目的细节。我们还将探索\
  \ `SSRS 2008 R2` 和 `2012` 的一项关键进步，即与 `SharePoint` 门户服务器更紧密的集成，达到可以在 `SharePoint`\
  \ 内直接部署、管理和查看 `SSRS` 内容的程度。我们还将向你展示如何创建报表的部分内容并将其作为 Web 部件提供。\n\n`SSRS` 代表了另一个世界，一个使用标准管理工具的管理员通常看不到的世界。这个世界是软件开发人员的领域，他们可以通过编程方式扩展和控制\
  \ `SSRS`，构建自定义的报表查看器和部署应用程序。在本书中，当你一步步为医疗保健专业人员构建报表解决方案时，你将看到管理员如何使用内置工具完成任务，以及开发人员如何创建应用程序来提供增强功能。\n\
  \n### SQL Server 2008 R2 和 2012 Reporting Services 增强功能\n\n自 `2005` 年首次发布以来，`Reporting\
  \ Services` 增加了许多重大功能，但让我们看看 `SQL Server` 中对 `SSRS` 技术所做的一些最重要的增强。\n\n#### 报表生成器/数据建模器\n\
  \n`报表生成器` 应用程序是 `SSRS 2005` 中引入的一个功能，是一个本地的即席报表设计应用程序，其设计目标用户更多是报表使用者而非报表开发人员。熟悉源数据的管理员创建业务逻辑和底层数据结构作为数据模型。借助\
  \ `报表生成器` 应用程序，用户可以基于可用的模型创建和发布报表。微软为 `SSRS 2008` 中发布的 `报表生成器 2.0` 设计了类似 `Microsoft\
  \ Word` 和 `Microsoft Excel` 的 `Microsoft Ribbon` 技术，这是对 `报表生成器 1.0` 的一次显著改进。每一次增强都提供了更丰富的开发环境和额外的内容源，例如\
  \ `Oracle` 和 `Analysis Services 多维数据集`。似乎这还不够，`报表生成器 3.0` 随 `SSRS 2008 R2` 首次亮相，带来了新的数据可视化报表项和缓存结果集。第\
  \ 13 章 将告诉你如何构建和部署数据模型，以及如何使用 `报表生成器 1.0`、`报表生成器 2.0` 和 `报表生成器 3.0` 应用程序创建报表。\n\n\
  \n\n## SSRS 2012 与 Microsoft Office SharePoint 的集成\n\n尽管在之前版本的 SSRS 中，通过使用 SharePoint\
  \ 控件已经可以实现 SharePoint 集成，但 SSRS 2012 将集成又推进了数步。通过在 **SharePoint 集成模式**下使用 SSRS 2012，用户可以在\
  \ SharePoint 环境中直接部署、管理和交付报表及报表对象，例如 Web 部件、数据源和模型，甚至是整个仪表板或门户。此外，已部署的报表继承了 SharePoint\
  \ 的原生功能，例如工作流能力、报表签入和签出功能以及报表更改通知。我们将在第 12 章演示这种与 SharePoint 的更紧密集成。\n\n## Tablix\
  \ 报表属性\n\n顾名思义，Tablix 属性首次出现于 SSRS 2008，它结合了两种现有的报表控件：表格和矩阵。这种结合为开发人员在创建报表时提供了更灵活的工具。多列和多行的可用性，将表格控件的静态特性与矩阵的动态特性相融合。报表现在可以在每个级别容纳多个并行的行和列成员，彼此独立但使用相同的聚合计算。在本书之前的版本中，我们提供了通过将一个表格嵌入另一个表格中来组合表格和矩阵的解决方法。在第\
  \ 4 章，我们将探索新的 Tablix 控件属性对于列表、表格和矩阵控件的真正威力。\n\n## 增强的图表和报表项可视化\n\n从一开始，SSRS 就在报表中原生提供了图表和可视化功能。这些图表虽然功能多样，但在范围上有些受限。之前版本的\
  \ SSRS 图表功能，即使不是全部，也很容易在 Microsoft Excel 中复制。事实上，两者的图表几乎完全相同。SSRS 2008 对图表和图形化数据可视化进行了多项增强，这对于\
  \ SSRS 作为其关键组成部分的可靠 BI 报表解决方案至关重要。现在提供了新的图表元素，如范围图、极坐标图、雷达图、漏斗图和金字塔图，以及通过收购 Dundas\
  \ 报表控件为 SSRS 提供的众多新“仪表”。\n\nSSRS 2008 R2 包含了几个备受期待的报表项可视化功能，以支持创建更复杂的仪表板外观和感觉。其中之一是地图控件，它可以显示来自地理空间数据结果集或环境系统研究所公司（ESRI）形状文件的数据。其他出色的新增功能包括数据条、折线图和指示器。我们将在第\
  \ 5 章将这些新的可视化效果融入报表中时进行探讨。\n\n## 增强的性能和内存管理\n\nMicrosoft 在 SSRS 2008 中对报表引擎进行了重新设计，以减少服务器级别报表的内存占用，加快报表向最终用户应用程序的交付速度。这一增强还解决了当长时间运行的大型报表和较小的、不受内存限制的报表同时处理时出现的资源争用问题。\n\
  \n## 可嵌入的 SSRS 控件\n\n能够在自定义应用程序中嵌入控件，使得开发人员更容易将 SSRS 集成到他们的项目中。自 SQL Server 2005\
  \ 发布以来，Visual Studio 环境就包含了可分发控件，可用于 Windows 窗体开发和 ASP.NET Web 窗体开发。这些控件为开发人员提供了额外的好处，例如能够在断开与\
  \ SSRS 连接的情况下呈现报表。我们将在第 9 章介绍更新的 SSRS 控件。\n\n## HTML 文本格式\n\n除了从双服务架构转变为单服务架构，以及能够导出为\
  \ Microsoft Word 格式外，文本格式可能是 SSRS 2008 最重大的进步之一。在之前的 SSRS 版本中，无法对文本内容进行内联格式设置，例如用于套用信函。例如，如果你希望一个文本框中的部分内容使用常规字体，但其他部分文本使用粗体或斜体，这是无法实现的。在\
  \ SSRS 2008、SSRS 2008 R2 和 SSRS 2012 中，文本框报表项支持普通和富文本模式，并允许以与文字处理器相同的方式进行格式设置。你可以创建一个占位符来允许使用有限的\
  \ HTML 和样式标签子集。文本格式可以结合字面文本和数据源文本，用于邮件合并和模板报表。我们将在第 6 章通过创建一个自定义的套用信函式报表来演示此功能的完整用法。\n\
  \n## Microsoft Word 呈现\n\n自 SSRS 的第一个版本起，你就可以将任何报表导出到 Microsoft Excel。虽然这是一项重要的功能，但无法导出到其他\
  \ Microsoft Office 格式（如 Word）是一个限制。开发人员通常希望使用现代文字处理器中的富文本来创建报表。通过结合 SSRS 从多个数据源设计自定义报表的能力，以及\
  \ Word 提供丰富格式设置的能力，SSRS 2008 克服了其前代产品的重大限制。另一个限制是报表用户无法导出为 2007 格式。Excel 2003 有\
  \ 65,536 行和 256 列的限制，但 SSRS 2012 的一项新的呈现增强功能使我们能够导出到 Word 和 Excel 2007-2010 格式，因此现在我们可以在一个\
  \ Excel 工作表中存储 1,048,576 条记录和 16,384 列。\n\n## 报表部件\n\n如果你和我们一样，可能希望创建可重用的小对象，这些对象可以被纳入多个报表中。直到\
  \ SSRS 2008 R2，你只能通过创建可作为子报表嵌入其他报表中的报表来实现这一点。现在，你可以发布报表的各个部分，例如一个包含销售额前十员工的 `Tablix`，或一个显示当年客户投诉趋势的\
  \ `Sparkline`。像这样的任何报表项都可以部署到 `ReportServer` 或 SharePoint 服务器，最终用户可以使用 `Report Builder`\
  \ 或 SharePoint 等即席工具来重用它们。此外，报表开发人员可以使用这些报表部件来减少需要以相同方式呈现数据的报表的重复工作。一个非常有用的功能是，如果报表部件被具有适当权限的用户修改，该报表部件的使用者会收到更新通知，并且他们可以选择刷新其报表或保持原样。\n\
  \n## 查找函数\n\n在 2008 R2 版本之前，经常需要在同一报表的不同数据区域中查找某个值。由于两个表中的数据可以通过一个公共字段链接，一种变通方法是在源查询中通过连接表来收集数据。通常，这在后端可能性能更好，但有时你需要在另一个数据区域中查找值，因此\
  \ Microsoft 为 Reporting Services 添加了三个查找函数：`Lookup()`、`LookupSet()` 和 `MultiLookup()`。\n\
  \n## 共享数据集\n\n在继续介绍 SSRS 2008 R2 和 2012 带来的升级之前，让我们简要讨论一下共享数据集。这个在 2008 R2 中添加的功能允许你创建一个可供其他报表使用的数据集。想象一下，你创建了一个包含\
  \ 50 个报表的项目，其中大约 10 个报表带有一个针对全球所有国家/地区的参数。考虑到可管理性，你设计这个数据集是通过调用一个存储过程来加载的。在之前版本的\
  \ SSRS 中，你需要为每个需要此参数的报表创建一个数据集，因此任何影响它们的更改都必须在所有数据集中逐一进行修改。从 2008 R2 开始，我们可以创建一个共享数据集并在多个报表中使用它。对该单个数据集的更改会更新所有需要该更改的报表。\n\
  \n\n### SSRS 与商业智能\n\nSSRS 仅仅是微软 BI 平台的一个组件。我们现在将介绍自 SQL Server 2008 以来推出的其他新功能和增强功能，这些将成为你整体报表解决方案中不可或缺的部分。\n\
  \n### 商业智能开发工具与 SQL Server 数据工具\n\n商业智能开发工具（BIDS）是 Visual Studio 2008 的一个简化版本，随\
  \ SQL Server 2008 基础安装一起提供。在 SQL Server 2012 中，报表设计器采用了新名称 SQL Server 数据工具（SSDT），并且我们现在使用的是\
  \ Visual Studio 2010 的外壳，而非 VS 2008。通过 SSDT 和 BIDS，开发人员可以为 SQL Server 2012 支持的每个组件（包括\
  \ SSIS、SSAS 以及当然的 SSRS）创建完整的项目。本书将全程使用 SSDT（第 13 章除外，在那一章我们将使用报表生成器来向你展示如何设计和部署\
  \ SSRS 报表及 Analysis Services 项目）。请注意，SSDT 和 BIDS 都使用 `devenv` 可执行文件，因此可以互换使用。\n\n\
  ### SQL Server Management Studio (SSMS)\n\n随着 SQL Server 2008 的发布，微软通过 SQL Server\
  \ Management Studio（SSMS）继续构建其管理平台。微软在将许多在旧版 SQL Server 中需要单独执行的工具整合到单一环境方面迈出了一大步。SSMS\
  \ 取代了企业管理器和查询分析器，为创建和管理 SQL Server 对象及查询提供了一套更精细的工具。除了管理 SQL Server 和 Analysis Services\
  \ 服务器外，管理员还可以使用 SSMS 来管理其 SSRS 报表服务器的实例。我们在 SQL Server 社区中听说 Management Studio 将在\
  \ Visual Studio 外壳中运行，但无论如何，目前它仍然通过 `ssms.exe` 运行。不过，SSMS 用户现在能够取消窗口停靠，并将它们放在多个显示器上，就像\
  \ Visual Studio 开发人员多年来所做的那样。\n\n在本书中，我们将向你展示如何同时使用 SSMS 和报表管理器来执行各种任务。例如，我们将展示如何使用\
  \ SSMS 测试查询性能，以及如何使用基于浏览器的报表管理器查看已发布报表、设置安全权限和创建订阅。尽管这两个应用程序在管理 SSRS 方面有功能重叠，但报表管理器通常比\
  \ SSMS 更可取，因为它可以执行更多的管理任务，并且不需要本地安装。你可以从网络上的任何位置通过浏览器访问报表管理器，但要使用 SSMS，你需要能访问已安装的\
  \ SQL Server 2012 客户端工具。\n\n### SSRS 架构\n\n你可能听过“细节决定成败”这句话。在本书中，你将深入这些细节，从设计到安全探索\
  \ SSRS 的方方面面，甚至会触及 SSRS 构建的数据包。现在，让我们退后一步，从一个更广阔的视角——如果你愿意，可以说是万英尺高空视图——来看看协同工作以使\
  \ SSRS 成为一个真正的多层应用程序的三个主要组件：客户端、报表服务器和 SQL Server 报表数据库。图 1-1 展示了这三个组成部分的概念性分解。\n\
  \n数据源与 SSRS 数据库 `ReportServer` 和 `ReportServerTempDB` 是独立的实体。数据源是填充报表的数据的来源，而报表服务器数据库存储有关报表的元数据和执行信息。假设数据源是一个\
  \ SQL Server 数据库，那么数据源和报表服务器数据库可以物理上位于同一个 SQL Server 上。数据源可以是任何支持的数据提供程序，例如 SQL\
  \ Server、Oracle、轻量目录访问协议（LDAP）、Microsoft SharePoint 列表、SQL Azure 和 Analysis Services。可以将单个服务器配置为同时充当\
  \ SSRS 报表服务器 Web 服务、报表服务器数据库以及数据源服务器。但是，除非你的用户群很小，否则不建议这样做。我们将在第 10 章中向你展示如何在安装后监控\
  \ SSRS 配置的性能并构建一个小型 Web 场。\n\n![Image](img/9781430238102_Fig01-01.jpg)\n\n**图 1-1.**\
  \ SSRS 组件\n\n#### SSRS 数据库\n\nSSRS 是在 SQL Server 安装过程中作为一个选项添加的。SSRS 原生安装会创建两个数据库，用于存储报表元数据和管理性能：\n\
  \n> `ReportServer`：这是主数据库，存储了所有关于报表的信息，这些信息最初由用于创建报表并将其发布到 `ReportServer` 数据库的 RDL\
  \ 文件提供。除了报表属性（如数据源）和报表参数外，`ReportServer` 还存储文件夹层次结构和报表执行日志信息。\n>\n> `ReportServerTempDB`：此数据库保存报表的缓存副本，可用于为许多并发用户提高性能。通过使用非易失性存储机制缓存报表，你可以确保即使在报表服务器重启后，它们对用户仍然可用。\n\
  \n数据库管理员可以使用标准工具来备份和还原这两个数据库。在 SSRS 初始安装后，可能会添加一个额外的数据库：`RSExecutionLog` 数据库。它存储有关报表执行的更详细信息，例如运行报表的用户、执行时间和性能统计信息。我们将在第\
  \ 10 章详细介绍创建 Pro_SS`RSExecutionLog` 数据库并讨论报表执行日志记录。\n\n![Image](img/square.jpg)\
  \ **注意** 当配置 Reporting Services 在 2012 版中以 SharePoint 集成模式运行时，会为警报功能安装一个额外的数据库。另请注意，默认的数据库名称略有不同，因为它们会在\
  \ `ReportingService_` 后附加一个唯一的标识符，该标识符在 SharePoint 站点上创建 Reporting Services 实例时分配。例如，在\
  \ SharePoint 集成模式下，`ReportServerTempDB` 会变成类似 `ReportingService_14214aae2b5d4f0d888289011932bmcdTempDB`\
  \ 的名称。我们将在第 12 章中探讨 SharePoint 集成模式。\n\n#### SSRS 报表服务器\n\nSSRS 报表服务器在 SSRS 模型中扮演着最重要的角色。它在中间层工作，负责处理来自客户端的所有请求，无论是渲染报表还是执行管理请求（例如创建订阅）。你可以按功能将报表服务器分解为几个子组件：\n\
  \n*   编程接口\n*   认证层（SSRS 2008 中新增）\n*   报表处理\n*   数据处理\n*   报表渲染\n*   报表计划与传递\n\n\
  #### SSRS Web 服务接口\n\n编程接口以 .NET Web 服务应用程序编程接口（API）和统一资源定位符（URL）访问方法的形式公开，负责处理来自客户端的所有传入报表和管理请求。根据请求类型的不同，编程接口要么直接通过访问\
  \ `ReportServer` 数据库来处理它，要么将其传递给另一个组件进行进一步处理。如果请求是针对按需报表或快照，Web 服务会将其传递给报表处理器，然后将完成的请求交付给客户端或存储在\
  \ `ReportServer` 数据库中。\n\n![Image](img/square.jpg) **注意** 按需报表被渲染并直接交付给客户端，而快照则是在某个时间点处理的报表，通过电子邮件、文件共享或（如果配置）直接发送到打印机的方式交付给客户端。\n\
  \n\n#### 认证层\n\nSSRS 2005 在很大程度上依赖于 Internet 信息服务（`IIS`）的认证机制，因为 SSRS 和 `IIS` 是相互依赖的。除了\
  \ SharePoint 集成模式下的 SSRS，自 2008 版本起的所有 SSRS 版本都不再与 `IIS` 绑定。SSRS 现在直接使用 `Http.sys`，以及\
  \ SQL Server 的原生网络组件，因此其架构经过重新设计，包含了自身的认证层，我们将在第 11 章中介绍。\n\n#### 报表处理器\n\n报表处理器组件负责处理所有报表请求。与编程接口类似，它直接与\
  \ `ReportServer` 数据库通信，接收报表定义信息，然后将其与从数据源返回的数据（通过某个数据处理扩展访问）结合起来。\n\n#### 数据处理\n\
  \nReporting Services 支持十二个数据处理扩展来连接数据源。这些扩展包括：\n\n> *   SQL Server\n> *   Oracle\n\
  > *   OLE DB\n> *   OLEDB-MD\n> *   ODBC\n> *   XML\n> *   SAP BI NetWeaver\n> *\
  \   Hyperion Essbase\n> *   Teradata\n> *   Microsoft SQL Azure（云中的 SQL）\n> *  \
  \ Microsoft SQL Server 并行数据仓库\n> *   Microsoft SharePoint 列表\n\n当数据处理组件从报表处理器接收到请求后，它会启动到数据源的连接并传递源查询。数据被返回并发送回报表处理器，然后报表处理器将报表元素与从数据处理扩展返回的数据结合起来。\n\
  \n#### 报表渲染\n\n结合后的报表和数据被移交给渲染扩展组件，存储为一种称为报表页面布局（`RPL`）的中间格式。然后，`RPL` 会根据客户端指定的渲染类型（我们在第\
  \ 8 章深入介绍渲染）转换为几种受支持的或自定义的格式之一：\n\n> *   `HTML`：默认渲染格式，支持 HTML 4.0 和 3.2 版本。\n>\
  \ *   `Portable Document Format`（`PDF`）：使用 Adobe Acrobat Reader 生成即用型报表的格式。SSRS\
  \ 不需要您拥有 Adobe 许可证即可渲染 `PDF`，这对客户来说是一大优势。您只需要一个 `PDF` 阅读器。\n> *   `Excel 2002` 和\
  \ `2003`：SSRS 的 Service Pack 1 支持 `Excel 97` 及更高版本。如前所述，SQL Server 2012 支持导出为 2007-2010（`.xlsx`）压缩格式，以允许更多的行和列。\n\
  > *   `XML`：其他应用程序或服务可以使用导出到 `XML` 的报表。\n> *   `Comma-separated values`（`CSV`）：通过渲染到\
  \ `CSV` 文件，您可以将其导入到其他支持 `CSV` 的应用程序（如 Microsoft Excel）中来进一步处理报表。\n> *   `MIME HTML`（`MHTML`）：您可以使用此格式（也称为*Web\
  \ 存档*）直接通过电子邮件交付报表或交付存储，因为报表内容（包括图像）都嵌入在单个文件中。\n> *   `Tagged Image File Format`（`TIFF`）：使用\
  \ `TIFF` 渲染图像文件可以保证报表的标准视图，因为无论用户的浏览器设置或版本如何，它都会以相同的方式处理。\n> *   `Microsoft Word`：标准的\
  \ Microsoft Word 文档导出现已包含在 SSRS 2008 中。SSRS 2012 提供了 97-2003（`.doc`）和 2007-2010（`.docx`）压缩格式。\n\
  > *   `ATOM`：此格式可由符合 `ATOM` 标准的客户端应用程序（如 `PowerPivot` 和 `SharePoint`）使用。\n> *  \
  \ `NULL`：`NULL` 渲染扩展实际上不像其他扩展那样是一种格式，但可用于缓存报表的结果。下次请求该报表时，它会从缓存中提取并显著更快地渲染。如果您的报表较大且渲染时间异常长，这将非常有用。在创建订阅时，您会看到此扩展作为一种交付格式。\n\
  \n#### 计划和交付\n\n如果来自客户端的请求需要计划或交付扩展（如快照或订阅），则编程接口会调用计划和交付处理器来处理该请求。您可以基于用户定义或共享计划生成并交付报表快照到两个受支持的交付扩展之一：电子邮件或文件共享。请注意，SSRS\
  \ 使用 `SQL Server Agent` 来创建计划作业。如果 `SQL Server Agent` 未运行，作业将不会执行。我们将在第 10 章介绍如何基于共享计划创建订阅和快照。\n\
  \n### 客户端应用程序\n\nSSRS 包含多个客户端应用程序，它们使用 SSRS 编程接口（包括 `Web` 服务 `API` 和 `URL` 访问方法）为用户提供前端工具，以访问\
  \ SSRS 报表和配置工具。这些工具提供报表服务器管理、安全实施和报表渲染功能。这些工具如下：\n\n> *   `Report Manager`：这个随 SSRS\
  \ 提供的基于浏览器的应用程序为需要查看或打印报表，或为其工作组或部门管理报表对象的用户提供了图形界面。我们在涵盖 SSRS 管理的第 10 章详细描述了 `Report\
  \ Manager`。\n> *   `BIDS` 或 `SSDT`：此工具为开发 SSRS 报表提供了一个集成环境。我们在第 3 章到第 5 章介绍了 `BIDS`\
  \ 或 `SSDT`，并在第 6 章及全书介绍了如何在此环境中构建报表。\n> *   `Command-line utilities`：您可以使用几个命令行工具来配置和管理\
  \ SSRS 环境，包括 `rs`、`rsconfig`、`rskeymgmt` 和 `rsactivate`。\n> *   `Report Builder\
  \ 3.0`：这个增强的应用程序主要是为了让业务用户能够创建临时报表而开发的。`BIDS` 中几乎所有的功能在 `Report Builder 3.0` 中也可用。\n\
  > *   `Custom clients`：这些 .NET Windows 窗体和 `Web` 应用程序调用 SSRS `Web` 服务来执行诸如渲染报表和管理报表对象等任务。SSRS\
  \ 包含您可以编译和运行的示例应用程序项目，以扩展前面列出的主要工具提供的功能。在第 8 章和第 9 章中，我们将向您展示如何开发自己的自定义应用程序：报表查看器和报表发布者。\n\
  > *   `Reporting Services Configuration Manager`：SQL Server 2008 的 SSRS 包含一个增强的\
  \ `Reporting Services Configuration Manager`，专门设计用于在图形环境中更改许多这些属性，包括为离线或断开连接的报告设置\
  \ SSRS 环境。\n\n当想到基于 `Web` 的应用程序时，很自然地会想到*Web 浏览器*。尽管其他前端工具（如 `SSMS` 和 `Visual Studio`）也连接到报表服务器，但\
  \ `Web` 浏览器在为用户提供图形界面方面扮演着重要角色，用户可以使用 `Report Manager` 查看或打印报表，或远程管理其工作组或部门的报表服务器。\n\
  \n#### 报表管理器\n\n在 `Report Manager` 中，用户可以渲染报表、创建报表订阅、修改报表对象的属性、配置安全设置，以及执行许多其他任务。用户只需打开其\
  \ `Web` 浏览器并导航到形如 [`http://Servername/Reports`](http://Servername/Reports) 的 `URL`\
  \ 即可访问 `Report Manager`。图 1-2 展示了运行中的 `Report Manager`，其中列出了专门为临床医生部署的文件夹中的报表。\n\
  \n![Image](img/9781430238102_Fig01-02.jpg)\n\n**图 1-2.** 基于 `Web` 的 `Report Manager`\
  \ 应用程序\n\n\n\n#### 客户端工具\n\n##### Business Intelligence Development Studio (BIDS)\
  \ and SQL Server Data Tools (SSDT)\n\n报表浏览器只是可以使用 SSRS Web 服务的多个客户端之一。事实上，BIDS 在与\
  \ Web 服务交互以部署报表和数据源时也是一个客户端。BIDS 为报表开发人员提供了一个图形化的设计环境，用于生成 SSRS 用于部署和呈现报表的 RDL 文件。\n\
  \n![Image](img/square.jpg) **注意** 由于 RDL 是一个定义好的标准，你可以使用任何支持创建 RDL 文件的设计应用程序。其他第三方报表设计器也是可用的，并且据说还有更多正在开发中。\n\
  \n通过在 BIDS 报表项目中定义基本 URL 和文件夹名称，你可以在设计模式下将创建的 RDL 文件直接部署到报表服务器。基本 URL 的格式为 [`http://Servername/ReportServer`](http://Servername/ReportServer)。如果你的\
  \ SSRS 配置为在非默认端口（80）上运行，请指定 [`http://ServerName:PortNumber/ReportServer`](http://ServerName:PortNumber/ReportServer)。我们将在第\
  \ 3 章到第 5 章中详细介绍整个 BIDS 设计环境，包括大多数可用的报表对象。我们还将描述定义 SSRS 报表每个方面的 RDL 模式。图 1-3 展示了\
  \ BIDS 设计环境（也称为集成开发环境或 IDE），其中加载了一个设计模式下的报表。\n\n![Image](img/9781430238102_Fig01-03.jpg)\n\
  \n***图 1-3.** BIDS 环境*\n\n##### 命令行工具\n\n除了像 BIDS 和 SSMS 这样的图形化应用程序，SSRS 还提供了几个被视为\
  \ Web 服务客户端的命令行工具。这些工具的额外好处是可以通过 Windows 内置的任务计划功能实现自动化。SSRS 包含四个主要的命令行工具：\n\n>\
  \ *   `rs`：处理使用 VB.NET 代码编写的报表服务脚本（RSS）文件。因为你可以通过脚本中的代码访问完整的 SSRS API，所以所有 SSRS\
  \ Web 服务方法都是可用的。\n> *   `rsconfig`：配置 SSRS 连接到 `ReportServer` 数据库的身份验证方法和凭据。`rsconfig`\
  \ 工具还设置无人参与的 SSRS 执行凭据。\n> *   `rskeymgmt`：管理 SSRS 用于安全存储敏感数据（如身份验证凭据）的加密密钥。第 11\
  \ 章涵盖了 `rskeymgmt` 的使用。\n> *   `rsactivate`：将 Reporting Services 的另一个实例添加到 Web 场中，对于替换损坏的实例很有用。\n\
  \n##### 报表生成器\n\n报表生成器应用程序在类似于其他 Microsoft Office 产品的环境中开发报表，具有功能区风格的界面。与 SSRS 2008\
  \ R2 一起发布的报表生成器 3.0 提供了几乎与 BIDS 中的报表设计器相同的功能。你可以使用标准的 ClickOnce 技术从浏览器中安装它，或者将其作为厚客户端应用程序安装，使其在\
  \ Windows 开始菜单下可用。图 1-4 展示了来自第 6 章的一个报表示例，该报表在报表生成器中加载。\n\n![Image](img/9781430238102_Fig01-04.jpg)\n\
  \n***图 1-4.** 报表生成器 3.0*\n\n##### 自定义客户端\n\n最后一种客户端是那些专门设计用于访问 SSRS Web 服务的定制客户端。本书的所有作者之间，我们已经为许多组织构建了几个这样的应用程序，它们同时使用了报表查看器和报表发布者。第三方商业应用程序提供了扩展功能，例如\
  \ RS Scripter，它有助于编写脚本和管理各种报表服务器目录项；它可以从服务器提取 RDL，并管理订阅、角色，甚至从一个服务器迁移到另一个服务器。\n\n\
  ### 安装与配置\n\n你可以像安装 Analysis Services、Integration Services 和 Notification Services\
  \ 一样，作为主 SQL Server 安装的一部分来安装 Reporting Services。在安装 Reporting Services 2012 之前，你必须知道你将运行在本机模式还是\
  \ SharePoint 集成模式。对于早期版本的 Reporting Services，你可以通过使用 Reporting Services 配置管理器在安装后更改模式，但在\
  \ 2012 版本中，你只能在 SQL Server 安装时将 Reporting Services 配置为 SharePoint 集成模式，因为该应用程序将作为本机\
  \ SharePoint 服务进行安装和配置。\n\n安装的组件取决于你的组织选择实现的模式。例如，在本机模式下安装时，组件包括 Reporting Services\
  \ Web 服务、`ReportServer` 数据库和报表管理器 Web 应用程序。安装 Reporting Services 后，如果你不需要某些功能，可以选择禁用它们。例如，你可能希望使用自定义应用程序与\
  \ `ReportServer` 交互，而不是内置的报表管理器 Web 应用程序。安装的客户端组件包括前面提到的管理命令行工具，如 `rs` 和 `rsconfig`，以及文档、示例和前面提到的\
  \ Reporting Services 配置管理器。\n\n如果你在安装 Reporting Services 时使用了本机模式的默认配置设置，你将使用 RS\
  \ 配置管理器来设置或更改与该实例相关的各种其他设置。一些需要执行的任务是：\n\n> *   选择安全设置，例如报表服务器将使用 HTTP、HTTPS 还是两者。\n\
  > *   配置一个简单邮件传输协议（SMTP）邮件服务器来处理订阅的传递。\n> *   备份和还原在将报表服务器移动到新机器时使用的加密密钥。\n> * \
  \  设置 Web 服务和报表管理器 URL，并定义它们运行的端口。这使你能够在一台机器上运行多个 Reporting Services 实例。\n\n如前所述，一旦安装了\
  \ SSRS，你可以修改一些配置设置。例如，在查看性能数据后，你可能认为报表服务器需要连接到现有的 Web 场。你可以使用 `rsconfig` 工具或图形化的\
  \ Reporting Services 配置管理器来执行此任务。你可以通过直接修改 `RSReportServer.config` 文件来重新配置安全设置或邮件服务器。我们将在第\
  \ 10 章和第 11 章中介绍如何使用这些工具、修改配置文件设置以及收集性能度量。\n\n如果你选择使用 SharePoint 集成模式，配置设置完全在 SharePoint\
  \ 的管理中心内管理。我们将在第 12 章中更详细地介绍 SharePoint 集成。\n\n\n好的，我已经按照您的要求，将提供的英文技术文档翻译成了中文，并严格遵循了所有格式注意事项。\n\
  \n**主要处理要点如下：**\n1.  **保留所有格式标记**：粗体（如**注意**）、斜体（如*难以遗忘*）、内联代码（如`rsconfig`）、代码块、链接格式（如`第\
  \ 3 章`）以及列表和引用块的符号都得到了完整保留。\n2.  **准确翻译技术内容**：对客户端工具（BIDS、报表生成器等）、安装模式（本机模式、SharePoint\
  \ 集成模式）以及命令行工具（`rs`, `rsconfig`等）的功能描述进行了准确、专业的翻译。\n3.  **处理专有名词和术语**：产品名称（如 SQL\
  \ Server Reporting Services）、技术术语（如 RDL、Web 服务、ClickOnce）保持了原文或使用了业界通用译法，确保技术准确性。\n\
  4.  **保持结构与上下文**：完整保留了原文的章节结构（`####`， `#####`），图片引用和图表标题（如`***图 1-3.***`），以及交叉引用链接（如`图\
  \ 1-3`）。\n5.  **避免遗漏与重复**：逐段核对，确保没有遗漏任何一行内容，且最终输出仅为译文，没有重复原文。\n\n希望这份翻译符合您作为高级文档工程师和翻译员的要求。如果需要针对特定术语或风格进行调整，请随时告诉我。\n\
