  \ Russel Hansen（其姓名因您对患者分组应用的填充而缩进）是一位步态异常患者，并接受了 68 次家庭健康助理访问中的 16 次。您还可以在包含`Employee_Name`分组的行中，进一步看到每位员工针对该患者的访问次数和成本（参见图\
  \ 6-9）。\n\n![Image](img/9781430238102_Fig06-09.jpg)\n\n图 6-9. 包含分组级别小计的报表输出\n\n\
  Pro_SSRS 项目中的 `EmployeeServiceCost_Subtotals.rdl` 报表包含了小计。\n\n### 添加交互性\n\n无论特定报表的受众是谁——无论是对屏幕上汇总数据感兴趣的决策者，还是需要打印报表能力的知识工作者——报表内的交互性都能使导航到特定信息变得更加容易和高效。您可以通过多种方式在\
  \ SSRS 报表中提供交互性。在接下来的部分中，您将使用四种基本类型的交互性：\n\n> *   文档映射：在报表中提供一个导航窗格，其内容基于某个字段或分组。\n\
  > *   可见性：根据用户输入隐藏和显示报表项，从而为报表添加交互性。\n> *   交互式排序：允许用户交互式地选择报表数据的排序方式。\n> *   超链接操作：允许用户点击链接到同一报表内或报表外部某个位置的报表项。\n\
  \nSSRS 提供的不同呈现格式（在第 7 章中详细介绍）适应了查看和打印报表的需求，以满足不同类型工作者的需要。然而，这也带来了一个限制，即一种呈现格式的某些功能在其他格式中不可用。这一点在处理交互性时最为明显，正如您将在“交互式排序”部分中看到的那样。\n\
  \n#### 文档映射\n\n在 SSRS 报表中创建文档映射，将在报表呈现时为用户展示一个集成的导航窗格。用户可以选择导航窗格中的某个项目，这将导致报表跳转到该项目所在的位置。例如，在示例报表中，用户可能有兴趣查看关于阿尔茨海默病患者的信息。您可以为报表中的“诊断”分组创建一个文档映射，这样当用户从导航窗格中选择“阿尔茨海默病”时，报表将自动跳转到该部分；换句话说，用户无需手动翻查报表来查找所需信息。您还可以在多个级别添加文档映射，在导航窗格中创建分层选择。沿用该示例，除了“诊断”分组外，您还可以为`Service_Type`分组添加文档映射；这样用户就可以在导航窗格中展开“阿尔茨海默病”，查看针对该诊断执行的所有服务类型——例如家庭健康助理服务。\n\
  \n您可以通过向单个报表项或分组可用的“文档映射标签”属性添加表达式来创建文档映射。首先，打开 Pro_SSRS 项目中的 `EmployeeServiceCost_DocumentMap_Start.rdl`\
  \ 报表。按照以下步骤，您将为`Service_Type`和诊断分组添加文档映射标签：\n\n1.  在“设计”选项卡上，右键单击“行组”窗格中的`Service_Type`分组，选择“分组属性”。然后点击“高级”选项卡。\n\
  2.  在“分组属性”的“高级”选项卡中，从“文档映射”下拉列表中选择`Service_Type`。\n3.  对诊断分组（即`Service_Type`上方的第一级分组）完成步骤\
  \ 1 和 2。为“文档映射标签”选项选择“诊断”。\n\n现在，当您预览报表时，导航窗格将自动显示在报表的左侧。默认的 HTML 预览会使用支持文档映射的呈现格式之一（如\
  \ PDF）进行显示（参见图 6-10）。\n\n![Image](img/9781430238102_Fig06-10.jpg)\n\n图 6-10. 包含文档映射导航窗格的报表\n\
  \nPro_SSRS 项目中的 `EmployeeServiceCost_DocumentMap.rdl` 报表包含一个文档映射。\n\n![Image](img/square.jpg)\
  \ **注意** 当报表以 PDF 格式呈现时，Adobe Acrobat 将文档映射视为书签。而 SSRS 中的书签功能则完全不同。它们嵌入在报表中，并且报表项被分配了书签链接。\n\
  \n\n\n#### 可见性\n\nSSRS 的另一项特性是能够根据用户输入、数据集返回的结果或一些预定义的逻辑，来显示或隐藏已渲染报表的区域。用户通常希望在报表首次呈现时只看到摘要信息，但又能在必要时深入查看摘要数据的细节。报表设计者可能会制作两份报表——摘要报表和明细报表——但这需要分别进行更新和维护。这些报表通常基于相同的查询。幸运的是，SSRS\
  \ 的显示或隐藏报表数据的功能消除了创建单独报表的需要。报表项的可见性属性控制着哪些报表项被显示或隐藏。\n\n假设你已将报表分发给了目标受众，而他们回来了一些关于如何改进报表的“建议”——毕竟，这是现实世界的报表。他们表示希望看到以下内容：\n\
  \n> *   在报表首次渲染时，显示每个诊断的访问次数和预估费用的汇总总计，并且能够在有依据时深入查看患者和员工的详细信息。\n> *   具有特定诊断的患者数量。\n\
  > *   为这些患者提供过护理的独立员工数量。\n\n使用 SSRS，这相当直接，你可以快速制作出一份改进的报表。要开始此示例，请在 `Pro_SSRS` 项目中打开\
  \ `EmployeeServiceCost_Visibility_Start.rdl` 报表。然后，在修改可见性属性之前，你只需遵循以下设计步骤：\n\n1.\
  \  在“设计”选项卡上，右键单击标有“Diagnosis > Service > Patient > Employee”的整个列，选择“在组内插入列 - 右侧”。再执行一次此步骤，这样我们就在组与“Estimated\
  \ Cost”和“Visit Count”列之间有了两个空列。\n2.  在第二列和第三列中，分别输入 **Employee Count** 和 **Patient\
  \ Count** 作为新的列标题文本。\n3.  从右向左调整表格中第二列和第三列的大小，使它们各自大约为 1 英寸。如果默认情况下看不到标尺，你可以右键单击设计环境中的空白区域，然后在“视图”菜单下选择“标尺”。\n\
  4.  突出显示“Service Type”、“Patient Name”和“Details”行中的每个单元格。你可以通过按住 `Control` 键并单击表格中第一列左侧的行标记来完成此操作。所有行突出显示后，从格式工具栏中选择\
  \ 8 磅的字体大小。\n\n你可以通过设置可见性属性值来控制报表项的隐藏或显示状态。你可以在报表的任何层级隐藏报表项，并在用户单击 + 或 – 图标时切换其可见性属性值来显示或隐藏它们。隐藏项的切换点可以是另一个报表层级，例如一个组。在此示例中，你希望隐藏除“Diagnosis”和“Service_Type”字段之外的每个层级，但赋予用户显示或隐藏详细信息的能力。首先，隐藏除“Diagnosis”和“Service_Type”之外的所有组。实现此目标的步骤如下：\n\
  \n1.  在“行组”部分右键单击 `Employee_Name` 组，选择“组属性”。然后单击“可见性”选项卡。\n2.  在“可见性”选项卡上，选择“隐藏”单选按钮。\n\
  3.  启用“可由此报表项切换显示”复选框。\n4.  在“报表项”下拉列表中，选择 `Patient_Name`。\n5.  为“Patient Name”组执行步骤\
  \ 1 到 4，选择或输入 **Service_Type** 作为切换报表项。\n\n另外两个请求是要能够查看每个诊断的患者和员工总数。你可以向报表中添加一个表达式\
  \ `CountDistinct`，它将统计每个唯一的患者和员工，并在诊断级别计算数量。用于患者计数的语法如下：\n\n```vb\n=CountDistinct(Fields!FieldName.Value)\n\
  ```\n\n通过为字段 `PatID`（如您所知，该字段对每个患者是唯一的）以及字段 `EmployeeID` 添加 `CountDistinct` 表达式，就能更容易地一目了然地看到有多少患有特定诊断的患者接受了护理。\n\
  \n将以下两个用于“Diagnosis”组的表达式放置在“Employee Count”和“Patient Count”标题单元格正下方的单元格中：\n\n```vb\n\
  =CountDistinct(Fields!EmployeeID.Value) =CountDistinct(Fields!PatID.Value)\n```\n\
  \n虽然报表与非交互式报表仍然相似，但有了深入查看的附加功能，预览时它会看起来大不相同（参见图 6-11）。在图 6-11 的截图中，你会注意到我们隐藏了文档地图以提供更多报表空间。你可以通过双击分隔文档地图和报表主体的栏中央的小箭头来显示或隐藏文档地图。\n\
  \n![Image](img/9781430238102_Fig06-11.jpg)\n\n**图 6-11.** 具有交互式深入查看功能的报表\n\n`Pro_SSRS`\
  \ 项目中的 `EmployeeServiceCost_Visibility.rdl` 报表包含了这些可见性属性。\n\n\n#### 交互式排序\n\n在向大量受众部署报表时，总会遇到这样的情况：有人会要求以某种特定方式排序报表，而这通常与最初设计的方式不同。当这种情况发生时，报表设计者通常会陷入两难：是创建第二个几乎相同、但带有自定义排序的报表来满足请求者，还是将该请求放入未来的增强队列中。交互式排序允许用户在运行时，对任意数量已定义启用此功能的字段进行排序。\n\
  \n在示例报表中，你知道你有一个广泛的受众群体，他们可能会因不同目的而使用此报表。例如，首席财务官可能希望查看报表以了解哪种诊断的就诊次数最多。相反，另一个用户可能需要了解有多少患者患有某种诊断，并希望报告在诊断组级别按患者数量排序，而不是就诊次数。在本节中，你将向报表添加交互式排序以满足这两种需求，并且知道如果需要，可以按任何其他标准对报表进行排序，而无需根据用户细分创建额外的报表。\n\
  \n由于你知道将应用于报表的交互式排序标准是患者数量而非就诊次数，因此只需在用户将单击以根据需要更改排序的每个文本框中添加此标准。使用 `EmployeeServiceCost_InteractiveSort_Start.rdl`\
  \ 作为起点，按照以下步骤向表头单元格“患者数量”和“就诊次数”添加交互式排序：\n\n1.  在“设计”选项卡上，右键单击“患者数量”表头文本框，然后选择“文本框属性”。单击“交互式排序”选项卡。\n\
  2.  勾选标题为“启用此文本框的交互式排序”的框。\n3.  在“选择要排序的内容”区域，选择“组”单选按钮，并将 `Diagnosis` 添加为组表达式。在“排序依据”区域输入\
  \ `=CountDistinct(Fields!PatID.Value)`。\n4.  勾选“将此排序应用于以下位置中的所有组或数据区域”选项，然后选择 `Emp_Svc_Cost`\
  \ 数据区域，或键入该区域名称。单击“确定”。\n5.  右键单击“就诊次数”表头单元格，并执行步骤 1 到 4，将排序表达式替换为 `=Sum(Fields!Visit_Count.Value)`，如图\
  \ 6-12 所示。\n\n![Image](img/9781430238102_Fig06-12.jpg)\n\n**图 6-12.** `就诊次数`的交互式排序属性\n\
  \n当您查看应用了新的交互式排序表达式的报表时，您会看到在“患者数量”和“就诊次数”标题字段中自动添加了一个可选择的排序图标，如图 6-13 所示。当用户在浏览器中单击此图标时，报表将自动重新排序，以显示每个诊断的最大或最小患者数量，或者每个诊断的最大或最小就诊次数。图\
  \ 6-13 显示了就诊次数最多的诊断，即 `Physical Therapy NEC`，有 `1,579` 次就诊和 `76` 名患有此疾病的独特患者。用户也可以选择按患者数量的升序或降序对报告进行排序。\n\
  \n![Image](img/9781430238102_Fig06-13.jpg)\n\n**图 6-13.** 交互式排序以显示患者数量的报表\n\n交互式排序是文本框报表项的一个属性，通常用于表格或矩阵数据区域中的列标题。只要它们在相同的作用域或分组内，单个文本框可以控制一个或多个数据区域的排序。例如，可以对嵌套在列表数据区域内的多个表格进行排序。\n\
  \n`Pro_SSRS` 项目中的 `EmployeeServiceCost_InteractiveSort.rdl` 报表包含交互式排序功能。\n\n####\
  \ 超链接操作\n\n能够将一个报表项（例如文本框的内容）链接到另一个报表或 URL，为 SSRS 增加了另一个有价值的交互级别。通过向 SSRS 报表添加超链接，用户可以像使用应用程序或网页一样使用报表，从而使他们的任务更高效。接下来的部分将展示如何向报表添加多个链接或操作，以帮助用户链接到其他报表和位置，例如公司内网站点。您可以将三种基本操作与报表中的值相关联：\n\
  \n> *   跳转到书签\n> *   跳转到 URL\n> *   跳转到报表\n\n您可以在支持这些操作的报表项（例如文本框、图表和图像）的“操作”选项卡上找到它们。\n\
  \n为了演示这些超链接操作，我们将使用一个比您迄今为止设计的报表更适合超链接操作的报表，该报表已在向下钻取功能中包含一个交互级别。下一个报表 `Employee\
  \ Listing` 将提供一个简单的员工列表，根据他们的临床专业进行分组。代码下载中提供了两个版本的 `Employee Listing` 报表。一个仅包含已创建的数据集，以便您可以按照以下步骤创建报表，名为\
  \ `EmployeeListing_Start.rdl`。另一个是完整版本，名为 `EmployeeListing.rdl`。\n\n您将向报表添加三个交互式超链接操作，以提供以下功能：\n\
  \n> *书签：* 选择员工姓名时，报表将跳转到报表内包含有关该员工更多详细信息（例如他们看过的患者数量）的已加书签位置。\n> \n> *URL：* 您还将根据员工的学科或临床专业，设置指向其部门网站的链接。您还将使用一个报表参数，该参数专门用于选择员工的分支机构位置。当用户从报表参数提供的下拉列表中选择分支机构位置时，他们将被带到自己部门的内网站点。此功能仅用于示例说明，实际上不会将您带到内网站点；也就是说，除非您为分支机构和包含各学科的子文件夹设置了内网站点。\n\
  > \n> *报表：* 您将添加一个指向您的 `Employee Service Cost` 报表的链接，该链接将传递一个 `EmployeelD` 参数以限制链接报表的结果。您将在\
  \ `Employee Service Cost` 报表中使用相同的技术，通过富文本框格式链接到患者调查表单。\n\n完成的 `Employee Listing`\
  \ 报表将包含两个表格数据区域：一个用于摘要信息，另一个用于有关员工就诊的详细信息。您将把超链接操作添加到报表的摘要部分，这是用户首先看到的第一页。清单 6-1\
  \ 显示了用于获取员工信息的数据集查询。对于此报表，您将员工限制为已知集合（如 `WHERE` 子句所示），以保持报表较小。您还将添加一个日期范围及两个参数 `@DateFrom`\
  \ 和 `@DateTo`，稍后您将创建并使用它们。`EmployeeListing_Start.rdl` 报表包含默认日期范围值，从 `2007 年 1 月\
  \ 1 日` 到使用 `Today()` 函数计算的当前日期。此查询及示例变量设置可在“查询”文件夹下名为 `EmployeeListingQuery.sql`\
  \ 的脚本中找到。\n\n**清单 6-1.** 员工列表查询\n\n\n```sql\nSELECT\n        RTRIM(E.EmployeeID)\
  \ AS EmployeeID\n        , E.LastName\n        , E.FirstName\n        , E.EmployeeTblID\
  \ AS EmpTblID\n        , E.EmploymentTypeID AS EmploymentType\n        , E.HireDate\n\
  \        , D.Dscr AS Discipline\n        , P.LastName AS patlastname\n        ,\
  \ P.FirstName AS patfirstname\n        , T.ChargeServiceStartDate\n        , D.DisciplineID\n\
  \        , P.PatID\nFROM\n        Trx AS T\n        JOIN ChargeInfo AS CI ON T.ChargeInfoID\
  \ = CI.ChargeInfoID\n        JOIN Employee AS E ON E.EmployeeTblID = CI.EmployeeTblID\n\
  \        JOIN Discipline AS D ON E.DisciplineTblID = D.DisciplineTblID\n       \
  \ JOIN Patient AS P ON T.PatID = P.PatID\nWHERE\n        (T.ChargeServiceStartDate\
  \ BETWEEN @DateFrom AND @DateTo)\n```\n\n## 首先，打开 EmployeeListing_Start.rdl 报表\n\
  \n创建如图 `图 6-14` 所示的初始基本报表的步骤很直接，只需要几个提示。首先，你将再次使用表格数据区域，因此只需将表格拖到设计图面的报表区域。当你添加表格时，BIDS\
  \ 会自动生成三列。为表格再添加一列。\n\n接下来，将以下字段添加到详细列中：`EmployeeID`、`LastName`、`HireDate` 和 `Discipline`。员工的\
  \ `Discipline` 字段指的是员工的临床专业，例如家庭健康助理或专业护士。现在有了一个开始，让我们编辑 `Lastname` 字段，使用 `LastName`\
  \ 和 `FirstName` 列，以逗号分隔（例如：LastName, FirstName），将其转换为一个连接的员工姓名值。\n\n右键单击详细行中的 `Lastname`\
  \ 文本框，选择 `表达式`。由于名字和姓氏字段已用空格填充，你需要使用 `RTRIM()` 函数删除多余的空格。姓氏文本框的表达式应如下所示：\n\n```vb\n\
  =RTRIM(Fields!LastName.Value) & \", \" & RTRIM(Fields!FirstName.Value)\n```\n\n\
  现在你已经将 `LastName` 和 `FirstName` 合并为一个，将标题从“Last Name”更改为“Employee Name”。将表格的整个标题行设为**粗体**。最后，让我们将\
  \ Employee 列改得更像超链接一些。选择 `EmployeeID` 详细字段，然后将文本设置为带下划线，字体颜色设置为蓝色。\n\n![Image](img/9781430238102_Fig06-14.jpg)\n\
  \n`图 6-14.` 带有超链接操作的员工列表报表\n\n此外，在使用日期时，默认格式包含日期和时间值，即使日期没有关联时间。例如，雇用日期可能显示为：`10/20/2003\
  \ 12:00:00 AM`。通过右键单击 `Hire Date` 单元格并选择文本框属性，你可以将格式从默认值更改为更标准的格式。在“数字”选项卡下将格式更改为\
  \ `MM/DD/YYYY` 格式，例如 `10/20/2011`，不包括任何时间值。此日期的格式代码为 `d`，或者你可以输入 `MM/dd/yyyy`。\n\
  \n接下来，因为你返回的是详细记录，每个员工有多条记录，所以你需要使用员工姓名字段的值对详细行本身进行分组。你可以通过右键单击“行分组”区域中的详细行分组并选择\
  \ `分组属性` 来实现这一点。在 `分组依据` 表达式字段中，添加与前面代码行中所示相同的、经过修剪的员工姓名。现在，当你预览报表时，你就有了员工列表，可以为其添加超链接操作。\n\
  \n最后，在此表格后强制分页，以便你可以添加一个将用作书签链接的详细表格。要向报表添加分页符，只需选择表格，然后右键单击某一列以打开表格属性，如图 `图 6-15`\
  \ 所示。在“常规”选项卡上，选择 `在之后添加分页符`。\n\n![Image](img/9781430238102_Fig06-15.jpg)\n\n`图\
  \ 6-15.` 表格属性\n\n##### 添加书签链接\n\n在本节中，你将为员工列表报表中的员工姓名字段添加一个书签链接，当点击时，将跳转到报表中的定义位置。在这种情况下，你不会向报表添加另一个表格数据区域来包含员工访问的详细信息。当用户查找特定信息时，书签可以减轻大型报表的导航负担。如前所述，汇总和详细信息可以存在于同一个报表中；在添加书签的情况下，你并不是隐藏数据，而只是将其移动到同一报表内的另一个位置。然而，对用户来说，最终效果是相同的，因为他们可以控制何时看到详细信息。\n\
  \n要向员工列表报表添加书签，首先按照将新表格元素拖到“设计”选项卡的过程操作。接下来，将 `patLastName` 拖到表格的第一列。右键单击它并选择 `表达式`。编写一个类似于之前为员工姓名列所做的表达式，但使用\
  \ `patLastName` 和 `patFirstName` 列。将标题重命名为“Patient Name”。\n\n现在，对于此表格，你将需要按员工姓名进行分组，因此右键单击你的详细行并选择\
  \ `添加组`，然后选择 `父组`。你将使用相同的修剪表达式作为组值表达式，如下所示：\n\n```vb\n=RTRIM(Fields!LastName.Value)\
  \ & \", \" & RTRIM(Fields!FirstName.Value)\n```\n\n将组名更改为 `Employee_Name`。然后，在“分页符”选项卡上，选择启用\
  \ `在每个组实例之间` 分页的选项。这将强制每个员工的详细行从新的一页开始。接下来，将代表服务执行时间的日期字段 `=Fields!ChargeServiceStartDate.Value`\
  \ 添加到第三列，并使用 `MM/dd/yyyy` 样式格式化日期，就像之前做的那样。\n\n现在当你预览报表时，汇总的员工列表将出现在第一页，而显示员工访问的详细记录将出现在每一页后续页面上。\n\
  \n接下来，你将为第二个表格的详细行中的 `Employee_Name` 字段添加一个 `Bookmark` 属性值。在 SSRS 2012 中，你需要使用属性窗口将书签添加到字段。在属性窗口可见的情况下，单击详细行中的员工姓名字段，如图\
  \ `图 6-16` 所示。在属性窗口中，将你的修剪后的员工姓名表达式输入到书签值框中。这将作为你即将创建的书签链接的指针记录。\n\n![Image](img/9781430238102_Fig06-16.jpg)\n\
  \n`图 6-16.` 设置书签属性值\n\n创建书签链接：在第一个表格中，右键单击员工姓名详细行并选择 `文本框属性`，然后单击 `操作` 选项卡。在选项卡的“更改超链接选项”部分，选择\
  \ `转到书签` 并粘贴你用于 `Bookmark` 属性的修剪后的员工姓名表达式。\n\n![Image](img/square.jpg) **提示** 超链接操作不会自动更改字段的格式以指示关联的超链接。你可以手动更改颜色并添加下划线格式，以便用户知道点击链接。\n\
  \n当你预览报表并点击新的书签链接时，你会看到所选员工的详细信息，如图 `图 6-17` 所示。你应该会看到员工 Bailey McDonald 的详细信息；报表的前三页是员工列表表格，你在那里点击了\
  \ `Employee_Name` 字段中的书签链接。\n\n![Image](img/9781430238102_Fig06-17.jpg)\n\n`图 6-17.`\
  \ 通过书签链接调用的员工访问详细报表\n\n\n##### 添加 URL 链接\n\nURL 链接将报表连接到存储在其他位置（如 Microsoft SharePoint\
  \ 站点或互联网）的信息。与书签链接类似，URL 链接在“操作”选项卡上定义，并可应用于多个报表项。正如第 4 章中所讨论的，在 SSRS 中使用的几乎每个值字段中，内容都由表达式定义。对于\
  \ URL，你将构建一个表达式来定义 HTTP 位置，该表达式结合了字面 URL 和数据集中的字段值。\n\n例如，假设你的内联网站点有一个专门为每个员工专业设计的主页。家庭健康助理员工的`DisciplineID`可能为`HHA`，而你为家庭健康助理设计的网站位于[`http://webserver1/hha`](http://webserver1/hha)。假设每个专业的情况都相同，那么为报表中的每个专业添加\
  \ URL 链接将非常容易。\n\n就像你为`Employee_Name`创建书签链接一样，打开`Discipline`字段的“操作”选项卡。选择“转到 URL”，并添加以下表达式：\n\
  \n```\n=\"http://webserver1/\" & Fields!DisciplineID.Value\n```\n\n当在报表中选择`DisciplineID`字段时，浏览器将打开并连接到该特定员工专业对应的站点——例如，家庭健康助理站点为`HHA`，熟练护理站点为`RN`。\n\
  \n##### 使用报表参数构建 URL 链接\n\n将这个概念再推进一步，如果你在不同的地点或分支有多个 Web 服务器，你不会希望在 URL 字符串中硬编码\
  \ Web 服务器名称。使用报表参数根据分支位置选择服务器名称，将可以控制你在前一个示例中创建的 URL 字符串的 Web 服务器部分。让我们逐步完成此过程。图\
  \ 6-18 展示了“报表参数属性”对话框应有的样子。\n\n![Image](img/9781430238102_Fig06-18.jpg)\n\n**图 6-18.**\
  \ 报表参数属性对话框\n\n请遵循以下步骤：\n\n1.  在“设计”选项卡上，右键单击“报表数据”窗格中的“参数”文件夹，然后选择“添加参数”。\n2. \
  \ 为参数名称输入`Branch_URL`。\n3.  为提示输入`My Branch`。\n4.  在“可用值”部分，输入以下标签/值：`Branch1` =\
  \ `BrianMcDonaldServer`，`Branch2` = `ShawnMcGeeheeServer`，`Branch3` = `RodneyLandrumServer`。\n\
  5.  将默认值设置为`BrianMcDonaldServer`。\n6.  返回到`Discipline`字段的“操作”选项卡，应用新的表达式`=\"http://\"\
  \ & Parameters!Branch_URL.Value & \"/\" & Fields!DisciplineID.Value`。\n7.  预览报表。注意，你现在有一个名为`My\
  \ Branch`的新参数下拉列表，它根据默认值`BrianMcDonaldServer`被设置为`Branch1`。\n\n将 URL 位置分配为参数`Branch_URL`的值后，每当从下拉列表中选择不同的分支时，将选择该分支对应的适当服务器。\n\
  \n##### 跳转到报表\n\n在 SSRS 中，最有用的超链接操作或许是从当前报表中的指定位置链接到另一个报表，这称为*钻取报告*。在本节中，你将从“员工列表”报表链接到一个新的报表——“患者调查信函”报告。“患者调查信函”报表使用单个文本框，并演示了如何利用\
  \ SSRS 2008 提供的新富文本格式，通过 HTML 格式和字面文本字符串（它们都独立格式化）来形成邮件合并风格的报表。\n\n你将通过创建从一个报表到另一个报表的超链接，将这两个报表——“员工列表”报表和“患者调查信函”报表——联系起来。你还将随超链接传递一个参数值，以便在从“员工列表”报表调用“患者调查信函”报表时缩小其结果范围。参数值将为`PatID`、`ServiceMonth`和`ServiceYear`。\n\
  \n要添加链接到“患者调查信函”报表的超链接操作，请返回到“操作”选项卡，这次是从“员工列表”报表中的`Patient Name`明细行文本框进入。`Patient\
  \ Name`明细文本框位于第二个表格中，如图 6-19 所示。\n\n![Image](img/9781430238102_Fig06-19.jpg)\n\n\
  **图 6-19.** 用于添加“转到报告”超链接操作的患者姓名明细文本框\n\n点击“转到报告”按钮后，会出现一个下拉列表，其中包含当前解决方案中所有可用的报表。如果报表已部署到报表服务器但不在当前解决方案中，你可以使用项目中定义的基于目标服务器的相对路径。在此示例中，目标服务器是[`http://localhost/reportserver`](http://localhost/reportserver)。你可以将相对路径添加到报表服务器上的任何报表。在此情况下，选择`PatientSurveyLetter.rdl`报表，然后单击“添加”按钮三次，以添加`PatID`、`ServiceMonth`和`ServiceYear`。选择报表被选中时填充的参数。稍后在“使用存储过程设置报表参数”一节中，我们将展示如何向报表添加这些参数。选择`PatID`作为参数，并将其值赋值为`=Fields!PatID.Value`，这是“员工列表”报表中一个与`PatID`参数具有对应值的字段。接下来，分别为`ServiceMonth`创建表达式`=MONTH(Fields!ChargeServiceStartDate.Value)`，为`ServiceYear`创建表达式`=YEAR(Fields!ChargeServiceStartDate.Value)`。应用新的操作后，如果在预览“员工列表”报表时点击`Patient\
  \ Name`文本框，将会调用“患者调查信函”报表并传递参数，从而将该报表的数据集缩小到仅所选患者的数据。\n\n对于“患者调查信函”报表，你将使用`Emp_Svc_Cost`存储过程的一个修改版本，该版本包含`PatID`字段的参数。这样做的原因是`Textbox`控件不支持筛选条件，而你需要将信件限制为一名患者，因为它只与一个参数关联。对于合并信件，当然可以使用多名患者。为了同时展示链接到另一个报表以及演示新的文本框格式，我们只是想展示这两者的基础知识。\n\
  \n"
- "# 第 6 章：患者调查信报告与参数化存储过程\n\n让我们来看一下患者调查信报告及其带有富文本格式的文本框。你可能还记得第 4 章，文本框现在支持占位符，这些占位符可以是简单或复杂的表达式，也可以是从表格导入的\
  \ HTML 代码。你将结合这些元素，为一位患者生成一封简单的信函。如图 6-20 所示，信件本身由一个文本框和一个表格组成。文本框在其开头包含一个名为`Template_Letter_Header`的占位符。该占位符的格式通过\
  \ HTML 获得，这些 HTML 标签存储在数据集的一个字段中。\n\n![Image](img/9781430238102_Fig06-20.jpg)\n\n\
  *图 6-20. 带有多个占位符的患者调查信报告*\n\nHTML 代码来源于`Pro_SSRS`数据库中的`Format`表。你可以在图 6-21 中看到该字段的示例输出。\n\
  \n![Image](img/9781430238102_Fig06-21.jpg)\n\n*图 6-21. 来自`Format`表的 HTML 代码输出*\n\
  \n要将 HTML 代码分配给文本框占位符，你只需在文本框中的任意位置右键单击，然后选择“添加占位符”。你需要标记每个占位符并为其分配一个表达式值。在这种情况下，你将为其赋值`=FIRST(Fields!html_col.Value,\
  \ \"DataSet1\")`，因为在此示例的格式化表中只有一行数据。为了使 HTML 在文本框中正确显示所有格式，必须在“占位符属性”框中选择“HTML -\
  \ 将 HTML 标记解释为样式”，如图 6-22 所示。\n\n![Image](img/9781430238102_Fig06-22.jpg)\n\n*图\
  \ 6-22. 选择了 HTML 选项的占位符属性对话框*\n\n正如你所期望的那样，文本框也可以包含与数据集中其他字段值对应的表达式。在问候语之后，你可以看到我们将患者姓名添加为另一个占位符。这个姓名包含值表达式`=FIRST(Fields!Patient_Name.Value,\
  \ \"DataSet2\")`，它将随着我们为`PatID`字段设置的参数值而变化。\n\n文本框的其余部分包含额外的格式，例如一些文本的粗体、斜体和字体颜色，所有这些都与包含\
  \ HTML 代码的标题占位符无关。这种格式在 SSRS 2008 之前是不可用的。随着也能导出到 Microsoft Word，富文本格式为你的业务开辟了新的报告创建途径。图\
  \ 6-23 显示了渲染后的患者调查信报告。\n\n![Image](img/9781430238102_Fig06-23.jpg)\n\n*图 6-23. 渲染后的患者调查信报告*\n\
  \n`Patient_Survey_Letter.rdl`报告可在`Pro_SSRS`项目中找到。\n\n##### 添加超链接格式和工具提示\n\n在保存添加了链接的新员工列表报告之前，让我们添加两个格式属性，以使链接更加明显，并在选择链接时提供反馈。第一个任务是简单地让`EmployeeID`字段看起来像一个超链接。选择该字段，应用下划线和蓝色格式（参见图\
  \ 6-24）。\n\n![Image](img/9781430238102_Fig06-24.jpg)\n\n*图 6-24. 带有可见超链接的员工列表报告*\n\
  \n接下来，你将为同一个字段添加一个工具提示。当用户将光标悬停在字段上时，工具提示会出现，它们提供额外的信息。在这种情况下，你将使用一个简单的工具提示来显示单击`EmployeeID`框时将调用哪个报告——患者调查信报告。`ToolTip`属性位于“文本框属性”窗口的“常规”选项卡上。选择字段后，打开“属性”框，并输入**患者调查信**作为工具提示。请注意，与大多数其他值一样，工具提示可以是表达式，也可以是字面字符串。\n\
  \n可以为钻取报告分配多个参数选择、数据集字段、表达式和固定字面量作为输入。现在你已经链接到一个可能有多个参数的报告，让我们更深入地看看参数和筛选器如何协同工作以向报告提供数据。\n\
  \n### 使用存储过程设置报告参数\n\n在第 3 章中，我们介绍了参数，并解释了如何在报告和查询中使用它们来限制从数据源返回的结果。到目前为止，你一直在使用不同类型的数据集、查询和存储过程来构建报告，但我们只触及了如何在\
  \ SSRS 中使用参数的皮毛。参数的值主要来自用户输入，并且最常与数据集相关联；它们用于限制返回的数据量。当参数以这种方式使用时，它被称为*查询参数*。作为数据集一部分的查询参数（例如\
  \ SQL 查询或存储过程）会自动在 SSRS 中生成报告参数。\n\n在本节中，你将修改员工服务成本报告的数据集，以使用参数化存储过程而不是查询。默认情况下，从存储过程生成的报告参数没有填充供用户选择的下拉列表，因此在本节中，你还将用有效的数据填充报告参数列表，以供用户选择输入。最后，你将了解\
  \ SSRS 如何处理`NULL`参数值以及如何为参数生成`NULL`值。当你为 SSRS 报告检索数据时，这一点将变得尤为重要，我们将在本节后面解释。\n\n\
  你将返回到你已创建的名为`Emp_Svc_Cost`的存储过程，你可能还记得，它将提供与你一直在使用的 SQL 查询相同的数据集。该存储过程的优点是能够接受你希望在报告中使用的所有参数。SSRS\
  \ 将自动从存储过程创建报告参数。让我们快速回顾一下将从存储过程传递到报告的参数：\n*   `BranchID`\n*   `EmployeeTbllD`\n\
  *   `ServiceMonth`\n*   `ServiceYear`\n*   `ServiceLogCtgrylD`\n\n要为当前使用非参数化查询的员工服务成本报告自动创建参数，你只需将报告的数据集更改为该存储过程。\n\
  \n打开代码下载中包含的项目中的`EmployeeServiceCost_SP`报告。在包含数据集`Emp_Svc_Cost`的“报告数据”窗口中，你可以右键单击`Emp_Svc_Cost`数据集并选择“数据集属性”以打开“属性”窗口。在“数据集属性”对话框中，将“查询类型”从“文本”更改为“存储过程”。接下来，在“查询字符串”窗口中选择或键入存储过程`Emp_Svc_Cost`的名称，然后单击“确定”。单击“确定”后，参数将自动为你创建。接下来，再次右键单击`Emp_Svc_Cost`数据集并选择“查询”。你应该看到查询将执行`Emp_Svc_Cost`存储过程。单击“运行”按钮，这将提示你输入参数值，如图\
  \ 6-25 所示。由于存储过程设计为接受`NULL`值，请在“定义查询参数”对话框中将默认输入值从“空白”更改为“`NULL`”，然后单击“确定”以完成执行。如果你不选择“`NULL`”而是“空白”，查询将失败并显示错误消息“无法将参数值从字符串转换为`Int32`”。\n\
  \n![Image](img/9781430238102_Fig06-25.jpg)\n\n*图 6-25. 存储过程`Emp_Svc_Cost`所需的参数*\n\
  \n## 发现参数未设置为允许 NULL 值\n\n在“报表数据”窗口中，可以看到报表参数是从存储过程自动创建的。虽然 SSRS 确实正确地为每个参数分配了数据类型（整数和字符串），但它并未自动将字段设置为允许\
  \ NULL 值（见图 6-26）。出于本报表的目的（期望 NULL 值作为可能的参数），为每个参数选中“允许 NULL 值”复选框至关重要。这样，当预览报表时，NULL\
  \ 将是默认值，并且 NULL 复选框将自动选中，从而无需用户输入即可执行报表。请右键单击每个参数并选择“属性”，将所有参数更新为“允许 NULL 值”。然后在“常规”选项卡下勾选“允许\
  \ NULL 值”选项。\n\n![Image](img/9781430238102_Fig06-26.jpg)\n\n图 6-26. 报表属性对话框，显示了“允许\
  \ NULL 值”字段\n\n## 配置默认参数值\n\n默认参数值也需要手动配置。如果未为可用参数分配默认参数值，则报表在呈现或预览时，将不会处理传入数据，直到用户提供值。预览报表而不修改参数选择，会发现用户需要为每个未分配默认值的参数输入值。用户将无法从值列表中选择，而必须手动输入。这通常是不可接受的，因为用户可能并不总是知道要输入的正确值；用于选择特定员工的`EmployeeTblID`字段和用于检索部门名称的`BranchID`字段就是很好的例子。\n\
  \n第一步是为参数下拉列表提供有效的查询分配值。在从新数据集添加描述性参数值之前，先预览报表视图会很有帮助（见图 6-27）。请注意，参数选择旁边有一个选中的\
  \ NULL 复选框。当参数允许 NULL 值（如您之前设置的）并且没有其他可用值时，就会出现 NULL 复选框。\n\n![Image](img/9781430238102_Fig06-27.jpg)\n\
  \n图 6-27. 下拉列表中无可用参数值\n\n## 创建数据集以填充参数下拉列表\n\n可以使用以下脚本添加两个数据集，以填充“部门”和“员工”参数的下拉列表：\n\
  \n1.  在“报表数据”窗口中，右键单击“数据集”文件夹并选择“新建数据集”，在报表中嵌入两个新数据集`Employee_DS`和`Branch_DS`。对于您创建的两个数据集，您将添加简单的查询，这些查询将返回员工和部门的\
  \ ID（用于“值”属性）和名称（用于“标签”属性）。注意下面的员工查询的`WHERE`子句，为了简单起见，您只包含了一组已知的员工。在真实场景中，业务规则决定了过滤器，但您可能不会以这种方式硬编码值。我们只是展示了一种可以硬编码过滤器以返回用于参数下拉列表的子数据集的方法。\n\
  \n    ```\n    --Query for Employee Parameter\n    SELECT\n            EmployeeTblID\n\
  \            , RTRIM(RTRIM(E.LastName)  +  ', '  + RTRIM(E.FirstName)) as Employee_Name\n\
  \    FROM\n            Employee E\n    WHERE\n            (E.EmployeeTblID IN (32,\
  \ 15, 34, 44, 129, 146, 159, 155, 26))\n    --Query for Branch Parameter\n    SELECT\n\
  \            BranchID, BranchName\n    FROM\n            Branch\n    UNION\n   \
  \ SELECT     NULL AS BranchID, NULL AS BranchName\n    ```\n\n2.  使用上述查询创建数据集并通过“报表数据”窗口中的“查询”验证其正确执行后，展开“参数”文件夹。右键单击`BranchID`参数，选择“参数属性”，并为清晰起见，在提示中输入**部门**。您将在下拉列表中选择部门名称。\n\
  3.  在部门参数的“可用值”中，选择“从查询中获取值”，然后选择`Branch_DS`数据集。“值”字段将是`BranchID`，“标签”字段将是`BranchName`。\n\
  4.  按照相同的步骤修改员工参数，分配`Employee_DS`并分别选择“值”和“标签”字段为`EmployeeTblID`和`Employee_Name`。最后，如步骤\
  \ 2 所示，为清晰起见将提示更改为**员工**。完成后，选择“确定”。\n5.  最后，在“设计”选项卡上，您将为报表中的表格添加一个按“部门名称”的分组，以便在选择参数时，可以看到报表是针对特定部门的。为此，右键单击表格中“诊断”文本框左侧的行标题，然后选择“添加组”\
  \ >> “父组”。这将使“诊断”组（原为第一组）现为第二组，并将添加一个新组。将表达式值`=Fields!BranchName.Value`分配给新组，选择“添加组头”选项，并在“分组”对话框中单击“确定”。接下来，将`BranchName`字段从您刚创建的“部门”组的新第一列行中移动到“诊断”正上方的空白区域。此外，将该字段设为粗体，并将字体大小调整为\
  \ 12 磅。现在格式已设定，删除添加新`BranchName`组时创建的列。您可以通过右键单击它并选择“删除列”来删除该列。\n\n## 结果\n\n现在报表的可用参数值将具有填充的下拉列表，如图\
  \ 6-28 所示。请注意，对于您已添加可用值的两个参数，NULL 复选框已消失。\n\n![Image](img/9781430238102_Fig06-28.jpg)\n\
  \n图 6-28 具有已填充参数选择的报表\n\n\n您可以对 `ServiceLogCtgryID` 参数执行相同的步骤，从表值中提供一个有效的下拉列表。然而，由于您可能还会在一个同样接受参数值的自定义报表查看器中查看报表，这个特定的参数值目前对于直接用户输入来说用处不大。既然如此，利用另一个新的、非常需要的功能——隐藏参数的能力——将会很有帮助。此功能在\
  \ SQL Server 2000 的 SSRS Service Pack 2 中添加，并在之后的所有版本中均可用。有时，参数可以并且应该由用户输入之外的事件来填充。在这些情况下，用户看到这些额外的参数只会感到困惑。在“报表参数”对话框中，选择\
  \ `ServicesLogCtgryID` 属性，并勾选“隐藏”复选框。\n\n## 修改基于时间的参数\n\n修改此报表的基于时间的参数（`Service\
  \ Year` 和 `Service Month`）也将是有益的。基于时间的值通常处理起来很棘手，因为 `DateTime` 数据类型有特殊的格式需求，它可以存储年、月、日以及时、分、秒。为\
  \ `Service Year` 和 `Service Month` 参数设置有效值的步骤与前面介绍的 `Branch` 和 `Employee` 过程几乎相同，不同之处在于\
  \ `Service Year` 需要默认为当前年份，而不是 `NULL`。\n\n第一步是基于服务日期（即存储过程中的 `ChargeServiceStartDate`\
  \ 字段）为 `Service Year` 和 `Service Month` 参数创建一个数据集。您将在两个查询中使用 `DatePart` 和 `DateName`\
  \ 函数来派生有效值。日期的有效值取决于它们在表中的存在，因此，例如，如果您的数据包含 2009 年和 2010 年的值，则下拉列表中只会显示这两年。以这种方式填充日期值可以避免用户必须输入日期，也防止报表设计者必须在报表中硬编码年份和月份值。这些\
  \ `Year` 和 `Month` 数据集已经添加到报表中。但是，我们需要像之前那样，将参数的“可用值”设置为“从查询中获取值”。对于 `ServiceMonth`，使用\
  \ `Month` 数据集，并将 `ServiceYear` 设置为使用 `Year` 数据集。\n\n清单 6-2 显示了驱动参数值的两个查询。\n\n**清单\
  \ 6-2.** 参数值查询\n\n```sql\n--Query to Derive Year\nSELECT\n        DISTINCT DATEPART(yy,\
  \ ChargeServiceStartDate) AS Year\nFROM\n        Trx\nUNION\nSELECT Null AS Year\
  \ ORDER BY Year\n```\n\n```sql\n--Query to Derive Month\nSELECT\n        DISTINCT\
  \ DATEPART(mm, ChargeServiceStartDate) AS DateNum\n        , DATENAME(mm, ChargeServiceStartDate)\
  \ AS Month\nFROM\n        trx\nUNION\nSELECT Null AS DateNum, Null AS Month ORDER\
  \ BY DATEPART(mm, ChargeServiceStartDate)\n```\n\n## 完成报表和参数\n\n要完成报表，请右键单击 `BranchName`\
  \ 字段，选择“插入行”，然后选择“组内 - 下方”，将 `Service Year` 字段添加到报表中。通过将光标放在 `BranchName` 下方创建的空白区域的右上角并单击字段列表框，从字段选择器列表中选择\
  \ `Year` 字段。将聚合方式从默认的 `SUM` 更改为 `FIRST`。接下来，使用独特的颜色（本例中为深鲑鱼色）进行格式化，将对齐方式设置为左对齐，然后将字段大小调整为\
  \ 12 磅。然后，将所有参数（`Service Year` 除外）的默认值设置为 `(NULL)`。为此，请使用“报表参数属性”下的“默认值”选项卡。然后选择“指定值”并单击“添加”按钮。\n\
  \n在预览报表之前，重要的是设置年份的默认值，这样有效的 `Service Month` 选择就不会基于默认的 `Service Year` 字段 `NULL`。这可能会产生意想不到的结果；换句话说，用户可能选择一月并认为它指的是当前年份的一月，但实际上它可能是一月份的所有记录。\n\
  \n要使 `Service Year` 参数默认为当前年份，请转到“参数”对话框，并将“默认值”选项设置为以下表达式：\n\n`=CINT(DATEPART(\"\
  yyyy\", Now()))`\n\n此外，在此报表中，我们希望在 `Service Month` 之前显示 `Service Year` 参数，因此让我们将\
  \ `ServiceYear` 参数移动到 `ServiceMonth` 参数之上。像这样重新组织参数也会改变它们在运行时的顺序。打开“报表数据”窗格并展开“参数”文件夹。选择\
  \ `ServiceYear` 参数，然后单击“报表数据”窗格菜单中的向上箭头。您可以预览报表并提供参数值（参见图 6-29）。\n\n![Image](img/square.jpg)\
  \ **注意** `Pro_SSRS` 数据库中的大多数数据来自 2009 年和 2010 年。如果当前年份默认为其他年份，您看到的数据可能与图 6-29 中的不同。\n\
  \n![Image](img/9781430238102_Fig06-29.jpg)\n\n**图 6-29.** 包含有效年份和月份值的报表\n\n`Pro_SSRS`\
  \ 项目中的 `EmployeeServiceCost_SP_Completed.rdl` 报表包含了已填充的参数。\n\n\n### 处理多值参数\n\n多值参数是针对\
  \ SQL Server 2005 发布的一项增强功能，它可能是 SSRS 更新中最备受期待的功能之一。能够独立选择多个值来填充报表，这是一个强大的功能，大多数其他报表应用程序都视其为理所当然，但在\
  \ SQL Server 2000 的 SSRS 中却不可用。然而，要充分利用多值参数，需要特殊的设计考量，正如第 3 章所述。其原因在于，特别是在使用存储过程时，多值参数会以字符串值的形式传回存储过程。要有效地使用多值参数，唯一的方法是了解查询或存储过程将根据用户的选择来评估返回给它的全部、一个或多个值。由于\
  \ SQL Server 评估存储过程中字符串的方式与评估单个值的方式不同（老实说，这多年来一直是 SQL 开发人员的长期困扰），你必须在使用多值参数时就明白，如果你想将存储过程和多值参数与\
  \ SSRS 一起使用，可能必须解析字符串值。对于我们这类作家/逻辑学家来说，这是一个有趣的游戏。对于其他人来说，他们需要为大量受众开发带有多个输入参数的报表，这可能是一场噩梦。请放心，一旦你掌握了字符串操作技术，多值参数将是一项值得投入时间的功能。\n\
  \nSSRS 确实开箱即用地支持查询的多值参数，只要它们不是存储过程即可。要与查询一起使用多值参数，只需在将用作报表中数据集的查询的 `WHERE` 子句中使用\
  \ `IN` 关键字。在这种情况下，SSRS 会在运行时根据你在报表中的选择为你重写查询。这是一个直接且文档齐全的过程。然而，出于前述原因，我们喜欢使用存储过程，因此我们必须做出特别的调整，你将会看到这一点。\n\
  \n为了准确演示如何将存储过程与多值参数（此后我们将亲切地称之为 MVPs）一起使用，我们以 Employee Service Cost 报表的一个副本为例，并假设你将重新设计它以接受\
  \ `Year` 和 `Month` 参数作为多值。首先，你必须修改你的基础存储过程。以前，使用清单 6-3 中的逻辑来评估你的 `Year` 和 `Month`\
  \ 参数表达式是没问题的。\n\n**清单 6-3.** 无 MVPs 时评估 `Year` 和 `Month` 参数的逻辑\n\n```\n1=Case\n\
  \    When (@ServiceYear IS NULL) then 1\n    When (@ServiceYear IS NOT NULL) AND\
  \ @ServiceYear =\n        Cast(DatePart(YYYY, ChargeServiceStartDate) as int) then\
  \ 1\n    else 0\nEnd\nAND\n1=Case\n    When (@ServiceMonth is NULL) then 1\n   \
  \ When (@ServiceMonth is NOT NULL) AND @ServiceMonth =\n        Cast(DatePart(MM,\
  \ ChargeServiceStartDate) as int) then 1\n    else 0\nEND\n```\n\n然而，现在你将使用 MVPs，`NULL`\
  \ 值是不可接受的。在你的逻辑中，`NULL` 值的含义是选择所有值。这妨碍了你接受多个值。例如，如果你有 2007、2008、2009 和 2010 作为有效值，你可以通过选择\
  \ `NULL` 来选择所有值，或者只选择一个值来筛选数据。你无法同时选择 2008 *和* 2009。使用多值参数，你就可以做到。有效使用 MVPs 的唯一途径是通过为报表提供数据的查询或存储过程的\
  \ `WHERE` 子句，并配合参数使用。你必须利用 T-SQL 的 `IN` 子句来充分利用 MVPs。不幸的是，事情并不像将存储过程修改为 `Where value\
  \ IN (@MyParameter)` 那么简单，因为在使用存储过程参数时，SQL 不会将 `IN` 子句作为字符串来评估。我们可以通过以下例子最好地解释这一点，你可以在本书源代码的\
  \ `Pro_SSRS` 项目中打开 `EmployeeServiceCost_MVP.rdl` 报表来查看。\n\n假设你将 `Year` 和 `Month`\
  \ 报表参数设为多值参数。你可以很简单地做到这一点：在报表参数属性窗口中勾选 `允许多个值` 复选框，如图 6-30 所示。另请注意，`允许 Null 值` 复选框未被勾选。如果你想让\
  \ MVPs 正常工作，`允许 Null 值` 选项就不能被勾选。\n\n![Image](img/9781430238102_Fig06-30.jpg)\n\n\
  **图 6-30.** MVP 选项\n\n如果你现在执行报表，你会看到，就像在前面的例子中使用数据集填充可用值一样，你能够为年和月选项选择一个、多个或所有值，如图\
  \ 6-31 所示。\n\n由于 MVP 的值将以字符串形式返回——以年为例，如 `\"2007,2008\"`——这与你定义的存储过程逻辑无法配合工作。你需要修改存储过程以使用\
  \ `IN` 子句，使该值等价于以下表达式：\n\n```\nWHERE 1 = CASE WHEN CAST(DATEPART(YYYY, ChargeServiceStartDate)\
  \ AS VARCHAR((20)) IN (@Year)\nEND\n```\n\n这里的问题是变量 `@Year` 将被作为字符串评估，而不是像在存储过程中定义的那样作为整数。如果你只选择一个值——例如\
  \ 2007——这是可以的，因为 SQL 会正确地评估 `IN` 子句中的单个值。但是，当选择多个值或“全选”时，SSRS 会传递一个诸如 `\"2007,2008,2009,2010\"\
  ` 的字符串。当在存储过程中进行评估时，查询将失败。你需要首先将 `Year` 和 `Month` 的数据类型更�为字符或字符串值。因此，你将为存储过程选择 `varchar(20)`，并在值传入时解析它们。使用\
  \ `varchar(20)` 将允许你选择足够宽的范围来覆盖 `Year` 和 `Month` 的值字符串。\n\n![Image](img/9781430238102_Fig06-31.jpg)\n\
  \n**图 6-31.** 多参数选择\n\n\n此外，你还需要决定从报表返回字符串后的最佳解析方式，这同时关乎性能和通用性。有两种有效的方法可以实现这一点：动态\
  \ SQL 或用户定义函数（UDF）。创建动态 SQL（本质上是利用用户输入定义的变量来构建可变的 SQL 表达式）过程繁琐且语法复杂。将 SQL 语句包裹在引号中并以编程方式拼接变量既耗时又常常令人沮丧，并且会产生不可预测的结果。更糟糕的是，这会为\
  \ **SQL 注入攻击** 洞开大门，攻击者可以插入可能执行非开发者本意的语句的字符串值。对于 MVP 场景，处理字符串值的最佳方式是通过一个 UDF 来解析各个值，并将它们传入查询的\
  \ IN 子句。既然已知值总是以逗号分隔的字符串形式返回，那么使用为此目的设计的函数将这些值加载到一个可访问的表中就会容易得多。这种函数被称为 **表值函数**，因为输入字符串的解析行会被加载到一个表中，该表随后可以在调用存储过程中作为子查询被引用。让我们看一下你在使用\
  \ MVP 时将在存储过程中使用的解析函数。清单 6-4 定义了名为 `fn_MVParam` 的 UDF。这个函数位于你一直在使用的 `Pro_SSRS` 数据库中。\n\
  \n**清单 6-4.** `fn_MVParam`，字符串解析函数\n```sql\nCREATE FUNCTION dbo.fn_MVParam(@RepParam\
  \ nvarchar(4000), @Delim char(1)= ',')\nRETURNS @Values TABLE (Param nvarchar(4000))\n\
  AS\n    BEGIN\n    DECLARE @chrind INT\n    DECLARE @Piece nvarchar(4000)\n    SELECT\
  \ @chrind = 1\n    WHILE @chrind > 0\n        BEGIN\n            SELECT @chrind\
  \ = CHARINDEX(@Delim,@RepParam)\n            IF @chrind  > 0\n                SELECT\
  \ @Piece = LEFT(@RepParam,@chrind - 1)\n            ELSE\n                SELECT\
  \ @Piece = @RepParam\n            INSERT  @Values(Param) VALUES(@Piece)\n      \
  \      SELECT @RepParam = RIGHT(@RepParam,LEN(@RepParam) - @chrind)\n          \
  \  IF LEN(@RepParam) = 0 BREAK\n    END\n    RETURN\nEND\n```\n\n当从你的 `Emp_Svc_Cost_MVP`\
  \ 存储过程中调用此函数时，它将返回从 SSRS 多值参数选择中解析出的值，并允许你将其用作筛选报告数据的标准。这个函数的关键在于它本身使用了几个 T-SQL\
  \ 函数，例如 `CHARINDEX`、`LEN` 和 `LEFT`，来用报告参数字符串中的各个项填充 `@Values` 表。清单 6-5 所示的对基础 `Emp_Svc_Cost`\
  \ 存储过程的修改，是使 `Emp_Svc_Cost_MVP` 存储过程能有效处理 MVP 所必需的。\n\n**清单 6-5.** 针对 MVP 修改 `WHERE`\
  \ 子句\n```sql\n1 = CASE WHEN CAST(DATEPART(YYYY, ChargeServiceStartDate) AS VARCHAR(20))\
  \ IN\n        (SELECT [PARAM] FROM fn_MVParam(@ServiceYear, ',')) THEN 1\n    ELSE\
  \ 0\n    END\nAND\n1 = CASE WHEN CAST(DATEPART(MM, ChargeServiceStartDate) AS VARCHAR(20))\
  \ IN\n        (SELECT [PARAM] FROM fn_MVParam(@ServiceMonth, ',' )) THEN 1\n   \
  \ ELSE 0\n    END\n```\n\n请注意，这里没有使用类似 `IN (@Year)` 这种无效的写法，而是调用了你的函数 `fn_MVParam`。该函数接受两个值：字符串和分隔符。在此例中，你使用逗号作为分隔符。\n\
  \n当报表运行并调用新函数时，你可以看到你可以从填充的下拉列表中选择一个、两个、任意组合或全部值，并且你知道你的存储过程将有效地处理解析、求值以及标准判断，以仅交付你想在报表中看到的数据，如图\
  \ 6-32 所示。\n\n![Image](img/9781430238102_Fig06-32.jpg)\n\n**图 6-32.** 使用多重选择条件生成的报告\n\
  \n`Pro_SSRS` 项目中已完成的多值参数报告名为 `EmployeeServiceCost_MVP.rdl`。\n\n#### 应用筛选器\n\n你可能还记得第\
  \ 2 章中，你通过移除仅查看访问量的标准来提升了存储过程 `Emp_Svc_Cost` 的性能。现在，你将对报表应用一个筛选器，以替代原始的查询条件，从而仅显示访问记录。\n\
  \n你可以使用 **筛选器** 在查询结果返回后从报告中排除某些值。从这个意义上说，筛选器可以避免重新查询；然而，完整的数据集仍会被返回到报表。在第 2 章的示例中，你知道只会返回有限数量的多余行。当数据提供程序不支持查询参数，或者使用报告快照时，你应该使用筛选器。你同样应该在针对特定请求或解决方案、且与其他报表基于相同存储过程的报告中使用筛选器，因为你可以使用筛选器而无需修改现有的存储过程。以下是一个应用于报表表格数据区域的简单筛选器表达式，它将排除所有非访问记录的行：\n\
  \n`=Fields!ServiceTypeID.Value = \"V\"`\n\n要添加此筛选器表达式，请在“布局”选项卡上，右键击表格的左上角部分，然后选择“Tablix\
  \ 属性”。在“筛选器”选项卡中，输入前面的表达式，使其看起来如图 6-33 所示。将该筛选器添加到书籍源代码中 `Pro_SSRS` 项目所包含的 `EmployeeServiceCost_MVP.rdl`\
  \ 报告中。\n\n![Image](img/9781430238102_Fig06-33.jpg)\n\n**图 6-33.** 用于排除非访问记录的筛选器对话框\n\
  \n在 `Pro_SSRS` 项目中，已对 Tablix 数据区域应用了筛选器的完整报告名为 `EmployeeServiceCost_MVP_Filter.rdl`。\n\
  \n\n#### 添加图表\n\nSSRS 提供了一个样式与 Microsoft Excel 相似的**图表**数据区域。图表的作用范围可以局限于当前数据集，也可以使用其自身的数据集。在本例中，您将在报表开头添加一个堆积条形图，用于显示排名前十的诊断及其服务次数计数。这本质上将反映迄今为止报表中提供的数据。该报表现在也按“分支机构”分组，这将自动分离您已定义的“分支机构”组中的值。您需要在图表中模拟此行为。在此特定数据集中，您只有三个分支机构，因此结果应与报表的详细信息一致。请打开\
  \ `Pro_SSRS` 项目中的 `EmployeeServiceCost_MVP_Chart_Start.rdl` 报表，并按照以下步骤将图表添加到报表中：\n\
  \n1.  在“设计”选项卡上，单击并拖动您已定义的表格，为图表腾出空间。\n2.  单击并拖动**图表**数据区域到表格上方的区域。\n3.  在图表任意位置右键单击，选择“更改图表类型”，然后在“条形图”区域选择“堆积条形图”。\n\
  4.  使用为报表已定义的 `Chart_DS` 数据集；将 `DiagVisits` 拖到图表的“值”区域。\n5.  将 `Diagnosis` 字段拖到图表的“类别组”区域。\n\
  6.  将 `Patient_Count` 字段拖到图表中 `DiagVisits` 系列下方的“值”区域。\n7.  调整图表大小，使其与下方的表格对齐。您可以选择这两个报表元素，然后在工具栏上选择“使宽度相同”图标。\n\
  8.  在“诊断”类别组上右键单击，然后单击“筛选器”选项卡。单击“添加”按钮，为该类别组添加筛选器。由于您希望报表仅显示排名前十的诊断，因此需要为此分组添加一个筛选器。您将使用“前\
  \ N 个”运算符来实现此目的，如 `图 6-34` 所示，该筛选基于诊断访问计数总和排名前十的诊断。在“诊断”类别组属性对话框中，单击“排序”选项卡。将默认排序依据更改为表达式\
  \ `=SUM(Fields!DiagVisits.Value)`，并将排序顺序选择为“A 到 Z”。\n\n`Image` `images/9781430238102_Fig06-34.jpg`\n\
  \n`图 6-34. 用于筛选前十位诊断的筛选器值`\n\n最后，您可以预览报表。有时，报表需要在分析详细信息之前，先用一个图表来快速查看数据。浏览此报表的人可能会发现图表很有趣，例如，它显示“物理治疗\
  \ NEC”诊断在“内斯特谷”分支似乎更为普遍。这个初步预览可能值得进行更多调查，这可以从报表的详细信息中获得。\n\n预览时，报表应如 `图 6-35` 所示。\n\
  \n`Image` `images/9781430238102_Fig06-35.jpg`\n\n`图 6-35. 包含图表的员工服务成本报表`\n\n图表数据区域有许多可以应用的属性，如\
  \ `第 5 章` 所述；然而，堆积条形图的外观对于您的报表来说已经足够，可以直接部署。不过，通过一些轻微的调整，例如删除图表标题、坐标轴标题以及选择“默认”配色方案，最终报表开始呈现出更简洁的外观和感觉。`Pro_SSRS`\
  \ 项目中包含已应用于图表数据区域筛选器的完整报表名为 `EmployeeServiceCost_MVP_Chart.rdl`。\n\n#### 添加 Tablix\
  \ 元素\n\nSSRS 2008 通过 **Tablix** 数据区域引入了报表设计方面的重大变革。本质上，Tablix（在 `第 4 章` 中有详细介绍）结合了**表格**和**矩阵**数据区域的特性。SSRS\
  \ 2005 中可用的表格区域能够很好地处理基于数据集的、长度可变的行数据。相应地，矩阵数据区域包含了对可变数量列的支持。Reporting Services\
  \ 2008 允许使用任一控件在报表中的任意位置包含自定义的行组或列组。正如您将在后续对员工服务成本报表的添加中看到的，向表格数据区域添加列分组非常直接。\n\n\
  在接下来的“配置报表和组变量”部分中，您将使用 `Year` 字段向 `EmployeeServiceCost_Tablix_Start` 报表添加一个列组。`Year`\
  \ 字段（您可能还记得）指示为患者提供服务类型的年份。到目前为止，报表中包含不同的患者和员工计数，以及估计成本和服务次数。那么，如果您希望查看这些值按多年服务年份分组的情况，该怎么办呢？\n\
  \n您将执行以下操作，为员工服务成本报表添加一个按 `Year` 分组的列组：\n\n1.  在表格中的 `[CountDistinct(PatID)]` 单元格上右键单击，选择“添加组”，然后在“列组”部分下选择“父级组”。\n\
  2.  在“分组依据表达式”字段中，选择 `[Year]`。不要勾选“添加组标题”或“添加组页脚”按钮。单击“确定”。\n3.  由于我们希望组之间相互独立，因此现在需要添加一个称为**相邻组**的组。在我们刚刚创建的新\
  \ `[Year]` 字段上（应位于“患者数”标签的正上方）右键单击，选择“添加组”，然后选择“相邻右侧”。像步骤 2 一样，按 `[Year]` 分组。单击“确定”。此新列将保存当前存在的“员工数”列中的所有值。在步骤\
  \ 5 中，我们将把所有值移动到新的 `[Year]` 列下方。\n4.  再执行两次步骤 3，每次都使用最右侧的 `[Year]` 字段。\n5.  现在我们有了三个仅包含列分组\
  \ `[Year]` 的列，我们需要将现有值移动到它们下方。此时，设计界面应如 `图 6-36` 所示。接下来，选择“员工数”、“估计成本”和“服务次数”列中的所有字段。务必也选择标题文本！然后将值从其原始单元格剪切并粘贴到我们在步骤\
  \ 2 和 3 中创建的新相邻组下的三个空列中。\n6.  右侧的三列不再需要。通过右键单击列并选择“删除列”来删除它们。您可以按住 CTRL 键选择它们。\n\
  7.  最后，调整列的宽度，留出足够的空间来显示标签，如 `图 6-37` 所示。\n\n`Image` `images/9781430238102_Fig06-36.jpg`\n\
  \n`图 6-36. 移动字段之前的设计布局`\n\n完成后，报表在“设计”选项卡上应类似于 `图 6-37`。您还可以在表格上的“行组”和“列组”区域看到分组的可视提示，您现在各有四个组。`Pro_SSRS`\
  \ 项目中已应用列组的 Tablix 数据区域的完整报表名为 `EmployeeServiceCost_Tablix.rdl`。\n\n`Image` `images/9781430238102_Fig06-37.jpg`\n\
  \n`图 6-37. 列分组的设计布局`\n\n当您预览报表并选择多个年份时，如 `图 6-38` 所示（选择了 2009 年和 2010 年以及所有月份），您可以看到列分组自动水平扩展并相应地对值进行分组。例如，在选定的月份中，充血性心力衰竭在\
  \ 2009 年有 75 次家庭健康助理访问，而在 2010 年只有 16 次。\n\n`Image` `images/9781430238102_Fig06-38.jpg`\n\
  \n`图 6-38. 带有列分组的员工服务成本报表预览`\n\n\n### 配置报告与组变量\n\n自 SQL 2000 的初始版本以来，SSRS 就实现了全局变量。这些变量（例如\
  \ `ExecutionTime` 和 `UserID`）可在报告中使用。例如，表达式 `=Globals!ExecutionTime` 返回报告被执行的时间。与表达式\
  \ `Now()` 返回的值不同，该值在报告呈现后不会改变，因此在报告中翻页不会改变全局变量的值。\n\nSSRS 2008 引入了两种新变量类型——报告变量和组变量——它们可以在设计时或运行时配置，并在整个报告执行和查看过程中保持静态。在本节中，你将使用一个报告变量为\
  \ `Visit_Count` 字段创建一个阈值，以便在报告运行时，你可以计算访问次数是否达到了报告变量设定的阈值。你将在新的 SSRS 仪表控件中再次使用同一个变量。\n\
  \n要配置报告变量，请进入设计模式，点击 `Report`（报告）菜单下的 `Report Properties`（报告属性），然后选择 `Variables`（变量）选项卡。你需要按\
  \ 图 6-39 所示添加报告变量。你将设置的阈值是每日平均访问次数。推导此值的方法是一个简单的计算：对唯一字段 `Trx.ServicesTblID` 进行非重复计数，然后除以一个天数范围，例如一年\
  \ 365 天。我们对 `Pro_SSRS` 数据库的计算显示，2009 年的日均访问次数为 44。因此，下一步是创建一个报告变量来保存这个阈值值。\n\n要设置报告变量，请从\
  \ `Pro_SSRS` 项目中打开 `EmployeeServiceCost_Variables_Start.rdl` 报告，转到 `Design`（设计）选项卡，点击\
  \ `Report` 菜单下的 `Report Properties`，然后点击 `Variables` 选项卡。点击 `Add`（添加），输入 `Threshold`\
  \ 作为变量名，`44` 作为值，并取消选中 `Read-Only`（只读），如 图 6-39 所示。\n\n![Image](img/9781430238102_Fig06-39.jpg)\n\
  \n*图 6-39. 添加报告变量*\n\n与报告变量类似，组变量可以为一个或多个行组或列组配置。它们对于存储静态值非常有用，例如产品及其子类别或子组的不同税率。\n\
  \n### 添加仪表控件\n\n仪表控件是外观最吸引人的类型之一，对于专注于关键绩效指标 (KPI) 的报告非常有用。此类报告设计用于仪表板格式，以便一目了然地查看数据，正如你在\
  \ 第 5 章 中看到的那样。在本节中，我们将把上一节中创建的报告变量与这些新控件之一结合使用，在员工服务成本报告中创建一个视觉提示。该报告将显示我们所分析时间段内的每日访问次数。\n\
  \n你可以通过一个非常简单的计算来确定平均访问次数：将访问次数总和除以 `ChargeServiceStartDate` 字段的非重复计数。你可以使用 `Emp_Svc_Cost_MVP`\
  \ 存储过程执行该计算。这个平均访问次数值将成为仪表控件中的两个指针之一，该控件将是多条形仪表。控件中的另一个指针将保存阈值 44。\n\n首先，将一个仪表控件从工具箱拖到图表右侧的报表上。确保它位于矩形内部。选择\
  \ `Multiple Bar Pointers`（多条形指针）仪表。默认情况下会有三个条形。本报告将只使用其中两个条形：`LinearPointer1` 和\
  \ `LinearPointer2`。请右键单击最小的条形 (`LinearPointer3`) 并选择 `Delete Pointer`（删除指针）将其删除。右键单击指针\
  \ `LinearPointer1` 并选择 `Pointer Properties`（指针属性），将表达式 `=Variables!Threshold.Value`\
  \ 分配给它。在属性窗口中，如 图 6-40 所示，分配变量表达式值。\n\n![Image](img/9781430238102_Fig06-40.jpg)\n\
  \n*图 6-40. 将报告变量值分配给仪表指针*\n\n接下来，将确定从参数中选择的时间范围内平均访问次数的表达式分配给 `LinearPointer2`。由于多值参数是查询参数，你知道报告中的数据将仅限于从\
  \ `Month`（月份）和 `Year`（年份）参数中选择的值。如果你使用的是报告参数并随后在报告中过滤数据，情况就不会是这样。例如，知道计算平均值的天数会根据所选的\
  \ `Month` 和 `Year` 参数值而变化，这使得计算 `LinearPointer2` 的值变得容易。你可以这样编写计算式：\n```\n=SUM(Fields!Visit_Count.Value)\
  \ / CountDistinct(Fields!ChargeServiceStartDate.Value)\n```\n你的最后一步是为指针设置颜色编码，使得指针在值小于等于\
  \ 44 时显示为红色，超过 44 时显示为绿色。右键单击 `LinearPointer2` 并选择 `Pointer Properties` 选项。接下来，点击\
  \ `Pointer Fill`（指针填充）选项卡。点击辅助颜色右侧的 `Expression`（表达式）按钮，输入以下表达式，然后点击 `OK`（确定）：\n\
  ```\n=IIF(Sum(Fields!Visit_Count.Value) / CountDistinct(DAY(Fields!ChargeServiceStartDate.Value)\
  \ &\nYEAR(Fields!ChargeServiceStartDate.Value)) < Variables!Threshold.Value, \"\
  Red\", \"Green\")\n```\n图 6-41 中报告的最终视图选择了 `ServiceYear` 参数值为 2009 和 2010。你可以看到，对于所选的年份和月份值，阈值已经达到。在\
  \ `Pro_SSRS` 项目中，包含所有最终调整的完整报告名为 `EmployeeServiceCost_Variables.rdl`。\n\n![Image](img/9781430238102_Fig06-41.jpg)\n\
  \n*图 6-41. 包含仪表控件的报告最终视图*\n\n\n"
- '# 添加最终修饰


  在许多项目中，最终的润色工作可能相当耗时。现在，你已将员工服务成本报告调整到符合预期，并在开发过程中应用了一定程度的格式。在将报告标记为完成并准备部署到你的 SSRS
  Web 服务器用于生产之前，只剩下几个最终元素需要应用：


  *   添加页眉和页脚

  *   添加报告标题

  *   添加页码

  *   添加报告执行时间


  要为报告添加页眉和页脚，请选择“报告”菜单，然后选择“添加页眉”和“添加页脚”。这将向报告中添加两个新部分，你将在其中添加将打印在每一页上的值。


  在工具箱中，你会看到两个报告项：文本框和线条，它们可以在页眉和页脚部分使用。首先，将两个文本框拖到页眉，一个拖到页脚。然后，将其中一个页眉文本框对齐到与表格相同的宽度，将你的报告标题输入为`Employee
  Service Cost by Diagnosis`，将字体大小更改为 16 磅，并应用粗体格式。接着，将一条线拖到页眉部分，并将其定位在你刚刚创建的图表和报告标题文本框之间。


  在页眉部分的第二个文本框中，添加以下基于全局参数的表达式（在“编辑表达式”窗口中定义）：


  ```

  ="Page " & Globals!PageNumber & " of " & Globals!TotalPages

  ```


  最后，在页脚的文本框中，添加以下用于报告执行时间的表达式：


  ```

  =Globals!ExecutionTime

  ```


  现在，你已准备好在将报告部署给用户之前最后一次预览它。这次，让我们在浏览器中查看最终版本（参见图 6-42）。这就是报告部署到 Web 服务器后的样子。（我们将在第
  8 章中讨论部署报告的方法）。预览报告后，滚动到报告底部以查看页脚中的报告执行时间。所有最终润色完成的报告可以在 Pro_SSRS 项目中找到，名为`EmployeeServiceCost_Final.rdl`。


  ![Image](img/9781430238102_Fig06-42.jpg)


  **图 6-42.** 在浏览器中呈现的报告


  '
- '# 小结


  看起来我们在使用 SSRS 设计报告解决方案的实际设计方面覆盖了很多内容。然而，与此同时，我们才刚刚触及 SSRS 强大功能和灵活性的表面。我们尚未展示如何交织自定义程序集以执行超越基本表达式的特定功能。在本书的其他部分，你还将使用我们在此未涉及的其他数据区域。此外，你在本章中仅处理了少量报告；在业务中，尤其是在将现有报告迁移到
  SSRS 时，通常需要同时处理许多报告。部署、管理和保护这些报告将成为关键的下一步。


  幸运的是，强大而灵活的设计环境只是 SSRS 的一个组成部分。在接下来的章节中，你将使用各种方法来部署、保护和分析你在此设计的报告的性能。


  '
- '# 第 7 章


  '
- "# 在报告中使用自定义 .NET 代码\n\nSSRS 为软件开发人员提供了多种选项，用于通过代码自定义报告。这些选项使软件开发人员能够使用.NET 代码编写自定义函数，这些函数可以与报告字段、参数和过滤器交互，其方式与任何内置函数非常相似。仅举两个例子，你可以创建一个自定义函数来执行以下操作：\n\
  \n*   实现业务规则，并根据逻辑返回`true`或`false`。你可以将此类函数用作表达式的一部分，以根据传递给函数的字段或参数更改字段的值或样式。\n\
  *   从 SSRS 2012 无法直接使用的其他来源读取数据。你可以通过让自定义代码直接从源读取数据来实现这一点。本章的示例代码还包括一个从 Web 服务读取数据的示例。\n\
  \n简而言之，使用自定义.NET 代码使开发人员能够将 SSRS 的功能扩展到超出其开箱即用功能的范围。本章将涵盖以下内容：\n\n*   使用嵌入在报告中的代码在报告内使用自定义代码。这是将自定义代码添加到报告的最简单方法，并且它随你的报告一起部署，因为它包含在\
  \ RDL 中。然而，它限制了你的能力，因为你只能使用一小部分.NET 库，必须用 VB .NET 编写，并且提供有限的调试支持。你还限制了代码的可重用性，因为你必须手动移动并更改可能包含在不同报告中的任何代码。\n\
  *   使用报告调用的自定义程序集在报告内使用自定义代码。这种方法实现起来更复杂，部署起来更困难，但它为你提供了几乎无限的灵活性。你的自定义代码拥有.NET 框架的全部功能可供使用，并且具有额外的优点，即你可以在多个报告中使用单个程序集来复用自定义代码。你还可以在开发自定义程序集时使用\
  \ Visual Studio 的完整调试功能，并将其包含在任何代码存储库（如 Team Foundation Server）中。\n\n通常，当你需要执行复杂函数并需要完整编程语言的功能来完成它们时，你会将自定义代码添加到报告中。但是，在开始编写自定义.NET\
  \ 代码之前，你应该首先评估使用内置表达式功能是否能满足你的需求。使用.NET 嵌入式代码或自定义程序集而不是本机 SSRS 函数可能会导致严重的性能下降。如果你不需要在\
  \ SSRS 报告中使用.NET 来执行任务，那么你可能不应该承担报告内代码或自定义程序集的额外开销。\n\n\n### 在报告中使用嵌入式代码\n\n在报告中使用嵌入式代码是目前在报告中实现自定义\
  \ .NET 代码最简单的方式，这主要有两个原因。首先，您只需使用 BIDS 或 Visual Studio 中报表设计器的用户界面 (UI) 直接将代码添加到报表即可。其次，该代码会成为报告\
  \ RDL 文件的一个片段，使得部署非常简单，因为它是您报告的一部分，可以一步完成部署。\n\n尽管嵌入式代码更易于使用，但有几点注意事项您需要考虑：\n\n\
  > *嵌入式代码必须用 VB .NET 编写*。如果您是 C# 程序员或使用其他 .NET 兼容语言作为主要开发语言，这可能会迫使您对除最简单函数之外的所有情况都使用自定义程序集。如果您正在开发复杂的代码，您很可能无论如何都会选择自定义程序集的方式，以便获得调试和源代码控制选项。\n\
  >\n> *所有方法都必须是实例化的*。这意味着这些方法将属于代码对象的一个实例化实例，您不能拥有静态成员。\n>\n> *仅支持基本操作*。这是因为，默认情况下，代码访问安全性会阻止您的嵌入式代码调用外部程序集和受保护的资源。您可以通过\
  \ SSRS 安全策略更改这一点，但这需要向报告表达式主机授予 `FullTrust`（完全信任），这将授予对 CLR 的完全访问权限，绝对不推荐这样做。如果您需要这些功能，请使用自定义程序集，以便您可以实施安全策略，仅授予每个程序集其所需的安全权限。您将在“部署自定义程序集”一节中了解自定义程序集以及如何为其设置安全。\n\
  \n在运行本章的示例之前，请确保阅读随示例代码提供的 `ReadMe.htm` 文件，该文件可从 www.apress.com 的 Source/Download\
  \ 页面下载。它位于本章示例根目录下的一个文件中。如果您在 Visual Studio 2010 中打开代码，它将在“解决方案项”文件夹下。它包含了运行示例所需的设置和配置步骤。\n\
  \n让我们通过向您已经创建的一个报告中添加一些嵌入式代码，来看看 SSRS 的这一功能是如何工作的。在本例中，从本章附带的示例“员工服务成本报告”开始。它是您在第\
  \ 6 章中创建的“员工服务成本报告”的一个略微修改版本。我们将向您展示如何使用嵌入式代码功能添加一个函数，该函数将确定您在给定时间段内是否超过了某种治疗类型的单次就诊成本上限。然后，您将使用该函数来确定报告中一个文本字段的颜色，以帮助引起对这些特定治疗类型的注意。\n\
  \n![Image](img/square.jpg) **注意** 在本章的示例中，我们将使用在第 6 章中创建的报告的一个略微修改版本，以便员工报告参数将包含一种治疗，该治疗有足够多的患者超过了最大就诊次数和平均成本。\n\
  \n### 使用 ExceedMaxCosts 函数\n\n清单 7-1 是您将添加到“员工服务成本报告”中的自定义代码的完整清单。这是一个简单的函数，名为 `ExceedMaxCost`，用于确定某种治疗类型在一段时间内是否超过了平均成本。这使您可以识别需要审查的案例，以确定为什么其服务成本如此之高。\n\
  \n**清单 7-1.** ExceedMaxCost 函数\n\n```\nFunction ExceedMaxCost(ByVal visitCount As\
  \ Integer, ByVal estCost As Integer) As Boolean\n    ' 我们的业务逻辑要求，只有当就诊次数大于 10 时，\n\
  \    ' 我们才需要知道平均每次就诊成本是否超过某个值\n\n    If ( visitCount > 10)\n            If (estCost/visitCount\
  \ > 45)\n                    Return True\n            End If\n    End If\n\n   \
  \ Return False\n\nEnd Function\n```\n\n如果您想按照书中的代码进行操作，您需要创建一个新的 Visual Studio 2010\
  \ BI 项目，选择“Reporting Services”子类别和“Report Server Project”类型，如图 7-1 所示。对于此示例，将解决方案命名为\
  \ `Chapter 7`，项目命名为 `Reports`。\n\n![Image](img/square.jpg) **注意** 随着 SQL Server\
  \ 2012 的发布，BIDS 现已直接集成到 Visual Studio 中。无论您是从 BIDS 还是从 Visual Studio 创建此项目，最终的项目和解决方案都是相同的。\n\
  \n![Image](img/9781430238102_Fig07-01.jpg)\n\n**图 7-1.** 创建一个 Visual Studio BI 项目\n\
  \n要将现有的 `EmployeeServiceCost-NoCode.rdl` 文件添加到您的新项目中，请右键单击“Reports”文件夹，然后选择“添加”![Image](img/U001.jpg)“现有项”，如图\
  \ 7-2 所示。或者，在“Reports”项目高亮显示时，从菜单中选择“添加现有项”。接下来，浏览到您安装 `Chapter 7` 示例的位置，从“Reports”文件夹中选择\
  \ `EmployeeServiceCost-NoCode.rdl`。您还需要通过添加一个现有项并选择与报告所在文件夹相同的 `Pro_SSRS.rds` 文件来添加共享数据源。\n\
  \n![Image](img/9781430238102_Fig07-02.jpg)\n\n**图 7-2.** 将 `EmployeeServiceCost-NoCode.rdl`\
  \ 添加到您的项目中\n\n要将清单 7-1 中的代码添加到“员工服务成本报告”，首先通过在解决方案资源管理器中双击它或右键单击并选择“打开”来打开报告。接下来，在报表处于“设计”选项卡时，从\
  \ Visual Studio 的“报表”菜单中选择“报表属性”；或者，在报表设计区域内右键单击，然后选择“属性”。在“报表属性”对话框的“代码”选项卡上，将清单\
  \ 7-1 中的代码添加到“自定义代码”框中，如图 7-3 所示。\n\n![Image](img/9781430238102_Fig07-03.jpg)\n\n\
  **图 7-3.** 在自定义代码编辑器中输入嵌入式代码\n\n![Image](img/square.jpg) **注意** 您必须在嵌入式代码编辑器中将函数声明（第一行）作为单行输入，否则在尝试预览报告时会收到错误。在清单\
  \ 7-1 中它以换行显示，但在输入到嵌入式代码编辑器时不应有换行。\n\n现在您已经定义了自定义代码，您会想用它来高亮显示那些超过最大就诊次数的治疗类型。为此，您需要作为表达式的一部分来访问\
  \ `ExceedMaxCost` 方法。\n\n嵌入式代码中的方法通过一个全局定义的 `Code` 成员提供。当报告的 RDL 文件在发布时编译成 .NET\
  \ 程序集时，SSRS 会创建一个名为 `Code` 的类的全局成员，您可以在任何表达式中通过引用 `Code` 成员和方法名（如 `Code.ExceedMaxCost`）来访问它。\n\
  \n\n"
- "# 清单 7-2 展示了如何在文本框的`Color`属性中使用条件表达式，根据函数调用的返回值设置文本颜色。\n\n**清单 7-2.** 使用条件表达式\n\
  \n```vb\n=IIF(Code.ExceedMaxCost(Sum(Fields!Visit_Count.Value,\n\"table1_Group1\"\
  ),Sum(Fields!Estimated_Cost.Value, \"table1_Group1\")),\"Red\", \"Black\")\n```\n\
  \n`ExceedMaxCost`方法用于判断某种治疗类型在时间段内是否超过 10 个实例且每次就诊平均成本超过 45，如果满足则返回`True`，否则返回`False`。使用布尔返回值便于在格式化表达式中使用该方法，因为返回值可以直接测试，而无需与其他值进行比较。\n\
  \n使用原生 SSRS 函数`IIF`，我们可以直接传递自定义的`ExceedMaxCost`并评估其返回值。`IIF`会评估第一个参数，当结果为`True`时返回第二个参数，为`False`时返回第三个参数。\n\
  \n当某种治疗类型超过允许的最大平均成本时，`ExceedMaxCost`返回`True`，这会将文本框的`Color`属性值设置为`Red`，从而使报表中的文本显示为红色。如果未超过，则`ExceedMaxVisits`返回`False`，`Color`属性被设置为`Black`。\n\
  \n### 在报表中使用 `ExceedMaxCost` 函数\n\n现在我们将逐步指导如何将此表达式实际添加到报表中。首先，在报表中选择要应用表达式的字段。本例中，在报表设计模式下选择治疗名称文本框，如图\
  \ 7-4 所示。\n\n![Image](img/9781430238102_Fig07-04.jpg)\n\n**图 7-4.** 将表达式添加到报表中\n\
  \n其次，选中文本框后，转到“属性”窗口，选择`Color`属性（见图 7-5）。如果“属性”窗口未显示，可以在 Visual Studio 中选择“视图” >\
  \ “属性窗口”使其可见。\n\n![Image](img/9781430238102_Fig07-05.jpg)\n\n**图 7-5.** 属性窗口中的 Color\
  \ 属性\n\n接下来，点击下拉箭头，在显示的菜单中选择“表达式”（见图 7-6）。\n\n![Image](img/9781430238102_Fig07-06.jpg)\n\
  \n**图 7-6.** 颜色选择列表\n\n现在你将看到“编辑表达式”对话框，如图 7-7 所示。在此处输入来自清单 7-2 的表达式代码。你也可以直接键入表达式，或使用表达式编辑器将所需参数插入表达式中。\n\
  \n![Image](img/9781430238102_Fig07-07.jpg)\n\n**图 7-7.** 在表达式编辑器中输入表达式\n\n现在你可以运行报表，患者姓名将根据报表`Code`元素中的业务逻辑以红色或黑色显示。\n\
  \n![Image](img/square.jpg) **注意** 你会注意到，通过表达式编辑器查看时，`ExceedMaxCost`函数存在验证错误。这是正常现象，不会影响报表的构建或查看。\n\
  \n既然你已修改报表以使用`ExceedMaxCost`函数，你可以预览报表以查看其实际效果。为此，选择“预览”选项卡，将`ServiceYear`参数设置为\
  \ 2010，同时保持所有其他参数为默认值。渲染报表后，你应该会看到一个类似图 7-8 的报表。\n\n![Image](img/9781430238102_Fig07-08.jpg)\n\
  \n**图 7-8.** 嵌入了代码的报表\n\n### 从嵌入代码访问 .NET 程序集\n\n报表的`Code`元素主要设计用于.NET 框架和 VB .NET\
  \ 语言语法的基本使用。默认情况下，`Code`元素不包含对许多框架命名空间的访问权限。在嵌入的自定义代码中引用许多标准的.NET 程序集，需要你在报告中创建对每个程序集的引用。为此，转到“报表属性”对话框的“引用”选项卡，点击“添加”按钮后的省略号，然后选择你想要引用的相应.NET\
  \ 程序集。请注意，默认情况下，这些引用的程序集将仅具有“执行”权限。\n\n尽管如上所述，你可以直接在报表的`Code`元素中使用其他.NET 框架程序集和第三方程序集，但强烈建议你考虑使用自定义程序集。主要考虑之一是安全性。默认情况下，`Code`元素仅以“执行”权限运行，这意味着它可以运行但无法访问受保护的资源。如果你需要执行某些受保护的操作，例如从文件中读取数据，你必须将名为`Report_Expressions_Default_Permissions`的代码组的安全策略设置为`FullTrust`。此代码组控制报表表达式宿主程序集的权限，该程序集是从报表中找到的所有表达式创建的，并作为已编译报表的一部分存储。要设置安全策略，你需要编辑报表服务器和报表设计器的策略配置文件。有关这些文件的标准位置，请参阅本章后面的“部署自定义程序集”部分。\n\
  \n但是，不建议对安全策略进行此项更改。当你更改在`Code`元素中运行的代码的权限时，你同时也更改了在该报表服务器上运行的所有报表的权限。通过将权限更改为`FullTrust`，你允许报表中使用的所有表达式进行受保护的系统调用。这实质上会使任何能够向你的报表服务器上传报表的人获得对你系统的完全访问权限。\n\
  \n如果你需要使用 VB .NET 语言语法之外的功能，需要额外的安全权限，有复杂的逻辑需要实现，需要使用更多的.NET 框架，或者希望在多个报表中使用相同的功能，那么你应该将代码移至自定义程序集中。然后你可以在报告中引用该程序集，并通过自定义类的属性和方法使用代码。自定义程序集不仅为你在代码本身提供了更大的灵活性，还允许你在更细粒度的级别上控制安全性。使用自定义程序集，你可以为该特定程序集添加权限集和代码组，而无需修改所有在`Code`元素中运行的代码的权限。\n\
  \n你可能还需要使用自定义程序集的另一个原因。使用嵌入代码时，你无法利用完整的 Visual Studio IDE 来开发报告的`Code`部分，例如智能感知和调试等功能。在报表的`Code`部分编写代码与在记事本中工作差别不大。\n\
  \n不过，你可以变通处理。如果你选择放入`Code`元素的代码不仅仅是几行简单语句，那么创建一个单独的项目来编写和测试代码可能会更容易。一个快速的 VB .NET\
  \ Windows 窗体或控制台项目可以为你提供编写计划嵌入报表的代码的理想方式。你可以获得 IDE 的全部功能，一旦你的方法按预期工作，只需将它们粘贴到报表的代码窗口中即可。请记住使用\
  \ VB .NET 项目，因为`Code`元素仅适用于用 VB .NET 编写的代码。\n\n\n### 在报告中使用自定义程序集\n\n自定义程序集虽然实现起来更复杂，但能提供比嵌入式代码更大的灵活性。创建它们的过程要稍微复杂一些，因为它们并非报告\
  \ RDL 的一部分，必须在报表设计器之外创建。这也使得它们部署起来更困难，因为嵌入式代码会成为报告 RDL 的一部分，而自定义程序集是一个独立的文件。\n\n\
  然而，你的辛勤工作会得到多方面的回报。\n\n*代码重用*：你可以在多个报告之间重用自定义代码，无需将代码复制粘贴到每个报告中。这使你能够将所有自定义逻辑集中到单一位置，从而大大简化代码维护。\n\
  \n> *任务分离*：使用程序集可以更轻松地将撰写报告的任务与创建自定义代码的任务分开。这在概念上与使用代码隐藏功能编写 ASP.NET 应用程序有些相似。这种方式允许\
  \ ASP.NET 开发人员将页面标记、布局和图形与将与之交互的代码分开。如果你有几个人参与项目，可以让擅长报告撰写的人员负责报告的布局和创建，而让可能编码技能更强的其他人编写自定义代码。\n\
  >\n> *语言中立性*：你可以使用自己选择的.NET 语言。可以从 C#、VB、J#或任何与.NET Framework 兼容的第三方语言中选择。\n>\n\
  > *高效的开发环境*：如果你使用 Visual Studio 2010 来开发自定义程序集，你将获得其完整编辑和调试功能的强大支持。\n>\n> *安全控制*：你可以使用安全策略对程序集能够执行的操作进行细粒度控制。\n\
  >\n> *灵活性*：你创建的程序集不受限于 RDL 嵌入式代码部分中的简单函数。你有能力在报告中利用整个.NET 库。\n\n要从报告中使用自定义程序集，你需要创建一个类库来存放代码，将你希望从报告中调用的方法和属性添加到类中，然后将其编译为程序集。要从报表设计器中使用它，你可以在\
  \ Visual Studio 的解决方案中添加一个类库项目，这样就能轻松访问报告和你将在其中使用的代码。在运行附带的示例之前，请务必阅读解决方案文件夹“解决方案项”中的\
  \ `ReadMe.htm` 文件，以查看针对你的特定配置，在运行示例之前是否需要任何步骤。\n\n### 向你的报告解决方案添加类库项目\n\n要将自定义程序集与你的报告一起使用，首先需要以.NET\
  \ 类的形式编写自定义代码。你可以通过向现有解决方案中添加一个类库项目来实现，这样你就可以同时处理报告和自定义代码。\n\n在此示例中，你希望显示员工为病人出诊所获得的报酬。该类将从人力资源系统定期导出的\
  \ XML 文件中获取此信息。\n\n![Image](img/square.jpg) **注意** 如果可能，你会希望直接从人力资源系统获取此信息，可能通过\
  \ Web 服务。本章附带的示例代码包含了一个示例 Web 服务和一个调用它的方法。\n\n在此示例中使用 XML 文件 `EmployeePay.xml`（作为本章代码下载的一部分提供），不仅可以让你编写自定义程序集，还可以让你了解访问受保护资源（如本地文件）所需的步骤。要从\
  \ XML 文件获取信息并使其可供报告使用，请创建一个类，该类包含一个方法，该方法以 `EmployeeID` 和日期作为参数，从 XML 文件读取员工每次出诊的付费费率，然后返回该费率。虽然本章不会逐步介绍这一点，但附带的示例代码也包含了一个使用\
  \ Web 服务完成相同操作的示例。这使你能够模拟通过 Web 服务而不是导出的文件与人力资源系统交互的能力。\n\n然后，你可以在报告的表达式中引用你开发的程序集，并用它来计算每位病人的总出诊费用。\n\
  \n首先，从菜单中选择 文件 ![Image](img/U001.jpg) 添加 ![Image](img/U001.jpg) 新建项目。根据你的偏好，选择 Visual\
  \ Basic 项目或 Visual C# 项目。选择“类库”，并将项目名称输入为 `Employee`。在此示例中，我们将向你展示如何使用 Visual C#\
  \ 类库项目，如 图 7-9 所示。\n\n![Image](img/9781430238102_Fig07-09.jpg)\n\n***图 7-9.** “添加新项目”对话框*\n\
  \n从解决方案资源管理器中选择新创建的 `Class1.cs`，并将其重命名为更具描述性的名称，例如 `Employee`，因为你将使用此类来计算员工提供的出诊费用。在\
