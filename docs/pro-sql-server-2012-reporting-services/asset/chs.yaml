  *   讨论报表分页

  *   定义表达式和筛选器，以演示如何结合使用它们来控制报表内容和格式

  *   实现 Tablix 属性（SSRS 2008 中的新功能），它通过结合行分组和列分组扩展了多个数据区域的功能

  *   创建数据区域示例：列表、文本框、表、矩形、矩阵、图表和图像

  *   实现地图、数据条、迷你图和指示器，这些都为报表提供了更复杂的仪表板风格元素


