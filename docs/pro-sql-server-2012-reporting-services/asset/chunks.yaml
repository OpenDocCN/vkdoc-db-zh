    The chart you create will be a simple bar chart showing a count of active patients
    by their branch association.


    Return to the design area of Report Builder 1.0, and click the chart report in
    the Report Layout tab. The blank report template has a single Chart data region,
    as shown in [Figure 13-38](#Chapter13.html#fig_13_38). As you did with the two
    previous reports, table and matrix, you will add a title: Active Patient Census.


    ![Image](images/9781430238102_Fig13-38.jpg)


    ***Figure 13-38.** Chart report template*


    The chart has three areas to which you can drag and drop data: Series, Category,
    and Data. You want to be able to show an active patient count, so you could drag
    the Pat ID field to the Data area; however, because the Pat ID field is not seen
