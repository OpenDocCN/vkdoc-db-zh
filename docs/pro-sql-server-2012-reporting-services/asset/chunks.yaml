    \ = \"/Pro_SSRS/Chapter_9/\" + reportList.SelectedItem.Value;\n    reportViewerWeb.ServerReport.Refresh();\n\
    }\n```\n\n要测试应用程序，请在解决方案资源管理器中右键单击项目，然后选择 `Debug -> Start New Instance`。Visual\
    \ Studio 将在一个随机端口上启动一个独立的 Web 服务器，并启动项目进行调试。选择你放入目录中的报表，然后单击 `Render` 按钮。如果一切设置正确，在你选择报表上的一些参数后，你应该会看到一个类似于\
    \ 图 9-12 的 Internet Explorer 窗口。\n\n![Image](img/9781430238102_Fig09-12.jpg)\n\
    \n### 图 9-12. 最终完成的 Web 报表应用程序\n\n## 总结\n\n在本章中，我们展示了如何使用 SSRS 2012 的 URL 访问功能以及报表查看器控件，将报表快速嵌入应用程序中。除了本章中使用的\
    \ WebBrowser 和 Report Viewer 控件之外，你还可以使用其他应用程序来渲染报表。例如，你可以将 SSRS 2012 与 Microsoft\
    \ SharePoint Server 集成。我们将在第 12 章更详细地讨论如何使用此集成。通过结合 SharePoint 和 SSRS，你可以快速构建一个门户来显示报表，几乎无需编写代码。\n\
    \n在本章中，你还学习了如何通过调用报表服务器 Web 服务来增强你的 Windows 窗体查看器应用程序。你创建的应用程序允许你键入要查看的基于服务器的报表的\
    \ URL。然后，它使用 SSRS 2012 的 `GetItemParameters` 方法来检索报表参数列表，并使用 `ValidValues` 属性来检索可能的值。接着，它读取用户选择的值，并填充一个\
    \ `ReportParameters` 数组，该数组随后由报表查看器控件用来渲染已应用所选参数的报表。在第 10 章，我们将扩展此示例，通过使用报表服务器\
    \ Web 服务，允许用户设置报表在计划中使用提供的参数运行，而不是立即渲染。\n\n# 第 10 章\n\n## 管理报表\n\n在 SSRS 之前的许多报告解决方案中，报表管理通常仅限于通过文件共享或嵌入到第三方应用程序中将完整的报表文件交付给最终用户。SSRS\
    \ 是一个完整的报告环境，具有诸如计划报表执行、报表订阅服务、快照、内容缓存和按需 Web 访问等功能。\n\n这些额外的好处也带来了管理责任的额外层面。根据组织的规模，一些管理任务可以委派给其他用户，例如部门经理（他们可能会维护其部门的报表文件夹），以及系统管理员和\
    \ DBA。幸运的是，SSRS 提供了多种在各个级别管理报表服务器的方法。在本章中，你将继续使用内置工具，如报表管理器和命令行实用程序，以及利用 SSRS\
    \ 编程模型的自定义 .NET 管理工具来管理 SSRS 部署。我们还将演示 SSRS 的“Reporting Services 配置管理器”。当连接到 SSRS\
    \ 实例时，它提供了报表管理器“站点设置”部分和命令行实用程序中可用的大部分（如果不是全部）功能。使用 SSRS 2000 和 2005 时，某些管理任务（如配置报表订阅）可以通过\
    \ SSMS 完成。然而，自 2008 版本以来，此功能已被移除，现在只能使用报表管理器。因此，我们选择在本章的大多数示例中使用报表管理器。报表管理器可以通过\
    \ Web 浏览器访问，不需要在本地安装 SQL 客户端工具。\n"
- fmt: '### Exploring Management Roles in SSRS Deployment


    You can subdivide the management roles for an SSRS deployment into three basic
    categories:


    *   Content management

    *   Performance

    *   Report execution


    It is always best practice to perform a test deployment of any application or
    service before placing it into a production environment. Because our company provides
    services via the Internet to a wide range of users, special management considerations—such
    as how to provide report subscriptions to the same report for different companies—were
    imperative, and we needed to test various scenarios to ensure proper functionality
    in each case. Let’s begin by looking at the three management categories and how
    we implemented and tested them to ensure that when we deployed them to production,
    we would have few (if any) unexpected consequences. We will show how to perform
    all these tasks using the built-in administration tools with `SSRS` and `SQL Server
    2012`. Later in the chapter, we’ll show how to build a management application
    interface with `.NET` that provides the ability to schedule reports.


    ### Managing Content


    Effective management of content on the `SSRS` report server requires that you
    be familiar with the management tasks available. Several aspects of report management
    are available only after the report has been deployed. We’ll cover each aspect
    in detail as we show how to deploy the health care reports for selected users:


    *   Shared schedules

    *   Report parameters and data sources

    *   Report snapshots, history, and caching

    *   Subscriptions


    For each content management task, we’ll provide specific real-world scenarios,
    continuing with the health care agencies as an example. Up to this point, you
    have deployed several reports, data sources, and other report items, such as graphic
    images and code, which you have developed throughout the book. Now it’s time to
    put on your administrator’s cap and take advantage of all the features that make
    `SSRS` a unique and powerful report-delivery system as well as one that provides
    a rich report-authoring environment.


    #### Setting Up Shared Schedules


    Generally speaking, a shared schedule is like a shared data source in that it
    is available system-wide to users who have permission to access it. You can create
    a shared schedule specifically for a certain job type. It is possible to configure
    a recurring shared schedule to execute by the hour, day, month, and week or to
    run only once. In this example, the financial reports will execute at the end
    of each month. It is important that a history be maintained for these reports
    so that you can freeze the values at any point in time or use them for auditing
    capabilities, such as understanding which users viewed a report and what they
    saw in the report.


    You’ll create a shared schedule that will be used to run the financial reports
    on the last day of each month to provide the following benefits:


    *   You can schedule the reports to execute at a predetermined time.

    *   You can store a snapshot of each report to maintain a historical perspective
    of the data.


    `Note` Report snapshots are reports that are executed at a specific time, either
    when initiated by a user or as part of a schedule, and that collectively make
    up the report history. We’ll cover snapshots in more detail later.


    One financial report that customers might run at the end of the month is an `AR
    Reconciliation` report. This report lists financial transactions that occurred
    during the current accounting period, such as 10-2009 for October 2009\. This
    report may be one of several that need to execute on the same schedule. Other
    financial reports might include an `Aged Trial Balance` report and an `AR Aging`
    report. We’ll use the `AR Reconciliation` report in the following section to show
    the management tasks associated with setting up shared schedules and creating
    report snapshots. We’ve included the `AR Reconciliation` report in the `Pro_SSRS`
    report project download, available in the Source Code/Download section of the
    Apress Web site ([`www.apress.com`](http://www.apress.com)). The report definition
    file is `AR Reconciliation.rdl`. In this section, we’ll show how to use a deployed
    version of the `AR Reconciliation` report to configure its parameter values to
    coincide with the scheduled times that it will execute each month.


    To deploy the `AR Reconciliation` report, open the `Pro_SSRS` project in `BIDS`
    and then open the `Solution Explorer`. Before deploying this report, however,
    you need to change the project property that controls which folder the report
    will be deployed in on the report server. In the `AR Reconciliation` example,
    you will deploy the report to a folder called `End of Month Financials`. In the
    `Solution Explorer`, right-click the `Pro_SSRS` report project, and select `Properties`.
    Change the `TargetReportFolder` value from `Pro_SSRS` to `End of Month Financials`,
    and click `OK`. Now, when you right-click the `AR Reconciliation` report in the
    `Solution Explorer` and select `Deploy`, the new folder is created on your report
    server that contains the `AR Reconciliation` report.


    #### Creating a Shared Schedule


    To create the shared schedule in `Report Manager`, click `Site Settings`, and
    then select `Schedules` at the bottom of the navigation tabs on the left of the
    page. Click the `New Schedule` button link, and name the schedule `End of Month
    Financials`. In the `Schedule Details` section, you are presented with the standard
    scheduling options: `Hour`, `Day`, `Week`, `Month`, or `Once`. For this report,
    choose `Month`.


    The first challenge, when configuring a shared schedule to run on the last day
    of each month, is to overcome the built-in data validation on the `Scheduling`
    form. Although it is possible to tell `SSRS` to execute the report on the last
    Sunday of every month, it is not possible to select the last day of each month
    because the last day is variable (that is, it could be 28, 29, 30, or 31, depending
    on the month). Well, it should be possible to create a single schedule to encompass
    all four dates, right? Not exactly! If you try to save the `Shared Schedule` as
    shown in [Figure 10-1](#Chapter10.html#fig_10_1), choosing 31 causes an error
    when all of the months are selected because not all months have 31 days.


    `Note` You must be logged in as a user who is a member of the `SSRS 2012 System
    Administrator` role to add new schedules. If you haven’t been added to the site
    as a `System Administrator`, but you are in the local `Administrators` group,
    you may need to run your browser with elevated permissions. If using `IE`, you
    can right click the `IE` icon and select `Run as administrator`.


    The solution in this example—because we know that no activity will occur after
    12:00 AM on the last day of the month—is to set the schedule to run on the first
    day of the month at 12:01 AM. This essentially gives you the last day for every
    month, and you know the first day of the month will always be 1.


    ![Image](images/9781430238102_Fig10-01.jpg)


    *Figure 10-1. Choosing the last day of the month*


    Next, select an appropriate start date and end date for the schedule (in this
    case, don’t specify an end date), and then click the `OK` button. Now you can
    move on and prepare the report itself to use the new schedule. As a note, schedules
    in `SSRS` rely on the `SQL Server Agent` service, and as such, the service must
    be running before you can successfully create a schedule.


    `Note` Note that when a job, such as a subscription or an execution snapshot,
    is scheduled to run within `SSRS`, a `SQL Server` job is created using the `SQL
    Server Agent`. Jobs can be monitored through `SSMS` or `Report Manager`.'
