  trans: "\n要开始测试，请打开浏览器并以用户 `jyoungblood` 登录。浏览器打开后，将你之前创建的 `Registered Nurse` 文件夹的链接粘贴到地址栏中，如下所示：\n\
    \n`http://YourServerName/Reports/Pages/Folder.aspx?ItemPath=%2fClinical+Reports%2fRegistered+Nurse&ViewMode=Detail`\n\
    \n你必须将链接粘贴到浏览器中，因为 `jyoungblood` 当前的权限不允许通过 Report Manager 直接导航到该报表。正如你在图 11-15\
    \ 中所看到的，当你查看此链接时，会收到一条错误消息，指出用户没有权限查看文件夹中的资源。\n\n![Image](img/9781430238102_Fig11-15.jpg)\n\
    \n**图 11-15.** `权限不足的错误消息`\n\n现在，再次以管理员身份运行 Report Manager，你将为 `jyoungblood` 设置权限。你可以在每个文件夹的\
    \ `属性` 选项卡上以及单个报表项上控制安全设置。在本例中，你将为 `Registered Nurse` 文件夹在文件夹级别设置权限。使用 `SSRS 管理员`\
    \ 帐户运行的浏览器导航到 `Registered Nurse` 文件夹，单击文件夹菜单栏中的 `文件夹设置` 按钮，然后选择左侧的 `安全` 选项。正如你在图\
    \ 11-16 中看到的，默认的安全组是 `BUILTIN\\administrators`，它被分配给了 `内容管理员` 角色。\n\n![Image](img/9781430238102_Fig11-16.jpg)\n\
    \n**图 11-16.** `Registered Nurse 文件夹的默认权限`\n\n要为 `RN` 组设置权限，请单击 `编辑项安全` 以中断从父文件夹继承的安全设置。在警告屏幕上（提示你正在中断安全继承）直接点击\
    \ `确定`。现在，你可以单击 `新建角色分配`，并在 `新建角色分配` 表单上将 `RN` 安全组添加为组名。对于角色分配，选择 `浏览器`，这将允许分配给\
    \ `RN` 组的用户查看 `Registered Nurse` 文件夹及其所有子节点、查看报表和资源，以及配置他们自己的订阅。你可以在图 11-17 的安全列表中看到这一点。\n\
    \n![Image](img/9781430238102_Fig11-17.jpg)\n\n**图 11-17.** `Register Nurse 文件夹的新安全列表`\n\
    \n现在，当你以 `jyoungblood` 身份登录并访问 `Registered Nurse` 文件夹时，你只能看到已部署到该文件夹的报表，而看不到数据源。此外，所有你可以查看的对象的属性都具有受限的可访问性和内容。例如，如果你点击该报表项的菜单并选择\
    \ `管理`，你将只能看到常规属性信息，例如 `Daily Schedule` 报表的 `创建日期` 和 `修改日期`。相比之下，管理员查看相同的属性页时，将能够查看和修改其他报表属性设置，例如\
    \ `参数`、`数据源`、`执行`、`历史记录` 和 `安全`，如图 11-18 所示。\n\n你应该熟悉两个 `SSRS` 角色。我们刚才提到了一个，即\
    \ `系统管理员`，另一个可用的 `SSRS` 角色是 `系统用户`。这些是站点范围的角色，允许用户在 `SSRS` 安装中执行特定任务。它们与我们之前讨论的文件夹/项级别安全并无不同，因为这些角色授予的是整个\
    \ `SSRS` 系统的权限。你可以在 Report Manager 的 `站点设置` 部分为用户分配这些角色。以下是分配每个角色后允许用户/组执行的操作列表：\n\
    \n*   `系统用户`\n    *   查看系统属性\n    *   查看共享计划\n    *   允许使用 `Report Builder` 或其他执行\
    \ `RDL` 的客户端\n*   `系统管理员`\n    *   查看/修改系统角色分配\n    *   查看/修改系统角色定义\n    *   查看/修改系统属性\n\
    \    *   查看/修改共享计划\n    *   拥有 `系统用户` 角色的所有其他访问权限\n\n![Image](img/9781430238102_Fig11-18.jpg)\n\
    \n**图 11-18.** `管理员可用的报表属性`\n\n要完成测试，你只需以 `jyoungblood` 身份执行 `Daily Schedule`\
    \ 报表即可。你已经授予了 `RN` `Windows` 安全组继承 `SSRS 浏览器` 角色的权限，因此执行报表应该没有问题。报表执行成功。然而，图 11-19\
    \ 显示了一个明显的问题——尽管 `jyoungblood` 执行了该报表，但她看到的是其他员工的预约访问。虽然她可以输入一个 `员工 ID` 参数值来将报表数据限制为仅她自己的数据，但如果她知道其他员工的\
    \ `ID`，她仍然可以通过输入他们的 `ID` 来查看他们的日程安排。尽管对于许多公司来说，这可能是可以接受的做法，但在下一节中，我们将展示如何更进一步，确保她只能查看自己的日程安排。\n\
    \n![Image](img/9781430238102_Fig11-19.jpg)\n\n**图 11-19.** `测试账户查看其他员工的数据`\n\n\
    `提示` 在构建测试环境时，有许多可用资源可以简化流程。虚拟化在当今几乎每个环境中都很常见。`Microsoft's Hyper-V` 或其他桌面虚拟化工具是测试的有利工具，因为它们允许你在单台机器上同时运行多个操作系统。\n"
- fmt: '### Filtering Report Content with User!UserID


    对于每日计划报告，假设你决定让用户只能查看自己的日程安排。SSRS 允许你通过创建一个报告过滤器来实现这一点，该过滤器使用执行报告的用户的登录账户值。登录名值是从
    SSRS 中的一个全局集合返回的。你一直在使用全局集合——例如，当你使用表达式`=Fields!FieldName.Value`时，你实际上是从 `Fields`
    全局集合中返回一个值。你将用于报告过滤器的全局集合是 `User`，而你感兴趣的值是 `UserID`。因此，表达式将是`=User!UserID`。


    要在过滤器中使用 `User!UserID`，你需要在数据集中有一个等于 `UserID` 值的字段。在每日计划报告的数据集中，你可能还记得有一个名为 `HWUserLogin`
    的字段，你可以用于此目的。当过滤器进行比较时，这两个值将是相同的——一个值随数据集提供，另一个在报告执行时提供。应用过滤器后，报告将仅显示那些执行报告的员工的用户名与数据集每条记录返回的
    `HWUserLogin` 字段值相匹配的记录。


    与参数不同，过滤器不能通过报告管理器设置。要设置过滤器，你需要修改报告本身，可以直接在 RDL 文件中，或通过报表生成器或 Visual Studio 进行，如
    [Figure 11-20](#Chapter11.html#fig_11_20) 所示。请注意，你可以使用 `RTRIM` 函数来去除尾随空格；否则，比较可能会失败。确保员工登录名与你创建的用户匹配，这样比较才能匹配。在本书示例中，这是
    `PROSSRS\Jyoungblood`，但你的示例可能不同。将过滤器添加到组属性中，以过滤掉除查看用户之外的任何其他用户。


    ![Image](images/9781430238102_Fig11-20.jpg)


    **Figure 11-20.** 每日计划报告的 `UserID` 过滤器


    由于此报告可能返回数百条记录，即使它会为每个用户自动过滤，也最好将报告缓存十分钟。缓存有助于减轻每次新用户访问报告时重新查询数据源所带来的性能影响。当用户
    `jyoungblood` 再次执行报告时，你可以看到日程安排现在只反映她的日程，如 [Figure 11-21](#Chapter11.html#fig_11_21)
    所示。


    ![Image](images/9781430238102_Fig11-21.jpg)


    **Figure 11-21.** 测试用户的过滤报告执行


    ### Setting Data Source Security


    一旦你将数据源部署到报告服务器，就可以指定其连接属性。这是一个重要的步骤，因为属性设置决定了用户和 SSRS 如何连接到数据源。在执行无人参与的报告时——例如，用于用户订阅——SSRS
    将控制向数据源传递身份验证凭据，并且必须有权访问有效的身份验证凭据。


    在报告管理器中，数据源有四种连接选项可用：


    > *   *由运行报告的用户提供的凭据：* 使用此选项时，用户在执行报告时始终会被提示登录数据源。

    > *   *安全存储在报告服务器中的凭据：* SSRS 使用存储在 `ReportServer` 数据库中的身份验证凭据。敏感的登录信息是加密的。

    > *   *Windows 集成安全性：* 此选项将当前用户的登录信息传递给数据源。如果数据源将用于无人参与的安装，或者 Windows 域未配置 `Kerberos`，则不要选择此选项。在从
    SQL Server 进行多次跳转时使用此选项也会出现问题。除非 `Kerberos` 在整个域中正确安装和配置，否则这可能无法在所有情况下正常工作。

    > *   *不需要凭据：* 这是最不安全的选项，在数据源不需要身份验证时使用。


    ### Setting SQL Server Permissions


    在[第 3 章](#Chapter03.html)中，当你创建名为 `Emp_Svc_Cost` 的存储过程时，你设置了权限以允许在报告设计期间进行公共执行。你当时的工作环境是安全的，因为它与其他网络隔离，并且没有被破坏的担忧。


    现在你正在生产环境中部署存储过程，你还需要锁定存储过程。你可以通过 SSMS 右键单击存储过程并选择属性来完成此操作（参见 [Figure 11-22](#Chapter11.html#fig_11_22)）。接下来，单击权限页。使用搜索…按钮搜索
    `RN` 组以加载其显式权限。选中授予列下的执行权限，这将允许 `RN` 组中的任何用户执行此存储过程。你不需要显式授予测试用户 `jyoungblood`
    执行权限，因为她是 `RN` 安全组的成员。


    ![Image](images/9781430238102_Fig11-22.jpg)


    **Figure 11-22.** 设置 SQL Server 存储过程权限


    ### Auditing Reports


    能够了解报告执行的详细信息，特别是对于不需要的访问，是安全难题的重要组成部分。在本章中，我们将使用内置的报告执行日志和一个报告管理表来构建一个报告，该报告将显示谁运行了什么报告以及更多信息。拥有报告执行的审计跟踪对于深入了解用户行为和可能的安全漏洞至关重要。'
  raw: '#### Filtering Report Content with User!UserID


    For the Daily Schedule report, say you have decided that you want the users to
    be able to view only their own schedules. SSRS allows you to accomplish this by
    creating a report filter that uses the value of the login account for the user
    executing the report. The login name value is returned from a global collection
    in SSRS. You have been using global collections all along— for example, when you
    use an expression such as =Fields!FieldName.Value, you are actually returning
    a value from the Fields global collection. The global collection that you will
    use for the report filter is User, and the value you are interested in is UserID.
    The expression will therefore be =User!UserID.


    To use User!UserID in the filter, you will need a field in the dataset that will
    equal the UserID value. In the dataset for the Daily Schedule report, you may
    recall that you have a field called HWUserLogin that you can use for this purpose.
    When compared by the filter, the two values will be identical—one value delivered
    with the dataset and the other at execution time of the report. After the filter
    is applied, the report will display only those records where the username of the
    employee executing the report matches the value of the HWUserLogin field returned
    with each record of the dataset.


    Unlike parameters, filters cannot be set through Report Manager. To set up a filter,
    you will need to modify the report itself, either in the RDL file directly, through
    Report Builder or in Visual Studio, as shown in [Figure 11-20](#Chapter11.html#fig_11_20).
    Notice that you can use the RTRIM function to strip off the trailing spaces; otherwise,
    the comparison may fail. Make sure that the employee Login matches the user that
    you have created so that the comparison will match. In the book example, this
    is PROSSRS\Jyoungblood, but it may differ for your examples. Add the filter to
    the group properties to filter out any other users except the viewing user.


    ![Image](images/9781430238102_Fig11-20.jpg)


    ***Figure 11-20.** UserID filter for daily schedule report*


    Because this report may return several hundred records, even though it will filter
    automatically for each user, it is a good idea to cache the report for ten minutes.
    Caching will help alleviate the performance hit of requerying the data source
    every time a new user accesses the report. When the user jyoungblood executes
    the report again, you can see that the schedule now reflects only her schedule,
    as shown in [Figure 11-21](#Chapter11.html#fig_11_21).


    ![Image](images/9781430238102_Fig11-21.jpg)


    ***Figure 11-21.** Filtered report execution for a test user*


    #### Setting Data Source Security


    Once you have deployed the data source to the report server, you can specify its
    connection properties. This is an important step because the property settings
    determine how both the user and SSRS will connect to the data source. When executing
    unattended reports—for example, for a user subscription—SSRS will control passing
    authentication credentials to the data source and must have access to valid authentication
    credentials.


    Four connection options for the data source are available in Report Manager:


    > *   *The Credentials Supplied by the User Running the Report:* With this option,
    users are always prompted to log in to the data source when executing the report.

    > *   *Credentials Stored Securely in the Report Server:* SSRS uses authentication
    credentials stored in the ReportServer database. The sensitive login information
    is encrypted.

    > *   *Windows Integrated Security:* This option passes the login information
    for the current user to the data source. Don’t choose this option if the data
    source will be used for unattended installs or if Kerberos is not configured for
    the Windows domain. You will also get issues when using this where multiple hops
    are made from SQL Servers. Unless Kerberos is installed and configured correctly
    across your entire domain, this may not work correctly in all situations

    > *   *Credentials Are Not Required:* This is the least secure option and is used
    when the data source does not require authentication.


    #### Setting SQL Server Permissions


    In [Chapter 3](#Chapter03.html), when you created the stored procedure called
    Emp_Svc_Cost, you set the permissions to allow public execution while designing
    the report. The environment you were working in was otherwise secure, as it was
    isolated from other networks and there was no fear of it being compromised.


    Now that you are deploying the stored procedure in a production environment, you
    will need to lock down the stored procedure as well. You can do this through SSMS
    by right-clicking the stored procedure and selecting Properties (see [Figure 11-22](#Chapter11.html#fig_11_22)).
    Next, click the Permissions page. Search for the RN group using the Search… button
    to load its explicit permissions. Check the Execute permission under the Grant
    column and this will allow any user from the RN group to execute this stored procedure.
    You do not need to explicitly grant Execute rights to the test user jyoungblood,
    as she is a member of the RN security group.


    ![Image](images/9781430238102_Fig11-22.jpg)


    ***Figure 11-22.** Setting SQL Server stored procedure permissions*


    ### Auditing Reports


    Having the ability to know the details of report execution, specifically for undesired
    access, is an essential piece of the security puzzle. In this chapter, we are
    going to use the built-in report execution logging and a report management table
    to build a report that will show up who ran what reports and much more information.
    Having an audit trail of report execution is essential for gaining insight into
    user behavior and possible security breaches.'
  trans: '### 使用 User!UserID 过滤报告内容


    对于每日计划报告，假设你决定让用户只能查看自己的日程安排。SSRS 允许你通过创建一个报告过滤器来实现这一点，该过滤器使用执行报告的用户的登录账户值。登录名值是从
    SSRS 中的一个全局集合返回的。你一直在使用全局集合——例如，当你使用表达式`=Fields!FieldName.Value`时，你实际上是从 `Fields`
    全局集合中返回一个值。你将用于报告过滤器的全局集合是 `User`，而你感兴趣的值是 `UserID`。因此，表达式将是`=User!UserID`。


    要在过滤器中使用 `User!UserID`，你需要在数据集中有一个等于 `UserID` 值的字段。在每日计划报告的数据集中，你可能还记得有一个名为 `HWUserLogin`
    的字段，你可以用于此目的。当过滤器进行比较时，这两个值将是相同的——一个值随数据集提供，另一个在报告执行时提供。应用过滤器后，报告将仅显示那些执行报告的员工的用户名与数据集每条记录返回的
    `HWUserLogin` 字段值相匹配的记录。


    与参数不同，过滤器不能通过报告管理器设置。要设置过滤器，你需要修改报告本身，可以直接在 RDL 文件中，或通过报表生成器或 Visual Studio 进行，如
    图 11-20 所示。请注意，你可以使用 `RTRIM` 函数来去除尾随空格；否则，比较可能会失败。确保员工登录名与你创建的用户匹配，这样比较才能匹配。在本书示例中，这是
    `PROSSRS\Jyoungblood`，但你的示例可能不同。将过滤器添加到组属性中，以过滤掉除查看用户之外的任何其他用户。


    ![Image](img/9781430238102_Fig11-20.jpg)


    **图 11-20.** 每日计划报告的 `UserID` 过滤器


    由于此报告可能返回数百条记录，即使它会为每个用户自动过滤，也最好将报告缓存十分钟。缓存有助于减轻每次新用户访问报告时重新查询数据源所带来的性能影响。当用户
    `jyoungblood` 再次执行报告时，你可以看到日程安排现在只反映她的日程，如 图 11-21 所示。


    ![Image](img/9781430238102_Fig11-21.jpg)


    **图 11-21.** 测试用户的过滤报告执行


    ### 设置数据源安全性


    一旦你将数据源部署到报告服务器，就可以指定其连接属性。这是一个重要的步骤，因为属性设置决定了用户和 SSRS 如何连接到数据源。在执行无人参与的报告时——例如，用于用户订阅——SSRS
    将控制向数据源传递身份验证凭据，并且必须有权访问有效的身份验证凭据。


    在报告管理器中，数据源有四种连接选项可用：


    > *   *由运行报告的用户提供的凭据：* 使用此选项时，用户在执行报告时始终会被提示登录数据源。

    > *   *安全存储在报告服务器中的凭据：* SSRS 使用存储在 `ReportServer` 数据库中的身份验证凭据。敏感的登录信息是加密的。

    > *   *Windows 集成安全性：* 此选项将当前用户的登录信息传递给数据源。如果数据源将用于无人参与的安装，或者 Windows 域未配置 `Kerberos`，则不要选择此选项。在从
    SQL Server 进行多次跳转时使用此选项也会出现问题。除非 `Kerberos` 在整个域中正确安装和配置，否则这可能无法在所有情况下正常工作。

    > *   *不需要凭据：* 这是最不安全的选项，在数据源不需要身份验证时使用。


    ### 设置 SQL Server 权限


    在第 3 章中，当你创建名为 `Emp_Svc_Cost` 的存储过程时，你设置了权限以允许在报告设计期间进行公共执行。你当时的工作环境是安全的，因为它与其他网络隔离，并且没有被破坏的担忧。


    现在你正在生产环境中部署存储过程，你还需要锁定存储过程。你可以通过 SSMS 右键单击存储过程并选择属性来完成此操作（参见 图 11-22）。接下来，单击权限页。使用搜索…按钮搜索
    `RN` 组以加载其显式权限。选中授予列下的执行权限，这将允许 `RN` 组中的任何用户执行此存储过程。你不需要显式授予测试用户 `jyoungblood`
    执行权限，因为她是 `RN` 安全组的成员。


    ![Image](img/9781430238102_Fig11-22.jpg)


    **图 11-22.** 设置 SQL Server 存储过程权限


    ### 审核报告


    能够了解报告执行的详细信息，特别是对于不需要的访问，是安全难题的重要组成部分。在本章中，我们将使用内置的报告执行日志和一个报告管理表来构建一个报告，该报告将显示谁运行了什么报告以及更多信息。拥有报告执行的审计跟踪对于深入了解用户行为和可能的安全漏洞至关重要。'
- fmt: "## SSRS Auditing\n\nIn this section, we'll show how to use the built-in views\
    \ in the `ReportServer` database to audit the following in SSRS:\n\n> *   *Report\
    \ execution activity:* Which user executed which report and when, and what status\
    \ the report finished with (to find possible issues)\n> *   *Parameter inputs\
    \ for reports:* Which parameters were entered by a user\n\nThe latter is important\
    \ because even though SSRS contains validation for certain types of parameters,\
    \ such as `Integer` and `DateTime`, when a report parameter uses a string, it\
    \ is susceptible to a SQL injection attack. SQL injection attacks are made possible\
    \ when a Web page or service takes input from a user or program that could contain\
    \ injected code that could execute on the SQL Server machine. These types of attacks\
    \ can be malicious in nature or can cause the report or page to deliver more data\
    \ than was intended.\n\nWe have simply made the report a table instead of a matrix,\
    \ which was more in line with the PivotTable analysis for performance. In this\
    \ modified report, called `Report Execution Audit` (which is available in the\
    \ `Pro_SSRS` [chapter 11](#Chapter11.html) files), you will also include the parameters\
    \ that the user has selected. Go ahead and upload this report and a new datasource\
    \ pointing to your `ReportServer` database in a new folder in the root of your\
    \ SSRS installation called `Management`. You will also need to point the report\
    \ to this new datasource that you are creating. You can see the query we are using\
    \ to pull this information in [Listing 11-1](#Chapter11.html#list_11_1).\n\n**Listing\
    \ 11-1.** Execution Log Query\n\n```sql\nSELECT\n          Catalog.name\n    \
    \    , ExecutionLog.UserName\n        , ExecutionLog.Parameters\n        , ExecutionLog.TimeStart\n\
    \        , ExecutionLog.TimeEnd\n        , ExecutionLog.Status\n FROM ExecutionLog\n\
    INNER JOIN Catalog ON ExecutionLog.ReportID = Catalog.ItemID\n```\n\nIn [Figure\
    \ 11-23](#Chapter11.html#fig_11_23), you can see the times that the selected reports\
    \ were executed as well as the parameter name and value that were entered. In\
    \ addition to showing how the user interacted with the report via the `Parameter`\
    \ field, the `Report Execution Audit` report also shows when the report was started\
    \ and ended. Having this level of auditing is a valuable ally in the struggle\
    \ to maintain security for confidential information. With HIPAA, it is also necessary\
    \ to maintain an audit trail of user access to data. If you are suspicious that\
    \ someone is accessing information they are not authorized to view, this report\
    \ can serve as the audit trail, along with other normal auditing procedures such\
    \ as the Windows event log.\n\n![Image](images/9781430238102_Fig11-23.jpg)\n\n\
    **Figure 11-23.** Report Execution Audit report\n\n## Introducing Log File Auditing\n\
    \nIn addition to report auditing, SSRS supports two other types of logging: standard\
    \ Windows event logging and trace file logging. You can use both of these resources\
    \ to search for errors and warnings, as well as for other important information\
    \ such as security information.\n\nAll of the trace files are stored in the default\
    \ installation location `Drive:\\Program Files\\ Microsoft SQL Server\\MSRS11.MSSQLSERVER\\\
    Reporting Services\\LogFiles`. Several types of log files exist: `ReportServerService`\
    \ and `ReportServer`. Each file is named with a timestamp, such as `ReportServerService_05_31_2012_17_00_30.log`\
    \ and `ReportServerService_HTTP_05_31_2012_17_00_30.log`, and contains information\
    \ specific to its individual service. You can gather five levels of trace log\
    \ information— 0 through 4—that are controlled in the `ReportingServicesService.exe.config`\
    \ file in the `Reporting Services\\ReportServer\\Bin` folder. Selecting `0` will\
    \ disable tracing, and selecting `4` will enable verbose mode. Whenever an issue\
    \ arises with SSRS, the administrator can generally isolate the problem by looking\
    \ in either the event log or one of the trace files.\n\n### Summary\n\nIn this\
    \ chapter, you examined three of the security tasks essential to secure SSRS deployment:\
    \ encrypting, authenticating, and auditing. Internally, only employees who need\
    \ access to confidential data should have it, and you can ensure this by applying\
    \ a special filter for a report deployment. As a company that works heavily with\
    \ confidential patient information, we are required to conform to the regulations\
    \ imposed by HIPAA. However, in other industries, many similar regulations exist.\
    \ Having security policies and procedures in place for any company is good practice,\
    \ even when not working under stringent regulations. Fortunately, SSRS is designed\
    \ to use the core-level security mechanisms that already exist in your organization\
    \ through Windows authentication and can be extended, when required, to support\
    \ other means of custom authentication.\n\n## C H A P T E R 12"
  raw: '#### SSRS Auditing


    In this section, we’ll show how to use the built in views in the ReportServer
    database to audit the following in SSRS:


    > *   *Report execution activity:* Which user executed which report and when,
    and what status the report finished with (to find possible issues)

    > *   *Parameter inputs for reports:* Which parameters were entered by a user


    The latter is important because even though SSRS contains validation for certain
    types of parameters, such as Integer and DateTime, when a report parameter uses
    a string, it is susceptible to a SQL injection attack. SQL injection attacks are
    made possible when a Web page or service takes input from a user or program that
    could contain injected code that could execute on the SQL Server machine. These
    types of attacks can be malicious in nature or can cause the report or page to
    deliver more data than was intended.


    We have simply made the report a table instead of a matrix, which was more in
    line with the PivotTable analysis for performance. In this modified report, called
    Report Execution Audit (which is available in the Pro_SSRS [chapter 11](#Chapter11.html)
    files), you will also include the parameters that the user has selected. Go ahead
    and upload this report and a new datasource pointing to your ReportServer database
    in a new folder in the root of your SSRS installation called Management. You will
    also need to point the report to this new datasource that you are creating. You
    can see the query we are using to pull this information in [Listing 11-1](#Chapter11.html#list_11_1).


    ***Listing 11-1.** Execution Log Query*


    `SELECT`

    `          Catalog.name`

    `        , ExecutionLog.UserName`

    `        , ExecutionLog.Parameters`

    `        , ExecutionLog.TimeStart`

    `        , ExecutionLog.TimeEnd`

    `        , ExecutionLog.Status`

    ` FROM ExecutionLog`

    `INNER JOIN Catalog ON ExecutionLog.ReportID = Catalog.ItemID`


    In [Figure 11-23](#Chapter11.html#fig_11_23), you can see the times that the selected
    reports were executed as well as the parameter name and value that were entered.
    In addition to showing how the user interacted with the report via the Parameter
    field, the Report Execution Audit report also shows when the report was started
    and ended. Having this level of auditing is a valuable ally in the struggle to
    maintain security for confidential information. With HIPAA, it is also necessary
    to maintain an audit trail of user access to data. If you are suspicious that
    someone is accessing information they are not authorized to view, this report
    can serve as the audit trail, along with other normal auditing procedures such
    as the Windows event log.


    ![Image](images/9781430238102_Fig11-23.jpg)


    ***Figure 11-23.** Report Execution Audit report*


    #### Introducing Log File Auditing


    In addition to report auditing, SSRS supports two other types of logging: standard
    Windows event logging and trace file logging. You can use both of these resources
    to search for errors and warnings, as well as for other important information
    such as security information.


    All of the trace files are stored in the default installation location Drive:\Program
    Files\ Microsoft SQL Server\MSRS11.MSSQLSERVER\Reporting Services\LogFiles. Several
    types of log files exist: ReportServerService and ReportServer. Each file is named
    with a timestamp, such as ReportServerService_05_31_2012_17_00_30.log and ReportServerService_HTTP_05_31_2012_17_00_30.log,
    and contains information specific to its individual service. You can gather five
    levels of trace log information— 0 through 4—that are controlled in the ReportingServicesService.exe.config
    file in the Reporting Services\ReportServer\Bin folder. Selecting 0 will disable
    tracing, and selecting 4 will enable verbose mode. Whenever an issue arises with
    SSRS, the administrator can generally isolate the problem by looking in either
    the event log or one of the trace files.


    ### Summary


    In this chapter, you examined three of the security tasks essential to secure
    SSRS deployment: encrypting, authenticating, and auditing. Internally, only employees
    who need access to confidential data should have it, and you can ensure this by
    applying a special filter for a report deployment. As a company that works heavily
    with confidential patient information, we are required to conform to the regulations
    imposed by HIPAA. However, in other industries, many similar regulations exist.
    Having security policies and procedures in place for any company is good practice,
    even when not working under stringent regulations. Fortunately, SSRS is designed
    to use the core-level security mechanisms that already exist in your organization
    through Windows authentication and can be extended, when required, to support
    other means of custom authentication.


    ## C H A P T E R  12'
  trans: "## SSRS 审计\n\n在本节中，我们将展示如何使用 `ReportServer` 数据库中的内置视图来审计 SSRS 中的以下活动：\n\n\
    > *   *报告执行活动：* 哪位用户在何时执行了哪份报告，以及报告以何种状态完成（以发现可能的问题）\n> *   *报告的参数输入：* 用户输入了哪些参数\n\
    \n后者很重要，因为尽管 SSRS 对某些类型的参数（如 `Integer` 和 `DateTime`）包含验证功能，但当报告参数使用字符串时，它就容易受到\
    \ SQL 注入攻击。当网页或服务从用户或程序接收的输入中可能包含可在 SQL Server 机器上执行的注入代码时，SQL 注入攻击就成为可能。这些攻击本质上可能是恶意的，也可能导致报告或页面传递超出预期的数据。\n\
    \n我们简单地将报告从矩阵改为了表格，这更符合用于性能分析的数据透视表。在这个名为 `报告执行审计` 的修改版报告中（可在 `Pro_SSRS` 第 11\
    \ 章 文件中找到），您还将包含用户已选择的参数。请上传此报告以及一个指向您的 `ReportServer` 数据库的新数据源，将其放在 SSRS 安装根目录下一个名为\
    \ `Management` 的新文件夹中。您还需要将报告指向您正在创建的这个新数据源。您可以在代码清单 11-1 中查看我们用于提取此信息的查询。\n\n\
    **代码清单 11-1.** 执行日志查询\n\n```sql\nSELECT\n          Catalog.name\n        , ExecutionLog.UserName\n\
    \        , ExecutionLog.Parameters\n        , ExecutionLog.TimeStart\n       \
    \ , ExecutionLog.TimeEnd\n        , ExecutionLog.Status\n FROM ExecutionLog\n\
    INNER JOIN Catalog ON ExecutionLog.ReportID = Catalog.ItemID\n```\n\n在图 11-23\
    \ 中，您可以看到所选报告的执行时间以及输入的参数名称和值。除了通过 `参数` 字段显示用户如何与报告交互外，`报告执行审计` 报告还显示了报告的开始和结束时间。拥有这种级别的审计是维护机密信息安全斗争中的宝贵盟友。对于\
    \ HIPAA，还需要维护用户数据访问的审计跟踪。如果您怀疑有人正在访问其无权查看的信息，此报告可以与其他常规审计程序（如 Windows 事件日志）一起作为审计跟踪。\n\
    \n![Image](img/9781430238102_Fig11-23.jpg)\n\n**图 11-23.** 报告执行审计报告\n\n## 日志文件审计简介\n\
    \n除了报告审计外，SSRS 还支持另外两种类型的日志记录：标准的 Windows 事件日志记录和跟踪文件日志记录。您可以使用这两种资源来搜索错误和警告，以及其他重要信息（如安全信息）。\n\
    \n所有跟踪文件都存储在默认安装位置 `驱动器:\\Program Files\\ Microsoft SQL Server\\MSRS11.MSSQLSERVER\\\
    Reporting Services\\LogFiles`。存在几种类型的日志文件：`ReportServerService` 和 `ReportServer`。每个文件都以时间戳命名，例如\
    \ `ReportServerService_05_31_2012_17_00_30.log` 和 `ReportServerService_HTTP_05_31_2012_17_00_30.log`，并包含特定于其各自服务的信息。您可以收集五个级别的跟踪日志信息——0\
    \ 到 4 级——这些级别在 `Reporting Services\\ReportServer\\Bin` 文件夹中的 `ReportingServicesService.exe.config`\
    \ 文件中控制。选择 `0` 将禁用跟踪，选择 `4` 将启用详细模式。每当 SSRS 出现问题时，管理员通常可以通过查看事件日志或某个跟踪文件来隔离问题。\n\
    \n### 小结\n\n在本章中，您研究了确保 SSRS 部署安全所必需的三项安全任务：加密、身份验证和审计。在内部，只有需要访问机密数据的员工才应该拥有该权限，您可以通过为报告部署应用特殊过滤器来确保这一点。作为一家处理大量机密患者信息的公司，我们必须遵守\
    \ HIPAA 规定的法规。然而，在其他行业，也存在许多类似的法规。对于任何公司来说，制定安全政策和程序都是良好的实践，即使不是在严格的监管下工作。幸运的是，SSRS\
    \ 设计用于通过 Windows 身份验证利用您组织中已存在的核心级安全机制，并且在需要时可以扩展以支持其他自定义身份验证方式。\n\n## 第 12 章"
- fmt: '## Delivering Business Intelligence with SSRS


    Most companies accumulate business data that, if analyzed correctly, can provide
    insights into what direction the company should take to achieve ultimate success.
    The main intention of Business Intelligence (BI) is to provide data in such a
    way that it can be immediately utilized to make important decisions. Microsoft’s
    BI platform comprises many services and applications that work together to facilitate
    the analysis and delivery of critical business data. `SQL Server` is at the heart
    of the BI model, providing data storage, data transformation, notification, scheduling,
    analysis, and reporting services.


    Having the right data available is just the first part of the challenge in building
    an effective BI system. The second part is to ensure that this data is delivered
    in an effective and accessible way to all the people who need to see it in order
    to make the right decisions. This is where `SSRS` comes into play. In our organizations,
    we found that by integrating `SSRS` with many of the other components of the BI
    platform, we were able to dramatically improve our overall business strategies
    by making necessary information available to our employees wherever they were
    and whenever they needed it.


    In this chapter, you will examine the following applications that we have extended
    to include the `SSRS` reports for our software development company:


    *Analysis Services*: Having the ability to “slice” through dimensions of data
    often renders unexpected and meaningful results. When `OLAP Services` was introduced
    with `SQL Server 7.0`, we were asked to build a data warehouse, transforming our
    `OLTP` data into an `OLAP` cube. We maintained this project using the version
    of `Analysis Services` that shipped with `SQL Server 2000` and had some new functionality,
    such as data mining models. Microsoft has invested heavily in `OLAP` technologies
    ever since. One such enhancement is the `VertiPaq` engine that is used with `SharePoint
    2010`, `PowerPivot`, and `Excel Services`. Using `PowerPivot` models and deploying
    them to a configured `SharePoint 2010` server, an `OLAP` cube is spun up in memory
    to allow rapid slicing and dicing of hundreds of millions of records.


    *SharePoint Services*: Part of Microsoft Office, `SharePoint Services` provides
    our company with an intranet portal that we have departmentalized. Any information
    relevant to individual departments or to the company as a whole is indexed and
    searchable. Integrating `SSRS` reports with `SharePoint` lets our employees easily
    find the data they require to do their jobs. I will show you how to add `SSRS`
    reports to `SharePoint`. Since `SSRS` builds on `Windows SharePoint Services`,
    the work you will do in this chapter will also be applicable to the `Windows SharePoint
    Services` included with `Windows Server 2003`. For a `SharePoint 2010` and `Reporting
    Services 2012` installation, you will need a 64-bit version of `Windows Server
    2008 SP2`.


    Most companies have similar applications to the ones we are describing. We are
    providing these examples to give you some ideas of how, with a modicum of effort,
    `SSRS` can easily enhance these types of business applications. Our purpose is
    not necessarily to provide a step-by-step guide, but to show how your company
    might use `SSRS`. If you use any of the technologies mentioned in this chapter,
    you can easily integrate this chapter’s ideas into your own environment.


    ### Building SSRS Reports for SQL Analysis Services


    When we began the journey of building an `OLAP` solution for our health-care application
    with `SQL Server 2000 Analysis Services`, we were eager to jump right in and start
    analyzing data the first morning. We quickly became the resident experts at developing
    `SQL` queries to interrogate our `OLTP` database. Since this was the source database
    from which we were going to build the warehouse, our team thought it would be
    a simple case of adding a few queries and processing the cube. It did not turn
    out to be quite that easy. In retrospect, however, the process of creating an
    `OLAP` cube from a known source of data was worthwhile, because we were able to
    apply the skills we learned to many other projects. With each new version of `Analysis
    Services`, more and more features were delivered. At first, this can seem overwhelming,
    simply because of the volume of enhancements and the time required to not only
    become familiar with the technology, but also master it. However, while adding
    new features, Microsoft also adds many new tools that simplify time-consuming
    tasks. In the case of `Analysis Services 2005`, these new tools included a graphical
    `MDX` query builder and a cube wizard that automates many of the steps that create
    the intricate parts of an `Analysis Services` solution. `SQL Server Analysis Services
    2008` and `2008 R2` went even further to add time-saving functionality, enhanced
    data analysis, and the capability to integrate with `SharePoint`. `SQL Server
    2012 Analysis Services` brought on new additions like the `VertiPaq` Engine mentioned
    earlier and `Tabular Models`, which are based off of the new `Business Intelligence
    Semantic Model` (`BISM`).


    In this section, we will show how to use a simple `Analysis Services` cube as
    the data source to build and deploy `SSRS` BI reports. The cube is based on a
    `SQL Server` database that serves as a data warehouse for the health-care application
    you have been using throughout the book. The cube is populated with data relevant
    to patient admissions for a health-care agency. Though we designed the report
    to analyze many aspects of patient admission history, such as patients with multiple
    recurrent admissions, changing diagnosis, and patient referral sources, we will
    show how to create a report that specifically delivers analytical information
    about the length of time between when a patient is referred to the agency and
    when he or she is actually admitted. Over time, the data that is collected can
    help assist decision makers isolate problem areas and improve the processes that
    may be causing inefficient patient referral times. First, let’s look at the database
    and cubes on which the report you create will be based.


    The data warehouse database you will use as a source for the `Analysis Services`
    project is called `HW_Analysis`. It is a simple database containing only eight
    tables, and is populated with data using `SQL Server Integration Services` (`SSIS`).
    The typical process for preparing a data warehouse database with `SSIS` is to
    export data from the source `OLTP` database, transform the data to make it more
    conducive to analysis by `SSAS`, and finally load this transformed data into the
    data warehouse or data mart.


    We have already built both the `HW_Analysis` database and the `SSAS` cube called
    `Patient Referral`, and we have included the required files for deploying these
    two key components and detailed installation instructions in the `ReadMe.txt`
    file included with code download for this book. The source code and related files
    are available in the `Source Code/Download` area for the book on the Apress Web
    site ([`http://www.apress.com`](http://www.apress.com)). Once you have restored
    the `HW_Analysis` data warehouse database per the instructions in the `ReadMe.txt`
    file, you can open the `Pro_SSRS` project, which contains the `Patient Referral`
    cube. [Figure 12-1](#Chapter12.html#fig_12_1) shows the simple `Patient Referral`
    cube structure in `BIDS`. The cube has six dimensions and two measures.'
  raw: '## Delivering Business Intelligence with SSRS


    Most companies accumulate business data that, if analyzed correctly, can provide
    insights into what direction the company should take to achieve ultimate success.
    The main intention of Business Intelligence (BI) is to provide data in such a
    way that it can be immediately utilized to make important decisions. Microsoft’s
    BI platform comprises many services and applications that work together to facilitate
    the analysis and delivery of critical business data. SQL Server is at the heart
    of the BI model, providing data storage, data transformation, notification, scheduling,
    analysis, and reporting services.


    Having the right data available is just the first part of the challenge in building
    an effective BI system. The second part is to ensure that this data is delivered
    in an effective and accessible way to all the people who need to see it in order
    to make the right decisions. This is where SSRS comes into play. In our organizations,
    we found that by integrating SSRS with many of the other components of the BI
    platform, we were able to dramatically improve our overall business strategies
    by making necessary information available to our employees wherever they were
    and whenever they needed it.


    In this chapter, you will examine the following applications that we have extended
    to include the SSRS reports for our software development company:


    *Analysis Services*: Having the ability to “slice” through dimensions of data
    often renders unexpected and meaningful results. When OLAP Services was introduced
    with SQL Server 7.0, we were asked to build a data warehouse, transforming our
    OLTP data into an OLAP cube. We maintained this project using the version of Analysis
    Services that shipped with SQL Server 2000 and had some new functionality, such
    as data mining models. Microsoft has invested heavily in OLAP technologies ever
    since. One such enhancement is the VertiPaq engine that is used with SharePoint
    2010, PowerPivot, and Excel Services. Using PowerPivot models and deploying them
    to a configured SharePoint 2010 server, an OLAP cube is spun up in memory to allow
    rapid slicing and dicing of hundreds of millions of records.


    *SharePoint Services*: Part of Microsoft Office, SharePoint Services provides
    our company with an intranet portal that we have departmentalized. Any information
    relevant to individual departments or to the company as a whole is indexed and
    searchable. Integrating SSRS reports with SharePoint lets our employees easily
    find the data they require to do their jobs. I will show you how to add SSRS reports
    to SharePoint. Since SSRS builds on Windows SharePoint Services, the work you
    will do in this chapter will also be applicable to the Windows SharePoint Services
    included with Windows Server 2003\. For a SharePoint 2010 and Reporting Services
    2012 installation, you will need a 64-bit version of Windows Server 2008 SP2.


    Most companies have similar applications to the ones we are describing. We are
    providing these examples to give you some ideas of how, with a modicum of effort,
    SSRS can easily enhance these types of business applications. Our purpose is not
    necessarily to provide a step-by-step guide, but to show how your company might
    use SSRS. If you use any of the technologies mentioned in this chapter, you can
    easily integrate this chapter’s ideas into your own environment.


    ### Building SSRS Reports for SQL Analysis Services


    When we began the journey of building an OLAP solution for our health-care application
    with SQL Server 2000 Analysis Services, we were eager to jump right in and start
    analyzing data the first morning. We quickly became the resident experts at developing
    SQL queries to interrogate our OLTP database. Since this was the source database
    from which we were going to build the warehouse, our team thought it would be
    a simple case of adding a few queries and processing the cube. It did not turn
    out to be quite that easy. In retrospect, however, the process of creating an
    OLAP cube from a known source of data was worthwhile, because we were able to
    apply the skills we learned to many other projects. With each new version of Analysis
    Services, more and more features were delivered. At first, this can seem overwhelming,
    simply because of the volume of enhancements and the time required to not only
    become familiar with the technology, but also master it. However, while adding
    new features, Microsoft also adds many new tools that simplify time-consuming
    tasks. In the case of Analysis Services 2005, these new tools included a graphical
    MDX query builder and a cube wizard that automates many of the steps that create
    the intricate parts of an Analysis Services solution. SQL Server Analysis Services
    2008 and 2008 R2 went even further to add time-saving functionality, enhanced
    data analysis, and the capability to integrate with SharePoint. SQL Server 2012
    Analysis Services brought on new additions like the VertiPaq Engine mentioned
    earlier and Tabular Models, which are based off of the new Business Intelligence
    Semantic Model (BISM).


    In this section, we will show how to use a simple Analysis Services cube as the
    data source to build and deploy SSRS BI reports. The cube is based on a SQL Server
    database that serves as a data warehouse for the health-care application you have
    been using throughout the book. The cube is populated with data relevant to patient
    admissions for a health-care agency. Though we designed the report to analyze
    many aspects of patient admission history, such as patients with multiple recurrent
    admissions, changing diagnosis, and patient referral sources, we will show how
    to create a report that specifically delivers analytical information about the
    length of time between when a patient is referred to the agency and when he or
    she is actually admitted. Over time, the data that is collected can help assist
    decision makers isolate problem areas and improve the processes that may be causing
    inefficient patient referral times. First, let’s look at the database and cubes
    on which the report you create will be based.


    The data warehouse database you will use as a source for the Analysis Services
    project is called HW_Analysis. It is a simple database containing only eight tables,
    and is populated with data using SQL Server Integration Services (SSIS). The typical
    process for preparing a data warehouse database with SSIS is to export data from
    the source OLTP database, transform the data to make it more conducive to analysis
    by SSAS, and finally load this transformed data into the data warehouse or data
    mart.


    We have already built both the HW_Analysis database and the SSAS cube called Patient
    Referral, and we have included the required files for deploying these two key
    components and detailed installation instructions in the ReadMe.txt file included
    with code download for this book. The source code and related files are available
    in the Source Code/Download area for the book on the Apress Web site ([`http://www.apress.com`](http://www.apress.com)).
    Once you have restored the HW_Analysis data warehouse database per the instructions
    in the ReadMe.txt file, you can open the Pro_SSRS project, which contains the
    Patient Referral cube. [Figure 12-1](#Chapter12.html#fig_12_1) shows the simple
    Patient Referral cube structure in BIDS. The cube has six dimensions and two measures.'
  trans: '## 使用 SSRS 交付商业智能


    大多数公司都会积累业务数据，如果分析得当，这些数据可以为公司指明实现最终成功的方向提供洞察。商业智能（BI）的主要目的是以可立即用于决策的方式提供数据。微软的
    BI 平台包含许多协同工作的服务和应用程序，以促进关键业务数据的分析与交付。`SQL Server`是 BI 模型的核心，提供数据存储、数据转换、通知、调度、分析和报表服务。


    拥有正确的数据只是构建有效 BI 系统挑战的第一部分。第二部分是确保这些数据以有效且易于访问的方式交付给所有需要查看它们以做出正确决策的人。这正是`SSRS`发挥作用的地方。在我们的组织中，我们发现通过将`SSRS`与
    BI 平台的许多其他组件集成，我们能够通过在员工需要时、无论他们身在何处都能提供必要信息，从而显著改善整体业务战略。


    在本章中，您将了解我们为我们的软件开发公司扩展并纳入`SSRS`报表的以下应用程序：


    *分析服务*：能够对数据进行多维度“切片”常常能产生意想不到且有意义的结果。当`OLAP 服务`随`SQL Server 7.0`引入时，我们被要求构建一个数据仓库，将我们的`OLTP`数据转换为`OLAP`多维数据集。我们使用随`SQL
    Server 2000`一起发行的`分析服务`版本来维护该项目，并增加了一些新功能，例如数据挖掘模型。自那时起，微软一直在`OLAP`技术上大力投入。其中一个增强功能是`VertiPaq`引擎，它与`SharePoint
    2010`、`PowerPivot`和`Excel 服务`一起使用。使用`PowerPivot`模型并将其部署到已配置好的`SharePoint 2010`服务器上，可以在内存中快速生成一个`OLAP`多维数据集，以实现对数亿条记录的快速切片和切块。


    *SharePoint 服务*：作为 Microsoft Office 的一部分，`SharePoint 服务`为我们公司提供了一个按部门划分的内网门户。任何与单个部门或整个公司相关的信息都会被索引并可搜索。将`SSRS`报表与`SharePoint`集成，使我们的员工能够轻松找到他们完成工作所需的数据。我将向您展示如何将`SSRS`报表添加到`SharePoint`。由于`SSRS`构建在`Windows
    SharePoint 服务`之上，您在本章中完成的工作也将适用于`Windows Server 2003`附带的`Windows SharePoint 服务`。对于`SharePoint
    2010`和`Reporting Services 2012`的安装，您将需要`Windows Server 2008 SP2`的 64 位版本。


    大多数公司都有与我们描述的应用程序类似的应用程序。我们提供这些示例是为了让您了解，只需付出少量努力，`SSRS`就能轻松增强这类业务应用程序。我们的目的不一定是提供逐步指南，而是展示您的公司可能如何使用`SSRS`。如果您使用了本章提到的任何技术，您可以轻松地将本章的想法整合到您自己的环境中。


    ### 为 SQL 分析服务构建 SSRS 报表


    当我们开始使用`SQL Server 2000 分析服务`为我们的医疗保健应用程序构建`OLAP`解决方案时，我们渴望在第一天早上就直接开始分析数据。我们很快成为了开发`SQL`查询来查询我们`OLTP`数据库的常驻专家。由于这是我们将要构建数据仓库的源数据库，我们的团队认为这不过是添加几个查询并处理多维数据集这么简单。但事实证明并非如此简单。然而，回想起来，从一个已知数据源创建`OLAP`多维数据集的过程是值得的，因为我们能够将学到的技能应用到许多其他项目中。随着`分析服务`的每个新版本发布，都交付了越来越多的功能。起初，这可能让人应接不暇，仅仅因为增强功能的数量庞大，以及不仅需要熟悉技术，还需要掌握它所需的时间。然而，在添加新功能的同时，微软也添加了许多简化耗时任务的新工具。以`Analysis
    Services 2005`为例，这些新工具包括一个图形化的`MDX`查询生成器和一个多维数据集向导，它自动化了许多创建`分析服务`解决方案复杂部分的步骤。`SQL
    Server Analysis Services 2008`和`2008 R2`更进一步，增加了节省时间的功能、增强的数据分析以及与`SharePoint`集成的能力。`SQL
    Server 2012 分析服务`带来了新的增补功能，比如前面提到的`VertiPaq`引擎和`表格模型`，后者基于新的`商业智能语义模型`（`BISM`）。


    在本节中，我们将展示如何使用一个简单的`分析服务`多维数据集作为数据源来构建和部署`SSRS` BI 报表。该多维数据集基于一个`SQL Server`数据库，该数据库作为贯穿本书的医疗保健应用程序的数据仓库。多维数据集填充了与医疗机构患者入院相关的数据。虽然我们设计该报表是为了分析患者入院历史的许多方面，例如多次重复入院的患者、变化的诊断和患者转诊来源，但我们将展示如何创建一个专门提供关于患者被转诊到机构与其实际入院之间时间间隔的分析信息的报表。随着时间的推移，收集到的数据可以帮助决策者定位问题区域，并改进可能导致患者转诊时间效率低下的流程。首先，让我们看一下您将创建的报表所基于的数据库和多维数据集。


    您将用作`分析服务`项目源的数据仓库数据库名为`HW_Analysis`。这是一个简单的数据库，仅包含八个表，并使用`SQL Server 集成服务`（`SSIS`）填充数据。使用`SSIS`准备数据仓库数据库的典型过程是：从源`OLTP`数据库导出数据，转换数据使其更易于`SSAS`分析，最后将这些转换后的数据加载到数据仓库或数据集市中。


    我们已经构建了`HW_Analysis`数据库和名为`Patient Referral`的`SSAS`多维数据集，并将部署这两个关键组件所需的文件以及详细的安装说明包含在本书代码下载附带的`ReadMe.txt`文件中。源代码和相关文件可在
    Apress 网站（[`http://www.apress.com`](http://www.apress.com)）的本书`Source Code/Download`区域获取。一旦您按照`ReadMe.txt`文件中的说明还原了`HW_Analysis`数据仓库数据库，就可以打开包含`Patient
    Referral`多维数据集的`Pro_SSRS`项目。图 12-1 显示了`BIDS`中简单的`Patient Referral`多维数据集结构。该多维数据集有六个维度和两个度量值。'
- fmt: "![Image](images/square.jpg) **Note** If you have skipped to this chapter,\
    \ note that `Business Intelligence Development Studio` (`BIDS`) and `SQL Server\
    \ Data Tools` (`SSDT`) have been used synonymously throughout this book. If you\
    \ are using `SSRS 2005` through `SSRS 2008 R2`, the shortcut to start `DEVENV.exe`\
    \ was labeled `SQL Server Business Intelligence Development Studio`. In 2012,\
    \ it is now labeled `SQL Server Data Tools`.\n\n![Image](images/9781430238102_Fig12-01.jpg)\n\
    \n**Figure 12-1.** Patient Referral cube structure\n\nOf the six dimensions, several\
    \ of them should be familiar to you because you have worked with them in other\
    \ chapters of the book. Dimensions contain textual attributes that describe the\
    \ fact data. You can think of a dimension in a cube as pre-aggregated groups or\
    \ categories of data that can be associated with one or more measures. Measures,\
    \ such as `Time to Admission` and `Fact Referral Count`, are calculated values\
    \ at each level in a dimension. Multidimensional data stored in a cube consists\
    \ of both dimensions and measures that, when queried using `MultiDimensional eXpressions`\
    \ (`MDX`), can be analyzed not just two-dimensionally like rows and columns of\
    \ a `T-SQL` query, but also by being drilled into and sliced at many dimensions.\n\
    \nPicture a cube like the Rubik’s cube invented in 1974 that many of us played\
    \ with as children. It contains three squares in height, three squares in width\
    \ and three squares on depth. With that picture in your head, imagine if you will\
    \ that the green side of the Rubik’s cube represents the `Date of Admission` dimension,\
    \ the red side representing the `Branch` dimension and the yellow representing\
    \ the `Time to Admission` measure. Much easier than solving a Rubik’s cube, you\
    \ could create an `MDX` query that would return the intersection of these three\
    \ points as shown in [Figure 12-4](#Chapter12.html#fig_12_4).\n\nThe dimensions\
    \ you will use in the Patient Referral cube are:\n\n> *   `County`\n> *   `Referral\
    \ Source`\n> *   `Diagnosis`\n> *   `Payer`\n> *   `Branch`\n> *   `Date of Admission`\n\
    \nSince the starting point in this exercise is a prepopulated and processed cube,\
    \ it is important to make sure you are getting the desired data from the cube\
    \ before creating your `SSRS` reports. With the `Pro_SSRS` project open in `BIDS`,\
    \ navigate to the `Patient Referral SSAS` project in the Solution Explorer, expand\
    \ to Cubes, and double-click `Patient Referral.cube`. This will open the cube\
    \ in design mode. Once the cube is open, select the Browser tab. [Figure 12-2](#Chapter12.html#fig_12_2)\
    \ shows the opened cube with the combined measures and dimensions ready to be\
    \ dragged and dropped into the query pane. If no data appears in the Browser tab,\
    \ and a message indicates that there is a permission problem or the database does\
    \ not exist, this usually indicates that the cube needs to be processed or the\
    \ `SSAS Patient Referral` database needs to be deployed. To deploy the `Patient\
    \ Referral OLAP` database (the cube) in `BIDS`, right-click the `Patient Referral`\
    \ project, and select Deploy. If the default permission settings are insufficient\
    \ for your `Analysis Services` instance, you may have to open up the Data Source\
    \ Designer for the `HW Analysis` data source and change the `Impersonation Information`\
    \ to use a specific user name and password. For instance, my settings are set\
    \ to use “`SQLBIGEEK\\bmcdonald`” for the Windows user with appropriate permissions\
    \ to deploy the cube. Once you have deployed the `Patient Referral OLAP` database\
    \ successfully, you can return to the Browser tab, and click the available link\
    \ to reconnect to the database.\n\n![Image](images/9781430238102_Fig12-02.jpg)\n\
    \n**Figure 12-2.** Viewing the Patient Referral cube in BIDS\n\nPerform the following\
    \ steps to see the average `Time to Admission`:\n\n> 1.  You can begin by expanding\
    \ `Measures` and then `Fact Referral` in the cube object window on the left of\
    \ the cube design pane.\n> 2.  Next, drag the `Time of Admission` measure to the\
    \ `Drag Levels or Measures here to add to the query` section of the query pane.\
    \ Typically, when browsing the cube or creating reports, you will want to drag\
    \ over the measures before you drag over your dimension attributes. You should\
    \ see an average time of 14.095 days. This calculation was done at the time the\
    \ cube was originally loaded and processed and represents a total average of time\
    \ to admission for all dimensions combined. [Figure 12-3](#Chapter12.html#fig_12_3)\
    \ shows the `Time to Admission` measure in the query pane.\n>     \n>     ![Image](images/9781430238102_Fig12-03.jpg)\n\
    >     \n>     **Figure 12-3.** Viewing the overall Time to Admission measure’s\
    \ average for all dimensions\n>     \n>     \n> 3.  Now drag two dimension objects\
    \ onto the data pane. Under the `Branch` object, drag and drop the `Branch Name`\
    \ field to the left of our `Time to Admission` measure.\n> 4.  Next, under `Date\
    \ of Admission`, drag and drop the `Year - MonthName - admitdate` hierarchy to\
    \ the right of `Branch Name` in the data pane. The hierarchy looks like a pyramid\
    \ made of six squares. When finished, the cube browser should look like [Figure\
    \ 12-4](#Chapter12.html#fig_12_4). You can now see the results for every single\
    \ `admitDate` along with its corresponding `Branch Name`, `Year` and `MonthName`\
    \ attributes.\n\nIn prior releases of the cube browser, you could drill down into\
    \ hierarchies and have column groupings as we have seen in the `Matrix`-style\
    \ reports. However, as of the current release of `SQL Server 2012`, the cube browser\
    \ returns the data two-dimensionally much like the results of a `T-SQL` query.\
    \ Some active members in the `SQL Server` user community has stated that this\
    \ is a strange setback for Microsoft’s cube browser and I personally believe that\
    \ they should add the functionality back. However, nothing really has changed\
    \ from the reporting perspective. If you are seeing the results depicted in [Figure\
    \ 12-3](#Chapter12.html#fig_12_3) above, then you are indeed getting data from\
    \ the cube! Now it is time to move on to `SSRS` and create the report you will\
    \ deploy to `SharePoint`.\n\n![Image](images/9781430238102_Fig12-04.jpg)\n\n**Figure\
    \ 12-4.** Cube browser with year and branch\n\n## Using an Analysis Service Cube\
    \ with SSRS\n\nNow that you have determined that the `Patient Referral` cube is\
    \ working as it should, the next step is to create an `SSRS` report. In the `Pro_SSRS`\
    \ project, you will find two completed reports, the `Average Referral to Admission`\
    \ report and the `Referral to Admission Chart` report. Both reports are based\
    \ on the `Patient Referral` cube. Since creating reports is the same, we will\
    \ not go through the procedure of building these reports step by step. However,\
    \ we will demonstrate the following through the `Average Referral to Admission`\
    \ report:\n\n> *   Setting up a data source to use `Analysis Services`\n> *  \
    \ Using the graphical `MDX` query builder that was added with `SQL Server Reporting\
    \ Services 2005`"
