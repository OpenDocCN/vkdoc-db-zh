  trans: '

    ## 设置分析服务数据源


    打开 `Pro_SSRS` 项目后，导航至 `Reports` 文件夹，并打开“平均转诊至入院时间”报表。接着，打开“报表数据”窗口。右键单击 `Patient_Referral`
    数据集，从子菜单中选择“查询”选项。请注意，该查询识别出您正在使用带有 `MDX` 的 OLAP 数据源，并会打开图形化的 `MDX` 查询设计器。如您所见，这与本书中访问查询时一直使用的
    `T-SQL` 查询窗口截然不同。如果您选择筛选表达式并筛选 2010、2011 和 2012 年，您应该会看到类似于 图 12-5 所示的结果。此报表中包含两个数据集：`Patient_Referral`
    和 `DateofAdmissionYear`。


    ![Image](img/9781430238102_Fig12-05.jpg)


    图 12-5. 查看“平均转诊至入院时间”报表的 `Patient_Referral` 数据集


    这两个数据集的数据源类型均为 Microsoft SQL Server Analysis Services。如果您的 Analysis Services 实例不在您所连接的本地计算机上，则需要将报表中默认的
    `localhost` 数据源服务器更改为您的 SSAS 服务器名称。您可以通过双击名为 `PatRef_DS` 的共享数据源并编辑数据源属性以匹配您的环境来轻松完成此操作，如
    图 12-6 所示。


    在数据集针对您的 SSAS 环境正确配置后，接下来您将了解如何构建 `MDX` 查询。


    ![Image](img/9781430238102_Fig12-06.jpg)


    图 12-6. `PatRef_DS` 数据源的连接属性


    ## 使用图形化 MDX 查询生成器


    在 `SQL Server 2005` 的 `SSRS` 中引入并在 `2008` 版中进一步增强的一个重要新特性，就是图形化的 `MDX` 查询生成器。`MDX`
    是一门相当庞大且复杂的语言，容易出现语法错误。您必须对其有内在的理解，才能真正从 SSAS 多维数据集中提供精确的数据。拥有并使用图形化查询工具来构建基础
    `MDX` 查询（其方式与开发人员使用图形化查询设计器构建 `T-SQL` 查询非常相似），可以减少常见的语法错误并加快查询开发速度。


    打开“平均转诊至入院时间”报表的报表数据查询窗口，注意到列出了几个维度和度量值元素：`BranchName`、`Year`、`MonthName`、`Time
    to Admission` 和 `Fact Referral Count`。默认情况下，报表将在图形设计模式下打开，如 图 12-7 所示，而不是通用查询设计器。设计模式通过工具栏右侧的“设计模式”按钮进行切换。在图形设计模式中，维度元素可以直接从列出这些元素的“元数据”窗格拖放到窗口中。如果选择了“自动执行”按钮（默认情况下已选择），则每当拖放元素时，查询就会执行，并显示数据结果。


    ![Image](img/9781430238102_Fig12-07.jpg)


    图 12-7. 图形化查询生成器的输出


    如同您在“患者转诊”多维数据集浏览器中查询同一多维数据集时所看到的数据多维视图一样，`SSRS` 以二维方式（行和列）看待数据。`SSRS` 报表可以从多维数据集访问数据；然而，有必要以二维方式排列数据，因为报表在求和及总计度量值（本例中为
    `Time to Admission` 和 `Fact Referral Count`）时将以此方式聚合数据。我们还对查询应用了筛选器，以便仅选择 2010
    年至 2012 年的数据。


    正如您可能在 图 12-7 的左下角所注意到的，您可以使用工具栏上的几个按钮来修改查询的属性，例如显示空单元格或添加计算成员。计算成员是 `MDX` 查询的一部分，通过将一个或多个元素组合成一个可作为新元素独立使用的值而创建。例如，您可以创建计算成员，不仅显示每个维度元素（如
    `BranchName` 和 `Year`）的平均入院时间，还显示使用 `MIN` 函数计算的最短入院时间，或使用 `MAX` 函数计算的最长入院时间。这些计算成员将成为整个查询的一部分，可作为新的度量值使用，并在每个维度级别返回数据值。换句话说，如果您需要在报表层创建一个在多维数据集本身中并未创建为计算的计算，您可以在报表的数据集层创建一个“计算成员”。对于那些不擅长编写
    `MDX` 计算的人来说，这是一种创建报表级计算的简便方法。


    图形化查询构建并运行后，现在让我们看看其背后生成的 `MDX` 代码。您可以通过单击“设计模式”工具栏按钮来查看。图 12-8 显示了为报表返回所选维度元素和度量值的
    `MDX` 查询。


    ![Image](img/9781430238102_Fig12-08.jpg)


    图 12-8. 以图形方式生成的 `MDX` 查询


    ![Image](img/square.jpg) **注意** 如果您在文本模式下修改了 `MDX` 查询并尝试返回设计模式，您可能会丢失对查询所做的任何手动更改，如
    图 12-9 所示。


    ![Image](img/9781430238102_Fig12-09.jpg)


    图 12-9. 更改 `MDX` 查询时显示的警告消息


    “平均入院时间”和“转诊至入院时间图表”这两个报表都将在 SharePoint 中以紧凑的 Web Part 形式显示，我们将在下一节介绍如何操作。因此，我们有意将报表尺寸设置得较小，使用
    8 磅 Arial 字体和狭窄的单元格。图 12-10 显示了“平均入院时间”报表的“设计”选项卡。


    ![Image](img/9781430238102_Fig12-10.jpg)


    图 12-10. “平均转诊至入院时间”报表的布局选项卡


    此时，我们可以将两个报表都发布到报表服务实例，并将报表交付给用户。这两个报表结合了一定程度的商业智能，非常适合在仪表板或业务门户中视图。为此，我们将在设计环境中最后查看第二个基于图表的报表，然后转向完全集成的
    Microsoft SharePoint 部署，在 SharePoint 本身内部查看和管理报表。图 12-11 显示了在 BIDS 中预览的“转诊至入院时间图表”报表。


    ![Image](img/9781430238102_Fig12-11.jpg)


    图 12-11. 在设计环境中预览“转诊至入院时间图表”报表

