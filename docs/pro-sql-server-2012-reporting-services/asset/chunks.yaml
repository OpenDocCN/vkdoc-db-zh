    # C H A P T E R 1


    ## Introducing the Reporting Services Architecture


    Microsoft’s 2003 announcement that it was going to release SQL Server Reporting
    Services (SSRS) as a SQL Server 2000 add-on stirred up a frenzy of excitement.
    The product was originally slated for release with SQL Server 2005, so the early
    release was a welcome event for many. Our software development company decided
    to embrace SSRS early on and was fortunate to work with Microsoft during the beta
    phases. In January 2004, the month Microsoft’s released SSRS to manufacturing
    (RTM), we deployed it immediately. We intended to migrate all of our existing
    reports (which we had developed on as many as five reporting applications and
    platforms over the previous ten years) to SSRS. We can sum up the reason for the
    seemingly rapid decision in one word: standardization.


    Just as Microsoft wanted to create an industry standard with Report Definition
    Language (RDL), the Extensible Markup Language (XML) schema that dictates the
    common structure of all SSRS reports, we wanted to provide a standard reporting
    solution to our customers. Even in the first version of the product, SSRS delivered
    almost all the features we needed. Thanks to its extensibility via SSRS’s Web
    service, we could programmatically add other features that weren’t already directly
    supported. In addition, Microsoft was committed to enhancing SSRS for years to
    come. Some of the features released in the 2005 edition were client-side printing,
    interactive sorting capabilities, and an ability to define multivalued parameters.
    There was also a move forward in the self-service business intelligence (BI) arena
    with Microsoft’s first ad hoc Report Builder ClickOnce application.


    Microsoft’s next release was SSRS 2008. The new release brought on many long-awaited
    enhancements to include modifications of its architecture, completely revamped
    report designer, and 2008 R2 brought us significant design updates to the built-in
    Report Manager application. With the vast updates implemented in the 2008 release,
    SSRS has taken its place as a key SQL Server component in Microsoft’s business
    intelligence suite of products alongside SQL Server Integration Services (SSIS)
    and SQL Server Analysis Services (SSAS). Nobody could now think of Reporting Services
    as just an add-on.


    The new features in SSRS 2008 and SSRS 2008 R2 pushed the technology one step
    further into becoming the reporting development environment of choice for programmers
    and designers, especially those already skilled with Visual Studio (VS) and Visual
    Basic .NET (VB.NET). As they were for its predecessors, SSRS 2005, SSRS 2008,
    and SSRS 2008 R2, the long-awaited features for SSRS 2012 are mostly driven by
    direct feedback from the user community. Throughout the book, we will demonstrate
    each of the new features released in 2008, 2008 R2, and 2012 as we show how to
    design professional reports, applications, and solutions built on Microsoft’s
    BI initiatives. We will focus on SSRS as a whole, building on features from each
    version from 2000 to 2012; however, we will point out which features are new to
    SSRS 2008 R2 and SSRS 2012.'
