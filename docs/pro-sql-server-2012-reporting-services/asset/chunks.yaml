- fmt: '# Creating Reports Using Report Builder 1.0, 2.0, and 3.0


    When it comes to user-developed reports, we often have to deal with the problem
    of providing the underlying data in a controlled and secure way, but with enough
    freedom for that data to be useful for making business decisions. In `SQL Server
    2005`, Reporting Services included the first version of the `Report Builder`.
    `Report Builder` is an application that offloads some of the tedious report design
    tasks to the report consumers themselves.


    In `Report Builder 1.0`, users with appropriate permissions could create and publish
    their own reports with one caveat: the data had to be provided using a predesigned
    report model. This report model created an abstraction layer, if you will, that
    allowed the users to use the provided attributes as report elements. As with any
    new advances in software development, we often find some functionality is deprecated.
    In that regard, `SQL Server 2012` is no different. We can no longer create Report
    models using the 2010 version of `BIDS`, `SSDT`, or `Visual Studio`, but we can
    still utilize them as a data source within our reports.


    With the release of `SQL Server 2008` came the `Report Builder 2.0` application.
    With its `Ribbon` technology, akin to other `Microsoft Office` products, `Report
    Builder 2.0` delivered a familiar interface and trumped `Report Builder 1.0` by
    allowing users to write queries and use stored procedures to access data directly
    from the database, without the extra abstraction layer of a report model. This
    new interface was intuitively easier to use, with capabilities that far exceeded
    those of `Report Builder 1.0`.


    In April of 2010 came the release of `SQL Server 2008 R2` and with it came another
    version of the `Report Builder` that offered dataset caching and integration with
    the enhanced visualization report controls like the `Map` and `Sparklines`, as
    well as `Indicators`. Since you are now familiar with producing reports using
    `BIDS`, let’s turn our attention throughout this chapter to creating practical
    real world reports in `Report Builder 1.0`, `2.0` and `3.0` applications.


    One thing to note before we get started is that, at the time of writing of this
    book, the vast majority of organizations are still using prior versions of `SQL
    Server`. As such, we decided to keep Report Models and `Report Builder 1.0` in
    this version of the book. If `SQL Server 2012` is the only version that your organization
    owns, or if your company is planning to migrate everything to `SQL Server 2012`,
    you can skip over the Report Model and `Report Builder 1.0` sections. If your
    company is one of those migrating to `2012`, just know that there is currently
    no path for migrating Report Models to `SQL Server 2012`. With that caveat behind
    us, let’s get started.


    First, we will explore `Report Builder 1.0` and its components. As you will see,
    even though the user who compiles the report needs to do some design work, the
    administrator still needs to design the report model that provides data to the
    `Report Builder 1.0` client application. We will walk you through the process
    of using `Report Builder 1.0` from two vantage points—developing and publishing
    a report model based on user input and then creating your own ad hoc reports based
    on that model. The three steps we will cover are gathering user feedback, creating
    and publishing the report model, and finally testing the report model by creating
    reports with `Report Builder 1.0`:


    > *Getting feedback*: Since we have worked alongside developers for many years,
    we know that one of the biggest problems with delivering a new application is
    that sometimes users get the application and expect it to do more than it does,
    or expect it to do something in a different way than delivered. The expectation
    from a user’s perspective is that the system should do exactly what the user needs.
    But for a developer, if it doesn’t do it in version 1, it will have to do it in
    version 2. You can avoid this conflict by implementing standard design practices,
    which always take user feedback into consideration up front. This process is especially
    important when the same application will be delivered to different companies with
    users from different backgrounds, each with their own interpretations of how a
    process should work. In the past few decades, a system analyst would take information
    from groups of users and translate this to a technical design that the developer
    could slowly digest. Today, most system analysis work is done directly by the
    developer, who interacts with users during the design phase of the project. Before
    we cover how to build a report model to be used by report designers, we will provide
    a sampling of some of the feedback we have received about the kinds of reports
    users would like to see.

    >

    > *Building the report model*: The report model is the heart of `Report Builder
    1.0`. Report models serve as semantic descriptions of the underlying data source.
    Because the report model can simplify a potentially complex overall database schema
    by selecting individual tables, fields, and values, it can be likened to a `SQL
    Server` view. Indeed, a key component of the report model, as you will see in
    this chapter, is a `data source view`. Once `DBAs` or developers have created
    a report model that contains the data to meet the requirements of the users, they
    can publish it to the report server where it can be used by `Report Builder 1.0`,
    which is the client-side report designer. All the data provided to `Report Builder
    1.0` come from published report models. We will show how to create and publish
    models in this chapter based on user feedback.

    >

    > *Using Report Builder 1.0*: `Report Builder 1.0` is one of several design applications
    that can be used to create and publish `SSRS` reports without requiring a full
    development environment like `Visual Studio` or `BIDS`. `Report Builder 1.0` relies
    on pre-published report models as its data sources. As you will see, the interface
    for `Report Builder 1.0` is intuitive; in fact, it is ideal for users who need
    to quickly create reports based on predefined report templates. `Report Builder
    1.0` not only allows users to design reports, but also serves as the publishing
    tool to deploy the completed report directly to the report server.


    When we begin talking about `Report Builder 2.0`, where users have more control
    of the data they are accessing, you’ll see that much of the same concepts that
    you learned with respect to `Report Builder 1.0` still apply. Developers may find
    themselves still creating views and stored procedures based on feedback from a
    user who will ultimately be designing the reports. Likewise, many developers may
    decide that `Report Builder 2.0` has all of the features they need and will select
    it as their preferred development environment.'
