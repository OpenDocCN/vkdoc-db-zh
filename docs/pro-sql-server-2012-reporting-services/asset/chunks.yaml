    \n***Figure 5-3.** Chart properties*\n\nFinally, right-click inside of the chart\
    \ graphic area while on the Design tab, and select 3D Effects. Next, click the\
    \ checkbox to enable 3D effects and click OK. Before previewing the chart, rename\
    \ the title from Chart Title to **Visit Count By Patient**. You can now preview\
    \ the chart, as displayed in [Figure 5-4](#Chapter05.html#fig_5_4).\n\n![Image](images/9781430238102_Fig05-04.jpg)\n\
    \n***Figure 5-4.** Chart with custom properties*\n\n![Image](images/square.jpg)\
