- fmt: '### Creating a Chart Report


    The last report type available in Report Builder 1.0 is the chart report. Thus
    far, you have created and saved table and matrix reports to address many of the
    report requests for the Patient Census report. Now, we will show one of the most
    important reports to answer the question of the number of patients on the census.
    Census means that the patients are currently receiving services and have not been
    discharged. In the database you are using, a patient is considered active if his
    or her discharge date is `Null`, or, in Report Builder 1.0 vernacular, empty.
    The chart you create will be a simple bar chart showing a count of active patients
    by their branch association.


    Return to the design area of Report Builder 1.0, and click the chart report in
    the Report Layout tab. The blank report template has a single Chart data region,
    as shown in [Figure 13-38](#Chapter13.html#fig_13_38). As you did with the two
    previous reports, table and matrix, you will add a title: Active Patient Census.


    ![Image](images/9781430238102_Fig13-38.jpg)


    **Figure 13-38.** Chart report template


    The chart has three areas to which you can drag and drop data: Series, Category,
    and Data. You want to be able to show an active patient count, so you could drag
    the `Pat ID` field to the Data area; however, because the `Pat ID` field is not
    seen as a field that can have an aggregated function applied to it, unlike `Avg
    Length of Stay`, you cannot drag it directly to the Data area. The chart simply
    won’t accept it to be dropped there. Since you know you will need both a count
    value and a filter to get only active patients, you can take care of both at the
    same time by adding a new field to the field list. Click the New Field button
    in the Explorer tab, and name the new field `Patient Count`, as shown in [Figure
    13-39](#Chapter13.html#fig_13_39). The formula you can use for the `Patient Count`
    field is `COUNTDISTINCT(Pat ID)`. Notice that in the Define Formula dialog box
    that the `Pat ID` field, when added to the Formula textbox, has a dotted line
    beneath it indicating a link. You can click the field and add a filter while defining
    the formula for the new field, which you will do next.


    ![Image](images/9781430238102_Fig13-39.jpg)


    **Figure 13-39.** Defining a formula for a new field, `Patient Count`


    Click the No Filter Applied link, and select Create a New Filter to open the Filter
    Data dialog box. You can see the filter you need to apply to show only active
    patients in [Figure 13-40](#Chapter13.html#fig_13_40), where you have set `Discharge
    Date` to empty, which will force only patients who do not have discharge dates
    to be used in the formula. To implement the filter, drag `Discharge Date` over
    into the filter pane. Then select the Is Empty value by clicking on the equals
    link label. Call the filter `Active Patients`, and click OK. Once the `Patient
    Count` field is created and shows up on the Fields tab, you can drag and drop
    it in the Data value fields area of the chart. In this case, since we are adding
    it to the Data value fields area, we could simply double-click on the `Patient
    Count` field and Report Builder will place it in the correct section.


    ![Image](images/9781430238102_Fig13-40.jpg)


    **Figure 13-40.** Adding the `Active Patients` filter


    Next, drag the `Branch Name` field to the Categories area of the chart. You could
    add further series items or categories to the chart, but to keep the chart simple
    and to address the request, you will just apply some formatting to the chart by
    way of removing the chart title so that it does not say “Chart Title” on the report.
    To modify the chart properties, follow these four steps:


    > 1. Right-click the chart, and select Chart Options.

    > 2. On the Titles tab, delete the text for the chart, Category X and ValueY titles.

    > 3. On the Legend tab, remove the check from the Show legend checkbox.

    > 4. Finally, on the 3D tab, check the Display Chart with 3-D Visual Effect box,
    set Horizontal Rotation to 25, set Vertical Rotation to 10, Realistic as the Shading,
    and select Cylinder as the shape, as shown in [Figure 13-41](#Chapter13.html#fig_13_41).


    ![Image](images/9781430238102_Fig13-41.jpg)


    **Figure 13-41.** Setting 3D visual effects


    The last task before previewing the report is to set the data labels on the chart.
    To do this:


    > 1. Right-click the chart, select Data Series, and then select Format Data Series–Patient
    Count. If you would like to have the patient count value display on the bars of
    the chart, select Show Point Labels. For this example, select the option to Show
    point labels.

    > 2. Set the angle to –10 degrees to make it stand out a little.

    > 3. Click the Format button to set the font size to be 16.


    When you click OK to set the point labels and then preview the report, you can
    see the chart with the active patient counts per branch. As patients are discharged,
    they will drop from the active patient list because of the filter, and the chart
    will automatically reflect the current census count. [Figure 13-42](#Chapter13.html#fig_13_42)
    shows the completed chart. Now you can save the chart report as `Active Patient
    Census` to the `Pro_SSRS` folder, as you did the other two reports.


    ![Image](images/9781430238102_Fig13-42.jpg)


    **Figure 13-42.** Preview of the Active Patient Census chart report


    The reports are deployed as standard RDL report files with the exception that
    their data source is a report model and not a standard RDS data source object.
    You can see the three newly published reports in Report Manager, as shown in [Figure
    13-43](#Chapter13.html#fig_13_43).


    ![Image](images/9781430238102_Fig13-43.jpg)


    **Figure 13-43.** Report Builder 1.0 reports published in Report Manager'
