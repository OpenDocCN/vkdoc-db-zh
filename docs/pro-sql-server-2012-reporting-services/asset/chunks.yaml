    ## 前提条件


    本书所有示例中使用的核心软件是：


    *   Microsoft SQL Server 2012

    *   Microsoft Visual Studio 2010 – 在第 7、8、9 和 10 章中使用

    *   Microsoft SharePoint 2010 – 在第 12 章中与 SSRS 集成时使用

    *   Microsoft SQL Server 2008 R2 – 在第 13 章中用于通过报表模型进行临时报告


    如果您，作为读者，希望跟随本书中的示例进行操作，则需要使用上述每项软件。大多数示例是使用 SQL Server 2012 构建的，但除了第 7、8 和 9
    章外，它们也可以在 SQL Server 2008 R2 上执行。


    ## 下载代码


    在本书中，我们使用了为某个医疗保健应用程序设计的真实数据库的子集，这是我们中一些人多年来开发的。您可以在 Apress 网站（[`www.apress.com`](http://www.apress.com)）的“源代码/下载”部分找到所有支持材料（数据库、第
    12 章中使用的数据仓库数据库和多维数据集文件、完成的 RDL 文件、查询、存储过程以及 .NET 应用程序项目）和完整的安装说明。由于多年来已有许多类似标题的书籍存在，使用本书的
    ISBN 号码可能更容易找到它。本书的 13 位行业标准 ISBN 号码是 978-1-4302-3810-2。


    ## 联系作者


    如果您对本书的任何部分有任何疑问，请随时通过我们的电子邮件或 Twitter 账户联系我们。我们很乐意听到您购买了我们的书，所以请随时给我们发推文。我们衷心希望您能从阅读本书中获得与我们为您撰写本书时所拥有的同等乐趣。


    > Brian K. McDonald

    > [`bmcdonald@sqlbigeek.com`](http://bmcdonald@sqlbigeek.com)

    > @briankmcdonald

    >

    > Shawn McGehee

    > [`shawnnwf@gmail.com`](http://shawnnwf@gmail.com)

    > @SQLShawn

    >

    > Rodney Landrum

    > [`rodneylandrum@hotmail.com`](http://rodneylandrum@hotmail.com)

    > @SQLBeat


    # 第 1 章


    ## 介绍 Reporting Services 架构


    微软在 2003 年宣布将作为 SQL Server 2000 的加载项发布 SQL Server Reporting Services (SSRS) 时，激起了一阵兴奋的狂热。该产品原计划与
    SQL Server 2005 一起发布，因此这次提前发布对许多人来说是一个受欢迎的事件。我们的软件开发公司决定尽早采纳 SSRS，并有幸在 beta 阶段与微软合作。2004
    年 1 月，也就是微软将 SSRS 发布到制造 (RTM) 的那个月，我们立即部署了它。我们打算将我们所有的现有报表（这些报表是在过去十年中使用多达五种报表应用程序和平台开发的）迁移到
    SSRS。我们可以用一个词来概括这个看似仓促的决定：标准化。


    正如微软希望用报表定义语言 (RDL) —— 一种规定所有 SSRS 报表通用结构的可扩展标记语言 (XML) 模式 —— 创建行业标准一样，我们也希望为客户提供标准化的报表解决方案。即使在该产品的第一个版本中，SSRS
    也提供了我们所需的几乎全部功能。得益于通过 SSRS 的 Web 服务提供的可扩展性，我们可以编程方式添加其他尚未直接支持的功能。此外，微软承诺在未来数年持续增强
    SSRS。2005 版本中发布的一些功能包括客户端打印、交互式排序功能以及定义多值参数的能力。在自助式商业智能 (BI) 领域，随着微软首个临时报表生成器
    ClickOnce 应用程序的推出，也取得了进展。


    微软的下一个版本是 SSRS 2008。新版本带来了许多期待已久的改进，包括对其架构的修改、完全重新设计的报表设计器，而 2008 R2 为我们带来了对内置报表管理器应用程序的重要设计更新。随着
    2008 版本中实施的大量更新，SSRS 已作为关键的 SQL Server 组件，在微软的商业智能产品套件中与 SQL Server Integration
    Services (SSIS) 和 SQL Server Analysis Services (SSAS) 并驾齐驱。现在没有人会认为 Reporting
    Services 只是一个附加组件了。


    SSRS 2008 和 SSRS 2008 R2 中的新功能将该技术进一步推向前进，使其成为程序员和设计师，尤其是那些已经熟练使用 Visual Studio
    (VS) 和 Visual Basic .NET (VB.NET) 的人的首选报表开发环境。与其前代产品 SSRS 2005、SSRS 2008 和 SSRS
    2008 R2 一样，SSRS 2012 中期待已久的功能大多是由用户社区的直接反馈驱动的。在本书中，当我们展示如何基于微软的 BI 计划设计专业的报表、应用程序和解决方案时，我们将演示
    2008、2008 R2 和 2012 版本中发布的每一项新功能。我们将以 SSRS 整体为重点，构建从 2000 年到 2012 年各版本的功能；但是，我们将指出哪些功能是
    SSRS 2008 R2 和 SSRS 2012 新增的。

    '
- fmt: "### Understanding the Benefits of SSRS\n\nOur company based its decision to\
    \ migrate immediately to SSRS on the following perceived benefits for the company\
    \ and for our customers:\n\n> *   *Standard platform*: As well as providing a\
    \ standard realized with the `RDL`, our development teams had been using `VS .NET`\
    \ as their main development environment. Because `SSRS` reports were currently\
    \ developed within this platform, we wouldn’t need to purchase additional development\
    \ software. Our clients would need to purchase only a low-cost edition of a designer—`VB.NET`,\
    \ for example—to gain the benefit of developing their own custom reports. In `SQL\
    \ Server 2005`, Microsoft included the Business Intelligence Development Studio\
    \ (`BIDS`) as a free, alternative report designer. This free development environment\
    \ has been available with `SQL Server` ever since, but Microsoft has recently\
    \ renamed it as `SQL Server Data Tools` (`SSDT`). Throughout this book, we will\
    \ use `BIDS` and `SSDT` interchangeably. The `BIDS` environment runs in the shell\
    \ of `Visual Studio` (`devenv.exe`) and, at the time of writing, is based on `Visual\
    \ Studio`—`VS 2008` for `2008` and `2008 R2`, and `VS 2010` for the latest release,\
    \ `SQL Server 2012`. Anybody who learns to design reports with `BIDS` will have\
    \ the advantage of a consistent interface when they move to the full version of\
    \ `Visual Studio`, and will need no additional training.\n> \n> *   *Cost*: `SSRS`\
    \ is an integral part of `SQL Server 2012` and is available in many editions,\
    \ from `Express Advanced` to `Enterprise` in `2008` and even `Datacenter` edition\
    \ in `2008 R2`. However, because `SQL Server 2012` has done away with `Datacenter`\
    \ edition, the most feature-rich edition will once again be `Enterprise`. When\
    \ you purchase `SQL Server`, you get `SSRS` as well. See a complete list of `SQL\
    \ Server 2012` features at `http://tinyurl.com/SQL2012Features`.\n> \n> *   *Web-enabled*:\
    \ Because `SSRS` is a `Web`-based reporting solution; a single deployed report\
    \ is accessible to a variety of clients, from the browser to custom `Windows Forms`.\
    \ In addition, because reports are primarily accessed via `Hypertext Transfer\
    \ Protocol (HTTP)` or `HTTP Secure (HTTPS)`, you can view reports from any location\
    \ that has access to the `SSRS` `Web` server. Unless you have a thick client application\
    \ that requires local reports to be deployed with the application, you can have\
    \ one central repository for reports to be consumed across the organization.\n\
    > \n> *   *Customizable*: `SSRS` provides a `.NET` `Web` service as a front end,\
    \ programmatically accessible to extend the delivery of reports beyond the browser.\
    \ As `.NET` programmers, we knew we would want to build custom applications to\
    \ render reports where we could control the look and feel of the report viewer.\
    \ We show one such application in [Chapter 7](#Chapter07.html), which covers report\
    \ rendering.\n> \n> *   *Subscriptions*: `SSRS` subscription abilities gave a\
    \ huge advantage for our company and our clients, as report delivery by `e-mail`\
    \ or file-sharing, as well as off-peak processing, were now possible. We show\
    \ how to set up two different kinds of subscriptions, standard and data-driven,\
    \ in [Chapter 8](#Chapter08.html).\n\nAs you’ll see, `SSRS` is a full reporting\
    \ solution that encompasses many levels of professional expertise, from report\
    \ design to database administration. In many organizations, especially small-\
    \ to medium-sized ones, information technology (`IT`) professionals are asked\
    \ to perform many jobs. They write a query and design a report in the morning,\
    \ perform database backups or restores in the afternoon, and update all the systems\
    \ before heading home in the late hours of the evening. Sometimes even until the\
    \ early hours of the next day! But we are sure that we’re not the only ones that\
    \ take such pride in our jobs and always striving to exceed the needs of the business.\n\
    \nThroughout each of our careers, we have all worn many hats in the companies\
    \ which we have poured our time and devotion to over the years. We have been entrenched\
    \ in every deployment phase from internal deployments to externally facing web\
    \ application deployments to our clients, from simple implementations to advanced\
    \ ones which extended `Reporting Services` capabilities. By developing efficient\
    \ stored procedures, thoroughly testable security mechanisms, as well as building\
    \ and maintaining well designed reports, we have witnessed the day-to-day operation\
    \ of `SSRS` from many perspectives.\n\nWe have also been responsible for our company’s\
    \ overall strategy for building solutions to analyze and transform data gathered\
    \ through both our own and third-party applications. To that end, an essential\
    \ part of our jobs over the years has been to integrate `SSRS` into the overall\
    \ `BI` strategy that incorporated the following:\n\n> *   Disparate data sources\
    \ such as `Analysis Services Cubes` and `SQL Server` relational databases\n> *\
    \   Applications and tools such as `Microsoft Excel` and `Business Scorecards`\n\
    > *   Document management systems such as `Microsoft SharePoint Portal Server`\n\
    \nWe’ll dive into the details of such integration projects in [Chapter 12](#Chapter12.html),\
    \ which is devoted to `BI`. We will also explore one of the key advancements of\
    \ `SSRS 2008 R2` and `2012`, which is a tighter integration with `SharePoint`\
    \ portal server, to the point that `SSRS` content can now be directly deployed,\
    \ managed, and viewed all within `SharePoint`. We’ll also show you how sections\
    \ of reports can be created and served as web parts.\n\n`SSRS` represents another\
    \ world, not often seen by an administrator using standard management tools. This\
    \ world is the domain of the software developer who can extend and control `SSRS`\
    \ programmatically, building custom report viewers and deployment applications.\
    \ In this book, as you work through each step of building a reporting solution\
    \ for healthcare professionals, you’ll see how an administrator can accomplish\
    \ the task with built-in tools, as well as how a developer can create an application\
    \ to provide enhanced functionality.\n\n### SQL Server 2008 R2 and 2012 Reporting\
    \ Services Enhancements\n\nThere have been many major additions to `Reporting\
    \ Services` since its initial release in `2005`, but let’s look at some of the\
    \ most significant enhancements made to the `SSRS` technology in `SQL Server`.\n\
    \n#### Report Builder/Data Modeler\n\nThe `Report Builder` application, a feature\
    \ introduced in `SSRS 2005`, is a local ad hoc report-designing application intended\
    \ for use more by report consumers than by report developers. An administrator\
    \ familiar with the source data creates the business logic and underlying data\
    \ structures as a data model. With the `Report Builder` application, the user\
    \ can create and publish reports based on available models. Microsoft designed\
    \ `Report Builder 2.0`, released in `SSRS 2008`, for `Microsoft Ribbon` technology,\
    \ much like `Microsoft Word` and `Microsoft Excel`, and it was a significant improvement\
    \ on `Report Builder 1.0`. Each enhancement provided a richer development environment\
    \ and additional content sources, such as `Oracle` and `Analysis Services Cubes`.\
    \ As if that wasn’t enough, `Report Builder 3.0` made its first appearance with\
    \ `SSRS 2008 R2`, with its new data visualization report items and cached result\
    \ sets. [Chapter 13](#Chapter13.html) tells you how to build and deploy a data\
    \ model, as well as how to create reports with the `Report Builder 1.0`, `Report\
    \ Builder 2.0`, and `Report Builder 3.0` applications."
