  trans: '### 为报告设置数据源


    AR 对账报告将被设置为生成历史记录，允许用户查看报告执行时的状态。此外，由于报告将在预设时间运行，SSRS 需要知道使用什么凭据来访问报告的数据。你可以选择修改我们现有的数据源凭据，或者我们可以创建一个新的数据源来满足此要求。


    使用`报表管理器`，导航到包含“月末财务报告”的文件夹，然后选择`新建数据源`。将数据源命名为`EOM Financials`。由于这是一个基于 SQL Server
    的连接，你需要提供适当的连接字符串，其中包含服务器名称以及连接的数据库或目录。接下来，选择在服务器上安全地存储凭据，并提供用户名和密码——在本例中，是 SQL
    身份验证凭据。最后，选择在列表视图中隐藏数据源，以防止用户在浏览时意外选中它。你的配置应类似于图 10-9。点击`应用`按钮创建数据源后，你只需将报告关联到新的共享数据源，这将在下一节中完成。


    ![Image](img/9781430238102_Fig10-09.jpg)


    `图 10-9.` 数据源选项


    ### 修改报告数据源


    现在我们有一个可用于会计报告的共享数据源，我们需要更改报告配置为使用的数据源。我们可以通过`报表管理器`中报告`属性`下的`数据源`选项卡来完成此操作。导航到`报表管理器`中的“月末财务报告”文件夹。接下来，将光标悬停在
    AR 对账报告上。当你看到向下箭头时，点击它，然后选择`管理`，接着点击左侧菜单中的`数据源`选项卡。我们在这里可以选择浏览到现有的共享数据源或创建一个新的。


    正如可以推断的那样，我们可以跳过上一步，并在同一步骤中执行创建和修改。然而，我们希望向你展示如何使用`新建数据源`按钮创建一个可供其他需要预配置身份验证设置的报告使用的新数据源。话虽如此，让我们继续将此报告链接到我们刚刚创建的共享数据源。点击`浏览`按钮，导航到“月末财务报告”文件夹下的`EOM
    Financials`数据源，如图 10-10 所示。点击`确定`以修改 AR 对账报告正在使用的数据源，然后点击`应用`保存新设置。在下一节中，我们将向你如何创建快照来存储报告历史。


    ![Image](img/9781430238102_Fig10-10.jpg)


    `图 10-10.` 修改报告的数据源


    ### 为报告历史创建快照


    AR 对账报告的目标是允许其在每月的指定时间（出于性能考虑，选择非高峰时段）执行，并保存每月处理的历史记录。为此，我们在本章前面创建了“月末财务报告”共享计划。现在是时候利用
    SSRS 的一个有益功能了，即能够将报告作为快照处理。


    快照是报告的静态“时间点”副本。SSRS 中使用两种类型的快照：作为执行快照生成的（从预先执行的时间点渲染单个报告），以及为存储在报告历史中而生成的（可以包含在给定时间点的多个报告副本）。在本节中，我们将重点展示如何配置
    AR 对账报告以生成报告历史的快照，从而可以生成一系列历史财务报告。


    你将使用`报表管理器`来配置 AR 对账报告的历史属性，以便每次报告按照“月末财务报告”计划处理时，都会生成一个报告的快照。


    让我们从查看存储报告历史的可用设置开始。如图 10-11 所示，几个设置不仅影响快照的创建，还影响快照在报告历史中的存储方式。在`报表管理器`中，你可以通过将光标悬停在报告上、点击向下箭头并选择`管理`（如前面导航到属性时所述）来导航到“快照选项”屏幕。进入报告属性屏幕后，点击左侧的`快照选项`选项卡。


    ![Image](img/9781430238102_Fig10-11.jpg)


    `图 10-11.` 报告快照选项


    对于 AR 对账报告，设置快照选项如下：


    *   用户将无法为报告历史创建快照。将此项设置为仅由计划运行的报告才会出现在报告历史中。

    *   报告执行快照不存储在报告历史中。此选项与报告执行属性相关，将在下一节介绍。

    *   使用“月末财务报告”共享计划。

    *   报告历史中保留的快照数量使用“默认”设置。“默认”设置保留无限数量的报告，但你可以通过`报表管理器`中的`站点设置`来更改此设置。如果选择了保留特定数量的快照，例如
    10 个，则首先删除较旧的快照以腾出空间。


    按照图 10-12 所示进行选择后，点击`应用`。


    ![Image](img/9781430238102_Fig10-12.jpg)


    `图 10-12.` AR 对账报告的快照选项


    ![Image](img/square.jpg) **注意** 为了创建快照和订阅，你需要确保包含`ReportServer`数据库的服务器上的`SQL Server
    Agent`正在运行。如果没有运行，你将收到以下错误：

    ```

    The SQL Agent service is not running. This operation requires the SQL Agent service.
    (rsSchedulerNotResponding).

    ```

    如果你看到此错误，只需在管理工具或`SQL Server Management Studio (SSMS)`中启动`SQL Agent`服务即可。


    随着时间的推移，快照将在报告历史中被创建。有权访问报告历史的用户可以通过`报表管理器`导航到报告的`历史记录`选项卡来访问这些快照。AR 对账报告的`历史记录`选项卡（如图
    10-13 所示）表明，在四个月的时间段内，按照预期生成了四个快照。


    ![Image](img/9781430238102_Fig10-13.jpg)


    `图 10-13.` 按计划创建的 AR 对账报告快照


    从历史记录中渲染报告对性能是有益的，首先是因为报告已被预处理，其次是因为无需查询报告的数据源，因为数据和布局信息都存储在快照中。在生成大型报告时，例如包含数百页的财务报告，我们强烈建议使用快照以及
    SSRS 的其他增强性能的功能，例如报告缓存，我们接下来将介绍这个功能。'
- fmt: '#### 处理报告与执行缓存


    `AR Reconciliation`报告现已设置为按计划交付、从快照渲染并保存在报告历史记录中。员工也会按需运行此报告，这意味着用户可以查看包含最新数据的报告。由于这可能是一份资源密集型的财务报告，您应确保在多个用户同时渲染报告时，性能不会受到影响。您将使用`Report
    Manager`来配置控制报告处理方式的设置。


    第一步是导航到`AR Reconciliation`报告的`Properties`选项卡，然后在左侧窗格中选择`Processing Options`。[图
    10-14](#Chapter10.html#fig_10_14) 显示了可用于报告处理的设置。


    ![Image](images/9781430238102_Fig10-14.jpg)


    *图 10-14. 处理选项属性*


    第一个处理选项“始终从最新数据运行此报告”具有多个控制报告缓存的设置。


    缓存是`SSRS`的一项功能，允许存储报告的临时副本并将其呈现给用户。创建报告缓存副本的主要优势是性能提升。访问设置为缓存的报告的用户会生成第一个缓存实例。如果满足某些条件，每个后续用户都会收到该缓存副本。用户收到缓存副本的条件如下：


    > *   后续用户必须在缓存报告设置为过期的时间间隔内访问报告。当缓存报告过期后，下一个用户必须创建一个新副本。

    > *   如果缓存报告具有在后续执行期间更改的参数，并且每个用户基于该参数接收新报告，那么生成的每个报告都会成为特定于该参数值的缓存副本。

    > *   报告的数据源未设置为`Windows身份验证`或未设置为提示用户登录凭据。


    对于我们的报告，指示`SSRS`缓存报告的临时副本，并在十分钟后使缓存副本过期。十分钟通常是保留缓存报告的一个良好时长，尽管这确实取决于您数据的时间敏感性。缓存报告中的数据当然会反映报告被渲染的时间，而不是当前时间，而且除非在报告上打印执行时间，否则用户无法知道他们正在查看的是缓存报告还是实时报告。


    第二个选项“从报告快照渲染此报告”不应与创建报告历史记录的快照混淆。执行快照与历史记录快照不同，它可以从`Report Manager`中的`Report`文件夹查看，就像查看按需报告一样。另一方面，历史记录快照是从报告的`Report
    History`选项卡查看的，并且可以积累许多副本。


    快照不会像缓存报告那样过期；相反，它们会在指定的时间间隔刷新。如果您选择为报告生成执行快照，则该报告无法被缓存。在此示例中，请不要选择此选项。


    最后一个报告执行选项设置报告的超时间隔，可以是默认设置（通常为1,800秒，即30分钟），也可以是指定值。这是一个重要的设置，因为长时间运行的报告会使用宝贵的系统资源。对于`AR
    Reconciliation`报告，您将使用默认值。


    我们提到了在使用具有时间敏感性数据的报告缓存时涉及的权衡。选择使用快照或缓存报告时的另一个重要考虑因素是磁盘空间。随着时间的推移，设置为较长过期时间的历史记录和缓存报告可能会积累起来。然而，与随之而来的性能提升和生产力提高相比，磁盘存储的成本微不足道，不应阻止任何人利用`SSRS`的这些有益功能。


    #### 管理订阅


    `SSRS`的订阅服务提供了一种将预执行报告传递到指定位置、通过电子邮件发送给用户、发送到网络文件共享或甚至直接发送到打印机的方法。使用订阅有几个关键好处。在组织内部，员工在特定时间（例如每天或月底）需要关键信息。在外部，客户可能希望按预定时间表接收新闻通讯或财务报表。订阅可以轻松满足这两种需求。


    设置订阅的另一个好处是允许您在非高峰时段安排资源密集型报告的处理，从而确保在高使用量期间网络性能下降很少或没有下降。在本节中，您将使用两种类型的订阅：


    > *   **标准订阅：** 为一个或多个用户静态设置。

    > *   **数据驱动订阅：** 订阅者列表可以从多个数据源位置派生，并且可以通过自定义查询生成。


    ![Image](images/square.jpg) **注意** 数据驱动订阅是迄今为止最强大的订阅形式。它们仅在`SSRS`的企业版中可用。


    #### 管理标准订阅


    您将从为一家向患者提供家庭护理服务的医疗保健组织的员工设置标准电子邮件订阅开始。这份名为`Patient Recertification Listing`的报告是为负责跟踪患者文档的员工设计的。您可以为任何报告创建标准电子邮件订阅。在我们的业务中，要求患者的文档（本例中为`HCFA
    485`）由主治医师完成并签署。该报告本质上是这些员工的每日工作清单，任何未签署的文档都会成为一项工作。


    您可以在`Apress`网站（[`www.apress.com`](http://www.apress.com)）的“源代码/下载”区域提供的`Pro_SSRS`报告项目中找到`Patient
    Recertification Listing`报告。您可以使用`BIDS`将报告部署到您的报告服务器。打开`Pro_SSRS`项目，并将项目的`TargetReportFolder`更改为`Patient
    Documentation`。接下来，右键单击`Patient Recertification Listing`报告，选择“部署”以创建`Patient Documentation`文件夹，并将报告和数据源发布到您的报告服务器。需要注意的是，`Pro_SSRS`项目中提供的`Pro_SSRS`数据源使用`Windows身份验证`，为了让订阅成功运行，凭据需要安全地存储在数据库中。要将已部署的`Pro_SSRS`数据源从`Windows身份验证`更改为存储凭据，请在`Report
    Manager`中导航到`Patient Documentation`文件夹选择`Pro_SSRS`数据源。将“连接使用”选项更改为“在报告服务器中安全存储的凭据”，并提供适当的凭据。


    由于此报告需要足够通用以支持按需查看以及用于订阅，我们添加了一个名为`Unsigned`的报告参数，该参数与报告筛选器配合使用以显示具有已签署和未签署文档的患者。此报告还有其他参数，如[图
    10-15](#Chapter10.html#fig_10_15)所示。如您所见，在生成订阅时将使用这些参数。


    ![Image](images/9781430238102_Fig10-15.jpg)


    *图 10-15. 带参数的 Patient Recertification Listing 报告*'
  raw: '#### Processing Reports and Performing Caching


    The AR Reconciliation report is now set up to be delivered from a schedule, rendered
    from a snapshot, and saved in the report history. Employees will also run this
    report on-demand, meaning that users can view the report with the most recent
    data. Because this is potentially a resource-intensive financial report, you should
    ensure that performance isn’t affected when the report is rendered for multiple
    users simultaneously. You’ll use Report Manager to configure the settings that
    control how the report is processed.


    The first step is to navigate to the Properties tab for the AR Reconciliation
    report and then select Processing Options in the left frame. [Figure 10-14](#Chapter10.html#fig_10_14)
    shows the available settings for report processing.


    ![Image](images/9781430238102_Fig10-14.jpg)


    ***Figure 10-14.** Processing options properties*


    The first processing selection, Always Run This Report from the Most Recent Data,
    has several options that control report caching.


    Caching is an SSRS feature that allows temporary copies of a report to be stored
    and rendered to a user. The main advantage for creating a cached copy of a report
    is increased performance. Users who access a report that is set to be cached generate
    the first cached instance. Every subsequent user receives the cached copy if certain
    conditions are met. The conditions for a user to receive the cached copy are as
    follows:


    > *   The subsequent user must access the report within the time interval before
    the cached report is set to expire. When the cached report expires, the next user
    must create a new copy.

    > *   If the cached report has parameters that change during subsequent executions,
    and each user receives a new report based on that parameter, each report that’s
    generated becomes a cached copy specific to the parameter value.

    > *   The report’s data source isn’t set to Windows authentication or to prompt
    the user for login credentials.


    For our report, instruct SSRS to cache a temporary copy of the report and expire
    the cached copy after ten minutes. Ten minutes is generally a good length of time
    to maintain cached reports, although it really depends on the time sensitivity
    of your data. The data in a cached report will, of course, reflect the time at
    which the report was rendered rather than the current time, and short of printing
    the execution time on the report, users have no way to know if they’re viewing
    a cached or live report.


    The second selection, Render This Report from a Report Snapshot, shouldn’t be
    confused with a snapshot that creates a report history. An execution snapshot,
    unlike a history snapshot, is viewed from a Report folder in Report Manager just
    like on-demand reports would be viewed. History snapshots, on the other hand,
    are viewed from the Report History tab of the report and can accumulate many copies.


    Snapshots don’t expire like cached reports; rather, they’re refreshed at a specified
    interval. If you choose to generate an execution snapshot for a report, then that
    report can’t be cached. In this example, don’t select this option.


    The final report execution option sets the timeout interval for the report, either
    at a default setting, which is typically 1,800 seconds (30 minutes), or at a specified
    value. This is an important setting because long-running reports use valuable
    system resources. You’ll use the default value for the AR Reconciliation report.


    We mentioned the trade-off involved in using caching for reports with time-sensitive
    data. Another important consideration when choosing to use either snapshots or
    cached reports is disk space. Over time, history and cached reports set with lengthy
    expiration times can accumulate. The cost of disk storage compared to the performance
    and subsequent productivity increase is negligible, however, and shouldn’t stop
    anyone from taking advantage of these beneficial features of SSRS.


    #### Managing Subscriptions


    Subscription services for SSRS provides a means for delivering pre-executed reports
    to specified locations, to a user via e-mail, to a network file share, or even
    directly to a printer. Using subscriptions has several key benefits. Internally
    in an organization, employees need key information at certain times, such as daily
    or at the end of a month. Externally, customers may want to receive newsletters
    or financial statements on a predetermined schedule. Subscriptions can accommodate
    both of these needs easily.


    Setting up subscriptions has the added benefit of allowing you to schedule the
    processing of resource-intensive reports at off-peak hours, thus ensuring little
    or no degradation to network performance during periods of heavy usage. You’ll
    be working with two types of subscriptions in this section:


    > *   *Standard subscriptions:* Statically set up for one or more users.

    > *   *Data-driven subscriptions:* Subscriber lists can be derived from multiple
    data source locations and can be generated from a custom query.


    ![Image](images/square.jpg) **Note** Data-driven subscriptions are by far the
    most powerful form of subscriptions. They’re available only in the Enterprise
    edition of SSRS.


    #### Managing Standard Subscriptions


    You’ll begin by setting up a standard e-mail subscription for employees in a health
    care organization that provides home-care services to patients. The report, called
    Patient Recertification Listing, was designed for employees who are responsible
    for tracking patient documentation. You can create standard e-mail subscriptions
    with any report. In our business, it is a requirement that the patient’s documentation,
    in this case an HCFA 485, be completed and signed by the attending physician.
    The report is essentially a daily work list for these employees, where any documentation
    that is unsigned becomes a work item.


    You can find the Patient Recertification Listing report in the Pro_SSRS report
    project provided in the Source Code/Download area on the Apress Web site ([`www.apress.com`](http://www.apress.com)).
    You can deploy the report to your report server using BIDS. Open the Pro_SSRS
    project, and change the TargetReportFolder for the project to Patient Documentation.
    Next, right-click the Patient Recertification Listing report, select Deploy to
    create the Patient Documentation folder, and publish the report and data source
    to your report server. It is important to note that the Pro_SSRS data source that
    is provided in the Pro_SSRS project uses Windows authentication, and for subscriptions
    to work successfully, the credentials will need to be stored securely in the database.
    To change the deployed Pro_SSRS data source from Windows authentication to stored
    credentials, navigate in Report Manager to select the Pro_SSRS data source in
    the Patient Documentation folder. Change the Connect Using option to Credentials
    Stored Securely in the Report Server, and supply the appropriate credentials.


    Because this report needed to be generic enough for on-demand viewing in addition
    to being used for subscriptions, we added a report parameter called Unsigned that
    works with a report filter to show patients with both signed and unsigned documentation.
    This report has other parameters as well, as shown in [Figure 10-15](#Chapter10.html#fig_10_15).
    As you’ll see, you will use the parameters when you generate the subscription.


    ![Image](images/9781430238102_Fig10-15.jpg)


    ***Figure 10-15.** Patient Recertification Listing report with parameters*'
