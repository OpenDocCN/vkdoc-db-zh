    \ report, evaluate an expression and filter the results based on that execution.\
    \ Filters take this form:\n\n`<Filter Expression> <Operator><Filter Value>`\n\n\
    An example of a filter is one that limits the data on a report to a specific user\
    \ or that is based on user input from a parameter value.\n\n[Chapter 11](#Chapter11.html)\
    \ demonstrates how to use a filter that limits the report based on a built-in\
    \ Global collection, which includes the username of the person executing the report.\
    \ Filters are beneficial because once the report is rendered you can use them\
    \ in conjunction with parameters to limit the data in the report without re-querying\
    \ the data source. In [Figure 3-12](#Chapter03.html#fig_3_12), you can see a filter\
    \ that limits the data displayed based on a parameter called User. The logic is\
    \ this: if the parameter value for User is equal to a field value of User, then\
    \ include only those records where they match. Otherwise, include all records.\
    \ Parameters and filters are included as elements of an RDL report file.\n\n![Image](images/9781430238102_Fig03-12.jpg)\n\
    \n***Figure 3-12.** Sample filter on a table data region*\n\n[Listing 3-3](#Chapter03.html#list_3_3)\
    \ shows the sample RDL elements of a filter.\n\n***Listing 3-3.** Parameter and\
    \ Filter RDL Elements*\n\n`<Filters>`\n`   <Filter>`\n`      <FilterExpression>=IIF(Parameters!User.Value\
    \ is nothing, \"All\", Parameters!User.Value)`\n`      </FilterExpression>`\n\
    `      <Operator>Equal</Operator>`\n`          <FilterValues>`\n`               <FilterValue>=IIF(Parameters!User.Value\
    \ is nothing, \"All\", Fields!LastName.Value)`\n`               </FilterValue>`\n\
    `         </FilterValues>`\n`   </Filter>`\n`</Filters>`\n\n### Expressions\n\n\
    Throughout this section, you’ll use fields from the dataset to create sample report\
    \ segments. Because the values from the fields are derived from *expressions*\
    \ that are essentially VB.NET code, we will cover them now because they play a\
    \ crucial role in the report design process.\n\nYou can use expressions to produce\
    \ a value for any report item that uses them. In SSRS, you can assign expressions\
    \ to almost any report property, from formatting such as color or padding to the\
    \ value of a textbox. A simple expression such as that of a field assignment is\
    \ commonly used while designing reports. In fact, every time you add a field to\
    \ an area of a report, it’s automatically converted to an expression, like so:\n\
    \n`=Fields!FieldName.Value`\n\nAn expression is signified by prefacing its content\
    \ with the equal sign (`=`). You can also concatenate expressions with other functions\
    \ and literals. We will show several examples of expressions throughout the book.\
    \ We will list several sample expressions here and show you how to assign them\
    \ to report items:\n\n> `=Parameters!ParameterName.Value`: Used to assign the\
    \ value of a parameter to a report item such as a textbox or cell in a table.\n\
    > \n> `=IIF(Fields!FieldName.Value > 10, \"Red\", \"Black\")`: Used for conditional\
    \ expressions. In this case, it would set the text color for a property to red\
    \ if the value of `FieldName` were greater than 10, black otherwise.\n> \n> `=Fields!FieldNamel.Value\
    \ & \" \" & Fields!FieldName2.Value`: Used to concatenate the value of two fields.\n\
    > \n> `=Avg(Fields!FieldName.Value)`:Used to aggregate functions such as `Sum`,\
    \ `Avg`, `Min`, `Count`, and `Max` that return the aggregate, minimum, or maximum\
    \ value of the specified field.\n> \n> `=RowNumber(Nothing)`: Used to maintain\
    \ a running total for the row numbers in a report. “Nothing” in this case is a\
    \ scope parameter passed to the function indicating a grouping or dataset. The\
    \ scope parameter could be a group name or dataset, in which case a new row count\
    \ would begin at the end of each group or dataset.\n\nIn SSRS for SQL Server 2005,\
    \ the expression builder application used inside the report development environment\
    \ was rebuilt to give it the type of functionality needed to assist users create\
    \ useful expressions easily. Thankfully, all releases since then have retained\
    \ the more advanced expression builder, which lists most of the common functions,\
    \ along with examples using their syntax; in addition, they are categorized by\
    \ type (Text, Conversion, and Date & Time). This makes it much quicker to find\
    \ the right function and place it as part of the expression you are building.\
    \ Another great feature that developers have become accustomed to, and frankly\
    \ should not have to live without, is IntelliSense, a contextual, in-line command\
    \ completion feature. As you can see in [Figure 3-13](#Chapter03.html#fig_3_13),\
    \ as you type an expression (in this case a field value expression from your stored\
    \ procedure), you are prompted with all the possible selections based on that\
    \ expression. Once the expression is complete and syntactically correct, you can\
    \ click OK to make the expression part of the report object where you have associated\
    \ it. If any syntax errors exist, a standard red underline indicates the problem,\
    \ and a mouse-hover over it will display the type of error, in most cases “Invalid\
    \ Syntax.” This is a quick introduction to expressions in SSRS, but in [Chapter\
    \ 6](#Chapter06.html), we will use them to perform tasks such as setting default\
    \ parameter and property values at runtime.\n\n![Image](images/9781430238102_Fig03-13.jpg)\n\
    \n***Figure 3-13.** IntelliSense: Assigning an expression*\n\n### Summary\n\n\
    At this point, we have only scratched the surface of what the development environment\
    \ has to offer. In this chapter, you were introduced to the development environment\
    \ and some of the basic elements of Reporting Services design. You learned that\
    \ each report consists of defined elements based on a defined schema in the RDL,\
    \ which gives SSRS the advantage of standardization. We covered some of the report\
    \ objects that make up reports such as Data Sources and Datasets. In [Chapters\
    \ 4](#Chapter04.html) and [5](#Chapter05.html), you will learn about all of the\
    \ objects that will be used to display or represent data returned by our datasets\
    \ such as the Textbox, Rectangles, and Data Regions like Tablix, List, and Matrix.\n\
    \n## C H A P T E R  4\n\n## Laying Out a Report\n\nNow it is time to delve into\
    \ the area in the IDE in which you’ll probably spend the most time: the Design\
    \ tab. The real creative magic begins here, and we don’t mean because a wizard\
    \ or two might be involved.\n\nDifferent report requests and target audiences\
    \ mean that the look and feel of each report will not be uniform. One user might\
    \ expect drill-down functionality, while others might need full, detailed listings\
    \ of data for printing. Whatever the case, SSRS provides many tools in the Toolbox\
    \ for rapid and efficient building of high-quality reports that can be immediately\
    \ deployed from within BIDS. In the following sections, you’ll take the sample\
    \ data and put it to use as you explore the functionality of each of the available\
    \ tools and data regions.\n\nFor each object we demonstrate, we’ll give the graphical\
    \ representation of the design environment as well as its RDL counterpart. Note\
    \ that defined sections of the RDL file contain every aspect of a report, from\
    \ the general layout to pagination. This is important because it’s often easier\
    \ to work directly within the RDL file to alter a report. As we show how to add\
    \ functionality to the sample report projects, we’ll point out sections of the\
    \ RDL files where the graphical report design is converted to code."
  trans: "\n## 第 4 章：布局报表\n\n现在，是时候深入 IDE 中你可能花费最多时间的区域了：`设计`选项卡。真正的创意魔法将从这里开始，我们这么说可不仅仅是因为其中可能会涉及一两个向导。\n\
    \n不同的报表需求和目标受众意味着每份报表的外观和感觉不会千篇一律。一位用户可能期待向下钻取功能，而其他人可能需要用于打印的完整、详细的数据列表。无论哪种情况，SSRS\
    \ 在 `工具箱` 中提供了许多工具，用于快速高效地构建高质量的报表，这些报表可以直接从 `BIDS` 中部署。在接下来的章节中，你将使用示例数据，并通过探索每个可用工具和数据区域的功能来实际应用它们。\n\
    \n对于我们演示的每一个对象，我们将同时展示其设计环境的图形化表示及其对应的 `RDL` 代码。请注意，`RDL` 文件中定义的部分包含了报表的每个方面，从整体布局到分页。这一点很重要，因为直接在\
    \ `RDL` 文件中修改报表通常更为简便。当我们演示如何为示例报表项目添加功能时，我们会指出那些将图形化报表设计转换为代码的 `RDL` 文件部分。\n\n\
    ### 设置筛选器\n\n与参数类似，报表筛选器可以限制报表上的数据结果；然而，你不一定需要将它们与参数结合使用。实际上，筛选器可以在报表的多个位置定义，它评估一个表达式并根据该执行结果来筛选数据。筛选器采用以下形式：\n\
    \n`<筛选表达式> <运算符> <筛选值>`\n\n筛选器的一个例子是，将报表上的数据限制为特定用户，或基于来自参数值的用户输入进行限制。\n\n`第 11\
    \ 章` 将演示如何使用一个基于内置 `全局` 集合（其中包括执行报表的用户名）来限制报表的筛选器。筛选器很有用，因为一旦报表呈现，你可以结合参数来使用它们，以限制报表中的数据，而无需重新查询数据源。在\
    \ `图 3-12` 中，你可以看到一个基于名为 `用户` 的参数来限制显示数据的筛选器。其逻辑是：如果 `用户` 的参数值等于 `用户` 字段的值，则只包含匹配的记录。否则，包含所有记录。参数和筛选器作为\
    \ `RDL` 报表文件的元素被包含其中。\n\n![Image](img/9781430238102_Fig03-12.jpg)\n\n`图 3-12`.\
    \ 表数据区域上的示例筛选器\n\n`清单 3-3` 展示了筛选器的示例 `RDL` 元素。\n\n`清单 3-3`. 参数和筛选器 `RDL` 元素\n\n\
    ```\n<Filters>\n   <Filter>\n      <FilterExpression>=IIF(Parameters!User.Value\
    \ is nothing, \"All\", Parameters!User.Value)\n      </FilterExpression>\n   \
    \   <Operator>Equal</Operator>\n         <FilterValues>\n              <FilterValue>=IIF(Parameters!User.Value\
    \ is nothing, \"All\", Fields!LastName.Value)\n              </FilterValue>\n\
    \         </FilterValues>\n   </Filter>\n</Filters>\n```\n\n### 表达式\n\n在本节中，你将使用数据集中的字段来创建示例报表片段。由于字段值源自本质上是\
    \ `VB.NET` 代码的 *表达式*，我们现在就来介绍它们，因为它们在报表设计过程中扮演着至关重要的角色。\n\n你可以使用表达式为任何使用它们的报表项生成一个值。在\
    \ `SSRS` 中，你可以将表达式分配给几乎任何报表属性，从颜色或内边距等格式到文本框的值。一个简单的表达式，比如字段赋值，在设计报表时经常使用。事实上，每次向报表的某个区域添加一个字段时，它都会自动转换为一个表达式，像这样：\n\
    \n`=Fields!FieldName.Value`\n\n表达式通过在内容前加上等号 (`=`) 来标识。你还可以将表达式与其他函数和字面量连接起来。我们将在本书中展示几个表达式的例子。这里我们将列出几个示例表达式，并展示如何将它们分配给报表项：\n\
    \n> `=Parameters!ParameterName.Value`: 用于将参数值分配给报表项，例如文本框或表格中的单元格。\n>\n> `=IIF(Fields!FieldName.Value\
    \ > 10, \"Red\", \"Black\")`: 用于条件表达式。在这个例子中，如果 `FieldName` 的值大于 10，则将文本颜色属性设置为红色，否则设置为黑色。\n\
    >\n> `=Fields!FieldNamel.Value & \" \" & Fields!FieldName2.Value`: 用于连接两个字段的值。\n\
    >\n> `=Avg(Fields!FieldName.Value)`: 用于聚合函数，如 `Sum`、`Avg`、`Min`、`Count` 和 `Max`，这些函数返回指定字段的聚合值、最小值或最大值。\n\
    >\n> `=RowNumber(Nothing)`: 用于维护报表中行号的运行总计。这里的 `Nothing` 是传递给函数的一个范围参数，指示一个分组或数据集。范围参数可以是组名或数据集，在这种情况下，行计数将在每个组或数据集结束时重新开始。\n\
    \n在用于 `SQL Server 2005` 的 `SSRS` 中，报告开发环境中使用的表达式生成器应用程序被重建，以提供协助用户轻松创建有用表达式所需的功能。值得庆幸的是，此后的所有版本都保留了更高级的表达式生成器，它列出了大多数常用函数及其语法示例；此外，它们按类型（`文本`、`转换`、`日期和时间`）分类。这使得更快地找到正确的函数并将其作为你正在构建的表达式的一部分放置变得容易得多。开发者们已经习惯并坦率地说离不开的另一个强大功能是\
    \ `IntelliSense`，这是一个上下文相关的、行内的命令完成功能。如你在 `图 3-13` 中所见，当你键入一个表达式（在本例中是一个来自存储过程的字段值表达式）时，系统会根据该表达式提示所有可能的选择。一旦表达式完整且语法正确，你可以单击\
    \ `确定` 使该表达式成为你关联它的报表对象的一部分。如果存在任何语法错误，标准的红色下划线会标示出问题，将鼠标悬停在其上会显示错误类型，在大多数情况下是“语法无效”。这是对\
    \ `SSRS` 中表达式的一个快速介绍，但在 `第 6 章`，我们将使用它们来执行诸如在运行时设置默认参数和属性值等任务。\n\n![Image](img/9781430238102_Fig03-13.jpg)\n\
    \n`图 3-13`. `IntelliSense`: 分配表达式\n\n### 总结\n\n至此，我们只是触及了开发环境所能提供功能的皮毛。在本章中，你了解了开发环境以及\
    \ `Reporting Services` 设计的一些基本元素。你了解到每份报表都由基于 `RDL` 中已定义架构的明确定义的元素组成，这为 `SSRS`\
    \ 带来了标准化的优势。我们介绍了一些构成报表的报表对象，例如 `数据源` 和 `数据集`。在 `第 4 章` 和 `第 5 章`，你将了解用于显示或表示数据集返回的数据的所有对象，例如\
    \ `文本框`、`矩形` 以及 `数据区域`，如 `Tablix`、`列表` 和 `矩阵`。\n"
- fmt: "### 设置分页\n\n首先，查看新报表的常规报表属性。在“设计”选项卡上，选择“报表”，然后从工具栏的下拉菜单中选择“报表属性”。\n\n“报表属性”对话框中有四个选项：页面设置、代码、引用和变量。目前，您需要关注的是“页面设置”选项。如[图\
    \ 4-1](#Chapter04.html#fig_4_1)所示，“页面设置”对话框包含用于分页的属性设置，例如页面宽度和边距。自 SSRS 2008 以来，我们才能够选择标准的页面格式选项，例如纵向或横向方向。您的选择会自动设置宽度和高度属性值。由于许多报表将以横向格式打印，请选择“横向”。将所有边距保留为\
    \ 1 英寸。如果您仍在使用 SSRS 2005，则需要将高度和宽度属性设置为代表横向特征的值，例如宽度 11 英寸，高度 8.5 英寸。\n\n![Image](images/9781430238102_Fig04-01.jpg)\n\
    \n***图 4-1.** 报表属性的“布局”选项卡*\n\n如果您使用的是 2005 版本，“布局”选项卡还会有一个“列”设置，您可以在其中指定列数。此部分在\
    \ 2008 版本中已被移除，但它仍然是报表的一个属性。我们在医疗行业经常使用多列报表，主要用于打印标签。\n\n### 使用报表对象\n\n在接下来的几个部分中，您将了解报表对象的基本功能，并学习在开发报表时如何利用每个对象的独特多功能性。此时，如果您尚未操作，请打开我们提供的包含起始点和完整示例的\
    \ `Pro_SSRS` 解决方案，并在学习各个对象部分时参考它。我们将介绍以下报表对象：\n\n> *List:* 这是一个用于单一数据分组的自由格式容器对象。\n\
    > \n> *Textbox:* SSRS 2008 中的文本框报表可能是期待已久的增强功能。在之前的 SSRS 版本中，文本框只不过是用于统一的字面文本字符串和/或来自数据集的字段值的容器；所有内容都必须具有相同的格式。自\
    \ SSRS 2008 版本发布以来，这种情况已不再存在。\n> \n> *Table:* 用于具有行和列的表格报表，但提供单个或多个数据分组。\n> \n\
    > *Rectangle:* 与 List 类似，Rectangle 是一个容器，尽管它不提供数据分组。\n> \n> *Matrix:* 此报表对象与 Table\
    \ 类似，提供多个分组级别，但将数据布局为交叉表或透视表风格的报表。\n\n在 SSRS 2008 中，Microsoft 引入了 Tablix 控件，其核心是行级分组和列级分组的集合。在\
    \ SSRS 2008 之前，很难创建结合这两个分组级别的报表。您可以在 List、Matrix 和 Table 这三个控件中使用 Tablix 属性，在三个报表对象内的任何级别上动态创建列或行组。对\
    \ Tablix 支持的 RDL 代码也已添加，正如我们在介绍支持 Tablix 属性的报表对象时将看到的那样。在[第 6 章](#Chapter06.html)中，您将看到有关向报表添加\
    \ Tablix 属性的更多细节。\n\n### 实现列表\n\nList 数据区域是允许数据分组的两个自由格式容器对象之一，另一个是 Rectangle。这两个对象类似，因为它们可以包含其他报表对象和数据区域。自由格式数据区域不会将字段布局限制为固定格式；创建报表的人员负责对齐对象。\n\
    \n由于 List 包含一个分组级别，因此只能将 List 数据区域与单个数据集一起使用。请注意，List 数据区域基于此分组一次显示数据集中的一个记录。默认情况下，列表没有分配分组。\n\
    \n为了学习如何将 List 数据区域与 `Emp_Svc_Cost` 存储过程（该过程返回患者访问次数的详细记录）结合使用，您将向设计区域添加一个 List，并将数据集中的字段拖入其中。您将使用\
    \ `Employee_Name`、`Patient_Name`、`Visit_Count` 和 `Estimated_Cost` 来显示每个患者/员工组合的总访问次数和费用。\n\
    \n在 `Pro_SSRS` 解决方案中，列表示例的起点报告名为 List Start。该报表已为 `localhost` 服务器定义了一个名为 `emp_svc_cost`\
    \ 的数据源和数据集，如果您使用 BIDS 连接到本地 SQL Server，这应该与您的环境匹配。\n\n首先，打开 List Start 报表，然后单击“布局”选项卡。在开始创建报表之前，单击\
    \ Report ![Image](images/U001.jpg) View ![Image](images/U001.jpg) Ruler 以使标尺在设计器上可见。接下来，通过双击“工具箱”中的\
    \ List 对象，将 List 报表对象添加到报表中。List 控件会自动添加到设计网格的左上角区域。抓住 List 的右下角并向下拖动，直到其宽度约为\
    \ 7 英寸，高度约为 1 英寸。\n\n接下来，在“报表数据”工具栏中选择“数据集”，展开 `emp_svc_cost` 数据集，将以下列表中的字段拖到设计区域，并将它们放置在\
    \ List 数据区域中：\n\n> *   `Patient_Name`\n> *   `Employee_Name`\n> *   `Service_Type`\n\
    > *   `Estimated_Cost`\n> *   `Visit_Count`\n\n现在，将 Sum 函数添加到 `Visit_Count` 和\
    \ `Estimate_Cost` 字段中，以便每个字段的语法为 `=Sum(Fields!fieldname.Value)`。如果您已向列表添加了分组级别（您稍后将执行此操作），则\
    \ `Sum` 函数将自动添加到这些字段中。\n\n接下来，调整字段大小，完成后报表看起来如[图 4-2](#Chapter04.html#fig_4_2)所示。在\
    \ Visual Studio 2010 和 BIDS 中，当您处理报表对象的布局时，设计环境已得到增强，可在您拖放对象时控制自动对齐，因此设计专业外观的报表要容易得多。然而，此时您关心的不是美观，而是功能。\n\
    \n![Image](images/9781430238102_Fig04-02.jpg)\n\n***图 4-2.** 包含未分组字段的 List 数据区域*\n\
    \n当您单击预览按钮时，报表将生成并显示每个患者和员工的访问信息（参见[图 4-3](#Chapter04.html#fig_4_3)）。请注意，`Visit_Count`\
    \ 和 `Estimated_Cost` 字段的总和对于每条记录都是相同的。每个总和金额对于所有患者和员工都是相同的，因为您尚未为 List 本身定义任何分组。您将在下一步进行此操作。\n\
    \n![Image](images/9781430238102_Fig04-03.jpg)\n\n***图 4-3.** List 数据区域的预览*\n\n\
    对于我们添加的 List，在报表的“行组”区域中有一个默认的（详细信息）行分组作为证据。但是，当前没有分配任何字段值作为组；它只是空白。要添加分组，请单击“行组”（详细信息）上的向下箭头，然后选择“组属性”。通过在“组表达式”区域中单击“添加”来添加两个字段——`Patient_Name`，然后是\
    \ `Employee_Name`——作为组表达式。"
  raw: "### Setting Up Pagination\n\nTo begin, look at the general report properties\
    \ for the new report. While on the Design tab, select Report and then Report Properties\
    \ from the drop-down menu on the toolbar.\n\nThere are four selections in the\
    \ Report Properties dialog box: Page Setup, Code, References, and Variables. For\
    \ now, you’re concerned with the Page Setup selection. As you can see in [Figure\
    \ 4-1](#Chapter04.html#fig_4_1), the Page Setup dialog contains property settings\
    \ for pagination, such as page width and margins. It’s only since SSRS for 2008\
    \ that we’ve been able to select standard page formatting options such as Portrait\
    \ or Landscape orientation. Your selection sets the Width and Height property\
    \ values automatically. Because a number of reports will be printed in landscape\
    \ format, choose Landscape. Leave all margins at 1 inch each. If you are still\
    \ on SSRS 2005, you will need to set the height and width properties to represent\
    \ Landscape characteristics like 11 inches in width by 8.5 inches in height.\n\
    \n![Image](images/9781430238102_Fig04-01.jpg)\n\n***Figure 4-1.** Report Properties\
    \ Layout tab*\n\nIf you are using 2005, the Layout tab will also have a Columns\
    \ setting, where you can specify the number of columns. This section was removed\
    \ in 2008, but it is still a property of the Report. We use multi-column reports\
    \ frequently in the medical industry, primarily for printing labels.\n\n### Using\
    \ Report Objects\n\nIn the next few sections, you will look at the report objects\
    \ to see their basic functionality and learn how you can tap into each one’s unique\
    \ versatility when developing reports. At this point, if you have not already\
    \ done so, open the `Pro_SSRS` solution that we have provided with starting points\
    \ and completed samples, and refer to it as you work through the individual object\
    \ sections. We will cover the following report objects:\n\n> *List:* This is a\
    \ free-form container object for a single data grouping.\n> \n> *Textbox:* The\
    \ textbox report in SSRS 2008 is probably the most long-awaited enhancement. In\
    \ previous version of SSRS, textboxes were nothing more than containers for strings\
    \ of uniform literal text and/or field values from data sets; all had to have\
    \ the same formatting. Since the SSRS 2008 release, this is no longer the case.\n\
    > \n> *Table:* This is used for tabular reports with rows and columns, but provides\
    \ single or multiple date groups.\n> \n> *Rectangle:* Like the List, the Rectangle\
    \ is a container, although it provides no data groupings.\n> \n> *Matrix:* This\
    \ report object, like the Table, provides multiple grouping levels, but lays data\
    \ out as a cross-tab or pivot-style report.\n\nIn SSRS for 2008, Microsoft introduced\
    \ the Tablix control, which at its core is a conglomeration of row-level grouping\
    \ and column-level grouping. Before SSRS 2008, it was difficult to create a report\
    \ that combined these two levels of grouping. You can use the Tablix properties\
    \ in three controls, List, Matrix, and Table, creating on-the-fly column or row\
    \ groups at any level within the three report objects. RDL code for Tablix support\
    \ has been added as well, as you will see as we go through the report objects\
    \ that support Tablix properties. In [Chapter 6](#Chapter06.html), you will see\
    \ more detail on adding Tablix properties to a report.\n\n### Implementing a List\n\
    \nThe List data region is one of the two free-form container objects that allow\
    \ grouping of data, the other being Rectangle. The two objects are similar in\
    \ that they can contain other report objects and data regions. Free-form data\
    \ regions don’t constrain the layout of fields to a fixed format; the person creating\
    \ the report is responsible for aligning the objects.\n\nBecause the List contains\
    \ a grouping level, you can use the List data region only with a single dataset.\
    \ Note that the List data region displays one record at a time from the dataset\
    \ based on this grouping. By default, no grouping is assigned to a list.\n\nTo\
    \ learn how you can use the List data region with the `Emp_Svc_Cost` stored procedure,\
    \ which returns detail records for the number of visits for patients, you will\
    \ add a List to the design area and drag fields from the dataset into it. You\
    \ will use `Employee_Name`, `Patient_Name`, `Visit_Count`, and `Estimated_Cost`\
    \ to show total visits and cost for each patient/employee combination.\n\nIn the\
    \ `Pro_SSRS` solution, the list sample’s starting-point report is called List\
    \ Start. This report has a data source and dataset, called `emp_svc_cost`, already\
    \ defined for the `localhost` server, which should match your environment if you\
    \ are using BIDS to connect to your local SQL Server.\n\nTo begin, open the List\
    \ Start report, and click the Layout tab. Before we get started on creating the\
    \ report, click on Report ![Image](images/U001.jpg) View ![Image](images/U001.jpg)\
    \ Ruler to make the ruler visible on the designer. Next, add the List report object\
    \ to the report by double-clicking the List object in the Toolbox. The List control\
    \ is automatically added to the upper-left area of the design grid. Grab the lower-right\
    \ corner of the List and drag it down until it is approximately 7 inches wide\
    \ by 1 inch in height.\n\nNext, select the Datasets in the Report Data toolbar,\
    \ expand the `emp_svc_cost` dataset, drag the fields in the following list to\
    \ the design area, and place them in the List data region:\n\n> *   `Patient_Name`\n\
    > *   `Employee_Name`\n> *   `Service_Type`\n> *   `Estimated_Cost`\n> *   `Visit_Count`\n\
    \nNow add the Sum function to the `Visit_Count` and `Estimate_Cost` fields so\
    \ that each field will be of the syntax `=Sum(Fields!fieldname.Value)`. If you\
    \ had added a grouping level to the list (you will do that shortly), the `Sum`\
    \ function would have been automatically added to these fields.\n\nNext, size\
    \ the fields so that when you’re finished, the report looks like [Figure 4-2](#Chapter04.html#fig_4_2).\
    \ In Visual Studio 2010 and BIDS, as you work with the layout of report objects,\
    \ the design environment has been enhanced to control automatic alignment as you\
    \ drag and drop objects, so it is far easier to design professional-looking reports.\
    \ At this point, however, you aren’t concerned with beauty, but with functionality.\n\
    \n![Image](images/9781430238102_Fig04-02.jpg)\n\n***Figure 4-2.** List data region\
    \ with ungrouped fields*\n\nWhen you click the preview button, the report will\
    \ generate and display visit information for each patient and employee (see [Figure\
    \ 4-3](#Chapter04.html#fig_4_3)). Notice that the sum of the fields `Visit_Count`\
    \ and `Estimated_Cost` is the same for each record. Each sum amount is the same\
    \ for all patients and employees because you have not yet defined any grouping\
    \ for the List itself. You will do that next.\n\n![Image](images/9781430238102_Fig04-03.jpg)\n\
    \n***Figure 4-3.** Preview of the List data region*\n\nFor the List we added,\
    \ there is a default (Details) row grouping as evidence in the Row Groups area\
    \ of the report. However, no field value is currently assigned as the group; it\
    \ is simply blank. To add grouping, click the down arrow on the Row Groups (Details)\
    \ and select Group Properties. Add two fields by clicking Add in the Group Expressions\
    \ area—`Patient_Name` and then `Employee_Name`—as group expressions."
  trans: "\n### 设置分页\n\n首先，查看新报表的常规报表属性。在“设计”选项卡上，选择“报表”，然后从工具栏的下拉菜单中选择“报表属性”。\n\n\
    “报表属性”对话框中有四个选项：页面设置、代码、引用和变量。目前，您需要关注的是“页面设置”选项。如图 4-1 所示，“页面设置”对话框包含用于分页的属性设置，例如页面宽度和边距。自\
    \ SSRS 2008 以来，我们才能够选择标准的页面格式选项，例如纵向或横向方向。您的选择会自动设置宽度和高度属性值。由于许多报表将以横向格式打印，请选择“横向”。将所有边距保留为\
    \ 1 英寸。如果您仍在使用 SSRS 2005，则需要将高度和宽度属性设置为代表横向特征的值，例如宽度 11 英寸，高度 8.5 英寸。\n\n![Image](img/9781430238102_Fig04-01.jpg)\n\
    \n***图 4-1.** 报表属性的“布局”选项卡*\n\n如果您使用的是 2005 版本，“布局”选项卡还会有一个“列”设置，您可以在其中指定列数。此部分在\
    \ 2008 版本中已被移除，但它仍然是报表的一个属性。我们在医疗行业经常使用多列报表，主要用于打印标签。\n\n### 使用报表对象\n\n在接下来的几个部分中，您将了解报表对象的基本功能，并学习在开发报表时如何利用每个对象的独特多功能性。此时，如果您尚未操作，请打开我们提供的包含起始点和完整示例的\
    \ `Pro_SSRS` 解决方案，并在学习各个对象部分时参考它。我们将介绍以下报表对象：\n\n> *列表:* 这是一个用于单一数据分组的自由格式容器对象。\n\
    > \n> *文本框:* SSRS 2008 中的文本框报表可能是期待已久的增强功能。在之前的 SSRS 版本中，文本框只不过是用于统一的字面文本字符串和/或来自数据集的字段值的容器；所有内容都必须具有相同的格式。自\
    \ SSRS 2008 版本发布以来，这种情况已不再存在。\n> \n> *表格:* 用于具有行和列的表格报表，但提供单个或多个数据分组。\n> \n> *矩形:*\
    \ 与列表类似，矩形是一个容器，尽管它不提供数据分组。\n> \n> *矩阵:* 此报表对象与表格类似，提供多个分组级别，但将数据布局为交叉表或透视表风格的报表。\n\
    \n在 SSRS 2008 中，Microsoft 引入了 Tablix 控件，其核心是行级分组和列级分组的集合。在 SSRS 2008 之前，很难创建结合这两个分组级别的报表。您可以在列表、矩阵和表格这三个控件中使用\
    \ Tablix 属性，在三个报表对象内的任何级别上动态创建列或行组。对 Tablix 支持的 RDL 代码也已添加，正如我们在介绍支持 Tablix 属性的报表对象时将看到的那样。在第\
    \ 6 章中，您将看到有关向报表添加 Tablix 属性的更多细节。\n\n### 实现列表\n\n列表数据区域是允许数据分组的两个自由格式容器对象之一，另一个是矩形。这两个对象类似，因为它们可以包含其他报表对象和数据区域。自由格式数据区域不会将字段布局限制为固定格式；创建报表的人员负责对齐对象。\n\
    \n由于列表包含一个分组级别，因此只能将列表数据区域与单个数据集一起使用。请注意，列表数据区域基于此分组一次显示数据集中的一个记录。默认情况下，列表没有分配分组。\n\
    \n为了学习如何将列表数据区域与 `Emp_Svc_Cost` 存储过程（该过程返回患者访问次数的详细记录）结合使用，您将向设计区域添加一个列表，并将数据集中的字段拖入其中。您将使用\
    \ `Employee_Name`、`Patient_Name`、`Visit_Count` 和 `Estimated_Cost` 来显示每个患者/员工组合的总访问次数和费用。\n\
    \n在 `Pro_SSRS` 解决方案中，列表示例的起点报告名为“列表开始”。该报表已为 `localhost` 服务器定义了一个名为 `emp_svc_cost`\
    \ 的数据源和数据集，如果您使用 BIDS 连接到本地 SQL Server，这应该与您的环境匹配。\n\n首先，打开“列表开始”报表，然后单击“布局”选项卡。在开始创建报表之前，单击“报表”\
    \ ![Image](img/U001.jpg) “视图” ![Image](img/U001.jpg) “标尺”以使标尺在设计器上可见。接下来，通过双击“工具箱”中的列表对象，将列表报表对象添加到报表中。列表控件会自动添加到设计网格的左上角区域。抓住列表的右下角并向下拖动，直到其宽度约为\
    \ 7 英寸，高度约为 1 英寸。\n\n接下来，在“报表数据”工具栏中选择“数据集”，展开 `emp_svc_cost` 数据集，将以下列表中的字段拖到设计区域，并将它们放置在列表数据区域中：\n\
    \n> *   `Patient_Name`\n> *   `Employee_Name`\n> *   `Service_Type`\n> *   `Estimated_Cost`\n\
    > *   `Visit_Count`\n\n现在，将 Sum 函数添加到 `Visit_Count` 和 `Estimate_Cost` 字段中，以便每个字段的语法为\
    \ `=Sum(Fields!fieldname.Value)`。如果您已向列表添加了分组级别（您稍后将执行此操作），则 `Sum` 函数将自动添加到这些字段中。\n\
    \n接下来，调整字段大小，完成后报表看起来如图 4-2 所示。在 Visual Studio 2010 和 BIDS 中，当您处理报表对象的布局时，设计环境已得到增强，可在您拖放对象时控制自动对齐，因此设计专业外观的报表要容易得多。然而，此时您关心的不是美观，而是功能。\n\
    \n![Image](img/9781430238102_Fig04-02.jpg)\n\n***图 4-2.** 包含未分组字段的列表数据区域*\n\n\
    当您单击预览按钮时，报表将生成并显示每个患者和员工的访问信息（参见图 4-3）。请注意，`Visit_Count` 和 `Estimated_Cost` 字段的总和对于每条记录都是相同的。每个总和金额对于所有患者和员工都是相同的，因为您尚未为列表本身定义任何分组。您将在下一步进行此操作。\n\
    \n![Image](img/9781430238102_Fig04-03.jpg)\n\n***图 4-3.** 列表数据区域的预览*\n\n对于我们添加的列表，在报表的“行组”区域中有一个默认的（详细信息）行分组作为证据。但是，当前没有分配任何字段值作为组；它只是空白。要添加分组，请单击“行组”（详细信息）上的向下箭头，然后选择“组属性”。通过在“组表达式”区域中单击“添加”来添加两个字段——`Patient_Name`，然后是\
    \ `Employee_Name`——作为组表达式。\n"
- fmt: "# Using the List Object with Tablix Properties\n\nThe preview of the new List\
    \ with grouping levels now shows the correct number of visits for each patient\
    \ and employee combination. However, notice that in [Figure 4-4](#Chapter04.html#fig_4_4)\
    \ Bill Shakespeare is showing up multiple times, with 37 visits for employee Bailey\
    \ McDonald and eight visits for employee Sherri McDonald, for example. What you\
    \ really want to see is Bill Shakespeare once with all the employee and visit\
    \ information grouped in the figure. You could remove the grouping for the employee\
    \ from the List, but that would cause the report to group all the patients’ visits\
    \ under a single employee and reflect the data inaccurately.\n\nIn former versions\
    \ of SSRS, only a nested `List` would achieve this level of multiple groupings\
    \ and the report developer may have needed to look at using an alternative report\
    \ object, like a table—that would have got the level of desired grouping, but\
    \ would have lost the free-form feel of the report. Since SSRS 2008, however,\
    \ the `List` object includes `Tablix` properties. In other words, when you add\
    \ a `List` object from the Toolbox onto the design surface, a `Tablix` is created.\
    \ The `Table` and `Matrix` objects also share the `Tablix` properties and are\
    \ implemented as a `Tablix`. With `Tablix` properties, it is possible to create\
    \ a parent group above the default Details Group and add the patient name information\
    \ there, so the desired fields, `Patient_Name` and `Employee_Name`, can now be\
    \ grouped hierarchically.\n\n![Image](images/9781430238102_Fig04-04.jpg)\n\n**Figure\
    \ 4-4.** Previewed report with duplicate patient\n\nIn SSRS 2005, you would have\
    \ had to add two Lists, one nested in the other, to produce output that would\
    \ allow for multiple groupings in one container object. We showed that approach\
    \ in the previous edition of this book. However, with the introduction of `Tablix`\
    \ properties, we can simply add another grouping above `Employee_Name`. To do\
    \ this, right-click the details row of the `List` box where we added the fields,\
    \ and select **Add Group**; then **Parent Group** under the **Row Group** submenu,\
    \ as shown in [Figure 4-5](#Chapter04.html#fig_4_5). For the group, select `Patient_Name`\
    \ as the expression. You will notice that a new column is added for your new `Patient_Name`\
    \ group. Select the `Patient_Name` textbox that we added earlier and delete it\
    \ from the details section.\n\n![Image](images/9781430238102_Fig04-05.jpg)\n\n\
    **Figure 4-5.** Adding the `Patient_Name` grouping to the `List`\n\nNow, after\
    \ a few modifications of spacing and alignment when you preview the report grouped\
    \ by `Patient_Name` and the child group `Employee_Name`, you can see that multiple\
    \ employees are associated with a single patient. Along with each employee displaying\
    \ the correct total number of visits and estimated cost (see [Figure 4-6](#Chapter04.html#fig_4_6)).\n\
    \n![Image](images/9781430238102_Fig04-06.jpg)\n\n**Figure 4-6.** Previewed report\
    \ with parent group\n\n[Listing 4-1](#Chapter04.html#list_4_1) shows a section\
    \ of the `RDL` file with a sampling of the `List` data region you just created.\
    \ Notice in the XML schema that the `<List>` element encapsulates everything that\
    \ has been graphically added to the `List` data region, including all formatting\
    \ and grouping. As you can see in the `RDL`, the `List` control we selected inherits\
    \ properties of the new `Tablix` functionality.\n\n**Listing 4-1.** `RDL` List\
    \ Section\n\n```xml\n<TablixRowHierarchy>\n    <TablixMembers>\n        <TablixMember>\n\
    \            <Group Name=\"Patient_Name\">\n                <GroupExpressions>\n\
    \                    <GroupExpression>=Fields!Patient_Name.Value</GroupExpression>\n\
    \                </GroupExpressions>\n            </Group>\n            <TablixHeader>\n\
    \                <Size>1.08333in</Size>\n                <CellContents>\n    \
    \                <Textbox Name=\"Patient_Name1\">\n                        <CanGrow>true</CanGrow>\n\
    \                        <KeepTogether>true</KeepTogether>\n                 \
    \       <Paragraphs>\n                            <Paragraph>\n              \
    \                  <TextRuns>\n                                    <TextRun>\n\
    \                                        <Value>=Fields!Patient_Name.Value</Value>\n\
    \                                        <Style />\n                         \
    \           </TextRun>\n                                </TextRuns>\n        \
    \                        <Style />\n                            </Paragraph>\n\
    \                        </Paragraphs>\n                        <rd:DefaultName>Patient_Name1</rd:DefaultName>\n\
    \                        <Style>\n                            <Border>\n     \
    \                           <Style>None</Style>\n                            </Border>\n\
    \                            <PaddingLeft>2pt</PaddingLeft>\n                \
    \            <PaddingRight>2pt</PaddingRight>\n                            <PaddingTop>2pt</PaddingTop>\n\
    \                            <PaddingBottom>2pt</PaddingBottom>\n            \
    \            </Style>\n                    </Textbox>\n                </CellContents>\n\
    \            </TablixHeader>\n        </TablixMember>\n    </TablixMembers>\n\
    </TablixRowHierarchy>\n```\n\n**Note** To access the full `RDL` file from within\
    \ `BIDS`, select **View** with the Design tab open, and then **Code** from the\
    \ drop-down menu. If you are working in `Visual Studio 2010`, press `F7` and use\
    \ `Shift+F7` to toggle between Code and Designer modes.\n\nThe completed report\
    \ for the `List` object is called `Lists.rdl` in the `Pro_SSRS` project."
  raw: 'The preview of the new List with grouping levels now shows the correct number
    of visits for each patient and employee combination. However, notice that in [Figure
    4-4](#Chapter04.html#fig_4_4) Bill Shakespeare is showing up multiple times, with
    37 visits for employee Bailey McDonald and eight visits for employee Sherri McDonald,
    for example. What you really want to see is Bill Shakespeare once with all the
    employee and visit information grouped in the figure. You could remove the grouping
    for the employee from the List, but that would cause the report to group all the
    patients’ visits under a single employee and reflect the data inaccurately. In
    former versions of SSRS, only a nested List would achieve this level of multiple
    groupings and the report developer may have needed to look at using an alternative
    report object, like a table—that would have got the level of desired grouping,
    but would have lost the free-form feel of the report. Since SSRS 2008, however,
    the List object includes Tablix properties. In other words, when you add a List
    object from the Toolbox onto the design surface, a Tablix is created. The Table
    and Matrix objects also share the Tablix Properties are implemented as a Tablix.
    With Tablix properties, it is possible to create a parent group above the default
    Details Group and add the patient name information there, so the desired fields,
    `Patient_Name` and `Employee_Name`, can now be grouped hierarchically.


    ![Image](images/9781430238102_Fig04-04.jpg)


    ***Figure 4-4.** Previewed report with duplicate patient*


    In SSRS 2005, you would have had to add two Lists, one nested in the other, to
    produce output that would allow for multiple groupings in one container object.
    We showed that approach in the previous edition of this book. However, with the
    introduction of Tablix properties, we can simply add another grouping above `Employee_Name`.
    To do this, right-click the details row of the List box where we added the fields,
    and select Add Group; then Parent Group under the Row Group submenu, as shown
    in [Figure 4-5](#Chapter04.html#fig_4_5). For the group, select `Patient_Name`
    as the expression. You will notice that a new column is added for your new `Patient_Name`
    group. Select the `Patient_Name` textbox that we added earlier and delete it from
    the details section.


    ![Image](images/9781430238102_Fig04-05.jpg)


    ***Figure 4-5.** Adding the Patient_Name grouping to the List*


    Now, after a few modifications of spacing and alignment when you preview the report
    grouped by `Patient_Name` and the child group `Employee_Name`, you can see that
    multiple employees are associated with a single patient. Along with each employee
    displaying the correct total number of visits and estimated cost (see [Figure
    4-6](#Chapter04.html#fig_4_6)).


    ![Image](images/9781430238102_Fig04-06.jpg)


    ***Figure 4-6.** Previewed report with parent group*


    [Listing 4-1](#Chapter04.html#list_4_1) shows a section of the RDL file with a
    sampling of the List data region you just created. Notice in the XML schema that
    the `<List>` element encapsulates everything that has been graphically added to
    the List data region, including all formatting and grouping. As you can see in
    the RDL, the List control we selected inherits properties of the new Tablix functionality.


    ***Listing 4-1.** RDL List Section*


    `<TablixRowHierarchy>`

    `        <TablixMembers>`

    `        <TablixMember>`

    `                <Group Name="Patient_Name">`

    `                <GroupExpressions>`

    `                        <GroupExpression>=Fields!Patient_Name.Value</GroupExpression>`

    `                </GroupExpressions>`

    `                </Group>`

    `                <TablixHeader>`

    `                <Size>1.08333in</Size>`

    `                <CellContents>`

    `                        <Textbox Name="Patient_Name1">`

    `                        <CanGrow>true</CanGrow>`

    `                        <KeepTogether>true</KeepTogether>`

    `                        <Paragraphs>`

    `                                <Paragraph>`

    `                                <TextRuns>`

    `                                        <TextRun>`

    `                                        <Value>=Fields!Patient_Name.Value</Value>`

    `                                        <Style />`

    `                                        </TextRun>`

    `                                </TextRuns>`

    `                                <Style />`

    `                                </Paragraph>`

    `                        </Paragraphs>`

    `                        <rd:DefaultName>Patient_Name1</rd:DefaultName>`

    `                        <Style>`

    `                                <Border>`

    `                                <Style>None</Style>`

    `                                </Border>`

    `                                <PaddingLeft>2pt</PaddingLeft>`

    `                                <PaddingRight>2pt</PaddingRight>`

    `                                <PaddingTop>2pt</PaddingTop>`

    `                                <PaddingBottom>2pt</PaddingBottom>`


    ![Image](images/square.jpg) **Note** To access the full RDL file from within BIDS,
    select View with the Design tab open, and then Code from the drop-down menu. If
    you are working in Visual Studio 2010, press F7 and use Shift+F7 to toggle between
    Code and Designer modes.


    The completed report for the List object is called `Lists.rdl` in the `Pro_SSRS`
    project.'
  trans: "# 使用具有 Tablix 属性的 List 对象\n\n现在，带有分组级别的新 List 的预览正确地显示了每位患者和每位员工组合的就诊次数。但是，请注意，在图\
    \ 4-4 中，Bill Shakespeare 出现了多次，例如，对应员工 Bailey McDonald 有 37 次就诊，对应员工 Sherri McDonald\
    \ 有 8 次就诊。你真正希望看到的是 Bill Shakespeare 只出现一次，其所有的员工和就诊信息都归总在图中。你可以移除 List 中的员工分组，但这会导致报告将所有患者的就诊归到一个单一的员工下，从而不准确地反映数据。\n\
    \n在早期版本的 SSRS 中，只有嵌套的 `List` 才能实现这种多级分组，报告开发者可能需要考虑使用替代的报表对象，比如表格——那虽然能达到所需的分组级别，但会丧失报表的自由布局感觉。然而，自\
    \ SSRS 2008 起，`List` 对象包含了 `Tablix` 属性。换句话说，当你从工具箱将一个 `List` 对象添加到设计 surface 上时，实际上创建的是一个\
    \ `Tablix`。`Table` 和 `Matrix` 对象也共享 `Tablix` 属性，并且是作为 `Tablix` 实现的。借助 `Tablix`\
    \ 属性，可以在默认的详细信息组之上创建一个父分组，并将患者姓名信息添加到那里，这样，所需的字段 `Patient_Name` 和 `Employee_Name`\
    \ 现在就可以分层地进行分组了。\n\n![Image](img/9781430238102_Fig04-04.jpg)\n\n**图 4-4.** 包含重复患者的预览报告\n\
    \n在 SSRS 2005 中，你不得不添加两个 List，一个嵌套在另一个内部，才能在一个容器对象内实现多级分组。我们在本书前一版中展示了这种方法。然而，随着\
    \ `Tablix` 属性的引入，我们只需简单地在 `Employee_Name` 之上添加另一个分组即可。为此，请右键单击我们添加了字段的 `List`\
    \ 框的详细信息行，选择 **添加分组**；然后在 **行分组** 子菜单下选择 **父分组**，如图 4-5 所示。对于分组，选择 `Patient_Name`\
    \ 作为表达式。你会注意到，系统为新的 `Patient_Name` 分组添加了一个新列。选择我们之前添加的 `Patient_Name` 文本框，并将其从详细信息部分删除。\n\
    \n![Image](img/9781430238102_Fig04-05.jpg)\n\n**图 4-5.** 向 `List` 添加 `Patient_Name`\
    \ 分组\n\n现在，经过对间距和对齐方式的一些修改后，当你预览按 `Patient_Name` 和其子分组 `Employee_Name` 分组的报表时，你可以看到多个员工与一位患者相关联。每位员工都显示正确的就诊总数和预估费用（参见图\
    \ 4-6）。\n\n![Image](img/9781430238102_Fig04-06.jpg)\n\n**图 4-6.** 包含父分组的预览报告\n\
    \n清单 4-1 展示了 `RDL` 文件的一部分，其中包含你刚创建的 `List` 数据区域的示例。请注意，在 XML 模式中，`<List>` 元素封装了所有图形化添加到\
    \ `List` 数据区域的内容，包括所有格式和分组。正如你在 `RDL` 中看到的，我们选择的 `List` 控件继承了新的 `Tablix` 功能的属性。\n\
    \n**清单 4-1.** `RDL` 列表部分\n\n```xml\n<TablixRowHierarchy>\n    <TablixMembers>\n\
    \        <TablixMember>\n            <Group Name=\"Patient_Name\">\n         \
    \       <GroupExpressions>\n                    <GroupExpression>=Fields!Patient_Name.Value</GroupExpression>\n\
    \                </GroupExpressions>\n            </Group>\n            <TablixHeader>\n\
    \                <Size>1.08333in</Size>\n                <CellContents>\n    \
    \                <Textbox Name=\"Patient_Name1\">\n                        <CanGrow>true</CanGrow>\n\
    \                        <KeepTogether>true</KeepTogether>\n                 \
    \       <Paragraphs>\n                            <Paragraph>\n              \
    \                  <TextRuns>\n                                    <TextRun>\n\
    \                                        <Value>=Fields!Patient_Name.Value</Value>\n\
    \                                        <Style />\n                         \
    \           </TextRun>\n                                </TextRuns>\n        \
    \                        <Style />\n                            </Paragraph>\n\
    \                        </Paragraphs>\n                        <rd:DefaultName>Patient_Name1</rd:DefaultName>\n\
    \                        <Style>\n                            <Border>\n     \
    \                           <Style>None</Style>\n                            </Border>\n\
    \                            <PaddingLeft>2pt</PaddingLeft>\n                \
    \            <PaddingRight>2pt</PaddingRight>\n                            <PaddingTop>2pt</PaddingTop>\n\
    \                            <PaddingBottom>2pt</PaddingBottom>\n            \
    \            </Style>\n                    </Textbox>\n                </CellContents>\n\
    \            </TablixHeader>\n        </TablixMember>\n    </TablixMembers>\n\
    </TablixRowHierarchy>\n```\n\n**注意** 要在 `BIDS` 中访问完整的 `RDL` 文件，请在设计选项卡打开的情况下选择\
    \ **视图**，然后从下拉菜单中选择 **代码**。如果你使用的是 `Visual Studio 2010`，请按 `F7`，并使用 `Shift+F7`\
    \ 在代码和设计器模式之间切换。\n\n`List` 对象的最终报告位于 `Pro_SSRS` 项目中，名为 `Lists.rdl`。"
- fmt: '## Implementing a Textbox


    The Textbox control had a major upgrade from SSRS 2005 to 2008, but nothing has
    changed since. Thankfully, it now supports rich formatting for text, not to be
    confused with Rich Text Formatting. What is possible now was not possible, or
    at least very difficult, to do in SSRS 2005. You can now format text blocks individually
    inside a single textbox as well as combine fields from datasets using placeholders
    within the textbox. This is all accomplished via HTML tags that can be imported
    as expression values for the textbox itself or contained within a dataset and
    rendered with the report.


    To learn how to create a textbox that has rich formatting, start with the `TextBox_Start.rdl`
    report that contains an empty Textbox control. Open `TextBox_Start.rdl` in the
    `Pro_SSRS` solution. The initial report will look like [Figure 4-7](#Chapter04.html#fig_4_7).


    ![Image](images/9781430238102_Fig04-07.jpg)


    **Figure 4-7.** `TextBox_Start` report with blank textbox


    For this example, let’s assume that, as a report designer, you have been tasked
    with merging literal text with data in a form letter that will be sent to patients
    as a survey. The survey, which we will complete in [Chapter 6](#Chapter06.html),
    will include information about a patient’s specific visits, but must otherwise
    be a generic template with the same questions for each patient. The report will
    also include bold, underline, and italic font properties in a single Textbox.


    The first thing to understand about textboxes since SSRS 2008 is `placeholders`.
    A placeholder is simply a location in the Textbox that will contain individual
    portions of the Textbox and can have custom formatting for the value or expressions
    inside it. Each placeholder has its own properties as well, such as Tooltips,
    Actions, and Alignment.


    First, click in the textbox of the `TextBox_Start` report to select it. Then,
    right-click and select Create Placeholder. You will see the Textbox properties,
    as in [Figure 4-8](#Chapter04.html#fig_4_8).


    ![Image](images/9781430238102_Fig04-08.jpg)


    **Figure 4-8.** Textbox Placeholder properties


    For this demonstration, you will add a simple date placeholder, a greeting, and
    a data field, each with different formatting styles. In [Chapter 6](#Chapter06.html),
    you will expand on this by creating a patient survey form letter that combines
    multiple objects like Rectangle and Table to deliver a detailed report of services
    rendered along with the survey. For a simple Textbox like this one, no grouping
    is available for the dataset, `Pro_SSRS_DS`, so you will use the `First` function
    to extract the patient name from the dataset for this example.


    With the Placeholder Properties dialogue box still open, type “Today” in the Label
    field and `=NOW()` in the Value field. One important note on formatting is that
    if HTML is selected on the General tab, other date-formatting rules on the Number
    tab will not be applied. Therefore, for this placeholder, select None – Plain
    Text Only as in [Figure 4-9](#Chapter04.html#fig_4_9).


    ![Image](images/9781430238102_Fig04-09.jpg)


    **Figure 4-9.** Value properties for the first textbox placeholder


    On the Number tab, select Date for the Category and for the Style select Monday,
    January 31, 2000 as in [Figure 4-10](#Chapter04.html#fig_4_10), and then click
    OK.


    ![Image](images/9781430238102_Fig04-10.jpg)


    **Figure 4-10.** Plain text date formatting for the textbox placeholder


    Back on the Design tab, click below the placeholder we just added to go to the
    next line in the Textbox. Type the word “Dear” directly into the textbox and follow
    it with a space. This will serve as the greeting for the letter. Now, right-click
    the location directly after the space you typed, and select Create Placeholder
    again. For the label, type “Patient Name.” For the expression, open the expression
    builder by clicking the expression button to the right of the value field. Click
    DataSets in the Category box and in the Item box select `Pro_SSRS_DS`. In the
    Values box select `First(Patient_Name)`. Notice, as in [Figure 4-11](#Chapter04.html#fig_4_11),
    that the value is expanded to be `=First(Fields!Patient_Name.Value, "Pro_SSRS_DS")`.
    You will notice here, and throughout the book, that in SSRS 2012, full expression
    values for fields have been condensed for ease of use and clarity. `Fields!Patient_Name.Value`,
    for example, will often be displayed as simply `[Patient_Name]` in design mode.


    ![Image](images/9781430238102_Fig04-11.jpg)


    **Figure 4-11.** Patient Name value for the textbox


    Rendering the report at this point does not effectively show how you can have
    multiple formats in a single textbox. However, adding individual formatting at
    this point is as easy as selecting your placeholders and choosing whatever format
    you desire. Highlight the Today placeholder, making sure that the entire label
    is selected. Next, click the italic button from the toolbar. Then, select the
    Patient Name placeholder and click the bold button. [Figure 4-12](#Chapter04.html#fig_4_12)
    shows a preview of a single Textbox object with multiple formats.


    ![Image](images/9781430238102_Fig04-12.jpg)


    **Figure 4-12.** Output of multiple formats for a single textbox


    As stated earlier, even custom formatting as simple as this was not available
    in SSRS 2005, so SSRS 2008 represents a huge leap forward in report design. In
    the next chapter, you will produce reports that are more sophisticated by importing
    HTML formatting directly from a SQL table, as well as records from multiple datasets,
    to create a full custom patient survey letter.


    The completed report for the Textbox object is called `TextBox.rdl` and is in
    the `Pro_SSRS` project.'
