    ### 执行审计与性能分析


    当你将 SSRS 部署在开发、测试和生产环境之间时，你会发现评估性能涉及多种基准测试和分析工具。基于性能分析，管理员能够了解其服务器可以承受的压力水平，并能够相应地配置环境。我们将展示如何测试
    SSRS 部署的各个组件，并说明如何使用标准工具分析输出结果。


    ![Image](img/square.jpg) **注意** SSRS 2008 版本引入了重新设计的报告引擎，通过消除对 IIS 的依赖（这是之前版本
    SSRS 的一个痛点）增强了其内存管理功能。从该版本开始，Web 服务和 Windows 服务合并为一个 Windows 服务。


    许多机构需要监控和归档用户活动的详细信息。如果你怀疑存在对数据的未授权访问，这一点尤其重要。SSRS 提供了一个内置的日志记录功能，可捕获若干关键信息片段。这些信息在两个方面很有用：


    > *   你可以捕获关于报表的性能信息，例如处理时长和记录数。

    > *   你可以捕获安全信息，例如谁执行了报表以及他们是否成功执行。


    以下章节的第一个目标是，使用 SSRS 安装中提供的工具来设置和扩展 SSRS 的内置日志记录功能。你需要记录所有活动，以便能够找出对服务器影响最大的报表和用户。我们创建了一个自定义的
    SSRS 报表——“报表执行日志”，它将向管理员提供日志统计信息，并根据报表参数包含动态的列分组。我们将展示如何为你的 SSRS 部署使用此报表。


    以下章节的第二个目标是，展示如何在我们测试 Web 场中的 SSRS 服务器上执行基准测试，以确保 SSRS 部署到生产环境时不会出现意外的性能问题。我们将展示如何使用一个名为
    Application Center Test (ACT) 的 Web 应用程序压力测试工具来评估性能。


    #### 配置 SSRS 日志记录


    访问 SSRS 中的执行日志信息是一个相当简单的过程。它涉及 SSRS 数据库中的一个主表，恰如其名地称为 `ExecutionLogStorage`。默认安装
    SSRS 时，执行日志记录是启用的，并设置为保留 60 天的日志。60 天后，超过 60 天的日志条目会自动从表中删除。但是，你可以选择通过 `SSMS`
    连接到 SSRS 实例，然后右键单击服务器并选择 `属性` 来更改此持续时间。在服务器属性窗口出现后，导航到“日志记录”选项卡。图 10-24 显示了如果你想将保留天数更改为
    365 天而非默认的 60 天时的设置。


    执行详细信息被存储起来，并且既然目标之一是构建一个自定义 SSRS 报表以向管理员提供报表执行信息，你将需要能够查询日志数据。幸运的是，Microsoft
    创建了三个视图，它们利用执行详细信息，使得确定诸如执行报表的用户、报表处理或渲染所花费的时间、甚至是通过交互方式还是通过订阅执行等信息变得容易。`ReportServer`
    数据库中的三个视图是 `ExecutionLog`、`ExecutionLog2` 和 `ExecutionLog3`。我们将把这些视图作为我们管理报表的基础。


    ![Image](img/9781430238102_Fig10-24.jpg)


    ***图 10-24.** 报表服务器属性 - 执行日志设置*


    #### 转换 ExecutionLog 表


    设置 SSRS 来转换日志数据是一个简单的分步过程。在过去的几年里，我们创建了许多解决方案，用于将执行数据传输并存储到历史数据库中，这样当 SSRS 从数据库中删除这些数据时，我们不会丢失任何执行详细信息。其中一种解决方案是使用
    SQL Server Integration Services (`SSIS`) 包来每日传输执行历史记录。作为 `Pro_SSRS` 解决方案的一部分，我们包含了一个
    `SSIS` 项目，其中包含一个名为 `Pro_SSRS_Load_ExecutionLog.dtsx` 的包。此外，下载内容中还包括 `Pro_SSRSExecutionLog`
    数据库。你需要还原此数据库，以便 `Pro_SSRS_Load_ExecutionLog` 包和本章中创建的报表能够运行。有关如何还原 `Pro_SSRSExecutionLog`
    数据库的详细说明，请参阅 `ReadMe.txt` 文件。你可以从 Apress 网站 ([`www.apress.com`](http://www.apress.com))
    的 Source Code/Download 部分下载 `Pro_SSRS` 项目。


    `Pro_SSRS_Load_ExecutionLog` 包非常直接。在包的顶部，我们只是检查数据库是否存在，如果不存在，则分支到一条语句，该语句会创建数据库、一个用于归档执行日志的表，并加载所有截至昨天的记录。如果数据库已存在且记录尚未存在于该数据库中，则所有这些记录都会从
    `ReportServer` 数据库中提取到归档数据库中。在每晚安排执行此包后，它将获取前一天的数据。图 10-25 显示了在开发环境中以交互方式运行时，完成一天加载后的包结果。


    ![Image](img/9781430238102_Fig10-25.jpg)


    ***图 10-25.** Pro_SSRS_Load_ExecutionLog SSIS 包*


    ![Image](img/square.jpg) **提示** 请注意，需要定期执行该包以保持转换后的日志数据是最新的。在我们的场景中，我们为此目的创建了一个计划作业，每晚运行
    `SSIS` 包。


    Microsoft 提供了一组示例报表，你可以与 `ExecutionLog` 数据库一起使用。这些示例包含在 SQL Server 2008 安装的以下位置：`Samples\Reporting
    Services\Report Samples\Server Management Sample Reports\Execution Log Sample
    Reports`。这些示例报表对于向管理员提供信息非常有用，例如按用户和报表大小统计的报表执行情况等。你会找到三个 SSRS 执行日志示例报表。其中之一 `Execution
    Summary`（执行摘要）如 图 10-26 所示。


    在之前的 SSRS 版本中，Microsoft 提供了一组示例报表，你可以与一个可用于传输数据的 `SSIS` 包结合使用，来从 `ReportServer`
    数据库报告数据。然而，截至目前，尚未为 2012 版本创建新版本。因此，我们创建了一个示例 `Execution Summary` 报表，它提供了一些我们的管理员希望关注的有意义的指标。其中一些指标包括总执行次数、成功执行次数、失败执行次数以及按每月天数统计的执行次数。


    ![Image](img/9781430238102_Fig10-26.jpg)


    ***图 10-26.** 执行摘要示例报表*

