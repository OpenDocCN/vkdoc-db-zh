  trans: "![Image](img/9781430238102_Fig13-66.jpg)\n\n`图 13-66。` 多边形属性操作设置\n\n呼！真有趣！点击\
    \ `运行` 按钮来实际执行我们完成的报表吧。如果您已执行了前面的步骤，您完成的报表应该会接近于 图 13-67。\n\n![Image](img/9781430238102_Fig13-67.jpg)\n\
    \n`图 13-67。` 按分支和患者所在州呈现的员工服务成本报表\n\n运行报表后，点击某个分支的 `所在州` 地图以钻取到详细报表。例如，如果您点击 `服务年份\
    \ 2009` 的 `俄亥俄州`，结果将如 图 13-68 所示。\n\n![Image](img/9781430238102_Fig13-68.jpg)\n\
    \n`图 13-68。` 按分支和患者所在州钻取的员工服务成本详细报表\n\n### 报表部件\n\n`SSRS 2008 R2` 新增了一项功能，它提供了即席报表的真正强大之处。正如我们之前简要提到的，报表部件可以被创建并部署到报表服务器，其唯一目的就是供其他报表开发人员或即席报表作者使用。报表部件不仅有助于通过可重用性保持一致性，还能提高报表制作的效率。报表部件令人惊叹的一点是，当报表使用报表部件后，如果对报表部件进行了更改，那么所有使用它的报表都会收到变更通知。报表作者可以选择使用新版本，或者保留报表当前使用的现有版本。我知道这很棒，它是\
    \ `报表生成器` 工具中一个非常受欢迎的新增功能。\n\n在开始示例之前，请注意并非所有报表项都能发布为报表部件。工具箱中的大多数报表项都可以用作报表部件，但并非全部。可以使用的报表项列表如下：\n\
    \n- `Tablix` – `表`、`列表` 和 `矩阵`\n- `图表`\n- `仪表`\n- `地图`\n- `矩形`\n- `图像`\n- `参数`\n\
    \n我们将把现有报表作为报表部件部署到 `报表服务器`。我们可以使用 `报表设计器` 或 `报表生成器` 来完成，但由于我们正在展示 `报表生成器 3.0`\
    \ 的功能，我们将向您展示如何在 `报表生成器` 中打开现有报表并进行部署。部署完成后，我们将展示使用 `报表生成器 3.0` 的报表作者如何“消费”或重用已部署到\
    \ `报表服务器` 的报表部件。打开 `报表生成器`，我们开始吧。操作步骤如下：\n\n1.  启动 `报表生成器` 后，点击左上角的 `报表生成器` 图标，然后点击\
    \ `打开`。\n2.  导航到您解压 `Pro_SSRS` 解决方案的位置，并找到 `EmployeeSvcCost_RB3_ReportPart.rdl`\
    \ 文件。点击 `打开` 以在 `报表生成器 3.0` 中加载报表。\n3.  点击 `运行` 查看报表的实际效果。该报表显示了一个饼图，其中包含每个分支的预估成本，如\
    \ 图 13-69 所示。\n    ![Image](img/9781430238102_Fig13-69.jpg)\n    `图 13-69。` `EmployeeSvcCost_RB3_ReportPart`\
    \ 报表\n4.  点击 `设计` 按钮返回设计模式。再次点击 `报表生成器` 菜单按钮，并选择 `发布报表部件`，如 图 13-70 所示。\n    ![Image](img/9781430238102_Fig13-70.jpg)\n\
    \    `图 13-70。` 发布报表部件\n5.  在 `发布报表部件` 屏幕上，我们有两个选项：`使用默认设置发布所有报表部件` 或 `发布前审阅并修改报表部件`。我们可以选择前者，但为了展示部署单个报表项的能力，请选择后者：`发布前审阅并修改报表部件`，如\
    \ 图 13-71 所示。\n    ![Image](img/9781430238102_Fig13-71.jpg)\n    `图 13-71。` 发布前审阅\n\
    6.  如 图 13-72 所示，我们可以选择部署报表中的两个项目。第一个是 `EstimatedCostByBranch_Pie` 图表，第二个是我们的\
    \ `ServiceYear` 报表参数。由于 `图表` 需要该参数，请确保两者都被选中，然后点击 `发布` 将我们的图表部署到报表服务器。\n    ![Image](img/9781430238102_Fig13-72.jpg)\n\
    \    `图 13-72。` 发布选定的报表部件\n7.  如果在报表服务器上权限设置恰当（`内容管理员`），您应该在选定的报表部件旁边看到两个绿色的勾选标记。点击\
    \ `关闭` 返回 `报表生成器`。\n8.  现在我们已部署了报表部件，是时候创建一个使用该报表部件的报表了。再次点击 `报表生成器` 菜单按钮，选择 `新建`，然后选择创建\
    \ `空白报表`。新报表加载后，将报表标题更改为“按分支预估成本”。\n9.  点击功能区中的 `插入` 选项卡，然后选择 `报表部件`。您应该会看到 `报表部件库`\
    \ 窗格在屏幕右侧显示，如 图 13-73 所示。从 `报表部件库` 窗口中，您可以搜索报表部件，查看有哪些报表部件可用以及是谁创建的。您甚至可以在缩略图视图下预览报表部件的外观。\n\
    \    ![Image](img/9781430238102_Fig13-73.jpg)\n    `图 13-73。` 查看报表部件库\n10. 在报表中使用报表部件非常简单，只需将其拖放到设计图面上即可。既然如此，将\
    \ `EstimatedCostByBranch_Pie` 图表拖到设计图面上，并使其左侧与标题对齐。点击 `开始` 选项卡，然后运行报表。使用 `服务年份\
    \ 2009` 执行报表的效果可以在 图 13-74 中看到。\n11. 将报表保存到 `报表服务器`，方法与前面的示例相同，名称为 `EstimatedCostByBranch_RB3_Report_Using_ReportPart`。在修改报表部件后，我们将稍后查看此报表。\n\
    \n![Image](img/9781430238102_Fig13-74.jpg)\n\n`图 13-74。` 使用已部署报表部件的报表"
- fmt: 'As you can see, deploying and consuming a report part is a pretty straightforward
    process. If architected appropriately and some solid report developers, many report
    parts could be stored on the report server and re-used by report authors to simplify
    report development.


    ![Image](images/square.jpg) **Note** The report used in this section (“Reports
    Parts”) is called `EmployeeSvcCost_RB3_ReportPart.rdl` and is included in the
    `Pro_SSRS` solution that we have been using throughout this book. The `Pro_SSRS`
    solution can be found as part in the Source Code/Download area for the book on
    the Apress Web site `(`[`www.apress.com`](http://www.apress.com)`).`


    As you might recall, I mentioned earlier that when changes are made to a report
    part and it is saved out to the report server, each of the reports that use that
    report part are then notified of the example. Use the following steps to see this
    in action:


    > 1.  Once you have Report Builder started, click on the `Report Builder` icon
    in the top left corner and click `Open`.

    > 2.  Navigate to the location that you have extracted the `Pro_SSRS` solution
    and locate the `EmployeeSvcCost_RB3_ReportPart.rdl` file. Click `Open` to load
    the report in Report Builder 3.0\. This report is the same report that we opened
    up earlier. We are now going to make a minor change and then re-publish the report
    part.

    > 3.  Change the font color of the chart title to be Blue and italicized. No major
    changes, we just want to see what happens when you change a report part. Deploy
    the report part using the `Publish Report Parts` as we did earlier from the Report
    Builder menu button. Only publish the chart this time.

    > 4.  Now, let’s go and open the `EstimatedCostByBranch_RB3_Report_Using_ReportPart`
    that we saved to the report server which has a copy of the original report part.
    Click the `Report Builder` menu button and select `Open`. Navigate to the report
    server location where you saved the report and open the `EstimatedCostByBranch_RB3_Report_Using_ReportPart`
    report. When you open the report, you should see a message box titled “Updated
    Report Parts” pop up between the tabstrip and report design surface (`Figure 13-75`).
    This is our indicator stating that our report part that we consumed has been altered.

    >

    >     ![Image](images/9781430238102_Fig13-75.jpg)

    >

    >     ***Figure 13-75.** Updated report parts message indicator*

    >

    >

    > 5.  Click the `View Updates` button to see what has changed. When the Update
    Report Parts screen appears, we should see what has changed as well as a checkbox
    next to the changed report parts. If we leave the checkbox blank, our report will
    remain the same as it was and it will not take on these new changes. Conversely,
    if we place a check in the checkbox, it will update our report with the new report
    part. We also have the ability to disable the notification when the report part
    is updated. This essentially tells reporting services that the report doesn’t
    care if the report part ever changes. If you disable this option, you will not
    be notified of changes. Click the checkbox to update the `EstimatedCostByBranch_Pie`
    report part and click `Update` as shown in `Figure 13-76`.


    ![Image](images/9781430238102_Fig13-76.jpg)


    ***Figure 13-76.** Updating reports that consume updated report parts*


    As you can see by the result of updating our report with the updated report part,
    we now see a blue, italicized chart title. In my opinion, the Report Part functionality
    built into Report Builder 3.0 is one of the best additions to ad hoc reporting
    to date. If you are anything like me, your brain is probably spinning while thinking
    of new report parts to create for your end users who fall into the report author
    role —thus, enabling them to quickly and efficiently create ad hoc reports.


    ### 总结


    Ad hoc reporting gives users the ability to create their own reports on the fly.
    It has always been a highly requested feature for any reporting platform and Reporting
    Services has been no different. As shown in this chapter, Microsoft decided to
    deliver their first incarnation of ad hoc reporting in the form of Report Builder
    1.0\. They significantly enhanced the user experience in the Report Builder 2.0
    to allow reporting data from relational data and OLAP data sources as well. With
    the SQL Server 2008 R2 release, came Microsoft’s most recent version, Report Builder
    3.0\. Furthermore, we showed you an amazing feature called Report Parts that allow
    report authors to reuse existing sections of reports, saving them hours or potentially
    days in report development time. In this chapter, you learned about some of their
    respective benefits and some of their limitations. You have probably come away
    with an answer to the question of whether the Report Builder is a tool that your
    users will want. If the answer is “Yes,” as we hope it will be, then the good
    news is that these are included as standard features.


