- fmt: '### Using the rs.exe Utility


    为了访问SSRS Web服务之一，Reporting Services为我们提供了一个名为`rs.exe`的命令行实用程序。此实用程序使用用VB .NET编写的脚本文件（这是唯一可以与`rs`实用程序一起使用的语言）来访问Web服务，并允许我们调用Web服务中任何已发布的方法。在此示例中，您将通过`rs.exe`实用程序创建文件夹、部署报告并创建新的数据源。


    您可以在本书第8章代码示例的`RS`文件夹下看到本示例使用的两个文件。您会找到一个包含报告定义的RDL文件（将用于部署）和一个包含用于部署报告及创建报告所需数据源的VB
    .NET代码的RSS文件。如果您的代码不在`C:\Pro_SSRS\CH8\RS`文件夹中，则需要进行一些配置。


    RSS文件在顶部声明了两个全局变量。这些变量保存了报告将在报告服务器上部署的位置以及您计算机上RDL文件存在的位置信息。您可以在清单8-1中看到这两个变量。您应根据您的设置对这些变量进行必要的更改。


    **清单 8-1. RSS 文件配置**


    ```vb

    Dim parentPath As String = "Pro_SSRS/Chapter 8"

    Dim reportPath As String = "C:\Pro_SSRS\CH8\RS\"

    ```


    配置好RSS文件后，我们将讨论所使用的三个Web服务方法。第一个是`CreateDataSource`。此方法在报告服务器上创建新的数据源，并接受以下五个参数：


    > *   `DataSource`: 要创建的数据源的名称

    > *   `Parent`: 数据源将在报告服务器上创建的完整路径

    > *   `Overwrite`: 一个布尔变量，用于表示是否覆盖同名的现有数据源

    > *   `Definition`: 一个`DataSourceDefinition`类型的对象，保存数据源的连接属性

    > *   `Properties`: 一个`Property[]`对象的数组，保存数据源的属性名和值


    第二个使用的Web服务方法是`CreateReport`。此方法在服务器上创建新的报告，并接受以下五个参数：


    > *   `Report`: 要创建的报告的名称

    > *   `Parent`: 报告将部署到的报告服务器上的完整路径

    > *   `Overwrite`: 一个布尔变量，用于表示是否覆盖同名的现有报告

    > *   `Definition`: 保存报告定义的字节数组

    > *   `Properties`: 一个`Property[]`对象的数组，保存报告的属性名和值


    最后一个使用的Web服务方法是`CreateFolder`。此方法在服务器上创建新文件夹，并接受以下三个参数：


    > *   `Folder`: 要创建的文件夹的名称

    > *   `Parent`: 您正在创建的文件夹的父级名称

    > *   `Properties`: 一个`Property[]`对象的数组，保存新文件夹的属性名和值


    RSS文件中的`Main`函数调用了三个内部函数：一个利用`CreateFolder`方法，一个利用`CreateDataSource`方法，另一个利用`CreateReport`方法。根据您的需要，您可以使用这三个函数创建更多的文件夹和数据源，或部署更多的报告。在此示例中，我们每个函数调用了一次，但您可以修改此文件以部署任意数量的报告或数据源。您可以在清单8-2中看到RSS文件的完整代码。


    **清单 8-2. RSS 文件内容**


    ```vb

    Dim parentPath As String = "Pro_SSRS/Chapter 8"

    Dim reportPath As String = "C:\PRO_SSRS\Chapter 8\RS\"


    Public Sub Main()


        '' Initialize the reporting services credentials

        rs.Credentials = System.Net.CredentialCache.DefaultCredentials


           '' Pass our path information to create the folder structure

           CreateFolder(parentPath, "/")


        '' Pass our data source information to the create data source function

        CreateDataSource("Pro_SSRS", "SQL", "data source=(local);initial catalog=Pro_SSRS")


        '' Pass our report name to the deploy report function

        DeployReport("EmployeeServiceCost")


    End Sub


    Public Sub CreateDataSource(name As String, extension As String, connectionString
    As String)

        '' Define the data source definition.

        Dim dataSourceDefinition As New DataSourceDefinition()


        dataSourceDefinition.CredentialRetrieval = CredentialRetrievalEnum.Integrated

        dataSourceDefinition.ConnectString = connectionString

        dataSourceDefinition.Enabled = True

        dataSourceDefinition.EnabledSpecified = True

        dataSourceDefinition.Extension = extension

        dataSourceDefinition.ImpersonateUser = False

        dataSourceDefinition.ImpersonateUserSpecified = True


        ''Use the default prompt string.

        dataSourceDefinition.Prompt = Nothing

        dataSourceDefinition.WindowsCredentials = False


        Try

            '' Create the datasource through the web service method

            rs.CreateDataSource(name, "/" + parentPath, False, dataSourceDefinition,
    Nothing)


            '' Diplay success message on creation

            Console.WriteLine("Data source {0} created successfully", name)

        Catch e As Exception

            '' If the creation failed, catch execption and display the result

            Console.WriteLine(e.Message)

        End Try


    End Sub


    Public Sub DeployReport(ByVal reportName As String)


        Dim definition As [Byte]() = Nothing

        Dim warnings As Warning() = Nothing   


        Try

            '' Attempt to open the report as a file stream to read report definition
    information

            Dim stream As FileStream = File.OpenRead(reportPath + reportName + ".rdl")

            definition = New [Byte](stream.Length) {}

            stream.Read(definition, 0, CInt(stream.Length))

            stream.Close()


            Try

               '' Attempt to deploy the reportvia the web service

               warnings = rs.CreateReport(reportName, "/" + parentPath, False, definition,
    Nothing)


               If Not (warnings Is Nothing) Then

                   Dim warning As Warning

                   For Each warning In warnings

                      Console.WriteLine(warning.Message)

                      Next warning


               Else

                   Console.WriteLine("Report: {0} published successfully with no warnings",
    reportName)

                End If


            Catch e As Exception

                    Console.WriteLine(e.Message)

            End Try


        Catch e As IOException

            Console.WriteLine(e.Message)

        End Try


    End Sub


    Public Sub CreateFolder(ByVal folderName as String, ByVal ParentFolder as String)

           Dim extraName As String

           Dim newFolder As String


           if( folderName.IndexOf("/") <> -1 )

                  newFolder = folderName.Substring(0, folderName.IndexOf("/"))

                  extraName = folderName.Substring(folderName.IndexOf("/")+1)

           else

                  newFolder = folderName

                  extraName = ""

           end if


           Dim props(0) As [Property]

           Dim folderProp As new [Property]()


           folderProp.Name = "Folder Name"

           folderProp.Value  = newFolder


           props(0) = folderProp


        rs.CreateFolder(newFolder, parentFolder, props)

           Console.WriteLine("Folder " + newFolder + " created")


           if( extraName <> "" and parentFolder = "/")

                  CreateFolder(extraName, parentFolder + newFolder)

           else if(extraName <> "")

                  CreateFolder(extraName, parentFolder + "/" + newFolder)

           end if

    End Sub

    ```'
  raw: '### Using the rs.exe Utility


    In order to access one of the SSRS Web services, Reporting Services gives us a
    command-line utility called rs.exe. This utility uses script files written in
    VB .NET, the only language you can use with the rs utility, to access the Web
    service and allows us to call any of the published methods in the web service.
    In this example, you will create folders, deploy a report, and create a new data
    source through the rs.exe utility.


    You can see the two files used in this example under the RS folder in the code
    examples for [Chapter 8](#Chapter08.html#ch8). You will find an RDL file containing
    our report definition that you will deploy and an RSS file containing the VB .NET
    code used to deploy the report and create the data source needed for the report.
    If you do not have your code in the folder C:\Pro_SSRS\CH8\RS, some configuration
    will be needed.


    The RSS file has two global variables declared at the top of the file. These hold
    the information of where the report will be deployed on the report server and
    where the RDL files exist on your computer. You can see these two variables in
    [Listing 8-1](#Chapter08.html#list_8_1). You should make any necessary changes
    to these variables based on your setup.


    ***Listing 8-1.** RSS File Configuration*


    `Dim parentPath As String = "Pro_SSRS/Chapter 8"`

    `Dim reportPath As String = "C:\Pro_SSRS\CH8\RS\"`


    Now that you have the RSS file configured, we will discuss the three Web service
    methods that are used. The first is CreateDataSource. This method creates a new
    data source on the report server and takes the following five arguments:


    > *   DataSource: The name of the data source to be created

    > *   Parent: The full path on the report server where the data source will be
    created

    > *   Overwrite: A Boolean variable used to express whether to overwrite an existing
    data source of the same name

    > *   Definition: An object of the type DataSourceDefinition that holds the connection
    properties of the data source

    > *   Properties: An array of Property[ ] objects that hold property names and
    values for the data source


    The second Web service method used is CreateReport. This method creates a new
    report on the server and takes the following five parameters:


    > *   Report: The name of the report to be created

    > *   Parent: The full path on the report server where the report will be deployed

    > *   Overwrite: A Boolean variable to express whether to overwrite an existing
    report of the same name

    > *   Definition: A Byte array holding the report definition

    > *   Properties: An array of Property[ ] objects that hold property names and
    values for the report


    The last Web service method used is CreateFolder. This method creates a new folder
    on the server and takes the following three parameters:


    > *   Folder: The name of the folder to be created

    > *   Parent: The parent name of the folder that you are creating

    > *   Properties: An array of Property[] objects that hold property names and
    values for the new folder


    The main function in the RSS file is calling three internal functions, one that
    utilizes the CreateFolder method, one that utilizes the CreateDataSource method,
    and one that utilizes the CreateReport method. You can use these three functions
    to create more folders and data sources or deploy more reports depending on your
    needs. In this example, we call all three functions once, but you can modify this
    file to deploy any number of reports or data sources that you need. You can see
    the full code for the RSS file in [Listing 8-2](#Chapter08.html#list_8_2).


    ***Listing 8-2.** RSS File Contents*


    `Dim parentPath As String = "Pro_SSRS/Chapter 8"`

    `Dim reportPath As String = "C:\PRO_SSRS\Chapter 8\RS\"`


    `Public Sub Main()`


    `    '' Initialize the reporting services credentials`

    `    rs.Credentials = System.Net.CredentialCache.DefaultCredentials`


    `       '' Pass our path information to create the folder structure`

    `       CreateFolder(parentPath, "/")`


    `    '' Pass our data source information to the create data source function`

    `    CreateDataSource("Pro_SSRS", "SQL", "data source=(local);initial catalog=Pro_SSRS")`


    `    '' Pass our report name to the deploy report function`

    `    DeployReport("EmployeeServiceCost")`


    `End Sub`


    `Public Sub CreateDataSource(name As String, extension As String, connectionString
    As String)`

    `    '' Define the data source definition.`

    `    Dim dataSourceDefinition As New DataSourceDefinition()`


    `    dataSourceDefinition.CredentialRetrieval = CredentialRetrievalEnum.Integrated`

    `    dataSourceDefinition.ConnectString = connectionString`

    `    dataSourceDefinition.Enabled = True`

    `    dataSourceDefinition.EnabledSpecified = True`

    `    dataSourceDefinition.Extension = extension`

    `    dataSourceDefinition.ImpersonateUser = False`

    `    dataSourceDefinition.ImpersonateUserSpecified = True`


    `    ''Use the default prompt string.`

    `    dataSourceDefinition.Prompt = Nothing`

    `    dataSourceDefinition.WindowsCredentials = False`


    `    Try`

    `        '' Create the datasource through the web service method`

    `        rs.CreateDataSource(name, "/" + parentPath, False, dataSourceDefinition,
    Nothing)`


    `        '' Diplay success message on creation`

    `        Console.WriteLine("Data source {0} created successfully", name)`

    `    Catch e As Exception`

    `        '' If the creation failed, catch execption and display the result`

    `        Console.WriteLine(e.Message)`

    `    End Try`


    `End Sub`


    `Public Sub DeployReport(ByVal reportName As String)`


    `    Dim definition As [Byte]() = Nothing`

    `    Dim warnings As Warning() = Nothing    `


    `    Try`

    `        '' Attempt to open the report as a file stream to read report definition
    information`

    `        Dim stream As FileStream = File.OpenRead(reportPath + reportName + ".rdl")`

    `        definition = New [Byte](stream.Length) {}`

    `        stream.Read(definition, 0, CInt(stream.Length))`

    `        stream.Close()`


    `        Try`

    `           '' Attempt to deploy the reportvia the web service`

    `           warnings = rs.CreateReport(reportName, "/" + parentPath, False, definition,`

    `Nothing)`


    `           If Not (warnings Is Nothing) Then`

    `               Dim warning As Warning`

    `               For Each warning In warnings`

    `                  Console.WriteLine(warning.Message)`

    `                  Next warning`


    `           Else`

    `               Console.WriteLine("Report: {0} published successfully with no
    warnings",`

    `reportName)`

    `            End If`


    `        Catch e As Exception`

    `                Console.WriteLine(e.Message)`

    `        End Try`


    `    Catch e As IOException`

    `        Console.WriteLine(e.Message)`

    `    End Try`


    `End Sub`


    `Public Sub CreateFolder(ByVal folderName as String, ByVal ParentFolder as String)`

    `       Dim extraName As String`

    `       Dim newFolder As String`


    `       if( folderName.IndexOf("/") <> -1 )`

    `              newFolder = folderName.Substring(0, folderName.IndexOf("/"))`

    `              extraName = folderName.Substring(folderName.IndexOf("/")+1)`

    `       else`

    `              newFolder = folderName`

    `              extraName = ""`

