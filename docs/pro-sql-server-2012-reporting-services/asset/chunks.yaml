  trans: '

    ## 配置 Reporting Services 与 SharePoint 的集成


    既然您已完成所有必需的安装步骤，现在就开始最终的配置过程吧。您知道 `SSRS` 已配置为 SharePoint 集成模式。现在需要做的就是配置 SharePoint，以激活
    `Reporting Services 集成` 和 `管理功能`。


    既然我们正在使用 `SharePoint 2010` 和 `SQL Server 2012` 处于 SharePoint 集成模式下，`ReportServer`
    数据库完全由 SharePoint 管理。SharePoint 将为所有安全性、报表和数据源提供存储。SharePoint 的所有优势，例如文档发布和传递，都将由
    SharePoint 维护。


    SharePoint 的主要管理网站称为 `管理中心`，您将在那里执行剩余的 `SSRS` 配置设置。请执行以下配置步骤：


    1.  通过单击 `开始`、`所有程序`、`Microsoft SharePoint 2010 产品`，然后单击 `SharePoint 2010 管理中心`，打开
    `管理中心` 网站。

    2.  单击 `网站操作`，然后单击 `网站设置`。当 `网站设置` 屏幕出现时，在 `网站集管理` 下单击 `网站集功能` 链接。在那里我们需要确保 `Reporting
    Services` 功能已激活。

    3.  如 `图 12-23` 所示，在 `报表服务器管理中心` 和 `报表服务器集成` 功能旁边单击 `激活`。


    ![Image](img/9781430238102_Fig12-23.jpg)

    `图 12-23.` 激活网站集功能


    就是这样！您已完成 `SharePoint 2010` 和 `SQL Server 2012 Reporting Services` 在 SharePoint
    模式下的安装和配置。不过，在我们继续之前，我想向您展示如何进入管理 `Reporting Services` 配置设置的屏幕。如果您仍然开着 `管理中心`，请单击
    `应用程序管理`。接下来，在 `服务应用程序` 组下，单击 `管理服务应用程序`。您应该能认出打开的屏幕，因为它与上面 `图 12-22` 中显示的相同。深入您的
    `Reporting Services` 服务应用程序，就像我在 `图 12-24` 中所做的那样。请记住，我的是 `Professional SSRS 2012
    Service Application`。


    ![Image](img/square.jpg) **注意** 不同的环境可能需要不同的部署情况和策略。如果您需要进一步帮助将 `SSRS 2012` 和
    SharePoint 完全集成，`Microsoft.com` 上有一些很好的资源。其中一个用于配置 `SSRS 2012` 和 `SharePoint 2010`
    的资源可以在 [`http://msdn.microsoft.com/en-us/library/gg492276(v=sql.110).aspx`](http://msdn.microsoft.com/en-us/library/gg492276(v=sql.110).aspx)
    找到。


    ![Image](img/9781430238102_Fig12-24.jpg)

    `图 12-24.` 管理 Reporting Services 服务系统设置


    接下来，单击 `系统设置` 链接以查看 `Reporting Services` 服务设置。如您在 `图 12-25` 中所见，您可以在这里更改各种选项，例如报表历史记录、超时，甚至保存
    `执行日志` 的时长，就像我们在 `第 10 章` 中所做的那样。


    ![Image](img/9781430238102_Fig12-25.jpg)

    `图 12-25.` 设置 Reporting Services 服务应用程序服务器默认值


    既然您已完成所有设置和配置，是时候继续前进，并向您展示如何将报表部署到 SharePoint 站点了。


    ### 在 SharePoint 集成的 SSRS 安装中部署报表


    一旦完成了三项管理任务，就可以开始在 SharePoint 站点本身内工作了，您将在其中使用已部署的报表和仪表板，为您的用户创建一个门户页面。就我们组织的案例而言，我们想要一个简单的
    `招生` 仪表板页面，公司高管和决策者可以在其中简明扼要地审阅重要的 `BI` 报表。SharePoint 提供了许多模板和示例，您可以用来帮助设计仪表板。


    让我们看一个默认的 SharePoint 页面。您可以在 `图 12-26` 中看到，基础 SharePoint 站点集安装包括一个 `文档中心`。为了集中我们的部署位置，我们创建了一个
    `报表库`。我们还在 SharePoint 系统上使用内置的 SharePoint 模板 `商业智能中心` 创建了另一个站点，这将允许我们使用 Web 部件创建一个示例仪表板。


    ![Image](img/9781430238102_Fig12-26.jpg)

    `图 12-26.` SharePoint 文档中心主页


    `图 12-27` 显示了 `SharePoint 2010` 的 `商业智能中心`。名称 `商业智能中心` 不应让您认为所有 `SSRS` 报表都将部署在这里。`SSRS`
    报表可以部署到任何有效的 SharePoint 路径，您稍后会看到。`商业智能中心` 是一个可以创建仪表板或 `Microsoft Excel` 工作簿的位置，也是一个可以部署报表的区域。是在
    `文档中心` 内的 `报表库` 中，可以存储 `SSRS` `RDL` 文件、数据源和许多其他类型的报表。


    ![Image](img/9781430238102_Fig12-27.jpg)

    `图 12-27.` SharePoint 商业智能中心


    正如我所提到的，`RDL` 报表可以部署到 SharePoint 中任何有效的文档库。在 `图 12-28` 中，您可以看到您的 `Pro_SSRS` 报表项目的项目属性。由于您将把这些报表部署到
    SharePoint 服务器，服务器和报表文件夹的目标 URL 将与本机 `SSRS` 部署不同。您可以看到服务器将是主 SharePoint 站点的 URL，在我们的例子中是
    [`http://localhost/`](http://localhost/)。目标报表文件夹是一个指向有效 SharePoint 文档库的 URL；在本例中，[`http://localhost/sites/Pro_SSRS/Reports`](http://localhost/sites/Pro_SSRS/Reports)，它指向我们
    `文档中心` 中的 `报表库`。


    ![Image](img/9781430238102_Fig12-28.jpg)

    `图 12-28.` 报表项目的目标 URL 属性


    在对报表项目的目标 URL 进行这些更改之后，您可以直接将报表部署到 SharePoint。右键单击 `PatRef_DS` 共享数据源并选择 `部署`。为了将报表部署到
    SharePoint 站点，您必须首先部署数据源。在 `PatRef_DS` 数据源部署后，在 `解决方案资源管理器` 中右键单击 `Average Referral
    to Admission` 报表，然后选择 `部署`。或者，您可以通过按住 `Ctrl` 键选择数据源和报表，然后右键单击并选择 `部署`。这将首先部署数据源，然后部署报表。一旦报表成功部署，您将能够在
    SharePoint 站点中看到该报表。将报表部署到 SharePoint 最好的部分是，如 `图 12-29` 所示，您可以利用所有 SharePoint
    文档功能，因为 `RDL` 文件也被视为文档。诸如工作流、警报以及文档签入和签出之类的功能都会被继承。


    ![Image](img/9781430238102_Fig12-29.jpg)

    `图 12-29.` 已部署的报表及 SharePoint 文档功能

    '
- fmt: '# Chapter 12: Integrating SSRS with SharePoint


    Before running the report, let’s change the `PatRef_DS` data source to use Stored
    Credentials, like we did in [Chapter 10](#Chapter10.html) when configuring the
    data source for Subscriptions. We do this because the permissions between `SharePoint`
    and the data source may be different than Windows Authentication. If you are having
    permission-related issues when running a report, this is the first place that
    I would troubleshoot. Navigate to your deployed data source in `SharePoint` and
    alter your data source by clicking on the `PatRef_DS` link, or clicking the down
    arrow and selecting **Edit Data Source Definition**. Select the option to use
    Stored Credentials under the Credentials section. Enter a valid username and credentials
    as shown in [Figure 12-30](#Chapter12.html#fig_12_30). If you are using Windows
    Credentials, be sure to select the option to **Use as Windows Credentials**. Click
    the **Test Connection** to make sure that you entered valid credentials. If the
    connection is created successfully, then click **OK** to save your settings.


    ![Image](images/9781430238102_Fig12-30.jpg)


    `Figure 12-30. Editing data source definition`


    Next, click the report **Average Referral to Admissions**. This will open the
    report in its own page and execute it, much the same way it would be executed
    via Report Manager. [Figure 12-31](#Chapter12.html#fig_12_31) shows the report
    rendered in `SharePoint`.


    ![Image](images/9781430238102_Fig12-31.jpg)


    `Figure 12-31. Report rendered in SharePoint`


    You will follow the same deployment steps in `BIDS` that you did for the **Average
    Referral to Admissions** report to deploy the **Referral to Admissions Chart**
    report. The processes will be the same, and when complete, you will see the report
    in the `SharePoint` web site. Navigate to the report and click it to execute the
    report. With this report rendered, click on the **Actions** link button in the
    top left of the report as shown in [Figure 12-32](#Chapter12.html#fig_12_32).
    You may have noticed these actions earlier; but notice the additional actions
    in the report toolbar, such as **Subscribe**, **Open with Report Builder**, and
    **Export**. Each of these actions are pretty self explanatory, it is important
    to realize here that since we are in `SharePoint` integrated mode, we still have
    the ability to take advantage of features such as subscriptions and ad-hoc report
    building. We will cover the `Report Builder` applications in the next chapter.


    ![Image](images/9781430238102_Fig12-32.jpg)


    `Figure 12-32. Actions available for a report rendered in SharePoint`


    ## Creating a Simple Dashboard to Display SSRS Reports


    Now that you have successfully deployed and rendered reports in `SharePoint` and
    have seen many of the attributes and actions available, I’ll show you how to create
    a dashboard that can render the reports in a concise Web Part. The `SQL Server
    2012 Reporting Services Add-In` that you installed previously included the `SQL
    Server Reporting Services Report Viewer Web Part`. Creating a dashboard is as
    simple as clicking the **Dashboards** link in the web site and then selecting
    the **New Page** option under the **Site Actions** link button. You will provide
    a name for the new dashboard link and the initial layout based on a template.
    For example, I chose to name the dashboard **Admissions**. Once the dashboard
    is created, you can navigate to it and edit its design directly in the browser.
    Click **Web Part** on the **Insert** tab while in edit mode and select the `SQL
    Server Reporting Services Report Viewer` from the list of available Web Parts,
    as shown in [Figure 12-33](#Chapter12.html#fig_12_33). You will find it in the
    `SQL Server Reporting` category. After you have it selected, click the **Add**
    button.


    ![Image](images/9781430238102_Fig12-33.jpg)


    `Figure 12-33. Choosing the SQL Server Reporting Services Report Viewer Web Part
    in SharePoint`


    Once you add the Web Part to the **Admissions** dashboard, you will have the ability
    to edit it to point to a URL where the deployed reports reside. You can click
    the link to open the tool pane where the report URL will be entered. This links
    the Web Part directly to the report. You can see the Web Part and the report selection
    toolbar on the right. In this case, you will select the **Referral to Admissions
    Chart** report, which you can see in [Figure 12-34](#Chapter12.html#fig_12_34).
    Click **Apply** to save the Web Part and render the report.


    ![Image](images/9781430238102_Fig12-34.jpg)


    `Figure 12-34. Selecting a report URL for the Web Part`


    Finally, you can view the rendered report in the Web Part that is contained within
    your dashboard. If you are not happy with the layout—there is too much white space,
    for example—you can resize the Web Part by navigating back to the Web Part toolbar
    and entering your desired size settings. [Figure 12-35](#Chapter12.html#fig_12_35)
    shows the newly deployed **Referral to Admissions Chart** report rendered in the
    Web Part. This basic report can be combined with other `SharePoint` dashboard
    Web Parts, like the `KPI` and `Excel Web Access Web Parts`, to create an appealing
    and informative portal for your organization.


    ![Image](images/9781430238102_Fig12-35.jpg)


    `Figure 12-35. Report rendered in Web Part dashboard`


    ## Creating Data Alerts


    `SQL Server Reporting Services 2012` in `SharePoint` Integrated mode cannot be
    complete without discussing data alerting. This great new feature gives you the
    ability to receive alerts when the data contained in a report is changed or when
    it meets certain pre-defined criteria. The pre-defined criteria are specified
    when creating a rule within the **New Data Alert** window. Follow these steps
    to create a new data alert:


    1. If you still have the **Referral to Admission Chart** report open, click on
    the **Actions** button. If not, run the **Referral to Admission Chart** report
    as shown in [Figure 12-36](#Chapter12.html#fig_12_36).


    ![Image](images/9781430238102_Fig12-36.jpg)


    `Figure 12-36. Creating a data alert`


    2. On the **New Data Alert** screen, configure the data alert by giving the alert
    a name. In this case, name it `DA_Referral to Admission Chart_GT_8.9` as shown
    in [Figure 12-37](#Chapter12.html#fig_12_37).

    3. Next, click the **Add rule…** button to create a rule that states when the
    value of the **Category Group1** is greater than `8.9`. This will cause the `SQL
    Server Agent` to send out an alert when the value is over `8.9`.

    4. Set the schedule to run once a day. The scheduler is much like the one provided
    by Report Manager.

    5. Enter the recipient to be alerted when the value reaches the desired threshold,
    the subject, and any description if desired.

    6. Click the **Save** button to have `SharePoint` create the alert.


    ![Image](images/9781430238102_Fig12-37.jpg)


    `Figure 12-37. Configuring a data alert`


    Now, if the `8.9` threshold value is ever exceeded, you will be sent an email
    notification that the threshold has been met.


    ## Summary


    In this chapter, I showed you how to incorporate `SSRS` into a BI model, using
    the business model of a health-care agency deploying a custom BI portal. Understanding
    how to transform and analyze the data that drives your business will help you
    make important business decisions. Delivering that data to decision makers is
    a pivotal link in the BI chain. With `SSRS`, Microsoft has provided organizations
    with another tool that can easily tap into and extend the reach of crucial data.
    `SSRS` utilizes many types of data and can deliver that data in a variety of formats
    and mechanisms. Working with other applications and products in the Microsoft
    BI platform—such as `SharePoint`, `Analysis Services`, and `Office`—`SSRS` will
    prove to be an invaluable BI tool now and in the future.


