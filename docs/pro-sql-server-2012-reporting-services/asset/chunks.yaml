- fmt: '# Incorporating SSRS with Microsoft SharePoint 2010


    SSRS and SharePoint technologies have progressed and matured similarly. Both have
    enjoyed growing acceptance and support from businesses around the world. It was
    a natural progression, therefore, for the two technologies to one day come together
    to form components of the overall Business Intelligence platform that Microsoft
    has built over the past several years. Previous support for SSRS in SharePoint
    included SSRS Web Parts, which could be installed for SharePoint installations.
    These Web Parts provided a means to view published SSRS reports within SharePoint.
    However, this union was not as adhesive as many administrators and dashboard designers
    needed it to be. Management of reports still fell to the likes of DBAs or report
    content managers. `SQL Server 2005 Service Pack 2` included support for a fully
    integrated SSRS and SharePoint infrastructure, whereby reports could be published,
    managed, and viewed all within SharePoint. `SSRS 2008` and `2008 R2` continued
    this merger, and many organizations have adopted this methodology over a native-only
    SSRS that does not integrate directly with SharePoint.


    This brings us to `SharePoint 2010` and `SQL Server 2012 Reporting Services`.
    Although similar to previous versions in integrating Reporting Services with SharePoint,
    the installation and configuration process is very much different. In the latest
    release of Reporting Services, if you wish to run in `SharePoint integrated mode`,
    you will need to install SharePoint and then install Reporting Services in SharePoint
    integrated mode. This process essentially installs Reporting Services on top of
    `SharePoint 2010`. This process differs from prior editions, in that SSRS and
    SharePoint were separate entities and could be integrated using a configuration
    tool.


    In this section, you will walk through a SharePoint and SSRS stand-alone installation
    and deploy to and view on the SharePoint site the two reports from the previous
    section, `Average Time to Admission` and `Referral to Admission Chart`:


    1.  First, you will install `Microsoft SharePoint 2010` with `Service Pack 1`
    and `SSRS 2012` on the same server.

    2.  Next, you will deploy reports to the SSRS-integrated server with `SharePoint
    2010`.

    3.  Finally, you will create a simple dashboard using `SSRS Web Parts`.


    ## Installing SharePoint 2010 and SQL Server 2012 on a Stand-Alone Server


    The installation routines for `SQL Server 2012` have been greatly enhanced over
    the years. Specifically, with SSRS, you maintain the ability to install the core
    assemblies, but configure the SSRS instance later. However, in `SSRS 2012`, you
    can install SSRS in SharePoint integrated mode directly if you have planned to
    roll out SSRS and SharePoint together. For our installation, we chose to install
    both `SSRS 2012` and `SharePoint 2010` on the same server, known as a stand-alone
    installation. This is the recommended setup for anyone who wants to familiarize
    themselves with how the two technologies work together. Other deployment scenarios,
    such as multiple-server installations, are also possible and expected in larger
    environments, but we chose the stand-alone deployment initially solely for the
    sake of testing and training. We would recommend this path for anyone not already
    familiar with an integrated SSRS and SharePoint installation.


    ![Image](images/square.jpg) **Note** As with the majority of server-based software,
    `SharePoint 2010` and `SQL Server 2012` have prerequisites that must be met before
    a successful installation occurs. These requirements can change over time, so
    it is always best to verify the prerequisites before setting out to install the
    software. For example, `SharePoint 2010` needs to be installed on a server-based
    operating system like `Windows Server 2008`. It also requires `Service Pack 1`
    to be installed and a minimum of `4GB` of ram and `80 GB` of disk space. The server
    must be configured as a Domain Controller. Those are just a few of the requirements,
    but you can see more SharePoint requirements at [`http://technet.microsoft.com/en-us/library/cc262485.aspx`](http://technet.microsoft.com/en-us/library/cc262485.aspx)
    and SQL Server Reporting Services requirements at [`http://msdn.microsoft.com/en-us/library/gg492276(v=sql.110).aspx`](http://msdn.microsoft.com/en-us/library/gg492276(v=sql.110).aspx).


    Assuming that all of the prerequisites, software and hardware requirements have
    been met then there are six major steps to complete a stand-alone installation
    of SSRS and SharePoint:


    1.  Install `SharePoint 2010` with `Service Pack 1`.

    2.  Install `SQL Server 2012` Database Engine and Reporting Services in SharePoint
    mode.

    3.  Configure `SharePoint 2010`.

    4.  Install and start the `Reporting Services SharePoint Service`.

    5.  Create a `Reporting Services Service Application` in `SharePoint Central Administration`.

    6.  Configure `Reporting Services Integration` with SharePoint.


    ### Installing SharePoint 2010


    We will start by walking you through the installation of `SharePoint 2010` with
    `Service Pack 1`. Installing `SharePoint 2010` is a straightforward process, with
    the exception of the final step, where the installation wizard asks you if you
    want to `Run Configuration Wizard` ([Figure 12-12](#Chapter12.html#fig_12_12)).
    This option button is selected by default, but in the case of Reporting Services
    in SharePoint integrated mode, you will configure it later. You’ll configure SharePoint
    after you have installed an instance of the `SQL Server 2012` database engine.
    Remove the check from the checkbox and click `Close` to complete the `SharePoint
    2010` installation.


    ![Image](images/9781430238102_Fig12-12.jpg)


    ***Figure 12-12.** Installing `SharePoint 2010`*


    ### Installing SQL Server 2012 Reporting Services in SharePoint Mode


    Now that `SharePoint 2010` is installed, it is time to install the Database Engine
    and Reporting Services for SharePoint. The `SQL Server 2012` installation with
    SSRS is a standard procedure that you may already be familiar with. Going through
    each step of the installation is outside of the scope of this book; however, the
    only difference between a typical install and one that includes support for integrated
    SharePoint can be seen on the `Feature Selection` and the `Reporting Services
    Configuration` screens. Go ahead and choose the options shown in [Figure 12-13](#Chapter12.html#fig_12_13).


    Since this is being done on a local VM, not on a traditional corporate network,
    I chose to install `Analysis Services` on this VM as well. That way, I can copy
    the `Pro_SSRS` project and deploy the `Patient Referral Analysis Services` database
    (the cube) to the same VM for the remaining examples in this chapter.


    ![Image](images/square.jpg) **Note** If you are also performing the `SharePoint
    2010` installation on a dedicated VM, you also will need to copy your `Pro_SSRS`
    project to the VM and deploy the cube as discussed previously in this chapter.


    ![Image](images/9781430238102_Fig12-13.jpg)


    ***Figure 12-13.** Installing SSRS for SharePoint*


    As shown in [Figure 12-14](#Chapter12.html#fig_12_14), the only option that you
    have is `Reporting Services SharePoint Integrated Mode – Install Only`. In the
    note under the `Install Only` radio button, you can see a message stating that
    you will need to configure SharePoint using `Central Administration` to complete
    the installation. It also states that you’ll need to get the `Reporting Services`
    service started and create a `Reporting Services` service application (installation
    steps 4 and 5 in the previous list). Now, you will install the `Reporting Services
    SharePoint Service`.


    ![Image](images/9781430238102_Fig12-14.jpg)


    ***Figure 12-14.** Installing SSRS in SharePoint Integrated Mode*'
