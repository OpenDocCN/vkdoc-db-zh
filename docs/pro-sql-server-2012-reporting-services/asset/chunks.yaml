- fmt: '### Designing the Log Report


    We knew we would need another report that contained all the execution log information
    and was easy for administrators to analyze. Thus, we created a matrix-style report,
    called Report Execution Log, using data from a single query.


    To measure performance from information contained in the execution log, you need
    several statistics:


    > *   Total time to retrieve the data: How long did it take to retrieve data?

    > *   Total time to process: How long did the report take to process?

    > *   Total time to render: How long did the report take to render?

    > *   Byte count: How many bytes are in the report?

    > *   Row count: How many rows of data are in the report?


    In addition, knowing when the report was executed is also useful. For the row
    groupings in the matrix, we want to see what report was executed, who ran the
    report, and from which client machine the report was run. For the column group,
    we want to have two possible selections: rendering format, such as HTML 4.0, Word
    or PDF, or source types, meaning how SSRS generated the report (live, cache, or
    snapshot, for example). `Source_Type` is an important field to monitor because
    how SSRS generates reports directly impacts performance. Generating reports from
    a cached copy or a snapshot, which are both pre-processed copies of reports, is
    a performance benefit. If SSRS is always generating live or on-demand reports
    for users, performance may suffer.


    To accomplish the dynamic column groupings in the matrix, you’ll use a parameter
    called `Column_Group` that takes the values of the field names in the query, `Format`
    or `Source_Type`. You’ll use a default value of `Format` so that the report is
    automatically rendered when previewed. Both the column grouping and heading values
    will use the following expression to make the column dynamic based on the parameter:


    ```

    =Fields(Parameter!Column_Group.Value).Value

    ```


    When the report is rendered, as you can see in [Figure 10-27](#Chapter10.html#fig_10_27),
    it will default to the `Format` field, but you can change it dynamically by changing
    the parameter drop-down selection to `Source_Type`.


    ![Image](images/9781430238102_Fig10-27.jpg)


    **Figure 10-27.** Report Execution Log report


    ### Monitoring Performance


    Of course, no one wants to experience the frustration of building a solid reporting
    solution in a development environment only to find out that, when deployed to
    the masses, it can’t hold up under the strain. Generally, it’s a best practice
    to put a simulated load on your servers to gain a better understanding of how
    the systems will function. As well, when you roll out a full solution, it’s a
    common practice to roll out several pieces at a time to a limited number of users.
    That is what we’ve done in our online models.


    The strategy for rolling out should also include a plan for which reports will
    be available on-demand versus which ones will be provided via report snapshots
    or subscriptions, as you’ve done up to this point in the chapter. Combining a
    strategy of peak and off-peak report processing will greatly improve performance.
    Another consideration for performance with SSRS lies in splitting the load of
    SSRS Web services and database services. That is, if the entire SSRS installation
    resides on the same system, this could negatively impact performance.


    In this section, we’ll show the results of a stress test that we ran accessing
    two report server instances on two separate servers, `RS05` and `HWC04`. Many
    tools, such as SSRS, are available for stress testing Web applications; fortunately,
    the Ultimate edition of Visual Studio 2010 has a Web stress-test tool built in
    that we used to perform a simulated load on the two servers with up to 250 virtual
    users out of the box. You can find out more about the web test tool at [`www.microsoft.com/visualstudio`](http://www.microsoft.com/visualstudio).


    We’ll also show you how to use `rsconfig` to join an SSRS server to a Web farm
    to see how offloading resources to another system will enhance performance. The
    Reporting Services Configuration Manager can also be used for this purpose.


    We began by running a simulated load of 15 users, all executing a single report
    against `RS05`. We quickly assessed the performance impact by monitoring the server
    with Task Manager. Fortunately, when running the simulated load against our Reporting
    Services server, it didn’t take that high of a performance hit. However, in some
    instances you may get results that max out the CPU. In those instances, you are
    likely to find that the individual processes that are taxing the processor are
    SQL Server and the `ReportingServicesService.exe`. [Figure 10-28](#Chapter10.html#fig_10_28)
    shows spikes of our CPU usage jumping between 25 and 85 percent as the test was
    running.


    We knew our test SSRS server was a four processor system with more than 3GB of
    RAM. In the case where your CPU usage is getting maxed out, this tells us that
    it is the CPU that is the bottleneck. Because our production deployment of SSRS
    would not mirror the setup of `RS05` (in other words, the production server would
    be a high-end system with at least 32GB of RAM), we could take that into consideration.


    However, one other factor would have a substantial impact on the difference in
    performance between the production and test environments. In the test environment,
    the SSRS service and SQL Server were on the same system, `RS05`. What if we configured
    the SSRS service to use a remote SQL Server instance for its database? Any performance
    degradation caused by accessing the `ReportServer` database over the network instead
    of a local database would be negligible if the CPU utilization percentage dropped
    down to a more manageable number.


    ![Image](images/9781430238102_Fig10-28.jpg)


    **Figure 10-28.** Task Manager


    If you have two SSRS servers, then moving an SSRS server from one instance to
    another is simple. We had two SSRS servers in the test environment, `RS05` and
    `HWC04`, so the move was easy enough. To instruct the SSRS service on `RS05` to
    use the SSRS databases on `HWC04`, we used the command-line utility `rsconfig`.
    The `rsconfig` command or Reporting Services Configuration Manager is required
    when first joining one SSRS Web service to a Web farm that uses the same `ReportServer`
    database. The syntax for the `rsconfig` command is as follows:


    ```

    rsconfig -c -s HWC04 -d ReportServer -a SQL -u username -p password

    ```


    With `RS05` using the remote SQL Server database, we initiated another test to
    see whether the CPU utilization improved. The CPU utilization improved substantially
    and was now under the 60 percent average.


    ![Image](images/square.jpg) **Note** Specific licensing guidelines are available
    for the SSRS 2012 deployment and the location of the databases and data sources.
    For more information, visit [`www.microsoft.com/sqlserver/en/us/get-sql-server/licensing.aspx`](http://www.microsoft.com/sqlserver/en/us/get-sql-server/licensing.aspx).'
