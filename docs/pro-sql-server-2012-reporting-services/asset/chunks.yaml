  trans: '

    安装完 Report Builder 1.0 后，它会自动启动。设计报表的第一步是选择数据源，如 图 13-22 所示。数据源将是一个报表模型，在本例中是你已发布的
    `Patient Census` 报表模型。因此，选中它并单击“确定”继续。


    ![Image](img/9781430238102_Fig13-22.jpg)


    **图 13-22.** 选择报表模型


    乍一看，很容易发现 `Report Builder 1.0` 在外观和感觉上类似于 Office 2007 套件中的其他 Microsoft 设计产品，例如
    `FrontPage`。你会看到一个简单的设计区域、一个 `报表数据`区域，以及一个包含可用于每个报表的模板的 `报表布局`区域。三个可用模板是 `SSRS`
    报表中可用数据区域的熟悉版本：`表格`、`矩阵` 和 `图表`。每个模板都有预定义的区域，例如标题、总计列和筛选器描述列，如 图 13-23 中的表格报表所示。你还可以在左侧的
    `报表数据` 选项卡中看到 `Patient Census` 报表模型的字段。


    ![Image](img/9781430238102_Fig13-23.jpg)


    **图 13-23.** Report Builder 1.0 中的表格报表模板


    ### 创建表格报表


    为了满足用户反馈中收到的许多报表请求，你可以使用表格报表。需要注意的一点，可能属于 `Report Builder 1.0` 的一个限制是，每个报表只能使用一个数据区域。换句话说，与
    `BIDS` 的完整 IDE 不同，使用 `Report Builder 1.0` 构建报表的用户每个报表仅限于一个 `表格`、`矩阵` 或 `图表` 数据区域。你无法添加第二个数据区域。实际上，报表不仅限于单个数据区域，而且被限制为使用为每个模板定义的控件。例如，无法添加文本框或除字段数据之外的任何其他类型的设计元素。


    你将在此限制下制作你的第一份报表，即 *患者信息概览表*（通常如此称呼），它显示每位患者的人口统计信息。在表格报表仍打开的情况下，你将把几个字段拖到表格上显示
    `拖放列字段` 的位置，使报表看起来像 图 13-24。接下来，按住键盘上的 `CTRL` 键，同时选择 `Pat ID`、`Pat First Name`、`Pat
    Last Name`、`Diagnosis`、`Start Of Care`、`Address 1`、`City`、`State` 和 `Zip`。全部选中后，将它们拖到报表表格中
    `Pat ID` 的右侧。通过像我们这里这样按住 `CTRL` 键，我们创建了一个 `Patient Census` 列名组。此时，你还可以在 `单击添加标题`
    文本框中添加一个标题。将标题更改为 `患者信息概览表` 并将其设为粗体。另请注意，当添加字段时，例如 `Pat Last Name`，它们会在左侧的 `字段`
    选项卡中显示为粗体，表示它们已被使用。


    ![Image](img/9781430238102_Fig13-24.jpg)


    **图 13-24.** 包含患者信息的表格报表


    将所有字段添加到报表后，你可以单击 `运行报表` 来预览报表；但是，此时必须执行一些任务以使报表适应打印页面。在其默认页面设置中，报表设置为 `纵向`；但是，你添加的字段横向延伸超过了
    8.5 英寸。要解决此问题，请在设计区域中右键单击，然后选择 `页面设置`，此时会出现 `页面设置` 对话框，如 图 13-25 所示。将 `方向` 属性设置为
    `横向`，然后将所有 `页边距` 设置为 0，再单击“确定”。


    ![Image](img/9781430238102_Fig13-25.jpg)


    **图 13-25.** 设置页面方向


    为了腾出更多空间，你可以使用公式组合患者的姓氏和名字。为此，只需右键单击 `Pat First Name` 数据单元格，然后选择 `编辑公式`。这将打开 `定义公式`
    窗口。`Report Builder 1.0` 中的公式类似于 `BIDS` 中的表达式。在这里，你可以组合报表字段和内置函数以生成所需的值。图 13-26
    显示了 `定义公式` 对话框，其中列出了几个可用函数。请注意用于连接 `Pat First Name` 和 `Pat Last Name` 字段的公式，它使用报表数据字段和一个与号
    (`&`) 添加一个逗号字符字面量来分隔姓名。你还可以使用 `RTRIM` 函数删除尾随空格。你本可以在报表模型中完成大部分这项工作，这很可能也是应该做的。然而，我们让你保留姓名以这种方式，是为了现在演示一个简单公式的使用。


    ```

    Pat First Name + '', '' + RTRIM(Pat Last Name)

    ```


    公式就位后，单击 `将此公式另存为新的 Patient Census 字段`，然后单击“确定”。然后系统会提示你输入 `新字段名称`。将此字段命名为 `患者姓名`，然后单击“确定”保存新字段。


    ![Image](img/9781430238102_Fig13-26.jpg)


    **图 13-26.** 定义公式窗口

