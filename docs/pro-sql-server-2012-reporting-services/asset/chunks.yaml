    \n1.  在“报表数据”窗口中，右键单击“数据集”文件夹并选择“新建数据集”，在报表中嵌入两个新数据集`Employee_DS`和`Branch_DS`。对于您创建的两个数据集，您将添加简单的查询，这些查询将返回员工和部门的\
    \ ID（用于“值”属性）和名称（用于“标签”属性）。注意下面的员工查询的`WHERE`子句，为了简单起见，您只包含了一组已知的员工。在真实场景中，业务规则决定了过滤器，但您可能不会以这种方式硬编码值。我们只是展示了一种可以硬编码过滤器以返回用于参数下拉列表的子数据集的方法。\n\
    \n    ```\n    --Query for Employee Parameter\n    SELECT\n            EmployeeTblID\n\
    \            , RTRIM(RTRIM(E.LastName)  +  ', '  + RTRIM(E.FirstName)) as Employee_Name\n\
    \    FROM\n            Employee E\n    WHERE\n            (E.EmployeeTblID IN\
    \ (32, 15, 34, 44, 129, 146, 159, 155, 26))\n    --Query for Branch Parameter\n\
    \    SELECT\n            BranchID, BranchName\n    FROM\n            Branch\n\
    \    UNION\n    SELECT     NULL AS BranchID, NULL AS BranchName\n    ```\n\n2.\
    \  使用上述查询创建数据集并通过“报表数据”窗口中的“查询”验证其正确执行后，展开“参数”文件夹。右键单击`BranchID`参数，选择“参数属性”，并为清晰起见，在提示中输入**部门**。您将在下拉列表中选择部门名称。\n\
    3.  在部门参数的“可用值”中，选择“从查询中获取值”，然后选择`Branch_DS`数据集。“值”字段将是`BranchID`，“标签”字段将是`BranchName`。\n\
    4.  按照相同的步骤修改员工参数，分配`Employee_DS`并分别选择“值”和“标签”字段为`EmployeeTblID`和`Employee_Name`。最后，如步骤\
    \ 2 所示，为清晰起见将提示更改为**员工**。完成后，选择“确定”。\n5.  最后，在“设计”选项卡上，您将为报表中的表格添加一个按“部门名称”的分组，以便在选择参数时，可以看到报表是针对特定部门的。为此，右键单击表格中“诊断”文本框左侧的行标题，然后选择“添加组”\
    \ >> “父组”。这将使“诊断”组（原为第一组）现为第二组，并将添加一个新组。将表达式值`=Fields!BranchName.Value`分配给新组，选择“添加组头”选项，并在“分组”对话框中单击“确定”。接下来，将`BranchName`字段从您刚创建的“部门”组的新第一列行中移动到“诊断”正上方的空白区域。此外，将该字段设为粗体，并将字体大小调整为\
    \ 12 磅。现在格式已设定，删除添加新`BranchName`组时创建的列。您可以通过右键单击它并选择“删除列”来删除该列。\n\n## 结果\n\n现在报表的可用参数值将具有填充的下拉列表，如图\
    \ 6-28 所示。请注意，对于您已添加可用值的两个参数，NULL 复选框已消失。\n\n![Image](img/9781430238102_Fig06-28.jpg)\n\
    \n图 6-28 具有已填充参数选择的报表"
- fmt: "You could perform the same steps for the `ServiceLogCtgryID` parameter and\
    \ provide a valid drop-down list from the table values. However, since you may\
    \ also be viewing the report in a custom report viewer that will also accept parameter\
    \ values, this particular parameter value is of little use to you now for direct\
    \ user input. That being the case, it will be beneficial to take advantage of\
    \ another new and much needed feature, the ability to hide parameters. This functionality\
    \ was added in Service Pack 2 for SSRS for SQL Server 2000 and is available all\
    \ other releases since. Sometimes a parameter can and should be populated by events\
    \ other than user input. In these instances, users will only be confused by seeing\
    \ these additional parameters. In the Report Parameters dialog box, select the\
    \ `ServicesLogCtgryID` property, and check the Hidden box.\n\n## Modifying Time-Based\
    \ Parameters\n\nIt will also be beneficial to modify the time-based parameters\
    \ (`Service Year` and `Service Month`) for this report. Time-based values are\
    \ often tricky to deal with because of the special formatting needs of the `DateTime`\
    \ datatype, which can store years, months, and days as well as hours, minutes,\
    \ and seconds. The procedures for setting up the `Service Year` and `Service Month`\
    \ parameters with valid values is almost identical to the `Branch` and `Employee`\
    \ procedures covered earlier, with the exception that the `Service Year` needs\
    \ to default to the current year and not `NULL`.\n\nThe first step is to create\
    \ a dataset for the `Service Year` and `Service Month` parameters based on the\
    \ service date, which is the field `ChargeServiceStartDate` in the stored procedure.\
    \ You will use the `DatePart` and `DateName` functions in the two queries to derive\
    \ valid values. The valid values for the dates are contingent upon their existence\
    \ in the table, so, for example, if your data contained values for 2009 and 2010,\
    \ only those two years would show up in the drop-down list. Populating the date\
    \ values in this way precludes the user from having to enter a date and also prevents\
    \ the report designer from having to hard-code year and month values into the\
    \ report. These `Year` and `Month` datasets have already been added to the report.\
    \ However, we need to set the parameters Available Values to use `Get values from\
    \ query` as we did previously. For `ServiceMonth`, use the `Month` dataset and\
    \ set `ServiceYear` to use the `Year` dataset.\n\n[Listing 6-2](#Chapter06.html#list_6_2)\
    \ shows the two queries that drive the parameter values.\n\n**Listing 6-2.** Parameter\
    \ Value Queries\n\n```sql\n--Query to Derive Year\nSELECT\n        DISTINCT DATEPART(yy,\
    \ ChargeServiceStartDate) AS Year\nFROM\n        Trx\nUNION\nSELECT Null AS Year\
    \ ORDER BY Year\n```\n\n```sql\n--Query to Derive Month\nSELECT\n        DISTINCT\
    \ DATEPART(mm, ChargeServiceStartDate) AS DateNum\n        , DATENAME(mm, ChargeServiceStartDate)\
    \ AS Month\nFROM\n        trx\nUNION\nSELECT Null AS DateNum, Null AS Month ORDER\
    \ BY DATEPART(mm, ChargeServiceStartDate)\n```\n\n## Finalizing the Report and\
    \ Parameters\n\nTo finish the report, add the `Service Year` field to the report\
    \ by right clicking the `BranchName` field, Insert Row and then Inside Group –\
    \ Below. Select the `Year` field from field selector list by placing the cursor\
    \ over the top right corner of the blank space created underneath `BranchName`\
    \ and clicking the field list box. Change the aggregation to be `FIRST` rather\
    \ than the default `SUM`. Next, format it with a distinct color (in this case,\
    \ dark salmon), set the alignment to be left justified and then resize the field\
    \ to 12 points. Then, set the default value for all of the parameters with the\
    \ exception of `Service Year` to be `(NULL)`. To do this, use the Default Values\
    \ tab under the Report Parameter Properties. Then select Specify values and click\
    \ the Add button.\n\nBefore you preview the report, it is important to set the\
    \ default value for the year so that a valid `Service Month` selection is not\
    \ based on the default `Service Year` field of `NULL`. This could potentially\
    \ have undesired results; in other words, the user might select January and assume\
    \ that it means January for the current year, when in fact it would be all occurrences\
    \ of January.\n\nTo make the `Service Year` parameter default to the current year,\
    \ go to the Parameters dialog box and set the Default Value option to the following\
    \ expression:\n\n`=CINT(DATEPART(\"yyyy\", Now()))`\n\nAlso, in this report, we\
    \ want to show the `Service Year` parameter before `Service Month`, so let’s move\
    \ the `ServiceYear` parameter above `ServiceMonth` parameter. Re-organizing the\
    \ parameters like this changes their order at runtime as well. Open up the Report\
    \ Data pane and expand the Parameters folder. Select the `ServiceYear` parameter\
    \ and click the up arrow in the Report Data pane menu. You can preview the report\
    \ and provide parameter values (see [Figure 6-29](#Chapter06.html#fig_6_29)).\n\
    \n![Image](images/square.jpg) **Note** Most of the data in the `Pro_SSRS` database\
    \ is from 2009 and 2010. If the current year is defaulted to a different year,\
    \ the data you see may not be the same as in [Figure 6-29](#Chapter06.html#fig_6_29).\n\
    \n![Image](images/9781430238102_Fig06-29.jpg)\n\n**Figure 6-29.** Report with\
    \ valid year and month values\n\nThe `EmployeeServiceCost_SP_Completed.rdl` report\
    \ in the `Pro_SSRS` project includes populated parameters."
  raw: 'You could perform the same steps for the ServiceLogCtgryID parameter and provide
    a valid drop-down list from the table values. However, since you may also be viewing
    the report in a custom report viewer that will also accept parameter values, this
    particular parameter value is of little use to you now for direct user input.
    That being the case, it will be beneficial to take advantage of another new and
    much needed feature, the ability to hide parameters. This functionality was added
    in Service Pack 2 for SSRS for SQL Server 2000 and is available all other releases
    since. Sometimes a parameter can and should be populated by events other than
    user input. In these instances, users will only be confused by seeing these additional
    parameters. In the Report Parameters dialog box, select the ServicesLogCtgryID
    property, and check the Hidden box. It will also be beneficial to modify the time-based
    parameters (Service Year and Service Month) for this report. Time-based values
    are often tricky to deal with because of the special formatting needs of the DateTime
    datatype, which can store years, months, and days as well as hours, minutes, and
    seconds. The procedures for setting up the Service Year and Service Month parameters
    with valid values is almost identical to the Branch and Employee procedures covered
    earlier, with the exception that the Service Year needs to default to the current
    year and not NULL.


    The first step is to create a dataset for the Service Year and Month parameters
    based on the service date, which is the field ChargeServiceStartDate in the stored
    procedure. You will use the DatePart and DateName functions in the two queries
    to derive valid values. The valid values for the dates are contingent upon their
    existence in the table, so, for example, if your data contained values for 2009
    and 2010, only those two years would show up in the drop-down list. Populating
    the date values in this way precludes the user from having to enter a date and
    also prevents the report designer from having to hard-code year and month values
    into the report. These Year and Month datasets have already been added to the
    report. However, we need to set the parameters Available Values to use Get values
    from query as we did previously. For ServiceMonth, use the Month dataset and set
    ServiceYear to use the Year dataset.


    [Listing 6-2](#Chapter06.html#list_6_2) shows the two queries that drive the parameter
    values.


    ***Listing 6-2.**  Parameter Value Queries*


    `--Query to Derive Year`

    `SELECT`

    `        DISTINCT DATEPART(yy, ChargeServiceStartDate) AS Year`

    `FROM`

    `        Trx`

    `UNION`

    `SELECT Null AS Year ORDER BY Year   `


    `--Query to Derive Month`

    `SELECT`

    `        DISTINCT DATEPART(mm, ChargeServiceStartDate) AS DateNum`

    `        , DATENAME(mm, ChargeServiceStartDate) AS Month`

    `FROM`

    `        trx`

    `UNION`

    `SELECT Null AS DateNum, Null AS Month ORDER BY DATEPART(mm, ChargeServiceStartDate)`


    To finish the report, add the Service Year field to the report by right clicking
    the BranchName field, Insert Row and then Inside Group – Below. Select the Year
    field from field selector list by placing the cursor over the top right corner
    of the blank space created underneath BranchName and clicking the field list box.
    Change the aggregation to be FIRST rather than the default SUM. Next, format it
    with a distinct color (in this case, dark salmon), set the alignment to be left
    justified and then resize the field to 12 points. Then, set the default value
    for all of the parameters with the exception of Service Year to be (NULL). To
    do this, use the Default Values tab under the Report Parameter Properties. Then
    select Specify values and click the Add button. Before you preview the report,
    it is important to set the default value for the year so that a valid Service
    Month selection is not based on the default Service Year field of NULL. This could
    potentially have undesired results; in other words, the user might select January
    and assume that it means January for the current year, when in fact it would be
    all occurrences of January.


    To make the Service Year parameter default to the current year, go to the Parameters
    dialog box and set the Default Value option to the following expression:


    `=CINT(DATEPART("yyyy", Now()))`


    Also, in this report, we want to show the Service Year parameter before Service
    Month, so let’s move the ServiceYear parameter above ServiceMonth parameter. Re-organizing
    the parameters like this changes their order at runtime as well. Open up the Report
    Data pane and expand the Parameters folder. Select the ServiceYear parameter and
    click the up arrow in the Report Data pane menu. You can preview the report and
    provide parameter values (see [Figure 6-29](#Chapter06.html#fig_6_29)).


    ![Image](images/square.jpg) **Note** Most of the data in the Pro_SSRS database
    is from 2009 and 2010\. If the current year is defaulted to a different year,
    the data you see may not be the same as in [Figure 6-29](#Chapter06.html#fig_6_29).


    ![Image](images/9781430238102_Fig06-29.jpg)


    ***Figure 6-29.** Report with valid year and month values*


    The EmployeeServiceCost_SP_Completed.rdl report in the Pro_SSRS project includes
    populated parameters.'
  trans: "\n您可以对 `ServiceLogCtgryID` 参数执行相同的步骤，从表值中提供一个有效的下拉列表。然而，由于您可能还会在一个同样接受参数值的自定义报表查看器中查看报表，这个特定的参数值目前对于直接用户输入来说用处不大。既然如此，利用另一个新的、非常需要的功能——隐藏参数的能力——将会很有帮助。此功能在\
    \ SQL Server 2000 的 SSRS Service Pack 2 中添加，并在之后的所有版本中均可用。有时，参数可以并且应该由用户输入之外的事件来填充。在这些情况下，用户看到这些额外的参数只会感到困惑。在“报表参数”对话框中，选择\
    \ `ServicesLogCtgryID` 属性，并勾选“隐藏”复选框。\n\n## 修改基于时间的参数\n\n修改此报表的基于时间的参数（`Service\
    \ Year` 和 `Service Month`）也将是有益的。基于时间的值通常处理起来很棘手，因为 `DateTime` 数据类型有特殊的格式需求，它可以存储年、月、日以及时、分、秒。为\
    \ `Service Year` 和 `Service Month` 参数设置有效值的步骤与前面介绍的 `Branch` 和 `Employee` 过程几乎相同，不同之处在于\
    \ `Service Year` 需要默认为当前年份，而不是 `NULL`。\n\n第一步是基于服务日期（即存储过程中的 `ChargeServiceStartDate`\
    \ 字段）为 `Service Year` 和 `Service Month` 参数创建一个数据集。您将在两个查询中使用 `DatePart` 和 `DateName`\
    \ 函数来派生有效值。日期的有效值取决于它们在表中的存在，因此，例如，如果您的数据包含 2009 年和 2010 年的值，则下拉列表中只会显示这两年。以这种方式填充日期值可以避免用户必须输入日期，也防止报表设计者必须在报表中硬编码年份和月份值。这些\
    \ `Year` 和 `Month` 数据集已经添加到报表中。但是，我们需要像之前那样，将参数的“可用值”设置为“从查询中获取值”。对于 `ServiceMonth`，使用\
    \ `Month` 数据集，并将 `ServiceYear` 设置为使用 `Year` 数据集。\n\n清单 6-2 显示了驱动参数值的两个查询。\n\n\
    **清单 6-2.** 参数值查询\n\n```sql\n--Query to Derive Year\nSELECT\n        DISTINCT\
    \ DATEPART(yy, ChargeServiceStartDate) AS Year\nFROM\n        Trx\nUNION\nSELECT\
    \ Null AS Year ORDER BY Year\n```\n\n```sql\n--Query to Derive Month\nSELECT\n\
    \        DISTINCT DATEPART(mm, ChargeServiceStartDate) AS DateNum\n        , DATENAME(mm,\
    \ ChargeServiceStartDate) AS Month\nFROM\n        trx\nUNION\nSELECT Null AS DateNum,\
    \ Null AS Month ORDER BY DATEPART(mm, ChargeServiceStartDate)\n```\n\n## 完成报表和参数\n\
    \n要完成报表，请右键单击 `BranchName` 字段，选择“插入行”，然后选择“组内 - 下方”，将 `Service Year` 字段添加到报表中。通过将光标放在\
    \ `BranchName` 下方创建的空白区域的右上角并单击字段列表框，从字段选择器列表中选择 `Year` 字段。将聚合方式从默认的 `SUM` 更改为\
    \ `FIRST`。接下来，使用独特的颜色（本例中为深鲑鱼色）进行格式化，将对齐方式设置为左对齐，然后将字段大小调整为 12 磅。然后，将所有参数（`Service\
    \ Year` 除外）的默认值设置为 `(NULL)`。为此，请使用“报表参数属性”下的“默认值”选项卡。然后选择“指定值”并单击“添加”按钮。\n\n在预览报表之前，重要的是设置年份的默认值，这样有效的\
    \ `Service Month` 选择就不会基于默认的 `Service Year` 字段 `NULL`。这可能会产生意想不到的结果；换句话说，用户可能选择一月并认为它指的是当前年份的一月，但实际上它可能是一月份的所有记录。\n\
    \n要使 `Service Year` 参数默认为当前年份，请转到“参数”对话框，并将“默认值”选项设置为以下表达式：\n\n`=CINT(DATEPART(\"\
    yyyy\", Now()))`\n\n此外，在此报表中，我们希望在 `Service Month` 之前显示 `Service Year` 参数，因此让我们将\
    \ `ServiceYear` 参数移动到 `ServiceMonth` 参数之上。像这样重新组织参数也会改变它们在运行时的顺序。打开“报表数据”窗格并展开“参数”文件夹。选择\
    \ `ServiceYear` 参数，然后单击“报表数据”窗格菜单中的向上箭头。您可以预览报表并提供参数值（参见图 6-29）。\n\n![Image](img/square.jpg)\
    \ **注意** `Pro_SSRS` 数据库中的大多数数据来自 2009 年和 2010 年。如果当前年份默认为其他年份，您看到的数据可能与图 6-29\
    \ 中的不同。\n\n![Image](img/9781430238102_Fig06-29.jpg)\n\n**图 6-29.** 包含有效年份和月份值的报表\n\
    \n`Pro_SSRS` 项目中的 `EmployeeServiceCost_SP_Completed.rdl` 报表包含了已填充的参数。\n"
- fmt: "### Working with Multivalued Parameters\n\nMultivalued parameters, an enhancement\
    \ released for SQL Server 2005, represent probably one of the most awaited features\
    \ for an SSRS update. Having the ability to select multiple values individually\
    \ to feed into the report is a powerful feature that most other reporting applications\
    \ take for granted, but was not available in SSRS for SQL Server 2000. Working\
    \ with multivalued parameters to achieve the most usefulness from them, however,\
    \ requires special design considerations, as mentioned in [Chapter 3](#Chapter03.html#ch3).\
    \ The reason for this, especially when working with stored procedures, is that\
    \ the multivalued parameters are passed back to the stored procedure as a string\
    \ value. The only way to work effectively with multivalued parameters is to know\
    \ that the query or stored procedure will evaluate all, one, or multiple values\
    \ returned to it based on user selection. Because SQL Server does not evaluate\
    \ a string in the same way it does a single value in a stored procedure, which\
    \ honestly has been the bane of SQL developers for years, you have to go into\
    \ multivalued parameters knowing that you may have to parse string values if you\
    \ want to use stored procedures and multivalued parameters together with SSRS.\
    \ For writers/logicians like us, this is a fun game. For others, who have to develop\
    \ reports with multivalued input parameters for a large audience, this can be\
    \ a nightmare. Rest assured that once you understand string manipulation techniques,\
    \ multivalued parameters will be a worthwhile time investment.\n\nSSRS does support\
    \ multivalued parameters out of the box for queries as long as they are not stored\
    \ procedures. To work with multivalued parameters with queries, all that is required\
    \ is to use the `IN` keyword in the `WHERE` clause of the query that will be a\
    \ dataset in the report. SSRS, in the case of multivalued parameters used in this\
    \ way, will rewrite the query for you at runtime based on the selections you choose\
    \ in the report. This is a straightforward and well-documented process. However,\
    \ we like using stored procedures for reasons already covered, and thus we have\
    \ to make special accommodations, which you will see.\n\nTo accurately demonstrate\
    \ how to use a store procedure with multivalued parameters, which we will affectionately\
    \ refer to as MVPs henceforth, let’s take a copy of the Employee Service Cost\
    \ report with the assumption that you will redesign it to accept the `Year` and\
    \ `Month` parameters as multivalues. To begin, you will have to first modify your\
    \ base stored procedure. Previously, it was fine to evaluate the expression of\
    \ your `Year` and `Month` parameters with the logic in [Listing 6-3](#Chapter06.html#list_6_3).\n\
    \n**Listing 6-3.** Logic to Evaluate `Year` and `Month` Parameters Without MVPs\n\
    \n```\n1=Case\n    When (@ServiceYear IS NULL) then 1\n    When (@ServiceYear\
    \ IS NOT NULL) AND @ServiceYear =\n        Cast(DatePart(YYYY, ChargeServiceStartDate)\
    \ as int) then 1\n    else 0\nEnd\nAND\n1=Case\n    When (@ServiceMonth is NULL)\
    \ then 1\n    When (@ServiceMonth is NOT NULL) AND @ServiceMonth =\n        Cast(DatePart(MM,\
    \ ChargeServiceStartDate) as int) then 1\n    else 0\nEND\n```\n\nHowever, now\
    \ that you will be using MVPs, `NULL` values are not acceptable. The value of\
    \ `NULL` in your logic was to select all values. This precluded you from accepting\
    \ more than one value. For example, if you had the years 2007, 2008, 2009, and\
    \ 2010 as valid values, you could either select all the values by selecting `NULL`\
    \ or select only one value to filter the data. You could not have selected 2008\
    \ *and* 2009. With multivalued parameters you can. The only way to effectively\
    \ use MVPs is through the `WHERE` clause of the query or stored procedure, with\
    \ parameters, that feeds the report data. You will have to take advantage of the\
    \ `IN` clause of T-SQL to make the best use of MVPs. Unfortunately though, it\
    \ is not as simple as modifying the stored procedure to say `Where value IN (@MyParameter)`,\
    \ because SQL does not evaluate the `IN` clause as a string when using a stored\
    \ procedure parameter. We can best explain this with the following example which\
    \ can be seen by opening up the `EmployeeServiceCost_MVP.rdl` report in `Pro_SSRS`\
    \ project from the book source code.\n\nLet’s say you make the `Year` and `Month`\
    \ report parameters multivalued parameters. You can do this quite simply by checking\
    \ the `Allow Multiple Values` box in the Report Parameter Properties window, as\
    \ shown in [Figure 6-30](#Chapter06.html#fig_6_30). Notice also that the `Allow\
    \ Null Value` checkbox is unchecked. The `Allow Null Value` option cannot be checked\
    \ if you want MVPs to work.\n\n![Image](images/9781430238102_Fig06-30.jpg)\n\n\
    **Figure 6-30.** MVP options\n\nIf you were to execute the report now, you would\
    \ see, as you did in the previous example using a dataset to populate the available\
    \ values, that you are able to select one or more or all values for the year and\
    \ month options, as shown in [Figure 6-31](#Chapter06.html#fig_6_31).\n\nBecause\
    \ the values for the MVP will be returned as a string—taking the year, for example,\
    \ as `\"2007,2008\"`—this will not work with the stored procedure logic that you\
    \ have defined. You will need to modify the stored procedure to use the `IN` clause\
    \ so that the value will be equivalent to the following expression:\n\n```\nWHERE\
    \ 1 = CASE WHEN CAST(DATEPART(YYYY, ChargeServiceStartDate) AS VARCHAR((20)) IN\
    \ (@Year)\nEND\n```\n\nThe problem here is that the variable `@Year` will be evaluated\
    \ as a string and not an integer as it is defined in the stored procedure. If\
    \ you were to select a single value—2007, for example—this would be fine because\
    \ SQL would correctly evaluate the single value within the `IN` clause. However,\
    \ when multiple values or Select All is chosen, SSRS passes a string such as `\"\
    2007,2008,2009,2010\"`. When evaluated within the stored procedure, the query\
    \ will fail. You need to first change the datatype of `Year` and `Month` to be\
    \ a character or string value. So, you will choose `varchar(20)` for your stored\
    \ procedure and parse out the values as they are passed in. Using `varchar(20)`\
    \ will allow you to select a wide enough range to cover the `Year` and `Month`\
    \ value strings.\n\n![Image](images/9781430238102_Fig06-31.jpg)\n\n**Figure 6-31.**\
    \ Multiple parameter selection"
  raw: '### Working with Multivalued Parameters


    Multivalued parameters, an enhancement released for SQL Server 2005, represent
    probably one of the most awaited features for an SSRS update. Having the ability
    to select multiple values individually to feed into the report is a powerful feature
    that most other reporting applications take for granted, but was not available
    in SSRS for SQL Server 2000. Working with multivalued parameters to achieve the
    most usefulness from them, however, requires special design considerations, as
    mentioned in [Chapter 3](#Chapter03.html#ch3). The reason for this, especially
    when working with stored procedures, is that the multivalued parameters are passed
    back to the stored procedure as a string value. The only way to work effectively
    with multivalued parameters is to know that the query or stored procedure will
    evaluate all, one, or multiple values returned to it based on user selection.
    Because SQL Server does not evaluate a string in the same way it does a single
    value in a stored procedure, which honestly has been the bane of SQL developers
    for years, you have to go into multivalued parameters knowing that you may have
    to parse string values if you want to use stored procedures and multivalued parameters
    together with SSRS. For writers/logicians like us, this is a fun game. For others,
    who have to develop reports with multivalued input parameters for a large audience,
    this can be a nightmare. Rest assured that once you understand string manipulation
    techniques, multivalued parameters will be a worthwhile time investment.


    SSRS does support multivalued parameters out of the box for queries as long as
    they are not stored procedures. To work with multivalued parameters with queries,
    all that is required is to use the IN keyword in the WHERE clause of the query
    that will be a dataset in the report. SSRS, in the case of multivalued parameters
    used in this way, will rewrite the query for you at runtime based on the selections
    you choose in the report. This is a straightforward and well-documented process.
    However, we like using stored procedures for reasons already covered, and thus
    we have to make special accommodations, which you will see.


    To accurately demonstrate how to use a store procedure with multivalued parameters,
    which we will affectionately refer to as MVPs henceforth, let’s take a copy of
    the Employee Service Cost report with the assumption that you will redesign it
    to accept the Year and Month parameters as multivalues. To begin, you will have
    to first modify your base stored procedure. Previously, it was fine to evaluate
    the expression of your Year and Month parameters with the logic in [Listing 6-3](#Chapter06.html#list_6_3).


    ***Listing 6-3.** Logic to Evaluate `Year` and `Month` Parameters Without MVPs*


    `1=Case`

    `                When (@ServiceYear IS  NULL) then 1`

    `                When (@ServiceYear IS  NOT NULL) AND @ServiceYear =`

    `        Cast(DatePart(YYYY, ChargeServiceStartDate) as int)  then 1`

    `        else 0`

    `        End`

    `AND`

    `        1=Case`

    `                When (@ServiceMonth is NULL)  then 1`

    `                When (@ServiceMonth is NOT NULL) AND @ServiceMonth =`

    `                Cast(DatePart(MM, ChargeServiceStartDate) as int) then 1`

    `        else 0`

    `        END`


    However, now that you will be using MVPs, NULL values are not acceptable. The
    value of NULL in your logic was to select all values. This precluded you from
    accepting more than one value. For example, if you had the years 2007, 2008, 2009,
    and 2010 as valid values, you could either select all the values by selecting
    NULL or select only one value to filter the data. You could not have selected
    2008 *and* 2009. With multivalued parameters you can. The only way to effectively
    use MVPs is through the WHERE clause of the query or stored procedure, with parameters,
    that feeds the report data. You will have to take advantage of the IN clause of
    T-SQL to make the best use of MVPs. Unfortunately though, it is not as simple
    as modifying the stored procedure to say Where value IN (@MyParameter), because
    SQL does not evaluate the IN clause as a string when using a stored procedure
    parameter. We can best explain this with the following example which can be seen
    by opening up the EmployeeServiceCost_MVP.rdl report in Pro_SSRS project from
    the book source code.


    Let’s say you make the Year and Month report parameters multivalued parameters.
    You can do this quite simply by checking the Allow Multiple Values box in the
    Report Parameter Properties window, as shown in [Figure 6-30](#Chapter06.html#fig_6_30).
    Notice also that the Allow Null Value checkbox is unchecked. The Allow Null Value
    option cannot be checked if you want MVPs to work.


    ![Image](images/9781430238102_Fig06-30.jpg)


    ***Figure 6-30.** MVP options*


    If you were to execute the report now, you would see, as you did in the previous
    example using a dataset to populate the available values, that you are able to
    select one or more or all values for the year and month options, as shown in [Figure
    6-31](#Chapter06.html#fig_6_31).


    Because the values for the MVP will be returned as a string—taking the year, for
    example, as “2007,2008”—this will not work with the stored procedure logic that
    you have defined. You will need to modify the stored procedure to use the IN clause
    so that the value will be equivalent to the following expression:


    `WHERE 1 = CASE WHEN CAST(DATEPART(YYYY, ChargeServiceStartDate) AS VARCHAR((20))
    IN (@Year)`

    `END`


    The problem here is that the variable @Year will be evaluated as a string and
    not an integer as it is defined in the stored procedure. If you were to select
    a single value—2007, for example—this would be fine because SQL would correctly
    evaluate the single value within the IN clause. However, when multiple values
    or Select All is chosen, SSRS passes a string such as “2007,2008,2009,2010”. When
    evaluated within the stored procedure, the query will fail. You need to first
    change the datatype of Year and Month to be a character or string value. So, you
    will choose varchar(20) for your stored procedure and parse out the values as
    they are passed in. Using varchar(20) will allow you to select a wide enough range
    to cover the Year and Month value strings.


    ![Image](images/9781430238102_Fig06-31.jpg)


    ***Figure 6-31.** Multiple parameter selection*'
  trans: "### 处理多值参数\n\n多值参数是针对 SQL Server 2005 发布的一项增强功能，它可能是 SSRS 更新中最备受期待的功能之一。能够独立选择多个值来填充报表，这是一个强大的功能，大多数其他报表应用程序都视其为理所当然，但在\
    \ SQL Server 2000 的 SSRS 中却不可用。然而，要充分利用多值参数，需要特殊的设计考量，正如第 3 章所述。其原因在于，特别是在使用存储过程时，多值参数会以字符串值的形式传回存储过程。要有效地使用多值参数，唯一的方法是了解查询或存储过程将根据用户的选择来评估返回给它的全部、一个或多个值。由于\
    \ SQL Server 评估存储过程中字符串的方式与评估单个值的方式不同（老实说，这多年来一直是 SQL 开发人员的长期困扰），你必须在使用多值参数时就明白，如果你想将存储过程和多值参数与\
    \ SSRS 一起使用，可能必须解析字符串值。对于我们这类作家/逻辑学家来说，这是一个有趣的游戏。对于其他人来说，他们需要为大量受众开发带有多个输入参数的报表，这可能是一场噩梦。请放心，一旦你掌握了字符串操作技术，多值参数将是一项值得投入时间的功能。\n\
    \nSSRS 确实开箱即用地支持查询的多值参数，只要它们不是存储过程即可。要与查询一起使用多值参数，只需在将用作报表中数据集的查询的 `WHERE` 子句中使用\
    \ `IN` 关键字。在这种情况下，SSRS 会在运行时根据你在报表中的选择为你重写查询。这是一个直接且文档齐全的过程。然而，出于前述原因，我们喜欢使用存储过程，因此我们必须做出特别的调整，你将会看到这一点。\n\
    \n为了准确演示如何将存储过程与多值参数（此后我们将亲切地称之为 MVPs）一起使用，我们以 Employee Service Cost 报表的一个副本为例，并假设你将重新设计它以接受\
    \ `Year` 和 `Month` 参数作为多值。首先，你必须修改你的基础存储过程。以前，使用清单 6-3 中的逻辑来评估你的 `Year` 和 `Month`\
    \ 参数表达式是没问题的。\n\n**清单 6-3.** 无 MVPs 时评估 `Year` 和 `Month` 参数的逻辑\n\n```\n1=Case\n\
    \    When (@ServiceYear IS NULL) then 1\n    When (@ServiceYear IS NOT NULL) AND\
    \ @ServiceYear =\n        Cast(DatePart(YYYY, ChargeServiceStartDate) as int)\
    \ then 1\n    else 0\nEnd\nAND\n1=Case\n    When (@ServiceMonth is NULL) then\
    \ 1\n    When (@ServiceMonth is NOT NULL) AND @ServiceMonth =\n        Cast(DatePart(MM,\
    \ ChargeServiceStartDate) as int) then 1\n    else 0\nEND\n```\n\n然而，现在你将使用 MVPs，`NULL`\
    \ 值是不可接受的。在你的逻辑中，`NULL` 值的含义是选择所有值。这妨碍了你接受多个值。例如，如果你有 2007、2008、2009 和 2010 作为有效值，你可以通过选择\
    \ `NULL` 来选择所有值，或者只选择一个值来筛选数据。你无法同时选择 2008 *和* 2009。使用多值参数，你就可以做到。有效使用 MVPs 的唯一途径是通过为报表提供数据的查询或存储过程的\
    \ `WHERE` 子句，并配合参数使用。你必须利用 T-SQL 的 `IN` 子句来充分利用 MVPs。不幸的是，事情并不像将存储过程修改为 `Where\
    \ value IN (@MyParameter)` 那么简单，因为在使用存储过程参数时，SQL 不会将 `IN` 子句作为字符串来评估。我们可以通过以下例子最好地解释这一点，你可以在本书源代码的\
    \ `Pro_SSRS` 项目中打开 `EmployeeServiceCost_MVP.rdl` 报表来查看。\n\n假设你将 `Year` 和 `Month`\
    \ 报表参数设为多值参数。你可以很简单地做到这一点：在报表参数属性窗口中勾选 `允许多个值` 复选框，如图 6-30 所示。另请注意，`允许 Null 值`\
    \ 复选框未被勾选。如果你想让 MVPs 正常工作，`允许 Null 值` 选项就不能被勾选。\n\n![Image](img/9781430238102_Fig06-30.jpg)\n\
    \n**图 6-30.** MVP 选项\n\n如果你现在执行报表，你会看到，就像在前面的例子中使用数据集填充可用值一样，你能够为年和月选项选择一个、多个或所有值，如图\
    \ 6-31 所示。\n\n由于 MVP 的值将以字符串形式返回——以年为例，如 `\"2007,2008\"`——这与你定义的存储过程逻辑无法配合工作。你需要修改存储过程以使用\
    \ `IN` 子句，使该值等价于以下表达式：\n\n```\nWHERE 1 = CASE WHEN CAST(DATEPART(YYYY, ChargeServiceStartDate)\
    \ AS VARCHAR((20)) IN (@Year)\nEND\n```\n\n这里的问题是变量 `@Year` 将被作为字符串评估，而不是像在存储过程中定义的那样作为整数。如果你只选择一个值——例如\
    \ 2007——这是可以的，因为 SQL 会正确地评估 `IN` 子句中的单个值。但是，当选择多个值或“全选”时，SSRS 会传递一个诸如 `\"2007,2008,2009,2010\"\
    ` 的字符串。当在存储过程中进行评估时，查询将失败。你需要首先将 `Year` 和 `Month` 的数据类型更�为字符或字符串值。因此，你将为存储过程选择\
    \ `varchar(20)`，并在值传入时解析它们。使用 `varchar(20)` 将允许你选择足够宽的范围来覆盖 `Year` 和 `Month` 的值字符串。\n\
    \n![Image](img/9781430238102_Fig06-31.jpg)\n\n**图 6-31.** 多参数选择"
- fmt: "You also have to decide the best way to parse the string as it is returned\
    \ from the report, both for performance and versatility. You have two effective\
    \ methods for doing this, either dynamic SQL or a UDF. Creating dynamic SQL, which\
    \ is essentially building a variable SQL expression using variables defined by\
    \ user input, is cumbersome and syntactically challenging. Wrapping SQL statements\
    \ within quotes and programmatically concatenating variables is time-consuming\
    \ and often frustrating, and yields unpredictable results. What is worse is that\
    \ it opens itself up to SQL injection hacks where users can interject values as\
    \ strings that may execute statements that the developer did not intend. The best\
    \ way to handle string values for MVPs is through a UDF that parses the individual\
    \ values and feeds these into the IN clause of the query. Knowing that the values\
    \ will always be returned in a comma-separated string makes loading the values\
    \ into an accessible table much easier, by using a function designed for this\
    \ purpose. This type of function is called a **table-valued function**, because\
    \ the parsed rows of the input string are loaded into a table that can then be\
    \ referenced as a subquery in the calling stored procedure. Let’s take a look\
    \ at a parsing function that you will use in your stored procedure while working\
    \ with MVPs. [Listing 6-4](#Chapter06.html#list_6_4) defines the UDF called `fn_MVParam`.\
    \ This function is in the `Pro_SSRS` database that you have been using.\n\n**Listing\
    \ 6-4.** `fn_MVParam`, String-Parsing Function\n```sql\nCREATE FUNCTION dbo.fn_MVParam(@RepParam\
    \ nvarchar(4000), @Delim char(1)= ',')\nRETURNS @Values TABLE (Param nvarchar(4000))\n\
    AS\n    BEGIN\n    DECLARE @chrind INT\n    DECLARE @Piece nvarchar(4000)\n  \
    \  SELECT @chrind = 1\n    WHILE @chrind > 0\n        BEGIN\n            SELECT\
    \ @chrind = CHARINDEX(@Delim,@RepParam)\n            IF @chrind  > 0\n       \
    \         SELECT @Piece = LEFT(@RepParam,@chrind - 1)\n            ELSE\n    \
    \            SELECT @Piece = @RepParam\n            INSERT  @Values(Param) VALUES(@Piece)\n\
    \            SELECT @RepParam = RIGHT(@RepParam,LEN(@RepParam) - @chrind)\n  \
    \          IF LEN(@RepParam) = 0 BREAK\n    END\n    RETURN\nEND\n```\n\nThis\
    \ function, when called from your `Emp_Svc_Cost_MVP` stored procedure, will return\
    \ the parsed values from SSRS’s multivalued parameter selection and allow you\
    \ to use this as criteria for selecting data to include in the report. The key\
    \ point of this function is that it uses several T-SQL functions itself, such\
    \ as `CHARINDEX`, `LEN`, and `LEFT`, to populate the `@Values` table with the\
    \ individual items from your report parameter string. The modification to the\
    \ base `Emp_Svc_Cost` stored procedure shown in [Listing 6-5](#Chapter06.html#list_6_5)\
    \ will be required to make the `Emp_Svc_Cost_MVP` stored procedure effectively\
    \ work with the MVPs.\n\n**Listing 6-5.** Modification to `WHERE` Clause for MVP\n\
    ```sql\n1 = CASE WHEN CAST(DATEPART(YYYY, ChargeServiceStartDate) AS VARCHAR(20))\
    \ IN\n        (SELECT [PARAM] FROM fn_MVParam(@ServiceYear, ',')) THEN 1\n   \
    \ ELSE 0\n    END\nAND\n1 = CASE WHEN CAST(DATEPART(MM, ChargeServiceStartDate)\
    \ AS VARCHAR(20)) IN\n        (SELECT [PARAM] FROM fn_MVParam(@ServiceMonth, ','\
    \ )) THEN 1\n    ELSE 0\n    END\n```\n\nNotice that instead of saying `IN (@Year)`,\
    \ for example, which will not work, you are calling your function `fn_MVParam`.\
    \ The function takes two values: the string and the delimiter. In this case, you\
    \ are using a comma as the delimiter.\n\nWhen the report is run and the new function\
    \ is called, you can see that you can select one, two, any combination, or all\
    \ values from the populated drop-down, and you know that your stored procedure\
    \ will effectively handle the parsing, evaluating, and criteria to deliver only\
    \ the data that you want to see in the report, as shown in [Figure 6-32](#Chapter06.html#fig_6_32).\n\
    \n![Image](images/9781430238102_Fig06-32.jpg)\n\n**Figure 6-32.** Report generated\
    \ with multiple selection criteria\n\nThe completed report for multivalued parameters\
    \ in the `Pro_SSRS` project is called `EmployeeServiceCost_MVP.rdl`.\n\n### Applying\
    \ a Filter\n\nYou might recall from [Chapter 2](#Chapter02.html#ch2) that you\
    \ enhanced the performance of your stored procedure, `Emp_Svc_Cost`, by removing\
    \ the criteria that looked only at visits. You will now apply a filter to the\
    \ report to take the place of the original query criteria so that only visits\
    \ will be displayed.\n\nYou can use **filters** to exclude values from a report\
    \ after the results have been returned by the query. Filters, in that sense, will\
    \ prevent a re-query; however, the full dataset will be returned to the report.\
    \ In the example in [Chapter 2](#Chapter02.html#ch2), you knew that a limited\
    \ number of excess rows would be returned. You should use filters when a query\
    \ parameter is not supported by the data provider or with report snapshots. You\
    \ should also use filters in reports that address a specific request or solution,\
    \ and that are based on the same stored procedure as other reports, because you\
    \ can use filters without modifying an existing stored procedure. Here is a simple\
    \ filter expression applied to the Table data region of your report that will\
    \ exclude any rows that are not visits:\n\n`=Fields!ServiceTypeID.Value = \"V\"\
    `\n\nTo add the filter expression, on the Layout tab, right-click the upper-left\
    \ section of the table, and select Tablix Properties. On the Filters tab, enter\
    \ the previous expression so that it looks like [Figure 6-33](#Chapter06.html#fig_6_33).\
    \ Add the filter to the `EmployeeServiceCost_MVP.rdl` report included in the `Pro_SSRS`\
    \ project from the book source code.\n\n![Image](images/9781430238102_Fig06-33.jpg)\n\
    \n**Figure 6-33.** Filter dialog box to exclude non-visits\n\nThe completed report\
    \ with a filter applied to a Tablix data region in the `Pro_SSRS` project is called\
    \ `EmployeeServiceCost_MVP_Filter.rdl`."
  raw: 'You also have to decide the best way to parse the string as it is returned
    from the report, both for performance and versatility. You have two effective
    methods for doing this, either dynamic SQL or a UDF. Creating dynamic SQL, which
    is essentially building a variable SQL expression using variables defined by user
    input, is cumbersome and syntactically challenging. Wrapping SQL statements within
    quotes and programmatically concatenating variables is time-consuming and often
    frustrating, and yields unpredictable results. What is worse is that it opens
    itself up to SQL injection hacks where users can interject values as strings that
    may execute statements that the developer did not intend. The best way to handle
    string values for MVPs is through a UDF that parses the individual values and
    feeds these into the IN clause of the query. Knowing that the values will always
    be returned in a comma-separated string makes loading the values into an accessible
    table much easier, by using a function designed for this purpose. This type of
    function is called a *table-valued function*, because the parsed rows of the input
    string are loaded into a table that can then be referenced as a subquery in the
    calling stored procedure. Let’s take a look at a parsing function that you will
    use in your stored procedure while working with MVPs. [Listing 6-4](#Chapter06.html#list_6_4)
    defines the UDF called fn_MVParam. This function is in the Pro_SSRS database that
    you have been using.


    ***Listing 6-4.** fn_MVParam, String-Parsing Function*


    `CREATE FUNCTION dbo.fn_MVParam(@RepParam nvarchar(4000), @Delim char(1)= '','')`

    `RETURNS @Values TABLE (Param nvarchar(4000))AS`

    `    BEGIN`

    `    DECLARE @chrind INT`

    `    DECLARE @Piece nvarchar(4000)`

    `    SELECT @chrind = 1`

    `    WHILE @chrind > 0`

    `        BEGIN`

    `            SELECT @chrind = CHARINDEX(@Delim,@RepParam)`

    `            IF @chrind  > 0`

    `                SELECT @Piece = LEFT(@RepParam,@chrind - 1)`

    `            ELSE`

    `                SELECT @Piece = @RepParam`

    `            INSERT  @Values(Param) VALUES(@Piece)`

    `            SELECT @RepParam = RIGHT(@RepParam,LEN(@RepParam) - @chrind)`

    `            IF LEN(@RepParam) = 0 BREAK`

    `    END`

    `    RETURN`

    `END`


    This function, when called from your Emp_Svc_Cost_MVP stored procedure, will return
    the parsed values from SSRS’s multivalued parameter selection and allow you to
    use this as criteria for selecting data to include in the report. The key point
    of this function is that it uses several T-SQL functions itself, such as CHARINDEX,
    LEN, and LEFT, to populate the @Values table with the individual items from your
    report parameter string. The modification to the base Emp_Svc_Cost stored procedure
    shown in [Listing 6-5](#Chapter06.html#list_6_5) will be required to make the
    Emp_Svc_Cost_MVP stored procedure effectively work with the MVPs.


    ***Listing 6-5.** Modification to `WHERE` Clause for MVP*


    `1 = CASE WHEN CAST(DATEPART(YYYY, ChargeServiceStartDate) AS VARCHAR(20)) IN`

    `        (SELECT [PARAM] FROM fn_MVParam(@ServiceYear, '','')) THEN 1`

    `    ELSE 0`

    `    END`

    `AND`

    `1 = CASE WHEN CAST(DATEPART(MM, ChargeServiceStartDate) AS VARCHAR(20)) IN`

    `        (SELECT [PARAM] FROM fn_MVParam(@ServiceMonth, '','' )) THEN 1`

    `    ELSE 0`

    `    END`


    Notice that instead of saying IN (@Year), for example, which will not work, you
    are calling your function fn_MVParam. The function takes two values: the string
    and the delimiter. In this case, you are using a comma as the delimiter.


    When the report is run and the new function is called, you can see that you can
    select one, two, any combination, or all values from the populated drop-down,
    and you know that your stored procedure will effectively handle the parsing, evaluating,
    and criteria to deliver only the data that you want to see in the report, as shown
    in [Figure 6-32](#Chapter06.html#fig_6_32).


    ![Image](images/9781430238102_Fig06-32.jpg)


    ***Figure 6-32.** Report generated with multiple selection criteria*


    The completed report for multivalued parameters in the Pro_SSRS project is called
    EmployeeServiceCost_MVP.rdl.


    ### Applying a Filter


    You might recall from [Chapter 2](#Chapter02.html#ch2) that you enhanced the performance
    of your stored procedure, Emp_Svc_Cost, by removing the criteria that looked only
    at visits. You will now apply a filter to the report to take the place of the
    original query criteria so that only visits will be displayed.


    You can use *filters* to exclude values from a report after the results have been
    returned by the query. Filters, in that sense, will prevent a re-query; however,
    the full dataset will be returned to the report. In the example in [Chapter 2](#Chapter02.html#ch2),
    you knew that a limited number of excess rows would be returned. You should use
    filters when a query parameter is not supported by the data provider or with report
    snapshots. You should also use filters in reports that address a specific request
    or solution, and that are based on the same stored procedure as other reports,
    because you can use filters without modifying an existing stored procedure. Here
    is a simple filter expression applied to the Table data region of your report
    that will exclude any rows that are not visits:


    `=Fields!ServiceTypeID.Value = "V"`


    To add the filter expression, on the Layout tab, right-click the upper-left section
    of the table, and select Tablix Properties. On the Filters tab, enter the previous
    expression so that it looks like [Figure 6-33](#Chapter06.html#fig_6_33). Add
    the filter to the EmployeeServiceCost_MVP.rdl report included in the Pro_SSRS
    project from the book source code.


    ![Image](images/9781430238102_Fig06-33.jpg)


    ***Figure 6-33.** Filter dialog box to exclude non-visits*


    The completed report with a filter applied to a Tablix data region in the Pro_SSRS
    project is called EmployeeServiceCost_MVP_Filter.rdl.'
  trans: "\n此外，你还需要决定从报表返回字符串后的最佳解析方式，这同时关乎性能和通用性。有两种有效的方法可以实现这一点：动态 SQL 或用户定义函数（UDF）。创建动态\
    \ SQL（本质上是利用用户输入定义的变量来构建可变的 SQL 表达式）过程繁琐且语法复杂。将 SQL 语句包裹在引号中并以编程方式拼接变量既耗时又常常令人沮丧，并且会产生不可预测的结果。更糟糕的是，这会为\
    \ **SQL 注入攻击** 洞开大门，攻击者可以插入可能执行非开发者本意的语句的字符串值。对于 MVP 场景，处理字符串值的最佳方式是通过一个 UDF 来解析各个值，并将它们传入查询的\
    \ IN 子句。既然已知值总是以逗号分隔的字符串形式返回，那么使用为此目的设计的函数将这些值加载到一个可访问的表中就会容易得多。这种函数被称为 **表值函数**，因为输入字符串的解析行会被加载到一个表中，该表随后可以在调用存储过程中作为子查询被引用。让我们看一下你在使用\
    \ MVP 时将在存储过程中使用的解析函数。清单 6-4 定义了名为 `fn_MVParam` 的 UDF。这个函数位于你一直在使用的 `Pro_SSRS`\
    \ 数据库中。\n\n**清单 6-4.** `fn_MVParam`，字符串解析函数\n```sql\nCREATE FUNCTION dbo.fn_MVParam(@RepParam\
    \ nvarchar(4000), @Delim char(1)= ',')\nRETURNS @Values TABLE (Param nvarchar(4000))\n\
    AS\n    BEGIN\n    DECLARE @chrind INT\n    DECLARE @Piece nvarchar(4000)\n  \
    \  SELECT @chrind = 1\n    WHILE @chrind > 0\n        BEGIN\n            SELECT\
    \ @chrind = CHARINDEX(@Delim,@RepParam)\n            IF @chrind  > 0\n       \
    \         SELECT @Piece = LEFT(@RepParam,@chrind - 1)\n            ELSE\n    \
    \            SELECT @Piece = @RepParam\n            INSERT  @Values(Param) VALUES(@Piece)\n\
    \            SELECT @RepParam = RIGHT(@RepParam,LEN(@RepParam) - @chrind)\n  \
    \          IF LEN(@RepParam) = 0 BREAK\n    END\n    RETURN\nEND\n```\n\n当从你的\
    \ `Emp_Svc_Cost_MVP` 存储过程中调用此函数时，它将返回从 SSRS 多值参数选择中解析出的值，并允许你将其用作筛选报告数据的标准。这个函数的关键在于它本身使用了几个\
    \ T-SQL 函数，例如 `CHARINDEX`、`LEN` 和 `LEFT`，来用报告参数字符串中的各个项填充 `@Values` 表。清单 6-5 所示的对基础\
    \ `Emp_Svc_Cost` 存储过程的修改，是使 `Emp_Svc_Cost_MVP` 存储过程能有效处理 MVP 所必需的。\n\n**清单 6-5.**\
    \ 针对 MVP 修改 `WHERE` 子句\n```sql\n1 = CASE WHEN CAST(DATEPART(YYYY, ChargeServiceStartDate)\
    \ AS VARCHAR(20)) IN\n        (SELECT [PARAM] FROM fn_MVParam(@ServiceYear, ','))\
    \ THEN 1\n    ELSE 0\n    END\nAND\n1 = CASE WHEN CAST(DATEPART(MM, ChargeServiceStartDate)\
    \ AS VARCHAR(20)) IN\n        (SELECT [PARAM] FROM fn_MVParam(@ServiceMonth, ','\
    \ )) THEN 1\n    ELSE 0\n    END\n```\n\n请注意，这里没有使用类似 `IN (@Year)` 这种无效的写法，而是调用了你的函数\
    \ `fn_MVParam`。该函数接受两个值：字符串和分隔符。在此例中，你使用逗号作为分隔符。\n\n当报表运行并调用新函数时，你可以看到你可以从填充的下拉列表中选择一个、两个、任意组合或全部值，并且你知道你的存储过程将有效地处理解析、求值以及标准判断，以仅交付你想在报表中看到的数据，如图\
    \ 6-32 所示。\n\n![Image](img/9781430238102_Fig06-32.jpg)\n\n**图 6-32.** 使用多重选择条件生成的报告\n\
    \n`Pro_SSRS` 项目中已完成的多值参数报告名为 `EmployeeServiceCost_MVP.rdl`。\n\n### 应用筛选器\n\n你可能还记得第\
    \ 2 章中，你通过移除仅查看访问量的标准来提升了存储过程 `Emp_Svc_Cost` 的性能。现在，你将对报表应用一个筛选器，以替代原始的查询条件，从而仅显示访问记录。\n\
    \n你可以使用 **筛选器** 在查询结果返回后从报告中排除某些值。从这个意义上说，筛选器可以避免重新查询；然而，完整的数据集仍会被返回到报表。在第 2 章的示例中，你知道只会返回有限数量的多余行。当数据提供程序不支持查询参数，或者使用报告快照时，你应该使用筛选器。你同样应该在针对特定请求或解决方案、且与其他报表基于相同存储过程的报告中使用筛选器，因为你可以使用筛选器而无需修改现有的存储过程。以下是一个应用于报表表格数据区域的简单筛选器表达式，它将排除所有非访问记录的行：\n\
    \n`=Fields!ServiceTypeID.Value = \"V\"`\n\n要添加此筛选器表达式，请在“布局”选项卡上，右键击表格的左上角部分，然后选择“Tablix\
    \ 属性”。在“筛选器”选项卡中，输入前面的表达式，使其看起来如图 6-33 所示。将该筛选器添加到书籍源代码中 `Pro_SSRS` 项目所包含的 `EmployeeServiceCost_MVP.rdl`\
    \ 报告中。\n\n![Image](img/9781430238102_Fig06-33.jpg)\n\n**图 6-33.** 用于排除非访问记录的筛选器对话框\n\
    \n在 `Pro_SSRS` 项目中，已对 Tablix 数据区域应用了筛选器的完整报告名为 `EmployeeServiceCost_MVP_Filter.rdl`。\n"
- fmt: '### Adding a Chart


    SSRS provides a Chart data region that has a style similar to Microsoft Excel.
    Charts can be scoped within the current dataset or can use their own dataset.
    For this example, you will add a stacked bar chart to the beginning of the report
    that will show the top ten diagnoses and a count of the number of services for
    each diagnosis. This will essentially mirror the data provided in the report thus
    far. This report is now also grouped by Branch, which will automatically separate
    the values in the Branch group you have defined. You will want to emulate this
    for your chart. You have only three branches in this particular dataset, so the
    result should be in line with the details of the report. Open the `EmployeeServiceCost_MVP_Chart_Start.rdl`
    report found in the `Pro_SSRS` project and follow these steps to add the chart
    to the report:


    1.  On the Design tab, click and drag the table you have already defined to make
    room for the chart.

    2.  Click and drag the Chart data region to an area above the table.

    3.  Right-click anywhere on the chart, select Change Chart Type, and in the Bar
    area select Stacked Bar.

    4.  Using the `Chart_DS` dataset already defined for your report; drag the `DiagVisits`
    to the Values area of the chart.

    5.  Drag the `Diagnosis` field to the Category Groups area of the chart.

    6.  Drag the `Patient_Count` field to the Values area underneath the `DiagVisits`
    series of the chart.

    7.  Resize the chart so that it aligns with the table below it. You can select
    both report elements, and on the toolbar select the Make Same Width icon.

    8.  Right click on the Diagnosis Category Group and then click on the Filters
    tab. Click the Add button to add a filter to the category group. Because you want
    to make the report show only the top ten diagnoses, you need to add a filter to
    this grouping. You will use the Top N operator to make this happen, as shown in
    `Figure 6-34`, based on the top ten diagnoses by a sum of the Diagnosis visit
    count. While you’re in the Diagnosis Category Group properties, click on the Sorting
    tab. Change the default sort by to the expression `=SUM(Fields!DiagVisits.Value)`
    and select A to Z for the sort order.


    `Image` `images/9781430238102_Fig06-34.jpg`


    `Figure 6-34. Filter value for top ten diagnoses`


    Finally, you can preview the report. Sometimes a report needs a chart up front
    for a quick view of the data prior to analyzing the details. Someone perusing
    this report might find it interesting that the chart shows, for example, that
    the Physical Therapy NEC diagnosis seems to be more prolific in the Nested Valley
    branch. This initial preview might warrant more investigation, which can be gleaned
    from the details in the report.


    When previewed, the report should look like `Figure 6-35`.


    `Image` `images/9781430238102_Fig06-35.jpg`


    `Figure 6-35. Employee Service Cost report with a chart`


    The Chart data region has many properties that you can apply, as covered in `Chapter
    5`; however, the appearance of the stacked bar is suitable for your report and
    can be deployed as is. Nevertheless, with a few slight tweaks like removing the
    chart title, axis titles, and choosing the Default color scheme, the final report
    starts to take on a cleaner look and feel. The completed report with a filter
    applied to a Chart data region in the `Pro_SSRS` project is called `EmployeeServiceCost_MVP_Chart.rdl`.


    ### Adding Tablix Elements


    SSRS 2008 introduced a significant change in report design by way of the Tablix
    data region. Essentially, the Tablix, as covered in detail in `Chapter 4`, combines
    aspects of the Table and Matrix data regions. The Table region available in SSRS
    2005 worked well with row data of variable length based on the dataset. In turn,
    the Matrix data region included support for a variable number of columns. Reporting
    Services 2008 allowed use of either control to include custom row or column groupings
    anywhere in the report. As you will see in the subsequent addition to the Employee
    Service Cost report, adding column groupings to a table data region is straightforward.


    In the section “Configuring Report and Group Variables” that follows, you will
    add a column grouping to the `EmployeeServiceCost_Tablix_Start` report using the
    `Year` field. The `Year` field, as you may recall, indicates what year the types
    of services were rendered for the patients. So far in the report, you have a distinct
    patient and employee count as well as estimated cost and visit count. So, what
    if you wanted to see each of these values grouped by the year of service for multiple
    years?


    You will perform the following actions to add a column group for the `Year` to
    the Employee Service Cost report:


    1.  Right-click the `[CountDistinct(PatID)]` cell in the table and select Add
    Group and then Parent Group under the Column Group section.

    2.  In the Group by Expression field, select `[Year]`. Do not check the Add Group
    Header or Add Group Footer button. Click OK.

    3.  Since we want to have groups that are independent of one another, we now need
    to add what is called an Adjacent Group. On the new `[Year]` field that we just
    created (which should be just above the No of Patients label), right-click and
    select Add Group and then Adjacent Right. Group on the `[Year]`, as you did in
    step 2. Click OK. This new column will hold all of the values in the No of Employees
    column that currently exists. In step 5, we will shift all of the values to be
    underneath the new `[Year]` columns.

    4.  Perform step 3 two more times, each time using the right-most `[Year]` field.

    5.  Now that we have three columns that just have the `[Year]` in the column groupings,
    we need to move our existing values underneath of them. At this point, the design
    surface should look like `Figure 6-36`. Next select all of the fields from the
    No of Employees, Estimated Cost, and Service Count columns. Be sure to select
    the header text too! Then cut and paste the values from their original cells into
    the three empty columns under our new Adjacent Groups that we created in steps
    2 and 3.

    6.  The three columns on the right are no longer needed. Delete them by right-clicking
    the column and choosing Delete Columns. You can select all three of them by holding
    the CTRL key as you select them.

    7.  Finally, adjust the widths of the columns with enough room to show the labels
    as shown in `Figure 6-37`.


    `Image` `images/9781430238102_Fig06-36.jpg`


    `Figure 6-36. Design layout for before moving fields over`


    When you are finished, the report should resemble `Figure 6-37` on the Design
    tab. You can also see the visual cues of the groupings, both row and column on
    the table as well as the Row Groups and Column Groups regions, of which you now
    have four groups for each. The completed report with Column Groups applied in
    the Tablix data region in the `Pro_SSRS` project is called `EmployeeServiceCost_Tablix.rdl`.


    `Image` `images/9781430238102_Fig06-37.jpg`


    `Figure 6-37. Design layout for column groupings`


    When you preview the report and select multiple years, as in `Figure 6-38` where
    years 2009 and 2010 and all months are selected, you can see the column groupings
    automatically expand horizontally and group the values accordingly. For example,
    there are 75 Home Health Aide visits in 2009 for Congestive Heart Failure and
    only 16 visits in 2010 for the months selected.


    `Image` `images/9781430238102_Fig06-38.jpg`


    `Figure 6-38. Preview of Employee Service Cost report with column groupings`'
