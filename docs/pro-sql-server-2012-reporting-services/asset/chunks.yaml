  trans: '# 测试存储过程


    下一步是在 SQL Server Management Studio 中为存储过程授予执行权限，方法是导航到数据库 `Pro_SSRS`，然后展开 `可编程性`
    文件夹。接着，选择 `存储过程`，右键单击 `Emp_Svc_Cost`，最后选择 `属性`。在 `权限` 属性页中，你可以添加 `public` 角色，并向任何你想要的组或用户授予执行权限。在此例中，单击权限页上的
    `添加`，在可用用户列表中找到 `Public`，并授予 `执行` 权限。（我们相信开发者肯定明白这其中的幽默，他知道有人会授予“public execution”。）


    ![Image](img/square.jpg) **注意** 我们用于开发报表的测试服务器是一个隔离且安全的系统。通常，不建议向 `public` 角色授予执行权限。我们将在
    第 11 章 中对存储过程和报表进行锁定。


    现在，你可以使用以下命令直接在 SSMS 中测试该过程：


    `EXEC Emp_Svc_Cost`


    因为你已允许参数接受 `NULL` 值，所以不需要在命令行显式传入它们。但是，为了测试存储过程的功能，你可以使用适当的参数传入完整的命令行；例如，要传入 2009
    年 9 月提供的所有服务，可以这样做：


    `EXEC Emp_Svc_Cost 09, 2009, NULL, NULL, NULL`


    以这种方式执行过程会在瞬间返回 893 条记录，结果证实确实只返回了 2009 年 9 月的服务（参见图 2-7）。


    ![Image](img/9781430238102_Fig02-07.jpg)


    **图 2-7.** 查看带年份和日期参数的 `Emp_Svc_Cost` 结果


    ## 小结


    在本章中，你开始设计报表的核心部分：查询和存储过程。通过使用存储过程，你可以获得集中管理和安全性的优势，同时还能够执行编译后的代码来返回数据集，而不是独立的查询。你可以结合报表开发查询，使用
    SSRS 内置的查询工具。然而，最佳实践是尽可能使用存储过程来部署报表。


    在确定报表的布局和默认呈现方式时，报表请求和目标受众是决定性因素。然而，尽管报表通常是为了满足特定需求而设计的，但如果它们基于相同的、经过验证的存储过程，具有相似的参数和分组，那么数据在所有报表中都将保持一致。这样，你就可以将设计时间集中在报表本身，而不是重写查询上。


    # 第 3 章


    ## 使用 SQL Server Data Tools 进行报表服务设计简介


    系统管理员、DBA 和开发人员之间的专业界限正在变得模糊。产品通常可以通过代码进行扩展，或者至少具备创建远超出其开箱即用功能的功能的潜力。SSRS 就是这样一个应用程序。Microsoft
    管理控制台（MMC）的时代已经屈指可数，并将被新的集成开发环境（IDE）所取代，尽管正如任何开发人员都会告诉你的那样，IDE 本身也早已不是什么新鲜事物了。然而，系统管理员、DBA，甚至报表设计人员都不得不熟悉这种执行日常任务的新方式。正如你可能已经意识到的，你可以在
    Visual Studio 2005 及更高版本中，或在 BIDS/SSDT 中为 SSRS 创建报表。为了提醒你这些缩写，SSRS 2005 到 2008
    R2 版本中包含的设计器被标记为 Business Intelligence Development Studio（BIDS）。然而，在 2012 版本中，Microsoft
    决定将设计器重新命名为 SQL Server Data Tools（SSDT），因为其中包含了诸如与 SQL Azure 环境进一步开发集成等功能。能够使用
    SSDT/BIDS 对 Visual Studio 开发人员来说是一个优势，因为他们现在可以使用同一个 IDE 来创建报表和进行应用程序开发！对于我们其他人来说，在
    Visual Studio 2010 中创建报表存在一个学习曲线。


    SQL Server 2005 引入了两个新的管理和开发环境：BIDS（Visual Studio 2005 的一个子集）和 SSMS。在 SQL Server
    2008、2008 R2 和 2012 中，这些应用程序得到了增强，以改进设计和管理功能在通用工具集中的集成。


    现在你已经开发了查询和存储过程，可以将注意力转向安装 SQL Server 时可用的报表设计工具。在接下来的三章中，我们将让你熟悉报表设计工具，然后在第 6
    章中向你展示如何创建一个完整的 SSRS 报表。我们将涵盖的主题包括：


    *   SQL Server Data Tools（SSDT/BIDS）的元素

    *   RDL 在 SSRS 中的作用，以及它控制的各个报表对象的示例代码

    *   创建数据源和数据集

    *   定义查询和报表参数

    *   讨论报表分页

    *   定义表达式和筛选器，以演示如何结合使用它们来控制报表内容和格式

    *   实现 Tablix 属性（SSRS 2008 中的新功能），它通过结合行分组和列分组扩展了多个数据区域的功能

    *   创建数据区域示例：列表、文本框、表、矩形、矩阵、图表和图像

    *   实现地图、数据条、迷你图和指示器，这些都为报表提供了更复杂的仪表板风格元素


    在本章中，我们将向你展示如何使用 2010 环境中嵌入的 SSRS 元素来设置和探索 SSDT/BIDS IDE。


    每个人的学习方式不同——有些人喜欢遵循逐步指南以达到已知结论，有些人喜欢查看完成的报表以了解其设计的具体组件。因此，我们将在本章及后续章节中提供这两种方法。具体来说，我们将向你展示如何从头开始构建每个示例，同时也会指引你到本书在
    [`www.apress.com`](http://www.apress.com) 的目录页面上提供的源代码下载中的完整示例，以便你在按照步骤实现最终结果的同时分析报表。


    我们为你提供了在本章中将要使用的所有数据源、报表和项目，它们包含在一个名为 `Pro_SSRS` 的解决方案中。你可以在 BIDS 和 Visual Studio
    2010 中打开此解决方案。如前所述，Microsoft 已将名称从 Business Intelligence Development Studio 更改为
    SQL Server Data Tools（SSDT），但在本书中，我们将交替使用 BIDS 和 SSDT。你可以在 Apress 网站的源代码/下载区域找到为每章安装示例的详细说明。本章将主要关注
    BIDS 的 IDE，并提供一个分步指南，帮助你熟悉 BIDS。第 4 章 将描述特定于 SSRS 的报表对象（如列表和表格）的使用，第 5 章 将介绍诸如图表、仪表、地图、迷你图和数据条等报表对象。当你开始创建这些特定的报表示例时，每个对象都会有两份报表：一份起点报表和一份完成的报表样本；我们将在每个主要部分的开头和结尾指出它们。这种方法允许你逐步执行过程，生成起点报表中的输出，然后打开并将最终结果与完成的报表进行比较。'
- fmt: '### Exploring the Elements of BIDS


    In BIDS, one or more `projects` contain all the reports and shared data sources.
    A project physically and logically groups reports together, and maintains properties
    specific to that project. These properties allow the project to work independently
    of other projects. All created projects are themselves contained within a `solution.`
    A solution is simply a collection of one or more projects that are made available
    to Visual Studio. A single solution can contain a Reporting Services, an Integration
    Services and an Analysis Services project as well as a Windows or Web application
    project.


    We’ll now show you how to fire up BIDS to create a solution and a Reporting Services
    project. To create a solution, you’ll need to have BIDS loaded. Navigate to the
    shortcut to load the `devenv` executable by choosing Start ![Image](images/U001.jpg)
    All Programs ![Image](images/U001.jpg) Microsoft SQL Server 2012 ![Image](images/U001.jpg)
    SQL Server Data Tools. Both SQL Server Data Tools (SSDT) and Business Intelligence
    Development Studio (BIDS) are shortcuts to the `devenv` executable. Throughout
    this chapter and the rest of the book, we may refer to SSDT as BIDS because most
    development initiatives using this tool are Business Intelligence related. However,
    BIDS and SSDT are interchangeable terms. Once you have BIDS open, you can get
    to the new project screen by selecting File, and then Project under the New submenu
    of the menu bar or simply by clicking the New Project button on the Start Page
    as shown in [Figure 3-1](#Chapter03.html#fig_3_1).


    ![Image](images/9781430238102_Fig03-01.jpg)


    **Figure 3-1.** Business Intelligence Development Studio Start Page


    The New Project dialog box opens. Select Report Server Project under Installed
    Templates ![Image](images/U001.jpg) Business Intelligence ![Image](images/U001.jpg)
    Reporting Services. If this is the first project that you have created, the project
    name defaults to Report Project1\. The location of the project can be a local
    drive or a network location. In this case, make it `C:\Pro_SSRS\Reports`.


    By default, the solution is named according to the project name, Report Project1,
    as shown in [Figure 3-2](#Chapter03.html#fig_3_2). If you check the Create Directory
    for Solution box, you can append a new directory to the base location. In this
    case, choose Solution1\. After you click OK, both the project and solution are
    created, and you can create report items and data sources within the project.


    ![Image](images/9781430238102_Fig03-02.jpg)


    **Figure 3-2.** New Project dialog box


    If you know where your reports are going to be deployed, it is considered good
    practice to add a few important project property settings: the target folder in
    which to deploy the reports on the SSRS server, and the SSRS server URL. You can
    view and set these properties using the Solution Explorer, whose window displays
    the opened solution and the projects it contains, as well as all the reports and
    other objects the individual projects might contain. By default, BIDS locates
    the Solution Explorer on the right side of the environment, but it may be docked
    or floating in a different location. If you do not see it, click View ![Image](images/U001.jpg)
    Solution Explorer on the menu bar. Highlight the project in the Solution Explorer
    and choose Project ![Image](images/U001.jpg) Properties from the menu (or right-click
    the project and select Properties) to see a window like the one in [Figure 3-3](#Chapter03.html#fig_3_3).
    The `TargetReportFolder` property controls the folder that is created to store
    the deployed reports and data sources on the SSRS server. You can use the `TargetDataSourceFolder`
    and `TargetDatasetFolder` properties to store the project specific data sources
    and shared datasets. The `TargetServerURL` property is the SSRS Web server URL
    (when you start to use SharePoint Integration Mode, as you will when you get to
    [Chapter 12](#Chapter12.html), this property will contain the SharePoint server
    URL). As [Figure 3-3](#Chapter03.html#fig_3_3) shows, the TargetServerURL property
    is in the form `http://servername/ReportServer`. In this case, the SSRS Web server
    is `localhost`.


    ![Image](images/9781430238102_Fig03-03.jpg)


    **Figure 3-3.** Project properties


    ![Image](images/square.jpg) **Note** We’ll cover some of these other settings,
    such as `TargetDatasetFolder`, `TargetDataSourceFolder`, and `TargetReportPartFolder`,
    in [Chapter 8](#Chapter08.html). However, unless the object needs to be consumed
    by report developers or end users with no access to the specified `TargetReportFolder`,
    its good practice to store your project objects using the folder structure that
    you set in the `TargetReportFolder`. For example, the `TargetReportFolder` in
    [Figure 3-3](#Chapter03.html#fig_3_3) is `Pro_SSRS` and the `TargetDataSourceFolder`
    is set to `Pro_SSRS/DataSources`. This prevents other developers overwriting your
    data sources, datasets or report parts.


    ### Setting Up a Basic IDE


    Now that you have a new solution and a new project to contain the reports you’ll
    build, it’s time to get personal. As a report designer, you’re going to spend
    many hours gazing at the pixels that are your creations, so it’s important to
    set up the environment exactly the way you want it. The ideal setup for designing
    reports is a personal choice. Some prefer high-resolution display settings with
    every available design toolbar always in view within the environment, while others
    like undocked toolbars and a dual monitor set up at a lower resolution. Whatever
    your preference, BIDS makes it easy to manipulate the design tools within the
    IDE to personalize your configuration. In addition to the Solution Explorer, covered
    in the previous section, you can use several common tools within the IDE to design
    reports:


    > `The Toolbox`: This is where you’ll find all the report objects covered in this
    chapter, such as the Matrix and Table data regions. Data regions are the defined
    report objects within the SSRS report design environment that contain the field
    values from the data set.

    >

    > `The Properties window`: Here, you set the values for the various formatting
    and grouping properties for report items.

    >

    > `The Error List window`: You will need this when troubleshooting report errors.
    Mismatched data types and invalid use of functions are common issues that arise
    when designing reports. The Error List window is the place to see the details
    of these errors.

    >

    > `The Report Data window`: This holds the built-in fields, data sources, datasets,
    images, and the field information you’ve defined for the report.


    [Figure 3-4](#Chapter03.html#fig_3_4) shows a custom layout for designing reports
    in SSRS. You can dock any toolbar anywhere within the IDE or position them beyond
    it on the desktop. This setup works best with a high-resolution configuration,
    1152 × 864 or higher. In the setup in [Figure 3-4](#Chapter03.html#fig_3_4), the
    Toolbox is undocked, and the Solution Explorer is on the right side of the report
    design grid. If you wish, you can set the toolbars to hide automatically when
    not in use—in this example, the button to display the hidden Report Data pane
    is shown at top left. BIDS, like the full Visual Studio 2010 environment, has
    a dock position map that assists in precisely placing the dockable item. You can
    see the map, with a slight transparency at all edges and in the middle, as you
    move items around within the report designer.


    ![Image](images/9781430238102_Fig03-04.jpg)


    **Figure 3-4.** Sample IDE configuration'
