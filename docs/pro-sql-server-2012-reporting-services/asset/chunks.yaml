    data are stored in different locations, such as database tables and configuration
    files, SSRS uses a symmetrical key encryption process to securely store and access
    this information. What this means is that the authentication information in the
    database and configuration files is stored in an encrypted format, and SSRS uses
    the encryption keys it generates to decrypt the information when needed.


    As with many SSRS tasks in SQL Server, multiple tools are available to make configuration
    changes to the report server. You can manage keys with the Reporting Services
    Configuration Manager as well as a command-line utility called RSKeyMgmt. You
    can use either of these tools to back up the keys associated with the report server
    instance so that if something were to occur that caused the server to have to
    be rebuilt, you could reapply the keys to the installation. The encryption keys
    are generated when SSRS is installed or joins a farm. [Figure 11-8](#Chapter11.html#fig_11_8)
    shows a section of the RSReportServer.config file, which contains sensitive authentication
    credentials required to connect to SSRS server components. Notice that parts of
    the data inside the file are encrypted. SSRS uses the keys associated with the
    report server instance to decrypt the contents of this file as well as the encrypted
    content stored in the ReportServer database in the dbo.Keys table.


    ![Image](images/9781430238102_Fig11-08.jpg)


    ***Figure 11-8.** The rsreportserver.config encrypted values*


    We will show how to use both tools—the Reporting Services Configuration Manager
    and the RSKeyMgmt utility—to extract the key for the PROSSRS SSRS installation.


    First, open the Reporting Services Configuration Manager again and connect to
    your report server instance (called MSSQLSERVER by default), and then click the
    Encryption Keys icon on the left. You will see four options on the Encryption
    Key page: Backup, Restore, Change, and Delete Encrypted Content. You can back
    up the encryption key to a key file and supply a password, as shown in [Figure
    11-9](#Chapter11.html#fig_11_9). This file should be stored in a secure location.
    If the report server ever had to be rebuilt for any reason—because of a hardware
    failure or data corruption issue—then having this key is crucial to restoring
    the ReportServer database to its previous state. Without the key file, it is still
    possible to restore and initialize the ReportServer database from backup. However,
    all objects that require encryption, such as data sources with stored account
    information, must be reset manually, which could be an arduous task at best.


    To use the command-line tool that will essentially perform the same task of backing
    up, restoring, and deleting the encryption keys for the report server instance,
    the syntax is as follows:


    `RSKeyMgmt -e -f C:\Pro_SSRS\SSRS_Key\PROSSRS_SSRS_Key -P Password`


    The -e option tells RSKeyMgmt to extract the key to the file `PROSSRS_SSRS_Key`
    in the `C:\Pro_SSRS\SSRS_Key` folder. The password option is required and the
    password must meet the minimum complexity requirement. If you needed to do so,
    you could reapply the key to the server using the same command but changing the
    -e option to -a. After executing the command, you are timidly instructed to SECURE
    THE FILE IN A SAFE LOCATION!


    ![Image](images/9781430238102_Fig11-09.jpg)


    ***Figure 11-9.** Encryption keys in the Reporting Services Configuration Manager*'
  trans: '## 抓取 HTTPS 流量


    既然您已经安装了证书，让我们回到网络监视器，再次捕获运行报告。这次在示例中，使用 https 协议访问 PROSSRS 上的报表服务器 URL，这指示浏览器通过
    SSL 连接到 443 端口，而不是通过 HTTP 连接到 80 端口。


    当您直接导航到安全的报表管理器时，可能首先遇到的一个警告是证书未能通过所有受信任标准，因为它并非来自已知的证书颁发机构（参见图 11-6）。


    您可以选择“继续浏览此网站”，因为您确实信任该站点。您也可以通过点击浏览器底部的锁形图标并选择“安装证书”，将证书安装到本地计算机上，这样就不会再次收到此提示消息。在本地客户端的证书存储中安装证书会使浏览器自动信任该站点。对于像
    VeriSign 这样的已知证书颁发机构，这些步骤不是必需的，但对于这种自签名证书是必需的。


    至此，您可以通过 HTTP 或 HTTPS 访问报表管理器，因为我们尚未在 Reporting Services 配置管理器中移除通过端口 80 访问的能力。您可以通过几种方式控制所需的安全级别。


    控制 SSRS 所使用安全级别的一种方法是通过位于安装文件夹（通常是 `盘符:\Program Files\Microsoft SQL Server\MSRS11.MSSQLSERVER\Reporting
    Services\ReportServer`）中的服务配置文件 `rsreportserver.config`。在记事本中打开该文件，并查找以下条目：


    ```xml

    <Add Key="SecureConnectionLevel" Value="0"/>

    ```


    ![Image](img/9781430238102_Fig11-06.jpg)


    **图 11-6.** 非受信任安全证书的警告


    四个值（0 到 3）控制安全级别。在安装期间未配置 SSRS 使用 SSL 的部署中，默认值为 0，这是最不安全的。值为 3 是最安全的，要求每个 SOAP
    API 调用都使用 SSL。对于本例，将值设置为 2，这将要求加密所有报表数据。现在，所有对服务器的调用都将自动使用端口 443 并加密数据，包括 URL
    字符串本身，这在 URL 中传递任何可能敏感信息时非常重要。如果用户尝试使用 HTTP 连接到报表管理器或报表服务器 URL，报表服务器将自动将客户端重定向到
    HTTPS，以要求安全连接。您还应在重启服务以使此更改生效之前，在 SSRS 配置工具中为报表服务 URL 部分添加 SSL 证书。它也需要一个有效的证书来使用加密通信。


    您也可以通过 Reporting Services 配置管理器移除 HTTP 访问。在我们用于添加新的 SSL 安全地址的同一部分，您也可以移除 HTTP
    地址绑定。这将要求任何尝试访问该站点的用户必须使用 HTTPS 地址，并且所有 Web 数据都将被加密。


    我们还需要对我们之前设置的显示筛选器进行微小更改。在之前的示例中我们寻找的是端口 80 的流量，但现在需要改为搜索端口 443。更改您的显示筛选器，将每个端口
    80 的实例改为搜索端口 443，然后单击应用按钮确认更改。


    当您使用新的安全地址在网络监视器中捕获帧时，可以看到之前所有在端口 80 上的 HTTP 数据现在都在端口 443 上使用 SSL，如图 11-7 所示。数据已被加密，并且我们还可以看到
    SSL 协议正在处理握手设置，因此我们的所有 HTTP 数据都是安全可靠的。


    ![Image](img/9781430238102_Fig11-07.jpg)


    **图 11-7.** 显示加密数据包的网络监视器


    ## 保护 SSRS 中的数据存储


    虽然确保网络流量加密很重要，但这只是维护安全环境的一个方面。SSRS 要求敏感数据（例如用于数据访问的账户信息）必须安全存储。由于这些数据存储在不同的位置（例如数据库表和配置文件）中，SSRS
    使用对称密钥加密过程来安全存储和访问这些信息。这意味着数据库和配置文件中的身份验证信息以加密格式存储，SSRS 使用其生成的加密密钥在需要时解密信息。


    与 SQL Server 中的许多 SSRS 任务一样，有多种工具可用于对报表服务器进行配置更改。您可以使用 Reporting Services 配置管理器或一个名为
    `RSKeyMgmt` 的命令行实用工具来管理密钥。您可以使用这两种工具中的任意一种来备份与报表服务器实例关联的密钥，以便如果发生导致服务器必须重建的情况，您可以重新应用密钥到安装中。加密密钥在
    SSRS 安装或加入场时生成。图 11-8 展示了 `RSReportServer.config` 文件的一部分，其中包含连接到 SSRS 服务器组件所需的身份验证凭据。请注意，文件内的部分数据是加密的。SSRS
    使用与报表服务器实例关联的密钥来解密此文件的内容以及存储在 ReportServer 数据库的 `dbo.Keys` 表中的加密内容。


    ![Image](img/9781430238102_Fig11-08.jpg)


    **图 11-8.** `rsreportserver.config` 的加密值


    我们将展示如何使用 Reporting Services 配置管理器和 `RSKeyMgmt` 实用工具这两种工具来提取 PROSSRS SSRS 安装的密钥。


    首先，再次打开 Reporting Services 配置管理器并连接到您的报表服务器实例（默认为 MSSQLSERVER），然后单击左侧的“加密密钥”图标。您将在“加密密钥”页面上看到四个选项：备份、还原、更改和删除加密内容。您可以将加密密钥备份到密钥文件并提供密码，如图
    11-9 所示。此文件应存储在安全的位置。如果报表服务器因任何原因（例如硬件故障或数据损坏问题）必须重建，那么拥有此密钥对于将 ReportServer 数据库恢复到先前状态至关重要。没有密钥文件，仍然可以从备份中恢复和初始化
    ReportServer 数据库。但是，所有需要加密的对象（例如存储了账户信息的数据源）都必须手动重置，这充其量是一项艰巨的任务。


    要使用命令行工具（它本质上执行备份、还原和删除报表服务器实例加密密钥的相同任务），语法如下：


    ```bash

    RSKeyMgmt -e -f C:\Pro_SSRS\SSRS_Key\PROSSRS_SSRS_Key -P Password

    ```


    `-e` 选项告诉 `RSKeyMgmt` 将密钥提取到文件 `PROSSRS_SSRS_Key`（位于 `C:\Pro_SSRS\SSRS_Key` 文件夹中）。密码选项是必需的，并且密码必须满足最低复杂性要求。如果需要，您可以使用相同的命令重新将密钥应用到服务器，但将
    `-e` 选项更改为 `-a`。执行命令后，系统会谨慎地提示您：**将文件保存在安全位置！**


    ![Image](img/9781430238102_Fig11-09.jpg)


    **图 11-9.** Reporting Services 配置管理器中的加密密钥'
- fmt: '# Reporting Services 安全配置


    The key will also come in handy in case you need to move the Reporting Services
    instance to another machine on your network. You can simply install SSRS on the
    new machine, restore the databases from the old instance, restore the key that
    you have been storing, and remove the original encryption key. This makes a simple
    standalone SSRS migration fairly simple and painless.


    ## Setting Up Authentication and User Access to Data


    Access to confidential electronic data, no matter where they reside, begins and
    ends with user authentication. Having security users or roles properly configured
    is critical to a secure deployment of SSRS. In an environment utilizing a Windows
    Server Domain, SSRS can then take advantage of the authentication provided by
    Active Directory’s security groups and users. The SSRS administrator is responsible
    for configuring SSRS-specific security roles that link to Active Directory security
    accounts. In the following sections, we will show how to set up a test Windows
    account for an employee who will have limited access to the SSRS report server.
    We will discuss the following:


    - **Setting up SSRS roles:** SSRS roles dictate what permissions the users will
    have when they access the SSRS server. An Active Directory security account, either
    a group or a user, is assigned either to one of five predefined SSRS roles or
    to a new role that the SSRS administrator may create.

    - **Assigning SSRS roles:** Assignments are the actual SSRS tasks that a user
    in a specific SSRS role may perform.

    - **Configuring and testing permissions for SSRS objects:** Each report folder
    and its objects maintain individual permissions that can be set at the folder
    level and propagated to all children objects or that can be set specifically per
    object. We will show how to set up two folders for the test user account and add
    report objects that are to be secured.

    - **Filtering reports:** It is possible to limit which data are displayed within
    a report, based on the Active Directory login account that is accessing the report
    server. You do this by associating the value returned from an SSRS global collection,
    `UserlUserlD`, with a field value in the dataset of the report; `UserlUserlD`
    returns the current login account.

    - **Authenticating data sources:** In addition to the Windows login account and
    SSRS role assignments, data sources maintain their own authentication properties,
    which we will discuss.

    - **Setting permissions on the data source database objects:** You may recall
    from an earlier chapter that you created a stored procedure, `Emp_Svc_Cost`, to
    use with the Employee Service Cost report but did not assign user-specific permissions.
    We will show how to assign the permissions settings in this chapter.


    ### Introducing SSRS Roles


    By default, the installed SSRS Web service uses Windows integrated authentication
    to access reports and report content. Windows user or group security accounts
    stored in Active Directory must be associated with an SSRS role before they will
    have access to the SSRS server. Administrators can assign the Windows accounts
    to SSRS roles with Report Manager. In the test scenario for our health-care application,
    we have set up a test Windows account, named `jyoungblood`; you will assume `jyoungblood`
    is a registered nurse in a health-care organization who makes home visits to patients.


    All the clinical staff, including nurses such as `jyoungblood`, are associated
    with security groups within Active Directory for the domain. So, you will make
    `jyoungblood` a member of the `RN` security group. In addition to the security
    group `RN`, all registered nurses, including `jyoungblood`, will be contained
    with an organizational unit (OU) inside Active Directory, as shown in the Active
    Directory Users and Computers window in [Figure 11-10](#Chapter11.html#fig_11_10).
    Although you will not use OUs when assigning a user or group to a role in SSRS,
    it is important to note that you can use OUs to configure Group Policy settings
    that apply to security as well, such as locking down the user’s desktop or Internet
    Explorer.


    ![Image](images/9781430238102_Fig11-10.jpg)


    **Figure 11-10.** Test Windows account in Active Directory


    Before assigning the test Windows user to an SSRS role and testing the permissions
    settings, first look at these five predefined roles:


    - **Browser:** Users assigned to the Browser role may only view reports, folders,
    and resources. They may also manage their own subscriptions.

    - **Content Manager:** Administrators are assigned to the Content Manager role
    by default. Users assigned to this role can perform every task available for SSRS
    objects, such as folders, reports, and data sources that they manage.

    - **My Reports:** This is the default role automatically assigned to a user when
    the My Reports feature is enabled on the SSRS server, discussed later in this
    section.

    - **Publisher:** Users assigned to this role, by default, have enough privileges
    to publish reports and data sources to the report server. Typically, this role
    is used for report authors who work with Report Builder or Visual Studio to create
    and deploy reports.

    - **Report Builder:** The Report Builder role is used primarily for assigning
    the required permissions to users who will use the Report Builder application
    launched from Report Manager, which is covered in [Chapter 09](#Chapter09.html).


    SSRS roles are defined by the tasks that users assigned to each role may perform.
    SSRS tasks provide content management permissions and define which SSRS objects
    are viewable by the user. Users can perform the following tasks:


    - Consume reports

    - Create linked reports

    - Manage all subscriptions

    - Manage data sources

    - Manage folders

    - Manage individual subscriptions

    - Manage models

    - Manage report history

    - Manage reports

    - Manage resources

    - Set security for individual items

    - View data sources

    - View folders

    - View models

    - View reports

    - View resources


    Each predefined role is configured by default, with a specific combination of
    allowable tasks. Users assigned to the Publisher role, for example, may manage
    folders, reports, resources, models, and data sources as well as create linked
    reports.


