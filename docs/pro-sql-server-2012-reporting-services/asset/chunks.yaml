    those sourcing from a database, a Web service, or even an object. Just remember
    that, much like this example, it is up to you to retrieve the data and populate
    the data source with it.


    Next you’ll create a local RDL (.rdlc) that you’ll render using the Report Viewer
    control in local processing mode.


    #### Designing the Report


    To design the report, follow these steps:


    > 1.  To add a report to the project, right-click the project name—SSRS Viewer
    RVC—in the Solution Explorer.

    > 2.  On the shortcut menu, select Add ![Image](images/U004.jpg) New Item. This
    opens the Add New Item dialog box.

    > 3.  Select the Reporting section on the list to the left, then click the Report
    icon, enter **EmployeePay.rdlc** for the file name, and then click Add. This launches
    the Report Designer functionality in Visual Studio. The .rdlc extension signifies
    that it is a report for client or local rendering.

    > 4.  Make sure the report is selected. Open the Toolbox. From the Toolbox, drag
    a Table report item onto the report.

    > 5.  You should now be presented with the Dataset Properties window. From this
    window, select the Employees option in the Data Source drop down list. You will
    see the fields from this data source populated in the Fields data grid to the
    right. Name this dataset Employees_EmployeePay and click OK.

    > 6.  You should now see the table in your report designer. In the Data row of
    the first column, click the field icon in the top right hand corner to select
    a field. In the first column select the Employee ID field.

    > 7.  Perform this task again for the second and third columns. Choose StartDate
    and Amount for the second and third column, respectively.

    > 8.  Add a textbox to the top of the report and use the text “Employee Pay Report”
    for the value.


    You should now have a report that looks like [Figure 9-5](#Chapter09.html#fig_9_5).


    ![Image](images/9781430238102_Fig09-05.jpg)


    ***Figure 9-5.** Local report in the designer*


    Now you have a report that uses the dataset you created as a data source. Add
    the code shown in [Listing 9-3](#Chapter09.html#list_9_3) to the runLocal button’s
    click event to populate the dataset and display the values in the Report Viewer
    control using the .rdlc file you have created. Make sure the ViewerRVC.cs form
    is open in design view, and double-click the Run Local button. This will create
    an empty method to handle the button’s click event.


    ***Listing 9-3.** runLocal click Event: Running Report in Local Mode*


    `private void runLocal_Click(object sender, EventArgs e)`

    `{`

    `Employees empDS = new Employees();`

    `empDS.ReadXml(@"C:\Temp\EmployeePay.xml");`

    `reportViewer.ProcessingMode = ProcessingMode.Local;`

    `reportViewer.LocalReport.ReportEmbeddedResource = "SSRS_Viewer_RVC.EmployeePay.rdlc";`

    `reportViewer.LocalReport.DataSources.Add(new ReportDataSource("Employees_EmployeePay",
    empDS.Tables["EmployeePay"]));`

    `reportViewer.RefreshReport();`

    `}`


    ![Image](images/square.jpg) **Note** The ReportEmbeddedResource value must include
    the namespace of your project. If you entered spaces for the name of your project
    when you created it, the namespace will use underscores in place of each space.


    Now run the project, not the whole solution, in debug mode. Remember you can do
    this by right clicking the specific project and selecting Debug -> Start new instance.
    When the form displays, click Run Local. This renders the localEmployee Pay report.
    At this point, you should see something like [Figure 9-6](#Chapter09.html#fig_9_6).
    You’ve now created a report viewer in a Windows Forms application by using the
    WebBrowser control with URL rendering and by using the new Report Viewer control.
    You could stop at this point and just use these methods to render the reports
    and to display the report parameters, toolbar, and report. However, in this example,
    you want to use the SSRS 2012 Report Server Web service to get a list of parameters
    for the selected report and to display them to the user in a Windows Form. To
    get this list of parameters, you need to call the GetReportParameters method on
    the SSRS 2012 Report Server Web service.


    ![Image](images/9781430238102_Fig09-06.jpg)


    ***Figure 9-6.** SSRS Viewer RVC running a locally rendered report*


    #### Using the Report Server Web Service


    The SSRS 2012 Web service uses the SOAP API to allow you to call a variety of
    methods on the report server and interact with them using a rich set of objects
    provided by the service.


    There are two services that you should be concerned with in SSRS 2012\. The first,
    ReportingService2010, handles the management of the report server and the reports
    within. We will be using this service for the remainder of the chapter. The second
    service, ReportExecutionService, handles the programmatical rendering of reports
    without the use of a browser or report viewer.


    #### Web Services Method Categories


    The Report Server Web services can control every aspect of the report server and
    consists of several categories of methods, as listed in [Table 9-6](#Chapter09.html#tab_9_6).


    The Report Server Web services uses many of these methods to control aspects of
    SSRS 2012 that aren’t directly related to controlling reports, so we won’t cover
    them in this chapter. However, you should be aware of the level of control your
    custom application can have over SSRS 2012 and the types of functions that can
    be performed, because you might want to provide a user interface to them from
    your application. Keep in mind that Microsoft built the main SSRS 2012 report
    manager application using ASP.NET and these Web services.


    For the SSRS Viewer RVC, you are using the Report Viewer control to render the
    report, but you want to provide a custom Windows Forms–based user interface to
    allow users to enter their report parameters. The rest of this chapter concentrates
    on using methods from the report parameters category listed in [Table 9-6](#Chapter09.html#tab_9_6).
    You’ll use these methods to obtain a list of the parameters that the report expects
    and also to find the possible values for those parameters.


    ![Image](images/tab_9_6.jpg)


    You’ll use this information to create and populate combo boxes that allow the
    users to enter their choices from a Windows Forms dialog box.'
  trans: "### 创建报表的数据源\n首先，你需要通过添加之前创建的数据集来向项目添加数据源。要添加数据源，请按照以下步骤操作：\n1.  在“项目资源管理器”中，右键单击项目名称\
    \ `SSRS Viewer RVC`，指向 `添加`，然后选择 `现有项`。\n2.  导航到包含第 9 章示例的文件夹，并在 `SRSS Viewer\
    \ RVC` 文件夹中选择 `EmployeePay.xsd`。这是你将用于定义报表数据源的 XML 架构文件。当你将 `.xsd` 文件添加到项目时，它也会出现在“数据源”窗口下。如果你没有看到“数据源”窗口，请从菜单中选择\
    \ `数据` > `显示数据源`。\n\n![Image](img/square.jpg) **注意** 或者，你本可以使用通过选择 `数据` > `添加新数据源`\
    \ 找到的数据源配置向导。使用它，你可以创建多种类型的数据源，包括那些源自数据库、Web 服务甚至对象的数据源。请记住，就像本例一样，由你负责检索数据并用其填充数据源。\n\
    \n接下来，你将创建一个本地 RDL 文件（`.rdlc`），该文件将使用报表查看器控件在本地处理模式下进行渲染。\n\n### 设计报表\n要设计报表，请按照以下步骤操作：\n\
    1.  要向项目添加报表，请在“解决方案资源管理器”中右键单击项目名称—`SSRS Viewer RVC`。\n2.  在快捷菜单中，选择 `添加` > `新建项`。这将打开“添加新项”对话框。\n\
    3.  在左侧列表中选择“报表”部分，然后单击“报表”图标，输入文件名 `EmployeePay.rdlc`，然后单击 `添加`。这将在 Visual Studio\
    \ 中启动报表设计器功能。`.rdlc` 扩展名表示它是用于客户端或本地渲染的报表。\n4.  确保报表被选中。打开“工具箱”。从“工具箱”中，将“表”报表项拖放到报表上。\n\
    5.  现在应该会弹出“数据集属性”窗口。在此窗口中，从“数据源”下拉列表中选择 `Employees` 选项。你将看到来自此数据源的字段填充在右侧的“字段”数据网格中。将此数据集命名为\
    \ `Employees_EmployeePay`，然后单击 `确定`。\n6.  你现在应该在报表设计器中看到该表。在第一列的“数据”行中，单击右上角字段图标以选择一个字段。在第一列中选择\
    \ Employee ID 字段。\n7.  对第二列和第三列重复此操作。分别为第二列和第三列选择 `StartDate` 和 `Amount`。\n8.\
    \  在报表顶部添加一个文本框，并使用文本 “Employee Pay Report” 作为其值。\n\n你现在应该拥有一个类似于图 9-5 的报表。\n\n\
    ![Image](img/9781430238102_Fig09-05.jpg)\n\n**图 9-5.** 设计器中的本地报表\n\n现在，你拥有一个使用你创建的数据集作为数据源的报表。将清单\
    \ 9-3 中所示的代码添加到 `runLocal` 按钮的单击事件中，以填充数据集并使用你创建的 `.rdlc` 文件在报表查看器控件中显示值。确保 `ViewerRVC.cs`\
    \ 窗体在设计视图中打开，然后双击“运行本地”按钮。这将创建一个用于处理按钮单击事件的空方法。\n\n**清单 9-3.** `runLocal` 单击事件：在本地模式下运行报表\n\
    \n```\nprivate void runLocal_Click(object sender, EventArgs e)\n{\n    Employees\
    \ empDS = new Employees();\n    empDS.ReadXml(@\"C:\\Temp\\EmployeePay.xml\");\n\
    \    reportViewer.ProcessingMode = ProcessingMode.Local;\n    reportViewer.LocalReport.ReportEmbeddedResource\
    \ = \"SSRS_Viewer_RVC.EmployeePay.rdlc\";\n    reportViewer.LocalReport.DataSources.Add(new\
    \ ReportDataSource(\"Employees_EmployeePay\", empDS.Tables[\"EmployeePay\"]));\n\
    \    reportViewer.RefreshReport();\n}\n```\n\n![Image](img/square.jpg) **注意**\
    \ `ReportEmbeddedResource` 值必须包含你的项目命名空间。如果你在创建项目时为项目名称输入了空格，命名空间将使用下划线替代每个空格。\n\
    \n现在，在调试模式下运行项目（不是整个解决方案）。记住，你可以通过右键单击特定项目并选择 `调试` -> `启动新实例` 来执行此操作。当窗体显示时，单击\
    \ `运行本地`。这将渲染本地员工工资报表。此时，你应该看到类似于图 9-6 的内容。你现在已经通过使用 WebBrowser 控件进行 URL 渲染和使用新的报表查看器控件，在\
    \ Windows 窗体应用程序中创建了一个报表查看器。你可以在此时停止，并仅使用这些方法来渲染报表以及显示报表参数、工具栏和报表。但是，在本示例中，你希望使用\
    \ SSRS 2012 报表服务器 Web 服务来获取所选报表的参数列表，并在 Windows 窗体中向用户显示它们。要获取此参数列表，你需要在 SSRS\
    \ 2012 报表服务器 Web 服务上调用 `GetReportParameters` 方法。\n\n![Image](img/9781430238102_Fig09-06.jpg)\n\
    \n**图 9-6.** 正在运行本地渲染报表的 SSRS Viewer RVC\n\n### 使用报表服务器 Web 服务\nSSRS 2012 Web\
    \ 服务使用 SOAP API，允许你在报表服务器上调用各种方法，并使用该服务提供的一组丰富的对象与它们进行交互。\n\n在 SSRS 2012 中，有两个你应该关注的服务。第一个是\
    \ `ReportingService2010`，它处理报表服务器及其内部报表的管理。我们将在本章的剩余部分使用此服务。第二个服务 `ReportExecutionService`，处理无需浏览器或报表查看器即可程序化渲染报表。\n\
    \n### Web 服务方法类别\n报表服务器 Web 服务可以控制报表服务器的各个方面，由几个类别的方法组成，如表 9-6 所列。\n\n报表服务器 Web\
    \ 服务使用其中许多方法来控制与直接控制报表不直接相关的 SSRS 2012 方面，因此我们不在本章中介绍它们。但是，你应该了解你的自定义应用程序对 SSRS\
    \ 2012 的控制级别以及可以执行的功能类型，因为你可能希望从应用程序中为它们提供用户界面。请记住，Microsoft 是使用 ASP.NET 和这些 Web\
    \ 服务构建主要的 SSRS 2012 报表管理器应用程序的。\n\n对于 SSRS Viewer RVC，你正在使用报表查看器控件来渲染报表，但你希望提供一个基于\
    \ Windows 窗体的自定义用户界面，以允许用户输入他们的报表参数。本章的其余部分集中使用表 9-6 中列出的报表参数类别的方法。你将使用这些方法来获取报表期望的参数列表，并查找这些参数的可能值。\n\
    \n![Image](img/tab_9_6.jpg)\n\n你将使用此信息来创建和填充组合框，允许用户在 Windows 窗体对话框中输入他们的选择。"
- fmt: "#### Creating the GetParameters Form\n\nYou already have a form (`ViewerRVC.cs`)\
    \ to render and display the report in the embedded Report Viewer control. You’ll\
    \ now add a second form to the project that you’ll use to display the report and\
    \ rendering parameters and to allow the users to make their selections.\n\nSo,\
    \ add a `GetParameters` form to your project by selecting **Project** ![Image](images/U004.jpg)\
    \ **Add Windows Form**. Name the form `GetParameters.cs` and modify the title\
    \ text of the form to `Parameters`. Onto this form, add two controls from the\
    \ Toolbox; add a `FlowLayoutPanel` control named `parameterPanel` from the Containers\
    \ section, and add one button control named `buttonOK` in the button properties\
    \ window. Then set the text property for the button to `OK` in the button properties\
    \ window. When you’re done, the form should look like [Figure 9-7](#Chapter09.html#fig_9_7).\n\
    \n![Image](images/9781430238102_Fig09-07.jpg)\n\n##### Figure 9-7. SSRS Viewer\
    \ RVC `GetParameters` form\n\nYou now need to add a reference to the SSRS 2012\
    \ Web service to your project. You do this by selecting **Project** ![Image](images/U004.jpg)\
    \ **Add Service Reference** or by right clicking the **Service References** in\
    \ the **Solution Explorer** and selecting **Add Service Reference**. When the\
    \ dialog box appears click the **Advanced** button at the bottom of the form.\
    \ On this next form, click the **Add Web Reference** button. From here, enter\
    \ the following URL:\n\n`http://localhost/reportserver/reportservice2010.asmx`\n\
    \nSubstitute the name of your server for `localhost`, if need be. Then click the\
    \ **Go** button, which is the right arrow icon. You’ll see a dialog box similar\
    \ to [Figure 9-8](#Chapter09.html#fig_9_8).\n\n![Image](images/9781430238102_Fig09-08.jpg)\n\
    \n##### Figure 9-8. Adding an SSRS 2008 Web service reference\n\nIn the **Web\
    \ Reference Name** textbox, enter `SSRSWebService`, which is the name by which\
    \ you’ll refer to your Web service in your code. From here, click the **Add Reference**\
    \ button to finalize the reference addition.\n\nOnce this dialog box is closed,\
    \ you will add the following `using` statement to the top of your code in the\
    \ `GetParameters` class file. Note that if your project name is different from\
    \ `SSRS Viewer RVC`, you should change the reference to reflect the name of your\
    \ project.\n\n```csharp\nusing SSRS_Viewer_RVC.SSRSWebService;\n```\n\nNow you\
    \ can reference the methods and properties exposed by the Web service much more\
    \ easily because you won’t have to enter the fully qualified namespace. Also,\
    \ add the following other directives underneath the one you just added:\n\n```csharp\n\
    using System.Web.Services.Protocols;\nusing System.Collections;\n```\n\nDoing\
    \ this will allow you to access the members of these namespaces without needing\
    \ to type the full namespace each time you use a method or property from that\
    \ namespace.\n\nBecause you’ll use this form as a dialog box to display the report\
    \ parameters and their possible values, and allow the user to select them, you\
    \ need a way to communicate between the main form and this newly created `GetParameters`\
    \ form. We will set that communication up in the next section.\n\n#### Coding\
    \ the Report Parameters Form\n\nWhen you instantiate the report parameters form\
    \ (`GetParameters.cs`), you do so by passing in the URL of the report the user\
    \ has entered in the viewer form (`ViewerRVC.cs`). You use this URL to determine\
    \ the report server name and the specific report the user wants to run. You need\
    \ to know both of these for the calls to the Report Server Web service. Because\
    \ you’ll use this information throughout the rest of the code, in your `GetParameter`\
    \ class you will store them in some class-level private variables, as shown in\
    \ [Listing 9-4](#Chapter09.html#list_9_4). Add the list of private variables to\
    \ your `GetParameter.cs` class code directly after the class start.\n\n##### Listing\
    \ 9-4. Class-Level Private Variables\n\n```csharp\npublic partial class GetParameters\
    \ : Form\n{\n    private string url;\n    private string server;\n    private\
    \ string report;\n    private Microsoft.Reporting.WinForms.ReportParameter[] parameters;\n\
    \    ReportingService2010 rs;\n```\n\nIn the form constructor, which will take\
    \ the URL string as the only parameter, we will break the report server and report\
    \ name into two separate fields. To break down the URL into the server and report\
    \ name, use the `string` `Split` method and create a constructor that looks like\
    \ [Listing 9-5](#Chapter09.html#list_9_5). Add this constructor code, the code\
    \ that is first run when an object of a class type is created, directly below\
    \ the private variables. You will need to add the `string` parameter called `URL`\
    \ to the constructor as well.\n\n##### Listing 9-5. Report Parameters Form Constructor\n\
    \n```csharp\npublic GetParameters (string URL)\n{\n    InitializeComponent();\n\
    \    url = URL;\n    string[] reportInfo = url.Split('?');\n    server = reportInfo[0];\n\
    \    report = reportInfo[1];\n}\n```\n\n#### The GetParameters_Load Event\n\n\
    Now you get to where the real work for this dialog box takes place: the `Form_Load`\
    \ event. To create this method automatically, open your `GetParameters` form in\
    \ display mode and double click your form where there are no components, such\
    \ as the top bar. This will open your form in code view and already have the `GetParameters_Load`\
    \ method created and link it to the form’s load event.\n\nNext, create a `ReportingService`\
    \ object so that you can access SSRS 2012 through the Web service that you added\
    \ as a reference earlier. Then, set your Windows credentials as the credentials\
    \ to be used for calling the Web service, like so:\n\n```csharp\nrs = new ReportingService2005();\n\
    rs.Credentials = System.Net.CredentialCache.DefaultCredentials;\n```\n\n![Image](images/square.jpg)\
    \ **Note** You can also use Basic authentication using `rs.Credentials = new System.Net.NetworkCredential(\"\
    username\", \"password\", \"domain\");`. The method you use depends on the security\
    \ settings for the report server virtual directory. By default, it’s configured\
    \ to use Windows authentication."
