    \ Windows 窗体应用程序的用户创建下拉列表，然后呈现报告。\n\n#### 创建查看器表单\n\n要在 C# 中创建查看器表单，您将首先通过执行以下步骤向解决方案添加一个新项目：\n\
    \n> 1.  从菜单中选择 **文件** ![Image](img/U004.jpg) **添加** ![Image](img/U004.jpg) **新建项目**。\n\
    > 2.  在“新建项目”对话框中，选择 **Visual C#** ![Image](img/U004.jpg) **Windows** ![Image](img/U004.jpg)\
    \ **Windows 窗体应用程序**。将其命名为 `SSRS Viewer RVC`。\n> 3.  创建项目后，您将使用将创建报表查看器的窗体：\n\
    > 4.  将刚刚创建的默认窗体重命名为 `ViewerRVC.cs`。\n> 5.  在解决方案资源管理器中双击 `ViewerRVC.cs` 文件，在设计模式下打开它。\n\
    > 6.  将空白窗体的大小调整为大约 800×600 像素，并在属性部分将窗体的文本更改为 `SSRS Viewer RVC`。\n> 7.  从工具箱的“Reporting”部分将\
    \ Report Viewer 控件添加到窗体。在属性中将控件命名为 `reportViewer`，并将其锚定到窗体的顶部、底部、左侧和右侧。调整控件的大小以填充窗体，但要在顶部留出空间放置更多组件。（如果您没有报表查看器控件，可能需要从以下网址下载：`www.microsoft.com/download/en/details.aspx?id=6610`）\n\
    > 8.  现在添加一个文本框，命名为 `reportURL`，紧接着文本框添加三个按钮，分别命名为 `runServer`、`runLocal` 和 `getParameters`。将它们的\
    \ `Text` 属性分别设置为 `Run Server`、`Run Local` 和 `Parameters`。\n\n您现在应该有一个看起来像图 9-3\
    \ 的窗体。\n\n![Image](img/square.jpg) **注意** 在 Visual Studio 2010 中，您需要使用 .NET Framework\
    \ 3.5 或更高版本才能在 IDE 中获得 `ReportViewer` 控件。如果使用任何更早的版本，您将无法从工具箱中将查看器添加到项目中。\n\n\
    现在，您将开始添加使用新的 Report Viewer 控件来呈现 SSRS 2012 报告所需的代码。\n\n![Image](img/9781430238102_Fig09-03.jpg)\n\
    \n***图 9-3.** ViewerRVC.cs 窗体*\n\n#### 编写查看器表单代码\n\n首先，将新的命名空间 `Microsoft.Reporting.WinForms`\
    \ 的 `using` 语句添加到类顶部的其他命名空间声明中。这样做将允许您访问该命名空间的成员，而无需在每次使用来自该命名空间的方法或属性时键入完整的命名空间。右键单击\
    \ `ViewerRVC.cs` 文件并选择“查看代码”，将此 `using` 语句添加到文件中。\n\n```\nusing Microsoft.Reporting.WinForms;\n\
    ```\n\n其次，将清单 9-2 中显示的代码添加到“Run Server”按钮的 `Click` 事件中。确保 `ViewerRVC.cs` 窗体在设计视图中打开，然后双击“Run\
    \ Server”按钮。这将创建一个空方法来处理按钮的 `Click` 事件。\n\n***清单 9-2.** runServer 点击事件：在远程模式下运行报告*\n\
    \n```\nprivate void runServer_Click(object sender, EventArgs e) {\n    reportURL.Text\
    \ = \"/Pro_SSRS/Chapter_9/EmployeeServiceCost\";\n    reportViewer.ProcessingMode\
    \ = ProcessingMode.Remote;\n    reportViewer.ServerReport.ReportServerUrl = new\
    \ Uri(@\"http://localhost/reportserver/\");\n    reportViewer.ServerReport.ReportPath\
    \ = reportURL.Text;\n    reportViewer.RefreshReport();\n}\n```\n\n现在以调试模式运行项目。然后单击“Run\
    \ Server”。这将呈现员工服务成本报告，您可以在其中输入报告的参数。当然，您需要在清单 9-2 中看到 `localhost` 的地方使用您的报告服务器的名称。此时，您应该看到类似图\
    \ 9-4 的内容。\n\n![Image](img/9781430238102_Fig09-04.jpg)\n\n***图 9-4.** SSRS Viewer\
    \ RVC 运行服务器呈现的报告*\n\n这就是使用 Report Viewer 控件在 SSRS 2012 服务器上呈现报告的全部内容。\n\n### 本地呈现报告\n\
    \n我们现在将介绍如何在不使用 SSRS 2012 服务器的情况下在本地呈现报告。这有点复杂，因为您需要负责用报告所需的数据填充数据源。但是，它确实为开发人员提供了极大的灵活性，因为您可以在没有服务器的情况下使用\
    \ SSRS 2012 报告功能。\n\n![Image](img/square.jpg) **注意** 服务器和本地报表定义文件并非 100% 兼容。这意味着无法将同一个\
    \ RDL 源文件同时用于本地和远程使用。实际上，您会注意到，默认情况下，用于服务器端或远程处理的报告创建时使用 `.rdl` 扩展名，而用于客户端或本地处理的报告创建时使用\
    \ `.rdlc` 扩展名。虽然它们并非 100% 可互换，但您可以通过对底层 RDL 进行一些更改来将一个用于另一个。"
- fmt: "### Creating the Report’s Data Source\nFirst, you will add a data source to\
    \ your project by adding the dataset you created previously. To add the data source,\
    \ follow these steps:\n1.  In the Project Explorer, right-click the project name\
    \ `SSRS Viewer RVC`, point to `Add`, and select `Existing Item`.\n2.  Navigate\
    \ to the folder containing the [Chapter 9](#Chapter09.html#ch9) examples, and\
    \ select `EmployeePay.xsd` in the `SRSS Viewer RVC` folder. This is the XML schema\
    \ file you’ll use to define your data source for the report. When you add the\
    \ `.xsd` file to your project, it will also appear under the Data Sources window.\
    \ If you don’t see the Data Sources window, select `Data` > `Show Data Sources`\
    \ from the menu.\n\n![Image](images/square.jpg) **Note** Alternatively, you could\
    \ have used the Data Source Configuration Wizard found by selecting `Data` > `Add\
    \ New Data Source`. With it you can create several types of data sources including\
    \ those sourcing from a database, a Web service, or even an object. Just remember\
    \ that, much like this example, it is up to you to retrieve the data and populate\
    \ the data source with it.\n\nNext you’ll create a local RDL (`.rdlc`) that you’ll\
    \ render using the Report Viewer control in local processing mode.\n\n### Designing\
    \ the Report\nTo design the report, follow these steps:\n1.  To add a report to\
    \ the project, right-click the project name—`SSRS Viewer RVC`—in the Solution\
    \ Explorer.\n2.  On the shortcut menu, select `Add` > `New Item`. This opens the\
    \ Add New Item dialog box.\n3.  Select the Reporting section on the list to the\
    \ left, then click the Report icon, enter `EmployeePay.rdlc` for the file name,\
    \ and then click `Add`. This launches the Report Designer functionality in Visual\
    \ Studio. The `.rdlc` extension signifies that it is a report for client or local\
    \ rendering.\n4.  Make sure the report is selected. Open the Toolbox. From the\
    \ Toolbox, drag a Table report item onto the report.\n5.  You should now be presented\
    \ with the Dataset Properties window. From this window, select the `Employees`\
    \ option in the Data Source drop down list. You will see the fields from this\
    \ data source populated in the Fields data grid to the right. Name this dataset\
    \ `Employees_EmployeePay` and click `OK`.\n6.  You should now see the table in\
    \ your report designer. In the Data row of the first column, click the field icon\
    \ in the top right hand corner to select a field. In the first column select the\
    \ Employee ID field.\n7.  Perform this task again for the second and third columns.\
    \ Choose `StartDate` and `Amount` for the second and third column, respectively.\n\
    8.  Add a textbox to the top of the report and use the text “Employee Pay Report”\
    \ for the value.\n\nYou should now have a report that looks like [Figure 9-5](#Chapter09.html#fig_9_5).\n\
    \n![Image](images/9781430238102_Fig09-05.jpg)\n\n**Figure 9-5.** Local report\
    \ in the designer\n\nNow you have a report that uses the dataset you created as\
    \ a data source. Add the code shown in [Listing 9-3](#Chapter09.html#list_9_3)\
    \ to the `runLocal` button’s click event to populate the dataset and display the\
    \ values in the Report Viewer control using the `.rdlc` file you have created.\
    \ Make sure the `ViewerRVC.cs` form is open in design view, and double-click the\
    \ Run Local button. This will create an empty method to handle the button’s click\
    \ event.\n\n**Listing 9-3.** `runLocal` click Event: Running Report in Local Mode\n\
    \n```\nprivate void runLocal_Click(object sender, EventArgs e)\n{\n    Employees\
    \ empDS = new Employees();\n    empDS.ReadXml(@\"C:\\Temp\\EmployeePay.xml\");\n\
    \    reportViewer.ProcessingMode = ProcessingMode.Local;\n    reportViewer.LocalReport.ReportEmbeddedResource\
    \ = \"SSRS_Viewer_RVC.EmployeePay.rdlc\";\n    reportViewer.LocalReport.DataSources.Add(new\
    \ ReportDataSource(\"Employees_EmployeePay\", empDS.Tables[\"EmployeePay\"]));\n\
    \    reportViewer.RefreshReport();\n}\n```\n\n![Image](images/square.jpg) **Note**\
    \ The `ReportEmbeddedResource` value must include the namespace of your project.\
    \ If you entered spaces for the name of your project when you created it, the\
    \ namespace will use underscores in place of each space.\n\nNow run the project,\
    \ not the whole solution, in debug mode. Remember you can do this by right clicking\
    \ the specific project and selecting `Debug` -> `Start new instance`. When the\
    \ form displays, click `Run Local`. This renders the local Employee Pay report.\
    \ At this point, you should see something like [Figure 9-6](#Chapter09.html#fig_9_6).\
    \ You’ve now created a report viewer in a Windows Forms application by using the\
    \ WebBrowser control with URL rendering and by using the new Report Viewer control.\
    \ You could stop at this point and just use these methods to render the reports\
    \ and to display the report parameters, toolbar, and report. However, in this\
    \ example, you want to use the SSRS 2012 Report Server Web service to get a list\
    \ of parameters for the selected report and to display them to the user in a Windows\
    \ Form. To get this list of parameters, you need to call the `GetReportParameters`\
    \ method on the SSRS 2012 Report Server Web service.\n\n![Image](images/9781430238102_Fig09-06.jpg)\n\
    \n**Figure 9-6.** SSRS Viewer RVC running a locally rendered report\n\n### Using\
    \ the Report Server Web Service\nThe SSRS 2012 Web service uses the SOAP API to\
    \ allow you to call a variety of methods on the report server and interact with\
    \ them using a rich set of objects provided by the service.\n\nThere are two services\
    \ that you should be concerned with in SSRS 2012. The first, `ReportingService2010`,\
    \ handles the management of the report server and the reports within. We will\
    \ be using this service for the remainder of the chapter. The second service,\
    \ `ReportExecutionService`, handles the programmatical rendering of reports without\
    \ the use of a browser or report viewer.\n\n### Web Services Method Categories\n\
    The Report Server Web services can control every aspect of the report server and\
    \ consists of several categories of methods, as listed in [Table 9-6](#Chapter09.html#tab_9_6).\n\
    \nThe Report Server Web services uses many of these methods to control aspects\
    \ of SSRS 2012 that aren’t directly related to controlling reports, so we won’t\
    \ cover them in this chapter. However, you should be aware of the level of control\
    \ your custom application can have over SSRS 2012 and the types of functions that\
    \ can be performed, because you might want to provide a user interface to them\
    \ from your application. Keep in mind that Microsoft built the main SSRS 2012\
    \ report manager application using ASP.NET and these Web services.\n\nFor the\
    \ SSRS Viewer RVC, you are using the Report Viewer control to render the report,\
    \ but you want to provide a custom Windows Forms–based user interface to allow\
    \ users to enter their report parameters. The rest of this chapter concentrates\
    \ on using methods from the report parameters category listed in [Table 9-6](#Chapter09.html#tab_9_6).\
    \ You’ll use these methods to obtain a list of the parameters that the report\
    \ expects and also to find the possible values for those parameters.\n\n![Image](images/tab_9_6.jpg)\n\
    \nYou’ll use this information to create and populate combo boxes that allow the\
    \ users to enter their choices from a Windows Forms dialog box."
