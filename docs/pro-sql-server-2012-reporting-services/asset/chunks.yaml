- fmt: '#### Configuring Report Deployment Options


    BIDS/Visual Studio 2010 allows you to configure a different set of properties
    for each project in your solution. You also can set these properties for each
    configuration available for your project, such as `Debug`, `DebugLocal`, and `Release`.
    For each configuration of a report project, you can define values uniquely for
    the following properties:


    > *   Start Item: The name of the report to be displayed in the preview window
    or in a browser window when the report project is run.

    > *   `OverwriteDataSets`: A Boolean value that configures whether to overwrite
    existing data set definitions on the report server. Setting this value to `true`
    will overwrite any data set definitions when deploying.

    > *   `OverwriteDataSources`: A Boolean value indicating whether to overwrite
    an existing data source on the server. Set it to `true` to overwrite, which redeploys
    any data sources you have defined in your project each time you select `Deploy`.
    Set it to `false` if you don’t want existing data sources to be overwritten.

    > *   `TargetDataSetFolder`: The name of the folder where your shared datasets,
    whether a report server path or a SharePoint library, are placed.

    > *   `TargetDataSourceFolder`: The name of the folder in which to place your
    shared data sources.

    > *   `TargetReportFolder`: The name of the folder in which to place your reports.
    By default, this is the name of the report project.

    > *   `TargetReportPartFolder`: The name of the folder in which to place your
    report parts that are shared with other reports.

    > *   `TargetServerURL`: The URL of the target report server, such as `http://localhost/reportserver`.

    > *   `TargetServerVersion`: This option allows you to specify what version of
    SSRS the deployment server is running. You can also have this option auto-detect
    the version if you have already configured the target server URL.


    The different configurations are convenient for the report developer because you
    can set up different servers and/or folders for testing and deployment in the
    same project. By default, when you create a report project, BIDS/Visual Studio
    2010 creates three different configurations for you: `Debug`, `DebugLocal`, and
    `Production`. You can access the properties of these configurations through the
    project’s Property Pages. To get to the configuration Property Pages, in the Solution
    Explorer, right-click the project containing the reports and then click `Properties`.
    To see the property settings for each configuration option, select from the `Configuration`
    drop-down list at the top of the properties dialog box. [Figure 8-8](#Chapter08.html#fig_8_8)
    shows the Property Pages for the Reports project in the [Chapter 6](#Chapter06.html#ch6)
    solution that is part of the sample code provided for this chapter in the Source
    Code/Download area of the Apress Web site (`http://www.apress.com`).


    ![Image](images/9781430238102_Fig08-08.jpg)


    *Figure 8-8. Project Property Pages*


    After the configuration information is set up correctly, you can deploy reports
    to your server by using the `Build` and `Deploy` options in the Configuration
    Manager or by using the Solution Explorer.


    #### Setting Up Deployments Using the Configuration Manager


    The `Build` and `Deploy` options in the Configuration Manager determine whether
    reports are built, deployed, or both when you start the project in Visual Studio
    2010.


    To open the Configuration Manager, in the Solution Explorer, right-click the project
    containing the reports and then click `Properties`. From there, click `Configuration
    Manager` to open the dialog box shown in [Figure 8-9](#Chapter08.html#fig_8_9).


    ![Image](images/9781430238102_Fig08-09.jpg)


    *Figure 8-9. Visual Studio 2012 Configuration Manager*


    By default, you see the setup for the currently active configuration. You can
    select other configurations by choosing from the `Active solution configuration`
    drop-down list. As you can see, for each project in your solution, checkboxes
    are in the `Build` and the `Deploy` columns.


    Each time you start the project, you want to build it so that you will always
    run the latest version of your report. If the `Deploy` checkbox is also checked,
    then whenever you start the project in that configuration, Visual Studio 2012
    deploys the reports to the specified server that is setup in the report project
    properties. However, for most configurations, such as when you’re debugging locally,
    you won’t want to deploy your report to the server each time the project is started,
    so keeping the deploy checkbox unchecked is what you would want.


    #### Deploying Reports Through the Solution Explorer


    You can also manually deploy reports from the Solution Explorer once you are satisfied
    that your reports are ready to be deployed. The following is a list of options
    for deploying from the Solution Explorer. You deploy your reports by right-clicking
    each of the following items and selecting `Deploy`:


    > *   *The solution:* Deploys the reports and data sources in all the Report Server
    projects in your solution to the server that has been set up in each of the project’s
    properties. This will deploy all projects in your solution, so use this only when
    you need to deploy everything.

    > *   *The project:* Deploys the reports and data sources in the specific project
    in your solution to the server that has been set up in the specified project’s
    properties. This option is only available for Report Server projects.

    > *   *The report:* Deploys an individual report or data source from a project
    in your solution to the server that has been set up in the project properties
    containing the report you’re deploying.


    [Figure 8-10](#Chapter08.html#fig_8_10) shows an example of how to deploy all
    the reports in a report project.


    ![Image](images/9781430238102_Fig08-10.jpg)


    *Figure 8-10. Deploying a solution through the Solution Explorer*'
  raw: '#### Configuring Report Deployment Options


    BIDS/Visual Studio 2010 allows you to configure a different set of properties
    for each project in your solution. You also can set these properties for each
    configuration available for your project, such as Debug, DebugLocal, and Release.
    For each configuration of a report project, you can define values uniquely for
    the following properties:


    > *   Start Item: The name of the report to be displayed in the preview window
    or in a browser window when the report project is run.

    > *   OverwriteDataSets: A Boolean value that configures whether to overwrite
    existing data set definitions on the report server. Setting this value to true
    will overwrite any data set definitions when deploying.

    > *   OverwriteDataSources: A Boolean value indicating whether to overwrite an
    existing data source on the server. Set it to true to overwrite, which redeploys
    any data sources you have defined in your project each time you select Deploy.
    Set it to false if you don’t want existing data sources to be overwritten.

    > *   TargetDataSetFolder: The name of the folder where your shared datasets,
    whether a report server path or a SharePoint library, are placed.

    > *   TargetDataSourceFolder: The name of the folder in which to place your shared
    data sources.

    > *   TargetReportFolder: The name of the folder in which to place your reports.
    By default, this is the name of the report project.

    > *   TargetReportPartFolder: The name of the folder in which to place your report
    parts that are shared with other reports.

    > *   TargetServerURL: The URL of the target report server, such as [`http://localhost/`](http://localhost/)
    reportserver.

    > *   TargetServerVersion: This option allows you to specify what version of SSRS
    the deployment server is running. You can also have this option auto-detect the
    version if you have already configured the target server URL.


    The different configurations are convenient for the report developer because you
    can set up different servers and/or folders for testing and deployment in the
    same project. By default, when you create a report project, BIDS/Visual Studio
    2010 creates three different configurations for you: Debug, DebugLocal, and Production.
    You can access the properties of these configurations through the project’s Property
    Pages. To get to the configuration Property Pages, in the Solution Explorer, right-click
    the project containing the reports and then click Properties. To see the property
    settings for each configuration option, select from the Configuration drop-down
    list at the top of the properties dialog box. [Figure 8-8](#Chapter08.html#fig_8_8)
    shows the Property Pages for the Reports project in the [Chapter 6](#Chapter06.html#ch6)
    solution that is part of the sample code provided for this chapter in the Source
    Code/Download area of the Apress Web site ([`http://www.apress.com`](http://www.apress.com)).


    ![Image](images/9781430238102_Fig08-08.jpg)


    ***Figure 8-8.** Project Property Pages*


    After the configuration information is set up correctly, you can deploy reports
    to your server by using the Build and Deploy options in the Configuration Manager
    or by using the Solution Explorer.


    #### Setting Up Deployments Using the Configuration Manager


    The Build and Deploy options in the Configuration Manager determine whether reports
    are built, deployed, or both when you start the project in Visual Studio 2010.


    To open the Configuration Manager, in the Solution Explorer, right-click the project
    containing the reports and then click Properties. From there, click Configuration
    Manager to open the dialog box shown in [Figure 8-9](#Chapter08.html#fig_8_9).


    ![Image](images/9781430238102_Fig08-09.jpg)


    ***Figure 8-9.** Visual Studio 2012 Configuration Manager*


    By default, you see the setup for the currently active configuration. You can
    select other configurations by choosing from the Active solution configuration
    drop-down list. As you can see, for each project in your solution, checkboxes
    are in the Build and the Deploy columns.


    Each time you start the project, you want to build it so that you will always
    run the latest version of your report. If the Deploy checkbox is also checked,
    then whenever you start the project in that configuration, Visual Studio 2012
    deploys the reports to the specified server that is setup in the report project
    properties. However, for most configurations, such as when you’re debugging locally,
    you won’t want to deploy your report to the server each time the project is started,
    so keeping the deploy checkbox unchecked is what you would want.


    #### Deploying Reports Through the Solution Explorer


    You can also manually deploy reports from the Solution Explorer once you are satisfied
    that your reports are ready to be deployed. The following is a list of options
    for deploying from the Solution Explorer. You deploy your reports by right-clicking
    each of the following items and selecting Deploy:


    > *   *The solution:* Deploys the reports and data sources in all the Report Server
    projects in your solution to the server that has been set up in each of the project’s
    properties. This will deploy all projects in your solution, so use this only when
    you need to deploy everything.

    > *   *The project:* Deploys the reports and data sources in the specific project
    in your solution to the server that has been set up in the specified project’s
    properties. This option is only available for Report Server projects.

    > *   *The report:* Deploys an individual report or data source from a project
    in your solution to the server that has been set up in the project properties
    containing the report you’re deploying.


    [Figure 8-10](#Chapter08.html#fig_8_10) shows an example of how to deploy all
    the reports in a report project.


    ![Image](images/9781430238102_Fig08-10.jpg)


    ***Figure 8-10.** Deploying a solution through the Solution Explorer*'
  trans: '

    #### 配置报告部署选项


    BIDS/Visual Studio 2010 允许你为解决方案中的每个项目配置一组不同的属性。你还可以为项目可用的每个配置（例如 `Debug`、`DebugLocal`
    和 `Release`）设置这些属性。对于报告项目的每个配置，你可以为以下属性定义唯一的值：


    > *   起始项：运行报告项目时要在预览窗口或浏览器窗口中显示的报告名称。

    > *   `OverwriteDataSets`：一个布尔值，用于配置是否覆盖报表服务器上现有的数据集定义。将此值设置为 `true` 将在部署时覆盖任何数据集定义。

    > *   `OverwriteDataSources`：一个布尔值，指示是否覆盖服务器上现有的数据源。将其设置为 `true` 以进行覆盖，这样每次选择
    `Deploy` 时都会重新部署你在项目中定义的任何数据源。如果你不希望现有数据源被覆盖，请将其设置为 `false`。

    > *   `TargetDataSetFolder`：放置你的共享数据集的文件夹名称，无论是报表服务器路径还是 SharePoint 库。

    > *   `TargetDataSourceFolder`：放置你的共享数据源的文件夹名称。

    > *   `TargetReportFolder`：放置你的报告的文件夹名称。默认情况下，这是报告项目的名称。

    > *   `TargetReportPartFolder`：放置你与其他报告共享的报告部件的文件夹名称。

    > *   `TargetServerURL`：目标报表服务器的 URL，例如 `http://localhost/reportserver`。

    > *   `TargetServerVersion`：此选项允许你指定部署服务器运行的 SSRS 版本。如果你已经配置了目标服务器 URL，也可以让此选项自动检测版本。


    不同的配置对报告开发人员来说很方便，因为你可以在同一个项目中为测试和部署设置不同的服务器和/或文件夹。默认情况下，当你创建报告项目时，BIDS/Visual
    Studio 2010 会为你创建三种不同的配置：`Debug`、`DebugLocal` 和 `Production`。你可以通过项目的属性页访问这些配置的属性。要进入配置属性页，请在解决方案资源管理器中，右键单击包含报告的项目，然后单击
    `Properties`。要查看每个配置选项的属性设置，请从属性对话框顶部的 `Configuration` 下拉列表中选择。图 8-8 显示了 Apress
    网站（`http://www.apress.com`）源代码/下载区中本章提供的示例代码的一部分，即第 6 章 解决方案中报告项目的属性页。


    ![Image](img/9781430238102_Fig08-08.jpg)


    *图 8-8. 项目属性页*


    配置信息正确设置后，你可以使用配置管理器中的 `Build` 和 `Deploy` 选项，或者使用解决方案资源管理器将报告部署到服务器。


    #### 使用配置管理器设置部署


    配置管理器中的 `Build` 和 `Deploy` 选项决定了在 Visual Studio 2010 中启动项目时，是构建报告、部署报告，还是两者都做。


    要打开配置管理器，请在解决方案资源管理器中，右键单击包含报告的项目，然后单击 `Properties`。然后，单击 `Configuration Manager`
    以打开如 图 8-9 所示的对话框。


    ![Image](img/9781430238102_Fig08-09.jpg)


    *图 8-9. Visual Studio 2012 配置管理器*


    默认情况下，你会看到当前活动配置的设置。你可以通过从 `Active solution configuration` 下拉列表中选择来选择其他配置。如图所示，对于解决方案中的每个项目，在
    `Build` 和 `Deploy` 列中都有复选框。


    每次启动项目时，你都希望构建它，以便始终运行报告的最新版本。如果 `Deploy` 复选框也被勾选，那么无论何时你在该配置下启动项目，Visual Studio
    2012 都会将报告部署到报告项目属性中设置的指定服务器。然而，对于大多数配置，例如当你在本地调试时，你可能不希望每次启动项目时都部署报告，因此保持部署复选框不勾选是你想要的操作。


    #### 通过解决方案资源管理器部署报告


    一旦你确信你的报告已准备好部署，也可以从解决方案资源管理器手动部署报告。以下是从解决方案资源管理器进行部署的选项列表。你通过右键单击以下每个项目并选择 `Deploy`
    来部署报告：


    > *   *解决方案：* 将解决方案中所有报表服务器项目中的报告和数据源部署到在各自项目属性中设置的服务器。这将部署解决方案中的所有项目，因此仅在你需要部署所有内容时使用此选项。

    > *   *项目：* 将解决方案中特定项目中的报告和数据源部署到在指定项目属性中设置的服务器。此选项仅对报表服务器项目可用。

    > *   *报告：* 将项目中单个报告或数据源部署到包含你要部署的报告的项目属性中设置的服务器。


    图 8-10 展示了如何部署报告项目中的所有报告的示例。


    ![Image](img/9781430238102_Fig08-10.jpg)


    *图 8-10. 通过解决方案资源管理器部署解决方案*

