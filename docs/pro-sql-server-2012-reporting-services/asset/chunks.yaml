    ## 从 .NET 应用程序渲染报表


    报表渲染是将报表结果输出到特定格式的过程。你需要向 `SSRS` 传递适当的参数，告诉它你想运行哪个报表，以及可选地指定输出格式、任何用户凭据和实际的报表参数。`SSRS
    2012` 随后渲染报表并返回结果。


    你传递这些参数的方式以及结果返回的方式，取决于你用于渲染报表的 `SSRS 2012` 方法。一旦 `SSRS` 获得了所需的信息（基于你运行的特定报表），它就会查询相应的数据源。`SSRS
    2012` 会酌情使用传递的凭据和参数，将报表渲染成一种中间格式，然后将此中间格式渲染并过滤成最终请求的显示格式。


    使用 `SSRS 2012`，你可以从 `.NET` 应用程序中通过三种方式渲染报表：


    ### 使用 URL


    你可以构建一个 `URL`，让客户端能够访问报表服务器上的报表，并提供任何适当的参数，包括渲染格式、登录信息、报表条件和报表筛选器。这是最灵活的方法之一，因为它几乎适用于任何可以托管或使用
    Web 浏览器或 Web 浏览器控件的语言和平台。事实上，它适用于任何能够创建格式正确的 `URL` 并能使用该 `URL` 启动 Web 浏览器的语言。我们可以使用
    `.NET` 中内置的 `WebBrowser` 控件和格式化的 `URL` 来渲染报表。


    ### 使用 SOAP API


    你可以使用 `SOAP API`（也称为报表服务器 Web 服务）来渲染报表。它将渲染后的数据作为流返回，然后你再进行显示。这是一种更困难的渲染方法，因为你从服务器获得的信息本质上是二进制数据流，并且你无法受益于服务器-浏览器组合来完成实际显示数据的工作。但是，你可以使用报表服务器
    Web 服务做更多的事情：你可以用它来访问报表服务器的全部功能。我们将展示如何在你的解决方案中使用报表服务器 Web 服务，以提供有关你正在渲染的报表的信息，例如报表所使用的报表参数。


    ### 使用报表查看器控件


    你可以使用 `Report Viewer control`。`SSRS 2012` 的这个选项提供了一个易于使用的 Windows 窗体应用程序或 `ASP.NET`
    用户控件，你只需将控件拖放到 Windows 窗体或 Web 窗体上，设置一些属性，即可渲染报表。`Report Viewer control` 的主要优点之一是，它允许你渲染位于
    `SSRS 2012` 报表服务器上的报表，也可以在本地渲染报表，而不需要报表服务器。


    ![Image](img/square.jpg) 注意 `Report Viewer controls` 包含在当前版本的 `SQL Server` 和 `Visual
    Studio` 中。你也可以为将要运行应用程序但未安装 `Visual Studio`/`SQL Server` 的机器下载可再发行组件包。


    虽然 `Report Viewer controls` 可能是大多数 `Visual Studio` 用户用来渲染报表的方法，但最通用的渲染方法是通过 `URL`
    访问。在这种情况下，`SSRS 2012` 为大多数报表选项提供了一些默认值。例如，`SSRS` 提供了一个默认的用户界面来输入参数和筛选信息。如果有必要，它会提示你输入登录信息，并且默认以
    `HTML` 格式进行渲染。你只需在浏览器中传递报表的 `URL` 即可获得所有这些功能。如果你仅使用 Web 浏览器渲染报表，而没有其他控制应用程序，这是最有用的。


    你可以选择随 `URL` 传递参数来更改这些默认行为，提供登录信息，更改渲染格式，隐藏参数工具栏等等。如果你有一个自定义应用程序并希望自己控制这些选项，而不是提供默认用户界面，这会很有用。


    你可以使用报表服务器 Web 服务执行许多相同的操作，但没有真正的默认设置，并且返回数据的实际显示方式由应用程序开发人员决定。通过在 `ASP.NET` 应用程序中使用
    Web 浏览器，或将其嵌入 Windows 窗体应用程序，你可以获得 `URL` 渲染方法的好处，同时又能对其加以控制。这为用户提供了更集成化的体验。本章介绍的方法在很大程度上适用于
    Windows 窗体和 Web 窗体应用程序。对于其中一个项目，我们将展示如何构建一个基于 Windows 窗体的报表查看器，让你可以使用 `SSRS 2012`
    作为应用程序的报表解决方案。


    在本章中，你将执行以下操作：


    ### URL 渲染访问


    学习如何构建一个 `URL`，客户端应用程序通过它来访问报表服务器上的报表。在示例中，你将使用 Employee Service Cost 报表（可在 Apress
    网站的源代码/下载部分找到，网址为 [`www.apress.com`](http://www.apress.com)，包含在本章的代码下载中）。


    ### URL 报表参数


    探索在 `URL` 中指定的报表参数，这些参数控制报表的渲染方式。你可以指定实际格式（例如 `HTML` 或 `PDF`）。你可以指定渲染报表中的特定页面，或者你可以搜索特定单词并从该页面开始渲染。


    ### URL 查看器应用程序


    构建一个简单的 `.NET` Windows 窗体应用程序，通过嵌入窗体的 `WebBrowser` 控件访问和渲染报表。


    ### 报表服务器 Web 服务调用


    使用对报表服务器 Web 服务的调用来查询报表条件和筛选参数。这允许你在 Windows 窗体应用程序上显示这些信息。然后，你将再次使用 `SOAP API`
    来查看参数是否有可供用户选择的值列表。如果有，你将使用这些值为每个参数填充组合框。你还将给用户一个组合框来选择渲染格式。然后，你将向用户显示所有选择，并使用他们选择的值来创建一个包含运行报表所需的所有信息的
    `URL`。最后，你将使用这个 `URL` 和嵌入的 Web 浏览器，根据用户输入的报表参数和渲染命令来渲染报表。


    ### 报表查看器控件，服务器端模式


    使用 `Report Viewer control`，利用该控件的服务器端模式渲染相同的报表。


    ### 报表查看器控件，本地渲染


    使用 `Report Viewer control` 和本地填充的数据集，在没有 `SSRS` 报表服务器的情况下在本地渲染报表。


    ### 在 ASP.NET 应用程序中使用报表查看器控件


    使用 `Report Viewer control` 渲染服务器端报表。我们将利用 Web 服务来检索可供选择的报表列表。


    在运行包含的示例之前，请务必阅读 `ReadMe.htm`。它位于示例根文件夹中的一个文件里。如果你在 `Visual Studio` 中打开代码，它将在“解决方案项”文件夹下。它包含了运行示例之前所需的设置和配置步骤。

    '
- fmt: '### Implementing URL Access


    In this section, we’ll show you how to build a URL that accesses the desired reports
    on the report server and passes the appropriate parameters to the report.


    The syntax for the entire URL breaks down into two parts. The first part specifies
    the path to the report file, and the second specifies the parameters. The full
    URL syntax is as follows:


    ```

    http://server/virtualroot?[/pathinfo]&prefix:param=value[&prefix:param=value]...n

    ```


    The syntax for an SSRS installation in SharePoint integration mode will resemble:


    ```

    http://server/subSiteName/_vti_bin/reportserver?[/pathinfo]&prefix:param=value[&prefix:param=value]...n

    ```


    ![Image](images/tab_9_1.jpg)


    We’ll now walk you through the steps of building a URL to access the Employee
    Service Cost report.


    ### URL Report Access Path Format


    As indicated in the previous section, the path to access the appropriate report
    starts with the name of the report server itself; in this case, we will use `http://localhost`
    and use an SSRS installation that is in native mode. Following that is the name
    of the SSRS 2012 virtual root folder (such as `/reportserver`, which is the default
    folder during installation).


    `Note` The `/reports` virtual root folder is mapped to the Report Manager application
    that ships with SSRS 2012. If you navigate to this URL, you’ll find that it lists
    the folders and the reports within the folders that are on your report server
    through Report Manager.


    You then add `?` to the path to let SSRS 2012 know that everything following the
    URL is a parameter. Next is the optional path information, where you can specify
    any subfolder within the base folder that you use to organize your reports, such
    as `/Pro_SSRS/Chapter_9`. Finally, you have the name of the actual report, such
    as `EmployeeServiceCost`.


    So, in this example, the full path to access the Employee Service Cost report
    is as follows:


    ```

    http://localhost/reportserver?/Pro_SSRS/Chapter_9/EmployeeServiceCost

    ```


    We’ll now cover the section of the URL where you specify any necessary parameters.


    #### URL Parameters and Prefixes


    You now need to pass the appropriate parameters to the report. You’re interested
    in several categories of parameters:


    > *Report parameters (no prefix)*: These parameters are supplied to the report’s
    underlying queries and are used as filters for the information as it’s rendered.
    Thus, they control exactly which data the report displays.

    >

    > *HTML Viewer parameters (`rc:`)*: These parameters control which features of
    the Web-based report viewer are active and at which page the report viewer starts
    displaying the report. For example, you can use the `FindString` parameter to
    have the viewer start displaying a report on the first page on which a specific
    word is found.

    >

    > *Report Server command parameters (`rs:`)*: These parameters control the type
    of request being made and the format of the returned report. For example, we’ll
    show how to use the `rs:Command=Render&rs:Format=HTML4.0` parameter to render
    your report in HTML format in your report viewer.

    >

    > *Report Viewer Web Part command parameters (`rv:`)*: These parameters control
    the SharePoint integrated web part. These are very similar to the html viewer
    parameters since they will control the portal where you view reports on a SharePoint
    site. For example, you can use the `AsynchRender` parameter to control whether
    the report is rendered asynchronously or synchronously. Web parts can also accept
    the `rs:ParameterLanguage` parameter in addition to the `rv:` group.


    #### Report Parameters


    Report parameters are the actual parameters passed to the underlying report, instead
    of instructions being sent to the report server. That is, you use them to pass
    criteria to your report, such as start and end dates, employee IDs, and so on.
    You can pass these parameters to the report’s query, and they’re created when
    you specify parameters for the data source. You can also use parameters as variables
    in the report and as values for filters.


    #### HTML Viewer Commands


    You use HTML Viewer commands to tell SSRS 2012 how to render the report. You can
    use the commands in [Table 9-2](#Chapter09.html#tab_9_2) to control how the viewer
    appears to the user, as well as to control certain aspects of how the report appears
    in the viewer.


    ![Image](images/tab_9_2.jpg)


    #### Report Server Command Parameters


    Report server command parameters, which are prefixed with `rs:`, tell the report
    server the type of request being made (see [Table 9-3](#Chapter09.html#tab_9_3)).
    You use them to retrieve report and data source information in XML and HTML format
    and to retrieve child elements such as the current folder’s report names. You
    also use command parameters to tell the server you want to render a report and
    in what format and whether you want to render that report based on a preexisting
    snapshot.


    ![Image](images/tab_9_3.jpg)


    #### Credential Parameters


    If, in previous versions of Reporting Services, you were using credential parameters
    to pass datasource connection information, you will have to modify these reports
    to upgrade them to a SSRS 2012 server. The credential parameters that passed username
    and password information to a report server for rendering were stored in plain
    text in the browser cache. This was very insecure and this set of parameters has
    been removed from SSRS 2012.


    #### Report Viewer Web Part Commands


    Report web part viewer commands are prefixed with `rv:` and are used to target
    the web part used to view reports in SharePoint mode. You can use these parameters
    to control how the report and its controls are displayed from the web part. You
    can also use these parameters to control how the report will be rendered. You
    can see these parameters in [Table 9.4.](#Chapter09.html#tab_9_4).


    ![Image](images/tab_9_4.jpg)'
