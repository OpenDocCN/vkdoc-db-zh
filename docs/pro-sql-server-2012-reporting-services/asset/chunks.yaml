  trans: '

    ### 实现 URL 访问


    在本节中，我们将向您展示如何构建一个 URL，以便访问报告服务器上所需的报告，并向报告传递适当的参数。


    整个 URL 的语法分为两部分。第一部分指定报告文件的路径，第二部分指定参数。完整的 URL 语法如下：


    ```

    http://server/virtualroot?[/pathinfo]&prefix:param=value[&prefix:param=value]...n

    ```


    以 SharePoint 集成模式安装的 SSRS 的语法将类似于：


    ```

    http://server/subSiteName/_vti_bin/reportserver?[/pathinfo]&prefix:param=value[&prefix:param=value]...n

    ```


    ![Image](img/tab_9_1.jpg)


    现在，我们将引导您逐步构建一个用于访问员工服务成本报告的 URL。


    ### URL 报告访问路径格式


    如前一节所述，访问相应报告的路径以报告服务器本身的名称开头；在本例中，我们将使用 `http://localhost` 并采用本机模式的 SSRS 安装。其后是
    SSRS 2012 虚拟根文件夹的名称（例如 `/reportserver`，这是安装时的默认文件夹）。


    `注意` `/reports` 虚拟根文件夹映射到 SSRS 2012 自带的报告管理器应用程序。如果您导航到此 URL，您会发现它通过报告管理器列出了您报告服务器上文件夹及其内的报告。


    然后，您在路径后添加 `?`，以告知 SSRS 2012，URL 之后的所有内容都是参数。接下来是可选的路径信息，您可以在其中指定用于组织报告的基础文件夹内的任何子文件夹，例如
    `/Pro_SSRS/Chapter_9`。最后，是实际报告的名称，例如 `EmployeeServiceCost`。


    因此，在本例中，访问员工服务成本报告的完整路径如下：


    ```

    http://localhost/reportserver?/Pro_SSRS/Chapter_9/EmployeeServiceCost

    ```


    现在，我们将介绍 URL 中指定任何必要参数的部分。


    #### URL 参数和前缀


    您现在需要向报告传递适当的参数。您需要关注几类参数：


    > *报告参数（无前缀)*：这些参数提供给报告的底层查询，用于在报告呈现时作为信息的筛选器。因此，它们精确控制报告显示哪些数据。

    >

    > *HTML 查看器参数 (`rc:`)*：这些参数控制基于 Web 的报告查看器的哪些功能处于活动状态，以及报告查看器从哪一页开始显示报告。例如，您可以使用
    `FindString` 参数让查看器从第一个找到特定单词的页面开始显示报告。

    >

    > *报告服务器命令参数 (`rs:`)*：这些参数控制所发出的请求类型以及返回报告的格式。例如，我们将展示如何使用 `rs:Command=Render&rs:Format=HTML4.0`
    参数在报告查看器中以 HTML 格式呈现您的报告。

    >

    > *报告查看器 Web 部件命令参数 (`rv:`)*：这些参数控制 SharePoint 集成的 Web 部件。它们与 HTML 查看器参数非常相似，因为它们将控制您在
    SharePoint 站点上查看报告的门户。例如，您可以使用 `AsynchRender` 参数控制报告是异步还是同步呈现。除了 `rv:` 组之外，Web
    部件还可以接受 `rs:ParameterLanguage` 参数。


    #### 报告参数


    报告参数是实际传递给底层报告的参数，而不是发送给报告服务器的指令。也就是说，您使用它们向报告传递条件，例如开始和结束日期、员工 ID 等。您可以将这些参数传递给报告的查询，它们是在您为数据源指定参数时创建的。您还可以在报告中将参数用作变量和筛选器的值。


    #### HTML 查看器命令


    您使用 HTML 查看器命令告诉 SSRS 2012 如何呈现报告。您可以使用表 9-2 中的命令来控制查看器向用户显示的方式，以及控制报告在查看器中显示的某些方面。


    ![Image](img/tab_9_2.jpg)


    #### 报告服务器命令参数


    报告服务器命令参数以 `rs:` 为前缀，用于告知报告服务器所发出的请求类型（参见表 9-3）。您使用它们以 XML 和 HTML 格式检索报告和数据源信息，并检索子元素，例如当前文件夹的报告名称。您还使用命令参数告诉服务器您想要呈现报告以及以何种格式呈现，以及是否希望基于现有的快照呈现该报告。


    ![Image](img/tab_9_3.jpg)


    #### 凭据参数


    如果您在之前版本的 Reporting Services 中使用凭据参数来传递数据源连接信息，则必须修改这些报告才能将它们升级到 SSRS 2012 服务器。以前用于向报告服务器传递用户名和密码信息以进行呈现的凭据参数是以明文形式存储在浏览器缓存中的。这非常不安全，因此这组参数已从
    SSRS 2012 中移除。


    #### 报告查看器 Web 部件命令


    报告 Web 部件查看器命令以 `rv:` 为前缀，用于定位在 SharePoint 模式下用于查看报告的 Web 部件。您可以使用这些参数控制报告及其控件在
    Web 部件中的显示方式。您还可以使用这些参数控制报告的呈现方式。您可以在表 9.4 中查看这些参数。


    ![Image](img/tab_9_4.jpg)

    '
- fmt: "#### Example URLs\n\n现在你已经检查了URL的每个组成部分，查看几个完整的示例URL会很有帮助。你需要从本章下载示例中包含的`readme.html`文件正确设置报告。下面的URL以HTML\
    \ 4格式呈现报告，并通过将`rc:Toolbar`参数值设置为`false`来隐藏HTML查看器工具栏，同时将服务年份参数设置为2009：\n\n`http://localhost/reportserver?/Pro_SSRS/Chapter_9/EmployeeServiceCost&rs:Command=Render&rs:Format=HTML4.0&rc:Toolbar=false&ServiceYear=2009`\n\
    \n下一个示例传递了`ServiceYear`为2009的报告参数，并隐藏了用户提供的参数的输入显示：\n\n`http://localhost/reportserver?/Pro_SSRS/Chapter_9/EmployeeServiceCost&rs:Command=Render&rs:Format=HTML4.0&rc:Parameters=false&ServiceYear=2009`\n\
    \n下一个使用`rs:Format`参数将默认输出格式设置为PDF，服务年份为2009：\n\n`http://localhost/reportserver?/Pro_SSRS/Chapter_9/EmployeeServiceCost&rs:Command=Render&rs:Format=PDF&serviceyear=2009`\n\
    \n此示例隐藏了报告文档地图：\n\n`http://localhost/reportserver?/Pro_SSRS/Chapter_9/EmployeeServiceCost&rs:Command=Render&rc:DocMap=false&ServiceYear=2009`\n\
    \n最后一个示例——处于你可能尚未设置的SharePoint集成模式——将隐藏工具栏：\n\n`http://localhost/_layouts/ReportServer/RSViewerPage.aspx?rv:RelativeReportUrl=/Chapter\
    \ 9/EmployeeServiceCost.rdl&rv:Toolbar=None`\n\n你已经简要了解了在本机和SharePoint模式下通过URL呈现报告所需的命令。在本章的剩余部分，我们将展示如何创建你自己的报告查看器以及使用报告查看器控件。自定义查看器将使用URL命令将SSRS\
    \ 2012报告集成到基于.NET Windows Forms的应用程序中，而报告查看器控件将在ASP.NET网页中使用。\n\n### Integrating\
    \ SSRS 2012 with .NET Applications\n\n既然你对URL访问的工作原理有了一些了解，你将学习如何呈现报告。你将从构建一个Windows\
    \ Forms SSRS 2008查看器应用程序开始，该应用程序使用.NET 2.0 `WebBrowser`控件和URL访问来为你的应用程序呈现报告。\n\
    \n#### Building a custom Report Viewer Using the WebBrowser Control\n\n我们将展示如何创建一个简单的Windows\
    \ Forms应用程序，其中包含嵌入式浏览器，你将使用它来查看报告。\n\n##### Creating the Viewer Form\n\n在此示例中，你将使用C#创建查看器应用程序。我们还将在额外的可下载内容中包含用VB.NET编写的相同应用程序。请按照以下步骤操作：\n\
    \n> 1.  打开`Visual Studio 2010`。\n> 2.  创建一个新项目。\n> 3.  在“新建项目”对话框中，选择`Visual C#`\
    \ > `Windows` > `Windows Forms Application`。将其命名为`SSRS Viewer WBC`。在“解决方案”下，选择“创建新解决方案”，并将其命名为`Chapter\
    \ 9`。单击“确定”创建你的项目。\n\n现在你已经创建了项目，你将使用该表单来创建报告查看器：\n\n> 1.  `Visual Studio 2010`会向项目添加一个名为`Form1.cs`的单个表单。将该表单重命名为`ViewerWBC.cs`。\n\
    > 2.  将空白表单的大小调整为800×600。\n> 3.  从工具箱的“公共控件”部分将`WebBrowser`控件添加到表单中。将其命名为`WebBrowser`，并将该控件锚定到表单的顶部、底部、左侧和右侧。调整`WebBrowser`控件的大小，使其从表单的两侧延伸到表单底部。\n\
    > 4.  现在添加一个文本框，并将其命名为`reportURL`。在文本框之后，添加一个名为`reportRun`的按钮，并将按钮文本设置为`Run`。\n\
    \n你现在应该拥有一个看起来像`Figure 9-1`的表单。\n\n![Image](images/9781430238102_Fig09-01.jpg)\n\
    \n**`Figure 9-1.`** `ViewerWBC.cs`表单\n\n##### Coding the Viewer Form\n\n要编写查看器表单的代码，你将添加必要的代码来使用此自定义报告查看器呈现SSRS\
    \ 2012报告。你需要向按钮的点击事件添加一些代码，以确保你可以浏览并查看现有报告。确保`ViewerWBC.cs`表单在设计视图中打开，然后双击`Run`按钮。这将创建一个空方法来处理按钮的点击事件。将`Listing\
    \ 9-1`中的代码添加到你的`reportRun_Click`方法中。\n\n**`Listing 9-1.`** `reportRun`点击事件：浏览到URL\n\
    \n```\nprivate void reportRun_Click(object sender, EventArgs e)\n{\n    webBrowser.Navigate(reportURL.Text);\n\
    }\n```\n\n现在在调试模式下运行项目。当表单显示时，在文本框中输入以下URL：\n\n`http://localhost/reportserver/?/Pro_SSRS/Chapter_9/EmployeeServiceCost&rs:Command=Render`\n\
    \n现在单击`Run`。这将呈现“Employee Service Cost”报告。一旦报告开始在Web浏览器对象中呈现，系统将提示你提供参数。你可能还需要将上述URL中的`localhost`替换为你的报告服务器的名称。此时，你应该会看到类似`Figure\
    \ 9-2`的内容。\n\n![Image](images/9781430238102_Fig09-02.jpg)\n\n**`Figure 9-2.`**\
    \ 运行“Employee Service Cost”报告的SSRS Viewer WBC应用程序\n\n接下来，我们将添加一些代码，以便在程序启动时在URL文本框中设置一个包含报告路径的默认字符串，这样你就不必每次都键入它。右键单击你的`ViewerWBC.cs`文件并选择“查看代码”，以打开你需要添加此代码的部分。\n\
    \n```\npublic ViewerWBC()\n{\n    InitializeComponent();\n    // 为示例方便设置初始URL\n\
    \    reportURL.Text = \"http://localhost/reportserver/?/Pro_SSRS/Chapter_9/EmployeeServiceCost&rs:Command=Render\"\
    ;\n```\n\n这是一个非常简单的应用程序，使用了每个用户的客户端上都应可用的简单控件。你可以将这种类型的查看器与我们讨论过的URL命令结合使用，将自定义报告查看器包含在你可能构建的任何应用程序中。接下来，我们将使用一个不太常见但更强大的控件将我们的SSRS报告集成到Windows窗体或ASP.NET项目中。"
  raw: '#### Example URLs


    Now that you’ve examined every component part of the URL, it’s useful to look
    at a few complete sample URLs. You will need to have the report setup correctly
    from the readme.html file included from the chapter download examples. The following
    URL renders the report in HTML 4 and hides the HTML Viewer toolbar by setting
    the `rc:Toolbar` parameter value to false while also setting the Service Year
    parameter to 2009:


    `http://localhost/reportserver?/Pro_SSRS/Chapter_9/EmployeeServiceCost&rs:Command=`![Image](images/U002.jpg)

    ` Render&rs:Format=HTML4.0&rc:Toolbar=false&ServiceYear=2009`


    The next example passes a report parameter for ServiceYear of 2009 and hides the
    input display of user-supplied parameters:


    `http://localhost/reportserver?/Pro_SSRS/Chapter_9/EmployeeServiceCost&rs:Command=`![Image](images/U002.jpg)

    ` Render&rs:Format=HTML4.0&rc:Parameters=false&ServiceYear=2009`


    The next one uses the `rs:Format` parameter to set the default output format to
    PDF for the service year 2009:


    `http://localhost/reportserver?/Pro_SSRS/Chapter_9/EmployeeServiceCost&rs:Command=`![Image](images/U002.jpg)

    ` Render&rs:Format=PDF&serviceyear=2009`


    This example hides the report document map:


    `http://localhost/reportserver?/Pro_SSRS/Chapter_9/EmployeeServiceCost&rs:Command=`![Image](images/U002.jpg)

    ` Render&rc:DocMap=false&ServiceYear=2009`


    This final example – in SharePoint integrated mode which you may not have set
    up – will hide the toolbar:


    `http://localhost/_layouts/ReportServer/RSViewerPage.aspx?rv:RelativeReportUrl=/Chapter`![Image](images/U002.jpg)

    ` 9/EmployeeServiceCost.rdl&rv:Toolbar=None`


    You’ve taken a brief look at the commands you need to render a report through
    a URL in both native and SharePoint mode. In the remainder of this chapter, we’ll
    show how to create your own report viewer as well as use the report viewer control.
    The custom viewer will use URL commands to integrate an SSRS 2012 report into
    a .NET Windows Forms–based application and the report viewer control will be used
    in an ASP.NET web page.


    ### Integrating SSRS 2012 with .NET Applications


    Now that you have some understanding of how URL access works, you’ll learn how
    you can render reports. You’ll start by looking at how to render a report by building
    a Windows Forms SSRS 2008 viewer application that uses the .NET 2.0 WebBrowser
    control and URL access to render reports for your application.


    #### Building a custom Report Viewer Using the WebBrowser Control


    We’ll show how to create a simple Windows Forms application that contains the
    embedded browser, which you’ll use to view a report.


    ##### Creating the Viewer Form


    In this example, you will use C# to create the viewer application. We will also
    include the same application written in VB.NET in the extra downloadable content.
    Follow these steps:


    > 1.  Open Visual Studio 2010.

    > 2.  Create a new project.

    > 3.  On the New Project dialog box, select Visual C# ![Image](images/U004.jpg)
    Windows ![Image](images/U004.jpg) Windows Forms Application. Name it SSRS Viewer
    WBC. Under Solution, select Create New Solution, and name it [Chapter 9](#Chapter09.html#ch9).
    Click OK to create your project.


    Now that you have created the project, you’ll work with the form you will use
    to create the report viewer:


    > 1.  Visual Studio 2010 will add a single form to the project called Form1.cs.
    Rename the form to ViewerWBC.cs.

    > 2.  Resize the blank form to 800×600.

    > 3.  Add the WebBrowser control from the Toolbox’s Common Controls section to
    the form. Name it WebBrowser, and anchor the control to the form’s top, bottom,
    left, and right. Size the WebBrowser control to extend from both sides of the
    form to the bottom of the form.

    > 4.  Now add a textbox, and name it reportURL. Just after the textbox, add a
    button named reportRun, and set the button text to Run.


    You should now have a form that looks like [Figure 9-1](#Chapter09.html#fig_9_1).


    ![Image](images/9781430238102_Fig09-01.jpg)


    ***Figure 9-1.** The ViewerWBC.cs form*


    ##### Coding the Viewer Form


    To code the viewer form, you’ll add the code necessary to use this custom report
    viewer to render the SSRS 2012 reports. You need to add some code to the button’s
    click event to make sure you can browse to and view an existing report. Make sure
    the ViewerWBC.cs form is open in design view, and double-click the Run button.
    This will create an empty method to handle the button’s click event. Add the code
    in [Listing 9-1](#Chapter09.html#list_9_1) inside the reportRun_Click method to
    your method.


    ***Listing 9-1.** reportRun click Event: Browsing to URL*


    `private void reportRun_Click(object sender, EventArgs e)`

    `{`

    `webBrowser.Navigate(reportURL.Text);`

    `}`


    Now run the project in debug mode. When the form displays, enter the following
    URL into the textbox:


    [`http://localhost/reportserver/?/Pro_SSRS/Chapter_9/EmployeeServiceCost&rs:Command=Render`](http://localhost/reportserver/?/Pro_SSRS/Chapter_9/EmployeeServiceCost&rs:Command=Render)


    Now click Run. This renders the Employee Service Cost report. You will be prompted
    to supply parameters once the report begins to render in the web browser object.
    You may also need to use the name of your report server where you see `localhost`
    in the preceding URL. At this point, you should see something like [Figure 9-2](#Chapter09.html#fig_9_2).


    ![Image](images/9781430238102_Fig09-02.jpg)


    ***Figure 9-2.** SSRS Viewer WBC application running the Employee Service Cost
    report*


    Next, we will add some code so that when the program is started it will set up
    a default string in the URL textbox with a path to the report, so you don’t have
    to type it in each time. Right click on your ViewerWBC.cs file and select view
    code to pull up the section where you need to add this code.


    `public ViewerWBC()`

    `{`

    `InitializeComponent();`

    `// Setting the initial URL for convenience in the example`

    `reportURL.Text = "http://localhost/reportserver/?`![Image](images/U002.jpg)

    `/Pro_SSRS/Chapter_9/EmployeeServiceCost&rs:Command=Render";`


    This is a very simple application and uses simple controls that every user should
    have available on their client. You can use the combination of this type of viewer
    with the URL commands we have discussed to include a custom report viewer in any
    application that you might build. Next, we will use a less common – but more powerful
    – control to integrate our SSRS reports into a Windows form or ASP.NET project.'
  trans: "\n#### 示例 URL\n\n现在你已检查了 URL 的每个组成部分，查看几个完整的示例 URL 会很有帮助。你需要从本章下载的示例中包含\
    \ `readme.html` 文件来正确设置报告。下面的 URL 以 HTML 4 格式呈现报告，并通过将 `rc:Toolbar` 参数值设置为 `false`\
    \ 来隐藏 HTML 查看器工具栏，同时将服务年份参数设置为 2009：\n\n`http://localhost/reportserver?/Pro_SSRS/Chapter_9/EmployeeServiceCost&rs:Command=Render&rs:Format=HTML4.0&rc:Toolbar=false&ServiceYear=2009`\n\
    \n下一个示例传递了 `ServiceYear` 为 2009 的报告参数，并隐藏了用户提供的参数的输入显示：\n\n`http://localhost/reportserver?/Pro_SSRS/Chapter_9/EmployeeServiceCost&rs:Command=Render&rs:Format=HTML4.0&rc:Parameters=false&ServiceYear=2009`\n\
    \n下一个使用 `rs:Format` 参数将默认输出格式设置为 PDF，服务年份为 2009：\n\n`http://localhost/reportserver?/Pro_SSRS/Chapter_9/EmployeeServiceCost&rs:Command=Render&rs:Format=PDF&serviceyear=2009`\n\
    \n此示例隐藏了报告文档地图：\n\n`http://localhost/reportserver?/Pro_SSRS/Chapter_9/EmployeeServiceCost&rs:Command=Render&rc:DocMap=false&ServiceYear=2009`\n\
    \n最后一个示例——适用于你可能尚未设置的 SharePoint 集成模式——将隐藏工具栏：\n\n`http://localhost/_layouts/ReportServer/RSViewerPage.aspx?rv:RelativeReportUrl=/Chapter\
    \ 9/EmployeeServiceCost.rdl&rv:Toolbar=None`\n\n你已经简要了解了在本机模式和 SharePoint 模式下通过\
    \ URL 呈现报告所需的命令。在本章的剩余部分，我们将展示如何创建你自己的报告查看器以及使用报告查看器控件。自定义查看器将使用 URL 命令将 SSRS\
    \ 2012 报告集成到基于.NET Windows Forms 的应用程序中，而报告查看器控件将在 ASP.NET 网页中使用。\n\n### 将 SSRS\
    \ 2012 与 .NET 应用程序集成\n\n既然你对 URL 访问的工作原理有了一些了解，你将学习如何呈现报告。你将从构建一个 Windows Forms\
    \ SSRS 2008 查看器应用程序开始，该应用程序使用.NET 2.0 `WebBrowser` 控件和 URL 访问来为你的应用程序呈现报告。\n\n\
    #### 使用 WebBrowser 控件构建自定义报告查看器\n\n我们将展示如何创建一个简单的 Windows Forms 应用程序，其中包含嵌入式浏览器，你将使用它来查看报告。\n\
    \n##### 创建查看器窗体\n\n在此示例中，你将使用 C#创建查看器应用程序。我们还将在额外的可下载内容中包含用 VB.NET 编写的相同应用程序。请按照以下步骤操作：\n\
    \n> 1.  打开 `Visual Studio 2010`。\n> 2.  创建一个新项目。\n> 3.  在“新建项目”对话框中，选择 `Visual\
    \ C#` > `Windows` > `Windows Forms Application`。将其命名为 `SSRS Viewer WBC`。在“解决方案”下，选择“创建新解决方案”，并将其命名为\
    \ `Chapter 9`。单击“确定”创建你的项目。\n\n现在你已经创建了项目，你将使用该窗体来创建报告查看器：\n\n> 1.  `Visual Studio\
    \ 2010` 会向项目添加一个名为 `Form1.cs` 的单个窗体。将该窗体重命名为 `ViewerWBC.cs`。\n> 2.  将空白窗体的大小调整为\
