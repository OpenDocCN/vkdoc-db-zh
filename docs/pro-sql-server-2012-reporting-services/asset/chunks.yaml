  trans: '

    ### 优化性能：分配负载


    由于 SSRS 和 T-SQL 共享许多数据格式化和操作函数，因此您可以选择在哪个过程——查询还是报表——中使用这些函数。您可以选择让查询处理大部分处理工作。这限制了报表需要处理的行数，使报表渲染速度更快。或者，您可以限制查询的选择性，使其返回比可能需要的更多的行。然后，让报表执行额外的筛选、分组和计算，这允许查询或存储过程执行得更快。当许多用户同时访问报表时，让报表分担处理负载也能限制对数据源服务器（此处为
    SQL Server）的影响。


    在此查询中，基于初步基准测试，我们已确定将移除 `WHERE` 子句中指定查询应仅返回服务类型为“V”（表示访问）的部分。相反，我们将让报表过滤掉所有非访问的服务类型。当您从查询中移除服务类型条件并重新执行时，您可以看到总体执行时间保持在一秒或更短，并且
    `WHERE` 子句的成本从 11% 降至仅 4%。此外，在性能分析中需要注意，通过从 `WHERE` 子句中移除“V”，记录数仅增加了 35 条，从 3,924
    条增加到 3,959 条。您可以在 图 2-6 的右下角看到这一点。


    要利用报表筛选器，您需要在查询的 `SELECT` 和 `GROUP BY` 部分添加一个字段——`Services.ServiceTypeID`，如下所示：


    ```

    Select

    ...

    Branch.BranchName AS Branch,

    Services.ServiceTypeID

    …

    GROUP BY

    …

    Branch.BranchName,

    Services.ServiceTypeID

    ```


    您将使用额外的字段 `Services.ServiceTypeID` 作为您将要设计的报表中的筛选值。通过这种方式进行，即使您为特定报表返回的行数可能超出所需，您也能获得在后续章节中将其转换为存储过程后，为其他报表使用同一基础查询的好处。其他报表可能需要显示除访问之外的服务类型，而此查询只需对报表稍作修改即可满足此目的。例如，您可能需要调查员工使用的物资成本或数量（服务类型为“S”）。您可以将此查询和存储过程用于该报表。我们可以利用参数化存储过程，允许各种报表传入一个值来筛选结果，但我们稍后会讲到这一点。


    ![Image](img/9781430238102_Fig02-06.jpg)


    **图 2-6.** 查看修改后查询的执行计划


    该查询目前已将 `ServiceTypeID` 作为 `SELECT` 子句中的一个值（而非条件）包含在内，已准备好开始其作为存储过程的生命周期。查询服务于多种目的，其中之一是开发报表，正如您将在第
    6 章中所做的那样。然而，将查询封装在存储过程通常是首选的部署方法，原因有几个。存储过程与即席查询一样，根据查询优化器生成的执行计划运行。能够重用执行计划可以节省时间和资源。存储过程的另一个好处是它们是预编译的，即使执行时传递给它的参数值可能已更改，也可以重用执行计划。您可以将存储过程集中保存在
    SQL Server 计算机上，这不同于可能嵌入应用程序（或本例中的 RDL 文件）中的即席查询。当数据库的底层模式发生变化时，您可以在一个位置更新存储过程，而嵌入的查询则需要在其所在的每个报告中单独修改。在下一节中，我们将向您展示如何基于员工成本查询创建存储过程。


    ### 使用参数化存储过程


    您可以使用 `SSMS` 生成基于员工成本查询创建存储过程的代码，并在数据库中已存在该存储过程时将其删除。要创建存储过程，请展开要在其中创建存储过程的数据库，导航到
