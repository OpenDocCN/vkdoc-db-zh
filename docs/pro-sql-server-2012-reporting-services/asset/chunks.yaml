  raw: '##### Delivering the Report


    In the example, you’ve used PDF to deliver the report to the subscription user.
    You’ve also hard-coded the e-mail address, which isn’t practical in the real world.
    One other issue of concern, especially in the health care setting, is complying
    with HIPAA and protecting patient information.


    You could give the user a textbox with which to enter the e-mail address to which
    the user wants the report delivered. However, the user could possibly type in
    an incorrect e-mail address and deliver the report to the wrong person. It would
    be great if the user’s e-mail address could be filled in automatically, to make
    sure it is the correct address. You can do this by pulling the address from a
    field in a table in the database similar to the data driven subscription example
    given earlier in the chapter where you pulled the e-mail address from the Employee
    table. However, in this case, the user pulling the report may not be in the database
    table, and you want the report delivered automatically to the user scheduling
    it. Fortunately, the .NET Framework and Active Directory offer an easy way to
    do this. For many organizations using Microsoft Exchange Server, e-mail addresses
    are integrated with Active Directory. If you aren’t using Exchange Server, e-mail
    addresses aren’t integrated with Active Directory, but you can still enter them
    into Active Directory manually.


    Let’s create a method that determines the e-mail of the currently logged-in user.
    Then you can use it to provide the To e-mail address for the subscription. Start
    by adding a new reference to the project for System.DirectoryServices. Select
    References under the SSRS Viewer RVC project in your solution, and then select
    Add Reference. In the Add Reference dialog box under the .NET tab, select System.DirectoryServices
    from the list of component names. Next, add using statements to simplify your
    typing, as follows:


    `using System.DirectoryServices;`

    `using System.Security.Principal;`


    To find the current user’s e-mail address, use DirectorySearcher, which allows
    you to perform queries against Active Directory, as shown in [Listing 10-10](#Chapter10.html#list_10_10).
    You’ll start at the root level of the directory and look for the user by name.
    When you find the user’s name, you return the first e-mail address you find for
    the user.


    ***Listing 10-10.** Code to Query Active Directory for E-mail Addresses*


    `private string GetEmailFromAD()`

    `{`

    `     DirectoryEntry rootEntry;`

    `     DirectoryEntry contextEntry;`

    `     DirectorySearcher searcher;`

    `     SearchResult result;`

    `     string currentUserName;`

    `     string contextPath;`

    `     WindowsPrincipal wp = new WindowsPrincipal(WindowsIdentity.GetCurrent());`

    `     currentUserName = wp.Identity.Name.Split(''\\'')[1];`

    `     rootEntry = new DirectoryEntry("LDAP://RootDSE");`

    `     contextPath = rootEntry.Properties["defaultNamingContext"].Value.ToString();`

    `     rootEntry.Dispose();`

    `     contextEntry = new DirectoryEntry("LDAP://" + contextPath);`

    `     searcher = new DirectorySearcher();`

    `     searcher.SearchRoot = contextEntry;`

    `     searcher.Filter = String.Format("(&(objectCategory=person)(samAccountName={0}))",`

    `currentUserName);`

    `     searcher.PropertiesToLoad.Add("mail");`

    `     searcher.PropertiesToLoad.Add("cn");`

    `     searcher.SearchScope = SearchScope.Subtree;`

    `     result = searcher.FindOne();`

    `     return result.Properties["mail"][0].ToString();`

    `}`


    To use this, all you have to do is modify the To parameter for the delivery extension
    in the ScheduleReport method you wrote earlier to use the new method you just
    wrote. So, your previous code for the To parameter becomes this:


    `extensionParams[0] = new ParameterValue();`

    `extensionParams[0].Name = "TO";`

    `extensionParams[0].Value = GetEmailFromAD();`


    Now run the SSRS Viewer RVC, and choose a schedule from the shared schedules you
    previously configured. For the parameters, enter **ServiceYear 2009**, **ServiceMonth
    November**, **BranchID Grid Iron**, and **EmployeeTblID McDonald, Sherri**; this
    will create a subscription that is e-mailed to you on the schedule you selected.
    If you navigate to the server now using your browser, select the Employee Service
    Cost report, and then select the Subscriptions tab, you should see your subscription,
    as shown in [Figure 10-31](#Chapter10.html#fig_10_31). If you click Edit, you
    see that it has provided all the parameters you selected, and it inserted the
    desired e-mail address in the To field.


    ![Image](images/9781430238102_Fig10-31.jpg)


    ***Figure 10-31.** Subscription as it appears in SSRS 2012*


    You haven’t seen all the possible options that you can use when scheduling reports
    such as the Employee Service Cost report, but we’ve given you a good start to
    schedule and deliver reports and add other functionality. Some possibilities include
    the following:


    > *   Allowing the user to decide the format the report will be delivered in

    > *   Allowing the user to attach the report or just provide a link

    > *   Allowing the user to create schedules on the fly


    You can use the SSRS 2012 Report Server Web service to control many more aspects
    of the report server and the reports under its control. We have just scratched
    the surface here of what you can do, but be aware that the basic aspects of dealing
    with the report server through the Report Server Web service are the same for
    nearly all the functions.


    #### Controlling SSRS with WMI


    Before we finish this chapter, we should also briefly discuss how you can manage
    SSRS using two WMI classes. These classes are used more for administrative tasks
    and allow you to access server settings programmatically. WMI is not used for
    manipulating reports or report settings.


    WMI offers a standardized way to monitor and control systems and services running
    anywhere on your network. Using the WMI provider, you can write code that allows
    you to query the current settings of an SSRS 2012 server and also to change those
    settings through properties and methods of the classes providing these services.


    Essentially, these providers allow you to change the settings of the configuration
    files on the server programmatically. So, as you might guess, the properties of
    these classes correspond almost directly to the elements within the XML files
    that hold SSRS 2012 configuration information.


    [Table 10-2](#Chapter10.html#tab_10_2) shows the two classes provided by SSRS
    2012 for use with WMI.


    ![Image](images/9781430238102_Tab10-02.jpg)


    You can use the MSReportServer_ConfigurationSetting class to determine and/or
    configure most of the database settings used by SSRS 2012 itself—that is, for
    the database that SSRS uses to store the reports, snapshots, and so on. This class
    doesn’t control the data source connection information used in your reports, although
    you can set the login information that the server uses to run a report in unattended
    mode. You can also work with things such as the database server name, database
    name, and login credential information in this class. You can also use this class
    to configure the SSRS 2012 service instance name, path name, and virtual directory
    it maps to in the integrated HTTP system.


    You can use the MSReportServerReportManager_ConfigurationSetting class to determine
    the instance name, path name, and virtual root of the SSRS 2012 Report Manager,
    as well as to read or set the URL of a particular instance.


    To access this information through the SSRS 2012 WMI providers, you use the System.Management
    namespace, which provides access to WMI.


    ![Image](images/square.jpg) **Note** If more than one instance of a report server
    is installed, you’ll need to locate the correct instance before reading and setting
    properties. The PathName property is the key property, and it uniquely identifies
    a particular instance.'
