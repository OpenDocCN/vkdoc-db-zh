    # 在向导的下一页中


    在向导的下一页中，将模型命名为 `Patient Census`，并选择 `Run` 以开始生成模型的规则。图 13-16 展示了点击 `Run` 后的输出，此时进程已成功完成。你可以在每个规则级别上查看详细信息，了解该规则基于数据源视图中的数据具体执行了什么操作。请注意，例如对于
    `Create Date Variations` 规则，它发现并创建了 `DiagOnset` 的日期，这是患者被诊断出疾病的日期。其他创建的属性包括 `Length
    of Stay` 列的 `Sum`、`Avg`、`Min` 和 `Max`。住院时长（通常是平均值）是指患者入住长期医疗机构到出院之间的时间间隔。`DateDiff`
    函数用于计算住院时长。


    ![Image](img/9781430238102_Fig13-16.jpg)


    **图 13-16.** 规则成功完成


    在 `Report Model Wizard` 中点击 `Finish` 后，你可以看到具有预期属性的 `Patient Census` 模型已被创建。此时，你可以直接通过右键单击
    `Solution Explorer` 中的模型并选择 `Deploy` 来将模型部署到报表服务器。你可以通过点击工具栏上 `Project` 下的 `Project
    Properties` 来控制模型部署的位置，如 图 13-17 所示，在项目属性页中进行设置。在本例中，项目将部署到报表服务器上的 `Models` 文件夹，其目标服务器
    URL 为 `http://localhost/ReportServer`。模型的数据源将发布在 `Data Sources` 文件夹中。


    ![Image](img/9781430238102_Fig13-17.jpg)


    **图 13-17.** 报表模型的项目属性


    ![Image](img/square.jpg) **注意** 我们应当提及，报表模型是使用语义模型定义语言（`SDML`）创建的，这是一种类似于 `RDL`
    的 XML 风格语法。`RDL` 定义报表和报表属性，而 `SMDL` 定义模型对象，例如你在此处创建的实体和属性。


    部署模型后，你可以在 `Report Manager` 中看到创建的两个文件夹：`Data Sources` 和 `Models`。`Data Sources`
    文件夹包含 `Pro_SSRS_2008R2` 数据源，而 `Models` 文件夹则存放着 `Patient Census` 报表模型。图 13-18 显示了
    `Patient Census` 报表模型的属性。与标准数据源一样，可以查看哪些报表是使用该模型创建的。


    ![Image](img/9781430238102_Fig13-18.jpg)


    **图 13-18.** Patient Census 报表模型属性


    在开始使用 `Report Builder 1.0` 创建报表之前，必须注意需要使用 `Report Builder 1.0` 权限的用户，必须被分配项目级角色，以执行与使用
    `Report Builder 1.0` 创建报表相关的各种任务。`Reporting Services` 包含一个 `Report Builder 1.0`
    角色用于此目的，如 图 13-19 所示。分配给 `Report Builder 1.0` 角色的用户拥有访问报表模型、文件夹和已发布报表所需的所有权限。但是，要发布报表，他们还需要具备管理报表内容的能力，才能成功地将报表发布到报表服务器。`Content
    Manager` 角色拥有完整报表创建和发布功能所需的所有权限。


    ![Image](img/9781430238102_Fig13-19.jpg)


    **图 13-19.** SSRS 报表生成器角色


    ![Image](img/square.jpg) **注意** 要管理 `SQL Server Reporting Services 2008 R2` 中的角色，我们必须以管理员身份运行
    `SQL Server Management Studio` 来连接到 `Reporting Services` 实例。有关连接到 `Reporting Services`
    实例和角色的更多详细信息，请参见 第 11 章 的“介绍 SSRS 角色”部分。


    ## 使用 Report Builder 1.0 创建报表


    至此，你已创建了使用 `Report Builder 1.0` 所需的所有部分——你已经创建了报表模型 `Patient Census` 并将其部署到了报表服务器。它现在正等待作为前端
    `Report Builder 1.0` 应用程序的数据源。`Report Builder 1.0` 提供了一些与报表开发环境（如 `BIDS` 或 `Visual
    Studio`）相同的功能，包括能够将数据元素拖放到设计区域，并使用 `Matrix`、`Table` 和 `Chart` 数据区域，以及将完成的报表部署到报表服务器的能力。然而，在深入之前，我们需要说明
    `Report Builder 1.0` 的目的是允许最终用户设计自己的报表。它被设计得直观且友好，而且由于它不是一个功能齐全的 `IDE`，起初可能显得功能有限。


    在本节中，你将探索 `Report Builder 1.0`，并发现报表设计人员可用的功能，例如添加函数（类似于在 `BIDS` 中添加表达式），以及提供筛选、分组和排序功能。本节的目标是向你展示如何根据本章前面创建的
    `Patient Census` 模型，逐步创建和部署所需的普查报表。


    当为 `SQL Server 2008 R2` 安装 `Reporting Services` 时，默认的 `Report Builder` 应用程序是 `3.0`。如果你要跟随操作或想使用
    `Report Builder 1.0` 创建报表，你将需要直接导航到 `Report Builder` 的 URL，或者在 `Report Manager`
    的 `Site Settings` 部分更改默认的 `Custom Report Builder` 启动 `URL`。你可以在 `Program Files\Microsoft
    SQL Server\MSRS10_50.MSSQLSERVER\Reporting Services\ReportServer\ReportBuilder`
    文件夹下找到报表生成器应用程序。为了跟随操作，我们将把 `Report Manager` 中的启动 `URL` 设置为使用 `Report Builder
    1.0`。为此，通过导航到 `http://ServerName/Reports` 打开 `Report Manager`。打开 `Report Manager`
    后，点击右上角的 `Site Settings` 链接。将启动 `URL` 设置为：

    `http://localhost/ReportServer/ReportBuilder/ReportBuilder.application`


    更改默认的 `Report Builder` `URL` 后，现在让我们使用它。点击 `Apply` 保存更改，并导航到 `Report Manager`
    主页。在主页上，你应该会在 `Report Manager` 的主工具栏上看到 `Report Builder` 图标，如 图 13-20 所示。点击 `Report
    Builder` 按钮，如果尚未安装，则初始化 `Report Builder 1.0` 的安装；如果已安装，则打开该应用程序。


    ![Image](img/9781430238102_Fig13-20.jpg)


    **图 13-20.** 带有报表生成器按钮的 Report Manager 主工具栏


    ![Image](img/square.jpg) **注意** 如前所述，也可以直接从 `ReportServer` `URL`（例如 `https://mySSRSserver/ReportServer/ReportBuilder/ReportBuilder.application`）启动
    `Report Builder 1.0`。


    `Report Builder 1.0` 使用 `ClickOnce` 技术从网站安装自身。代码从浏览器下载并安装到本地计算机，假设没有缺失先决条件的问题，其中之一是
    `.NET Framework 2.0`。如果未安装，它将发出警告消息，指出 `Report Builder 1.0` 需要 `.NET Framework
    2.0` 才能安装。如果满足所有要求，`Report Builder 1.0` 将启动并完成安装。图 13-21 显示了 `ClickOnce` 应用程序安装屏幕。


    ![Image](img/9781430238102_Fig13-21.jpg)


    **图 13-21.** Report Builder 1.0 安装进度

    '
- fmt: 'After Report Builder 1.0 is installed, it launches automatically. The first
    step to begin designing a report is to select a source of data, as shown in [Figure
    13-22](#Chapter13.html#fig_13_22). The source will be a report model, in this
    case the `Patient Census` report model you have already published. So, select
    it, and click OK to continue.


    ![Image](images/9781430238102_Fig13-22.jpg)


    **Figure 13-22.** Selecting the report model


    At first glance, it is easy to see that `Report Builder 1.0` has the look and
    feel of other Microsoft design products in the Office 2007 suite, such as `FrontPage`.
    You will see a simple design area, a `Report Data` area, and a `Report Layout`
    area that contains templates that can be used for each report. The three available
    templates are familiar versions of data regions available for `SSRS` reports:
    `Table`, `Matrix`, and `Chart`. Each template has predefined areas such as a title,
    a total column, and a filter description column, as shown in the table report
    in [Figure 13-23](#Chapter13.html#fig_13_23). You can also see the fields of the
    `Patient Census` report model in the `Report Data` tab on the left.


    ![Image](images/9781430238102_Fig13-23.jpg)


    **Figure 13-23.** Table report template in Report Builder 1.0


    ### Creating a Table Report


    To address many of the report requests received from user feedback, you can use
    the table report. One item to note, which may fall into the category of a limitation
    of `Report Builder 1.0`, is that you can use only one data region per report.
    In other words, unlike the full IDE of `BIDS`, users who build reports with `Report
    Builder 1.0` are limited to one `Table`, `Matrix`, or `Chart` data region per
    report. You cannot add a second data region. In fact, reports are not only limited
    to a single data region, but they are relegated to using the controls that have
    been defined for each template. It is not possible to add textboxes, for example,
    or any other type of design element, other than the data from the fields.


    You will work within this limitation to produce your first report, a *patient
    face sheet* (as it is commonly called), which displays demographic information
    about each patient. With the table report still open, you will drag several fields
    onto the table where it says `Drop Column Fields` so that the report looks like
    [Figure 13-24](#Chapter13.html#fig_13_24). Next, hold the `CTRL` key down on the
    keyboard while selecting `Pat ID`, `Pat First Name`, `Pat Last Name`, `Diagnosis`,
    `Start Of Care`, `Address 1`, `City`, `State`, and `Zip`. After you have them
    all selected, drag them to the right of `Pat ID` in the table of the report. By
    holding the `CTRL` key, as we’ve done here, we create a group of `Patient Census`
    column names. At this point, you can also add a title in the `Click to Add Title`
    textbox. Change the title to `Patient Face Sheet` and make it bold. Notice also
    that as the fields are added, `Pat Last Name`, for example, they become bold in
    the `Fields` tab on the left indicating they have already been used.


    ![Image](images/9781430238102_Fig13-24.jpg)


    **Figure 13-24.** Table report with patient information


    Once you have added all these fields to the report, you could click `Run Report`
    to preview the report; however, at this point, you must perform some tasks to
    make the report fit on a printed page. In its default page setup, the report is
    set to `Portrait`; however, the fields you have added extend beyond 8.5 inches
    across. To fix this, right-click in the design area, and select `Page Setup` so
    that the `Page Setup` dialog box appears, as shown in [Figure 13-25](#Chapter13.html#fig_13_25).
    Set the `Orientation` property to `Landscape`, then set all of the `Margins` to
    0 and click OK.


    ![Image](images/9781430238102_Fig13-25.jpg)


    **Figure 13-25.** Setting the page orientation


    To make even more room, you can use a formula to combine the patient’s first and
    last names. To do this, simply right-click the `Pat First Name` data cell, and
    select `Edit Formula`. This will open the `Define Formula` window. Formulas in
    `Report Builder 1.0` are like expressions in `BIDS`. Here is where you can combine
    report fields and built-in functions to produce the desired value. [Figure 13-26](#Chapter13.html#fig_13_26)
    shows the `Define Formula` dialog box with several available functions. Notice
    the formula used to concatenate the `Pat First Name` and `Pat Last Name` fields,
    which uses report data fields and an ampersand (`&`) to add a literal comma character
    to separate the names. You can also use the `RTRIM` function to remove trailing
    spaces. You could have done much of this work in the report model, where it most
    likely should have been done. However, we had you leave the names this way so
    we could now demonstrate the use of a simple formula.


    ```

    Pat First Name + '', '' + RTRIM(Pat Last Name)

    ```


    Once the formula is in place, click the `Save this formula as a new Patient Census
    field`, and click OK. You are then prompted to enter the `New Field Name`. Call
    this field `Patient Name` and click OK to save your new field.


    ![Image](images/9781430238102_Fig13-26.jpg)


    **Figure 13-26.** Define Formula window'
