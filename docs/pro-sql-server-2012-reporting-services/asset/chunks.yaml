  trans: '

    正如您所见，部署和使用报表部件是一个相当直接的过程。如果架构设计得当并有扎实的报表开发人员，许多报表部件可以存储在报表服务器上，并供报表作者重复使用，以简化报表开发。


    ![Image](img/square.jpg) **注意** 本节（“报表部件”）中使用的报表名为 `EmployeeSvcCost_RB3_ReportPart.rdl`，它包含在我们本书自始至终都在使用的
    `Pro_SSRS` 解决方案中。`Pro_SSRS` 解决方案可以在 Apress 网站 `(`[`www.apress.com`](http://www.apress.com)`)`
    的本书源代码/下载区域找到。


    您可能还记得，我之前提到过，当对报表部件进行更改并将其保存到报表服务器时，使用该报表部件的每个报表都会收到通知。请按照以下步骤查看实际操作：


    > 1.  启动报表生成器后，点击左上角的 `Report Builder` 图标，然后点击 `Open`。

    > 2.  导航到您解压 `Pro_SSRS` 解决方案的位置，并找到 `EmployeeSvcCost_RB3_ReportPart.rdl` 文件。点击
    `Open` 以在报表生成器 3.0 中加载该报表。此报表与我们之前打开的报表相同。我们现在将对其进行微小更改，然后重新发布报表部件。

    > 3.  将图表标题的字体颜色更改为蓝色并设置为斜体。不是重大更改，我们只是想看看更改报表部件时会发生什么。像之前一样，使用报表生成器菜单按钮中的 `Publish
    Report Parts` 功能部署报表部件。这次仅发布图表。

    > 4.  现在，让我们打开我们保存到报表服务器上的 `EstimatedCostByBranch_RB3_Report_Using_ReportPart`，该报表包含原始报表部件的一个副本。点击
    `Report Builder` 菜单按钮并选择 `Open`。导航到保存报表的报表服务器位置，并打开 `EstimatedCostByBranch_RB3_Report_Using_ReportPart`
    报表。当您打开报表时，您应该会看到一个标题为“Updated Report Parts”的消息框在选项卡条和报表设计区域之间弹出（`图 13-75`）。这表明我们使用的报表部件已被更改。

    >

    >     ![Image](img/9781430238102_Fig13-75.jpg)

    >

    >     ***图 13-75.** 已更新报表部件的消息指示器*

    >

    >

    > 5.  点击 `View Updates` 按钮查看发生了哪些变化。当“更新报表部件”屏幕出现时，我们应该能看到已更改的内容，以及在更改的报表部件旁边有一个复选框。如果我们将复选框留空，我们的报表将保持原样，不会接受这些新更改。相反，如果我们在复选框中打勾，它将用新的报表部件更新我们的报表。我们还可以在报表部件更新时禁用通知。这实质上是告诉
    Reporting Services，该报表不关心报表部件是否曾经更改。如果您禁用此选项，将不会收到更改通知。点击复选框以更新 `EstimatedCostByBranch_Pie`
    报表部件，然后点击 `Update`，如 `图 13-76` 所示。


    ![Image](img/9781430238102_Fig13-76.jpg)


    ***图 13-76.** 更新使用了已更新报表部件的报表*


    通过用更新后的报表部件更新我们的报表的结果可以看到，我们现在看到一个蓝色、斜体的图表标题。在我看来，内置于报表生成器 3.0 中的报表部件功能是迄今为止对即席报表功能的最佳补充之一。如果您和我一样，当您在为最终用户（他们属于报表作者角色）思考要创建哪些新的报表部件时，您的大脑可能正在飞速运转——从而使他们能够快速高效地创建即席报表。


    ### 总结


    即席报表让用户能够即时创建自己的报表。这一直是任何报表平台高度要求的功能，Reporting Services 也不例外。如本章所示，Microsoft 决定以报表生成器
    1.0 的形式交付他们的第一个即席报表版本。他们在报表生成器 2.0 中显著增强了用户体验，允许从关系数据源和 OLAP 数据源报告数据。随着 SQL Server
    2008 R2 的发布，推出了 Microsoft 的最新版本——报表生成器 3.0。此外，我们向您展示了一个名为“报表部件”的惊人功能，它允许报表作者重用现有报表的节，从而节省数小时甚至数天的报表开发时间。在本章中，您了解了它们各自的优点和一些局限性。您可能已经得到了关于报表生成器是否是您的用户会想要的工具这个问题的答案。如果答案是“是”，正如我们希望的那样，那么好消息是这些功能都是作为标准功能包含在内的。


