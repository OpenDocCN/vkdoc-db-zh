  trans: '

    # 使用 BIDS 2008 R2 创建报表模型


    在本节中，你将使用 `BIDS 2008 R2` 创建一个报表模型项目。该项目的完整版本包含在 Apress 网站 ([`www.apress.com`](http://www.apress.com))
    本书的 `Source Code/Download` 区域中。当你打开解决方案时，会注意到一个已创建的名为 `Patient Census Book` 的报表模型。如果你希望将项目中现有的
    `Patient Census Book` 报表模型发布到你的 `SSRS` 服务器，并开始使用客户端的 `Report Builder 1.0` 应用程序，只需确保正确设置数据源设置并进行适当部署即可。在这种情况下，直接跳到“使用
    Report Builder 1.0 创建报表”一节。若要按照步骤使用 Business Intelligence Development Studio for
    `SQL Server 2008 R2` 创建报表模型的各个部分，从添加数据源和数据源视图到发布完成的模型，请继续阅读。


    在已为 `SQL Server 2008 R2` 安装了 `BIDS` 的计算机上打开 `BIDS`。你可以通过点击 Windows 开始按钮、所有程序、`SQL
    Server 2008 R2`，然后点击 `SQL Server Business Intelligence Development Studio` 来找到
    `BIDS`。启动 `BIDS` 后，点击“创建：”标签旁的 `项目…`。如 图 13-1 所示，你可以使用多个可用的项目模板。选择 `报表模型项目` 模板，将其命名为
    `Patient Census`，添加适当的位置（本例中为 `C:\Pro_SSRS Project_2008R2\`），然后点击确定。


    ![Image](img/9781430238102_Fig13-01.jpg)


    **图 13-1.** 创建新的报表模型项目


    一个报表模型项目有三个主要组件：数据源、数据源视图和报表模型，每一个都依赖于前一个。换句话说，数据源视图需要数据源，同样，报表模型需要数据源视图。如果你已成功创建了
    `Patient Census` 报表模型项目，你将看到这三个组件，如 图 13-2 所示。


    ![Image](img/9781430238102_Fig13-02.jpg)


    **图 13-2.** 查看新的 `Patient Census` 报表模型


    ## 添加数据源


    从逻辑上讲，第一步是创建数据源。在我们创建连接到 `SQL Server 2008 R2` 机器的数据源之前，你需要按照 Apress 网站 ([`www.apress.com`](http://www.apress.com))
    本书 `Source Code/Download` 区域中提供的 `ReadMe.txt` 文件中的说明还原 `Pro_SSRS_2008R2` 数据库。在你设置好
    `Pro_SSRS_2008R2` 数据库后，我们需要为我们的模型创建一个数据源。在 `解决方案资源管理器` 中右键单击 `数据源` 文件夹，并在 `添加`
    菜单下选择 `新建数据源`。这将打开 `数据源向导`，为报表模型创建数据源。图 13-3 显示了 `数据源向导` 的第一页。幸运的是，你可以通过勾选 `不再显示此页`
    来选择不在每次打开向导时显示第一页。


    ![Image](img/9781430238102_Fig13-03.jpg)


    **图 13-3.** 使用 `数据源向导`


    如 图 13-4 所示，在通过向导创建数据源时，你有两个选项。你可以基于现有或新建的连接创建一个新的数据源，也可以基于另一个对象（如另一个项目中已定义的数据源）创建数据源。对于本例，选择基于新连接创建新数据源，并点击
    `新建` 打开 `连接管理器`。


    ![Image](img/9781430238102_Fig13-04.jpg)


    **图 13-4.** 定义连接


    在 `连接管理器` 中，选择 `localhost` 作为服务器名称，保持 `使用 Windows 身份验证` 按钮为勾选状态，并将数据库名称更改为 `Pro_SSRS_2008R2`，如
    图 13-5 所示。点击 `确定` 保存设置并返回到 `数据源向导`。点击 `下一步` 或 `完成` 进入向导的最终屏幕，保留默认的数据源名称 `Pro SSRS
    2008R2`，然后点击 `完成` 以创建数据源。


    ![Image](img/9781430238102_Fig13-05.jpg)


    **图 13-5.** 设置服务器名称和数据库


    ![Image](img/square.jpg) **注意** `Pro_SSRS_2008R2` 数据库是我们整本书中一直在使用的 `Pro_SSRS`
    数据库的一个版本。然而，由于报表模型在 `SQL Server 2012` 中已被弃用，我们创建了一个具有有限对象的 `2008 R2` 版本的数据库。`Pro_SSRS_2008R2`
    数据库和脚本可以在 Apress 网站 ([`www.apress.com`](http://www.apress.com)) 本书的 `Source Code/Download`
    区域中找到。有关此数据库的更多详细信息，请务必阅读 `Source Code/Download` 文件中的 `ReadMe.txt` 文件。

    '
- fmt: '### Creating a Data Source View


    You create data source views for a report model project from relational data sources,
    where you have a list of tables that can be joined to form the basis of the data
    source view. In the `Pro_SSRS_2008R2` database, you know many related tables are
    joined by column ID fields; for example, the `Admissions` table joins to the `Patient`
    table via the `PatID` field. Fields in both tables may be relevant to a user designing
    a report; however, superfluous data may just confuse that user. Part of your job
    as the report modeler is to remove the complexity of the schema but also provide
    a model that contains intuitive or “friendly” names and provides only the data
    that will be useful. Why should you use `Dscr` for a diagnosis code, when you
    really should just make it Diagnosis Name, for example? Since it is also possible
    to add objects to a data source view that are derived tables made from custom
    queries, you will have more control over creating a custom data source view and
    eliminate much of the work of removing the extraneous fields included in all the
    tables you are using. This will become more evident to you as you step through
    the process. For now, we will show how to perform the following logical steps
    to keep the data source view and subsequent model simple but effective:


    > *   Building a query instead of many multiple tables for the data source view

    > *   Selecting only relevant and potentially useful fields for the report designers,
    based on their requests

    > *   Using friendly names for data source view fields and values


    The first step in creating the view, like with the data source, is to open the
    wizard by right-clicking the `Data Source Views` folder and selecting `Add New
    Data Source`. Clicking `Next` to proceed to the next screen in the wizard will
    bring you to a screen depicted in [Figure 13-6](#Chapter13.html#fig_13_6).


    ![Image](images/9781430238102_Fig13-06.jpg)


    ***Figure 13-6.** Adding a data source view to the project*


    On the first page of the wizard (not the welcome page, on which you should immediately
    check `Don’t Show This Page Again`), select the `Pro_SSRS_2008R2` data source
    you created earlier, and then click `Next` to move to the `Select Tables and Views`
    page. As you can see in [Figure 13-7](#Chapter13.html#fig_13_7), you can choose
    from many tables.


    ![Image](images/9781430238102_Fig13-07.jpg)


    ***Figure 13-7.** Related tables in the `Pro_SSRS_2008R2` data source*


    You could add all the tables from the list of required tables for the patient
    census reports you are going to create; however, knowing that you will have too
    many unnecessary fields to work with, simply select `Next` and then `Finish` to
    close the wizard without including any objects. This will create the `Pro SSRS
    2008R2` data source view with no tables defined. Why, you may ask, did you not
    select any relational objects, since this seems like a crazy way to start? The
    reason is that you will add your own single object, called a `named query`, which
    is like a view in a SQL Server database. It is an object derived from a query
    of other objects. Assuming you had chosen one or more tables, you would have graphically
    defined the relationships for the tables based on primary keys, if they existed,
    or by using related column ID values and these tables would become the source
    for the report model. The end result is the same, whether you use real table objects
    with relationships or you use `named query` tables that contain only the fields
    you want. The difference is that this way you gain the benefit of one simple and
    concise table, instead of using many tables with the potential downside of adding
    more data than are needed for the model.


    Once you have created the data source view, which defaults to a name of `Pro SSRS
    2008R2` based on the data source, you can double-click to open it in the design
    environment. It will appear empty, as it should. You can add the source query,
    or more accurately, the `named query`, by clicking the `New Named Query` button
    on the toolbar, as shown in [Figure 13-8](#Chapter13.html#fig_13_8).


    ![Image](images/9781430238102_Fig13-08.jpg)


    ***Figure 13-8.** Pro SSRS data source view*


    In this case, you have already designed the query; however, Report Builder 1.0
    includes its own graphical query builder, so it is possible to develop the query
    on the fly, so to speak. The graphical query designer is standard, with standard
    diagram, grid, SQL, and result panes. Clicking the `New Named Query` button opens
    the `Create Named Query` window. In the SQL pane, we can paste the pre-existing
    `Patient Census` query from [Listing 13-1](#Chapter13.html#list_13_1), and click
    in the blank diagram pane to automatically load the graphical representation of
    the query. If you need to provide aliases for any fields, such as distinguishing
    the common `LastName` fields from the employee and patient table, you can do that
    in the grid pane, as shown in [Figure 13-9](#Chapter13.html#fig_13_9), which also
    shows the query and all the joined tables. Alias the `lastname` field as `Pat_LastName`
    for patient and `Emp_LastName` for employee. Otherwise, if there were common references
    to `lastname`, the default alias would have been `ExprX`, where `X` is the number
    of common references. You can do the same for the ubiquitous `DSCR`, used for
    descriptions, as in the `Diag` and `PatEMR` tables. We have also created an alias
    for each of the tables. This cuts down on the typing and makes the SQL easier
    to follow. You can alias the table names in the SQL section of the code or by
    right-clicking in the header section of each table and selecting `Properties`.
    You can enter the alias in the `Alias` section of the properties window.


    ![Image](images/square.jpg) **Note** To make it easier on you with less typing,
    we have included this query in the source code for this book in a file called
    `Patient Census Query – Chapter 13.sql`. Of course if you really like typing,
    though, feel free to write the SQL statement provided in [Listing 13-1](#Chapter13.html#list_13_1).


    ***Listing 13-1.** Patient Census Query*


    ```sql

    SELECT   

        A.PatProgramID

        , E.EmployeeID

        , E.LastName AS Emp_LastName

        , E.FirstName AS Emp_Firstname

        , D2.Dscr AS Discipline

        , B.BranchName

        , P.PatID

        , P.LastName AS Pat_LastName

        , P.FirstName AS Pat_FirstName

        , D.DiagID

        , D.Dscr AS Diagnosis

        , PD.DiagOnset

        , PD.DiagOrder

        , A.StartOfCare

        , A.DischargeDate

        , P.MI

        , P.Address1

        , P.Address2

        , P.City

        , P.HomePhone

        , P.Zip

        , P.State

        , P.WorkPhone

        , P.DOB

        , P.SSN

        , P.Sex

        , P.RaceID

        , P.MaritalStatusID

        , EMR.DateEntered

        , EMR.Dscr AS EMR_Document

        , DS.Dscr AS [Discharge Reason]

        , DATEDIFF(dd, A.StartOfCare, A.DischargeDate) + 1 AS [Length of Stay]

    FROM       

        Admissions AS A

        INNER JOIN Patient AS P ON A.PatID = P.PatID

        INNER JOIN Branch AS B ON B.BranchID = P.OrigBranchID

        LEFT OUTER JOIN PatDiag AS PD ON A.PatProgramID = PD.PatProgramID

        INNER JOIN Diag AS D ON PD.DiagTblID = D.DiagTblID

        LEFT OUTER JOIN Employee AS E ON A.EmployeeTblID = E.EmployeeTblID

        LEFT OUTER JOIN Discipline AS D2 ON D2.DisciplineTblID = E.DisciplineTblID

        LEFT OUTER JOIN PatEMRDoc AS EMR ON A.PatProgramID = EMR.PatProgramID

        LEFT OUTER JOIN DocumentImage AS DI ON DI.DocumentImageID = EMR.DocumentImageID

        LEFT OUTER JOIN Dischg AS DS ON A.DischargeTblID = DS.DischgTblID

    WHERE   

        (PD.DiagOrder = 1)

    ```


    ![Image](images/9781430238102_Fig13-09.jpg)


    ***Figure 13-9.** `Named query` displayed graphically with alias names*'
  raw: '### Creating a Data Source View


    You create data source views for a report model project from relational data sources,
    where you have a list of tables that can be joined to form the basis of the data
    source view. In the Pro_SSRS_2008R2 database, you know many related tables are
    joined by column ID fields; for example, the Admissions table joins to the Patient
    table via the PatID field. Fields in both tables may be relevant to a user designing
    a report; however, superfluous data may just confuse that user. Part of your job
    as the report modeler is to remove the complexity of the schema but also provide
    a model that contains intuitive or “friendly” names and provides only the data
    that will be useful. Why should you use Dscr for a diagnosis code, when you really
    should just make it Diagnosis Name, for example? Since it is also possible to
    add objects to a data source view that are derived tables made from custom queries,
    you will have more control over creating a custom data source view and eliminate
    much of the work of removing the extraneous fields included in all the tables
    you are using. This will become more evident to you as you step through the process.
    For now, we will show how to perform the following logical steps to keep the data
    source view and subsequent model simple but effective:


    > *   Building a query instead of many multiple tables for the data source view

    > *   Selecting only relevant and potentially useful fields for the report designers,
    based on their requests

    > *   Using friendly names for data source view fields and values


    The first step in creating the view, like with the data source, is to open the
    wizard by right-clicking the Data Source Views folder and selecting Add New Data
    Source. Clicking Next to proceed to the next screen in the wizard will bring you
    to a screen depicted in [Figure 13-6](#Chapter13.html#fig_13_6).


    ![Image](images/9781430238102_Fig13-06.jpg)


    ***Figure 13-6.** Adding a data source view to the project*


    On the first page of the wizard (not the welcome page, on which you should immediately
    check Don’t Show This Page Again), select the Pro_SSRS_2008R2 data source you
    created earlier, and then click Next to move to the Select Tables and Views page.
    As you can see in [Figure 13-7](#Chapter13.html#fig_13_7), you can choose from
    many tables.


    ![Image](images/9781430238102_Fig13-07.jpg)


    ***Figure 13-7.** Related tables in the Pro_SSRS_2008R2 data source*


    You could add all the tables from the list of required tables for the patient
    census reports you are going to create; however, knowing that you will have too
    many unnecessary fields to work with, simply select Next and then Finish to close
    the wizard without including any objects. This will create the Pro SSRS 2008R2
    data source view with no tables defined. Why, you may ask, did you not select
    any relational objects, since this seems like a crazy way to start? The reason
    is that you will add your own single object, called a *named query*, which is
    like a view in a SQL Server database. It is an object derived from a query of
    other objects. Assuming you had chosen one or more tables, you would have graphically
    defined the relationships for the tables based on primary keys, if they existed,
    or by using related column ID values and these tables would become the source
    for the report model. The end result is the same, whether you use real table objects
    with relationships or you use named query tables that contain only the fields
    you want. The difference is that this way you gain the benefit of one simple and
    concise table, instead of using many tables with the potential downside of adding
    more data than are needed for the model.


    Once you have created the data source view, which defaults to a name of Pro SSRS
    2008R2 based on the data source, you can double-click to open it in the design
    environment. It will appear empty, as it should. You can add the source query,
    or more accurately, the named query, by clicking the New Named Query button on
    the toolbar, as shown in [Figure 13-8](#Chapter13.html#fig_13_8).


    ![Image](images/9781430238102_Fig13-08.jpg)


    ***Figure 13-8.** Pro SSRS data source view*


    In this case, you have already designed the query; however, Report Builder 1.0
    includes its own graphical query builder, so it is possible to develop the query
    on the fly, so to speak. The graphical query designer is standard, with standard
    diagram, grid, SQL, and result panes. Clicking the New Named Query button opens
    the Create Named Query window. In the SQL pane, we can paste the pre-existing
    Patient Census query from [Listing 13-1](#Chapter13.html#list_13_1), and click
    in the blank diagram pane to automatically load the graphical representation of
    the query. If you need to provide aliases for any fields, such as distinguishing
    the common LastName fields from the employee and patient table, you can do that
    in the grid pane, as shown in [Figure 13-9](#Chapter13.html#fig_13_9), which also
    shows the query and all the joined tables. Alias the lastname field as Pat_LastName
    for patient and Emp_LastName for employee. Otherwise, if there were common references
    to lastname, the default alias would have been ExprX, where X is the number of
    common references. You can do the same for the ubiquitous DSCR, used for descriptions,
    as in the Diag and PatEMR tables. We have also created an alias for each of the
    tables. This cuts down on the typing and makes the SQL easier to follow. You can
    alias the table names in the SQL section of the code or by Right-Clicking in the
    header section of each table and selecting Properties. You can enter the alias
    in the Alias section of the properties window.


    ![Image](images/square.jpg) **Note** To make it easier on you with less typing,
    we have included this query in the source code for this book in a file called
    Patient Census Query – [Chapter 13](#Chapter13.html).sql. Of course if you really
    like typing, though, feel free to write the SQL statement provided in [Listing
    13-1](#Chapter13.html#list_13_1).


    ***Listing 13-1.** Patient Census Query*


    `SELECT    `

    `    A.PatProgramID`

    `    , E.EmployeeID`

    `    , E.LastName AS Emp_LastName`

    `    , E.FirstName AS Emp_Firstname`

    `    , D2.Dscr AS Discipline`

    `    , B.BranchName`

    `    , P.PatID`

    `    , P.LastName AS Pat_LastName`

    `    , P.FirstName AS Pat_FirstName`

    `    , D.DiagID`

    `    , D.Dscr AS Diagnosis`

    `    , PD.DiagOnset`

    `    , PD.DiagOrder`

    `    , A.StartOfCare`

    `    , A.DischargeDate`

    `    , P.MI`

    `    , P.Address1`

    `    , P.Address2`

    `    , P.City`

    `    , P.HomePhone`

    `    , P.Zip`

    `    , P.State`

    `    , P.WorkPhone`

    `    , P.DOB`

    `    , P.SSN`

    `    , P.Sex`

    `    , P.RaceID`

    `    , P.MaritalStatusID`

    `    , EMR.DateEntered`

    `    , EMR.Dscr AS EMR_Document`

    `    , DS.Dscr AS [Discharge Reason]`

    `    , DATEDIFF(dd, A.StartOfCare, A.DischargeDate) + 1 AS [Length of Stay]`

    `FROM        `

    `    Admissions AS A`

    `    INNER JOIN Patient AS P ON A.PatID = P.PatID`

    `    INNER JOIN Branch AS B ON B.BranchID = P.OrigBranchID`

    `    LEFT OUTER JOIN PatDiag AS PD ON A.PatProgramID = PD.PatProgramID`

    `    INNER JOIN Diag AS D ON PD.DiagTblID = D.DiagTblID`

    `    LEFT OUTER JOIN Employee AS E ON A.EmployeeTblID = E.EmployeeTblID`

    `    LEFT OUTER JOIN Discipline AS D2 ON D2.DisciplineTblID = E.DisciplineTblID`

    `    LEFT OUTER JOIN PatEMRDoc AS EMR ON A.PatProgramID = EMR.PatProgramID`

    `    LEFT OUTER JOIN DocumentImage AS DI ON DI.DocumentImageID = EMR.DocumentImageID`

    `    LEFT OUTER JOIN Dischg AS DS ON A.DischargeTblID = DS.DischgTblID`

    `WHERE    `

    `    (PD.DiagOrder = 1)` ![Image](images/9781430238102_Fig13-09.jpg)


    ***Figure 13-9.** Named query displayed graphically with alias names*'
  trans: '### 创建数据源视图


    你通过关系型数据源为报表模型项目创建数据源视图，其中有一组可以通过连接来构成数据源视图基础的表。在 `Pro_SSRS_2008R2` 数据库中，你知道许多相关的表是通过列
    ID 字段连接的；例如，`Admissions`（入院）表通过 `PatID` 字段连接到 `Patient`（患者）表。这两个表中的字段可能都与设计报表的用户相关；然而，多余的数据可能只会让用户感到困惑。作为报表建模者，你的部分工作是简化架构的复杂性，同时提供一个包含直观或“友好”名称并且只提供有用数据的模型。为什么你要使用
    `Dscr` 来表示诊断代码，而实际上你应该直接将其命名为 Diagnosis Name（诊断名称）呢？既然也可以向数据源视图添加由自定义查询派生出的表（即衍生表），你将能更好地控制创建自定义数据源视图，并省去大量移除你所使用的所有表中包含的无关字段的工作。随着你逐步完成这个过程，这一点会变得更加明显。现在，我们将展示如何执行以下逻辑步骤，以保持数据源视图及后续模型的简单高效：


    > *   为数据源视图构建一个查询，而不是使用多个表

    > *   根据报表设计者的请求，只选择相关且可能有用的字段

    > *   为数据源视图字段和值使用友好的名称


    创建视图的第一步，与创建数据源类似，是通过右键单击 `数据源视图` 文件夹并选择 `添加新数据源` 来打开向导。点击 `下一步` 进入向导的下一个屏幕，你将看到如
    图 13-6 所示的界面。


    ![Image](img/9781430238102_Fig13-06.jpg)


    ***图 13-6.** 向项目添加数据源视图*


    在向导的第一页（不是欢迎页，在欢迎页上你应该立即勾选 `不再显示此页`），选择你之前创建的 `Pro_SSRS_2008R2` 数据源，然后点击 `下一步`
    转到 `选择表和视图` 页面。如你在 图 13-7 所见，你可以从许多表中选择。


    ![Image](img/9781430238102_Fig13-07.jpg)


    ***图 13-7.** `Pro_SSRS_2008R2` 数据源中的相关表*


    你可以从你计划创建的患者统计报表所需的表列表中添加所有表；然而，考虑到你会有太多不必要的字段需要处理，不如直接选择 `下一步`，然后点击 `完成` 来关闭向导，而不包含任何对象。这将创建一个未定义任何表的
    `Pro SSRS 2008R2` 数据源视图。你可能会问，既然这看起来是个疯狂的方式，为什么你不选择任何关系对象？原因在于，你将添加自己的单个对象，称为
    `命名查询`，它类似于 SQL Server 数据库中的视图。这是一个从其他对象查询派生出的对象。假设你选择了一个或多个表，你将会基于主键（如果存在）或使用相关的列
    ID 值图形化地定义这些表之间的关系，而这些表将成为报表模型的数据源。无论你是使用带有关系的真实表对象，还是使用只包含你所需字段的 `命名查询` 表，最终结果是相同的。区别在于，通过这种方式，你可以获得一个简单明了的表的好处，而不是使用许多表，并可能带来添加超出模型所需更多数据的潜在缺点。


    一旦创建了数据源视图（默认名称基于数据源为 `Pro SSRS 2008R2`），你可以在设计环境中双击打开它。它看起来会是空的，这很正常。你可以通过点击工具栏上的
    `新建命名查询` 按钮来添加源查询，或者更准确地说，添加 `命名查询`，如 图 13-8 所示。


    ![Image](img/9781430238102_Fig13-08.jpg)


    ***图 13-8.** Pro SSRS 数据源视图*


    在这种情况下，你已经设计好了查询；不过，报表生成器 1.0 包含了它自己的图形化查询生成器，因此可以说，你可以即时开发查询。图形化查询设计器是标准的，包含标准的关系图窗格、网格窗格、SQL
    窗格和结果窗格。点击 `新建命名查询` 按钮会打开 `创建命名查询` 窗口。在 SQL 窗格中，我们可以粘贴来自 清单 13-1 的预先存在的 `患者统计`
    查询，并在空白的关系图窗格中点击以自动加载查询的图形化表示。如果你需要为任何字段提供别名，例如区分员工表和患者表中常见的 `LastName` 字段，你可以在网格窗格中完成，如
    图 13-9 所示，该图还显示了查询和所有连接的表。为 `lastname` 字段设置别名：患者表为 `Pat_LastName`，员工表为 `Emp_LastName`。否则，如果对
    `lastname` 有共同的引用，默认的别名将是 `ExprX`，其中 `X` 是共同引用的数量。你也可以对无处不在的 `DSCR`（用于描述，如在 `Diag`
    和 `PatEMR` 表中）进行同样的操作。我们还为每个表创建了别名。这减少了输入量，并使 SQL 更容易理解。你可以在 SQL 代码部分为表名设置别名，也可以通过右键单击每个表的标题部分并选择
    `属性` 来设置。你可以在属性窗口的 `别名` 部分输入别名。


    ![Image](img/square.jpg) **注意** 为了减少你的输入工作，我们已将此查询包含在本书源代码的一个名为 `Patient Census
    Query – Chapter 13.sql` 的文件中。当然，如果你真的喜欢打字，请随意编写 清单 13-1 中提供的 SQL 语句。


    ***清单 13-1.** 患者统计查询*


    ```sql

    SELECT   

        A.PatProgramID

        , E.EmployeeID

        , E.LastName AS Emp_LastName

        , E.FirstName AS Emp_Firstname

        , D2.Dscr AS Discipline

        , B.BranchName

        , P.PatID

        , P.LastName AS Pat_LastName

        , P.FirstName AS Pat_FirstName

        , D.DiagID

        , D.Dscr AS Diagnosis

        , PD.DiagOnset

        , PD.DiagOrder

        , A.StartOfCare

        , A.DischargeDate

        , P.MI

        , P.Address1

        , P.Address2

        , P.City

        , P.HomePhone

        , P.Zip

        , P.State

        , P.WorkPhone

        , P.DOB

        , P.SSN

        , P.Sex

        , P.RaceID

        , P.MaritalStatusID

        , EMR.DateEntered

        , EMR.Dscr AS EMR_Document

        , DS.Dscr AS [Discharge Reason]

        , DATEDIFF(dd, A.StartOfCare, A.DischargeDate) + 1 AS [Length of Stay]

    FROM       

        Admissions AS A

        INNER JOIN Patient AS P ON A.PatID = P.PatID

        INNER JOIN Branch AS B ON B.BranchID = P.OrigBranchID

        LEFT OUTER JOIN PatDiag AS PD ON A.PatProgramID = PD.PatProgramID

        INNER JOIN Diag AS D ON PD.DiagTblID = D.DiagTblID

        LEFT OUTER JOIN Employee AS E ON A.EmployeeTblID = E.EmployeeTblID

        LEFT OUTER JOIN Discipline AS D2 ON D2.DisciplineTblID = E.DisciplineTblID

        LEFT OUTER JOIN PatEMRDoc AS EMR ON A.PatProgramID = EMR.PatProgramID

        LEFT OUTER JOIN DocumentImage AS DI ON DI.DocumentImageID = EMR.DocumentImageID

        LEFT OUTER JOIN Dischg AS DS ON A.DischargeTblID = DS.DischgTblID

    WHERE   

        (PD.DiagOrder = 1)

    ```


    ![Image](img/9781430238102_Fig13-09.jpg)


    ***图 13-9.** 带别名显示的图形化 `命名查询`*'
- fmt: 'Finally, name the query`Patient Census`. When you click`OK`to complete the
    named query, your simple data source view consists of one object,`Patient Census`that
    contains the desired fields for the model. You can see in [Figure 13-10](#Chapter13.html#fig_13_10)
    that 32 fields will be supplied to the model.


    ![Image](images/9781430238102_Fig13-10.jpg)


    *Figure 13-10. Data source view with one object*


    The next step in the process is to add a logical primary key to the`Patient Census`named
    query because the report modeler requires a primary key when it generates the
    model. Because the query is driven from the`Admissions`table, which contains the`PatProgramID`field
    that you know will contain unique values, you can use this field as the logical
    primary key for the`Patient Census`query. The`PatProgramID`field, in the example
    database, controls the admission and discharge records for a patient over time.
    It is typical that the same patient will be admitted to two separate service lines,
    referred to as`programs`; hence, you have`PatProgramID`. Without the`PatProgramID`field,
    the records would not be unique with the patient’s identification number,`PatID`,
    alone.


    To set the logical primary key for the`Patient Census`object to be`PatProgramID`,
    simply right-click the`PatProgramID`field either in the`Tables`list or in the`Patient
    Census`diagram, and select`Set Logical Primary Key`, as shown in [Figure 13-11](#Chapter13.html#fig_13_11).
    When you do this, you will see an icon that looks like a key appear next to the`PatProgramID`field.


    ![Image](images/9781430238102_Fig13-11.jpg)


    *Figure 13-11. Setting the logical primary key*


    At this point, you can save the data source view and then create the report model.
    Before you do, however, let’s take a look at a really great feature in the design
    environment, which is the ability to explore the data. Right-click anywhere in
    the`Patient Census`object—on`EmployeeID`, for example—and select`Explore Data`.
    As you can see, many records are returned from the entire`Patient Census`object,
    which you will use for the report you create later. However, also notice the three
    additional tabs beside`Table`, as shown in [Figure 13-12](#Chapter13.html#fig_13_12).
    The`Pivot Table`,`Chart`, and`Pivot Chart`tabs suddenly appear, like finding a
    really valuable trumpet shell unexpectedly on the beach. (Not that this will help
    you greatly when developing the report model, but we just thought it was worth
    showing.)


    Now that you have determined that the`Patient Census`data source view is returning
    data as you expected, you will save it and move on to the real heart of`Report
    Builder 1.0`, the report model.


    ![Image](images/9781430238102_Fig13-12.jpg)


    *Figure 13-12. Additional tabs when exploring data*


    ## Creating a Report Model


    The report model will add a layer of separation between report designers and the
    underlying data source, simplifying the process of designing reports by allowing
    them to focus on report design and not query design. Now that you have the data
    source view, which is a requirement for building a report model, you will learn
    how to create the model. The process is straightforward, thanks to auto-generation
    methods that analyze the data source view in two passes and produce the end result—a
    publishable report model in which the constituent elements would have otherwise
    taken much time and effort to produce, as you will see. The goal in this section
    is to walk you through the wizard so you can pay attention to the generation methods
    and finally deploy your completed model to the`SSRS`server.


    You will again utilize the right-click procedure to initiate the`Report Model
    Wizard`from the`Report Models`folder in the`Solution Explorer`. After navigating
    past the first welcome page to the`Select Data Source View`page, you are presented
    with the`Pro SSRS 2008R2`data source view selection, as shown in [Figure 13-13](#Chapter13.html#fig_13_13).


    ![Image](images/9781430238102_Fig13-13.jpg)


    *Figure 13-13. Selecting a data source view*


    After selecting`Pro SSRS`, click`Next`, where you can now select the report model
    generation rules. You will see a set of rules that will be performed on the data
    source view. Several rules exist, and most of them are selected by default. Many
    of the rules are self-explanatory; however, two are not selected, by default:`Create
    Entities for Nonempty Tables`and`Create Attributes for Nonempty Columns`. These
    two rules instruct the generation process to create entities and attributes only
    for tables that contain data. Entities are the report model’s table equivalent,
    and attributes are conceptually the fields or columns defined within the entities.


    The following are all the rules for the first pass of generating the model and
    are selectable in the`Report Model Wizard`:


    *   Create Entities for All Tables

    *   Create Entities for Non-empty Tables

    *   Create Count Aggregates

    *   Create Attributes

    *   Create Attributes for Non-empty Columns

    *   Create Attributes for Auto-increment Columns

    *   Create Date Variations

    *   Create Numeric Aggregates

    *   Create Date Aggregates

    *   Create Time Aggregates

    *   Create Roles


    This pass processes all rules up to`Create Roles`. You will also see a helpful
    description for each rule, as shown in [Figure 13-14](#Chapter13.html#fig_13_14).


    ![Image](images/9781430238102_Fig13-14.jpg)


    *Figure 13-14. Model generation rules with descriptions*


    For this example, leave the default selections, as these will give you features
    such as automatic aggregations for any numbers and dates and also create date
    variations so that for every`Date Time`data type in the data source view, you
    will have`Day`,`Month`, and`Year`created. You can click`Next`and choose to update
    statistics before generating, as shown in [Figure 13-15](#Chapter13.html#fig_13_15).
    This is important if any data have changed significantly in the source tables.


    ![Image](images/9781430238102_Fig13-15.jpg)


    *Figure 13-15. Update Statistics page*'
