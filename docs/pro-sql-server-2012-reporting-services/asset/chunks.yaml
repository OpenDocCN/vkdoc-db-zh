    ![Image](images/9781430238102_Fig10-01.jpg)


    ***Figure 10-1.** Choosing the last day of the month*


    Next, select an appropriate start date and end date for the schedule (in this
    case, don’t specify an end date), and then click the OK button. Now you can move
    on and prepare the report itself to use the new schedule. As a note, schedules
    in SSRS rely on the SQL Server Agent service, and as such, the service must be
    running before you can successfully create a schedule.


    ![Image](images/square.jpg) **Note** Note that when a job, such as a subscription
    or an execution snapshot, is scheduled to run within SSRS, a SQL Server job is
    created using the SQL Server Agent. Jobs can be monitored through SSMS or Report
    Manager.'
  trans: '

    ### 探索 SSRS 部署中的管理角色


    您可以将 SSRS 部署的管理角色细分为三个基本类别：


    *   内容管理

    *   性能

    *   报表执行


    在将任何应用程序或服务投入生产环境之前，始终进行测试部署是最佳实践。由于我们公司通过互联网为大量用户提供服务，一些特殊的管理考虑——例如如何为不同公司订阅同一份报表——变得至关重要，我们需要测试各种场景以确保在每种情况下功能都正常。让我们首先看看这三个管理类别，以及我们如何实施和测试它们，以确保在部署到生产环境时，能尽量避免（或至少减少）意外情况。我们将展示如何使用
    `SSRS` 和 `SQL Server 2012` 的内置管理工具来执行所有这些任务。本章稍后部分，我们将展示如何用 `.NET` 构建一个管理应用程序界面，以提供安排报表计划的能力。


    ### 内容管理


    有效管理 `SSRS` 报表服务器上的内容，要求您熟悉可用的管理任务。报表管理的几个方面只有在报表部署后才可用。在我们展示如何为选定用户部署医疗保健报表时，我们将详细涵盖每个方面：


    *   共享计划

    *   报表参数和数据源

    *   报表快照、历史记录和缓存

    *   订阅


    对于每个内容管理任务，我们将提供具体的现实场景，继续以医疗保健机构为例。至此，您已经部署了多个报表、数据源以及其他报表项，例如在本书中开发的图形图像和代码。现在，是时候戴上管理员的帽子，充分利用所有使
    `SSRS` 成为一个独特而强大的报表传递系统以及丰富报表创作环境的功能了。


    #### 设置共享计划


    一般来说，共享计划类似于共享数据源，因为它对有权访问它的用户在整个系统范围内可用。您可以专门为某个作业类型创建共享计划。可以将重复的共享计划配置为按小时、天、月、周执行，或仅运行一次。在此示例中，财务报表将在每月末执行。为这些报表维护历史记录非常重要，这样您就可以在任何时间点冻结值，或用于审计功能，例如了解哪些用户查看了报表以及他们在报表中看到了什么。


    您将创建一个共享计划，用于在每月的最后一天运行财务报表，以提供以下好处：


    *   您可以将报表安排在预定时间执行。

    *   您可以存储每份报表的快照，以维护数据的历史视角。


    `注意` 报表快照是在特定时间执行的报表，无论是由用户启动还是作为计划的一部分执行，它们共同构成了报表历史记录。我们稍后将更详细地介绍快照。


    客户可能在月末运行的一份财务报表是 `AR 对账` 报表。此报表列出了当前会计期间（例如 2009 年 10 月 的 10-2009）发生的财务交易。此报表可能是需要按相同计划执行的几份报表之一。其他财务报表可能包括
    `账龄试算平衡表` 报表和 `AR 账龄分析` 报表。我们将在下一节中使用 `AR 对账` 报表来展示与设置共享计划和创建报表快照相关的管理任务。我们将 `AR
    对账` 报表包含在 `Pro_SSRS` 报表项目下载中，该下载可在 Apress 网站的 Source Code/Download 部分获取 ([`www.apress.com`](http://www.apress.com))。报表定义文件是
    `AR Reconciliation.rdl`。在本节中，我们将展示如何使用已部署的 `AR 对账` 报表版本来配置其参数值，以使其与每月计划执行时间保持一致。


    要部署 `AR 对账` 报表，请在 `BIDS` 中打开 `Pro_SSRS` 项目，然后打开 `解决方案资源管理器`。但是，在部署此报表之前，您需要更改控制报表将部署到报表服务器上哪个文件夹的项目属性。在
    `AR 对账` 示例中，您将把报表部署到名为 `月末财务` 的文件夹中。在 `解决方案资源管理器` 中，右键单击 `Pro_SSRS` 报表项目，然后选择
    `属性`。将 `TargetReportFolder` 值从 `Pro_SSRS` 更改为 `月末财务`，然后单击 `确定`。现在，当您在 `解决方案资源管理器`
    中右键单击 `AR 对账` 报表并选择 `部署` 时，将在您的报表服务器上创建包含 `AR 对账` 报表的新文件夹。


    #### 创建共享计划


    要在 `报表管理器` 中创建共享计划，请单击 `站点设置`，然后在页面左侧导航选项卡的底部选择 `计划`。单击 `新建计划` 按钮链接，并将计划命名为 `月末财务`。在
    `计划详细信息` 部分，您将看到标准的计划选项：`小时`、`天`、`周`、`月` 或 `一次`。对于此报表，请选择 `月`。


    配置共享计划在每月最后一天运行时的第一个挑战是克服 `计划` 表单上的内置数据验证。虽然可以告诉 `SSRS` 在每个月的最后一个星期日执行报表，但无法选择每个月的最后一天，因为最后一天是可变的（即，根据月份不同，可能是
    28、29、30 或 31 日）。嗯，创建一个涵盖所有四个日期的单一计划应该是可行的，对吧？并不完全正确！如果您尝试如 图 10-1 所示保存 `共享计划`，选择
    31 日并在选中所有月份时会导致错误，因为并非所有月份都有 31 天。


    `注意` 您必须以属于 `SSRS 2012 系统管理员` 角色成员的用户身份登录才能添加新计划。如果您尚未被添加为站点的 `系统管理员`，但您是本地 `管理员`
    组的成员，则可能需要使用提升的权限运行浏览器。如果使用 `IE`，您可以右键单击 `IE` 图标并选择 `以管理员身份运行`。


    本例中的解决方案——因为我们知道在每月最后一天午夜 12:00 之后不会有任何活动发生——是将计划设置为在每月第一天的凌晨 12:01 运行。这实质上相当于选择了每个月的最后一天，并且您知道每月的第一天总是
    1 日。


    ![Image](img/9781430238102_Fig10-01.jpg)


    *图 10-1. 选择每月最后一天*


    接下来，为计划选择合适的开始日期和结束日期（本例中，不要指定结束日期），然后单击 `确定` 按钮。现在您可以继续前进，准备报表本身以使用新计划。请注意，`SSRS`
    中的计划依赖于 `SQL Server Agent` 服务，因此，在您能够成功创建计划之前，该服务必须正在运行。


    `注意` 请注意，当在 `SSRS` 中计划运行作业（例如订阅或执行快照）时，会使用 `SQL Server Agent` 创建一个 `SQL Server`
    作业。可以通过 `SSMS` 或 `报表管理器` 监视作业。

    '
- fmt: "## 配置报告以使用共享计划\n\nAR 对账报告包含可限制报告上显示数据的报告参数。其中两个参数 `AcctPeriodYear` 和 `AcctPeriodMonth`\
    \ 在驱动存储过程中用于将财务数据限制在某个会计期间。当从共享计划执行 AR 对账报告时，确保所有报告参数都具有默认值非常重要。首先，AR 对账报告中的所有八个参数都被设置为允许\
    \ `NULL` 值，如 [图 10-2](#Chapter10.html#fig_10_2) 所示，这导致执行时参数的默认值被设置为 `NULL`。这是可以接受的，因为使用这些参数的主存储过程逻辑知道在传递\
    \ `NULL` 值时返回所有数据。\n\n![Image](images/9781430238102_Fig10-02.jpg)\n\n*图 10-2.\
    \ AR 对账报告参数*\n\n然而，对于参数 `AcctPeriodYear` 和 `AcctPeriodMonth`，你需要添加默认的非 `NULL`\
    \ 参数值，以便返回的数据集仅包含当前会计期间的记录。为此，你使用两个函数：\n\n> *   `DATEPART`: 返回一个表示日期组成部分（如年、季度、月或日）的整数\n\
    > *   `TODAY`: 返回当前日期\n\n在表达式中一起使用这些函数，可以为两个参数设置所需的默认值。对于 `AcctPeriodYear`，只需将默认值设置为当前年份，如下所示：\n\
    \n`=DATEPART(\"yyyy\", TODAY())`\n\n对于 `AcctPeriodMonth`，本质上做同样的事情，但需要从表达式值中减去\
    \ 1 以返回正确月份的数据。例如，表达式 `=DATEPART(\"m\", TODAY())`，如果在 11 月 1 日凌晨 12:01 运行，将返回值\
    \ 11，而当前的会计期间是 10 月。为了考虑一月份的情况，你添加一个 `IIF` 函数来评估 `DATEPART`，这样当返回 1（表示一月）时，函数返回\
    \ 12，让报告知道处理 12 月的会计期间。因此，正确的表达式如下：\n\n`=IIF(DATEPART(\"m\", TODAY()) = 1, 12,\
    \ DATEPART(\"m\", TODAY()) -1)`\n\n![Image](images/square.jpg) **注意** 我们的示例数据库仅包含来自过去某个时间点的数据快照。因此，如果你正在按照示例操作，则需要输入示例数据库中包含的年份和月份。大多数记录介于\
    \ 2009 年 9 月至 2009 年 12 月之间。然而，在需要月末频率的报告的真实场景中，请使用上述表达式。\n\n## 使用报告管理器更新和上传 RDL\
    \ 文件\n\n在本节中，你将导航到报告管理器中的 AR 对账报告，并通过 `Notepad` 手动修改 RDL，以添加 `AcctPeriodMonth`\
    \ 和 `AcctPeriodYear` 默认参数值，而不是使用 `BIDS`。这将演示你可以在不需要完整设计环境的情况下对已发布的报告进行简单的修改。打开报告管理器，并导航到报表服务器上“月末财务”文件夹中的\
    \ AR 对账报告，如 [图 10-3](#Chapter10.html#fig_10_3) 所示。\n\n![Image](images/9781430238102_Fig10-03.jpg)\n\
    \n*图 10-3. 报告管理器中的 AR 对账报告*\n\n在 `SSRS 2008 R2` 版本的报告服务发布之前，你可以使用“属性”选项卡进入属性页面。现在，你通过将光标悬停在要管理的报告上来访问报告属性，直到看到报告周围出现黄色矩形和下拉箭头。当你看到下拉箭头时，单击它并选择“管理”，如\
    \ [图 10-4](#Chapter10.html#fig_10_4) 所示。注意不要单击包含报告名称的链接，因为这将导致报告执行。\n\n![Image](images/9781430238102_Fig10-04.jpg)\n\
    \n*图 10-4. 报告管理选项菜单*\n\n单击“管理”后，你将进入报告属性页面，你会在左侧看到九个选项卡，在顶部看到五个用于报告维护的链接按钮。这些链接不言自明，因此我不详细介绍每一个。但是，正如你在\
    \ [图 10-5](#Chapter10.html#fig_10_5) 中所看到的，你可以执行诸如删除、移动、下载以编辑报告或用另一个副本替换报告等维护任务。\n\
    \n![Image](images/9781430238102_Fig10-05.jpg)\n\n*图 10-5. 报告属性屏幕*\n\n在 AR 对账报告的属性页面上，有两个链接——“下载”和“替换”——管理员可以使用它们直接修改\
    \ `RDL`，而无需通过其他方式（例如使用自定义代码、创作环境或 `rs` 命令行实用程序）重新部署报告。有关部署报告的更多详细信息，请参见[第 8 章](#Chapter08.html)。单击“下载”链接将文件保存到你可以访问的位置，然后用\
    \ `Notepad` 打开它，如 [图 10-6](#Chapter10.html#fig_10_6) 所示。[图 10-6](#Chapter10.html#fig_10_6)\
    \ 显示了 AR 对账报告的 `RDL` 文件。同时按下 `CTRL` 和 `F` 键进行查找并搜索 `ReportParameter`。单击“查找下一个”以定位搜索词的第一个实例。注意\
    \ `RDL` 代码中的 `AcctPeriodYear` 和 `AcctPeriodMonth` 参数。\n\n![Image](images/9781430238102_Fig10-06.jpg)\n\
    \n*图 10-6. 在 Notepad 中编辑的 RDL 文件*\n\n要更新报告以包含你在上一节中创建的默认参数值，你可以将 `RDL` 代码直接放入文件并保存。为每个参数生成默认值的\
    \ `RDL` 部分只有五行长，如 [清单 10-1](#Chapter10.html#list_10_1) 所示，该清单显示了 `AcctPeriodYear`\
    \ 参数的默认值部分。\n\n*清单 10-1. RDL 默认值部分*\n\n```\n<DefaultValue>\n   <Values>\n    \
    \ <Value>=DATEPART(\"yyyy\", TODAY())</Value>\n   </Values>\n</DefaultValue>\n\
    ```\n\n[图 10-7](#Chapter10.html#fig_10_7) 显示了为两个参数插入默认值代码后的 `RDL` 文件。\n\n![Image](images/9781430238102_Fig10-07.jpg)\n\
    \n*图 10-7. 带有默认参数的 RDL 文件*\n\n因为你无法直接从 `Notepad` 保存到 `SSRS` 服务器，所以将你的 `RDL` 文件副本保存到磁盘。任何可访问的位置都可以，例如网络共享或本地磁盘。保存文件后，你可以单击“替换”链接，在磁盘上找到你修改后的\
    \ `RDL` 文件，然后选择“打开”。当你返回到“上传报告定义”屏幕时，单击“确定”以替换现有报告。如果你在 2010 年 1 月 1 日执行了该报告，你将看到具有正确默认值的报告，如\
    \ [图 10-8](#Chapter10.html#fig_10_8) 所示。\n\n![Image](images/9781430238102_Fig10-08.jpg)\n\
    \n*图 10-8. 带有默认参数的 AR 对账报告*\n\n通过报告管理器更新报告不会覆盖报告的其他属性，例如历史记录、计划和执行方法。\n\n![Image](images/square.jpg)\
    \ **注意** 当你使用基于可变数据（例如数据库中的值）的默认值时，必须注意返回的值必须与可用值相符。在此示例中，如果为五月返回的值是 5，但没有选择五月的值，报告将强制用户进行选择，而不是执行并返回无数据。我们选择将数据限制为数据库中实际存储的值。"
  raw: '#### Configuring a Report to Use a Shared Schedule


    The AR Reconciliation report contains report parameters that can limit the data
    displayed on the report. Two of the parameters, AcctPeriodYear and AcctPeriodMonth,
    are used in the driving stored procedure to limit financial data to an accounting
    period. When the AR Reconciliation report is executed from a shared schedule,
    it is important that all the parameters for the report have default values. To
    begin with, all eight parameters in the AR Reconciliation report are set to allow
    NULL values, as shown in [Figure 10-2](#Chapter10.html#fig_10_2), which causes
    the default value of the parameter to be set to NULL when executed. This is OK
    because the logic in the main stored procedure that uses the parameters knows
    to return all data when a NULL value is passed to it.


    ![Image](images/9781430238102_Fig10-02.jpg)


    ***Figure 10-2.** AR Reconciliation report parameters*


    For the parameters AcctPeriodYear and AcctPeriodMonth, however, you need to add
    default non-NULL parameter values so that the returned dataset includes only those
    records for the current accounting period. To do this, you use two functions:


    > *   DATEPART: Returns an integer representing one of the component parts of
    a date, such as year, quarter, month, or day

    > *   TODAY: Returns the current date


    Used together in an expression, these functions allow you to set the desired default
    values for your two parameters. For AcctPeriodYear, you simply set the default
    value to the current year, as follows:


    `=DATEPART("yyyy", TODAY())`


    For AcctPeriodMonth, you essentially do the same thing, but you need to subtract
    1 from the expression value to return the data for the correct month. For example,
    the expression =DATEPART("m", TODAY()), when run at 12:01 AM on November 1, would
    return a value of 11, when the current accounting period is 10-October. To account
    for January, you add an IIF function to evaluate the DATEPART so that when 1 is
    returned for January, a 12 is returned, letting the report know to process the
    December accounting period. So the correct expression is as follows:


    `=IIF(DATEPART("m", TODAY())  = 1, 12, DATEPART("m", TODAY()) -1)`


    ![Image](images/square.jpg) **Note** Our sample database contains only a snapshot
    of data taken from a previous point in time. As such, if you are following along
    the examples, you will need to enter a year and month contained within the sample
    database. The majority of records are between September 2009 and December 2009\.
    However, in a real world scenario of a report requiring an End of Month frequency,
    use the above expressions.


    #### Updating and Uploading the RDL File Using Report Manager


    For this section, you will navigate to the AR Reconciliation report in Report
    Manager and modify the RDL manually to add the AcctPeriodMonth and AcctPeriodYear
    default parameter values via Notepad instead of using BIDS. This will demonstrate
    that you can make simple modifications to published reports without the need for
    a full-blown design environment. Open Report Manager, and navigate to the AR Reconciliation
    report in the End of Month Financials folder on your report server, as shown in
    [Figure 10-3](#Chapter10.html#fig_10_3).


    ![Image](images/9781430238102_Fig10-03.jpg)


    ***Figure 10-3.** AR Reconciliation report in Report Manager*


    Prior to the SSRS 2008 R2 release of Reporting Services, you could get to the
    properties page using the Properties tab. Now, you access the report properties
    by placing the cursor over the report that you want to manage until you see a
    yellow rectangle around the report and dropdown arrow. When you see the dropdown
    arrow, click it and select Manage as shown in [Figure 10-4](#Chapter10.html#fig_10_4).
    Just be sure not to click the link containing the report name as this will cause
    the report to execute.


    ![Image](images/9781430238102_Fig10-04.jpg)


    ***Figure 10-4**. Report Management Options menu*


    After you have clicked Manage, you will be taken to the report properties page
    and you will see nine tabs along the left and five linked buttons on the top containing
    items to be used for report maintenance. The links are pretty self-explanatory,
    so I will not go into the details on each one. However, as you can see in [Figure
    10-5](#Chapter10.html#fig_10_5), you can perform such maintenance tasks as deleting,
    moving, downloading to edit a report, or replacing the report with another copy.


    ![Image](images/9781430238102_Fig10-05.jpg)


    ***Figure 10-5**. Report Properties screen*


    On the properties page for the AR Reconciliation report are two links—Download
    and Replace—that administrators can use to modify the RDL directly without having
    to redeploy reports through other means (such as through use of custom code, the
    authoring environment, or the rs command-line utility). For further details on
    deploying reports, please see [Chapter 8](#Chapter08.html). Click the Download
    link to save the file to a location available to you and then open it with Notepad
    as shown in [Figure 10-6](#Chapter10.html#fig_10_6). [Figure 10-6](#Chapter10.html#fig_10_6)
    shows the RDL file for the AR Reconciliation report. Hit the CTRL and F keys at
    the same time to do a find and search for ReportParameter. Click Find Next to
    locate the first instance of the search term entered. Notice the AcctPeriodYear
    and AcctPeriodMonth parameters in the RDL code.


    ![Image](images/9781430238102_Fig10-06.jpg)


    ***Figure 10-6**. RDL file edited in Notepad*


    To update the report to include the default parameter values that you created
    in the previous section, you can place RDL code directly in the file and save
    it. The section of the RDL that generates the default values for each parameter
    is only five lines long, as you can see in [Listing 10-1](#Chapter10.html#list_10_1),
    which shows the default value section for the AcctPeriodYear parameter.


    ***Listing 10-1.** RDL Default Value Section*


    `<DefaultValue>`

    `   <Values>`

    `     <Value>=DATEPART("yyyy", TODAY())</Value>`

    `   </Values>`

    `</DefaultValue>`


    [Figure 10-7](#Chapter10.html#fig_10_7) shows the RDL file after the default value
    code was inserted for both parameters.


    ![Image](images/9781430238102_Fig10-07.jpg)


    ***Figure 10-7.** RDL file with default parameters*


    Because you can’t save directly from Notepad to the SSRS server, save your copy
    of the RDL file to disk. Any accessible location is fine, such as a network share
    or your local disk. After the file is saved, you can click the Replace link, locate
    your modified RDL file on disk, and select Open. When you return back to the Upload
    a report definition screen, click OK to replace the existing report. If you executed
    the report on January 1^(st), 2010, you would see the report with correct default
    values, as shown in [Figure 10-8](#Chapter10.html#fig_10_8).


    ![Image](images/9781430238102_Fig10-08.jpg)


    ***Figure 10-8.** AR Reconciliation report with default parameters*


    Updating the report through Report Manager doesn’t overwrite other properties
    of the report such as history, schedules, and execution methods.


    ![Image](images/square.jpg) **Caution** When you use default values based on variable
    data such as values in a database, it’s important to note that the returned value
    must coincide with available values. In this example, if a value of 5 is returned
    for May, but no values for May can be selected, the report will force the user
    to make a selection, as opposed to executing and returning no data. We chose to
    limit the data to values actually stored in the database.'
  trans: "\n## 配置报告以使用共享计划\n\nAR 对账报告包含可用于限制报告显示数据的报告参数。其中两个参数 `AcctPeriodYear` 和\
    \ `AcctPeriodMonth` 在驱动存储过程中用于将财务数据限制在特定的会计期间。当从共享计划执行 AR 对账报告时，确保所有报告参数都具有默认值非常重要。首先，AR\
    \ 对账报告中的所有八个参数都被设置为允许 `NULL` 值，如 图 10-2 所示，这导致执行时参数的默认值被设为 `NULL`。这是可以接受的，因为使用这些参数的主存储过程逻辑知道在传递\
    \ `NULL` 值时返回所有数据。\n\n![Image](img/9781430238102_Fig10-02.jpg)\n\n*图 10-2. AR\
    \ 对账报告参数*\n\n然而，对于参数 `AcctPeriodYear` 和 `AcctPeriodMonth`，你需要添加默认的非 `NULL` 参数值，以便返回的数据集仅包含当前会计期间的记录。为此，你使用两个函数：\n\
    \n> *   `DATEPART`: 返回一个表示日期组成部分（如年、季度、月或日）的整数\n> *   `TODAY`: 返回当前日期\n\n在表达式中一起使用这些函数，可以为这两个参数设置所需的默认值。对于\
    \ `AcctPeriodYear`，只需将默认值设置为当前年份，如下所示：\n\n`=DATEPART(\"yyyy\", TODAY())`\n\n对于\
    \ `AcctPeriodMonth`，本质上做同样的事情，但需要从表达式值中减去 1 以返回正确月份的数据。例如，表达式 `=DATEPART(\"m\"\
    , TODAY())`，如果在 11 月 1 日凌晨 12:01 运行，将返回值 11，而当前的会计期间是 10 月。为了考虑一月份的情况，你添加一个 `IIF`\
    \ 函数来评估 `DATEPART`，这样当返回 1（表示一月）时，函数返回 12，让报告知道处理 12 月的会计期间。因此，正确的表达式如下：\n\n`=IIF(DATEPART(\"\
    m\", TODAY()) = 1, 12, DATEPART(\"m\", TODAY()) -1)`\n\n![Image](img/square.jpg)\
    \ **注意** 我们的示例数据库仅包含来自过去某个时间点的数据快照。因此，如果你正在按照示例操作，则需要输入示例数据库中包含的年份和月份。大多数记录介于\
    \ 2009 年 9 月至 2009 年 12 月之间。然而，在需要月末频率的报告的真实场景中，请使用上述表达式。\n\n## 使用报告管理器更新和上传 RDL\
    \ 文件\n\n在本节中，你将导航到报告管理器中的 AR 对账报告，并通过 `Notepad` 手动修改 RDL，以添加 `AcctPeriodMonth`\
    \ 和 `AcctPeriodYear` 默认参数值，而不是使用 `BIDS`。这将演示你可以在不需要完整设计环境的情况下对已发布的报告进行简单的修改。打开报告管理器，并导航到报表服务器上“月末财务”文件夹中的\
    \ AR 对账报告，如 图 10-3 所示。\n\n![Image](img/9781430238102_Fig10-03.jpg)\n\n*图 10-3.\
    \ 报告管理器中的 AR 对账报告*\n\n在 `SSRS 2008 R2` 版本的报告服务发布之前，你可以使用“属性”选项卡进入属性页面。现在，你通过将光标悬停在要管理的报告上来访问报告属性，直到看到报告周围出现黄色矩形和下拉箭头。当你看到下拉箭头时，单击它并选择“管理”，如\
    \ 图 10-4 所示。注意不要单击包含报告名称的链接，因为这将导致报告执行。\n\n![Image](img/9781430238102_Fig10-04.jpg)\n\
    \n*图 10-4. 报告管理选项菜单*\n\n单击“管理”后，你将进入报告属性页面，你会在左侧看到九个选项卡，在顶部看到五个用于报告维护的链接按钮。这些链接不言自明，因此我不详细介绍每一个。但是，正如你在\
    \ 图 10-5 中所看到的，你可以执行诸如删除、移动、下载以编辑报告或用另一个副本替换报告等维护任务。\n\n![Image](img/9781430238102_Fig10-05.jpg)\n\
    \n*图 10-5. 报告属性屏幕*\n\n在 AR 对账报告的属性页面上，有两个链接——“下载”和“替换”——管理员可以使用它们直接修改 `RDL`，而无需通过其他方式（例如使用自定义代码、创作环境或\
    \ `rs` 命令行实用程序）重新部署报告。有关部署报告的更多详细信息，请参见第 8 章。单击“下载”链接将文件保存到你可以访问的位置，然后用 `Notepad`\
    \ 打开它，如 图 10-6 所示。图 10-6 显示了 AR 对账报告的 `RDL` 文件。同时按下 `CTRL` 和 `F` 键进行查找并搜索 `ReportParameter`。单击“查找下一个”以定位搜索词的第一个实例。注意\
    \ `RDL` 代码中的 `AcctPeriodYear` 和 `AcctPeriodMonth` 参数。\n\n![Image](img/9781430238102_Fig10-06.jpg)\n\
    \n*图 10-6. 在 Notepad 中编辑的 RDL 文件*\n\n要更新报告以包含你在上一节中创建的默认参数值，你可以将 `RDL` 代码直接放入文件并保存。为每个参数生成默认值的\
    \ `RDL` 部分只有五行长，如 清单 10-1 所示，该清单显示了 `AcctPeriodYear` 参数的默认值部分。\n\n*清单 10-1. RDL\
    \ 默认值部分*\n\n```\n<DefaultValue>\n   <Values>\n     <Value>=DATEPART(\"yyyy\",\
    \ TODAY())</Value>\n   </Values>\n</DefaultValue>\n```\n\n图 10-7 显示了为两个参数插入默认值代码后的\
    \ `RDL` 文件。\n\n![Image](img/9781430238102_Fig10-07.jpg)\n\n*图 10-7. 带有默认参数的 RDL\
    \ 文件*\n\n因为你无法直接从 `Notepad` 保存到 `SSRS` 服务器，所以将你的 `RDL` 文件副本保存到磁盘。任何可访问的位置都可以，例如网络共享或本地磁盘。保存文件后，你可以单击“替换”链接，在磁盘上找到你修改后的\
    \ `RDL` 文件，然后选择“打开”。当你返回到“上传报告定义”屏幕时，单击“确定”以替换现有报告。如果你在 2010 年 1 月 1 日执行了该报告，你将看到具有正确默认值的报告，如\
    \ 图 10-8 所示。\n\n![Image](img/9781430238102_Fig10-08.jpg)\n\n*图 10-8. 带有默认参数的 AR\
    \ 对账报告*\n\n通过报告管理器更新报告不会覆盖报告的其他属性，例如历史记录、计划和执行方法。\n\n![Image](img/square.jpg)\
    \ **注意** 当你使用基于可变数据（例如数据库中的值）的默认值时，必须注意返回的值必须与可用值相符。在此示例中，如果为五月返回的值是 5，但没有选择五月的值，报告将强制用户进行选择，而不是执行并返回无数据。我们选择将数据限制为数据库中实际存储的值。\n"
- fmt: '### Setting Up a Data Source for the Report


    The AR Reconciliation report will be set up to generate a history that allows
    users to view the report as it was when it was executed. In addition, because
    the report will be run at a prescheduled time, SSRS needs to know what credentials
    to use to access the data for the report. You can either modify our existing data
    source credentials or we could create a new data source to accommodate this.


    Using the `Report Manager`, navigate to the folder that contains the End of the
    Month Financials report and then select `New Data Source`. Name the data source
    `EOM Financials`. Because this is a SQL Server–based connection, you supply the
    appropriate connection string, which includes the server name and database or
    catalog for the connection. Next, choose to store the credentials securely on
    the server, and supply a name and password—in this case, SQL authentication credentials.
    Finally, choose to hide the data source in list view so that you can prevent users
    from accidentally selecting it when browsing. Your configuration should look similar
    to [Figure 10-9](#Chapter10.html#fig_10_9). After you click the `Apply` button
    to create the data source, all you need to do is associate the report to the new
    shared data source, which you’ll do in the following section.


    ![Image](images/9781430238102_Fig10-09.jpg)


    `Figure 10-9.` Data source selections


    ### Altering Report Data Sources


    Now that we have a shared data source that we can use for our Accounting reports,
    we need to change the data source that the report is configured to use. We can
    do this from the `Data Sources` tab under the report `Properties` within `Report
    Manager`. Navigate to our End of Month Financials folder in `Report Manager`.
    Next, place your cursor over top of the AR Reconciliation report. When you see
    the down arrow, click it, and then select `Manage` followed by `Data Sources`
    tab in the left menu. We have the option here to browse to an existing shared
    data source or create a new one.


    As one may deduced, we could have left out the previous section and performed
    the creation and altering at the same step. However, we wanted to show you how
    you could use the `New Data Source` button to create a new data source that could
    be consumed by other reports needing pre-configured authentication settings. With
    that being said, let’s continue on and link this report to the shared data source
    that we just created. Click the `Browse` button and navigate to our `EOM Financials`
    data source under the End of Month Financials folder as shown in [Figure 10-10](#Chapter10.html#fig_10_10).
    Click `OK` to alter the data source that the AR Reconciliation report was using
    and then click `Apply` to save the new settings. In the next section, we’ll show
    you how to create snapshots to store report history.


    ![Image](images/9781430238102_Fig10-10.jpg)


    `Figure 10-10.` Altering a reports data source


    ### Creating Snapshots for the Report History


    The goal for the AR Reconciliation report is to allow it to execute at a specified
    time of month, during off-peak hours for performance benefits, and to maintain
    a historical picture of each month’s processing. To this end, we created the End
    of Month Financials shared schedule earlier in the chapter. Now it’s time to use
    a beneficial feature of SSRS, which is the capability to process a report as a
    snapshot.


    A snapshot is a static “point-in-time” copy of a report. Two types of snapshots
    are used in SSRS: those generated as execution snapshots, which render a single
    report from a pre-executed point in time, and those generated to be stored in
    report history, which can contain multiple copies of a report at given points
    in time. In this section, we are concerned with showing how to configure the AR
    Reconciliation report to generate snapshots for the report history so that we
    can generate a series of historical financial reports.


    You’ll use `Report Manager` to configure the report history properties for the
    AR Reconciliation report so that a snapshot of the report is generated each time
    the report is processed, according to the End of Month Financials schedule.


    Let’s begin by looking at the available settings for storing the report history.
    As you can see in [Figure 10-11](#Chapter10.html#fig_10_11), several settings
    affect not only the creation of snapshots, but also how the snapshots are stored
    in the report history. From within `Report Manager`, you can navigate to the Snapshot
    Options screen by placing the cursor over a report, clicking the down arrow, and
    selecting `Manage` as described earlier when navigating to the properties. Once
    you are in the report properties screen, click the `Snapshot Options` tab on the
    left.


    ![Image](images/9781430238102_Fig10-11.jpg)


    `Figure 10-11.` Report shapshot options


    For the AR Reconciliation report, set the snapshot options so that


    *   Users will not be able to create snapshots for the report history. Set this
    entry so that only reports that are run by the schedule will appear in the report
    history.

    *   Report execution snapshots are not stored in the report history. This option
    is related to report execution properties, which is covered in the next section.

    *   The End of Month Financials shared schedule is used.

    *   The Default setting is used for the number of snapshots to keep in the report
    history. The Default setting keeps an unlimited number of reports, but you can
    change this via `Site Settings` in `Report Manager`. If a specific number of snapshots
    are selected to be kept, such as 10, then older snapshots are removed first to
    make room.


    After making the selections as shown in [Figure 10-12](#Chapter10.html#fig_10_12),
    click `Apply`.


    ![Image](images/9781430238102_Fig10-12.jpg)


    `Figure 10-12.` Snapshot option for the AR Reconciliation report


    ![Image](images/square.jpg) **Note** In order to create snapshots and subscriptions,
    you will need to ensure that `SQL Server Agent` is running on the server containing
    the `ReportServer` database. If it is not running, you will receive the error:

    ```

    The SQL Agent service is not running. This operation requires the SQL Agent service.
    (rsSchedulerNotResponding).

    ```

    If you see this error, just start the `SQL Agent` service in the Administrative
    Tools or in `SQL Server Management Studio (SSMS)`.


    Over time, the snapshots will be created in the report history. Users who have
    access to the report history can access the snapshots through `Report Manager`
    by navigating to the `History` tab for the report. The `History` tab for the AR
    Reconciliation report, as shown in [Figure 10-13](#Chapter10.html#fig_10_13),
    indicates that over a four-month period, four snapshots have been generated, as
    expected.


    ![Image](images/9781430238102_Fig10-13.jpg)


    `Figure 10-13.` AR Reconciliation report snapshots created on schedule


    It is beneficial for performance to render a report from history, first because
    the report has been pre-processed and second because there is no need to query
    the data source for the report, as both the data and layout information are stored
    in the snapshot. When generating large reports, such as financial reports with
    hundreds of pages, we highly recommend using snapshots, as well as other performance-enhancing
    features of SSRS such as report caching, which we will cover next.'
