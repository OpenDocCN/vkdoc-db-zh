  trans: '

    ### 使用报告向导创建报告


    在许多场景下，报告向导是创建基本报告的快捷方法，该报告可以在部署前进行进一步完善。报告向导适用于主要是数据列表且不需要太多特殊格式的报告。在本节中，你将逐步使用报告向导创建“员工服务成本”报告，然后再手动设计相同的报告。


    要在报告项目中打开报告向导，请右键单击“解决方案资源管理器”中的 `Reports` 文件夹，然后选择 `添加新报告`。向导的第一个屏幕定义了数据源。对于本例，勾选
    `新建数据源`；不过，你也可以选择使用已定义为项目一部分的共享数据源。提供与上一章相同的数据源信息以连接到 `Pro_SSRS` 数据库。连接字符串应类似于以下内容：


    `Data Source=localhost;Initial Catalog=Pro_SSRS`


    向导的下一个屏幕定义查询。将你在第 2 章中创建的查询粘贴到 `查询字符串` 区域（参见图 6-1）。你可以从本书代码下载的 `Query` 文件夹中打开此查询。文件名为
    `Report_Wizard_Query.sql`。单击 `查询生成器` 按钮将启动图形化查询设计器。


    ![Image](img/9781430238102_Fig06-01.jpg)


    **图 6-1.** 在 `查询字符串` 区域粘贴查询


    报告向导的下一个屏幕询问报告应采用 `表格` 还是 `矩阵` 形式。选择 `表格` 将在下一屏触发向导提供分组信息；选择 `矩阵` 将提供一个类似的屏幕用于行和列而非分组。对于本例，选择
    `表格`，单击 `下一步`，然后选择分组和明细布局，将 `年份` 显示为主要分组，接下来是 `月份`、`员工类别 ID` 和 `员工姓名`。对于明细，你希望看到患者具体信息——`诊断`、`就诊次数`、`预估成本`
    和 `服务类型`——如图 6-2 所示。


    对将出现在报告中的数据进行分组后，接下来的两个屏幕主要用于格式化。在这里，你可以指定报告是否采用 `阶梯式` 或 `块状` 布局，以及报告是否包含小计并提供向下钻取功能。你还可以为报告选择自定义样式。


    ![Image](img/9781430238102_Fig06-02.jpg)


    **图 6-2.** 报告向导分组和明细选择


    目前，选择 `阶梯式` 并禁用 `向下钻取` 功能，然后单击 `下一步`。在 `表格样式` 屏幕上，将 `Corporate` 样式应用于报告，在向导中单击
    `下一步`，并将名称从默认的 `ReportX`（其中 `X` 是已创建报告的下一个序号）更改为 `员工成本报告向导`。接下来，勾选 `预览报告` 框，以便在创建后立即执行报告，然后单击
    `完成` 以生成报告。片刻之后，结果报告就会出现。虽然乍一看它似乎需要许多外观上的更改，例如扩展几列的大小（例如 `员工姓名` 和 `诊断`）、将分组的背景颜色重置为
    `白色`、将 `[年份]` 的字体颜色设置为 `黑色`，以及将 `预估成本` 列格式化为货币，但该报告至少是功能完整的。根据所需的布局，可能需要大量工作才能达到你想要的效果。假设你接受了一种默认样式，这将是进行修改的良好起点，如图
    6-3 所示。


    为了充分利用 `SSRS` 的灵活性和 `BIDS` 的报告设计环境，让我们从头开始创建相同的报告。


    ![Image](img/9781430238102_Fig06-03.jpg)


    **图 6-3.** 从报告向导生成的报告


    ### 从头开始构建报告


    使用空白报告时，第一个决定是在报告主体中使用哪种数据区域。这个决定主要取决于你正在处理的数据类型以及报告受众。例如，首席执行官 (`CEO`) 可能不关心细节，更愿意查看有关业务产品和服务状态的摘要信息，因此更倾向于查看带有列和行总计的矩阵报告。然而，在初始报告中，你将使用
    `表格` 数据区域，因为你希望以表格行（而非列）显示患者与员工之间的相互关系及多重分组。你将在本章中构建的报告的最终修改将包括列和行分组，向你展示如何整合
    `Tablix` 数据区域的元素。


    在本节中，你将遵循特定步骤，通过添加 `表格` 数据区域使报告达到基本起点，然后继续添加格式和功能。完成后，该报告将包含许多 `SSRS` 功能，包括交互式向下钻取和导航链接、自定义格式、交互式排序、填充的下拉参数以及一个显示成本排名前十的诊断的图表。你将通过添加一些设计点缀来完成报告，例如页码和执行时间。你将研究如何修改报告以处理多值参数。你还将探索
    `SSRS 2008` 中添加的另一项功能：报告变量。对于此项目，你将从“解决方案资源管理器”中添加一个新报告，并创建一个数据集，该数据集使用本章上一节中用于报告向导的相同查询。为简单起见，我们已在
    `Pro_SSRS` 项目中包含了起始点报告。`EmployeeServiceCost_Start` 报告已经为 `localhost` SQL Server
    定义了数据集和初始查询，这应与你的环境匹配。你将首先仅使用基本查询，而不是存储过程。你将在 `EmployeeServiceCost_Start` 报告中开始使用的数据集名为
    `Emp_Svc_Cost`。稍后，在“使用存储过程设置报告参数”部分，你将修改数据集以使用存储过程，并了解存储过程中定义的参数将如何自动创建报告参数。


    在以下部分中，你将通过几个步骤向单个报告添加功能。提供这些步骤是为了让你能够逐步构建报告，从 `EmployeeServiceCost_Start` 报告开始；然而，在几个节点上，你可以选择打开反映已完成步骤的几个示例报告之一。如果有可用的报告，我们将在文中指出。


    在 `BIDS` 中打开 `EmployeeServiceCost_Start` 报告后，转到 `设计` 选项卡。以下步骤使你达到报告的起点，在这里你将开始应用更高级的格式和逻辑：

    '
- fmt: '# 创建 Employee Service Cost 报表


    1.  将表格报表元素拖到设计网格的空白区域。

    2.  在“报表数据”窗格中，将字段——`Emp_Svc_Cost`数据集中的`Estimated_Cost`和`Visit_Count`——按所列顺序拖到详细信息行。通过右键单击列并选择“删除列”来删除额外的列。请注意，为每个拖到详细信息行的字段自动为您创建了列标题——“Estimated
    Cost”和“Visit Count”。如果看不到“报表数据”窗格，可以使用`CTRL + ALT + D`或在“视图”菜单下选择它来调出窗格。

    3.  通过右键单击每个详细信息字段并选择子菜单中的“表达式”，将`Visit_Count`和`Estimated_Cost`字段表达式编辑为求和形式，例如`=Sum(Fields!Estimated_Cost.Value)`。您会注意到，在BIDS中开发报表时，输入到报表区域的每个值都会用括号括起来或表示为“<<expr>>”。例如，表达式`=Sum(Fields!Estimated_Cost.Value)`在表格单元格中将直观地显示为`[Sum(Estimated_Cost)]`，因为该表达式本身是一个已知值。您也可以突出显示该字段，右键单击，然后在“Summarize
    By...”子菜单下选择“Sum”。

    4.  将`Employee_Name`字段拖到“行组”窗格，并释放在`(Details)`组上方。这将基于`Fields!Employee_Name.Value`创建一个分组，并向表格添加一个新列。默认情况下，组名与用于分组的字段名相同。您还会注意到，在详细信息节和我们Tablix的新`Employee_Name`列之间放置了一条垂直虚线：这为您提供了一个视觉指示器，标明组节结束和详细信息节开始的位置。

    5.  接下来，拖动`Patient_Name`字段并释放在`Employee_Name`组上方，以在`Patient_Name`上创建一个行组。对`Service_Type`和`Diagnosis`重复此步骤，每个都放在前一个之上。这将分别创建一个包含`Diagnosis`、`Service_Type`、`Patient_Name`和`Employee_Name`的层次结构。

    6.  右键单击“行组”窗格中的`(Details)`组，选择“组属性”。单击“组表达式”下的“添加”，并在“分组依据”下拉列表中选择`[Employee_Name]`。

    7.  为了使我们的报表具有清晰的阶梯外观，右键单击表格中的`Employee_Name`字段，选择“插入行”，然后选择“组外 - 上方”（如图[6-4](#Chapter06.html#fig_6_4)所示）。接下来，将步骤5中添加的`Patient_Name`字段拖到`Employee_Name`上方新的空单元格中。右键单击`Patient_Name`，然后同样选择“插入行”，再选择“组外
    - 上方”。这次，将步骤5中添加的`Service_Type`拖到新的空白处。完成了两个分组后，让我们对层次结构中的上一级执行相同的操作。右键单击`Service_Type`并选择“组外
    - 上方”。这次，将我们的`Diagnosis`字段拖到`Service_Type`上方。图[6-5](#Chapter06.html#fig_6_5)显示了我们的报表在设计器中应有的样子。


    ![Image](images/9781430238102_Fig06-04.jpg)


    **图 6-4.** Employee Service Cost 报表 添加“组外 - 上方”以实现阶梯外观


    8.  现在，通过右键单击每个列并选择“删除列”，移除标题分别为“Diagnosis”、“Service Type”和“Patient Name”的三列。删除这三列后，将您的Tablix拖到更靠近设计窗格左侧的位置。然后将标有“Employee
    Name”的列调整为大约三英寸宽，这样值就不会换行到下一行。

    9.  选择表格中包含`[Service_Type]`的文本框，按`F4`显示“属性”窗口。滚动直到看到“Padding”，单击箭头展开属性。将左填充修改为`10pt`。对`[Patient_Name]`和`[Employee_Name]`执行相同的操作，但分别将它们设置为`20pt`和`30pt`。


    ![Image](images/9781430238102_Fig06-05.jpg)


    **图 6-5.** Employee Service Cost 报表 组外 - 上方


    完成这九个步骤后，正如您在预览中看到的，报表开始成形。虽然美观上还有待改进，但它以适当的、固定分组显示了数据，并以表格形式呈现，以便于识别详细的服务信息，例如每个患者服务的成本和计数（参见图[6-6](#Chapter06.html#fig_6_6)）。


    ![Image](images/9781430238102_Fig06-06.jpg)


    **图 6-6.** Employee Service Cost 报表的详细信息与分组


    ### 格式化输出


    您可以修改几个快速简单的报表属性，为报表增添更专业的外观和感觉：


    *   边框样式

    *   格式


    通过使用`Shift`或`Control`键，或者单击并拖动鼠标，可以轻松地同时将报表属性应用于多个单元格。对于“Estimated Cost”和“Service
    Count”标题单元格，您将在底部添加边框，将记录标题与实际数据分开。首先，按住`Control`键并单击每个单元格来突出显示两个标题列单元格。接下来，打开或展开“属性”窗口。“属性”窗口包含所选单元格每个区域（上、下、左、右）的“边框样式”属性。对于此示例，为底部边框选择“Solid”。


    保持“属性”窗口打开，单击“Estimated Cost”详细信息行单元格。在“属性”窗口中格式化该单元格，通过为“格式”属性添加格式命令`C0`使其成为货币格式。


    接下来，将标有“Employee Name”的标题单元格重命名为“Diagnosis > Service > Patient > Employee”，并扩展列以适应新标签的宽度。


    应用格式后，您可以通过单击“预览”选项卡立即看到这些更改如何影响输出（参见图[6-7](#Chapter06.html#fig_6_7)）。


    ![Image](images/9781430238102_Fig06-07.jpg)


    **图 6-7.** 应用格式后的报表输出


    `Pro_SSRS`项目中的`EmployeeServiceCost_Format.rdl`报表已应用了格式化元素。'
  raw: '1.  Drag the Table report element to a blank section of the design grid.

    2.  On the Report Data pane, drag the fields—Estimated_Cost and Visit_Count from
    the Emp_Svc_Cost dataset—to the detail row in the order listed. Delete the extra
    column by right clicking on the column and selecting Delete Columns. Notice that
    the column headings—Estimated Cost and Visit Count—were automatically created
    for you for each field dragged to the detail row. If you do not see the Report
    Data Pane, you can pull it up by using CTRL + ALT + D or by selecting it under
    the View menu.

    3.  Edit the Visit_Count and Estimated_Cost field expressions to be sums, as in
    =Sum(Fields!Estimated_Cost.Value) by right clicking on each detail field and choosing
    Expression in the submenu. You will notice that when you develop your report in
    BIDS, each value that you enter into the report regions will be enclosed with
    brackets or be represented as “<<expr>>”. For example, the expression =Sum(Fields!Estimated_Cost.Value)
    will be visually represented as [Sum(Estimated_Cost)] in the table cell because
    the expression is a known value, even though it is an expression itself. You can
    also highlight the field, right click, and then select Sum under the Summarize
    By… submenu.

    4.  Drag the Employee_Name field down to the Row Groups pane and release it above
    the (Details) group. This will create a grouping on Fields!Employee_Name.Value
    and add a new column to the Table. By default, the group is named the same as
    the field being grouped on. You will also notice that a vertical dashed line is
    placed between the details section and the new Employee_Name column of our Tablix:
    this gives you a visual indicator of where the group section ends and the details
    section begins.

    5.  Next, drag the Patient_Name field and release it above the Employee_Name group
    to create a row group on Patient_Name. Do this step for Service_Type and Diagnosis
    with each one being above the former. This will create a hierarchy of Diagnosis,
    Service_Type, Patient_Name, and Employee_Name, respectively.

    6.  Right click on the (Details) group in the Row Group pane and select Group
    Properties. Click Add under Group Expressions and select [Employee_Name] in the
    Group On drop-down list.

    7.  To give our report a clean stepped look, right click on the Employee_Name
    field in the table, select Insert Row and then Outside Group –as shown in [Figure
    6-4](#Chapter06.html#fig_6_4). Next, drag the Patient_Name field that was added
    in step 5 into the new empty cell above Employee_Name. Right click on Patient_Name
    and then do the same thing by selecting Insert Row and then Outside Group – Above.
    This time, drag the Service_Type that was added in step 5 into the new empty space.
    With two of our groupings down, let’s do the same thing for the next level up
    in our hierarchy. Right click on Service_Type and Outside Group – Above. This
    time, drag our Diagnosis field above the Service_Type. [Figure 6-5](#Chapter06.html#fig_6_5)
    shows what our report should look like in the designer.


    ![Image](images/9781430238102_Fig06-04.jpg)


    ***Figure 6-4.** Employee Service Cost report Add Outside Group – Above for stepped
    look*


    8.  Now, remove the three columns with headers that read Diagnosis, Service Type,
    and Patient Name by right clicking each of them and choosing Delete Columns. After
    you remove the three columns, drag your Tablix closer to the left side of the
    Design pane. Then make the column labeled Employee Name about three inches wide
    so that the values don’t end up wrapping to the next line.

    9.  Select the textbox containing the [Service_Type] in our table and hit F4 to
    show our Properties Window. Scroll until you see Padding and expand the properties
    by clicking the arrow. Modify the Left padding to be 10pt. Do the same thing for
    [Patient_Name] and [Employee_Name] but set them to 20pt and 30pt, respectively.


    ![Image](images/9781430238102_Fig06-05.jpg)


    ***Figure 6-5.** Employee Service Cost report Outside Groups- Above*


    After these nine steps, the report is starting to take form, as you can see in
    the preview. Although not yet aesthetically appealing, it displays the data in
    the appropriate, hard-fixed groupings and is tabulated so that it is easy to discern
    the detailed service information, such as the cost and counts of services for
    each patient (see [Figure 6-6](#Chapter06.html#fig_6_6)).


    ![Image](images/9781430238102_Fig06-06.jpg)


    ***Figure 6-6.** Employee Service Cost report details and groups*


    ### Formatting the Output


    You can modify several quick and easy report properties to add a more professional
    look and feel to the report:


    > *   Border Style

    > *   Format


    By using the Shift or Control key, or by clicking and dragging the mouse, it is
    easy to apply report properties to many cells simultaneously. For the Estimated
    Cost and Service Count header cells, you will add a border to the bottom, separating
    the record header from the actual data. First, highlight the two header column
    cells by holding down the Control key and clicking each cell. Next, open or expand
    the Properties window. The Properties window contains a Border Style property
    for each area of the selected cells—top, bottom, left, and right. For this example,
    select Solid for the bottom border.


    With the Properties window still open, click the Estimated Cost detail row cell.
    Format the cell in the Properties window to make it currency by adding the formatting
    command C0 for the Format property.


    Next, rename the header cell labeled Employee Name to Diagnosis > Service > Patient
    > Employee and extend the column to accommodate the width of the new label.


    After you apply the formatting, you can immediately see how these changes affect
    the output by clicking the Preview tab (see [Figure 6-7](#Chapter06.html#fig_6_7)).


    ![Image](images/9781430238102_Fig06-07.jpg)


    ***Figure 6-7.** Report output with formatting*


    The EmployeeServiceCost_Format.rdl report in the Pro_SSRS project has the formatting
    elements applied.'
