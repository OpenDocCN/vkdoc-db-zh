    You already have a form (ViewerRVC.cs) to render and display the report in the
    embedded Report Viewer control. You’ll now add a second form to the project that
    you’ll use to display the report and rendering parameters and to allow the users
    to make their selections.


    So, add a GetParameters form to your project by selecting Project ![Image](images/U004.jpg)
    Add Windows Form. Name the form GetParameters.cs and modify the title text of
    the form to Parameters. Onto this form, add two controls from the Toolbox; add
    a FlowLayoutPanel control named parameterPanel from the Containers section, and
    add one button control named buttonOK in the button properties window. Then set
    the text property for the button to OK in the button properties window. When you’re
    done, the form should look like [Figure 9-7](#Chapter09.html#fig_9_7).


    ![Image](images/9781430238102_Fig09-07.jpg)


    ***Figure 9-7.** SSRS Viewer RVC `GetParameters` form*


    You now need to add a reference to the SSRS 2012 Web service to your project.
    You do this by selecting Project ![Image](images/U004.jpg) Add Service Reference
    or by right clicking the Service References in the Solution Explorer and selecting
    Add Service Reference. When the dialog box appears click the Advanced button at
    the bottom of the form. On this next form, click the Add Web Reference button.
    From here, enter the following URL:


    [`http://localhost/reportserver/reportservice2010.asmx`](http://localhost/reportserver/reportservice2010.asmx)


    Substitute the name of your server for `localhost,` if need be. Then click the
    Go button, which is the right arrow icon. You’ll see a dialog box similar to [Figure
    9-8](#Chapter09.html#fig_9_8).


    ![Image](images/9781430238102_Fig09-08.jpg)


    ***Figure 9-8.** Adding an SSRS 2008 Web service reference*


    In the Web Reference Name textbox, enter **SSRSWebService**, which is the name
    by which you’ll refer to your Web service in your code. From here, click the Add
    Reference button to finalize the reference addition.


    Once this dialog box is closed, you will add the following using statement to
    the top of your code in the GetParameters class file. Note that if your project
    name is different from SSRS Viewer RVC, you should change the reference to reflect
    the name of your project.


    `using SSRS_Viewer_RVC.SSRSWebService;`


    Now you can reference the methods and properties exposed by the Web service much
    more easily because you won’t have to enter the fully qualified namespace. Also,
    add the following other directives underneath the one you just added:


    `using System.Web.Services.Protocols;`

    `using System.Collections;`


    Doing this will allow you to access the members of these namespaces without needing
    to type the full namespace each time you use a method or property from that namespace.


    Because you’ll use this form as a dialog box to display the report parameters
    and their possible values, and allow the user to select them, you need a way to
    communicate between the main form and this newly created GetParameters form. We
    will set that communication up in the next section.


    #### Coding the Report Parameters Form


    When you instantiate the report parameters form (GetParameters.cs), you do so
    by passing in the URL of the report the user has entered in the viewer form (ViewerRVC.cs).
    You use this URL to determine the report server name and the specific report the
    user wants to run. You need to know both of these for the calls to the Report
    Server Web service. Because you’ll use this information throughout the rest of
    the code, in your GetParameter class you will store them in some class-level private
    variables, as shown in [Listing 9-4](#Chapter09.html#list_9_4). Add the list of
    private variables to your GetParameter.cs class code directly after the class
    start.


    ***Listing 9-4.** Class-Level Private Variables*


    `public partial class GetParameters : Form`

    `{`

    `private string url;`

    `private string server;`

    `private string report;`

    `private Microsoft.Reporting.WinForms.ReportParameter[] parameters;`

    `ReportingService2010 rs;`


    In the form constructor, which will take the URL string as the only parameter,
    we will break the report server and report name into two separate fields. To break
    down the URL into the server and report name, use the string split method and
    create a constructor that looks like [Listing 9-5](#Chapter09.html#list_9_5).
    Add this constructor code, the code that is first run when and object of a class
    type is created, directly below the private variables. You will need to add the
    string parameter called URL to the constructor as well.


    ***Listing 9-5.** Report Parameters Form Constructor*


    `public GetParameters (string URL)`

    `{`

    `InitializeComponent();`

    `url = URL;`

    `string[] reportInfo = url.Split(''?'');`

    `server = reportInfo[0];`

    `report = reportInfo[1]; }`


    #### The GetParameters_Load Event


    Now you get to where the real work for this dialog box takes place: the Form_Load
    event. To create this method automatically, open your GetParameters form in display
    mode and double click your form where there are no components, such as the top
    bar. This will open your form in code view and already have the GetParameters_Load
    method created and link it to the form’s load event.


    Next, create a ReportingService object so that you can access SSRS 2012 through
    the Web service that you added as a reference earlier. Then, set your Windows
    credentials as the credentials to be used for calling the Web service, like so:


    `rs = new ReportingService2005();`

    `rs.Credentials = System.Net.CredentialCache.DefaultCredentials;`


    ![Image](images/square.jpg) **Note** You can also use Basic authentication using
    `rs.Credentials = new System.Net. Network-Credential("username", "password", "domain")`;.
    The method you use depends on the security settings for the report server virtual
    directory. By default, it’s configured to use Windows authentication.'
  trans: "\n#### 创建 GetParameters 表单\n\n你已经拥有一个窗体 (`ViewerRVC.cs`)，用于在嵌入式报表查看器控件中呈现和显示报表。现在，你将向项目中添加第二个窗体，用于显示报表和呈现参数，并允许用户进行选择。\n\
    \n因此，通过选择 **Project** ![Image](img/U004.jpg) **Add Windows Form** 来向你的项目中添加一个\
    \ `GetParameters` 窗体。将该窗体命名为 `GetParameters.cs`，并将其标题文本修改为 `Parameters`。接着，从工具箱中向此窗体添加两个控件；从“容器”部分添加一个名为\
    \ `parameterPanel` 的 `FlowLayoutPanel` 控件，并在按钮属性窗口中添加一个名为 `buttonOK` 的按钮控件。然后，在按钮属性窗口中将按钮的\
    \ `text` 属性设置为 `OK`。完成后，窗体应如 图 9-7 所示。\n\n![Image](img/9781430238102_Fig09-07.jpg)\n\
    \n##### 图 9-7. SSRS Viewer RVC 的 `GetParameters` 窗体\n\n现在，你需要将对 SSRS 2012 Web\
    \ 服务的引用添加到你的项目中。具体操作是选择 **Project** ![Image](img/U004.jpg) **Add Service Reference**，或者在**解决方案资源管理器**中右键单击**服务引用**并选择**添加服务引用**。当对话框出现时，点击窗体底部的**高级**按钮。在下一个窗体上，点击**添加\
    \ Web 引用**按钮。然后，在此输入以下 URL：\n\n`http://localhost/reportserver/reportservice2010.asmx`\n\
    \n如果需要，请将 `localhost` 替换为你的服务器名称。接着点击**Go**按钮（即右箭头图标）。你将看到一个类似于 图 9-8 的对话框。\n\n\
    ![Image](img/9781430238102_Fig09-08.jpg)\n\n##### 图 9-8. 添加 SSRS 2008 Web 服务引用\n\
    \n在**Web 引用名称**文本框中，输入 `SSRSWebService`，这是你将在代码中引用该 Web 服务时使用的名称。然后，点击**添加引用**按钮以完成引用的添加。\n\
    \n关闭此对话框后，你需要在 `GetParameters` 类文件的代码顶部添加以下 `using` 语句。请注意，如果你的项目名称与 `SSRS Viewer\
    \ RVC` 不同，你应该更改引用以反映你的项目名称。\n\n```csharp\nusing SSRS_Viewer_RVC.SSRSWebService;\n\
    ```\n\n现在，你可以更轻松地引用 Web 服务公开的方法和属性，因为你无需输入完全限定的命名空间。另外，在你刚添加的语句下方添加以下其他指令：\n\n\
    ```csharp\nusing System.Web.Services.Protocols;\nusing System.Collections;\n```\n\
    \n这样做将允许你访问这些命名空间的成员，而无需在每次使用该命名空间中的方法或属性时键入完整的命名空间。\n\n由于你将使用此窗体作为对话框来显示报表参数及其可能值，并允许用户选择它们，因此你需要一种在主窗体和这个新创建的\
    \ `GetParameters` 窗体之间进行通信的方法。我们将在下一节中设置该通信。\n\n#### 为报表参数窗体编码\n\n当你实例化报表参数窗体\
    \ (`GetParameters.cs`) 时，你需要传入用户在查看器窗体 (`ViewerRVC.cs`) 中输入的报表 URL。你使用此 URL 来确定报表服务器名称和用户想要运行的具体报表。你需要同时知道这两者，以便调用报表服务器\
    \ Web 服务。因为你将在后续代码中贯穿使用这些信息，所以在你的 `GetParameter` 类中，你会将它们存储在一些类级别的私有变量中，如 清单 9-4\
    \ 所示。将私有变量列表直接添加到你的 `GetParameter.cs` 类代码中类声明的起始之后。\n\n##### 清单 9-4. 类级别的私有变量\n\
    \n```csharp\npublic partial class GetParameters : Form\n{\n    private string\
    \ url;\n    private string server;\n    private string report;\n    private Microsoft.Reporting.WinForms.ReportParameter[]\
    \ parameters;\n    ReportingService2010 rs;\n```\n\n在窗体构造函数中（该函数将 URL 字符串作为唯一参数），我们将把报表服务器和报表名称分解为两个单独的字段。为了将\
    \ URL 分解为服务器和报表名称，请使用 `string` 的 `Split` 方法，并创建一个类似于 清单 9-5 的构造函数。将此构造函数代码（即创建类类型对象时首先运行的代码）直接添加在私有变量下方。你还需要在构造函数中添加名为\
    \ `URL` 的 `string` 参数。\n\n##### 清单 9-5. 报表参数窗体构造函数\n\n```csharp\npublic GetParameters\
    \ (string URL)\n{\n    InitializeComponent();\n    url = URL;\n    string[] reportInfo\
    \ = url.Split('?');\n    server = reportInfo[0];\n    report = reportInfo[1];\n\
    }\n```\n\n#### GetParameters_Load 事件\n\n现在，你将进入此对话框实际工作的部分：`Form_Load` 事件。要自动创建此方法，请在显示模式下打开你的\
    \ `GetParameters` 窗体，然后在窗体上没有组件的位置（例如顶部标题栏）双击。这将在代码视图中打开你的窗体，并且 `GetParameters_Load`\
    \ 方法已被创建并链接到窗体的 Load 事件。\n\n接下来，创建一个 `ReportingService` 对象，以便通过你先前添加为引用的 Web 服务来访问\
    \ SSRS 2012。然后，将你的 Windows 凭据设置为调用 Web 服务时要使用的凭据，如下所示：\n\n```csharp\nrs = new\
    \ ReportingService2005();\nrs.Credentials = System.Net.CredentialCache.DefaultCredentials;\n\
    ```\n\n![Image](img/square.jpg) **注意** 你也可以使用基本身份验证，通过 `rs.Credentials = new System.Net.NetworkCredential(\"\
    username\", \"password\", \"domain\");`。你使用的方法取决于报表服务器虚拟目录的安全设置。默认情况下，它配置为使用 Windows\
    \ 身份验证。\n"
- fmt: "### 调用 Web 服务 GetItemParameters 方法\n\n`GetItemParameters` 方法接受五个参数：\n\n> *\
    \   `Item`: 报表/项的完整路径名。\n> *   `ForRendering`: 一个布尔值，指示应如何使用参数值。要获取每个参数的可能值列表，必须将其设置为\
    \ `true`。\n> *   `HistoryID`: 报表历史快照的 ID。因为不是从快照运行报表，所以将其设置为 `null`。\n> *   `ParameterValues`:\
    \ 可针对报表服务器管理的报表参数进行验证的参数值（`ParameterValue[]` 对象）。对于本示例，将其设置为 `null`。\n> *   `Credentials`:\
    \ 可用于验证查询参数的数据源凭据（`DataSourceCredential[]` 对象）。\n\n`GetItemParameters` 方法返回一个\
    \ `ItemParameter[]` 对象数组，其中包含报表的参数。你可以使用此信息来渲染组合框，以便用户在运行报表时选择他们想要使用的参数值。\n\n\
    以下代码设置需要使用的变量，然后调用 `GetItemParameters` 方法来检索报表期望的参数列表，如 [Listing 9-6](#Chapter09.html#list_9_6)\
    \ 所示。\n\n***Listing 9-6.** 调用 GetReportParameters*\n\n```csharp\nbool forRendering\
    \ = true;\nstring historyID = null;\nParameterValue[] values = new ParameterValue[1];\n\
    DataSourceCredentials[] credentials = null;\nItemParameter[] parametersSSRS =\
    \ null;\nparametersSSRS = rs.GetItemParameters(report, historyID,\n    forRendering,\
    \ values, credentials);\n```\n\n一旦从 SSRS 2012 获取了参数列表，就可以循环遍历它们，使用这些值在创建每个参数的组合框时创建标签，如下所示：\n\
    \n```csharp\nforeach (ItemParameter rp in parametersSSRS)\n```\n\n每个 `ItemParameter`\
    \ 对象都有一个名为 `ValidValues` 的只读属性。你可以使用 `ValidValues` 属性（它返回一个 `ValidValue` 对象数组）来填充每个组合框中的项，如\
    \ [Listing 9-7](#Chapter09.html#list_9_7) 所示。\n\n***Listing 9-7.** 遍历 ValidValue\
    \ 对象*\n\n```csharp\nif (rp.ValidValues != null) {\n    // 构建列表项\n    ArrayList\
    \ aList = new ArrayList();\n    pvs = rp.ValidValues;\n    foreach (ValidValue\
    \ pv in pvs)\n    {\n        aList.Add(new ComboItem(pv.Label,pv.Value));\n  \
    \  }\n    // 将列表项绑定到组合框\n    a.DataSource = aList;\n    a.DisplayMember=\"Display\"\
    ;\n    a.ValueMember=\"Value\";\n}\n```\n\n因此，对于每个 `ReportParameter`，你需要检查是否存在任何\
    \ `ValidValues` 属性。如果存在，则循环遍历它们，将每个项添加到组合框中。因为你想检索组合框中每个项的显示名称和实际值，所以必须创建一个组合框项类，并将这些对象绑定到组合框。[Listing\
    \ 9-8](#Chapter09.html#list_9_8) 显示了完整的 `GetParameters_Load` 事件方法，[Listing 9-9](#Chapter09.html#list_9_9)\
    \ 显示了 `ComboItem` 类。\n\n由于我们对报表有所了解，已经知道某些参数依赖于其他参数值。如果只是遍历每个参数的 `ValidValues`\
    \ 列表，其中一些将不会包含任何值。我们可以利用这一先前知识，向 `getItemParameters` 方法传递一些信息。我们将在 `values` 数组中放置一个\
    \ `ParameterValue` 项，以便为所有其他参数检索一些有效值。\n\n我们还需要检索组合框中每个项的显示名称和所选值。我们还将创建一个组合框项类，通过将每个组合项绑定到组合框来处理此问题。[Listing\
    \ 9-8](#Chapter09.html#list_9_8) 显示了 `GetParameters_Load` 事件，[Listing 9-9](#Chapter09.html#list_9_9)\
    \ 显示了 `ComboItem` 类。\n\n![Image](images/square.jpg) **注意** 我们仅根据一个可能的“服务年份”值来填充其余参数。由于在某些报表中，其他参数的有效值可能会发生变化，因此可以包含一个重写的事件方法，以便在年份更改时刷新每个其他参数值。\n\
    \n***Listing 9-8.** 获取报表参数和可能的值并在组合框中显示它们*\n\n```csharp\nprivate void GetParameters_Load(object\
    \ sender, EventArgs e)\n{\n    rs = new ReportingService2010();\n    rs.Credentials\
    \ = System.Net.CredentialCache.DefaultCredentials;\n\n    bool forRendering =\
    \ true;\n    string historyID = null;\n    ParameterValue[] values = new ParameterValue[1];\n\
    \    DataSourceCredentials[] credentials = null;\n    ItemParameter[] parametersSSRS\
    \ = null;\n    ValidValue[] pvs = null;\n\n    int x = 5;\n    int y = 30;\n\n\
    \    try\n    {\n        values[0] = new ParameterValue();\n        values[0].Label\
    \ = \"ServiceYear\";\n        values[0].Name = \"ServiceYear\";\n        values[0].Value\
    \ = \"2009\";\n\n        parametersSSRS = rs.GetItemParameters(report, historyID,\n\
    \            forRendering, values, credentials);\n\n        if (parametersSSRS\
    \ != null)\n        {\n            foreach (ItemParameter rp in parametersSSRS)\n\
    \            {\n                this.SuspendLayout();\n                this.parameterPanel.SuspendLayout();\n\
    \                this.parameterPanel.SendToBack();\n\n                // 现在为下面的组合框创建一个标签\n\
    \                Label lbl = new Label();\n                lbl.Anchor = (System.Windows.Forms.AnchorStyles.Top\
    \ | System.Windows.Forms.AnchorStyles.Left);\n                lbl.Location = new\
    \ System.Drawing.Point(x, y);\n                lbl.Name = rp.Name;\n         \
    \       lbl.Text = rp.Name;\n                lbl.Size = new System.Drawing.Size(150,\
    \ 20);\n                this.parameterPanel.Controls.Add(lbl);\n             \
    \   x = x + 150;\n\n                // 现在创建一个组合框并填充它\n                ComboBox\
    \ a = new ComboBox();\n                a.Anchor = (System.Windows.Forms.AnchorStyles.Top\
    \ | System.Windows.Forms.AnchorStyles.Right);\n                a.Location = new\
    \ System.Drawing.Point(x, y);\n                a.Name = rp.Name;\n           \
    \     a.Size = new System.Drawing.Size(200, 20);\n                x = 5;\n   \
    \             y = y + 30;\n\n                this.parameterPanel.Controls.Add(a);\n\
    \                this.parameterPanel.ResumeLayout(false);\n                this.ResumeLayout(false);\n\
    ```"
  raw: '#### Calling the Web Services GetItemParameters Method


    The GetItemParameters method takes five parameters:


    > *   Item: The full path name of the report/item.

    > *   ForRendering: A Boolean value that indicates how the parameter values should
    be used. You must set it to true to get a list of the possible values for each
    parameter.

    > *   HistorylD: The ID of the report history snapshot. You set it to null because
    you aren’t running the report from a snapshot.

    > *   ParameterValues: The parameter values (ParameterValue[ ] objects) that can
    be validated against the parameters of the report that are managed by the report
    server. Set this to null for this example.Credentials: The data source credentials
    (DataSourceCredential[] objects) that can be used to validate query parameters.


    The GetItemParameters method returns an array of ItemParameter[] objects that
    contain the parameters for the report. You use this information to render combo
    boxes that allow the users to select the parameter values they want to use when
    running the report.


    The following code sets up the variables you need to use and then calls the GetItemParameters
    method to retrieve a list of parameters that the report expects, as shown in [Listing
    9-6](#Chapter09.html#list_9_6).


    ***Listing 9-6.** Call to GetReportParameters*


    `bool forRendering = true;`

    `string historyID = null;`

    `ParameterValue[] values = new ParameterValue[1];`

    `DataSourceCredentials[] credentials = null;`

    `ItemParameter[] parametersSSRS = null;`

    `parametersSSRS = rs.GetItemParameters(report, historyID,`

    `    forRendering, values, credentials);`


    Once you have the list of parameters from SSRS 2012, you loop through them using
    the values to create labels as you create your combo box for each parameter, like
    so:


    `foreach (ItemParameter rp in parametersSSRS)`


    Each ItemParameter object has a read-only property called ValidValues. You can
    use the ValidValues property, which returns an array of ValidValue objects to
    populate the items in each combo box, as shown in [Listing 9-7](#Chapter09.html#list_9_7).


    ***Listing 9-7.** Iterating Through the ValidValue Objects*


    `if (rp.ValidValues != null) {`

    `//Build list items`

    `ArrayList aList = new ArrayList();`

    `pvs = rp.ValidValues;`

    `foreach (ValidValue pv in pvs)`

    `{`

    `aList.Add(new ComboItem(pv.Label,pv.Value));`

    `}`

    `//Bind list items to combo box`

    `a.DataSource = aList;`

    `a.DisplayMember="Display";`

    `a.ValueMember="Value"; }`


    So, for each ReportParameter, you see whether any ValidValues properties exist.
    If they do exist, you loop through them, adding each item to the combo box. Because
    you want to retrieve the display name and the actual value for each item in the
    combo box, you have to create a combo box item class and bind the objects to the
    combo box. [Listing 9-8](#Chapter09.html#list_9_8) shows the full GetParameters_Load
    event method, and [Listing 9-9](#Chapter09.html#list_9_9) shows the ComboItem
    class.


    Knowing something about our report, we already know that some of the parameters
    are dependent on other parameter values. If we simply run through the list of
    ValidValues for each parameter, some of them will include no values because of
    this dependency. We can use this previous knowledge to pass in a bit of information
    to the getItemParameters method. We will place one ParameterValue item in the
    values array so we can retrieve some valid values for all of our other parameters.


    We also need to retrieve the display name and the value selected of each item
    in the combo boxes. We are also going to create a combo box item class to handle
    this by binding each combo item to the combo box. [Listing 9-8](#Chapter09.html#list_9_8)
    shows the GetParameters_Load event and [Listing 9-9](#Chapter09.html#list_9_9)
    shows the ComboItem class.


    ![Image](images/square.jpg) **Note** We are populating the rest of the parameters
    based on just one possible Service Year value. Since, in some reports, the other
    parameter valid values might change, you could include an overridden event method
    that would refresh each of the other parameter values anytime the year was changed.


    ***Listing 9-8.** Get Report Parameters and Possible Values and Display Them in
    Combo Boxes*


    `private void GetParameters_Load(object sender, EventArgs e)`

    `                {`

    `                        rs = new ReportingService2010();`

    `                        rs.Credentials = System.Net.CredentialCache.DefaultCredentials;`


    `                        bool forRendering = true;`

    `                        string historyID = null;`

    `                        ParameterValue[] values = new ParameterValue[1];`

    `                        DataSourceCredentials[] credentials = null;`

    `                        ItemParameter[] parametersSSRS = null;`

    `                        ValidValue[] pvs = null;`


    `                        int x = 5;`

    `                        int y = 30;`


    `                        try`

    `                        {`

    `                values[0] = new ParameterValue();`

    `                values[0].Label = "ServiceYear";`

    `                values[0].Name = "ServiceYear";`

    `                values[0].Value = "2009";`


    `                                parametersSSRS = rs.GetItemParameters(report,
    historyID,`![Image](images/U002.jpg)

    ` forRendering, values, credentials);`


    `                                if (parametersSSRS != null)`

    `                                {`

    `                                        foreach (ItemParameter rp in parametersSSRS)`

    `                                        {`

    `                        this.SuspendLayout();`

    `                                                this.parameterPanel.SuspendLayout();`

    `                                                this.parameterPanel.SendToBack();`


    `                                                // now create a label for the
    combo box below`

    `                                                Label lbl = new Label();`

    `                                                lbl.Anchor = (System.Windows.Forms`![Image](images/U002.jpg)

    `.AnchorStyles.Top | System.Windows.Forms.AnchorStyles.Left);`

    `                                                lbl.Location = new System.Drawing.Point(x,
    y);`

    `                                                lbl.Name = rp.Name;`

    `                                                lbl.Text = rp.Name;`

    `                                                lbl.Size = new System.Drawing.Size(150,
    20);`

    `                                                this.parameterPanel.Controls.Add(lbl);`

    `                                                x = x + 150;`


    `                                                // now make a combo box and fill
    it`

    `                                                ComboBox a = new ComboBox();`

    `                                                a.Anchor = (System.Windows.Forms`![Image](images/U002.jpg)

    `.AnchorStyles.Top | System.Windows.Forms.AnchorStyles.Right);`

    `                                                a.Location = new System.Drawing.Point(x,
    y);`

    `                                                a.Name = rp.Name;`

    `                                                a.Size = new System.Drawing.Size(200,
    20);`

    `                                                x = 5;`

    `                                                y = y + 30;`


    `                        this.parameterPanel.Controls.Add(a);`

    `                                                this.parameterPanel.ResumeLayout(false);`

    `                                                this.ResumeLayout(false);`'
