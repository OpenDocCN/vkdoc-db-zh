- fmt: "## Configuring SharePoint 2010\n\nOnce the SSRS installation is complete,\
    \ you need to perform the third major step in the installation process. Now let’s\
    \ configure SharePoint using the SharePoint 2010 Products Configuration Wizard\
    \ under the Microsoft SharePoint 2010 Products folder of the All Programs menu.\
    \ Follow the below steps to configure your new server farm.\n\n1.  Choose the\
    \ option to Create a new server farm and click Next to proceed.\n2.  Specify the\
    \ Configuration Database Settings for the SharePoint site as shown in [Figure\
    \ 12-15](#Chapter12.html#fig_12_15). In this case, my server name is `VMWINSVR2008SP2`\
    \ and I specified the user credentials (`SQLBIGEEK\\bmcdonald`) to use when connecting\
    \ to the configuration database. Normally, you would specify a system account\
    \ with a password that rarely changes. Click Next to proceed.\n3.  Specify a Passphrase\
    \ to use for the Farm Security Settings. This is used when you need to perform\
    \ operations like joining servers to the farm. The minimum requirement for this\
    \ is like that of a secure Active Directory network. The password must have the\
    \ following characteristics: a minimum length of eight characters, special characters,\
    \ and a mixture of numerals and capital and lower-case letters. Click Next to\
    \ proceed.\n\n    ![Image](images/9781430238102_Fig12-15.jpg)\n\n    **Figure\
    \ 12-15.** Specify configuration database settings for SharePoint\n\n4.  Next,\
    \ you’ll need to configure the SharePoint Central Administration Web Application.\
    \ I like to change the default port number to something that is not commonly used,\
    \ but a little easier to remember than the typical default. Feel free to keep\
    \ the default port, but I chose to use port `2012`, as shown in [Figure 12-16](#Chapter12.html#fig_12_16).\
    \ Click Next to proceed.\n5.  After completing the wizard, you will be presented\
    \ with a summary. Click Next to begin the configuration process. After the configuration\
    \ wizard is done working its magic, you will be prompted with a dialog box stating\
    \ that the process has been completed. Upon clicking Finish, you are presented\
    \ with the SharePoint Central Administration. If for some reason yours does not\
    \ open up, you can find it by going to the Start Menu, All Programs, and then\
    \ Microsoft SharePoint 2010 Products. Alternatively, you could fire up Internet\
    \ Explorer and navigate to [`http://ServerName:PortNumber/`](http://ServerName:PortNumber/).\
    \ In my scenario, running on server name `VMWINSVR2008SP2` on port `2012`, my\
    \ URL would be [`http://VMWINSVR2008SP2:2012/`](http://VMWINSVR2008SP2:2012/).\n\
    \n![Image](images/9781430238102_Fig12-16.jpg)\n\n**Figure 12-16.** Specify SharePoint\
    \ Central Administration port and security\n\nWhew! You’re done with the configuration\
    \ wizard. Now comes the fun part. I bet you didn’t think that you would be learning\
    \ about PowerShell, did you? Well, you won’t be learning too much, so don’t be\
    \ concerned. Now, you’ll perform the fourth major step in getting Reporting Services\
    \ 2012 and SharePoint 2010 to work together.\n\n## Installing and Starting the\
    \ Reporting Services SharePoint Service\n\nIn this step, you need to connect the\
    \ installed SQL Server Reporting Services components to your new SharePoint farm.\
    \ Perform the following steps to install and start the Reporting Services SharePoint\
    \ Service.\n\nClick on the Start button, All Programs, and then right-click and\
    \ select Run as administrator on the SharePoint 2010 Management Shell under the\
    \ Microsoft SharePoint 2010 Products folder. You have to run this as an administrator\
    \ to perform the following steps. If not, you will receive the error displayed\
    \ in [Figure 12-17](#Chapter12.html#fig_12_17).\n\n![Image](images/9781430238102_Fig12-17.jpg)\n\
    \n**Figure 12-17.** Error if SharePoint management shell not in administrator\
    \ mode\n\nType in the following PowerShell command to install the SharePoint Reporting\
    \ Service. Hit the Enter key after typing in the command to execute it.\n\n```powershell\n\
    Install-SPRSService\n```\n\nType in the following PowerShell command to install\
    \ the PowerShell service proxy. Hit the Enter key to execute the command.\n\n\
    ```powershell\nInstall-SPRSServiceProxy\n```\n\nType in the following PowerShell\
    \ command to start the service. After typing the command on one line, hit the\
    \ Enter key to execute the command.\n\n```powershell\nGet-spserviceinstance –all\
    \ | where {$_.TypeName –like “SQL Server Reporting*”} | Start-SPServiceInstance\n\
    ```\n\n[Figure 12-18](#Chapter12.html#fig_12_18) shows the result after completing\
    \ the steps installing and starting the Reporting Services SharePoint Service.\
    \ For the fifth step, you need to create a new Reporting Services Service Application.\n\
    \n![Image](images/9781430238102_Fig12-18.jpg)\n\n**Figure 12-18.** SharePoint\
    \ management shell and scripts in administrator mode\n\n## Creating a New Reporting\
    \ Services Service Application\n\nYou are now on the cusp of having all of the\
    \ setup steps required to install Reporting Services 2012 in SharePoint 2010 mode.\
    \ This step will be performed in SharePoint 2010 Central Administration. Perform\
    \ the below steps to create a new SQL Server Reporting Services Service Application.\
    \ I know, it’s a mouthful, but we’ll get through this together.\n\nYou need to\
    \ open up SharePoint 2010 Central Administration, which can be found under the\
    \ Start menu, All Programs, and then Microsoft SharePoint 2010 Products.\n\nFrom\
    \ the Central Administration home screen, click on the Manage Service Applications\
    \ link under the Application Management task group as pointed out in [Figure 12-19](#Chapter12.html#fig_12_19).\n\
    \n![Image](images/9781430238102_Fig12-19.jpg)\n\n**Figure 12-19.** SharePoint\
    \ 2010 Central Administration manage service applications\n\nNext, click the New\
    \ button in the SharePoint menu and select SQL Server Reporting Services Service\
    \ Application as shown in [Figure 12-20](#Chapter12.html#fig_12_20).\n\n![Image](images/9781430238102_Fig12-20.jpg)\n\
    \n**Figure 12-20.** Creating a new SSRS Service Application\n\nEnter a name and\
    \ Application Pool to be used for this Service Application. From the manageability\
    \ perspective, it is a good idea to give them both the same name. As can be seen\
    \ in [Figure 12-21](#Chapter12.html#fig_12_21), mine is named Professional SSRS\
    \ 2012 Service Application for both. Depending on your security needs, change\
    \ appropriately. I used the default security settings for the SharePoint managed\
    \ account. Scroll down and set the database server, name, and authentication details\
    \ appropriately. Last but not least, choose the Web Application Association. In\
    \ this case, there is only one web application to associate with. Click OK to\
    \ save your settings. After a few minutes, you should see a screen stating that\
    \ your new service application has completed successfully.\n\n![Image](images/9781430238102_Fig12-21.jpg)\n\
    \n**Figure 12-21.** Creating a new SSRS Service Application\n\nAfter the new SQL\
    \ Server Reporting Services Service Application has been created, you will see\
    \ it in your list of Service Applications as shown in [Figure 12-22](#Chapter12.html#fig_12_22).\
    \ I’m sure that you will be happy to hear that you only have one more step left\
    \ in your installation and configuration of SQL Server 2012 Reporting Services\
    \ in SharePoint 2012 mode.\n\nIn prior versions of Reporting Services, integration\
    \ with SharePoint was managed using the Reporting Services Configuration Manager.\
    \ As I mentioned earlier, in SQL Server 2012, if you choose to run in SharePoint\
    \ integrated mode, Reporting Services is installed and configured completely within\
    \ SharePoint 2010. So next, I’ll walk you through the steps to get the Reporting\
    \ Services integrated into SharePoint.\n\n![Image](images/9781430238102_Fig12-22.jpg)\n\
    \n**Figure 12-22.** List of service applications"
