- fmt: '## About the Authors


    ![Image](images/9781430238102_FM-01.jpg) ![Image](images/square.jpg) Brian K.
    McDonald, MCDBA, MCSD, is a business intelligence and data warehouse geek working
    for Acosta, the top sales and marketing company in the US. Brian was born and
    raised in Cincinnati, Ohio but he currently lives in Jacksonville, Florida with
    his beautiful wife and his two little ninjas, Bailey and Kylie. As the former
    owner of Business Enterprise Solution Technologies and an independent consultant,
    Brian has experiences in architecting data warehouses, data modeling, database
    administration, `SQL Server Reporting Services`, `Integration Services`, `Analysis
    Services`, and `PowerPivot`. He has also worked as an application developer, network
    administrator, and database administrator throughout his 13 years in the IT industry.
    A characteristic groomed while serving his country in the United States Marine
    Corps is the pride Brian takes in all his projects and he diligently works to
    not only meet expectations, but greatly exceed them. He continually strives to
    improve his skill-set, both professionally and personally. In addition to having
    a Business Management and Computer Information Systems, he is a Microsoft Certified
    Solution developer (`MCSD`) and a Microsoft Certified Database Administrator (`MCDBA`).
    Brian is an active member in the `SQL Server` community. He enjoys giving back
    to the `SQL Server` community through training, virtual and public speaking engagements,
    as well as by writing articles and blogs for many industry leading websites like
    `SQLBIGeek`, `SQLServerCentral`, and `SQLServerPedia`. You may have seen Brian
    presenting at the inaugural `SQL Rally` in Orlando, FL, or at one of the many
    `SQL Saturdays`, `Code Camps`, or `User Groups` that he has been a part of throughout
    the years. In those moments when he is not giving back to the community or working,
    Brian enjoys "geeking" out with his wife Sherri and allowing his children to practice
    their `UFC` style moves on him.


    ![Image](images/9781430238102_FM-02.jpg) ![Image](images/square.jpg) Shawn McGehee
    is a `DBA` and manager for a large insurance company in the US. He has been working
    with `SQL Server` in some fashion since 7.0 and has been working in the `IT` field
    since 1998\. Starting as a developer, he has gradually made the move to a full
    time administration role, but still enjoys the challenges he can solve using his
    development background whenever he can. He is active in the `SQL Server` community
    and enjoys speaking at user groups, `SQL Saturdays` and the odd `Code Camp`. He
    is currently running the Orlando `SQL Server` User Group `OPASS` and has been
    involved with the `SQL Server` community for the last few years. You can usually
    find him roaming about at a `SQL Saturday` in the SouthEast, wherever it may be.


    ## About the Technical Reviewers


    ![Image](images/9781430238102_FM-03.jpg) ![Image](images/square.jpg) Rodney Landrum
    has worked with `SQL Server` longer than he can remember. He writes regularly
    about technologies, including `Integration Services`, `Analysis Services`, and
    `Reporting Services`. (Rodney is the original author of this book). He has authored
    *`SQL Server Tacklebox`* and three `Reporting Services` books. He contributes
    regularly to `SQLServerCentral`, `SQL Server Magazine`, and `Simple–Talk`. His
    day job involves overseeing a large `SQL Server` infrastructure in Orlando. He
    swears that he owns the phrase “Working with Databases on a Day to Day Basis.”
    Anyone who disagrees is itching to lose an arm wrestling match.


    ![Image](images/9781430238102_FM-04.jpg) ![Image](images/square.jpg) Sherri McDonald
    is a `BI` Developer who has specialized in `SQL Server Reporting Services` as
    a trainer of `Reporting Services` and the fundamentals of `TSQL`. She also is
    known for her `Reporting Services` `DVD`, co-produced with `SSWUG`. She has served
    many roles, with more than 14 years in the service industry, while most recently
    focusing on the Microsoft `BI` Stack. Sherri is an active blogger, a member of
    her local `SQL Server` User''s Group, and has presented at `SQL Saturday` and
    `Code Camp` events throughout Florida. Sherri was born and raised in Cincinnati,
    Ohio and currently lives in Jacksonville, Florida with her husband Brian and two
    children. When not learning the latest in technology, Sherri enjoys movies, going
    on cruises, and other travels with her friends and family.


    ## Introduction


    At its core, the process of designing reports hasn’t changed substantially in
    the past 20 years. The report designer lays out report objects, which contain
    data from a known source of data, in a design application such as `Reporting Services`,
    `Business Objects Reports`, or `Microsoft Access`. He or she then tests report
    execution, verifies the accuracy of the results, and distributes the report to
    the target audience.


    Sure, there are enough differences between design applications to mean that the
    designer must become familiar with each particular environment. However, there’s
    enough crossover functionality to make this learning curve small. For example,
    the `SUM` function is the same in `Business Objects Reports` as it is in `Microsoft
    Access` as it is in `Structured Query Language` (`SQL`).


    With `Microsoft SQL Server 2012 Reporting Services` (referred to as `SSRS` throughout
    the book), there is, again, only a marginal difference in the way reports are
    designed from one graphical report design application to another. So, if you do
    have previous reporting experience, your learning curve for `SSRS` should be relatively
    shallow. This is especially true if you come from a `.NET` environment, because
    the report designer application for `SSRS 2012` is `Visual Studio 2010` or the
    application included with `SQL Server 2012`, `SQL Server Data Tools` (`SSDT`),
    formerly known as `Business Intelligence Development Studio` (`BIDS`). We use
    `BIDS` and `SSDT` interchangeably throughout the book, with most references using
    `BIDS`. We have done this mainly because of the role that `Reporting Services`
    plays in the `Business Intelligence` stack of products with `SQL Server`, but
    also for readers who may be using prior versions of `Reporting Services` like
    `SSRS 2008 R2`.


    Having said all this, several differences set `SSRS` apart from other reporting
    solutions:


    *   It provides a standard reporting platform based on `Report Definition Language`
    (`RDL`), which is the `XML` schema that dictates the common structure of all `SSRS`
    reports. This allows for report creation from any third-party application that
    supports the `RDL` schema.

    *   `SSRS` is an integral part of the `SQL Server 2012` release.

    *   `SSRS` offers features out of the box that in other products would be expensive
    additions to a basic deployment. These features include subscription services,
    report caching, report history, and scheduling of report execution.

    *   `SSRS` can be extended with third party add-ons, custom code, and compiled
    `DLL’s`.

    *   `SSRS`, being a Web-based solution, can be deployed across a variety of platforms.

    *   `SSRS` also allows for easy integration with Microsoft’s Collaboration Software
    for the Enterprise: `SharePoint 2010`.


    This book was written in parallel with a real `SSRS` deployment for a health-care
    application, so it covers almost every design and deployment consideration for
    `SSRS`, always from the standpoint of how to get the job done effectively. You’ll
    find step-by-step guides, practical tips, and best practices, along with code
    samples that you’ll be able to modify and use in your own `SSRS` applications.


    ### Who This Book Is For


    We coauthored the book with the intention of demonstrating how to use `SSRS` from
    multiple vantage points. As reporting architects and report developers, we go
    through the report design and deployment processes using standard `SSRS` tools
    such as `Report Designer` in `BIDS` and `Report Manager`. We also show how developers
    can extend `SSRS` by creating custom `Windows` and `Web Forms` applications.'
