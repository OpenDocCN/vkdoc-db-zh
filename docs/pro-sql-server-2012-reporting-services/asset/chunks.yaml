  trans: "\n## 配置 SharePoint 2010\n\nSSRS 安装完成后，您需要执行安装过程中的第三个主要步骤。现在，让我们通过“所有程序”菜单下“Microsoft\
    \ SharePoint 2010 Products”文件夹中的 **SharePoint 2010 产品配置向导** 来配置 SharePoint。请按照以下步骤配置新的服务器场。\n\
    \n1.  选择“创建新的服务器场”选项，并点击“下一步”继续。\n2.  为 SharePoint 网站指定**配置数据库设置**，如图 12-15 所示。本例中，我的服务器名称是\
    \ `VMWINSVR2008SP2`，并且我指定了连接到配置数据库时要使用的用户凭据 (`SQLBIGEEK\\bmcdonald`)。通常，您会指定一个密码很少更改的系统账户。点击“下一步”继续。\n\
    3.  为**场安全设置**指定一个密码短语。当您需要执行将服务器加入场等操作时会用到此短语。其最低要求类似于安全 Active Directory 网络的要求。密码必须具备以下特征：最小长度为八个字符、包含特殊字符，并混合使用数字、大写字母和小写字母。点击“下一步”继续。\n\
    \n    ![Image](img/9781430238102_Fig12-15.jpg)\n\n    **图 12-15.** 为 SharePoint\
    \ 指定配置数据库设置\n\n4.  接下来，您需要配置 SharePoint 中心管理 Web 应用程序。我喜欢将默认端口号更改为不常用但比典型默认值更容易记住的端口。您可以保留默认端口，但我选择使用端口\
    \ `2012`，如图 12-16 所示。点击“下一步”继续。\n5.  完成向导后，您将看到一个摘要。点击“下一步”开始配置过程。配置向导完成其神奇工作后，将会弹出一个对话框，提示过程已完成。点击“完成”后，您将进入\
    \ SharePoint 中心管理。如果出于某种原因您的中心管理没有自动打开，您可以通过转到“开始”菜单 > “所有程序” > “Microsoft SharePoint\
    \ 2010 Products”来找到它。或者，您可以启动 Internet Explorer 并导航至 [`http://ServerName:PortNumber/`](http://ServerName:PortNumber/)。在我的场景中，运行在服务器名\
    \ `VMWINSVR2008SP2` 的端口 `2012` 上，我的 URL 将是 [`http://VMWINSVR2008SP2:2012/`](http://VMWINSVR2008SP2:2012/)。\n\
    \n![Image](img/9781430238102_Fig12-16.jpg)\n\n**图 12-16.** 指定 SharePoint 中心管理端口和安全设置\n\
    \n呼！您已经完成了配置向导。现在进入有趣的部分。我猜您没想到自己会学习 PowerShell，对吧？好吧，您不会学太多，所以不用担心。现在，您将执行让 Reporting\
    \ Services 2012 和 SharePoint 2010 协同工作的第四个主要步骤。\n\n## 安装并启动 Reporting Services\
    \ SharePoint 服务\n\n在此步骤中，您需要将已安装的 SQL Server Reporting Services 组件连接到新的 SharePoint\
    \ 场。请执行以下步骤来安装并启动 Reporting Services SharePoint 服务。\n\n点击“开始”按钮 > “所有程序”，然后在“Microsoft\
    \ SharePoint 2010 Products”文件夹下右键单击“SharePoint 2010 Management Shell”并选择“以管理员身份运行”。您必须以管理员身份运行此程序才能执行后续步骤。否则，您将收到如图\
    \ 12-17 所示的错误。\n\n![Image](img/9781430238102_Fig12-17.jpg)\n\n**图 12-17.** 如果\
    \ SharePoint 管理 Shell 未在管理员模式下运行时显示的错误\n\n键入以下 PowerShell 命令以安装 SharePoint Reporting\
    \ 服务。键入命令后按 Enter 键执行。\n\n```powershell\nInstall-SPRSService\n```\n\n键入以下 PowerShell\
    \ 命令以安装 PowerShell 服务代理。按 Enter 键执行命令。\n\n```powershell\nInstall-SPRSServiceProxy\n\
    ```\n\n键入以下 PowerShell 命令以启动该服务。在一行中键入命令后，按 Enter 键执行命令。\n\n```powershell\nGet-spserviceinstance\
    \ –all | where {$_.TypeName –like “SQL Server Reporting*”} | Start-SPServiceInstance\n\
    ```\n\n图 12-18 显示了完成安装并启动 Reporting Services SharePoint 服务后的结果。对于第五步，您需要创建一个新的\
    \ Reporting Services 服务应用程序。\n\n![Image](img/9781430238102_Fig12-18.jpg)\n\n**图\
    \ 12-18.** 管理员模式下的 SharePoint 管理 Shell 和脚本\n\n## 创建新的 Reporting Services 服务应用程序\n\
    \n您现在正处于完成所有在 SharePoint 2010 模式下安装 Reporting Services 2012 所需设置步骤的边缘。此步骤将在 SharePoint\
    \ 2010 中心管理中完成。请执行以下步骤来创建一个新的 SQL Server Reporting Services 服务应用程序。我知道，这名字有点拗口，但我们将一起完成它。\n\
    \n您需要打开 SharePoint 2010 中心管理，可以在“开始”菜单 > “所有程序” > “Microsoft SharePoint 2010 Products”下找到它。\n\
    \n从中心管理的主页，在“应用程序管理”任务组下，点击“管理服务应用程序”链接，如图 12-19 所示。\n\n![Image](img/9781430238102_Fig12-19.jpg)\n\
    \n**图 12-19.** SharePoint 2010 中心管理的服务应用程序管理\n\n接下来，在 SharePoint 菜单中点击“新建”按钮，并选择“SQL\
    \ Server Reporting Services 服务应用程序”，如图 12-20 所示。\n\n![Image](img/9781430238102_Fig12-20.jpg)\n\
    \n**图 12-20.** 创建新的 SSRS 服务应用程序\n\n输入此服务应用程序的名称和要使用的应用程序池。从可管理性的角度来看，将它们命名为相同的名称是个好主意。如图\
    \ 12-21 所示，我的两个名称都命名为“Professional SSRS 2012 Service Application”。根据您的安全需求，适当更改。我使用了\
    \ SharePoint 托管账户的默认安全设置。向下滚动，适当设置数据库服务器、名称和身份验证详细信息。最后但同样重要的是，选择 Web 应用程序关联。本例中，只有一个\
    \ Web 应用程序可供关联。点击“确定”保存您的设置。几分钟后，您应该会看到一个屏幕，提示您的新服务应用程序已成功完成。\n\n![Image](img/9781430238102_Fig12-21.jpg)\n\
    \n**图 12-21.** 创建新的 SSRS 服务应用程序\n\n新的 SQL Server Reporting Services 服务应用程序创建后，您将在您的服务应用程序列表中看到它，如图\
    \ 12-22 所示。我相信您会很高兴得知，在 SharePoint 2012 模式下安装和配置 SQL Server 2012 Reporting Services\
    \ 只剩下一步了。\n\n在早期版本的 Reporting Services 中，与 SharePoint 的集成是使用 Reporting Services\
    \ 配置管理器管理的。正如我之前提到的，在 SQL Server 2012 中，如果您选择在 SharePoint 集成模式下运行，Reporting Services\
    \ 将完全在 SharePoint 2010 内部安装和配置。所以接下来，我将引导您完成将 Reporting Services 集成到 SharePoint\
    \ 的步骤。\n\n![Image](img/9781430238102_Fig12-22.jpg)\n\n**图 12-22.** 服务应用程序列表\n"
- fmt: '## Configuring Reporting Services Integration with SharePoint


    Now that you have completed all of the required installation steps, it is time
    to begin the final configuration process. You know that `SSRS` is already configured
    for SharePoint integration. All that is required now is to configure SharePoint
    to activate the `Reporting Services Integration` and `Administration Features`.


    Now that we are in SharePoint integrated mode using `SharePoint 2010` and `SQL
    Server 2012`, the `ReportServer` database is managed completely by SharePoint.
    SharePoint will supply the storage for all of the security, reports, and data
    sources. All of the benefits of SharePoint, such as document publishing and delivery,
    will be maintained by SharePoint.


    SharePoint’s main administration Web site, called `Central Administration`, is
    where you will perform the remaining `SSRS` configuration settings. Perform the
    following configuration steps:


    1.  Open the `Central Administration` Web site by clicking `Start, All Programs,
    Microsoft SharePoint 2010 Products, and then SharePoint 2010 Central Administration`.

    2.  Click on `Site Actions` and then `Site Settings`. When the `Site Settings`
    screen appears, click on the `Site Collection Features` link under `Site Collection
    Administration`. From there we need to ensure that the `Reporting Services` features
    are activated.

    3.  Click `Activate` next to the `Report Server Central Administration` and the
    `Report Server Integration` features as shown in [`Figure 12-23`](#Chapter12.html#fig_12_23).


    ![Image](images/9781430238102_Fig12-23.jpg)

    `Figure 12-23.` Activating site collection features


    That’s all there is to it! You’re done with the installation and configuration
    of `SharePoint 2010` and `SQL Server 2012 Reporting Services` in SharePoint mode.
    Before we move on, though, I want to show you how to get to the screen for administering
    your `Reporting Services` configuration settings. If you still have `Central Administration`
    open, click on `Application Management`. Next, click on `Manage Service Applications`
    under the `Service Applications` group. You should recognize the screen that opens,
    as it is the same one displayed in [`Figure 12-22`](#Chapter12.html#fig_12_22)
    above. Drill into your `Reporting Services` Service Application, as I have done
    in [`Figure 12-24`](#Chapter12.html#fig_12_24). Remember that mine is `Professional
    SSRS 2012 Service Application`.


    ![Image](images/square.jpg) **Note** Different environments may call for different
    deployment circumstances and methodologies. Should you need further assistance
    with getting `SSRS 2012` and SharePoint fully integrated, there are some great
    resources available at `Microsoft.com`. One such resource for configuring `SSRS
    2012` and `SharePoint 2010` can be found at [`http://msdn.microsoft.com/en-us/library/gg492276(v=sql.110).aspx`](http://msdn.microsoft.com/en-us/library/gg492276(v=sql.110).aspx).


    ![Image](images/9781430238102_Fig12-24.jpg)

    `Figure 12-24.` Managing Reporting Services service system settings


    Next, click on the `System Settings` link to view the `Reporting Services` Service
    settings. As you can see in [`Figure 12-25`](#Chapter12.html#fig_12_25), this
    is where you can change various options like report history, timeouts, and even
    how long to save the `Execution Log` as we did in [`Chapter 10`](#Chapter10.html).


    ![Image](images/9781430238102_Fig12-25.jpg)

    `Figure 12-25.` Setting Reporting Services Service Application server defaults


    Now that you are done with all of your setup and configuration, it is time to
    move forward and show you how to deploy reports to a SharePoint site.


    ### Deploying Reports in a SharePoint-Integrated SSRS Installation


    Once the three management tasks have been completed, it is time to begin working
    within the SharePoint site itself, where you will work with deployed reports and
    dashboards to create a portal page for your users. In our organization’s case,
    we wanted a simple `Admissions` dashboard page where company executives and decision
    makers could review important `BI` reports concisely. SharePoint provides many
    templates and samples that you can use to aid you in designing your dashboard.


    Let’s take a look at a default SharePoint page. You can see in [`Figure 12-26`](#Chapter12.html#fig_12_26)
    that a base SharePoint site collection installation includes a `Document Center`.
    To centralize our deployment location, we created a `Reports Library`. We also
    created another site on our SharePoint system using a built-in SharePoint template
    called `Business Intelligence Center`, which will allow us to use web parts to
    create a sample dashboard.


    ![Image](images/9781430238102_Fig12-26.jpg)

    `Figure 12-26.` SharePoint Document Center main page


    [`Figure 12-27`](#Chapter12.html#fig_12_27) displays the `Business Intelligence
    Center` for `SharePoint 2010`. The name `Business Intelligence Center` should
    not lead you to believe that this is where all of the `SSRS` reports will be deployed.
    `SSRS` reports can be deployed to any valid SharePoint path, as you will see shortly.
    The `Business Intelligence Center` is a location where you can create a dashboard
    or `Microsoft Excel` workbook as well as an area where reports can be deployed.
    It is in the `Reports Library`, which resides within the `Document Center`, where
    `SSRS` `RDL` files, data sources, and many other types of reports can be stored.


    ![Image](images/9781430238102_Fig12-27.jpg)

    `Figure 12-27.` SharePoint Business Intelligence Center


    As I mentioned, `RDL` reports can be deployed to any valid document library in
    SharePoint. In [`Figure 12-28`](#Chapter12.html#fig_12_28), you can see project
    properties for your `Pro_SSRS` report solution. Since you will be deploying these
    reports to the SharePoint server, the target URLs for the server and report folder
    will be different from those for a native `SSRS` deployment. You can see that
    the server will be a URL to the main SharePoint site, in our case [`http://localhost/`](http://localhost/).
    The target report folder is a URL that points to a valid SharePoint document library;
    in this case, [`http://localhost/sites/Pro_SSRS/Reports`](http://localhost/sites/Pro_SSRS/Reports),
    which is pointing to our `Report Library` contained in the `Document Center`.


    ![Image](images/9781430238102_Fig12-28.jpg)

    `Figure 12-28.` Target URL properties for the report project


    After you have made these changes to the target URLs for the report project, you
    can deploy reports directly to SharePoint. Right-click the `PatRef_DS` Shared
    Data Source and select `Deploy`. In order to deploy the report to the SharePoint
    site, you first must deploy the data source. After the `PatRef_DS` data source
    is deployed, right-click the `Average Referral to Admission` report in the `Solution
    Explorer` and select `Deploy`. Alternatively, you could have selected both the
    data source and the report by holding the `Ctrl` key down, then right-clicking
    and selecting `Deploy`. This would have deployed the data source first and then
    the report. Once the report has been successfully deployed, you will be able to
    see the report within the SharePoint site. The best part about deploying reports
    to SharePoint, as you can see in [`Figure 12-29`](#Chapter12.html#fig_12_29),
    is that you get to take advantage of all of the SharePoint document features,
    as `RDL` files are viewed as documents as well. Features such as workflows, alerts,
    and document check-in and check-out are inherited.


    ![Image](images/9781430238102_Fig12-29.jpg)

    `Figure 12-29.` Deployed report with SharePoint document features'
