- fmt: '#### 客户端工具


    ##### Business Intelligence Development Studio (BIDS) and SQL Server Data Tools
    (SSDT)


    报表浏览器只是可以使用 SSRS Web 服务的多个客户端之一。事实上，BIDS 在与 Web 服务交互以部署报表和数据源时也是一个客户端。BIDS 为报表开发人员提供了一个图形化的设计环境，用于生成
    SSRS 用于部署和呈现报表的 RDL 文件。


    ![Image](images/square.jpg) **注意** 由于 RDL 是一个定义好的标准，你可以使用任何支持创建 RDL 文件的设计应用程序。其他第三方报表设计器也是可用的，并且据说还有更多正在开发中。


    通过在 BIDS 报表项目中定义基本 URL 和文件夹名称，你可以在设计模式下将创建的 RDL 文件直接部署到报表服务器。基本 URL 的格式为 [`http://Servername/ReportServer`](http://Servername/ReportServer)。如果你的
    SSRS 配置为在非默认端口（80）上运行，请指定 [`http://ServerName:PortNumber/ReportServer`](http://ServerName:PortNumber/ReportServer)。我们将在[第3章](#Chapter03.html)到[第5章](#Chapter05.html)中详细介绍整个
    BIDS 设计环境，包括大多数可用的报表对象。我们还将描述定义 SSRS 报表每个方面的 RDL 模式。[图 1-3](#Chapter01.html#fig_1_3)
    展示了 BIDS 设计环境（也称为集成开发环境或 IDE），其中加载了一个设计模式下的报表。


    ![Image](images/9781430238102_Fig01-03.jpg)


    ***图 1-3.** BIDS 环境*


    ##### 命令行工具


    除了像 BIDS 和 SSMS 这样的图形化应用程序，SSRS 还提供了几个被视为 Web 服务客户端的命令行工具。这些工具的额外好处是可以通过 Windows
    内置的任务计划功能实现自动化。SSRS 包含四个主要的命令行工具：


    > *   `rs`：处理使用 VB.NET 代码编写的报表服务脚本（RSS）文件。因为你可以通过脚本中的代码访问完整的 SSRS API，所以所有 SSRS
    Web 服务方法都是可用的。

    > *   `rsconfig`：配置 SSRS 连接到 `ReportServer` 数据库的身份验证方法和凭据。`rsconfig` 工具还设置无人参与的
    SSRS 执行凭据。

    > *   `rskeymgmt`：管理 SSRS 用于安全存储敏感数据（如身份验证凭据）的加密密钥。[第11章](#Chapter11.html)涵盖了
    `rskeymgmt` 的使用。

    > *   `rsactivate`：将 Reporting Services 的另一个实例添加到 Web 场中，对于替换损坏的实例很有用。


    ##### 报表生成器


    报表生成器应用程序在类似于其他 Microsoft Office 产品的环境中开发报表，具有功能区风格的界面。与 SSRS 2008 R2 一起发布的报表生成器
    3.0 提供了几乎与 BIDS 中的报表设计器相同的功能。你可以使用标准的 ClickOnce 技术从浏览器中安装它，或者将其作为厚客户端应用程序安装，使其在
    Windows 开始菜单下可用。[图 1-4](#Chapter01.html#fig_1_4) 展示了来自[第6章](#Chapter06.html)的一个报表示例，该报表在报表生成器中加载。


    ![Image](images/9781430238102_Fig01-04.jpg)


    ***图 1-4.** 报表生成器 3.0*


    ##### 自定义客户端


    最后一种客户端是那些专门设计用于访问 SSRS Web 服务的定制客户端。本书的所有作者之间，我们已经为许多组织构建了几个这样的应用程序，它们同时使用了报表查看器和报表发布者。第三方商业应用程序提供了扩展功能，例如
    RS Scripter，它有助于编写脚本和管理各种报表服务器目录项；它可以从服务器提取 RDL，并管理订阅、角色，甚至从一个服务器迁移到另一个服务器。


    ### 安装与配置


    你可以像安装 Analysis Services、Integration Services 和 Notification Services 一样，作为主 SQL
    Server 安装的一部分来安装 Reporting Services。在安装 Reporting Services 2012 之前，你必须知道你将运行在本机模式还是
    SharePoint 集成模式。对于早期版本的 Reporting Services，你可以通过使用 Reporting Services 配置管理器在安装后更改模式，但在
    2012 版本中，你只能在 SQL Server 安装时将 Reporting Services 配置为 SharePoint 集成模式，因为该应用程序将作为本机
    SharePoint 服务进行安装和配置。


    安装的组件取决于你的组织选择实现的模式。例如，在本机模式下安装时，组件包括 Reporting Services Web 服务、`ReportServer`
    数据库和报表管理器 Web 应用程序。安装 Reporting Services 后，如果你不需要某些功能，可以选择禁用它们。例如，你可能希望使用自定义应用程序与
    `ReportServer` 交互，而不是内置的报表管理器 Web 应用程序。安装的客户端组件包括前面提到的管理命令行工具，如 `rs` 和 `rsconfig`，以及文档、示例和前面提到的
    Reporting Services 配置管理器。


    如果你在安装 Reporting Services 时使用了本机模式的默认配置设置，你将使用 RS 配置管理器来设置或更改与该实例相关的各种其他设置。一些需要执行的任务是：


    > *   选择安全设置，例如报表服务器将使用 HTTP、HTTPS 还是两者。

    > *   配置一个简单邮件传输协议（SMTP）邮件服务器来处理订阅的传递。

    > *   备份和还原在将报表服务器移动到新机器时使用的加密密钥。

    > *   设置 Web 服务和报表管理器 URL，并定义它们运行的端口。这使你能够在一台机器上运行多个 Reporting Services 实例。


    如前所述，一旦安装了 SSRS，你可以修改一些配置设置。例如，在查看性能数据后，你可能认为报表服务器需要连接到现有的 Web 场。你可以使用 `rsconfig`
    工具或图形化的 Reporting Services 配置管理器来执行此任务。你可以通过直接修改 `RSReportServer.config` 文件来重新配置安全设置或邮件服务器。我们将在[第10章](#Chapter10.html)和[第11章](#Chapter11.html)中介绍如何使用这些工具、修改配置文件设置以及收集性能度量。


    如果你选择使用 SharePoint 集成模式，配置设置完全在 SharePoint 的管理中心内管理。我们将在[第12章](#Chapter12.html)中更详细地介绍
    SharePoint 集成。'
  raw: '#### Business Intelligence Development Studio (BIDS) and SQL Server Data Tools
    (SSDT)


    The browser is only one of several clients that can use the SSRS Web service.
    In fact, BIDS is a client when it interacts with the Web service to deploy reports
    and data sources. BIDS offers a graphical design environment for report developers
    to produce the RDL files that SSRS uses for deploying and rendering reports.


    ![Image](images/square.jpg) **Note** Because RDL is a defined standard, you can
    use any design application that supports the creation of RDL files. Other third-party
    report designers are available, and many more are said to be in development.


    By defining the base URL and folder name in a BIDS report project, you can deploy
    created RDL files directly to the report server while in design mode. The base
    URL is of the form [`http://Servername/ReportServer`](http://Servername/ReportServer).
    If you have SSRS configured to run under a port other than the default, 80, specify
    [`http://ServerName:PortNumber/ReportServer`](http://ServerName:PortNumber/ReportServer).
    We’ll cover the entire BIDS design environment in [Chapters 3](#Chapter03.html)-[5](#Chapter05.html),
    including most available report objects. We’ll also describe the RDL schema that
    defines every aspect of an SSRS report. [Figure 1-3](#Chapter01.html#fig_1_3)
    shows the BIDS design environment, also called an integrated development environment
    (IDE), with a report loaded in design mode.


    ![Image](images/9781430238102_Fig01-03.jpg)


    ***Figure 1-3.** BIDS environment*


    #### Command-Line Utilities


    In addition to graphical applications such as BIDS and SSMS, SSRS provides several
    command-line utilities that are considered Web service clients. The tools have
    the added benefit of being automated by using built-in task scheduling in Windows.
    SSRS includes four main command-line utilities:


    > *   `rs`: Processes reporting services script (RSS) files that are written with
    VB.NET code. Because you can access the full SSRS API via the code in the script,
    all SSRS Web service methods are available.

    > *   `rsconfig`: Configures the authentication methods and credentials for connecting
    SSRS to the `ReportServer` database. The `rsconfig` utility also sets the unattended
    SSRS execution credentials.

    > *   `rskeymgmt`: Manages the encryption keys that SSRS uses to store sensitive
    data securely, such as authentication credentials. [Chapter 11](#Chapter11.html)
    covers the use of `rskeymgmt`.

    > *   `rsactivate`: Adds another instance of Reporting Services to a Web Farm,
    and is useful for replacing a corrupted instance.


    #### Report Builder


    The Report Builder application develops reports in an environment much like other
    Microsoft Office products, with a ribbon style interface. Report Builder 3.0,
    released with SSRS 2008 R2, provides nearly all of the capabilities of the Report
    Designer within BIDS. You can install it using standard ClickOnce technologies
    from within the browser or as a thick client application to make it available
    under the Windows Start menu. [Figure 1-4](#Chapter01.html#fig_1_4) shows an example
    of a report from [Chapter 6](#Chapter06.html), loaded in the Report Builder.


    ![Image](images/9781430238102_Fig01-04.jpg)


    ***Figure 1-4.** Report Builder 3.0*


    #### Custom Clients


    The final types of clients are those custom designed to access the SSRS Web services.
    Between all of the authors of this book, we have built several such applications
    for many organizations, which use both the report viewer and the report publisher.
    Third-party commercial applications provide extended functionality, for instance
    RS Scripter, which assists in scripting and managing various report server catalog
    items; it can extract RDLs from a server, and manage subscriptions, roles, and
    even migration from one server to another.


    ### Installing and Configuring


    You can install Reporting Services—like Analysis Services, Integration Services,
    and Notification Services—as part of the main SQL Server installation. Before
    you install Reporting Services 2012, you must know whether you are going to run
    in native or SharePoint integrated mode. With earlier releases of Reporting Services,
    you could change mode after installation by using the Reporting Services Configuration
    Manager, but with the 2012 release, you can only configure Reporting Services
    in SharePoint integrated mode at SQL Server installation, as the application will
    be installed and configured as a native SharePoint service.


    The components installed depend on the mode your organization chooses to implement.
    For instance, when installing in native mode, components include the Reporting
    Services Web service, `ReportServer` databases, and Report Manager web application.
    Once you have installed Reporting Services, you can disable some features if you
    do not need them. You might choose to do this, for example, if you wanted to use
    a custom application to interface with the `ReportServer` rather than the built
    in Report Manager web application. Installed client components include the administrative
    command-line tools mentioned previously, such as `rs` and `rsconfig`, as well
    as documentation, samples, and the Reporting Services Configuration Manager mentioned
    earlier.


    If you use the default configuration settings for native mode during the installation
    of Reporting Services, you will use the RS Configuration Manager to set up or
    change various other settings related to the instance. Some tasks to perform are:


    > *   Choosing security settings, such as whether the report server will use HTTP,
    HTTPS, or both.

    > *   Configuring a Simple Mail Transfer Protocol (SMTP) mail server to handle
    the delivery of subscriptions.

    > *   Backup and restore the encryption key used when you move a report server
    to a new machine.

    > *   Set up Web Service and Report Manager URLs and define the ports they run
    on. This gives you the ability to run multiple reporting services instances on
    one machine.


    As mentioned, once you have installed SSRS, you can modify some of the configuration
    settings. For example, after reviewing performance data, you might decide that
    the report server needs to connect to an existing Web farm. You can perform this
    task using the `rsconfig` utility or by using the graphical Reporting Services
    Configuration Manager. You can reconfigure the security settings or the mail server
    by directly modifying the `RSReportServer.config` file. We’ll cover using these
    tools, modifying the configuration file settings, and gathering performance measures
    in [Chapters 10](#Chapter10.html) and [11](#Chapter11.html).


    If you choose to use SharePoint integrated mode, the configuration settings are
    managed completely within SharePoint’s Central Administration. We will cover more
    of SharePoint integration in [Chapter 12](#Chapter12.html).'
