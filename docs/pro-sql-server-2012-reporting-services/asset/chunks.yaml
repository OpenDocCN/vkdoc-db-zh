- fmt: '# Adding the Final Touches


    在许多项目中，最后的润色工作可能相当耗时。现在，你已将员工服务成本报告调整到符合预期并在开发过程中应用了一定程度的格式。在将报告标记为完成并准备部署到你的SSRS
    Web服务器用于生产之前，只剩下几个最终元素需要应用：


    *   添加页眉和页脚

    *   添加报告标题

    *   添加页码

    *   添加报告执行时间


    要为报告添加页眉和页脚，请选择“报告”菜单，然后选择“添加页眉”和“添加页脚”。这将向报告中添加两个新部分，你将在其中添加将打印在每一页上的值。


    在工具箱中，你会看到两个报告项：文本框和线条，它们可以在页眉和页脚部分使用。首先，将两个文本框拖到页眉，一个拖到页脚。然后，将其中一个页眉文本框对齐到与表格相同的宽度，将你的报告标题输入为`Employee
    Service Cost by Diagnosis`，将字体大小更改为16磅，并应用粗体格式。接着，将一条线拖到页眉部分，并将其定位在你刚刚创建的图表和报告标题文本框之间。


    在页眉部分的第二个文本框中，添加以下基于全局参数的表达式（在“编辑表达式”窗口中定义）：


    ```

    ="Page " & Globals!PageNumber & " of " & Globals!TotalPages

    ```


    最后，在页脚的文本框中，添加以下用于报告执行时间的表达式：


    ```

    =Globals!ExecutionTime

    ```


    现在，你已准备好在将报告部署给用户之前最后一次预览它。这次，让我们在浏览器中查看最终版本（参见[图6-42](#Chapter06.html#fig_6_42)）。这就是报告部署到Web服务器后的样子。（我们将在[第8章](#Chapter08.html#ch8)中讨论部署报告的方法）。预览报告后，滚动到报告底部以查看页脚中的报告执行时间。所有最终润色完成的报告可以在Pro_SSRS项目中找到，名为`EmployeeServiceCost_Final.rdl`。


    ![Image](images/9781430238102_Fig06-42.jpg)


    **图6-42.** 在浏览器中呈现的报告


    # Summary


    看起来我们在使用SSRS设计报告解决方案的实际设计方面覆盖了很多内容。然而，与此同时，我们才刚刚触及SSRS强大功能和灵活性的表面。我们尚未展示如何交织自定义程序集以执行超越基本表达式的特定功能。在本书的其他部分，你还将使用我们在此未涉及的其他数据区域。此外，你在本章中仅处理了少量报告；在业务中，尤其是在将现有报告迁移到SSRS时，通常需要同时处理许多报告。部署、管理和保护这些报告将成为关键的下一步。


    幸运的是，强大而灵活的设计环境只是SSRS的一个组成部分。在接下来的章节中，你将使用各种方法来部署、保护和分析你在此设计的报告的性能。


    # C H A P T E R 7


    # Using Custom .NET Code with Reports


    SSRS为软件开发人员提供了多种选项，用于通过代码自定义报告。这些选项使软件开发人员能够使用.NET代码编写自定义函数，这些函数可以与报告字段、参数和过滤器交互，其方式与任何内置函数非常相似。仅举两个例子，你可以创建一个自定义函数来执行以下操作：


    *   实现业务规则，并根据逻辑返回`true`或`false`。你可以将此类函数用作表达式的一部分，以根据传递给函数的字段或参数更改字段的值或样式。

    *   从SSRS 2012无法直接使用的其他来源读取数据。你可以通过让自定义代码直接从源读取数据来实现这一点。本章的示例代码还包括一个从Web服务读取数据的示例。


    简而言之，使用自定义.NET代码使开发人员能够将SSRS的功能扩展到超出其开箱即用功能的范围。本章将涵盖以下内容：


    *   使用嵌入在报告中的代码在报告内使用自定义代码。这是将自定义代码添加到报告的最简单方法，并且它随你的报告一起部署，因为它包含在RDL中。然而，它限制了你的能力，因为你只能使用一小部分.NET库，必须用VB
    .NET编写，并且提供有限的调试支持。你还限制了代码的可重用性，因为你必须手动移动并更改可能包含在不同报告中的任何代码。

    *   使用报告调用的自定义程序集在报告内使用自定义代码。这种方法实现起来更复杂，部署起来更困难，但它为你提供了几乎无限的灵活性。你的自定义代码拥有.NET框架的全部功能可供使用，并且具有额外的优点，即你可以在多个报告中使用单个程序集来复用自定义代码。你还可以在开发自定义程序集时使用Visual
    Studio的完整调试功能，并将其包含在任何代码存储库（如Team Foundation Server）中。


    通常，当你需要执行复杂函数并需要完整编程语言的功能来完成它们时，你会将自定义代码添加到报告中。但是，在开始编写自定义.NET代码之前，你应该首先评估使用内置表达式功能是否能满足你的需求。使用.NET嵌入式代码或自定义程序集而不是本机SSRS函数可能会导致严重的性能下降。如果你不需要在SSRS报告中使用.NET来执行任务，那么你可能不应该承担报告内代码或自定义程序集的额外开销。'
  raw: "### Adding the Final Touches\n\nIn many projects, the final touches can be\
    \ quite time-consuming. You now have the Employee Service Cost report to the point\
    \ where it is functioning the way you expect and has had formatting applied to\
    \ some extent during development. You have only a few final elements to apply\
    \ before you call the report complete and before it’s ready to deploy to your\
    \ SSRS Web server for production:\n\n> *   Adding a page header and footer\n>\
    \ *   Adding a report title\n> *   Adding page numbers\n> *   Adding the report\
    \ execution time\n\nTo add a page header and footer to the report, select the\
    \ Report menu and then Add Page Header and Add Page Footer. This will add the\
    \ two new sections to the report where you will add the values that will print\
    \ on every page.\n\nIn the Toolbox, you’ll see two report items, a textbox and\
    \ a line, that you can use in the page header and footer sections. First drag\
    \ two textboxes to the header and one to the footer. Then align one of the header\
    \ textboxes to be the same width as the table, enter your report title as Employee\
    \ Service Cost by Diagnosis, change the font size to 16 points, and apply bold\
    \ formatting. Next, drag a line into the header section, and position it between\
    \ the chart and the report title textbox you just created.\n\nIn the second textbox\
    \ in the header section, add the following expression based on global parameters\
    \ as defined in the Edit Expression window:\n\n`=\"Page \" & Globals!PageNumber\
    \ & \" of \" & Globals!TotalPages`\n\nFinally, in the textbox in the footer, add\
    \ the following expression for the report execution time:\n\n`=Globals!ExecutionTime`\n\
    \nYou are now ready to preview your report one last time before you deploy it\
    \ to your users. This time, let’s take a look at the final version in the browser\
    \ (see [Figure 6-42](#Chapter06.html#fig_6_42)). This is what the report will\
    \ look like when it has been deployed to the Web server. (We will discuss methods\
    \ for deploying reports in [Chapter 8](#Chapter08.html#ch8)). After previewing\
    \ the report, scroll down to the bottom of the report to see the report execution\
    \ time in the footer. The completed report with all the final touches can be seen\
    \ in the Pro_SSRS project is called EmployeeServiceCost_Final.rdl.\n\n![Image](images/9781430238102_Fig06-42.jpg)\n\
    \n***Figure 6-42.** Report rendered in the browser*\n\n### Summary\n\nIt seems\
    \ as if we have covered much ground in the actual design of a reporting solution\
    \ with SSRS. However, at the same time, we have only scratched the surface of\
    \ getting to the raw power and flexibility of SSRS. We have yet to show how to\
    \ interweave custom assemblies to perform specific functions that go beyond basic\
    \ expressions. You will also be working with other data regions in other parts\
    \ of the book that we have not touched on here. Additionally, you have been working\
    \ with only a small number of reports in this chapter; often in a business, especially\
    \ when facing migrating existing reports to SSRS, you will be working with many\
    \ reports simultaneously. Deploying, administering, and securing these reports\
    \ are going to become critical next steps.\n\nLuckily, a robust and flexible design\
    \ environment is only one component of SSRS. In the upcoming chapters, you will\
    \ deploy, secure, and analyze the performance of the reports you are designing\
    \ here, using a variety of methods.\n\n## C H A P T E R  7\n\n## Using Custom\
    \ .NET Code with Reports\n\nSSRS offers software developers a variety of options\
    \ when it comes to customizing reports through code. These options give software\
    \ developers the ability to write custom functions using .NET code that can interact\
    \ with report fields, parameters, and filters in much the same way as any of the\
    \ built–in functions. To give just two examples, you can create a custom function\
    \ that does the following:\n\n> *Implements a business rule and returns* true\
    \ *or* false *based on the logic*. You can use such a function as part of an expression\
    \ to change the value or style of a field based on the fields or parameters passed\
    \ to the function.\n> \n> *Reads data from sources not otherwise available to\
    \ SSRS 2012 directly*. You can do this by having your custom code read data directly\
    \ from the source. In this chapter, you will examine how to read data from an\
    \ XML file. The sample code for this chapter also includes an example of reading\
    \ data from a web service.\n\nIn short, using custom .NET code gives developers\
    \ the ability to extend the capabilities of SSRS far beyond those that are available\
    \ out of the box. This chapter will cover the following:\n\n> *Custom code for\
    \ use within your report using code embedded in the report*. This method is the\
    \ simplest way to add custom code to your report, and it deploys along with your\
    \ report since it is contained in the RDL. However, it limits what you can do\
    \ since you can only use a small subset of the .NET libraries, it must be written\
    \ in VB .NET, and it offers limited debugging support. You are also limiting the\
    \ reusability of the code since you must manually move and make changes to any\
    \ code that might be included in different reports.\n> \n> *Custom code for use\
    \ within your report using a custom assembly called by the report*. This method\
    \ is more involved to implement and more difficult to deploy, but it offers you\
    \ nearly unlimited flexibility. Your custom code has the full power of the .NET\
    \ framework at its disposal and has the added benefit that you can use the custom\
    \ code across multiple reports using a single assembly. You can also use the full\
    \ debugging capabilities of Visual Studio while developing your custom assembly,\
    \ as well as include it in any code repositories such as Team Foundation Server.\n\
    \nGenerally, you will add custom code to your report when you need to perform\
    \ complex functions and need the capabilities of a full programming language to\
    \ accomplish them. However, before you embark on writing custom .NET code, you\
    \ should first evaluate whether using the built–in expression functionality can\
    \ meet your needs. Using .NET embedded code or custom assemblies instead of native\
    \ SSRS functions can give you serious performance degradation. If you don’t need\
    \ to use .NET to performa task in an SSRS report, you probably shouldn’t take\
    \ on the added overhead of in report code or a custom assembly."
  trans: '# 添加最终修饰


    在许多项目中，最终的润色工作可能相当耗时。现在，你已将员工服务成本报告调整到符合预期，并在开发过程中应用了一定程度的格式。在将报告标记为完成并准备部署到你的
    SSRS Web 服务器用于生产之前，只剩下几个最终元素需要应用：


    *   添加页眉和页脚

    *   添加报告标题

    *   添加页码

    *   添加报告执行时间


    要为报告添加页眉和页脚，请选择“报告”菜单，然后选择“添加页眉”和“添加页脚”。这将向报告中添加两个新部分，你将在其中添加将打印在每一页上的值。


    在工具箱中，你会看到两个报告项：文本框和线条，它们可以在页眉和页脚部分使用。首先，将两个文本框拖到页眉，一个拖到页脚。然后，将其中一个页眉文本框对齐到与表格相同的宽度，将你的报告标题输入为`Employee
    Service Cost by Diagnosis`，将字体大小更改为 16 磅，并应用粗体格式。接着，将一条线拖到页眉部分，并将其定位在你刚刚创建的图表和报告标题文本框之间。


    在页眉部分的第二个文本框中，添加以下基于全局参数的表达式（在“编辑表达式”窗口中定义）：


    ```

    ="Page " & Globals!PageNumber & " of " & Globals!TotalPages

    ```


    最后，在页脚的文本框中，添加以下用于报告执行时间的表达式：


    ```

    =Globals!ExecutionTime

    ```


    现在，你已准备好在将报告部署给用户之前最后一次预览它。这次，让我们在浏览器中查看最终版本（参见图 6-42）。这就是报告部署到 Web 服务器后的样子。（我们将在第
    8 章中讨论部署报告的方法）。预览报告后，滚动到报告底部以查看页脚中的报告执行时间。所有最终润色完成的报告可以在 Pro_SSRS 项目中找到，名为`EmployeeServiceCost_Final.rdl`。


    ![Image](img/9781430238102_Fig06-42.jpg)


    **图 6-42.** 在浏览器中呈现的报告


    # 小结


    看起来我们在使用 SSRS 设计报告解决方案的实际设计方面覆盖了很多内容。然而，与此同时，我们才刚刚触及 SSRS 强大功能和灵活性的表面。我们尚未展示如何交织自定义程序集以执行超越基本表达式的特定功能。在本书的其他部分，你还将使用我们在此未涉及的其他数据区域。此外，你在本章中仅处理了少量报告；在业务中，尤其是在将现有报告迁移到
    SSRS 时，通常需要同时处理许多报告。部署、管理和保护这些报告将成为关键的下一步。


    幸运的是，强大而灵活的设计环境只是 SSRS 的一个组成部分。在接下来的章节中，你将使用各种方法来部署、保护和分析你在此设计的报告的性能。


    # 第 7 章


    # 在报告中使用自定义 .NET 代码


    SSRS 为软件开发人员提供了多种选项，用于通过代码自定义报告。这些选项使软件开发人员能够使用.NET 代码编写自定义函数，这些函数可以与报告字段、参数和过滤器交互，其方式与任何内置函数非常相似。仅举两个例子，你可以创建一个自定义函数来执行以下操作：


    *   实现业务规则，并根据逻辑返回`true`或`false`。你可以将此类函数用作表达式的一部分，以根据传递给函数的字段或参数更改字段的值或样式。

    *   从 SSRS 2012 无法直接使用的其他来源读取数据。你可以通过让自定义代码直接从源读取数据来实现这一点。本章的示例代码还包括一个从 Web 服务读取数据的示例。


    简而言之，使用自定义.NET 代码使开发人员能够将 SSRS 的功能扩展到超出其开箱即用功能的范围。本章将涵盖以下内容：


    *   使用嵌入在报告中的代码在报告内使用自定义代码。这是将自定义代码添加到报告的最简单方法，并且它随你的报告一起部署，因为它包含在 RDL 中。然而，它限制了你的能力，因为你只能使用一小部分.NET
    库，必须用 VB .NET 编写，并且提供有限的调试支持。你还限制了代码的可重用性，因为你必须手动移动并更改可能包含在不同报告中的任何代码。

    *   使用报告调用的自定义程序集在报告内使用自定义代码。这种方法实现起来更复杂，部署起来更困难，但它为你提供了几乎无限的灵活性。你的自定义代码拥有.NET
    框架的全部功能可供使用，并且具有额外的优点，即你可以在多个报告中使用单个程序集来复用自定义代码。你还可以在开发自定义程序集时使用 Visual Studio
    的完整调试功能，并将其包含在任何代码存储库（如 Team Foundation Server）中。


    通常，当你需要执行复杂函数并需要完整编程语言的功能来完成它们时，你会将自定义代码添加到报告中。但是，在开始编写自定义.NET 代码之前，你应该首先评估使用内置表达式功能是否能满足你的需求。使用.NET
    嵌入式代码或自定义程序集而不是本机 SSRS 函数可能会导致严重的性能下降。如果你不需要在 SSRS 报告中使用.NET 来执行任务，那么你可能不应该承担报告内代码或自定义程序集的额外开销。'
- fmt: "### Using Embedded Code in Your Report\n\nUsing embedded code is by far the\
    \ easiest way to implement custom .NET code in your reports, for two main reasons.\
    \ First, you simply add the code directly to the report using the Report Designer’s\
    \ user interface (UI) in either BIDS or Visual Studio. Second, this code becomes\
    \ a segment within the report’s RDL file, making its deployment simple because\
    \ it is a part of your report and will be deployed with it in a single step.\n\
    \nAlthough embedded code is easier to use, there are a few considerations that\
    \ you should take into account:\n\n> *Embedded code must be written in VB .NET*.\
    \ If you are a C# programmer or use some other .NET–compatible language as your\
    \ primary development language, this may force you to use the custom assembly\
    \ for all but the simplest of functions. Chances are that if you are developing\
    \ complicated code, you will want to go with the custom assembly route anyway\
    \ for the debugging and source control options.\n>\n> *All methods must be instance\
    \ based*. This means the methods will belong to an instantiated instance of the\
    \ code object and you cannot have static members.\n>\n> *Only basic operations\
    \ are available*. This is because, by default, code access security will prevent\
    \ your embedded code from calling external assemblies and protected resources.\
    \ You could change this through SSRS security policies, but it would require granting\
    \ FullTrust to the report expression host, which would grant full access to the\
    \ CLR and is definitely not recommended. If you need these capabilities, use custom\
    \ assemblies so you can implement security policies to grant each assembly only\
    \ the security it needs. You will look at custom assemblies and how to set security\
    \ for them in the “Deploying a Custom Assembly” section.\n\nBefore you run the\
    \ examples for this chapter, make sure to read the `ReadMe.htm` file included\
    \ with the sample code, available for download from the Source/Download page at\
    \ www.apress.com. It is located in a file in this chapter’s samples root folder.\
    \ If you have the code open in Visual Studio 2010, it will be under the Solution\
    \ Items folder. It contains setup and configuration steps that are required before\
    \ running the examples.\n\nLet’s take a look at how this feature of SSRS works\
    \ by adding some embedded code to one of the reports you have already created.\
    \ In this case, start with the sample Employee Service Cost report included with\
    \ this chapter. It is a slightly modified version of the Employee Service Cost\
    \ report you created in [Chapter 6](#Chapter06.html#ch6). We will show you how\
    \ to use the embedded code feature to add a function that will determine whether\
    \ you have exceeded a certain cost per visit for a type of treatment in a given\
    \ time period. You will then use that function to determine the color of one of\
    \ the text fields in the report to help draw attention to those specific treatment\
    \ types.\n\n![Image](images/square.jpg) **Note** In this chapter’s example, we’ll\
    \ use a slightly modified version of the report created in [Chapter 6](#Chapter06.html#ch6)\
    \ so that the employee report parameter will include a treatment with enough patients\
    \ who have exceeded the maximum number of visits and average cost.\n\n### Using\
    \ the ExceedMaxCosts Function\n\n[Listing 7-1](#Chapter07.html#list_7_1) is the\
    \ full listing of the custom code that you will add to the Employee Service Cost\
    \ report. It is a simple function, called `ExceedMaxCost`, which determines whether\
    \ a certain treatment type has exceeded an average cost over some period of time.\
    \ This allows you to identify cases for review to determine why they have such\
    \ a high cost of services.\n\n**Listing 7-1.** The ExceedMaxCost Function\n\n\
    ```\nFunction ExceedMaxCost(ByVal visitCount As Integer, ByVal estCost As Integer)\
    \ As Boolean\n    ' Our businesses logic dictates that we need to know whether\n\
    \    ' the average cost per visit exceeds a certain value but only when the visit\n\
    \    ' count is greater than 10\n\n    If ( visitCount > 10)\n            If (estCost/visitCount\
    \ > 45)\n                    Return True\n            End If\n    End If\n\n \
    \   Return False\n\nEnd Function\n```\n\nIf you are following along with the code\
    \ in the book, you will need to create a new Visual Studio 2010 BI project, selecting\
    \ the Reporting Services subcategory and Report Server Project type, as shown\
    \ in [Figure 7-1](#Chapter07.html#fig_7_1). For this example, call the solution\
    \ `Chapter 7` and the project `Reports`.\n\n![Image](images/square.jpg) **Note**\
    \ BIDS is now built directly into Visual Studio with the release of SQL Server\
    \ 2012\\. Whether you are creating this from BIDS or from Visual Studio, the resulting\
    \ project and solution will be the same.\n\n![Image](images/9781430238102_Fig07-01.jpg)\n\
    \n**Figure 7-1.** Creating a Visual Studio BI project\n\nTo add the existing `EmployeeServiceCost-NoCode.rdl`\
    \ file to your new project, right-click the Reports folder, and select Add ![Image](images/U001.jpg)\
    \ Existing Item, as shown in [Figure 7-2](#Chapter07.html#fig_7_2). Alternatively,\
    \ with the Reports project highlighted, select Add Existing Item from the menu.\
    \ Next, browse to the location where you installed the `Chapter 7` samples, and\
    \ select `EmployeeServiceCost-NoCode.rdl` from the Reports folder. You will also\
    \ need to add the shared data source by adding an existing item and picking the\
    \ `Pro_SSRS.rds` file from the same folder where the report was located.\n\n![Image](images/9781430238102_Fig07-02.jpg)\n\
    \n**Figure 7-2.** Adding `EmployeeServiceCost-NoCode.rdl` to your project\n\n\
    To add the code from [Listing 7-1](#Chapter07.html#list_7_1) to the Employee Service\
    \ Cost report, first open the report by double-clicking it or by right-clicking\
    \ it and selecting Open in the Solution Explorer. Next, with the report on the\
    \ Design tab, select Report Properties from the Visual Studio Report menu; alternatively,\
    \ right-click within the report design area, and select Properties. On the Report\
    \ Properties dialog box’s Code tab, add the code from [Listing 7-1](#Chapter07.html#list_7_1)\
    \ to the Custom Code box, as shown in [Figure 7-3](#Chapter07.html#fig_7_3).\n\
    \n![Image](images/9781430238102_Fig07-03.jpg)\n\n**Figure 7-3.** Entering embedded\
    \ code in the custom code editor\n\n![Image](images/square.jpg) **Note** You must\
    \ enter the function declaration (the first line) as a single line in the embedded\
    \ code editor, or you will receive an error when you try to preview the report.\
    \ It is shown with returns in [Listing 7-1](#Chapter07.html#list_7_1), but should\
    \ be entered into the embedded code editor without them.\n\nNow that you have\
    \ defined your custom code, you’ll want to use it to highlight the treatment types\
    \ that have exceeded the maximum visit count. To do this, you need to access the\
    \ `ExceedMaxCost` method as part of an expression.\n\nMethods in embedded code\
    \ are available through a globally defined `Code` member. When a report’s RDL\
    \ file is compiled into a .NET assembly (at publish time), SSRS creates a global\
    \ member of the class called `Code` that you can access in any expression by referring\
    \ to the `Code` member and method name, such as `Code.ExceedMaxCost`."
