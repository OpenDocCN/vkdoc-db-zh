    *   格式


    通过使用`Shift`或`Control`键，或者单击并拖动鼠标，可以轻松地同时将报表属性应用于多个单元格。对于“Estimated Cost”和“Service
    Count”标题单元格，您将在底部添加边框，将记录标题与实际数据分开。首先，按住`Control`键并单击每个单元格来突出显示两个标题列单元格。接下来，打开或展开“属性”窗口。“属性”窗口包含所选单元格每个区域（上、下、左、右）的“边框样式”属性。对于此示例，为底部边框选择“Solid”。


    保持“属性”窗口打开，单击“Estimated Cost”详细信息行单元格。在“属性”窗口中格式化该单元格，通过为“格式”属性添加格式命令`C0`使其成为货币格式。


    接下来，将标有“Employee Name”的标题单元格重命名为“Diagnosis > Service > Patient > Employee”，并扩展列以适应新标签的宽度。


    应用格式后，您可以通过单击“预览”选项卡立即看到这些更改如何影响输出（参见图 6-7）。


    ![Image](img/9781430238102_Fig06-07.jpg)


    **图 6-7.** 应用格式后的报表输出


    `Pro_SSRS`项目中的`EmployeeServiceCost_Format.rdl`报表已应用了格式化元素。

    '
- fmt: '### Adding Subtotals


    Having subtotals at each grouping level makes the report much easier for the user
    to read. This is especially true if the report has interactive drill-down features,
    as yours will have.


    Adding subtotals to the groups is as easy as copying and pasting or entering the
    field value expressions— in this case, `=Sum(Fields!Visit_Count.Value)` and `=Sum(Fields!Estimated_Cost.Value)`—to
    the upper level grouping cells in the report. For this report, you have defined
    a group for the `Employee_Name` field in the detail row. This forces the report
    to calculate the sums of the `Estimated_Cost` and `Visit_Count` fields for each
    employee. For this report, this is all that is required, but for many other reports
    you will be creating, you will need to include the detail records for a more granular
    analysis.


    In preparation for adding interactivity to the report, you will sum the `Estimated_Cost`
    and `Visit_Count` fields at all grouping levels by copying the Employee Cost and
    Visit Count textboxes at the Employee Name group level and pasting them into the
    cells in each group heading row—in this case, for Diagnosis, Service Type, and
    Patient Name. Alternatively, you could choose to enter the `Sum` value expression
    or to select `Sum` under the Summarize By submenu, as mentioned previously. If
    you choose one of these methods rather than copying and pasting, you will need
    to apply the currency formatting (`C0`) as you did previously. You will also make
    the topmost grouping (the `Diagnosis` field) bold by holding the Control key and
    clicking to highlight each of the Estimated Cost and Visit Count values in the
    Diagnosis group and then clicking the Bold button on the toolbar. With the bold
    formatting applied, the summed values at the group level will be easy to distinguish
    from the detail row values. The design of the report should look like [Figure
    6-8](#Chapter06.html#fig_6_8).


    ![Image](images/9781430238102_Fig06-08.jpg)


    Figure 6-8. Report design with grouping level subtotals


    The output of the report, which you can see by selecting the Preview tab, has
    much more valuable information now for each grouping. For Abnormality of Gait’s
    disease, for example, you can now see that there were 194 services for a total
    estimated cost of $9,700, and the bold formatting helps visually separate the
    values. The patient Russel Hansen (whose name is indented because of the padding
    you applied to the Patient group) is an Abnormality of Gait patient and has had
    16 of the 68 home health aide visits. You can further see each employee’s visit
    count and the cost for this patient in the rows containing the `Employee_Name`
    grouping (see [Figure 6-9](#Chapter06.html#fig_6_9)).


    ![Image](images/9781430238102_Fig06-09.jpg)


    Figure 6-9. Report output with grouping level subtotals


    The `EmployeeServiceCost_Subtotals.rdl` report in the Pro_SSRS project includes
    subtotals.


    ### Adding Interactivity


    Regardless of the audience for a particular report—whether it is a decision maker
    interested in on-screen summarized data or a knowledge worker who needs the ability
    to print reports— interactivity within the report makes navigating to specific
    information easier and more efficient. You can provide interactivity within an
    SSRS report in several ways. You will be working with four basic types of interactivity
    in the following sections:


    > *   Document mapping: Provides a navigation pane within the report with values
    based on a field or grouping.

    > *   Visibility: Adds interactivity to a report by hiding and showing report
    items based on user input.

    > *   Interactive sorting: Allows users to interactively select how the report
    data will be sorted.

    > *   Hyperlink actions: Allows the user to click a report item that is linked
    to a location within the same report or external to the report.


    The different rendering formats provided with SSRS, which are covered in detail
    in [Chapter 7](#Chapter07.html#ch7), accommodate viewing and printing reports
    to meet the needs of different types of workers. However, this produces a limitation
    in that some of the functionality of one rendering format is not available in
    other formats. This is most evident when working with interactivity, as you will
    see in the “Interactive Sorting” section.


    #### Document Mapping


    Creating a document map in an SSRS report will present users with an integrated
    navigation pane when the report is rendered. The user can select an item in the
    navigation pane, which will cause the report to jump to the position where that
    item is located. In the example report, for instance, a user might be interested
    in viewing information about Alzheimer’s patients. You can create a document map
    for the Diagnosis group in the report so that when the user selects Alzheimer’s
    from the navigation pane, the report will automatically skip to that section;
    in other words, the user will not have to manually search through the report to
    find the desired information. You can also add document maps at multiple levels,
    creating a hierarchical selection in the navigation pane. Keeping with the example,
    you can add a document map to the `Service_Type` group in addition to the Diagnosis
    group; the user can then expand Alzheimer’s in the navigation pane to see all
    the types of services—home health aides, for example—that have been performed
    for each diagnosis.


    You create document maps by adding an expression to the Document Map Label property
    available for individual report items or for groups. Begin this example by opening
    the `EmployeeServiceCost_DocumentMap_Start.rdl` report in the Pro_SSRS project.
    By following these steps, you will add a document map label to the `Service_Type`
    and Diagnosis groups:


    1.  On the Design tab, right click the `Service_Type` group in the Row Groups
    pane and select Group Properties. Next click on the Advanced tab.

    2.  In the Advanced tab of the Group Properties, select `Service_Type` in the
    Document map dropdown.

    3.  Complete steps 1 and 2 for the Diagnosis group, which is the first-level grouping
    above `Service_Type`. Select Diagnosis for the Document Map Label option.


    Now when you preview the report, the navigation pane will automatically be displayed
    on the left side of the report. The preview, which is in HTML by default, displays
    in one of the rendering formats that supports document mapping, such as PDF (see
    [Figure 6-10](#Chapter06.html#fig_6_10)).


    ![Image](images/9781430238102_Fig06-10.jpg)


    Figure 6-10. Report with navigation pane from document map


    The `EmployeeServiceCost_DocumentMap.rdl` report in the Pro_SSRS project includes
    a document map.


    ![Image](images/square.jpg) Note Adobe Acrobat views document mapping as bookmarks
    when the report is rendered in PDF. Bookmarks in SSRS perform a different function
    altogether. They are embedded within the report, and report items are assigned
    bookmark links.'
