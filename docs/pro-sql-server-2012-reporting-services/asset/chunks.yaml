    \ could control the look and feel of the report viewer. We show one such application\
    \ in [Chapter 7](#Chapter07.html), which covers report rendering.\n> \n> *Subscriptions*:\
    \ SSRS subscription abilities gave a huge advantage for our company and our clients,\
    \ as report delivery by e-mail or file-sharing, as well as off-peak processing,\
    \ were now possible. We show how to set up two different kinds of subscriptions,\
    \ standard and data-driven, in [Chapter 8](#Chapter08.html).\n\nAs you’ll see,\
    \ SSRS is a full reporting solution that encompasses many levels of professional\
    \ expertise, from report design to database administration. In many organizations,\
    \ especially small- to medium-sized ones, information technology (IT) professionals\
    \ are asked to perform many jobs. They write a query and design a report in the\
    \ morning, perform database backups or restores in the afternoon, and update all\
    \ the systems before heading home in the late hours of the evening. Sometimes\
    \ even until the early hours of the next day! But we are sure that we’re not the\
    \ only ones that take such pride in our jobs and always striving to exceed the\
    \ needs of the business.\n\nThroughout each of our careers, we have all worn many\
    \ hats in the companies which we have poured our time and devotion to over the\
    \ years. We have been entrenched in every deployment phase from internal deployments\
    \ to externally facing web application deployments to our clients, from simple\
    \ implementations to advanced ones which extended Reporting Services capabilities.\
    \ By developing efficient stored procedures, thoroughly testable security mechanisms,\
    \ as well as building and maintaining well designed reports, we have witnessed\
    \ the day-to-day operation of SSRS from many perspectives.\n\nWe have also been\
    \ responsible for our company’s overall strategy for building solutions to analyze\
    \ and transform data gathered through both our own and third-party applications.\
    \ To that end, an essential part of our jobs over the years has been to integrate\
    \ SSRS into the overall BI strategy that incorporated the following:\n\n> *  \
    \ Disparate data sources such as Analysis Services Cubes and SQL Server relational\
    \ databases\n> *   Applications and tools such as Microsoft Excel and Business\
    \ Scorecards\n> *   Document management systems such as Microsoft SharePoint Portal\
    \ Server\n\nWe’ll dive into the details of such integration projects in [Chapter\
    \ 12](#Chapter12.html), which is devoted to BI. We will also explore one of the\
    \ key advancements of SSRS 2008 R2 and 2012, which is a tighter integration with\
    \ SharePoint portal server, to the point that SSRS content can now be directly\
    \ deployed, managed, and viewed all within SharePoint. We’ll also show you how\
    \ sections of reports can be created and served as web parts.\n\nSSRS represents\
    \ another world, not often seen by an administrator using standard management\
    \ tools. This world is the domain of the software developer who can extend and\
    \ control SSRS programmatically, building custom report viewers and deployment\
    \ applications. In this book, as you work through each step of building a reporting\
    \ solution for healthcare professionals, you’ll see how an administrator can accomplish\
    \ the task with built-in tools, as well as how a developer can create an application\
    \ to provide enhanced functionality.\n\n### SQL Server 2008 R2 and 2012 Reporting\
    \ Services Enhancements\n\nThere have been many major additions to Reporting Services\
    \ since its initial release in 2005, but let’s look at some of the most significant\
    \ enhancements made to the SSRS technology in SQL Server.\n\n#### Report Builder/Data\
    \ Modeler\n\nThe Report Builder application, a feature introduced in SSRS 2005,\
    \ is a local ad hoc report-designing application intended for use more by report\
    \ consumers than by report developers. An administrator familiar with the source\
    \ data creates the business logic and underlying data structures as a data model.\
    \ With the Report Builder application, the user can create and publish reports\
    \ based on available models. Microsoft designed Report Builder 2.0, released in\
    \ SSRS 2008, for Microsoft Ribbon technology, much like Microsoft Word and Microsoft\
    \ Excel, and it was a significant improvement on Report Builder 1.0\\. Each enhancement\
    \ provided a richer development environment and additional content sources, such\
    \ as Oracle and Analysis Services Cubes. As if that wasn’t enough, Report Builder\
    \ 3.0 made its first appearance with SSRS 2008 R2, with its new data visualization\
    \ report items and cached result sets. [Chapter 13](#Chapter13.html) tells you\
    \ how to build and deploy a data model, as well as how to create reports with\
    \ the Report Builder 1.0, Report Builder 2.0, and Report Builder 3.0 applications."
  trans: "\n### 理解 SSRS 的优势\n\n我们公司决定立即迁移到 SSRS，是基于其为公司和客户带来的以下几项预期优势：\n\n> *   **标准平台**：除了提供以\
    \ `RDL` 实现的标准外，我们的开发团队一直将 `VS .NET` 作为主要的开发环境。由于 `SSRS` 报表目前在此平台内开发，我们无需购买额外的开发软件。我们的客户只需购买低成本的设计工具——例如\
    \ `VB.NET`——即可获得开发自定义报表的优势。在 `SQL Server 2005` 中，微软纳入了商业智能开发工具 (BIDS) 作为一款免费的替代报表设计器。自此之后，这个免费的开发环境一直随\
    \ `SQL Server` 提供，但微软最近已将其更名为 `SQL Server Data Tools` (SSDT)。在本书中，我们将交替使用 `BIDS`\
    \ 和 `SSDT`。`BIDS` 环境运行在 `Visual Studio` (devenv.exe) 的外壳中，且在撰写本文时，它基于 `Visual\
    \ Studio`——`SQL Server 2008` 和 `2008 R2` 对应 `VS 2008`，而最新版 `SQL Server 2012` 则对应\
    \ `VS 2010`。任何学会使用 `BIDS` 设计报表的人，当他们转向完整版的 `Visual Studio` 时，都将受益于其界面的一致性，且无需额外培训。\n\
    > \n> *   **成本优势**：`SSRS` 是 `SQL Server 2012` 的组成部分，并提供多种版本，从 `2008` 的 `Express\
    \ Advanced` 到 `Enterprise`，甚至 `2008 R2` 还有 `Datacenter` 版本。然而，由于 `SQL Server 2012`\
    \ 取消了 `Datacenter` 版本，功能最丰富的版本将再次是 `Enterprise`。当你购买 `SQL Server` 时，也就同时获得了 `SSRS`。`SQL\
    \ Server 2012` 的完整功能列表请参见 `http://tinyurl.com/SQL2012Features`。\n> \n> *   **Web\
    \ 支持**：由于 `SSRS` 是一个基于 `Web` 的报表解决方案；一份部署好的报表可被多种客户端访问，从浏览器到自定义的 `Windows 窗体`。此外，由于报表主要通过\
    \ `超文本传输协议 (HTTP)` 或 `超文本传输安全协议 (HTTPS)` 访问，你可以从任何能访问 `SSRS` `Web` 服务器的位置查看报表。除非你有一个需要随应用程序部署本地报表的胖客户端应用，否则你可以建立一个中央报表存储库，供整个组织使用。\n\
    > \n> *   **可定制性**：`SSRS` 提供了一个基于 `.NET` 的 `Web` 服务作为前端，可通过编程方式访问，从而将报表的交付方式扩展到浏览器之外。作为\
    \ `.NET` 程序员，我们知道我们会想要构建自定义应用程序来呈现报表，以便控制报表查看器的外观和感觉。我们在 第 7 章 中展示了这样一个应用程序，该章涵盖了报表呈现。\n\
    > \n> *   **订阅功能**：`SSRS` 的订阅功能为我们公司和客户带来了巨大优势，因为现在可以通过 `电子邮件` 或文件共享进行报表投递，以及进行非高峰时段处理。我们在\
    \ 第 8 章 中展示了如何设置两种不同类型的订阅：标准订阅和数据驱动订阅。\n\n正如你将看到的，`SSRS` 是一个完整的报表解决方案，涵盖了从报表设计到数据库管理的多个专业领域。在许多组织，尤其是中小型组织中，信息技术\
    \ (IT) 专业人员常常需要身兼多职。他们上午编写查询并设计报表，下午执行数据库备份或还原，在深夜更新所有系统后才回家。有时甚至直到凌晨！但我们确信，我们并非唯一一群如此以工作为荣、并始终努力超越业务需求的人。\n\
    \n在我们各自的职业生涯中，我们在那些我们倾注了时间和心血的公司里，都曾扮演过多种角色。我们深入参与了从内部部署到面向客户的外部 Web 应用程序部署的每一个部署阶段，从简单的实现到扩展\
    \ `Reporting Services` 功能的高级实现。通过开发高效的存储过程、经过彻底测试的安全机制，以及构建和维护设计精良的报表，我们从多个角度见证了\
    \ `SSRS` 的日常运作。\n\n我们也负责公司构建解决方案以分析和转换通过我们自有及第三方应用程序收集的数据的整体战略。为此，多年来我们工作的一个重要部分是将\
    \ `SSRS` 整合到包含以下内容的整体 `BI` 战略中：\n\n> *   异构数据源，如 `Analysis Services 多维数据集` 和 `SQL\
    \ Server` 关系数据库\n> *   应用程序和工具，如 `Microsoft Excel` 和 `Business Scorecards`\n>\
    \ *   文档管理系统，如 `Microsoft SharePoint Portal Server`\n\n我们将在专门介绍 `BI` 的 第 12 章\
    \ 深入探讨此类集成项目的细节。我们还将探索 `SSRS 2008 R2` 和 `2012` 的一项关键进步，即与 `SharePoint` 门户服务器更紧密的集成，达到可以在\
    \ `SharePoint` 内直接部署、管理和查看 `SSRS` 内容的程度。我们还将向你展示如何创建报表的部分内容并将其作为 Web 部件提供。\n\n\
    `SSRS` 代表了另一个世界，一个使用标准管理工具的管理员通常看不到的世界。这个世界是软件开发人员的领域，他们可以通过编程方式扩展和控制 `SSRS`，构建自定义的报表查看器和部署应用程序。在本书中，当你一步步为医疗保健专业人员构建报表解决方案时，你将看到管理员如何使用内置工具完成任务，以及开发人员如何创建应用程序来提供增强功能。\n\
    \n### SQL Server 2008 R2 和 2012 Reporting Services 增强功能\n\n自 `2005` 年首次发布以来，`Reporting\
    \ Services` 增加了许多重大功能，但让我们看看 `SQL Server` 中对 `SSRS` 技术所做的一些最重要的增强。\n\n#### 报表生成器/数据建模器\n\
    \n`报表生成器` 应用程序是 `SSRS 2005` 中引入的一个功能，是一个本地的即席报表设计应用程序，其设计目标用户更多是报表使用者而非报表开发人员。熟悉源数据的管理员创建业务逻辑和底层数据结构作为数据模型。借助\
    \ `报表生成器` 应用程序，用户可以基于可用的模型创建和发布报表。微软为 `SSRS 2008` 中发布的 `报表生成器 2.0` 设计了类似 `Microsoft\
    \ Word` 和 `Microsoft Excel` 的 `Microsoft Ribbon` 技术，这是对 `报表生成器 1.0` 的一次显著改进。每一次增强都提供了更丰富的开发环境和额外的内容源，例如\
    \ `Oracle` 和 `Analysis Services 多维数据集`。似乎这还不够，`报表生成器 3.0` 随 `SSRS 2008 R2` 首次亮相，带来了新的数据可视化报表项和缓存结果集。第\
    \ 13 章 将告诉你如何构建和部署数据模型，以及如何使用 `报表生成器 1.0`、`报表生成器 2.0` 和 `报表生成器 3.0` 应用程序创建报表。\n"
- fmt: '## SSRS 2012 Integration with Microsoft Office SharePoint


    While SharePoint integration was available with the use of SharePoint controls
    in previous versions of SSRS, SSRS 2012 takes the integration several steps further.
    By using SSRS 2012 in SharePoint Integration Mode, users can deploy, manage, and
    deliver reports and report objects, like web parts, data sources, and models,
    even entire dashboards or portals, all within the SharePoint environment. In addition,
    the deployed reports inherit the native features of SharePoint, such as workflow
    capabilities and the ability to check in and check out reports, and report change
    notification. We will demonstrate this tighter integration with SharePoint in
    [Chapter 12](#Chapter12.html).


    ## Tablix Report Properties


    As the name suggests, the Tablix properties first seen in SSRS 2008 combine two
    existing report controls, Table and Matrix. This combination gives developers
    a more flexible tool when creating reports. The availability of multiple columns
    and rows blends the static nature of the Table control with the dynamic nature
    of the Matrix. Reports can now accommodate multiple parallel rows and column members
    at each level, independent of each other but using the same aggregate calculations.
    In previous editions of this book, we provided workarounds to combining tables
    and matrices by embedding one within the other. In [Chapter 4](#Chapter04.html),
    we will explore the true power of the new Tablix control properties for the List,
    Table, and Matrix controls.


    ## Enhanced Charting and Report Item Visualizations


    From the beginning, SSRS offered charts and visualizations natively in reports.
    These charts, while versatile, were somewhat limited in scope. Much, if not all,
    of the functionality in the charting aspects of previous versions of SSRS could
    be easily duplicated in Microsoft Excel. In fact, the charting was almost identical.
    SSRS 2008 provided several charting and graphical data-visualization enhancements
    vital for the sound BI reporting solution of which SSRS is a pivotal component.
    New charting elements such as range, polar, radar, funnel, and pyramid are available,
    as well as many new “gauges” delivered with the acquisition of Dundas reporting
    controls for SSRS.


    SSRS 2008 R2 included several eagerly-awaited report item visualizations to enable
    the creation of a more sophisticated dashboard look and feel. One is the Map control
    that can display data from a geospatial data result set or an Environmental Systems
    Research Institute, Inc. (ESRI) shape file. Other great additions include Data
    Bars, Sparklines, and Indicators. We will explore several of these new visualizations
    as we incorporate them into reports in [Chapter 5](#Chapter05.html).


    ## Enhanced Performance and Memory Management


    Microsoft reengineered the report engine in SSRS 2008 to lessen the memory footprint
    for reports at the server level, speeding delivery of reports to end-user applications.
    This enhancement also resolves the contention that arose when long-running, large
    reports and smaller, non-memory-bound reports processed simultaneously.


    ## Embeddable SSRS Controls


    The ability to embed controls in custom applications makes it easier for developers
    to integrate SSRS into their projects. Since the release of SQL Server 2005, the
    Visual Studio environment has included distributable controls that you can use
    for Windows Forms development and ASP.NET Web Forms development. These controls
    provide additional benefits to developers, such as the ability to render reports
    while disconnected from the SSRS. We will cover updated SSRS controls in [Chapter
    9](#Chapter09.html).


    ## HTML Text Formatting


    Aside from the change from dual to single service architecture and the ability
    to export to Microsoft Word format, text formatting is probably one of the most
    significant advancements of SSRS 2008\. In previous versions of SSRS, in-line
    formatting of textual content, for example for a form letter, was not possible.
    For example, if you wanted to have a single textbox contain some text in regular
    font, but wanted to bold or italicize other sections of the text, you wouldn’t
    be able to do it. Textbox report items in SSRS 2008, SSRS 2008 R2, and SSRS 2012
    allow for normal and rich-text modes and allow formatting in the same way as a
    word processor does. You can create a placeholder to allow a limited subset of
    some HTML and style tags. The text formatting can combine both literal text and
    data source text for mail merge and template reports. We will demonstrate the
    full use of this feature by creating a custom form letter style report in [Chapter
    6](#Chapter06.html).


    ## Microsoft Word Rendering


    Since the first version of SSRS, you could export any report to Microsoft Excel.
    While this was an important capability, not being able to export to other Microsoft
    Office formats, such as Word, was a limitation. Developers often want to create
    reports using the rich text formats found in today’s modern word processors. By
    combining SSRS’s ability to design custom reports from multiple data sources with
    Word’s ability to provide rich formatting, SSRS 2008 overcomes significant limitations
    of its predecessors. Another limitation was that report users could not export
    into 2007 formats. Excel 2003 has a limitation of 65,536 rows and 256 columns,
    but one of SSRS 2012’s new rendering enhancements enables us to export to Word
    and Excel 2007-2010 formats, so we can now store 1,048,576 records and 16,384
    columns on one sheet of an Excel workbook.


    ## Report Parts


    If you’re like us, you have probably wanted to create little reusable objects
    that could be incorporated in more than one report. Until SSRS 2008 R2, you could
    do this only by creating reports that could be embedded into other reports as
    subreports. Now, you can publish individual sections of reports, like a `Tablix`
    containing the top 10 employees by sales totals or a `Sparkline` showing the customer
    complaints trend for the current year. Any report item like these can be deployed
    to a `ReportServer` or SharePoint server and reused by end users using ad hoc
    tools like `Report Builder` or SharePoint. Furthermore, report developers can
    use these report parts to reduce duplicate efforts for reports that need the data
    represented in the same fashion. A very useful feature is that if the report part
    is modified by a user with appropriate permissions, the consumers of that report
    part are notified about the update and they can choose to refresh their report
    or to leave it as it was.


    ## Lookup Functions


    Before 2008 R2, the need often arose to find a value in a different data region
    in the same report. Since the data in both of the tables could be linked by a
    common field, one workaround was simply to gather the data in the source query
    by joining the tables together. Often, this may perform better on the backend,
    but sometimes you need to look up values in another data region, so Microsoft
    has added three lookup functions to Reporting Services: `Lookup()`, `LookupSet()`
    and `MultiLookup()`.


    ## Shared Datasets


    Before moving on from the upgrades released with SSRS 2008 R2 and 2012, let’s
    briefly talk about shared datasets. This feature, added in 2008 R2, allows you
    to create a dataset that can be consumed among other reports. Imagine you have
    created a project with 50 reports, about 10 of them with a parameter for all of
    the countries throughout the world. Thinking of manageability, you designed this
    dataset to be loaded by making a call to a stored procedure. In previous releases
    of SSRS, you would have needed to create a dataset for every report that needed
    this parameter, so any change that affected them all would have had to be made
    in them all, one at a time. From 2008 R2 onward, we can create a shared dataset
    and use it across reports. A change in that single dataset updates all the reports
    that need that change.'
