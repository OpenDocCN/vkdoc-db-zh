    The last report type available in Report Builder 1.0 is the chart report. Thus
    far, you have created and saved table and matrix reports to address many of the
    report requests for the Patient Census report. Now, we will show one of the most
    important reports to answer the question of the number of patients on the census.
    Census means that the patients are currently receiving services and have not been
