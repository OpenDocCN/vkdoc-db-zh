  trans: '

    ### 创建数据源


    每份报表可以使用一个或多个数据源。使用相同数据源的报表——例如连接到特定 SQL Server 数据库的数据源——可以使用 SSRS 中所谓的 `共享数据源`。共享数据源会随报表一同发布，并可在部署后在报表服务器上进行修改。在
    BIDS 中，共享数据源包含若干属性，您必须先配置这些属性才能使用它们。


    让我们逐步完成为存储过程 `Emp_Svc_Cost` 创建共享数据源的过程。首先，在解决方案资源管理器中右键单击 `共享数据源`，然后选择 `添加新数据源`；此时将出现
    `共享数据源属性` 对话框。其次，单击对话框中的 `编辑` 按钮以创建连接字符串。在本例中，您知道包含源数据库和存储过程的服务器位于本地 SQL Server
    上，因此您可以键入 `localhost` 作为服务器名称。由于我们在上一窗口中保留了默认连接类型，因此数据源属性设置为 `Microsoft SQL Server
    (SqlClient)`。在键入 `localhost` 作为服务器后，您可以从数据库下拉选择列表中选择 `Pro_SSRS` 数据库。在本例中，由于数据库配置为同时使用
    Windows 和 SQL 身份验证，请选择 `使用 Windows 身份验证` 选项。如果您选择使用 SQL 身份验证，还可以选择存储 SQL 用户名和密码。通常，Windows
    身份验证是首选方法，因为它为用户提供了单一登录点（第 11 章 介绍了已部署报表的身份验证）。图 3-7 显示了数据源连接属性。您可以通过单击 `测试连接`
    按钮来测试连接。


    ![Image](img/9781430238102_Fig03-07.jpg)


    `图 3-7. 数据源连接属性`


    ![Image](img/square.jpg) **注意** 在 Reporting Services 2012 中，您可以从多种数据源类型中选择。SQL
    Server 恰好是默认值，但您可以从 SQL Azure、Analysis Services、Oracle、SAP 和 TERADATA 等来源获取数据。当然，您也可以使用通用的
    OLE DB 和 ODBC 数据源。


    现在您已经拥有一个共享数据源。请注意，其名称默认为 `DataSource1`。您可以通过右键单击它，选择 `重命名`，并输入 `Pro_SSRS.rds`
    作为新名称来对其进行重命名。良好的做法是为每个数据源赋予一个有意义的名称，例如它将连接到的数据库的名称。在实际环境中，您将在不同的服务器上部署报表和/或数据库，因此不建议在数据源名称前加上包含数据库的服务器名称。换句话说，不建议将您的数据源命名为
    `DEV_Pro_SSRS` 来表示开发数据源，您也不会想将数据源命名为类似 `Server1_Pro_SSRS` 的名称。


    在实践中，我们使用相同的名称开发了所有报表。但是，由于我们的每个在线客户都有一个唯一标识他们的数据库名称，我们设计了一个应用程序，在发布后重置数据源中的数据库属性。这样，我们就可以对相同的数据库架构使用相同的报表，但可以将它们部署到同一报表服务器上的多个客户。


    在此示例中，您创建的数据源文件具有 `.rds` 扩展名，并与报表分开存储和发布。您可以在文本编辑器中打开 `.rds` 文件，因为它是一个 XML 文件，定义了您刚刚以图形方式创建的连接属性。清单
    3-1 显示了 `Pro_SSRS.rds` 文件。


    `清单 3-1. Pro_SSRS.rds 文件`


    ```

    <?xml version="1.0" encoding="utf-8"?>

    <RptDataSource xmlns:xsi=http://www.w3.org/2001/XMLSchema-instance >

    <Name>Pro_SSRS</Name>

    <ConnectionProperties>

    <Extension>SQL</Extension>

    <ConnectString>Data Source=localhost;Initial Catalog=Pro_SSRS </ConnectString>

    <IntegratedSecurity>true</IntegratedSecurity>

    </ConnectionProperties>

    <DataSourceID >99401d15-cd9b-489a-b3ee-e027de26a4e0 </DataSourceID> </RptDataSource>

    ```

