    # 安全管理


    SSRS 2012 不允许管理员通过基于 Web 的 `报表管理器` 来编辑角色可用的任务或添加新角色。这项工作被归于 `SSMS 2012` 界面。打开
    `SSMS`，通过点击 `连接` 按钮并选择 `Reporting Services` 来连接到 `Reporting Services` 实例。该对话框看起来与常规连接屏幕类似，但服务器类型将是
    `Reporting Services`。输入 `SSRS` 服务器的名称并点击 `连接` 以查看可用选项。图 11-11 显示了连接屏幕。


    连接后，你将发现该实例下列出了三个部分。我们这里关注的是第二个部分，`安全性`。展开 `安全性` 节点会显示两个子节点：`角色` 和 `系统角色`。`角色`
    部分用于管理报表级别的用户访问。此部分处理需要查看、浏览和创建报表的常规用户。第二部分，`系统角色`，用于管理系统整体任务的权限。我们这里将重点关注 `角色`
    部分。


    ![Image](img/9781430238102_Fig11-11.jpg)

    `图 11-11.` 通过 `SSMS` 连接到 `SSRS`


    展开 `角色` 节点可以看到我们之前讨论过的五个默认角色。要查看角色的属性，请右键点击浏览器并选择 `属性`。你将看到该角色的描述，以及该角色可以执行的每项任务。图
    11-12 向你展示了其外观。从这个窗口，你可以编辑描述或编辑该角色可以执行哪些任务。你现在不想更改 `报表生成器` 角色的任务，所以可以四处查看以感受安全更改有哪些选项，但请点击
    `取消` 来丢弃你可能已做的任何更改。


    ![Image](img/9781430238102_Fig11-12.jpg)

    `图 11-12.` 查看 `报表生成器` 角色的任务权限


    在 `SSRS` 中，你还可以添加新角色或编辑服务器的任何现有角色。如果你需要为需要略微高于标准 `SSRS` 角色权限的用户创建一个新的自定义角色，这很重要。该界面与角色编辑窗口相同，可以通过右键点击
    `角色` 节点并选择 `新建角色` 来访问。


    ## 测试 SSRS 角色分配


    在本节中，我们将完成添加文件夹和报表对象的过程，这些操作将与护士 `jyoungblood` 将会使用的操作保持一致。你需要确保她无法导航到其他文件夹并运行可能包含机密信息的其他报表。


    测试 `jyoungblood` 访问为其安全组 `RN` 定义的报表的第一步，是将报表发布到 `SSRS` 服务器上的一个文件夹中，该文件夹将包含注册护士的报表。作为测试的管理员，打开
    `报表管理器`，并创建两个新文件夹：一个在根文件夹中名为 `临床报表`，然后在 `临床报表` 文件夹内创建一个名为 `注册护士` 的文件夹。为此，只需在 `报表管理器`
    中点击 `新建文件夹`。由于这两个文件夹默认都从父文件夹继承权限，而父文件夹当前配置为仅管理员访问，因此你需要手动更改权限，以便新文件夹（以及你将添加到其中的报表和数据源）保持其自己的安全设置。


    要将报表发布到 `注册护士` 文件夹，你可以使用前面部署章节中涵盖的任何方法，但为了本次测试，只需上传一个你已经使用过的报表：`每日日程表`。然后创建一个名为
    `RN_DS` 的数据源用于测试安全目的。从 `Pro_SSRS` 项目中的 `报表管理器` 上传报表文件 `每日日程表.rdl`。在 `报表管理器` 的
    `注册护士` 文件夹中，只需点击 `上传文件`，浏览到 `每日活动.rdl`，然后点击 `确定`。要使用 `报表管理器` 手动创建数据源，只需在 `注册护士`
    文件夹中点击 `新建数据源`，将数据源命名为 `RN_DS`，并将连接字符串设置为以下内容（如有必要，将 `localhost` 替换为你创建了 `Pro_SSRS`
    数据库的 `SQL Server` 服务器名称）：


    ```

    Data Source=localhost;Initial Catalog=Pro_SSRS

    ```


    在这种情况下，你将选择将数据源身份验证方法设置为 `安全存储在报表服务器中的凭据`，并提供一个用户名和密码，用于访问 `Pro_SSRS` 数据库中的数据。假设
    `jyoungblood` 的 `Windows` 账户已被授予访问数据源数据库的权限，你本可以选择 `Windows 集成安全性` 选项，将 `Windows`
    账户传递到 `SQL Server` 数据库。你知道你将配置报表以筛选出仅与临床医生 `jyoungblood` 相关的数据，因此无需过于担心存储的凭据。如果你还没有一个对
    `Pro_SSRS` 数据库具有权限的 `SQL Server` 登录名，请继续创建一个名为 `myreportuser` 的登录名，并授予其对数据库的 `db_datareader`
    权限。你可以在 图 11-13 中看到设置此新数据源的完成屏幕。


    ![Image](img/9781430238102_Fig11-13.jpg)

    `图 11-13.` 设置 `RN_DS` 数据源


    图 11-14 显示了你将执行的初始测试的文件夹结构和报表对象设置。此时，你尚未向 `Windows` 账户 `jyoungblood` 或其所属的安全组
    `RN` 授予 `SSRS` 角色分配。`每日活动` 报表向临床医生提供其每日活动列表。在数据驱动订阅中，报表可以在处理后邮寄给临床医生，员工的 ID 参数用于为每个个体创建具有唯一数据的报表。然而，在现在的测试中，你希望允许从
    `报表管理器` 手动运行访问相同的报表。这带来了一系列自身的问题，我们将在你逐步完成此过程时进行介绍。


    ![Image](img/9781430238102_Fig11-14.jpg)

    `图 11-14.` 注册护士测试的报表对象

