  trans: '# 清单 7-2 展示了如何在文本框的`Color`属性中使用条件表达式，根据函数调用的返回值设置文本颜色。


    **清单 7-2.** 使用条件表达式


    ```vb

    =IIF(Code.ExceedMaxCost(Sum(Fields!Visit_Count.Value,

    "table1_Group1"),Sum(Fields!Estimated_Cost.Value, "table1_Group1")),"Red", "Black")

    ```


    `ExceedMaxCost`方法用于判断某种治疗类型在时间段内是否超过 10 个实例且每次就诊平均成本超过 45，如果满足则返回`True`，否则返回`False`。使用布尔返回值便于在格式化表达式中使用该方法，因为返回值可以直接测试，而无需与其他值进行比较。


    使用原生 SSRS 函数`IIF`，我们可以直接传递自定义的`ExceedMaxCost`并评估其返回值。`IIF`会评估第一个参数，当结果为`True`时返回第二个参数，为`False`时返回第三个参数。


    当某种治疗类型超过允许的最大平均成本时，`ExceedMaxCost`返回`True`，这会将文本框的`Color`属性值设置为`Red`，从而使报表中的文本显示为红色。如果未超过，则`ExceedMaxVisits`返回`False`，`Color`属性被设置为`Black`。


    ### 在报表中使用 `ExceedMaxCost` 函数


    现在我们将逐步指导如何将此表达式实际添加到报表中。首先，在报表中选择要应用表达式的字段。本例中，在报表设计模式下选择治疗名称文本框，如图 7-4 所示。


    ![Image](img/9781430238102_Fig07-04.jpg)


    **图 7-4.** 将表达式添加到报表中


    其次，选中文本框后，转到“属性”窗口，选择`Color`属性（见图 7-5）。如果“属性”窗口未显示，可以在 Visual Studio 中选择“视图” >
    “属性窗口”使其可见。


    ![Image](img/9781430238102_Fig07-05.jpg)


    **图 7-5.** 属性窗口中的 Color 属性


    接下来，点击下拉箭头，在显示的菜单中选择“表达式”（见图 7-6）。


    ![Image](img/9781430238102_Fig07-06.jpg)


    **图 7-6.** 颜色选择列表


    现在你将看到“编辑表达式”对话框，如图 7-7 所示。在此处输入来自清单 7-2 的表达式代码。你也可以直接键入表达式，或使用表达式编辑器将所需参数插入表达式中。


    ![Image](img/9781430238102_Fig07-07.jpg)


    **图 7-7.** 在表达式编辑器中输入表达式


    现在你可以运行报表，患者姓名将根据报表`Code`元素中的业务逻辑以红色或黑色显示。


    ![Image](img/square.jpg) **注意** 你会注意到，通过表达式编辑器查看时，`ExceedMaxCost`函数存在验证错误。这是正常现象，不会影响报表的构建或查看。


    既然你已修改报表以使用`ExceedMaxCost`函数，你可以预览报表以查看其实际效果。为此，选择“预览”选项卡，将`ServiceYear`参数设置为
    2010，同时保持所有其他参数为默认值。渲染报表后，你应该会看到一个类似图 7-8 的报表。


    ![Image](img/9781430238102_Fig07-08.jpg)


    **图 7-8.** 嵌入了代码的报表


    ### 从嵌入代码访问 .NET 程序集


    报表的`Code`元素主要设计用于.NET 框架和 VB .NET 语言语法的基本使用。默认情况下，`Code`元素不包含对许多框架命名空间的访问权限。在嵌入的自定义代码中引用许多标准的.NET
    程序集，需要你在报告中创建对每个程序集的引用。为此，转到“报表属性”对话框的“引用”选项卡，点击“添加”按钮后的省略号，然后选择你想要引用的相应.NET 程序集。请注意，默认情况下，这些引用的程序集将仅具有“执行”权限。


    尽管如上所述，你可以直接在报表的`Code`元素中使用其他.NET 框架程序集和第三方程序集，但强烈建议你考虑使用自定义程序集。主要考虑之一是安全性。默认情况下，`Code`元素仅以“执行”权限运行，这意味着它可以运行但无法访问受保护的资源。如果你需要执行某些受保护的操作，例如从文件中读取数据，你必须将名为`Report_Expressions_Default_Permissions`的代码组的安全策略设置为`FullTrust`。此代码组控制报表表达式宿主程序集的权限，该程序集是从报表中找到的所有表达式创建的，并作为已编译报表的一部分存储。要设置安全策略，你需要编辑报表服务器和报表设计器的策略配置文件。有关这些文件的标准位置，请参阅本章后面的“部署自定义程序集”部分。


    但是，不建议对安全策略进行此项更改。当你更改在`Code`元素中运行的代码的权限时，你同时也更改了在该报表服务器上运行的所有报表的权限。通过将权限更改为`FullTrust`，你允许报表中使用的所有表达式进行受保护的系统调用。这实质上会使任何能够向你的报表服务器上传报表的人获得对你系统的完全访问权限。


    如果你需要使用 VB .NET 语言语法之外的功能，需要额外的安全权限，有复杂的逻辑需要实现，需要使用更多的.NET 框架，或者希望在多个报表中使用相同的功能，那么你应该将代码移至自定义程序集中。然后你可以在报告中引用该程序集，并通过自定义类的属性和方法使用代码。自定义程序集不仅为你在代码本身提供了更大的灵活性，还允许你在更细粒度的级别上控制安全性。使用自定义程序集，你可以为该特定程序集添加权限集和代码组，而无需修改所有在`Code`元素中运行的代码的权限。


    你可能还需要使用自定义程序集的另一个原因。使用嵌入代码时，你无法利用完整的 Visual Studio IDE 来开发报告的`Code`部分，例如智能感知和调试等功能。在报表的`Code`部分编写代码与在记事本中工作差别不大。


    不过，你可以变通处理。如果你选择放入`Code`元素的代码不仅仅是几行简单语句，那么创建一个单独的项目来编写和测试代码可能会更容易。一个快速的 VB .NET
    Windows 窗体或控制台项目可以为你提供编写计划嵌入报表的代码的理想方式。你可以获得 IDE 的全部功能，一旦你的方法按预期工作，只需将它们粘贴到报表的代码窗口中即可。请记住使用
    VB .NET 项目，因为`Code`元素仅适用于用 VB .NET 编写的代码。'
- fmt: "### Using Custom Assemblies with Your Report\n\nCustom assemblies are harder\
    \ to implement but offer you greater flexibility than embedded code. The process\
    \ of creating them is a bit more involved because they are not part of the report’s\
    \ RDL and must be created outside the Report Designer. This also makes them more\
    \ difficult to deploy because, unlike the embedded code, which becomes a part\
    \ of the report’s RDL, the custom assembly is a separate file.\n\nHowever, your\
    \ hard work is repaid in many ways.\n\n*Code reuse*: You can reuse custom code\
    \ across multiple reports without needing to copy and paste code into each report.\
    \ This allows you to centralize all the custom logic into a single location, making\
    \ code maintenance much simpler.\n\n> *Task separation*: Using assemblies allows\
    \ you to more easily separate the tasks of writing a report from creating the\
    \ custom code. This is somewhat similar in concept to writing an ASP.NET application\
    \ using the code–behind feature. This allows ASP.NET developers to separate the\
    \ page markup, layout, and graphics from the code that will interact with it.\
    \ If you have several people involved, you can let those who specialize in report\
    \ writing handle the layout and creation of the report while others who may have\
    \ more coding skills write the custom code.\n>\n> *Language neutrality*: You can\
    \ use the .NET language of your choice. Choose from C#, VB, J#, or any third–party\
    \ language that is compatible with the .NET Framework.\n>\n> *Productive development\
    \ environment*: If you use Visual Studio 2010 to develop your custom assemblies,\
    \ you get the full power of its editing and debugging features.\n>\n> *Security\
    \ control*: You can exercise fine–grained control over what your assembly can\
    \ do using security policies.\n>\n> *Flexibility*: The assemblies that you create\
    \ are not limited to simple functions in the embedded code section of an RDL.\
    \ You have the ability to utilize the entire .NET library in your reports.\n\n\
    To use a custom assembly from within your report, you need to create a class library\
    \ to hold the code, add the methods and properties you want to use from the report\
    \ to your class, and then compile it into an assembly. To use it from within the\
    \ Report Designer, you can add a class library project to the solution in Visual\
    \ Studio, allowing you easy access to both the report and the code you will use\
    \ in it. Before you run the included examples, make sure to read the `ReadMe.htm`\
    \ file in the solution’s Solution Items folder to see whether any steps are required\
    \ before running the examples for your particular configuration.\n\n### Adding\
    \ a Class Library Project to Your Reporting Solution\n\nTo use a custom assembly\
    \ with your report, you will first need to write your custom code in the form\
    \ of a .NET class. You can do this by adding a class library project to your existing\
    \ solution so that you can work on the report and custom code at the same time.\n\
    \nFor this example, you want to display the amount an employee is paid for a visit\
    \ to a patient. The class will get this information from an XML file that is periodically\
    \ exported from the human resources (HR) system.\n\n![Image](images/square.jpg)\
    \ **Note** If possible, you would want to get this information directly from the\
    \ HR system, possibly through a web service. The sample code included with this\
    \ chapter includes a sample web service and a method to call it.\n\nUsing the\
    \ XML file `EmployeePay.xml` (supplied as part of the code download for this chapter)\
    \ in this example allows you not only to write a custom assembly, but also to\
    \ see the steps necessary to access a protected resource such as a local file.\
    \ To get the information from the XML file and make it available to your report,\
    \ create a class with a method that takes `EmployeeID` and a date as a parameter\
    \ and that will read the employee pay per visit rates from the XML file and then\
    \ return the pay rate. Although we will not cover it step by step in this chapter,\
    \ the sample code included also contains an example of doing the same thing using\
    \ a web service. This allows you to simulate being able to interact with the HR\
    \ system via a web service instead of an exported file.\n\nYou can then reference\
    \ the assembly that you have developed from an expression in the report and use\
    \ it to calculate the total visiting costs per patient.\n\nTo start, select File\
    \ ![Image](images/U001.jpg) Add ![Image](images/U001.jpg) New Project from the\
    \ menu. Pick Visual Basic Projects or Visual C# Projects, depending on your preference.\
    \ Select Class Library, and enter `Employee` for the name of the project. In this\
    \ example, we will show you how to use a Visual C# class library project, as shown\
    \ in [Figure 7-9](#Chapter07.html#fig_7_9).\n\n![Image](images/9781430238102_Fig07-09.jpg)\n\
    \n***Figure 7-9.** Add New Project dialog box*\n\nSelect the newly created `Class1.cs`\
    \ from the solution explorer, and rename it to something a bit more descriptive,\
    \ such as `Employee`, because you will use this class to calculate the cost of\
    \ a visit provided by the employees. Open the `Employee.cs` file in the Visual\
    \ Studio 2010 IDE, change the namespace from `Employee` to `Pro_SSRS`, and you\
    \ will see the code editor, as shown in [Figure 7-10](#Chapter07.html#fig_7_10)\n\
    \n![Image](images/9781430238102_Fig07-10.jpg)\n\n***Figure 7-10.** The Visual\
    \ Studio 2008 code editor*\n\nFor this example, you’ll add a few using statements\
    \ to import types defined in other namespaces. Specifically, you’ll add the `System.Data`\
    \ and `System.Security.Permissions` namespaces so you can reference the `DataSet`\
    \ and `SecurityAction` methods without typing in the full namespace in the `Employee`\
    \ assembly, as shown in [Listing 7-3](#Chapter07.html#list_7_3). You can also\
    \ drop the reference to `System.Linq` since we will not be utilizing that in this\
    \ class library.\n\n***Listing 7-3.** The Employee Assembly*\n\n```\nusing System;\n\
    using System.Collections.Generic;\nusing System.Text;\nusing System.Security.Permissions;\n\
    using System.Data;\n\nnamespace Pro_SSRS {\n        public class Employee {\n\
    \                   public Employee() { }\n```"
