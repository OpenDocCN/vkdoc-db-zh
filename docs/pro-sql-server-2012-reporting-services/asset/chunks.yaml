    in detail in the “Adding an Assembly Reference to a Report” section.


    To apply custom permissions, you must also assert the permission within your code.
    For example, if you want to add read–only access to the XML files `C:\Temp\EmployeePay.xsd`
    and `C:\Temp\EmployeePay.xml`, you must add code similar to that shown in [Listing
    7-7](#Chapter07.html#list_7_7) to your method.


    ***Listing 7-7.** Asserting Permission with Code*


    `// C#`

    `FileIOPermission permissionXSD = new`

    `    FileIOPermission(FileIOPermissionAccess.Read,`

    `    @" C:\Temp\EmployeePay.xml");`

    `    permissionXSD.Assert();`

    `    // Load the schema file`

    `    empDS.ReadXmlSchema(@"C:\Temp\EmployeePay.xsd");`


    `FileIOPermission permissionXML = new`

    `    FileIOPermission(FileIOPermissionAccess.Read, @"`

    `    C:\Temp\EmployeePay.xml");`

    `    permissionXML.Assert();`

    `    empDS.ReadXml(@"C:\Temp\EmployeePay.xml");`


    You can also add the assertion as a method attribute, as shown in [Listing 7-8](#Chapter07.html#list_7_8).
    This is the method shown in this chapter’s examples.


    ***Listing 7-8.** Asserting Permission with a Method Attribute*


    `[FileIOPermissionAttribute(SecurityAction.Assert,`

    `    Read=@" C:\Temp\EmployeePay.xsd")]`

    `[FileIOPermissionAttribute(SecurityAction.Assert,`

    `    Read=@" C:\Temp\EmployeePay.xml")]`


    ![Image](images/square.jpg) **Tip** For more information about code access security
    and reporting services, see “Understanding Code Access Security in Reporting Services”
    in the SSRS 2012 Books Online (BOL). For more information about security, see
    “.NET Framework Security” in the .NET Framework Developer’s Guide, available on
    the Microsoft Developer Network (MSDN) web site at [http://msdn.microsoft.com](http://msdn.microsoft.com).
    You will also want to read about using the Global Assembly Cache (GAC) to store
    your custom assembly.'
  trans: "\n## 处理代码访问安全与自定义程序集\n\n```xml\n<CodeGroup class=\"UnionCodeGroup\" version=\"\
    1\"\n         PermissionSetName=\"FullTrust\"\n         Name=\"EmployeePayCodeGroup\"\
    \n         Description=\"Employee Cost Per Visit\">\n         <IMembershipCondition\n\
    \                  class=\"UrlMembershipCondition\" version=\"1\"\n          \
    \        url=\"C:\\Program Files (x86)\\Microsoft Visual Studio 10.0\\Common7\\\
    IDE\\PrivateAssemblies\\Employee.dll\"/>\n  </CodeGroup>\n```\n\n![Image](img/square.jpg)\
    \ `Note` 如果你运行报表后，在文本框中看到的是 `#Error` 文字而非预期结果，这很可能是一个某种权限问题。\n\n因为通常来说，除非绝对必要，否则授予你的程序集\
    \ `FullTrust` 权限并不是一个好主意。你可以使用命名权限集，只为你的自定义程序集授予它所需的精确权限，而非 `FullTrust`。\n\n为了授予自定义程序集刚好足够的权限，以读取名为\
    \ `C:\\Temp\\ EmployeePay.xml` 和 `C:\\Temp\\EmployeePay.xsd` 的数据文件，你首先需要在策略配置文件\
    \ `rssrvpolicy.config` 中添加一个命名权限集，该权限集授予对这些文件的读取权限。这将被放置在配置文件的 `NamedPermissionSets`\
    \ 部分中。然后，你可以将特定的权限集应用于自定义程序集，如 清单 7-5 所示。\n\n### 清单 7-5. 用于读取文件的命名权限集\n\n```xml\n\
    <PermissionSet\n        class=\"NamedPermissionSet\"\n        version=\"1\"\n\
    \        Name=\"EmployeePayFilePermissionSet\"\n        Description=\"Permission\
    \ set that grants read access to my employee cost file.\">\n        <IPermission\n\
    \                class=\"FileIOPermission\"\n                version=\"1\"\n \
    \               Read=\"C:\\Temp\\EmployeePay.xml\" />\n        <IPermission\n\
    \                class=\"FileIOPermission\"\n                version=\"1\"\n \
    \               Read=\"C:\\Temp\\EmployeePay.xsd\" />\n        <IPermission\n\
    \                class=\"SecurityPermission\"\n                version=\"1\"\n\
    \                Flags=\"Execution, Assertion\" />\n</PermissionSet>\n```\n\n\
    接下来，如 清单 7-6 所示，你向策略配置文件 `rssrvpolicy.config` 的 `CodeGroup` 部分添加一个代码组，该代码组授予程序集额外的权限。如果你已经为程序集添加了\
    \ `FullTrust` 权限，你可以用这个 `CodeGroup` 来替换它，或者直接修改它以使用新创建的权限集名称。\n\n### 清单 7-6. 授予对\
    \ Employee 程序集的文件 I/O 权限\n\n```xml\n<CodeGroup\n        class=\"UnionCodeGroup\"\
    \n        version=\"1\"\n        PermissionSetName=\" EmployeePayFilePermissionSet\
    \ \"\n        Name=\"EmployeePayCodeGroup\"\n        Description=\"Employee Cost\
    \ Per Visit\">\n        <IMembershipCondition\n                class=\"UrlMembershipCondition\"\
    \n                version=\"1\"\n                Url=\"C:\\Program Files\\Microsoft\
    \ SQL Server\\MSRS11.MSSQLSERVER\\Reporting Services\\ReportServer\\binEmployee.dll\
    \ \"/>\n</CodeGroup>\n```\n\n![Image](img/square.jpg) `Note` 你添加到配置文件中的程序集名称必须与在\
    \ RDL 文件的 `CodeModules` 元素下添加的名称匹配。这是你在“从嵌入式代码访问 .NET 程序集”一节中介绍的、在报表属性 ![Image](img/U001.jpg)\
    \ 引用菜单下为自定义程序集设置的名称；该名称在“向报表添加程序集引用”一节中有详细讨论。\n\n要应用自定义权限，你还必须在你的代码中断言（Assert）该权限。例如，如果你想为\
    \ XML 文件 `C:\\Temp\\EmployeePay.xsd` 和 `C:\\Temp\\EmployeePay.xml` 添加只读访问权限，你必须向你的方法中添加类似\
    \ 清单 7-7 所示的代码。\n\n### 清单 7-7. 使用代码断言权限\n\n```csharp\n// C#\nFileIOPermission\
    \ permissionXSD = new\n    FileIOPermission(FileIOPermissionAccess.Read,\n   \
    \ @\" C:\\Temp\\EmployeePay.xml\");\n    permissionXSD.Assert();\n    // 加载架构文件\n\
    \    empDS.ReadXmlSchema(@\"C:\\Temp\\EmployeePay.xsd\");\n\nFileIOPermission\
    \ permissionXML = new\n    FileIOPermission(FileIOPermissionAccess.Read, @\"\n\
    \    C:\\Temp\\EmployeePay.xml\");\n    permissionXML.Assert();\n    empDS.ReadXml(@\"\
    C:\\Temp\\EmployeePay.xml\");\n```\n\n你也可以将断言添加为方法特性，如 清单 7-8 所示。这是本章示例中展示的方法。\n\
    \n### 清单 7-8. 使用方法特性断言权限\n\n```csharp\n[FileIOPermissionAttribute(SecurityAction.Assert,\n\
    \    Read=@\" C:\\Temp\\EmployeePay.xsd\")]\n[FileIOPermissionAttribute(SecurityAction.Assert,\n\
    \    Read=@\" C:\\Temp\\EmployeePay.xml\")]\n```\n\n![Image](img/square.jpg) `Tip`\
    \ 有关代码访问安全和报表服务的更多信息，请参阅 SSRS 2012 联机丛书 (BOL) 中的“理解报表服务中的代码访问安全”。有关安全的更多信息，请参阅\
    \ .NET Framework 开发人员指南中的“.NET Framework 安全”，该指南可在 Microsoft 开发人员网络 (MSDN) 网站\
    \ [`msdn.microsoft.com`](http://msdn.microsoft.com) 上获取。你还需要了解有关使用全局程序集缓存 (GAC)\
    \ 来存储自定义程序集的内容。\n"
- fmt: "#### Adding an Assembly Reference to a Report\n\nWith the EmployeeServiceCost-NoCode\
    \ report selected and on the Design tab, select Report ![Image](images/U003.jpg)\
    \ Report Properties from the top menu items; alternatively, right-click within\
    \ the report design area, and select Properties. Then do the following:\n\n> 1.\
    \  With the References section active, click the Add button in the assemblies\
    \ section.\n> 2.  Click the ellipsis button, and then click the Browse tab. Browse\
    \ to the location of the `Employee.dll` file and select it. If you have already\
    \ placed the built DLL in the private assemblies folder for Visual Studio, you\
    \ should do this now so you can reference that location. When you are done, the\
    \ Report Properties dialog box should look like [Figure 7-11](#Chapter07.html#fig_7_11).\n\
    \n![Image](images/9781430238102_Fig07-11.jpg)\n\n***Figure 7-11.** References\
    \ tab*\n\n![Image](images/square.jpg) **Note** The class list on the References\
    \ tab of the Report Properties dialog box is used only by instance-based members,\
    \ not static members.\n\nTo use the custom code in your assembly in a report expression,\
    \ you must call a member of a class within the assembly. You can do this in different\
    \ ways depending on how you declared the method.\n\nIf the method is defined as\
    \ static, it is available globally within the report. You access it in an expression\
    \ by the namespace, class, and method name. The following example calls the static\
    \ `CostPerVisit` method in the `Employee` class, which is in the `Pro_SSRS` namespace,\
    \ passing in an `EmployeeID` value and the visit date. The method will return\
    \ the cost per visit for the specified employee.\n\n`=Pro_SSRS.Employee.CostPerVisitXML(empID,\
    \ visitDate)`\n\nIf the custom assembly contains instance methods, you must add\
    \ the class and instance name information to the report references. You do not\
    \ need to add this information for static methods.\n\n#### Instance vs. Static\
    \ Methods\n\nStatic methods are methods that can be called from a class that do\
    \ not act on a specific instance of the class. This means that a new object does\
    \ not need to be instantiated for the method to be called and used. Instance methods\
    \ do require an object to be created so they can be used and will perform any\
    \ work they do in that specific object of that type of class, or instance, of\
    \ the class. Static methods are preferable here since we don’t need to do any\
    \ additional work in order to create a new object of that class type to begin\
    \ using the methods.\n\nInstance–based methods are available through the globally\
    \ defined `Code` member. You access these methods by referring to the `Code` member\
    \ and then the instance and method name. The following shows how you would call\
    \ the `CostPerVisitXML` method if it had been declared as an instance method instead\
    \ of a static method:\n\n`=Code.Employee.CostPerVisitXML(empID, visitDate)`\n\n\
    ![Image](images/square.jpg) **Tip** Use static methods whenever possible because\
    \ they offer higher performance than instance methods. However, be careful if\
    \ you use static fields and properties, because they expose their data to all\
    \ instances of the same report, making it possible that the data used by one user\
    \ running a report is exposed to another user running the same report.\n\nAfter\
    \ adding the reference to the Employee custom assembly, you will use it by calling\
    \ the `CostPerVisitXML` method as a part of an expression in the report. Highlight\
    \ the `Employee_Cost` textbox in the report, as shown in [Figure 7-12](#Chapter07.html#fig_7_12).\n\
    \n![Image](images/9781430238102_Fig07-12.jpg)\n\n***Figure 7-12.** Employee_Cost\
    \ textbox*\n\nRight-click, select Expression, and in the Edit Expression dialog\
    \ box enter the code shown in [Listing 7-9](#Chapter07.html#list_7_9).\n\n***Listing\
    \ 7-9.** Using the CostPerVisitXML Method in an Expression*\n\n```\n=Pro_SSRS.Employee.CostPerVisitXML(Fields!EmployeeID.Value,\n\
    Fields!ChargeServiceStartDate.Value)* sum(Fields!Visit_Count.Value)\n```\n\nNow\
    \ if you preview the report or build and deploy it, you should see a report similar\
    \ to [Figure 7-13](#Chapter07.html#fig_7_13). You can use any parameters you want\
    \ to generate an actual report. Once you do, expand both the service type and\
    \ patient name tree menu items to see the newly calculated cost estimate values.\n\
    \n![Image](images/9781430238102_Fig07-13.jpg)\n\n***Figure 7-13**. Final report*\n\
    \nIn the sample code for [Chapter 7](#Chapter07.html#ch7), we have also included\
    \ a web service that can be called from the custom code to access the employee\
    \ pay information. This simulates accessing information from another system via\
    \ a web service and is designed to allow you to replace the exported XML file\
    \ with a call to a web service. The `Employee` class included in the sample code\
    \ already contains a method called `CostPerVisitWS` that uses the web service\
    \ rather than the XML file as its source of data. You can make the report use\
    \ the web service instead of the XML file by simply changing the expression from\
    \ this:\n\n`=Pro_SSRS.Employee.CostPerVisitXML(Fields!EmployeeID.Value, Fields!ChargeServiceStartDate.Value)*\
    \ sum(Fields!Visit_Count.Value)`\n\nto the following:\n\n`=Pro_SSRS.Employee.CostPerVisitWS(Fields!EmployeeID.Value,\
    \ Fields!ChargeServiceStartDate.Value)* sum(Fields!Visit_Count.Value)`\n\nTo try\
    \ this, just open the sample solution for this chapter, and edit the expression\
    \ in the `Employee_Cost` field in the `EmployeeServiceCost.rdl` file. To try the\
    \ Employee Web Service, you also must make sure the Web service is running when\
    \ you debug the report in Visual Studio or that it is published and running on\
    \ your test machine if you have the report deployed to the server. Let’s go through\
    \ the code in our `Employee` class that calls the web service and show how the\
    \ process works in our report.\n\nOpen the EmployeeServiceCost report in design\
    \ mode and go down to the employee estimated cost column in your table. Let’s\
    \ edit the expression using the previous example we provided for use with the\
    \ web service. Once you edit the expression to use the web service call, it should\
    \ look like [Figure 7-14](#Chapter07.html#fig_7_14).\n\n![Image](images/9781430238102_UnFig07-01.jpg)\n\
    \nWe are not using a separate method that is contained in our `Employee` class,\
    \ which would use a web service to pull the data we want rather than use an XML\
    \ file. Let’s take a look at this method from `Employee.cs` in our `Employee`\
    \ class project. You will see in [Listing 7-10](#Chapter07.html#list_7_10) that\
    \ it is a just a simple call to the web service that we have built and is included\
    \ in our project. We provide the web service the `employeeID` and visit date,\
    \ just like we did when we pulled the information from XML, but this time the\
    \ data is provided directly from the web service, which we will look at in just\
    \ a bit.\n\n***Listing 7-10:** Getting Cost Values Through a Web Service*\n\n\
    ```\npublic static decimal CostPerVisitWS(string employeeID, DateTime visitDate)\n\
    {\n        EmployeeWS.Employee empWS = new EmployeeWS.Employee();\n        Decimal\
    \ empAmt;\n        empAmt = empWS.GetCost(employeeID, visitDate);\n        return\
    \ empAmt;\n}\n```\n\nWe will do much more with web services in [Chapters 8](#Chapter08.html#ch8)\
    \ and [9](#Chapter09.html#ch9) if you are not yet familiar with them. It looks\
    \ to be a much easier process than when we parsed through the XML file, but the\
    \ bulk of the work is actually being done on the web service that has been provided\
    \ in the solution."
  raw: '#### Adding an Assembly Reference to a Report


    With the EmployeeServiceCost-NoCode report selected and on the Design tab, select
    Report ![Image](images/U003.jpg) Report Properties from the top menu items; alternatively,
    right-click within the report design area, and select Properties. Then do the
    following:


    > 1.  With the References section active, click the Add button in the assemblies
    section.

    > 2.  Click the ellipsis button, and then click the Browse tab. Browse to the
    location of the Employee.dll file and select it. If you have already placed the
    built DLL in the private assemblies folder for Visual Studio, you should do this
    now so you can reference that location. When you are done, the Report Properties
    dialog box should look like [Figure 7-11](#Chapter07.html#fig_7_11).


    ![Image](images/9781430238102_Fig07-11.jpg)


    ***Figure 7-11.** References tab*


    ![Image](images/square.jpg) **Note** The class list on the References tab of the
    Report Properties dialog box is used only by instance-based members, not static
    members.


    To use the custom code in your assembly in a report expression, you must call
    a member of a class within the assembly. You can do this in different ways depending
    on how you declared the method.


    If the method is defined as static, it is available globally within the report.
    You access it in an expression by the namespace, class, and method name. The following
    example calls the static `CostPerVisit` method in the `Employee` class, which
    is in the `Pro_SSRS` namespace, passing in an `EmployeeID` value and the visit
    date. The method will return the cost per visit for the specified employee.


    `=Pro_SSRS.Employee.CostPerVisitXML(empID, visitDate)`


    If the custom assembly contains instance methods, you must add the class and instance
    name information to the report references. You do not need to add this information
    for static methods.


    Instance vs. Static Methods


    Static methods are methods that can be called from a class that do not act on
    a specific instance of the class. This means that a new object does not need to
    be instantiated for the method to be called and used. Instance methods do require
    an object to be created so they can be used and will perform any work they do
    in that specific object of that type of class, or instance, of the class. Static
    methods are preferable here since we don’t need to do any additional work in order
    to create a new object of that class type to begin using the methods.


    Instance–based methods are available through the globally defined Code member.
    You access these methods by referring to the Code member and then the instance
    and method name. The following shows how you would call the CostPerVisitXML method
    if it had been declared as an instance method instead of a static method:


    `=Code.Employee.CostPerVisitXML(empID, visitDate)`


    ![Image](images/square.jpg) **Tip** Use static methods whenever possible because
    they offer higher performance than instance methods. However, be careful if you
    use static fields and properties, because they expose their data to all instances
    of the same report, making it possible that the data used by one user running
    a report is exposed to another user running the same report.


    After adding the reference to the Employee custom assembly, you will use it by
    calling the CostPerVisitXML method as a part of an expression in the report. Highlight
    the Employee_Cost textbox in the report, as shown in [Figure 7-12](#Chapter07.html#fig_7_12).


    ![Image](images/9781430238102_Fig07-12.jpg)


    ***Figure 7-12.** Employee_Cost textbox*


    Right-click, select Expression, and in the Edit Expression dialog box enter the
    code shown in [Listing 7-9](#Chapter07.html#list_7_9).


    ***Listing 7-9.** Using the CostPerVisitXML Method in an Expression*


    `=Pro_SSRS.Employee.CostPerVisitXML(Fields!EmployeeID.Value,`

    `Fields!ChargeServiceStartDate.Value)* sum(Fields!Visit_Count.Value)`


    Now if you preview the report or build and deploy it, you should see a report
    similar to [Figure 7-13](#Chapter07.html#fig_7_13). You can use any parameters
    you want to generate an actual report. Once you do, expand both the service type
    and patient name tree menu items to see the newly calculated cost estimate values.


    ![Image](images/9781430238102_Fig07-13.jpg)


    ***Figure 7-13**. Final report*


    In the sample code for [Chapter 7](#Chapter07.html#ch7), we have also included
    a web service that can be called from the custom code to access the employee pay
    information. This simulates accessing information from another system via a web
    service and is designed to allow you to replace the exported XML file with a call
    to a web service. The Employee class included in the sample code already contains
    a method called CostPerVisitWS that uses the web service rather than the XML file
    as its source of data. You can make the report use the web service instead of
    the XML file by simply changing the expression from this:


    `=Pro_SSRS.Employee.CostPerVisitXML(Fields!EmployeeID.Value,`

    `Fields!ChargeServiceStartDate.Value)* sum(Fields!Visit_Count.Value)`


    to the following:


    `=Pro_SSRS.Employee.CostPerVisitWS(Fields!EmployeeID.Value,`

    `Fields!ChargeServiceStartDate.Value)* sum(Fields!Visit_Count.Value)`


    To try this, just open the sample solution for this chapter, and edit the expression
    in the `Employee_Cost` field in the `EmployeeServiceCost.rdl` file. To try the
    Employee Web Service, you also must make sure the Web service is running when
    you debug the report in Visual Studio or that it is published and running on your
    test machine if you have the report deployed to the server. Let’s go through the
    code in our `Employee` class that calls the web service and show how the process
    works in our report.


    Open the EmployeeServiceCost report in design mode and go down to the employee
    estimated cost column in your table. Let’s edit the expression using the previous
    example we provided for use with the web service. Once you edit the expression
    to use the web service call, it should look like [Figure 7-14](#Chapter07.html#fig_7_14).


    ![Image](images/9781430238102_UnFig07-01.jpg)


    We are not using a separate method that is contained in our `Employee` class,
    which would use a web service to pull the data we want rather than use an XML
    file. Let’s take a look at this method from `Employee.cs` in our `Employee` class
    project. You will see in [Listing 7-10](#Chapter07.html#list_7_10) that it is
    a just a simple call to the web service that we have built and is included in
    our project. We provide the web service the `employeeID` and visit date, just
    like we did when we pulled the information from XML, but this time the data is
    provided directly from the web service, which we will look at in just a bit.


    ***Listing 7-10:** Getting Cost Values Through a Web Service*


    `public static decimal CostPerVisitWS(string employeeID, DateTime visitDate)`

    `{`

    `        EmployeeWS.Employee empWS = new EmployeeWS.Employee();`

    `        Decimal empAmt;`

    `        empAmt = empWS.GetCost(employeeID, visitDate);`

    `        return empAmt;`

    `}`


    We will do much more with web services in [Chapters 8](#Chapter08.html#ch8) and
    [9](#Chapter09.html#ch9) if you are not yet familiar with them. It looks to be
    a much easier process than when we parsed through the XML file, but the bulk of
    the work is actually being done on the web service that has been provided in the
    solution.'
  trans: "\n#### 向报表添加程序集引用\n\n选中 EmployeeServiceCost-NoCode 报表并切换到“设计”选项卡后，从顶部菜单项中选择“报表”\
    \ ![Image](img/U003.jpg) “报表属性”；或者，在报表设计区域内右键单击，然后选择“属性”。接着执行以下操作：\n\n> 1.  在“引用”部分处于活动状态时，单击“程序集”部分中的“添加”按钮。\n\
    > 2.  单击省略号按钮，然后单击“浏览”选项卡。浏览到 `Employee.dll` 文件所在位置并选中它。如果您已将生成的 DLL 文件放置到 Visual\
    \ Studio 的私有程序集文件夹中，您现在应该这样做，以便引用该位置。操作完成后，“报表属性”对话框应类似于图 7-11。\n\n![Image](img/9781430238102_Fig07-11.jpg)\n\
    \n***图 7-11.** 引用选项卡*\n\n![Image](img/square.jpg) **注意** 报表属性对话框“引用”选项卡上的类列表仅由基于实例的成员使用，而非静态成员。\n\
    \n要在报表表达式中使用程序集中的自定义代码，您必须调用程序集中某个类的成员。根据您声明方法的方式，可以通过不同的方式实现这一点。\n\n如果方法被定义为静态的，它将在报表中全局可用。您可以通过命名空间、类和方法名称在表达式中访问它。以下示例调用了\
    \ `Pro_SSRS` 命名空间中 `Employee` 类的静态方法 `CostPerVisit`，并传入一个 `EmployeeID` 值和访问日期。该方法将返回指定员工的每次访问成本。\n\
    \n`=Pro_SSRS.Employee.CostPerVisitXML(empID, visitDate)`\n\n如果自定义程序集包含实例方法，您必须将类和实例名称信息添加到报表引用中。对于静态方法，则无需添加此信息。\n\
    \n#### 实例方法与静态方法\n\n静态方法是可以从类调用但不对类的特定实例进行操作的方法。这意味着调用和使用该方法时，不需要实例化新对象。实例方法则确实需要创建一个对象才能使用，并且将在该特定类的对象（或类的实例）中执行其所有工作。静态方法在这里更可取，因为我们无需执行任何额外工作来创建该类类型的新对象即可开始使用这些方法。\n\
    \n基于实例的方法通过全局定义的 `Code` 成员提供。您通过引用 `Code` 成员，然后引用实例和方法名称来访问这些方法。以下展示了如何调用 `CostPerVisitXML`\
    \ 方法（如果它被声明为实例方法而非静态方法）：\n\n`=Code.Employee.CostPerVisitXML(empID, visitDate)`\n\
    \n![Image](img/square.jpg) **提示** 尽可能使用静态方法，因为它们比实例方法提供更高的性能。但是，如果使用静态字段和属性时要小心，因为它们会将数据暴露给同一报表的所有实例，这可能导致一个用户运行报表时使用的数据被另一个运行相同报表的用户看到。\n\
    \n在添加了对 Employee 自定义程序集的引用后，您将通过在报表表达式中调用 `CostPerVisitXML` 方法来使用它。在报表中选中 `Employee_Cost`\
    \ 文本框，如图 7-12 所示。\n\n![Image](img/9781430238102_Fig07-12.jpg)\n\n***图 7-12.**\
    \ Employee_Cost 文本框*\n\n右键单击，选择“表达式”，然后在“编辑表达式”对话框中输入清单 7-9 中所示的代码。\n\n***清单 7-9.**\
    \ 在表达式中使用 CostPerVisitXML 方法*\n\n```\n=Pro_SSRS.Employee.CostPerVisitXML(Fields!EmployeeID.Value,\n\
    Fields!ChargeServiceStartDate.Value)* sum(Fields!Visit_Count.Value)\n```\n\n现在，如果您预览报表或生成并部署它，您应该会看到类似于图\
    \ 7-13 的报表。您可以使用任何所需的参数来生成实际的报表。生成后，展开服务类型和患者名称树菜单项以查看新计算的成本估算值。\n\n![Image](img/9781430238102_Fig07-13.jpg)\n\
    \n***图 7-13**. 最终报表*\n\n在第 7 章的示例代码中，我们还包含了一个可以从自定义代码调用以访问员工薪酬信息的 Web 服务。这模拟了通过\
    \ Web 服务访问来自另一个系统的信息，旨在允许您将导出的 XML 文件替换为对 Web 服务的调用。示例代码中包含的 `Employee` 类已经包含一个名为\
    \ `CostPerVisitWS` 的方法，该方法使用 Web 服务而非 XML 文件作为其数据源。您只需将表达式从以下形式：\n\n`=Pro_SSRS.Employee.CostPerVisitXML(Fields!EmployeeID.Value,\
    \ Fields!ChargeServiceStartDate.Value)* sum(Fields!Visit_Count.Value)`\n\n更改为以下形式：\n\
    \n`=Pro_SSRS.Employee.CostPerVisitWS(Fields!EmployeeID.Value, Fields!ChargeServiceStartDate.Value)*\
    \ sum(Fields!Visit_Count.Value)`\n\n即可让报表使用 Web 服务代替 XML 文件。\n\n要尝试此操作，只需打开本章的示例解决方案，并编辑\
    \ `EmployeeServiceCost.rdl` 文件中 `Employee_Cost` 字段的表达式。要尝试 Employee Web 服务，您还必须确保在\
    \ Visual Studio 中调试报表时 Web 服务正在运行，或者如果您已将报表部署到服务器，则 Web 服务已发布并在测试机器上运行。让我们浏览一下\
    \ `Employee` 类中调用 Web 服务的代码，并展示该过程在我们报表中的工作方式。\n\n在设计模式下打开 EmployeeServiceCost\
    \ 报表，转到表中的员工估算成本列。让我们使用前面为 Web 服务提供的示例来编辑表达式。将表达式编辑为使用 Web 服务调用后，它应类似于图 7-14。\n\
    \n![Image](img/square.jpg) **注意** 我们并未使用 `Employee` 类中包含的一个独立方法，该方法本可以使用 Web 服务来提取我们想要的数据，而不是使用\
    \ XML 文件。让我们从 `Employee` 类项目的 `Employee.cs` 中看看这个方法。您将在清单 7-10 中看到，它只是对我们项目中已构建并包含的\
    \ Web 服务进行的一次简单调用。我们向 Web 服务提供 `employeeID` 和访问日期，就像我们从 XML 提取信息时一样，但这次数据直接由 Web\
    \ 服务提供，我们稍后会查看它。\n\n***清单 7-10:** 通过 Web 服务获取成本值*\n\n```\npublic static decimal\
    \ CostPerVisitWS(string employeeID, DateTime visitDate)\n{\n        EmployeeWS.Employee\
    \ empWS = new EmployeeWS.Employee();\n        Decimal empAmt;\n        empAmt\
    \ = empWS.GetCost(employeeID, visitDate);\n        return empAmt;\n}\n```\n\n\
    如果您还不熟悉 Web 服务，我们将在第 8 章和第 9 章中进行更多相关操作。这看起来比我们解析 XML 文件的过程要简单得多，但大部分工作实际上是在解决方案中提供的\
    \ Web 服务上完成的。\n"
- fmt: "Since the web service, in the solution provided, is already set up to have\
    \ a dependency on the web service we don’t need to bother with those to test our\
    \ new data call. Go ahead and start the debug process, making sure that the reports\
    \ project is still set up as the startup project in the solution. You can set\
    \ the parameter of ServiceYear to be 2010 and view the report. Once you drill\
    \ down into a patient, you will notice that the report processes and refreshes\
    \ the data. This time the data is being pulled through the web service, which\
    \ gets the data from the database instead of from an XML file. We have also included\
    \ a sample test application that allows you to call the `CostPerVisitXML` and\
    \ `CostPerVisitWS` methods of the `Employee` class using a Windows Forms application.\
    \ This allows you to exercise the class and step through the code in the Windows\
    \ Forms environment, which is easier to test and debug.\n\n![Image](images/square.jpg)\
    \ **Tip** Writing a test application is a great way to make sure your custom code\
    \ is properly performing the expected functions prior to using the code within\
    \ your SSRS 2012 report. Not only can you create a custom Windows Forms application\
    \ as we did, but with the proper version of Visual Studio 2010, you can create\
    \ specialized test code and automated test routines.\n\n### Debugging Custom Assemblies\n\
    \nFor ease of debugging, the recommended way to design, develop, and test custom\
    \ assemblies is to create a solution that contains both your test reports and\
    \ your custom assembly. This will allow you easy access to both the report and\
    \ the code you will use in it at the same time from within Visual Studio.\n\n\
    We’ll now show you how to set up Visual Studio to allow you to debug the `Employee`\
    \ assembly you have just written:\n\n> 1.  In the Solution Explorer, right-click\
    \ the solution, and select Configuration Manager. This will allow you to set the\
    \ build and deploy options for debugging.\n> 2.  Select Debug as the Active Solution\
    \ Configuration option. Click Close to finalize this option choice.\n> 3.  Right-click\
    \ the project containing your reports from the solution manager and select Set\
    \ as StartUp Project to make sure this project runs first in your solution when\
    \ you start to debug.\n> 4.  Right-click the project containing your reports from\
    \ the solution explorer again, and select Project Dependencies.\n> 5.  In the\
    \ Project Dependencies dialog box, select the Employee project as the dependent\
    \ project, as shown in [Figure 7-14](#Chapter07.html#fig_7_14). This will tell\
    \ Visual Studio that your report depends on the custom assembly you have written.\n\
    >     \n>     ![Image](images/9781430238102_Fig07-14.jpg)\n>     \n>     ***Figure\
    \ 7-14.** Project Dependencies dialog box*\n>     \n>     \n> 6.  Click OK to\
    \ save the changes, and close the Project Dependencies dialog box.\n> 7.  Right-click\
    \ the Reports project again, and select Properties.\n> 8.  Select StartItem, and\
    \ set it to the report you want to debug. In this case, select the report we have\
    \ set up to use the custom assembly. The StartItem option tells Visual Studio\
    \ specifically which report to run when you run with debugging. Click OK to finalize\
    \ this choice.\n> 9.  In the Solution Explorer, select the Employee custom assembly\
    \ project.\n> 10.  Right-click this project and select Properties.\n> 11.  Select\
    \ the Build section from the left side menu.\n> 12.  On the Build page, enter\
    \ the path to the Report Designer folder in the Output Path textbox. (By default,\
    \ this path is `C:\\Program Files (x86)\\Microsoft Visual Studio 10.0\\Common7\\\
    IDE\\PrivateAssemblies`.)\n>     \n>     ![Image](images/square.jpg) **Note**\
    \ You will need to have the necessary permissions in order to use this folder\
    \ for the output path. By default, members of the standard Users group won’t have\
    \ the necessary write/modify permissions on this folder. When you’re logged in\
    \ as a user with appropriate security permissions, such as the administrator,\
    \ make sure to set the permissions on the PrivateAssemblies folder to allow the\
    \ necessary access when you are logged in under a less privileged account. You\
    \ could leave the default output path, but changing it saves you some work. With\
    \ the default path, you’d have to build and then manually copy your custom assembly\
    \ in order for the Report Designer running within Visual Studio to find it and\
    \ run it.\n>     \n>     \n> 13.  Now set break points in your custom assembly\
    \ code. If you are not familiar with setting break points, simply open your `employee.cs`\
    \ file and click in the grey side panel to the left of the code. Set a break point\
    \ at the point where the method reads the XML data file as seen in [Figure 7-15](#Chapter07.html#fig_7_15).\n\
    > 14.  Make sure to set Report as the startup project, and then press F5 to start\
    \ the solution in debug mode. When the report uses the custom code in your expression,\
    \ the debugger will stop at any break points you have set when they are executed.\
    \ Now you can use all the powerful debugging features of Visual Studio to debug\
    \ your code.\n\n![Image](images/square.jpg) **Note** It is also possible to use\
    \ multiple copies of Visual Studio to debug your custom assembly. See the SSRS\
    \ 2012 BOL for details.\n\n![Image](images/9781430238102_Fig07-15.jpg)\n\n***Figure\
    \ 7-15.** Setting a break point in your custom assembly*\n\n### Troubleshooting\
    \ Your Project\n\nIf you modify a custom assembly and rebuild it, you must redeploy\
    \ it, because the Report Designer looks for it only in the Report Designer application\
    \ folder. If you followed our suggestion in the “Debugging Custom Assemblies”\
    \ section to change the output path, it should be in the correct location each\
    \ time you rebuild it while debugging. If not, you will need to follow the instructions\
    \ in the “Deploying a Custom Assembly” section to move it to the Report Designer\
    \ application folder. Remember, Visual Studio will not deploy your custom assembly\
    \ to your SSRS 2012 server machine; you must copy it manually. Finally, you may\
    \ want to keep the version of any custom assembly the same value, at least while\
    \ you are developing it. Every time you change the version of a custom assembly,\
    \ the reference to it must change on the References tab of the Report Properties\
    \ dialog box, as discussed earlier in this chapter. Once your reports are in production\
    \ where you want to keep track of version information, you can use the GAC, which\
    \ can hold multiple versions; this means you have to redeploy only those reports\
    \ that use the new features of the new version. If you want all the reports to\
    \ use the new version, you can set the binding redirect so that all requests for\
    \ the old assembly are sent to the new assembly. You would need to modify the\
    \ report server’s `Web.config` file and `Rsreportserver.config` file.\n\nIf you\
    \ are using a custom assembly and the output on your report shows #Error, you\
    \ likely have encountered a permissions issue. See the “Deploying a Custom Assembly”\
    \ section in this chapter for information on how to properly set up the permissions.\n\
    \n### Summary\n\nIn this chapter, you learned how to use custom code with your\
    \ reports, and we discussed some of the other programmatic aspects of dealing\
    \ with SSRS 2012\\. [Chapters 8](#Chapter08.html#ch8), [9](#Chapter09.html#ch9),\
    \ and [10](#Chapter10.html#ch10) will build on this as we show you how to write\
    \ custom applications to render reports, deploy them to the report server, and\
    \ schedule them to run using subscriptions.\n\n## C H A P T E R  8"
