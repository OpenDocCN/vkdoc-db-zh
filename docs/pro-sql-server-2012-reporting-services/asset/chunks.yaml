  trans: "\n### 在报告中使用嵌入式代码\n\n在报告中使用嵌入式代码是目前在报告中实现自定义 .NET 代码最简单的方式，这主要有两个原因。首先，您只需使用\
    \ BIDS 或 Visual Studio 中报表设计器的用户界面 (UI) 直接将代码添加到报表即可。其次，该代码会成为报告 RDL 文件的一个片段，使得部署非常简单，因为它是您报告的一部分，可以一步完成部署。\n\
    \n尽管嵌入式代码更易于使用，但有几点注意事项您需要考虑：\n\n> *嵌入式代码必须用 VB .NET 编写*。如果您是 C# 程序员或使用其他 .NET\
    \ 兼容语言作为主要开发语言，这可能会迫使您对除最简单函数之外的所有情况都使用自定义程序集。如果您正在开发复杂的代码，您很可能无论如何都会选择自定义程序集的方式，以便获得调试和源代码控制选项。\n\
    >\n> *所有方法都必须是实例化的*。这意味着这些方法将属于代码对象的一个实例化实例，您不能拥有静态成员。\n>\n> *仅支持基本操作*。这是因为，默认情况下，代码访问安全性会阻止您的嵌入式代码调用外部程序集和受保护的资源。您可以通过\
    \ SSRS 安全策略更改这一点，但这需要向报告表达式主机授予 `FullTrust`（完全信任），这将授予对 CLR 的完全访问权限，绝对不推荐这样做。如果您需要这些功能，请使用自定义程序集，以便您可以实施安全策略，仅授予每个程序集其所需的安全权限。您将在“部署自定义程序集”一节中了解自定义程序集以及如何为其设置安全。\n\
    \n在运行本章的示例之前，请确保阅读随示例代码提供的 `ReadMe.htm` 文件，该文件可从 www.apress.com 的 Source/Download\
    \ 页面下载。它位于本章示例根目录下的一个文件中。如果您在 Visual Studio 2010 中打开代码，它将在“解决方案项”文件夹下。它包含了运行示例所需的设置和配置步骤。\n\
    \n让我们通过向您已经创建的一个报告中添加一些嵌入式代码，来看看 SSRS 的这一功能是如何工作的。在本例中，从本章附带的示例“员工服务成本报告”开始。它是您在第\
    \ 6 章中创建的“员工服务成本报告”的一个略微修改版本。我们将向您展示如何使用嵌入式代码功能添加一个函数，该函数将确定您在给定时间段内是否超过了某种治疗类型的单次就诊成本上限。然后，您将使用该函数来确定报告中一个文本字段的颜色，以帮助引起对这些特定治疗类型的注意。\n\
    \n![Image](img/square.jpg) **注意** 在本章的示例中，我们将使用在第 6 章中创建的报告的一个略微修改版本，以便员工报告参数将包含一种治疗，该治疗有足够多的患者超过了最大就诊次数和平均成本。\n\
    \n### 使用 ExceedMaxCosts 函数\n\n清单 7-1 是您将添加到“员工服务成本报告”中的自定义代码的完整清单。这是一个简单的函数，名为\
    \ `ExceedMaxCost`，用于确定某种治疗类型在一段时间内是否超过了平均成本。这使您可以识别需要审查的案例，以确定为什么其服务成本如此之高。\n\n\
    **清单 7-1.** ExceedMaxCost 函数\n\n```\nFunction ExceedMaxCost(ByVal visitCount As\
    \ Integer, ByVal estCost As Integer) As Boolean\n    ' 我们的业务逻辑要求，只有当就诊次数大于 10\
    \ 时，\n    ' 我们才需要知道平均每次就诊成本是否超过某个值\n\n    If ( visitCount > 10)\n            If\
    \ (estCost/visitCount > 45)\n                    Return True\n            End\
    \ If\n    End If\n\n    Return False\n\nEnd Function\n```\n\n如果您想按照书中的代码进行操作，您需要创建一个新的\
    \ Visual Studio 2010 BI 项目，选择“Reporting Services”子类别和“Report Server Project”类型，如图\
    \ 7-1 所示。对于此示例，将解决方案命名为 `Chapter 7`，项目命名为 `Reports`。\n\n![Image](img/square.jpg)\
    \ **注意** 随着 SQL Server 2012 的发布，BIDS 现已直接集成到 Visual Studio 中。无论您是从 BIDS 还是从 Visual\
    \ Studio 创建此项目，最终的项目和解决方案都是相同的。\n\n![Image](img/9781430238102_Fig07-01.jpg)\n\n\
    **图 7-1.** 创建一个 Visual Studio BI 项目\n\n要将现有的 `EmployeeServiceCost-NoCode.rdl`\
    \ 文件添加到您的新项目中，请右键单击“Reports”文件夹，然后选择“添加”![Image](img/U001.jpg)“现有项”，如图 7-2 所示。或者，在“Reports”项目高亮显示时，从菜单中选择“添加现有项”。接下来，浏览到您安装\
    \ `Chapter 7` 示例的位置，从“Reports”文件夹中选择 `EmployeeServiceCost-NoCode.rdl`。您还需要通过添加一个现有项并选择与报告所在文件夹相同的\
    \ `Pro_SSRS.rds` 文件来添加共享数据源。\n\n![Image](img/9781430238102_Fig07-02.jpg)\n\n**图\
    \ 7-2.** 将 `EmployeeServiceCost-NoCode.rdl` 添加到您的项目中\n\n要将清单 7-1 中的代码添加到“员工服务成本报告”，首先通过在解决方案资源管理器中双击它或右键单击并选择“打开”来打开报告。接下来，在报表处于“设计”选项卡时，从\
    \ Visual Studio 的“报表”菜单中选择“报表属性”；或者，在报表设计区域内右键单击，然后选择“属性”。在“报表属性”对话框的“代码”选项卡上，将清单\
    \ 7-1 中的代码添加到“自定义代码”框中，如图 7-3 所示。\n\n![Image](img/9781430238102_Fig07-03.jpg)\n\
    \n**图 7-3.** 在自定义代码编辑器中输入嵌入式代码\n\n![Image](img/square.jpg) **注意** 您必须在嵌入式代码编辑器中将函数声明（第一行）作为单行输入，否则在尝试预览报告时会收到错误。在清单\
    \ 7-1 中它以换行显示，但在输入到嵌入式代码编辑器时不应有换行。\n\n现在您已经定义了自定义代码，您会想用它来高亮显示那些超过最大就诊次数的治疗类型。为此，您需要作为表达式的一部分来访问\
    \ `ExceedMaxCost` 方法。\n\n嵌入式代码中的方法通过一个全局定义的 `Code` 成员提供。当报告的 RDL 文件在发布时编译成 .NET\
    \ 程序集时，SSRS 会创建一个名为 `Code` 的类的全局成员，您可以在任何表达式中通过引用 `Code` 成员和方法名（如 `Code.ExceedMaxCost`）来访问它。\n"
- fmt: '# [Listing 7-2](#Chapter07.html#list_7_2) shows how to use a conditional expression
    in the Color property of a textbox to set the color of the text depending on the
    return value of the function call.


    **Listing 7-2.** Using a Conditional Expression


    ```vb

    =IIF(Code.ExceedMaxCost(Sum(Fields!Visit_Count.Value,

    "table1_Group1"),Sum(Fields!Estimated_Cost.Value, "table1_Group1")),"Red", "Black")

    ```


    The method `ExceedMaxCost` determines whether the type of treatment has had more
    than 10 instances in the time span and the average cost was more than 45 per visit,
    and returns `True` if so or `False` if not. Using a Boolean return value makes
    it easy to use the method in formatting expressions, because the return value
    can be tested directly instead of needing to be compared to another value.


    Using the `IIF` native SSRS function, we can pass the custom `ExceedMaxCost` directly
    and evaluate the return value. `IIF` evaluates the first parameter and will return
    the second parameter when `True` and the third when `False`.


    When a treatment type exceeds the maximum average cost allowed, `ExceedMaxCost`
    returns `True`, which sets the value of the textbox `Color` property to `Red`,
    which in turn will cause the report to display the text in red. If not, then `ExceedMaxVisits`
    returns `False`, and the `Color` property is set to `Black`.


    ### Using the `ExceedMaxCost` Function in a Report


    Now we’ll walk you through how to actually add this expression to the report.
    First, select the field in the report to which you want to apply the expression.
    In this case, select the treatment name textbox from the report in design mode,
    as shown in [Figure 7-4](#Chapter07.html#fig_7_4).


    ![Image](images/9781430238102_Fig07-04.jpg)


    **Figure 7-4.** Adding the expression to the report


    Second, with the textbox selected, go to the Properties window, and select the
    `Color` property (see [Figure 7-5](#Chapter07.html#fig_7_5)). If the Properties
    window is not being shown, you can select View > Properties Window to make it
    visible from within Visual Studio.


    ![Image](images/9781430238102_Fig07-05.jpg)


    **Figure 7-5.** Color property in the Properties window


    Next, click the down arrow, and from the displayed menu select Expression (see
    [Figure 7-6](#Chapter07.html#fig_7_6)).


    ![Image](images/9781430238102_Fig07-06.jpg)


    **Figure 7-6.** Color selection list


    Now you will see the Edit Expression dialog box, as shown in [Figure 7-7](#Chapter07.html#fig_7_7).
    Enter the expression using the expression code from [listing 7-2](#Chapter07.html#list_7_2)
    here. You can also just type in the expression, or you can use the expression
    editor to insert the parameters that you need into your expression.


    ![Image](images/9781430238102_Fig07-07.jpg)


    **Figure 7-7.** Entering an expression in the expression editor


    You can now run your report, and the patient name will be displayed in red or
    black according to the business logic in the `Code` element of the report.


    ![Image](images/square.jpg) **Note** You will notice that the `ExceedMaxCost`
    function has a validation error when viewed through the expression editor. This
    is normal and will not affect your report when building or viewing it.


    Now that you have modified the report to use the `ExceedMaxCost` function, you
    can preview the report to see it in action. To do this, select the Preview tab,
    and set the `ServiceYear` parameter to have a value of 2010 while leaving all
    other parameters with their default values. Once you render the report, you should
    now see one that looks similar to [Figure 7-8](#Chapter07.html#fig_7_8).


    ![Image](images/9781430238102_Fig07-08.jpg)


    **Figure 7-8.** Report with the embedded code


    ### Accessing .NET Assemblies from Embedded Code


    The `Code` element of the report was primarily designed for basic use of the .NET
    framework and VB .NET language syntax. Access to many of the framework namespaces
    is not included by default in the `Code` element. Referencing many of the standard
    .NET assemblies in your embedded custom code requires that you create a reference
    to each assembly in the report. To do this, go to the References tab of the Report
    Properties dialog box, click the ellipsis after pressing the Add button, and then
    select the appropriate .NET assembly you want to reference. Note that, by default,
    these referenced assemblies will have only Execution permission.


    Although it is possible to use other .NET framework assemblies and third–party
    assemblies directly within the `Code` element of the report, as just described,
    it is highly recommended that you consider using a custom assembly instead. One
    of the primary reasons for this is security. By default, the `Code` element runs
    with Execution permission only, which means that it can run but cannot access
    protected resources. If you need to perform certain protected operations, such
    as reading data from a file, you’ll have to set the security policy for the code
    group named `Report_Expressions_Default_Permissions` to `FullTrust`. This code
    group controls permissions for the report expression host assembly, which is an
    assembly that is created from all the expressions found within a report and is
    stored as part of the compiled report. To set the security policy, you need to
    edit the policy configuration files of the report server and the Report Designer.
    See the “Deploying a Custom Assembly” section later in this chapter for the standard
    location of these files.


    However, making this change to the security policy is not recommended. When you
    change the permissions for the code that runs in the `Code` element, you also
    change the permissions for all reports that run on that report server. By changing
    permissions to `FullTrust`, you enable all expressions used in reports to make
    protected system calls. This will essentially give anyone who can upload a report
    to your report server complete access to your system.


    If you need to use features outside the VB .NET language syntax, need additional
    security permissions, have complicated logic to implement, need to use more of
    the .NET framework, or want to use the same functionality within multiple reports,
    then you should move your code into a custom assembly. You can then reference
    that assembly in your report and use the code through methods and properties of
    your custom class. Not only does a custom assembly allow you a lot more flexibility
    in the code itself, it also allows you to control security at a much more granular
    level. With a custom assembly, you can add a permission set and code group for
    your custom code to that specific assembly only, without having to modify the
    permissions for all code that runs in the `Code` element.


    You’ll also want to use custom assemblies for another reason. With embedded code,
    you do not have the benefit of developing the `Code` section of your report using
    the full Visual Studio IDE with features such as IntelliSense and debugging at
    your disposal. Writing code in the `Code` section of your report is not much different
    from working in Notepad.


    However, you can work around this. If the code you choose to place in the `Code`
    element is more than just a few simple lines, it can be easier to create a separate
    project within your report solution to write and test your code. A quick VB .NET
    Windows Forms or console project can provide the ideal way to write the code you
    intend to embed in your report. You get the full features of the IDE, and once
    you have the methods working the way you want, you can just paste them into the
    code window of the report. Remember to use a VB .NET project, since the `Code`
    element works only with code written in VB .NET.'
