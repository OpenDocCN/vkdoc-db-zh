- fmt: "# 创建数据集\n\n你的下一步是前往“报表数据”区域以创建第一个数据集。无论你是否已在 BIDS 之外的应用程序中开发了查询或存储过程，或者你现在正从报表中开始创建，这都适用。在此示例中，你将使用一个已完成并测试过的存储过程，因此一半的战斗已经结束。\n\
    \n使用 BIDS 开发 SSRS 2008 R2 和 SSRS 2011 报表时，你通过两个步骤创建数据集：创建到数据源的链接和获取报表所需的数据。\n\n\
    > 1.  在“报表数据”框中，选择 `<新建数据集...>`，这将打开“数据集属性”对话框。每个数据集默认名称格式为 `DataSet##`，其中 `##`\
    \ 是序列中下一个未使用的数字。\n> 2.  你可以使用共享数据集，但在此示例中，你将使用嵌入在报表中的数据集。选择“使用嵌入在我报表中的数据集”选项。\n\
    > 3.  现在，在此数据集和我们之前创建的数据源之间建立链接。单击数据源下拉框旁边的“新建”按钮。\n> 4.  在“数据源属性”窗口中，将数据源命名为\
    \ `Pro_SSRS` 并选择 *使用共享数据源引用*。\n> 5.  单击下拉列表框，选择我们之前创建的 `Pro_SSRS` 共享数据源。\n> 6.\
    \  [图 3-8](#Chapter03.html#fig_3_8) 显示了这些设置的数据源属性窗口。单击“确定”保存你的设置。\n\n![Image](images/9781430238102_Fig03-08.jpg)\n\
    \n**图 3-8.** 数据源属性\n\n现在我们有了到共享数据源的链接，我们可以将数据集指向我们的存储过程。在“查询类型”部分，将默认的“文本”更改为“存储过程”。在“选择或输入存储过程名称”文本框中，输入你的存储过程名称\
    \ `Emp_Svc_Cost`，如[图 3-9](#Chapter03.html#fig_3_9)所示。最后，为新数据集输入 `Pro_SSRS_DS`\
    \ 作为名称，并单击“确定”完成数据集配置。\n\n![Image](images/9781430238102_Fig03-09.jpg)\n\n**图 3-9.**\
    \ 数据集属性\n\n当你单击“确定”时，“报表数据”窗口后台会发生几件事。在“数据源”文件夹下创建了一个名为 `Pro_SSRS` 的数据源，在“数据集”文件夹下创建了一个名为\
    \ `Pro_SSRS_DS` 的数据集。此数据集填充了存储过程中的可用字段。同时，BIDS 会创建存储过程接受的所有参数。此时你无法看到实际数据，但你可以右键单击数据集并选择“查询…”以调出默认的通用查询编辑器，你可以在其中执行存储过程。在执行时，系统会提示你输入存储过程定义的任何参数；你必须在返回数据之前提供参数值。对于此存储过程，定义了五个参数：`@ServiceYear`、`@ServiceMonth`、`@BranchID`、`@EmployeeTblID`\
    \ 和 `@ServicesLogCtgryID`。当在“报表数据”框中执行存储过程时，参数的可用默认值是 `NULL` 或 `空白`。与 `NULL` 值不同，`空白`\
    \ 值可以是空字符串。`NULL` 值表示该值未知，并且 `NULL` 值不能与非 `NULL` 值一起进行计算。在[第 2 章](#Chapter02.html)中，你已将逻辑构建到存储过程中以处理\
    \ `NULL` 参数值，以便当用户未提供值时，查询返回所有记录。如果用户选择了特定值，则仅返回与该参数值匹配的记录。使用 `NULL` 值执行存储过程，并确保你获得预期的结果。你可以在[图\
    \ 3-10](#Chapter03.html#fig_3_10)中看到存储过程执行的结果。\n\n![Image](images/9781430238102_Fig03-10.jpg)\n\
    \n**图 3-10.** 从存储过程返回的数据\n\n![Image](images/square.jpg) **注意** 当系统提示你输入参数值时，`空白`\
    \ 是默认值。为使存储过程执行时不出现数据类型错误，你必须选择 `NULL` 值。\n\n一个 SSRS 报表可以同时使用多个数据集。这扩展了报表的灵活性，因为你可以在单个报表中为用户提供更多数据。多个数据集对于填充参数下拉列表也很有用，你将在[第\
    \ 6 章](#Chapter06.html)中执行此操作。但是，拥有过多数据集可能会影响报表的性能，因此确保每个结果集的执行时间在可接受的范围内非常重要。\n\
    \n每个报表的 RDL 文件包含报表定义的每个数据集的一个部分。[清单 3-2](#Chapter03.html#list_3_2) 显示了你在本章定义的数据集的\
    \ RDL 示例。\n\n**清单 3-2.** RDL 的数据集部分\n\n```xml\n<DataSets>\n   <DataSet Name=\"\
    Pro_SSRS_DS\">\n<Fields>\n   <Field Name=\"PatID\">\n<DataField>PatID</DataField>\n\
    \        <rd:TypeName>System.Int32</rd:TypeName>\n   </Field>\n   <Field Name=\"\
    Patient_Name\">\n<DataField>Patient Name</DataField>\n<rd:TypeName>System.String</rd:TypeName>\n\
    \   </Field>\n   <Field Name=\"BranchName\">\n<DataField>BranchName</DataField>\n\
    <rd:TypeName>System.String</rd:TypeName>\n   </Field>\n   <Field Name=\"EmployeeID\"\
    >\n<DataField>EmployeeID</DataField>\n<rd:TypeName>System.String</rd:TypeName>\n\
    \   </Field>\n   <Field Name=\"Employee_Name\">\n<DataField>Employee Name</DataField>\n\
    <rd:TypeName>System.String</rd:TypeName>\n   </Field>\n   <Field Name=\"EmployeeClassID\"\
    >\n<DataField>EmployeeClassID</DataField>\n<rd:TypeName>System.String</rd:TypeName>\n\
    \   </Field>\n   <Field Name=\"Service_Type\">\n...\n```\n\n创建数据集时，有几个附加选项卡包含其他配置属性：\n\
    \n> *字段*：定义其他字段，例如计算字段或未随数据源自动定义的字段。你根据表达式派生计算字段。\n>\n> *选项*：设置特定于从数据提供程序检索数据时的若干选项，例如区分大小写和排序规则。\n\
    >\n> *参数*：定义数据集的查询参数值及其评估顺序。声明了参数的存储过程会在 SSRS 中自动生成查询参数。\n>\n> *筛选器*：定义数据集的筛选器值，可在执行报表时使用。"
  raw: "#### Creating a Dataset\n\nYour next step is to proceed to the Report Data\
    \ area to create your first dataset. This is true regardless of whether you’ve\
    \ developed a query or stored procedure in an application other than BIDS or whether\
    \ you’re beginning it now within the report. In this example, you are going to\
    \ use a stored procedure that is already complete and tested, so half the battle\
    \ is done.\n\nUsing BIDS to develop SSRS 2008 R2 and SSRS 2011 reports, you create\
    \ a dataset in two steps: creating a link to a data source and getting the data\
    \ for the report.\n\n> 1.  In the Report Data box, select `<New ~Dataset...>`,\
    \ which opens the Dataset Properties dialog box. Each dataset defaults to a name\
    \ of the form `DataSet##`, where `##` is the next unused number in sequence.\n\
    > 2.  You can use a shared dataset but in this example you will utilize a dataset\
    \ embedded in the report. Choose Use a dataset embedded in my report option.\n\
    > 3.  Now create a link between this dataset and the data source that we created\
    \ earlier. Click the New button next to the data source drop-down box.\n> 4. \
    \ In the Data Source Properties window, name the data source `Pro_SSRS` and choose\
    \ *Use shared data source reference*.\n> 5.  Click on the drop-down list box and\
    \ select the `Pro_SSRS` shared data source that we created earlier.\n> 6.  [Figure\
    \ 3-8](#Chapter03.html#fig_3_8) shows the Data Source Properties windows with\
    \ these settings. Click OK to save your settings.\n\n![Image](images/9781430238102_Fig03-08.jpg)\n\
    \n***Figure 3-8.** Data source properties*\n\nNow that we have a link to our shared\
    \ data source, we can point the dataset to our stored procedure. In the Query\
    \ Type section, change the default, Text, to Stored Procedure. In the Select or\
    \ enter stored procedure name textbox, input the name of your stored procedure,\
    \ `Emp_Svc_Cost`, as shown in [Figure 3-9](#Chapter03.html#fig_3_9). Finally,\
    \ enter `Pro_SSRS_DS` for the name of the new dataset and click OK to complete\
    \ the dataset configuration.\n\n![Image](images/9781430238102_Fig03-09.jpg)\n\n\
    ***Figure 3-9.** Dataset properties*\n\nWhen you click OK, a few things happen\
    \ behind the scenes in the Report Data window. A data source called `Pro_SSRS`\
    \ is created under the Data Sources folder and a dataset named `Pro_SSRS_DS` is\
    \ created under the Datasets folder. This dataset is populated with the available\
    \ fields from the stored procedure. At the same time, BIDS creates all of the\
    \ parameters that the stored procedure accepts. You can’t see the actual data\
    \ at this point, but you can right-click the dataset and select Query… to bring\
    \ up the default generic query editor where you can execute the stored procedure.\
    \ At execution time, you are prompted for any parameters that have been defined\
    \ by the stored procedure; you must supply the parameter values before data is\
    \ returned. In the case of this stored procedure, define five parameters: `@ServiceYear`,\
    \ `@ServiceMonth`, `@BranchID`, `@EmployeeTblID`, and `@ServicesLogCtgryID`. The\
    \ available default values for the parameters, when the stored procedure is executed\
    \ in the Report Data box, are either `NULL` or `Blank`. Unlike a `NULL` value,\
    \ a `Blank` value can be an empty string. A `NULL` value indicates that the value\
    \ is unknown, and `NULL` values can’t be evaluated with non-`NULL` values. In\
    \ [Chapter 2](#Chapter02.html), you built logic into the stored procedure to handle\
    \ `NULL` parameter values so that when the user doesn’t supply a value, the query\
    \ returns all records. If the user selects a specific value, only the records\
    \ that match that parameter value are returned. Execute the stored procedure with\
    \ `NULL` values, and make sure you’re getting the results you expect. You can\
    \ see the results of the stored procedure execution in [Figure 3-10](#Chapter03.html#fig_3_10).\n\
    \n![Image](images/9781430238102_Fig03-10.jpg)\n\n***Figure 3-10.** Data returned\
    \ from the stored procedure*\n\n![Image](images/square.jpg) **Note** When you\
    \ are prompted for the parameter values, `Blank` is the default value. To have\
    \ the stored procedure execute without a data type error, you must select the\
    \ value of `NULL`.\n\nAn SSRS report can use multiple datasets simultaneously.\
    \ This extends the flexibility of your reporting, as you can provide more data\
    \ to the user in a single report. Multiple datasets are also useful for populating\
    \ parameter drop-down lists, which you will do in [Chapter 6](#Chapter06.html).\
    \ However, having too many datasets could affect a report’s performance, so it’s\
    \ important to make sure the execution times for each result set are within acceptable\
    \ ranges.\n\nThe RDL file for each report contains a section for each dataset\
    \ defined for the report. [Listing 3-2](#Chapter03.html#list_3_2) shows a sample\
    \ of the RDL for the dataset you’ve defined in this chapter.\n\n***Listing 3-2.**\
    \ Dataset Section of RDL*\n\n`<DataSets>`\n`   <DataSet Name=\"Pro_SSRS_DS\">`\n\
    `<Fields>`\n`   <Field Name=\"PatID\">`\n`<DataField>PatID</DataField>`\n`        <rd:TypeName>System.Int32</rd:TypeName>`\n\
    `   </Field>`\n`   <Field Name=\"Patient_Name\">`\n`<DataField>Patient Name</DataField>`\n\
    `<rd:TypeName>System.String</rd:TypeName>`\n`   </Field>`\n`   <Field Name=\"\
    BranchName\">`\n`<DataField>BranchName</DataField>`\n`<rd:TypeName>System.String</rd:TypeName>`\n\
    `   </Field>`\n`   <Field Name=\"EmployeeID\">`\n`<DataField>EmployeeID</DataField>`\n\
    `<rd:TypeName>System.String</rd:TypeName>`\n`   </Field>`\n`   <Field Name=\"\
    Employee_Name\">`\n`<DataField>Employee Name</DataField>`\n`<rd:TypeName>System.String</rd:TypeName>`\n\
    `   </Field>`\n`   <Field Name=\"EmployeeClassID\">`\n`<DataField>EmployeeClassID</DataField>`\n\
    `<rd:TypeName>System.String</rd:TypeName>`\n`   </Field>`\n`   <Field Name=\"\
    Service_Type\">`\n\nWhen creating a dataset, several additional tabs contain other\
    \ configuration properties:\n\n> *Fields*: Defines additional fields such as calculated\
    \ fields or fields that aren’t automatically defined with the data source. You\
    \ derive calculated fields from an expression.\n> \n> *Options*: Sets several\
    \ options specific to the data as it’s retrieved from the data provider, such\
    \ as case sensitivity and collation.\n> \n> *Parameters*: Defines the query parameter\
    \ values for the dataset and the order in which they’re evaluated. Stored procedures\
    \ with declared parameters automatically generate the query parameters in SSRS.\n\
    > \n> *Filters*: Defines filter values for the dataset that you can use when the\
    \ report is executed."
