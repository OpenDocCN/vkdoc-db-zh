  trans: '### 设计日志报告


    我们知道需要另一份包含所有执行日志信息且便于管理员分析的报告。因此，我们利用单次查询的数据，创建了一份名为**报告执行日志**的矩阵式报告。


    要根据执行日志中的信息衡量性能，你需要掌握几项统计数据：


    > *   **检索数据总时长**：数据检索花了多长时间？

    > *   **处理总时长**：报告处理花了多长时间？

    > *   **渲染总时长**：报告渲染花了多长时间？

    > *   **字节数**：报告包含多少字节？

    > *   **行数**：报告包含多少行数据？


    此外，了解报告的执行时间也很有用。对于矩阵中的行分组，我们希望看到执行了哪份报告、由谁运行报告，以及报告来自哪台客户端机器。对于列分组，我们希望提供两种选择：渲染格式（例如
    HTML 4.0、Word 或 PDF）或源类型（即 SSRS 如何生成报告，如实时、缓存或快照）。`Source_Type` 是一个需要监控的重要字段，因为
    SSRS 生成报告的方式直接影响性能。从缓存副本或快照（两者都是报告的预处理副本）生成报告，对性能是有益的。如果 SSRS 总是为用户生成实时或按需报告，性能可能会受到影响。


    为了实现矩阵中的动态列分组，你将使用一个名为 `Column_Group` 的参数，该参数接受查询中字段名的值：`Format` 或 `Source_Type`。你将使用
    `Format` 作为默认值，以便在预览时自动渲染报告。列分组和标题值都将使用以下表达式，根据参数使列动态变化：


    ```

    =Fields(Parameter!Column_Group.Value).Value

    ```


    当报告被渲染时，如图 10-27 所示，它将默认使用 `Format` 字段，但你可以通过将参数下拉选项更改为 `Source_Type` 来动态改变它。


    ![Image](img/9781430238102_Fig10-27.jpg)


    **图 10-27.** 报告执行日志报告


    ### 监控性能


    当然，没有人愿意经历这样的挫折：在开发环境中构建了一个稳固的报告解决方案，却在部署给广大用户时发现它无法承受压力。通常，最佳实践是对服务器施加模拟负载，以便更好地了解系统的运行情况。同样，当你推出一个完整解决方案时，常见的做法是分批次、分阶段地向有限数量的用户推出功能。这正是我们在在线模型中所采用的方法。


    推出策略还应包括一份计划，明确哪些报告将提供按需访问，哪些将通过报告快照或订阅提供，正如你在本章前面所做。结合高峰时段和非高峰时段的报告处理策略，将极大地提升性能。SSRS
    性能的另一个考量点在于分离 SSRS Web 服务和数据库服务的负载。也就是说，如果整个 SSRS 安装都位于同一系统上，可能会对性能产生负面影响。


    在本节中，我们将展示我们进行压力测试的结果，该测试访问了两个独立服务器 `RS05` 和 `HWC04` 上的两个报告服务器实例。许多工具（如 SSRS）可用于对
    Web 应用程序进行压力测试；幸运的是，Visual Studio 2010 的 Ultimate 版内置了 Web 压力测试工具，我们使用它对两台服务器施加了模拟负载，最多可模拟
    250 个虚拟用户。你可以在 [`www.microsoft.com/visualstudio`](http://www.microsoft.com/visualstudio)
    了解更多关于该 Web 测试工具的信息。


    我们还将向你展示如何使用 `rsconfig` 将 SSRS 服务器加入 Web 场，以了解将资源卸载到另一系统将如何提升性能。Reporting Services
    配置管理器也可用于此目的。


    我们首先对 `RS05` 运行了 15 个用户的模拟负载，所有用户都执行单个报告。我们通过任务管理器监控服务器，快速评估了性能影响。幸运的是，当对 Reporting
    Services 服务器运行模拟负载时，并没有造成太大的性能负担。然而，在某些情况下，你可能会遇到 CPU 达到极限的情况。在这些情况下，你很可能会发现占用处理器的单个进程是
    SQL Server 和 `ReportingServicesService.exe`。图 10-28 显示了测试运行期间，CPU 使用率峰值在 25% 到
    85% 之间跳跃。


    我们知道我们的测试用 SSRS 服务器是一个四处理器系统，拥有超过 3GB 的内存。在你的 CPU 使用率达到极限的情况下，这告诉我们瓶颈在于 CPU。由于我们
    SSRS 的生产部署不会镜像 `RS05` 的设置（换句话说，生产服务器将是至少拥有 32GB 内存的高端系统），我们可以将这一点考虑在内。


    然而，还有一个因素会对生产和测试环境之间的性能差异产生重大影响。在测试环境中，SSRS 服务和 SQL Server 位于同一系统 `RS05` 上。如果我们将
    SSRS 服务配置为使用远程 SQL Server 实例作为其数据库会怎样？虽然通过网络访问 `ReportServer` 数据库而不是本地数据库可能会导致任何性能下降，但如果
    CPU 利用率百分比下降到更易于管理的水平，这种影响将可以忽略不计。


    ![Image](img/9781430238102_Fig10-28.jpg)


    **图 10-28.** 任务管理器


    如果你有两台 SSRS 服务器，那么将 SSRS 服务器从一个实例移动到另一个实例是很简单的。我们在测试环境中有两台 SSRS 服务器，`RS05` 和 `HWC04`，因此移动相当容易。为了指示
    `RS05` 上的 SSRS 服务使用 `HWC04` 上的 SSRS 数据库，我们使用了命令行实用程序 `rsconfig`。当首次将一个 SSRS Web
    服务加入使用相同 `ReportServer` 数据库的 Web 场时，需要使用 `rsconfig` 命令或 Reporting Services 配置管理器。`rsconfig`
    命令的语法如下：


    ```

    rsconfig -c -s HWC04 -d ReportServer -a SQL -u username -p password

    ```


    在 `RS05` 使用远程 SQL Server 数据库后，我们启动了另一项测试，以观察 CPU 利用率是否有所改善。CPU 利用率显著改善，现已降至 60%
    的平均水平以下。


    ![Image](img/square.jpg) **注意** SSRS 2012 的部署以及数据库和数据源的位置有特定的许可指南。更多信息，请访问 [`www.microsoft.com/sqlserver/en/us/get-sql-server/licensing.aspx`](http://www.microsoft.com/sqlserver/en/us/get-sql-server/licensing.aspx)。'
- fmt: "### Controlling SSRS Programmatically\n\nThere are two main methods of controlling\
    \ SSRS 2012 through code:\n\n*   Web services\n*   Windows Management Interface\
    \ (WMI)\n\nIn the following sections, we’ll give an introductory look at using\
    \ both of these technologies to manage reports from code. You’ll use the SOAP\
    \ API, otherwise known as the Report Server Web service, to add subscription functionality\
    \ to the SSRS viewer that you created in [Chapter 9](#Chapter09.html). You’ll\
    \ now extend it to allow your users to add subscriptions for the reports you’ve\
    \ developed and deployed so far. This has two main benefits. First, it allows\
    \ you to offload some of the processing activity from the SQL Server and SSRS\
    \ 2012 server during the day, when they are used most heavily. Second, it saves\
    \ the executives who want to receive the reports from spending time navigating\
    \ to the report server, entering the parameters, and waiting for the results.\
    \ Each of the code listings below will be shown in C#, but VB versions are in\
    \ the `Pro_SSRS` project download, available in the Source Code/Download section\
    \ of the Apress Web site ([`www.apress.com`](http://www.apress.com)).\n\n####\
    \ Controlling SSRS with SOAP\n\nThe SSRS 2012 Report Server Web service offers\
    \ a feature-rich way of interacting with and controlling your reporting server.\
    \ Based on SOAP and operating over HTTP, the Report Server Web service is a simple,\
    \ yet powerful, way to access the features of the server. In fact, SSRS 2012’s\
    \ Report Manager is built using ASP.NET and the SSRS Report Server Web service.\n\
    \nUsing the Report Server Web service, you can create custom applications that\
    \ control all aspects of the server and cover the entire reporting life cycle:\n\
    \n*   Folder and resource management\n*   Task, role, and policy management\n\
    *   Data sources and connections\n*   Report parameters\n*   Report rendering\n\
    *   Report history\n*   Report scheduling\n*   Report subscriptions\n*   Linked\
    \ reports\n\n##### Adding Subscription Functionality to SSRS Viewer\n\nYou’ve\
    \ already used the Report Server Web service to provide a list of report parameters\
    \ and their possible values and to deploy reports in [Chapters 8](#Chapter08.html)\
    \ and [9](#Chapter09.html). In this chapter, you’ll learn how to use the Report\
    \ Server Web service to schedule reports to run automatically each morning before\
    \ the office opens.\n\nAs you saw in the earlier part of this chapter, you can\
    \ set up subscription services through the user interface of the report server\
    \ itself. You may, however, want to provide this functionality within your customized\
    \ Windows Forms (or Web) application. In the example, you’ll expand on the previous\
    \ Windows Forms application to allow users to provide the parameters that they\
    \ want to run the report with, as well as schedule the time to run the report\
    \ and indicate the delivery mechanism to use.\n\nIn the example, you’ll allow\
    \ the users to pick only a shared schedule that has already been defined by the\
    \ systems administrator. Because you want centralized control over when scheduled\
    \ reports will be run, you won’t give users the ability to define their own schedules.\
    \ You’ll also allow them to trigger a subscription based on a snapshot. This allows\
    \ them to receive their subscribed report whenever a snapshot is created for it.\
    \ See the “Creating Snapshots for the Report History” section earlier in this\
    \ chapter for details.\n\nBefore you run the included examples, make sure to read\
    \ the `ReadMe.htm` file. It is located in a file in the samples root folder. If\
    \ you have the code open in Visual Studio, it will be under the Solution Items\
    \ folder. It contains setup and configuration steps that are required before running\
    \ the examples.\n\n##### Accessing an Existing Shared Schedule\n\nIf you are walking\
    \ through this code, start by opening the project from [Chapter 9](#Chapter09.html),\
    \ as it will serve as the starting point for our additions. After you have the\
    \ solution, open the `SSRS Viewer RVC` project, and complete the following steps:\n\
    \n1.  Select Project ➤ Add New Item.\n2.  In the Add New Item dialog box, select\
    \ Windows Form, and enter `PickSchedule.cs` for the name.\n3.  With the `PickSchedule.cs`\
    \ form open in design mode, resize it to 450×150 through the properties page.\n\
    4.  Add a label, set its `Text` property to Schedules, add a combo box named `sharedSchedules`,\
    \ and add a button named `setSchedule` and set its `Text` property to OK. When\
    \ you’re done, you should have a form that looks like [Figure 10-29](#Chapter10.html#fig_10_29).\n\
    \n![Image](images/9781430238102_Fig10-29.jpg)\n\nFigure 10-29. Pick Schedule dialog\
    \ box\n\nNow select View Code for the `PickSchedule` class. For this example,\
    \ you’ll add a few `using` statements to import types defined in other namespaces\
    \ so you can avoid typing the full namespaces during the actual coding. Add the\
    \ namespaces shown in [Listing 10-3](#Chapter10.html#list_10_3) to the `PickSchedule.cs`\
    \ class file below the other `using` statements.\n\nListing 10-3. Importing Namespaces\n\
    \n```\nusing System.Collections;\nusing System.Diagnostics;\nusing System.Web.Services.Protocols;\n\
    using SSRS_Viewer_RVC.SSRSWebService;\n```\n\nNext, add the class variables shown\
    \ in [Listing 10-4](#Chapter10.html#list_10_4) to `PickSchedule.cs` just below\
    \ the class declaration. The `ReportingService2010` type contains the methods\
    \ and properties you can use to call the SSRS 2012 Report Server Web service and\
    \ is made available through the Web reference you added to the `SSRS Viewer RVC`\
    \ project in [Chapter 9](#Chapter09.html).\n\nListing 10-4. Class-Level Private\
    \ Variables\n\n```\nprivate string url;\nprivate string server;\nprivate string\
    \ report;\nprivate ReportingService2010 rs;\n```\n\nNext, modify the `PickSchedule_Load`\
    \ event to query the SSRS 2012 server for the shared schedules that are available.\n\
    \n**Note** You’ll need to set up these shared schedules in advance using Report\
    \ Manager on your SSRS 2008 server. You can add and edit shared schedules by navigating\
    \ to your SSRS 2012 server with your Web browser, selecting Site Settings, and\
    \ then under Schedules, select New Schedule. You can also use SSMS to set up shared\
    \ schedules. By default, you need to set up these shared schedules as a user who\
    \ is in the SSRS 2012 System Administrator role, and users who access them must\
    \ be members of the System User role. In addition, subscriptions require that\
    \ the SQL Server Agent is running and that your data source have stored credentials.\
    \ See the “Setting Up Shared Schedules” section earlier in this chapter for details.\n\
    \nNext, take the URL that is passed in when the `PickSchedule` class is initialized\
    \ and break it apart to get the report name for which you are setting the schedule.\
    \ Add the code in [Listing 10-5](#Chapter10.html#list_10_5) to the class’s constructor.\n\
    \nListing 10-5. `PickSchedule` Constructor\n\n```\npublic PickSchedule(string\
    \ URL)\n{\n     InitializeComponent();\n     url = URL;\n     string[] reportInfo\
    \ = url.Split('?');\n     server = reportInfo[0];\n     report = reportInfo[1];\n\
    }\n```\n\n**Note** The call to `InitializeComponent` is present in the constructor\
    \ already. It was added automatically when the form was created."
  raw: '### Controlling SSRS Programmatically


    There are two main methods of controlling SSRS 2012 through code:


    > *   Web services

    > *   Windows Management Interface (WMI)


    In the following sections, we’ll give an introductory look at using both of these
    technologies to manage reports from code. You’ll use the SOAP API, otherwise known
    as the Report Server Web service, to add subscription functionality to the SSRS
    viewer that you created in [Chapter 9](#Chapter09.html). You’ll now extend it
    to allow your users to add subscriptions for the reports you’ve developed and
    deployed so far. This has two main benefits. First, it allows you to offload some
    of the processing activity from the SQL Server and SSRS 2012 server during the
    day, when they are used most heavily. Second, it saves the executives who want
    to receive the reports from spending time navigating to the report server, entering
    the parameters, and waiting for the results. Each of the code listings below will
    be shown in C#, but VB versions are in the Pro_SSRS project download, available
    in the Source Code/Download section of the Apress Web site ([`www.apress.com`](http://www.apress.com)).


    #### Controlling SSRS with SOAP


    The SSRS 2012 Report Server Web service offers a feature-rich way of interacting
    with and controlling your reporting server. Based on SOAP and operating over HTTP,
    the Report Server Web service is a simple, yet powerful, way to access the features
    of the server. In fact, SSRS 2012’s Report Manager is built using ASP.NET and
    the SSRS Report Server Web service.


    Using the Report Server Web service, you can create custom applications that control
    all aspects of the server and cover the entire reporting life cycle:


    > *   Folder and resource management

    > *   Task, role, and policy management

    > *   Data sources and connections

    > *   Report parameters

    > *   Report rendering

    > *   Report history

    > *   Report scheduling

    > *   Report subscriptions

    > *   Linked reports


    ##### Adding Subscription Functionality to SSRS Viewer


    You’ve already used the Report Server Web service to provide a list of report
    parameters and their possible values and to deploy reports in [Chapters 8](#Chapter08.html)
    and [9](#Chapter09.html). In this chapter, you’ll learn how to use the Report
    Server Web service to schedule reports to run automatically each morning before
    the office opens.


    As you saw in the earlier part of this chapter, you can set up subscription services
    through the user interface of the report server itself. You may, however, want
    to provide this functionality within your customized Windows Forms (or Web) application.
    In the example, you’ll expand on the previous Windows Forms application to allow
    users to provide the parameters that they want to run the report with, as well
    as schedule the time to run the report and indicate the delivery mechanism to
    use.


    In the example, you’ll allow the users to pick only a shared schedule that has
    already been defined by the systems administrator. Because you want centralized
    control over when scheduled reports will be run, you won’t give users the ability
    to define their own schedules. You’ll also allow them to trigger a subscription
    based on a snapshot. This allows them to receive their subscribed report whenever
    a snapshot is created for it. See the “Creating Snapshots for the Report History”
    section earlier in this chapter for details.


    Before you run the included examples, make sure to read the ReadMe.htm file. It
    is located in a file in the samples root folder. If you have the code open in
    Visual Studio, it will be under the Solution Items folder. It contains setup and
    configuration steps that are required before running the examples.


    ##### Accessing an Existing Shared Schedule


    If you are walking through this code, start by opening the project from [Chapter
    9](#Chapter09.html), as it will serve as the starting point for our additions.
    After you have the solution, open the SSRS Viewer RVC project, and complete the
    following steps:


    > 1.  Select Project ![Image](images/U001.jpg) Add New Item.

    > 2.  In the Add New Item dialog box, select Windows Form, and enter PickSchedule.cs
    for the name.

    > 3.  With the PickSchedule.cs form open in design mode, resize it to 450×150
    through the properties page.

    > 4.  Add a label, set its Text property to Schedules, add a combo box named sharedSchedules,
    and add a button named setSchedule and set its Text property to OK. When you’re
    done, you should have a form that looks like [Figure 10-29](#Chapter10.html#fig_10_29).


    ![Image](images/9781430238102_Fig10-29.jpg)


    ***Figure 10-29.** Pick Schedule dialog box*


    Now select View Code for the PickSchedule class. For this example, you’ll add
    a few using statements to import types defined in other namespaces so you can
    avoid typing the full namespaces during the actual coding. Add the namespaces
    shown in [Listing 10-3](#Chapter10.html#list_10_3) to the PickSchedule.cs class
    file below the other using statements.


    ***Listing 10-3.** Importing Namespaces*


    `using System.Collections;`

    `using System.Diagnostics;`

    `using System.Web.Services.Protocols;`

    `using SSRS_Viewer_RVC.SSRSWebService;`


    Next, add the class variables shown in [Listing 10-4](#Chapter10.html#list_10_4)
    to PickSchedule.cs just below the class declaration. The ReportingService2010
    type contains the methods and properties you can use to call the SSRS 2012 Report
    Server Web service and is made available through the Web reference you added to
    the SSRS Viewer RVC project in [Chapter 9](#Chapter09.html).


    ***Listing 10-4.** Class-Level Private Variables*


    `private string url;`

    `private string server;`

    `private string report;`

    `private ReportingService2010 rs;`


    Next, modify the PickSchedule_Load event to query the SSRS 2012 server for the
    shared schedules that are available.


    ![Image](images/square.jpg) **Note** You’ll need to set up these shared schedules
    in advance using Report Manager on your SSRS 2008 server. You can add and edit
    shared schedules by navigating to your SSRS 2012 server with your Web browser,
    selecting Site Settings, and then under Schedules, select New Schedule. You can
    also use SSMS to set up shared schedules. By default, you need to set up these
    shared schedules as a user who is in the SSRS 2012 System Administrator role,
    and users who access them must be members of the System User role. In addition,
    subscriptions require that the SQL Server Agent is running and that your data
    source have stored credentials. See the “Setting Up Shared Schedules” section
    earlier in this chapter for details.


    Next, take the URL that is passed in when the PickSchedule class is initialized
    and break it apart to get the report name for which you are setting the schedule.
    Add the code in [Listing 10-5](#Chapter10.html#list_10_5) to the class’s constructor.


    ***Listing 10-5.** PickSchedule Constructor*


    `public PickSchedule(string URL)`

    `{`

    `     InitializeComponent();`

    `     url = URL;`

    `     string[] reportInfo = url.Split(''?'');`

    `     server = reportInfo[0];`

    `     report = reportInfo[1];`

    `}`


    ![Image](images/square.jpg) **Note** The call to InitializeComponent is present
    in the constructor already. It was added automatically when the form was created.'
  trans: "\n### 通过编程控制 SSRS\n\n通过代码控制 SSRS 2012 主要有两种方法：\n\n*   Web 服务\n*   Windows\
    \ 管理规范 (WMI)\n\n在接下来的章节中，我们将初步介绍如何使用这两种技术通过代码管理报表。你将使用 SOAP API（也称为报表服务器 Web 服务）为你在第\
    \ 9 章中创建的 SSRS 查看器添加订阅功能。现在，你将扩展它，允许你的用户为你迄今为止开发和部署的报表添加订阅。这有两个主要好处。首先，它允许你在白天（SQL\
    \ Server 和 SSRS 2012 服务器使用最繁忙的时候）卸载一部分处理活动。其次，它为想要接收报表的高管们节省了时间，他们无需再导航到报表服务器、输入参数并等待结果。下面的每个代码清单都将用\
    \ C# 展示，但 VB 版本包含在 `Pro_SSRS` 项目下载中，可从 Apress 网站（[`www.apress.com`](http://www.apress.com)）的源代码/下载部分获取。\n\
    \n#### 使用 SOAP 控制 SSRS\n\nSSRS 2012 报表服务器 Web 服务提供了一种功能丰富的方式与报表服务器交互并对其进行控制。基于\
    \ SOAP 并通过 HTTP 运行，报表服务器 Web 服务是访问服务器功能的一种简单而强大的方式。事实上，SSRS 2012 的报表管理器就是使用 ASP.NET\
    \ 和 SSRS 报表服务器 Web 服务构建的。\n\n使用报表服务器 Web 服务，你可以创建自定义应用程序来控制服务器的各个方面，并覆盖整个报表生命周期：\n\
    \n*   文件夹和资源管理\n*   任务、角色和策略管理\n*   数据源和连接\n*   报表参数\n*   报表呈现\n*   报表历史记录\n*\
    \   报表计划\n*   报表订阅\n*   链接报表\n\n##### 为 SSRS 查看器添加订阅功能\n\n你已经在第 8 章和第 9 章中使用了报表服务器\
    \ Web 服务来提供报表参数及其可能值的列表，以及部署报表。在本章中，你将学习如何使用报表服务器 Web 服务来计划报表，使其在每个工作日办公室开始办公前自动运行。\n\
    \n正如你在本章前面部分看到的，你可以通过报表服务器本身的用户界面设置订阅服务。但是，你可能希望在你定制的 Windows 窗体（或 Web）应用程序中提供此功能。在这个示例中，你将扩展之前的\
    \ Windows 窗体应用程序，允许用户提供他们希望运行报表时使用的参数，以及安排运行报表的时间并指明要使用的传递机制。\n\n在这个示例中，你将只允许用户选择系统管理员已经定义的共享计划。因为你希望集中控制计划报表的运行时间，所以不会赋予用户定义自己计划的能力。你还将允许他们基于快照触发订阅。这允许他们在为其报表创建快照时接收他们订阅的报表。详情请参阅本章前面的“为报表历史记录创建快照”部分。\n\
    \n在运行包含的示例之前，请务必阅读 `ReadMe.htm` 文件。它位于示例根文件夹中的一个文件里。如果你在 Visual Studio 中打开了代码，它将位于“解决方案项”文件夹下。它包含了运行示例所需的设置和配置步骤。\n\
    \n##### 访问现有的共享计划\n\n如果你要逐步研究这段代码，请先打开第 9 章的项目，因为它将作为我们添加内容的起点。打开解决方案后，打开 `SSRS\
    \ Viewer RVC` 项目，并完成以下步骤：\n\n1.  选择 项目 ➤ 添加新项。\n2.  在“添加新项”对话框中，选择“Windows 窗体”，并在名称中输入\
    \ `PickSchedule.cs`。\n3.  在设计模式下打开 `PickSchedule.cs` 窗体后，通过属性页将其大小调整为 450×150。\n\
    4.  添加一个标签，将其 `Text` 属性设置为“计划”，添加一个名为 `sharedSchedules` 的组合框，并添加一个名为 `setSchedule`\
    \ 的按钮，将其 `Text` 属性设置为“确定”。完成后，你应该拥有一个看起来像图 10-29 的窗体。\n\n![Image](img/9781430238102_Fig10-29.jpg)\n\
    \n图 10-29. “选择计划”对话框\n\n现在为 `PickSchedule` 类选择“查看代码”。对于此示例，你将添加几个 `using` 语句来导入在其他命名空间中定义的类型，以便在实际编码时避免键入完整的命名空间。将清单\
    \ 10-3 中所示的命名空间添加到 `PickSchedule.cs` 类文件中其他 `using` 语句的下方。\n\n清单 10-3. 导入命名空间\n\
    \n```\nusing System.Collections;\nusing System.Diagnostics;\nusing System.Web.Services.Protocols;\n\
    using SSRS_Viewer_RVC.SSRSWebService;\n```\n\n接下来，将清单 10-4 中所示的类变量添加到 `PickSchedule.cs`\
    \ 中类声明的下方。`ReportingService2010` 类型包含可用于调用 SSRS 2012 报表服务器 Web 服务的方法和属性，并通过你在第\
    \ 9 章中添加到 `SSRS Viewer RVC` 项目的 Web 引用使其可用。\n\n清单 10-4. 类级别的私有变量\n\n```\nprivate\
    \ string url;\nprivate string server;\nprivate string report;\nprivate ReportingService2010\
    \ rs;\n```\n\n接下来，修改 `PickSchedule_Load` 事件以查询 SSRS 2012 服务器以获取可用的共享计划。\n\n**注意**\
    \ 你需要预先使用 SSRS 2008 服务器上的报表管理器设置这些共享计划。你可以通过 Web 浏览器导航到你的 SSRS 2012 服务器，选择“网站设置”，然后在“计划”下选择“新建计划”来添加和编辑共享计划。你也可以使用\
    \ SSMS 设置共享计划。默认情况下，你需要以 SSRS 2012 系统管理员角色中的用户身份设置这些共享计划，访问它们的用户必须是系统用户角色的成员。此外，订阅要求\
    \ SQL Server 代理正在运行，并且你的数据源具有存储的凭据。详情请参阅本章前面的“设置共享计划”部分。\n\n接下来，获取 `PickSchedule`\
    \ 类初始化时传入的 URL，并将其分解以获取你正在设置计划的报表名称。将清单 10-5 中的代码添加到类的构造函数中。\n\n清单 10-5. `PickSchedule`\
    \ 构造函数\n\n```\npublic PickSchedule(string URL)\n{\n     InitializeComponent();\n\
    \     url = URL;\n     string[] reportInfo = url.Split('?');\n     server = reportInfo[0];\n\
    \     report = reportInfo[1];\n}\n```\n\n**注意** 对 `InitializeComponent` 的调用已经存在于构造函数中。它在窗体创建时自动添加。\n"
- fmt: "To get a list of available shared schedules from your SSRS 2012 server, you’ll\
    \ use the `ListSchedules` method of the Report Server Web service. The `ListSchedules`\
    \ method returns an array of `Schedule` objects, so after you call the method,\
    \ you’ll need to loop through the array to populate your combo box. Since we are\
    \ expanding on the SSRS Viewer RVC project that we created in [Chapter 9](#Chapter09.html),\
    \ we need to add two new options to our `PickSchedule_Load` event as shown in\
    \ [Listing 10-6](#Chapter10.html#list_10_6). To do this, add a `Do Not Schedule`\
    \ choice and a `Schedule with Snapshot` choice to your combo box.\n\n![Image](images/square.jpg)\
    \ **Note** You can set up snapshots through the Report Manager Web interface of\
    \ your SSRS 2012 server.\n\nThe code in [Listing 10-6](#Chapter10.html#list_10_6)\
    \ uses the `ComboItem` class that you created in [Chapter 9](#Chapter09.html)\
    \ to add the items to combo boxes. With `PickSchedule.cs` in design mode, double-click\
    \ the form. This creates an empty method to handle the form’s `Load` event. Add\
    \ the code shown in [Listing 10-6](#Chapter10.html#list_10_6) to the `PickSchedule_Load`\
    \ method.\n\n***Listing 10-6.** Getting Shared Schedules*\n\n```\nprivate void\
    \ PickSchedule_Load(object sender, EventArgs e)\n{     rs = new SSRSWebService.ReportingService2010();\n\
    \      rs.Credentials = System.Net.CredentialCache.DefaultCredentials;\n     \
    \ Schedule[] schedules = null;\n      try\n      {\n            schedules = rs.ListSchedules(null);\n\
    \            if (schedules != null)\n            {\n                 //Build list\
    \ items\n                 ArrayList aList = new ArrayList();\n               \
    \  // Now add the Do Not Schedule item\n                 aList.Add(new ComboItem(\"\
    Do not schedule\", \"NS\"));\n                 // And the Snapshot schedule\n\
    \                 aList.Add(new ComboItem(\"Schedule with Snapshot\", \"SS\"));\n\
    \                 foreach (Schedule s in schedules)\n                 {\n    \
    \                  aList.Add(new ComboItem(s.Description, s.ScheduleID));\n  \
    \                    Debug.WriteLine(String.Format\n                      (\"\
    Desc: {0} - ID: {1}\", s.Description, s.ScheduleID));\n                 }\n  \
    \               //Bind list items to combo box\n                 sharedSchedules.DataSource\
    \ = aList;\n                 sharedSchedules.DisplayMember = \"Display\";\n  \
    \               sharedSchedules.ValueMember = \"Value\";\n                 }\n\
    \      }\n      catch (SoapException ex) { MessageBox.Show(ex.Detail.InnerXml.ToString());\
    \ }\n}\n```\n\n## 安排报表\n\nNow that you have the list of available scheduling options,\
    \ you need to add some code to handle the case in which the user has selected\
    \ to schedule the report to be delivered based on one of the shared schedules\
    \ or on the creation of a snapshot. To do this, you’ll use another method of the\
    \ Report Service Web service, `CreateSubscription`. The `CreateSubscription` method\
    \ of the API takes six parameters:\n\n> *   `Report`: The full path name of the\
    \ report for which to create a subscription.\n> *   `ExtensionSettings`: A delivery\
    \ extension that contains a list of settings specific to the extension. SSRS 2012\
    \ comes with two built-in extensions: the Email Delivery extension and the File\
    \ Share Delivery extension.\n> *   `Description`: A meaningful description displayed\
    \ to users.\n> *   `EventType`: The type of event that triggers the subscription.\
    \ The valid values are `TimedSubscription` and `SnapshotUpdated`.\n> *   `MatchData`:\
    \ The data that is associated with the specified `EventType` parameter. This parameter\
    \ is used by an event to match the subscription with an event that has fired.\n\
    > *   `Parameters`: An array of `ParameterValue[]` objects that contains a list\
    \ of parameters for the report.\n\nIn your report scheduler, you’ll create a new\
    \ method, `ScheduleReport`, which is called whenever the user chooses to have\
    \ a report scheduled. This method sets these parameters to the appropriate values\
    \ and then calls the `CreateSubscription` method of the SSRS 2012 Report Server\
    \ Web service. Most of the values are just strings and are straightforward to\
    \ set.\n\nCheck to see whether the user selected a subscription and, if so, whether\
    \ it is based on a shared schedule or a snapshot. You’ll use this to set the `EventType`\
    \ accordingly. If the user selected Shared Schedule, then set the variable `matchData`\
    \ to the `ScheduledlD`. If not, set the variable to `null` to tell SSRS 2012 to\
    \ trigger it based on a snapshot.\n\n```\nif (sharedSchedules.SelectedValue.ToString()\
    \ == \"SS\")\n{\n      eventType = \"SnapshotUpdated\";\n      matchData = null;\n\
    }\nelse\n{\n      eventType = \"TimedSubscription\";\n      matchData = sharedSchedules.SelectedValue.ToStringQ;\n\
    }\n```\n\nTo set up a subscription, you have to provide SSRS 2012 with some information\
    \ about how to deliver the subscription. To do this, set the delivery extensions\
    \ through an `ExtensionSettings` object, which itself contains `ParameterValue`\
    \ objects. `ParameterValue` objects are essentially name-value pairs, making the\
    \ `ExtensionSettings` object essentially an array of name-value pairs.\n\nTo use\
    \ the `ExtensionSettings` object, create `ParameterValue` objects (your name-value\
    \ pairs) with your delivery settings and then add them to the `ExtensionSettings`\
    \ object. You’ll then call the `CreateSubscription` method and pass in the `ExtensionSettings`\
    \ object to give SSRS 2012 the subscription specifics. (See [Listing 10-7](#Chapter10.html#list_10_7)\
    \ for details.)\n\nIf the user decides on a subscription based on a shared schedule,\
    \ and the report accepts parameters, then you’ll need to collect them from your\
    \ report viewer interface so that you can set them in the subscription. These\
    \ are the values that the report will run with whenever it’s run by the subscription.\
    \ To do this, you’ll add code to the `PickSchedule` form to call the `GetParameters`\
    \ form. Because the `GetParameters` class returns values in the form of `Winforms.ReportParameters`,\
    \ you’ll have to convert them into an array of `ParameterValue` objects required\
    \ by the Report Server Web service. The only other item you need is the report\
    \ itself, which you already have as a class-level variable that was set in the\
    \ Forms constructor. The final method should look like [Listing 10-7](#Chapter10.html#list_10_7);\
    \ add it to `PickSchedule.cs`.\n\n***Listing 10-7.** Report Scheduler*"
  raw: 'To get a list of available shared schedules from your SSRS 2012 server, you’ll
    use the ListSchedules method of the Report Server Web service. The ListSchedules
    method returns an array of Schedule objects, so after you call the method, you’ll
    need to loop through the array to populate your combo box. Since we are expanding
    on the SSRS Viewer RVC project that we created in [Chapter 9](#Chapter09.html),
    we need to add two new options to our PickSchedule_Load event as shown in [Listing
    10-6](#Chapter10.html#list_10_6). To do this, add a Do Not Schedule choice and
    a Schedule with Snapshot choice to your combo box.


    ![Image](images/square.jpg) **Note** You can set up snapshots through the Report
    Manager Web interface of your SSRS 2012 server.


    The code in [Listing 10-6](#Chapter10.html#list_10_6) uses the ComboItem class
    that you created in [Chapter 9](#Chapter09.html) to add the items to combo boxes.
    With PickSchedule.cs in design mode, double-click the form. This creates an empty
    method to handle the form’s Load event. Add the code shown in [Listing 10-6](#Chapter10.html#list_10_6)
    to the PickSchedule_Load method.


    ***Listing 10-6.** Getting Shared Schedules*


    `private void PickSchedule_Load(object sender, EventArgs e)`

    `{     rs = new SSRSWebService.ReportingService2010();`

    `     rs.Credentials = System.Net.CredentialCache.DefaultCredentials;`

    `     Schedule[] schedules = null;`

    `     try`

    `     {`

    `           schedules = rs.ListSchedules(null);`

    `           if (schedules != null)`

    `           {`

    `                //Build list items`

    `                ArrayList aList = new ArrayList();`

    `                // Now add the Do Not Schedule item`

    `                aList.Add(new ComboItem("Do not schedule", "NS"));`

    `                // And the Snapshot schedule`

    `                aList.Add(new ComboItem("Schedule with Snapshot", "SS"));`

    `                foreach (Schedule s in schedules)`

    `                {`

    `                     aList.Add(new ComboItem(s.Description, s.ScheduleID));`

    `                     Debug.WriteLine(String.Format`![Image](images/U002.jpg)

    `                     ("Desc: {0} - ID: {1}", s.Description, s.ScheduleID));`

    `                }`

    `                //Bind list items to combo box`

    `                sharedSchedules.DataSource = aList;`

    `                sharedSchedules.DisplayMember = "Display";`

    `                sharedSchedules.ValueMember = "Value";`

    `                }`

    `     }`

    `     catch (SoapException ex) { MessageBox.Show(ex.Detail.InnerXml.ToString());
    }`

    `}`


    ##### Scheduling the Report


    Now that you have the list of available scheduling options, you need to add some
    code to handle the case in which the user has selected to schedule the report
    to be delivered based on one of the shared schedules or on the creation of a snapshot.
    To do this, you’ll use another method of the Report Service Web service, CreateSubscription.
    The CreateSubscription method of the API takes six parameters:


    > *   Report: The full path name of the report for which to create a subscription.

    > *   ExtensionSettings: A delivery extension that contains a list of settings
    specific to the extension. SSRS 2012 comes with two built-in extensions: the Email
    Delivery extension and the File Share Delivery extension.

    > *   Description: A meaningful description displayed to users.

    > *   EventType: The type of event that triggers the subscription. The valid values
    are TimedSubscription and SnapshotUpdated.

    > *   MatchData: The data that is associated with the specified EventType parameter.
    This parameter is used by an event to match the subscription with an event that
    has fired.

    > *   Parameters: An array of ParameterValue[] objects that contains a list of
    parameters for the report.


    In your report scheduler, you’ll create a new method, ScheduleReport, which is
    called whenever the user chooses to have a report scheduled. This method sets
    these parameters to the appropriate values and then calls the CreateSubscription
    method of the SSRS 2012 Report Server Web service. Most of the values are just
    strings and are straightforward to set.


    Check to see whether the user selected a subscription and, if so, whether it is
    based on a shared schedule or a snapshot. You’ll use this to set the EventType
    accordingly. If the user selected Shared Schedule, then set the variable matchData
    to the ScheduledlD. If not, set the variable to null to tell SSRS 2012 to trigger
    it based on a snapshot.


    `if (sharedSchedules.SelectedValue.ToString() == "SS")`

    `{`

    `     eventType = "SnapshotUpdated";`

    `     matchData = null;`

    `}`

    `else`

    `{`

    `     eventType = "TimedSubscription";`

    `     matchData = sharedSchedules.SelectedValue.ToStringQ;`

    `}`


    To set up a subscription, you have to provide SSRS 2012 with some information
    about how to deliver the subscription. To do this, set the delivery extensions
    through an ExtensionSettings object, which itself contains ParameterValue objects.
    ParameterValue objects are essentially name-value pairs, making the ExtensionSettings
    object essentially an array of name-value pairs.


    To use the ExtensionSettings object, create ParameterValue objects (your name-value
    pairs) with your delivery settings and then add them to the ExtensionSettings
    object. You’ll then call the CreateSubscription method and pass in the ExtensionSettings
    object to give SSRS 2012 the subscription specifics. (See [Listing 10-7](#Chapter10.html#list_10_7)
    for details.)


    If the user decides on a subscription based on a shared schedule, and the report
    accepts parameters, then you’ll need to collect them from your report viewer interface
    so that you can set them in the subscription. These are the values that the report
    will run with whenever it’s run by the subscription. To do this, you’ll add code
    to the PickSchedule form to call the GetParameters form. Because the GetParameters
    class returns values in the form of Winforms.ReportParameters, you’ll have to
    convert them into an array of ParameterValue objects required by the Report Server
    Web service. The only other item you need is the report itself, which you already
    have as a class-level variable that was set in the Forms constructor. The final
    method should look like [Listing 10-7](#Chapter10.html#list_10_7); add it to PickSchedule.cs.


    ***Listing 10-7.** Report Scheduler*'
  trans: "\n要从您的 SSRS 2012 服务器获取可用共享计划的列表，您将使用报表服务器 Web 服务的 `ListSchedules` 方法。`ListSchedules`\
    \ 方法返回一个 `Schedule` 对象数组，因此调用该方法后，您需要遍历该数组以填充组合框。由于我们是在扩展第 9 章中创建的 SSRS Viewer\
    \ RVC 项目，因此我们需要向 `PickSchedule_Load` 事件添加两个新选项，如代码清单 10-6 所示。为此，请向您的组合框添加一个 `不计划`\
    \ 选项和一个 `带快照的计划` 选项。\n\n![Image](img/square.jpg) **注意** 您可以通过 SSRS 2012 服务器的报表管理器\
    \ Web 界面设置快照。\n\n代码清单 10-6 中的代码使用您在第 9 章创建的 `ComboItem` 类将项目添加到组合框。在设计模式下打开 `PickSchedule.cs`，然后双击表单。这将创建一个空方法来处理表单的\
    \ `Load` 事件。将代码清单 10-6 中所示的代码添加到 `PickSchedule_Load` 方法中。\n\n***代码清单 10-6.** 获取共享计划*\n\
    \n```\nprivate void PickSchedule_Load(object sender, EventArgs e)\n{     rs =\
    \ new SSRSWebService.ReportingService2010();\n      rs.Credentials = System.Net.CredentialCache.DefaultCredentials;\n\
    \      Schedule[] schedules = null;\n      try\n      {\n            schedules\
    \ = rs.ListSchedules(null);\n            if (schedules != null)\n            {\n\
    \                 //构建列表项\n                 ArrayList aList = new ArrayList();\n\
    \                 // 现在添加“不计划”项\n                 aList.Add(new ComboItem(\"不计划\"\
    , \"NS\"));\n                 // 以及“带快照的计划”\n                 aList.Add(new ComboItem(\"\
    带快照的计划\", \"SS\"));\n                 foreach (Schedule s in schedules)\n    \
    \             {\n                      aList.Add(new ComboItem(s.Description,\
    \ s.ScheduleID));\n                      Debug.WriteLine(String.Format\n     \
    \                 (\"描述: {0} - ID: {1}\", s.Description, s.ScheduleID));\n   \
    \              }\n                 //将列表项绑定到组合框\n                 sharedSchedules.DataSource\
    \ = aList;\n                 sharedSchedules.DisplayMember = \"Display\";\n  \
    \               sharedSchedules.ValueMember = \"Value\";\n                 }\n\
    \      }\n      catch (SoapException ex) { MessageBox.Show(ex.Detail.InnerXml.ToString());\
    \ }\n}\n```\n\n## 安排报表\n\n现在您有了可用调度选项的列表，您需要添加一些代码来处理用户选择根据共享计划之一或根据快照创建来计划报表交付的情况。为此，您将使用报表服务\
    \ Web 服务的另一个方法，`CreateSubscription`。API 的 `CreateSubscription` 方法接受六个参数：\n\n>\
    \ *   `Report`：要为其创建订阅的报表的完整路径名。\n> *   `ExtensionSettings`：一个传递扩展，包含特定于该扩展的设置列表。SSRS\
    \ 2012 附带两个内置扩展：电子邮件传递扩展和文件共享传递扩展。\n> *   `Description`：显示给用户的有意义的描述。\n> *   `EventType`：触发订阅的事件类型。有效值为\
    \ `TimedSubscription` 和 `SnapshotUpdated`。\n> *   `MatchData`：与指定的 `EventType`\
    \ 参数关联的数据。此参数由事件用于将订阅与已触发的事件进行匹配。\n> *   `Parameters`：一个 `ParameterValue[]` 对象数组，包含报表的参数列表。\n\
    \n在您的报表调度器中，您将创建一个新方法 `ScheduleReport`，每当用户选择安排报表时都会调用此方法。此方法将这些参数设置为适当的值，然后调用\
    \ SSRS 2012 报表服务器 Web 服务的 `CreateSubscription` 方法。大多数值只是字符串，设置起来很简单。\n\n检查用户是否选择了订阅，如果是，检查它是基于共享计划还是快照。您将据此设置\
    \ `EventType`。如果用户选择了共享计划，则将变量 `matchData` 设置为 `ScheduledlD`。如果不是，则将该变量设置为 `null`\
    \ 以告诉 SSRS 2012 基于快照触发它。\n\n```\nif (sharedSchedules.SelectedValue.ToString()\
    \ == \"SS\")\n{\n      eventType = \"SnapshotUpdated\";\n      matchData = null;\n\
    }\nelse\n{\n      eventType = \"TimedSubscription\";\n      matchData = sharedSchedules.SelectedValue.ToStringQ;\n\
    }\n```\n\n要设置订阅，您必须向 SSRS 2012 提供有关如何传递订阅的一些信息。为此，通过 `ExtensionSettings` 对象设置传递扩展，该对象本身包含\
    \ `ParameterValue` 对象。`ParameterValue` 对象本质上是名称-值对，使得 `ExtensionSettings` 对象本质上是一个名称-值对数组。\n\
    \n要使用 `ExtensionSettings` 对象，需使用您的传递设置创建 `ParameterValue` 对象（您的名称-值对），然后将它们添加到\
    \ `ExtensionSettings` 对象中。然后，您将调用 `CreateSubscription` 方法并传入 `ExtensionSettings`\
    \ 对象，以向 SSRS 2012 提供订阅详细信息。（详见代码清单 10-7。）\n\n如果用户决定使用基于共享计划的订阅，并且报表接受参数，那么您需要从报表查看器界面收集这些参数，以便在订阅中设置它们。这些是每当订阅运行报表时，报表将使用的运行参数值。为此，您将向\
    \ `PickSchedule` 窗体添加代码以调用 `GetParameters` 窗体。由于 `GetParameters` 类以 `Winforms.ReportParameters`\
    \ 的形式返回值，您必须将它们转换为报表服务器 Web 服务所需的 `ParameterValue` 对象数组。您唯一需要的另一个项是报表本身，您已经将其作为在窗体构造函数中设置的类级别变量。最终方法应类似于代码清单\
    \ 10-7；请将其添加到 `PickSchedule.cs` 中。\n\n***代码清单 10-7.** 报表调度器*\n"
- fmt: "## 实现调度报告功能\n\n以下代码展示了 `ScheduleReport` 方法的实现，该方法负责创建报告订阅。\n\n```csharp\n\
    private void ScheduleReport()\n{\n     // See whether the user wants to schedule\
    \ this versus run it now\n     if (sharedSchedules.SelectedValue.ToString() !=\
    \ \"NS\")\n     {\n          string desc = \"Send report via email\";\n      \
    \    string eventType = String.Empty;\n          string matchData = String.Empty;\n\
    \n          // If the user selected SnapShot, then\n          // set up the parameters\
