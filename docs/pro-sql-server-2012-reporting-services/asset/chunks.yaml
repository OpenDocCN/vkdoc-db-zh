- fmt: '# Building Reports


    In the previous chapter, you laid the foundation for your first report by creating
    a query and subsequent stored procedure. You also learned about the fundamental
    elements used to build reports and are now familiar with the design environment.
    Now, it is time to put all the pieces together and begin building reports. You
    can easily apply the concepts introduced in this chapter to any company that uses
    SQL Server and relational database systems. This chapter will focus primarily
    on creating a reporting solution based on data from a SQL Server health care database;
    it will use many of the report elements that have been available since SSRS’s
    inception in SQL Server 2000 through 2012. SSRS 2008 and 2008 R2 introduced many
    new features such as report variables, enhanced charting, and data visualizations.
    The most significant additions were the `Tablix` data regions and dashboard style
    elements like `Sparklines`, `Data Bars`, and the `Indicator`. We are excited to
    incorporate these significant and long-awaited enhancements into the reports featured
    in this book.


    The report you will be creating in this chapter is called the `Employee Service
    Cost` report. This report will utilize the same query and stored procedure, `Emp_Svc_Cost`,
    which you have been working with since [Chapter 2](#Chapter02.html) to provide
    the report data. As a reminder, the query returns detail records that represent
    services performed for patients, such as visits by skilled nurses or home health
    aides. Each type of service has an associated cost for the health care company.
    This report, when complete, will show important cost points based on associated
    data provided by the query, such as the patient’s diagnosis, the employees who
    performed the services, the date of each service, and the branch location of the
    patient. By grouping and sorting the report at these cost points, you will be
    able to see the cost of services from the individual patient all the way up to
    the branch location, which might serve hundreds of patients. You will group and
    calculate the cost amount at each level.


    Specifically, in the following sections, you will create the `Employee Service
    Cost` report initially with the `Report Wizard`, which produces a report based
    on predefined selections, and then from scratch. We will show the process of using
    the wizard for demonstration purposes only and therefore will not continue with
    the report that it produces. For the report that you build from scratch, you will
    add all the features that the `Report Wizard` can add, plus much more. The following
    list highlights the design goals for the `Employee Service Cost` report:


    *   Step through adding a base report that uses the `Table` data region based
    on the dataset you defined for the `Emp_Svc_Cost` query.

    *   Add several basic formatting elements to the report.

    *   Add interactivity to the report, with document mapping, visibility, hyperlink
    actions, and interactive sorting (introduced in SSRS 2005). Both document mapping
    and hyperlink actions allow the user to navigate to defined locations either within
    the report or outside the report, such as a Website. In this chapter, you will
    use visibility properties within your report to expand and collapse report items
    from summary to detail. Interactive sorting gives an SSRS report versatility by
    allowing it to be sorted in much the same way that Microsoft Outlook allows sorting
    by clicking column headers.

    *   Add parameters to the report automatically by changing the dataset from a
    query to a parameterized stored procedure. You will also add other datasets to
    populate the parameters defined by the stored procedure.

    *   Learn how to use multivalued parameters using a modified stored procedure
    and `UDF`.

    *   Add a filter to the `Table` data region to show only service types that are
    visits.

    *   Add a `Chart` data region for the top ten diagnoses to the report.

    *   Add a report variable (introduced in 2008) to use as a constant threshold
    value.

    *   Add a gauge control to the report to show threshold information.

    *   Add a column grouping to the report `Table` region. Column groupings within
    the `Table` region are part of the new `Tablix` functionality for the `Table`,
    `Matrix`, and `List` data regions. The `Tablix` functionality was covered in detail
    in [Chapter 4](#Chapter04.html#ch4).

    *   Add the final touches to the report, such as a page header and footer, title,
    and page numbers.


    In addition, as you begin to work more closely with report and query parameters,
    you will learn how to use multivalued parameters. As mentioned in previous chapters,
    multivalued parameters require special consideration when designing the underlying
    query. Therefore, in this chapter, you will use a modified version of your stored
    procedure that takes advantage of a `UDF`; this will teach you how to best utilize
    this feature.


    In the preceding chapters, we covered the steps for creating the solution, project,
    and data source that your report will use, so we will not cover these steps again
    here. We will, however, show how to use the same data source properties to connect
    to the health care database where the data for your report reside. The same database
    also contains the stored procedure you created in [Chapter 2](#Chapter02.html#ch2),
    `Emp_Svc_Cost`, which you will use later in this chapter.'
  raw: '## Building Reports


    In the previous chapter, you laid the foundation for your first report by creating
    a query and subsequent stored procedure. You also learned about the fundamental
    elements used to build reports and are now familiar with the design environment.
    Now, it is time to put all the pieces together and begin building reports. You
    can easily apply the concepts introduced in this chapter to any company that uses
    SQL Server and relational database systems. This chapter will focus primarily
    on creating a reporting solution based on data from a SQL Server health care database;
    it will use many of the report elements that have been available since SSRS’s
    inception in SQL Server 2000 through 2012\. SSRS 2008 and 2008 R2 introduced many
    new features such as report variables, enhanced charting, and data visualizations.
    The most significant additions were the Tablix data regions and dashboard style
    elements like Sparklines, Data Bars, and the Indicator. We are excited to incorporate
    these significant and long-awaited enhancements into the reports featured in this
    book.


    The report you will be creating in this chapter is called the Employee Service
    Cost report. This report will utilize the same query and stored procedure, Emp_Svc_Cost,
    which you have been working with since [Chapter 2](#Chapter02.html) to provide
    the report data. As a reminder, the query returns detail records that represent
    services performed for patients, such as visits by skilled nurses or home health
    aides. Each type of service has an associated cost for the health care company.
    This report, when complete, will show important cost points based on associated
    data provided by the query, such as the patient’s diagnosis, the employees who
    performed the services, the date of each service, and the branch location of the
    patient. By grouping and sorting the report at these cost points, you will be
    able to see the cost of services from the individual patient all the way up to
    the branch location, which might serve hundreds of patients. You will group and
    calculate the cost amount at each level.


    Specifically, in the following sections, you will create the Employee Service
    Cost report initially with the Report Wizard, which produces a report based on
    predefined selections, and then from scratch. We will show the process of using
    the wizard for demonstration purposes only and therefore will not continue with
    the report that it produces. For the report that you build from scratch, you will
    add all the features that the Report Wizard can add, plus much more. The following
    list highlights the design goals for the Employee Service Cost report:


    > *   Step through adding a base report that uses the Table data region based
    on the dataset you defined for the Emp_Svc_Cost query.

    > *   Add several basic formatting elements to the report.

    > *   Add interactivity to the report, with document mapping, visibility, hyperlink
    actions, and interactive sorting (introduced in SSRS 2005). Both document mapping
    and hyperlink actions allow the user to navigate to defined locations either within
    the report or outside the report, such as a Website. In this chapter, you will
    use visibility properties within your report to expand and collapse report items
    from summary to detail. Interactive sorting gives an SSRS report versatility by
    allowing it to be sorted in much the same way that Microsoft Outlook allows sorting
    by clicking column headers.

    > *   Add parameters to the report automatically by changing the dataset from
    a query to a parameterized stored procedure. You will also add other datasets
    to populate the parameters defined by the stored procedure.

    > *   Learn how to use multivalued parameters using a modified stored procedure
    and UDF.

    > *   Add a filter to the Table data region to show only service types that are
    visits.

    > *   Add a Chart data region for the top ten diagnoses to the report.

    > *   Add a report variable (introduced in 2008) to use as a constant threshold
    value.

    > *   Add a gauge control to the report to show threshold information.

    > *   Add a column grouping to the report Table region. Column groupings within
    the Table region are part of the new Tablix functionality for the Table, Matrix,
    and List data regions. The Tablix functionality was covered in detail in [Chapter
    4](#Chapter04.html#ch4).

    > *   Add the final touches to the report, such as a page header and footer, title,
    and page numbers.


    In addition, as you begin to work more closely with report and query parameters,
    you will learn how to use multivalued parameters. As mentioned in previous chapters,
    multivalued parameters require special consideration when designing the underlying
    query. Therefore, in this chapter, you will use a modified version of your stored
    procedure that takes advantage of a UDF; this will teach you how to best utilize
    this feature.


    In the preceding chapters, we covered the steps for creating the solution, project,
    and data source that your report will use, so we will not cover these steps again
    here. We will, however, show how to use the same data source properties to connect
    to the health care database where the data for your report reside. The same database
    also contains the stored procedure you created in [Chapter 2](#Chapter02.html#ch2),
    Emp_Svc_Cost, which you will use later in this chapter.'
  trans: '

    # 构建报表


    在上一章中，你通过创建一个查询及后续的存储过程，为你的第一份报表奠定了基础。你也了解了用于构建报表的基本元素，并且现在对设计环境已经熟悉。现在，是时候将所有部分组合起来并开始构建报表了。你可以轻松地将本章介绍的概念应用到任何使用
    SQL Server 和关系数据库系统的公司。本章将主要关注基于 SQL Server 医疗保健数据库的数据创建报表解决方案；它将使用许多自 SSRS 在
    SQL Server 2000 到 2012 版本中诞生以来就可用的报表元素。SSRS 2008 和 2008 R2 引入了许多新功能，例如报表变量、增强的图表和数据可视化。最重要的新增功能是
    `Tablix` 数据区域以及像 `火花线`、`数据条` 和 `指示器` 这样的仪表板风格元素。我们很高兴能将这些重要且期待已久的功能增强纳入本书中展示的报表。


    你将在本章创建的报表称为 `员工服务成本` 报表。该报表将利用相同的查询和存储过程 `Emp_Svc_Cost` 来提供报表数据，这个存储过程你从 第 2
    章 开始就在使用。提醒一下，该查询返回代表为患者执行的服务（例如专业护士或家庭健康助手的出诊）的详细记录。每种类型的服务对于医疗保健公司都有一个关联的成本。这份报表完成后，将根据查询提供的关联数据显示重要的成本点，例如患者的诊断、执行服务的员工、每项服务的日期以及患者的分支机构位置。通过在这些成本点对报表进行分组和排序，你将能够查看从单个患者一直到分支机构位置（可能服务于数百名患者）的服务成本。你将对每一级别进行分组并计算成本金额。


    具体来说，在以下部分中，你将首先使用 `报表向导` 创建 `员工服务成本` 报表（该向导基于预定义的选择生成报表），然后从头开始创建。我们将展示使用向导的过程仅用于演示目的，因此不会继续处理它生成的报表。对于你从头构建的报表，你将添加
    `报表向导` 能够添加的所有功能，以及更多功能。以下列表重点列出了 `员工服务成本` 报表的设计目标：


    *   逐步添加一个基础报表，该报表使用基于你为 `Emp_Svc_Cost` 查询定义的数据集的 `表格` 数据区域。

    *   向报表添加几个基本的格式化元素。

    *   向报表添加交互性，包括文档映射、可见性、超链接操作和交互式排序（在 SSRS 2005 中引入）。文档映射和超链接操作都允许用户导航到报表内或报表外（例如网站）的指定位置。在本章中，你将在报表中使用可见性属性来展开和折叠报表项，从摘要到详细信息。交互式排序赋予了
    SSRS 报表多功能性，允许其进行排序，其方式非常类似于 Microsoft Outlook 允许通过点击列标题进行排序。

    *   通过将数据集从查询更改为参数化存储过程，自动向报表添加参数。你还将添加其他数据集来填充存储过程定义的参数。

    *   学习如何使用修改后的存储过程和 `UDF` 来使用多值参数。

    *   向 `表格` 数据区域添加一个筛选器，以仅显示类型为“就诊”的服务。

    *   向报表添加一个用于前十大诊断的 `图表` 数据区域。

    *   向报表添加一个报表变量（在 2008 版中引入）以用作常量阈值。

    *   向报表添加一个仪表控件以显示阈值信息。

    *   向报表 `表格` 区域添加列分组。`表格` 区域内的列分组是 `表格`、`矩阵` 和 `列表` 数据区域的新 `Tablix` 功能的一部分。`Tablix`
    功能已在 第 4 章 中详细介绍。

    *   为报表添加最后的修饰，例如页眉和页脚、标题以及页码。


    此外，当你开始更深入地使用报表和查询参数时，你将学习如何使用多值参数。正如前面章节所述，多值参数在设计底层查询时需要特殊考虑。因此，在本章中，你将使用修改后的存储过程版本，该版本利用了
    `UDF`；这将教你如何最好地利用此功能。


    在前面的章节中，我们已经介绍了创建你的报表将使用的解决方案、项目和数据源的步骤，因此这里不再重复这些步骤。然而，我们将展示如何使用相同的数据源属性来连接到存储你的报表数据的医疗保健数据库。同一个数据库还包含你在
    第 2 章 创建的存储过程 `Emp_Svc_Cost`，你将在本章后面用到它。

    '
- fmt: '### Creating a Report with the Report Wizard


    In many scenarios, the Report Wizard is a fast method for creating a basic report
    that can be further enhanced before deployment. The Report Wizard is suitable
    for reports that are primarily data listings that do not require much special
    formatting. In this section, you will step through the Report Wizard to create
    the Employee Service Cost report before designing the same report manually.


    To open the Report Wizard in your report project, right-click the `Reports` folder
    in the `Solution Explorer` and select `Add New Report`. The first wizard screen
    defines the data source. For this example, check `New Data Source`; however, you
    also have the choice to use a shared data source that has already been defined
    as part of the project. Supply the same data source information as you did in
    the previous chapter to connect to the `Pro_SSRS` database. The connection string
    should look similar to the following:


    `Data Source=localhost;Initial Catalog=Pro_SSRS`


    The next screen in the wizard defines the query. Paste the query you created in
    [Chapter 2](#Chapter02.html#ch2) into the `Query String` area (see [Figure 6-1](#Chapter06.html#fig_6_1)).
    You can open this query from the `Query` folder in the code download for the book.
    The file is called `Report_Wizard_Query.sql`. Clicking the `Query Builder` button
    launches the graphical query designer.


    ![Image](images/9781430238102_Fig06-01.jpg)


    **Figure 6-1.** Pasting the query in the `Query String` area


    The next screen of the Report Wizard asks whether the report should be in `tabular`
    or `matrix` form. Selecting `Tabular` will trigger the wizard to provide grouping
    information on the next screen; selecting `Matrix` will provide a similar screen
    for rows and columns instead of groups. For this example, select `Tabular`, click
    `Next`, and choose the grouping and detail layout to show `Year` as the primary
    group, with `Month`, `EmployeeClassID`, and `Employee_Name` next. For details,
    you want to see the patient-specific information—`Diagnosis`, `Visit_Count`, `Estimated_Cost`,
    and `Service_Type`—as shown in [Figure 6-2](#Chapter06.html#fig_6_2).


    Once you have grouped the data that will be in the report, the next two screens
    are primarily for formatting. Here, you can specify whether you want the report
    to have a `stepped` or `block` layout, as well as whether the report will include
    subtotals and provide drill-down functionality. You can also choose a custom style
    for the report.


    ![Image](images/9781430238102_Fig06-02.jpg)


    **Figure 6-2.** Report Wizard group and details selections


    For now, choose `Stepped` with `No Drill-Down` functionality and click `Next`.
    On the `Table Style` screen, apply the `Corporate` style to the report, click
    `Next` in the wizard, and change the name from the default, `ReportX`, where `X`
    is the next number in sequence of created reports, to `Employee Cost Report Wizard`.
    Next, check the `Preview Report` box to have the report executed upon creation,
    and then click `Finish` to generate the report. After a few moments, the resultant
    report appears. Although at first glance it appears to need many cosmetic changes,
    such as extending the size of the several columns (e.g., `Employee Name` and `Diagnosis`),
    resetting the background color of the groups to `White`, the font color of `[Year]`
    to `Black`, and formatting the `Estimated Cost` column for currency, the report
    is at least functional. Depending on the desired layout, it could need a good
    deal of work to get it the way you want it. Assuming you accepted one of the default
    styles, this would be a good starting point for modification, as shown in [Figure
    6-3](#Chapter06.html#fig_6_3).


    To take full advantage of the flexibility of `SSRS` and the report design environment
    of `BIDS`, let’s create the same report from scratch.


    ![Image](images/9781430238102_Fig06-03.jpg)


    **Figure 6-3.** Report generated from the Report Wizard


    ### Building Reports from Scratch


    When working with a blank report, the first decision will be to choose which data
    regions to use in the body of the report. This decision is driven mostly by the
    type of data you are working with and by the report audience. For example, a chief
    executive officer (`CEO`) might not be concerned with details, preferring to see
    summary information about the status of the business products and services, and
    therefore would be more inclined to view a matrix report with column and row totals.
    However, in the initial report, you will be working with the `Table` data region
    because you want to show the interrelationships between patients and employees
    with multiple groupings in tabular rows, not columns. The final modification to
    the report that you will build in this chapter will include column and row groupings
    to show you how to incorporate elements of the `Tablix` data region.


    In this section, you will follow specific steps to get your report to a basic
    starting point by adding a `Table` data region, and then you will continue to
    add formatting and functionality. When you are finished, the report will contain
    many `SSRS` features, including interactive drill-down and navigation links, custom
    formatting, interactive sorting, populated drop-down parameters, and a chart that
    displays the top ten diagnoses by cost. You will finish the report by adding several
    design touches, such as page numbers and execution times. You will examine how
    to modify the report to work with multi-value parameters. You will also explore
    another feature added in `SSRS 2008`: report variables. For this project, you
    will add a new report from the `Solution Explorer` and create a dataset that uses
    the same query from the previous section of this chapter for the Report Wizard.
    For simplicity, we have included the starting-point report in the `Pro_SSRS` project.
    The `EmployeeServiceCost_Start` report already has the datasets and initial query
    defined for the `localhost` SQL Server, which should match your environment. You
    will begin by using just the basic query, not the stored procedure. The dataset
    you will use to begin within the `EmployeeServiceCost_Start` report is called
    `Emp_Svc_Cost`. Later, in the “Setting Report Parameters with Stored Procedures”
    section, you will modify the dataset to use the stored procedure and see how the
    parameters defined in the stored procedure will automatically create the report
    parameters.


    In the following sections, you will go through several steps to add functionality
    to a single report. The steps are provided so that you can walk through the process
    of building the report, starting with the `EmployeeServiceCost_Start` report;
    however, at several intervals, you may choose to open one of the several sample
    reports that reflect the completed steps. If a report is available, we will point
    it out in the text.


    With the `EmployeeServiceCost_Start` report open in `BIDS`, move to the `Design`
    tab. The following steps get you to your starting point in the report, where you
    will begin to apply more advanced formatting and logic:'
