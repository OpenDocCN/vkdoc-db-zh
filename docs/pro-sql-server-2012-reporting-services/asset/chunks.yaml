  trans: '## 创建标准订阅


    手动创建订阅的第一步是运行 `Report Manager` 并导航到要为其创建订阅的报告。作为示例，导航到 `Patient Certification
    Listing` 报告，该报告位于报告服务器上的 `Patient Documentation` 文件夹中。将光标悬停在报告上方，直到看到向下箭头，然后单击它以查看选项菜单。从这里，您可以选择
    `Subscribe` 或 `Manage`，然后导航到 `Subscriptions` 选项卡。不过，这次我们将选择 `Subscribe` 以为报告创建新订阅。如果您在安装过程中已正确配置了
    `SMTP` 服务器，您将可以选择 `E-mail` 作为传递选项。如果 `E-mail` 选项不可用，您可以使用 `Reporting Services
    Configuration Manager` 来设置电子邮件，如 图 10-16 所示。`Reporting Services Configuration
    Manager` 可以设置许多与命令行工具相同的、控制报告服务器的属性。`Reporting Services Configuration Manager`
    是一个很好的工具，用于设置可能需要在安装后配置的报告服务器属性，例如报告服务器虚拟目录或用于执行无人参与报告的帐户。您将再次使用 `Reporting Services
    Configuration Manager` 将 `SSRS` 实例加入另一个报告服务器，从而创建报告服务器的 Web 农场以提升性能。现在，请验证 `SMTP`
    设置是否正确。


    ![Image](img/9781430238102_Fig10-16.jpg)


    **图 10-16.** Reporting Services Configuration Manager，电子邮件设置


    通过电子邮件传递的订阅提供标准的传递选项，包括 `抄送`、`密件抄送`、`回复至`、`主题`、`优先级` 和 `注释`（这将是电子邮件正文的内容）。您还可以在电子邮件中发送整个报告、报告的链接或两者。由于将接收此订阅的用户将可以访问报告服务器的网络，因此您可以只发送报告链接。然而，通过电子邮件发送报告本身确实有好处，特别是对于需要离线使用报告的用户，例如出差员工。我们将在下一节中设置数据驱动订阅时进行演示。图
    10-17 显示了报告订阅可用的电子邮件选项。


    ![Image](img/9781430238102_Fig10-17.jpg)


    **图 10-17.** 订阅的电子邮件选项


    ## 配置订阅


    为了提供自动传递系统，我们可以配置 `Reporting Services` 订阅在预定义的计划时间和频率执行。您可以自定义单个报告的日程安排，或基于共享日程安排。`Patient
    Recertification Listing` 报告需要每天传递给工作人员，只要在下一个工作日之前传递，它可以在前一天下午 5:00 之后的任何时间运行。根据我们的需求，除了周六之外每天晚上
    9:30 的日程安排就足够了，如 图 10-18 所示，这是通过单击 `Subscription Processing Options` 下的 `Select
    Schedule` 按钮设置的。


    ![Image](img/9781430238102_Fig10-18.jpg)


    **图 10-18.** 患者认证列表报告的每日日程安排


    进行适当的时间安排修改后，单击 `OK` 保存更改。此报告包含参数，我们将需要为此订阅配置参数。如前所述，此特定报告有一个名为 `Unsigned` 的参数，它是
    `Boolean` 数据类型（`True` 或 `False`），显示已签署和未签署的文档。但是，此报告的订阅者可能只对查看未签署文档感兴趣，因此将 `Unsigned`
    参数设置为 `True`。由于此报告设计为基于单个数据集为参数值提供填充的下拉列表，因此这些值在此处可用，例如填充的 `Branch` 选择，如 图 10-19
    所示。目前，除 `Unsigned` 外，所有参数均保留其默认值。


    ![Image](img/9781430238102_Fig10-19.jpg)


    **图 10-19.** 订阅参数下拉列表


    为了验证订阅是否按预期工作，我们将 `Brian_K_McDonald@sqlbigeek.com` 设为邮件的唯一收件人进行测试。在 图 10-20 中，您可以看到
    `收件人`、`抄送`、`密件抄送` 和 `回复至` 的标准电子邮件选项。在 `收件人` 字段中，添加收件人的电子邮件地址，然后单击 `OK` 添加订阅。验证订阅成功后，通过导航到
    `Report Manager` 中的报告，选择 `Subscriptions`，然后选择 `Edit`，修改订阅的属性以添加真正的订阅者。


    ![Image](img/9781430238102_Fig10-20.jpg)


    **图 10-20.** 为订阅分配收件人


    ## 管理数据驱动订阅


    标准订阅满足了许多公司为其员工和客户设置自定义订阅的需求。然而，您可以使用另一种更灵活的方法来传递报告：数据驱动订阅。数据驱动订阅允许管理员或内容管理器查询数据源（例如
    `SQL Server` 表），以返回符合特定条件的订阅者列表。这是向广泛的订阅者列表传递报告的理想方式。此外，您只需为所有订阅者管理一个订阅，并且这些订阅者可能具有用于生成个性化报告的不同参数。


    我们知道我们希望让客户及其员工能够利用数据驱动订阅，幸运的是，我们很久以前就构建了我们的应用程序数据库，以包含正好用于此目的的员工信息。通过存储员工的电子邮件地址以及其他数据（如地理位置和认证），我们拥有了通过电子邮件向出差员工提供灵活传递系统所需的一切。我们最初的目标员工是临床医生，他们有每日要查看的患者日程安排。大多数临床医生在日常工作中使用笔记本电脑或
    `PDA`。'
- fmt: "# Designing the Subscription Query\n\nThe first step was to redesign a report\
    \ in `SSRS` so that it would provide clinical employees with their daily schedules\
    \ and parameterize it so that it would be employee-specific each time it was executed.\
    \ As part of the data-driven subscription, the report would be processed and delivered\
    \ to employees as both an embedded, printable format such as `PDF` or `WORD`,\
    \ and as a link to connect to the `SSRS` report server if they were online. [Figure\
    \ 10-21](#Chapter10.html#fig_10_21) shows the report we created, Daily Activity.\n\
    \n![Image](images/9781430238102_Fig10-21.jpg)\n\n**Figure 10-21.** Daily Activity\
    \ report\n\nBecause data-driven subscriptions are based on just that, data, a\
    \ query to drive the subscription is essential. It is important to design the\
    \ query to have selective criteria, because `SSRS` delivers a copy of the report\
    \ for every record that is returned from the data source.\n\nFor our recipient\
    \ list, we use the query in [Listing 10-2](#Chapter10.html#list_10_2). Essentially,\
    \ the query returns all employees who have an e-mail address and who also have\
    \ scheduled activities for the day following the date of report execution. The\
    \ report is processed and delivered after hours. It is unusual in our environment\
    \ that an employee’s schedule will change after 9:00 PM, so we set up the report\
    \ to execute at that time.\n\n**Listing 10-2.** T-SQL Query to Return the Subscriber\
    \ List\n\n```sql\nSELECT DISTINCT\n        EmployeeTblid, Email, HWUserLogin,\
    \ ActivityDate\nFROM\n        Employee E (NOLOCK)\n        JOIN Activity A (NOLOCK)\
    \ ON E.EmployeeTblid = A.ProviderID\nWHERE\n        E.Email IS NOT NULL\n    \
    \    AND A.ActivityDate BETWEEN GETDATE() AND GETDATE() + 1\n```\n\nWhen this\
    \ query is executed, the output of the query yields six rows of data, as you can\
    \ see in [Table 10-1](#Chapter10.html#tab_10_1), indicating that six clinicians\
    \ have activities for the next day. You have many ways to format and compare datetime\
    \ values. However, in this case, using the `GETDATE` function to compare the current\
    \ date with the `ActivityDate` field value was the best choice. It was necessary\
    \ to use `BETWEEN` with `GETDATE` because the `ActivityDate` value defaults to\
    \ `00:00:00` for the time value, whereas `GETDATE` returns the current time. The\
    \ comparison values wouldn’t match in a one-to-one comparison.\n\n> **Note** The\
    \ data in the `Activity` table is static and therefore may not work as expected\
    \ when you use the `GETDATE()` function, as there may be no rows to return at\
    \ the time you run the query. You can easily update the activity dates to be reflective\
    \ of your current datetime or change the query itself to go back (n) days where\
    \ n represents the number of days to go back in time.\n\n![Image](images/9781430238102_Tab10-01.jpg)\n\
    \n# Creating the Data-Driven Subscription\n\nNow we will show the procedure for\
    \ creating the data-driven subscription in Report Manager. The Daily Activity\
    \ report is included in the `Pro_SSRS` report project available in the Source\
    \ Code area of the `Apress` Web site. You can deploy the report to any folder\
    \ on your report server for testing the subscription. Make sure when you deploy\
    \ the report that you modify the `Pro_SSRS` data source that is deployed with\
    \ the report so that it stores the credentials on the report server, which is\
    \ required for the subscription to be created. Open the browser, and navigate\
    \ to the Daily Activity report, and from there select click the down arrow and\
    \ select `Manage`. Once you’re on the report properties page, select the `Subscriptions`\
    \ tab on the left. On the toolbar, select `New Data-Driven Subscription`. Follow\
    \ these steps to complete the data-driven subscription:\n\n> 1.  Choose a name,\
    \ delivery method, and data source type.\n> 2.  Choose the data source location\
    \ or define a new data source.\n> 3.  Choose the command or query to return a\
    \ list of recipients.\n> 4.  Choose the settings for the E-mail delivery extension.\n\
    > 5.  Choose the report parameters.\n> 6.  Choose when the subscription will be\
    \ processed.\n> 7.  Set up a schedule for the report.\n\nThe most important of\
    \ these steps is step 4, in which you specify the settings for the delivery extension.\
    \ This is where you’ll use the data from the driving query to instruct `SSRS`\
    \ how to send the subscription. Every selection in step 4 has the option to retrieve\
    \ the value derived from the query used in step 3, which is much more versatile\
    \ than a standard subscription.\n\nYou paste the query into the query box in step\
    \ 3, as you can see in [Figure 10-22](#Chapter10.html#fig_10_22), and verify it\
    \ by clicking the `Validate` button. From this point, the fields you selected\
    \ in the query, namely `EmployeeTblid`, `Email`, `HWUserLogin`, and `ActivityDate`,\
    \ can all be used as criteria in the remaining steps.\n\n![Image](images/9781430238102_Fig10-22.jpg)\n\
    \n**Figure 10-22.** The verified query that drives the subscription\n\nIn step\
    \ 4, several settings control how the report will be sent to subscribers: `To`,\
    \ `Cc`, `Bcc`, `ReplyTo`, `IncludeReport`, `RenderFormat`, `Priority`, `Subject`,\
    \ `Comment`, and `IncludeLink`. For each setting, except `To`, you can choose\
    \ a static value, a database value, or no value, as shown in [Figure 10-23](#Chapter10.html#fig_10_23).\
    \ You assign the `To` field to the `Email` field from the subscription query.\
    \ Leave the values for all the other fields at their default settings and click\
    \ the `Next` button to proceed to Step 5 – Create a data-driven subscription.\
    \ By leaving the defaults, the subscription automatically includes the report\
    \ itself and the link to the report in the e-mail to the subscribers.\n\n![Image](images/9781430238102_Fig10-23.jpg)\n\
    \n**Figure 10-23.** Subscription settings\n\n> **Note** With data-driven subscriptions,\
    \ unlike with standard subscriptions, you can control the rendering format per\
    \ subscriber because it too is a data-driven setting. If you need to control the\
    \ rendering format per user, you can add a field to store this value in the `Employee`\
    \ table and select this value in the query. Also note that the default rendering\
    \ format for subscriptions is a Web archive. For many types of reports, this isn’t\
    \ the ideal choice. Other printable reports are better suited for printed reports,\
    \ such as `Adobe Acrobat PDF`, `Microsoft Word` files or static image files such\
    \ as `TIFF`.\n\nIn step 5, you have the option to specify a static value or a\
    \ value from the database. Since you want the subscription to produce one report\
    \ for every record returned, you’ll select the radio button to get the value from\
    \ the database. The `EmployeeTblid` field is used for the one parameter in the\
    \ report. Because you’ve selected this field in the query and passed this as a\
    \ parameter input, each report is automatically generated with data specific to\
    \ the employee who subscribed to the report. Select `EmployeeTblID` as the value\
    \ to use as the parameter and click the `Next` button. The other field, `HWUserLogin`,\
    \ is put in the driving query, which you’ll ultimately compare to the Windows\
    \ login name of the user executing the report. You can accomplish this, as you’ll\
    \ see in [Chapter 11](#Chapter11.html), by using the `User` global collection.\n\
    \nFor the final step, you create a schedule that processes the report each weeknight\
    \ at 9:30 PM, as described earlier. You can create another shared schedule to\
    \ process the subscription and test it to verify that the e-mail is being delivered\
    \ successfully. After that is complete, you’re finished with the subscription\
    \ configuration."
  raw: '#### Designing the Subscription Query


    The first step was to redesign a report in SSRS so that it would provide clinical
    employees with their daily schedules and parameterize it so that it would be employee-specific
    each time it was executed. As part of the data-driven subscription, the report
    would be processed and delivered to employees as both an embedded, printable format
    such as PDF or WORD, and as a link to connect to the SSRS report server if they
    were online. [Figure 10-21](#Chapter10.html#fig_10_21) shows the report we created,
    Daily Activity.


    ![Image](images/9781430238102_Fig10-21.jpg)


    ***Figure 10-21**. Daily Activity report*


    Because data-driven subscriptions are based on just that, data, a query to drive
    the subscription is essential. It is important to design the query to have selective
    criteria, because SSRS delivers a copy of the report for every record that is
    returned from the data source.


    For our recipient list, we use the query in [Listing 10-2](#Chapter10.html#list_10_2).
    Essentially, the query returns all employees who have an e-mail address and who
    also have scheduled activities for the day following the date of report execution.
    The report is processed and delivered after hours. It is unusual in our environment
    that an employee’s schedule will change after 9:00 PM, so we set up the report
    to execute at that time.


    ***Listing 10-2.** T-SQL Query to Return the Subscriber List*


    `SELECT DISTINCT`

    `        EmployeeTblid, Email, HWUserLogin, ActivityDate`

    `FROM`

    `        Employee E (NOLOCK)`

    `        JOIN Activity A (NOLOCK) ON E.EmployeeTblid = A.ProviderID`

    `WHERE`

    `        E.Email IS NOT NULL`

    `        AND A.ActivityDate BETWEEN GETDATE() AND GETDATE() + 1`


    When this query is executed, the output of the query yields six rows of data,
    as you can see in [Table 10-1](#Chapter10.html#tab_10_1), indicating that six
    clinicians have activities for the next day. You have many ways to format and
    compare datetime values. However, in this case, using the GETDATE function to
    compare the current date with the ActivityDate field value was the best choice.
    It was necessary to use BETWEEN with GETDATE because the ActivityDate value defaults
    to 00:00:00 for the time value, whereas GETDATE returns the current time. The
    comparison values wouldn’t match in a one-to-one comparison.


    ![Image](images/square.jpg) **Note** The data in the Activity table is static
    and therefore may not work as expected when you use the `GETDATE()` function,
    as there may be no rows to return at the time you run the query. You can easily
    update the activity dates to be reflective of your current datetime or change
    the query itself to go back (n) days where n represents the number of days to
    go back in time.


    ![Image](images/9781430238102_Tab10-01.jpg)


    #### Creating the Data-Driven Subscription


    Now we will show the procedure for creating the data-driven subscription in Report
    Manager. The Daily Activity report is included in the Pro_SSRS report project
    available in the Source Code area of the Apress Web site. You can deploy the report
    to any folder on your report server for testing the subscription. Make sure when
    you deploy the report that you modify the Pro_SSRS data source that is deployed
    with the report so that it stores the credentials on the report server, which
    is required for the subscription to be created. Open the browser, and navigate
    to the Daily Activity report, and from there select click the down arrow and select
    Manage. Once you’re on the report properties page, select the Subscriptions tab
    on the left. On the toolbar, select New Data-Driven Subscription. Follow these
    steps to complete the data-driven subscription:


    > 1.  Choose a name, delivery method, and data source type.

    > 2.  Choose the data source location or define a new data source.

    > 3.  Choose the command or query to return a list of recipients.

    > 4.  Choose the settings for the E-mail delivery extension.

    > 5.  Choose the report parameters.

    > 6.  Choose when the subscription will be processed.

    > 7.  Set up a schedule for the report.


    The most important of these steps is step 4, in which you specify the settings
    for the delivery extension. This is where you’ll use the data from the driving
    query to instruct SSRS how to send the subscription. Every selection in step 4
    has the option to retrieve the value derived from the query used in step 3, which
    is much more versatile than a standard subscription.


    You paste the query into the query box in step 3, as you can see in [Figure 10-22](#Chapter10.html#fig_10_22),
    and verify it by clicking the Validate button. From this point, the fields you
    selected in the query, namely EmployeeTblid, Email, HWUserLogin, and ActivityDate,
    can all be used as criteria in the remaining steps.


    ![Image](images/9781430238102_Fig10-22.jpg)


    ***Figure 10-22.** The verified query that drives the subscription*


    In step 4, several settings control how the report will be sent to subscribers:
    To, Cc, Bcc, ReplyTo, IncludeReport, RenderFormat, Priority, Subject, Comment,
    and IncludeLink. For each setting, except To, you can choose a static value, a
    database value, or no value, as shown in [Figure 10-23](#Chapter10.html#fig_10_23).
    You assign the To field to the Email field from the subscription query. Leave
    the values for all the other fields at their default settings and click the Next
    button to proceed to Step 5 – Create a data-driven subscription. By leaving the
    defaults, the subscription automatically includes the report itself and the link
    to the report in the e-mail to the subscribers.


    ![Image](images/9781430238102_Fig10-23.jpg)


    ***Figure 10-23.** Subscription settings*


    ![Image](images/square.jpg) **Note** With data-driven subscriptions, unlike with
    standard subscriptions, you can control the rendering format per subscriber because
    it too is a data-driven setting. If you need to control the rendering format per
    user, you can add a field to store this value in the Employee table and select
    this value in the query. Also note that the default rendering format for subscriptions
    is a Web archive. For many types of reports, this isn’t the ideal choice. Other
    printable reports are better suited for printed reports, such as Adobe Acrobat
    PDF, Microsoft Word files or static image files such as TIFF.


    In step 5, you have the option to specify a static value or a value from the database.
    Since you want the subscription to produce one report for every record returned,
    you’ll select the radio button to get the value from the database. The EmployeeTblid
    field is used for the one parameter in the report. Because you’ve selected this
    field in the query and passed this as a parameter input, each report is automatically
    generated with data specific to the employee who subscribed to the report. Select
    EmployeeTblID as the value to use as the parameter and click the Next button.
    The other field, HWUserLogin, is put in the driving query, which you’ll ultimately
    compare to the Windows login name of the user executing the report. You can accomplish
    this, as you’ll see in [Chapter 11](#Chapter11.html), by using the User global
    collection.


    For the final step, you create a schedule that processes the report each weeknight
    at 9:30 PM, as described earlier. You can create another shared schedule to process
    the subscription and test it to verify that the e-mail is being delivered successfully.
    After that is complete, you’re finished with the subscription configuration.'
  trans: "\n# 设计订阅查询\n\n第一步是重新设计一个`SSRS`报表，使其能够为临床员工提供每日日程安排，并对其进行参数化处理，以便每次执行时都能根据特定员工进行定制。作为数据驱动订阅的一部分，该报表将被处理并以可嵌入、可打印的格式（如`PDF`或`WORD`）发送给员工，如果他们在线，也会提供一个连接到`SSRS`报表服务器的链接。图\
    \ 10-21 展示了我们创建的报表——“每日活动”。\n\n![Image](img/9781430238102_Fig10-21.jpg)\n\n**图\
    \ 10-21.** 每日活动报表\n\n由于数据驱动订阅正是基于数据，因此一个驱动订阅的查询至关重要。设计查询时包含选择性条件非常重要，因为`SSRS`会为数据源返回的每条记录交付一份报表副本。\n\
    \n对于我们的收件人列表，我们使用清单 10-2 中的查询。本质上，该查询返回所有拥有电子邮件地址且在报表执行日期的次日有已安排活动的员工。该报表在下班后进行处理和交付。在我们的环境中，员工的日程在晚上\
    \ 9 点之后变更并不常见，因此我们将报表设置为在该时间执行。\n\n**清单 10-2.** 用于返回订阅者列表的 T-SQL 查询\n\n```sql\n\
    SELECT DISTINCT\n        EmployeeTblid, Email, HWUserLogin, ActivityDate\nFROM\n\
    \        Employee E (NOLOCK)\n        JOIN Activity A (NOLOCK) ON E.EmployeeTblid\
    \ = A.ProviderID\nWHERE\n        E.Email IS NOT NULL\n        AND A.ActivityDate\
    \ BETWEEN GETDATE() AND GETDATE() + 1\n```\n\n当这个查询执行时，其输出会产生六行数据，如表 10-1 所示，这表明有六位临床医生在次日有活动。格式化和比较日期时间值的方法有很多。然而，在本例中，使用\
    \ `GETDATE` 函数将当前日期与 `ActivityDate` 字段值进行比较是最佳选择。有必要使用 `BETWEEN` 和 `GETDATE`，因为\
    \ `ActivityDate` 值的时间部分默认为 `00:00:00`，而 `GETDATE` 返回的是当前时间。这两种值在一对一比较时无法匹配。\n\n\
    > **注意** `Activity` 表中的数据是静态的，因此在使用 `GETDATE()` 函数时可能无法按预期工作，因为在您运行查询时可能没有行可以返回。您可以轻松地更新活动日期以反映您当前的日期时间，或者修改查询本身，使其回退\
    \ (n) 天，其中 n 代表要回退的天数。\n\n![Image](img/9781430238102_Tab10-01.jpg)\n\n# 创建数据驱动订阅\n\
    \n现在我们将展示在报表管理器中创建数据驱动订阅的过程。“每日活动”报表包含在 `Pro_SSRS` 报表项目中，该项目可在 `Apress` 网站的源代码区下载。您可以将该报表部署到报表服务器上的任何文件夹中以测试订阅。部署报表时，请确保修改随报表一起部署的\
    \ `Pro_SSRS` 数据源，使其将凭据存储在报表服务器上，这是创建订阅所必需的。打开浏览器，导航到“每日活动”报表，然后从那里单击向下箭头并选择 `管理`。进入报表属性页面后，在左侧选择\
    \ `订阅` 选项卡。在工具栏上，选择 `新建数据驱动订阅`。按照以下步骤完成数据驱动订阅：\n\n> 1.  选择名称、传递方法和数据源类型。\n> 2.\
    \  选择数据源位置或定义新数据源。\n> 3.  选择用于返回收件人列表的命令或查询。\n> 4.  选择电子邮件传递扩展插件的设置。\n> 5.  选择报表参数。\n\
    > 6.  选择订阅的处理时间。\n> 7.  为报表设置计划。\n\n其中最重要的步骤是第 4 步，您需要在其中指定传递扩展插件的设置。在这里，您将使用驱动查询中的数据来指示\
    \ `SSRS` 如何发送订阅。第 4 步中的每个选项都有一个设置，可以选择从第 3 步使用的查询中检索派生的值，这比标准订阅灵活得多。\n\n在第 3 步中，您将查询粘贴到查询框中，如图\
    \ 10-22 所示，并通过单击 `验证` 按钮进行验证。从这时起，您在查询中选择的字段，即 `EmployeeTblid`、`Email`、`HWUserLogin`\
    \ 和 `ActivityDate`，都可以在后续步骤中用作条件。\n\n![Image](img/9781430238102_Fig10-22.jpg)\n\
    \n**图 10-22.** 驱动订阅的已验证查询\n\n在第 4 步中，有几个设置控制报表如何发送给订阅者：`收件人`、`抄送`、`密件抄送`、`回复至`、`包含报表`、`呈现格式`、`优先级`、`主题`、`注释`和`包含链接`。对于每个设置（`收件人`\
    \ 除外），您都可以选择静态值、数据库值或无值，如图 10-23 所示。您将 `收件人` 字段分配给订阅查询中的 `Email` 字段。将所有其他字段的值保留为其默认设置，然后单击\
    \ `下一步` 按钮继续进入步骤 5 - 创建数据驱动订阅。保留默认设置后，订阅会自动在给订阅者的电子邮件中包含报表本身以及报表的链接。\n\n![Image](img/9781430238102_Fig10-23.jpg)\n\
    \n**图 10-23.** 订阅设置\n\n> **注意** 与标准订阅不同，通过数据驱动订阅，您可以控制每个订阅者的呈现格式，因为它也是一个数据驱动的设置。如果您需要按用户控制呈现格式，可以在\
    \ `Employee` 表中添加一个字段来存储此值，并在查询中选择此值。另请注意，订阅的默认呈现格式是 Web 存档。对于许多类型的报表来说，这不是理想的选择。其他可打印报表更适合用于打印，例如\
    \ `Adobe Acrobat PDF`、`Microsoft Word` 文件或静态图像文件，如 `TIFF`。\n\n在第 5 步中，您可以选择指定静态值或来自数据库的值。由于您希望订阅为返回的每条记录生成一份报表，您将选择单选按钮以从数据库获取值。`EmployeeTblid`\
    \ 字段用于报表中的一个参数。因为您已在查询中选择了此字段并将其作为参数输入传递，所以每个报表都会自动生成特定于订阅该报表的员工的数据。选择 `EmployeeTblID`\
    \ 作为参数要使用的值，然后单击 `下一步` 按钮。另一个字段 `HWUserLogin` 被放入驱动查询中，您最终会将其与执行报表的用户的 Windows\
    \ 登录名进行比较。如您将在第 11 章 中看到的，这可以通过使用 `User` 全局集合来实现。\n\n对于最后一步，您创建一个计划，如前所述，在每个工作日晚上\
    \ 9:30 处理报表。您可以创建另一个共享计划来处理订阅，并进行测试以验证电子邮件是否成功传递。完成此操作后，订阅配置即告完成。\n"
- fmt: '### Performing Execution Auditing and Performance Analysis


    As you deploy SSRS between development, test, and production environments, you''ll
    find that gauging performance involves a variety of benchmarking and analysis
    tools. Based on the performance analysis, administrators are armed with the knowledge
    of what stress levels their servers can endure, and they’ll be able to configure
    the environment accordingly. We’ll show how to put the components of your SSRS
    deployment to the test and show how to analyze the output using standard tools.


    ![Image](images/square.jpg) **Note** The SSRS 2008 release brought us a redesigned
    reporting engine, with its memory management features enhanced by removing the
    reliance on IIS that prior versions of SSRS suffered. With that release, both
    Web and Windows services were combined into one Windows service.


    Many agencies need to monitor and archive the details of user activity. This is
    especially important if you suspect there’s undesired access to data. SSRS provides
    a built-in logging feature that captures several key pieces of information. This
    information is useful in two ways:


    > *   You can capture performance information about the reports, such as the processing
    duration and record count.

    > *   You can capture security information, such as who executed the report and
    whether or not they were successful.


    The first goal in the following sections is to set up and extend the built-in
    logging functionality of SSRS using tools provided in the SSRS installation. You’ll
    need to log all activity so that you can pinpoint the reports and users who are
    most impacting the server. We have created a custom SSRS report, Report Execution
    Log, which will deliver the logging statistics to administrators and contain dynamic
    column groupings based on a report parameter. We’ll show how you can use this
    report for your SSRS deployment.


    The second goal in the following sections is to show how to perform benchmarking
    tests on the SSRS servers in our test Web farm to ensure there won’t be any unexpected
    performance problems when SSRS is deployed to a production environment. We’ll
    show how to work with a Web application stress-test utility called Application
    Center Test (ACT) to gauge performance.


    #### Configuring SSRS Logging


    Getting to the execution log information in SSRS is a fairly straightforward procedure.
    It consists of a main table in the SSRS database called, appropriately enough,
    `ExecutionLogStorage`. When SSRS is installed by default, execution logging is
    enabled and set to maintain 60 days of logging. After 60 days, the log entries
    older than 60 days are removed from the table automatically. However, you do have
    the option to change the duration by connecting to the instance of SSRS using
    `SSMS`, then right clicking the server and selecting `Properties`. After the Server
    Properties windows comes up, navigate to the Logging tab. [Figure 10-24](#Chapter10.html#fig_10_24)
    shows the settings if you wanted to change the number of days to hold 365 days
    rather than the default 60 days.


    With the execution details being stored and being that one of the aims is to build
    a custom SSRS report to deliver report execution information to administrators,
    you’ll need to be able to query the log data. Fortunately for us, Microsoft has
    created three views that utilize the execution details to make it easy to determine
    information such as the user executing the report, duration a report took to process
    or render and even if it was executed interactively or via a subscription. The
    three views in the `ReportServer` database are `ExecutionLog`, `ExecutionLog2`,
    and `ExecutionLog3`. We will utilize these views as a basis for our administrative
    report.


    ![Image](images/9781430238102_Fig10-24.jpg)


    ***Figure 10-24.** Report Server Property execution log settings*


    #### Transforming the ExecutionLog Table


    Setting up SSRS to transform the logging data is a simple step-by-step procedure.
    Over the last several years, we have created many solutions to transfer and store
    the execution data into a historical database so that we do not lose any of the
    execution details when SSRS removes it from the database. One such solution is
    to use a SQL Server Integration Services (`SSIS`) package to transfer the execution
    history on a daily basis. As part of the `Pro_SSRS` solution, we have included
    a `SSIS` project with a single package called `Pro_SSRS_Load_ExecutionLog.dtsx`.
    Furthermore, as part of the download is the `Pro_SSRSExecutionLog` database. You
    will need to have this database restored in order for the `Pro_SSRS_Load_ExecutionLog`
    package and the reports created in this chapter to run. See the `ReadMe.txt` file
    for detailed instructions on how to restore the `Pro_SSRSExecutionLog` database.
    You can download the `Pro_SSRS` project from the Source Code/Download section
    of the Apress Web site ([`www.apress.com`](http://www.apress.com)).


    The `Pro_SSRS_Load_ExecutionLog` package is pretty straightforward. At the top
    of the package, we just check for the existence of the database and if it does
    not exist, it branches to a statement that creates the database, a table for archiving
    the Execution log and loads it with all records up to yesterday. If the database
    already exists and the records are not already present in the database, then all
    of those records are pulled into the archival database from the `ReportServer`
    database. Upon scheduling this package on a nightly basis, it will get the data
    for the prior day. [Figure 10-25](#Chapter10.html#fig_10_25) shows the package
    results after completing a day’s load when run interactively in the development
    environment.


    ![Image](images/9781430238102_Fig10-25.jpg)


    ***Figure 10-25.** Pro_SSRS_Load_ExecutionLog SSIS package*


    ![Image](images/square.jpg) **Tip** Note that the package needs to be executed
    regularly to keep the transformed log data current. In our situation, we created
    a scheduled job for this purpose that runs the `SSIS` package every evening.


    Microsoft provides a set of sample reports that you can use with the `ExecutionLog`
    database. These reports are included in the SQL Server 2008 installation in the
    following location: `Samples\Reporting Services\Report Samples\Server Management
    Sample Reports\Execution Log Sample Reports`. The sample reports are useful for
    giving administrators information, such as report execution by user and report
    size, among other things. You will find three SSRS execution log sample reports
    in all. One of these, `Execution Summary`, is shown in [Figure 10-26](#Chapter10.html#fig_10_26).


    In prior releases of SSRS, Microsoft has provided a set of sample reports that
    you can use to report data from the `ReportServer` database in conjunction with
    an `SSIS` package that can be used to transfer the data. However, as of today,
    no new version has been created for the 2012 release. As such, we have created
    a sample `Execution Summary` report that gives us a few meaningful metrics that
    our administrators want to keep an eye on. Some of those metrics include total
    number of executions, successful executions, failed executions, and number of
    executions by day number of the month.


    ![Image](images/9781430238102_Fig10-26.jpg)


    ***Figure 10-26.** Execution Summary sample report*'
