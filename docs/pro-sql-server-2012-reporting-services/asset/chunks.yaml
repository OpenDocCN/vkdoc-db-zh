- fmt: "```sql\nIF EXISTS (SELECT * FROM INFORMATION_SCHEMA.ROUTINES\n           \
    \    WHERE ROUTINE_NAME = 'Emp_Svc_Cost'\n               AND ROUTINE_SCHEMA =\
    \ 'dbo')\n        DROP PROCEDURE dbo.Emp_Svc_Cost\nGO\nCREATE PROCEDURE [dbo].[Emp_Svc_Cost]\n\
    (\n        @ServiceMonth INT = NULL\n        , @ServiceYear INT = NULL\n     \
    \   , @BranchID INT = NULL\n        , @EmployeeTblID INT = NULL\n        , @ServicesLogCtgryID\
    \ CHAR(5) = NULL\n)\nAS\nSELECT    \n        T.PatID\n        , RTRIM(RTRIM(P.LastName)\
    \ + ', ' + RTRIM(P.FirstName)) AS [Patient Name]\n        , B.BranchName\n   \
    \     , E.EmployeeID\n        , RTRIM(RTRIM(E.LastName) + ', ' + RTRIM(E.FirstName))\
    \ AS [Employee Name]\n        , E.EmployeeClassID\n        , SLC.Service AS [Service\
    \ Type]\n        , SUM(CI.Cost) AS [Estimated Cost]\n        , COUNT(T.ServicesTblID)\
    \ AS Visit_Count\n        , D.Dscr AS Diagnosis\n        , DATENAME(mm, T.ChargeServiceStartDate)\
    \ AS [Month]\n        , DATEPART(yy, T.ChargeServiceStartDate) AS [Year]\n   \
    \     , S.ServiceTypeID\n        , T.ChargeServiceStartDate\nFROM\n        Trx\
    \ AS T\n        INNER JOIN Branch AS B ON T.Branchid = B.BranchID\n        INNER\
    \ JOIN ChargeInfo AS CI ON T.ChargeInfoID = CI.ChargeInfoID\n        INNER JOIN\
    \ Patient AS P ON T.PatID = P.PatID\n        INNER JOIN Services AS S ON T.ServicesTblID\
    \ = S.ServicesTblID\n        INNER JOIN ServicesLogCtgry AS SLC ON S.ServicesLogCtgryID\
    \ = SLC.ServicesLogCtgryID\n        INNER JOIN Employee AS E ON CI.EmployeeTblID\
    \ = E.EmployeeTblID\n        INNER JOIN Diag AS D ON CI.DiagTblID = D.DiagTblID\n\
    WHERE\n        (T.TrxTypeID = 1)\n        AND (ISNULL(B.BranchID,0) = ISNULL(@BranchID,ISNULL(B.BranchID,0)))\n\
    \        AND (ISNULL(S.ServicesLogCtgryID,0) = ISNULL(@ServicesLogCtgryID,\n \
    \               ISNULL(S.ServicesLogCtgryID,0)))\n        AND (ISNULL(E.EmployeeTblID,0)\
    \ = ISNULL(@EmployeeTblID,\n        ISNULL(E.EmployeeTblID,0)))\n        AND\n\
    \       --Determine if Year and Month was passed in\n        ((CAST(DATEPART(yy,\
    \ T.ChargeServiceStartDate) AS INT) = @ServiceYear\n                AND @ServiceYear\
    \ IS NOT NULL)\n                OR @ServiceYear IS NULL)\n        AND\n      \
    \  ((CAST(DATEPART(mm, T.ChargeServiceStartDate) AS INT) = @ServiceMonth\n   \
    \             AND @ServiceMonth IS NOT NULL)\n                OR @ServiceMonth\
    \ IS NULL)\nGROUP BY\n        SLC.Service\n        , D.Dscr\n        , T.PatID\n\
    \        , B.BranchName\n        , RTRIM(RTRIM(P.LastName) + ', ' + RTRIM(P.FirstName))\n\
    \        , RTRIM(RTRIM(E.LastName)  + ', ' + RTRIM(E.FirstName))\n        , E.EmployeeClassid\n\
    \        , E.EmployeeID\n        , DATENAME(mm, T.ChargeServiceStartDate)\n  \
    \      , DATEPART(yy, T.ChargeServiceStartDate)\n        , S.ServiceTypeID\n \
    \       , T.ChargeServiceStartDate\nORDER BY\n        T.PatID\nGO\n```\n\n## Using\
    \ ISNULL to Evaluate the Parameters\n\nIn the previous query, you added several\
    \ new criteria to the `WHERE` clause for evaluating the parameters. One of those\
    \ criteria was the `ISNULL` function, used to evaluate the values of the database\
    \ fields and parameters.\n\n```sql\n(ISNULL(B.BranchID,0) = ISNULL(@BranchID,ISNULL(B.BranchID,0)))\n\
    AND\n((CAST(DATEPART(yy, T.ChargeServiceStartDate) AS INT) = @ServiceYear\n  \
    \              AND @ServiceYear IS NOT NULL)\n                OR @ServiceYear\
    \ IS NULL)\n        AND\n        ((CAST(DATEPART(mm, T.ChargeServiceStartDate)\
    \ AS INT) = @ServiceMonth\n                AND @ServiceMonth IS NOT NULL)\n  \
    \              OR @ServiceMonth IS NULL)\n```\n\nAt first, the logic for these\
    \ evaluations might seem a bit confusing, but remember that as long as the criteria\
    \ are equal, results are returned. This is true through the entire `WHERE` clause\
    \ because it’s evaluated with `AND`. This is easier to understand with the following\
    \ sample statement:\n\n```sql\nSELECT * from Table1 WHERE 1 = 1\n```\n\nIn this\
    \ statement, all rows are returned, because 1 always equals 1. It doesn’t matter\
    \ that you aren’t comparing values from the table itself.\n\nFor the `ISNULL`\
    \ function, you look to see whether the value of a database field—`BranchID`,\
    \ for example—contains a `NULL` value, and if so, `ISNULL` replaces `NULL` with\
    \ zero. The right side of that equation looks to see whether the `@BranchID` parameter\
    \ was passed in as `NULL`; if so, then the value for `@BranchID` is set to the\
    \ value of `BranchID` in the database table and equals every row. If the `@BranchID`\
    \ parameter is passed to the stored procedure as a value—say, 2 for the branch\
    \ Grid Iron—then only `BranchID` 2 is returned because `BranchID` = `@BranchID`\
    \ = 2. This evaluation is performed when there might be `NULL` values in the field\
    \ because `NULL` values can’t be compared with standard operators such as `=`.\n\
    \nFor the two time values, Service Year and Month, you use similar logic. If the\
    \ parameters `@ServiceMonth` and `@ServiceYear` are passed in as `NULL` to the\
    \ stored procedure, then the stored procedure returns every record. If the parameters\
    \ contain legitimate values, such as 2009 for the year, the `WHERE` clause applies\
    \ a filter when the parameter value equals the database value.\n\n## Query Performance\
    \ and Indexes\n\nWhile we’re talking about designing efficient queries, there\
    \ are many things that DBAs can do for a table to increase query performance.\
    \ To list a few problems, statistics can get out of date, and indexes (where there\
    \ are any on a table) can become fragmented or insufficient. Each of these will\
    \ affect query performance in different ways, but always in the wrong way—a query\
    \ from a poorly designed or badly designed table will always take longer to execute\
    \ than on from a table that is well designed and maintained.\n\nYou may not have\
    \ appropriate permissions to manage indexes, but one thing you can do is to design\
    \ a query to use the indexes that do exist. Here are a few tips to help you increase\
    \ performance and decrease the time it takes to return results to your reports.\n\
    \n*   `SELECT`: Only return the columns that are absolutely needed in your reports.\n\
    *   `JOIN`: Only join tables that you need and use existing indexed columns in\
    \ join conditions.\n*   `WHERE`: Use indexed columns in the order in which they\
    \ are defined and eliminate the use of the `LIKE` operator using the wildcard\
    \ (%) in front of the filtered value.\n\nIf your query is not performing as well\
    \ as you would like, you may be able to ask your DBAs to run some performance\
    \ checks on the table(s) that you are using in your query. They may just need\
    \ to modify existing indexes to include the columns used in your queries. The\
    \ cure could even be as simple as creating a maintenance plan on the database\
    \ to update the statistics. Either way, try to use these tips when writing your\
    \ queries. Performance-tuning queries is a large subject and many books are available\
    \ to help you write optimized queries, such as *SQL Server 2012 Query Performance\
    \ Tuning* by Grant Fritchey (Apress 2012).\n\n## Column and Table Aliasing\n\n\
    Column and table aliasing does not actually make your queries run more efficiently.\
    \ However, it does make them easier to read and quicker to write. Aliasing lets\
    \ you use an abbreviated (or more descriptive) label for columns and tables. This\
    \ way, you don’t have to type out the entire name of a table every time you use\
    \ a column from it, or you can assign a more appropriate name for a column. Using\
    \ the `AS` keyword, we tell SQL Server to alias the field or table as some other\
    \ label.\n\n```sql\nSELECT\n…\n, DATENAME(mm, T.ChargeServiceStartDate) AS [Month]\n\
    …\nINNER JOIN ServicesLogCtgry AS SLC ON S.ServicesLogCtgryID = SLC.ServicesLogCtgryID\n\
    ```\n\nThis statement uses the `DATENAME` function to alias the `Trx` table’s\
    \ `ChargeServicesStartDate` as the Month. The next line shows how you can alias\
    \ a table named `ServicesLogCtgry` so you can refer to it as `SLC`. This way,\
    \ whenever you need a column from the `ServicesLogCtgry` table, you can reference\
    \ the alias followed by a period, then the column name."
