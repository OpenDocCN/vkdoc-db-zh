    \ `WebBrowser` 控件的大小，使其从窗体的两侧延伸到窗体底部。\n> 4.  现在添加一个文本框，并将其命名为 `reportURL`。在文本框之后，添加一个名为\
    \ `reportRun` 的按钮，并将按钮文本设置为 `Run`。\n\n你现在应该拥有一个看起来像 `图 9-1` 的窗体。\n\n![Image](img/9781430238102_Fig09-01.jpg)\n\
    \n**`图 9-1.`** `ViewerWBC.cs` 窗体\n\n##### 为查看器窗体编写代码\n\n要编写查看器窗体的代码，你将添加必要的代码来使用此自定义报告查看器呈现\
    \ SSRS 2012 报告。你需要向按钮的点击事件添加一些代码，以确保你可以浏览并查看现有报告。确保 `ViewerWBC.cs` 窗体在设计视图中打开，然后双击\
    \ `Run` 按钮。这将创建一个空方法来处理按钮的点击事件。将 `代码清单 9-1` 中的代码添加到你的 `reportRun_Click` 方法中。\n\
    \n**`代码清单 9-1.`** `reportRun` 点击事件：浏览到 URL\n\n```\nprivate void reportRun_Click(object\
    \ sender, EventArgs e)\n{\n    webBrowser.Navigate(reportURL.Text);\n}\n```\n\n\
    现在在调试模式下运行项目。当窗体显示时，在文本框中输入以下 URL：\n\n`http://localhost/reportserver/?/Pro_SSRS/Chapter_9/EmployeeServiceCost&rs:Command=Render`\n\
    \n现在单击 `Run`。这将呈现“Employee Service Cost”报告。一旦报告开始在 Web 浏览器对象中呈现，系统将提示你提供参数。你可能还需要将上述\
    \ URL 中的 `localhost` 替换为你的报告服务器的名称。此时，你应该会看到类似 `图 9-2` 的内容。\n\n![Image](img/9781430238102_Fig09-02.jpg)\n\
    \n**`图 9-2.`** 运行“Employee Service Cost”报告的 SSRS Viewer WBC 应用程序\n\n接下来，我们将添加一些代码，以便在程序启动时在\
    \ URL 文本框中设置一个包含报告路径的默认字符串，这样你就不必每次都键入它。右键单击你的 `ViewerWBC.cs` 文件并选择“查看代码”，以打开你需要添加此代码的部分。\n\
    \n```\npublic ViewerWBC()\n{\n    InitializeComponent();\n    // 为示例方便设置初始 URL\n\
    \    reportURL.Text = \"http://localhost/reportserver/?/Pro_SSRS/Chapter_9/EmployeeServiceCost&rs:Command=Render\"\
    ;\n```\n\n这是一个非常简单的应用程序，使用了每个用户的客户端上都应可用的简单控件。你可以将这种类型的查看器与我们讨论过的 URL 命令结合使用，将自定义报告查看器包含在你可能构建的任何应用程序中。接下来，我们将使用一个不太常见但更强大的控件将我们的\
    \ SSRS 报告集成到 Windows 窗体或 ASP.NET 项目中。\n"
- fmt: "## 使用 Report Viewer 控件构建报表查看器\n\n现在，您将学习如何使用 Report Viewer 控件来呈现相同的员工服务成本报告。这很可能是呈现服务器端报告最受欢迎的方法，并且它还能够基于\
    \ RDL 在本地呈现报告，而无需报告服务器。\n\n您可以使用两种 Report Viewer 控件：一种用于 Windows 窗体应用程序，另一种用于\
    \ ASP.NET 应用程序。这些控件使您能够更轻松地为 Windows 或 ASP.NET 应用程序添加丰富的报告功能。这些控件提供了 URL 呈现方法的能力，但通过在代码中以\
    \ Report Viewer 控件的属性设置大多数选项，使其更易于实现。换句话说，您不需要将它们包含在作为 URL 传递的字符串中。使用控件的另一个主要优点是，在\
    \ Visual Studio 2010 IDE 中，您可以获得所有选项的完整 IntelliSense 支持。\n\n[表 9-5](#Chapter09.html#tab_9_5)\
    \ 列出了 Report Viewer 控件的一些关键属性和方法。\n\n![Image](images/tab_9_5.jpg)\n\n![Image](images/square.jpg)\
    \ **注意** 有关 Report Viewer 控件成员以及控件附带的其他属性、方法和事件的更多信息，请参阅 Visual Studio 2010 帮助。\n\
    \n在本示例中，我们将介绍如何使用 Windows 窗体版本的 Report Viewer 控件。\n\n![Image](images/square.jpg)\
    \ **注意** 在“使用报表服务器 Web 服务”部分，我们将展示如何扩展应用程序，使其使用 Report Server Web 服务调用来查询报告服务器，以获取报告可以接受的参数以及每个参数可能的值。我们将展示如何使用这些参数为\
    \ Windows 窗体应用程序的用户创建下拉列表，然后呈现报告。\n\n#### 创建查看器表单\n\n要在 C# 中创建查看器表单，您将首先通过执行以下步骤向解决方案添加一个新项目：\n\
    \n> 1.  从菜单中选择 **文件** ![Image](images/U004.jpg) **添加** ![Image](images/U004.jpg)\
    \ **新建项目**。\n> 2.  在“新建项目”对话框中，选择 **Visual C#** ![Image](images/U004.jpg) **Windows**\
    \ ![Image](images/U004.jpg) **Windows 窗体应用程序**。将其命名为 `SSRS Viewer RVC`。\n> 3.\
    \  创建项目后，您将使用将创建报表查看器的窗体：\n> 4.  将刚刚创建的默认窗体重命名为 `ViewerRVC.cs`。\n> 5.  在解决方案资源管理器中双击\
    \ `ViewerRVC.cs` 文件，在设计模式下打开它。\n> 6.  将空白窗体的大小调整为大约 800×600 像素，并在属性部分将窗体的文本更改为\
    \ `SSRS Viewer RVC`。\n> 7.  从工具箱的“Reporting”部分将 Report Viewer 控件添加到窗体。在属性中将控件命名为\
    \ `reportViewer`，并将其锚定到窗体的顶部、底部、左侧和右侧。调整控件的大小以填充窗体，但要在顶部留出空间放置更多组件。（如果您没有报表查看器控件，可能需要从以下网址下载：`www.microsoft.com/download/en/details.aspx?id=6610`）\n\
    > 8.  现在添加一个文本框，命名为 `reportURL`，紧接着文本框添加三个按钮，分别命名为 `runServer`、`runLocal` 和 `getParameters`。将它们的\
    \ `Text` 属性分别设置为 `Run Server`、`Run Local` 和 `Parameters`。\n\n您现在应该有一个看起来像[图 9-3](#Chapter09.html#fig_9_3)\
    \ 的窗体。\n\n![Image](images/square.jpg) **注意** 在 Visual Studio 2010 中，您需要使用 .NET\
    \ Framework 3.5 或更高版本才能在 IDE 中获得 `ReportViewer` 控件。如果使用任何更早的版本，您将无法从工具箱中将查看器添加到项目中。\n\
    \n现在，您将开始添加使用新的 Report Viewer 控件来呈现 SSRS 2012 报告所需的代码。\n\n![Image](images/9781430238102_Fig09-03.jpg)\n\
    \n***图 9-3.** ViewerRVC.cs 窗体*\n\n#### 编写查看器表单代码\n\n首先，将新的命名空间 `Microsoft.Reporting.WinForms`\
    \ 的 `using` 语句添加到类顶部的其他命名空间声明中。这样做将允许您访问该命名空间的成员，而无需在每次使用来自该命名空间的方法或属性时键入完整的命名空间。右键单击\
    \ `ViewerRVC.cs` 文件并选择“查看代码”，将此 `using` 语句添加到文件中。\n\n```\nusing Microsoft.Reporting.WinForms;\n\
    ```\n\n其次，将[清单 9-2](#Chapter09.html#list_9_2) 中显示的代码添加到“Run Server”按钮的 `Click`\
    \ 事件中。确保 `ViewerRVC.cs` 窗体在设计视图中打开，然后双击“Run Server”按钮。这将创建一个空方法来处理按钮的 `Click`\
    \ 事件。\n\n***清单 9-2.** runServer 点击事件：在远程模式下运行报告*\n\n```\nprivate void runServer_Click(object\
    \ sender, EventArgs e) {\n    reportURL.Text = \"/Pro_SSRS/Chapter_9/EmployeeServiceCost\"\
    ;\n    reportViewer.ProcessingMode = ProcessingMode.Remote;\n    reportViewer.ServerReport.ReportServerUrl\
    \ = new Uri(@\"http://localhost/reportserver/\");\n    reportViewer.ServerReport.ReportPath\
    \ = reportURL.Text;\n    reportViewer.RefreshReport();\n}\n```\n\n现在以调试模式运行项目。然后单击“Run\
    \ Server”。这将呈现员工服务成本报告，您可以在其中输入报告的参数。当然，您需要在[清单 9-2](#Chapter09.html#list_9_2)\
    \ 中看到 `localhost` 的地方使用您的报告服务器的名称。此时，您应该看到类似[图 9-4](#Chapter09.html#fig_9_4) 的内容。\n\
    \n![Image](images/9781430238102_Fig09-04.jpg)\n\n***图 9-4.** SSRS Viewer RVC 运行服务器呈现的报告*\n\
    \n这就是使用 Report Viewer 控件在 SSRS 2012 服务器上呈现报告的全部内容。\n\n### 本地呈现报告\n\n我们现在将介绍如何在不使用\
    \ SSRS 2012 服务器的情况下在本地呈现报告。这有点复杂，因为您需要负责用报告所需的数据填充数据源。但是，它确实为开发人员提供了极大的灵活性，因为您可以在没有服务器的情况下使用\
    \ SSRS 2012 报告功能。\n\n![Image](images/square.jpg) **注意** 服务器和本地报表定义文件并非 100% 兼容。这意味着无法将同一个\
    \ RDL 源文件同时用于本地和远程使用。实际上，您会注意到，默认情况下，用于服务器端或远程处理的报告创建时使用 `.rdl` 扩展名，而用于客户端或本地处理的报告创建时使用\
