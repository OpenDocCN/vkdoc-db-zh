- fmt: '### Summary


    SSRS 2012 provides many tools for management tasks, and we covered several of
    them in this chapter. Because SSRS 2012 is a full reporting solution, administrators
    may find it difficult to manage the entire site single-handedly without some level
    of automation or divided tasks, especially as the number of reports and other
    objects such as data sources, folders, and subscriptions grow. Maintaining these
    objects, whether it be to update the report via `Report Manager` or to mass deploy
    reports via a custom application, administrators will continually find themselves
    maintaining their SSRS report servers. Tools such as `SSMS`, `Reporting Services
    Configuration Manager`, and `Report Manager` go a long way to centralize the administrative
    tasks but do not necessarily reduce the potential rote tasks associated with managing
    a large installation. Fortunately, SSRS provides the flexibility to allow other
    professionals, department managers, and users to maintain their own reports using
    tools provided with SSRS 2012 or through your own custom applications. Of course,
    with this flexibility comes the need for tighter security. We will turn now, in
    the next chapter, to security and show how to make sure that you can lock down
    and monitor this flexible model.


    ## Chapter 11 Securing Reports


    If a topic is currently on the minds of administrators more than security, we
    would be hard-pressed to name it. We all know that security threats come in many
    flavors and levels of severity—from the malicious pop-up Web pages to the invasive
    worms and viruses that wreak havoc on systems and take their toll on productivity
    by wasting time and resources to disgruntled employees to nefarious bots to skilled
    system intruders lurking around our data ready to pounce at any moment.


    These threats are often anonymous scripts or executables—`automatons`—that their
    human creator has released into the wild. But what about the security violations
    from real individuals? These are not just elusive system hackers bent on destruction;
    they can be the overlooked disgruntled employee who left the company with a notebook
    full of passwords and the determination to make a point about the insecurity of
    the company’s vital data.


    Securing systems takes time and effort and sometimes, unfortunately, has a lower
    priority than other important daily tasks. However, if your company is affected
    by the regulations imposed by HIPAA and other laws like Sarbanes Oxley (SOX),
    meeting stringent security standards is a requirement, not just a recommended
    practice. Most companies have policies and procedures in place that will meet
    HIPAA and SOX compliance. As a roles-based application, SSRS will take advantage
    of the underlying authentication and network already at work in your organization.
    The SSRS security model has three important components:


    -   Data encryption

    -   Authentication and user access

    -   Report audits


    The goal in this chapter is to meet the challenge of effectively setting up and
    testing each of these security components in your SSRS deployment. We will show
    how to do this through our experience using SSRS to meet security standards.


    You can incorporate your SSRS projects in your business in multiple ways. You
    may have an intranet site where internal domain users are rendering reports, a
    .NET application that utilizes the web services to build and display reports,
    or even an outward facing SSRS site hidden behind an authentication portal.


    ### Encrypting Data


    When working with confidential data of any kind, the chief concern is that the
    only people who can see the data are those who need to see it and who have been
    specifically granted permission to see it. This is especially true of Protected
    Health Information (PHI) data, as defined by HIPAA, which has been a significant
    concern of ours as a software development company. Many other types of data also
    need this level of protection, including financial, HR, and many more. We’ll start
    with the first of the three main challenges we defined as crucial to a successful,
    secure deployment of SSRS; namely, data encryption.


    ### Introducing Encryption


    In today’s mixed-technology networked environment, data encryption comes in many
    varieties. However, regardless of the technology, the encryption algorithms must
    meet a high standard for complexity and reliability. Fortunately, many applications
    provide built-in levels of encryption. SSRS natively supports encrypting the sensitive
    data it stores in the `ReportServer` database and configuration files. Companies
    may have the following other technologies in place that can be used in conjunction
    with SSRS encryption:


    -   **Wireless:** Uses Wireless Encryption Protocol (`WEP`), with shared keys
    to encrypt data transmitted through wireless access points.

    -   **HTTPS:** Uses a server certificate, generally from a trusted authority such
    as VeriSign, to provide encryption over Secure Sockets Layer (`SSL`). `SSL` is
    used when transmitting data with `HTTPS` instead of `HTTP`.

    -   **Terminal Services:** Uses Remote Desktop Protocol (`RDP`) for connecting
    remotely from a client workstation to a terminal server. This provides four levels
    of data encryption in Windows: Low, Client Compatible, High, and FIPS Compliant.

    -   **VPNs:** Allows accessibility to internal networks from VPN client systems.
    Encapsulates and encrypts Point-to-Point Tunneling Protocol (`PPTP`) and Layer
    2 Tunneling Protocol (`L2TP`).

    -   **IPSec:** Is the standard security protocol for Transmission Control Protocol/Internet
    Protocol (`TCP/IP`) traffic. This adds several layers of security, including data
    encryption.


    ### Securing Network Traffic Using SSL


    In the following sections, we will show how to set up the SSRS server to use `SSL`.
    By having an `SSL` server certificate installed on the server, all data transferred
    between the client application (which can be a browser or custom application)
    and the report server will be encrypted. This is essential when transmitting confidential
    data such as PI information over the Internet. Having a certificate from a trusted
    authority such as VeriSign or Thawte also ensures that the registered domain name
    used to access the Web server has been validated and can be trusted to be from
    the legitimate company that it claims to be from.


    Before we show how to install the certificate on the SSRS server, we will cover
    what data are being transmitted at the packet level to your SSRS server through
    HTTP requests. In this way, when you do actually install the certificate, you
    will be able to compare the data packets before and after installation to verify
    that the certificate is working as it should. To begin, we will show how to use
    a tool that is available for Windows: `Network Monitor`.'
  raw: '### Summary


    SSRS 2012 provides many tools for management tasks, and we covered several of
    them in this chapter. Because SSRS 2012 is a full reporting solution, administrators
    may find it difficult to manage the entire site single-handedly without some level
    of automation or divided tasks, especially as the number of reports and other
    objects such as data sources, folders, and subscriptions grow. Maintaining these
    objects, whether it be to update the report via Report Manager or to mass deploy
    reports via a custom application, administrators will continually find themselves
    maintaining their SSRS report servers. Tools such as SSMS, Reporting Services
    Configuration Manager, and Report Manager go a long way to centralize the administrative
    tasks but do not necessarily reduce the potential rote tasks associated with managing
    a large installation. Fortunately, SSRS provides the flexibility to allow other
    professionals, department managers, and users to maintain their own reports using
    tools provided with SSRS 2012 or through your own custom applications. Of course,
    with this flexibility comes the need for tighter security. We will turn now, in
    the next chapter, to security and show how to make sure that you can lock down
    and monitor this flexible model.


    ## C H A P T E R  11


    ## Securing Reports


    If a topic is currently on the minds of administrators more than security, we
    would be hard-pressed to name it. We all know that security threats come in many
    flavors and levels of severity—from the malicious pop-up Web pages to the invasive
    worms and viruses that wreak havoc on systems and take their toll on productivity
    by wasting time and resources to disgruntled employees to nefarious bots to skilled
    system intruders lurking around our data ready to pounce at any moment..


    These threats are often anonymous scripts or executables—*automatons*—that their
    human creator has released into the wild. But what about the security violations
    from real individuals? These are not just elusive system hackers bent on destruction;
    they can be the overlooked disgruntled employee who left the company with a notebook
    full of passwords and the determination to make a point about the insecurity of
    the company’s vital data.


    Securing systems takes time and effort and sometimes, unfortunately, has a lower
    priority than other important daily tasks. However, if your company is affected
    by the regulations imposed by HIPAA and other laws like Sarbanes Oxley (SOX),
    meeting stringent security standards is a requirement, not just a recommended
    practice. Most companies have policies and procedures in place that will meet
    HIPAA and SOX compliance. As a roles-based application, SSRS will take advantage
    of the underlying authentication and network already at work in your organization.
    The SSRS security model has three important components:


    > *   Data encryption

    > *   Authentication and user access

    > *   Report audits


    The goal in this chapter is to meet the challenge of effectively setting up and
    testing each of these security components in your SSRS deployment. We will show
    how to do this through our experience using SSRS to meet security standards.


    You can incorporate your SSRS projects in your business in multiple ways. You
    may have an intranet site where internal domain users are rendering reports, a
    .NET application that utilizes the web services to build and display reports,
    or even an outward facing SSRS site hidden behind an authentication portal.


    ### Encrypting Data


    When working with confidential data of any kind, the chief concern is that the
    only people who can see the data are those who need to see it and who have been
    specifically granted permission to see it. This is especially true of Protected
    Health Information (PHI) data, as defined by HIPAA, which has been a significant
    concern of ours as a software development company. Many other types of data also
    need this level of protection, including financial, HR, and many more. We’ll start
    with the first of the three main challenges we defined as crucial to a successful,
    secure deployment of SSRS; namely, data encryption.


    ### Introducing Encryption


    In today’s mixed-technology networked environment, data encryption comes in many
    varieties. However, regardless of the technology, the encryption algorithms must
    meet a high standard for complexity and reliability. Fortunately, many applications
    provide built-in levels of encryption. SSRS natively supports encrypting the sensitive
    data it stores in the ReportServer database and configuration files. Companies
    may have the following other technologies in place that can be used in conjunction
    with SSRS encryption:


    > *   *Wireless:* Uses Wireless Encryption Protocol (WEP), with shared keys to
    encrypt data transmitted through wireless access points.

    > *   *HTTPS:* Uses a server certificate, generally from a trusted authority such
    as VeriSign, to provide encryption over Secure Sockets Layer (SSL). SSL is used
    when transmitting data with HTTPS instead of HTTP.

    > *   *Terminal Services:* Uses Remote Desktop Protocol (RDP) for connecting remotely
    from a client workstation to a terminal server. This provides four levels of data
    encryption in Windows: Low, Client Compatible, High, and FIPS Compliant.

    > *   *VPNs:* Allows accessibility to internal networks from VPN client systems.
    Encapsulates and encrypts Point-to-Point Tunneling Protocol (PPTP) and Layer 2
    Tunneling Protocol (L2TP).

    > *   *IPSec:* Is the standard security protocol for Transmission Control Protocol/Internet
    Protocol (TCP/IP) traffic. This adds several layers of security, including data
    encryption.


    ### Securing Network Traffic Using SSL


    In the following sections, we will show how to set up the SSRS server to use SSL.
    By having an SSL server certificate installed on the server, all data transferred
    between the client application (which can be a browser or custom application)
    and the report server will be encrypted. This is essential when transmitting confidential
    data such as PI information over the Internet. Having a certificate from a trusted
    authority such as VeriSign or Thawte also ensures that the registered domain name
    used to access the Web server has been validated and can be trusted to be from
    the legitimate company that it claims to be from.


    Before we show how to install the certificate on the SSRS server, we will cover
    what data are being transmitted at the packet level to your SSRS server through
    HTTP requests. In this way, when you do actually install the certificate, you
    will be able to compare the data packets before and after installation to verify
    that the certificate is working as it should. To begin, we will show how to use
    a tool that is available for Windows: Network Monitor.'
  trans: '

    ### 摘要


    SSRS 2012 提供了众多用于管理任务的工具，我们在本章中已介绍了其中的几种。由于 SSRS 2012 是一个完整的报告解决方案，随着报告数量以及其他对象（如数据源、文件夹和订阅）的增长，管理员可能会发现，若没有一定程度的自动化或任务分工，单打独斗地管理整个站点会非常困难。维护这些对象，无论是通过
    `Report Manager` 更新报告，还是通过自定义应用程序批量部署报告，管理员将持续发现自己需要维护 SSRS 报告服务器。虽然 `SSMS`、`Reporting
    Services Configuration Manager` 和 `Report Manager` 等工具极大地集中了管理任务，但未必能减少管理大型安装时可能遇到的重复性任务。幸运的是，SSRS
    提供了足够的灵活性，允许其他专业人员、部门经理和用户使用 SSRS 2012 自带的工具或您自己的自定义应用程序来维护他们自己的报告。当然，这种灵活性也带来了对更严密安全性的需求。现在，我们将在下一章转向安全性主题，展示如何确保能够锁定并监控这种灵活的模型。


    ## 第 11 章 保护报告安全


    如果说目前有什么主题比安全更令管理员们挂心，那我们很难举出例子。我们都知道，安全威胁有多种类型和严重程度——从恶意的弹出网页，到破坏系统、通过浪费时间和资源对生产力造成严重损害的入侵性蠕虫和病毒，再到心怀不满的员工，到恶毒的机器人程序，再到潜伏在我们数据周围、随时准备发动攻击的熟练系统入侵者。


    这些威胁通常是匿名的脚本或可执行文件——即`自动程序`——由其人类创造者释放到网络中。但是，来自真实个体的安全违规行为呢？这些不仅是难以捉摸、旨在破坏的系统黑客；它们也可能是被忽视的、心怀不满的员工，他们带着记满密码的笔记本离开公司，并决心要证明公司关键数据的不安全性。


    保护系统需要时间和精力，不幸的是，有时其优先级会低于其他重要的日常任务。然而，如果您的公司受到 HIPAA 以及萨班斯-奥克斯利法案（SOX）等其他法律所施加的规定影响，那么满足严格的安全标准就是一项必需的要求，而不仅仅是推荐做法。大多数公司都有现成的政策和程序来满足
    HIPAA 和 SOX 合规性。作为一种基于角色的应用程序，SSRS 将利用您组织中已在运作的底层身份验证和网络。SSRS 安全模型有三个重要组成部分：


    -   数据加密

    -   身份验证和用户访问

    -   报告审计


    本章的目标是应对在 SSRS 部署中有效设置和测试每个安全组件的挑战。我们将通过我们使用 SSRS 满足安全标准的经验来展示如何做到这一点。


    您可以通过多种方式将 SSRS 项目整合到您的业务中。您可能有一个内部网站点供内部域用户呈现报告，一个利用 Web 服务构建和显示报告的 .NET 应用程序，甚至是一个隐藏在身份验证门户后面、面向外部的
    SSRS 站点。


    ### 加密数据


    处理任何类型的机密数据时，主要关注点是只有需要查看数据且被特别授予查看权限的人才能看到数据。对于 HIPAA 定义的受保护健康信息（PHI）数据尤其如此，这一直是我们作为一家软件开发公司的重要关注点。许多其他类型的数据也需要这种级别的保护，包括财务、人力资源等。我们将从我们定义为成功、安全部署
    SSRS 至关重要的三大挑战中的第一个开始；即数据加密。


    ### 加密简介


    在当今混合技术的网络环境中，数据加密有多种类型。然而，无论采用何种技术，加密算法都必须满足复杂性和可靠性的高标准。幸运的是，许多应用程序都提供了内置的加密级别。SSRS
    原生支持加密其存储在 `ReportServer` 数据库和配置文件中的敏感数据。公司可能已部署以下其他技术，可与 SSRS 加密结合使用：


    -   **无线：** 使用无线加密协议（`WEP`），通过共享密钥来加密通过无线接入点传输的数据。

    -   **HTTPS：** 使用服务器证书（通常来自 VeriSign 等可信权威机构），通过安全套接层（`SSL`）提供加密。当使用 `HTTPS` 而非
    `HTTP` 传输数据时，会使用 `SSL`。

    -   **终端服务：** 使用远程桌面协议（`RDP`）从客户端工作站远程连接到终端服务器。这在 Windows 中提供四个级别的数据加密：低、客户端兼容、高和符合
    FIPS 标准。

    -   **VPN：** 允许从 VPN 客户端系统访问内部网络。对点对点隧道协议（`PPTP`）和第二层隧道协议（`L2TP`）进行封装和加密。

    -   **IPSec：** 是传输控制协议/网际协议（`TCP/IP`）流量的标准安全协议。这增加了多层安全性，包括数据加密。


    ### 使用 SSL 保护网络流量


    在接下来的部分中，我们将展示如何设置 SSRS 服务器以使用 `SSL`。通过在服务器上安装 `SSL` 服务器证书，客户端应用程序（可以是浏览器或自定义应用程序）与报告服务器之间传输的所有数据都将被加密。当通过互联网传输诸如个人身份信息（PII）之类的机密数据时，这一点至关重要。拥有来自
    VeriSign 或 Thawte 等可信权威机构的证书，还能确保用于访问 Web 服务器的注册域名已经过验证，并且可以信任其来自它所声称的合法公司。


    在我们展示如何在 SSRS 服务器上安装证书之前，我们将先介绍通过 HTTP 请求传输到您的 SSRS 服务器的数据在数据包级别上是什么。这样，当您实际安装证书后，您将能够比较安装前后的数据包，以验证证书是否按预期工作。首先，我们将展示如何使用
    Windows 上可用的一个工具：`Network Monitor`。

    '
- fmt: '### Analyzing HTTP Traffic


    `Network Monitor` is a packet analysis utility that allows you to capture all
    of the data packets transferred to and from the target server and client. The
    version of `Network Monitor` that comes with `Windows` is unlike other network
    capture tools, such as the version of the same tool included in `Systems Management
    Server`, in that it can listen to traffic that is destined only for the machine
    on which it is executed. `Network Monitor` is not installed with `Windows` by
    default, though. You can add it post-installation through the `Add/Remove Programs`
    applet. In this applet, select `Add Remove Windows Components` and then `Management
    and Monitoring Tools`. If you are unable to install from this point, you can always
    download the application from the `Microsoft` website. We will be using the newest
    version of this tool at the time of this writing, version `3.4`.


    On the `SSRS` server, we will show how to launch `Network Monitor` from `Administrative
    Tools`. If more than one network interface card (`NIC`) is installed on your machine,
    as in our case, make sure that you select the card on which you will be testing.
    [Figure 11-1](#Chapter11.html#fig_11_1) shows the main screen of `Network Monitor`
    and the traffic that it is capturing on the network, including broadcasts and
    local packets. `Network Monitor` can be daunting to the uninitiated, as it was
    designed to be used by network administrators who have more than a cursory understanding
    of network protocols.


    ![Image](images/9781430238102_Fig11-01.jpg)


    Figure 11-1.`Network Monitor`


    You can filter out any unwanted traffic in the display, which we will cover in
    this section because we will be showing how to capture `SSRS` web data. For our
    example, we want to see only `HTTP` traffic on `port 80`. We will be running this
    directly on the client machine that accesses the report, for simplicity sake.
    There may be, and will be, plenty of other traffic that we don’t want to see in
    the monitor, so we will utilize the filtering capabilities to weed out the unwanted
    data. You could, for example, define a capture filter that uses a pattern match
    in the data packet to limit the results of the capture. Alternatively, you could
    capture everything and then configure a display filter to limit the results. In
    our case, we will setup a display filter to leave out anything that is not `HTTP`
    traffic. Setting up a filter is much easier in newer versions of network monitor
    than in the past. We are going to go ahead and set up a display filter so that
    we will only see the `HTTP` traffic that is flowing. To do this, start a new capture
    and look for the display filter window inside of the capture. If you don’t see
    it displayed, click `View->Display Filter` to bring it up. It should look like
    [Figure 11-2](#Chapter11.html#fig_11_2).


    ![Image](images/9781430238102_Fig11-02.jpg)


    Figure 11-2.`Finding the display filter window`


    Inside the display filter window, we need to let `Network Monitor` know to only
    show us data that are related to `HTTP` data. The quickest way to do this is to
    filter out anything that doesn’t have a source or destination port of `80`, the
    standard `HTTP` port. Inside of the display filter, you will set up a new rule
    to do just this, as shown in [Figure 11-3](#Chapter11.html#fig_11_3). Click the
    apply button to confirm the changes.


    Now, click the `Start Capture` button, and let the capture run as you view a page
    in the `Report Manager`. We will be taking a look at the data that are returned
    from this so that we can see the plain text information in `HTML`. We will be
    looking at the front page of the `Report Manager` to see if we can find it in
    the returned data for this example.


    After loading the report manager, analyzing the captured frames reveals the disturbing
    news. You can see the `HTML` being returned in plain text, which is bad for us
    if we don’t want anyone sniffing around our network to see what information could
    be gleaned from any of our reports. This naked `HTML` can be seen in [Figure 11-4](#Chapter11.html#fig_11_4).
    The title of the page and other `HTML` code are plainly readable and could be
    used to reconstruct the entire web page or a report if it were run.


    In this case, you have not analyzed other types of traffic, such as `SQL` requests
    on `port 1433`, to see whether other protocols are potentially sending plain-text
    information, but you can use the same tool to do that.


    ![Image](images/9781430238102_Fig11-03.jpg)


    Figure 11-3.`Display Filter Rule`


    ![Image](images/9781430238102_Fig11-04.jpg)


    Figure 11-4.`PI data captured`


    ![Image](images/square.jpg) **Tip** Although we will not cover the steps to configure
    `SQL Server` itself to encrypt network traffic, as we will be doing that with
    the internal `SSRS` `HTTP` service, it is important to mention that `SQL Server`
    uses `SSL` as well, and that by having a certificate installed, you can easily
    configure `SQL Server` to transmit encrypted data. A minimal performance hit is
    associated with encryption. This information can be found in the `APRESS` book
    on `Pro SQL Server Encryption`.'
