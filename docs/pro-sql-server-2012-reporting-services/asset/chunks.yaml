    From the Toolbox, add one label, one textbox, and one button near the top of the
    form, set the label text to **Report server**, and name the textbox reportServer
    in the textbox properties. Name the button getFolders and set its text to the
    word **Go**. You’ll use the reportServer textbox to allow users to enter in the
    report server name that they want to deploy to.


    Next, add a TreeView control to the center of the form and name it ssrsFolders.
    You’ll use it to display a list of available folders on the server where you can
    upload your report when the user enters in a server name and clicks the Go button.


    Add one label, one textbox, and one button near the bottom of the form; set the
    label text to **Report file**; name the textbox reportFile; name the button browseFile;
    and set the text of the button to **Browse**. You’ll use the reportFile textbox
    to accept or display the path name and file name of the report file you want to
    upload to the specified SSRS 2012 server. You’ll use the Browse buttons to choose
    the form that accepts the users’ input and allows them to select a report file
    for deploying.


    After you’ve added all these controls, the form should look something like [Figure
    8-14](#Chapter08.html#fig_8_14).


    ![Image](images/9781430238102_Fig08-14.jpg)


    ***Figure 8-14.** Publisher, the example report publisher*


    #### Coding the Form


    Now that you have the form laid out, you’ll add code to handle the functions necessary
    to allow users to do the following:


    > *   Enter in a server name.

    > *   Get a list of the folders available on that server.

    > *   Select a target folder and an RDL file to upload.


    #### Allowing Users to Enter a Server Name


    When a user types in a server name on the form, the code needs to build the URL
    that fully identifies the SSRS 2012 server to deploy the RDL file to.


    First, you will create a class-level variable to hold the reference to the report
    server, much as you did in the SSRS viewers in [Chapter 5](#Chapter05.html#ch5).
    You do this by adding the variable definition `private ReportingService2010 rs;`
    to the class, as is shown in [Listing 8-4](#Chapter08.html#list_8_4).


    ***Listing 8-4.** Class-level Variable in Context*


    `public partial class Publisher  :   Form {`

    `private ReportingService2010 rs;`

    `public Publisher()`


    To build the URL that identifies the server based on the user input, you first
    instantiate the Report Server Web service and then set the URL property to reflect
    the name of the server that the user entered into the reportServer textbox. We
    will want to form this URL for the user, so they only need to enter the server
    name to connect.


    To do this, first create a short function to check the server name that the user
    enters and then append the rest of the path name to the Reporting Services Web
    service to make up the complete URL necessary to reference the Reporting Services
    Web service on the desired server. By constructing the URL based on the user’s
    input, you can use the report deployment application to deploy the reports on
    any SSRS 2012 server where the user has permission to do so. Start by adding the
    code shown in [Listing 8-5](#Chapter08.html#list_8_5) into the Publisher class.


    ***Listing 8-5.** Get Report Server URL*


    `private string GetRSURL() {`

    `        if (reportServer.Text.StartsWith("`**`Error! Hyperlink reference not
    valid.`**`"))`

    `                return reportServer.Text + "/reportserver/ReportService2010.asmx";`

    `        else`

    `                return "`**`Error! Hyperlink reference not valid.`**`" + reportServer.Text
    +`

    `        "/reportserver/ReportService2010.asmx";`

    `}`


    #### Populating the TreeView Control With a List of Folders


    Now you’ll use the Reporting Services Web service to retrieve a list of objects
    from the server and use them to populate the ssrsFolders TreeView control. We’ll
    do this by placing a call to the ListChildren method of the Report Server Web
    service. The ListChildren method takes two parameters:


    > *   Item: The full path name of the parent folder.

    > *   Recursive: A Boolean expression that indicates whether to return the entire
    tree of child items below the specified item. The default value is false.


    ![Image](images/square.jpg) **Note** The ListChildren method returns all objects
    on the report server, including data sources, report parts, and reports, not just
    folders. In this example, you’ll filter out everything but the folders because
    you’re only interested in showing the user the folder structure. You do this by
    using the ItemType property of the child object and then testing it against the
    string “Folder”.


    Make sure the Publisher.cs form is open in the design view and double-click the
    Go button. This creates an empty method to handle the button’s click event. Add
    the code in [Listing 8-6](#Chapter08.html#list_8_6) to the method.


    ***Listing 8-6.** Code to Populate the TreeView Control*


    `ssrsFolders.Nodes.Clear();`

    `rs = new ReportingService2010();`

    `rs.Credentials = System.Net.CredentialCache.DefaultCredentials;`

    `CatalogItem[] items = null;`

    `rs.Url = GetRSURL();`


    `TreeNode root = new TreeNode();`

    `root.Text = "Root";`

    `ssrsFolders.Nodes.Add(root);`

    `ssrsFolders.SelectedNode = ssrsFolders.TopNode;`


    `// Retrieve a list items from the server`

    `try`

    `{`

    `          items = rs.ListChildren("/", true);`

    `          int j = 1;`


    `          // Iterate through the list of items and find all of the folders and
    display them to the user`

    `          foreach (CatalogItem ci in items)`

    `          {`

    `                   if (ci.TypeName == "Folder")`

    `                   {`

    `                             Regex rx = new Regex("/");`

    `                             int matchCnt = rx.Matches(ci.Path).Count;`

    `                             if (matchCnt > j)`

    `                             {`

    `                                      ssrsFolders.SelectedNode =ssrsFolders.SelectedNode.LastNode;`

    `                                      j = matchCnt;`

    `                             }`

    `                             else if (matchCnt < j)`

    `                             {`

    `                                      ssrsFolders.SelectedNode =ssrsFolders.SelectedNode.Parent;`

    `                                      j = matchCnt;`

    `                             }`

    `                             AddNode(ci.Name);`

    `                   }`

    `          }`

    `}`


    `catch (SoapException ex)`

    `{`

    `        MessageBox.Show(ex.Detail.InnerXml.ToString());`

    `}`

    `catch (Exception ex)`

    `{`

    `        MessageBox.Show(ex.Message);`

    `}`


    `// Make sure the user can see that the root folder is selected  by default`

    `ssrsFolders.HideSelection = false;`


    Right below the method for the Go button’s click event, add the following method
    as shown in [Listing 8-7](#Chapter08.html#list_8_7).


    ***Listing 8-7.** AddNode Method*


    `private void AddNode(string name) {`

    `        TreeNode newNode = new TreeNode(name);`

    `        ssrsFolders.SelectedNode.Nodes.Add(newNode);`

    `}`


    You tell the ListChildren method to start at the root folder by passing in a “/”
    as the starting point, and also set the recursive option to true, which causes
    the ListChildren method to iterate through all the folders and subfolders on the
    SSRS 2008 server. You use this information to create nodes in the TreeView control
    to display each folder in a hierarchy that represents the hierarchy of the folders
    on the server. Use a regular expression to look for the number of “/” characters
    in the path of each CatalogItem to determine how deep you are in the hierarchy
    (one level, two levels, and so on).'
  trans: "\n#### 布局表单\n\n从工具箱中，在表单顶部附近添加一个标签、一个文本框和一个按钮。将标签文本设置为 `Report server`，并在文本框属性中将其命名为\
    \ `reportServer`。将按钮命名为 `getFolders` 并将其文本设置为 `Go`。你将使用 `reportServer` 文本框允许用户输入他们想要部署到的报表服务器名称。\n\
    \n接下来，在表单中心添加一个 TreeView 控件，并将其命名为 `ssrsFolders`。当用户输入服务器名称并单击 `Go` 按钮时，你将使用此控件显示服务器上可用文件夹的列表，以便上传你的报表。\n\
    \n在表单底部附近添加一个标签、一个文本框和一个按钮；将标签文本设置为 `Report file`；将文本框命名为 `reportFile`；将按钮命名为\
    \ `browseFile`；并将按钮的文本设置为 `Browse`。你将使用 `reportFile` 文本框接受或显示要上传到指定 SSRS 2012\
    \ 服务器的报表文件的路径名和文件名。你将使用 `Browse` 按钮来选择接受用户输入并允许他们选择要部署的报表文件的表单。\n\n添加完所有这些控件后，表单应类似于\
    \ 图 8-14。\n\n![Image](img/9781430238102_Fig08-14.jpg)\n\n**图 8-14.** 发布器，示例报表发布器\n\
    \n#### 为表单编码\n\n现在表单布局已完成，你将添加代码来处理必要的功能，以允许用户执行以下操作：\n\n- 输入服务器名称。\n- 获取该服务器上可用文件夹的列表。\n\
    - 选择目标文件夹和要上传的 RDL 文件。\n\n#### 允许用户输入服务器名称\n\n当用户在表单中输入服务器名称时，代码需要构建完全标识要部署 RDL\
    \ 文件的目标 SSRS 2012 服务器的 URL。\n\n首先，你将创建一个类级别的变量来保存对报表服务器的引用，就像你在 第 5 章 的 SSRS 查看器中所做的那样。你通过将变量定义\
    \ `private ReportingService2010 rs;` 添加到类中来实现这一点，如 清单 8-4 所示。\n\n**清单 8-4.** 上下文中的类级别变量\n\
    \n```csharp\npublic partial class Publisher  :   Form {\nprivate ReportingService2010\
    \ rs;\npublic Publisher()\n```\n\n要基于用户输入构建标识服务器的 URL，你首先要实例化报表服务器 Web 服务，然后将\
    \ `URL` 属性设置为反映用户输入到 `reportServer` 文本框中的服务器名称。我们希望为用户构建此 URL，因此他们只需输入服务器名称即可连接。\n\
    \n为此，首先创建一个简短的函数来检查用户输入的服务器名称，然后将剩余的路径名附加到 Reporting Services Web 服务，以构成引用所需服务器上\
    \ Reporting Services Web 服务所需的完整 URL。通过根据用户的输入构建 URL，你可以在用户有权执行此操作的任何 SSRS 2012\
    \ 服务器上使用报表部署应用程序来部署报表。首先将 清单 8-5 中所示的代码添加到 `Publisher` 类中。\n\n**清单 8-5.** 获取报表服务器\
    \ URL\n\n```csharp\nprivate string GetRSURL() {\n        if (reportServer.Text.StartsWith(\"\
    `Error! Hyperlink reference not valid.`\"))\n                return reportServer.Text\
    \ + \"/reportserver/ReportService2010.asmx\";\n        else\n                return\
    \ \"`Error! Hyperlink reference not valid.`\" + reportServer.Text +\n        \"\
    /reportserver/ReportService2010.asmx\";\n}\n```\n\n#### 用文件夹列表填充 TreeView 控件\n\
    \n现在，你将使用 Reporting Services Web 服务从服务器检索对象列表，并使用它们来填充 `ssrsFolders` TreeView\
    \ 控件。我们将通过调用报表服务器 Web 服务的 `ListChildren` 方法来实现这一点。`ListChildren` 方法接受两个参数：\n\n\
    - `Item`：父文件夹的完整路径名。\n- `Recursive`：一个布尔表达式，指示是否返回指定项目下的整个子项树。默认值为 false。\n\n\
    ![Image](img/square.jpg) **注意** `ListChildren` 方法返回报表服务器上的所有对象，包括数据源、报表部件和报表，而不仅仅是文件夹。在此示例中，你将过滤掉除文件夹之外的所有内容，因为你只对向用户显示文件夹结构感兴趣。你通过使用子对象的\
    \ `ItemType` 属性，然后对照字符串 \"Folder\" 进行测试来实现这一点。\n\n确保 `Publisher.cs` 表单在设计视图中打开，然后双击\
    \ `Go` 按钮。这将创建一个处理按钮单击事件的空方法。将 清单 8-6 中的代码添加到该方法中。\n\n**清单 8-6.** 填充 TreeView\
    \ 控件的代码\n\n```csharp\nssrsFolders.Nodes.Clear();\nrs = new ReportingService2010();\n\
    rs.Credentials = System.Net.CredentialCache.DefaultCredentials;\nCatalogItem[]\
    \ items = null;\nrs.Url = GetRSURL();\n\nTreeNode root = new TreeNode();\nroot.Text\
    \ = \"Root\";\nssrsFolders.Nodes.Add(root);\nssrsFolders.SelectedNode = ssrsFolders.TopNode;\n\
    \n// 从服务器检索项目列表\ntry\n{\n          items = rs.ListChildren(\"/\", true);\n   \
    \       int j = 1;\n\n          // 遍历项目列表并找到所有文件夹并将其显示给用户\n          foreach (CatalogItem\
    \ ci in items)\n          {\n                   if (ci.TypeName == \"Folder\"\
    )\n                   {\n                             Regex rx = new Regex(\"\
    /\");\n                             int matchCnt = rx.Matches(ci.Path).Count;\n\
    \                             if (matchCnt > j)\n                            \
    \ {\n                                      ssrsFolders.SelectedNode =ssrsFolders.SelectedNode.LastNode;\n\
    \                                      j = matchCnt;\n                       \
    \      }\n                             else if (matchCnt < j)\n              \
    \               {\n                                      ssrsFolders.SelectedNode\
    \ =ssrsFolders.SelectedNode.Parent;\n                                      j =\
    \ matchCnt;\n                             }\n                             AddNode(ci.Name);\n\
    \                   }\n          }\n}\n\ncatch (SoapException ex)\n{\n       \
    \ MessageBox.Show(ex.Detail.InnerXml.ToString());\n}\ncatch (Exception ex)\n{\n\
    \        MessageBox.Show(ex.Message);\n}\n\n// 确保用户默认能看到根文件夹被选中\nssrsFolders.HideSelection\
    \ = false;\n```\n\n在 `Go` 按钮单击事件方法的下方，添加如 清单 8-7 所示的以下方法。\n\n**清单 8-7.** `AddNode`\
    \ 方法\n\n```csharp\nprivate void AddNode(string name) {\n        TreeNode newNode\
    \ = new TreeNode(name);\n        ssrsFolders.SelectedNode.Nodes.Add(newNode);\n\
    }\n```\n\n你通过传入 \"/\" 作为起点来告诉 `ListChildren` 方法从根文件夹开始，并将递归选项设置为 true，这会导致 `ListChildren`\
    \ 方法遍历 SSRS 2008 服务器上的所有文件夹和子文件夹。你使用此信息在 TreeView 控件中创建节点，以层次结构显示每个文件夹，该层次结构代表服务器上文件夹的层次结构。使用正则表达式查找每个\
    \ `CatalogItem` 路径中 \"/\" 字符的数量，以确定你在层次结构中的深度（一级、两级等）。\n"
- fmt: "#### 浏览 RDL 文件并将其上传到服务器\n\n现在，你需要添加一些代码，允许用户浏览他们想要上传的文件。你应该默认将用户限制为浏览以 “rdl”\
    \ 结尾的文件，因为这是 SSRS 2008 报表定义文件的原生扩展名。你还需要读取 `ssrsFolders` `TreeView` 中选定的节点，以便知道用户选择在\
    \ SSRS 2008 服务器上将报表部署到哪个文件夹。\n\n首先，从 `TreeView` 控件读取选定节点的路径，并将其转换为可用于 SSRS 2012\
    \ 的 `CreateCatalogItem` 方法的路径名。\n\n请确保以设计视图打开 `Publisher.cs` 窗体，然后双击“浏览”按钮。这将创建一个用于处理按钮单击事件的空方法。将[清单\
    \ 8-8](#Chapter08.html#list_8_8)中的代码添加到该方法中。\n\n**清单 8-8.** 用于浏览 RDL 文件的代码\n```csharp\n\
    private void browseFile_Click(object sender, EventArgs e)\n{\n    // 从 TreeView\
    \ 控件获取完整路径名\n    string pathName = ssrsFolders.SelectedNode.FullPath;\n\n    if\
    \ (pathName == \"Root\")\n        pathName = \"/\";\n    else\n    {\n       \
    \ // 从路径中剥离 Root 名称，并为使用 SRS 修正路径分隔符\n        pathName = pathName.Substring(4,\
    \ pathName.Length - 4);\n        pathName = pathName.Replace(@\"\\\", \"/\");\n\
    \    }\n\n    byte[] definition = null;\n    Warning[] warnings = null;\n    string\
    \ warningMsg = String.Empty;\n\n    OpenFileDialog openFileDialog = new OpenFileDialog();\n\
    \    openFileDialog.Filter = \"RDL files (*.rdl)|*.rdl|All files (*.*)|*.*\";\n\
    \    openFileDialog.FilterIndex = 1;\n    if (openFileDialog.ShowDialog() == DialogResult.OK)\n\
    \    {\n        try\n        {\n            // 读取文件并将其放入字节数组以传递给 SRS\n       \
    \     FileStream stream = File.OpenRead(openFileDialog.FileName);\n          \
    \  definition = new byte[stream.Length];\n            stream.Read(definition,\
    \ 0, (int)(stream.Length));\n            stream.Close();\n        }\n        catch\
    \ (Exception ex)\n        {\n            MessageBox.Show(ex.Message);\n      \
    \  }\n\n        // 我们将使用 rdl 文件的名称作为报表的名称\n        string reportName = Path.GetFileNameWithoutExtension(openFileDialog.FileName);\n\
    \        reportFile.Text = reportName;\n\n        // 现在让我们使用这些信息来发布报表\n      \
    \  try\n        {\n            rs.CreateCatalogItem(\"Report\", reportName, pathName,\
    \ true, definition, null, out warnings);\n\n            if (warnings != null)\n\
    \            {\n                foreach (Warning warning in warnings)\n      \
    \          {\n                    warningMsg += warning.Message + \"\\n\";\n \
    \               }\n                MessageBox.Show(\"Report creation failed with\
    \ the following warnings:\\n\" + warningMsg);\n            }\n            else\n\
    \                MessageBox.Show(String.Format(\"Report: {0} created successfully\
    \ with no warnings\", reportName));\n        }\n        catch (SoapException ex)\n\
    \        {\n            MessageBox.Show(ex.Detail.InnerXml.ToString());\n    \
    \    }\n    }\n}\n```\n\n该代码首先从 `ssrsFolders` `TreeView` 控件获取用户选择在 SSRS 2012 服务器上放置报表的完整路径，剥离路径开头的单词\
    \ *Root*，然后将字符串中所有出现的反斜杠替换为 SSRS 2012 所需的正斜杠。\n\n然后，你为 `openFileDialog` 控件设置选项，使其默认浏览具有\
    \ RDL 扩展名的文件，然后向用户显示对话框。如果用户进行了选择，则使用 `FileStream` 对象打开该文件并从流中读取到字节数组中。这是因为 SSRS\
    \ 2012 的 `CreateCatalogItem` 方法期望 RDL 文件的内容以字节数组的形式传入。\n\n接下来，读取用户选择的文件名并将其用作\
    \ SSRS 2012 中报表的标题。有了标题后，你就拥有了上传报表所需的一切，这通过调用 `CreateCatalogItem` 方法并传入你创建的值来完成。你可以在[清单\
    \ 8-8](#Chapter08.html#list_8_8)的末尾看到，为完整清单添加了必要的代码。"
  raw: '#### Opening the RDL File and Uploading It to the Server


    Now you need to add some code to allow users to browse for the file that they
    want to upload. You’ll want to limit the users to browse for files ending in “rdl”
    by default, because this is the native extension for SSRS 2008 report definition
    files. You also want to read the selected node in the ssrsFolders TreeView so
    that you know what folder users have selected to deploy the report to on the SSRS
    2008 server.


    Start by reading the path of the selected node from the TreeView control and turning
    it into a path name you can use with SSRS 2012’s `CreateCatalogItem` method.


    Make sure the Publisher.cs form is open in design view and double-click the Browse
    button. This creates an empty method to handle the button’s click event. Add the
    code in [Listing 8-8](#Chapter08.html#list_8_8) to the method.


    ***Listing 8-8.** Code to Browse for an RDL File*


    `private void browseFile_Click(object sender, EventArgs e)`

    `{`

    `        // Get the full pathname from the treeview control`

    `        string pathName = ssrsFolders.SelectedNode.FullPath;`


    `        if (pathName == "Root")`

    `                pathName = "/";`

    `        else`

    `        {`

    `                // Strip off the Root name from the path and correct the path
    separators for`

    `        use with SRS`

    `                pathName = pathName.Substring(4, pathName.Length - 4);`

    `                pathName = pathName.Replace(@"\", "/");`

    `}`


    `byte[] definition = null;`

    `Warning[] warnings = null;`

    `string warningMsg = String.Empty;`


    `OpenFileDialog openFileDialog = new OpenFileDialog();`

    `openFileDialog.Filter = "RDL files (*.rdl)|*.rdl|All files (*.*)|*.*";`

    `openFileDialog.FilterIndex = 1;`

    `if (openFileDialog.ShowDialog() == DialogResult.OK)`

    `{`

    `        try`

    `        {`

    `                // Read the file and put it into a byte array to pass to SRS`

    `                FileStream stream = File.OpenRead(openFileDialog.FileName);`

    `                definition = new byte[stream.Length];`

    `                stream.Read(definition, 0, (int)(stream.Length));`

    `                stream.Close();`

    `        }`

    `        catch (Exception ex)`

    `        {`

    `                MessageBox.Show(ex.Message);`

    `        }`


    `        // We are going to use the name of the rdl file as the name of our report`

    `        string reportName =`

    `Path.GetFileNameWithoutExtension(openFileDialog.FileName);`

    `        reportFile.Text = reportName;`


    `        // Now lets use this information to publish the report`

    `        try`

    `        {`

    `                rs.CreateCatalogItem("Report", reportName, pathName, true, definition,`

    `        null, out warnings);`


    `                if (warnings != null)`

    `                {`

    `                        foreach (Warning warning in warnings)`

    `                        {`

    `                                warningMsg += warning.Message + "\n";`

    `                        }`

    `                        MessageBox.Show("Report creation failed with  the following`

    `                warnings:\n" + warningMsg);`

    `                }`

    `                else`

    `                        MessageBox.Show(String.Format("Report: {0}  created`

    `                successfully with no warnings", reportName));`

    `                }`

    `                catch (SoapException ex)`

    `                {`

    `                        MessageBox.Show(ex.Detail.InnerXml.ToString());`

    `                }`

    `        }`

    `}`


    The code starts by getting the full path on the SSRS 2012 server where the user
    has selected to place the report from the ssrsFolders TreeView control, strips
    the word *Root* off the front of the path, and then replaces all occurrences of
    a backslash in the string with the forward slash needed for SSRS 2012.


    You then set the options for the openFileDialog control so that it browses by
    default for files with the RDL extension and then displays the dialog box to the
    user. If the user makes a selection, then the file is opened using a FileStream
    object and read from the stream into a byte array. That’s because the SSRS 2012
    `CreateCatalogItem` method expects the contents of the RDL file to be passed in
    as a byte array.


    Next, the file name that the user selected is read and used as the title for the
    report in SSRS 2012\. After you have a title, you have everything necessary to
    upload the report, which you do by calling the `CreateCatalogItem` method with
    the values you’ve created. You can see at the end of [Listing 8-8](#Chapter08.html#list_8_8)
    where the necessary code has been added to the complete listing.'
