    ![Image](images/9781430238102_Fig13-39.jpg)


    ***Figure 13-39.** Defining a formula for a new field, Patient Count*


    Click the No Filter Applied link, and select Create a New Filter to open the Filter
    Data dialog box. You can see the filter you need to apply to show only active
    patients in [Figure 13-40](#Chapter13.html#fig_13_40), where you have set Discharge
