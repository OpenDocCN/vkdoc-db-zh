- fmt: '## Rendering Reports from .NET Applications


    Report rendering is the process of outputting the results of a report into a specific
    format. You pass the appropriate parameters to `SSRS`, telling it what report
    you want to run and optionally what format you want the output in, any user credentials,
    and the actual report parameters. `SSRS 2012` then renders the report and returns
    the results.


    The manner in which you pass these parameters and how the results are returned
    depends on the `SSRS 2012` method you’re using to render the report. Once `SSRS`
    has the information it needs, based on the particular report you’re running, it
    queries the appropriate data sources. `SSRS 2012` uses the passed credentials
    and parameters if appropriate, renders the report into an intermediate format,
    and then renders and filters this intermediate format into the final display format
    requested.


    With `SSRS 2012`, you can render reports in three ways from a `.NET` application:


    ### Using a URL


    You can build a `URL` that allows the client to access the report on the report
    server and supply any appropriate parameters, including rendering format, login
    information, report criteria, and report filters. This method is one of the most
    flexible because it will work with almost any language and platform that can host
    or use a Web browser or a Web browser control. In fact, it works with any language
    that can create a properly formatted `URL` and that can launch a Web browser using
    that `URL`. We can use the built-in `WebBrowser` control in `.NET` with formatted
    `URL`s to render a report.


    ### Using the SOAP API


    You can use the `SOAP API`, also known as the Report Server Web service, to render
    the report. This returns the rendered data as a stream that you then display.
    This is a more difficult method of rendering because the information you get back
    from the server is essentially a binary stream of data, and you don’t have the
    benefit of having the server-browser combination do the actual work of displaying
    the data. However, you can use the Report Server Web service for more than just
    rendering: you can use it to access the report server’s complete functionality.
    We’ll show how you can use the Report Server Web service in your solution to provide
    information about the reports you’re rendering, such as the report parameters
    that the reports use.


    ### Using the Report Viewer control


    You can use the `Report Viewer control`. This option for `SSRS 2012` provides
    a simple-to-use Windows Forms application or `ASP.NET` user control that allows
    you to simply drag and drop the control onto a Windows or Web Form, set some properties,
    and render a report. One of the main benefits of the `Report Viewer control` is
    that it allows you to render reports that are on an `SSRS 2012` report server
    as well as render reports locally, without the need for a report server.


    ![Image](images/square.jpg) Note The `Report Viewer controls` are included with
    current versions of `SQL Server` and `Visual Studio`. You can also download the
    redistributable package for machines that will be running the application and
    that do not have `Visual Studio`/`SQL Server` installed.


    While the `Report Viewer controls` are the method that most `Visual Studio` users
    will probably employ to render reports, the most universally usable rendering
    method is via `URL` access. In this case, `SSRS 2012` provides some defaults for
    most reporting options. For example, `SSRS` provides a default user interface
    for entering parameter and filter information. It prompts you for login information
    if necessary, and it defaults to rendering in `HTML` format. You get all this
    simply by passing the `URL` of the report from the browser. This is most useful
    if you’re rendering your reports using just your Web browser, with no other controlling
    application.


    You can optionally pass parameters along with the `URL` to change these default
    behaviors, provide login information, change the rendering format, hide the parameter
    toolbar, and much more. This is useful if you have a custom application and want
    to control these options yourself, rather than provide the default user interface.


    You can perform many of the same actions using the Report Server Web service,
    but there are no real defaults and the actual display of the returned data to
    the user is left up to the application developer. By using the Web browser in
    an `ASP.NET` application, or embedded in a Windows Forms application, you get
    the benefits of the `URL` rendering method, but you can exercise control over
    it. This provides users with a more integrated experience. The methods covered
    in this chapter apply largely to both Windows Forms and Web Forms applications.
    For one of the projects, we’ll show how to build a Windows Forms-based report
    viewer that allows you to use `SSRS 2012` as the reporting solution for your application.


    In this chapter, you’ll do the following:


    ### URL rendering access


    Learn how to build a `URL` through which a client application can access a report
    on the report server. You’ll use the Employee Service Cost report in the example
    (available with the code download for this chapter in the Source Code/Download
    section of the Apress Web site at [`www.apress.com`](http://www.apress.com)).


    ### URL reporting parameters


    Explore the reporting parameters that, when specified in the `URL`, control how
    the report is rendered. You can specify the actual format (for example, `HTML`
    or `PDF`). You can specify that a specific page in a report be rendered, or you
    can search for a particular word and start rendering on that page.


    ### URL viewer application


    Build a simple `.NET` Windows Forms application that accesses and renders a report
    via a `WebBrowser` control that you’ll embed in a form.


    ### Report Server Web service calls


    Use calls to the Report Server Web service to query for the report criteria and
    filter parameters. This allows you to display these on your Windows Forms application.
    You’ll then use the `SOAP API` again to see whether the parameters have a list
    of values from which the user can select. If so, you’ll use those values to populate
    combo boxes for each parameter. You’ll also give the user a combo box to select
    a rendering format. You’ll then display all the selections to the users and use
    their selected values to create a `URL` that contains all the information necessary
    to run the report. Finally, you’ll use this `URL` with the embedded Web browser
    to render the report with user-entered report parameters and rendering commands.


    ### Report Viewer control, server-side mode


    Use the `Report Viewer control` to render the same report using the control’s
    server-side mode.


    ### Report Viewer control, local rendering


    Use the `Report Viewer control` and a locally populated dataset to render a report
    locally without an `SSRS` report server.


    ### Report Viewer control in an ASP.NET application


    Use the `Report Viewer control` and render a server-side report. We will make
    use of the Web service to retrieve a list of reports to choose from.


    Before you run the included examples, make sure to read the `ReadMe.htm`. It is
    located in a file in the samples root folder. If you have the code open in `Visual
    Studio`, it will be under the Solution Items folder. It contains setup and configuration
    steps that are required before running the examples.'
