  trans: '

    # 安全部署 SSRS


    安全是当今企业的首要任务之一。为客户提供安全可靠的计算环境不仅是良好实践，而且在许多情况下是强制性要求，受到严格的联邦法规约束。就我们的情况而言，这意味着必须遵守《健康保险流通与责任法案》（HIPAA）。这要求制定相应的政策和程序，以确保机密的患者信息不仅能够安全传输，而且只能由有权查看的人员访问。为此，我们必须确保通过网络连接（尤其是互联网）传输的数据在源头即被加密。


    SSRS 是一个基于角色的应用程序，它通过定义的角色（例如只能查看报表和报表数据的“内容浏览者”）来访问其存储的对象。这些角色与基于 Windows 的登录账户相关联，因此
    SSRS 主要依赖 Windows 作为其身份验证源。可以扩展 SSRS 的安全模型以支持其他身份验证方法，例如基于表单的身份验证，用户可以使用 Windows
    外部维护的账户登录以访问报表服务器。由于 SSRS 具有多个身份验证点——即在报表服务器级别通过 `http.sys`，以及数据访问级别（SQL 或 Windows
    身份验证）——因此当修改默认的基于 Windows 角色的安全模型时，会存在特定的安全风险。其一，需要设置 `http.sys` 以允许显式访问和对用户凭据进行自定义验证。另一个风险是，SSRS
    一次只能支持一个安全扩展。换句话说，单个 SSRS 报表服务器可以扩展为支持非默认的身份验证模型，或保留为默认的 Windows 身份验证，但不能同时利用两种模型。根据您对自定义安全的需求程度——例如，您需要在面向互联网的服务器上部署
    SSRS，或者您的应用程序已经支持表单身份验证，而要适应 Windows 身份验证的限制过于困难——那么您可能需要考虑自定义安全扩展。而我们的需求使得我们可以轻松地将
    SSRS 纳入现有的 Windows 身份验证模型。


    另一种处理安全的方法是通过具有自身身份验证层的基于 Windows 或 Web 的应用程序。在 Visual Studio 的 Windows 窗体和 Web
    窗体设计器中，使用 `ReportViewer` 控件，您可以将应用程序作为进入报表服务器的门户。只要应用程序处理了安全，您就可以通过使用类似 `DOMAIN\ServerName$`
    的 Active Directory 计算机账户，授予应用程序服务器访问 Reporting Services 内所需对象的权限。


    在本书中，我们将介绍两种部署场景：


    *   使用虚拟专用网 (VPN) 和防火墙技术进行内网部署，以允许访问 SSRS 报表服务器

    *   使用终端服务安全连接到 SSRS 报表服务器的 Internet 托管应用程序


    在第 11 章中，我们将引导您使用提供所需加密级别和用户身份验证的技术来保护 SSRS 部署模型。除了我们介绍的两种模型外，我们还将简要讨论集成基于表单的身份验证方法的方式，允许客户端通过
    Internet 直接连接到 SSRS。


    ## 总结


    通过为 SQL Server 2005、2008 和 2008 R2 创建和部署了众多 SSRS 项目，我们与其他 SQL Server 社区成员一样，热切期待着
    SQL Server 2012 的发布。在您阅读本书的过程中，我们将指出 SSRS 2008 R2 和 SSRS 2012 中发布的增强功能。然而，与本书的其他版本一样，我们的主要目标是向您展示如何利用高级功能，提供有用的示例，使您能够在真实环境中运用
    SSRS，而您所部署的报表和应用程序的用户将对解决方案的成功拥有最终决定权。


    # 第 2 章 报表创作：设计高效查询


    SSRS 提供了一个平台，用于在包含多种信息数据源的环境中开发和管理报表。这些数据源既可以包括关系数据（例如 SQL Server、Oracle、MySQL
    等），也可以包括非关系数据（例如 Active Directory、LDAP 存储和 Exchange Server）。像 ODBC、OLE DB 和 .NET
    这样的标准促进了从这些不同数据存储中检索数据，因此只要您的系统具有相关驱动程序，SSRS 就可以访问数据。在 SSRS 报表设计环境中，配置驱动报表内容的数据集是设计过程的第一步。


    然而，在我们介绍报表设计环境的众多元素之前，重要的是从任何数据驱动型报表（无论是 Business Objects Reports、SSRS 还是 Microsoft
    Access）的核心开始，那就是查询。对于任何报表设计应用程序而言，开发一个能高效返回所需数据的查询是报表成功的关键。


    在本章中，我们将描述以下内容：


    *   *本书中报表查询的目标——医疗保健数据库*：在设计高效的查询之前，您必须理解数据的设计。当无法获得完整的架构详情时，我们还将描述一种熟悉数据的简便方法。

    *   *如何为报表目的设计基本但有效的 SQL 查询*：我们将基于真实世界的应用程序创建查询，这些是报表编写者和数据库管理员每天都会创建的那种查询。

    *   *如何使用 SSMS 评估查询性能*：初始查询定义了报表的性能和价值，因此了解创建和测试查询所需的工具以确保其既准确又针对高性能进行了调优非常重要。

    *   *如何将优化后的查询转换为参数化的存储过程*：这使您可以受益于预编译和缓存的执行计划以实现更快的性能，以及受益于该过程在 SQL Server 上的集中更新和保护。


    ## 介绍示例关系数据库


    在本书中，我们将向您展示如何为基于 SQL Server 的医疗保健应用程序设计和部署报表解决方案，并构建自定义的 .NET SSRS 应用程序，该应用程序使用关系表和存储过程。该应用程序最初是为家庭健康和临终关怀机构设计的，这些机构通常在患者家中为其提供临床护理。我们本书中的示例，即在线事务处理
    (OLTP) 数据库，为该应用程序提供支持，捕获家庭健康和临终关怀患者的账单和临床信息。我们将使用的数据库名为 `Pro_SSRS`，可从 Apress 网站的
    Source Code/Download 区域（[`http://www.apress.com`](http://www.apress.com)）下载，同时附有
    `ReadMe.txt` 文件中的说明，指导如何还原数据库以供本章及后续章节使用。

    '
- fmt: "## Introducing the Schema Design\n\nOver the years, developers have added\
    \ features to the application and altered the database schema many times to accommodate\
    \ the new functionality and to capture required data. This data is needed not\
    \ only to perform operational processes such as creating bills and posting payments\
    \ to the patient’s account, but also to provide valuable reports that show how\
    \ well the company is serving its patients. Because these types of healthcare\
    \ facilities offer long-term care, our customers need to know if their patients’\
    \ conditions are improving over time and the overall cost of the care delivered\
    \ to them.\n\nThe database designed for the application consists of more than\
    \ 200 tables and has many stored procedures. In this book, you’ll use a subset\
    \ of that database to learn how to develop reports that show the cost of care\
    \ for patients. You’ll use eight main tables for the queries and stored procedures\
    \ throughout the book, and you’ll begin using some of them to build reports as\
    \ you work through the next three chapters. These tables are as follows:\n\n>\
    \ `Trx`: The main transactional data table that stores detailed patient services\
    \ information. We use the term `services` to refer to items with an associated\
    \ cost that are provided for patient care.\n>\n> `Services`: Stores the names\
    \ and categories for the detailed line items found in the `Trx` table. Services\
    \ could be clinical visits such as a skilled nurse visit, but could also include\
    \ billable supplies, such as a gauze bandage or syringes.\n>\n> `ServiceLogCtgry`:\
    \ The main grouping of services that are similar and provide a higher-level grouping.\
    \ For example, all visits can be associated with a “Visits” `ServiceLogCtgry`\
    \ for reporting.\n>\n> `Employee`: Stores records specific to the `employee`,\
    \ in this case a clinician or other staff member such as a chaplain visiting a\
    \ hospice patient. An employee is assigned to each visit stored in the `Trx` table.\n\
    >\n> `Patient`: Includes demographic information about the patient receiving the\
    \ care. This table, like the `Employee` table, links directly to the `Trx` table\
    \ for detailed transactional data.\n>\n> `Branch`: Stores the branch name and\
    \ location of the patient receiving the care. `Branches`, in the sample reports,\
    \ are cost centers from which visits and services were delivered.\n>\n> `Chargelnfo`:\
    \ Contains additional information related to the individual `Trx` records that\
    \ is specific to charges. Charges have an associated charge, unlike payments and\
    \ adjustments, which are also stored in the `Trx` table.\n>\n> `Diag`: Stores\
    \ the primary diagnoses of the patient being cared for and links to a record in\
    \ the `Trx` table.\n\n[Figure 2-1](#Chapter02.html#fig_2_1) shows a graphical\
    \ layout of the eight tables and how they’re joined.\n\n![Image](images/9781430238102_Fig02-01.jpg)\n\
    \n**Figure 2-1.** Viewing the sample application’s database tables\n\n## Knowing\
    \ Your Data: A Quick Trick with a Small Procedure\n\nFor every report writer,\
    \ familiarity with the location of the data in a given database can come only\
    \ with time. Of course, having a database diagram or schema provided by a vendor\
    \ is a useful tool, and we have the luxury of that here, but this isn’t always\
    \ available. One day, faced with the dilemma of trying to find the right table\
    \ for a specific piece of missing data, we decided to put together a stored procedure,\
    \ which we named `sp_FieldInfo`. It returns a list of all the tables in a specific\
    \ database that share field names, typically the primary or foreign key fields.\
    \ For example, in the healthcare database, if you want a list of tables that contain\
    \ the `PatID` field (the patient’s ID number that’s used to join several tables),\
    \ you would use the following command:\n\n`sp_FieldInfo PatID`\n\nThe output would\
    \ be similar to that shown in [Table 2-1](#Chapter02.html#tab_2_1).\n\n![Image](images/tab_2_1.jpg)\n\
    \nArmed with this information, you could at least deduce that, for example, the\
    \ patient’s diagnosis information is stored in the `PatDiag` table. However, table\
    \ and field names aren’t always intuitively named. When we encounter a database\
    \ such as this from time to time, we can run a SQL Server Profiler trace and perform\
    \ some routine tasks on the associated application, such as opening a form and\
    \ searching for an identifiable record to get a starting point with the captured\
    \ data. The Profiler returns the resulting query with table and field names that\
    \ we can then use to discern the database structure.\n\n![Image](images/square.jpg)\
    \ **Tip** SQL Server Profiler is an excellent tool for capturing not only the\
    \ actual queries and stored procedures executing against the server, but also\
    \ the performance data, such as the duration of the execution time, the central\
    \ processing unit (CPU) cycles and input/output (I/O) measurements, and the application\
    \ that initiated the query. Because you can save this data directly to an SQL\
    \ table, you can analyze it readily, and it even makes a good source of data for\
    \ a report in SSRS.\n\n[Listing 2-1](#Chapter02.html#list_2_1) displays the code\
    \ to create the `sp_fieldinfo` stored procedure. You can find the code for this\
    \ query in the code download file `CreateFieldInfo.sql` in the SQL Queries folder.\n\
    \n**Listing 2-1.** Creating the `sp_FielIinfo` Stored Procedure\n\n```\nIF EXISTS\
    \ (SELECT * FROM INFORMATION_SCHEMA.ROUTINES\n               WHERE ROUTINE_NAME\
    \ = 'sp_FieldInfo'\n               AND SPECIFIC_SCHEMA = 'dbo')\n       DROP PROCEDURE\
    \ [dbo].[sp_FieldInfo]\nGO\nCREATE PROCEDURE [dbo].[sp_FieldInfo]\n(\n       \
    \ @column_name VARCHAR(128) = NULL\n)\nAS\nSELECT\n        TABLE_NAME AS [Table\
    \ Name]\n        , RTRIM(COLUMN_NAME) AS [Field Name]\nFROM\n        INFORMATION_SCHEMA.COLUMNS\n\
    WHERE\n        COLUMN_NAME LIKE '%' + @column_name + '%'\n```\n\n### Introducing\
    \ Query Design Basics\n\nWhether you’re a seasoned pro at writing SQL queries\
    \ manually through a text editor or someone who prefers to design queries graphically,\
    \ the result is what matters. Accuracy, versatility, and efficiency of the underlying\
    \ query are the three goals that designers strive to achieve. Accuracy is critical,\
    \ but a query that performs well and is versatile enough to be used in more than\
    \ one report makes the subsequent report design task much easier. For scalability\
    \ and low response times, efficiency is paramount. A great report that takes 15\
    \ minutes to render will be a report your users rarely run. Keep the following\
    \ goals in mind as you begin to develop your report queries:\n\n> *The query must\
    \ return accurate data*: As the query logic becomes more complex, the chance of\
    \ inaccuracy increases with extensive criteria and multiple joins.\n>\n> *The\
    \ query must be scalable*: As the query is developed and tested, be aware that\
    \ its performance might change radically as the load increases with more users.\
    \ We cover performance monitoring with simulated loads in [Chapter 10](#Chapter10.html).\
    \ However, in this chapter we’ll show how to use tools to test query response\
    \ times for a single execution in order to improve performance.\n>\n> *The query\
    \ should be versatile*: Often a single query or stored procedure can drive many\
    \ reports at once, saving on the time it takes to maintain, administer, and develop\
    \ reports. However, delivering too much data to a report at once, to support both\
    \ details and a summary, can affect performance. It’s important to balance versatility\
    \ with efficiency."
