    Let’s step through the process of creating the shared data source for the stored
    procedure `Emp_Svc_Cost`. First, right-click Shared Data Sources in the Solution
    Explorer, and select Add New Data Source; the Shared Data Source Properties dialog
    box will appear. Second, click the Edit button in the dialog box to create the
    connection string. In this case, you know that the server that contains your source
    database and stored procedure is located on the local SQL Server, so you can type
