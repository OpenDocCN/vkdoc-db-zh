  trans: '

    ## 实现文本框


    文本框控件从 SSRS 2005 到 2008 经历了一次重大升级，但此后便再无变动。值得庆幸的是，它现在支持对文本进行富格式化（请注意，这与“富文本格式”不同）。许多现在可以实现的功能，在
    SSRS 2005 中是不可能的，或者至少是非常困难的。你现在可以格式化单个文本框内的独立文本块，也可以在文本框内使用占位符组合来自数据集的所有字段。这一切都是通过
    HTML 标签实现的，这些标签可以作为表达式值导入到文本框本身，或者包含在数据集中并与报表一起呈现。


    要学习如何创建具有富格式化的文本框，请从包含空文本框控件的 `TextBox_Start.rdl` 报表开始。在 `Pro_SSRS` 解决方案中打开 `TextBox_Start.rdl`。初始报表将如
    图 4-7 所示。


    ![Image](img/9781430238102_Fig04-07.jpg)


    **图 4-7.** 带有空白文本框的 `TextBox_Start` 报表


    在这个例子中，我们假设你作为报表设计器，需要将字面文本与数据合并到一封表单信函中，该信函将作为调查发送给患者。这份调查（我们将在 第 6 章完成）将包含关于患者特定就诊的信息，但除此之外必须是一个通用模板，对每位患者提出相同的问题。报表还将在单个文本框中包含粗体、下划线和斜体字体属性。


    要了解自 SSRS 2008 以来关于文本框的首要概念是 `占位符`。占位符本质上是文本框中的一个位置，它将包含文本框的各个部分，并且可以为其中的值或表达式设置自定义格式。每个占位符也有自己的属性，例如工具提示、操作和对齐方式。


    首先，单击 `TextBox_Start` 报表中的文本框以选中它。然后，右键单击并选择“创建占位符”。你将看到文本框属性对话框，如 图 4-8 所示。


    ![Image](img/9781430238102_Fig04-08.jpg)


    **图 4-8.** 文本框占位符属性


    在这个演示中，你将添加一个简单的日期占位符、一个问候语和一个数据字段，每个都使用不同的格式样式。在 第 6 章，你将通过创建一个患者调查表单信函来扩展这个示例，该信函会组合矩形和表格等多个对象，以提供详细的服务报告和调查问卷。对于像这样的简单文本框，数据集
    `Pro_SSRS_DS` 不可用分组，因此在这个例子中，你将使用 `First` 函数从数据集中提取患者姓名。


    在占位符属性对话框仍打开的情况下，在“标签”字段中输入“Today”，在“值”字段中输入 `=NOW()`。关于格式化的一点重要说明是：如果在“常规”选项卡上选择了
    HTML，则“数字”选项卡上的其他日期格式化规则将不会被应用。因此，对于此占位符，请选择“无 – 仅纯文本”，如 图 4-9 所示。


    ![Image](img/9781430238102_Fig04-09.jpg)


    **图 4-9.** 第一个文本框占位符的值属性


    在“数字”选项卡上，为“类别”选择“日期”，为“样式”选择“2000 年 1 月 31 日 星期一”，如 图 4-10 所示，然后单击“确定”。


    ![Image](img/9781430238102_Fig04-10.jpg)


    **图 4-10.** 文本框占位符的纯文本日期格式


    回到“设计”选项卡，在刚刚添加的占位符下方单击，转到文本框中的下一行。直接在文本框中输入单词“Dear”，后面跟一个空格。这将作为信函的问候语。现在，在你键入的空格正后方的位置右键单击，再次选择“创建占位符”。在“标签”中，输入“Patient
    Name”。对于表达式，单击值字段右侧的表达式按钮以打开表达式生成器。在“类别”框中单击“数据集”，在“项”框中选择 `Pro_SSRS_DS`。在“值”框中选择
    `First(Patient_Name)`。请注意，如 图 4-11 所示，该值被展开为 `=First(Fields!Patient_Name.Value,
    "Pro_SSRS_DS")`。你会在这里以及本书各处注意到，在 SSRS 2012 中，为了便于使用和清晰明了，字段的完整表达式值已被简化。例如，`Fields!Patient_Name.Value`
    在设计模式下通常会简显示为 `[Patient_Name]`。


    ![Image](img/9781430238102_Fig04-11.jpg)


    **图 4-11.** 文本框的患者姓名值


    此时呈现报表并不能有效展示如何在单个文本框中实现多种格式。不过，此时添加单独的格式设置非常简单，只需选择你的占位符并选择任何你想要的格式即可。高亮显示“Today”占位符，确保选中整个标签。接着，单击工具栏上的斜体按钮。然后，选择“Patient
    Name”占位符并单击粗体按钮。图 4-12 展示了一个具有多种格式的单个文本框对象的预览。


    ![Image](img/9781430238102_Fig04-12.jpg)


    **图 4-12.** 单个文本框的多种格式输出


    如前所述，即使是如此简单的自定义格式，在 SSRS 2005 中也是不可用的，因此 SSRS 2008 代表了报表设计领域的巨大飞跃。在下一章中，你将通过直接从
    SQL 表导入 HTML 格式，以及从多个数据集中导入记录，来制作更复杂的报表，从而创建一份完整的自定义患者调查信函。


    Textbox 对象的完整报表名为 `TextBox.rdl`，位于 `Pro_SSRS` 项目中。

    '
- fmt: "### Implementing a Table\n\nThe Table data region provides a means of organizing\
    \ data into tabular rows and columns with possible multiple grouping levels. Every\
    \ Table data region has, by default, a row that contains detail records as well\
    \ as Table headers and footers. You can group tables on individual fields from\
    \ a single dataset or with expressions that might combine multiple fields. Tables\
    \ make it easy to design a uniform report because of the structured nature of\
    \ the Table. Fields from the dataset are simply added to a cell within the Table,\
    \ and when the report is rendered, it’s automatically formatted. The List data\
    \ region provides much of the same functionality as tables, but you have to position\
    \ and align fields manually.\n\nThe starting-point report for the Table report\
    \ object that we will demonstrate in this section is called `Table Start.rdl`.\
    \ You will find it in the `Pro_SSRS` project, in the Source Code/Download area\
    \ for the book on the Apress site. Open the `Table Start.rdl` file in BIDS to\
    \ begin.\n\nAs you did with the List, you will begin on the Design tab and double-click\
    \ the Table in the Toolbox. This adds a Table to the report design area. Next,\
    \ drag the same fields you used for the list example to the detail row of the\
    \ table—`Employee_Name`, `Service_Type`, `Estimated_Cost`, and `Visit_Count` as\
    \ detail information and `Patient_Name` for the group. To add the first four fields\
    \ to the detail row, you need to add a fourth column to the Table. You accomplish\
    \ this by right-clicking the bar at the top of the middle column and selecting\
    \ Insert Column to the Right. You now have four equally sized columns to which\
    \ you can drag the four fields so that the report appears as it does in [Figure\
    \ 4-13](#Chapter04.html#fig_4_13), with the fields placed in the detail row of\
    \ the Table. You will wait to add the `Patient_Name` field until you add a grouping\
    \ level. Notice that the column headings for each of the fields are added automatically\
    \ when the fields are dropped into the individual cells.\n\n![Image](images/9781430238102_Fig04-13.jpg)\n\
    ***Figure 4-13.** Table data region with detail rows*\n\nTo add the `Patient_Name`\
    \ field to the Table so that the report has the same functionality as the list\
    \ you created previously, you need to insert a group in the Table. To do this,\
    \ simply drag the `Patient_Name` field in the `emp_svc_cost` dataset down into\
    \ the Row Groups section and release it just above the (Details) row group as\
    \ shown in [Figure 4-14](#Chapter04.html#fig_4_14) below.\n\n![Image](images/9781430238102_Fig04-14.jpg)\n\
    ***Figure 4-14.** Creating a Row Group using drag-and-drop*\n\nYou can view the\
    \ Group Properties by clicking the down arrow to the right of the `Patient_Name`\
    \ group and then selecting the Group Properties option (see [Figure 4-15](#Chapter04.html#fig_4_15)).\n\
    \n![Image](images/9781430238102_Fig04-15.jpg)\n***Figure 4-15.** Grouping Properties\
    \ dialog box*\n\nTo distinguish the patient from the employee, make the `Patient_Name`\
    \ cell bold. For clarity, delete each of the headers that were originally added\
    \ when you added the detail row fields— click the cells of the header, and press\
    \ the Delete key. Next, resize the columns, if required, to expand the Patient\
    \ Name and Employee Name columns. You can accomplish this either by dragging the\
    \ right edge of each column to the right or by selecting the entire column and\
    \ entering the desired width in inches in the Properties window. You can get to\
    \ the context-sensitive Properties windows by pressing F4.\n\nFinally, you need\
    \ to set an additional grouping level for the detail row, as you did for the header\
    \ row that contains the `Patient_Name` field. Right-click (Details) in Row Groups\
    \ and select Group Properties. Click Add and select the `Employee_Name` field\
    \ to be grouped on the details row. You also need to make sure the `Estimated_Cost`\
    \ and `Visit_Count` fields have the `Sum` function applied to them—`=Sum(Fields!Estimated_Cost.Value)`,\
    \ for example— and then you can preview the report. An easy way to accomplish\
    \ this is to highlight the Estimated Cost expression in the Table, right click\
    \ it and select Sum under the Summarize By submenu. When the report is rendered,\
    \ it performs similarly to the List you created previously, as shown in [Figure\
    \ 4-16](#Chapter04.html#fig_4_16).\n\nYou can add more grouping levels to the\
    \ Table at this point if you need to, but for now you’ll learn how to combine\
    \ the Table with the free-form Rectangle to show how it’s possible to extend beyond\
    \ the structured nature of the Table while maintaining multiple grouping levels.\n\
    \n![Image](images/9781430238102_Fig04-16.jpg)\n***Figure 4-16.** Preview of table*\n\
    \nThe RDL listing for the Table you’ve created will span many pages, so we have\
    \ chosen, where appropriate, to include a section of the RDL output for each of\
    \ the data regions. In [Listing 4-2](#Chapter04.html#list_4_2), you can see a\
    \ complete `<TablixCell>` section that would be a child node to the `<TablixCell>`,\
    \ `<TablixRow>`, and ultimately the `<Tablix>` elements. The particular cell from\
    \ the Table that the RDL is referencing is the `Patient_Name` field that you added\
    \ to its own grouping in the Table. Notice also that the field has a section of\
    \ RDL that defines `CanGrow`. Assigning the `CanGrow` property to a cell within\
    \ the Table data region enables it to expand automatically to fit the length of\
    \ the data that it contains. The opposite is achievable too, by assigning the\
    \ `CanShrink` property.\n\n![Image](images/square.jpg) **Note** In all releases\
    \ since SSRS 2008, the `Tablix` property refers to Table, Matrix, and List objects,\
    \ and therefore the RDL, which previously referenced Table or Matrix specifically,\
    \ now references `Tablix`.\n\n***Listing 4-2.** RDL Section for Table Data Region*\n\
    \n```xml\n<TablixCell>\n<CellContents>\n    <Textbox Name=\"textbox3\">\n    <CanGrow>true</CanGrow>\n\
    \    <KeepTogether>true</KeepTogether>\n    <Paragraphs>\n        <Paragraph>\n\
    \        <TextRuns>\n            <TextRun>\n            <Value />\n          \
    \  <Style />\n        </TextRun>\n        </TextRuns>\n        <Style />\n   \
    \     </Paragraph>\n    </Paragraphs>\n    <rd:DefaultName>textbox3</rd:DefaultName>\n\
    \    <ZIndex>17</ZIndex>\n    <Style>\n    <PaddingLeft>2pt</PaddingLeft>\n  \
    \  <PaddingRight>2pt</PaddingRight>\n    <PaddingTop>2pt</PaddingTop>\n    <PaddingBottom>2pt</PaddingBottom>\n\
    \    </Style>\n</CellContents>\n</TablixCell>\n```\n\nThe completed report for\
    \ the Table object is called `Table.rdl` and is in the `Pro_SSRS` project."
  raw: '### Implementing a Table


    The Table data region provides a means of organizing data into tabular rows and
    columns with possible multiple grouping levels. Every Table data region has, by
    default, a row that contains detail records as well as Table headers and footers.
    You can group tables on individual fields from a single dataset or with expressions
    that might combine multiple fields. Tables make it easy to design a uniform report
    because of the structured nature of the Table. Fields from the dataset are simply
    added to a cell within the Table, and when the report is rendered, it’s automatically
    formatted. The List data region provides much of the same functionality as tables,
    but you have to position and align fields manually.


    The starting-point report for the Table report object that we will demonstrate
    in this section is called `Table Start.rdl`. You will find it in the `Pro_SSRS`
    project, in the Source Code/Download area for the book on the Apress site. Open
    the Table Start.rdl file in BIDS to begin.


    As you did with the List, you will begin on the Design tab and double-click the
    Table in the Toolbox. This adds a Table to the report design area. Next, drag
    the same fields you used for the list example to the detail row of the table—`Employee_Name`,
    `Service_Type`, `Estimated_Cost`, and `Visit_Count` as detail information and
    `Patient_Name` for the group. To add the first four fields to the detail row,
    you need to add a fourth column to the Table. You accomplish this by right-clicking
    the bar at the top of the middle column and selecting Insert Column to the Right.
    You now have four equally sized columns to which you can drag the four fields
    so that the report appears as it does in [Figure 4-13](#Chapter04.html#fig_4_13),
    with the fields placed in the detail row of the Table. You will wait to add the
    `Patient_Name` field until you add a grouping level. Notice that the column headings
    for each of the fields are added automatically when the fields are dropped into
    the individual cells.


    ![Image](images/9781430238102_Fig04-13.jpg)


    ***Figure 4-13.** Table data region with detail rows*


    To add the `Patient_Name` field to the Table so that the report has the same functionality
    as the list you created previously, you need to insert a group in the Table. To
    do this, simply drag the `Patient_Name` field in the `emp_svc_cost` dataset down
    into the Row Groups section and release it just above the (Details) row group
    as shown in [Figure 4-14](#Chapter04.html#fig_4_14) below.


    ![Image](images/9781430238102_Fig04-14.jpg)


    ***Figure 4-14.** Creating a Row Group using drag-and-drop*


    You can view the Group Properties by clicking the down arrow to the right of the
    `Patient_Name` group and then selecting the Group Properties option (see [Figure
    4-15](#Chapter04.html#fig_4_15)).


    ![Image](images/9781430238102_Fig04-15.jpg)


    ***Figure 4-15.** Grouping Properties dialog box*


    To distinguish the patient from the employee, make the `Patient_Name` cell bold.
    For clarity, delete each of the headers that were originally added when you added
    the detail row fields— click the cells of the header, and press the Delete key.
    Next, resize the columns, if required, to expand the Patient Name and Employee
    Name columns. You can accomplish this either by dragging the right edge of each
    column to the right or by selecting the entire column and entering the desired
    width in inches in the Properties window. You can get to the context-sensitive
    Properties windows by pressing F4.


    Finally, you need to set an additional grouping level for the detail row, as you
    did for the header row that contains the `Patient_Name` field. Right-click (Details)
    in Row Groups and select Group Properties. Click Add and select the `Employee_Name`
    field to be grouped on the details row. You also need to make sure the `Estimated_Cost`
    and `Visit_Count` fields have the `Sum` function applied to them—`=Sum(Fields!Estimated_Cost.Value)`,
    for example— and then you can preview the report. An easy way to accomplish this
    is to highlight the Estimated Cost expression in the Table, right click it and
    select Sum under the Summarize By submenu. When the report is rendered, it performs
    similarly to the List you created previously, as shown in [Figure 4-16](#Chapter04.html#fig_4_16).


    You can add more grouping levels to the Table at this point if you need to, but
    for now you’ll learn how to combine the Table with the free-form Rectangle to
    show how it’s possible to extend beyond the structured nature of the Table while
    maintaining multiple grouping levels.


    ![Image](images/9781430238102_Fig04-16.jpg)


    ***Figure 4-16.** Preview of table*


    The RDL listing for the Table you’ve created will span many pages, so we have
    chosen, where appropriate, to include a section of the RDL output for each of
    the data regions. In [Listing 4-2](#Chapter04.html#list_4_2), you can see a complete
    `<TablixCell>` section that would be a child node to the `<TablixCell>`, `<TablixRow>`,
    and ultimately the `<Tablix>` elements. The particular cell from the Table that
    the RDL is referencing is the `Patient_Name` field that you added to its own grouping
    in the Table. Notice also that the field has a section of RDL that defines `CanGrow`.
    Assigning the `CanGrow` property to a cell within the Table data region enables
    it to expand automatically to fit the length of the data that it contains. The
    opposite is achievable too, by assigning the `CanShrink` property.


    ![Image](images/square.jpg) **Note** In all releases since SSRS 2008, the `Tablix`
    property refers to Table, Matrix, and List objects, and therefore the RDL, which
    previously referenced Table or Matrix specifically, now references `Tablix`.


    ***Listing 4-2.** RDL Section for Table Data Region*


    `<TablixCell>`

    `<CellContents>`

    `    <Textbox Name="textbox3">`

    `    <CanGrow>true</CanGrow>`

    `    <KeepTogether>true</KeepTogether>`

    `    <Paragraphs>`

    `        <Paragraph>`

    `        <TextRuns>`

    `            <TextRun>`

    `            <Value />`

    `            <Style />`

    `        </TextRun>`

    `        </TextRuns>`

    `        <Style />`

    `        </Paragraph>`

    `    </Paragraphs>`

    `    <rd:DefaultName>textbox3</rd:DefaultName>`

    `    <ZIndex>17</ZIndex>`

    `    <Style>`

    `    <PaddingLeft>2pt</PaddingLeft>`

    `    <PaddingRight>2pt</PaddingRight>`

    `    <PaddingTop>2pt</PaddingTop>`

    `    <PaddingBottom>2pt</PaddingBottom>`

    `    </Style>`


    The completed report for the Table object is called `Table.rdl` and is in the
    `Pro_SSRS` project.'
  trans: "### 实现表格\n\n表格数据区域提供了一种将数据组织成表格形式的行与列的方法，并可支持多级分组。默认情况下，每个表格数据区域都包含存放详细记录的行以及表格的页眉和页脚。你可以基于单个数据集中的个别字段，或是结合多个字段的表达式，对表格进行分组。由于表格的结构化特性，它使得设计统一格式的报告变得简单。数据集中的字段只需添加到表格内的单元格中，报告在呈现时就会自动格式化。列表数据区域提供了与表格大致相同的功能，但你需要手动定位和对齐字段。\n\
    \n我们将在本节演示的表格报告对象的起始报告名为 `Table Start.rdl`。你可以在 Apress 网站本书的源代码/下载区域的 `Pro_SSRS`\
    \ 项目中找到它。请在 BIDS 中打开 `Table Start.rdl` 文件开始操作。\n\n如同处理列表一样，你将从“设计”选项卡开始，双击“工具箱”中的表格。这会将一个表格添加到报告设计区域。接下来，将用于列表示例的相同字段拖放到表格的详细信息行中——`Employee_Name`、`Service_Type`、`Estimated_Cost`\
    \ 和 `Visit_Count` 作为详细信息，`Patient_Name` 用于分组。要将前四个字段添加到详细信息行，你需要向表格中添加第四列。这可以通过右键单击中间列顶部的栏并选择“在右侧插入列”来实现。现在你有了四列等宽的列，可以将四个字段拖放进去，使报告显示为如\
    \ 图 4-13 所示，字段放置在表格的详细信息行中。`Patient_Name` 字段将等到你添加分组级别时再添加。请注意，当字段被放入各个单元格时，它们的列标题会自动添加。\n\
    \n![Image](img/9781430238102_Fig04-13.jpg)\n***图 4-13.** 包含详细信息行的表格数据区域*\n\n要将\
    \ `Patient_Name` 字段添加到表格中，使报告具有与你之前创建的列表相同的功能，你需要在表格中插入一个分组。为此，只需将 `emp_svc_cost`\
    \ 数据集中的 `Patient_Name` 字段拖放到“行组”区域，并在“(详细信息)”行组的上方释放，如下面的 图 4-14 所示。\n\n![Image](img/9781430238102_Fig04-14.jpg)\n\
    ***图 4-14.** 通过拖放创建行组*\n\n你可以通过单击 `Patient_Name` 分组右侧的向下箭头，然后选择“分组属性”选项来查看组属性（参见\
    \ 图 4-15）。\n\n![Image](img/9781430238102_Fig04-15.jpg)\n***图 4-15.** 分组属性对话框*\n\
    \n为了区分患者和员工，将 `Patient_Name` 单元格设为粗体。为了清晰起见，删除添加详细信息行字段时最初添加的每个标题——单击标题单元格，然后按\
    \ Delete 键。接下来，如果需要，调整列宽以扩展患者姓名和员工姓名列。你可以通过将每列的右边缘向右拖动，或者选中整列并在“属性”窗口中输入以英寸为单位的所需宽度来完成此操作。你可以通过按\
    \ F4 键调出上下文相关的“属性”窗口。\n\n最后，你需要为详细信息行设置一个额外的分组级别，就像为包含 `Patient_Name` 字段的标题行所做的那样。右键单击“行组”中的“(详细信息)”，然后选择“分组属性”。单击“添加”，并选择\
    \ `Employee_Name` 字段作为详细信息行的分组依据。你还需要确保 `Estimated_Cost` 和 `Visit_Count` 字段应用了\
    \ `Sum` 函数——例如，`=Sum(Fields!Estimated_Cost.Value)`——然后你就可以预览报告了。一个简单的方法是：在表格中高亮显示\
    \ Estimated Cost 表达式，右键单击它，并在“ Summarize By（汇总依据）”子菜单下选择“Sum（求和）”。当报告呈现时，其功能与你之前创建的列表类似，如\
    \ 图 4-16 所示。\n\n如果需要，你现在可以向表格添加更多的分组级别，但接下来你将学习如何将表格与自由格式的矩形结合使用，以展示如何在保持多级分组的同时，扩展超越表格的结构化特性。\n\
    \n![Image](img/9781430238102_Fig04-16.jpg)\n***图 4-16.** 表格预览*\n\n你创建的表格的 RDL\
    \ 清单将跨越许多页面，因此我们选择在适当地方包含每个数据区域的 RDL 输出部分。在 清单 4-2 中，你可以看到一个完整的 `<TablixCell>`\
    \ 部分，它将是 `<TablixCell>`、`<TablixRow>` 以及最终的 `<Tablix>` 元素的子节点。RDL 引用的表格中的特定单元格是你添加到其自身分组中的\
    \ `Patient_Name` 字段。另请注意，该字段有一段 RDL 定义了 `CanGrow`。为表格数据区域内的单元格分配 `CanGrow` 属性使其能够自动扩展以适应其包含数据的长度。通过分配\
    \ `CanShrink` 属性也可以实现相反的效果。\n\n![Image](img/square.jpg) **注意** 自 SSRS 2008 以来的所有版本中，`Tablix`\
    \ 属性指的是表格、矩阵和列表对象，因此，以前专门引用表格或矩阵的 RDL，现在引用 `Tablix`。\n\n***清单 4-2.** 表格数据区域的 RDL\
    \ 部分*\n\n```xml\n<TablixCell>\n<CellContents>\n    <Textbox Name=\"textbox3\"\
    >\n    <CanGrow>true</CanGrow>\n    <KeepTogether>true</KeepTogether>\n    <Paragraphs>\n\
    \        <Paragraph>\n        <TextRuns>\n            <TextRun>\n            <Value\
    \ />\n            <Style />\n        </TextRun>\n        </TextRuns>\n       \
    \ <Style />\n        </Paragraph>\n    </Paragraphs>\n    <rd:DefaultName>textbox3</rd:DefaultName>\n\
    \    <ZIndex>17</ZIndex>\n    <Style>\n    <PaddingLeft>2pt</PaddingLeft>\n  \
    \  <PaddingRight>2pt</PaddingRight>\n    <PaddingTop>2pt</PaddingTop>\n    <PaddingBottom>2pt</PaddingBottom>\n\
    \    </Style>\n</CellContents>\n</TablixCell>\n```\n\n表格对象的完成报告名为 `Table.rdl`，位于\
    \ `Pro_SSRS` 项目中。"
- fmt: "### Implementing a Rectangle\n\nThe Rectangle data region, as discussed earlier,\
    \ is similar to the List data region in that it’s a free-form container object\
    \ for report items and encapsulates all the objects into one defined area, so\
    \ when it’s repositioned or deleted altogether, the objects inside are repositioned\
    \ or deleted too. As with all the other report objects and data regions we’ll\
    \ cover, you can position and scope the rectangle inside other data regions.\n\
    \nThe Rectangle data region is more limited than the List data region, as it contains\
    \ no grouping levels. You can, however, group the objects or data regions inside\
    \ a Rectangle and use rectangles in several creative ways in an SSRS report. You\
    \ will pick up where you left off on the previous sample, using the Table data\
    \ region, and add a Rectangle as a placeholder inside the table. This way, you\
    \ can add a level of free-form design to the report while maintaining the structure\
    \ afforded by the Table data region. In this example, we will also use the Textbox\
    \ report object that we introduced previously. A Textbox can contain literal string\
    \ values such as a report title; it might also contain an expression. You can\
    \ use a Textbox object to add titles to the free-form objects that you place inside\
    \ the Rectangle.\n\nThe starting-point report for this section is called `Rectangle\
    \ Start.rdl`. It’s available in the `Pro_SSRS` project in the Source Code/Download\
    \ area for the book on the Apress site.\n\nTo begin, open the `Rectangle Start.rdl`\
    \ report, and follow these steps to add a rectangle to the entire detail row:\n\
    \n> 1.  Drag a Rectangle data region from the Toolbox into the extended detail\
    \ row in the Rectangle Start report.\n> 2.  Drag two fields, `Visit_Count` and\
    \ `Estimated_Cost`, from the `emp_svc_cost` dataset into the detail area. Place\
    \ them vertically so that the `Visit_Count` field is above the `Estimated_Cost`\
    \ field. Notice that SSRS automatically assigns the `Sum` aggregate function to\
    \ the fields.\n> 3.  Drag two textboxes from the Toolbox into the rectangle to\
    \ the left of the two fields you just added. The textboxes, which can contain\
    \ expressions or literal strings, serve as labels. Inside the textboxes, type\
    \ Visit Count and Estimated Cost, respectively.\n> 4.  Add formatting to the textboxes\
    \ by selecting both with shift-click and then setting the text color property\
    \ to Firebrick and the font size to 12 point. You will also make the `Estimated_Cost`\
    \ and `Visit_Count` fields bold. You can find these settings on the standard formatting\
    \ toolbar or in the Properties window. When complete, the report layout will look\
    \ like it does in [Figure 4-17](#Chapter04.html#fig_4_17).\n\n![Image](images/9781430238102_Fig04-17.jpg)\n\
    \n#### Figure 4-17. Rectangle in table with formatting\n\nWhen you preview the\
    \ report, the `Estimated_Cost` field doesn’t appear to be in the correct format,\
    \ which should be currency. Each textbox contains formatting properties that you\
    \ can set in several ways. In the Layout tab, right-click the textbox that contains\
    \ the sum of the `Estimated_Cost` data field, and select Properties. You can set\
    \ the format for the textbox value on the Format tab of the Textbox Properties\
    \ dialog box. Alternatively, you can alter the Format property in the Properties\
    \ window. Choose Currency (see [Figure 4-18](#Chapter04.html#fig_4_18)). The default\
    \ currency format, with a code of “C,” contains two decimal places. If you wish,\
    \ you can override this by choosing Custom and typing “C0” or “C1”, which would\
    \ give you no decimal places or one decimal place, respectively. For this example,\
    \ leave the default two decimal places.\n\n![Image](images/9781430238102_Fig04-18.jpg)\n\
    \n#### Figure 4-18. Choosing Format using Text Box dialog box\n\nWhen you click\
    \ OK and preview the report, you can see that you now have a single detail row\
    \ that’s formatted with vertically aligned, appropriately formatted textboxes,\
    \ as shown in [Figure 4-19](#Chapter04.html#fig_4_19). Using a Rectangle in this\
    \ manner allows more flexibility when adding several free-form elements to a report\
    \ while still providing the multiple grouping levels of the table.\n\n![Image](images/9781430238102_Fig04-19.jpg)\n\
    \n#### Figure 4-19. Preview of table with formatting\n\nYou can see the RDL output\
    \ of the Rectangle that you added to the table in [Listing 4-3](#Chapter04.html#list_4_3).\n\
    \n#### Listing 4-3. RDL Output for Rectangle\n\n```\n<Rectangle Name=\"rectangle1\"\
    >\n  <ReportItems>\n    <Textbox Name=\"Visit_Count\">\n      <CanGrow>true</CanGrow>\n\
    \      <KeepTogether>true</KeepTogether>\n      <Paragraphs>\n        <Paragraph>\n\
    \          <TextRuns>\n            <TextRun>\n              <Value>=Sum(Fields!Visit_Count.Value)</Value>\n\
    \              <Style>\n                <FontWeight>Bold</FontWeight>\n      \
    \        </Style>\n            </TextRun>\n          </TextRuns>\n          <Style>\n\
    \            <TextAlign>Right</TextAlign>\n          </Style>\n```\n\nThe completed\
    \ report for the Rectangle object is called `Rectangle.rdl` and is located in\
    \ the `Pro_SSRS` project."
