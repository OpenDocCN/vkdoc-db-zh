- fmt: '# 报告设计步骤


    ## 布局调整


    现在你已经合并了患者的全名，可以通过点击数据单元格并按`Delete`键来删除“Pat Last Name”字段。在预览报告之前，还有一些其他任务需要完成。


    首先是将“Zip”列移动到“State”列的右侧。只需点击包含“Zip”的单元格，并将其拖到“State”列的右侧即可。


    接下来，调整字段大小，使每条记录都能在一行内显示。在用于报告的字段中，“Diagnosis”和“Address”字段可能是最大的，因为它们是可变长度字段，通常包含20到50个字符。然而，由于我们希望每列的标题显示在一行上，因此也需要调整“Start
    of Care”字段的大小。


    在此示例中，将“Pat ID”字段调整到约0.5英寸，将“Diagnosis”、“Start of Care”和“Address 1”字段扩展到约1.5英寸，然后预览报告，如`Figure
    13-27`所示。代表数据的`x`字符数量将与数据库字段中最大值中的字符数量一样多，这使得确定如何调整每列大小变得容易。


    “Address”字段显示为`NA`的原因是，这些信息要么是经过混淆处理（例如患者姓名），要么被修改为`NA`以移除可识别信息。


    另请注意，在`Figure 13-27`中，每个字段在列标题级别自动包含一个交互式排序图标。尽管点击图标会重新渲染报告，但在你配置排序之前，实际上不会执行任何排序操作。下一步我们将进行配置。


    ![Image](images/9781430238102_Fig13-27.jpg)


    **Figure 13-27.** 预览患者情况表报告


    ## 排序与分组


    点击工具栏上的“Design Report”按钮返回报告的设计区域。接下来，右键单击“Pat ID”数据单元格，然后在工具栏上选择“Sort and Group”。这将打开“Sort”对话框。选中“Patient
    Census”组，选择首先按“Pat ID”排序，然后按“Patient Name”排序，最后按“Diagnosis”排序，如`Figure 13-28`所示。你还可以选择在每个组后添加分页符作为组选项。此时请不要添加分页符。单击“OK”后，你可以预览报告，并看到每个定义列的排序工作正常。


    ![Image](images/9781430238102_Fig13-28.jpg)


    **Figure 13-28.** 排序和分组选项


    关于将字段拖到报告的表区域，我们还需要提及一点：分组会自动从左到右定义。换句话说，将字段拖放到另一个字段的右侧会将该字段保留在同一组中（本例中为“Patient
    Census”组）；但是，如果你已经将一个字段拖到表中，然后又将另一个字段拖到它的左侧，则会根据被放置字段的名称创建另一个组。你可以在`Figure 13-29`中看到这一点，例如将“Branch
    Name”字段拖到“Pat ID”字段的左侧。


    如果你正在进行这些操作，请继续将“Branch Name”字段拖到报告中以查看自动分组效果。同时，请将表头行调整为一行高。然后将整个表拖得离标题更近一些。执行这些步骤后，应该会得到一个类似于`Figure
    13-29`所示的报告。


    ![Image](images/9781430238102_Fig13-29.jpg)


    **Figure 13-29.** 自动创建的分组


    ## 保存与部署


    在将报告保存到报告服务器之前，你可以最后预览一次。请注意，在`Figure 13-30`中，新添加的“Branch Name”组会自动隐藏重复值，并将“Patient
    Census”组中的每条记录归类到其指定的分支名称下。此时，你可以使用标准的格式化功能，例如添加边框、更改单元格甚至字体的大小、颜色和对齐方式，但基础报告已满足你的需求，因此可以继续部署它。


    ![Image](images/9781430238102_Fig13-30.jpg)


    **Figure 13-30.** 预览新的“Branch Name”组


    将报告部署到报告服务器就像点击工具栏上的“Save”按钮一样简单。点击“Save”后，会出现一个“Save Report”对话框，允许你导航到报告服务器上可访问的文件夹；在本例中，双击打开“Pro_SSRS”文件夹。如果你的SSRS
    2008 R2服务器上没有“Pro_SSRS”文件夹，只需导航到报告管理器（`http://localhost/Reports/`），然后点击主屏幕工具栏上的“New
    Folder”按钮。将文件夹命名为“Pro_SSRS”，然后单击“OK”以在“ReportServer”数据库中创建新文件夹的定义。将此报告命名为“Patient
    Face Sheet”，如`Figure 13-31`所示，然后单击“Save”按钮。


    你可以稍后导航到报告管理器以确保报告已成功保存，但现在，你将转到下一种将要学习创建的报告类型，即矩阵报告。


    ![Image](images/square.jpg) **注意** 虽然你会将报告保存到报告服务器，并且可以将其加载回Report Builder 1.0进行修改，但也可以从文件位置打开Report
    Builder 1.0的RDL文件。从文件打开报告是任务窗格中的一个选项，可以通过在“View”菜单下选择“Task Pane”或按`Ctrl+F1`来访问。


    ![Image](images/9781430238102_Fig13-31.jpg)


    **Figure 13-31.** 将报告保存到服务器'
  raw: 'Now that you have the patient’s full name combined, you can delete the Pat
    Last Name field by clicking the data cell and pressing the Delete key. A couple
    of other tasks remain before previewing the report. The first one is to move the
    Zip column to the right of the State column. To do this, just click on the cell
    containing Zip and drag it to the right of the State column. Next, let’s resize
    the fields so that each record will fit on a single line. Of the fields you have
    used for the report, the Diagnosis and Address fields have the potential to be
    the largest, as they are variable-length fields that usually contain between 20
    and 50 characters. However, since we want the headers for each column to be on
    one row, we will also resize Start of Care. For this example, size the Pat ID
    field to about .5 inches, expand the Diagnosis, Start of Care, and Address 1fields
    to approximately 1.5 inches, and preview the report, as shown in [Figure 13-27](#Chapter13.html#fig_13_27).
    There will be as many *x* characters representing the data as there are characters
    found in the largest value in the database field, which makes it easy to determine
    how much to resize each column. The reason that the Address fields display NA
    is because this information was either scrambled, in the case of the patient names,
    or modified to be NA to remove identifiable information. Notice also, in [Figure
    13-27](#Chapter13.html#fig_13_27), that each field automatically contains an interactive
    sorting icon at the column heading level. Though clicking the icon will re-render
    the report, no actual sorting will be performed until you configure it to do so.
    You will do that next.


    ![Image](images/9781430238102_Fig13-27.jpg)


    ***Figure 13-27.** Previewing the Patient Face Sheet report*


    Return to the design area of the report by clicking the Design Report button on
    the toolbar. Next, right-click the Pat ID data cell, and then select Sort and
    Group on the toolbar. This will open the Sort dialog box. With the Patient Census
    group selected, choose to first sort by Pat ID, then by Patient Name, and finally
    by Diagnosis, as shown in [Figure 13-28](#Chapter13.html#fig_13_28). You also
    have the ability to put a page break after each group as a group option. Do not
    add a page break at this time. Once you click OK, you can preview the report and
    see that the sorting for each of the defined columns is working correctly.


    ![Image](images/9781430238102_Fig13-28.jpg)


    ***Figure 13-28.** Sorting and grouping options*


    We should mention one more thing about dragging fields to the table area of the
    report: groups are automatically defined from left to right. In other words, dragging
    and dropping fields to the right of another field keeps the field in the same
    group, in this case the Patient Census group; however, if you have already dragged
    a field to the table and then drag another one to the left of it, another group
    is created based on the name of the field that is dropped. You can see this in
    [Figure 13-29](#Chapter13.html#fig_13_29), where if you were to drag the Branch
    Name field to the left of the Pat ID field. If you are going through these steps,
    go ahead and drag the Branch Name field to the report to see the automatic grouping.
    Also, go ahead and resize the table header row to have a height of one line. Then
    drag the entire table to be a little closer to the title. Performing these steps
    should result in a report similar to that shown in [Figure 13-29](#Chapter13.html#fig_13_29).


    ![Image](images/9781430238102_Fig13-29.jpg)


    ***Figure 13-29.** Automatically created groups*


    You can preview the report one last time before saving it to the report server.
    Notice in [Figure 13-30](#Chapter13.html#fig_13_30) that the newly added branch
    group hides duplicate values automatically and groups each record from the Patient
    Census group under its assigned branch name. You could, at this point, use standard
    formatting features such as adding a border or changing the background color of
    cells or even the font size, color, and justification if you so desired, but the
    base report meets your needs, so go ahead and deploy it.


    ![Image](images/9781430238102_Fig13-30.jpg)


    ***Figure 13-30.** Previewing a new Branch Name group*


    Deploying the report to the report server is as simple as clicking the Save button
    on the toolbar. After clicking Save, a Save Report dialog box appears that allows
    you to navigate to an accessible folder on the report server; in this case, open
    Pro_SSRS folder by double clicking it. If you do not have a Pro_SSRS folder on
    your SSRS 2008 R2 server, simply navigate to the Report Manager ([`http://localhost/Reports/`](http://localhost/Reports/))
    and click the New Folder button on the toolbar of the home screen. Name the folder
    Pro_SSRS and click OK to create the definition of the new folder in the ReportServer
    database. Name this report Patient Face Sheet, as shown in [Figure 13-31](#Chapter13.html#fig_13_31),
    and click the Save button.


    You can navigate to the Report Manager later to make sure the report was saved
    successfully, but for now, you will move on to the next type of report you will
    learn how to create, a matrix report.


    ![Image](images/square.jpg) **Note** Though you will save the report to the report
    server and can load it back into Report Builder 1.0 for modification, it is possible
    to open a Report Builder 1.0 RDL file from a file location as well. Opening a
    report from a file is a choice in the task pane, accessible by selecting the Task
    Pane under the View menu or by pressing Ctrl+F1.


    ![Image](images/9781430238102_Fig13-31.jpg)


    ***Figure 13-31.** Saving a report to the server*'
  trans: '# 报告设计步骤


    ## 布局调整


    现在你已经合并了患者的全名，可以通过点击数据单元格并按`Delete`键来删除“Pat Last Name”字段。在预览报告之前，还有一些其他任务需要完成。


    首先是将“Zip”列移动到“State”列的右侧。只需点击包含“Zip”的单元格，并将其拖到“State”列的右侧即可。


    接下来，调整字段大小，使每条记录都能在一行内显示。在用于报告的字段中，“Diagnosis”和“Address”字段可能是最大的，因为它们是可变长度字段，通常包含
    20 到 50 个字符。然而，由于我们希望每列的标题显示在一行上，因此也需要调整“Start of Care”字段的大小。


    在此示例中，将“Pat ID”字段调整到约 0.5 英寸，将“Diagnosis”、“Start of Care”和“Address 1”字段扩展到约 1.5
    英寸，然后预览报告，如`Figure 13-27`所示。代表数据的`x`字符数量将与数据库字段中最大值中的字符数量一样多，这使得确定如何调整每列大小变得容易。


    “Address”字段显示为`NA`的原因是，这些信息要么是经过混淆处理（例如患者姓名），要么被修改为`NA`以移除可识别信息。


    另请注意，在`Figure 13-27`中，每个字段在列标题级别自动包含一个交互式排序图标。尽管点击图标会重新渲染报告，但在你配置排序之前，实际上不会执行任何排序操作。下一步我们将进行配置。


    ![Image](img/9781430238102_Fig13-27.jpg)


    **Figure 13-27.** 预览患者情况表报告


    ## 排序与分组


    点击工具栏上的“Design Report”按钮返回报告的设计区域。接下来，右键单击“Pat ID”数据单元格，然后在工具栏上选择“Sort and Group”。这将打开“Sort”对话框。选中“Patient
    Census”组，选择首先按“Pat ID”排序，然后按“Patient Name”排序，最后按“Diagnosis”排序，如`Figure 13-28`所示。你还可以选择在每个组后添加分页符作为组选项。此时请不要添加分页符。单击“OK”后，你可以预览报告，并看到每个定义列的排序工作正常。


    ![Image](img/9781430238102_Fig13-28.jpg)


    **Figure 13-28.** 排序和分组选项


    关于将字段拖到报告的表区域，我们还需要提及一点：分组会自动从左到右定义。换句话说，将字段拖放到另一个字段的右侧会将该字段保留在同一组中（本例中为“Patient
    Census”组）；但是，如果你已经将一个字段拖到表中，然后又将另一个字段拖到它的左侧，则会根据被放置字段的名称创建另一个组。你可以在`Figure 13-29`中看到这一点，例如将“Branch
    Name”字段拖到“Pat ID”字段的左侧。


    如果你正在进行这些操作，请继续将“Branch Name”字段拖到报告中以查看自动分组效果。同时，请将表头行调整为一行高。然后将整个表拖得离标题更近一些。执行这些步骤后，应该会得到一个类似于`Figure
    13-29`所示的报告。


    ![Image](img/9781430238102_Fig13-29.jpg)


    **Figure 13-29.** 自动创建的分组


    ## 保存与部署


    在将报告保存到报告服务器之前，你可以最后预览一次。请注意，在`Figure 13-30`中，新添加的“Branch Name”组会自动隐藏重复值，并将“Patient
    Census”组中的每条记录归类到其指定的分支名称下。此时，你可以使用标准的格式化功能，例如添加边框、更改单元格甚至字体的大小、颜色和对齐方式，但基础报告已满足你的需求，因此可以继续部署它。


    ![Image](img/9781430238102_Fig13-30.jpg)


    **Figure 13-30.** 预览新的“Branch Name”组


    将报告部署到报告服务器就像点击工具栏上的“Save”按钮一样简单。点击“Save”后，会出现一个“Save Report”对话框，允许你导航到报告服务器上可访问的文件夹；在本例中，双击打开“Pro_SSRS”文件夹。如果你的
    SSRS 2008 R2 服务器上没有“Pro_SSRS”文件夹，只需导航到报告管理器（`http://localhost/Reports/`），然后点击主屏幕工具栏上的“New
    Folder”按钮。将文件夹命名为“Pro_SSRS”，然后单击“OK”以在“ReportServer”数据库中创建新文件夹的定义。将此报告命名为“Patient
    Face Sheet”，如`Figure 13-31`所示，然后单击“Save”按钮。


    你可以稍后导航到报告管理器以确保报告已成功保存，但现在，你将转到下一种将要学习创建的报告类型，即矩阵报告。


    ![Image](img/square.jpg) **注意** 虽然你会将报告保存到报告服务器，并且可以将其加载回 Report Builder 1.0 进行修改，但也可以从文件位置打开
    Report Builder 1.0 的 RDL 文件。从文件打开报告是任务窗格中的一个选项，可以通过在“View”菜单下选择“Task Pane”或按`Ctrl+F1`来访问。


    ![Image](img/9781430238102_Fig13-31.jpg)


    **Figure 13-31.** 将报告保存到服务器'
- fmt: '### Creating a Matrix Report


    Unlike a table report, a matrix report displays aggregated values two-dimensionally
    with column groups as well as row groups. The totals, whether they are sums, averages,
    or counts, intersect at the grouping levels for columns and rows. This creates
    a cross-tab report similar to a pivot table in Microsoft Excel. One of the requests
    for the report was to show the length of stay for patients, from the time they
    were admitted to the time they were discharged. It is also a requirement that
    the discharge reason show on the report. You can combine these two requests perfectly
    into a single matrix report.


    So, return to the Report Builder 1.0 design area, and click the Matrix (cross-tab)
    report in the Report layout section of the Task Pane. This opens a new blank matrix
    template where you can drag and drop fields onto the Matrix data region, just
    as you did with the table report. The template is nothing more than a predefined
    Matrix data region to which you will add several fields, as shown in [Figure 13-32](#Chapter13.html#fig_13_32).


    ![Image](images/9781430238102_Fig13-32.jpg)


    **Figure 13-32.** Blank matrix report


    To start this report, expand the `Total Length of Stay` attribute in our Fields
    list. Drag the `Avg Length of Stay` attribute that was calculated when the model
    was generated over to the totals area of the Matrix. For the row grouping, add
    the `Discharge Reason` field. Finally, drag the `Marital Status ID` field to the
    column grouping area so that the matrix report resembles [Figure 13-33](#Chapter13.html#fig_13_33).
    It will be necessary to resize the `Discharge Reason` field and center-justify
    the `Marital Status ID` field. You will also at this time add a title to the report:
    Average Length of Stay. Make the title bold and set the font type to Arial Rounded
    MT Bold.


    ![Image](images/9781430238102_Fig13-33.jpg)


    **Figure 13-33.** Matrix report with data


    When previewed, the report is already taking shape, as shown in [Figure 13-34](#Chapter13.html#fig_13_34);
    however, you need to address some anomalies. First, the number format is not what
    you expected or wanted. A general number, which by default is the data type assigned
    to the `Avg Length of Stay` field, is not desired. You will need to add formatting
    to the number. Second, you will see rows and columns with empty values. This is
    happening for two likely reasons. First, you are including patients who have not
    been discharged yet, in other words, active patients. Second, marital status is
    not a required field, so some records will not have values.


    ![Image](images/9781430238102_Fig13-34.jpg)


    **Figure 13-34.** Initial preview of a matrix report


    You can take care of the number formatting by returning to the design area, right-clicking
    the last column (which is the total), and selecting `Format`. In the `Format`
    dialog box, change the defined format from `General` to `1234.56`, as shown in
    [Figure 13-35](#Chapter13.html#fig_13_35), and change the decimal places from
    `2` to `0`. Then click `OK`. Perform the same formatting on all of the other value
    fields.


    ![Image](images/9781430238102_Fig13-35.jpg)


    **Figure 13-35.** Changing the number formatting


    To address the empty columns, add a filter to the report to limit the data to
    only discharged patients with discharge reasons and to patients who have a marital
    status defined. The `Filter` button on the toolbar will launch the `Filter Data`
    dialog box. In [Figure 13-36](#Chapter13.html#fig_13_36), you can see that you
    can add four filter conditions: where `MaritalStatusID`, `Discharge Date`, and
    `Discharge Reason` are not empty and where the `Discharge Year` is greater than
    or equal to `2010`. (We added the last filter to demonstrate that it is possible
    to have the report prompt the user for a value as a parameter that is tied to
    a filter.) To change the comparison operator from the default of equal to not
    empty, click on empty and select both `Not` and `Is Empty` from the available
    operators. For the Discharge year, select the `Greater Than or Equal To` operator.
    After you set the year to be `2010`, click on the `Discharge Year` label and select
    `Prompt` to set it as a report parameter as depicted by the green question mark
    icon shown next to the `Discharge Year` filter label.


    ![Image](images/9781430238102_Fig13-36.jpg)


    **Figure 13-36.** Setting up report filters


    Now, when you preview the matrix report in [Figure 13-37](#Chapter13.html#fig_13_37),
    you can see that the numbers have been cleaned up and all empty fields are gone;
    also, you are prompted for the discharge year. Change the `Discharge Year` parameter
    to `2011` to see those results. Save the report as Average Length of Stay to the
    Pro_SSRS folder on the report server, just as you did the table report. We will
    now move on to create the final report using Report Builder 1.0, the chart.


    ![Image](images/9781430238102_Fig13-37.jpg)


    **Figure 13-37.** Setting up report filters previewing the report'
