- fmt: '# Security Management


    SSRS 2012 does not allow administrators to edit the tasks available to roles or
    to add new roles through the Web-based `Report Manager`. That work is relegated
    to the `SSMS 2012` interface. Open `SSMS` and connect to the `Reporting Services`
    instance by using the `Connect` button and selecting `Reporting Services`. The
    dialog box will look similar to the normal connection screen, but the server type
    will be `Reporting Services`. Enter the name of the `SSRS` server and click `Connect`
    to view the available options. [Figure 11-11](#Chapter11.html#fig_11_11) shows
    the connection screen.


    Once connected, you will find three sections listed for the instance. The section
    we will focus on here is the second, `Security`. Expand the `Security` node to
    reveal two subnodes, `Roles` and `System Roles`. The `Roles` section is used to
    manage user access on a reporting level. This section handles regular users who
    need to view, browse, and create reports. The second section, `System Roles`,
    is used to administer privileges for overall system tasks. We will focus on the
    `Roles` section here.


    ![Image](images/9781430238102_Fig11-11.jpg)

    `Figure 11-11.` Connecting to `SSRS` via `SSMS`


    Expand the `Roles` node to see the five default roles that we discussed earlier.
    To see the properties of the role, right-click the browser and select `Properties`.
    You will see a description for the role, along with each of the tasks that the
    role can have. [Figure 11-12](#Chapter11.html#fig_11_12) shows you how this will
    look. From this window, you can edit the description or edit what tasks the role
    can perform. You do not want to change the `Report Builder` role tasks now, so
    have a look around to get a feel for what options you have with security changes,
    but click `Cancel` to discard any changes you might have made.


    ![Image](images/9781430238102_Fig11-12.jpg)

    `Figure 11-12.` Viewing the `Report Builder` role task permissions


    From `SSRS`, you can also add new roles or edit any existing roles for the server.
    This is important if you need to create a new custom role for users who may need
    permission that is slightly elevated from a standard `SSRS` role. This interface
    is identical to the role-editing window and can be reached by right-clicking the
    `Roles` node and selecting `New Role`.


    ## Testing SSRS Role Assignments


    In this section, we will go through the process of adding folders and report objects
    that would be in line with what nurse `jyoungblood` would use. You will want to
    ensure that she will not have the ability to navigate to other folders and run
    other reports that may contain confidential information.


    The first step in testing `jyoungblood`’s access to the reports that have been
    defined for her security group, `RN`, is to publish the reports to a folder on
    the `SSRS` server that will contain reports for registered nurses. As the administrator
    for the test, open `Report Manager`, and create two new folders: one in the root
    folder called `Clinical Reports` and then one inside the `Clinical Reports` folder
    called `Registered Nurse`. To do this, simply click `New Folder` in `Report Manager`.
    Because both of these folders, by default, are inheriting permissions from the
    parent folder, which currently is configured for administrator access only, you
    will alter the permissions manually so that the new folder (and the reports and
    data source you will add to it) will maintain its own security settings.


    To publish reports to the `Registered Nurse` folder, you could use any method
    already covered in the previous deployment chapter, but for this test, simply
    upload a report you have already worked with: `Daily Schedule`. Then create a
    data source called `RN_DS` for the purposes of testing security. Upload the report
    file `Daily Schedule.rdl` from `Report Manager` in the `Pro_SSRS` project. In
    `Report Manager`, in the `Registered Nurse` folder, simply click `Upload File`,
    browse to `Daily Activity.rdl`, and click `OK`. To create the data source manually
    with `Report Manager`, simply click `New Data Source` in the `Registered Nurse`
    folder, name the data source `RN_DS`, and set the connection string to the following
    (replacing `localhost`, if necessary, with your `SQL Server` server name where
    you have created the `Pro_SSRS` database):


    ```

    Data Source=localhost;Initial Catalog=Pro_SSRS

    ```


    In this case, you will choose to set the data source authentication method to
    `Credentials Stored Securely in the Report Server` and supply a name and password
    that will be used to access the data in the `Pro_SSRS` database. Assuming that
    `jyoungblood`’s `Windows` account was granted access to the data source database,
    you could have selected the `Windows Integrated Security` option to pass through
    the `Windows` account to the `SQL Server` database. You know that you will configure
    the report to filter out data that are relevant only to the clinician `jyoungblood`,
    so you don’t need to be overly concerned with the stored credentials. If you don’t
    already have a `SQL Server` login with permissions to the `Pro_SSRS` database,
    go ahead and create one called `myreportuser` and give it `db_datareader` permissions
    to the database. You can see the completed screen for setting up this new data
    source in [Figure 11-13](#Chapter11.html#fig_11_13).


    ![Image](images/9781430238102_Fig11-13.jpg)

    `Figure 11-13.` Setting up the `RN_DS` data source


    [Figure 11-14](#Chapter11.html#fig_11_14) shows the folder structure and setup
    of the report objects for the initial test you will perform. At this point, you
    have not granted `SSRS` role assignments to the `Windows` account, `jyoungblood`,
    or the security group, `RN`, of which she is a member. The `Daily Activity` report
    provides clinicians with a list of their daily activities. In a data-driven subscription,
    where the report can be mailed to the clinicians after processing, the parameter
    for the employee’s ID was used to create reports with data unique to each individual.
    In this test now, however, you want to allow access to the same report to be run
    manually from `Report Manager`. This poses its own set of concerns, which we will
    cover as we step you through the process.


    ![Image](images/9781430238102_Fig11-14.jpg)

    `Figure 11-14.` Report objects for registered nurse test'
