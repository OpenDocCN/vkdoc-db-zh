    Web 服务地址。在本例中，你将添加 [`http://localhost/reportserver/reportservice2010.asmx`](http://localhost/reportserver/reportservice2010.asmx)。如果你不是直接在
    SSRS 服务器上开发，可能需要更改此 URL 中的服务器名称。将此 Web 服务引用命名为 `SSRS_WebService`。你可以在 图 9-11 中看到这应该是什么样子。


