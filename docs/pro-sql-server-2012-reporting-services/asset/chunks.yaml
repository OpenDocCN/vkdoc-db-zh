    To begin, open the EmployeeListing_Start.rdl report. The steps to produce the
    initial basic report, as shown in [Figure 6-14](#Chapter06.html#fig_6_14) are
    straightforward, with only a few pointers needed. First, you will be using a Table
    data region again, so simply drag the table to the report area on the Design surface.
    When you add a table, BIDS automatically generates three columns. Add another
    column to the table. Next, add the following fields onto the detail columns: EmployeeID,
    LastName, HireDate, and Discipline. The employee Discipline field references an
    employee’s clinical specialty, such as Home Health Aide or Skilled Nurse. Now
    that we have a start, let’s edit the Lastname field to make it a concatenated
    value for Employee Name using the LastName and FirstName columns separated by
    a comma (Ex. LastName, FirstName). Right click on the Lastname textbox in the
    details row and select Expression. Because the first and last name fields have
    been padded with spaces, you will want to use the RTRIM function to remove the
    extra spaces. The expression for the last name text box should look like this:


    `=RTRIM(Fields!LastName.Value) & ", " & RTRIM(Fields!FirstName.Value)`


    Now that you have combined LastName and FirstName into one, change the header
    from Last Name to Employee Name. Make the entire header row of the table Bold.
    Finally, let’s change the Employee column to look a little more like a hyperlink.
    Select the EmployeeID detail field and then set text to be underlined and the
    font color to blue.


    ![Image](images/9781430238102_Fig06-14.jpg)


    ***Figure 6-14.** Employee Listing report with hyperlink actions*


    Additionally, when using dates, the default format includes the date and time
    values, even if there is no time associated with the date. The hire date might
    look like this, for example: 10/20/2003 12:00:00 AM. By right clicking and selecting
    the Textbox Properties of the Hire Date cell, you can change the format from the
    default to a more standard format. Change the format under the Number tab to MM/DD/YYYY
    format, such as 10/20/2011, excluding any time value. The format code for this
    date is d or you can enter MM/dd/yyyy.


    Next, because you are returning detail records, with more than one per employee,
    you need to group the detail row itself using the value of the Employee Name field.
    You can do this by right-clicking the detail row grouping in the Row Groups area
    and selecting Group Properties. In the Group On expression field, add the same
    trimmed employee name as shown in the previous code line. Now, when you preview
    the report, you have your list of employees to which you can add hyperlink actions.
    Finally, force a page break after this table so you can add a detailed table that
    will be used as a bookmark link. To add a page break to a report, simply select
    the tablix, then right-click a column to get to the table properties, as shown
    in [Figure 6-15](#Chapter06.html#fig_6_15). On the General tab, select Add a Page
    Break After.


    ![Image](images/9781430238102_Fig06-15.jpg)


    ***Figure 6-15.** Tablix Properties*


    #### Adding a Bookmark Link


    In this section, you will add a bookmark link to the Employee Name field in the
    Employee Listing report that, when clicked, will jump to a defined location within
    the report. In this case, you will not add another Table data region to the report
    to contain detail information about employee visits. Bookmarks ease the navigation
    burden on large reports when users are looking for specific information. As discussed
    previously, summary and detail information can exist within the same report; in
    the case of adding a bookmark, you are not hiding the data so much as moving it
    to another location within the same report. The net effect for the user is the
    same, however, in that they control when they see the detail information.


    To add a bookmark to the Employee Listing report, first follow the procedure to
    drag a new table element to the Design tab. Next, drag the patLastName over into
    the first column of the table. Right click it and choose Expression. Write an
    expression similar to the one you did for the Employee Name column earlier, but
    utilize the patLastName and patFirstName columns. Rename the header Patient Name.
    Now, for this table, you will want to group by the employee name, so right-click
    your detail row and select Add Group and then select Parent Group. You will use
    the same trimmed expression as the group value expression, as follows:


    `=RTRIM(Fields!LastName.Value) & ", " & RTRIM(Fields!FirstName.Value)`


    Change the name of the group to Employee_Name. Then, on the Page Break tab, select
    the option to enable a break Between each instance of a group. This will force
    the detail line for each employee to start on a new page. Next, add the date field
    that represents when the service was performed, =Fields!ChargeServiceStartDate.Value,
    to the third column, and format the date as you did earlier using the MM/dd/yyyy
    style.


    Now when you preview the report, the summary employee listing will appear on the
    first page, and the detail records that show the employee visits will appear on
    each subsequent page.


    Next, you will add a Bookmark property value to the Employee_Name field in the
    detail row of the second table. In SSRS 2012, you will need to add the Bookmark
    to a field using the Properties window. With the Properties window visible, click
    the Employee Name field in the details row, shown in [Figure 6-16](#Chapter06.html#fig_6_16).
    In the Properties window, enter your trimmed employee name expression into the
    bookmark value box. This will serve as the pointer record for the bookmark link
    you will now create.


    ![Image](images/9781430238102_Fig06-16.jpg)


    ***Figure 6-16.** Setting a Bookmark Property Value*


    To create the bookmark link: In the first table, right-click the Employee Name
    detail row and select Textbox Properties and then click the Action tab. In the
    Change Hyperlink Options section of the tab, select Go to Bookmark and paste in
    the trimmed employee name expression you used for the Bookmark property.


    ![Image](images/square.jpg) **Tip** Hyperlink actions do not automatically change
    the formatting of the field to indicate an associated hyperlink. You can manually
    change the color and add underline formatting so that the user knows to click
    the link.


    When you preview the report, and click the new bookmark link, you see the detailed
    information for the selected employee, as shown in [Figure 6-17](#Chapter06.html#fig_6_17).
    You should see detailed information for employee Bailey McDonald; the first three
    pages of the report are the Employee Listing table, where you clicked the bookmark
    link in the Employee_Name field.


    ![Image](images/9781430238102_Fig06-17.jpg)


    ***Figure 6-17.** Employee visit detail report called from a bookmark link*'
  trans: "\n```sql\nSELECT\n        RTRIM(E.EmployeeID) AS EmployeeID\n        , E.LastName\n\
    \        , E.FirstName\n        , E.EmployeeTblID AS EmpTblID\n        , E.EmploymentTypeID\
    \ AS EmploymentType\n        , E.HireDate\n        , D.Dscr AS Discipline\n  \
    \      , P.LastName AS patlastname\n        , P.FirstName AS patfirstname\n  \
    \      , T.ChargeServiceStartDate\n        , D.DisciplineID\n        , P.PatID\n\
    FROM\n        Trx AS T\n        JOIN ChargeInfo AS CI ON T.ChargeInfoID = CI.ChargeInfoID\n\
    \        JOIN Employee AS E ON E.EmployeeTblID = CI.EmployeeTblID\n        JOIN\
    \ Discipline AS D ON E.DisciplineTblID = D.DisciplineTblID\n        JOIN Patient\
    \ AS P ON T.PatID = P.PatID\nWHERE\n        (T.ChargeServiceStartDate BETWEEN\
    \ @DateFrom AND @DateTo)\n```\n\n## 首先，打开 EmployeeListing_Start.rdl 报表\n\n创建如图\
    \ `图 6-14` 所示的初始基本报表的步骤很直接，只需要几个提示。首先，你将再次使用表格数据区域，因此只需将表格拖到设计图面的报表区域。当你添加表格时，BIDS\
    \ 会自动生成三列。为表格再添加一列。\n\n接下来，将以下字段添加到详细列中：`EmployeeID`、`LastName`、`HireDate` 和 `Discipline`。员工的\
    \ `Discipline` 字段指的是员工的临床专业，例如家庭健康助理或专业护士。现在有了一个开始，让我们编辑 `Lastname` 字段，使用 `LastName`\
    \ 和 `FirstName` 列，以逗号分隔（例如：LastName, FirstName），将其转换为一个连接的员工姓名值。\n\n右键单击详细行中的\
    \ `Lastname` 文本框，选择 `表达式`。由于名字和姓氏字段已用空格填充，你需要使用 `RTRIM()` 函数删除多余的空格。姓氏文本框的表达式应如下所示：\n\
    \n```vb\n=RTRIM(Fields!LastName.Value) & \", \" & RTRIM(Fields!FirstName.Value)\n\
    ```\n\n现在你已经将 `LastName` 和 `FirstName` 合并为一个，将标题从“Last Name”更改为“Employee Name”。将表格的整个标题行设为**粗体**。最后，让我们将\
    \ Employee 列改得更像超链接一些。选择 `EmployeeID` 详细字段，然后将文本设置为带下划线，字体颜色设置为蓝色。\n\n![Image](img/9781430238102_Fig06-14.jpg)\n\
    \n`图 6-14.` 带有超链接操作的员工列表报表\n\n此外，在使用日期时，默认格式包含日期和时间值，即使日期没有关联时间。例如，雇用日期可能显示为：`10/20/2003\
    \ 12:00:00 AM`。通过右键单击 `Hire Date` 单元格并选择文本框属性，你可以将格式从默认值更改为更标准的格式。在“数字”选项卡下将格式更改为\
    \ `MM/DD/YYYY` 格式，例如 `10/20/2011`，不包括任何时间值。此日期的格式代码为 `d`，或者你可以输入 `MM/dd/yyyy`。\n\
    \n接下来，因为你返回的是详细记录，每个员工有多条记录，所以你需要使用员工姓名字段的值对详细行本身进行分组。你可以通过右键单击“行分组”区域中的详细行分组并选择\
    \ `分组属性` 来实现这一点。在 `分组依据` 表达式字段中，添加与前面代码行中所示相同的、经过修剪的员工姓名。现在，当你预览报表时，你就有了员工列表，可以为其添加超链接操作。\n\
    \n最后，在此表格后强制分页，以便你可以添加一个将用作书签链接的详细表格。要向报表添加分页符，只需选择表格，然后右键单击某一列以打开表格属性，如图 `图 6-15`\
    \ 所示。在“常规”选项卡上，选择 `在之后添加分页符`。\n\n![Image](img/9781430238102_Fig06-15.jpg)\n\n\
    `图 6-15.` 表格属性\n\n### 添加书签链接\n\n在本节中，你将为员工列表报表中的员工姓名字段添加一个书签链接，当点击时，将跳转到报表中的定义位置。在这种情况下，你不会向报表添加另一个表格数据区域来包含员工访问的详细信息。当用户查找特定信息时，书签可以减轻大型报表的导航负担。如前所述，汇总和详细信息可以存在于同一个报表中；在添加书签的情况下，你并不是隐藏数据，而只是将其移动到同一报表内的另一个位置。然而，对用户来说，最终效果是相同的，因为他们可以控制何时看到详细信息。\n\
    \n要向员工列表报表添加书签，首先按照将新表格元素拖到“设计”选项卡的过程操作。接下来，将 `patLastName` 拖到表格的第一列。右键单击它并选择\
    \ `表达式`。编写一个类似于之前为员工姓名列所做的表达式，但使用 `patLastName` 和 `patFirstName` 列。将标题重命名为“Patient\
    \ Name”。\n\n现在，对于此表格，你将需要按员工姓名进行分组，因此右键单击你的详细行并选择 `添加组`，然后选择 `父组`。你将使用相同的修剪表达式作为组值表达式，如下所示：\n\
    \n```vb\n=RTRIM(Fields!LastName.Value) & \", \" & RTRIM(Fields!FirstName.Value)\n\
    ```\n\n将组名更改为 `Employee_Name`。然后，在“分页符”选项卡上，选择启用 `在每个组实例之间` 分页的选项。这将强制每个员工的详细行从新的一页开始。接下来，将代表服务执行时间的日期字段\
    \ `=Fields!ChargeServiceStartDate.Value` 添加到第三列，并使用 `MM/dd/yyyy` 样式格式化日期，就像之前做的那样。\n\
    \n现在当你预览报表时，汇总的员工列表将出现在第一页，而显示员工访问的详细记录将出现在每一页后续页面上。\n\n接下来，你将为第二个表格的详细行中的 `Employee_Name`\
    \ 字段添加一个 `Bookmark` 属性值。在 SSRS 2012 中，你需要使用属性窗口将书签添加到字段。在属性窗口可见的情况下，单击详细行中的员工姓名字段，如图\
    \ `图 6-16` 所示。在属性窗口中，将你的修剪后的员工姓名表达式输入到书签值框中。这将作为你即将创建的书签链接的指针记录。\n\n![Image](img/9781430238102_Fig06-16.jpg)\n\
    \n`图 6-16.` 设置书签属性值\n\n创建书签链接：在第一个表格中，右键单击员工姓名详细行并选择 `文本框属性`，然后单击 `操作` 选项卡。在选项卡的“更改超链接选项”部分，选择\
    \ `转到书签` 并粘贴你用于 `Bookmark` 属性的修剪后的员工姓名表达式。\n\n![Image](img/square.jpg) **提示**\
    \ 超链接操作不会自动更改字段的格式以指示关联的超链接。你可以手动更改颜色并添加下划线格式，以便用户知道点击链接。\n\n当你预览报表并点击新的书签链接时，你会看到所选员工的详细信息，如图\
    \ `图 6-17` 所示。你应该会看到员工 Bailey McDonald 的详细信息；报表的前三页是员工列表表格，你在那里点击了 `Employee_Name`\
    \ 字段中的书签链接。\n\n![Image](img/9781430238102_Fig06-17.jpg)\n\n`图 6-17.` 通过书签链接调用的员工访问详细报表\n"
- fmt: '## Adding a URL Link


    URL links connect a report to information stored in other locations, such as a
    Microsoft SharePoint site or the Internet. Like bookmark links, URL links are
    defined on the Action tab and can be applied to many report items. As discussed
    in [Chapter 4](#Chapter04.html#ch4), in almost every value field that is used
    in SSRS, expressions define the contents. In the case of the URL, you will build
    an expression that will define the HTTP location, using a combination of the literal
    URL and a field value from the dataset.


    For example, let’s assume that your intranet site has a home page that is designed
    specifically for each employee discipline. An employee who is a home health aide
    would have a `DisciplineID` of `HHA`, and your Web site designed for home health
    aides would be at [`http://webserver1/hha`](http://webserver1/hha). Assuming that
    the same is true for each discipline, it would be easy to add a URL link for each
    discipline to your report.


    Just as you did for the bookmark link for `Employee_Name`, open the Action tab
    for the `Discipline` field. Select Go to URL, and add the following expression:


    ```

    ="http://webserver1/" & Fields!DisciplineID.Value

    ```


    When the `DisciplineID` field is selected within the report, the browser will
    open and connect to the site of the specific employee’s discipline—for example,
    `HHA` for the home health aides site or `RN` for the skilled nursing site.


    ## Building the URL Link with a Report Parameter


    Taking the concept one step further, if you had multiple Web servers at different
    locations or branches, you would not want to hard-fix the Web server name in the
    URL string. Using a report parameter to select the server name based on the branch
    location would make it possible to control the Web server portion of the URL string
    that you created in the previous example. Let’s step through this procedure. [Figure
    6-18](#Chapter06.html#fig_6_18) shows how the Report Parameter Properties dialog
    box should look.


    ![Image](images/9781430238102_Fig06-18.jpg)


    **Figure 6-18.** Report Parameter Properties dialog box


    Follow these steps:


    1.  While on the Design tab, right-click the `Parameters` folder in the Report
    Data pane and select Add Parameter.

    2.  Enter `Branch_URL` for the parameter name.

    3.  Enter `My Branch` for the prompt.

    4.  In the Available Values section, enter the following labels/values: `Branch1`
    = `BrianMcDonaldServer`, `Branch2` = `ShawnMcGeeheeServer`, and `Branch3` = `RodneyLandrumServer`.

    5.  Set the default value to be `BrianMcDonaldServer`.

    6.  Return to the Action tab for the `Discipline` field, and apply the new expression
    `="http://" & Parameters!Branch_URL.Value & "/" & Fields!DisciplineID.Value`.

    7.  Preview the report. Notice that you have a new parameter drop-down list called
    `My Branch` that was set to `Branch1` based on the default value of `BrianMcDonaldServer`.


    With the URL location assigned to be that of the parameter `Branch_URL`, whenever
    a different branch is selected from the drop-down list, the appropriate server
    for that branch will be selected.


    ## Jumping to a Report


    Quite possibly the most useful hyperlink action in SSRS is the ability to link
    to another report, called a *drill-through report*, from a specified location
    within the current report. In this section, you will link to a new report, the
    Patient Survey Letter report, from the Employee Listing report. The Patient Survey
    Letter report uses a single textbox and demonstrates how you can take advantage
    of the new rich text formatting made available with SSRS 2008 to form a mail merge
    style report using both HTML formatting as well as literal text strings, all formatted
    independently.


    You will tie the two reports —the Employee Listing report and the Patient Survey
    Letter report—together by creating a hyperlink from one to the other. You will
    also pass a parameter value along with the hyperlink to narrow the results of
    the Patient Survey Letter report when it is called from the Employee Listing report.
    The parameter values will be `PatID`, `ServiceMonth`, and `ServiceYear`.


    To add the hyperlink action that links to the Patient Survey Letter report, return
    to the Action tab, this time from the `Patient Name` detail row textbox within
    the Employee Listing report. The `Patient Name` detail textbox is in the second
    table, shown in [Figure 6-19](#Chapter06.html#fig_6_19).


    ![Image](images/9781430238102_Fig06-19.jpg)


    **Figure 6-19.** Patient Name detail textbox to add Go to Report hyperlink action


    After clicking the Go to Report button, a drop-down list appears with all the
    reports that are available in the current solution. If the report has already
    been deployed to the report server and is not in the current solution, you can
    use the relative path based on the target server that is defined in the project.
    In this example, the target server is [`http://localhost/reportserver`](http://localhost/reportserver).
    You could add the relative path to any report on the report server. In this case,
    select the `PatientSurveyLetter.rdl` report, and then click the Add button three
    times to add `PatID`, `ServiceMonth`, and `ServiceYear`. Choose the parameters
    that are populated when the report is selected. Later in the “Setting Report Parameters
    with Stored Procedures” section, we will show how to add these parameters to the
    report. Choose `PatID` as the parameter, and assign its value as `=Fields!PatID.Value`,
    which is a field in the Employee Listing report that has a corresponding value
    to the `PatID` parameter. Next create an expression for `ServiceMonth` as `=MONTH(Fields!ChargeServiceStartDate.Value)`
    and `ServiceYear` as `=YEAR(Fields!ChargeServiceStartDate.Value)` respectively.
    After applying the new action, if the `Patient Name` textbox is clicked when previewing
    the Employee Listing report, the Patient Survey Letter report will be called and
    the parameter passed, thus narrowing the dataset for that report to only that
    for the selected patient.


    For the Patient Survey Letter report, you will use a modified version of the `Emp_Svc_Cost`
    stored procedure that includes a parameter for the `PatID` field. The reason for
    doing this is because the Textbox control does not support filter criteria, and
    you will need to limit the letter to one patient as it is linked with a single
    parameter. For merge letters, it is of course possible to use more than one patient.
    To show both linking to another report and to demonstrate the new textbox formatting,
    we simply wanted to show the basics of both.'
