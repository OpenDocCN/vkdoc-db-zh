    ![Image](img/square.jpg) **注意** 使用 `rs.exe` 工具，您可以轻松地将一组数据源和报表部署到多个 SSRS 服务器。若要使用相同的
    RSS 脚本文件进行镜像部署，只需使用不同的服务器参数重新运行 RS 命令即可。创建一个批处理文件，在其中使用不同的服务器目标多次调用 `rs.exe`，是一种轻松将项目以完全相同的方式部署到多个位置的好方法。


    唯一被多次调用的函数是我们用户定义的 `CreateFolder` 方法。这是一个递归函数，它将解析您想要创建的文件夹名称，并逐部分构建它。为了节省空间，这里没有进行错误检查。因此，如果您多次运行此示例，您需要清理此函数创建的文件夹，否则由于文件夹已存在，它将引发异常。


    在命令提示符中，移动到存储 RDL 和 RSS 文件的目录。在命令提示符中键入以下命令，然后按 Enter 运行它。请将报表服务器 URL 更改以反映您的报表服务器。


    ```

    rs -i PublishReports.rss -s http://localhost/reportserver

    ```


    您可以在图 8-11 中查看命令和结果。


    现在，您已经将新的数据源和报表部署到您的报表服务器。示例代码中包含的 RSS 文件可以作为脚本编写您自己的自定义报表项目部署的起点。


    ![Image](img/9781430238102_Fig08-11.jpg)


    ***图 8-11.** 使用 `rs.exe` 工具部署报表和数据源*


    ### 使用报表服务器 Web 服务


    SSRS 2012 提供的用于以编程方式部署报表的方法是使用报表服务器 Web 服务之一（通过 SOAP API，我们将在第 9 章中再次使用它来编写报表查看器）。在本节中，我们将探讨如何使用
    Windows 窗体应用程序将报表部署到 SSRS 2012，该应用程序模拟了客户在准备好用于部署的 RDL 文件后需要执行的操作：


    > *   选择一个报表服务器来发布他们的报表。

    > *   从该服务器上显示的文件夹列表中进行选择，以确定将报表发布到服务器上的哪个文件夹。

    > *   浏览到要从本地计算机上传到其报表服务器的 RDL 文件。


    在处理 SSRS 2012 时，有多个 Web 服务端点可供您使用。每个 Web 服务的旧版本仍然存在以保持向后兼容性，并且能够分别管理本机模式或 SharePoint
    模式的安装。这些旧版本已被弃用，建议升级到最新版本，该版本允许您通过一个 Web 服务控制两种类型的安装。在此示例中，我们将使用最新的管理 Web 服务。


    您将使用报表服务器 Web 服务获取服务器上的文件夹列表，然后将报表上传到服务器。在此示例中，您将上传为医疗保健提供者创建的一些报表。在医疗保健环境中，对报表文件夹及其在服务器上的权限进行严格控制非常重要，因此您不允许用户创建新文件夹；他们只能上传到已有权限使用的现有文件夹中。


    报表服务器 Web 服务的 `CreateCatalogItem` 方法允许您通过从您提供的 RDL 文件在服务器上创建报表副本来将报表部署到报表服务器。这与前面“使用
    `rs.exe` 工具”一节中描述的方法相同。


    ![Image](img/square.jpg) **注意** `CreateReportEditSession` 方法可能会通过网络传输敏感数据，包括用户凭据。在进行
    Web 服务调用时，应尽可能使用 SSL 加密。


    首先，您将使用 Visual Studio 2008 创建一个新的 C# Windows 窗体解决方案。将此项目命名为 `SSRS_Publisher`。此示例将使用
    C# 编写，但网站上的源代码示例也将包含一个用 VB.NET 编写的可工作版本。新项目创建后，将 `Form1.cs` 文件重命名为 `Publisher.cs`，并允许
    VS 更新所有引用。


    #### 访问 Web 服务


    您需要添加对 SSRS 2012 报表服务器 Web 服务的引用，这与您在第 5 章中为报表查看器所做的操作相同。您可以通过选择“项目”->“添加 Web
    引用”，或者在解决方案资源管理器中右键单击“引用”并选择“添加 Web 引用”；或者，您可以在解决方案资源管理器中右键单击项目并选择“添加 Web 引用”。根据您使用的
    VS 和 .NET 版本，您可能不会立即看到“添加 Web 引用”的选项。


    如果您在那些位置没有看到“添加 Web 引用”的选项，您可能需要使用不同的方法来添加引用。您将需要选择“项目”->“添加服务引用”。在此屏幕中，您将单击窗口左下角的“高级”按钮。在高级设置窗口中，您将单击屏幕左下角的“添加
    Web 引用”按钮以调出 Web 引用窗口。


    当对话框出现时，输入以下 URL：


    [`http://localhost/reportserver/reportservice2010.asmx`](http://localhost/reportserver/reportservice2010.asmx)


    如果您使用的是远程服务器，请将上述 URL 中的 `localhost` 替换为您的服务器名称，然后单击 URL 旁边的箭头按钮。此时系统可能会提示您输入凭据，以验证您是否有权访问
    Web 服务。您现在应该会看到一个类似于图 8-12 中的对话框。


    ![Image](img/9781430238102_Fig08-12.jpg)


    ***图 8-12.** “添加 Web 引用”对话框*


    在“Web 引用名”文本框中，输入 `SSRSWebService`。此名称是在代码中引用 Web 服务的方式。在此对话框关闭并将引用添加到项目后，在 `publisher.cs`
    代码顶部的其他标准 `using` 指令旁边，添加以下 `using` 指令：


    ```

    using SSRS_Publisher.SSRSWebService;

    ```


    现在您可以更轻松地引用 Web 服务，因为您无需输入完全限定的命名空间。您还将在此之下添加另外三个 `using` 指令，使您能够在代码中更轻松地访问 Web
    服务和 I/O 特定功能，如清单 8-3 所示。您可以将所有这些组合在一起查看，效果应如图 8-13 所示。


    ***清单 8-3.** 使用指令*


    ```

    using System.IO;

    using System.Text.RegularExpressions;

    using System.Web.Services.Protocols;

    ```


    ![Image](img/9781430238102_Fig08-13.jpg)


    ***图 8-13.** 向您的发布者项目添加指令*

