- fmt: '## Capturing HTTPS Traffic


    Now that you have the certificate installed, let''s return to Network Monitor
    and capture the running reports, this time using https in the URL to the report
    server on PROSSRS in this example, which instructs the browser to connect to the
    site with SSL on port 443, instead of HTTP on port 80.


    The first thing you may run into when you navigate directly to the secure report
    manager is a warning that the certificate has not passed all the criteria to be
    trusted because it does not come from a known certificate authority (see [Figure
    11-6](#Chapter11.html#fig_11_6)).


    You can select Continue to This Web Site because you do indeed trust the site.
    You could also install the certificate on the local machine by clicking the lock
    at the bottom of the browser and selecting Install Certificate so that you will
    not be prompted with this message again. Installing the certificate in the local
    client''s certificate store causes the browser to automatically trust the site.
    These steps are not required for known certificate authorities such as VeriSign
    but are required for this self-assigned certificate.


    At this point, you can access Report Manager with either HTTP or HTTPS since we
    have not removed the ability to access via port 80 in the Reporting Services Configuration
    Manager. You can control the required level of security in a few ways.


    One method to control the level of security that SSRS will use is via the service
    config file, `rsreportserver.config`, located in the installed folder, typically
    `Drive Letter:\Program Files\Microsoft SQL Server\MSRS11.MSSQLSERVER\Reporting
    Services\ReportServer`. Open the file in Notepad, and look for the following entry:


    ```xml

    <Add Key="SecureConnectionLevel" Value="0"/>

    ```


    ![Image](images/9781430238102_Fig11-06.jpg)


    **Figure 11-6.** Warning for nontrusted security certificate


    Four values control the level of security, 0 through 3. The default for a deployment
    that does not configure SSRS for SSL during installation is 0, which is the least
    secure. A value of 3, the most secure, requires that every SOAP API call uses
    SSL. For this example, set the value to 2, which will require encryption of all
    report data. All calls to the server will now automatically use port 443 and encrypt
    the data, including the URL string itself, which is important if you are passing
    any possibly sensitive information in the URL. If a user tried to connect to the
    Report Manager or report server URL using HTTP, the report server would automatically
    redirect the client to HTTPS to require a secure connection. You should also add
    the SSL certificate for use with the Report Service URL section in the SSRS configuration
    tool before restarting the services to make this change effective. It will need
    to have a valid certificate to use encrypted communication as well.


    You can also remove the HTTP access through the Reporting Services Configuration
    Manager. In the same section that we used to add the new SSL secured address,
    you can also remove the HTTP address binding. This would require that any user
    trying to access the site would have to use the HTTPS address and have all of
    the Web data encrypted.


    We will also need to make a small change to the display filter that we setup earlier.
    We are looking for port 80 traffic in that example, but we need to now be searching
    for port 443. Change your display filter so that each instance of port 80 is now
    searching for port 443 and click the apply button to confirm that change.


    When you capture the frames in Network Monitor while using the new secure address,
    you can see that all of the previous HTTP data on port 80 are now using SSL on
    port 443, as shown in [Figure 11-7](#Chapter11.html#fig_11_7). The data are encrypted
    and we can also see the SSL protocol handling the handshake setup so that all
    of our HTTP data is safe and secure.


    ![Image](images/9781430238102_Fig11-07.jpg)


    **Figure 11-7.** Network Monitor with encrypted packets


    ## Securing Data Storage in SSRS


    While it is important to ensure that network traffic is encrypted, this is only
    one aspect of maintaining a secure environment. SSRS requires that sensitive data,
    such as account information used for data access, be stored securely. Since these
    data are stored in different locations, such as database tables and configuration
    files, SSRS uses a symmetrical key encryption process to securely store and access
    this information. What this means is that the authentication information in the
    database and configuration files is stored in an encrypted format, and SSRS uses
    the encryption keys it generates to decrypt the information when needed.


    As with many SSRS tasks in SQL Server, multiple tools are available to make configuration
    changes to the report server. You can manage keys with the Reporting Services
    Configuration Manager as well as a command-line utility called RSKeyMgmt. You
    can use either of these tools to back up the keys associated with the report server
    instance so that if something were to occur that caused the server to have to
    be rebuilt, you could reapply the keys to the installation. The encryption keys
    are generated when SSRS is installed or joins a farm. [Figure 11-8](#Chapter11.html#fig_11_8)
    shows a section of the `RSReportServer.config` file, which contains sensitive
    authentication credentials required to connect to SSRS server components. Notice
    that parts of the data inside the file are encrypted. SSRS uses the keys associated
    with the report server instance to decrypt the contents of this file as well as
    the encrypted content stored in the ReportServer database in the `dbo.Keys` table.


    ![Image](images/9781430238102_Fig11-08.jpg)


    **Figure 11-8.** The `rsreportserver.config` encrypted values


    We will show how to use both tools—the Reporting Services Configuration Manager
    and the `RSKeyMgmt` utility—to extract the key for the PROSSRS SSRS installation.


    First, open the Reporting Services Configuration Manager again and connect to
    your report server instance (called MSSQLSERVER by default), and then click the
    Encryption Keys icon on the left. You will see four options on the Encryption
    Key page: Backup, Restore, Change, and Delete Encrypted Content. You can back
    up the encryption key to a key file and supply a password, as shown in [Figure
    11-9](#Chapter11.html#fig_11_9). This file should be stored in a secure location.
    If the report server ever had to be rebuilt for any reason—because of a hardware
    failure or data corruption issue—then having this key is crucial to restoring
    the ReportServer database to its previous state. Without the key file, it is still
    possible to restore and initialize the ReportServer database from backup. However,
    all objects that require encryption, such as data sources with stored account
    information, must be reset manually, which could be an arduous task at best.


    To use the command-line tool that will essentially perform the same task of backing
    up, restoring, and deleting the encryption keys for the report server instance,
    the syntax is as follows:


    ```bash

    RSKeyMgmt -e -f C:\Pro_SSRS\SSRS_Key\PROSSRS_SSRS_Key -P Password

    ```


    The `-e` option tells `RSKeyMgmt` to extract the key to the file `PROSSRS_SSRS_Key`
    in the `C:\Pro_SSRS\SSRS_Key` folder. The password option is required and the
    password must meet the minimum complexity requirement. If you needed to do so,
    you could reapply the key to the server using the same command but changing the
    `-e` option to `-a`. After executing the command, you are timidly instructed to
    SECURE THE FILE IN A SAFE LOCATION!


    ![Image](images/9781430238102_Fig11-09.jpg)


    **Figure 11-9.** Encryption keys in the Reporting Services Configuration Manager'
