    ### 探索 BIDS 的构成元素


    在 BIDS 中，一个或多个 `项目` 包含了所有的报表和共享数据源。项目从物理和逻辑上将报表分组在一起，并维护特定于该属性。这些属性使得项目能够独立于其他项目运行。所有创建的项目本身都包含在一个
    `解决方案` 中。解决方案就是一个或多个项目的集合，这些项目对 Visual Studio 可用。一个单一的解决方案可以包含一个报表服务项目、一个集成服务项目、一个分析服务项目，以及一个
    Windows 或 Web 应用程序项目。


    现在，我们将向您展示如何启动 BIDS 来创建一个解决方案和一个报表服务项目。要创建解决方案，您需要加载 BIDS。通过选择“开始” ![Image](img/U001.jpg)
    “所有程序” ![Image](img/U001.jpg) “Microsoft SQL Server 2012” ![Image](img/U001.jpg)
    “SQL Server Data Tools” 来导航到加载 `devenv` 可执行文件的快捷方式。SQL Server Data Tools (SSDT)
    和商业智能开发工作室 (BIDS) 都是 `devenv` 可执行文件的快捷方式。在本章及本书的其余部分，我们可能会将 SSDT 称为 BIDS，因为使用此工具的大多数开发工作都与商业智能相关。然而，BIDS
    和 SSDT 是可以互换的术语。打开 BIDS 后，您可以通过选择菜单栏“文件”菜单下“新建”子菜单中的“项目”来进入新建项目屏幕，或者直接单击“起始页”上的“新建项目”按钮，如
    图 3-1 所示。


    ![Image](img/9781430238102_Fig03-01.jpg)


    **图 3-1.** 商业智能开发工作室起始页


    “新建项目”对话框打开。在“已安装的模板” ![Image](img/U001.jpg) “商业智能” ![Image](img/U001.jpg) “Reporting
    Services” 下选择“报表服务器项目”。如果这是您创建的第一个项目，项目名称默认为 Report Project1。项目位置可以是本地驱动器或网络位置。在本例中，将其设为
    `C:\Pro_SSRS\Reports`。


    默认情况下，解决方案根据项目名称命名，即 Report Project1，如 图 3-2 所示。如果勾选“为解决方案创建目录”框，您可以为基本位置附加一个新目录。在本例中，选择
    Solution1。单击“确定”后，项目和解决方案都将被创建，您可以在项目内创建报表项和数据源。


    ![Image](img/9781430238102_Fig03-02.jpg)


    **图 3-2.** “新建项目”对话框


    如果您知道报表将部署到何处，那么添加几个重要的项目属性设置被认为是良好的实践：在 SSRS 服务器上部署报表的目标文件夹，以及 SSRS 服务器的 URL。您可以使用解决方案资源管理器查看和设置这些属性，该窗口显示打开的解决方案及其包含的项目，以及各个项目可能包含的所有报表和其他对象。默认情况下，BIDS
    将解决方案资源管理器置于环境的右侧，但它也可能停靠或在其他位置浮动。如果看不到它，请单击菜单栏上的“视图” ![Image](img/U001.jpg) “解决方案资源管理器”。在解决方案资源管理器中高亮显示项目，然后从菜单中选择“项目”
    ![Image](img/U001.jpg) “属性”（或右键单击项目并选择“属性”），您将看到一个类似 图 3-3 的窗口。`TargetReportFolder`
    属性控制在 SSRS 服务器上创建的文件夹，用于存储已部署的报表和数据源。您可以使用 `TargetDataSourceFolder` 和 `TargetDatasetFolder`
    属性来存储特定于项目的数据源和共享数据集。`TargetServerURL` 属性是 SSRS Web 服务器 URL（当您开始使用 SharePoint
    集成模式时——这将在 第 12 章 中介绍，此属性将包含 SharePoint 服务器 URL）。如 图 3-3 所示，TargetServerURL 属性的形式为
    `http://servername/ReportServer`。在本例中，SSRS Web 服务器是 `localhost`。


    ![Image](img/9781430238102_Fig03-03.jpg)


    **图 3-3.** 项目属性


    ![Image](img/square.jpg) **注意** 我们将在 第 8 章 中介绍其他一些设置，例如 `TargetDatasetFolder`、`TargetDataSourceFolder`
    和 `TargetReportPartFolder`。然而，除非对象需要由无法访问指定 `TargetReportFolder` 的报表开发人员或最终用户使用，否则最好使用您在
    `TargetReportFolder` 中设置的文件夹结构来存储项目对象。例如，图 3-3 中的 `TargetReportFolder` 是 `Pro_SSRS`，而
    `TargetDataSourceFolder` 设置为 `Pro_SSRS/DataSources`。这样可以防止其他开发人员覆盖您的数据源、数据集或报表部件。


    ### 设置基本的集成开发环境


    现在您有了一个新的解决方案和一个新的项目来容纳您将构建的报表，是时候进行个性化设置了。作为一名报表设计人员，您将花费大量时间凝视着作为您创作的像素，因此按照您想要的方式准确设置环境非常重要。设计报表的理想设置是个人的选择。有些人喜欢高分辨率显示设置，并且环境中所有可用的设计工具栏始终可见，而另一些人则喜欢浮动工具栏和较低分辨率的双显示器设置。无论您的偏好如何，BIDS
    都可以轻松地在 IDE 中操作设计工具以个性化您的配置。除了上一节介绍的解决方案资源管理器外，您还可以在 IDE 中使用几种常用工具来设计报表：


    > `工具箱`：在这里您可以找到本章涵盖的所有报表对象，例如矩阵和表格数据区域。数据区域是在 SSRS 报表设计环境中定义的报表对象，其中包含来自数据集的字段值。

    >

    > `属性窗口`：在这里，您可以设置报表项的各种格式和分组属性的值。

    >

    > `错误列表窗口`：在排查报表错误时您将需要它。数据类型不匹配和函数无效使用是设计报表时常见的问题。错误列表窗口是查看这些错误详细信息的地方。

    >

    > `报表数据窗口`：此窗口包含内置字段、数据源、数据集、图像以及您为报表定义的字段信息。


    图 3-4 展示了在 SSRS 中设计报表的自定义布局。您可以在 IDE 中的任何位置停靠任何工具栏，也可以将它们放置在 IDE 之外的桌面上。此设置在分辨率配置为
    1152 × 864 或更高时效果最佳。在 图 3-4 的设置中，工具箱是浮动的，解决方案资源管理器位于报表设计网格的右侧。如果您愿意，可以设置工具栏在不使用时自动隐藏——在此示例中，显示隐藏的“报表数据”窗格的按钮位于左上角。BIDS
    与完整的 Visual Studio 2010 环境一样，具有一个停靠位置映射图，可帮助您精确定位可停靠项。当您在报表设计器内移动项目时，您可以看到在边缘和中间略带透明的映射图。


    ![Image](img/9781430238102_Fig03-04.jpg)


    **图 3-4.** IDE 配置示例

    '
- fmt: '## 理解报表定义语言


    RDL 是一个标准，所有使用 Visual Studio 2010 内置 SSRS 工具及其他 SSRS 服务创建的报表都遵循此标准。RDL 是一种基于 XML
    的模式，它定义了报表的每个元素，例如格式、数据集信息、分组和排序以及参数和筛选器。当你向报表中添加项目时，RDL 代码会随之更改以包含每个新增项。


    在集成开发环境中，这些代码更改通常是不可见的，因为它们在后台进行。然而，偶尔你可能需要直接修改 RDL，以使用查找和替换方法进行全局更改。当源存储过程中的参数或字段名称发生更改时，我们不得不多次这样做。在
    Visual Studio 2010 中处理报表时，你可以通过点击菜单中的“视图”>“代码”或右键单击报表并选择“查看代码”来直接查看 RDL 代码。


    Visual Studio 2010 和 BIDS 是当前 SSRS 的主要报表设计器，但随着越来越多的公司采用 RDL，其他报表设计器可能会出现。事实上，在
    SQL Server 2005 中，Microsoft 引入了一个报表生成器应用程序，允许最终用户设计和发布 SSRS 报表。SQL Server 2008
    包含了一个新版本，恰当地命名为 Report Builder 2.0，它采用了 Microsoft Office Ribbon 技术并进行了彻底的改版，进一步将报表开发交到报表请求者的手中。随
    SQL Server 2008 R2 发布的 Report Builder 3.0 拥有更多用于临时最终用户报告的功能。Report Builder 1.0
    和 2.0 仍可用于向后兼容，并且 1.0 版本仍然依赖于报表模型作为其数据源，这与 2.0 和 3.0 版本不同。第 13 章将更详细地介绍 Report
    Builder 1.0、2.0 和 3.0 应用程序及其组件。


    在本章中，我们将展示你正在处理的报表对象的 RDL 部分，以显示在设计报表时 RDL 是如何更新的。完整的 RDL 模式可在 [`http://schemas.microsoft.com/sqlserver/reporting/2008/01/reportdefinition`](http://schemas.microsoft.com/sqlserver/reporting/2008/01/reportdefinition)
    获取。


    ### 添加报表


    根据 Microsoft 的一般策略，有不止一种方法可以将报表添加到项目中。一种方法是使用向导来完成报表创建过程，但目前，我们只是将一个空白报表添加到我们的项目中。在解决方案资源管理器中右键单击“报表”文件夹，选择“添加”，然后选择“新建项”。请注意，你也有添加现有项的选项。如果你已经有一个要添加到项目的报表，或者你已经构建了一个模板报表文件作为基础起点，这个选项很有用。现在，在如图
    3-5 所示的“添加新项”对话框中选择“报表”，然后单击“添加”，在项目中创建一个名为 `Report1.rdl` 的空白报表。


    ![Image](images/9781430238102_Fig03-05.jpg)


    *图 3-5. BIDS 中的添加新项对话框*


    新报表应在设计环境中打开，但如果没有打开，请双击解决方案资源管理器中的新报表。默认情况下，报表名为 `Report##.rdl`，其中 `##` 是序列中下一个可用的报表编号。此时，报表是一张白纸。图
    3-6 显示了 IDE，包括解决方案资源管理器、工具箱和报表数据窗口。如果你熟悉在 Visual Studio 2005 中创建报表，你会注意到“数据”选项卡已从“设计”和“预览”选项卡中分离出来，现在位于一个专用的“报表数据”窗口中。在
    SQL Server 2008 R2 版本中，我们在报表数据窗格中被提供了另一个名为“数据源”的文件夹。现在，只需记住这个新的 IDE 旨在集中管理你的本地和共享数据源。同样，从
    VS 2005 过来，你会注意到新的“行组”和“列组”区域，旨在更轻松地管理 Tablix 风格的分组。与任何包含来自数据源数据的报表一样，第一步是在报表和数据源以及一个或多个数据集之间建立链接。我们将在下一节中完成这两项操作。


    ![Image](images/9781430238102_Fig03-06.jpg)


    *图 3-6. 加载了 `Report1.rdl` 的 BIDS IDE*


    ### 设置数据源和数据集


    在 SSRS 中创建的每个报表都包含一个*数据源*和一个*数据集*。数据源不仅定义了为检索数据而建立的连接类型（无论是 SQL Server、Analysis
    Services 还是 Oracle），还定义了特定的连接属性，例如服务器、数据库名称和安全凭证。另一方面，数据集是从数据源返回的数据、行和列或字段。数据集是通过构建一个从数据源检索信息的查询来创建的。这个查询，在
    SQL Server 数据源的情况下，可以是一个直接嵌入报表中的基于文本的查询，或者是一个存储过程。


    在第 2 章中，你创建了一个名为 `Emp_Svc_Cost` 的存储过程，其中包含员工和患者就诊信息。在本章中处理大多数报表对象时，你将使用该过程作为你的数据集。对于其他报表对象，例如图像报表对象，你将使用直接查询而不是
    `Emp_Svc_Cost` 存储过程。'
  raw: '### Understanding Report Definition Language (RDL)


    RDL is the standard to which all reports created with the embedded SSRS tools
    in Visual Studio 2010 and other SSRS services adhere. RDL is an XML-based schema
    that defines each element of a report, such as formatting, dataset information,
    grouping and sorting, and parameters and filters. As you add items to the report,
    the RDL code changes to include each addition.


    In the IDE, these code changes are typically invisible, as they take place in
    the background. Occasionally, however, you might need to modify the RDL directly
    to make global changes using a find-and-replace method. We’ve had to do this several
    times when a parameter or field name changed in a source’s stored procedure. When
    you are working on a report in Visual Studio 2010, you can view the RDL code directly
    by clicking View ![Image](images/U001.jpg) Code from the menu or by right-clicking
    a report and selecting View Code.


    Visual Studio 2010 and BIDS are the main report designers for SSRS currently,
    but as more and more companies embrace RDL, other report designers may become
    available. In fact, in SQL Server 2005, Microsoft introduced a Report Builder
    application that allows an end user to design and publish SSRS reports. SQL Server
    2008 included a new version, appropriately named Report Builder 2.0, with Microsoft
    Office Ribbon technology and a complete facelift taking it one step further toward
    putting report development into the hands of report requesters. Report Builder
    3.0, released with SQL Server 2008 R2, had even more features for ad hoc end-user
    reporting. Report Builder 1.0 and 2.0 are still available for backward compatibility,
    and 1.0 still relies on report models for its data sources, unlike 2.0 and 3.0\.
    [Chapter 13](#Chapter13.html) covers Report Builder 1.0, 2.0, and 3.0 applications,
    and their components, in more detail.


    Throughout this chapter, we’ll present the RDL sections of the report objects
    on which you are working to show how the RDL is updated while designing a report.
    The complete RDL schema is available at [`http://schemas.microsoft.com/sqlserver/reporting/2008/01/reportdefinition`](http://schemas.microsoft.com/sqlserver/reporting/2008/01/reportdefinition).


    ### Adding a Report


    In line with Microsoft’s general policy, there is more than one way to add a report
    to a project. One way is to employ a wizard to work through the report creation
    process, but for now, we are just going to add a blank report to our project.
    Right-click the Reports folder in the Solution Explorer, select Add, and then
    New Item. Notice that you have the option of adding an existing item as well.
    This option is useful if you already have a report to add to a project or if you’ve
    built a template report file as a base starting point. For now, select Report
    in the Add New Item dialog box as shown in [Figure 3-5](#Chapter03.html#fig_3_5)
    below, and then click Add to create a blank report named `Report1.rdl` in the
    project.


    ![Image](images/9781430238102_Fig03-05.jpg)


    ***Figure 3-5.** Add New Item Dialog Box in BIDS*


    The new report should open up in the design environment, but if it doesn’t, double-click
    the new report in the Solution Explorer. By default the report is named `Report##.rdl`,
    where `##` is the next available report number in sequence. At this point, the
    report is a blank slate. [Figure 3-6](#Chapter03.html#fig_3_6) shows the IDE,
    including the Solution Explorer, Toolbox and Report Data boxes. If you are familiar
    with creating reports in Visual Studio 2005, you will notice that the Data tab
    has been separated from the Design and Preview tab and now resides in a dedicated
    Report Data window. In the SQL Server 2008 R2 release, we were provided another
    folder in the Report Data pane called Data Sources. For now, just keep in mind
    that this new IDE has been designed to centralize your local and shared data sources.
    Again, coming from VS 2005, you will notice the new Row Groups and Column Groups
    areas, designed for easier management of Tablix-style groupings. As with any report
    that contains data from a data source, the first step is to create a link between
    the report and the data source as well as one or more datasets. We will do both
    in the next section.


    ![Image](images/9781430238102_Fig03-06.jpg)


    ***Figure 3-6.** BIDS IDE with `Report1.rdl` loaded*


    ### Setting Up Data Sources and Datasets


    Each report created in SSRS contains both a *data source* and a *dataset*. A data
    source not only defines the type of connection that is established to retrieve
    the data, whether it’s SQL Server, Analysis Services, or Oracle, but also defines
    the specific connection properties, such as the server, database name and security
    credentials. A dataset, on the other hand, is the data, rows and columns, or fields
    that are returned from the data source. The dataset is created by building a query
    that retrieves information from the data source. This query, as in the case of
    a SQL Server data source, can be a text-based query embedded directly in the report,
    or a stored procedure.


    In [Chapter 2](#Chapter02.html), you created a stored procedure called `Emp_Svc_Cost`,
    containing employee and patient visit information. You’ll use that procedure as
    your dataset as you work with most of the report objects in this chapter. For
    other report objects, such as the image report object, you will use direct queries
    instead of the `Emp_Svc_Cost` stored procedure.'
  trans: '## 理解报表定义语言


    RDL 是一个标准，所有使用 Visual Studio 2010 内置 SSRS 工具及其他 SSRS 服务创建的报表都遵循此标准。RDL 是一种基于 XML
    的模式，它定义了报表的每个元素，例如格式、数据集信息、分组和排序以及参数和筛选器。当你向报表中添加项目时，RDL 代码会随之更改以包含每个新增项。


    在集成开发环境中，这些代码更改通常是不可见的，因为它们在后台进行。然而，偶尔你可能需要直接修改 RDL，以使用查找和替换方法进行全局更改。当源存储过程中的参数或字段名称发生更改时，我们不得不多次这样做。在
    Visual Studio 2010 中处理报表时，你可以通过点击菜单中的“视图”>“代码”或右键单击报表并选择“查看代码”来直接查看 RDL 代码。


    Visual Studio 2010 和 BIDS 是当前 SSRS 的主要报表设计器，但随着越来越多的公司采用 RDL，其他报表设计器可能会出现。事实上，在
    SQL Server 2005 中，Microsoft 引入了一个报表生成器应用程序，允许最终用户设计和发布 SSRS 报表。SQL Server 2008
    包含了一个新版本，恰当地命名为 Report Builder 2.0，它采用了 Microsoft Office Ribbon 技术并进行了彻底的改版，进一步将报表开发交到报表请求者的手中。随
    SQL Server 2008 R2 发布的 Report Builder 3.0 拥有更多用于临时最终用户报告的功能。Report Builder 1.0
    和 2.0 仍可用于向后兼容，并且 1.0 版本仍然依赖于报表模型作为其数据源，这与 2.0 和 3.0 版本不同。第 13 章将更详细地介绍 Report
    Builder 1.0、2.0 和 3.0 应用程序及其组件。


    在本章中，我们将展示你正在处理的报表对象的 RDL 部分，以显示在设计报表时 RDL 是如何更新的。完整的 RDL 模式可在 [`http://schemas.microsoft.com/sqlserver/reporting/2008/01/reportdefinition`](http://schemas.microsoft.com/sqlserver/reporting/2008/01/reportdefinition)
    获取。


    ### 添加报表


    根据 Microsoft 的一般策略，有不止一种方法可以将报表添加到项目中。一种方法是使用向导来完成报表创建过程，但目前，我们只是将一个空白报表添加到我们的项目中。在解决方案资源管理器中右键单击“报表”文件夹，选择“添加”，然后选择“新建项”。请注意，你也有添加现有项的选项。如果你已经有一个要添加到项目的报表，或者你已经构建了一个模板报表文件作为基础起点，这个选项很有用。现在，在如图
    3-5 所示的“添加新项”对话框中选择“报表”，然后单击“添加”，在项目中创建一个名为 `Report1.rdl` 的空白报表。


    ![Image](img/9781430238102_Fig03-05.jpg)


    *图 3-5. BIDS 中的添加新项对话框*


    新报表应在设计环境中打开，但如果没有打开，请双击解决方案资源管理器中的新报表。默认情况下，报表名为 `Report##.rdl`，其中 `##` 是序列中下一个可用的报表编号。此时，报表是一张白纸。图
    3-6 显示了 IDE，包括解决方案资源管理器、工具箱和报表数据窗口。如果你熟悉在 Visual Studio 2005 中创建报表，你会注意到“数据”选项卡已从“设计”和“预览”选项卡中分离出来，现在位于一个专用的“报表数据”窗口中。在
    SQL Server 2008 R2 版本中，我们在报表数据窗格中被提供了另一个名为“数据源”的文件夹。现在，只需记住这个新的 IDE 旨在集中管理你的本地和共享数据源。同样，从
    VS 2005 过来，你会注意到新的“行组”和“列组”区域，旨在更轻松地管理 Tablix 风格的分组。与任何包含来自数据源数据的报表一样，第一步是在报表和数据源以及一个或多个数据集之间建立链接。我们将在下一节中完成这两项操作。


    ![Image](img/9781430238102_Fig03-06.jpg)


    *图 3-6. 加载了 `Report1.rdl` 的 BIDS IDE*


    ### 设置数据源和数据集


    在 SSRS 中创建的每个报表都包含一个*数据源*和一个*数据集*。数据源不仅定义了为检索数据而建立的连接类型（无论是 SQL Server、Analysis
    Services 还是 Oracle），还定义了特定的连接属性，例如服务器、数据库名称和安全凭据。另一方面，数据集是从数据源返回的数据、行和列或字段。数据集是通过构建一个从数据源检索信息的查询来创建的。这个查询，在
    SQL Server 数据源的情况下，可以是一个直接嵌入报表中的基于文本的查询，或者是一个存储过程。


    在第 2 章中，你创建了一个名为 `Emp_Svc_Cost` 的存储过程，其中包含员工和患者就诊信息。在本章中处理大多数报表对象时，你将使用该过程作为你的数据集。对于其他报表对象，例如图像报表对象，你将使用直接查询而不是
    `Emp_Svc_Cost` 存储过程。'
- fmt: '### Creating a Data Source


    Each report can use one or more data sources. Reports that use the same data source—for
    example, one that connects to a specific SQL Server database—can use what is referred
    to in SSRS as a `shared data source`. Shared data sources are published along
    with the report and can be modified on the report server after deployment. In
    BIDS, shared data sources contain several properties that you must configure before
    you can use them.


    Let’s step through the process of creating the shared data source for the stored
    procedure `Emp_Svc_Cost`. First, right-click `Shared Data Sources` in the Solution
    Explorer, and select `Add New Data Source`; the `Shared Data Source Properties`
    dialog box will appear. Second, click the `Edit` button in the dialog box to create
    the connection string. In this case, you know that the server that contains your
    source database and stored procedure is located on the local SQL Server, so you
    can type `localhost` as the server name. Because we left the default connection
    type on the previous window, the data source property is set to `Microsoft SQL
    Server (SqlClient)`. After you type `localhost` as the server, you can choose
    the `Pro_SSRS` database from the database drop-down selection. In this case, because
    the database is configured to use both Windows and SQL authentication, choose
    the `Use Windows Authentication` option. If you choose to use SQL authentication,
    you can also choose to store the SQL username and password. Generally, Windows
    Authentication is the preferred method because it has a single point of login
    for users ([Chapter 11](#Chapter11.html) covers authentication for deployed reports).
    [Figure 3-7](#Chapter03.html#fig_3_7) shows the data source connection properties.
    You can test the connection by clicking the `Test Connection` button.


    ![Image](images/9781430238102_Fig03-07.jpg)


    `Figure 3-7. Data source connection properties`


    ![Image](images/square.jpg) **Note** In Reporting Services 2012, you can choose
    from many types of data source. SQL Server happens to be the default, but you
    can grab data from sources such as SQL Azure, Analysis Services, Oracle, SAP,
    and TERADATA. You can use generic OLE DB and ODBC data sources as well, of course.


    You now have a shared data source. Notice that its name has defaulted to `DataSource1`.
    You can rename it by right-clicking it, selecting `Rename`, and entering `Pro_SSRS.rds`
    as the new name. It is good practice to give each data source a meaningful name,
    such as the name of the database it will connect to. In a real-world environment,
    you will be deploying your reports and/or databases on different servers, so it’s
    not advisable to prefix the data source name with the name of the server containing
    the database. In other words, it is not recommended to name your data source `DEV_Pro_SSRS`
    to represent a development data source, would you want to name your data source
    something like `Server1_Pro_SSRS`.


    In practice, we’ve developed all our reports using an identical data source name.
    However, because each of our online customers had a database name that uniquely
    identified them, we designed an application that reset the database properties
    in the data source after it was published. In this way, we could use the same
    reports against the same database schema, but we could deploy them to multiple
    customers on the same report server.


    In this example, the data source file you created has an `.rds` extension and
    is stored and published separately from the report. You can open an `.rds` file
    in a text editor, because it’s an XML file that defines the connection properties
    you just created graphically. [Listing 3-1](#Chapter03.html#list_3_1) shows the
    `Pro_SSRS.rds` file.


    `Listing 3-1. Pro_SSRS.rds File`


    ```

    <?xml version="1.0" encoding="utf-8"?>

    <RptDataSource xmlns:xsi=http://www.w3.org/2001/XMLSchema-instance >

    <Name>Pro_SSRS</Name>

    <ConnectionProperties>

    <Extension>SQL</Extension>

    <ConnectString>Data Source=localhost;Initial Catalog=Pro_SSRS </ConnectString>

    <IntegratedSecurity>true</IntegratedSecurity>

    </ConnectionProperties>

    <DataSourceID >99401d15-cd9b-489a-b3ee-e027de26a4e0 </DataSourceID> </RptDataSource>

    ```'
