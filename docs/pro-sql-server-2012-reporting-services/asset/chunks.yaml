    \ SSRS 安全属性。\n\n然后，屏幕顶部的菜单允许你：\n\n> *删除报告*：这使你能够删除不再需要的报告。\n> \n> *将报告移动到报表服务器上的另一个位置*：这允许你将报告组织到文件夹中，以便进行组织和安全管理。\n\
    > \n> *创建链接报告*：此选项允许你基于原始报告创建一个链接报告。这使你可以在服务器上的某个位置保留一份报告用于部署，同时在服务器上的其他位置有多个副本可用，而无需在报告更改时重新部署它们。\n\
    > \n> *下载 RDL*：你可以将报告 RDL 下载为文件进行编辑。当你想要对报告进行微小修改（例如更改单词拼写或修改表达式）时，这可能很有用。请注意，此方法仅提供对\
    \ RDL 文件的访问；你仍然需要使用另一个程序来编辑文件，然后上传修改后的文件。\n> \n> *通过上传 RDL 文件的新副本来替换 RDL*：如果你已经下载并编辑了\
    \ RDL 文件，那么此选项允许你上传编辑后的副本。\n\n![Image](img/9781430238102_Fig08-04.jpg)\n\n**图\
    \ 8-4.** 报告属性页面\n\n使用图 8-4 中页面左侧的菜单，你可以执行以下操作：\n\n**注意：** 由于原始文本在此处结束，以下部分未完成。排版到此为止。\n"
- fmt: '## 报表管理功能


    * **修改报表参数**：在“参数”部分，您可以更改报表参数的一些选项，例如默认值、可见性、用户提示和参数显示文本。这种修改参数的能力很方便，因为您无需下载报表即可进行简单的参数更改。


    * **更改数据源**：“数据源”部分允许您更改报表使用的数据源。您可以更改为位于同一服务器上的另一个数据源，或者从头开始创建新的自定义数据源。


    * **管理订阅**：“订阅”部分允许您管理报表的订阅和数据驱动订阅。您可以从该部分创建、删除和修改您的报表订阅。


    * **处理选项**：此部分允许您配置渲染报表时使用的数据缓存选项。它还允许您设置使用报表快照渲染报表，并配置报表超时属性。


    * **缓存刷新选项**：您可以从该部分设置新的缓存刷新计划或对当前计划进行修改。这些计划将创建刷新作业，用于更新供报表或共享数据源使用的缓存存储。如果您的报表设置为从缓存数据而非实时数据渲染，则将使用此数据。


    * **报表历史记录**：此部分允许您获取报表的快照或查看已渲染报表的历史快照。这些可以手动创建，也可以通过下一节中可配置的快照计划创建。


    * **快照选项**：从该部分，您可以管理快照和快照计划。您可以创建新的快照计划或在共享计划上设置新的快照。您还可以管理快照安全性和快照存储限制的选项。


    * **管理安全设置**：您可以从页面的“安全性”部分管理报表的个别安全设置。默认情况下，报表继承父文件夹的安全设置，但您可以从此菜单中断该继承（或恢复它）。


    ![Image](images/square.jpg) **注意** 您也可以从详细信息视图访问管理部分。


    ### 使用 Report Builder 3.0


    在 `Reporting Services 2010` 中用于部署报表的另一种方法是新的 `Report Builder 3.0` 应用程序。`Report
    Builder 3.0` 是一种更用户友好的部署报表方式，它不再使用 `BIDS/Visual Studio`。我们将在下一节介绍使用新的 `BIDS/Visual
    Studio` 集成工具。您可以从报表管理器 `Web` 界面启动 `Report Builder` 工具。您也可以从 `Microsoft` 网站下载完整安装程序，将
    `Report Builder 3.0` 作为一个单独的实用程序安装。[Figure 8-5](#Chapter08.html#fig_8_5) 将让您对这个新工具的视觉外观有所了解。


    ![Image](images/9781430238102_Fig08-05.jpg)


    *图 8-5. 新的 Report Builder 3.0 界面*


    `Report Builder 3.0` 对于 `Windows 7` 或较新 `Office` 套件的用户来说会感觉更熟悉。该程序的主菜单位于屏幕左上角的“珍珠”（看起来像
    `SQL Server` 符号）下方。单击“珍珠”一次以展开菜单并选择“打开”。这将允许您浏览到要打开以进行编辑或部署的报表。该报表可以从本地/远程磁盘上的文件加载，也可以直接从您连接到的报表服务器加载。文件加载后，报表将以设计模式显示在中心窗口中，数据将填充左侧的窗口。从这里，您可以在部署到服务器之前进行任何需要的更改。由于您是从
    `Web` 界面打开的报表生成器，请继续从服务器加载报表，您的 `Report Builder` 应类似于 [Figure 8-6](#Chapter08.html#fig_8_6)。


    ![Image](images/9781430238102_Fig08-06.jpg)


    *图 8-6. Report Builder 3.0 中已加载的报表*


    您可以在 `Report Builder 3.0` 中执行 `BIDS/Visual Studio 2010` 所包含的大部分功能。通过这个程序，您可以添加数据源、进行报表设计更改、管理参数和部署报表。唯一的缺点是此应用程序一次只允许修改一个报表。要执行大规模部署或管理项目的多个报表，您仍然需要使用
    `Visual Studio 2010/BIDS` 或 `RS` 实用程序，我们将在本章后面介绍。要部署您刚刚打开的报表，并假设您是直接从报表服务器打开的报表，请返回“珍珠”菜单并选择“保存”。如果您是从硬盘打开了
    `RDL` 文件，则使用“另存为”选项，并确保首先连接到报表服务器。要连接到报表服务器，只需单击 `Report Builder 3.0` 界面底部状态栏中的连接链接。连接到报表服务器后，您可以选择该服务器作为保存报表的目标。请参见
    [Figure 8-7](#Chapter08.html#fig_8_7) 查看您将使用的“珍珠”菜单选项。由于我们直接从 `Web` 界面启动了 `Report
    Builder`，因此我们已经连接到报表服务器，无需指定要发布的服务器。继续对您的报表进行一些小的更改并将其部署，以在报表管理器 `Web` 界面上查看更改。


    ![Image](images/9781430238102_Fig08-07.jpg)


    *图 8-7. Report Builder 3.0 保存选项*


    ### 使用 BIDS 和 Visual Studio 2012


    您也可以使用 `BIDS`（`Business Intelligence Development Studio`）中的“部署”选项来部署报表，该选项直接集成到
    `Visual Studio 2010` 中。这很方便，因为它是最强大的环境，在大多数情况下，您将使用此工具开发报表。'
  raw: "> *Make report parameter modifications*: From the Parameters section, you\
    \ can change some options on the report parameters, such as default value, visibility,\
    \ user prompting, and parameter display text. This ability to change parameters\
    \ is convenient, since you do not have to download a report to make simple parameter\
    \ changes.\n> \n> *Make changes to the data source*: The Data Sources section\
    \ allows you to change the data source used by the report. You can change to another\
    \ data source located on the same server, or you can create a new custom data\
    \ source from scratch.\n> \n> *Manage Subscriptions*: The subscription sections\
    \ allow you to manage subscriptions and data driven subscriptions of the report.\
    \ You can create, delete, and modify your report subscriptions from this section.\n\
    > \n> *Processing Options*: This section allows you to configure data caching\
    \ options for use when rendering reports. It also allows you to set up rendering\
    \ of the report using a report snapshot and configure the report timeout properties.\n\
    > \n> *Cache Refresh Options*: You can set up a new cache refresh plan or make\
    \ modifications to current plans from this section. These plans will create refresh\
    \ jobs that update cache stores used for reports or shared data sources. This\
    \ data will be used if your report is set up to render from cached data and not\
    \ from live data.\n> \n> *Report History*: This section allows you to take snapshots\
    \ of the report or to view historical snapshots of rendered reports. These can\
    \ be created manually or by a snapshot schedule that is configurable in the next\
    \ section.\n> \n> *Snapshot Options*: From this section, you can manage snapshots\
    \ and snapshot schedules. You can create a new snapshot schedule or set up a new\
    \ snapshot on a shared schedule. You also have the ability to manage options for\
    \ snapshot security and snapshot storage limits.\n> \n> *Manage security settings*:\
    \ You can manage individual security settings for a report from the Security section\
    \ of the page. By default, a report inherits the parent folder’s security settings,\
    \ but you can break that inheritance (or restore it) from this menu.\n\n![Image](images/square.jpg)\
    \ **Note** You can access the management section from the detail view as well.\n\
    \n### Using Report Builder 3.0\n\nAnother method that is used to deploy reports\
    \ in Reporting Services 2010 is the new Report Builder 3.0 application. Report\
    \ Builder 3.0 is a more user friendly way to deploy reports that moves away from\
    \ using BIDS/Visual studio. We describe using the new BIDS/Visual Studio integrated\
    \ tools in the next section. You can launch the Report Builder tool from the report\
    \ manager web interface. You can also install Report Builder 3.0 as a separate\
    \ utility by downloading the full installer from the Microsoft website. [Figure\
    \ 8-5](#Chapter08.html#fig_8_5) will give you an idea of what to expect visually\
    \ from this new utility.\n\n![Image](images/9781430238102_Fig08-05.jpg)\n\n***Figure\
    \ 8-5.** The new Report Builder 3.0 interface*\n\nReport Builder 3.0 will feel\
    \ more familiar to users of Windows 7 or the newer Office suites. The main menu\
    \ for this program is located under the Pearl in the top-left corner of the screen\
    \ that looks like the SQL Server symbol. Click the Pearl once to expand the menu\
    \ and select Open. This will allow you to browse to the report that you wish to\
    \ open for editing or deploying. This report can be loaded from a file on a local/remote\
    \ disk or directly from the report server that you are connected to. Once the\
    \ file has been loaded, the report will appear in design mode in the center window,\
    \ and the data will populate the window to the left. From here, you can make any\
    \ changes needed before deploying to the server. Since you opened the report builder\
    \ from the web interface, go ahead and load the report from the server and your\
    \ Report Builder should resemble [Figure 8-6](#Chapter08.html#fig_8_6).\n\n![Image](images/9781430238102_Fig08-06.jpg)\n\
    \n***Figure 8-6.** Loaded report in Report Builder 3.0*\n\nYou have the ability\
    \ to perform most of the functionality that is included with BIDS/Visual Studio\
    \ 2010 in Report Builder 3.0\\. From this program, you can add data sources, make\
    \ report design changes, manage parameters, and deploy reports. The only drawback\
    \ is that this application only allows for one report to be modified at a time.\
    \ To perform mass deployments or manage multiple reports for a project, you would\
    \ still need to use Visual Studio 2010/BIDS or the RS utility, which we will cover\
    \ later in this chapter. To deploy the report you have just opened, and assuming\
    \ that you have opened the report from the report server directly, return to the\
    \ Pearl menu and choose Save. If you have opened the RDL file from your hard drive,\
    \ then use the Save As option and make sure that you are connected to a report\
    \ server first. To connect to a report server, simply click the connect link in\
    \ the bottom status bar of the Report Builder 3.0 interface. Once you are connected\
    \ to your report server, you can choose that server as the destination for your\
    \ report to be saved. See [Figure 8-7](#Chapter08.html#fig_8_7) to see the Pearl\
    \ menu options that you will be using. Since we launched Report Builder from the\
    \ web interface directly, we are already connected to the report server and will\
    \ not be required to specify a server to publish to. Go ahead and make a small\
    \ change to your report and deploy it to see the changes on the report manager\
    \ web interface.\n\n![Image](images/9781430238102_Fig08-07.jpg)\n\n***Figure 8-7.**\
    \ Report Builder 3.0 save options*\n\n### Using BIDS and Visual Studio 2012\n\n\
    You also can deploy reports using the Deploy option in BIDS (Business Intelligence\
    \ Development Studio), which is integrated directly into Visual Studio 2010\\\
    . This is convenient, because it is the most robust environment and you will be\
    \ developing your reports with this tool in most cases."
