    #### 管理订阅


    `SSRS`的订阅服务提供了一种将预执行报告传递到指定位置、通过电子邮件发送给用户、发送到网络文件共享或甚至直接发送到打印机的方法。使用订阅有几个关键好处。在组织内部，员工在特定时间（例如每天或月底）需要关键信息。在外部，客户可能希望按预定时间表接收新闻通讯或财务报表。订阅可以轻松满足这两种需求。


    设置订阅的另一个好处是允许您在非高峰时段安排资源密集型报告的处理，从而确保在高使用量期间网络性能下降很少或没有下降。在本节中，您将使用两种类型的订阅：


    > *   **标准订阅：** 为一个或多个用户静态设置。

    > *   **数据驱动订阅：** 订阅者列表可以从多个数据源位置派生，并且可以通过自定义查询生成。


    ![Image](img/square.jpg) **注意** 数据驱动订阅是迄今为止最强大的订阅形式。它们仅在`SSRS`的企业版中可用。


    #### 管理标准订阅


    您将从为一家向患者提供家庭护理服务的医疗保健组织的员工设置标准电子邮件订阅开始。这份名为`患者重新认证列表`的报告是为负责跟踪患者文档的员工设计的。您可以为任何报告创建标准电子邮件订阅。在我们的业务中，要求患者的文档（本例中为`HCFA
    485`）由主治医师完成并签署。该报告本质上是这些员工的每日工作清单，任何未签署的文档都会成为一项工作。


    您可以在`Apress`网站（[`www.apress.com`](http://www.apress.com)）的“源代码/下载”区域提供的`Pro_SSRS`报告项目中找到`患者重新认证列表`报告。您可以使用`BIDS`将报告部署到您的报告服务器。打开`Pro_SSRS`项目，并将项目的`目标报告文件夹`更改为`患者文档`。接下来，右键单击`患者重新认证列表`报告，选择“部署”以创建`患者文档`文件夹，并将报告和数据源发布到您的报告服务器。需要注意的是，`Pro_SSRS`项目中提供的`Pro_SSRS`数据源使用`Windows
    身份验证`，为了让订阅成功运行，凭据需要安全地存储在数据库中。要将已部署的`Pro_SSRS`数据源从`Windows 身份验证`更改为存储凭据，请在`报告管理器`中导航到`患者文档`文件夹选择`Pro_SSRS`数据源。将“连接使用”选项更改为“在报告服务器中安全存储的凭据”，并提供适当的凭据。


    由于此报告需要足够通用以支持按需查看以及用于订阅，我们添加了一个名为`未签署`的报告参数，该参数与报告筛选器配合使用以显示具有已签署和未签署文档的患者。此报告还有其他参数，如图
    10-15 所示。如您所见，在生成订阅时将使用这些参数。


    ![Image](img/9781430238102_Fig10-15.jpg)


    *图 10-15. 带参数的患者重新认证列表报告*'
- fmt: '## Creating a Standard Subscription


    The first step in manually creating a subscription is to run `Report Manager`
    and navigate to the report for which you want to create the subscription. For
    the example, navigate to the `Patient Certification Listing` report, which is
    in the `Patient Documentation` folder on the report server. Place your cursor
    over top of the report until you see the down arrow and click it to view the options
    menu. From here you have the option to select `Subscribe` or `Manage` and then
    navigating to the `Subscriptions` tab. However, this time we are going to select
    `Subscribe` to create a new subscription for the report. If you have configured
    your `SMTP` server correctly during installation, you will be given the choice
    to select `E-mail` as the delivery option. If the `E-mail` option is not available,
    you can use the `Reporting Services Configuration Manager` to set up e-mail, as
    shown in [Figure 10-16](#Chapter10.html#fig_10_16). The `Reporting Services Configuration
    Manager` can set many of the same properties that control the report server as
    the command-line tools. The `Reporting Services Configuration Manager` is a good
    tool to use to set the properties of the report server that may need to be configured
    post-installation, such as the report server virtual directory or the account
    used to execute unattended reports. You’ll use the `Reporting Services Configuration
    Manager` again to join the instance of `SSRS` to another report server, which
    creates a Web farm of report servers to gain performance. For now, verify that
    the `SMTP` settings are correct.


    ![Image](images/9781430238102_Fig10-16.jpg)


    **Figure 10-16.** Reporting Services Configuration Manager, e-mail settings


    A subscription that is delivered via e-mail provides standard delivery options
    for `Cc`, `Bcc`, `Reply-To`, `Subject`, `Priority`, and `Comment`, which will
    be the body of the e-mail message. You can also send the entire report in the
    e-mail, a link to the report, or both. Because the user who will be receiving
    this subscription will have network access to the report server, you can send
    just a link to the report. Sending the report itself via e-mail does have benefits,
    however, especially when working with users who need the report offline, such
    as traveling staff. We will demonstrate this in the next section when you set
    up a data-driven subscription. [Figure 10-17](#Chapter10.html#fig_10_17) shows
    the e-mail options available for a report subscription.


    ![Image](images/9781430238102_Fig10-17.jpg)


    **Figure 10-17.** E-mail options for subscriptions


    ## Configuring the Subscription


    In order to provide an automated delivery system, we can configure `Reporting
    Services` subscriptions to execute at a predefined scheduled time and frequency.
    You can customize the schedule for individual reports or based on a shared schedule.
    The `Patient Recertification Listing` report needs to be delivered to staff members
    daily, and it can be run anytime after 5:00 PM on the previous day as long as
    it is delivered by the next business day. For our needs, a schedule of 9:30 PM
    every day except Saturday is sufficient, as shown in [Figure 10-18](#Chapter10.html#fig_10_18),
    which is set by clicking the `Select Schedule` button under `Subscription Processing
    Options`.


    ![Image](images/9781430238102_Fig10-18.jpg)


    **Figure 10-18.** Daily schedule for Patient Certification Listing report


    After making the appropriate scheduling modifications, click `OK` to save the
    changes. This report contains parameters, and we will want to configure the parameters
    for this subscription. As we mentioned earlier, this particular report has a parameter
    called `Unsigned`, which is a `Boolean` data type (either `True` or `False`) that
    shows both signed and unsigned documentation. The subscribers of this report,
    however, will be interested in seeing only unsigned documentation, so set the
    parameter for `Unsigned` to be `True`. Because this report has been designed to
    provide populated drop-downs for the parameter values that are based on individual
    datasets, these values are available here, such as populated `Branch` selections,
    as shown in [Figure 10-19](#Chapter10.html#fig_10_19). For now, leave all the
    parameters, except `Unsigned`, with their default values.


    ![Image](images/9781430238102_Fig10-19.jpg)


    **Figure 10-19.** Subscription parameter drop-downs


    To verify that the subscription is working as anticipated, we made `Brian_K_McDonald@sqlbigeek.com`
    the sole recipient of the mail for testing. In [Figure 10-20](#Chapter10.html#fig_10_20),
    you can see standard e-mail options for `To`, `Cc`, `Bcc`, and `Reply-To`. In
    the `To` field, you add the recipient’s e-mail address and then click `OK` to
    add the subscription. After you verify the subscription’s success, modify the
    attributes of the subscription to add the real subscribers by navigating to the
    report in `Report Manager`, selecting `Subscriptions`, and then selecting `Edit`.


    ![Image](images/9781430238102_Fig10-20.jpg)


    **Figure 10-20.** Assigning recipients to subscriptions


    ## Managing Data-Driven Subscriptions


    Standard subscriptions address the needs of many companies that want to set up
    custom subscriptions for both their employees and their customers. However, you
    can use another, much more flexible method for delivering reports: the data-driven
    subscription. Data-driven subscriptions allow administrators or content managers
    to query a data source—a `SQL Server` table, for example—to return a list of subscribers
    that meets a specific set of criteria. This is the ideal way to deliver reports
    to a wide-ranging list of subscribers. In addition, you have to manage only one
    subscription for all subscribers, and those subscribers could have different parameters
    that are used to generate personalized reports.


    We knew we would want to let our customers and their employees take advantage
    of data-driven subscriptions, and fortunately we had long ago structured our application
    database to include employee information that would be useful for just this purpose.
    By storing the employees’ e-mail addresses as well as other data, such as geographical
    locations and certifications, we had all we needed to provide a flexible delivery
    system, via e-mail, to traveling staff. The employees we initially targeted were
    clinicians who had a daily schedule of patients to see. Most of the clinicians
    operated laptops or `PDAs` as part of their daily routines.'
