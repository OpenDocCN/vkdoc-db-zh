  raw: '#### Building the Report Viewer Using a Report Viewer Control


    Now, you’ll learn how you can use the Report Viewer control to render the same
    Employee Service Cost report. Not only is it likely to be the most popular method
    for rendering server-based reports, but it also includes the ability to render
    reports based on the RDL locally without a report server.


    You can use the two Report Viewer controls: one for Windows Forms applications
    and one for ASP.NET applications. These controls allow you to add rich reporting
    features to your Windows or ASP.NET applications more easily than is possible
    using any other method. The controls offer the power of the URL rendering method
    but make it easier to implement in your code because most options are now set
    as properties on the Report Viewer control. In other words, you don’t need to
    include them in the string that you pass in as the URL. Another main advantage
    of working with the controls is that you get full IntelliSense support for all
    the options within the Visual Studio 2010 IDE.


    [Table 9-5](#Chapter09.html#tab_9_5) lists some of the key properties and methods
    of the Report Viewer controls.


    ![Image](images/tab_9_5.jpg)


    ![Image](images/square.jpg) **Note** See the Visual Studio 2010 help for more
    information about the members of the Report Viewer control as well as for information
    about a number of other properties, methods, and events that come with the Report
    Viewer controls.


    In this example, we will cover how to use the Windows Forms version of the Report
    Viewer control.


    ![Image](images/square.jpg) **Note** In the “Using the Report Server Web Service”
    section, we will show how to extend the application so that it uses Report Server
    Web service calls to query the report server for the parameters the report can
    accept and the values that are possible for each. We’ll show how to use these
    parameters to create dropdown lists for the users of the Windows Forms application
    and then render the report.


    ##### Creating the Viewer Form


    To create the viewer form in C#, you’ll start by adding a new project to your
    solution by taking the following steps:


    > 1.  Select File ![Image](images/U004.jpg) Add ![Image](images/U004.jpg) New
    Project from the menu.

    > 2.  In the New Project dialog box, select Visual C# ![Image](images/U004.jpg)
    Windows ![Image](images/U004.jpg) Windows Forms Application. Name it SSRS Viewer
    RVC.

    > 3.  Now that you have created the project, you’ll work with the form that will
    create your report viewer:

    > 4.  Name the default form that was just created to ViewerRVC.cs.

    > 5.  Open the ViewerRVC.cs file in design mode by double clicking the file in
    Solution Explorer

    > 6.  Resize the blank form to around 800×600 pixels and change the text of the
    form to SSRS Viewer RVC in the properties section.

    > 7.  Add the Report Viewer control from the Toolbox’s Reporting section to the
    form. Name the control reportViewer in the properties, and anchor it to the form’s
    top, bottom, left, and right. Resize the control to fill the form but leave room
    at the top for a few more components.(If you do not have the report viewer control,
    you may need to down load it from: [www.microsoft.com/download/en/details.aspx?id=6610)](http://www.microsoft.com/download/en/details.aspx?id=6610))

    > 8.  Now add a textbox, name it reportURL, and just after the textbox add three
    buttons named runServer, runLocal, and getParameters. Set their Text properties
    to Run Server, Run Local, and Parameters, respectively.


    You should now have a form that looks like [Figure 9-3](#Chapter09.html#fig_9_3).


    ![Image](images/square.jpg) **Note** In Visual Studio 2010 you will need to use
    a .NET framework of 3.5 or higher to get the ReportViewer controls in the IDE.
    If you use anything older than this, you will not get the option of adding a viewer
    to your project from the toolbox.


    You’ll now start adding the code necessary to use the new Report Viewer control
    to render the SSRS 2012 reports.


    ![Image](images/9781430238102_Fig09-03.jpg)


    ***Figure 9-3.** The ViewerRVC.cs form*


    ##### Coding the Viewer Form


    First, add a using statement for the new namespace, Microsoft.Reporting.WinForms,
    to the top of the class with the other namespace declarations. Doing this will
    allow you to access the members of the namespace without typing the full namespace
    each time you use a method or property from that namespace. Right click on the
    ViewerRVC.cs file and select view code to add this using statement to the file.


    `using Microsoft.Reporting.WinForms;`


    Second, add the code shown in [Listing 9-2](#Chapter09.html#list_9_2) to the Run
    Server button’s click event. Make sure the ViewerRVC.cs form is open in design
    view, and double-click the Run Server button. This will create an empty method
    to handle the button’s click event.


    ***Listing 9-2.** The runServer Click Event: Running Report in Remote Mode*


    `private void runServer_Click(object sender, EventArgs e) {`

    `reportURL.Text = "/Pro_SSRS/Chapter_9/EmployeeServiceCost";`

    `reportViewer.ProcessingMode =`

    `sProcessingMode.Remote;`

    `reportViewer.ServerReport.ReportServerUrl = new Uri(@"http://localhost/reportserver/");`

    `reportViewer.ServerReport.ReportPath = reportURL.Text;`

    `reportViewer.RefreshReport(); }`


    Now run the project in debug mode. Then click Run Server. This renders the Employee
    Service Cost report where you can input parameters for your report. Of course,
    you need to use the name of your report server where you see `localhost` in [Listing
    9-2](#Chapter09.html#list_9_2). At this point, you should see something that looks
    like [Figure 9-4](#Chapter09.html#fig_9_4).


    ![Image](images/9781430238102_Fig09-04.jpg)


    ***Figure 9-4.** SSRS Viewer RVC running a server rendered report*


    That’s all there is to rendering a report on an SSRS 2012 server using the Report
    Viewer control.


    ### Rendering the Report Locally


    We’ll now cover how to render the report locally without using an SSRS 2012 server.
    It is a bit more complicated because you’re responsible for filling the data sources
    with the data that your reports require. However, it does provide tremendous flexibility
    to the developer because you can use SSRS 2012 reporting features without a server.


    ![Image](images/square.jpg) **Caution** The server and local report definition
    files are not 100 percent compatible. This means it is not possible to use the
    same RDL source file for both local and remote use. In fact, you will note that
    by default reports for server-side or remote processing are created with the .rdl
    extension and reports for client-side or local processing are created with the
    .rdlc extension. While they are not 100 percent interchangeable, you can use one
    for the other with some changes to the underlying RDL.'
  trans: "## 使用 Report Viewer 控件构建报表查看器\n\n现在，您将学习如何使用 Report Viewer 控件来呈现相同的员工服务成本报告。这很可能是呈现服务器端报告最受欢迎的方法，并且它还能够基于\
    \ RDL 在本地呈现报告，而无需报告服务器。\n\n您可以使用两种 Report Viewer 控件：一种用于 Windows 窗体应用程序，另一种用于\
    \ ASP.NET 应用程序。这些控件使您能够更轻松地为 Windows 或 ASP.NET 应用程序添加丰富的报告功能。这些控件提供了 URL 呈现方法的能力，但通过在代码中以\
    \ Report Viewer 控件的属性设置大多数选项，使其更易于实现。换句话说，您不需要将它们包含在作为 URL 传递的字符串中。使用控件的另一个主要优点是，在\
    \ Visual Studio 2010 IDE 中，您可以获得所有选项的完整 IntelliSense 支持。\n\n表 9-5 列出了 Report Viewer\
    \ 控件的一些关键属性和方法。\n\n![Image](img/tab_9_5.jpg)\n\n![Image](img/square.jpg) **注意**\
    \ 有关 Report Viewer 控件成员以及控件附带的其他属性、方法和事件的更多信息，请参阅 Visual Studio 2010 帮助。\n\n在本示例中，我们将介绍如何使用\
    \ Windows 窗体版本的 Report Viewer 控件。\n\n![Image](img/square.jpg) **注意** 在“使用报表服务器\
