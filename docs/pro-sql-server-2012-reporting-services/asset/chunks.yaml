    \ 9-16 展示了网页代码视图中已填充的点击事件处理方法。\n\n### 清单 9-16. 填充 RenderReport 按钮点击方法\n\n```csharp\n\
    protected void renderReport_Click(object sender, EventArgs e)\n{\n    reportViewerWeb.ProcessingMode\
    \ = Microsoft.Reporting.WebForms.ProcessingMode.Remote;\n    reportViewerWeb.ServerReport.ReportServerUrl\
