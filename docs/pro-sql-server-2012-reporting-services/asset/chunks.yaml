- fmt: '## 创建其他数据源


    SSRS 的一个令人兴奋的特性是它不仅能够查询 SQL Server，还能查询多种数据源类型。如前所述，任何 ODBC 或 OLE DB 提供程序都可以作为
    SSRS 的数据源，XML、SSIS 和 SAP 同样可以。为了展示一个使用 SQL Server 数据库之外数据源的简单示例，让我们看看用于 Microsoft
    目录服务的 OLE DB 提供程序。创建到目录服务的数据源与您用于创建 SQL Server 数据源的过程类似，区别在于您需要在数据源属性中选择 OLE DB
    作为数据源类型，并为 OLE DB 提供程序选择用于 Microsoft 目录服务的 OLE DB 提供程序。


    通过使用直接的 LDAP 查询，您可以生成用于 SSRS 的字段信息，如下所示：


    ```sql

    SELECT en,sn,objectcategory,department

    FROM  ''LDAP://DirectoryServerName/OU=OuName,DC=Company,DC=Com''

    ```


    该查询使用标准的 SQL 方言，从 Active Directory 返回通用名称、姓氏、对象类别（计算机或人员）和部门。字段名称会自动创建，并可像报表中的任何其他数据字段一样使用。


    在查询 Active Directory 或任何其他不支持 SSRS 图形化查询设计器的数据源时，您必须考虑几个注意事项：


    > *   查询参数在查询中不被直接支持。但是，您可以在查询中定义和使用报表参数——这被称为*动态查询*——来过滤数据。

    > *   由于没有图形化查询设计器可用，您需要通过直接键入查询并在通用查询设计器中进行测试来开发查询。这需要了解 Active Directory 对象和名称。


    `![Image](images/square.jpg)` **`Tip`** 有几种工具可用于协助管理 Active Directory，例如 Active
    Directory 应用程序模式（ADAM）；LDP，一个 Active Directory 工具；以及 ADSIEdit，一个图形化的 Active Directory
    浏览器。两者都包含在 Windows 支持工具中。


    ### 配置参数


    SSRS 中的参数有两种类型，*查询参数* 和 *报表参数*，这两者通常紧密相关。


    您使用基于 SQL 查询或存储过程的参数来限制返回到报表的记录集，通常位于查询的 `WHERE` 子句中。在源查询中，您通过在参数名称前加上 `@` 符号来定义参数，例如
    `@MyParameter`。在 SSRS 的查询设计工具中，这会产生两个作用：它强制查询在执行时提示输入参数的值。其次，它会自动使用相同的名称创建另一个参数，即报表参数。对于存储过程，例如您在上一章创建并在此处使用的
    `Emp_Svc_Cost`，存储过程中定义的任何参数也会为报表自动创建。


    报表参数可以独立于查询或存储过程而存在。例如，您可以有一个控制报表行为或布局属性的报表参数。当您以这种方式使用报表参数时，它通常链接到报表筛选器或用于控制报表项属性值的表达式中。在
    [图 3-11](#Chapter03.html#fig_3_11) 中，您可以看到当我们执行 `Emp_Svc_Cost` 存储过程时为我们自动创建的报表参数。您还可以看到单个参数（如
    `ServiceMonth`）的报表参数对话框，您可以通过双击参数或右键单击并选择“参数属性”来打开它。报表参数在 Visual Studio 或 BIDS
    中现在集中显示在“报表数据”框中，而在早期版本中，它们包含在自己的报表参数属性框中。报表参数在报表中用于设置数据集的条件以及控制报表设计布局元素，您将在 [第
    6 章](#Chapter06.html) 中详细执行此操作。


    `![Image](images/9781430238102_Fig03-11.jpg)`


    ***图 3-11.** 报表参数对话框*


    [图 3-11](#Chapter03.html#fig_3_11) 还显示了“允许多值”复选框，这是 SQL Server 2005 的一个新 SSRS
    功能。多值参数允许用户选择所有值或值的组合，以在报表中用于限制显示的数据。当选择多个值时，它们作为字符串数组传递给查询或存储过程。重要的是要注意，多值参数在报表中实现时需要以下特殊考虑：


    > *不接受 NULL 值*：在决定将哪些参数设为多值时，这一点很重要，因为它会影响底层查询或存储过程的设计。在这种情况下，您在 `Emp_Svc_Cost`
    存储过程中构建了逻辑以接受 `NULL` 值，并在从参数传入 `NULL` 时返回所有数据。您将需要修改此存储过程以与多值参数配合工作。

    >

    > *将被视为字符串*：由于多值参数返回逗号分隔的字符串，您需要考虑存储过程参数的数据类型分配——报表参数与查询或存储过程参数需要具有相同的数据类型才能正常工作。

    >

    > *影响性能*：当值列表相对较小时，最好使用多值参数。选择允许用户选择年份范围——例如“2010,2011,2012”——比允许他们基于 ID 选择 1,000
    名患者要好得多，因为这些值都将作为逗号分隔的字符串值传入存储过程，以使用 `IN` 或 `EXISTS` 子句进行评估。

    >

    > *不能用于筛选器*：与 SSRS 中的单值或可为空参数不同，多值参数只能用于传回查询或存储过程，因此不能将它们用于报表筛选器来限制数据。

    >

    > *在存储过程中需要字符串处理逻辑*：存储过程无法正确评估多值参数，因此，例如在存储过程中使用 `IN (@MyReportParameterArray)`
    将不会返回预期的结果。这是 SQL 长期以来的一个问题，存在多种方法（无论好坏）来处理存储过程中的多值字符串数组。两种可能的选择是用户定义函数（UDF）和动态
    SQL。在[第 6 章](#Chapter06.html)中，涵盖了构建可部署报表的内容，我们将讨论如何使用一个特殊的 UDF，它将多值报表参数解析为一个表，该表将有效地将结果集限制为完全符合预期的内容。'
  raw: "#### Creating Other Data Sources\n\nOne exciting aspect of SSRS is its ability\
    \ to query multiple data source types as well as SQL Server. As mentioned previously,\
    \ any ODBC or OLE DB provider can be a data source for SSRS, as can XML, SSIS,\
    \ and SAP. For a simple example of using a data source other than a SQL Server\
    \ database, let’s look at the OLE DB Provider for Microsoft Directory Services.\
    \ Creating the data source to Directory Services is similar to procedure you used\
    \ to create the SQL Server data source, except that you select OLE DB as the data\
    \ source and OLE DB Provider for Microsoft Directory Services for the OLE DB provider\
    \ in the data source properties.\n\nBy using a direct LDAP query, you can generate\
    \ field information for use in SSRS like so:\n\n`SELECT en,sn,objectcategory,department`\n\
    `FROM  'LDAP://DirectoryServerName/OU=OuName,DC=Company,DC=Com'`\n\nThe query\
    \ uses a standard SQL dialect that returns the common name, surname, object category\
    \ (computer or person), and department from Active Directory. The field names\
    \ are automatically created and can be used like any other data field for a report.\n\
    \nYou must consider a couple of caveats when querying Active Directory or any\
    \ other data source that doesn’t support the graphical query designer in SSRS:\n\
    \n> *   Query parameters aren’t supported directly in the query. However, you\
    \ can define and use report parameters in the query—referred to as a *dynamic\
    \ query*—and to filter data.\n> *   Because a graphical query designer isn’t available,\
    \ you need to develop the query in the generic query designer by typing the query\
    \ directly and testing. This requires knowledge of Active Directory objects and\
    \ names.\n\n![Image](images/square.jpg) **Tip** Several tools are available to\
    \ assist in managing Active Directory, such as Active Directory Application Mode\
    \ (ADAM); LDP, an Active Directory tool; and ADSIEdit, a graphical Active Directory\
    \ browser. Both are included with the Windows Support Tools.\n\n### Configuring\
    \ Parameters\n\nParameters in SSRS come in two flavors, *query parameters* and\
    \ *report parameters*, and the two are often tied together closely.\n\nYou use\
    \ a parameter that’s based on a SQL query or stored procedure to limit the record\
    \ set returned to the report, typically in the `WHERE` clause of a query. In the\
    \ source query, you define parameters by prefacing the parameter’s name with an\
    \ @ symbol, such as `@MyParameter`. Within SSRS’s query design tools, this does\
    \ two things: it forces the query to prompt for the value of the parameter when\
    \ it’s executed. Secondly, it automatically creates the other parameter, the report\
    \ parameter, using the same name. With stored procedures, such as `Emp_Svc_Cost`,\
    \ which you created in the previous chapter and have used here, any parameters\
    \ that have been defined in the stored procedure are also automatically created\
    \ for the report.\n\nReport parameters can exist that are disassociated from a\
    \ query or stored procedure. For example, you could have a report parameter that\
    \ controls a report’s behavior or layout properties. When you use a report parameter\
    \ in this way, it’s often linked to a report filter or used in an expression that\
    \ controls a property value of a report item. In [Figure 3-11](#Chapter03.html#fig_3_11),\
    \ you can see the report parameters that were created automatically for us when\
    \ we executed the `Emp_Svc_Cost` stored procedure. You’ll also see the Report\
    \ Parameters dialog of the individual parameters, such as `ServiceMonth`, which\
    \ you open by either double-clicking the parameter or right-clicking and selecting\
    \ Parameter Properties. The report parameters, in Visual Studio or BIDS, now appear\
    \ consolidated in the Report Data box, whereas in previous versions they were\
    \ contained within their own report parameters property box. Report parameters\
    \ are used within a report, both for setting criteria for datasets and for controlling\
    \ report design layout elements, which you will do in detail in [Chapter 6](#Chapter06.html).\n\
    \n![Image](images/9781430238102_Fig03-11.jpg)\n\n***Figure 3-11.** Report Parameters\
    \ dialog box*\n\n[Figure 3-11](#Chapter03.html#fig_3_11) also shows the Allow\
    \ Multiple Values checkbox, a new SSRS feature for SQL Server 2005. Multivalue\
    \ parameters allow users to select all values or combinations of values to be\
    \ used within the report to limit the data that is displayed. When multiple values\
    \ are chosen, they are passed to the query or stored procedure as a string array.\
    \ It is important to note that multivalue parameters require the following special\
    \ considerations when implementing in your reports:\n\n> *Does not accept NULL\
    \ values*: This is important when deciding which parameters to make multivalued,\
    \ as it will influence the design of the underlying query or stored procedure.\
    \ In this case, you built logic into the `Emp_Svc_Cost` stored procedure to accept\
    \ `NULL` values and return all data when `NULL` was passed in from a parameter.\
    \ You will have to modify this stored procedure to work with multivalue parameters.\n\
    > \n> *Will be evaluated as a String*: Since a multivalue parameter returns a\
    \ comma-separated string, you will need to consider the data type assignment for\
    \ the stored procedure parameters—the report parameter and the query or stored\
    \ procedure parameter need to have the same data type to work properly.\n> \n\
    > *Affects performance*: Multivalue parameters are best used when there is a relatively\
    \ small list of values. Choosing to allow users to select a range of years—for\
    \ example, “2010,2011,2012”—is much better than allowing them to select 1,000\
    \ patients based on their IDs, as these will all be passed into the stored procedure\
    \ as a comma-separated string value to be evaluated with the `IN` or `EXISTS`\
    \ clause.\n> \n> *Cannot be used in filters*: Unlike single-value or nullable\
    \ parameters in SSRS, multivalue parameters can be used only to pass back to the\
    \ query or stored procedure, so you can’t use them to limit with report filters.\n\
    > \n> *Requires string manipulation logic in stored procedures*: Stored procedures\
    \ do not evaluate multivalue parameters correctly, so using `IN (@MyReportParameterArray)`\
    \ in a stored procedure, for example, will not return the expected result. This\
    \ has been an issue with SQL for a long time, and numerous ways, both good and\
    \ bad, exist to work with multivalue string arrays in stored procedures. Two possible\
    \ choices are user-defined functions (UDFs) and dynamic SQL. In [Chapter 6](#Chapter06.html),\
    \ which covers the building of a deployable report, we will discuss how to use\
    \ a special UDF that parses the multivalue report parameter into a table that\
    \ will work effectively to limit the result set to exactly what is expected."
