- fmt: "## 交互式排序\n\n在向大量受众部署报表时，总会遇到这样的情况：有人会要求以某种特定方式排序报表，而这通常与最初设计的方式不同。当这种情况发生时，报表设计者通常会陷入两难：是创建第二个几乎相同、但带有自定义排序的报表来满足请求者，还是将该请求放入未来的增强队列中。交互式排序允许用户在运行时，对任意数量已定义启用此功能的字段进行排序。\n\
    \n在示例报表中，你知道你有一个广泛的受众群体，他们可能会因不同目的而使用此报表。例如，首席财务官可能希望查看报表以了解哪种诊断的就诊次数最多。相反，另一个用户可能需要了解有多少患者患有某种诊断，并希望报告在诊断组级别按患者数量排序，而不是就诊次数。在本节中，你将向报表添加交互式排序以满足这两种需求，并且知道如果需要，可以按任何其他标准对报表进行排序，而无需根据用户细分创建额外的报表。\n\
    \n由于你知道将应用于报表的交互式排序标准是患者数量而非就诊次数，因此只需在用户将单击以根据需要更改排序的每个文本框中添加此标准。使用 `EmployeeServiceCost_InteractiveSort_Start.rdl`\
    \ 作为起点，按照以下步骤向表头单元格“患者数量”和“就诊次数”添加交互式排序：\n\n1.  在“设计”选项卡上，右键单击“患者数量”表头文本框，然后选择“文本框属性”。单击“交互式排序”选项卡。\n\
    2.  勾选标题为“启用此文本框的交互式排序”的框。\n3.  在“选择要排序的内容”区域，选择“组”单选按钮，并将 `Diagnosis` 添加为组表达式。在“排序依据”区域输入\
    \ `=CountDistinct(Fields!PatID.Value)`。\n4.  勾选“将此排序应用于以下位置中的所有组或数据区域”选项，然后选择\
    \ `Emp_Svc_Cost` 数据区域，或键入该区域名称。单击“确定”。\n5.  右键单击“就诊次数”表头单元格，并执行步骤 1 到 4，将排序表达式替换为\
    \ `=Sum(Fields!Visit_Count.Value)`，如图 [6-12](#Chapter06.html#fig_6_12) 所示。\n\n\
    ![Image](images/9781430238102_Fig06-12.jpg)\n\n**图 6-12.** `就诊次数`的交互式排序属性\n\n\
    当您查看应用了新的交互式排序表达式的报表时，您会看到在“患者数量”和“就诊次数”标题字段中自动添加了一个可选择的排序图标，如图 [6-13](#Chapter06.html#fig_6_13)\
    \ 所示。当用户在浏览器中单击此图标时，报表将自动重新排序，以显示每个诊断的最大或最小患者数量，或者每个诊断的最大或最小就诊次数。图 [6-13](#Chapter06.html#fig_6_13)\
    \ 显示了就诊次数最多的诊断，即 `Physical Therapy NEC`，有 `1,579` 次就诊和 `76` 名患有此疾病的独特患者。用户也可以选择按患者数量的升序或降序对报告进行排序。\n\
    \n![Image](images/9781430238102_Fig06-13.jpg)\n\n**图 6-13.** 交互式排序以显示患者数量的报表\n\
    \n交互式排序是文本框报表项的一个属性，通常用于表格或矩阵数据区域中的列标题。只要它们在相同的作用域或分组内，单个文本框可以控制一个或多个数据区域的排序。例如，可以对嵌套在列表数据区域内的多个表格进行排序。\n\
    \n`Pro_SSRS` 项目中的 `EmployeeServiceCost_InteractiveSort.rdl` 报表包含交互式排序功能。\n\n##\
    \ 超链接操作\n\n能够将一个报表项（例如文本框的内容）链接到另一个报表或 URL，为 SSRS 增加了另一个有价值的交互级别。通过向 SSRS 报表添加超链接，用户可以像使用应用程序或网页一样使用报表，从而使他们的任务更高效。接下来的部分将展示如何向报表添加多个链接或操作，以帮助用户链接到其他报表和位置，例如公司内网站点。您可以将三种基本操作与报表中的值相关联：\n\
    \n> *   跳转到书签\n> *   跳转到 URL\n> *   跳转到报表\n\n您可以在支持这些操作的报表项（例如文本框、图表和图像）的“操作”选项卡上找到它们。\n\
    \n为了演示这些超链接操作，我们将使用一个比您迄今为止设计的报表更适合超链接操作的报表，该报表已在向下钻取功能中包含一个交互级别。下一个报表 `Employee\
    \ Listing` 将提供一个简单的员工列表，根据他们的临床专业进行分组。代码下载中提供了两个版本的 `Employee Listing` 报表。一个仅包含已创建的数据集，以便您可以按照以下步骤创建报表，名为\
    \ `EmployeeListing_Start.rdl`。另一个是完整版本，名为 `EmployeeListing.rdl`。\n\n您将向报表添加三个交互式超链接操作，以提供以下功能：\n\
    \n> *书签：* 选择员工姓名时，报表将跳转到报表内包含有关该员工更多详细信息（例如他们看过的患者数量）的已加书签位置。\n> \n> *URL：* 您还将根据员工的学科或临床专业，设置指向其部门网站的链接。您还将使用一个报表参数，该参数专门用于选择员工的分支机构位置。当用户从报表参数提供的下拉列表中选择分支机构位置时，他们将被带到自己部门的内网站点。此功能仅用于示例说明，实际上不会将您带到内网站点；也就是说，除非您为分支机构和包含各学科的子文件夹设置了内网站点。\n\
    > \n> *报表：* 您将添加一个指向您的 `Employee Service Cost` 报表的链接，该链接将传递一个 `EmployeelD` 参数以限制链接报表的结果。您将在\
    \ `Employee Service Cost` 报表中使用相同的技术，通过富文本框格式链接到患者调查表单。\n\n完成的 `Employee Listing`\
    \ 报表将包含两个表格数据区域：一个用于摘要信息，另一个用于有关员工就诊的详细信息。您将把超链接操作添加到报表的摘要部分，这是用户首先看到的第一页。[清单\
    \ 6-1](#Chapter06.html#list_6_1) 显示了用于获取员工信息的数据集查询。对于此报表，您将员工限制为已知集合（如 `WHERE`\
    \ 子句所示），以保持报表较小。您还将添加一个日期范围及两个参数 `@DateFrom` 和 `@DateTo`，稍后您将创建并使用它们。`EmployeeListing_Start.rdl`\
    \ 报表包含默认日期范围值，从 `2007年1月1日` 到使用 `Today()` 函数计算的当前日期。此查询及示例变量设置可在“查询”文件夹下名为 `EmployeeListingQuery.sql`\
    \ 的脚本中找到。\n\n**清单 6-1.** 员工列表查询"
  raw: "#### Interactive Sorting\n\nIt never fails when deploying a report to a large\
    \ audience: someone will ask that the report be sorted in a certain way that usually\
    \ differs from the way it was originally designed. When this scenario happens,\
    \ typically the report designer is torn between creating a second, almost identical,\
    \ report with custom sorting to appease the requestor and placing the request\
    \ in queue for a future enhancement to the report. Interactive sorting allows\
    \ users to sort the report at runtime on any number of fields that have been defined\
    \ to use this functionality.\n\nIn the sample report, you know that you have a\
    \ broad audience that may use this report for different purposes. A chief financial\
    \ officer (CFO), for example, may want to view the report to see which diagnosis\
    \ has the most number of visits. In contrast, another user may need to understand\
    \ how many patients have a certain diagnosis and would like the report sorted\
    \ by patient count, rather than visit count, at the Diagnosis group level. In\
    \ this section, you will add interactive sorting to the report to meet these two\
    \ needs, knowing that it is possible to sort the report using any other criteria\
    \ if requested without having to create additional reports based on a user subdivision.\n\
    \nSince you know that the interactive sorting you will apply to your report will\
    \ be patient count and not visit count, all that you have to do is add this criterion\
    \ to each of the textboxes where the users will click to change the sorting based\
    \ on their needs. Using the EmployeeServiceCost_InteractiveSort_Start.rdl as our\
    \ starting point, add the interactive sorting to the header cells Patient Count\
    \ and Visit Count by following these steps:\n\n1.  On the Design tab, right-click\
    \ the Patient Count header textbox, and select Textbox Properties. Click the Interactive\
    \ Sorting tab.\n2.  Check the box titled Enable Interactive Sorting on This Text\
    \ Box.\n3.  In the Choose what to sort area, select the Groups radio button and\
    \ add Diagnosis as the group expression. In the Sort by area enter =CountDistinct(Fields!PatID.Value).\n\
    4.  Check the option Apply This Sorting to all Groups or Data Regions in and then\
    \ select the Emp_Svc_Cost data region, or type in that region name. Click OK\n\
    5.  Right-click the Visit Count header cell, and perform steps 1 through 4, replacing\
    \ the sort expression with =Sum(Fields!Visit_Count.Value), as shown in [Figure\
    \ 6-12](#Chapter06.html#fig_6_12).\n\n![Image](images/9781430238102_Fig06-12.jpg)\n\
    \n***Figure 6-12.** Interactive sort properties for the visit count*\n\nWhen you\
    \ view the report with the new interactive sorting expressions in place, you can\
    \ see the automatic addition of a selectable sort icon in the Patient Count and\
    \ Visit Count header fields, as shown in [Figure 6-13](#Chapter06.html#fig_6_13).\
    \ When a user clicks this icon in the browser, the report will automatically re-sort\
    \ to show either the greatest or least number of patients per diagnosis or the\
    \ greatest or least number of visits per diagnosis. [Figure 6-13](#Chapter06.html#fig_6_13)\
    \ shows the diagnosis with the most number of visits, which is Physical Therapy\
    \ NEC with 1,579 visits and 76 unique patients diagnosed with this illness. The\
    \ user could also choose to sort the report in ascending or descending order by\
    \ the number of patients.\n\n![Image](images/9781430238102_Fig06-13.jpg)\n\n***Figure\
    \ 6-13.** Report sorted interactively to show the number of patients*\n\nInteractive\
    \ sorting is a property of the textbox report item and is typically used on column\
    \ headings in a Table or Matrix data region. A single textbox can control sorting\
    \ for one or more data regions as long as they are within the same scope or grouping.\
    \ For example, it is possible to sort multiple tables that are nested within a\
    \ List data region.\n\nThe EmployeeServiceCost_InteractiveSort.rdl report in the\
    \ Pro_SSRS project includes interactive sorting.\n\n#### Hyperlink Actions\n\n\
    Having the ability to link one report item, such as the contents of a textbox,\
    \ to another report or URL adds another valuable level of interactivity in SSRS.\
    \ By adding hyperlinks to an SSRS report, users can work with the report as they\
    \ would an application or a Web page, making their tasks more efficient. The sections\
    \ to follow show how to add several links or actions to your reports to aid users\
    \ in linking to other reports and locations, such as a company intranet site.\
    \ You can associate three basic actions with values in a report:\n\n> *   Jumping\
    \ to a bookmark\n> *   Jumping to a URL\n> *   Jumping to a report\n\nYou can\
    \ find these on the Action tab of the report items that support these actions,\
    \ such as textboxes, charts, and images.\n\nTo demonstrate each of these hyperlink\
    \ actions, we will use a report that is more suited to hyperlink actions than\
    \ the one you have been designing thus far, which already contains one level of\
    \ interactivity in the drill-down functionality. The next report, Employee Listing,\
    \ will provide a simple list of employees, grouped according to their clinical\
    \ specialty. Two reports are available in the code download for the Employee Listing\
    \ report. One is provided with only the dataset created so that you can step through\
    \ the following procedures to create the report. It is called EmployeeListing_Start.rdl.\
    \ The other report is a complete version called EmployeeListing.rdl.\n\nYou will\
    \ add the three interactive hyperlink actions to the report to deliver the following\
    \ features:\n\n> *Bookmark:* When the employee name is selected, the report will\
    \ jump to a bookmarked location within the report that contains more details about\
    \ the employee, such as the number of patients they have seen.\n> \n> *URL:* You\
    \ will also set up a link to the employee’s department web site, based on the\
    \ employee’s discipline or clinical specialty. You will also use a report parameter\
    \ that you will set up specifically for the purpose of selecting the employee’s\
    \ branch location. When users select a branch location from a drop-down list provided\
    \ with the report parameter, they will be taken to their own department’s intranet\
    \ site. This functionality is shown for example purposes only and will not actually\
    \ take you to an intranet website; that is, unless you have intranet sites set\
    \ up for the branches and subfolders for each, containing the disciplines.\n>\
    \ \n> *Report:* You will add a link to your Employee Service Cost report that\
    \ will pass an EmployeelD parameter to limit the results of the linked report.\
    \ You will use the same technique in the Employee Service Cost report that will\
    \ link to a patient survey form using rich-textbox formatting.\n\nThe completed\
    \ Employee Listing report will contain two Table data regions: one for summary\
    \ information and one for detailed information about the employee’s visits. You\
    \ will add the hyperlink actions to the summary portion of the report, which will\
    \ be the first page the user sees. [Listing 6-1](#Chapter06.html#list_6_1) shows\
    \ the query for the dataset that delivers employee information. For this report,\
    \ you will limit the employees to a known set, as shown in the WHERE clause, to\
    \ keep the report small. You will also add a date range with two parameters, @DateFrom\
    \ and @DateTo, which you will create and utilize later. The EmployeeListing_Start.rdl\
    \ report contains default values for a date range from January 1, 2007, to the\
    \ current date using the Today() function. This query with sample variable settings\
    \ can be found under the Queries folder in a script named EmployeeListingQuery.sql.\n\
    \n***Listing 6-1.** Employee Listing Query*"
  trans: "## 交互式排序\n\n在向大量受众部署报表时，总会遇到这样的情况：有人会要求以某种特定方式排序报表，而这通常与最初设计的方式不同。当这种情况发生时，报表设计者通常会陷入两难：是创建第二个几乎相同、但带有自定义排序的报表来满足请求者，还是将该请求放入未来的增强队列中。交互式排序允许用户在运行时，对任意数量已定义启用此功能的字段进行排序。\n\
    \n在示例报表中，你知道你有一个广泛的受众群体，他们可能会因不同目的而使用此报表。例如，首席财务官可能希望查看报表以了解哪种诊断的就诊次数最多。相反，另一个用户可能需要了解有多少患者患有某种诊断，并希望报告在诊断组级别按患者数量排序，而不是就诊次数。在本节中，你将向报表添加交互式排序以满足这两种需求，并且知道如果需要，可以按任何其他标准对报表进行排序，而无需根据用户细分创建额外的报表。\n\
    \n由于你知道将应用于报表的交互式排序标准是患者数量而非就诊次数，因此只需在用户将单击以根据需要更改排序的每个文本框中添加此标准。使用 `EmployeeServiceCost_InteractiveSort_Start.rdl`\
    \ 作为起点，按照以下步骤向表头单元格“患者数量”和“就诊次数”添加交互式排序：\n\n1.  在“设计”选项卡上，右键单击“患者数量”表头文本框，然后选择“文本框属性”。单击“交互式排序”选项卡。\n\
    2.  勾选标题为“启用此文本框的交互式排序”的框。\n3.  在“选择要排序的内容”区域，选择“组”单选按钮，并将 `Diagnosis` 添加为组表达式。在“排序依据”区域输入\
    \ `=CountDistinct(Fields!PatID.Value)`。\n4.  勾选“将此排序应用于以下位置中的所有组或数据区域”选项，然后选择\
    \ `Emp_Svc_Cost` 数据区域，或键入该区域名称。单击“确定”。\n5.  右键单击“就诊次数”表头单元格，并执行步骤 1 到 4，将排序表达式替换为\
    \ `=Sum(Fields!Visit_Count.Value)`，如图 6-12 所示。\n\n![Image](img/9781430238102_Fig06-12.jpg)\n\
    \n**图 6-12.** `就诊次数`的交互式排序属性\n\n当您查看应用了新的交互式排序表达式的报表时，您会看到在“患者数量”和“就诊次数”标题字段中自动添加了一个可选择的排序图标，如图\
    \ 6-13 所示。当用户在浏览器中单击此图标时，报表将自动重新排序，以显示每个诊断的最大或最小患者数量，或者每个诊断的最大或最小就诊次数。图 6-13 显示了就诊次数最多的诊断，即\
    \ `Physical Therapy NEC`，有 `1,579` 次就诊和 `76` 名患有此疾病的独特患者。用户也可以选择按患者数量的升序或降序对报告进行排序。\n\
    \n![Image](img/9781430238102_Fig06-13.jpg)\n\n**图 6-13.** 交互式排序以显示患者数量的报表\n\n\
    交互式排序是文本框报表项的一个属性，通常用于表格或矩阵数据区域中的列标题。只要它们在相同的作用域或分组内，单个文本框可以控制一个或多个数据区域的排序。例如，可以对嵌套在列表数据区域内的多个表格进行排序。\n\
    \n`Pro_SSRS` 项目中的 `EmployeeServiceCost_InteractiveSort.rdl` 报表包含交互式排序功能。\n\n##\
    \ 超链接操作\n\n能够将一个报表项（例如文本框的内容）链接到另一个报表或 URL，为 SSRS 增加了另一个有价值的交互级别。通过向 SSRS 报表添加超链接，用户可以像使用应用程序或网页一样使用报表，从而使他们的任务更高效。接下来的部分将展示如何向报表添加多个链接或操作，以帮助用户链接到其他报表和位置，例如公司内网站点。您可以将三种基本操作与报表中的值相关联：\n\
    \n> *   跳转到书签\n> *   跳转到 URL\n> *   跳转到报表\n\n您可以在支持这些操作的报表项（例如文本框、图表和图像）的“操作”选项卡上找到它们。\n\
    \n为了演示这些超链接操作，我们将使用一个比您迄今为止设计的报表更适合超链接操作的报表，该报表已在向下钻取功能中包含一个交互级别。下一个报表 `Employee\
    \ Listing` 将提供一个简单的员工列表，根据他们的临床专业进行分组。代码下载中提供了两个版本的 `Employee Listing` 报表。一个仅包含已创建的数据集，以便您可以按照以下步骤创建报表，名为\
    \ `EmployeeListing_Start.rdl`。另一个是完整版本，名为 `EmployeeListing.rdl`。\n\n您将向报表添加三个交互式超链接操作，以提供以下功能：\n\
    \n> *书签：* 选择员工姓名时，报表将跳转到报表内包含有关该员工更多详细信息（例如他们看过的患者数量）的已加书签位置。\n> \n> *URL：* 您还将根据员工的学科或临床专业，设置指向其部门网站的链接。您还将使用一个报表参数，该参数专门用于选择员工的分支机构位置。当用户从报表参数提供的下拉列表中选择分支机构位置时，他们将被带到自己部门的内网站点。此功能仅用于示例说明，实际上不会将您带到内网站点；也就是说，除非您为分支机构和包含各学科的子文件夹设置了内网站点。\n\
    > \n> *报表：* 您将添加一个指向您的 `Employee Service Cost` 报表的链接，该链接将传递一个 `EmployeelD` 参数以限制链接报表的结果。您将在\
    \ `Employee Service Cost` 报表中使用相同的技术，通过富文本框格式链接到患者调查表单。\n\n完成的 `Employee Listing`\
    \ 报表将包含两个表格数据区域：一个用于摘要信息，另一个用于有关员工就诊的详细信息。您将把超链接操作添加到报表的摘要部分，这是用户首先看到的第一页。清单 6-1\
    \ 显示了用于获取员工信息的数据集查询。对于此报表，您将员工限制为已知集合（如 `WHERE` 子句所示），以保持报表较小。您还将添加一个日期范围及两个参数\
    \ `@DateFrom` 和 `@DateTo`，稍后您将创建并使用它们。`EmployeeListing_Start.rdl` 报表包含默认日期范围值，从\
    \ `2007 年 1 月 1 日` 到使用 `Today()` 函数计算的当前日期。此查询及示例变量设置可在“查询”文件夹下名为 `EmployeeListingQuery.sql`\
    \ 的脚本中找到。\n\n**清单 6-1.** 员工列表查询"
- fmt: "```sql\nSELECT\n        RTRIM(E.EmployeeID) AS EmployeeID\n        , E.LastName\n\
    \        , E.FirstName\n        , E.EmployeeTblID AS EmpTblID\n        , E.EmploymentTypeID\
    \ AS EmploymentType\n        , E.HireDate\n        , D.Dscr AS Discipline\n  \
    \      , P.LastName AS patlastname\n        , P.FirstName AS patfirstname\n  \
    \      , T.ChargeServiceStartDate\n        , D.DisciplineID\n        , P.PatID\n\
    FROM\n        Trx AS T\n        JOIN ChargeInfo AS CI ON T.ChargeInfoID = CI.ChargeInfoID\n\
    \        JOIN Employee AS E ON E.EmployeeTblID = CI.EmployeeTblID\n        JOIN\
    \ Discipline AS D ON E.DisciplineTblID = D.DisciplineTblID\n        JOIN Patient\
    \ AS P ON T.PatID = P.PatID\nWHERE\n        (T.ChargeServiceStartDate BETWEEN\
    \ @DateFrom AND @DateTo)\n```\n\n## To begin, open the EmployeeListing_Start.rdl\
    \ report\n\nThe steps to produce the initial basic report, as shown in `Figure\
    \ 6-14` are straightforward, with only a few pointers needed. First, you will\
    \ be using a Table data region again, so simply drag the table to the report area\
    \ on the Design surface. When you add a table, BIDS automatically generates three\
    \ columns. Add another column to the table.\n\nNext, add the following fields\
    \ onto the detail columns: `EmployeeID`, `LastName`, `HireDate`, and `Discipline`.\
    \ The employee `Discipline` field references an employee’s clinical specialty,\
    \ such as Home Health Aide or Skilled Nurse. Now that we have a start, let’s edit\
    \ the `Lastname` field to make it a concatenated value for Employee Name using\
    \ the `LastName` and `FirstName` columns separated by a comma (Ex. LastName, FirstName).\n\
    \nRight click on the `Lastname` textbox in the details row and select `Expression`.\
    \ Because the first and last name fields have been padded with spaces, you will\
    \ want to use the `RTRIM()` function to remove the extra spaces. The expression\
    \ for the last name text box should look like this:\n\n```vb\n=RTRIM(Fields!LastName.Value)\
    \ & \", \" & RTRIM(Fields!FirstName.Value)\n```\n\nNow that you have combined\
    \ `LastName` and `FirstName` into one, change the header from Last Name to Employee\
    \ Name. Make the entire header row of the table Bold. Finally, let’s change the\
    \ Employee column to look a little more like a hyperlink. Select the `EmployeeID`\
    \ detail field and then set text to be underlined and the font color to blue.\n\
    \n![Image](images/9781430238102_Fig06-14.jpg)\n\n`Figure 6-14.` Employee Listing\
    \ report with hyperlink actions\n\nAdditionally, when using dates, the default\
    \ format includes the date and time values, even if there is no time associated\
    \ with the date. The hire date might look like this, for example: `10/20/2003\
    \ 12:00:00 AM`. By right clicking and selecting the Textbox Properties of the\
    \ `Hire Date` cell, you can change the format from the default to a more standard\
    \ format. Change the format under the Number tab to `MM/DD/YYYY` format, such\
    \ as `10/20/2011`, excluding any time value. The format code for this date is\
    \ `d` or you can enter `MM/dd/yyyy`.\n\nNext, because you are returning detail\
    \ records, with more than one per employee, you need to group the detail row itself\
    \ using the value of the Employee Name field. You can do this by right-clicking\
    \ the detail row grouping in the Row Groups area and selecting `Group Properties`.\
    \ In the `Group On` expression field, add the same trimmed employee name as shown\
    \ in the previous code line. Now, when you preview the report, you have your list\
    \ of employees to which you can add hyperlink actions.\n\nFinally, force a page\
    \ break after this table so you can add a detailed table that will be used as\
    \ a bookmark link. To add a page break to a report, simply select the tablix,\
    \ then right-click a column to get to the table properties, as shown in `Figure\
    \ 6-15`. On the General tab, select `Add a Page Break After`.\n\n![Image](images/9781430238102_Fig06-15.jpg)\n\
    \n`Figure 6-15.` Tablix Properties\n\n### Adding a Bookmark Link\n\nIn this section,\
    \ you will add a bookmark link to the Employee Name field in the Employee Listing\
    \ report that, when clicked, will jump to a defined location within the report.\
    \ In this case, you will not add another Table data region to the report to contain\
    \ detail information about employee visits. Bookmarks ease the navigation burden\
    \ on large reports when users are looking for specific information. As discussed\
    \ previously, summary and detail information can exist within the same report;\
    \ in the case of adding a bookmark, you are not hiding the data so much as moving\
    \ it to another location within the same report. The net effect for the user is\
    \ the same, however, in that they control when they see the detail information.\n\
    \nTo add a bookmark to the Employee Listing report, first follow the procedure\
    \ to drag a new table element to the Design tab. Next, drag the `patLastName`\
    \ over into the first column of the table. Right click it and choose `Expression`.\
    \ Write an expression similar to the one you did for the Employee Name column\
    \ earlier, but utilize the `patLastName` and `patFirstName` columns. Rename the\
    \ header Patient Name.\n\nNow, for this table, you will want to group by the employee\
    \ name, so right-click your detail row and select `Add Group` and then select\
    \ `Parent Group`. You will use the same trimmed expression as the group value\
    \ expression, as follows:\n\n```vb\n=RTRIM(Fields!LastName.Value) & \", \" & RTRIM(Fields!FirstName.Value)\n\
    ```\n\nChange the name of the group to `Employee_Name`. Then, on the Page Break\
    \ tab, select the option to enable a break `Between each instance of a group`.\
    \ This will force the detail line for each employee to start on a new page. Next,\
    \ add the date field that represents when the service was performed, `=Fields!ChargeServiceStartDate.Value`,\
    \ to the third column, and format the date as you did earlier using the `MM/dd/yyyy`\
    \ style.\n\nNow when you preview the report, the summary employee listing will\
    \ appear on the first page, and the detail records that show the employee visits\
    \ will appear on each subsequent page.\n\nNext, you will add a `Bookmark` property\
    \ value to the `Employee_Name` field in the detail row of the second table. In\
    \ SSRS 2012, you will need to add the Bookmark to a field using the Properties\
    \ window. With the Properties window visible, click the Employee Name field in\
    \ the details row, shown in `Figure 6-16`. In the Properties window, enter your\
    \ trimmed employee name expression into the bookmark value box. This will serve\
    \ as the pointer record for the bookmark link you will now create.\n\n![Image](images/9781430238102_Fig06-16.jpg)\n\
    \n`Figure 6-16.` Setting a Bookmark Property Value\n\nTo create the bookmark link:\
    \ In the first table, right-click the Employee Name detail row and select `Textbox\
    \ Properties` and then click the `Action` tab. In the Change Hyperlink Options\
    \ section of the tab, select `Go to Bookmark` and paste in the trimmed employee\
    \ name expression you used for the `Bookmark` property.\n\n![Image](images/square.jpg)\
    \ **Tip** Hyperlink actions do not automatically change the formatting of the\
    \ field to indicate an associated hyperlink. You can manually change the color\
    \ and add underline formatting so that the user knows to click the link.\n\nWhen\
    \ you preview the report, and click the new bookmark link, you see the detailed\
    \ information for the selected employee, as shown in `Figure 6-17`. You should\
    \ see detailed information for employee Bailey McDonald; the first three pages\
    \ of the report are the Employee Listing table, where you clicked the bookmark\
    \ link in the `Employee_Name` field.\n\n![Image](images/9781430238102_Fig06-17.jpg)\n\
    \n`Figure 6-17.` Employee visit detail report called from a bookmark link"
