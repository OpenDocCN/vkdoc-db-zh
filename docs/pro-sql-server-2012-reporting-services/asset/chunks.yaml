- fmt: "To begin the test, open a browser and log in with the user `jyoungblood`.\
    \ Once the browser is open, paste the link in the address bar to the `Registered\
    \ Nurse` folder you created previously, as shown here:\n\n`http://YourServerName/Reports/Pages/Folder.aspx?ItemPath=%2fClinical+Reports%2fRegistered+Nurse&ViewMode=Detail`\n\
    \nYou have to paste the link into the browser because the permissions for `jyoungblood`\
    \ currently do not allow navigation to the report directly through Report Manager.\
    \ As you can see in [Figure 11-15](#Chapter11.html#fig_11_15), when you view this\
    \ link, you receive an error message indicating that the user does not have permissions\
    \ to view the resources in the folder.\n\n![Image](images/9781430238102_Fig11-15.jpg)\n\
    \n**Figure 11-15.** `Error message for insufficient permissions`\n\nRunning Report\
    \ Manager as an administrator again, you are now going to set the permissions\
    \ for `jyoungblood`. You can control security settings on the `Property` tab for\
    \ each folder as well as on individual report items. In this case, you will set\
    \ permissions at the folder level for the `Registered Nurse` folder. Navigate\
    \ to the `Registered Nurse` folder while using a browser running from an `SSRS\
    \ Administrator` account, click the `Folder Settings` button in the folder menu\
    \ bar, and then select the `Security` option on the left. As you can see in [Figure\
    \ 11-16](#Chapter11.html#fig_11_16), the default security group is `BUILTIN\\\
    administrators`, which is assigned to the `Content Manager` role.\n\n![Image](images/9781430238102_Fig11-16.jpg)\n\
    \n**Figure 11-16.** `Registered Nurse folder’s default permissions`\n\nTo set\
    \ permissions for the `RN` group, click `Edit Item Security` to break the security\
    \ inheritance from the parent folder. Go ahead and click `OK` on the warning screen\
    \ that you are breaking the security inheritance. Now you can click `New Role\
    \ Assignment` and add the `RN` security group as the group name on the `New Role\
    \ Assignment` form. For the role assignment, choose `Browser`, which will allow\
    \ the users assigned to the `RN` group to view the `Registered Nurse` folder and\
    \ all its child nodes, to view reports and resources, and to configure their own\
    \ subscriptions. You can see this in the security list now in [Figure 11-17](#Chapter11.html#fig_11_17).\n\
    \n![Image](images/9781430238102_Fig11-17.jpg)\n\n**Figure 11-17.** `New security\
    \ list for the Register Nurse folder`\n\nNow when you access the `Registered Nurse`\
    \ folder logged in as `jyoungblood`, all you see are the reports that have been\
    \ deployed to that folder, not the data source. In addition, all the properties\
    \ for the objects you can view have limited accessibility and content. If you\
    \ click the menu for that report item and select `Manage`, for example, you will\
    \ see only the general properties information, such as the `Creation Date` and\
    \ `Modified Date` of the `Daily Schedule` report. In contrast, an administrator\
    \ viewing the same properties page would be able to see and modify other report\
    \ property settings such as `Parameters`, `Data Sources`, `Execution`, `History`,\
    \ and `Security`, as shown in [Figure 11-18](#Chapter11.html#fig_11_18).\n\nThere\
    \ are two `SSRS` roles that you should be familiar with. We have just mentioned\
    \ one, `System Administrator`, and the other available `SSRS` role is `System\
    \ User`. These are site-wide roles that allow users to perform certain tasks within\
    \ the `SSRS` installation. These are not different from the folder/item level\
    \ security we have discussed previously, in that these roles grant privileges\
    \ to the entire `SSRS` system. You can assign these roles to users under the `Site\
    \ Settings` section of Report Manager. The following is a list of what each role\
    \ allows the user/group to do when assigned the role:\n\n*   `System User`\n \
    \   *   View system properties\n    *   View shared schedules\n    *   Allow use\
    \ of `Report Builder` or other clients that execute `RDL`\n*   `System Administrator`\n\
    \    *   View/Modify system role assignments\n    *   View/Modify system role\
    \ definitions\n    *   View/Modify system properties\n    *   View/Modify shared\
    \ schedules\n    *   All other access granted to `System User` role\n\n![Image](images/9781430238102_Fig11-18.jpg)\n\
    \n**Figure 11-18.** `Report properties available for an administrator`\n\nTo complete\
    \ the test, you will simply execute the `Daily Schedule` report as `jyoungblood`.\
    \ You have granted permission for the `RN` `Windows` security group to inherit\
    \ the `SSRS Browser` role, so you should not have a problem executing the report.\
    \ The report executes successfully. However, [Figure 11-19](#Chapter11.html#fig_11_19)\
    \ shows one glaring issue—even though `jyoungblood` has executed this report,\
    \ she is seeing other employees’ scheduled visits. Although she would be able\
    \ to enter an `EmployeeID` parameter value that would limit the data on the report\
    \ to only her data, she would still be able to see other employees’ schedules\
    \ by entering their `ID`s, assuming she knew what they were. Although this might\
    \ be an acceptable practice for many companies, in the next section we will show\
    \ how to go a step further to ensure that she will be able to view her schedule\
    \ only.\n\n![Image](images/9781430238102_Fig11-19.jpg)\n\n**Figure 11-19.** `Test\
    \ account viewing other employee’s data`\n\n`Tip` When building a testing environment,\
    \ a number of available resources can simplify the process. Virtualization is\
    \ common in most every environment today. `Microsoft’s Hyper-V` or other desktop\
    \ virtualization tools are advantageous tools for testing, as they allow you to\
    \ run multiple operating systems simultaneously on a single machine."
