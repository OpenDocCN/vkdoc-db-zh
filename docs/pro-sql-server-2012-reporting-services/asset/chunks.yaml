    ![Image](images/9781430238102_Fig13-10.jpg)


    ***Figure 13-10.** Data source view with one object*


    The next step in the process is to add a logical primary key to the Patient Census
    named query because the report modeler requires a primary key when it generates
    the model. Because the query is driven from the Admissions table, which contains
    the PatProgramID field that you know will contain unique values, you can use this
    field as the logical primary key for the Patient Census query. The PatProgramID
    field, in the example database, controls the admission and discharge records for
    a patient over time. It is typical that the same patient will be admitted to two
    separate service lines, referred to as *programs*; hence, you have PatProgramID.
    Without the PatProgramID field, the records would not be unique with the patient’s
    identification number, PatID, alone.


    To set the logical primary key for the Patient Census object to be PatProgramID,
    simply right-click the PatProgramID field either in the Tables list or in the
    Patient Census diagram, and select Set Logical Primary Key, as shown in [Figure
    13-11](#Chapter13.html#fig_13_11). When you do this, you will see an icon that
    looks like a key appear next to the PatProgramID field.


    ![Image](images/9781430238102_Fig13-11.jpg)


    ***Figure 13-11.** Setting the logical primary key*


    At this point, you can save the data source view and then create the report model.
    Before you do, however, let’s take a look at a really great feature in the design
    environment, which is the ability to explore the data. Right-click anywhere in
    the Patient Census object—on EmployeeID, for example—and select Explore Data.
    As you can see, many records are returned from the entire Patient Census object,
    which you will use for the report you create later. However, also notice the three
    additional tabs beside Table, as shown in [Figure 13-12](#Chapter13.html#fig_13_12).
    The Pivot Table, Chart, and Pivot Chart tabs suddenly appear, like finding a really
    valuable trumpet shell unexpectedly on the beach. (Not that this will help you
    greatly when developing the report model, but we just thought it was worth showing.)


    Now that you have determined that the Patient Census data source view is returning
    data as you expected, you will save it and move on to the real heart of Report
    Builder 1.0, the report model.


    ![Image](images/9781430238102_Fig13-12.jpg)


    ***Figure 13-12.** Additional tabs when exploring data*


    #### Creating a Report Model


    The report model will add a layer of separation between report designers and the
    underlying data source, simplifying the process of designing reports by allowing
    them to focus on report design and not query design. Now that you have the data
    source view, which is a requirement for building a report model, you will learn
    how to create the model. The process is straightforward, thanks to auto-generation
    methods that analyze the data source view in two passes and produce the end result—a
    publishable report model in which the constituent elements would have otherwise
    taken much time and effort to produce, as you will see. The goal in this section
    is to walk you through the wizard so you can pay attention to the generation methods
    and finally deploy your completed model to the SSRS server.


    You will again utilize the right-click procedure to initiate the Report Model
    Wizard from the Report Models folder in the Solution Explorer. After navigating
    past the first welcome page to the Select Data Source View page, you are presented
    with the Pro SSRS 2008R2 data source view selection, as shown in [Figure 13-13](#Chapter13.html#fig_13_13).


    ![Image](images/9781430238102_Fig13-13.jpg)


    ***Figure 13-13.** Selecting a data source view*


    After selecting Pro SSRS, click Next, where you can now select the report model
    generation rules. You will see a set of rules that will be performed on the data
    source view. Several rules exist, and most of them are selected by default. Many
    of the rules are self-explanatory; however, two are not selected, by default:
    Create Entities for Nonempty Tables and Create Attributes for Nonempty Columns.
    These two rules instruct the generation process to create entities and attributes
    only for tables that contain data. Entities are the report model’s table equivalent,
    and attributes are conceptually the fields or columns defined within the entities.


    The following are all the rules for the first pass of generating the model and
    are selectable in the Report Model Wizard:


    > *   Create Entities for All Tables

    > *   Create Entities for Non-empty Tables

    > *   Create Count Aggregates

    > *   Create Attributes

    > *   Create Attributes for Non-empty Columns

    > *   Create Attributes for Auto-increment Columns

    > *   Create Date Variations

    > *   Create Numeric Aggregates

    > *   Create Date Aggregates

    > *   Create Time Aggregates

    > *   Create Roles


    This pass processes all rules up to Create Roles. You will also see a helpful
    description for each rule, as shown in [Figure 13-14](#Chapter13.html#fig_13_14).


    ![Image](images/9781430238102_Fig13-14.jpg)


    ***Figure 13-14.** Model generation rules with descriptions*


    For this example, leave the default selections, as these will give you features
    such as automatic aggregations for any numbers and dates and also create date
    variations so that for every Date Time data type in the data source view, you
    will have Day, Month, and Year created. You can click Next and choose to update
    statistics before generating, as shown in [Figure 13-15](#Chapter13.html#fig_13_15).
    This is important if any data have changed significantly in the source tables.


    ![Image](images/9781430238102_Fig13-15.jpg)


    ***Figure 13-15.** Update Statistics page*'
  trans: '最后，将查询命名为`患者普查`。当你点击`确定`完成命名查询时，你的简单数据源视图就由一个对象组成，即`患者普查`，它包含了模型所需的字段。你可以在图
    13-10 中看到，共有 32 个字段将提供给模型。


    ![Image](img/9781430238102_Fig13-10.jpg)


    *图 13-10. 包含一个对象的数据源视图*


    流程中的下一步是为`患者普查`命名查询添加一个逻辑主键，因为报表建模器在生成模型时需要一个主键。由于该查询是从`入院`表驱动的，该表包含你知道将具有唯一值的`PatProgramID`字段，因此你可以使用此字段作为`患者普查`查询的逻辑主键。在示例数据库中，`PatProgramID`字段控制着患者随时间推移的入院和出院记录。通常，同一个患者可能会被收入两条不同的服务线，即所谓的`程序`；因此，你有了`PatProgramID`。如果没有`PatProgramID`字段，仅凭患者的识别号码`PatID`，记录将不是唯一的。


    要将`患者普查`对象的逻辑主键设置为`PatProgramID`，只需在`表`列表或`患者普查`图中右键单击`PatProgramID`字段，然后选择`设置逻辑主键`，如图
    13-11 所示。执行此操作后，你会看到一个类似钥匙的图标出现在`PatProgramID`字段旁边。


    ![Image](img/9781430238102_Fig13-11.jpg)


    *图 13-11. 设置逻辑主键*


    此时，你可以保存数据源视图，然后创建报表模型。但在这样做之前，让我们先看一下设计环境中一个非常棒的功能：探索数据的能力。在`患者普查`对象中的任意位置——例如在`EmployeeID`上——右键单击并选择`探索数据`。如你所见，从整个`患者普查`对象返回了许多记录，你将在稍后创建的报表中使用这些数据。然而，也请注意`表`旁边的三个额外选项卡，如图
    13-12 所示。`数据透视表`、`图表`和`数据透视图`选项卡突然出现，就像在海滩上意外发现一个非常珍贵的海螺贝壳一样。（虽然这对开发报表模型可能没有太大帮助，但我们觉得值得展示一下。）


    既然你已经确定`患者普查`数据源视图按预期返回了数据，你将保存它并转向`Report Builder 1.0`的真正核心——报表模型。


    ![Image](img/9781430238102_Fig13-12.jpg)


    *图 13-12. 探索数据时出现的额外选项卡*


    ## 创建报表模型


    报表模型将在报表设计者与底层数据源之间增加一个分离层，通过允许他们专注于报表设计而非查询设计来简化报表设计过程。现在你已经有了构建报表模型所需的数据源视图，你将学习如何创建模型。这个过程是直截了当的，这要归功于自动分析数据源视图的自动生成方法，它经过两遍分析并产生最终结果——一个可发布的报表模型，其构成元素原本需要花费大量时间和精力来制作，你将会看到。本节的目标是引导你完成向导，这样你就可以关注生成方法，并最终将你完成的模型部署到`SSRS`服务器。


    你将再次使用右键单击过程，从`解决方案资源管理器`中的`报表模型`文件夹启动`报表模型向导`。在导航通过第一个欢迎页面到达`选择数据源视图`页面后，你会看到`Pro
    SSRS 2008R2`数据源视图的选择，如图 13-13 所示。


    ![Image](img/9781430238102_Fig13-13.jpg)


    *图 13-13. 选择数据源视图*


    选择`Pro SSRS`后，单击`下一步`，你现在可以选择报表模型生成规则。你将看到一组将在数据源视图上执行的规则。存在多条规则，大多数默认是选中的。许多规则是自解释的；然而，有两条默认未选中：`为非空表创建实体`和`为非空列创建属性`。这两条规则指示生成过程仅为包含数据的表创建实体和属性。实体是报表模型中表的等价物，属性在概念上是实体内定义的字段或列。


    以下是生成模型第一遍的所有规则，在`报表模型向导`中可选：


    *   为所有表创建实体

    *   为非空表创建实体

    *   创建计数聚合

    *   创建属性

    *   为非空列创建属性

    *   为自动递增列创建属性

    *   创建日期变体

    *   创建数值聚合

    *   创建日期聚合

    *   创建时间聚合

    *   创建角色


    这一遍处理从`创建角色`之前的所有规则。你还会看到每条规则的有用描述，如图 13-14 所示。


    ![Image](img/9781430238102_Fig13-14.jpg)


    *图 13-14. 带有描述的模型生成规则*


    对于此示例，请保留默认选择，因为这些选择将为你提供诸如为任何数字和日期自动聚合等功能，并创建日期变体，这样对于数据源视图中的每个`日期时间`数据类型，你都将创建`日`、`月`和`年`。你可以单击`下一步`，选择在生成前更新统计信息，如图
    13-15 所示。如果源表中的任何数据发生了显著变化，这一点很重要。


    ![Image](img/9781430238102_Fig13-15.jpg)


    *图 13-15. 更新统计信息页面*'
- fmt: '# On the next page in the wizard


    On the next page in the wizard, name your model `Patient Census` and select `Run`
    to begin the rules to generate the model. [Figure 13-16](#Chapter13.html#fig_13_16)
    shows the output after clicking `Run`, and the process has completed successfully.
    You can see the details at each rule level of exactly what the rule did based
    on the data in the data source view. Notice that for `Create Date Variations`,
    for example, the rule discovered and created dates for `DiagOnset`, which is the
    date on which the patient was diagnosed with a disease. Other attributes that
    were created were `Sum`, `Avg`, `Min`, and `Max` for the `Length of Stay` column.
    The length of stay, usually an average, is the amount of time between the patient
    being admitted and being discharged from a long-term health-care facility. The
    `DateDiff` function calculates the length of stay.


    ![Image](images/9781430238102_Fig13-16.jpg)


    **Figure 13-16.** Rules completed successfully


    After you click `Finish` in the `Report Model Wizard`, you can see that the `Patient
    Census` model has been created with the expected attributes. At this point, you
    can deploy the model directly to the report server by right-clicking the model
    in the `Solution Explorer` and selecting `Deploy`. You can control where the model
    will be deployed in the project’s properties pages, as shown in [Figure 13-17](#Chapter13.html#fig_13_17),
    by clicking `Project Properties` under the `Project` on the toolbar. In this case,
    the project will be deployed to the `Models` folder on the report server, which
    has a target server URL of `http://localhost/ReportServer`. The data sources for
    the model will be published in the `Data Sources` folder.


    ![Image](images/9781430238102_Fig13-17.jpg)


    **Figure 13-17.** Project properties for the report model


    ![Image](images/square.jpg) **Note** We should mention that report models are
    created with Semantic Model Definition Language (`SDML`), which is an XML-style
    grammar similar to `RDL`. Where `RDL` defines reports and report properties, `SMDL`
    defines model objects, such as the entities and attributes that you are creating
    here.


    After you deploy the model, you can see in `Report Manager` the two folders that
    were created, `Data Sources` and `Models`. The `Data Sources` folder contains
    the `Pro_SSRS_2008R2` data source, and the `Models` folder houses the `Patient
    Census` report model. [Figure 13-18](#Chapter13.html#fig_13_18) shows the properties
    of the `Patient Census` report model. Just as with a standard data source, it
    is possible to view which reports have been created using the model.


    ![Image](images/9781430238102_Fig13-18.jpg)


    **Figure 13-18.** Patient Census report model properties


    Before you begin creating reports with `Report Builder 1.0`, it is important to
    note that users who will need permissions to use `Report Builder 1.0` must have
    item-level role assignments for various tasks associated with creating reports
    with `Report Builder 1.0`. `Reporting Services` includes a `Report Builder 1.0`
    role for this purpose, as shown in [Figure 13-19](#Chapter13.html#fig_13_19).
    Users assigned to the `Report Builder 1.0` role have all the required permissions
    to access the report models, folders, and published reports. To publish reports,
    however, they will need to have the ability to manage report content before they
    can successfully publish their reports to the report server. The `Content Manager`
    role has all the required permissions for full report creation and publishing
    capabilities.


    ![Image](images/9781430238102_Fig13-19.jpg)


    **Figure 13-19.** SSRS Report Builder role


    ![Image](images/square.jpg) **Note** To manage roles in `SQL Server Reporting
    Services 2008 R2`, we have to connect to the `Reporting Services` instance by
    running `SQL Server Management Studio` as an administrator. For more details on
    connecting to the `Reporting Services` instance and roles, please see the “Introducing
    SSRS Roles” section in [Chapter 11](#Chapter11.html).


    ## Creating Reports with Report Builder 1.0


    To this point you have created all the requisite pieces for using `Report Builder
    1.0`—you have created the report model `Patient Census` and deployed it to the
    report server. It is now waiting to be used as a source for the front-end `Report
    Builder 1.0` application. `Report Builder 1.0` provides some of the same functionality
    of a report development environment, such as `BIDS` or `Visual Studio`, including
    the ability to drag and drop data elements to the design area with `Matrix`, `Table`,
    and `Chart` data regions as well as the ability to deploy finished reports to
    the report server. However, before you dive in, we should state that `Report Builder
    1.0` serves the purpose of allowing end users to design their own reports. It
    was designed to be intuitive and friendly, and because it is not a full-featured
    `IDE`, it may at first seem limited.


    In this section, you will explore `Report Builder 1.0` and uncover the features
    that are available to the report designer such as adding functions, similar to
    adding expressions in `BIDS`, and providing filtering, grouping, and sorting capabilities.
    The goal in this section is to show you how to create and deploy, step by step,
    the requested census reports from the `Patient Census` model created earlier in
    this chapter.


    When `Reporting Services` is installed for `SQL Server 2008 R2`, the default `Report
    Builder` application is `3.0`. If you are following along or you want to create
    reports using `Report Builder 1.0`, you will either need to navigate directly
    to the `Report Builder` URL or change the default `Custom Report Builder` launch
    `URL` in the `Site Settings` section of the `Report Manager`. You can find the
    report builder application under the `Program Files\Microsoft SQL Server\MSRS10_50.MSSQLSERVER\Reporting
    Services\ReportServer\ReportBuilder` folder. To follow along, we are going to
    set the launch `URL` in the `Report Manager` to use `Report Builder 1.0`. To do
    this, open up `Report Manager` by navigating to `http://ServerName/Reports`. Once
    `Report Manager` is open, click on the `Site Settings` link in the top right corner.
    Set the launch `URL` to:

    `http://localhost/ReportServer/ReportBuilder/ReportBuilder.application`


    After you change the default `Report Builder` `URL`, now let’s use it. Click `Apply`
    to save your changes and navigate to the `Report Manager` home page. Once on the
    home page, you should see the `Report Builder` icon on the main toolbar of the
    `Report Manager` as shown in [Figure 13-20](#Chapter13.html#fig_13_20). Click
    the `Report Builder` button to initialize the `Report Builder 1.0` installation
    if it is not already installed or to open the installed application.


    ![Image](images/9781430238102_Fig13-20.jpg)


    **Figure 13-20.** Report Manager main toolbar with Report Builder button


    ![Image](images/square.jpg) **Note** As we stated previously, it is also possible
    to launch `Report Builder 1.0` directly from the `ReportServer` `URL` such as
    `https://mySSRSserver/ReportServer/ReportBuilder/ReportBuilder.application`.


    `Report Builder 1.0` uses `ClickOnce` technology to install itself from the Web
    site. The code is downloaded and installed to the local machine from the browser,
    assuming there are no issues with missing prerequisites, one of which is `.NET
    Framework 2.0`. If this is not installed, it will issue a warning message that
    `Report Builder 1.0` requires `.NET Framework 2.0` before it can be installed.
    If all the requirements are met, `Report Builder 1.0` initiates and completes
    installation. [Figure 13-21](#Chapter13.html#fig_13_21) shows the `ClickOnce`
    application installation screen.


    ![Image](images/9781430238102_Fig13-21.jpg)


    **Figure 13-21.** Report Builder 1.0 installation progress'
