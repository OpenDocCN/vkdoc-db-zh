- fmt: "Now that you have the Web service ready to reference, you can populate the\
    \ drop-down list with report items from the `Chapter_9` directory of your SSRS\
    \ instance. You should already have at least one report in that folder from the\
    \ setup of this chapter.\n\nYou will use the Web service you have just registered\
    \ to retrieve all of the report items from the `Chapter_9` directory. The Web\
    \ service method you will use to do this is `ListChildren`. This function takes\
    \ two parameters: the path from where to gather the list from and a Boolean value\
    \ to determine whether the search should be recursive. Since you want to get the\
    \ reports from the `Chapter_9` folder and nothing else, you want to pass only\
    \ that path and a `false` value to get only the reports in this one directory.\n\
    \nYou want to populate the drop-down list with only report items. However, `ListChildren`\
    \ will return all the items in this folder, not just the reports. You will use\
    \ the `TypeName` property to determine the type of the returned object and only\
    \ list reports. Once you have tested whether the item is a report or not, you\
    \ will populate the drop-down list with the names of the reports. The code to\
    \ perform all of this exists in the `Page_load` method of the page, so that you\
    \ start with a full drop-down list as soon as the page is done loading. [Listing\
    \ 9-15](#Chapter09.html#list_9_15) shows the code used to populate the drop-down\
    \ list from the Web service.\n\n### Listing 9-15. Using the SSRS Web Service to\
    \ Populate the Report List\n\n```csharp\nSSRS_WebService.ReportingService2010\
    \ rs = null;\n\nprotected void Page_Load(object sender, EventArgs e)\n{\n    try\n\
    \    {\n        rs = new SSRS_WebService.ReportingService2010();\n        rs.Credentials\
    \ = System.Net.CredentialCache.DefaultCredentials;\n\n        SSRS_WebService.CatalogItem[]\
    \ listItems = rs.ListChildren(\"/Pro_SSRS/Chapter_9\", false);\n        foreach\
    \ (SSRS_WebService.CatalogItem thisItem in listItems)\n        {\n           \
    \ if (thisItem.TypeName == \"Report\")\n            {\n                reportList.Items.Add(thisItem.Name);\n\
    \            }\n        }\n    }\n    catch (Exception ex)\n    {\n        Response.Write(ex.Message);\n\
    \    }\n}\n```\n\nNow that you have the form built and the drop down list populated\
    \ with data from the SSRS Web service, you can finalize the application by allowing\
    \ the user to render the reports from the list. You will now go back to the generated\
    \ code for the Click event of the button you added to the Web page. In this section,\
    \ you will set the processing mode, the report server URL, and the path to the\
    \ report you want to render. Finally, the code will render the report and it will\
    \ be displayed in the Report Viewer control. [Listing 9-16](#Chapter09.html#list_9_16)\
    \ shows the populated on click event in the code view of the web page.\n\n###\
    \ Listing 9-16. Populating the RenderReport Button Click Method\n\n```csharp\n\
    protected void renderReport_Click(object sender, EventArgs e)\n{\n    reportViewerWeb.ProcessingMode\
    \ = Microsoft.Reporting.WebForms.ProcessingMode.Remote;\n    reportViewerWeb.ServerReport.ReportServerUrl\
    \ = new Uri(@\"http://localhost/reportserver/\");\n    reportViewerWeb.ServerReport.ReportPath\
    \ = \"/Pro_SSRS/Chapter_9/\" + reportList.SelectedItem.Value;\n    reportViewerWeb.ServerReport.Refresh();\n\
    }\n```\n\nTo test the application, right click the project in the solution explorer\
    \ and select `Debug -> Start New Instance`. Visual Studio will start a stand-alone\
    \ Web server on a random port and launch the project for debugging. Choose the\
    \ report that you put in the directory and click the `Render` button. If everything\
    \ is set up correctly, after you select some parameters on the report, you should\
    \ get an Internet Explorer window that resembles [Figure 9-12](#Chapter09.html#fig_9_12).\n\
    \n![Image](images/9781430238102_Fig09-12.jpg)\n\n### Figure 9-12. Finalized Web\
    \ report application\n\n## Summary\n\nIn this chapter, we showed how to use the\
    \ URL access capabilities of SSRS 2012 and the Report Viewer controls to embed\
    \ reports quickly into applications. Beyond the WebBrowser and Report Viewer controls\
    \ used in this chapter, you can use other applications to render reports. For\
    \ example, you can integrate SSRS 2012 with Microsoft SharePoint Server. We’ll\
    \ discuss using this integration in greater detail in [Chapter 12](#Chapter12.html#ch12).\
    \ By combining SharePoint and SSRS, you can quickly build a portal that displays\
    \ your reports without much code at all.\n\nIn this chapter, you also learned\
    \ how to make Report Server Web service calls to augment your Windows Forms viewer\
    \ application. The application you created allows you to type the URL of a server-based\
    \ report you want to view. It then uses SSRS 2012’s `GetItemParameters` method\
    \ to retrieve a list of report parameters and the `ValidValues` property to retrieve\
    \ possible values. It then reads the values selected by the user and populates\
    \ an array of `ReportParameters` which is then used by the Report Viewer control\
    \ to render your report with the selected parameters already in place. In [Chapter\
    \ 10](#Chapter10.html#ch10), we’ll expand on this example by using the Report\
    \ Server Web service to allow the user to set the report to run on a schedule\
    \ with the supplied parameters instead of rendering it immediately.\n\n# C H A\
    \ P T E R 10\n\n## Managing Reports\n\nIn many reporting solutions prior to SSRS,\
    \ report management required little more than delivering the completed report\
    \ file to the end user via a file share or embedded in a third-party application.\
    \ SSRS is a full reporting environment with features such as scheduled report\
    \ execution, report subscription services, snapshots, content caching, and on-demand\
    \ Web access.\n\nWith these added benefits comes an additional level of management\
    \ responsibility. Depending on the size of the organization, some management tasks\
    \ can be delegated to other users, such as departmental managers, who might maintain\
    \ report folders for their departments, as well as to system administrators and\
    \ DBAs. Fortunately, SSRS provides several means of managing the report server\
    \ at all levels. In this chapter, you’ll continue to work with built-in tools\
    \ such as Report Manager and command-line utilities, as well as with custom .NET\
    \ management tools that take advantage of the SSRS programming models to administer\
    \ an SSRS deployment. We’ll also demonstrate SSRS’s Reporting Services Configuration\
    \ Manager. When connecting to an SSRS instance, it supplies much, if not all,\
    \ of the functionality that is available in the Site Settings section of Report\
    \ Manager and the command-line utilities. Using SSRS 2000 and 2005 once allowed\
    \ some administrative tasks, like configuring report subscriptions, to be done\
    \ with SSMS. However, since the 2008 release, this functionality was removed and\
    \ is now only available using the Report Manager. Therefore, we have chosen to\
    \ use Report Manager for most of the examples in this chapter. Report Manager\
    \ can be accessed from a Web browser and does not require a local install of the\
    \ SQL client tools."
