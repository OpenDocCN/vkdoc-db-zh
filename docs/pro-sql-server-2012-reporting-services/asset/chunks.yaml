  trans: '

    ### 添加小计


    在每个分组级别设置小计，能使报表对用户而言更易于阅读。如果报表具备交互式向下钻取功能（正如您的报表将会拥有的那样），这一点就尤为重要。


    为分组添加小计就像复制粘贴或输入字段值表达式一样简单——在本例中，即`=Sum(Fields!Visit_Count.Value)`和`=Sum(Fields!Estimated_Cost.Value)`——将它们添加到报表中上级分组的单元格中。对于此报表，您已在明细行中为`Employee_Name`字段定义了一个分组。这使得报表必须计算每位员工的`Estimated_Cost`和`Visit_Count`字段的总和。对于当前这份报表，仅此而已就足够了，但对于您将要创建的许多其他报表，您可能需要包含明细记录以便进行更精细的分析。


    为了准备为报表添加交互功能，您需要通过复制“员工姓名”分组级别中的“员工成本”和“访问计数”文本框，并将它们粘贴到每个分组标题行的单元格中（在本例中，即“诊断”、“服务类型”和“患者姓名”的标题行），从而对所有分组级别的`Estimated_Cost`和`Visit_Count`字段进行求和。或者，您也可以如前所述，选择输入`Sum`值表达式，或在“汇总依据”子菜单下选择`Sum`。如果您选择这些方法之一而不是复制粘贴，您需要像之前一样应用货币格式(`C0`)。您还可以通过按住
    Control 键并单击以高亮显示“诊断”分组中的每个“预估成本”和“访问计数值”，然后点击工具栏上的“加粗”按钮，将最顶层的分组（`Diagnosis`字段）设为粗体。应用粗体格式后，分组级别的汇总值将易于与明细行的值区分开来。报表的设计应如图图
    6-8 所示。


    ![Image](img/9781430238102_Fig06-08.jpg)


    图 6-8. 包含分组级别小计的报表设计


    通过选择“预览”选项卡可以看到报表的输出，现在每个分组都包含了更有价值的信息。例如，对于“步态异常”疾病，您现在可以看到共有 194 项服务，预估总成本为
    $9,700，并且粗体格式有助于在视觉上区分这些数值。患者 Russel Hansen（其姓名因您对患者分组应用的填充而缩进）是一位步态异常患者，并接受了
    68 次家庭健康助理访问中的 16 次。您还可以在包含`Employee_Name`分组的行中，进一步看到每位员工针对该患者的访问次数和成本（参见图 6-9）。


    ![Image](img/9781430238102_Fig06-09.jpg)


    图 6-9. 包含分组级别小计的报表输出


    Pro_SSRS 项目中的 `EmployeeServiceCost_Subtotals.rdl` 报表包含了小计。


    ### 添加交互性


    无论特定报表的受众是谁——无论是对屏幕上汇总数据感兴趣的决策者，还是需要打印报表能力的知识工作者——报表内的交互性都能使导航到特定信息变得更加容易和高效。您可以通过多种方式在
    SSRS 报表中提供交互性。在接下来的部分中，您将使用四种基本类型的交互性：


    > *   文档映射：在报表中提供一个导航窗格，其内容基于某个字段或分组。

    > *   可见性：根据用户输入隐藏和显示报表项，从而为报表添加交互性。

    > *   交互式排序：允许用户交互式地选择报表数据的排序方式。

    > *   超链接操作：允许用户点击链接到同一报表内或报表外部某个位置的报表项。


    SSRS 提供的不同呈现格式（在第 7 章中详细介绍）适应了查看和打印报表的需求，以满足不同类型工作者的需要。然而，这也带来了一个限制，即一种呈现格式的某些功能在其他格式中不可用。这一点在处理交互性时最为明显，正如您将在“交互式排序”部分中看到的那样。


    #### 文档映射


    在 SSRS 报表中创建文档映射，将在报表呈现时为用户展示一个集成的导航窗格。用户可以选择导航窗格中的某个项目，这将导致报表跳转到该项目所在的位置。例如，在示例报表中，用户可能有兴趣查看关于阿尔茨海默病患者的信息。您可以为报表中的“诊断”分组创建一个文档映射，这样当用户从导航窗格中选择“阿尔茨海默病”时，报表将自动跳转到该部分；换句话说，用户无需手动翻查报表来查找所需信息。您还可以在多个级别添加文档映射，在导航窗格中创建分层选择。沿用该示例，除了“诊断”分组外，您还可以为`Service_Type`分组添加文档映射；这样用户就可以在导航窗格中展开“阿尔茨海默病”，查看针对该诊断执行的所有服务类型——例如家庭健康助理服务。


    您可以通过向单个报表项或分组可用的“文档映射标签”属性添加表达式来创建文档映射。首先，打开 Pro_SSRS 项目中的 `EmployeeServiceCost_DocumentMap_Start.rdl`
    报表。按照以下步骤，您将为`Service_Type`和诊断分组添加文档映射标签：


    1.  在“设计”选项卡上，右键单击“行组”窗格中的`Service_Type`分组，选择“分组属性”。然后点击“高级”选项卡。

    2.  在“分组属性”的“高级”选项卡中，从“文档映射”下拉列表中选择`Service_Type`。

    3.  对诊断分组（即`Service_Type`上方的第一级分组）完成步骤 1 和 2。为“文档映射标签”选项选择“诊断”。


    现在，当您预览报表时，导航窗格将自动显示在报表的左侧。默认的 HTML 预览会使用支持文档映射的呈现格式之一（如 PDF）进行显示（参见图 6-10）。


    ![Image](img/9781430238102_Fig06-10.jpg)


    图 6-10. 包含文档映射导航窗格的报表


    Pro_SSRS 项目中的 `EmployeeServiceCost_DocumentMap.rdl` 报表包含一个文档映射。


    ![Image](img/square.jpg) **注意** 当报表以 PDF 格式呈现时，Adobe Acrobat 将文档映射视为书签。而 SSRS
    中的书签功能则完全不同。它们嵌入在报表中，并且报表项被分配了书签链接。

    '
- fmt: '#### Visibility


    SSRS 的另一个特性是能够根据用户输入、数据集返回的结果或一些预定义的逻辑，来显示或隐藏已渲染报表的区域。用户通常希望在报表首次呈现时只看到摘要信息，但又能在必要时深入查看摘要数据的细节。报表设计者可能会制作两份报表——摘要报表和明细报表——但这需要分别进行更新和维护。这些报表通常基于相同的查询。幸运的是，SSRS
    的显示或隐藏报表数据的功能消除了创建单独报表的需要。报表项的可见性属性控制着哪些报表项被显示或隐藏。


    假设你已将报表分发给了目标受众，而他们回来了一些关于如何改进报表的“建议”——毕竟，这是现实世界的报表。他们表示希望看到以下内容：


    > *   在报表首次渲染时，显示每个诊断的访问次数和预估费用的汇总总计，并且能够在有依据时深入查看患者和员工的详细信息。

    > *   具有特定诊断的患者数量。

    > *   为这些患者提供过护理的独立员工数量。


    使用 SSRS，这相当直接，你可以快速制作出一份改进的报表。要开始此示例，请在 `Pro_SSRS` 项目中打开 `EmployeeServiceCost_Visibility_Start.rdl`
    报表。然后，在修改可见性属性之前，你只需遵循以下设计步骤：


    1.  在“设计”选项卡上，右键单击标有“Diagnosis > Service > Patient > Employee”的整个列，选择“在组内插入列 -
    右侧”。再执行一次此步骤，这样我们就在组与“Estimated Cost”和“Visit Count”列之间有了两个空列。

    2.  在第二列和第三列中，分别输入 **Employee Count** 和 **Patient Count** 作为新的列标题文本。

    3.  从右向左调整表格中第二列和第三列的大小，使它们各自大约为 1 英寸。如果默认情况下看不到标尺，你可以右键单击设计环境中的空白区域，然后在“视图”菜单下选择“标尺”。

    4.  突出显示“Service Type”、“Patient Name”和“Details”行中的每个单元格。你可以通过按住 `Control` 键并单击表格中第一列左侧的行标记来完成此操作。所有行突出显示后，从格式工具栏中选择
    8 磅的字体大小。


    你可以通过设置可见性属性值来控制报表项的隐藏或显示状态。你可以在报表的任何层级隐藏报表项，并在用户单击 + 或 – 图标时切换其可见性属性值来显示或隐藏它们。隐藏项的切换点可以是另一个报表层级，例如一个组。在此示例中，你希望隐藏除“Diagnosis”和“Service_Type”字段之外的每个层级，但赋予用户显示或隐藏详细信息的能力。首先，隐藏除“Diagnosis”和“Service_Type”之外的所有组。实现此目标的步骤如下：


    1.  在“行组”部分右键单击 `Employee_Name` 组，选择“组属性”。然后单击“可见性”选项卡。

    2.  在“可见性”选项卡上，选择“隐藏”单选按钮。

    3.  启用“可由此报表项切换显示”复选框。

    4.  在“报表项”下拉列表中，选择 `Patient_Name`。

    5.  为“Patient Name”组执行步骤 1 到 4，选择或输入 **Service_Type** 作为切换报表项。


    另外两个请求是要能够查看每个诊断的患者和员工总数。你可以向报表中添加一个表达式 `CountDistinct`，它将统计每个唯一的患者和员工，并在诊断级别计算数量。用于患者计数的语法如下：


    ```vb

    =CountDistinct(Fields!FieldName.Value)

    ```


    通过为字段 `PatID`（你知道该字段对每个患者是唯一的）以及字段 `EmployeeID` 添加 `CountDistinct` 表达式，就能更容易地一目了然地看到有多少患有特定诊断的患者接受了护理。


    将以下两个用于“Diagnosis”组的表达式放置在“Employee Count”和“Patient Count”标题单元格正下方的单元格中：


    ```vb

    =CountDistinct(Fields!EmployeeID.Value) =CountDistinct(Fields!PatID.Value)

    ```


    虽然报表与非交互式报表仍然相似，但有了深入查看的附加功能，预览时它会看起来大不相同（参见[图 6-11](#Chapter06.html#fig_6_11)）。在[图
    6-11](#Chapter06.html#fig_6_11)的截图中，你会注意到我们隐藏了文档地图以提供更多报表空间。你可以通过双击分隔文档地图和报表主体的栏中央的小箭头来显示或隐藏文档地图。


    ![Image](images/9781430238102_Fig06-11.jpg)


    **图 6-11.** 具有交互式深入查看功能的报表


    `Pro_SSRS` 项目中的 `EmployeeServiceCost_Visibility.rdl` 报表包含了这些可见性属性。'
  raw: '#### Visibility


    Another feature of SSRS is the ability to show or hide areas of the rendered report
    based on user input, results returned in a dataset or based on some predefined
    logic. Often users want to see only summary information on a report, but would
    like to be able to drill into the summary data to see the detail information if
    necessary. Report designers might make two reports, a summary and a detail report,
    which have to be updated and maintained separately. These reports are often based
    on the same query. Fortunately, SSRS’s ability to show or hide report data does
    away with the need to create separate reports. The visibility properties for report
    items control which report items are shown or hidden.


    Let’s assume you have distributed your report to your intended audience, and they
    have come back with “suggestions” for how to improve the report—this is real world
    reporting, after all. They indicate that they would like to see the following:


    > *   Summary totals for the visit count and the estimated cost of each diagnosis
    when the report is first rendered, but with the ability to drill into the details
    of the patients and employees if warranted.

    > *   The number of patients who have a specific diagnosis.

    > *   The number of individual employees who have provided care for these patients.


    With SSRS, this is fairly straightforward, and you can knock out an improved report
    quickly. Start this example by opening up the EmployeeServiceCost_Visibility_Start.rdl
    report in the Pro_SSRS project. Then, you’ll just need to follow these design
    steps before modifying the visibility properties:


    1.  On the Design tab, right-click the entire column labeled Diagnosis > Service
    > Patient > Employee, and select Insert Column Inside Group - Right. Complete
    this step one more time so that we have two empty columns between the groups and
    the Estimated Cost and Visit Count columns.

    2.  Enter **Employee Count** and **Patient Count** as the new column header text
    in the second and third columns, respectively.

    3.  Resize the second and third columns in the table from right to left so that
    they are approximately 1 inch each. If, by default, you do not see the ruler,
    you can right-click a blank area of the design environment and select Ruler under
    the View Menu.

    4.  Highlight every cell in the Service Type, Patient Name, and Details rows.
    You can accomplish this by holding down the Control key and clicking the row marker
    to the left of the first column in the table. Once all the rows are highlighted,
    select an 8-point font size from the formatting toolbar.


    You can control the visibility state of report items, hidden or visible, by setting
    the visibility property values. You can hide report items at any level in the
    report and toggle their visibility property values when a user clicks the + or
    – icon to show or hide them. The toggle point of the hidden items is another report
    level, such as a group. In this example, you would like to hide every level except
    the Diagnosis and Service_Type fields, but give the user the ability to show or
    hide the details. To begin, hide every group except Diagnosis and Service_Type.
    The steps to accomplish this are as follows:


    1.  Right-click the Employee_Name group in the Row Groups section and select Group
    Properties. Then click the Visibility tab.

    2.  On the Visibility tab, select the Hide radio button.

    3.  Enable the checkbox to Display Can Be Toggled by This Report Item.

    4.  In the Report Item drop-down list, select Patient_Name.

    5.  Perform steps 1 through 4 for the Patient Name group, selecting or typing
    **Service_Type** as the toggle report item.


    The other two requests were to be able to see the patient and employee totals
    for each diagnosis. You can add an expression, CountDistinct, to the report that
    will count each unique patient and employee and calculate the amounts at the diagnosis
    level. The syntax used for the patient count is as follows:


    `=CountDistinct(Fields!FieldName.Value)`


    By adding the CountDistinct expression for the field PatID (which you know to
    be unique per patient) as well as for the field EmployeeID, it will be much easier
    to see at a glance how many patients with a specific diagnosis have received care.


    Place the following two expressions for the Diagnosis group in the cells just
    below the Employee Count and Patient Count header cells:


    `=CountDistinct(Fields!EmployeeID.Value) =CountDistinct(Fields!PatID.Value)`


    Though the report is still similar to the non-interactive report, with the drill-down
    additions it will look much different when previewed (see [Figure 6-11](#Chapter06.html#fig_6_11)).
    In the screenshot in [Figure 6-11](#Chapter06.html#fig_6_11), you will notice
    that we hid the document map to provide more space for the report. You can show
    or hide the document map by double clicking the tiny arrow in the center of the
    bar separating the document map and the body of the report.


    ![Image](images/9781430238102_Fig06-11.jpg)


    ***Figure 6-11.** Report with interactive drill-down*


    The EmployeeServiceCost_Visibility.rdl report in the Pro_SSRS project includes
    the visibility properties.'
  trans: '

    #### 可见性


    SSRS 的另一项特性是能够根据用户输入、数据集返回的结果或一些预定义的逻辑，来显示或隐藏已渲染报表的区域。用户通常希望在报表首次呈现时只看到摘要信息，但又能在必要时深入查看摘要数据的细节。报表设计者可能会制作两份报表——摘要报表和明细报表——但这需要分别进行更新和维护。这些报表通常基于相同的查询。幸运的是，SSRS
    的显示或隐藏报表数据的功能消除了创建单独报表的需要。报表项的可见性属性控制着哪些报表项被显示或隐藏。


    假设你已将报表分发给了目标受众，而他们回来了一些关于如何改进报表的“建议”——毕竟，这是现实世界的报表。他们表示希望看到以下内容：


    > *   在报表首次渲染时，显示每个诊断的访问次数和预估费用的汇总总计，并且能够在有依据时深入查看患者和员工的详细信息。

    > *   具有特定诊断的患者数量。

    > *   为这些患者提供过护理的独立员工数量。


    使用 SSRS，这相当直接，你可以快速制作出一份改进的报表。要开始此示例，请在 `Pro_SSRS` 项目中打开 `EmployeeServiceCost_Visibility_Start.rdl`
    报表。然后，在修改可见性属性之前，你只需遵循以下设计步骤：


    1.  在“设计”选项卡上，右键单击标有“Diagnosis > Service > Patient > Employee”的整个列，选择“在组内插入列 -
    右侧”。再执行一次此步骤，这样我们就在组与“Estimated Cost”和“Visit Count”列之间有了两个空列。

    2.  在第二列和第三列中，分别输入 **Employee Count** 和 **Patient Count** 作为新的列标题文本。

    3.  从右向左调整表格中第二列和第三列的大小，使它们各自大约为 1 英寸。如果默认情况下看不到标尺，你可以右键单击设计环境中的空白区域，然后在“视图”菜单下选择“标尺”。

    4.  突出显示“Service Type”、“Patient Name”和“Details”行中的每个单元格。你可以通过按住 `Control` 键并单击表格中第一列左侧的行标记来完成此操作。所有行突出显示后，从格式工具栏中选择
    8 磅的字体大小。


    你可以通过设置可见性属性值来控制报表项的隐藏或显示状态。你可以在报表的任何层级隐藏报表项，并在用户单击 + 或 – 图标时切换其可见性属性值来显示或隐藏它们。隐藏项的切换点可以是另一个报表层级，例如一个组。在此示例中，你希望隐藏除“Diagnosis”和“Service_Type”字段之外的每个层级，但赋予用户显示或隐藏详细信息的能力。首先，隐藏除“Diagnosis”和“Service_Type”之外的所有组。实现此目标的步骤如下：


    1.  在“行组”部分右键单击 `Employee_Name` 组，选择“组属性”。然后单击“可见性”选项卡。

    2.  在“可见性”选项卡上，选择“隐藏”单选按钮。

    3.  启用“可由此报表项切换显示”复选框。

    4.  在“报表项”下拉列表中，选择 `Patient_Name`。

    5.  为“Patient Name”组执行步骤 1 到 4，选择或输入 **Service_Type** 作为切换报表项。


    另外两个请求是要能够查看每个诊断的患者和员工总数。你可以向报表中添加一个表达式 `CountDistinct`，它将统计每个唯一的患者和员工，并在诊断级别计算数量。用于患者计数的语法如下：


    ```vb

    =CountDistinct(Fields!FieldName.Value)

    ```


    通过为字段 `PatID`（如您所知，该字段对每个患者是唯一的）以及字段 `EmployeeID` 添加 `CountDistinct` 表达式，就能更容易地一目了然地看到有多少患有特定诊断的患者接受了护理。


    将以下两个用于“Diagnosis”组的表达式放置在“Employee Count”和“Patient Count”标题单元格正下方的单元格中：


    ```vb

    =CountDistinct(Fields!EmployeeID.Value) =CountDistinct(Fields!PatID.Value)

    ```


    虽然报表与非交互式报表仍然相似，但有了深入查看的附加功能，预览时它会看起来大不相同（参见图 6-11）。在图 6-11 的截图中，你会注意到我们隐藏了文档地图以提供更多报表空间。你可以通过双击分隔文档地图和报表主体的栏中央的小箭头来显示或隐藏文档地图。


    ![Image](img/9781430238102_Fig06-11.jpg)


    **图 6-11.** 具有交互式深入查看功能的报表


    `Pro_SSRS` 项目中的 `EmployeeServiceCost_Visibility.rdl` 报表包含了这些可见性属性。

