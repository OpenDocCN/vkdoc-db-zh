    Any assemblies used by the custom assembly must be available both on the computer
    being used to design the report and on the SSRS 2012 server itself. Since you
    are just using common .NET framework assemblies, this should not be a problem
    because the .NET Framework is installed on your local computer as well as on the
    SSRS 2012 server. If you reference other custom or third–party assemblies in your
    custom assembly, you need to make sure they are available on the SSRS server where
    you will be running your report.


    ![Image](images/square.jpg) **Note** Because this book’s focus is on SSRS and
    not on writing code, we won’t explain the code samples line by line. If you are
    interested in programming, Apress offers many excellent books for the various
    programming languages that can help you write custom code for SSRS 2012. Refer
    to [www.apress.com](http://www.apress.com).


    To use the `Employee` assembly in your report, you first need to deploy it to
    the appropriate location. In the next section, you will learn how to deploy custom
    assemblies and set up the required permissions. Once you have done that, you will
    return to the report and use the custom assembly you have created and deployed
    in the Employee Service Cost report.


    ![Image](images/square.jpg) **Note** Remember that each time you make a change
    to your custom assembly, you must redeploy the assembly. Also, if you added code
    that requires additional permissions, you may have to grant them.


    ### Deploying a Custom Assembly


    Custom assemblies are more difficult to deploy than code embedded in your report
    through the Code element. This is because of the following:


    > *   Custom assemblies are not part of the report itself and must be deployed
    separately.

    > *   Custom assemblies are not deployed to the same folder as the reports.

    > *   The built–in project deployment method in Visual Studio 2010 will not automatically
    deploy your custom assemblies.

    > *   Custom assemblies are granted only Execution permissions by default. Execution
    permission allows code to run but not to use protected resources.


    To use your custom assemblies with SSRS 2012, you need to take the following steps
    to place them in a location where SSRS 2012 can find them and to edit the files
    that control security policy when necessary. The location of the files depends
    on whether you want to use them in the Report Designer within Visual Studio or
    on the report server.


    1.  You need to deploy your custom assemblies to the Report Designer and/or SSRS
    2012 applications folder.


    •    For the Report Designer/Visual Studio, the default is C:\Program Files (x86)\Microsoft
    Visual Studio 10.0\Common7\IDE\PrivateAssemblies.


    •    For SSRS 2012, the default is C:\Program Files\Microsoft SQL Server\MSRS11.MSSQLSERVER\Reporting
    Services\ReportServer\bin.


    ![Image](images/square.jpg) **Note** You need to have the necessary permissions
    to access these folders. By default, members of the standard Users group won’t
    have the necessary write/modify permissions on these folders. Logged in as a user
    with the appropriate security permissions, such as the administrator, you can
    set the permissions on the folders to allow the necessary access to the folders
    to users logged in under less privileged accounts. Alternately, you could move
    the files to the appropriate folders when logged in or running as a user who has
    the necessary permissions.


    2\. Next, you need to edit the SSRS 2012 security policy configuration files if
    your custom assembly requires permissions in addition to the Execution permission.
    (For SSRS 2012, the default location is C:\Program Files\Microsoft SQL Server\MSRS11.MSSQLSERVER\Reporting
    Services\ReportServer\rssrvpolicy.config.) You should update the designer permissions
    configuration at this point as well. The default location for this file is C:\Program
    Files (x86)\Microsoft Visual Studio 10.0\Common7\IDE\PrivateAssemblies\RSPreviewPolicy.config.
    This config file will use a slightly different assembly path than your SSRS instance,
    though, since we will be placing the DLL file in the private assemblies folder
    for Visual Studio 2010.


    For example, if you were writing a custom assembly to calculate an employee’s
    cost per visit, you might need to read the pay rates from a file. To retrieve
    the rate information, you would need to grant additional security permissions
    to your custom assembly. To give your custom assembly FullTrust permission, you
    can add the XML text shown in [Listing 7-4](#Chapter07.html#list_7_4) to the appropriate
    CodeGroup section of the `rssrvpolicy.config` file.


    ***Listing 7-4.** Granting FullTrust Permission to the Custom Assembly for both
    SSRS and Visual Studio*


