  trans: "\n### 在报告中使用自定义程序集\n\n自定义程序集虽然实现起来更复杂，但能提供比嵌入式代码更大的灵活性。创建它们的过程要稍微复杂一些，因为它们并非报告\
    \ RDL 的一部分，必须在报表设计器之外创建。这也使得它们部署起来更困难，因为嵌入式代码会成为报告 RDL 的一部分，而自定义程序集是一个独立的文件。\n\
    \n然而，你的辛勤工作会得到多方面的回报。\n\n*代码重用*：你可以在多个报告之间重用自定义代码，无需将代码复制粘贴到每个报告中。这使你能够将所有自定义逻辑集中到单一位置，从而大大简化代码维护。\n\
    \n> *任务分离*：使用程序集可以更轻松地将撰写报告的任务与创建自定义代码的任务分开。这在概念上与使用代码隐藏功能编写 ASP.NET 应用程序有些相似。这种方式允许\
    \ ASP.NET 开发人员将页面标记、布局和图形与将与之交互的代码分开。如果你有几个人参与项目，可以让擅长报告撰写的人员负责报告的布局和创建，而让可能编码技能更强的其他人编写自定义代码。\n\
    >\n> *语言中立性*：你可以使用自己选择的.NET 语言。可以从 C#、VB、J#或任何与.NET Framework 兼容的第三方语言中选择。\n>\n\
    > *高效的开发环境*：如果你使用 Visual Studio 2010 来开发自定义程序集，你将获得其完整编辑和调试功能的强大支持。\n>\n> *安全控制*：你可以使用安全策略对程序集能够执行的操作进行细粒度控制。\n\
    >\n> *灵活性*：你创建的程序集不受限于 RDL 嵌入式代码部分中的简单函数。你有能力在报告中利用整个.NET 库。\n\n要从报告中使用自定义程序集，你需要创建一个类库来存放代码，将你希望从报告中调用的方法和属性添加到类中，然后将其编译为程序集。要从报表设计器中使用它，你可以在\
    \ Visual Studio 的解决方案中添加一个类库项目，这样就能轻松访问报告和你将在其中使用的代码。在运行附带的示例之前，请务必阅读解决方案文件夹“解决方案项”中的\
    \ `ReadMe.htm` 文件，以查看针对你的特定配置，在运行示例之前是否需要任何步骤。\n\n### 向你的报告解决方案添加类库项目\n\n要将自定义程序集与你的报告一起使用，首先需要以.NET\
    \ 类的形式编写自定义代码。你可以通过向现有解决方案中添加一个类库项目来实现，这样你就可以同时处理报告和自定义代码。\n\n在此示例中，你希望显示员工为病人出诊所获得的报酬。该类将从人力资源系统定期导出的\
    \ XML 文件中获取此信息。\n\n![Image](img/square.jpg) **注意** 如果可能，你会希望直接从人力资源系统获取此信息，可能通过\
    \ Web 服务。本章附带的示例代码包含了一个示例 Web 服务和一个调用它的方法。\n\n在此示例中使用 XML 文件 `EmployeePay.xml`（作为本章代码下载的一部分提供），不仅可以让你编写自定义程序集，还可以让你了解访问受保护资源（如本地文件）所需的步骤。要从\
    \ XML 文件获取信息并使其可供报告使用，请创建一个类，该类包含一个方法，该方法以 `EmployeeID` 和日期作为参数，从 XML 文件读取员工每次出诊的付费费率，然后返回该费率。虽然本章不会逐步介绍这一点，但附带的示例代码也包含了一个使用\
    \ Web 服务完成相同操作的示例。这使你能够模拟通过 Web 服务而不是导出的文件与人力资源系统交互的能力。\n\n然后，你可以在报告的表达式中引用你开发的程序集，并用它来计算每位病人的总出诊费用。\n\
    \n首先，从菜单中选择 文件 ![Image](img/U001.jpg) 添加 ![Image](img/U001.jpg) 新建项目。根据你的偏好，选择\
    \ Visual Basic 项目或 Visual C# 项目。选择“类库”，并将项目名称输入为 `Employee`。在此示例中，我们将向你展示如何使用\
    \ Visual C# 类库项目，如 图 7-9 所示。\n\n![Image](img/9781430238102_Fig07-09.jpg)\n\n***图\
    \ 7-9.** “添加新项目”对话框*\n\n从解决方案资源管理器中选择新创建的 `Class1.cs`，并将其重命名为更具描述性的名称，例如 `Employee`，因为你将使用此类来计算员工提供的出诊费用。在\
    \ Visual Studio 2010 IDE 中打开 `Employee.cs` 文件，将命名空间从 `Employee` 更改为 `Pro_SSRS`，你将看到如\
    \ 图 7-10 所示的代码编辑器。\n\n![Image](img/9781430238102_Fig07-10.jpg)\n\n***图 7-10.**\
    \ Visual Studio 2008 代码编辑器*\n\n对于此示例，你将添加几条 `using` 语句来导入其他命名空间中定义的类型。具体来说，你将添加\
    \ `System.Data` 和 `System.Security.Permissions` 命名空间，这样你就可以在 `Employee` 程序集中引用\
    \ `DataSet` 和 `SecurityAction` 方法，而无需键入完整的命名空间，如 清单 7-3 所示。你也可以去掉对 `System.Linq`\
    \ 的引用，因为我们不会在此类库中使用它。\n\n***清单 7-3.** Employee 程序集*\n\n```\nusing System;\nusing\
    \ System.Collections.Generic;\nusing System.Text;\nusing System.Security.Permissions;\n\
    using System.Data;\n\nnamespace Pro_SSRS {\n        public class Employee {\n\
    \                   public Employee() { }\n```\n"
- fmt: "# 部署和使用自定义程序集\n\n```csharp\n[PermissionSetAttribute(SecurityAction.Assert,\
    \ Unrestricted = true)]\npublic static decimal CostPerVisitXML(string employeeID,\
    \ DateTime visitDate)\n{\n    DataSet empDS = new DataSet();\n    empDS.ReadXmlSchema(@\"\
    C:\\Temp\\EmployeePay.xsd\");\n    empDS.ReadXml(@\"C:\\Temp\\EmployeePay.xml\"\
    );\n    DataRow[] empRows = empDS.Tables[\"EmployeePay\"].Select(\"EmployeeID\
    \ = '\" +\n        employeeID + \"'\");\n    Decimal empAmt;\n\n    if (empRows.Length\
    \ > 0)\n    {\n        empAmt = Convert.ToDecimal(empRows[0][\"Amount\"]);\n \
    \       return empAmt;\n    }\n    else\n        return 0;\n}\n```\n\n自定义程序集所使用的任何程序集，都必须在用于设计报表的计算机和\
    \ SSRS 2012 服务器本身上可用。由于你只是使用常见的 .NET Framework 程序集，这应该不是问题，因为 .NET Framework 已安装在你的本地计算机以及\
    \ SSRS 2012 服务器上。如果你在自定义程序集中引用了其他自定义或第三方程序集，则需要确保它们在你将要运行报表的 SSRS 服务器上可用。\n\n\
    ![Image](images/square.jpg) **注意** 由于本书的重点是 SSRS 而不是编写代码，我们将不会逐行解释代码示例。如果你对编程感兴趣，Apress\
    \ 提供了许多针对各种编程语言的优秀书籍，可以帮助你为 SSRS 2012 编写自定义代码。请参考 [www.apress.com](http://www.apress.com)。\n\
    \n要在你的报表中使用 `Employee` 程序集，你首先需要将其部署到适当的位置。在下一节中，你将学习如何部署自定义程序集并设置所需的权限。完成此操作后，你将返回报表，并在\
    \ Employee Service Cost 报表中使用你已创建和部署的自定义程序集。\n\n![Image](images/square.jpg) **注意**\
    \ 请记住，每次对自定义程序集进行更改后，都必须重新部署该程序集。此外，如果你添加了需要额外权限的代码，可能还需要授予这些权限。\n\n## 部署自定义程序集\n\
    \n部署自定义程序集比通过 `Code` 元素嵌入报表中的代码更困难。这是因为以下原因：\n\n> *   自定义程序集不是报表本身的一部分，必须单独部署。\n\
