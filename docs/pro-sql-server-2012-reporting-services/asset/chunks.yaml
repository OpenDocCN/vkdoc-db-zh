    现在，你已掌握了在 Windows 窗体应用程序中使用报表查看器控件的基础。本章的示例在 Web 浏览器控件中实现了 URL 访问，并使用报表查看器控件来渲染报表，为你提供了将报表集成到
    Windows 窗体应用程序的多种选择。通过使用 SSRS 2012 基于 SOAP 的 API 来访问 SSRS 的丰富功能，以检索可用的报表参数和可能值，你使查看器对用户更加友好。这让你能够为用户创建一个更熟悉且响应更灵敏的基于
    Windows 的用户界面。


    你也可以直接使用报表服务器 Web 服务来渲染报表。但是，你会失去诸如带有内置导航和导出功能的报表工具栏等特性。这意味着，如果你使用另一个 Web 服务进行渲染，就必须自己创建这些功能。


    #### 在 ASP.NET 中构建报表查看器


    使用 Visual Studio，你还可以选择在 ASP.NET 应用程序中使用报表查看器控件。这可以让你灵活地开发自定义报表应用程序，而不必分发给用户或在每次部署补丁时在最终用户的机器上更新。用户可以通过任何标准的
    Web 浏览器访问你的自定义应用程序，并且任何修改对你的最终用户都可以是透明的。


    在这个项目中，你将使用许多与之前构建的窗体应用程序相同的概念和方法。首先创建一个新的 ASP.NET Web 应用程序项目。将此项目命名为 `SSRS_WebViewer`，并为你的源文件选择一个位置。


    ![Image](img/square.jpg) **提示** 如果你的开发机器上没有 IIS 也不用担心。使用 Visual Studio 的调试功能，你可以在
    Web 浏览器中查看你的 ASP.NET 应用程序。


    现在，你将获得一个新的 Web 应用程序项目，其中包含一个为你创建的 `Default.aspx` 文件。打开此网页，并向页面布局添加五个控件：


    *   `DropDownList:` 你将使用此下拉列表来保存从 SSRS 2012 Web 服务返回的报表名称。将其命名为 `reportList`。

    *   `Button:` 这将用于触发报表在报表查看器中的渲染。将其命名为 `renderReport`，并将显示文本更改为“渲染”。

    *   `Horizontal Rule:` 你将在窗体中使用一个水平分隔线来分隔顶部控件和报表查看器。

    *   `Report Viewer:` 你将使用此控件渲染存储在 SSRS 2012 服务器上的报表。将其命名为 `reportViewerWeb`。

    *   `ScriptManager:` 使用 `ReportViewer` 控件的要求是，你必须在页面上包含一个 `ScriptManager` 控件。它确保页面包含
    `ReportViewer` 所需的所有前提代码。


    一旦你将控件放在页面上并调整大小以适合你的布局，请为刚创建的按钮添加一个单击动作。这可以通过在设计模式下查看页面并双击按钮来实现，就像 Windows 窗体按钮一样。不必担心所创建函数的内容；你稍后会填充代码。完成后，你的代码应类似于
    清单 9-14。


