    \ **Employee Service Cost** 报告，然后选择 **Subscriptions** 选项卡，您应该会看到您的订阅，如图 10-31\
    \ 所示。如果您单击 **Edit**，您会看到它提供了您选择的所有参数，并在 **To** 字段中插入了所需的电子邮件地址。\n\n![Image](images/9781430238102_Fig10-31.jpg)\n\
    \n**图 10-31.** 在 SSRS 2012 中显示的订阅\n\n您尚未看到调度 **Employee Service Cost** 等报告时可以使用的所有可能选项，但我们为您调度、交付报告以及添加其他功能提供了一个良好的开端。一些可能性包括：\n\
    \n*   允许用户决定报告的交付格式\n*   允许用户附加报告或仅提供链接\n*   允许用户动态创建计划\n\n您可以使用 SSRS 2012 Report\
