  trans: '

    ## SSRS 2012 与 Microsoft Office SharePoint 的集成


    尽管在之前版本的 SSRS 中，通过使用 SharePoint 控件已经可以实现 SharePoint 集成，但 SSRS 2012 将集成又推进了数步。通过在
    **SharePoint 集成模式**下使用 SSRS 2012，用户可以在 SharePoint 环境中直接部署、管理和交付报表及报表对象，例如 Web
    部件、数据源和模型，甚至是整个仪表板或门户。此外，已部署的报表继承了 SharePoint 的原生功能，例如工作流能力、报表签入和签出功能以及报表更改通知。我们将在第
    12 章演示这种与 SharePoint 的更紧密集成。


    ## Tablix 报表属性


    顾名思义，Tablix 属性首次出现于 SSRS 2008，它结合了两种现有的报表控件：表格和矩阵。这种结合为开发人员在创建报表时提供了更灵活的工具。多列和多行的可用性，将表格控件的静态特性与矩阵的动态特性相融合。报表现在可以在每个级别容纳多个并行的行和列成员，彼此独立但使用相同的聚合计算。在本书之前的版本中，我们提供了通过将一个表格嵌入另一个表格中来组合表格和矩阵的解决方法。在第
    4 章，我们将探索新的 Tablix 控件属性对于列表、表格和矩阵控件的真正威力。


    ## 增强的图表和报表项可视化


    从一开始，SSRS 就在报表中原生提供了图表和可视化功能。这些图表虽然功能多样，但在范围上有些受限。之前版本的 SSRS 图表功能，即使不是全部，也很容易在
    Microsoft Excel 中复制。事实上，两者的图表几乎完全相同。SSRS 2008 对图表和图形化数据可视化进行了多项增强，这对于 SSRS 作为其关键组成部分的可靠
    BI 报表解决方案至关重要。现在提供了新的图表元素，如范围图、极坐标图、雷达图、漏斗图和金字塔图，以及通过收购 Dundas 报表控件为 SSRS 提供的众多新“仪表”。


    SSRS 2008 R2 包含了几个备受期待的报表项可视化功能，以支持创建更复杂的仪表板外观和感觉。其中之一是地图控件，它可以显示来自地理空间数据结果集或环境系统研究所公司（ESRI）形状文件的数据。其他出色的新增功能包括数据条、折线图和指示器。我们将在第
    5 章将这些新的可视化效果融入报表中时进行探讨。


    ## 增强的性能和内存管理


    Microsoft 在 SSRS 2008 中对报表引擎进行了重新设计，以减少服务器级别报表的内存占用，加快报表向最终用户应用程序的交付速度。这一增强还解决了当长时间运行的大型报表和较小的、不受内存限制的报表同时处理时出现的资源争用问题。


    ## 可嵌入的 SSRS 控件


    能够在自定义应用程序中嵌入控件，使得开发人员更容易将 SSRS 集成到他们的项目中。自 SQL Server 2005 发布以来，Visual Studio
    环境就包含了可分发控件，可用于 Windows 窗体开发和 ASP.NET Web 窗体开发。这些控件为开发人员提供了额外的好处，例如能够在断开与 SSRS
    连接的情况下呈现报表。我们将在第 9 章介绍更新的 SSRS 控件。


    ## HTML 文本格式


    除了从双服务架构转变为单服务架构，以及能够导出为 Microsoft Word 格式外，文本格式可能是 SSRS 2008 最重大的进步之一。在之前的 SSRS
    版本中，无法对文本内容进行内联格式设置，例如用于套用信函。例如，如果你希望一个文本框中的部分内容使用常规字体，但其他部分文本使用粗体或斜体，这是无法实现的。在
    SSRS 2008、SSRS 2008 R2 和 SSRS 2012 中，文本框报表项支持普通和富文本模式，并允许以与文字处理器相同的方式进行格式设置。你可以创建一个占位符来允许使用有限的
    HTML 和样式标签子集。文本格式可以结合字面文本和数据源文本，用于邮件合并和模板报表。我们将在第 6 章通过创建一个自定义的套用信函式报表来演示此功能的完整用法。


    ## Microsoft Word 呈现


    自 SSRS 的第一个版本起，你就可以将任何报表导出到 Microsoft Excel。虽然这是一项重要的功能，但无法导出到其他 Microsoft Office
    格式（如 Word）是一个限制。开发人员通常希望使用现代文字处理器中的富文本来创建报表。通过结合 SSRS 从多个数据源设计自定义报表的能力，以及 Word
    提供丰富格式设置的能力，SSRS 2008 克服了其前代产品的重大限制。另一个限制是报表用户无法导出为 2007 格式。Excel 2003 有 65,536
    行和 256 列的限制，但 SSRS 2012 的一项新的呈现增强功能使我们能够导出到 Word 和 Excel 2007-2010 格式，因此现在我们可以在一个
    Excel 工作表中存储 1,048,576 条记录和 16,384 列。


    ## 报表部件


    如果你和我们一样，可能希望创建可重用的小对象，这些对象可以被纳入多个报表中。直到 SSRS 2008 R2，你只能通过创建可作为子报表嵌入其他报表中的报表来实现这一点。现在，你可以发布报表的各个部分，例如一个包含销售额前十员工的
    `Tablix`，或一个显示当年客户投诉趋势的 `Sparkline`。像这样的任何报表项都可以部署到 `ReportServer` 或 SharePoint
    服务器，最终用户可以使用 `Report Builder` 或 SharePoint 等即席工具来重用它们。此外，报表开发人员可以使用这些报表部件来减少需要以相同方式呈现数据的报表的重复工作。一个非常有用的功能是，如果报表部件被具有适当权限的用户修改，该报表部件的使用者会收到更新通知，并且他们可以选择刷新其报表或保持原样。


    ## 查找函数


    在 2008 R2 版本之前，经常需要在同一报表的不同数据区域中查找某个值。由于两个表中的数据可以通过一个公共字段链接，一种变通方法是在源查询中通过连接表来收集数据。通常，这在后端可能性能更好，但有时你需要在另一个数据区域中查找值，因此
    Microsoft 为 Reporting Services 添加了三个查找函数：`Lookup()`、`LookupSet()` 和 `MultiLookup()`。


    ## 共享数据集


    在继续介绍 SSRS 2008 R2 和 2012 带来的升级之前，让我们简要讨论一下共享数据集。这个在 2008 R2 中添加的功能允许你创建一个可供其他报表使用的数据集。想象一下，你创建了一个包含
    50 个报表的项目，其中大约 10 个报表带有一个针对全球所有国家/地区的参数。考虑到可管理性，你设计这个数据集是通过调用一个存储过程来加载的。在之前版本的
    SSRS 中，你需要为每个需要此参数的报表创建一个数据集，因此任何影响它们的更改都必须在所有数据集中逐一进行修改。从 2008 R2 开始，我们可以创建一个共享数据集并在多个报表中使用它。对该单个数据集的更改会更新所有需要该更改的报表。

    '
- fmt: '### SSRS 与商业智能


    SSRS 仅仅是微软 BI 平台的一个组件。我们现在将介绍自 SQL Server 2008 以来推出的其他新功能和增强功能，这些将成为你整体报表解决方案中不可或缺的部分。


    ### 商业智能开发工具与 SQL Server 数据工具


    商业智能开发工具（BIDS）是 Visual Studio 2008 的一个简化版本，随 SQL Server 2008 基础安装一起提供。在 SQL Server
    2012 中，报表设计器采用了新名称 SQL Server 数据工具（SSDT），并且我们现在使用的是 Visual Studio 2010 的外壳，而非
    VS 2008。通过 SSDT 和 BIDS，开发人员可以为 SQL Server 2012 支持的每个组件（包括 SSIS、SSAS 以及当然的 SSRS）创建完整的项目。本书将全程使用
    SSDT（第 13 章除外，在那一章我们将使用报表生成器来向你展示如何设计和部署 SSRS 报表及 Analysis Services 项目）。请注意，SSDT
    和 BIDS 都使用 `devenv` 可执行文件，因此可以互换使用。


    ### SQL Server Management Studio (SSMS)


    随着 SQL Server 2008 的发布，微软通过 SQL Server Management Studio（SSMS）继续构建其管理平台。微软在将许多在旧版
    SQL Server 中需要单独执行的工具整合到单一环境方面迈出了一大步。SSMS 取代了企业管理器和查询分析器，为创建和管理 SQL Server 对象及查询提供了一套更精细的工具。除了管理
    SQL Server 和 Analysis Services 服务器外，管理员还可以使用 SSMS 来管理其 SSRS 报表服务器的实例。我们在 SQL Server
    社区中听说 Management Studio 将在 Visual Studio 外壳中运行，但无论如何，目前它仍然通过 `ssms.exe` 运行。不过，SSMS
    用户现在能够取消窗口停靠，并将它们放在多个显示器上，就像 Visual Studio 开发人员多年来所做的那样。


    在本书中，我们将向你展示如何同时使用 SSMS 和报表管理器来执行各种任务。例如，我们将展示如何使用 SSMS 测试查询性能，以及如何使用基于浏览器的报表管理器查看已发布报表、设置安全权限和创建订阅。尽管这两个应用程序在管理
    SSRS 方面有功能重叠，但报表管理器通常比 SSMS 更可取，因为它可以执行更多的管理任务，并且不需要本地安装。你可以从网络上的任何位置通过浏览器访问报表管理器，但要使用
    SSMS，你需要能访问已安装的 SQL Server 2012 客户端工具。


    ### SSRS 架构


    你可能听过“细节决定成败”这句话。在本书中，你将深入这些细节，从设计到安全探索 SSRS 的方方面面，甚至会触及 SSRS 构建的数据包。现在，让我们退后一步，从一个更广阔的视角——如果你愿意，可以说是万英尺高空视图——来看看协同工作以使
    SSRS 成为一个真正的多层应用程序的三个主要组件：客户端、报表服务器和 SQL Server 报表数据库。[图 1-1](#Chapter01.html#fig_1_1)
    展示了这三个组成部分的概念性分解。


    数据源与 SSRS 数据库 `ReportServer` 和 `ReportServerTempDB` 是独立的实体。数据源是填充报表的数据的来源，而报表服务器数据库存储有关报表的元数据和执行信息。假设数据源是一个
    SQL Server 数据库，那么数据源和报表服务器数据库可以物理上位于同一个 SQL Server 上。数据源可以是任何支持的数据提供程序，例如 SQL
    Server、Oracle、轻量目录访问协议（LDAP）、Microsoft SharePoint 列表、SQL Azure 和 Analysis Services。可以将单个服务器配置为同时充当
    SSRS 报表服务器 Web 服务、报表服务器数据库以及数据源服务器。但是，除非你的用户群很小，否则不建议这样做。我们将在[第 10 章](#Chapter10.html)中向你展示如何在安装后监控
    SSRS 配置的性能并构建一个小型 Web 场。


    ![Image](images/9781430238102_Fig01-01.jpg)


    **图 1-1.** SSRS 组件


    #### SSRS 数据库


    SSRS 是在 SQL Server 安装过程中作为一个选项添加的。SSRS 原生安装会创建两个数据库，用于存储报表元数据和管理性能：


    > `ReportServer`：这是主数据库，存储了所有关于报表的信息，这些信息最初由用于创建报表并将其发布到 `ReportServer` 数据库的 RDL
    文件提供。除了报表属性（如数据源）和报表参数外，`ReportServer` 还存储文件夹层次结构和报表执行日志信息。

    >

    > `ReportServerTempDB`：此数据库保存报表的缓存副本，可用于为许多并发用户提高性能。通过使用非易失性存储机制缓存报表，你可以确保即使在报表服务器重启后，它们对用户仍然可用。


    数据库管理员可以使用标准工具来备份和还原这两个数据库。在 SSRS 初始安装后，可能会添加一个额外的数据库：`RSExecutionLog` 数据库。它存储有关报表执行的更详细信息，例如运行报表的用户、执行时间和性能统计信息。我们将在[第
    10 章](#Chapter10.html)详细介绍创建 Pro_SS`RSExecutionLog` 数据库并讨论报表执行日志记录。


    ![Image](images/square.jpg) **注意** 当配置 Reporting Services 在 2012 版中以 SharePoint
    集成模式运行时，会为警报功能安装一个额外的数据库。另请注意，默认的数据库名称略有不同，因为它们会在 `ReportingService_` 后附加一个唯一的标识符，该标识符在
    SharePoint 站点上创建 Reporting Services 实例时分配。例如，在 SharePoint 集成模式下，`ReportServerTempDB`
    会变成类似 `ReportingService_14214aae2b5d4f0d888289011932bmcdTempDB` 的名称。我们将在[第 12
    章](#Chapter12.html)中探讨 SharePoint 集成模式。


    #### SSRS 报表服务器


    SSRS 报表服务器在 SSRS 模型中扮演着最重要的角色。它在中间层工作，负责处理来自客户端的所有请求，无论是渲染报表还是执行管理请求（例如创建订阅）。你可以按功能将报表服务器分解为几个子组件：


    *   编程接口

    *   认证层（SSRS 2008 中新增）

    *   报表处理

    *   数据处理

    *   报表渲染

    *   报表计划与传递


    #### SSRS Web 服务接口


    编程接口以 .NET Web 服务应用程序编程接口（API）和统一资源定位符（URL）访问方法的形式公开，负责处理来自客户端的所有传入报表和管理请求。根据请求类型的不同，编程接口要么直接通过访问
    `ReportServer` 数据库来处理它，要么将其传递给另一个组件进行进一步处理。如果请求是针对按需报表或快照，Web 服务会将其传递给报表处理器，然后将完成的请求交付给客户端或存储在
    `ReportServer` 数据库中。


    ![Image](images/square.jpg) **注意** 按需报表被渲染并直接交付给客户端，而快照则是在某个时间点处理的报表，通过电子邮件、文件共享或（如果配置）直接发送到打印机的方式交付给客户端。'
  raw: "### SSRS and Business Intelligence\n\nSSRS is just one component of Microsoft’s\
    \ BI platform. We’ll now cover other new features and enhancements since SQL Server\
    \ 2008 that will form an integral part of your overall reporting solution.\n\n\
    #### Business Intelligence Development Studio and SQL Server Data Tools\n\nBusiness\
    \ Intelligence Development Studio (BIDS) is a limited version of Visual Studio\
    \ 2008, included with the SQL Server 2008 base installation. In SQL Server 2012,\
    \ the report designer takes on a new name, SQL Server Data Tools (SSDT), and we\
    \ now have the Visual Studio 2010 shell rather than VS 2008\\. With SSDT and BIDS,\
    \ developers can create entire projects for each of the supported components of\
    \ SQL Server 2012, including SSIS, SSAS, and of course SSRS. We will use SSDT\
    \ throughout the book (except in [Chapter 13](#Chapter13.html), where we use Report\
    \ Builder to show you how to design and deploy SSRS reports and Analysis Services\
    \ projects). Note that SSDT and BIDS both use the `devenv` executable and as such,\
    \ can be used interchangeably.\n\n#### SQL Server Management Studio (SSMS)\n\n\
    With the release of SQL Server 2008, Microsoft continued to build on its management\
    \ platform with SQL Server Management Studio (SSMS). Microsoft has taken a big\
    \ step toward consolidating, in a single environment, many of the tools that in\
    \ previous versions of SQL Server would have been executed individually. SSMS\
    \ replaces Enterprise Manager and Query Analyzer, offering a much more elaborate\
    \ set of tools for creating and managing SQL Server objects and queries. In addition\
    \ to managing SQL Server and Analysis Services servers, administrators can use\
    \ SSMS to manage instances of their SSRS reporting servers. We have heard in the\
    \ SQL Server community that Management Studio will run in the Visual Studio shell,\
    \ but for now, anyway, it still runs with `ssms.exe`. However, SSMS users will\
    \ now be able to undock windows and have them on multiple monitors as Visual Studio\
    \ developers have done for some years.\n\nThroughout the book, we will show you\
    \ how to use both SSMS and Report Manager for various tasks. For example, we will\
    \ show you how to use SSMS to test query performance and the browser-based Report\
    \ Manager to view published reports, set security permissions, and create subscriptions.\
    \ Although the two applications share functionality for managing SSRS, Report\
    \ Manager is often preferable to SSMS because it can perform many more administrative\
    \ tasks and does not require a local installation. You can access Report Manager\
    \ from a browser anywhere on your network, but you would need access to the installed\
    \ SQL Server 2012 client tools to use SSMS.\n\n### SSRS Architecture\n\nYou’ve\
    \ probably heard the expression that the devil is in the details. You’ll be drilling\
    \ into those details throughout the book, right down to the data packets that\
    \ SSRS constructs, as you explore each aspect of SSRS from design to security.\
    \ For now, let’s pull back to a broader vantage point—the 10,000-foot view if\
    \ you will—and look at the three main components that work together to make SSRS\
    \ a true multi-tier application: the client, the report server, and the SQL Server\
    \ report databases. [Figure 1-1](#Chapter01.html#fig_1_1) shows the conceptual\
    \ breakdown of the three component pieces.\n\nThe data source and the SSRS databases,\
    \ `ReportServer` and `ReportServerTempDB`, are separate entities. The data source\
    \ is the origin of the data that will populate the reports, while the report server\
    \ databases store metadata and execution information about the reports. Both the\
    \ data source and the report server databases can physically be located on the\
    \ same SQL Server, assuming the data source is a SQL Server database. The data\
    \ source can be any supported data provider, such as SQL Server, Oracle, Lightweight\
    \ Directory Access Protocol (LDAP), Microsoft SharePoint List, SQL Azure and Analysis\
    \ Services. It’s possible to configure a single server to act as both the SSRS\
    \ report server web service and report server database as well as the data source\
    \ server. However, this isn’t recommended unless you have a small user base. We’ll\
    \ show you how to monitor the performance of the SSRS configuration and build\
    \ a small Web farm, post-installation, in [Chapter 10](#Chapter10.html).\n\n![Image](images/9781430238102_Fig01-01.jpg)\n\
    \n***Figure 1-1.** SSRS components*\n\n#### SSRS Databases\n\nSSRS is added as\
    \ an option during the SQL Server installation process. The SSRS native installation\
    \ creates two databases that are used to store report metadata and manage performance:\n\
    \n> `ReportServer`: This is the primary database that stores all the information\
    \ about reports that was originally provided from the RDL files used to create\
    \ and publish the reports to the `ReportServer` database. In addition to report\
    \ properties (such as data sources) and report parameters, `ReportServer` also\
    \ stores folder hierarchy and report execution log information.\n> \n> `ReportServerTempDB`:\
    \ This database houses cached copies of reports that you can use to increase performance\
    \ for many simultaneous users. By caching reports using a nonvolatile storage\
    \ mechanism, you make sure they remain available to users even if the report server\
    \ is restarted.\n\nDatabase administrators can use standard tools to back up and\
    \ restore these two databases. An additional database might be added after the\
    \ initial installation of SSRS: the `RSExecutionLog` database. This stores more\
    \ detailed information about report execution, such as the user who ran the report,\
    \ the time of execution, and performance statistics. We’ll cover creating the\
    \ Pro_SS`RSExecutionLog` database and discuss report execution logging in detail\
    \ in [Chapter 10](#Chapter10.html).\n\n![Image](images/square.jpg) **Note** When\
    \ configuring Reporting Services to run in SharePoint integrated mode for 2012,\
    \ an extra database is installed for Alerting. Note also that the default database\
    \ names are slightly different as they will have a unique identifier appended\
    \ to `ReportingService_`, assigned when creating the instance of Reporting Services\
    \ on the SharePoint site. For example, in SharePoint integrated mode, `ReportServerTempDB`\
    \ becomes something like `ReportingService_14214aae2b5d4f0d888289011932bmcdTempDB`.\
    \ We’ll look at SharePoint integrated mode in [Chapter 12](#Chapter12.html).\n\
    \n#### The SSRS Report Server\n\nThe SSRS report server plays the most important\
    \ role in the SSRS model. Working in the middle, it’s responsible for every client\
    \ request to render a report or to perform a management request, such as creating\
    \ a subscription. You can break down the report server into several subcomponents\
    \ by function:\n\n*   Programming interface\n*   Authentication Layer (new in\
    \ SSRS 2008)\n*   Report processing\n*   Data processing\n*   Report rendering\n\
    *   Report scheduling and delivery\n\n#### SSRS Web Service Interface\n\nThe programming\
    \ interface, exposed as .NET Web service application programming interfaces (APIs)\
    \ and uniform resource locator (URL) access methods, handles all incoming report\
    \ and management requests from clients. Depending on the type of request, the\
    \ programming interface either processes it directly by accessing the `ReportServer`\
    \ database or passes it off to another component for further processing. If the\
    \ request is for an on-demand report or a snapshot, the Web service passes it\
    \ to the Report Processor before delivering the completed request to the client\
    \ or storing it in the `ReportServer` database.\n\n![Image](images/square.jpg)\
    \ **Note** On-demand reports are rendered and delivered directly to the client,\
    \ while snapshots are reports that are processed at a point in time and delivered\
    \ to the client through e-mail or via file shares, or (if configured) directly\
    \ to a printer."
  trans: '### SSRS 与商业智能


    SSRS 仅仅是微软 BI 平台的一个组件。我们现在将介绍自 SQL Server 2008 以来推出的其他新功能和增强功能，这些将成为你整体报表解决方案中不可或缺的部分。


    ### 商业智能开发工具与 SQL Server 数据工具


    商业智能开发工具（BIDS）是 Visual Studio 2008 的一个简化版本，随 SQL Server 2008 基础安装一起提供。在 SQL Server
    2012 中，报表设计器采用了新名称 SQL Server 数据工具（SSDT），并且我们现在使用的是 Visual Studio 2010 的外壳，而非
    VS 2008。通过 SSDT 和 BIDS，开发人员可以为 SQL Server 2012 支持的每个组件（包括 SSIS、SSAS 以及当然的 SSRS）创建完整的项目。本书将全程使用
    SSDT（第 13 章除外，在那一章我们将使用报表生成器来向你展示如何设计和部署 SSRS 报表及 Analysis Services 项目）。请注意，SSDT
    和 BIDS 都使用 `devenv` 可执行文件，因此可以互换使用。


    ### SQL Server Management Studio (SSMS)


    随着 SQL Server 2008 的发布，微软通过 SQL Server Management Studio（SSMS）继续构建其管理平台。微软在将许多在旧版
    SQL Server 中需要单独执行的工具整合到单一环境方面迈出了一大步。SSMS 取代了企业管理器和查询分析器，为创建和管理 SQL Server 对象及查询提供了一套更精细的工具。除了管理
    SQL Server 和 Analysis Services 服务器外，管理员还可以使用 SSMS 来管理其 SSRS 报表服务器的实例。我们在 SQL Server
    社区中听说 Management Studio 将在 Visual Studio 外壳中运行，但无论如何，目前它仍然通过 `ssms.exe` 运行。不过，SSMS
    用户现在能够取消窗口停靠，并将它们放在多个显示器上，就像 Visual Studio 开发人员多年来所做的那样。


    在本书中，我们将向你展示如何同时使用 SSMS 和报表管理器来执行各种任务。例如，我们将展示如何使用 SSMS 测试查询性能，以及如何使用基于浏览器的报表管理器查看已发布报表、设置安全权限和创建订阅。尽管这两个应用程序在管理
    SSRS 方面有功能重叠，但报表管理器通常比 SSMS 更可取，因为它可以执行更多的管理任务，并且不需要本地安装。你可以从网络上的任何位置通过浏览器访问报表管理器，但要使用
    SSMS，你需要能访问已安装的 SQL Server 2012 客户端工具。


    ### SSRS 架构


    你可能听过“细节决定成败”这句话。在本书中，你将深入这些细节，从设计到安全探索 SSRS 的方方面面，甚至会触及 SSRS 构建的数据包。现在，让我们退后一步，从一个更广阔的视角——如果你愿意，可以说是万英尺高空视图——来看看协同工作以使
    SSRS 成为一个真正的多层应用程序的三个主要组件：客户端、报表服务器和 SQL Server 报表数据库。图 1-1 展示了这三个组成部分的概念性分解。


    数据源与 SSRS 数据库 `ReportServer` 和 `ReportServerTempDB` 是独立的实体。数据源是填充报表的数据的来源，而报表服务器数据库存储有关报表的元数据和执行信息。假设数据源是一个
    SQL Server 数据库，那么数据源和报表服务器数据库可以物理上位于同一个 SQL Server 上。数据源可以是任何支持的数据提供程序，例如 SQL
    Server、Oracle、轻量目录访问协议（LDAP）、Microsoft SharePoint 列表、SQL Azure 和 Analysis Services。可以将单个服务器配置为同时充当
    SSRS 报表服务器 Web 服务、报表服务器数据库以及数据源服务器。但是，除非你的用户群很小，否则不建议这样做。我们将在第 10 章中向你展示如何在安装后监控
    SSRS 配置的性能并构建一个小型 Web 场。


    ![Image](img/9781430238102_Fig01-01.jpg)


    **图 1-1.** SSRS 组件


    #### SSRS 数据库


    SSRS 是在 SQL Server 安装过程中作为一个选项添加的。SSRS 原生安装会创建两个数据库，用于存储报表元数据和管理性能：


    > `ReportServer`：这是主数据库，存储了所有关于报表的信息，这些信息最初由用于创建报表并将其发布到 `ReportServer` 数据库的 RDL
    文件提供。除了报表属性（如数据源）和报表参数外，`ReportServer` 还存储文件夹层次结构和报表执行日志信息。

    >

    > `ReportServerTempDB`：此数据库保存报表的缓存副本，可用于为许多并发用户提高性能。通过使用非易失性存储机制缓存报表，你可以确保即使在报表服务器重启后，它们对用户仍然可用。


    数据库管理员可以使用标准工具来备份和还原这两个数据库。在 SSRS 初始安装后，可能会添加一个额外的数据库：`RSExecutionLog` 数据库。它存储有关报表执行的更详细信息，例如运行报表的用户、执行时间和性能统计信息。我们将在第
    10 章详细介绍创建 Pro_SS`RSExecutionLog` 数据库并讨论报表执行日志记录。


    ![Image](img/square.jpg) **注意** 当配置 Reporting Services 在 2012 版中以 SharePoint 集成模式运行时，会为警报功能安装一个额外的数据库。另请注意，默认的数据库名称略有不同，因为它们会在
    `ReportingService_` 后附加一个唯一的标识符，该标识符在 SharePoint 站点上创建 Reporting Services 实例时分配。例如，在
    SharePoint 集成模式下，`ReportServerTempDB` 会变成类似 `ReportingService_14214aae2b5d4f0d888289011932bmcdTempDB`
    的名称。我们将在第 12 章中探讨 SharePoint 集成模式。


    #### SSRS 报表服务器


    SSRS 报表服务器在 SSRS 模型中扮演着最重要的角色。它在中间层工作，负责处理来自客户端的所有请求，无论是渲染报表还是执行管理请求（例如创建订阅）。你可以按功能将报表服务器分解为几个子组件：


    *   编程接口

    *   认证层（SSRS 2008 中新增）

    *   报表处理

    *   数据处理

    *   报表渲染

    *   报表计划与传递


    #### SSRS Web 服务接口


    编程接口以 .NET Web 服务应用程序编程接口（API）和统一资源定位符（URL）访问方法的形式公开，负责处理来自客户端的所有传入报表和管理请求。根据请求类型的不同，编程接口要么直接通过访问
    `ReportServer` 数据库来处理它，要么将其传递给另一个组件进行进一步处理。如果请求是针对按需报表或快照，Web 服务会将其传递给报表处理器，然后将完成的请求交付给客户端或存储在
    `ReportServer` 数据库中。


    ![Image](img/square.jpg) **注意** 按需报表被渲染并直接交付给客户端，而快照则是在某个时间点处理的报表，通过电子邮件、文件共享或（如果配置）直接发送到打印机的方式交付给客户端。'
- fmt: '#### 认证层


    SSRS 2005 在很大程度上依赖于 Internet 信息服务（`IIS`）的认证机制，因为 SSRS 和 `IIS` 是相互依赖的。除了 SharePoint
    集成模式下的 SSRS，自 2008 版本起的所有 SSRS 版本都不再与 `IIS` 绑定。SSRS 现在直接使用 `Http.sys`，以及 SQL Server
    的原生网络组件，因此其架构经过重新设计，包含了自身的认证层，我们将在[第 11 章](#Chapter11.html)中介绍。


    #### 报表处理器


    报表处理器组件负责处理所有报表请求。与编程接口类似，它直接与 `ReportServer` 数据库通信，接收报表定义信息，然后将其与从数据源返回的数据（通过某个数据处理扩展访问）结合起来。


    #### 数据处理


    Reporting Services 支持十二个数据处理扩展来连接数据源。这些扩展包括：


    > *   SQL Server

    > *   Oracle

    > *   OLE DB

    > *   OLEDB-MD

    > *   ODBC

    > *   XML

    > *   SAP BI NetWeaver

    > *   Hyperion Essbase

    > *   Teradata

    > *   Microsoft SQL Azure（云中的 SQL）

    > *   Microsoft SQL Server 并行数据仓库

    > *   Microsoft SharePoint 列表


    当数据处理组件从报表处理器接收到请求后，它会启动到数据源的连接并传递源查询。数据被返回并发送回报表处理器，然后报表处理器将报表元素与从数据处理扩展返回的数据结合起来。


    #### 报表渲染


    结合后的报表和数据被移交给渲染扩展组件，存储为一种称为报表页面布局（`RPL`）的中间格式。然后，`RPL` 会根据客户端指定的渲染类型（我们在[第 8 章](#Chapter08.html)深入介绍渲染）转换为几种受支持的或自定义的格式之一：


    > *   `HTML`：默认渲染格式，支持 HTML 4.0 和 3.2 版本。

    > *   `Portable Document Format`（`PDF`）：使用 Adobe Acrobat Reader 生成即用型报表的格式。SSRS
    不需要您拥有 Adobe 许可证即可渲染 `PDF`，这对客户来说是一大优势。您只需要一个 `PDF` 阅读器。

    > *   `Excel 2002` 和 `2003`：SSRS 的 Service Pack 1 支持 `Excel 97` 及更高版本。如前所述，SQL
    Server 2012 支持导出为 2007-2010（`.xlsx`）压缩格式，以允许更多的行和列。

    > *   `XML`：其他应用程序或服务可以使用导出到 `XML` 的报表。

    > *   `Comma-separated values`（`CSV`）：通过渲染到 `CSV` 文件，您可以将其导入到其他支持 `CSV` 的应用程序（如
    Microsoft Excel）中来进一步处理报表。

    > *   `MIME HTML`（`MHTML`）：您可以使用此格式（也称为*Web 存档*）直接通过电子邮件交付报表或交付存储，因为报表内容（包括图像）都嵌入在单个文件中。

    > *   `Tagged Image File Format`（`TIFF`）：使用 `TIFF` 渲染图像文件可以保证报表的标准视图，因为无论用户的浏览器设置或版本如何，它都会以相同的方式处理。

    > *   `Microsoft Word`：标准的 Microsoft Word 文档导出现已包含在 SSRS 2008 中。SSRS 2012 提供了
    97-2003（`.doc`）和 2007-2010（`.docx`）压缩格式。

    > *   `ATOM`：此格式可由符合 `ATOM` 标准的客户端应用程序（如 `PowerPivot` 和 `SharePoint`）使用。

    > *   `NULL`：`NULL` 渲染扩展实际上不像其他扩展那样是一种格式，但可用于缓存报表的结果。下次请求该报表时，它会从缓存中提取并显著更快地渲染。如果您的报表较大且渲染时间异常长，这将非常有用。在创建订阅时，您会看到此扩展作为一种交付格式。


    #### 计划和交付


    如果来自客户端的请求需要计划或交付扩展（如快照或订阅），则编程接口会调用计划和交付处理器来处理该请求。您可以基于用户定义或共享计划生成并交付报表快照到两个受支持的交付扩展之一：电子邮件或文件共享。请注意，SSRS
    使用 `SQL Server Agent` 来创建计划作业。如果 `SQL Server Agent` 未运行，作业将不会执行。我们将在[第 10 章](#Chapter10.html)介绍如何基于共享计划创建订阅和快照。


    ### 客户端应用程序


    SSRS 包含多个客户端应用程序，它们使用 SSRS 编程接口（包括 `Web` 服务 `API` 和 `URL` 访问方法）为用户提供前端工具，以访问 SSRS
    报表和配置工具。这些工具提供报表服务器管理、安全实施和报表渲染功能。这些工具如下：


    > *   `Report Manager`：这个随 SSRS 提供的基于浏览器的应用程序为需要查看或打印报表，或为其工作组或部门管理报表对象的用户提供了图形界面。我们在涵盖
    SSRS 管理的[第 10 章](#Chapter10.html)详细描述了 `Report Manager`。

    > *   `BIDS` 或 `SSDT`：此工具为开发 SSRS 报表提供了一个集成环境。我们在[第 3 章](#Chapter03.html)到[第 5
    章](#Chapter05.html)介绍了 `BIDS` 或 `SSDT`，并在[第 6 章](#Chapter06.html)及全书介绍了如何在此环境中构建报表。

    > *   `Command-line utilities`：您可以使用几个命令行工具来配置和管理 SSRS 环境，包括 `rs`、`rsconfig`、`rskeymgmt`
    和 `rsactivate`。

    > *   `Report Builder 3.0`：这个增强的应用程序主要是为了让业务用户能够创建临时报表而开发的。`BIDS` 中几乎所有的功能在 `Report
    Builder 3.0` 中也可用。

    > *   `Custom clients`：这些 .NET Windows 窗体和 `Web` 应用程序调用 SSRS `Web` 服务来执行诸如渲染报表和管理报表对象等任务。SSRS
    包含您可以编译和运行的示例应用程序项目，以扩展前面列出的主要工具提供的功能。在[第 8 章](#Chapter08.html)和[第 9 章](#Chapter09.html)中，我们将向您展示如何开发自己的自定义应用程序：报表查看器和报表发布者。

    > *   `Reporting Services Configuration Manager`：SQL Server 2008 的 SSRS 包含一个增强的
    `Reporting Services Configuration Manager`，专门设计用于在图形环境中更改许多这些属性，包括为离线或断开连接的报告设置
    SSRS 环境。


    当想到基于 `Web` 的应用程序时，很自然地会想到*Web 浏览器*。尽管其他前端工具（如 `SSMS` 和 `Visual Studio`）也连接到报表服务器，但
    `Web` 浏览器在为用户提供图形界面方面扮演着重要角色，用户可以使用 `Report Manager` 查看或打印报表，或远程管理其工作组或部门的报表服务器。


    #### 报表管理器


    在 `Report Manager` 中，用户可以渲染报表、创建报表订阅、修改报表对象的属性、配置安全设置，以及执行许多其他任务。用户只需打开其 `Web`
    浏览器并导航到形如 [`http://Servername/Reports`](http://Servername/Reports) 的 `URL` 即可访问
    `Report Manager`。[图 1-2](#Chapter01.html#fig_1_2) 展示了运行中的 `Report Manager`，其中列出了专门为临床医生部署的文件夹中的报表。


    ![Image](images/9781430238102_Fig01-02.jpg)


    **图 1-2.** 基于 `Web` 的 `Report Manager` 应用程序'
  raw: '#### Authentication Layer


    SSRS 2005 relied heavily on the authentication methodology of Internet Information
    Services (IIS), since SSRS and IIS were interdependent. With the exception of
    SSRS in SharePoint integrated mode, no SSRS versions since 2008 are tied to IIS.
    SSRS now uses `Http.sys` directly, as well as SQL Server’s native network components,
    so SSRS’s architecture has been redesigned to include its own authentication layer,
    which we will cover in [Chapter 11](#Chapter11.html).


    #### The Report Processor


    The Report Processor component is responsible for all report requests. Like the
    programming interface, it communicates directly with the `ReportServer` database
    to receive the report definition information that it then uses to combine with
    the data returned from the data source, which is accessed via one of the data
    processing extensions.


    #### Data Processing


    Reporting Services supports twelve data processing extensions to connect to data
    sources. These are:


    > *   SQL Server

    > *   Oracle

    > *   OLE DB

    > *   OLEDB-MD

    > *   ODBC

    > *   XML

    > *   SAP BI NetWeaver

    > *   Hyperion Essbase

    > *   Teradata

    > *   Microsoft SQL Azure (SQL in the Cloud)

    > *   Microsoft SQL Server Parallel Data Warehouse

    > *   Microsoft SharePoint List


    When the data processing component receives the request from the Report Processor,
    it initiates a connection to the data source and passes it the source query. Data
    is returned and sent back to the Report Processor, which then combines the elements
    of the report with the data returned from the Data Processor extension.


    #### Report Rendering


    The combined report and data is handed off to the rendering extension component
    to be stored in an intermediate format called Report Page Layout (RPL). The RPL
    is then turned into one of several supported or custom formats, based on the rendering
    type specified by the client (we cover rendering in depth in [Chapter 8](#Chapter08.html)):


    > *   *HTML:* Default rendering format, supporting HTML versions 4.0 and 3.2.

    > *   *Portable Document Format (PDF):* Format used to produce print-ready reports
    using Adobe Acrobat Reader. SSRS doesn’t require that you have an Adobe license
    to render in PDF, which is a great benefit to customers. All you need is a PDF
    reader.

    > *   *Excel 2002 and 2003:* Service Pack 1 of SSRS supports Excel 97 and later.
    As discussed previously, SQL Server 2012 supports exporting in 2007-2010 (.xlsx)
    compressed format to allow more rows and columns.

    > *   *XML:* Other applications or services can use reports that are exported
    to XML.

    > *   *Comma-separated values (CSVs):* By rendering to a CSV file, you can further
    process the report by importing it into other CSV-supported applications such
    as Microsoft Excel.

    > *   *MIME HTML (MHTML):* You can use this format, also known as a *Web archive,*
    to deliver reports directly in e-mail or to deliver them for storage, because
    the report contents, including images, are embedded within a single file.

    > *   *Tagged Image File Format (TIFF):* Rendering image files using TIFF guarantees
    a standard view of the report, as it’s processed the same way for all users, whatever
    their browser settings or versions.

    > *   *Microsoft Word:* Standard Microsoft Word document export is now included
    in SSRS 2008\. Both 97-2003 (.doc) and 2007-2010 (.docx) compressed formats are
    available in SSRS 2012.

    > *   *ATOM:* This format can be consumed by ATOM-compliant client applications
    such as PowerPivot and SharePoint.

    > *   *NULL:* The NULL rendering extension isn’t actually a format like the others,
    but can be used to cache results of reports. The next time the report is requested;
    it is pulled from cache and rendered significantly quicker. This is especially
    useful if you have a larger report that takes an abnormally long time to render.
    You will see this extension as a delivery format when creating subscriptions.


    #### Scheduling and Delivery


    If the request from the client requires a schedule or delivery extension, such
    as a snapshot or subscription, the programming interface calls the Scheduling
    and Delivery Processor to handle the request. You can generate and deliver report
    snapshots, based on a user-defined or shared schedule, to one of two supported
    delivery extensions: an e-mail or a file share. Note that SSRS uses the SQL Server
    Agent to create the scheduled job. If the SQL Server Agent isn’t running, the
    job won’t execute. We’ll cover creating subscriptions and snapshots based on shared
    schedules in [Chapter 10](#Chapter10.html).


    ### Client Applications


    SSRS includes several client applications that use the SSRS programming interface,
    including Web service APIs and URL access methods, to provide front-end tools
    for users to access both SSRS reports and configuration tools. These tools provide
    report server management, security implementation, and report-rendering functionality.
    The tools are as follows:


    > *   *Report Manager:* This browser-based application ships with SSRS and provides
    a graphical interface for users who need to view or print reports, or to manage
    report objects for their workgroups or departments. We describe Report Manager
    in detail in [Chapter 10](#Chapter10.html), which covers managing SSRS.

    > *   *BIDS or SSDT:* This tool provides an integrated environment for developing
    SSRS reports. We introduce BIDS or SSDT in [Chapters 3](#Chapter03.html)-[5](#Chapter05.html)
    and step through building reports in this environment in [Chapter 6](#Chapter06.html)
    and throughout the book.

    > *   *Command-line utilities:* You can use several command-line tools to configure
    and manage the SSRS environment, including `rs`, `rsconfig`, `rskeymgmt` and `rsactivate`.

    > *   *Report Builder 3.0:* This enhanced application was primarily developed
    to give business users the ability to create ad hoc reports. Nearly all of the
    features available in BIDS are also available in Report Builder 3.0.

    > *   *Custom clients:* These .NET Windows Forms and Web applications call the
    SSRS Web service to perform such tasks as rendering reports and managing report
    objects. SSRS includes sample application projects that you can compile and run
    to extend the functionality provided by the main tools listed earlier. In [Chapters
    8](#Chapter08.html) and [9](#Chapter09.html), we show you how to develop your
    own custom applications: a report viewer and a report publisher.

    > *   *Reporting Services Configuration Manager:* SSRS for SQL Server 2008 included
    an enhanced Reporting Services Configuration Manager designed specifically to
    change many of these properties in a graphical environment, including setting
    up the SSRS environment for offline or disconnected reporting.


    When thinking of a Web-based application, the natural inclination is to think
    *Web browser.* Even though other front-end tools, such as SSMS and Visual Studio,
    connect to the report server, a Web browser plays an important role in providing
    the graphical interface for users, who can use Report Manager to view or print
    reports or remotely manage the report server for their workgroups or departments.


    #### Report Manager


    Within Report Manager, users can render reports, create report subscriptions,
    modify the properties of report objects, and configure security, as well as perform
    a host of other tasks. Users can access Report Manager by simply opening their
    Web browser and navigating to a URL of the form [`http://Servername/Reports`](http://Servername/Reports).
    [Figure 1-2](#Chapter01.html#fig_1_2) shows Report Manager in action, with a listing
    of reports in a folder deployed specifically for clinicians.


    ![Image](images/9781430238102_Fig01-02.jpg)


    ***Figure 1-2.** The Web-based Report Manager application*'
