    \ and trumped Report Builder 1.0 by allowing users to write queries and use stored\
    \ procedures to access data directly from the database, without the extra abstraction\
    \ layer of a report model. This new interface was intuitively easier to use, with\
    \ capabilities that far exceeded those of Report Builder 1.0.\n\nIn April of 2010\
    \ came the release of SQL Server 2008 R2 and with it came another version of the\
    \ Report Builder that offered dataset caching and integration with the enhanced\
    \ visualization report controls like the Map and Sparklines, as well as Indicators.\
    \ Since you are now familiar with producing reports using BIDS, let’s turn our\
    \ attention throughout this chapter to creating practical real world reports in\
    \ Report Builder 1.0, 2.0 and 3.0 applications.\n\nOne thing to note before we\
    \ get started is that, at the time of writing of this book, the vast majority\
    \ of organizations are still using prior versions of SQL Server. As such, we decided\
    \ to keep Report Models and Report Builder 1.0 in this version of the book. If\
    \ SQL Server 2012 is the only version that your organization owns, or if your\
    \ company is planning to migrate everything to SQL Server 2012, you can skip over\
    \ the Report Model and Report Builder 1.0 sections. If your company is one of\
    \ those migrating to 2012, just know that there is currently no path for migrating\
    \ Report Models to SQL Server 2012\\. With that caveat behind us, let’s get started.\n\
    \nFirst, we will explore Report Builder 1.0 and its components. As you will see,\
    \ even though the user who compiles the report needs to do some design work, the\
    \ administrator still needs to design the report model that provides data to the\
    \ Report Builder 1.0 client application. We will walk you through the process\
    \ of using Report Builder 1.0 from two vantage points—developing and publishing\
    \ a report model based on user input and then creating your own ad hoc reports\
    \ based on that model. The three steps we will cover are gathering user feedback,\
    \ creating and publishing the report model, and finally testing the report model\
    \ by creating reports with Report Builder 1.0:\n\n> *Getting feedback*: Since\
    \ we have worked alongside developers for many years, we know that one of the\
    \ biggest problems with delivering a new application is that sometimes users get\
    \ the application and expect it to do more than it does, or expect it to do something\
    \ in a different way than delivered. The expectation from a user’s perspective\
    \ is that the system should do exactly what the user needs. But for a developer,\
    \ if it doesn’t do it in version 1, it will have to do it in version 2\\. You\
    \ can avoid this conflict by implementing standard design practices, which always\
    \ take user feedback into consideration up front. This process is especially important\
    \ when the same application will be delivered to different companies with users\
    \ from different backgrounds, each with their own interpretations of how a process\
    \ should work. In the past few decades, a system analyst would take information\
    \ from groups of users and translate this to a technical design that the developer\
    \ could slowly digest. Today, most system analysis work is done directly by the\
    \ developer, who interacts with users during the design phase of the project.\
    \ Before we cover how to build a report model to be used by report designers,\
    \ we will provide a sampling of some of the feedback we have received about the\
    \ kinds of reports users would like to see.\n> \n> *Building the report model*:\
    \ The report model is the heart of Report Builder 1.0\\. Report models serve as\
    \ semantic descriptions of the underlying data source. Because the report model\
    \ can simplify a potentially complex overall database schema by selecting individual\
    \ tables, fields, and values, it can be likened to a SQL Server view. Indeed,\
    \ a key component of the report model, as you will see in this chapter, is a data\
    \ source view. Once DBAs or developers have created a report model that contains\
    \ the data to meet the requirements of the users, they can publish it to the report\
    \ server where it can be used by Report Builder 1.0, which is the client-side\
    \ report designer. All the data provided to Report Builder 1.0 come from published\
    \ report models. We will show how to create and publish models in this chapter\
    \ based on user feedback.\n> \n> *Using Report Builder 1.0*: Report Builder 1.0\
    \ is one of several design applications that can be used to create and publish\
    \ SSRS reports without requiring a full development environment like Visual Studio\
    \ or BIDS. Report Builder 1.0 relies on pre-published report models as its data\
    \ sources. As you will see, the interface for Report Builder 1.0 is intuitive;\
    \ in fact, it is ideal for users who need to quickly create reports based on predefined\
    \ report templates. Report Builder 1.0 not only allows users to design reports,\
    \ but also serves as the publishing tool to deploy the completed report directly\
    \ to the report server.\n\nWhen we begin talking about Report Builder 2.0, where\
    \ users have more control of the data they are accessing, you’ll see that much\
    \ of the same concepts that you learned with respect to Report Builder 1.0 still\
    \ apply. Developers may find themselves still creating views and stored procedures\
    \ based on feedback from a user who will ultimately be designing the reports.\
    \ Likewise, many developers may decide that Report Builder 2.0 has all of the\
    \ features they need and will select it as their preferred development environment."
  trans: '# 使用报表生成器 1.0、2.0 和 3.0 创建报表


    在涉及到用户自行开发的报表时，我们常常需要处理这样一个问题：如何在以受控且安全的方式提供底层数据的同时，又给予足够的自由度，使这些数据能为商业决策提供有效帮助。在
    `SQL Server 2005` 中，`Reporting Services` 包含了第一个版本的 `报表生成器`。`报表生成器` 是一种应用程序，它将部分繁琐的报表设计任务转移给了报表使用者自己。


    在 `报表生成器 1.0` 中，拥有适当权限的用户可以创建和发布他们自己的报表，但有一个前提：数据必须通过预先设计好的报表模型来提供。这个报表模型创建了一个抽象层——如果你愿意这样理解的话——它允许用户将提供的属性用作报表元素。就像软件开发中的任何新进展一样，我们常常会发现某些功能已被弃用。在这方面，`SQL
    Server 2012` 也不例外。我们不能再使用 2010 版的 `BIDS`、`SSDT` 或 `Visual Studio` 创建报表模型，但我们仍然可以在报表中将它们用作数据源。


    随着 `SQL Server 2008` 的发布，`报表生成器 2.0` 应用程序也应运而生。凭借其类似于其他 `Microsoft Office` 产品的
    `功能区` 技术，`报表生成器 2.0` 提供了熟悉的界面，并且超越了 `报表生成器 1.0`，它允许用户编写查询并使用存储过程直接从数据库访问数据，而无需报表模型这个额外的抽象层。这个新界面直观易用，其功能远超
    `报表生成器 1.0`。


    2010 年 4 月，`SQL Server 2008 R2` 发布，随之而来的是另一个版本的 `报表生成器`，它提供了数据集缓存功能，并与增强的可视化报表控件（如
    `地图`、`迷你图` 以及 `指标`）相集成。既然你现在已经熟悉了使用 `BIDS` 制作报表，那么在本章中，我们将把注意力转向使用 `报表生成器 1.0`、`2.0`
    和 `3.0` 应用程序来创建实用的现实世界报表。


    在我们开始之前需要注意的一点是，在本书撰写时，绝大多数组织仍在使用先前版本的 `SQL Server`。因此，我们决定在本书此版本中保留报表模型和 `报表生成器
    1.0`。如果 `SQL Server 2012` 是你组织拥有的唯一版本，或者如果你的公司正计划将所有东西迁移到 `SQL Server 2012`，你可以跳过关于报表模型和
    `报表生成器 1.0` 的章节。如果你的公司属于那些正迁移到 `2012` 的公司之一，请注意，目前没有将报表模型迁移到 `SQL Server 2012`
    的途径。在澄清了这一点之后，让我们开始吧。


    首先，我们将探索 `报表生成器 1.0` 及其组件。正如你将看到的，尽管编译报表的用户需要做一些设计工作，但管理员仍然需要设计向 `报表生成器 1.0` 客户端应用程序提供数据的报表模型。我们将从两个角度引导你完成使用
    `报表生成器 1.0` 的过程——首先基于用户输入开发和发布报表模型，然后基于该模型创建你自己的即席报表。我们将涵盖的三个步骤是：收集用户反馈、创建并发布报表模型，最后通过使用
    `报表生成器 1.0` 创建报表来测试报表模型：


    > *获取反馈*：由于我们与开发人员合作多年，我们知道交付新应用程序的最大问题之一是，有时用户拿到应用程序后期望它做更多的事情，或者期望它以不同于交付的方式来做某事。从用户的角度来看，期望是系统应该精确地做用户需要的事情。但对于开发人员来说，如果版本
    1 没有做到，就必须在版本 2 中实现。你可以通过实施标准的设计实践来避免这种冲突，这些实践总是预先考虑用户反馈。当同一个应用程序将被交付给拥有不同背景用户的的不同公司，而每个用户对流程应如何运作都有自己的理解时，这个过程尤其重要。在过去的几十年里，系统分析师会从用户群体那里获取信息，并将其转化为开发人员可以慢慢理解的技术设计。如今，大多数系统分析工作由开发人员直接完成，他们在项目的设计阶段与用户互动。在我们介绍如何构建供报表设计器使用的报表模型之前，我们将提供一些我们收到的关于用户希望看到何种报表的反馈样本。

    >

    > *构建报表模型*：报表模型是 `报表生成器 1.0` 的核心。报表模型充当底层数据源的语义描述。因为报表模型可以通过选择单个表、字段和值来简化可能复杂的整体数据库架构，所以它可以被比作一个
    `SQL Server` 视图。确实，正如你将在本章中看到的，报表模型的一个关键组成部分是 `数据源视图`。一旦 `DBA` 或开发人员创建了一个包含满足用户需求数据的报表模型，他们就可以将其发布到报表服务器，供
    `报表生成器 1.0`（即客户端报表设计器）使用。提供给 `报表生成器 1.0` 的所有数据都来自已发布的报表模型。我们将在本章中展示如何基于用户反馈创建和发布模型。

    >

    > *使用报表生成器 1.0*：`报表生成器 1.0` 是几种设计应用程序之一，可用于创建和发布 `SSRS` 报表，而无需像 `Visual Studio`
    或 `BIDS` 那样完整的开发环境。`报表生成器 1.0` 依赖预先发布的报表模型作为其数据源。正如你将看到的，`报表生成器 1.0` 的界面非常直观；事实上，对于需要基于预定义报表模板快速创建报表的用户来说，它是理想的选择。`报表生成器
    1.0` 不仅允许用户设计报表，还充当将完成的报表直接部署到报表服务器的发布工具。


    当我们开始讨论 `报表生成器 2.0` 时，用户对其访问的数据有更多控制权，你会发现你在 `报表生成器 1.0` 中学到的许多相同概念仍然适用。开发人员可能会发现自己仍然需要根据最终设计报表的用户的反馈来创建视图和存储过程。同样，许多开发人员可能会认为
    `报表生成器 2.0` 已具备他们所需的所有功能，并会选择它作为其首选的开发环境。'
- fmt: '## Getting User Feedback


    At this point in the book, you have built a report, `Employee Service Cost`, which
    breaks down the cost of health-care visits at several levels. You designed this
    report using `BIDS`, and it contains several grouping levels, interactive sorting,
    and drill-down functionality. The dataset for this report is a stored procedure
    that provides the desired fields from several tables in the `Pro_SSRS` database.
    Like the reports you will build with `Report Builder 1.0`, this stored procedure
    and report were created based on feedback from users who needed it. One objective
    when creating the stored procedure was to design it not only to address the requirements
    for one report, but also to be versatile enough to be reused for other similar
    reports. We will cover this issue when we show how to build a report model to
    meet the needs of the users and the report designers who will be creating and
    publishing reports with `Report Builder 1.0`.


    In the health-care industry (namely, in post-acute care such as home health and
    hospice), you have to follow many reporting requirements for state and federal
    agencies. From cost reports to patient admission and discharge information, different
    reports are needed by different departments for different reasons. One group of
    reports that is used by every department is the patient census. This report shows
    all the patients who are currently admitted to the health-care facility and who
    are receiving services. The report can be as simple as an alphabetized listing
    of patient names or as detailed as all the demographic information about each
    patient, such as where they live and who to contact in case of an emergency.


    Since the patient census is the most frequently requested report for customization,
    we will use it as the example in this chapter for the report model, making sure
    we provide enough data to meet both current and future needs.


    For the patient census report example, imagine that users have requested to see
    a daily total of patients who have been admitted to the facility. Such patients
    all have common data associated with them that is important when looking at a
    census. The information answers these types of questions:


    *   What is the patient’s primary diagnosis?

    *   What branch office is the patient currently admitted to?

    *   What is the patient’s length of stay in the facility?

    *   How many active patients are in each branch currently?

    *   What is the patient’s address, phone number, and other key demographic information?
    (This type of census report, often referred to as a face sheet, shows a lot of
    information about a patient in a compact location.)

    *   If the patient was discharged, when did that occur and what was the reason?
    Is it because they recovered, or did they transfer to a hospital?


    ![Image](images/square.jpg) `Note` The type of information we are discussing in
    this chapter is considered to be Protected Health Information (PHI) data, which,
    thanks to `HIPAA`, needs to be tightly guarded and accessible only to those who
    are permitted to use it. [Chapter 11](#Chapter11.html) covers how to secure access
    to data delivered through `SSRS`.


    You can answer all of these questions and more with a single query, which can
    form the foundation of the report model. So, in the `Pro_SSRS_2008R2` database,
    you will join several tables into a single data source view to provide the information
    needed to deliver the patient census. You have used most of these tables already
    when developing other reports, but we will review the database schema of the associated
    tables before showing how to build the report model. These are the tables you
    will use in this chapter’s example:


    *   `Admissions`

    *   `Branch`

    *   `Diag`

    *   `Discipline`

    *   `Documentlmage`

    *   `PatEMRDoc`

    *   `Employee`

    *   `PatDiag`

    *   `Dischg`

    *   `Patient`


    Each table contains specific information that is relevant to the individual patient’s
    admission history, and together they will provide enough data to create many kinds
    of census reports for many departments within the health-care agencies. You know
    the kinds of questions you will need to answer, and the tables have been designed
    to deliver that information based on direct feedback and requests for users. Now,
    let’s move on to designing the query and building the report model.


    ## Introducing the Report Model


    Just because you don’t understand the intricacies of putting all the parts of
    a car engine together does not mean you can’t drive, right? The same can be said
    for report designers who will design and publish reports using the ad hoc `Report
    Builder 1.0`. In this case, you have little need to understand the pieces and
    parts of the database structure in order to build reports. It is unavoidable,
    though, that *someone* must understand the database schema, just as mechanics
    must understand brake pads and fan belts. Building a versatile report model, which
    the report designer will use to create reports, will most likely fall under the
    authority of the `DBA`, data analyst, or `SQL` developer, who will have an intimate
    understanding of the data sources. In this section, we will show how to use the
    feedback gathered from the report consumers to develop a report model for the
    patient census reports that will serve to make the data easily accessible with
    logical and intuitive field names.


    You will perform the following procedures to create the report model for the Patient
    Census report model:


    1.  Create a report model project using `BIDS/SSDT`.

    2.  Create a data source.

    3.  Create a data source view.

    4.  Create the Patient Census report model based on the data source view.

    5.  Publish the Patient Census report model to the `SSRS` server.


    The process of building a report model consists of many individual steps, many
    of which are controlled entirely by stepping through available wizards. A report
    model can be complex or simple, based on your individual needs. For the sake of
    brevity, we will keep the sample model as simple as possible; you will be able
    to answer the feedback questions for the patient census, and you will be able
    to create and publish your own report model without any issues.'
