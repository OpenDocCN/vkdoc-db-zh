  trans: "\n由于解决方案中提供的 Web 服务已设置为依赖于该 Web 服务，因此我们无需为此测试新的数据调用。请继续启动调试过程，确保报表项目在解决方案中仍设置为启动项目。您可以将\
    \ ServiceYear 参数设置为 2010 并查看报表。一旦您向下钻取到某个患者，您将注意到报表正在处理并刷新数据。这次数据是通过 Web 服务获取的，该服务从数据库而非\
    \ XML 文件中获取数据。我们还包含了一个示例测试应用程序，它允许您通过 Windows 窗体应用程序调用 `Employee` 类的 `CostPerVisitXML`\
    \ 和 `CostPerVisitWS` 方法。这使您能够演练该类并在 Windows 窗体环境中逐步调试代码，这更容易进行测试和调试。\n\n![Image](img/square.jpg)\
    \ **提示** 编写测试应用程序是确保您的自定义代码在 SSRS 2012 报表中使用之前能够正确执行预期功能的好方法。您不仅可以像我们这样创建自定义的\
    \ Windows 窗体应用程序，而且使用适当版本的 Visual Studio 2010，您还可以创建专门的测试代码和自动化测试例程。\n\n### 调试自定义程序集\n\
    \n为了便于调试，设计、开发和测试自定义程序集的推荐方法是创建一个同时包含测试报表和自定义程序集的解决方案。这将使您能够轻松地从 Visual Studio\
    \ 中同时访问报表和将在其中使用的代码。\n\n现在我们将向您展示如何设置 Visual Studio 以允许调试刚刚编写的 `Employee` 程序集：\n\
    \n> 1.  在“解决方案资源管理器”中，右键单击解决方案，然后选择“配置管理器”。这将允许您设置用于调试的生成和部署选项。\n> 2.  选择“调试”作为“活动解决方案配置”选项。单击“关闭”以完成此选项选择。\n\
    > 3.  在解决方案管理器中，右键单击包含报表的项目，然后选择“设为启动项目”，以确保在开始调试时此项目在您的解决方案中首先运行。\n> 4.  再次在解决方案资源管理器中右键单击包含报表的项目，然后选择“项目依赖项”。\n\
    > 5.  在“项目依赖项”对话框中，选择 Employee 项目作为依赖项项目，如图 7-14 所示。这将告诉 Visual Studio 您的报表依赖于您编写的自定义程序集。\n\
    >     \n>     ![Image](img/9781430238102_Fig07-14.jpg)\n>     \n>     ***图 7-14.**\
    \ “项目依赖项”对话框*\n>     \n>     \n> 6.  单击“确定”保存更改，并关闭“项目依赖项”对话框。\n> 7.  再次右键单击“报表”项目，然后选择“属性”。\n\
    > 8.  选择“StartItem”，并将其设置为您要调试的报表。在此案例中，选择我们设置为使用自定义程序集的报表。“StartItem”选项明确告知 Visual\
    \ Studio 在以调试方式运行时具体运行哪个报表。单击“确定”以完成此选择。\n> 9.  在“解决方案资源管理器”中，选择 Employee 自定义程序集项目。\n\
    > 10. 右键单击此项目，然后选择“属性”。\n> 11. 从左侧菜单中选择“生成”部分。\n> 12. 在“生成”页面上的“输出路径”文本框中，输入报表设计器文件夹的路径。（默认情况下，此路径为\
    \ `C:\\Program Files (x86)\\Microsoft Visual Studio 10.0\\Common7\\IDE\\PrivateAssemblies`。）\n\
    >     \n>     ![Image](img/square.jpg) **注意** 您需要拥有必要的权限才能将此文件夹用作输出路径。默认情况下，标准“用户”组的成员没有此文件夹所需的写入/修改权限。当您以具有适当安全权限的用户（如管理员）登录时，请确保设置\
    \ PrivateAssemblies 文件夹的权限，以便在您以权限较低的帐户登录时允许必要的访问。您可以保留默认输出路径，但更改它可以节省一些工作。使用默认路径，您必须生成然后手动复制自定义程序集，以便在\
    \ Visual Studio 中运行的报表设计器能够找到并运行它。\n>     \n>     \n> 13. 现在，在您的自定义程序集代码中设置断点。如果不熟悉设置断点，只需打开您的\
    \ `employee.cs` 文件，然后在代码左侧的灰色侧面板中单击。在方法读取 XML 数据文件的位置设置断点，如图 7-15 所示。\n> 14. 确保将\
    \ Report 设置为启动项目，然后按 F5 以调试模式启动解决方案。当报表在表达式中使用自定义代码时，调试器将在执行到您设置的任何断点时停止。现在，您可以使用\
    \ Visual Studio 的所有强大调试功能来调试代码。\n\n![Image](img/square.jpg) **注意** 也可以使用多个 Visual\
    \ Studio 副本调试您的自定义程序集。有关详细信息，请参阅 SSRS 2012 BOL。\n\n![Image](img/9781430238102_Fig07-15.jpg)\n\
    \n***图 7-15.** 在自定义程序集中设置断点*\n\n### 排查项目故障\n\n如果修改了自定义程序集并重新生成，则必须重新部署它，因为报表设计器仅在报表设计器应用程序文件夹中查找它。如果您遵循了我们在“调试自定义程序集”部分中的建议更改了输出路径，那么每次在调试时重新生成它，它都应该位于正确的位置。否则，您将需要按照“部署自定义程序集”部分中的说明将其移动到报表设计器应用程序文件夹。请记住，Visual\
    \ Studio 不会将您的自定义程序集部署到您的 SSRS 2012 服务器计算机；您必须手动复制它。最后，在开发期间，您可能希望将任何自定义程序集的版本保持为相同的值。每次更改自定义程序集的版本时，必须更改对它的引用，如本章前面所述，在“报表属性”对话框的“引用”选项卡上进行修改。一旦您的报表投入生产，而您希望跟踪版本信息，您可以使用\
    \ GAC，它可以容纳多个版本；这意味着您只需重新部署那些使用新版本新功能的报表。如果您希望所有报表都使用新版本，您可以设置绑定重定向，以便将所有对旧程序集的请求都发送到新程序集。您需要修改报表服务器的\
    \ `Web.config` 文件和 `Rsreportserver.config` 文件。\n\n如果您正在使用自定义程序集，并且报表输出显示 #Error，则您可能遇到了权限问题。有关如何正确设置权限的信息，请参阅本章中的“部署自定义程序集”部分。\n\
    \n### 小结\n\n在本章中，您学习了如何在报表中使用自定义代码，并且我们讨论了处理 SSRS 2012 的一些其他编程方面。第 8 章、9 和 10\
    \ 章将在此基础上构建，因为我们将向您展示如何编写自定义应用程序来呈现报表、将它们部署到报表服务器，以及使用订阅安排它们运行。\n\n## C H A P\
    \ T E R  8\n"
- fmt: "## 部署报告\n\n在整个报告的生命周期中——从创建到维护——管理员、开发人员，甚至现在使用报表生成器的最终用户都需要持续地将报告部署到SSRS\
    \ 2012服务器上。部署报告仅仅意味着将RDL文件上传到SSRS 2012服务器上，以便你的用户可以使用它（有关这些报告的RDL格式的具体信息，请参阅[第3章](#Chapter03.html#ch3)）。\n\
    \n幸运的是，SSRS 2012提供了几种部署报告的方式：\n\n> *通过Web浏览器使用报表管理器界面*：这个简单的方法允许任何拥有RDL文件和适当SSRS权限的人将其上传到SSRS\
    \ 2012服务器。如果你在开发报告的RDL文件的应用程序没有提供上传到服务器的方法，这将非常有用。如果你想对RDL文件进行快速编辑——比如纠正一个拼写错误——使用像记事本这样的应用程序（它没有内置的上传报告的方法）时，这个方法也很有用。我们在[第8章](#Chapter08.html#ch8)中介绍了这个场景，其中使用记事本来修改报告。\n\
    > \n> *使用报表生成器 3.0*：报表生成器3.0工具是SSRS 2008 R2的一个新特性，并且在SSRS 2012中仍在使用。它为不熟悉`Visual\
    \ Studio IDE`的用户提供了一个简单的界面来创建和编辑数据源及报告。\n> \n> *在BIDS/Visual Studio中使用部署选项*：这种方法允许你直接从开发环境中将报告部署到SSRS\
    \ 2012服务器。如果你正在使用`BIDS/Visual Studio`并且可以直接访问要部署报告的报表服务器，这是最简单的方法之一。\n> \n> *使用`rs.exe`命令行工具*：`rs.exe`命令行工具是一个运行时环境，用于以特殊格式的脚本文件形式执行`VB\
    \ .NET`代码。你部署报告的方式与本列表下一项中的方法相同。在本节后面的“使用`rs.exe`工具”部分，我们将介绍如何使用`rs.exe`以编程方式部署报告和创建数据源。\n\
    > \n> *以编程方式使用SSRS Web服务*：这种方法让你完全控制部署过程，并额外具有创建任何你想要的UI的优势。与`rs`命令行工具不同，你可以选择编程语言，并拥有`Visual\
    \ Studio 2012`的全部功能来帮助你开发自定义界面。在[第6章](#Chapter06.html#ch6)中，我们使用了SOAP API（也称为报表服务器Web服务）从SSRS\
    \ 2012服务器检索有关报告的报告参数信息，然后使用该信息为参数选择生成了一个Windows窗体UI。在本章中，你将使用报表服务器Web服务将报告发布到SSRS\
    \ 2012服务器。当你需要将报告的部署集成到你的自定义应用程序的安装、设置或运行时环境中时，这种类型的接口非常有用。\n\n### 使用报表管理器\n\n\
    要使用报表管理器界面部署报告，只需打开浏览器并使用诸如 [`http://localhost/reports/`](http://localhost/reports/)\
    \ 的地址导航到你的SSRS 2012服务器。你会看到一个类似于[图 8-1](#Chapter08.html#fig_8_1)所示的屏幕。\n\n![Image](images/9781430238102_Fig08-01.jpg)\n\
    \n**图 8-1.** 报表管理器\n\n如你所见，报表管理器工具栏上提供了一个“上传文件”选项。选择“上传文件”会打开一个标准的基于浏览器的上传对话框，如[图\
    \ 8-2](#Chapter08.html#fig_8_2)所示。\n\n![Image](images/9781430238102_Fig08-02.jpg)\n\
    \n**图 8-2.** 报表管理器“上传文件”对话框\n\n使用此对话框，你可以浏览到要上传的RDL文件并进行上传。你也可以在这里上传数据源文件以及RDS文件，但它们不会被自动识别为数据源。我们将在本章后面向你展示如何正确创建数据源。\n\
    \n浏览到[第6章](#Chapter06.html#ch6)的示例文件，并选择报告文件夹中的`EmployeeServiceCost.rpt`文件上传到你的报表服务器。报表管理器会将文件放入当前文件夹（即你发起上传过程的文件夹）。\n\
    \n请注意，新上传的报告不再像某些旧版SSRS那样被标记为“新”。你上传的每个报告在报表管理器界面中都会有一个下拉菜单。此菜单允许你执行一些管理功能并打开属性编辑页面。这个“管理”选项可以在下面的[图\
    \ 8-3](#Chapter08.html#fig_8_3)中看到。\n\n![Image](images/9781430238102_Fig08-03.jpg)\n\
    \n**图 8-3.** 报表管理器及一个最近上传的报告\n\n这个管理选项允许你修改报告的属性，例如名称和描述，如[图 8-4](#Chapter08.html#fig_8_4)所示。\n\
    \n在[图 8-4](#Chapter08.html#fig_8_4)的底部中央，有一个复选框，位于“应用”按钮上方，它允许你执行以下操作：\n\n> *在磁贴视图中隐藏报告*：如果你不想让能访问SSRS\
    \ 2012服务器的用户知道某些报告的存在，或者不想让他们看到报告的详细信息，这可能很有用。请记住，这仅在磁贴视图中隐藏报告，而不是在详细视图中隐藏。当你需要防止用户查看文件夹内容或运行他们不应访问的报告时，你应该使用SSRS安全属性。\n\
    \n然后，屏幕顶部的菜单允许你：\n\n> *删除报告*：这使你能够删除不再需要的报告。\n> \n> *将报告移动到报表服务器上的另一个位置*：这允许你将报告组织到文件夹中，以便进行组织和安全管理。\n\
    > \n> *创建链接报告*：此选项允许你基于原始报告创建一个链接报告。这使你可以在服务器上的某个位置保留一份报告用于部署，同时在服务器上的其他位置有多个副本可用，而无需在报告更改时重新部署它们。\n\
    > \n> *下载RDL*：你可以将报告RDL下载为文件进行编辑。当你想要对报告进行微小修改（例如更改单词拼写或修改表达式）时，这可能很有用。请注意，此方法仅提供对RDL文件的访问；你仍然需要使用另一个程序来编辑文件，然后上传修改后的文件。\n\
    > \n> *通过上传RDL文件的新副本来替换RDL*：如果你已经下载并编辑了RDL文件，那么此选项允许你上传编辑后的副本。\n\n![Image](images/9781430238102_Fig08-04.jpg)\n\
    \n**图 8-4.** 报告属性页面\n\n使用[图 8-4](#Chapter08.html#fig_8_4)中页面左侧的菜单，你可以执行以下操作：\n\
    \n**注意：** 由于原始文本在此处结束，以下部分未完成。排版到此为止。"
  raw: "## Deploying Reports\n\nThroughout the lifecycle of a report—from creation\
    \ to maintenance—administrators, developers, and now even end users using Report\
    \ Builder need to continually deploy reports to the SSRS 2012 server. Deploying\
    \ a report simply means uploading the RDL file onto the SSRS 2012 server so that\
    \ your users can use it (for more information on the specifics of the RDL format\
    \ of these reports, see [Chapter 3](#Chapter03.html#ch3)).\n\nFortunately, SSRS\
    \ 2012 provides several means for deploying reports:\n\n> *Using the Report Manager\
    \ interface through your Web browser*: This simple method allows anyone with an\
    \ RDL file and the proper SSRS permissions to upload it to the SSRS 2012 server.\
    \ This can be especially useful if you’re developing your report’s RDL files in\
    \ an application that doesn’t provide you with a method to upload them to the\
    \ server. It’s also useful if you want to make a quick edit of the RDL file—say\
    \ to change a misspelled word—using an application such as Notepad, which doesn’t\
    \ offer a built-in way to upload the report. We cover this scenario in [Chapter\
    \ 8](#Chapter08.html#ch8), where Notepad is used to modify a report.\n> \n> *Using\
    \ Report Builder 3.0*: The Report Builder 3.0 utility was a new feature to SSRS\
    \ 2008 R2 and it is still used in SSRS 2012\\. It provides the user who is unfamiliar\
    \ with the Visual Studio IDE with a simple interface by which to create and edit\
    \ data sources and reports.\n> \n> *Using the Deploy option in BIDS/Visual Studio*:\
    \ This method allows you to deploy your reports to the SSRS 2012 server from directly\
    \ within your development environment. If you’re using BIDS/Visual Studio and\
    \ have direct access to the report server to which you want to deploy your reports,\
    \ this is one of the easiest options.\n> \n> *Using the rs.exe command-line utility*:\
    \ The rs.exe command-line utility is a runtime environment that is used to execute\
    \ VB .NET code in the form of specially formatted script files. You deploy the\
    \ report in the same way as the method in the next item of this list. Later in\
    \ the section “Using the rs.exe Utility,” we will cover how to deploy reports\
    \ and create data sources programmatically using rs.exe.\n> \n> *Programmatically,\
    \ using the SSRS Webservice*: This method gives you complete control over the\
    \ deployment process with the added advantage of creating any type of UI you want.\
    \ Unlike the rs command-line utility, you have your choice of languages and the\
    \ full power of Visual Studio 2012 to help you develop your custom interface.\
    \ In [Chapter 6](#Chapter06.html#ch6), we used the SOAP API, otherwise known as\
    \ the Report Server Web service, to retrieve report parameter information about\
    \ reports from the SSRS 2012 server, and then used that information to generate\
    \ a Windows Forms UI for parameter selection. In this chapter, you’ll use the\
    \ Report Server Web service to publish reports to the SSRS 2012 server. This type\
    \ of interface is useful when you need to integrate the deployment of reports\
    \ into your setup, installation, or runtime environment of your custom application.\n\
    \n### Using Report Manager\n\nTo deploy reports using the Report Manager interface,\
    \ simply open your browser and navigate to your SSRS 2012 server using an address\
    \ such as [`http://localhost/reports/`](http://localhost/reports/)`.` You’ll see\
    \ a screen similar to the one shown in [Figure 8-1](#Chapter08.html#fig_8_1).\n\
    \n![Image](images/9781430238102_Fig08-01.jpg)\n\n***Figure 8-1.** Report Manager*\n\
    \nAs you can see, an Upload File option is available on the Report Manager toolbar.\
    \ Selecting Upload File opens a standard browser-based upload-style dialog box,\
    \ such as the one shown in [Figure 8-2](#Chapter08.html#fig_8_2).\n\n![Image](images/9781430238102_Fig08-02.jpg)\n\
    \n***Figure 8-2.** Report Manager Upload File dialog box*\n\nUsing this dialog\
    \ box, you can browse to the RDL file that you want to upload and then upload\
    \ it. You can also upload data source files here too, as well as RDS files, but\
    \ they won’t be automatically seen as data sources. We will show you later in\
    \ the chapter how to create datasources correctly.\n\nBrowse to sample files for\
    \ [Chapter 6](#Chapter06.html#ch6) and select the EmployeeServiceCost.rpt file\
    \ in the reports folder to upload to your report server. The Report Manager places\
    \ the file into the current folder (the one from which you initiated the upload\
    \ process).\n\nNote that newly uploaded reports are no longer tagged with a marker\
    \ showing that they are new, which was done in some older versions of SSRS. Each\
    \ report that you upload will have a dropdown menu from within the report manager\
    \ interface. This menu allows you to perform some management functions and open\
    \ the properties editing page. This “manage” option can be seen below in [Figure\
    \ 8-3](#Chapter08.html#fig_8_3).\n\n![Image](images/9781430238102_Fig08-03.jpg)\n\
    \n***Figure 8-3.** Report Manager with a recently uploaded report*\n\nThis manage\
    \ option allows you to modify the properties of the report, such as the name and\
    \ description, as shown in [Figure 8-4](#Chapter08.html#fig_8_4).\n\nThere is\
    \ a checkbox in the bottom-center of [Figure 8-4](#Chapter08.html#fig_8_4), just\
    \ above the Apply button, that allows you to do the following:\n\n> *Hide the\
    \ report in the tile view*: This can be useful if you don’t want users with access\
    \ to the SSRS 2012 server to know that certain reports exist or if you don’t want\
    \ them to see the detailed information about the report. Remember that this only\
    \ hides the report in the tile view and not the detail view. You should use SSRS\
    \ security properties when you need to prevent a user from seeing the contents\
    \ of folders or running reports they shouldn’t have access to.\n\nThen, the menu\
    \ going across the top of the screen allows you to:\n\n> *Delete the report*:\
    \ This gives you the ability to remove reports that are no longer needed.\n> \n\
    > *Move the report to another location on your report server*: This allows you\
    \ to organize the reports into folders for organizational and security purposes.\n\
    > \n> *Create a linked report*: This option allows you to create a linked report\
    \ that is based on the original report. This allows you to keep one copy of the\
    \ report for deployment somewhere on the server, but have multiple copies available\
    \ in other locations on the server without the need to redeploy them each time\
    \ the report is changed.\n> \n> *Download the RDL:* You can download the report\
    \ RDL to a file that you can edit. This can be useful when you want to make a\
    \ minor modification to a report, such as changing the spelling of a word or modifying\
    \ an expression. Keep in mind that this method only provides you access to the\
    \ RDL file; you still have to use another program to edit the file and then you\
    \ have to upload the modified file.\n> \n> *Replace the RDL by uploading a new\
    \ copy of the RDL file*: If you’ve downloaded and edited the RDL file, then this\
    \ option allows you to upload the edited copy.\n\n![Image](images/9781430238102_Fig08-04.jpg)\n\
    \n***Figure 8-4.** Report Properties page*\n\nUsing the menu on the left side\
    \ of the page in [Figure 8-4](#Chapter08.html#fig_8_4), you can do the following:"
