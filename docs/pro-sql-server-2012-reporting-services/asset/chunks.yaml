    Now that you have the form built and the drop down list populated with data from
    the SSRS Web service, you can finalize the application by allowing the user to
    render the reports from the list. You will now go back to the generated code for
    the Click event of the button you added to the Web page. In this section, you
    will set the processing mode, the report server URL, and the path to the report
    you want to render. Finally, the code will render the report and it will be displayed
    in the Report Viewer control. [Listing 9-16](#Chapter09.html#list_9_16) shows
    the populated on click event in the code view of the web page.


    ***Listing 9-16.** Populating the RenderReport Button Click Method*


    `protected void renderReport_Click(object sender, EventArgs e)`

    `        {`

