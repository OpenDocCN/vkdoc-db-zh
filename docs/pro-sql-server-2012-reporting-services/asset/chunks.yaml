- fmt: "#### Laying Out the Form\n\nFrom the Toolbox, add one label, one textbox,\
    \ and one button near the top of the form, set the label text to `Report server`,\
    \ and name the textbox `reportServer` in the textbox properties. Name the button\
    \ `getFolders` and set its text to the word `Go`. You’ll use the `reportServer`\
    \ textbox to allow users to enter in the report server name that they want to\
    \ deploy to.\n\nNext, add a TreeView control to the center of the form and name\
    \ it `ssrsFolders`. You’ll use it to display a list of available folders on the\
    \ server where you can upload your report when the user enters in a server name\
    \ and clicks the `Go` button.\n\nAdd one label, one textbox, and one button near\
    \ the bottom of the form; set the label text to `Report file`; name the textbox\
    \ `reportFile`; name the button `browseFile`; and set the text of the button to\
    \ `Browse`. You’ll use the `reportFile` textbox to accept or display the path\
    \ name and file name of the report file you want to upload to the specified SSRS\
    \ 2012 server. You’ll use the `Browse` buttons to choose the form that accepts\
    \ the users’ input and allows them to select a report file for deploying.\n\n\
    After you’ve added all these controls, the form should look something like [Figure\
    \ 8-14](#Chapter08.html#fig_8_14).\n\n![Image](images/9781430238102_Fig08-14.jpg)\n\
    \n**Figure 8-14.** Publisher, the example report publisher\n\n#### Coding the\
    \ Form\n\nNow that you have the form laid out, you’ll add code to handle the functions\
    \ necessary to allow users to do the following:\n\n- Enter in a server name.\n\
    - Get a list of the folders available on that server.\n- Select a target folder\
    \ and an RDL file to upload.\n\n#### Allowing Users to Enter a Server Name\n\n\
    When a user types in a server name on the form, the code needs to build the URL\
    \ that fully identifies the SSRS 2012 server to deploy the RDL file to.\n\nFirst,\
    \ you will create a class-level variable to hold the reference to the report server,\
    \ much as you did in the SSRS viewers in [Chapter 5](#Chapter05.html#ch5). You\
    \ do this by adding the variable definition `private ReportingService2010 rs;`\
    \ to the class, as is shown in [Listing 8-4](#Chapter08.html#list_8_4).\n\n**Listing\
    \ 8-4.** Class-level Variable in Context\n\n```csharp\npublic partial class Publisher  :   Form\
    \ {\nprivate ReportingService2010 rs;\npublic Publisher()\n```\n\nTo build the\
    \ URL that identifies the server based on the user input, you first instantiate\
    \ the Report Server Web service and then set the `URL` property to reflect the\
    \ name of the server that the user entered into the `reportServer` textbox. We\
    \ will want to form this URL for the user, so they only need to enter the server\
    \ name to connect.\n\nTo do this, first create a short function to check the server\
    \ name that the user enters and then append the rest of the path name to the Reporting\
    \ Services Web service to make up the complete URL necessary to reference the\
    \ Reporting Services Web service on the desired server. By constructing the URL\
    \ based on the user’s input, you can use the report deployment application to\
    \ deploy the reports on any SSRS 2012 server where the user has permission to\
    \ do so. Start by adding the code shown in [Listing 8-5](#Chapter08.html#list_8_5)\
    \ into the `Publisher` class.\n\n**Listing 8-5.** Get Report Server URL\n\n```csharp\n\
    private string GetRSURL() {\n        if (reportServer.Text.StartsWith(\"`Error!\
    \ Hyperlink reference not valid.`\"))\n                return reportServer.Text\
    \ + \"/reportserver/ReportService2010.asmx\";\n        else\n                return\
    \ \"`Error! Hyperlink reference not valid.`\" + reportServer.Text +\n        \"\
    /reportserver/ReportService2010.asmx\";\n}\n```\n\n#### Populating the TreeView\
    \ Control With a List of Folders\n\nNow you’ll use the Reporting Services Web\
    \ service to retrieve a list of objects from the server and use them to populate\
    \ the `ssrsFolders` TreeView control. We’ll do this by placing a call to the `ListChildren`\
    \ method of the Report Server Web service. The `ListChildren` method takes two\
    \ parameters:\n\n- `Item`: The full path name of the parent folder.\n- `Recursive`:\
    \ A Boolean expression that indicates whether to return the entire tree of child\
    \ items below the specified item. The default value is false.\n\n![Image](images/square.jpg)\
    \ **Note** The `ListChildren` method returns all objects on the report server,\
    \ including data sources, report parts, and reports, not just folders. In this\
    \ example, you’ll filter out everything but the folders because you’re only interested\
    \ in showing the user the folder structure. You do this by using the `ItemType`\
    \ property of the child object and then testing it against the string “Folder”.\n\
    \nMake sure the `Publisher.cs` form is open in the design view and double-click\
    \ the `Go` button. This creates an empty method to handle the button’s click event.\
    \ Add the code in [Listing 8-6](#Chapter08.html#list_8_6) to the method.\n\n**Listing\
    \ 8-6.** Code to Populate the TreeView Control\n\n```csharp\nssrsFolders.Nodes.Clear();\n\
    rs = new ReportingService2010();\nrs.Credentials = System.Net.CredentialCache.DefaultCredentials;\n\
    CatalogItem[] items = null;\nrs.Url = GetRSURL();\n\nTreeNode root = new TreeNode();\n\
    root.Text = \"Root\";\nssrsFolders.Nodes.Add(root);\nssrsFolders.SelectedNode\
    \ = ssrsFolders.TopNode;\n\n// Retrieve a list items from the server\ntry\n{\n\
    \          items = rs.ListChildren(\"/\", true);\n          int j = 1;\n\n   \
    \       // Iterate through the list of items and find all of the folders and display\
    \ them to the user\n          foreach (CatalogItem ci in items)\n          {\n\
    \                   if (ci.TypeName == \"Folder\")\n                   {\n   \
    \                          Regex rx = new Regex(\"/\");\n                    \
    \         int matchCnt = rx.Matches(ci.Path).Count;\n                        \
    \     if (matchCnt > j)\n                             {\n                    \
    \                  ssrsFolders.SelectedNode =ssrsFolders.SelectedNode.LastNode;\n\
    \                                      j = matchCnt;\n                       \
    \      }\n                             else if (matchCnt < j)\n              \
    \               {\n                                      ssrsFolders.SelectedNode\
    \ =ssrsFolders.SelectedNode.Parent;\n                                      j =\
    \ matchCnt;\n                             }\n                             AddNode(ci.Name);\n\
    \                   }\n          }\n}\n\ncatch (SoapException ex)\n{\n       \
    \ MessageBox.Show(ex.Detail.InnerXml.ToString());\n}\ncatch (Exception ex)\n{\n\
    \        MessageBox.Show(ex.Message);\n}\n\n// Make sure the user can see that\
    \ the root folder is selected  by default\nssrsFolders.HideSelection = false;\n\
    ```\n\nRight below the method for the `Go` button’s click event, add the following\
    \ method as shown in [Listing 8-7](#Chapter08.html#list_8_7).\n\n**Listing 8-7.**\
    \ `AddNode` Method\n\n```csharp\nprivate void AddNode(string name) {\n       \
    \ TreeNode newNode = new TreeNode(name);\n        ssrsFolders.SelectedNode.Nodes.Add(newNode);\n\
    }\n```\n\nYou tell the `ListChildren` method to start at the root folder by passing\
    \ in a “/” as the starting point, and also set the recursive option to true, which\
    \ causes the `ListChildren` method to iterate through all the folders and subfolders\
    \ on the SSRS 2008 server. You use this information to create nodes in the TreeView\
    \ control to display each folder in a hierarchy that represents the hierarchy\
    \ of the folders on the server. Use a regular expression to look for the number\
    \ of “/” characters in the path of each `CatalogItem` to determine how deep you\
    \ are in the hierarchy (one level, two levels, and so on)."
