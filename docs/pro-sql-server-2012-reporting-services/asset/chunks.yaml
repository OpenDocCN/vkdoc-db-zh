  trans: "## 介绍模式设计\n\n多年来，开发人员不断为应用添加功能，并多次修改数据库模式以适应新功能并捕获所需数据。这些数据不仅用于执行创建账单、向患者账户记入付款等业务流程，还用于提供有价值的报告，展示公司服务患者的效果。由于此类医疗保健机构提供长期护理，客户需要了解患者病情是否随时间推移有所改善，以及为其提供的护理总体成本是多少。\n\
    \n为该应用设计的数据库包含 200 多张表和许多存储过程。在本书中，你将使用该数据库的一个子集来学习如何开发显示患者护理成本的报告。整本书中，你将使用八张主要表进行查询和存储过程操作，并且在接下来的三章中，你将开始使用其中一些表来构建报告。这些表如下所示：\n\
    \n> `Trx`：主要的事务数据表，存储详细的患者服务信息。我们使用术语 `services` 来指代为患者护理提供的、有相关成本的项目。\n>\n> `Services`：存储在\
    \ `Trx` 表中找到的详细行项目的名称和类别。服务可以是临床访视，如专业护士访视，但也可能包括可计费的供应品，如纱布绷带或注射器。\n>\n> `ServiceLogCtgry`：对相似服务进行的主要分组，提供更高级别的归类。例如，所有访视都可以关联到一个用于报告的“访视”\
    \ `ServiceLogCtgry`。\n>\n> `Employee`：存储特定于 `员工` 的记录，在此上下文中指临床医生或其他工作人员，例如探访临终关怀患者的牧师。每个存储在\
    \ `Trx` 表中的访视都会分配一名员工。\n>\n> `Patient`：包含接受护理的患者的人口统计信息。该表与 `Employee` 表类似，直接链接到\
    \ `Trx` 表以获取详细的事务数据。\n>\n> `Branch`：存储接受护理患者的分支机构名称和位置。在示例报告中，`分支机构` 是提供访视和服务的成本中心。\n\
    >\n> `ChargeInfo`：包含与个别 `Trx` 记录相关的、特定于费用的附加信息。费用具有关联的费用金额，这与同样存储在 `Trx` 表中的付款和调整不同。\n\
    >\n> `Diag`：存储所护理患者的主要诊断，并链接到 `Trx` 表中的记录。\n\n图 2-1 展示了这八张表的图形布局以及它们的连接方式。\n\n\
    ![Image](img/9781430238102_Fig02-01.jpg)\n\n**图 2-1.** 查看示例应用的数据库表\n\n## 了解你的数据：利用小程序实现快速技巧\n\
    \n对于每个报表编写者来说，熟悉特定数据库中数据的位置都需要时间。当然，拥有供应商提供的数据库图或模式是一个有用的工具，我们在这里很幸运能拥有它，但这并非总是可用。有一天，面对着为某个特定缺失数据寻找正确表的困境，我们决定编写一个存储过程，命名为\
    \ `sp_FieldInfo`。它返回特定数据库中所有具有相同字段名（通常是主键或外键字段）的表的列表。例如，在医疗保健数据库中，如果你想获取包含 `PatID`\
    \ 字段（用于连接多个表的患者 ID 号）的表的列表，可以使用以下命令：\n\n`sp_FieldInfo PatID`\n\n输出结果将类似于表 2-1\
    \ 所示。\n\n![Image](img/tab_2_1.jpg)\n\n有了这些信息，你至少可以推断出，例如，患者的诊断信息存储在 `PatDiag`\
    \ 表中。然而，表和字段的名称并不总是直观命名的。当我们不时遇到这样的数据库时，可以运行 SQL Server Profiler 跟踪并对相关应用程序执行一些常规任务，例如打开表单并搜索一个可识别的记录，以获取捕获数据的起点。Profiler\
    \ 会返回生成的查询，其中包含表和字段名称，我们可以利用这些来辨别数据库结构。\n\n![Image](img/square.jpg) **提示** SQL\
    \ Server Profiler 是一个出色的工具，不仅可以捕获实际针对服务器执行的查询和存储过程，还可以捕获性能数据，例如执行时间长度、中央处理器（CPU）周期和输入/输出（I/O）度量，以及发起查询的应用程序。因为你可以将这些数据直接保存到\
    \ SQL 表中，所以可以轻松分析它，它甚至可以作为 SSRS 中报告的一个良好数据源。\n\n清单 2-1 显示了创建 `sp_fieldinfo` 存储过程的代码。你可以在代码下载文件\
    \ `CreateFieldInfo.sql` 的 SQL Queries 文件夹中找到此查询的代码。\n\n**清单 2-1.** 创建 `sp_FieldInfo`\
    \ 存储过程\n\n```\nIF EXISTS (SELECT * FROM INFORMATION_SCHEMA.ROUTINES\n        \
    \       WHERE ROUTINE_NAME = 'sp_FieldInfo'\n               AND SPECIFIC_SCHEMA\
    \ = 'dbo')\n       DROP PROCEDURE [dbo].[sp_FieldInfo]\nGO\nCREATE PROCEDURE [dbo].[sp_FieldInfo]\n\
    (\n        @column_name VARCHAR(128) = NULL\n)\nAS\nSELECT\n        TABLE_NAME\
    \ AS [Table Name]\n        , RTRIM(COLUMN_NAME) AS [Field Name]\nFROM\n      \
    \  INFORMATION_SCHEMA.COLUMNS\nWHERE\n        COLUMN_NAME LIKE '%' + @column_name\
    \ + '%'\n```\n\n### 介绍查询设计基础\n\n无论你是习惯通过文本编辑器手动编写 SQL 查询的经验丰富者，还是更倾向于图形化设计查询的人，结果才是关键。准确性、通用性和底层查询的效率是设计者努力实现的三大目标。准确性至关重要，但一个性能良好且足够通用、可用于多个报告的查询，会使后续的报告设计任务变得容易得多。对于可扩展性和低响应时间，效率至关重要。一个需要\
    \ 15 分钟才能渲染的出色报告，会成为用户很少运行的报告。在开始开发报告查询时，请牢记以下目标：\n\n> *查询必须返回准确的数据*：随着查询逻辑变得复杂，在标准条件和多表连接众多的情况下，不准确的可能性会增加。\n\
    >\n> *查询必须具备可扩展性*：在查询开发和测试过程中，要注意随着用户负载增加，其性能可能会发生显著变化。我们将在第 10 章介绍带模拟负载的性能监控。不过，在本章中，我们将展示如何使用工具测试单次执行的查询响应时间以提高性能。\n\
    >\n> *查询应具备通用性*：通常，单个查询或存储过程可以同时驱动多个报告，节省维护、管理和开发报告的时间。然而，为了一次性支持详细信息和摘要而向报告提供过多数据会影响性能。平衡通用性和效率非常重要。"
- fmt: "## 创建简单的图形化查询\n\n查询设计通常始于一个请求。作为报表编写者或数据库管理员（DBA），您可能经常需要生成那些第三方应用程序附带的标准报表中无法提供的数据。\n\
    \n让我们从一个假设的场景开始。假设您收到一封电子邮件，详细说明了一个需要为即将到来的会议创建和部署的报表。已经确定无法从任何已知报表中获取数据，但您可以通过一个简单的自定义查询来导出这些数据。\n\
    \n在这个第一个例子中，您将查看以下来自一个医疗保健组织的请求：\n\n> *交付一份报告，显示按服务次数统计的十大最常见诊断。*\n\n假设您熟悉数据库，可以在\
    \ SSMS 中开始查询设计过程，既可以通过图形界面，也可以使用通用查询设计器编写查询代码。这两种方法在 SSMS 中都可用。\n\n![Image](images/square.jpg)\
    \ **注意**  我们将在[第三章](#Chapter03.html)介绍设置构建 SSRS 报表所需的数据源连接。目前，您将直接使用 SSMS 中可用的查询设计工具连接到数据。需要提及的是，尽管您在\
    \ SSMS 中设计查询，但在 BIDS 环境中也有类似的工具，因此您可以在创建报表的同时创建查询。在此案例中我们选择 SSMS，是因为它包含数据库对象列表，在开始开发查询时您可能需要引用这些对象。\n\
    \n我们将向您展示如何使用图形工具设计查询，以演示底层 SQL 代码是如何创建的。您可以通过在 SSMS 的新查询窗口中任意位置右键单击并选择“在编辑器中设计查询”来访问图形查询设计器（参见[图\
    \ 2-2](#Chapter02.html#fig_2_2)）。\n\n![Image](images/9781430238102_Fig02-02.jpg)\n\
    \n**图 2-2.** 在 SSMS 中访问查询设计工具\n\n打开查询设计器后，您可以执行添加和连接其他表、使用任务窗格进行排序、分组和选择条件等任务（参见[图\
    \ 2-3](#Chapter02.html#fig_2_3)）。\n\n![Image](images/9781430238102_Fig02-03.jpg)\n\
    \n**图 2-3.** 在 SSMS 中使用图形查询设计器\n\n这个初始查询相对简单；它使用在关系列上连接的四个表。通过图形查询设计器，您可以添加基本条件和排序，并且只为报表选择两个字段：患者计数和特定的医学诊断。您可以将计数的排序类型设为降序，以便查看最常见诊断的趋势。您可以将\
    \ SQL 查询直接传输到报表中，我们将在[第六章](#Chapter06.html)展示如何操作。[清单 2-2](#Chapter02.html#list_2_2)\
    \ 显示了生成的查询。您可以在 Apress 网站（[`http://www.apress.com`](http://www.apress.com)）的源代码/下载区域的\
    \ SQL Queries 文件夹中找到此查询的代码文件 `Top10Diagnosis.sql`。\n\n**清单 2-2.** 使用图形查询设计器生成以返回十大患者诊断的\
    \ SQL 查询\n\n```sql\nSELECT TOP 10\n       COUNT(DISTINCT Patient.PatID) AS [Patient\
    \ Count]\n       , Diag.Dscr AS Diagnosis\nFROM\n       Admissions\n       INNER\
    \ JOIN Patient ON Admissions.PatID = Patient.PatID\n       INNER JOIN PatDiag\
    \ ON Admissions.PatProgramID = PatDiag.PatProgramID\n       INNER JOIN Diag ON\
    \ PatDiag.DiagTblID = Diag.DiagTblID\nGROUP BY\n       Diag.Dscr\nORDER BY\n \
    \      COUNT(DISTINCT Patient.PatID) DESC\n```\n\n[表 2-2](#Chapter02.html#tab_2_2)\
    \ 显示了此查询的输出。\n\n![Image](images/tab_2_2.jpg)\n\n这个特定的聚合查询结果集很小。尽管它可能处理数万条记录来生成最终的十条记录，但它运行时间不到一秒。这表明该查询是高效的，至少在单用户执行场景下是如此。\n\
    \n此类查询旨在为专业人士提供快速审查的数据，他们将根据汇总数据的结果做出业务决策。在此示例中，医疗管理员会注意到对物理治疗的需求，并可能审查公司内物理治疗师的人员配置水平。由于物理治疗师需求量大，管理员可能需要调查护理物理治疗患者的成本。"
  raw: '#### Creating a Simple Query Graphically


    Query design typically begins with a request. As the report writer or database
    administrator (DBA), you’re probably often tasked with producing data that’s not
    available through the standard reports often delivered with third-party applications.


    Let’s begin with a hypothetical scenario. Say you receive an e-mail that details
    a report to be created and deployed for an upcoming meeting. It has already been
    determined that the data is unavailable from any known reports, yet you can derive
    the data using a simple custom query.


    In this first example, you’ll look at the following request for a healthcare organization:


    > *Deliver a report that shows the ten most common diagnoses by service count.*


    Assuming you are familiar with the database, begin the query design process in
    SSMS, either graphically or by coding the query with the generic query designer.
    Both methods are available within SSMS.


    ![Image](images/square.jpg) **Note**  We’ll cover setting up the data source connection
    required for building an SSRS report in [Chapter 3](#Chapter03.html). For now,
    you’ll connect directly to the data with the available query design tools within
    SSMS. It is important to mention that though you are designing the query within
    SSMS, similar tools are available within the BIDS environment so that you can
    create your queries at the same time you create your report. We chose SSMS in
    this case because it contains lists of database objects that you may need to reference
    as you begin to develop the query.


    We’ll show you how to design the query with the graphical tool to demonstrate
    how the underlying SQL code is created. You can access the graphical query designer
    by right-clicking anywhere in the new query window within SSMS and selecting Design
    Query in Editor (see [Figure 2-2](#Chapter02.html#fig_2_2)).


    ![Image](images/9781430238102_Fig02-02.jpg)


    ***Figure 2-2.** Accessing the query design tool in SSMS*


    After you open the query designer, you can perform tasks such as adding and joining
    additional tables and sorting, grouping, and selecting criteria using the task
    panes (see [Figure 2-3](#Chapter02.html#fig_2_3)).


    ![Image](images/9781430238102_Fig02-03.jpg)


    ***Figure 2-3.** Working with the graphical query designer in SSMS*


    This initial query is a relatively simple one; it uses four tables joined on relational
    columns. Through the graphical query designer, you can add basic criteria and
    sorting, and you can select only two fields for the report: a count of the patients
    and a specific medical diagnosis. You can make the Sort Type of the count Descending
    so that you can see the trend for the most common diagnoses. You can directly
    transport the SQL query to a report, and we’ll show you how to do that in [Chapter
    6](#Chapter06.html). [Listing 2-2](#Chapter02.html#list_2_2) shows the query produced.
    You can find the code for this query in the code download file `Top10Diagnosis.sql`
    in the Source Code/Download area of the Apress Web site ([`http://www.apress.com`](http://www.apress.com))
    in the SQL Queries folder.


    ***Listing 2-2.** The SQL Query Produced Using the Graphical Query Designer to
    Return the Top Ten Patient Diagnoses*


    `SELECT TOP 10`

    `       COUNT(DISTINCT Patient.PatID) AS [Patient Count]`

    `       , Diag.Dscr AS Diagnosis`

    `FROM`

    `       Admissions`

    `       INNER JOIN Patient ON Admissions.PatID = Patient.PatID`

    `       INNER JOIN PatDiag ON Admissions.PatProgramID = PatDiag.PatProgramID`

    `       INNER JOIN Diag ON PatDiag.DiagTblID = Diag.DiagTblID`

    `GROUP BY`

    `       Diag.Dscr`

    `ORDER BY`

    `       COUNT(DISTINCT Patient.PatID) DESC`


    [Table 2-2](#Chapter02.html#tab_2_2) shows the output of this query.


    ![Image](images/tab_2_2.jpg)


    This particular aggregated query has a small result set. Even though it’s potentially
    working with tens of thousands of records to produce the resulting ten records,
    it runs in less than a second. This tells you that the query is efficient, at
    least in a single-user execution scenario.


    This type of query is designed to deliver data for quick review by professionals
    who will make business decisions from the results of the summarized data. In this
    example, a healthcare administrator will notice a demand for physical therapy
    and might review the staffing level for physical therapists in the company. Because
    physical therapists are in high demand, the administrator might need to investigate
    the cost of caring for physical therapy patients.'
  trans: "## 创建简单的图形化查询\n\n查询设计通常始于一个请求。作为报表编写者或数据库管理员（DBA），您可能经常需要生成那些第三方应用程序附带的标准报表中无法提供的数据。\n\
    \n让我们从一个假设的场景开始。假设您收到一封电子邮件，详细说明了一个需要为即将到来的会议创建和部署的报表。已经确定无法从任何已知报表中获取数据，但您可以通过一个简单的自定义查询来导出这些数据。\n\
    \n在这个第一个例子中，您将查看以下来自一个医疗保健组织的请求：\n\n> *交付一份报告，显示按服务次数统计的十大最常见诊断。*\n\n假设您熟悉数据库，可以在\
    \ SSMS 中开始查询设计过程，既可以通过图形界面，也可以使用通用查询设计器编写查询代码。这两种方法在 SSMS 中都可用。\n\n![Image](img/square.jpg)\
    \ **注意** 我们将在第三章介绍设置构建 SSRS 报表所需的数据源连接。目前，您将直接使用 SSMS 中可用的查询设计工具连接到数据。需要提及的是，尽管您在\
    \ SSMS 中设计查询，但在 BIDS 环境中也有类似的工具，因此您可以在创建报表的同时创建查询。在此案例中我们选择 SSMS，是因为它包含数据库对象列表，在开始开发查询时您可能需要引用这些对象。\n\
    \n我们将向您展示如何使用图形工具设计查询，以演示底层 SQL 代码是如何创建的。您可以通过在 SSMS 的新查询窗口中任意位置右键单击并选择“在编辑器中设计查询”来访问图形查询设计器（参见图\
    \ 2-2）。\n\n![Image](img/9781430238102_Fig02-02.jpg)\n\n**图 2-2.** 在 SSMS 中访问查询设计工具\n\
    \n打开查询设计器后，您可以执行添加和连接其他表、使用任务窗格进行排序、分组和选择条件等任务（参见图 2-3）。\n\n![Image](img/9781430238102_Fig02-03.jpg)\n\
    \n**图 2-3.** 在 SSMS 中使用图形查询设计器\n\n这个初始查询相对简单；它使用在关系列上连接的四个表。通过图形查询设计器，您可以添加基本条件和排序，并且只为报表选择两个字段：患者计数和特定的医学诊断。您可以将计数的排序类型设为降序，以便查看最常见诊断的趋势。您可以将\
    \ SQL 查询直接传输到报表中，我们将在第六章展示如何操作。清单 2-2 显示了生成的查询。您可以在 Apress 网站（[`http://www.apress.com`](http://www.apress.com)）的源代码/下载区域的\
    \ SQL Queries 文件夹中找到此查询的代码文件 `Top10Diagnosis.sql`。\n\n**清单 2-2.** 使用图形查询设计器生成以返回十大患者诊断的\
    \ SQL 查询\n\n```sql\nSELECT TOP 10\n       COUNT(DISTINCT Patient.PatID) AS [Patient\
    \ Count]\n       , Diag.Dscr AS Diagnosis\nFROM\n       Admissions\n       INNER\
    \ JOIN Patient ON Admissions.PatID = Patient.PatID\n       INNER JOIN PatDiag\
    \ ON Admissions.PatProgramID = PatDiag.PatProgramID\n       INNER JOIN Diag ON\
    \ PatDiag.DiagTblID = Diag.DiagTblID\nGROUP BY\n       Diag.Dscr\nORDER BY\n \
    \      COUNT(DISTINCT Patient.PatID) DESC\n```\n\n表 2-2 显示了此查询的输出。\n\n![Image](img/tab_2_2.jpg)\n\
    \n这个特定的聚合查询结果集很小。尽管它可能处理数万条记录来生成最终的十条记录，但它运行时间不到一秒。这表明该查询是高效的，至少在单用户执行场景下是如此。\n\
    \n此类查询旨在为专业人士提供快速审查的数据，他们将根据汇总数据的结果做出业务决策。在此示例中，医疗管理员会注意到对物理治疗的需求，并可能审查公司内物理治疗师的人员配置水平。由于物理治疗师需求量大，管理员可能需要调查护理物理治疗患者的成本。"
- fmt: "#### Creating an Advanced Query\n\nNext, we’ll show how to design a query\
    \ that reports the cost of care for the physical therapy patients. The goal is\
    \ to make the query and subsequent report flexible enough to include other types\
    \ of medical services that can be analyzed as well, not only physical therapy.\
    \ This query requires more data for analysis than the previous one did. Because\
    \ you’ll process thousands of records, you need to assess the performance impact.\n\
    \nThe design process is the same. Begin by adding the necessary tables to the\
    \ graphical query designer and selecting the fields you want to include in the\
    \ report. The required data output for the report needs to include the following\
    \ information:\n\n*   Patient name and ID number\n*   Employee name, specialty,\
    \ and branch\n*   Total service count for patient by specialty\n*   Diagnosis\
    \ of the patient\n*   Estimated cost\n*   Dates of services\n\n[Listing 2-3](#Chapter02.html#list_2_3)\
    \ shows the query to produce this desired output from the healthcare application.\
    \ You can find the code for this query in the code download file `EmployeeServices.sql`\
    \ in the `SQL Queries` folder.\n\n**Listing 2-3.** Employee Cost Query for Healthcare\
    \ Database\n\n```sql\nSELECT\n       Trx.PatID\n       , RTRIM(RTRIM(Patient.LastName)\
    \ +  ', '  + RTRIM(Patient.FirstName)) AS [Patient Name]\n       , Employee.EmployeelD\n\
    \       , RTRIM(RTRIM(Employee.LastName) +  ', '  + RTRIM(Employee.FirstName))\
    \ AS [Employee Name]\n       , ServicesLogCtgry.Service AS  [Service Type]\n \
    \      , SUM(Chargelnfo.Cost) AS  [Estimated Cost]\n       , COUNT(Trx.ServicesTbllD)\
    \ AS Visit_Count\n       , Diag.Dscr AS Diagnosis\n       , DATENAME(mm, Trx.ChargeServiceStartDate)\
    \ AS [Month]\n       , DATEPART(yy,  Trx.ChargeServiceStartDate) AS  [Year]\n\
    \       , Branch.BranchName AS Branch\nFROM\n       Trx\n       JOIN Chargelnfo\
    \ ON Trx.ChargelnfoID = Chargelnfo.ChargelnfoID\n       JOIN Patient ON Trx.PatID\
    \ = Patient.PatID\n       JOIN Services ON Trx.ServicesTbllD = Services.ServicesTbllD\n\
    \       JOIN ServicesLogCtgry ON Services.ServicesLogCtgrylD = ServicesLogCtgry.ServicesLogCtgryID\n\
    \       JOIN Employee ON Chargelnfo.EmployeeTbllD = Employee.EmployeeTbllD\n \
    \      JOIN Diag ON Chargelnfo.DiagTbllD = Diag.DiagTbllD\n       JOIN Branch\
    \ ON TRX.BranchID = Branch.BranchID\nWHERE\n        (Trx.TrxTypelD = 1) AND (Services.ServiceTypelD\
    \ =   'v')\nGROUP BY\n       ServicesLogCtgry.Service\n       , Diag.Dscr\n  \
    \     , Trx.PatID\n       , RTRIM(RTRIM(Patient.LastName) +  ', '  + RTRIM(Patient.FirstName))\n\
    \       , RTRIM(RTRIM(Employee.LastName)    +  ', '  + RTRIM(Employee.FirstName))\n\
    \       , Employee.EmployeelD\n       , DATENAME(mm,  Trx.ChargeServiceStartDate)\n\
    \       , DATEPART(yy,  Trx.ChargeServiceStartDate)\n       , Branch.BranchName\n\
    ORDER BY\n       Trx.PatID\n```\n\nThe alias names identified with `AS` in the\
    \ `SELECT` clause of the query should serve as pointers to the data that answers\
    \ the requirements of the report request. Again, knowing the schema of the database\
    \ that you’ll be working with to produce queries is important, but for the sake\
    \ of the example, the joined tables are typical of a normalized database where\
    \ detailed transactional data is stored in a separate table from the descriptive\
    \ information and therefore must be joined. The `Trx` table in [Listing 2-3](#Chapter02.html#list_2_3)\
    \ is where the transactional patient service information is stored, while the\
    \ descriptive information of the specialty services such as “Physical Therapy”\
    \ is stored in the `Services` table.\n\nOther tables, such as the `Patient` and\
    \ `Employee` tables, are also joined to retrieve their respective data elements.\
    \ You use the SQL functions `COUNT` and `SUM` to provide aggregated calculations\
    \ on cost and service information, and `RTRIM` to remove any trailing spaces in\
    \ the concatenated patient and employee names. You can use the `ORDER BY PATID`\
    \ clause for testing the query to ensure that it’s returning multiple rows per\
    \ patient as expected. It isn’t necessary to add the burden of sorting to the\
    \ query. As you’ll see in the next chapters, sorting is handled within the report.\
    \ Dividing the load between the SQL Server machine that houses the report data\
    \ and the report server itself is important and often requires performance monitoring\
    \ to assess where such tasks as sorting, grouping, and calculating sums or averages\
    \ for aggregated data will be performed. If the report server is substantial enough\
    \ to shoulder the burden and is less taxed by user access than the actual data\
    \ server is, it might be more efficient to allow it to handle more of the grouping\
    \ and sorting loads. More often than not though, it is considered best practice\
    \ to have the relational database engine perform as much of the work as possible\
    \ to alleviate some of the load on the report server.\n\n#### Testing Performance\
    \ with SQL Server Management Studio (SSMS)\n\nNow that you have developed the\
    \ query, you’ll look at the output to make sure it’s returning accurate data within\
    \ acceptable time frames before moving on to the next phase of development. [Figure\
    \ 2-4](#Chapter02.html#fig_2_4) shows the results of the output from `SSMS` and\
    \ the time it took to execute the query. You can directly modify the query further\
    \ in `SSMS` if you want to. However, one of the best features of `SSMS` you’ll\
    \ notice is the ability to view quickly both the number of records returned and\
    \ the execution time. Once you’ve done that, the next step is to create the stored\
    \ procedure.\n\nYou now have the data the way you want, and the query is executing\
    \ in an average of one second. To verify the execution times, run the query 15\
    \ times in sequence from two different sessions of `SSMS`. Execution times will\
    \ vary from zero to two seconds for each execution. For 3,924 records, which is\
    \ the number of records the query returns, the execution time is acceptable for\
    \ a single-user execution. However, you need to improve it before you create the\
    \ stored procedure, which you will want to scale out to accommodate hundreds of\
    \ users, and begin building reports.\n\nLooking at the Execution Plan tab in `SSMS`\
    \ will give you a better understanding of what’s happening when you execute the\
    \ query. In `SSMS`, click the Display Estimated Execution Plan button on the toolbar.\
    \ When the query is executed, the Execution Plan tab appears in the Results pane.\
    \ Alternatively, if you just want to see the execution plan without returning\
    \ results, just press `CTRL+L`.\n\n![Image](`images/9781430238102_Fig02-04.jpg`)\n\
    \n**Figure 2-4.** Viewing the query execution output in `SSMS`\n\nThe Execution\
    \ Plan tab in `SSMS` shows graphically how the SQL query optimizer chose the most\
    \ efficient method for executing the report, based on the different elements of\
    \ the query. For example, the query optimizer may have chosen a clustered index\
    \ instead of a table scan. Each execution step has an associated cost. [Figure\
    \ 2-5](#Chapter02.html#fig_2_5) shows the Execution Plan tab for this query.\n\
    \n![Image](`images/9781430238102_Fig02-05.jpg`)\n\n**Figure 2-5.** Viewing the\
    \ Execution Plan tab displayed in `SSMS`\n\nThe query took one second to execute,\
    \ and from this execution plan it’s easy to see which section of the query had\
    \ the highest cost percentage. There was a total cost of 11 percent when determining\
    \ the `TrxTypeID` and the `ServiceTypeID` values used as a filter in the `WHERE`\
    \ clause. For reference, the `TrxTypeID` integer field specifies the type of financial\
    \ transactions as charges, payments, or adjustments. You’re concerned only with\
    \ the `TrxTypeID` value of 1, representing charges. For the service type, you’re\
    \ interested only in “V,” representing visits, and not in other types of billable\
    \ services, such as medical supplies. If you could get the cost of the `WHERE`\
    \ clause down to a lower number, the query might improve the overall performance."
  raw: '#### Creating an Advanced Query


    Next, we’ll show how to design a query that reports the cost of care for the physical
    therapy patients. The goal is to make the query and subsequent report flexible
    enough to include other types of medical services that can be analyzed as well,
    not only physical therapy. This query requires more data for analysis than the
    previous one did. Because you’ll process thousands of records, you need to assess
    the performance impact.


    The design process is the same. Begin by adding the necessary tables to the graphical
    query designer and selecting the fields you want to include in the report. The
    required data output for the report needs to include the following information:


    > *   Patient name and ID number

    > *   Employee name, specialty, and branch

    > *   Total service count for patient by specialty

    > *   Diagnosis of the patient

    > *   Estimated cost

    > *   Dates of services


    [Listing 2-3](#Chapter02.html#list_2_3) shows the query to produce this desired
    output from the healthcare application. You can find the code for this query in
    the code download file `EmployeeServices.sql` in the SQL Queries folder.


    ***Listing 2-3.** Employee Cost Query for Healthcare Database*


    `SELECT`

    `       Trx.PatID`

    `       , RTRIM(RTRIM(Patient.LastName) +  '', ''  + RTRIM(Patient.FirstName))
    AS [Patient Name]`

    `       , Employee.EmployeelD`

    `       , RTRIM(RTRIM(Employee.LastName) +  '', ''  + RTRIM(Employee.FirstName))
    AS [Employee Name]`

    `       , ServicesLogCtgry.Service AS  [Service Type]`

    `       , SUM(Chargelnfo.Cost) AS  [Estimated Cost]`

    `       , COUNT(Trx.ServicesTbllD) AS Visit_Count`

    `       , Diag.Dscr AS Diagnosis`

    `       , DATENAME(mm, Trx.ChargeServiceStartDate) AS [Month]`

    `       , DATEPART(yy,  Trx.ChargeServiceStartDate) AS  [Year]`

    `       , Branch.BranchName AS Branch`

    `FROM`

    `       Trx`

    `       JOIN Chargelnfo ON Trx.ChargelnfoID = Chargelnfo.ChargelnfoID`

    `       JOIN Patient ON Trx.PatID = Patient.PatID`

    `       JOIN Services ON Trx.ServicesTbllD = Services.ServicesTbllD`

    `       JOIN ServicesLogCtgry ON Services.ServicesLogCtgrylD = ServicesLogCtgry.ServicesLogCtgryID`

    `       JOIN Employee ON Chargelnfo.EmployeeTbllD = Employee.EmployeeTbllD`

    `       JOIN Diag ON Chargelnfo.DiagTbllD = Diag.DiagTbllD`

    `       JOIN Branch ON TRX.BranchID = Branch.BranchID`

    `WHERE`

    `        (Trx.TrxTypelD = 1) AND (Services.ServiceTypelD =   ''v'')`

    `GROUP BY`

    `       ServicesLogCtgry.Service`

    `       , Diag.Dscr`

    `       , Trx.PatID`

    `       , RTRIM(RTRIM(Patient.LastName) +  '', ''  + RTRIM(Patient.FirstName))`

    `       , RTRIM(RTRIM(Employee.LastName)    +  '', ''  + RTRIM(Employee.FirstName))`

    `       , Employee.EmployeelD`

    `       , DATENAME(mm,  Trx.ChargeServiceStartDate)`

    `       , DATEPART(yy,  Trx.ChargeServiceStartDate)`

    `       , Branch.BranchName`

    `ORDER BY`

    `       Trx.PatID`


    The alias names identified with AS in the SELECT clause of the query should serve
    as pointers to the data that answers the requirements of the report request. Again,
    knowing the schema of the database that you’ll be working with to produce queries
    is important, but for the sake of the example, the joined tables are typical of
    a normalized database where detailed transactional data is stored in a separate
    table from the descriptive information and therefore must be joined. The `Trx`
    table in [Listing 2-3](#Chapter02.html#list_2_3) is where the transactional patient
    service information is stored, while the descriptive information of the specialty
    services such as “Physical Therapy” is stored in the `Services` table.


    Other tables, such as the `Patient` and `Employee` tables, are also joined to
    retrieve their respective data elements. You use the SQL functions `COUNT` and
    `SUM` to provide aggregated calculations on cost and service information, and
    `RTRIM` to remove any trailing spaces in the concatenated patient and employee
    names. You can use the `ORDER BY PATID` clause for testing the query to ensure
    that it’s returning multiple rows per patient as expected. It isn’t necessary
    to add the burden of sorting to the query. As you’ll see in the next chapters,
    sorting is handled within the report. Dividing the load between the SQL Server
    machine that houses the report data and the report server itself is important
    and often requires performance monitoring to assess where such tasks as sorting,
    grouping, and calculating sums or averages for aggregated data will be performed.
    If the report server is substantial enough to shoulder the burden and is less
    taxed by user access than the actual data server is, it might be more efficient
    to allow it to handle more of the grouping and sorting loads. More often than
    not though, it is considered best practice to have the relational database engine
    perform as much of the work as possible to alleviate some of the load on the report
    server.


    #### Testing Performance with SQL Server Management Studio (SSMS)


    Now that you have developed the query, you’ll look at the output to make sure
    it’s returning accurate data within acceptable time frames before moving on to
    the next phase of development. [Figure 2-4](#Chapter02.html#fig_2_4) shows the
    results of the output from SSMS and the time it took to execute the query. You
    can directly modify the query further in SSMS if you want to. However, one of
    the best features of SSMS you’ll notice is the ability to view quickly both the
    number of records returned and the execution time. Once you’ve done that, the
    next step is to create the stored procedure.


    You now have the data the way you want, and the query is executing in an average
    of one second. To verify the execution times, run the query 15 times in sequence
    from two different sessions of SSMS. Execution times will vary from zero to two
    seconds for each execution. For 3,924 records, which is the number of records
    the query returns, the execution time is acceptable for a single-user execution.
    However, you need to improve it before you create the stored procedure, which
    you will want to scale out to accommodate hundreds of users, and begin building
    reports.


    Looking at the Execution Plan tab in SSMS will give you a better understanding
    of what’s happening when you execute the query. In SSMS, click the Display Estimated
    Execution Plan button on the toolbar. When the query is executed, the Execution
    Plan tab appears in the Results pane. Alternatively, if you just want to see the
    execution plan without returning results, just press CTRL+L.


    ![Image](images/9781430238102_Fig02-04.jpg)


    ***Figure 2-4.** Viewing the query execution output in SSMS*


    The Execution Plan tab in SSMS shows graphically how the SQL query optimizer chose
    the most efficient method for executing the report, based on the different elements
    of the query. For example, the query optimizer may have chosen a clustered index
    instead of a table scan. Each execution step has an associated cost. [Figure 2-5](#Chapter02.html#fig_2_5)
    shows the Execution Plan tab for this query.


    ![Image](images/9781430238102_Fig02-05.jpg)


    ***Figure 2-5.** Viewing the Execution Plan tab displayed in SSMS*


    The query took one second to execute, and from this execution plan it’s easy to
    see which section of the query had the highest cost percentage. There was a total
    cost of 11 percent when determining the `TrxTypeID` and the `ServiceTypeID` values
    used as a filter in the `WHERE` clause. For reference, the `TrxTypeID` integer
    field specifies the type of financial transactions as charges, payments, or adjustments.
    You’re concerned only with the `TrxTypeID` value of 1, representing charges. For
    the service type, you’re interested only in “V,” representing visits, and not
    in other types of billable services, such as medical supplies. If you could get
    the cost of the `WHERE` clause down to a lower number, the query might improve
    the overall performance.'
  trans: "\n#### 创建高级查询\n\n接下来，我们将展示如何设计一个查询，用以报告物理治疗患者的医疗护理成本。目标在于使该查询及后续报告具备足够的灵活性，以便能够分析包含物理治疗在内的其他类型的医疗服务。此查询比前一个需要更多的数据用于分析。由于需要处理数千条记录，因此需要评估其对性能的影响。\n\
    \n设计过程是相同的。首先将必要的表添加到图形化查询设计器中，并选择要包含在报告中的字段。报告所需的数据输出需要包含以下信息：\n\n*   患者姓名和 ID\
    \ 号\n*   员工姓名、专业和所属分部\n*   按专业划分的患者服务总次数\n*   患者诊断\n*   预估成本\n*   服务日期\n\n清单 2-3\
    \ 展示了从医疗保健应用程序生成此预期输出的查询。你可以在代码下载文件 `SQL Queries` 文件夹中的 `EmployeeServices.sql`\
    \ 文件里找到此查询的代码。\n\n**清单 2-3.** 医疗保健数据库的员工成本查询\n\n```sql\nSELECT\n       Trx.PatID\n\
    \       , RTRIM(RTRIM(Patient.LastName) +  ', '  + RTRIM(Patient.FirstName)) AS\
    \ [Patient Name]\n       , Employee.EmployeelD\n       , RTRIM(RTRIM(Employee.LastName)\
    \ +  ', '  + RTRIM(Employee.FirstName)) AS [Employee Name]\n       , ServicesLogCtgry.Service\
    \ AS  [Service Type]\n       , SUM(Chargelnfo.Cost) AS  [Estimated Cost]\n   \
    \    , COUNT(Trx.ServicesTbllD) AS Visit_Count\n       , Diag.Dscr AS Diagnosis\n\
    \       , DATENAME(mm, Trx.ChargeServiceStartDate) AS [Month]\n       , DATEPART(yy,\
    \  Trx.ChargeServiceStartDate) AS  [Year]\n       , Branch.BranchName AS Branch\n\
    FROM\n       Trx\n       JOIN Chargelnfo ON Trx.ChargelnfoID = Chargelnfo.ChargelnfoID\n\
    \       JOIN Patient ON Trx.PatID = Patient.PatID\n       JOIN Services ON Trx.ServicesTbllD\
    \ = Services.ServicesTbllD\n       JOIN ServicesLogCtgry ON Services.ServicesLogCtgrylD\
    \ = ServicesLogCtgry.ServicesLogCtgryID\n       JOIN Employee ON Chargelnfo.EmployeeTbllD\
    \ = Employee.EmployeeTbllD\n       JOIN Diag ON Chargelnfo.DiagTbllD = Diag.DiagTbllD\n\
    \       JOIN Branch ON TRX.BranchID = Branch.BranchID\nWHERE\n        (Trx.TrxTypelD\
    \ = 1) AND (Services.ServiceTypelD =   'v')\nGROUP BY\n       ServicesLogCtgry.Service\n\
    \       , Diag.Dscr\n       , Trx.PatID\n       , RTRIM(RTRIM(Patient.LastName)\
    \ +  ', '  + RTRIM(Patient.FirstName))\n       , RTRIM(RTRIM(Employee.LastName)\
    \    +  ', '  + RTRIM(Employee.FirstName))\n       , Employee.EmployeelD\n   \
    \    , DATENAME(mm,  Trx.ChargeServiceStartDate)\n       , DATEPART(yy,  Trx.ChargeServiceStartDate)\n\
    \       , Branch.BranchName\nORDER BY\n       Trx.PatID\n```\n\n查询的 `SELECT` 子句中由\
    \ `AS` 标识的别名名称，应作为指向满足报告请求所需数据的指针。再次强调，了解用于生成查询的工作数据库模式非常重要，但就本示例而言，连接的表是典型规范化数据库的特征，其中详细的事务性数据存储在与描述性信息分离的单独表中，因此必须进行连接。清单\
    \ 2-3 中的 `Trx` 表是存储患者服务事务信息的地方，而诸如“物理治疗”等专业服务的描述性信息则存储在 `Services` 表中。\n\n其他表，如\
    \ `Patient` 和 `Employee` 表，也会被连接以检索各自的数据元素。你使用 SQL 函数 `COUNT` 和 `SUM` 对成本和服务信息进行聚合计算，并使用\
    \ `RTRIM` 删除拼接的患者和员工姓名中的尾随空格。你可以使用 `ORDER BY PATID` 子句来测试查询，以确保它按预期为每个患者返回多行。没有必要给查询增加排序的负担。正如你将在后续章节中看到的，排序是在报告内部处理的。在承载报告数据的\
    \ SQL Server 机器和报告服务器本身之间分配负载非常重要，这通常需要进行性能监控，以评估排序、分组以及为聚合数据计算总和或平均值等任务将在何处执行。如果报告服务器足够强大能够承担负担，并且其受到的用户访问压力小于实际数据服务器，那么让它处理更多的分组和排序负载可能更有效。然而，通常认为最佳实践是让关系数据库引擎尽可能多地执行工作，以减轻报告服务器上的一些负载。\n\
    \n#### 使用 SQL Server Management Studio (SSMS) 测试性能\n\n现在你已经开发好了查询，在进入下一阶段开发之前，你需要查看输出结果，以确保它在可接受的时间范围内返回准确的数据。图\
    \ 2-4 展示了从 `SSMS` 输出的结果以及执行查询所花费的时间。如果你愿意，可以直接在 `SSMS` 中进一步修改查询。然而，你会注意到 `SSMS`\
    \ 的最佳功能之一是能够快速查看返回的记录数和执行时间。完成此操作后，下一步是创建存储过程。\n\n现在你已经得到了想要的数据格式，并且查询的平均执行时间为一秒。为了验证执行时间，请从两个不同的\
    \ `SSMS` 会话中连续运行查询 15 次。每次执行的时间会在零到两秒之间变化。对于查询返回的 3,924 条记录，单用户执行的执行时间是可以接受的。但是，在创建存储过程（你将希望将其扩展以容纳数百个用户）并开始构建报告之前，你需要对其进行改进。\n\
    \n查看 `SSMS` 中的执行计划选项卡将使你更好地理解执行查询时发生的情况。在 `SSMS` 中，单击工具栏上的“显示估计执行计划”按钮。执行查询时，“执行计划”选项卡将出现在结果窗格中。或者，如果你只想查看执行计划而不返回结果，只需按\
    \ `CTRL+L`。\n\n![Image](img/9781430238102_Fig02-04.jpg`)\n\n**图 2-4.** 在 `SSMS`\
    \ 中查看查询执行输出\n\n`SSMS` 中的执行计划选项卡以图形方式显示了 SQL 查询优化器如何根据查询的不同元素选择执行报告的最有效方法。例如，查询优化器可能选择了聚集索引而不是表扫描。每个执行步骤都有一个关联的成本。图\
    \ 2-5 展示了此查询的执行计划选项卡。\n\n![Image](img/9781430238102_Fig02-05.jpg`)\n\n**图 2-5.**\
    \ 查看 `SSMS` 中显示的执行计划选项卡\n\n查询执行花费了一秒钟，从这个执行计划可以很容易地看出查询的哪个部分具有最高的成本百分比。在确定 `WHERE`\
    \ 子句中用作过滤器的 `TrxTypeID` 和 `ServiceTypeID` 值时，总成本为 11%。供参考，`TrxTypeID` 整数字段指定财务交易的类型，如费用、付款或调整。你只关心值为\
    \ 1 的 `TrxTypeID`，代表费用。对于服务类型，你只对代表就诊的“V”感兴趣，而不关心其他类型的可计费服务，如医疗用品。如果你能将 `WHERE`\
    \ 子句的成本降低到更低的数字，查询的整体性能可能会得到改善。\n"
- fmt: '### Optimizing Performance: Dividing the Load


    Because SSRS and T-SQL share many data formatting and manipulation functions,
    you can choose in which process—query or report—these functions should be used.
    You can choose to have the query handle the bulk of the processing. This limits
    the number of rows that the report has to work with, making report rendering much
    faster. Alternatively, you can limit the selectivity of the query, allowing it
    to return more rows than are possibly required. You can then have the report perform
    additional filtering, grouping, and calculations, which allows the query or stored
    procedure to execute faster. With many users accessing the report simultaneously,
    having the report share the processing load also limits the impact on the data
    source server (in this case, SQL Server).


    In this query, based on initial benchmarking, we’ve determined we’ll remove the
    portion of the `WHERE` clause that specifies that the query should return only
    service types with a value of “V” for visits. Instead, we’ll let the report filter
    out any service types that aren’t visits. When you remove the service type criteria
    from the query and re-execute it, you can see that the overall execution time
    remains constant at or is less than one second, and the cost of the `WHERE` clause
    goes from 11 percent to only 4 percent. Also, it’s important to note in the performance
    analysis that the record count went up by only 35 records, from 3,924 to 3,959,
    by removing the “V” from the `WHERE` clause. You can see this in the lower-right
    corner of [Figure 2-6](#Chapter02.html#fig_2_6).


    To take advantage of a report filter, you need to add a field—`Services.ServiceTypeID`—to
    the `SELECT` and `GROUP BY` portions of the query, like so:


    ```

    Select

    ...

    Branch.BranchName AS Branch,

    Services.ServiceTypeID

    …

    GROUP BY

    …

    Branch.BranchName,

    Services.ServiceTypeID

    ```


    You will use the additional field `Services.ServiceTypeID` as the filter value
    in the report that you will be designing. By proceeding in this fashion, even
    though you’re returning more rows than you might need for a particular report,
    you also gain the benefit of using this same base query for other reports when
    you eventually make it a stored procedure, which you will do in the following
    sections. Other reports might need to show service types other than visits, and
    this query will serve this purpose with only slight modifications to the report.
    For example, you might need to investigate the cost or quantity of supplies (a
    service type of “S”) used by employees. You can use this same query and stored
    procedure for that report. We could make use of a parameterized stored procedure
    that would allow various reports to pass in a value to be used to filter the results,
    but we’ll progress to that in a moment.


    ![Image](images/9781430238102_Fig02-06.jpg)


    **Figure 2-6.** Viewing the execution plan with the modified query


    The query as it stands, now including `ServiceTypeID` as a value in the `SELECT`
    clause and not as criteria, is ready to begin its life as a stored procedure.
    Queries serve many purposes, one of which is the development of reports, as you’ll
    do in [Chapter 6](#Chapter06.html). However, encapsulating queries in stored procedures
    is typically the preferred method of deployment for several reasons. Stored procedures,
    like ad hoc queries, execute according to the execution plan generated by the
    query optimizer. Having the ability to reuse the execution plan saves time and
    resources. Stored procedures, which are also beneficial because they’re precompiled,
    can reuse an execution plan even though the parameters passed to it at execution
    time might have changed values. You can hold stored procedures centrally on the
    SQL Server machine, unlike ad hoc queries that might be embedded in an application
    (or in the RDL file in this case). When the underlying schema of a database changes,
    you can update the stored procedure in one location, whereas embedded queries
    all need to be modified separately for each report in which they reside. In the
    next section, we’ll show you how to create a stored procedure based on the employee
    cost query.


    ### Using a Parameterized Stored Procedure


    You can use `SSMS` to produce the code to create a stored procedure based on the
    employee cost query, and to drop it if the stored procedure already exists in
    the database. To create a stored procedure, expand the database where you want
    to create the stored procedure, navigate to the `Programmability` folder and expand
    it to see a folder named `Stored Procedures`. Right-click on that folder and choose,
    New Stored Procedure. This opens a window containing a sample `CREATE PROCEDURE`
    command for the new stored procedure.


    `CREATE PROCEDURE <Procedure_Name,   sysname,  ProcedureName>`


    To complete the new stored procedure, which you should name `Emp_Svc_Cost`, you
    simply need to paste in your `SELECT` statement. However, you can add optional
    parameters to limit the result set based on the following criteria:


    *   Service time (year and month)

    *   The branch where the employee works

    *   The individual employee

    *   The type of service


    To create parameters for a stored procedure, you add the variable names, each
    prefixed by an @ character and provide the appropriate data types along with their
    default values if desired. The default values for all the parameters are set to
    `NULL`, as [Listing 2-4](#Chapter02.html#list_2_4) shows. You can find the code
    for this query in the code download file `CreateEmpSvcCost.sql` in the SQL Queries
    folder.


    **Listing 2-4.** Creating the `Emp_Svc_Cost` Stored Procedure'
