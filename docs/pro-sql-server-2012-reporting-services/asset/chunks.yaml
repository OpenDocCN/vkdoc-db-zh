- fmt: "## 处理代码访问安全与自定义程序集\n\n```xml\n<CodeGroup class=\"UnionCodeGroup\" version=\"\
    1\"\n         PermissionSetName=\"FullTrust\"\n         Name=\"EmployeePayCodeGroup\"\
    \n         Description=\"Employee Cost Per Visit\">\n         <IMembershipCondition\n\
    \                  class=\"UrlMembershipCondition\" version=\"1\"\n          \
    \        url=\"C:\\Program Files (x86)\\Microsoft Visual Studio 10.0\\Common7\\\
    IDE\\PrivateAssemblies\\Employee.dll\"/>\n  </CodeGroup>\n```\n\n![Image](images/square.jpg)\
    \ `Note` If you run your report and see `#Error` text in a textbox instead of\
    \ the expected result, it is more than likely a permission problem of some kind.\n\
    \nBecause it’s generally not a good idea to grant your assemblies `FullTrust`\
    \ unless absolutely necessary, you can use named permission sets to grant your\
    \ custom assembly just the permissions it needs rather than `FullTrust`.\n\nTo\
    \ grant the custom assembly just enough permission to read the data files called\
    \ `C:\\Temp\\ EmployeePay.xml` and `C:\\Temp\\EmployeePay.xsd`, you first need\
    \ to add a named permission set in the policy configuration file `rssrvpolicy.config`\
    \ that grants read permission to the files. This will be placed into the configuration\
    \ file in the `NamedPermissionSets` section. You can then apply the specific permission\
    \ sets to the custom assembly, as shown in [Listing 7-5](#Chapter07.html#list_7_5).\n\
    \n### Listing 7-5. Named Permission Sets for Reading Files\n\n```xml\n<PermissionSet\n\
    \        class=\"NamedPermissionSet\"\n        version=\"1\"\n        Name=\"\
    EmployeePayFilePermissionSet\"\n        Description=\"Permission set that grants\
    \ read access to my employee cost file.\">\n        <IPermission\n           \
    \     class=\"FileIOPermission\"\n                version=\"1\"\n            \
    \    Read=\"C:\\Temp\\EmployeePay.xml\" />\n        <IPermission\n           \
    \     class=\"FileIOPermission\"\n                version=\"1\"\n            \
    \    Read=\"C:\\Temp\\EmployeePay.xsd\" />\n        <IPermission\n           \
    \     class=\"SecurityPermission\"\n                version=\"1\"\n          \
    \      Flags=\"Execution, Assertion\" />\n</PermissionSet>\n```\n\nNext, as shown\
    \ in [Listing 7-6](#Chapter07.html#list_7_6), you add a code group that grants\
    \ the assembly the additional permissions to the `CodeGroup` section of the policy\
    \ configuration file `rssrvpolicy.config`. If you have already added the `FullTrust`\
    \ permission to the assembly, you can replace it with this `CodeGroup` instead,\
    \ or simply modify it to use the newly created permission set name.\n\n### Listing\
    \ 7-6. Granting File I/O Permission on the Employee Assembly\n\n```xml\n<CodeGroup\n\
    \        class=\"UnionCodeGroup\"\n        version=\"1\"\n        PermissionSetName=\"\
    \ EmployeePayFilePermissionSet \"\n        Name=\"EmployeePayCodeGroup\"\n   \
    \     Description=\"Employee Cost Per Visit\">\n        <IMembershipCondition\n\
    \                class=\"UrlMembershipCondition\"\n                version=\"\
    1\"\n                Url=\"C:\\Program Files\\Microsoft SQL Server\\MSRS11.MSSQLSERVER\\\
    Reporting Services\\ReportServer\\binEmployee.dll \"/>\n</CodeGroup>\n```\n\n\
    ![Image](images/square.jpg) `Note` The name of the assembly that you add to the\
    \ configuration file must match the name that is added to the RDL under the `CodeModules`\
    \ element. This is the name you set for the custom assembly under the Report Properties\
    \ ![Image](images/U001.jpg) References menu, which was introduced in the “Accessing\
    \ .NET Assemblies from Embedded Code” section; it is discussed in detail in the\
    \ “Adding an Assembly Reference to a Report” section.\n\nTo apply custom permissions,\
    \ you must also assert the permission within your code. For example, if you want\
    \ to add read–only access to the XML files `C:\\Temp\\EmployeePay.xsd` and `C:\\\
    Temp\\EmployeePay.xml`, you must add code similar to that shown in [Listing 7-7](#Chapter07.html#list_7_7)\
    \ to your method.\n\n### Listing 7-7. Asserting Permission with Code\n\n```csharp\n\
    // C#\nFileIOPermission permissionXSD = new\n    FileIOPermission(FileIOPermissionAccess.Read,\n\
    \    @\" C:\\Temp\\EmployeePay.xml\");\n    permissionXSD.Assert();\n    // Load\
    \ the schema file\n    empDS.ReadXmlSchema(@\"C:\\Temp\\EmployeePay.xsd\");\n\n\
    FileIOPermission permissionXML = new\n    FileIOPermission(FileIOPermissionAccess.Read,\
    \ @\"\n    C:\\Temp\\EmployeePay.xml\");\n    permissionXML.Assert();\n    empDS.ReadXml(@\"\
    C:\\Temp\\EmployeePay.xml\");\n```\n\nYou can also add the assertion as a method\
    \ attribute, as shown in [Listing 7-8](#Chapter07.html#list_7_8). This is the\
    \ method shown in this chapter’s examples.\n\n### Listing 7-8. Asserting Permission\
    \ with a Method Attribute\n\n```csharp\n[FileIOPermissionAttribute(SecurityAction.Assert,\n\
    \    Read=@\" C:\\Temp\\EmployeePay.xsd\")]\n[FileIOPermissionAttribute(SecurityAction.Assert,\n\
    \    Read=@\" C:\\Temp\\EmployeePay.xml\")]\n```\n\n![Image](images/square.jpg)\
    \ `Tip` For more information about code access security and reporting services,\
    \ see “Understanding Code Access Security in Reporting Services” in the SSRS 2012\
    \ Books Online (BOL). For more information about security, see “.NET Framework\
    \ Security” in the .NET Framework Developer’s Guide, available on the Microsoft\
    \ Developer Network (MSDN) web site at [http://msdn.microsoft.com](http://msdn.microsoft.com).\
    \ You will also want to read about using the Global Assembly Cache (GAC) to store\
    \ your custom assembly."
