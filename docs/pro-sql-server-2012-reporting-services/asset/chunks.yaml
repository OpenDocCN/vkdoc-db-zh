  trans: '

    # 使用 Report Builder 3.0 创建报表


    当我们听说 `SQL Server 2008 R2` 即将上市，并带有所有新的可视化增强功能时，就有关于另一个 `Report Builder` 的讨论。在
    `Report Builder 2.0` 带来了众多出色的功能之后，我们迫不及待地想看看下一个版本会为我们的最终用户带来哪些即席报表的便利功能。


    随着 `SQL Server 2008 R2` 的上市，`Report Builder 3.0` 也应运而生，它随之带来了一些额外的数据源、数据可视化报表项，以及在预览报表时的缓存数据集等功能，仅举几例。各项增强功能的高级详细信息如下：


    > *   **报表部件：** 报表部件允许报表作者创建和部署可被其他报表重复使用的报表部件。例如，如果一位报表开发人员创建了一个“按分支统计的员工服务成本”报表，其中包含一个总成本图表，那么另一位报表开发人员或最终用户就可以将该报表作为其自身报表的一个部件来使用。

    > *   **数据源：** 随着 `SQL Azure` 的逐渐成熟，微软创建了一个 `Microsoft SQL Azure` 数据源。他们还添加了 `SharePoint
    List Data Extension` 以连接到 SharePoint 列表以及 `Microsoft SQL Server Parallel Data
    Warehouse`。

    > *   **报表项：** 正如第 5 章中讨论的，使用 `SQL Server Data Tools` 中的 `Report Designer`，新的报表可视化项已被添加到
    `Report Builder` 中。这些新的报表项包括 `地图`、`数据条`、`迷你图` 和 `指示器`。你可以在 `Report Builder` 的
    `插入` 选项卡上找到它们。

    > *   **数据集缓存：** 由于最终用户会创建即席报表，产生大量耗时较长的报表请求的可能性相当高。因此，为了在数据集没有相关更改的情况下避免多次往返请求，微软在新功能矩阵中添加了数据集缓存。这改善了最终用户在创建即席报表时的体验，这可能意味着最终用户会有更高的接受度。


    现在，你已经了解了 `Report Builder 3.0` 及其一些新功能和增强功能，让我们开始看一些例子。在这个例子中，我们将构建一个报表，显示每个患者所在州的就诊次数和预估服务成本，以及患者在我们某个分支机构所在州的就诊情况。它与我们之前创建的报表非常相似，区别在于我们将使用一个
    `地图` 控件。我们还将从我们的 `地图` 报表钻取到一个更详细的表格报表。我们在本书前面已经了解过钻取报表，但我们从未使用过 `Report Builder`
    执行钻取操作。本节演示的钻取报表可在 Apress 网站本书源代码/下载区的 `Pro_SSRS` 项目中找到（[`www.apress.com`](http://www.apress.com)）。该报表名为
    `Emp_Svc_Cost_By_Patient_State_RB3_Drill`。


    在我们开始 `地图` 报表之前，请从 `报表管理器` 打开 `Report Builder 3.0`。`Report Builder` 加载后，在 `入门`
    窗口中单击 `打开`。导航到你硬盘上存储 `Pro_SSRS` 解决方案的位置，并选择名为 `Emp_Svc_Cost_By_Patient_State_RB3_Drill`
    的报表。单击 `打开` 以在 `Report Builder 3.0` 中打开该报表。如果你点击 `运行`，你应该会看到与图 13-61 所示类似的结果。


    ![图片](img/9781430238102_Fig13-61.jpg)


    *图 13-61. Report Builder 3.0 钻取报表*


    预览报表后，返回设计器，并将报表保存到 `Pro_SSRS` 文件夹，就像我们在本章中一直做的那样。将报表保存在此路径下，可以在创建 `Map` 报表后钻取到此报表。将报表保存到
    `报表服务器` 后，点击 `功能区` 按钮，然后点击 `新建`。如前所述，我们的下一个报表将包含每位患者来自的州以及患者实际就诊所在州的聚合就诊次数和预估成本。图
    13-62 展示了该报表在设计模式下的一个示例。


    ![图片](img/square.jpg) **注意** 再次说明，我们一直在使用经过修改的样本数据，以提供代表现实世界场景的结果集。考虑到我们虚构的患者来自全国各地，他们不太可能从像加利福尼亚这样的州专程到俄亥俄州就诊。尽管如此，下一节中的示例可以用于许多需要提供地图和量化数据的应用程序。


    ![图片](img/9781430238102_Fig13-62.jpg)


    *图 13-62. 设计模式下的按分支和患者所在州统计的员工服务成本*

    '
- fmt: "# Report Builder操作指南\n\n1.  右键单击“Data Sources”文件夹并选择“Add Data Source”。将数据源命名为`Pro_SSRS`，选择“Use\
    \ a shared connection or report model”，然后单击“Browse”按钮导航至`Pro_SSRS/DataSources`文件夹下的`Pro_SSRS`数据源。单击“Open”，然后点击“OK”保存数据源。\n\
    2.  右键单击“Datasets”文件夹并选择“Add Dataset”。将数据集命名为`Emp_Svc_Cost_RB3`，并选择“Use a dataset\
    \ embedded in my report”。选择`Pro_SSRS`作为要使用的数据源，并选择查询类型为“Stored Procedure”。选择`Emp_Svc_Cost_By_Patient_State_RB3`存储过程，然后单击“OK”保存数据集。\n\
    3.  接下来，将报告标题更改为“Employee Service Cost by Branch and Patient State”。调整标题文本框的大小以适应新标题，避免文字换行。\n\
    4.  在报表设计 surface 上右键单击，选择“Insert”，然后选择“Matrix”。这会在报表设计窗格中添加一个新的矩阵报表对象。将矩阵拖动到标题附近的左上角位置。\n\
    5.  将`Visit_Count`字段拖到“Data”字段中，然后将`Estimated_Cost`字段拖到`Visit_Count`的右侧。\n6. \
    \ 删除当我们将`Visit_Count`拖到矩阵上时，Report Builder自动添加到“Matrix Column”字段中的`Visit_Count`标签。\n\
    7.  将`PatientStateName`字段拖到矩阵的“Rows”字段中，为每个患者州创建行分组。像步骤6中处理`Visit Count`标签那样，删除放置在矩阵左上角的“Patient\
    \ State Name”标签。使用“Border Lines”格式选项，将左上角空白字段周围的线条设置为“None”。\n8.  通过在“Columns”字段中右键单击，选择“Insert”，然后选择“Rectangle”，在其中插入一个矩形报表对象。我们将在这里放置`BranchStateName`和州的地图。为了给`BranchStateName`和地图留出空间，将此行的高度设置为约2英寸，如之前所示的[Figure\
    \ 13-62](#Chapter13.html#fig_13_62)。\n9.  右键单击这个新的矩形内部，选择“Insert”，然后选择“Textbox”。将文本框移动到矩形的顶部，并将其宽度设置为2.5英寸。右键单击文本框并选择“Expression”。将表达式设置为`Fields!BranchStateName.Value`。单击“OK”保存表达式。将文本对齐方式设置为居中并加粗。然后在`[BranchStateName]`后输入一个空格，再输入“Branch”。文本框现在应显示为`[BranchStateName]\
    \ Branch`。\n10. 选择矩形中我们刚刚创建的`BranchStateName`文本框下方的空白部分。使用功能区上的“Home”选项卡，将矩形周围的线条颜色更改为“Silver”，然后单击边框以在整个矩形周围添加线条。此时，我们的报表应该类似于[Figure\
    \ 13-63](#Chapter13.html#fig_13_63)。\n    ![Image](images/9781430238102_Fig13-63.jpg)\n\
    \    ***Figure 13-63.** 按分支和患者州显示的员工服务成本*\n11. 通过选择字段，然后在“View”菜单上选择“Properties”，将`[Sum(Visit_Count)]`字段格式化为不带小数位的数字。导航到“Number”类别下的“Format”属性。将格式设置为`N0`（即N和零）。将该字段居中。\n\
    12. 通过将其“Format”属性设置为`C2`，将`[Sum(Estimated_Cost)]`字段格式化为带两位小数的货币格式。\n13. 右键单击`PatientStateName`字段，选择“Insert\
    \ Row”，然后选择“Outside Group – Above”，在`PatientStateName`、`Visit_Count`和`Estimated_Cost`行上方添加一行。现在有了这些额外的字段，让我们在其中放置标签来代表它们下方的列。将第一个空文本框设置为显示“Patient\
    \ State”，第二个显示“Visit Count”，最后一个显示“Estimated Cost”。将每个字段加粗，并将“Patient State”列加宽至约1.75英寸。单击“Run”查看我们迄今为止的劳动成果。将“Service\
    \ Year”参数设置为2009，然后单击“View Report”。[Figure 13-64](#Chapter13.html#fig_13_64)显示了如果您一直跟着操作，报表应有的样子。\n\
    \    ![Image](images/9781430238102_Fig13-64.jpg)\n    ***Figure 13-64.** 分组和格式化后，按分支和患者州预览员工服务成本*\n\
    14. 正如您所见，我们在分支州名称文本框和新分组下方留下了一些空间。现在我们将向该空白区域添加一个地图。单击“Design”按钮返回Report Builder设计器。\n\
    15. 右键单击`BranchStateName`文本框下方的空白区域，选择“Insert”，然后选择插入一个新的“Map”报表对象。Report Builder会使矩形变得很大，但在我们将地图调整到想要的样子后，会将其缩小。\n\
    16. 首先，我们要删除添加的额外项目。右键单击地图，取消选中“Show Meridians”复选框。再次操作以取消选中“Show Parallels”。对“Color\
    \ Scale”（左下角）和“Distance Scale”（右下角）执行相同的操作。右键单击图例，然后选择“Delete Legend”。对“Map Title”执行相同的操作。此时，地图看起来像一个巨大的灰色矩形，对吧？我想说我们都完成了，但这会是个玩笑。实际上，现在我们准备施展一些地图绘制魔法。\n\
    17. 右键单击地图，选择“Map”，然后选择“Add Layer”。保持默认的“Map Gallery”被选中，选择“USA by State Inset”，然后单击“Next”。我们稍后将设置缩放为动态，所以现在，在“Choose\
    \ spatial data and map view options”屏幕上单击“Next”以继续“New Map Layer”向导。选择中间选项“Color\
    \ Analytical Map”，然后单击“Next”。我们可以创建新的数据集或浏览另一个，但我们已经有一个可以使用的。选择我们报告中已存在的`Emp_Svc_Cost_RB3`数据集，然后单击“Next”。在“Specify\
    \ the match fields for spatial and analytical data”屏幕中，勾选`STATENAME`，然后选择`BranchStateName`作为要映射到的“Analytical\
    \ Dataset Field”。单击“Next”。将“Theme”设置为“Generic”，“Field to Visualize”设置为`BranchStateName`，然后单击“Finish”完成地图图层向导。\n\
    18. 单击其中一个州以调出“Map Layers”框，然后单击眼睛图像旁边的向下箭头。选择“Polygon Color Rule”。对于本例，我们将选择“*Visualize\
    \ data by using custom colors*”选项。接下来，单击“Add custom colors”按钮并将颜色设置为“Sea Green”。单击“OK”保存“Map\
    \ Color Rules Properties”。\n19. 调整地图大小，使其宽度与`BranchStateName`文本框相同，高度约为2.5英寸。将包含地图的列的宽度调整为约2英寸宽。将包含地图的行的高度设置为约2.5英寸。\n\
    20. 右键单击地图并选择“Viewport Properties”。导航到“Fill”选项卡，将“Fill style”设置为“Solid”。单击“Border”选项卡，将“Line\
    \ style”设置为“None”。单击“Shadow”选项卡，将“Shadow offset”设置为`0pt`。为了让地图动态缩放到该州，单击“Center\
    \ and Zoom”选项卡。将设置更改为“Center map to show all data-bound map elements”，并将缩放级别设置为`1000`。单击“OK”保存“Viewport\
    \ Properties”。\n21. 展开“Report Data”窗格中的“Parameters”文件夹。接下来，我们将为`ServiceYear`参数添加几个年份值。双击`ServiceYear`参数以打开其属性窗口。单击“Available\
    \ values”并选择“Specify values”。单击“Add”按钮三次以容纳三个不同的值。对于第一个值，输入`2009`作为“Value”。为下一个输入`2010`，为最后一个输入`2011`。单击“Default\
    \ Values”选项卡，再次选择“Specify values”选项。单击“Add”按钮并将其值设置为`2009`。单击“OK”保存“Report Parameter\
    \ Properties”。报表应与[Figure 13-65](#Chapter13.html#fig_13_65)所示非常相似。\n    ![Image](images/9781430238102_Fig13-65.jpg)\n\
    \    ***Figure 13-65.** 分组和格式化后，按分支和患者州显示的员工服务成本*\n22. 我们快完成了！最后一个要求是能够从此报表钻取到我们之前部署的名为`Emp_Svc_Cost_By_Patient_State_RB3_Drill`的详细报表。为此，我们将在地图上创建一个操作。为此，再次单击一个州以调出“Map\
    \ Layers”窗口。像之前一样单击向下箭头，选择“Polygon Properties”，然后单击“Action”选项卡。选择“Go to report”选项，然后单击“Browse”按钮选择单击地图时要运行的报表。导航到`Pro_SSRS`文件夹并选择`Emp_Svc_Cost_By_Patient_State_RB3_Drill`报表。单击“Open”返回“Polygon\
    \ Properties”窗口。由于钻取报表需要两个参数，我们需要指定将传递哪些参数。单击“Add”按钮两次，并如[Figure 13-66](#Chapter13.html#fig_13_66)所示设置“Name”和“Value”对。单击“OK”保存“Polygon\
    \ Properties Action”设置。"
  raw: "> 1.  Right-click on the Data Sources folder and select Add Data Source. Name\
    \ the data source Pro_SSRS, select Use a shared connection or report model and\
    \ click the Browse button to navigate to the Pro_SSRS data source under the Pro_SSRS/DataSources\
    \ folder. Click Open and then OK to save the data source.\n> 2.  Right-click on\
    \ the Datasets folder and select Add Dataset. Name the data set Emp_Svc_Cost_RB3\
    \ and select Use a dataset embedded in my report. Select the Pro_SSRS as the data\
    \ source to use and select the Query type radio button to Stored Procedure. Select\
    \ the Emp_Svc_Cost_By_Patient_State_RB3 stored procedure and click OK to save\
    \ your dataset.\n> 3.  Next, change the report title to Employee Service Cost\
    \ by Branch and Patient State. Resize the title textbox to fit the new title without\
    \ wrapping to the next line.\n> 4.  Right click on the report design surface,\
    \ select Insert and then Matrix. This adds a new Matrix report object to the report\
    \ design pane. Drag the Matrix toward the top left near the title.\n> 5.  Drag\
    \ the Visit_Count field into the Data field and then drag the Estimated_Cost field\
    \ to the right of Visit_Count.\n> 6.  Delete the Visit_Count label that Report\
    \ Builder put in the Matrix Column field when we dragged Visit_Count over onto\
    \ our Matrix.\n> 7.  Drag the PatientStateName field into the Rows field of our\
    \ Matrix to create a row grouping for each of the Patients States. Delete the\
    \ Patient State Name label that was placed in the top left corner of the Matrix\
    \ as we did for the Visit Count label in step 6\\. Using the Border Lines formatting\
    \ option, set the lines around the empty top left corner field to be None.\n>\
    \ 8.  Insert a Rectangle report object in the Columns field by right-clicking\
    \ in the columns field, selecting Insert and then Rectangle. This is where we\
    \ are going to put the BranchStateName and a Map for the State. So that we have\
    \ some room for our BranchStateName and a Map, make the height of this row to\
    \ be about 2 inches as shown in [Figure 13-62](#Chapter13.html#fig_13_62) shown\
    \ previously.\n> 9.  Right-click inside of this new Rectangle, select Insert,\
    \ and then Textbox. Move the Textbox to the top of the Rectangle and set its width\
    \ to be 2.5 inches. Right-click the textbox and select Expression. Set the expression\
    \ so that it reads Fields!BranchStateName.Value. Click OK to save the expression.\
    \ Center the alignment of the text and make it Bold. Then enter a space after\
    \ the [BranchStateName] and then enter Branch. The textbox should now read [BranchStateName]\
    \ Branch.\n> 10.  Select a blank section in the Rectangle just below the BranchStateName\
    \ textbox that we just created. Using the Home tab on the Ribbon, change the color\
    \ of the lines surrounding the rectangle to be Silver and then click on the border\
    \ to place lines around the entire rectangle. At this point, our report should\
    \ look similar to [Figure 13-63](#Chapter13.html#fig_13_63).\n>     \n>     ![Image](images/9781430238102_Fig13-63.jpg)\n\
    >     \n>     ***Figure 13-63.** Employee Service Cost by branch and patient state*\n\
    >     \n>     \n> 11.  Format the [Sum(Visit_Count)] field to be Number with no\
    \ decimal places by selecting the field and then selecting the Properties on the\
    \ View menu. Navigate to the Format property under the Number category. Set the\
    \ format to be N0 (that is N and zero). Center the field.\n> 12.  Format the [Sum(Estimated_Cost)]\
    \ field to be Currency with two decimal places by setting its Format property\
    \ to C2.\n> 13.  Add a row above the PatientStateName, Visit_Count and Estimated_Cost\
    \ row by right-clicking on the PatientStateName field, selecting Insert Row and\
    \ then Outside Group – Above. Now that we have these extra fields, let’s put labels\
    \ in them to represent the columns that are below them. Set the first empty textbox\
    \ to read Patient State, the second to Visit Count, and the last one to Estimated\
    \ Cost. Make each of the fields Bold and widen the Patient State column to be\
    \ about 1.75 inches wide. Click Run to see the fruits of our labor up to this\
    \ point. Set the Service Year parameter to 2009 and click View Report. [Figure\
    \ 13-64](#Chapter13.html#fig_13_64) shows what the report should look like if\
    \ you have been following along.\n>     \n>     ![Image](images/9781430238102_Fig13-64.jpg)\n\
    >     \n>     ***Figure 13-64.** Previewing Employee Service Cost by branch and\
    \ patient state after outside group and formatting*\n>     \n>     \n> 14.  As\
    \ you can see, we have left some space below the branch State names textbox and\
    \ the new group. Now we are going to add a Map to that empty space. Click on the\
    \ Design button to return to the Report Builder designer.\n> 15.  Right-click\
    \ in the empty space below the BranchStateName textbox, select Insert and choose\
    \ to insert a new Map report object. Report Builder will make the rectangle much\
    \ larger, but we will shrink it down after we get the Map just the way we want\
    \ it.\n> 16.  To get started, we are going to remove the extra items that are\
    \ added by. Right-click on the Map and remove the checkbox from Show Meridians.\
    \ Do it again to remove the checkbox from Show Parallels. Perform the same action\
    \ for the Color Scale (bottom left) and the Distance Scale (bottom right). Right-click\
    \ on the legend and then select Delete Legend. Perform the same action for the\
    \ Map Title, At this point, the Map looks like a giant grey rectangle right? I\
    \ would say that we are all done, but that would be a joke. In actuality, now\
    \ we are ready to work some mapping magic.\n> 17.  Right-click the map, select\
    \ Map, and then Add Layer. Leave the default Map Gallery selected, choose the\
    \ USA by State Inset, and then click Next. We will set the zoom to be dynamic\
    \ later on, so for now, click Next on the Choose spatial data and map view options\
    \ screen to progress through the New Map Layer wizard. Choose the middle option,\
    \ Color Analytical Map and click Next. We could create a new dataset or browse\
    \ for another one, but we already have one that we can use. Select our Emp_Svc_Cost_RB3\
    \ dataset that already exists in our report and hit Next. In the Specify the match\
    \ fields for spatial and analytical data screen, put a checkbox in STATENAME,\
    \ and then select BranchStateName as the Analytical Dataset Field to map to Click\
    \ Next. Set the Theme to Generic, Field to Visualize to BranchStateName, and click\
    \ Finish to complete the map layer wizard.\n> 18.  Click on one of the States\
    \ to bring up the Map Layers box and click on the down arrow next to the image\
    \ of the eye. Select Polygon Color Rule. For this example, we are going to choose\
    \ the option to *Visualize data by using custom colors*. Next, click the Add custom\
    \ colors button and set the color to be Sea Green. Click OK to save the Map Color\
    \ Rules Properties.\n> 19.  Resize the map to be the same width of the BranchStateName\
    \ textbox and approximately 2.5 inches in height. Resize the width of the column\
    \ that contains the map to be about 2 inches wide. Set the height of the row containing\
    \ the map to be around 2.5 inches.\n> 20.  Right-click on the map and select Viewport\
    \ Properties. Navigate to the Fill tab and set the Fill style to be Solid. Click\
    \ on the Border tab and set the Line style to None. Click on the Shadow tab and\
    \ set the Shadow offset to be 0pt. Now to have the map dynamically zoom into the\
    \ State, click on the Center and Zoom tab. Change the setting to Center map to\
    \ show all data-bound map elements and set the zoom level to be 1000\\. Click\
    \ OK to save the Viewport Properties.\n> 21.  Expand the Parameters folder in\
    \ the Report Data pane. Next we’re going to add a few year values for our ServiceYear\
    \ parameter. Double-click on the ServiceYear parameter to open its properties\
    \ window. Click on the Available values and select Specify values. Click the Add\
    \ button three times to hold three different values. For the first value, enter\
    \ 2009 as the Value. Enter 2010 for the next one and 2011 for the last one. Click\
    \ on the Default Values tab and choose the option to Specify values again. Click\
    \ the Add button and set its value to be 2009. Click OK to save the Report Parameter\
    \ Properties. The report should closely resemble what is shown in [Figure 13-65](#Chapter13.html#fig_13_65).\n\
    >     \n>     ![Image](images/9781430238102_Fig13-65.jpg)\n>     \n>     ***Figure\
    \ 13-65.** Employee Service Cost by branch and patient state after outside group\
    \ and formatting*\n>     \n>     \n> 22.  We are almost complete! One final requirement\
    \ is to have the ability to drill through from this report to our detailed report\
    \ named Emp_Svc_Cost_By_Patient_State_RB3_Drill that we deployed earlier. To do\
    \ this, we are going to create an action on the map. To do this, click on a State\
    \ again to bring up the Map Layers window. Click on the down arrow as you did\
    \ earlier, select Polygon Properties and then click on the Action tab. Choose\
    \ the option to Go to report and click the Browse button to choose the report\
    \ to run when clicking the map. Navigate to the Pro_SSRS folder and select the\
    \ Emp_Svc_Cost_By_Patient_State_RB3_Drill report. Click Open to return to the\
    \ Polygon Properties window. Since the drill through report requires two parameters,\
    \ we need to specify what parameters will pass through it. Click the Add button\
    \ twice and set the Name and Value pairs as shown in [Figure 13-66](#Chapter13.html#fig_13_66).\
    \ Click OK to save the Polygon Properties Action settings."
