    可以为钻取报告分配多个参数选择、数据集字段、表达式和固定字面量作为输入。现在你已经链接到一个可能有多个参数的报告，让我们更深入地看看参数和筛选器如何协同工作以向报告提供数据。


    ### 使用存储过程设置报告参数


    在第 3 章中，我们介绍了参数，并解释了如何在报告和查询中使用它们来限制从数据源返回的结果。到目前为止，你一直在使用不同类型的数据集、查询和存储过程来构建报告，但我们只触及了如何在
    SSRS 中使用参数的皮毛。参数的值主要来自用户输入，并且最常与数据集相关联；它们用于限制返回的数据量。当参数以这种方式使用时，它被称为*查询参数*。作为数据集一部分的查询参数（例如
    SQL 查询或存储过程）会自动在 SSRS 中生成报告参数。


    在本节中，你将修改员工服务成本报告的数据集，以使用参数化存储过程而不是查询。默认情况下，从存储过程生成的报告参数没有填充供用户选择的下拉列表，因此在本节中，你还将用有效的数据填充报告参数列表，以供用户选择输入。最后，你将了解
    SSRS 如何处理`NULL`参数值以及如何为参数生成`NULL`值。当你为 SSRS 报告检索数据时，这一点将变得尤为重要，我们将在本节后面解释。


    你将返回到你已创建的名为`Emp_Svc_Cost`的存储过程，你可能还记得，它将提供与你一直在使用的 SQL 查询相同的数据集。该存储过程的优点是能够接受你希望在报告中使用的所有参数。SSRS
    将自动从存储过程创建报告参数。让我们快速回顾一下将从存储过程传递到报告的参数：

    *   `BranchID`

    *   `EmployeeTbllD`

    *   `ServiceMonth`

    *   `ServiceYear`

    *   `ServiceLogCtgrylD`


    要为当前使用非参数化查询的员工服务成本报告自动创建参数，你只需将报告的数据集更改为该存储过程。


    打开代码下载中包含的项目中的`EmployeeServiceCost_SP`报告。在包含数据集`Emp_Svc_Cost`的“报告数据”窗口中，你可以右键单击`Emp_Svc_Cost`数据集并选择“数据集属性”以打开“属性”窗口。在“数据集属性”对话框中，将“查询类型”从“文本”更改为“存储过程”。接下来，在“查询字符串”窗口中选择或键入存储过程`Emp_Svc_Cost`的名称，然后单击“确定”。单击“确定”后，参数将自动为你创建。接下来，再次右键单击`Emp_Svc_Cost`数据集并选择“查询”。你应该看到查询将执行`Emp_Svc_Cost`存储过程。单击“运行”按钮，这将提示你输入参数值，如图
    6-25 所示。由于存储过程设计为接受`NULL`值，请在“定义查询参数”对话框中将默认输入值从“空白”更改为“`NULL`”，然后单击“确定”以完成执行。如果你不选择“`NULL`”而是“空白”，查询将失败并显示错误消息“无法将参数值从字符串转换为`Int32`”。


    ![Image](img/9781430238102_Fig06-25.jpg)


    *图 6-25. 存储过程`Emp_Svc_Cost`所需的参数*'
- fmt: "## 发现参数未设置为允许NULL值\n\n在“报表数据”窗口中，可以看到报表参数是从存储过程自动创建的。虽然SSRS确实正确地为每个参数分配了数据类型（整数和字符串），但它并未自动将字段设置为允许NULL值（见[图\
    \ 6-26](#Chapter06.html#fig_6_26)）。出于本报表的目的（期望NULL值作为可能的参数），为每个参数选中“允许NULL值”复选框至关重要。这样，当预览报表时，NULL将是默认值，并且NULL复选框将自动选中，从而无需用户输入即可执行报表。请右键单击每个参数并选择“属性”，将所有参数更新为“允许NULL值”。然后在“常规”选项卡下勾选“允许NULL值”选项。\n\
    \n![Image](images/9781430238102_Fig06-26.jpg)\n\n图 6-26. 报表属性对话框，显示了“允许NULL值”字段\n\
    \n## 配置默认参数值\n\n默认参数值也需要手动配置。如果未为可用参数分配默认参数值，则报表在呈现或预览时，将不会处理传入数据，直到用户提供值。预览报表而不修改参数选择，会发现用户需要为每个未分配默认值的参数输入值。用户将无法从值列表中选择，而必须手动输入。这通常是不可接受的，因为用户可能并不总是知道要输入的正确值；用于选择特定员工的`EmployeeTblID`字段和用于检索部门名称的`BranchID`字段就是很好的例子。\n\
    \n第一步是为参数下拉列表提供有效的查询分配值。在从新数据集添加描述性参数值之前，先预览报表视图会很有帮助（见[图 6-27](#Chapter06.html#fig_6_27)）。请注意，参数选择旁边有一个选中的NULL复选框。当参数允许NULL值（如您之前设置的）并且没有其他可用值时，就会出现NULL复选框。\n\
    \n![Image](images/9781430238102_Fig06-27.jpg)\n\n图 6-27. 下拉列表中无可用参数值\n\n## 创建数据集以填充参数下拉列表\n\
    \n可以使用以下脚本添加两个数据集，以填充“部门”和“员工”参数的下拉列表：\n\n1.  在“报表数据”窗口中，右键单击“数据集”文件夹并选择“新建数据集”，在报表中嵌入两个新数据集`Employee_DS`和`Branch_DS`。对于您创建的两个数据集，您将添加简单的查询，这些查询将返回员工和部门的ID（用于“值”属性）和名称（用于“标签”属性）。注意下面的员工查询的`WHERE`子句，为了简单起见，您只包含了一组已知的员工。在真实场景中，业务规则决定了过滤器，但您可能不会以这种方式硬编码值。我们只是展示了一种可以硬编码过滤器以返回用于参数下拉列表的子数据集的方法。\n\
    \n    ```\n    --Query for Employee Parameter\n    SELECT\n            EmployeeTblID\n\
    \            , RTRIM(RTRIM(E.LastName)  +  ', '  + RTRIM(E.FirstName)) as Employee_Name\n\
    \    FROM\n            Employee E\n    WHERE\n            (E.EmployeeTblID IN\
    \ (32, 15, 34, 44, 129, 146, 159, 155, 26))\n    --Query for Branch Parameter\n\
    \    SELECT\n            BranchID, BranchName\n    FROM\n            Branch\n\
    \    UNION\n    SELECT     NULL AS BranchID, NULL AS BranchName\n    ```\n\n2.\
    \  使用上述查询创建数据集并通过“报表数据”窗口中的“查询”验证其正确执行后，展开“参数”文件夹。右键单击`BranchID`参数，选择“参数属性”，并为清晰起见，在提示中输入**部门**。您将在下拉列表中选择部门名称。\n\
    3.  在部门参数的“可用值”中，选择“从查询中获取值”，然后选择`Branch_DS`数据集。“值”字段将是`BranchID`，“标签”字段将是`BranchName`。\n\
    4.  按照相同的步骤修改员工参数，分配`Employee_DS`并分别选择“值”和“标签”字段为`EmployeeTblID`和`Employee_Name`。最后，如步骤2所示，为清晰起见将提示更改为**员工**。完成后，选择“确定”。\n\
    5.  最后，在“设计”选项卡上，您将为报表中的表格添加一个按“部门名称”的分组，以便在选择参数时，可以看到报表是针对特定部门的。为此，右键单击表格中“诊断”文本框左侧的行标题，然后选择“添加组”\
    \ >> “父组”。这将使“诊断”组（原为第一组）现为第二组，并将添加一个新组。将表达式值`=Fields!BranchName.Value`分配给新组，选择“添加组头”选项，并在“分组”对话框中单击“确定”。接下来，将`BranchName`字段从您刚创建的“部门”组的新第一列行中移动到“诊断”正上方的空白区域。此外，将该字段设为粗体，并将字体大小调整为12磅。现在格式已设定，删除添加新`BranchName`组时创建的列。您可以通过右键单击它并选择“删除列”来删除该列。\n\
    \n## 结果\n\n现在报表的可用参数值将具有填充的下拉列表，如[图 6-28](#Chapter06.html#fig_6_28)所示。请注意，对于您已添加可用值的两个参数，NULL复选框已消失。\n\
    \n![Image](images/9781430238102_Fig06-28.jpg)\n\n图 6-28 具有已填充参数选择的报表"
  raw: "In the Report Data window, you can see that the report parameters were automatically\
    \ created from the stored procedure. Although SSRS did correctly assign the datatype\
    \ for each parameter, integer, and string, it did not automatically set the field\
    \ to allow NULL values (see [Figure 6-26](#Chapter06.html#fig_6_26)). For the\
    \ purpose of this report, which expects NULL values as possible parameters, it\
    \ is important that the Allow Null Value checkbox is selected for each parameter\
    \ so that when the report is previewed, NULL will be the default value, and the\
    \ NULL checkbox will be automatically checked so that the report executes without\
    \ requiring user input. Go ahead and update all of the parameters to Allow null\
    \ value by right clicking each of them and selecting Properties. Then put a check\
    \ in the option Allow null value under the General tab.\n\n![Image](images/9781430238102_Fig06-26.jpg)\n\
    \n***Figure 6-26.** Report Properties dialog box, showing the Allow Null Value\
    \ field*\n\nDefault parameter values will also need to be manually configured.\
    \ If no default parameter value is assigned to an available parameter, the report,\
    \ when rendered or previewed, will not process the incoming data until a user\
    \ supplies a value. Previewing the report without modifying the parameter selection\
    \ reveals that the user would need to enter a value for each parameter that has\
    \ no default value assigned. The user would not be able to choose from a list\
    \ of values, but would have to enter them manually. This is often unacceptable\
    \ because the user may not always know the correct values to enter; good examples\
    \ of this are the EmployeeTblID field that is used to select a specific employee\
    \ and the BranchID field used to retrieve the branch name.\n\nThe first step is\
    \ to provide valid query-assigned values for the parameter drop-down lists. It\
    \ would be beneficial to provide a view of the report in preview mode prior to\
    \ adding descriptive parameter values from a new dataset (see [Figure 6-27](#Chapter06.html#fig_6_27)).\
    \ Notice that there is a NULL checkbox selected next to the parameter selections.\
    \ The NULL checkboxes appear when the parameter allows NULL values, as you set\
    \ earlier, and there are no other available values.\n\n![Image](images/9781430238102_Fig06-27.jpg)\n\
    \n***Figure 6-27.** No parameter values available via drop-down list*\n\nThe following\
    \ scripts can be used to add two datasets to populate the Branch and Employee\
    \ drop-down lists for the parameters:\n\n1.  In the Report Data window, create\
    \ two new datasets embedded in the report, Employee_DS and Branch_DS, by right-clicking\
    \ the Datasets folder and selecting New Dataset. For both datasets you create,\
    \ you will add simple queries that will return the IDs (for the Value attribute)\
    \ and names (for the Label attribute) for the employee and the branch. Notice\
    \ in the WHERE clause of the employee query that follows that you are including\
    \ only a known set of employees for simplicity. In a real world scenario, business\
    \ rules dictate filters, but you probably wouldn’t hard code your values in this\
    \ fashion. We are just showing one way that you could hard code a filter to return\
    \ a subset of data to be used in our parameter drop-down list. `--Query for Employee\
    \ Parameter`\n    `SELECT`\n    `        EmployeeTblID`\n    `        , RTRIM(RTRIM(E.LastName)  +  ',\
    \ '  + RTRIM(E.FirstName)) as Employee_Name`\n    `FROM`\n    `        Employee\
    \ E`\n    `WHERE`\n    `        (E.EmployeeTblID IN (32, 15, 34, 44, 129, 146,\
    \ 159, 155, 26))`\n    `--Query for Branch Parameter`\n    `SELECT`\n    `        BranchID,\
    \ BranchName`\n    `FROM`\n    `        Branch`\n    `UNION`\n    `SELECT     NULL\
    \ AS BranchID, NULL AS BranchName`\n2.  After you have created the datasets with\
    \ the previous queries and verified that they execute properly via Query in the\
    \ Report Data window, expand the Parameters folder. Right-click the BranchID parameter,\
    \ select Parameter Properties, and enter **Branch** for the prompt for clarity.\
    \ You will be selecting the branch name in the drop-down list.\n3.  In the available\
    \ values for the branch parameters, select Get Values from Query, and then select\
    \ the Branch_DS dataset. The Value field will be BranchID, and the Label field\
    \ will be BranchName.\n4.  Follow the same steps to modify the Employee parameters,\
    \ assigning Employee_DS and choosing the Value and Label fields as EmployeeTblID\
    \ and Employee_Name, respectively. Finally change the prompt to **Employee** for\
    \ clarity as we performed in step 2\\. When finished, select OK.\n5.  Finally,\
    \ on the Design tab, you will add a grouping for Branch Name to the table in the\
    \ report so that as the parameters are selected, you can see that the report is\
    \ specific to a branch. To do this, right-click the row header to the left of\
    \ the Diagnosis textbox in the table, and select Add Group >> Parent Group. This\
    \ will make the Diagnosis group, formerly the first group, now the second group\
    \ and will add a new group. Assign the expression value of =Fields!BranchName.Value\
    \ to the new group, select the option to Add group header and click OK in the\
    \ Grouping dialog box. Next, move the BranchName field from the new first column\
    \ row for the Branch group you just created and into the blank area just above\
    \ Diagnosis. Also, make the field bold, and resize the font to 12 points. Now\
    \ that it is formatted, delete the column that was created when you added the\
    \ new BranchName group. You can delete the column by right clicking it and selecting\
    \ Delete Columns.\n\nThe report will now have populated drop-down lists for the\
    \ available parameter values, as shown in [Figure 6-28](#Chapter06.html#fig_6_28).\
    \ Notice that for the two parameters where you have added available values, the\
    \ NULL checkbox has disappeared.\n\n![Image](images/9781430238102_Fig06-28.jpg)\n\
    \n***Figure 6-28** Report with populated parameter selections*"
