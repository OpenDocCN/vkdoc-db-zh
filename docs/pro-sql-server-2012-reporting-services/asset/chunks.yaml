    13. 右键单击`PatientStateName`字段，选择“插入行”，然后选择“组外 – 上方”，在`PatientStateName`、`Visit_Count`和`Estimated_Cost`行上方添加一行。现在有了这些额外的字段，让我们在其中放置标签来代表它们下方的列。将第一个空文本框设置为显示“患者州”，第二个显示“访问次数”，最后一个显示“预估成本”。将每个字段加粗，并将“患者州”列加宽至约\
    \ 1.75 英寸。单击“运行”查看我们迄今为止的劳动成果。将“服务年份”参数设置为 2009，然后单击“查看报表”。图 13-64 显示了如果您一直跟着操作，报表应有的样子。\n\
    \    ![Image](img/9781430238102_Fig13-64.jpg)\n    ***图 13-64.** 分组和格式化后，按分支机构和患者州预览员工服务成本*\n\
    14. 正如您所见，我们在分支机构州名称文本框和新分组下方留下了一些空间。现在我们将向该空白区域添加一个地图。单击“设计”按钮返回 Report Builder\
    \ 设计器。\n15. 右键单击`BranchStateName`文本框下方的空白区域，选择“插入”，然后选择插入一个新的“地图”报表对象。Report Builder\
    \ 会使矩形变得很大，但在我们将地图调整到想要的样子后，会将其缩小。\n16. 首先，我们要删除添加的额外项目。右键单击地图，取消选中“显示经线”复选框。再次操作以取消选中“显示纬线”。对“颜色图例”（左下角）和“距离图例”（右下角）执行相同的操作。右键单击图例，然后选择“删除图例”。对“地图标题”执行相同的操作。此时，地图看起来像一个巨大的灰色矩形，对吧？我想说我们都完成了，但这会是个玩笑。实际上，现在我们准备施展一些地图绘制魔法。\n\
    17. 右键单击地图，选择“地图”，然后选择“添加图层”。保持默认的“地图库”被选中，选择“美国按州插入图”，然后单击“下一步”。我们稍后将设置缩放为动态，所以现在，在“选择空间数据和地图视图选项”屏幕上单击“下一步”以继续“新建地图图层”向导。选择中间选项“颜色分析地图”，然后单击“下一步”。我们可以创建新的数据集或浏览另一个，但我们已经有一个可以使用的。选择我们报告中已存在的`Emp_Svc_Cost_RB3`数据集，然后单击“下一步”。在“为空间数据和分析数据指定匹配字段”屏幕中，勾选`STATENAME`，然后选择`BranchStateName`作为要映射到的“分析数据集字段”。单击“下一步”。将“主题”设置为“常规”，“要可视化的字段”设置为`BranchStateName`，然后单击“完成”完成地图图层向导。\n\
    18. 单击其中一个州以调出“地图图层”框，然后单击眼睛图像旁边的向下箭头。选择“多边形颜色规则”。对于本例，我们将选择“*使用自定义颜色可视化数据*”选项。接下来，单击“添加自定义颜色”按钮并将颜色设置为“海绿色”。单击“确定”保存“地图颜色规则属性”。\n\
    19. 调整地图大小，使其宽度与`BranchStateName`文本框相同，高度约为 2.5 英寸。将包含地图的列的宽度调整为约 2 英寸宽。将包含地图的行的高度设置为约\
    \ 2.5 英寸。\n20. 右键单击地图并选择“视口属性”。导航到“填充”选项卡，将“填充样式”设置为“纯色”。单击“边框”选项卡，将“线条样式”设置为“无”。单击“阴影”选项卡，将“阴影偏移”设置为`0pt`。为了让地图动态缩放到该州，单击“居中和缩放”选项卡。将设置更改为“居中地图以显示所有数据绑定地图元素”，并将缩放级别设置为`1000`。单击“确定”保存“视口属性”。\n\
    21. 展开“报表数据”窗格中的“参数”文件夹。接下来，我们将为`ServiceYear`参数添加几个年份值。双击`ServiceYear`参数以打开其属性窗口。单击“可用值”并选择“指定值”。单击“添加”按钮三次以容纳三个不同的值。对于第一个值，输入`2009`作为“值”。为下一个输入`2010`，为最后一个输入`2011`。单击“默认值”选项卡，再次选择“指定值”选项。单击“添加”按钮并将其值设置为`2009`。单击“确定”保存“报表参数属性”。报表应与图\
    \ 13-65 所示非常相似。\n    ![Image](img/9781430238102_Fig13-65.jpg)\n    ***图 13-65.**\
    \ 分组和格式化后，按分支机构和患者州显示的员工服务成本*\n22. 我们快完成了！最后一个要求是能够从此报表钻取到我们之前部署的名为`Emp_Svc_Cost_By_Patient_State_RB3_Drill`的详细报表。为此，我们将在地图上创建一个操作。为此，再次单击一个州以调出“地图图层”窗口。像之前一样单击向下箭头，选择“多边形属性”，然后单击“操作”选项卡。选择“转到报表”选项，然后单击“浏览”按钮选择单击地图时要运行的报表。导航到`Pro_SSRS`文件夹并选择`Emp_Svc_Cost_By_Patient_State_RB3_Drill`报表。单击“打开”返回“多边形属性”窗口。由于钻取报表需要两个参数，我们需要指定将传递哪些参数。单击“添加”按钮两次，并如图\
    \ 13-66 所示设置“名称”和“值”对。单击“确定”保存“多边形属性操作”设置。\n"
- fmt: "![Image](images/9781430238102_Fig13-66.jpg)\n\n`Figure 13-66.` Polygon properties\
    \ action settings\n\nWhew! That was fun! Click the `Run` button to execute our\
    \ finished report in action. If you have performed the preceding steps, your finished\
    \ report should be something close to [Figure 13-67](#Chapter13.html#fig_13_67).\n\
    \n![Image](images/9781430238102_Fig13-67.jpg)\n\n`Figure 13-67.` Employee Service\
    \ Cost report by branch and patient state rendered\n\nAfter running the report,\
    \ click on one of the branch `State` maps to drill through to the detail report.\
    \ If you were to click on `Ohio` for `Service Year 2009`, your results would be\
    \ like those shown in [Figure 13-68](#Chapter13.html#fig_13_68).\n\n![Image](images/9781430238102_Fig13-68.jpg)\n\
    \n`Figure 13-68.` Employee Service Cost Detail drill-through report by branch\
    \ and patient state\n\n### Report Parts\n\nThere is one more feature that was\
    \ added with `SSRS 2008 R2` that provides some of the true power of ad hoc reporting.\
    \ As we briefly touched on previously, Report Parts can be created and deployed\
    \ to the reporting server with the sole purpose of being used by other report\
    \ developers or ad hoc report authors. Report Parts not only assist in keeping\
    \ consistency through reusability, but they can also improve report authoring\
    \ efficiencies. What is also amazing with Report Parts is that when reports consume\
    \ report parts, if a change is made to the report part, then each report that\
    \ is using it is notified of the change. The report author can choose to use the\
    \ new version or keep the existing version that the report is using. This is incredible,\
    \ I know, and it is a very well received addition to the `Report Builder` tool.\n\
    \nBefore we get into an example, just note that not all report items can be published\
    \ as report parts. Most of the report items found in the toolbox can be used as\
    \ a report part, but not all. A list of the report items that can be used are:\n\
    \n- `Tablix` – `Table`, `List` and `Matrix`\n- `Charts`\n- `Gauges`\n- `Maps`\n\
    - `Rectangles`\n- `Images`\n- `Parameters`\n\nWe are going to deploy an existing\
    \ report to the `Report Server` as a Report Part. We could do this using the `Report\
    \ Designer` or `Report Builder`, but since we are showing the capabilities of\
    \ `Report Builder 3.0`, we will show you how to open up an existing report and\
    \ deploy it from `Report Builder`. After we have it deployed, we will show you\
    \ how report authors using `Report Builder 3.0` can “consume” or re-use parts\
    \ of reports that have been deployed to the `Report Server`. Open up the `Report\
    \ Builder` and let's get started. Here’s what to do:\n\n1.  Once you have `Report\
    \ Builder` started, click on the `Report Builder` icon in the top left corner\
    \ and click `Open`.\n2.  Navigate to the location that you have extracted the\
    \ `Pro_SSRS` solution and locate the `EmployeeSvcCost_RB3_ReportPart.rdl` file.\
    \ Click `Open` to load the report in `Report Builder 3.0`.\n3.  Click `Run` to\
    \ view the report to see it in action. The report shows a pie chart with the estimated\
    \ cost for each branch as shown in [Figure 13-69](#Chapter13.html#fig_13_69).\n\
    \    ![Image](images/9781430238102_Fig13-69.jpg)\n    `Figure 13-69.` `EmployeeSvcCost_RB3_ReportPart`\
    \ report\n4.  Click the `Design` button to return to design mode. Next, click\
    \ on the `Report Builder` menu button again and choose `Publish Report Parts`,\
    \ as shown in [Figure 13-70](#Chapter13.html#fig_13_70).\n    ![Image](images/9781430238102_Fig13-70.jpg)\n\
    \    `Figure 13-70.` Publish Report Parts\n5.  On the `Publish Report Parts` screen,\
    \ we have the options to `Publish all report parts with default settings` or to\
    \ `Review and modify report parts before publishing`. We could choose the former\
    \ option, but to show you the ability to deploy individual report items, select\
    \ the latter option: `Review and modify report parts before publishing` as depicted\
    \ in [Figure 13-71](#Chapter13.html#fig_13_71).\n    ![Image](images/9781430238102_Fig13-71.jpg)\n\
    \    `Figure 13-71.` Review before publishing\n6.  As can be seen in [Figure 13-72](#Chapter13.html#fig_13_72),\
    \ we have the option to deploy two items in our report. The first being the `EstimatedCostByBranch_Pie`\
    \ chart and the second one is our `ServiceYear` report parameter. Since the `Chart`\
    \ needs the parameter, ensure that both are selected and click `Publish` to deploy\
    \ our chart to the reporting server.\n    ![Image](images/9781430238102_Fig13-72.jpg)\n\
    \    `Figure 13-72.` Publish selected report parts\n7.  If permissions are set\
    \ appropriately (`Content Manager`) on the reporting server, you should see two\
    \ green checkmarks next to the report parts that we had selected to deploy. Click\
    \ `Close` to return to `Report Builder`.\n8.  Now that we have our report parts\
    \ deployed, now it is time to create a report that consumes the report part. Click\
    \ on the `Report Builder` menu button again and choose `New` and then choose to\
    \ create a `Blank report`. After the new report is loaded change the title of\
    \ the report to “Estimated Cost by Branch”.\n9.  Click on the `Insert` tab in\
    \ the tabstrip and then select `Report Parts`. You should see the `Report Part\
    \ Gallery` window pane become visible on the right side of the screen, as shown\
    \ in [Figure 13-73](#Chapter13.html#fig_13_73). From the `Report Part Gallery`\
    \ window, you can search for report parts and see things like what report parts\
    \ are out there as well as who created them. You can even see what the report\
    \ part looks like when previewing in thumbnail view.\n    ![Image](images/9781430238102_Fig13-73.jpg)\n\
    \    `Figure 13-73.` Viewing the report part gallery\n10. To use a report part\
    \ in a report, it is as easy as dragging and dropping the report part onto our\
    \ design surface. With that being said, drag the `EstimatedCostByBranch_Pie` chart\
    \ over onto the design surface and set the left side to be aligned with the header.\
    \ Click on the `home` tab and then run the report. Executing the report with `ServiceYear\
    \ 2009` can be seen in [Figure 13-74](#Chapter13.html#fig_13_74).\n11. Save the\
    \ report to the `Report Server` as we did in earlier examples with the name of\
    \ `EstimatedCostByBranch_RB3_Report_Using_ReportPart`. We will be looking at this\
    \ report this later after modifying the report part.\n\n![Image](images/9781430238102_Fig13-74.jpg)\n\
    \n`Figure 13-74.` Report consuming deployed report part"
