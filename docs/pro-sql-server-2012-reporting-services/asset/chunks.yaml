    shows the completed chart. Now you can save the chart report as Active Patient
    Census to the Pro_SSRS folder, as you did the other two reports.


    ![Image](images/9781430238102_Fig13-42.jpg)


    ***Figure 13-42.** Preview of the Active Patient Census chart report*


    The reports are deployed as standard RDL report files with the exception that
    their data source is a report model and not a standard RDS data source object.
    You can see the three newly published reports in Report Manager, as shown in [Figure
    13-43](#Chapter13.html#fig_13_43).


    ![Image](images/9781430238102_Fig13-43.jpg)


    ***Figure 13-43.** Report Builder 1.0 reports published in Report Manager*'
  trans: '

    ### 创建图表报表


    报表生成器 1.0 中最后一种可用的报表类型是图表报表。至此，你已经创建并保存了表格和矩阵报表，以满足“患者统计”报表的许多请求。现在，我们将展示一种最重要的报表，用于回答统计中的患者数量问题。“统计”意味着患者当前正在接受服务且尚未出院。在你使用的数据库中，如果患者的出院日期为
    `Null`，或者用报表生成器 1.0 的术语来说是“空”，则该患者被视为活跃状态。你将创建的图表是一个简单的条形图，按分支机构显示活跃患者的计数。


    回到报表生成器 1.0 的设计区域，在“报表布局”选项卡中点击图表报表。空白报表模板包含一个“图表”数据区域，如图 13-38 所示。如同之前创建表格和矩阵报表一样，你将添加一个标题：活跃患者统计。


    ![Image](img/9781430238102_Fig13-38.jpg)


    **图 13-38.** 图表报表模板


    图表有三个可以拖放数据的区域：系列、类别和数据。你需要显示活跃患者计数，因此可以将 `患者 ID` 字段拖放到“数据”区域；但是，因为 `患者 ID` 字段不像
    `平均住院天数` 那样被视为可以应用聚合函数的字段，所以无法直接将其拖放到“数据”区域。图表将不接受放置于此。既然你知道既需要一个计数值，又需要一个筛选器来仅获取活跃患者，你可以通过向字段列表添加一个新字段来同时解决这两个问题。在“资源管理器”选项卡中点击“新建字段”按钮，并将新字段命名为
    `患者计数`，如图 13-39 所示。用于 `患者计数` 字段的公式可以是 `COUNTDISTINCT(患者 ID)`。请注意，在“定义公式”对话框中，`患者
    ID` 字段添加到公式文本框后，其下方会有一条虚线，表示链接。你可以单击该字段，在为新字段定义公式时添加一个筛选器，接下来你将进行此操作。


    ![Image](img/9781430238102_Fig13-39.jpg)


    **图 13-39.** 为新字段 `患者计数` 定义公式


    点击“未应用筛选器”链接，选择“创建新筛选器”以打开“筛选数据”对话框。你可以在图 13-40 中看到需要应用的筛选器，以仅显示活跃患者，其中你将 `出院日期`
    设置为空，这将强制仅使用没有出院日期的患者进行公式计算。要实现筛选，将 `出院日期` 拖放到筛选窗格。然后通过点击“等于”链接标签选择“为空”值。将筛选器命名为
    `活跃患者`，然后点击“确定”。一旦 `患者计数` 字段创建并显示在“字段”选项卡上，你就可以将其拖放到图表的“数据值字段”区域。在这种情况下，由于我们将其添加到“数据值字段”区域，只需双击
    `患者计数` 字段，报表生成器就会将其放置在正确的部分。


    ![Image](img/9781430238102_Fig13-40.jpg)


    **图 13-40.** 添加 `活跃患者` 筛选器


    接下来，将 `分支机构名称` 字段拖放到图表的“类别”区域。你可以向图表添加更多的系列项或类别，但为了保持图表简洁并满足请求，你将仅通过移除图表标题来对图表应用一些格式设置，以使报表上不显示“图表标题”。要修改图表属性，请遵循以下四个步骤：


    > 1.  右键单击图表，然后选择“图表选项”。

    > 2.  在“标题”选项卡上，删除图表、X 轴类别和 Y 轴数值的标题文本。

    > 3.  在“图例”选项卡上，取消勾选“显示图例”复选框。

    > 4.  最后，在“3D”选项卡上，勾选“以 3D 视觉效果显示图表”框，将“水平旋转”设置为 25，“垂直旋转”设置为 10，“明暗”设置为“逼真”，并选择“圆柱体”作为形状，如图
    13-41 所示。


    ![Image](img/9781430238102_Fig13-41.jpg)


    **图 13-41.** 设置 3D 视觉效果


    在预览报表之前的最后一个任务是设置图表上的数据标签。为此：


    > 1.  右键单击图表，选择“数据系列”，然后选择“设置数据系列格式 - 患者计数”。如果你希望在图表柱形上显示患者计数值，请选择“显示数据点标签”。在本示例中，选择“显示数据点标签”选项。

    > 2.  将角度设置为–10 度，使其稍微突出一些。

    > 3.  点击“格式”按钮，将字体大小设置为 16。


    当你点击“确定”设置数据点标签，然后预览报表时，可以看到按分支机构显示活跃患者计数的图表。随着患者出院，由于筛选器，他们将从活跃患者列表中移除，图表将自动反映当前的统计计数。图
    13-42 显示了完成的图表。现在，你可以将图表报表保存为 `活跃患者统计` 到 `Pro_SSRS` 文件夹中，就像保存其他两个报表一样。


    ![Image](img/9781430238102_Fig13-42.jpg)


    **图 13-42.** 活跃患者统计图表报表的预览


    这些报表以标准的 RDL 报表文件形式部署，不同之处在于它们的数据源是报表模型，而不是标准的 RDS 数据源对象。你可以在报表管理器中看到三个新发布的报表，如图
    13-43 所示。


    ![Image](img/9781430238102_Fig13-43.jpg)


    **图 13-43.** 在报表管理器中发布的报表生成器 1.0 报表

    '
- fmt: "## Creating Reports with the Report Builder 2.0 Wizard\n\nAt this point, we\
    \ created `SSRS` reports with `BIDS` and `Report Builder 1.0` using `ClickOnce`.\
    \ Both design environments provide different levels of control over report design.\
    \ While `BIDS` offers report creators much more flexibility than `Report Builder\
    \ 1.0`, it might not be the best choice for people who are not also application\
    \ programmers. `Report Builder 1.0`, by contrast, is easy to learn and to use\
    \ to publish reports; however, it comes with limitations in that reports can only\
    \ be created using prebuilt models, which is not enough to meet everyone’s needs.\
    \ In `SSRS 2008`, Microsoft provided `Report Builder 2.0`, which supported true\
    \ ad hoc query and report design not solely based on report models. `Report Builder\
    \ 2.0`’s modern look and feel, with `Ribbon` technology like that found in `Office\
    \ 2007` applications, gave report creators a familiar environment to work in.\n\
    \n[Figure 13-44](#Chapter13.html#fig_13_44) shows the `Report Builder 2.0` interface.\
    \ Microsoft’s use of the new `Ribbon` technology is apparent in the figure.\n\n\
    ![Image](images/9781430238102_Fig13-44.jpg)\n\n`Figure 13-44. Report Builder 2.0’s\
    \ new interface`\n\n![Image](images/square.jpg) **Note** In order to use `Report\
    \ Builder 2.0` on a `SQL Server 2008 R2` or `SQL Server 2012` box, you will need\
    \ to install the `Report Builder 2.0` thick client. This client can be downloaded\
    \ from [`www.microsoft.com/en-us/download/details.aspx?id=24085`](http://www.microsoft.com/en-us/download/details.aspx?id=24085).\
    \ If you are using a `SQL Server 2008 SP1` box, you can use the `ClickOnce` application\
    \ from the `Report Builder` button on the `Report Manager` or from within `SharePoint`.\
    \ By default, `Report Builder 1.0` is configured within the `Report Manager`,\
    \ so you will need to change the `Report Builder` `URL` on the `Site Settings`\
    \ page to reflect your installation folder. For example, if I had `SQL Server\
    \ 2008 SP1` installed, I would change mine to be `/ReportBuilder/reportbuilder_2_0_0_0.application`\
    \ or the full `URL` of [`http://ServerName:PortNumber/ReportServer/ReportBuilder/reportbuilder_2_0_0_0.application`](http://ServerName:PortNumber/ReportServer/ReportBuilder/reportbuilder_2_0_0_0.application).\
    \ When in `SharePointIntegrated` mode, you change the `Custom Report Builder URL`\
    \ to be a slightly different `URL` of `/_vti_bin/ReportBuilder/ReportBuilder_2_0_0_0.application`.\n\
    \nAs you might imagine, developing a report in `Report Builder 2.0` is simplified,\
    \ with all design choices available in one of three tabs, `Home`, `Insert`, and\
    \ `View`. Built-in fields, parameters, images, and data sources are all contained\
    \ in folders within the `Data` window. Like in `SQL Server Data Tools (SSDT)`,\
    \ `Row Groups` and `Column Groups` areas located are on the bottom. Instructional\
    \ text, as well as link buttons that fire up the `Table`, `Matrix` and `Chart`\
    \ wizards, have been added to the body of the report to guide the designer through\
    \ the required steps to producing a finished product.\n\n![Image](images/square.jpg)\
    \ **Note** Since the `Report Builder 2.0` and `Report Builder 3.0` reports are\
    \ not using a `Report Model` as a data source, I have installed `Report Builder\
    \ 2.0` on the server containing `SQL Server 2012`. Being that we have used this\
    \ server throughout the text in developing our reports, it contains the full `Pro_SSRS`\
    \ database.\n\nBy way of example, let’s build a new version of the `Employee Service\
    \ Cost` report that you’ve been seeing throughout this book. If you are using\
    \ `SQL Server 2008 R2` or `SQL Server 2012` and using the `Report Builder 2.0`\
    \ from installing the thick client as I am, you will start `Report Builder 2.0`\
    \ by navigating to the `Microsoft SQL Server 2008 Report Builder 2.0` folder under\
    \ `All Programs` of `Windows` start menu. Once you have `Report Builder 2.0` fired\
    \ up, you will want to click on the `Table` or `Matrix` icon on the report design\
    \ surface. As mentioned, this will bring up the `New Table or Matrix` wizard and\
    \ begins by prompting you to select an existing data source or create a new one\
    \ as shown in [Figure 13-45](#Chapter13.html#fig_13_45).\n\n![Image](images/9781430238102_Fig13-45.jpg)\n\
    \n`Figure 13-45. New Table or Matrix wizard in Report Builder 2.0`\n\nSelect `New…`\
    \ to create a new data source for this report. Name the data source `Pro_SSRS`\
    \ and with the connection type set to `Microsoft SQL Server`, click on the `Build…`button\
    \ to select the server. In this case, set the server name to `localhost`, `Pro_SSRS`\
    \ as the database name, as in [Figure 13-46](#Chapter13.html#fig_13_46). Click\
    \ `OK` to save the `Connection Properties` and then click `OK` again to save the\
    \ `Data Source Properties`. Now that our data source has been created, click `Next`\
    \ to build the query in the query designer window.\n\n![Image](images/9781430238102_Fig13-46.jpg)\n\
    \n`Figure 13-46. Setting data source and connection string properties`\n\nThe\
    \ query designer contains a minimal set of tools for query design and is similar\
    \ in fashion to query builder applications in `SSMS`. You can graphically add\
    \ tables to a query, use stored procedures, table valued functions, create joins,\
    \ and filter data with criteria. In our case, we are going to use the `Emp_Svc_Cost`\
    \ stored procedure. In the query designer, we can expand `Stored Procedures` in\
    \ the `Database` view pane and then select the `Emp_Svc_Cost` stored procedure.\
    \ As you can see after selecting the stored procedure, you are shown the fields\
    \ that the stored procedure returns as well as the parameters that the stored\
    \ procedure expects. If you want to see the `Query` results, set the parameter\
    \ values that you want to set and then run the query. For this example, leave\
    \ the default values set to `(null)` and execute the stored procedure by clicking\
    \ the `Run Query` button. [Figure 13-47](#Chapter13.html#fig_13_47) shows the\
    \ stored procedure `Emp_Svc_Cost` being executed with resultant data. Alternatively,\
    \ we could have clicked on the `Edit As Text` button, selected `Stored Procedure`\
    \ as the type and then entered `Emp_Svc_Cost` in the query text box.\n\n![Image](images/9781430238102_Fig13-47.jpg)\n\
    \n`Figure 13-47. Adding the Emp_Svc_Cost stored procedure to query designer`\n\
    \nAfter seeing the results, click `Next` to progress to the `Arranged fields`\
    \ screen of the `New Table or Matrix` wizard. Here is where you layout your report\
    \ with the appropriate row groups, column groups and values. Use the following\
    \ steps to produce the `Emp_Svc_Cost` report using the wizard:\n\n1.  Drag the\
    \ `BranchName` and `Service_Type` fields over to the `Row groups` area.\n2.  Next,\
    \ Drag `Visit_Count` and `Estimated_Cost` over to the `values` area as seen in\
    \ [Figure 13-48](#Chapter13.html#fig_13_48).\n\n    ![Image](images/9781430238102_Fig13-48.jpg)\n\
    \n    `Figure 13-48. Arrange fields screen`\n\n3.  Click `Next` to proceed to\
    \ the `Layout` selection screen. This screen allows us to select a blocked or\
    \ stepped look for our report. It also has a feature for auto creating expanding\
    \ or collapsing drill down capabilities using the `Expand/collapse groups` checkbox.\
    \ Leave the default values as shown in [Figure 13-49](#Chapter13.html#fig_13_49)\
    \ and click `Next`.\n4.  Leave the default `Ocean` style selected and click `Finish`\
    \ to generate our report.\n5.  Adjust the columns to a width that prevents the\
    \ header contents from wrapping to the next line.\n6.  Change the title to `Service\
    \ Type Estimated Cost by Branch`.\n\n![Image](images/9781430238102_Fig13-49.jpg)\n\
    \n`Figure 13-49. Choosing a report layout`\n\nWith these minor changes performed,\
    \ we should have a report similar to what is being shown in [Figure 13-50](#Chapter13.html#fig_13_50).\n\
    \n![Image](images/9781430238102_Fig13-50.jpg)\n\n`Figure 13-50. Finished report\
    \ in Report Builder 2.0`\n\nSave this report out to the `Pro_SSRS` folder on the\
    \ `Report Server` as in our previous examples and name it `Service Type Estimated\
    \ Cost by Branch Wizard`. In the sections that follow, we’ll walk through another\
    \ way to create the same report without using the wizard. We will also show you\
    \ how to perform format changes to the `Report Builder` reports."
  raw: "#### Creating Reports with the Report Builder 2.0 Wizard\n\nAt this point,\
    \ we created SSRS reports with BIDS and Report Builder 1.0 using ClickOnce. Both\
    \ design environments provide different levels of control over report design.\
    \ While BIDS offers report creators much more flexibility than Report Builder\
    \ 1.0, it might not be the best choice for people who are not also application\
    \ programmers. Report Builder 1.0, by contrast, is easy to learn and to use to\
    \ publish reports; however, it comes with limitations in that reports can only\
    \ be created using prebuilt models, which is not enough to meet everyone’s needs.\
    \ In SSRS 2008, Microsoft provided Report Builder 2.0, which supported true ad\
    \ hoc query and report design not solely based on report models. Report Builder\
    \ 2.0’s modern look and feel, with Ribbon technology like that found in Office\
    \ 2007 applications, gave report creators a familiar environment to work in.\n\
    \n[Figure 13-44](#Chapter13.html#fig_13_44) shows the Report Builder 2.0 interface.\
    \ Microsoft’s use of the new Ribbon technology is apparent in the figure.\n\n\
    ![Image](images/9781430238102_Fig13-44.jpg)\n\n***Figure 13-44.** Report Builder\
    \ 2.0’s new interface*\n\n![Image](images/square.jpg) **Note** In order to use\
    \ Report Builder 2.0 on a SQL Server 2008 R2 or SQL Server 2012 box, you will\
    \ need to install the Report Builder 2.0 thick client. This client can be downloaded\
    \ from [`www.microsoft.com/en-us/download/details.aspx?id=24085`](http://www.microsoft.com/en-us/download/details.aspx?id=24085).\
    \ If you are using a SQL Server 2008 SP1 box, you can use the ClickOnce application\
    \ from the Report Builder button on the Report Manager or from within SharePoint.\
    \ By default, Report Builder 1.0 is configured within the Report Manager, so you\
    \ will need to change the Report Builder URL on the Site Settings page to reflect\
    \ your installation folder. For example, if I had SQL Server 2008 SP1 installed,\
    \ I would change mine to be `/ReportBuilder/reportbuilder_2_0_0_0.application`\
    \ or the full URL of [`http://ServerName:PortNumber/ReportServer/ReportBuilder/reportbuilder_2_0_0_0.application`](http://ServerName:PortNumber/ReportServer/ReportBuilder/reportbuilder_2_0_0_0.application).\
    \ When in SharePointIntegrated mode, you change the Custom Report Builder URL\
    \ to be a slightly different URL of `/_vti_bin/ReportBuilder/ReportBuilder_2_0_0_0.application`.\n\
    \nAs you might imagine, developing a report in Report Builder 2.0 is simplified,\
    \ with all design choices available in one of three tabs, Home, Insert, and View.\
    \ Built-in fields, parameters, images, and data sources are all contained in folders\
    \ within the Data window. Like in SQL Server Data Tools (SSDT), Row Groups and\
    \ Column Groups areas located are on the bottom. Instructional text, as well as\
    \ link buttons that fire up the Table, Matrix and Chart wizards, have been added\
    \ to the body of the report to guide the designer through the required steps to\
    \ producing a finished product.\n\n![Image](images/square.jpg) **Note** Since\
    \ the Report Builder 2.0 and Report Builder 3.0 reports are not using a Report\
    \ Model as a data source, I have installed Report Builder 2.0 on the server containing\
    \ SQL Server 2012\\. Being that we have used this server throughout the text in\
    \ developing our reports, it contains the full Pro_SSRS database.\n\nBy way of\
    \ example, let’s build a new version of the Employee Service Cost report that\
    \ you’ve been seeing throughout this book. If you are using SQL Server 2008 R2\
    \ or SQL Server 2012 and using the Report Builder 2.0 from installing the thick\
    \ client as I am, you will start Report Builder 2.0 by navigating to the Microsoft\
    \ SQL Server 2008 Report Builder 2.0 folder under All Programs of Windows start\
    \ menu. Once you have Report Builder 2.0 fired up, you will want to click on the\
    \ Table or Matrix icon on the report design surface. As mentioned, this will bring\
    \ up the New Table or Matrix wizard and begins by prompting you to select an existing\
    \ data source or create a new one as shown in [Figure 13-45](#Chapter13.html#fig_13_45).\n\
    \n![Image](images/9781430238102_Fig13-45.jpg)\n\n***Figure 13-45.** New Table\
    \ or Matrix wizard in Report Builder 2.0*\n\nSelect New… to create a new data\
    \ source for this report. Name the data source Pro_SSRS and with the connection\
    \ type set to Microsoft SQL Server, click on the Build…button to select the server.\
    \ In this case, set the server name to localhost, Pro_SSRS as the database name,\
    \ as in [Figure 13-46](#Chapter13.html#fig_13_46). Click OK to save the Connection\
    \ Properties and then click OK again to save the Data Source Properties. Now that\
    \ our data source has been created, click Next to build the query in the query\
    \ designer window.\n\n![Image](images/9781430238102_Fig13-46.jpg)\n\n***Figure\
    \ 13-46.** Setting data source and connection string properties*\n\nThe query\
    \ designer contains a minimal set of tools for query design and is similar in\
    \ fashion to query builder applications in SSMS. You can graphically add tables\
    \ to a query, use stored procedures, table valued functions, create joins, and\
    \ filter data with criteria. In our case, we are going to use the Emp_Svc_Cost\
    \ stored procedure. In the query designer, we can expand Stored Procedures in\
    \ the Database view pane and then select the Emp_Svc_Cost stored procedure. As\
    \ you can see after selecting the stored procedure, you are shown the fields that\
    \ the stored procedure returns as well as the parameters that the stored procedure\
    \ expects. If you want to see the Query results, set the parameter values that\
    \ you want to set and then run the query. For this example, leave the default\
    \ values set to (null) and execute the stored procedure by clicking the Run Query\
    \ button. [Figure 13-47](#Chapter13.html#fig_13_47) shows the stored procedure\
    \ Emp_Svc_Cost being executed with resultant data. Alternatively, we could have\
    \ clicked on the Edit As Text button, selected Stored Procedure as the type and\
    \ then entered Emp_Svc_Cost in the query text box.\n\n![Image](images/9781430238102_Fig13-47.jpg)\n\
    \n***Figure 13-47.** Adding the Emp_Svc_Cost stored procedure to query designer*\n\
    \nAfter seeing the results, click Next to progress to the Arranged fields screen\
    \ of the New Table or Matrix wizard. Here is where you layout your report with\
    \ the appropriate row groups, column groups and values. Use the following steps\
    \ to produce the Emp_Svc_Cost report using the wizard:\n\n> 1.  Drag the BranchName\
    \ and Service_Type fields over to the Row groups area.\n> 2.  Next, Drag Visit_Count\
    \ and Estimated_Cost over to the values area as seen in [Figure 13-48](#Chapter13.html#fig_13_48).\n\
    >     \n>     ![Image](images/9781430238102_Fig13-48.jpg)\n>     \n>     ***Figure\
    \ 13-48.** Arrange fields screen*\n>     \n>     \n> 3.  Click Next to proceed\
    \ to the Layout selection screen. This screen allows us to select a blocked or\
    \ stepped look for our report. It also has a feature for auto creating expanding\
    \ or collapsing drill down capabilities using the Expand/collapse groups checkbox.\
    \ Leave the default values as shown in [Figure 13-49](#Chapter13.html#fig_13_49)\
    \ and click Next.\n> 4.  Leave the default Ocean style selected and click Finish\
    \ to generate our report.\n> 5.  Adjust the columns to a width that prevents the\
    \ header contents from wrapping to the next line.\n> 6.  Change the title to Service\
    \ Type Estimated Cost by Branch.\n\n![Image](images/9781430238102_Fig13-49.jpg)\n\
    \n***Figure 13-49.** Choosing a report layout*\n\nWith these minor changes performed,\
    \ we should have a report similar to what is being shown in [Figure 13-50](#Chapter13.html#fig_13_50).\n\
    \n![Image](images/9781430238102_Fig13-50.jpg)\n\n***Figure 13-50.** Finished report\
    \ in Report Builder 2.0*\n\nSave this report out to the Pro_SSRS folder on the\
    \ Report Server as in our previous examples and name it Service Type Estimated\
    \ Cost by Branch Wizard. In the sections that follow, we’ll walk through another\
    \ way to create the same report without using the wizard. We will also show you\
    \ how to perform format changes to the Report Builder reports."
  trans: "## 使用 Report Builder 2.0 向导创建报表\n\n至此，我们已经使用 `BIDS` 和通过 `ClickOnce` 部署的\
    \ `Report Builder 1.0` 创建了 `SSRS` 报表。这两种设计环境对报表设计提供了不同级别的控制。虽然 `BIDS` 为报表创建者提供了比\
    \ `Report Builder 1.0` 大得多的灵活性，但对于非应用程序程序员的人来说，它可能不是最佳选择。相比之下，`Report Builder\
    \ 1.0` 易于学习和使用以发布报表；然而，它存在限制，即只能使用预构建的模型来创建报表，这不足以满足每个人的需求。在 `SSRS 2008` 中，微软提供了\
    \ `Report Builder 2.0`，它支持真正的临时查询和报表设计，而不仅仅基于报表模型。`Report Builder 2.0` 现代化的外观和感觉，采用了类似\
    \ `Office 2007` 应用程序中的 `Ribbon` 技术，为报表创建者提供了一个熟悉的工作环境。\n\n图 13-44 展示了 `Report\
    \ Builder 2.0` 的界面。图中明显可见微软对新技术 `Ribbon` 的应用。\n\n![Image](img/9781430238102_Fig13-44.jpg)\n\
    \n`图 13-44. Report Builder 2.0 的新界面`\n\n![Image](img/square.jpg) **注意** 要在 `SQL\
    \ Server 2008 R2` 或 `SQL Server 2012` 环境中使用 `Report Builder 2.0`，您需要安装 `Report\
    \ Builder 2.0` 厚客户端。此客户端可以从 [`www.microsoft.com/en-us/download/details.aspx?id=24085`](http://www.microsoft.com/en-us/download/details.aspx?id=24085)\
    \ 下载。如果您使用的是 `SQL Server 2008 SP1` 环境，则可以使用 `Report Manager` 上的 `Report Builder`\
    \ 按钮或从 `SharePoint` 内部使用 `ClickOnce` 应用程序。默认情况下，`Report Manager` 中配置的是 `Report\
    \ Builder 1.0`，因此您需要在“站点设置”页面更改 `Report Builder` 的 `URL`，以反映您的安装文件夹。例如，如果我安装了\
    \ `SQL Server 2008 SP1`，我会将其更改为 `/ReportBuilder/reportbuilder_2_0_0_0.application`\
    \ 或完整的 `URL` [`http://ServerName:PortNumber/ReportServer/ReportBuilder/reportbuilder_2_0_0_0.application`](http://ServerName:PortNumber/ReportServer/ReportBuilder/reportbuilder_2_0_0_0.application)。在\
    \ `SharePointIntegrated` 模式下，您需要将 `Custom Report Builder URL` 更改一个稍有不同的 `URL`：`/_vti_bin/ReportBuilder/ReportBuilder_2_0_0_0.application`。\n\
    \n正如您可能想象的那样，在 `Report Builder 2.0` 中开发报表被简化了，所有设计选择都集中在 `Home`、`Insert` 和 `View`\
    \ 三个选项卡中。内置字段、参数、图像和数据源都包含在 `Data` 窗口的文件夹中。与 `SQL Server Data Tools (SSDT)` 类似，`Row\
    \ Groups` 和 `Column Groups` 区域位于底部。报表主体中添加了指导性文本，以及用于启动 `Table`、`Matrix` 和 `Chart`\
    \ 向导的链接按钮，以引导设计者完成创建成品的必要步骤。\n\n![Image](img/square.jpg) **注意** 由于 `Report Builder\
    \ 2.0` 和 `Report Builder 3.0` 报表不使用 `Report Model` 作为数据源，我已经在包含 `SQL Server 2012`\
    \ 的服务器上安装了 `Report Builder 2.0`。由于我们在本书中一直使用这台服务器来开发报表，它包含了完整的 `Pro_SSRS` 数据库。\n\
    \n通过一个示例，让我们构建一个新版本的 `Employee Service Cost` 报表，您在本书中已经见过该报表。如果您使用的是 `SQL Server\
    \ 2008 R2` 或 `SQL Server 2012`，并且像我一样通过安装厚客户端来使用 `Report Builder 2.0`，您可以通过导航到\
    \ `Windows` 开始菜单的 `All Programs` 下的 `Microsoft SQL Server 2008 Report Builder\
    \ 2.0` 文件夹来启动 `Report Builder 2.0`。启动 `Report Builder 2.0` 后，您需要点击报表设计界面上的 `Table`\
    \ 或 `Matrix` 图标。如前所述，这将打开 `New Table or Matrix` 向导，并首先提示您选择现有数据源或创建新数据源，如 图 13-45\
    \ 所示。\n\n![Image](img/9781430238102_Fig13-45.jpg)\n\n`图 13-45. Report Builder\
    \ 2.0 中的新建表或矩阵向导`\n\n选择 `New…` 为此报表创建新数据源。将数据源命名为 `Pro_SSRS`，连接类型设置为 `Microsoft\
    \ SQL Server`，然后点击 `Build…` 按钮选择服务器。在本例中，将服务器名称设置为 `localhost`，数据库名称设置为 `Pro_SSRS`，如\
    \ 图 13-46 所示。点击 `OK` 保存 `Connection Properties`，然后再次点击 `OK` 保存 `Data Source Properties`。现在我们的数据源已创建，点击\
    \ `Next` 在查询设计器窗口中构建查询。\n\n![Image](img/9781430238102_Fig13-46.jpg)\n\n`图 13-46.\
    \ 设置数据源和连接字符串属性`\n\n查询设计器包含一组最小化的查询设计工具，其风格类似于 `SSMS` 中的查询生成器应用程序。您可以图形化地向查询添加表、使用存储过程、表值函数、创建联接以及使用条件筛选数据。在我们的例子中，我们将使用\
    \ `Emp_Svc_Cost` 存储过程。在查询设计器中，我们可以在 `Database` 视图窗格中展开 `Stored Procedures`，然后选择\
    \ `Emp_Svc_Cost` 存储过程。如您在选择存储过程后所见，系统会显示该存储过程返回的字段以及它所期望的参数。如果您想查看 `Query` 结果，请设置您想要的参数值，然后运行查询。对于此示例，将默认值保留为\
    \ `(null)`，并点击 `Run Query` 按钮执行存储过程。图 13-47 显示了执行存储过程 `Emp_Svc_Cost` 及其结果数据。或者，我们可以点击\
    \ `Edit As Text` 按钮，选择 `Stored Procedure` 作为类型，然后在查询文本框中输入 `Emp_Svc_Cost`。\n\n\
    ![Image](img/9781430238102_Fig13-47.jpg)\n\n`图 13-47. 将 Emp_Svc_Cost 存储过程添加到查询设计器`\n\
    \n查看结果后，点击 `Next` 进入 `New Table or Matrix` 向导的 `Arranged fields` 屏幕。在这里，您使用适当的行组、列组和值来布局报表。使用以下步骤通过向导生成\
    \ `Emp_Svc_Cost` 报表：\n\n1.  将 `BranchName` 和 `Service_Type` 字段拖到 `Row groups`\
    \ 区域。\n2.  接下来，将 `Visit_Count` 和 `Estimated_Cost` 拖到 `values` 区域，如 图 13-48 所示。\n\
    \n    ![Image](img/9781430238102_Fig13-48.jpg)\n\n    `图 13-48. 排列字段屏幕`\n\n3.\
    \  点击 `Next` 进入 `Layout` 选择屏幕。此屏幕允许我们为报表选择块状或阶梯状外观。它还有一个功能，可以使用 `Expand/collapse\
    \ groups` 复选框自动创建可展开或可折叠的向下钻取功能。保留 图 13-49 中所示的默认值，然后点击 `Next`。\n4.  保留默认选中的 `Ocean`\
    \ 样式，点击 `Finish` 生成我们的报表。\n5.  调整列宽，以防止标题内容自动换行到下一行。\n6.  将标题更改为 `Service Type\
    \ Estimated Cost by Branch`。\n\n![Image](img/9781430238102_Fig13-49.jpg)\n\n`图\
    \ 13-49. 选择报表布局`\n\n完成这些小的更改后，我们应该得到一份类似于 图 13-50 所示的报表。\n\n![Image](img/9781430238102_Fig13-50.jpg)\n\
    \n`图 13-50. Report Builder 2.0 中的完成报表`\n\n像我们之前的示例一样，将此报表保存到 `Report Server` 上的\
    \ `Pro_SSRS` 文件夹中，并将其命名为 `Service Type Estimated Cost by Branch Wizard`。在接下来的部分中，我们将介绍另一种不使用向导来创建相同报表的方法。我们还将向您展示如何对\
    \ `Report Builder` 报表执行格式更改。"
- fmt: "## Creating Reports with Report Builder 2.0\n\nAs I just mentioned, we do\
    \ not have to use the wizard when creating reports. Alternatively, if we didn't\
    \ want to utilize the `New Table or Matrix` wizard, we could create a new data\
    \ source and dataset separately. In this section, we are going to create the same\
    \ report without using the wizard.\n\nTo get started, if you have the `Service\
    \ Type Estimated Cost by Branch` report still open, click on the circular ribbon\
    \ icon on the top left of the screen. This ribbon icon, acts as the `File` menu\
    \ option in other Microsoft products. After clicking on the ribbon icon, select\
    \ `New` to create a new report. If you do not have `Report Builder 2.0` open,\
    \ navigate to the `Report Builder` thick client under the `Microsoft SQL Server\
    \ 2008 Report Builder 2.0` from the `All Programs` menu. If you have been following\
    \ along, the blank design environment of `Report Builder 2.0` should look familiar\
    \ to you as it is the same as shown in Figure 13-44.\n\nTo get started on creating\
    \ a report from scratch without using the wizard, we will need to create a data\
    \ source and a data set before getting to the report design. After we have these\
    \ created, we will be able to add a table to our design pane and then start adding\
    \ columns and groups. The following four steps will walk us through create the\
    \ data source and dataset for our report.\n\n1.  Click on the `New` button on\
    \ the `Report Data` pane and then select `Data Source`. If you do not see the\
    \ `Report Data` pane, click on the `View` tab and then select the `Report Data`\
    \ checkbox.\n2.  Name your data source `Pro_SSRS` and set the `Use a shared connection\
    \ or report model` option. Instead of having an embedded data source, we can use\
    \ a shared one on the server. This helps when deploying reports to different environments.\
    \ If the reports use shared data sources, if the database server is changed during\
    \ the lifecycle of the report, the only object that will require updating is the\
    \ shared data source itself. Conversely, if you always use embedded data sources,\
    \ each of the reports that utilize the data source would also need to be changes.\
    \ This makes it harder to manage and as such, one should use shared data sources\
    \ when possible.\n3.  Now, select the `Browse…` button to navigate to the `DataSources`\
    \ folder under the `Pro_SSRS` folder and select the `Pro_SSRS` data source. Click\
    \ `Open` to return back to the `Data Source Properties` window as shown in Figure\
    \ 13-51. Click `OK` to save the `Pro_SSRS` data source to return back to the `Report\
    \ Builder`. After you save the data source, `Report Builder` adds it the `Report\
    \ Data` pane.\n    ![Image](images/9781430238102_Fig13-51.jpg)\n    **Figure 13-51.**\
    \ Creating a new data source\n4.  Right-click on the new `Pro_SSRS` data source\
    \ in the `Report Data` pane and select `Add Dataset`. Name the dataset `Emp_Svc_Cost`\
    \ and set the `Query type` to `Stored Procedure`. If prompted for login credentials,\
    \ enter the appropriate login details. Then in the `Select or enter stored procedure\
    \ name` drop down, select our `Emp_Svc_Cost` stored procedure. Figure 13-52 displays\
    \ the `Data Properties` window. Click `OK` to save the `Emp_Svc_Cost` dataset.\n\
    \n![Image](images/9781430238102_Fig13-52.jpg)\n**Figure 13-52.** Creating a new\
    \ dataset\n\nOnce a query has been added and the data source saved, you can see\
    \ the available fields as well as the parameters that were automatically generated\
    \ that can now be used in the report. Also, the directional text in the report\
    \ has changed. As shown in Figure 13-53, you are now instructed on how to add\
    \ an item to the report body, page header, and/or page footer by clicking the\
    \ `Insert` tab or dragging an item to the appropriate area. You will do that next\
    \ by adding a `Matrix` control to the report body, a report title to the page\
    \ header, and the report execution time, a built-in field, to the page footer.\n\
    \n![Image](images/9781430238102_Fig13-53.jpg)\n**Figure 13-53.** Report Builder\
    \ 2.0 after adding data source and dataset\n\nNow that you have the environment\
    \ ready to create a report with the newly added data source, click the `Insert`\
    \ tab. As you can see in Figure 13-54, all of the report controls are available\
    \ in four categories at the top: `Data Regions`, `Report Items`, `Subreports`,\
    \ and `Header & Footer`. Before we add our own `Table`, `Matrix`, or `Chart` to\
    \ the design surface, we are going to delete the `Data Region` Group that contains\
    \ the two link buttons for the wizards. Just select the `DataRegionPlaceholder`\
    \ and hit the `Delete` key on your keyboard. To add the `Matrix` data region,\
    \ simply click the `Matrix` icon and choose `Insert Matrix` to add the control\
    \ to the body of the report. Next, just draw the `Matrix` onto the design surface\
    \ to be approximately ½ inch high by 2 inches long.\n\n![Image](images/9781430238102_Fig13-54.jpg)\n\
    **Figure 13-54.** Report objects available from the `Insert` tab\n\nNext, drag\
    \ the following four fields from the `Emp_Svc_Cost` dataset that was created with\
    \ the data source, onto the `Matrix` control in the report: `BranchName`, `Service_Type`,\
    \ `Visit_Visit_Count`, and `Estimated_Cost`. Add `BranchName` and `Service_Type`\
    \ to the `Rows` area and `Visit_Count` and `Estimated_Cost` to the `Data` area.\
    \ When we added `Visit_Count` to the `Data` area, `Report Builder` added a header\
    \ automatically. We don't want it to be labeled with `Visit Count`, so select\
    \ the textbox and then hit `Delete` to remove it. At this point, the report should\
    \ be similar to the layout depicted in Figure 13-55. Notice that the `Sum` functions\
    \ were automatically applied to the fields dragged to the `Data` area.\n\n![Image](images/9781430238102_Fig13-55.jpg)\n\
    **Figure 13-55.** Report Matrix with fields added\n\nYou will want to resize the\
    \ cells in the `Matrix` so that the `Service_Type` records do not wrap. If you\
    \ click the `View` tab, there is a selection for `Ruler`. Click the `Ruler` button\
    \ and size the `Service_Type` cell to be two inches. Before running the report,\
    \ let's change all of the parameters to allow `NULL` values. To set the parameters\
    \ to accept `NULL` values, simply double click the parameters and enable the checkbox\
    \ labeled `Allow null value`. You can see the previewed report taking shape (Figure\
    \ 13-56) by clicking the `Preview` button, available on the `Home` and `View`\
    \ tabs.\n\n![Image](images/square.jpg) **Note** You may have to set the parameters\
    \ to allow `NULL` values in your report if you do not want to have to enter parameter\
    \ values. By default, if the parameter value is allowed `NULL` values, the report\
    \ will generate with all data returned from the execution of the stored procedure.\n\
    \n![Image](images/9781430238102_Fig13-56.jpg)\n**Figure 13-56.** Preview of Report\
    \ Builder 2.0 report\n\nNext, you will format the `Estimated_Cost` field to display\
    \ the value as currency. Click back in the `Design` area, and then follow these\
    \ steps to apply some formatting:"
  raw: "#### Creating Reports with Report Builder 2.0\n\nAs I just mentioned, we do\
    \ not have to use the wizard when creating reports. Alternatively, if we didn’t\
    \ want to utilize the New Table or Matrix wizard, we could create a new data source\
    \ and dataset separately. In this section, we are going to create the same report\
    \ without using the wizard.\n\nTo get started, if you have the Service Type Estimated\
    \ Cost by Branch report still open, click on the circular ribbon icon on the top\
    \ left of the screen. This ribbon icon, acts as the File menu option in other\
    \ Microsoft products. After clicking on the ribbon icon, select New to create\
    \ a new report. If you do not have Report Builder 2.0 open, navigate to the Report\
    \ Builder thick client under the Microsoft SQL Server 2008 Report Builder 2.0\
    \ from the All Programs menu. If you have been following along, the blank design\
    \ environment of Report Builder 2.0 should look familiar to you as it is the same\
    \ as shown in [Figure 13-44](#Chapter13.html#fig_13_44).\n\nTo get started on\
    \ creating a report from scratch without using the wizard, we will need to create\
    \ a data source and a data set before getting to the report design. After we have\
    \ these created, we will be able to add a table to our design pane and then start\
    \ adding columns and groups. The following four steps will walk us through create\
    \ the data source and dataset for our report.\n\n> 1.  Click on the New button\
    \ on the Report Data pane and then select Data Source. If you do not see the Report\
    \ Data pane, click on the View tab and then select the Report Data checkbox.\n\
    > 2.  Name your data source Pro_SSRS and set the Use a shared connection or report\
    \ model option. Instead of having an embedded data source, we can use a shared\
    \ one on the server. This helps when deploying reports to different environments.\
    \ If the reports use shared data sources, if the database server is changed during\
    \ the lifecycle of the report, the only object that will require updating is the\
    \ shared data source itself. Conversely, if you always use embedded data sources,\
    \ each of the reports that utilize the data source would also need to be changes.\
    \ This makes it harder to manage and as such, one should use shared data sources\
    \ when possible.\n> 3.  Now, select the Browse… button to navigate to the DataSources\
    \ folder under the Pro_SSRS folder and select the Pro_SSRS data source. Click\
    \ Open to return back to the Data Source Properties window as shown in [Figure\
    \ 13-51](#Chapter13.html#fig_13_51). Click OK to save the Pro_SSRS data source\
    \ to return back to the Report Builder. After you save the data source, Report\
    \ Builder adds it the Report Data pane.\n>     \n>     ![Image](images/9781430238102_Fig13-51.jpg)\n\
    >     \n>     ***Figure 13-51.** Creating a new data source*\n>     \n>     \n\
    > 4.  Right-click on the new Pro_SSRS data source in the Report Data pane and\
    \ select Add Dataset. Name the dataset Emp_Svc_Cost and set the Query type to\
    \ Stored Procedure. If prompted for login credentials, enter the appropriate login\
    \ details. Then in the Select or enter stored procedure name drop down, select\
    \ our Emp_Svc_Cost stored procedure. [Figure 13-52](#Chapter13.html#fig_13_52)\
    \ displays the Data Properties window. Click OK to save the Emp_Svc_Cost dataset.\n\
    \n![Image](images/9781430238102_Fig13-52.jpg)\n\n***Figure 13-52.** Creating a\
    \ new dataset*\n\nOnce a query has been added and the data source saved, you can\
    \ see the available fields as well as the parameters that were automatically generated\
    \ that can now be used in the report. Also, the directional text in the report\
    \ has changed. As shown in [Figure 13-53](#Chapter13.html#fig_13_53), you are\
    \ now instructed on how to add an item to the report body, page header, and/or\
    \ page footer by clicking the Insert tab or dragging an item to the appropriate\
    \ area. You will do that next by adding a Matrix control to the report body, a\
    \ report title to the page header, and the report execution time, a built-in field,\
    \ to the page footer.\n\n![Image](images/9781430238102_Fig13-53.jpg)\n\n***Figure\
    \ 13-53.** Report Builder 2.0 after adding data source and dataset*\n\nNow that\
    \ you have the environment ready to create a report with the newly added data\
    \ source, click the Insert tab. As you can see in [Figure 13-54](#Chapter13.html#fig_13_54),\
    \ all of the report controls are available in four categories at the top: Data\
    \ Regions, Report Items, Subreports, and Header & Footer. Before we add our own\
    \ Table, Matrix, or Chart to the design surface, we are going to delete the Data\
    \ Region Group that contains the two link buttons for the wizards. Just select\
    \ the DataRegionPlaceholder and hit the Delete key on your keyboard. To add the\
    \ Matrix data region, simply click the Matrix icon and choose Insert Matrix to\
    \ add the control to the body of the report. Next, just draw the Matrix onto the\
    \ design surface to be approximately ½ inch high by 2 inches long.\n\n![Image](images/9781430238102_Fig13-54.jpg)\n\
    \n***Figure 13-54.** Report objects available from the Insert tab*\n\nNext, drag\
    \ the following four fields from the Emp_Svc_Cost dataset that was created with\
    \ the data source, onto the Matrix control in the report: BranchName, Service_Type,\
    \ Visit_Visit_Count, and Estimated_Cost. Add BranchName and Service_Type to the\
    \ Rows area and Visit_Count and Estimated_Cost to the Data area. When we added\
    \ Visit_Count to the Data area, Report Builder added a header automatically. We\
    \ don’t want it to be labeled with Visit Count, so select the textbox and then\
    \ hit Delete to remove it. At this point, the report should be similar to the\
    \ layout depicted in [Figure 13-55](#Chapter13.html#fig_13_55). Notice that the\
    \ Sum functions were automatically applied to the fields dragged to the Data area.\n\
    \n![Image](images/9781430238102_Fig13-55.jpg)\n\n***Figure 13-55.** Report Matrix\
    \ with fields added*\n\nYou will want to resize the cells in the Matrix so that\
    \ the Service_Type records do not wrap. If you click the View tab, there is a\
    \ selection for Ruler. Click the Ruler button and size the Service_Type cell to\
    \ be two inches. Before running the report, let’s change all of the parameters\
    \ to allow NULL values. To set the parameters to accept NULL values, simply double\
    \ click the parameters and enable the checkbox labeled *Allow null value*. You\
    \ can see the previewed report taking shape ([Figure 13-56](#Chapter13.html#fig_13_56))\
    \ by clicking the Preview button, available on the Home and View tabs.\n\n![Image](images/square.jpg)\
    \ **Note** You may have to set the parameters to allow NULL values in your report\
    \ if you do not want to have to enter parameter values. By default, if the parameter\
    \ value is allowed NULL values, the report will generate with all data returned\
    \ from the execution of the stored procedure.\n\n![Image](images/9781430238102_Fig13-56.jpg)\n\
    \n***Figure 13-56.** Preview of Report Builder 2.0 report*\n\nNext, you will format\
    \ the Estimated_Cost field to display the value as currency. Click back in the\
    \ Design area, and then follow these steps to apply some formatting:"
  trans: "## 使用 Report Builder 2.0 创建报表\n\n正如我刚才提到的，创建报表时我们并非必须使用向导。此外，如果我们不想使用 `新建表或矩阵`\
    \ 向导，也可以分别创建新的数据源和数据集。在本节中，我们将不使用向导来创建相同的报表。\n\n首先，如果 `按分支机构估算服务类型成本` 报表仍然打开着，请点击屏幕左上角的圆形功能区图标。这个功能区图标的作用类似于其他\
    \ Microsoft 产品中的 `文件` 菜单选项。点击功能区图标后，选择 `新建` 来创建新报表。如果您没有打开 `Report Builder 2.0`，请从\
    \ `所有程序` 菜单中的 `Microsoft SQL Server 2008 Report Builder 2.0` 下找到 `Report Builder`\
    \ 瘦客户端并打开。如果您一直跟随操作，那么 `Report Builder 2.0` 的空白设计环境对您来说应该很熟悉，它与图 13-44 中所示的一样。\n\
    \n要开始不使用向导从头创建报表，我们需要在进入报表设计之前先创建一个数据源和一个数据集。创建好这些后，我们就能将表格添加到设计窗格，然后开始添加列和分组。以下四个步骤将引导我们完成为报表创建数据源和数据集的过程。\n\
    \n1.  点击 `报表数据` 窗格上的 `新建` 按钮，然后选择 `数据源`。如果看不到 `报表数据` 窗格，请点击 `视图` 选项卡，然后选中 `报表数据`\
    \ 复选框。\n2.  将您的数据源命名为 `Pro_SSRS` 并设置 `使用共享连接或报表模型` 选项。我们可以使用服务器上的共享数据源，而不是嵌入式数据源。这有助于将报表部署到不同环境时管理。如果报表使用共享数据源，即使数据库服务器在报表生命周期内发生更改，唯一需要更新的对象也只是共享数据源本身。反之，如果您始终使用嵌入式数据源，那么所有使用该数据源的报表也都需要更改。这使得管理更加困难，因此，应尽可能使用共享数据源。\n\
    3.  现在，点击 `浏览…` 按钮，导航到 `Pro_SSRS` 文件夹下的 `DataSources` 文件夹，并选择 `Pro_SSRS` 数据源。点击\
    \ `打开` 返回 `数据源属性` 窗口，如图 13-51 所示。点击 `确定` 保存 `Pro_SSRS` 数据源并返回 `Report Builder`。保存数据源后，`Report\
    \ Builder` 会将其添加到 `报表数据` 窗格。\n    ![Image](img/9781430238102_Fig13-51.jpg)\n \
    \   **图 13-51.** 创建新数据源\n4.  在 `报表数据` 窗格中右键单击新的 `Pro_SSRS` 数据源，然后选择 `添加数据集`。将数据集命名为\
    \ `Emp_Svc_Cost`，并将 `查询类型` 设置为 `存储过程`。如果提示输入登录凭据，请输入相应的登录信息。然后在 `选择或输入存储过程名称`\
    \ 下拉列表中，选择我们的 `Emp_Svc_Cost` 存储过程。图 13-52 显示了 `数据集属性` 窗口。点击 `确定` 保存 `Emp_Svc_Cost`\
    \ 数据集。\n\n![Image](img/9781430238102_Fig13-52.jpg)\n**图 13-52.** 创建新数据集\n\n一旦添加了查询并保存了数据源，您就可以看到可用的字段以及自动生成的、现在可以在报表中使用的参数。此外，报表中的指导性文字也已改变。如图\
    \ 13-53 所示，现在会指导您如何通过点击 `插入` 选项卡或拖动项目到相应区域，来向报表主体、页眉和/或页脚添加项目。接下来，您将通过向报表主体添加一个\
    \ `矩阵` 控件、向页眉添加一个报表标题，以及向页脚添加报表执行时间（一个内置字段）来完成这些操作。\n\n![Image](img/9781430238102_Fig13-53.jpg)\n\
    **图 13-53.** 添加数据源和数据集后的 Report Builder 2.0\n\n现在环境已准备好，可以使用新添加的数据源创建报表了，点击 `插入`\
    \ 选项卡。如图 13-54 所示，所有报表控件在顶部有四个类别可供使用：`数据区域`、`报表项`、`子报表` 以及 `页眉和页脚`。在我们向设计表面添加自己的\
    \ `表`、`矩阵` 或 `图表` 之前，我们将删除包含向导两个链接按钮的 `数据区域` 组。只需选择 `DataRegionPlaceholder` 并按键盘上的\
    \ `Delete` 键。要添加 `矩阵` 数据区域，只需点击 `矩阵` 图标并选择 `插入矩阵`，将控件添加到报表主体中。接下来，在设计表面上绘制 `矩阵`，使其大约高\
    \ ½ 英寸，长 2 英寸。\n\n![Image](img/9781430238102_Fig13-54.jpg)\n**图 13-54.** `插入`\
    \ 选项卡中可用的报表对象\n\n接下来，从随数据源创建的 `Emp_Svc_Cost` 数据集中拖拽以下四个字段到报表中的 `矩阵` 控件上：`BranchName`、`Service_Type`、`Visit_Visit_Count`\
    \ 和 `Estimated_Cost`。将 `BranchName` 和 `Service_Type` 添加到 `行` 区域，将 `Visit_Count`\
    \ 和 `Estimated_Cost` 添加到 `数据` 区域。当我们将 `Visit_Count` 添加到 `数据` 区域时，`Report Builder`\
    \ 自动添加了一个标题。我们不希望它被标记为 `Visit Count`，因此选择文本框，然后按 `Delete` 删除它。此时，报表应与图 13-55 所示的布局相似。请注意，`求和`\
    \ 函数已自动应用于拖到 `数据` 区域的字段。\n\n![Image](img/9781430238102_Fig13-55.jpg)\n**图 13-55.**\
    \ 已添加字段的报表矩阵\n\n您需要调整 `矩阵` 中的单元格大小，以便 `Service_Type` 记录不会换行。如果您点击 `视图` 选项卡，会有一个\
    \ `标尺` 选项。点击 `标尺` 按钮，并将 `Service_Type` 单元格调整为两英寸大小。在运行报表之前，让我们将所有参数更改为允许 `NULL`\
    \ 值。要将参数设置为接受 `NULL` 值，只需双击参数并启用标有 `允许空值` 的复选框。通过点击 `主页` 和 `视图` 选项卡上可用的 `预览` 按钮，您可以看到预览的报表逐渐成形（图\
    \ 13-56）。\n\n![Image](img/square.jpg) **注意** 如果您不想输入参数值，您可能需要在报表中设置参数以允许 `NULL`\
    \ 值。默认情况下，如果参数值允许 `NULL` 值，报表将使用存储过程执行返回的所有数据生成。\n\n![Image](img/9781430238102_Fig13-56.jpg)\n\
    **图 13-56.** Report Builder 2.0 报表预览\n\n接下来，您将格式化 `Estimated_Cost` 字段，使其以货币形式显示值。点击回\
    \ `设计` 区域，然后按照以下步骤应用一些格式："
- fmt: "> 1.  右键单击`SUM(Estimated_Cost)`文本框，选择“文本框属性”。\n> 2.  [图 13-57](#Chapter13.html#fig_13_57)\
    \ 显示的对话框包含了文本框属性，涵盖了许多可用的格式设置和操作项，例如交互式排序、可见性和超链接选项。这些都与在 BIDS 中开发报表时设置的属性相同。单击左侧的“数字”，选择“货币”作为格式，然后选择“使用千位分隔符\
    \ (,)”选项，并单击“确定”保存文本框属性。\n> 3.  接下来，通过右键单击`Visit_Count`字段并选择“文本框属性”，为其应用带千位分隔符的数字格式。选择“数字”选项卡，然后在“类别”中选择“数字”。将小数位数设置为`0`，选择“使用千位分隔符\
    \ (,)”选项，并单击“确定”保存文本框属性。\n> 4.  由于报表的默认高度留下了额外的空白，我们可以通过将页脚栏向上拖动到靠近我们的矩阵报表项来减少它。\n\
    >     \n>     ![Image](images/9781430238102_Fig13-57.jpg)\n>     \n>     ### 图\
    \ 13-57. Estimated_Cost 的文本框属性\n>     \n>     \n> 5.  最后，通过单击报表顶部的“单击以添加标题”文本框来重置报表标题。将报表标题设置为“按分支的服务类型估计成本”，并将文本框的宽度更改为大约\
    \ 5 3/4 英寸。\n\n完成所有这些更改后，报表应如[图 13-58](#Chapter13.html#fig_13_58)所示。\n\n![Image](images/9781430238102_Fig13-58.jpg)\n\
    \n### 图 13-58. 添加标题后的报表\n\n最后，你可能已经注意到了报表页脚中的`[&ExecutionTime]`。这是 Report Builder\
    \ 2.0 默认添加的。如果你想删除它，只需选中它并按删除键即可。但是，如果你想向页脚或页眉部分添加更多内置字段，只需展开“数据”窗口中的“内置字段”文件夹即可查看选项。你将看到`ExecutionTime`、`PageNumber`、`Report\
    \ Folder`、`Report Name`、`Report Server URL`、`Total Pages`、`User ID`和`Language`等可能的选择。在我们的示例中，我们将向报表添加一个页眉，并在其中添加`User\
    \ ID`以及我们的报表标题。\n\n> 1.  在设计模式下，单击“插入”选项卡。\n> 2.  单击“页眉”，然后选择“添加页眉”。将其高度调整为大约\
    \ ½ 英寸。\n> 3.  选择报表正文中的标题，并将其拖动到页眉部分。\n> 4.  选中报表标题后，单击“视图”选项卡，并在“属性”选项前打勾以显示它。\n\
    > 5.  将`FontSize`属性从默认的`20pt`更改为`14pt`。将页眉文本框调整得比标题稍大一些。这将为我们的页眉留出一些空间来显示另一个字段。\n\
    > 6.  将`User ID`内置字段拖动到报表标题的右侧。这将创建一个包含`User ID`字段值的文本框。你可以将这个新文本框右对齐，使其斜体并加粗。\n\
    \n你可以轻松地添加更多格式设置，或者像我喜欢的那样称之为报表美化，但此时，报表在预览时应如[图 13-59](#Chapter13.html#fig_13_59)所示。\n\
    \n![Image](images/9781430238102_Fig13-59.jpg)\n\n### 图 13-59. 包含执行时间和标题的报表预览\n\
    \n作为最后的润色，你将向报表添加总计。这可以通过单击回设计区域并选择“数据”区域中的两个单元格`Visit_Count`和`Estimated_Cost`来轻松完成。你可以通过选择第一个单元格，然后按住`Shift`键（或`CTRL`键）选择第二个单元格来同时选中两者。一旦选中，右键单击并选择“添加总计”。总计字段会自动为你添加。你可以通过将两个新的总计单元格加粗来强调它们。完成后，报表将如[图\
    \ 13-60](#Chapter13.html#fig_13_60)所示。\n\n正如你所看到的，新的 Report Builder 2.0 具有 BIDS\
    \ 完整设计环境的许多功能，只有很小的例外。一个突出的例外是无法将报表直接签入版本控制应用程序，如 Team Foundation Server。然而，就其意图而言，Report\
    \ Builder 2.0 确实实现了将设计环境交到那些能够超越报表模型约束创建报表、但本身可能不是 VB .NET 开发人员的人手中的目的。将这个有价值的设计工具作为\
    \ SSRS 的一部分提供，是将 SSRS 推向大众的又一进步。在下一节中，我们将介绍 Report Builder 3.0 应用程序中的增强功能，并通过一个使用\
    \ Microsoft Reporting Services 即席工具最新版本的示例进行讲解。\n\n![Image](images/9781430238102_Fig13-60.jpg)\n\
    \n### 图 13-60. 最终格式设置后的报表"
  raw: "> 1.  Right-click the SUM(Estimated_Cost) textbox and choose Textbox Properties.\n\
    > 2.  [Figure 13-57](#Chapter13.html#fig_13_57) shows the dialog that presents\
    \ the textbox properties encompassing many of the formatting and actionable items\
    \ available, such as interactive sorting, visibility, and hyperlink options. These\
    \ are all the same as properties that you would set when developing a report in\
    \ BIDS. Click Number on the left and choose Currency for the format, then choose\
    \ the option to Use 1000 separator (,) and click OK to save the Textbox Properties.\n\
    > 3.  Next, apply the number formatting with the thousands separator to the Visit_Count\
    \ field by right-clicking it and selecting Textbox Properties. Select the Number\
    \ tab and then choose Number as the Category. Set the decimal places to 0 and\
    \ select the option to Use 1000 separator (,) and click OK to save the Textbox\
    \ Properties.\n> 4.  Since the default height of the report has given extra white\
    \ space, let’s cut down on this by dragging the footer bar up closer to our Matrix\
    \ report item.\n>     \n>     ![Image](images/9781430238102_Fig13-57.jpg)\n> \
    \    \n>     ***Figure 13-57.** Textbox properties for Estimated_Cost*\n>    \
    \ \n>     \n> 5.  Finally, reset the report title by clicking the Click to add\
    \ title textbox at the top of the report. Set the report title to Service Type\
    \ Estimated Cost by Branch and change the width of the textbox to be approximately\
    \ 5 3/4 inches.\n\nWhen you are done making all of these changes, the report should\
    \ look like [Figure 13-58](#Chapter13.html#fig_13_58).\n\n![Image](images/9781430238102_Fig13-58.jpg)\n\
    \n***Figure 13-58.** Report with title added*\n\nFinally, you have probably noticed\
    \ the [&ExecutionTime] in the report footer. This is added by Report Builder 2.0\
    \ by default. If you wish to delete it, just select it and hit delete. However,\
    \ if you want to add more built-in fields to the footer or header sections, just\
    \ expand the Built-in Fields folder in the Data window to see your options. You\
    \ will see ExecutionTime, PageNumber Report Folder, Report Name, Report Server\
    \ URL, Total Pages, User ID, and Language as possible selections. For our example,\
    \ we are going to add a header to our report and add the User ID to it along with\
    \ our report title.\n\n> 1.  While in design mode, click on the Insert tab.\n\
    > 2.  Click on Header and then Add Header. Resize it to be about ½ of an inch\
    \ in height.\n> 3.  Select the title in the body of the report and drag it into\
    \ the header section\n> 4.  With the report title selected, click on the View\
    \ tab and put a check in the Properties option to show it.\n> 5.  Change the FontSize\
    \ property to 14pt rather than the default 20pt. Resize the header textbox to\
    \ be slightly larger than the title. This will give us some room in our header\
    \ to show one more field.\n> 6.  Drag the User ID build-in field over to the right\
    \ of the report title. This will create a textbox with the User ID field value.\
    \ You can right align this new textbox make it italicized and add bold formatting.\n\
    \nYou can easily add more formatting, or report beautification as I like to call\
    \ it, but at this point, the report should look like [Figure 13-59](#Chapter13.html#fig_13_59)\
    \ when previewed.\n\n![Image](images/9781430238102_Fig13-59.jpg)\n\n***Figure\
    \ 13-59.** Preview of report with execution time and title*\n\nFor a final touch,\
    \ you will add totals to the report. This is easily accomplished by clicking back\
    \ in the design area and selecting both of the cells in the Data region, Visit_Count,\
    \ and Estimated_Cost. You can select both at once by selecting the first cell\
    \ and, while holding down the Shift key (or CTRL key), selecting the second cell.\
    \ Once you have selected it, right-click and then choose Add Totals. The total\
    \ fields are automatically added for you. You can emphasize the totals by making\
    \ the two new total cells bold. When complete, the report will appear as it does\
    \ in [Figure 13-60](#Chapter13.html#fig_13_60).\n\nAs you have seen, the new Report\
    \ Builder 2.0 has many of the features of the full-blown design environment in\
    \ BIDS with only minor exceptions. One exception that stands out is the inability\
    \ to check a report directly into a version control application such as Team Foundation\
    \ Server.. However, for its intention, the Report Builder 2.0 does serve the purpose\
    \ of putting a design environment in the hands of people who can create reports\
    \ beyond the constraint of report models, but who may not be VB .NET developers\
    \ per se. Making this valuable design tool available as part of SSRS was one more\
    \ step forward in bringing SSRS to the masses. In the next section, we will cover\
    \ the enhancements made in the Report Builder 3.0 application as well as walk\
    \ through an example using the latest release of Microsoft’s Reporting Services\
    \ ad-hoc tool.\n\n![Image](images/9781430238102_Fig13-60.jpg)\n\n***Figure 13-60.**\
    \ Report with final formatting*"
  trans: "\n> 1.  右键单击 `SUM(Estimated_Cost)` 文本框，然后选择“文本框属性”。\n> 2.  图 13-57 所示的对话框包含了文本框属性，涵盖了许多可用的格式设置和操作项，例如交互式排序、可见性和超链接选项。这些都与在\
    \ BIDS 中开发报表时设置的属性相同。单击左侧的“数字”，选择“货币”作为格式，然后选择“使用千位分隔符 (,)”选项，并单击“确定”保存文本框属性。\n\
    > 3.  接下来，通过右键单击 `Visit_Count` 字段并选择“文本框属性”，为其应用带千位分隔符的数字格式。选择“数字”选项卡，然后在“类别”中选择“数字”。将小数位数设置为\
    \ `0`，选择“使用千位分隔符 (,)”选项，并单击“确定”保存文本框属性。\n> 4.  由于报表的默认高度留下了额外的空白，我们可以通过将页脚栏向上拖动到靠近我们的矩阵报表项来减少它。\n\
    >     \n>     ![Image](img/9781430238102_Fig13-57.jpg)\n>     \n>     ### 图 13-57.\
    \ Estimated_Cost 的文本框属性\n>     \n>     \n> 5.  最后，通过单击报表顶部的“单击以添加标题”文本框来重置报表标题。将报表标题设置为“按分支的服务类型估计成本”，并将文本框的宽度更改为大约\
    \ 5 3/4 英寸。\n\n完成所有这些更改后，报表应如图 13-58 所示。\n\n![Image](img/9781430238102_Fig13-58.jpg)\n\
    \n### 图 13-58. 添加标题后的报表\n\n最后，你可能已经注意到了报表页脚中的 `[&ExecutionTime]`。这是 Report Builder\
    \ 2.0 默认添加的。如果你想删除它，只需选中它并按删除键即可。但是，如果你想向页脚或页眉部分添加更多内置字段，只需展开“数据”窗口中的“内置字段”文件夹即可查看选项。你将看到\
    \ `ExecutionTime`、`PageNumber`、`Report Folder`、`Report Name`、`Report Server URL`、`Total\
    \ Pages`、`User ID` 和 `Language` 等可能的选择。在我们的示例中，我们将向报表添加一个页眉，并在其中添加 `User ID` 以及我们的报表标题。\n\
    \n> 1.  在设计模式下，单击“插入”选项卡。\n> 2.  单击“页眉”，然后选择“添加页眉”。将其高度调整为大约 ½ 英寸。\n> 3.  选择报表正文中的标题，并将其拖动到页眉部分。\n\
    > 4.  选中报表标题后，单击“视图”选项卡，并在“属性”选项前打勾以显示它。\n> 5.  将 `FontSize` 属性从默认的 `20pt` 更改为\
    \ `14pt`。将页眉文本框调整得比标题稍大一些。这将为我们的页眉留出一些空间来显示另一个字段。\n> 6.  将 `User ID` 内置字段拖动到报表标题的右侧。这将创建一个包含\
    \ `User ID` 字段值的文本框。你可以将这个新文本框右对齐，使其斜体并加粗。\n\n你可以轻松地添加更多格式设置，或者像我喜欢的那样称之为报表美化，但此时，报表在预览时应如图\
    \ 13-59 所示。\n\n![Image](img/9781430238102_Fig13-59.jpg)\n\n### 图 13-59. 包含执行时间和标题的报表预览\n\
    \n作为最后的润色，你将向报表添加总计。这可以通过单击回设计区域并选择“数据”区域中的两个单元格 `Visit_Count` 和 `Estimated_Cost`\
    \ 来轻松完成。你可以通过选择第一个单元格，然后按住 `Shift` 键（或 `CTRL` 键）选择第二个单元格来同时选中两者。一旦选中，右键单击并选择“添加总计”。总计字段会自动为你添加。你可以通过将两个新的总计单元格加粗来强调它们。完成后，报表将如图\
    \ 13-60 所示。\n\n正如你所看到的，新的 Report Builder 2.0 具有 BIDS 完整设计环境的许多功能，只有很小的例外。一个突出的例外是无法将报表直接签入版本控制应用程序，如\
    \ Team Foundation Server。然而，就其意图而言，Report Builder 2.0 确实实现了将设计环境交到那些能够超越报表模型约束创建报表、但本身可能不是\
    \ VB .NET 开发人员的人手中的目的。将这个有价值的设计工具作为 SSRS 的一部分提供，是将 SSRS 推向大众的又一进步。在下一节中，我们将介绍\
    \ Report Builder 3.0 应用程序中的增强功能，并通过一个使用 Microsoft Reporting Services 即席工具最新版本的示例进行讲解。\n\
    \n![Image](img/9781430238102_Fig13-60.jpg)\n\n### 图 13-60. 最终格式设置后的报表\n"
- fmt: '# Creating Reports with Report Builder 3.0


    When we heard that `SQL Server 2008 R2` was coming to the market with all of the
    new visual enhancements, there was talk about another `Report Builder`. After
    all of the great additions made with `Report Builder 2.0`, we could not wait to
    see what ad hoc goodies the next release would bring to our end users.


    When `SQL Server 2008 R2` came to the market, along came `Report Builder 3.0`
    and with it came some additional data sources, data visualization report items,
    and cached data sets when previewing reports to name a few. High-level details
    about each of the enhancements are:


    > *   **Report Parts:** Report Parts allow report authors to create and deploy
    reports that can be re-used by other reports. For example, if a report developer
    created a chart for Employee Service Cost by Branch report with a total cost chart,
    another report developer or end user could use that report as a Part of their
    report.

    > *   **Data Sources:** With the coming of age of `SQL Azure`, Microsoft has created
    a `Microsoft SQL Azure` data source. They have also added the `SharePoint List
    Data Extension` to connect to SharePoint lists and `Microsoft SQL Server Parallel
    Data Warehouse`.

    > *   **Report Items:** As discussed in [Chapter 5](#Chapter05.html) using the
    `Report Designer` in `SQL Server Data Tools`, new report visualization items have
    been added to the `Report Builder`. The new report items are `Map`, `Data Bar`,
    `Sparkline`, and the `Indicator`. You can find these on the `Insert` tab of `Report
    Builder`.

    > *   **Dataset Caching:** With end users creating ad hoc reports, the potential
    for many long running report requests is pretty high. As such, to prevent multiple
    round trips when no dataset related changes are made, Microsoft has added dataset
    caching to the matrix of new features. This makes the end users experience better
    when creating ad hoc reports, which could equate to more acceptance by end users.


    Now that you’ve been introduced to `Report Builder 3.0` and some of the new features
    and enhancements, let’s get started on some examples. In this example, we are
    going to build a report that has the number of visits and the estimated cost of
    service for each patients State and by the State in which the patient was seen
    at one our branches. It will be very similar to the report that we have created
    with the exception that we will also be using a `Map` control. We will also have
    a drill through report from our `Map` report to a more detailed tabular report.
    We have learned about drill through reports earlier in the text, but we never
    performed a drill through using `Report Builder`. The drill through report demonstrated
    in this section is available in the `Pro_SSRS` project in the Source Code/Download
    area for the book on the Apress Web site ([`www.apress.com`](http://www.apress.com)).
    This report is called `Emp_Svc_Cost_By_Patient_State_RB3_Drill`.


    Before we get started on `Map` report, open up `Report Builder 3.0` from the `Report
    Manager`. Once `Report Builder` is loaded, click `Open` in the `Getting Started`
    window. Navigate to the location where you have the `Pro_SSRS` solution stored
    on your hard drive and select the report named `Emp_Svc_Cost_By_Patient_State_RB3_Drill`.
    Click `Open` to open the report in `Report Builder 3.0`. If you click `Run`, you
    should have similar results to what is shown in [Figure 13-61](#Chapter13.html#fig_13_61).


    ![Image](images/9781430238102_Fig13-61.jpg)


    *Figure 13-61. Report Builder 3.0 drill through report*


    After you preview the report, return to the designer and save the report out to
    the `Pro_SSRS` folder, as we have throughout this chapter. Saving the report in
    this path will allow us to drill through to this report when we have our `Map`
    report created. With the report saved to the `Report Server`, click on the `Ribbon`
    button and click `New`. As stated previously, our next report is going to contain
    aggregated visit and estimated cost for each state that a patient is from as well
    as which state the patient was actually seen at. [Figure 13-62](#Chapter13.html#fig_13_62)
    shows an example of the report while in design mode.


    ![Image](images/square.jpg) **Note** Again, we have been using sample data that
    has been changed to provide result sets that represent real world scenarios. With
    our fictitious patients coming from around the country, it is not very likely
    they would travel from states like California, to be seen in Ohio. Nonetheless,
    the example in the following section could be used for many applications that
    have a requirement to provide maps along with quantifiable data.


    ![Image](images/9781430238102_Fig13-62.jpg)


    *Figure 13-62. Employee Service Cost by branch and patient state in design mode*'
