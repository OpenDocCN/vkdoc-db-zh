    </head>

    <body>

        <form id="form1" runat="server">

        <div>


            <asp:DropDownList ID="reportList" runat="server">

            </asp:DropDownList>

            <asp:Button ID="renderReport" runat="server" onclick="renderReport_Click"

                Text="Render" />

            <hr />

            <rsweb:ReportViewer ID="reportViewerWeb" runat="server" Width="841px">

            </rsweb:ReportViewer>


        </div>

