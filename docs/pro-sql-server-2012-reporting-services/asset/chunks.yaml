    RS Scripter，它有助于编写脚本和管理各种报表服务器目录项；它可以从服务器提取 RDL，并管理订阅、角色，甚至从一个服务器迁移到另一个服务器。


    ### 安装与配置


    你可以像安装 Analysis Services、Integration Services 和 Notification Services 一样，作为主 SQL
    Server 安装的一部分来安装 Reporting Services。在安装 Reporting Services 2012 之前，你必须知道你将运行在本机模式还是
    SharePoint 集成模式。对于早期版本的 Reporting Services，你可以通过使用 Reporting Services 配置管理器在安装后更改模式，但在
    2012 版本中，你只能在 SQL Server 安装时将 Reporting Services 配置为 SharePoint 集成模式，因为该应用程序将作为本机
    SharePoint 服务进行安装和配置。


    安装的组件取决于你的组织选择实现的模式。例如，在本机模式下安装时，组件包括 Reporting Services Web 服务、`ReportServer`
    数据库和报表管理器 Web 应用程序。安装 Reporting Services 后，如果你不需要某些功能，可以选择禁用它们。例如，你可能希望使用自定义应用程序与
    `ReportServer` 交互，而不是内置的报表管理器 Web 应用程序。安装的客户端组件包括前面提到的管理命令行工具，如 `rs` 和 `rsconfig`，以及文档、示例和前面提到的
    Reporting Services 配置管理器。


    如果你在安装 Reporting Services 时使用了本机模式的默认配置设置，你将使用 RS 配置管理器来设置或更改与该实例相关的各种其他设置。一些需要执行的任务是：


    > *   选择安全设置，例如报表服务器将使用 HTTP、HTTPS 还是两者。

    > *   配置一个简单邮件传输协议（SMTP）邮件服务器来处理订阅的传递。

    > *   备份和还原在将报表服务器移动到新机器时使用的加密密钥。

    > *   设置 Web 服务和报表管理器 URL，并定义它们运行的端口。这使你能够在一台机器上运行多个 Reporting Services 实例。


    如前所述，一旦安装了 SSRS，你可以修改一些配置设置。例如，在查看性能数据后，你可能认为报表服务器需要连接到现有的 Web 场。你可以使用 `rsconfig`
    工具或图形化的 Reporting Services 配置管理器来执行此任务。你可以通过直接修改 `RSReportServer.config` 文件来重新配置安全设置或邮件服务器。我们将在第
    10 章和第 11 章中介绍如何使用这些工具、修改配置文件设置以及收集性能度量。


    如果你选择使用 SharePoint 集成模式，配置设置完全在 SharePoint 的管理中心内管理。我们将在第 12 章中更详细地介绍 SharePoint
    集成。



    好的，我已经按照您的要求，将提供的英文技术文档翻译成了中文，并严格遵循了所有格式注意事项。


    **主要处理要点如下：**

    1.  **保留所有格式标记**：粗体（如**注意**）、斜体（如*难以遗忘*）、内联代码（如`rsconfig`）、代码块、链接格式（如`第 3 章`）以及列表和引用块的符号都得到了完整保留。

    2.  **准确翻译技术内容**：对客户端工具（BIDS、报表生成器等）、安装模式（本机模式、SharePoint 集成模式）以及命令行工具（`rs`, `rsconfig`等）的功能描述进行了准确、专业的翻译。

    3.  **处理专有名词和术语**：产品名称（如 SQL Server Reporting Services）、技术术语（如 RDL、Web 服务、ClickOnce）保持了原文或使用了业界通用译法，确保技术准确性。

    4.  **保持结构与上下文**：完整保留了原文的章节结构（`####`， `#####`），图片引用和图表标题（如`***图 1-3.***`），以及交叉引用链接（如`图
    1-3`）。

    5.  **避免遗漏与重复**：逐段核对，确保没有遗漏任何一行内容，且最终输出仅为译文，没有重复原文。


    希望这份翻译符合您作为高级文档工程师和翻译员的要求。如果需要针对特定术语或风格进行调整，请随时告诉我。'
- fmt: '# Deploying SSRS Securely


    Security ranks as one of the highest priorities for businesses today. Providing
    customers and employees with a secure and reliable computing environment is not
    only good practice, but also in many cases a requirement, mandated by stringent
    federal regulations. In our case, this means adherence to the Health Insurance
    Portability and Accountability Act (HIPAA). This requires policies and procedures
    to be in place that guarantee confidential patient information is not only securely
    transmitted, but also accessible only by those with the authority to view it.
    To that end, we have to ensure that the data we transmit over a network connection,
    especially the Internet, is encrypted at its source.


    SSRS is a role-based application that provides access to the objects it stores
    through the use of defined roles, such as content browsers who may only view reports
    and report data. The roles are associated with Windows-based login accounts, so
    SSRS relies on Windows as its primary source of authentication. It is possible
    to extend the security model for SSRS to support other methods of authentication,
    such as forms-based authentication, whereby users can log in with accounts maintained
    outside Windows to access the report server. Since SSRS has multiple authentication
    points—namely, at the report server level through `http.sys` and the data-access
    level, SQL, or Windows authentication—specific security risks exist when altering
    the default Windows roles-based security model. For one, `http.sys` would need
    to be set up to allow explicit access and custom validation of a user’s credentials.
    Another risk is that SSRS can support only one security extension at a time. In
    other words, a single SSRS report server can be extended to support a non-default
    authentication model or remain as a default Windows authentication, but cannot
    take advantage of both models simultaneously. Depending on your level of need
    for custom security—say, for example, you need to deploy SSRS on an Internet-facing
    server, or your application already supports forms authentication, and it would
    be too difficult to work within the constraints of Windows authentication—then
    you might need to consider a custom security extension. Our needs were such that
    we could easily incorporate SSRS into an existing Windows authentication model.


    Another method of dealing with security is through a Windows or Web-based application
    that has its own authentication layer. Using the `ReportViewer` control within
    the Visual Studio designer for Windows and Web forms, you can use an application
    as a portal into the report server. As long as the application handles security,
    you can give the application server access to the needed objects within Reporting
    Services by using an Active Directory computer account like `DOMAIN\ServerName$`.


    In this book, we’ll cover two deployment scenarios:


    *   Intranet deployment using Virtual Private Network (VPN) and firewall technologies
    to allow access to the SSRS report server

    *   An Internet-hosted application that uses Terminal Services to connect securely
    to an SSRS report server


    In [Chapter 11](#Chapter11.html), we’ll walk you through securing the SSRS deployment
    models with technologies that provide the required encryption levels and user
    authentication. In addition to the two models that we cover, we briefly discuss
    ways to integrate a forms-based authentication method allowing clients to connect
    directly to SSRS via the Internet.


    ## Summary


    Having created and deployed numerous projects with SSRS for SQL Server 2005, 2008
    and 2008 R2, we have been anxiously awaiting, along with the rest of the SQL Server
    community, the release of SQL Server 2012. As you work through the book, we will
    point out the enhancements released with SSRS 2008 R2 and SSRS 2012. However,
    our main aim, as with the other editions of the book, is to show you how to take
    advantage of advanced features, providing useful examples, enabling you to put
    SSRS to work in a real-world environment where the user of the reports and applications
    that you deploy will have the final say on the solution’s success.


    # Chapter 2 Report Authoring: Designing Efficient Queries


    SSRS provides a platform for developing and managing reports in an environment
    that includes multiple data sources of information. These data sources can include
    both relational data (for example, SQL Server, Oracle, MySQL, and so on) and non-relational
    data (for example, Active Directory, LDAP stores, and Exchange Server). Standards
    such as ODBC, OLE DB, and .NET facilitate the retrieval of data from these disparate
    data stores, so SSRS can access the data as long as your system has the relevant
    drivers. In the SSRS report design environment, configuring a dataset that drives
    the report content is the first step of the design process.


    However, before we introduce the many elements of the report design environment,
    it’s important to begin with the heart of any data-driven report—whether it’s
    Business Objects Reports, SSRS, or Microsoft Access—and that is the query. With
    any report design application, developing a query that returns the desired data
    efficiently is the key to a successful report.


    In this chapter, we will describe the following:


    *   *The healthcare database that is the target of the reporting queries in this
    book*: You must understand the design of the data before you can design efficient
    queries. We’ll also describe an easy way to familiarize yourself with your data
    when the full schema details are not available.

    *   *How to design basic but effective SQL queries for reporting purposes*: We’ll
    create queries based on real-world applications, the kind that report writers
    and database administrators create every day.

    *   *How to use SSMS to gauge query performance*: The initial query defines the
    performance and value of the report, so it’s important to understand the tools
    required to create and test the query to ensure that it’s both accurate and tuned
    for high performance.

    *   *How to transform the optimized query into a parameterized, stored procedure*:
    This gives you the benefit of pre-compilation and cached execution plans for faster
    performance and the benefit of the procedure being centrally updated and secured
    on SQL Server.


    ## Introducing the Sample Relational Database


    Throughout the book, we’ll show you how to design and deploy a reporting solution
    and build custom .NET SSRS applications for an SQL Server-based healthcare application,
    using relational tables and stored procedures. The application was originally
    designed for home health and hospice facilities that offer clinical care to their
    patients, typically in their homes. Our example for this book, the Online Transactional
    Processing (OLTP) database, powers this application, capturing billing and clinical
    information for home health and hospice patients. The database that we will use
    is called `Pro_SSRS` and is available for download in the Source Code/Download
    area of the Apress Web site ([`http://www.apress.com`](http://www.apress.com)),
    together with instructions in the `ReadMe.txt` file on how to restore the database
    in preparation for use in this and subsequent chapters.'
