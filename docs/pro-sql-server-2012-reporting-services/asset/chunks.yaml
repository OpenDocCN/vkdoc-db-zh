    \ = `@BranchID` = 2。当字段中可能存在 `NULL` 值时执行此评估，因为 `NULL` 值无法使用标准运算符（如 `=`）进行比较。\n\
    \n对于两个时间值，服务年份和月份，你使用了类似的逻辑。如果参数 `@ServiceMonth` 和 `@ServiceYear` 以 `NULL` 传递给存储过程，则存储过程返回每条记录。如果参数包含有效值，例如年份为\
    \ 2009，则当参数值等于数据库值时，`WHERE` 子句会应用过滤器。\n\n## 查询性能与索引\n\n在讨论设计高效查询的同时，数据库管理员（DBA）可以为表做很多事情来提高查询性能。仅列举几个问题：统计信息可能会过时，表上的索引（如果有）可能会变得碎片化或不足。每种情况都会以不同方式影响查询性能，但总是向坏的方向发展——设计不良或维护不善的表上的查询执行时间总是比设计良好、维护得当的表上的查询更长。\n\
    \n你可能没有管理索引的适当权限，但你可以做的一件事是设计查询以使用现有的索引。以下是一些提示，可帮助你提高性能并缩短将结果返回到报表的时间。\n\n* \
    \  `SELECT`：仅返回报表中绝对需要的列。\n*   `JOIN`：仅连接你需要的表，并在连接条件中使用现有的索引列。\n*   `WHERE`：按照索引列的定义顺序使用它们，并避免在过滤值前使用通配符\
    \ (%) 的 `LIKE` 运算符。\n\n如果你的查询性能不如预期，你或许可以请数据库管理员对你查询中使用的表运行一些性能检查。他们可能只需要修改现有索引以包含你查询中使用的列。解决方法甚至可能像在数据库上创建维护计划以更新统计信息一样简单。无论哪种方式，在编写查询时请尽量使用这些技巧。查询性能调优是一个很大的课题，有许多书籍可以帮助你编写优化的查询，例如\
    \ Grant Fritchey 的 *SQL Server 2012 Query Performance Tuning* (Apress 2012)。\n\
    \n## 列和表别名\n\n列和表别名实际上并不能使你的查询运行得更高效。但是，它们确实使查询更易于阅读和编写得更快。别名允许你为列和表使用缩写（或更具描述性）的标签。这样，你就不必在每次使用某列时都键入表的全名，或者可以为列分配更合适的名称。使用\
    \ `AS` 关键字，我们告诉 SQL Server 将字段或表别名为其他标签。\n\n```sql\nSELECT\n…\n, DATENAME(mm,\
    \ T.ChargeServiceStartDate) AS [Month]\n…\nINNER JOIN ServicesLogCtgry AS SLC\
    \ ON S.ServicesLogCtgryID = SLC.ServicesLogCtgryID\n```\n\n此语句使用 `DATENAME` 函数将\
    \ `Trx` 表的 `ChargeServicesStartDate` 别名为 Month。下一行展示了如何将名为 `ServicesLogCtgry`\
    \ 的表别名，以便你可以将其引用为 `SLC`。这样，每当你需要 `ServicesLogCtgry` 表中的列时，你可以引用别名，后跟一个句点，然后是列名。\n"
- fmt: '# Testing the Procedure


    The next step is to grant execute privileges for the stored procedure in SSMS
    by navigating to the database `Pro_SSRS` and then expanding the `Programmability`
    folder. From here, select `Stored Procedures`, right-click `Emp_Svc_Cost`, and
    finally select `Properties`. A Permissions property page will allow you to add
    the `public` role and grant execute permission to any group or user you desire.
    In this case, click `Add` on the Permissions page, find `Public` in the list of
    available users, and grant the `Execute` permission. (We’re sure the humor of
    this wasn’t lost on the developer, who knew someone would grant a public execution.)


    ![Image](images/square.jpg) **Note** The test server on which we’re developing
    the reports is an isolated and secure system. Typically, granting execution privileges
    to the `public` role isn’t recommended. We’ll lock down both the stored procedure
    and the report in [Chapter 11](#Chapter11.html).


    You can now test the procedure directly in SSMS with the following command:


    `EXEC Emp_Svc_Cost`


    Because you have allowed `NULL` values for the parameters, you don’t explicitly
    have to pass them in on the command line. However, to test the functionality of
    the stored procedure, you can pass in the full command line with the appropriate
    parameters; for example, you can pass all services rendered in September 2009,
    like so:


    `EXEC Emp_Svc_Cost 09, 2009, NULL, NULL, NULL`


    Executing the procedure in this way returns 893 records in a fraction of a second,
    and the results verify that, indeed, only services in September 2009 were returned
    (see [Figure 2-7](#Chapter02.html#fig_2_7)).


    ![Image](images/9781430238102_Fig02-07.jpg)


    **Figure 2-7.** Viewing the results of `Emp_Svc_Cost` with year and date parameters


    ## Summary


    In this chapter, you began to design the essential part of a report: the query
    and stored procedure. By using stored procedures, you gain the benefits of central
    administration and security while also gaining the ability to execute compiled
    code to return the dataset instead of a stand-alone query. You can develop queries
    in conjunction with the report, using the built-in query tools within SSRS. However,
    it is considered best practice to deploy the report with a stored procedure whenever
    possible.


    A report request and the target audience are the deciding factors when determining
    the layout and default rendering of the report. However, even though reports are
    often designed to answer a specific need, if they’re based on the same tried-and-true
    stored procedures, with similar parameters and groupings, the data will be accurate
    across all reports. You can then focus the design time on the report itself and
    not on rewriting queries.


    # C H A P T E R 3


    ## Introduction to Reporting Services Design with SQL Server Data Tools


    The professional lines separating system administrators, DBAs, and developers
    are blurring. Products are often extensible through code or at least have the
    potential to create functionality that goes well beyond that of out-of-the-box
    offerings. SSRS is such an application. The days of the Microsoft Management Console
    (MMC) are numbered and will be overshadowed by the new interface on the block,
    the IDE, though even that isn’t new by any means, as any developer will tell you.
    However, system administrators, DBAs, and even report designers have had to become
    familiar with this new way of performing their day-to-day tasks. As you’re probably
    well aware, you can create reports for SSRS within Visual Studio 2005 and up,
    or within BIDS/SSDT. To remind you of these abbreviations, the designer included
    with SSRS 2005 through the 2008 R2 release was labeled as Business Intelligence
    Development Studio (BIDS). However, in the 2012 release, Microsoft decided to
    re-label the designer as SQL Server Data Tools (SSDT) because of the inclusion
    of features such as further development integration with SQL Azure environments.
    The ability to use SSDT/BIDS is advantageous for Visual Studio developers, because
    now they can use the same IDE for report creation and application development!
    For the rest of us, creating reports in Visual Studio 2010 presents a learning
    curve.


    SQL Server 2005 introduced two new management and development environments, BIDS,
    a subset of Visual Studio 2005, and SSMS. In SQL Server 2008, 2008 R2 and 2012,
    these applications have been enhanced to improve the integration of design and
    management functionality in a common set of tools.


    Now that you have developed your queries and stored procedures, you can turn your
    attention to the tools available to report designers when SQL Server is installed.
    Over the next three chapters we’ll familiarize you with the tools of report design
    before showing you how to create a full-blown SSRS report in [Chapter 6](#Chapter06.html).
    The topics we’ll cover include the following:


    *   The elements of SQL Server Data Tools (SSDT/BIDS)

    *   The role of RDL in SSRS with sample code from the various report objects it
    controls

    *   Creating a data source and dataset

    *   Defining query and report parameters

    *   Discussing report pagination

    *   Defining expressions and filters to demonstrate how you can use them together
    to control report content and formatting

    *   Implementing Tablix properties, new in SSRS 2008, which extend the functionality
    of several data regions by combining row grouping and column grouping

    *   Creating data region samples: the List, Textbox, Table, Rectangle, Matrix,
    Chart, and Image

    *   Implementing Maps, Data Bars, Sparklines and Indicators, all of which provide
    more sophisticated dashboard style elements to reporting


    In this chapter, we’ll show you how to set up and explore the SSDT/BIDS IDE using
    the embedded elements of SSRS within the 2010 environment.


    Everyone learns differently—some like to follow a step-by-step guide to a known
    conclusion, and some like to view a completed report to see the specific components
    of its design. We will therefore offer both approaches in this and subsequent
    chapters. Specifically, we’ll show you how to build each sample from the ground
    up and we’ll also point you to the completed sample in the Source Code download
    available from this book’s catalog page on [`www.apress.com`](http://www.apress.com),
    so you can analyze the report as you work through the steps to achieve the end
    result.


    We provide all the data sources, reports, and projects you will work with throughout
    this chapter in a solution called `Pro_SSRS`. You can open this solution in both
    BIDS and Visual Studio 2010. As we mentioned earlier, Microsoft has changed the
    label from Business Intelligence Development Studio to SQL Server Data Tools (SSDT),
    but we will use BIDS and SSDT interchangeably throughout this book. You’ll find
    detailed instructions in the Source Code/Download area on the Apress site for
    installing the samples for each chapter. This chapter will focus primarily on
    the IDE of BIDS and provide a step-by-step guide to familiarize you with BIDS.
    [Chapter 4](#Chapter04.html) will describe the use of SSRS-specific report objects
    such as Lists and Tables, and [Chapter 5](#Chapter05.html) will introduce report
    objects like Charts, Gauges, Maps, Sparklines, and Data Bars. When you begin creating
    these specific report examples, you will have two reports for each object, a starting-point
    report and a completed report sample; we will point these out at the beginning
    and end of each main section. This approach lets you step through the procedure
    to produce the output in the starting-point report and then open and compare the
    end result to the completed report.'
