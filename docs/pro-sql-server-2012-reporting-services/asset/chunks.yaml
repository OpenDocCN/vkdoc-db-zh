    \ (SSRS_WebService.CatalogItem thisItem in listItems)\n        {\n           \
    \ if (thisItem.TypeName == \"Report\")\n            {\n                reportList.Items.Add(thisItem.Name);\n\
    \            }\n        }\n    }\n    catch (Exception ex)\n    {\n        Response.Write(ex.Message);\n\
    \    }\n}\n```\n\n现在你已经构建了表单，并用来自 SSRS Web 服务的数据填充了下拉列表，你可以通过允许用户从列表中渲染报表来最终完成应用程序。你现在将回到为添加到网页的按钮的\
