  trans: '### 添加图表


    SSRS 提供了一个样式与 Microsoft Excel 相似的**图表**数据区域。图表的作用范围可以局限于当前数据集，也可以使用其自身的数据集。在本例中，您将在报表开头添加一个堆积条形图，用于显示排名前十的诊断及其服务次数计数。这本质上将反映迄今为止报表中提供的数据。该报表现在也按“分支机构”分组，这将自动分离您已定义的“分支机构”组中的值。您需要在图表中模拟此行为。在此特定数据集中，您只有三个分支机构，因此结果应与报表的详细信息一致。请打开
    `Pro_SSRS` 项目中的 `EmployeeServiceCost_MVP_Chart_Start.rdl` 报表，并按照以下步骤将图表添加到报表中：


    1.  在“设计”选项卡上，单击并拖动您已定义的表格，为图表腾出空间。

    2.  单击并拖动**图表**数据区域到表格上方的区域。

    3.  在图表任意位置右键单击，选择“更改图表类型”，然后在“条形图”区域选择“堆积条形图”。

    4.  使用为报表已定义的 `Chart_DS` 数据集；将 `DiagVisits` 拖到图表的“值”区域。

    5.  将 `Diagnosis` 字段拖到图表的“类别组”区域。

    6.  将 `Patient_Count` 字段拖到图表中 `DiagVisits` 系列下方的“值”区域。

    7.  调整图表大小，使其与下方的表格对齐。您可以选择这两个报表元素，然后在工具栏上选择“使宽度相同”图标。

    8.  在“诊断”类别组上右键单击，然后单击“筛选器”选项卡。单击“添加”按钮，为该类别组添加筛选器。由于您希望报表仅显示排名前十的诊断，因此需要为此分组添加一个筛选器。您将使用“前
    N 个”运算符来实现此目的，如 `图 6-34` 所示，该筛选基于诊断访问计数总和排名前十的诊断。在“诊断”类别组属性对话框中，单击“排序”选项卡。将默认排序依据更改为表达式
    `=SUM(Fields!DiagVisits.Value)`，并将排序顺序选择为“A 到 Z”。


    `Image` `images/9781430238102_Fig06-34.jpg`


    `图 6-34. 用于筛选前十位诊断的筛选器值`


    最后，您可以预览报表。有时，报表需要在分析详细信息之前，先用一个图表来快速查看数据。浏览此报表的人可能会发现图表很有趣，例如，它显示“物理治疗 NEC”诊断在“内斯特谷”分支似乎更为普遍。这个初步预览可能值得进行更多调查，这可以从报表的详细信息中获得。


    预览时，报表应如 `图 6-35` 所示。


    `Image` `images/9781430238102_Fig06-35.jpg`


    `图 6-35. 包含图表的员工服务成本报表`


    图表数据区域有许多可以应用的属性，如 `第 5 章` 所述；然而，堆积条形图的外观对于您的报表来说已经足够，可以直接部署。不过，通过一些轻微的调整，例如删除图表标题、坐标轴标题以及选择“默认”配色方案，最终报表开始呈现出更简洁的外观和感觉。`Pro_SSRS`
    项目中包含已应用于图表数据区域筛选器的完整报表名为 `EmployeeServiceCost_MVP_Chart.rdl`。


    ### 添加 Tablix 元素


    SSRS 2008 通过 **Tablix** 数据区域引入了报表设计方面的重大变革。本质上，Tablix（在 `第 4 章` 中有详细介绍）结合了**表格**和**矩阵**数据区域的特性。SSRS
    2005 中可用的表格区域能够很好地处理基于数据集的、长度可变的行数据。相应地，矩阵数据区域包含了对可变数量列的支持。Reporting Services
    2008 允许使用任一控件在报表中的任意位置包含自定义的行组或列组。正如您将在后续对员工服务成本报表的添加中看到的，向表格数据区域添加列分组非常直接。


    在接下来的“配置报表和组变量”部分中，您将使用 `Year` 字段向 `EmployeeServiceCost_Tablix_Start` 报表添加一个列组。`Year`
    字段（您可能还记得）指示为患者提供服务类型的年份。到目前为止，报表中包含不同的患者和员工计数，以及估计成本和服务次数。那么，如果您希望查看这些值按多年服务年份分组的情况，该怎么办呢？


    您将执行以下操作，为员工服务成本报表添加一个按 `Year` 分组的列组：


    1.  在表格中的 `[CountDistinct(PatID)]` 单元格上右键单击，选择“添加组”，然后在“列组”部分下选择“父级组”。

    2.  在“分组依据表达式”字段中，选择 `[Year]`。不要勾选“添加组标题”或“添加组页脚”按钮。单击“确定”。

    3.  由于我们希望组之间相互独立，因此现在需要添加一个称为**相邻组**的组。在我们刚刚创建的新 `[Year]` 字段上（应位于“患者数”标签的正上方）右键单击，选择“添加组”，然后选择“相邻右侧”。像步骤
    2 一样，按 `[Year]` 分组。单击“确定”。此新列将保存当前存在的“员工数”列中的所有值。在步骤 5 中，我们将把所有值移动到新的 `[Year]`
    列下方。

    4.  再执行两次步骤 3，每次都使用最右侧的 `[Year]` 字段。

    5.  现在我们有了三个仅包含列分组 `[Year]` 的列，我们需要将现有值移动到它们下方。此时，设计界面应如 `图 6-36` 所示。接下来，选择“员工数”、“估计成本”和“服务次数”列中的所有字段。务必也选择标题文本！然后将值从其原始单元格剪切并粘贴到我们在步骤
    2 和 3 中创建的新相邻组下的三个空列中。

    6.  右侧的三列不再需要。通过右键单击列并选择“删除列”来删除它们。您可以按住 CTRL 键选择它们。

    7.  最后，调整列的宽度，留出足够的空间来显示标签，如 `图 6-37` 所示。


    `Image` `images/9781430238102_Fig06-36.jpg`


    `图 6-36. 移动字段之前的设计布局`


    完成后，报表在“设计”选项卡上应类似于 `图 6-37`。您还可以在表格上的“行组”和“列组”区域看到分组的可视提示，您现在各有四个组。`Pro_SSRS`
    项目中已应用列组的 Tablix 数据区域的完整报表名为 `EmployeeServiceCost_Tablix.rdl`。


    `Image` `images/9781430238102_Fig06-37.jpg`


    `图 6-37. 列分组的设计布局`


    当您预览报表并选择多个年份时，如 `图 6-38` 所示（选择了 2009 年和 2010 年以及所有月份），您可以看到列分组自动水平扩展并相应地对值进行分组。例如，在选定的月份中，充血性心力衰竭在
    2009 年有 75 次家庭健康助理访问，而在 2010 年只有 16 次。


    `Image` `images/9781430238102_Fig06-38.jpg`


    `图 6-38. 带有列分组的员工服务成本报表预览`'
- fmt: '### Configuring Report and Group Variables


    SSRS has implemented global variables since its initial release in SQL 2000. These
    variables, such as `ExecutionTime` and `UserID`, can be used in reports. For example,
    the expression `=Globals!ExecutionTime` returns the time at which the report was
    executed. This value, unlike that returned by the expression `Now()`, does not
    change after the report is rendered, so paging through the report will not change
    the value of the global variable.


    SSRS 2008 introduced two new types of variables—report variables and group variables—that
    can be configured at design or runtime to be static throughout report execution
    and viewing. You will use a report variable in this section to create a threshold
    for the `Visit_Count` field so that when the report is run, you can calculate
    whether the number of visits have met the report variable threshold. You will
    use the same variable again in the new SSRS Gauge control.


    To configure a report variable, go into design mode, click `Report Properties`
    under the `Report` menu, and then select the `Variables` tab. You will need to
    add the report variable as in [Figure 6-39](#Chapter06.html#fig_6_39). The threshold
    that you will set will be for the average number of visits per day. The method
    to derive this value is a simple calculation of a distinct count of the unique
    field `Trx.ServicesTblID` divided by a range of days, say 365 for a year. Our
    calculation for the `Pro_SSRS` database reveals an average of 44 daily visits
    for 2009. The next step, then, is to create a report variable that will hold this
    threshold value.


    To set up a report variable, open up the `EmployeeServiceCost_Variables_Start.rdl`
    report from the `Pro_SSRS` project and go to the `Design` tab, click `Report Properties`
    under the `Report` menu, and click the `Variables` tab. Click `Add` and enter
    `Threshold` as the name of the variable, `44` as the value, and remove the check
    from `Read-Only`, as shown in [Figure 6-39](#Chapter06.html#fig_6_39).


    ![Image](images/9781430238102_Fig06-39.jpg)


    *Figure 6-39. Adding a report variable*


    Like report variables, group variables can be configured for one or more row or
    column groups. They are useful for storing static values, such as differing tax
    values for products and product subcategories, or subgroups.


    ### Adding the Gauge Control


    Gauge controls are one of the most aesthetically appealing types and are useful
    for reports that focus on Key Performance Indicators (KPIs). Such reports are
    designed to be viewed in dashboard format for at-a-glance views of data, as you
    saw in [Chapter 5](#Chapter05.html#ch5). In this section, we will combine the
    report variable we created in the previous section with one of these new controls
    to create a visual cue within the Employee Service Cost report. This report will
    show us how many visits have been made per day for the time period we are analyzing.


    You can determine the average number of visits by a very simple calculation dividing
    the sum of the visit counts by a distinct count of the `ChargeServiceStartDate`
    field. You can perform that computation using the `Emp_Svc_Cost_MVP` stored procedure.
    This average number of visits value will become one of the two pointers in the
    gauge control, which will be the multiple bar gauge. The other pointer in the
    control will hold the threshold value of 44.


    To begin, drag a Gauge control from the Toolbox onto the report to the right of
    the chart. Just make sure it is inside the Rectangle. Select the `Multiple Bar
    Pointers` gauge. There will be three bars by default. You will only use two of
    the bars for this report, `LinearPointer1` and `LinearPointer2`. Go ahead and
    delete the small one (`LinearPointer3`) by right-clicking it and choosing to `Delete
    Pointer`. Assign the expression `=Variables!Threshold.Value` to `LinearPointer1`
    by right-clicking the pointer and selecting `Pointer Properties`. In the Properties
    window, assign the variable expression value as shown in [Figure 6-40](#Chapter06.html#fig_6_40).


    ![Image](images/9781430238102_Fig06-40.jpg)


    *Figure 6-40. Assigning a report variable value to the gauge pointer*


    Next, assign the expression to determine the average number of visits for the
    time frame selected from the parameters to `LinearPointer2`. Because the multivalued
    parameters are query parameters, you know that the data in the report will be
    limited to the values selected from the `Month` and `Year` parameters. This would
    not be the case if you were using report parameters and subsequently filtering
    the data within the report. Knowing, for example, that the number of days over
    which to calculate the average will change based on the `Month` and `Year` parameter
    values selected makes it easy to do the calculation for `LinearPointer2`. You
    can write that calculation as:

    ```

    =SUM(Fields!Visit_Count.Value) / CountDistinct(Fields!ChargeServiceStartDate.Value)

    ```

    Your final step is to set the color coding for the pointer such that the pointer
    will show red for 44 and under, and green for over 44. Right-click on `LinearPointer2`
    and select the `Pointer Properties` option. Next, click the `Pointer Fill` tab.
    Click the `Expression` button to the right of the secondary color, enter the following
    expression, and click `OK`:

    ```

    =IIF(Sum(Fields!Visit_Count.Value) / CountDistinct(DAY(Fields!ChargeServiceStartDate.Value)
    &

    YEAR(Fields!ChargeServiceStartDate.Value)) < Variables!Threshold.Value, "Red",
    "Green")

    ```

    The final view of the report in [Figure 6-41](#Chapter06.html#fig_6_41) has the
    parameter value for `ServiceYear` of 2009 and 2010 selected. You can see that
    the threshold has been met for the year and month values selected. The completed
    report with all the final touches can be seen in the `Pro_SSRS` project is called
    `EmployeeServiceCost_Variables.rdl`.


    ![Image](images/9781430238102_Fig06-41.jpg)


    *Figure 6-41. Final view of the report with the gauge control*'
  raw: '### Configuring Report and Group Variables


    SSRS has implemented global variables since its initial release in SQL 2000\.
    These variables, such as ExecutionTime and UserID, can be used in reports. For
    example, the expression =Globals!ExecutionTime returns the time at which the report
    was executed. This value, unlike that returned by the expression Now(), does not
    change after the report is rendered, so paging through the report will not change
    the value of the global variable.


    SSRS 2008 introduced two new types of variables—report variables and group variables—
    that can be configured at design or runtime to be static throughout report execution
    and viewing. You will use a report variable in this section to create a threshold
    for the Visit_Count field so that when the report is run, you can calculate whether
    the number of visits have met the report variable threshold. You will use the
    same variable again in the new SSRS Gauge control.


    To configure a report variable, go into design mode, click Report Properties under
    the Report menu, and then select the Variables tab. You will need to add the report
    variable as in [Figure 6-39](#Chapter06.html#fig_6_39). The threshold that you
    will set will be for the average number of visits per day. The method to derive
    this value is a simple calculation of a distinct count of the unique field Trx.ServicesTblID
    divided by a range of days, say 365 for a year. Our calculation for the Pro_SSRS
    database reveals an average of 44 daily visits for 2009\. The next step, then,
    is to create a report variable that will hold this threshold value.


    To set up a report variable, open up the EmployeeServiceCost_Variables_Start.rdl
    report from the Pro_SSRS project and go to the Design tab, click Report Properties
    under the Report menu, and click the Variables tab. Click Add and enter **Threshold**
    as the name of the variable, **44** as the value, and remove the check from Read-Only,
    as shown in [Figure 6-39](#Chapter06.html#fig_6_39).


    ![Image](images/9781430238102_Fig06-39.jpg)


    ***Figure 6-39.** Adding a report variable*


    Like report variables, group variables can be configured for one or more row or
    column groups. They are useful for storing static values, such as differing tax
    values for products and product subcategories, or subgroups.


    ### Adding the Gauge Control


    Gauge controls are one of the most aesthetically appealing types and are useful
    for reports that focus on Key Performance Indicators (KPIs). Such reports are
    designed to be viewed in dashboard format for at-a-glance views of data, as you
    saw in [Chapter5](#Chapter05.html#ch5). In this section, we will combine the report
    variable we created in the previous section with one of these new controls to
    create a visual cue within the Employee Service Cost report. This report will
    show us how many visits have been made per day for the time period we are analyzing.


    You can determine the average number of visits by a very simple calculation dividing
    the sum of the visit counts by a distinct count of the ChargeServiceStartDate
    field. You can perform that computation using the Emp_Svc_Cost_MVP stored procedure.
    This average number of visits value will become one of the two pointers in the
    gauge control, which will be the multiple bar gauge. The other pointer in the
    control will hold the threshold value of 44.


    To begin, drag a Gauge control from the Toolbox onto the report to the right of
    the chart. Just make sure it is inside the Rectangle. Select the Multiple Bar
    Pointers gauge. There will be three bars by default. You will only use two of
    the bars for this report, LinearPointer1 and LinearPointer2\. Go ahead and delete
    the small one (LinearPointer3) by right-clicking it and choosing to Delete Pointer.
    Assign the expression =Variables!Threshold.Value to LinearPointer1 by right-clicking
    the pointer and selecting Pointer Properties. In the Properties window, assign
    the variable expression value as shown in [Figure 6-40](#Chapter06.html#fig_6_40).


    ![Image](images/9781430238102_Fig06-40.jpg)


    ***Figure 6-40.** Assigning a report variable value to the gauge pointer*


    Next, assign the expression to determine the average number of visits for the
    time frame selected from the parameters to LinearPointer2. Because the multivalued
    parameters are query parameters, you know that the data in the report will be
    limited to the values selected from the Month and Year parameters. This would
    not be the case if you were using report parameters and subsequently filtering
    the data within the report. Knowing, for example, that the number of days over
    which to calculate the average will change based on the Month and Year parameter
    values selected makes it easy to do the calculation for LinearPointer2\. You can
    write that calculation as


    `=SUM(Fields!Visit_Count.Value) / CountDistinct(Fields!ChargeServiceStartDate.Value)`


    Your final step is to set the color coding for the pointer such that the pointer
    will show red for 44 and under, and green for over 44. Right-click on LinearPointer2
    and select the Pointer Properties option. Next, click the Pointer Fill tab. Click
    the Expression button to the right of the secondary color, enter the following
    expression, and click OK:


    `=IIF(Sum(Fields!Visit_Count.Value) / CountDistinct(DAY(Fields!ChargeServiceStartDate.Value)
    &`

    `YEAR(Fields!ChargeServiceStartDate.Value)) < Variables!Threshold.Value, "Red",
    "Green")`


    The final view of the report in [Figure 6-41](#Chapter06.html#fig_6_41) has the
    parameter value for ServiceYear of 2009 and 2010 selected. You can see that the
    threshold has been met for the year and month values selected. The completed report
    with all the final touches can be seen in the Pro_SSRS project is called EmployeeServiceCost_Variables.rdl.


    ![Image](images/9781430238102_Fig06-41.jpg)


    ***Figure 6-41.** Final view of the report with the gauge control*'
  trans: '

    ### 配置报告与组变量


    自 SQL 2000 的初始版本以来，SSRS 就实现了全局变量。这些变量（例如 `ExecutionTime` 和 `UserID`）可在报告中使用。例如，表达式
    `=Globals!ExecutionTime` 返回报告被执行的时间。与表达式 `Now()` 返回的值不同，该值在报告呈现后不会改变，因此在报告中翻页不会改变全局变量的值。


    SSRS 2008 引入了两种新变量类型——报告变量和组变量——它们可以在设计时或运行时配置，并在整个报告执行和查看过程中保持静态。在本节中，你将使用一个报告变量为
    `Visit_Count` 字段创建一个阈值，以便在报告运行时，你可以计算访问次数是否达到了报告变量设定的阈值。你将在新的 SSRS 仪表控件中再次使用同一个变量。


    要配置报告变量，请进入设计模式，点击 `Report`（报告）菜单下的 `Report Properties`（报告属性），然后选择 `Variables`（变量）选项卡。你需要按
    图 6-39 所示添加报告变量。你将设置的阈值是每日平均访问次数。推导此值的方法是一个简单的计算：对唯一字段 `Trx.ServicesTblID` 进行非重复计数，然后除以一个天数范围，例如一年
    365 天。我们对 `Pro_SSRS` 数据库的计算显示，2009 年的日均访问次数为 44。因此，下一步是创建一个报告变量来保存这个阈值值。


    要设置报告变量，请从 `Pro_SSRS` 项目中打开 `EmployeeServiceCost_Variables_Start.rdl` 报告，转到 `Design`（设计）选项卡，点击
    `Report` 菜单下的 `Report Properties`，然后点击 `Variables` 选项卡。点击 `Add`（添加），输入 `Threshold`
    作为变量名，`44` 作为值，并取消选中 `Read-Only`（只读），如 图 6-39 所示。


    ![Image](img/9781430238102_Fig06-39.jpg)


    *图 6-39. 添加报告变量*


    与报告变量类似，组变量可以为一个或多个行组或列组配置。它们对于存储静态值非常有用，例如产品及其子类别或子组的不同税率。


    ### 添加仪表控件


    仪表控件是外观最吸引人的类型之一，对于专注于关键绩效指标 (KPI) 的报告非常有用。此类报告设计用于仪表板格式，以便一目了然地查看数据，正如你在 第 5
    章 中看到的那样。在本节中，我们将把上一节中创建的报告变量与这些新控件之一结合使用，在员工服务成本报告中创建一个视觉提示。该报告将显示我们所分析时间段内的每日访问次数。


    你可以通过一个非常简单的计算来确定平均访问次数：将访问次数总和除以 `ChargeServiceStartDate` 字段的非重复计数。你可以使用 `Emp_Svc_Cost_MVP`
    存储过程执行该计算。这个平均访问次数值将成为仪表控件中的两个指针之一，该控件将是多条形仪表。控件中的另一个指针将保存阈值 44。


    首先，将一个仪表控件从工具箱拖到图表右侧的报表上。确保它位于矩形内部。选择 `Multiple Bar Pointers`（多条形指针）仪表。默认情况下会有三个条形。本报告将只使用其中两个条形：`LinearPointer1`
    和 `LinearPointer2`。请右键单击最小的条形 (`LinearPointer3`) 并选择 `Delete Pointer`（删除指针）将其删除。右键单击指针
    `LinearPointer1` 并选择 `Pointer Properties`（指针属性），将表达式 `=Variables!Threshold.Value`
    分配给它。在属性窗口中，如 图 6-40 所示，分配变量表达式值。


    ![Image](img/9781430238102_Fig06-40.jpg)


    *图 6-40. 将报告变量值分配给仪表指针*


    接下来，将确定从参数中选择的时间范围内平均访问次数的表达式分配给 `LinearPointer2`。由于多值参数是查询参数，你知道报告中的数据将仅限于从 `Month`（月份）和
    `Year`（年份）参数中选择的值。如果你使用的是报告参数并随后在报告中过滤数据，情况就不会是这样。例如，知道计算平均值的天数会根据所选的 `Month`
    和 `Year` 参数值而变化，这使得计算 `LinearPointer2` 的值变得容易。你可以这样编写计算式：

    ```

    =SUM(Fields!Visit_Count.Value) / CountDistinct(Fields!ChargeServiceStartDate.Value)

    ```

    你的最后一步是为指针设置颜色编码，使得指针在值小于等于 44 时显示为红色，超过 44 时显示为绿色。右键单击 `LinearPointer2` 并选择 `Pointer
    Properties` 选项。接下来，点击 `Pointer Fill`（指针填充）选项卡。点击辅助颜色右侧的 `Expression`（表达式）按钮，输入以下表达式，然后点击
    `OK`（确定）：

    ```

    =IIF(Sum(Fields!Visit_Count.Value) / CountDistinct(DAY(Fields!ChargeServiceStartDate.Value)
    &

    YEAR(Fields!ChargeServiceStartDate.Value)) < Variables!Threshold.Value, "Red",
    "Green")

    ```

    图 6-41 中报告的最终视图选择了 `ServiceYear` 参数值为 2009 和 2010。你可以看到，对于所选的年份和月份值，阈值已经达到。在 `Pro_SSRS`
    项目中，包含所有最终调整的完整报告名为 `EmployeeServiceCost_Variables.rdl`。


    ![Image](img/9781430238102_Fig06-41.jpg)


    *图 6-41. 包含仪表控件的报告最终视图*

