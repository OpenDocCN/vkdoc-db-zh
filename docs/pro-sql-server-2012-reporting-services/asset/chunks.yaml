  trans: '

    # 在 Microsoft SharePoint 2010 中整合 SSRS


    SSRS 和 SharePoint 技术都经历了相似的进展与成熟。两者在全球范围内都获得了企业日益增长的接纳与支持。因此，这两种技术最终结合成为 Microsoft
    过去几年构建的整体**商业智能**平台的组成部分，是一个自然的演进过程。早期 SharePoint 对 SSRS 的支持包括可为 SharePoint 安装的
    SSRS Web 部件。这些 Web 部件提供了一种在 SharePoint 内查看已发布 SSRS 报告的手段。然而，这种结合并不像许多管理员和仪表盘设计师所期望的那样紧密。报告的管理仍然主要由
    DBA 或报告内容管理员负责。`SQL Server 2005 Service Pack 2` 包含了对完全集成的 SSRS 和 SharePoint 基础设施的支持，使得报告可以在
    SharePoint 内发布、管理和查看。`SSRS 2008` 和 `2008 R2` 延续了这种融合，许多组织已经采用了这种方法论，而不是采用不直接与
    SharePoint 集成的纯原生 SSRS。


    这引出了 `SharePoint 2010` 和 `SQL Server 2012 Reporting Services`。尽管在将 Reporting Services
    与 SharePoint 集成方面与之前的版本相似，但其安装和配置过程却大不相同。在 Reporting Services 的最新版本中，如果您希望以 `SharePoint
    集成模式`运行，则需要先安装 SharePoint，然后以 SharePoint 集成模式安装 Reporting Services。这个过程实质上是在 `SharePoint
    2010` 之上安装 Reporting Services。此过程与之前的版本不同，因为之前 SSRS 和 SharePoint 是独立的实体，可以使用配置工具进行集成。


    在本节中，您将逐步完成 SharePoint 和 SSRS 的独立安装，并将上一节的两个报告 `Average Time to Admission` 和 `Referral
    to Admission Chart` 部署到 SharePoint 站点并查看：


    1.  首先，您将在同一台服务器上安装带有 `Service Pack 1` 的 `Microsoft SharePoint 2010` 和 `SSRS 2012`。

    2.  接下来，您将报告部署到具有 `SharePoint 2010` 的 SSRS 集成服务器。

    3.  最后，您将使用 `SSRS Web 部件` 创建一个简单的仪表盘。


    ## 在独立服务器上安装 SharePoint 2010 和 SQL Server 2012


    `SQL Server 2012` 的安装程序多年来已得到极大改进。具体来说，对于 SSRS，您保留了安装核心程序集的能力，但可以在之后配置 SSRS 实例。然而，在
    `SSRS 2012` 中，如果您计划同时部署 SSRS 和 SharePoint，则可以直接以 SharePoint 集成模式安装 SSRS。对于我们的安装，我们选择在同一台服务器（称为独立安装）上安装
    `SSRS 2012` 和 `SharePoint 2010`。对于任何想熟悉这两种技术如何协同工作的人来说，这是推荐的设置。其他部署场景，例如多服务器安装，在更大的环境中也是可能且预期的，但我们最初选择独立部署纯粹是为了测试和培训。我们建议任何不熟悉集成
    SSRS 和 SharePoint 安装的人都走这条路径。


    ![Image](img/square.jpg) **注意** 与大多数基于服务器的软件一样，`SharePoint 2010` 和 `SQL Server
    2012` 有一些必须在成功安装前满足的先决条件。这些要求可能会随时间变化，因此在开始安装软件之前，最好始终验证先决条件。例如，`SharePoint 2010`
    需要安装在基于服务器的操作系统上，如 `Windows Server 2008`。它还需要安装 `Service Pack 1`，至少 `4GB` 内存和
    `80 GB` 磁盘空间。服务器必须配置为域控制器。这些只是部分要求，您可以在 [`http://technet.microsoft.com/en-us/library/cc262485.aspx`](http://technet.microsoft.com/en-us/library/cc262485.aspx)
    查看更多 SharePoint 要求，在 [`http://msdn.microsoft.com/en-us/library/gg492276(v=sql.110).aspx`](http://msdn.microsoft.com/en-us/library/gg492276(v=sql.110).aspx)
    查看 SQL Server Reporting Services 要求。


    假设所有先决条件、软件和硬件要求都已满足，那么完成 SSRS 和 SharePoint 的独立安装有六个主要步骤：


    1.  安装带有 `Service Pack 1` 的 `SharePoint 2010`。

    2.  以 SharePoint 模式安装 `SQL Server 2012` 数据库引擎和 Reporting Services。

    3.  配置 `SharePoint 2010`。

    4.  安装并启动 `Reporting Services SharePoint 服务`。

    5.  在 `SharePoint 管理中心` 创建一个 `Reporting Services 服务应用程序`。

    6.  配置与 SharePoint 的 `Reporting Services 集成`。


    ### 安装 SharePoint 2010


    我们将首先引导您完成带有 `Service Pack 1` 的 `SharePoint 2010` 的安装。安装 `SharePoint 2010` 是一个简单的过程，除了最后一步，安装向导会询问您是否要
    `运行配置向导` (图 12-12)。此选项按钮默认是选中的，但对于 SharePoint 集成模式下的 Reporting Services，您稍后会进行配置。您将在安装
    `SQL Server 2012` 数据库引擎实例之后再配置 SharePoint。取消选中该复选框并点击 `关闭` 以完成 `SharePoint 2010`
    安装。


    ![Image](img/9781430238102_Fig12-12.jpg)


    ***图 12-12.** 安装 `SharePoint 2010`*


    ### 在 SharePoint 模式下安装 SQL Server 2012 Reporting Services


    现在 `SharePoint 2010` 已安装，是时候为 SharePoint 安装数据库引擎和 Reporting Services 了。带有 SSRS
    的 `SQL Server 2012` 安装是一个您可能已经熟悉的标准过程。详细介绍安装的每一步超出了本书的范围；但是，典型安装与包含集成 SharePoint
    支持的安装之间的唯一区别可以在 `功能选择` 和 `Reporting Services 配置` 屏幕上看到。请继续选择 图 12-13 中所示的选项。


    由于这是在本地虚拟机上进行，而不是在传统的企业网络上，我选择在此虚拟机上也安装 `Analysis Services`。这样，我可以复制 `Pro_SSRS`
    项目，并将 `Patient Referral Analysis Services` 数据库（多维数据集）部署到同一台虚拟机上，用于本章的剩余示例。


    ![Image](img/square.jpg) **注意** 如果您也在专用虚拟机上执行 `SharePoint 2010` 安装，您还需要将您的 `Pro_SSRS`
    项目复制到虚拟机，并如本章前面讨论的那样部署多维数据集。


    ![Image](img/9781430238102_Fig12-13.jpg)


    ***图 12-13.** 为 SharePoint 安装 SSRS*


    如 图 12-14 所示，您唯一的选项是 `Reporting Services SharePoint 集成模式 – 仅安装`。在 `仅安装` 单选按钮下方的注释中，您可以看到一条消息，说明您需要使用
    `管理中心` 配置 SharePoint 来完成安装。它还说明您需要启动 `Reporting Services` 服务并创建一个 `Reporting Services`
    服务应用程序（前面列表中的安装步骤 4 和 5）。现在，您将安装 `Reporting Services SharePoint 服务`。


    ![Image](img/9781430238102_Fig12-14.jpg)


    ***图 12-14.** 在 SharePoint 集成模式下安装 SSRS*

