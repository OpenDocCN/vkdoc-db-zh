  trans: '

    ## 获取用户反馈


    在本书的这一阶段，你已经构建了一个名为 `Employee Service Cost` 的报表，该报表在多个层级上分解了医疗就诊的成本。你使用 `BIDS`
    设计了此报表，它包含多个分组级别、交互式排序和向下钻取功能。该报表的数据集是一个存储过程，它从 `Pro_SSRS` 数据库的多个表中提供所需字段。就像你将使用
    `Report Builder 1.0` 构建的报表一样，这个存储过程和报表是基于需要它的用户的反馈创建的。创建存储过程的一个目标是，不仅要使其满足一个报表的需求，还要使其具有足够的通用性，以便能够重用于其他类似报表。在展示如何构建报表模型以满足用户以及将使用
    `Report Builder 1.0` 创建和发布报表的报表设计者的需求时，我们将讨论这个问题。


    在医疗保健行业（即，诸如家庭保健和临终关怀等急性期后护理领域），你必须遵循许多针对州和联邦机构的报告要求。从成本报告到患者入院和出院信息，不同部门因不同原因需要不同的报表。每个部门都使用的一组报表是患者普查报表。该报表显示了当前入住医疗保健机构并正在接受服务的所有患者。该报表可以简单到按字母顺序排列的患者姓名列表，也可以详细到每位患者的所有人口统计信息，例如他们的居住地以及紧急情况下的联系人。


    由于患者普查报表是最常被请求定制的报表，我们将在本章中将其用作报表模型的示例，确保我们提供足够的数据以满足当前和未来的需求。


    对于患者普查报表示例，假设用户要求查看每日入住该机构的患者总数。这类患者都有一些在查看普查数据时很重要的共有数据关联。这些信息回答了这类问题：


    *   患者的主要诊断是什么？

    *   患者当前入住的是哪个分院？

    *   患者在机构内的住院时长是多少？

    *   目前每个分院有多少活跃患者？

    *   患者的地址、电话号码和其他关键人口统计信息是什么？（这种类型的普查报表，通常被称为“脸谱表”，会在紧凑的位置显示大量关于患者的信息。）

    *   如果患者已出院，何时发生的以及原因是什么？是因为他们康复了，还是转院了？


    ![Image](img/square.jpg) `注意` 我们在本章讨论的信息类型被认为是受保护的健康信息（PHI），根据 `HIPAA`，这些信息需要严格保护，并且只能由获准使用的人员访问。第
    11 章 涵盖了如何保护通过 `SSRS` 交付的数据的访问安全。


    你可以通过单个查询来回答所有这些问题甚至更多，这可以构成报表模型的基础。因此，在 `Pro_SSRS_2008R2` 数据库中，你将把几个表连接成一个数据源视图，以提供交付患者普查所需的信息。在开发其他报表时，你已经使用了这些表中的大部分，但在展示如何构建报表模型之前，我们将先回顾一下相关表的数据库模式。这些是你在本章示例中将使用的表：


    *   `Admissions`

    *   `Branch`

    *   `Diag`

    *   `Discipline`

    *   `Documentlmage`

    *   `PatEMRDoc`

    *   `Employee`

    *   `PatDiag`

    *   `Dischg`

    *   `Patient`


    每个表都包含与个体患者入院历史相关的具体信息，它们共同提供了足够的数据，可以为医疗机构内的许多部门创建多种普查报表。你知道需要回答的问题类型，而这些表的设计就是为了基于用户的直接反馈和请求来提供这些信息。现在，让我们继续设计查询并构建报表模型。


    ## 报表模型简介


    仅仅因为你不懂得如何将汽车引擎的所有部件组装在一起的复杂性，并不意味着你不能开车，对吧？对于将使用即席式 `Report Builder 1.0` 来设计和发布报表的报表设计者来说，情况也是如此。在这种情况下，为了构建报表，你几乎不需要了解数据库结构的各个部分。不过，*某个人*必须理解数据库模式是不可避免的，就像机械师必须理解刹车片和风扇皮带一样。构建一个通用的报表模型（报表设计者将使用它来创建报表）很可能属于
    `DBA`、数据分析师或 `SQL` 开发人员的职责范围，他们对数据源有深入的了解。在本节中，我们将展示如何利用从报表使用者那里收集的反馈，为患者普查报表开发一个报表模型，该模型旨在通过逻辑且直观的字段名称使数据易于访问。


    你将执行以下步骤来为患者普查报表模型创建报表模型：


    1.  使用 `BIDS/SSDT` 创建报表模型项目。

    2.  创建数据源。

    3.  创建数据源视图。

    4.  基于数据源视图创建患者普查报表模型。

    5.  将患者普查报表模型发布到 `SSRS` 服务器。


    构建报表模型的过程包含许多单独的步骤，其中许多步骤只需通过向导逐步操作即可完全控制。报表模型可以是复杂的，也可以是简单的，这取决于你的个人需求。为了简洁起见，我们将尽可能保持示例模型的简单性；你将能够回答患者普查的反馈问题，并且你将能够毫无问题地创建和发布你自己的报表模型。

    '
- fmt: '# Create a Report Model using BIDS 2008 R2


    In this section, you will create a report model project using `BIDS 2008 R2`.
    A completed version of this project is included in the `Source Code/Download`
    area for the book on the Apress Web site ([`www.apress.com`](http://www.apress.com)).
    When you open the solution, you will notice an already created report model called
    `Patient Census Book`. If you would like to publish the `Patient Census Book`
    report model as it is in the project to your `SSRS` server and begin working with
    the client-side `Report Builder 1.0` application, just be sure to set the data
    source settings and deploy appropriately. In that case, just skip to the “Creating
    Reports with Report Builder 1.0” section. To follow the steps to create each piece
    of a report model using Business Intelligence Development Studio for `SQL Server
    2008 R2`, from adding data sources and data source views to publishing the completed
    model, read on.


    Open up `BIDS` on a machine that has `BIDS` installed for a `SQL Server 2008 R2`
    installation. You will find `BIDS` by clicking on the Windows Start button, All
    Programs, `SQL Server 2008 R2`, and then `SQL Server Business Intelligence Development
    Studio`. Once `BIDS` is started, click on `Project…` next to the “Create:” label.
    As you can see in [Figure 13-1](#Chapter13.html#fig_13_1), you can use several
    available project templates. Choose the `Report Model Project` template, name
    it `Patient Census`, add the appropriate location (in this case `C:\Pro_SSRS Project_2008R2\`),
    and click OK.


    ![Image](images/9781430238102_Fig13-01.jpg)


    **Figure 13-1.** Creating a new report model project


    A report model project has three main components: data sources, data source views,
    and report models, each one relying on the previous one. In other words, a data
    source view requires a data source, just as a report model requires a data source
    view. If you have successfully created the `Patient Census` report model project,
    you will see these three components, as shown in [Figure 13-2](#Chapter13.html#fig_13_2).


    ![Image](images/9781430238102_Fig13-02.jpg)


    **Figure 13-2.** Viewing the new `Patient Census` report model


    ## Adding a Data Source


    Logically, the first step is to create a data source. Before we can create a data
    source connecting to our `SQL Server 2008 R2` machine, you will need to restore
    the `Pro_SSRS_2008R2` database, as described in the `ReadMe.txt` file available
    in the `Source Code/Download` area for the book on the Apress Web site ([`www.apress.com`](http://www.apress.com)).
    After you have the `Pro_SSRS_2008R2` database set up, we need to create a data
    source for our model. Right-click the `Data Sources` folder in the `Solution Explorer`
    and select `New Data Source` under the `Add` menu. This brings up the `Data Source
    Wizard` to create a data source for a report model. [Figure 13-3](#Chapter13.html#fig_13_3)
    shows the first page of the `Data Source Wizard`. Fortunately, you can select
    to not display the first page every time you open the wizard by checking `Don’t
    Show This Page Again`.


    ![Image](images/9781430238102_Fig13-03.jpg)


    **Figure 13-3.** Using the `Data Source Wizard`


    You have two options when creating a data source through the wizard, as shown
    in [Figure 13-4](#Chapter13.html#fig_13_4). You can either create a new one based
    on an existing or a new connection, or you can create a data source based on another
    object such as a data source already defined in another project. For this example,
    choose to create a new data source based on a new connection, and click `New`
    to open the `Connection Manager`.


    ![Image](images/9781430238102_Fig13-04.jpg)


    **Figure 13-4.** Defining a connection


    In the `Connection Manager`, select `localhost` as the server name, leave the
    `Use Windows Authentication` button checked, and change the database name to `Pro_SSRS_2008R2`,
    as shown in [Figure 13-5](#Chapter13.html#fig_13_5). Click `OK` to save the settings
    and return to the `Data Source Wizard`. Click `Next` or `Finish` to proceed to
    the final screen of the wizard, leave the default data source name of `Pro SSRS
    2008R2`, and click `Finish` to create the data source.


    ![Image](images/9781430238102_Fig13-05.jpg)


    **Figure 13-5.** Setting the server name and database


    ![Image](images/square.jpg) **Note** The `Pro_SSRS_2008R2` database is a version
    of the `Pro_SSRS` database that we have been using throughout the book. However,
    since Report Models have been deprecated in `SQL Server 2012`, we created a `2008
    R2` version of the database with limited objects. The `Pro_SSRS_2008R2` database
    and script can be found as part of the `Source Code/Download` area for the book
    on the Apress Web site ([`www.apress.com`](http://www.apress.com)). For more details
    on this database, be sure to read the `ReadMe.txt` file found in the `Source Code/Download`
    file.'
