- fmt: '### Running the Application


    现在让我们运行这个例子。启动项目，当表单显示时，在 Server 文本框中输入你的报表服务器名称，然后点击 Go。例子中使用了 Localhost；如果你的服务器名称不同，请使用你的服务器名称。你的表单现在看起来类似于
    [图 8-14](#Chapter08.html#fig_8_14)，你的 SSRS 2012 服务器上的文件夹被显示出来，并且 Root 文件夹被高亮。


    ![Image](images/9781430238102_Fig08-15.jpg)


    ***Figure 8-15.** 完整的报表发布器，显示 SSRS 服务器上的文件夹*


    ![Image](images/square.jpg) **注意** 在上传 [第 8 章](#Chapter08.html#ch8) 示例代码中包含的示例报表之前，你需要部署共享数据源。该报表使用了此共享数据源，并会提示无法发布报表，因为它无法在
    SSRS 2012 服务器上找到共享数据源。另请注意，本章中的共享数据源位于本地的 [第 8 章](#Chapter08.html#ch8) 文件夹中，而不是我们一直在使用的
    Pro_SSRS 文件夹。我们这样做是因为，当使用 SSRS Publisher 上传报表时，只有共享数据源与你部署报表的目标文件夹相同时，它才会建立到共享数据源
    `Pro_SSRS` 的连接。


    默认情况下，服务器上的 Root 文件夹已被选中。向下 drill 并选择 `TreeView` 中的 `Pro_SSRS` 节点。选择要使用的文件夹后，点击
    Open，然后选择 [第 8 章](#Chapter08.html#ch8) 示例代码中包含的 `EmployeeServiceCost.rdl` 文件。当你点击
    Open 时，你的报表发布应用程序会使用 Report Server Web 服务的 `CreateCatalogItem` 方法，并将报表发布到选定的服务器。


    在这种情况下，选择了 localhost 服务器上的 `Pro_SSRS` 文件夹，我们正在上传一个名为 `EmployeeServiceCost.rdl`
    的报表。如果你用 Web 浏览器导航到该文件夹，你会看到与 [图 8-16](#Chapter08.html#fig_8_16) 所示屏幕类似的内容。


    ![Image](images/9781430238102_Fig08-16.jpg)


    ***Figure 8-16.** Report Manager 显示已上传的报表*


    现在你有了一个 Windows Forms 应用程序，它允许将文件上传到你的报表服务器。这是一种便捷的方式，可以在应用程序内部增加上传或更新报表的功能，而无需用户直接与
    SSRS 2012 Report Manager 交互。


    如果你希望用户从你的应用程序内部与 SSRS 2010 的所有方面进行交互，这可能尤其有用。在 [第 5 章](#Chapter05.html#ch5) 中，你开发了一个允许用户在应用程序内部显示报表的应用程序。通过将该应用程序与此报表发布器结合，你可以直接从你的应用程序处理许多非管理任务。你还可以通过为用户提供一些额外的选项来扩展此示例：


    > *   你可以允许用户创建共享数据源。

    > *   你可以允许用户输入要发布的报表名称，而不是从 RDL 文件本身获取名称。例如，你可以向表单添加另一个文本框并从中读取报表标题。所以，不是使用以下代码：


    ```

    // We are going to use the name of the RDL file

    // as the name of our report string

     reportName =

    Path.GetFileNameWithoutExtension(openFileDialog.FileName);

    ```


    > 你可以这样做：


    ```

    // We are going to read the contents of textbox reportTitle

    // as the name of our report

    string reportName = reportTitle.text

    ```


    > *   你可以允许用户设置报表的其他属性，例如添加一个在 Report Manager 详细列表视图中显示的说明。例如，你可以添加一个 Description
    属性：


    ```

    Property[]  itemProps = new Property[1];

    Property itemProp = new Property();

    itemProp.Name = "Description";

    itemProp.Value = "Employee Service Cost by Patient";

    itemProps[0] = itemProp;

    ```


    > *   然后，你可以将调用 `CreateReport` 的代码从以下内容：


    ```

    rs.CreateCatalogItem("Report", reportName, pathName, true, definition, null, out
    warnings);

    ```


    更改为以下代码：


    ```

    rs.CreateCatalogItem("Report", reportName, pathName, true, definition, itemProps,
    out

     warnings);

    ```


    使用 Report Server Web 服务，几乎没有你做不到的事情。有关可以为报表设置的其他属性的更多详细信息，或要了解有关 SOAP API 的更多信息，请参阅
    SQL Server 2012 Books Online。我们将在下一章更深入地研究 Web 服务。


    ### Summary


    在本章中，我们讨论并演示了如何使用 Report Builder 3.0 实用程序、`rs.exe` 应用程序和 BIDS/Visual Studio 将报表部署到你的
    SSRS 2012 服务器。此外，你通过 Report Server Web 服务使用了 SOAP API 来列出所选服务器上的文件夹，然后允许用户选择一个
    RDL 文件，并使用 Visual Studio C# Windows 应用程序和 `rs.exe` 实用程序将其上传到所选报表服务器上的用户指定文件夹。我们还研究了一些额外的功能，这些功能可以通过使用
    SSRS 2012 Web 服务公开的众多方法和属性中的一部分来为应用程序提供。


    ## C H A P T E R 9'
  raw: '### Running the Application


    Now let’s run the example. Start the project and, when the form displays, enter
    the name of your report server in the Server textbox and click Go. Localhost was
    used in the example; use the name of your server if it is different. Your form
    now looks similar to [Figure 8-14](#Chapter08.html#fig_8_14), with the folders
    on your SSRS 2012 server displayed and the Root folder highlighted.


    ![Image](images/9781430238102_Fig08-15.jpg)


    ***Figure 8-15.** Complete report publisher showing folders on SSRS server*


    ![Image](images/square.jpg) **Note** You need to deploy the shared data source
    from the [Chapter 8](#Chapter08.html#ch8) sample code prior to uploading the sample
    report included in [Chapter 8](#Chapter08.html#ch8). The report uses this shared
    data source and will tell you that it could not publish the report because it
    can''t find the shared data source on the SSRS 2012 server. Also note that the
    shared data source in this chapter is in the local [Chapter 8](#Chapter08.html#ch8)
    folder instead of the Pro_SSRS folder we have been using. We did this because,
    when uploading the report using the SSRS Publisher, it will make the connection
    to the shared data source Pro_SSRS only if it resides in the same folder as you
    deploy the report to.


    By default, the Root folder on your server has been selected. Drill down and select
    the Pro_SSRS node in the TreeView. After you’ve selected the folder to use, click
    Open, and select the report in the EmployeeServiceCost.rdl file included in the
    [Chapter 8](#Chapter08.html#ch8) sample code. When you click Open, your report
    publishing application uses the Report Server Web services `CreateCatalogItem`
    method and publishes the report to the selected server.


    In this case, the Pro_SSRS folder on the localhost server has been selected, and
    we’re uploading a report called EmployeeServiceCost.rdl. If you navigate to that
    folder with your Web browser, you’ll see something similar to the screen shown
    in [Figure 8-16](#Chapter08.html#fig_8_16).


    ![Image](images/9781430238102_Fig08-16.jpg)


    ***Figure 8-16.** Report Manager showing uploaded report*


    You now have a Windows Forms application that allows files to be uploaded to your
    report server. This can be a handy way to add the capability to upload or update
    reports from within an application without needing the user to interact with the
    SSRS 2012 Report Manager directly.


    This can be especially useful if you want users to interact with all aspects of
    SSRS 2010 from within your application. In [Chapter 5](#Chapter05.html#ch5), you
    developed an application that allows users to display reports from within the
    application. By combining that application with this report publisher, you can
    handle a number of non-administrative tasks directly from your application. You
    also could expand on this example by providing the user with some additional options:


    > *   You could allow the user to create shared data sources.

    > *   You could allow the user to enter the name of the report to publish instead
    of taking the name from the RDL file itself. For example, you could add another
    textbox to the form and read it for the report title. So, instead of the following
    code:


    `// We are going to use the name of the RDL file // as the name of our report
    string`![Image](images/U002.jpg)

    ` reportName =`

    `Path.GetFileNameWithoutExtension(openFileDialog.FileName);`


    > you could do the following:


    `// We are going to read the contents of textbox reportTitle`

    `// as the name of our report`

    `string reportName = reportTitle.text`


    > *   You could allow the user to set other properties of the report, such as
    adding a description that will be displayed in Report Manager in the detailed
    list view. For example, you could add a Description property:


    `Property[]  itemProps = new Property[1];`

    `Property itemProp = new Property();`

    `itemProp.Name = "Description";`

    `itemProp.Value = "Employee Service Cost by Patient";`

    `itemProps[0] = itemProp;`


    > *   You could then change your call to CreateReport from the following code:


    `rs.CreateCatalogItem("Report", reportName, pathName, true, definition, null,
    out warnings);`


    to the following code instead:


    `rs.CreateCatalogItem("Report", reportName, pathName, true, definition, itemProps,
    out`![Image](images/U002.jpg)

    ` warnings);`


    With Report Server Web service, there isn’t much you can’t do. For more details
    on additional properties that you can set on reports or to find out more about
    the SOAP API, see the SQL Server 2012 Books Online. We will be diving into the
    web service even more in the next chapter.


    ### Summary


    In this chapter, we discussed and demonstrated how to use the Report Builder 3.0
    utility, the rs.exe application, and BIDS/Visual Studio to deploy reports to your
    SSRS 2012 server. Additionally, you used the SOAP APIs through the Report Server
    Web service to list the folders on the selected server and then allowed the user
    to select an RDL file and upload it to the user-specified folder on the selected
    report server using both a Visual Studio C# windows application and the rs.exe
    utility. We also examined some of the additional features you could provide the
    application by using a few of the many methods and properties exposed by the SSRS
    2012 Web service.


    ## C H A P T E R  9'
  trans: '

    ### 运行应用程序


    现在让我们来运行这个示例。启动项目，当表单显示时，在“服务器”文本框中输入你的报表服务器名称，然后点击“执行”。本例中使用 Localhost；如果你的服务器名称不同，请使用你的服务器名称。你的表单现在看起来类似于
    图 8-14，你的 SSRS 2012 服务器上的文件夹列表会被显示出来，并且 Root 文件夹被高亮。


    ![Image](img/9781430238102_Fig08-15.jpg)


    ***图 8-15.** 完整的报表发布器，显示 SSRS 服务器上的文件夹*


    ![Image](img/square.jpg) **注意** 在上传 第 8 章 示例代码中包含的示例报表之前，你需要部署共享数据源。该报表使用了此共享数据源，并会提示无法发布报表，因为它无法在
    SSRS 2012 服务器上找到共享数据源。另请注意，本章中的共享数据源位于本地的 第 8 章 文件夹中，而不是我们一直在使用的 Pro_SSRS 文件夹。我们这样做是因为，当使用
    SSRS Publisher 上传报表时，只有共享数据源与你部署报表的目标文件夹相同时，它才会建立到共享数据源 `Pro_SSRS` 的连接。


    默认情况下，服务器上的 Root 文件夹已被选中。向下钻取并选择 `TreeView` 中的 `Pro_SSRS` 节点。选择要使用的文件夹后，点击“打开”，然后选择
    第 8 章 示例代码中包含的 `EmployeeServiceCost.rdl` 文件。当你点击“打开”时，你的报表发布应用程序会使用 Report Server
    Web 服务的 `CreateCatalogItem` 方法，并将报表发布到选定的服务器。


    在这种情况下，选择了 localhost 服务器上的 `Pro_SSRS` 文件夹，我们正在上传一个名为 `EmployeeServiceCost.rdl`
    的报表。如果你用 Web 浏览器导航到该文件夹，你会看到与 图 8-16 所示屏幕类似的内容。


    ![Image](img/9781430238102_Fig08-16.jpg)


    ***图 8-16.** Report Manager 显示已上传的报表*


    现在你有了一个 Windows Forms 应用程序，它允许将文件上传到你的报表服务器。这是一种便捷的方式，可以在应用程序内部增加上传或更新报表的功能，而无需用户直接与
    SSRS 2012 Report Manager 交互。


    如果你希望用户从你的应用程序内部与 SSRS 2010 的所有方面进行交互，这可能尤其有用。在 第 5 章 中，你开发了一个允许用户在应用程序内部显示报表的应用程序。通过将该应用程序与此报表发布器结合，你可以直接从你的应用程序处理许多非管理任务。你还可以通过为用户提供一些额外的选项来扩展此示例：


    > *   你可以允许用户创建共享数据源。

    > *   你可以允许用户输入要发布的报表名称，而不是从 RDL 文件本身获取名称。例如，你可以向表单添加另一个文本框并从中读取报表标题。所以，不是使用以下代码：


    ```

    // 我们将使用 RDL 文件的名称作为报表名称

    string reportName = Path.GetFileNameWithoutExtension(openFileDialog.FileName);

    ```


    > 你可以这样做：


    ```

    // 我们将读取文本框 reportTitle 的内容作为报表名称

    string reportName = reportTitle.text;

    ```


    > *   你可以允许用户设置报表的其他属性，例如添加一个在 Report Manager 详细列表视图中显示的说明。例如，你可以添加一个 Description
    属性：


    ```

    Property[] itemProps = new Property[1];

    Property itemProp = new Property();

    itemProp.Name = "Description";

    itemProp.Value = "按患者划分的员工服务成本";

    itemProps[0] = itemProp;

    ```


    > *   然后，你可以将调用 `CreateReport` 的代码从以下内容：


    ```

    rs.CreateCatalogItem("Report", reportName, pathName, true, definition, null, out
    warnings);

    ```


    更改为以下代码：


    ```

    rs.CreateCatalogItem("Report", reportName, pathName, true, definition, itemProps,
    out warnings);

    ```


    使用 Report Server Web 服务，几乎没有你做不到的事情。有关可以为报表设置的其他属性的更多详细信息，或要了解有关 SOAP API 的更多信息，请参阅
    SQL Server 2012 Books Online。我们将在下一章更深入地研究 Web 服务。


    ### 总结


    在本章中，我们讨论并演示了如何使用 Report Builder 3.0 实用程序、`rs.exe` 应用程序和 BIDS/Visual Studio 将报表部署到你的
    SSRS 2012 服务器。此外，你通过 Report Server Web 服务使用了 SOAP API 来列出所选服务器上的文件夹，然后允许用户选择一个
    RDL 文件，并使用 Visual Studio C# Windows 应用程序和 `rs.exe` 实用程序将其上传到所选报表服务器上的用户指定文件夹。我们还研究了一些额外的功能，这些功能可以通过使用
    SSRS 2012 Web 服务公开的众多方法和属性中的一部分来为应用程序提供。


    ## 第 9 章

