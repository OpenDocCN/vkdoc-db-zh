    \n你将使用刚刚注册的 Web 服务来检索 `Chapter_9` 目录中的所有报表项。你将用来执行此操作的 Web 服务方法是 `ListChildren`。此函数接受两个参数：从中收集列表的路径，以及一个用于确定搜索是否应为递归的布尔值。由于你只想从\
    \ `Chapter_9` 文件夹获取报表，而不包括其他内容，因此你只需传递该路径和一个 `false` 值，以仅获取此单个目录中的报表。\n\n你希望仅用报表项填充下拉列表。然而，`ListChildren`\
    \ 将返回此文件夹中的所有项，而不仅仅是报表。你将使用 `TypeName` 属性来确定返回对象的类型，并仅列出报表。一旦测试了某项是否为报表，你将使用报表的名称填充下拉列表。执行所有这些操作的代码存在于页面的\
    \ `Page_load` 方法中，因此在页面加载完成后，你将立即拥有一个完整的下拉列表。清单 9-15 展示了用于通过 Web 服务填充下拉列表的代码。\n\
    \n### 清单 9-15. 使用 SSRS Web 服务填充报表列表\n\n```csharp\nSSRS_WebService.ReportingService2010\
    \ rs = null;\n\nprotected void Page_Load(object sender, EventArgs e)\n{\n    try\n\
    \    {\n        rs = new SSRS_WebService.ReportingService2010();\n        rs.Credentials\
    \ = System.Net.CredentialCache.DefaultCredentials;\n\n        SSRS_WebService.CatalogItem[]\
