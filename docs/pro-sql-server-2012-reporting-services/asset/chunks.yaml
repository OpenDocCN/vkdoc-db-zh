  trans: '## 添加 URL 链接


    URL 链接将报表连接到存储在其他位置（如 Microsoft SharePoint 站点或互联网）的信息。与书签链接类似，URL 链接在“操作”选项卡上定义，并可应用于多个报表项。正如第
    4 章中所讨论的，在 SSRS 中使用的几乎每个值字段中，内容都由表达式定义。对于 URL，你将构建一个表达式来定义 HTTP 位置，该表达式结合了字面 URL
    和数据集中的字段值。


    例如，假设你的内联网站点有一个专门为每个员工专业设计的主页。家庭健康助理员工的`DisciplineID`可能为`HHA`，而你为家庭健康助理设计的网站位于[`http://webserver1/hha`](http://webserver1/hha)。假设每个专业的情况都相同，那么为报表中的每个专业添加
    URL 链接将非常容易。


    就像你为`Employee_Name`创建书签链接一样，打开`Discipline`字段的“操作”选项卡。选择“转到 URL”，并添加以下表达式：


    ```

    ="http://webserver1/" & Fields!DisciplineID.Value

    ```


    当在报表中选择`DisciplineID`字段时，浏览器将打开并连接到该特定员工专业对应的站点——例如，家庭健康助理站点为`HHA`，熟练护理站点为`RN`。


    ## 使用报表参数构建 URL 链接


    将这个概念再推进一步，如果你在不同的地点或分支有多个 Web 服务器，你不会希望在 URL 字符串中硬编码 Web 服务器名称。使用报表参数根据分支位置选择服务器名称，将可以控制你在前一个示例中创建的
    URL 字符串的 Web 服务器部分。让我们逐步完成此过程。图 6-18 展示了“报表参数属性”对话框应有的样子。


    ![Image](img/9781430238102_Fig06-18.jpg)


    **图 6-18.** 报表参数属性对话框


    请遵循以下步骤：


    1.  在“设计”选项卡上，右键单击“报表数据”窗格中的“参数”文件夹，然后选择“添加参数”。

    2.  为参数名称输入`Branch_URL`。

    3.  为提示输入`My Branch`。

    4.  在“可用值”部分，输入以下标签/值：`Branch1` = `BrianMcDonaldServer`，`Branch2` = `ShawnMcGeeheeServer`，`Branch3`
    = `RodneyLandrumServer`。

    5.  将默认值设置为`BrianMcDonaldServer`。

    6.  返回到`Discipline`字段的“操作”选项卡，应用新的表达式`="http://" & Parameters!Branch_URL.Value
    & "/" & Fields!DisciplineID.Value`。

    7.  预览报表。注意，你现在有一个名为`My Branch`的新参数下拉列表，它根据默认值`BrianMcDonaldServer`被设置为`Branch1`。


    将 URL 位置分配为参数`Branch_URL`的值后，每当从下拉列表中选择不同的分支时，将选择该分支对应的适当服务器。


    ## 跳转到报表


    在 SSRS 中，最有用的超链接操作或许是从当前报表中的指定位置链接到另一个报表，这称为*钻取报告*。在本节中，你将从“员工列表”报表链接到一个新的报表——“患者调查信函”报告。“患者调查信函”报表使用单个文本框，并演示了如何利用
    SSRS 2008 提供的新富文本格式，通过 HTML 格式和字面文本字符串（它们都独立格式化）来形成邮件合并风格的报表。


    你将通过创建从一个报表到另一个报表的超链接，将这两个报表——“员工列表”报表和“患者调查信函”报表——联系起来。你还将随超链接传递一个参数值，以便在从“员工列表”报表调用“患者调查信函”报表时缩小其结果范围。参数值将为`PatID`、`ServiceMonth`和`ServiceYear`。


    要添加链接到“患者调查信函”报表的超链接操作，请返回到“操作”选项卡，这次是从“员工列表”报表中的`Patient Name`明细行文本框进入。`Patient
    Name`明细文本框位于第二个表格中，如图 6-19 所示。


    ![Image](img/9781430238102_Fig06-19.jpg)


    **图 6-19.** 用于添加“转到报告”超链接操作的患者姓名明细文本框


    点击“转到报告”按钮后，会出现一个下拉列表，其中包含当前解决方案中所有可用的报表。如果报表已部署到报表服务器但不在当前解决方案中，你可以使用项目中定义的基于目标服务器的相对路径。在此示例中，目标服务器是[`http://localhost/reportserver`](http://localhost/reportserver)。你可以将相对路径添加到报表服务器上的任何报表。在此情况下，选择`PatientSurveyLetter.rdl`报表，然后单击“添加”按钮三次，以添加`PatID`、`ServiceMonth`和`ServiceYear`。选择报表被选中时填充的参数。稍后在“使用存储过程设置报表参数”一节中，我们将展示如何向报表添加这些参数。选择`PatID`作为参数，并将其值赋值为`=Fields!PatID.Value`，这是“员工列表”报表中一个与`PatID`参数具有对应值的字段。接下来，分别为`ServiceMonth`创建表达式`=MONTH(Fields!ChargeServiceStartDate.Value)`，为`ServiceYear`创建表达式`=YEAR(Fields!ChargeServiceStartDate.Value)`。应用新的操作后，如果在预览“员工列表”报表时点击`Patient
    Name`文本框，将会调用“患者调查信函”报表并传递参数，从而将该报表的数据集缩小到仅所选患者的数据。


    对于“患者调查信函”报表，你将使用`Emp_Svc_Cost`存储过程的一个修改版本，该版本包含`PatID`字段的参数。这样做的原因是`Textbox`控件不支持筛选条件，而你需要将信件限制为一名患者，因为它只与一个参数关联。对于合并信件，当然可以使用多名患者。为了同时展示链接到另一个报表以及演示新的文本框格式，我们只是想展示这两者的基础知识。'
- fmt: '# 第6章：患者调查信报告与参数化存储过程


    让我们来看一下患者调查信报告及其带有富文本格式的文本框。你可能还记得[第4章](#Chapter04.html#ch4)，文本框现在支持占位符，这些占位符可以是简单或复杂的表达式，也可以是从表格导入的HTML代码。你将结合这些元素，为一位患者生成一封简单的信函。如[图6-20](#Chapter06.html#fig_6_20)所示，信件本身由一个文本框和一个表格组成。文本框在其开头包含一个名为`Template_Letter_Header`的占位符。该占位符的格式通过HTML获得，这些HTML标签存储在数据集的一个字段中。


    ![Image](images/9781430238102_Fig06-20.jpg)


    *图6-20. 带有多个占位符的患者调查信报告*


    HTML代码来源于`Pro_SSRS`数据库中的`Format`表。你可以在[图6-21](#Chapter06.html#fig_6_21)中看到该字段的示例输出。


    ![Image](images/9781430238102_Fig06-21.jpg)


    *图6-21. 来自`Format`表的HTML代码输出*


    要将HTML代码分配给文本框占位符，你只需在文本框中的任意位置右键单击，然后选择“添加占位符”。你需要标记每个占位符并为其分配一个表达式值。在这种情况下，你将为其赋值`=FIRST(Fields!html_col.Value,
    "DataSet1")`，因为在此示例的格式化表中只有一行数据。为了使HTML在文本框中正确显示所有格式，必须在“占位符属性”框中选择“HTML - 将HTML标记解释为样式”，如[图6-22](#Chapter06.html#fig_6_22)所示。


    ![Image](images/9781430238102_Fig06-22.jpg)


    *图6-22. 选择了HTML选项的占位符属性对话框*


    正如你所期望的那样，文本框也可以包含与数据集中其他字段值对应的表达式。在问候语之后，你可以看到我们将患者姓名添加为另一个占位符。这个姓名包含值表达式`=FIRST(Fields!Patient_Name.Value,
    "DataSet2")`，它将随着我们为`PatID`字段设置的参数值而变化。


    文本框的其余部分包含额外的格式，例如一些文本的粗体、斜体和字体颜色，所有这些都与包含HTML代码的标题占位符无关。这种格式在SSRS 2008之前是不可用的。随着也能导出到Microsoft
    Word，富文本格式为你的业务开辟了新的报告创建途径。[图6-23](#Chapter06.html#fig_6_23)显示了渲染后的患者调查信报告。


    ![Image](images/9781430238102_Fig06-23.jpg)


    *图6-23. 渲染后的患者调查信报告*


    `Patient_Survey_Letter.rdl`报告可在`Pro_SSRS`项目中找到。


    #### 添加超链接格式和工具提示


    在保存添加了链接的新员工列表报告之前，让我们添加两个格式属性，以使链接更加明显，并在选择链接时提供反馈。第一个任务是简单地让`EmployeeID`字段看起来像一个超链接。选择该字段，应用下划线和蓝色格式（参见[图6-24](#Chapter06.html#fig_6_24)）。


    ![Image](images/9781430238102_Fig06-24.jpg)


    *图6-24. 带有可见超链接的员工列表报告*


    接下来，你将为同一个字段添加一个工具提示。当用户将光标悬停在字段上时，工具提示会出现，它们提供额外的信息。在这种情况下，你将使用一个简单的工具提示来显示单击`EmployeeID`框时将调用哪个报告——患者调查信报告。`ToolTip`属性位于“文本框属性”窗口的“常规”选项卡上。选择字段后，打开“属性”框，并输入**患者调查信**作为工具提示。请注意，与大多数其他值一样，工具提示可以是表达式，也可以是字面字符串。


    可以为钻取报告分配多个参数选择、数据集字段、表达式和固定字面量作为输入。现在你已经链接到一个可能有多个参数的报告，让我们更深入地看看参数和筛选器如何协同工作以向报告提供数据。


    ### 使用存储过程设置报告参数


    在[第3章](#Chapter03.html#ch3)中，我们介绍了参数，并解释了如何在报告和查询中使用它们来限制从数据源返回的结果。到目前为止，你一直在使用不同类型的数据集、查询和存储过程来构建报告，但我们只触及了如何在SSRS中使用参数的皮毛。参数的值主要来自用户输入，并且最常与数据集相关联；它们用于限制返回的数据量。当参数以这种方式使用时，它被称为*查询参数*。作为数据集一部分的查询参数（例如SQL查询或存储过程）会自动在SSRS中生成报告参数。


    在本节中，你将修改员工服务成本报告的数据集，以使用参数化存储过程而不是查询。默认情况下，从存储过程生成的报告参数没有填充供用户选择的下拉列表，因此在本节中，你还将用有效的数据填充报告参数列表，以供用户选择输入。最后，你将了解SSRS如何处理`NULL`参数值以及如何为参数生成`NULL`值。当你为SSRS报告检索数据时，这一点将变得尤为重要，我们将在本节后面解释。


    你将返回到你已创建的名为`Emp_Svc_Cost`的存储过程，你可能还记得，它将提供与你一直在使用的SQL查询相同的数据集。该存储过程的优点是能够接受你希望在报告中使用的所有参数。SSRS将自动从存储过程创建报告参数。让我们快速回顾一下将从存储过程传递到报告的参数：

    *   `BranchID`

    *   `EmployeeTbllD`

    *   `ServiceMonth`

    *   `ServiceYear`

    *   `ServiceLogCtgrylD`


    要为当前使用非参数化查询的员工服务成本报告自动创建参数，你只需将报告的数据集更改为该存储过程。


    打开代码下载中包含的项目中的`EmployeeServiceCost_SP`报告。在包含数据集`Emp_Svc_Cost`的“报告数据”窗口中，你可以右键单击`Emp_Svc_Cost`数据集并选择“数据集属性”以打开“属性”窗口。在“数据集属性”对话框中，将“查询类型”从“文本”更改为“存储过程”。接下来，在“查询字符串”窗口中选择或键入存储过程`Emp_Svc_Cost`的名称，然后单击“确定”。单击“确定”后，参数将自动为你创建。接下来，再次右键单击`Emp_Svc_Cost`数据集并选择“查询”。你应该看到查询将执行`Emp_Svc_Cost`存储过程。单击“运行”按钮，这将提示你输入参数值，如[图6-25](#Chapter06.html#fig_6_25)所示。由于存储过程设计为接受`NULL`值，请在“定义查询参数”对话框中将默认输入值从“空白”更改为“`NULL`”，然后单击“确定”以完成执行。如果你不选择“`NULL`”而是“空白”，查询将失败并显示错误消息“无法将参数值从字符串转换为`Int32`”。


    ![Image](images/9781430238102_Fig06-25.jpg)


    *图6-25. 存储过程`Emp_Svc_Cost`所需的参数*'
  raw: 'Let’s look at the Patient Survey Letter report and the textbox with rich formatting.
    As you may recall from [Chapter 4](#Chapter04.html#ch4), textboxes now support
    placeholders, which can be simple and complex expressions as well as HTML code
    imported from a table. You will combine elements of each to produce a simple letter
    addressed to an individual patient. As you can see in [Figure 6-20](#Chapter06.html#fig_6_20),
    the letter itself consists of one textbox and one table. The textbox contains
    a placeholder at its beginning, titled Template_Letter_Header. This placeholder
    gets its formatting via HTML imported from a dataset that stores the HTML tags
    in a field.


    ![Image](images/9781430238102_Fig06-20.jpg)


    ***Figure 6-20.** Patient Survey Letter report with multiple placeholders*


    The HTML code is derived from the Format table in the Pro_SSRS database. You can
    see the sample output of the field in [Figure 6-21](#Chapter06.html#fig_6_21).


    ![Image](images/9781430238102_Fig06-21.jpg)


    ***Figure 6-21.** Output of the HTML code from the Format table*


    To assign the HTML code to the textbox placeholder, all that you need to do is
    right-click anywhere in the textbox and select Add Placeholder. You will label
    each placeholder as well as assign it an expression value. In this case, you will
    assign it the value =FIRST(Fields!html_col.Value, "DataSet1") as there is only
    one row in the format table for this example. In order for the HTML to be displayed
    correctly in the textbox, with all formatting, it is important to select HTML
    – Interpret HTML Tags as Styles from the Placeholder Properties box, as in [Figure
    6-22](#Chapter06.html#fig_6_22).


    ![Image](images/9781430238102_Fig06-22.jpg)


    ***Figure 6-22.** Placeholder Properties dialog with HTML selected*


    The textbox can also contain expressions that correspond to other field values
    from datasets as well, just as you would expect. After the greeting, you can see
    that we have added the patient’s name as another placeholder. This name, which
    contains the value expression =FIRST(Fields!Patient_Name.Value, "DataSet2"), will
    change with the parameter value that we set up for the PatID field.


    The remainder of the textbox contains additional formatting, such as bold, italicized,
    and font color of some text, all of which are independent of the header placeholder
    that contains the HTML code. This kind of formatting was not available before
    SSRS 2008\. With the ability to also export to Microsoft Word, rich text formatting
    opens up new avenues of report creation for your business. [Figure 6-23](#Chapter06.html#fig_6_23)
    shows the rendered Patient Survey Letter report.


    ![Image](images/9781430238102_Fig06-23.jpg)


    ***Figure 6-23.** Patient Survey Letter rendered*


    The Patient_Survey_Letter.rdl report is available in the Pro_SSRS project.


    #### Adding Hyperlink Formatting and Tooltips


    Before you save the new Employee Listing report with added links, let’s add two
    formatting properties that will make the link more obvious as well as provide
    feedback on what will happen when the link is selected. The first task is simply
    to make the EmployeeID field resemble a hyperlink. Select the field, and apply
    an underline and color format of blue (see [Figure 6-24](#Chapter06.html#fig_6_24)).


    ![Image](images/9781430238102_Fig06-24.jpg)


    ***Figure 6-24.** Employee Listing report with visible hyperlinks*


    Next you will add a tooltip to the same field. Tooltips appear whenever a user
    hover’s the cursor over the field, and they provide additional information. In
    this case, you will use one simply to show which report will be called when the
    EmployeeID box is clicked—the Patient Survey Letter report. The ToolTip property
    is located on the General tab of the Textbox Properties window. After selecting
    the field, open the Properties box, and enter **Patient Survey Letter** as the
    tooltip. Notice that the tooltip, like most other values, can be an expression
    as well as a literal string.


    It is possible to assign multiple parameter selections, dataset fields, expressions,
    and fixed literals as input for the drill-through report. Now that you have linked
    to a report that could potentially have multiple parameters, let’s take a closer
    look at how parameters and filters work together to deliver data to a report.


    ### Setting Report Parameters with Stored Procedures


    In [Chapter 3](#Chapter03.html#ch3), we introduced parameters and explained how
    you can use them within reports and queries to limit the results returned from
    the data source. Up to this point, you have been working with different kinds
    of datasets, queries, and stored procedures to build reports, but we have only
    touched the surface of how you can use parameters within SSRS. Parameters get
    their values primarily from user input and are most often associated with a dataset;
    they are used to limit the amount of data returned. When a parameter is used in
    this way, it is called a *query parameter.* Query parameters that are part of
    a dataset, such as a SQL query or stored procedure, automatically generate report
    parameters within SSRS.


    In this section, you will modify the dataset of your Employee Service Cost report
    to use a parameterized stored procedure instead of a query. By default, report
    parameters generated from stored procedures do not have populated drop-down lists
    of data for users to select, so in this section you will also populate the report
    parameter lists with valid data for user-selectable input. Finally, you will see
    how SSRS works with NULL parameter values and how to generate a NULL value for
    the parameter. This will become especially important when retrieving data for
    your SSRS report, as we will explain later in this section.


    You will return to the stored procedure you have already created, called Emp_Svc_Cost,
    which, as you might recall, will deliver the same dataset as the SQL query you
    have been using. The stored procedure has the added benefit of accepting all the
    parameters you want to use in the report. SSRS will automatically create the report
    parameters from the stored procedure. Let’s quickly review the parameters that
    will be passed into the report from the stored procedure:


    > *   BranchID

    > *   EmployeeTbllD

    > *   ServiceMonth

    > *   ServiceYear

    > *   ServiceLogCtgrylD


    To create the parameters automatically for your Employee Service Cost report,
    which is currently using a non-parameterized query, you will simply change the
    dataset for your report to the stored procedure.


    Open the EmployeeServiceCost_SP report from the project included in the code download.
    In the Report Data window that has the dataset Emp_Svc_Cost, you can right-click
    the Emp_Svc_Cost dataset and select Dataset Properties to open the Properties
    window. In the Dataset Properties dialog, change the Query type from Text to Stored
    Procedure. Next, select or type the name of the stored procedure, **Emp_Svc_Cost**,
    in the Query String window, and click OK. When you click OK, the parameters will
    be created automatically for you. Next, right-click the Emp_Svc_Cost dataset again
    and select Query. You should see that the query will execute the Emp_Svc_Cost
    stored procedure. Click the Run button, which will prompt you to input the parameter
    values, as shown in [Figure 6-25](#Chapter06.html#fig_6_25). Since the stored
    procedure is designed to accept NULL values, change the default input value in
    the Define Query Parameters dialog box from Blank to NULL, and click OK to complete
    the execution. If you do not select NULL instead of Blank, the query will fail
    with an error message, “Failed to convert parameter value from a string to Int32.”


    ![Image](images/9781430238102_Fig06-25.jpg)


    ***Figure 6-25.** Parameters required for the stored procedure Emp_Svc_Cost*'
