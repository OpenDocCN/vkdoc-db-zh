    Cost, respectively.

    > 4.  Add formatting to the textboxes by selecting both with shift-click and then
    setting the text color property to Firebrick and the font size to 12 point. You
    will also make the Estimated_Cost and Visit_Count fields bold. You can find these
    settings on the standard formatting toolbar or in the Properties window. When
    complete, the report layout will look like it does in [Figure 4-17](#Chapter04.html#fig_4_17).


    ![Image](images/9781430238102_Fig04-17.jpg)


    ***Figure 4-17.** Rectangle in table with formatting*


    When you preview the report, the `Estimated_Cost` field doesn’t appear to be in
    the correct format, which should be currency. Each textbox contains formatting
    properties that you can set in several ways. In the Layout tab, right-click the
    textbox that contains the sum of the `Estimated_Cost` data field, and select Properties.
    You can set the format for the textbox value on the Format tab of the Textbox
    Properties dialog box. Alternatively, you can alter the Format property in the
    Properties window. Choose Currency (see [Figure 4-18](#Chapter04.html#fig_4_18)).
    The default currency format, with a code of “C,” contains two decimal places.
    If you wish, you can override this by choosing Custom and typing “C0” or “C1”,
    which would give you no decimal places or one decimal place, respectively. For
    this example, leave the default two decimal places.


    ![Image](images/9781430238102_Fig04-18.jpg)


    ***Figure 4-18.** Choosing Format using Text Box dialog box*


    When you click OK and preview the report, you can see that you now have a single
    detail row that’s formatted with vertically aligned, appropriately formatted textboxes,
    as shown in [Figure 4-19](#Chapter04.html#fig_4_19). Using a Rectangle in this
    manner allows more flexibility when adding several free-form elements to a report
    while still providing the multiple grouping levels of the table.


    ![Image](images/9781430238102_Fig04-19.jpg)


    ***Figure 4-19.** Preview of table with formatting*


    You can see the RDL output of the Rectangle that you added to the table in [Listing
    4-3](#Chapter04.html#list_4_3).


    ***Listing 4-3.** RDL Output for Rectangle*


    `<Rectangle Name="rectangle1">`

    ` <ReportItems>`

    `   <Textbox Name="Visit_Count">`

    `     <CanGrow>true</CanGrow>`

    `     <KeepTogether>true</KeepTogether>`

    `       <Paragraphs>`

    `       <Paragraph>`

    `         <TextRuns>`

    `                <TextRun>`

    `             <Value>=Sum(Fields!Visit_Count.Value)</Value>`

    `                <Style>`

    `               <FontWeight>Bold</FontWeight>`

    `                </Style>`

    `                </TextRun>`

    `                </TextRuns>`

    `         <Style>`

    `           <TextAlign>Right</TextAlign>`

    `                </Style>`


    The completed report for the Rectangle object is called `Rectangle.rdl` and is
    located in the `Pro_SSRS` project.'
  trans: "### 实现矩形\n\n如前所述，矩形数据区域类似于列表数据区域，它是一个用于容纳报表项的自由格式容器对象，并将所有对象封装在一个定义的区域内。因此，当矩形被重新定位或完全删除时，其内部的对象也会随之重新定位或被删除。与我们即将介绍的所有其他报表对象和数据区域一样，您可以将矩形放置在其他数据区域内，并限定其作用范围。\n\
    \n矩形数据区域比列表数据区域功能更有限，因为它不包含分组级别。不过，您可以对矩形内的对象或数据区域进行分组，并在 SSRS 报表中以几种创新方式使用矩形。您将在上一个示例的基础上继续操作，使用表格数据区域，并在表格内添加一个矩形作为占位符。这样，您就可以在保持表格数据区域提供的结构的同时，为报表增加一层自由格式设计。在此示例中，我们还将使用之前介绍的文本框报表对象。文本框可以包含文字字符串值，例如报表标题；也可以包含表达式。您可以使用文本框对象为放置在矩形内的自由格式对象添加标题。\n\
    \n本节的起始报表名为 `Rectangle Start.rdl`。它可以在 Apress 网站本书资源代码/下载区的 `Pro_SSRS` 项目中找到。\n\
    \n首先，打开 `Rectangle Start.rdl` 报表，并按照以下步骤向整个详细信息行添加一个矩形：\n\n> 1.  将一个矩形数据区域从工具箱拖到“矩形起始”报表中扩展的详细信息行内。\n\
    > 2.  将 `emp_svc_cost` 数据集中的两个字段 `Visit_Count` 和 `Estimated_Cost` 拖到详细信息区域。将它们垂直放置，使\
    \ `Visit_Count` 字段位于 `Estimated_Cost` 字段之上。请注意，SSRS 会自动为这些字段分配 `Sum` 聚合函数。\n>\
    \ 3.  从工具箱中拖动两个文本框到矩形内，位于您刚刚添加的两个字段的左侧。文本框可以包含表达式或文字字符串，用作标签。在文本框中分别键入“访问次数”和“预计成本”。\n\
    > 4.  通过按住 Shift 键单击选中这两个文本框，然后将文本颜色属性设置为“砖红色”，字体大小设置为 12 磅，来为文本框添加格式。您还将把 `Estimated_Cost`\
    \ 和 `Visit_Count` 字段设置为粗体。您可以在标准格式工具栏或属性窗口中找到这些设置。完成后，报表布局将如图 4-17 所示。\n\n![Image](img/9781430238102_Fig04-17.jpg)\n\
    \n#### 图 4-17. 表格中带有格式的矩形\n\n当您预览报表时，`Estimated_Cost` 字段似乎格式不正确，它应该是货币格式。每个文本框都包含格式属性，您可以通过多种方式设置。在“布局”选项卡上，右键单击包含\
    \ `Estimated_Cost` 数据字段总和的文本框，然后选择“属性”。您可以在“文本框属性”对话框的“格式”选项卡上设置文本框值的格式。或者，您也可以在属性窗口中修改“格式”属性。选择“货币”（参见图\
    \ 4-18）。默认的货币格式代码为“C”，包含两位小数。如果您愿意，可以通过选择“自定义”并键入“C0”或“C1”来覆盖此设置，这将分别得到无小数位或一位小数位。对于本示例，请保留默认的两位小数。\n\
    \n![Image](img/9781430238102_Fig04-18.jpg)\n\n#### 图 4-18. 使用文本框对话框选择格式\n\n当您单击“确定”并预览报表时，您可以看到现在有了一个经过格式化的单个详细信息行，其中包含垂直对齐、格式适当的文本框，如图\
    \ 4-19 所示。以这种方式使用矩形，可以在向报表添加多个自由格式元素时提供更大的灵活性，同时仍能提供表格的多重分组级别。\n\n![Image](img/9781430238102_Fig04-19.jpg)\n\
    \n#### 图 4-19. 带有格式的表格预览\n\n您可以在清单 4-3 中看到您添加到表格中的矩形的 RDL 输出。\n\n#### 清单 4-3.\
    \ 矩形的 RDL 输出\n\n```\n<Rectangle Name=\"rectangle1\">\n  <ReportItems>\n    <Textbox\
    \ Name=\"Visit_Count\">\n      <CanGrow>true</CanGrow>\n      <KeepTogether>true</KeepTogether>\n\
    \      <Paragraphs>\n        <Paragraph>\n          <TextRuns>\n            <TextRun>\n\
    \              <Value>=Sum(Fields!Visit_Count.Value)</Value>\n              <Style>\n\
    \                <FontWeight>Bold</FontWeight>\n              </Style>\n     \
    \       </TextRun>\n          </TextRuns>\n          <Style>\n            <TextAlign>Right</TextAlign>\n\
    \          </Style>\n```\n\n矩形对象的完成报表名为 `Rectangle.rdl`，位于 `Pro_SSRS` 项目中。"
- fmt: "### Implementing a Matrix\n\nYou can use the `Matrix` data region to produce\
    \ output formatted in rows and columns around aggregated measures. A Matrix in\
    \ SSRS is similar to a pivot table or a cross-tab report. You can group data fields\
    \ in a `Matrix` together with other fields, producing a natural summary and detail\
    \ relationship. Simple single-level `Matrix` data regions with one column and\
    \ one row provide valuable BI that you can deploy for quick analysis. This is\
    \ true for data derived from standard SQL queries or from data derived from an\
    \ MDX query used with Analysis Services (covered in [Chapter 12](#Chapter12.html)).\
    \ For now, we’ll introduce some of the properties of the `Matrix` data region\
    \ and use the stored procedure, `Emp_Svc_Cost`, to populate it with the `Estimated_Cost`\
    \ value for each patient over a given time. You concatenate the field values for\
    \ `Year` and `Month` to use for the column grouping section of the `Matrix`, and\
    \ `Patient_Name` for the row grouping.\n\nThe starting point report for the `Matrix`\
    \ object, demonstrated in this section, is available in the `Pro_SSRS` project\
    \ in the Source Code/Download area for the book on the Apress site. This report\
    \ is called `Matrix Start.rdl`.\n\nBy default, a `Matrix` data region holds only\
    \ three cells, defining `Columns`, `Rows`, and `Data` cells, as shown in [Figure\
    \ 4-20](#Chapter04.html#fig_4_20). You can use the fourth blank cell at the top\
    \ left for a label or for an expression-and-parameter combination that can control\
    \ the layout of the `Matrix`, such as expanding or collapsing groups interactively—we\
    \ will demonstrate later.\n\n![Image](images/9781430238102_Fig04-20.jpg)\n`Figure\
    \ 4-20. Matrix data region`\n\nWith the `Matrix Start.rdl` report open, double-click\
    \ the `Matrix` object in the `Toolbox`, which will automatically add a `Matrix`\
    \ to the design area of the report. Next, drag two fields onto the `Matrix`, `Patient_Name`\
    \ and `Estimated_Cost`, from the `emp_svc_cost` dataset. They go in the `Rows`\
    \ and `Data` areas, respectively. For the `Columns` area, define an expression\
    \ that concatenates the `Service_Year` and `Service_Month` fields. Note that you\
    \ may have to delete the header that was added automatically for the `Estimated\
    \ Cost` field. The expression is as follows:\n\n```\n=Fields!Year.Value & \" -\
    \ \" & Fields!Month.Value\n```\n\nYou also use this expression to create a custom\
    \ grouping with the combined fields. To group the `Columns` area on the expression,\
    \ right-click `ColumnGroup` in the `Row and Column Groups` area of the report\
    \ and select `Group Properties`. Place the preceding expression in the `Group\
    \ On` section, and click OK. Next, left-align the `Estimated_Cost` field, and\
    \ set the formatting to Currency, as demonstrated in the previous section. When\
    \ you preview the report, you can see that the `Matrix` shows the estimated cost\
    \ of care for the familiar patients for each month they had service, as shown\
    \ in [Figure 4-21](#Chapter04.html#fig_4_21).\n\n![Image](images/9781430238102_Fig04-21.jpg)\n\
    `Figure 4-21. Matrix data region preview`\n\nYou can see the RDL output of the\
    \ `Matrix` in [Listing 4-4](#Chapter04.html#list_4_4).\n\n`Listing 4-4. Matrix\
    \ RDL Listing`\n\n```\n<Tablix Name=\"matrix1\">\n    <TablixCorner>\n       \
    \ <TablixCornerRows>\n            <TablixCornerRow>\n                <TablixCornerCell>\n\
    \                    <CellContents>\n                        <Textbox Name=\"\
    textbox1\">\n                            <CanGrow>true</CanGrow>\n           \
    \                 <KeepTogether>true</KeepTogether>\n                        \
    \    <Paragraphs>\n                                <Paragraph>\n             \
    \                       <TextRuns>\n                                        <TextRun>\n\
    \                                            <Value />\n                     \
    \                       <Style />\n                                        </TextRun>\n\
    \                                    </TextRuns>\n                           \
    \         <Style />\n                                </Paragraph>\n          \
    \                  </Paragraphs>\n                            <ZIndex>3</ZIndex>\n\
    \                            <DataElementOutput>NoOutput</DataElementOutput>\n\
    \                            <Style>\n                                <PaddingLeft>2pt</PaddingLeft>\n\
    \                                <PaddingRight>2pt</PaddingRight>\n          \
    \                      <PaddingTop>2pt</PaddingTop>\n                        \
    \        <PaddingBottom>2pt</PaddingBottom>\n                            </Style>\n\
    \                        </Textbox>\n                    </CellContents>\n   \
    \             </TablixCornerCell>\n            </TablixCornerRow>\n        </TablixCornerRows>\n\
    \    </TablixCorner>\n</Tablix>\n```\n\nThe completed report for the `Matrix`\
    \ object is called `Matrix.rdl` and is available in the `Pro_SSRS` project.\n\n\
    ### Summary\n\nIn this chapter, you learned that each report consists of defined\
    \ elements that are based on a defined schema in the RDL, which gives SSRS the\
    \ advantage of standardization. We covered the report objects that make up reports\
    \ and viewed their properties and functionality. You also saw for each object\
    \ how the graphical design components are directly translated to RDL through the\
    \ design process. Now that you’re more comfortable with the design environment,\
    \ you’ll learn how to use it to design and deploy some real reports.\n\nIn the\
    \ next chapter, we’ll show how to spice up reports by adding graphs and charts.\
    \ You can look at a graph or a chart as just another type of report, but they\
    \ are visually different enough to treat separately in their own chapter.\n\n\
    ## Chapter 5\n\n### Implementing Dashboard-Style Report Objects\n\nCharts, maps,\
    \ indicators and other Reporting Services objects add visual interest to reports.\
    \ Many of these objects also allow you to communicate a great deal of information\
    \ at a glance that would otherwise be time-consuming to discover from reading\
    \ lines of detail in a report containing only columnar data. Reporting Services\
    \ provides a number of chart types and other report objects that have their own\
    \ purpose. The visual report objects at your disposal are:\n\n*   **Chart:** SSRS\
    \ provides many chart styles that can be incorporated with other report objects\
    \ such as the Table or Matrix or used as a stand-alone report.\n*   **Gauge:**\
    \ Released with SSRS 2008, these visually appealing controls provide at-a-glance\
    \ views, typically used as Key Performance Indicators of business measurables,\
    \ such as sales and profit trending. Prior to SSRS 2008, gauges had to be acquired\
    \ separately.\n*   **Image:** This report object can embed standard format images,\
    \ such as JPEG or TIFF, directly in a report. You can embed images directly in\
    \ reports, say for a company logo, or pull them directly from a database table.\n\
    *   **Map:** The map object allows developers to add overlaying visualizations\
    \ on top of aerial maps to represent data returned by a map gallery, a spatial\
    \ query or from Environmental Systems Research Institute, Inc (ESRI) objects and\
    \ shape files.\n*   **Data Bar:** This report item can be used as a horizontal\
    \ bar or vertical data column. It is often used to convey a lot of information\
    \ in a smaller amount of space than typical bar charts. For example, you might\
    \ use a data bar if you wanted to visually represent the test scores that a group\
    \ of students received on a particular assessment.\n*   **Sparkline:** Much like\
    \ the *Data Bar*, this report object is usually used to visualize large amounts\
    \ of trending data on a particular measure, but in a more condensed fashion than\
    \ the traditional chart provides. This is much like the depiction of the price\
    \ of stock over a given date range with few or no labels and legends present.\n\
    *   **Indicator:** Added in SSRS 2008 R2, this report item can be used to show\
    \ different images that visually represent a certain predefined or data driven\
    \ value. Examples of this object are commonly seen in report sections that provide\
    \ a comparison against a Key Performance Indicator (KPI).\n\n![Image](images/square.jpg)\
    \ **Note** The `Map`, `Data Bar`, `Sparkline`, and `Indicator` report items were\
    \ released with SSRS 2008 R2. Each of these items provided report developers with\
    \ more sophisticated report objects commonly seen in dashboard and analytical\
    \ style reports.\n\nThe rest of this chapter takes you on a tour of SQL Server\
    \ 2012 Reporting Service’s charting capabilities. First, we’ll cover some needed\
    \ ground pertaining to the chart data region. Then we’ll work through some examples\
    \ of the available charts."
  raw: '### Implementing a Matrix


    You can use the Matrix data region to produce output formatted in rows and columns
    around aggregated measures. A Matrix in SSRS is similar to a pivot table or a
    cross-tab report. You can group data fields in a Matrix together with other fields,
    producing a natural summary and detail relationship. Simple single-level Matrix
    data regions with one column and one row provide valuable BI that you can deploy
    for quick analysis. This is true for data derived from standard SQL queries or
    from data derived from an MDX query used with Analysis Services (covered in [Chapter
    12](#Chapter12.html)). For now, we’ll introduce some of the properties of the
    Matrix data region and use the stored procedure, `Emp_Svc_Cost`, to populate it
    with the `Estimated_Cost` value for each patient over a given time. You concatenate
    the field values for Year and Month to use for the column grouping section of
    the Matrix, and `Patient_Name` for the row grouping.


    The starting point report for the Matrix object, demonstrated in this section,
    is available in the `Pro_SSRS` project in the Source Code/Download area for the
    book on the Apress site. This report is called `Matrix Start.rdl`.


    By default, a Matrix data region holds only three cells, defining Columns, Rows,
    and Data cells, as shown in [Figure 4-20](#Chapter04.html#fig_4_20). You can use
    the fourth blank cell at the top left for a label or for an expression-and-parameter
    combination that can control the layout of the Matrix, such as expanding or collapsing
    groups interactively—we will demonstrate later.


    ![Image](images/9781430238102_Fig04-20.jpg)


    ***Figure 4-20.** Matrix data region*


    With the `Matrix Start.rdl` report open, double-click the Matrix object in the
    Toolbox, which will automatically add a Matrix to the design area of the report.
    Next, drag two fields onto the Matrix, `Patient_Name` and `Estimated_Cost`, from
    the `emp_svc_cost` dataset. They go in the Rows and Data areas, respectively.
    For the Columns area, define an expression that concatenates the `Service_Year`
    and `Service_Month` fields. Note that you may have to delete the header that was
    added automatically for the Estimated Cost field. The expression is as follows:


    `=Fields!Year.Value & " - " & Fields!Month.Value`


    You also use this expression to create a custom grouping with the combined fields.
    To group the Columns area on the expression, right-click ColumnGroup in the Row
    and Column Groups area of the report and select Group Properties Place the preceding
    expression in the Group On section, and click OK. Next, left-align the `Estimated_Cost`
    field, and set the formatting to Currency, as demonstrated in the previous section.
    When you preview the report, you can see that the Matrix shows the estimated cost
    of care for the familiar patients for each month they had service, as shown in
    [Figure 4-21](#Chapter04.html#fig_4_21).


    ![Image](images/9781430238102_Fig04-21.jpg)


    ***Figure 4-21.** Matrix data region preview*


    You can see the RDL output of the Matrix in [Listing 4-4](#Chapter04.html#list_4_4).


    ***Listing 4-4.** Matrix RDL Listing*


    `<Tablix Name="matrix1">`

    `        <TablixCorner>`

    `          <TablixCornerRows>`

    `            <TablixCornerRow>`

    `              <TablixCornerCell>`

    `                <CellContents>`

    `                        <Textbox Name="textbox1">`

    `                        <CanGrow>true</CanGrow>`

    `                    <KeepTogether>true</KeepTogether>`

    `                    <Paragraphs>`

    `                      <Paragraph>`

    `                        <TextRuns>`

    `                          <TextRun>`

    `                            <Value />`

    `                            <Style />`

    `                          </TextRun>`

    `           </TextRuns>`

    `           <Style />`

    `      </Paragraph>`

    `</Paragraphs>`

    `<ZIndex>3</ZIndex>`

    `<DataElementOutput>NoOutput</DataElementOutput>`

    `<Style>`

    `      <PaddingLeft>2pt</PaddingLeft>`

    `      <PaddingRight>2pt</PaddingRight>`

    `      <PaddingTop>2pt</PaddingTop>`

    `      <PaddingBottom>2pt</PaddingBottom>`

    `</Style>`


    The completed report for the Matrix object is called `Matrix.rdl` and is available
    in the `Pro_SSRS` project.


    ### Summary


    In this chapter, you learned that each report consists of defined elements that
    are based on a defined schema in the RDL, which gives SSRS the advantage of standardization.
    We covered the report objects that make up reports and viewed their properties
    and functionality. You also saw for each object how the graphical design components
    are directly translated to RDL through the design process. Now that you’re more
    comfortable with the design environment, you’ll learn how to use it to design
    and deploy some real reports.


    In the next chapter, we’ll show how to spice up reports by adding graphs and charts.
    You can look at a graph or a chart as just another type of report, but they are
    visually different enough to treat separately in their own chapter.


    ## C H A P T E R  5


    ## Implementing Dashboard-Style Report Objects


    Charts, maps, indicators and other Reporting Services objects add visual interest
    to reports. Many of these objects also allow you to communicate a great deal of
    information at a glance that would otherwise be time-consuming to discover from
    reading lines of detail in a report containing only columnar data. Reporting Services
    provides a number of chart types and other report objects that have their own
    purpose. The visual report objects at your disposal are:


    > *   *Chart:* SSRS provides many chart styles that can be incorporated with other
    report objects such as the Table or Matrix or used as a stand-alone report.

    > *   *Gauge:* Released with SSRS 2008, these visually appealing controls provide
    at-a-glance views, typically used as Key Performance Indicators of business measurables,
    such as sales and profit trending. Prior to SSRS 2008, gauges had to be acquired
    separately.

    > *   *Image:* This report object can embed standard format images, such as JPEG
    or TIFF, directly in a report. You can embed images directly in reports, say for
    a company logo, or pull them directly from a database table.

    > *   *Map:* The map object allows developers to add overlaying visualizations
    on top of aerial maps to represent data returned by a map gallery, a spatial query
    or from Environmental Systems Research Institute, Inc (ESRI) objects and shape
    files.

    > *   *Data Bar:* This report item can be used as a horizontal bar or vertical
    data column. It is often used to convey a lot of information in a smaller amount
    of space than typical bar charts. For example, you might use a data bar if you
    wanted to visually represent the test scores that a group of students received
    on a particular assessment.

    > *   *Sparkline:* Much like the *Data Bar*, this report object is usually used
    to visualize large amounts of trending data on a particular measure, but in a
    more condensed fashion than the traditional chart provides. This is much like
    the depiction of the price of stock over a given date range with few or no labels
    and legends present.

    > *   *Indicator:* Added in SSRS 2008 R2, this report item can be used to show
    different images that visually represent a certain predefined or data driven value.
    Examples of this object are commonly seen in report sections that provide a comparison
    against a Key Performance Indicator (KPI).


    ![Image](images/square.jpg) **Note** The Map, Data Bar, Sparkline, and Indicator
    report items were released with SSRS 2008 R2\. Each of these items provided report
    developers with more sophisticated report objects commonly seen in dashboard and
    analytical style reports


    The rest of this chapter takes you on a tour of SQL Server 2012 Reporting Service’s
    charting capabilities. First, we’ll cover some needed ground pertaining to the
    chart data region. Then we’ll work through some examples of the available charts.'
  trans: "### 实现矩阵\n\n您可以使用 `Matrix` 数据区域来生成围绕聚合度量、按行和列格式化的输出。SSRS 中的矩阵类似于数据透视表或交叉表报表。您可以将数据字段与其他字段一起在\
    \ `Matrix` 中分组，从而形成自然的汇总和明细关系。简单单级的 `Matrix` 数据区域（仅包含一列和一行）提供了有价值的商业智能，可用于快速分析。无论是源自标准\
    \ SQL 查询的数据，还是用于 Analysis Services 的 MDX 查询（在第 12 章中介绍）得到的数据，情况都是如此。现在，我们将介绍 `Matrix`\
    \ 数据区域的一些属性，并使用存储过程 `Emp_Svc_Cost`，用特定时间段内每位患者的 `Estimated_Cost` 值来填充它。您需要连接 `Year`\
    \ 和 `Month` 的字段值，用于 `Matrix` 的列分组部分，并使用 `Patient_Name` 进行行分组。\n\n本节演示的 `Matrix`\
    \ 对象起始报表可在 Apress 网站本书的源代码/下载区域的 `Pro_SSRS` 项目中获取。此报表名为 `Matrix Start.rdl`。\n\n\
    默认情况下，`Matrix` 数据区域仅包含三个单元格，分别定义 `列`、`行` 和 `数据` 单元格，如图 4-20 所示。您可以使用左上角的第四个空白单元格作为标签，或用于控制\
    \ `Matrix` 布局的表达式与参数组合（例如交互式展开或折叠分组）——我们稍后将进行演示。\n\n![Image](img/9781430238102_Fig04-20.jpg)\n\
    `图 4-20. 矩阵数据区域`\n\n打开 `Matrix Start.rdl` 报表后，双击 `工具箱` 中的 `Matrix` 对象，这将自动向报表的设计区域添加一个\
    \ `Matrix`。接下来，从 `emp_svc_cost` 数据集将两个字段 `Patient_Name` 和 `Estimated_Cost` 拖放到\
    \ `Matrix` 上。它们分别放入 `行` 和 `数据` 区域。对于 `列` 区域，定义一个连接 `Service_Year` 和 `Service_Month`\
    \ 字段的表达式。请注意，您可能需要删除为 `Estimated Cost` 字段自动添加的标题。表达式如下：\n\n```\n=Fields!Year.Value\
    \ & \" - \" & Fields!Month.Value\n```\n\n您还需要使用此表达式基于组合字段创建自定义分组。要在表达式上对 `列` 区域进行分组，请右键点击报表\
    \ `行和列组` 区域中的 `ColumnGroup`，然后选择 `分组属性`。将上述表达式放入 `分组依据` 部分，然后点击确定。接下来，将 `Estimated_Cost`\
    \ 字段左对齐，并将格式设置为货币，如上一节所示。当您预览报表时，可以看到 `Matrix` 显示了熟悉的患者在每个月接受服务时的预估护理费用，如图 4-21\
    \ 所示。\n\n![Image](img/9781430238102_Fig04-21.jpg)\n`图 4-21. 矩阵数据区域预览`\n\n您可以在清单\
    \ 4-4 中查看 `Matrix` 的 RDL 输出。\n\n`清单 4-4. 矩阵 RDL 清单`\n\n```\n<Tablix Name=\"matrix1\"\
    >\n    <TablixCorner>\n        <TablixCornerRows>\n            <TablixCornerRow>\n\
    \                <TablixCornerCell>\n                    <CellContents>\n    \
    \                    <Textbox Name=\"textbox1\">\n                           \
    \ <CanGrow>true</CanGrow>\n                            <KeepTogether>true</KeepTogether>\n\
    \                            <Paragraphs>\n                                <Paragraph>\n\
    \                                    <TextRuns>\n                            \
    \            <TextRun>\n                                            <Value />\n\
    \                                            <Style />\n                     \
    \                   </TextRun>\n                                    </TextRuns>\n\
    \                                    <Style />\n                             \
    \   </Paragraph>\n                            </Paragraphs>\n                \
    \            <ZIndex>3</ZIndex>\n                            <DataElementOutput>NoOutput</DataElementOutput>\n\
    \                            <Style>\n                                <PaddingLeft>2pt</PaddingLeft>\n\
    \                                <PaddingRight>2pt</PaddingRight>\n          \
    \                      <PaddingTop>2pt</PaddingTop>\n                        \
    \        <PaddingBottom>2pt</PaddingBottom>\n                            </Style>\n\
    \                        </Textbox>\n                    </CellContents>\n   \
    \             </TablixCornerCell>\n            </TablixCornerRow>\n        </TablixCornerRows>\n\
    \    </TablixCorner>\n</Tablix>\n```\n\n`Matrix` 对象的完整报表名为 `Matrix.rdl`，位于 `Pro_SSRS`\
    \ 项目中。\n\n### 总结\n\n在本章中，您了解到每份报表都由基于 RDL 中已定义架构的明确元素组成，这赋予了 SSRS 标准化的优势。我们介绍了构成报表的报表对象，并查看了它们的属性和功能。您还看到了在设计过程中，每个对象的图形设计组件如何直接转换为\
    \ RDL。既然您对设计环境更加熟悉了，接下来将学习如何使用它来设计和部署一些实际的报表。\n\n在下一章中，我们将展示如何通过添加图形和图表来让报表更加生动。您可以将图形或图表视为另一种类型的报表，但它们在视觉上差异显著，值得在单独的章节中进行介绍。\n\
    \n## 第 5 章\n\n### 实现仪表板风格的报表对象\n\n图表、地图、指示器和其他 Reporting Services 对象为报表增添了视觉趣味。其中许多对象还让您能够一目了然地传达大量信息，否则，从仅包含列式数据的报表中逐行阅读细节来发现这些信息将非常耗时。Reporting\
    \ Services 提供了多种图表类型和其他具有特定用途的报表对象。您可用的可视化报表对象包括：\n\n*   **图表：** SSRS 提供多种图表样式，可以与表格或矩阵等其他报表对象结合使用，也可以作为独立报表使用。\n\
    *   **仪表：** 随 SSRS 2008 发布，这些视觉吸引力强的控件提供了一目了然的视图，通常用作业务可衡量指标（如销售和利润趋势）的关键绩效指标。在\
    \ SSRS 2008 之前，仪表需要单独获取。\n*   **图像：** 此报表对象可以在报表中直接嵌入标准格式的图像，例如 JPEG 或 TIFF。您可以将图像直接嵌入报表（例如公司徽标），或直接从数据库表中提取。\n\
    *   **地图：** 地图对象允许开发人员在航拍地图上添加覆盖可视化效果，以表示通过地图库、空间查询或环境系统研究所公司 (ESRI) 对象和图层文件返回的数据。\n\
    *   **数据条：** 此报表项可用作水平条或垂直数据列。它通常用于在比传统条形图更小的空间内传达大量信息。例如，如果您想直观地表示一组学生在特定评估中获得的测试分数，可能会使用数据条。\n\
    *   **迷你图：** 与 *数据条* 类似，此报表对象通常用于可视化特定度量的大量趋势数据，但比传统图表提供的形式更紧凑。这很像描绘给定日期范围内股票价格的方式，很少或没有标签和图例。\n\
    *   **指示器：** 在 SSRS 2008 R2 中添加，此报表项可用于显示不同的图像，这些图像在视觉上代表某个预定义或数据驱动的值。此类对象的示例常见于提供与关键绩效指标\
    \ (KPI) 对比的报表部分。\n\n![Image](img/square.jpg) **注意** `地图`、`数据条`、`迷你图` 和 `指示器` 报表项是随\
    \ SSRS 2008 R2 发布的。这些项中的每一个都为报表开发人员提供了更复杂的报表对象，这些对象常见于仪表板和分析风格的报表中。\n\n本章的其余部分将带您浏览\
    \ SQL Server 2012 Reporting Service 的制图功能。首先，我们将介绍一些关于图表数据区域的必要知识。然后，我们将通过一些可用图表的示例进行讲解。"
- fmt: "# Understanding the Chart Data Region\n\nThe Chart data region of SSRS, like\
    \ the Matrix data region, allows multiple grouping levels from a single dataset.\
    \ Instead of the column- and row-level groupings that the Tablix data regions\
    \ provide via Table, Matrix, and List objects, the Chart data region uses Series,\
    \ Categories, and Values. You can set many properties for a chart, and as with\
    \ all other data regions, a chart can use expressions to define its properties.\
    \ In addition, as with other data regions, you can place charts by themselves\
    \ or scope them within another region such as a List or Table data region. For\
    \ example, you could use a simple chart to show the overall visits by type of\
    \ clinician, which in your stored procedure is determined by the `Service_Type`\
    \ field. You could also add the chart to a cell in a table that’s grouped by patient\
    \ and time frame, such as `Month` and `Year`. The chart would show for each grouping\
    \ a visit count for that patient over time. Let’s add a chart to the report that\
    \ uses the `Emp_Svc_Cost` stored procedure. For the chart, you will add three\
    \ familiar fields, one for each chart area: Series, Categories, and Values will\
    \ contain `Patient_Name`, `Employee_Name`, and `Visit_Count`, respectively.\n\n\
    The starting-point report for the Chart object demonstrated in this section is\
    \ available in the `Pro_SSRS` project in the Source Code/Download area for the\
    \ book on the Apress Web site ([`www.apress.com`](http://www.apress.com)). This\
    \ report is called, creatively enough, `Chart Start.rdl`, which is also a breakfast\
    \ cereal for corporate executives.\n\n## Creating a Chart\n\n1.  To begin, open\
    \ the `Chart Start.rdl` report to the Design tab and double-click the Chart tool\
    \ in the Toolbox to bring up the Select Chart Type dialog box. The Chart objects\
    \ in SSRS 2008 were enhanced quite extensively, but mostly the updates are cosmetic.\
    \ You will select the Stacked Bar chart shown in\n    ![Image](images/9781430238102_Fig05-01.jpg)\n\
    \    Figure 5-1. SSRS chart selections\n2.  Double click the graphic area of the\
    \ chart, which will bring up the Chart Data window.\n3.  Under the Values area\
    \ of the Chart Data window click the green plus sign and select `Visit_Count`\
    \ from the drop down list.\n4.  Next, click the green plus sign in the Category\
    \ Groups area of the Chart Data window and select `Employee_Name`.\n5.  Next,\
    \ click the green plus button in the Series Group area of the Chart Data window\
    \ and select `Patient_Name`.\n6.  Finally, resize the chart by dragging the bottom\
    \ right corner down and to the right so it resembles Figure 5-2.\n\n![Image](images/9781430238102_Fig05-02.jpg)\n\
    Figure 5-2. Chart with three fields\n\nBefore you preview the chart, let’s look\
    \ at its properties. You will want to change the default palette to Light for\
    \ a more subtle and visually appealing view. Right click in the chart and select\
    \ Chart Properties under the Chart submenu. Choose the color palette named Light\
    \ and select OK. The properties should look like Figure 5-3.\n\n![Image](images/9781430238102_Fig05-03.jpg)\n\
    Figure 5-3. Chart properties\n\nFinally, right-click inside of the chart graphic\
    \ area while on the Design tab, and select 3D Effects. Next, click the checkbox\
    \ to enable 3D effects and click OK. Before previewing the chart, rename the title\
    \ from Chart Title to `Visit Count By Patient`. You can now preview the chart,\
    \ as displayed in Figure 5-4.\n\n![Image](images/9781430238102_Fig05-04.jpg)\n\
    Figure 5-4. Chart with custom properties\n\n![Image](images/square.jpg) **Note**\
    \ We chose to narrow down the list for visits that happened in 2010. This was\
    \ intentional, as it limited the data to an easily viewable amount; otherwise,\
    \ the chart would have been populated with too many patients and would appear\
    \ jumbled. The `Chart Start.rdl` report has a default parameter value of 2010\
    \ as well, so your results will match.\n\nYou can see the RDL output for the chart\
    \ you just created in Listing 5-1.\n\nListing 5-1. Chart RDL Sample\n\n```\n<Chart\
    \ Name=\"chart1\">\n   <ChartThreeDProperties>\n      <Enabled>true</Enabled>\n\
    \      <Rotation>30</Rotation>\n      <Inclination>20</Inclination>\n      <Shading>Simple</Shading>\n\
    \      <WallThickness>50</WallThickness>\n      <DrawingStyle>Cylinder</DrawingStyle>\n\
    \   </ChartThreeDProperties>\n   <Style>\n      <BackgroundColor>White</BackgroundColor>\n\
    \   </Style>\n```\n\nThe completed report for the Chart object is in the `Pro_SSRS`\
    \ project and is called `Chart.rdl`."
