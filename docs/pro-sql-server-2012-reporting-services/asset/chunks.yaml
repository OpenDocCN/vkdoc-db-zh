    \ cube was originally loaded and processed and represents a total average of time\
    \ to admission for all dimensions combined. [Figure 12-3](#Chapter12.html#fig_12_3)\
    \ shows the Time to Admission measure in the query pane.\n>     \n>     ![Image](images/9781430238102_Fig12-03.jpg)\n\
    >     \n>     ***Figure 12-3.** Viewing the overall Time to Admission measure’s\
    \ average for all dimensions*\n>     \n>     \n> 3.  Now drag two dimension objects\
    \ onto the data pane. Under the Branch object, drag and drop the Branch Name field\
    \ to the left of our Time to Admission measure.\n> 4.  Next, under Date of Admission,\
    \ drag and drop the `Year - MonthName - admitdate` hierarchy to the right of Branch\
    \ Name in the data pane. The hierarchy looks like a pyramid made of six squares.\
    \ When finished, the cube browser should look like [Figure 12-4](#Chapter12.html#fig_12_4).\
    \ You can now see the results for every single admitDate along with its corresponding\
    \ Branch Name, Year and MonthName attributes.\n\nIn prior releases of the cube\
    \ browser, you could drill down into hierarchies and have column groupings as\
    \ we have seen in the Matrix-style reports. However, as of the current release\
    \ of SQL Server 2012, the cube browser returns the data two-dimensionally much\
    \ like the results of a T-SQL query. Some active members in the SQL Server user\
    \ community has stated that this is a strange setback for Microsoft’s cube browser\
    \ and I personally believe that they should add the functionality back. However,\
    \ nothing really has changed from the reporting perspective. If you are seeing\
    \ the results depicted in [Figure 12-3](#Chapter12.html#fig_12_3) above, then\
    \ you are indeed getting data from the cube! Now it is time to move on to SSRS\
    \ and create the report you will deploy to SharePoint.\n\n![Image](images/9781430238102_Fig12-04.jpg)\n\
    \n***Figure 12-4.** Cube browser with year and branch*\n\n#### Using an Analysis\
    \ Service Cube with SSRS\n\nNow that you have determined that the Patient Referral\
    \ cube is working as it should, the next step is to create an SSRS report. In\
    \ the Pro_SSRS project, you will find two completed reports, the Average Referral\
    \ to Admission report and the Referral to Admission Chart report. Both reports\
    \ are based on the Patient Referral cube. Since creating reports is the same,\
    \ we will not go through the procedure of building these reports step by step.\
    \ However, we will demonstrate the following through the Average Referral to Admission\
    \ report:\n\n> *   Setting up a data source to use Analysis Services\n> *   Using\
    \ the graphical MDX query builder that was added with SQL Server Reporting Services\
    \ 2005"
  trans: "\n\n![Image](img/square.jpg) **注意** 如果您跳读至此，请注意本书中 `Business Intelligence\
    \ Development Studio`（`BIDS`）与 `SQL Server Data Tools`（`SSDT`）是作为同义词使用的。如果您使用的是从\
    \ `SSRS 2005` 到 `SSRS 2008 R2` 的版本，启动 `DEVENV.exe` 的快捷方式标签为 `SQL Server Business\
    \ Intelligence Development Studio`。而在 2012 版中，其标签已改为 `SQL Server Data Tools`。\n\
    \n![Image](img/9781430238102_Fig12-01.jpg)\n\n**图 12-1.** Patient Referral 多维数据集结构\n\
    \n在这六个维度中，有多个您应该感到熟悉，因为您已在本书其他章节中使用过它们。维度包含描述事实数据的文本属性。您可以将多维数据集中的维度视为预聚合的数据组或类别，这些数据可与一个或多个度量值相关联。度量值，例如\
    \ `入院时间`（`Time to Admission`）和 `转诊事实计数`（`Fact Referral Count`），是在维度各层级计算出的值。存储在多维数据集中的多维数据由维度和度量值组成，当使用\
    \ `多维表达式`（`MDX`）进行查询时，不仅可以像 `T-SQL` 查询的行列那样进行二维分析，还能通过下钻和切片在多个维度上进行分析。\n\n想象一下\
    \ 1974 年发明的魔方，我们很多人小时候都玩过。它有三层高、三层宽、三层深。基于这个画面，假设魔方的绿色面代表 `入院日期`（`Date of Admission`）维度，红色面代表\
    \ `分支机构`（`Branch`）维度，黄色面代表 `入院时间`（`Time to Admission`）度量值。比解开魔方容易得多，您可以创建一个 `MDX`\
    \ 查询来返回这三个点的交集，如 图 12-4 所示。\n\n将在 Patient Referral 多维数据集中使用的维度如下：\n\n> *   `县`（`County`）\n\
    > *   `转诊来源`（`Referral Source`）\n> *   `诊断`（`Diagnosis`）\n> *   `支付方`（`Payer`）\n\
    > *   `分支机构`（`Branch`）\n> *   `入院日期`（`Date of Admission`）\n\n由于本练习的起点是一个已预填充并处理的多维数据集，因此在创建\
    \ `SSRS` 报表之前，确保能从多维数据集获取所需数据非常重要。在 `BIDS` 中打开 `Pro_SSRS` 项目后，在解决方案资源管理器中导航到 `Patient\
    \ Referral SSAS` 项目，展开至“多维数据集”，然后双击 `Patient Referral.cube`。这将在设计模式下打开该多维数据集。多维数据集打开后，选择“浏览器”选项卡。图\
    \ 12-2 显示了打开的多维数据集，其中组合的度量值和维度已准备好拖放到查询窗格中。如果浏览器选项卡中未出现数据，并且有消息指示存在权限问题或数据库不存在，这通常表示多维数据集需要处理，或者\
    \ `SSAS Patient Referral` 数据库需要部署。要在 `BIDS` 中部署 `Patient Referral OLAP` 数据库（即多维数据集），请右键单击\
    \ `Patient Referral` 项目，然后选择“部署”。如果默认权限设置对于您的 `Analysis Services` 实例不足，您可能需要为\
    \ `HW Analysis` 数据源打开数据源设计器，并将 `模拟信息` 更改为使用特定的用户名和密码。例如，我的设置是使用具有相应权限的 Windows\
    \ 用户 \"`SQLBIGEEK\\bmcdonald`\" 来部署多维数据集。成功部署 `Patient Referral OLAP` 数据库后，您可以返回“浏览器”选项卡，并单击可用链接以重新连接到数据库。\n\
    \n![Image](img/9781430238102_Fig12-02.jpg)\n\n**图 12-2.** 在 BIDS 中查看 Patient Referral\
    \ 多维数据集\n\n请执行以下步骤以查看平均 `入院时间`：\n\n> 1.  首先，在多维数据集设计窗格左侧的多维数据集对象窗口中，展开 `度量值`，然后展开\
    \ `转诊事实`（`Fact Referral`）。\n> 2.  接着，将 `入院时间`（`Time of Admission`）度量值拖到查询窗格的 `将级别或度量值拖至此处以添加到查询`\
    \ 部分。通常，在浏览多维数据集或创建报表时，您需要先拖入度量值，然后再拖入维度属性。您应该会看到一个平均时间为 14.095 天。此计算是在多维数据集最初加载和处理时完成的，代表所有维度组合的总平均入院时间。图\
    \ 12-3 显示了查询窗格中的 `入院时间` 度量值。\n>     \n>     ![Image](img/9781430238102_Fig12-03.jpg)\n\
    >     \n>     **图 12-3.** 查看所有维度的总体入院时间度量值平均值\n>     \n>     \n> 3.  现在，将两个维度对象拖放到数据窗格。在\
    \ `分支机构`（`Branch`）对象下，将 `分支机构名称`（`Branch Name`）字段拖放到我们的 `入院时间` 度量值的左侧。\n> 4. \
    \ 接下来，在 `入院日期`（`Date of Admission`）下，将 `年 - 月份名称 - 入院日期`（`Year - MonthName - admitdate`）层次结构拖放到数据窗格中\
    \ `分支机构名称` 的右侧。该层次结构看起来像一个由六个正方形组成的金字塔。完成后，多维数据集浏览器应如 图 12-4 所示。您现在可以看到每个 `admitDate`\
    \ 的结果，以及其对应的 `分支机构名称`、`年` 和 `月份名称` 属性。\n\n在早期版本的多维数据集浏览器中，您可以像在 `矩阵` 型报表中看到的那样，下钻层次结构并拥有列分组。然而，截至当前的\
    \ `SQL Server 2012` 版本，多维数据集浏览器以二维方式返回数据，很像 `T-SQL` 查询的结果。`SQL Server` 用户社区中的一些活跃成员表示，对于微软的多维数据集浏览器来说，这是一个奇怪的倒退，我个人认为他们应该恢复此功能。但是，从报表角度来看，并未发生实质性变化。如果您看到的是上面\
    \ 图 12-3 描绘的结果，那么您确实正在从多维数据集获取数据！现在是时候转到 `SSRS` 并创建您将部署到 `SharePoint` 的报表了。\n\n\
    ![Image](img/9781430238102_Fig12-04.jpg)\n\n**图 12-4.** 包含年份和分支机构的多维数据集浏览器\n\n\
    ## 将 Analysis Services 多维数据集与 SSRS 配合使用\n\n既然您已确认 `Patient Referral` 多维数据集运行正常，下一步就是创建\
    \ `SSRS` 报表。在 `Pro_SSRS` 项目中，您会找到两个已完成的报表：`平均转诊至入院` 报表和 `转诊至入院图表` 报表。这两个报表都基于\
    \ `Patient Referral` 多维数据集。由于创建报表的过程相同，我们将不会逐步演示构建这些报表的过程。不过，我们将通过 `平均转诊至入院` 报表演示以下内容：\n\
    \n> *   设置数据源以使用 `Analysis Services`\n> *   使用随 `SQL Server Reporting Services\
    \ 2005` 新增的图形化 `MDX` 查询生成器\n"
- fmt: '## Setting Up the Analysis Services Data Source


    With the `Pro_SSRS` project open, navigate to the `Reports` folder, and open the
    Average Referral to Admission report. Next, open the Report Data window. Right-click
    the `Patient_Referral` dataset and select the Query option from the submenu list.
    Notice that the query recognizes that you are using an OLAP data source with `MDX`
    and brings up the graphical `MDX` query designer. As you can see, it is very different
    from the `T-SQL` query window that we have used when accessing queries throughout
    the book. If you select filter expression and choose to filter on 2010, 2011,
    and 2012, you should see results similar to those shown in [Figure 12-5](#Chapter12.html#fig_12_5).
    There are two datasets contained in this report, `Patient_Referral` and `DateofAdmissionYear`.


    ![Image](images/9781430238102_Fig12-05.jpg)


    [Figure 12-5.](#Chapter12.html#fig_12_5) Viewing the `Patient_Referral` for the
    Average Referrals to Admission report


    The type of data source for both datasets is Microsoft SQL Server Analysis Services.
    If your Analysis Services instance is not on the local machine that you are connected
    to, you will need to change the data source server from `localhost`, defaulted
    in the report, or the default to your SSAS server name. You can do that easily
    by double-clicking the Shared Data Source named `PatRef_DS` and editing the data
    source properties to match your environment, as shown in [Figure 12-6](#Chapter12.html#fig_12_6).


    With the datasets configured properly for your SSAS environment, you will next
    look at how you build the `MDX` queries.


    ![Image](images/9781430238102_Fig12-06.jpg)


    [Figure 12-6.](#Chapter12.html#fig_12_6) Connection properties of the `PatRef_DS`
    data source


    ## Working with the Graphical MDX Query Builder


    One of the great new features introduced in `SSRS` for `SQL Server 2005`, and
    enhanced further in `2008`, is the graphical `MDX` query builder. `MDX` is a fairly
    large, complex language that is prone to syntactical errors. You must innately
    understand it to truly deliver precision data from SSAS cubes. Having and using
    a graphical query tool to form the base `MDX` query, in much the same way that
    developers use the graphical query designer for `T-SQL`, reduces common syntax
    errors and speeds development of the query.


    With the Average Referral to Admission report open to the Report Data Query window,
    notice that you have several dimensional and measure elements listed: `BranchName`,
    `Year`, `MonthName`, `Time to Admission`, and `Fact Referral Count`. By default
    the report will open in the graphical design mode, as shown in [Figure 12-7](#Chapter12.html#fig_12_7),
    and not the generic query designer. The design modes are toggled with the Design
    Mode button on the right of the toolbar. In the graphical design mode, the dimensional
    elements are dragged and dropped directly in the window from the Metadata pane
    where the elements are listed. If the Auto Execution button is selected, which
    it is by default, whenever elements are dragged and dropped, the query executes,
    and the data results are displayed.


    ![Image](images/9781430238102_Fig12-07.jpg)


    [Figure 12-7.](#Chapter12.html#fig_12_7) Output from graphical query builder


    Like the multidimensional view of the data, as you saw when you queried the same
    cube in the Patient Referral cube browser, `SSRS` sees the data two-dimensionally,
    with rows and columns. An `SSRS` report can access data from a cube; however,
    it is necessary to arrange the data two-dimensionally because this is how the
    report will aggregate the data when it sums and totals the measured values, in
    this case `Time to Admission` and `Fact Referral Count`. We have also applied
    a filter to the query so that only the years from 2010 through 2012 will be selected.


    As you may have noticed in the bottom left corner of [Figure 12-7](#Chapter12.html#fig_12_7),
    you can use several buttons on the toolbar to modify the properties of the query,
    such as showing empty cells or adding calculated members. A calculated member
    is part of the `MDX` query that is created by combining one or more elements into
    a value that can be used independently as a new element. You could, for example,
    create calculated members to not only show the average time to admission for each
    dimensional element such as `BranchName` and `Year`, but also show the minimum
    time to admission, using the `MIN` function, or the maximum time to admission,
    using the `MAX` function. The calculated members would become part of the overall
    query that could be used as new measures with data values returned at each dimensional
    level. In other words, if you had to create a calculation at the report layer
    that wasn’t created as a calculation in the cube itself, you could create a Calculated
    Member at the dataset layer of the report. For those not skilled in writing `MDX`
    calculations, this is an easy way to create report level calculations.


    With the graphical query built and working, let’s now look at the `MDX` that was
    created behind the scenes. You can do this by clicking the Design Mode toolbar
    button. [Figure 12-8](#Chapter12.html#fig_12_8) shows the `MDX` query that returns
    the selected dimensional elements and measures for the report.


    ![Image](images/9781430238102_Fig12-08.jpg)


    [Figure 12-8.](#Chapter12.html#fig_12_8) `MDX` query generated graphically


    ![Image](images/square.jpg) **Caution** If you modify the `MDX` query while in
    text mode and try to return to design mode, you could potentially lose any changes
    you made to the query manually, as shown in [Figure 12-9](#Chapter12.html#fig_12_9).


    ![Image](images/9781430238102_Fig12-09.jpg)


    [Figure 12-9.](#Chapter12.html#fig_12_9) Warning message displayed when altering
    `MDX` query


    Both reports, Average Time to Admission and Referral to Admission Chart, will
    be displayed in a compact Web Part in SharePoint, which we will show how to do
    in the next section. Because of this, we intentionally made the size of the reports
    small, with 8-point Arial font and narrow cells. [Figure 12-10](#Chapter12.html#fig_12_10)
    shows the Design tab for the Average Time to Admission report.


    ![Image](images/9781430238102_Fig12-10.jpg)


    [Figure 12-10.](#Chapter12.html#fig_12_10) Layout tab for Average Referral to
    Admission report


    At this point, we could publish both reports to the reporting services instance
    and deliver the reports to users. These two reports combine a level of BI that
    is perfect for a view within a dashboard or business portal. To that end, we will
    take a final view of the second chart-based report in the design environment and
    then move on to a fully integrated Microsoft SharePoint deployment, where the
    reports can be viewed and managed within SharePoint itself. [Figure 12-11](#Chapter12.html#fig_12_11)
    shows the Referral to Admission Chart report previewed in BIDS.


    ![Image](images/9781430238102_Fig12-11.jpg)


    [Figure 12-11.](#Chapter12.html#fig_12_11) Previewing Referral to Admission Chart
    in the design environment'
