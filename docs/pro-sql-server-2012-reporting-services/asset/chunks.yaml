    \ the graphic area of the chart, which will bring up the Chart Data window.\n\
    > 3.  Under the Values area of the Chart Data window click the green plus sign\
    \ and select Visit_Count from the drop down list.\n> 4.  Next, click the green\
    \ plus sign in the Category Groups area of the Chart Data window and select Employee_Name.\n\
    > 5.  Next, click the green plus button in the Series Group area of the Chart\
