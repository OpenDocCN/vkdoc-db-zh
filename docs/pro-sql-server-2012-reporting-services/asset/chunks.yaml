  trans: '### 分析 HTTP 流量


    `Network Monitor` 是一种数据包分析工具，可用于捕获传输至目标服务器及从目标服务器传出的所有数据包。随 `Windows` 附带的 `Network
    Monitor` 版本与其他网络捕获工具（例如 `Systems Management Server` 中包含的同一工具的版本）不同，因为它只能监听发往其运行所在机器的流量。不过，`Network
    Monitor` 默认不会随 `Windows` 一同安装。您可以在安装后通过 `添加/删除程序` 小程序来添加它。在此小程序中，选择 `添加/删除 Windows
    组件`，然后选择 `管理和监视工具`。如果无法从此处安装，您随时可以从 `Microsoft` 网站下载该应用程序。在撰写本文时，我们将使用此工具的最新版本，即
    `3.4` 版。


    在 `SSRS` 服务器上，我们将展示如何从 `管理工具` 启动 `Network Monitor`。如果您的机器上安装了多个网络接口卡（`NIC`），就像我们的情况一样，请确保选择您将用于测试的那块网卡。图
    11-1 展示了 `Network Monitor` 的主屏幕及其在网络上捕获的流量，包括广播和本地数据包。`Network Monitor` 对新手来说可能令人生畏，因为它是为那些对网络协议有超过粗浅了解的网络管理员设计的。


    ![Image](img/9781430238102_Fig11-01.jpg)


    图 11-1.`Network Monitor`


    您可以在显示中过滤掉任何不需要的流量，我们将在本节介绍这一点，因为我们将展示如何捕获 `SSRS` Web 数据。为简单起见，在我们的示例中，我们只想查看
    `端口 80` 上的 `HTTP` 流量。我们将在访问报表的客户端机器上直接运行此操作。可能会有，也确实会有很多其他流量是我们不希望在监视器中看到的，因此我们将利用过滤功能来剔除不需要的数据。例如，您可以定义一个捕获过滤器，它使用数据包中的模式匹配来限制捕获结果。或者，您可以捕获所有内容，然后配置一个显示过滤器来限制结果。在我们的案例中，我们将设置一个显示过滤器，以排除任何非
    `HTTP` 流量的内容。在新版本的网络监视器中设置过滤器比过去容易得多。我们将继续设置一个显示过滤器，以便只看到正在流动的 `HTTP` 流量。为此，开始一个新的捕获，并在捕获窗口中找到显示过滤器窗口。如果看不到它，请单击
    `查看->显示过滤器` 以将其调出。它应该类似于图 11-2。


    ![Image](img/9781430238102_Fig11-02.jpg)


    图 11-2.`查找显示过滤器窗口`


    在显示过滤器窗口内，我们需要让 `Network Monitor` 知道只显示与 `HTTP` 数据相关的数据。最快的方法是过滤掉任何源端口或目标端口不是
    `80`（标准的 `HTTP` 端口）的内容。在显示过滤器中，您将设置一个新规则来做到这一点，如图 11-3 所示。单击应用按钮以确认更改。


    现在，单击 `开始捕获` 按钮，并在 `报表管理器` 中查看页面时让捕获运行。我们将查看返回的数据，以便能够看到 `HTML` 中的纯文本信息。在此示例中，我们将查看
    `报表管理器` 的首页，看看是否能在返回的数据中找到它。


    加载报表管理器后，分析捕获到的帧揭示了一个令人不安的消息。您可以看到 `HTML` 以纯文本形式返回，如果我们不希望任何人嗅探我们的网络以查看可以从我们的任何报表中收集到什么信息，这对我们来说是不利的。这种裸露的
    `HTML` 可以在图 11-4 中看到。页面的标题和其他 `HTML` 代码清晰可读，如果报表被执行，这些信息可能被用来重建整个网页或报表。


    在这种情况下，您尚未分析其他类型的流量，例如 `端口 1433` 上的 `SQL` 请求，以查看其他协议是否也可能发送纯文本信息，但您可以使用相同的工具来进行此操作。


    ![Image](img/9781430238102_Fig11-03.jpg)


    图 11-3.`显示过滤器规则`


    ![Image](img/9781430238102_Fig11-04.jpg)


    图 11-4.`捕获到的 PI 数据`


    ![Image](img/square.jpg) **提示** 尽管我们不会介绍配置 `SQL Server` 本身以加密网络流量的步骤（因为我们将通过内部的
    `SSRS` `HTTP` 服务来完成），但必须提到 `SQL Server` 同样使用 `SSL`，并且通过安装证书，您可以轻松配置 `SQL Server`
    来传输加密数据。加密会带来最小的性能损失。此信息可以在 `APRESS` 出版的《Pro SQL Server Encryption》一书中找到。'
- fmt: '#### Applying an SSL Certificate


    Now it is time to apply a certificate to the SSRS server and rescan the traffic
    to make sure the viewable data in clear text will be encrypted.


    Several companies provide server certificates that can be installed on a Web server
    and verified directly over the Internet from the trusted site that issued the
    certificate. By using the certificates issued from these trusted sources, such
    as VeriSign, the client will automatically trust the site. Other certificates,
    such as those generated through Certificate Services in Windows, may require that
    the certificate be installed on the client machine because the client will not
    automatically trust the certificate if it cannot reach the certificate authority.
    Generally, for Internet use, it is more practical to pay the fee to use the commercial
    certificate. The online deployment uses a server certificate issued from a commercial
    certificate authority. However, for the temporary test environment, you can use
    `SelfSSL`, a handy little utility that comes with the IIS Support Tools, even
    though we are not going to be using IIS. You can download `SelfSSL` from the following
    location:


    `www.microsoft.com/downloads/details.aspx?FamilyID=56fc92ee-a71a-4c73-b628-ade629c89499&displaylang=en`


    `SelfSSL` will generate and automatically apply a temporary certificate to a Web
    site. You run `SelfSSL` from the command line on the server on which you want
    to add the certificate. Once it is installed, you can open a command prompt for
    `SelfSSL` by clicking Start > All Programs > IIS Resources > SelfSSL. The typical
    syntax will be in the following format:


    ```

    Selfssl.exe /N:CN=MACHINENAMEHERE /V:20 /T

    ```


    The `/N:CN=MACHINENAMEHERE /T` option indicates that the common name on the certificate
    will be the name of the server (You will substitute your server name in the command).
    The `/V:20` portion indicates that the certificate is valid for 20 days. The `/T`
    option instructs `SelfSSL` to add the certificate to the Trusted Certificates
    list so that the local browser will automatically use the certificate when connecting
    to the site. You can manually install a local copy of the certificate on other
    client machines that will access this server. Because `SelfSSL` installs the certificate
    that it generates, you don’t need to go through the process of generating a certificate
    request, which would normally be sent to a certificate authority.


    `Note` When you create the temporary certificate on your test server, it will
    ask if you would like to change the settings for a website on your system. There
    is no need to do this since we will be binding the certificate in the configuration
    manager manually. If you do, you may receive an error on opening the metabase,
    but you can ignore this.


    After we create and install the new SSL certificate, we need to configure `SSRS`
    to use this certificate to encrypt the HTTP traffic sent via Report Manager. Open
    the Reporting Services Configuration Manager by clicking Start > All Programs
    > Microsoft SQL Server 2012 > Configuration Tools > Reporting Services Configuration
    Manager. Once open, connect to your `SSRS 2012` instance, and click the Report
    Manager URL link in the left-hand navigation bar.


    From here, click the Advanced button to open the Advanced Multiple Web Site Configuration
    screen. You will notice that there are two sections in this configuration window.
    The top section is used to configure HTTP identities and the bottom for HTTPS/SSL
    configurations. Click the Add button in the SSL section, and in the Certificate
    drop-down select the certificate you just created. You can also configure a different
    port or specify an IP address for use, but we will be using the default for both.
    `Figure 11-5` shows you how the configuration screen should look.


    After clicking OK on both open dialogs, the `SSRS` Server configures and binds
    the new URL/port combination, and the URL is then ready for use. You will now
    see two URLs for use in the identification section of the Reporting Services Configuration
    Manager.


    ![Image](images/9781430238102_Fig11-05.jpg)


    `Figure 11-5.` Configuring the HTTPS URL'
