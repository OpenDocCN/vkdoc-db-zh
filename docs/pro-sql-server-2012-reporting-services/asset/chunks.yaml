    To test the application, right click the project in the solution explorer and
    select Debug -> Start New Instance. Visual Studio will start a stand-alone Web
    server on a random port and launch the project for debugging. Choose the report
    that you put in the directory and click the Render button. If everything is set
    up correctly, after you select some parameters on the report, you should get an
    Internet Explorer window that resembles [Figure 9-12](#Chapter09.html#fig_9_12).


    ![Image](images/9781430238102_Fig09-12.jpg)


    ***Figure 9-12.** Finalized Web report application*


    ### Summary


    In this chapter, we showed how to use the URL access capabilities of SSRS 2012
    and the Report Viewer controls to embed reports quickly into applications. Beyond
    the WebBrowser and Report Viewer controls used in this chapter, you can use other
    applications to render reports. For example, you can integrate SSRS 2012 with
    Microsoft SharePoint Server. We’ll discuss using this integration in greater detail
    in [Chapter 12](#Chapter12.html#ch12). By combining SharePoint and SSRS, you can
    quickly build a portal that displays your reports without much code at all.


    In this chapter, you also learned how to make Report Server Web service calls
    to augment your Windows Forms viewer application. The application you created
    allows you to type the URL of a server-based report you want to view. It then
    uses SSRS 2012’s GetItemParameters method to retrieve a list of report parameters
    and the ValidValues property to retrieve possible values. It then reads the values
    selected by the user and populates an array of ReportParameters which is then
    used by the Report Viewer control to render your report with the selected parameters
    already in place. In [Chapter 10](#Chapter10.html#ch10), we’ll expand on this
    example by using the Report Server Web service to allow the user to set the report
    to run on a schedule with the supplied parameters instead of rendering it immediately.


    ## C H A P T E R  10


    ## Managing Reports


    In many reporting solutions prior to SSRS, report management required little more
    than delivering the completed report file to the end user via a file share or
    embedded in a third-party application. SSRS is a full reporting environment with
    features such as scheduled report execution, report subscription services, snapshots,
    content caching, and on-demand Web access.


    With these added benefits comes an additional level of management responsibility.
    Depending on the size of the organization, some management tasks can be delegated
    to other users, such as departmental managers, who might maintain report folders
    for their departments, as well as to system administrators and DBAs. Fortunately,
    SSRS provides several means of managing the report server at all levels. In this
    chapter, you’ll continue to work with built-in tools such as Report Manager and
    command-line utilities, as well as with custom .NET management tools that take
    advantage of the SSRS programming models to administer an SSRS deployment. We’ll
    also demonstrate SSRS’s Reporting Services Configuration Manager. When connecting
    to an SSRS instance, it supplies much, if not all, of the functionality that is
    available in the Site Settings section of Report Manager and the command-line
    utilities. Using SSRS 2000 and 2005 once allowed some administrative tasks, like
    configuring report subscriptions, to be done with SSMS. However, since the 2008
    release, this functionality was removed and is now only available using the Report
    Manager. Therefore, we have chosen to use Report Manager for most of the examples
    in this chapter. Report Manager can be accessed from a Web browser and does not
    require a local install of the SQL client tools.'
