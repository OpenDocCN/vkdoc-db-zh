    of you who are savvy Excel users, you may recognize this report object from your
    tinkering in Excel. This object is essentially a single bar chart (most often
    displayed horizontally) which allows for a quick at-a-glance, row by row comparison.
    Longer bars equate to higher values and shorter bars unequivocally mean lower
    values.


    In this example, we are going to start with the report named Data Bar Start.rdl
    in our Pro_SSRS project. You will notice that there is a dataset named Emp_Svc_Cost_Data_Bar
    already defined that executes a stored procedure to return the top ten States
    and the amount of visits for the specified ServiceMonth parameter. We also have
    a table with only two columns. Expand the Emp_Svc_Cost_Data_Bar dataset and drag
    the StateName field into the first column of the details row in the table. Next
    drag the Data Bar report item into the second column of our details row. Upon
    releasing the Data Bar, you will be prompted to select the type of Data Bar that
    you want. Your options are:


    > *   Bar

    > *   Stacked Bar

    > *   100% Stacked Bar

    > *   Column

    > *   Stacked Column

    > *   100% Stacked Column


    For this example, choose Bar as shown in [Figure 5-17](#Chapter05.html#fig_5_17)
    and click OK.


    ![images](images/9781430238102_Fig05-17.jpg)


    ***Figure 5-17.** Data Bar Type Selection*


    Next, drag the Visit_Count_By_State field over top of the Data Bar and hover over
    it until the Chart Data dialog box pops up. When you see the Chart Data dialog,
    drag the selected field into the white space of the Values section, as shown in
    [Figure 5-18](#Chapter05.html#fig_5_18).


    ![images](images/9781430238102_Fig05-18.jpg)


    ***Figure 5-18.** Data Bar: Chart Data Value*


    You could stop here, but let’s add a little more pizazz to the report. Label the
    header column with the Data Bar “Visit Count.” Then make the header row Bold and
    Centered. Now, select the Data Bar—the blue bar and not the cell—and then right
    click it to bring up the dialog box and choose Show Data Labels. This will show
    the values when you run the report. Next, right click the Data Bar again and then
    select *Series Properties…* Go to the Fill tab, select Gradient with a Gradient
    style of Left right, as shown in [Figure 5-19](#Chapter05.html#fig_5_19). Then
    click on the *f*[x] button next to the primary color (top color) to create an
    expression.


    ![images](images/9781430238102_Fig05-19.jpg)


    ***Figure 5-19.** Data Bar: Series Properties fill options*


    Once you have the expression editor open, enter the following expression and click
    OK:


    `=IIF(Parameters!ServiceMonth.Label <> "ALL",IIF(Fields!Visit_Count_By_State.Value
    > 75,`

    `"Green", "Red"),IIF(Fields!Visit_Count_By_State.Value > 300, "Green", "Red"))`


    As shown in this expression, you can nest your conditional statements. Here we
    are checking to see if the parameter label selected was not ALL. Then it checks
    for the Visit_Count_By_State to see if it is more than 75 for the month selected.
    If it is, then make the Data Bar green and if not, make it red. The outer IIF
    statement checks to see if the count is greater than 300 and sets the colors accordingly.
    Click *Preview* to see your report in action, as shown in [Figure 5-20](#Chapter05.html#fig_5_20).


    ![images](images/9781430238102_Fig05-20.jpg)


    ***Figure 5-20.** Preview of the Data Bar Report*


    [Listing 5-5](#Chapter05.html#list_5_5) shows a section of the RDL file for the
    Data Bar report item.


    ***Listing 5-5.** RDL Data Bar*


    `<Chart Name="DataBar1">`

    `   <ChartCategoryHierarchy>`

    `        <ChartMembers>`

    `            <ChartMember`

    `           …`

    `                  <ChartMember>`

    `                     <Label>Visit Count By State</Label>`

    `                     </ChartMember>`

    `                     </ChartMembers>`

    `                     </ChartSeriesHierarchy>`

    `                      <ChartData>`

    `                        <ChartSeriesCollection>`

    `                          <ChartSeries Name="Visit_Count_By_State">`

    `                            <ChartDataPoints>`

    `                              <ChartDataPoint>`

    `                                <ChartDataPointValues>`

    `                                  <Y>=Sum(Fields!Visit_Count_By_State.Value)</Y>`

    `                                </ChartDataPointValues>`

    `                                <ChartDataLabel>`

    `                                  <Style />`

    `                                  <UseValueAsLabel>true</UseValueAsLabel>`

    `                                  <Visible>true</Visible>`

    `                                </ChartDataLabel>`

    `                                <Style>`

    `                                  <Color>=IIF(Parameters!ServiceMonth.Label &lt;&gt;`![Images](images/U002.jpg)

    `"ALL",IIF(Fields!Visit_Count_By_State.Value &gt; 75, "Green",`![Images](images/U002.jpg)

    `"Red"),IIF(Fields!Visit_Count_By_State.Value &gt; 300, "Green", "Red"))</Color>`

    `                                 <BackgroundGradientType>LeftRight</BackgroundGradientType>`

    `                               </Style>`


    The completed report for the Data Bar is called Data Bar.rdl in the Pro_SSRS solution.'
  trans: "\n### 实现数据条\n\n Reporting Services 2008 R2 的另一个新增功能是数据条。如果您是精通 Excel 的用户，可能会在\
    \ Excel 中探索时认出这个报表对象。该对象本质上是一个单一条形图（通常水平显示），可以快速、一目了然地逐行进行比较。条形越长代表数值越高，条形越短则明确表示数值越低。\n\
    \n在本例中，我们将从 `Pro_SSRS` 项目中名为 `Data Bar Start.rdl` 的报表开始。您会注意到，已经定义了一个名为 `Emp_Svc_Cost_Data_Bar`\
    \ 的数据集，该数据集执行一个存储过程以返回指定 `ServiceMonth` 参数下的前十个 `States`（州）及其访问次数。我们还有一个只有两列的表格。展开\
    \ `Emp_Svc_Cost_Data_Bar` 数据集，并将 `StateName` 字段拖到表格详细信息行的第一列中。接下来，将数据条报表项拖到详细信息行的第二列。释放数据条时，系统将提示您选择所需的数据条类型。您的选项是：\n\
    \n*   条形图\n*   堆积条形图\n*   百分比堆积条形图\n*   柱形图\n*   堆积柱形图\n*   百分比堆积柱形图\n\n对于本示例，请选择\
    \ `Bar`（条形图），如 `Figure 5-17` 所示，然后单击 `OK`（确定）。\n\n![images](img/9781430238102_Fig05-17.jpg)\n\
    `Figure 5-17. 数据条类型选择`\n\n接下来，将 `Visit_Count_By_State` 字段拖到数据条上方，并在其上悬停，直到 `Chart\
    \ Data`（图表数据）对话框弹出。当您看到 `Chart Data` 对话框时，将所选字段拖到 `Values`（值）区域的空白处，如 `Figure\
    \ 5-18` 所示。\n\n![images](img/9781430238102_Fig05-18.jpg)\n`Figure 5-18. 数据条：图表数据值`\n\
    \n您可以在此停止，但让我们为报表增添一些亮点。将包含数据条的标题列标记为“访问计数”。然后将标题行设为 `Bold`（加粗）和 `Centered`（居中）。现在，选择数据条——是蓝色条形，而不是单元格——然后右键单击它以调出对话框，并选择\
    \ `Show Data Labels`（显示数据标签）。这将在您运行报表时显示数值。接下来，再次右键单击数据条，然后选择 `Series Properties…`（系列属性）。转到\
    \ `Fill`（填充）选项卡，选择 `Gradient`（渐变），并将 `Gradient style`（渐变样式）设置为 `Left right`（左右），如\
    \ `Figure 5-19` 所示。然后单击主色（顶部颜色）旁边的 `f[x]` 按钮以创建表达式。\n\n![images](img/9781430238102_Fig05-19.jpg)\n\
    `Figure 5-19. 数据条：系列属性填充选项`\n\n打开表达式编辑器后，输入以下表达式并单击 `OK`（确定）：\n\n```\n=IIF(Parameters!ServiceMonth.Label\
    \ <> \"ALL\",IIF(Fields!Visit_Count_By_State.Value > 75,\n\"Green\", \"Red\"),IIF(Fields!Visit_Count_By_State.Value\
    \ > 300, \"Green\", \"Red\"))\n```\n\n如本表达式所示，您可以嵌套条件语句。这里我们检查所选参数标签是否不是 `ALL`（全部）。然后检查\
    \ `Visit_Count_By_State`，查看所选月份的访问计数是否超过 75。如果是，则将数据条设为绿色；如果不是，则设为红色。外部的 `IIF`\
    \ 语句检查计数是否大于 300，并相应地设置颜色。单击 `Preview`（预览）以查看运行中的报表，如 `Figure 5-20` 所示。\n\n![images](img/9781430238102_Fig05-20.jpg)\n\
    `Figure 5-20. 数据条报表预览`\n\n`Listing 5-5` 显示了数据条报表项 RDL 文件的一个部分。\n`Listing 5-5.\
    \ RDL 数据条`\n\n```xml\n<Chart Name=\"DataBar1\">\n   <ChartCategoryHierarchy>\n\
    \        <ChartMembers>\n            <ChartMember\n           …\n            \
    \      <ChartMember>\n                     <Label>Visit Count By State</Label>\n\
    \                     </ChartMember>\n                     </ChartMembers>\n \
    \                    </ChartSeriesHierarchy>\n                      <ChartData>\n\
    \                        <ChartSeriesCollection>\n                          <ChartSeries\
    \ Name=\"Visit_Count_By_State\">\n                            <ChartDataPoints>\n\
    \                              <ChartDataPoint>\n                            \
    \    <ChartDataPointValues>\n                                  <Y>=Sum(Fields!Visit_Count_By_State.Value)</Y>\n\
    \                                </ChartDataPointValues>\n                   \
    \             <ChartDataLabel>\n                                  <Style />\n\
    \                                  <UseValueAsLabel>true</UseValueAsLabel>\n \
    \                                 <Visible>true</Visible>\n                  \
    \              </ChartDataLabel>\n                                <Style>\n  \
    \                                <Color>=IIF(Parameters!ServiceMonth.Label <>\
    \ \"ALL\",IIF(Fields!Visit_Count_By_State.Value > 75, \"Green\", \"Red\"),IIF(Fields!Visit_Count_By_State.Value\
    \ > 300, \"Green\", \"Red\"))</Color>\n                                  <BackgroundGradientType>LeftRight</BackgroundGradientType>\n\
    \                               </Style>\n```\n\n数据条的最终报表在 `Pro_SSRS` 解决方案中名为\
    \ `Data Bar.rdl`。\n"
- fmt: "### Implementing a Sparkline\n\nAt least in my experiences, a common report\
    \ request by leadership has been to show a month over month or year over year\
    \ trend analysis. One could do this in prior versions of Reporting Services, but\
    \ it took a little more effort to get the look and feel of a true trending report.\
    \ Included with 2008 R2 release of Reporting Services was the Sparkline control.\
    \ This out-of-the-box report item is simple to use and can display vast amounts\
    \ of data in a small area.\n\nIn this example, we will start by opening the report\
    \ named `Sparkline Start.rdl` in our Pro_SSRS Reporting Services solution. You\
    \ will notice that we have created a dataset which executes a stored procedure\
    \ named `Emp_Svc_Cost_Sparkline`. This stored procedure returns the `Date`, `Month`\
    \ and `Year` a particular visit occurred. You’ll also find a Tablix containing\
    \ the `Month` field from our dataset and some appropriate headings.\n\nTo start\
    \ this example off, drag the Sparkline control from the Toolbox and place it in\
    \ the blank textbox below the Daily Trend header and choose the Area sparkline\
    \ type. This is the first type under the Area section. The other three types could\
    \ be Smooth Area, Stacked Area and 100% Stacked Area. Next, expand the `Emp_Svc_Cost_Sparkline`\
    \ dataset and drag the `Visit_Count` field on top of the new Sparkline. If you\
    \ hover over the Sparkline before releasing, you will see the Chart Data screen\
    \ as you have seen in earlier examples. Release the `Visit_Count` field into the\
    \ Values section, as shown in [Figure 5-21](#Chapter05.html#fig_5_21).\n\n![images](images/9781430238102_Fig05-21.jpg)\n\
    `Figure 5-21. Sparkline: Chart data value`\n\nUpon previewing the report, you\
    \ should see a daily trend of visits. It may seem a bit rough right now, but we’ll\
    \ make it a little nicer in a minute. You’ll also notice a parameter for `MonthlyGoal`\
    \ that we are about to implement as a variation of a key performance indicator\
    \ or KPI. As we did in the Data Bar example, we are going to change the color\
    \ of our Sparkline to be a shade of Red or Green, depending on whether we met\
    \ our monthly goal of visits. Click the Design tab to make some more edits to\
    \ our Sparkline report.\n\nDouble click on your Sparkline control and then right\
    \ click `Visit_Count` in the Chart Data window. Choose Series Properties and navigate\
    \ to the Fill tab. Select Gradient as the Fill Style, White as the Secondary Color\
    \ and a Gradient Style of Top Bottom. Finally, let’s set an expression to change\
    \ color based on our `MonthlyGoal` parameter. Click the `f(x)` button to the right\
    \ of the top color choice to create an expression. Clear out the default text,\
    \ enter the following expression, and click OK to close the expression editor.\
    \ The Series Properties window should appear as [Figure 5-22](#Chapter05.html#fig_5_22).\n\
    \n`IIF(SUM(Fields!Visit_Count!Value,\"Month\") >= Parameters!MonthlyGoal.Value,\
    \ \"Green\", \"Red\")`\n![images](images/9781430238102_Fig05-22.jpg)\n`Figure\
    \ 5-22. Sparkline: Series fill options`\n\nWe’ll be covering expressions later,\
    \ but this expression is essentially comparing the total count of visits for the\
    \ month group against the value selected in the monthly goal parameter. [Figure\
    \ 5-23](#Chapter05.html#fig_5_23) displays the report in preview mode. Change\
    \ your `Monthly Goal` to 2000 and click the `View Report` button to see the dynamic\
    \ nature of our color expression. Normally, KPI’s are not implemented in this\
    \ manner, but one could see how to use a value to dynamically change the colors\
    \ to provide an at-a-glance visual indicator as to the success or failure of meeting\
    \ predefined goals. Normally, these values would be stored in a database to allow\
    \ the value to be configurable.\n\n![images](images/9781430238102_Fig05-23.jpg)\n\
    `Figure 5-23. Sparkline: Previewing the report`\n\n![images](images/square.jpg)\
    \ **Note** We will go into more detail on this throughout the book, but one thing\
    \ to take note of, in this example, is that I created a group for `Month` and\
    \ removed the `Details` group. This allowed me to create the trend on a month-by-month\
    \ basis when the stored procedure returned a day-by-day result set.\n\n[Listing\
    \ 5-6](#Chapter05.html#list_5_6) shows a section of the RDL file for the Sparkline\
    \ control.\n`Listing 5-6. RDL Sparkline`\n\n```\n<Chart Name=\"Sparkline4\">\n\
    <ChartCategoryHierarchy>\n<ChartMembers>\n    <ChartMember>\n    <Group Name=\"\
    ChartGroup\" />\n    <Label />\n    </ChartMember>\n</ChartMembers>\n</ChartCategoryHierarchy>\n\
    <ChartSeriesHierarchy>\n<ChartMembers>\n    <ChartMember>\n    <Label>Visit Count</Label>\n\
    \    </ChartMember>\n</ChartMembers>\n</ChartSeriesHierarchy>\n<ChartData>\n<ChartSeriesCollection>\n\
    \    <ChartSeries Name=\"Visit_Count\">\n    <ChartDataPoints>\n        <ChartDataPoint>\n\
    \        <ChartDataPointValues>\n            <Y>=Sum(Fields!Visit_Count.Value)</Y>\n\
    \        </ChartDataPointValues>\n        <ChartDataLabel>\n            <Style\
    \ />\n        </ChartDataLabel>\n        <Style>\n            <Color>=IIF(SUM(Fields!Visit_Count.Value,\"\
    Month\") &gt;=\n            Parameters!MonthlyGoal.Value, \"Green\", \"Red\")</Color>\n\
    \           <BackgroundGradientType>TopBottom</BackgroundGradientType>\n     \
    \      <BackgroundGradientEndColor>White</BackgroundGradientEndColor>\n      \
    \ </Style>\n```\n\nThe completed report for the Sparkline is called `Sparkline.rdl`\
    \ in the Pro_SSRS solution."
  raw: '### Implementing a Sparkline


    At least in my experiences, a common report request by leadership has been to
    show a month over month or year over year trend analysis. One could do this in
    prior versions of Reporting Services, but it took a little more effort to get
    the look and feel of a true trending report. Included with 2008 R2 release of
    Reporting Services was the Sparkline control. This out-of-the-box report item
    is simple to use and can display vast amounts of data in a small area.


    In this example, we will start by opening the report named Sparkline Start.rdl
    in our Pro_SSRS Reporting Services solution. You will notice that we have created
    a dataset which executes a stored procedure named Emp_Svc_Cost_Sparkline. This
    stored procedure returns the Date, Month and Year a particular visit occurred.
    You’ll also find a Tablix containing the month field from our dataset and some
    appropriate headings.


    To start this example off, drag the Sparkline control from the Toolbox and place
    it in the blank textbox below the Daily Trend header and choose the Area sparkline
    type. This is the first type under the Area section. The other three types could
    be Smooth Area, Stacked Area and 100% Stacked Area. Next, expand the Emp_Svc_Cost_Sparkline
    dataset and drag the Visit_Count field on top of the new Sparkline. If you hover
    over the Sparkline before releasing, you will see the Chart Data screen as you
    have seen in earlier examples. Release the Visit_Count field into the Values section,
    as shown in [Figure 5-21](#Chapter05.html#fig_5_21).


    ![images](images/9781430238102_Fig05-21.jpg)


    ***Figure 5-21.** Sparkline: Chart data value*


    Upon previewing the report, you should see a daily trend of visits. It may seem
    a bit rough right now, but we’ll make it a little nicer in a minute. You’ll also
    notice a parameter for MonthlyGoal that we are about to implement as a variation
    of a key performance indicator or KPI. As we did in the Data Bar example, we are
    going to change the color of our Sparkline to be a shade of Red or Green, depending
    on whether we met our monthly goal of visits. Click the Design tab to make some
    more edits to our Sparkline report.


    Double click on your Sparkline control and then right click Visit_Count in the
    Chart Data window. Choose Series Properties and navigate to the Fill tab. Select
    Gradient as the Fill Style, White as the Secondary Color and a Gradient Style
    of Top Bottom. Finally, let’s set an expression to change color based on our MonthlyGoal
    parameter. Click the *f*[x] button to the right of the top color choice to create
    an expression. Clear out the default text, enter the following expression, and
    click OK to close the expression editor. The Series Properties window should appear
    as [Figure 5-22](#Chapter05.html#fig_5_22).


    `=IIF(SUM(Fields!Visit_Count!Value,"Month") >= Parameters!MonthlyGoal.Value, "Green",
    "Red")` ![images](images/9781430238102_Fig05-22.jpg)


    ***Figure 5-22.** Sparkline: Series fill options*


    We’ll be covering expressions later, but this expression is essentially comparing
    the total count of visits for the month group against the value selected in the
    monthly goal parameter. [Figure 5-23](#Chapter05.html#fig_5_23) displays the report
    in preview mode. Change your Monthly Goal to 2000 and click the View Report button
    to see the dynamic nature of our color expression. Normally, KPI’s are not implemented
    in this manner, but one could see how to use a value to dynamically change the
    colors to provide an at-a-glance visual indicator as to the success or failure
    of meeting predefined goals. Normally, these values would be stored in a database
    to allow the value to be configurable.


    ![images](images/9781430238102_Fig05-23.jpg)


    ***Figure 5-23.** Sparkline: Previewing the report*


    ![images](images/square.jpg) **Note** We will go into more detail on this throughout
    the book, but one thing to take note of, in this example, is that I created a
    group for Month and removed the Details group. This allowed me to create the trend
    on a month-by-month basis when the stored procedure returned a day-by-day result
    set.


    [Listing 5-6](#Chapter05.html#list_5_6) shows a section of the RDL file for the
    Sparkline control.


    ***Listing 5-6.** RDL Sparkline*


    `<Chart Name="Sparkline4">`

    `<ChartCategoryHierarchy>`

    `<ChartMembers>`

    `    <ChartMember>`

    `    <Group Name="ChartGroup" />`

    `    <Label />`

    `    </ChartMember>`

    `</ChartMembers>`

    `</ChartCategoryHierarchy>`

    `<ChartSeriesHierarchy>`

    `<ChartMembers>`

    `    <ChartMember>`

    `    <Label>Visit Count</Label>`

    `    </ChartMember>`

    `</ChartMembers>`

    `</ChartSeriesHierarchy>`

    `<ChartData>`

    `<ChartSeriesCollection>`

    `    <ChartSeries Name="Visit_Count">`

    `    <ChartDataPoints>`

    `        <ChartDataPoint>`

    `        <ChartDataPointValues>`

    `            <Y>=Sum(Fields!Visit_Count.Value)</Y>`

    `        </ChartDataPointValues>`

    `        <ChartDataLabel>`

    `            <Style />`

    `        </ChartDataLabel>`

    `        <Style>`

    `            <Color>=IIF(SUM(Fields!Visit_Count.Value,"Month") &gt;=`![Images](images/U002.jpg)

    `Parameters!MonthlyGoal.Value, "Green", "Red")</Color>`

    `           <BackgroundGradientType>TopBottom</BackgroundGradientType>`

    `           <BackgroundGradientEndColor>White</BackgroundGradientEndColor>`

    `       </Style>`


    The completed report for the Sparkline is called Sparkline.rdl in the Pro_SSRS
    solution.'
  trans: "\n### 实现迷你图\n\n根据我的经验，领导层常见的报表需求之一是展示月度或年度趋势分析。虽然在早期版本的 Reporting Services\
    \ 中也能实现这种效果，但要做出真正具有趋势感的外观需要更多功夫。Reporting Services 2008 R2 版本引入了**迷你图控件**。这个开箱即用的报表项使用简单，能在很小的区域内展示大量数据。\n\
    \n在本例中，我们将首先在 Pro_SSRS Reporting Services 解决方案中打开名为 `Sparkline Start.rdl` 的报表。你会注意到我们已创建了一个数据集，它执行名为\
    \ `Emp_Svc_Cost_Sparkline` 的存储过程。此存储过程返回每次访问发生的 `Date`（日期）、`Month`（月份）和 `Year`（年份）。你还会发现一个\
    \ Tablix，其中包含数据集中的 `Month` 字段以及一些合适的标题。\n\n首先，从工具箱中拖动迷你图控件，将其放置在 \"Daily Trend\"\
    \ 标题下方的空白文本框中，并选择\"区域\"迷你图类型。这是\"区域\"部分下的第一种类型。其他三种类型可以是\"平滑区域\"、\"堆积区域\"和\"百分比堆积区域\"\
    。接下来，展开 `Emp_Svc_Cost_Sparkline` 数据集，并将 `Visit_Count` 字段拖到新的迷你图上方。如果在释放之前将鼠标悬停在迷你图上，你会看到如之前示例中见过的\"\
    图表数据\"屏幕。将 `Visit_Count` 字段释放到\"值\"部分，如图 5-21 所示。\n\n![images](img/9781430238102_Fig05-21.jpg)\n\
    `图 5-21. 迷你图：图表数据值`\n\n预览报表时，你应该会看到访问量的每日趋势。目前可能看起来有些粗糙，但我们稍后会让它变得更好一些。你还会看到一个\
    \ `MonthlyGoal`（月度目标）参数，我们即将实现它，作为关键绩效指标（KPI）的一种变体。就像在数据条示例中一样，我们将根据是否达到月度访问目标，将迷你图的颜色更改为红色或绿色的阴影。点击\"\
    设计\"选项卡，对迷你图报表进行更多编辑。\n\n双击你的迷你图控件，然后在图表数据窗口中右键单击 `Visit_Count`。选择\"序列属性\"，并导航到\"\
    填充\"选项卡。选择\"渐变\"作为填充样式，\"白色\"作为辅助颜色，渐变样式为\"上下\"。最后，让我们设置一个表达式，根据 `MonthlyGoal`\
    \ 参数来改变颜色。点击顶部颜色选择右侧的 `f(x)` 按钮以创建表达式。清除默认文本，输入以下表达式，然后单击\"确定\"关闭表达式编辑器。序列属性窗口应如图\
    \ 5-22 所示。\n\n`IIF(SUM(Fields!Visit_Count!Value,\"Month\") >= Parameters!MonthlyGoal.Value,\
    \ \"Green\", \"Red\")`\n![images](img/9781430238102_Fig05-22.jpg)\n`图 5-22. 迷你图：序列填充选项`\n\
    \n我们将在后面详细介绍表达式，但这个表达式本质上是比较月份组的访问总量与在月度目标参数中选择的值。图 5-23 展示了预览模式下的报表。将你的 `Monthly\
    \ Goal` 更改为 2000，然后单击 `View Report` 按钮，以查看我们颜色表达式的动态特性。通常，KPI 并非以这种方式实现，但可以了解如何使用一个值来动态改变颜色，以提供关于是否达到预定目标的、一目了然的视觉指示。通常，这些值会存储在数据库中以便进行配置。\n\
    \n![images](img/9781430238102_Fig05-23.jpg)\n`图 5-23. 迷你图：预览报表`\n\n![images](img/square.jpg)\
    \ **注意** 我们将在本书中更详细地讨论这一点，但在本例中需要注意的一点是，我为 `Month` 创建了一个组并移除了 `Details`（详细信息）组。这使我能够在存储过程返回每日结果集的情况下，按月创建趋势。\n\
    \n清单 5-6 显示了迷你图控件 RDL 文件的一部分。\n`清单 5-6. RDL 迷你图`\n\n```\n<Chart Name=\"Sparkline4\"\
    >\n<ChartCategoryHierarchy>\n<ChartMembers>\n    <ChartMember>\n    <Group Name=\"\
    ChartGroup\" />\n    <Label />\n    </ChartMember>\n</ChartMembers>\n</ChartCategoryHierarchy>\n\
    <ChartSeriesHierarchy>\n<ChartMembers>\n    <ChartMember>\n    <Label>Visit Count</Label>\n\
    \    </ChartMember>\n</ChartMembers>\n</ChartSeriesHierarchy>\n<ChartData>\n<ChartSeriesCollection>\n\
    \    <ChartSeries Name=\"Visit_Count\">\n    <ChartDataPoints>\n        <ChartDataPoint>\n\
    \        <ChartDataPointValues>\n            <Y>=Sum(Fields!Visit_Count.Value)</Y>\n\
    \        </ChartDataPointValues>\n        <ChartDataLabel>\n            <Style\
    \ />\n        </ChartDataLabel>\n        <Style>\n            <Color>=IIF(SUM(Fields!Visit_Count.Value,\"\
    Month\") &gt;=\n            Parameters!MonthlyGoal.Value, \"Green\", \"Red\")</Color>\n\
    \           <BackgroundGradientType>TopBottom</BackgroundGradientType>\n     \
    \      <BackgroundGradientEndColor>White</BackgroundGradientEndColor>\n      \
    \ </Style>\n```\n\n迷你图的完整报表在 Pro_SSRS 解决方案中名为 `Sparkline.rdl`。\n"
- fmt: "### Implementing an Indicator\n\n在 Reporting Services 2005 和 2008 中，我们可以创建在包含\
    \ KPI 的报表中看到的功能。然而，这需要在表达式的使用上发挥一些创意。例如，如果希望基于结果集中的某个特定值显示图像，就需要根据表达式设置每个图像的可见性。这种方法实现起来并不太困难，但维护起来更复杂。在\
    \ 2008 R2 中，我们通过 Indicator 报表项直接获得了此功能，开箱即用。\n\n很多时候，我们报表的消费者希望看到一个视觉指示器，以基本的方向性方式显示趋势。例如，人们可能想知道总访问量是比上月增加、持平还是减少。如果我们看到负面结果的持续趋势，决策者可能希望更深入地探究可能的原因。这就是我们在本示例中将创建的报表风格。我们的决策者希望看到总访问量相对于上月的当前状态。\n\
    \n在本示例中，我们将从 Pro_SSRS 解决方案中的 `Indicator Start.rdl` 开始。`Indicator Start` 报表中包含一个返回四年样本访问数据的数据集。您还会注意到有一个包含三列的\
    \ `Tablix`。其中两列已经包含了报表所需的部分数据，第三列将用于我们的 `Indicator` 报表项。我们已经向您展示了一些将项目添加到报表设计\
    \ surface 的方法，但与许多应用程序一样，通常可以通过多种不同的方式完成相同的任务。\n\n右键单击 `Tablix1` 中的空文本框，在子上下文菜单底部选择\
    \ `Insert`，然后选择 `Indicator`。当您向报表添加 `Indicator` 报表项时，会提示您使用 `Indicator Wizard`，如\
    \ [Figure 5-24](#Chapter05.html#fig_5_24) 所示。有四类指示器可供选择。但是，这些指示器中的每一个都可以自定义，包括颜色和用于控制它们的值。您甚至可以添加更多的指示器状态，使用自己的自定义图像，或将图像嵌入到\
    \ Gauge 控件中。\n\n![images](images/9781430238102_Fig05-24.jpg)\n\n**Figure 5-24.**\
    \ Indicator: Indicator type selection\n\n我们将使用默认的 `Directional` 指示器，即带有三个箭头的那个。确保该指示器被选中。然后单击\
    \ `OK` 返回报表设计器。此时，我们已经添加了一个指示器，但尚未告诉它使用哪个字段。右键单击指示器，选择 `Indicator Properties`，然后选择\
    \ `Values and States` 选项卡。这是大多数魔法发生的地方。将 `Value` 设置为 `=SUM(Fields!Diff.Value)`，因为您希望显示当前月份和上个月之间的差异，如\
    \ [Figure 5-25](#Chapter05.html#fig_5_25) 所示。接下来，将 `States Measurement Unit` 从\
    \ `Percentage` 切换为 `Numeric`。如果您的结果是以变化百分比的形式返回的，那么请将其保留为默认设置。如果要添加或减少指示器状态的数量，可以分别单击\
    \ `Add` 或 `Delete` 按钮来实现。三个值将满足本示例的需求，因此对起始值和结束值进行以下更改：\n\n*   红色向下箭头 – 清除起始值并将\
    \ -1 设置为结束值。这本质上是告诉 SSRS，任何负值都应由红色向下箭头表示。\n*   黄色向右箭头 – 将起始值和结束值都设置为 0，以表示当前和上月的总访问计数没有变化。\n\
    *   绿色向上箭头 – 在起始值中输入 1，并清除结束值，以将所有正值显示为相对于上月的访问量增加。\n\n![images](images/9781430238102_Fig05-25.jpg)\n\
    \n**Figure 5-25.** Indicator properties\n\n完成所需的更改后，单击 `OK` 返回到 `Indicator Start`\
    \ 报表。单击 `Preview` 选项卡以运行报表。如果所有设置都正确，您的报表应如 [Figure 5-26](#Chapter05.html#fig_5_26)\
    \ 所示。\n\n![images](images/9781430238102_Fig05-26.jpg)\n\n**Figure 5-26.** Preview\
    \ Indicator Start\n\n[Listing 5-7](#Chapter05.html#list_5_7) 显示了 `Indicator` 报表项的\
    \ RDL 文件的整合部分。\n\n**Listing 5-7.** RDL Indicator\n\n```\n<StateIndicator Name=\"\
    Indicator1\">\n <GaugeInputValue>\n   <Value>=Sum(Fields!Diff.Value)</Value>\n\
    \   <Multiplier>1</Multiplier>\n   <DataElementOutput>NoOutput</DataElementOutput>\n\
    \ </GaugeInputValue>\n <TransformationType>None</TransformationType>\n <TransformationScope>Tablix1</TransformationScope>\n\
    \ ...\n <IndicatorStates>\n   <IndicatorState Name=\"ArrowDown\">\n     <StartValue>\n\
    \       <Value />\n       <Multiplier>1</Multiplier>\n     </StartValue>\n   \
    \  <EndValue>\n       <Value>-1</Value>\n       <Multiplier>1</Multiplier>\n \
    \    </EndValue>\n     <Color>Red</Color>\n     <ScaleFactor>0.99</ScaleFactor>\n\
    \     <IndicatorStyle>ArrowDown</IndicatorStyle>\n     <IndicatorImage>\n    \
    \   <Source>External</Source>\n       <Value />\n     </IndicatorImage>\n   </IndicatorState>\n\
    \   <IndicatorState Name=\"ArrowSide\">\n     ...\n   <IndicatorState Name=\"\
    ArrowUp\">\n     ...\n   </IndicatorState>\n </IndicatorStates>\n```\n\n完整的 `Indicator`\
    \ 报表在 Pro_SSRS 解决方案中称为 `Indicator.rdl`。\n\n### Summary\n\n在本章中，我们介绍了 Reporting\
    \ Services 中一些视觉上更吸引人的对象，例如图表、地图和仪表。这些对象通常出现在仪表板风格的报表中，以提供一目了然的视角。我们还概述了图表数据区域，并逐步介绍了可用的不同图表类型的示例。既然您对设计环境更加熟悉了，您将学习如何使用它来设计和部署一些真实的报表。在下一章中，我们将展示如何采用循序渐进的方法，将这些报表项添加到作为医疗保健应用程序\
    \ SSRS 迁移一部分而设计的报表中。\n\n## Chapter 6"
  raw: '### Implementing an Indicator


    In Reporting Services 2005 and 2008, we could create the functionality that we
    see in reports containing KPI’s. However, it took a little creativity in the use
    of expressions. For example, if you wanted to show an image based on a certain
    value in a result set, you would need to set the visibility of each of the images
    to be based on an expression. That approach is not too difficult to implement,
    but it is a more difficult to maintain. In 2008 R2, we were provided this functionality
    right out of the box with the Indicator report item.


    Often times, the consumers of our reports like to see a visual indicator as to
    the trend in a basic directional fashion. For example, one may want to see if
    the total visits were higher than last month, the same or was it less. If we see
    a consistent trend of negative results, decision makers may want to dig deeper
    into the possible causes. This is the style of the report that we are going to
    create in this example. Our decision makers want to see the current state of total
    visits in relation to the prior month.


    In this example, we will start off with Indicator Start.rdl in our Pro_SSRS solution.
    Included in the Indicator Start report is a dataset that returns four years of
    sample visit data. You will also notice that there is a tablix with three columns.
    Two of these already have some of the data needed on the report and a third will
    be used for our Indicator report item. We have shown you some of the ways to add
    items to your report design surface, but as with many applications, one can often
    complete the same task several different ways.


    Right click on the empty textbox in Tablix1, select *Insert* at the bottom of
    the sub-context menu, and choose *Indicator*. When you add an Indicator report
    item to a report, you are prompted with the Indicator Wizard as shown in [Figure
    5-24](#Chapter05.html#fig_5_24). There are four categories of indicators which
    you can choose. However, each of these indicators can be customized down to the
    color and the values used to control them. You can even add more indicator states,
    use your very own custom images, or embed images within the Gauge control.


    ![images](images/9781430238102_Fig05-24.jpg)


    ***Figure 5-24.** Indicator: Indicator type selection*


    We are going to use the default Directional indicator, the one with three arrows.
    Be sure that indicator is selected. Then click OK to return to the report designer.
    At this point, we have added an indicator, but we have yet to tell it what field
    to use. Right click on the indicator, select *Indicator Properties* and choose
    the *Values and States* tab. This is the screen where most of the magic happens.
    Set the Value to be `=SUM(Fields!Diff.Value),` as you want to display the difference
    between the current month and prior month as shown in [Figure 5-25](#Chapter05.html#fig_5_25).
    Next, switch the *States Measurement Unit* to Numeric from Percentage. If your
    results were coming back as a percentage of change value, then you would leave
    this at its default setting. If you wanted to add or reduce the number of indicator
    states, you could do that by clicking the Add or Delete buttons, respectively.
    Three values will suit our needs in this example, so make the following changes
    to the start and end values:


    > *   Red Down Arrow – Clear the start value and set -1 as the end. This essentially
    is telling SSRS that anything negative should be represented by the red down arrow.

    > *   Yellow Right Arrow – Set the start and the end values to 0 to represent
    no change in the current and prior total visit counts.

    > *   Green Up Arrow – Enter a 1 in the start value and clear out the end value
    to show all positive values as an increase in visits over prior month.


    ![images](images/9781430238102_Fig05-25.jpg)


    ***Figure 5-25.** Indicator properties*


    After you have made the required changes, click OK to return to the Indicator
    Start report. Click the Preview tab to run the report. If all settings are set
    appropriately, your report should look like [Figure 5-26](#Chapter05.html#fig_5_26).


    ![images](images/9781430238102_Fig05-26.jpg)


    ***Figure 5-26.** Preview Indicator Start*


    [Listing 5-7](#Chapter05.html#list_5_7) shows a consolidated section of the RDL
    file for the Indicator report item.


    ***Listing 5-7.** RDL Indicator*


    `<StateIndicator Name="Indicator1">`

    ` <GaugeInputValue>`

    `   <Value>=Sum(Fields!Diff.Value)</Value>`

    `   <Multiplier>1</Multiplier>`

    `   <DataElementOutput>NoOutput</DataElementOutput>`

    ` </GaugeInputValue>`

    ` <TransformationType>None</TransformationType>`

    ` <TransformationScope>Tablix1</TransformationScope>`

    ` ...`

    ` <IndicatorStates>`

    `   <IndicatorState Name="ArrowDown">`

    `     <StartValue>`

    `       <Value />`

    `       <Multiplier>1</Multiplier>`

    `     </StartValue>`

    `     <EndValue>`

    `       <Value>-1</Value>`

    `       <Multiplier>1</Multiplier>`

    `     </EndValue>`

    `     <Color>Red</Color>`

    `     <ScaleFactor>0.99</ScaleFactor>`

    `     <IndicatorStyle>ArrowDown</IndicatorStyle>`

    `     <IndicatorImage>`

    `       <Source>External</Source>`

    `       <Value />`

    `     </IndicatorImage>`

    `   </IndicatorState>`

    `   <IndicatorState Name="ArrowSide">`

    `     ...`

    `   <IndicatorState Name="ArrowUp">`

    `     ...`

    `   </IndicatorState>`

    ` </IndicatorStates>`


    The completed report for the Indicator is called Indicator.rdl in the Pro_SSRS
    solution.


    ### Summary


    In this chapter, we covered some of the more visually appealing objects in Reporting
    Services, such as charting, maps, and gauges. Most of these objects are typically
    found in dashboard style reporting to provide an at-a-glance perspective. We also
    went over the chart data region and walked through examples of the different chart
    types available. Now that you’re more comfortable with the design environment,
    you’ll learn how to use it to design and deploy some real reports. In the next
    chapter, we’ll show how to take a step-by-step approach to adding these report
    items to a report that was designed as part of an SSRS migration for a health
    care application.


    ## C H A P T E R  6'
