  trans: '### 使用 rs.exe 实用程序


    为了访问 SSRS Web 服务之一，Reporting Services 为我们提供了一个名为`rs.exe`的命令行实用程序。此实用程序使用用 VB .NET
    编写的脚本文件（这是唯一可以与`rs`实用程序一起使用的语言）来访问 Web 服务，并允许我们调用 Web 服务中任何已发布的方法。在此示例中，您将通过`rs.exe`实用程序创建文件夹、部署报告并创建新的数据源。


    您可以在本书第 8 章代码示例的`RS`文件夹下看到本示例使用的两个文件。您会找到一个包含报告定义的 RDL 文件（将用于部署）和一个包含用于部署报告及创建报告所需数据源的
    VB .NET 代码的 RSS 文件。如果您的代码不在`C:\Pro_SSRS\CH8\RS`文件夹中，则需要进行一些配置。


    RSS 文件在顶部声明了两个全局变量。这些变量保存了报告将在报告服务器上部署的位置以及您计算机上 RDL 文件存在的位置信息。您可以在清单 8-1 中看到这两个变量。您应根据您的设置对这些变量进行必要的更改。


    **清单 8-1. RSS 文件配置**


    ```vb

    Dim parentPath As String = "Pro_SSRS/Chapter 8"

    Dim reportPath As String = "C:\Pro_SSRS\CH8\RS\"

    ```


    配置好 RSS 文件后，我们将讨论所使用的三个 Web 服务方法。第一个是`CreateDataSource`。此方法在报告服务器上创建新的数据源，并接受以下五个参数：


    > *   `DataSource`: 要创建的数据源的名称

    > *   `Parent`: 数据源将在报告服务器上创建的完整路径

    > *   `Overwrite`: 一个布尔变量，用于表示是否覆盖同名的现有数据源

    > *   `Definition`: 一个`DataSourceDefinition`类型的对象，保存数据源的连接属性

    > *   `Properties`: 一个`Property[]`对象的数组，保存数据源的属性名和值


    第二个使用的 Web 服务方法是`CreateReport`。此方法在服务器上创建新的报告，并接受以下五个参数：


    > *   `Report`: 要创建的报告的名称

    > *   `Parent`: 报告将部署到的报告服务器上的完整路径

    > *   `Overwrite`: 一个布尔变量，用于表示是否覆盖同名的现有报告

    > *   `Definition`: 保存报告定义的字节数组

    > *   `Properties`: 一个`Property[]`对象的数组，保存报告的属性名和值


    最后一个使用的 Web 服务方法是`CreateFolder`。此方法在服务器上创建新文件夹，并接受以下三个参数：


    > *   `Folder`: 要创建的文件夹的名称

    > *   `Parent`: 您正在创建的文件夹的父级名称

    > *   `Properties`: 一个`Property[]`对象的数组，保存新文件夹的属性名和值


    RSS 文件中的`Main`函数调用了三个内部函数：一个利用`CreateFolder`方法，一个利用`CreateDataSource`方法，另一个利用`CreateReport`方法。根据您的需要，您可以使用这三个函数创建更多的文件夹和数据源，或部署更多的报告。在此示例中，我们每个函数调用了一次，但您可以修改此文件以部署任意数量的报告或数据源。您可以在清单
    8-2 中看到 RSS 文件的完整代码。


    **清单 8-2. RSS 文件内容**


    ```vb

    Dim parentPath As String = "Pro_SSRS/Chapter 8"

    Dim reportPath As String = "C:\PRO_SSRS\Chapter 8\RS\"


    Public Sub Main()


        '' 初始化 Reporting Services 凭证

        rs.Credentials = System.Net.CredentialCache.DefaultCredentials


           '' 传递我们的路径信息以创建文件夹结构

           CreateFolder(parentPath, "/")


        '' 传递我们的数据源信息到创建数据源函数

        CreateDataSource("Pro_SSRS", "SQL", "data source=(local);initial catalog=Pro_SSRS")


        '' 传递我们的报告名称到部署报告函数

        DeployReport("EmployeeServiceCost")


    End Sub


    Public Sub CreateDataSource(name As String, extension As String, connectionString
    As String)

        '' 定义数据源定义。

        Dim dataSourceDefinition As New DataSourceDefinition()


        dataSourceDefinition.CredentialRetrieval = CredentialRetrievalEnum.Integrated

        dataSourceDefinition.ConnectString = connectionString

        dataSourceDefinition.Enabled = True

        dataSourceDefinition.EnabledSpecified = True

        dataSourceDefinition.Extension = extension

        dataSourceDefinition.ImpersonateUser = False

        dataSourceDefinition.ImpersonateUserSpecified = True


        ''使用默认提示字符串。

        dataSourceDefinition.Prompt = Nothing

        dataSourceDefinition.WindowsCredentials = False


        Try

            '' 通过 Web 服务方法创建数据源

            rs.CreateDataSource(name, "/" + parentPath, False, dataSourceDefinition,
    Nothing)


            '' 创建成功时显示成功消息

            Console.WriteLine("数据源 {0} 创建成功", name)

        Catch e As Exception

            '' 如果创建失败，捕获异常并显示结果

            Console.WriteLine(e.Message)

        End Try


    End Sub


    Public Sub DeployReport(ByVal reportName As String)


        Dim definition As [Byte]() = Nothing

        Dim warnings As Warning() = Nothing   


        Try

            '' 尝试将报告作为文件流打开以读取报告定义信息

            Dim stream As FileStream = File.OpenRead(reportPath + reportName + ".rdl")

            definition = New Byte {}

            stream.Read(definition, 0, CInt(stream.Length))

            stream.Close()


            Try

               '' 尝试通过 Web 服务部署报告

               warnings = rs.CreateReport(reportName, "/" + parentPath, False, definition,
    Nothing)


               If Not (warnings Is Nothing) Then

                   Dim warning As Warning

                   For Each warning In warnings

                      Console.WriteLine(warning.Message)

                      Next warning


               Else

                   Console.WriteLine("报告: {0} 成功发布，没有警告", reportName)

                End If


            Catch e As Exception

                    Console.WriteLine(e.Message)

            End Try


        Catch e As IOException

            Console.WriteLine(e.Message)

        End Try


    End Sub


    Public Sub CreateFolder(ByVal folderName as String, ByVal ParentFolder as String)

           Dim extraName As String

           Dim newFolder As String


           if( folderName.IndexOf("/") <> -1 )

                  newFolder = folderName.Substring(0, folderName.IndexOf("/"))

                  extraName = folderName.Substring(folderName.IndexOf("/")+1)

           else

                  newFolder = folderName

                  extraName = ""

           end if


           Dim props(0) As [Property]

           Dim folderProp As new [Property]()


           folderProp.Name = "文件夹名称"

           folderProp.Value  = newFolder


           props(0) = folderProp


        rs.CreateFolder(newFolder, parentFolder, props)

           Console.WriteLine("文件夹 " + newFolder + " 已创建")


           if( extraName <> "" and parentFolder = "/")

                  CreateFolder(extraName, parentFolder + newFolder)

           else if(extraName <> "")

                  CreateFolder(extraName, parentFolder + "/" + newFolder)

           end if

    End Sub

    ```'
- fmt: '![Image](images/square.jpg) **Note** You can deploy a set of data sources
    and reports to multiple SSRS servers easily with the `rs.exe` utility. To mirror
    deployment with the same RSS script file, simply rerun the RS command with a different
    server parameter. Creating a batch file that calls `rs.exe` multiple times with
    different server destinations is an easy way to deploy projects exactly the same
    way to several locations.


    The only function that gets called more than once is our user defined `CreateFolder`
    method. This is a recursive function that will parse the name of the folder you
    want to create and build it piece by piece. In order to cut down on space, there
    is no error checking here. So, if you run this example more than once, you will
    need to clean up the folders that this creates or it will throw an exception due
    to the fact that the folder already exists.


    From a command prompt, move to the directory where the RDL and RSS file are being
    stored. Type the following command in the command prompt, and press Enter to run
    it. Change the report server URL to reflect your report server.


    ```

    rs -i PublishReports.rss -s http://localhost/reportserver

    ```


    You can see the command and the results in [Figure 8-11](#Chapter08.html#fig_8_11).


    You now have a new data source and report deployed to your report server. The
    RSS file included in the example code can be used as a starting point to script
    your own custom report project deployments.


    ![Image](images/9781430238102_Fig08-11.jpg)


    ***Figure 8-11.** Deploying a report and data source with the `rs.exe` utility*


    ### Using the Report Server Web Service


    The method provided by SSRS 2012 for deploying reports programmatically is to
    use one of the Report Server Web services using the SOAP API (which we will use
    again in [Chapter 9](#Chapter09.html#ch9) to write a report viewer). In this section,
    we’ll look at deploying reports to SSRS 2012 by using a Windows Forms application
    that simulates what customers need to do after they have an RDL file ready for
    deployment:


    > *   Select a report server to publish their report to.

    > *   Select from a displayed list of folders on that server to determine which
    folder on the server to publish the report to.

    > *   Browse to the RDL file that is to be uploaded from the local machine to
    their report server.


    There are several web service endpoints available to you when dealing with SSRS
    2012. The old versions of each web service are still there for backward compatibility
    and have the ability to manage either native or SharePoint mode installs separately.
    These are deprecated and it is advisable to upgrade to the newest version, which
    allows you to control both types of installations from one web service. We will
    be using the newest management web service in this example.


    You will use the Report Server Web service to get a list of folders on the server
    and then upload the report to the server. In this example, you’ll upload some
    of the reports created for the health-care provider. In the health-care setting,
    it’s important to maintain strict control over the report folders and their permissions
    on the server, so you won’t allow the users to create a new folder; they will
    only be allowed to upload to the existing folders that they already have permission
    to use.


    The `CreateCatalogItem` method of the Report Server Web service allows you to
    deploy the report to the report server by creating a copy of the report on the
    server from an RDL file that you provide. This is the same method as described
    in the previous section, “Using the `rs.exe` Utility.”


    ![Image](images/square.jpg) **Note** The `CreateReportEditSession` method might
    pass sensitive data, including user credentials, over the network. You should
    use SSL encryption whenever possible when making Web service calls.


    First, you’ll create a new C# Windows Forms solution with Visual Studio 2008.
    Call this project `SSRS_Publisher`. This example will be in C#, but the source
    examples from the website will also have a working version written in VB.NET as
    well. Once your new project is created, rename the `Form1.cs` file to `Publisher.cs`
    and allow VS to update all of the references.


    #### Accessing the Web Service


    You need to add a reference to the SSRS 2012 Report Server Web service, which
    is the same as you did in [Chapter 5](#Chapter05.html#ch5) for the report viewer.
    You do this by selecting Project Add Web Reference, right-clicking the references
    in the Solution Explorer and selecting Add Web Reference; alternatively, you can
    right-click the project in the Solution Explorer and select Add Web Reference.
    Depending on the version of VS and .NET you are working with, you may not immediately
    see the option to add a web reference.


    If you don’t see the option for Add Web Reference in those locations, you may
    need to use a different method to add the reference. You will need to select Project
    Add Service Reference. From this screen, you will click the advanced button on
    the bottom left of the window. In the advanced settings window, you will click
    on the Add Web Reference button in the bottom left of the screen to bring up the
    web reference window.


    When the dialog box appears, enter the following URL:


    [`http://localhost/reportserver/reportservice2010.asmx`](http://localhost/reportserver/reportservice2010.asmx)


    Substitute the name of your server for `localhost` in the preceding URL if you
    are using a remote server and then click the arrow button next to the URL. You
    may be prompted for your credentials at this point to verify that you have permissions
    to access the web service. You should now see a dialog box similar to the one
    in [Figure 8-12](#Chapter08.html#fig_8_12).


    ![Image](images/9781430238102_Fig08-12.jpg)


    ***Figure 8-12.** Add Web Reference dialog box*


    In the Web reference name textbox, enter `SSRSWebService`. This name is how the
    Web service is referenced in the code. After this dialog box is closed and the
    reference is added to the project, add the following `using` directives to the
    code at the top of your `publisher.cs` code with the rest of the standard `using`
    directives:


    ```

    using SSRS_Publisher.SSRSWebService;

    ```


    Now you can reference the Web service much more easily because you don’t have
    to enter the fully qualified namespace. You’ll also add three others `using` directives
    below this one that will allow you to access the Web services and I/O-specific
    functions more easily in your code, as shown in [Listing 8-3](#Chapter08.html#list_8_3).
    You can see what all of this together should look like in [Figure 8-13](#Chapter08.html#fig_8_13).


    ***Listing 8-3.** Using Directives*


    ```

    using System.IO;

    using System.Text.RegularExpressions;

    using System.Web.Services.Protocols;

    ```


    ![Image](images/9781430238102_Fig08-13.jpg)


    ***Figure 8-13.** Adding directives to your publisher project*'
