- fmt: "## Chapter 4: Laying Out a Report\n\nNow it is time to delve into the area\
    \ in the IDE in which you’ll probably spend the most time: the `Design` tab. The\
    \ real creative magic begins here, and we don’t mean because a wizard or two might\
    \ be involved.\n\nDifferent report requests and target audiences mean that the\
    \ look and feel of each report will not be uniform. One user might expect drill-down\
    \ functionality, while others might need full, detailed listings of data for printing.\
    \ Whatever the case, SSRS provides many tools in the `Toolbox` for rapid and efficient\
    \ building of high-quality reports that can be immediately deployed from within\
    \ `BIDS`. In the following sections, you’ll take the sample data and put it to\
    \ use as you explore the functionality of each of the available tools and data\
    \ regions.\n\nFor each object we demonstrate, we’ll give the graphical representation\
    \ of the design environment as well as its `RDL` counterpart. Note that defined\
    \ sections of the `RDL` file contain every aspect of a report, from the general\
    \ layout to pagination. This is important because it’s often easier to work directly\
    \ within the `RDL` file to alter a report. As we show how to add functionality\
    \ to the sample report projects, we’ll point out sections of the `RDL` files where\
    \ the graphical report design is converted to code.\n\n### Setting up Filters\n\
    \nLike parameters, report filters can limit the results of data on a report; however,\
    \ you don’t necessarily have to use them in conjunction with a parameter. In fact,\
    \ filters, which can be defined at many points in the report, evaluate an expression\
    \ and filter the results based on that execution. Filters take this form:\n\n\
    `<Filter Expression> <Operator><Filter Value>`\n\nAn example of a filter is one\
    \ that limits the data on a report to a specific user or that is based on user\
    \ input from a parameter value.\n\n`Chapter 11` demonstrates how to use a filter\
    \ that limits the report based on a built-in `Global` collection, which includes\
    \ the username of the person executing the report. Filters are beneficial because\
    \ once the report is rendered you can use them in conjunction with parameters\
    \ to limit the data in the report without re-querying the data source. In `Figure\
    \ 3-12`, you can see a filter that limits the data displayed based on a parameter\
    \ called `User`. The logic is this: if the parameter value for `User` is equal\
    \ to a field value of `User`, then include only those records where they match.\
    \ Otherwise, include all records. Parameters and filters are included as elements\
    \ of an `RDL` report file.\n\n![Image](images/9781430238102_Fig03-12.jpg)\n\n\
    `Figure 3-12`. Sample filter on a table data region\n\n`Listing 3-3` shows the\
    \ sample `RDL` elements of a filter.\n\n`Listing 3-3`. Parameter and Filter `RDL`\
    \ Elements\n\n```\n<Filters>\n   <Filter>\n      <FilterExpression>=IIF(Parameters!User.Value\
    \ is nothing, \"All\", Parameters!User.Value)\n      </FilterExpression>\n   \
    \   <Operator>Equal</Operator>\n         <FilterValues>\n              <FilterValue>=IIF(Parameters!User.Value\
    \ is nothing, \"All\", Fields!LastName.Value)\n              </FilterValue>\n\
    \         </FilterValues>\n   </Filter>\n</Filters>\n```\n\n### Expressions\n\n\
    Throughout this section, you’ll use fields from the dataset to create sample report\
    \ segments. Because the values from the fields are derived from *expressions*\
    \ that are essentially `VB.NET` code, we will cover them now because they play\
    \ a crucial role in the report design process.\n\nYou can use expressions to produce\
    \ a value for any report item that uses them. In `SSRS`, you can assign expressions\
    \ to almost any report property, from formatting such as color or padding to the\
    \ value of a textbox. A simple expression such as that of a field assignment is\
    \ commonly used while designing reports. In fact, every time you add a field to\
    \ an area of a report, it’s automatically converted to an expression, like so:\n\
    \n`=Fields!FieldName.Value`\n\nAn expression is signified by prefacing its content\
    \ with the equal sign (`=`). You can also concatenate expressions with other functions\
    \ and literals. We will show several examples of expressions throughout the book.\
    \ We will list several sample expressions here and show you how to assign them\
    \ to report items:\n\n> `=Parameters!ParameterName.Value`: Used to assign the\
    \ value of a parameter to a report item such as a textbox or cell in a table.\n\
    >\n> `=IIF(Fields!FieldName.Value > 10, \"Red\", \"Black\")`: Used for conditional\
    \ expressions. In this case, it would set the text color for a property to red\
    \ if the value of `FieldName` were greater than 10, black otherwise.\n>\n> `=Fields!FieldNamel.Value\
    \ & \" \" & Fields!FieldName2.Value`: Used to concatenate the value of two fields.\n\
    >\n> `=Avg(Fields!FieldName.Value)`:Used to aggregate functions such as `Sum`,\
    \ `Avg`, `Min`, `Count`, and `Max` that return the aggregate, minimum, or maximum\
    \ value of the specified field.\n>\n> `=RowNumber(Nothing)`: Used to maintain\
    \ a running total for the row numbers in a report. `Nothing` in this case is a\
    \ scope parameter passed to the function indicating a grouping or dataset. The\
    \ scope parameter could be a group name or dataset, in which case a new row count\
    \ would begin at the end of each group or dataset.\n\nIn `SSRS` for `SQL Server\
    \ 2005`, the expression builder application used inside the report development\
    \ environment was rebuilt to give it the type of functionality needed to assist\
    \ users create useful expressions easily. Thankfully, all releases since then\
    \ have retained the more advanced expression builder, which lists most of the\
    \ common functions, along with examples using their syntax; in addition, they\
    \ are categorized by type (`Text`, `Conversion`, and `Date & Time`). This makes\
    \ it much quicker to find the right function and place it as part of the expression\
    \ you are building. Another great feature that developers have become accustomed\
    \ to, and frankly should not have to live without, is `IntelliSense`, a contextual,\
    \ in-line command completion feature. As you can see in `Figure 3-13`, as you\
    \ type an expression (in this case a field value expression from your stored procedure),\
    \ you are prompted with all the possible selections based on that expression.\
    \ Once the expression is complete and syntactically correct, you can click `OK`\
    \ to make the expression part of the report object where you have associated it.\
    \ If any syntax errors exist, a standard red underline indicates the problem,\
    \ and a mouse-hover over it will display the type of error, in most cases “Invalid\
    \ Syntax.” This is a quick introduction to expressions in `SSRS`, but in `Chapter\
    \ 6`, we will use them to perform tasks such as setting default parameter and\
    \ property values at runtime.\n\n![Image](images/9781430238102_Fig03-13.jpg)\n\
    \n`Figure 3-13`. `IntelliSense`: Assigning an expression\n\n### Summary\n\nAt\
    \ this point, we have only scratched the surface of what the development environment\
    \ has to offer. In this chapter, you were introduced to the development environment\
    \ and some of the basic elements of `Reporting Services` design. You learned that\
    \ each report consists of defined elements based on a defined schema in the `RDL`,\
    \ which gives `SSRS` the advantage of standardization. We covered some of the\
    \ report objects that make up reports such as `Data Sources` and `Datasets`. In\
    \ `Chapters 4` and `5`, you will learn about all of the objects that will be used\
    \ to display or represent data returned by our datasets such as the `Textbox`,\
    \ `Rectangles`, and `Data Regions` like `Tablix`, `List`, and `Matrix`."
