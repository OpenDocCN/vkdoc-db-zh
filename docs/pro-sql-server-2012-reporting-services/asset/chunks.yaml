  trans: "\n# 理解图表数据区域\n\nSSRS 中的图表数据区域与矩阵数据区域类似，允许从单个数据集进行多级分组。与 Tablix 数据区域（通过表格、矩阵和列表对象）提供的列级和行级分组不同，图表数据区域使用**系列**、**类别**和**值**。你可以为图表设置许多属性，并且与所有其他数据区域一样，图表可以使用表达式来定义其属性。此外，与其他数据区域一样，你可以将图表单独放置，也可以将其限定在另一个区域（如列表或表格数据区域）内。例如，你可以使用一个简单的图表来显示按临床医生类型划分的总体访问量，这在你的存储过程中由\
    \ `Service_Type` 字段确定。你也可以将图表添加到一个按患者和时间范围（如 `Month` 和 `Year`）分组的表格单元格中。该图表将为每个分组显示该患者随时间变化的访问次数。让我们向使用\
    \ `Emp_Svc_Cost` 存储过程的报表中添加一个图表。对于该图表，你将添加三个熟悉的字段，分别对应图表的三个区域：系列、类别和值将分别包含 `Patient_Name`、`Employee_Name`\
    \ 和 `Visit_Count`。\n\n本节演示的图表对象的起始报表可在 Apress 网站（[`www.apress.com`](http://www.apress.com)）上本书的“源代码/下载”区域中的\
    \ `Pro_SSRS` 项目里找到。这个报表很有创意地被命名为 `Chart Start.rdl`，它也是一种为企业高管们准备的早餐麦片。\n\n## 创建图表\n\
    \n1.  首先，打开 `Chart Start.rdl` 报表的“设计”选项卡，双击工具箱中的图表工具，调出“选择图表类型”对话框。SSRS 2008 中的图表对象得到了相当广泛的增强，但大部分更新主要是美化方面的。你将选择如图\
    \ 5-1 所示的堆积条形图。\n    ![Image](img/9781430238102_Fig05-01.jpg)\n    图 5-1. SSRS\
    \ 图表选择\n2.  双击图表的图形区域，这将调出“图表数据”窗口。\n3.  在“图表数据”窗口的“值”区域下，单击绿色加号，然后从下拉列表中选择 `Visit_Count`。\n\
    4.  接下来，单击“图表数据”窗口中“类别组”区域的绿色加号，选择 `Employee_Name`。\n5.  接着，单击“图表数据”窗口中“序列组”区域的绿色加号按钮，选择\
    \ `Patient_Name`。\n6.  最后，通过向右下方拖动图表的右下角来调整其大小，使其类似于图 5-2。\n\n![Image](img/9781430238102_Fig05-02.jpg)\n\
    图 5-2. 包含三个字段的图表\n\n在预览图表之前，让我们看看它的属性。你需要将默认的调色板更改为“浅色”，以获得更柔和、更美观的视图。右键单击图表内部，在“图表”子菜单下选择“图表属性”。选择名为“浅色”的调色板，然后单击“确定”。属性应如图\
    \ 5-3 所示。\n\n![Image](img/9781430238102_Fig05-03.jpg)\n图 5-3. 图表属性\n\n最后，在“设计”选项卡上右键单击图表图形区域内部，选择“3D\
    \ 效果”。接着，单击复选框启用 3D 效果，然后单击“确定”。在预览图表之前，将标题从“图表标题”重命名为 `按患者统计的访问次数`。现在你可以预览图表了，如图\
    \ 5-4 所示。\n\n![Image](img/9781430238102_Fig05-04.jpg)\n图 5-4. 具有自定义属性的图表\n\n![Image](img/square.jpg)\
    \ **注意** 我们选择将访问列表缩小到 2010 年发生的记录。这是有意为之，因为它将数据限制在易于查看的范围内；否则，图表中会填充过多的患者，显得杂乱无章。`Chart\
    \ Start.rdl` 报表的默认参数值也是 2010，因此你的结果将与之匹配。\n\n你可以在清单 5-1 中看到刚刚创建的图表的 RDL 输出。\n\n\
    清单 5-1. 图表 RDL 示例\n\n```\n<Chart Name=\"chart1\">\n   <ChartThreeDProperties>\n\
    \      <Enabled>true</Enabled>\n      <Rotation>30</Rotation>\n      <Inclination>20</Inclination>\n\
    \      <Shading>Simple</Shading>\n      <WallThickness>50</WallThickness>\n  \
    \    <DrawingStyle>Cylinder</DrawingStyle>\n   </ChartThreeDProperties>\n   <Style>\n\
    \      <BackgroundColor>White</BackgroundColor>\n   </Style>\n```\n\n图表对象的完整报告位于\
    \ `Pro_SSRS` 项目中，名为 `Chart.rdl`。\n"
- fmt: "### Implementing an Image\n\nHaving images in a report can give it a polished\
    \ look while extending its value as a resource. Fortunately, SSRS includes an\
    \ image tool that can add images from a variety of locations and supports many\
    \ standard image formats. Our health care application stores many images in a\
    \ SQL Server database as Binary Large Objects (BLOBs), as part of a patient electronic\
    \ medical record (EMR). You can load any type of image into the database and associate\
    \ it with the patient using a front-end image retrieval application. Once the\
    \ image is in the database and tagged to a patient’s identification number, which\
    \ is a field in the database, you can use SSRS to display that image in a report.\
    \ For this sample, you will continue with the theme of famous author patients\
    \ and add their images to a simple report. The starting-point report for the Image\
    \ report object is called `Image Start.rdl`. Since much of the report is constructed\
    \ using objects you have already used, the starting point is already laid out\
    \ with these objects included. The dataset that is used for this report includes\
    \ demographic information for patients who have their photographs stored in a\
    \ database table called `DocumentImage` in the `Pro_SSRS` database. You can use\
    \ the predefined dataset, called `Get_Image`, for the `Image Start.rdl` report,\
    \ which simply returns patient demographic information for three patients along\
    \ with their photos using a text query type as shown in [Figure 5-5](#Chapter05.html#fig_5_5).\n\
    \n![images](images/9781430238102_Fig05-05.jpg)\n\n`Figure 5-5.` Get Image data\
    \ set properties\n\nBegin by opening the `Image Start.rdl` report in the `Pro_SSRS`\
    \ project and clicking the **Design** tab. Next, select the **Image** tool from\
    \ the **Toolbox**, and click into a blank area of the **List** data region that\
    \ is already set up in this report. As you can see in [Figure 5-6](#Chapter05.html#fig_5_6),\
    \ you’re presented with the **Image** dialog when you add the **Image** tool to\
    \ the list. You can choose several ways to retrieve images. For example, you could\
    \ use an image that you’ve added to the project, or you could embed the image\
    \ directly into the report. This option would serve you well if the report contained\
    \ a single image that wouldn’t be used again and was intended to be distributed\
    \ to a variety of sources that might not have access to the image at any other\
    \ location. Choose **Database** for the source image. Next, you will choose the\
    \ data source and field that contains the image. For this report, choose `=Fields!DocumentImage.Value`\
    \ as the value, or as displayed, `[DocumentImage]`. Set the **MIME type** to `image/jpeg`.\n\
    \nThe images stored in the `DocumentImage` field are patient photos. If this were\
    \ a real report, you could use other images that would be standard to a patient\
    \ record, such as X-ray images or photos of a patient’s wounds. Even scanned images\
    \ of paper documentation or faxes could be stored in the database and effectively\
    \ added to a full report.\n\n![images](images/9781430238102_Fig05-06.jpg)\n\n\
    `Figure 5-6.` Image source selection\n\nI would like to take a moment to point\
    \ out a property that is not shown in [Figure 5-6](#Chapter05.html#fig_5_6), but\
    \ is very commonly used when using the **Image** object. Often times, the images\
    \ need to be sized appropriately for the report being requested. For example,\
    \ you may need to override the default of **Fit Proportional** to display an image\
    \ in its original size or perhaps just a clip of it. Be careful when using the\
    \ **Fit to Size** option, though, as this could cause your images to have a stretched\
    \ appearance. You can set the sizing property in the **Image Properties** window\
    \ on the **Size** tab or from the **Properties** window under **Sizing** as shown\
    \ in [Figure 5-7](#Chapter05.html#fig_5_7).\n\n![images](images/9781430238102_Fig05-07.jpg)\n\
    \n`Figure 5-7.` Image Properties – Appropriate sizing\n\n![images](images/square.jpg)\
    \ **Note** Use the default for now; click **OK** and preview the report. You can\
    \ see that the photo images are correctly associated to the patient, as shown\
    \ in [Figure 5-8](#Chapter05.html#fig_5_8).\n\n![images](images/9781430238102_Fig05-08.jpg)\n\
    \n`Figure 5-8.` Preview of report with images\n\n[Listing 5-2](#Chapter05.html#list_5_2)\
    \ shows sample RDL elements for images.\n\n`Listing 5-2.` RDL Output for Image\n\
    \n```\n<Image Name=\"image1\">\n   <ZIndex>10</ZIndex>\n   <Top>0.375in</Top>\n\
    \   <MIMEType>image/jpeg</MIMEType>\n   <Height>0.75in</Height>\n   <Width>0.75in</Width>\n\
    \   <Source>Database</Source>\n   <Style />\n   <Value>=Fields!DocumentImage.Value</Value>\n\
    \   <Left>2.875in</Left>\n   <Sizing>AutoSize</Sizing>\n</Image>\n```\n\nThe completed\
    \ **Image** object report is called `Images.rdl` and is located in the `Pro_SSRS`\
    \ project.\n\n### Implementing a Gauge\n\nGauges, although new in SSRS 2008, were\
    \ available as a third-party add-in in SSRS 2005. However, such third-party add-ins\
    \ had to be purchased separately. In SSRS 2008 and above, gauges are included\
    \ by default and provide functionality that goes beyond standard charting. One\
    \ nice thing about the gauge controls is that, while they add an aesthetic appeal\
    \ to any report— a certain sexiness, if you will—they are also compact and provide\
    \ an at-a-glance view of data that is so often important for business executives\
    \ who only want to see highs and lows, ups and downs. With gauges, any value can\
    \ have a threshold, and this threshold can be visually realized in the control\
    \ itself.\n\nBegin by opening the `Gauge Start.rdl` report included in the solution.\
    \ Double-click the **Gauge** control in the **Toolbox**. The **Select Gauge Type**\
    \ window will open displaying all of the available gauges. You have two types\
    \ of gauges to choose from: **Radial** or **Linear**. As the names indicate, **Radial**\
    \ gauges are round, like the speedometer in your car, and **Linear** gauges are\
    \ straight, much like a standard thermometer. For this example, choose the **180\
    \ Degrees North** gauge, as shown in [Figure 5-9](#Chapter05.html#fig_5_9).\n\n\
    ![images](images/9781430238102_Fig05-09.jpg)\n\n`Figure 5-9.` Radial gauge with\
    \ range\n\nWe’ll walk you through creating a simple gauge range to show how the\
    \ gauge pointer can be controlled by a value. On the **Design** tab, right-click\
    \ the gauge and select **Scale Properties** under the **Gauge Panel** submenu.\
    \ Change the **Maximum** value to `20,000` and click **OK**. Now, when you drag\
    \ `Visit_Count` onto the data region of the gauge, the overall visit counts, which\
    \ we know to be `9,687`, will show as a range when the gauge is previewed (see\
    \ [Figure 5-10](#Chapter05.html#fig_5_10)). We’ve only scratched the surface of\
    \ the Gauge, but we will cover more detailed aspects of controlling the new gauge\
    \ controls in [Chapter 6](#Chapter06.html#ch6).\n\n![images](images/9781430238102_Fig05-10.jpg)\n\
    \n`Figure 5-10.` Radial gauge in preview mode\n\n[Listing 5-3](#Chapter05.html#list_5_3)\
    \ shows sample RDL elements for images.\n\n`Listing 5-3.` RDL Output for the Gauge\
    \ Control\n\n```\n<ReportItems>\n     <GaugePanel Name=\"GaugePanel2\">\n    \
    \ <RadialGauges>\n     <RadialGauge Name=\"RadialGauge1\"> <PivotY>75</PivotY>\n\
    \     <GaugeScales>     <RadialScale Name=\"RadialScale1\">\n          <Radius>54</Radius>\n\
    \          <StartAngle>90</StartAngle>\n          <SweepAngle>180</SweepAngle>\n\
    \          <GaugePointers>\n          <RadialPointer Name=\"RadialPointer1\">\
    \ <PointerCap>\n          <Style>\n```"
  raw: '### Implementing an Image


    Having images in a report can give it a polished look while extending its value
    as a resource. Fortunately, SSRS includes an image tool that can add images from
    a variety of locations and supports many standard image formats. Our health care
    application stores many images in a SQL Server database as Binary Large Objects
    (BLOBs), as part of a patient electronic medical record (EMR). You can load any
    type of image into the database and associate it with the patient using a front-end
    image retrieval application. Once the image is in the database and tagged to a
    patient’s identification number, which is a field in the database, you can use
    SSRS to display that image in a report. For this sample, you will continue with
    the theme of famous author patients and add their images to a simple report. The
    starting-point report for the Image report object is called Image Start.rdl. Since
    much of the report is constructed using objects you have already used, the starting
    point is already laid out with these objects included. The dataset that is used
    for this report includes demographic information for patients who have their photographs
    stored in a database table called DocumentImage in the Pro_SSRS database. You
    can use the predefined dataset, called Get_Image, for the Image Start.rdl report,
    which simply returns patient demographic information for three patients along
    with their photos using a text query type as shown in [Figure 5-5](#Chapter05.html#fig_5_5).


    ![images](images/9781430238102_Fig05-05.jpg)


    ***Figure 5-5.** Get Image data set properties*


    Begin by opening the Image Start.rdl report in the Pro_SSRS project and clicking
    the Design tab. Next, select the Image tool from the Toolbox, and click into a
    blank area of the List data region that is already set up in this report. As you
    can see in [Figure 5-6](#Chapter05.html#fig_5_6), you’re presented with the Image
    dialog when you add the Image tool to the list. You can choose several ways to
    retrieve images. For example, you could use an image that you’ve added to the
    project, or you could embed the image directly into the report. This option would
    serve you well if the report contained a single image that wouldn’t be used again
    and was intended to be distributed to a variety of sources that might not have
    access to the image at any other location. Choose Database for the source image.
    Next, you will choose the data source and field that contains the image. For this
    report, choose =Fields!DocumentImage.Value as the value, or as displayed, [DocumentImage].
    Set the MIME type to image/jpeg.


    The images stored in the DocumentImage field are patient photos. If this were
    a real report, you could use other images that would be standard to a patient
    record, such as X-ray images or photos of a patient’s wounds. Even scanned images
    of paper documentation or faxes could be stored in the database and effectively
    added to a full report.


    ![images](images/9781430238102_Fig05-06.jpg)


    ***Figure 5-6.** Image source selection*


    I would like to take a moment to point out a property that is not shown in [Figure
    5-6](#Chapter05.html#fig_5_6), but is very commonly used when using the Image
    object. Often times, the images need to be sized appropriately for the report
    being requested. For example, you may need to override the default of Fit Proportional
    to display an image in its original size or perhaps just a clip of it. Be careful
    when using the Fit to Size option, though, as this could cause your images to
    have a stretched appearance. You can set the sizing property in the Image Properties
    window on the Size tab or from the Properties window under Sizing as shown in
    [Figure 5-7](#Chapter05.html#fig_5_7).


    ![images](images/9781430238102_Fig05-07.jpg)


    ***Figure 5-7.** Image Properties – Appropriate sizing*


    ![images](images/square.jpg) **Note** Use the default for now; click OK and preview
    the report. You can see that the photo images are correctly associated to the
    patient, as shown in [Figure 5-8](#Chapter05.html#fig_5_8).


    ![images](images/9781430238102_Fig05-08.jpg)


    ***Figure 5-8.** Preview of report with images*


    [Listing 5-2](#Chapter05.html#list_5_2) shows sample RDL elements for images.


    ***Listing 5-2.** RDL Output for Image*


    `<Image Name="image1">`

    `   <ZIndex>10</ZIndex>`

    `   <Top>0.375in</Top>`

    `   <MIMEType>image/jpeg</MIMEType>`

    `   <Height>0.75in</Height>`

    `   <Width>0.75in</Width>`

    `   <Source>Database</Source>`

    `   <Style />`

    `   <Value>=Fields!DocumentImage.Value</Value>`

    `   <Left>2.875in</Left>`

    `   <Sizing>AutoSize</Sizing>`

    `</Image>`


    The completed Image object report is called Images.rdl and is located in the Pro_SSRS
    project.


    ### Implementing a Gauge


    Gauges, although new in SSRS 2008, were available as a third-party add-in in SSRS
    2005\. However, such third-party add-ins had to be purchased separately. In SSRS
    2008 and above, gauges are included by default and provide functionality that
    goes beyond standard charting. One nice thing about the gauge controls is that,
    while they add an aesthetic appeal to any report— a certain sexiness, if you will—they
    are also compact and provide an at-a-glance view of data that is so often important
    for business executives who only want to see highs and lows, ups and downs. With
    gauges, any value can have a threshold, and this threshold can be visually realized
    in the control itself.


    Begin by opening the Gauge Start.rdl report included in the solution. Double-click
    the Gauge control in the Toolbox. The Select Gauge Type window will open displaying
    all of the available gauges. You have two types of gauges to choose from: Radial
    or Linear. As the names indicate, Radial gauges are round, like the speedometer
    in your car, and Linear gauges are straight, much like a standard thermometer.
    For this example, choose the 180 Degrees North gauge, as shown in [Figure 5-9](#Chapter05.html#fig_5_9).


    ![images](images/9781430238102_Fig05-09.jpg)


    ***Figure 5-9.** Radial gauge with range*


    We’ll walk you through creating a simple gauge range to show how the gauge pointer
    can be controlled by a value. On the Design tab, right-click the gauge and select
    Scale Properties under the Gauge Panel submenu. Change the Maximum value to 20,000
    and click OK. Now, when you drag Visit_Count onto the data region of the gauge,
    the overall visit counts, which we know to be 9,687, will show as a range when
    the gauge is previewed (see [Figure 5-10](#Chapter05.html#fig_5_10)). We’ve only
    scratched the surface of the Gauge, but we will cover more detailed aspects of
    controlling the new gauge controls in [Chapter 6](#Chapter06.html#ch6).


    ![images](images/9781430238102_Fig05-10.jpg)


    ***Figure 5-10.** Radial gauge in preview mode*


    [Listing 5-3](#Chapter05.html#list_5_3) shows sample RDL elements for images.


    ***Listing 5-3.**  RDL Output for the Gauge Control*


    `<ReportItems>`

    `     <GaugePanel Name="GaugePanel2">`

    `     <RadialGauges>`

    `     <RadialGauge Name="RadialGauge1"> <PivotY>75</PivotY>`

    `     <GaugeScales>     <RadialScale Name="RadialScale1">`

    `          <Radius>54</Radius>`

    `          <StartAngle>90</StartAngle>`

    `          <SweepAngle>180</SweepAngle>`

    `          <GaugePointers>`

    `          <RadialPointer Name="RadialPointer1"> <PointerCap>`

    `          <Style>`'
  trans: "\n### 实现图像\n\n在报告中加入图像能使其看起来更专业，同时提升其作为资源的价值。幸运的是，SSRS 包含一个图像工具，可以从多种位置添加图像，并支持许多标准图像格式。我们的医疗保健应用程序将许多图像作为二进制大对象存储在\
    \ SQL Server 数据库中，作为患者电子病历的一部分。你可以通过前端图像检索应用程序加载任何类型的图像到数据库中，并将其与特定患者关联。一旦图像存入数据库并标记了患者的识别号码（这是数据库中的一个字段），你就可以使用\
    \ SSRS 在报告中显示该图像。在本例中，我们将延续著名作家患者的主题，将他们的图像添加到一个简单报告中。用于图像报告对象的起始报告名为 `Image Start.rdl`。由于该报告的大部分内容是使用你已熟悉的对象构建的，因此起始点已经包含了这些对象。此报告使用的数据集包含已将其照片存储在\
    \ `Pro_SSRS` 数据库中名为 `DocumentImage` 的表里的患者的人口统计信息。你可以使用名为 `Get_Image` 的预定义数据集（用于\
    \ `Image Start.rdl` 报告），该数据集通过如 图 5-5 所示的文本查询类型，简单地返回三名患者的人口统计信息及其照片。\n\n![images](img/9781430238102_Fig05-05.jpg)\n\
    \n`图 5-5.` Get Image 数据集属性\n\n首先，在 `Pro_SSRS` 项目中打开 `Image Start.rdl` 报告，然后单击\
    \ **设计** 选项卡。接下来，从 **工具箱** 中选择 **图像** 工具，并单击该报告中已设置好的 **列表** 数据区域内的空白区域。如你在 图\
    \ 5-6 中所见，当向列表添加 **图像** 工具时，会弹出 **图像** 对话框。你可以选择多种检索图像的方式。例如，可以使用已添加到项目中的图像，或者将图像直接嵌入到报告中。如果报告包含单个图像，该图像不会被重复使用，并且打算分发给可能无法从其他位置访问该图像的各种来源，那么此选项将非常适用。选择\
    \ **数据库** 作为图像源。接下来，你将选择包含图像的数据源和字段。对于本报告，选择 `=Fields!DocumentImage.Value` 作为值，或者如显示的\
    \ `[DocumentImage]`。将 **MIME 类型** 设置为 `image/jpeg`。\n\n`DocumentImage` 字段中存储的图像是患者照片。如果这是一个真实的报告，你可以使用患者记录中标准的其他图像，例如\
    \ X 光图像或患者伤口照片。即使是纸质文件或传真的扫描图像也可以存储在数据库中，并有效地添加到完整的报告中。\n\n![images](img/9781430238102_Fig05-06.jpg)\n\
    \n`图 5-6.` 图像源选择\n\n我想花点时间指出一个在 图 5-6 中未显示、但在使用 **图像** 对象时非常常用的属性。通常，图像需要根据所请求的报告进行适当缩放。例如，你可能需要覆盖\
    \ **按比例适应** 的默认设置，以按原始大小显示图像，或者仅显示其一部分。但是，在使用 **适应大小** 选项时要小心，因为这可能导致图像呈现拉伸外观。你可以在\
    \ **图像属性** 窗口的 **大小** 选项卡中设置缩放属性，或在 **属性** 窗口中的 **Sizing** 下设置，如 图 5-7 所示。\n\n\
    ![images](img/9781430238102_Fig05-07.jpg)\n\n`图 5-7.` 图像属性 – 合适的缩放\n\n![images](img/square.jpg)\
    \ **注意** 现在使用默认值；单击 **确定** 并预览报告。你可以看到照片图像已正确关联到患者，如 图 5-8 所示。\n\n![images](img/9781430238102_Fig05-08.jpg)\n\
    \n`图 5-8.` 包含图像的报告预览\n\n清单 5-2 显示了图像的示例 RDL 元素。\n\n`清单 5-2.` 图像的 RDL 输出\n\n```\n\
    <Image Name=\"image1\">\n   <ZIndex>10</ZIndex>\n   <Top>0.375in</Top>\n   <MIMEType>image/jpeg</MIMEType>\n\
    \   <Height>0.75in</Height>\n   <Width>0.75in</Width>\n   <Source>Database</Source>\n\
    \   <Style />\n   <Value>=Fields!DocumentImage.Value</Value>\n   <Left>2.875in</Left>\n\
    \   <Sizing>AutoSize</Sizing>\n</Image>\n```\n\n已完成的 **图像** 对象报告名为 `Images.rdl`，位于\
    \ `Pro_SSRS` 项目中。\n\n### 实现仪表\n\n仪表虽然在 SSRS 2008 中是新功能，但在 SSRS 2005 中已作为第三方插件可用。然而，此类第三方插件必须单独购买。在\
    \ SSRS 2008 及更高版本中，仪表默认包含，并提供了超越标准图表的功能。仪表控件的一个优点是，它们在为任何报告增添美感——可以说是某种吸引力的同时，还十分紧凑，并能提供数据的概览视图，这对于只想看到高低起伏、增长下降的业务主管来说通常很重要。借助仪表，任何值都可以设置一个阈值，并且这个阈值可以在控件本身中直观地体现出来。\n\
    \n首先打开解决方案中包含的 `Gauge Start.rdl` 报告。双击 **工具箱** 中的 **仪表** 控件。将打开 **选择仪表类型** 窗口，显示所有可用的仪表。你可以选择两种类型的仪表：**径向**\
    \ 或 **线性**。顾名思义，**径向** 仪表是圆形的，就像你汽车里的速度表，而 **线性** 仪表是直的，很像一个标准温度计。对于本例，选择 **180\
    \ 度北向** 仪表，如 图 5-9 所示。\n\n![images](img/9781430238102_Fig05-09.jpg)\n\n`图 5-9.`\
    \ 带范围的径向仪表\n\n我们将引导你创建一个简单的仪表范围，以展示如何通过值来控制仪表指针。在 **设计** 选项卡上，右键单击仪表，然后在 **仪表面板**\
    \ 子菜单下选择 **刻度属性**。将 **最大值** 更改为 `20,000` 并单击 **确定`。现在，当你将 `Visit_Count` 拖到仪表的数据区域时，总体访问计数（我们知道是\
    \ `9,687`）在预览仪表时将显示为一个范围（参见 图 5-10）。我们只是触及了仪表的皮毛，但我们将在 第 6 章 中介绍控制新仪表控件的更多详细方面。\n\
    \n![images](img/9781430238102_Fig05-10.jpg)\n\n`图 5-10.` 预览模式下的径向仪表\n\n清单 5-3\
    \ 显示了仪表控件的示例 RDL 元素。\n\n`清单 5-3.` 仪表控件的 RDL 输出\n\n```\n<ReportItems>\n     <GaugePanel\
    \ Name=\"GaugePanel2\">\n     <RadialGauges>\n     <RadialGauge Name=\"RadialGauge1\"\
    > <PivotY>75</PivotY>\n     <GaugeScales>     <RadialScale Name=\"RadialScale1\"\
    >\n          <Radius>54</Radius>\n          <StartAngle>90</StartAngle>\n    \
    \      <SweepAngle>180</SweepAngle>\n          <GaugePointers>\n          <RadialPointer\
    \ Name=\"RadialPointer1\"> <PointerCap>\n          <Style>\n```\n"
- fmt: "### Implementing a Map\n\nLike the Gauge report item mentioned previously,\
    \ a Map within a Reporting Services report was only possible through using custom\
    \ or third party tools. In SQL Server 2008 R2, Maps were introduced to produce\
    \ visually appealing reports that allow combining multiple layers over a topographical\
    \ map. Each layer can get their data from a different dataset. Furthermore, you\
    \ can integrate your map with Bing maps as easy as the click of a checkbox. The\
    \ Map report item can consume data from a map gallery, an ESRI shapefile, or from\
    \ a SQL Server spatial query.\n\nA map gallery consists of RDL files created with\
    \ coordinate and embedded vector polygons often created in tools like Mapwel,\
    \ Map Maker Pro and ViLiDAR. There are some RDL files included in a standard installation\
    \ containing the entire USA as well as each individual State. However, you can\
    \ extend the maps that the wizard makes available to you as a report developer.\
    \ As mentioned above, you can create your own vector polygons or even download\
    \ those freely available on sites like CodePlex.com. Either way, in order for\
    \ the Map Wizard to recognize them, you will need to save the RDL files in the\
    \ path that the wizard reads. If you are using Visual Studio 2010 as I am, the\
    \ path is `Program Files\\Microsoft Visual Studio 10.0\\Common7\\IDE\\PrivateAssemblies\\\
    MapGallery`, under your Visual Studio installation directory. Some of the key\
    \ elements in the RDL files are `MapMeridians`, `MapParallels`, `MapLayers`, and\
    \ `VectorData`.\n\nESRI shapefiles store similar information about geographical,\
    \ geometrical shapes, and informational data in files with .shp and .dbf extensions.\
    \ When you select ESRI shapefile as your source of spatial data, you are prompted\
    \ for a shapefile. After navigating to the shapefile, the geospatial data is embedded\
    \ into the report. For an example of how an ESRI shapefile of Duval County in\
    \ Jacksonville, FL looks, see [Figure 5-11](#Chapter05.html#fig_5_11).\n\n![images](images/9781430238102_Fig05-11.jpg)\n\
    \n#### Figure 5-11. ESRI Shapefile of Duval County, Jacksonville, FL\n\nThe third\
    \ way you can get your spatial data is by using a SQL Server Spatial query. This\
    \ allows you to create your own queries to display geographical details along\
    \ with quantifiable data. For example, it is easy to create a query that returns\
    \ a listing of total sales amount for every State in the US. You can then overlay\
    \ those details on top of a map.\n\n![images](images/square.jpg) **Note** Out\
    \ of the box, the map gallery included with Reporting Services consists of the\
    \ United States as well as each individual State within the US. However, you can\
    \ create your own maps. You can also download more map galleries from the codeplex\
    \ website (`http://mapgallery.codeplex.com/releases`). In order for the Map Wizard\
    \ to see the map files that you create or download, you will need to save them\
    \ in `<drive>:\\Program Files (x86)\\Microsoft Visual Studio ##.0\\Common7\\IDE\\\
    PrivateAssemblies\\MapGallery`, `C:\\Program Files\\Microsoft Visual Studio ##.0\\\
    Common7\\IDE\\PrivateAssemblies\\MapGallery` or `<drive>:\\Program Files\\Microsoft\
    \ SQL Server\\Report Builder 3.0\\MapGallery` after downloading or creating them.\n\
    \nWe begin this example by opening up the Map Start.rdl report included in this\
    \ section is available in the Pro_SSRS project in the Source Code/Download area\
    \ for the book on the Apress Web site (`www.apress.com`). Double-click on the\
    \ Map control in the Toolbox to start the Map Wizard. The first thing we need\
    \ to do is let the map control know where we are going to get the spatial data\
    \ from. We are going to use the map gallery (which is the default), so ensure\
    \ that the radio button is selected, and then choose the USA by State Inset under\
    \ the Map Gallery tree list, as shown in [Figure 5-12](#Chapter05.html#fig_5_12).\
    \ When you select a particular Map Gallery, you are shown a preview of your selection.\n\
    \n![images](images/9781430238102_Fig05-12.jpg)\n\n#### Figure 5-12. New Map Layer\
    \ Wizard: Choose source of spatial data\n\nClick on the Next button to go to proceed\
    \ to *Choose spatial data and map view options* step of the wizard. On this screen,\
    \ you have the option to set your zoom level, modify the resolution settings,\
    \ and add in a Bing Maps layer. For now, let’s just keep the defaults on this\
    \ and click *Next* to continue on to *Choose map visualization* as shown in [Figure\
    \ 5-13](#Chapter05.html#fig_5_13).\n\n![images](images/9781430238102_Fig05-13.jpg)\n\
    \n#### Figure 5-13. New Map Layer Wizard: Choose map visualization options\n\n\
    Select the middle visualization Color Analytical Map and click Next. On the *Choose\
    \ the analytical dataset* screen, you need to select or create a dataset which\
    \ includes the spatial data. You are going to use the existing dataset, so choose\
    \ the Emp_Svc_Cost_By_Patient_State dataset and click Next to proceed. On the\
    \ *Specify the match fields for spatial and analytical data* screen, you need\
    \ to select which fields in your dataset match with Map Gallery that you selected.\
    \ In this case, the wizard realized that you had a `StateName` field and automatically\
    \ creates a link to it, as shown in [Figure 5-14](#Chapter05.html#fig_5_14). If\
    \ you didn’t have `StateName` but you had the state abbreviation, you would need\
    \ to specify what field in your dataset would match. In that case, you could match\
    \ your `State` column to the `STUSPS` spatial data column. Be sure that the Match\
    \ Fields has the checkbox next to `STATENAME` and the Analytical Dataset Fields\
    \ is set to `StateName` and click Next to proceed to the *Choose color theme and\
    \ data visualization* screen.\n\n![images](images/9781430238102_Fig05-14.jpg)\n\
    \n#### Figure 5-14. New Map Layer Wizard: Specifying fields to match on\n\nModify\
    \ the Field to Visualize to use `[SUM(Visit_Count)]`, enable the checkbox option\
    \ to Display labels and set the Data Field to be used as `[SUM(Visit_Count)]`\
    \ as well. [Figure 5-15](#Chapter05.html#fig_5_15) shows the settings on the map’s\
    \ final wizard screen.\n\n![images](images/9781430238102_Fig05-15.jpg)\n\n####\
    \ Figure 5-15. New Map Layer Wizard: Choosing color theme and visualization\n\n\
    Click Finish to complete the Map wizard and click the Preview tab as shown in\
    \ [Figure 5-16](#Chapter05.html#fig_5_16) to see the map in action.\n\n![images](images/9781430238102_Fig05-16.jpg)\n\
    \n#### Figure 5-16. Map using spatial query\n\n[Listing 5-4](#Chapter05.html#list_5_4)\
    \ shows sample RDL elements for images.\n\n#### Listing 5-4. RDL Output for the\
    \ Map Control\n\n```xml\n<ReportItems>\n          <Map Name=\"Map5\">\n      \
    \      <MapViewport>\n              <MapCoordinateSystem>Geographic</MapCoordinateSystem>\n\
    \              <MapProjection>Mercator</MapProjection>\n              <ProjectionCenterX>NaN</ProjectionCenterX>\n\
    \              <ProjectionCenterY>NaN</ProjectionCenterY>\n              <MapLimits>\n\
    \                <MinimumX>NaN</MinimumX>\n                <MinimumY>NaN</MinimumY>\n\
    \                <MaximumX>NaN</MaximumX>\n                <MaximumY>NaN</MaximumY>\n\
    \              </MapLimits>\n              <MaximumZoom>4000000</MaximumZoom>\n\
    \              <MapCustomView>\n                <CenterX>46.09375</CenterX>\n\
    \                <CenterY>63.4690780639648</CenterY>\n                <Zoom>100</Zoom>\n\
    \              </MapCustomView>\n              <MapMeridians>\n              \
    \  <Style>\n```\n\nThe completed Map object report is called Map.rdl and is located\
    \ in the Pro_SSRS project."
  raw: '### Implementing a Map


    Like the Gauge report item mentioned previously, a Map within a Reporting Services
    report was only possible through using custom or third party tools. In SQL Server
    2008 R2, Maps were introduced to produce visually appealing reports that allow
    combining multiple layers over a topographical map. Each layer can get their data
    from a different dataset. Furthermore, you can integrate your map with Bing maps
    as easy as the click of a checkbox. The Map report item can consume data from
    a map gallery, an ESRI shapefile, or from a SQL Server spatial query.


    A map gallery consists of RDL files created with coordinate and embedded vector
    polygons often created in tools like Mapwel, Map Maker Pro and ViLiDAR. There
    are some RDL files included in a standard installation containing the entire USA
    as well as each individual State. However, you can extend the maps that the wizard
    makes available to you as a report developer. As mentioned above, you can create
    your own vector polygons or even download those freely available on sites like
    CodePlex.com. Either way, in order for the Map Wizard to recognize them, you will
    need to save the RDL files in the path that the wizard reads. If you are using
    Visual Studio 2010 as I am, the path is Program Files\Microsoft Visual Studio
    10.0\Common7\IDE\PrivateAssemblies\MapGallery, under your Visual Studio installation
    directory. Some of the key elements in the RDL files are MapMeridians, MapParallels,
    MapLayers, and VectorData.


    ESRI shapefiles store similar information about geographical, geometrical shapes,
    and informational data in files with .shp and .dbf extensions. When you select
    ESRI shapefile as your source of spatial data, you are prompted for a shapefile.
    After navigating to the shapefile, the geospatial data is embedded into the report.
    For an example of how an ESRI shapefile of Duval County in Jacksonville, FL looks,
    see [Figure 5-11](#Chapter05.html#fig_5_11).


    ![images](images/9781430238102_Fig05-11.jpg)


    ***Figure 5-11.** ESRI Shapefile of Duval County, Jacksonville, FL*


    The third way you can get your spatial data is by using a SQL Server Spatial query.
    This allows you to create your own queries to display geographical details along
    with quantifiable data. For example, it is easy to create a query that returns
    a listing of total sales amount for every State in the US. You can then overlay
    those details on top of a map.


    ![images](images/square.jpg) **Note** Out of the box, the map gallery included
    with Reporting Services consists of the United States as well as each individual
    State within the US. However, you can create your own maps. You can also download
    more map galleries from the codeplex website ([`http://mapgallery.codeplex.com/releases`](http://mapgallery.codeplex.com/releases)).
    In order for the Map Wizard to see the map files that you create or download,
    you will need to save them in “<drive>:\Program Files (x86)\Microsoft Visual Studio
    ##.0\Common7\IDE\PrivateAssemblies\MapGallery”, “C:\Program Files\Microsoft Visual
    Studio ##.0\Common7\IDE\PrivateAssemblies\MapGallery” or <drive>:\Program Files\Microsoft
    SQL Server\Report Builder 3.0\MapGallery after downloading or creating them.


    We begin this example by opening up the Map Start.rdl report included in this
    section is available in the Pro_SSRS project in the Source Code/Download area
    for the book on the Apress Web site ([`www.apress.com`](http://www.apress.com)).
    Double-click on the Map control in the Toolbox to start the Map Wizard. The first
    thing we need to do is let the map control know where we are going to get the
    spatial data from. We are going to use the map gallery (which is the default),
    so ensure that the radio button is selected, and then choose the USA by State
    Inset under the Map Gallery tree list, as shown in [Figure 5-12](#Chapter05.html#fig_5_12).
    When you select a particular Map Gallery, you are shown a preview of your selection.


    ![images](images/9781430238102_Fig05-12.jpg)


    ***Figure 5-12.** New Map Layer Wizard: Choose source of spatial data*


    Click on the Next button to go to proceed to *Choose spatial data and map view
    options* step of the wizard. On this screen, you have the option to set your zoom
    level, modify the resolution settings, and add in a Bing Maps layer. For now,
    let’s just keep the defaults on this and click *Next* to continue on to *Choose
    map visualization* as shown in [Figure 5-13](#Chapter05.html#fig_5_13).


    ![images](images/9781430238102_Fig05-13.jpg)


    ***Figure 5-13.** New Map Layer Wizard: Choose map visualization options*


    Select the middle visualization Color Analytical Map and click Next. On the *Choose
    the analytical dataset* screen, you need to select or create a dataset which includes
    the spatial data. You are going to use the existing dataset, so choose the Emp_Svc_Cost_By_Patient_State
    dataset and click Next to proceed. On the *Specify the match fields for spatial
    and analytical data* screen, you need to select which fields in your dataset match
    with Map Gallery that you selected. In this case, the wizard realized that you
    had a StateName field and automatically creates a link to it, as shown in [Figure
    5-14](#Chapter05.html#fig_5_14). If you didn’t have StateName but you had the
    state abbreviation, you would need to specify what field in your dataset would
    match. In that case, you could match your State column to the STUSPS spatial data
    column. Be sure that the Match Fields has the checkbox next to STATENAME and the
    Analytical Dataset Fields is set to StateName and click Next to proceed to the
    *Choose color theme and data visualization* screen.


    ![images](images/9781430238102_Fig05-14.jpg)


    ***Figure 5-14.** New Map Layer Wizard: Specifying fields to match on*


    Modify the Field to Visualize to use [SUM(Visit_Count)], enable the checkbox option
    to Display labels and set the Data Field to be used as [SUM(Visit_Count)] as well.
    [Figure 5-15](#Chapter05.html#fig_5_15) shows the settings on the map’s final
    wizard screen.


    ![images](images/9781430238102_Fig05-15.jpg)


    ***Figure 5-15.** New Map Layer Wizard: Choosing color theme and visualization*


    Click Finish to complete the Map wizard and click the Preview tab as shown in
    [Figure 5-16](#Chapter05.html#fig_5_16) to see the map in action.


    ![images](images/9781430238102_Fig05-16.jpg)


    ***Figure 5-16.** Map using spatial query*


    [Listing 5-4](#Chapter05.html#list_5_4) shows sample RDL elements for images.


    ***Listing 5-4.** RDL Output for the Map Control*


    `<ReportItems>`

    `          <Map Name="Map5">`

    `            <MapViewport>`

    `              <MapCoordinateSystem>Geographic</MapCoordinateSystem>`

    `              <MapProjection>Mercator</MapProjection>`

    `              <ProjectionCenterX>NaN</ProjectionCenterX>`

    `              <ProjectionCenterY>NaN</ProjectionCenterY>`

    `              <MapLimits>`

    `                <MinimumX>NaN</MinimumX>`

    `                <MinimumY>NaN</MinimumY>`

    `                <MaximumX>NaN</MaximumX>`

    `                <MaximumY>NaN</MaximumY>`

    `              </MapLimits>`

    `              <MaximumZoom>4000000</MaximumZoom>`

    `              <MapCustomView>`

    `                <CenterX>46.09375</CenterX>`

    `                <CenterY>63.4690780639648</CenterY>`

    `                <Zoom>100</Zoom>`

    `              </MapCustomView>`

    `              <MapMeridians>`

    `                <Style>`


    The completed Map object report is called Map.rdl and is located in the Pro_SSRS
    project.'
  trans: "\n### 实现地图\n\n如同之前提到的 Gauge 报表项，在 Reporting Services 报表中实现地图功能过去只能通过自定义或第三方工具。SQL\
    \ Server 2008 R2 引入了地图功能，用于生成视觉上引人注目的报表，允许将多个图层叠加在地形图之上。每个图层可以来自不同的数据集。此外，您只需勾选一个复选框，即可轻松将地图与\
    \ Bing 地图集成。地图报表项可以从地图库、ESRI shapefile 或 SQL Server 空间查询中获取数据。\n\n地图库由包含坐标和嵌入式矢量多边形的\
    \ RDL 文件组成，这些文件通常使用 Mapwel、Map Maker Pro 和 ViLiDAR 等工具创建。标准安装中包含一些 RDL 文件，涵盖了整个美国以及各个州。但是，您可以扩展向导作为报表开发人员为您提供的地图。如上所述，您可以创建自己的矢量多边形，甚至可以从\
    \ CodePlex.com 等网站免费下载。无论哪种方式，为了让地图向导识别它们，您需要将 RDL 文件保存在向导读取的路径中。如果您像我一样使用 Visual\
    \ Studio 2010，该路径位于 Visual Studio 安装目录下的 `Program Files\\Microsoft Visual Studio\
    \ 10.0\\Common7\\IDE\\PrivateAssemblies\\MapGallery`。RDL 文件中的一些关键元素包括 `MapMeridians`、`MapParallels`、`MapLayers`\
    \ 和 `VectorData`。\n\nESRI shapefile 在扩展名为 .shp 和 .dbf 的文件中存储有关地理、几何形状和信息数据的类似信息。当您选择\
    \ ESRI shapefile 作为空间数据源时，系统会提示您选择一个 shapefile。导航到 shapefile 后，地理空间数据将被嵌入报表中。有关佛罗里达州杰克逊维尔市杜瓦尔县\
    \ ESRI shapefile 外观的示例，请参见图 5-11。\n\n![images](img/9781430238102_Fig05-11.jpg)\n\
    \n#### 图 5-11. 佛罗里达州杰克逊维尔市杜瓦尔县的 ESRI Shapefile\n\n获取空间数据的第三种方法是使用 SQL Server 空间查询。这允许您创建自己的查询来显示地理详细信息以及可量化数据。例如，创建一个返回美国各州总销售额列表的查询很容易。然后，您可以将这些详细信息叠加在地图上。\n\
    \n![images](img/square.jpg) **注意** 开箱即用，Reporting Services 附带的地图库包含美国以及美国境内的各个州。但是，您可以创建自己的地图。您还可以从\
    \ codeplex 网站 (`http://mapgallery.codeplex.com/releases`) 下载更多地图库。为了让地图向导看到您创建或下载的地图文件，在下载或创建后，您需要将它们保存在\
    \ `<drive>:\\Program Files (x86)\\Microsoft Visual Studio ##.0\\Common7\\IDE\\\
    PrivateAssemblies\\MapGallery`、`C:\\Program Files\\Microsoft Visual Studio ##.0\\\
    Common7\\IDE\\PrivateAssemblies\\MapGallery` 或 `<drive>:\\Program Files\\Microsoft\
    \ SQL Server\\Report Builder 3.0\\MapGallery`。\n\n我们通过打开本节包含的 Map Start.rdl 报表来开始本示例，该报表可在\
    \ Apress 网站 (`www.apress.com`) 上本书的 Pro_SSRS 项目源代码/下载区域中找到。双击工具箱中的地图控件以启动地图向导。我们需要做的第一件事是让地图控件知道我们将从哪里获取空间数据。我们将使用地图库（这是默认设置），因此确保选中该单选按钮，然后在地图库树状列表中选择\
    \ USA by State Inset，如图 5-12 所示。选择特定的地图库时，会显示您所选内容的预览。\n\n![images](img/9781430238102_Fig05-12.jpg)\n\
    \n#### 图 5-12. 新建地图图层向导：选择空间数据源\n\n单击“下一步”按钮，继续进行向导的“选择空间数据和地图视图选项”步骤。在此屏幕上，您可以设置缩放级别、修改分辨率设置以及添加\
    \ Bing 地图图层。现在，我们暂时保留此页的默认设置，并单击“*下一步*”继续到“*选择地图可视化方式*”，如图 5-13 所示。\n\n![images](img/9781430238102_Fig05-13.jpg)\n\
    \n#### 图 5-13. 新建地图图层向导：选择地图可视化选项\n\n选择中间的可视化方式“颜色分析地图”并单击“下一步”。在“*选择分析数据集*”屏幕上，您需要选择或创建一个包含空间数据的数据集。我们将使用现有的数据集，因此选择\
    \ Emp_Svc_Cost_By_Patient_State 数据集并单击“下一步”继续。在“*为空间数据和分析数据指定匹配字段*”屏幕上，您需要选择数据集中与您选择的地图库匹配的字段。在本例中，向导检测到您有一个\
    \ `StateName` 字段并自动创建到它的链接，如图 5-14 所示。如果您没有 `StateName` 而是有州名缩写，则需要指定数据集中的哪个字段与之匹配。在那种情况下，您可以将您的\
    \ `State` 列与空间数据列 `STUSPS` 匹配。确保“匹配字段”中 `STATENAME` 旁边的复选框被选中，并且“分析数据集字段”设置为 `StateName`，然后单击“下一步”进入“*选择颜色主题和数据可视化*”屏幕。\n\
    \n![images](img/9781430238102_Fig05-14.jpg)\n\n#### 图 5-14. 新建地图图层向导：指定要匹配的字段\n\
    \n将“要可视化的字段”修改为使用 `[SUM(Visit_Count)]`，启用“显示标签”复选框选项，并将用作标签的“数据字段”也设置为 `[SUM(Visit_Count)]`。图\
    \ 5-15 显示了地图向导最终屏幕上的设置。\n\n![images](img/9781430238102_Fig05-15.jpg)\n\n#### 图\
    \ 5-15. 新建地图图层向导：选择颜色主题和可视化方式\n\n单击“完成”以完成地图向导，然后单击“预览”选项卡，如图 5-16 所示，查看地图的实际效果。\n\
    \n![images](img/9781430238102_Fig05-16.jpg)\n\n#### 图 5-16. 使用空间查询的地图\n\n代码清单\
    \ 5-4 显示了用于地图控件的示例 RDL 元素。\n\n#### 代码清单 5-4. 地图控件的 RDL 输出\n\n```xml\n<ReportItems>\n\
    \          <Map Name=\"Map5\">\n            <MapViewport>\n              <MapCoordinateSystem>Geographic</MapCoordinateSystem>\n\
    \              <MapProjection>Mercator</MapProjection>\n              <ProjectionCenterX>NaN</ProjectionCenterX>\n\
    \              <ProjectionCenterY>NaN</ProjectionCenterY>\n              <MapLimits>\n\
    \                <MinimumX>NaN</MinimumX>\n                <MinimumY>NaN</MinimumY>\n\
    \                <MaximumX>NaN</MaximumX>\n                <MaximumY>NaN</MaximumY>\n\
    \              </MapLimits>\n              <MaximumZoom>4000000</MaximumZoom>\n\
    \              <MapCustomView>\n                <CenterX>46.09375</CenterX>\n\
    \                <CenterY>63.4690780639648</CenterY>\n                <Zoom>100</Zoom>\n\
    \              </MapCustomView>\n              <MapMeridians>\n              \
    \  <Style>\n```\n\n已完成的地图对象报表名为 Map.rdl，位于 Pro_SSRS 项目中。\n"
- fmt: "### Implementing a Data Bar\n\nAnother new addition to Reporting Services\
    \ 2008 R2 was the Data Bar. For those of you who are savvy Excel users, you may\
    \ recognize this report object from your tinkering in Excel. This object is essentially\
    \ a single bar chart (most often displayed horizontally) which allows for a quick\
    \ at-a-glance, row by row comparison. Longer bars equate to higher values and\
    \ shorter bars unequivocally mean lower values.\n\nIn this example, we are going\
    \ to start with the report named `Data Bar Start.rdl` in our `Pro_SSRS` project.\
    \ You will notice that there is a dataset named `Emp_Svc_Cost_Data_Bar` already\
    \ defined that executes a stored procedure to return the top ten `States` and\
    \ the amount of visits for the specified `ServiceMonth` parameter. We also have\
    \ a table with only two columns. Expand the `Emp_Svc_Cost_Data_Bar` dataset and\
    \ drag the `StateName` field into the first column of the details row in the table.\
    \ Next drag the Data Bar report item into the second column of our details row.\
    \ Upon releasing the Data Bar, you will be prompted to select the type of Data\
    \ Bar that you want. Your options are:\n\n*   Bar\n*   Stacked Bar\n*   100% Stacked\
    \ Bar\n*   Column\n*   Stacked Column\n*   100% Stacked Column\n\nFor this example,\
    \ choose `Bar` as shown in `Figure 5-17` and click `OK`.\n\n![images](images/9781430238102_Fig05-17.jpg)\n\
    `Figure 5-17. Data Bar Type Selection`\n\nNext, drag the `Visit_Count_By_State`\
    \ field over top of the Data Bar and hover over it until the `Chart Data` dialog\
    \ box pops up. When you see the `Chart Data` dialog, drag the selected field into\
    \ the white space of the `Values` section, as shown in `Figure 5-18`.\n\n![images](images/9781430238102_Fig05-18.jpg)\n\
    `Figure 5-18. Data Bar: Chart Data Value`\n\nYou could stop here, but let’s add\
    \ a little more pizazz to the report. Label the header column with the Data Bar\
    \ “Visit Count.” Then make the header row `Bold` and `Centered`. Now, select the\
    \ Data Bar—the blue bar and not the cell—and then right click it to bring up the\
    \ dialog box and choose `Show Data Labels`. This will show the values when you\
    \ run the report. Next, right click the Data Bar again and then select `Series\
    \ Properties…` Go to the `Fill` tab, select `Gradient` with a `Gradient style`\
    \ of `Left right`, as shown in `Figure 5-19`. Then click on the `f[x]` button\
    \ next to the primary color (top color) to create an expression.\n\n![images](images/9781430238102_Fig05-19.jpg)\n\
    `Figure 5-19. Data Bar: Series Properties fill options`\n\nOnce you have the expression\
    \ editor open, enter the following expression and click `OK`:\n\n```\n=IIF(Parameters!ServiceMonth.Label\
    \ <> \"ALL\",IIF(Fields!Visit_Count_By_State.Value > 75,\n\"Green\", \"Red\"),IIF(Fields!Visit_Count_By_State.Value\
    \ > 300, \"Green\", \"Red\"))\n```\n\nAs shown in this expression, you can nest\
    \ your conditional statements. Here we are checking to see if the parameter label\
    \ selected was not `ALL`. Then it checks for the `Visit_Count_By_State` to see\
    \ if it is more than 75 for the month selected. If it is, then make the Data Bar\
    \ green and if not, make it red. The outer `IIF` statement checks to see if the\
    \ count is greater than 300 and sets the colors accordingly. Click `Preview` to\
    \ see your report in action, as shown in `Figure 5-20`.\n\n![images](images/9781430238102_Fig05-20.jpg)\n\
    `Figure 5-20. Preview of the Data Bar Report`\n\n`Listing 5-5` shows a section\
    \ of the RDL file for the Data Bar report item.\n`Listing 5-5. RDL Data Bar`\n\
    \n```xml\n<Chart Name=\"DataBar1\">\n   <ChartCategoryHierarchy>\n        <ChartMembers>\n\
    \            <ChartMember\n           …\n                  <ChartMember>\n   \
    \                  <Label>Visit Count By State</Label>\n                     </ChartMember>\n\
    \                     </ChartMembers>\n                     </ChartSeriesHierarchy>\n\
    \                      <ChartData>\n                        <ChartSeriesCollection>\n\
    \                          <ChartSeries Name=\"Visit_Count_By_State\">\n     \
    \                       <ChartDataPoints>\n                              <ChartDataPoint>\n\
    \                                <ChartDataPointValues>\n                    \
    \              <Y>=Sum(Fields!Visit_Count_By_State.Value)</Y>\n              \
    \                  </ChartDataPointValues>\n                                <ChartDataLabel>\n\
    \                                  <Style />\n                               \
    \   <UseValueAsLabel>true</UseValueAsLabel>\n                                \
    \  <Visible>true</Visible>\n                                </ChartDataLabel>\n\
    \                                <Style>\n                                  <Color>=IIF(Parameters!ServiceMonth.Label\
    \ <> \"ALL\",IIF(Fields!Visit_Count_By_State.Value > 75, \"Green\", \"Red\"),IIF(Fields!Visit_Count_By_State.Value\
    \ > 300, \"Green\", \"Red\"))</Color>\n                                  <BackgroundGradientType>LeftRight</BackgroundGradientType>\n\
    \                               </Style>\n```\n\nThe completed report for the\
    \ Data Bar is called `Data Bar.rdl` in the `Pro_SSRS` solution."
  raw: '### Implementing a Data Bar


