  - 第 1 章 SQLite 入门
- - '##'
  - 对于希望学习更多关系型数据库知识的管理员来说，SQLite 是一个便捷的学习工具。它是学习关系型概念并实践其实施的理想入门数据库。它可以快速、轻松地安装在您可能遇到的任何平台上，并且其数据库文件可以在不同平台之间自由共享，无需转换。它功能齐全但并不令人生畏。而且
    SQLite——无论是程序还是数据库本身——都可以存储在 U 盘或内存芯片上随身携带。
