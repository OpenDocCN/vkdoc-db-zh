    ### Java


    与前面提到的 Python 类似，SQLite 有丰富的 Java 扩展可用。这些扩展大致分为两类：JDBC 驱动程序（有时带有附加功能）和用 Java 完全重新实现的
    SQLite。我们将介绍由 Christian Werner 编写的 javasqlite 包装器，他同时也编写了 SQLite ODBC 驱动程序。它包括一个
    JDBC 驱动程序和一个本地 JNI 扩展，后者紧密跟随 SQLite C API。你可以从 `www.ch-werner.de/javasqlite/overview-summary.html#jdbc_driver`
    下载该扩展。


    第 8 章 ■ 语言扩展


    JNI 扩展中的主要类是 `SQLiteDatabase`。它的大多数方法都是通过引用以下接口的回调实现的：


    - `SQLite.Callback`

    - `SQLite.Function`

    - `SQLite.Authorizer`

    - `SQLite.Trace`

    - `SQLite.ProgressHandler`


    `SQLite.Callback` 接口用于通过行处理器处理结果集，以及列和类型信息。`SQLite.Authorizer` 是对 SQLite C API
    函数 `sqlite3_set_authorizer()` 的薄包装器，你可以用它在数据库事件发生之前进行拦截。


    `SQLite.Trace` 用于查看编译时的 SQL 语句，它包装了 `sqlite3_trace()`。


    `SQLite.ProgressHandler` 包装了 `sqlite3_progress_handler()`，该函数用于在处理指定数量的 VDBE 指令后发出进度事件。


