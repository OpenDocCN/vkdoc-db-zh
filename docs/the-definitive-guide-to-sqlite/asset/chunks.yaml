  raw: '• Windowing functions. One of the new feature sets specified in ANSI SQL 99
    are


    the windowing functions. These provide post-processing analytic functions for


    results, such a ranking, rolling averages, lag and lead calculation, and so on.


    SQLite currently only targets ANSI SQL 92 compliance, so it doesn’t support


    windowing functions like **RANK()**, **ROW_NUMBER()**, and so on.


    • GRANT and REVOKE. Since SQLite reads and writes an ordinary disk file, the only


    access permissions that can be applied are the normal file access permissions
    of


    the underlying operating system. **GRANT** and **REVOKE** commands in general
    are


    aimed at much higher-end systems where there are multiple users who have


    varying access levels to data in the database. In the SQLite model, the application


    is the main user and has access to the entire database. Access in this model is


    defined at the application level—specifically, what applications have access to
    the


    database file.


    In addition to what is listed here, there is a page on the SQLite wiki devoted
    to reporting


    unsupported SQL. It is locate[d at **www.sqlite.org/cvstrac/wiki?p=UnsupportedSql**.](http://www.sqlite.org/cvstrac/wiki?p=UnsupportedSql)


    Who Should Read This Book


    SQLite has many uses and therefore draws a wide and diverse audience. Whether
    you are a programmer, web developer, systems administrator, or just casual user
    looking to learn about relational databases, this book aims to help you understand
    and get the most out of your particular use for SQLite.


    SQLite is a terrific database to start on if you are new to relational databases.
    This book will help you not only get started with SQLite but also become a competent
    user of SQL. It will also provide you with a good foundation with which to move
    on to larger relational systems and explore more advanced features and topics.


    For programmers, this book assumes only that you know the programming language
    in which you


    intend to use SQLite and the basics of relational theory. Furthermore, it does
    more than document APIs.


    If anything, that is the least of what it does, because API documentation only
    illustrates how an interface works. As with any database, you have to have some
    idea of how that database works internally to get the most out of it. Every database
    has unique architectural aspects, specific relational features, and important
    limitations, all of which good programmers learn about and take into consideration
    when writing their code. SQLite, though simple and straightforward, is no exception.
    As a programmer, you need to know something about how it processes data internally
    to get it to work well with your


    application. This book shows you how. It covers the API and explores how it works
    in relation to SQLite’s architecture, allowing C programmers, web developers,
    and scriptwriters alike to write more informed code. This helps you better understand
    not only what SQLite can do but also what it can’t. Your


    knowledge of the architecture will tell you better than any list of rules when
    SQLite is or isn’t a good fit for what you are trying to accomplish. You’ll know
    if, when, and where you need to consider another approach.


    One of the most important aims in this book is to teach concepts over recipes—to
    adequately


    address both how and why. By the time you’re done, you will have both a conceptual
    and practical understanding of how something works. To that end, this book includes
    both theoretical material


    intermixed with many figures and examples designed specifically to illustrate
    the topics at hand and provide real-world value.


    CHAPTER 1 ■ INTRODUCING SQLITE


    How This Book Is Organized


    This book is divided into three parts: SQLite the database, SQLite the programming
    library, and


    reference material. The database aspects of SQLite are covered in Chapters 2,
    3, and 4\. The programming aspects of SQLite are covered in Chapters 5–8\. A brief
    chapter outline is as follows:


