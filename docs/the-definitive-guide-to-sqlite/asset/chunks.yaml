    Shared Cache Mode


    Now that you are clear on the concurrency rules, it’s time for some new confusion.
    SQLite offers an alternative concurrency model called *shared cache mode,* which
    relates to how connections can operate within individual threads.


    In shared cache mode, a thread can create multiple connections that share the
    same page cache.


    Furthermore, this group of connections can have multiple readers *and a single
    writer* (in **EXCLUSIVE**) working on the same database at the same time. The
    catch is that these connections cannot be shared across threads—they are strictly
    limited to the thread (running specifically in shared cache mode) that created
    them. Furthermore, writers and readers have to be prepared to handle a special
    condition involving table locks.


    When readers read tables, SQLite automatically puts table locks on them. This
    prevents writers from modifying those tables. If a writer tries to modify a read-locked
    table, it will get **SQLITE_LOCKED**. The same logic applies to readers trying
    to read from write-locked tables. However, in this latter case, readers can still
    go ahead and read tables that are being modified by a writer if they run in *read-uncommitted
    mode,* which is enabled by the **read_uncommitted** pragma. In this case, SQLite
    does not place read locks on the tables read by these readers. As a result, these
    readers don’t interfere with writers at all. However, these readers can get inconsistent
    query results, because a writer can modify tables as the readers read them.


    This is similar to the “dirty read” concept you might have seen in other relational
    databases.


    Shared cache mode is designed for embedded servers that need to conserve memory
    and have


    slightly higher concurrency under certain conditions. More information on using
    it with the C API can be found in Chapter 6.


    Summary


    The SQLite API is flexible, intuitive, and easy to use. It has two basic parts:
    the core API and the extension API. The core API revolves around two basic data
    structures used to execute SQL commands: the


    connection and the statement. Commands are executed in three steps: compilation,
    execution, and


    finalization. SQLite’s wrapper functions **exec()** and **get_table()** wrap these
    steps into a single function call, automatically handling the associated statement
    object for you. The extension API provides you with the means to customize SQLite
    in three difference ways: user-defined functions, user-defined aggregates, and
    user-defined collations.


    CHAPTER 5 ■ SQLITE DESIGN AND CONCEPTS


    Because SQLite’s concurrency model is somewhat different from other databases,
    it is important


    that you understand a bit about how it manages transactions and locks, how they
    work behind the


    scenes, and how they work within your code. Overall, the concepts are not difficult
    to understand, and there are just a few simple rules to keep in mind when you
    write code that uses SQLite.


    The following chapters will draw heavily on what you’ve have learned here, because
    these concepts apply not only to the C API but to language extensions as well
    as they are built on top of the C API.


