    \ 将聚合的返回值设置为该结构体 `result` 成员中存储的值。如果系统内存不足，`sqlite3_aggregate_context()` 例程可能会返回\
    \ `NULL`；或者，如果从未调用过步函数，`p->zResult` 字段也可能为 `NULL`。对于前一种情况，SQLite 将会返回 `SQLITE_NOMEM`\
    \ 错误，因此无论是否调用 `sqlite3_result_text()` 都无关紧要。对于后一种情况，由于从未对该聚合调用过任何 `sqlite3_result_xxx()`\
    \ 函数，聚合的结果将是 SQL `NULL`。\n\n# 结果\n\n程序产生如下输出（此处为节省篇幅进行了缩写）：\n\n```\nRegistering\
    \ aggregate str_agg()\nRunning query:\nTRACE: select season, str_agg(name, ',\
    \ ') from episodes group by season\n...\nseason str_agg(name, ', ')\n------ ------------------------------------------------------------------\n\
