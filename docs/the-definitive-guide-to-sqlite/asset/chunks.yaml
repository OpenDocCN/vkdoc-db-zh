    \ foods: new name=JUJYFRUIT\nrollback;\n```\n\nSQLite 在 `update` 触发器中提供了对旧行（原始行）和新行（更新后的行）的访问。\n\
    \n旧行被称为 `old`，新行被称为 `new`。请注意脚本中触发器如何引用 `new.name`。两行的所有属性都可以使用点表示法在 `old` 和 `new`\
    \ 中访问。你同样可以轻松地记录 `new.type_id` 或 `old.id`。\n\n## 错误处理\n\n在事件发生前定义触发器，让你有机会阻止事件发生；同样地，在事件发生后检查它，让你可以重新考虑。`before`\
    \ 和 `after` 触发器使你能够实现新的完整性约束。SQLite 为触发器提供了一个特殊的 SQL 函数 `raise()`，允许在触发器主体内引发错误。`raise`\
    \ 定义如下：\n\n`raise(resolution, error_message);`\n\n第一个参数是冲突解决策略（`abort`、`fail`、`ignore`、`rollback`\
    \ 等）。第二个参数是错误消息。如果使用 `ignore`，当前触发器的剩余部分、导致触发器触发的 SQL 语句以及任何后续本应被触发的触发器都将被终止。如果导致触发器触发的\
    \ SQL 语句本身是另一个触发器的一部分，则该触发器将从触发器操作中的下一条 SQL 命令开始恢复执行。\n\n## 可更新视图\n\n如前面章节所述，触发器使得创建类似可更新视图的东西成为可能。这里的思路是创建一个视图，然后创建一个处理该视图上更新事件的触发器。SQLite\
    \ 使用触发器定义中的 `instead of` 关键字支持在视图上创建触发器。为了说明这一点，让我们创建一个将 `foods` 与 `food_types`\
    \ 连接的视图：\n\n```\ncreate view foods_view as\nselect f.id fid, f.name fname, t.id\
    \ tid, t.name tname\nfrom foods f, food_types t;\n```\n\n这个视图根据外键关系连接了两个表。注意你为视图中的所有列名创建了别名。这使你可以在触发器内部引用它们时区分每个表中各自的\
    \ `id` 和 `name` 列。现在，让我们通过在它上面创建一个 `UPDATE` 触发器来使视图可更新：\n\n```\ncreate trigger\
    \ on_update_foods_view\ninstead of update on foods_view\nfor each row\nbegin\n\
    \  update foods set name=new.fname where id=new.fid;\n  update food_types set\
    \ name=new.tname where id=new.tid;\nend;\n```\n\n现在，如果你尝试更新 `foods_view`，就会调用这个触发器。触发器简单地获取\
    \ `UPDATE` 语句中提供的值，并用它们来更新底层基表 `foods` 和 `food_types`。测试它得到以下结果：\n\n```\n.echo\
    \ on\n-- 在事务内更新视图\nbegin;\nupdate foods_view set fname='Whataburger', tname='Fast\
    \ Food' where fid=413;\n-- 现在查看基表中的原始行：\nselect * from foods f, food_types t where\
    \ f.type_id=t.id and f.id=413;\n-- 回滚它\nrollback;\n-- 现在查看原始记录：\nselect * from\
    \ foods f, food_types t where f.type_id=t.id and f.id=413;\n```\n\n```\nbegin;\n\
    update foods_view set fname='Whataburger', tname='Fast Food' where fid=413;\n\
    select * from foods f, food_types t where f.type_id=t.id and f.id=413;\nid type_id\
    \ name id name\n--- ------- -------------- --- ---------\n413 1 Whataburger 1\
    \ Fast Food\nrollback;\nselect * from foods f, food_types t where f.type_id=t.id\
    \ and f.id=413;\nid type_id name id name\n--- ------- -------------- --- -------\n\
    413 1 Cinnamon Bobka 1 Bakery\n```\n\n你可以同样轻松地添加 `insert` 和 `delete` 触发器来完成通过视图进行的、基于触发器的数据操作。\n\
    \n## 事务\n\n事务定义了一组 SQL 命令的边界，使得它们要么全部成功执行，要么完全不执行。这通常被称为数据库完整性的*原子*性原则。事务背后理由的一个经典例子是资金转账。假设一个银行程序正在将资金从一个账户转移到另一个账户。转账程序可以通过两种方式之一来完成：首先将资金插入（贷记）到账户\
    \ 2，然后从账户 1 删除（借记）；或者首先从账户 1 删除，然后插入到账户 2。无论哪种方式，转账都是一个两步过程：一个 `insert` 后跟一个 `delete`，或者一个\
    \ `delete` 后跟一个 `insert`。\n\n但是，如果在转账过程中，数据库服务器突然崩溃或断电，导致第二个操作未完成，会发生什么？现在，资金要么存在于两个账户中（第一种情况），要么完全丢失（第二种情况）。无论哪种情况，都会有人不高兴。并且数据库处于不一致状态。这里的关键点是，这两个操作必须要么一起发生，要么完全不发生。这就是事务的本质。\n\
    \n### 事务范围\n\n事务通过三个命令发出：`begin`、`commit` 和 `rollback`。`begin` 开始一个事务。`begin`\
    \ 之后的每个操作都有可能被撤销，如果在会话结束前没有发出 `commit`，它们将被撤销。`commit` 命令提交自事务开始以来所有操作执行的工作。类似地，`rollback`\
    \ 命令撤销自事务开始以来所有操作执行的所有工作。事务是一个范围，其中的操作被一起执行并提交，或一起回滚。下面是一个例子：\n\n```\nsqlite>\
    \ begin;\nsqlite> delete from foods;\nsqlite> rollback;\nsqlite> select count(*)\
    \ from foods;\ncount(*)\n--------\n412\n```\n\n我们开始了一个事务，删除了 `foods` 中的所有行，改变了主意，并通过发出\
    \ `rollback` 撤销了这些更改。`select` 语句显示没有任何更改。\n\n默认情况下，SQLite 中的每个 SQL 命令都在其自己的事务下运行。也就是说，如果你没有用\
    \ `begin`…`commit`/`rollback` 定义事务范围，SQLite 会隐式地将每个单独的 SQL 命令包装在一个 `begin`…`commit`/`rollback`\
    \ 中。在这种情况下，每个成功完成的命令都会被提交。同样，每个遇到错误的命令都会被回滚。这种操作模式（隐式事务）被称为*自动提交模式*：SQLite 自动在各自事务中运行每个命令，如果命令没有失败，其更改会自动提交。\n"
- fmt: 'SQLite also supports the `savepoint` and `release` commands. These commands
    extend the flexibility of transactions so that a body of work that incorporates
    multiple statements can set a `savepoint`, which SQLite can then revert to in
    the event of a rollback.


    ## Creating and Using a Savepoint


    Creating a `savepoint` is as simple as issuing the `savepoint` command with a
    name of your choice, just as in this next example:


    ```sql

    savepoint justincase;

    ```


    Later, if we realize our processing needs to be reverted, instead of rolling all
    the way back to the start of the transaction, we can use a named rollback as follows:


    ```sql

    rollback [transaction] to justincase;

    ```


    I’ve chosen `justincase` as the `savepoint` name. You can choose any name you
    like.


    ## Conflict Resolution


    As you’ve seen in previous examples, constraint violations cause the command that
    committed the violation to terminate. What exactly happens when a command terminates
    in the middle of making a bunch of changes to the database? In most databases,
    all of the changes are undone. That is the way the database is programmed to handle
    a constraint violation—end of story.


    SQLite, however, has an uncommon feature that allows you to specify different
    ways to handle (or recover from) constraint violations. It is called *conflict
    resolution*.


    Take, for example, the following `UPDATE`:


    ```sql

    sqlite> update foods set id=800-id;

    SQL error: PRIMARY KEY must be unique

    ```


    This results in a `UNIQUE` constraint violation because once the `update` statement
    reaches the 388th record, it attempts to update its `id` value to 800-388=412.
    But a row with an `id` of 412 already exists, so it aborts the command. But SQLite
    already updated the first 387 rows before it reached this constraint violation.


    What happens to them? The default behavior is to terminate the command and reverse
    all the changes it made, while leaving the transaction intact.


    But what if you wanted these 387 changes to stick despite the constraint violation?
    Well, believe it or not, you can have it that way too, if you want. You just need
    to use the appropriate conflict resolution.


    There are five possible resolutions, or policies, that can be applied to address
    a conflict (constraint violation): `replace`, `ignore`, `fail`, `abort`, and `rollback`.
    These five resolutions define a spectrum of error tolerance or sensitivity: from
    `replace`, the most forgiving, to `rollback`, the most strict.


    The resolutions are defined as follows in order of their severity:


    1.  **replace**: When a `unique` constraint violation is encountered, SQLite removes
    the row (or rows) that caused the violation and replaces it (them) with the new
    row from the `insert` or `update`. The SQL operation continues without error.
    If a `NOT NULL` constraint violation occurs, the `NULL` value is replaced by the
    default value for that column. If the column has no default value, then SQLite
    applies the `abort` policy. It is important to note that when this conflict resolution
    strategy deletes rows in order to satisfy a constraint, it does not invoke delete
    triggers on those rows. This behavior, however, is subject to change in a future
    release.

    2.  **ignore**: When a constraint violation is encountered, SQLite allows the
    command to continue and leaves the row that triggered the violation unchanged.
    Other rows before and after the row in question continue to be modified by the
    command. Thus, all rows in the operation that trigger constraint violations are
    simply left unchanged, and the command proceeds without error.

    3.  **fail**: When a constraint violation is encountered, SQLite terminates the
    command but does not restore the changes it made prior to encountering the violation.
    That is, all changes within the SQL command up to the violation are preserved.
    For example, if an `update` statement encountered a constraint violation on the
    100th row it attempts to update, then the changes to the first 99 rows are kept.'
