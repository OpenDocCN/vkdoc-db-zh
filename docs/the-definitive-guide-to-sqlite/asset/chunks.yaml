    Views


    Views are virtual tables. They are also known as *derived tables*, because their
    contents are derived from the results of queries on other tables. Although views
    look and feel like base tables, they aren’t. The contents of base tables are persistent,
    whereas the contents of views are dynamically generated when they are used. The
    syntax to create a view is as follows:


    ****create view *name*** **as *select-stmt*;**


    **The name of the view is given by ***name*** and its definition by ***select-stmt***.
    The resulting view will look like a base table named **name**. Imagine you had
    a query you ran all the time, so much that you get sick of writing it. Views are
    the solution for this particular chore. Say your query was as follows:**


    **104


    CHAPTER 4 ■ ADVANCED SQL FOR SQLITE


    **select f.name, ft.name, e.name**


    **from foods f**


    **inner join food_types ft on f.type_id=ft.id**


    **inner join foods_episodes fe on f.id=fe.food_id**


    **inner join episodes e on fe.episode_id=e.id;**


    **This returns the name of every food, its type, and every episode it was in.
    It is one big table of 504 rows with just about every food fact. Rather than having
    to write out (or remember) the previous query every time you want these results,
    you can tidily restate it in the form of a view. Let’s name it **details**: **create
    view details as**


    **select f.name as fd, ft.name as tp, e.name as ep, e.season as ssn**


    **from foods f**


    **inner join food_types ft on f.type_id=ft.id**


    **inner join foods_episodes fe on f.id=fe.food_id**


    **inner join episodes e on fe.episode_id=e.id;**


    **Now you can query **details** just as you would a table. Here’s an example:**


    ****sqlite> select fd as Food, ep as Episode**


    **from details where ssn=7 and tp like ''Drinks'';**


    **Food Episode**


    **-------------------- --------------------**


    **Apple Cider The Bottle Deposit 1**


    **Bosco The Secret Code**


    **Cafe Latte The Postponement**


    **Cafe Latte The Maestro**


    **Champagne Coolies The Wig Master**


    **Cider The Bottle Deposit 2**


    **Hershey''s The Secret Code**


    **Hot Coffee The Maestro**


    **Latte The Maestro**


    **Mellow Yellow soda The Bottle Deposit 1**


    **Merlot The Rye**


    **Orange Juice The Wink**


    **Tea The Hot Tub**


    **Wild Turkey The Hot Tub**


    **The contents of views are dynamically generated. Thus, every time you use **details**,
    its associated SQL**


    **will be reexecuted, producing results based on the data in the database at that
    moment. Some features of views available in other databases, like view-based security,
    are not generally available. Some view-based security is available if you program
    with SQLite, using its operational control facilities. This is covered in Chapters
    5 and 6.


    CHAPTER 4 ■ ADVANCED SQL FOR SQLITE


    Finally, to drop a view, use the **DROP VIEW** command:


    **drop view name;**


    **The name of the view to drop is given by **name**.**


    ****UPDATABLE VIEWS**'
  trans: "\n# 第四章 ■ SQLITE 高级 SQL\n\n当 SQLite 对一列进行排序时，它首先根据存储类对值进行分组——首先是 `NULL`，然后是\
    \ `integer` 和 `real`，接着是 `text`，最后是 `blob`。随后，它会在每个组内对值进行排序。`NULL` 值不进行任何排序，`integer`\
    \ 和 `real` 按数值比较，`text` 根据适当的排序规则排列，而 `blob` 则使用 `memcmp()` 进行排序，实际上是按位比较。图 4-1\
    \ 展示了一个按升序排序的假设列。\n\n```\nNULL\nNULL\nNULL\nNULL\nINTEGER, REAL\n1.1\n1.299E9\n\
    TEXT\nCheerios\nJujyFruit\nx 0003\nBLOB\nx 000e\n```\n\n*图 4-1. 存储类排序顺序*\n\n在你有机会使用\
    \ SQLite 的存储类练习一些 SQL 之后，可能值得再读一遍本节内容，以强化对 SQLite 这一特定方面的理解。你将在第 11 章回到这个主题，深入探讨存储类的内部机制、显式类型、类型亲和性以及其他与类型和存储类相关的底层主题。\n\
    \n## 视图\n\n视图是虚拟表。它们也被称为*派生表*，因为其内容源自对其他表的查询结果。尽管视图看起来和感觉上都像基表，但它们并非如此。基表的内容是持久的，而视图的内容是在使用时动态生成的。创建视图的语法如下：\n\
    \n```sql\ncreate view name as select-stmt;\n```\n\n视图的名称由 `name` 给出，其定义由 `select-stmt`\
    \ 给出。生成的视图将看起来像一个名为 `name` 的基表。想象一下，你有一个经常运行的查询，以至于厌倦了每次都要编写它。视图就是解决这个特定任务的方案。假设你的查询如下：\n\
    \n```sql\nselect f.name, ft.name, e.name\nfrom foods f\ninner join food_types\
    \ ft on f.type_id=ft.id\ninner join foods_episodes fe on f.id=fe.food_id\ninner\
    \ join episodes e on fe.episode_id=e.id;\n```\n\n这将返回每种食物的名称、其类型以及它出现的每一集。这是一个包含\
    \ 504 行的大型表格，几乎包含了所有食物信息。与其每次想要这些结果时都必须写出（或记住）前面的查询，不如将其整洁地重写为视图的形式。让我们将其命名为 `details`：\n\
    \n```sql\ncreate view details as\nselect f.name as fd, ft.name as tp, e.name as\
    \ ep, e.season as ssn\nfrom foods f\ninner join food_types ft on f.type_id=ft.id\n\
    inner join foods_episodes fe on f.id=fe.food_id\ninner join episodes e on fe.episode_id=e.id;\n\
    ```\n\n现在你可以像查询表一样查询 `details`。下面是一个例子：\n\n```sql\nsqlite> select fd as Food,\
    \ ep as Episode\n   ...> from details where ssn=7 and tp like 'Drinks';\nFood\
    \                    Episode\n--------------------  --------------------\nApple\
    \ Cider           The Bottle Deposit 1\nBosco                 The Secret Code\n\
    Cafe Latte            The Postponement\nCafe Latte            The Maestro\nChampagne\
    \ Coolies     The Wig Master\nCider                 The Bottle Deposit 2\nHershey's\
    \             The Secret Code\nHot Coffee            The Maestro\nLatte      \
    \           The Maestro\nMellow Yellow soda    The Bottle Deposit 1\nMerlot  \
    \              The Rye\nOrange Juice          The Wink\nTea                  \
    \ The Hot Tub\nWild Turkey           The Hot Tub\n```\n\n视图的内容是动态生成的。因此，每次你使用\
    \ `details` 时，其关联的 SQL 都会被重新执行，根据当时数据库中的数据生成结果。其他数据库中可用的某些视图特性，如基于视图的安全性，通常不可用。如果你使用\
    \ SQLite 的操作控制设施进行编程，一些基于视图的安全性是可用的。这将在第 5 章和第 6 章中介绍。\n\n最后，要删除视图，请使用 `DROP VIEW`\
    \ 命令：\n\n```sql\ndrop view name;\n```\n\n要删除的视图的名称由 `name` 给出。\n\n### 可更新视图\n"
- fmt: "The relational model calls for updatable views. These are views that you can\
    \ modify. You can run `insert` or `update` statements on them, for example, and\
    \ the respective changes are applied directly to their underlying tables. Updatable\
    \ views are not supported in SQLite. However, using triggers, you can create something\
    \ like them. We show the technique later in the section “Triggers.”\n\n## Indexes\n\
    \nIndexes are a construct designed to speed up queries under certain conditions.\
    \ Consider the following query:\n\n```sql\nSELECT * FROM foods WHERE name='JujyFruit';\n\
    ```\n\nWhen a database searches for matching rows, the default method it uses\
    \ to perform this is called a `sequential scan`. That is, it literally searches\
    \ (or scans) every row in the table to see whether its `name` attribute matches\
    \ `'JujyFruit'`.\n\nHowever, if this query is used frequently and the `foods`\
    \ table is very large, it makes far more sense to use an index approach to finding\
    \ the data. SQLite uses B-tree indexes, similar to many other relational databases.\n\
    \nIndexes also increase the size of the database. They literally keep a copy of\
    \ all columns they index. If you index every column in a table, you effectively\
    \ double the size of the table. Another consideration is that indexes must be\
    \ maintained. When you insert, update, or delete records, in addition to modifying\
    \ the table, the database must modify each and every index on that table as well.\
    \ So although indices can make queries run much faster, they can slow down inserts,\
    \ updates, and similar operations.\n\n### Creating an Index\n\nThe command to\
    \ create an index is as follows:\n\n```sql\ncreate index [unique] index_name on\
    \ table_name ( columns )\n```\n\nThe variable `index_name` is the name of the\
    \ index, and `table_name` is the name of the table containing the column(s) to\
    \ index. The variable `columns` is either a single column or a comma-separated\
    \ list of columns.\n\nIf you use the `unique` keyword, then the index will have\
    \ the added constraint that all values in the index must be unique. This applies\
    \ to both the index and, by extension, to the column or columns it indexes. The\
    \ `unique` constraint covers all columns defined in the index, and it is their\
    \ combined values (not individual values) that must be unique. Here’s an example:\n\
    \n```sql\nsqlite> create table foo(a text, b text);\n\nsqlite> create unique index\
    \ foo_idx on foo(a,b);\n\nsqlite> insert into foo values ('unique', 'value');\n\
    \nCHAPTER 4 ■ ADVANCED SQL FOR SQLITE\n\nsqlite> insert into foo values ('unique',\
    \ 'value2');\n\nsqlite> insert into foo values ('unique', 'value');\n\nSQL error:\
    \ columns a, b are not unique\n```\n\nYou can see here that uniqueness is defined\
    \ by both columns collectively, not individually. Notice that collation plays\
    \ an important role here as well.\n\nTo remove an index, use the `drop index`\
    \ command, which is defined as follows:\n\n```sql\ndrop index index_name;\n```\n\
    \n### Collations\n\nEach column in the index can have a collation associated with\
    \ it. For example, to create a case-insensitive index on `foods.name`, you’d use\
    \ the following:\n\n```sql\ncreate index foods_name_idx on foods (name collate\
    \ nocase);\n```\n\nThis means that values in the `name` column will sort without\
    \ respect to case. You can list the indexes for a table in the SQLite command-line\
    \ program by using the `.indices` shell command. Here’s an example:\n\n```sql\n\
    sqlite> .indices foods\nfoods_name_idx\n```\n\nFor more information, you can use\
    \ the `.schema` shell command as well:\n\n```sql\nsqlite> .schema foods\nCREATE\
    \ TABLE foods(\nid integer primary key,\ntype_id integer,\nname text );\nCREATE\
    \ INDEX foods_name_idx on foods (name COLLATE NOCASE);\n```\n\nYou can also obtain\
    \ this information by querying the `sqlite_master` table, described later in this\
    \ section.\n\n### Index Utilization\n\nIt is important to understand when indexes\
    \ are used and when they aren’t. There are very specific conditions in which SQLite\
    \ will decide to use an index. SQLite will use a single column index, if available,\
    \ for the following expressions in the `WHERE` clause:\n\n- `column {=|>|>=|<=|<}\
    \ expression`\n- `expression {=|>|>=|<=|<} column`\n- `column IN ( expression-list\
    \ )`\n- `column IN (subquery)`\n\nMulticolumn indexes have more specific conditions\
    \ before they are used. This is perhaps best illustrated by example. Say you have\
    \ a table defined as follows:\n\n```sql\ncreate table foo (a,b,c,d);\n```\n\n\
    107\n\nCHAPTER 4 ■ ADVANCED SQL FOR SQLITE\n\nFurthermore, you create a multicolumn\
    \ index as follows:\n\n```sql\ncreate index foo_idx on foo (a,b,c,d);\n```\n\n\
    The columns of `foo_idx` can be used only sequentially from left to right. That\
    \ is, in the following query:\n\n```sql\nselect * from foo where a=1 and b=2 and\
    \ d=3\n```\n\nonly the first and second conditions will use the index. The reason\
    \ the third condition was excluded is because there was no condition that used\
    \ `c` to bridge the gap to `d`. Basically, when SQLite uses a multicolumn index,\
    \ it works from left to right column-wise. It starts with the left column and\
    \ looks for a condition using that column. It moves to the second column, and\
    \ so on. It continues until either it fails to find a valid condition in the `WHERE`\
    \ clause that uses it or there are no more columns in the index to use.\n\nBut\
    \ there is one more requirement. SQLite will use a multicolumn index only if all\
    \ of the conditions use either the equality (`=`) or `IN` operator for all index\
    \ columns *except for the rightmost index column*. For that column, you can specify\
    \ up to two inequalities to define its upper and lower bounds. Consider this example:\n\
    \n```sql\nselect * from foo where a>1 and b=2 and c=3 and d=4\n```\n\nSQLite will\
    \ only do an index scan on column `a`. The `a>1` expression becomes the rightmost\
    \ index column because it uses the inequality. All columns after it are not eligible\
    \ to be used as a result. Similarly, the following:\n\n```sql\nselect * from foo\
    \ where a=1 and b>2 and c=3 and d=4\n```\n\nwill use the index columns `a` and\
    \ `b` and stop there as `b>2` becomes the rightmost index term by its use of an\
    \ inequality operator.\n\nLastly, when you create an index, have a reason for\
    \ creating it. Make sure there is a specific performance gain you are getting\
    \ before you take on the overhead that comes with it. Well-chosen indexes are\
    \ a wonderful thing. Indexes that are thoughtlessly scattered here and there in\
    \ the vain hope of performance are of dubious value.\n\n## Triggers\n\nTriggers\
    \ execute specific SQL commands when specific database events transpire on specific\
    \ tables. The general syntax for creating a trigger is as follows:\n\n```sql\n\
    create [temp|temporary] trigger name\n[before|after] [insert|delete|update|update\
    \ of columns] on table\naction\n```\n\nA trigger is defined by a name, an action,\
    \ and a table. The action, or trigger body, consists of a series of SQL commands.\
    \ Triggers are said to `fire` when such events take place. Furthermore, triggers\
    \ can be made to fire before or after the event using the `before` or `after`\
    \ keyword, respectively. Events include `delete`, `insert`, and `update` commands\
    \ issued on the specified table. Triggers can be used to create your own integrity\
    \ constraints, log changes, update other tables, and many other things. They are\
    \ limited only by what you can write in SQL.\n\nCHAPTER 4 ■ ADVANCED SQL FOR SQLITE\n\
    \n### Update Triggers\n\n`update` triggers, unlike `insert` and `delete` triggers,\
    \ may be defined for specific columns in a table. The general form of this kind\
    \ of trigger is as follows:\n\n```sql\ncreate trigger name\n[before|after] update\
    \ of column on table\naction\n```\n\nThe following is a SQL script that shows\
    \ an `UPDATE` trigger in action:\n\n```sql\ncreate temp table log(x);\n\ncreate\
    \ temp trigger foods_update_log update of name on foods\nbegin\n    insert into\
    \ log values('updated foods: new name=' || new.name);\nend;\n\nbegin;\nupdate\
    \ foods set name='JUJYFRUIT' where name='JujyFruit';\nselect * from log;\nrollback;\n\
    ```"
