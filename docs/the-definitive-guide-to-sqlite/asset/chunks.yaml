  trans: '# 第五章 SQLITE 设计与概念


    ## 主要数据结构


    正如你在第一章所看到的，SQLite 包含许多组件——解析器、分词器、虚拟机等等。但是从程序员的角度来看，主要需要了解的是连接（connections）、语句（statements）、B
    树（B-tree）和页缓存器（pager）。图 5-1 显示了它们之间的相互关系。这些对象共同解决了编写优质代码必须了解的关于 SQLite 的三个核心事项：API、事务和锁。


    *图 5-1. SQLite C API 对象模型*


    从技术上讲，B 树和页缓存器并非 API 的一部分；它们是禁止直接访问的。但它们在事务和锁中扮演着关键角色。我们将在本节以及后面的“事务”一节中探讨它们在这些事项中的参与。


    ### 连接与语句


    API 中与查询处理相关的两个基本数据结构是连接和语句。在大多数语言扩展中，你会看到一个连接对象和一个语句对象，它们用于执行查询。在 C API 中，它们分别直接对应
    `sqlite3` 和 `sqlite3_stmt` 句柄。API 中的每个主要操作都是使用这两个结构之一完成的。


    一个连接代表与数据库的单个连接以及一个单一的事务上下文。语句派生自连接。也就是说，每个语句都有一个关联的连接对象。


    一个语句代表一条已编译的 SQL 语句。在内部，它以 VDBE 字节码的形式表达——这是一个在执行时将执行 SQL 命令的程序。语句包含了执行命令所需的一切。它们包括在逐步执行
    VDBE 程序时保存其状态的资源、指向磁盘上记录的 B 树游标，以及其他东西，例如绑定参数（将在后面的“参数绑定”一节中讨论）。尽管它们包含许多不同的内容，但你可以简单地将它们视为用于遍历结果集的游标，或引用单个
    SQL 命令的不透明句柄。


    ### B 树与页缓存器


    每个连接可以有多个数据库对象——一个主数据库后跟任意数量的已附加数据库。每个数据库对象有一个 B 树对象，而每个 B 树对象又有一个页缓存器对象。


    语句使用其连接的 B 树和页缓存器对象来读写数据库中的数据。读取数据库的语句使用游标遍历 B 树。游标遍历记录，而记录存储在页中。当游标遍历记录时，它也同时在遍历页。为了让游标访问一个页，该页必须首先从磁盘加载到内存中。这是页缓存器的工作。每当
    B 树需要数据库中的特定页时，它会请求页缓存器从磁盘获取。页缓存器随后将该页加载到其页缓存（一个内存缓冲区）中。一旦页进入页缓存，B 树及其关联的游标就可以访问页内的记录。


    如果游标修改了该页，那么页缓存器还必须采取特殊措施，在发生事务回滚时保留原始页面。因此，页缓存器负责从数据库读取数据以及向数据库写入数据、维护一个页的内存缓存、以及管理事务。除此之外，它还负责管理锁和崩溃恢复。所有这些职责都将在“事务”部分稍后介绍。


    关于连接和事务，有两点你应该了解。首先，在进行任何数据库操作时，一个连接**总是**在一个事务下运行。其次，一个连接**绝不**会同时打开多个事务。这意味着从给定连接派生的所有语句都在同一事务上下文中运行。如果你希望两个语句在不同的事务中运行，那么你必须使用多个连接——每个事务上下文一个连接。


    ## 核心 API


    如前所述，核心 API 关注的是执行 SQL 命令。它由用于执行查询的各种函数以及用于管理数据库其他方面的各种实用函数组成。执行 SQL 命令有两种基本方法：预处理查询和包装查询。预处理查询是
    SQLite 最终执行所有命令的方式，无论是在 API 中还是在内部。它是一个三阶段过程，包括准备、执行和结束化。每个阶段都有一个与之关联的 API 函数。与执行阶段相关的函数用于从结果集获取记录和列信息。


    除了标准的查询方法外，还有两个包装函数，它们将三个阶段包装成一个函数调用。它们提供了一次性执行 SQL 命令的便捷方式。这些函数只是 API 中众多杂项实用函数中的一部分。我们将在本节中探讨所有查询方法及其相关的实用函数。不过在此之前，我们先来看看如何连接到数据库。


    ### 连接到数据库


    连接到数据库基本上就是打开一个文件。每个 SQLite 数据库都存储在单个操作系统文件中——一个数据库对应一个文件。在 C API 中用于连接或打开数据库的函数是
    `sqlite3_open()`，它基本上就是一个用于打开文件的系统调用。SQLite 也可以创建内存数据库。在大多数扩展中，如果你使用 `:memory:`
    或空字符串作为数据库名称，它将在 RAM 中创建数据库。该数据库仅对创建它的连接可访问（无法与其他连接共享）。此外，数据库的生命周期仅持续到该连接存在的时间。当连接关闭时，它会从内存中删除。


    当你连接到磁盘上的数据库时，如果文件存在，SQLite 会打开它。如果你尝试打开一个不存在的文件，SQLite 会假定你想创建一个新的数据库。在这种情况下，SQLite
    不会立即创建一个新的操作系统文件。只有当你向新数据库中放入内容时——创建表、视图或其他数据库对象——它才会创建新文件。如果你只是打开一个新数据库，什么也不做就关闭它，SQLite
    不会费心去创建数据库文件——毕竟它只是一个空文件。


    不立即创建新文件有一个重要原因。某些数据库选项，如编码、页面大小和自动真空，只能在创建数据库之前设置。默认情况下，SQLite 使用 1024 字节的页面大小。不过，你可以使用
    2 的幂次方、范围在 512 到 32768 字节之间的不同页面大小。你可能出于性能原因希望使用不同的页面大小。例如，将页面大小设置为与操作系统页面大小匹配可以使
    I/O 更高效。更大的页面大小对于处理大量二进制数据的应用程序有帮助。你可以使用 `page_size` pragma 来设置数据库页面大小。


    编码是另一个永久性的数据库设置。你可以使用 `encoding` pragma 来指定数据库的编码，可以是 `UTF-8`、`UTF-16`、`UTF-16le`（小端序）或
    `UTF-16be`（大端序）。


    扩展 API 提供了不同的方式来扩展 SQLite，通过创建你自己的用户定义 SQL 扩展，并可以将其集成到 SQLite 的 SQL 方言中。'
- fmt: "# SQLite设计与概念\n\n## 自动真空功能\n\n最后是自动真空功能，通过`auto_vacuum`指令进行设置。当事务从数据库中删除数据时，默认情况下SQLite会保留已删除的页面以供回收利用。数据库文件大小保持不变。要释放这些页面，必须显式执行`vacuum`命令来回收未使用的空间。自动真空功能使得SQLite能在数据被删除时自动缩小数据库文件。此功能在存储空间宝贵的嵌入式应用程序中通常更为有用。\n\
    \n## 连接句柄\n\n一旦打开一个数据库——无论是文件还是内存数据库——它将在内部由一个不透明的`sqlite3`连接句柄表示。此句柄代表到数据库的单一连接。扩展中的连接对象抽象了此句柄，有时会实现与API函数相对应的方法，这些API函数以该句柄作为参数。\n\
    \n# 执行预处理查询\n\n如前所述，预处理查询方法是SQLite实际执行所有SQL命令的过程。执行SQL命令是一个三步过程：\n\n*   **准备**：解析器、分词器和代码生成器通过将SQL语句编译成VDBE字节码来准备它。在C\
    \ API中，这是由`sqlite3_prepare_v2()`函数执行的，它直接与编译器通信。编译器创建一个`sqlite3_stmt`句柄（语句句柄），其中包含字节码以及执行命令和遍历结果集（如果命令产生一个结果集）所需的所有其他资源。\n\
    *   **执行**：VDBE执行字节码。执行是一个逐步的过程。在C API中，每一步都由`sqlite3_step()`启动，它导致VDBE逐步执行字节码。第一次调用`sqlite3_step()`通常会获取某种锁，具体类型取决于命令的操作（读或写）。对于`SELECT`语句，每次调用`sqlite3_step()`都会将语句句柄的光标定位到结果集的下一行。对于集合中的每一行，它返回`SQLITE_ROW`，直到到达末尾，此时返回`SQLITE_DONE`。对于其他SQL语句（`insert`、`update`、`delete`等），第一次调用`sqlite3_step()`会导致VDBE处理整个命令。\n\
    *   **结束**：VDBE关闭语句并释放资源。在C API中，这是由`sqlite3_finalize()`执行的，它导致VDBE终止程序，释放资源并关闭语句句柄。\n\
    \n每个步骤——准备、执行、结束——对应于语句句柄的各自状态——已准备、活动或已结束。已准备意味着所有必要资源已分配，语句已准备好执行，但尚未开始。未获取锁，在第一次调用`sqlite3_step()`之前也不会获取锁。活动状态从第一次调用`sqlite3_step()`开始。此时，语句正在执行过程中，某种锁正在生效。已结束意味着语句已关闭，所有关联资源已释放。图5-2展示了这些步骤和状态。\n\
    \n*图 5-2。语句处理*\n\n以下伪代码说明了在SQLite中执行查询的一般过程：\n\n```plaintext\n# 1. 打开数据库，创建连接对象\
    \ (db)\ndb = open('foods.db')\n\n# 2.A. 准备语句\nstmt = db.prepare('select * from\
    \ episodes')\n\n# 2.B. 执行。调用 step() 直到光标到达结果集末尾。\nwhile stmt.step() == SQLITE_ROW\n\
    \    print stmt.column('name')\nend\n\n# 2.C. 结束。释放读锁。\nstmt.finalize()\n\n# 3.\
    \ 插入一条记录\nstmt = db.prepare('INSERT INTO foods VALUES (…)')\nstmt.step()\nstmt.finalize()\n\
    \n# 4. 关闭数据库连接。\ndb.close()\n```"
  raw: 'Finally there is autovacuum, which you set with the **auto_vacuum** pragma.
    When a transaction deletes data from a database, SQLite’s default behavior is
    to keep the deleted pages around for recycling.


    The database file remains the same size. To free the pages, you must explicitly
    issue a **vacuum** command to reclaim the unused space. The autovacuum feature
    causes SQLite to automatically shrink the


    database file when data is deleted. This feature is often more useful in embedded
    applications where storage is a premium.


    Once you open a database—file or memory—it will be represented internally by an
    opaque **sq**lite3


    connection handle. This handle represents a single connection to a database. Connection
    objects in extensions abstract this handle and sometimes implement methods that
    correspond to API functions that take the handle as an argument.


    CHAPTER 5 ■ SQLITE DESIGN AND CONCEPTS


    Executing Prepared Queries


    As stated earlier, the prepared query method is the actual process by which SQLite
    executes all SQL


    commands. Executing a SQL command is a three-step process:


    • Preparation: The parser, tokenizer, and code generator prepare the SQL


    statement by compiling it into VDBE byte code. In the C API, this is performed
    by


    the **sqlite3_prepare_v2()** function, which talks directly to the compiler. The


    compiler creates a **sqlite3_stmt** handle (statement handle) that contains the
    byte


    code and all other resources needed to execute the command and iterate over the


    result set (if the command produces one).


    • Execution: The VDBE executes the byte code. Execution is a stepwise process.
    In


    the C API, each step is initiated by **sqlite3_step()**, which causes the VDBE
    to step


    through the byte code. The first call to **sqlite3_step()** usually acquires a
    lock of


    some kind, which varies according to what the command does (reads or writes).


    For **SELECT** statements, each call to **sqlite3_step()** positions the statement


    handle’s cursor on the next row of the result set. For each row in the set, it
    returns


    **SQLITE_ROW** until it reaches the end, whereupon it returns **SQLITE_DONE**.
    For other


    SQL statements (**insert**, **update**, **delete**, and so on), the first call
    to **sqlite3_step()** causes the VDBE to process the entire command.


    • Finalization: The VDBE closes the statement and deallocates resources. In the
    C


    API, this is performed by **sqlite3_finalize()**, which causes the VDBE to


    terminate the program, freeing resources and closing the statement handle.


    Each step—preparation, execution, finalization—corresponds to a respective statement
    handle


    state—prepared, active, or finalized. Prepared means that all necessary resources
    have been allocated and the statement is ready to be executed, but nothing has
    been started. No lock has been acquired, nor will a lock be acquired until the
    first call to **sqlite3_step()**. The active state starts with the first call
    to **sqlite3_step()**. At that point, the statement is in the process of being
    executed, and some kind of lock is in play. Finalized means that the statement
    is closed and all associated resources have been freed. Figure 5-2 shows these
    steps and states.


    CHAPTER 5 ■ SQLITE DESIGN AND CONCEPTS


    *Figure 5-2\. Statement processing*


    The following pseudocode illustrates the general process of executing a query
    in SQLite:


    **# 1\. Open the database, create a connection object (db)**


    **db = open(''foods.db'')**


    **# 2.A. Prepare a statement**


    **stmt = db.prepare(''select * from episodes'')**


    CHAPTER 5 ■ SQLITE DESIGN AND CONCEPTS


    **# 2.B. Execute. Call step() is until cursor reaches end of result set.**


    **while stmt.step() == SQLITE_ROW**


    **print stmt.column(''name'')**


    **end**


    **# 2.C. Finalize. Release read lock.**


    **stmt.finalize()**


    **# 3\. Insert a record**


    **stmt = db.prepare(''INSERT INTO foods VALUES (…)'')**


    **stmt.step()**


    **stmt.finalize()**


    **# 4\. Close database connection.**


    **db.close()**'
