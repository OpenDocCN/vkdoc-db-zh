    ## Database Administration


    Now you that you’ve seen how to invoke the CLP both interactively and in command-line
    mode, it’s time to look at some examples of using the CLP for some common, administrative
    tasks. We’ll begin at the beginning, with database creation.


    ### Creating a Database


    Let’s start by creating a database that we will call `test.db`. From the command
    line, open the CLP in shell mode by typing the following:


    `sqlite3 test.db`


    Even though we have provided a database name, SQLite does not actually create
    the database (yet) if it doesn’t already exist. SQLite will defer creating the
    database until you actually create something inside it, such as a table or view.
    The reason for this is so that you have the opportunity to set various permanent
    database settings (such as page size) before the database structure is committed
    to disk.


    Some settings such as page size and character encoding (UTF-8, UTF-16, etc.) cannot
    be changed easily once the database is created, so this is where you have a chance
    to specify them. We will go with the default settings here, so to actually create
    the database on disk, we need only to create a table. Issue the following statement
    from the shell:


    `sqlite> create table test (id integer primary key, value text);`


    Now you have a database file on disk called `test.db`, which contains one table
    called `test`. This table, as you can see, has two columns:


    *   A primary key column called `id`, which has the ability to automatically generate
    values by default. Wherever you define a column of type integer primary key, SQLite
    will apply an function for the column to create and apply monotonically increasing
    values. That is, if no value is provided for the column in an `INSERT` statement,
    SQLite will automatically generate one by finding the next integer value specific
    to that column.

    *   A simple text field called `value`.


    Let’s add a few rows to the table:


    `sqlite> insert into test (id, value) values(1, ''eenie'');`

    `sqlite> insert into test (id, value) values(2, ''meenie'');`

    `sqlite> insert into test (value) values(''miny'');`

    `sqlite> insert into test (value) values(''mo'');`


    Now fetch them back:


    `sqlite> .mode column`

    `sqlite> .headers on`

    `sqlite> select * from test;`


    ```

    id value

    ---------- ----------

    1 eenie

    2 meenie

    3 miny

    4 mo

    ```


    The two commands preceding the `select` statement (`.headers` and `.mode`) are
    used to improve the formatting a little (these commands and others like them are
    covered later). We can see that our explicit ID values for the first two rows
    were used. We can also see that SQLite provided sequential integer values for
    the `id` column for rows 3 and 4, which we did not provide in the `insert` statements.
    While on the topic of autoincrement columns, you might be interested to know that
    the value of the last inserted autoincrement value can be obtained using the SQL
    function `last_insert_rowid()`:


    `sqlite> select last_insert_rowid();`


    ```

    last_insert_rowid()

    -------------------

    4

    ```


    Before we quit, let’s add an index and a view to the database. These will come
    in handy in the examples that follow:


    `sqlite> create index test_idx on test (value);`

    `sqlite> create view schema as select * from sqlite_master;`


    To exit the shell, issue the `.exit` command:


    `sqlite> .exit`


    On Windows, you can also terminate the shell by using the key sequence Ctrl+C.
    On Unix, you can use Ctrl+D.


    ## Getting Database Schema Information


    There are several shell commands for obtaining information about the contents
    of a database. You can retrieve a list of tables (and views) using `.tables [pattern]`,
    where the optional `[pattern]` can be any pattern that the SQL `like` operator
    understands (we cover `like` in Chapter 3 if you are unfamiliar with it).


    All tables and views matching the given pattern will be returned. If no pattern
    is supplied, all tables and views are returned:


    `sqlite> .tables`


    ```

    schema test

    ```


    Here we see our table named `test` and our view named `schema`. Similarly, indexes
    for a given table can be printed using `.indices [table name]`:


    `sqlite> .indices test`


    ```

    test_idx

    ```


    Here we see the index we created earlier on `test`, called `test_idx`. The SQL
    definition or data definition language (DDL) for a table or view can be obtained
    using `.schema [table name]`. If no table name is provided, the SQL definitions
    of all database objects (tables, indexes, views, and triggers) are returned:


    `sqlite> .schema test`


    ```

    CREATE TABLE test (id integer primary key, value text);

    CREATE INDEX test_idx on test (value);

    ```


    `sqlite> .schema`


    ```

    CREATE TABLE test (id integer primary key, value text);

    CREATE VIEW schema as select * from sqlite_master;

    CREATE INDEX test_idx on test (value);

    ```


    More detailed schema information can be had from SQLite’s principal system view,
    `sqlite_master`. This view is a simple system catalog of sorts. Its schema is
    described in Table 2-1.


    *Table 2-1. SQLite Master Table Schema*


    | Name | Description |

    | :--- | :--- |

    | `type` | The object’s type (table, index, view, trigger) |

    | `name` | The object’s name |

    | `tbl_name` | The table the object is associated with |

    | `rootpage` | The object’s root page index in the database (where it begins)
    |

    | `sql` | The object’s SQL definition (DDL) |


    Querying `sqlite_master` for our current database returns the following (don’t
    forget to use the `.mode column` and `.headers on` commands first to manually
    set the column format and headers):


    `sqlite> .mode column`

    `sqlite> .headers on`

    `sqlite> select type, name, tbl_name, sql from sqlite_master order by type;`


    ```

    type name tbl_name sql

    ---------- ---------- ---------- -------------------------------------

    index test_idx test CREATE INDEX test_idx on test (value)

    table test test CREATE TABLE test (id integer primary

    view schema schema CREATE VIEW schema as select * from s

    ```


    We see a complete inventory of `test.db` objects: one table, one index, and one
    view, each with their respective original DDL creation statements.


    There are few additional commands for obtaining schema information through SQLite’s
    `PRAGMA` commands, `table_info`, `index_info`, and `index_list`, which are covered
    in Chapter 4.


    > **Tip** Don’t forget that most command-line tools like the SQLite CLP keep a
    history of the commands that you execute. To rerun a previous command, you can
    hit the Up Arrow key to scroll through your previous commands. On Windows, you
    can also hit `F7` in any command prompt window to see a scrollable list of the
    commands you have entered.


    ## Exporting Data


    You can export database objects to SQL format using the `.dump` command. Without
    any arguments, `.dump` will export the entire database as a series of DDL and
    data manipulation language (DML) commands, suitable for re-creating the database
    objects and the data contained therein. If you provide arguments, the shell interprets
    them as table names or views. Any tables or views matching the given arguments
    will be exported. Those that don’t are simply ignored. In shell mode, the output
    from the `.dump` command is directed to the screen by default. If you want to
    redirect output to a file, use the `.output [filename]` command. This command
    redirects all output to the file `filename`. To restore output back to the screen,
    simply issue `.output stdout`. So, to export the current database to a file `file.sql`,
    you would do the following:'
