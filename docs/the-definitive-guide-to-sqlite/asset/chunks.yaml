    Let’s get started.


    Step 1: Creating a New Xcode Project


    Launch Xcode to get started. If this is the first time you’ve started Xcode (or
    if you haven’t changed the defaults), you’ll see a Welcome to Xcode splash screen
    on top of the Xcode environment. Dismiss this for now—in fact, if you don’t want
    to see this again, also uncheck the “show at launch” option.


    ![](index-282_1.jpg)


    CHAPTER 9 ■ IOS DEVELOPMENT WITH SQLITE


    With Xcode running, choose File  New Project. For our iSeinfeld application,
    we want to use a


    navigation-based application as the project template. This is because we’ll be
    using master and detail screens for various representations of our SQLite foods
    data. Figure 9-5 shows the new project options in Xcode.


    *Figure 9-5\. Creating a new navigation-based application for our SQLite project*


    Choose a meaningful name for your project. We’ve called ours iSeinfeld, but feel
    free to adopt any memorable or meaningful name. By default, this will be the name
    displayed for your application on the home screen of iOS devices (though this
    can be changed later). Your freshly created project should look similar to our
    project shown in Figure 9-6.


    ![](index-283_1.jpg)


    CHAPTER 9 ■ IOS DEVELOPMENT WITH SQLITE


    *Figure 9-6\. The new iSeinfeld project in Xcode*


    Step 2: Adding the SQLite Framework to Your Project


    With your blank iSeinfeld project in place, we now need to add the SQLite library
    to the list of frameworks so our future code can benefit from, and use, the SQLite
    API.


    From the left pane of your Xcode project, open the Frameworks folder. Ctrl+click
    and choose Add 


    Existing Frameworks. In the dialog box, navigate to the directory **/Developer/Platforms/**


    **iPhoneOS.platform/Developer/SDKs/iPhoneOS *x.y.z.*** **sdk/usr/lib/**, where
    ***x.y.z*** is the version number of the iPhone firmware version your Xcode and
    iOS target. Depending on the options you choose at Xcode and iOS SDK installation
    time, you may see multiple versioned directories. Our recommendation is to choose
    the latest (highest) version.


    ![](index-284_1.jpg)


    CHAPTER 9 ■ IOS DEVELOPMENT WITH SQLITE


    ■ **Note** If you’re using the latest iOS version 4 releases, those directories
    may change to read **iOS** in place of **iPhone**. Don’t worry, the underlying
    library is the same.


    From that directory, choose the **libsqlite3.dylib** entry. You will likely also
    see a


    **libsqlite3.0.dylib** or similar file. The **libsqlite3.dylib** entry is a soft
    link to the latest version of the **dylib** file, in this case **libsqlite3.0.dylib**.
    We recommend always choosing the soft link to avoid unnecessarily specific version
    choices.


    Choose this file, and you’ll be presented with an options dialog box asking for
    reference type and text encoding. We don’t need any of the alternative behavior
    offered here, so it’s safe to just click Add to continue with the defaults. You
    should now be returned to your Xcode project. Under the Frameworks folder on the
    left pane, you should now see the **libsqlite3.dylib** entry, as shown in Figure
    9-7.


    *Figure 9-7\. The SQLite **libsqlite3.dylib** library added to the iSeinfeld project
    in Xcode* 262


    ![](index-285_1.jpg)


    CHAPTER 9 ■ IOS DEVELOPMENT WITH SQLITE


    Step 3: Preparing the Foods Database


    We have two options for getting a working database in place for our project. We
    can step through the process of creating a new database, creating tables, and
    inserting data; or we can deploy an existing database for use with our iSeinfeld
    application.


    Creating everything fresh by hand would see us walk through the SQLite API for
    **sqlite3_open_v2()**,


    ****sqlite3_prepare()**, and so on, and countless iterations of **sqlite3_exec()**
    and so forth. Because of the very close similarities between C and Objective-C,
    this would basically be a repeat of Chapter 6\. We think that would be a waste
    of the chapter. More importantly, when you build and release the next great iOS


    application yourself, you almost certainly will package it with an existing database
    (though you might well provide features to add new data and work with existing
    data). We’ll adopt this second approach, but we’ll also cover the options of creating
    a fresh database, as well as the typical SQL statements you’d expect for data
