- fmt: "## CHAPTER 5 ■ SQLITE DESIGN AND CONCEPTS\n\nInstead of just retrying the\
    \ call over and over, you can use a *busy handler*. Rather than having the API\
    \ return `SQLITE_BUSY` if a connection cannot get a lock, you can get it to call\
    \ the busy handler instead.\n\nA busy handler is a function you create that kills\
    \ time or does whatever else you want it to do—it can send spam to your mother-in-law\
    \ for all SQLite cares. It’s just going to get called when SQLite can’t get a\
    \ lock. The only thing the busy handler *has* to do is provide a return value,\
    \ telling SQLite what to do next.\n\nBy convention, if the handler returns true,\
    \ then SQLite will continue to try for the lock. If it returns false, SQLite will\
    \ then return `SQLITE_BUSY` to the function requesting the lock. Consider the\
    \ following example:\n\n```\ncounter = 1\n\ndef busy()\n  counter = counter +\
    \ 1\n  if counter == 2\n    return 0\n  end\n  spam_mother_in_law(100)\n  return\
    \ 1\nend\n\ndb.busy_handler(busy)\nstmt = db.prepare('select * from episodes;')\n\
    stmt.step()\nstmt.finalize()\n```\n\nThe implementation of `spam_mother_in_law()`\
    \ is left as an exercise for the reader.\n\nThe `step()` function has to get a\
    \ `SHARED` lock on the database to perform the `select`. However, say there is\
    \ a writer active. Normally, `step()` would return `SQLITE_BUSY`. However, in\
    \ this case it doesn’t. The pager (which is one that deals with locks) calls the\
    \ `busy()` function instead, because it has been registered as the busy handler.\
    \ `busy()` increments a counter, forwards your mother-in-law 100 random messages\
    \ from your spam folder, and returns 1, which the pager interprets as true—keep\
    \ trying to get the lock. The pager then tries again to get the `SHARED` lock.\
    \ Say the database is still locked. The pager calls the busy handler again. Only\
    \ this time, `busy()` returns 0, which the pager interprets as false. In this\
    \ case, rather than retrying the lock, the pager sends `SQLITE_BUSY` up the stack,\
    \ and that’s what `step()` ends up returning.\n\nIf you just want to kill time\
    \ waiting for a lock, you don’t have to write your own busy handler. The SQLite\
    \ API has one for you. It is a simple busy handler that sleeps for a given period\
    \ of time waiting for a lock. In the API, the function is called `sqlite3_busy_timeout()`,\
    \ and it is supported by some extension libraries. You can essentially say “try\
    \ sleeping for 10 seconds when you can’t get a lock,” and the pager will do that\
    \ for you. If it sleeps for 10 seconds and still can’t get the lock, then it will\
    \ return `SQLITE_BUSY`.\n\n### Using the Right Transaction\n\nLet’s consider the\
    \ previous example again, but this time the command is an `update` rather than\
    \ a `select`.\n\nWhat does `SQLITE_BUSY` actually mean now? In `select`, it just\
    \ means, “I can’t get a `SHARED` lock.” But what does is mean for an `update`?\
    \ The truth is, you don’t really know what it means. `SQLITE_BUSY` could mean\
    \ that the connection failed to get a `SHARED` lock because there is a writer\
    \ pending. It could also mean that it got a `SHARED` lock but couldn’t get to\
    \ `RESERVED`. The point is you don’t know the state of the database or the state\
    \ of your connection for that matter. In autocommit mode, `SQLITE_BUSY` for a\
    \ write operation is completely indeterminate. So, what do you do next? Should\
    \ you just keep calling `step()` over and over until the command goes through?\n\
    \nHere’s the thing to think about. Suppose `SQLITE_BUSY` was the result of you\
    \ getting a `SHARED` lock but not `RESERVED`, and now you are holding up a connection\
    \ in `RESERVED` from getting to `EXCLUSIVE`. Again, *you don’t know the state\
    \ of the database*. And just using a brute-force method to push your transaction\
    \ through is not necessarily going to work, for you or any other connection. If\
    \ you just keep calling `step()`, you are just going to butt heads with the connection\
    \ that has the `RESERVED` lock, and if neither of you backs down, you’ll deadlock.\n\
    \n> **Note** SQLite tries to help with deadlock prevention in this particular\
    \ scenario by ignoring the busy handler of the offending connection. The `SHARED`\
    \ connection’s busy handler will not be invoked if it is preventing a `RESERVED`\
    \ connection from proceeding. However, it is up to the code to get the hint. The\
    \ code can still just repeatedly call `step()` over and over, in which case there\
    \ is nothing more SQLite can do to help.\n\nSince you know you want to write to\
    \ the database, then you need to start by issuing `begin IMMEDIATE`. If you get\
    \ a `SQLITE_BUSY`, then at least you know what state you’re in. You know you can\
    \ safely keep trying without holding up another connection. And once you finally\
    \ do succeed, you know what state you are in then as well—`RESERVED`. Now you\
    \ can use brute force if you have to because you are the one in the right. If\
    \ you start with a `begin exclusive`, on the other hand, then you are assured\
    \ that you won’t have any busy conditions to deal with at all. Just remember that\
    \ in this case you are doing your work in `EXCLUSIVE`, which is not as good for\
    \ concurrency as doing the work in `RESERVED`.\n\n### LOCKS AND NETWORK FILE SYSTEMS\n\
    \nAt this point, you should have a good appreciation for what can go wrong when\
    \ a database is shared over a network file system. SQLite handles concurrency\
    \ by placing file locks on the database file. It is very important that these\
    \ locks be both set and released at the right times. SQLite is completely dependent\
    \ on the file system to manage locks correctly for concurrent use. SQLite uses\
    \ the same locking mechanisms regardless of whether it is running on a normal\
    \ file system or network file system. It uses POSIX advisory locks on Unix, Linux,\
    \ and OS X, and the `LockFile()`, `LockFileEx()`, and `UnlockFile()` system calls\
    \ on Windows. These calls are standard system calls and work correctly on normal\
    \ file systems. It is the network file system’s job to emulate a normal file system.\
    \ And unfortunately, this doesn’t always work correctly with some implementations.\
    \ And even if the network file system works correctly, there still other things\
    \ to consider.\n\nTake NFS, for example. It’s a great network file system. However,\
    \ many original NFS implementations were known to have buggy or in some cases\
    \ unimplemented locking. And with a SQLite database, this can cause serious problems.\
    \ Without locking, two connections can get an `EXCLUSIVE` lock on the same database\
    \ and write to it at the same time, leading to an almost certain database corruption.\
    \ This is not a problem with the NFS protocol in general, but with some implementations\
    \ of it in particular. Thankfully, most modern implementations of NFS have overcome\
    \ these issues, and some implementations—such as those from Sun—are now rock-solid.\n\
    \nNFS can still have issues with locking if one of the clients goes down (taking\
    \ their database lock with it) and does not come back up. For NFSv3, a locked\
    \ file would need administrative intervention to clear it. For NFSv4, there would\
    \ be a timeout period. But how long is the timeout? Thirty seconds? A minute?\
    \ The real issue is not NFS but specific applications of it. Network file systems,\
    \ even if perfectly implemented, are not necessarily going to work exactly like\
    \ a local file system.\n\nThe bottom line is, if you are going to mix concurrency\
    \ and network file systems, there are many issues to consider, even if you are\
    \ using the best network file system out there. It’s not as simple as running\
    \ on a local file system.\n\n### Code\n\nBy now, you have a pretty good picture\
    \ of the API, transactions, and locks. To finish up, let’s put all three of these\
    \ things together in the context of your code and consider a few scenarios for\
    \ which you might want to watch.\n\n#### Using Multiple Connections"
