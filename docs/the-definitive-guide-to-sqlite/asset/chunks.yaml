- fmt: "# CHAPTER 9 ■ IOS DEVELOPMENT WITH SQLITE\n\n## Step 5: Accessing and Querying\
    \ the SQLite DB\n\nWhen our iSeinfeld application starts, we want it to find and\
    \ open our `foods.db` database. At that point, we can then exercise all our SQLite\
    \ C APIs to query, control, and otherwise use the database. To find and open the\
    \ database at launch time, we want to extend the `iSeinfeldAppDelegate` class\
    \ that was automatically created with our project. Listing 9-4 shows the changes\
    \ we’ve made to the `iSeinfeldAppDelegate.h` file.\n\n### Listing 9-4. `iSeinfeldAppDelegate.h`\
    \ File\n\n```objective-c\n// iSeinfeldAppDelegate.h\n// iSeinfeld\n//\n// Created\
    \ by Grant Allen on 9/9/10.\n// Copyright __MyCompanyName__ 2010. All rights reserved.\n\
    //\n\n@interface iSeinfeldAppDelegate : NSObject <UIApplicationDelegate> {\n \
    \   UIWindow *window;\n    UINavigationController *navigationController;\n   \
    \ // Details of your database\n    NSString *databaseName;\n    NSString *databasePath;\n\
    \    // Our iSeinfeld food array, for storing our foods\n    NSMutableArray *foods;\n\
    }\n\n@property (nonatomic, retain) IBOutlet UIWindow *window;\n@property (nonatomic,\
    \ retain) IBOutlet UINavigationController *navigationController;\n@property (nonatomic,\
    \ retain) NSMutableArray *foods;\n\n@end\n```\n\nWe’ve outlined the member variables\
    \ that will house the path and name of our SQLite database. We’ve also defined\
    \ an `NSMutableArray` for holding our collection of foods. The interface definition\
    \ is straightforward. The devil is in the detail.\n\nWe’ll extend our applications\
    \ behavior in the `iSeinfeldAppDelegate.m` file. Open the file, and you’ll see\
    \ a healthy number of automatically generated methods that have names such as\
    \ `applicationWillTerminate` and so on. We want to inject behavior into our application\
    \ once it has launched, so we’ll modify the `applicationDidFinishLaunching` function.\n\
    \n```objective-c\n// … lots of code above here\n- (void)applicationDidFinishLaunching:(UIApplication\
    \ *)application {\n    // Set up our foods database as the databaseName\n    databaseName\
    \ = @\"foods.db\";\n\n    // Get the path to the documents directory and append\
    \ the database name\n    NSArray *documentPaths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\
    \ NSUserDomainMask, YES);\n    NSString *documentsDir = [documentPaths objectAtIndex:0];\n\
    \    databasePath = [documentsDir stringByAppendingPathComponent:databaseName];\n\
    \    \n    // Check for existing database and create if necessary\n    [self checkAndCreateDatabase];\n\
    \    \n    // Query the database for all foods and populate the array\n    [self\
    \ readFoodsFromDatabase];\n    \n    // …more code follows\n```\n\nWe use several\
    \ built-in features to find the `foods.db` SQLite file in the project. `NSSearchPathForDirectoriesInDomains`,\
    \ `NSDocumentDirectory`, and `NSUserDomainMask` are all constants provided by\
    \ the iOS SDK to find the paths within the running environment. In this case,\
    \ these lines are effectively a shortcut to the current application’s location,\
    \ wherever that may be. We end up with the location of the `foods.db` file in\
    \ the `databasePath` variable.\n\nOur logic then splits into code that handles\
    \ locating the database (or creating it afresh from the project) and code to query\
    \ our database. The code for locating the database is not really SQLite specific,\
    \ covering simple file-handling operations. See the `iSeinfeldAppDelegate.m` file\
    \ included with the source code for how this works.\n\nOpening the database and\
    \ using our SQLite APIs to query the data is where the action is at. Our `readFoodsFromDatabase()`\
    \ function does this work, so let’s review it in detail.\n\n```objective-c\n-(void)\
    \ readFoodsFromDatabase {\n    // Setup the database object\n    sqlite3 *database;\n\
    \    \n    // Initialize the foods Array\n```"
