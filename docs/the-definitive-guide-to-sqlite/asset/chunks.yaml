    **15**


    **This statement works as follows: the **where** clause returns the entire foods
    table (all 412 records). The **select** clause pulls out just the **type_id**
    column, and finally **distinct** removes duplicate rows, reducing the number from
    412 rows to 15 rows, all unique.


    Joining Tables


    Joins are the key to working with data from multiple tables (or relations) and
    are the first operation(s) of the **select** command. The result of a join is
    provided as the input or starting point for all subsequent (filtering) operations
    in the **select** command.


    Joins in SQLite are best understood by example. The **foods** table has a column
    **type_id**. As it turns out, the values in this column correspond to values in
    the **id** column in the **food_types** table. A relationship exists between the
    two tables. Any value in the **foods.type_id** column must correspond to a value
    in the **food_types.id** column, and the **id** column is the *primary key* (described
    later) of **food_types**.


    The **foods.type_id** column, by virtue of this relationship, is called a *foreign
    key*: it contains (or references) values in the primary key of another table.
    This relationship is called a *foreign key* *relationship*


    CHAPTER 3 ■ SQL FOR SQLITE


    Using this relationship, it is possible to join the foods and food_type tables
    on these two columns to make a new relation, which provides more detailed information,
    namely, the **food_types.name** for each food in the **foods** table. This is
    done with the following SQL:


    **sqlite> select foods.name, food_types.name**


    **from foods, food_types**


    **where foods.type_id=food_types.id limit 10;**


    **name name**


    **------------------------- ---------------**


    **Bagels Bakery**


    **Bagels, raisin Bakery**


    **Bavarian Cream Pie Bakery**


    **Bear Claws Bakery**


