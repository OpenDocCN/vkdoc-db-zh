    select name from foods order by name\", null);\n}\n...\n```\n\n如你所见，我们这里没有尝试实现非常复杂的功能。你稍后可以重新审视我们的示例，以增加《宋飞正传》应用程序的复杂性。\n\
    \n接下来，我们需要将获取所有食物的`Cursor`输入到将显示它们的`ListView`中。\n\n在我们的`Seinfeld.java`代码中，我们声明了一些方便的字符串来表示已知的字段名称，然后是一个遍历结果集的方法，将返回的字段和值绑定到我们的`ListView`：\n\
    \n```java\n...\npublic static final String FOODS_NAME_FIELD = \"name\";\n...\n\
    private void fillData() {\n    Cursor foodCursor = mDbHelper.fetchAllNotes();\n\
    \    startManagingCursor(foodCursor);\n\n    // 为食物名称创建一个数组\n    String[] from\
    \ = new String[]{myDatabaseHelper.FOODS_NAME_FIELD};\n\n    // 为绑定目标字段创建一个数组\n\
    \    int[] to = new int[]{R.id.text1};\n\n    SimpleCursorAdapter foods =\n  \
    \      new SimpleCursorAdapter(this, R.layout.food_row, foodCursor, from, to);\n\
    \    setListAdapter(foods);\n}\n```\n\n如果这些特定于 Android 的 UI 调整让你感到困惑，请不要担心；我们接下来将讨论神秘的`R`对象以及`text1`字段是如何定义的。\n\
    \n## 定义用户界面\n\n当你的全新《宋飞正传》项目被创建时，一个空白的画布被放置到位，作为用户界面。如果你深入到项目内部，在`res`文件夹下，你会看到一个`main.xml`文件。这将是你开始设计新布局的地方，可以使用图形界面构建器，也可以手工精心制作\
    \ Android UI XML。\n\n值得庆幸的是，我们不会让你经历那种折磨。相反，我们将引导你浏览我们提供的示例代码。代码清单 10-2 向你展示了我们的`food_list.xml`文件的内容。这控制着我们整个应用程序的整体外观和感觉。\n\
    \n*代码清单 10-2. food_list.xml*\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"\
    ?>\n<LinearLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    \n    android:layout_width=\"wrap_content\"\n    android:layout_height=\"wrap_content\"\
    >\n    <ListView\n        android:id=\"@id/android:list\"\n        android:layout_width=\"\
    wrap_content\"\n        android:layout_height=\"wrap_content\"/>\n    <TextView\
    \ android:id=\"@id/android:empty\"\n        android:layout_width=\"wrap_content\"\
    \n        android:layout_height=\"wrap_content\"\n        android:text=\"@string/no_foods\"\
    />\n</LinearLayout>\n```\n"
- fmt: "# CHAPTER 10 ■ ANDROID DEVELOPMENT WITH SQLITE\n\nVery briefly, our design\
    \ has a `LinearLayout` specification that is the most common for textual applications.\
    \ Within that, we define a set of expected behaviors for our UI depending on what\
    \ our UI is passed to display. Should a populated `ListView` be provided, we attempt\
    \ to display this using list semantics. Should a (nominally empty) `TextView`\
    \ be provided, we’ll display the string `no_foods`.\n\nOtherwise, we’ll display\
    \ the textual content. Only one of these two views will be used at any one time.\n\
    \nThe values `list` and `empty` are helpers provided by the Android platform,\
    \ to ease the complexity of defining the behavior of UI components.\n\nThis makes\
    \ sense when viewed in conjunction with our other layout file, `food_row.xml`,\
    \ shown in Listing 10-3.\n\n## Listing 10-3. `food_row.xml`\n\n```xml\n<?xml version=\"\
    1.0\" encoding=\"utf-8\"?>\n<TextView android:id=\"@+id/text1\"\n          xmlns:android=\"\
    http://schemas.android.com/apk/res/android\"\n          android:layout_width=\"\
    wrap_content\"\n          android:layout_height=\"wrap_content\"/>\n```\n\nHere\
    \ we’re instructing Android that we’d like a new ID called `text1`. The use of\
    \ the `+` symbol is shorthand to say “If I’ve forgotten to define `text1` by now,\
    \ go ahead and do here, so I can start using it immediately.” We find it handy\
    \ to use this approach to keep the definition of UI elements as close as possible\
    \ to where they’ll be used.\n\nGo ahead and include these UI XML files in your\
    \ project. Through the magic of the Android Developer Tools, Eclipse will note\
    \ your newly defined field and IDs and add the necessary values to the mysterious\
    \ `R.java` file. Actually, there really isn’t too much mystery here. The `R.java`\
    \ file is managed by ADT and automatically connects any UI resource to your Java\
    \ code. Feel free to inspect `R.java`, but you’ll rarely if ever need to manually\
    \ change it.\n\n## Linking the Data and User Interface\n\nOur last major task\
    \ is to control when and how our interface receives its data. For this exercise,\
    \ we’ll take the subclass of `onCreate()` that we implemented earlier in the chapter,\
    \ expand it to find and open our SQLite foods database, and populate the `ListView`\
    \ we’ve created with the results of the `fillData()` method we’ve built. This\
    \ code fragment is included in the file `Seinfeld.java`.\n\n```java\n@Override\n\
    public void onCreate(Bundle savedInstanceState) {\n    super.onCreate(savedInstanceState);\n\
    \    setContentView(R.layout.food_list);\n    mySeinfeldDbHelper = new MyDatabaseAdapter(this);\n\
    \    mySeinfeldDbHelper.createDatabase();\n    mySeinfeldDbHelper.openDatabase();\n\
    \    fillData();\n}\n```\n\nHere, we invoke `setContentView` to accept our food\
    \ `ListView`, `R.layout.food_list`. Next, we create an object using our `myDatabaseAdapter`\
    \ class and create (copy to cache) and open the database. We then call `fillData()`,\
    \ which from our earlier definition does the hard work of taking our `Cursor`\
    \ full of food results and feeding the data into `TextView` elements for our `ListView`.\n\
    \nThat’s really about it. Be sure to take a look at the full listings for `Seinfeld.java`\
    \ and the related code in the sample files included. We didn’t want to waste a\
    \ few dozen pages on printing code that you can more easily review yourself on-screen,\
    \ but looking at the code in context will help further your understanding.\n\n\
    ![index-321_1.jpg](index-321_1.jpg)\n\n## Viewing the Finished Seinfeld Application\n\
    \nWe’ve walked through the new and changed code that makes up our Seinfeld application,\
    \ so now it is time to see it in action. With Eclipse, choose Run → Run As → Android\
    \ Application. This will launch your application in your Android virtual device\
    \ created earlier in the chapter.\n\n**Note:** It can take a few minutes for the\
    \ virtual device to initialize, load, and be ready to use. Even then, it can take\
    \ a few seconds longer to see your application. You should also check that you’ve\
    \ activated the screen lock pattern to ensure your *Seinfeld* application is patiently\
    \ waiting behind the screen lock for you.\n\nOnce your *Seinfeld* application\
    \ has started, you should see familiar food names from our trusty `foods.db` SQLite\
    \ database, as shown in Figure 10-5.\n\n*Figure 10-5. Your running Seinfeld Android\
    \ SQLite application*\n\nThat’s it, you’ve created your first Android SQLite application.\
    \ From here, you can go crazy adding features and devising new applications.\n\
    \n## Care and Feeding for SQLite Android Applications\n\nAs with all mobile platforms,\
    \ the somewhat constrained nature of hardware and resources under Android (compared\
    \ with normal desktop or notebook computers) means some additional care and attention\
    \ is warranted to ensure the best possible development and user experience.\n\n\
    ### Database Backup for Android\n\nYou’ve seen in our development of the `myDatabaseHelper.java`\
    \ subclass that it is possible to work directly with the SQLite database file.\
    \ Using normal Android API calls, it is possible to manipulate the SQLite file\
    \ yourself, and therefore you could use this approach to provide for backups and\
    \ recovery of your database. But there is a better way.\n\nGoogle provides a backup\
    \ service with Android, which allows you to copy any kind of persistent data to\
    \ remote storage. This applies not just to SQLite database files, but that’s our\
    \ focus for now. This is a very useful way to provide for data resilience, backup,\
    \ and recovery, way beyond what you could achieve manually. For instance, if a\
    \ user invokes a factory reset on an Android-powered device, a do-it-yourself\
    \ backup would likely be lost. But the data backup system can automatically restore\
    \ your data when your application is reinstalled.\n\nThis feature is quite in-depth\
    \ and is based around a number of classes. `BackupAgent`, `BackupAgentHelper`,\
    \ and `BackupManager` are the main APIs involved. As with some of the classes\
    \ we’ve seen, each of these classes includes a number of methods and subclasses\
    \ designed to be overridden by you so that you can provide application-specific\
    \ behavior for backup and restore activities. There’s enough material required\
    \ to cover these tasks to fill a book in its own right, so we’ll point you to\
    \ the online documentation for further reading at [http://developer.android.com/guide/topics/data/backup.html](http://developer.android.com/guide/topics/data/backup.html).\n\
    \n### Working with Large SQLite Databases Under Android\n\nIn our introduction\
    \ to creating an Android virtual device, we mentioned several configuration options\
    \ that control or mimic the memory, cache, and storage resources available to\
    \ you when creating any Android application. These included maximum VM application\
    \ heap size, cache partition size, and device RAM Size.\n\nA subtle but frustrating\
    \ issue can arise when you begin working with large sets of data derived from\
    \ your SQLite databases. You run some queries, fetch very large results into your\
    \ `Cursor` object, and start working with the data. At some point, your UI crashes\
    \ and leaves you with bizarre UI errors in the trace output. What’s going on?\n\
    \nDespite the sometime prodigious amounts of memory and storage now available\
    \ on Android devices and configurable in your AVD, there are other limits that\
    \ can crimp your style. The most common of these involves using the `CursorWindow`\
    \ object as a secondary cache of `Cursor` result rows. A `CursorWindow` can accommodate\
    \ only 1MB of data. The variable smooth operation or crashing behavior you can\
    \ see can be caused by attempting to exceed the `CursorWindow` size limit with\
    \ too many rows and or rows with excessively long data. Naturally, sometimes your\
    \ data may be short and sweet, thus showing no problem, but at other times…kapow!"
