- fmt: '# Why limit this result set?


    We did this to simplify our application and avoid dealing with operating large
    SQLite databases and datasets in our very first example under iOS. If we’d attempted
    to do large database operations during the `applicationDidFinishLaunching` event,
    we ran the risk of incurring the wrath of the Watchdog Timer. The job of the Watchdog
    Timer is to ensure that all applications running on the iPad, iPhone, or iPod
    behave themselves. This includes preventing poorly performing applications from
    appearing to hang the device or consume too much processing time for a given action.


    Apple describes the role of the Watchdog Timer in the Apple iOS Developer documentation
    as a system monitor that checks to see how long an application takes to complete
    its initial startup (among other things). If the application takes too long, the
    Watchdog Timer will terminate the offending application with exception code `0x8badf00d`
    (get it, “bad food”). Related information will be written to the crash report
    for the incident.


    When you launch your code in Xcode, the Watchdog Timer is disabled so as to compensate
    for the various overheads that our OS X system will incur, such as invoking debuggers,
    and so on. This means you may not notice the effect of the Watchdog Timer under
    Xcode simulation. It’s always best to test on real devices to see whether you’re
    running into long-running action issues.


    # CHAPTER 9 ■ IOS DEVELOPMENT WITH SQLITE


    This really boils down to a few common-sense management approaches for working
    with SQLite applications under iOS:


    - Don’t perform time-consuming queries, or load large databases, during an startup
    event such as `applicationDidFinishLaunching`.

    - When running queries that return large results sets or that will take considerable
    time, consider breaking them up into digestible pieces of work.

    - Explore the more advanced iOS API features for managing long-running tasks.


    At the end of the day, if the Watchdog Timer decides to intervene, you’ll see
    the following (or similar) error:


    ```

    The application iSeinfeld quit unexpectedly


    Mac OS X and other applications are not affected

    ```


    Under a real iPad or iPhone, instead of this error message, you will see the application
    attempt to load the main view and abort partway through. You will usually be returned
    to the home screen. Armed with this knowledge, you should be able to keep the
    Watchdog Timer a happy hound.


    ## Summary


    You’ve now experienced the trials and tribulations of creating your first (or
    latest) SQLite-based iOS application. We know your friends and family will be
    amazed at your newfound trivia knowledge. In all honesty, they’ll probably be
    interested in just how easy it is to build your own iPad or iPhone application
    with SQLite.


    If you do decide to make it big with your iSeinfeld application, be sure to let
    us know. We’d love to buy a copy of the application from iTunes to add to our
    collection of iSeinfeld variants.


    # CHAPTER 10


    ## Android Development with SQLite


    Android has stormed the mobile device market in the few short years it has been
    available, and if you’ve given in to temptation and bought a mobile phone, tablet,
    or other device running Android, then you’ve been a proud user of SQLite all this
    time! SQLite is one of the built-in data persistence technologies included in
    the Android platform and supported by the Dalvik virtual machine. Unlike iOS described
    in Chapter 9, the Java foundations of Dalvik mean that a purpose-built API wrapper
    is used around the underlying SQLite C API when application developers want to
    employ SQLite in their applications.


    In this chapter, we’ll mix things up with a walk-through of the Android SQLite
    library, its classes, and its methods. Instead of just a dry rehash of the documentation,
    we’ll take the opportunity to build a working Android SQLite-based application
    (just as we did for iOS in Chapter 9). We’ll use the concept of the Seinfeld food
    trivia application and walk through creating the code and UI for the application.


    We’ll also cover some of the developer considerations required for successfully
    maintaining Android applications on a device over time.


    ## Prerequisites for SQLite Android Development


    To do any development work with SQLite for Android, you’ll need to equip yourself
    with the required tools. Once equipped with these tools, you’ll be in a position
    to do all manner of Android development, not just work involving SQLite. Obviously,
    SQLite is our area of interest, so that’s what we will focus on.


    The four steps you need to complete are as follows:


    1.  Check and install minimum prerequisites, including the Java development kit
    (JDK).

    2.  Download and install the Android SDK starter package.

    3.  Download and install the Android Developer Tools (ADT) if supported by your
    integrated development environment (IDE).

    4.  Add any desired target Android platforms and other components to your environment.


    We’ll cover each of these quickly and move on to the SQLite work pronto!


    # CHAPTER 10 ■ ANDROID DEVELOPMENT WITH SQLITE


    ## Check Prerequisites and the JDK


    To develop any Android application, you’ll need to check that your development
    computer meets a few simple system requirements. First, you must be running Linux,
    OS X, or Windows XP or newer. The Android team lists particular versions and related
    dependencies at [http://developer.android.com/sdk/requirements.html](http://developer.android.com/sdk/requirements.html).
    In addition to that, about 500MB of free disk space is required for the Android
    components, in addition to space required for your IDE.


    The most important prerequisite is the JDK. Android development requires either
    JDK 5 or JDK 6. Note that the Java runtime environment (JRE) is not sufficient.
    You can source the latest JDK from the Oracle web site if you require it, or you
    can choose an IDE that incorporates the JDK.


    All your development of SQLite Android applications will be done in an IDE. There
    are many to choose from, but the most popular, and best for beginners, is Eclipse.
    Using Eclipse will enable you to also use Google’s Android Developer Tools, which
    we cover shortly. The Android team recommends using Eclipse version 3.4 or newer
    and choosing a “classic” or “Java-focused” release.


    ## Downloading and Installing the Android SDK Starter Package


    The Android SDK Starter Package is the core set of tools required for any Android
    development. Importantly, it’s not a complete SDK. Rather, it acts as a baseline
    that also guides you to download additional required components.


    Google makes downloading the Android SDK Starter Package very easy. Browse to
    the site [http://developer.android.com/sdk/index.html](http://developer.android.com/sdk/index.html),
    and you’ll see the latest SDK versions available directly for download. At the
    time of writing, release 7 is the latest release. Depending on your choice of
    Linux, OS X, or Windows, you’ll need one of the following packages:


    - Linux: `android-sdk_r07-linux_x86.tgz`

    - Mac OS X: `android-sdk_r07-mac_x86.zip`

    - Windows: `android-sdk_r07-windows.zip`


    With the SDK downloaded, you can now proceed to installation. Extract the contents
    of your `.zip` or `.tgz` file to a convenient location on your computer. For example,
    we’re using Eclipse under Windows, so we’ll place the extracted SDK in the directory
    `c:\eclipse\dropins\android-sdk-windows`.


    Once you’ve placed the extracted SDK in your desired location, you’ll need to
    add that directory to your system’s `PATH` environment variable. Refer to Chapter
    2 if you need a refresher on how to add a directory to your `PATH`.


    ## Downloading and Installing the Android Developer Tools'
