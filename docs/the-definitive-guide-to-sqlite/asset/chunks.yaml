    by **create table** from *system tables* and other table-like objects such as
    views.


    The minimum required information for **create table** is a table name and a column
    name. The


    name of the table, given by **table_name**, must be unique among all other identifiers.
    In the body, **column_definitions** consists of a comma-separated list of column
    definitions composed of a name, a *domain*, and a comma-separated list of *column
    constraints*. A type, sometimes referred to as a *domain*, is synonymous with
    a data type in a programming language. It denotes the type of information that
    is stored in the column.


    There are five native types in SQLite: **integer**, **real**, **text**, **blob**,
    and **null**. All of these types are covered in the section called “Storage Classes”
    later in this chapter. *Constraints* are constructs that control what kind of
    values can be placed in the table or in individual columns. For instance, you
    can ensure that only unique values are placed in a column by using a **unique**
    constraint. Constraints are covered in the section “Data Integrity.”


    The **create table** command allows you to include a list of additional column
    constraints at the end of the command, denoted by **constraints** in the syntax
    outlined earlier. Consider the following example: **create table contacts ( id
    integer primary key,**


    **name text not null collate nocase,**


    **phone text not null default ''UNKNOWN'',**


    **unique (name,phone) );**


    **Column **id** is declared to have type **integer** and constraint **primary
    key**. As it turns out, the combination of this type and constraint has a special
    meaning in SQLite. **Integer primary key** basically turns the column into an
    autoincrement column (as explained in the section “Primary Key Constraints”


    later in this chapter). Column **name** is declared to be of type **text** and
    has two constraints: **not null** and **collate nocase**. Column **phone** is
    of type **text** and has two constraints defined as well. After that, there is
    a table-level constraint of **unique**, which is defined for columns n**ame**
    and **phone** together.


    This is a lot of information to absorb all at once, but it will all be explained
    in due course. You can probably appreciate our preamble that warned you how complex
    tables could become. The only


    important thing here, however, is that you understand the general format of the
    **create table** statement.


    Altering Tables


    You can change parts of a table with the **alter table** command. SQLite’s version
    of **alter table** can either rename a table or add columns. The general form
    of the command is as follows:


    **alter table table { rename to name | add column *column_def*** **}**


    CHAPTER 3 ■ SQL FOR SQLITE


    Note that there is some new notation here: **{}**. Braces enclose a list of options,
    where one option is required. In this case, we have to use either **alter table
    table rename…** or **alter** **table table add** **column…**. That is, you can
    either rename the table using the **rename** clause or add a column with the **add**
    **column** clause. To rename a table, you simply provide the new name given by
    **name**.


    If you add a column, the column definition, denoted by **column_def**, follows
    the form in the **create** **table** statement. It is a name, followed by an optional
    domain and list of constraints. Here’s an example:


    ****sqlite> alter table contacts**


    **add column email text not null default '''' collate nocase;**


    **sqlite> .schema contacts**


    **create table contacts ( id integer primary key,**


    **name text not null collate nocase,**


    **phone text not null default ''UNKNOWN'',**


    **email text not null default '''' collate nocase,**


    **unique (name,phone) );**


    **To view the table definition from within the SQLite command-line program, use
    the **.schema** shell command followed by the table name. It will print the current
    table definition. If you don’t provide a table name, then **.schema** will print
    the entire database schema.


    Tables can also be created from the results of **select** statements, allowing
    you to create not only the structure but also the data at the same time. This
    particular use of the **create table** statement is covered later in the section
    “Inserting Records.”


    Querying the Database


    The effort spent designing your database and creating your tables all focuses
    on one purpose: *using* your data. Working with your data is the job of SQL’s
    DML. The core of DML is the **select** command, which has the unique honor of
    being the sole command for querying the database. **select** is by far the largest
    and most complex command in SQL. **select** derives many of its operations from
    relational algebra and encompasses a large portion of it. The capabilities and
    complexities of the **select** statement are *vast*, even in a streamlined efficient
    environment like SQLite. Don’t let that put you off. SQLite’s approach to the
    **select** command is very logical, and it has a firm grounding in the underlying
    relational theory that underpins all RDBMS.


    Relational Operations


    For the theoretically minded, it’s useful to think about what select does and
    why it does it, framed in a conceptual way. In most SQL implementations, including
    SQLite’s, the **select** statement provides for the “relational operations” that
    source, mix, compare, and filter data. These relational operations are typically
    divided into three categories:


    • Fundamental operations


    •


    Restriction


    •


    Projection


    •


    Cartesian product


    CHAPTER 3 ■ SQL FOR SQLITE


    •


    Union


    •


    Difference


    •


    Rename


    • Additional operations


    •


    Intersection


    •


    Natural join


    •


    Assign


    • Extended operations


    •


    Generalized projection


    •


    Left outer join


    •


    Right outer join


    •


    Full outer join


    The fundamental operations are just that: fundamental. They define the basic relational
    operations, and all of them (with the exception of rename) have their basis in
    set theory. The additional operations are for convenience, offering a shorthand
    way of performing frequently used combinations of the


    fundamental operations. For instance, intersection can be performed by taking
    the union of two sets and from that removing via difference the results of two
    further unions that have each had difference applied for one of the two initial
    sets. Finally, the extended operations add features to the fundamental and additional
    operations. For example, the generalized projection operation adds arithmetic


    expressions, aggregates, and grouping features to the fundamental projection operations.
    The outer joins extend the join operations and allow additional information and/or
    incomplete information to be retrieved from the database.


    In standard ANSI SQL, **select** can perform every one of these relational operations.
    These


    operations map to the original relational operators defined by E. F. Codd in his
    original work on relational theory (with the exception of **divide**). SQLite
    supports all the relational operations in ANSI SQL with the exception of right
    and full outer joins. The types of joins can be constructed using combinations
    of other fundamental relational operations, so don’t fret their absence.


    All of these operations are defined in terms of relations or, as they are commonly
    called, tables! They take one or more relations as their inputs and produce a
    relation as their output. This allows operations to be strung together into relational
    expressions. Relational expressions can therefore be created to arbitrary complexity.
    For example, the output of a select operation (a relation) can be fed as the input
    to another **select** statement, as follows:


    **select name from (select name, type_id from (select * from foods));**'
