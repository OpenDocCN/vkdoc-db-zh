    ## 聚合


    聚合比函数稍微复杂一点。在用户定义函数中，你只需实现一个回调函数来完成工作，而对于聚合，你必须同时实现一个步进函数（用于计算进行中的值）和一个结束函数（用于完成所有操作并进行清理）。图
    7-1 展示了这一通用流程。不过，这并不难。和函数一样，一个好的例子就足以让你理解其要义。


    ![](img/index-227_1.png)


    第 7 章 ■ 扩展 C API


    *图 7-1. 使用聚合进行查询处理*


    ### 注册函数


    如前所述，聚合和函数使用相同的注册函数 `sqlite3_create_function()`，为方便起见，这里再次列出：


    ```c

    int sqlite3_create_function(

    sqlite3 cnx*, /* 连接句柄 */

    const char *zFunctionName, /* SQL 中的函数/聚合名称 */

    int nArg, /* 参数个数。-1 表示不限。 */

    int eTextRep, /* 编码（UTF8，16 等） */

    void *pUserData, /* 应用程序数据，传递给回调函数 */

    void (*xFunc)(sqlite3_context*,int,sqlite3_value**),

    void (*xStep)(sqlite3_context*,int,sqlite3_value**),

    void (*xFinal)(sqlite3_context*)

    );

    ```


    第 7 章 ■ 扩展 C API


    这里你做与函数完全相同的事情，但不要为 `xFunc` 提供回调，而是将其保留为 `NULL`，并为 `xStep` 和 `xFinal` 提供函数。


    ### 实际示例


    说明实现聚合的最佳方式是通过示例。这里我们将实现聚合 `str_agg()`。`str_agg()` 的想法是像 C 函数 `strcat()` 一样，将两个字符串连接在一起（敏锐的读者会发现，较新版本的
    SQLite 包含了一个类似功能的函数 `group_concat()`）。但就我们的目的而言，我们希望根据你在 SQLite 中的 SQL 指令，聚合分组和聚合操作中涉及的任意数量的字符串。你可能会想，既然可以用
    C 编写自己的字符串连接功能，在 SQLite 中是否真的需要这样的字符串连接聚合特性。`str_agg()` 方法的一个优势是能够编写语义清晰、易于理解的
    SQL，而不必在 SQL 和 C 之间来回切换来实现字符串聚合。这个示例的另一个好处当然是向你展示*如何*进行聚合。清单 7-2 展示了我们的 `str_agg()`
    函数示例（取自 `str_agg.c`）。


    *清单 7-2. `str_agg()` 测试程序*


    ```c

    int main(int argc, char **argv)

    {

    int rc; sqlite3 *db; char *sql;

    sqlite3_open_v2("foods.db", &db);

    /* 注册聚合。 */

    fprintf(stdout, "Registering aggregate str_agg()\n");

    /* 开启 SQL 跟踪。 */

    log_sql(db, 1);

    /* 注册聚合。 */

    sqlite3_create_function( db, "str_agg", 1, SQLITE_UTF8, db,

    NULL, str_agg_step, str_agg_finalize);

    /* 测试。 */

    fprintf(stdout, "\nRunning query: \n");

    sql = "select season, str_agg(name, '', '') from episodes group by season";

    print_sql_result(db, sql);

    sqlite3_close(db);

    return 0;

    }

    ```


    注意，我们的步进函数名为 `str_agg_step()`，结束函数名为 `str_agg_finalize()`。此外，此聚合被注册为只接受一个参数。


    第 7 章 ■ 扩展 C API


    ### 步进函数


    清单 7-3 展示了 `str_agg_step()` 函数。


    *清单 7-3. `str_agg()` 步进函数*


    ```c

    void str_agg_step(sqlite3_context* ctx, int ncols, sqlite3_value** values)

    {

    SAggCtx *p = (SAggCtx *) sqlite3_aggregate_context(ctx, sizeof(*p));

    static const char delim [] = ", ";

    char *txt = sqlite3_value_text(values[0]);

    int len = strlen(txt);

    if (!p->result) {

    p->result = sqlite_malloc(len + 1);

    memcpy(p->result, txt, len + 1);

    p->chrCnt = len;

    }

    else

    {

    const int delimLen = sizeof(delim);

    p->result = sqlite_realloc(p->result, p->chrCnt + len + delimLen + 1);

    memcpy(p->result + p->chrCnt, delim, delimLen);

    p->chrCnt += delimLen;

    memcpy(p->result + p->chrCnt, txt, len + 1);

    p->chrCnt += len;

    }

    }

    ```


    值 `SAggCtx` 是一个特定于此示例的结构体，定义如下：


    ```c

    typedef struct SAggCtx SAggCtx;

    struct SAggCtx {

    int chrCnt;

    char *result;

    };

    ```


    我们的结构体在聚合迭代（对步进函数的调用）之间充当状态，维护着不断增长的文本连接串和字符计数。


    ### 聚合上下文


    首要任务是检索给定聚合实例的结构体。这是使用 `sqlite3_aggregate_context()` 完成的。如前所述，首次调用此函数会为给定上下文分配数据，后续调用则会检索该数据。结构体内存在聚合完成后（在
    `str_agg_finalize()` 被调用后）会自动释放。请注意，如果系统内存不足，`sqlite3_aggregate_context()` 可能返回
    `NULL`。为简洁起见，此示例省略了此类错误检查，


