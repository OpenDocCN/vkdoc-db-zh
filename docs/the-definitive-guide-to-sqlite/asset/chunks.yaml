    There is no `where` clause to filter rows, so all rows in the table `food_types`
    are returned. The `select` clause specifies all the columns in `food_types`, and
    the `from` clause does not join tables. The result is an exact copy of `food_types`.
    As in most SQL implementations, SQLite supports an asterisk (`*`) as shorthand
    to mean all columns. Thus, the previous example can just as easily be expressed
    as follows:


    ```sql

    select * from food_types;

    ```


    In summary, SQLite’s basic `select` processing gathers all data to be considered
    in the `from` clause, filters rows (restricts) in the `where` clause, and filters
    columns (projects) in the `select` clause. Figure 3-5 shows this process.


    a b c d

    a b c d

    a c d


    FROM clause

    WHERE clause

    SELECT clause


    Restriction

    Projection

    R2

