    | **season**

    --- | --- | --- | --- | --- | ---

    Bouillabaisse | The Shoes | 4 | The Stake Out | 1 |

    Decaf Cappuccino | The Pitch | 4 | The Good Samaritan | 3 |

    Decaf Cappuccino | The Ticket | 4 | The Good Samaritan | 3 |

    Egg Salad | The Trip 1 | 4 | Male Unbonding | 1 |

    Egg Salad | The Trip 1 | 4 | The Stock Tip | 1 |

    Mints | The Trip 1 | 4 | The Cartoon | 9 |

    Snapple | The Virgin | 4 | The Abstinence | 8 |

    Tic Tacs | The Trip 1 | 4 | The Merv Griffin Show | 9 |

    Tic Tacs | The Contest | 4 | The Merv Griffin Show | 9 |

    Tuna | The Trip 1 | 4 | The Stall | 5 |

    Turkey Club | The Bubble Boy | 4 | The Soup | 6 |

    Turkey Club | The Bubble Boy | 4 | The Wizard | 9 |


    I have put comments in the SQL to better explain what is going on. This example
    uses two self-joins using the `where` clause join syntax. There are two instances
    of `episodes` and `foods_episodes`, but they are treated as if they are two independent
    tables. The query joins `foods_episodes` back on itself to link the two instances
    of `episodes`. The two `episodes` instances are related to each other by an inequality
    condition to ensure that they are in different seasons. You can alias column names
    and expressions in the same way. The general alias syntax in SQLite is the same
    in all cases.


    `Select base-name [[as] alias] …`


    The `as` keyword is optional, but many people prefer it because it makes the aliasing
    more legible, and it makes you less likely to confuse an alias with a base column
    name or expression.


    ## Subqueries


    Subqueries are `select` statements within `select` statements. They are also called
    subselects. Subqueries are useful in many ways, they work anywhere normal expressions
    work, and they can therefore be used in a variety of places in a `select` statement.
    Subqueries are useful in other commands as well.


    Perhaps the most common use of subqueries is in the `where` clause, specifically
    using the `in` operator. The `in` operator is a binary operator that takes an
    input value and a list of values and returns true if the input value exists in
    the list, or false otherwise. Here’s an example:


    ```

    sqlite> select 1 in (1,2,3);

    1

    sqlite> select 2 in (3,4,5);

    0

    sqlite> select count(*)

    ...> from foods

    ...> where type_id in (1,2);

    62

    ```


    Using a subquery, you can rewrite the last statement in terms of names from the
    `food_types`:

    ```

    sqlite> select count(*)

    ...> from foods

    ...> where type_id in

    ...> (select id

    ...> from food_types

    ...> where name=''Bakery'' or name=''Cereal'');

    62

    ```


    Subqueries in the `select` clause can be used to add additional data from other
    tables to the result set. For example, to get the number of episodes each food
    appears in, the actual count from `foods_episodes` can be performed in a subquery
    in the `select` clause:

    ```

    sqlite> select name,

    (select count(id) from foods_episodes where food_id=f.id) count

    from foods f order by count desc limit 10;

    name        count

    ----------  ----------

    Hot Dog     5

    Pizza       4

    Ketchup     4

    Kasha       4

    Shrimp      3

    Lobster     3

    Turkey Sandwich 3

    Turkey Club 3

    Egg Salad   3

    Tic Tacs    3

    ```


    The `order by` and `limit` clauses here serve to create a top ten list, with hot
    dogs at the top. Notice that the subquery’s predicate references a table in the
    enclosing `select` command: `food_id=f.id`. The variable `f.id` exists in the
    outer query. The subquery in this example is called a correlated subquery because
    it references, or correlates to, a variable in the outer (enclosing) query.


    Subqueries can be used in the `order by` clause as well. The following SQL groups
    foods by the size of their respective food groups, from greatest to least:

    ```

    select * from foods f

    order by (select count(type_id)

    from foods where type_id=f.type_id) desc;

    ```


    `order by` in this case does not refer to any specific column in the result. How
    does this work then?'
