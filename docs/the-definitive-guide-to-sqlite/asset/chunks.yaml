    to our project so we can get working with our data faster!


    If you’re following the default directory layout for Xcode, you’ll find your iSeinfeld
    SQLite project in the **/Users/ *user_name*/Documents/iSeinfeld** directory (where
    ***user_name*** is your username). Copy your **foods.db** file to this directory
    in order to keep all of your project data, code, and resources together. On the
    left pane of your Xcode project, open the Resources folder. Ctrl+click, and choose
    Add  Existing files. In the Add File dialog box, navigate to the **/Users/ *user_name*/Documents/iSeinfeld**
    directory, and choose the **foods.db** file, as shown in Figure 9-8.


    *Figure 9-8\. Adding an existing SQLite database to your Xcode project*


    Once again, Xcode will prompt with several options for this file’s inclusion in
    the project. We only need the default behavior here, so click Add to have the
    **foods.db** file added to your project. Your Xcode resources folder should now
    list the **foods.db** SQLite database, as shown in Figure 9-9.


    ![](index-286_1.jpg)


    CHAPTER 9 ■ IOS DEVELOPMENT WITH SQLITE


    *Figure 9-9\. The iSeinfeld project with foods SQLite database included as a resource*


    Your iSeinfeld iOS application now has the SQLite libraries in place and a populated
    database


    included in the project. It’s time to start coding!


    Step 4: Creating Classes for the Food Data


    In addition to the default classes created with our new project, we will need
    two classes to represent the data from our SQLite database as objects within the
    application. Well need a **Food** class to represent one kind of food and the
    data we want to use from foods within our application. We’ll also need a view
    controller class to manage the interaction of our interface (the view) with the
    model that represents our foods.


    CHAPTER 9 ■ IOS DEVELOPMENT WITH SQLITE


    **IOS ANDMODEL-VIEW-CONTROLLER DEVELOPMENT**


    The Model-View-Controller approach to dividing up functionality in a program has
    become both popular and mature over recent years. The good news is the iOS approach
    to development, and Xcode tools, are designed to harmoniously work in an MVC world.


    Our little example isn’t really big enough to show off the natural MVC tool set
    and ways of working within Xcode, but you can rest assured that the support and
    approach are there when needed.


    The Food Class


    Within your iSeinfeld project in Xcode, Cmd+click the Classes folder, and choose
    Add  New File. Call your new class **Food**. We want to derive Food from the
    base Objective-C class and use the **NSObject** subclass. We’ll provide three
    data members: **Name**, **Popularity**, and **First Episode**. We’ll also use
    a custom **init** function (think constructor for those familiar with other object-oriented
    languages) to create a **Food** instance more easily. Listing 9-1 shows the **Food.h**
    header.


    *Listing 9-1\. **Food.h***


    **// Food.h**


    **// iSeinfield**


    **//**


    **// Created by Grant Allen on 9/9/10.**


    **// Copyright 2010 __MyCompanyName__. All rights reserved.**


    **//**


    **#import <Foundation/Foundation.h>**


    **@interface Food : NSObject {**


    **NSString *first_episode;**


    **NSString *popularity;**


    **NSString *name;**


    **}**


    **@property (nonatomic, retain) NSString *first_episode;**


    **@property (nonatomic, retain) NSString *popularity;**


    **@property (nonatomic, retain) NSString *name;**


    **-(id)initWithName:(NSString *)n first_episode:(NSString *)f popularity:(NSString
    *)t;**


    ****@end**'
  trans: "\n让我们开始吧。\n\n## 步骤 1：创建一个新的 Xcode 项目\n\n启动 Xcode 以开始。如果这是你第一次启动 Xcode（或者你没有更改过默认设置），你会在\
    \ Xcode 环境上方看到一个“欢迎使用 Xcode”的闪屏。现在可以将其关闭——事实上，如果你不想再看到它，也请取消勾选“启动时显示”选项。\n\n![](img/index-282_1.jpg)\n\
    \nXcode 运行后，选择“文件”>“新建”>“项目”。对于我们的 iSeinfeld 应用程序，我们希望使用基于导航的应用程序作为项目模板。这是因为我们将使用主屏幕和详细屏幕来展示\
    \ SQLite 食物数据的各种视图。图 9-5 显示了 Xcode 中的新项目选项。\n\n*图 9-5. 为我们的 SQLite 项目创建一个新的基于导航的应用程序*\n\
    \n为你的项目选择一个有意义的名字。我们将我们的项目命名为 iSeinfeld，但你可以随意采用任何易记或有意义的名字。默认情况下，这将是应用程序在 iOS\
    \ 设备主屏幕上显示的名称（尽管以后可以更改）。你新创建的项目应该与我们在图 9-6 中展示的项目类似。\n\n![](img/index-283_1.jpg)\n\
    \n*图 9-6. Xcode 中的新 iSeinfeld 项目*\n\n## 步骤 2：将 SQLite 框架添加到你的项目中\n\n有了空白的 iSeinfeld\
    \ 项目后，我们现在需要将 SQLite 库添加到框架列表中，以便我们未来的代码能够利用并使用 SQLite API。\n\n从 Xcode 项目的左窗格中，打开“Frameworks”文件夹。`Ctrl+点击`\
    \ 并选择“添加”>“已有的框架”。在对话框中，导航到目录 `` `/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS\
    \ x.y.z. sdk/usr/lib/` ``，其中 `x.y.z` 是你的 Xcode 和 iOS 所针对的 iPhone 固件版本号。根据你在安装\
    \ Xcode 和 iOS SDK 时选择的选项，你可能会看到多个带版本号的目录。我们建议选择最新（最高）的版本。\n\n![](img/index-284_1.jpg)\n\
    \n**注意：** 如果你使用的是最新的 iOS 4 版本，这些目录可能会将 `iPhone` 改为 `iOS`。别担心，底层的库是相同的。\n\n从该目录中，选择\
    \ `libsqlite3.dylib` 条目。你可能也会看到一个 `libsqlite3.0.dylib` 或类似的文件。`libsqlite3.dylib`\
    \ 条目是一个指向最新版本 `dylib` 文件的软链接，在本例中是 `libsqlite3.0.dylib`。我们建议始终选择软链接，以避免不必要地指定具体版本。\n\
    \n选择这个文件，将会弹出一个选项对话框，询问引用类型和文本编码。我们不需要这里提供的任何替代行为，因此只需点击“添加”以使用默认设置继续。你现在应该会返回到你的\
    \ Xcode 项目。在左窗格的“Frameworks”文件夹下，你现在应该可以看到 `libsqlite3.dylib` 条目，如图 9-7 所示。\n\n\
    *图 9-7. SQLite `libsqlite3.dylib` 库已添加到 Xcode 中的 iSeinfeld 项目* 262\n\n![](img/index-285_1.jpg)\n\
    \n## 步骤 3：准备食物数据库\n\n我们有两种选择来为我们的项目准备一个可用的数据库。我们可以逐步完成创建新数据库、创建表和插入数据的过程；或者我们可以部署一个现有的数据库供我们的\
    \ iSeinfeld 应用程序使用。\n\n从头开始手动创建所有内容，将让我们逐步了解 SQLite API 的 `sqlite3_open_v2()`、`sqlite3_prepare()`\
    \ 等函数，以及无数的 `sqlite3_exec()` 等调用。由于 C 和 Objective-C 非常相似，这基本上会是第 6 章的重复。我们认为那会浪费本章的篇幅。更重要的是，当你自己构建并发布下一个伟大的\
    \ iOS 应用程序时，你几乎肯定会将其与一个现有的数据库打包在一起（尽管你很可能会提供添加新数据和处理现有数据的功能）。我们将采用这第二种方法，但我们也会涵盖创建新数据库的选项，以及在\
    \ SQLite 中进行数据操作的典型 SQL 语句。我们将把我们的 `foods.db` SQLite 数据库添加到项目中，以便更快地开始处理我们的数据！\n\
    \n如果你遵循 Xcode 的默认目录布局，你会在 `` `/Users/user_name/Documents/iSeinfeld` `` 目录（其中 `user_name`\
    \ 是你的用户名）中找到你的 iSeinfeld SQLite 项目。将你的 `foods.db` 文件复制到此目录，以将所有项目数据、代码和资源保存在一起。在\
    \ Xcode 项目的左窗格中，打开“Resources”文件夹。`Ctrl+点击`，并选择“添加”>“已有的文件”。在“添加文件”对话框中，导航到 ``\
    \ `/Users/user_name/Documents/iSeinfeld` `` 目录，并选择 `foods.db` 文件，如图 9-8 所示。\n\n\
    *图 9-8. 将现有的 SQLite 数据库添加到你的 Xcode 项目中*\n\nXcode 将再次提示几个关于此文件包含在项目中的选项。我们这里只需要默认行为，因此点击“添加”将\
    \ `foods.db` 文件添加到你的项目中。你的 Xcode 资源文件夹现在应该列出 `foods.db` SQLite 数据库，如图 9-9 所示。\n\
    \n![](img/index-286_1.jpg)\n\n*图 9-9. 包含 foods SQLite 数据库作为资源的 iSeinfeld 项目*\n\
    \n你的 iSeinfeld iOS 应用程序现在已就位 SQLite 库，并且项目中包含了一个已填充数据的数据库。是时候开始编码了！\n\n## 步骤 4：为食物数据创建类\n\
    \n除了新项目创建的默认类之外，我们还需要两个类，用于将来自 SQLite 数据库的数据表示为应用程序中的对象。我们需要一个 `Food` 类来表示一种食物以及我们在应用程序中想要使用的食物数据。我们还需要一个视图控制器类来管理我们界面（视图）与代表我们食物的模型之间的交互。\n\
    \n**iOS 与 模型-视图-控制器 开发**\n\n模型-视图-控制器 方法用于划分程序功能，在近年来变得既流行又成熟。好消息是，iOS 的开发方法和\
    \ Xcode 工具都是为了在 MVC 世界中和谐工作而设计的。\n\n我们的小示例不足以展示 Xcode 中天然的 MVC 工具集和工作方式，但你可以放心，当需要时，支持和方法就在那里。\n\
    \n### Food 类\n\n在你的 Xcode 中的 iSeinfeld 项目中，`Cmd+点击` “Classes” 文件夹，然后选择“添加”>“新建文件”。将你的新类命名为\
    \ `Food`。我们希望 `Food` 派生自 Objective-C 基类，并使用 `NSObject` 子类。我们将提供三个数据成员：`Name`、`Popularity`\
    \ 和 `First Episode`。我们还将使用一个自定义的 `init` 函数（熟悉其他面向对象语言的读者可以认为是构造函数）来更轻松地创建 `Food`\
    \ 实例。代码清单 9-1 展示了 `Food.h` 头文件。\n\n*代码清单 9-1. `Food.h`*\n\n```\n// Food.h\n//\
    \ iSeinfield\n//\n// Created by Grant Allen on 9/9/10.\n// Copyright 2010 __MyCompanyName__.\
    \ All rights reserved.\n//\n#import <Foundation/Foundation.h>\n@interface Food\
    \ : NSObject {\n    NSString *first_episode;\n    NSString *popularity;\n    NSString\
    \ *name;\n}\n@property (nonatomic, retain) NSString *first_episode;\n@property\
    \ (nonatomic, retain) NSString *popularity;\n@property (nonatomic, retain) NSString\
    \ *name;\n-(id)initWithName:(NSString *)n first_episode:(NSString *)f popularity:(NSString\
    \ *)t;\n@end\n```\n"
- fmt: "# 第9章：使用 SQLite 进行 iOS 开发\n\n此时，还看不到 SQLite API 调用的痕迹，但你大概已经能看出 `Food` 类将如何融入其中。我们特定\
    \ SQLite 查询返回的行数据将用作 `initWithName` 函数的种子数据，以创建 `Food` 对象的实例。\n\n## Food.m 文件\n\
    \n头文件就位后，我们实际上需要实现它。打开 `Food.m` 文件（如代码清单 9-2 所示），并充实 `initWithName` 函数，将参数 `n`、`f`\
    \ 和 `t` 赋给实例变量。\n\n**代码清单 9-2. `Food.m`**\n\n```objective-c\n// Food.m\n// iSeinfield\n\
    //\n// Created by Grant Allen on 9/9/10.\n// Copyright 2010 __MyCompanyName__.\
    \ All rights reserved.\n//\n\n#import \"Food.h\"\n\n@implementation Food\n\n@synthesize\
    \ first_episode, popularity, name;\n\n-(id)initWithName:(NSString *)n first_episode:(NSString\
    \ *)f popularity:(NSString *)t {\n    self.name = n;\n    self.first_episode =\
    \ f;\n    self.popularity = t;\n    return self;\n}\n\n@end\n```\n\n这非常简单，即使你以前从未用\
    \ Objective-C 编写过代码。对于 Objective-C 的新手，你会注意到一个 `@synthesize` 指令，后面跟着我们类的每个成员变量。这是\
    \ Objective-C 的一个技巧，可以自动为你创建 getter 和 setter，省去了你编写六个枯燥方法来完成同样工作的麻烦。\n\n## FoodViewController\
    \ 类\n\n我们的 iSeinfeld 应用程序的迷你规范要求我们显示 SQLite 数据库中给定食物的详细信息。从我们的 `Food` 类，你可以猜到详细信息将是\
    \ `popularity` 和 `first_episode`。我们需要一个新类来管理这些详细信息的视图（在 MVC 意义上），并充当模型与视图之间的控制器。这就是\
    \ `FoodViewController` 类。像之前一样创建一个新类，但这次选择 `UIViewController` 子类。将其命名为 `FoodViewController`。我们还需要一个\
    \ View XIB 文件作为详细视图的画布。在 Resources 下，选择 Add ➤ New File，然后从 User Interfaces 组中选择\
    \ View XIB。将此 XIB 命名为 `FoodViewController.xib`，以提醒你此 UI 元素与 `FoodViewController`\
    \ `UIViewController` 类一起使用。\n\n我们的 `FoodViewController` 类需要为详细数据定义两个出口，以便与 View\
    \ XIB 进行交互。代码清单 9-3 显示了 `FoodViewController.h` 的定义以及这些必需的出口。\n\n**代码清单 9-3. `FoodViewController.h`**\n\
    \n```objective-c\n// FoodsViewController.h\n// iSeinfield\n//\n// Created by Grant\
    \ Allen on 9/9/10.\n// Copyright 2010 __MyCompanyName__. All rights reserved.\n\
    //\n\n#import <UIKit/UIKit.h>\n\n@interface FoodViewController : UIViewController\
    \ {\n    IBOutlet UITextView *first_episode;\n    IBOutlet UITextView *popularity;\n\
    }\n\n@property (nonatomic, retain) IBOutlet UITextView *first_episode;\n@property\
    \ (nonatomic, retain) IBOutlet UITextView *popularity;\n\n@end\n```\n\n我们选择 `UITextView`\
    \ 作为出口修饰符，因为我们知道将显示文本数据和数字。这个类在 `FoodViewController.m` 中的实现包含了几页默认方法和许多被注释掉的额外方法。我们不会浪费纸张来展示这些。只需确保你导入了头文件，并且在\
    \ `FoodViewController` 的实现中，你合成了两个成员变量，像这样：\n\n```objective-c\n#import \"FoodViewController.h\"\
    \n\n@implementation FoodViewController\n\n@synthesize foodID, typeID;\n\n// more\
    \ template methods etc.\n// …\n```\n\n你为 `FoodViewController.xib` 选择的布局完全取决于你的艺术构思。作为指导，我们创建了一个简单的屏幕，包含两个\
    \ `Text Field` 元素和两个 `Label` 元素，并在 Interface Builder 中将它们连接到前面定义的出口。图 9-10 显示了我们完成的\
    \ XIB 布局。\n\n![](index-290_1.jpg)"
  raw: '**At this point, there’s no sign of our SQLite API calls, but you can probably
    already see where the **Food** class will fit in. Rows returned from our particular
    SQLite queries will be used as seed data in the **initWithName** function to create
    instances of the **Food** object.


    CHAPTER 9 ■ IOS DEVELOPMENT WITH SQLITE


    With our header in place, we actually need an implementation. Open the **Food.m**
    file, as shown in Listing 9-2, and flesh out the **initWithName** function to
    assign the parameters **n**, **f**, and **t** to the instance variables.


    *Listing 9-2\. **Food.m***


    **// Food.m**


    **// iSeinfield**


    **//**


    **// Created by Grant Allen on 9/9/10.**


    **// Copyright 2010 __MyCompanyName__. All rights reserved.**


    **//**


    ****#import "Food.h"**


    **@implementation Food**


    **@synthesize first_episode, popularity, name;**


    **-(id)initWithName:(NSString *)n first_episode:(NSString *)f popularity:(NSString
    *)t {**


    **self.name = n;**


    **self.first_episode = f;**


    **self.popularity = t;**


    ****return self;**


    **}**


    **@end**


    **Pretty simple stuff, even if you’ve never coded in Objective-C before. For those
    of you new to


    Objective-C, you’ll notice a **@synthesize** directive, followed by each of the
    member variables for our class. That’s an Objective-C trick to automatically create
    getters and setters on your behalf, saving you from the effort of writing six
    dull methods to do the same thing.


    The FoodViewController Class


    Our mini-specification for the iSeinfeld application asked us to display detailed
    information for a given food held in our SQLite database. From our **Food** class,
    you can guess that the details will be **popularity** and **first_episode**. We
    need a new class to manage the view of these details (in the MVC sense) and act
    as the controller with the model. Enter the **FoodViewController** class. Create
    a new class as before, but this time choose the **UIViewController** subclass.
    Name it **FoodViewController**. We also will need a View XIB file to act as our
    canvas for the detail view. Under Resources, choose Add  New File, and from the
    User Interfaces group choose View XIB. Call this XIB **FoodViewController.xib**
    to give you a mental reminder that this UI element is used with the **FoodViewController**
    **UIViewController** class.


    Our **FoodViewController** class needs to define two outlets for the detail data
    to interface with the View XIB. Listing 9-3 shows the definition of **FoodViewController.h**
    and these required outlets.


    CHAPTER 9 ■ IOS DEVELOPMENT WITH SQLITE


    *Listing 9-3\. **FoodViewController.h***


    **// FoodsViewController.h**


    **// iSeinfield**


    **//**


    **// Created by Grant Allen on 9/9/10.**


    **// Copyright 2010 __MyCompanyName__. All rights reserved.**


    **//**


    **#import <UIKit/UIKit.h>**


    **@interface FoodViewController : UIViewController {**


    **IBOutlet UITextView *first_episode;**


    **IBOutlet UITextView *popularity;**


    **}**


    **@property (nonatomic, retain) IBOutlet UITextView *first_episode;**


    **@property (nonatomic, retain) IBOutlet UITextView *popularity;**


    **@end**


    We’ve chosen **UITextView** as the outlet modifier, because we know we’ll be displaying
    textual data and numbers. The implementation of this class in **FoodViewController.m**
    contains a few pages of default methods and many commented-out extras. We won’t
    waste paper showing those. Simply ensure that


    you import the header file, and in the **FoodViewController** implementation you
    synthesize the two member variables, like this:


    **#import "FoodViewController.h"**


    **@implementation FoodViewController**


    **@synthesize foodID, typeID;**


    **// more template methods etc.**


    **// …**


    **Your choice for layout for **FoodViewController.xib** is entirely up to your
    artistic desire. As a guide, we’ve created a simple screen with two **Text Field**
    elements and two **Label** elements and wired them up in Interface Builder to
    the outlets defined earlier. Figure 9-10 shows our finished XIB layout.


    ![](index-290_1.jpg)


    CHAPTER 9 ■ IOS DEVELOPMENT WITH SQLITE'
