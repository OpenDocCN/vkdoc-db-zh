    类型的条目是一个奇数，意味着它是一个文本值。因此其大小由 (49-1)/2=24 字节给出。有了这些信息，VDBE 就可以解析记录的数据段并提取各个字段。


    ## 层次化数据组织


    基本上，栈中的每个模块处理特定的数据单元。从下往上，数据变得更精细、更具体。从上往下，数据变得更聚合、更抽象。


