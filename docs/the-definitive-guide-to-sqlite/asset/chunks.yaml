    # CHAPTER 2 ■ GETTING STARTED


    ## Anonymous Fossil Source Control


    If you want to play with the latest features or participate in SQLite development,
    then retrieving SQLite from the project''s Fossil source control system makes
    the most sense. Fossil provides the same kind of anonymous access you''ll likely
    have seen in other source control systems, like CVS, Subversion, Perforce, Git,
    and so on. Fossil allows you to maintain the absolutely latest version of the
    SQLite source code by accessing the source straight from your browser! If you
    want, you can keep your copy of the code synced up to the day, hour, or minute
    to stay current with changes as they are committed. Thus, if you see an important
    bug fix or feature posted that you want to take advantage of, you can have Fossil
    sync and recompile your copy of the code. Fossil even includes an autosync feature
    to guarantee you stay at the forefront of any source changes.


    Obtaining SQLite from Fossil on Windows couldn''t be easier. Like SQLite binaries,
    Fossil is distributed as a single statically linked file. You can download Fossil
    from the project''s home page, [www.fossil-scm.org](http://www.fossil-scm.org).
    The download page includes up-to-the-minute releases for Windows, as well as Mac
    OS X and Linux. Unzip the Fossil archive to a location on your path (see our previous
    discussion on determining your `PATH` environment variable). Next, make a new
    directory to house your Fossil source extracts, or choose an existing directory
    if you prefer.


    You can do most of your source control work with Fossil in a browser—Fossil acts
    as its own HTTP server to handle all the server-side tasks. The fastest way to
    get your initial check-out of the SQLite source code is to use your newly downloaded
    `fossil.exe` binary to clone one of the SQLite online repositories. Open a command
    prompt, and change directories to the new or existing directory you''ve chosen
    for your SQLite Fossil source control repository. Then at the command prompt,
    issue the Fossil `clone` command, as shown here:


    `C:\sqlite\fossil.exe clone http://www.sqlite.org/src sqlite.fossil`


    ```

    Bytes Cards Artifacts Deltas

    Send: 49 1 0 0

    Received: 1499917 32606 0 0

    Send: 10025 225 0 0

    Received: 132364 239 7 193

    ...

    Send: 4655 99 0 0

    Received: 1698453 125 29 69

    Total network traffic: 1379539 bytes sent, 17512520 bytes received

    Rebuilding repository meta-data...

    32605 (100%)...

    project-id: 2ab58778c2967968b94284e989e43dc11791f548

    server-id: 38f0c0987054889a5d2c0b4f27b370e9e8632a16

    admin-user: fuzz (password is "******")

    ```


    The format of the command is `fossil <action> <Fossil Repository URL> <your repository
    name>`. In this case, the action was `clone`, meaning to take a complete copy
    of the SQLite repository. We provide one of the SQLite Fossil repositories described
    on the SQLite website, in this case `www.sqlite.org/src`.


    Lastly, we provide a name of our choosing, which will be the name of the file
    Fossil creates to contain and manage our copy of the source. This can be any name
    you like that satisfies Windows file-naming conventions. We choose `sqlite.fossil`
    to be a useful name reminding us what the file contains and what uses it.


    ![](index-46_1.png)


    ## ■ **Note**


    We are targeting the current "head" of the source control tree for SQLite with
    the example given. This means you would be compiling from the latest and greatest
    source. That''s a two-edged sword of course, giving you the absolute latest developments
    but not the benefit of a "stable" release. Feel free to choose a stable branch
    if you prefer.


    You are now ready to launch and use the Fossil web interface. From your command
    line, just run the next command (substitute your own directory and local repository
    filename as appropriate).


    `C:\sqlite\fossil.exe ui sqlite.fossil`

