    # 第 1 章


    ■ ■ ■


    ## SQLite 简介


    SQLite 是一款开源的嵌入式关系数据库。它最初发布于 2000 年，旨在为应用程序提供一种便捷的数据管理方式，避免了专用关系数据库管理系统通常带来的开销。SQLite
    以高度可移植、易于使用、紧凑、高效和可靠而闻名，享有当之无愧的声誉。


    ### 嵌入式数据库


    SQLite 是一款 *嵌入式* 数据库。它并非作为独立进程运行，而是与所服务的应用程序共生共存于其进程空间内。其代码与宿主程序交织在一起，或者说 *嵌入*
    在其中。对于外部观察者来说，几乎无法察觉这样的程序内部搭载了一个关系数据库管理系统 (`RDBMS`)。程序只是在执行其任务并以某种方式管理其数据，而不会大张旗鼓地宣扬其内部机制。但其内部，确实运行着一个完整、自包含的数据库引擎。


    将数据库服务器置于程序内部的一大优势是，无需进行网络配置或管理。花点时间想想这有多么自由：无需担心防火墙或地址解析，也无需浪费时间管理复杂的权限和特权。客户端和服务器在同一进程内共同运行。这减少了与网络调用相关的开销，简化了数据库管理，并使应用程序更易于部署。你需要的所有东西都已编译到你的程序中。


    考虑图 1-1 中所示的进程。一个是 Perl 脚本，另一个是标准的 `C/C++` 程序，最后一个是 Apache 托管的 `PHP` 脚本，它们都使用了
    SQLite。Perl 脚本导入了 `DBI::SQLite` 模块，该模块又链接到 `SQLite C API`，从而引入了 `SQLite` 库。`PHP`
    库的工作方式类似，`C++` 程序也是如此。最终，所有三个进程都通过 `SQLite C API` 进行交互。因此，这三个进程都将 SQLite 嵌入到了它们的进程空间中。通过这种方式，这些进程不仅运行着各自相应的代码，它们自身也成为了独立的数据库服务器。此外，尽管每个进程代表一个独立的服务器，它们仍然可以操作相同的数据库文件，这得益于
    SQLite 利用 `操作系统` 来管理同步和锁定机制。


    当今市场上有各种专门为嵌入式使用而设计的关系数据库产品——例如 Sybase SQL Anywhere、Oracle TimesTen 和 BerkleyDB、Pervasive
    PSQL 以及 Microsoft 的 `Jet Engine`。一些主导的商业供应商也对其大型数据库进行了精简，创建了嵌入式变体。例子包括 IBM 的 `DB2
    Everyplace`、Oracle 的 `Database Lite` 和 Microsoft 的 `SQL Server Express`。开源数据库
    `MySQL` 和 `Firebird` 也提供嵌入式版本。在所有这些产品中，只有一款是开源的、无需许可费用、并且专为用作嵌入式数据库而设计：那就是 SQLite。


