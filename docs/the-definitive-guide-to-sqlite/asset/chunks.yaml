  raw: 'Prepared queries use a special group of functions to access field and column
    information from a


    row. You get column values using **sqlite3_column_ *xxx*()**, where ***xxx***
    represents the data type of the value to be returned (for example, **int**, **double**,
    **blob**). You can retrieve data in whatever format you like. You can also obtain
    the declared types of columns (as they are defined in the **create table** statement)
    and other miscellaneous metadata such as storage format and both associated table
    and database names.


    **sqlite3_exec()**, by comparison, provides only a fraction of this information
    through its callback function. The same is true with **sqlite3_get_table()**,
    which only includes the result set’s column headers with the data.


    In practice, you will find that each query method has its uses. **sqlite3_exec()**
    is especially good for running commands that modify the database (**create**,
    **drop**, **insert**, **update**, and **delete**). One function call, and it’s
    done. Prepared queries are typically better for **select** statements because
    they offer so much more information, more linear coding (no callback functions),
    and more control by using cursors to iterate over results.


    As you’ll recall from Chapter 5, prepared queries are performed in three basic
    steps: compilation, execution, and finalization. You compile the query with **sqlite3_prepare_v2()**,
    execute it step-by-step using **sqlite3_step()**, and close it using **sqlite3_finalize()**,
    or you can reuse it using **sqlite3_reset()**.


    This process and the individual steps are all explained in detail in the following
    sections.


    Compilation


    Compilation, or preparation, takes a SQL statement and compiles it into byte code
    readable by the virtual database engine (VDBE). It is performed by **sqlite3_prepare_v2()**,
    which is declared as follows: **int sqlite3_prepare_v2(**


    **sqlite3 *db, /* Database handle */**


    **const char *zSql, /* SQL text, UTF-8 encoded */**


    **int nBytes, /* Length of zSql in bytes. */**


    **sqlite3_stmt **ppStmt, /* OUT: Statement handle */**


    **const char **pzTail /* OUT: Pointer to unused portion of zSql */**


    **);**


    ****sqlite3_prepare_v2()** compiles the first SQL statement in the **zSQL** string
    (which can contain multiple SQL statements). It allocates all the resources necessary
    to execute the statement and


    associates it along with the byte code into a single statement handle (also referred
    to as simply a *statement*), designated by the out parameter **ppStmt**, which
    is a **sqlite3_stmt** structure. From the programmer’s perspective, this structure
    is little more than an opaque handle used to execute a SQL


    statement and obtain its associated records. However, this data structure contains
    the command’s byte 161


