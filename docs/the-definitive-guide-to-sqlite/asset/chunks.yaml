  trans: '

    # 第十章 ■ 使用 SQLite 进行 Android 开发


    正如编写 SQL 语句有多种方式一样，Android 也提供了多种方法来对你的 SQLite 数据库执行 SQL。事实上，用于对 SQLite 数据库执行通用或特定查询的方法不少于
    16 种。它们可以分为用于执行单表插入、更新等操作的便捷函数，以及用于执行 DML 和 DDL 的通用方法。这些通用方法可以归类如下：


    `void execSQL(String sql)`

    `void execSQL(String sql, Object[] bindArgs)`

    `Cursor query(boolean distinct, String table, String[] columns, String selection,
    String[] selectionArgs, String groupBy, String having, String orderBy, String
    limit)`

    `Cursor query(String table, String[] columns, String selection, String[] selectionArgs,
    String groupBy, String having, String orderBy)`

    `Cursor query(String table, String[] columns, String selection, String[] selectionArgs,
    String groupBy, String having, String orderBy, String limit)`

    `Cursor queryWithFactory(SQLiteDatabase.CursorFactory cursorFactory, boolean distinct,
    String table, String[] columns, String selection, String[] selectionArgs, String
    groupBy, String having, String orderBy, String limit)`

    `Cursor rawQuery(String sql, String[] selectionArgs)`

    `Cursor rawQueryWithFactory(SQLiteDatabase.CursorFactory cursorFactory, String
    sql, String[] selectionArgs, String editTable)`


    不要被这里的众多方法吓退。你可以看到它们基本上有三种核心类型——`execSQL()`、`query()` 和 `rawQuery()`，后两者有变体，如果你选择使用，它们会利用来自你
    `SQLiteOpenHelper()` 调用的 `CursorFactory`。


    `execSQL()` 的两种形式都接受一个 SQL 语句作为 `sql` 参数，第二种形式还接受一个绑定参数数组（`bindArgs`）来绑定到查询。`execSQL()`
    方法用于不返回结果的语句，例如 `create table`、`insert`、`update`、`alter table` 等等。`void` 方法返回类型应该能帮你记住这一点。


    `query()` 和 `queryWithFactory()` 方法本质上是用于对你的数据库执行轻量级单表 select 语句的函数。看看那些不同的参数。你会发现它们包括
    `table`、`columns`、`orderBy` 等等。本质上，这些方法中的每一个都允许你将 SQL 语句的各个子句传递给相关方法，而无需包含 SQL
    关键字本身。


    最后一对方法，`rawQuery()` 和 `rawQueryWithFactory()`，允许你使用任何字符串作为 SQL select 语句，并将结果作为
    `Cursor` 对象返回。你会注意到它们都接受一个名为 `selectionArgs` 的 `Strings` 数组。通过这个参数，`SQLiteDatabase`
    对象将按照位置顺序（即第一个问号替换为数组的第一个元素，依此类推）将你的 SQL 语句中的所有问号（`?`）绑定参数替换为数组中的 `String` 值。


    ## compileStatement 的奇特之处


    我们避免讨论 `SQLiteDatabase` 的一个方法。那个方法就是 `compileStatement()` 方法。你可能从它的名字认为它是一个非常有用的、通用的语句编译和查询准备工具。在某种程度上它是，但在其他方面，它有点奇怪。首先，这里是方法签名：


    `public SQLiteStatement compileStatement (String sql)`


    那里没什么太奇怪的。接受一个包含 SQL 的 `String`，并返回一个 `SQLiteStatement` 类型的对象。


    事实上，如其名称所示，此方法编译一条语句并允许其重用（根据底层 SQLite C API 的重置语义）。但随后奇怪之处就显现了。


    `compileStatement()`，以及与之相关的 `SQLiteStatement` 对象，只能用于最多返回一行结果、最多一列结果集的语句。实际上，`compileStatement()`
    调用的结果和 `SQLiteStatement` 的数据成员必须是一个简单的标量值。我们可以想到一些这种情况有用的场景，比如统计表中符合条件的行数或结果集。但我们可以想到一个大得多的场景集合，在这些场景中你希望你的
    SQL 能处理结果集！


    所以，现在你知道了 `compileStatement()` 和 `SQLiteStatement`，但如果你和我们一样，你会发现你很少使用它。


    ## 与 SQLiteDatabase 一起使用便捷方法


    我们提到了 16 个可以执行查询的方法，但前面部分只涵盖了 8 个方法。


    另外 8 个是便捷方法，允许你对单个数据库表执行插入、更新、删除和替换语句。这些方法如下：


    `int delete(String table, String whereClause, String[] whereArgs)`

    `long insert(String table, String nullColumnHack, ContentValues initialValues)`

    `long insertOrThrow(String table, String nullColumnHack, ContentValues initialValues)`

    `long insertWithOnConflict(String table, String nullColumnHack, ContentValues
    initialValues, int conflictAlgorithm)`

    `long replace(String table, String nullColumnHack, ContentValues initialValues)`

    `long replaceOrThrow(String table, String nullColumnHack, ContentValues initialValues)`

    `int update(String table, ContentValues values, String whereClause, String[] whereArgs)`

    `int updateWithOnConflict(String table, ContentValues values, String whereClause,
    String[] whereArgs, int conflictAlgorithm)`


    乍一看，各种便捷方法非常容易理解。决定你要采取的操作，用适当的参数指定表，构建一个 `whereClause`，并提供 `whereArgs`。仔细看看 `insert()`
    及相关方法，以及 `replace()` 方法也是如此。你会看到一个相当奇怪的 `String` 参数，`nullColumnHack`。它与 `initialValues
    ContentValue` 映射协同工作。当 `initialValues` 映射为空时，`nullColumnHack` 将为列提供 `NULL` 值，以防止尝试插入空数据，这自然会导致失败。


    尽管这些方法起初看起来很吸引人，但它们主要是为面向对象的开发者设计的，这些开发者更喜欢简单的 CRUD 风格的原始数据操作。这些方法倾向于支持将数据库仅用作持久层，正如已经提到的，这会导致无法充分发挥像
    SQLite 这样的关系数据库的力量和优雅。既然我们已经提到了这些方法，我们将继续前进，希望你会使用其他方法的能力来构建和执行查询。


    ## 使用 SQLiteDatabase 管理事务


    Android 封装器尊重所有 SQLite 事务管理的基础。有几个有用的方法可用于启动、结束和管理你的事务。


    `void beginTransaction()`

    `void beginTransactionWithListener(SQLiteTransactionListener transactionListener)`

    `void endTransaction()`

    `boolean inTransaction()`

    `void setTransactionSuccessful()`


    其中一些方法几乎不需要解释。`beginTransaction()` 开始一个 SQLite 事务，`endTransaction()` 结束 `SQLiteDatabase`
    对象的当前事务上下文。

    '
- fmt: "## Android 开发中的 SQLite\n\n### 关键事务控制方法\n\n关键在于，事务是提交还是回滚，取决于事务是否被标记为“干净”。这是通过调用\
    \ `setTransactionSuccessful()` 方法实现的。这个附加的步骤起初可能有些麻烦，但实际上它的存在是为了确保你在提交前仔细检查对数据库的所有更改。`setTransactionSuccessful()`\
    \ 方法会在你不在事务中或已经将事务设置为成功时，抛出 `IllegalStateException` 异常。`inTransaction()` 方法用于测试你当前是否处于一个活跃的事务中，如果是则返回\
    \ `true`。\n\n接下来是 `beginTransactionWithListener()` 方法。它接受一个 `SQLiteTransactionListener`\
    \ 对象作为参数。每当事务中发生事务管理事件（无论是提交、回滚还是嵌套的开始事件）时，都会触发事件通知该对象。\n\n## 使用其他 SQLiteDatabase\
    \ 方法\n\n`SQLiteDatabase` 对象还提供了许多其他有用的方法。这里挑选几个来完善我们的讨论。\n\n*   **public long\
    \ getMaximumSize()**: 返回数据库允许的最大大小。\n*   **public int getVersion()**: 返回你应用程序特定的数据库版本。\n\
    *   **public boolean isDbLockedByCurrentThread()**: 测试你当前的线程是否持有数据库锁。\n*   **public\
    \ boolean isDbLockedByOtherThreads()**: 测试是否有其他线程持有数据库锁。\n*   **public static\
    \ int releaseMemory()**: 释放数据库、游标等不再需要的所有工作内存。返回释放的字节数。\n\n还有许多其他简单的布尔方法可用于测试数据库状态的各个方面，以及许多方法用于控制将数据库的缓存副本同步回存储等任务。\n\
    \n## 实践应用 SQLiteOpenHelper 和 SQLiteDatabase\n\n我们现在已经涵盖了足够多的 Android SQLite API\
    \ 知识，可以逐步讲解一个实现我们自己的 `SQLiteOpenHelper` 子类的示例，其中包含重写的方法来管理我们的 `SQLiteDatabase`——即底层的\
    \ SQLite 数据库。\n\n清单 10-1 展示了一个 Android 代码的示例片段（一个较大且可工作的片段），它实现了我们自己的 `SQLiteOpenHelper`\
    \ 子类，处理了使用我们的 *Seinfeld* 数据库时常见的创建和打开任务。此代码作为 `myDatabaseHelper.java` 包含在示例代码中。\n\
    \n**清单 10-1. myDatabaseHelper.java**\n\n```java\nimport java.io.*;\nimport android.database.sqlite.*;\n\
    import android.database.SQLException;\nimport android.content.Context;\n\npublic\
    \ class myDatabaseHelper extends SQLiteOpenHelper{\n    //DBPATH 使用给定应用程序的默认系统路径\n\
    \    // /data/data/<app namespace> ，在我们的示例中将是 com.example.seinfeld\n    private\
    \ static String DBPATH = \"/data/data/com.example.seinfeld/databases/\";\n   \
    \ private static String DBNAME = \"foods.db\";\n    private SQLiteDatabase myDatabase;\n\
    \    private final Context myContext;\n\n    //构造函数\n    public myDatabaseHelper(Context\
    \ context) {\n        super(context, DBNAME, null, 1);\n        this.myContext\
    \ = context;\n    }\n\n    //创建一个空数据库，并用我们选择的数据库替换\n    public void createDatabase()\
    \ throws IOException{\n        if (!checkDatabase()) {\n            this.getWritableDatabase();\n\
    \            try {\n                copyDatabase();\n            }\n         \
    \   catch (IOException e) {\n                throw new Error(\"Error copying database\
    \ from system assets\");\n            }\n        }\n    }\n\n    //检查我们的数据库是否已存在\n\
    \    private boolean checkDatabase(){\n        SQLiteDatabase checkableDatabase\
    \ = null;\n        try {\n            checkableDatabase =\n                SQLiteDatabase.openDatabase(DBPATH+DBNAME,\
    \ null,\n                SQLiteDatabase.OPEN_READONLY);\n        }\n        catch\
    \ (SQLiteException e) {\n            //我们的数据库不存在，因此下面将返回 false。\n        }\n \
    \       if (checkableDatabase != null) {\n            checkableDatabase.close();\n\
    \        }\n        return checkableDatabase != null ? true : false;\n    }\n\
    ```"
  raw: 'Crucially, whether the transaction commits or rolls back is dependent on the
    transaction being marked as “clean.” This is achieved by calling the **setTransactionSuccessful()**
    method. This added step is at first an annoyance, but in reality it exists to
    ensure you double-check all changes to the database before committing. The **setTransactionSuccessful()**
    method with throw an **IllegalStateException** exception if you are not in a transaction
    or have already set the transaction to successful. The **inTransaction()** method
    tests whether you are currently in an active transaction, returning **true** if
    that’s the case.


    This leaves the **beginTransactionWithListener()** method. This takes a **SQLiteTransactionListener**
    object as a parameter. An event will fire notifying this object every time a transaction
    management even happens in the transaction, whether that’s a commit, rollback,
    or nested begin event.


    CHAPTER 10 ■ ANDROID DEVELOPMENT WITH SQLITE


    Using Other SQLiteDatabase Methods


    Numerous other helpful methods are available to the **SQLiteDatabase** object.
    Here are a select few to round out our discussion.


    •


    **public long getMaximumSize()**: Returns the maximum size allowed for the


    database.


    •


    **public int getVersion()**: Returns your application-specific database version.


    •


    **public boolean isDbLockedByCurrentThread()**: Tests whether your current thread


    holds the database lock.


    •


    **public boolean isDbLockedByOtherThreads()**: Tests whether another thread holds


    the database lock.


    •


    **public static int releaseMemory()**: Releases all working memory no longer


    needed by the database, cursors, and so on. The number of bytes freed is returned.


    There are a number of other simple Boolean methods to test various aspects of
    your database’s state, as well as a number of methods to control synchronizing
    cached copies of your database back to storage and other tasks.


