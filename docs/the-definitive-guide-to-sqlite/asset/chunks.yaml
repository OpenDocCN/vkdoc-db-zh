    **id season name**


    **--- ------ --------------------**


    **0 1 Good News Bad News**


    **Figure 11-3 shows the internal record format for this record.**


    **04 01 01 49


    00 01


    Good News Bad News


    *Figure 11-3\. First record in the **episodes** table*


    The header is 4 bytes long. The header size reflects this and itself is encoded
    as a single byte. The first type, corresponding to the **id** field, is a 1-byte
    signed integer. The second type, corresponding to the **season** field, is as
    well. The **name** type entry is an odd number, meaning it is a text value. Its
    size is therefore given by (49-13)/2=17 bytes. With this information, the VDBE
    can parse the data segment of the record and extract the individual fields.


    CHAPTER 11 ■ SQLITE INTERNALS AND NEW FEATURES


    Hierarchical Data Organization


    Basically, each module in the stack deals with a specific unit of data. From the
    bottom up, data becomes more refined and more specific. From the top down, it
    becomes more aggregated and amorphous.


    Specifically, the C API deals in field values, the VDBE deals in records, the
    B-tree deals in keys and data, the pager deals in pages, and the OS interface
    deals in binary data and raw storage, as illustrated in Figure 11-4.


    *Figure 11-4\. Modules and their associated data*


    Each module takes part in managing its own specific portion of the data in the
    database and relies on the layer below it to supply it with a cruder form from
    which to extract its respective pieces.


    Overflow Pages


    As mentioned earlier, payloads and their contents can have variable sizes. However,
    pages are fixed in size. Therefore, there is always the possibility that a given
    payload could be too large to fit in a single page. When this happens, the excess
    payload is spilled out onto a linked list of overflow pages. From this point on,
    the payload takes on the form of a linked list of sorts, as shown in Figure 11-5.


    CHAPTER 11 ■ SQLITE INTERNALS AND NEW FEATURES


    The fourth payload in the figure is too large to fit on the page. As a result,
    the B-tree module creates an overflow page to accommodate. It turns out that one
    page won’t suffice, so it links a second. This is essentially the way binary large
    objects are handled. One thing to keep in mind when you are using really large
    **blob**s is that they are ultimately being stored as a linked list of pages.
    If the **blob** is large enough, this can become inefficient, in which case you
    might consider dedicating an external file for the **blob** and keeping this file
    name in the record instead.


    *Figure 11-5\. Overflow pages*


    The B-Tree API


    The B-tree module has its own API, which is separate from the C API. We’ll explore
    it here for


    completeness, but it’s not really meant as a general-purpose B-tree API. You’ll
    see it is heavily tailored to the needs of SQLite, so it’s not really suitable
    for you to just pick up and drop into some other project.


    That said, understanding it in depth will allow you to appreciate even more of
    SQLite’s internals. An added benefit of SQLite’s B-tree module is that it includes
    native support for transactions. Everything you know about the transactions, locks,
    and journal files are handled by the pager, which serves the Btree module. The
    API can be grouped into functions according to general purpose.


    Access and Transaction Functions


    Database and transaction routines include the following:


    • **sqlite3BtreeOpen**: Opens a new database file. Returns a B-tree object.


    • **sqlite3BtreeClose**: Closes a database.


    • **sqlite3BtreeBeginTrans**: Starts a new transaction.


    • **sqlite3BtreeCommit**: Commits the current transaction.


    CHAPTER 11 ■ SQLITE INTERNALS AND NEW FEATURES


    • **sqlite3BtreeRollback**: Rolls back the current transaction.


    • **sqlite3BtreeBeginStmt**: Starts a statement transaction.


    • **sqlite3BtreeCommitStmt**: Commits a statement transaction.


    • **sqlite3BtreeRollbackStmtsqlite3BtreeRollbackStmt**: Rolls back a statement


    transaction.


