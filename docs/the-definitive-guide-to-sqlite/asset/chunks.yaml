- fmt: "# CHAPTER 3 ■ SQL FOR SQLITE\n\nAn underscore (`_`) in the pattern matches\
    \ any single character in the string. The percent symbol is greedy. It will eat\
    \ everything between two characters except those characters. If it is on the extreme\
    \ left or right of a pattern, it will consume everything on each respective side.\
    \ Consider the following examples:\n\n```\nsqlite> select id, name from foods\
    \ where name like '%ac%P%';\nid     name\n-----  --------------------\n127   \
    \ Guacamole Dip\n168    Peach Schnapps\n198    Mackinaw Peaches\n```\n\nAnother\
    \ useful trick is to use `NOT` to negate a pattern:\n\n```\nsqlite> select id,\
    \ name from foods\n   ...> where name like '%ac%P%' and name not like '%Sch%'\n\
    id     name\n-----  --------------------\n38     Pie (Blackberry) Pie\n127   \
    \ Guacamole Dip\n198    Mackinaw peaches\n```\n\nThe `glob` operator is very similar\
    \ in behavior to the `like` operator. Its key difference is that it behaves much\
    \ like Unix or Linux file globbing semantics in those operating systems. This\
    \ means it uses the wildcards associated with file globbing such as `*` and `_`\
    \ and that matching is case sensitive. The following example demonstrates `glob`\
    \ in action:\n\n```\nsqlite> select id, name from foods\n   ...> where name glob\
    \ 'Pine*';\nid     name\n-----  ----------\n205    Pineapple\n258    Pineapple\n\
    ```\n\nSQLite also recognizes the `match` and `regexp` predicates but currently\
    \ does not provide a native implementation. You’ll need to develop your own with\
    \ the `sqlite_create_funtion()` call, discussed in Chapters 5 through 8.\n\n##\
    \ Limiting and Ordering\n\nYou can limit the size and particular range of the\
    \ result using the `limit` and `offset` keywords. `limit` specifies the maximum\
    \ number of records to return. `offset` specifies the number of records to skip.\
    \ For example, the following statement obtains the Cereal record (the second record\
    \ in `food_types`) using `limit` and `offset`:\n\n```\nselect * from food_types\
    \ order by id limit 1 offset 1;\n```\n\nThe `offset` clause skips one row (the\
    \ `Bakery` row), and the `limit` clause returns a maximum of one row (the Cereal\
    \ row).\n\nBut there is something else here as well: `order by`. This clause sorts\
    \ the result by a column or columns before it is returned. The reason it is important\
    \ in this example is because the rows returned from `select` are never guaranteed\
    \ to be in any specific order—the SQL standard declares this. Thus, the `order\
    \ by` clause is essential if you need to count on the result being in any specific\
    \ order. The syntax of the `order by` clause is similar to the `select` clause:\
    \ it is a comma-separated list of columns. Each entry may be qualified with a\
    \ sort order—`asc` (ascending, the default) or `desc` (descending). For example:\n\
    \n```\nsqlite> select * from foods where name like 'B%'\n   ...> order by type_id\
    \ desc, name limit 10;\nid     type_id   name\n-----  --------  --------------------\n\
    382    15        Baked Beans\n383    15        Baked Potato w/Sour\n384    15\
    \        Big Salad\n385    15        Broccoli\n362    14        Bouillabaisse\n\
    328    12        BLT\n327    12        Bacon Club (no turke\n326    12       \
    \ Bologna\n329    12        Brisket Sandwich\n274    10        Bacon\n```\n\n\
    Typically you only need to order by a second (third, and so on) column when there\
    \ are duplicate values in the first (second, and so on) ordered column(s). Here,\
    \ there were many duplicate `type_id`s. I wanted to group them together and then\
    \ arrange the foods alphabetically within these groups.\n\n> **Note:** `limit`\
    \ and `offset` are not standard SQL keywords as defined in the ANSI standard.\
    \ Most databases have functional equivalents, although they use different syntax.\n\
    \nIf you use both `limit` and `offset` together, you can use a comma notation\
    \ in place of the `offset` keyword. For example, the following SQL:\n```\nselect\
    \ * from foods where name like 'B%'\norder by type_id desc, name limit 1 offset\
    \ 2;\n```\ncan be expressed equivalently with this:\n```\nsqlite> select * from\
    \ foods where name like 'B%'\n   ...> order by type_id desc, name limit 2,1;\n\
    id     type_id   name\n-----  --------  --------------------\n```"
