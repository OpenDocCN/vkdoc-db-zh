  trans: "\n# 第 10 章 ■ 使用 SQLite 进行安卓开发\n\n简而言之，我们的设计采用了一个`LinearLayout`规范，这是文本类应用程序中最常见的。在此框架内，我们根据\
    \ UI 需要显示的内容，定义了一组预期的 UI 行为。如果提供了一个填充了数据的`ListView`，我们将尝试使用列表语义来显示它。如果提供了一个（名义上为空的）`TextView`，我们将显示字符串`no_foods`。\n\
    \n否则，我们将显示文本内容。这两种视图在任何时候只会使用其中之一。\n\n值`list`和`empty`是安卓平台提供的辅助工具，用于简化定义 UI 组件行为的复杂性。\n\
    \n将这个文件与我们的另一个布局文件`food_row.xml`（如清单 10-3 所示）结合起来看，就很有道理了。\n\n## 清单 10-3. `food_row.xml`\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<TextView android:id=\"\
    @+id/text1\"\n          xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    \n          android:layout_width=\"wrap_content\"\n          android:layout_height=\"\
    wrap_content\"/>\n```\n\n这里，我们指示安卓系统，我们想要一个名为`text1`的新 ID。使用`+`符号是简写，意思是“如果我到现在为止忘了定义`text1`，那就在这里定义它，这样我可以立即开始使用它。”我们发现使用这种方法可以使\
    \ UI 元素的定义尽可能靠近它们将被使用的地方。\n\n请将这些 UI XML 文件包含到你的项目中。借助安卓开发工具的魔力，Eclipse 会注意到你新定义的字段和\
    \ ID，并将必要的值添加到神秘的`R.java`文件中。实际上，这里并没有太多神秘之处。`R.java`文件由 ADT 管理，它会自动将任何 UI 资源连接到你的\
    \ Java 代码。你可以随意检查`R.java`，但你几乎永远不需要手动修改它。\n\n## 连接数据与用户界面\n\n我们的最后一个主要任务是控制我们的界面何时以及如何接收数据。在这个练习中，我们将采用本章前面实现的`onCreate()`子类，扩展它以查找并打开我们的\
    \ SQLite 食物数据库，并使用我们构建的`fillData()`方法的结果来填充我们创建的`ListView`。这段代码包含在`Seinfeld.java`文件中。\n\
    \n```java\n@Override\npublic void onCreate(Bundle savedInstanceState) {\n    super.onCreate(savedInstanceState);\n\
    \    setContentView(R.layout.food_list);\n    mySeinfeldDbHelper = new MyDatabaseAdapter(this);\n\
    \    mySeinfeldDbHelper.createDatabase();\n    mySeinfeldDbHelper.openDatabase();\n\
    \    fillData();\n}\n```\n\n在这里，我们调用`setContentView`来接收我们的食物`ListView`，即`R.layout.food_list`。接下来，我们使用`myDatabaseAdapter`类创建一个对象，并创建（复制到缓存）并打开数据库。然后我们调用`fillData()`，根据我们之前的定义，这个方法负责完成艰巨的工作：获取我们充满食物结果的`Cursor`，并将数据填充到我们`ListView`的`TextView`元素中。\n\
    \n基本就是这些了。请务必查看示例文件中包含的`Seinfeld.java`完整清单及相关代码。我们不想浪费几十页的篇幅来打印你可以更轻松地在屏幕上自行审阅的代码，但在上下文中查看代码将有助于加深你的理解。\n\
    \n![index-321_1.jpg](img/index-321_1.jpg)\n\n## 查看完成的 Seinfeld 应用程序\n\n我们已经逐步讲解了构成我们\
    \ Seinfeld 应用程序的新代码和更改后的代码，现在是时候看看它的实际运行了。在 Eclipse 中，选择“运行” → “运行方式” → “安卓应用程序”。这将在你本章前面创建的安卓虚拟设备中启动你的应用程序。\n\
    \n**注意：** 虚拟设备可能需要几分钟来初始化、加载并准备就绪。即便如此，看到你的应用程序可能还需要几秒钟。你还应该检查是否已启用屏幕锁定图案，以确保你的*Seinfeld*应用程序在屏幕锁定后面耐心等待着你。\n\
    \n一旦你的*Seinfeld*应用程序启动，你应该会看到来自我们可靠的`foods.db` SQLite 数据库中熟悉的食物名称，如图 10-5 所示。\n\
    \n*图 10-5. 你正在运行的 Seinfeld 安卓 SQLite 应用程序*\n\n就是这样，你已经创建了你的第一个安卓 SQLite 应用程序。从这里开始，你可以尽情添加功能和设计新的应用程序。\n\
    \n## SQLite 安卓应用程序的维护与保障\n\n与所有移动平台一样，安卓上硬件和资源在某种程度上受限的性质（与普通的台式机或笔记本电脑相比）意味着需要额外的注意和关怀，以确保最佳的开发和用户体验。\n\
    \n### 安卓数据库备份\n\n在我们开发`myDatabaseHelper.java`子类的过程中，你已经看到可以直接操作 SQLite 数据库文件。使用常规的安卓\
    \ API 调用，你可以自己操作 SQLite 文件，因此你可以使用这种方法来提供数据库的备份和恢复。但有一个更好的方法。\n\n谷歌为安卓提供了一项备份服务，允许你将任何类型的持久数据复制到远程存储。这不仅适用于\
    \ SQLite 数据库文件，但这是目前我们的重点。这是一种非常有用的方式，可以提供数据弹性、备份和恢复，其效果远超手动操作所能达到的。例如，如果用户在安卓设备上执行了出厂重置，自己做的备份很可能会丢失。但数据备份系统可以在你重新安装应用程序时自动恢复你的数据。\n\
    \n这个功能相当深入，它基于一系列类。`BackupAgent`、`BackupAgentHelper`和`BackupManager`是涉及的主要 API。与我们见过的一些类类似，这些类中的每一个都包含许多方法和子类，旨在由你重写，以便为备份和恢复活动提供特定于应用程序的行为。要涵盖这些任务所需的材料足以单独写成一本书，因此我们将指引你到在线文档以进行深入阅读：[`developer.android.com/guide/topics/data/backup.html`](http://developer.android.com/guide/topics/data/backup.html)。\n\
    \n### 在安卓下处理大型 SQLite 数据库\n\n在我们介绍创建安卓虚拟设备时，我们提到了几个配置选项，这些选项在创建任何安卓应用程序时控制或模拟可用的内存、缓存和存储资源。这些包括最大的虚拟机应用程序堆大小、缓存分区大小和设备\
    \ RAM 大小。\n\n当你开始处理源自 SQLite 数据库的大型数据集时，可能会出现一个微妙但令人沮丧的问题。你运行一些查询，将非常大的结果集获取到`Cursor`对象中，并开始处理数据。在某个时刻，你的\
    \ UI 崩溃了，并在跟踪输出中留下了奇怪的 UI 错误。这是怎么回事？\n\n尽管安卓设备上现在有时拥有巨大的内存和存储空间，并且可以在你的 AVD 中配置，但还有其他限制可能会束缚你的手脚。其中最常见的一个涉及将`CursorWindow`对象用作`Cursor`结果行的二级缓存。一个`CursorWindow`只能容纳\
    \ 1MB 的数据。你可能看到的不流畅操作或崩溃行为，可能是由于试图用太多行和/或包含过长数据的行来超过`CursorWindow`大小限制而导致的。自然，有时你的数据可能又短又简洁，因此不会出现问题，但有时……砰的一声就崩溃了！\n"
- fmt: '# CHAPTER 10 ■ ANDROID DEVELOPMENT WITH SQLITE


    Our advice is to remember that you are dealing with devices usually sporting only
    a 3-inch or 4-inch screen and that caching thousands of rows is probably not a
    useful design. What user of yours will ever scroll or read through that amount
    of data in one action, especially on a screen that that small?


    ## Summary


    You now have a firm understanding of the tools, classes, and practice of creating
    SQLite-based Android applications. The Android SQLite API is somewhat different
