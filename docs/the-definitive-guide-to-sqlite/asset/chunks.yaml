    \ `sqlite3_exec()` 调用中，向 `episodes` 表插入一条记录，然后选取其所有记录。完整的代码如清单 6-2 所示，取自 `exec.c`。\n\
    \n### 清单 6-2. 使用 `sqlite3_exec()` 进行记录处理\n\n```c\nint callback(void* data, int\
    \ ncols, char** values, char** headers);\n\nint main(int argc, char **argv)\n\
    {\n    sqlite3 *db;\n    int rc;\n    char *sql;\n    char *zErr;\n\n    rc =\
    \ sqlite3_open_v2(\"test.db\", &db);\n    if(rc) {\n        fprintf(stderr, \"\
    Can't open database: %s\\n\", sqlite3_errmsg(db));\n        sqlite3_close(db);\n\
    \        exit(1);\n    }\n\n    const char* data = \"Callback function called\"\
    ;\n    sql = \"insert into episodes (id, name) values (11,'Mackinaw Peaches');\"\
    \n          \"select * from episodes;\";\n    rc = sqlite3_exec(db, sql, callback,\
    \ data, &zErr);\n\n    if(rc != SQLITE_OK) {\n        if (zErr != NULL) {\n  \
    \          fprintf(stderr, \"SQL error: %s\\n\", zErr);\n            sqlite3_free(zErr);\n\
    \        }\n    }\n\n    sqlite3_close(db);\n    return 0;\n}\n\nint callback(void*\
    \ data, int ncols, char** values, char** headers)\n{\n    int i;\n    fprintf(stderr,\
    \ \"%s: \", (const char*)data);\n    for(i=0; i < ncols; i++) {\n        fprintf(stderr,\
    \ \"%s=%s \", headers[i], values[i]);\n    }\n    fprintf(stderr, \"\\n\");\n\
    \    return 0;\n}\n```\n\nSQLite 解析 `sql` 字符串；执行第一条插入记录的命令；然后执行第二条由 `select` 语句组成的命令。对于第二条命令，SQLite\
    \ 为返回的每条记录调用回调函数。运行该程序会产生以下输出：\n\n```\n回调函数被调用: id=10 name=The Dinner Party\n\
    回调函数被调用: id=11 name=Mackinaw Peaches\n```\n\n注意，回调函数返回 0。这个返回值实际上对 `sqlite3_exec()`\
    \ 有一定的控制作用。如果回调函数返回非零值，那么 `sqlite3_exec()` 将会中止（换句话说，它会终止 `sql` 字符串中当前及后续所有命令的处理）。\n\
    \n因此，`sqlite3_exec()` 提供了一种修改数据库的简便方法，同时也提供了一个处理记录的接口。那么，为什么你还需要费心使用预处理查询呢？嗯，正如你将在下一节看到的，它有相当多的优势：\n\
    \n-   预处理查询不需要回调接口，这使得编码更简单、更线性。\n-   预处理查询有关联函数能提供更好的列信息。你可以获取列的存储类型、声明类型、模式名称（如果它是别名）、表名和数据库名。而\
    \ `sqlite3_exec()` 的回调接口只提供列名。\n-   预处理查询提供了一种以文本以外的其他数据类型以及 `int` 和 `double`\
    \ 等原生 C 数据类型获取字段/列值的方法，而 `sqlite3_exec()` 的回调接口只提供字符串形式的字段值。\n-   预处理查询可以重新运行，允许你重用已编译的\
    \ SQL。\n-   预处理查询支持参数化 SQL 语句。\n\n## 检查更改\n\n如果你正在执行 `update` 或 `delete`，你可能想知道有多少记录受到影响。你可以从\
    \ `sqlite3_changes()` 获取此信息。它提供了最后执行的 `update`、`insert` 或 `delete` 语句所影响的记录数。显然，如果你正在运行一批查询（在\
    \ `sqlite3_exec()` 的 `sql` 参数中的多个命令），此函数仅对批处理中的最后一个命令有效。还需注意，`sqlite3_changes()`\
    \ 不包括由你原始命令触发的激活器所导致的更改。\n\n如果你正在向一个具有自增列的表执行插入操作，你最终很可能想知道插入记录的主键值。在这种情况下，你可以使用\
    \ `sqlite3_last_`\n"
- fmt: '# CHAPTER 6 ■ THE CORE C API


    ## The Get Table Query


    The `sqlite3_get_table()` function returns an entire result set of a command in
    a single function call.


    Just as `sqlite3_exec()` wraps the prepared query API functions, allowing you
    to run them all at once, `sqlite3_get_table()` wraps `sqlite3_exec()` for commands
    that return data with just as much convenience. Using `sqlite3_get_table()`, you
    don’t have to bother with the `sqlite3_exec()` callback function, thus making
    it easier to fetch records.


    `sqlite3_get_table()` has the following declaration:

    ```c

    int sqlite3_get_table(

    sqlite3*, /* An open database */

    const char *sql, /* SQL to be executed */

    char ***resultp, /* Result written to a char *[] that this points to */

    int *nrow, /* Number of result rows written here */

    int *ncolumn, /* Number of result columns written here */

    char **errmsg /* Error msg written here */

    );

    ```

    This function takes all the records returned from the SQL statement in `sql` and
    stores them in the `resultp` argument using memory declared on the heap (using
    `sqlite3_malloc()`). The memory must be freed using `sqlite3_free_table()`, which
    takes the `resultp` pointer as its sole argument. The first record in `resultp`
    is actually not a record but contains the names of the columns in the result set.
    Examine the code fragment in Listing 6-3 (taken from `get_table.c`).


    **Listing 6-3. Using `sqlite3_get_table`**

    ```c

    int main(int argc, char **argv)

    {

    /* Connect to database, etc. */

    char *result[];

    sql = "select * from episodes;";

    rc = sqlite3_get_table(db, sql, &result, &nrows, &ncols, &zErr);

    /* Do something with data */

    /* Free memory */

    sqlite3_free_table(result)

    }

    ```

    If, for example, the result set returned is of the following form:

    ```

    name | id

    -----------------------

    The Junior Mint | 43

    The Smelly Car | 28

    The Fusilli Jerry | 21

    ```

    then the format of the result array will be structured as follows:

    ```

    result [0] = "name";

    result [1] = "id";

    result [2] = "The Junior Mint";

    result [3] = "43";

    result [4] = "The Smelly Car";

    result [5] = "28";

    result [6] = "The Fusilli Jerry";

    result [7] = "21";

    ```

    The first two elements contain the column headings of the result set. Therefore,
    you can think of the result set indexing as 1-based with respect to rows but 0-based
    with respect to columns. An example may help clarify this. Listing 6-4 shows the
    code to print out each column of each row in the result set.


    **Listing 6-4. Iterating Through `sqlite3_get_table()` Results**

    ```c

    rc = sqlite3_get_table(db, sql, &result, &nrows, &ncols, &zErr);

    for(i=0; i < nrows; i++) {

    for(j=0; j < ncols; j++) {

    /* the i+1 term skips over the first record,

    which is the column headers */

    fprintf(stdout, "%s", result[(i+1)*ncols + j]);

    }

    }

    ```


    ## Prepared Queries


    Our Chapter 5 overview of SQLite’s API introduced the concepts of the prepare,
    step, and finalize functions. This section covers all aspects of this process,
    including stepping through result sets, fetching records, and using parameterized
    queries. We told you prepared statements were infinitely preferable to the convenience
    wrapper functions, and this is where we prove the point.


    The wrapper functions simply wrap all these steps into a single function call,
    making it more convenient in some situations to run specific commands. Each query
    function provides its own way of getting at rows and columns. As a general rule,
    the more packaged the method is, the less control you have over execution and
    results. Therefore, prepared queries offer the most features, the most control,
    and the most information, with `sqlite3_exec()` offering slightly fewer features
    and `sqlite3_get_table()` offering fewer still.'
