    ... lots of tar messages ...\nfuzzy@linux $ cd DBD-SQLite-1.29\nfuzzy@linux DBD-SQLite-1.29\
    \ $ perl Makefile.PL\n... lots of perl messages ...\nChecking installed SQLite\
    \ version...\nLooks good\nfuzzy@linux DBD-SQLite-1.29 $ make install\n... more\
    \ perl messages ...\n```\n\nSQLite Perl 扩展包含了它自己的 SQLite3 二进制文件副本，因此无需事先编译和安装\
    \ SQLite。SQLite 被嵌入到了该扩展中。\n\n## 连接\n\n要检查 SQLite 驱动是否已安装，请在 Perl 中使用 `DBI` 函数\
    \ `available_drivers()`：\n\n```perl\nuse DBI;\nprint \"Drivers: \" . join(\",\
    \ \", DBI->available_drivers()), \"\\n\";\n```\n\n你可以使用标准的 `DBI::connect` 函数连接数据库，如下所示：\n\
