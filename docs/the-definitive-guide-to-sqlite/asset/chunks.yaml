    最内层 `select` 的输出会传递给下一个 `select`，其输出又依次传递给最外层的 `select`。这整个是一个单一的关系表达式。熟悉 Linux、Unix
    或 Windows 中管道命令的人会欣赏这种行为。任何 `select` 语句的输出都可以用作另一条语句的输入。


    # 第 3 章 ■ SQL FOR SQLite


    ## select 与操作流水线


    `select` 命令在其语法中通过一系列 `子句` 融入了许多关系操作。每个子句对应特定的关系操作。在 SQLite 中，几乎所有的子句都是可选的，事实上，其可选程度超出了标准
    SQL 所建议的理想范围。作为 SQLite 的 SQL 用户，这使你能够仅使用你需要的操作来获取你寻求的数据。


    SQLite 中一个非常通用的 `select` 形式（没有太多分散注意力的语法）可以表示如下：


    ```sql

    select [distinct] heading

    from tables

    where predicate

    group by columns

    having predicate

    order by columns

    limit count,offset;

    ```


    每个关键字——`from`、`where`、`having` 等——都是一个独立的子句。每个子句由关键字后跟参数（以斜体表示）组成。从现在开始，我们将直接通过名称来引用这些子句，你将能够通过等宽字体识别我们的用法。因此，与其说
    "`where` 子句"，我们会直接使用 `where`。


    在 SQLite 中，思考 `select` 命令的最佳方式是将其视为一个处理关系的流水线。这条流水线具有可选的过程，你可以根据需要将其插入。无论你是否包含某个特定操作，相对操作顺序始终相同。图
    3-3 展示了此顺序。


    `select` 命令从 `from` 开始，它接收一个或多个输入关系；将它们组合成一个复合关系；并将其传递给后续的操作链。


    *图 3-3. SQLite 中 `select` 的各个阶段*


    除了 `select` 之外，所有子句都是可选的。你必须始终至少提供这个子句，才能构成一个有效的 `select` 命令。迄今为止，`select` 命令最常见的调用方式包含三个子句：`select`、`from`
    和 `where`。这个基本语法及其相关子句如下：`select heading from tables where predicate;`


    `from` 子句是一个由逗号分隔的列表，包含一个或多个表、视图等（在图 3-3 中由变量 `tables` 表示）。如果指定了多个表，它们将被组合以形成一个单一的关系（在图
    3-3 中由 R1 表示）。这是通过某种连接操作完成的。由 `from` 产生的结果关系作为初始材料。所有后续操作要么直接基于它进行，要么基于其派生物进行。


    `where` 子句对 *R1* 中的行进行过滤。`where` 的参数是一个 `谓词` 或逻辑表达式，它定义了选择标准，根据此标准决定 *R1* 中的行是否包含在结果中（或从结果中排除）。`where`
    子句选出的行形成一个新的关系 *R2*，如上图 3-3 所示。


    在这个特定示例中，*R2* 会不受影响地通过其他操作，直到到达 `select` 子句。`select` 子句对 *R2* 中的列进行过滤，如图 3-4 所示。它的参数由一个逗号分隔的列或表达式列表组成，这些列或表达式定义了结果。这被称为结果的
    `投影列表` 或 `heading`。


    *图 3-4. 投影*


    以下是一个使用我们示例数据库的具体例子：


    ```sql

    sqlite> select id, name from food_types;


    id name

    ---------- ----------

    1 Bakery

    2 Cereal

    3 Chicken/Fowl

    4 Condiments

    5 Dairy

    6 Dip

    7 Drinks

    8 Fruit

    9 Junkfood

    10 Meat

    ```

