    ```

    1 x y

    2 x x

    sqlite> insert into pkey values (''x'',''x'');

    SQL error: columns x, y are not unique

    ```


    从技术上讲，这里的主键实际上只是一个跨两列的 `unique` 约束，因为 SQLite 仍然会维护一个内部的 `rowid`。但许多数据库设计专家会鼓励你使用真实的列作为主键，我也鼓励你在任何合理的地方都这样做。


    ## 域完整性


    域完整性最简单的定义是：列中的值符合其分配的域。也就是说，列中的每个值都应存在于该列定义的域内。然而，术语 `域` 有点模糊。域常被比作编程语言中的类型，例如字符串或浮点数。虽然这是一个不错的类比，但实际上域完整性的范畴比这要广泛得多。


    ### 域约束


    域约束让你可以从一个简单的类型（例如整数）开始，并添加额外的约束，为一列创建一组更受限的可接受值。例如，你可以创建一个整数类型的列，并添加约束，只允许三个这样的值：{-1,
    0, 1}。在这种情况下，你修改了可接受值的范围（从所有整数的域缩小到仅仅三个整数），但数据类型本身并未改变。你实际上在处理两件事：一个类型和一个范围。


    考虑另一个例子：`contacts` 表中的 `name` 列。它是这样声明的：`name text not null collate nocase`


    域 `text` 定义了类型和可接受值的初始范围。其后的所有内容都用于进一步限制和限定这个范围。因此，`name` 列就是所有不包含 `NULL` 值且大写字母和小写字母具有同等价值的
    `text` 值的域。它仍然是文本，并作为 `text` 工作，但其可接受值的范围比一般的 `text` 类型进一步受限。


    你可能会说，一个列的域与其类型不是一回事。相反，它的域是两者的结合：一个类型和一个范围。列的类型定义了其值的表示和操作符——它们如何存储以及你如何对它们进行操作（排序、搜索、加、减等等）。列的范围是你可以存储在其中的可接受值的集合，这与其声明的类型不一定相同。类型范围代表值的最大范围。而列的范围——正如你所看到的——可以通过约束来限制。因此，出于所有实际目的，你可以将列的域视为一个附加了约束的类型。


    类似地，域完整性本质上也由两部分组成：类型检查和范围检查。尽管 SQLite 支持许多用于范围检查的标准域约束（`not null`、`check` 等），但它在类型检查方面的方法使其与其他数据库有所不同。事实上，SQLite
    处理类型和类型检查的方式是其最具争议性、最被误解和争论的特性之一。我们很快会介绍其基础知识，并在第 11 章讨论 SQLite 内部机制时进行更深入的探讨。


    ### 默认值


    `default` 关键字为列提供默认值，前提是该值未在 `insert` 命令中提供。`default` 关键字之所以被视为一种约束，是因为它防止了值的缺失，并在需要时介入。然而，它确实属于域完整性范畴，因为它提供了一种处理列中
    `null` 值的策略。如果一个列没有默认值，并且你在 `insert` 语句中没有为其提供值，那么 SQLite 将为该列插入 `null`。例如，`contacts.name`
    的默认值是 `''UNKNOWN''`。考虑到这一点，请看下面的例子：


    ```

    sqlite> insert into contacts (name) values (''Jerry'');

    ```


