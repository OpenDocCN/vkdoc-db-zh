- fmt: '# SQLite书籍章节概述


    ## 章节概览


    **Chapter 1, “Introducing SQLite”** 涵盖了SQLite的起源和历史，以及本书的范围和目标（您现在正在阅读的这部分内容！）


    ## 获取与使用


    **Chapter 2, “Getting Started”** 讲述了如何获取和使用SQLite。它说明了如何以二进制和源代码形式获取SQLite，以及如何在各种平台上编译和构建它。本章解释了如何使用SQLite命令行工具来创建和处理数据库。


    ## SQL语言


    **Chapter 3, “SQL for SQLite”** 提供了一些关于SQL的背景知识。它介绍了许多基本的SQL命令，例如用于创建表、选择和处理数据的命令。本章既概述了SQLite自己处理SQL的方式，也为需要复习SQL的读者提供了快速介绍。


    **Chapter 4, “Advanced SQL in SQLite”** 从第3章继续，涵盖了更复杂的查询，并详细探讨了SQLite SQL实现中剩余命令的各个方面。


    ## 设计与核心概念


    **Chapter 5, “SQLite Design and Concepts”** 为使用SQLite编程奠定了基础。它阐述了SQLite API、其架构以及两者如何协同工作。它讨论了诸如事务和锁定等主题。它为所有语言的程序员清晰地理解了SQLite的内部工作原理，以及在编写使用它的程序时需要注意的事项。


    ## C语言API


    **Chapter 6, “The Core C API”** 涵盖了与执行查询相关的SQLite C API部分。本章涵盖了连接数据库、执行查询、获取数据、管理事务以及跟踪代码等章节，涵盖了与查询和数据处理相关的所有API部分。


    **Chapter 7, “The Extension C API”** 涵盖了用于自定义和扩展SQLite的剩余C API部分。SQLite提供了用于实现用户定义的SQL函数、聚合和排序规则的工具。本章说明了这些功能的示例实现，并提供了其实用示例。


    ## 语言绑定与平台


    **Chapter 8, “Language Bindings for SQLite”** 简要介绍了在Perl、Python、Ruby、Java和PHP等一系列流行语言中进行SQLite编程。


    **Chapter 9, “SQLite for Apple iPhone and iPad”** 重点介绍了为Apple移动平台开发时如何使用SQLite。


    **Chapter 10, “SQLite for Google Android devices”** 涵盖了如何将SQLite集成到Android平台中，以及如何为现在运行Android的大量设备使用SQLite进行开发。


    ## 内部机制


    **Chapter 11, “SQLite Internals”** 探讨了SQLite的内部工作原理。这是对源代码的高级概述，并提供了主要子系统如何实现的一瞥。这为程序员提供了对SQLite设计决策、假设和权衡的更深入理解，同时也为想要参与SQLite开发的开发者提供了一个出发点。


