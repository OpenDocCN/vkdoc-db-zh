- fmt: '# SQLite 冲突解决策略


    99 rows already modified remain intact, but changes to rows 100 and beyond never
    occur as the command is terminated.


    ## abort


    When a constraint violation is encountered, SQLite restores all changes the command
    made and terminates it. `abort` is the default resolution for all operations in
    SQLite. It is also the behavior defined in the SQL standard. As a side note, `abort`
    is also the most expensive conflict resolution policy—requiring extra work even
    if no conflicts ever occur.


    ## rollback


    When a constraint violation is encountered, SQLite performs a `rollback`—aborting
    the current command along with the entire transaction. The net result is that
    all changes made by the current command *and all previous commands* in the transaction
    are rolled back. This is the most drastic level of conflict resolution where a
    single violation results in a complete reversal of everything performed in a transaction.


    ## 冲突解决语法


    Conflict resolution can be specified within SQL commands as well as within table
    and index definitions. Specifically, conflict resolution can be specified in `insert`,
    `update`, `create table`, and `create index`. Furthermore, it has specific implications
    within triggers. The syntax for conflict resolution in `insert` and `update` is
    as follows:


    ```sql

    insert or resolution into table ( column_list) values ( value_list);

    update or resolution table set ( value_list) where predicate;

    ```


    The conflict resolution policy comes right after the `insert` or `update` command
    and is prefixed with `OR`.


    Also, the `insert or replace` expression can be abbreviated as just `replace`.
    This is similar to other database’s “merge” or “upsert” behavior.


    ## 使用 fail 策略


    In the preceding `update` example, the updates made to the 387 records were rolled
    back because the default resolution is `abort`. If you wanted the updates to stick,
    you could use the `fail` resolution. To illustrate this, in the following example
    you copy `foods` into a new table `test` and use it as the guinea pig.


    You add an additional column to `test` called `modified`, the default value of
    which is `''no''`. In the `update`, you change this to `''yes''` to track which
    records are updated before the constraint violation occurs. Using the `fail` resolution,
    these updates will remain unchanged, and you can track afterward how many records
    were updated.


    ```sql

    create table test as select * from foods;


    create unique index test_idx on test(id);


    alter table test add column modified text not null default ''no'';


    select count(*) from test where modified=''no'';


    count(*)

    --------------------

    412


    update or fail test set id=800-id, modified=''yes'';


    SQL error: column id is not unique


    select count(*) from test where modified=''yes'';


    count(*)

    --------------------

    387


    drop table test;

    ```


    **Caution**: There is one consideration with `fail` of which you need to be aware.
    The order that records are updated is nondeterministic. That is, you cannot be
    certain of the order of the records in the table or the order in which SQLite
    processes them. You might assume that it follows the order of the `rowid` column,
    but this is not a safe assumption to make. There is nothing in the documentation
    that says so. Once again, never assume any implicit ordering when working with
    any kind of database. If you are going to use `fail`, in many cases it might be
    better to use `ignore`. `ignore` will finish the job and modify all records that
    can be modified rather than bailing out on the first violation.


    ## 在表定义中指定冲突解决


    When defined within tables, conflict resolution is specified for individual columns.
    Here’s an example:


    ```sql

    sqlite> create temp table cast(name text unique on conflict rollback);


    sqlite> insert into cast values (''Jerry'');


    sqlite> insert into cast values (''Elaine'');


    sqlite> insert into cast values (''Kramer'');

    ```'
