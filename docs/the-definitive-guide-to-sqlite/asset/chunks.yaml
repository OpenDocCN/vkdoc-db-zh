    # 第 11 章 ■ SQLITE 内部结构与新特性


    在你决定将数据库切换到使用 WAL 之前，SQLite 默认仍会使用回滚日志方法。与其他 `PRAGMA` 设置不同，启用 WAL 是一个持久性的数据库级别更改。这意味着你可以在一个程序中或从
    SQLite 命令行 shell 中开启 WAL，之后所有其他程序都将使用处于 WAL 模式的数据库。这非常方便，因为这意味着你无需修改应用程序即可开启 WAL。


    设置 `PRAGMA journal_mode=WAL` 是激活 WAL 所需的命令。调用此 pragma 将以字符串形式返回数据库最终的日志模式。


    ```

    SQLite version 3.7.3

    Enter ".help" for instructions

    Enter SQL statements terminated with a ";"

    sqlite> PRAGMA journal_mode=WAL;

    wal

    ```


    如果成功切换到 WAL，则会返回字符串 `wal`，如上所示。如果由于某种原因失败（例如底层主机不支持必要的共享内存要求），日志模式将保持不变。例如，在默认数据库上，这意味着命令将返回字符串
    `delete`，表示回滚日志仍处于活动状态。


    除了 `journal_mode PRAGMA` 外，还支持多个 API 选项和相关的 `PRAGMA` 来控制 WAL 和检查点行为。


    -   `sqlite3_wal_checkpoint()`：强制执行检查点（也可作为 `wal_checkpoint PRAGMA` 使用）

    -   `sqlite3_wal_autocheckpoint()`：更改自动检查点页面阈值（`wal_autocheckpoint PRAGMA`）

    -   `sqlite3_wal_hook()`：注册一个回调函数，当程序提交到 WAL 时调用。


    借助这些选项，可以微调 WAL 和检查点行为，以适应最不寻常的应用程序需求。


    ## WAL 的优点与缺点


    自然，像 WAL 这样的变更会带来其自身的优点和缺点。我们认为优点是显著的，但最好了解其影响，以便形成你自己的判断。


    迁移到 WAL 具有以下优点：


    -   读取者不会阻塞写入者，写入者也不会阻塞读取者。这是并发管理的“黄金标准”。

    -   与回滚日志记录相比，WAL 在大多数操作场景下速度都明显更快。

    -   磁盘 I/O 变得更可预测，并引发更少的 `fsync()` 系统调用。由于所有 WAL 写入都是对一个线性写入的日志文件进行的，大部分 I/O 变为顺序操作，并可以相应地进行规划。


    为了平衡考量，以下是 WAL 的一些显著缺点：


    -   所有处理都绑定到单个主机。也就是说，你不能在像 NFS 这样的网络文件系统上使用 WAL。

    -   使用 WAL 会引入两个额外的半持久文件，`<yourdb>-wal` 和 `<yourdb>-shm`，用于 WAL 和相关的共享内存需求。对于那些将
    SQLite 数据库用作应用程序文件格式的用户来说，这可能不太有吸引力。这也会影响只读环境，因为 `–shm` 文件必须是可写的，并且/或者数据库所在的目录必须是可写的。

    -   对于非常大的（接近千兆字节）事务，WAL 性能会下降。虽然 WAL 是一个高性能选项，但非常大或非常长的事务会引入额外的开销。


    如果你考虑在非常规环境中使用启用了 WAL 的 SQLite 数据库，还有许多其他边界情况值得研究。你可以在 [`www.sqlite.org/wal.html`.](http://www.sqlite.org/wal.html)
    审阅更多关于这些情况的细节。


    ## 启用 WAL 的 SQLite 数据库的操作问题


    使用启用了 WAL 的 SQLite 数据库时，有一些操作上的注意事项。这些主要与性能和恢复相关。


    ### 性能


    我们之前提到，启用 WAL 通常意味着更好的性能。在我们的缺点部分，我们概述了对于非常大的数据变更或非常长的事务，可能会导致性能略有下降。以下是关于这种情况如何发生以及应对措施的背景说明。

    '
- fmt: '# WAL 模式的性能与恢复


    ## 性能考虑


    启用 WAL 后，相较于回滚日志，你隐式地获得了性能优势，因为提交一个事务只需要一次写入，而不是两次（一次写入数据库，一次写入回滚日志）。然而，在检查点释放
    WAL 文件中的空间之前，随着越来越多的变更被记录，该文件本身必须不断增长。通常这不是问题：总会有人是那个幸运的提交者，推动 WAL 超过 1,000 页的检查点阈值，然后
    WAL 会被清除，循环继续。但是，如果检查点在任何当前活动的读者处找到结束点标记，它就会完成工作。这意味着一个非常长的事务或持续的读取活动会阻止检查点取得进展，即使在后续尝试中也是如此。这反过来意味着
    WAL 文件的大小会持续增长，导致新读者寻找页面时的寻道时间相应变长。


    另一个性能考虑是当一个事务达到检查点阈值时会触发多少工作。你可能会发现，在大量非常快的事务和随后一个必须为其前驱执行检查点工作的稍长事务之间的可变性质，在某些场景下并不吸引人。


    对于这两种性能假设，你本质上是在权衡读写性能。我们推荐的方法是：首先记住你无法两全其美，所以需要一些折衷；然后，如有必要，使用 `sqlite3_wal_checkpoint()`
    和 `sqlite3_wal_autocheckpoint()` 工具来平衡负载，找到一个理想的平衡点。


    ## 恢复


    3.7.0 之前版本的 SQLite 不了解 WAL，也不知道用于恢复基于 WAL 的数据库的方法。为了防止较旧版本在崩溃恢复过程中覆盖启用了 WAL 的
    SQLite 数据库，数据库文件格式编号从 1 提升到了 2。当较旧版本的 SQLite 尝试恢复带有此更改的数据库时，它会意识到这不是一个“有效”的 SQLite
    数据库，并报告类似以下的错误。


    `file is encrypted or is not a database`


    `Don’t panic! Your database is fine, but the version of SQLite will need to be
    upgraded in order to work with it. Alternatively, you can change back to the rollback
    journal.`


    `PRAGMA journal_mode=DELETE;`


    `This resets the database file format number to 1.`


    # 第 11 章 ■ SQLITE 内部机制与新特性


    ## 总结


    至此，我们结束了对 SQLite 的探索之旅，不仅是本章，也是全书的旅程。我们希望你喜欢它。正如你在第 1 章所见，SQLite 不仅仅是一个免费的数据库。它是一个编写精良的软件库，具有广泛的应用范围。它既是一个数据库，也是一个实用工具和一个有用的编程工具。


    你在本章中所看到的仅仅触及了其内部机制的皮毛，尽管如此，它应该让你对事情如何运作有了更好的理解。它也让你体会到 SQLite 处理一个非常复杂问题时的优雅方式。你亲身体会了
    SQL 的庞大，也看到了其背后模型的复杂性。然而，SQLite 是一个小巧的库，却设法将许多这些概念付诸于少量代码中，并且表现出色！


