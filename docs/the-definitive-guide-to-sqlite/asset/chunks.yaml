    The recommended way to build the TCL interface is to use one of the tarballs or
    precompiled bindings for the Tcl extension for either Linux and Windows available
    on the SQLite web site. A simple “configure


    && make” invocation should see the TCL extension compiled and installed in the
    default location, so TCL and TCL/Tk scripts can load the extension normally. You’ll
    also find the requisite libraries in the 243


    CHAPTER 8 ■ LANGUAGE EXTENSIONS


    package repositories of various distributions. For example, under Debian or Ubuntu,
    you can add the Tcl bindings as follows:


    **fuzzy@linux $ sudo apt-get install libsqlite3-tcl**


    **As this chapter is being written, there is also talk of including SQLite by
    default in TCL version 8.6, which will make the process even easier!


    Connecting


    The SQLite extension is located in the **sqlite3** package, which must be loaded
    using the **package require** directive. To connect to a database, use the **sqlite3**
    command to create a database handle. This command takes two arguments: the first
    is the name of the database handle to be created, and the second is the path to
    the database file. The following example illustrates connecting to a database:


    **#!/usr/bin/env tclsh**


    ****package require sqlite3**


    **puts "\nConnecting."**


    **sqlite3 db ./foods.db**


    **The usual database connection rules apply. Passing the value **:memory:** instead
    of a file name will create an in-memory database. Passing in the name of a new
    file will create a new database, and so on.


    The database handle returned corresponds to a connection to the specified database;
    however, it is not yet open—it does not open the connection until you try to use
    it. The database handle is the sole object through which you work with the database.


    To disconnect, use the **close** method of the database handle. This will automatically
    roll back any pending transactions.


    Query Processing


    The extension executes queries using the **eval** method, which can process one
    or more queries at a time.


    **eval** can be used in several ways. The first way is to iterate through all
    records in a script following the SQL code. The script will be executed once for
    each row returned in the result set. The fields for each row are set as local
    variables within the script. Here’s an example:


    **puts "\nSelecting 5 records."**


    **db eval {select * from foods limit 5} {**


    **puts "$id $name"**


    **}**


    **There is another form in which you can assign the field values to an array.
    To do this, specify the array name after the SQL and before the script. Here’s
    an example:


    **puts "\nSelecting 5 records."**


    **db eval {select * from foods limit 5} values {**


    **puts "$values(id) $values(name)"**


    **}**


    CHAPTER 8 ■ LANGUAGE EXTENSIONS


    Both of the previous code snippets produce the following output:


    **Selecting 5 records.**


    **1 Bagels**


    **2 Bagels, raisin**


    **3 Bavarian Cream Pie**


    **4 Bear Claws**


    **5 Black and White cookies**


    If you don’t provide a script, **eval** will return the result set. The result
    set is returned as one long list of values, leaving you to determine the record
    boundaries. You can see this behavior in the following statement:


    **set x [db eval {select * from foods limit 3}]**


    **This will return a list in variable **$x** that is six elements long:**


    ****{1 1 Bagels 2 1 {Bagles, raisin} 3 1 {Bavarian Cream Pie}}**


    This corresponds to three records, each of which has three fields (**id**, **type_id**,
    and **name**).


    For non-**select** statements, **eval** returns information regarding modified
    records, as illustrated in Listing 8-23.


    *Listing 8-23\. Examining Changes in Tcl*


    **db eval begin**


    **puts "\nUpdating all rows."**


    **db eval { update foods set type_id=0 }**


    **puts "Changes : [db changes]"**


    **puts "\nDeleting all rows."**


    **# Delete all rows**


    **db eval { delete FROM foods }**


    **puts "\nInserting a row."**


    **# Insert a row**


    **db eval { insert into foods (type_id, name) values (9, ''Junior Mints'') }**


    **puts "Changes : [db changes]"**


    **puts "last_insert_rowid() : [db last_insert_rowid]"**


    ****puts "\nRolling back transaction."**


    **db eval rollback**


    CHAPTER 8 ■ LANGUAGE EXTENSIONS


    The code in Listing 8-23 produces the following output:


    **Updating all rows.**


    **Changes : 415**


    ****Deleting all rows.**


    **Inserting a row.**


    **Changes : 1**


    **last_insert_rowid() : 1**


    **Rolling back transaction.**


    **Total records : 415**'
