    ```\n\n第二和第三个参数分别对应驱动名称和数据库名称。第三和第四个参数对应用户名和密码，它们不适用于 SQLite。\n\n该函数返回一个表示数据库连接的数据库句柄对象。在内部，这对应于一个\
