    like it already exists in the database. Rather than write a **SELECT** statement
    to look for a match and then recast your **INSERT** to an **UPDATE** if it does,
    conflict resolution lets you say to SQLite, “Here, try to insert this record,
    and if you find one with the same key, just update it with these values instead.”
    Now you’ve gone from having to code three different SQL statements to cover all
    the bases (i.e., **SELECT**, **INSERT**, and possibly **UPDATE**) to just one:
    **INSERT OR REPLACE** (...). Other relational database systems mimic this aspect
    of conflict resolution with **UPSERT** or **MERGE** statements, but SQLite goes
    one step further. You can build conflict resolution into the table definition
    itself and dispense with the need to ever specify it again on future **INSERT**
    statements.'
  trans: '

    SQLite 在设计时就特别考虑到了**可移植性**。它能够在 Windows、Linux、BSD、Mac OS X，以及诸如 Solaris、HP-UX
    和 AIX 等商用 Unix 系统上编译运行，同样也支持许多嵌入式平台，如 QNX、VxWorks、Symbian、Palm OS 和 Windows CE。它在
    32 位和 64 位架构上都能无缝运行，并且兼容大端和小端字节序。可移植性不仅限于软件本身：SQLite 的数据库文件也与其代码一样具备高度的可移植性。数据库文件格式在所有支持的操作系统、硬件架构和字节序之间都是二进制兼容的。你可以在
    Linux 工作站上创建一个 SQLite 数据库，然后无需任何转换或修改，即可在 Mac、Windows 机器、iPhone 或其他设备上使用它。此外，SQLite
    数据库最多可容纳 2TB 的数据（仅受操作系统最大文件大小的限制），并且原生支持 UTF-8 和 UTF-16 编码。


    # 第 1 章 ■ SQLite 简介


    ## 紧凑性


    SQLite 被设计为轻量级且自包含的；一个头文件，一个库，你就拥有了关系型数据库功能——无需外部数据库服务器。所有内容打包后不到半兆字节，比你每天访问的许多网页还要小。


    SQLite 数据库就是普通的操作系统文件。无论使用何种系统，SQLite 数据库中的所有对象——表、触发器、模式、索引和视图——都包含在一个操作系统文件中。SQLite
    在可能的情况下使用变长记录，仅为保存每个字段分配所需的最小数据量。一个存储在`varchar(100)`列中的 2 字节字段，只占用 3 字节空间，而不是
    100 字节（额外的一个字节用于记录其类型信息）。


    ## 简单性


    作为一个编程库，SQLite 的 API 是最简单易用的 API 之一。该 API 文档齐全且直观。它的设计旨在帮助你以多种方式定制 SQLite，例如用
    C 语言实现你自己的自定义 SQL 函数。开源社区还创建了大量用于使用 SQLite 的语言和库接口。针对 Perl、Python、Ruby、Tcl/Tk、Java、PHP、Visual
    Basic、ODBC、Delphi、C#、VB .NET、Smalltalk、Ada、Objective C、Eiffel、Rexx、Lisp、Scheme、Lua、Pike、Objective
    Camel、Qt、WxWindows、REALBASIC 等都有相应的扩展。你可以在 SQLite 维基上找到详尽的列表：`www.sqlite.org/cvstrac/wiki?p=SqliteWrappers`。


    SQLite 的模块化设计包含许多创新理念，使其在保持代码库高度简洁的同时，又能功能完备且可扩展。每个模块都是一个专门的、独立的系统，执行特定的任务。这种模块化使得独立开发每个系统以及调试查询（从编译、规划到执行和物化）在模块间传递的过程变得容易得多。最终结果是前端（SQL
    编译器）和后端（存储系统）之间有着清晰、明确的分离，允许两者独立编码。这种设计使得向数据库引擎添加新功能更容易，调试速度更快，并带来更好的整体可靠性。


    ## 灵活性


    多种因素共同作用，使得 SQLite 成为一个非常灵活的数据库。作为一种嵌入式数据库，它兼收并蓄：既有关系型数据库前端的强大功能和灵活性，又有 B-tree
    后端的简洁和紧凑。使用它，无需配置大型数据库服务器，无需担心网络或连接问题，没有平台限制，也无需支付许可费或版税。相反，你获得的是直接嵌入应用程序的简单 SQL
    支持。


    ## 宽松的许可


    SQLite 的所有代码均属于公共领域。没有许可证。对核心源代码的任何部分均未主张版权。所有对此代码的贡献者都必须签署宣誓书，明确放弃对所贡献代码的任何版权权益。因此，对于你如何使用任何形式的源代码，没有任何法律限制。你可以修改、合并、分发、销售和使用该代码用于任何目的——商业或其他——无需支付任何版税或受到限制。


    ## 可靠性


    SQLite 源代码不仅仅是免费的；它碰巧也是编写精良的。SQLite 代码库由大约 70,000 行标准 ANSI C 组成，代码整洁、模块化且注释良好。代码库设计得易于理解、易于定制且总体上非常易于接触。一个有能力的
    C 程序员只要有足够的时间和研究，完全有能力理解 SQLite 的任何部分或整体。


    此外，SQLite 的代码提供了一个功能齐全的 API，专门用于通过添加用户定义函数、聚合和排序序列以及支持操作安全性来定制和扩展 SQLite。


    虽然 SQLite 的模块化设计对其整体可靠性做出了重大贡献，但其源代码也经过了充分的测试。核心软件（库和实用程序）由大约 70,000 行代码组成，而其发行版包含一个广泛的测试套件，由超过
    4500 万行测试代码构成（截至 2009 年 7 月），覆盖了 100%的核心代码。问问任何开发人员，在测试数量不小的代码时要做到如此全面有多难，你就能明白为什么人们对
    SQLite 的可靠性有如此坚定的信心。


    ## 便利性


    SQLite 还具有许多独特的特性，提供了极大的便利。这些包括动态类型、冲突解决以及能够将多个数据库“附加”到单个会话的能力。


    SQLite 的动态类型在某种程度上类似于脚本语言中的类型（例如，Ruby 中的`duck typing`）。具体来说，变量的类型由其值决定，而不是像静态类型语言那样由声明决定。大多数数据库系统将字段的值限制为其相应列中声明的类型。例如，整数列中的每个字段只能保存整数或可能为
    NULL。在 SQLite 中，虽然一个列可以有声明的类型，但字段可以自由地偏离这些类型，就像脚本语言中的变量可以被重新赋值为不同类型的值一样。这对于原型设计尤其有帮助，因为
    SQLite 不会强制你显式地更改列的类型。你只需要更改程序在该列中存储信息的方式，而不必持续更新模式并重新加载数据。


    冲突解决是另一个强大的功能。它可以让编写 SQL（本来就已经很容易）变得更容易。此功能内置于许多 SQL 操作中，可以执行所谓的“懒更新”。


    假设你有一条需要插入的记录，但你不确定数据库中是否已经存在一条类似的记录。与其编写一条`SELECT`语句来查找匹配项，然后在找到时将你的`INSERT`改为`UPDATE`，冲突解决功能允许你对
    SQLite 说：“嘿，尝试插入这条记录，如果你发现有相同键的记录，就用这些值更新它。” 现在，你从需要编写三条不同的 SQL 语句来覆盖所有情况（即`SELECT`、`INSERT`和可能的`UPDATE`）减少到只需一条：`INSERT
    OR REPLACE` (...)。其他关系数据库系统用`UPSERT`或`MERGE`语句来模拟冲突解决的这个方面，但 SQLite 更进一步。你可以将冲突解决内置到表定义本身中，从而在未来插入时无需再指定它。

    '
- fmt: 'In fact, you can dispense with ever having to write `UPDATE` statements to
    this table again—just write `INSERT` statements and let SQLite do the dirty work
    of figuring out what to do using the conflict resolution rules defined in the
    schema.


    Finally, SQLite lets you “attach” external databases to your current session.
    Say you are connected to one database (`foo.db`) and need to work on another (`bar.db`).
    Rather than opening a separate connection and juggling multiple connection handles
    in your code, you can simply attach the database of interest to your current connection
    with a single SQL command:


    `ATTACH database bar.db as bar;`


    # CHAPTER 1 ■ INTRODUCING SQLITE


    All of the tables in `bar.db` are now accessible as if they existed in `foo.db`.
    You can detach it just as easily when you’re done. This makes all sorts of things
    like copying tables between databases very easy.


    ## Performance and Limitations


    SQLite is a speedy database. But the words `speedy`, `fast`, `peppy`, or `quick`
    are rather subjective terms. To be perfectly honest, there are things SQLite can
    do faster than other databases, and there are things that it cannot. Suffice it
    to say, within the parameters for which it has been designed, SQLite can be said
    to be consistently fast and efficient across the board. SQLite uses B-trees for
    indexes and B+-trees for tables, the same as most other database systems. For
    searching a single table, it is as fast if not faster than any other database
    on average. Simple `SELECT`, `INSERT`, and `UPDATE` statements are extremely quick—virtually
    at the speed of RAM (for in-memory databases) or disk. Here SQLite is often faster
    than other databases, because it has less overhead to deal with in starting a
    transaction or generating a query plan and because it doesn’t incur the overhead
    of making a network calls to the server or negotiating authentication and privileges.
    Its simplicity here makes it fast.


    As queries become larger and more complex, however, query time overshadows the
    network call or transaction overhead, and the game goes to the database with the
    best optimizer. This is where larger, more sophisticated databases begin to shine.
    While SQLite can certainly do complex queries, it does not have a sophisticated
    optimizer or query planner. You can always trust SQLite to give you the result,
    but what it won’t do is try to determine optimal paths by computing millions of
    alternative query plans and selecting the fastest candidate, as you might expect
    from Oracle or PostgreSQL. Thus, if you are running complex queries on large data
    sets, odds are that SQLite is not going to be as fast as databases with sophisticated
    optimizers.


    So, there are situations where SQLite is not as fast as larger databases. But
    many if not all of these conditions are to be expected. SQLite is an embedded
    database designed for small to medium-sized applications. These limitations are
    in line with its intended purpose. Many new users make the mistake of assuming
    that they can use SQLite as a drop-in replacement for larger relational databases.


    Sometimes you can; sometimes you can’t. It all depends on what you are trying
    to do.


    In general, there are two major variables that define SQLite’s main limitations:


    - Concurrency. SQLite has coarse-grained locking, which allows multiple readers
    but only one writer at a time. Writers exclusively lock the database during writes,
    and no one else has access during that time. SQLite does take steps to minimize
    the amount of time in which exclusive locks are held. Generally, locks in SQLite
    are kept for only a few milliseconds. But as a general rule of thumb, if your
    application has high write concurrency (many connections competing to write to
    the same database) and it is time critical, you probably need another database.
    It is really a matter of testing your application to know what kind of performance
    you can get. We have seen SQLite handle more than 500 transactions per second'
