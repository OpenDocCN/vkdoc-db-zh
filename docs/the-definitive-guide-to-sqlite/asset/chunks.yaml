    ## 匿名 Fossil 源码控制


    如果你想体验最新功能或参与 SQLite 的开发，那么从项目的 Fossil 源码控制系统中获取 SQLite 是最合理的。Fossil 提供的匿名访问方式，与你在
    CVS、Subversion、Perforce、Git 等其他源码控制系统中可能见过的方式相同。Fossil 允许你通过浏览器直接访问源码，从而维护 SQLite
    源码的**绝对最新版本**！如果你愿意，你可以将你的代码副本同步到天、小时甚至分钟级别，以实时跟踪提交的更改。因此，如果你看到一个重要的错误修复或功能发布并希望立即使用，你可以让
    Fossil 同步并重新编译你的代码副本。Fossil 甚至包含一个自动同步功能，以确保你始终处于任何源码更改的最前沿。


    在 Windows 上从 Fossil 获取 SQLite 再简单不过了。与 SQLite 的二进制文件一样，Fossil 也以单个静态链接文件的形式分发。你可以从项目主页
    [www.fossil-scm.org](http://www.fossil-scm.org) 下载 Fossil。下载页面包含适用于 Windows、Mac
    OS X 和 Linux 的最新版本。将 Fossil 压缩包解压到你系统路径中的某个位置（参见我们之前关于确定 `PATH` 环境变量的讨论）。接下来，创建一个新目录来存放你从
    Fossil 提取的源码，或者如果你愿意，也可以选择一个现有的目录。


    大部分源码控制工作都可以在浏览器中使用 Fossil 完理——Fossil 自身充当 HTTP 服务器来处理所有服务器端任务。获取 SQLite 源码初始检出的最快方法，是使用你新下载的
    `fossil.exe` 程序来克隆一个 SQLite 在线仓库。打开命令提示符，切换到你为 SQLite Fossil 源码控制仓库选择的新目录或现有目录。然后在命令提示符下，执行
    Fossil 的 `clone` 命令，如下所示：


    `C:\sqlite\fossil.exe clone http://www.sqlite.org/src sqlite.fossil`


    ```

