- fmt: "# CHAPTER 7 ■ THE EXTENSION C API\n\n## Functions\n\nThe `sqlite3_value_bytes()`\
    \ function returns the amount of data in the value buffer for a `BLOB`. The `sqlite3_value_blob()`\
    \ function returns a pointer to that data. Using the size and the pointer, you\
    \ can then copy out the data. For example, if the first argument in your function\
    \ was a `BLOB` and you wanted to make a copy, you would do something like this:\n\
    \n```c\nint len;\nvoid* data;\nlen = sqlite3_value_bytes(values[0]);\ndata = sqlite3_malloc(len);\n\
    memcpy(data, sqlite3_value_blob(values[0]), len);\n```\n\nJust as the `sqlite3_column_xxx()`\
    \ functions have `sqlite_column_type()` to provide the column types, the `sqlite3_value_xxx()`\
    \ functions likewise have `sqlite3_value_type()`, which works in the same way.\
    \ It is declared as follows:\n\n```c\nint sqlite3_value_type(sqlite3_value*);\n\
    ```\n\nThis function returns one of the following values, which correspond to\
    \ SQLite’s internal, storage classes (data types), defined as follows:\n\n```c\n\
    #define SQLITE_INTEGER 1\n#define SQLITE_FLOAT 2\n#define SQLITE_TEXT 3\n#define\
    \ SQLITE_BLOB 4\n#define SQLITE_NULL 5\n```\n\nThis covers the basic workings\
    \ of the function/aggregate interface. We can now dive into some examples and\
    \ practical applications. The Collation interface is so similar that it will be\
    \ immediately understandable to you now that you’ve reviewed the interface for\
    \ functions and aggregates.\n\nLet’s start our custom function development with\
    \ a trivial example, one that is very easy to follow. Let’s implement `hello_newman()`,\
    \ but with a slight twist. We want to include using function arguments in the\
    \ example, so `hello_newman()` will take one argument: the name of the person\
    \ addressing him. It will work as follows:\n\n```\nsqlite > select hello_newman('Jerry')\
    \ as reply;\nreply\n------------------\nHello Jerry\n\nsqlite > select hello_newman('Kramer')\
    \ as reply;\nreply\n------------------\nHello Kramer\n\nsqlite > select hello_newman('George')\
    \ as reply;\nreply\n------------------\nHello George\n```\n\nListing 7-1 shows\
    \ the basic program (taken from `hello_newman.c`). Some of the error-checking\
    \ code has been removed for clarity.\n\n*Listing 7-1. The `hello_newman()` Test\
