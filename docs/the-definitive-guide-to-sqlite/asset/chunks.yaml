    SQLite Analyzer以二进制形式在SQLite网站上提供，适用于Linux、Mac OS X和Windows。可以使用提供的Unix makefile从源代码构建SQLite
    Analyzer。在构建目录中，执行以下命令：


    ```

    make sqlite3_analyzer

    ```


    但是，必须在构建设置中配置Tcl支持，因为SQLite Analyzer使用Tcl扩展来完成大部分工作。更多信息请参阅“从源代码编译SQLite”。


    ## Other SQLite Tools


    还有许多其他开源和可用的商业程序可以用来处理SQLite。优秀的图形化、跨平台工具包括：


    - **SQLite Database Browser**（[http://sqlitebrowser.sourceforge.net](http://sqlitebrowser.sourceforge.net)）：允许用户管理数据库、表和索引，以及导入和导出它们。用户可以交互式地运行SQL查询并检查结果，还可以检查所有发出的SQL命令的日志。它最近升级到了2.0版本。

    - **SQLiteman**（[http://www.sqliteman.com](http://www.sqliteman.com)）：一个针对管理和维护SQLite数据库人员的跨平台程序。它允许对数据库、表、索引和触发器进行通用管理，以及其他常见的管理任务。

    - **SQLiteManager**（[www.sqlabs.net/sqlitemanager.php](http://www.sqlabs.net/sqlitemanager.php)）：一个商业软件包，旨在用于处理和管理和SQLite。用户可以管理数据库对象、执行查询和保存SQL，以及使用灵活的报告模板创建报告。它包括自己的高级脚本语言来补充其SQL功能。


    这些只是跨平台工具。还有更多工具可用于几乎任何编程、最终用户或管理环境。你可以在SQLite wiki（[www.sqlite.org/cvstrac/wiki?p=ManagementTools](http://www.sqlite.org/cvstrac/wiki?p=ManagementTools)）上找到关于此类软件包的更多信息。


    ## Summary


    无论你在什么平台上工作，SQLite都易于安装和构建。Windows、Mac OS X和Linux用户可以直接从SQLite网站获取二进制文件。许多其他操作系统的用户也可以使用他们的原生（甚至第三方）包系统获取二进制文件。


    在所有平台上使用SQLite的常见方式是使用SQLite命令行工具。


    ## 备份与恢复


    使用命令`sqlite3 test.db < test.sql`可以导入SQL文件。


    这假设`test.db`不存在。如果它已经存在，那么如果`test.sql`的内容与`test.db`的内容不同，事情可能仍然会起作用。当然，如果`test.sql`包含已经存在于`test.db`中的对象，或者包含违反主键或外键约束的数据（尽管关于如何巧妙处理这种行为，请参阅后续章节中关于`PRAGMA`的讨论），你将会收到错误。


    对数据库进行二进制备份几乎就是复制文件。在此之前你可能想执行的一个小操作是数据库真空（vacuum），这将释放从已删除对象创建的任何未使用空间。这将为你提供一个更小的二进制副本文件：


    ```

    sqlite3 test.db vacuum

    cp test.db test.backup

    ```


    作为一般规则，二进制备份的可移植性不如SQL备份。总的来说，SQLite具有良好的向后兼容性，并且对于给定的数据库格式，所有平台都是二进制兼容的。然而，对于长期备份，使用SQL形式总是一个好主意。如果大小是个问题，SQL格式（原始文本）通常能提供良好的压缩比。


    ■ **Caution** 无论你认为你选择的备份方法有多好，请记住，你只和你最后一次成功的*恢复*一样可靠。如果你需要依赖它，请测试你的恢复过程——否则，无论你进行了多少次成功的备份，人们只会记住你那次失败的恢复。


    最后，如果你使用过其他数据库，在SQLite中“删除”一个数据库，就像二进制备份一样，是一个简单的文件操作：你只需删除想要删除的数据库文件即可。'
  raw: '**sqlite3 test.db < test.sql**


    **This assumes that **test.db** does not already exist. If it does, then things
    may still work if the contents of **test.sql** are different from those of **test.db**.
    You will of course get errors if **test.sql** contains objects that already reside
    within **test.db** or contains data that violates primary key or foreign key constraints
    (though see the **PRAGMA** discussion in subsequent chapters on how to finesse
    this behavior).


    Making a binary backup of a database is little more than a file copy. One small
    operation you may want to perform beforehand is a database vacuum, which will
    free up any unused space created from deleted objects. This will provide you with
    a smaller resulting file from the binary copy:


    **sqlite3 test.db vacuum**


    **cp test.db test.backup**


    **As a general rule, binary backups are not as portable as SQL backups. On the
    whole, SQLite does


    have good backward compatibility and is binary compatible across all platforms
    for a given database format. However, for long-term backups, it is always a good
    idea to use SQL form. If size is an issue, SQL


    format (raw text) usually yields a good compression ratio.


    ■ **Caution** No matter how good you think your chosen backup approach is, remember
    you are only as good as your last successful *restore*. Test your restore procedure
    if you need to rely on it—otherwise, you’ll be remembered for one failed restore,
    regardless of how many successful backups you took.


    Finally, if you’ve worked with other databases, “dropping” a database in SQLite,
    like binary backups, is a simple file operation: you simply delete the database
    file you want to drop.


    CHAPTER 2 ■ GETTING STARTED


    Getting Database File Information


    The primary means by which to obtain logical database information, such as table
    names, DDL


