    5.  Define the UI elements that present our summary and detail SQLite data on-screen.\n\
    6.  Define our UI behavior.\n7.  Launch!\n\nLet’s begin.\n\n![Image](index-317_1.png)\n\
    \n## Creating a New Android Project\n\nLaunch Eclipse to get started. Choose File\
    \ → New → Android Project, and you should see the New Android Project dialog box\
    \ appear, as in Figure 10-4.\n\n*Figure 10-4. Creating a new Android SQLite project*\n\
    \nFill in the project name, application name, and package name, as shown in Figure\
    \ 10-3, or use meaningful names that you’re likely to remember. The application\
    \ name will be the title that appears with your application on Android. Your package\
    \ name should follow normal Java package naming—remember this needs to be globally\
    \ unique.\n\n## Adding the Seinfeld SQLite Database to Your Project\n\nTo add\
    \ the `foods.db` SQLite database file to your project, open the *Seinfeld* project\
    \ folder, and then open the assets folder. This will be empty by default. You\
