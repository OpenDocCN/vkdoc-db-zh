- fmt: '# CHAPTER 6: THE CORE C API


    named parameters called `:cosmo` and `@newman` instead. Like positional parameters,
    named parameters are automatically assigned numbers by `sqlite3_prepare()`. Although
    the numbers assigned to each parameter are unknown, you can resolve them using
    `sqlite3_bind_parameter_index()`, which takes a parameter name and returns the
    corresponding parameter number. This is the number you use to bind the value to
    its parameter. All in all, named parameters mainly help with legibility more than
    anything else.


    **Note:** While the function `sqlite3_bind_parameter_index()` seems to refer to
    a parameter number as an index, for all intents and purposes the two terms (*number*
    and *index*) are synonymous.


    ## Tcl Parameters


    The final parameter scheme is called Tcl parameters and is specific more to the
    Tcl extension than it is to the C API. Basically, it works identically to named
    parameters except that rather than using alphanumeric values for parameter names,
    it uses Tcl variable names. In the Tcl extension, when the Tcl equivalent of `sqlite3_prepare()`
    is called, the Tcl extension automatically searches for Tcl variables with the
    given parameter names in the active Tcl program environment and binds them to
    their respective parameters. Despite its current application in the Tcl interface,
    nothing prohibits this same mechanism from being applied to other language interfaces,
    which can in turn implement the same feature. In this respect, referring to this
    parameter method solely as Tcl parameters may be a bit of a misnomer. The Tcl
    extension just happened to be the first application that utilized this method.
    Basically, the Tcl parameter syntax does little more than provide an alternate
    syntax to named parameters—rather than prefixing the parameters with a colon (`:`)
    or an at-sign (`@`), it uses a dollar sign (`$`).


    ## Errors and the Unexpected


    Up to now, we have looked at the API from a rather optimistic viewpoint, as if
    nothing could ever go wrong. But things do go wrong, and there is part of the
    API devoted to that. The three things you always have to guard against in your
    code are errors, busy conditions, and, my personal favorite, schema changes.


    ### Handling Errors


    Many of the API functions return integer result codes. That means they can potentially
    return error codes of some sort. The most common functions to watch are typically
    the most frequently used, such as `sqlite3_open_v2()`, `sqlite3_prepare_v2()`,
    and friends, as well as `sqlite3_exec()`. You should always program defensively
    and review every API function before you use it to ensure that you deal with error
    conditions that can arise. Of all the error results defined in SQLite, only a
    fraction of them will really matter to your application in practice. All of the
    SQLite result codes are listed in Table 6-2. API functions that can return them
    include the following:


    *   `sqlite3_bind_*xxx*()`

    *   `sqlite3_close()`

    *   `sqlite3_create_collation()`

    *   `sqlite3_collation_needed()`

    *   `sqlite3_create_function()`

    *   `sqlite3_prepare_v2()`

    *   `sqlite3_exec()`

    *   `sqlite3_finalize()`

    *   `sqlite3_get_table()`

    *   `sqlite3_open_v2()`

    *   `sqlite3_reset()`

    *   `sqlite3_step()`


    You can get extended information on a given error using `sqlite3_errmsg()`, which
    is declared as follows:


    ```

    const char *sqlite3_errmsg(sqlite3*);

    ```


    It takes a connection handle as its only argument and returns the most recent
    error resulting from an API call on that connection. If no error has been encountered,
    it returns the string “not an error.”


    *Table 6-2: SQLite Result Codes*


    | Code | Description |

    | :--- | :--- |

    | `SQLITE_OK` | The operation was successful. |

    | `SQLITE_ERROR` | General SQL error or missing database. It may be possible to
    obtain more error information depending on the error condition (`SQLITE_SCHEMA`,
    for example). |

    | `SQLITE_INTERNAL` | Internal logic error. |

    | `SQLITE_PERM` | Access permission denied. |

    | `SQLITE_ABORT` | A callback routine requested an abort. |

    | `SQLITE_BUSY` | The database file is locked. |

    | `SQLITE_LOCKED` | A table in the database is locked. |

    | `SQLITE_NOMEM` | A call to `malloc()` has failed within a database operation.
    |

    | `SQLITE_READONLY` | An attempt was made to write to a read-only database. |

    | `SQLITE_INTERRUPT` | Operation was terminated by `sqlite3_interrupt()`. |

    | `SQLITE_IOERR` | Some kind of disk I/O error occurred. |

    | `SQLITE_CORRUPT` | The database disk image is malformed. This will also occur
    if an attempt is made to open a non-SQLite database file as a SQLite database.
    |

    | `SQLITE_FULL` | Insertion failed because the database is full. There is no more
    space on the file system or the database file cannot be expanded. |

    | `SQLITE_CANTOPEN` | SQLite was unable to open the database file. |

    | `SQLITE_PROTOCOL` | The database is locked or there has been a protocol error.
    |

    | `SQLITE_EMPTY` | (Internal only.) The database table is empty. |

    | `SQLITE_SCHEMA` | The database schema has changed. |

    | `SQLITE_CONSTRAINT` | Abort due to constraint violation. |

    | `SQLITE_MISMATCH` | Data type mismatch. An example of this is an attempt to
    insert non-integer data into a column labeled `INTEGER PRIMARY KEY`. For most
    columns, SQLite ignores the data type and allows any kind of data to be stored.
    But an `INTEGER PRIMARY KEY` column is allowed to store integer data only. |

    | `SQLITE_MISUSE` | Library was used incorrectly. This error might occur if one
    or more of the SQLite API routines is used incorrectly. |

    | `SQLITE_NOLFS` | Uses OS features not supported on host. This value is returned
    if the SQLite library was compiled with large file support (LFS) enabled but LFS
    isn’t supported on the host operating system. |

    | `SQLITE_AUTH` | Authorization denied. This occurs when a callback function installed
    using `sqlite3_set_authorizer()` returns `SQLITE_DENY`. |

    | `SQLITE_FORMAT` | Auxiliary database format error. |

    | `SQLITE_RANGE` | Second parameter to `sqlite3_bind()` out of range. |

    | `SQLITE_NOTADB` | File opened is not a SQLite database file. |

    | `SQLITE_ROW` | `sqlite3_step()` has another row ready. |

    | `SQLITE_DONE` | `sqlite3_step()` has finished executing. |


    Although it is very uncommon outside of embedded systems, one of the most critical
    errors you can encounter is `SQLITE_NOMEM`, which means that no memory can be
    allocated on the heap (for example, `malloc()` failed). SQLite is quite robust
    in this regard, recovering gracefully from out-of-memory error conditions. It
    will continue to work assuming the underlying operating system completes memory
    allocation system calls like `malloc()`.


    ### Handling Busy Conditions


    Two important functions related to processing queries are `sqlite3_busy_handler()`
    and `sqlite3_busy_timeout()`. If your program uses a database on which there are
    other active connections, odds are it will eventually have to wait for a lock
    and therefore will have to deal with `SQLITE_BUSY`.


    Whenever you call an API function that causes SQLite to seek a lock and SQLite
    is unable to get it, the function will return `SQLITE_BUSY`. There are three ways
    to deal with this:


    *   Handle `SQLITE_BUSY` yourself, either by rerunning the statement or by taking
    some other action

    *   Have SQLite call a busy handler

    *   Ask SQLite to wait (block or sleep) for some period of time for the lock to
    clear


    The last option involves using `sqlite3_busy_timeout()`. This function tells SQLite
    how long to wait for a lock to clear before returning `SQLITE_BUSY`. Although
    it can ultimately result in you still having to handle `SQLITE_BUSY`, in practice
    setting this value to a sufficient period of time (say 30 seconds) usually provides
    enough time for even the most intensive transaction to complete. Nevertheless,
    you should still have some contingency plan in place to handle `SQLITE_BUSY`.


    #### User-Defined Busy Handlers'
