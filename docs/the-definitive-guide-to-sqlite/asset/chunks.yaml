- fmt: "### 先决条件\n\n在本例中，先决条件是你的系统上需要安装 SQLite 3.2 或更新版本。\n\n## 连接\n\n如前所述，Python\
    \ 2.5 及更新版本中内置的模块名为`sqlite3`。如果使用单独提供的`pysqlite`包，它位于`pysqlite2`。数据库 API 模块位于`dbapi2`。当你同时考虑\
    \ PySQLite 版本号和 SQLite 版本号时，这有时会令人困惑。你可以使用模块的`connect()`函数连接到数据库，传入你想要打开的数据库文件的相对名称或完整文件路径。\n\
    \n对于 Python 2.5+ 内置的`pysqlite`，连接方式如下：\n\n```python\nimport sqlite3\ndb = sqlite3.connect(\"\
    foods.db\")\n```\n\n对于单独提供的`pysqlite`包，你的连接代码变为：\n\n```python\nfrom pysqlite2\
    \ import dbapi2 as sqlite3\ndb = sqlite3.connect(\"foods.db\")\n```\n\n通常的规则适用：你可以通过传入数据库名`:memory:`来使用内存数据库；新文件会创建新数据库；等等。你可以看到，内置模块和单独提供的`pysqlite`模块之间唯一的真正区别在于导入语义。从现在开始，我们假设你乐意采用最适合你使用`pysqlite`偏好的技术。\n\
    \n## 查询处理\n\n查询执行是根据 Python DB API 规范 2 完成的。你创建一个游标对象来运行查询并获取结果。在内部，游标对象持有一个`sqlite3_stmt`句柄。\n\
    \n清单 8-6 展示了执行一个基本查询。\n\n*清单 8-6. PySQLite 中的基本查询*\n\n```python\nfrom pysqlite2\
    \ import dbapi2 as sqlite3\n\n# 连接\ncon = sqlite3.connect(\"foods.db\")\n\n# 准备语句并执行。这会调用\
    \ sqlite3_prepare() 和 sqlite3_step()\ncur = con.cursor()\ncur.execute('select\
    \ * from foods limit 10')\n\n# 遍历结果，打印名称字段 (row[2])\nrow = cur.fetchone()\nwhile\
    \ row:\n    print row[2]\n    # 获取下一行\n    row = cur.fetchone()\n\ncur.close()\n\
    con.close()\n```\n\n请记住，Python 代码对空格敏感，因此在复制此代码时要小心，不要引入额外的空格或制表符。运行此代码会产生以下输出：\n\
