  trans: '

    # SQLite 数据类型与存储


    编译时和运行时均可调整，默认大小为 1,000,000,000 字节。


    ## BLOB


    二进制大对象 (`BLOB`) 数据可以是任何类型的数据。SQLite 中 `BLOB` 的最大尺寸在编译时和运行时均可调整，默认值为 1,000,000,000
    字节。


    ## NULL


    `NULL` 代表缺失的信息。SQLite 完全支持 `NULL` 处理。


    ## 类型推断规则


    SQLite 根据值的表示形式推断其类型。使用以下推断规则：


    • 如果 SQL 语句中指定的值被单引号或双引号括起来，则其类别被指定为 `text`。


    • 如果字面值是未加引号的数字，且不包含小数点或指数，则其类别被指定为 `integer`。


    • 如果字面值是未加引号的数字，且包含小数点或指数，则其类别被指定为 `real`。


    • 如果值为 `NULL`，则其类别被指定为 `NULL`。


    • 如果值格式为 `x''ABCD''`（其中 `ABCD` 是十六进制数），则其类别被指定为 `blob`。`x` 前缀和值可以是大写或小写。


    ## `typeof()` 函数示例


    `typeof()` SQL 函数根据值的表示形式返回其存储类别。使用此函数，以下 SQL 示例说明了类型推断的实际应用：


    第 4 章 ■ SQLite 高级 SQL


    ```sql

    sqlite> select typeof(3.14), typeof(''3.14''), typeof(314), typeof(x''3142''),
    typeof(NULL);

    typeof(3.14) typeof(''3.14'') typeof(314) typeof(x''3142'') typeof(NULL)

    ------------ -------------- ----------- --------------- ------------

    real         text           integer     blob            null

    ```


    以上展示了由特定数据表示形式调用的全部五种内部存储类别。值 `3.14` 看起来像 `real`，因此是 `real`。值 `''3.14''` 看起来像
    `text`，因此是 `text`，依此类推。


    ## 不同存储类别的列


    SQLite 中的单个列可能包含不同存储类别的不同值。这是 SQLite 数据处理中的第一个差异，通常会让熟悉其他数据库的人坐直并说：“什么？” 考虑以下示例：


    ```sql

    sqlite> drop table domain;

    sqlite> create table domain(x);

    sqlite> insert into domain values (3.142);

    sqlite> insert into domain values (''3.142'');

    sqlite> insert into domain values (3142);

    sqlite> insert into domain values (x''3142'');

    sqlite> insert into domain values (null);

    sqlite> select rowid, x, typeof(x) from domain;

    rowid x      typeof(x)

    ------ ------ ----------

    1      3.142  real

    2      3.142  text

    3      3142   integer

    4      1B     blob

    5      NULL   null

    ```


    这引发了一些问题。如何对列中的值进行排序或比较？如何对一个包含 `integer`、`real`、`text`、`blob` 和 `NULL` 值的列进行排序？如何将
    `integer` 与 `blob` 进行比较？哪个更大？它们能相等吗？


    ## 比较与排序规则


    事实证明，具有不同存储类别的列中的值可以进行排序。并且它们可以被排序，因为它们可以被比较。SQLite 实现了明确定义的规则来完成此操作。存储类别通过使用其各自的类别值进行排序，定义如下：


    1.  `NULL` 存储类别具有最低的类别值。具有 `NULL` 存储类别的值被认为小于任何其他值（包括另一个具有 `NULL` 存储类别的值）。在 `NULL`
    值内部，没有特定的排序顺序。

    2.  `integer` 或 `real` 存储类别的值高于 `NULL` 值，并共享相同的类别值。`integer` 和 `real` 值按数值进行比较。

    3.  `text` 存储类别的值高于 `integer` 或 `real`。具有 `integer` 或 `real` 存储类别的值总是小于具有 `text`
    存储类别的值，无论其值如何。当两个 `text` 值进行比较时，比较结果由为这些值定义的排序规则决定。

    4.  `blob` 存储类别具有最高的类别值。任何非 `blob` 类别的值总是小于 `blob` 类别的值。`blob` 值使用 C 函数 `memcmp()`
    进行比较。

