- fmt: "Finally, the program creates another database on a separate connection and\
    \ then attaches it on the main connection. The main connection then selects records\
    \ from a table in the attached database, and we can see how the authorizer reports\
    \ these operations as happening in the attached database:\n\n```\nprogram : Attaching\
    \ database test2.db\nSQLITE_ATTACH : test2.db\nSQLITE_READ : Read of sqlite_master.name\n\
    SQLITE_READ : Read of sqlite_master.rootpage\nSQLITE_READ : Read of sqlite_master.sql\n\
    program : Selecting record from attached database test2.db\nSQLITE_SELECT\nSQLITE_READ\
    \ : Read of foo2.x\nSQLITE_READ : Read of foo2.y\nSQLITE_READ : Read of foo2.z\
    \ -> DENIED\nprogram : Detaching table\nSQLITE_DETACH -> test2\n```\n\nAs you\
    \ can see, `sqlite3_set_authorizer()` and its event-filtering capabilities are\
    \ quite powerful. It gives you a great deal of control over what the user can\
    \ and cannot do on a given database. You can monitor events and, if you want,\
    \ stop them before they happen. Or, you can allow them to proceed but impose specific\
    \ restrictions on them. `sqlite3_set_authorizer()` can be a helpful tool for dealing\
    \ with 188\n\n# CHAPTER 6 ■ THE CORE C API\n\n`SQLITE_SCHEMA` conditions. If you\
    \ know you don’t need any changes to your database schema in your application,\
    \ you can simply install an authorizer function to deny any operations that attempt\
    \ to modify the schema in certain ways.\n\n■ **Caution** Keep in mind that denying\
    \ schema changes in an authorizer is by no means a cure-all for `SQLITE_SCHEMA`\
    \ events. You need to be careful about all the implications of denying various\
    \ changes to the schema. Just blindly blocking all events resulting in a schema\
    \ change can restrict other seemingly legitimate operations such as `VACUUM`.\n\
    \n## HELP FOR INTERACTIVE PROGRAMS\n\nSQLite provides two functions that make\
    \ it easier to work with interactive programs. The first is `sqlite3_interrupt()`,\
    \ which is declared as follows:\n\n```c\nvoid sqlite3_interrupt(sqlite3* /* connection\
    \ handle */);\n```\n\n`sqlite3_interrupt()` causes any pending database operation\
    \ on the given connection to abort and return at its earliest opportunity. This\
    \ routine is design to be called in response to a user interrupt action such as\
    \ clicking a Cancel button in a graphical application or pressing Ctrl+C in a\
    \ command-line program.\n\nIt is intended to make it easier to accommodate cases\
    \ where the user wants a long query operation to halt immediately. For a command-line\
    \ program, you might put this function in a signal handler or an event handler\
    \ in a graphical application.\n\nAnother function that can be useful for interactive\
    \ programs is `sqlite3_progress_handler()`. It is somewhat related in functionality\
    \ to the `sqlite3_interrupt()` function, but with a few twists. It is declared\
    \ as follows:\n\n```c\nvoid sqlite3_progress_handler(\n  sqlite3*,       /* connection\
    \ handle */\n  int frq,        /* frequency of callback */\n  int(*)(void*), \
    \ /* callback function */\n  void*           /* application data */\n);\n```\n\
    \nThis function installs a callback function that will be invoked during calls\
    \ to `sqlite3_exec()`, `sqlite3_step()`, and `sqlite3_get_table()`. The intent\
    \ of this function is to give applications a way to provide feedback to the user\
    \ during long-running queries.\n\nThe second argument (`frq`) specifies the frequency\
    \ of the callback in terms of VDBE instructions. That is, the progress callback\
    \ (provided in the third argument) will be called for every `frq` VDBE instruction\
    \ performed in query execution. If a call to `sqlite3_exec()`, `sqlite3_step()`,\
    \ or `sqlite3_get_table()` requires less than `frq` instructions to be executed,\
    \ then the progress callback will not be invoked. The fourth argument is a pointer\
    \ to application-specific data, which is passed back to the progress handler (as\
    \ its one and only argument). If `NULL` is provided for the callback function\
    \ argument, then the currently installed progress handler (if any) is disabled.\n\
    \n# CHAPTER 6 ■ THE CORE C API"
