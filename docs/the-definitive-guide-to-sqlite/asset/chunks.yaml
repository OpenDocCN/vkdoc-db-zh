    *Figure 3-5. Restriction and projection in `select`*


    With this simple example, you can begin to see how a query language in general
    and SQL in particular ultimately operate in terms of relational operations. There
    is real math under the hood.


    ## Filtering


    If the `select` command is the most complex command in SQL, then the `where` clause
    is the most complex clause in `select`. But it also does most of the work. Having
    a solid understanding of its mechanics will most likely bring the best overall
    returns in your day-to-day use of SQL in SQLite.


    SQLite applies the `where` clause to each row of the relation produced by the
    `from` clause (R1). As stated earlier, `where`—a restriction—is a filter. The
    argument of `where` is a logical predicate. A predicate, in the simplest sense,
    is just an assertion about something. Consider the following statement:


    The dog (subject) is purple and has a toothy grin (predicate).


    The dog is the subject, and the predicate consists of the two assertions (color
    is purple and grin is toothy). This statement may be true or false, depending
    on the dog.


    The subject in the `where` clause is a row. The row is the logical subject. The
    `WHERE` clause is the logical predicate. Each row in which the proposition evaluates
    to true is included (or selected) as part of the result (R2). Each row in which
    it is false is excluded. So, the dog proposition translated into a relational
    equivalent would look something like this:


    ```sql

    select * from dogs where color=''purple'' and grin=''toothy'';

    ```


    The database will take each row in table `dogs` (the subject) and apply the `where`
    clause (the predicate) to form the logical proposition:


    This row has `color=''purple''` *and* `grin=''toothy''`.


    If it is true, then the row (or dog) is indeed purple and toothy, and it is included
    in the result. `where` is a powerful filter. It provides you with a great degree
    of control over the conditions with which to include (or exclude) rows in (or
    from) the result.


    ## Values


    Values represent some kind of data in the real world. Values can be classified
    by their type, such as a numerical value (`1`, `2`, `3`, and so on) or string
    value (`"JujyFruit"`). Values can be expressed as *literal values* (an explicit
    quantity such as `1`, `2`, `3` or `"JujyFruit"`), *variables* (often in the form
    of column names like `foods.name`), expressions (`3+2/5`), or the results of functions
    (`count(foods.name)`)—which are covered later.


    ## Operators


    An operator takes one or more values as input and produces a value as output.
    An operator is so named because it performs some kind of operation, producing
    some kind of result. *Binary operators* are operators that take two input values
    (or operands). *Ternary operators* take three operands, *unary operators* take
    just one, and so on.


    Operators can be strung together, feeding the output of one operator into the
    input of another (Figure 3-6), forming value expressions.


    unary binary ternary


    *Figure 3-6. Unary, binary, and ternary operators, also displaying pipelining
    of operations*'
