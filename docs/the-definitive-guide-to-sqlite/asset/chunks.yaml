    **ANDROID VS. SQLITE VERSIONS**


    Where SQLite is concerned, there are slight variations in the underlying version
    of the SQLite libraries included. For Android releases up to and including version
    2.1, the underlying SQLite version is 3.5.9\. From Android release 2.2 onward
    (so-called Froyo), the SQLite library has been updated to version 3.6.22.


