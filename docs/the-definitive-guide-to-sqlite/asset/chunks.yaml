  trans: "\n# 第六章 ■ 核心 C API\n\n## 事件代码\n\n**参数 3** | **参数 4**\n---|---\n`SQLITE_DROP_VIEW`\
    \ | 视图名称\n`NULL` | \n`SQLITE_INSERT` | 表名称\n`NULL` | \n`SQLITE_PRAGMA` | Pragma\
    \ 名称\n第一个参数或`NULL` | \n`SQLITE_READ` | 表名称\n列名称 | \n`SQLITE_SELECT` | `NULL`\n\
    `NULL` | \n`SQLITE_TRANSACTION` | `NULL`\n`NULL` | \n`SQLITE_UPDATE` | 表名称\n列名称\
    \ | \n`SQLITE_ATTACH` | 文件名称\n`NULL` | \n`SQLITE_DETACH` | 数据库名称\n`NULL` | \n\n\
    为了说明这一点，下面的示例（其完整源代码位于`authorizer.c`中）将创建一个表`foo`，其定义如下：\n\n```\ncreate table\
    \ foo(x int, y int, z int)\n```\n\n它会注册一个授权函数，该函数将执行以下操作：\n-   阻止读取列`z`。\n-  \
    \ 阻止更新列`x`。\n-   监控`ATTACH`和`DETACH`数据库事件。\n-   记录发生的数据库事件。\n\n这是一个相当长的示例，它使用授权函数来过滤许多不同的数据库事件，因此为了清晰起见，我将把代码分成几部分来讲解。授权函数的通用形式如清单\
    \ 6-7 所示。\n\n### 清单 6-7. 授权函数示例\n\n```\nint auth( void* x, int type,\n       \
    \   const char* a, const char* b,\n          const char* c, const char* d )\n\
    {\n    const char* operation = a;\n    printf( \" %s \", event_description(type));\n\
    \n    /* Filter for different database events\n       from SQLITE_TRANSACTION\
    \ to SQLITE_INSERT,\n       UPDATE, DELETE, ATTACH, etc. and either allow or deny\n\
    \       them.\n    */\n\n    return SQLITE_OK;\n}\n```\n\n授权函数首先查找的是事务状态的变化。如果发现变化，它会打印一条消息：\n\
    \n```\nif((a != NULL) && (type == SQLITE_TRANSACTION)) {\n    printf(\": %s Transaction\"\
    , operation);\n}\n```\n\n接下来，授权函数过滤导致模式修改的事件：\n\n```\nswitch(type) {\n    case\
    \ SQLITE_CREATE_INDEX:\n    case SQLITE_CREATE_TABLE:\n    case SQLITE_CREATE_TRIGGER:\n\
    \    case SQLITE_CREATE_VIEW:\n    case SQLITE_DROP_INDEX:\n    case SQLITE_DROP_TABLE:\n\
    \    case SQLITE_DROP_TRIGGER:\n    case SQLITE_DROP_VIEW:\n    {\n        //\
    \ Schema has been modified somehow.\n        printf(\": Schema modified\");\n\
    \    }\n```\n\n下一个过滤器查找读取尝试（这些尝试是逐列触发的）。在这里，除非列名为`z`，否则所有读取尝试都被允许；如果列名为`z`，则函数返回`SQLITE_IGNORE`。这将导致\
    \ SQLite 对列`z`中的任何字段返回`NULL`，从而有效地阻止访问其数据。\n\n```\nif(type == SQLITE_READ) {\n\
    \    printf(\": Read of %s.%s \", a, b);\n\n    /* Block attempts to read column\
    \ z */\n    if(strcmp(b,\"z\")==0) {\n        printf(\"-> DENIED\\n\");\n    \
    \    return SQLITE_IGNORE;\n    }\n}\n```\n\n接下来是`插入`和`更新`过滤器。所有`插入`语句都被允许。但是，任何试图修改列`x`的`更新`语句将被拒绝。这不会阻止`更新`语句执行；相反，它只是过滤掉任何更新列`x`的尝试。\n\
    \n```\nif(type == SQLITE_INSERT) {\n    printf(\": Insert records into %s \",\
    \ a);\n}\n\nif(type == SQLITE_UPDATE) {\n    printf(\": Update of %s.%s \", a,\
    \ b);\n\n    /* Block updates of column x */\n    if(strcmp(b,\"x\")==0) {\n \
    \       printf(\"-> DENIED\\n\");\n        return SQLITE_IGNORE;\n    }\n}\n```\n\
    \n最后，授权函数过滤`删除`、`附加`和`分离`语句，并在遇到它们时只是发出通知：\n\n```\nif(type == SQLITE_DELETE) {\n\
    \    printf(\": Delete from %s \", a);\n}\n\nif(type == SQLITE_ATTACH) {\n   \
    \ printf(\": %s\", a);\n}\n\nif(type == SQLITE_DETACH) {\n    printf(\"-> %s\"\
    , a);\n}\n\nprintf(\"\\n\");\nreturn SQLITE_OK;\n}\n```\n\n该（简化版）程序的实现如下。与授权函数一样，我将把它分成几部分。程序的第一部分连接到数据库并注册授权函数：\n\
    \n```\nint main(int argc, char **argv)\n{\n    sqlite3 *db, *db2;\n    char *zErr,\
    \ *sql;\n    int rc;\n\n    /** Setup */\n    /* Connect to test.db */\n    rc\
    \ = sqlite3_open_v2(\"test.db\", &db);\n```\n"
- fmt: "# 授权与测试\n\n## 注册授权器函数\n`sqlite3_set_authorizer(db, auth, NULL);`\n\n## 步骤\
    \ 2：测试事务事件\n```c\nprintf(\"program : Starting transaction\\n\");\nsqlite3_exec(db,\
    \ \"BEGIN\", NULL, NULL, &zErr);\nprintf(\"program : Committing transaction\\\
    n\");\nsqlite3_exec(db, \"COMMIT\", NULL, NULL, &zErr);\n```\n\n## 步骤 3：测试表事件\n\
    步骤 3 通过创建测试表 `foo` 来测试模式修改：\n```c\nprintf(\"program : Creating table\\n\");\n\
    sqlite3_exec(db, \"create table foo(x int, y int, z int)\", NULL, NULL, &zErr);\n\
    ```\n\n## 步骤 4：测试读写访问控制\n步骤 4 测试读（`select`）和写（`insert`/`update`）控制。它插入一条测试记录，选择它，更新它，然后再次选择以观察\
    \ `update` 的结果。\n```c\nprintf(\"program : Inserting record\\n\");\nsqlite3_exec(db,\
    \ \"insert into foo values (1,2,3)\", NULL, NULL, &zErr);\n\nprintf(\"program\
    \ : Selecting record (value for z should be NULL)\\n\");\nprint_sql_result(db,\
    \ \"select * from foo\");\n\nprintf(\"program : Updating record (update of x should\
    \ be denied)\\n\");\nsqlite3_exec(db, \"update foo set x=4, y=5, z=6\", NULL,\
    \ NULL, &zErr);\n\nprintf(\"program : Selecting record (notice x was not updated)\\\
    n\");\nprint_sql_result (db, \"select * from foo\");\n\nprintf(\"program : Deleting\
    \ record\\n\");\nsqlite3_exec(db, \"delete from foo\", NULL, NULL, &zErr);\n\n\
    printf(\"program : Dropping table\\n\");\nsqlite3_exec(db, \"drop table foo\"\
    , NULL, NULL, &zErr);\n```\n\n这里发生了几件事。程序选择表中的所有记录，其中一列是 `z`。\n\n我们应该在输出中看到，列\
    \ `z` 的值是 `NULL`。所有其他字段应包含表中的数据。接下来，程序尝试更新所有字段，最重要的是列 `x`。更新应该成功，但列 `x` 中的值应保持不变，因为授权器拒绝了它。这在随后的\
    \ `select` 语句中得到确认，该语句显示除了列 `x` 未改变外，所有列都已更新。然后程序删除了 `foo` 表，这应该会触发来自先前过滤器的模式更改通知。\n\
    \n## 步骤 5：测试附加/分离数据库命令\n步骤 5 测试 `attach` 和 `detach` 数据库命令。这里需要注意的是，授权器函数如何被提供数据库的名称，以及你如何区分在附加数据库与主数据库下执行的操作。\n\
    \n```c\n/* Connect to test2.db */\nrc = sqlite3_open_v2(\"test2.db\", &db2);\n\
    if(rc) {\n    fprintf(stderr, \"Can't open database: %s\\n\", sqlite3_errmsg(db2));\n\
    \    sqlite3_close(db2);\n    exit(1);\n}\n\nsqlite3_exec(db2, \"drop table foo2\"\
    , NULL, NULL, &zErr);\nsqlite3_exec(db2, \"create table foo2(x int, y int, z int)\"\
    , NULL, NULL, &zErr);\n\nprintf(\"program : Attaching database test2.db\\n\");\n\
    sqlite3_exec(db, \"attach 'test2.db' as test2\", NULL, NULL, &zErr);\n\nprintf(\"\
    program : Selecting record from attached database test2.db\\n\");\nsqlite3_exec(db,\
    \ \"select * from foo2\", NULL, NULL, &zErr);\n\nprintf(\"program : Detaching\
    \ table\\n\");\nsqlite3_exec(db, \"detach test2\", NULL, NULL, &zErr);\n```\n\n\
    为清晰起见，我将程序输出分成几部分。执行后，首先看到的是事务过滤器捕获到事务状态的更改：\n```\nprogram : Starting transaction\n\
    SQLITE_TRANSACTION : BEGIN Transaction\nprogram : Committing transaction\nSQLITE_TRANSACTION\
    \ : COMMIT Transaction\n\nprogram : Starting transaction\nSQLITE_TRANSACTION :\
    \ BEGIN Transaction\nprogram : Aborting transaction\nSQLITE_TRANSACTION : ROLLBACK\
    \ Transaction\n```\n\n接下来，我们看到由于创建测试表 `foo` 而产生的模式更改通知。这里需要注意的有趣之处在于，创建表时在 `sqlite_master`\
    \ 表中发生的所有其他事件：\n```\nprogram : Creating table\nSQLITE_INSERT : Insert records\
    \ into sqlite_master\nSQLITE_CREATE_TABLE : Schema modified\nSQLITE_READ : Read\
    \ of sqlite_master.name\nSQLITE_READ : Read of sqlite_master.rootpage\nSQLITE_READ\
    \ : Read of sqlite_master.sql\nSQLITE_UPDATE : Update of sqlite_master.type\n\
    SQLITE_UPDATE : Update of sqlite_master.name\nSQLITE_UPDATE : Update of sqlite_master.tbl_name\n\
    SQLITE_UPDATE : Update of sqlite_master.rootpage\nSQLITE_UPDATE : Update of sqlite_master.sql\n\
    SQLITE_READ : Read of sqlite_master.ROWID\nSQLITE_READ : Read of sqlite_master.name\n\
    SQLITE_READ : Read of sqlite_master.rootpage\nSQLITE_READ : Read of sqlite_master.sql\n\
    SQLITE_READ : Read of sqlite_master.tbl_name\n```\n\n然后程序插入一条记录，授权器检测到了它：\n```\n\
    program : Inserting record\nSQLITE_INSERT : Insert records into foo\n```\n\n事情在这里变得更有趣了。我们将能够看到授权器阻止对单个列的访问。程序从\
    \ `foo` 表中选择所有记录。我们看到 `SQLITE_SELECT` 事件发生，随后是为 `select` 语句中每个列的每次尝试访问生成的 `SQLITE_READ`\
    \ 事件。当涉及到列 `z` 时，授权器拒绝了访问。\n\n紧接着，SQLite 执行语句，`print_sql_result()` 打印结果集的列信息和行：\n\
    ```\nprogram : Selecting record (value for z should be NULL)\nSQLITE_SELECT\n\
    SQLITE_READ : Read of foo.x\nSQLITE_READ : Read of foo.y\nSQLITE_READ : Read of\
