    *Figure 10-5\. Your running Seinfeld Android SQLite application*


    CHAPTER 10 ■ ANDROID DEVELOPMENT WITH SQLITE


    That’s it, you’ve created your first Android SQLite application. From here, you
    can go crazy adding features and devising new applications.


    Care and Feeding for SQLite Android Applications


    As with all mobile platforms, the somewhat constrained nature of hardware and
    resources under


    Android (compared with normal desktop or notebook computers) means some additional
    care and


    attention is warranted to ensure the best possible development and user experience.


    Database Backup for Android


    You’ve seen in our development of the **myDatabaseHelper.java** subclass that
    it is possible to work directly with the SQLite database file. Using normal Android
    API calls, it is possible to manipulate the SQLite file yourself, and therefore
    you could use this approach to provide for backups and recovery of your


    database. But there is a better way.


    Google provides a backup service with Android, which allows you to copy any kind
    of persistent


    data to remote storage. This applies not just to SQLite database files, but that’s
    our focus for now. This is a very useful way to provide for data resilience, backup,
    and recovery, way beyond what you could achieve manually. For instance, if a user
    invokes a factory reset on an Android-powered device, a do-it-yourself backup
    would likely be lost. But the data backup system can automatically restore your
    data when your application is reinstalled.


    This feature is quite in-depth and is based around a number of classes. **BackupAgent**,


    **BackupAgentHelper**, and **BackupManager** are the main APIs involved. As with
    some of the classes we’ve seen, each of these classes includes a number of methods
    and subclasses designed to be overridden by you so that you can provide application-specific
    behavior for backup and restore activities. There’s enough material required to
    cover these tasks to fill a book in its own right, so we’ll point you to the online
    documentation for further reading at [**http://developer.android.com/guide/topics/**](http://developer.android.com/guide/topics)


    **data/backup.html.**


    Working with Large SQLite Databases Under Android


