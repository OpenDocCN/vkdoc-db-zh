- fmt: '# CHAPTER 3 ■ SQL FOR SQLITE


    By stringing operators together, you can create value expressions that are expressed
    in terms of yet other value expressions to arbitrary complexity. Here’s an example:


    `x = count(episodes.name)`


    `y = count(foods.name)`


    `z = y/x * 11`


    ## Binary Operators


    Binary operators are by far the most common of all operators in SQL. Table 3-1
    lists the binary operators supported in SQLite by *precedence*, from highest to
    lowest. Operators in each color group have equal precedence.


    *Table 3-1. Binary Operators*


    | Operator | Type | Action |

    | :--- | :--- | :--- |

    | `||` | | String Concatenation |

    | `*` | | Arithmetic Multiply |

    | `/` | | Arithmetic Divide |

    | `%` | | Arithmetic Modulus |

    | `+` | | Arithmetic Add |

    | `-` | | Arithmetic Subtract |

    | `<<` | | Bitwise Right shift |

    | `>>` | | Bitwise Left shift |

    | `&` | | Logical And |

    | `|` | | Logical Or |

    | `<` | | Relational Less than |

    | `<=` | | Relational Less than or equal to |

    | `>` | | Relational Greater than |

    | `>=` | | Relational Greater than or equal to |

    | `=` | | Relational Equal to |

    | `==` | | Relational Equal to |

    | `<>` | | Relational Not equal to |

    | `!=` | | Relational Not equal to |

    | `IN` | | Logical In |

    | `AND` | | Logical And |

    | `OR` | | Logical Or |

    | `IS` | | Logical Equal to |

    | `LIKE` | | Relational String matching |

    | `GLOB` | | Relational Filename matching |


    *Arithmetic operators* (for example, addition, subtraction, division) are binary
    operators that take numeric values and produce a numeric value. *Relational operators*
    (for example, `>` , `<` , `=`) are binary operators that compare values and value
    expressions and return a *logical value* (also called a *truth* value), which
    is either true or false. Relational operators form *logical expressions*, for
    example:


    `x > 5`

    `1 < 2`


    A logical expression is any expression that returns a truth value. In SQLite,
    false is represented by the number 0, while true is represented by anything else.
    For example:


    ```

    sqlite> SELECT 1 > 2;

    1 > 2

    ----------

    0


    sqlite> SELECT 1 < 2;

    1 < 2

    ----------

    1


    sqlite> SELECT 1 = 2;

    1 = 2

    ----------

    0


    sqlite> SELECT -1 AND 1;

    -1 AND 1

    ----------

    1

    ```


    ## Logical Operators


    *Logical operators* (`AND`, `OR`, `NOT`, `IN`) are binary operators that operate
    on truth values or logical expressions. They produce a specific truth value depending
    on their inputs. They are used to build more complex logical expressions from
    simpler expressions, such as the following:


    `(x > 5) AND (x != 3)`

    `(y < 2) OR (y > 4) AND NOT (y = 0)`

    `(color=''purple'') AND (grin=''toothy'')`


    The truth value produced by a logical operator follows normal Boolean logic rules,
    but there is an added twist when considering nulls, which we’ll discuss later
    in the chapter. This is the stuff the `where` clause is made of—using logical
    operators to answer real questions about the data in your SQLite database. Here’s
    an example:


    ```

    sqlite> select * from foods where name=''JujyFruit'' and type_id=9;

    id          type_id     name

    ----------  ----------  ----------

    244         9           JujyFruit

    ```


    The restriction here works according to the expression `(name=''JujyFruit'') and
    (type_id=9)`, which consists of two logical expressions joined by logical `and`.
    Both of these conditions must be true for any record in `foods` to be included
    in the result.


    ## The LIKE and GLOB Operators


    A particularly useful relational operator is `like`. `like` is similar to equals
    (`=`) but is used for matching string values against patterns. For example, to
    select all rows in `foods` whose names begin with the letter *J*, you could do
    the following:


    ```

    sqlite> select id, name from foods where name like ''J%'';

    id      name

    -----   --------------------

    156     Juice box

    236     Juicy Fruit Gum

    243     Jello with Bananas

    244     JujyFruit

    245     Junior Mints

    370     Jambalaya

    ```


    A percent symbol (`%`) in the pattern matches any sequence of zero or more characters
    in the string.'
