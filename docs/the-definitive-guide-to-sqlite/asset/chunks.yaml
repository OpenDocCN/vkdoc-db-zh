    # 第 11 章 ■ SQLITE 内部机制与新特性


    我们的最后一章是一系列专门讨论 SQLite 内部机制的主题。这里的材料收集自在过去一年左右的时间里，由 SQLite 的创始人 Richard Hipp
    所提出的一些话题。重要的是，我们将重点介绍 SQLite 近期版本中发生的最大变化之一：引入了预写式日志模型。我们还将简要探讨页面管理器和 B 树的工作原理，并更详细地介绍数据类型、亲和性以及
    SQLite 的类型处理方式的基础知识。


    这并不是对 SQLite 内部工作原理的详尽描述，因为这部分内容在 SQLite 网站上已经有非常好的介绍，而且 SQLite 版本的快速更新意味着书籍并不总是追踪诸如
    VDBE 中的已知命令、优化模型等事物的最佳载体。


    我们希望你喜欢这些主题，并鼓励你阅读更多资料，以进一步理解 SQLite 设计的美妙和优雅之处。


    ## B 树与页面管理器模块


    B 树为 SQLite 的 VDBE 提供了 O(logN) 的查找、插入和删除操作，以及 O(1) 的记录双向遍历。它是自平衡的，并自动管理碎片整理和空间回收。B
    树本身没有读写磁盘的概念。它只关心页面之间的关系。当 B 树需要一个页面时，它会通知页面管理器；当它即将修改一个页面时，也会通知页面管理器。在修改页面时，如果使用的是传统的回滚日志，页面管理器会确保原始页面首先被复制到日志文件中。类似地，当
    B 树完成写入时会通知页面管理器，页面管理器根据事务状态决定需要做什么。


    ## 数据库文件格式


    数据库中的所有页面都按顺序编号，从 1 开始。一个数据库由多个 B 树组成——每个表和索引一个 B 树（表使用 B+树；索引使用 B 树）。


    数据库中的每个表或索引都有一个根页面，该页面定义了其第一页的位置。所有索引和表的根页都存储在 `sqlite_master` 表中。


    数据库的第一页——第 1 页——是特殊的。第 1 页的前 100 个字节包含一个特殊的头（文件头），用于描述数据库文件。它包含诸如库版本、模式版本、页面大小、编码、是否启用自动真空等信息——这些是你在创建数据库时配置的所有永久性数据库设置，以及由各种
    `pragma` 设置的任何其他参数。头的确切内容在 `btree.c` 和 [`www.sqlite.org/fileformat2.html`](http://www.sqlite.org/fileformat2.html)
    中有文档说明。第 1 页也是 `sqlite_master` 表的根页。


    ## 页面重用与压缩


    SQLite 使用空闲列表回收页面。也就是说，当一个页面中的所有记录都被删除后，该页面会被放入一个预留用于重用的列表中。当后续添加新信息时，会首先选择附近的页面，然后才创建任何新页面（扩大数据库文件）。运行
    `VACUUM` 命令会清除空闲列表，从而缩小数据库。实际上，它会在一个新文件中重建数据库，只复制正在使用的页面，而不复制空闲列表中的页面。最终结果是一个新的、经过压缩的数据库。


    当在数据库中启用了自动真空时，SQLite 不再使用空闲列表，并在每次提交时自动缩小数据库。


    ## B 树记录


    B 树中的页面由 B 树记录组成，也称为 `payloads`。它们可能不是你所想的数据库记录——即按照表中列格式化的记录。它们比那更原始。一个 B 树记录或
    payload 只有两个字段：一个键字段和一个数据字段。键字段是数据库中每个表都有的 `rowid` 值或主键值。从 B 树的角度来看，数据字段是一个可以包含任何内容的非定形块。最终，数据库记录就存储在这些数据字段中。B
    树的工作是排序和导航，它主要只需要键字段来完成其工作（然而，B+树有一个例外，将在后面介绍）。此外，payload 的大小是可变的，其内部的键和数据字段也是可变的。平均而言，每个页面通常容纳多个
    payload；但是，如果一个 payload 太大而无法放在一个页面上（例如，包含 `blob` 的记录），它可能跨越多个页面。


    ## B+树


    B 树记录按键顺序存储。所有键在单个 B 树中必须是唯一的（这是自动保证的，因为键对应 `rowid` 主键，而 SQLite 会为你处理那个字段）。表使用
    B+树，其内部页面不包含表数据（数据库记录）。图 11-1 展示了一个表的 B+树示例。


    ### 图 11-1\. B+树组织（表）


    B+树中的根页和内部页面都是关于导航的。这些页面中的数据字段都是指向其下方页面的指针——它们只包含键。所有数据库记录都存储在叶页面上。在叶级别，记录和页面按键顺序排列，因此
    B 树游标可以仅使用叶页面来遍历（水平地）记录，向前或向后。这使得 O(1) 时间内的遍历成为可能。


    ## 记录与字段


    叶页面数据字段中的数据库记录由 VDBE 管理。数据库记录以二进制形式存储，使用一种专门的记录格式来描述记录中的所有字段。记录格式由一个连续的字节流组成，分为逻辑上的头部和数据段。头部段包括头大小（表示为可变大小的
    64 位整数值）和一个类型数组（也是可变 64 位整数），该数组描述了数据段中存储的每个字段，如图 11-2 所示。可变 64 位整数使用霍夫曼编码实现。


    ### 图 11-2\. 记录结构


    类型条目的数量对应于记录中的字段数量。此外，类型数组中的每个索引对应于字段数组中相同的索引。一个类型条目指定了其对应字段值的数据类型和大小。表 11-1 列出了可能的类型及其含义。


    ### 表 11-1\. 字段类型值


    **类型值** | **含义** | **数据长度**

    --- | --- | ---

    0 | **NULL** | N 在 1..4 之间

    1 | 有符号整数 | N

    2 | 有符号整数 | N

    3 | 有符号整数 | N

    4 | 有符号整数 | N

    5 | 有符号整数 | 6

    6 | IEEE 浮点数 | 7

    8 | 整数常量 0 | 不适用

    9 | 整数常量 1 | 不适用

    10-11 | 保留供将来使用 | 不适用

    N>12 且为偶数 | **blob** | (N-12)/2

    N>13 且为奇数 | **text** | (N-13)/2


