    Connecting


    As mentioned, the built-in module in Python 2.5 and newer is named sqlite3\. If
    using the separately sourced pysqlite package, it is in **pysqlite2**. The DB
    API module is located in **dbapi2**. This is sometimes confusing when you are
    thinking of PySQLite version numbers and SQLite version numbers


    simultaneously. You connect to a database using the module’s **connect()** function,
    passing in the relative name or complete file path of the database file you want
    to open.


    For the built-in pysqlite in Python 2.5+, a connection would be as follows:


    **import sqlite3**


    ****db = sqlite3.connect("foods.db")**


    **With the separately sourced package for pysqlite, your connect changes to the
    following:


    **from pysqlite2 import dbapi2 as sqlite3**


    **db = sqlite3.connect("foods.db")**


    **The usual rules apply: you can use in-memory databases by passing in the name
    **:memory:** as the database name; new databases are created for new files; and
    so forth. You can see the only real variation in the included module and separately
    sourced module for pysqlite is in import semantics. From here on, we’ll assume
    you’re happy switching to the technique that best suits your preferred way of
    using pysqlite.**


    **Query Processing


    Query execution is done according to the Python DB API Specification 2\. You create
    a cursor object with which to run the query and obtain results. Internally, a
    cursor object holds a **sqlite3_stmt** handle.


    Listing 8-6 illustrates executing a basic query.


    CHAPTER 8 ■ LANGUAGE EXTENSIONS


    *Listing 8-6\. A Basic Query in PySQLite*


    **from pysqlite2 import dbapi2 as sqlite3**


    **# Connect**


    **con = sqlite3.connect("foods.db")**


    **# Prepare a statement and execute. This calls sqlite3_prepare() and sqlite3_step()**


    **cur = con.cursor()**


    **cur.execute(''select * from foods limit 10'')**


    **# Iterate over results, print the name field (row[2])**


    **row = cur.fetchone()**


    **while row:**


    **print row[2]**


    **# Get next row**


    **row = cur.fetchone()**


    ****cur.close()**


    **con.close()**


    **Remember, Python code is white-space sensitive, so be careful not to introduce
    additional spaces or tabs when copying this code. Running this code produces the
    following output:


    **Bagels**


    **Bagels, raisin**


    **Bavarian Cream Pie**


    **Bear Claws**


    **Black and White cookies**


    **Bread (with nuts)**


    **Butterfingers**


    **Carrot Cake**


    **Chips Ahoy Cookies**


    **Chocolate Bobka**


    Query compilation and the first step of execution are performed together in the
    cursor’s **execute()** method. It calls **sqlite3_prepare()** followed by **sqlite3_step()**.
    For queries that modify data rather than return results, this completes the query
    (short of finalizing the statement handle). For **select** statements, it fetches
    the first row of the result. The **close()** method finalizes the statement handle.


