    \ 表将 `foods` 表中的食物与 `episodes` 表中的剧集关联起来。\n\n## 安装\n\n本书附带的示例压缩文件中包含了食物数据库。你可以在\
    \ Apress 网站 ([www.apress.com](http://www.apress.com)) 的 Source Code 部分获取。要创建数据库，首先在解压后的压缩文件根目录中找到\
    \ `foods.sql` 文件。\n\n要从命令行从头创建一个新数据库，请导航到示例目录，并运行以下命令：\n\n```bash\nsqlite3 foods.db\
    \ < foods.sql\n```\n\n这将创建一个名为 `foods.db` 的数据库文件。如果你不熟悉如何使用 SQLite 命令行程序，请参考第\
    \ 2 章。\n\n## 运行示例\n\n为方便起见，本章中的所有 SQL 示例都包含在示例压缩文件根目录下的 `sql.sql` 文件中。因此，你无需手动输入，只需打开该文件并找到你想尝试的\
    \ SQL 即可。\n\n运行本章中较长查询的一个便捷方法是，将它们复制到你喜爱的编辑器中并保存为一个单独的文件，然后你可以从命令行运行该文件。例如，将一个长查询复制到\
    \ `test.sql` 中进行尝试。你只需使用与之前创建数据库相同的方法来运行它：\n\n```bash\nsqlite3 foods.db < test.sql\n\
    ```\n\n结果将打印到屏幕上。这也使得在不重新输入或在 SQLite shell 内编辑的情况下，更容易地试验这些查询。你只需在编辑器中进行更改，保存文件，然后重新运行命令即可。\n\
    \n为了获得最佳的可读性，你可能希望在文件的开头添加以下命令：\n\n```bash\n.echo on\n.mode column\n.headers on\n\
    .nullvalue NULL\n```\n\n这使得命令行程序能够：1) 在执行时回显 SQL，2) 以列模式打印结果，3) 包含列标题，以及 4) 将空值打印为\
    \ `NULL`。本章中所有示例的输出都使用这些特定设置进行格式化。你可能还想为各种示例设置的另一个选项是 `.width` 选项，它设置输出的各自列宽。这些设置因示例而异。\n\
    \n为了更好的可读性，示例以两种不同的格式呈现。对于短查询，我们将展示 SQL 及其输出，就像在 SQLite shell 中显示的那样。例如：\n\n```sql\n\
    sqlite> SELECT *\n   ...> FROM foods\n   ...> WHERE name='JujyFruit'\n   ...>\
    \ AND type_id=9;\n\nid          type_id     name\n----------  ----------  ----------\n\
    244         9           JujyFruit\n```\n\n有时，如前面的示例，为了在印刷页面上提高可读性，我们会在命令及其输出之间添加一个额外的空行。对于较长的查询，我们仅以代码格式显示\
    \ SQL，并通过灰线与结果分隔，如下例所示：\n\n```sql\nSELECT f.name name, types.name type\nFROM foods\
    \ f\nINNER JOIN (\n    SELECT *\n    FROM food_types\n    WHERE id=6) types\n\
    ON f.type_id=types.id;\n\nname                       type\n-------------------------\
    \  -----\nGeneric (as a meal)        Dip\nGood Dip                   Dip\nGuacamole\
    \ Dip              Dip\nHummus                     Dip\n```\n\n## 语法\n\nSQL 的声明性语法读起来很像自然语言。语句以祈使语气表达，以描述动作的动词开头。其后是主语和谓语，如图\
    \ 3-2 所示。\n\n```sql\nSELECT id FROM foods WHERE name = 'JujyFruit';\n```\n\n动词\
    \ 主语 谓语\n\n*图 3-2. 通用 SQL 语法结构*\n"
- fmt: '# SQL 基础


    正如你所见，它读起来就像一个普通的句子。SQL 的设计初衷就是考虑到非技术人员，因此它旨在非常简单易懂。


    SQL 易于使用的一部分原因在于它（在很大程度上）是一种**声明式**语言，而不是像 C 或 Perl 那样的**命令式**语言。声明式语言是你描述**想要什么**，而命令式语言是你指定**如何得到它**。例如，考虑订购一个芝士汉堡的过程。作为顾客，你使用声明式语言来表达你的订单。也就是说，你只需向柜台后面的人声明你想要什么：*给我一个双层肉的
    Whataburger，加墨西哥辣椒和奶酪，不要蛋黄酱。*


    CHAPTER 3 ■ SQL FOR SQLITE


    订单被传回给厨师，厨师使用用命令式语言（菜谱）编写的程序来完成订单。他遵循一系列明确定义的步骤，这些步骤必须按特定顺序执行，才能根据你的（声明式）要求制作出芝士汉堡：


    1.  从左边第三个冰箱里取碎牛肉。

    2.  制作一个肉饼。

    3.  煎三分钟。

    4.  翻面。

    5.  再煎三分钟。

    6.  为第二个肉饼重复步骤 1-5。

    7.  在上面的面包上加芥末酱。

    8.  将肉饼放在下面的面包上。

    9.  在汉堡上添加奶酪、生菜、番茄、洋葱和墨西哥辣椒。

    10. 合并上下面包，并用黄色纸包装。


    正如你所见，声明式语言往往比命令式语言更简洁。在这个例子中，声明式汉堡语言（DBL）用一步实现了芝士汉堡，而命令式厨师语言（ICL）用了 10 步。声明式语言事半功倍。事实上，SQL
    的易用性与此例相去不远。一个与我们想象的 DBL 语句等价的合适 SQL 可能是这样的：


    ```sql

    select burger

    from kitchen

    where patties=2

    and toppings=''jalopenos''

    and condiment != ''mayo''

    limit 1;

    ```


    非常简单。正如我们提到的，SQL 被设计为一种用户友好的语言。在早期，SQL 的目标用户是终端用户，用于诸如临时查询和报告生成等任务（不像今天，它几乎是开发者和数据库管理员的专属领域）。


    ## 命令


    SQL 由命令组成。命令通常以分号终止，这标志着命令的结束。例如，以下是三个不同的命令：


    ```sql

    select id, name from foods;

    insert into foods values (null, ''Whataburger'');

    delete from foods where id=413;

    ```


    CHAPTER 3 ■ SQL FOR SQLITE


    ■ **注意** 分号被 SQLite 用作命令终止符，向系统发出信号，表示要处理的命令已结束。命令终止符最常与交互式程序相关联，这些程序旨在让用户对数据库执行查询。分号是许多系统中常见的
    SQL 命令终止符，尽管有些系统使用 **\g** 甚至 **go** 这个词。


    命令又由一系列**标记（tokens）**组成。标记可以是字面量、关键字、标识符、表达式或特殊字符。标记由空白（如空格、制表符和换行符）分隔。


    ## 字面量


    字面量（Literals），也称为**常量（constants）**，表示显式值。有三种：字符串字面量、数字字面量和二进制字面量。字符串字面量是一个或多个被单引号包围的字母数字字符。以下是一些例子：


    ```sql

    ''Jerry''

    ''Newman''

    ''JujyFruit''

    ```


    尽管 SQLite 支持使用单引号或双引号来界定字符串值，但我们强烈建议你只使用单引号。这是 SQL 标准，如果你遇到一个严格执行此标准的系统，这将为你节省很多麻烦。如果单引号是字符串值的一部分，它们必须表示为两个连续的单引号。例如，`Kenny''s
    chicken` 应表示如下：


    ```sql

    ''Kenny''''s chicken''

    ```


    数字字面量以整数、十进制或科学记数法表示。以下是一些例子：


    ```sql

    -1

    3.142

    6.0221415E23

    ```


    二进制值使用符号 **x''0000''** 表示，其中每个数字都是一个十六进制值。二进制值必须表示为 2 的倍数个十六进制值（8 位）。以下是一些例子：


    ```sql

    x''01''

    X''0fff''

    x''0F0EFF''

    X''0f0effab''

    ```


    CHAPTER 3 ■ SQL FOR SQLITE


    ## 关键字和标识符


    **关键字（Keywords）**是在 SQL 中有特定含义的词。这些词包括 **select**、**update**、**insert**、**create**、**drop**
    和 **begin** 等。**标识符（Identifiers）**指数据库中的特定对象，如表或索引。关键字是保留字，不能用作标识符。SQL 对关键字和标识符不区分大小写。以下是等效的语句：


    ```sql

    SELECT * from foo;

    SeLeCt * FrOm FOO;

    ```


    默认情况下，SQLite 中的字符串字面量值是大小写敏感的，因此值 **''Mike''** 与值 **''mike''** 不同。


    ## 注释


    SQLite 中的注释由两个连续的连字符（**--**）表示，它会注释掉该行剩余的部分；或者由多行 C 风格符号（**/\* \*/**）表示，它可以跨越多行。这是一个例子：


    ```sql

    -- 这是一行注释

    /*

    这是一条跨越

    两行的注释

    */

    ```


    再次强调，除非你有充分的理由使用 C 风格符号，否则我们建议在你的 SQLite SQL 脚本中坚持使用两个连续连字符的 SQL 标准。


    ## 创建数据库


    表是开始探索 SQLite 中 SQL 的自然起点。表是关系数据库中的标准信息单位。一切都围绕着表展开。表由行和列组成。虽然这听起来很简单，但表带来了各种其他概念，这些概念无法用几段简洁的文字很好地概括。事实上，这几乎需要整章的篇幅。所以，我们要在这里做的是关于表的概要介绍——刚好足够你创建一个简单的表，并在你想的时候删除它。一旦我们完成了这个，本章的所有其他部分就都有东西可依了。


    ## 创建表


    与关系模型一样，SQL 由几个部分组成。例如，它有一个结构部分，用于创建和销毁数据库对象。语言的这一部分通常称为**数据定义语言（DDL）**。类似地，它有一个功能部分，用于对这些对象执行操作（例如检索和操作数据）。语言的这一部分称为**数据操作语言（DML）**。创建表属于
    DDL，即结构部分。


    你使用 **create table** 命令创建表，其定义如下：


    ```sql

    create [temp] table table_name (column_definitions [, constraints]);

    ```


    **temp** 或 **temporary** 关键字创建一个**临时表**。这种表，顾名思义是临时的——它只在你的会话期间存在。一旦你断开连接，它就会被销毁（如果你还没有手动销毁它）。**temp**
    周围的方括号表示它是命令的可选部分。


    每当你看到任何语法在方括号中时，就意味着其中的内容是可选的。此外，管道符号（**|**）表示一个备选（可以理解为单词 or）。例如，以下语法：


    ```sql

    create [temp|temporary] table … ;

    ```


    这意味着 **temp** 或 **temporary** 关键字可以可选地使用。你可以说 **create temp table foo…**，或者你可以说
    **create temporary table foo…**。在这种情况下，它们的意思是一样的。


    如果你不创建临时表，那么 **create table** 会创建一个**基表**。术语**基表**指的是数据库中一个已命名的、持久的表。这是最常见的表类型。'
  raw: 'As you can see, it reads like a normal sentence. SQL was designed specifically
    with nontechnical people in mind and was thus meant to be very simple and easy
    to understand.


    Part of SQL’s ease of use comes from its being (for the most part) a *declarative*
    language, as opposed to an imperative language such as C or Perl. A declarative
    language is one in which you describe *what* you want, whereas an imperative language
    is one in which you specify *how* to get it. For example, consider the process
    of ordering a cheeseburger. As a customer, you use a declarative language to articulate
    your order. That is, you simply declare to the person behind the counter what
    you want: *Give me a double meat Whataburger with jalapeños and cheese, hold the
    mayo.*


    CHAPTER 3 ■ SQL FOR SQLITE


    The order is passed back to the chef who fulfills the order using a program written
    in an imperative language—the recipe. He follows a series of well-defined steps
    that must be executed in a specific order to create the cheeseburger per your
    (declarative) specifications:


    1\. Get ground beef from the third refrigerator on the left.


    2\. Make a patty.


    3\. Cook for three minutes.


    4\. Flip.


    5\. Cook three more minutes.


    6\. Repeat steps 1–5 for second patty.


    7\. Add mustard to top bun.


    8\. Add patties to bottom bun.


    9\. Add cheese, lettuce, tomatoes, onions, and jalapeños to burger.


    10\. Combine top and bottom buns, and wrap in yellow paper.


    As you can see, declarative languages tend to be more succinct than imperative
    ones. In this


    example, it took the declarative burger language (DBL) one step to materialize
    the cheeseburger, while it took the imperative chef language (ICL) 10 steps. Declarative
    languages do more with less. In fact, SQL’s ease of use is not far from this example.
    A suitable SQL equivalent to our imaginary DBL statement shown earlier might be
    something along the lines of this:


    **select burger**


    **from kitchen**


    **where patties=2**


    **and toppings=''jalopenos''**


    **and condiment != ''mayo''**


    **limit 1;**


    **Pretty simple. As we’ve mentioned, SQL was designed to be a user-friendly language.
    In the early days, SQL was targeted specifically for end users for tasks such
    as ad hoc queries and report generation (unlike today where it is almost exclusively
    the domain of developers and database administrators).


    Commands


    SQL is made up of commands. Commands are typically terminated by a semicolon,
    which marks the end of the command. For example, the following are three distinct
    commands:


    **select id, name from foods;**


    **insert into foods values (null, ''Whataburger'');**


    **delete from foods where id=413;**


    CHAPTER 3 ■ SQL FOR SQLITE


    ■ **Note** The semicolon is used by SQLite as a command terminator, signaling
    the end of the command to be processed. Command terminators are most commonly
    associated with interactive programs designed for letting users execute queries
    against a database. The semicolon is a common SQL command terminator across many
    systems, though some use **\g** or even the word **go**.


    Commands, in turn, are composed of a series of *tokens*. Tokens can be literals,
    keywords, identifiers, expressions, or special characters. Tokens are separated
    by white space, such as spaces, tabs, and newlines.


    Literals


    Literals, also called *constants*, denote explicit values. There are three kinds:
    string literals, numeric literals, and binary literals. String literals are one
    or more alphanumeric characters surrounded by single quotes. Here are some examples:


    **''Jerry''**


    **''Newman''**


    **''JujyFruit''**


    **Although SQLite supports delimiting string values with single or double quotes,
    we strongly suggest you only use single quotes. This is the SQL standard and will
    save you many hours of grief should you encounter a system that strictly enforces
    this. If single quotes are part of the string value, they must be represented
    as two successive single quotes. For example, Kenny’s chicken would be expressed
    as


    follows:


    **''Kenny''''s chicken''**


    **Numeric literals are represented in integer, decimal, or scientific notation.
    Here are some examples:


    **-1**


    **3.142**


    **6.0221415E23**


    **Binary values are represented using the notation **x''0000''** , where each
    digit is a hexadecimal value.


    Binary values must be expressed in multiples of 2 hexadecimal values (8 bits).
    Here are some examples: **x''01''**


    **X''0fff''**


    **x''0F0EFF''**


    **X''0f0effab''**


    CHAPTER 3 ■ SQL FOR SQLITE


    Keywords and Identifiers


    *Keywords* are words that have a specific meaning in SQL. These include words
    such as **select**, **update**, **insert**, **create**, **drop**, and **begin**.
    *Identifiers* refer to specific objects within the database, such as tables or
    indexes. Keywords are reserved words and may not be used as identifiers. SQL is
    case insensitive with respect to keywords and identifiers. The following are equivalent
    statements:


    **SELECT * from foo;**


    **SeLeCt * FrOm FOO;**


    **By default, string literal values are case sensitive in SQLite, so the value
    **''Mike''** is not the same as the value **''mike''** .


    Comments


    Comments in SQLite are denoted by two consecutive hyphens (**--**), which comment
    the remaining line, or by the multiline C-style notation (**/* */**), which can
    span multiple lines. Here’s an example:


    **-- This is a comment on one line**


    **/* This is a comment spanning**


    **two lines */**


    **Again, unless you have a strong reason to use C-style notation, we’d recommend
    sticking with the SQL standard of two consecutive hyphens in your SQL scripts
    for SQLite.


    Creating a Database


    Tables are the natural starting point to kick off your exploration of SQL in SQLite.
    The table is the standard unit of information in a relational database. Everything
    revolves around tables. Tables are composed of rows and columns. And although
    that sounds simple, tables bring along with them all


    kinds of other concepts, which can’t be nicely summarized in a few tidy paragraphs.
    In fact, it takes almost the whole chapter. So, what we are going to do here is
    the two-minute overview of tables—just enough for you to create a simple table
    and get rid of it if you want to. And once we have that out of the way, all the
    other parts of this chapter will have something to build on.


    Creating Tables


    Like the relational model, SQL consists of several parts. It has a structural
    part, for example, which is designed to create and destroy database objects. This
    part of the language is generally referred to as a *data definition language*
    (DDL). Similarly, it has a functional part for performing operations on those
    objects (such as retrieving and manipulating data). This part of the language
    is referred to as a *data* *manipulation language* (DML). Creating tables falls
    under DDL, the structural part.


    You create a table with the **create table** command, which is defined as follows:


    **create [temp] table table_name (column_definitions [, constraints]);**


    **53


    CHAPTER 3 ■ SQL FOR SQLITE


    The **temp** or **temporary** keyword creates a *temporary table*. This kind of
    table is, well, temporary—it will last only as long your session. As soon as you
    disconnect, it will be destroyed (if you haven’t already destroyed it manually).
    The brackets around the **temp** denote that it is an optional part of the command.


    Whenever you see any syntax in brackets, it means that the contents within them
    are optional.


    Furthermore, the pipe symbol (**|**) denotes an alternative (think of the word
    or). Take, for example, the following syntax:


    ****create [temp|temporary] table … ;**


    **This means that either the **temp** or **temporary** keyword may be optionally
    used. You could say **create** **temp table foo…**, or you could say **create
    temporary table foo…**. In this case, they mean the same thing.


    If you don’t create a temporary table, then **create table** creates a base table.
    The term *base table* refers to a table that is a named, persistent table in the
    database. This is the most common kind of table.'
