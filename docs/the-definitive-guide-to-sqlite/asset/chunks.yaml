- fmt: "# CHAPTER 8 ■ LANGUAGE EXTENSIONS\n\n`jdbc:sqlite://dirA/dirB/dbfile`\n\n\
    `jdbc:sqlite:/DRIVE:/dirA/dirB/dbfile`\n\n`jdbc:sqlite:///COMPUTERNAME/shareA/dirB/dbfile`\n\
    \nCurrently, the supported data types on SQLite tables are `java.lang.String`,\
    \ `short`, `int`, `float`, and `double`. Some support exists for `java.sql.Date`,\
    \ `java.sql.Time`, and `java.sql.Timestamp`. A connection property `daterepr`\
    \ is used to define behavior for these data types. A value of `daterepr=Julian`\
    \ sets SQLite to interpret all `insert/updates` of these data types as a floating-point\
    \ conversion to the equivalent Julian Day. Any other value switches behavior to\
    \ use the string formats `YYYY-mm-dd` for date, `HH:MM:SS` for time, and `YYYY-mm-dd\
    \ HH:MM:SS.f` for timestamp.\n\nOther data type mapping depends mostly on the\
    \ availability of the SQLite pragmas `show_datatypes` and `table_info`. Enough\
    \ basic database metadata methods are implemented such that it is possible to\
    \ access SQLite databases with JDK 1.4 or newer and the iSQL-Viewer tool.\n\n\
    Listing 8-22 is a simple example (located in `SQLiteJDBCExample.java`) of using\
    \ the JDBC driver to query the `foods` table.\n\n*Listing 8-22. The SQLite JDBC\
    \ Test Program*\n\n```java\nimport java.sql.*;\nimport SQLite.JDBCDriver;\n\n\
    public class SQLiteJDBCExample {\n    public static void main ( String [ ] args\
    \ )\n    {\n        try\n        {\n            Class.forName(\"SQLite.JDBCDriver\"\
    );\n            Connection c = DriverManager.getConnection( \"jdbc:sqlite://tmp/foods.db\"\
    ,\n                \"\" // username (NA),\n                \"\" // password (NA));\n\
    \            Statement s = c.createStatement();\n            ResultSet rs = s.executeQuery\
    \ (\"select * from foods limit 10\");\n            int cols = (rs.getMetaData()).getColumnCount();\n\
    \            while (rs.next())\n            {\n                String fields[]\
    \ = new String[cols];\n                for(int i=0; i<cols; i++)\n           \
    \     {\n                    fields[i] = rs.getString(i+1);\n                }\n\
    \                System.out.println(\"[\" + join(fields, \", \") + \"]\");\n \
    \           }\n        }\n        catch( Exception x )\n        {\n          \
    \  x.printStackTrace();\n        }\n    }\n\n    static String join( String[]\
    \ array, String delim )\n    {\n        StringBuffer sb = join(array, delim, new\
    \ StringBuffer());\n        return sb.toString();\n    }\n\n    static StringBuffer\
    \ join( String[] array, String delim, StringBuffer sb )\n    {\n        for (\
    \ int i=0; i<array.length; i++ )\n        {\n            if (i!=0) sb.append(delim);\n\
    \            sb.append(\"'\" + array[i] + \"'\");\n        }\n        return sb;\n\
    \    }\n}\n```\n\nThis example produces the following output:\n\n```\n['1', '1',\
    \ 'Bagels']\n['2', '1', 'Bagels, raisin']\n['3', '1', 'Bavarian Cream Pie']\n\
    ['4', '1', 'Bear Claws']\n['6', '1', 'Bread (with nuts)']\n['7', '1', 'Butterfingers']\n\
    ['8', '1', 'Carrot Cake']\n['9', '1', 'Chips Ahoy Cookies']\n['10', '1', 'Chocolate\
    \ Bobka']\n['11', '1', 'Chocolate Eclairs']\n```\n\nTcl\n\nSQLite’s author wrote\
    \ and maintains the Tcl extension. All of SQLite’s testing code is implemented\
    \ in Tcl and thus uses the SQLite Tcl extension. It is safe to say that this extension\
    \ is both stable and well tested itself. The Tcl extension is included as part\
    \ of the SQLite source distribution. You can find complete documentation for this\
    \ extension on the SQLite web site: `www.sqlite.org/tclsqlite.html`.\n\nInstallation\n\
    \nThe SQLite GNU Autoconf script will automatically search for Tcl and build the\
    \ Tcl extension if it finds it.\n\nThe recommended way to build the TCL interface\
    \ is to use one of the tarballs or precompiled bindings for the Tcl extension\
    \ for either Linux and Windows available on the SQLite web site. A simple `configure\
    \ && make` invocation should see the TCL extension compiled and installed in the\
    \ default location, so TCL and TCL/Tk scripts can load the extension normally.\
    \ You’ll also find the requisite libraries in the package repositories of various\
    \ distributions. For example, under Debian or Ubuntu, you can add the Tcl bindings\
    \ as follows:\n\n```\nfuzzy@linux $ sudo apt-get install libsqlite3-tcl\n```\n\
    \nAs this chapter is being written, there is also talk of including SQLite by\
    \ default in TCL version 8.6, which will make the process even easier!\n\nConnecting\n\
    \nThe SQLite extension is located in the `sqlite3` package, which must be loaded\
    \ using the `package require` directive. To connect to a database, use the `sqlite3`\
    \ command to create a database handle. This command takes two arguments: the first\
    \ is the name of the database handle to be created, and the second is the path\
    \ to the database file. The following example illustrates connecting to a database:\n\
    \n```tcl\n#!/usr/bin/env tclsh\npackage require sqlite3\nputs \"\\nConnecting.\"\
    \nsqlite3 db ./foods.db\n```\n\nThe usual database connection rules apply. Passing\
    \ the value `:memory:` instead of a file name will create an in-memory database.\
    \ Passing in the name of a new file will create a new database, and so on.\n\n\
    The database handle returned corresponds to a connection to the specified database;\
    \ however, it is not yet open—it does not open the connection until you try to\
    \ use it. The database handle is the sole object through which you work with the\
    \ database.\n\nTo disconnect, use the `close` method of the database handle. This\
    \ will automatically roll back any pending transactions.\n\nQuery Processing\n\
    \nThe extension executes queries using the `eval` method, which can process one\
    \ or more queries at a time.\n\n`eval` can be used in several ways. The first\
    \ way is to iterate through all records in a script following the SQL code. The\
    \ script will be executed once for each row returned in the result set. The fields\
    \ for each row are set as local variables within the script. Here’s an example:\n\
    \n```tcl\nputs \"\\nSelecting 5 records.\"\ndb eval {select * from foods limit\
    \ 5} {\n    puts \"$id $name\"\n}\n```\n\nThere is another form in which you can\
    \ assign the field values to an array. To do this, specify the array name after\
    \ the SQL and before the script. Here’s an example:\n\n```tcl\nputs \"\\nSelecting\
    \ 5 records.\"\ndb eval {select * from foods limit 5} values {\n    puts \"$values(id)\
    \ $values(name)\"\n}\n```\n\nBoth of the previous code snippets produce the following\
    \ output:\n\n```\nSelecting 5 records.\n1 Bagels\n2 Bagels, raisin\n3 Bavarian\
    \ Cream Pie\n4 Bear Claws\n5 Black and White cookies\n```\n\nIf you don’t provide\
    \ a script, `eval` will return the result set. The result set is returned as one\
    \ long list of values, leaving you to determine the record boundaries. You can\
    \ see this behavior in the following statement:\n\n```tcl\nset x [db eval {select\
    \ * from foods limit 3}]\n```\n\nThis will return a list in variable `$x` that\
    \ is six elements long: `{1 1 Bagels 2 1 {Bagles, raisin} 3 1 {Bavarian Cream\
    \ Pie}}`. This corresponds to three records, each of which has three fields (`id`,\
    \ `type_id`, and `name`).\n\nFor non-`select` statements, `eval` returns information\
    \ regarding modified records, as illustrated in Listing 8-23.\n\n*Listing 8-23.\
    \ Examining Changes in Tcl*\n\n```tcl\ndb eval begin\nputs \"\\nUpdating all rows.\"\
    \ndb eval { update foods set type_id=0 }\nputs \"Changes : [db changes]\"\nputs\
    \ \"\\nDeleting all rows.\"\n# Delete all rows\ndb eval { delete FROM foods }\n\
    puts \"\\nInserting a row.\"\n# Insert a row\ndb eval { insert into foods (type_id,\
    \ name) values (9, 'Junior Mints') }\nputs \"Changes : [db changes]\"\nputs \"\
    last_insert_rowid() : [db last_insert_rowid]\"\nputs \"\\nRolling back transaction.\"\
    \ndb eval rollback\n```\n\nThe code in Listing 8-23 produces the following output:\n\
    \n```\nUpdating all rows.\nChanges : 415\nDeleting all rows.\nInserting a row.\n\
    Changes : 1\nlast_insert_rowid() : 1\nRolling back transaction.\nTotal records\
    \ : 415\n```"
