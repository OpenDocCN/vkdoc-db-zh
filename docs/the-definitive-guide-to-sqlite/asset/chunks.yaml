- fmt: "# PySQLite 实现用户自定义聚合\n\nPySQLite 将用户自定义聚合实现为 Python 类。这些类必须实现 `step()` 和 `finalize()`\
    \ 方法。你使用 `Connection::create_aggregate()` 来注册聚合，它接受三个参数：函数的 SQL 名称、参数数量以及实现该聚合的类名。清单\
    \ 8-12 实现了一个名为 `pysum` 的简单 `SUM` 聚合。\n\n## 清单 8-12. PySQLite 中的 pysum() 聚合\n\n\
    ```python\nfrom pysqlite2 import dbapi2 as sqlite3\n\nclass pysum:\n    def init(self):\n\
    \        self.sum = 0\n\n    def step(self, value):\n        self.sum += value\n\
    \n    def finalize(self):\n        return self.sum\n\n231\n\nCHAPTER 8 ■ LANGUAGE\
    \ EXTENSIONS\n\ncon = sqlite3.connect(\"foods.db\")\ncon.create_aggregate(\"pysum\"\
    , 1, pysum)\ncur = con.cursor()\ncur.execute(\"select pysum(id) from foods\")\n\
    print cur.fetchone()[0]\n```\n\n# APSW 作为另一种 Python 接口\n\nAPSW 由 Roger Binns 编写和维护。关于\
    \ APSW 的详细信息可以在 [http://code.google.com/p/apsw/](http://code.google.com/p/apsw)\
    \ 找到。虽然 APSW 和 pysqlite 有一些共同的功能和非常相似的语法风格，但 APSW 更进一步，提供了一系列额外的特性和 API 映射点。与其重复非常相似的\
    \ Python 代码示例，不如概述 APSW 的主要优点，让你自行探索。\n\n*   *对虚拟表、VFS、Blob I/O、备份和文件控制的支持*：APSW\
    \ 全面支持 SQLite 提供的最新特性，以及 pysqlite 专注于 DBAPI 合规性所未提供的数据库管理任务。\n*   *APSW Python\
    \ Shell*：APSW 包含一个可扩展的 Shell，可用于替代 SQLite 命令行界面。这包括语法高亮、CSV 格式化和处理、严格正确的错误处理以及数据和消息的额外格式化选项等强大功能。\n\
    *   *一致的事务处理*：APSW 总是按你期望的方式执行事务，而不是模仿 pysqlite 试图在不涉及你的情况下直观地处理事务。\n\n还有许多其他不错的（甚至是主要的）特性使得使用\
    \ APSW 成为一种乐趣。你可以在 [http://apidoc.apsw.googlecode.com/hg/pysqlite.html](http://apidoc.apsw.googlecode.com/hg/pysqlite.html)\
    \ 回顾所有这些功能。\n\n# Ruby\n\nRuby 扩展由 37 Signals 的 Jamis Buck 编写，现在由一组开发人员维护。你可以在\
    \ [http://rubyforge.org/projects/sqlite-ruby](http://rubyforge.org/projects/sqlite-ruby)\
    \ 获取扩展的详细信息以及源代码。SQLite 3 扩展的完整文档可以在 [http://sqlite-ruby.rubyforge.org/sqlite3/](http://sqlite-ruby.rubyforge.org/sqlite3)\
    \ 找到，尽管布局有点令人望而生畏。\n\n## 安装\n\n扩展可以通过两种方式构建：使用或不使用 SWIG。Ruby 配置脚本会自动检测你的系统上是否有\
    \ SWIG。你应该使用 SWIG（C 扩展）来构建扩展，因为该实现更稳定。如果你的操作系统使用成熟的软件包管理和仓库系统（如 Debian、Ubuntu\
    \ 等），你也会在其中找到适用于你系统的软件包。\n\n在撰写本文时，当前的 `sqlite-ruby` 版本是 1.3.1。要从源代码构建，从 [http://rubyforge.org/projects/sqlite-ruby](http://rubyforge.org/projects/sqlite-ruby)\
    \ 获取 tarball。解包 tarball，并运行三个设置命令：\n\n```bash\nfuzzy@linux $ tar xjvf sqlite3-ruby-1.3.1.tar.bz2\n\
    fuzzy@linux $ cd sqlite3-ruby-1.3.1\nfuzzy@linux $ ruby setup.rb config\nfuzzy@linux\
    \ $ ruby setup.rb setup\nfuzzy@linux $ ruby setup.rb install\n```\n\n如果你安装了 Ruby\
    \ gems，你可以让 Ruby 通过一步为你完成所有操作：\n\n```bash\nfuzzy@linux $ gem install --remote\
    \ sqlite3-ruby\n```"
