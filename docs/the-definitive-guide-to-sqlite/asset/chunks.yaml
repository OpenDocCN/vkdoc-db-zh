    In many ways, the VDBE is the heart of SQLite. All of the modules before it work
    to create a VDBE


    program, while all modules after it exist to execute that program, one instruction
    at a time.


    The Back End


    The back end consists of the B-tree, page cache, and OS interface. The B-tree
    and page cache (pager) work together as information brokers. Their currency is
    database pages, which are uniformly sized blocks of data that, like shipping containers,
    are made for transportation. Inside the pages are the goods: more interesting
    bits of information such as records and columns and index entries. Neither the
    B-tree nor the pager has any knowledge of the contents. They only move and order
    pages; they don’t care what’s inside.


    The B-tree’s job is order. It maintains many complex and intricate relationships
    between pages,


    which keeps everything connected and easy to locate. It organizes pages into tree-like
    structures (which is the reason for the name), which are highly optimized for
    searching. The pager serves the B-tree, feeding it pages. Its job is transportation
    and efficiency. The pager transfers pages to and from disk at the B-tree’s behest.
    Disk operations are still some of the slowest things a computer has to do, even
    with today’s solid-state disks. Therefore, the pager tries to speed this up by
    keeping frequently used pages cached in memory and thus minimizes the number of
    times it has to deal directly with the hard drive. It uses special techniques
    to predict which pages will be needed in the future and thus anticipate the needs
    of the B-tree, keeping pages flying as fast as possible. Also in the pager’s job
    description are transaction management, database locking, and crash recovery.
    Many of these jobs are mediated by the OS


    interface.


    Things such as file locking are often implemented differently in different operating
    systems. The OS


    interface provides an abstraction layer that hides these differences from the
    other SQLite modules. The end result is that the other modules see a single consistent
    interface with which to do things like file locking. So, the pager, for example,
    doesn’t have to worry about doing file locking one way on Windows and doing it
    another way on different operating systems such as Unix. It lets the OS interface
    worry about this. It just says to the OS interface, “Lock this file,” and the
    OS interface figures out how to do that 7


    CHAPTER 1 ■ INTRODUCING SQLITE


    based on the operating system on which it happens to be running. Not only does
    the OS interface keep code simple and tidy in the other modules, but it also keeps
    the messy issues cleanly organized and at arm’s length in one place. This makes
    it easier to port SQLite to different operating systems—all of the OS issues that
    must be addressed are clearly identified and documented in the OS interface’s
    API.


    Utilities and Test Code


    Miscellaneous utilities and common services such as memory allocation, string
    comparison, and


    Unicode conversion routines are kept in the utilities module. This is basically
    a catchall module for services that multiple modules need to use or share. The
    testing module contains a myriad of regression tests designed to examine every
    little corner of the database code. This module is one of the reasons SQLite is
    so reliable: it performs a lot of regression testing and makes those tests available
    for anyone to run and improve.


    SQLite’s Features and Philosophy


    SQLite offers a surprisingly comprehensive range of features and capabilities
    despite its small size. It supports a large subset of the ANSI SQL92 standard
    for SQL features (transactions, views, check


    constraints, foreign keys, correlated subqueries, compound queries, and more)
    along with many other features found in relational databases, such as triggers,
    indexes, autoincrement columns, and


    **LIMIT**/**OFFSET** features. It also has many rare or unique features, such
    as in-memory databases, dynamic typing, and conflict resolution—otherwise referred
    to as **merge** or **upsert** in other RDBMSs—which will be explained in a moment.


    As mentioned earlier in this chapter, SQLite has a number of governing principles
    or characteristics that serve to more or less define its philosophy and implementation.
    I’ll expand on these issues next.


    Zero Configuration


    From its initial conception, SQLite has been designed so that it can be incorporated
    and used without the need of a DBA. Configuring and administering SQLite is as
    simple as it gets. SQLite contains just enough features to fit in a single programmer’s
    brain, and like its library, it requires as small a footprint in the gray matter
    as it does in RAM.


