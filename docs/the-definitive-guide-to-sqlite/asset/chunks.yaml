- fmt: "# CHAPTER 4 ■ ADVANCED SQL FOR SQLITE\n\nWhen SQLite sorts a column, it first\
    \ groups values according to storage class—first `NULL`s, then `integer`s and\
    \ `real`s, next `text`, and finally `blob`s. It then sorts the values within each\
    \ group. `NULL`s are not ordered at all, `integer`s and `real`s are compared numerically,\
    \ `text` is arranged by the appropriate collation, and `blob`s are sorted using\
    \ `memcmp()`, effectively comparing them in a bitwise fashion. Figure 4-1 illustrates\
    \ a hypothetical column sorted in ascending order.\n\n```\nNULL\nNULL\nNULL\n\
    NULL\nINTEGER, REAL\n1.1\n1.299E9\nTEXT\nCheerios\nJujyFruit\nx 0003\nBLOB\nx\
    \ 000e\n```\n\n*Figure 4-1. Storage class sort order*\n\nIt’s probably worth reading\
    \ this section again once you’ve had a chance to practice some SQL using SQLite’s\
    \ storage classes, just to reinforce this particular aspect of SQLite. You’ll\
    \ return to this topic in Chapter 11, when you’ll delve into the internals of\
    \ storage classes, manifest typing, type affinity, and other under-the-hood topics\
    \ related to types and storage classes.\n\n## Views\n\nViews are virtual tables.\
    \ They are also known as *derived tables*, because their contents are derived\
    \ from the results of queries on other tables. Although views look and feel like\
    \ base tables, they aren’t. The contents of base tables are persistent, whereas\
    \ the contents of views are dynamically generated when they are used. The syntax\
    \ to create a view is as follows:\n\n```sql\ncreate view name as select-stmt;\n\
    ```\n\nThe name of the view is given by `name` and its definition by `select-stmt`.\
    \ The resulting view will look like a base table named `name`. Imagine you had\
    \ a query you ran all the time, so much that you get sick of writing it. Views\
    \ are the solution for this particular chore. Say your query was as follows:\n\
    \n```sql\nselect f.name, ft.name, e.name\nfrom foods f\ninner join food_types\
    \ ft on f.type_id=ft.id\ninner join foods_episodes fe on f.id=fe.food_id\ninner\
    \ join episodes e on fe.episode_id=e.id;\n```\n\nThis returns the name of every\
    \ food, its type, and every episode it was in. It is one big table of 504 rows\
    \ with just about every food fact. Rather than having to write out (or remember)\
    \ the previous query every time you want these results, you can tidily restate\
    \ it in the form of a view. Let’s name it `details`:\n\n```sql\ncreate view details\
    \ as\nselect f.name as fd, ft.name as tp, e.name as ep, e.season as ssn\nfrom\
    \ foods f\ninner join food_types ft on f.type_id=ft.id\ninner join foods_episodes\
    \ fe on f.id=fe.food_id\ninner join episodes e on fe.episode_id=e.id;\n```\n\n\
    Now you can query `details` just as you would a table. Here’s an example:\n\n\
    ```sql\nsqlite> select fd as Food, ep as Episode\n   ...> from details where ssn=7\
    \ and tp like 'Drinks';\nFood                    Episode\n--------------------\
    \  --------------------\nApple Cider           The Bottle Deposit 1\nBosco   \
    \              The Secret Code\nCafe Latte            The Postponement\nCafe Latte\
    \            The Maestro\nChampagne Coolies     The Wig Master\nCider        \
    \         The Bottle Deposit 2\nHershey's             The Secret Code\nHot Coffee\
    \            The Maestro\nLatte                 The Maestro\nMellow Yellow soda\
    \    The Bottle Deposit 1\nMerlot                The Rye\nOrange Juice       \
    \   The Wink\nTea                   The Hot Tub\nWild Turkey           The Hot\
    \ Tub\n```\n\nThe contents of views are dynamically generated. Thus, every time\
    \ you use `details`, its associated SQL will be reexecuted, producing results\
    \ based on the data in the database at that moment. Some features of views available\
    \ in other databases, like view-based security, are not generally available. Some\
    \ view-based security is available if you program with SQLite, using its operational\
    \ control facilities. This is covered in Chapters 5 and 6.\n\nFinally, to drop\
    \ a view, use the `DROP VIEW` command:\n\n```sql\ndrop view name;\n```\n\nThe\
    \ name of the view to drop is given by `name`.\n\n### UPDATABLE VIEWS"
