- fmt: "# CHAPTER 8 ■ LANGUAGE EXTENSIONS\n\n```java\nreturn \"Row: [\" + StringUtil.join(row,\
    \ \", \") + \"]\";\n}\n}\n```\n\nThe `SQLite.Callback` interface has three methods:\
    \ `columns()`, `types()`, and `newrow()`. They process the column names, column\
    \ types, and row data, respectively. Each call to `VM::step()` updates all of\
    \ the column, type, and row information.\n\nThe use of `VM` is illustrated in\
    \ the `query()` function of the example, which is listed in Listing 8-18.\n\n\
    ### Listing 8-18. The `query()` Function\n\n```java\npublic static void query(SQLite.Database\
    \ db)\n    throws SQLite.Exception\n{\n    System.out.println(\"\\nQuery Processing:\\\
    n\");\n    Row row = new Row();\n    db.set_authorizer(new AuthorizeFilter());\n\
    \    Vm vm = db.compile( \"select * from foods limit 5;\" +\n                \
    \         \"delete from foods where id = 5;\" +\n                         \"insert\
    \ into foods (type_id, name) values (5, 'Java');\" +\n                       \
    \  \"select * from foods limit 5\" );\n    do\n    {\n        while (vm.step(row))\n\
    \        {\n            System.err.println(row.print());\n        }\n    }\n \
    \   while (vm.compile());\n}\n```\n\nThe `SQLite.Database::exec()` performs self-contained\
    \ queries and has the following form: `void exec(String sql, Callback cb, String[]\
    \ params)`\n\nThe `params` array corresponds to `%q` or `%Q` parameters in the\
    \ SQL statement. An example is shown in Listing 8-19.\n\n### Listing 8-19. The\
    \ `exec_query()` Function\n\n```java\npublic static void exec_query(SQLite.Database\
    \ db)\n    throws SQLite.Exception\n{\n    System.out.println(\"\\nExec Query:\\\
