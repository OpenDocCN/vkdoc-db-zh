    with the statement will lead to a **SQLITE_SCHEMA** error, which is discussed
    later in the section “Errors and the Unexpected.” At this point, you would need
    to examine the error associated with **SQLITE_SCHEMA** by using the **sqlite3_errmsg()**
    function.


