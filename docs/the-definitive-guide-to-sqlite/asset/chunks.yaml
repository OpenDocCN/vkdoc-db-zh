    ## Importing Data


    There are two ways to import data, depending on the format of the data in the
    file to import. If the file is composed of SQL, you can use the `.read` command
    to execute the commands contained in the file. If the file contains comma-separated
    values (CSV) or other delimited data, you can use the `.import` `[file][table]`
    command. This command will parse the specified file and attempt to insert it into
    the specified table. It does this by parsing each line in the file using the pipe
    character (`|`) as the delimiter and inserting the parsed columns into the table.
    Naturally, the number of parsed fields in the file should match up with the number
    of columns in the table. You can specify a different delimiter using the `.separator`
    command. To see the current value set for the separator, use the `.show` command.
    This will show all user-defined settings for the shell, among them the current
    default separator:


    ```

    sqlite> .show

    echo: off

    explain: off

    headers: on

    mode: column

    nullvalue: ""

    output: stdout

    separator: "|"

    width:

    ```


    The `.read` command is the way to import files created by the `.dump` command.
    Using `file.sql` created earlier as a backup, we can drop the existing database
    objects (the `test` table and `schema` view) and re-import it as follows:


    ```

    sqlite> drop table test;

    sqlite> drop view schema;

    sqlite> .read file.sql

    ```


    ## Formatting


    The shell offers a number of formatting options to help you and make your results
    and output neat and tidy. The simplest are `.echo`, which echoes the last run
    command after issuing a command, and `.headers`, which includes column names for
    queries when set to `on`. The text representation of `NULL` can be set with `.nullvalue`.
    For instance, if you want `NULL`s to appear as the text string `NULL`, simply
    issue the command `.nullvalue NULL`. By default, this presentation value is an
    empty string.


    The shell prompt can be changed using `.prompt [value]`:


    ```

    sqlite> .prompt ''sqlite3> ''

    sqlite3>

    ```


    Result data can be formatted several ways using the `.mode` command. The current
    options are `csv`, `column`, `html`, `insert`, `line`, `list`, `tabs`, and `tcl`,
    each of which is helpful in different ways. The default is `.list`. For instance,
    list mode displays results with the columns separated by the default separator.
    Thus, if you wanted to dump a table in a CSV format, you could do the following:


    ```

    sqlite3> .output file.csv

    sqlite3> .separator ,

    sqlite3> select * from test;

    sqlite3> .output stdout

    ```


    The contents of `file.csv` now appear as shown next.


    ```

    1,eenie

    2,meenie

    3,miny

    4,mo

    ```


    Actually, since there is a CSV mode already defined in the shell, it is just as
    easy to use it in this particular example instead:


    ```

    sqlite3> .output file.csv

    sqlite3> .mode csv

    sqlite3> select * from test;

    sqlite3> .output stdout

    ```


    The results obtained are the same. The difference is that CSV mode will wrap field
    values with double quotes, whereas list mode (the default) does not.


    ## Exporting Delimited Data


    Combining the previous three sections on exporting, importing, and formatting
    data, we now have an easy way to export and import data in delimited form. For
    example, to export only the rows of the `test` table whose `value` fields start
    with the letter `m` to a file called `test.csv` in comma-separated values, do
    the following:


    ```

    sqlite> .output text.csv

    sqlite> .separator ,

    sqlite> select * from test where value like ''m%'';

    sqlite> .output stdout

    ```


    If you want to then import this CSV data into a similar table with the same structure
    as the `test` table (call it `test2`), do the following:


    ```

    sqlite> create table test2(id integer primary key, value text);

    sqlite> .import text.csv test2

    ```


    The CLP, therefore, makes it easy to both import and export text-delimited data
    to and from the database.


    ## Performing Unattended Maintenance


    So far, you’ve seen the CLP used interactively to perform tasks such as creating
    a database and exporting data. However, you don’t always want to be tied to your
    seat, executing CLP commands one at a time. Instead, you can use the command mode
    to run CLP commands in batches. You can then use your operating system’s built-in
    scheduler to schedule those batches to run whenever you need them.


    > **Note** You are free to invoke the CLP from the command line interactively.
    Any time you have a sequence of commands that you want to invoke routinely, it’s
    useful to use the command-line approach.


    There are actually two ways to invoke the CLP in command-line mode. The first
    is to provide a SQL command, or a SQLite shell command as well, such as `.dump`
    and `.schema`. Any valid SQL or SQLite shell command will do. SQLite will execute
    the specified command, print the result to standard output, and exit. For example,
    to dump the `test.db` database from the command line, issue the following command:
    `sqlite3 test.db .dump`


    To make it useful, we should redirect the output to a file:


    ```

    sqlite3 test.db .dump > test.sql

    ```


    The file `test.sql` now contains the complete human-readable set of DDL and DML
    statements for the database `test.db`. Similarly, to select all records for the
    `test` table, issue this:


    ```

    sqlite3 test.db "select * from test"

    ```


    The second way to invoke the CLP in command-line mode is to redirect a file as
    an input stream. For instance, to create a new database `test2.db` from our database
    dump `test.sql`, do the following: `sqlite3 test2.db < test.sql`


    The CLP will read the file as standard input and then process and apply all SQL
    commands within it to the `test2.db` database file.


    Another way to create a database from the `test.sql` file is to use the `init`
    option and provide the `test.sql` as an argument:


    ```

    sqlite3 –init test.sql test3.db

    ```


    The CLP will process `test.sql`, create the `test3.db` database, and then go into
    shell mode. Why? The invocation included no SQL command or input stream. To get
    around this, you need to provide a SQL command or SQLite shell command. For example:


    ```

    sqlite3 –init test.sql test3.db .exit

    ```


    The `.exit` command prompts the CLP to run in command-line mode and does as little
    as possible. All things considered, redirection is perhaps the easiest method
    for processing files from the command line.


    ## Backing Up a Database


    Backing up a database can be done in two ways, depending on the type of backup
    you desire. A SQL dump is perhaps the most portable form for keeping backups.
    The standard way to generate one is using the CLP `.dump` command, as shown in
    the previous section. From the command line, this is done as follows:


    ```

    sqlite3 test.db .dump > test.sql

    ```


    Within the shell, you can redirect output to an external file, issue the command,
    and restore output to the screen as follows:


    ```

    sqlite> .output file.sql

    sqlite> .dump

    sqlite> .output stdout

    sqlite> .exit

    ```


    Likewise, importing a database is most easily done by providing the SQL dump as
    an input stream to the CLP.'
