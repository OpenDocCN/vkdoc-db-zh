    CHAPTER 3 ■ SQL FOR SQLITE


    ■ **Caution** Some databases, including SQLite, will allow you to construct a
    **select** statement where nonaggregated columns are not grouped in a **select**
    statement with mixed aggregate and nonaggregate columns.


    For instance, SQLite will allow you to execute this SQL:


    **select type_id, count(*) from foods**


    Because the aggregate (**count**) collapses the input table, there is a mismatch
    in the number of rows that pass all the filtering steps. Count in this case will
    return one row, but we haven’t instructed SQLite how to group **type_id**.


    Nevertheless, SQLite will return something. Sadly, the results of such a statement
    are meaningless— *do not rely* on any SQL statement that doesn’t group by nonaggregate
    fields. *The results are arbitrary!*


    **Removing Duplicates


    **distinct** takes the result of the **select** clause and filters out duplicate
    rows. For example, you’d use this to get all distinct **type_id** values from
    **foods**:


    **sqlite> select distinct type_id from foods;**


