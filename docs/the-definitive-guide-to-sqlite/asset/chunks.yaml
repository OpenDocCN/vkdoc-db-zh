    \n每个步骤——准备、执行、结束——对应于语句句柄的各自状态——已准备、活动或已结束。已准备意味着所有必要资源已分配，语句已准备好执行，但尚未开始。未获取锁，在第一次调用`sqlite3_step()`之前也不会获取锁。活动状态从第一次调用`sqlite3_step()`开始。此时，语句正在执行过程中，某种锁正在生效。已结束意味着语句已关闭，所有关联资源已释放。图\
    \ 5-2 展示了这些步骤和状态。\n\n*图 5-2。语句处理*\n\n以下伪代码说明了在 SQLite 中执行查询的一般过程：\n\n```plaintext\n\
