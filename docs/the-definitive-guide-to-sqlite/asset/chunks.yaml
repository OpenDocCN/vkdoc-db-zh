    ```

    1 x y

    2 x x

    sqlite> insert into pkey values (''x'',''x'');

    SQL error: columns x, y are not unique

    ```


    The primary key here is technically just a `unique` constraint across two columns,
    because SQLite will always still maintain an internal `rowid`. But many database
    design experts will encourage you to use real columns for your primary keys, and
    I encourage you to do that wherever it makes sense.


    ## Domain Integrity


    The simplest definition of domain integrity is the conformance of a column’s values
    to its assigned domain. That is, every value in a column should exist within that
    column’s defined domain. However, the term `domain` is a little vague. Domains
    are often compared to types in programming languages, such as strings or floats.
    And although that is not a bad analogy, domain integrity is actually much broader
    than that.


    ### 域约束


    Domain constraints make it possible for you to start with a simple type—such as
    an integer—and add additional constraints to create a more restricted set of acceptable
    values for a column. For example, you can create a column with an integer type
    and add the constraint that only three such values are allowed: {-1, 0, 1}. In
    this case, you have modified the range of acceptable values (from the domain of
    all integers to just three integers), but not the data type itself. You are dealing
    with two things: a type and a range.


    Consider another example: the `name` column in the `contacts` table. It is declared
    as follows: `name text not null collate nocase`


    The domain `text` defines the type and initial range of acceptable values. Everything
    following it serves to restrict and qualify that range even further. The `name`
    column is then the domain of all `text` values that do not include `NULL` values
    where uppercase letters and lowercase letters have equal value. It is still text
    and operates as `text`, but its range of acceptable values is further restricted
    from that of `text`.


    You might say that a column’s domain is not the same thing as its type. Rather,
    its domain is a combination of two things: a type and a range. The column’s type
    defines the representation and operators of its values—how they are stored and
    how you can operate on them—sort, search, add, subtract, and so forth. A column’s
    range is its set of acceptable values you can store in it, which is not necessarily
    the same as its declared type. The type’s range represents a maximum range of
    values. The column’s range—as you have seen—can be restricted through constraints.
    So for all practical purposes, you can think of a column’s domain as a type with
    constraints tacked on.


    Similarly, there are essentially two components to domain integrity: type checking
    and range checking. Although SQLite supports many of the standard domain constraints
    for range checking (`not null`, `check`, and so on), its approach to type checking
    is where things diverge from other databases. In fact, SQLite’s approach to types
    and type checking is one of its most controversial, misunderstood, and disputed
    features. We’ll cover the basics shortly and go into greater depths in Chapter
    11 when we discuss SQLite internals.


    ### 默认值


    The `default` keyword provides a default value for a column if one is not provided
    in an `insert` command. The `default` keyword is only a constraint in that it
    prevents the absence of a value, stepping in when needed. However, it does fall
    within domain integrity because it provides a policy for handling `null` values
    in a column. If a column doesn’t have a default value and you don’t provide a
    value for it in an `insert` statement, then SQLite will insert `null` for that
    column. For example, `contacts.name` has a default value of `''UNKNOWN''`. With
    this in mind, consider the following example:


    ```

    sqlite> insert into contacts (name) values (''Jerry'');

    ```


