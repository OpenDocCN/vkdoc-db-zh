    *Figure 3-8\. **group by** and aggregation*


    CHAPTER 3 ■ SQL FOR SQLITE


    The number of records with **type_id=1** (Baked Goods) is 47\. The number with
    **type_id=2** (Cereal) is 15\. The number with **type_id=3** (Chicken/Fowl) is
    23, and so forth. So, to get this information, you could run 15 queries as follows:


    **select count(*) from foods where type_id=1;**


    **select count(*) from foods where type_id=2;**


    **select count(*) from foods where type_id=3;**


    **.**


    **.**


    **.**


    **select count(*) from foods where type_id=15;**


    Or, you get the results using the single **select** with a **group by** as follows:


    **select type_id, count(*) from foods group by type_id;**


    But there is more. Since **group by** has to do all this work to create groups
    with like values, it seems a pity not to let you filter these groups before handing
    them off to the **select** clause. That is the purpose of **having**, a predicate
    that you apply to the result of **group by**. It filters the groups from **group
    by** in the same way that the **where** clause filters rows from the **from**
    clause. The only difference is that the **where** clause’s predicate is expressed
    in terms of individual row values, and **having**’s predicate is expressed in
    terms of aggregate values.


    Take the previous example, but this time say you are interested only in looking
    at the food groups that have fewer than 20 foods in them:


    **sqlite> select type_id, count(*) from foods**


    **group by type_id having count(*) < 20;**


    **type_id count(*)**


    **---------- ----------**


    **2 15**


    **5 17**


    **6 4**


    **11 16**


    **13 14**


    **14 19**


