    如同我们在前一章的例子中一样，我们包含了该函数的 UTF-8 和 UTF-16 版本，以强调 SQLite API 提供了支持两种编码的函数。从现在开始，为了简洁起见，我们将只引用\
    \ UTF-8 版本。\n\n`sqlite3_create_function()` 的参数定义如下：\n\n*   `cnx`：数据库连接句柄。函数和聚合是连接特定的。为了在连接打开时能够使用它们，必须在该连接上注册它们。\n\
    *   `zFunctionName`：在 SQL 中调用的函数名称。长度最多为 255 字节。\n*   `nArg`：你的函数期望的参数数量。SQLite\
    \ 将强制此数量为必须提供给函数的精确参数个数。如果你指定 `-1`，SQLite 将允许可变数量的参数。\n*   `eTextRep`：首选文本编码。允许的值是\
    \ `SQLITE_UTF8`、`SQLITE_UTF16`、`SQLITE_UTF16BE`、`SQLITE_UTF16LE` 和 `SQLITE_ANY`。此字段是给\
    \ SQLite 的一个提示，仅用于帮助其在相同函数的多个实现之间进行选择。`SQLITE_ANY` 表示“无偏好”。换句话说，该实现对任何文本编码都同样有效。如有疑问，请在此处使用\
    \ `SQLITE_ANY`。\n*   `pUserData`：应用程序特定的数据。此数据通过下面 `xFunc`、`xStep` 和 `xFinal`\
    \ 中指定的回调函数提供。与其他通过参数列表中的 `void` 指针接收数据的函数不同，这些函数必须使用特殊的 API 函数来获取此数据。\n*   `xFunc`：函数回调。这是\
    \ SQL 函数的实际实现。普通函数只提供此回调，并将 `xStep` 和 `xFinal` 函数指针留为 `NULL`。后两个回调仅用于聚合实现。\n*\
    \   `xStep`：聚合步骤函数。每次 SQLite 处理聚合结果集中的一行时，它都会调用 `xStep`，以允许聚合处理该行的相关字段值并将结果包含在其聚合计算中。\n\
    *   `xFinal`：聚合终结函数。当所有行都被处理完毕后，SQLite 调用此函数以允许聚合结束其处理，这通常包括计算最终值并可选地进行清理。\n\n\
    你可以注册同一函数的多个版本，它们仅在编码（`eTextRep` 参数）和/或参数数量（`nArg` 参数）上有所不同，SQLite 会自动为当前情况选择最佳版本的函数。\n\
    \n## 步骤函数\n\n函数（回调）和聚合步骤函数是相同的，声明如下：\n\n```c\nvoid fn(sqlite3_context* ctx, int\
    \ nargs, sqlite3_value** values)\n```\n\n`ctx` 参数是函数/聚合的上下文。它保存特定函数调用实例的状态，也是你获取在\
    \ `sqlite3_create_function()` 中提供的应用程序数据（`pUserData`）参数的途径。用户数据通过 `sqlite3_user_data()`\
    \ 从上下文中获取，其声明如下：\n\n```c\nvoid *sqlite3_user_data(sqlite3_context*);\n```\n\n\
    对于普通函数，此数据在所有对同类函数的调用中是共享的，因此它并非真正特定于某个函数调用实例。也就是说，相同的 `pUserData` 被传递或共享给给定函数的所有实例。然而，聚合可以使用\
    \ `sqlite3_aggregate_context()` 为每个特定实例分配自己的状态，其声明如下：\n\n```c\nvoid *sqlite3_aggregate_context(sqlite3_context*,\
    \ int nBytes);\n```\n\n第一次为特定聚合调用此例程时，会分配一块大小为 `nBytes` 的内存，将其清零，并与该上下文关联。在使用相同上下文（用于同一聚合实例）的后续调用中，返回此已分配的内存。利用这一点，聚合可以在调用之间存储状态以累积数据（仔细想想，这正是进行聚合的通用目的）。当聚合完成\
    \ `final()` 回调时，该内存会被 SQLite 自动释放。\n\n> **注意**\n> 在整个 API 中你会看到的一件事是在 `void` 指针中使用用户数据。由于\
    \ API 的许多部分涉及回调函数，这些仅仅是实现所述回调函数时维护状态的一种便捷方式。\n\n回调函数的 `nargs` 参数包含传递给该函数的参数数量。\n\
    \n## 返回值\n\n`values` 参数是一个 SQLite 值结构体数组，它们是实际参数值的句柄。这些值的实际数据是使用 `sqlite3_value_*xxx*()`\
    \ 系列函数获取的，这些函数具有以下形式：\n\n```c\nxxx sqlite3_value_xxx(sqlite3_value* value);\n\
    ```\n\n其中 ***xxx*** 是要从 `value` 参数返回的 C 数据类型。如果你读过第 6 章，你可能会认为这些函数与 `sqlite3_column_*xxx*()`\
    \ 系列函数有着惊人的相似之处——你是对的。它们的工作方式相同，甚至在获取标量值和数组值的方式差异上也一致。用于获取标量值的函数如下：\n\n```c\n\
    int sqlite3_value_int(sqlite3_value*);\nsqlite3_int64 sqlite3_value_int64(sqlite3_value*);\n\
    double sqlite3_value_double(sqlite3_value*);\n```\n\n用于获取数组值的函数如下：\n\n```c\nint\
    \ sqlite3_value_bytes(sqlite3_value*);\nconst void *sqlite3_value_blob(sqlite3_value*);\n\
    const unsigned char *sqlite3_value_text(sqlite3_value*);\n```"
  raw: 'The lifetime of user-defined aggregates, functions, and collations is transient.
    They are registered on a connection-by-connection basis; they are *not* stored
    in the database. It is up to you to ensure that your application loads your custom
    extensions and registers them on each connection. Sometimes you may find yourself
    thinking of your extensions in terms of stored procedures and completely forget
    about the fact that they don’t actually reside in the database. Extensions exist
    in libraries, not in databases, and are restricted to the life of your program.
    If you don’t grasp this concept, you may do something like try to create a trigger
    (which is stored in the database) that references your extensions (which aren’t
    stored in the database) and then turn around and try to call it from the SQLite
    shell or from an application that knows nothing of your extensions. In this case,
    you will find that either it triggers an error or nothing happens. Extensions
    require your program to register them on *each* and *every* connection; otherwise,
    that connection’s SQL syntax will know nothing about them.


    Registering Functions


    You can register functions and aggregates on a connection using **sqlite3_create_function()**,
    which is declared as follows:


    **int sqlite3_create_function(**


    **sqlite3 *cnx, /* connection handle */**


    **const char *zFunctionName, /* function/aggregate name in SQL */**


    **int nArg, /* number of arguments. -1 = unlimited. */**


    **int eTextRep, /* encoding (UTF8, 16, etc.) */**


    **void *pUserData, /* application data, passed to callback */**


    **void (*xFunc)(sqlite3_context*,int,sqlite3_value**),**


    **void (*xStep)(sqlite3_context*,int,sqlite3_value**),**


    **void (*xFinal)(sqlite3_context*)**


    **);**


    **196


    CHAPTER 7 ■ THE EXTENSION C API


    **int sqlite3_create_function16(**


    **sqlite3 *cnx,**


    **const void *zFunctionName,**


    **int nArg,**


    **int eTextRep,**


    **void *pUserData,**


    **void (*xFunc)(sqlite3_context*, int args, sqlite3_value**),**


    **void (*xStep)(sqlite3_context*, int args, sqlite3_value**),**


    **void (*xFinal)(sqlite3_context*)**


    **);**


    **As with our examples in the previous chapter, we’ve included both the UTF-8
    and UTF-16 versions


    of this function to underscore that the SQLite API has functions that support
    both encodings. From now on, we will only refer to the UTF-8 versions for the
    sake of brevity.


    The arguments for **sqlite3_create_function()** are defined as follows:


    • **cnx**: The database connection handle. Functions and aggregates are connection


    specific. They must be registered on the connection as it is opened in order to
    be


    used.


    • **zFunctionName**: The function name as it will be called in SQL. Up to 255
    bytes in


    length.


    • **nArg**: The number of arguments expected by your function. SQLite will enforce


    this as the exact number of arguments that must be provided to the function. If


    you specify -1, SQLite will allow a variable number of arguments.


    • eTextRep: The preferred text encoding. Allowable values are **SQLITE_UTF8**,


    **SQLITE_UTF16**, **SQLITE_UTF16BE**, **SQLITE_UTF16LE**, and **SQLITE_ANY**.
    This field is a hint to SQLite used only to help it choose between multiple implementations
    of the


    same function. **SQLITE_ANY** means “no preference.” In other words, the


    implementation works equally as well with any text encoding. When in doubt, use


    **SQLITE_ANY** here.


    • **pUserData**: Application-specific data. This data is made available through
    the


    callback functions specified in **xFunc**, **xStep**, and **xFinal** below. Unlike
    other functions, which receive the data as a void pointer in the argument list,
    these


    functions must use a special API function to obtain this data.


    • **xFunc**: The function callback. This is the actual implementation of the SQL


    function. Functions only provide this callback and leave the **xStep** and **xFinal**


    function pointers **NULL**. These latter two callbacks are exclusively for aggregate


    implementations.


    • **xStep**: The aggregate step function. Each time SQLite processes a row in
    an


    aggregated result set, it calls **xStep** to allow the aggregate to process the
    relevant


    field value(s) of that row and include the result in its aggregate computation.


    • **xFinal**: The aggregate finalize function. When all rows have been processed,


    SQLite calls this function to allow the aggregate to conclude its processing,
    which


    usually consists of computing the final value and optionally cleaning up.


    CHAPTER 7 ■ THE EXTENSION C API


    You can register multiple versions of the same function differing only in the
    encoding (**eTextRep** argument) and/or the number of arguments (**nArg** argument),
    and SQLite will automatically select the best version of the function for the
    case in hand.


    The Step Function


    The function (callback) and aggregate step functions are identical and are declared
    as follows:


    **void fn(sqlite3_context* ctx, int nargs, sqlite3_value** values)**


    **The **ctx** argument is the function/aggregate context. It holds state for a
    particular function call instance and is the means through which you obtain the
    application data (**pUserData**) argument provided in **sqlite3_create_function()**.
    The user data is obtained from the context using


    **sqlite3_user_data()**, which is declared as follows:


    **void *sqlite3_user_data(sqlite3_context*);**


    **For functions, this data is shared among all calls to like functions, so it
    is not really unique to a particular instance of function call. That is, the same
    **pUserData** is passed or shared among all instances of a given function. Aggregates,
    however, can allocate their own state for each particular instance using **sqlite3_aggregate_context()**,
    declared as follows:


    **void *sqlite3_aggregate_context(sqlite3_context*, int nBytes);**


    **The first time this routine is called for a particular aggregate, a chunk of
    memory of size **nBytes** is allocated, zeroed, and associated with that context.
    On subsequent calls with the same context (for the same aggregate instance), this
    allocated memory is returned. Using this, aggregates have a way to store state
    in between calls in order to accumulate data (which, when you think about it,
    is the general purpose for aggregating something). When the aggregate completes
    the **final()** callback, the memory is automatically freed by SQLite.


    ■ **Note** One of the things you will see throughout the API is the use of user
    data in void pointers. Since many parts of the API involve callback functions,
    these simply serve as a convenient way to maintain state when implementing said
    callback functions.


    The **nargs** argument of the callback function contains the number of arguments
    passed to the function.


    Return Values


    The **values** argument is an array of SQLite value structures that are handles
    to the actual argument values. The actual data for these values is obtained using
    the family of **sqlite3_value_ *xxx*()** functions, which have the following form:


    CHAPTER 7 ■ THE EXTENSION C API


    **xxx sqlite3_value_xxx(sqlite3_value* value);**


    **where ***xxx*** is the C data type to be returned from the **value** argument.
    If you read Chapter 6, you may be thinking that these functions have a striking
    resemblance to the **sqlite3_column_ *xxx*()** family of functions—and you’d be
    right. They work in the same way, even down to the difference between the way
    scalar and array values are obtained. The functions for obtaining scalar values
    are as follows:**


    ******int sqlite3_value_int(sqlite3_value*);**


    **sqlite3_int64 sqlite3_value_int64(sqlite3_value*);**


    **double sqlite3_value_double(sqlite3_value*);**


    **The functions used to obtain array values are as follows:**


    ****int sqlite3_value_bytes(sqlite3_value*);**


    **const void *sqlite3_value_blob(sqlite3_value*);**


    **const unsigned char *sqlite3_value_text(sqlite3_value*);**'
  trans: "\n# SQLite 扩展的生命周期与注册\n\n用户自定义聚合、函数和排序规则的生命周期是临时的。它们按连接进行注册；*并非*存储在数据库中。你需要确保你的应用程序在*每个*连接上加载并注册你的自定义扩展。有时你可能会像思考存储过程一样思考你的扩展，而完全忘记它们实际上并不驻留在数据库中。扩展存在于库文件中，而非数据库中，并且其生命周期受限于你的程序运行期间。如果你没有掌握这个概念，你可能会尝试创建一个触发器（它存储在数据库中）来引用你的扩展（它们不存储在数据库中），然后试图从\
    \ SQLite shell 或一个对你的扩展一无所知的应用程序中调用它。在这种情况下，你会发现要么触发错误，要么什么也不会发生。扩展要求你的程序在*每一个*连接上注册它们；否则，该连接的\
    \ SQL 语法将对它们一无所知。\n\n## 注册函数\n\n你可以使用 `sqlite3_create_function()` 在连接上注册函数和聚合。其声明如下：\n\
