- fmt: "# SQLiteOpenHelper 类与 Android 开发中的 SQLite\n\n## SQLiteOpenHelper 类\n\n`SQLiteOpenHelper`\
    \ 类位于 `android.database.sqlite` 命名空间中。这是一个帮助类，旨在被您扩展，以实现您认为在数据库首次创建、打开或使用时重要的任何任务和操作。\n\
    \n`SQLiteOpenHelper` 有一个构造函数，定义如下：\n\n```\nSQLiteOpenHelper(Context context, String\
    \ name,\n                 SQLiteDatabase.CursorFactory factory, int version)\n\
    ```\n\n其中：\n*   `context` 是应用程序上下文，允许访问给定应用程序的所有共享资源和资产。\n*   `name` 参数包含 Android\
    \ 存储中的数据库文件名。\n*   `factory` 值引入了一个新类 `SQLiteDatabase.CursorFactory`。这是一个工厂类，用于生成\
    \ `cursor` 对象，这些对象充当您在 Android 上针对 SQLite 发出的所有查询的结果集。\n*   `version` 参数是您应用程序特定的数据库版本号（更具体地说，是其模式版本）。不要将其与实际的\
    \ SQLite 版本混淆。如果您的数据库不在指定版本，`SQLiteOpenHelper` 将触发其 `onUpgrade()` 方法。\n\n`SQLiteOpenHelper`\
    \ 的所有方法如下：\n\n```\nsynchronized void close()\nsynchronized SQLiteDatabase getReadableDatabase()\n\
    synchronized SQLiteDatabase getWritableDatabase()\nabstract void onCreate(SQLiteDatabase\
    \ db)\nvoid onOpen(SQLiteDatabase db)\nabstract void onUpgrade(SQLiteDatabase\
    \ db, int oldVersion, int newVersion)\n```\n\n`close()` 方法如其名所示。此方法关闭 `SQLiteOpenHelper`\
    \ 对象内的 SQLite 数据库。\n\n接下来的两个方法，`getReadableDatabase()` 和 `getWritableDatabase()`，执行类似的操作，但有一点区别，您可能从它们的名字就能猜到。`getReadableDatabase()`\
    \ 方法将打开为 `SQLiteOpenHelper` 对象指定的数据库，但以只读方式打开。实际上，任何试图更改数据的数据操作语句都将不被允许。\n\n`getWritableDatabase()`\
    \ 用于打开 SQLite 数据库以进行正常的读/写操作。如果由于某种原因您的数据库无法打开以进行写操作，`getWritableDatabase()` 将以只读数据库的方式打开它（就像调用了\
    \ `getReadableDatabase()` 一样），并抛出一个 `SQLiteException` 类型的异常。您可以通过在数据库对象本身上调用 `isReadOnly()`\
    \ 方法来测试数据库的只读或读/写状态。这是一个布尔值，对于只读数据库返回 true。您稍后可以在一个只读数据库上调用 `getWritableDatabase()`\
    \ 以将其重新打开为读/写数据库。在尚不存在的数据库上调用任何一个方法都会隐式调用帮助对象的 `onCreate()` 方法。否则，您的应用程序首次调用任何一个方法将调用\
    \ `onOpen()`，并可选择地调用 `onUpgrade()`。然后，您的数据库将被缓存供应用程序使用，直到调用 `close()` 方法。\n\n\
    > **注意**：打开大型数据库可能需要一些时间，特别是如果您的 `onOpen()` 或 `onCreate()` 实现中包含复杂逻辑。我们强烈建议，对于真实世界的应用程序，不要从应用程序的启动主线程调用此操作。\n\
    \n最后三个方法——`onCreate()`、`onOpen()` 和 `onUpgrade()`——设计用于您通过子类化来实现所需的行为。`onCreate()`\
    \ 在数据库最初创建时触发，通常用于创建表和使用插入语句加载数据，以使新数据库得以存在。\n\n`onOpen()` 在数据库完成打开时触发。您通常会在此时检查数据库的读/写状态（例如通过\
    \ `isReadOnly()`），以确保在操作数据库之前其处于已知状态。\n\n`onUpgrade()` 方法在从应用程序的角度需要升级数据库时调用（请记住，我们这里讨论的不是\
    \ SQLite 版本；而是您自己的应用程序版本）。您通常从 1 开始为数据库版本编号，并在发布新版本应用程序时将其递增为 2、3，依此类推。您在此方法中编写所需的\
    \ `alter table`、`create table`、`drop table` 和其他语句，以处理数据库模式在应用程序演进过程中的优雅升级。\n\n\
    ## 使用 SQLiteDatabase 类\n\n现在您已经熟悉了在 Android 中启动使用 SQLite 数据库的帮助类，是时候了解核心的 `SQLiteDatabase`\
    \ 类了。`SQLiteDatabase` 对象在概念上很容易理解，与 SQLite C API 中的底层数据库对象非常相似。然而，大量帮助方法和其他工具的实现意味着其内部可能比您预期的要多。\n\
    \n`SQLiteDatabase` 类提供了 50 多个方法，每个方法都有其自身的细微差别和用例。其中许多是基本的帮助方法，用于轻松完成简单任务，如单表的\
    \ select、insert、update 和 delete 语句。与其列出所有方法，我们将介绍最重要的方法子集，并让您在闲暇时探索一些重载方法。您可以随时参考\
    \ `SQLiteDatabase` 类的完整在线 Android 文档：`http://developer.android.com/reference/android/database/sqlite/SQLiteDatabase.html`。\n\
    \n### 打开和关闭 SQLiteDatabase\n\n`SQLiteDatabase` 提供了三种打开数据库的方法和一种关闭数据库的方法。这些方法如下：\n\
    \n```\nvoid close()\nstatic SQLiteDatabase openDatabase(String path,\n       \
    \                            SQLiteDatabase.CursorFactory factory, int flags)\n\
    static SQLiteDatabase openOrCreateDatabase(File file,\n                      \
    \                     SQLiteDatabase.CursorFactory factory)\nstatic SQLiteDatabase\
    \ openOrCreateDatabase(String path,\n                                        \
    \   SQLiteDatabase.CursorFactory factory)\n```\n\n`close()` 方法如其名所示。数据库被关闭，无法再对\
    \ `SQLiteDatabase` 对象（即数据库）执行进一步的查询。\n\n`openDatabase()` 方法是最通用的。它接受一个指向 Android\
    \ 应用程序资产中文件的 `path` 值，以及一个关联的 `factory` 参数，该参数将充当数据库的 `CursorFactory`。最后一个参数是可堆叠的\
    \ `flags` 参数，用于指定打开数据库的选项。四个标志值与打开数据库相关：\n*   `OPEN_READWRITE`：以读写方式打开数据库。\n*\
    \   `OPEN_READONLY`：以只读（仅 select）方式打开数据库。\n*   `CREATE_IF_NECESSARY`：如果数据库文件尚不存在，则首先创建它。\n\
    *   `NO_LOCALIZED_COLLATORS`：打开数据库时不支持 `LOCALIZED` SQLite 排序规则。这些是匹配 Android 设备区域设置的自定义排序规则。\n\
    \n第一个 `openOrCreateDatabase()` 方法接受一个 `File` 对象作为要打开的目标数据库。它没有 `flags` 参数，默认为\
    \ `CREATE_IF_NECESSARY` 的行为。\n\n第二个重载的 `openOrCreateDatabase()` 方法是 `openDatabase()`\
    \ 的简写版本。它的行为几乎完全相同，接受一个 `string` 作为查找数据库文件的路径。它同样没有标志参数，也默认为 `CREATE_IF_NECESSARY`\
    \ 行为。\n\n### 使用 SQLiteDatabase 执行通用查询"
  raw: '**SQLiteOpenHelper** class, in the **android.database.sqlite** namespace.
    This is a helper class that is designed to be extended by you, to implement whatever
    tasks and actions you deem important when a database is first created, opened,
    or used. **SQLiteOpenHelper** has a single constructor defined as follows: **SQLiteOpenHelper(Context
    context, String name,**


    **SQLiteDatabase.CursorFactory factory, int version)**


    **The **context** is the application context allowing access to all the shared
    resources and assets for the given application. The **name** parameter contains
    the database file name within Android storage. The **factory** value introduces
    a new class, the **SQLiteDatabase.CursorFactory**. This is a factory class that
    generates **cursor** objects that act as the result set for all the queries you
    issue against SQLite under Android. The **version** parameter is your application-specific
    version number for the database (or more particularly, its schema). Don’t confuse
    this with the actual SQLite version. **SQliteOpenHelper** will trigger its **onUpgrade()**
    method if your database isn’t at the nominated version. All of **SQLiteOpenHelper**’s
    methods are as follows:


    **synchronized void close()**


    **synchronized SQLiteDatabase getReadableDatabase()**


    **synchronized SQLiteDatabase getWritableDatabase()**


    **abstract void onCreate(SQLiteDatabase db)**


    **void onOpen(SQLiteDatabase db)**


    **abstract void onUpgrade(SQLiteDatabase db, int oldVersion, int newVersion)**


    **The **close()** method holds no surprises. This method closes the SQLite database
    within the


    **SQLiteOpenHelper** object.


    The next two methods, **getReadableDatabase()** and **getWriteableDatabase()**,
    perform similar actions, with one difference that you can probably guess from
    their names. The **getReadableDatabase()** method will open the database specified
    for the **SQLiteOpenHelper** object but will open it such that it is read-only.
    In effect, any data manipulation statement that attempts to change data will not
    be allowed.


    **getWriteableDatabase()** is used to open a SQLite database for normal read/write
    operations. If for some reason your database cannot be opened for write operations,
    **getWriteableDatabase()** will open the database as a read-only database (just
    as if **getReadableDatabase()** had been called) and will throw an exception of
    type **SQLiteException**. You can test a database’s read or read/write state by
    calling the


    ****isReadOnly()** method on the database object itself. This is a Boolean value
    that returns true for a read-only database. You can later call **getWriteableDatabase()**
    on a database that is read-only to reopen it as a read/write database. Calling
    either method on a database that doesn’t yet exist will implicitly invoke the
    helper object’s **onCreate()** method. Otherwise, the first call to either method
    from your application will invoke **onOpen()** and optionally **onUpgrade()**.
    Your database will then be cached for the application to use, until the **close()**
    method is called.


    CHAPTER 10 ■ ANDROID DEVELOPMENT WITH SQLITE


    ■ **Caution** Opening a large database can take some time, especially if you have
    complex logic built into your **onOpen()** or **onCreate()** implementations.
    We strongly recommend that for real-world applications you don’t call this from
    the application’s main thread at startup time.


    The final three methods—**onCreate()**, **onOpen()**, and **onUpgrade()**—are
    designed for you to subclass to implement your desired behavior. **onCreate()**
    is triggered when the database is initially created and typically used to create
    tables and load data with insert statements to bring a fresh database into existence.


    **onOpen()** is triggered when the database completes opening. You would typically
    check things such as the read/write status of the database at this point with
    **isReadOnly()** to ensure your database is in a known state before working with
    it.


    The **onUpgrade()** method is called when the database needs to be upgraded from
    an application perspective (remember, we’re not talking about SQLite versions
    here; we’re talking about your own application version). You typically start numbering
    your database version at 1 and increment this to 2, then 3, and so on, as you
    release new versions of your application. You code your desired **alter table**,
    **create table**, **drop table**, and other statements within this method to handle
    graceful upgrades of the database schema for your application as it evolves.


    Working with the SQLiteDatabase Class


    Now that you are familiar with the helper class that kick-starts the use of SQLite
    databases within Android, it’s time to look at the core **SQLiteDatabase** class.
    A **SQLiteDatabase** object is conceptually easy to understand, being very similar
    to the underlying database object in the SQLite C API. However, the implementation
    of a wide range of helper methods and other tools means there’s a little more
    under the wrapper than you might expect.


    More than 50 methods are available for the **SQLiteDatabase** class, each with
    its own nuances and use cases. Many of these are basic helper methods to easily
    complete simple tasks such as one-table select, insert, update, and delete statements.
    Rather than an exhaustive list, we’ll cover the most important subsets of methods
    and allow you to explore some of the overloaded methods at your leisure. At any
    time you can refer to the full online Android documentation for the SQLiteDatabase
    class at


    [**http://developer.android.com/reference/android/database/sqlite/SQLiteDatabase.html**](http://developer.android.com/reference/android/database/sqlite/SQLiteDatabase.html)


    Opening and Closing the SQLiteDatabase


    **SQLiteDatabase** offers three methods to open a database and one to close a
    database. These methods are as follows:


    **void close()**


    **static SQLiteDatabase openDatabase(String path,**


    **SQLiteDatabase.CursorFactory factory, int flags)**


    **static SQLiteDatabase openOrCreateDatabase(File file,**


    **SQLiteDatabase.CursorFactory factory)**


    **static SQLiteDatabase openOrCreateDatabase(String path,**


    **SQLiteDatabase.CursorFactory factory)**


    CHAPTER 10 ■ ANDROID DEVELOPMENT WITH SQLITE


    The **close()** method is as simple as it looks. The database is closed, and no
    further queries can be performed against the **SQLiteDatabase** object (that is,
    the database).


    The **openDatabase()** method is the most versatile. It takes a **path** value
    to the file in your Android application’s assets, together with an associated
    **factory** parameter that will act as a **CursorFactory** for your database.
    The final parameter is a “stackable” **flags** parameter that dictates options
    to opening the database. Four flag values pertain to opening the database.


    • **OPEN_READWRITE**: Opens the database for reading and writing.


    • **OPEN_READONLY**: Opens the database for reading (select) only.


    • **CREATE_IF_NECESSARY**: Creates the database file first if it does not already
    exist.


    • **NO_LOCALIZED_COLLATORS:** Opens the database without support for the **LOCALIZED**


    SQLite collations. These are custom collations that match the regional settings
    of


    the Android device.


    The first **openOrCreateDatabase()** method accepts a **File** object as the target
    database to open. It does not have a **flags** parameter, defaulting to the behavior
    of the **CREATE_IF_NECESSARY** value.


    The second **openOrCreate Database()** overloaded method is a shorthand version
    of **openDatabase()**.


    It acts in almost exactly the same fashion, accepting a **string** as the path
    to find the database file. It also has no flags parameter and likewise defaults
    to the **CREATE_IF_NECESSARY** behavior.


