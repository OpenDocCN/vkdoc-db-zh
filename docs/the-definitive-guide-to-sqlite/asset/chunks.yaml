    # 第三章


    ## SQLite 的 SQL 指南


    本章介绍如何在 SQLite 中使用 SQL。SQL 是任何关于数据库的讨论中一个庞大的组成部分，SQLite 也不例外。无论你是 SQL 的新手还是高手，本章都提供了全面的介绍。即使你之前从未使用过
    SQL，理解本章内容也不应该有困难。如果你也一直避开支撑 SQLite 和其他关系型数据库管理系统的关联模型，也无需担心。我们将在讨论 SQL 时，辅以足够的关联概念来阐明问题，而不会陷入理论泥潭。


    SQL 是与关系型数据库通信的唯一（且几乎是通用的）方式。它是致力于信息处理的主力军。它专为构建、读取、写入、排序、过滤、保护、计算、生成、分组、聚合以及通常意义上的管理信息而设计。


    SQL 是一种直观、用户友好的语言。使用起来可能很有趣，并且功能相当强大。SQL 的一个有趣之处在于，无论你是专家还是新手，似乎总能不断学到新的方法（无论好坏）。


    本章的目标是教你**良好地**使用 SQL——让你接触好的技巧，或许还能学到一些实用的捷径。正如你从目录中已经看出的，SQLite 的 SQL 是一个如此庞大的主题，我们已将其讨论分为两部分。我们首先讲解核心的
    `select` 语句，然后在第四章转向其他 SQL 语句。但当你学完时，你应该已装备精良，足以应对任何数据库。


    **注意：** 即使有两章篇幅，我们也确实只能聚焦于 SQL 在 SQLite 中的使用。若想对 SQL 进行更广泛、更深入的总体了解，我们推荐像 Claire
    Churcher 所著的 *Beginning SQL Queries* 这样的书籍。


    ## 示例数据库


    在深入语法之前，让我们先来看看这个必不可少的示例数据库。本章（以及本书其余部分）使用的数据库包含了《宋飞传》每一集里出现的所有食物。如果你看过《宋飞传》，你一定会注意到剧中对食物有一种轻微的执念。


    在其播出的 180 集历史中（根据互联网上广泛传播的粉丝数据），提到了超过 400 种不同的食物。平均每集超过两种新食物。扣除广告时间，几乎每 10 分钟就有一种新食物登场。


    事实证明，这种对食物的执念效果很好，因为它构成了一个能阐释 SQL 以及在 SQLite 中使用 SQL 所有必备概念的数据库。图 3-1 展示了我们示例数据库的表结构。


    `foods`

    `food_types`

    `episodes`

    `foods_episodes`


    +id: integer

    +type_id: integer

    +id: integer

    +food_id: integer

    +name: text

    +name: text

    +season: int

    +episode_id: integer

    +name: text


    *图 3-1. 《宋飞传》食物数据库*


    在 SQLite 中定义的数据库模式如下：


    ```sql

    create table episodes (

    id integer primary key,

    season int,

    name text );


    create table foods(

    id integer primary key,

    type_id integer,

    name text );


    create table food_types(

    id integer primary key,

    name text );


    create table foods_episodes(

    food_id integer,

    episode_id integer );

    ```

