    ## 过滤


    如果说`select`命令是 SQL 中最复杂的命令，那么`where`子句就是`select`中最复杂的子句。但它也承担了大部分工作。牢固理解其机制，很可能会在你日常使用
    SQLite 中的 SQL 时带来最佳的整体回报。


    SQLite 将`where`子句应用于由`from`子句生成的关系（R1）的每一行。如前所述，`where`——即一种限制——是一个过滤器。`where`的参数是一个逻辑谓词。谓词，简单来说，就是对某事的断言。考虑以下陈述：


    这条狗（主语）是紫色的，并且咧嘴露齿地笑（谓词）。


    狗是主语，谓词由两个断言（颜色是紫色，笑容是露齿的）组成。这个陈述可能为真，也可能为假，取决于这条狗。


    `where`子句中的主语是一行。这一行是逻辑主语。`WHERE`子句是逻辑谓词。命题评估为真的每一行都被包含（或选中）作为结果（R2）的一部分。命题为假的每一行则被排除。因此，将狗的命题转换为关系等价形式，看起来会是这样：


    ```sql

    select * from dogs where color=''purple'' and grin=''toothy'';

    ```


    数据库将获取`dogs`表中的每一行（主语），并应用`where`子句（谓词）来形成逻辑命题：


    这一行具有 `color=''purple''` *并且* `grin=''toothy''`。


    如果为真，那么这一行（或这条狗）确实是紫色且露齿而笑的，它将被包含在结果中。`where`是一个强大的过滤器。它为你提供了对包含（或排除）行到（或从）结果中的条件的高度控制权。


    ## 值


    值代表现实世界中的某种数据。值可以按其类型分类，例如数值（`1`、`2`、`3`等）或字符串值（`"JujyFruit"`）。值可以表示为*字面值*（如`1`、`2`、`3`或`"JujyFruit"`这样的显式量）、*变量*（通常以列名如`foods.name`的形式）、表达式（`3+2/5`）或函数的结果（`count(foods.name)`）——这些将在后面介绍。


    ## 运算符


    运算符接受一个或多个值作为输入，并产生一个值作为输出。运算符之所以如此命名，是因为它执行某种操作，产生某种结果。*二元运算符*是接受两个输入值（或操作数）的运算符。*三元运算符*接受三个操作数，*一元运算符*只接受一个，以此类推。


    运算符可以串联在一起，将一个运算符的输出馈送到另一个运算符的输入（图 3-6），从而形成值表达式。


    一元 二元 三元


    *图 3-6. 一元、二元和三元运算符，也展示了操作的流水线化*

