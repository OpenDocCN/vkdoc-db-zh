    C 运行时库 DLL。为此，请参阅“使用 Microsoft Visual C++ 构建 SQLite DLL”一文中的第 4 步后半部分。其中包含两个信息丰富的图示，可轻松设置此选项。


    ## 使用 MinGW 构建 SQLite


    MinGW ([`www.mingw.org`](http://www.mingw.org)) 是 Cygwin 项目的一个分支，它为 Windows 提供了
    GNU 编译器套件 (GCC) 的一个优秀发行版。它还包含可免费使用的、特定于 Windows 的头文件和库，可用于创建不依赖任何第三方 C 运行时 DLL
    的原生 Windows 程序。简而言之，它是一个适用于 Windows 的免费 C/C++ 编译器，而且是一个非常优秀的编译器。它通常与 MSYS 一起使用，后者提供了一个类似
    bash 的 shell 和 POSIX 环境，让 Unix 用户在 Windows 上也能感到熟悉。两者结合，为在 Windows 上编译和构建软件提供了一个强大的环境。虽然这两者很流行，但手动将它们整合在一起可能很困难。值得庆幸的是，存在一些非常优秀的捆绑包，可以免去所有部署的麻烦，让你可以专注于从源代码编译自己的
    SQLite 的乐趣。我们推荐 TakeOffGW 软件包，它可以从 SourceForge 免费获取。


    要使用 TakeOffGW 发行版的 MinGW 和 MSYS 从源代码构建 SQLite DLL，请执行以下操作：


    1. 打开你喜欢的浏览器，并导航到 SourceForge 网站：`sourceforge.net`。


    2. 搜索 TakeOffGW 项目，或直接导航到项目页面 `sourceforge.net/projects/takeoffgw/`。


    3. 下载 TakeOffGW 网络安装程序的最新版本，通常就叫做 `setup.exe`。


    ![](img/index-51_1.png)


    第 2 章 ■ 入门


    4. 下载 TakeOffGW 网络安装程序后，运行 `setup.exe` 文件，并对于安装位置、软件包目录和互联网链接（记住你可能使用的任何代理服务器）选择默认设置。当你到达如图
    2-7 所示的软件包选择页面时，务必选择 MSYS 标题下所有可用的软件包。通过切换 MSYS 标题本身直至出现“install”字样来完成此操作。


    *图 2-7. TakeOffGW 安装组件，已选择安装 MSYS*


    5. 点击“下一步”继续，TakeOffGW 将下载并安装所有必需的组件。


