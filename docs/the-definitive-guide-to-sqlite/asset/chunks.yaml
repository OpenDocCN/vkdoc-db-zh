    # CHAPTER 11 ■ SQLITE INTERNALS AND NEW FEATURES


    Our last chapter is a collection of topics devoted to the internals of SQLite.
    The material here is collected from topics raised by Richard Hipp, SQLite’s founder,
    over the past year or so. Importantly, we’ll highlight one of the biggest changes
    to happen to SQLite in recent versions: the introduction of the Write-Ahead Log
    model. We’ll also briefly explore how the pager and B-trees work and go into a
    little more detail on the underpinnings of data types, affinity, and the SQLite
    approach to typing.


    This isn’t an exhaustive description of the inner workings of SQLite, because
    that’s covered very well on the SQLite web site, and the healthy rate of change
    for SQLite releases means that a book isn’t always the best place to track things
    such as known commands in the VDBE, optimization models, and so on.


    We hope you enjoy these topics, and we encourage you to read more to further your
    understanding of the beauty and elegance of SQLite’s design.


    ## The B-Tree and Pager Modules


    The B-tree provides SQLite’s VDBE with `O(logN)` lookup, insert, and delete as
    well as `O(1)` bidirectional traversal of records. It is self-balancing and automatically
    manages both defragmentation and space reclamation. The B-tree itself has no notion
    of reading or writing to disk. It concerns itself only with the relationship between
    pages. The B-tree notifies the pager when it needs a page and also notifies it
    when it is about to modify a page. When modifying a page, the pager ensures that
    the original page is first copied out to the journal file if the traditional rollback
    journal is in use. Similarly, the B-tree notifies the pager when it is done writing,
    and the pager determines what needs to be done based on the transaction state.


    ## Database File Format


    All pages in a database are numbered sequentially, beginning with 1. A database
    is composed of multiple B-trees—one B-tree for each table and index (B+trees are
    used for tables; B-trees are used for indexes).


    Each table or index in a database has a root page that defines the location of
    its first page. The root pages for all indexes and tables are stored in the `sqlite_master`
    table.


    The first page in the database—Page 1—is special. The first 100 bytes of Page
    1 contain a special header (the file header) that describes the database file.
    It includes such information as the library version, schema version, page size,
    encoding, whether autovacuum is enabled—all of the permanent database settings
    you configure when creating a database along with any other parameters that have
    been set by various pragmas. The exact contents of the header are documented in
    `btree.c` and at [http://www.sqlite.org/fileformat2.html](http://www.sqlite.org/fileformat2.html).
    Page 1 is also the root page of the `sqlite_master` table.


    ## Page Reuse and Vacuum


    SQLite recycles pages using a free list. That is, when all the records are deleted
    out of a page, the page is placed on a list reserved for reuse. When new information
    is later added, nearby pages are first selected before any new pages are created
    (expanding the database file). Running a `VACUUM` command purges the free list
    and thereby shrinks the database. In actuality, it rebuilds the database in a
    new file so that all in-use pages are copied over, while free-list pages are not.
    The end result is a new, compacted database.


    When autovacuum is enabled in a database, SQLite doesn’t use a free list and automatically
    shrinks the database upon each commit.


    ## B-Tree Records


    Pages in a B-tree consist of B-tree records, also called `payloads`. They are
    not database records in the sense you might think—formatted with the columns in
    a table. They are more primitive than that. A Btree record, or payload, has only
    two fields: a key field and a data field. The key field is the `rowid` value or
    primary key value that is present for every table in the database. The data field,
    from the B-tree perspective, is an amorphous blob that can contain anything. Ultimately,
    the database records are stored inside the data fields. The B-tree’s job is order
    and navigation, and it primarily needs only the key field to do its work (however,
    there is one exception in B+trees, which is addressed next). Furthermore, payloads
    are variable size, as are their internal key and data fields. On average, each
    page usually holds multiple payloads; however, it is possible for a payload to
    span multiple pages if it is too large to fit on one page (for example, records
    containing `blob`s).


    ## B+Trees


    B-tree records are stored in key order. All keys must be unique within a single
    B-tree (this is automatically guaranteed because the keys correspond to the `rowid`
    primary key, and SQLite takes care of that field for you). Tables use B+trees,
    which do not contain table data (database records) in the internal pages. Figure
    11-1 shows an example B+tree representation of a table.


    ### Figure 11-1\. B+tree organization (tables)


    The root page and internal pages in B+trees are all about navigation. The data
    fields in these pages are all pointers to the pages below them—they contain keys
    only. All database records are stored on the leaf pages. On the leaf level, records
    and pages are arranged in key order so it is possible for B-tree cursors to traverse
    records (horizontally), both forward and backward, using only the leaf pages.
    This is what makes traversal possible in `O(1)` time.


    ## Records and Fields


    The database records in the data fields of the leaf pages are managed by the VDBE.
    The database record is stored in binary form using a specialized record format
    that describes all the fields in the record. The record format consists of a continuous
    stream of bytes organized into a logical header and a data segment. The header
    segment includes the header size (represented as a variable-sized 64-bit integer
    value) and an array of types (also variable 64-bit integers), which describe each
    field stored in the data segment, as shown in Figure 11-2. Variable 64-bit integers
    are implemented using a Huffman code.


    ### Figure 11-2\. Record structure


    The number of type entries corresponds to the number of fields in the record.
    Furthermore, each index in the type array corresponds to the same index in the
    field array. A type entry specifies the data type and size of its corresponding
    field value. Table 11-1 lists the possible types and their meanings.


    ### Table 11-1\. Field Type Values


    **Type Value** | **Meaning** | **Length of Data**

    --- | --- | ---

    0 | **NULL** | N in 1..4

    1 | Signed integer | N

    2 | Signed integer | N

    3 | Signed integer | N

    4 | Signed integer | N

    5 | Signed integer | 6

    6 | IEEE float | 7

    8 | Integer constant 0 | N/A

    9 | Integer constant 1 | N/A

    10-11 | Reserved for future use | N/A

    N>12 and even | **blob** | (N-12)/2

    N>13 and odd | **text** | (N-13)/2


