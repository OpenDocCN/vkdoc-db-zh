  trans: "\n# 第 6 章 ■ C 核心 API\n\n`operation_code` 参数分别对应 `insert`、`update` 和 `delete`\
    \ 操作的 `SQLITE_INSERT`、`SQLITE_UPDATE` 和 `SQLITE_DELETE`。第三个和第四个参数对应于操作发生的数据库名和表名。最后一个参数是受影响行的\
    \ `rowid`。对于系统表（例如 `sqlite_master` 和 `sqlite_sequence`）的操作不会调用此回调。返回值是指向先前注册的回调函数的\
    \ `data` 参数的指针（如果存在的话）。\n\n## 授权函数\n\n也许最强大的事件过滤器是 `sqlite3_set_authorizer()`。它允许你在查询被编译时监控和控制它们。此函数声明如下：\n\
    \n```\nint sqlite3_set_authorizer(\n    sqlite3*,\n    int (*xAuth)( void*,int,\n\
    \    const char*, const char*,\n    const char*,const char*),\n    void *pUserData\n\
    );\n```\n\n此例程注册一个用作授权函数的回调函数。SQLite 将在语句编译时（而非执行时）为各种数据库事件调用该回调函数。此函数的目的是允许应用程序安全地执行用户提供的\
    \ SQL。它提供了一种方法来限制此类 SQL 执行某些操作（例如，任何更改数据库的操作）或拒绝访问数据库中的特定表或列。\n\n为清晰起见，授权回调函数的形式如下：\n\
    \n```\nint auth( void*, /* 用户数据 */\n    int, /* 事件代码 */\n    const char*, /* 事件相关\
    \ */\n    const char*, /* 事件相关 */\n    const char*, /* 数据库名 */\n    const char*\
    \ /* 触发器或视图名 */ );\n```\n\n第一个参数是指向应用程序特定数据的指针，该数据在 `sqlite3_set_authorizer()`\
    \ 的第四个参数中传入。授权函数的第二个参数将是表 6-3 中列出的已定义常量之一。这些值表示需要授权何种操作。授权函数的第三和第四个参数是事件代码特定的。这些参数与前面表\
    \ 6-2 中所示的各自事件代码一起列出。\n\n第五个参数是适用情况下的数据库名称（main、temp 等）。第六个参数是最内层负责访问尝试的触发器或视图的名称，如果此访问尝试直接来自顶级\
    \ SQL，则为 `NULL`。\n\n授权函数的返回值应是常量 `SQLITE_OK`、`SQLITE_DENY` 或 `SQLITE_IGNORE` 之一。前两个值的含义对所有事件都是一致的——允许或拒绝\
    \ SQL 语句。`SQLITE_DENY` 将中止整个 SQL 语句并生成错误。\n\n`SQLITE_IGNORE` 的含义则针对所讨论的具体事件。读取或修改记录的语句会为语句尝试操作的每一列生成\
    \ `SQLITE_READ` 或 `SQLITE_UPDATE` 事件。在这种情况下，如果回调返回 `SQLITE_IGNORE`，则相关列将被排除在操作之外。具体来说，尝试从此列读取数据将只产生\
    \ `NULL` 值，而尝试更新它将静默失败。\n\n### 表 6-3\\. SQLite 授权事件\n\n| `事件代码` | `参数 3` | `参数\
    \ 4` |\n|--------------|--------------|--------------|\n| `SQLITE_CREATE_INDEX`\
    \ | 索引名 | 表名 |\n| `SQLITE_CREATE_TABLE` | 表名 | `NULL` |\n| `SQLITE_CREATE_TEMP_INDEX`\
    \ | 索引名 | 表名 |\n| `SQLITE_CREATE_TEMP_TABLE` | 表名 | `NULL` |\n| `SQLITE_CREATE_TEMP_TRIGGER`\
    \ | 触发器名 | 表名 |\n| `SQLITE_CREATE_TEMP_VIEW` | 视图名 | `NULL` |\n| `SQLITE_CREATE_TRIGGER`\
    \ | 触发器名 | 表名 |\n| `SQLITE_CREATE_VIEW` | 视图名 | `NULL` |\n| `SQLITE_DELETE` |\
    \ 表名 | `NULL` |\n| `SQLITE_DROP_INDEX` | 索引名 | 表名 |\n| `SQLITE_DROP_TABLE` | 表名\
    \ | `NULL` |\n| `SQLITE_DROP_TEMP_INDEX` | 索引名 | 表名 |\n| `SQLITE_DROP_TEMP_TABLE`\
    \ | 表名 | `NULL` |\n| `SQLITE_DROP_TEMP_TRIGGER` | 触发器名 | 表名 |\n| `SQLITE_DROP_TEMP_VIEW`\
    \ | 视图名 | `NULL` |\n| `SQLITE_DROP_TRIGGER` | 触发器名 | 表名 |\n"
- fmt: "# CHAPTER 6 ■ THE CORE C API\n\n## Event Code\n\n**Argument 3** | **Argument\
    \ 4**\n---|---\n`SQLITE_DROP_VIEW` | View name\n`NULL` | \n`SQLITE_INSERT` | Table\
    \ name\n`NULL` | \n`SQLITE_PRAGMA` | Pragma name\nFirst argument or `NULL` | \n\
    `SQLITE_READ` | Table name\nColumn name | \n`SQLITE_SELECT` | `NULL`\n`NULL` |\
    \ \n`SQLITE_TRANSACTION` | `NULL`\n`NULL` | \n`SQLITE_UPDATE` | Table name\nColumn\
    \ name | \n`SQLITE_ATTACH` | File name\n`NULL` | \n`SQLITE_DETACH` | Database\
    \ name\n`NULL` | \n\nTo illustrate this, the following example (the complete source\
    \ of which is in `authorizer.c`) will create a table `foo`, defined as follows:\n\
    \n```\ncreate table foo(x int, y int, z int)\n```\n\nIt registers an authorizer\
    \ function, which will do the following:\n\n- Block reads of column `z`.\n- Block\
    \ updates to column `x`.\n- Monitor `ATTACH` and `DETACH` database events.\n-\
    \ Log database events as they happen.\n\nThis is a rather long example, which\
    \ uses the authorizer function to filter many different database events, so for\
    \ clarity I am going to break the code into pieces. The authorizer function has\
    \ the general form shown in Listing 6-7.\n\n### Listing 6-7. Example Authorizer\
    \ Function\n\n```\nint auth( void* x, int type,\n          const char* a, const\
    \ char* b,\n          const char* c, const char* d )\n{\n    const char* operation\
    \ = a;\n    printf( \" %s \", event_description(type));\n\n    /* Filter for different\
    \ database events\n       from SQLITE_TRANSACTION to SQLITE_INSERT,\n       UPDATE,\
    \ DELETE, ATTACH, etc. and either allow or deny\n       them.\n    */\n\n    return\
    \ SQLITE_OK;\n}\n```\n\nThe first thing the authorizer looks for is a change in\
    \ transaction state. If it finds a change, it prints a message:\n\n```\nif((a\
    \ != NULL) && (type == SQLITE_TRANSACTION)) {\n    printf(\": %s Transaction\"\
    , operation);\n}\n```\n\nNext, the authorizer filters events that result in a\
    \ schema change:\n\n```\nswitch(type) {\n    case SQLITE_CREATE_INDEX:\n    case\
    \ SQLITE_CREATE_TABLE:\n    case SQLITE_CREATE_TRIGGER:\n    case SQLITE_CREATE_VIEW:\n\
    \    case SQLITE_DROP_INDEX:\n    case SQLITE_DROP_TABLE:\n    case SQLITE_DROP_TRIGGER:\n\
    \    case SQLITE_DROP_VIEW:\n    {\n        // Schema has been modified somehow.\n\
    \        printf(\": Schema modified\");\n    }\n```\n\nThe next filter looks for\
    \ read attempts (which are fired on a column-by-column basis). Here, all read\
    \ attempts are allowed unless the column name is `z`, in which case the function\
    \ returns `SQLITE_IGNORE`. This will cause SQLite to return `NULL` for any field\
    \ in column `z`, effectively blocking access to its data.\n\n```\nif(type == SQLITE_READ)\
    \ {\n    printf(\": Read of %s.%s \", a, b);\n\n    /* Block attempts to read\
    \ column z */\n    if(strcmp(b,\"z\")==0) {\n        printf(\"-> DENIED\\n\");\n\
    \        return SQLITE_IGNORE;\n    }\n}\n```\n\nNext come `insert` and `update`\
    \ filters. All `insert` statements are allowed. However, `update` statements that\
    \ attempt to modify column `x` are denied. This will not block the `update` statement\
    \ from executing; rather, it will simply filter out any attempt to update column\
    \ `x`.\n\n```\nif(type == SQLITE_INSERT) {\n    printf(\": Insert records into\
    \ %s \", a);\n}\n\nif(type == SQLITE_UPDATE) {\n    printf(\": Update of %s.%s\
    \ \", a, b);\n\n    /* Block updates of column x */\n    if(strcmp(b,\"x\")==0)\
    \ {\n        printf(\"-> DENIED\\n\");\n        return SQLITE_IGNORE;\n    }\n\
    }\n```\n\nFinally, the authorizer filters `delete`, `attach`, and `detach` statements\
    \ and simply issues notifications when it encounters them:\n\n```\nif(type ==\
    \ SQLITE_DELETE) {\n    printf(\": Delete from %s \", a);\n}\n\nif(type == SQLITE_ATTACH)\
    \ {\n    printf(\": %s\", a);\n}\n\nif(type == SQLITE_DETACH) {\n    printf(\"\
    -> %s\", a);\n}\n\nprintf(\"\\n\");\nreturn SQLITE_OK;\n}\n```\n\nThe (abbreviated)\
    \ program is implemented as follows. As with the authorizer function, I will break\
    \ it into pieces. The first part of the program connects to the database and registers\
    \ the authorization function:\n\n```\nint main(int argc, char **argv)\n{\n   \
    \ sqlite3 *db, *db2;\n    char *zErr, *sql;\n    int rc;\n\n    /** Setup */\n\
    \    /* Connect to test.db */\n    rc = sqlite3_open_v2(\"test.db\", &db);\n```"
