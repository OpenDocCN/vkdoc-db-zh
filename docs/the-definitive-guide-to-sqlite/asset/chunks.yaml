  trans: '# 第六章 ■ 核心 C API


    ## 获取表查询


    `sqlite3_get_table()` 函数通过一次函数调用，返回一个命令的完整结果集。


    正如 `sqlite3_exec()` 封装了预处理查询 API 函数，允许你一次性运行它们一样，`sqlite3_get_table()` 为返回数据的命令封装了
    `sqlite3_exec()`，提供了同样便捷的方式。使用 `sqlite3_get_table()`，你无需麻烦地处理 `sqlite3_exec()`
    的回调函数，从而更轻松地获取记录。


    `sqlite3_get_table()` 的声明如下：

    ```c

    int sqlite3_get_table(

    sqlite3*, /* 一个打开的数据库 */

    const char *sql, /* 要执行的 SQL 语句 */

    char ***resultp, /* 结果写入此指针指向的 char *[] */

    int *nrow, /* 结果行数写入此处 */

    int *ncolumn, /* 结果列数写入此处 */

    char **errmsg /* 错误信息写入此处 */

    );

    ```

    此函数将来自 `sql` 中 SQL 语句返回的所有记录，使用堆上声明的内存（通过 `sqlite3_malloc()`）存储到 `resultp` 参数中。必须使用
    `sqlite3_free_table()` 来释放该内存，它以 `resultp` 指针作为唯一参数。`resultp` 中的第一个记录实际上并非数据记录，而是包含结果集中的列名。请查看清单
    6-3 中的代码片段（取自 `get_table.c`）。


    **清单 6-3. 使用 `sqlite3_get_table`**

    ```c

    int main(int argc, char **argv)

    {

    /* 连接到数据库，等等 */

    char *result[];

    sql = "select * from episodes;";

    rc = sqlite3_get_table(db, sql, &result, &nrows, &ncols, &zErr);

    /* 对数据进行一些处理 */

    /* 释放内存 */

    sqlite3_free_table(result)

    }

    ```

    例如，如果返回的结果集形式如下：

    ```

    name | id

    -----------------------

    The Junior Mint | 43

    The Smelly Car | 28

    The Fusilli Jerry | 21

    ```

    那么结果数组的格式将构造如下：

    ```

    result [0] = "name";

    result [1] = "id";

    result [2] = "The Junior Mint";

    result [3] = "43";

    result [4] = "The Smelly Car";

    result [5] = "28";

    result [6] = "The Fusilli Jerry";

    result [7] = "21";

    ```

    前两个元素包含结果集的列标题。因此，你可以将结果集的索引理解为：行是 1 基索引，而列是 0 基索引。一个例子可能有助于澄清这一点。清单 6-4 展示了打印结果集中每一行的每一列的代码。


    **清单 6-4. 遍历 `sqlite3_get_table()` 的结果**

    ```c

    rc = sqlite3_get_table(db, sql, &result, &nrows, &ncols, &zErr);

    for(i=0; i < nrows; i++) {

    for(j=0; j < ncols; j++) {

    /* i+1 项跳过了第一条记录，该记录是列标题 */

    fprintf(stdout, "%s", result[(i+1)*ncols + j]);

    }

    }

    ```


    ## 预处理查询


    我们在第五章对 SQLite API 的概述中介绍了准备（prepare）、步进（step）和结束（finalize）函数的概念。本节将涵盖此过程的所有方面，包括步进结果集、获取记录以及使用参数化查询。我们告诉过你预处理语句比便捷的包装函数要优越得多，现在就是证明这一点的时候。


    包装函数将所有这些步骤封装到一个函数调用中，使得在某些情况下运行特定命令更加方便。每个查询函数都有其自己的获取行和列的方式。通常来说，封装程度越高的方法，你对执行和结果的控制力就越弱。因此，预处理查询提供了最多的功能、最强的控制力和最丰富的信息，`sqlite3_exec()`
    提供的功能稍少，而 `sqlite3_get_table()` 提供的则更少。'
- fmt: "# Prepared Queries vs. sqlite3_exec()\n\nPrepared queries use a special group\
    \ of functions to access field and column information from a row. You get column\
    \ values using `sqlite3_column_*xxx*()`, where `*xxx*` represents the data type\
    \ of the value to be returned (for example, `int`, `double`, `blob`). You can\
    \ retrieve data in whatever format you like. You can also obtain the declared\
    \ types of columns (as they are defined in the `create table` statement) and other\
    \ miscellaneous metadata such as storage format and both associated table and\
    \ database names.\n\n`sqlite3_exec()`, by comparison, provides only a fraction\
    \ of this information through its callback function. The same is true with `sqlite3_get_table()`,\
    \ which only includes the result set’s column headers with the data.\n\nIn practice,\
    \ you will find that each query method has its uses. `sqlite3_exec()` is especially\
    \ good for running commands that modify the database (`create`, `drop`, `insert`,\
    \ `update`, and `delete`). One function call, and it’s done. Prepared queries\
    \ are typically better for `select` statements because they offer so much more\
    \ information, more linear coding (no callback functions), and more control by\
    \ using cursors to iterate over results.\n\nAs you’ll recall from Chapter 5, prepared\
    \ queries are performed in three basic steps: compilation, execution, and finalization.\
    \ You compile the query with `sqlite3_prepare_v2()`, execute it step-by-step using\
    \ `sqlite3_step()`, and close it using `sqlite3_finalize()`, or you can reuse\
    \ it using `sqlite3_reset()`.\n\nThis process and the individual steps are all\
    \ explained in detail in the following sections.\n\n## Compilation\n\nCompilation,\
    \ or preparation, takes a SQL statement and compiles it into byte code readable\
    \ by the virtual database engine (VDBE). It is performed by `sqlite3_prepare_v2()`,\
    \ which is declared as follows:\n\n```c\nint sqlite3_prepare_v2(\n  sqlite3 *db,\
    \              /* Database handle */\n  const char *zSql,         /* SQL text,\
    \ UTF-8 encoded */\n  int nBytes,               /* Length of zSql in bytes. */\n\
    \  sqlite3_stmt **ppStmt,    /* OUT: Statement handle */\n  const char **pzTail\
    \       /* OUT: Pointer to unused portion of zSql */\n);\n```\n\n`sqlite3_prepare_v2()`\
    \ compiles the first SQL statement in the `zSQL` string (which can contain multiple\
    \ SQL statements). It allocates all the resources necessary to execute the statement\
    \ and associates it along with the byte code into a single statement handle (also\
    \ referred to as simply a *statement*), designated by the out parameter `ppStmt`,\
    \ which is a `sqlite3_stmt` structure. From the programmer’s perspective, this\
    \ structure is little more than an opaque handle used to execute a SQL statement\
    \ and obtain its associated records. However, this data structure contains the\
    \ command’s byte code, bound parameters, B-tree cursors, execution context, and\
    \ any other data `sqlite3_step()` needs to manage the state of the query during\
