- fmt: '# CHAPTER 1 ■ INTRODUCING SQLITE


    ## SQLite is a convenient learning tool for administrators looking to learn more
    about relational databases. It is an ideal beginner’s database with which to learn
    about relational concepts and practice their implementation. It can be installed
    quickly and easily on any platform you’re likely to encounter, and its database
    files share freely between them without the need for conversion. It is full featured
    but not daunting. And SQLite—both the program and the database—can be carried
    around on a USB stick or memory chip.


    ## SQLite History


    SQLite was conceived on a battleship...well, sort of. SQLite’s author, D. Richard
    Hipp, was working for General Dynamics on a program for the U.S. Navy developing
    software for use on board guided missile destroyers. The program originally ran
    on Hewlett-Packard Unix (`HP-UX`) and used an `Informix` database as the back
    end. For their particular application, `Informix` was somewhat overkill. For an
    experienced database administrator (`DBA`) at the time, it could take almost an
    entire day to install or upgrade. To the uninitiated application programmer, it
    might take forever. What was really needed was a self-contained database that
    was easy to use and that could travel with the program and run anywhere regardless
    of what other software was or wasn’t installed on the system.


    In January 2000, Hipp and a colleague discussed the idea of creating a simple
    embedded `SQL` database that would use the GNU `DBM` hash library (`gdbm`) as
    a back end, one that would require no installation or administrative support whatsoever.
    Later, when some free time opened up, Hipp started work on the project, and in
    August 2000, `SQLite 1.0` was released.


    As planned, `SQLite 1.0` used `gdbm` as its storage manager. However, Hipp soon
    replaced it with his own `B-tree` implementation that supported transactions and
    stored records in key order. With the first major upgrade in hand, `SQLite` began
    a steady evolution, growing in both features and users. By mid-2001, many projects—both
    open source and commercial alike—started to use it. In the years that followed,
    other members of the open source community started to write `SQLite` extensions
    for their favorite scripting languages and libraries. One by one, new extensions
    for popular languages and APIs such as Open Database Connectivity (`ODBC`), `Perl`,
    `Python`, `Ruby`, `Java`, and others fell into place and testified to `SQLite`’s
    wide application and utility.


    `SQLite` began a major upgrade from version `2` to `3` in 2004. Its primary goal
    was enhanced internationalization supporting `UTF-8` and `UTF-16` text as well
    as user-defined text-collating sequences.


    Although version `3.0` was originally slated for release in summer 2005, America
    Online provided the necessary funding to see that it was completed by July 2004.
    Besides internationalization, version `3` brought many other new features such
    as a revamped `C API`, a more compact format for database files (a 25 percent
    size reduction), manifest typing, binary large object (`BLOB`) support, 64-bit
    `ROWIDs`, autovacuum, and improved concurrency. Even with many new features, the
    overall library footprint was still less than `240KB`, at a time when most home
    PCs began measuring their memory in gigabytes!


    Another improvement in version `3` was a good code cleanup—revisiting, refactoring
    and rewriting, or otherwise throwing out the detritus accumulated in the `2.x`
    series.


    `SQLite` continues to grow feature-wise while still remaining true to its initial
    design goals: simplicity, flexibility, compactness, speed, and overall ease of
    use. At the time of this book’s latest edition, `SQLite` has leapt ahead to include
    such advanced features as recursive triggers, distribution histograms to help
    the optimizer produce even faster queries, and asynchronous I/O on operating systems
    capable of supporting such workloads. What’s next after that? Well, it all depends.
    Perhaps you or your company will sponsor the next big feature that makes this
    super-efficient database even better.


    ## Who Uses SQLite


    Today, `SQLite` is used in a wide variety of software and products. It is used
    in Apple’s `Mac OS X` operating system, `Safari` web browser, `Mail.app` email
    program, and RSS manager, as well as Apple’s `Aperture` photography software.
    Perhaps Apple’s biggest use for `SQLite` has come in the `iPhone` age. You’ll
    find many apps on the `iPhone`, such as the Contacts database, Notes, and more,
    all rely on `SQLite`. This reliance on `SQLite` also extends to the `iPad`. We’ll
    return to this topic in Chapter 9, where we’ll discuss working with `SQLite` on
    Apple’s mobile platforms in detail.


    `SQLite` can be found in Sun’s `Solaris` operating environment, specifically the
    database backing the Service Management Facility that debuted with `Solaris 10`,
    a core component of its predictive self-healing technology. `SQLite` is in the
    Mozilla Project’s `mozStorage` `C++/JavaScript` `API` layer, which will be the
    backbone of personal information storage for `Firefox`, `Thunderbird`, and `Sunbird`.
    `SQLite` has been added as part of the `PHP 5` standard library. It also ships
    as part of Trolltech’s cross-platform `Qt C++` application framework, which is
    the foundation of the popular `KDE` window manager, and many other software applications.
    `SQLite` is especially popular in embedded platforms. Much of Richard Hipp’s `SQLite`-related
    business has been porting `SQLite` to various proprietary embedded platforms.
    `Symbian` uses `SQLite` to provide `SQL` support in the native `Symbian OS` platform.
    `Google` has made extensive use of `SQLite` in the `Android` mobile phone operating
    system and user-space applications. `SQLite` is so pervasive within `Android`
    that Chapter 10 is dedicated to showing you all about its use on `Android` devices.
    `SQLite` is also included in commercial development products for cell phone applications.


    Although it is rarely advertised, `SQLite` is also used in a variety of consumer
    products, as some tech-savvy consumers have discovered in the course of poking
    around under the hood. Examples include the D-Link Media Lounge, the Slim Devices
    Squeezebox music player, and the Philips GoGear personal music player. Some clever
    consumers have even found a `SQLite` database embedded in the *Complete New Yorker*
    DVD set—a digital library of every issue of the *New Yorker* magazine—apparently
    used by its accompanying search software.


    You can find `SQLite` as an alternative back-end storage facility for a wide array
    of open source projects such as `Yum` (the package manager for Fedora Core), `Movable
    Type`, `DSPAM`, and Edgewall Software’s excellent `Trac` `SCM` and project management
    system; possibly most famously, it’s used as the built-in database for `Firefox`,
    the web browser from Mozilla. Even parts of `SQLite`’s core utilities can be found
    in other open source projects. One such example is its `Lemon` parser generator,
    which the `lighttpd` web server project uses for generating the parser code for
    reading its configuration file. Indeed, there seems to be such a variety of uses
    for `SQLite` that `Google` took notice and awarded Richard Hipp with “Best Integrator”
    at O’Reilly’s 2005 Open Source Convention—long before `Google` entered the mobile
    space with `Android`. See also [www.sqlite.org/famous.html](http://www.sqlite.org/famous.html)
    for other ideas of important `SQLite` users.


    ## Architecture


    `SQLite` has an elegant, modular architecture that takes some unique approaches
    to relational database management. It consists of eight separate modules grouped
    within three major subsystems (as shown in Figure 1-2). These modules divide query
    processing into discrete tasks that work like an assembly line.


    The top of the stack compiles the query, the middle executes it, and the bottom
    handles storage and interfacing with the operating system.


    ### Interface


    ### B-Tree


