    behind your favorite browser, which Fossil will have automatically opened at the
    home of your local SQLite repository, as shown in Figure 2-3.


    *Figure 2-3\. Your local SQLite Fossil source control system, complete with up-to-date
    source*


    ![](index-47_1.jpg)


    CHAPTER 2 ■ GETTING STARTED


    You are now up and running with Fossil. From here, you’ll obviously want to start
    with checking out the code so that you can start work. That’s just as easy as
    most other Fossil actions. First, from your shell, create a directory for the
    source, and then change into that directory.


    **mkdir c:\sqlite\src**


    **cd c:\sqlite\src**


    **Now you can tell Fossil to check out the current incarnation of the source,
    using the **open** command: **c:\sqlite\fossil.exe open c:\sqlite\sqlite.fossil**


    **You’ll see all the source files for the SQLite project fly by on the screen.
    When completed, around 15MB of files are downloaded, and you have the source ready
    with which to work.


    Building the SQLite DLL with Microsoft Visual C++


    To build the SQLite DLL from source using Visual C++, follow these steps:


    1\. Start Visual Studio. Create a new DLL project within the unpacked SQLite source
    directory.


    Do this by selecting File  New  Project. Under Project Types (Figure 2-4), select
    Visual C++


    Projects, and then select Win32\. Choose the Win32 Project template. In the Location
    text box,


    enter the folder name that contains your SQLite source folder. In this example,
    it would be


    **C:\sqlite**. In the Name text box, enter the name of the folder containing the
    SQLite source code—**src** in this example. This will create the Visual C++ project
    inside the existing SQLite source folder (**C:\sqlite\src**). Click OK.


    *Figure 2-4\. Creating a new Visual C++ project*


    ![](index-48_1.jpg)


    CHAPTER 2 ■ GETTING STARTED


    2\. Next, the Win 32 Application Wizard will automatically open (Figure 2-5).


    Choose Application Settings, and set the application type to DLL. Be sure to


    select the Empty Project box. Click Finish, and this will create a blank DLL


    project.


    *Figure 2-5\. The Win32 Application Wizard*


    3\. Add SQLite source files and headers to the project. Select Project  Add


    Existing Item. Add all **.c** and **.h** files in the directory except for two
    files:


    **tclsqlite.c** and **shell.c**. (The first is for Tcl support; the second is
    for creating the SQLite CLP, neither of which we want in this case.)


    4\. Specify an export or a module definition (**.def**) file. This file defines
    what


    symbols (or functions) to export (make visible) to programs that link to the


    library. SQLite’s source distribution is kind enough to include such a file


    (**sqlite3.def**) for this very purpose. Also within the Property Pages dialog
    box,


    select All Configurations in the Configuration drop-down box (Figure 2-6).


    Then click the Linker folder, and click the Input submenu. In the Module


    Definition File property page, type **sqlite3.def**. You are now ready to build


    the DLL.


    ![](index-49_1.jpg)


    CHAPTER 2 ■ GETTING STARTED


    *Figure 2-6\. Project properties*


    5\. From the main menu, select Build  Build sqlite to build the DLL.


    6\. Once you have built the DLL, be sure to create the import library, as described


    in the section “Getting the SQLite DLL.”


    Building a Dynamically Linked SQLite Client with Visual C++


    The binary for a static CLP is available on the SQLite website, but what if you
    want a version that uses the SQLite DLL? To build such a version in Visual C++,
    do the following:


    ■ **Note** Many of the steps are very similar to the process of building a DLL,
    mentioned earlier—you may want to use some of the figures listed there for reference.


    1\. From the main menu, select File  New  Project. Under Project Types, select
    Visual C++


    Projects, and then select Win32\. Choose the Win32 Project template. Name the
    project


    (**shell**, for example), and click OK.


