    makefile 从源代码构建 SQLite Analyzer。在构建目录中，执行以下命令：


    ```

    make sqlite3_analyzer

    ```


    但是，必须在构建设置中配置 Tcl 支持，因为 SQLite Analyzer 使用 Tcl 扩展来完成大部分工作。更多信息请参阅“从源代码编译 SQLite”。


    ## 其他 SQLite 工具


    还有许多其他开源和可用的商业程序可以用来处理 SQLite。优秀的图形化、跨平台工具包括：


    - **SQLite 数据库浏览器**（[`sqlitebrowser.sourceforge.net`](http://sqlitebrowser.sourceforge.net)）：允许用户管理数据库、表和索引，以及导入和导出它们。用户可以交互式地运行
    SQL 查询并检查结果，还可以检查所有发出的 SQL 命令的日志。它最近升级到了 2.0 版本。

    - **SQLiteman**（[`www.sqliteman.com`](http://www.sqliteman.com)）：一个针对管理和维护 SQLite
    数据库人员的跨平台程序。它允许对数据库、表、索引和触发器进行通用管理，以及其他常见的管理任务。

    - **SQLiteManager**（[www.sqlabs.net/sqlitemanager.php](http://www.sqlabs.net/sqlitemanager.php)）：一个商业软件包，旨在用于处理和管理
    SQLite。用户可以管理数据库对象、执行查询和保存 SQL，以及使用灵活的报告模板创建报告。它包括自己的高级脚本语言来补充其 SQL 功能。


    这些只是跨平台工具。还有更多工具可用于几乎任何编程、最终用户或管理环境。你可以在 SQLite wiki（[www.sqlite.org/cvstrac/wiki?p=ManagementTools](http://www.sqlite.org/cvstrac/wiki?p=ManagementTools)）上找到关于此类软件包的更多信息。


    ## 总结


    无论你在什么平台上工作，SQLite 都易于安装和构建。Windows、Mac OS X 和 Linux 用户可以直接从 SQLite 网站获取二进制文件。许多其他操作系统的用户也可以使用他们的原生（甚至第三方）包系统获取二进制文件。


    在所有平台上使用 SQLite 的常见方式是使用 SQLite 命令行工具。


    ## 备份与恢复


    使用命令 `sqlite3 test.db < test.sql` 可以导入 SQL 文件。


    这假设 `test.db` 不存在。如果它已经存在，那么如果 `test.sql` 的内容与 `test.db` 的内容不同，事情可能仍然会起作用。当然，如果
    `test.sql` 包含已经存在于 `test.db` 中的对象，或者包含违反主键或外键约束的数据（尽管关于如何巧妙处理这种行为，请参阅后续章节中关于 `PRAGMA`
    的讨论），你将会收到错误。


    对数据库进行二进制备份几乎就是复制文件。在此之前你可能想执行的一个小操作是数据库真空（vacuum），这将释放从已删除对象创建的任何未使用空间。这将为你提供一个更小的二进制副本文件：


    ```

    sqlite3 test.db vacuum

    cp test.db test.backup

    ```


    作为一般规则，二进制备份的可移植性不如 SQL 备份。总的来说，SQLite 具有良好的向后兼容性，并且对于给定的数据库格式，所有平台都是二进制兼容的。然而，对于长期备份，使用
    SQL 形式总是一个好主意。如果大小是个问题，SQL 格式（原始文本）通常能提供良好的压缩比。


    ■ **警告** 无论你认为你选择的备份方法有多好，请记住，你只和你最后一次成功的*恢复*一样可靠。如果你需要依赖它，请测试你的恢复过程——否则，无论你进行了多少次成功的备份，人们只会记住你那次失败的恢复。


    最后，如果你使用过其他数据库，在 SQLite 中“删除”一个数据库，就像二进制备份一样，是一个简单的文件操作：你只需删除想要删除的数据库文件即可。'
- fmt: '# CHAPTER 3


    ## SQL for SQLite


    This chapter is an introduction to using SQL with SQLite. SQL makes up a huge
    component of any discussion about databases, and SQLite is no different. Whether
    you’re a novice or pro with SQL, this chapter offers comprehensive coverage. Even
    if you’ve never used SQL before, you should have no trouble with the material
    covered in this chapter. If you’ve also avoided the relational model that underpins
    SQLite and other RDBMSs, don’t fret. We’ll augment our discussion of SQL with
    just enough of the relational concepts to make things clear, without getting bogged
    down in the theory.


    SQL is the sole (and almost universal) means by which to communicate with a relational
    database. It is the workhorse devoted to information processing. It is designed
    for structuring, reading, writing, sorting, filtering, protecting, calculating,
    generating, grouping, aggregating, and in general managing information.


    SQL is an intuitive, user-friendly language. It can be fun to use and is quite
    powerful. One of the fun things about SQL is that regardless of whether you are
    an expert or a novice, it seems that you can always continue to learn new ways
    of doing things (for better or worse).


    The goal of this chapter is to teach you to use SQL *well*—to expose you to good
    techniques and perhaps a few cheap tricks along the way. As you can already tell
    from the table of contents, SQL for SQLite is such a large topic that we’ve split
    its discussion into two halves. We cover the core `select` statement first and
    then move on to other SQL statements in Chapter 4\. But by the time you are done,
    you should be well equipped to put a dent in any database.


    **Note:** Even with two chapters, we really only have space to focus on SQL’s
    use in SQLite. For a much wider and in-depth coverage of SQL in general, we recommend
    a book like *Beginning SQL Queries* by Claire Churcher.


    ## The Example Database


    Before diving into syntax, let’s get situated with the obligatory example database.
    The database used in this chapter (and the rest of this book, for that matter)
    consists of all the foods in every episode of *Seinfeld*. If you’ve ever watched
    *Seinfeld,* you can’t help but notice a slight preoccupation with food.


    There are more than 400 different foods mentioned in the 180 episodes of its history
    (according to fan data spread far and wide on the Internet). That’s more than
    two new foods every show. Subtract commercial time, and that’s virtually a new
    food introduced every 10 minutes.


    As it turns out, this preoccupation with food works out nicely because it makes
    for a database that illustrates all the requisite concepts of SQL and of using
    SQL in SQLite. Figure 3-1 shows the database tables for our sample database.


    `foods`

    `food_types`

    `episodes`

    `foods_episodes`


    +id: integer

    +type_id: integer

    +id: integer

    +food_id: integer

    +name: text

    +name: text

    +season: int

    +episode_id: integer

    +name: text


    *Figure 3-1. The Seinfeld food database*


    The database schema, as defined in SQLite, is defined as follows:


    ```sql

    create table episodes (

    id integer primary key,

    season int,

    name text );


    create table foods(

    id integer primary key,

    type_id integer,

    name text );


    create table food_types(

    id integer primary key,

    name text );


    create table foods_episodes(

    food_id integer,

    episode_id integer );

    ```'
