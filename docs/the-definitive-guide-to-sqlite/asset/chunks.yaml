    # 第 11 章 ■ SQLITE 内部原理与新特性


    ## 示例查询与记录格式


    ```sql

    sqlite> SELECT * FROM episodes ORDER BY id LIMIT 1;

    ```

    ```

    id season name

    --- ------ --------------------

    0 1 Good News Bad News

    ```


    **图 11-3** 展示了此记录的内部格式。

    ```

    04 01 01 49

    00 01

    Good News Bad News

    ```

    *图 11-3. `episodes` 表中的第一条记录*


