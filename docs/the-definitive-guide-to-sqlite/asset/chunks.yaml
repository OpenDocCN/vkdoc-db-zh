    数据库管理通常关注控制数据库如何运行。你想要执行的许多数据库管理任务都是通过 SQL 命令完成的。SQLite 包含一些其独有的管理功能，例如将多个数据库“附加”到单个会话的方法，以及数据库
    *编译指示（pragmas）*，它们可用于设置各种配置参数。


    ## 附加数据库


    SQLite 允许你使用 `attach` 命令将多个数据库“附加”到当前会话。


    当你附加一个数据库时，它的所有内容都可以在当前数据库文件的全局作用域中访问。`attach` 的语法如下：


    `attach [database] filename as database_name;`


    这里，`filename` 指的是 SQLite 数据库文件的路径和名称，`database_name` 是指用于引用该数据库及其对象的逻辑名称。主数据库自动被分配名称
    `main`。如果你创建了任何临时对象，那么 SQLite 将创建一个名为 `temp` 的附加数据库。（你可以使用稍后描述的 `database_list`
