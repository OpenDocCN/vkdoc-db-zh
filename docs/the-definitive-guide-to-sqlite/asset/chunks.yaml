- fmt: "# Language Extensions\n\n## Installation\n\nIf you are installing from a repository,\
    \ ensure you check your installed version of Ruby and match the right version\
    \ from the repository. Because old versions of SQLite also enjoy support, ensure\
    \ you install the `libsqlite3-ruby` or equivalent package for your platform. For\
    \ example, under Ubuntu:\n\n```bash\nfuzzy@linux $ ruby --version\nruby 1.8.6\
    \ (2007-09-24 patchlevel 111) [x86_64-linux]\n\nfuzzy@linux $ sudo apt-get install\
    \ libsqlite3-ruby libsqlite-ruby libsqlite-ruby1.8\n... many apt messages fly\
    \ past ...\n```\n\n## Connecting\n\nTo load the SQLite extension, you must import\
    \ the sqlite module, using either `load` or `require`, as follows:\n\n```ruby\n\
    require 'sqlite'\n```\n\nYou connect to a database by instantiating a `SQLite::Database`\
    \ object, passing in the name of the database file. By default, columns in result\
    \ sets are accessible by their ordinal. However, they can be accessed by column\
    \ name by setting `Database::results_as_hash` to `true`:\n\n```ruby\nrequire 'sqlite'\n\
    db = SQLite::Database.new(\"foods.db\")\ndb.results_as_hash = true\n```\n\n##\
    \ Query Processing\n\nThe Ruby extension follows the SQLite API quite closely.\
    \ It offers both prepared queries and wrapped queries.\n\nPrepared queries are\
    \ performed via `Database::prepare()`, which passes back a `Statement` object,\
    \ which holds a `sqlite3_stmt` structure. You execute the query using `Statement`'s\
    \ `execute` method, which produces a `ResultSet` object. You can pass the `Statement`\
    \ a block, in which case it will yield the `ResultSet` object to the block. If\
    \ you don’t use a block, then the `Statement` will provide the `ResultSet` object\
    \ as a return value. `ResultSet` is used to iterate over the returned rows. Internally,\
    \ it uses `sqlite3_step()`. You can get at the rows in `ResultSet` either through\
    \ a block using the `each()` iterator or by using a conventional loop with the\
    \ `next()` method, which returns the next record in the form of an array or `nil`\
    \ if it has reached the end of the set.\n\nListing 8-13 shows prepared queries\
    \ in action in Ruby.\n\n*Listing 8-13. Prepared Queries in Ruby*\n\n```ruby\n\
    #!/usr/bin/env ruby\nrequire 'sqlite3'\ndb = SQLite3::Database.new('foods.db')\n\
    \nstmt = db.prepare('select name from episodes')\nstmt.execute do | result |\n\
    \  result.each do | row |\n    puts row[0]\n  end\nend\n\nresult = stmt.execute()\n\
    result.each do | row |\n  puts row[0]\nend\n\nstmt.close()\n```\n\nIt is important\
    \ to call `Statement.close()` when you are done to finalize the query. Because\
    \ a `Statement` object holds a `sqlite3_stmt` structure internally, each subsequent\
    \ call to `execute` thus reuses the same query, avoiding the need to recompile\
    \ the query.\n\n## Parameter Binding\n\nThe Ruby extension supports both positional\
    \ and named parameter binding. You bind parameters using `Statement::bind_param()`\
    \ and/or `Statement::bind_params()`. `bind_param()` has the following form: `bind_param(param,\
    \ value)`\n\nIf `param` is a `Fixnum`, then it represents the position (index)\
    \ of the parameter. Otherwise, it is used as the name of the parameter. `bind_params()`\
    \ takes a variable number of arguments. If the first argument is a hash, then\
    \ it uses it to map parameter names to values. Otherwise, it uses each argument\
    \ as a positional parameter.\n\nListing 8-14 illustrates both forms of parameter\
    \ binding.\n\n*Listing 8-14. Parameter Binding in Ruby*\n\n```ruby\nrequire 'sqlite3'\n\
    db = SQLite3::Database.new(\"foods.db\")\ndb.results_as_hash = true\n\n# Named\
    \ paramters\nstmt = db.prepare('select * from foods where name like :name')\n\
    stmt.bind_param(':name', '%Peach%')\nstmt.execute() do |result|\n  result.each\
    \ do |row|\n    puts row['name']\n  end\nend\n\n# Positional paramters\nstmt =\
    \ db.prepare('select * from foods where name like ? or type_id = ?')\nstmt.bind_params('%Bobka%',\
    \ 1)\nstmt.execute() do |result|\n  result.each do |row|\n    puts row['name']\n\
    \  end\nend\n\n# Free read lock\nstmt.close()\n```"
