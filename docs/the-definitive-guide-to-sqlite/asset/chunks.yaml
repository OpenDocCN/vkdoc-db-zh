- fmt: '# CHAPTER 6 ■ THE CORE C API


    ## Threads


    If the progress callback returns a nonzero value, the current query will be immediately
    terminated, and any database changes will be rolled back. If the query was part
    of a larger transaction, then the transaction is not rolled back and remains active.
    The `sqlite3_exec()` call in that case will return `SQLITE_ABORT`.


    SQLite has enjoyed threading support for many releases. Although normal defensive
    coding techniques in multithreaded code apply to SQLite as well, there are a few
    additional precautions to take.


    One limitation that is somewhat thread-related pertains to the `fork()` system
    call on Unix. You should never try to pass a connection across a `fork()` call
    to a child process. It will not work correctly.


    ## Shared Cache Mode


    Starting with SQLite version 3.3.0, SQLite supports something called shared cache
    mode, which allows multiple connections in a single process to use a common page
    cache, as shown in Figure 6-1. This feature is designed for embedded servers where
    a single thread can efficiently manage multiple database connections on behalf
    of other threads. The connections in this case share a single page cache as well
    as a different concurrency model. Because of the shared cache, the server thread
    can operate with significantly lower memory usage and better concurrency than
    if each thread were to manage its own connection. Normally, each connection allocates
    enough memory to hold 2,000 pages in the page cache.


    Rather than each thread consuming that much memory with its own connection, it
    shares that memory with other threads using a single page cache.


    In this model, threads rely on a server thread to manage their database connections
    for them. A thread sends SQL statements to the server through some communication
    mechanism; the server executes them using the thread’s assigned connection and
    then sends the results back. The thread can still issue commands and control its
    own transactions; only its actual connection exists in, and is managed by, another
    thread.


    ```

    Thread

    Thread

    Thread

    Server Thread

    con

    con

    con

    Page Cache

    Database

    ```


    *Figure 6-1. The shared cache model*


    Connections in shared cache mode use a different concurrency model and isolation
    level. Furthermore, an option exists to allow connections in a shared cache can
    see what their kindred connections have changed. If the pragma `read_committed`
    is set to `true`, this kind of change inspection is possible. That is, there can
    be both multiple readers and an active writer in the database at the same time.
    That writer can write to the database—performing complete write transactions—without
    having to wait for other readers to clear. Therefore, data can change in the database
    within a reader’s transaction.


    Although SQLite normally runs in a serialized isolation level, meaning that readers
    and writers always see a consistent view of the database, in shared cache mode,
    readers are subject to the database changing underneath them.


    There are some control measures in place to keep connections out of one another’s
    way. By default, shared cache mode uses table locks to keep reader connections
    and writer connections separated. Table locks are not the same as database locks
    and exist only within connections of the shared cache.


    Whenever a connection reads a table, SQLite first tries to get a read lock on
    it. The same is true for writing to a table. A connection may not write to a table
    that another connection has a read lock on, and vice versa. Furthermore, table
    locks are tied to their respective connection and last for the duration of its
    transaction.


    ## Read Uncommitted Isolation Level


    Although table locks help keep connections in shared cache mode out of one another’s
    way, it is possible for connections to elect not to be in the way at all. That
    is, a connection can choose to have a read-uncommitted isolation level by using
    the `read_uncommitted` pragma. If it is set to `true`, then the connection will
    not put read locks on the tables it reads. Therefore, another writer can actually
    change a table as the connection reads it. This can lead to inconsistent query
    results, but it also means that a connection in read-uncommitted mode can neither
    block nor be blocked by any other connections.


    Some large changes have happened as of version 3.7 of SQLite, with the introduction
    of Write-Ahead Log mode. We’ll cover Write-Ahead Logging in detail in Chapter
    11.


    ## SCHEMA CHANGES IN SHARED CACHE MODE


    There are additional things to consider in shared cache mode when a thread wants
    to modify the database schema. As it turns out, before SQLite issues a table lock,
    it first gets a read table lock on the `sqlite_master` table. For a thread to
    alter the schema, it must first get a write table lock on `sqlite_master`. It
    can do this only if there are no read locks on it from other tables. When a thread
    does get a write lock on `sqlite_master`, then no other threads are allowed to
    compile SQL statements during that time. They will get `SQLITE_SCHEMA` errors.


    ## Unlock Notification


    If the thought of operating in the wilds of read-uncommitted isolation doesn’t
    appeal to you, SQLite provides for an alternative where shared cache mode is in
    use. Recent versions of SQLite have included the `sqlite3_unlock_notify()` function
    to provide additional flexibility in locking situations. The function profile
    looks as follows:


    ```c

    int sqlite3_unlock_notify(

    sqlite3 *pBlocked, /* Waiting connection */

    void (*xNotify)(void **apArg, int nArg), /* Callback function to invoke */

    void *pNotifyArg /* Argument to pass to xNotify */

    )

    ```


    If your code encounters a failure to gain a shared lock because of a contending
    lock, `SQLITE_LOCKED` will be returned. At this point, you can call `sqlite3_unlock_notify()`
    to allow registering of your callback function `xNotify` (the second parameter)
    with any desired parameters to that function (access via the `pNotifyArg` pointer
    as the third parameter) against your blocked connection (the first parameter).


    The connection that holds the blocking lock will trigger the `xNotify` callback
    as part of the `sqlite3_step()` or `sqlite3_close()` call that completes its transaction.
    It is also possible, particularly within a multithreaded application, that in
    the time it takes you to invoke `sqlite3_unlock_notify()`, the competing transaction
    will have completed. In this case, your callback function will be initiated immediately
    from within `sqlite3_unlock_notify()`.


    There are some caveats to the use of `sqlite3_unlock_notify()`, including the
    following:


    - You can register only one unlock/notify callback per blocked connection (newer
    calls replace any existing callback).

    - `sqlite3_unlock_notify()` is not reentrant, meaning you should *not* include
    other SQLite function calls in your callback function. You’re likely to crash
    your application.

    - Special care must be taken if you plan to use with `drop table` or `drop index`
    commands. Because these can be “blocked” by `select` statements, there is no real
    blocking transaction to include as the `pBlocked` parameter. Refer to the details
    on the SQLite web site for using the extended return codes to detect and handle
    this scenario at [www.sqlite.org/c3ref/unlock_notify.html](http://www.sqlite.org/c3ref/unlock_notify.html).


    ## Threads and Memory Management


    Since shared cache mode is about conserving memory, SQLite has several functions
    associated with threads and memory management. They allow you to specify an advisory
    heap limit—a soft heap limit—as well as manually initiate memory cleanups. These
    functions are as follows:


    ```c

    void sqlite3_soft_heap_limit(int N);

    int sqlite3_release_memory(int N);

    ```


    The `sqlite3_soft_heap_limit()` function sets the current soft heap limit of the
    calling thread to `N`.'
