    You can see the `foods.name` in the first column of the result, followed by the
    `food_types.name` in the second. Each row in the former is linked to its associated
    row in the latter using the `foods.type_id` → `food_types.id` relationship (Figure
    3-10).


    ■ **Note** We are using a new notation in this example to specify the columns
    in the `select` clause. Rather than specifying just the column names, we are using
    the notation `table_name.column_name`. The reason is that we have multiple tables
    in the `select` statement. The database is smart enough to figure out which table
    a column belongs to—as long as that column name is unique among all tables. If
    you use a column whose name is also defined in other tables of the join, the database
    will not be able to figure out which of the columns you are referring to and will
    return an error. In practice, when you are joining tables, it is always a good
    idea to use the `table_name.column_name` notation to avoid any possible ambiguity.
    This is explained in detail in the section “Names and Aliases.”


    To carry out the join, the database finds these matched rows. For each row in
    the first table, the database finds all rows in the second table that have the
    same value for the joined columns and includes them in the input relation. So
    in this example, the `from` clause built a composite relation by joining the rows
    of two tables.


    **foods**


    | id | name              | type_id |

    |----|-------------------|---------|

    | 1  | Bagels            | 1       |

    | 2  | Cereal            | 10      |

    | 3  | Chicken/Fowl      | 49      |

    | 49 | Cheerios          | 2       |

    | 10 | Chocolate Bobka   | 1       |

    | 15 | Chicken (Kenny’s) | 3       |

    | 198| Mackinaw Peaches  | 15      |

    | 203| Papaya            | 15      |

    | 244| JujyFruit         | 15      |

    | 245| Junior Mints      | 15      |

    | 412| Wax Beans         | 15      |


    **food_types**


    | id | name        |

    |----|-------------|

    | 1  | Bakery      |

    | 2  | Cereal      |

    | 3  | Chicken/Fowl|

    | 10 | Chocolate Bobka |

    | 13 | Seafood     |

    | 14 | Soup        |

    | 15 | Vegetables  |


    *Figure 3-10\. `foods` and `food_types` join*


    The subsequent operations (`where`, `group by`, and so on) work exactly the same.
    It is only the input that has changed through joining tables. As it turns out,
    SQLite supports six different kinds of joins. The one just described, called an
    inner join, is the most common.


    ## Inner Joins


    An inner join is where two tables are joined by a relationship between two columns
    in the tables, as in this previous example. It is the most common (and perhaps
    most generally useful) type of join.


    An inner join uses another set operation in relational algebra, called an intersection,
    to find elements that exist in both sets. Figure 3-11 illustrates this. The intersection
    of the set {1, 2, 8, 9} and the set {1, 3, 5, 8} is the set {1, 8}. The intersection
    operation is represented by a Venn diagram showing the common elements of both
    sets.


    *Figure 3-11\. Set intersection*


    This is precisely how an inner join works, but the sets in a join are common elements
    of the related columns. Pretend that the left set in Figure 3-11 represents values
    in the `foods.type_id` column and the right set represents values of the `food_types.id`
    column. Given the matching columns, an inner join finds the rows from both sides
    that contain like values and combines them to form the rows of the result (Figure
    3-12). Note that this example assumes that the records shown are the only records
    in `foods` and `food_types`.


    ![](index-97_1.png)


    *Figure 3-12\. Food join as intersection*


    Inner joins only return rows that satisfy the given column relationship, also
    called the join condition. They answer the question, “What rows of B match rows
    in A given the following relationship?”


    Let’s demonstrate this in SQL so you can match the theory with a practical example.


    ```sql

    Select *

    From foods inner join food_types on foods.id = food_types.id

    ```


    The syntax is clearly understandable once you’ve visualized what’s happening.


    ## Cross Joins


    Imagine for a moment that there is no join condition. What would you get? In this
    case, if the two tables were not related in any way, `select` would produce a
    more fundamental kind of join (the most fundamental), which is called a cross
    join, Cartesian join, or cross product. The Cartesian join is one of the fundamental
    relational operations. It is a brute-force, almost nonsensical join that results
    in the combination of all rows from the first table with all rows in the second.


    In SQL, the cross join of `foods` and `food_types` is expressed as follows:


    ```sql

    select * from foods, food_types;

    ```


    `from`, in the absence of anything else, produces a cross join. The result is
    shown here. Every row in `foods` is combined with every row in `food_types`, but
    crucially, not by relating the `id` and `type_id` values.


    In a cross join, no relationship exists between the rows; there is no join condition,
    but they are simply jammed together.


    ```

    1 1 Bagels 1 Bakery

    1 1 Bagels 2 Cereal

    1 1 Bagels 3 Chicken/Fowl

    …

    (6174 rows omitted to save paper)

    …

    412 15 Wax Beans 13 Seafood

    412 15 Wax Beans 14 Soup

    412 15 Wax Beans 15 Vegetables

    ```


    You may ask yourself what purpose such a cross join has. To be frank, that’s the
    question you should always ask yourself before using such logic. Do you really
    want the cross-product of every row in one table with every row in another. The
    answer is almost always no.


    ## Outer Joins


    Three of the remaining four joins are called outer joins. An inner join selects
    rows across tables according to a given relationship. An outer join selects all
    the rows of an inner join plus some rows outside of the relationship. The three
    outer join types are called left, right, and full. A left outer join operates
    with respect to the “left table” in the SQL command. For example, in the command:


    ```sql

    select *

    from foods left outer join foods_episodes on foods.id=foods_episodes.food_id;

    ```


    `foods` is the left table here. The left outer join favors it. It is the table
    of significance in a left outer join.


    The left outer join tries to match every row of `foods` with every row in `foods_episodes`
    per the join condition (`foods.id=foods_episodes.food_id`). All such matching
    rows are included in the result.


    However, if we had registered some foodstuffs in the `foods` table that had not
    yet appeared in an episode, the remaining food rows of `foods` that don’t match
    `foods_episodes` are still included in the result, and where `foods_episodes`
    hasn’t provide a row, it “supplies” `null` results.


    The right outer join works similarly, except the right table is the one whose
    rows are included, matching or not. Operationally, left and right outer joins
    are identical; they do the same thing. They differ only in order and syntax. As
    a user of SQLite, that means any problem that can requires a right outer join
    for solution can equally be solved with a left outer join.


    A full outer join is the combination of a left and right outer join. It includes
    all matching records, followed by unmatched records in the right and left tables.
    Currently, both right and full outer joins are not supported in SQLite. However,
    as mentioned earlier, a right join can be replaced with a left outer join, and
    a full outer join can be performed using compound queries (see the section “Compound
    Queries” later in this chapter).


    ## Natural Joins


    The last join on the list is called a natural join. It is actually an inner join
    in disguise, but with a little syntax and convention thrown in. A natural join
    joins two tables by their common column names. Thus, using the natural join, you
    can get the inner join of two tables without having to add the join condition.'
