    SQLite 不应与 Oracle 或 PostgreSQL 等其他大型数据库混淆。后者这类专用关系数据库是电子领域的巨无霸，而 SQLite 则是一把**数字瑞士军刀**。


    大型专用关系数据库是为数千名用户设计的，而 SQLite 则是为**数千种用途**设计的。它不仅仅是一个数据库。尽管其本身就是一个工具，但它也是**制造工具的工具**。它是一个真正的实用工具，旨在让您——开发者、用户或管理员——能够快速、轻松地将杂乱无章的数据堆整理有序，并以最小的力气随心所欲地操作它们。


    ## 第 1 章 ■ SQLite 简介


    SQLite 是公共领域软件。免费。您可以随意使用它或其源代码。没有许可证，没有安装程序，没有限制。复制即可运行。它还具有可移植性，经过充分测试，并且可靠。它具有清晰的模块化设计，有助于保持系统简单、易于开发和调试。除了良好的设计，它还拥有良好的测试。为测试
    SQLite 而编写的代码量甚至超过了 SQLite 本身需要测试的代码量。因此，在五年的历史中，SQLite 已证明自己是一个坚实、可靠的数据库，这应该不足为奇。


    最后，SQLite 很有趣。至少我们这么认为，并且希望您也能发现它同样有用和令人愉快。


