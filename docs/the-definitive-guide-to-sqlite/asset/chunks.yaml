    ## B 树 API


    B 树模块有其自己的 API，这与 C API 是分开的。为了完整性，我们将在这里探讨它，但它并非一个通用的 B 树 API。你会看到它严重身定制以满足 SQLite
    的需求，因此并不真的适合你直接拿来放入其他项目。


    尽管如此，深入理解它将使你更加欣赏 SQLite 的内部结构。SQLite 的 B 树模块的一个额外好处是它对事务的原生支持。你所知道的关于事务、锁和日志文件的一切都由为
    B 树模块服务的分页器处理。该 API 可以根据一般目的进行分组。


    ### 访问与事务函数


    数据库和事务例程包括：

    - `sqlite3BtreeOpen`：打开一个新的数据库文件。返回一个 B 树对象。

    - `sqlite3BtreeClose`：关闭一个数据库。

    - `sqlite3BtreeBeginTrans`：开始一个新事务。

    - `sqlite3BtreeCommit`：提交当前事务。

