    插入一行。\n更改数 : 1\nlast_insert_rowid() : 1\n回滚事务。\n总记录数 : 415\n```\n"
- fmt: "### Transaction Scope in Tcl\n\nTransaction scope can be handled automatically\
    \ within Tcl code using the `transaction` method. If all code inside the `transaction`\
    \ method’s script runs without error, the `transaction` method will commit; otherwise,\
    \ it will invoke a rollback. For example, if you wanted to perform the code from\
    \ Listing 8-23 in a single transaction, you would have to check the status of\
    \ each command after its execution. If it failed, then you would roll back the\
    \ transaction and abort any further commands. The more commands you have to run\
    \ in the transaction, the messier the code will get. However, all of this can\
    \ be done automatically with the `transaction` method, as illustrated in Listing\
    \ 8-24.\n\n#### Listing 8-24. Transaction Scope in Tcl\n```\ndb transaction {\n\
    \    puts \"\\nUpdating all rows.\"\n    db eval { update foods set type_id=0\
    \ }\n    puts \"Changes : [db changes]\"\n    puts \"\\nDeleting all rows.\"\n\
    \    # Delete all rows\n    db eval { delete from foods }\n    puts \"\\nInserting\
    \ a row.\"\n    # Insert a row\n    db eval { insert into foods (type_id, name)\
    \ values (9, 'Junior Mints') }\n    puts \"Changes : [db changes]\"\n    puts\
    \ \"last_insert_rowid() : [db last_insert_rowid]\"\n}\n```\n\nNow, if any of the\
    \ commands fail, `transaction` will roll back all commands without having to check\
    \ any return codes. `Transaction` also works with your existing transactions,\
    \ working within a transaction that’s already started. It will work within the\
    \ already-started transaction and not attempt a commit or rollback. If an error\
    \ occurs, it just aborts the script, returning the appropriate error code.\n\n\
    ### User-Defined Functions\n\nUser-defined functions are created using the `function`\
    \ method, which takes the name of the function and a Tcl method that implements\
    \ the function. Listing 8-25 illustrates an implementation of `hello_newman()`\
    \ in Tcl.\n\n#### Listing 8-25. `hello_newman()` in Tcl\n```\nproc hello_newman\
    \ {args} {\n    set l [llength $args]\n    if {$l == 0} {\n        return \"Hello\
    \ Jerry\"\n    } else {\n        return \"Hello [join $args {, } ]\"\n    }\n\
    }\ndb function hello_newman hello_newman\nputs [db onecolumn {select hello_newman()}]\n\
    puts [db onecolumn {select hello_newman('Elaine')}]\nputs [db onecolumn {select\
    \ hello_newman('Elaine', 'Jerry')}]\nputs [db onecolumn {select hello_newman('Elaine',\
    \ 'Jerry', 'George')}]\n```\n\nThe code for listing 8-25 produces the following\
    \ output:\n```\nHello Jerry\nHello Elaine\nHello Elaine, Jerry\nHello Elaine,\
    \ Jerry, George\n```\n\n### PHP\n\nSince the advent of PHP version 5, SQLite has\
    \ been part of the PHP standard library. If you have PHP 5 or newer, you have\
    \ SQLite installed on your system as well. Like many of the other languages we’ve\
    \ discussed, PHP presents you with a wealth of interface options.\n\nPHP 5.1 introduced\
    \ a new database abstraction layer called PHP Data Objects (PDO), which has grown\
    \ to become one of the most popular database abstraction layers for PHP. This\
    \ API uses drivers to support a standard database interface. The PDO interface\
    \ is an OO interface that is very similar to the OO interface in the SQLite extension.\
    \ Since PDO is an abstraction layer, it is meant to accommodate many different\
    \ databases and is therefore somewhat generic. Despite this, it is still possible\
    \ for PDO drivers to provide access to database-specific features as well. As\
    \ a result, the PDO drivers provide a complete OO interface that works well with\
    \ all the features of SQLite.\n\n#### Installation\n\nInstallation of PHP is quite\
    \ straightforward but beyond the scope of this book. You can find detailed instructions\
    \ on building and installing PHP in the documentation on the PHP web site: [www.php.net](http://www.php.net).\n\
    \n#### Connections\n\nThere are two important issues to consider before you open\
    \ a database: location and permissions. By default, the file path in PHP is relative\
    \ to the directory in which the script is run (unless you provide a full path,\
    \ relative to the root file system). So if you specify just a database name, you\
    \ are opening or creating a database within the public area of your web site,\
    \ and the security of that database file depends on how the web server is configured.\n\
    \nSince SQLite databases are normal operating system files just like HTML documents\
    \ or images, it may be possible for someone to fetch them just like a regular\
    \ document. This could be a potential security problem, depending on the sensitivity\
    \ of your data. As a general security precaution, it is good idea to keep database\
    \ files outside of public folders so that only PHP scripts can access them. As\
    \ an alternative, more sophisticated security can be achieved by limiting access\
    \ to the SQLite database file using `.htaccess` controls or equivalent security\
    \ techniques.\n\nUltimately, whatever permissions are used must allow the web\
    \ server process running PHP both read and write access to the database files.\
    \ Both of these are administrative details that must be addressed on a case-by-case\
    \ basis.\n\nIn PDO, connections are encapsulated in the `PDO` class. The constructor\
    \ takes a single argument called a data source name (DSN). The DSN is a colon-delimited\
    \ string composed of two parameters. The first parameter is the driver name, which\
    \ is normally `sqlite` and corresponds to SQLite version 3. The second parameter\
    \ is the path to the database file. If the connection attempt fails for any reason,\
    \ the constructor will throw a `PDOException`. The following example connects\
    \ to our SQLite `foods.db` database:\n```php\n<?php\ntry {\n    $dbh = new PDO(\"\
    sqlite:foods.db\");\n} catch (PDOException $e) {\n    echo 'Connection failed:\
    \ ' . $e->getMessage();\n}\n?>\n```\n\n#### Queries\n\nPDO is made up of two basic\
    \ classes, `PDO` and `PDOStatement`. `PDO` represents a connection, which internally\
    \ contains a `sqlite3` structure, and `PDOStatement` represents a statement handle,\
    \ which internally contains a `sqlite3_stmt` structure. The query methods in the\
    \ PDO class closely follow the methods in the SQLite C API. There are three ways\
    \ to execute queries:\n\n- `exec()`: Executes queries that don’t return any data.\
    \ Returns the number of affected rows, or `FALSE` if there is an error. This mirrors\
    \ `sqlite3_exec()`.\n- `query()`: Executes a query and returns a `PDOStatement`\
    \ object representing the result set, or `FALSE` if there is an error.\n- `prepare()`:\
    \ Compiles a query and returns a `PDOStatement` object or `FALSE` if there is\
    \ an error. This offers better performance than `query()` for statements that\
    \ need to be executed multiple times, because it can be reset, avoiding the need\
    \ to recompile the query.\n\nAdditionally, transaction management in PDO can be\
    \ performed through a method invocation using `beginTransaction()`, `commit()`,\
    \ and `rollback()`. Listing 8-26 shows a basic example of using the PDO class\
    \ to open a database and perform basic queries within a transaction.\n\n#### Listing\
    \ 8-26. Basic Queries with PDO\n```php\n<?php\ntry {\n    $dbh = new PDO(\"sqlite:foods.db\"\
    );\n} catch (PDOException $e) {\n    echo 'Connection failed: ' . $e->getMessage();\n\
    }\n$dbh->beginTransaction();\n$sql = 'select * from foods limit 10';\nforeach\
    \ ($dbh->query($sql) as $row) {\n    print $row['type_id'] . \" \";\n    print\
    \ $row['name'] . \"<br>\";\n}\n$dressing = $dbh->quote(\"Newman's Own Vinegarette\"\
    );\n$dbh->exec(\"insert into foods values (NULL, 4, $dressing)\");\necho $dbh->lastInsertId();\n\
    $dbh->rollback();\n?>\n```\n\nPDO uses the `setAttribute()` and `getAttribute()`\
    \ methods to set various database connection parameters. The only parameter that\
    \ applies to SQLite is `PDO_ATTR_TIMEOUT`, which sets the busy timeout."
