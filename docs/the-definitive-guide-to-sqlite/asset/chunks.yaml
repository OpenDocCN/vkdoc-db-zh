    User-Defined Functions


    User-defined functions are implemented using **Database::create_function()**,
    which has the following form:


    **create_function( name, args, text_rep=Constants::TextRep::ANY ) {|func, *args|
    ...}**


    **Here, **name** is the name of the SQL function, **args** is the number of arguments
    (-1 is variable), and **text_rep** corresponds to the UTF encoding. Values are
    **UTF8**, **UTF16LE**, **UTF16BE**, **UTF16**, and **ANY**. Finally, the function
    implementation is defined in the block. Listing 8-15 illustrates a Ruby implementation
    of **hello_newman()**.


