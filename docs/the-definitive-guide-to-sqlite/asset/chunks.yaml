    排序规则通过 `sqlite3_create_collation_v2()` 函数在 SQLite 中注册，其声明如下：


    ```

    int sqlite3_create_collation_v2(

    sqlite3* db, /* 数据库句柄 */

    const char *zName, /* SQL 中的排序规则名称 */

    int pref16, /* 编码 */

    void* pUserData, /* 应用数据 */

    int(*xCompare)(void*,int,const void*,int,const void*)

    void(*xDestroy)(void*)

    );

    ```


    它看起来与 `sqlite3_create_function()` 非常相似。包括标准的数据库句柄、将在 SQL 中引用的排序规则名称（类似于函数/聚合函数名称），以及编码格式，这关系到传递给比较函数时被比较字符串的格式。


    **注意**：与聚合函数和函数一样，可以为 UTF-8、UTF-16LE 和 UTF-16BE 编码分别注册具有相同排序规则名称的不同排序规则比较函数。SQLite
    会根据待比较的字符串，自动为给定的排序规则选择最佳的比较函数。


    应用数据指针是另一个 API 的主要组成部分。这里提供的指针会被传递给回调函数。基本上，`sqlite3_create_collation_v2()` 是
    `sqlite3_create_function()` 的简化版，后者恰好接受两个参数（均为文本）并返回一个整数值。它也去掉了聚合回调函数指针。


    在剩余的两个参数中，最后一个是 `xDestroy` 指针。此函数将在排序规则被销毁时调用，这通常在数据库连接被销毁时发生。如果你的排序规则被后续调用 `sqlite3_create_collation_v2()`
    所覆盖，销毁函数也会被调用。


    ## 比较函数


    这里的 `xCompare` 参数是关键的新内容。它指向将实际解析文本值的比较函数。比较函数必须具有以下形式：


    ```

    int compare(

    void* data, /* 应用数据 */

    int len1, /* 字符串 1 的长度 */

    const void* str1, /* 字符串 1 */

    int len2, /* 字符串 2 的长度 */

    const void* str2) /* 字符串 2 */

    ```


    该函数应在第一个字符串分别小于、等于或大于第二个字符串时，返回负数、零或正数。


    如前所述，`length_first` 排序规则有点模棱两可。代码清单 7-5 展示了其实现。


    *代码清单 7-5. `Length_first` 排序规则函数*


    ```

    int length_first_collation(

    void* data, int l1, const void* s1,

    int l2, const void* s2 )

    {

    int result, opinion;


    /* 比较长度 */

    if ( l1 == l2 ) result = 0;

    if ( l1 < l2 ) result = 1;

    if ( l1 > l2 ) result = 2;


    /* 形成意见：s1 真的小于或等于 s2 吗？ */

    switch(result) {

    case 0: /* 长度相等，按字母顺序排序 */

    opinion = strcmp(s1,s2);

    break;

    case 1: /* 字符串 s1 更短 */

    opinion = -result;

    break;

    case 2: /* 字符串 s2 更短 */

    opinion = result

    break;

    default: /* 以防万一，假设长度相等 */

    opinion = strcmp(s1,s2);

    }


    return opinion;

    }

    ```


    ## 测试程序


    剩下的就是在程序中演示它了。代码清单 7-6 展示了示例程序 (`length_first.c`) 的实现。


    *代码清单 7-6. `Length_first` 排序规则测试程序*


    ```

    int main(int argc, char **argv)

    {

    char *sql; sqlite3 *db; int rc;


    sqlite3_open("foods.db", &db);


    /* 注册排序规则。 */

    fprintf(stdout, "1. 注册 length_first 排序规则\n\n");

    sqlite3_create_collation_v2( db, "LENGTH_FIRST", SQLITE_UTF8, db,

    length_first_collation, length_first_collation_del );


    /* 开启 SQL 日志记录。 */

    log_sql(db, 1);


    /* 测试默认排序规则。 */

    fprintf(stdout, "2. 使用默认排序规则选择记录。\n");

    sql = "select name from foods order by name";

    print_sql_result(db, sql);


    /* 测试 Length First 排序规则。 */

    fprintf(stdout, "\n 使用 length_first 排序规则选择记录。 \n");

    sql = "select name from foods order by name collate LENGTH_FIRST";

    print_sql_result(db, sql);


    /* 完成。 */

    sqlite3_close(db);


    return 0;

    }

    ```


    ## 结果


    运行该程序得到以下结果（为节省空间，此处进行了缩写）：


    ```

    1. 注册 length_first 排序规则


    2. 使用默认排序规则选择记录。

    TRACE: select name from foods order by name

    name

    -----------------

    A1 Sauce

    All Day Sucker

    Almond Joy

    Apple

    Apple Cider

    Apple Pie

    Arabian Mocha Java (beans)

    Arby''s Roast Beef

    Artichokes

    Atomic Sub

    ...


    使用 length_first 排序规则选择记录。

    TRACE: select name from foods order by name collate LENGTH_FIRST

    issue

    -----------------

    BLT

    Gum

    Kix

    Pez

    Pie

    Tea

    Bran

    Duck

    Dill

    Life

    ...

    ```


    我们的程序首先注册了 `length_first` 排序序列。然后我们继续使用 SQLite 默认的 `binary` 排序规则选择记录，这会按字母顺序返回记录。接着是我们使用
    `length_first` 排序规则再次选择记录。如结果所示，我们完全达到了目标，首先按长度排序，然后按字母顺序排序。


    ## 按需排序


    SQLite 提供了一种将排序规则注册推迟到实际需要时才进行的方法。因此，如果你不确定应用程序是否会需要像 `length_first` 这样的排序规则，你可以使用
    `sqlite3_collation_needed()` 函数将注册推迟到最后一刻（也许是由于某些秘密的、最后一刻的食物重命名）。你只需向 `sqlite3_collation_needed()`
    提供一个回调函数，SQLite 可以依靠这个函数根据需要（给定其名称）注册未知的排序序列。这可以说是回调的回调。这就像对 SQLite 说：“听着，如果你被要求使用一个你不识别的排序规则，就调用这个函数，它会注册未知的序列；然后你就可以继续你的工作了。”


    `sqlite3_collation_needed()` 函数声明如下：


    ```

    int sqlite3_collation_needed(

    sqlite3* db, /* 连接句柄 */

    void* data, /* 应用数据 */

    void(*crf)(void*,sqlite3*,int eTextRep,const char*)

    );

    ```


    `crf` 参数（我们称之为排序规则注册函数）指向将注册未知排序规则的函数。为了清晰起见，其定义如下：


    ```

    void crf(

    void* data, /* 应用数据 */

    sqlite3* db, /* 数据库句柄 */

    int eTextRep, /* 编码 */

    const char*) /* 排序规则名称 */

    ```


    `crf()` 的 `db` 和 `data` 参数分别是传递给 `sqlite3_collation_needed()` 的第一个和第二个参数的值。


    ## 总结


    到目前为止，你已经发现用户定义函数、聚合函数和排序规则可能非常有用。使用 C API 的扩展部分添加此类函数的能力，是对核心 SQLite 库开放性质的一个极好补充。所以，你可以自由地深入研究，并随心所欲地修改
    SQLite。我们甚至可以说，SQLite 提供了一个友好、易于使用的界面，使得实现广泛的强大扩展和定制成为可能，特别是结合 SQLite 中已有的其他功能时。


    在下一章中，你将看到许多扩展语言如何利用这一点。它们使用 C API 来实现特定语言的各种功能和扩展。


    # 第 8 章

    ## 语言扩展

    '
- fmt: '# Chapter 8: Language Extensions


    SQLite is written in C and has its own C API, which makes C the “native language”
    to some degree. The open source community, however, has provided many extensions
    for SQLite that make it accessible to many programming languages and libraries
    such as Perl, Python, Ruby, Java, .NET/C#, Qt, and ODBC. In many cases, there
    are multiple extensions to choose from for a given language, developed by different
    people to meet different needs.


    Many extensions conform to various API standards. For instance, one of the SQLite
    Perl extensions follows the Perl `DBI`—Perl’s standard interface for database
    access. Similarly, one of the Python extensions conforms to Python’s `DB API`
    specification, as does at least one of the Java extensions to `JDBC`. Regardless
    of their particular APIs, internally all extensions work on top of the same SQLite
    C API, which you’ve already explored in Chapters 5, 6, and 7. To some degree,
    all extensions reflect the C foundation of the SQLite design. Some extensions
    provide both a standard interface that conforms to their particular API standard
    as well as an alternative interface that better reflects the design of the SQLite
    API. Therefore, in such cases, you can choose which interface works best for you
    based on your requirements.


    In general, all extensions have the same comparative anatomy regardless of their
    particular API. They follow a similar pattern. Once you understand this pattern,
    every interface will start to look similar in many respects. There is some kind
    of connection object representing a single connection to the database, and some
    kind of cursor object representing a SQL query from which you can both execute
    commands and iterate over results. Conceptually, it is quite simple. Internally,
    you are looking at a `sqlite3` structure and a `sqlite3_stmt` structure, both
    well-known structures from our earlier explanation and examples. The same rules
    apply for language extensions as for the C API.


    This chapter covers language extensions for six popular languages: Perl, Python,
    Ruby, Java, Tcl, and PHP. The intent is to provide you with a convenient introduction
    with which to quickly get started using SQLite in a variety of different languages.
    We’ll highlight right now that we won’t be teaching you those languages themselves—so
    some knowledge of Perl, or Python, or Ruby, and so on, is expected.


    Coverage for each language follows a common outline composed of the common topics
    of questions from people starting out with language extensions for SQLite:

    * Connecting to databases

    * Executing queries

    * Using bound parameters

    * Implementing user-defined functions or aggregates


    Together these topics constitute the vast majority of what you will ever use in
    any particular SQLite extension. You might find some “developer tension” over
    developing user-defined functions in SQLite versus implementing the logic in your
    chosen language. Although we can’t make that decision for you, we can give you
    the knowledge and expertise to help make that choice yourself.


    Not every extension supports all of these topics. For instance, some don’t offer
    bound parameters. Conversely, some extensions offer unique features that are outside
    the topics covered here. The aim here is to provide a consistent, straightforward
    process with which to easily get started using SQLite in a wide variety of languages.
    Once you get started with any extension, it is usually easy to pick up any special
    features available in that extension.


    Where appropriate, this chapter addresses how different extensions use various
    parts of the C API in order to help you understand what is going on under the
    hood. If you have not read the preceding chapters on the C API, we strongly recommend
    that you do so. No matter what language you program in, it will almost always
    be helpful to understand how SQLite works in order to make the most of it and
    thus write good code. It will help you select the most suitable query methods,
    understand the scope of transactions, and know how to anticipate, deal with, or
    avoid locks, among other things.


    ## Selecting an Extension


    For many of today’s popular languages, you are spoilt for choice when it comes
    to language bindings for SQLite. Choosing the extension that suits you is often
    more than a straight technical decision. To help, we cover the interface that
    best fits the following criteria:

    * Support for the latest SQLite 3 versions

    * Good documentation

    * Stability

    * Portability


    Despite these criteria, there were multiple candidates in some cases that met
    all the qualifications. In such cases, the tiebreaker was more a matter of personal
    preference than anything else. But the purpose here is not to favor a particular
    extension. It is to teach concepts so that you can easily pick any extension in
    any language and quickly put it and SQLite to good use.


    The reasons we chose a particular extension may not be the reasons you would.
    Some additional points to consider include the following:

    * *License and license compatibility*: The extension’s license can directly affect
    how you can use it. Is it open source, and if so, under which license? If you
    are writing code for a commercial product, you definitely need to take this into
    consideration.

    * *Data type mapping*: How does the extension map SQLite’s storage classes to
    the language’s native types. Are all values returned as text? Is some kind of
    crazy casting scheme used? If not, is there an easy way to determine the mappings?
    Do you have any control over how the mapping is done?

    * *Query methods*: Three different query methods are supported in the C API. Which
    one does the extension use? Ideally it supports all three.

    * *API coverage*: How well does the extension cover other areas that don’t easily
    map to many standard database interfaces? For example, does it allow you to call
    the SQL trace function or operational security functions? Do you actually need
    these?

    * *Linkage and distribution*: How easy is it to use the extension with a particular
    version of SQLite? Does it include a version of SQLite in the distribution? Does
    it use a shared library, or is it statically linked to a particular version? What
    if you need to upgrade SQLite; how easily can you do this with the extension?
    Will anything break?


    There are other considerations as well, such as community support, mailing list
    activity, maintainer support and responsiveness, regression testing, code quality...the
    list goes on. All of these things may play an important role in your decision
    to use a particular extension. Only you can answer these questions for yourself.


    The SQLite wiki has a page that provides an exhaustive list of language interfaces,
    located at [www.sqlite.org/cvstrac/wiki?p=SqliteWrappers](http://www.sqlite.org/cvstrac/wiki?p=SqliteWrappers).
    All of the interfaces covered here were taken from this list. The source code
    for all of the examples in this chapter is located in the `ch8` directory of the
    `examples` zip file, available at the Apress web site.


    ## Perl


    There are two SQLite extensions for Perl. The first is a modeled on the Perl `DBI`
    standard for database connectivity; therefore, if you understand `DBI`, you will
    have no trouble using the extension. For those unfamiliar with the Perl `DBI`,
    you can review full documentation on the CPAN web site at'
