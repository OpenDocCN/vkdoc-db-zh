  trans: '

    # 第 5 章 ■ SQLite 设计与概念


    关于第二个问题，事务持续时间（或事务生命周期）可以短如单条语句，也可以长至随心所欲——直到你主动停止。默认情况下，连接以自动提交模式运行，这意味着你发出的每条命令都在独立的事务中运行。相反，当你发出`begin`命令时，事务将持续，直到你调用`COMMIT`或`rollback`，或者直到你的某条
    SQL 命令导致约束违规从而引发`rollback`。下一个问题是事务与锁的关系。


    ## 锁状态


    在大多数情况下，锁的持续时间与事务的持续时间是影子关系。虽然两者并非总是同时开始，但它们总是同时结束。当你结束一个事务时，就释放了与其关联的锁。更准确地说，锁在其关联的事务结束之前永远不会被释放，或者在最坏的情况下，直到程序崩溃。如果程序或系统崩溃，事务并未结束，这种情况下数据库上仍有一个隐式锁，该锁将由下一个访问它的连接来解决。这将在后面的旁注“锁定与崩溃恢复”中讨论。


    SQLite 中有五种不同的锁状态，无论连接在做什么，它总是处于其中之一。图 5-3 展示了 SQLite 的锁状态和转换。该图详细描述了一个连接在其事务生命周期中可能处于的每一种锁状态以及它可以采取的每一条路径。该图是以锁状态、锁转换和事务生命周期来表示的。你在图中实际看到的是事务在锁角度上的生命周期。


    *图 5-3\. SQLite 锁状态转换*


    除了`UNLOCKED`状态外，每个状态都有对应的锁。因此，你可以说一个连接“持有`RESERVED`锁”或“处于`RESERVED`状态”，或者简称为“处于`RESERVED`”，这些说法含义相同。除了`UNLOCKED`状态，连接要进入给定状态，必须首先获得关联的锁。


    每个事务都始于`UNLOCKED`、`RESERVED`或`EXCLUSIVE`状态。默认情况下，一切都始于`UNLOCKED`，如图 5-3 所示。白色背景的锁状态——`UNLOCKED`、`PENDING`、`SHARED`和`RESERVED`——可以在数据库的不同连接之间同时存在。然而，从灰色背景的`PENDING`状态开始，情况变得更加严格。灰色的`PENDING`状态代表锁被单个连接（即一个希望达到`EXCLUSIVE`状态的写入者）持有。相反，白色的`PENDING`状态代表连接在通往`SHARED`状态的路上获取并释放锁的一条路径。尽管存在所有这些不同的锁状态，SQLite
    中的每个事务最终都归结为两种类型之一：读事务和写事务。这最终描绘了锁的图景：读者与写者，以及它们如何彼此共存。


    ## 读事务


    首先，让我们梳理一下`select`语句的锁定过程。它的路径非常简单。执行`select`语句的连接启动一个事务，该事务从`UNLOCKED`状态进入`SHARED`状态，并在`commit`后返回到`UNLOCKED`状态。故事结束。


    现在，出于好奇，当你执行两条语句时会发生什么？那时的锁路径是怎样的？嗯，这取决于你是否在自动提交模式下运行。考虑以下例子：

    `db = open(''foods.db'')`

    `db.exec(''begin'')`

    `db.exec(''select * from episodes'')`

    `db.exec(''select * from episodes'')`

    `db.exec(''commit'')`

    `db.close()`

    在这里，由于显式使用了`begin`，两个`select`命令在单个事务中执行，因此在同一`SHARED`状态下运行。第一个`exec()`运行，使连接保持在`SHARED`状态，然后第二个`exec()`运行。最后，手动`commit`使连接从`SHARED`状态返回到`UNLOCKED`状态。代码的锁路径如下：

    `UNLOCKED` → `PENDING` → `SHARED` → `UNLOCKED`


    现在考虑例子中没有`begin`和`commit`行的情况。那么两个`select`命令将在自动提交模式下运行。因此，它们将各自独立地经历完整的路径。此时代码的锁路径如下：

    `UNLOCKED` → `PENDING` → `SHARED` → `UNLOCKED` → `PENDING` → `SHARED` → `UNLOCKED`


    由于代码只是读取数据，这可能没有太大区别，但在自动提交模式下，它必须经历两倍于正常情况的文件锁。而且，正如你将看到的，一个写入者可能在两个`select`命令之间潜入，并在`exec()`调用之间修改数据库，因此你无法保证两个命令返回相同的结果。另一方面，使用`begin..commit`，可以保证它们的结果是相同的。


    ## 写事务


    现在考虑一条写入数据库的语句，例如`update`。首先，连接必须遵循与`select`相同的路径，达到`SHARED`状态。每个操作——无论是读还是写——都必须从经历`UNLOCKED`
    → `PENDING` → `SHARED`开始。正如你将很快看到的，`PENDING`是一个网关锁。


    ## 保留状态


    当连接尝试向数据库写入任何内容的那一刻，它必须从`SHARED`状态进入`RESERVED`状态。如果它获得了`RESERVED`锁，那么它就准备好开始进行修改。尽管此时连接实际上还不能修改数据库，但它可以将修改存储在分页器内部的一个本地内存缓存中，即前面提到的*页面缓存*。这个缓存就是你用`cache_size`
    pragma 配置的缓存，如第 4 章所述。


    当连接进入`RESERVED`状态时，分页器会初始化*回滚日志*。这是一个文件（如图 5-1 所示），用于回滚和崩溃恢复。具体来说，它保存着将数据库恢复到事务执行前原始状态所需的数据库页面。这些数据库页面是由分页器在
    B-树修改页面时放入的。在这个例子中，对于`update`命令修改的每条记录，分页器会获取与*原始*记录关联的数据库页面，并将其复制到日志中。然后，日志中保存了事务执行前数据库的部分内容。


    因此，分页器为了撤销任何事务所需要做的，就是简单地将日志中的内容复制回数据库文件。然后，数据库就恢复到了事务执行前的状态。


    在`RESERVED`状态下，分页器实际上管理着三组页面：已修改页面、未修改页面和日志页面。已修改页面就是 B-树已更改的包含记录的页面。这些页面存储在页面缓存中。未修改页面是
    B-树读取但未更改的页面。这些是诸如`select`之类的命令的产物。最后是日志页面，它们是已修改页面的原始版本。这些页面不存储在页面缓存中，而是在 B-树修改页面之前被写入日志。

    '
- fmt: '# SQLite 设计与概念


    ## 页面缓存与并发


    由于页面缓存的存在，一个处于 **RESERVED** 状态的写入连接确实可以实际执行工作，而不会干扰其他（读取）连接。因此，SQLite 可以有效地允许多个读取器和一个写入器同时在同一个数据库上工作。唯一的限制是，写入连接必须将其修改存储在其页面缓存中，而不是数据库文件中。同时请注意，在给定时间，对于一个给定的数据库，只能有一个连接处于
    **RESERVED** 或 **EXCLUSIVE** 状态——多个读取器，但只有一个写入器。


    ## 悬挂状态


    当连接完成**更新**的修改并准备提交事务时，页面管理器开始进入 **EXCLUSIVE** 状态的过程。你已经从第 4 章了解了这是如何工作的，但为了完整性，我们将重复一遍。从
    **RESERVED** 状态开始，页面管理器尝试获取一个 **PENDING** 锁。一旦获取，它就会保持该锁，阻止其他任何连接获取 **PENDING**
    锁。查看图 5-3，看看这会产生什么效果。我们告诉过你 **PENDING** 是一个网关锁。现在你明白为什么了。由于写入器持有 **PENDING** 锁，其他人无法再从
    **UNLOCKED** 进入 **SHARED**。结果是没有新连接可以进入数据库：没有新的读取器，也没有新的写入器。这个 **PENDING** 状态是损耗阶段。写入器被保证可以排队等待数据库——只要所有行为正确——并最终获得它。


    只有其他已经持有 **SHARED** 锁的会话才能继续正常工作。在 **PENDING** 状态下，写入器等待这些连接完成并释放它们的锁。等待锁涉及什么是一个单独的问题，将在本章稍后的“等待锁”一节中讨论。


    当其他连接释放它们的锁后，数据库就归属于写入器。然后，页面管理器从 **PENDING** 移动到 **EXCLUSIVE**。


    ## 排他状态


    在 **EXCLUSIVE** 期间，主要工作是将修改后的页面从页面缓存刷新到数据库文件。


    这时事情变得严肃起来，因为页面管理器将要实际修改数据库。它以极其谨慎的方式进行这项工作。


    在页面管理器开始写入修改过的页面之前，它首先处理日志。它检查日志的完整内容是否已写入磁盘。此时，即使页面管理器已经将页面写入日志文件，操作系统也很可能已经将其中许多（即使不是全部）缓冲在内存中。页面管理器告诉操作系统将所有**这些页面实际写入磁盘**。这就是**同步**（synchronous）编译指示（pragma）发挥作用的地方，如第
    4 章所述。由 `synchronous` 指定的方法决定了页面管理器确保操作系统将日志页面提交到磁盘的谨慎程度。正常设置是在继续之前执行一次“同步”，告诉操作系统确认所有缓冲的日志页面都已写入磁盘表面。如果
    `synchronous` 设置为 `FULL`，那么页面管理器在继续之前会执行两次完整的“同步”。如果 `synchronous` 设置为 `NONE`，页面管理器根本不会理会日志（虽然速度可能快
    50 倍，但你将告别事务持久性）。


    将日志提交到磁盘如此重要的原因是，如果程序或系统在页面管理器写入数据库文件时崩溃，日志是以后恢复数据库文件的唯一途径。如果日志页面在系统崩溃前没有完全写入磁盘，那么数据库无法完全恢复到其原始状态，因为内存中的日志页面在崩溃中丢失了。在这种情况下，你最好有一个不一致的数据库，最坏则有一个损坏的数据库。


    > **注意** 即使你为 `synchronous` 编译指示使用了最保守的设置，也不能保证日志真正提交到了磁盘。这不是 SQLite 的错，而是某些类型的硬件和操作系统的问题。SQLite
    在 Unix 上使用 `fsync()` 系统调用，在 Windows 上使用 `FlushFileBuffers()` 来强制将日志页面写入磁盘。但有报告称这些函数并不总是有效，尤其是使用廉价的
    IDE 磁盘时。显然，一些 IDE 磁盘制造商使用的控制器芯片倾向于在报告数据已写入磁盘表面的同时，却将其缓存在易失性存储器中。此外，有一些（未经证实的）报告称
    Windows 偶尔会忽略 `FlushFileBuffers()`。如果你的硬件或软件对你撒谎，你的事务可能不如你想象的那样持久。


    一旦日志处理完毕，页面管理器就会将所有修改过的页面复制到数据库文件。


    接下来发生的事情取决于事务模式。如果像本例一样，事务自动提交，那么页面管理器会清理日志，清除页面缓存，并从 **EXCLUSIVE** 进入 **UNLOCKED**。如果事务不提交，那么页面管理器继续持有
    **EXCLUSIVE** 锁，日志保持有效，直到发出 `COMMIT` 或 `ROLLBACK`。


    ## 自动提交与效率


    考虑到所有这些，请思考在显式事务中运行的 `UPDATE` 与在自动提交模式下运行的 `UPDATE` 会发生什么。在自动提交模式下，每个修改数据库的命令都在一个单独的事务中运行，并经历以下路径：


    ```

    UNLOCKED → PENDING → SHARED → RESERVED → PENDING → EXCLUSIVE → UNLOCKED

    ```


    此外，每次遍历此路径都涉及创建、提交和清除回滚日志。这一切都会累积起来。虽然在自动提交模式下运行多个 `SELECT` 在性能上可能问题不大，但对于频繁的写入，你真的应该重新考虑自动提交模式。


    而且，正如在 `SELECT` 情况下提到的，当以自动提交模式运行多个命令时，无法阻止其他连接在命令之间出现并修改数据库。如果你有两个更新依赖于数据库中的特定值，因此，你应该总是在同一个事务中运行它们。


    ## 锁定与崩溃恢复


    SQLite 的锁定实现基于标准的文件锁定。SQLite 在数据库文件上保持三种不同的文件锁：一个保留字节（reserved byte）、一个挂起字节（pending
    byte）和一个共享区域（shared region）。


    一切都从挂起字节开始。要从 **UNLOCKED** 移动到 **SHARED**，连接首先尝试获取挂起字节上的读锁。如果成功，它会在共享区域中获取一个随机字节的读锁，并释放挂起字节上的读锁。要从
    **SHARED** 移动到 **RESERVED**，连接尝试在保留字节上获取写锁。要从 **RESERVED** 进入 **EXCLUSIVE**，连接尝试在挂起字节上获取写锁。如果成功，这就会导致损耗过程，因为其他连接无法再获取挂起字节上的读锁来进入
    **SHARED**。最后，要获取 **EXCLUSIVE** 锁，连接尝试在整个共享区域上获取写锁。由于共享区域保存着所有其他活动连接的读锁，此步骤保证
    **EXCLUSIVE** 锁仅在所有其他 **SHARED** 锁首先被释放后才被授予。'
  raw: 'Because of the page cache, a writing connection can indeed get real work done
    in the **RESERVED** state without interfering with other (reading) connections.
    Thus, SQLite can effectively have multiple readers and one writer both working
    on the same database at the same time. The only catch is that the writing connection
    has to store its modifications in its page cache, not in the database file. Note
    also that there can be only one connection in **RESERVED** or **EXCLUSIVE** for
    a given database at a given time—multiple readers but only one writer.


    The Pending State


    When the connection finishes making changes for the **update** and the time comes
    to commit the transaction, the pager begins the process of entering the **EXCLUSIVE**
    state. You already know how this works from Chapter 4, but we will repeat it for
    the sake of completeness. From the **RESERVED** state, the pager tries to get
    a **PENDING** lock. Once it does, it holds onto it, preventing any other connections
    from getting a **PENDING** lock. Look at Figure 5-3 and see what effect this has.
    Remember we told you that **PENDING** was a gateway lock. Now you see why. Since
    the writer is holding onto the **PENDING** lock, nobody else can get to **SHARED**
    from **UNLOCKED** anymore. The result is that no new connections can enter the
    database: no new readers, no new writers. This **PENDING** state is the attrition
    phase. The writer is guaranteed that it can wait in line for the database and—as
    long as everyone behaves properly—get it.


    Only other sessions that already have **SHARED** locks can continue to work as
    normal. In **PENDING**, the writer waits for these connections to finish and release
    their locks. What’s involved with waiting for locks is a separate issue, which
    will be addressed shortly in the section “Waiting for Locks.”


    When the other connections release their locks, the database then belongs to the
    writer. Then, the pager moves from **PENDING** to **EXCLUSIVE**.


    The Exclusive State


    During **EXCLUSIVE**, the main job is to flush the modified pages from the page
    cache to the database file.


    This is when things get serious, because the pager is going to actually modify
    the database. It goes about this with extreme caution.


    Before the pager begins writing the modified pages, it first tends to the journal.
    It checks that the complete contents of the journal have been written to disk.
    At this point, it is very likely that even though the pager has written pages
    to the journal file, the operating system has buffered many if not all of them
    142


    CHAPTER 5 ■ SQLITE DESIGN AND CONCEPTS


    in memory. The pager tells the operating system to literally write all of these
    pages to the disk. This is where the synchronous pragma comes into play, as described
    in Chapter 4\. The method specified by synchronous determines how careful the
    pager is to ensure that the operating system commits journal pages to disk. The
    normal setting is to perform a single “sync” before continuing, telling the operating
    system to confirm that all buffered journal pages are written to the disk surface.
    If **synchronous** is set to **FULL**, then the pager does two full “syncs” before
    proceeding. If **synchronous** is set to **NONE**, the pager doesn’t bother with
    the journal at all (and while it can be 50 times faster, you can kiss transaction
    durability goodbye).


    The reason that committing the journal to disk is so important is that if the
    program or system


    crashes while the pager is writing to the database file, the journal is the only
    way to restore the database file later. If the journal’s pages weren’t completely
    written to disk before a system crash, then the database cannot be restored fully
    to its original state, because the journal pages that were in memory were lost
    in the crash. In this case, you have an inconsistent database at best and a corrupted
    one at worse.


    ■ **Caution** Even if you use the most conservative setting for the synchronous
    pragma, you still may not be guaranteed that the journal is truly committed to
    disk. This is no fault of SQLite, but rather of certain types of hardware and
    operating systems. SQLite uses the **fsync()** system call on Unix and **FlushFileBuffers()**
    on Windows to force journal pages to disk. But it has been reported that these
    functions don’t always work, especially with cheap IDE disks. Apparently, some
    manufacturers of IDE disks use controller chips that tend to bend the truth about
    actually committing data to disk. In some cases, the chips cache the data in volatile
    memory while reporting that they wrote it to the drive surface. Also, there have
    been (unconfirmed) reports that Windows occasionally ignores **FlushFileBuffers()**.
    If you have hardware or software that lies to you, your transactions may not be
    as durable as you might think.


    Once the journal is taken care of, the pager then copies all of the modified pages
    to the database file.


    What happens next depends on the transaction mode. If, as in this case, the transaction
    autocommits, then the pager cleans up the journal, clears the page cache, and
    proceeds from **EXCLUSIVE** to **UNLOCKED**. If the transaction does not commit,
    then the pager continues to hold the **EXCLUSIVE** lock, and the journal stays
    in play until either a **COMMIT** or **ROLLBACK** is issued.


    Autocommit and Efficiency


    With all this in mind, consider what happens with **UPDATE**s that run in an explicit
    transaction versus ones that run in autocommit. In autocommit, every command that
    modifies the database runs in a separate transaction and travels through the following
    path:


    ****UNLOCKED** →**PENDING** →**SHARED** →**RESERVED** →**PENDING** →**EXCLUSIVE**
    →**UNLOCKED**


    **Additionally, each trip through this path involves creating, committing, and
    clearing out the


    rollback journal. This all adds up. Although running multiple **SELECT**s in autocommit
    mode is perhaps not that big of a deal performance-wise, you should really rethink
    autocommit mode for frequent writes.


    And, as mentioned in the **SELECT** case, when running multiple commands in autocommit,
    there is 143


    CHAPTER 5 ■ SQLITE DESIGN AND CONCEPTS


    nothing stopping another connection from coming along and modifying the database
    in between


    commands. If you have two updates that depend on specific values in the database,
    you should always run them in the same transaction for this reason.


    **LOCKING AND CRASH RECOVERY**


    SQLite’s lock implementation is based on standard file locking. SQLite keeps three
    different file locks on the database file: a reserved byte, a pending byte, and
    a shared region.


    Everything starts at the pending byte. To move from **UNLOCKED** to **SHARED**,
    a connection first attempts to get a read-lock on the pending byte. If successful,
    it gets a read lock on a random byte in the shared region and releases the read
    lock on the pending byte. To move from **SHARED** to **RESERVED**, a connection
    attempts to obtain a write lock on the reserved byte. To get from **RESERVED**
    to **EXCLUSIVE**, a connection attempts to get a write lock on the pending byte.
    If successful, this is what causes the attrition process, because it is no longer
    possible for other connections to get a read lock on the pending byte to enter
    **SHARED**. Finally, to get the **EXCLUSIVE** lock, the connection attempts to
    get a write lock on the entire shared region. Since the shared region holds read
    locks by all other active connections, this step guarantees that an **EXCLUSIVE**


    lock is granted only after all other **SHARED** locks are first released.'
  trans: '# SQLite 设计与概念


    ## 页面缓存与并发


    由于页面缓存的存在，一个处于 **RESERVED** 状态的写入连接确实可以实际执行工作，而不会干扰其他（读取）连接。因此，SQLite 可以有效地允许多个读取器和一个写入器同时在同一个数据库上工作。唯一的限制是，写入连接必须将其修改存储在其页面缓存中，而不是数据库文件中。同时请注意，在给定时间，对于一个给定的数据库，只能有一个连接处于
    **RESERVED** 或 **EXCLUSIVE** 状态——多个读取器，但只有一个写入器。


    ## 悬挂状态


    当连接完成**更新**的修改并准备提交事务时，页面管理器开始进入 **EXCLUSIVE** 状态的过程。你已经从第 4 章了解了这是如何工作的，但为了完整性，我们将重复一遍。从
    **RESERVED** 状态开始，页面管理器尝试获取一个 **PENDING** 锁。一旦获取，它就会保持该锁，阻止其他任何连接获取 **PENDING**
    锁。查看图 5-3，看看这会产生什么效果。我们告诉过你 **PENDING** 是一个网关锁。现在你明白为什么了。由于写入器持有 **PENDING** 锁，其他人无法再从
    **UNLOCKED** 进入 **SHARED**。结果是没有新连接可以进入数据库：没有新的读取器，也没有新的写入器。这个 **PENDING** 状态是损耗阶段。写入器被保证可以排队等待数据库——只要所有行为正确——并最终获得它。


    只有其他已经持有 **SHARED** 锁的会话才能继续正常工作。在 **PENDING** 状态下，写入器等待这些连接完成并释放它们的锁。等待锁涉及什么是一个单独的问题，将在本章稍后的“等待锁”一节中讨论。


    当其他连接释放它们的锁后，数据库就归属于写入器。然后，页面管理器从 **PENDING** 移动到 **EXCLUSIVE**。


    ## 排他状态


    在 **EXCLUSIVE** 期间，主要工作是将修改后的页面从页面缓存刷新到数据库文件。


    这时事情变得严肃起来，因为页面管理器将要实际修改数据库。它以极其谨慎的方式进行这项工作。


    在页面管理器开始写入修改过的页面之前，它首先处理日志。它检查日志的完整内容是否已写入磁盘。此时，即使页面管理器已经将页面写入日志文件，操作系统也很可能已经将其中许多（即使不是全部）缓冲在内存中。页面管理器告诉操作系统将所有**这些页面实际写入磁盘**。这就是**同步**（synchronous）编译指示（pragma）发挥作用的地方，如第
    4 章所述。由 `synchronous` 指定的方法决定了页面管理器确保操作系统将日志页面提交到磁盘的谨慎程度。正常设置是在继续之前执行一次“同步”，告诉操作系统确认所有缓冲的日志页面都已写入磁盘表面。如果
    `synchronous` 设置为 `FULL`，那么页面管理器在继续之前会执行两次完整的“同步”。如果 `synchronous` 设置为 `NONE`，页面管理器根本不会理会日志（虽然速度可能快
    50 倍，但你将告别事务持久性）。


    将日志提交到磁盘如此重要的原因是，如果程序或系统在页面管理器写入数据库文件时崩溃，日志是以后恢复数据库文件的唯一途径。如果日志页面在系统崩溃前没有完全写入磁盘，那么数据库无法完全恢复到其原始状态，因为内存中的日志页面在崩溃中丢失了。在这种情况下，你最好有一个不一致的数据库，最坏则有一个损坏的数据库。


    > **注意** 即使你为 `synchronous` 编译指示使用了最保守的设置，也不能保证日志真正提交到了磁盘。这不是 SQLite 的错，而是某些类型的硬件和操作系统的问题。SQLite
    在 Unix 上使用 `fsync()` 系统调用，在 Windows 上使用 `FlushFileBuffers()` 来强制将日志页面写入磁盘。但有报告称这些函数并不总是有效，尤其是使用廉价的
    IDE 磁盘时。显然，一些 IDE 磁盘制造商使用的控制器芯片倾向于在报告数据已写入磁盘表面的同时，却将其缓存在易失性存储器中。此外，有一些（未经证实的）报告称
    Windows 偶尔会忽略 `FlushFileBuffers()`。如果你的硬件或软件对你撒谎，你的事务可能不如你想象的那样持久。


    一旦日志处理完毕，页面管理器就会将所有修改过的页面复制到数据库文件。


    接下来发生的事情取决于事务模式。如果像本例一样，事务自动提交，那么页面管理器会清理日志，清除页面缓存，并从 **EXCLUSIVE** 进入 **UNLOCKED**。如果事务不提交，那么页面管理器继续持有
    **EXCLUSIVE** 锁，日志保持有效，直到发出 `COMMIT` 或 `ROLLBACK`。


    ## 自动提交与效率


    考虑到所有这些，请思考在显式事务中运行的 `UPDATE` 与在自动提交模式下运行的 `UPDATE` 会发生什么。在自动提交模式下，每个修改数据库的命令都在一个单独的事务中运行，并经历以下路径：


    ```

    UNLOCKED → PENDING → SHARED → RESERVED → PENDING → EXCLUSIVE → UNLOCKED

    ```


    此外，每次遍历此路径都涉及创建、提交和清除回滚日志。这一切都会累积起来。虽然在自动提交模式下运行多个 `SELECT` 在性能上可能问题不大，但对于频繁的写入，你真的应该重新考虑自动提交模式。


    而且，正如在 `SELECT` 情况下提到的，当以自动提交模式运行多个命令时，无法阻止其他连接在命令之间出现并修改数据库。如果你有两个更新依赖于数据库中的特定值，因此，你应该总是在同一个事务中运行它们。


    ## 锁定与崩溃恢复


    SQLite 的锁定实现基于标准的文件锁定。SQLite 在数据库文件上保持三种不同的文件锁：一个保留字节（reserved byte）、一个挂起字节（pending
    byte）和一个共享区域（shared region）。


    一切都从挂起字节开始。要从 **UNLOCKED** 移动到 **SHARED**，连接首先尝试获取挂起字节上的读锁。如果成功，它会在共享区域中获取一个随机字节的读锁，并释放挂起字节上的读锁。要从
    **SHARED** 移动到 **RESERVED**，连接尝试在保留字节上获取写锁。要从 **RESERVED** 进入 **EXCLUSIVE**，连接尝试在挂起字节上获取写锁。如果成功，这就会导致损耗过程，因为其他连接无法再获取挂起字节上的读锁来进入
    **SHARED**。最后，要获取 **EXCLUSIVE** 锁，连接尝试在整个共享区域上获取写锁。由于共享区域保存着所有其他活动连接的读锁，此步骤保证
    **EXCLUSIVE** 锁仅在所有其他 **SHARED** 锁首先被释放后才被授予。'
- fmt: 'SQLite的崩溃恢复机制使用保留字节来确定何时需要恢复数据库。由于日志文件和`RESERVED`锁总是相伴出现，如果分页器看到日志文件却没有看到对应的锁，那就说明出了问题。每次分页器打开数据库文件或尝试从数据库中获取页面时，都会进行一个简单的完整性检查。如果它发现了一个日志文件，但数据库上没有`RESERVED`锁，那么创建该日志文件的进程必定已经崩溃，或者系统已关闭。这种情况下，该日志被称为热日志，而数据库可能处于不一致的状态。为了修复问题，需要“重放”该日志，以将数据库恢复到被中断事务之前的状态。


    为了开始重放过程，分页器将数据库置于恢复模式。为此，它会直接从`SHARED`锁进入`PENDING`锁，如图中灰线所示（也在图5-3中）。这是它唯一一次进行此转换。跳过`RESERVED`锁的原因有二。首先，通过锁定挂起字节，它可以阻止所有新连接进入数据库。其次，已经在数据库中的连接（持有`SHARED`锁）在下次尝试访问页面时也会看到该热日志。这些连接也将尝试进入恢复模式并重放日志。然而，它们无法做到这一点，因为第一个连接已经持有了`PENDING`锁。因此，通过直接从`SHARED`转换到`PENDING`，第一个连接确保（1）没有新连接可以进入数据库，以及（2）持有`SHARED`锁的活跃连接无法进入恢复模式。除了正在恢复的连接，其他所有连接都被暂时挂起。


    基本上，热日志是一种隐式的`EXCLUSIVE`锁。如果一个写入者崩溃了，在某个连接将其恢复之前，数据库中不能进行任何进一步的活动。下一个尝试访问页面的分页器将会看到热日志，将其他人锁定在外，并开始恢复。如果没有其他活跃连接，那么第一个连接到数据库的程序将会检测到热日志并开始恢复。


    ## 调整页面缓存大小


    如果我们修改前面的例子，假设它以一个`begin`开始，后面跟着一个`update`，并且在进行所有这些修改的过程中，页面缓存被填满（内存耗尽），SQLite应该如何响应？也就是说，`update`导致的修改页面数量超过了页面缓存的容量。现在会发生什么？


    ### 转换到独占模式


    真正的问题是，分页器究竟在何时以及为何从`RESERVED`锁转换到`EXCLUSIVE`锁？有两种场景，你已经都见过了。要么是连接到达提交点并有意进入`EXCLUSIVE`模式，要么是页面缓存填满且别无选择。我们刚刚看了提交点的场景。那么，当页面缓存填满时会发生什么？简单地说，分页器无法再存储更多修改过的页面，因此无法继续工作。它被迫进入`EXCLUSIVE`模式以继续执行。实际上，这并不完全正确，因为存在一个软限制和一个硬限制。


    软限制对应于页面缓存第一次被填满的时刻。此时，缓存中混合了已修改和未修改的页面。在这种情况下，分页器会尝试清理页面缓存。它会逐页遍历缓存，寻找未修改的页面并将其清除。完成此操作后，它可以利用释放出的内存继续勉强工作，直到缓存再次被填满。它会重复此过程，直到缓存完全由修改过的页面组成。这就是硬限制。此时，分页器别无选择，只能进入`EXCLUSIVE`模式。


    `RESERVED`状态，正是`cache_size`编译指示发挥作用的地方。正如第4章所解释的，`cache_size`控制着页面缓存的大小。页面缓存越大，分页器能存储的修改页面就越多，连接在必须进入`EXCLUSIVE`模式之前能做的工作也就越多。


    同样如前所述，通过在`RESERVED`模式下完成所有数据库工作，你可以最小化在`EXCLUSIVE`模式下的停留时间。如果你能在`RESERVED`模式下完成所有工作，那么`EXCLUSIVE`锁只需要持有足够长的时间来将修改过的页面刷新到磁盘——而不是编译更多查询、处理更多结果然后再写入磁盘。在`RESERVED`模式下进行处理可以显著提高整体并发性。理想情况下，如果你有一个大型事务或一个拥挤的数据库，并且内存充足，尝试确保你的缓存大小足够大，以尽可能长地将连接保持在`RESERVED`模式。


    ### 确定缓存大小


    那么，如何确定缓存大小应该设为多少呢？这取决于你要做什么。假设你想更新`episodes`表中的每条记录。在这种情况下，你知道该表中的每个页面都将被修改。因此，你需要弄清楚`episodes`表中有多少个页面，并相应地调整缓存大小。你可以使用`sqlite3_analyzer`获取关于`episodes`所需的所有信息。对于每个表，它会转储详细的统计信息，包括总页数。例如，如果你在`foods`数据库上运行它，你会得到以下关于`episodes`的信息：


    ```

    ***** Table EPISODES ******************************************************

    **Percentage of total database.......... 20.0%

    **Number of entries..................... 181

    **Bytes of storage consumed............. 5120

    **Bytes of payload...................... 3229 63.1%

    **Average payload per entry............. 17.84

    **Average unused bytes per entry........ 5.79

    **Average fanout........................ 4.00

    **Maximum payload per entry............. 38

    **Entries that use overflow............. 0 0.0%

    **Index pages used...................... 1

    **Primary pages used.................... 4

    **Overflow pages used................... 0

    **Total pages used...................... 5

    **Unused bytes on index pages........... 990 96.7%

    **Unused bytes on primary pages......... 58 1.4%

    **Unused bytes on overflow pages........ 0

    **Unused bytes on all pages............. 1048 20.5%

    ```


    总页数是5。但其中只有4页是实际的表数据——1页是索引。


    由于默认的缓存大小是2000页，你完全不用担心。`episodes`表中大约有400条记录，这意味着每页大约有100条记录。除非`episodes`表至少有196,000行，否则你无需在更新每条记录之前担心调整页面缓存。请记住，只有在存在其他连接使用数据库且并发性成为问题的环境中，你才需要这样做。如果只有你一个人使用数据库，那真的无关紧要。


    ### 等待锁


    我们之前谈到了分页器等待从`PENDING`锁进入`EXCLUSIVE`锁。等待锁究竟涉及什么？首先，任何对`exec()`或`step()`的调用都可能涉及等待锁。每当SQLite遇到无法获取锁的情况时，默认行为是向发出锁请求的函数返回`SQLITE_BUSY`。无论你执行什么命令，都有可能遇到`SQLITE_BUSY`。正如你现在所知道的，如果有一个写入者正在等待或正在写入，`SELECT`命令可能无法获取`SHARED`锁。遇到`SQLITE_BUSY`时，最简单的做法就是重试该调用。然而，我们很快会看到，这并不总是最佳行动方案。


    #### 使用忙碌处理器'
  raw: 'SQLite’s crash recovery mechanism uses the reserved byte to determine when
    a database needs to be restored. Since the journal file and the **RESERVED** lock
    go hand in hand, if the pager sees the former without the latter, then something
    is wrong. Every time the pager opens a database file or tries to fetch a page
    from the database, it does a simple consistency check. If it finds a journal file
    but no **RESERVED** lock on the database, then the process that created the journal
    file must have crashed, or the system went down. In this case, the journal is
    called a hot journal, and the database is potentially in an inconsistent state.
    To make things right, the journal needs to be “played back” to restore the database
    to its original state before the interrupted transaction.


    To start the play back, the pager puts the database into recovery mode. To do
    this, it goes directly from **SHARED** to **PENDING** as shown by the gray line
    in the illustration (and also in Figure 5-3). This is the only time it ever makes
    this transition. The reason it skips the reserved lock is twofold. First, by locking
    the pending byte, it keeps all new connections out of the database. Second, connections
    that are already in the database (in **SHARED**) will also see the hot journal
    the next time they try to access a page. Those connections will attempt to go
    into recovery mode and replay the journal as well. However, they won’t be able
    to because the first connection already has the **PENDING** lock. Thus, by going
    straight from **SHARED** to **PENDING**, the first connection ensures that (1)
    no new connections can enter the database and (2) active 144


    CHAPTER 5 ■ SQLITE DESIGN AND CONCEPTS


    connections in **SHARED** cannot go into recovery mode. Everyone but the restoring
    connection is temporarily suspended.


    Basically, a hot journal is an implicit **EXCLUSIVE** lock. If a writer crashes,
    no further activity can transpire in the database until some connection restores
    it. The next pager to access a page will see the hot journal, lock everyone out,
    and start recovery. If there are no other active connections, then the first program
    to connect to the database will detect the hot journal and start recovery.


    Tuning the Page Cache


    If we change the previous example and say that it started with a **begin**, followed
    by the **update**, and in the middle of making all those modifications the page
    cache fills up (runs out of memory), how should SQLite respond? That is, the **update**
    results in more modified pages than will fit in the page cache. What happens now?


    Transitioning to Exclusive


    The real question is, when exactly does the pager move from **RESERVED** to **EXCLUSIVE**
    and why? There are two scenarios, and you’ve just seen them both. Either the connection
    reaches the commit point and deliberately enters **EXCLUSIVE** or the page cache
    fills up and it has no other option. We just looked at the commit point scenario.
    So, what happens when the page cache fills up? Put simply, the pager can no longer
    store any more modified pages and therefore can no longer do any work. It is forced
    to move into **EXCLUSIVE** in order to continue. In reality, this is not entirely
    true because there is a soft limit and a hard limit.


    The soft limit corresponds to the first time the page cache fills up. At this
    point, the cache is a mixed bag of modified and unmodified pages. In this case,
    the pager tries to clean out the page cache. It goes through the cache page by
    page looking for unmodified pages and clearing them out. Once it does that, it
    can sputter along with what memory has freed up until the cache fills up again.
    It repeats the process until the cache is completely made up of modified pages.
    And that is that hard limit. At this point, the pager has no other recourse but
    to proceed into **EXCLUSIVE**.


    The **RESERVED** state, then, is where the **cache_size** pragma makes a difference.
    Just as explained in Chapter 4, **cache_size** controls the size of the page cache.
    The bigger the page cache, the more modified pages the pager can store, and the
    more work the connection can do before having to enter **EXCLUSIVE**.


    Also, as mentioned, by doing all the database work in **RESERVED**, you minimize
    the time in **EXCLUSIVE**. If you get all your work done in **RESERVED**, then
    **EXCLUSIVE** is held only long enough to flush modified pages to disk—not compile
    *more* queries and process *more* results and then write to disk. Doing the processing
    in **RESERVED** can significantly increase overall concurrency. Ideally, if you
    have a large transaction or a congested database and you can spare the memory,
    try to ensure that your cache size is large enough to hold your connection in
    **RESERVED** as long as possible.


    Sizing the Page Cache


    So, how do you determine what the cache size should be? It depends on what you
    are doing. Say that you want to update every record in the **episodes** table.
    In this case, you know that every page in the table will be modified. Therefore,
    you figure out how many pages are in **episodes** and adjust the cache size accordingly.
    You can get all the information you need on **episodes** using **sqlite3_analyzer**.
    For each 145


    CHAPTER 5 ■ SQLITE DESIGN AND CONCEPTS


    table, it will dump detailed statistics, including the total page count. For example,
    if you run it on the **foods** database, you get the following information about
    **episodes**:


    ***** Table EPISODES *****************************************************


    **Percentage of total database.......... 20.0%**


    **Number of entries..................... 181**


    **Bytes of storage consumed............. 5120**


    **Bytes of payload...................... 3229 63.1%**


    **Average payload per entry............. 17.84**


    **Average unused bytes per entry........ 5.79**


    **Average fanout........................ 4.00**


    **Maximum payload per entry............. 38**


    **Entries that use overflow............. 0 0.0%**


    **Index pages used...................... 1**


    **Primary pages used.................... 4**


    **Overflow pages used................... 0**


    **Total pages used...................... 5**


    **Unused bytes on index pages........... 990 96.7%**


    **Unused bytes on primary pages......... 58 1.4%**


    **Unused bytes on overflow pages........ 0**


    **Unused bytes on all pages............. 1048 20.5%**


    **The total page count is 5\. But of those, only 4 pages of actual table are used—1
    page is an index.


    Since the default cache size is 2,000 pages, you have nothing to worry about.
    There are about 400 records in **episodes**, which means there are about 100 records
    per page. You wouldn’t have to worry about adjusting the page cache before updating
    every record unless there were at least 196,000 rows in **episodes**. And remember,
    you would only need to do this in environments where there are other connections
    using the database and concurrency is an issue. If you are the only one using
    the database, then it really wouldn’t matter.


    Waiting for Locks


    We talked earlier about the pager waiting to go from **PENDING** to **EXCLUSIVE**.
    What exactly is involved with waiting on a lock? First, any call to **exec()**
    or **step()** can involve waiting on a lock. Whenever SQLite encounters a situation
    where it can’t get a lock, the default behavior is to return **Delete SQLITE_BUSY**
    to the function that caused it to seek the lock. Regardless of the command you
    execute, you can potentially encounter **SQLITE_BUSY**. **SELECT** commands, as
    you know by now, can fail to get a **SHARED** lock if a writer is pending or writing.
    The simple thing to do when you get **SQLITE_BUSY** is to just retry the call.
    However, we will see shortly that this is not always the best course of action.


    Using a Busy Handler'
  trans: '

    SQLite 的崩溃恢复机制利用保留字节来判断何时需要恢复数据库。由于日志文件总是与`RESERVED`锁相伴出现，如果分页器检测到日志文件却未见对应的锁，就表明出现了问题。每当分页器打开数据库文件或尝试从数据库获取页面时，都会进行一项简单的完整性检查。若发现日志文件存在但数据库上没有`RESERVED`锁，则创建该日志文件的进程必定已崩溃，或系统已关闭。此时，该日志被称为热日志，而数据库可能处于不一致状态。为修复问题，需要“重放”该日志，以将数据库恢复至被中断事务之前的状态。


    为启动重放过程，分页器将数据库置于恢复模式。为此，它会直接从`SHARED`锁转换到`PENDING`锁，如图中灰线所示（亦在图 5-3 中）。这是它唯一一次进行此转换。跳过`RESERVED`锁的原因有二：首先，通过锁定挂起字节，它可以阻止所有新连接进入数据库；其次，已在数据库中的连接（持有`SHARED`锁）在下次尝试访问页面时也会看到该热日志。这些连接同样将尝试进入恢复模式并重放日志。然而，由于第一个连接已持有`PENDING`锁，它们无法做到这一点。因此，通过直接从`SHARED`转换到`PENDING`，首个连接确保（1）无新连接可进入数据库，以及（2）持有`SHARED`锁的活跃连接无法进入恢复模式。除正在恢复的连接外，其余所有连接均被暂时挂起。


    本质上，热日志是一种隐式的`EXCLUSIVE`锁。若有写入者崩溃，在某个连接将其恢复之前，数据库中无法进行任何进一步活动。下一个尝试访问页面的分页器将检测到热日志，将其他连接锁定在外，并开始恢复。若无其他活跃连接，则首个连接到数据库的程序将检测到热日志并启动恢复。


    ## 调整页面缓存大小


    如果我们修改前例，假设它以一个`begin`开始，后接一个`update`，并且在进行所有这些修改的过程中，页面缓存被填满（内存耗尽），SQLite 应如何响应？即，`update`导致的修改页面数量超过了页面缓存的容量。现在会发生什么？


    ### 转换到独占模式


    真正的问题是，分页器究竟在何时以及为何从`RESERVED`锁转换到`EXCLUSIVE`锁？有两种场景，你已都见过：要么是连接到达提交点并有意进入`EXCLUSIVE`模式，要么是页面缓存填满且别无选择。我们刚看了提交点的场景。那么，当页面缓存填满时会发生什么？简言之，分页器无法再存储更多修改过的页面，因而无法继续工作。它被迫进入`EXCLUSIVE`模式以继续执行。实际上，这并不完全正确，因为存在软限制和硬限制。


    软限制对应于页面缓存首次被填满的时刻。此时，缓存中混合了已修改和未修改的页面。这种情况下，分页器会尝试清理页面缓存。它会逐页遍历缓存，寻找未修改的页面并将其清除。完成此操作后，它可以利用释放出的内存继续勉强工作，直至缓存再次被填满。它会重复此过程，直至缓存完全由修改过的页面组成。这就是硬限制。此时，分页器别无选择，只能进入`EXCLUSIVE`模式。


    在`RESERVED`状态，正是`cache_size`编译指示发挥作用之处。正如第 4 章所解释，`cache_size`控制着页面缓存的大小。页面缓存越大，分页器能存储的修改页面就越多，连接在必须进入`EXCLUSIVE`模式之前能做的工作也就越多。


    同样如前所述，通过在`RESERVED`模式下完成所有数据库工作，你可以最小化在`EXCLUSIVE`模式下的停留时间。如果你能在`RESERVED`模式下完成所有工作，那么`EXCLUSIVE`锁只需持有足够长的时间来将修改过的页面刷新到磁盘——而非编译更多查询、处理更多结果然后再写入磁盘。在`RESERVED`模式下进行处理可以显著提高整体并发性。理想情况下，如果你有一个大型事务或一个拥挤的数据库，并且内存充足，尝试确保你的缓存大小足够大，以尽可能长地将连接保持在`RESERVED`模式。


    ### 确定缓存大小


    那么，如何确定缓存大小应设为多少？这取决于你要做什么。假设你想更新`episodes`表中的每条记录。在这种情况下，你知道该表中的每个页面都将被修改。因此，你需要弄清楚`episodes`表中有多少个页面，并相应地调整缓存大小。你可以使用`sqlite3_analyzer`获取关于`episodes`所需的所有信息。对于每个表，它会转储详细的统计信息，包括总页数。例如，如果你在`foods`数据库上运行它，你会得到以下关于`episodes`的信息：


    ```

    ***** Table EPISODES ******************************************************

    **Percentage of total database.......... 20.0%

    **Number of entries..................... 181

    **Bytes of storage consumed............. 5120

    **Bytes of payload...................... 3229 63.1%

    **Average payload per entry............. 17.84

    **Average unused bytes per entry........ 5.79

    **Average fanout........................ 4.00

    **Maximum payload per entry............. 38

    **Entries that use overflow............. 0 0.0%

    **Index pages used...................... 1

    **Primary pages used.................... 4

    **Overflow pages used................... 0

    **Total pages used...................... 5

    **Unused bytes on index pages........... 990 96.7%

    **Unused bytes on primary pages......... 58 1.4%

    **Unused bytes on overflow pages........ 0

    **Unused bytes on all pages............. 1048 20.5%

    ```


    总页数是 5。但其中只有 4 页是实际的表数据——1 页是索引。


    由于默认的缓存大小是 2000 页，你完全不用担心。`episodes`表中大约有 400 条记录，这意味着每页大约有 100 条记录。除非`episodes`表至少有
    196,000 行，否则你无需在更新每条记录之前担心调整页面缓存。请记住，只有在存在其他连接使用数据库且并发性成为问题的环境中，你才需要这样做。如果只有你一个人使用数据库，那真的无关紧要。


    ### 等待锁


    我们之前谈到了分页器等待从`PENDING`锁进入`EXCLUSIVE`锁。等待锁究竟涉及什么？首先，任何对`exec()`或`step()`的调用都可能涉及等待锁。每当
    SQLite 遇到无法获取锁的情况时，默认行为是向发出锁请求的函数返回`SQLITE_BUSY`。无论你执行什么命令，都有可能遇到`SQLITE_BUSY`。正如你现在所知道的，如果有一个写入者正在等待或正在写入，`SELECT`命令可能无法获取`SHARED`锁。遇到`SQLITE_BUSY`时，最简单的做法就是重试该调用。然而，我们很快会看到，这并不总是最佳行动方案。


    #### 使用忙碌处理器

