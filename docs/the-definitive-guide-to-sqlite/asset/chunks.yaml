- fmt: 'To use the DLL, it needs to either be in the same folder with programs that
    use it, be placed somewhere in the system’s path (see the note on the Windows
    System path in the previous section), or follow Window’s dynamic library loading
    rules for locations searched for DLLs.


    If you want to write programs that use the SQLite DLL, you will need to create
    an import library with which to link your programs. This is quite simple to do
    using the `sqlite3.def` file mentioned earlier. If you are using C++ in Microsoft
    Visual Studio, open the command prompt, change the directory to the SQLite distribution,
    and simply run the following command:


    `LIB /DEF:sqlite3.def`


    You should see normal library generation output similar to the following example:


    ```

    C:\sqlite>lib /DEF:sqlite3.def


    Microsoft (R) Library Manager Version 10.00.30319.01


    Copyright (C) Microsoft Corporation. All rights reserved.


    LINK : warning LNK4068: /MACHINE not specified; defaulting to X86


    Creating library sqlite3.lib and object sqlite3.exp

    ```


    This will generate an import library named `sqlite3.lib` and an exports file named
    `.exp`. If you are using MinGW (see the section “Building SQLite with MinGW” later
    in this chapter), run this command: 21


    ## CHAPTER 2: GETTING STARTED


    If you are using MinGW, run this command:


    `dlltool --def sqlite3.def --dllname sqlite3.dll --output-lib sqlite3.lib`


    The `dlltool` for MinGW will also create an import library called `sqlite3.lib`
    with which you can link your programs. By linking your programs to this import
    library, they will load and use the SQLite DLL upon execution.


    ### Compiling the SQLite Source Code on Windows


    Building SQLite from source within Windows is straightforward. Depending on the
    compiler you are using and what you are trying to achieve, there are several approaches
    to compiling SQLite. The most common scenarios on Windows include using Microsoft
    Visual C++, MinGW, or Eclipse (which often uses MinGW for C++ work). We’ll cover
    each of these here. You can find information about how to compile SQLite with
    other compilers on the SQLite wiki ([`www.sqlite.org/cvstrac/`](http://www.sqlite.org/cvstrac/wiki?p=HowToCompile)
    [`wiki?p=HowToCompile`](http://www.sqlite.org/cvstrac/wiki?p=HowToCompile)).


    ### The Stable Source Distribution


    You can obtain stable versions of SQLite’s source code in zip files from the SQLite
    website. Bleeding-edge versions can be obtained from the Fossil distributed source
    control system maintained by the SQLite team. Unless you are familiar with Fossil,
    using the source distribution is the easiest way to go. To download a stable source
    distribution, follow these steps:


    1. Go to the SQLite website, [`www.sqlite.org`](http://www.sqlite.org). Follow
    the download link, which will take you to the download page.

    2. On the download page, find the Source Code section.

    3. The first file listed is the recommended zip file containing the source code
    and suitable for compilation for Windows. The file will be named `sqlite-amalgamation-3-x_y_z.zip`,
    where `x`, `y`, and `z` (and possibly further minor digits) are the minor-version
    numbers.


    **Note** The zip archive and the other tarballs on the download page differ slightly
    in their contents. Although they contain identical source code, the SQLite distribution
    uses some POSIX build tools (`sed`, `awk`, and so on) to dynamically generate
    some C source code in the build process. These build tools are not available by
    default on Windows systems. Therefore, the zip source archive includes all the
    preprocessing and generated code as a matter of convenience to Windows users who
    lack the build support infrastructure of Linux, Unix, Mac OS X, and so on. This
    is why Windows users should use the zip archives rather than the tarballs on the
    download page. It is still possible to build the tarballs on Windows, but you
    need the requisite build tools from a source such as Cygwin, MinGW, GnuWin32,
    or similar.


    4. Extract/unzip the file to a directory of your choosing. The extracted contents'
