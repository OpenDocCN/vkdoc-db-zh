    **while stmt.step()**


    **print stmt.column(''name'')**


    **c1.exec(''update episodes set *<some columns, criteria, etc.>*** **)**


    **end**


    **stmt.finalize()**


    **c1.exec(''commit'')**


    **c1.close()**


