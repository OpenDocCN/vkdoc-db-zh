- fmt: "# CHAPTER 2 ■ GETTING STARTED\n\n## SQLite Analyzer\nThe Analyzer tool is\
    \ useful for inspecting many qualities and statistics about a given SQLite database\
    \ file, including things such as physical data distribution and layout within\
    \ the file, relative fragmentation, internal data size and free space, and other\
    \ measures. This information is very useful for performance optimization work.\n\
    \n## Tcl extension\nThis binary incorporates the Tcl language extensions with\
    \ the SQLite core. This allows you to connect to SQLite from within the Tcl language.\
    \ Tcl and C are the two language bindings provided by the SQLite team themselves.\
    \ Other language bindings are covered in Chapter 8.\n\n## SQLite’s source code\n\
    SQLite’s source code is provided in a variety of forms for convenience and to\
    \ target different platforms. The main differences in the source distributions\
    \ concern whether the code is amalgamated into a single source file and header\
    \ or left in constituent files. There is also a source package incorporating the\
    \ Tcl Extension Architecture (TEA) for those who want to compile SQLite with Tcl\
    \ bindings.\n\nThe SQLite amalgamated source appears twice on the website—once\
    \ as a zip file and again as a gzipped tarball. The source code itself does not\
    \ differ between these source distributions. The zip file is generally recommended\
    \ and in particular is the only source readily suitable for compilation on Windows\
    \ (unless you prefer going to laborious effort on that platform). The zip file\
    \ source distribution benefits from already having certain preprocessing and code\
    \ generation performed on the code by build tools like GNU `autoconf`. This means\
    \ Windows users don’t need to hunt down Windows-specific equivalents for these\
    \ tools. The gzipped tarball is targeted to users of Linux, Unix flavors, Mac\
    \ OS X, BSD variants, and so on. These platforms include in their normal distributions\
    \ the expected tool chain to do much of the preprocessing work, as well as normal\
    \ compilation, so users of those platforms can adopt this source package in the\
    \ knowledge they need not hunt down additional tools to compile SQLite.\n\nNote\
    \ that there is currently no precompiled `.dylib` shared library for Mac OS X.\n\
    \n## SQLite on Windows\nWhether you are using SQLite as an end user, writing programs\
    \ that use SQLite, or using it as a learning platform for relational theory and\
    \ SQL, SQLite can be installed on Windows with a minimum of fuss. In this section,\
    \ we will cover all the options, from installing the available binary packages\
    \ to building everything from source using the most popular compilers. We start\
    \ with the easy things first and progress to things more technically challenging.\n\
    \n### Getting the Command-Line Program\nThe SQLite command-line program (hereafter\
    \ referred to as the CLP) is by far the easiest way to get started using SQLite.\
    \ Follow these steps to obtain the CLP:\n\n1.  Open your favorite browser, and\
    \ navigate to the SQLite home page at `www.sqlite.org`.\n2.  Click the download\
    \ link at the top of the page. This will take you to the download page.\n    ![](index-41_1.jpg)\n\
    3.  Scroll down to the section Precompiled Binaries For Windows, where you will\
    \ find filenames along the lines of `sqlite-3_x_y_z.zip`, where `x`, `y`, and\
    \ `z` are the minor-version numbers. There should be a comment beside it that\
    \ reads “A command-line program for accessing and modifying SQLite databases.”\
    \ Download this file to your Windows environment.\n4.  Unzip the file, either\
    \ using Windows built-in support for zip files or using your favorite third-party\
    \ compression tool such as WinZip or 7-Zip. The zip file should contain a single\
    \ file named `sqlite3.exe`. You can start using the file from the location in\
    \ which you unzipped it, or if you would like to run the CLP"
