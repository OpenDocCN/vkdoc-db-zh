    provide a way to create different text comparison and sorting methods. This is
    done in the API by the


    **sqlite3_create_collation()** function. SQLite provides three default collations:
    **BINARY**, **NOCASE**, and **RTRIM**. **BINARY** compares string values using
    the C function **memcmp()** (which for all intents and purposes is case sensitive).
    **NOCASE** is just the opposite—its sorting is case insensitive. The **RTRIM**
    collation works like BINARY except that it ignores trailing spaces.


    User-defined collations are especially helpful for locales that are not well served
    by the default **BINARY** collation or those that need support for UTF-16\. They
    can also be helpful in specific applications such as sorting date formats that
    don’t lend themselves to both lexicographical and chronological order.


    Chapter 7 illustrates implementing a user-defined collation to sort Oracle dates
    natively in SQLite.


    Transactions


    By now you should have a picture of how the API is laid out. You’ve seen different
    ways to execute SQL


    commands along with some helpful utility functions. Executing SQL commands, however,
    involves more than just knowing what’s in the API. Transactions and locks are
    closely intertwined with query


    processing. Queries are always performed within transactions, transactions involve
    locks, and locks can cause problems if not managed properly. You can control both
    the type and duration of locks by how you use SQL and the way you write code.


    Chapter 4 illustrated a specific scenario where deadlocks can arise just by the
    way that two


    connections manage transactions through SQL alone. As a programmer, you will have
    another variable to juggle—code—which can contain multiple connections in multiple
    states with multiple statement handles on multiple tables at any given time. All
    it takes is a single statement handle, and your code may be holding an **EXCLUSIVE**
    lock without you even realizing it, preventing other connections from getting
    anything done.


    That is why it is critical that you have good grasp of how both transactions and
    locks work and how they relate to the various API functions used to perform queries.
    Ideally, you should be able to look at the code you write and tell what transaction
    states it will be in or at least be able to spot potential problems.


    In this section, we will explore the mechanics behind transactions and locks and
    in the next section observe them at work in actual code.


    Transaction Life Cycles


    There are a couple of things to consider with code and transactions. First there
    is the issue of knowing which objects run under which transactions. Next there
    is the question of duration—when does a


    transaction start and when does it end, and at what point does it start to affect
    other connections? The first question relates directly to the API. The second
    relates to SQL in general and SQLite’s


    implementation in particular.


    CHAPTER 5 ■ SQLITE DESIGN AND CONCEPTS


    As you know, multiple statement handles can be allocated from a single connection.
    As shown in


    Figure 5-2, each connection has exactly one B-tree and one pager object associated
    with it per database.


    The pager plays a bigger role than the connection in this discussion because it
    manages transactions, locks, the memory cache, and crash recovery—all of which
    will be covered in the next few sections. You could just as easily say that the
    connection object handles all of this, but in reality it is the pager within it.


    The important thing to remember is that when you write to the database, you do
    so with one


    connection, one transaction at a time. Thus, all statement objects run within
    the single transaction context of the connections from which they are derived.
    This answers the first question.'
  trans: "\n用户自定义扩展必须逐个连接进行注册，因为它们存储在程序内存中。也就是说，它们不像大型关系数据库系统中的存储过程那样存储在数据库里，而是存储在你的程序中。当你的程序或脚本启动时，它负责为其打算使用这些扩展的每个连接注册所需的用户自定义扩展。\n\
    \n## 创建用户自定义函数\n\n实现用户自定义函数是一个两步过程。首先，你需要编写处理程序。该处理程序执行你想从 SQL 中完成的操作。接下来，你注册该处理程序，提供其\
    \ SQL 名称、参数个数以及一个指向处理程序的指针（或引用）。\n\n例如，假设你想创建一个名为 `hello_newman()` 的特殊 SQL 函数，它返回文本\
    \ `'Hello Jerry'`。在 SQLite C API 中，你需要先创建一个 C 函数来实现它，如下所示：\n\n```c\nvoid hello_newman(sqlite3_context*\
    \ ctx, int nargs, sqlite3_value** values)\n{\n    /* Create Newman's reply */\n\
    \    const char *msg = \"Hello Jerry\";\n    /* Set the return value.*/\n    sqlite3_result_text(ctx,\
    \ msg, strlen(msg), SQLITE_STATIC);\n}\n```\n\n如果你不懂 C 或 C API 也不用担心。这个处理程序只是返回\
    \ `'Hello Jerry'`。接下来，为了实际使用它，你需要使用 `sqlite3_create_function()`（或你所用语言中的等效函数）来注册这个处理程序：\n\
    \n```c\nsqlite3_create_function(db, \"hello_newman\", 0, hello_newman);\n```\n\
    \n第一个参数 (`db`) 是数据库连接。第二个参数是函数在 SQL 中出现的名称，第三个参数表示该函数不接受参数。（如果你提供-1，则表示该函数接受可变数量的参数。）最后一个参数是指向\
    \ `hello_newman()` C 函数的指针，当 SQL 函数被调用时，它将被调用。\n\n一旦注册，SQLite 就知道当遇到 SQL 函数 `hello_newman()`\
    \ 时，它需要调用 C 函数 `hello_newman()` 来获取结果。现在，你可以在程序中执行 `select hello_newman()`，它将返回包含文本\
    \ `'Hello Jerry'` 的单行单列结果。\n\n正如第 4 章提到的，用户自定义函数是通过将它们嵌入到 `check` 约束中来实现专门领域约束的一种便捷方法。\n\
    \n## 创建用户自定义聚合函数\n\n聚合函数是应用于结果集中所有记录并从中计算某种聚合值的函数。`sum()`、`count()` 和 `avg()`\
    \ 是 SQLite 中标准 SQL 聚合函数的例子。\n\n实现用户自定义聚合是一个三步过程：你注册聚合函数，实现一个为结果集中每条记录调用的步进函数（step\
    \ function），并实现一个在记录处理完成后调用的终结函数（finalize function）。`finalize` 函数让你计算最终的聚合值并进行任何必要的清理。\n\
    \n以下是在 SQLite 的 Python 扩展之一中实现一个名为 `pysum` 的简单 `SUM()` 聚合的例子：\n\n```python\nconnection=apsw.Connection(\"\
    foods.db\")\ndef step(context, *args):\n    context['value'] += args[0]\ndef finalize(context):\n\
    \    return context['value']\ndef pysum():\n    return ({'value' : 0}, step, finalize)\n\
    connection.createaggregatefunction(\"pysum\", pysum)\nc = connection.cursor()\n\
    print c.execute(\"select pysum(id) from foods\").next()[0]\n```\n\n`createaggregatefunction()`\
    \ 函数注册聚合函数，传入 `step()` 函数和 `finalize` 函数。SQLite 向 `step()` 传递一个上下文（context），该上下文用于在\
    \ `step()` 调用之间存储中间值。在这个例子中，它是运行中的总和。在处理完最后一条记录后，SQLite 调用 `finalize()`。在这里，`finalize()`\
    \ 只是返回聚合的总和。SQLite 会自动负责清理上下文。\n\n## 创建用户自定义排序规则\n\n排序规则定义了字符串值的比较方式。因此，用户自定义排序规则提供了一种创建不同文本比较和排序方法的方式。在\
    \ API 中，这是通过 `sqlite3_create_collation()` 函数完成的。SQLite 提供了三种默认排序规则：`BINARY`、`NOCASE`\
    \ 和 `RTRIM`。`BINARY` 使用 C 函数 `memcmp()` 比较字符串值（该函数在大多数情况下是区分大小写的）。`NOCASE` 则相反——它的排序不区分大小写。`RTRIM`\
    \ 排序规则的工作方式类似于 `BINARY`，但它会忽略尾部空格。\n\n对于默认 `BINARY` 排序规则无法很好支持的区域设置，或者需要支持 UTF-16\
    \ 的情况，用户自定义排序规则尤其有用。它们在特定应用中也很有帮助，例如对那些既不符合字典顺序也不符合时间顺序的日期格式进行排序。\n\n第 7 章展示了实现一个用户自定义排序规则，以便在\
    \ SQLite 中按 Oracle 日期原生排序。\n\n## 事务\n\n到现在为止，你应该对 API 的布局有了概念。你已经看到了执行 SQL 命令的不同方式以及一些有用的实用函数。然而，执行\
    \ SQL 命令不仅仅涉及知道 API 中有什么。事务和锁与查询处理紧密交织。查询总是在事务中执行，事务涉及锁，而如果管理不当，锁会导致问题。你可以通过你使用\
    \ SQL 的方式和编写代码的方式来控制锁的类型和持续时间。\n\n第 4 章阐述了一个特定场景，其中仅仅通过两个连接仅通过 SQL 管理事务的方式，就可能出现死锁。作为程序员，你将有另一个需要同时处理的变量——代码——在任意给定时刻，代码中可能包含处于多种状态的多个连接、多个语句句柄和多个表。只需一个语句句柄，你的代码就可能在你不知情的情况下持有一个\
    \ `EXCLUSIVE` 锁，从而阻止其他连接完成任何工作。\n\n这就是为什么你必须透彻理解事务和锁的工作原理，以及它们与用于执行查询的各种 API 函数之间的关系。理想情况下，你应该能够查看你编写的代码，并说出它将处于什么事务状态，或者至少能够发现潜在的问题。\n\
    \n在本节中，我们将探讨事务和锁背后的机制，并在下一节中观察它们在实际代码中的运行情况。\n\n### 事务生命周期\n\n关于代码和事务，有几件事需要考虑。首先是了解哪些对象在哪些事务下运行的问题。其次是持续时间的问题——事务何时开始、何时结束，以及在哪个时间点它开始影响其他连接？第一个问题直接关系到\
    \ API。第二个问题与 SQL 的一般知识以及 SQLite 的具体实现有关。\n\n如你所知，可以从单个连接分配多个语句句柄。如图 5-2 所示，每个连接对于每个数据库恰好关联一个\
    \ B 树和一个分页器（pager）对象。在这个讨论中，分页器扮演的角色比连接更重要，因为它管理事务、锁、内存缓存和崩溃恢复——所有这些都将在接下来的几节中介绍。你当然也可以说连接对象处理所有这些，但实际上，是其中的分页器在起作用。\n\
    \n需要记住的重要一点是，当你写入数据库时，一次只能使用一个连接、一个事务。因此，所有语句对象都在它们所源自的连接的单一事务上下文中运行。这就回答了第一个问题。\n"
- fmt: '# CHAPTER 5 ■ SQLITE DESIGN AND CONCEPTS


    As for the second question, transaction duration (or the transaction life cycle)
    is as short as a single statement, or as long as you like—until you say stop.
    By default, a connection operates in autocommit mode, which means that every command
    you issue runs under a separate transaction. Conversely, when you issue a `begin`,
    the transaction endures until you call either a `COMMIT` or a `rollback`, or until
    one of your SQL commands causes a constraint violation that results in a `rollback`.
    The next question is how transactions relate to locks.


    ## Lock States


    For the most part, lock duration shadows transaction duration. Although the two
    don’t always start together, they do always finish together. When you conclude
    a transaction, you free its associated lock. A better way of saying this is that
    a lock is never released until its associated transaction concludes or, in the
    worse case, the program crashes. And if the program or system crashes, the transaction
    doesn’t conclude in which case there is still an implicit lock on the database
    that will be resolved by the next connection to access it. This is covered later
    in the sidebar “Locking and Crash Recovery.”


    There are five different locks states in SQLite, and a connection is always in
    one of them no matter what it’s doing. Figure 5-3 shows SQLite’s lock states and
    transitions. This diagram details every possible lock state a connection can be
    in as well as every path it can take through the life of a transaction. The diagram
    is represented in terms of lock states, lock transitions, and transaction life
    cycles. What you are really looking at in the figure are the lives of transactions
    in terms of locks.


    *Figure 5-3\. SQLite lock transitions*


    Each state has a corresponding lock with the exception of `UNLOCKED`. So, you
    can say a connection “has a `RESERVED` lock” or “is in the `RESERVED` state” or
    just “is in `RESERVED`,” and it all means the same thing. With the exception of
    `UNLOCKED`, for a connection to be in a given state it must first obtain the associated
    lock.


    Every transaction starts at `UNLOCKED`, `RESERVED`, or `EXCLUSIVE`. By default,
    everything begins in `UNLOCKED`, as you can see in Figure 5-3. The locks states
    in white—`UNLOCKED`, `PENDING`, `SHARED`, and `RESERVED`—can all exist at the
    same time between connections in a database. Starting with `PENDING` in gray,
    however, things become more restrictive. The gray `PENDING` state represents the
    lock being held by a single connection, namely, a writer that wants to get to
    `EXCLUSIVE`. Conversely, the white `PENDING` state represents a path where connections
    acquire and release the lock on their way to `SHARED`. Despite all of these different
    lock states, every transaction in SQLite boils down to one of two types: transactions
    that read and transactions that write. That ultimately is what paints the locking
    picture: readers versus writers and how they get along with each other.


    ## Read Transactions


    To start with, let’s go through the lock process of a `select` statement. Its
    path is very simple. A connection that executes a `select` statement starts a
    transaction, which goes from `UNLOCKED` to `SHARED` and upon `commit` back to
    `UNLOCKED`. End of story.


    Now, out of curiosity, what happens when you execute two statements? What is the
    lock path then? Well, it depends on whether you are running in autocommit or not.
    Consider the following example:

    `db = open(''foods.db'')`

    `db.exec(''begin'')`

    `db.exec(''select * from episodes'')`

    `db.exec(''select * from episodes'')`

    `db.exec(''commit'')`

    `db.close()`

    Here, with an explicit `begin`, the two `select` commands execute within a single
    transaction and therefore are executed in the same `SHARED` state. The first `exec()`
    runs, leaving the connection in `SHARED`, and then the second `exec()` runs. Finally,
    the manual `commit` takes the connection from `SHARED` back to `UNLOCKED`. The
    code’s lock path would be as follows:

    `UNLOCKED` → `PENDING` → `SHARED` → `UNLOCKED`


    Now consider the case where there are no `begin` and `commit` lines in the example.
    Then the two `select` commands run in autocommit mode. They will therefore go
    through the entire path independently. The lock path for the code now would be
    as follows:

    `UNLOCKED` → `PENDING` → `SHARED` → `UNLOCKED` → `PENDING` → `SHARED` → `UNLOCKED`


    Since the code is just reading data, it may not make much of a difference, but
    it does have to go through twice the file locks in autocommit mode than it does
    otherwise. And, as you will see, a writer could sneak in between the two `select`
    commands and modify the database between `exec()` calls, so you can’t be sure
    that the two commands will return the same results. With `begin..commit`, on the
    other hand, they are guaranteed to be identical in their results.


    ## Write Transactions


    Now let’s consider a statement that writes to the database, such as an `update`.
    First, the connection has to follow the same path as `select` and get to `SHARED`.
    Every operation—read or write—has to start by going through `UNLOCKED` → `PENDING`
    → `SHARED`. `PENDING`, as you will soon see, is a gateway lock.


    ## The Reserved State


    The moment the connection tries to write anything to the database, it has to go
    from `SHARED` to `RESERVED`. If it gets the `RESERVED` lock, then it is ready
    to start making modifications. Even though the connection cannot actually modify
    the database at this point, it can store modifications in a localized memory cache
    inside the pager, called the *page cache,* mentioned earlier. This cache is the
    same cache you configure with the `cache_size` pragma, as described in Chapter
    4.


    When the connection enters `RESERVED`, the pager initializes the *rollback journal*.
    This is a file (shown in Figure 5-1) that is used in rollbacks and crash recovery.
    Specifically, it holds the database pages needed to restore the database to its
    original state before the transaction. These database pages are put there by the
    pager when the B-tree modifies a page. In this example, for every record the `update`
    command modifies, the pager takes the database page associated with the *original*
    record and copies it out to the journal. The journal then holds some of the contents
    of the database before the transaction.


    Therefore, all the pager has to do in order to undo any transaction is to simply
    copy the contents in the journal back into the database file. Then the database
    is restored to its state before the transaction.


    In the `RESERVED` state, there are actually three sets of pages that the pager
    manages: modified pages, unmodified pages, and journal pages. Modified pages are
    just that—pages containing records that the B-tree has changed. These are stored
    in the page cache. Unmodified pages are pages the B-tree read but did not change.
    These are a product of commands such as `select`. Finally, there are journal pages,
    which are the original versions of modified pages. These are not stored in the
    page cache but rather written to the journal before the B-tree modifies a page.'
