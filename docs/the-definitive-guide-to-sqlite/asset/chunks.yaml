- fmt: "# Data Integrity\n\nData integrity is concerned with defining and protecting\
    \ relationships within and between tables. There are four general types: domain\
    \ integrity, entity integrity, referential integrity, and user-defined integrity.\n\
    \nDomain integrity involves controlling values within columns. Entity integrity\
    \ involves controlling rows in tables. Referential integrity involves controlling\
    \ rows between tables—specifically foreign key relationships. And user-defined\
    \ integrity is a catchall for everything else.\n\nData integrity is implemented\
    \ using constraints. A constraint is a control measure used to restrict the values\
    \ that can be stored in a column or columns. Going by just the values in columns,\
    \ the database can enforce all four types of integrity constraints. In SQLite,\
    \ constraints also include support for conflict resolution. Conflict resolution\
    \ is covered in detail later in this chapter.\n\nLet’s deviate from our `foods`\
    \ database for a moment and focus on the same `contacts` table introduced in Chapter\
    \ 3. The `contacts` table is defined as follows:\n\n```sql\ncreate table contacts\
    \ (\n    id integer primary key,\n    name text not null collate nocase,\n   \
    \ phone text not null default 'UNKNOWN',\n    unique (name,phone)\n);\n```\n\n\
    As you know by now, constraints are part of a table’s definition. They can be\
    \ associated with a column definition or defined independently in the body of\
    \ the table definition. Column-level constraints include `not null`, `unique`,\
    \ `primary key`, `foreign key`, `check`, and `collate`. Table-level constraints\
    \ include `primary key`, `unique`, and `check`. All of these constraints are covered\
    \ in the following sections according to their respective integrity types.\n\n\
    CHAPTER 4 ■ ADVANCED SQL FOR SQLITE\n\nNow that you have familiarity with the\
    \ `update`, `insert`, and `delete` commands in SQLite, the operation of many of\
    \ the constraints will make sense. Just as these commands operate on data, constraints\
    \ operate on them, making sure that they work within the guidelines defined in\
    \ the tables they modify.\n\n## Entity Integrity\n\nRelational theory—as implemented\
    \ in most databases including SQLite—requires that every field in the database\
    \ must be uniquely identifiable and capable of being located. For a field to be\
    \ addressable, its corresponding row must also be addressable. And for that, the\
    \ row must be unique in some way. This is the job of the primary key.\n\nThe primary\
    \ key consists of least one column or a group of columns with a `unique` constraint.\
    \ The `unique` constraint, as you will soon see, simply requires that every value\
    \ in a column (or group of columns) be distinct. Therefore, the primary key ensures\
    \ that each row is somehow distinct from all other rows in a table, ultimately\
    \ ensuring that every field is also addressable. Entity integrity basically keeps\
    \ data organized in a table. After all, what good is data if you can’t find it?\n\
    \n## Unique Constraints\n\nSince primary keys are based on `unique` constraints,\
    \ we’ll start with them. A `unique` constraint simply requires that all values\
    \ in a column or a group of columns are distinct from one another or unique. If\
    \ you attempt to insert a duplicate value or update a value to another value that\
    \ already exists in the column, the database will issue a constraint violation\
    \ and abort the operation. `unique` constraints can be defined at the column or\
    \ the table level. When defined at the table level, `unique` constraints can be\
    \ applied across multiple columns. In this case, the combined value of the columns\
    \ must be unique. In `contacts`, there is a unique constraint on both `name` and\
    \ `phone` together. See what happens if we attempt to insert another `'Jerry'`\
    \ record with a `phone` value `'UNKNOWN'`:\n\n```sql\nsqlite> insert into contacts\
    \ (name,phone) values ('Jerry','UNKNOWN');\nSQL error: columns name, phone are\
    \ not unique\nsqlite> insert into contacts (name) values ('Jerry');\nSQL error:\
    \ columns name, phone are not unique\nsqlite> insert into contacts (name,phone)\
    \ values ('Jerry', '555-1212');\n```\n\nIn the first case, I explicitly specified\
    \ `name` and `phone`. This matched the values of the existing record, and the\
    \ `unique` constraint kicked in and did not let me do it. The third `insert` illustrates\
    \ that the `unique` constraint applies to `name` and `phone` combined, not individually.\
    \ It inserted another row with `'Jerry'` as the value for `name`, which did not\
    \ cause an error, because `name` by itself it not unique—only `name` and `phone`\
    \ together.\n\n93\n\nCHAPTER 4 ■ ADVANCED SQL FOR SQLITE\n\n### NULL AND UNIQUE\n\
    \nBased on your knowledge of `NULL` from Chapter 3 and your new knowledge of `unique`\
    \ constraints, how many `NULL` values can you put in a column that is declared\
    \ `unique`? From a theoretical perspective, the answer is as many `NULL`s as you\
    \ like. Remember that `NULL` is not equal to anything else, even other `NULL`s.\n\
    \nAnd this is the basis for how SQLite handles `NULL` entries in `unique` columns.\
    \ It’s also how other major databases like Oracle and PostgreSQL operate. But\
    \ the database community is divided on this issue. Users of Informix, Sybase,\
    \ and Microsoft SQL Server are limited to only one `NULL` entry in a unique column.\
    \ Those using DB2 are forbidden any at all!\n\n## Primary Key Constraints\n\n\
    In SQLite, a primary key column is always created when you create a table, whether\
    \ you define one or not. This column is a 64-bit integer value called `rowid`.\
    \ It has two aliases, `_rowid_` and `oid`, which can be used to refer to it as\
    \ well. Default values are automatically generated for it.\n\nSQLite provides\
    \ an autoincrement feature for primary keys, should you want to define your own.\
    \ If you define a column’s type as `integer primary key`, SQLite will create a\
    \ `default` value on that column, which will provide an integer value that is\
    \ guaranteed to be unique in that column. In reality, however, this column will\
    \ simply be an alias for `rowid`. They will all refer to the same value. Since\
    \ SQLite uses a 64-bit signed integer for the primary key, the maximum value for\
    \ this column is 9,223,372,036,854,775,807.\n\nEven if you manage to reach this\
    \ limit, SQLite will simply start searching for unique values that are not in\
    \ the column for subsequent `insert`s. When you delete rows from the table, `rowid`s\
    \ may be recycled and reused on subsequent `insert`s. As a result, newly created\
    \ `rowid`s might not always be in strictly ascending order.\n\n■ **Caution** You\
    \ will remember our discussion on relational data not having implicit order when\
    \ we discussed the `order by` statement in Chapter 3. This is another strong reminder\
    \ never to assume data in a relational database such as SQLite has any particular\
    \ order—even when your instincts say it should be safe.\n\nIf you want SQLite\
    \ to use unique automatic primary key values for the life of the table—and not\
    \ “fill in the gaps”—then add the `autoincrement` keyword after the `integer primary\
    \ key` clause.\n\nIn the examples so far, you have managed to insert two records\
    \ into `contacts`. Not once did you specify a value for `id`. As mentioned before,\
    \ this is because `id` is declared as `integer primary key`. Therefore, SQLite\
    \ supplied an integer value for each `insert` automatically, as you can see here:\n\
    \n94\n\nCHAPTER 4 ■ ADVANCED SQL FOR SQLITE\n\n```sql\nsqlite> select * from contacts;\n\
    id  name  phone\n--- ----- --------\n1   Jerry UNKNOWN\n2   Jerry 555-1212\n```\n\
    \nNotice that the primary key is accessible from all the aforementioned aliases,\
    \ in addition to `id`:\n\n```sql\nsqlite> select rowid, oid,_rowid_,id, name,\
    \ phone from contacts;\nid  id  id  id  name  phone\n--  --  --  --  ----  -----\n\
    1   1   1   1   Jerry UNKNOWN\n2   2   2   2   Jerry 555-1212\n```"
  raw: 'Data integrity is concerned with defining and protecting relationships within
    and between tables. There are four general types: *domain integrity, entity integrity,
    referential integrity*, and *user-defined integrity*.


    Domain integrity involves controlling values within columns. Entity integrity
    involves controlling rows in tables. Referential integrity involves controlling
    rows between tables—specifically foreign key relationships. And user-defined integrity
    is a catchall for everything else.


    Data integrity is implemented using *constraints*. A constraint is a control measure
    used to restrict the values that can be stored in a column or columns. Going by
    just the values in columns, the database can enforce all four types of integrity
    constraints. In SQLite, constraints also include support for *conflict* *resolution*.
    Conflict resolution is covered in detail later in this chapter.


    Let’s deviate from our **foods** database for a moment and focus on the same **contacts**
    table introduced in Chapter 3\. The **contacts** table is defined as follows:


    **create table contacts (**


    **id integer primary key,**


    **name text not null collate nocase,**


    **phone text not null default ''UNKNOWN'',**


    **unique (name,phone) );**


    **As you know by now, constraints are part of a table’s definition. They can be
    associated with a


    column definition or defined independently in the body of the table definition.
    Column-level constraints include **not null**, **unique**, **primary key**, **foreign
    key**, **check**, and **collate**. Table-level constraints include **primary key**,
    **unique**, and **check**. All of these constraints are covered in the following
    sections according to their respective integrity types.


    CHAPTER 4 ■ ADVANCED SQL FOR SQLITE


    Now that you have familiarity with the **update**, **insert**, and **delete**
    commands in SQLite, the operation of many of the constraints will make sense.
    Just as these commands operate on data,


    constraints operate on them, making sure that they work within the guidelines
    defined in the tables they modify.


    Entity Integrity


    Relational theory—as implemented in most databases including SQLite—requires that
    every field in the database must be uniquely identifiable and capable of being
    located. For a field to be addressable, its corresponding row must also be addressable.
    And for that, the row must be unique in some way. This is the job of the primary
    key.


    The primary key consists of least one column or a group of columns with a **unique**
    constraint. The **unique** constraint, as you will soon see, simply requires that
    every value in a column (or group of columns) be distinct. Therefore, the primary
    key ensures that each row is somehow distinct from all other rows in a table,
    ultimately ensuring that every field is also addressable. Entity integrity basically
    keeps data organized in a table. After all, what good is data if you can’t find
    it?


    Unique Constraints


    Since primary keys are based on **unique** constraints, we’ll start with them.
    A **unique** constraint simply requires that all values in a column or a group
    of columns are distinct from one another or unique. If you attempt to insert a
    duplicate value or update a value to another value that already exists in the
    column, the database will issue a constraint violation and abort the operation.
    **unique** constraints can be defined at the column or the table level. When defined
    at the table level, **unique** constraints can be applied across multiple columns.
    In this case, the combined value of the columns must be unique. In **contacts**,
    there is a unique constraint on both **name** and **phone** together. See what
    happens if we attempt to insert another


    **''Jerry''** record with a **phone** value **''UNKNOWN''** :


    **sqlite> insert into contacts (name,phone) values (''Jerry'',''UNKNOWN'');**


    **SQL error: columns name, phone are not unique**


    **sqlite> insert into contacts (name) values (''Jerry'');**


    **SQL error: columns name, phone are not unique**


    **sqlite> insert into contacts (name,phone) values (''Jerry'', ''555-1212'');**


    **In the first case, I explicitly specified **name** and **phone**. This matched
    the values of the existing record, and the **unique** constraint kicked in and
    did not let me do it. The third **insert** illustrates that the **unique** constraint
    applies to **name** and **phone** combined, not individually. It inserted another
    row with **''Jerry''** as the value for **name**, which did not cause an error,
    because **name** by itself it not unique—only **name** and **phone** together.**


    **93


    s


    CHAPTER 4 ■ ADVANCED SQL FOR SQLITE


    **NULL AND UNIQUE**


    Based on your knowledge of **NULL** from Chapter 3 and your new knowledge of **unique**
    constraints, how many **NULL** values can you put in a column that is declared
    **unique**? From a theoretical perspective, the answer is as many **NULL**s as
    you like. Remember that **NULL** is not equal to anything else, even other **NULL**s.


    And this is the basis for how SQLite handles **NULL** entries in **unique** columns.
    It’s also how other major databases like Oracle and PostgreSQL operate. But the
    database community is divided on this issue. Users of Informix, Sybase, and Microsoft
    SQL Server are limited to only one **NULL** entry in a unique column. Those using
    DB2 are forbidden any at all!


    Primary Key Constraints


    In SQLite, a primary key column is always created when you create a table, whether
    you define one or not. This column is a 64-bit integer value called **rowid**.
    It has two aliases, **_rowid_** and **oid**, which can be used to refer to it
    as well. Default values are automatically generated for it.


    SQLite provides an autoincrement feature for primary keys, should you want to
    define your own. If you define a column’s type as **integer primary key**, SQLite
    will create a **default** value on that column, which will provide an integer
    value that is guaranteed to be unique in that column. In reality, however, this
    column will simply be an alias for **rowid**. They will all refer to the same
    value. Since SQLite uses a 64-bit signed integer for the primary key, the maximum
    value for this column is 9,223,372,036,854,775,807.


    Even if you manage to reach this limit, SQLite will simply start searching for
    unique values that are not in the column for subsequent **insert**s. When you
    delete rows from the table, **rowids** may be recycled and reused on subsequent
    **insert**s. As a result, newly created **rowids** might not always be in strictly
    ascending order.


    ■ **Caution** You will remember our discussion on relational data not having implicit
    order when we discussed the **order by** statement in Chapter 3\. This is another
    strong reminder never to assume data in a relational database such as SQLite has
    any particular order—even when your instincts say it should be safe.


    If you want SQLite to use unique automatic primary key values for the life of
    the table—and not “fill in the gaps”—then add the **autoincrement** keyword after
    the **integer primary key** clause.


    In the examples so far, you have managed to insert two records into **contacts**.
    Not once did you specify a value for **id**. As mentioned before, this is because
    **id** is declared as **integer primary key**.


    Therefore, SQLite supplied an integer value for each **insert** automatically,
    as you can see here:


    **94


    CHAPTER 4 ■ ADVANCED SQL FOR SQLITE


    **sqlite> select * from contacts;**


    **id name phone**


    **--- ----- --------**


    **1 Jerry UNKNOWN**


    **2 Jerry 555-1212**


    **Notice that the primary key is accessible from all the aforementioned aliases,
    in addition to **id**:**


    ******sqlite> select rowid, oid,_rowid_,id, name, phone from contacts;**


    **id id id id name phone**


    **-- -- -- -- ---- -----**


    **1 1 1 1 Jerry UNKNOWN**


    **2 2 2 2 Jerry 555-1212**'
  trans: "\n# 数据完整性\n\n数据完整性关注的是定义和保护表内及表间的关系。一般有四种类型：域完整性、实体完整性、参照完整性，以及用户定义完整性。\n\
    \n域完整性涉及控制列中的值。实体完整性涉及控制表中的行。参照完整性涉及控制表之间的行——特别是外键关系。而用户定义完整性则是一个涵盖其他所有类型的统称。\n\
    \n数据完整性是通过约束来实现的。约束是一种控制措施，用于限制可在一列或多列中存储的值。仅凭列中的值，数据库就可以强制实施所有四种类型的完整性约束。在 SQLite\
    \ 中，约束还包括对冲突解决的支持。冲突解决将在本章后面详细讨论。\n\n让我们暂时偏离一下 `foods` 数据库，聚焦于第 3 章介绍的同一个 `contacts`\
    \ 表。`contacts` 表的定义如下：\n\n```sql\ncreate table contacts (\n    id integer primary\
    \ key,\n    name text not null collate nocase,\n    phone text not null default\
    \ 'UNKNOWN',\n    unique (name,phone)\n);\n```\n\n正如你现在所知，约束是表定义的一部分。它们可以与列定义关联，也可以在表定义体中独立定义。列级约束包括\
    \ `not null`、`unique`、`primary key`、`foreign key`、`check` 和 `collate`。表级约束包括 `primary\
    \ key`、`unique` 和 `check`。所有这些约束都将在后续章节中根据其各自的完整性类型进行介绍。\n\n第 4 章 ■ SQLite 高级\
    \ SQL\n\n既然你已经熟悉了 SQLite 中的 `update`、`insert` 和 `delete` 命令，许多约束的操作就说得通了。正如这些命令对数据进行操作一样，约束也对它们进行操作，确保它们在其修改的表中所定义的准则范围内工作。\n\
    \n## 实体完整性\n\n关系理论——如大多数数据库（包括 SQLite）所实现的——要求数据库中的每个字段都必须是唯一可识别且可定位的。为了使字段可寻址，其对应的行也必须是可寻址的。而为此，该行必须以某种方式是唯一的。这就是主键的职责。\n\
    \n主键至少由一个列或一组具有 `unique` 约束的列组成。正如你将很快看到的，`unique` 约束只是要求列中（或一组列中）的每个值都是不同的。因此，主键确保每行以某种方式不同于表中的所有其他行，最终确保每个字段也是可寻址的。实体完整性基本上使数据在表中保持组织性。毕竟，如果找不到数据，数据还有什么用呢？\n\
    \n## 唯一约束\n\n既然主键是基于 `unique` 约束的，我们就从它们开始。`unique` 约束只是要求列或一组列中的所有值彼此不同或唯一。如果你尝试插入重复值或将值更新为该列中已存在的另一个值，数据库将发出约束违规错误并中止操作。`unique`\
    \ 约束可以在列级或表级定义。当在表级定义时，`unique` 约束可以跨多个列应用。在这种情况下，列的组合值必须是唯一的。在 `contacts` 表中，`name`\
    \ 和 `phone` 一起有一个唯一约束。看看如果我们尝试插入另一个值为 `'UNKNOWN'` 的 `'Jerry'` 记录会发生什么：\n\n```sql\n\
    sqlite> insert into contacts (name,phone) values ('Jerry','UNKNOWN');\nSQL error:\
    \ columns name, phone are not unique\nsqlite> insert into contacts (name) values\
    \ ('Jerry');\nSQL error: columns name, phone are not unique\nsqlite> insert into\
    \ contacts (name,phone) values ('Jerry', '555-1212');\n```\n\n在第一种情况下，我明确指定了 `name`\
    \ 和 `phone`。这与现有记录的值匹配，`unique` 约束生效，不允许我这样做。第三次 `insert` 说明 `unique` 约束适用于 `name`\
    \ 和 `phone` 的组合，而不是单独的列。它插入了另一行，其中 `name` 的值为 `'Jerry'`，这没有引起错误，因为单独的 `name` 不是唯一的——只有\
    \ `name` 和 `phone` 在一起才是。\n\n93\n\n第 4 章 ■ SQLite 高级 SQL\n\n### NULL 与唯一约束\n\n\
    基于你第 3 章对 `NULL` 的了解以及你对 `unique` 约束的新知识，在一个声明为 `unique` 的列中，你可以放入多少个 `NULL` 值？从理论角度看，答案是你喜欢多少个\
    \ `NULL` 就可以有多少个。请记住，`NULL` 不等于任何其他东西，甚至不等于其他 `NULL`。\n\n这正是 SQLite 如何处理 `unique`\
    \ 列中 `NULL` 条目的基础。这也是 Oracle 和 PostgreSQL 等其他主要数据库的运作方式。但数据库界在这个问题上存在分歧。Informix、Sybase\
    \ 和 Microsoft SQL Server 的用户在一个唯一列中只能限制为一个 `NULL` 条目。而使用 DB2 的用户则完全禁止任何 `NULL`！\n\
    \n## 主键约束\n\n在 SQLite 中，无论你是否定义，创建表时总会创建一个主键列。这个列是一个名为 `rowid` 的 64 位整数值。它有两个别名，`_rowid_`\
    \ 和 `oid`，也可以用来引用它。会自动为其生成默认值。\n\nSQLite 为主键提供了自增特性，如果你想定义自己的主键的话。如果你将列的类型定义为\
    \ `integer primary key`，SQLite 将在该列上创建一个 `default` 值，该值将提供一个在该列中保证唯一的整数值。然而，实际上，这个列只是\
    \ `rowid` 的别名。它们都将引用相同的值。由于 SQLite 对主键使用 64 位有符号整数，该列的最大值为 9,223,372,036,854,775,807。\n\
    \n即使你设法达到这个限制，SQLite 也会在后续的 `insert` 操作中开始搜索该列中不存在的唯一值。当你从表中删除行时，`rowid` 可能会被回收并在后续的\
    \ `insert` 操作中重复使用。因此，新创建的 `rowid` 可能并不总是严格按升序排列。\n\n■ **注意** 你会记得我们在第 3 章讨论 `order\
    \ by` 语句时，关于关系数据没有隐含顺序的讨论。这是另一个强有力的提醒：永远不要假设像 SQLite 这样的关系数据库中的数据具有任何特定的顺序——即使你的直觉认为应该是安全的。\n\
    \n如果你希望 SQLite 在表的生命周期内使用唯一的自增主键值——而不是“填补空缺”——那么就在 `integer primary key` 子句后添加\
    \ `autoincrement` 关键字。\n\n在到目前为止的示例中，你已经成功地将两条记录插入到 `contacts` 表中。你一次也没有为 `id`\
    \ 指定值。如前所述，这是因为 `id` 被声明为 `integer primary key`。因此，SQLite 为每次 `insert` 自动提供了一个整数值，如下所示：\n\
    \n94\n\n第 4 章 ■ SQLite 高级 SQL\n\n```sql\nsqlite> select * from contacts;\nid \
    \ name  phone\n--- ----- --------\n1   Jerry UNKNOWN\n2   Jerry 555-1212\n```\n\
    \n请注意，除了 `id` 之外，主键还可以通过所有上述别名访问：\n\n```sql\nsqlite> select rowid, oid,_rowid_,id,\
    \ name, phone from contacts;\nid  id  id  id  name  phone\n--  --  --  --  ----\
    \  -----\n1   1   1   1   Jerry UNKNOWN\n2   2   2   2   Jerry 555-1212\n```\n"
- fmt: '## CHAPTER 4 ■ ADVANCED SQL FOR SQLITE


    If you include the keyword `autoincrement` after `integer primary key`, SQLite
    will use a different key generation algorithm for the column. This algorithm basically
    prevents `rowids` from being recycled. It guarantees that only new (not recycled)
    `rowids` are provided for every `insert`. When a table is created with a column
    containing the `autoincrement` constraint, SQLite will keep track of that column’s
    maximum `rowid` in a system table called `sqlite_sequence`. It will only use values
    greater than that maximum on all subsequent `inserts`. If you ever reach the absolute
    maximum, then SQLite will return a `SQLITE_FULL` error on subsequent `inserts`.
    Here’s an example:


    ```

    sqlite> create table maxed_out(id integer primary key autoincrement, x text);


    sqlite> insert into maxed_out values (9223372036854775807, ''last one'');


    sqlite> select * from sqlite_sequence;


    name seq


    ---------- -------------------


    maxed_out 9223372036854775807


    sqlite> insert into maxed_out values (null, ''will not work'');


    SQL error: database is full

    ```


    Here, we provided the primary key value. SQLite then stored this value as the
    maximum for `maxed_out.id` in `sqlite_sequence`. We supplied the very last (maximum)
    64-bit value before wraparound.


    In the next `insert`, you used the generated default value, which must be a monotonically
    increasing value. This wrapped around to 0, and SQLite issued a `SQLITE_FULL`
    error.


    Although SQLite tracks the maximum value for an `autoincrement` column in the
    `sqlite_sequence` table, it does not prevent you from providing your own values
    for it in the `insert` command. The only requirement is that the value you provide
    must be unique within the column. Here’s an example:


    ```

    sqlite> drop table maxed_out;


    sqlite> create table maxed_out(id integer primary key autoincrement, x text);


    sqlite> insert into maxed_out values(10, ''works'');


    sqlite> select * from sqlite_sequence;


    name seq


    ---------- ----------


    maxed_out 10


    sqlite> insert into maxed_out values(9, ''works'');


    sqlite> select * from sqlite_sequence;


    name seq


    ---------- ----------


    maxed_out 10


    sqlite> insert into maxed_out values (9, ''fails'');


    SQL error: PRIMARY KEY must be unique


    sqlite> insert into maxed_out values (null, ''should be 11'');


    sqlite> select * from maxed_out;


    id x


    ---------- ------------


    9 works


    10 works


    11 should be 11


    sqlite> select * from sqlite_sequence;


    name seq


    ---------- ----------


    maxed_out 11

    ```


    Here, you dropped and re-created the `maxed_out` table and inserted a record with
    an explicitly defined `rowid` of 10. Then you inserted a record with a `rowid`
    less than 10, which worked. You tried it again with the same value and it failed,
    because of the `unique` constraint. Finally, you inserted another record using
    the default key value, and SQLite provided the next value—10+1.


    In summary, `autoincrement` prevents SQLite from recycling primary key values
    (`rowids`) and stops when the `rowid` reaches the maximum signed 64-bit integer
    value. This feature was added for specific applications that required this behavior.
    Unless you have such a specific need in your application, it is perhaps best to
    just use `integer primary key` for autoincrement columns.


    Like `unique` constraints, `primary key` constraints can be defined over multiple
    columns. You don’t have to use an integer value for your primary key. If you choose
    to use another value, SQLite will still maintain the `rowid` column internally,
    but it will also place a `unique` constraint on your declared primary key. Here’s
    an example:


    ```

    sqlite> create table pkey(x text, y text, primary key(x,y));


    sqlite> insert into pkey values (''x'',''y'');


    sqlite> insert into pkey values (''x'',''x'');


    sqlite> select rowid, x, y from pkey;


    rowid x y


    ---------- ---------- ----------

    ```'
  raw: '**If you include the keyword **autoincrement** after **integer primary key**,
    SQLite will use a different key generation algorithm for the column. This algorithm
    basically prevents **rowids** from being recycled. It guarantees that only new
    (not recycled) **rowids** are provided for every **insert**. When a table is created
    with a column containing the **autoincrement** constraint, SQLite will keep track
    of that column’s maximum **rowid** in a system table called **sqlite_sequence**.
    It will only use values greater than that maximum on all subsequent **inserts**.
    If you ever reach the absolute maximum, then SQLite will return a **SQLITE_FULL**
    error on subsequent **inserts**. Here’s an example:


    ****sqlite> create table maxed_out(id integer primary key autoincrement, x text);**


    **sqlite> insert into maxed_out values (9223372036854775807, ''last one'');**


    **sqlite> select * from sqlite_sequence;**


    **name seq**


    **---------- -------------------**


    **maxed_out 9223372036854775807**


