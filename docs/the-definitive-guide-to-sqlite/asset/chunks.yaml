  trans: '# 第 1 章 ■ SQLite 入门


    ## 对于希望学习更多关系型数据库知识的管理员来说，SQLite 是一个便捷的学习工具。它是学习关系型概念并实践其实施的理想入门数据库。它可以快速、轻松地安装在您可能遇到的任何平台上，并且其数据库文件可以在不同平台之间自由共享，无需转换。它功能齐全但并不令人生畏。而且
    SQLite——无论是程序还是数据库本身——都可以存储在 U 盘或内存芯片上随身携带。


    ## SQLite 历史


    SQLite 的构想诞生于一艘战舰上……嗯，差不多是这样。SQLite 的作者 D. Richard Hipp 当时正为通用动力公司工作，为美国海军开发一个在舰载导弹驱逐舰上使用的程序。该程序最初运行在惠普的
    Unix 系统（`HP-UX`）上，并使用`Informix`数据库作为后端。对于他们的特定应用来说，`Informix`有些大材小用。对于当时经验丰富的数据库管理员（`DBA`）来说，安装或升级可能需要几乎一整天的时间。对于不熟悉的应用程序员来说，这可能永远无法完成。真正需要的是一个独立的、易于使用的数据库，它可以随程序一起移动，并且无论系统上安装或未安装什么其他软件，都能在任何地方运行。


    2000 年 1 月，Hipp 和一位同事讨论了创建一个简单的嵌入式`SQL`数据库的想法，该数据库将使用 GNU `DBM`哈希库（`gdbm`）作为后端，完全不需要安装或管理支持。后来，当有空闲时间时，Hipp
    开始了这个项目，并于 2000 年 8 月发布了`SQLite 1.0`。


    按照计划，`SQLite 1.0`使用`gdbm`作为其存储管理器。然而，Hipp 很快用他自己的支持事务并按关键顺序存储记录的`B-树`实现取代了它。随着第一次重大升级的完成，`SQLite`开始了稳定的发展，在功能和用户数量上不断增长。到
    2001 年中，许多项目——无论是开源还是商业项目——都开始使用它。在随后的几年里，开源社区的其他成员开始为他们喜欢的脚本语言和库编写`SQLite`扩展。为流行语言和
    API（如开放数据库连接`ODBC`、`Perl`、`Python`、`Ruby`、`Java`等）开发的新扩展一个接一个地出现，证明了`SQLite`的广泛应用和实用性。


    2004 年，`SQLite`开始了从版本`2`到版本`3`的主要升级。其主要目标是增强国际化支持，包括`UTF-8`和`UTF-16`文本以及用户定义的文本排序序列。


    尽管版本`3.0`原定于 2005 年夏季发布，但美国在线公司提供了必要的资金，使其得以在 2004 年 7 月完成。除了国际化，版本`3`还带来了许多其他新功能，例如改进的`C
    API`、更紧凑的数据库文件格式（大小减少了 25%）、显式类型、二进制大对象（`BLOB`）支持、64 位`ROWID`、自动压缩和改进的并发性。尽管增加了许多新功能，整个库的占用空间仍然小于`240KB`，而当时大多数家用
    PC 的内存已经开始以 GB 为单位计量！


    版本`3`的另一个改进是进行了良好的代码清理——重新审视、重构和重写，或者干脆丢弃了在`2.x`系列中积累的糟粕。


    `SQLite`在功能上持续增长，同时仍然忠于其最初的设计目标：简单、灵活、紧凑、快速和整体易用性。截至本书最新版出版时，`SQLite`已跃升至包含诸如递归触发器、分布直方图以帮助优化器产生更快的查询、以及在支持此类工作负载的操作系统上的异步
    I/O 等高级功能。接下来会是什么？嗯，这完全取决于需求。也许您或您的公司将赞助下一个重要功能，使这个超级高效的数据库变得更好。


    ## 谁在使用 SQLite


    如今，`SQLite`被广泛应用于各种软件和产品中。它被用于苹果的`Mac OS X`操作系统、`Safari`网络浏览器、`Mail.app`电子邮件程序和
    RSS 管理器，以及苹果的`Aperture`摄影软件。也许苹果对`SQLite`最大的应用出现在`iPhone`时代。您会在`iPhone`上发现许多应用程序，例如通讯录数据库、备忘录等，都依赖于`SQLite`。这种对`SQLite`的依赖也延伸到了`iPad`。我们将在第
    9 章回到这个主题，详细讨论在苹果移动平台上使用`SQLite`。


    `SQLite`可以在 Sun 的`Solaris`操作环境中找到，特别是为随`Solaris 10`首次亮相的服务管理设施提供支持的数据库，这是其预测性自我修复技术的核心组件。`SQLite`存在于
    Mozilla 项目的`mozStorage` `C++/JavaScript` `API`层中，该层将成为`Firefox`、`Thunderbird`和`Sunbird`个人信息存储的支柱。`SQLite`已被添加为`PHP
    5`标准库的一部分。它也作为 Trolltech 跨平台`Qt C++`应用程序框架的一部分提供，该框架是流行的`KDE`窗口管理器以及许多其他软件应用程序的基础。`SQLite`在嵌入式平台中尤其受欢迎。Richard
    Hipp 的许多与`SQLite`相关的业务是将`SQLite`移植到各种专有的嵌入式平台上。`Symbian`使用`SQLite`在其原生`Symbian
    OS`平台中提供`SQL`支持。`Google`在`Android`移动电话操作系统和用户空间应用程序中广泛使用了`SQLite`。`SQLite`在`Android`中无处不在，以至于第
    10 章专门为您介绍其在`Android`设备上的使用。`SQLite`也包含在手机应用程序的商业开发产品中。


    尽管很少做广告，`SQLite`也被用于各种消费产品中，正如一些精通技术的消费者在深入探索时所发现的那样。例子包括 D-Link Media Lounge、Slim
    Devices Squeezebox 音乐播放器和 Philips GoGear 个人音乐播放器。一些聪明的消费者甚至在《*Complete New Yorker*》DVD
    套装中发现了一个嵌入的`SQLite`数据库——该套装是《*New Yorker*》杂志每一期的数字图书馆——显然由其附带的搜索软件使用。


    您会发现`SQLite`作为许多开源项目的替代后端存储设施，例如`Yum`（Fedora Core 的包管理器）、`Movable Type`、`DSPAM`和
    Edgewall Software 优秀的`Trac` `SCM`和项目管理系统；可能最著名的是，它被用作 Mozilla 网络浏览器`Firefox`的内置数据库。甚至`SQLite`核心实用工具的一部分也可以在其他开源项目中找到。一个这样的例子是它的`Lemon`解析器生成器，`lighttpd`
    Web 服务器项目使用它来生成用于读取其配置文件的解析器代码。确实，`SQLite`的用途似乎如此多样，以至于`Google`也注意到了，并在 O''Reilly
    2005 年开源大会上授予 Richard Hipp“最佳集成商”奖项——远在`Google`凭借`Android`进入移动领域之前。另请参见[www.sqlite.org/famous.html](http://www.sqlite.org/famous.html)了解其他重要`SQLite`用户的信息。


    ## 架构


    `SQLite`拥有一个优雅的模块化架构，采用了一些独特的关系数据库管理方法。它由八个独立的模块组成，分组在三个主要子系统内（如图 1-2 所示）。这些模块将查询处理划分为离散的任务，其工作方式类似装配线。


    栈顶部编译查询，中部执行查询，底部处理存储并与操作系统交互。


