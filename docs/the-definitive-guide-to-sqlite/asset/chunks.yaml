  raw: 'Putting it all together, **sqlite3_exec()** allows you to issue a batch of
    commands, and you can collect all the returned data by using the callback interface.
    For example, let’s insert a record into the **episodes** table and then select
    all of its records, all in a single call to **sqlite3_exec()**. The complete code,
    shown in Listing 6-2, is taken from **exec.c**.


    *Listing 6-2\. Using **sqlite3_exec()** for Record Processing*


    **int callback(void* data, int ncols, char** values, char** headers);**


    **int main(int argc, char **argv)**


    **{**


    **sqlite3 *db;**


    **int rc;**


    **char *sql;**


    **char *zErr;**


    **rc = sqlite3_open_v2("test.db", &db);**


    **if(rc) {**


    **fprintf(stderr, "Can''t open database: %s\n", sqlite3_errmsg(db));**


    **sqlite3_close(db);**


    **exit(1);**


    **}**


    ****const char* data = "Callback function called";**


    **sql = "insert into episodes (id, name) values (11,''Mackinaw Peaches'');"**


    **"select * from episodes;";**


    **rc = sqlite3_exec(db, sql, callback, data, &zErr);**


    CHAPTER 6 ■ THE CORE C API


    **if(rc != SQLITE_OK) {**


    **if (zErr != NULL) {**


    **fprintf(stderr, "SQL error: %s\n", zErr);**


    **sqlite3_free(zErr);**


    **}**


    **}**


    **sqlite3_close(db);**


    **return 0;**


    **}**


    **int callback(void* data, int ncols, char** values, char** headers)**


    **{**


    **int i;**


    **fprintf(stderr, "%s: ", (const char*)data);**


    **for(i=0; i < ncols; i++) {**


    **fprintf(stderr, "%s=%s ", headers[i], values[i]);**


    **}**


    **fprintf(stderr, "\n");**


    **return 0;**


    **}**


    **SQLite parses the **sql** string; runs the first command, which inserts a record;
    and then runs the second command, consisting of the **select** statement. For
    the second command, SQLite calls the callback function for each record returned.
    Running the program produces the following output:


    **Callback function called: id=10 name=The Dinner Party**


    **Callback function called: id=11 name=Mackinaw Peaches**


    Notice that the callback function returns 0\. This return value actually exerts
    some control over **sqlite3_exec()**. If the callback function returns a nonzero
    value, then **sqlite3_exec()** will abort (in other words, it will terminate all
    processing of this and subsequent commands in the **sql** string).


    So, **sqlite3_exec()** provides an easy way to modify the database and also provides
    an interface with which to process records. Why then should you bother with prepared
    queries? Well, as you will see in the next section, there are quite a few advantages:


    • Prepared queries don’t require a callback interface, which makes coding simple


    and more linear.


    • Prepared queries have associated functions that provide better column


    information. You can obtain a column’s storage type, declared type, schema name


    (if it is aliased), table name, and database name. **sqlite3_exec()**’s callback


    interface provides just the column names.


    • Prepared queries provide a way to obtain field/column values in other data types


    besides text and in native C data types such as **int** and **double**, whereas


    **sqlite3_exec()**’s callback interface only provides fields as string values.


    CHAPTER 6 ■ THE CORE C API


    • Prepared queries can be rerun, allowing you to reuse the compiled SQL.


    • Prepared queries support parameterized SQL statements.


    **EXAMINING CHANGES**


    If you are performing an **update** or a **delete**, you may want to know how
    many records were affected. You can get this information from **sqlite3_changes()**.
    It provides the number of affected records for the last executed **update**, **insert**,
    or **delete** statement. Obviously, if you are running a batch of queries (multiple
    commands in the **sql** argument of **sqlite3_exec()**), this function will be
    good only for the last command in the batch. Note also that **sqlite3_changes()**
    does not include changes activated from the result of triggers fired from your
    original command.


    If you are performing an insert on a table with an autoincrement column, odds
    are you will eventually want to know the primary key value of an inserted record.
    In such cases, you can use **sqlite3_last_**'
