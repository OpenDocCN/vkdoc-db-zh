    from foods\nwhere description is not null\norder by name\nlimit 10;\n```\n\n```\n\
    description\n---------------------------------------------\nAll Day Sucker is\
    \ junkfood\nAlmond Joy is junkfood\nApple is a fruit\nApple Cider is a drink\n\
    Apple Pie is a fruit\nArabian Mocha Java (beans) is a drink\nAvocado is a fruit\n\
    Banana is a fruit\nBeaujolais is a drink\nBeer is a drink\n```\n\nThe `case` expression\
    \ in this example handles a few different `type_id` values, returning a string\
