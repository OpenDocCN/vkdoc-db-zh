    [`www.hwaci.com/sw/sqlite/prosupport.html`](http://www.hwaci.com/sw/sqlite/prosupport.html).


    ## Summary


    SQLite is not to be confused with other larger databases like Oracle or PostgreSQL.
    Whereas dedicated relational databases such as these are electronic juggernauts,
    SQLite is a digital Swiss Army knife.


    Whereas large-scale dedicated relational databases are designed for thousands
    of users, SQLite is designed for thousands of uses. It is more than a database.
    Although a tool in its own right, it is a tool for making tools as well. It is
    a true utility, engineered to enable you—the developer, user, or administrator—to
    quickly and easily shape those disparate piles of data into order, and manipulate
    them to your liking with minimal effort.


    ## CHAPTER 1 ■ INTRODUCING SQLITE


    SQLite is public domain software. Free. You can do anything with it or its source
    code you like. No licenses, no install programs, no restrictions. Just copy and
    run. It is also portable, well tested, and reliable. It has a clean, modular design
    that helps keep the system simple, easy to develop, and easy to debug. In addition
    to good design, it has good testing. There is more code written to test SQLite
    than there is SQLite code to test. It should not be too surprising, then, that
    SQLite has proven itself to be a solid, reliable database over its five-year history.


    Finally, SQLite is fun. At least we think so, and we hope that you will find it
    equally useful and enjoyable.


    If you have any comments or suggestions on this book or its examples, please feel
    free to contact the authors at [`sqlitebook@gmail.com`](mailto:sqlitebook@gmail.com)
    (Michael) or [`grantondata@gmail.com`](mailto:grantondata@gmail.com) (Grant).


    ## C H A P T E R 2


    ## Getting Started


    It’s very easy to begin using SQLite no matter what operating system you are using.
    For the vast majority of users, you can be up and running with SQLite in less
    than five minutes, regardless of experience. This chapter covers everything you
    need to know in order to install SQLite and work with databases. By the time we
    are done, you will have a working knowledge of where to obtain SQLite software
    or source code and how to install or compile it on multiple platforms. You’ll
    be working with new SQLite databases and creating tables, views, and indexes that
    you can query, back up, and restore.


    You will learn everything you need to know about managing SQLite databases, including
    how to create, view, and examine their contents. Finally, you will be introduced
    to several tools with which to work with SQLite in various environments. This
    chapter does include some examples that use `SQL` to introduce the SQLite command-line
    program. If you are not yet familiar with `SQL`, the examples will be easy enough
    that you should still be able to follow them without much trouble. We take an
    in-depth look at `SQL` in detail in Chapters 3 and 4.


    ## Where to Get SQLite


    The SQLite website ([`www.sqlite.org`](http://www.sqlite.org)) provides both precompiled
    binaries of SQLite as well as source code. Binaries are available for popular
    platforms including Mac OS X, Windows, and Linux.


    There are several binary packages to choose from, each of which is specific to
    a particular way of using SQLite. The binary packages are as follows:


    `sqlite3` command-line program (CLP): This version of the SQLite command-line
    program has the database engine compiled in with statically linked dependencies,
    acting as a self-contained, stand-alone program. This provides a convenient way
    to work with SQLite databases from the command line without having to worry whether
    the SQLite shared library is installed on your system or located in the right
    place. If you run on of the contemporary Linux distributions or OS X, you almost
    certainly already have this installed.


    SQLite shared library (`DLL` or "`so`"): This is the SQLite database engine'
