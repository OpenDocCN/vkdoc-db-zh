    - `database_list`: Lists information about all attached databases.

    - `index_info`: Lists information about the columns within an index. It takes
    an index name as an argument.

    - `index_list`: Lists information about the indexes in a table. It takes a table
    name as an argument.

    - `table_info`: Lists information about all columns in a table.


