    # SQLite 书籍章节概述


    ## 章节概览


    **第 1 章，“SQLite 入门介绍”** 涵盖了 SQLite 的起源和历史，以及本书的范围和目标（您现在正在阅读的这部分内容！）


    ## 获取与使用


    **第 2 章，“快速入门”** 讲述了如何获取和使用 SQLite。它说明了如何以二进制和源代码形式获取 SQLite，以及如何在各种平台上编译和构建它。本章解释了如何使用
    SQLite 命令行工具来创建和处理数据库。


    ## SQL 语言


    **第 3 章，“SQLite 的 SQL 语言”** 提供了一些关于 SQL 的背景知识。它介绍了许多基本的 SQL 命令，例如用于创建表、选择和处理数据的命令。本章既概述了
    SQLite 自己处理 SQL 的方式，也为需要复习 SQL 的读者提供了快速介绍。


    **第 4 章，“SQLite 中的高级 SQL”** 从第 3 章继续，涵盖了更复杂的查询，并详细探讨了 SQLite SQL 实现中剩余命令的各个方面。


    ## 设计与核心概念


    **第 5 章，“SQLite 设计与核心概念”** 为使用 SQLite 编程奠定了基础。它阐述了 SQLite API、其架构以及两者如何协同工作。它讨论了诸如事务和锁定等主题。它为所有语言的程序员清晰地理解了
    SQLite 的内部工作原理，以及在编写使用它的程序时需要注意的事项。


    ## C 语言 API


    **第 6 章，“核心 C 语言 API”** 涵盖了与执行查询相关的 SQLite C API 部分。本章涵盖了连接数据库、执行查询、获取数据、管理事务以及跟踪代码等章节，涵盖了与查询和数据处理相关的所有
    API 部分。


    **第 7 章，“扩展 C 语言 API”** 涵盖了用于自定义和扩展 SQLite 的剩余 C API 部分。SQLite 提供了用于实现用户定义的 SQL
    函数、聚合和排序规则的工具。本章说明了这些功能的示例实现，并提供了其实用示例。


    ## 语言绑定与平台


    **第 8 章，“SQLite 的语言绑定”** 简要介绍了在 Perl、Python、Ruby、Java 和 PHP 等一系列流行语言中进行 SQLite
    编程。


    **第 9 章，“用于 Apple iPhone 和 iPad 的 SQLite”** 重点介绍了为 Apple 移动平台开发时如何使用 SQLite。


