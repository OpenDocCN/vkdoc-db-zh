  trans: '

    事实上，你完全可以不再需要向这张表编写`UPDATE`语句——只需编写`INSERT`语句，让 SQLite 根据模式中定义的冲突解决规则来处理脏活累活。


    最后，SQLite 允许你将外部数据库"附加"到当前会话。假设你连接到一个数据库（`foo.db`），需要操作另一个数据库（`bar.db`）。你无需打开单独的连接并在代码中管理多个连接句柄，只需用一条简单的
    SQL 命令就能将目标数据库附加到当前连接：


    `ATTACH database bar.db as bar;`


    # 第一章 ■ SQLite 简介


    `bar.db` 中的所有表现在都可以访问，就像它们存在于 `foo.db` 中一样。操作完成后，你可以同样轻松地将其分离。这使得诸如在数据库间复制表之类的操作变得非常容易。


    ## 性能与限制


    SQLite 是一个快速的数据库。但"快速"、"迅捷"、"灵敏"或"敏捷"这些词都是相当主观的表述。坦率地说，有些事情 SQLite 做得比其他数据库快，而有些则不然。简而言之，在其设计参数范围内，可以说
    SQLite 在各方面都始终保持着快速高效。SQLite 使用 B 树作为索引，使用 B+ 树作为表，这与大多数其他数据库系统相同。在单表搜索方面，它的平均速度不慢于任何其他数据库，甚至更快。简单的
    `SELECT`、`INSERT` 和 `UPDATE` 语句执行速度极快——实际上达到了内存速度（对于内存数据库）或磁盘速度。在这方面，SQLite 通常比其他数据库更快，因为它启动事务或生成查询计划的开销更小，并且没有网络调用到服务器或协商认证和权限的开销。其简洁性使其快速。


    然而，随着查询变得更庞大、更复杂，查询时间会掩盖网络调用或事务开销，此时优势就属于拥有最佳优化器的数据库了。这正是那些更大、更复杂的数据库开始大放异彩的地方。虽然
    SQLite 当然也能处理复杂查询，但它没有复杂的优化器或查询规划器。你总是可以信任 SQLite 能给出结果，但它不会像 Oracle 或 PostgreSQL
    那样，试图通过计算数百万个备选查询计划并选择最快的方案来确定最优路径。因此，如果你在大型数据集上运行复杂查询，SQLite 很可能不如拥有复杂优化器的数据库那么快。


    所以，在某些情况下，SQLite 确实不如大型数据库快。但其中许多（即使不是全部）情况都是意料之中的。SQLite 是一个嵌入式数据库，专为中小型应用而设计。这些限制与其设计初衷是一致的。许多新用户错误地认为他们可以将
    SQLite 作为大型关系数据库的直接替代品。


    有时可以；有时不行。这完全取决于你要做什么。


    通常，有两个主要变量决定了 SQLite 的主要限制：


    - 并发性。SQLite 采用粗粒度锁定，允许多个读取者，但一次只允许一个写入者。写入者在写入期间独占锁定数据库，在此期间其他人无法访问。SQLite 确实会采取措施尽量缩短独占锁定的时间。通常，SQLite
    中的锁定仅保持几毫秒。但作为一般经验法则，如果你的应用程序具有高写入并发性（多个连接竞争写入同一数据库）且对时间敏感，你可能需要另一个数据库。实际上，这需要通过测试你的应用程序才能知道能获得什么样的性能。我们见过
    SQLite 每秒处理超过 500 个事务

    '
- fmt: '# CHAPTER 1 ■ INTRODUCING SQLITE


    ## 性能与并发性的权衡


    对于简单的Web应用程序，SQLite可以处理大约100个并发连接。但你的事务可能在修改的记录数量，或者所涉及查询的数量和复杂性上有所不同。可接受的并发性完全取决于你的具体应用程序，并且只能通过直接测试凭经验确定。一般来说，这对于任何数据库都是成立的：在你进行真实世界测试之前，你不会知道你的应用程序会获得什么样的性能。


    ## 设计限制与网络文件系统


    - **网络**。虽然SQLite数据库可以通过网络文件系统共享，但与此类文件系统相关的延迟可能导致性能下降。更糟糕的是，网络文件系统实现中的错误也可能使打开和修改远程文件（无论是SQLite文件还是其他文件）容易出错。如果文件系统的锁定机制不能正常工作，两个客户端可能被允许同时修改同一个数据库文件，这几乎肯定会导致数据库损坏。这并不是因为SQLite的实现使其无法在网络文件系统上工作。相反，SQLite受制于底层的文件系统和有线协议，而这些技术并不总是完美的。例如，许多版本的NFS都有一个有缺陷的`fcntl()`实现，这意味着锁定行为不符合预期。较新的NFS版本，如Solaris
    NFS v4，工作正常并可靠地实现了SQLite所需的锁定机制。然而，SQLite开发人员既没有时间也没有资源来证明任何给定的网络文件系统在所有情况下都能完美运行。


    再次强调，这些限制大多是故意的，源于SQLite的设计。例如，支持高写入并发会带来巨大的复杂性，这与SQLite设计上的简单性背道而驰。同样，作为一个嵌入式数据库，SQLite有意不支持网络。这应该不足为奇。简而言之，SQLite不能做的事情是其能做的事情的直接结果。它被设计为一个模块化、简单、紧凑且易于使用的嵌入式关系数据库，其代码库对于使用它的程序员来说是触手可及的。而且在许多方面，它可以做许多其他数据库无法做到的事情，例如在实际**功耗**（`power
    consumption`）是限制因素的嵌入式环境中运行。


    ## SQL实现中的缺失功能


    虽然SQLite的SQL实现相当不错，但目前有一些它尚未实现的功能。具体如下：


    - **完整的触发器支持**。SQLite支持几乎所有标准的触发器功能，包括递归触发器和`INSTEAD OF`触发器。然而，对于所有触发器类型，SQLite目前要求`FOR
    EACH ROW`行为，即触发操作会对触发查询所影响的每一行进行评估。ANSI SQL 92还描述了`FOR EACH STATEMENT`触发器样式，目前不支持。


    - **完整的`ALTER TABLE`支持**。只支持`ALTER TABLE`命令的`RENAME TABLE`和`ADD COLUMN`变体。其他类型的`ALTER
    TABLE`操作，如`DROP COLUMN`、`ALTER COLUMN`和`ADD CONSTRAINT`均未实现。


    - **`RIGHT`和`FULL OUTER JOIN`**。虽然实现了`LEFT OUTER JOIN`，但`RIGHT OUTER JOIN`和`FULL
    OUTER JOIN`没有实现。每一个`RIGHT OUTER JOIN`都有一个语义上完全等价的`LEFT OUTER JOIN`，反之亦然。任何`RIGHT
    OUTER JOIN`都可以通过简单地反转表的顺序并修改连接约束来实现为`LEFT OUTER JOIN`。一个`FULL OUTER JOIN`可以实现为两个`LEFT
    OUTER JOIN`语句、一个`UNION`以及在`WHERE`子句中进行适当的`NULL`过滤的组合。


    - **可更新视图**。SQLite中的视图是只读的。你不能在视图上执行`DELETE`、`INSERT`或`UPDATE`语句。但你可以创建一个触发器，当尝试对视图进行`DELETE`、`INSERT`或`UPDATE`操作时触发，然后在触发器体中完成你需要的操作。'
  raw: 'for 100 concurrent connections in simple web applications. But your transactions


    may differ in the number of records being modified or the number and complexity


    of the queries involved. Acceptable concurrency all depends on your particular


    application and can be determined empirically only by direct testing. In general,


    this is true with any database: you don’t know what kind of performance your


    application will get until you do real-world tests.


    CHAPTER 1 ■ INTRODUCING SQLITE


    • Networking. Although SQLite databases can be shared over network file systems,


    the latency associated with such file systems can cause performance to suffer.


    Worse, bugs in network file system implementations can also make opening and


    modifying remote files—SQLite or otherwise—error prone. If the file system’s


    locking does not work properly, two clients may be allowed to simultaneously


    modify the same database file, which will almost certainly result in database


    corruption. It is not that SQLite is incapable of working over a network file
    system


    because of anything in its implementation. Rather, SQLite is at the mercy of the


    underlying file system and wire protocol, and those technologies are not always


    perfect. For instance, many versions of NFS have a flawed **fcntl()**


    implementation, meaning that locking does not behave as intended. Newer NFS


    versions, such are Solaris NFS v4, work just fine and reliably implement the


    requisite locking mechanisms needed by SQLite. However, the SQLite developers


    have neither the time nor the resources to certify that any given network file


    system works flawlessly in all cases.


    Again, most of these limitations are intentional, resulting from SQLite’s design.
    Supporting high write concurrency, for example, brings with it great deal of complexity,
    and this runs counter to SQLite’s simplicity in design. Similarly, being an embedded
    database, SQLite intentionally does not support networking. This should come as
    no surprise. In short, what SQLite can’t do is a direct result of what it can.
    It was designed to operate as a modular, simple, compact, and easy-to-use embedded
    relational database whose code base is within the reach of the programmers using
    it. And in many respects, it can do what many other databases cannot, such as
    run in embedded environments where actual *power* *consumption* is a limiting
    factor.


    While SQLite’s SQL implementation is quite good, there are some things it currently
    does not


    implement. These are as follows:


    • Complete trigger support. SQLite supports almost all the standard features for


    triggers, including recursive triggers and **INSTEAD OF** triggers. However, for
    all


    trigger types, SQLite currently requires **FOR EACH ROW** behavior, where the
    triggered


    action is evaluated for every row affected by the triggering query. ANSI SQL 92
    also


    describes a **FOR EACH** **STATEMENT** trigger style, which is not currently supported.


    • Complete ALTER TABLE support. Only the **RENAME** **TABLE** and **ADD COLUMN**
    variants of the **ALTER TABLE** command are supported. Other kinds of **ALTER
    TABLE**


    operations such as **DROP COLUMN**, **ALTER COLUMN**, and **ADD CONSTRAINT** are
    not


    implemented.


    • RIGHT and FULL OUTER JOIN. **LEFT OUTER JOIN** is implemented, but **RIGHT**


    **OUTER JOIN** and **FULL OUTER JOIN** are not. Every **RIGHT OUTER JOIN** has
    a provably semantically identical **LEFT OUTER JOIN**, and vice versa. Any **RIGHT
    OUT JOIN** can be


    implemented as a **LEFT OUTER JOIN** by simply reversing the order of the tables
    and


    modifying the join constraint. A **FULL OUTER JOIN** can be implemented as a


    combination of two **LEFT OUTER JOIN** statements, a **UNION**, and appropriate
    **NULL**


    filtering in the **WHERE** clause.


    • Updatable views. Views in SQLite are read-only. You may not execute a **DELETE**,


    **INSERT**, or **UPDATE** statement on a view. But you can create a trigger that
    fires on an attempt to **DELETE**, **INSERT**, or **UPDATE** a view and do what
    you need in the body of the trigger.


    CHAPTER 1 ■ INTRODUCING SQLITE'
  trans: '# 第 1 章 ■ SQLite 简介


    ## 性能与并发性的权衡


    对于简单的 Web 应用程序，SQLite 可以处理大约 100 个并发连接。但你的事务可能在修改的记录数量，或者所涉及查询的数量和复杂性上有所不同。可接受的并发性完全取决于你的具体应用程序，并且只能通过直接测试凭经验确定。一般来说，这对于任何数据库都是成立的：在你进行真实世界测试之前，你不会知道你的应用程序会获得什么样的性能。


    ## 设计限制与网络文件系统


    - **网络**。虽然 SQLite 数据库可以通过网络文件系统共享，但与此类文件系统相关的延迟可能导致性能下降。更糟糕的是，网络文件系统实现中的错误也可能使打开和修改远程文件（无论是
    SQLite 文件还是其他文件）容易出错。如果文件系统的锁定机制不能正常工作，两个客户端可能被允许同时修改同一个数据库文件，这几乎肯定会导致数据库损坏。这并不是因为
    SQLite 的实现使其无法在网络文件系统上工作。相反，SQLite 受制于底层的文件系统和有线协议，而这些技术并不总是完美的。例如，许多版本的 NFS 都有一个有缺陷的`fcntl()`实现，这意味着锁定行为不符合预期。较新的
    NFS 版本，如 Solaris NFS v4，工作正常并可靠地实现了 SQLite 所需的锁定机制。然而，SQLite 开发人员既没有时间也没有资源来证明任何给定的网络文件系统在所有情况下都能完美运行。


    再次强调，这些限制大多是故意的，源于 SQLite 的设计。例如，支持高写入并发会带来巨大的复杂性，这与 SQLite 设计上的简单性背道而驰。同样，作为一个嵌入式数据库，SQLite
    有意不支持网络。这应该不足为奇。简而言之，SQLite 不能做的事情是其能做的事情的直接结果。它被设计为一个模块化、简单、紧凑且易于使用的嵌入式关系数据库，其代码库对于使用它的程序员来说是触手可及的。而且在许多方面，它可以做许多其他数据库无法做到的事情，例如在实际**功耗**是限制因素的嵌入式环境中运行。


    ## SQL 实现中的缺失功能


    虽然 SQLite 的 SQL 实现相当不错，但目前有一些它尚未实现的功能。具体如下：


    - **完整的触发器支持**。SQLite 支持几乎所有标准的触发器功能，包括递归触发器和`INSTEAD OF`触发器。然而，对于所有触发器类型，SQLite
    目前要求`FOR EACH ROW`行为，即触发操作会对触发查询所影响的每一行进行评估。ANSI SQL 92 还描述了`FOR EACH STATEMENT`触发器样式，目前不支持。


    - **完整的`ALTER TABLE`支持**。只支持`ALTER TABLE`命令的`RENAME TABLE`和`ADD COLUMN`变体。其他类型的`ALTER
    TABLE`操作，如`DROP COLUMN`、`ALTER COLUMN`和`ADD CONSTRAINT`均未实现。


    - **`RIGHT`和`FULL OUTER JOIN`**。虽然实现了`LEFT OUTER JOIN`，但`RIGHT OUTER JOIN`和`FULL
    OUTER JOIN`没有实现。每一个`RIGHT OUTER JOIN`都有一个语义上完全等价的`LEFT OUTER JOIN`，反之亦然。任何`RIGHT
    OUTER JOIN`都可以通过简单地反转表的顺序并修改连接约束来实现为`LEFT OUTER JOIN`。一个`FULL OUTER JOIN`可以实现为两个`LEFT
    OUTER JOIN`语句、一个`UNION`以及在`WHERE`子句中进行适当的`NULL`过滤的组合。


    - **可更新视图**。SQLite 中的视图是只读的。你不能在视图上执行`DELETE`、`INSERT`或`UPDATE`语句。但你可以创建一个触发器，当尝试对视图进行`DELETE`、`INSERT`或`UPDATE`操作时触发，然后在触发器体中完成你需要的操作。'
- fmt: '## 窗口函数与访问控制


    *   窗口函数。ANSI SQL 99 规范中新增的功能集之一是窗口函数。这些函数为结果提供后处理的分析功能，例如排名、滚动平均值、滞后与超前计算等。SQLite
    当前仅目标于 ANSI SQL 92 合规性，因此它不支持 `RANK()`、`ROW_NUMBER()` 等窗口函数。

    *   `GRANT` 和 `REVOKE`。由于 SQLite 读写的是一个普通的磁盘文件，唯一可以应用的访问权限是底层操作系统的正常文件访问权限。`GRANT`
    和 `REVOKE` 命令通常面向更高端的系统，这些系统中有多个用户，他们对数据库中的数据拥有不同的访问级别。在 SQLite 模型中，应用程序是主要用户，可以访问整个数据库。在此模型中，访问权限是在应用程序级别定义的——具体来说，是定义哪些应用程序有权访问数据库文件。


    除了此处列出的内容，SQLite wiki 上还有一个专门报告不支持 SQL 的页面。其地址位于 `www.sqlite.org/cvstrac/wiki?p=UnsupportedSql`。


    ## 本书面向的读者


    SQLite 用途广泛，因此吸引了广泛而多元的读者群体。无论您是程序员、Web 开发者、系统管理员，还是仅仅想学习关系数据库的普通用户，本书旨在帮助您理解并充分利用您特定的
    SQLite 用途。


    如果您是关系数据库的新手，SQLite 是一个极佳的起点。本书将不仅帮助您开始使用 SQLite，还将使您成为熟练的 SQL 用户。它也将为您打下良好的基础，以便您能够转向更大的关系系统并探索更高级的功能和主题。


    对于程序员，本书仅假定您了解打算用于 SQLite 的编程语言以及关系理论的基础知识。此外，它不仅仅是 API 文档。如果说有什么的话，那是它做的最少的事情，因为
    API 文档仅说明一个接口如何工作。对于任何数据库，您都需要对其内部工作原理有一定的了解才能充分利用它。每个数据库都有其独特的架构方面、特定的关系功能以及重要的限制，优秀的程序员在编写代码时都会了解并考虑这些方面。SQLite
    虽然简单直接，也不例外。作为一名程序员，您需要了解它如何内部处理数据，才能使其与您的应用程序良好协作。本书将向您展示如何做到这一点。它涵盖了 API，并探讨了其与
    SQLite 架构相关的工作方式，使 C 程序员、Web 开发人员和脚本编写人员都能编写出更专业的代码。这不仅有助于您更好地理解 SQLite **能**做什么，也理解它**不能**做什么。您对架构的了解将比任何规则列表都更准确地告诉您，SQLite
    是否适合您尝试完成的任务，以及何时何地适合。您会知道是否、何时以及在何处需要考虑其他方法。


    本书最重要的目标之一是教授概念而非食谱——充分阐述“如何做”以及“为什么这样做”。当您读完本书时，您将对某项功能的工作原理既有概念性又有实践性的理解。为此，本书包含了理论材料，并穿插了许多专门设计的图示和示例，用以说明当前主题并提供实际价值。


