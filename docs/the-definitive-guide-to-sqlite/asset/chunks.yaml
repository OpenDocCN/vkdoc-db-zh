    choosing at least the latest major release, which at this point is 2.2.


    The SD Card and Skin settings aren’t really a consideration with our SQLite focus,
    so at this point leave them at the defaults. The remaining aspect of your virtual
    device concerns the additional hardware this AVD will mimic. This includes many
    things that really won’t impact our SQLite development, such as GPS and accelerometer
    devices. But several of the hardware options are worth considering.


    The “Cache partition size” parameter will govern the fraction of on-board storage
    on the device


    available to applications and the phone’s user (as opposed to Android and the
    system binaries). It’s common to find phones and tablets with 4GB, 8GB, and even
    16GB or more of onboard memory, and a


    good fraction of this is available to the Cache partition. If you plan to build
    applications with large SQLite databases, you should set this parameter to help
    you stay under the likely device ceilings your application would encounter in
    the wild.


    The “Maximum VM application heap size” option sets the limit for the amount of
    heap allocation an Android application can take before it is killed by the system.
    This will impact your SQLite development when dealing with larger items allocated
    on the heap. The most likely culprits will be large result sets that are allocated
    as cursor objects (which we’ll discuss later in this chapter). This defaults to
    16MB. If you know you’ll work with memory-limited devices, you can tweak this
    to enable your development to catch any low-memory scenarios before you reach
    real-world devices.


    Device RAM Size designates the amount of physical memory present on the device.
    This is rarely


    going to be your limiting factor, but again for SQLite development on constraint
    devices, it’s useful to dial down this value to make your development device more
    closely model your future target devices.


