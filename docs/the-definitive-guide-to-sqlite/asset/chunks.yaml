    \ 或更新版本 OS X 的 Apple 机器上工作。对于仍在使用 Leopard (10.5.*x*) 或更早版本的用户，Apple 确实提供了早期兼容版本的\
    \ Xcode 和 iPhone SDK（当时的名称）。搜索这些版本可能碰运气。如果您在 Apple 网站上难以找到它们，我们建议您在 Apple 论坛上进行\
    \ Google 搜索，那里热心的开发者会追踪 Apple 将早期 SDK 版本的 `**.dmg` 文件移动到了何处。\n\n下载 iOS SDK 后，您现在可以继续进行安装。打开\
    \ `.dmg` 文件，您将看到三个项目，如图 9-1 所示。它们分别是信息性的“关于”文件、SDK 安装程序本身和一个包目录。\n\n*图 9-1. 您的\
    \ iOS SDK 包内容*\n\n现在运行 iOS SDK 安装程序（或 iPhone SDK 安装程序，取决于您使用的版本）。经过片刻的磁盘活动后，您应该会看到安装程序的欢迎页面，如图\
    \ 9-2 所示。\n\n*图 9-2. iOS SDK 包安装欢迎页面*\n"
- fmt: '## CHAPTER 9: iOS DEVELOPMENT WITH SQLITE


    With one exception, there’s no need to walk you through the various installation
    screens. Go ahead and choose the defaults, or add additional options as you see
    fit throughout the installation. However, it’s worth noting some of the options
    when you reach the Installation Type screen, shown in Figure 9-3.


    ![](index-279_1.jpg)


    ### Figure 9-3: iOS SDK installation types


    Here, the iOS SDK installer is prompting for historic versions of the SDK to include
    in the installation. As well as always including the most current version of the
    SDK, you have the choice of targeting older versions. Why would you want to do
    this? For the purposes of our SQLite development throughout the rest of the chapter,
    the defaults are fine. But if you might be doing future development where you
    need to target older iPhones and iPads, you might want to include the older SDKs.
    Although this is probably a rare occurrence, people developing for corporate or
    enterprise environments where the latest iPads are still a future promise might
    well find they need to target the original iPhone to meet their users’ hardware
    specifications.


    Continue from here to the end of the installation, and you should see a satisfying
    and quite large success message, as shown in Figure 9-4.


    ![](index-280_1.jpg)


    ### Figure 9-4: A green check mark shows a successful iOS SDK installation.


    With your installation complete, you are ready to code your first iOS SQLite-based
    application.


    ## Alternatives to Xcode


    For those brave, experienced, or both, there are alternatives to Xcode for iOS
    development in general and SQLite-based iOS development in particular. Feel free
    to use any or all of these if you’re already comfortable with iPhone development
    and prefer them to Xcode.


    *   `PhoneGap`: An open source development framework for building cross-platform
    mobile applications. [`www.phonegap.com`](http://www.phonegap.com)

    *   `Appcelerator Titanium`: Another open source cross-platform framework for
    mobile applications. [`www.appcelerator.com`](http://www.appcelerator.com)


    Each of these has excellent support for SQLite development for iOS and other platforms.
    Note that Apple have just relaxed their notoriously strict and some would say
    capricious application rules that penalized coding in different languages or environments
    and cross-compiling or translating to target Objective-C and iOS. So, you have
    some more leeway to explore these tools and launch the next great SQLite-based
    iOS application.


    ## Building the iSeinfeld iOS SQLite Application


    With a working development environment now in place, you are ready to build your
    SQLite-based iOS application. Like all good developers, we’ll need some idea of
    our application’s requirements in order to properly design our application and
    know when it is finished. Here are our very succinct iSeinfeld requirements:


    1.  Build an iOS application for iPhones and iPads that shows the foods mentioned
    in `Seinfeld` by order of popularity.

    2.  For any popular food, show how often the food is mentioned over all shows
    of `Seinfeld`.

    3.  Indicate the show in which a food first appeared.


    That seems pretty simple. The code we develop will cover the core aspects of working
    with SQLite on iOS systems. We’ll cover opening databases, or creating them if
    they don’t already exist; manipulating data within the database; and the all-important
    UI elements of bringing your SQLite data to the attention of the user!


    Here are the steps we will cover in this chapter. We’ll try to keep the Objective-C
    and Cocoa touch–specific aspects to a minimum and highlight the all-important
    SQLite dimension of the work wherever possible.


    1.  Create a new project in Xcode.

    2.  Add the SQLite framework to the project.

    3.  Prepare our foods database for inclusion in the iOS application.

    4.  Define the classes that map our food data from SQLite to our code and that
    present that data on the screen for users to see.'
