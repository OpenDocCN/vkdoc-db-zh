    trigger based manipulation of data via views.


    Transactions


    Transactions define boundaries around a group of SQL commands such that they either
    all successfully execute together or not at all. This is typically referred to
    as the *atomic* principle of database integrity. A classic example of the rationale
    behind transactions is a money transfer. Say a bank program is


    transferring money from one account to another. The money transfer program can
    do this in one of two ways: first insert (credit) the funds into account 2 and
    then delete (debit) it from account 1, or first delete it from account 1 and insert
    it into account 2\. Either way, the transfer is a two-step process: an **insert**
