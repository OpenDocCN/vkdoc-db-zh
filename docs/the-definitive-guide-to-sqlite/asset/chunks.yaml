- fmt: "# The Finalize Function\n\nEach record in the materialized result set triggers\
    \ a call to `str_agg_step()`. After the last record is processed, SQLite calls\
    \ `str_agg_finalize()`, which is implemented as shown in Listing 7-4.\n\n## Listing\
    \ 7-4. The `sum_agg()` Finalize Function\n\n```c\nvoid str_agg_finalize(sqlite3_context*\
    \ ctx)\n{\n    SAggCtx *p = (SAggCtx *) sqlite3_aggregate_context(ctx, sizeof(*p));\n\
    \    if( p && p->result ) sqlite3_result_text(ctx, p->result, p->chrCnt, sqlite_free);\n\
    }\n```\n\nThe `str_agg_finalize()` function basically works just like a user-defined\
    \ function callback. It retrieves the `SAggCtx` struct and, if it is not `NULL`,\
    \ sets the aggregate's return value to the value stored in the struct's `result`\
    \ member using `sqlite3_result_text()`. The `sqlite3_aggregate_context()` routine\
    \ might return `NULL` if the system is low on memory, or the `p->zResult` field\
    \ might be `NULL` if the step function was never called. In the former case, SQLite\
    \ is going to return the `SQLITE_NOMEM` error so it does not really matter whether\
    \ `sqlite3_result_text()` is ever called. In the latter case, since no `sqlite3_result_xxx()`\
    \ function is ever invoked for the aggregate, the result of the aggregate will\
    \ be the SQL `NULL`.\n\n# Results\n\nThe program produces the following output\
    \ (abbreviated here to conserve paper):\n\n```\nRegistering aggregate str_agg()\n\
    Running query:\nTRACE: select season, str_agg(name, ', ') from episodes group\
    \ by season\n...\nseason str_agg(name, ', ')\n------ ------------------------------------------------------------------\n\
    0 Good News Bad News\n1 Male Unbonding, The Stake Out, The Robbery, The Stock\
    \ Tip\n2 The Ex-Girlfriend, The Pony Remark, The Busboy, The Baby Shower, ...\n\
    3 The Note, The Truth, The Dog, The Library, The Pen, The Parking Garage ...\n\
    ...\n```\n\nCHAPTER 7 ■ THE EXTENSION C API\n\nAs you can see, the `select` statement\
    \ pulls back the data from the `episode` table, and the `str_agg()` aggregate\
    \ concatenates the episode names per season. You can think of this as something\
    \ similar to cross-tabs or pivots in spreadsheets and other tools.\n\nAnd that\
    \ is the concept of aggregates in a nutshell. They are so similar to functions\
    \ that there isn't much to talk about once you are familiar with functions.\n\n\
    # Collations\n\nAs stated before, the purpose of collations is to sort strings.\
    \ But before starting down that path, it is important to recall that SQLite's\
    \ manifest typing scheme allows varying data types to coexist in the same column.\
    \ For example, consider the following SQL (located in `collate1.sql`):\n\n```sql\n\
    .headers on\n.m column\ncreate table foo(x);\ninsert into foo values (1);\ninsert\
    \ into foo values (2.71828);\ninsert into foo values ('three');\ninsert into foo\
    \ values (X'0004');\ninsert into foo values (null);\nselect quote(x), typeof(x)\
    \ from foo;\n```\n\nFeeding it to the SQLite CLP will produce the following:\n\
    \n```\nC:\\temp\\examples\\ch7> sqlite3 < collate.sql\nquote(x) typeof(x)\n----------\
    \ ----------\n1 integer\n2.71828 real\n'three' text\nX'0004' blob\nNULL null\n\
    ```\n\nYou have every one of SQLite's native storage classes sitting in column\
    \ `x`. Naturally, the question arises as to what happens when you try to sort\
    \ this column. That is, before we can talk about how to sort strings, we need\
    \ to review how different data types are sorted first.\n\nWhen SQLite sorts a\
    \ column in a result set (when it uses a comparison operator such as `<` or `>=`\
    \ on the values within that column), the first thing it does is arrange the column's\
    \ values according to storage class. Then within each storage class, it sorts\
    \ the values according to methods specific to that class.\n\nStorage classes are\
    \ sorted in the following order, from first to last:\n\n1. `NULL` values\n2. `INTEGER`\
    \ and `REAL` values\n3. `TEXT` values\n4. `BLOB` values\n\nCHAPTER 7 ■ THE EXTENSION\
    \ C API\n\nNow let's modify the `SELECT` statement in the preceding example to\
    \ include an `ORDER BY` clause such that the SQL is as follows:\n\n```sql\nselect\
    \ quote(x), typeof(x) from foo order by x;\n```\n\nRerunning the query (located\
    \ in `collate2.sql`) confirms this ordering:\n\n```\nC:\\temp\\examples\\ch7>\
    \ sqlite3 < collate.sql\nquote(x) typeof(x)\n---------- ----------\nNULL null\n\
    1 integer\n2.71828 real\n'three' text\nX'0004' blob\n```\n\n`NULL`s are first,\
    \ `INTEGER` and `REAL` are next (in numerical order), `TEXT` is next, and then\
    \ `BLOB`s are last.\n\nSQLite employs specific sorting methods for each storage\
    \ class. `NULL`s are obvious—there is no sort order. Numeric values are sorted\
    \ numerically; integers and floats alike are compared based on their respective\
    \ quantitative values. `BLOB`s are sorted by binary value. Text, finally, is where\
    \ collations come in.\n\n## Collation Defined\n\n*Collation* is the method by\
    \ which strings are compared. A popular¹ glossary of terms defines a collation\
    \ as follows:\n\n> *Text comparison using language-sensitive rules as opposed\
    \ to bit wise comparison of numeric character codes.*\n\nIn general, collation\
    \ has to do with the ordering, comparison, and arrangement of strings and characters.\
    \ Collation methods usually employ collation sequences. A collation sequence is\
    \ just an ordered list of characters, usually numbered to make the order easier\
    \ to remember and use. The list in turn is used to dictate how characters are\
    \ ordered, compared and sorted. Given any two characters, the collation (list)\
    \ can resolve which would come first or whether they are the same.\n\n## How Collation\
    \ Works\n\nNormally, a collation method compares two strings by breaking them\
    \ down and comparing their respective characters using a collation. They do this\
    \ by lining the strings up and comparing characters from left to right (Figure\
    \ 7-2). For example, the strings `'jerry'` and `'jello'` would be compared by\
    \ first comparing the first letter in each string (both *j* in this case). If\
    \ one letter's numerical value according to the collation sequence is larger than\
    \ the other, the comparison is over: the string with the larger letter is deemed\
    \ greater, and no further comparison is required. If, on the other hand, the letters\
    \ have the same value, then the process continues to the second letter in each\
    \ string, and to the third, and so on, until some difference is found (or no difference\
    \ is found, in which case the strings are considered equal). If one string runs\
    \ out of letters before the other, then it is up to the collation method to determine\
    \ what this means.\n\n¹ See [`www.ibm.com/developerworks/library/glossaries/unicode.html`](http://www.ibm.com/developerworks/library/glossaries/unicode.html).\n\
    \n## Figure 7-2. Binary collation\n\n![](index-233_1.png)\n\nCHAPTER 7 ■ THE EXTENSION\
    \ C API\n\nIn this example, the collation is the ASCII character set. Each character's\
    \ numeric ASCII value in the figure is displayed underneath it. Using the collation\
    \ method just described, string comparison continues to the third character, whereupon\
