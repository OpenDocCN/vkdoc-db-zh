    but this is not a safe assumption to make. There is nothing in the documentation
    that says so. Once again, never assume any implicit ordering when working with
    any kind of database. If you are going to use **fail**, in many cases it might
    be better to use **ignore**. **ignore** will finish the job and modify all records
    that can be modified rather than bailing out on the first violation.


    When defined within tables, conflict resolution is specified for individual columns.
    Here’s an


    example:


    CHAPTER 4 ■ ADVANCED SQL FOR SQLITE


    **sqlite> create temp table cast(name text unique on conflict rollback);**


    **sqlite> insert into cast values (''Jerry'');**


    **sqlite> insert into cast values (''Elaine'');**


    **sqlite> insert into cast values (''Kramer'');**'
  trans: '# SQLite 冲突解决策略


    99 行已修改的记录保持不变，但对第 100 行及之后的行所做的更改永远不会发生，因为该命令已被终止。


    ## abort（中止）


    当遇到约束违反时，SQLite 会恢复该命令所做的所有更改并终止它。`abort` 是 SQLite 中所有操作的默认解决策略。这也是 SQL 标准中定义的行为。顺便提一下，`abort`
    也是开销最大的冲突解决策略——即使从未发生冲突，它也需要额外的工作。


    ## rollback（回滚）


    当遇到约束违反时，SQLite 会执行 `rollback`——中止当前命令以及整个事务。最终结果是，当前命令*以及该事务中所有之前的命令*所做的所有更改都会被回滚。这是最严厉的冲突解决级别，单次违规会导致事务中执行的所有操作被完全撤销。


    ## 冲突解决语法


    可以在 SQL 命令中，以及在表和索引定义中指定冲突解决策略。具体来说，可以在 `insert`、`update`、`create table` 和 `create
    index` 中指定冲突解决。此外，它在触发器中具有特定的含义。`insert` 和 `update` 中冲突解决的语法如下：


    ```sql

    insert or resolution into table ( column_list) values ( value_list);

    update or resolution table set ( value_list) where predicate;

    ```


    冲突解决策略紧跟在 `insert` 或 `update` 命令之后，并带有 `OR` 前缀。


    另外，`insert or replace` 表达式可以简写为 `replace`。这类似于其他数据库的 “merge” 或 “upsert” 行为。


    ## 使用 fail 策略


    在前面的 `update` 示例中，对 387 条记录所做的更新被回滚了，因为默认的解决策略是 `abort`。如果你希望更新生效，可以使用 `fail`
    解决策略。为了说明这一点，在下面的例子中，你将 `foods` 复制到一个新表 `test` 中，并将其用作实验对象。


    你在 `test` 表中添加一个名为 `modified` 的额外列，其默认值为 `''no''`。在 `update` 中，你将其更改为 `''yes''`
    以跟踪在约束违反发生前哪些记录被更新了。使用 `fail` 解决策略，这些更新将保持不变，你可以在事后跟踪有多少记录被更新。


    ```sql

    create table test as select * from foods;


    create unique index test_idx on test(id);


    alter table test add column modified text not null default ''no'';


    select count(*) from test where modified=''no'';


    count(*)

    --------------------

    412


    update or fail test set id=800-id, modified=''yes'';


    SQL error: column id is not unique


    select count(*) from test where modified=''yes'';


    count(*)

    --------------------

    387


    drop table test;

    ```


    **注意**：关于 `fail` 策略，有一点你需要了解。记录的更新顺序是非确定性的。也就是说，你无法确定表中记录的顺序或 SQLite 处理它们的顺序。你可能认为它会遵循
    `rowid` 列的顺序，但这并不是一个安全的假设。文档中没有任何地方这么说。再次强调，在使用任何类型的数据库时，永远不要假定任何隐式的排序。如果你打算使用
    `fail`，在许多情况下，使用 `ignore` 可能更好。`ignore` 会完成任务，并修改所有可以被修改的记录，而不是在第一次违规时就退出。


    ## 在表定义中指定冲突解决


    在表中定义时，冲突解决是为单个列指定的。这是一个例子：


    ```sql

    sqlite> create temp table cast(name text unique on conflict rollback);


    sqlite> insert into cast values (''Jerry'');


    sqlite> insert into cast values (''Elaine'');


    sqlite> insert into cast values (''Kramer'');

    ```'
- fmt: '# CHAPTER 4 ■ ADVANCED SQL FOR SQLITE


    ## Database Locks


    Locking is closely associated with transactions in SQLite. To use transactions
    effectively, you need to know a little something about how it does locking.


    SQLite has coarse-grained locking. When a session is writing to the database,
    all other sessions are locked out until the writing session completes its transaction.
    To help with this, SQLite has a locking scheme that helps defer writer locks until
    the last possible moment in order to maximize concurrency.


    ### WRITE-AHEAD LOGGING: THE FUTURE OF SQLITE


    Coming soon in version 3.7.0 of SQLite is write-ahead logging (WAL). This will
    change the behavior of transactions and locking to free SQLite of the “one writer”
    behavior described here. Chapter 11 covers these forthcoming changes to the internals
    of SQLite.


    The `cast` table has a single column `name` with a `unique` constraint and conflict
    resolution set to `rollback`. Any `insert` or `update` that triggers a constraint
    violation on `name` will be arbitrated by the `rollback` resolution rather than
    the default `abort`. The result will abort not only the statement but the entire
    transaction as well:


    ```

    sqlite> begin;

    sqlite> insert into cast values(''Jerry'');

    SQL error: uniqueness constraint failed

    sqlite> commit;

    SQL error: cannot commit - no transaction is active

    ```


    `commit` failed here because the `name`’s conflict resolution already aborted
    the transaction. `create index` works the same way. Conflict resolution within
    tables and indices changes the default behavior of the operation from `abort`
    to that defined for the specific columns when those columns are the source of
    the constraint violation.


    Conflict resolution at the statement level (DML) overrides that defined at the
    object level (DDL).


    Working from the previous example:


    ```

    sqlite> begin;

    sqlite> insert or replace into cast values(''Jerry'');

    sqlite> commit;

    ```


    The `replace` resolution in the `insert` overrides the `rollback` resolution defined
    on `cast.name`.


    SQLite uses a lock escalation policy whereby a connection gradually obtains exclusive
    access to a database in order to write to it. There are five different locking
    states in SQLite: `unlocked`, `shared`, `reserved`, `pending`, and `exclusive`.
    Each database session (or connection) can be in only one of these states at any
    given time. Furthermore, there is a corresponding lock for each state, except
    for unlocked—there is no lock required to be in the unlocked state.


    To begin with, the most basic state is unlocked. In this state, no session is
    accessing data from the database. When you connect to a database or even initiate
    a transaction with `BEGIN`, your connection is in the unlocked state.


    The next state beyond unlocked is shared. For a session to read from the database
    (not write), it must first enter the shared state and must therefore acquire a
    shared lock. Multiple sessions can simultaneously acquire and hold shared locks
    at any given time. Therefore, multiple sessions can read from a common database
    at any given time. However, no session can write to the database during this time—while
    any shared locks are active.


    If a session wants to write to the database, it must first acquire a reserved
    lock. Only one reserved lock may be held at one time for a given database. Shared
    locks can coexist with a reserved lock. A reserved lock is the first phase of
    writing to a database. It does not block sessions with shared locks from reading,
    and it does not prevent sessions from acquiring new shared locks.


    Once a session has a reserved lock, it can begin the process of making modifications;
    however, these modifications are cached and not actually written to disk. The
    reader’s changes are stored in a memory cache (see the discussion of the `cache_size`
    pragma in the section “Database Configuration,” later in this chapter, for more
    information).


    When the session wants to commit the changes (or transaction) to the database,
    it begins the process of promoting its reserved lock to an exclusive lock. To
    get an exclusive lock, it must first promote its reserved lock to a pending lock.
    A pending lock starts a process of attrition whereby no new shared locks can be
    obtained. That is, other sessions with existing shared locks are allowed to continue
    as normal, but other sessions cannot acquire new shared locks. At this point,
    the session with the pending lock is waiting for the other sessions with shared
    locks to finish what they are doing and release them.


    Once all shared locks are released, the session with the pending lock can promote
    it to an exclusive lock. It is then free to make changes to the database. All
    of the previously cached changes are written to the database file.


    ## Deadlocks


    Although you may find the preceding discussion on locking to be interesting, you
    are probably wondering at this point why any of it matters. Why do you need to
    know about locking? Well, if you don’t know what you are doing, you can end up
    in a deadlock.


    Consider the following scenario illustrated in Table 4-2. Two sessions, A and
    B—completely oblivious to one another—are working on the same database at the
    same time. Session A issues the first command, B the second and third, A the fourth,
    and so on.


    *Table 4-2. A Portrait of a Deadlock*


    | **Session A** | **Session B** |

    |---|---|

    | `sqlite> begin;` | |

    | | `sqlite> begin;` |

    | `sqlite> insert into foo values (''x'');` | |

    | | `sqlite> select * from foo;` |

    | `sqlite> commit;` | |

    | `SQL error: database is locked` | |

    | | `sqlite> insert into foo values (''x'');` |

    | | `SQL error: database is locked` |


    Both sessions wind up in a deadlock. Session B was the first to try to write to
    the database and therefore has a pending lock. A attempts to write but fails when
    `INSERT` tries to promote its shared lock to a reserved lock.


    For the sake of argument, let’s say that A decides to just wait around for the
    database to become writable. So does B. Then at this point, everyone else is effectively
    locked out too. If you try to open a third session, it won’t even be able to read
    from the database. The reason is that B has a pending lock, which prevents any
    sessions from acquiring shared locks. So, not only are A and B deadlocked, they
    have locked everyone else out of the database as well. Basically, you have a shared
    lock and one pending lock that don’t want to relinquish control, and until one
    does, nobody can do anything.


    How do you avoid a deadlock? It’s not like A and B can sit down in a meeting and
    work it out with their lawyers. A and B don’t even know each other exists. The
    answer is to pick the right transaction type for the job.


    ## Transaction Types


    SQLite has three different transaction types that start transactions in different
    locking states.


    Transactions can be started as `deferred`, `immediate`, or `exclusive`. A transaction’s
    type is specified in the `begin` command:


    `begin [ deferred | immediate | exclusive ] transaction;`


    A deferred transaction does not acquire any locks until it has to. Thus, with
    a deferred transaction, the `begin` statement itself does nothing—it starts in
    the unlocked state. This is the default. If you simply issue a `begin`, then your
    transaction is `deferred` and therefore sitting in the unlocked state. Multiple
    sessions can simultaneously start `deferred` transactions at the same time without
    creating any locks. In this case, the first read operation against a database
    acquires a shared lock, and similarly the first write operation attempts to acquire
    a reserved lock.'
