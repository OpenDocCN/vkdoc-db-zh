    \ B 树。参数中的标志用于决定是使用表格式（B+树）还是索引格式（B 树）。\n-   `sqlite3BtreeDropTable`：销毁数据库文件中的一个\
    \ B 树。\n-   `sqlite3BtreeClearTable`：从 B 树中移除所有数据，但保持 B 树结构完整。\n\n## 游标函数\n\n\
    游标函数包括以下内容：\n\n-   `sqlite3BtreeCursor`：创建一个指向特定 B 树的新游标。游标可以是读游标或写游标。读游标和写游标不能同时存在于同一个\
    \ B 树中。\n-   `sqlite3BtreeCloseCursor`：关闭 B 树游标。\n-   `sqlite3BtreeFirst`：将游标移动到\
    \ B 树的第一个元素。\n-   `sqlite3BtreeLast`：将游标移动到 B 树的最后一个元素。\n-   `sqlite3BtreeNext`：将游标移动到当前指向元素的下一个元素。\n\
    -   `sqlite3BtreePrevious`：将游标移动到当前指向元素的前一个元素。\n-   `sqlite3BtreeMoveto`：将游标移动到与传入参数键值匹配的元素。如果没有匹配项，则将游标指向如果匹配项存在时其应该所在位置的某一侧的元素。\n\
    \n## 记录函数\n\n键和记录函数包括以下内容：\n\n-   `sqlite3BtreeDelete`：删除游标当前指向的记录。\n-   `sqlite3BtreeInsert`：在\
    \ B 树的适当位置插入一个新元素。\n-   `sqlite3BtreeKeySize`：返回游标当前指向记录的键所占的字节数。\n-   `sqlite3BtreeKey`：返回游标当前指向记录的键。\n\
    -   `sqlite3BtreeDataSize`：返回游标当前指向数据记录的字节数。\n-   `sqlite3BtreeData`：返回游标当前指向记录中的数据。\n\
    \n## 配置函数\n\n设置各种参数的函数包括以下内容：\n\n-   `sqlite3BtreeSetCacheSize`：控制页面缓存大小以及同步写入（如\
    \ `synchronous` 预编译指令所定义）。\n-   `sqlite3BtreeSetSafetyLevel`：改变数据同步到磁盘的方式，以增强或减弱数据库抵抗因操作系统崩溃和电源故障而损坏的能力。级别\
    \ 1 与异步相同（不发生 `syncs()`，损坏概率高）。这等价于预编译指令 `synchronous`=`OFF`。级别 2 是默认值。损坏概率非常低但不为零。这等价于预编译指令\
    \ `synchronous`=`NORMAL`。级别 3 将损坏概率降至接近零，但会降低写入性能。这等价于预编译指令 `synchronous`=`FULL`。\n\
    -   `sqlite3BtreeSetPageSize`：设置数据库页面大小。\n-   `sqlite3BtreeGetPageSize`：返回数据库页面大小。\n\
    -   `sqlite3BtreeSetAutoVacuum`：设置数据库的自动真空属性。\n-   `sqlite3BtreeGetAutoVacuum`：返回数据库是否使用自动真空。\n\
    -   `sqlite3BtreeSetBusyHandler`：设置忙处理程序。\n\n还有更多函数，所有这些都在 `btree.h` 和 `btree.c`\
    \ 中有完善的文档记录，但这里列出的一些函数能让你对 B 树层实现的 API 部分以及该层自身能完成的功能有所了解。\n\n## 显式类型、存储类与类型亲和性\n\
    \n你会从第 4 章我们对 SQLite 存储类的讨论中记得，它底层的数据类型（或域）提供了一种比你在其他系统或数据库中发现的数据类型概念更为灵活的方法。值得进一步探索支撑存储类的机制，包括\
    \ SQLite 处理显式类型和类型亲和性的方式。\n\n### 显式类型\n\nSQLite 使用显式类型。如果你稍作研究，会发现术语 `显式类型` 有多种解释。在编程语言中，显式类型指的是变量或值的类型如何被定义和/或确定。主要有两种解释：\n\
    \n-   `显式类型` 意味着变量的类型必须在代码中显式声明。根据这个定义，C/C++、Pascal 和 Java 等语言会被认为使用了显式类型。而 Perl、Python\
    \ 和 Ruby 等动态类型语言则正好相反，因为它们不要求声明变量的类型。\n-   `显式类型` 意味着变量根本没有类型。相反，只有值才有类型。这似乎与动态类型语言一致。基本上，一个变量可以容纳任何值，该变量在任何时间点的类型由它在那个时刻的值决定。因此，如果你设置变量\
    \ `x`=`1`，那么此时的 `x` 就是 `integer` 类型。如果你接着设置 `x`=`'JujyFruit'`，那么它就变成了 `text` 类型。也就是说，如果它看起来像\
    \ `integer` 并且行为像 `integer`，那它就是一个 `integer`。\n\n为简洁起见，我们将第一种解释称为 MT 1，第二种称为 MT\
    \ 2。乍一看，可能不容易看出哪种解释最适合 SQLite。例如，考虑以下表：\n\n```sql\ncreate table foo(\n  x integer,\n\
    \  y text,\n  z real\n);\n```\n\n假设我们现在向这个表中插入一条记录，如下所示：\n\n```sql\ninsert into\
    \ foo values ('1', '1', '1');\n```\n\n当 SQLite 创建记录时，`x`、`y` 和 `z` 内部存储的类型是什么？答案是\
    \ `integer`、`text` 和 `real`。那么看起来 SQLite 使用了 MT 1：变量有声明的类型。但等一下；SQLite 中的列类型是可选的，所以我们也可以这样定义\
    \ `foo`：`create table foo(x, y, z);`\n\n现在让我们执行同样的 `insert`：\n\n```sql\ninsert\
    \ into foo values ('1', '1', '1');\n```\n\n现在 `x`、`y` 和 `z` 是什么类型？答案：`text`、`text`\
    \ 和 `text`。嗯，也许 SQLite 只是默认将列设置为 `text` 类型。如果你这么想，那么考虑以下对同一个表的 `insert` 语句：\n\n\
    ```sql\nINSERT INTO FOO VALUES (1, 1.0, x'10');\n```\n\n这一行中的 `x`、`y` 和 `z` 是什么类型？`integer`、`real`\
    \ 和 `blob`。这看起来像是 MT 2，即值本身决定了它的类型。\n\n那么，到底是哪一种呢？简短的回答是：既不是，又都是。详细的回答则稍微复杂一些。\n\
    \n关于 MT 1，SQLite 允许你为列声明类型，如果你愿意的话。这看起来和感觉上都像是其他数据库的做法。但你*不必须*这样做，因此这也违反了 MT1\
    \ 的解释。这是因为在所有情况下，SQLite 都能接受任何值并从中推断出类型。它不需要列中声明的类型来帮忙。关于 MT 2，SQLite 允许值的类型“影响”（可能不是完全决定）存储在列中的类型。但你仍然可以为列声明类型，并且该类型会产生一些影响，因此这也违反了“类型仅来自值”的解释。我们这里真正拥有的是\
    \ MT 3——SQLite 的解释。它借鉴了 MT 1 和 MT 2 两者。\n\n但有趣的是，显式类型并没有解决与类型相关的全部问题。它似乎只关注声明和解析类型。那么类型检查呢？也就是说，如果你将一个列声明为\
    \ `integer` 类型，这究竟意味着什么？\n"
- fmt: '# CHAPTER 11 ■ SQLITE INTERNALS AND NEW FEATURES


    ## Type Affinity


    First let’s consider what most other relational databases do. They enforce *strict
    type checking* as a standard part of standard domain integrity. First you declare
    a column’s type. Then only values of that type can go in it. End of story. You
    can use additional domain constraints if you want, but under no conditions can
    you ever insert values of other types. Consider the following example with Oracle:


    ```sql

    SQL> create table domain(x int, y varchar(2));


    Table created.


    SQL> insert into domain values (''pi'', 3.14);


    insert into domain values (''pi'', 3.14)


    *****


    ERROR at line 1:


    ORA-01722: invalid number

    ```


    The value `''pi''` is not an integer value. And column `x` was declared to be
    of type `int`. We don’t even get to hear about the error in column `y` because
    the whole `insert` is aborted because of the integrity violation on `x`. When
    I try this in SQLite, we said one thing and did another, and SQLite didn’t stop
    me:


    ```sql

    sqlite> create table domain (x int, y varchar(2));


    sqlite> INSERT INTO DOMAIN VALUES (''pi'', 3.14);


    sqlite> select * from domain;


    x y


    ---- -----


    pi 3.14

    ```


    *SQLite’s domain integrity does not include strict type checking*. So, what is
    going on? Does a column’s declared type count for anything? Yes. Then how is it
    used? It is all done with something called *type affinity*.


    In short, SQLite’s manifest typing states that columns can have types and that
    types can be inferred from values. Type affinity addresses how these two things
    relate to one another. Type affinity is a delicate balancing act that sits between
    strict typing and dynamic typing.


    ## Column Types and Affinities


    In SQLite, columns don’t have types or domains. Although a column can have a declared
    type, internally it has only a type affinity. Declared type and type affinity
    are two different things. Type affinity determines the storage class SQLite uses
    to store values within a column. The actual storage class a column uses to store
    a given value is a function of both the value’s storage class and the column’s
    affinity. Before getting into how this is done, however, let’s first talk about
    how a column gets its affinity.


    To begin with, every column has an affinity. There are four different kinds: `numeric`,
    `integer`, `text`, and `none`. A column’s affinity is determined directly from
    its declared type (or lack thereof). Therefore, when you declare a column in a
    table, the type you choose to declare it will ultimately determine that column’s
    affinity. SQLite assigns a column’s affinity according to the following rules:


    *   By default, a column’s default affinity is `numeric`. That is, if a column
    is not `integer`, `text`, or `none`, then it is automatically assigned `numeric`
    affinity.

    *   If a column’s declared type contains the string `''int''` (in uppercase or
    lowercase), then the column is assigned `integer` affinity.

    *   If a column’s declared type contains any of the strings `''char''`, `''clob''`,
    or `''text''` (in uppercase or lowercase), then that column is assigned `text`
    affinity. Notice that `''varchar''` contains the string `''char''` and thus will
    confer `text` affinity.

    *   If a column’s declared type contains the string `''blob''` (in uppercase or
    lowercase), *or if it has no declared type,* then it is assigned `none` affinity.


    **Note** Pay attention to defaults. For instance, `floatingpoint` has affinity
    `integer`. If you don’t declare a column’s type, then its affinity will be `none`,
    in which case all values will be stored using their given storage class (or inferred
    from their representation). If you are not sure what you want to put in a column
    or want to leave it open to change, this is the best affinity to use. However,
    be careful of the scenario where you declare a type that does not match any of
    the rules for `none`, `text`, or `integer`. Although you might intuitively think
    the default should be `none`, it is actually `numeric`. For example, if you declare
    a column of type `JUJYFRUIT`, it will not have affinity `none` just because SQLite
    doesn’t recognize it. Rather, it will have affinity `numeric`. (Interestingly,
    the scenario also happens when you declare a column’s type to be `numeric` for
    the same reason.) Rather than using an unrecognized type that ends up as `numeric`,
    you may prefer to leave the column’s declared type out altogether, which will
    ensure it has affinity `none`.


    ## Affinities and Storage


    Each affinity influences how values are stored in its associated column. The rules
    governing storage are as follows:


    *   A `numeric` column may contain all five storage classes. A `numeric` column
    has a bias toward numeric storage classes (`integer` and `real`). When a `text`
    value is inserted into a `numeric` column, it will attempt to convert it to an
    `integer` storage class. If this fails, it will attempt to convert it to a `real`
    storage class. Failing that, it stores the value using the `text` storage class.

    *   An `integer` column tries to be as much like a `numeric` column as it can.
    An `integer` column will store a `real` value as `real`. *However,* if a `real`
    value has *no fractional component,* then it will be stored using an `integer`
    storage class. `integer` column will try to store a `text` value as `real` if
    possible. If that fails, they try to store it as `integer`. Failing that, `text`
    values are stored as `TEXT`.

    *   A `text` column will convert all `integer` or `real` values to `text`.

    *   A `none` column does not attempt to convert any values. All values are stored
    using their given storage class.

    *   No column will ever try to convert `null` or `blob` values—regardless of affinity.
    `null` and `blob` values are always stored as is in every column.


    These rules may initially appear somewhat complex, but their overall design goal
    is simple: to make it possible for SQLite to mimic other relational databases
    if you need it to do so. That is, if you treat columns like a traditional database,
    type affinity rules will store values in the way you expect. If you declare a
    column of type `integer` and put integers into it, they will be stored as `integer`.
    If you declare a column to be of type `text`, `char`, or `varchar` and put integers
    into it, they will be stored as `text`. However, if you don’t follow these conventions,
    SQLite will still find a way to store the value.


    ## Affinities in Action


    Let’s look at a few examples to get the hang of how affinity works. Consider the
    following:


    ```sql

    sqlite> create table domain(i int, n numeric, t text, b blob);


    sqlite> insert into domain values (3.142,3.142,3.142,3.142);


    sqlite> insert into domain values (''3.142'',''3.142'',''3.142'',''3.142'');


    sqlite> insert into domain values (3142,3142,3142,3142);


    sqlite> insert into domain values (x''3142'',x''3142'',x''3142'',x''3142'');


    sqlite> insert into domain values (null,null,null,null);


    sqlite> select rowid,typeof(i),typeof(n),typeof(t),typeof(b) from domain;


    rowid typeof(i) typeof(n) typeof(t) typeof(b)


    ---------- ---------- ---------- ---------- ----------


    1 real real text real


    2 real real text text


    3 integer integer text integer


    4 blob blob blob blob


    5 null null null null

    ```'
