  trans: "# 预处理查询 vs. sqlite3_exec()\n\n预处理查询使用一组特殊函数来访问行中的字段和列信息。你可以通过 `sqlite3_column_*xxx*()`\
    \ 函数获取列的值，其中 `*xxx*` 代表要返回值的数据类型（例如 `int`、`double`、`blob`）。你可以以任何你需要的格式检索数据。你还可以获取列的声明类型（如\
    \ `create table` 语句中所定义的）以及其他杂项元数据，例如存储格式以及关联的表名和数据库名。\n\n相比之下，`sqlite3_exec()`\
    \ 通过其回调函数仅提供了这部分信息中的一小部分。`sqlite3_get_table()` 也是如此，它只将结果集的列标题与数据一起返回。\n\n在实践中，你会发现每种查询方法都有其用途。`sqlite3_exec()`\
    \ 特别适合执行修改数据库的命令（`create`、`drop`、`insert`、`update` 和 `delete`）。一次函数调用，即可完成。预处理查询通常更适合\
    \ `select` 语句，因为它们能提供更多信息、更线性的编码方式（无需回调函数），并且通过使用游标遍历结果来提供更多控制。\n\n正如你在第 5 章所回顾的，预处理查询的执行分为三个基本步骤：编译、执行和终结。你使用\
    \ `sqlite3_prepare_v2()` 编译查询，使用 `sqlite3_step()` 逐步执行它，然后使用 `sqlite3_finalize()`\
    \ 关闭它，或者你也可以使用 `sqlite3_reset()` 来复用它。\n\n这个流程及各个步骤都将在以下小节中详细阐述。\n\n## 编译\n\n\
    编译，或称准备，接收一条 SQL 语句，并将其编译成虚拟数据库引擎（VDBE）可读的字节码。该过程由 `sqlite3_prepare_v2()` 执行，其声明如下：\n\
    \n```c\nint sqlite3_prepare_v2(\n  sqlite3 *db,              /* 数据库句柄 */\n  const\
    \ char *zSql,         /* SQL 文本，UTF-8 编码 */\n  int nBytes,               /* zSql\
    \ 的长度，以字节为单位。 */\n  sqlite3_stmt **ppStmt,    /* OUT: 语句句柄 */\n  const char **pzTail\
    \       /* OUT: 指向 zSql 未使用部分的指针 */\n);\n```\n\n`sqlite3_prepare_v2()` 编译 `zSQL`\
    \ 字符串中的第一条 SQL 语句（该字符串可以包含多条 SQL 语句）。它分配执行该语句所需的所有资源，并将其与字节码关联到一个单独的语句句柄（也常简称为*语句*）中，由输出参数\
    \ `ppStmt` 指定，这是一个 `sqlite3_stmt` 结构。从程序员的角度来看，这个结构不过是一个用于执行 SQL 语句并获取相关记录的透明句柄。然而，这个数据结构包含了命令的字节码、绑定参数、B-树游标、执行上下文以及\
    \ `sqlite3_step()` 在执行期间管理查询状态所需的任何其他数据。\n\n`sqlite3_prepare_v2()` 不会以任何方式影响连接或数据库。它不会启动事务或获取锁。它直接与编译器协作，仅仅是为执行准备查询。语句句柄高度依赖于编译它们时所用的数据库模式。如果你在准备语句和实际运行语句之间，有另一个连接更改了数据库模式，你准备的语句将会失效。不过，`sqlite3_prepare_v2()`\
    \ 内置了自动尝试重新编译（重新准备）你的语句的机制（如果可能的话），并且如果模式更改使你现有的语句失效，它会静默地执行此操作。如果模式更改导致重新编译不可能，那么你使用该语句调用\
    \ `sqlite3_step()` 将导致 `SQLITE_SCHEMA` 错误，这将在后面的“错误与意外情况”一节中讨论。此时，你需要使用 `sqlite3_errmsg()`\
    \ 函数来检查与 `SQLITE_SCHEMA` 关联的错误。\n\n## 执行"
- fmt: "Once you prepare the query, the next step is to execute it using `sqlite3_step()`,\
    \ declared as follows: `int sqlite3_step(sqlite3_stmt *pStmt);`\n\n`sqlite3_step()`\
    \ takes the statement handle and talks directly to the VDBE, which steps through\
    \ its byte-code instructions one by one to carry out the SQL statement. On the\
    \ first call to `sqlite3_step()`, the VDBE obtains the requisite database lock\
    \ needed to perform the command. If it can’t get the lock, `sqlite3_step()` will\
    \ return `SQLITE_BUSY`, if there is no busy handler installed. If one is installed,\
    \ it will call that handler instead.\n\nFor SQL statements that don’t return data,\
    \ the first call to `sqlite3_step()` executes the command in its entirety, returning\
    \ a result code indicating the outcome. For SQL statements that do return data,\
    \ such as `select`, the first call to `sqlite3_step()` positions the statement’s\
    \ B-tree cursor on the first record.\n\nSubsequent calls to `sqlite3_step()` position\
    \ the cursor on subsequent records in the result set.\n\n`sqlite3_step()` returns\
    \ `SQLITE_ROW` for each record in the set until it reaches the end, whereupon\
    \ it returns `SQLITE_DONE`, indicating that the cursor has reached the end of\
    \ the set.\n\n■ **Note** For those of you familiar with older versions of SQLite,\
    \ these result codes are part of the more advanced—and some would say more correct—set\
    \ of result codes that replace the legacy simple return values like `SQLITE_ERROR`.\
    \ A full list of result codes and extended result codes is available at [www.sqlite.org/c3ref/c_abort.html](http://www.sqlite.org/c3ref/c_abort.html).\n\
    \nAll other API functions related to data access use the statement’s cursor to\
    \ obtain information about the current record. For example, the `sqlite3_column_*xxx*()`\
    \ functions all use the statement handle, specifically its cursor, to fetch the\
    \ current record’s fields.\n\n## CHAPTER 6 ■ THE CORE C API\n\n### Finalization\
    \ and Reset\n\nOnce the statement has reached the end of execution, it must be\
    \ finalized. You can either finalize or reset the statement using one of the following\
    \ functions:\n\n`int sqlite3_finalize(sqlite3_stmt *pStmt);`\n\n`int sqlite3_reset(sqlite3_stmt\
    \ *pStmt);`\n\n`sqlite3_finalize()` will close out the statement. It frees resources\
    \ and commits or rolls back any implicit transactions (if the connection is in\
    \ autocommit mode), clearing the journal file and freeing the associated lock.\n\
    \nIf you want to reuse the statement, you can do so using `sqlite3_reset()`. It\
    \ will keep the compiled SQL statement (and any bound parameters) but commits\
    \ any changes related to the current statement to the database. It also releases\
    \ its lock and clears the journal file if autocommit is enabled. The primary difference\
    \ between `sqlite3_finalize()` and `sqlite3_reset()` is that the latter preserves\
    \ the resources associated with the statement so that it can be executed again,\
    \ avoiding the need to call `sqlite3_prepare()` to compile the SQL command.\n\n\
    Let’s go through an example.\n\n#### Listing 6-5. Using Prepared Queries\n\nListing\
    \ 6-5 shows a simple, complete program using a prepared query. It is taken from\
    \ `select.c` in the examples.\n\n```c\nint main(int argc, char **argv)\n{\n  \
    \  int rc, i, ncols;\n    sqlite3 *db;\n    sqlite3_stmt *stmt;\n    char *sql;\n\
    \    const char *tail;\n\n    rc = sqlite3_open_v2(\"foods.db\", &db);\n    if(rc)\
    \ {\n        fprintf(stderr, \"Can't open database: %s\\n\", sqlite3_errmsg(db));\n\
    \        sqlite3_close(db);\n        exit(1);\n    }\n\n    sql = \"select * from\
    \ episodes;\";\n    rc = sqlite3_prepare_v2(db, sql, -1, &stmt, &tail);\n    if(rc\
    \ != SQLITE_OK) {\n        fprintf(stderr, \"SQL error: %s\\n\", sqlite3_errmsg(db));\n\
    \    }\n\n    rc = sqlite3_step(stmt);\n    ncols = sqlite3_column_count(stmt);\n\
    \n    while(rc == SQLITE_ROW) {\n        for(i=0; i < ncols; i++) {\n        \
    \    fprintf(stderr, \"'%s' \", sqlite3_column_text(stmt, i));\n        }\n  \
    \      fprintf(stderr, \"\\n\");\n        rc = sqlite3_step(stmt);\n    }\n\n\
    \    sqlite3_finalize(stmt);\n    sqlite3_close(db);\n    return 0;\n}\n```"
