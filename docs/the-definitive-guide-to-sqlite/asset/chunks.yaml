    `create table` 命令允许你在命令末尾包含一个额外的列约束列表，在之前概述的语法中由 `constraints` 表示。考虑以下示例：\n```sql\n\
    create table contacts (\n    id integer primary key,\n    name text not null collate\
    \ nocase,\n    phone text not null default 'UNKNOWN',\n    unique (name,phone)\n\
    );\n```\n列 `id` 被声明为 `integer` 类型并带有 `primary key` 约束。事实证明，这种类型与约束的组合在 SQLite\
    \ 中具有特殊含义。`整数主键` 本质上将该列变成了一个自增列（如本章后续“主键约束”一节所述）。列 `name` 被声明为 `text` 类型并有两个约束：`not\
