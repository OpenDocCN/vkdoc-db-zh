    \ | add column column_def }\n```\n注意这里有一些新符号：`{}`。花括号内是一个选项列表，其中必须选择一项。在这里，我们必须使用\
    \ `alter table table rename…` 或 `alter table table add column…` 二者之一。也就是说，你可以使用\
    \ `rename` 子句重命名表，或使用 `add column` 子句添加列。要重命名表，只需提供由 `name` 给出的新名称即可。\n\n如果要添加列，由\
    \ `column_def` 表示的列定义遵循 `create table` 语句中的形式。它是一个名称，后接一个可选的域和约束列表。这是一个例子：\n```sql\n\
    sqlite> alter table contacts\n...> add column email text not null default '' collate\
