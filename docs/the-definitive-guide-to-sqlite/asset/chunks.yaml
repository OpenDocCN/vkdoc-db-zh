    Android


    devices and configurable in your AVD, there are other limits that can crimp your
    style. The most common of these involves using the **CursorWindow** object as
    a secondary cache of **Cursor** result rows. A **CursorWindow** can accommodate
    only 1MB of data. The variable smooth operation or crashing behavior you can see
    can be caused by attempting to exceed the **CursorWindow** size limit with too
    many rows and or rows with excessively long data. Naturally, sometimes your data
