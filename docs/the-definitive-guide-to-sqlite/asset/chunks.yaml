    that the **SHARED** lock is not necessarily released until **finalize()** (or
    **reset()**) is called—well, most of the time. Consider the following example:


    **stmt = c1.prepare(''select * from episodes'')**


    **while stmt.step()**


    **print stmt.column(''name'')**


    **end**


    **c2.exec(''begin immediate; update episodes set …; commit;'')**


    **stmt.finalize()**


    Although you should never do this in practice, you might end up doing it anyway
    by accident simply because you can get away with it. If you write the equivalent
    of this program in the C API, it will actually work. Even though **finalize()**
    has not been called, the second connection can modify the database without any
    problem. Before we tell you why, take a look at the next example:


    **c1 = open(''foods.db'')**


    **c2 = open(''foods.db'')**


    **stmt = c1.prepare(''select * from episodes'')**


    **stmt.step()**


    **stmt.step()**


    **stmt.step()**


    **c2.exec(''begin immediate; update episodes set …; commit;'')**


    **stmt.finalize()**


    CHAPTER 5 ■ SQLITE DESIGN AND CONCEPTS


    Let’s say that **episodes** has 100 records. And the program stepped through only
    three of them. What happens here? The second connection will get **SQLITE_BUSY**.


    In the first example, SQLite released the **SHARED** lock when the statement reached
    the end of the result set. That is, in the final call to **step()**, where the
    API returns **SQLITE_DONE**, the VDBE encountered the **Close** instruction, and
    SQLite closed the cursor and dropped the **SHARED** lock. Thus, **c2** was able
