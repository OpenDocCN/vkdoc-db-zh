    土耳其俱乐部三明治 | 气泡男孩 | 4 | 巫师 | 9 |


    我在 SQL 中添加了注释，以便更好地解释其工作原理。此示例使用 `where` 子句连接语法进行了两次自连接。`episodes` 和 `foods_episodes`
    表各有两个实例，但它们被视为两张独立的表。该查询将 `foods_episodes` 表连接回自身，以链接 `episodes` 的两个实例。这两个 `episodes`
    实例通过一个不等式条件相互关联，以确保它们处于不同的季度。你可以以相同的方式为列名和表达式创建别名。SQLite 中通用的别名语法在所有情况下都是相同的：


    `Select 基础名称 [[as] 别名] …`


    `as` 关键字是可选的，但许多人更喜欢使用它，因为它使别名更具可读性，并且让你不太可能将别名与基础列名或表达式混淆。


    ## 子查询


    子查询是 `select` 语句内部的 `select` 语句。它们也被称为子选择。子查询在很多方面都很有用，它们可以在任何普通表达式可以工作的地方使用，因此可以在
    `select` 语句的多种位置中使用。子查询在其他命令中也很有用。


    也许子查询最常见的用法是在 `where` 子句中，特别是使用 `in` 操作符。`in` 操作符是一个二元操作符，它接受一个输入值和一个值列表，如果输入值存在于列表中，则返回
    true，否则返回 false。下面是一个例子：


    ```

    sqlite> select 1 in (1,2,3);

    1

    sqlite> select 2 in (3,4,5);

    0

    sqlite> select count(*)

    ...> from foods

    ...> where type_id in (1,2);

    62

    ```


    使用子查询，你可以根据 `food_types` 表中的名称重写最后一条语句：

    ```

    sqlite> select count(*)

    ...> from foods

    ...> where type_id in

    ...> (select id

    ...> from food_types

    ...> where name=''Bakery'' or name=''Cereal'');

    62

    ```


    `select` 子句中的子查询可用于将来自其他表的附加数据添加到结果集中。例如，要获取每种食物出现的剧集数量，实际的 `foods_episodes` 计数可以在
    `select` 子句的子查询中执行：

    ```

    sqlite> select name,

    (select count(id) from foods_episodes where food_id=f.id) count

    from foods f order by count desc limit 10;

    name        count

    ----------  ----------

    热狗        5

    披萨        4

    番茄酱      4

    荞麦米      4

    虾          3

    龙虾        3

    火鸡三明治  3

    土耳其俱乐部 3

    鸡蛋沙拉    3

    滴答薄荷糖  3

    ```


    这里的 `order by` 和 `limit` 子句用于创建前十名列表，热狗位居榜首。请注意，子查询的谓词引用了外部 `select` 命令中的表：`food_id=f.id`。变量
    `f.id` 存在于外部查询中。此示例中的子查询称为**关联子查询**，因为它引用了外部（包围）查询中的一个变量，或者说与之关联。


    子查询也可以在 `order by` 子句中使用。以下 SQL 语句按食物所属食物类别的大小（从大到小）对食物进行分组：

    ```

    select * from foods f

    order by (select count(type_id)

    from foods where type_id=f.type_id) desc;

    ```


