  trans: "# 页面大小、编码与自动真空\n\n数据库页面大小、编码和自动真空必须在创建数据库之前设置。也就是说，若要更改默认值，你必须在新建数据库中创建任何数据库对象之前先设置这些编译指示。默认值包括一个源自宿主机特定因素（如磁盘扇区大小）的页面大小以及\
    \ UTF-8 编码。SQLite 支持的页面大小范围从 512 字节到 32,786 字节，以 2 的幂次增长。\n\n支持的编码包括 UTF-8、UTF-16le（小端序\
    \ UTF-16 编码）和 UTF-16be（大端序 UTF-16 编码）。\n\n使用 `auto_vacuum` 编译指示可以自动将数据库文件大小保持在最小。通常，当一个删除数据库数据的事务提交后，数据库文件大小保持不变。而启用\
    \ `auto_vacuum` 编译指示后，当删除数据的事务提交时，数据库文件会缩小。为支持此功能，数据库在内部存储了额外信息，这会导致数据库文件比原本可能的大小略大。`vacuum`\
    \ 命令对使用了 `auto_vacuum` 的数据库没有效果。\n\n# 调试\n\n有四个用于各种调试目的的编译指示。`integrity_check`\
    \ 编译指示用于查找乱序记录、缺失页面、格式错误的记录和损坏的索引。如果发现任何问题，则会返回一个描述问题的字符串。如果一切正常，SQLite 返回 `ok`。其他编译指示用于追踪解析器和虚拟数据库引擎，并且仅在\
    \ SQLite 编译时包含调试信息的情况下才能启用。你可以在第 11 章找到关于这些编译指示的详细信息。\n\n# 第四章 ■ SQLITE 的高级 SQL\n\
    \n## 系统目录\n\n`sqlite_master` 表是一个系统表，它包含了数据库中所有表、视图、索引和触发器的信息。例如，当前 `foods` 数据库的内容如下所示：\n\
    \n```\nsqlite> select type, name, rootpage from sqlite_master;\ntype       name\
    \                          rootpage\n---------- -----------------------------\
    \ ----------\ntable      episodes                      2\ntable      foods   \
    \                      3\ntable      foods_episodes                4\ntable  \
    \    food_types                    5\nindex      foods_name_idx              \
    \  30\ntable      sqlite_sequence               50\ntrigger    foods_update_trg\
    \              0\ntrigger    foods_insert_trg              0\ntrigger    foods_delete_trg\
    \              0\n```\n\n`type` 列表示对象的类型，`name` 列当然是对象的名称，`rootpage` 列则指代对象在数据库文件中的第一个\
    \ B-树页面。后一列仅对表和索引有意义。\n\n`sqlite_master` 表还包含另一个名为 `sql` 的列，它存储了用于创建对象的 DDL 语句。以下是一个示例：\n\
    \n```\nsqlite> select sql from sqlite_master where name='foods_update_trg';\n\
    create trigger foods_update_trg\nbefore update of type_id on foods\nbegin\n  select\
    \ case\n    when (select id from food_types where id=new.type_id) is null\n  \
    \    then raise( abort,\n         'Foreign Key Violation: foods.type_id is not\
    \ in food_types.id')\n  end;\nend\n```\n\n## 查看查询计划\n\n你可以使用 `explain query plan`\
    \ 命令来查看 SQLite 执行查询的方式。\n\n`explain query plan` 命令列出了 SQLite 为满足你的查询而执行的访问和处理表与数据的各个步骤。\n\
    \n要使用 `explain query plan`，只需发出该命令，后跟你正常的查询文本。例如，以下是关于如何处理对 `foods` 表的查询的 `explain\
    \ query plan` 输出：\n\n```\nsqlite> explain query plan select * from foods where\
    \ id = 145;\norder from detail\n---------- ---------- ---------------------------------\n\
    0        0          TABLE foods USING PRIMARY KEY\n```\n\n这意味着 SQLite 正在访问 `foods`\
    \ 表并使用主键（在 `id` 列上）来执行访问（而不是以粗暴的方式扫描表数据）。\n\n研究这些查询计划是理解 SQLite 如何处理你的数据并满足你查询的关键。你可以发现索引何时以及如何被使用，以及表在联接中被使用的顺序。这对于排查长时间运行的查询和其他问题有巨大帮助。\n\
    \n## 总结\n\nSQL 可能是一门使用起来简单的语言，但它的内容相当丰富，我们花了两章才介绍了 SQLite 的 SQL 实现中的主要概念。但这不应该太令人惊讶，因为它是与关系数据库交互的唯一接口。无论你是普通用户、系统管理员还是开发人员，如果要使用关系数据库，就必须了解\
    \ SQL。\n\n如果你正在使用 SQLite 编程，那么你在 SQL 方面应该已经有了一个良好的开端。\n\n现在你需要对 SQLite 如何执行所有这些命令有所了解。这正是第\
    \ 5 章应该发挥作用的地方。它将向你介绍 API，并展示它如何与 SQLite 内部的工作方式相关联。\n\n# 第五章 ■ ■ ■ SQLite 设计与概念\n\
    \n本章为后续章节奠定了基础，每一章都侧重于使用 SQLite 进行编程的不同方面。它阐述了作为程序员在代码中使用 SQLite 时应该了解的事项。无论你是使用原生\
    \ C 语言还是使用你喜欢的脚本语言进行 SQLite 编程，了解其 API 以及一点其架构和实现知识都会有所帮助。掌握了这些知识，你将能更好地编写出运行速度更快、并避免潜在陷阱（如死锁或意外错误）的代码。你将看到\
    \ SQLite 如何与你的代码协同工作，并且可以更有信心地从正确的方向解决问题。\n\n你不需要深入钻研源代码的内部细节来理解这些，也不必是 C 程序员。SQLite\
    \ 的设计和概念都非常直接且易于理解。而且你需要了解的东西并不多。本章阐述了构建你理解基础的主要概念和组件。\n\n理解 SQLite 的关键在于了解 API\
    \ 的工作原理。因此，本章从概念性介绍 API 开始，阐述其主要的数据结构、总体设计以及主要函数。\n\n它还考察了在查询处理中扮演重要角色的一些主要 SQLite\
    \ 子系统。\n\n除了了解哪些函数实现什么功能之外，我们还将超越 API 层面，从事务的角度观察所有操作。任何涉及 SQLite 数据库的操作都是在事务上下文中完成的。然后，你需要审视\
    \ API 之下，了解事务在锁的层面上如何工作。\n\n如果你不了解锁的操作方式，它们可能会导致问题。通过理解锁，你不仅可以避免潜在的并发问题，还可以通过控制程序使用锁的方式来优化查询。\n\
    \n最后，你必须理解所有这些如何应用于编写代码。本章的最后部分将 API、事务和锁这三个主题结合起来，并通过一些好代码和坏代码的示例进行说明。它特别指出了可能导致问题的场景，并提供了一些关于如何解决问题的见解。\n\
    \n理清这些内容后，你将顺利踏上征服 C API 以及任何语言扩展 API 的征程。\n\n## API\n\n从功能上讲，SQLite API 可分为两个主要部分：核心\
    \ API 和扩展 API。\n\n核心 API 包含所有用于执行基本数据库操作的函数：连接数据库、处理 SQL 以及遍历结果。它还包括各种实用函数，用于协助完成诸如字符串格式化、操作控制、调试和错误处理等任务。"
- fmt: '# CHAPTER 5 SQLITE DESIGN AND CONCEPTS


    ## The Principal Data Structures


    As you saw in Chapter 1, there are many components in SQLite—parser, tokenizer,
    virtual machine, and so on. But from a programmer’s point of view, the main things
    to know about are connections, statements, the B-tree, and the pager. Figure 5-1
    shows their relationships to one another. These objects collectively address the
    three principal things you must know about SQLite to write good code: the API,
    transactions, and locks.


    *Figure 5-1. SQLite C API object model*


    Technically, the B-tree and pager are not part of the API; they are off-limits.
    But they play a critical role in transactions and locks. We will explore their
    involvement in these matters here in this section and later in the section “Transactions.”


    ### Connections and Statements


    The two fundamental data structures in the API associated with query processing
    are the connection and the statement. In most language extensions, you will see
    both a connection object and a statement object, which are used to execute queries.
    In the C API, they correspond directly to the `sqlite3` and `sqlite3_stmt` handles,
    respectively. Every major operation in the API is done using one of these two
    structures.


    A connection represents a single connection to a database as well as a single
    transaction context. Statements are derived from connections. That is, every statement
    has an associated connection object.


    A statement represents a single compiled SQL statement. Internally, it is expressed
    in the form of VDBE byte code—a program that when executed will carry out the
    SQL command. Statements contain everything needed to execute a command. They include
    resources to hold the state of the VDBE program as it is executed in a stepwise
    fashion, B-tree cursors that point to records on disk, and other things such as
    bound parameters, which are addressed later in the section “Parameter Binding.”
    Although they contain many different things, you can simply think of them as cursors
    with which to iterate through a result set, or as opaque handles referencing a
    single SQL command.


    ### The B-tree and Pager


    Each connection can have multiple database objects—one main database followed
    by any attached databases. Each database object has one B-tree object, which in
    turn has one pager object.


    Statements use their connection’s B-tree and pager objects to read and write data
    to and from the database. Statements that read the database iterate over B-trees
    using cursors. Cursors iterate over records, and records are stored in pages.
    As a cursor traverses records, it also traverses pages. For a cursor to access
    a page, it must first be loaded from disk into memory. This is the pager’s job.
    Whenever the B-tree needs a particular page in the database, it asks the pager
    to fetch it from disk. The pager then loads the page into its page cache, which
    is a memory buffer. Once it is in the page cache, the B-tree and its associated
    cursor can get to the records inside the page.


    If the cursor modifies the page, then the pager must also take special measures
    to preserve the original page in the event of a transaction rollback. Thus, the
    pager is responsible for reading and writing to and from the database, maintaining
    a memory cache or pages, and managing transactions. In addition to this, it manages
    locks and crash recovery. All of these responsibilities are covered later in “Transactions.”


    There are two things you should know about connections and transactions in general.
    First, when it comes to any operation on the database, a connection *always* operates
    under a transaction. Second, a connection *never* has more than one transaction
    open at a time. That means all statements derived from a given connection operate
    within the same transaction context. If you want the two statements to run in
    separate transactions, then you have to use multiple connections—one connection
    for each transaction context.


    ## The Core API


    As mentioned earlier, the core API is concerned with executing SQL commands. It
    is made of various functions for performing queries as well as various utility
    functions for managing other aspects of the database. There are two essential
    methods for executing SQL commands: prepared queries and wrapped queries. Prepared
    queries are the way in which SQLite ultimately executes all commands, both in
    the API and internally. It is a three-phase process consisting of preparation,
    execution, and finalization. There is a single API function associated with each
    phase. Associated with the execution phase are functions with which to obtain
    record and column information from result sets.


    In addition to the standard query method, there are two wrapper functions, which
    wrap the three phases into a single function call. They provide a convenient way
    to execute a SQL command all at once. These functions are just a few of the many
    miscellaneous utility functions in the API. We will look at all of the query methods
    along with their associated utility functions in this section. Before we do however,
    let’s first look at how to connect to a database.


    ### Connecting to a Database


    Connecting to a database involves little more than opening a file. Every SQLite
    database is stored in a single operating system file—one database to one file.
    The function used to connect, or open, a database in the C API is `sqlite3_open()`
    and is basically just a system call for opening a file. SQLite can also create
    in-memory databases. In most extensions, if you use `:memory:` or an empty string
    as the name for the database, it will create the database in RAM. The database
    will be accessible only to the connection that created it (it cannot be shared
    with other connections). Furthermore, the database will only last for the duration
    of the connection. It is deleted from memory when the connection closes.


    When you connect to a database on disk, SQLite opens a file, if it exists. If
    you try to open a file that doesn’t exist, SQLite will assume that you want to
    create a new database. In this case, SQLite doesn’t immediately create a new operating
    system file. It will create a new file only if you put something into the new
    database—create a table or view or other database object. If you just open a new
    database, do nothing, and close it, SQLite does not bother with creating a database
    file—it would just be an empty file anyway.


    There is an important reason for not creating a new file right away. Certain database
    options, such as encoding, page size, and autovacuum, can be set only before you
    create a database. By default, SQLite uses a 1,024-byte page size. However, you
    can use different page sizes ranging from 512 to 32,768 bytes by powers of 2.
    You might want to use different page sizes for performance reasons. For example,
    setting the page size to match the operating system’s page size can make I/O more
    efficient. Larger page sizes can help with applications that deal with a lot of
    binary data. You set the database page size using the `page_size` pragma.


    Encoding is another permanent database setting. You specify a database’s encoding
    using the `encoding` pragma, which can be `UTF-8`, `UTF-16`, `UTF-16le` (little
    endian), and `UTF-16be` (big endian).


    The extension API offers different ways to extend SQLite by creating your own
    user-defined SQL extensions, which you can integrate into SQLite’s SQL dialect.'
