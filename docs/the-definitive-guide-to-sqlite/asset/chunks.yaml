    \nTable management routines include the following:\n\n- `sqlite3BtreeCreateTable`:\
    \ Creates a new, empty B-tree in a database file. Flags in the argument determine\
    \ whether to use a table format (B+tree) or index format (B-tree).\n- `sqlite3BtreeDropTable`:\
    \ Destroys a B-tree in a database file.\n- `sqlite3BtreeClearTable`: Removes all\
    \ data from a B-tree but keeps the B-tree intact.\n\n## Cursor Functions\n\nCursor\
    \ functions include the following:\n\n- `sqlite3BtreeCursor`: Creates a new cursor\
    \ pointing to a particular B-tree. Cursors can be either a read cursor or a write\
    \ cursor. Read and write cursors may not exist in the same B-tree at the same\
    \ time.\n- `sqlite3BtreeCloseCursor`: Closes the B-tree cursor.\n- `sqlite3BtreeFirst`:\
    \ Moves the cursor to the first element in a B-tree.\n- `sqlite3BtreeLast`: Moves\
    \ the cursor to the last element in a B-tree.\n- `sqlite3BtreeNext`: Moves the\
    \ cursor to the next element after the one it is currently pointing to.\n- `sqlite3BtreePrevious`:\
    \ Moves the cursor to the previous element before the one it is currently pointing\
    \ to.\n- `sqlite3BtreeMoveto`: Moves the cursor to an element that matches the\
    \ key value passed in as a parameter. If there is no match, leaves the cursor\
    \ pointing to an element that would be on either side of the matching element,\
    \ had it existed.\n\n## Record Functions\n\nKey and record functions include the\
    \ following:\n\n- `sqlite3BtreeDelete`: Deletes the record to which the cursor\
    \ is pointing\n- `sqlite3BtreeInsert`: Inserts a new element in the appropriate\
    \ place of the B-tree\n- `sqlite3BtreeKeySize`: Returns the number of bytes in\
    \ the key of the record to which the cursor is pointing\n- `sqlite3BtreeKey`:\
    \ Returns the key of the record to which the cursor is currently pointing\n- `sqlite3BtreeDataSize`:\
    \ Returns the number of bytes in the data record to which the cursor is currently\
    \ pointing\n- `sqlite3BtreeData`: Returns the data in the record to which the\
    \ cursor is currently pointing\n\n## Configuration Functions\n\nFunctions to set\
    \ various parameters include the following:\n\n- `sqlite3BtreeSetCacheSize`: Controls\
    \ the page cache size as well as the synchronous writes (as defined in the `synchronous`\
    \ pragma).\n- `sqlite3BtreeSetSafetyLevel`: Changes the way data is synced to\
    \ disk in order to increase or decrease how well the database resists damage because\
    \ of OS crashes and power failures. Level 1 is the same as asynchronous (no `syncs()`\
    \ occur, and there is a high probability of damage). This is the equivalent to\
    \ pragma `synchronous`=`OFF`. Level 2 is the default. There is a very low but\
    \ nonzero probability of damage. This is the equivalent to pragma `synchronous`=`NORMAL`.\
    \ Level 3 reduces the probability of damage to near zero but with a write performance\
    \ reduction. This is the equivalent to pragma `synchronous`=`FULL`.\n- `sqlite3BtreeSetPageSize`:\
    \ Sets the database page size.\n- `sqlite3BtreeGetPageSize`: Returns the database\
    \ page size.\n- `sqlite3BtreeSetAutoVacuum`: Sets the autovacuum property of the\
    \ database.\n- `sqlite3BtreeGetAutoVacuum`: Returns whether the database uses\
    \ autovacuum.\n- `sqlite3BtreeSetBusyHandler`: Sets the busy handler.\n\nThere\
    \ are more functions, all of which are very well documented in `btree.h` and `btree.c`,\
    \ but those listed here give you some idea of the parts of the API that are implemented\
    \ in the B-tree layer, as well as what this layer can do in its own right.\n\n\
    ## Manifest Typing, Storage Classes, and Affinity\n\nYou’ll remember from Chapter\
    \ 4 our discussion on storage classes in SQLite and how its underlying data typing\
    \ (or domains) offers a rather more flexible approach to the notion of data types\
    \ that you find in other systems or databases. It’s worth exploring the mechanisms\
    \ that underpin storage classes further, including SQLite’s approach to manifest\
    \ typing and type affinity.\n\n### Manifest Typing\n\nSQLite uses manifest typing.\
    \ If you do a little research, you will find that the term `manifest typing` is\
    \ subject to multiple interpretations. In programming languages, manifest typing\
    \ refers to how the type of a variable or value is defined and/or determined.\
    \ There are two main interpretations:\n\n- `Manifest typing` means that a variable’s\
    \ type must be explicitly declared in the code. By this definition, languages\
    \ such as C/C++, Pascal, and Java would be said to use manifest typing. Dynamically\
    \ typed languages such as Perl, Python, and Ruby, on the other hand, are the direct\
    \ opposite because they do not require that a variable’s type be declared.\n-\
    \ `Manifest typing` means that variables don’t have types at all. Rather, only\
    \ values have types. This seems to be in line with dynamically typed languages.\
    \ Basically, a variable can hold any value, and the type of that variable at any\
    \ point in time is determined by its value at that moment. Thus, if you set variable\
    \ `x`=`1`, then `x` at that moment is of type `integer`. If you then set `x`=`'JujyFruit'`\
    \ , it is then of type `text`. That is, if it looks like an `integer` and it acts\
    \ like an `integer`, it is an `integer`.\n\nFor the sake of brevity, we will refer\
    \ to the first interpretation as MT 1 and the second as MT 2. At first glance,\
    \ it may not be readily apparent as to which interpretation best fits SQLite.\
    \ For example, consider the following table:\n\n```sql\ncreate table foo(\n  x\
    \ integer,\n  y text,\n  z real\n);\n```\n\nSay we now insert a record into this\
    \ table as follows:\n\n```sql\ninsert into foo values ('1', '1', '1');\n```\n\n\
    When SQLite creates the record, what type is stored internally for `x`, `y`, and\
    \ `z`? The answer is `integer`, `text`, and `real`. Then it seems that SQLite\
    \ uses MT 1: variables have declared types. But wait a second; column types in\
    \ SQLite are optional, so we could have just as easily defined `foo` as follows:\
    \ `create table foo(x, y, z);`\n\nNow let’s do the same `insert`:\n\n```sql\n\
    insert into foo values ('1', '1', '1');\n```\n\nWhat type are `x`, `y`, and `z`\
    \ now? The answer: `text`, `text`, and `text`. Well, maybe SQLite is just setting\
    \ columns to `text` by default. If you think that, then consider the following\
    \ `insert` statement on the same table:\n\n```sql\nINSERT INTO FOO VALUES (1,\
    \ 1.0, x'10');\n```\n\nWhat are `x`, `y`, and `z` in this row? `integer`, `real`,\
    \ and `blob`. This looks like MT 2, where the value itself determines its type.\n\
    \nSo, which one is it? The short answer is neither and both. The long answer is\
    \ a little more involved.\n\nWith respect to MT 1, SQLite lets you declare columns\
    \ to have types if you want. This looks and feels like what other databases do.\
    \ But you don’t *have to*, thereby violating the MT1 interpretation as well. This\
    \ is because in all situations SQLite can take any value and infer a type from\
    \ it. It doesn’t need the type declared in the column to help it out. With respect\
    \ to MT 2, SQLite allows the type of the value to “influence” (maybe not completely\
    \ determine) the type that gets stored in the column. But you can still declare\
    \ the column with a type, and that type will exert some influence, thereby violating\
    \ this interpretation as well—that types come from values only. What we really\
    \ have here is the MT 3—the SQLite interpretation. It borrows from both MT 1 and\
    \ MT 2.\n\nBut interestingly enough, manifest typing does not address the whole\
    \ issue with respect to types. It seems to be concerned with only declaring and\
    \ resolving types. What about type checking? That is, if you declare a column\
    \ to be type `integer`, what exactly does that mean?"
