- fmt: '## 在TakeOffGW中设置SQLite


    TakeOffGW会在桌面上放置一个图标。双击该图标以打开环境。


    导航到下载SQLite源代码发行版的临时目录。由于这是类Unix环境，您需要使用Unix文件系统约定。例如，要进入`c:\Temp`，您需要键入`cd /c/Temp`。


    解压SQLite压缩包。执行此命令：`tar -xzvf sqlite-amalgamation-3.6.23.1.tar.gz`。


    进入解压后的目录：`cd sqlite-3.6.32.1`


    创建makefile。对于SQLite二进制文件，运行：`./configure`


    编译源代码：`make`


    您将看到`configure`和`make`向屏幕滚动许多行状态输出。当`make`完成时，您现在就有了一个可用的SQLite二进制文件。为了方便使用，请将TakeOffGW的`bin`目录添加到您的路径中。如果您遵循了TakeOffGW网络安装程序提示的默认设置，这将是`c:\cygwin\bin`目录。您现在可以使用Windows资源管理器或命令提示符，导航到临时目录，并运行`sqlite3.exe`。您现在拥有了一个可工作的SQLite
    CLP。


    ## 在Linux、Mac OS X和其他POSIX系统上使用SQLite


    SQLite在诸如Linux、Mac OS X、FreeBSD、NetBSD、OpenBSD、Solaris等系统上以相同的方式编译和构建——这些系统历史上被称为POSIX系统（尽管现在这是一个不太有用的术语，因为从大型机到Microsoft
    Windows等多样化的系统十多年来都符合POSIX标准）。根据特定的操作系统，可以通过多种方式获取SQLite二进制文件。


    ### 二进制文件和包


    如果您使用的是Mac OS 10.4 (Tiger)或更高版本，您的系统上已经安装了SQLite。如果没有，有几种安装途径可以选择。最简单的方法是使用以下针对Mac的特定包管理系统之一，它们都包含SQLite的软件包或端口：


    **CHAPTER 2 ■ GETTING STARTED**


    *   **MacPorts:** MacPorts可能是当今Mac用户中最受欢迎的开源软件、工具和综合包管理功能的来源。它包括最新的SQLite发行版，以及额外的包，如Tcl绑定等。

    *   **Fink:** Fink是一个基于Debian的包管理系统，它使用Debian实用程序，如`dpkg`、`dselect`和`apt-get`，以及它自己的实用程序——`fink`。您可以从[http://fink.sourceforge.net](http://fink.sourceforge.net)下载Fink。使用Fink，可以直接从预编译的二进制文件安装，无需编译步骤。


    BSD用户安装SQLite也不会有困难。FreeBSD、OpenBSD和NetBSD都有SQLite的软件包和/或端口，都非常容易安装。每个发行版都有针对非常新的SQLite
    3.6.*x*版本的端口。


    Solaris 10将SQLite作为操作系统的一部分使用，最初附带版本2，但如果您的系统定期打补丁，当代的Solaris 10平台会被修补到版本3.6.20。


    如前所述，Linux的二进制文件可以直接从SQLite网站获取。SQLite网站上的下载页面提供以下二进制文件：


    *   **静态链接的命令行程序：** 文件名形式为`sqlite3-3.x.y.z.bin.gz`，其中`x`、`y`和`z`（以及可能更多数字）是次版本号。

    *   **共享库：** 存在两种形式的共享库。一种形式包含Tcl绑定；另一种则不包含。旁边的描述突出了哪种共享库源是哪种。请注意，提供的共享库不是线程安全的。如果您需要线程安全的版本，您将必须从源代码编译库。有关更多详细信息，请参阅“从源代码编译SQLite”部分。

    *   **SQLite分析器：** 这是一个命令行程序，提供关于SQLite数据库内容的详细信息。您可以在“获取数据库文件信息”部分找到有关此程序的信息。'
  raw: 'TakeOffGW will have placed an icon on your desktop. Double-click that icon
    to


    open the environment.


    8.


    Navigate to your temporary directory in which you downloaded the SQLite


    source distribution. Since this is a Unix-like environment, you will need to use


    Unix file system conventions. For example, to get to **c:\Temp**, you would type


    **cd /c/Temp**.


    9.


    Unpack the SQLite tarball. Issue this command: tar -xzvf **sqlite-**


    **amalgamation-3.6.23.1.tar.gz**.


    **10\. Move into the unpacked directory:


    **cd sqlite-3.6.32.1**


    11\. Create the makefile. For the SQLite binary, run this:


    **./configure**


    12\. Build the source:


    **make**


    You will see **configure** and **make** scroll many lines of status output to
    the screen. When **make** completes, you now have a functional SQLite binary.
    To use it easily, add the TakeOffGW **bin** directory to your path. If you followed
    the defaults prompted by the TakeOffGW network installer, this will be the **c:\cygwin\bin**
    directory. You can now use Windows Explorer or the command prompt, navigate to
    the temporary directory, and run **sqlite3.exe**. You now have a working SQLite
    CLP.


    SQLite on Linux, Mac OS X, and Other POSIX Systems


    SQLite compiles and builds identically on systems such as Linux, Mac OS X, FreeBSD,
    NetBSD,


    OpenBSD, Solaris, and others—known historically as POSIX systems (though this
    is now a less useful term, because systems as diverse as mainframes and Microsoft
    Windows have been POSIX compliant for more than a decade). SQLite binaries can
    be obtained in a variety of ways depending on the particular operating system.


    Binaries and Packages


    If you are using Mac OS 10.4 (Tiger) or greater, you already have SQLite installed
    on your system. If not, there are several routes you can take to install it. The
    easiest way is to use one of the following Mac-specific package management systems,
    all of which include packages or ports for SQLite:


    CHAPTER 2 ■ GETTING STARTED


    MacPorts: MacPorts is probably the most popular source of open source


    software, tools, and encompassing package management features with Mac


    users today. It includes the absolute latest SQLite distributions, including


    additional packages such as the Tcl bindings, and so on.


    Fink: Fink is a Debian-based package management system that uses Debian


    utilities such as **dpkg**, **dselect**, and **apt-get**, in addition to its own
    utility—**fink**.


    You can download Fink from [**http://fink.sourceforge.net**. With F](http://fink.sourceforge.net)ink,
    it is possible to install straight from precompiled binaries. No compilation step
    is


    needed.


    BSD users will have no trouble installing SQLite either. FreeBSD, OpenBSD, and
    NetBSD all have


    packages and/or ports for SQLite, all of which are very easy to install. Each
    distribution has ports for very recent versions of SQLite 3.6\. *x*.


    Solaris 10 uses SQLite as part of the OS, originally shipping with version 2,
    but if your system is patched regularly, contemporary Solaris 10 platforms are
    patched to version 3.6.20.


    As mentioned earlier, binaries for Linux are available directly from the SQLite
    website. The


    download page on SQLite’s website provides the following binaries:


    Statically linked command-line program: The filename is of the form


    **sqlite3-3.** *x.y.z***.bin.gz**, where **x**, **y**, and **z** (and possibly
    more digits) are the minor-version numbers.


    Shared library: Two forms of the shared library exist. One form includes the Tcl


    bindings; the other does not. The description next to each highlights which


    shared library source is which. Note that the shared libraries provided are not


    thread safe. If you need a thread-safe version, you will have to compile the


    library from source. See the section “Compiling SQLite from Source” for more


    details.


    SQLite Analyzer: This is a command-line program that provides detailed


    information about the contents of a SQLite database. You’ll find information on


    this program in the section “Getting Database File Information.”'
  trans: '

    ## 在 TakeOffGW 中设置 SQLite


    TakeOffGW 会在桌面上放置一个图标。双击该图标以打开环境。


    导航到下载 SQLite 源代码发行版的临时目录。由于这是类 Unix 环境，您需要使用 Unix 文件系统约定。例如，要进入`c:\Temp`，您需要键入`cd
    /c/Temp`。


    解压 SQLite 压缩包。执行此命令：`tar -xzvf sqlite-amalgamation-3.6.23.1.tar.gz`。


    进入解压后的目录：`cd sqlite-3.6.32.1`


    创建 makefile。对于 SQLite 二进制文件，运行：`./configure`


    编译源代码：`make`


    您将看到`configure`和`make`向屏幕滚动许多行状态输出。当`make`完成时，您现在就有了一个可用的 SQLite 二进制文件。为了方便使用，请将
    TakeOffGW 的`bin`目录添加到您的路径中。如果您遵循了 TakeOffGW 网络安装程序提示的默认设置，这将是`c:\cygwin\bin`目录。您现在可以使用
    Windows 资源管理器或命令提示符，导航到临时目录，并运行`sqlite3.exe`。您现在拥有了一个可工作的 SQLite CLP。


    ## 在 Linux、Mac OS X 和其他 POSIX 系统上使用 SQLite


    SQLite 在诸如 Linux、Mac OS X、FreeBSD、NetBSD、OpenBSD、Solaris 等系统上以相同的方式编译和构建——这些系统历史上被称为
    POSIX 系统（尽管现在这是一个不太有用的术语，因为从大型机到 Microsoft Windows 等多样化的系统十多年来都符合 POSIX 标准）。根据特定的操作系统，可以通过多种方式获取
    SQLite 二进制文件。


    ### 二进制文件和包


    如果您使用的是 Mac OS 10.4 (Tiger)或更高版本，您的系统上已经安装了 SQLite。如果没有，有几种安装途径可以选择。最简单的方法是使用以下针对
    Mac 的特定包管理系统之一，它们都包含 SQLite 的软件包或端口：


    **第 2 章 ■ 入门**


    *   **MacPorts:** MacPorts 可能是当今 Mac 用户中最受欢迎的开源软件、工具和综合包管理功能的来源。它包括最新的 SQLite
    发行版，以及额外的包，如 Tcl 绑定等。

    *   **Fink:** Fink 是一个基于 Debian 的包管理系统，它使用 Debian 实用程序，如`dpkg`、`dselect`和`apt-get`，以及它自己的实用程序——`fink`。您可以从[`fink.sourceforge.net`](http://fink.sourceforge.net)下载
    Fink。使用 Fink，可以直接从预编译的二进制文件安装，无需编译步骤。


    BSD 用户安装 SQLite 也不会有困难。FreeBSD、OpenBSD 和 NetBSD 都有 SQLite 的软件包和/或端口，都非常容易安装。每个发行版都有针对非常新的
    SQLite 3.6.*x*版本的端口。


    Solaris 10 将 SQLite 作为操作系统的一部分使用，最初附带版本 2，但如果您的系统定期打补丁，当代的 Solaris 10 平台会被修补到版本
    3.6.20。


    如前所述，Linux 的二进制文件可以直接从 SQLite 网站获取。SQLite 网站上的下载页面提供以下二进制文件：


    *   **静态链接的命令行程序：** 文件名形式为`sqlite3-3.x.y.z.bin.gz`，其中`x`、`y`和`z`（以及可能更多数字）是次版本号。

    *   **共享库：** 存在两种形式的共享库。一种形式包含 Tcl 绑定；另一种则不包含。旁边的描述突出了哪种共享库源是哪种。请注意，提供的共享库不是线程安全的。如果您需要线程安全的版本，您将必须从源代码编译库。有关更多详细信息，请参阅“从源代码编译
    SQLite”部分。

    *   **SQLite 分析器：** 这是一个命令行程序，提供关于 SQLite 数据库内容的详细信息。您可以在“获取数据库文件信息”部分找到有关此程序的信息。

