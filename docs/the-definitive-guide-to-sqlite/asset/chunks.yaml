    If you use both **limit** and **offset** together, you can use a comma notation
    in place of the **offset** keyword. For example, the following SQL:


    **select * from foods where name like ''B%''**


    **order by type_id desc, name limit 1 offset 2;**


    **can be expressed equivalently with this:**


    ****sqlite> select * from foods where name like ''B%''**


    **order by type_id desc, name limit 2,1;**


    **id type_id name**'
  trans: "\n# 第三章 ■ SQLite 的 SQL\n\n模式中的下划线（`_`）匹配字符串中的任意单个字符。百分号符号（`%`）是**贪婪的**。它会吞噬除它两侧字符之外的所有内容。如果它位于模式的最左侧或最右侧，则会消耗各自一侧的所有内容。考虑以下示例：\n\
    \n```\nsqlite> select id, name from foods where name like '%ac%P%';\nid     name\n\
    -----  --------------------\n127    牛油果酱蘸料\n168    桃子利口酒\n198    麦基诺桃子\n```\n\n\
    另一个有用的技巧是使用 `NOT` 来否定一个模式：\n\n```\nsqlite> select id, name from foods\n   ...>\
    \ where name like '%ac%P%' and name not like '%Sch%'\nid     name\n-----  --------------------\n\
    38     派（黑莓派）\n127    牛油果酱蘸料\n198    麦基诺桃子\n```\n\n`glob` 运算符在行为上与 `like` 运算符非常相似。其关键区别在于，它的行为非常类似于\
    \ Unix 或 Linux 操作系统中的文件通配语义。这意味着它使用与文件通配符相关的符号，如 `*` 和 `_`，并且匹配是**区分大小写**的。以下示例展示了\
    \ `glob` 的实际应用：\n\n```\nsqlite> select id, name from foods\n   ...> where name\
    \ glob 'Pine*';\nid     name\n-----  ----------\n205    菠萝\n258    菠萝\n```\n\n\
    SQLite 也识别 `match` 和 `regexp` 谓词，但目前没有提供原生实现。你需要使用 `sqlite_create_function()`\
    \ 调用来自行开发，这将在第 5 章到第 8 章中讨论。\n\n## 限制与排序\n\n你可以使用 `limit` 和 `offset` 关键字来限制结果集的大小和特定范围。`limit`\
    \ 指定要返回的最大记录数。`offset` 指定要跳过的记录数。例如，以下语句使用 `limit` 和 `offset` 获取谷物记录（`food_types`\
    \ 中的第二条记录）：\n\n```\nselect * from food_types order by id limit 1 offset 1;\n```\n\
    \n`offset` 子句跳过一行（`Bakery` 行），`limit` 子句则最多返回一行（谷物行）。\n\n但这里还有另一个要点：`order by`。这个子句在返回结果前，按一个或多个列对结果进行排序。它之所以在此例中重要，是因为\
    \ SQL 标准规定，`select` 返回的行**绝不保证**是任何特定的顺序。因此，如果你需要依赖结果按特定顺序排列，`order by` 子句就至关重要。`order\
    \ by` 子句的语法类似于 `select` 子句：它是一个以逗号分隔的列列表。每个条目可以限定排序顺序——`asc`（升序，这是默认值）或 `desc`（降序）。例如：\n\
    \n```\nsqlite> select * from foods where name like 'B%'\n   ...> order by type_id\
    \ desc, name limit 10;\nid     type_id   name\n-----  --------  --------------------\n\
    382    15        焖豆\n383    15        烤土豆配酸奶油\n384    15        大份沙拉\n385    15\
    \        西兰花\n362    14        马赛鱼汤\n328    12        培根生菜番茄三明治\n327    12   \
    \     培根俱乐部三明治（无火鸡）\n326    12        博洛尼亚香肠\n329    12        牛腩三明治\n274    10\
    \        培根\n```\n\n通常，只有当第一（第二，依此类推）个排序列中存在重复值时，你才需要按第二（第三，依此类推）个列排序。这里，`type_id`\
    \ 有很多重复值。我希望将它们分组在一起，然后在这些组内按字母顺序排列食物。\n\n> **注意：** `limit` 和 `offset` 并非 ANSI\
    \ 标准中定义的标准 SQL 关键字。大多数数据库都有功能等价物，尽管它们使用不同的语法。\n\n如果同时使用 `limit` 和 `offset`，你可以用逗号表示法代替\
    \ `offset` 关键字。例如，以下 SQL：\n```\nselect * from foods where name like 'B%'\norder\
    \ by type_id desc, name limit 1 offset 2;\n```\n可以等价地表示为：\n```\nsqlite> select\
    \ * from foods where name like 'B%'\n   ...> order by type_id desc, name limit\
    \ 2,1;\nid     type_id   name\n-----  --------  --------------------\n```\n"
- fmt: "# 384 15 Big Salad\n\nThere is a trick here for those who think this syntax\
    \ should be the other way around. In SQLite, when using this shorthand notation,\
    \ the `offset` precedes the `limit`. Here, the values following `limit` keyword\
    \ specify an offset of `2` and a `limit` of 2. Also, note that `offset` depends\
    \ on limit. That is, you can use limit without using offset but not the other\
    \ way around.\n\nNotice that `limit` and `offset` are dead last in the operational\
    \ pipeline. One common misconception of `limit`/`offset` is that it speeds up\
    \ a query by limiting the number of rows that must be collected by the `where`\
    \ clause. This is not true. If it were, then `order by` would not work properly.\
    \ For `order by` to do its job, it must have the entire result in hand to provide\
    \ the correct order. There is a small performance boost, in that SQLite only needs\
    \ to keep track of the order of the 10 biggest values at any point. This has some\
    \ benefit but not nearly as much as the \"sort-free limiting\" that some expect.\n\
    \n## Functions and Aggregates\n\nSQLite comes with various built-in functions\
    \ and aggregates that can be used within various clauses.\n\nFunction types range\
    \ from mathematical functions such as `abs()`, which computes the absolute value,\
    \ to string-formatting functions such as `upper()` and `lower()`, which convert\
    \ text to upper- and lowercase, respectively. For example:\n\n```\nsqlite> select\
    \ upper('hello newman'), length('hello newman'), abs(-12);\n\nupper('hello newman')\
    \ length('hello newman') abs(-12)\n--------------------- --------------------\
    \ ----------\nHELLO NEWMAN         12                    12\n```\n\nNotice that\
    \ the function names are case insensitive (i.e., `upper()` and `UPPER()` refer\
    \ to the same function). Functions can accept column values as their arguments:\n\
    \n```\nsqlite> select id, upper(name), length(name) from foods\n   ...> where\
    \ type_id=1 limit 10;\n\nid  upper(name)                  length(name)\n--  ---------------------------\
    \  ------------\n1   BAGELS                       6\n2   BAGELS, RAISIN      \
    \         14\n3   BAVARIAN CREAM PIE           18\n4   BEAR CLAWS            \
    \       10\n5   BLACK AND WHITE COOKIES      23\n6   BREAD (WITH NUTS)       \
    \     17\n7   BUTTERFINGERS                13\n8   CARROT CAKE               \
    \   11\n9   CHIPS AHOY COOKIES           18\n10  CHOCOLATE BOBKA             \
    \ 15\n```\n\nSince functions can be part of any expression, they can also be used\
    \ in the `where` clause:\n\n```\nsqlite> select id, upper(name), length(name)\
    \ from foods\n   ...> where length(name) < 5 limit 5;\n\nid   upper(name)   length(name)\n\
    ---  ------------  ------------\n36   PIE           3\n48   BRAN          4\n\
    56   KIX           3\n57   LIFE          4\n80   DUCK          4\n```\n\nAggregates\
    \ are a special class of functions that calculate a composite (or aggregate) value\
    \ over a group of rows (or relation). Standard aggregate functions include `sum()`,\
    \ `avg()`, `count()`, `min()`, and `max()`.\n\nFor example, to get a count of\
    \ the number of foods that are baked goods (`type_id=1`), you can use the `count`\
    \ aggregate as follows:\n\n```\nsqlite> select count(*) from foods where type_id=1;\n\
    \ncount\n-----\n47\n```\n\nThe `count` aggregate returns a count of every row\
    \ in the relation. Whenever you see an aggregate, you should automatically think,\
    \ \"For each row in a table, do something.\"\n\nAggregates can aggregate not only\
    \ column values but any expression—including functions. For example, to get the\
    \ average length of all food names, you can apply the `avg` aggregate to the `length(name)`\
    \ expression as follows:\n\n```\nsqlite> select avg(length(name)) from foods;\n\
    \navg(length(name))\n-----------------\n12.58\n```\n\nAggregates operate within\
    \ the `select` clause. They compute their values on the rows selected by the `where`\
    \ clause—not from all rows selected by the `from` clause. The `select` command\
    \ filters first and then aggregates.\n\nAlthough SQLite comes with a standard\
    \ set of common SQL functions and aggregates, it is worth noting that the SQLite\
    \ C API allows you to create custom functions and aggregates as well. See Chapter\
    \ 7."
