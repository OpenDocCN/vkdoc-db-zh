    and is therefore somewhat generic. Despite this, it is still possible for PDO


    drivers to provide access to database-specific features as well. As a result,
    the PDO drivers provide a complete OO interface that works well with all the features
    of SQLite.


    CHAPTER 8 ■ LANGUAGE EXTENSIONS


    Installation


    Installation of PHP is quite straightforward but beyond the scope of this book.
    You can find detailed instructions on building and installing PHP in the documentation
    on the PHP web site: [**www.php.net**.](http://www.php.net)


    Connections


    There are two important issues to consider before you open a database: location
    and permissions. By default, the file path in PHP is relative to the directory
    in which the script is run (unless you provide a full path, relative to the root
    file system). So if you specify just a database name, you are opening or creating
    a database within the public area of your web site, and the security of that database
    file depends on how the web server is configured.


    Since SQLite databases are normal operating system files just like HTML documents
    or images, it


    may be possible for someone to fetch them just like a regular document. This could
    be a potential security problem, depending on the sensitivity of your data. As
    a general security precaution, it is good idea to keep database files outside
    of public folders so that only PHP scripts can access them. As an alternative,
    more sophisticated security can be achieved by limiting access to the SQLite database
    file using **.htaccess** controls or equivalent security techniques.


    Ultimately, whatever permissions are used must allow the web server process running
    PHP both


    read and write access to the database files. Both of these are administrative
    details that must be addressed on a case-by-case basis.


    In PDO, connections are encapsulated in the **PDO** class. The constructor takes
    a single argument called a data source name (DSN). The DSN is a colon-delimited
    string composed of two parameters. The first parameter is the driver name, which
    is normally **sqlite** and corresponds to SQLite version 3\. The second parameter
    is the path to the database file. If the connection attempt fails for any reason,
    the constructor will throw a PDOException. The following example connects to our
    SQLite **foods.db**


    database:


    **<?php**


    **try {**


    **$dbh = new PDO("sqlite:foods.db");**


    **} catch (PDOException $e) {**


    **echo ''Connection failed: '' . $e->getMessage();**


    **}?>**


    Queries


    PDO is made up of two basic classes, **PDO** and **PDOStatement**. **PDO** represents
    a connection, which internally contains a **sqlite3** structure, and **PDOStatement**
    represents a statement handle, which internally contains a **sqlite3_stmt** structure.
    The query methods in the PDO class closely follow the methods in the SQLite C
    API. There are three ways to execute queries:


    • **exec()**: Executes queries that don’t return any data. Returns the number
    of


    affected rows, or **FALSE** if there is an error. This mirrors **sqlite3_exec()**.


    • **query()**: Executes a query and returns a **PDOStatement** object representing
    the


    result set, or **FALSE** if there is an error.


    CHAPTER 8 ■ LANGUAGE EXTENSIONS


    • **prepare()**: Compiles a query and returns a **PDOStatement** object or **FALSE**
    if there is an error. This offers better performance than **query()** for statements
    that need to


    be executed multiple times, because it can be reset, avoiding the need to


    recompile the query.


    Additionally, transaction management in PDO can be performed through a method
    invocation using


    **beginTransaction()**, **commit()**, and **rollback()**. Listing 8-26 shows a
    basic example of using the PDO


    class to open a database and perform basic queries within a transaction.


    *Listing 8-26\. Basic Queries with PDO*


    **<?php**


    **try {**


    **$dbh = new PDO("sqlite:foods.db");**


    **} catch (PDOException $e) {**


    **echo ''Connection failed: '' . $e->getMessage();**


    **}**


    **$dbh->beginTransaction();**


    **$sql = ''select * from foods limit 10'';**


    **foreach ($dbh->query($sql) as $row) {**


    **print $row[''type_id''] . " ";**


    **print $row[''name''] . "<br>";**


    **}**


    **$dressing = $dbh->quote("Newman''s Own Vinegarette");**


    **$dbh->exec("insert into foods values (NULL, 4, $dressing)");**


    **echo $dbh->lastInsertId();**


    **$dbh->rollback();**


    **?>**


    **PDO uses the **setAttribute()** and **getAttribute()** methods to set various
    database connection parameters. The only parameter that applies to SQLite is **PDO_ATTR_TIMEOUT**,
    which sets the busy timeout.'
  trans: "\n### Tcl 中的事务范围\n\n在 Tcl 代码中，可以使用 `transaction` 方法自动处理事务范围。如果 `transaction`\
    \ 方法脚本内的所有代码都运行无误，`transaction` 方法将提交事务；否则，它将调用回滚。例如，如果你想在单个事务中执行清单 8-23 中的代码，你将不得不在每条命令执行后检查其状态。如果失败，则回滚事务并中止任何后续命令。事务中需要运行的命令越多，代码就会变得越混乱。然而，所有这些都可以通过\
    \ `transaction` 方法自动完成，如清单 8-24 所示。\n\n#### 清单 8-24. Tcl 中的事务范围\n```\ndb transaction\
    \ {\n    puts \"\\nUpdating all rows.\"\n    db eval { update foods set type_id=0\
    \ }\n    puts \"Changes : [db changes]\"\n    puts \"\\nDeleting all rows.\"\n\
    \    # Delete all rows\n    db eval { delete from foods }\n    puts \"\\nInserting\
    \ a row.\"\n    # Insert a row\n    db eval { insert into foods (type_id, name)\
    \ values (9, 'Junior Mints') }\n    puts \"Changes : [db changes]\"\n    puts\
    \ \"last_insert_rowid() : [db last_insert_rowid]\"\n}\n```\n\n现在，如果任何命令失败，`transaction`\
    \ 将回滚所有命令，而无需检查任何返回码。`Transaction` 也适用于你已有的事务，可以在已经启动的事务内工作。它将在已启动的事务内工作，不会尝试提交或回滚。如果发生错误，它只是中止脚本，返回相应的错误代码。\n\
    \n### 用户自定义函数\n\n用户自定义函数使用 `function` 方法创建，该方法接受函数名和一个实现该函数的 Tcl 方法。清单 8-25 展示了在\
    \ Tcl 中实现 `hello_newman()` 的示例。\n\n#### 清单 8-25. Tcl 中的 `hello_newman()`\n```\n\
    proc hello_newman {args} {\n    set l [llength $args]\n    if {$l == 0} {\n  \
    \      return \"Hello Jerry\"\n    } else {\n        return \"Hello [join $args\
    \ {, } ]\"\n    }\n}\ndb function hello_newman hello_newman\nputs [db onecolumn\
    \ {select hello_newman()}]\nputs [db onecolumn {select hello_newman('Elaine')}]\n\
    puts [db onecolumn {select hello_newman('Elaine', 'Jerry')}]\nputs [db onecolumn\
    \ {select hello_newman('Elaine', 'Jerry', 'George')}]\n```\n\n清单 8-25 的代码产生以下输出：\n\
    ```\nHello Jerry\nHello Elaine\nHello Elaine, Jerry\nHello Elaine, Jerry, George\n\
    ```\n\n### PHP\n\n自从 PHP 第 5 版问世以来，SQLite 一直是 PHP 标准库的一部分。如果你有 PHP 5 或更新版本，你的系统上也就安装了\
    \ SQLite。与我们讨论过的许多其他语言一样，PHP 为你提供了丰富的接口选项。\n\nPHP 5.1 引入了一个新的数据库抽象层，称为 PHP 数据对象\
    \ (PDO)，它已发展成为 PHP 最受欢迎的数据库抽象层之一。此 API 使用驱动程序来支持标准的数据库接口。PDO 接口是一个面向对象的接口，与 SQLite\
    \ 扩展中的 OO 接口非常相似。由于 PDO 是一个抽象层，它旨在适应许多不同的数据库，因此有些通用。尽管如此，PDO 驱动程序仍然可以提供对数据库特定功能的访问。因此，PDO\
    \ 驱动程序提供了完整的 OO 接口，与 SQLite 的所有功能配合良好。\n\n#### 安装\n\nPHP 的安装相当简单，但超出了本书的范围。你可以在\
    \ PHP 网站的文档中找到构建和安装 PHP 的详细说明：[www.php.net](http://www.php.net)。\n\n#### 连接\n\n\
    在打开数据库之前，有两个重要问题需要考虑：位置和权限。默认情况下，PHP 中的文件路径是相对于运行脚本的目录的（除非你提供了相对于根文件系统的完整路径）。因此，如果你只指定一个数据库名称，你就是在网站的公共区域打开或创建一个数据库，该数据库文件的安全性取决于\
    \ Web 服务器的配置方式。\n\n由于 SQLite 数据库是正常的操作系统文件，就像 HTML 文档或图像一样，有人可能能够像获取普通文档一样获取它们。这可能是一个潜在的安全问题，具体取决于你数据的敏感性。作为一个通用的安全预防措施，最好将数据库文件保存在公共文件夹之外，以便只有\
    \ PHP 脚本可以访问它们。或者，可以通过使用 `.htaccess` 控件或等效的安全技术来限制对 SQLite 数据库文件的访问，从而实现更复杂的安全性。\n\
    \n最终，使用的任何权限都必须允许运行 PHP 的 Web 服务器进程对数据库文件具有读写访问权限。这两个都是必须根据具体情况解决的管理细节。\n\n在 PDO\
    \ 中，连接被封装在 `PDO` 类中。构造函数接受一个称为数据源名称 (DSN) 的参数。DSN 是一个由冒号分隔的字符串，由两个参数组成。第一个参数是驱动程序名称，通常是\
    \ `sqlite`，对应于 SQLite 版本 3。第二个参数是数据库文件的路径。如果连接尝试因任何原因失败，构造函数将抛出 `PDOException`。以下示例连接到我们的\
    \ SQLite `foods.db` 数据库：\n```php\n<?php\ntry {\n    $dbh = new PDO(\"sqlite:foods.db\"\
    );\n} catch (PDOException $e) {\n    echo 'Connection failed: ' . $e->getMessage();\n\
    }\n?>\n```\n\n#### 查询\n\nPDO 由两个基本类组成：`PDO` 和 `PDOStatement`。`PDO` 表示一个连接，内部包含一个\
    \ `sqlite3` 结构，而 `PDOStatement` 表示一个语句句柄，内部包含一个 `sqlite3_stmt` 结构。PDO 类中的查询方法紧密遵循\
    \ SQLite C API 中的方法。执行查询有三种方式：\n\n- `exec()`: 执行不返回任何数据的查询。返回受影响的行数，如果有错误则返回 `FALSE`。这对应于\
    \ `sqlite3_exec()`。\n- `query()`: 执行查询并返回一个表示结果集的 `PDOStatement` 对象，如果有错误则返回 `FALSE`。\n\
    - `prepare()`: 编译查询并返回一个 `PDOStatement` 对象，如果有错误则返回 `FALSE`。对于需要执行多次的语句，这比 `query()`\
    \ 提供更好的性能，因为它可以被重置，避免了重新编译查询的需要。\n\n此外，PDO 中的事务管理可以通过调用 `beginTransaction()`、`commit()`\
    \ 和 `rollback()` 方法来执行。清单 8-26 展示了一个使用 PDO 类打开数据库并在事务中执行基本查询的基本示例。\n\n#### 清单\
    \ 8-26. 使用 PDO 进行基本查询\n```php\n<?php\ntry {\n    $dbh = new PDO(\"sqlite:foods.db\"\
    );\n} catch (PDOException $e) {\n    echo 'Connection failed: ' . $e->getMessage();\n\
    }\n$dbh->beginTransaction();\n$sql = 'select * from foods limit 10';\nforeach\
    \ ($dbh->query($sql) as $row) {\n    print $row['type_id'] . \" \";\n    print\
    \ $row['name'] . \"<br>\";\n}\n$dressing = $dbh->quote(\"Newman's Own Vinegarette\"\
    );\n$dbh->exec(\"insert into foods values (NULL, 4, $dressing)\");\necho $dbh->lastInsertId();\n\
    $dbh->rollback();\n?>\n```\n\nPDO 使用 `setAttribute()` 和 `getAttribute()` 方法来设置各种数据库连接参数。唯一适用于\
    \ SQLite 的参数是 `PDO_ATTR_TIMEOUT`，它用于设置忙时超时。\n"
- fmt: "# 第八章：语言扩展\n\n## prepare() 方法\n\n`prepare()` 方法使用 SQLite 语句遍历结果集。它同时支持命名参数和位置参数。要绑定\
    \ SQL 参数，PHP 中必须有相关联的变量。PHP 变量通过 `PDOStatement::bindParam()` 绑定到参数，其声明如下：\n\n\
    ```\nbool bindParam ( mixed parameter, mixed &variable,\n                 int\
    \ data_type, int length,\n                 mixed driver_options );\n```\n\n`parameter`\
    \ 参数指定 SQL 参数。对于编号参数，这是一个整数值；对于命名参数，它是一个字符串。`variable` 参数是对要绑定的 PHP 变量的引用。`data_type`\
    \ 参数指定变量的数据类型。最后，`length` 参数在变量为字符串时指定其长度，该值指定要返回的字符串的最大长度。列表 8-27 是使用位置参数的完整示例。\n\
    \n### 列表 8-27：使用 PDO 的位置参数\n\n```php\n<?php\n$dbh = new PDO(\"sqlite:foods.db\"\
    );\n$sql = 'select * from foods where type_id=? And name=?';\n$stmt = $dbh->prepare($sql);\n\
    $type_id = 9;\n$name = 'JujyFruit';\n$stmt->bindParam(1, $type_id, PDO_PARAM_INT);\n\
    $stmt->bindParam(1, $name, PDO_PARAM_STR, 50);\n$stmt->execute();\n?>\n```\n\n\
    ## 命名参数\n\n命名参数的工作方式类似。绑定这些参数时，你通过它们的名字（而非整数）来识别它们。列表 8-28 是使用命名参数的前一个示例的修改版本。\n\
    \n### 列表 8-28：使用 PDO 的命名参数\n\n```php\n<?php\n$dbh = new PDO(\"sqlite:foods.db\"\
    );\n$sql = 'select * from foods where type_id=:type And name=:name;';\n$stmt =\
    \ $dbh->prepare($sql);\n$type_id = 9;\n$name = 'JujyFruit';\n$stmt->bindParam('type',\
    \ $type_id, PDO_PARAM_INT);\n$stmt->bindParam('name', $name, PDO_PARAM_STR, 50);\n\
    $stmt->execute();\n?>\n```\n\n## 列绑定\n\nPDO 还允许你将结果集的列绑定到 PHP 变量。这是通过 `PDOStatement::bindColumn()`\
    \ 完成的，其声明如下：\n\n```\nbool bindColumn (mixed column, mixed &param, int type)\n\
    ```\n\n`column` 参数引用 `SELECT` 子句中的列名或其索引。`param` 参数是对 PHP 变量的引用，`type` 参数指定 PHP\
    \ 变量的类型。以下示例将两个变量 `$name` 和 `$type_id` 绑定到一个结果集：\n\n```php\n<?php\n$dbh = new\
    \ PDO(\"sqlite:foods.db\");\n$sql = 'select * from foods limit 10';\n$stmt = $dbh->prepare($sql);\n\
    $stmt->execute();\n$name;\n$type_id;\n$stmt->bindColumn('type_id', $type_id, PDO_PARAM_INT);\n\
    $stmt->bindColumn('name', $name, PDO_PARAM_STR);\nwhile ($row = $stmt->fetch())\
    \ {\n    print \"$type_id $name <br>\";\n}\n?>\n```\n\n## 用户定义函数和聚合\n\n用户定义函数使用\
    \ `sqliteCreateFunction()` 实现。聚合使用 `sqliteCreateAggregate()` 实现。`sqliteCreateFunction()`\
    \ 的形式如下：\n\n```\nvoid PDO::createFunction ( string function_name,\n          \
    \                 callback callback,\n                           int num_args\
    \ );\n```\n\n参数定义如下：\n- `function_name`：函数在 SQL 中出现的名称\n- `callback`：当 SQL 函数被调用时要调用的\
    \ PHP（回调）函数\n- `num_args`：函数接受的参数数量\n\n以下是一个 PHP 实现的 `hello_newman()` 示例：\n\n\
    ```php\n<?php\nfunction hello_newman() {\n    return 'Hello Jerry';\n}\n$db =\
    \ new PDO(\"sqlite:foods.db\");\n$db->createFunction('hello_newman', hello_newman,\
    \ 0);\n$row = $db->query('SELECT hello_newman()')->fetch();\nprint $row[0];\n\
    ?>\n```\n\n你可以使用 `sqliteCreateAggregate` 函数以类似方式创建聚合，声明如下：\n\n```\nvoid PDO::createAggregate\
    \ ( string function_name,\n                            callback step_func,\n \
    \                           callback finalize_func,\n                        \
    \    int num_args )\n```"
  raw: 'The **prepare()** method uses a SQLite statement to navigate through a result
    set. It also supports both named and positional parameters. To bind a SQL parameter,
    there must be some associated variable in PHP to bind it to. PHP variables are
    bound to parameters using **PDOStatement::bindParam()**, which has the following
    declaration:


    **nool bindParam ( mixed parameter, mixed &variable,**


    **int data_type, int length,**


    **mixed driver_options );**


    **The **parameter** argument specifies the SQL parameter. For numbered parameters,
    this is an integer value. For named parameters, it is a string. The **variable**
    argument is a reference to a PHP variable to bind. The **data_type** argument
    specifies the data type of the variable. Finally, the **length** argument specifies
    the length of the value if the variable is a string. The value specifies the maximum
    length of the string to return. Listing 8-27 is a complete example of using positional
    parameters.**


    **249


    CHAPTER 8 ■ LANGUAGE EXTENSIONS


    *Listing 8-27\. Positional Parameters with PDO*


    **<?php**


    **$dbh = new PDO("sqlite:foods.db");**


    **$sql = ''select * from foods where type_id=? And name=?'';**


    **$stmt = $dbh->prepare($sql);**


    **$type_id = 9;**


    **$name = ''JujyFruit'';**


    **$stmt->bindParam(1, $type_id, PDO_PARAM_INT);**


    **$stmt->bindParam(1, $name, PDO_PARAM_STR, 50);**


    **$stmt->execute();**


    **?>**


    Named parameters work in a similar fashion. When you bind these parameters, you
    identify them


    by their names (rather than integers). Listing 8-28 is a modification of the previous
    example using named parameters.


    *Listing 8-28\. Named Parameters with PDO*


    **<?php**


    **$dbh = new PDO("sqlite:foods.db");**


    **$sql = ''select * from foods where type_id=:type And name=:name;'';**


    **$stmt = $dbh->prepare($sql);**


    **$type_id = 9;**


    **$name = ''JujyFruit'';**


    **$stmt->bindParam(''type'', $type_id, PDO_PARAM_INT);**


    **$stmt->bindParam(''name'', $name, PDO_PARAM_STR, 50);**


    **$stmt->execute();**


    **?>**


    PDO also allows you to bind columns of result sets to PHP variables. This is done
    using


    **PDOStatement::bindColumn()**, which has the following declaration:


    **bool bindColumn (mixed column, mixed &param, int type)**


    The column argument refers to either the name of the column or its index in the
    SELECT clause. The **param** argument is a reference to a PHP variable, and the
    **type** argument specifies the type of the PHP


    variable. The following example binds two variables **$name** and **$type_id**
    to a result set:


    **<?php**


    **$dbh = new PDO("sqlite:foods.db");**


    **$sql = ''select * from foods limit 10'';**


    **$stmt = $dbh->prepare($sql);**


    **$stmt->execute();**


    **$name;**


    **$type_id;**


    **$stmt->bindColumn(''type_id'', $type_id, PDO_PARAM_INT);**


    **$stmt->bindColumn(''name'', $name, PDO_PARAM_STR);**


    CHAPTER 8 ■ LANGUAGE EXTENSIONS


    **while ($row = $stmt->fetch()) {**


    **print "$type_id $name <br>";**


    **}**


    User-Defined Functions and Aggregates


    User-defined functions are implemented using **sqliteCreateFunction()**. Aggregates
    are implemented using **sqliteCreateAggregate()**. **sqliteCreateFunction()**
    has the following form:


    **void PDO::createFunction ( string function_name,**


    **callback callback,**


    **int num_args );**


    **The arguments are defined as follows:**


    **• **function_name**: The name of the function as it is to appear in SQL


    • **callback**: The PHP (callback) function to be invoked when the SQL function
    is


    called


    • **num_args**: The number of arguments the function takes


    The following example is a PHP implementation of **hello_newman()**:


    **<?php**


    **function hello_newman() {**


    **return ''Hello Jerry'';**


    **}**


    **$db = new PDO("sqlite:foods.db");**


    **$db->createFunction(''hello_newman'', hello_newman, 0);**


    **$row = $db->query(''SELECT hello_newman()'')->fetch();**


    **print $row[0]**


    **?>**


    **You create aggregates in a similar fashion using the **sqliteCreateAggregate**
    function, declared as follows: **void PDO::createAggregate ( string function_name,****


    ****callback step_func,**


    **callback finalize_func,**


    **int num_args )**'
