  trans: '## 第 9 章：基于 SQLite 的 iOS 开发


    除一处外，安装过程中的各个界面无需逐一讲解。通常选择默认设置即可，或根据安装需要自行添加额外选项。但当进行到“安装类型”界面（如图 9-3 所示）时，值得注意其中部分选项。


    ![](img/index-279_1.jpg)


    ### 图 9-3：iOS SDK 安装类型


    此处，iOS SDK 安装程序提示是否将历史版本的 SDK 纳入安装。除了始终包含最新版本的 SDK 外，你还可以选择针对旧版 SDK。为何需要这样做？就本章后续的
    SQLite 开发而言，默认选项已足够。但若未来的开发需支持旧款 iPhone 和 iPad，则可能需要包含旧版 SDK。尽管这种情况可能较少见，但为那些最新
    iPad 尚属“未来承诺”的企业或机构环境开发应用时，开发者很可能需要针对初代 iPhone 以满足用户的硬件规格。


    继续直至安装完成，你应会看到一条令人满意且相当庞大的成功消息，如图 9-4 所示。


    ![](img/index-280_1.jpg)


    ### 图 9-4：绿色对勾表示 iOS SDK 安装成功。


    安装完成后，你已准备好编写你的首个基于 iOS SQLite 的应用程序。


    ## Xcode 的替代方案


    对于那些经验丰富或勇于尝试的开发者，除了 Xcode 之外，还有其他可用于 iOS 开发（尤其是基于 SQLite 的 iOS 开发）的工具。如果你已熟悉
    iPhone 开发并偏好这些工具，可随意选用其中一种或多种。


    *   `PhoneGap`：用于构建跨平台移动应用的开源开发框架。[`www.phonegap.com`](http://www.phonegap.com)

    *   `Appcelerator Titanium`：另一款开源跨平台移动应用框架。[`www.appcelerator.com`](http://www.appcelerator.com)


    这两者都对 iOS 及其他平台的 SQLite 开发提供了出色的支持。值得注意的是，苹果公司最近放宽了其众所周知严格且在某些方面可以说反复无常的应用规则，这些规则曾对使用不同语言或环境编码、以及通过交叉编译或转换来针对
    Objective-C 和 iOS 平台的行为进行限制。因此，你有了更多空间去探索这些工具，并推出下一个出色的基于 SQLite 的 iOS 应用。


    ## 构建 iSeinfeld iOS SQLite 应用


    现在开发环境已就绪，你可以开始构建你的基于 SQLite 的 iOS 应用。如同所有优秀的开发者一样，我们需要明确应用的需求，以便合理设计并知道何时完成开发。以下是我们极其简洁的
    iSeinfeld 需求：


    1.  为 iPhone 和 iPad 构建一个 iOS 应用，按受欢迎程度顺序显示《宋飞正传》（`Seinfeld`）中提及的食物。

    2.  对于任意热门食物，显示其在所有《宋飞正传》剧集中被提及的次数。

    3.  标明该食物首次出现的剧集。


    这看起来相当简单。我们将开发的代码将涵盖在 iOS 系统上使用 SQLite 的核心方面。内容包括：打开数据库（如果不存在则创建）；操作数据库内的数据；以及至关重要的
    UI 元素——将你的 SQLite 数据呈现给用户！


    以下是本章将涵盖的步骤。我们会尽量减少涉及 Objective-C 和 Coco Touch 特定方面的内容，并尽可能突出工作中至关重要的 SQLite 维度。


    1.  在 Xcode 中创建新项目。

    2.  将 SQLite 框架添加到项目中。

    3.  准备我们的食物数据库以供包含在 iOS 应用中。

    4.  定义将食物数据从 SQLite 映射到我们代码中的类，以及在屏幕上向用户展示这些数据的类。'
- fmt: "Let’s get started.\n\n## Step 1: Creating a New Xcode Project\n\nLaunch Xcode\
    \ to get started. If this is the first time you’ve started Xcode (or if you haven’t\
    \ changed the defaults), you’ll see a Welcome to Xcode splash screen on top of\
    \ the Xcode environment. Dismiss this for now—in fact, if you don’t want to see\
    \ this again, also uncheck the “show at launch” option.\n\n![](index-282_1.jpg)\n\
    \nWith Xcode running, choose File > New Project. For our iSeinfeld application,\
    \ we want to use a navigation-based application as the project template. This\
    \ is because we’ll be using master and detail screens for various representations\
    \ of our SQLite foods data. Figure 9-5 shows the new project options in Xcode.\n\
    \n*Figure 9-5. Creating a new navigation-based application for our SQLite project*\n\
    \nChoose a meaningful name for your project. We’ve called ours iSeinfeld, but\
    \ feel free to adopt any memorable or meaningful name. By default, this will be\
    \ the name displayed for your application on the home screen of iOS devices (though\
    \ this can be changed later). Your freshly created project should look similar\
    \ to our project shown in Figure 9-6.\n\n![](index-283_1.jpg)\n\n*Figure 9-6.\
    \ The new iSeinfeld project in Xcode*\n\n## Step 2: Adding the SQLite Framework\
    \ to Your Project\n\nWith your blank iSeinfeld project in place, we now need to\
    \ add the SQLite library to the list of frameworks so our future code can benefit\
    \ from, and use, the SQLite API.\n\nFrom the left pane of your Xcode project,\
    \ open the Frameworks folder. `Ctrl+click` and choose Add > Existing Frameworks.\
    \ In the dialog box, navigate to the directory `` `/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS\
    \ x.y.z. sdk/usr/lib/` ``, where `x.y.z` is the version number of the iPhone firmware\
    \ version your Xcode and iOS target. Depending on the options you choose at Xcode\
    \ and iOS SDK installation time, you may see multiple versioned directories. Our\
    \ recommendation is to choose the latest (highest) version.\n\n![](index-284_1.jpg)\n\
    \n**Note:** If you’re using the latest iOS version 4 releases, those directories\
    \ may change to read `iOS` in place of `iPhone`. Don’t worry, the underlying library\
    \ is the same.\n\nFrom that directory, choose the `libsqlite3.dylib` entry. You\
    \ will likely also see a `libsqlite3.0.dylib` or similar file. The `libsqlite3.dylib`\
    \ entry is a soft link to the latest version of the `dylib` file, in this case\
    \ `libsqlite3.0.dylib`. We recommend always choosing the soft link to avoid unnecessarily\
    \ specific version choices.\n\nChoose this file, and you’ll be presented with\
    \ an options dialog box asking for reference type and text encoding. We don’t\
    \ need any of the alternative behavior offered here, so it’s safe to just click\
    \ Add to continue with the defaults. You should now be returned to your Xcode\
    \ project. Under the Frameworks folder on the left pane, you should now see the\
    \ `libsqlite3.dylib` entry, as shown in Figure 9-7.\n\n*Figure 9-7. The SQLite\
    \ `libsqlite3.dylib` library added to the iSeinfeld project in Xcode* 262\n\n\
    ![](index-285_1.jpg)\n\n## Step 3: Preparing the Foods Database\n\nWe have two\
    \ options for getting a working database in place for our project. We can step\
    \ through the process of creating a new database, creating tables, and inserting\
    \ data; or we can deploy an existing database for use with our iSeinfeld application.\n\
    \nCreating everything fresh by hand would see us walk through the SQLite API for\
    \ `sqlite3_open_v2()`, `sqlite3_prepare()`, and so on, and countless iterations\
    \ of `sqlite3_exec()` and so forth. Because of the very close similarities between\
    \ C and Objective-C, this would basically be a repeat of Chapter 6. We think that\
    \ would be a waste of the chapter. More importantly, when you build and release\
    \ the next great iOS application yourself, you almost certainly will package it\
    \ with an existing database (though you might well provide features to add new\
    \ data and work with existing data). We’ll adopt this second approach, but we’ll\
    \ also cover the options of creating a fresh database, as well as the typical\
    \ SQL statements you’d expect for data manipulation within SQLite. We are going\
    \ to add our `foods.db` SQLite database to our project so we can get working with\
    \ our data faster!\n\nIf you’re following the default directory layout for Xcode,\
    \ you’ll find your iSeinfeld SQLite project in the `` `/Users/user_name/Documents/iSeinfeld`\
    \ `` directory (where `user_name` is your username). Copy your `foods.db` file\
    \ to this directory in order to keep all of your project data, code, and resources\
    \ together. On the left pane of your Xcode project, open the Resources folder.\
    \ `Ctrl+click`, and choose Add > Existing files. In the Add File dialog box, navigate\
    \ to the `` `/Users/user_name/Documents/iSeinfeld` `` directory, and choose the\
    \ `foods.db` file, as shown in Figure 9-8.\n\n*Figure 9-8. Adding an existing\
    \ SQLite database to your Xcode project*\n\nOnce again, Xcode will prompt with\
    \ several options for this file’s inclusion in the project. We only need the default\
    \ behavior here, so click Add to have the `foods.db` file added to your project.\
    \ Your Xcode resources folder should now list the `foods.db` SQLite database,\
    \ as shown in Figure 9-9.\n\n![](index-286_1.jpg)\n\n*Figure 9-9. The iSeinfeld\
    \ project with foods SQLite database included as a resource*\n\nYour iSeinfeld\
    \ iOS application now has the SQLite libraries in place and a populated database\
    \ included in the project. It’s time to start coding!\n\n## Step 4: Creating Classes\
    \ for the Food Data\n\nIn addition to the default classes created with our new\
    \ project, we will need two classes to represent the data from our SQLite database\
    \ as objects within the application. We’ll need a `Food` class to represent one\
    \ kind of food and the data we want to use from foods within our application.\
    \ We’ll also need a view controller class to manage the interaction of our interface\
    \ (the view) with the model that represents our foods.\n\n**IOS AND MODEL-VIEW-CONTROLLER\
    \ DEVELOPMENT**\n\nThe Model-View-Controller approach to dividing up functionality\
    \ in a program has become both popular and mature over recent years. The good\
    \ news is the iOS approach to development, and Xcode tools, are designed to harmoniously\
    \ work in an MVC world.\n\nOur little example isn’t really big enough to show\
    \ off the natural MVC tool set and ways of working within Xcode, but you can rest\
    \ assured that the support and approach are there when needed.\n\n### The Food\
    \ Class\n\nWithin your iSeinfeld project in Xcode, `Cmd+click` the Classes folder,\
    \ and choose Add > New File. Call your new class `Food`. We want to derive `Food`\
    \ from the base Objective-C class and use the `NSObject` subclass. We’ll provide\
    \ three data members: `Name`, `Popularity`, and `First Episode`. We’ll also use\
    \ a custom `init` function (think constructor for those familiar with other object-oriented\
    \ languages) to create a `Food` instance more easily. Listing 9-1 shows the `Food.h`\
    \ header.\n\n*Listing 9-1. `Food.h`*\n\n```\n// Food.h\n// iSeinfield\n//\n//\
    \ Created by Grant Allen on 9/9/10.\n// Copyright 2010 __MyCompanyName__. All\
    \ rights reserved.\n//\n#import <Foundation/Foundation.h>\n@interface Food : NSObject\
    \ {\n    NSString *first_episode;\n    NSString *popularity;\n    NSString *name;\n\
    }\n@property (nonatomic, retain) NSString *first_episode;\n@property (nonatomic,\
    \ retain) NSString *popularity;\n@property (nonatomic, retain) NSString *name;\n\
    -(id)initWithName:(NSString *)n first_episode:(NSString *)f popularity:(NSString\
    \ *)t;\n@end\n```"
