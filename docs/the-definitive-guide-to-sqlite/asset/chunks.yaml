    \ in 2002, which then was written using the SQLite 2.x API. Gerhard Häring has\
    \ since taken over the project and completely rewritten it for `PySQLite` version\
    \ 2, which supports SQLite version 3. The project has also evolved and moved several\
    \ times and now refers to itself as `pysqlite` (all lowercase). You can find project\
