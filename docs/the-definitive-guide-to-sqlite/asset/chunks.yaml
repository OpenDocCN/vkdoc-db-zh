    连接\n\nSQLite 扩展位于 `sqlite3` 包中，必须使用 `package require` 指令加载。要连接到数据库，使用 `sqlite3`\
    \ 命令创建一个数据库句柄。该命令接受两个参数：第一个是要创建的数据库句柄的名称，第二个是数据库文件的路径。下面的例子演示了如何连接到数据库：\n\n```tcl\n\
    #!/usr/bin/env tclsh\npackage require sqlite3\nputs \"\\n 正在连接。\"\nsqlite3 db\
    \ ./foods.db\n```\n\n通常的数据库连接规则适用。传递值 `:memory:` 而不是文件名将创建一个内存数据库。传入一个新文件的名称将创建一个新的数据库，依此类推。\n\
    \n返回的数据库句柄对应于与指定数据库的连接；但是，它尚未打开——直到你尝试使用它时，才会打开连接。数据库句柄是与数据库进行交互的唯一对象。\n\n要断开连接，请使用数据库句柄的\
    \ `close` 方法。这将自动回滚任何未完成的事务。\n\n查询处理\n\n该扩展使用 `eval` 方法执行查询，该方法可以一次处理一个或多个查询。\n\
    \n`eval` 有几种用法。第一种方式是在 SQL 代码之后的脚本中遍历所有记录。该脚本将为结果集中返回的每一行执行一次。每行的字段被设置为脚本内的局部变量。以下是一个例子：\n\
    \n```tcl\nputs \"\\n 选择 5 条记录。\"\ndb eval {select * from foods limit 5} {\n  \
