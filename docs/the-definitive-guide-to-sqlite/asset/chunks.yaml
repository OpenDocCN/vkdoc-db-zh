    \ specify the sqlite v3 location\n`--with-jdk=DIR` to specify the JDK location.\n\
    \nTo specify the place where the resulting library should be installed (`libsqlite_jni.so`\
    \ file), use the `--prefix=DIR` option. The default location is `/usr/lib/jvm/java-6-sun/jre/lib/i386`\
    \ (though this may vary depending on your distribution of Linux or use of another\
    \ Unix flavor or Mac OS X, such as `/usr/local/lib`, for example.) To specify\
    \ where the `sqlite.jar` is to be installed, use the `--with-jardir=DIR` option.\
    \ The default is `/usr/lib/jvm/java-6-sun-1.6.0.20/jre/lib/ext/sqlite.jar` (again,\
    \ this may vary depending on the age and type of your distribution). This file\
    \ contains the high-level part and the JDBC driver. At runtime, it is necessary\
    \ to tell the JVM both places with the `-classpath` and `-Djava.library.path=..`\
    \ command-line options.\n\nFor Windows, the makefiles `javasqlite.mak` and `javasqlite3.mak`\
    \ are provided in the distribution. They contain some build instructions and use\
