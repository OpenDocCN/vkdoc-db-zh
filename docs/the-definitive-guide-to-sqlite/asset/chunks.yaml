- fmt: "## 使用参数化SQL\n\nSQL语句可以包含参数。参数是占位符，可以在编译后的某个时间点提供（或“绑定”）值。以下语句是参数化查询的示例：\n\n\
    ```sql\ninsert into foods (id, name) values (?,?);\ninsert into episodes (id,\
    \ name) values (:id, :name);\n```\n\n这两种语句代表了两种参数绑定形式：*位置*参数和*命名*参数。第一条命令使用位置参数，第二条命令使用命名参数。\n\
    \n位置参数由语句中问号的位置定义。第一个问号位置为1，第二个为2，依此类推。命名参数使用实际的变量名，并以冒号为前缀。当`sqlite3_prepare_v2()`编译带有参数的语句时，它会在结果语句句柄中为这些参数分配占位符。然后，它期望在语句执行前为这些参数提供值。如果您没有为参数绑定值，SQLite在执行语句时将默认使用`NULL`。\n\
    \n参数绑定的优势在于，您可以多次执行同一语句而无需重新编译它。您只需重置语句，绑定一组新的值，然后重新执行。这就是重置语句而非终止语句的便利之处：它避免了SQL编译的开销。通过重置语句，您是在重用已编译的SQL代码，完全避免了词法分析、语法分析和代码生成的开销。在API中，重置语句由`sqlite3_reset()`函数实现。\n\
    \n参数的另一个优势是，SQLite会为您处理绑定到参数的字符串值的转义。例如，如果您有一个参数值如`'Kenny's Chicken'`，参数绑定过程会自动将其转换为`'Kenny''s\
    \ Chicken'`——为您转义单引号，帮助您避免语法错误和可能的SQL注入攻击（在“格式化SQL语句”一节中介绍）。以下伪代码说明了使用绑定参数的基本过程：\n\
    \n```python\ndb = open('foods.db')\nstmt = db.prepare('insert into episodes (id,\
    \ name) values (:id, :name)')\nstmt.bind('id', '1')\nstmt.bind('name', 'Soup Nazi')\n\
    stmt.step()\n\n# 重置并再次使用\nstmt.reset()\nstmt.bind('id', '2')\nstmt.bind('name',\
    \ 'The Junior Mint')\n\n# 完成\nstmt.finalize()\ndb.close()\n```\n\n在这里，`reset()`只是释放语句的资源，但保持其VDBE字节码和参数完好无损。语句已准备好再次运行，无需再次调用`prepare()`。对于重复性查询，这可以显著提高性能，因为编译器完全被排除在流程之外。\n\
    \n## 临时存储\n\n临时存储是查询处理的重要组成部分。SQLite偶尔需要存储在执行命令过程中产生的中间结果——例如，当结果需要为`order by`子句排序，或者一个表中的行与另一个表中的行连接时。这些信息通常存储在临时存储中。临时存储可以保存在RAM或文件中。\n\
    \n尽管SQLite在所有平台上都有合适的默认设置，但您可能希望控制其使用此存储的方式和位置。`temp_store`编译指示可以让您指定是使用RAM还是基于文件的存储。如果使用基于文件的存储，您可以使用`temp_store_directory`编译指示来指定存储文件的创建位置。\n\
    \n## 执行包装查询\n\n如前所述，有两个非常有用的实用函数封装了准备查询的过程，允许您通过单个函数调用执行SQL命令。一个函数——`sqlite3_exec()`——通常用于不返回数据的查询。另一个——`sqlite3_get_table()`——通常用于返回数据的查询。在许多语言扩展中，您会看到这两个函数的类似物。大多数扩展将第一个方法简称为`exec()`，将第二个简称为`get_table()`。\n\
    \n`exec()`函数是执行`insert`、`update`和`delete`语句或用于创建和销毁数据库对象的DDL语句的一种快捷方式。它直接从数据库连接工作，接受一个打开的数据库的`sqlite3`句柄以及一个包含一个或多个SQL语句的字符串。没错；`exec()`能够处理由分号分隔的*多个*SQL语句字符串，并一起运行它们。\n\
    \n在内部，`exec()`解析SQL字符串，识别单个语句，然后逐一处理它们。它分配自己的语句句柄，并准备、执行和终止每条语句。\n\n如果传递给它的多条语句中有一条失败，`exec()`会在该命令上终止执行，并返回相关的错误代码。否则，它会返回一个成功代码。以下伪代码概念性地说明了`exec()`在扩展中如何工作：\n\
    \n```python\ndb = open('foods.db')\ndb.exec(\"insert into episodes (id, name)\
    \ values (1, 'Soup Nazi')\")\ndb.exec(\"insert into episodes (id, name) values\
    \ (2, 'The Fusilli Jerry')\")\ndb.exec(\"begin; delete from episodes; rollback\"\
    )\ndb.close()\n```\n\n虽然您也可以使用`exec()`来处理`SELECT`返回的记录，但这涉及到一些通常只由C API支持的微妙方法。\n\
    \n第二个查询函数`sqlite3_get_table()`有些名不副实，因为它不仅限于查询单个表。相反，它的名字指的是`select`查询的表格化结果。您当然也可以用它来处理连接查询。在许多方面，`get_table()`的工作方式与`exec()`相同，但它会在内存中返回一个完整的结果集。根据扩展的不同，这个结果集以不同的方式表示。以下伪代码说明了其典型用法：\n\
    \n```python\ndb = open('foods.db')\ntable = db.get_table(\"select * from episodes\
    \ limit 10\")\nfor i=0; i < table.rows; i++\n    for j=0; j < table.cols; j++\n\
    \        print table[i][j]\n    end\nend\ndb.close()\n```\n\n`get_table()`的优点在于它提供了查询并获取结果的一步到位方法。缺点在于它将结果完全存储在内存中。因此，结果集越大，消耗的内存就越多。所以，使用`get_table()`来检索大型结果集不是一个好主意。另一方面，准备查询方法一次只在内存中保留一条记录（实际上是其关联的数据库页），因此更适合遍历大型结果集。\n\
    \n请注意，尽管这些函数带来了便利，但由于无法访问语句句柄，您也失去了一些控制。例如，您无法对它们中的任何一个使用参数化SQL语句。因此，对于可以受益于参数的重复性任务，它们不会那么高效。此外，API包含一些与语句句柄配合使用的函数，这些函数提供了关于结果集中列的大量信息——包括数据和元数据。这些在包装查询中也不可用。包装查询当然有其用途，但准备查询也是如此。\n\
    \n## 处理错误"
  raw: '**This pseudocode is an object-oriented analog of the API, similar to what
    you might find in a scripting language. The methods all correspond to SQLite API
    functions. For example, **prepare()** mirrors **sqlite3_prepare()_v2**, and so
    on. This example performs a **SELECT**, iterating over all returned rows, followed
    by an **INSERT**, which is processed by a single call to **step()**.


    **TEMPORARY STORAGE**


    Temporary storage is an important part of query processing. SQLite occasionally
    needs to store


    intermediate results produced in the process of executing commands—for instance,
    when results need to be sorted for an **order by** clause or rows in one table
    are joined with rows in another table. This information is often stored in temporary
    storage. Temporary storage is kept either in RAM or in a file.


    Although SQLite has suitable defaults for all platforms, you may want to control
    how and where it uses this storage. The **temp_store** pragma lets you specify
    whether to use RAM or file-based storage. If you use file-based storage, you can
    use the **temp_store_directory** pragma to specify where the storage file is created.


    Using Parameterized SQL


    SQL statements can contain parameters. Parameters are placeholders in which values
    may be provided (or “bound”) at a later time after compilation. The following
    statements are examples of parameterized queries:


    ****insert into foods (id, name) values (?,?);**


    **insert into episodes (id, name) (:id, :name);**


    **These statements represent two forms of parameter binding: *positional* and
    *named*. The first command uses positional parameters, and the second command
    uses named parameters.**


    **Positional parameters are defined by the position of the question mark in the
    statement. The first question mark has position 1, the second 2, and so on. Named
    parameters use actual variable names, which are prefixed with a colon. When **sqlite3_prepare_v2()**
    compiles a statement with parameters, it allocates placeholders for the parameters
    in the resulting statement handle. It then expects values to be 131


    CHAPTER 5 ■ SQLITE DESIGN AND CONCEPTS


    provided for these parameters before the statement is executed. If you don’t bind
    a value to a parameter, SQLite will use **NULL** as the default when it executes
    the statement.


    The advantage of parameter binding is that you can execute the same statement
    multiple times


    without having to recompile it. You just reset the statement, bind a new set of
    values, and reexecute. This is where resetting rather than finalizing a statement
    comes in handy: it avoids the overhead of SQL


    compilation. By resetting a statement, you are reusing the compiled SQL code.
    You completely avoid the tokenizing, parsing, and code generation overhead. Resetting
    a statement is implemented in the API by the **sqlite3_reset()** function.


    The other advantage of parameters is that SQLite takes care of escaping the string
    values you bind to parameters. For example, if you had a parameter value such
    as **''Kenny''s Chicken''** , the parameter binding process will automatically
    convert it to **''Kenny''''s Chicken''** —escaping the single quote for you, helping
    you avoid syntax errors and possible SQL injection attacks (covered in the section
    “Formatting SQL Statements”). The following pseudocode illustrates the basic process
    of using bound parameters: **db = open(''foods.db'')**


    **stmt = db.prepare(''insert into episodes (id, name) values (:id, :name)'')**


    **stmt.bind(''id'', ''1'')**


    **stmt.bind(''name'', ''Soup Nazi'')**


    **stmt.step()**


    **# Reset and use again**


    **stmt.reset()**


    **stmt.bind(''id'', ''2'')**


    **stmt.bind(''name'', ''The Junior Mint'')**


    **# Done**


    **stmt.finalize()**


    **db.close()**


    **Here, **reset()** simply deallocates the statement’s resources but leaves its
    VDBE byte code and parameters intact. The statement is ready to run again without
    the need for another call to **prepare()**.**


    **This can significantly improve performance of repetitive queries such as this
    because the compiler completely drops out of the equation.


    Executing Wrapped Queries


    As mentioned earlier, there are two very useful utility functions that wrap the
    prepared query process, allowing you to execute SQL commands in a single function
    call. One function—**sqlite3_exec()**—is typically for queries that don’t return
    data. The other—**sqlite3_get_table()**—is typically for queries that do. In many
    language extensions, you will see analogs to both functions. Most extensions refer
    to the first method simply as **exec()** and the second as just **get_table()**.


    The **exec()** function is a quick and easy way to execute **insert**, **update**,
    and **delete** statements or DDL statements for creating and destroying database
    objects. It works straight from the database connection, taking a **sqlite3**
    handle to an open database along with a string containing one or more SQL


    statements. That’s right; **exec()** is capable of processing a string of *multiple*
    SQL statements delimited by semicolons and running them all together.


    Internally, **exec()** parses the SQL string, identifies individual statements,
    and then processes them one by one. It allocates its own statement handles and
    prepares, executes, and finalizes each statement.


    CHAPTER 5 ■ SQLITE DESIGN AND CONCEPTS


    If multiple statements are passed to it and one of them fails, **exec()** terminates
    execution on that command, returning the associated error code. Otherwise, it
    returns a success code. The following pseudocode illustrates conceptually how
    **exec()** works in an extension:


    **db = open(''foods.db'')**


    **db.exec("insert into episodes (id, name) values (1, ''Soup Nazi'')")**


    **db.exec("insert into episodes (id, name) values (2, ''The Fusilli Jerry'')")**


    **db.exec("begin; delete from episodes; rollback")**


    **db.close()**


    **Although you can also use **exec()** to process records returned from **SELECT**,
    it involves subtle methods for doing so that are generally supported only by the
    C API.


    The second query function, **sqlite3_get_table()**, is somewhat of a misnomer
    because it is not restricted to just querying a single table. Rather, its name
    refers to the tabular results of a **select** query.


    You can certainly process joins with it just as well. In many respects, **get_table()**
    works in the same way as **exec()**, but it returns a complete result set in memory.
    This result set is represented in various ways depending on the extension. The
    following pseudocode illustrates how it is typically used:


    **db = open(''foods.db'')**


    **table = db.get_table("select * from episodes limit 10")**


    ****for i=0; i < table.rows; i++**


    **for j=0; j < table.cols; j++**


    **print table[i][j]**


    **end**


    **end**


    **db.close()**


    **The upside of **get_table()** is that it provides a one-step method to query
    and get results. The downside is that it stores the results completely in memory.
    So, the larger the result set, the more memory it consumes. Not surprisingly,
    then, it is not a good idea to use **get_table()** to retrieve large result sets.
    The prepared query method, on the other hand, holds only one record (actually
    its associated database page) in memory at a time, so it is much better suited
    for traversing large result sets.


    Notice that although these functions buy you convenience, you also lose a bit
    of control simply by not having access to a statement handle. For example, you
    can’t use parameterized SQL statements with either of them. So, they are not going
    to be as efficient for repetitive tasks that could benefit from parameters. Also,
    the API includes functions that work with statement handles that provide lots
    of information about columns in a result set—both data and metadata. These are
    not available with


    wrapped queries either. Wrapped queries have their uses, to be sure. But prepared
    queries do as well.


    Handling Errors'
  trans: "## 使用参数化 SQL\n\nSQL 语句可以包含参数。参数是占位符，可以在编译后的某个时间点提供（或“绑定”）值。以下语句是参数化查询的示例：\n\
    \n```sql\ninsert into foods (id, name) values (?,?);\ninsert into episodes (id,\
    \ name) values (:id, :name);\n```\n\n这两种语句代表了两种参数绑定形式：*位置*参数和*命名*参数。第一条命令使用位置参数，第二条命令使用命名参数。\n\
    \n位置参数由语句中问号的位置定义。第一个问号位置为 1，第二个为 2，依此类推。命名参数使用实际的变量名，并以冒号为前缀。当`sqlite3_prepare_v2()`编译带有参数的语句时，它会在结果语句句柄中为这些参数分配占位符。然后，它期望在语句执行前为这些参数提供值。如果您没有为参数绑定值，SQLite\
    \ 在执行语句时将默认使用`NULL`。\n\n参数绑定的优势在于，您可以多次执行同一语句而无需重新编译它。您只需重置语句，绑定一组新的值，然后重新执行。这就是重置语句而非终止语句的便利之处：它避免了\
    \ SQL 编译的开销。通过重置语句，您是在重用已编译的 SQL 代码，完全避免了词法分析、语法分析和代码生成的开销。在 API 中，重置语句由`sqlite3_reset()`函数实现。\n\
    \n参数的另一个优势是，SQLite 会为您处理绑定到参数的字符串值的转义。例如，如果您有一个参数值如`'Kenny's Chicken'`，参数绑定过程会自动将其转换为`'Kenny''s\
    \ Chicken'`——为您转义单引号，帮助您避免语法错误和可能的 SQL 注入攻击（在“格式化 SQL 语句”一节中介绍）。以下伪代码说明了使用绑定参数的基本过程：\n\
    \n```python\ndb = open('foods.db')\nstmt = db.prepare('insert into episodes (id,\
    \ name) values (:id, :name)')\nstmt.bind('id', '1')\nstmt.bind('name', 'Soup Nazi')\n\
    stmt.step()\n\n# 重置并再次使用\nstmt.reset()\nstmt.bind('id', '2')\nstmt.bind('name',\
    \ 'The Junior Mint')\n\n# 完成\nstmt.finalize()\ndb.close()\n```\n\n在这里，`reset()`只是释放语句的资源，但保持其\
    \ VDBE 字节码和参数完好无损。语句已准备好再次运行，无需再次调用`prepare()`。对于重复性查询，这可以显著提高性能，因为编译器完全被排除在流程之外。\n\
    \n## 临时存储\n\n临时存储是查询处理的重要组成部分。SQLite 偶尔需要存储在执行命令过程中产生的中间结果——例如，当结果需要为`order by`子句排序，或者一个表中的行与另一个表中的行连接时。这些信息通常存储在临时存储中。临时存储可以保存在\
    \ RAM 或文件中。\n\n尽管 SQLite 在所有平台上都有合适的默认设置，但您可能希望控制其使用此存储的方式和位置。`temp_store`编译指示可以让您指定是使用\
    \ RAM 还是基于文件的存储。如果使用基于文件的存储，您可以使用`temp_store_directory`编译指示来指定存储文件的创建位置。\n\n##\
    \ 执行包装查询\n\n如前所述，有两个非常有用的实用函数封装了准备查询的过程，允许您通过单个函数调用执行 SQL 命令。一个函数——`sqlite3_exec()`——通常用于不返回数据的查询。另一个——`sqlite3_get_table()`——通常用于返回数据的查询。在许多语言扩展中，您会看到这两个函数的类似物。大多数扩展将第一个方法简称为`exec()`，将第二个简称为`get_table()`。\n\
    \n`exec()`函数是执行`insert`、`update`和`delete`语句或用于创建和销毁数据库对象的 DDL 语句的一种快捷方式。它直接从数据库连接工作，接受一个打开的数据库的`sqlite3`句柄以及一个包含一个或多个\
    \ SQL 语句的字符串。没错；`exec()`能够处理由分号分隔的*多个*SQL 语句字符串，并一起运行它们。\n\n在内部，`exec()`解析 SQL\
    \ 字符串，识别单个语句，然后逐一处理它们。它分配自己的语句句柄，并准备、执行和终止每条语句。\n\n如果传递给它的多条语句中有一条失败，`exec()`会在该命令上终止执行，并返回相关的错误代码。否则，它会返回一个成功代码。以下伪代码概念性地说明了`exec()`在扩展中如何工作：\n\
    \n```python\ndb = open('foods.db')\ndb.exec(\"insert into episodes (id, name)\
    \ values (1, 'Soup Nazi')\")\ndb.exec(\"insert into episodes (id, name) values\
    \ (2, 'The Fusilli Jerry')\")\ndb.exec(\"begin; delete from episodes; rollback\"\
    )\ndb.close()\n```\n\n虽然您也可以使用`exec()`来处理`SELECT`返回的记录，但这涉及到一些通常只由 C API 支持的微妙方法。\n\
    \n第二个查询函数`sqlite3_get_table()`有些名不副实，因为它不仅限于查询单个表。相反，它的名字指的是`select`查询的表格化结果。您当然也可以用它来处理连接查询。在许多方面，`get_table()`的工作方式与`exec()`相同，但它会在内存中返回一个完整的结果集。根据扩展的不同，这个结果集以不同的方式表示。以下伪代码说明了其典型用法：\n\
    \n```python\ndb = open('foods.db')\ntable = db.get_table(\"select * from episodes\
    \ limit 10\")\nfor i=0; i < table.rows; i++\n    for j=0; j < table.cols; j++\n\
    \        print table[i][j]\n    end\nend\ndb.close()\n```\n\n`get_table()`的优点在于它提供了查询并获取结果的一步到位方法。缺点在于它将结果完全存储在内存中。因此，结果集越大，消耗的内存就越多。所以，使用`get_table()`来检索大型结果集不是一个好主意。另一方面，准备查询方法一次只在内存中保留一条记录（实际上是其关联的数据库页），因此更适合遍历大型结果集。\n\
    \n请注意，尽管这些函数带来了便利，但由于无法访问语句句柄，您也失去了一些控制。例如，您无法对它们中的任何一个使用参数化 SQL 语句。因此，对于可以受益于参数的重复性任务，它们不会那么高效。此外，API\
    \ 包含一些与语句句柄配合使用的函数，这些函数提供了关于结果集中列的大量信息——包括数据和元数据。这些在包装查询中也不可用。包装查询当然有其用途，但准备查询也是如此。\n\
    \n## 处理错误"
- fmt: "# CHAPTER 5 ■ SQLITE DESIGN AND CONCEPTS\n\nThe previous examples are greatly\
    \ oversimplified to illustrate the basic parts of query processing. In real life,\
    \ you always have to consider the possibility of errors. Almost every function\
    \ you have seen so far can encounter errors of some sort. Common error codes you\
    \ need to be prepared to handle include `SQLITE_ERROR` and `SQLITE_BUSY`. The\
    \ latter error code refers to busy conditions that arise when a connection can’t\
    \ get a lock. Busy conditions are addressed in the “Transactions” section, while\
    \ schema errors are covered in detail in Chapter 6.\n\nWith regard to general\
    \ errors, the API provides the return code of the last-called function with the\
    \ `sqlite3_errcode()` function. You can get more specific error information using\
    \ the `sqlite3_errmsg()` function, which provides a text description of the last\
    \ error. Most language extensions support this function in some way or another.\n\
    \nWith this in mind, each call in the previous example should check for the appropriate\
    \ errors using something like the following:\n\n```\n# Check and report errors\n\
    if db.errcode() != SQLITE_OK\n    print db.errmsg(stmt)\nend\n```\n\nIn general,\
    \ error handling is not difficult. The way you handle any error depends on what\
    \ exactly you are trying to do. The easiest way to approach error handling is\
    \ the same as with any other API—read the documentation on the function you are\
    \ using and code defensively.\n\n## Formatting SQL Statements\n\nAnother nice\
    \ convenience function you may see some extensions support is `sqlite3_mprintf()`.\
    \ It is a variant of the standard C library `sprintf()`. It has special substitutions\
    \ that are specific to SQL that can be very handy. These substitutions are denoted\
    \ `%q` and `%Q`, and they escape SQL-specific values. `%q` works like `%s` in\
    \ that it substitutes a null-terminated string from the argument list. But it\
    \ also doubles every single-quote character, making your life easier and helping\
    \ guard against SQL injection attacks (see the sidebar “SQL Injection Attacks”).\
    \ Here’s an example:\n\n```\nchar* before = \"Hey, at least %q no pig-man.\";\n\
    char* after = sqlite3_mprintf(before, \"he's\");\n```\n\nThe value `after` produced\
    \ here is `'Hey, at least he''s no pig-man'`. The single quote in *he’s* is doubled,\
    \ making it acceptable as a string literal in a SQL statement. The `%Q` formatting\
    \ does everything `%q` does, but it additionally encloses the resulting string\
    \ in single quotes. Furthermore, if the argument for `%Q` is a `NULL` pointer\
    \ (in C), it produces the string `NULL` without single quotes. For more information,\
    \ see the `sqlite3_mprintf()` documentation in the C API reference in Appendix\
    \ B.\n\n## SQL INJECTION ATTACKS\n\nIf your application relies on any user input\
    \ with which to construct SQL statements, you could be vulnerable to a SQL injection\
    \ attack. If you are not careful to filter user input, it could be possible for\
    \ someone to craft input that could alter the SQL statement, injecting a new SQL\
    \ statement into the string.\n\nFor example, say your program uses user input\
    \ to fill in the value of the following SQL statement: `select * from foods where\
    \ name='%s';`\n\nYou replace the `%s` with whatever the user supplies. If users\
    \ have any knowledge of your database, they could provide input that can dramatically\
    \ alter the SQL statement. For example, say the user were to provide the following\
    \ string value for the `name` input:\n\n`nothing' limit 0; select name from sqlite_master\
    \ where name='%`\n\nAfter substituting the user’s input into your SQL statement,\
    \ the new statement turns into two statements: `select * from foods where name='nothing'\
    \ limit 0; select name from sqlite_master where name='%';`\n\nThe first statement\
    \ will return nothing, and the second will return the names of all objects in\
    \ your database. Granted, the odds of this happening require quite a bit of knowledge\
    \ on the attacker’s part, but it is nevertheless possible. Some major (commercial)\
    \ web applications have been known to keep SQL statements embedded in their JavaScript,\
    \ which can provide plenty of hints about the database being used. In the previous\
    \ example, all a malicious user has to do now is insert `drop table` statements\
    \ for every table found in `sqlite_master`, and you could find yourself fumbling\
    \ through backups.\n\n## Operational Control\n\nThe API includes a variety of\
    \ commands that allow you to monitor, control, or generally limit what can happen\
    \ in a database. SQLite implements them in the form of filters or callback functions\
    \ that you can register to be called for specific events. There are three “hook”\
    \ functions: `sqlite3_commit_hook()`, which monitors transaction commits on a\
    \ connection; `sqlite3_rollback_hook()`, which monitors rollbacks; and `sqlite3_update_hook()`,\
    \ which monitors changes to rows from `insert`, `update`, and `delete` operations.\n\
    \n**Note** The forthcoming release of SQLite 3.7 will include many new features,\
    \ one of which is the Write Ahead Log (WAL). With this, a further type of hook\
    \ named `wal_hook()` will be implemented. This is a little different to the hooks\
    \ discussed here. More details on WAL will be covered in Chapter 11.\n\nThese\
    \ hooks are called at runtime—while a command is executed. Each hook allows you\
    \ to register a callback function on a connection-by-connection basis and lets\
    \ you provide some kind of application-specific data to be passed to the callback\
    \ as well. The general use of operational control functions is as follows:\n\n\
    ```\ndef commit_hook(cnx)\n    log('Attempted commit on connection %x', cnx)\n\
    \    return -1\nend\n\ndb = open('foods.db')\ndb.set_commit_hook(rollback_hook,\
    \ cnx)\ndb.exec(\"begin; delete from episodes; rollback\")\ndb.close()\n```\n\n\
    A hook’s return value has the power to alter the event in specific ways, depending\
    \ on the hook. In this example, because the commit hook returns a nonzero value,\
    \ the commit will be rolled back.\n\nAdditionally, the API provides a very powerful\
    \ compile time hook called `sqlite3_set_authorizer()`. This function provides\
    \ you with fine-grained control over almost everything that happens in the database\
    \ as well as the ability to limit both access and modification on a database,\
    \ table, and column basis. This function is covered in detail in Chapter 6.\n\n\
    ## Using Threads\n\nSQLite has a number of functions for using it in a multithreaded\
    \ environment. With version 3.3.1, SQLite introduced a unique operational mode\
    \ called *shared cache mode*, which is designed for multithreaded embedded servers.\
    \ This model provides a way for a single thread to host multiple connections that\
    \ share a common page cache, thus lowering the overall memory footprint of the\
    \ server. It also employs a different concurrency model. Included with this feature\
    \ are various functions for managing memory and fine-tuning the server. This operational\
    \ mode is explained further later in the section “Shared Cache Mode” and in full\
    \ detail in Chapter 6.\n\n## The Extension API\n\nThe extension API in the SQLite\
    \ C API offers support for user-defined functions, aggregates, and collations.\
    \ A user-defined function is a SQL function that maps to some handler function\
    \ that you implement in C or another language. When using the C API, you implement\
    \ this handler in C or C++. In language extensions, you implement the handler\
    \ in the same language as the extension."
