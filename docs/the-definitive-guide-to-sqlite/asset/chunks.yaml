    Analyzer provides detailed technical information about the on-disk structure of
    a SQLite database. This information includes a detailed breakdown of database,
    table, and index statistics for individual objects and in aggregate. It provides
    everything from database properties such as page size, number of tables, indexes,
    file size, and average page density (utilization) to detailed descriptions of
