    An Administrator’s Database


    SQLite is not just a programmer’s database. It is a useful tool for system administrators
    as well. It is small, compact, and elegant like finely honed versatile utilities
    such as **find**, **rsync**, and **grep**. SQLite has a command-line utility that
    can be used from the shell or command line and within shell scripts.


    However, it works even better with a large variety of scripting languages such
    as Perl, Python, TCL, and Ruby. Together the two can help with pretty much any
    task you can imagine, such as aggregating log file data, monitoring disk quotas,
    or performing bandwidth accounting in shared networks. Furthermore, since SQLite
    databases are ordinary disk files, they are easy to work with, transport, and
    back up.'
