    \nSQLite 的作者编写并维护着 Tcl 扩展。SQLite 的所有测试代码都是用 Tcl 实现的，因此也使用了 SQLite Tcl 扩展。可以说，该扩展本身既稳定又经过了充分测试。Tcl\
