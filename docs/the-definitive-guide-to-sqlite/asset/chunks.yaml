    ## 接口层

    接口层位于整个架构的最顶端，由 `SQLite` 的 `C API` 组成。这是程序、脚本语言和各种库与 `SQLite` 交互的途径。实际上，无论你是开发者、管理员、学生还是疯狂的科学家，都是在这里与
    `SQLite` 对话。


    ### 编译器

    编译过程始于 `词法分析器` 和 `语法分析器`。它们协同工作，接收文本形式的结构化查询语言 (`SQL`) 语句，验证其语法，然后将其转换为一种层级数据结构，以便下层更易处理。`SQLite`
    的词法分析器是手工编码的。其语法分析器则由 `SQLite` 自定义的语法分析器生成器生成，该生成器名为 `Lemon`。`Lemon` 语法分析器生成器专为高性能设计，并采取了特殊预防措施来防范内存泄漏。一旦语句被分解为词法单元、经过评估并重构为解析树形式，语法分析器就会将这棵树传递给
    `代码生成器`。


    代码生成器将解析树翻译成一种类似于 `SQLite` 特有的汇编语言。


    这种汇编语言由一系列其虚拟机可执行的指令组成。代码生成器的唯一工作就是将解析树转换成一个用这种汇编语言编写的完整小程序，并将其交给虚拟机处理。


    ### 虚拟机

    位于架构核心的是虚拟机，也称为 *虚拟数据库引擎* (`VDBE`)。`VDBE` 是一个基于寄存器的虚拟机，处理字节码，这使得它独立于底层操作系统、`CPU`
    或系统架构。`VDBE` 的字节码（或虚拟机语言）包含超过 100 种可能的任务，称为 *操作码*，所有这些操作都围绕数据库操作展开。`VDBE` 专为数据处理而设计。其指令集中的每一条指令，要么执行一个特定的数据库操作（例如在表上打开游标、创建记录、提取列或开始事务），要么执行为此类操作做准备的操控。按正确顺序组合起来，`VDBE`
    的指令集可以满足任何 `SQL` 命令，无论其多么复杂。`SQLite` 中的每条 `SQL` 语句——从选择和更新行到创建表、视图和索引——首先被编译成这种虚拟机语言，形成一个独立的指令集，用于定义如何执行给定的命令。例如，以下语句：


    `SELECT name FROM episodes LIMIT 10;`


    将被编译成 *清单 1-1* 所示的 `VDBE` 程序。


    ```

    addr opcode p1 p2 p3 p4 p5 comment

    0 Trace 0 0 0 00

    1 Integer 10 1 0 00

    2 Goto 0 11 0 00

    3 OpenRead 0 2 0 3 00

    4 Rewind 0 9 0 00

    5 Column 0 2 2 00

    6 ResultRow 2 1 0 00

    7 IfZero 1 9 -1 00

    8 Next 0 5 0 01

    9 Close 0 0 0 00

    10 Halt 0 0 0 00

    11 Transactio 0 0 0 00

    12 VerifyCook 0 4 0 00

    13 TableLock 0 2 0 episodes 00

    14 Goto 0 3 0 00

    ```


    该程序包含 15 条指令。这些指令按照特定顺序，使用给定的操作数执行，将返回 `episodes` 表（本书附带示例数据库的一部分）中前十条记录的 `name`
    字段。


    在许多方面，`VDBE` 是 `SQLite` 的心脏。它之前的所有模块都在努力创建一个 `VDBE` 程序，而它之后的所有模块则存在是为了执行该程序，一次执行一条指令。


    ### 后端

    后端由 `B 树`、页缓存和 `OS` 接口组成。`B 树` 和页缓存 (`pager`) 共同作为信息中介。它们流通的货币是数据库页，这些是大小统一的数据块，如同集装箱，专为运输而设计。页内是“货物”：更有趣的信息片段，如记录、列和索引条目。`B
    树` 和页缓存对内容一无所知。它们只移动和排序页面；不关心里面是什么。


    `B 树` 的工作是排序。它维护页面之间许多复杂而精妙的关系，这使得所有内容都相互连接且易于定位。它将页面组织成树状结构（这也是其名称的由来），这种结构经过高度优化以利于搜索。页缓存服务于
    `B 树`，向其提供页面。它的工作是传输和效率。页缓存根据 `B 树` 的指令在磁盘上传输页面。即使在今天的固态硬盘上，磁盘操作仍然是计算机必须执行的最慢操作之一。因此，页缓存试图通过将常用页面缓存在内存中来加快速度，从而最大限度地减少直接处理硬盘的次数。它使用特殊技术来预测未来需要哪些页面，从而预判
    `B 树` 的需求，尽可能保持页面的快速流动。此外，页缓存的职责还包括事务管理、数据库锁定和崩溃恢复。其中许多工作都由 `OS` 接口协调。


    诸如文件锁定之类的事情在不同的操作系统中通常有不同的实现方式。`OS` 接口提供了一个抽象层，将这些差异隐藏在其他 `SQLite` 模块之外。最终结果是，其他模块看到的是一个统一的接口来完成诸如文件锁定等事情。所以，例如，页缓存不必担心在
    `Windows` 上用一种方式做文件锁定，而在 `Unix` 等不同的操作系统上用另一种方式。它让 `OS` 接口来担心这个问题。它只是告诉 `OS` 接口：“锁定这个文件”，然后
    `OS` 接口会根据其运行所在的操作系统来决定如何执行。`OS` 接口不仅让其他模块中的代码保持简洁整洁，还将这些复杂的问题集中在一个地方，保持清晰有序和适当的距离。这使得将
    `SQLite` 移植到不同的操作系统更容易——所有必须处理的 `OS` 问题都在 `OS` 接口的 `API` 中明确标识和记录。


    ### 实用程序与测试代码

    各种实用程序和通用服务，如内存分配、字符串比较和 `Unicode` 转换例程，都保存在实用程序模块中。这基本上是一个用于存放多个模块需要使用或共享的服务的杂项模块。测试模块包含了大量的回归测试，旨在检查数据库代码的每一个微小角落。该模块是
    `SQLite` 如此可靠的原因之一：它执行大量的回归测试，并使这些测试可供任何人运行和改进。


    ## SQLite 的特性与理念

    尽管体积小巧，`SQLite` 提供了令人惊讶的全面功能和能力。它支持 `ANSI SQL92` 标准中很大一部分 `SQL` 特性（事务、视图、检查约束、外键、关联子查询、复合查询等），以及关系数据库中的许多其他特性，如触发器、索引、自增列和
    `LIMIT`/`OFFSET` 功能。它还有许多罕见或独特的特性，例如内存数据库、动态类型和冲突解决——在其他 `RDBMSs` 中有时被称为 *合并*
    或 *更新插入*——这些稍后将进行解释。


    正如本章前面提到的，`SQLite` 有一些指导原则或特征，或多或少定义了它的理念和实现。接下来我将对这些问题进行扩展说明。


    ### 零配置

    从最初构思开始，`SQLite` 的设计目标就是能够被集成和使用而无需 `DBA`。配置和管理 `SQLite` 再简单不过了。`SQLite` 包含的功能刚好能装进一个程序员的大脑，就像它的库在
    `RAM` 中占用的空间很小一样，它在灰质中占据的空间也同样小。


    ### 可移植性

