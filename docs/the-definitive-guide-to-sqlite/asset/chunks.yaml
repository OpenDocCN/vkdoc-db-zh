    2 if you need a refresher on how to add a directory to your **PATH**.


    Downloading and Installing the Android Developer Tools'
  trans: '

    # 为什么要限制这个结果集？


    我们这样做是为了简化应用程序，并避免在我们的第一个 iOS 示例中处理操作大型 SQLite 数据库和数据集的问题。如果我们在 `applicationDidFinishLaunching`
    事件中尝试执行大型数据库操作，就有可能招致看门狗计时器（Watchdog Timer）的“愤怒”。看门狗计时器的职责是确保在 iPad、iPhone 或 iPod
    上运行的所有应用程序都“循规蹈矩”。这包括防止性能不佳的应用程序看似挂起设备或在给定操作中消耗过多处理时间。


    苹果在其 iOS 开发者文档中将看门狗计时器的角色描述为一个系统监视器，它会检查应用程序完成初始启动（以及其他事项）所需的时间。如果应用程序耗时过长，看门狗计时器将终止违规的应用程序，并附上异常代码
    `0x8badf00d`（明白了吗，“坏掉的食物”）。相关信息将被写入该事件的崩溃报告中。


    当你在 Xcode 中运行代码时，看门狗计时器是被禁用的，以补偿我们的 OS X 系统将产生的各种开销，例如调用调试器等。这意味着你在 Xcode 模拟下可能不会注意到看门狗计时器的效果。最好在真实设备上进行测试，以查看你是否遇到了长时间运行的操作问题。


    # 第 9 章 ■ 使用 SQLite 进行 IOS 开发


    这实际上归结为在 iOS 下开发 SQLite 应用程序时的几种常识性管理方法：


    -   不要在启动事件（如 `applicationDidFinishLaunching`）期间执行耗时的查询或加载大型数据库。

    -   当运行返回大型结果集或需要相当长时间的查询时，考虑将它们分解成可消化的工作块。

    -   探索更高级的 iOS API 功能来管理长时间运行的任务。


    归根结底，如果看门狗计时器决定介入，你将看到以下（或类似的）错误：


    ```

    The application iSeinfeld quit unexpectedly


    Mac OS X and other applications are not affected

    ```


    在真实的 iPad 或 iPhone 上，你不会看到这条错误信息，而是会看到应用程序尝试加载主视图并在中途异常中止。通常你会被返回到主屏幕。掌握了这些知识后，你应该能够让看门狗计时器这只“猎犬”保持“快乐”。


    ## 总结


    你现在已体验了创建你的第一个（或最新的）基于 SQLite 的 iOS 应用程序所经历的考验与磨难。我们知道你的朋友和家人将会对你新获得的琐事知识感到惊讶。老实说，他们可能更感兴趣的是使用
    SQLite 构建自己的 iPad 或 iPhone 应用程序是多么容易。


    如果你确实决定凭借你的 iSeinfeld 应用程序大展宏图，请务必告知我们。我们很乐意从 iTunes 购买一份该应用程序，加入到我们的 iSeinfeld
    变体收藏中。


    # 第 10 章


    ## 使用 SQLite 进行 Android 开发


    Android 在推出的短短几年内就席卷了移动设备市场，如果你经不住诱惑购买了一部运行 Android 的手机、平板电脑或其他设备，那么你一直以来都是一名自豪的
    SQLite 用户！SQLite 是 Android 平台内置的数据持久化技术之一，并由 Dalvik 虚拟机提供支持。与第 9 章描述的 iOS 不同，由于
    Dalvik 基于 Java，当应用程序开发者希望在应用中使用 SQLite 时，会使用一个专门构建的 API 包装器来封装底层的 SQLite C API。


    在本章中，我们将通过 Android SQLite 库及其类和方法的演练来“搅动局面”。我们不会只是枯燥地复述文档，而是借此机会构建一个可工作的基于 Android
    SQLite 的应用程序（就像我们在第 9 章为 iOS 所做的那样）。我们将使用 Seinfeld 食物琐事应用的概念，并逐步创建该应用程序的代码和 UI。


    我们还将介绍一些开发者需要考虑的因素，以便成功地在设备上长期维护 Android 应用程序。


    ## SQLite Android 开发的先决条件


    要使用 SQLite 进行任何 Android 开发，你需要装备所需的工具。一旦拥有了这些工具，你将能够进行各种 Android 开发，而不仅仅是涉及 SQLite
    的工作。显然，SQLite 是我们关注的领域，因此我们将重点放在这上面。


    你需要完成的四个步骤如下：


    1.  检查并安装最低先决条件，包括 Java 开发工具包（JDK）。

    2.  下载并安装 Android SDK 启动器包。

    3.  如果你的集成开发环境（IDE）支持，则下载并安装 Android 开发者工具（ADT）。

    4.  将任何所需的目标 Android 平台和其他组件添加到你的环境中。


    我们将快速介绍以上每一步，然后立即着手处理 SQLite 的工作！


    # 第 10 章 ■ 使用 SQLITE 进行 ANDROID 开发


    ## 检查先决条件和 JDK


    要开发任何 Android 应用程序，你需要检查你的开发计算机是否满足一些简单的系统要求。首先，你必须运行 Linux、OS X 或 Windows XP
    或更新版本。Android 团队在 [`developer.android.com/sdk/requirements.html`](http://developer.android.com/sdk/requirements.html)
    列出了特定的版本和相关依赖项。除此之外，Android 组件还需要大约 500MB 的可用磁盘空间，再加上你的 IDE 所需的空间。


    最重要的先决条件是 JDK。Android 开发需要 JDK 5 或 JDK 6。请注意，仅 Java 运行时环境（JRE）是不够的。如果你需要最新的 JDK，可以从
    Oracle 网站获取，或者选择一个集成了 JDK 的 IDE。


    你所有基于 SQLite 的 Android 应用程序的开发都将在 IDE 中完成。有很多种 IDE 可供选择，但最流行且最适合初学者的是 Eclipse。使用
    Eclipse 还能让你使用 Google 的 Android 开发者工具（ADT），我们稍后会介绍。Android 团队建议使用 Eclipse 3.4
    或更高版本，并选择“classic”或“Java-focused”版本。


    ## 下载和安装 Android SDK 启动器包


    Android SDK 启动器包是进行任何 Android 开发所需的核心工具集。重要的是，它不是一个完整的 SDK。相反，它充当一个基线，并引导你下载其他所需的组件。


    Google 让下载 Android SDK 启动器包变得非常容易。浏览到网站 [`developer.android.com/sdk/index.html`](http://developer.android.com/sdk/index.html)，你将看到可直接下载的最新
    SDK 版本。在撰写本文时，版本 7 是最新版本。根据你选择的 Linux、OS X 或 Windows 系统，你需要以下其中一个包：


    -   Linux: `android-sdk_r07-linux_x86.tgz`

    -   Mac OS X: `android-sdk_r07-mac_x86.zip`

    -   Windows: `android-sdk_r07-windows.zip`


    下载 SDK 后，你现在可以继续安装。将你的 `.zip` 或 `.tgz` 文件的内容解压到计算机上的一个方便位置。例如，我们在 Windows 下使用
    Eclipse，因此我们将解压后的 SDK 放在目录 `c:\eclipse\dropins\android-sdk-windows` 中。


    将解压后的 SDK 放置到所需位置后，你需要将该目录添加到系统的 `PATH` 环境变量中。如果需要复习如何向 `PATH` 添加目录，请参考第 2 章。


    ## 下载和安装 Android 开发者工具

