- fmt: "# Page Size, Encoding, and Autovacuum\n\nThe database page size, encoding,\
    \ and autovacuuming must be set before a database is created. That is, to alter\
    \ the defaults, you must first set these pragmas before creating any database\
    \ objects in a new database. The defaults are a page size derived from a number\
    \ of host-specific factors such as disk sector size and UTF-8 encoding. SQLite\
    \ supports page sizes ranging from 512 to 32,786 bytes, in powers of 2.\n\nSupported\
    \ encodings are UTF-8, UTF-16le (little-endian UTF-16 encoding), and UTF-16be\
    \ (big-endian UTF-16 encoding).\n\nA database’s size can be automatically kept\
    \ to a minimum using the `auto_vacuum` pragma. Normally, when a transaction that\
    \ deletes data from a database is committed, the database file remains the same\
    \ size. When the `auto_vacuum` pragma is enabled, the database file shrinks when\
    \ a transaction that deletes data is committed. To support this functionality,\
    \ the database stores extra information internally, resulting in slightly larger\
    \ database files than would otherwise be possible. The `vacuum` command has no\
    \ effect on databases that use `auto_vacuum`.\n\n# Debugging\n\nThere are four\
    \ pragmas for various debugging purposes. The `integrity_check` pragma looks for\
    \ out-of-order records, missing pages, malformed records, and corrupted indexes.\
    \ If any problems are found, then a single string is returned describing the problems.\
    \ If everything is in order, SQLite returns `ok`. The other pragmas are used for\
    \ tracing the parser and virtual database engine and can be enabled only if SQLite\
    \ is compiled with debugging information. You can find detailed information on\
    \ these pragmas in Chapter 11.\n\n# CHAPTER 4 ■ ADVANCED SQL FOR SQLITE\n\n##\
    \ The System Catalog\n\nThe `sqlite_master` table is a system table that contains\
    \ information about all the tables, views, indexes, and triggers in the database.\
    \ For example, the current contents of the `foods` database are as follows:\n\n\
    ```\nsqlite> select type, name, rootpage from sqlite_master;\ntype       name\
    \                          rootpage\n---------- -----------------------------\
    \ ----------\ntable      episodes                      2\ntable      foods   \
    \                      3\ntable      foods_episodes                4\ntable  \
    \    food_types                    5\nindex      foods_name_idx              \
    \  30\ntable      sqlite_sequence               50\ntrigger    foods_update_trg\
    \              0\ntrigger    foods_insert_trg              0\ntrigger    foods_delete_trg\
    \              0\n```\n\nThe `type` column refers to the type of object, `name`\
    \ is of course the name of the object, and `rootpage` refers to the first B-tree\
    \ page of the object in the database file. This latter column is relevant only\
    \ for tables and indexes.\n\nThe `sqlite_master` table also contains another column\
    \ called `sql`, which stores the DML used to create the object. Here’s an example:\n\
    \n```\nsqlite> select sql from sqlite_master where name='foods_update_trg';\n\
    create trigger foods_update_trg\nbefore update of type_id on foods\nbegin\n  select\
    \ case\n    when (select id from food_types where id=new.type_id) is null\n  \
    \    then raise( abort,\n         'Foreign Key Violation: foods.type_id is not\
    \ in food_types.id')\n  end;\nend\n```\n\n## Viewing Query Plans\n\nYou can view\
    \ the way SQLite goes about executing a query by using the `explain query plan`\
    \ command.\n\nThe `explain query plan` command lists the steps SQLite carries\
    \ out to access and process tables and data to satisfy your query.\n\nTo use `explain\
    \ query plan`, just issue the command followed by your normal query text. For\
    \ instance, here’s what `explain query plan` has to say about how a query on the\
    \ `foods` table is processed:\n\n```\nsqlite> explain query plan select * from\
    \ foods where id = 145;\norder from detail\n---------- ---------- ---------------------------------\n\
    0        0          TABLE foods USING PRIMARY KEY\n```\n\nThis means that SQLite\
    \ is accessing the `foods` table and using the primary key (on `id`) to perform\
    \ the access (rather than scanning the table’s data in a brute-force fashion).\n\
    \nStudying these query plans is the key to understanding how SQLite is approaching\
    \ your data and satisfying your query. You can spot when and how indices are used\
    \ and the order in which tables are used in joins. This is of immense help when\
    \ troubleshooting long-running queries and other issues.\n\n## Summary\n\nSQL\
    \ may be a simple language to use, but there is quite a bit of it, and it’s taken\
    \ us two chapters just to introduce the major concepts for SQLite’s implementation\
    \ of SQL. But that shouldn’t be too surprising, because it is the sole interface\
    \ through which to interact with a relational database. Whether you are a casual\
    \ user, system administrator, or developer, you have to know SQL if you are going\
    \ to work with a relational database.\n\nIf you are programming with SQLite, then\
    \ you should be off to a good start on the SQL side of things.\n\nNow you need\
    \ to know a little about how SQLite goes about executing all of these commands.\
    \ This is where Chapter 5 should prove useful. It will introduce you to the API\
    \ and show you how it works in relation to the way SQLite functions internally.\n\
    \n# CHAPTER 5 ■ ■ ■ SQLite Design and Concepts\n\nThis chapter sets the stage\
    \ for the following chapters, each of which focuses on a different aspect of programming\
    \ with SQLite. It addresses the things that you as a programmer should know about\
    \ SQLite when using it in your code. Whether you are programming with SQLite in\
    \ its native C or in your favorite scripting language, it helps to understand\
    \ not only its API but also a little about its architecture and implementation.\
    \ Armed with this knowledge, you will be better equipped to write code that runs\
    \ faster and avoids potential pitfalls such as deadlocks or unexpected errors.\
    \ You will see how SQLite works in relation to your code, and you can be more\
    \ confident that you are attacking the problem from the right direction.\n\nYou\
    \ don’t have to comb through the bowels of the source code to understand these\
    \ things, and you don’t have to be a C programmer. SQLite’s design and concepts\
    \ are all very straightforward and easy to understand. And there are only a few\
    \ things you need to know. This chapter lays out the main concepts and components\
    \ on which to build your understanding.\n\nKey to understanding SQLite is knowing\
    \ how the API works. So, this chapter starts with a conceptual introduction to\
    \ the API, illustrating its major data structures, its general design, and its\
    \ major functions.\n\nIt also looks at some of the major SQLite subsystems that\
    \ play important roles in query processing.\n\nBeyond just knowing what functions\
    \ do what, we’ll also look above the API, seeing how everything operates in terms\
    \ of transactions. Everything involving a SQLite database is done within the context\
    \ of a transaction. Then you need to look beneath the API, seeing how transactions\
    \ work in terms of locks.\n\nLocks can cause problems if you don’t know how they\
    \ operate. By understanding locks, not only can you avoid potential concurrency\
    \ problems, but you can also optimize your queries by controlling how your program\
    \ uses them.\n\nFinally, you have to understand how all of these things apply\
    \ to writing code. The last part of the chapter brings all three topics—the API,\
    \ transactions, and locks—together and looks at different examples of good and\
    \ bad code. It specifically identifies scenarios that could cause problems and\
    \ provides some insight on how to address them.\n\nWith these things in order,\
    \ you will be well on your way to conquering the C API and the API of any language\
    \ extension.\n\n## The API\n\nFunctionally, the SQLite API can be separated into\
    \ two general parts: the core API and the extension API.\n\nThe core API consists\
    \ all the functions used to perform basic database operations: connecting to the\
    \ database, processing SQL, and iterating through results. It also includes various\
    \ utility functions that help with tasks such as string formatting, operational\
    \ control, debugging, and error handling."
