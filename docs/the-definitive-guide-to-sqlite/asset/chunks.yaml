    `foo` 的表，而附加数据库的逻辑名称是 `db2`，那么查询 `db2` 中的 `foo` 的唯一方法就是使用完全限定名 `db2.foo`，如下所示：


    ```sqlite

    sqlite> attach database ''/tmp/db'' as db2;

    sqlite> select * from db2.foo;

    x

    ----------

    bar

    ```


    如果你确实想的话，你可以使用名称 `main` 来限定主数据库中的对象：


    ```sqlite

    sqlite> select * from main.foods limit 2;

    id  type_id  name

    ----------  ----------  --------------

    1    1        Bagels

    2    1        Bagels, raisin

    ```


    临时数据库也是如此：


    ```sqlite

    sqlite> create temp table foo as select * from food_types limit 3;

    sqlite> select * from temp.foo;

    id  name

    ---  -------------

    1    Bakery

    2    Cereal

    3    Chicken/Fowl

    ```


    你可以使用 `detach database` 命令分离数据库，定义如下：


    `detach [database] database_name;`


    此命令接受附加数据库的逻辑名称（由 `database_name` 给出），并分离关联的数据库文件。你可以使用 `database_list` 编译指示获取附加数据库的列表，该指示在“数据库配置”部分解释。


    ## 清理数据库


    SQLite 有两个用于清理的命令——`reindex` 和 `vacuum`。`reindex` 用于重建索引。它有两种形式：


    `reindex collation_name;`


    `reindex table_name|index_name;`


    第一种形式重建所有使用给定 `collation_name` 排序序列的索引。只有在你更改了用户定义的排序序列的行为时（例如，中文的多种排序顺序）才需要这样做。第二种形式可以重建表中的所有索引，或给定索引名的特定索引。


    `Vacuum` 通过重建数据库文件来清理数据库中任何未使用的空间。如果存在任何打开的事务，`Vacuum` 将无法工作。手动运行 `VACUUM` 语句的一个替代方法是自动真空（autovacuum）。此功能使用
    `auto_vacuum` 编译指示启用，将在下一节中描述。


