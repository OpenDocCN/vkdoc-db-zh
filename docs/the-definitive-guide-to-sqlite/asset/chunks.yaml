  trans: "\n一旦准备好查询，下一步就是使用 `sqlite3_step()` 来执行它，其声明如下：`int sqlite3_step(sqlite3_stmt\
    \ *pStmt);`\n\n`sqlite3_step()` 接收语句句柄并直接与 **VDBE（虚拟数据库引擎）** 通信，VDBE 会逐条执行其字节码指令以完成\
    \ SQL 语句。首次调用 `sqlite3_step()` 时，VDBE 会获取执行命令所需的数据库锁。如果无法获得锁且未安装繁忙处理程序，`sqlite3_step()`\
    \ 将返回 `SQLITE_BUSY`。如果已安装繁忙处理程序，则会调用该处理程序。\n\n对于不返回数据的 SQL 语句，首次调用 `sqlite3_step()`\
    \ 会完整执行命令，并返回表示结果的结果代码。对于返回数据的 SQL 语句（如 `select`），首次调用 `sqlite3_step()` 会将语句的\
    \ **B 树游标** 定位到第一条记录。\n\n随后对 `sqlite3_step()` 的调用会将游标定位到结果集中的后续记录。\n\n`sqlite3_step()`\
    \ 为结果集中的每条记录返回 `SQLITE_ROW`，直到到达末尾，此时返回 `SQLITE_DONE`，表示游标已到达结果集末尾。\n\n■ **注意**\
    \ 对于熟悉旧版 SQLite 的用户，这些结果代码属于更高级——也有人认为更正确——的结果代码集，用于替代传统的简单返回值（如 `SQLITE_ERROR`）。完整的结果代码和扩展结果代码列表可在\
    \ [www.sqlite.org/c3ref/c_abort.html](http://www.sqlite.org/c3ref/c_abort.html)\
    \ 查阅。\n\n所有其他与数据访问相关的 API 函数都使用语句的游标来获取当前记录的信息。例如，`sqlite3_column_*xxx*()` 函数都使用语句句柄（具体来说是其游标）来获取当前记录的字段。\n\
    \n## 第六章 ■ 核心 C API\n\n### 终结与重置\n\n语句执行结束后，必须对其进行终结。你可以使用以下函数之一来终结或重置语句：\n\n\
    `int sqlite3_finalize(sqlite3_stmt *pStmt);`\n\n`int sqlite3_reset(sqlite3_stmt\
    \ *pStmt);`\n\n`sqlite3_finalize()` 会关闭语句。它释放资源，提交或回滚任何隐式事务（如果连接处于自动提交模式），并清除日志文件及释放相关锁。\n\
    \n如果你想重用该语句，可以使用 `sqlite3_reset()`。它会保留已编译的 SQL 语句（及任何绑定参数），但会将当前语句相关的所有更改提交到数据库。如果启用了自动提交，它还会释放锁并清除日志文件。`sqlite3_finalize()`\
    \ 和 `sqlite3_reset()` 的主要区别在于，后者保留与语句相关的资源，使其可以再次执行，从而避免调用 `sqlite3_prepare()`\
    \ 来重新编译 SQL 命令。\n\n让我们看一个示例。\n\n#### 清单 6-5. 使用预处理查询\n\n清单 6-5 展示了一个使用预处理查询的简单完整程序。它取自示例中的\
    \ `select.c` 文件。\n\n```c\nint main(int argc, char **argv)\n{\n    int rc, i, ncols;\n\
    \    sqlite3 *db;\n    sqlite3_stmt *stmt;\n    char *sql;\n    const char *tail;\n\
    \n    rc = sqlite3_open_v2(\"foods.db\", &db);\n    if(rc) {\n        fprintf(stderr,\
    \ \"无法打开数据库: %s\\n\", sqlite3_errmsg(db));\n        sqlite3_close(db);\n     \
    \   exit(1);\n    }\n\n    sql = \"select * from episodes;\";\n    rc = sqlite3_prepare_v2(db,\
    \ sql, -1, &stmt, &tail);\n    if(rc != SQLITE_OK) {\n        fprintf(stderr,\
    \ \"SQL 错误: %s\\n\", sqlite3_errmsg(db));\n    }\n\n    rc = sqlite3_step(stmt);\n\
    \    ncols = sqlite3_column_count(stmt);\n\n    while(rc == SQLITE_ROW) {\n  \
    \      for(i=0; i < ncols; i++) {\n            fprintf(stderr, \"'%s' \", sqlite3_column_text(stmt,\
    \ i));\n        }\n        fprintf(stderr, \"\\n\");\n        rc = sqlite3_step(stmt);\n\
    \    }\n\n    sqlite3_finalize(stmt);\n    sqlite3_close(db);\n    return 0;\n\
    }\n```\n"
- fmt: "# CHAPTER 6 ■ THE CORE C API\n\nThis example connects to the `foods.db` database,\
    \ queries the `episodes` table, and prints out all columns of all records within\
    \ it. Keep in mind this is a simplified example—there are a few other things we\
    \ need to check for when calling `sqlite3_step()`, such as errors and busy conditions,\
    \ but we will address them later.\n\nLike `sqlite3_exec()`, `sqlite3_prepare_v2()`\
    \ can accept a string containing multiple SQL statements. However, unlike `sqlite3_exec()`,\
    \ it will process only the first statement in the string. But it does make it\
    \ easy for you to process subsequent SQL statements in the string by providing\
    \ the `pzTail` out parameter.\n\nAfter you call `sqlite3_prepare()`, it will point\
    \ this parameter (if provided) to the starting position of the next statement\
    \ in the `zSQL` string. Using `pzTail`, processing a batch of SQL commands in\
    \ a given string can be executed in a loop as follows:\n\n```\nwhile(sqlite3_complete(sql)\
    \ ){\n    rc = sqlite3_prepare(db, sql, -1, &stmt, &tail);\n    /* Process query\
    \ results */\n    /* Skip to next command in string. */\n    sql = tail;\n}\n\
    ```\n\nThis example uses another API function not yet covered—`sqlite3_complete()`,\
    \ which does as its name suggests. It takes a string and returns true if there\
    \ is at least one complete (but not necessarily valid) SQL statement in it, and\
    \ it returns false otherwise. In reality, `sqlite_complete()` looks for a semicolon\
    \ terminator for the string (and accounting for literals in the SQL). So, although\
    \ its name suggests some kind of infallible observer checking your statements,\
    \ it’s really just a handy tool for things such as showing you the continuation\
    \ prompt in the `sqlite` command line when writing multiline statements and doing\
    \ other similar useful tasks.\n\n## Fetching Records\n\nSo far, you have seen\
    \ how to obtain records and columns from `sqlite3_exec()` and `sqlite3_get_table()`.\
    \ Prepared queries, by comparison, offer many more options when it comes to getting\
    \ information from records in the database.\n\nFor a statement that returns records,\
    \ the number of columns in the result set can be obtained using `sqlite3_column_count()`\
    \ and `sqlite3_data_count()`, which are declared as follows:\n\n```\nint sqlite3_column_count(sqlite3_stmt\
    \ *pStmt);\nint sqlite3_data_count(sqlite3_stmt *pStmt);\n```\n\n`sqlite3_column_count()`\
    \ returns the number of columns associated with a statement handle. You can call\
    \ it on a statement handle before it is actually executed. If the query in question\
    \ is not a `select` statement, `sqlite3_column_count()` will return 0. Similarly,\
    \ `sqlite3_data_count()` returns the number of columns for the current record,\
    \ after `sqlite3_step()` returns `SQLITE_ROW`. This function will work only if\
    \ the statement handle has an active cursor.\n\n## Getting Column Information\n\
    \nYou can obtain the name of each column in the current record using `sqlite3_column_name()`,\
    \ which is declared as follows:\n\n```\nconst char *sqlite3_column_name(\n   \
    \ sqlite3_stmt*, /* statement handle */\n    int iCol       /* column ordinal\
    \ */\n);\n```\n\nSimilarly, you can get the associated storage class for each\
    \ column using `sqlite3_column_type()`, which is declared as follows:\n\n```\n\
    int sqlite3_column_type(\n    sqlite3_stmt*, /* statement handle */\n    int iCol\
    \       /* column ordinal */\n);\n```\n\nThis function returns an integer value\
    \ that corresponds to one of five storage class codes, defined as follows:\n\n\
    ```\n#define SQLITE_INTEGER 1\n#define SQLITE_FLOAT   2\n#define SQLITE_TEXT \
    \   3\n#define SQLITE_BLOB    4\n#define SQLITE_NULL    5\n```\n\nThese are SQLite’s\
    \ native data types, or storage classes, as described in Chapter 4. All data stored\
    \ within a SQLite database is stored in one of these five forms, depending on\
    \ its initial representation and the affinity of the column. For our purposes,\
    \ the terms *storage class* and *data type* are synonymous. For more information\
    \ on storage classes, see the sections “Storage Classes” and “Type Affinity” in\
    \ Chapter 4."
  raw: '**This example connects to the **foods.db** database, queries the **episodes**
