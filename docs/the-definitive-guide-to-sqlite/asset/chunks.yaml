    \ wrapper interfaces to the underlying SQLite API calls (though with varying degrees\
    \ of depth). The second group is the all-encompassing framework approach, such\
    \ as `SQL Alchemy`. These are typically designed as complete object-relational\
    \ mapping systems, seeking not only to provide access to the underlying database\
    \ API but to also follow object-oriented philosophies in the design and use of\
    \ database-related code.\n\nAt last count, there were at least nine different\
    \ wrappers or object-relational frameworks for SQLite in Python. That’s almost\
    \ enough for a book in its own right. We’ll cover one of the more popular wrappers,\
    \ `PySQLite`, principally because it has been one of the most enduring and also\
    \ maps to the Python DB API.\n\nMichael Owens (the author of the first edition\
