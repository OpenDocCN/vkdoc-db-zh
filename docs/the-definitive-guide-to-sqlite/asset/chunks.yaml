  trans: "\n## 第 3 章 ■ SQLite 的 SQL\n\n### 分组\n\n聚合的一个重要部分是分组。也就是说，除了对整个结果计算聚合值，你还可以将结果按具有相同值的行组进行拆分，并对每个组计算聚合值——所有这些一步完成。这就是\
    \ `GROUP BY` 子句的工作。下面是一个例子：\n\n```sql\nsqlite> select type_id from foods group\
    \ by type_id;\n\ntype_id\n----------\n1\n2\n3\n.\n.\n.\n15\n```\n\n`GROUP BY`\
    \ 与其他 `SELECT` 的组成部分有点不同，所以你需要发挥一点想象力才能理解它。图 3-7 说明了这个过程。在操作上，`GROUP BY` 位于 `WHERE`\
    \ 子句和 `SELECT` 子句之间。`GROUP BY` 接收 `WHERE` 的输出，并将其拆分成行组，这些行在特定列（或多个列）上具有共同的值。然后，这些组被传递给\
    \ `SELECT` 子句。在例子中，有 15 种不同的食物类型（`type_id` 范围从 1 到 15），因此 `GROUP BY` 将 `foods`\
    \ 表中的所有行组织成 15 个按 `type_id` 区分的组。`SELECT` 获取每个组，提取其共同的 `type_id` 值，并将其放入单独的一行中。因此，结果中有\
    \ 15 行，每行对应一个组。\n\n*图 3-7. `GROUP BY` 过程*\n\n当使用 `GROUP BY` 时，`SELECT` 子句会对每个组分别应用聚合，而不是将整个结果作为一个整体来应用。由于聚合从一组值中产生单个值，它们会将这些行组“折叠”成单行。例如，考虑对前面的例子应用\
    \ `count` 聚合，以获取每个 `type_id` 组中的记录数：\n\n```sql\nsqlite> select type_id, count(*)\
    \ from foods group by type_id;\n\ntype_id count(*)\n---------- ----------\n1 47\n\
    2 15\n3 23\n4 22\n5 17\n6 4\n7 60\n8 23\n9 61\n10 36\n11 16\n12 23\n13 14\n14\
    \ 19\n15 32\n```\n\n在这里，`count()` 被应用了 15 次——每个组一次，如图 3-8 所示。注意，图中并没有字面表示每个组中的实际记录数（也就是说，它没有显示\
    \ `type_id`=1 的组中有 47 条记录）。\n\n*图 3-8. `GROUP BY` 与聚合*\n\n`type_id=1`（烘焙食品）的记录数是\
    \ 47。`type_id=2`（谷物食品）的是 15。`type_id=3`（鸡肉/禽类）的是 23，以此类推。因此，要获取此信息，你可以运行 15 次如下查询：\n\
    \n```sql\nselect count(*) from foods where type_id=1;\nselect count(*) from foods\
    \ where type_id=2;\nselect count(*) from foods where type_id=3;\n.\n.\n.\nselect\
    \ count(*) from foods where type_id=15;\n```\n\n或者，你可以使用一条带 `GROUP BY` 的 `SELECT`\
    \ 语句得到结果，如下所示：\n\n```sql\nselect type_id, count(*) from foods group by type_id;\n\
    ```\n\n但还有更多内容。既然 `GROUP BY` 必须完成所有这些工作来创建具有相同值的组，如果不让你在将这些组移交给 `SELECT` 子句之前过滤它们，似乎有些可惜。这就是\
    \ `HAVING` 的目的，这是一个应用于 `GROUP BY` 结果的谓词。它以与 `WHERE` 子句过滤 `FROM` 子句输出的行相同的方式，过滤来自\
    \ `GROUP BY` 的组。唯一的区别是，`WHERE` 子句的谓词是针对单个行值表达的，而 `HAVING` 的谓词是针对聚合值表达的。\n\n沿用前面的例子，但这次假设你只对查看包含少于\
    \ 20 种食物的食品组感兴趣：\n\n```sql\nsqlite> select type_id, count(*) from foods\n   ...>\
    \ group by type_id having count(*) < 20;\n\ntype_id count(*)\n---------- ----------\n\
    2 15\n5 17\n6 4\n11 16\n13 14\n14 19\n```\n"
- fmt: "# CHAPTER 3 ■ SQL FOR SQLITE\n\n## HAVING 子句作为分组限制\n\nHere, `having` applies\
    \ the predicate `count(*)<20` to all the groups. Any group that does not satisfy\
    \ this condition (that has 20 or more foods in it) is not passed on to the `select`\
    \ clause. Figure 3-9 illustrates this restriction.\n\nCOUNT()<20\n\nCOUNT()\n\n\
    tid\n\nCOUNT()<20\n\nCOUNT()<20\n\ntid\n\nCOUNT()\n\nCOUNT()<20\n\nCOUNT()\n\n\
    COUNT()<20\n\nCOUNT()\n\n**Result**\n\n**WHERE**\n\nCOUNT()<20\n\nCOUNT()<20\n\
    \nCOUNT()\n\nCOUNT()<20\n\n**GROUP BY**\n\n**HAVING**\n\n**SELECT**\n\n*Figure\
    \ 3-9\\. `having` as group restriction*\n\nThe third column in the figure shows\
    \ groups of rows ordered by `type_id`. The values shown are the `type_id` values.\
    \ The actual number of rows shown in each group is not exact but figurative. I\
    \ have only shown two rows in each group to represent the group as a whole.\n\n\
    So, `group by` and `having` work as additional restriction phases. `group by`\
    \ takes the restriction produced by the `where` clause and breaks it into groups\
    \ of rows that share a common value for a given column. `having` then applies\
    \ a filter to each of these groups. The groups that make it through are passed\
    \ on to the `select` clause for aggregation and projection.\n\n■ **Caution** Some\
    \ databases, including SQLite, will allow you to construct a `select` statement\
    \ where nonaggregated columns are not grouped in a `select` statement with mixed\
    \ aggregate and nonaggregate columns.\n\nFor instance, SQLite will allow you to\
    \ execute this SQL:\n\n```sql\nselect type_id, count(*) from foods\n```\n\nBecause\
    \ the aggregate (`count`) collapses the input table, there is a mismatch in the\
    \ number of rows that pass all the filtering steps. Count in this case will return\
    \ one row, but we haven’t instructed SQLite how to group `type_id`.\n\nNevertheless,\
    \ SQLite will return something. Sadly, the results of such a statement are meaningless—\
    \ *do not rely* on any SQL statement that doesn’t group by nonaggregate fields.\
    \ *The results are arbitrary!*\n\n## Removing Duplicates\n\n`distinct` takes the\
    \ result of the `select` clause and filters out duplicate rows. For example, you’d\
    \ use this to get all distinct `type_id` values from `foods`:\n\n```sql\nsqlite>\
    \ select distinct type_id from foods;\ntype_id\n----------\n1\n2\n3\n.\n.\n.\n\
    15\n```\n\nThis statement works as follows: the `where` clause returns the entire\
    \ foods table (all 412 records). The `select` clause pulls out just the `type_id`\
    \ column, and finally `distinct` removes duplicate rows, reducing the number from\
    \ 412 rows to 15 rows, all unique.\n\n## Joining Tables\n\nJoins are the key to\
    \ working with data from multiple tables (or relations) and are the first operation(s)\
    \ of the `select` command. The result of a join is provided as the input or starting\
    \ point for all subsequent (filtering) operations in the `select` command.\n\n\
    Joins in SQLite are best understood by example. The `foods` table has a column\
    \ `type_id`. As it turns out, the values in this column correspond to values in\
    \ the `id` column in the `food_types` table. A relationship exists between the\
    \ two tables. Any value in the `foods.type_id` column must correspond to a value\
    \ in the `food_types.id` column, and the `id` column is the *primary key* (described\
    \ later) of `food_types`.\n\nThe `foods.type_id` column, by virtue of this relationship,\
    \ is called a *foreign key*: it contains (or references) values in the primary\
    \ key of another table. This relationship is called a *foreign key* *relationship*\n\
    \nUsing this relationship, it is possible to join the foods and food_type tables\
    \ on these two columns to make a new relation, which provides more detailed information,\
    \ namely, the `food_types.name` for each food in the `foods` table. This is done\
    \ with the following SQL:\n\n```sql\nsqlite> select foods.name, food_types.name\n\
    \   ...> from foods, food_types\n   ...> where foods.type_id=food_types.id limit\
    \ 10;\nname                  name\n------------------------- ---------------\n\
    Bagels                Bakery\nBagels, raisin        Bakery\nBavarian Cream Pie\
    \    Bakery\nBear Claws            Bakery\nBlack and White cookies Bakery\n```"
