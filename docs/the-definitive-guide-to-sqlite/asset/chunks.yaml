  trans: "\n关系模型要求支持可更新视图。这是一类允许修改的视图。例如，你可以在其上执行 `insert` 或 `update` 语句，相应的更改会直接应用到其底层表中。SQLite\
    \ 不支持可更新视图。不过，通过触发器，你可以实现类似的功能。我们将在后文“触发器”一节展示该技术。\n\n## 索引\n\n索引是一种设计用于在特定条件下加速查询的结构。考虑以下查询：\n\
    \n```sql\nSELECT * FROM foods WHERE name='JujyFruit';\n```\n\n当数据库搜索匹配行时，默认采用的方法称为\
    \ `顺序扫描`。也就是说，它确实会逐行搜索（或扫描）表中的每一行，以检查其 `name` 属性是否与 `'JujyFruit'` 匹配。\n\n然而，如果此查询频繁使用且\
    \ `foods` 表非常庞大，那么采用索引方法来查找数据就合理得多。SQLite 使用 B 树索引，与许多其他关系数据库类似。\n\n索引也会增大数据库的大小。它们实质上保存了所索引所有列的副本。如果你为表中的每一列都创建索引，实际上会使表的大小翻倍。另一个需要考虑的因素是索引需要维护。当你插入、更新或删除记录时，除了修改表本身，数据库还必须修改该表上的每一个索引。因此，尽管索引可以使查询运行得更快，但它们可能会拖慢插入、更新及类似操作。\n\
    \n### 创建索引\n\n创建索引的命令如下：\n\n```sql\ncreate index [unique] index_name on table_name\
    \ ( columns )\n```\n\n变量 `index_name` 是索引的名称，`table_name` 是要索引的列所在的表的名称。变量 `columns`\
    \ 可以是单个列，也可以是逗号分隔的列列表。\n\n如果使用 `unique` 关键字，则该索引将附加一个约束：索引中的所有值都必须是唯一的。这既适用于索引本身，也延伸适用于它所索引的一个或多个列。`unique`\
    \ 约束覆盖索引中定义的所有列，并且要求它们的组合值（而非单个值）必须唯一。示例如下：\n\n```sql\nsqlite> create table foo(a\
    \ text, b text);\n\nsqlite> create unique index foo_idx on foo(a,b);\n\nsqlite>\
    \ insert into foo values ('unique', 'value');\n\nCHAPTER 4 ■ ADVANCED SQL FOR\
    \ SQLITE\n\nsqlite> insert into foo values ('unique', 'value2');\n\nsqlite> insert\
    \ into foo values ('unique', 'value');\n\nSQL error: columns a, b are not unique\n\
    ```\n\n你可以看到，这里的唯一性是由两个列共同定义的，而非单独定义。注意，排序规则在此也起着重要作用。\n\n要删除索引，使用 `drop index`\
    \ 命令，其定义如下：\n\n```sql\ndrop index index_name;\n```\n\n### 排序规则\n\n索引中的每个列都可以关联一个排序规则。例如，要在\
    \ `foods.name` 上创建一个不区分大小写的索引，可以使用以下语句：\n\n```sql\ncreate index foods_name_idx\
    \ on foods (name collate nocase);\n```\n\n这意味着 `name` 列中的值在排序时将忽略大小写。你可以在 SQLite\
    \ 命令行程序中使用 `.indices` shell 命令列出表的索引。示例如下：\n\n```sql\nsqlite> .indices foods\n\
    foods_name_idx\n```\n\n你也可以使用 `.schema` shell 命令获取更多信息：\n\n```sql\nsqlite> .schema\
    \ foods\nCREATE TABLE foods(\nid integer primary key,\ntype_id integer,\nname\
    \ text );\nCREATE INDEX foods_name_idx on foods (name COLLATE NOCASE);\n```\n\n\
    你还可以通过查询 `sqlite_master` 表来获取此信息，该表将在本节稍后描述。\n\n### 索引利用\n\n理解索引何时被使用、何时不被使用至关重要。SQLite\
    \ 在决定是否使用索引时有非常具体的条件。对于 `WHERE` 子句中的以下表达式，如果可用，SQLite 将使用单列索引：\n\n- `column {=|>|>=|<=|<}\
    \ expression`\n- `expression {=|>|>=|<=|<} column`\n- `column IN ( expression-list\
    \ )`\n- `column IN (subquery)`\n\n多列索引在被使用前有更具体的条件。这或许通过示例说明最为清楚。假设你有一个如下定义的表：\n\
    \n```sql\ncreate table foo (a,b,c,d);\n```\n\n107\n\nCHAPTER 4 ■ ADVANCED SQL\
    \ FOR SQLITE\n\n此外，你创建一个多列索引如下：\n\n```sql\ncreate index foo_idx on foo (a,b,c,d);\n\
    ```\n\n`foo_idx` 的列只能按从左到右的顺序使用。也就是说，在以下查询中：\n\n```sql\nselect * from foo where\
    \ a=1 and b=2 and d=3\n```\n\n只有第一个和第二个条件会使用索引。第三个条件被排除的原因是没有使用 `c` 作为桥梁连接到 `d`\
    \ 的条件。基本上，当 SQLite 使用多列索引时，它是按列从左到右工作的。它从最左边的列开始，查找使用该列的条件。然后移动到第二列，依此类推。它持续进行，直到要么在\
    \ `WHERE` 子句中找不到使用它的有效条件，要么索引中没有更多列可供使用。\n\n但还有一个要求。SQLite 只会在所有条件都使用等号 (`=`)\
    \ 或 `IN` 运算符处理 *除最右边的索引列外* 的所有索引列时，才会使用多列索引。对于最右边的列，你最多可以指定两个不等式来定义其上下界限。考虑这个例子：\n\
    \n```sql\nselect * from foo where a>1 and b=2 and c=3 and d=4\n```\n\nSQLite 将只对列\
    \ `a` 进行索引扫描。`a>1` 表达式因其使用了不等式而成为最右边的索引列。因此，其后的所有列都无法被使用。类似地，对于以下查询：\n\n```sql\n\
    select * from foo where a=1 and b>2 and c=3 and d=4\n```\n\n将使用索引列 `a` 和 `b`，然后停止，因为\
    \ `b>2` 因使用了不等式运算符而成为最右边的索引项。\n\n最后，当你创建索引时，应有创建它的理由。在承担索引带来的额外开销之前，请确保能获得特定的性能提升。精心挑选的索引是极好的。而那些为虚妄的性能期望而随意四处添加的索引，其价值值得怀疑。\n\
    \n## 触发器\n\n触发器在特定表上发生特定数据库事件时执行特定的 SQL 命令。创建触发器的通用语法如下：\n\n```sql\ncreate [temp|temporary]\
    \ trigger name\n[before|after] [insert|delete|update|update of columns] on table\n\
    action\n```\n\n触发器由名称、动作和表定义。动作，或称触发器主体，由一系列 SQL 命令组成。当此类事件发生时，触发器被称为 `触发`。此外，可以使用\
    \ `before` 或 `after` 关键字分别使触发器在事件之前或之后触发。事件包括在指定表上发出的 `delete`、`insert` 和 `update`\
    \ 命令。触发器可用于创建你自己的完整性约束、记录更改、更新其他表以及许多其他事情。它们的限制仅在于你能用 SQL 编写什么。\n\nCHAPTER 4 ■\
    \ ADVANCED SQL FOR SQLITE\n\n### 更新触发器\n\n与 `insert` 和 `delete` 触发器不同，`update`\
    \ 触发器可以为表中的特定列定义。这类触发器的通用形式如下：\n\n```sql\ncreate trigger name\n[before|after]\
    \ update of column on table\naction\n```\n\n以下是一个展示 `UPDATE` 触发器实际操作的 SQL 脚本：\n\
    \n```sql\ncreate temp table log(x);\n\ncreate temp trigger foods_update_log update\
    \ of name on foods\nbegin\n    insert into log values('updated foods: new name='\
    \ || new.name);\nend;\n\nbegin;\nupdate foods set name='JUJYFRUIT' where name='JujyFruit';\n\
    select * from log;\nrollback;\n```\n"
- fmt: "# CHAPTER 4 ■ ADVANCED SQL FOR SQLITE\n\nThis script creates a temporary table\
    \ called `log`, as well as a temporary `update` trigger on `foods.name` that inserts\
    \ a message into `log` when it fires. The action takes place inside the transaction\
    \ that follows. The first step of the transaction updates the `name` column of\
    \ the row whose `name` is `'JUJYFRUIT'`. This causes the `update` trigger to fire.\
    \ When it fires, it inserts a record into the log. Next, the transaction reads\
    \ the log, which shows that the trigger did indeed fire. The transaction then\
    \ rolls back the change, and when the session ends, the `log` table and the `update`\
    \ trigger are destroyed. Running the script produces the following output:\n\n\
    ```\n# sqlite3 foods.db < trigger.sql\ncreate temp table log(x);\ncreate temp\
    \ trigger foods_update_log after update of name on foods\nbegin\n  insert into\
    \ log values('updated foods: new name=' || new.name);\nend;\nbegin;\nupdate foods\
    \ set name='JUJYFRUIT' where name='JujyFruit';\nSELECT * FROM LOG;\nx\n--------------------------------------------------\n\
    updated foods: new name=JUJYFRUIT\nrollback;\n```\n\nSQLite provides access to\
    \ both the old (original) row and the new (updated) row in `update` triggers.\n\
    \nThe old row is referred to as `old` and the new row as `new`. Notice in the\
    \ script how the trigger refers to `new.name`. All attributes of both rows are\
    \ available in `old` and `new` using the dot notation. You could have just as\
    \ easily recorded `new.type_id` or `old.id`.\n\n## Error Handling\n\nDefining\
    \ a trigger before an event takes place gives you the opportunity to stop the\
    \ event from happening and, equally, examining the event afterward allows you\
    \ to have second thoughts. `before` and `after` triggers enable you to implement\
    \ new integrity constraints. SQLite provides a special SQL function for triggers\
    \ called `raise()`, which allows them to raise an error within the trigger body.\
    \ `raise` is defined as follows:\n\n`raise(resolution, error_message);`\n\nThe\
    \ first argument is a conflict resolution policy (`abort`, `fail`, `ignore`, `rollback`,\
    \ and so on). The second argument is an error message. If you use `ignore`, the\
    \ remainder of the current trigger along with the SQL statement that caused the\
    \ trigger to fire, as well as any subsequent triggers that would have been fired,\
    \ are all terminated. If the SQL statement that caused the trigger to fire is\
    \ itself part of another trigger, then that trigger resumes execution at the beginning\
    \ of the next SQL command in the trigger action.\n\n## Updatable Views\n\nTriggers\
    \ make it possible to create something like updatable views, as mentioned earlier\
    \ in this chapter. The idea here is that you create a view and then create a trigger\
    \ that handles update events on that view. SQLite supports triggers on views using\
    \ the `instead of` keywords in the trigger definition. To illustrate this, let’s\
    \ create a view that combines `foods` with `food_types`:\n\n```\ncreate view foods_view\
    \ as\nselect f.id fid, f.name fname, t.id tid, t.name tname\nfrom foods f, food_types\
    \ t;\n```\n\nThis view joins the two tables according to their foreign key relationship.\
    \ Notice that you have created aliases for all column names in the view. This\
    \ allows you to differentiate the respective `id` and `name` columns in each table\
    \ when you reference them from inside the trigger. Now, let’s make the view updatable\
    \ by creating an `UPDATE` trigger on it:\n\n```\ncreate trigger on_update_foods_view\n\
    instead of update on foods_view\nfor each row\nbegin\n  update foods set name=new.fname\
    \ where id=new.fid;\n  update food_types set name=new.tname where id=new.tid;\n\
    end;\n```\n\nNow if you try to update the `foods_view`, this trigger gets called.\
    \ The trigger simply takes the values provided in the `UPDATE` statement and uses\
    \ them to update the underlying base tables `foods` and `food_types`. Testing\
    \ it yields the following:\n\n```\n.echo on\n-- Update the view within a transaction\n\
    begin;\nupdate foods_view set fname='Whataburger', tname='Fast Food' where fid=413;\n\
    -- Now view the underlying rows in the base tables:\nselect * from foods f, food_types\
    \ t where f.type_id=t.id and f.id=413;\n-- Roll it back\nrollback;\n-- Now look\
    \ at the original record:\nselect * from foods f, food_types t where f.type_id=t.id\
    \ and f.id=413;\n```\n\n```\nbegin;\nupdate foods_view set fname='Whataburger',\
    \ tname='Fast Food' where fid=413;\nselect * from foods f, food_types t where\
    \ f.type_id=t.id and f.id=413;\nid type_id name id name\n--- ------- --------------\
    \ --- ---------\n413 1 Whataburger 1 Fast Food\nrollback;\nselect * from foods\
    \ f, food_types t where f.type_id=t.id and f.id=413;\nid type_id name id name\n\
    --- ------- -------------- --- -------\n413 1 Cinnamon Bobka 1 Bakery\n```\n\n\
    You can just as easily add `insert` and `delete` triggers to complete the trigger\
    \ based manipulation of data via views.\n\n## Transactions\n\nTransactions define\
    \ boundaries around a group of SQL commands such that they either all successfully\
    \ execute together or not at all. This is typically referred to as the *atomic*\
    \ principle of database integrity. A classic example of the rationale behind transactions\
    \ is a money transfer. Say a bank program is transferring money from one account\
    \ to another. The money transfer program can do this in one of two ways: first\
    \ insert (credit) the funds into account 2 and then delete (debit) it from account\
    \ 1, or first delete it from account 1 and insert it into account 2. Either way,\
    \ the transfer is a two-step process: an `insert` followed by a `delete`, or a\
    \ `delete` followed by an `insert`.\n\nBut what happens if, during the transfer,\
    \ the database server suddenly crashes or the power goes out, and the second operation\
    \ does not complete? Now the money either exists in both accounts (the first scenario)\
    \ or has been completely lost altogether (second scenario). Either way, someone\
    \ is not going to be happy. And the database is in an inconsistent state. The\
    \ point here is that these two operations must either happen together or not at\
    \ all. That is the essence of transactions.\n\n### Transaction Scopes\n\nTransactions\
    \ are issued with three commands: `begin`, `commit`, and `rollback`. `begin` starts\
    \ a transaction. Every operation following a `begin` can be potentially undone\
    \ and will be undone if a `commit` is not issued before the session terminates.\
    \ The `commit` command commits the work performed by all operations since the\
    \ start of the transaction. Similarly, the `rollback` command undoes all the work\
    \ performed by all operations since the start of the transaction. A transaction\
    \ is a scope in which operations are performed and committed, or rolled back,\
    \ together. Here is an example:\n\n```\nsqlite> begin;\nsqlite> delete from foods;\n\
    sqlite> rollback;\nsqlite> select count(*) from foods;\ncount(*)\n--------\n412\n\
    ```\n\nWe started a transaction, deleted all the rows in `foods`, changed our\
    \ mind, and reversed those changes by issuing a `rollback`. The `select` statement\
    \ shows that nothing was changed.\n\nBy default, every SQL command in SQLite is\
    \ run under its own transaction. That is, if you do not define a transaction scope\
    \ with `begin`…`commit`/`rollback`, SQLite will implicitly wrap every individual\
    \ SQL command with a `begin`…`commit`/`rollback`. In that case, every command\
    \ that completes successfully is committed. Likewise, every command that encounters\
    \ an error is rolled back. This mode of operation (implicit transactions) is referred\
    \ to as *autocommit mode*: SQLite automatically runs each command in its own transaction,\
    \ and if the command does not fail, its changes are automatically committed."
