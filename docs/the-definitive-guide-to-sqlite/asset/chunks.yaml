  trans: '# SQLite 高级特性


    ## 外键约束的级联行为


    `cascade`：当父键被更新时，更新所有子键以匹配。


    当父键被删除时，删除所有具有该键的子行。请特别注意此选项，因为级联删除可能会在您最意想不到的时候发生。


    `restrict`：如果对父键的更新或删除会导致子键成为孤儿，则阻止（中止）该事务。


    `no action`：采取一种放任的方式，任由更改发生而不干预。只有在整个语句结束时（或者如果约束被延迟，则在事务结束时）才会引发错误。


    最后，SQLite 支持 `deferrable` 子句，用于控制定义的约束是立即执行还是延迟到事务结束时执行。


    ## 排序规则


    排序规则指的是如何比较文本值。不同的排序规则采用不同的比较方法。例如，一种排序规则可能不区分大小写，因此字符串 `''JujyFruit''` 和 `''JUJYFRUIT''`
    被视为相同。另一种排序规则可能区分大小写，在这种情况下，这些字符串将被视为不同。


    SQLite 有三种内置排序规则。默认是 `binary`，它使用一个名为 `memcmp()` 的特定 C 函数逐字节比较文本值。这恰好适用于许多西方语言，如英语。`nocase`
    基本上是一种针对拉丁字母表中使用的 26 个 ASCII 字符的不区分大小写的排序规则。最后是 `reverse`，它是 `binary` 排序规则的反向。`reverse`
    更多用于测试（或说明）而非其他目的。


    SQLite C API 提供了一种创建自定义排序规则的方法。此功能允许开发人员支持那些 `binary` 排序规则无法很好服务的语言和/或地区。更多信息请参见第
    7 章。


    `collate` 关键字为列定义排序规则。例如，`contacts.name` 的排序规则被定义为 `nocase`，这意味着它不区分大小写。因此，如果您尝试插入另一行
    `name` 值为 `''JERRY''`、`phone` 值为 `''555-1212''` 的记录，它应该会失败：


    ```

    sqlite> insert into contacts (name,phone) values (''JERRY'',''555-1212'');

    SQL error: columns name, phone are not unique

    ```


    根据 `name` 的排序规则，`''JERRY''` 与 `''Jerry''` 是相同的，并且已经存在具有该值的行。


    因此，一个 `name=''JERRY''` 的新行将是一个重复值。默认情况下，SQLite 中的排序规则是区分大小写的。如果我们没有在 `name` 上定义
    `nocase`，前面的例子本应成功。


    ## 存储类


    如前所述，在处理数据类型方面，SQLite 与其他数据库不同。它在支持的类型以及它们的存储、比较、执行和分配方式上都有所不同。接下来我将介绍 SQLite
    存储类的基础知识，以便您有一个良好的实用知识。在第 11 章中，我将深入探讨 SQLite 这种截然不同但又异常灵活的数据类型方法的许多内部原理。


    在内部，SQLite 有五种基本数据类型，被称为 *存储类*。术语 *存储类* 指的是值在磁盘上的存储格式。无论如何，它仍然与类型或数据类型同义。表 4-1
    描述了这五种存储类。


    *表 4-1. SQLite 存储类*


    | 名称 | 描述 |

    | :--- | :--- |

    | **integer** | 整数值是整数（正数和负数）。它们的大小可以不同：1、2、3、4、6 或 8 字节。最大整数范围（8 字节）是 {-9223372036854775808,
    -1, 0, 1, 9223372036854775807}。SQLite 会根据数值自动处理整数大小。 |

    | **real** | 实数值是带有小数值的实数。SQLite 使用 8 字节浮点数来存储实数。 |

    | **text** | 文本是字符数据。SQLite 支持各种字符编码，包括 UTF-8 和 UTF-16（大端和小端）。SQLite 中的最大字符串值可在编译时配置。
    |'
- fmt: '# SQLite数据类型与存储


    compile time and at runtime and defaults to 1,000,000,000 bytes.


    ## BLOB


    Binary large object (`BLOB`) data is any kind of data. The maximum size for `BLOB`s
    in SQLite is adjustable at compile time and at runtime and defaults to 1,000,000,000
    bytes.


    ## NULL


    `NULL` represents missing information. SQLite has full support for `NULL` handling.


    ## 类型推断规则


    SQLite infers a value’s type from its representation. The following inference
    rules are used to do this:


    • A value specified as a literal in SQL statements is assigned class `text` if
    it is enclosed by single or double quotes.


    • A value is assigned class `integer` if the literal is specified as an unquoted
    number with no decimal point or exponent.


    • A value is assigned class `real` if the literal is an unquoted number with a
    decimal point or an exponent.


    • A value is assigned class `NULL` if its value is `NULL`.


    • A value is assigned class `blob` if it is of the format `x''ABCD''` , where
    `ABCD` are hexadecimal numbers. The `x` prefix and values can be either uppercase
    or lowercase.


    ## `typeof()`函数示例


    The `typeof()` SQL function returns the storage class of a value based on its
    representation. Using this function, the following SQL illustrates type inference
    in action:


    CHAPTER 4 ■ ADVANCED SQL FOR SQLITE


    ```sql

    sqlite> select typeof(3.14), typeof(''3.14''), typeof(314), typeof(x''3142''),
    typeof(NULL);

    typeof(3.14) typeof(''3.14'') typeof(314) typeof(x''3142'') typeof(NULL)

    ------------ -------------- ----------- --------------- ------------

    real         text           integer     blob            null

    ```


    Here are all of the five internal storage classes invoked by specific representations
    of data. The value `3.14` looks like a `real` and therefore is a `real`. The value
    `''3.14''` looks like `text` and therefore is `text`, and so on.


    ## 不同存储类别的列


    A single column in SQLite may contain different values of different storage classes.
    This is the first difference in SQLite data handling that usually makes those
    familiar with other databases sit up and say, “What?” Consider the following example:


    ```sql

    sqlite> drop table domain;

    sqlite> create table domain(x);

    sqlite> insert into domain values (3.142);

    sqlite> insert into domain values (''3.142'');

    sqlite> insert into domain values (3142);

    sqlite> insert into domain values (x''3142'');

    sqlite> insert into domain values (null);

    sqlite> select rowid, x, typeof(x) from domain;

    rowid x      typeof(x)

    ------ ------ ----------

    1      3.142  real

    2      3.142  text

    3      3142   integer

    4      1B     blob

    5      NULL   null

    ```


    This raises a few questions. How are the values in a column sorted or compared?
    How do you sort a column with `integer`, `real`, `text`, `blob`, and `NULL` values?
    How do you compare an `integer` with a `blob`? Which is greater? Can they ever
    be equal?


    ## 比较与排序规则


    As it turns out, values in a column with different storages classes can be sorted.
    And they can be sorted because they can be compared. SQLite implements well-defined
    rules to do so. Storage classes are sorted by using their respective class values,
    which are defined as follows:


    1.  The `NULL` storage class has the lowest class value. A value with a `NULL`
    storage class is considered less than any other value (including another value
    with storage class `NULL`). Within `NULL` values, there is no specific sort order.

    2.  `integer` or `real` storage classes have higher value than `NULL`s and share
    equal class value. `integer` and `real` values are compared numerically.

    3.  The `text` storage class has higher value than `integer` or `real`. A value
    with an `integer` or a `real` storage class will always be less than a value with
    a `text` storage class no matter its value. When two `text` values are compared,
    the comparison is determined by the collation defined for the values.

    4.  The `blob` storage class has the highest value. Any value that is not of class
    `blob` will always be less than a value of class `blob`. `blob` values are compared
    using the C function `memcmp()`.'
