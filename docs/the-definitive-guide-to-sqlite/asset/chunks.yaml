    ## 溢出页


    如前所述，有效载荷及其内容可以有可变大小。然而，页面大小是固定的。因此，总是存在某个有效载荷可能太大而无法放入单个页面的可能性。当这种情况发生时，多余的有效载荷会溢出到一个链接的溢出页列表上。从这时起，有效载荷采取一种类似链接列表的形式，如**图
