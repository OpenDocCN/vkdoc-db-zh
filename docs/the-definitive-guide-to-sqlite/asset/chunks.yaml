    \ | `BLOB` | 无变化。 |\n| `BLOB` | `INTEGER` | 转换为`TEXT`，然后使用`atoi()`。 |\n| `BLOB`\
    \ | `FLOAT` | 转换为`TEXT`，然后使用`atof()`。 |\n| `BLOB` | `TEXT` | 如果需要，添加`\\000`终止符。\
    \ |\n\n与后面描述的`sqlite3_bind_*xxx*()`函数类似，`BLOB`需要多做一点工作，因为必须指定其长度才能复制它们。对于`BLOB`列，你可以使用`sqlite3_column_bytes()`获取数据的实际长度，其声明如下：\n\
    \n```c\nint sqlite3_column_bytes(\n    sqlite3_stmt*, /* statement handle */\n\
    \    int iCol\n);\n```\n"
- fmt: "# CHAPTER 6 ■ THE CORE C API\n\nOnce you get the length, you can copy the\
    \ binary data using `sqlite3_column_blob()`. For example, say the first column\
    \ in the result set contains binary data. One way to get a copy of that data would\
    \ be as follows:\n\n```c\nint len = sqlite3_column_bytes(stmt,0);\nvoid* data\
    \ = malloc(len);\nmemcpy(data, len, sqlite3_column_blob(stmt,0));\n```\n\n## A\
    \ Practical Example\n\nTo help solidify all these column functions, Listing 6-6\
    \ (taken from `columns.c`) illustrates using the functions we’ve described to\
    \ retrieve column information and values for a simple `select` statement.\n\n\
    *Listing 6-6. Obtaining Column Information*\n\n```c\nint main(int argc, char **argv)\n\
    {\n    int rc, i, ncols, id, cid;\n    char *name, *sql;\n    sqlite3 *db;\n \
    \   sqlite3_stmt *stmt;\n\n    sql = \"select id, name from episodes\";\n    sqlite3_open_v2(\"\
    test.db\", &db);\n    sqlite3_prepare_v2(db, sql, strlen(sql), &stmt, NULL);\n\
    \    ncols = sqlite3_column_count(stmt);\n    rc = sqlite3_step(stmt);\n\n   \
    \ /* Print column information */\n    for(i=0; i < ncols; i++) {\n        fprintf(stdout,\
    \ \"Column: name=%s, storage class=%i, declared=%s\\n\",\n                sqlite3_column_name(stmt,\
    \ i),\n                sqlite3_column_type(stmt, i),\n                sqlite3_column_decltype(stmt,\
    \ i));\n    }\n\n    fprintf(stdout, \"\\n\");\n\n    while(rc == SQLITE_ROW)\
    \ {\n        id = sqlite3_column_int(stmt, 0);\n        cid = sqlite3_column_int(stmt,\
    \ 1);\n        name = sqlite3_column_text(stmt, 2);\n\n        if(name != NULL){\n\
    \            fprintf(stderr, \"Row: id=%i, cid=%i, name='%s'\\n\", id,cid,name);\n\
    \        } else {\n            /* Field is NULL */\n            fprintf(stderr,\
    \ \"Row: id=%i, cid=%i, name=NULL\\n\", id,cid);\n        }\n\n        rc = sqlite3_step(stmt);\n\
    \    }\n\n    sqlite3_finalize(stmt);\n    sqlite3_close(db);\n    return 0;\n\
    }\n```\n\nThis example connects to the database, selects records from the `episodes`\
    \ table, and prints the column information and the fields for each row (using\
    \ their internal storage class). Running the program produces the following output:\n\
    \n```\nColumn: name=id, storage class=1, declared=integer\nColumn: name=name,\
    \ storage class=3, declared=text\nRow: id=1, name='The Dinner Party'\nRow: id=2,\
    \ name='The Soup Nazi'\nRow: id=3, name='The Fusilli Jerry'\n```\n\n## FINDING\
    \ A STATEMENT'S CONNECTION\n\nIn practice, you may find yourself writing code\
    \ where some of your functions have access only to the statement handle, not the\
    \ connection handle. If these functions encounter an error while working with\
    \ the statement handle, they will not have a way to get error information from\
    \ `sqlite3_errmsg()`, because it requires a connection handle to work. This is\
    \ where `sqlite3_db_handle()` comes in handy. It is declared as follows:\n\n```c\n\
    int sqlite3_db_handle(sqlite3_stmt*);\n```\n\nGiven a statement handle, `sqlite3_db_handle()`\
    \ returns the associated connection handle. This way, you don’t need to worry\
    \ about having to pass the connection handle along with the statement handle everywhere\
    \ you process query results.\n\n## Parameterized Queries\n\nThe API includes support\
    \ for designating parameters in a SQL statement, allowing you to provide (or “bind”)\
    \ values for them at a later time. Bound parameters are used in conjunction with\
    \ `sqlite3_prepare()`. For example, you could create a SQL statement like the\
    \ following:\n\n```sql\ninsert into foo values (?,?,?);\n```\n\nThen you can,\
    \ for example, bind the integer value 2 to the first parameter (designated by\
    \ the first `?` character), the string value `'pi'` to the second parameter, and\
    \ the double value 3.14 for the third parameter, as illustrated in the following\
    \ code (taken from `parameters.c`):\n\n```c\nconst char* sql = \"insert into foo\
    \ values(?,?,?)\";\nsqlite3_prepare(db, sql, strlen(sql), &stmt, &tail);\n\nsqlite3_bind_int(stmt,\
    \ 1, 2);\nsqlite3_bind_text(stmt, 2, \"pi\");\nsqlite3_bind_double(stmt, 3, 3.14);\n\
    sqlite3_step(stmt);\nsqlite3_finalize(stmt);\n```\n\nThis generates and executes\
    \ the following statement:\n\n```sql\ninsert into foo values (2, 'pi', 3.14)\n\
    ```"
