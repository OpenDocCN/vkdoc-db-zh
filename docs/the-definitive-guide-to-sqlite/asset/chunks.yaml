  trans: '# 第 11 章 ■ SQLITE 内部机制与新特性


    ## 类型亲和性


    首先，让我们思考大多数其他关系型数据库的做法。它们将*严格的类型检查*作为标准域完整性的标准组成部分。首先，你会声明一个列的类型。然后，只有该类型的值才能被存入。事情到此结束。如果你想的话，可以使用额外的域约束，但在任何情况下，你都绝不能插入其他类型的值。考虑下面这个
    Oracle 的例子：


    ```sql

    SQL> create table domain(x int, y varchar(2));


    Table created.


    SQL> insert into domain values (''pi'', 3.14);


    insert into domain values (''pi'', 3.14)


    *****


    ERROR at line 1:


    ORA-01722: invalid number

    ```


    值`''pi''`不是一个整数值。而列`x`被声明为`int`类型。我们甚至没机会听到列`y`的错误，因为整个`insert`操作由于`x`上的完整性违规而被中止。当我在
    SQLite 中尝试同样操作时，我们说一套做一套，而 SQLite 并没有阻止我：


    ```sql

    sqlite> create table domain (x int, y varchar(2));


    sqlite> INSERT INTO DOMAIN VALUES (''pi'', 3.14);


    sqlite> select * from domain;


    x y


    ---- -----


    pi 3.14

    ```


    *SQLite 的域完整性不包含严格的类型检查*。那么，这是怎么回事呢？列的声明类型还有用吗？有的。那它是如何被使用的呢？这一切都是通过一种叫做*类型亲和性*的机制完成的。


    简而言之，SQLite 的显式类型系统指出，列可以拥有类型，并且类型可以从值中推断出来。类型亲和性则阐述了这两者如何相互关联。类型亲和性是介于严格类型和动态类型之间的一种微妙的平衡。


    ## 列类型与亲和性


    在 SQLite 中，列没有类型或域。虽然一个列可以有一个声明的类型，但在内部它只有一个类型亲和性。声明的类型和类型亲和性是两回事。类型亲和性决定了 SQLite
    使用何种存储类来存储列中的值。一个列用于存储给定值的实际存储类，既是该值存储类的函数，也是该列亲和性的函数。不过，在深入探讨如何实现这一点之前，我们首先来谈谈列是如何获得其亲和性的。


    首先，每个列都有一个亲和性。共有四种不同的亲和性：`numeric`（数值）、`integer`（整数）、`text`（文本）和`none`（无）。列的亲和性直接由其声明的类型（或缺乏声明）决定。因此，当你在表中声明一个列时，你选择声明的类型将最终决定该列的亲和性。SQLite
    根据以下规则为列分配亲和性：


    *   默认情况下，一个列的默认亲和性是`numeric`。也就是说，如果一个列的类型不是`integer`、`text`或`none`，那么它会自动被赋予`numeric`亲和性。

    *   如果一个列的声明类型包含字符串`''int''`（大写或小写），则该列被赋予`integer`亲和性。

    *   如果一个列的声明类型包含`''char''`、`''clob''`或`''text''`中的任何一个字符串（大写或小写），那么该列被赋予`text`亲和性。请注意，`''varchar''`包含字符串`''char''`，因此将赋予`text`亲和性。

    *   如果一个列的声明类型包含字符串`''blob''`（大写或小写），*或者它没有声明类型*，那么它被赋予`none`亲和性。


    **注意** 请注意默认值。例如，`floatingpoint`具有`integer`亲和性。如果你不声明列的类型，那么它的亲和性将是`none`，在这种情况下，所有值都将使用它们给定的存储类（或从其表示中推断出来）存储。如果你不确定要在列中存放什么，或者想留待以后更改，这是最好的亲和性选择。但是，请小心一种情况：你声明了一个类型，但该类型与`none`、`text`或`integer`的任何规则都不匹配。尽管你可能直观地认为默认应该是`none`，但它实际上是`numeric`。例如，如果你声明一个类型为`JUJYFRUIT`的列，它不会仅仅因为
    SQLite 不认识它就具有`none`亲和性。相反，它将具有`numeric`亲和性。（有趣的是，当你声明列的类型为`numeric`时，由于同样的原因，也会发生这种情况。）与其使用一个最终被归为`numeric`的未知类型，你可能更愿意完全省略列的声明类型，这将确保它具有`none`亲和性。


    ## 亲和性与存储


    每种亲和性都会影响其关联列中值的存储方式。管理存储的规则如下：


    *   一个`numeric`列可以包含所有五种存储类。`numeric`列偏向于数值存储类（`integer`和`real`）。当一个`text`值被插入`numeric`列时，会尝试将其转换为`integer`存储类。如果失败，则尝试将其转换为`real`存储类。如果再次失败，则使用`text`存储类存储该值。

    *   一个`integer`列会尽可能模仿`numeric`列。`integer`列会将`real`值存储为`real`。*但是*，如果一个`real`值*没有小数部分*，那么它将使用`integer`存储类存储。`integer`列会尝试将`text`值存储为`real`（如果可能的话）。如果失败，它们会尝试将其存储为`integer`。如果再次失败，`text`值将作为`TEXT`存储。

    *   一个`text`列会将所有`integer`或`real`值转换为`text`。

    *   一个`none`列不会尝试转换任何值。所有值都使用它们给定的存储类存储。

    *   没有任何列会尝试转换`null`或`blob`值——无论亲和性如何。`null`和`blob`值在任何列中都始终按原样存储。


    这些规则最初看起来可能有些复杂，但其总体设计目标很简单：在需要时，使 SQLite 能够模仿其他关系型数据库。也就是说，如果你像使用传统数据库一样使用列，类型亲和性规则会以你期望的方式存储值。如果你声明一个类型为`integer`的列并向其中存入整数，它们将被存储为`integer`。如果你声明一个类型为`text`、`char`或`varchar`的列并向其中存入整数，它们将被存储为`text`。然而，如果你不遵循这些惯例，SQLite
    仍然会找到一种方法来存储该值。


    ## 亲和性实战


    让我们看几个例子来熟悉亲和性的工作原理。考虑以下情况：


    ```sql

    sqlite> create table domain(i int, n numeric, t text, b blob);


    sqlite> insert into domain values (3.142,3.142,3.142,3.142);


    sqlite> insert into domain values (''3.142'',''3.142'',''3.142'',''3.142'');


    sqlite> insert into domain values (3142,3142,3142,3142);


    sqlite> insert into domain values (x''3142'',x''3142'',x''3142'',x''3142'');


    sqlite> insert into domain values (null,null,null,null);


    sqlite> select rowid,typeof(i),typeof(n),typeof(t),typeof(b) from domain;


    rowid typeof(i) typeof(n) typeof(t) typeof(b)


    ---------- ---------- ---------- ---------- ----------


    1 real real text real


    2 real real text text


    3 integer integer text integer


    4 blob blob blob blob


    5 null null null null

    ```'
- fmt: '# 第11章 SQLite内部原理与新特性


    第一次 `insert` 插入了一个 `real` 值。你可以从 `insert` 语句的格式以及 `select` 语句返回的 `typeof(b)` 列显示的最终类型中看出这一点。请记住，`blob`
    列的存储类别是 `none`，它不会尝试转换输入值的存储类别，因此列 `b` 使用的是在 `insert` 语句中定义的相同存储类别。列 `i` 保持了 `numeric`
    存储类别，因为它会在可能的情况下尝试成为 `numeric` 类型。列 `n` 不需要转换任何东西。列 `t` 将其转换为 `text`。列 `b` 则完全按照上下文给定的方式存储它。在随后的每一次
    `insert` 中，你都可以看到转换规则在每种不同情况下是如何应用的。


    以下 SQL 语句说明了存储类的排序顺序和类间比较（它们受同一套规则管辖）：


    ```sql

    sqlite> select rowid, b, typeof(b) from domain order by b;


    rowid b typeof(b)

    ----- ------ ---------

    5 NULL null

    1 3.142 real

    3 3142 integer

    2 3.142 text

    4 1B blob

    ```


    这里，你可以看到 `null` 值首先排序，其次是 `integer` 和 `real` 值，接着是 `text` 值，然后是 `blob` 值。以下 SQL
    语句显示了这些值如何与整数 1000 进行比较。`b` 中的 `integer` 和 `real` 值小于 1000，因为它们是按数值比较的，而 `text`
    和 `blob` 值则大于 1000，因为它们属于更高的存储类别。


    ```sql

    sqlite> select rowid, b, typeof(b), b<1000 from domain order by b;


    rowid b typeof(b) b<1000

    ----- ----- -------- ----------

    5 NULL null NULL

    1 3.142 real 1

    3 3142 integer 1

    2 3.142 text 0

    4 1B blob 0

    ```


    类型亲和性与严格类型之间的主要区别在于，类型亲和性永远不会因为不兼容的数据类型而引发约束违规。SQLite 总是会找到一种数据类型将任何值放入任何列中。唯一的问题是它将使用什么类型来完成此操作。在
    SQLite 中，列的声明类型的唯一作用就是确定其亲和性。最终，是列的亲和性决定了值如何在其中存储。不过，SQLite 提供了确保列只接受给定类型或类型范围的工具。你可以使用
    `check` 约束来实现这一点，这将在本节后面的侧栏“权宜的严格类型”中解释。


    ## 存储类别与类型转换


    关于存储类的另一个需要注意的点是，它们有时也会影响值的比较方式。具体来说，SQLite 有时会在比较之前在数值存储类别（`integer` 和 `real`）与
    `text` 之间转换值。对于二进制比较，它使用以下规则：（第 315 页）


    *   当列值与表达式的结果进行比较时，比较发生前，表达式的结果会先应用该列的亲和性。

    *   当两个列值进行比较时，如果一个列具有 `integer` 或 `numeric` 亲和性，而另一个没有，则 `numeric` 亲和性会应用于非 `numeric`
    列中的 `text` 值。

    *   当两个表达式进行比较时，SQLite 不会进行任何转换。结果按原样进行比较。如果表达式属于相同的存储类别，则使用与该存储类别关联的比较函数来比较值。否则，它们基于各自的存储类别进行比较。


    请注意，这里的术语 `expression` 指的是除列值之外的任何标量表达式或字面量。为了说明第一条规则，请考虑以下情况：


    ```sql

    sqlite> select rowid,b,typeof(i),i>''2.9'' from domain order by b;


    rowid b typeof(i i>''2.9''

    ----- ----- -------- ------------

    5 NULL null NULL

    1 3.142 real 1

    3 3142 integer 1

    2 3.142 real 1

    4 1B blob 1

    ```'
  raw: 'CHAPTER 11 ■ SQLITE INTERNALS AND NEW FEATURES


    The first **insert** inserts a **real** value. You can see this both by the format
    in the **insert** statement and by the resulting type shown in the **typeof(b)**
    column returned in the **select** statement. Remember that **blob** columns have
    storage class **none**, which does not attempt to convert the storage class of
    the input value, so column **b** uses the same storage class that was defined
    in the **insert** statement. Column **i** keeps the **numeric** storage class,
    because it tries to be **numeric** when it can. Column **n** doesn’t have to convert
    anything. Column **t** converts it to **text**. Column **b** stores it exactly
    as given in the context. In each subsequent **insert**, you can see how the conversion
    rules are applied in each varying case.


    The following SQL illustrates storage class sort order and interclass comparison
    (which are governed by the same set of rules):


    **sqlite> select rowid, b, typeof(b) from domain order by b;**


    **rowid b typeof(b)**


    **----- ------ ---------**


    **5 NULL null**


    **1 3.142 real**


    **3 3142 integer**


    **2 3.142 text**


    **4 1B blob**


    **Here, you see that **null**s sort first, followed by **integer**s and **real**s,
    followed by **text**s and then **blob**s. The following SQL shows how these values
    compare with the integer 1,000\. The **integer** and **real** values in **b**
    are less than 1,000 because they are numerically compared, while **text** and
    **blob** are greater than 1,000**


    **because they are in a higher storage class.


    **sqlite> select rowid, b, typeof(b), b<1000 from domain order by b;**


    **rowid b typeof(b) b<1000**


    **----- ----- -------- ----------**


    **5 NULL null NULL**


    **1 3.142 real 1**


    **3 3142 integer 1**


    **2 3.142 text 0**


    **4 1B blob 0**


    **The primary difference between type affinity and strict typing is that type
    affinity will never issue a constraint violation for incompatible data types.
    SQLite will always find a data type to put any value into any column. The only
    question is what type it will use to do so. The only role of a column’s declared
    type in SQLite is simply to determine its affinity. Ultimately, it is the column’s
    affinity that has any bearing on how values are stored inside of it. However,
    SQLite does provide facilities for ensuring that a column may only accept a given
    type or range of types. You do this using **check** constraints, explained in
    the sidebar “Makeshift Strict Typing” later in this section.


    Storage Classes and Type Conversions


    Another thing to note about storage classes is that they can sometimes influence
    how values are


    compared as well. Specifically, SQLite will sometimes convert values between numeric
    storage classes (**integer** and **real**) and **text** before comparing them.
    For binary comparisons, it uses the following rules: 315


    CHAPTER 11 ■ SQLITE INTERNALS AND NEW FEATURES


    • When a column value is compared to the result of an expression, the affinity
    of the


    column is applied to the result of the expression before the comparison takes


    place.


    • When two column values are compared, if one column has **integer** or **numeric**


    affinity and the other doesn’t, then **numeric** affinity is applied to **text**
    values in the non-**numeric** column.


    • When two expressions are compared, SQLite does not make any conversions. The


    results are compared as is. If the expressions are of like storage classes, then
    the


    comparison function associated with that storage class is used to compare values.


    Otherwise, they are compared on the basis of their storage class.


    Note that the term *expression* here refers to any scalar expression or literal
    *other than a column value*. To illustrate the first rule, consider the following:


    **sqlite> select rowid,b,typeof(i),i>''2.9'' from domain order by b;**


    **rowid b typeof(i i>''2.9''**


    **----- ----- -------- ------------**


    **5 NULL null NULL**


    **1 3.142 real 1**


    **3 3142 integer 1**


    **2 3.142 real 1**


    **4 1B blob 1**'
