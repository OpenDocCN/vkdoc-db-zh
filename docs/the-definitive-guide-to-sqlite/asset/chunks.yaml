    is a simplified example—there are a few other things we need to check for when
    calling **sqlite3_step()**, such as errors and busy conditions, but we will address
    them later.


    Like **sqlite3_exec()**, **sqlite3_prepare_v2()** can accept a string containing
    multiple SQL statements.


    However, unlike **sqlite3_exec()**, it will process only the first statement in
    the string. But it does make it easy for you to process subsequent SQL statements
    in the string by providing the **pzTail** out parameter.


    After you call **sqlite3_prepare()**, it will point this parameter (if provided)
    to the starting position of the next statement in the **zSQL** string. Using **pzTail**,
    processing a batch of SQL commands in a given string can be executed in a loop
    as follows:


    **while(sqlite3_complete(sql) ){**


    **rc = sqlite3_prepare(db, sql, -1, &stmt, &tail);**


    ****/* Process query results */**


    **/* Skip to next command in string. */**


    **sql = tail;**


    **}**


    **This example uses another API function not yet covered—**sqlite3_complete()**,
    which does as its name suggests. It takes a string and returns true if there is
    at least one complete (but not necessarily valid) SQL statement in it, and it
    returns false otherwise. In reality, **sqlite_complete()** looks for a semicolon
    terminator for the string (and accounting for literals in the SQL). So, although
    its name suggests some kind of infallible observer checking your statements, it’s
    really just a handy tool for things such as showing you the continuation prompt
    in the **sqlite** command line when writing multiline statements and doing other
    similar useful tasks.


