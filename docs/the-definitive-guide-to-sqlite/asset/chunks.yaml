    \ 6-1（摘自 `create.c`）展示了如何使用 `sqlite3_exec()`。该示例打开一个名为 `test.db` 的数据库，并在其中创建一个名为\
    \ `episodes` 的表，随后插入一条记录。`create table` 命令如果在数据库文件不存在时，会实际创建该文件。\n\n### 代码清单 6-1.\
    \ 使用 `sqlite3_exec()` 执行简单命令\n\n```c\nint main(int argc, char **argv)\n{\n  sqlite3\
    \ *db;\n  char *zErr;\n  int rc;\n  char *sql;\n\n  rc = sqlite3_open_v2(\"test.db\"\
    , &db);\n  if(rc) {\n    fprintf(stderr, \"Can't open database: %s\\n\", sqlite3_errmsg(db));\n\
    \    sqlite3_close(db);\n    exit(1);\n  }\n\n  sql = \"create table episodes(id\
    \ int, name text)\";\n  rc = sqlite3_exec(db, sql, NULL, NULL, &zErr);\n  if(rc\
    \ != SQLITE_OK) {\n    if (zErr != NULL) {\n      fprintf(stderr, \"SQL error:\
    \ %s\\n\", zErr);\n      sqlite3_free(zErr);\n    }\n  }\n\n  sql = \"insert into\
    \ episodes values (10, 'The Dinner Party')\";\n  rc = sqlite3_exec(db, sql, NULL,\
    \ NULL, &zErr);\n\n  sqlite3_close(db);\n  return 0;\n}\n```\n\n如第 5 章所述，实际上可以从\
    \ `sqlite3_exec()` 获取记录，尽管在 C API 之外很少见到实现。`sqlite3_exec()` 包含一个回调机制，提供了一种从 `select`\
    \ 语句获取结果的方法。该机制由函数的第三个和第四个参数实现。第三个参数是一个指向回调函数的指针。如果提供了该指针，SQLite 将为在 `sql` 参数中执行的\
    \ `select` 语句处理的每条记录调用一次该函数。回调函数声明如下：\n\n```c\ntypedef int (*sqlite3_callback)(\n\
    \  void*, /* 在 sqlite3_exec() 的第四个参数中提供的数据 */\n  int,   /* 该行中的列数 */\n  char**,\
    \ /* 一个表示该行中字段的字符串数组 */\n  char**  /* 一个表示列名的字符串数组 */\n);\n```\n\n`sqlite3_exec()`\
    \ 的第四个参数是一个指向任何应用程序特定数据的 `void` 指针，你可以将其提供给回调函数。SQLite 会将此数据作为回调函数的第一个参数传递。\n\n\
    最后一个参数 (`errmsg`) 是一个指向字符串的指针，如果在处理过程中发生错误，可以将错误消息写入该字符串。因此，`sqlite3_exec()` 有两个错误信息来源：第一个是返回值，另一个是赋值给\
    \ `errmsg` 的人类可读字符串。如果你为 `errmsg` 传入 **`NULL`**，那么 SQLite 将不会提供任何错误消息。请注意，如果你为\
    \ `errmsg` 提供了一个指针，用于创建消息的内存是在堆上分配的。因此，你应该在调用后检查非 `NULL` 值，并在发生错误时使用 `sqlite3_free()`\
    \ 来释放保存 `errmsg` 字符串的内存。\n\n> **注意**：可以向 `sqlite3_free()` 传入 `NULL`，结果是无害的无操作（no-op）。因此，如果你愿意，可以直接调用\
    \ `sqlite3_free(errmsg)`，而无需检查 `errmsg` 是否不为 `NULL`。这主要取决于你希望在何处以及如何检查实际错误并作出相应响应。"
  raw: '**'':memory:''** , **sqlite3_open_v2()** will create an in-memory database
    in RAM that lasts only for the duration of the session. If **filename** is an
    empty string or a **NULL**, **sqlite3_open_v2()** opens a temporary disk file
    that is automatically deleted when the connection closes. Otherwise, **sqlite3_open_v2()**
    attempts to open the database file by using its value. If no file by that name
    exists, **sqlite3_open_v2()** will open a new database file by that name if the
    **SQLITE_OPEN_CREATE** flag is included in the third parameter, or it will return
    an error if the **SQLITE_OPEN_CREATE** flag is omitted.


    ■ **Note** Here we have included both the UTF-8 and UTF-16 declarations for **sqlite3_open()**,
    as well as the more modern **sqlite3_open_v2()**. From here on out, we will refer
    to the UTF-8 declarations only for the sake of brevity, and where they exist,
    we’ll deal with the latest function signatures that incorporate SQLite’s latest
    functionality, rather than cover all the legacy functions as well. Therefore,
    please keep in mind that there are many functions in the API that have UTF-16
    forms, as well as older UTF-8 forms for backward compatibility. The complete C
    API


    [reference is available on the SQLite web site at **www.sqlite.org/c3ref/intro.html**.](http://www.sqlite.org/c3ref/intro.html)


    The **flags** parameter is a bit vector that can include the following values:
    **SQLITE_OPEN_READONLY**, **SQLITE_OPEN_READWRITE**, and **SQLITE_OPEN_CREATE**.
    The names are reasonable self-explanatory, but a few subtleties are worth noting.
    **SQLITE_OPEN_READONLY** and **SQLITE_OPEN_READWRITE** open a SQLite database
    in read-only or read/write mode as their names suggest. Both options require that
    the database file already exist; otherwise, an error will be returned. **SQLITE_OPEN_CREATE**
    combined with


    **SQLITE_OPEN_READWRITE** exhibits the behavior we’ve seen in the first five chapters,
    which is the legacy **sqlite3_open()** behavior. Where a database already exists,
    it is opened for reading and writing. If the 154


    CHAPTER 6 ■ THE CORE C API


    database specified doesn’t exist, it is created (though as we’ve pointed out quite
    a few times, the act of persisting the database to disk will be pending the creation
    of the first object).


    The **flags** parameter can also be combined with the **SQLITE_OPEN_NOMUTEX**,
    **SQLITE_OPEN_FULLMUTEX**, **SQLITE_OPEN_SHAREDCACHE**, or **SQLITE_OPEN_PRIVATECACHE**
    flags to further control transactional behavior for the database handle. The final
    parameter, **zVfs**, allows the caller to override the default **sqlite3_vfs**
    operating system interface.


    Upon completion, **sqlite3_open_v2()** will initialize the **sqlite3** structure
    passed into it by the **ppDb** argument. This structure should be considered as
    an opaque handle representing a single connection to a database. This is more
    of a connection handle than a database handle since it is possible to attach multiple
    databases to a single connection. However, this connection still represents exactly
    one transaction context regardless of how many databases are attached.


    You close a connection by using the **sqlite3_close()** function, which is declared
    as follows: **int sqlite3_close(sqlite3*);**


    **For **sqlite3_close()** to complete successfully, all prepared queries associated
    with the connection must be finalized. If any queries remain that have not been
    finalized, **sqlite3_close()** will return **SQLITE_BUSY** with the error message
    “Unable to close due to unfinalized statements.”


    ■ **Note** If there is a transaction open on a connection when it is closed by
    **sqlite3_close()**, the transaction will automatically be rolled back.


    The exec Query


    The **sqlite3_exec()** function provides a quick, easy way to execute SQL commands
    and is especially handy for commands that modify the database (that is, don’t
    return any data). This is often also referred to as a *convenience* function,
    which nicely wraps up a lot of other tasks in one easy API call. This function
    has the following declaration:


    **int sqlite3_exec(**


    **sqlite3*, /* An open database */**


    **const char *sql, /* SQL to be executed */**


    **sqlite_callback, /* Callback function */**


    **void *data /* 1st argument to callback function */**


    **char **errmsg /* Error msg written here */**


    **);**


    **The SQL provided in the **sql** argument can consist of more than one SQL command.
    **sqlite3_exec()** will parse and execute every command in the **sql** string
    until it reaches the end of the string or encounters an error. Listing 6-1 (taken
    from **create.c**) illustrates how to use **sqlite3_exec()**.The example opens
    a database called test.db and creates within it a single table called **episodes**.
    After that, it inserts one record. The **create table** command will physically
    create the database file if it does not already exist.


    CHAPTER 6 ■ THE CORE C API


    *Listing 6-1\. Using **sqlite3_exec()** for Simple Commands*


    **int main(int argc, char **argv)**


    **{**


    **sqlite3 *db;**


    **char *zErr;**


    **int rc;**


    **char *sql;**


    **rc = sqlite3_open_v2("test.db", &db);**


    **if(rc) {**


    **fprintf(stderr, "Can''t open database: %s\n", sqlite3_errmsg(db));**


    **sqlite3_close(db);**


    **exit(1);**


    **}**


    ****sql = "create table episodes(id int, name text)";**


    **rc = sqlite3_exec(db, sql, NULL, NULL, &zErr);**


    **if(rc != SQLITE_OK) {**


    **if (zErr != NULL) {**


    **fprintf(stderr, "SQL error: %s\n", zErr);**


    **sqlite3_free(zErr);**


    **}**


    **}**


    **sql = "insert into episodes values (10, ''The Dinner Party'')";**


    **rc = sqlite3_exec(db, sql, NULL, NULL, &zErr);**


    ****sqlite3_close(db);**


    **return 0;**


    **}**


    **As mentioned in Chapter 5, it is actually possible to get records from **sqlite3_exec()**,
    although you don’t see it implemented much outside of the C API. **sqlite3_exec()**
    contains a callback mechanism that provides a way to obtain results from **select**
    statements. This mechanism is implemented by the third and fourth arguments of
    the function. The third argument is a pointer to a callback function. If it’s
    provided, SQLite will call the function for each record processed in each **select**
    statement executed within the **sql** argument. The callback function has the
    following declaration:**


    ****typedef int (*sqlite3_callback)(**


    **void*, /* Data provided in the 4th argument of sqlite3_exec() */**


    **int, /* The number of columns in row */**


    **char**, /* An array of strings representing fields in the row */**


    **char** /* An array of strings representing column names */**


    **);**


    **The fourth argument to **sqlite3_exec()** is a void pointer to any application-specific
    data you want to supply to the callback function. SQLite will pass this data as
    the first argument of the callback function.


    CHAPTER 6 ■ THE CORE C API


    The final argument (**errmsg**) is a pointer to a string to which an error message
    can be written should an error occur during processing. Thus, **sqlite3_exec()**
    has two sources of error information. The first is the return value. The other
    is the human-readable string, assigned to **errmsg**. If you pass in a **NULL**
    for **errmsg**, then SQLite will not provide any error message. Note that if you
    do provide a pointer for **errmsg**, the memory used to create the message is
    allocated on the heap. You should therefore check for a non-NULL value after the
    call and use **sqlite3_free()** to free the memory used to hold the **errmsg**
    string if an error occurs.


    ■ **Note** Note that you can pass a NULL into **sqlite3_free()**. The result is
    a harmless no-op. So, you can, if you want, call **sqlite3_free(errmsg)** without
    having to check to see whether **errmsg** is not **NULL**. It mainly depends on
    where and how you want to interrogate any actual errors and respond accordingly.'
  trans: "\n# SQLite C API 核心函数\n\n## 打开数据库：`sqlite3_open_v2()`\n\n当文件名为 **`:memory:'**\
    \ 时，`sqlite3_open_v2()` 将在 RAM 中创建一个仅在当前会话期间存在的内存数据库。如果 `filename` 是空字符串或 **`NULL`**，`sqlite3_open_v2()`\
    \ 会打开一个临时磁盘文件，该文件在连接关闭时会自动删除。否则，`sqlite3_open_v2()` 会尝试使用其提供的值来打开数据库文件。如果该名称的文件不存在，并且第三个参数中包含了\
    \ **`SQLITE_OPEN_CREATE`** 标志，`sqlite3_open_v2()` 将创建一个新文件；如果省略了 **`SQLITE_OPEN_CREATE`**\
    \ 标志，则会返回错误。\n\n> **注意**：这里我们同时列出了 `sqlite3_open()` 的 UTF-8 和 UTF-16 声明，以及更现代的\
    \ `sqlite3_open_v2()`。为了简洁起见，从这里开始，我们将仅引用 UTF-8 声明。并且，在可用的情况下，我们将处理融合了 SQLite\
    \ 最新功能的最新函数签名，而不是涵盖所有旧版函数。因此，请注意，API 中有许多函数既有 UTF-16 形式，也有用于向后兼容的旧版 UTF-8 形式。完整的\
    \ C API 参考文档可在 SQLite 网站 [www.sqlite.org/c3ref/intro.html](http://www.sqlite.org/c3ref/intro.html)\
    \ 上找到。\n\n## `flags` 参数\n\n`flags` 参数是一个位向量，可以包含以下值：**`SQLITE_OPEN_READONLY`**、**`SQLITE_OPEN_READWRITE`**\
    \ 和 **`SQLITE_OPEN_CREATE`**。这些名字基本是自解释的，但有几个细微之处值得注意。正如其名所示，**`SQLITE_OPEN_READONLY`**\
    \ 和 **`SQLITE_OPEN_READWRITE`** 分别以只读或读/写模式打开 SQLite 数据库。这两个选项都要求数据库文件已存在，否则将返回错误。\n\
    \n**`SQLITE_OPEN_CREATE`** 与 **`SQLITE_OPEN_READWRITE`** 组合使用时，其行为与我们在前五章中看到的（即旧版\
    \ `sqlite3_open()` 行为）一致：如果数据库已存在，则以读写模式打开；如果指定的数据库不存在，则创建它（尽管我们已多次指出，将数据库持久化到磁盘的操作将等待第一个对象的创建时才进行）。\n\
    \n`flags` 参数还可以与 **`SQLITE_OPEN_NOMUTEX`**、**`SQLITE_OPEN_FULLMUTEX`**、**`SQLITE_OPEN_SHAREDCACHE`**\
    \ 或 **`SQLITE_OPEN_PRIVATECACHE`** 等标志结合使用，以进一步控制数据库句柄的事务行为。最后一个参数 `zVfs` 允许调用者覆盖默认的\
    \ `sqlite3_vfs` 操作系统接口。\n\n完成调用后，`sqlite3_open_v2()` 将通过 `ppDb` 参数初始化传入的 `sqlite3`\
    \ 结构。此结构应被视为一个不透明句柄，代表与数据库的单一连接。这更偏向于连接句柄而非数据库句柄，因为可以将多个数据库附加到单个连接上。然而，无论附加了多少个数据库，此连接仍仅代表一个事务上下文。\n\
    \n## 关闭连接：`sqlite3_close()`\n\n使用 `sqlite3_close()` 函数关闭连接，其声明如下：`int sqlite3_close(sqlite3*);`\n\
    \n要使 `sqlite3_close()` 成功完成，与该连接关联的所有预处理查询都必须被终结（finalized）。如果仍有查询未被终结，`sqlite3_close()`\
    \ 将返回 **`SQLITE_BUSY`**，并附带错误消息 “Unable to close due to unfinalized statements.”\n\
    \n> **注意**：如果在调用 `sqlite3_close()` 关闭连接时，该连接上仍有未提交的事务，该事务将自动回滚。\n\n## 执行查询：`sqlite3_exec()`\n\
    \n`sqlite3_exec()` 函数提供了一种快速、简便的方式来执行 SQL 命令，特别适用于修改数据库的命令（即不返回任何数据）。这通常也被称为“便捷函数”（convenience\
    \ function），它将许多其他任务封装在一个简单的 API 调用中。该函数声明如下：\n\n```c\nint sqlite3_exec(\n  sqlite3*,\
    \ /* 一个已打开的数据库 */\n  const char *sql, /* 要执行的 SQL */\n  sqlite_callback, /* 回调函数\
    \ */\n  void *data, /* 传递给回调函数的第一个参数 */\n  char **errmsg /* 错误信息写入此处 */\n);\n\
    ```\n\n`sql` 参数中提供的 SQL 可以包含多个 SQL 命令。`sqlite3_exec()` 将解析并执行 `sql` 字符串中的每条命令，直到字符串末尾或遇到错误为止。代码清单\
    \ 6-1（摘自 `create.c`）展示了如何使用 `sqlite3_exec()`。该示例打开一个名为 `test.db` 的数据库，并在其中创建一个名为\
    \ `episodes` 的表，随后插入一条记录。`create table` 命令如果在数据库文件不存在时，会实际创建该文件。\n\n### 代码清单 6-1.\
    \ 使用 `sqlite3_exec()` 执行简单命令\n\n```c\nint main(int argc, char **argv)\n{\n  sqlite3\
    \ *db;\n  char *zErr;\n  int rc;\n  char *sql;\n\n  rc = sqlite3_open_v2(\"test.db\"\
    , &db);\n  if(rc) {\n    fprintf(stderr, \"Can't open database: %s\\n\", sqlite3_errmsg(db));\n\
    \    sqlite3_close(db);\n    exit(1);\n  }\n\n  sql = \"create table episodes(id\
    \ int, name text)\";\n  rc = sqlite3_exec(db, sql, NULL, NULL, &zErr);\n  if(rc\
    \ != SQLITE_OK) {\n    if (zErr != NULL) {\n      fprintf(stderr, \"SQL error:\
    \ %s\\n\", zErr);\n      sqlite3_free(zErr);\n    }\n  }\n\n  sql = \"insert into\
    \ episodes values (10, 'The Dinner Party')\";\n  rc = sqlite3_exec(db, sql, NULL,\
    \ NULL, &zErr);\n\n  sqlite3_close(db);\n  return 0;\n}\n```\n\n如第 5 章所述，实际上可以从\
    \ `sqlite3_exec()` 获取记录，尽管在 C API 之外很少见到实现。`sqlite3_exec()` 包含一个回调机制，提供了一种从 `select`\
    \ 语句获取结果的方法。该机制由函数的第三个和第四个参数实现。第三个参数是一个指向回调函数的指针。如果提供了该指针，SQLite 将为在 `sql` 参数中执行的\
    \ `select` 语句处理的每条记录调用一次该函数。回调函数声明如下：\n\n```c\ntypedef int (*sqlite3_callback)(\n\
    \  void*, /* 在 sqlite3_exec() 的第四个参数中提供的数据 */\n  int,   /* 该行中的列数 */\n  char**,\
    \ /* 一个表示该行中字段的字符串数组 */\n  char**  /* 一个表示列名的字符串数组 */\n);\n```\n\n`sqlite3_exec()`\
    \ 的第四个参数是一个指向任何应用程序特定数据的 `void` 指针，你可以将其提供给回调函数。SQLite 会将此数据作为回调函数的第一个参数传递。\n\n\
    最后一个参数 (`errmsg`) 是一个指向字符串的指针，如果在处理过程中发生错误，可以将错误消息写入该字符串。因此，`sqlite3_exec()` 有两个错误信息来源：第一个是返回值，另一个是赋值给\
    \ `errmsg` 的人类可读字符串。如果你为 `errmsg` 传入 **`NULL`**，那么 SQLite 将不会提供任何错误消息。请注意，如果你为\
    \ `errmsg` 提供了一个指针，用于创建消息的内存是在堆上分配的。因此，你应该在调用后检查非 `NULL` 值，并在发生错误时使用 `sqlite3_free()`\
    \ 来释放保存 `errmsg` 字符串的内存。\n\n> **注意**：可以向 `sqlite3_free()` 传入 `NULL`，结果是无害的无操作（no-op）。因此，如果你愿意，可以直接调用\
    \ `sqlite3_free(errmsg)`，而无需检查 `errmsg` 是否不为 `NULL`。这主要取决于你希望在何处以及如何检查实际错误并作出相应响应。\n"
- fmt: "# Chapter 6: The Core C API\n\n## Putting It All Together\n\nPutting it all\
    \ together, `sqlite3_exec()` allows you to issue a batch of commands, and you\
    \ can collect all the returned data by using the callback interface. For example,\
    \ let’s insert a record into the `episodes` table and then select all of its records,\
    \ all in a single call to `sqlite3_exec()`. The complete code, shown in Listing\
    \ 6-2, is taken from `exec.c`.\n\n### Listing 6-2. Using `sqlite3_exec()` for\
    \ Record Processing\n\n```c\nint callback(void* data, int ncols, char** values,\
    \ char** headers);\n\nint main(int argc, char **argv)\n{\n    sqlite3 *db;\n \
    \   int rc;\n    char *sql;\n    char *zErr;\n\n    rc = sqlite3_open_v2(\"test.db\"\
    , &db);\n    if(rc) {\n        fprintf(stderr, \"Can't open database: %s\\n\"\
    , sqlite3_errmsg(db));\n        sqlite3_close(db);\n        exit(1);\n    }\n\n\
    \    const char* data = \"Callback function called\";\n    sql = \"insert into\
    \ episodes (id, name) values (11,'Mackinaw Peaches');\"\n          \"select *\
    \ from episodes;\";\n    rc = sqlite3_exec(db, sql, callback, data, &zErr);\n\n\
    \    if(rc != SQLITE_OK) {\n        if (zErr != NULL) {\n            fprintf(stderr,\
    \ \"SQL error: %s\\n\", zErr);\n            sqlite3_free(zErr);\n        }\n \
    \   }\n\n    sqlite3_close(db);\n    return 0;\n}\n\nint callback(void* data,\
    \ int ncols, char** values, char** headers)\n{\n    int i;\n    fprintf(stderr,\
    \ \"%s: \", (const char*)data);\n    for(i=0; i < ncols; i++) {\n        fprintf(stderr,\
    \ \"%s=%s \", headers[i], values[i]);\n    }\n    fprintf(stderr, \"\\n\");\n\
    \    return 0;\n}\n```\n\nSQLite parses the `sql` string; runs the first command,\
    \ which inserts a record; and then runs the second command, consisting of the\
    \ `select` statement. For the second command, SQLite calls the callback function\
    \ for each record returned. Running the program produces the following output:\n\
    \n```\nCallback function called: id=10 name=The Dinner Party\nCallback function\
    \ called: id=11 name=Mackinaw Peaches\n```\n\nNotice that the callback function\
    \ returns 0. This return value actually exerts some control over `sqlite3_exec()`.\
    \ If the callback function returns a nonzero value, then `sqlite3_exec()` will\
    \ abort (in other words, it will terminate all processing of this and subsequent\
    \ commands in the `sql` string).\n\nSo, `sqlite3_exec()` provides an easy way\
    \ to modify the database and also provides an interface with which to process\
    \ records. Why then should you bother with prepared queries? Well, as you will\
    \ see in the next section, there are quite a few advantages:\n\n- Prepared queries\
    \ don’t require a callback interface, which makes coding simple and more linear.\n\
    - Prepared queries have associated functions that provide better column information.\
    \ You can obtain a column’s storage type, declared type, schema name (if it is\
    \ aliased), table name, and database name. `sqlite3_exec()`’s callback interface\
    \ provides just the column names.\n- Prepared queries provide a way to obtain\
    \ field/column values in other data types besides text and in native C data types\
    \ such as `int` and `double`, whereas `sqlite3_exec()`’s callback interface only\
    \ provides fields as string values.\n- Prepared queries can be rerun, allowing\
    \ you to reuse the compiled SQL.\n- Prepared queries support parameterized SQL\
    \ statements.\n\n## Examining Changes\n\nIf you are performing an `update` or\
    \ a `delete`, you may want to know how many records were affected. You can get\
    \ this information from `sqlite3_changes()`. It provides the number of affected\
    \ records for the last executed `update`, `insert`, or `delete` statement. Obviously,\
    \ if you are running a batch of queries (multiple commands in the `sql` argument\
    \ of `sqlite3_exec()`), this function will be good only for the last command in\
    \ the batch. Note also that `sqlite3_changes()` does not include changes activated\
    \ from the result of triggers fired from your original command.\n\nIf you are\
