    will produce a combination of these two (in **YYYY-MM-DD HH:MM:SS** format). Here’s
    an example:


    ****create table times ( id int,**


    **date not null default current_date,**


    **time not null default current_time,**


    **timestamp not null default current_timestamp );**


    **insert into times (id) values (1);**


    **insert into times (id) values (2);**


    **select * from times;**


    **id date time timestamp**


    **--- ---------- ---------- -------------------**


    **1 2010-06-15 23:30:25 2010-06-15 23:30:25**


    **2 2010-06-15 23:30:40 2010-06-15 23:30:40**


    These defaults come in quite handy for tables that need to log or timestamp events.


    NOT NULL Constraints


    If you are one of those people who is not fond of **NULL**, then the **NOT NULL**
    constraint is for you. **NOT NULL**


    ensures that values in the column may never be **NULL**. **insert** commands may
    not add **NULL** in the column, and **update** commands may not change existing
    values to **NULL**. Oftentimes, you will see **NOT**


    **NULL** raise its ugly head in **insert** statements. Specifically, a **NOT NULL**
    constraint without a **default** constraint will prevent any unspecified values
    from being used in the **insert** (because the default values provided in this
    case are **NULL**). In the preceding example, the **NOT** NULL constraint on **name**
    requires that an **insert** command always provide a value for that column. Here’s
    an example:


    CHAPTER 4 ■ ADVANCED SQL FOR SQLITE


    **sqlite> insert into contacts (phone) values (''555-1212'');**


    **SQL error: contacts.name may not be NULL**


    **This **insert** command specified a **phone** value but not a name. The **NOT
    NULL** constraint on **name** kicked in and forbade the operation.**


    **A pragmatic way to deal with unknown data and **NOT NULL** constraints is to
    also include a **default** constraint for the column. This is the case for **phone**.
    Although **phone** has a **NOT NULL** constraint, it has a **default** constraint
    as well. If an **ins**ert command does not specify a value for phone, the **default**
    constraint steps in and provides the value **''UNKNOWN''** , thus satisfying the
    **NOT NULL** constraint. To this end, people often use **default** constraints
    in conjunction with **NOT NULL** constraints so that **insert** commands can safely
    use default values while at the same time keeping **NULL** out of the column.


    Check Constraints


    Check constraints allow you to define expressions to test values whenever they
    are inserted into or updated within a column. If the values do not meet the criteria
    set forth in the expression, the database issues a constraint violation. Thus,
    it allows you to define additional data integrity checks beyond **unique** or
    **NOT NULL** to suit your specific application. An example of a **check** constraint
    might be to ensure that the value of a phone number field is at least seven characters
    long. To do this, you can add the constraint to the column definition of **phone**
    or as a stand-alone constraint in the table definition as follows: **create table
    contacts**


    **( id integer primary key,**


    **name text not null collate nocase,**


    **phone text not null default ''UNKNOWN'',**


    **unique (name,phone),**


    **check (length(phone)>=7) );**'
