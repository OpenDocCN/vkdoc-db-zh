- fmt: '*An immediate transaction* attempts to obtain a reserved lock as soon as the
    `begin` command is executed. If successful, `begin immediate` guarantees that
    no other session will be able to write to the database. As you know, other sessions
    can continue to read from the database, but the reserved lock prevents any new
    sessions from reading. Another consequence of the reserved lock is that no other
    sessions will be able to successfully issue a `begin immediate` or `begin exclusive`
    command. SQLite will return a `SQLITE_BUSY` error. During this time, you can make
    some modifications to the database, but you may not necessarily be able to commit
    them. When you call `commit`, you could get `SQLITE_BUSY`. This means that there
    are other readers active, as in the earlier example. Once they are gone, you can
    commit the transaction.


    An *exclusive transaction* obtains an exclusive lock on the database. This works
    similarly to `immediate`, but when you successfully issue it, `exclusive` guarantees
    that no other session is active in the database and that you can read or write
    with impunity.


    The crux of the problem in the preceding example is that both sessions ultimately
    wanted to write to the database, but they made no attempt to relinquish their
    locks. Ultimately, it was the shared lock that caused the problem. If both sessions
    had started with `begin immediate`, then the deadlock would not have occurred.
    In this case, only one of the sessions would have been able to enter `begin immediate`
    at one time, while the other would have to wait. The one that has to wait could
    keep retrying with the assurance that it would eventually get in. `begin immediate`
    and `begin exclusive`, if used by all sessions that want to write to the database,
    provide a synchronization mechanism, thereby preventing deadlocks.


    For this approach to work, though, everyone has to follow the rules.


    The bottom line is this: if you are using a database that no other connections
    are using, then a simple `begin` will suffice. If, however, you are using a database
    that other connections are also writing to, both you, and they should use `begin
    immediate` or `begin exclusive` to initiate transactions. It works out best that
    way for both of you. Transactions and locks are covered in more detail in Chapter
    5.


    ## Database Administration


    Database administration is generally concerned with controlling how a database
    operates. Many of the database administration tasks you’ll want to perform are
    done via SQL commands. SQLite includes some unique administrative features of
    its own, such the means to “attach” multiple databases to a single session, as
    well as database *pragmas,* which can be used for setting various configuration
    parameters.


    ## Attaching Databases


    SQLite allows you to “attach” multiple databases to the current session using
    the `attach` command.


    When you attach a database, all of its contents are accessible in the global scope
    of the current database file. `attach` has the following syntax:


    `attach [database] filename as database_name;`


    Here, `filename` refers to the path and name of the SQLite database file, and
    `database_name` refers to the logical name with which to reference that database
    and its objects. The main database is automatically assigned the name `main`.
    If you create any temporary objects, then SQLite will create an attached database
    name `temp`. (You can see these objects using the `database_list` pragma, described
    later.) The logical name may be used to reference objects within the attached
    database. If there are tables or other database objects that share the same name
    in both databases, then the logical name is required to reference such objects
    in the attached database. For example, if both databases have a table called `foo`,
    and the logical name of the attached database is `db2`, then the only way to query
    `foo` in `db2` is by using the fully qualified name `db2.foo`, as follows:


    ```sqlite

    sqlite> attach database ''/tmp/db'' as db2;

    sqlite> select * from db2.foo;

    x

    ----------

    bar

    ```


    If you really want to, you can qualify objects in the main database using the
    name `main`:


    ```sqlite

    sqlite> select * from main.foods limit 2;

    id  type_id  name

    ----------  ----------  --------------

    1    1        Bagels

    2    1        Bagels, raisin

    ```


    The same is true with the temporary database:


    ```sqlite

    sqlite> create temp table foo as select * from food_types limit 3;

    sqlite> select * from temp.foo;

    id  name

    ---  -------------

    1    Bakery

    2    Cereal

    3    Chicken/Fowl

    ```


    You detach databases with the `detach database` command, defined as follows:


    `detach [database] database_name;`


    This command takes the logical name of the attached database (given by `database_name`)
    and detaches the associated database file. You get a list of attached databases
    using the `database_list` pragma, explained in the section “Database Configuration.”


    ## Cleaning Databases


    SQLite has two commands designed for cleaning—`reindex` and `vacuum`. `reindex`
    is used to rebuild indexes. It has two forms:


    `reindex collation_name;`


    `reindex table_name|index_name;`


    The first form rebuilds all indexes that use the collation name given by `collation_name`.
    It is needed only when you change the behavior of a user-defined collating sequence
    (for example, multiple sort orders in Chinese). All indexes in a table (or a particular
    index given its name) can be rebuilt with the second form.


    `Vacuum` cleans out any unused space in the database by rebuilding the database
    file. `Vacuum` will not work if there are any open transactions. An alternative
    to manually running `VACUUM` statements is autovacuum. This feature is enabled
    using the `auto_vacuum` pragma, described in the next section.


    ## Database Configuration


    SQLite doesn’t have a configuration file. Rather, all of its configuration parameters
    are implemented using *pragmas*. Pragmas work in different ways. Some are like
    variables; others are like commands. They cover many aspects of the database,
    such as runtime information, database schema, versioning, file format, memory
    use, and debugging. Some pragmas are read and set like variables, while others
    require arguments and are called like functions. Many pragmas have both temporary
    and permanent forms.


    Temporary forms affect only the current session for the duration of its lifetime.
    The permanent forms are stored in the database and affect every session. The cache
    size is one such example.


    This section covers the most commonly used pragmas. You can find a complete list
    of all SQLite pragmas.


    ### The Connection Cache Size


    The cache size pragmas influence how many database pages a session can hold in
    memory. To set the default cache size for the current session, you use the `cache_size`
    pragma:


    ```sqlite

    sqlite> pragma cache_size;

    cache_size

    ---------------

    2000

    sqlite> pragma cache_size=10000;

    sqlite> pragma cache_size;

    cache_size

    ---------------

    10000

    ```


    You can permanently set the cache size for all sessions using the `default_cache_size`
    pragma. This setting is stored in the database. This will take effect only for
    sessions created after the change, not for currently active sessions.


    One of the uses for the cache is in storing pending changes when a session is
    in a `reserved` state (it has a `reserved` lock), as described earlier in the
    section “Transactions.” If the session fills up the cache, it will not be able
    to continue further modifications until it gets an `exclusive` lock, which means
    that it may have to first wait for readers to clear.


    If you or your programs perform many updates or deletes on a database that is
    being used by many other sessions, it may help you to increase the cache size.
