    }\ncatch(SQLException e) {\n    throw e;\n}\n```\n\n在本章末尾，我们将使用我们的 `myDatabaseHelper`\
    \ 类来帮助构建一个可工作的、基于 SQLite 的 Android 应用。\n\n## 使用 SQLiteQueryBuilder 查询 SQLite\n\
    \n秉承 SQLite API 的优良传统，Android 的 SQLite 类库同时支持数据库风格的对象和语句风格的对象来对数据库发起查询。我们已经见过\
    \ `SQLiteDatabase` 对象的实际应用。现在，我们来看看其互补类 `SQLiteQueryBuilder`。\n\n与 `SQLiteDatabase`\
    \ 一样，`SQLiteQueryBuilder` 提供了一系列方法来帮助构建有效的 SQL 语句，而无需为你的子句提供各种 SQL 保留字。它的关键区别在于，这些方法提供了直接针对提供的\
    \ `SQLiteDatabase` 对象执行生成的语句的功能，同时也能输出一个字符串，传递给 `SQLiteDatabase` 对象以在该对象的管理下执行。首先，让我们看看支持直接执行生成语句的方法：\n\
    \n```java\nCursor query(SQLiteDatabase db, String[] projectionIn, String selection,\n\
    String[] selectionArgs, String groupBy, String having, String sortOrder)\n\nCursor\
    \ query(SQLiteDatabase db, String[] projectionIn, String selection,\nString[]\
    \ selectionArgs, String groupBy, String having, String sortOrder,\nString limit)\n\
    ```\n\n这些方法看起来非常熟悉。它们几乎与 `SQLiteDatabase` 对象的 `query()` 方法完全相同，只有几个例外。你不是在数据库对象本身上调用它们，而是将数据库对象作为第一个参数\
    \ (`db`) 传递。许多人认为这只是个人偏好的问题，但在某些用例中，`SQLiteQueryBuilder` 方法很有帮助。你会注意到这两个重载方法之间的唯一区别是后者允许使用\
    \ `limit` 子句。\n\n但是，等等！那是什么？细心的读者会发现还有一个区别。我们的 `table` 参数去哪儿了？这是使用 `SQLiteQueryBuilder`\
    \ 时的一个关键区别。需要使用一个单独的方法来指定查询将要操作的表或表。这就是 `setTables()` 方法。\n\n```java\npublic void\
    \ setTables (String inTables)\n```\n\n■ 注意 这可能是开发者在 `SQLiteQueryBuilder` 和 `SQLiteDatabase`\
    \ 之间切换时遇到的最常见的“易错点”。\n"
- fmt: "# CHAPTER 10: ANDROID DEVELOPMENT WITH SQLITE\n\nThe `setTables()` method\
    \ simply takes a comma-separated string of table names as a parameter.\n\nThere\
    \ are a few additional methods of `SQLiteQueryBuilder` that operate this way.\
    \ These include `setDistinct()`, for indicating the SQL should use the `distinct`\
    \ keyword, and `setProjectionMap(Map<String, String> columnMap)`, which controls\
    \ the aliasing of columns and column disambiguation.\n\nThe bulk of the remaining\
    \ methods for `SQLiteQueryBuilder` are the “build” methods. These methods are\
    \ designed to build a query string and return it for use elsewhere, such as through\
    \ a `SQLiteDatabase` object or recursively in the `SQLiteQueryBuilder` itself.\n\
    \n```java\nString buildQuery(String[] projectionIn, String selection, String[]\
    \ selectionArgs,\n                  String groupBy, String having, String sortOrder,\
    \ String limit)\n\nstatic String buildQueryString(boolean distinct, String tables,\
    \ String[] columns,\n                               String where, String groupBy,\
    \ String having,\n                               String orderBy, String limit)\n\
    \nString buildUnionQuery(String[] subQueries, String sortOrder, String limit)\n\
    \nString buildUnionSubQuery(String typeDiscriminatorColumn, String[] unionColumns,\n\
    \                          Set<String> columnsPresentInTable, int computedColumnsOffset,\n\
    \                          String typeDiscriminatorValue, String selection,\n\
    \                          String[] selectionArgs, String groupBy, String having)\n\
    ```\n\nOnce again, there’s a great deal of similarity there with the methods seen\
    \ from `SQLiteDatabase`. Note however, that there are methods that focus heavily\
    \ on union queries. Personally, we find it easier to construct these ourselves\
    \ and use the `rawQuery()` methods on `SQLiteDatabase`, but if you’re programmatically\
    \ building up your union statements, the approach of `buildUnionQuery()` and the\
    \ related methods provided added resilience against SQL injection attacks.\n\n\
    That’s enough theory on the Android SQLite class libraries. Now let’s move on\
    \ to create a working Android SQLite-based application.\n\n## Building the Seinfeld\
    \ Android SQLite Application\n\nWith a working development environment now in\
    \ place from the start of this chapter and a working knowledge of the Android\
