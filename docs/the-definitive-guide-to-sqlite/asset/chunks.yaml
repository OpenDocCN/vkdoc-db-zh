- fmt: 'Collations are registered with SQLite through the `sqlite3_create_collation_v2()`
    function, which is declared as follows:


    ```

    int sqlite3_create_collation_v2(

    sqlite3* db, /* database handle */

    const char *zName, /* collation name in SQL */

    int pref16, /* encoding */

    void* pUserData, /* application data */

    int(*xCompare)(void*,int,const void*,int,const void*)

    void(*xDestroy)(void*)

    );

    ```


    It looks pretty similar to `sqlite3_create_function()`. There is the standard
    database handle, the collation name as it will be addressed in SQL (similar to
    the function/aggregate name), and the encoding, which pertains to the format of
    the comparison strings when passed to the comparison function.


    **Note** Just as in aggregates and functions, separate collation comparison functions
    can be registered under the same collation name for each of the UTF-8, UTF-16LE,
    and UTF-16BE encodings. SQLite will automatically select the best comparison function
    for the given collation based on the strings to be compared.


    The application data pointer is another API mainstay. The pointer provided there
    is passed on to the callback function. Basically, `sqlite3_create_collation_v2()`
    is a stripped-down version of `sqlite3_create_function()`, which takes exactly
    two arguments (both of which are text) and returns an integer value. It also has
    the aggregate callback function pointers stripped out.


    Of the remaining two parameters, the last is `xDestroy` pointer. This function
    will be called at destruction time of the collation, which typically will happen
    when the database connection is destroyed. The destruction function will also
    be called if your collation is overridden by later calls to `sqlite3_create_collation_v2()`.


    ## The Compare Function


    The `xCompare` argument is the key new thing here. It points to the actual comparison
    function that will resolve the text values. The comparison function must have
    the following form:


    ```

    int compare(

    void* data, /* application data */

    int len1, /* length of string 1 */

    const void* str1, /* string 1 */

    int len2, /* length of string 2 */

    const void* str2) /* string 2 */

    ```


    The function should return negative, zero, or positive if the first string is
    less than, equal to, or greater than the second string, respectively.


    As stated, the `length_first` collation is a bit wishy-washy. Listing 7-5 shows
    its implementation.


    *Listing 7-5. The `Length_first` Collation Function*


    ```

    int length_first_collation(

    void* data, int l1, const void* s1,

    int l2, const void* s2 )

    {

    int result, opinion;


    /* Compare lengths */

    if ( l1 == l2 ) result = 0;

    if ( l1 < l2 ) result = 1;

    if ( l1 > l2 ) result = 2;


    /* Form an opinion: is s1 really < or = to s2 ? */

    switch(result) {

    case 0: /* Equal length, collate alphabetically */

    opinion = strcmp(s1,s2);

    break;

    case 1: /* String s1 is shorter */

    opinion = -result;

    break;

    case 2: /* String s2 is shorter */

    opinion = result

    break;

    default: /* Assume equal length just in case */

    opinion = strcmp(s1,s2);

    }


    return opinion;

    }

    ```


    ## The Test Program


    All that remains is to illustrate it in a program. Listing 7-6 shows the example
    program (`length_first.c`) implementation.


    *Listing 7-6. The `Length_first` Collation Test Program*


    ```

    int main(int argc, char **argv)

    {

    char *sql; sqlite3 *db; int rc;


    sqlite3_open("foods.db", &db);


    /* Register Collation. */

    fprintf(stdout, "1. Register length_first Collation\n\n");

    sqlite3_create_collation_v2( db, "LENGTH_FIRST", SQLITE_UTF8, db,

    length_first_collation, length_first_collation_del );


    /* Turn SQL logging on. */

    log_sql(db, 1);


    /* Test default collation. */

    fprintf(stdout, "2. Select records using default collation.\n");

    sql = "select name from foods order by name";

    print_sql_result(db, sql);


    /* Test Length First collation. */

    fprintf(stdout, "\nSelect records using length_first collation. \n");

    sql = "select name from foods order by name collate LENGTH_FIRST";

    print_sql_result(db, sql);


    /* Done. */

    sqlite3_close(db);


    return 0;

    }

    ```


    ## Results


    Running the program yields the following results (abbreviated here to save space):


    ```

    1. Register length_first Collation


    2. Select records using default collation.

    TRACE: select name from foods order by name

    name

    -----------------

    A1 Sauce

    All Day Sucker

    Almond Joy

    Apple

    Apple Cider

    Apple Pie

    Arabian Mocha Java (beans)

    Arby''s Roast Beef

    Artichokes

    Atomic Sub

    ...


    Select records using length_first collation.

    TRACE: select name from foods order by name collate LENGTH_FIRST

    issue

    -----------------

    BLT

    Gum

    Kix

    Pez

    Pie

    Tea

    Bran

    Duck

    Dill

    Life

    ...

    ```


    Our program starts by registering the `length_first` collation sequence. We then
    proceed to select records using SQLite’s default `binary` collation, which returns
    records in alphabetical order. Then comes our use of the `length_first` collation,
    where we select records again. As the results indicate, we are right on the mark,
    sorting first by length and then alphabetically.


    ## Collation on Demand


    SQLite provides a way to defer collation registration until it is actually needed.
    So if you are not sure your application is going to need something like the `length_first`
    collation, you can use the `sqlite3_collation_needed()` function to defer registration
    to the last possible moment (perhaps as the result of some secret last-minute
    food renaming). You simply provide `sqlite3_collation_needed()` with a callback
    function, which SQLite can rely on to register unknown collation sequences as
    needed, given their name. This acts like a callback for a callback, so to speak.
    It’s like saying to SQLite, “Here, if you are ever asked to use a collation that
    you don’t recognize, call this function, and it will register the unknown sequence;
    then you can continue your work.”


    The `sqlite3_collation_needed()` function is declared as follows:


    ```

    int sqlite3_collation_needed(

    sqlite3* db, /* connection handle */

    void* data, /* application data */

    void(*crf)(void*,sqlite3*,int eTextRep,const char*)

    );

    ```


    The `crf` argument (the collation registration function as we call it) points
    to the function that will register the unknown collation. For clarity, it is defined
    as follows:


    ```

    void crf(

    void* data, /* application data */

    sqlite3* db, /* database handle */

    int eTextRep, /* encoding */

    const char*) /* collation name */

    ```


    The `db` and `data` arguments of `crf()` are the values passed into the first
    and second arguments of `sqlite3_collation_needed()`, respectively.


    ## Summary


    By now you’ve discovered that user-defined functions, aggregates, and collations
    can be surprisingly useful. The ability to add such functions using the extensions
    part of the C API is a great complement to the open nature of the core SQLite
    library. So, you’re free to dig in and modify SQLite to your heart’s content.
    We would even go so far to say that SQLite provides a friendly, easy-to-user interface
    that makes it possible to implement a wide range of powerful extensions and customizations,
    especially when combined with other features already present in SQLite.


    In the next chapter, you will see how many extension languages take advantage
    of this. They use the C API to make it possible to implement all manner of capabilities
    and extensions for a given language.


