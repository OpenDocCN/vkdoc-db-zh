    Java


    Like Python mentioned earlier, a wealth of Java extensions are available for SQLite.
    These fall into two broad camps: the JDBC drivers (sometimes with added goodies)
    and complete reimplementations of


    SQLite in Java. We’ll cover the javasqlite wrapper written by Christian Werner,
    who wrote the SQLite ODBC driver as well. It includes both a JDBC driver and a
    native JNI extension, which closely shadows


    [the SQLite C API. You can download the extension from **www.ch-werner.de/javasqlite/overview-**](http://www.ch-werner.de/javasqlite/overview-summary.html#jdbc_driver)


    [**summary.html#jdbc_driver**.](http://www.ch-werner.de/javasqlite/overview-summary.html#jdbc_driver)


    CHAPTER 8 ■ LANGUAGE EXTENSIONS


    The main class in the JNI extension is SQLiteDatabase. Most of its methods are
    implemented using callbacks that reference the following interfaces:


    • **SQLite.Callback**


    • **SQLite.Function**


    • **SQLite.Authorizer**


    • **SQLite.Trace**


    • **SQLite.ProgressHandler**


    The **SQLite.Callback** interface is used to process result sets through row handlers,
    as well as column and type information. SQLite.Authorizer is a thin wrapper over
    the SQLite C API function


    sq**lite3_set_authorizer()**, with which you can intercept database events before
    they happen.


    **SQLite.Trace** is used to view SQL statements as they are compiled, and it wraps
    **sqlite3_trace()**.


    **SQLite.ProgressHandler** wraps **sqlite3_progress_handler()**, which is used
    to issue progress events after a specified number of VDBE instructions have been
