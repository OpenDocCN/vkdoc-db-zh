  trans: '# 第六章 ■ 核心 C API


    ## 线程


    如果进度回调返回非零值，当前查询将立即终止，任何数据库更改都将被回滚。如果该查询是更大事务的一部分，则该事务不会被回滚并保持活动状态。此时，`sqlite3_exec()`
    调用将返回 `SQLITE_ABORT`。


    SQLite 已经享受了多个版本的线程支持。尽管多线程代码中的正常防御性编程技术同样适用于 SQLite，但仍需采取一些额外的预防措施。


    一个与线程有些关联的限制涉及 Unix 上的 `fork()` 系统调用。你绝不应尝试通过 `fork()` 调用将连接传递给子进程。这将无法正常工作。


    ## 共享缓存模式


    从 SQLite 3.3.0 版本开始，SQLite 支持一种称为共享缓存模式的功能，它允许单个进程中的多个连接使用一个公共的页面缓存，如图 6-1 所示。此功能专为嵌入式服务器设计，在这种服务器中，单个线程可以代表其他线程高效地管理多个数据库连接。在这种情况下，这些连接共享一个页面缓存以及一个不同的并发模型。由于共享缓存，服务器线程可以以显著低于每个线程管理自己连接时的内存消耗运行，并获得更好的并发性。通常，每个连接分配足够的内存以在页面缓存中容纳
    2000 个页面。


    每个线程不是用自己的连接消耗那么多内存，而是与其他线程共享该内存，使用一个单一的页面缓存。


    在此模型中，线程依赖于一个服务器线程来为它们管理数据库连接。线程通过某种通信机制将 SQL 语句发送到服务器；服务器使用该线程分配的连接执行这些语句，然后将结果发送回去。线程仍然可以发出命令并控制自己的事务；只是它的实际连接存在于另一个线程中，并由另一个线程管理。


    ```

    线程

    线程

    线程

    服务器线程

    连接

    连接

    连接

    页面缓存

    数据库

    ```


    *图 6-1. 共享缓存模型*


    共享缓存模式中的连接使用不同的并发模型和隔离级别。此外，存在一个选项，允许共享缓存中的连接查看其同类连接所做的更改。如果将 `read_committed`
    这个编译指示（pragma）设置为 `true`，则这种更改检查是可能的。也就是说，数据库中可以同时存在多个读取者和一个活跃的写入者。该写入者可以在不必等待其他读取者清除的情况下写入数据库——执行完整的写事务。因此，在读取者的事务中，数据库内的数据可能会发生变化。


    虽然 SQLite 通常以序列化隔离级别运行，这意味着读取者和写入者总是看到数据库的一致视图，但在共享缓存模式下，读取者会受到数据库在其下方发生变化的影响。


    存在一些控制措施来防止连接相互干扰。默认情况下，共享缓存模式使用表锁来将读取者连接和写入者连接分开。表锁与数据库锁不同，并且仅存在于共享缓存的连接之内。


    每当一个连接读取一个表时，SQLite 首先尝试获取该表的读锁。对于写入表也是如此。一个连接不能写入另一个连接持有读锁的表，反之亦然。此外，表锁与其各自的连接绑定，并持续到其事务结束。


    ## 读未提交隔离级别


    虽然表锁有助于使共享缓存模式中的连接互不干扰，但连接也可以选择完全不干扰。也就是说，一个连接可以通过使用 `read_uncommitted` 编译指示选择采用读未提交隔离级别。如果将其设置为
    `true`，则该连接将不会对其读取的表放置读锁。因此，另一个写入者实际上可以在连接读取表时更改该表。这可能导致查询结果不一致，但也意味着处于读未提交模式的连接既不会被任何其他连接阻塞，也不会阻塞任何其他连接。


    从 SQLite 3.7 版本开始发生了一些重大变化，引入了预写式日志（Write-Ahead Log）模式。我们将在第 11 章详细讨论预写式日志。


    ## 共享缓存模式中的模式更改


    当线程想要修改数据库模式时，在共享缓存模式下还有额外需要考虑的事项。事实证明，在 SQLite 发出表锁之前，它首先获取 `sqlite_master` 表的读表锁。为了使线程能够更改（alter）模式，它必须首先获取
    `sqlite_master` 的写表锁。它只能在该表没有来自其他表的读锁的情况下做到这一点。当一个线程确实获得了 `sqlite_master` 的写锁时，则在此期间不允许其他线程编译
    SQL 语句。它们将收到 `SQLITE_SCHEMA` 错误。


    ## 解锁通知


    如果在读未提交隔离级别的旷野中操作的想法对你没有吸引力，SQLite 在使用共享缓存模式时提供了替代方案。近期的 SQLite 版本包含了 `sqlite3_unlock_notify()`
    函数，以在锁定情况下提供额外的灵活性。该函数的概要如下：


    ```c

    int sqlite3_unlock_notify(

    sqlite3 *pBlocked, /* 被阻塞的连接 */

    void (*xNotify)(void **apArg, int nArg), /* 要调用的回调函数 */

    void *pNotifyArg /* 要传递给 xNotify 的参数 */

    )

    ```


    如果你的代码因竞争锁而无法获取共享锁，将返回 `SQLITE_LOCKED`。此时，你可以调用 `sqlite3_unlock_notify()` 来注册你的回调函数
    `xNotify`（第二个参数）以及该函数的任何所需参数（通过第三个参数 `pNotifyArg` 指针访问），针对你的被阻塞连接（第一个参数）。


    持有阻塞锁的连接将在完成其事务的 `sqlite3_step()` 或 `sqlite3_close()` 调用的一部分中触发 `xNotify` 回调。特别是在多线程应用程序中，也可能在你调用
    `sqlite3_unlock_notify()` 所花费的时间内，竞争事务已经完成。在这种情况下，你的回调函数将立即从 `sqlite3_unlock_notify()`
    内部启动。


    使用 `sqlite3_unlock_notify()` 有一些注意事项，包括：


    - 每个被阻塞连接只能注册一个解锁/通知回调（新的调用会替换任何现有的回调）。

    - `sqlite3_unlock_notify()` 不是可重入的，这意味着你*不应*在你的回调函数中包含其他 SQLite 函数调用。这很可能会导致你的应用程序崩溃。

    - 如果你计划与 `drop table` 或 `drop index` 命令一起使用，则必须特别小心。因为这些命令可能被 `select` 语句“阻塞”，所以没有真正的阻塞事务可以作为
    `pBlocked` 参数包含在内。有关使用扩展返回码来检测和处理此场景的详细信息，请参阅 SQLite 网站上的说明：[www.sqlite.org/c3ref/unlock_notify.html](http://www.sqlite.org/c3ref/unlock_notify.html)。


    ## 线程和内存管理


    由于共享缓存模式旨在节约内存，SQLite 提供了几个与线程和内存管理相关的函数。它们允许你指定一个建议的堆限制——一个软堆限制——以及手动启动内存清理。这些函数如下：


    ```c

    void sqlite3_soft_heap_limit(int N);

    int sqlite3_release_memory(int N);

    ```


    `sqlite3_soft_heap_limit()` 函数将调用线程当前的软堆限制设置为 `N`。'
- fmt: '**bytes. If the thread''s heap usage exceeds N, then SQLite automatically
    calls `sqlite3_release_memory()`, which attempts to free at least N bytes of memory
    from the caches of all database connections associated with the calling thread.
    The return value of `sqlite3_release_memory()` is the number of bytes actually
    freed.**


    These routines are no-ops unless you have enabled memory management by compiling
    SQLite with the `SQLITE_ENABLE_MEMORY_MANAGEMENT` preprocessor directive.


    ## Summary


    The core C API contains everything you need to process SQL commands and then some.
    It contains a variety of convenient query methods that are useful in different
    ways. These include `sqlite3_exec()` and `sqlite3_get_table()`, which allow you
    to execute commands in a single function call. The API includes many utility functions
    as well, allowing you to determine the number of affected records in a query,
    get the last inserted `ROWID` of an `INSERT` statement, trace SQL commands run
    on a connection, and conveniently format strings for SQL statements.


    The `sqlite3_prepare_v2()`, `sqlite3_step()`, and `sqlite3_finalize()` methods
    provide you with a lot of flexibility and control over statement execution through
    the use of statement handles. Statement handles provide more detailed row and
    column information, the convenience of bound parameters, and the ability to reuse
    prepared statements, avoiding the overhead of query compilation.


    SQLite provides a variety of ways to manage runtime events through the use of
    event filters. Its commit, rollback, and update hooks allow you to monitor and
    control specific changes in database state.


    You can watch changes to rows and columns as they happen and use an authorizer
    function to monitor and restrict what queries can do as they are compiled.


    And believe it or not, you''ve seen only half of the API! Actually, you''ve seen
    more like three-quarters, but you are likely to find that what is in the next
    chapter—user-defined functions, aggregates, and collations—is every bit as useful
    and interesting as what is in this one.


    # Chapter 7: The Extension C API


    This chapter is about teaching SQLite new tricks. The previous chapter dealt with
    generic database work; this chapter is about being creative. The Extension API
    offers several basic ways to extend or customize SQLite, through the creation
    of user-defined `functions`, `aggregates`, `collation sequences`, and virtual
    tables.


    At a lower level, many more options present themselves, including interchangeable
    VFSs, start-time changeable page cache, and malloc and mutex implementation. We''ll
    cover the first three options in this chapter: functions, aggregates, and collation
    sequences.


    User-defined functions are SQL functions that map to some implementation that
    you write. They are callable from within SQL. For example, you could create a
    function `hello_newman()` that returns the string `''Hello Jerry''` and, once
    it is registered, call it from SQL as follows:


    ```

    sqlite > select hello_newman() as reply;

    reply

    ------------------

    ''Hello Jerry''

    ```


    This is a special version of the SQLite command-line program we''ve customized
    that includes `hello_newman()`.


    Aggregates are a special form of function and work in much the same way except
    that they operate on sets of records and return aggregated values or expressions
    computed over a particular column in the set. Or they may be computed from multiple
    columns. Standard aggregates that are built into SQLite include `SUM()`, `COUNT()`,
    and `AVG()`, for example.


    Collations are methods of comparing and sorting text. That is, given two strings,
    a collation would decide which one is greater or whether the two are equal. The
    default collation in SQLite is `BINARY`—it compares strings byte by byte using
    `memcmp()`. Although this collation happens to work well for words in the English
    language (and other languages that use UTF-8 encoding), it doesn''t necessarily
    work so well for other languages that use different encodings. Thus, SQLite includes
    the ability to build your own user-defined collations to better handle those alternative
    languages.


    This chapter covers each of these three user-defined extension facilities and
    their associated API functions. As you will see, the user-defined extensions API
    can prove to be a powerful tool for creating nontrivial features that extend SQLite.


    All of the code in this chapter is included in examples that you can obtain online
    from the Apress [web site](http://www.apress.com). The examples for this particular
    chapter are located in the `ch7` subdirectory of the `examples` folder. We will
    specifically point out all the source files corresponding to the examples as they
    are introduced in the text. Some of the error-checking code in the figures has
    been taken out for the sake of clarity.


    Also, many examples in this chapter use simple convenience functions from a common
    library written to help simplify the examples. We will point out these functions
    and explain what they do as they are introduced in the text. The common code is
    located in the `common` subdirectory of the `examples` folder and must first be
    built before the examples are built. Please refer to the `README` file in the
    `examples` folder for details on building the common library.


    Finally, to clear up any confusion, the terms *storage class* and *data type*
    are interchangeable. You know that SQLite stores data internally using five different
    data types, or storage classes. These classes are `INTEGER`, `FLOAT`, `TEXT`,
    `BLOB`, and `NULL`, as described in Chapter 4. Throughout the chapter, we''ll
    use the term that best fits the context. You''ll generally see the term *data
    type*, because it''s most broadly applicable and easier for readers from different
    backgrounds to follow. When speaking about how SQLite handles a specific value
    internally, the term *storage class* seems to work better. In either case, you
    can equate either term as describing a specific form or representation of data.


    ## The API


    The basic method for implementing functions, aggregates, and collations consists
    of implementing a callback function and then registering it in your program. Once
    registered, your functions can be used from SQL. Functions and aggregates use
    the same registration function and similar callback functions.


    Collation sequences, while using a separate registration function, are almost
    identical and can be thought of as a particular class of user-defined function.'
