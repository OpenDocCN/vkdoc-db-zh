    ```\n\n```\nid type_id name\n----- ------- --------\n192 8 Banana\n133 7 Bosco\n\
    288 10 Hot Dog\n```\n\n如前所述，SQL 中被称为 `except` 的操作，在关系代数中被称为差运算。\n\n复合查询在你需要处理以不同方式具体化的类似数据集时非常有用。基本上，如果你无法在单个\
    \ `select` 语句中表达所有内容，你可以使用复合查询在一个 `select` 语句中获取部分你想要的内容，在另一个（或许更多）`select` 语句中获取其余部分，并相应地处理集合。\n\
    \n## 条件结果\n\n`case` 表达式允许你在 `select` 语句中处理各种条件。有两种形式。第一种也是最简单的形式接受一个静态值，并列出与各种情况值相对应的返回值：\n\
