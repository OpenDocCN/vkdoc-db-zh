- fmt: '# SQLite 参数绑定核心概念


    ## 位置参数

    这种方法使用*位置参数*，其中每个参数由问号（`?`）字符指定，并稍后通过其在 SQL 语句中的索引或相对位置来识别。


    ## 参数绑定过程

    在深入研究其他参数方法之前，首先理解参数定义、绑定和评估的过程是有帮助的。当你编写如下参数化语句时，其中的参数在 `sqlite3_prepare()` 编译查询时被识别：

    `insert into episodes (id,name) values (?,?)`


    `sqlite3_prepare()` 识别出 SQL 语句中存在参数。在内部，它为每个参数分配一个唯一的数字。对于位置参数，它从第一个找到的参数开始分配为
    1，并为后续参数使用连续的整数值。它将此信息存储在生成的语句句柄（`sqlite3_stmt` 结构）中，该句柄随后将期望在执行前有特定数量的值绑定到给定的参数。如果你没有为参数绑定值，`sqlite3_step()`
    在语句执行时将默认使用 `NULL` 作为其值。


    准备好语句后，你需要将值绑定到它。你使用 `sqlite3_bind_*xxx*()` 函数来完成此操作，其通用形式如下：


    ```c

    sqlite3_bind_xxx( sqlite3_stmt*, /* statement handle */

    int i, /* parameter number */

    xxx value /* value to be bound */

    );

    ```


    函数名中的 `*xxx*` 表示要绑定的值的数据类型。例如，要将一个 `double` 值绑定到参数，你会使用 `sqlite3_bind_double()`，其声明如下：

    `sqlite3_bind_double(sqlite3_stmt* stmt, int i, double value);`


    常见的绑定函数如下：


    ```c

    int sqlite3_bind_int(sqlite3_stmt*, int, int);

    int sqlite3_bind_double(sqlite3_stmt*, int, double);

    int sqlite3_bind_int64(sqlite3_stmt*, int, long long int);

    int sqlite3_bind_null(sqlite3_stmt*, int);

    int sqlite3_bind_blob(sqlite3_stmt*, int, const void*, int n, void(*)(void*));

    int sqlite3_bind_zeroblob(sqlite3_stmt*, int, int n);

    int sqlite3_bind_text(sqlite3_stmt*, int, const char*, int n, void(*)(void*));

    int sqlite3_bind_text16(sqlite3_stmt*, int, const void*, int n, void(*)(void*));

    ```


    通常，绑定函数可以分为两类，一类用于标量值（`int`、`double`、`int64` 和 `NULL`），另一类用于数组（`blob`、`text` 和
    `text16`）。它们的不同仅在于数组绑定函数需要一个长度参数和一个指向清理函数的指针。此外，`sqlite3_bind_text()` 会像 `sqlite3_mprintf()`
    一样自动转义引号字符。使用 `BLOB` 变体的数组绑定函数声明如下：


    ```c

    int sqlite3_bind_blob( sqlite3_stmt*, /* statement handle */

    int, /* ordinal */

    const void*, /* pointer to blob data */

    int n, /* length (bytes) of data */

    void(*)(void*)); /* cleanup hander */

    ```


    API 提供了两个具有特殊含义的预定义清理处理程序值，定义如下：


    ```c

    #define SQLITE_STATIC ((void(*)(void *))0)

    #define SQLITE_TRANSIENT ((void(*)(void *))-1)

    ```


    每个值指定了特定的清理操作。`SQLITE_STATIC` 告知数组绑定函数数组内存驻留在非托管空间中，因此 SQLite 不会尝试清理它。`SQLITE_TRANSIENT`
    告知绑定函数数组内存可能会改变，因此 SQLite 会制作数据的私有副本，该副本在语句结束时自动清理。第三种选择是提供指向你自己清理函数的指针，该函数必须符合以下形式：

    `void cleanup_fn(void*)`

    如果提供，当语句结束时，SQLite 将调用你的清理函数，并传入数组内存。'
  raw: 'This particular method of binding uses *positional parameters* (as described
    in Chapter 5) where each parameter is designated by a question mark (?) character
    and later identified by its index or relative position in the SQL statement.


    Before delving into the other parameter methods, it is helpful to first understand
    the process by which parameters are defined, bound, and evaluated. When you write
    a parameterized statement such as the following, the parameters within it are
    identified when **sqlite3_prepare()** compiles the query: **insert into episodes
    (id,name) values (?,?)**


    **sqlite3_prepare()** recognizes that there are parameters in a SQL statement.
    Internally, it assigns each parameter a number to uniquely identify it. In the
    case of positional parameters, it starts with 1 for the first parameter found
    and uses sequential integer values for subsequent parameters. It stores this information
    in the resulting statement handle (**sqlite3_stmt** structure), which will then
    expect a specific number of values to be bound to the given parameters before
    execution. If you do not bind a value to a parameter, **sqlite3_step()** will
    use **NULL** for its value by default when the statement is executed.


    After you prepare the statement, you then bind values to it. You do this using
    the


    **sqlite3_bind_ *xxx*()** functions, which have the following general form:


    **sqlite3_bind_xxx( sqlite3_stmt*, /* statement handle */**


    **int i, /* parameter number */**


    **xxx value /* value to be bound */**


    **);**


    The ***xxx*** in the function name represents the data type of the value to bind.
    For example, to bind a **double** value to a parameter, you would use **sqlite3_bind_double()**,
    which is declared as follows: **sqlite3_bind_double(sqlite3_stmt* stmt, int i,
    double value);**


    The common bind functions are as follows:


    **int sqlite3_bind_int(sqlite3_stmt*, int, int);**


    **int sqlite3_bind_double(sqlite3_stmt*, int, double);**


    **int sqlite3_bind_int64(sqlite3_stmt*, int, long long int);**


    **int sqlite3_bind_null(sqlite3_stmt*, int);**


    **int sqlite3_bind_blob(sqlite3_stmt*, int, const void*, int n, void(*)(void*));**


    **int sqlite3_bind_zeroblob(sqlite3_stmt*, int, int n);**


    **int sqlite3_bind_text(sqlite3_stmt*, int, const char*, int n, void(*)(void*));**


    **int sqlite3_bind_text16(sqlite3_stmt*, int, const void*, int n, void(*)(void*));**


    CHAPTER 6 ■ THE CORE C API


    In general, the bind functions can be divided into two classes, one for scalar
    values (**int**, **double**, **int64**, and **NULL**) and the other for arrays
    (**blob**, **text**, and **text16**). They differ only in that the array bind
    functions require a length argument and a pointer to a cleanup function. Also,
    **sqlite3_bind_text()** automatically escapes quote characters like **sqlite3_mprintf()**.
    Using the **BLOB** variant, the array bind function has the following declaration:


    **int sqlite3_bind_blob( sqlite3_stmt*, /* statement handle */**


    **int, /* ordinal */**


    **const void*, /* pointer to blob data */**


    **int n, /* length (bytes) of data */**


    **void(*)(void*)); /* cleanup hander */**


    **There are two predefined values for the cleanup handler provided by the API
    that have special meanings, defined as follows:**


    ****#define SQLITE_STATIC ((void(*)(void *))0)**


    **#define SQLITE_TRANSIENT ((void(*)(void *))-1)**


    **Each value designates a specific cleanup action. **SQLITE_STATIC** tells the
    array bind function that the array memory resides in unmanaged space, so SQLite
    does not attempt to clean it up. **SQLITE_TRANSIENT**


    tells the bind function that the array memory is subject to change, so SQLite
    makes its own private copy of the data, which it automatically cleans up when
    the statement is finalized. The third option is to provide a pointer to your own
    cleanup function, which must be of the following form:


    **void cleanup_fn(void*)**


    **If provided, SQLite will call your cleanup function, passing in the array memory
    when the statement is finalized.**'
