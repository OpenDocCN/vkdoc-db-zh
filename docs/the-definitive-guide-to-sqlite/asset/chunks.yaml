    0    main     /tmp/foods.db

    2    db2      /tmp/db


    sqlite> create index foods_name_type_idx on foods(name,type_id);

    sqlite> pragma index_info(foods_name_type_idx);

    seqn  cid  name

    ----  ---  --------------------

    0     2    name

    1     1    type_id


    sqlite> pragma index_list foods);

    seq  name                  unique

    -----  -------------------  ---------------

    0    foods_name_type_idx  0


    sqlite> pragma table_info(foods);

    cid  name          type    notn  dflt  pk

    ---  ------------  ------  ----  ----  ----------

    0    id            integer  0     1

    1    type_id       integer  0     0

    2    name          text     0     0

    ```


    ## Synchronous Writes


    Normally, SQLite commits all changes to disk at critical moments to ensure transaction
    durability. This is similar to the checkpoint functionality in other databases.
    However, it is possible to turn this off for performance gains. You do this with
    the `synchronous` pragma. There are three settings: `full`, `normal`, and `off`.
    They are defined as follows:


    - `Full`: SQLite will pause at critical moments to make sure that data has actually
    been written to the disk surface before continuing. This ensures that if the operating
    system crashes or if there is a power failure, the database will be uncorrupted
    after rebooting. `Full` synchronous is very safe, but it is also slow.

    - `Normal`: SQLite will still pause at the most critical moments but less often
    than in `full` mode. There is a very small (though nonzero) chance that a power
    failure at just the wrong time could corrupt the database in `normal` mode. But
    in practice, you are more likely to suffer a catastrophic disk failure or some
    other unrecoverable hardware fault.

    - `Off`: SQLite continues operation without pausing as soon as it has handed data
    off to the operating system. This can speed up some operations as much as 50 or
    more times. If the application running SQLite crashes, the data will be safe.
    However, if the operating system crashes or the computer loses power, the database
    may be corrupted.


    There is no persistent form of the `synchronous` pragma. Chapter 5 explains this
    setting’s crucial role in transaction durability and how it works.


    ## Temporary Storage


    Temporary storage is where SQLite keeps transient data such as temporary tables,
    indexes, and other objects. By default, SQLite uses a compiled-in location, which
    varies between platforms. There are two pragmas that govern temporary storage:
    `temp_store` and `temp_store_directory`. The first pragma determines whether SQLite
    uses memory or disk for temporary storage. There are actually three possible values:
    `default`, `file`, or `memory`. `default` uses the compiled-in default, `file`
    uses an operating system file, and `memory` uses `RAM`. If `file` is set as the
    storage medium, then the second pragma, `temp_store_directory`, can be used to
    set the directory in which the temporary storage file is placed.'
