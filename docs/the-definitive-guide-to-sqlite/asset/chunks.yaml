- fmt: "## CHAPTER 3 ■ SQL FOR SQLITE\n\n### Grouping\n\nAn essential part of aggregation\
    \ is grouping. That is, in addition to computing aggregates over an entire result,\
    \ you can also split that result into groups of rows with like values and compute\
    \ aggregates on each group—all in one step. This is the job of the `group by`\
    \ clause. Here’s an example:\n\n```sql\nsqlite> select type_id from foods group\
    \ by type_id;\n\ntype_id\n----------\n1\n2\n3\n.\n.\n.\n15\n```\n\n`group by`\
    \ is a bit different from the other parts of `select`, so you need to use your\
    \ imagination a little to wrap your head around it. Figure 3-7 illustrates the\
    \ process. Operationally, `group by` sits in between the `where` clause and the\
    \ `select` clause. `group by` takes the output of `where` and splits it into groups\
    \ of rows that share a common value (or values) for a specific column (or columns).\
    \ These groups are then passed to the `select` clause. In the example, there are\
    \ 15 different food types (`type_id` ranges from 1 to 15), and therefore `group\
    \ by` organizes all rows in foods into 15 groups varying by `type_id`. `select`\
    \ takes each group, extracts its common `type_id` value, and puts it into a separate\
    \ row. Thus, there are 15 rows in the result, one for each group.\n\n*Figure 3-7.\
    \ `group by` process*\n\nWhen `group by` is used, the `select` clause applies\
    \ aggregates to each group separately, rather than the entire result as a whole.\
    \ Since aggregates produce a single value from a group of values, they collapse\
    \ these groups of rows into single rows. For example, consider applying the `count`\
    \ aggregate to the preceding example to get the number of records in each `type_id`\
    \ group:\n\n```sql\nsqlite> select type_id, count(*) from foods group by type_id;\n\
    \ntype_id count(*)\n---------- ----------\n1 47\n2 15\n3 23\n4 22\n5 17\n6 4\n\
    7 60\n8 23\n9 61\n10 36\n11 16\n12 23\n13 14\n14 19\n15 32\n```\n\nHere, `count()`\
    \ was applied 15 times—once for each group, as illustrated in Figure 3-8. Note\
    \ that in the diagram, the actual number of records in each group is not represented\
    \ literally (that is, it doesn’t show 47 records in the group for `type_id`=1).\n\
    \n*Figure 3-8. `group by` and aggregation*\n\nThe number of records with `type_id=1`\
    \ (Baked Goods) is 47. The number with `type_id=2` (Cereal) is 15. The number\
    \ with `type_id=3` (Chicken/Fowl) is 23, and so forth. So, to get this information,\
    \ you could run 15 queries as follows:\n\n```sql\nselect count(*) from foods where\
    \ type_id=1;\nselect count(*) from foods where type_id=2;\nselect count(*) from\
    \ foods where type_id=3;\n.\n.\n.\nselect count(*) from foods where type_id=15;\n\
    ```\n\nOr, you get the results using the single `select` with a `group by` as\
    \ follows:\n\n```sql\nselect type_id, count(*) from foods group by type_id;\n\
    ```\n\nBut there is more. Since `group by` has to do all this work to create groups\
    \ with like values, it seems a pity not to let you filter these groups before\
    \ handing them off to the `select` clause. That is the purpose of `having`, a\
    \ predicate that you apply to the result of `group by`. It filters the groups\
    \ from `group by` in the same way that the `where` clause filters rows from the\
    \ `from` clause. The only difference is that the `where` clause’s predicate is\
    \ expressed in terms of individual row values, and `having`’s predicate is expressed\
    \ in terms of aggregate values.\n\nTake the previous example, but this time say\
    \ you are interested only in looking at the food groups that have fewer than 20\
    \ foods in them:\n\n```sql\nsqlite> select type_id, count(*) from foods\n   ...>\
    \ group by type_id having count(*) < 20;\n\ntype_id count(*)\n---------- ----------\n\
    2 15\n5 17\n6 4\n11 16\n13 14\n14 19\n```"
