    \ concatenation operator (`||`), making a complete sentence. For all `type_id`s\
    \ not specified in a `when` condition, `case` returns `null`. The `select` statement\
    \ filters out such `null` values in the `where` clause, so all that is returned\
    \ are rows that the `case` expression does handle.\n\nThe second form of `case`\
    \ allows for expressions in the `when` condition. It has the following form:\n\
