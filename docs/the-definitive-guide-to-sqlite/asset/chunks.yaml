- fmt: "The second option entails using `sqlite3_busy_handler()`. This function provides\
    \ a way to call a user-defined function rather than blocking or returning `SQLITE_BUSY`\
    \ right away. It’s declared as follows:\n\n```c\nint sqlite3_busy_handler(sqlite3*,\
    \ int(*)(void*,int), void*);\n```\n\nThe second argument is a pointer to a function\
    \ to be called as the busy handler, and the third argument is a pointer to application-specific\
    \ data to be passed as the first argument to the handler. The second argument\
    \ to the busy handler is the number of prior calls made to the handler for the\
    \ same lock.\n\nSuch a handler might call `sleep()` for a period to wait out the\
    \ lock, or it may send some kind of notification. It may do whatever you like,\
    \ because it is yours to implement. Be warned, though, that registering a busy\
    \ handler does not guarantee that it will always be called. As mentioned in Chapter\
    \ 5, SQLite will forego calling a busy handler for a connection if it perceives\
    \ a deadlock might result.\n\nSpecifically, if your connection in `SHARED` is\
    \ interfering with another connection in `RESERVED`, SQLite will not invoke your\
    \ busy handler, hoping you will take the hint. In this case, you are trying to\
    \ write to the database from `SHARED` (starting the transaction with `BEGIN`)\
    \ when you really should be starting from `RESERVED` (starting the transaction\
    \ with `BEGIN IMMEDIATE`).\n\nThe only restriction on busy handlers is that they\
    \ may not close the database. Closing the database from within a busy handler\
    \ can delete critical data structures out from under the executing query and result\
    \ in crashing your program.\n\n**Advice**\n\nAll things considered, the best route\
    \ may be to set the timeout to a reasonable value and then take some precautions\
    \ if and when you receive a `SQLITE_BUSY` value. In general, if you are going\
    \ to write to the database, start in `RESERVED`. If you don’t do this, then the\
    \ next best thing is to install a busy handler, set the timeout to a known value,\
    \ and if SQLite returns `SQLITE_BUSY`, check the response time. If the time is\
    \ less than the busy handler’s delay, then SQLite is telling you that your query\
    \ (and connection) is preventing a writer from proceeding. If you want to write\
    \ to the database at this point, you should finalize or reset and then reexecute\
    \ the statement, this time starting with `BEGIN IMMEDIATE`.\n\n### Handling Schema\
    \ Changes\n\nWhenever a connection changes the database schema, all other prepared\
    \ statements that were compiled before the change are invalidated. The result\
    \ is that the first call to `sqlite3_step()` for such statements will attempt\
    \ to recompile the relevant SQL and proceed normally from there if possible. If\
    \ recompilation is impossible (for example, if an object has been dropped entirely),\
    \ the `sqlite3_step()` returns `SQLITE_SCHEMA`. From a locking standpoint, the\
    \ schema change occurs between the time a reader calls `sqlite3_prepare()` to\
    \ compile a statement and calling `sqlite3_step()` to execute it.\n\nWhen this\
    \ happens, the only course of action for you is to handle the change in circumstances\
    \ and start over. Several events can cause `SQLITE_SCHEMA` errors:\n\n- Detaching\
    \ databases\n- Modifying or installing user-defined functions or aggregates\n\
    - Modifying or installing user-defined collations\n- Modifying or installing authorization\
    \ functions\n- Vacuuming the database\n\nThe reason the `SQLITE_SCHEMA` condition\
    \ exists ultimately relates to the VDBE. When a connection changes the schema,\
    \ other compiled queries may have VDBE code that points to database objects that\
    \ no longer exist or are in a different location in the database. Rather than\
    \ running the risk of a bizarre runtime error later, SQLite invalidates all statements\
    \ that have been compiled but not executed. They must be recompiled.\n\n### Tracing\
    \ SQL\n\nIf you are having a hard time figuring out exactly what your program\
    \ is doing with the database, you can track what SQL statements it has executed\
    \ using `sqlite3_trace()`. Its declaration is as follows:\n\n```c\nvoid *sqlite3_trace(sqlite3*,\
    \ void(*xTrace)(void*,const char*), void*);\n```\n\nThis function is analogous\
    \ to putting a wiretap on a connection. You can use it to generate a log file\
    \ of all SQL executed on a given connection as well provide helpful debugging\
    \ information. Every SQL statement that is processed is passed to the callback\
    \ function specified in the second argument. SQLite passes the data provided in\
    \ the third argument of `sqlite3_trace()` to the first argument of the callback\
    \ function.\n\n### Operational Control\n\nThe API provides several functions you\
    \ can use to monitor and/or manage SQL commands at compile time and runtime. These\
    \ functions allow you to install callback functions with which to monitor and\
    \ control various database events as they happen.\n\n#### Commit Hooks\n\nThe\
    \ `sqlite3_commit_hook()` function allows you to monitor when transactions commit\
    \ on a given connection. It is declared as follows:\n\n```c\nvoid *sqlite3_commit_hook(\n\
    \  sqlite3 *cnx,           /* database handle */\n  int(*xCallback)(void *data),\
    \ /* callback function */\n  void *data              /* application data */\n\
    );\n```\n\nThis function registers the callback function `xCallback`, which will\
    \ be invoked whenever a transaction commits on the connection given by `cnx`.\
    \ The third argument (`data`) is a pointer to application-specific data, which\
    \ SQLite passes to the callback function. If the callback function returns a nonzero\
    \ value, then the commit is converted into a rollback.\n\nPassing a `NULL` value\
    \ in for the callback function effectively disables the currently registered callback\
    \ (if any). Also, only one callback can be registered at a time for a given connection.\
    \ The return value for `sqlite3_commit_hook()` is `NULL` unless another callback\
    \ function was previously registered, in which case the previous `data` value\
    \ is returned.\n\n#### Rollback Hooks\n\nRollback hooks are similar to commit\
    \ hooks except that they watch for rollbacks for a given connection. Rollback\
    \ hooks are registered with the following function:\n\n```c\nvoid *sqlite3_rollback_hook(\n\
    \  sqlite3 *cnx,\n  void(*xCallback)(void *data),\n  void *data\n);\n```\n\nThis\
    \ function registers the callback function `xCallback`, which will be invoked\
    \ in the event of a rollback on `cnx`, whether by an explicit `ROLLBACK` command\
    \ or by an implicit error or constraint violation.\n\nThe callback is not invoked\
    \ if a transaction is automatically rolled back because of the database connection\
    \ being closed. The third argument (`data`) is a pointer to application-specific\
    \ data, which SQLite passes to the callback function.\n\nAs in `sqlite3_commit_hook()`,\
    \ each time you call `sqlite3_rollback_hook()`, the new callback function you\
    \ provide will replace any currently registered callback function. If a callback\
    \ function was previously registered, `sqlite3_rollback_hook()` returns the previous\
    \ `data` argument.\n\n#### Update Hooks\n\nThe `sqlite3_update_hook()` is used\
    \ to monitor all `update`, `insert`, and `delete` operations on rows for a given\
    \ database connection. It has the following form:\n\n```c\nvoid *sqlite3_update_hook(\n\
    \  sqlite3 *cnx,\n  void(*)(void *, int, char const*, char const*, sqlite_int64),\n\
    \  void *data\n);\n```\n\nThe first argument of the callback function is a pointer\
    \ to application-specific data, which you provide in the third argument. The callback\
    \ function has the following form:\n\n```c\nvoid callback (\n  void * data,\n\
    \  int operation_code,\n  char const *db_name,\n  char const *table_name,\n  sqlite_int64\
    \ rowid\n)\n```"
