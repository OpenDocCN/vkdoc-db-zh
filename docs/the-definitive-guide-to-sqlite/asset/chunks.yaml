- fmt: 'In this case, SQLite will call the cleanup function after the user-defined
    function completes. This is the method used in the previous example. We used `sqlite3_mprintf()`
    to generate Newman’s reply, which allocated a string on the heap. We then passed
    in `sqlite3_free()` as the cleanup function to `sqlite3_result_text()`, which
    could free the string memory when the extension function completed.


    ### Error Conditions


    Sometimes functions encounter errors, in which case the return value should be
    set appropriately. This is what `sqlite3_result_error()` is for. It is declared
    as follows:


    ```c

    void sqlite3_result_error(

    sqlite3_context *ctx, /* the function context */

    const char *msg, /* the error message */

    int len); /* length of the error message */

    ```


    This tells SQLite that there was an error, the details of which are contained
    in `msg`. SQLite will abort the command that called the function and set the error
    message to the value contained in `msg`.


    ### Returning Input Values


    Sometimes, you may want to pass back an argument as the return value in the same
    form. Rather than you having to determine the argument’s type, extract its value
    with the corresponding `sqlite3_column_*xxx*()` function, and then turn right
    around and set the return value with the appropriate `sqlite3_result_*xxx*()`
    function, the API offers `sqlite3_result_value()` so you can do all of this in
    one fell swoop. It is declared as follows:


    ```c

    void sqlite3_result_value(

    sqlite3_context *ctx, /* the function context */

    sqlite3_value* value); /* the argument value */

    ```


    For example, say you wanted to create a function `echo()` that spits back its
    first argument. The implementation is as follows:


    ```c

    void echo(sqlite3_context* ctx, int nargs, sqlite3_value** values)

    {

    sqlite3_result_value(ctx, values[0]);

    }

    ```


    CHAPTER 7 ■ THE EXTENSION C API


    It would work from SQL as follows:


    ```

    sqlite > select echo(''Hello Jerry'') as reply;

    reply

    ------------------

    Hello Jerry

    ```


    Even better, `echo()` works equally well with arguments of any storage class and
    returns them accordingly:


    ```

    sqlite> select echo(3.14) as reply, typeof(echo(3.14)) as type;

    reply      type

    ---------- ----------

    3.14       real


    sqlite> select echo(X''0128'') as reply, typeof(echo(X''0128'')) as type;

    reply      type

    ---------- ----------

    (?         blob


    sqlite> select echo(NULL) as reply, typeof(echo(NULL)) as type;

    reply      type

    ---------- ----------

    null

    ```


    ## Aggregates


    Aggregates are only slightly more involved than functions. Whereas you had to
    implement only one callback function to do the work in user-defined functions,
    you have to implement both a step function to compute the ongoing value as well
    as a finalizing function to finish everything off and clean up. Figure 7-1 shows
    the general process. It still isn’t hard, though. Like functions, one good example
    will be all you need to get the gist of it.


    ![](index-227_1.png)


    CHAPTER 7 ■ THE EXTENSION C API


    *Figure 7-1. Query processing with aggregates*


    ### Registration Function


    As mentioned before, aggregates and functions use the same registration function,
    `sqlite3_create_function()`, which is listed here again for convenience:


    ```c

    int sqlite3_create_function(

    sqlite3 cnx*, /* connection handle */

    const char *zFunctionName, /* function/aggregate name in SQL */

    int nArg, /* number of arguments. -1 = unlimited. */

    int eTextRep, /* encoding (UTF8, 16, etc.) */

    void *pUserData, /* application data, passed to callback */

    void (*xFunc)(sqlite3_context*,int,sqlite3_value**),

    void (*xStep)(sqlite3_context*,int,sqlite3_value**),

    void (*xFinal)(sqlite3_context*)

    );

    ```


    CHAPTER 7 ■ THE EXTENSION C API


    You do exactly the same thing here as you do with functions, but rather than proving
    a callback for `xFunc`, you leave it `NULL` and provide functions for `xStep`
    and `xFinal`.


    ### A Practical Example


    The best way to illustrate implementing aggregates is by example. Here we will
    implement the aggregate `str_agg()`. The idea of `str_agg()` is to act much like
    the `strcat()` C function, where two strings are concatenated together (the eagle-eyed
    will spot that newer versions of SQLite include a function with a similar purpose,
    `group_concat()`). But for our purposes, we want to aggregate any number of strings
    involved in grouping and aggregations at the behest of your SQL in SQLite. You
    might well wonder whether you really need such a string contatenation aggregation
    feature in SQLite, given you could write your own in C. One advantage of the `str_agg()`
    approach is to enable semantically clear and easily understood SQL to be written,
    rather than having to shuffle back and forth between SQL and C to achieve the
    string aggregation. The other benefit of this example is, of course, to show you
    *how* to aggregate. Listing 7-2 shows our example `str_agg()` function (taken
    from `str_agg.c`).


    *Listing 7-2. The `str_agg()` Test Program*


    ```c

    int main(int argc, char **argv)

    {

    int rc; sqlite3 *db; char *sql;

    sqlite3_open_v2("foods.db", &db);

    /* Register aggregate. */

    fprintf(stdout, "Registering aggregate str_agg()\n");

    /* Turn SQL tracing on. */

    log_sql(db, 1);

    /* Register aggregate. */

    sqlite3_create_function( db, "str_agg", 1, SQLITE_UTF8, db,

    NULL, str_agg_step, str_agg_finalize);

    /* Test. */

    fprintf(stdout, "\nRunning query: \n");

    sql = "select season, str_agg(name, '', '') from episodes group by season";

    print_sql_result(db, sql);

    sqlite3_close(db);

    return 0;

    }

    ```


    Note that our step function is called `str_agg_step()`, and our finalizing function
    is called `str_agg_finalize()`. Also, this aggregate is registered as taking only
    one argument.


    CHAPTER 7 ■ THE EXTENSION C API


    ### The Step Function


    Listing 7-3 shows the `str_agg_step()` function.


    *Listing 7-3. The `str_agg()` Step Function*


    ```c

    void str_agg_step(sqlite3_context* ctx, int ncols, sqlite3_value** values)

    {

    SAggCtx *p = (SAggCtx *) sqlite3_aggregate_context(ctx, sizeof(*p));

    static const char delim [] = ", ";

    char *txt = sqlite3_value_text(values[0]);

    int len = strlen(txt);

    if (!p->result) {

    p->result = sqlite_malloc(len + 1);

    memcpy(p->result, txt, len + 1);

    p->chrCnt = len;

    }

    else

    {

    const int delimLen = sizeof(delim);

    p->result = sqlite_realloc(p->result, p->chrCnt + len + delimLen + 1);

    memcpy(p->result + p->chrCnt, delim, delimLen);

    p->chrCnt += delimLen;

    memcpy(p->result + p->chrCnt, txt, len + 1);

    p->chrCnt += len;

    }

    }

    ```


    The value `SAggCtx` is a struct that is specific to this example and is defined
    as follows:


    ```c

    typedef struct SAggCtx SAggCtx;

    struct SAggCtx {

    int chrCnt;

    char *result;

    };

    ```


    Our structure serves as our state between aggregate iterations (calls to the step
    function), maintaining the growing concatenation of text, and the character count.


    ### The Aggregate Context


    The first order of business is to retrieve the structure for the given aggregate
    instance. This is done using `sqlite3_aggregate_context()`. As mentioned earlier,
    the first call to this function allocates the data for the given context and subsequent
    calls retrieve it. The structure memory is automatically freed when the aggregate
    completes (after `str_agg_finalize()` is called). Note that `sqlite3_aggregate_context()`
    might return `NULL` if the system is low on memory. Such error checking is omitted
    in this example, for brevity, 207


