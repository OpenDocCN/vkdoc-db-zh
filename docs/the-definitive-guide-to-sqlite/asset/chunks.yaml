    code, bound parameters, B-tree cursors, execution context, and any other data
    **sqlite3_step()** needs to manage the state of the query during execution.


    **sqlite3_prepare_v2()** does not affect the connection or database in any way.
    It does not start a transaction or get a lock. It works directly with the compiler,
    which simply prepares the query for execution. Statement handles are highly dependent
    on the database schema with which they were


