    Exporting Data


    You can export database objects to SQL format using the **.dump** command. Without
    any arguments,


    **.dump** will export the entire database as a series of DDL and data manipulation
    language (DML) commands, suitable for re-creating the database objects and the
    data contained therein. If you provide arguments, the shell interprets them as
    table names or views. Any tables or views matching the given arguments will be
