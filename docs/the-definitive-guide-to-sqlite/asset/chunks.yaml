    Application Settings, set the application type to Console Application, and be
    sure to check the Empty Project box. Click Finish to create a blank executable
    project.


    3. Next you want to add the SQLite CLP source file. Select Project  Add Existing
    Item. In the dialog box that appears, add the source file `shell.c`.


    4. Tell Visual C++ to link against the SQLite DLL. Select Project  Properties.
    In the dialog box that appears, select All Configurations in the Configuration
    drop-down box. Next select the Linker folder. Select the Input submenu, and within
    the Additional Dependencies property page, add `sqlite3.lib`. You are now ready
    to build the program. Note that the SQLite DLL needs to be either in the same
    directory as the command-line program or in the Windows system path.


    ■ `Note` If you build the SQLite DLL with threading enabled or you obtain the
    DLL from the SQLite website, you need to use the multithreaded Microsoft C runtime
    library DLL when building the CLP. To do this, refer to the second half of step
    4 in “Building the SQLite DLL with Microsoft Visual C++.” It contains two informative
    figures that make it easy to set this option.


    ## Building SQLite with MinGW


    MinGW ([`www.mingw.org`](http://www.mingw.org)) is a fork of the Cygwin project,
    and it provides a nice distribution of the GNU Compiler Collection (GCC) for Windows.
    It also includes freely available Windows-specific header files and libraries
    that you can use to create native Windows programs that do not rely on any third-party
    C runtime DLLs. Put simply, it is a free C/C++ compiler for Windows, and it’s
    a very good one at that. It is usually used in conjunction with MSYS, which offers
    a bash-like shell and POSIX environment that makes Unix users feel at home on
    Windows. Together, the two provide a powerful environment with which to compile
    and build software on Windows. The two are popular but also can be difficult to
    stick together by hand. Thankfully, several very good bundles exist to take all
    the hard work out of deploying them, allowing you to get on with the fun of compiling
    your own SQLite from source. We recommend the TakeOffGW package, freely available
    from SourceForge.


    To build the SQLite DLL from source with the TakeOffGW distribution of MinGW and
    MSYS, do the following:


    1. Open your favorite browser, and navigate to the SourceForge website: `sourceforge.net`.


    2. Search for the TakeOffGW project, or navigate straight to the project page
    at `sourceforge.net/projects/takeoffgw/`.


    3. Download the latest release of the TakeOffGW network installer, usually just
    called `setup.exe`.


    ![](index-51_1.png)


    CHAPTER 2 ■ GETTING STARTED


    4. After downloading the TakeOffGW network installer, run the `setup.exe` file,
    and choose the defaults for installation location, package directory, and links
    to the Internet (remembering any proxy server you may use). When you get to the
    package selection page, shown in Figure 2-7, be sure to select all the packages
    available under the MSYS heading. Do this by toggling the MSYS heading itself
    until the phrase “install” appears.


    *Figure 2-7. TakeOffGW installation components, with MSYS selected for install*


    5. Click Next to continue, and TakeOffGW will download and install all the components
    required.


    CHAPTER 2 ■ GETTING STARTED


    6. Download the Linux/Unix SQLite source code distribution. Navigate to [`www.sqlite.org`](http://www.sqlite.org),
    and click the download link. On the download page, find the Source Code section.
    The file you are looking for is the source distribution in tarballs form, which
    should have a name of the form `sqlite-amalgamation-3.x.y.z.tar.gz`, where `x`,
    `y`, and `z` (and possibly further numbers) are the minor-version numbers (at
    the time of this writing, the current filename is `sqlite-amalgamation-3.6.23.1.tar.gz`).
    Download the tarball, and place it in a temporary directory (e.g., `C:\Temp`).


    7.'
