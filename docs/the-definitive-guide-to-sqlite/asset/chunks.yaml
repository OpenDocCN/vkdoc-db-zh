    # C H A P T E R 1


    ■ ■ ■


    ## Introducing SQLite


    SQLite is an open source, embedded relational database. Originally released in
    2000, it is designed to provide a convenient way for applications to manage data
    without the overhead that often comes with dedicated relational database management
    systems. SQLite has a well-deserved reputation for being highly portable, easy
    to use, compact, efficient, and reliable.


    ### An Embedded Database


    SQLite is an *embedded* database. Rather than running independently as a stand-alone
    process, it symbiotically coexists inside the application it serves—within its
    process space. Its code is intertwined, or *embedded*, as part of the program
    that hosts it. To an outside observer, it would never be apparent that such a
    program had a relational database management system (`RDBMS`) on board. The program
    would just do its job and manage its data somehow, making no fanfare about how
    it went about doing so. But inside, there is a complete, self-contained database
    engine at work.


    One advantage of having a database server inside your program is that no network
    configuration or administration is required. Take a moment to think about how
    liberating that is: no firewalls or address resolution to worry about, and no
    time wasted on managing intricate permissions and privileges. Both client and
    server run together in the same process. This reduces overhead related to network
    calls, simplifies database administration, and makes it easier to deploy your
    application. Everything you need is compiled right into your program.


    Consider the processes found in Figure 1-1. One is a Perl script, another is a
    standard `C/C++` program, and the last is an Apache-hosted `PHP` script, all using
    SQLite. The Perl script imports the `DBI::SQLite` module, which in turn is linked
    to the `SQLite C API`, pulling in the `SQLite` library. The `PHP` library works
    similarly, as does the `C++` program. Ultimately, all three processes interface
    with the `SQLite C API`. All three therefore have SQLite embedded in their process
    spaces. By doing so, not only does each of those processes run their own respective
    code, but they’ve also become independent database servers in and of themselves.
    Furthermore, even though each process represents an independent server, they can
    still operate on the same database file(s), benefitting from SQLite’s use of the
    `Operating System` to manage synchronization and locking.


    Today there is a wide variety of relational database products on the market specifically
    designed for embedded use—products such as Sybase SQL Anywhere, Oracle TimesTen
    and BerkleyDB, Pervasive PSQL, and Microsoft’s `Jet Engine`. Some of the dominant
    commercial vendors have pared down their large-scale databases to create embedded
    variants. Examples of these include IBM’s `DB2 Everyplace`, Oracle’s `Database
    Lite`, and Microsoft’s `SQL Server Express`. The open source databases `MySQL`
    and `Firebird` both offer embedded versions as well. Of all these products, only
    one is open source, unencumbered by licensing fees, and designed exclusively for
    use as an embedded database: SQLite.


