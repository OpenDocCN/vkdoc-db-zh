    *图 11-5. 溢出页*


    图中的第四个有效载荷太大，无法放入页面。因此，B 树模块创建了一个溢出页来容纳。结果发现一个页面不够用，于是它链接了第二个页面。这本质上是处理二进制大对象的方式。当你使用非常大的
