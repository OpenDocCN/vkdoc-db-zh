    一个会话在必须获取**排他锁**之前，可以缓存多少修改。这不仅允许会话在等待前完成更多工作，还减少了需要持有**排他锁**的时间，因为所有工作都是预先完成的。在这种情况下，**排他锁**只需要持有足够长的时间，以便将缓存中的修改刷新到磁盘。调整缓存大小的一些技巧在第
    5 章中有所介绍。


    ## 获取数据库信息


    你可以使用数据库模式伪指令（pragmas）来获取数据库信息，这些伪指令定义如下：


    -   `database_list`：列出所有已附加数据库的信息。

    -   `index_info`：列出索引中各列的信息。它接受一个索引名作为参数。

    -   `index_list`：列出表中各索引的信息。它接受一个表名作为参数。

    -   `table_info`：列出表中所有列的信息。


    以下展示了这些伪指令提供的一些信息：


    ```

    sqlite> pragma database_list;

    seq  name       file

    ----  -------  --------------------

    0    main     /tmp/foods.db

    2    db2      /tmp/db


    sqlite> create index foods_name_type_idx on foods(name,type_id);

    sqlite> pragma index_info(foods_name_type_idx);

    seqn  cid  name

    ----  ---  --------------------

    0     2    name

    1     1    type_id


    sqlite> pragma index_list foods);

    seq  name                  unique

    -----  -------------------  ---------------

    0    foods_name_type_idx  0


    sqlite> pragma table_info(foods);

    cid  name          type    notn  dflt  pk

    ---  ------------  ------  ----  ----  ----------

    0    id            integer  0     1

    1    type_id       integer  0     0

    2    name          text     0     0

    ```


    ## 同步写入


    通常，SQLite 会在关键时刻将所有更改提交到磁盘，以确保事务的持久性。这类似于其他数据库中的检查点功能。但是，为了提高性能，可以关闭此功能。你可以使用`synchronous`伪指令来实现这一点。它有三种设置：`full`、`normal`和`off`。其定义如下：


    -   **Full**：SQLite 会在关键时刻暂停，以确保数据在继续之前确实已写入磁盘表面。这确保了如果操作系统崩溃或发生断电，数据库在重启后不会损坏。`Full`同步非常安全，但速度也很慢。

    -   **Normal**：SQLite 仍然会在最关键时刻暂停，但频率低于`full`模式。在`normal`模式下，如果恰好在错误的时间发生断电，数据库有非常小（尽管非零）的损坏风险。但在实践中，你更可能遇到的是灾难性的磁盘故障或其他不可恢复的硬件故障。

    -   **Off**：SQLite 在将数据移交给操作系统后，会继续运行而不暂停。这可以将某些操作的速度提高多达 50 倍或更多。如果运行 SQLite
    的应用程序崩溃，数据将是安全的。但是，如果操作系统崩溃或计算机断电，数据库可能会损坏。


    `synchronous`伪指令没有持久的配置形式。第 5 章解释了该设置在事务持久性中的关键作用及其工作原理。


    ## 临时存储


    临时存储是 SQLite 保存临时数据（如临时表、索引和其他对象）的地方。默认情况下，SQLite 使用一个编译时确定的位置，该位置因平台而异。有两个伪指令管理临时存储：`temp_store`和`temp_store_directory`。第一个伪指令确定
    SQLite 是使用内存还是磁盘进行临时存储。实际上有三个可能的值：`default`、`file`或`memory`。`default`使用编译时确定的默认值，`file`使用操作系统文件，而`memory`使用`RAM`。如果将`file`设置为存储介质，则可以使用第二个伪指令`temp_store_directory`来设置放置临时存储文件的目录。

