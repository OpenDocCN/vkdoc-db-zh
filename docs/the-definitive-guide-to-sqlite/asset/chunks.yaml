    # Summary


    Congratulations, you have learned the `select` command for SQLite’s implementation
    of SQL. Not only have you learned how the command works, but you’ve learned some
    relational theory in the process.


    You should now be comfortable with using `select` statements to query your data,
    join, aggregate, summarize, and dissect it for various uses.


    We’ll continue the discussion of SQL in the next chapter, where we’ll build on
    your knowledge of `select` by introducing the other members of DML, as well as
    DDL and other helpful SQL constructs in SQLite.


    ## C H A P T E R 4


    ### Advanced SQL for SQLite


    You mastered the `select` statement in Chapter 3, so now it is time to add the
    rest of the SQL dialect to your capabilities. This chapter covers the remainder
    of SQL as implemented in SQLite, including `insert`, `update`, and `delete` statements
    to modify data; constraints to protect your data; and more advanced topics such
    as table creation and data types.


    ### Modifying Data


    Compared to `select`, the commands used to modify data are quite easy to use and
    understand. There are three Data Manipulation Language (DML) commands for modifying
    data—`insert`, `update`, and `delete`—and they do pretty much what their names
    imply.


    ### Inserting Records


    You insert records into a table using the `insert` command. `insert` works on
    a single table and can both insert one row at a time and can insert many rows
    at once using a `select` command. The general form of the `insert` command is
    as follows:


    ```

    insert into table (column_list) values (value_list);

    ```


    The variable `table` specifies which table—the target table—to insert into. The
    variable `column_list` is a comma-separated list of column names, all of which
    must exist in the target table. The variable `value_list` is a comma-separated
    list of values that correspond to the names given in `column_list`. The order
    of values in `value_list` must correspond to the order of columns in `column_list`.


    #### Inserting One Row


    For example, you’d use this to insert a row into `foods`:


    ```

    sqlite> insert into foods (name, type_id) values (''Cinnamon Bobka'', 1);

    ```


    This statement inserts one row, specifying two column values. `''Cinnamon Bobka''`
    —the first value in the value list—corresponds to the column `name`, which is
    the first column in the column list. Similarly, the value `1` corresponds to `type_id`,
    which is listed second. Notice that `id` was not mentioned. In this case, the
    database uses the default value. Since `id` is declared as `integer primary key`,
    it will be automatically generated and associated with the record (as explained
    in the section “Primary Key Constraints”). The inserted record can be verified
    with a simple `select`, and the value used for `id` can be queried as well:


    ```

    sqlite> select * from foods where name=''Cinnamon Bobka'';

    ```

    ```

    id          type_id     name

    ----------  ----------  --------------

    413         1           Cinnamon Bobka

    ```


    ```

    sqlite> select max(id) from foods;

    ```

    ```

    MAX(id)

    ----------

    413

    ```


    ```

    sqlite> select last_insert_rowid();

    ```

    ```

    last_insert_rowid()

    -------------------

    413

    ```


    Notice that the value `413` was automatically generated for `id`, which is the
    largest value in the column. Thus, SQLite provided a monotonically increasing
    value. You can confirm this with the built-in SQL function `last_insert_rowid()`,
    which returns the last automatically generated key value, as shown in the example.'
