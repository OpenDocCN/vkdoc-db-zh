    # 第三章 ■ SQLite 的 SQL 语言


    通过将运算符串联起来，你可以创建出由其他值表达式构成的、可达到任意复杂度的值表达式。下面是一个示例：


    `x = count(episodes.name)`


    `y = count(foods.name)`


    `z = y/x * 11`


    ## 二元运算符


    二元运算符是迄今为止 SQL 中最常见的运算符。表 3-1 按*优先级*从高到低列出了 SQLite 支持的二元运算符。相同颜色组中的运算符具有相等的优先级。


    *表 3-1. 二元运算符*


    | 运算符 | 类型 | 作用 |

    | :--- | :--- | :--- |

    | `||` | | 字符串连接 |

    | `*` | | 算术乘法 |

    | `/` | | 算术除法 |

    | `%` | | 算术取模 |

    | `+` | | 算术加法 |

    | `-` | | 算术减法 |

    | `<<` | | 位运算左移 |

    | `>>` | | 位运算右移 |

    | `&` | | 逻辑与 |

    | `|` | | 逻辑或 |

    | `<` | | 关系小于 |

    | `<=` | | 关系小于等于 |

    | `>` | | 关系大于 |

    | `>=` | | 关系大于等于 |

    | `=` | | 关系等于 |

    | `==` | | 关系等于 |

    | `<>` | | 关系不等于 |

    | `!=` | | 关系不等于 |

    | `IN` | | 逻辑属于 |

    | `AND` | | 逻辑与 |

    | `OR` | | 逻辑或 |

    | `IS` | | 逻辑等于 |

    | `LIKE` | | 关系字符串匹配 |

    | `GLOB` | | 关系文件名匹配 |


    *算术运算符*（例如，加法、减法、除法）是二元运算符，它们接受数值并产生一个数值。*关系运算符*（例如，`>`、`<`、`=`）是二元运算符，用于比较值和值表达式，并返回一个*逻辑值*（也称为*真值*），其结果为真或假。关系运算符构成*逻辑表达式*，例如：


    `x > 5`

    `1 < 2`


    逻辑表达式是任何返回真值的表达式。在 SQLite 中，假由数字 0 表示，而真则由任何非零值表示。例如：


    ```

    sqlite> SELECT 1 > 2;

    1 > 2

    ----------

    0


    sqlite> SELECT 1 < 2;

    1 < 2

    ----------

    1


    sqlite> SELECT 1 = 2;

    1 = 2

    ----------

    0


    sqlite> SELECT -1 AND 1;

    -1 AND 1

    ----------

    1

    ```


    ## 逻辑运算符


    *逻辑运算符*（`AND`、`OR`、`NOT`、`IN`）是二元运算符，作用于真值或逻辑表达式。它们根据其输入产生特定的真值。它们用于从更简单的表达式构建更复杂的逻辑表达式，如下所示：


    `(x > 5) AND (x != 3)`

    `(y < 2) OR (y > 4) AND NOT (y = 0)`

    `(color=''purple'') AND (grin=''toothy'')`


    逻辑运算符产生的真值遵循正常的布尔逻辑规则，但在考虑空值时有一个额外的转折，我们将在本章后面讨论。这就是 `where` 子句的构成要素——使用逻辑运算符来回答关于
    SQLite 数据库中数据的真实问题。这里有一个例子：


    ```

    sqlite> select * from foods where name=''JujyFruit'' and type_id=9;

    id          type_id     name

    ----------  ----------  ----------

    244         9           JujyFruit

    ```


    这里的限制条件根据表达式 `(name=''JujyFruit'') and (type_id=9)` 工作，该表达式由两个通过逻辑 `and` 连接的逻辑表达式组成。只有当这两个条件都为真时，`foods`
    表中的记录才会被包含在结果中。


    ## LIKE 和 GLOB 运算符


    一个特别有用的关系运算符是 `like`。`like` 类似于等于 (`=`)，但它用于根据模式匹配字符串值。例如，要选择 `foods` 表中所有名字以字母
    *J* 开头的行，你可以这样做：


    ```

    sqlite> select id, name from foods where name like ''J%'';

    id      name

    -----   --------------------

    156     Juice box

    236     Juicy Fruit Gum

    243     Jello with Bananas

    244     JujyFruit

    245     Junior Mints

    370     Jambalaya

    ```


    模式中的百分比符号 (`%`) 匹配字符串中零个或多个字符的任意序列。

