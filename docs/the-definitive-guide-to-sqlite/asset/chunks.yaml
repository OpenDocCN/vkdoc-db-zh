    \n`spam_mother_in_law()` 的实现留给读者作为练习。\n\n`step()` 函数必须获取数据库上的 `SHARED` 锁才能执行 `select`\
    \ 操作。然而，假设当前有一个写入者处于活动状态。通常，`step()` 会返回 `SQLITE_BUSY`。但在这个例子中，它并没有返回。分页器（负责处理锁的那个组件）调用了\
    \ `busy()` 函数，因为它已被注册为忙时处理程序。`busy()` 增加了计数器，从你的垃圾邮件文件夹中随机转发了 100 条消息给你的岳母，然后返回\
    \ 1，分页器将其解释为 true——继续尝试获取锁。分页器随后再次尝试获取 `SHARED` 锁。假设数据库仍然被锁定。分页器再次调用忙时处理程序。只是这一次，`busy()`\
    \ 返回 0，分页器将其解释为 false。在这种情况下，分页器不再重试获取锁，而是将 `SQLITE_BUSY` 向上传递到调用栈，这也就是 `step()`\
    \ 最终返回的结果。\n\n如果你只是想在等待锁时消磨时间，不必自己编写忙时处理程序。 SQLite API 已经为你提供了一个。它是一个简单的忙时处理程序，会休眠给定的时间来等待锁。在\
    \ API 中，这个函数被称为 `sqlite3_busy_timeout()`，并且受到一些扩展库的支持。你基本上可以告诉它“当无法获取锁时，尝试休眠 10\
    \ 秒”，分页器就会为你做到这一点。如果它休眠了 10 秒仍然无法获取锁，那么它将返回 `SQLITE_BUSY`。\n\n### 使用正确的事务\n\n\
    让我们再次考虑前面的例子，但这次命令是 `update` 而不是 `select`。\n\n现在，`SQLITE_BUSY` 实际上意味着什么？在 `select`\
    \ 中，它仅仅意味着“我无法获取 `SHARED` 锁”。但对于一个 `update` 操作呢？事实是，你并不真正知道它意味着什么。`SQLITE_BUSY`\
    \ 可能意味着连接因为存在一个待处理的写入者而未能获取 `SHARED` 锁。也可能意味着它已经获取了 `SHARED` 锁，但无法进入 `RESERVED`\
    \ 状态。关键是你不知道数据库的状态，或者你的连接在此方面的状态。在自动提交模式下，写入操作的 `SQLITE_BUSY` 是完全不确定的。那么，接下来该怎么办？你应该只是反复调用\
    \ `step()` 直到命令通过吗？\n\n这里有件事需要思考。假设 `SQLITE_BUSY` 是因为你获取了 `SHARED` 锁但没有获取到 `RESERVED`\
    \ 锁，而现在你正阻碍一个处于 `RESERVED` 状态的连接进入 `EXCLUSIVE` 状态。再次强调，*你不知道数据库的状态*。仅仅使用蛮力方法来推进你的事务不一定能成功，无论是对你还是对其他连接。如果你只是不停地调用\
    \ `step()`，你只会与持有 `RESERVED` 锁的连接发生冲突，如果你们都不退让，就会发生死锁。\n\n> **注意** 在这种特定场景下，SQLite\
    \ 试图通过忽略违规连接的忙时处理程序来帮助预防死锁。如果 `SHARED` 连接阻碍了 `RESERVED` 连接继续推进，其忙时处理程序将不会被调用。然而，这取决于代码是否领会了这个暗示。代码仍然可以只是反复不断地调用\
    \ `step()`，在这种情况下，SQLite 也无能为力了。\n\n既然你知道自己想要写入数据库，那么你需要从发出 `begin IMMEDIATE`\
    \ 开始。如果你得到一个 `SQLITE_BUSY`，那么至少你知道自己处于什么状态。你知道可以安全地继续尝试而不会阻碍其他连接。一旦你最终成功了，你也知道自己处于什么状态——`RESERVED`。现在，如果必要，你可以使用蛮力，因为你是正确的一方。另一方面，如果你以\
    \ `begin exclusive` 开始，那么你可以确保根本不需要处理任何忙状态。只要记住，在这种情况下，你是在 `EXCLUSIVE` 状态下完成工作的，这对于并发性来说不如在\
    \ `RESERVED` 状态下工作那么好。\n\n### 锁与网络文件系统\n\n至此，你应该充分理解了当数据库通过网络文件系统共享时可能出现的问题。SQLite\
    \ 通过在数据库文件上放置文件锁来处理并发。这些锁在正确的时间被设置和释放至关重要。SQLite 完全依赖于文件系统来正确管理并发使用的锁。无论 SQLite\
    \ 运行在普通文件系统还是网络文件系统上，它都使用相同的锁定机制。它在 Unix、Linux 和 OS X 上使用 POSIX 建议锁，在 Windows\
    \ 上使用 `LockFile()`、`LockFileEx()` 和 `UnlockFile()` 系统调用。这些调用是标准的系统调用，在普通文件系统上能正确工作。网络文件系统的职责就是模拟普通文件系统。不幸的是，某些实现在这方面并不总是能正确工作。即使网络文件系统工作正常，仍然有其他需要考虑的事情。\n\
    \n以 NFS 为例。它是一个很棒的网络文件系统。然而，众所周知，许多原始的 NFS 实现存在锁定错误，或者在某些情况下根本没有实现锁定。对于 SQLite\
    \ 数据库来说，这可能导致严重的问题。没有锁定，两个连接可以同时获取同一数据库的 `EXCLUSIVE` 锁并进行写入，几乎必然导致数据库损坏。这不是 NFS\
    \ 协议本身的问题，而是特定的实现问题。值得庆幸的是，大多数现代的 NFS 实现已经克服了这些问题，而且有些实现——比如 Sun 的——现在非常可靠。\n\n\
    如果某个客户端崩溃（带走了其数据库锁）并且没有重新启动，NFS 在锁定方面仍然可能出现问题。对于 NFSv3，锁定的文件需要管理员干预才能清除。对于 NFSv4，会有一个超时周期。但超时有多长？三十秒？一分钟？真正的问题不在于\
    \ NFS，而在于其特定的应用。网络文件系统，即使完美实现，也不一定像本地文件系统那样工作。\n\n底线是，如果你打算混合使用并发和网络文件系统，有许多问题需要考虑，即使你使用的是最好的网络文件系统。这不像在本地文件系统上运行那样简单。\n\
    \n### 代码\n\n至此，你应该对 API、事务和锁有了相当清晰的了解。为了收尾，让我们把这三者放在你的代码上下文中一起考虑，并探讨几种你可能需要注意的场景。\n\
    \n#### 使用多个连接"
- fmt: "# SQLite 数据库连接与锁机制问题\n\n在编写使用其他关系型数据库的代码时，你可能写过在单个代码块中使用多个连接的代码。一个经典的例子是让一个连接遍历一个表，而另一个连接就地修改记录。\n\
    \n在 SQLite 中，在同一代码块中使用多个连接可能会导致问题。你需要小心处理。请看以下示例：\n\n```python\nc1 = open('foods.db')\n\
    c2 = open('foods.db')\nstmt = c1.prepare('select * from episodes')\nwhile stmt.step()\n\
    \    print stmt.column('name')\n    c2.exec('update episodes set *<some columns,\
    \ criteria, etc.>*')\nend\nstmt.finalize()\nc1.close()\nc2.close()\n```\n\n我们打赌你能轻易发现这里的问题。在\
    \ `while` 循环中，`c2` 尝试执行 `update`，而 `c1` 持有一个 `SHARED` 锁。这个 `SHARED` 锁直到 `while`\
    \ 循环之后 `stmt` 被 `finalize()` 才会释放。\n\n因此，在 `while` 循环内写入数据库是不可能的。要么更新静默失败，要么如果你设置了繁忙处理器，它只会延迟程序。最好的办法是使用一个连接来完成工作，并在单个\
    \ `begin immediate` 事务下运行。新版本可能如下所示：\n\n```python\nc1 = open('foods.db')\n# Keep\
    \ trying until we get it\nwhile c1.exec('begin immediate') != SQLITE_SUCCESS\n\
    end\nstmt = c1.prepare('select * from episodes')\nwhile stmt.step()\n    print\
    \ stmt.column('name')\n    c1.exec('update episodes set *<some columns, criteria,\
    \ etc.>*')\nend\nstmt.finalize()\nc1.exec('commit')\nc1.close()\n```\n\n在这种情况下，你应该使用来自单个连接的语句进行读写。这样你就不必担心数据库锁会导致问题。然而，事实证明，这个特定的例子仍然无法工作。如果你用一个语句遍历一个表并用另一个语句更新它，还有一个额外的锁定问题你需要了解，我们将在接下来讨论。\n\
    \n## 对 Finalize 的重要性\n\n处理 `select` 语句时一个常见的陷阱是没有意识到 `SHARED` 锁不一定被释放，直到调用 `finalize()`（或\
    \ `reset()`）——嗯，大多数时候是这样。考虑以下示例：\n\n```python\nstmt = c1.prepare('select * from\
    \ episodes')\nwhile stmt.step()\n    print stmt.column('name')\nend\nc2.exec('begin\
    \ immediate; update episodes set …; commit;')\nstmt.finalize()\n```\n\n虽然你在实践中绝不应该这样做，但你可能最终还是会意外地这样做，仅仅因为你侥幸成功了。如果你用\
    \ C API 编写等效的程序，它实际上会工作。即使 `finalize()` 还没有被调用，第二个连接也可以毫无问题地修改数据库。在我们解释原因之前，请看下一个例子：\n\
    \n```python\nc1 = open('foods.db')\nc2 = open('foods.db')\nstmt = c1.prepare('select\
    \ * from episodes')\nstmt.step()\nstmt.step()\nstmt.step()\nc2.exec('begin immediate;\
    \ update episodes set …; commit;')\nstmt.finalize()\n```\n\n假设 `episodes` 有 100\
    \ 条记录。而程序只步进了其中的三条。这里会发生什么？第二个连接将获得 `SQLITE_BUSY`。\n\n在第一个例子中，当语句到达结果集的末尾时，SQLite\
    \ 释放了 `SHARED` 锁。也就是说，在最后一次调用 `step()` 时，API 返回 `SQLITE_DONE`，VDBE 遇到了 `Close`\
    \ 指令，SQLite 关闭了游标并释放了 `SHARED` 锁。因此，即使 `c1` 没有调用 `finalize()`，`c2` 也能够推入其 `insert`\
    \ 操作。\n\n在第二种情况下，语句尚未到达结果集的末尾。下一次调用 `step()` 将会返回 `SQLITE_ROW`，这意味着结果集中还有更多行，并且\
    \ `SHARED` 锁仍然被持有。"
