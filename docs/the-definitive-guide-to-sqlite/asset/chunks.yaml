  raw: 'With WAL enabled, you implicitly gain a performance advantage over rollback
    journaling because


    only one write is required to commit a transaction, instead of two (one to the
    database and rollback journal). However, until a checkpoint occurs that frees
    space in the WAL file, the file itself must keep growing as more and more changes
    are recorded. Normally this isn’t an issue: someone will be the lucky committer
    who pushes WAL through the 1,000-page threshold for a checkpoint, and the WAL
    will clear, and the cycle will continue. But the checkpoint completes its work
    if it finds an end-point marker for any currently active reader. That means a
    very long-running transaction or read activity can keep the checkpoint from making
    progress, even on subsequent attempts. This in turn means the WAL file keeps growing
    in size, with commensurately longer seek times for new readers to find pages.


    Another performance consideration is how much work is triggered when a transaction
    hits the


    checkpoint threshold. You may find that the variable nature of lots of very fast
    transactions and then one slightly longer one that must perform the checkpoint
    work for its predecessors unattractive in some scenarios.


    For both of these performance hypotheticals, you are essentially weighing up read
    and write


    performance. Our recommended approach is to first remember that you can’t have
    the best of both, so some compromise will be needed, and then if necessary use
    the **sqlite3_wal_checkpoint()**and


    ****sqlite3_wal_autocheckpoint()** tools to balance the load and find a happy
    equilibrium.


    Recovery


    Versions of SQLite prior to 3.7.0 have no knowledge of WAL, nor the methods used
    for recovering WAL-based databases. To prevent older versions trampling all over
    a WAL-enabled SQLite database during crash recovery, the database file format
    number was bumped up from 1 to 2. When an older version of SQLite attempts to
    recover a database with this change, it realizes it is not a “valid” SQLite database
    and will report an error similar to the following.


    **file is encrypted or is not a database**


    **Don’t panic! Your database is fine, but the version of SQLite will need to be
    upgraded in order to work with it. Alternatively, you can change back to the rollback
    journal.


    **PRAGMA journal_mode=DELETE;**


    **This resets the database file format number to 1.


    CHAPTER 11 ■ SQLITE INTERNALS AND NEW FEATURES


    Summary


    That concludes our journey through SQLite, not only in this chapter but the book
    as well. We hope you have enjoyed it. As you saw in Chapter 1, SQLite is more
    than merely a free database. It is a well-written software library with a wide
    range of applications. It is a database, a utility, and a helpful programming
    tool.


    What you have seen in this chapter barely scratches the surface of the internals,
    but it should give you a better idea about how things work nonetheless. And it
    also gives you an appreciation for how elegantly SQLite approaches a very complex
    problem. You know firsthand how big SQL is, and you’ve seen the complexity of
    the models behind it. Yet SQLite is a small library and manages to put many of
    these concepts to work in a small amount of code and excels!


