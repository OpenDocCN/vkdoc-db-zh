- fmt: '# Write Ahead Log (WAL) in SQLite


    ## Introduction

    The Write Ahead Log (WAL) is not new to the wider database technology world, but
    its inclusion in SQLite is amazing for two reasons. First, this further enhances
    the sophistication and robustness of SQLite and the databases you use. Second,
    it’s astounding that such a great feature has been included in SQLite and yet
    the code and resulting binaries are still so compact and concise.


    ## How WAL Works

    In the traditional mode of operation, SQLite uses the rollback journal to capture
    the prechange data from your SQL statements and then makes changes to the database
    file (we’ll avoid discussing the various caching and file system layers here,
    because they apply regardless of model). When the WAL is used, the arrangement
    is reversed. Instead of writing the original, prechanged data to the rollback
    journal, using WAL leaves the original data untouched in the database file. The
    WAL file is used to record the changes to the data that occur for a given transaction.
    A commit action changes to being a special record written to the WAL to indicate
    the preceding changes are in fact complete and to be honored from an ACID perspective.


    This change in roles between database file and log file immediately alters the
    performance dynamics of transactions. Instead of contending over the same pages
    in the database file, multiple transactions can simultaneously record their data
    changes in the WAL and can continue reading the unaltered data from the database
    file.


    ## Checkpoints

    The first question that most people think of when confronted with WAL technologies
    is usually “But when does the data ultimately get written `to the database`?”
    We’re glad you asked. Obviously, a never-ending stream of changes being written
    to a constantly growing WAL file wouldn’t scale or withstand the vagaries of file
    system failures. The WAL uses a checkpoint function to write changes back to the
    database. This process happens automatically, so the developer need not concern
    themselves with managing the checkpointing and write-back to the database. By
    default, the WAL invokes a checkpoint when the WAL file hits 1,000 pages of changes.
    This can be modified to suit different operating scenarios.


    ## CHAPTER 11 ■ SQLITE INTERNALS AND NEW FEATURES


    ### Concurrency

    Because changes now write to the WAL file, rather than the database file, you
    might be wondering how this affects SQLite concurrency. The good news is the answer
    “overwhelmingly for the better!”


    New readers accessing data from the WAL-enabled database initiate a lookup in
    the WAL file to determine the last commit record. This point becomes their end
    marker for read-only consistency, such that they will not consider new writes
    beyond this point in the file. This is how the read becomes a consistent read—it
    simply takes no notice of anything after the commit considered its end marker.
    Each reader assess is independent, so it’s possible to have multiple threads each
    with a different notion of their own individual end mark within the WAL file.


    To access a page of data, the reader uses a `wal-index` structure to scan the
    WAL file to find out whether the page exists with changes and uses the latest
    version if found. If the page isn’t present in the WAL file, it means it hasn’t
    been altered since the last checkpoint, and the reader accesses the page from
    the database file.


    The `wal-index` structure is implemented in shared memory, meaning that all threads
    and processes must have access to the same memory space. That is, your programs
    must all execute on the same machine in order to access a WAL-enabled database
    or, more accurately, to use the `wal-index`. This is the feature that rules out
    operation across network file systems like NFS.


    As for writers, thanks to the sequential nature of the WAL file, they simply append
    changes to the end. Note, however, that this means they must take it in turn appending
    their changes, so writers can still block writers.


    ### Activation and Configuration WAL'
