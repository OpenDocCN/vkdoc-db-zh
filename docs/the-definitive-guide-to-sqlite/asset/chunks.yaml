    在这种情况下，SQLite 会在用户定义函数执行完毕后调用清理函数。这就是前面示例中使用的方法。我们使用了 `sqlite3_mprintf()` 来生成纽曼的回复，这会在堆上分配一个字符串。然后，我们将
    `sqlite3_free()` 作为清理函数传递给 `sqlite3_result_text()`，这样当扩展函数完成时，就可以释放该字符串的内存。


    ### 错误条件


    有时函数会遇到错误，此时应相应地设置返回值。这正是 `sqlite3_result_error()` 的用途。其声明如下：


    ```c

    void sqlite3_result_error(

    sqlite3_context *ctx, /* 函数上下文 */

    const char *msg, /* 错误信息 */

    int len); /* 错误信息的长度 */

    ```


    这告诉 SQLite 发生了错误，详细信息包含在 `msg` 中。SQLite 将中止调用该函数的命令，并将错误信息设置为 `msg` 中包含的值。


    ### 返回输入值


    有时，你可能希望将参数原样作为返回值传回。与其让开发人员自己去确定参数类型、使用相应的 `sqlite3_column_*xxx*()` 函数提取其值，然后再调用适当的
    `sqlite3_result_*xxx*()` 函数来设置返回值，API 提供了 `sqlite3_result_value()` 函数，让你能一举完成所有这些操作。其声明如下：


    ```c

    void sqlite3_result_value(

    sqlite3_context *ctx, /* 函数上下文 */

    sqlite3_value* value); /* 参数值 */

    ```


    例如，假设你想创建一个名为 `echo()` 的函数，它返回其第一个参数。实现如下：


    ```c

    void echo(sqlite3_context* ctx, int nargs, sqlite3_value** values)

    {

    sqlite3_result_value(ctx, values[0]);

    }

    ```


