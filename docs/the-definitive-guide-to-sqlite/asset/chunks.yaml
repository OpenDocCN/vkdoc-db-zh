  trans: "\n# 第 3 章 ■ SQLite 的 SQL\n\n## HAVING 子句作为分组限制\n\n这里，`having` 将谓词 `count(*)<20`\
    \ 应用于所有分组。任何不满足此条件的分组（即包含 20 条或更多食物的分组）都不会被传递到 `select` 子句。图 3-9 说明了这一限制。\n\n\
    ```\nCOUNT()<20\n\nCOUNT()\n\ntid\n\nCOUNT()<20\n\nCOUNT()<20\n\ntid\n\nCOUNT()\n\
    \nCOUNT()<20\n\nCOUNT()\n\nCOUNT()<20\n\nCOUNT()\n```\n\n**结果**\n\n**WHERE**\n\
    \nCOUNT()<20\n\nCOUNT()<20\n\nCOUNT()\n\nCOUNT()<20\n\n**GROUP BY**\n\n**HAVING**\n\
    \n**SELECT**\n\n*图 3-9. `having` 作为分组限制*\n\n图中第三列显示了按 `type_id` 排序的行组。显示的值是 `type_id`\
    \ 的值。每组中显示的行数并不精确，而是示意性的。每组我只显示了两行，以代表整个分组。\n\n因此，`group by` 和 `having` 充当了额外的限制阶段。`group\
    \ by` 接收 `where` 子句产生的限制结果，并将其分解为共享给定列共同值的行组。然后，`having` 对每个这样的组应用一个过滤器。通过过滤的组会被传递到\
    \ `select` 子句进行聚合和投影。\n\n■ **注意** 某些数据库（包括 SQLite）允许你构建这样的 `select` 语句：在混合了聚合和非聚合列的\
    \ `select` 语句中，非聚合列未被分组。\n\n例如，SQLite 允许你执行这条 SQL：\n\n```sql\nselect type_id,\
    \ count(*) from foods\n```\n\n因为聚合函数（`count`）会折叠输入表，这导致通过所有过滤步骤的行数不匹配。本例中的 count\
    \ 将返回一行，但我们并未指示 SQLite 如何对 `type_id` 进行分组。\n\n尽管如此，SQLite 仍会返回结果。遗憾的是，这样的语句结果毫无意义——*不要依赖*任何未按非聚合字段分组的\
    \ SQL 语句。*结果是任意的！*\n\n## 消除重复行\n\n`distinct` 获取 `select` 子句的结果，并过滤掉重复的行。例如，你可以用它来获取\
    \ `foods` 表中所有不同的 `type_id` 值：\n\n```sql\nsqlite> select distinct type_id from\
    \ foods;\ntype_id\n----------\n1\n2\n3\n.\n.\n.\n15\n```\n\n该语句的工作原理如下：`where`\
    \ 子句返回整个 foods 表（所有 412 条记录）。`select` 子句仅提取 `type_id` 列，最后 `distinct` 消除重复行，将行数从\
    \ 412 行减少到 15 行，且所有值都是唯一的。\n\n## 连接表\n\n连接（Join）是从多个表（或关系）中处理数据的关键，是 `select`\
    \ 命令的首要操作。连接的结果作为后续所有（过滤）操作的输入或起点。\n\nSQLite 中的连接最好通过例子来理解。`foods` 表有一个 `type_id`\
    \ 列。事实证明，该列中的值与 `food_types` 表中 `id` 列的值相对应。这两个表之间存在关系。`foods.type_id` 列中的任何值都必须对应于\
    \ `food_types.id` 列中的一个值，并且 `id` 列是 `food_types` 的*主键*（稍后描述）。\n\n由于这种关系，`foods.type_id`\
    \ 列被称为*外键*：它包含（或引用）另一个表主键中的值。这种关系被称为*外键关系*。\n\n利用这种关系，可以在这两列上连接 foods 和 food_type\
    \ 表，形成一个新的关系，该关系提供了更详细的信息，即 `foods` 表中每种食物对应的 `food_types.name`。这通过以下 SQL 实现：\n\
    \n```sql\nsqlite> select foods.name, food_types.name\n   ...> from foods, food_types\n\
    \   ...> where foods.type_id=food_types.id limit 10;\nname                  name\n\
    ------------------------- ---------------\nBagels                Bakery\nBagels,\
    \ raisin        Bakery\nBavarian Cream Pie    Bakery\nBear Claws            Bakery\n\
    Black and White cookies Bakery\n```\n"
