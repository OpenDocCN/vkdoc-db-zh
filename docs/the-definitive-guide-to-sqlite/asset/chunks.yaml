  trans: "# 语言扩展\n\n## 安装\n\n如果您是从代码仓库安装，请确保检查您已安装的 Ruby 版本，并与代码仓库中的正确版本匹配。由于旧版本的\
    \ SQLite 也得到支持，请确保为您的平台安装 `libsqlite3-ruby` 或等效的软件包。例如，在 Ubuntu 下：\n\n```bash\n\
    fuzzy@linux $ ruby --version\nruby 1.8.6 (2007-09-24 patchlevel 111) [x86_64-linux]\n\
    \nfuzzy@linux $ sudo apt-get install libsqlite3-ruby libsqlite-ruby libsqlite-ruby1.8\n\
    ... 许多 apt 信息闪过 ...\n```\n\n## 连接\n\n要加载 SQLite 扩展，您必须导入 sqlite 模块，使用 `load` 或\
    \ `require`，如下所示：\n\n```ruby\nrequire 'sqlite'\n```\n\n您通过实例化一个 `SQLite::Database`\
    \ 对象来连接到数据库，并传入数据库文件的名称。默认情况下，结果集中的列可以通过其序号访问。但是，通过将 `Database::results_as_hash`\
    \ 设置为 `true`，也可以通过列名访问它们：\n\n```ruby\nrequire 'sqlite'\ndb = SQLite::Database.new(\"\
    foods.db\")\ndb.results_as_hash = true\n```\n\n## 查询处理\n\nRuby 扩展与 SQLite API\
    \ 保持相当紧密的对应。它同时提供预处理查询和包装查询。\n\n预处理查询通过 `Database::prepare()` 执行，该方法传回一个 `Statement`\
    \ 对象，其中持有一个 `sqlite3_stmt` 结构。您使用 `Statement` 的 `execute` 方法执行查询，该方法产生一个 `ResultSet`\
    \ 对象。您可以向 `Statement` 传递一个代码块，这种情况下它会将 `ResultSet` 对象 yield 给该代码块。如果不使用代码块，则 `Statement`\
    \ 会将 `ResultSet` 对象作为返回值提供。`ResultSet` 用于遍历返回的行。在内部，它使用 `sqlite3_step()`。您可以通过使用\
    \ `each()` 迭代器的代码块，或者使用带有 `next()` 方法的常规循环来访问 `ResultSet` 中的行。`next()` 方法以下一个记录（以数组形式）返回，如果已到达结果集的末尾则返回\
    \ `nil`。\n\n列表 8-13 展示了 Ruby 中预处理查询的实际应用。\n\n*列表 8-13. Ruby 中的预处理查询*\n\n```ruby\n\
    #!/usr/bin/env ruby\nrequire 'sqlite3'\ndb = SQLite3::Database.new('foods.db')\n\
    \nstmt = db.prepare('select name from episodes')\nstmt.execute do | result |\n\
    \  result.each do | row |\n    puts row[0]\n  end\nend\n\nresult = stmt.execute()\n\
    result.each do | row |\n  puts row[0]\nend\n\nstmt.close()\n```\n\n在使用完毕后调用 `Statement.close()`\
    \ 以终结查询非常重要。因为 `Statement` 对象在内部持有一个 `sqlite3_stmt` 结构，所以每次后续调用 `execute` 都会重用同一个查询，避免了重新编译查询的需要。\n\
    \n## 参数绑定\n\nRuby 扩展支持位置参数绑定和命名参数绑定。您使用 `Statement::bind_param()` 和/或 `Statement::bind_params()`\
    \ 来绑定参数。`bind_param()` 的格式如下：`bind_param(param, value)`\n\n如果 `param` 是一个 `Fixnum`，那么它代表参数的位置（索引）。否则，它被用作参数的名称。`bind_params()`\
    \ 接受可变数量的参数。如果第一个参数是一个哈希，那么它会用它来映射参数名到值。否则，它会将每个参数用作位置参数。\n\n列表 8-14 说明了两种形式的参数绑定。\n\
    \n*列表 8-14. Ruby 中的参数绑定*\n\n```ruby\nrequire 'sqlite3'\ndb = SQLite3::Database.new(\"\
    foods.db\")\ndb.results_as_hash = true\n\n# 命名参数\nstmt = db.prepare('select *\
    \ from foods where name like :name')\nstmt.bind_param(':name', '%Peach%')\nstmt.execute()\
    \ do |result|\n  result.each do |row|\n    puts row['name']\n  end\nend\n\n# 位置参数\n\
    stmt = db.prepare('select * from foods where name like ? or type_id = ?')\nstmt.bind_params('%Bobka%',\
    \ 1)\nstmt.execute() do |result|\n  result.each do |row|\n    puts row['name']\n\
    \  end\nend\n\n# 释放读锁\nstmt.close()\n```"
- fmt: 'If you don’t need to use parameters, a shorter way to process queries is using
    `Database::query()`, which cuts out the `Statement` object and just returns a
    `ResultSet`, as shown in Listing 8-14.


    *Listing 8-14\. Using the `Database::query()` Method in Ruby*


    ```

    require ''sqlite3''


    db = SQLite3::Database.new("foods.db")


    db.results_as_hash = true


    result = db.query(''select * from foods limit 10'')


    result.each do |row|


    puts row[''name'']


    end


    result.reset()


    while row = result.next


    puts row[''name'']


    end


    result.close()

    ```


    Like `Statement` objects, `Result` objects are also thin wrappers over statement
    handles and therefore represent compiled queries. They can be rerun with a call
    to `reset`, which calls `sqlite3_reset()` internally and reexecutes the query.
    Unlike `Statement` objects however, they cannot be used for bound parameters.


    Other, even shorter, query methods include `Database::get_first_row()`, which
    returns the first row of a query, and `Database::get_first_value()`, which returns
    the first column of the first row of a query.


    CHAPTER 8 ■ LANGUAGE EXTENSIONS


    ### User-Defined Functions


    User-defined functions are implemented using `Database::create_function()`, which
    has the following form:


    ```

    create_function( name, args, text_rep=Constants::TextRep::ANY ) {|func, *args|
    ...}

    ```


    Here, `name` is the name of the SQL function, `args` is the number of arguments
    (-1 is variable), and `text_rep` corresponds to the UTF encoding. Values are `UTF8`,
    `UTF16LE`, `UTF16BE`, `UTF16`, and `ANY`. Finally, the function implementation
    is defined in the block. Listing 8-15 illustrates a Ruby implementation of `hello_newman()`.


    *Listing 8-15\. `hello_newman()` in Ruby*


    ```

    require ''sqlite3''


    db = SQLite3::Database.new('':memory:'')


    db.create_function(''hello_newman'', -1 ) do |func, *args|


    if args.length == 0


    func.result = ''Hello Jerry''


    else


    func.result = ''Hello %s'' % [args.join('', '')]


    end


    end


    puts db.get_first_value("SELECT hello_newman()")


    puts db.get_first_value("SELECT hello_newman(''Elaine'')")


    puts db.get_first_value("SELECT hello_newman(''Elaine'', ''Jerry'')")


    puts db.get_first_value("SELECT hello_newman(''Elaine'', ''Jerry'', ''George'')")

    ```


    This program produces the following output:


    ```

    Hello Jerry


    Hello Elaine


    Hello Elaine, Jerry


    Hello Elaine, Jerry, George

    ```


    ### Java


    Like Python mentioned earlier, a wealth of Java extensions are available for SQLite.
    These fall into two broad camps: the JDBC drivers (sometimes with added goodies)
    and complete reimplementations of SQLite in Java. We’ll cover the javasqlite wrapper
    written by Christian Werner, who wrote the SQLite ODBC driver as well. It includes
    both a JDBC driver and a native JNI extension, which closely shadows the SQLite
    C API. You can download the extension from `www.ch-werner.de/javasqlite/overview-summary.html#jdbc_driver`.


    CHAPTER 8 ■ LANGUAGE EXTENSIONS


    The main class in the JNI extension is `SQLiteDatabase`. Most of its methods are
    implemented using callbacks that reference the following interfaces:


    - `SQLite.Callback`

    - `SQLite.Function`

    - `SQLite.Authorizer`

    - `SQLite.Trace`

    - `SQLite.ProgressHandler`


