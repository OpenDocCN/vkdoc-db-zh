  trans: '

    SQLite 同样支持 `savepoint` 和 `release` 命令。这些命令扩展了事务的灵活性，使得一个包含多条语句的操作体可以设置一个 `savepoint`，然后在需要回滚时，SQLite
    可以恢复到该保存点。


    ## 创建与使用保存点


    创建 `savepoint` 非常简单，只需使用 `savepoint` 命令并附上您选择的名称即可，如下一个示例所示：


    ```sql

    savepoint justincase;

    ```


    之后，如果我们意识到需要撤销处理过程，不必完全回滚到事务的起点，我们可以使用带名称的回滚，如下所示：


    ```sql

    rollback [transaction] to justincase;

    ```


    我选择了 `justincase` 作为 `savepoint` 名称。您可以选择任何喜欢的名称。


    ## 冲突解决


    正如您在之前的示例中所见，约束违反会导致提交该违反行为的命令终止。当一个命令在对数据库进行一系列更改的中途终止时，具体会发生什么？在大多数数据库中，所有的更改都会被撤销。这就是数据库处理约束违反的编程方式——没有其他选择。


    然而，SQLite 有一个不常见的功能，允许您指定不同的方式来处理（或从）约束违反中恢复。这被称为*冲突解决*。


    以以下 `UPDATE` 语句为例：


    ```sql

    sqlite> update foods set id=800-id;

    SQL error: PRIMARY KEY must be unique

    ```


    这导致了一个 `UNIQUE` 约束违反，因为当 `update` 语句到达第 388 条记录时，它试图将其 `id` 值更新为 800-388=412。但是
    `id` 为 412 的行已经存在，因此它中止了命令。然而，在遇到这个约束违反之前，SQLite 已经更新了前 387 行。


    这些更改会怎样？默认行为是终止命令并撤销它所做的所有更改，同时保持事务完整。


    但是，如果您希望这 387 个更改在发生约束违反后仍然保留呢？嗯，信不信由您，如果您愿意，也可以做到这一点。您只需要使用适当的冲突解决策略。


    有五种可能的解决方案或策略可用于处理冲突（约束违反）：`replace`、`ignore`、`fail`、`abort` 和 `rollback`。这五种解决方案定义了一个从最宽松到最严格的错误容忍度或敏感度的范围：从
    `replace`（最宽容）到 `rollback`（最严格）。


    这些解决方案按其严重性顺序定义如下：


    1.  **replace**: 当遇到 `unique` 约束违反时，SQLite 会移除导致违反的行（或行），并用来自 `insert` 或 `update`
    的新行替换它（它们）。SQL 操作无错继续执行。如果发生 `NOT NULL` 约束违反，`NULL` 值将被该列的默认值替换。如果该列没有默认值，则 SQLite
    应用 `abort` 策略。需要注意的是，当此冲突解决策略为满足约束而删除行时，它不会在这些行上触发删除触发器。但是，此行为在未来版本中可能会更改。

    2.  **ignore**: 当遇到约束违反时，SQLite 允许命令继续执行，并保持触发违反的行不变。该行前后的其他行继续被命令修改。因此，操作中所有触发约束违反的行都保持不变，命令无错继续执行。

    3.  **fail**: 当遇到约束违反时，SQLite 会终止命令，但不会恢复在遇到违反之前所做的更改。也就是说，在遇到违反之前，该 SQL 命令内的所有更改都会被保留。例如，如果一个
    `update` 语句在尝试更新第 100 行时遇到约束违反，那么对前 99 行的更改将被保留。

