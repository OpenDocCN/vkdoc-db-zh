    # 第 6 章：核心 C API


    则改用名为 `:cosmo` 和 `@newman` 的命名参数。与位置参数类似，命名参数也会由 `sqlite3_prepare()` 自动编号。尽管分配给每个参数的编号是未知的，但你可以使用
    `sqlite3_bind_parameter_index()` 来解析它，该函数接收一个参数名并返回对应的参数编号。这正是你用来将值绑定到其参数的编号。总而言之，命名参数的主要作用更多地在于提高**可读性**。


    **注意：** 虽然函数 `sqlite3_bind_parameter_index()` 似乎将参数编号称为索引，但在所有实际用途中，这两个术语（*编号*
    和 *索引*）是同义的。


    ## Tcl 参数


    最后一种参数方案称为 Tcl 参数，它更具体地关联于 Tcl 扩展，而非 C API。基本上，它的工作方式与命名参数完全相同，区别在于它不使用字母数字值作为参数名，而是使用
    Tcl 变量名。在 Tcl 扩展中，当调用 `sqlite3_prepare()` 的 Tcl 等效函数时，扩展会自动在活动的 Tcl 程序环境中搜索具有给定参数名的
    Tcl 变量，并将它们绑定到各自的参数上。尽管目前它在 Tcl 接口中应用，但没有任何因素阻止将这种机制应用于其他语言接口，这些接口反过来也可以实现相同的功能。在这方面，将这种参数方法仅仅称为
    Tcl 参数可能有点名不副实。Tcl 扩展只是碰巧成为第一个利用此方法的应用程序。基本上，Tcl 参数语法除了为命名参数提供一种替代语法外，作用甚微——它不使用冒号（`:`）或
    at 符号（`@`）作为参数前缀，而是使用美元符号（`$`）。


    ## 错误与意外情况


    到目前为止，我们一直从相当乐观的角度审视 API，仿佛永远不会出错。但事情确实会出错，而 API 中有部分内容正是为此而设。在你的代码中，始终需要防范的三件事是：错误、繁忙条件，以及我个人最感兴趣的——模式变更。


    ### 处理错误


    许多 API 函数返回整数结果码。这意味着它们可能会返回某种错误代码。最需要留意的函数通常是那些最常用的，例如 `sqlite3_open_v2()`、`sqlite3_prepare_v2()`
    及其同类函数，以及 `sqlite3_exec()`。你应该始终进行防御性编程，在使用每个 API 函数前检查它，以确保处理可能出现的错误情况。在 SQLite
    定义的所有错误结果中，实际上只有一部分会对你的应用程序真正重要。所有 SQLite 结果码列于表 6-2。可以返回这些结果码的 API 函数包括：


    *   `sqlite3_bind_*xxx*()`

    *   `sqlite3_close()`

    *   `sqlite3_create_collation()`

    *   `sqlite3_collation_needed()`

    *   `sqlite3_create_function()`

    *   `sqlite3_prepare_v2()`

    *   `sqlite3_exec()`

    *   `sqlite3_finalize()`

    *   `sqlite3_get_table()`

    *   `sqlite3_open_v2()`

    *   `sqlite3_reset()`

    *   `sqlite3_step()`


    你可以使用 `sqlite3_errmsg()` 获取关于特定错误的扩展信息，其声明如下：


    ```

    const char *sqlite3_errmsg(sqlite3*);

    ```


    它接受一个连接句柄作为唯一参数，并返回在该连接上最近一次 API 调用导致的错误。如果未遇到错误，则返回字符串 "not an error"。


    *表 6-2：SQLite 结果码*


    | 结果码 | 描述 |

    | :--- | :--- |

    | `SQLITE_OK` | 操作成功。 |

    | `SQLITE_ERROR` | 一般的 SQL 错误或数据库缺失。根据错误条件（例如 `SQLITE_SCHEMA`）可能可以获取更多错误信息。 |

    | `SQLITE_INTERNAL` | 内部逻辑错误。 |

    | `SQLITE_PERM` | 访问权限被拒绝。 |

    | `SQLITE_ABORT` | 回调例程请求中止。 |

    | `SQLITE_BUSY` | 数据库文件被锁定。 |

    | `SQLITE_LOCKED` | 数据库中的表被锁定。 |

    | `SQLITE_NOMEM` | 在数据库操作中调用 `malloc()` 失败。 |

    | `SQLITE_READONLY` | 试图写入只读数据库。 |

    | `SQLITE_INTERRUPT` | 操作被 `sqlite3_interrupt()` 终止。 |

    | `SQLITE_IOERR` | 发生某种磁盘 I/O 错误。 |

    | `SQLITE_CORRUPT` | 数据库磁盘镜像格式错误。如果尝试将非 SQLite 数据库文件作为 SQLite 数据库打开，也会发生此错误。 |

    | `SQLITE_FULL` | 插入失败，因为数据库已满。文件系统没有更多空间，或者数据库文件无法扩展。 |

    | `SQLITE_CANTOPEN` | SQLite 无法打开数据库文件。 |

    | `SQLITE_PROTOCOL` | 数据库被锁定或发生协议错误。 |

    | `SQLITE_EMPTY` | （仅内部使用。）数据库表为空。 |

    | `SQLITE_SCHEMA` | 数据库模式已更改。 |

    | `SQLITE_CONSTRAINT` | 因违反约束而中止。 |

    | `SQLITE_MISMATCH` | 数据类型不匹配。例如，尝试将非整数数据插入标记为 `INTEGER PRIMARY KEY` 的列。对于大多数列，SQLite
    忽略数据类型并允许存储任何数据。但 `INTEGER PRIMARY KEY` 列只允许存储整数数据。 |

    | `SQLITE_MISUSE` | 库使用不正确。如果一个或多个 SQLite API 例程使用不当，可能会发生此错误。 |

    | `SQLITE_NOLFS` | 使用了主机不支持的操作系统特性。如果 SQLite 库在编译时启用了大文件支持（LFS），但主机操作系统不支持 LFS，则返回此值。
    |

    | `SQLITE_AUTH` | 授权被拒绝。当使用 `sqlite3_set_authorizer()` 安装的回调函数返回 `SQLITE_DENY`
    时发生。 |

    | `SQLITE_FORMAT` | 辅助数据库格式错误。 |

    | `SQLITE_RANGE` | `sqlite3_bind()` 的第二个参数超出范围。 |

    | `SQLITE_NOTADB` | 打开的文件不是 SQLite 数据库文件。 |

    | `SQLITE_ROW` | `sqlite3_step()` 已准备好另一行数据。 |

    | `SQLITE_DONE` | `sqlite3_step()` 已执行完毕。 |


    尽管在嵌入式系统之外非常罕见，但你可能遇到的最关键错误之一是 `SQLITE_NOMEM`，这意味着无法在堆上分配内存（例如，`malloc()` 失败）。SQLite
    在这方面非常健壮，能够从内存不足的错误条件中优雅地恢复。只要底层操作系统完成了像 `malloc()` 这样的内存分配系统调用，它就会继续工作。


    ### 处理繁忙条件


    与处理查询相关的两个重要函数是 `sqlite3_busy_handler()` 和 `sqlite3_busy_timeout()`。如果你的程序使用的数据库上还有其他活动连接，那么它最终很可能需要等待锁，因此必须处理
    `SQLITE_BUSY`。


    每当你调用一个导致 SQLite 尝试获取锁的 API 函数，而 SQLite 又无法获取该锁时，该函数将返回 `SQLITE_BUSY`。有三种处理方式：


    *   你自己处理 `SQLITE_BUSY`，可以通过重新运行语句或采取其他操作

    *   让 SQLite 调用一个繁忙处理程序

    *   要求 SQLite 等待（阻塞或休眠）一段时间，直到锁被释放


    最后一个选项涉及使用 `sqlite3_busy_timeout()`。此函数告诉 SQLite 在返回 `SQLITE_BUSY` 之前等待锁释放多长时间。尽管最终可能仍然需要你处理
    `SQLITE_BUSY`，但在实践中，将此值设置为足够长的时间（比如 30 秒）通常能为即使是最高强度的事务提供足够的完成时间。尽管如此，你仍然应该制定一些应急计划来处理
    `SQLITE_BUSY`。


    #### 用户定义的繁忙处理程序

