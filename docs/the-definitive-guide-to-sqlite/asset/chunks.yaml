    **The main table is **foods**. Each row in **foods** corresponds to a distinct
    food item, the name of which is stored in the **name** attribute. The **type_id**
    attribute references the **food_types** table, which stores the various food classifications
    (e.g., baked goods, drinks, or junk food). Finally, the **foods_episodes** table
    links foods in **foods** with the episodes in **episodes**.


    Installation


    The food database is located in the examples zip file accompanying this book.
    It is available on the Apress website ([**www.apress.com**) in the Sour](http://www.apress.com)ce
    Code section. To create the database, first locate the **foods.sql** file in the
    root directory of the unpacked zip file. To create a new database from scratch
    from the command line, navigate to the examples directory, and run the following
    command:


    **sqlite3 foods.db < foods.sql**


    **48


    CHAPTER 3 ■ SQL FOR SQLITE


    This will create a database file called **foods.db**. If you are not familiar
    with how to use the SQLite command-line program, refer to Chapter 2.


    Running the Examples


    For your convenience, all the SQL examples in the chapter are available in the
    file **sql.sql** in the root directory of the examples zip file. So instead of
    typing them by hand, simply open the file and locate the SQL you want to try.


    A convenient way to run the longer queries in this chapter is to copy them into
    your favorite editor and save them in a separate file, which you can run from
    the command line. For example, copy a long query in **test.sql** to try. You simply
    use the same method to run it as you did to create your database earlier:


    **sqlite3 foods.db < test.sql**


    **The results will be printed to the screen. This also makes it easier to experiment
    with these queries without having to retype them or edit them from inside the
    SQLite shell. You just make your changes in the editor, save the file, and rerun
    the command line.


    For maximum readability of the output, you may want to put the following commands
    at the


    beginning of the file:


    **.echo on**


    **.mode column**


    **.headers on**


    **.nullvalue NULL**


    **This causes the command-line program to 1) echo the SQL as it is executed, 2)
    print results in


    column mode, 3) include the column headers, and 4) print nulls as **NULL**. The
    output of all examples in this chapter is formatted with these specific settings.
    Another option you may want to set for various examples is the **.width** option,
    which sets the respective column widths of the output. These vary from example
    to example.


    For better readability, the examples are presented in two different formats. For
    short queries, we’ll show the SQL and output as it would be shown from within
    the SQLite shell. For example:


    **sqlite> select ***


    **...> from foods**


    **...> where name=''JujyFruit''**


    **...> and type_id=9;**


    **id type_id name**


    **---------- ---------- ----------**


    **244 9 JujyFruit**


    **Occasionally, as in the previous example, we take the liberty of adding an extra
    line between the command and its output to improve readability here on the printed
    page. For longer queries, we show just the SQL in code format separated from the
    results by gray lines, as in the following example:


    **49


    CHAPTER 3 ■ SQL FOR SQLITE


    **select f.name name, types.name type**


    **from foods f**


    **inner join (**


    **select ***


    **from food_types**


    **where id=6) types**


    **on f.type_id=types.id;**


    **name type**


    **------------------------- -----**


    **Generic (as a meal) Dip**


    **Good Dip Dip**


    **Guacamole Dip Dip**


    **Hummus Dip**


    Syntax


    SQL’s declarative syntax reads a lot like a natural language. Statements are expressed
    in the imperative mood, beginning with the verb describing the action. Following
    it are the subject and predicate, as illustrated in Figure 3-2.


    select id from foods where name= JujyFruit ;


    verb


    subject


    predicate


    *Figure 3-2\. General SQL syntax structure*'
