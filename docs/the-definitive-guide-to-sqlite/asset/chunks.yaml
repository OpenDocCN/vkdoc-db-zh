  trans: "\n第二种选择是使用 `sqlite3_busy_handler()`。该函数提供了一种调用用户自定义函数的方式，而不是立即阻塞或返回 `SQLITE_BUSY`。其声明如下：\n\
    \n```c\nint sqlite3_busy_handler(sqlite3*, int(*)(void*,int), void*);\n```\n\n\
    第二个参数是一个函数指针，该函数将作为忙处理程序被调用；第三个参数是一个指向应用特定数据的指针，该数据将作为第一个参数传递给处理程序。传递给忙处理程序的第二个参数是针对同一把锁先前调用处理程序的次数。\n\
    \n这样的处理程序可以调用 `sleep()` 一段时间以等待锁释放，或者发送某种通知。它可以做任何你想做的事情，因为它由你来实现。但请注意，注册忙处理程序并不能保证它总是会被调用。如第\
    \ 5 章所述，如果 SQLite 认为可能导致死锁，它会放弃为某个连接调用忙处理程序。\n\n具体来说，如果你的连接处于 `SHARED` 锁并干扰了另一个处于\
    \ `RESERVED` 锁的连接，SQLite 将不会调用你的忙处理程序，希望你能领会其意。在这种情况下，你正试图从 `SHARED` 状态（使用 `BEGIN`\
    \ 开始事务）写入数据库，而实际上你应该从 `RESERVED` 状态开始（使用 `BEGIN IMMEDIATE` 开始事务）。\n\n对忙处理程序的唯一限制是它们不能关闭数据库。在忙处理程序内部关闭数据库可能会删除正在执行的查询所依赖的关键数据结构，导致程序崩溃。\n\
    \n**建议**\n\n综合考虑，最佳途径可能是将超时设置为一个合理的值，然后在收到 `SQLITE_BUSY` 返回值时采取一些预防措施。一般来说，如果你要写入数据库，请从\
    \ `RESERVED` 状态开始。如果你没有这样做，那么次优的选择是安装一个忙处理程序，将超时设置为一个已知值，如果 SQLite 返回 `SQLITE_BUSY`，则检查响应时间。如果该时间小于忙处理程序的延迟时间，那么\
    \ SQLite 是在告诉你，你的查询（和连接）正在阻止写入者继续执行。如果你此时仍想写入数据库，你应该完成或重置语句，然后重新执行，这次从 `BEGIN\
    \ IMMEDIATE` 开始。\n\n### 处理模式变更\n\n每当一个连接更改了数据库模式，所有在此次更改之前已编译的其他预编译语句都会失效。结果是，对这些语句的首次\
    \ `sqlite3_step()` 调用将尝试重新编译相关的 SQL，并在可能的情况下正常继续执行。如果重新编译不可能（例如，如果某个对象已被完全删除），`sqlite3_step()`\
    \ 将返回 `SQLITE_SCHEMA`。从锁定的角度看，模式变更发生在调用 `sqlite3_prepare()` 编译语句和调用 `sqlite3_step()`\
    \ 执行语句之间。\n\n当这种情况发生时，你唯一的行动方针是处理这种环境变化并从头开始。有几种事件可能导致 `SQLITE_SCHEMA` 错误：\n\n\
    -   分离数据库\n-   修改或安装用户自定义函数或聚合函数\n-   修改或安装用户自定义排序规则\n-   修改或安装授权函数\n-   对数据库执行\
    \ Vacuum 操作\n\n`SQLITE_SCHEMA` 条件存在的根本原因与虚拟数据库引擎（VDBE）有关。当一个连接更改了模式时，其他已编译的查询可能拥有指向不存在或位于数据库中不同位置的数据库对象的\
    \ VDBE 代码。为了避免稍后出现奇怪的运行时错误的风险，SQLite 会使所有已编译但未执行的语句失效。它们必须被重新编译。\n\n### 追踪 SQL\n\
    \n如果你很难弄清楚你的程序到底对数据库做了什么，你可以使用 `sqlite3_trace()` 来追踪它执行了哪些 SQL 语句。其声明如下：\n\n```c\n\
    void *sqlite3_trace(sqlite3*, void(*xTrace)(void*,const char*), void*);\n```\n\
    \n这个函数类似于在连接上安装了一个窃听器。你可以用它来生成给定连接上执行的所有 SQL 的日志文件，并提供有用的调试信息。每一条被处理的 SQL 语句都会传递给第二个参数中指定的回调函数。SQLite\
    \ 将 `sqlite3_trace()` 的第三个参数提供的数据传递给回调函数的第一个参数。\n\n### 操作控制\n\nAPI 提供了几个函数，可用于在编译时和运行时监控和/或管理\
    \ SQL 命令。这些函数允许你安装回调函数，以便在各种数据库事件发生时监控和控制它们。\n\n#### 提交挂钩\n\n`sqlite3_commit_hook()`\
    \ 函数允许你监控事务在给定连接上何时提交。其声明如下：\n\n```c\nvoid *sqlite3_commit_hook(\n  sqlite3 *cnx,\
    \           /* 数据库句柄 */\n  int(*xCallback)(void *data), /* 回调函数 */\n  void *data\
    \              /* 应用数据 */\n);\n```\n\n该函数注册回调函数 `xCallback`，每当在 `cnx` 给出的连接上发生事务提交时，该函数都会被调用。第三个参数\
    \ (`data`) 是一个指向应用特定数据的指针，SQLite 会将其传递给回调函数。如果回调函数返回一个非零值，那么提交会被转换为回滚。\n\n向回调函数传递一个\
    \ `NULL` 值将有效地禁用当前已注册的回调（如果有的话）。此外，对于一个给定的连接，一次只能注册一个回调。`sqlite3_commit_hook()`\
    \ 的返回值是 `NULL`，除非先前注册了另一个回调函数，此时将返回之前的 `data` 值。\n\n#### 回滚挂钩\n\n回滚挂钩类似于提交挂钩，但它们监视的是给定连接上的回滚操作。回滚挂钩使用以下函数注册：\n\
    \n```c\nvoid *sqlite3_rollback_hook(\n  sqlite3 *cnx,\n  void(*xCallback)(void\
    \ *data),\n  void *data\n);\n```\n\n该函数注册回调函数 `xCallback`，在 `cnx` 上发生回滚时（无论是通过显式的\
    \ `ROLLBACK` 命令还是隐式的错误或约束违反），该函数都会被调用。\n\n如果事务因数据库连接被关闭而自动回滚，则不会调用回调函数。第三个参数 (`data`)\
    \ 是一个指向应用特定数据的指针，SQLite 会将其传递给回调函数。\n\n与 `sqlite3_commit_hook()` 一样，每次你调用 `sqlite3_rollback_hook()`，你提供的新回调函数将替换任何当前已注册的回调函数。如果之前注册了回调函数，`sqlite3_rollback_hook()`\
    \ 会返回之前的 `data` 参数。\n\n#### 更新挂钩\n\n`sqlite3_update_hook()` 用于监控给定数据库连接上行的所有 `update`、`insert`\
    \ 和 `delete` 操作。其形式如下：\n\n```c\nvoid *sqlite3_update_hook(\n  sqlite3 *cnx,\n\
    \  void(*)(void *, int, char const*, char const*, sqlite_int64),\n  void *data\n\
    );\n```\n\n回调函数的第一个参数是一个指向应用特定数据的指针，你在第三个参数中提供。回调函数具有以下形式：\n\n```c\nvoid callback\
    \ (\n  void * data,\n  int operation_code,\n  char const *db_name,\n  char const\
    \ *table_name,\n  sqlite_int64 rowid\n)\n```\n"
- fmt: "# CHAPTER 6 ■ THE CORE C API\n\nThe `operation_code` argument corresponds\
    \ to `SQLITE_INSERT`, `SQLITE_UPDATE`, and `SQLITE_DELETE` for `insert`, `update`,\
    \ and `delete` operations, respectively. The third and fourth arguments correspond\
    \ to the database name and table name the operation took place on. The final argument\
    \ is the `rowid` of the affected row. The callback is not invoked for operations\
    \ on system tables (for example, `sqlite_master` and `sqlite_sequence`). The return\
    \ value is a pointer to the previously registered callback function’s `data` argument,\
    \ if it exists.\n\n## Authorizer Functions\n\nPerhaps the most powerful event\
    \ filter is `sqlite3_set_authorizer()`. It allows you to monitor and control queries\
    \ as they are compiled. This function is declared as follows:\n\n```\nint sqlite3_set_authorizer(\n\
    \    sqlite3*,\n    int (*xAuth)( void*,int,\n    const char*, const char*,\n\
    \    const char*,const char*),\n    void *pUserData\n);\n```\n\nThis routine registers\
    \ a callback function that serves as an authorization function. SQLite will invoke\
    \ the callback function at statement compile time (not at execution time) for\
    \ various database events. The intent of the function is to allow applications\
    \ to safely execute user-supplied SQL. It provides a way to restrict such SQL\
    \ from certain operations (for example, anything that changes the database) or\
    \ to deny access to specific tables or columns within the database.\n\nFor clarity,\
    \ the form of the authorization callback function is as follows:\n\n```\nint auth(\
    \ void*, /* user data */\n    int, /* event code */\n    const char*, /* event\
    \ specific */\n    const char*, /* event specific */\n    const char*, /* database\
    \ name */\n    const char* /* trigger or view name */ );\n```\n\nThe first argument\
    \ is a pointer to application-specific data, which is passed in on the fourth\
    \ argument of `sqlite3_set_authorizer()`. The second argument to the authorization\
    \ function will be one of the defined constants listed in Table 6-3. These values\
    \ signify what kind of operation is to be authorized. The third and fourth arguments\
    \ to the authorization function are specific to the event code. These arguments\
    \ are listed with their respective event codes shown earlier in Table 6-2.\n\n\
    The fifth argument is the name of the database (main, temp, and so on) if applicable.\
    \ The sixth argument is the name of the innermost trigger or view that is responsible\
    \ for the access attempt or `NULL` if this access attempt is directly from top-level\
    \ SQL.\n\nThe return value of the authorization function should be one of the\
    \ constants `SQLITE_OK`, `SQLITE_DENY`, or `SQLITE_IGNORE`. The meaning of the\
    \ first two values is consistent for all events—permit or deny the SQL statement.\
    \ `SQLITE_DENY` will abort the entire SQL statement and generate an error.\n\n\
    The meaning of `SQLITE_IGNORE` is specific to the event in question. Statements\
    \ that read or modify records generate `SQLITE_READ` or `SQLITE_UPDATE` events\
    \ for each column the statement attempts to operate on. In this case, if the callback\
    \ returns `SQLITE_IGNORE`, the column in question will be excluded from the operation.\
    \ Specifically, attempts to read data from this column yield only `NULL` values,\
    \ and attempts to update it will silently fail.\n\n### Table 6-3\\. SQLite Authorization\
    \ Events\n\n| `Event Code` | `Argument 3` | `Argument 4` |\n|--------------|--------------|--------------|\n\
    | `SQLITE_CREATE_INDEX` | Index name | Table name |\n| `SQLITE_CREATE_TABLE` |\
    \ Table name | `NULL` |\n| `SQLITE_CREATE_TEMP_INDEX` | Index name | Table name\
    \ |\n| `SQLITE_CREATE_TEMP_TABLE` | Table name | `NULL` |\n| `SQLITE_CREATE_TEMP_TRIGGER`\
    \ | Trigger name | Table name |\n| `SQLITE_CREATE_TEMP_VIEW` | View name | `NULL`\
    \ |\n| `SQLITE_CREATE_TRIGGER` | Trigger name | Table name |\n| `SQLITE_CREATE_VIEW`\
    \ | View name | `NULL` |\n| `SQLITE_DELETE` | Table name | `NULL` |\n| `SQLITE_DROP_INDEX`\
    \ | Index name | Table name |\n| `SQLITE_DROP_TABLE` | Table name | `NULL` |\n\
    | `SQLITE_DROP_TEMP_INDEX` | Index name | Table name |\n| `SQLITE_DROP_TEMP_TABLE`\
    \ | Table name | `NULL` |\n| `SQLITE_DROP_TEMP_TRIGGER` | Trigger name | Table\
    \ name |\n| `SQLITE_DROP_TEMP_VIEW` | View name | `NULL` |\n| `SQLITE_DROP_TRIGGER`\
    \ | Trigger name | Table name |"
