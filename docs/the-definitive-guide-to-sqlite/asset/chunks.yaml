    Default Values


    The **default** keyword provides a default value for a column if one is not provided
    in an **insert** command.


    The **default** keyword is only a constraint in that it prevents the absence of
    a value, stepping in when needed. However, it does fall within domain integrity
    because it provides a policy for handling **null** values in a column. If a column
