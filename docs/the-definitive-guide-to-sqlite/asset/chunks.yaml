- fmt: '# CHAPTER 1 INTRODUCING SQLITE


    SQLite is quite versatile. It is a database, a programming library, and a command-line
    tool, as well an excellent learning tool that provides a good introduction to
    relational databases. There are many ways to use it—in embedded environments,
    websites, operating system services, scripts, and applications. For programmers,
    SQLite is like “data duct tape,” providing an easy way to bind applications and
    their data.


    ## 多样化的应用场景


    Like duct tape, there is no end to its potential uses. In a web environment, SQLite
    can help with managing complex session information. Rather than serializing session
    data into one big blob, individual pieces can be selectively written to and read
    from individual session databases. SQLite also serves as a good stand-in relational
    database for development and testing: there are no external RDBMSs or networking
    to configure or usernames and passwords to hinder the programmer’s focus. SQLite
    can also serve as a cache, hold configuration data, or, by leveraging its binary
    compatibility across platforms, even work as an application file format.


    ## 作为通用数据处理工具


    Besides being just a storage receptacle, SQLite can serve as a purely functional
    tool for general data processing. Depending on size and complexity, it may be
    easier to represent some application data structures as a table or tables in an
    in-memory database. With so many developers, analysts, and others familiar with
    relational databases and SQL, you can benefit from “assumed knowledge”—operating
    on the data relationally by using SQLite to do the heavy lifting rather than having
    to write your own algorithms to manipulate and sort data structures.


    If you are a programmer, imagine how much code it would take to implement the
    following SQL statement in your program:


    ```sql

    SELECT x, STDDEV(w)

    FROM table

    GROUP BY x

    HAVING x > MIN(z) OR x < MAX(y)

    ORDER BY y DESC

    LIMIT 10 OFFSET 3;

    ```


    If you are already familiar with SQL, imagine coding the equivalent of a subquery,
    compound query, `GROUP BY` clause, or multiway join in your favorite (or not so
    favorite) programming language. SQLite embeds all of this functionality into your
    application with minimal cost. With a database engine integrated directly into
    your code, you can begin to think of SQL as an offload engine in which to implement
    complex sorting algorithms in your program. This approach becomes more appealing
    as the size of your data set grows or as your algorithms become more complex.
    What’s more, SQLite can be configured to use a fixed amount of RAM and then offload
    data to disk if it exceeds the specified limit. This is even harder to do if you
    write your own algorithms. With SQLite, this feature is available with a simple
    call to a single SQL command.


    ## 优秀的学习工具


    SQLite is also a great learning tool for programmers—a cornucopia for studying
    computer science topics. From parser generators to tokenizers, virtual machines,
    B-tree algorithms, caching, program architecture, and more, it is a fantastic
    vehicle for exploring many well-established computer science concepts. Its modularity,
    small size, and simplicity make it easy to present each topic as an isolated case
    study that any individual could easily follow.


    ## 管理员的数据库


    SQLite is not just a programmer’s database. It is a useful tool for system administrators
    as well. It is small, compact, and elegant like finely honed versatile utilities
    such as `find`, `rsync`, and `grep`. SQLite has a command-line utility that can
    be used from the shell or command line and within shell scripts. However, it works
    even better with a large variety of scripting languages such as Perl, Python,
    TCL, and Ruby. Together the two can help with pretty much any task you can imagine,
    such as aggregating log file data, monitoring disk quotas, or performing bandwidth
    accounting in shared networks. Furthermore, since SQLite databases are ordinary
    disk files, they are easy to work with, transport, and back up.'
