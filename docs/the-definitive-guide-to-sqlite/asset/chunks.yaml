- fmt: "# 获取 SQLite\n\n可能为你的 Linux 平台获取 SQLite 新版本或其源代码的最佳方式是使用你发行版相关的软件包仓库。Red Hat、CentOS、Fedora\
    \ 及其他 Red Hat 衍生版可以使用 `yum` 来搜索并查找各种 SQLite 软件包。基于 Debian 的发行版（包括 Ubuntu）获取最新版本的\
    \ SQLite 毫无问题。SQLite 3 软件包在 Ubuntu 和 Debian 等众多仓库中在线可用。使用 `apt` 或 Synaptic 来搜索并获取你选择的软件包。\n\
    \n## 从源代码编译\n\n在 Linux、Mac OS X、BSD 变体或其他 Unix 系统上从源代码编译 SQLite 的过程与之前为 Windows\
    \ 平台给出的 MinGW/TakeOffGW 说明非常相似（实际上，更确切地说是反过来的；MinGW 安装模仿了 Linux 源代码安装！）。要在这些系统上构建\
    \ SQLite，你需要确保已安装 GNU 编译器集合（GCC），包括 Autoconf、Automake 和 Libtool。前面讨论的大多数系统默认都包含了所有这些工具。\n\
    \n具备了这些软件，你可以通过以下步骤构建 SQLite：\n\n### 步骤\n\n1.  从 SQLite 网站下载 Linux/Unix SQLite\
    \ tarball（源代码）。撰写本文时，当前版本是 `sqlite-amalgamation-3.6.23.1.tar.gz`。将其放置到一个目录中（例如\
    \ `/tmp`）。\n\n2.  导航到你的构建目录：\n    ```bash\n    cd /tmp\n    ```\n\n3.  解包 SQLite\
    \ tarball：\n    ```bash\n    tar -xzvf sqlite-amalgamation-3.6.23.1.tar.gz\n \
    \   ```\n\n4.  进入解包后的目录：\n    ```bash\n    cd sqlite-3.6.23.1\n    ```\n\n5. \
    \ 创建 makefile：\n    ```bash\n    ./configure\n    ```\n\n6.  其他选项，例如安装目录，也是可用的。要获取完整的配置选项列表，请运行：\n\
    \    ```bash\n    ./configure --help\n    ```\n\n7.  构建源代码：\n    ```bash\n   \
    \ make\n    ```\n\n8.  以 root 身份安装：\n    ```bash\n    make install\n    ```\n\n\
    **现在你的系统上已经安装了可用的 SQLite。** 如果你的系统上安装了 GNU Readline，那么 CLP 应该会被编译为支持 Readline。通过从命令行运行它来测试：\n\
    \n```bash\nroot@linux # sqlite3\n```\n\n这将使用内存数据库调用 CLP。输入 `.help` 以获取 Shell 命令列表。输入\
    \ `.exit` 关闭应用程序，或按 Ctrl+D。\n\n## 命令行程序\n\nSQLite CLP 是你可用于处理和管理 SQLite 数据库的最常用工具。它在所有平台上的操作方式相同，因此学会如何使用它能确保你始终拥有一个通用且熟悉的方式来管理你的数据库。CLP\
    \ 实际上是二合一的程序。它可以在 Shell 模式下作为交互式查询处理器运行，也可以从命令行运行以执行各种管理任务。\n\n### Shell 模式下的\
    \ CLP\n\n打开一个 Shell，并切换到某个临时文件夹——如果你在 Windows 上，可以是 `C:\\Temp`；如果你在 Unix 上，可以是\
    \ `/tmp`。如果你更愿意使用一个更永久的位置，可以创建一个 `sqlite` 目录——例如，Windows 下的 `c:\\sqlite` 或 Linux/Unix\
    \ 下的 `/sqlite`。这将是你的当前工作目录。在 Shell 工作过程中创建的所有文件都将位于此目录中。\n\n> **注意**：如果你需要回顾如何打开\
    \ Windows 命令提示符，请参考本章前面“获取命令行程序”部分中的步骤 5。\n\n要以 Shell 模式调用 CLP，在命令行中输入 `sqlite3`，后跟一个可选的数据库名称。如果你未指定数据库名称，SQLite\
    \ 将使用内存数据库（其内容会在 CLP 退出时丢失）。\n\n将 CLP 用作交互式 Shell 时，你可以发出查询、获取模式信息、导入导出数据以及执行许多其他数据库任务。CLP\
    \ 会将发出的任何语句视为查询，除非该命令以点号（`.`）开头。这些命令是为特定的 CLP 操作保留的，通过输入 `.help` 可以获取完整列表，如下所示：\n\
    \n```bash\nfuzzy@linux:/tmp$ sqlite3\n```"
  raw: 'Probably the best way to get new versions of SQLite and/or its source for
    your Linux platform is from the relevant package repositories for your distribution.
    Red Hat, CentOS, Fedora, and other Red Hat derivatives can use **yum** to search
    and find various SQLite packages. Debian-based distributions (including Ubuntu)
    will have no trouble getting up-to-date versions of SQLite. SQLite 3 packages
    are available online in both Ubuntu and Debian repositories, among others. Use
    **apt** or Synaptic to search and retrieve the packages of your choice.


    Compiling SQLite from Source


    Compiling SQLite from source on Linux, Mac OS X, the BSD flavors, or other Unix
    systems follows very closely the MinGW/TakeOffGW instructions given earlier for
    the Windows platform (actually, it is more the other way around; MinGW installation
    apes Linux source installation!). To build SQLite on these systems, you need to
    ensure that you have the GNU Compiler Collection (GCC) installed, including Autoconf,
    Automake, and Libtool. Most of the systems already discussed include all of these
    by default.


    With this software in place, you can build SQLite by doing the following:


    CHAPTER 2 ■ GETTING STARTED


    1\. Download the Linux/Unix SQLite tarball (source code) from the SQLite website.
    At the time


    of this writing, the current version is **sqlite-amalgamation-3.6.23.1.tar.gz**.
    Place it in a directory (e.g., **/tmp**).


    2\. Navigate to your build directory:


    **cd /tmp**


    3\. Unpack the SQLite tarball:


    **tar -xzvf sqlite-amalgamation-3.6.23.1.tar.gz**


    4\. Move into the unpacked directory:


    **cd sqlite-3.6.23.1**


    5\. Create the makefile:


    **./configure**


    6\. Other options, such as the installation directory, are also available. For
    a


    complete list of configure options, run this:


    **./configure --help**


    7\. Build the source:


    **make**


    8\. As root, install:


    **make install**


    **You now have a functional SQLite installation on your system. If you have GNU
    Readline installed on you system, the CLP should be compiled with Readline support.
    Test it by running it from the


    command line:


    **root@linux # sqlite3**


    **This will invoke the CLP using an in-memory database. Type **.help** for a list
    of shell commands.


    Type **.exit** to close the application, or press Ctrl+D.


    The Command-Line Program


    The SQLite CLP is the most common means you can use to work with and manage SQLite
    databases. It operates the same way on all platforms, so learning how to use it
    ensures you will always have a common and familiar way to manage your databases.
    The CLP is really two programs in one. It can be run in shell mode acting as an
    interactive query processor, or it can run from the command line to perform various
    administration tasks.


    CHAPTER 2 ■ GETTING STARTED


    The CLP in Shell Mode


    Open a shell, and change directories to some temporary folder—say **C:\Temp**
    if you are on Windows or


    **/tmp** if you’re in Unix. If you’re happy working from a more permanent location,
    you can create a **sqlite** directory—e.g., **c:\sqlite** under Windows or **/sqlite**
    for Linux or Unix. This will be your current working directory. All files you
    create in the course of working with the shell will be created in this directory.


    ■ **Note** If you need a refresher on how to get to the Windows command prompt,
    refer to step 5 in the “Getting the Command-Line Program” section earlier in this
    chapter.


    To invoke the CLP as in shell mode, type **sqlite3** from a command line, followed
    by an optional database name. If you do not specify a database name, SQLite will
    use an in-memory database (the contents of which will be lost when the CLP exits).


    Using the CLP as an interactive shell, you can issue queries, obtain schema information,
    import and export data, and perform many other database tasks. The CLP will consider
    any statement issued as a query, except for commands that begin with a period
    (**.** ). These commands are reserved for specific CLP


    operations, a complete list of which can be obtained by typing **.help**, as shown
    here:


    **fuzzy@linux:/tmp$ sqlite3**'
