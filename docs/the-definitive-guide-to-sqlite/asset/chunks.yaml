    **stmt = db.prepare(''select * from episodes;'')**


    **stmt.step()**


    **stmt.finalize()**


    **The implementation of **spam_mother_in_law()** is left as an exercise for the
    reader.**


    **The **step()** function has to get a **SHARED** lock on the database to perform
    the **select**. However, say there is a writer active. Normally, **step()** would
    return **SQLITE_BUSY**. However, in this case it doesn’t. The pager (which is
    one that deals with locks) calls the **busy()** function instead, because it has
    been registered as the busy handler. **busy()** increments a counter, forwards
    your mother-in-law 100 random messages from your spam folder, and returns 1, which
    the pager interprets as true—keep trying to get the lock. The pager then tries
    again to get the **SHARED** lock. Say the database is still locked. The pager
    calls the busy handler again. Only this time, **busy()** returns 0, which the
    pager interprets as false. In this case, rather than retrying the lock, the pager
    sends **SQLITE_BUSY** up the stack, and that’s what **step()** ends up returning.


    If you just want to kill time waiting for a lock, you don’t have to write your
    own busy handler. The SQLite API has one for you. It is a simple busy handler
    that sleeps for a given period of time waiting for a lock. In the API, the function
    is called **sqlite3_busy_timeout()**, and it is supported by some extension libraries.
    You can essentially say “try sleeping for 10 seconds when you can’t get a lock,”
    and the pager will do that for you. If it sleeps for 10 seconds and still can’t
    get the lock, then it will return **SQLITE_BUSY**.


    Using the Right Transaction


    Let’s consider the previous example again, but this time the command is an **update**
    rather than a **select**.


    What does **SQLITE_BUSY** actually mean now? In **select**, it just means, “I
    can’t get a **SHARED** lock.” But what does is mean for an **update**? The truth
    is, you don’t really know what it means. **SQLITE_BUSY** could mean that the connection
    failed to get a **SHARED** lock because there is a writer pending. It could also
    mean that it got a **SHARED** lock but couldn’t get to **RESERVED**. The point
    is you don’t know the state of the database or the state of your connection for
    that matter. In autocommit mode, **SQLITE_BUSY** for a write operation is completely
    indeterminate. So, what do you do next? Should you just keep calling **step()**
    over and over until the command goes through?


