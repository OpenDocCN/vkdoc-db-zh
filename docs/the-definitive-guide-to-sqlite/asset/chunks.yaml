    available to you when creating any Android application. These included maximum
    VM application heap size, cache partition size, and


    device RAM Size.


    A subtle but frustrating issue can arise when you begin working with large sets
    of data derived from your SQLite databases. You run some queries, fetch very large
    results into your **Cursor** object, and start working with the data. At some
