    # 第四章 ■ SQLite 高级 SQL


    ## 数据库锁


    在 SQLite 中，锁定与事务紧密相关。要有效地使用事务，你需要了解一些关于其锁定机制的知识。


    SQLite 采用粗粒度锁定。当一个会话正在写入数据库时，所有其他会话都会被锁定，直到该写入会话完成其事务。为此，SQLite 采用了一种锁定方案，该方案有助于将写锁的获取推迟到最后一刻，以最大化并发性。


    ### 预写式日志：SQLite 的未来


    SQLite 3.7.0 版本即将推出预写式日志（WAL）。这将改变事务和锁定的行为，使 SQLite 摆脱此处描述的“单一写入者”行为。第 11 章将介绍这些即将对
    SQLite 内部机制做出的更改。


    `cast` 表有一个名为 `name` 的单列，该列带有 `unique` 约束，并且冲突解决策略设置为 `rollback`。任何在 `name` 列上触发约束违规的
    `insert` 或 `update` 操作，都将通过 `rollback` 解决方案进行仲裁，而非默认的 `abort`。其结果将是不仅中止当前语句，还会中止整个事务：


    ```

    sqlite> begin;

    sqlite> insert into cast values(''Jerry'');

    SQL error: uniqueness constraint failed

    sqlite> commit;

    SQL error: cannot commit - no transaction is active

    ```


    这里的 `commit` 失败是因为 `name` 列的冲突解决策略已经中止了事务。`create index` 的工作方式相同。表和索引内的冲突解决会将操作的默认行为从
    `abort` 更改为在那些列是约束违规来源时为这些特定列所定义的行为。


    语句级别（DML）的冲突解决会覆盖对象级别（DDL）定义的冲突解决。


    基于前面的例子继续：


    ```

    sqlite> begin;

    sqlite> insert or replace into cast values(''Jerry'');

    sqlite> commit;

    ```


    `insert` 语句中的 `replace` 解决方案覆盖了为 `cast.name` 定义的 `rollback` 解决方案。


    SQLite 使用锁升级策略，即连接逐步获取对数据库的独占访问权限以便写入。SQLite 中有五种不同的锁定状态：`unlocked`（未锁定）、`shared`（共享）、`reserved`（保留）、`pending`（等待）和
    `exclusive`（独占）。任何给定时间，每个数据库会话（或连接）只能处于这些状态之一。此外，每种状态都有一个对应的锁，除了未锁定状态——处于未锁定状态不需要锁。


    首先，最基本的状态是未锁定。在此状态下，没有会话正在访问数据库中的数据。当你连接到数据库或甚至使用 `BEGIN` 发起事务时，你的连接处于未锁定状态。


    下一个高于未锁定的状态是共享状态。为了从数据库读取（而非写入），会话必须首先进入共享状态，因此必须获取一个共享锁。多个会话可以在任何给定时间同时获取并持有共享锁。因此，多个会话可以在任何给定时间从一个公共数据库读取。但是，在此期间（只要有共享锁处于活动状态），没有任何会话可以写入数据库。


    如果一个会话想要写入数据库，它必须首先获取一个保留锁。对于给定的数据库，一次只能持有一个保留锁。共享锁可以与保留锁共存。保留锁是向数据库写入的第一个阶段。它不会阻止持有共享锁的会话读取，也不会阻止会话获取新的共享锁。


    一旦会话拥有保留锁，它就可以开始进行修改；但是，这些修改会被缓存，而不是实际写入磁盘。读取者的更改存储在内存缓存中（有关更多信息，请参阅本章后面“数据库配置”一节中关于
    `cache_size` pragma 的讨论）。


    当会话想要将更改（或事务）提交到数据库时，它开始将其保留锁提升为独占锁的过程。要获得独占锁，它必须首先将其保留锁提升为等待锁。等待锁启动了一个消耗过程，在此过程中无法再获取新的共享锁。也就是说，其他持有现有共享锁的会话可以照常继续，但其他会话无法获取新的共享锁。此时，持有等待锁的会话正在等待其他持有共享锁的会话完成它们正在做的事情并释放它们。


    一旦所有共享锁被释放，持有等待锁的会话就可以将其提升为独占锁。然后它可以自由地对数据库进行更改。所有先前缓存的更改都会被写入数据库文件。


    ## 死锁


    尽管你可能觉得前面关于锁定的讨论很有趣，但此时你可能想知道这有什么关系。为什么你需要了解锁定？嗯，如果你不知道自己在做什么，最终可能会陷入死锁。


    考虑表 4-2 中说明的以下场景。两个会话 A 和 B——彼此完全不知情——同时处理同一个数据库。会话 A 执行第一个命令，B 执行第二个和第三个命令，A
    执行第四个命令，依此类推。


    *表 4-2. 死锁图景*


    | **会话 A** | **会话 B** |

    |---|---|

    | `sqlite> begin;` | |

    | | `sqlite> begin;` |

    | `sqlite> insert into foo values (''x'');` | |

    | | `sqlite> select * from foo;` |

    | `sqlite> commit;` | |

    | `SQL error: database is locked` | |

    | | `sqlite> insert into foo values (''x'');` |

    | | `SQL error: database is locked` |


    两个会话最终都陷入了死锁。会话 B 是第一个尝试写入数据库的，因此拥有一个等待锁。A 尝试写入，但在 `INSERT` 试图将其共享锁提升为保留锁时失败了。


    为了讨论方便，假设 A 决定等待数据库变得可写。B 也是如此。那么此时，其他所有人实际上也被锁定了。如果你尝试打开第三个会话，它甚至无法读取数据库。原因是
    B 持有等待锁，这阻止了任何会话获取共享锁。所以，不仅 A 和 B 死锁了，他们还将其他所有人都锁在了数据库之外。基本上，你有一个共享锁和一个等待锁，它们都不想放弃控制权，在其中一方放弃之前，谁也做不了任何事。


    如何避免死锁？A 和 B 不可能坐下来开会，让他们的律师来解决。A 和 B 甚至不知道对方的存在。答案是选择正确的事务类型来处理任务。


    ## 事务类型


    SQLite 有三种不同的事务类型，它们在不同的锁定状态启动事务。


    事务可以以 `deferred`（延迟）、`immediate`（立即）或 `exclusive`（独占）方式启动。事务的类型在 `begin` 命令中指定：


    `begin [ deferred | immediate | exclusive ] transaction;`


    延迟事务在必须获取锁之前不会获取任何锁。因此，对于延迟事务，`begin` 语句本身不执行任何操作——它以未锁定状态启动。这是默认设置。如果你只是执行 `begin`，那么你的事务就是
    `deferred`，因此处于未锁定状态。多个会话可以同时启动 `deferred` 事务而不会创建任何锁。在这种情况下，对数据库的第一个读取操作会获取一个共享锁，类似地，第一个写入操作会尝试获取一个保留锁。

