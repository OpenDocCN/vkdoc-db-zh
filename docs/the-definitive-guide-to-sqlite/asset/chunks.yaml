    ## 引言


    《SQLite 权威指南》全面地涵盖了 SQLite 的知识，为你提供了在各种情境下使用它所需的知识和经验。无论你是一名硬核的 C 语言开发者、移动设备爱好者，还是仅仅想了解有史以来最好的嵌入式和小占用空间数据库引擎的更多知识，这本书都是为你准备的。


    ### 前提条件


    本书假定读者没有 SQLite 的先验知识，尽管自然所有经验水平的读者都将从这些材料中受益。SQLite 是用 C 语言编写的，拥有广泛的 C API，并且还支持许多其他语言，如
    Python、Tcl、Ruby 和 Java。作为一个数据库引擎，它也广泛使用 SQL。


    尽管本书中的示例对任何技能水平的读者都有益，但我们没有篇幅同时教授这些语言。


    ### 本书结构


    本书包含 11 章，涵盖以下主要领域：


    - SQLite 介绍、获取与安装

    - 在 SQLite 中使用 SQL

    - SQLite 的 C API

