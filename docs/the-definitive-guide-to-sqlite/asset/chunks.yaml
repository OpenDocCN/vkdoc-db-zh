    ## Getting Database File Information


    获取逻辑数据库信息（如表名、DDL语句等）的主要方法是使用`sqlite_master`视图，该视图提供了给定数据库中包含的所有对象的详细信息。


    如果想要获取物理数据库结构的信息，可以使用一个名为SQLite Analyzer的工具，可以从SQLite网站下载其二进制文件。SQLite Analyzer提供了关于SQLite数据库磁盘上结构的详细技术信息。这些信息包括数据库、表和索引的详细统计信息，可以是单个对象的，也可以是整体的。它提供了从数据库属性（如页面大小、表数量、索引数量、文件大小和平均页面密度（利用率））到单个数据库对象的详细描述等所有信息。


    报告之后是解释报告中所有术语的详细定义列表。`sqlite_analyzer`的部分输出如下：


