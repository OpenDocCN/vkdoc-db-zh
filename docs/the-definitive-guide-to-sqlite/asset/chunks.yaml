    #Disconnect\n$dbh->disconnect;\n```\n\n在内部，`prepare()` 方法对应于 `sqlite3_prepare_v2()`\
    \ 方法。类似地，`execute()` 调用第一个 `sqlite3_step()` 方法。它会自动判断是否有数据要返回。如果没有数据（例如，非 `select`\
    \ 语句），它会自动结束查询。\n\n`fetchrow_array()`、`fetchrow_hashref()` 和 `fetch()` 方法也会调用\
    \ `sqlite3_step()`，在结果耗尽之前返回结果集中的一行。\n\n此外，你可以使用数据库对象的 `do()` 方法一步完成非 `select`\
    \ 语句。清单 8-2 展示了使用内存数据库的示例。\n\n*清单 8-2. `do()` 方法*\n\n```perl\nuse DBI;\nmy $dbh\
    \ = DBI->connect(\"dbi:SQLite:dbname=:memory:\", \"\", \"\", { RaiseError => 1\
    \ });\n$dbh->do(\"create table cast (name)\");\n$dbh->do(\"insert into cast values\
    \ ('Elaine')\");\n$dbh->do(\"insert into cast values ('Jerry')\");\n$dbh->do(\"\
    insert into cast values ('Kramer')\");\n$dbh->do(\"insert into cast values ('George')\"\
    );\n$dbh->do(\"insert into cast values ('Newman')\");\n\nmy $sth = $dbh->prepare(\"\
    select * from cast\");\n$sth->execute;\nwhile($row = $sth->fetch) {\n    print\
    \ join(\", \", @$row), \"\\n\";\n}\n$sth->finish;\n$dbh->disconnect;\n```\n\n\
    语句句柄对象的 `finish()` 方法将对查询对象调用 `sqlite3_finalize()`，如果它尚未被调用的话。该程序产生以下输出：\n\n```\n\
    Elaine\nJerry\nKramer\nGeorge\nNewman\n```\n\n## 参数绑定\n\n参数绑定遵循 `DBI` 规范中定义的方法。尽管\
    \ SQLite 支持位置参数和命名参数，但 Perl 接口仅使用位置参数，如清单 8-3 所示。\n\n*清单 8-3. 在 Perl 中进行参数绑定*\n\
    \n```perl\nuse DBI;\nmy $dbh = DBI->connect( \"dbi:SQLite:dbname=foods.db\", \"\
    \", \"\",\n                        { RaiseError => 1 });\nmy $sth = $dbh->prepare(\"\
    select * from foods where name like :1\");\n$sth->execute('C%');\nwhile($row =\
    \ $sth->fetchrow_hashref) {\n    print @$row{'name'} . \"\\n\";\n}\n$sth->finish;\n\
    $dbh->disconnect;\n```\n\n`execute()` 方法接受在 `prepare()` 中定义的参数值。对我们在许多示例中使用的演进版\
    \ foods 数据库运行此查询会返回 73 行（取决于你在前面章节中玩巧克力 bobka 有多开心）。\n\n## 用户定义函数\n\n用户定义函数和聚合是使用驱动程序的私有方法实现的。它们与\
    \ SQLite C API 中的对应方法非常相似。函数使用以下私有方法注册：\n\n```perl\n$dbh->func( $name, $argc,\
    \ $func_ref, \"create_function\" )\n```\n\n这里，`$name` 指定 SQL 函数名，`$argc` 指定参数数量，`$func_ref`\
    \ 指向提供实现的 Perl 函数的引用。清单 8-4 展示了在 Perl 中实现 `hello_newman()` 的示例。\n\n*清单 8-4. Perl\
    \ 中的 `hello_newman()`*\n\n```perl\nuse DBI;\nsub hello_newman {\n    return \"\
    Hello Jerry\";\n}\n# Connect\nmy $dbh = DBI->connect( \"dbi:SQLite:dbname=foods.db\"\
    , \"\", \"\",\n                        { RaiseError => 1 });\n# Register function\n\
    $dbh->func('hello_newman', 0, \\&hello_newman, 'create_function');\n# Call it\n\
    print $dbh->selectrow_arrayref(\"select hello_newman()\")->[0] . \"\\n\";\n$dbh->disconnect;\n\
    ```\n\n如果你提供 `-1` 作为参数数量，那么该函数将接受可变数量的参数。\n\n## 聚合\n\n用户定义的聚合是作为包实现的。每个包实现一个步进函数和一个结束函数。步进函数针对选中的每一行被调用。提供给该函数的第一个值是上下文，这是一个在函数调用之间保持的持久值。其余值是\
    \ SQL 语句中提供给聚合函数的参数。"
- fmt: "# CHAPTER 8 ■ LANGUAGE EXTENSIONS\n\n## Perl\n\n`finalize` function is provided\
    \ the same context as the `step` function. The following example implements a\
    \ simple `SUM` aggregate called `perlsum`. The aggregate is implemented in a package\
    \ called `perlsum.pm`, shown in Listing 8-5.\n\n*Listing 8-5. The `perlsum()`\
    \ Aggregate*\n\n```perl\npackage perlsum;\n\nsub new { bless [], shift; }\n\n\
    sub step {\n    my ( $self, $value ) = @_;\n    @$self[0] += $value;\n}\n\nsub\
    \ finalize {\n    my $self = $_[0];\n    return @$self[0];\n}\n\nsub init {\n\
    \    $dbh = shift;\n    $dbh->func( \"perlsum\", 1, \"perlsum\", \"create_aggregate\"\
    \ );\n}\n\n1;\n```\n\nThe `init` function is used to register the aggregate in\
    \ the database connection.\n\n## Python\n\nThere are numerous approaches to working\
