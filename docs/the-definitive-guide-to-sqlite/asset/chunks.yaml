    \ Tip\n2 The Ex-Girlfriend, The Pony Remark, The Busboy, The Baby Shower, ...\n\
    3 The Note, The Truth, The Dog, The Library, The Pen, The Parking Garage ...\n\
    ...\n```\n\n第 7 章 ■ 扩展 C API\n\n如你所见，`select` 语句从 `episode` 表中拉回数据，而 `str_agg()`\
    \ 聚合则按季连接剧集名称。你可以将其视为类似于电子表格和其他工具中的交叉表或数据透视表。\n\n这就是聚合概念的简要说明。它们与函数如此相似，一旦你熟悉了函数，就没什么好多说的了。\n\
    \n# 排序规则\n\n如前所述，排序规则的目的是对字符串进行排序。但在开始之前，重要的是要回顾一下，SQLite 的显式类型模式允许不同的数据类型共存于同一列中。例如，考虑以下\
    \ SQL（位于 `collate1.sql` 中）：\n\n```sql\n.headers on\n.m column\ncreate table foo(x);\n\
    insert into foo values (1);\ninsert into foo values (2.71828);\ninsert into foo\
    \ values ('three');\ninsert into foo values (X'0004');\ninsert into foo values\
    \ (null);\nselect quote(x), typeof(x) from foo;\n```\n\n将其输入 SQLite CLP 将产生以下结果：\n\
    \n```\nC:\\temp\\examples\\ch7> sqlite3 < collate.sql\nquote(x) typeof(x)\n----------\
    \ ----------\n1 integer\n2.71828 real\n'three' text\nX'0004' blob\nNULL null\n\
    ```\n\n你拥有 SQLite 的所有原生存储类，都存在于列 `x` 中。自然，问题就来了：当你尝试对这个列进行排序时会发生什么？也就是说，在讨论如何排序字符串之前，我们需要先回顾一下不同数据类型是如何排序的。\n\
    \n当 SQLite 对结果集中的列进行排序时（当它对该列中的值使用比较运算符如 `<` 或 `>=` 时），它首先做的是根据存储类对列的值进行排列。然后，在每个存储类内部，它会根据该类特有的方法对值进行排序。\n\
    \n存储类按以下顺序排序，从先到后：\n\n1.  `NULL` 值\n2.  `INTEGER` 和 `REAL` 值\n3.  `TEXT` 值\n4.\
    \  `BLOB` 值\n\n第 7 章 ■ 扩展 C API\n\n现在，让我们修改前面示例中的 `SELECT` 语句，添加一个 `ORDER BY`\
    \ 子句，使 SQL 变成如下形式：\n\n```sql\nselect quote(x), typeof(x) from foo order by x;\n\
    ```\n\n重新运行该查询（位于 `collate2.sql` 中）证实了这种排序：\n\n```\nC:\\temp\\examples\\ch7> sqlite3\
    \ < collate.sql\nquote(x) typeof(x)\n---------- ----------\nNULL null\n1 integer\n\
    2.71828 real\n'three' text\nX'0004' blob\n```\n\n`NULL` 最先，`INTEGER` 和 `REAL`\
    \ 其次（按数值顺序），然后是 `TEXT`，最后是 `BLOB`。\n\nSQLite 对每个存储类采用特定的排序方法。`NULL` 很明显——没有排序顺序。数值按数值大小排序；整数和浮点数都根据其各自的量化值进行比较。`BLOB`\
    \ 按二进制值排序。最后，文本排序正是排序规则的用武之地。\n\n## 排序规则定义\n\n*排序规则* 是比较字符串的方法。一个流行的术语表¹ 将排序规则定义如下：\n\
    \n> *使用与语言相关的规则进行文本比较，而非对数字字符代码进行按位比较。*\n\n一般来说，排序规则涉及字符串和字符的排序、比较和排列。排序规则方法通常采用排序序列。排序序列就是一个字符的有序列表，通常编号以便于记忆和使用。这个列表反过来用于规定字符如何排序、比较和排列。给定任意两个字符，排序规则（列表）可以确定哪个在前，或者它们是否相同。\n\
    \n## 排序规则如何工作\n\n通常，一个排序规则方法通过分解两个字符串并使用排序规则比较它们各自的字符来比较它们。它们通过将字符串对齐并从左到右比较字符来实现（图\
    \ 7-2）。例如，字符串 `'jerry'` 和 `'jello'` 的比较是先比较每个字符串的第一个字母（在此例中都是 *j*）。如果根据排序序列，一个字母的数值大于另一个，比较就结束：具有较大字母的字符串被认为是较大的，不需要进一步比较。另一方面，如果字母具有相同的值，则该过程继续到每个字符串的第二个字母，然后是第三个，依此类推，直到发现某些差异（或者没有发现差异，在这种情况下，字符串被认为是相等的）。如果一个字符串比另一个先用完字母，那么由排序规则方法来决定这意味着什么。\n\
    \n¹ 参见 [`www.ibm.com/developerworks/library/glossaries/unicode.html`](http://www.ibm.com/developerworks/library/glossaries/unicode.html)。\n\
    \n## 图 7-2. 二进制排序规则\n\n![](img/index-233_1.png)\n\n第 7 章 ■ 扩展 C API\n\n在这个例子中，排序规则是\
    \ ASCII 字符集。图中每个字符下方的数字是其 ASCII 值。使用刚才描述的排序方法，字符串比较继续到第三个字符，此时 `'jerry'` 胜出，因为它有一个值为\
    \ 114 的 `r`，而 `'jello'` 则有一个值为 108 的较差的 `'l'`。基于 ASCII 排序规则，`'jerry'` > `'jello'`。\n"
- fmt: '# CHAPTER 7 ■ THE EXTENSION C API


    Had `''jerry''` been `''Jerry''` , then `''jello''` would have won out, because
    big `J`’s 74 pales to little `j`’s 106, so the comparison would have been resolved
    on the first character, with the prize going to `''jello''` .


    In short, `''jello''` > `''Jerry''` .


    However, to continue the example, we could use a different collation wherein uppercase
    values are assigned the same numbers as their lowercase counterparts (a case-insensitive
    collation sequence).


    Then the comparison between `''Jerry''` and `''jello''` would go back to `''Jerry''`
    because in this new collation `J` and `j` are the same, pulling the rug out from
    under `''jello''` ’s lowercase `j` superiority.


    But enough about collations. You get the picture. A sequence is a sequence. Ultimately,
    it’s not the collation sequence that matters but the collation method. Collation
    methods don’t have to use sequences. They can do whatever they want, however strange
    or mad that may seem.


    Odds are that you are really confused by now and are just ready for a summary.
    So here it is. Think of collation methods as the way that strings are compared.
    Think of collation sequences as the way characters are compared. Ultimately, all
    that matters in SQLite is how strings are compared, and the two terms refer to
    just that. Therefore, the two terms `collation method` and `collation sequence`
    should just be thought of as string comparison. If you read `collation`, think
    string comparison. If you read `collation`, think string comparison. All in all,
    just think string comparison. That is the way the API is geared. When you create
    a custom collation, SQLite hands it two strings, `a` and `b`, and the collation
    returns whether string `a` is less than, equal to, or greater than string `b`.
    That’s it, plain and simple.


    ## Standard Collation Types


    SQLite comes with a single built-in collation named `binary`, which is implemented
    by applying the `memcmp()` routine from the standard C library to the two strings
    to be compared. The `binary` collation happens to work well for English text.
    For other languages or locales, alternative collation may be preferred. SQLite
    also offers an alternate collation called `nocase`, which treats upper- and lowercase
    versions of the same letter as equivalents.


    Collations are applied by associating them with columns in a table or an index
    definition or by specifying them in a query. For example, to create a case-insensitive
    column `bar` in `foo`, you would define `foo` as follows:


    ```sql

    create table foo (bar text collate nocase, baz integer);

    ```


    From that point on, whenever SQLite deals with a `bar`, it will use the `nocase`
    collation. If you prefer not to attach a collation to a database object but would
    rather specify it as needed on a query-by-query basis, you can specify them directly
    in queries, as in the following:


    ```sql

    select * from foo order by bar collate nocase;

    ```


    SQLite can also apply a collation as the result of a `cast()` expression where
    you convert nontext data (that wouldn’t normally have a textual collation) to
    the `text` data type. We could cast our `baz` numeric value to text and apply
    the `nocase` collation like this:


    ```sql

    select cast(baz) collate nocase as baz_as_text from foo order by baz_as_text;

    ```


    Although the example is a little contrived, the capability will help you especially
    when dealing with data of mixed storage classes being converted to text.


    ## A Simple Example


    To jump into collations, let’s begin with a simple example to get the big picture.
    Let’s implement a collation called `length_first`. `Length_first` will take two
    strings and decide which one is greater depending on the length of the string.
    Image Jerry at the deli, demanding to only eat ingredients with short names—or
    Kramer insisting he has a great deal on foods with really long names. Whimsical,
    but very *Seinfeld*.'
