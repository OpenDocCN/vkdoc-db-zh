    Android 的大量设备使用 SQLite 进行开发。


    ## 内部机制


    **第 11 章，“SQLite 内部机制”** 探讨了 SQLite 的内部工作原理。这是对源代码的高级概述，并提供了主要子系统如何实现的一瞥。这为程序员提供了对
    SQLite 设计决策、假设和权衡的更深入理解，同时也为想要参与 SQLite 开发的开发者提供了一个出发点。


