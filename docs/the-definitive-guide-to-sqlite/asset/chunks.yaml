  trans: '# 第八章：语言扩展


    SQLite 是用 C 语言编写的，并拥有自己的 C 语言 API，这使得 C 在某种程度上成为了其“原生语言”。然而，开源社区为 SQLite 提供了许多扩展，使其能够对接多种编程语言和库，例如
    Perl、Python、Ruby、Java、.NET/C#、Qt 和 ODBC。在许多情况下，针对一种给定的语言，会有多个由不同开发者开发以满足不同需求的扩展可供选择。


    许多扩展遵循各种 API 标准。例如，其中一个 SQLite Perl 扩展遵循了 Perl 的数据库访问标准接口 `DBI`。类似地，其中一个 Python
    扩展遵循了 Python 的 `DB API` 规范，至少一个 Java 扩展也遵循了 `JDBC` 规范。无论它们使用何种特定的 API，所有扩展在内部都建立在同一个
    SQLite C API 之上，你在第 5、6 和 7 章中已经探索过这个 C API。在某种程度上，所有扩展都反映了 SQLite 设计的 C 语言基础。有些扩展既提供符合其特定
    API 标准的标准接口，也提供一个能更好地反映 SQLite API 设计的替代接口。因此，在这种情况下，你可以根据需求选择最适合你的接口。


    总的来说，无论其特定的 API 是什么，所有扩展的整体结构都是相同的。它们遵循相似的模式。一旦你理解了这个模式，每个接口在很多方面都会开始显得相似。都会有一种代表单个数据库连接的连接对象，以及一种代表
    SQL 查询的游标对象，你可以通过游标执行命令并遍历结果。从概念上讲，这相当简单。在内部，你面对的是 `sqlite3` 结构和 `sqlite3_stmt`
    结构，这两个结构在我们之前的解释和示例中都很熟悉。适用于语言扩展的规则与适用于 C API 的规则相同。


    本章涵盖六种流行语言的语言扩展：Perl、Python、Ruby、Java、Tcl 和 PHP。目的是为你提供一个便捷的入门指南，让你能够快速开始在多种不同语言中使用
    SQLite。我们要在此强调，我们不会教授你这些语言本身——因此，期望你对 Perl、Python 或 Ruby 等语言有一定的了解。


    对每种语言的介绍都遵循一个常见的大纲，由初学者在使用 SQLite 语言扩展时常问的问题组成：

    *   连接数据库

    *   执行查询

    *   使用绑定参数

    *   实现用户定义函数或聚合函数


    这些主题共同构成了你在任何特定的 SQLite 扩展中可能用到的绝大部分功能。你可能会发现，在 SQLite 中开发用户定义函数与在你选择的语言中实现逻辑之间存在一些“开发者张力”。虽然我们不能替你做出决定，但我们可以为你提供知识和专业意见，以帮助你自行做出选择。


    并非每个扩展都支持所有这些主题。例如，有些扩展不提供绑定参数。相反，有些扩展提供此处未涵盖的独特功能。这里的目标是提供一个一致、直接的过程，让你能够轻松开始在各种语言中使用
    SQLite。一旦你开始使用任何一个扩展，通常就很容易掌握该扩展提供的任何特殊功能。


    在适当的情况下，本章会阐述不同扩展如何使用 C API 的各个部分，以帮助你理解其底层工作原理。如果你还没有阅读前面关于 C API 的章节，我们强烈建议你阅读。无论你使用什么编程语言进行开发，理解
    SQLite 的工作原理几乎总是有帮助的，这样你才能充分利用它并编写出好的代码。它将帮助你选择最合适的查询方法，理解事务的范围，并知道如何预期、处理或避免锁等问题，等等。


    ## 选择扩展


    对于当今许多流行语言，在选择 SQLite 的语言绑定时，你会多到让人眼花缭乱。选择适合你的扩展通常不仅仅是一个纯粹的技术决策。为了提供帮助，我们介绍的接口最符合以下标准：

    *   支持最新的 SQLite 3 版本

    *   文档完善

    *   稳定性高

    *   可移植性好


    尽管有这些标准，但在某些情况下，有多个候选扩展满足所有资格。在这种情况下，决定因素更多是个人偏好而非其他。但这里的目的不是偏爱某个特定扩展。而是传授概念，使你能够轻松选择任何语言中的任何扩展，并快速有效地利用它和
    SQLite。


    我们选择某个特定扩展的原因可能与你不同。其他一些需要考虑的要点包括：

    *   *许可证和许可证兼容性*：扩展的许可证会直接影响你如何使用它。它是开源的吗？如果是，是基于哪个许可证？如果你是为商业产品编写代码，你绝对需要考虑这一点。

    *   *数据类型映射*：扩展如何将 SQLite 的存储类映射到该语言的原生类型？所有值都作为文本返回吗？是否使用了某种疯狂的强制转换方案？如果没有，是否有简单的方法来确定映射关系？你能控制映射的完成方式吗？

    *   *查询方法*：C API 支持三种不同的查询方法。扩展使用哪一种？理想情况下，它应该支持所有三种。

    *   *API 覆盖度*：对于不易映射到许多标准数据库接口的其他领域，扩展的覆盖程度如何？例如，它是否允许你调用 SQL 跟踪函数或操作安全函数？你真的需要这些功能吗？

    *   *链接和分发*：将扩展与特定版本的 SQLite 一起使用有多容易？它在分发包中是否包含了某个版本的 SQLite？它是使用共享库，还是静态链接到特定版本？如果你需要升级
    SQLite，使用该扩展能多容易地做到这一点？是否会有什么东西被破坏？


    还有其他考虑因素，例如社区支持、邮件列表活跃度、维护者的支持和响应速度、回归测试、代码质量……这个列表还可以继续下去。所有这些都可能在你决定是否使用某个特定扩展时扮演重要角色。只有你自己能回答这些问题。


    SQLite 维基有一个页面提供了详尽的语言接口列表，位于 [www.sqlite.org/cvstrac/wiki?p=SqliteWrappers](http://www.sqlite.org/cvstrac/wiki?p=SqliteWrappers)。这里涵盖的所有接口都取自这个列表。本章所有示例的源代码位于
    `examples` 压缩文件的 `ch8` 目录中，可从 Apress 网站获取。


    ## Perl


    Perl 有两个 SQLite 扩展。第一个是基于 Perl 的数据库连接标准 `DBI` 建模的；因此，如果你理解 `DBI`，使用这个扩展就不会有任何问题。对于那些不熟悉
    Perl `DBI` 的人，你可以在 CPAN 网站上查阅完整文档：

    '
- fmt: "## Installation\n\nThe current version of the SQLite DBI driver at the time\
    \ of writing is `DBD-SQLite-1.29`. You can install it by using CPAN or by manually\
    \ building the package from source. The prerequisites for the SQLite `DBD` module\
    \ are, of course, Perl, a C compiler, and the `DBI` module. The latest versions\
    \ of the SQLite DBI driver also require YAML (“Yet another markup language” or\
    \ “YAML Ain’t Markup Language,” depending on whom you believe), used for various\
    \ configuration files.\n\nTo install `DBD::SQLite` using CPAN, invoke the CPAN\
    \ shell from the command line as follows:\n\n```\nfuzzy@linux $ cpan\ncpan> install\
    \ DBD::SQLite\n... lots of CPAN install messages ...\n```\n\nTo install from source\
    \ in Linux/Unix, change to a temporary directory and do the following:\n\n```\n\
    fuzzy@linux $ wget http://search.cpan.org/CPAN/authors/id/A/AD/ADAMK/DBD-SQLite-1.29.tar.gz\n\
    ... lots of wget messages ...\nfuzzy@linux $ tar xzvf DBD-SQLite-1.29.tar.gz\n\
    ... lots of tar messages ...\nfuzzy@linux $ cd DBD-SQLite-1.29\nfuzzy@linux DBD-SQLite-1.29\
    \ $ perl Makefile.PL\n... lots of perl messages ...\nChecking installed SQLite\
    \ version...\nLooks good\nfuzzy@linux DBD-SQLite-1.29 $ make install\n... more\
    \ perl messages ...\n```\n\nThe SQLite Perl extension includes its own copy of\
    \ the SQLite3 binaries, so there is no need to compile and install SQLite beforehand.\
    \ SQLite is embedded in the extension.\n\n## Connecting\n\nTo check the SQLite\
    \ driver is installed, use the `DBI` function `available_drivers()` within Perl:\n\
    \n```perl\nuse DBI;\nprint \"Drivers: \" . join(\", \", DBI->available_drivers()),\
    \ \"\\n\";\n```\n\nYou connect to a database using the standard `DBI::connect`\
    \ function, as follows:\n\n```perl\nuse DBI;\nmy $dbh = DBI->connect( \"dbi:SQLite:dbname=foods.db\"\
    , \"\", \"\",\n                        { RaiseError => 1 });\n$dbh->disconnect;\n\
    ```\n\nThe second and third arguments correspond to the driver name and database\
    \ name. The third and fourth correspond to username and password, which are not\
    \ applicable to SQLite.\n\nThe function returns a database handle object representing\
    \ the database connection. Internally, this corresponds to a single `sqlite3`\
    \ structure. You can create in-memory databases by passing `:memory:` for the\
    \ name of the database. In this case, all tables and database objects will then\
    \ reside in memory for the duration of the session and will be destroyed when\
    \ the connection is closed. You close the database using the database handle’s\
    \ `disconnect` method.\n\n## Query Processing\n\nQueries are performed using the\
    \ standard `DBI` interface as well. You can use the `prepare()`, `execute()`,\
    \ `fetch()`, or `selectrow()` functions of the database connection handle. All\
    \ of these are fully documented in the `DBI` man page. Listing 8-1 shows an example\
    \ of using queries.\n\n*Listing 8-1. Executing Queries in Perl*\n\n```perl\nuse\
    \ DBI;\n# Connect to database\nmy $dbh = DBI->connect( \"dbi:SQLite:dbname=foods.db\"\
    , \"\", \"\",\n                        { RaiseError => 1 });\n\n# Prepare the\
    \ statment\nmy $sth = $dbh->prepare(\"select name from foods limit 3\");\n# Execute\n\
    $sth->execute;\n\n# Print a human-readable header\nprint \"\\nArray:\\n\\n\";\n\
    # Iterate over results and print\nwhile($row = $sth->fetchrow_arrayref) {\n  \
    \  print @$row[0] . \"\\n\";\n}\n\n# Do the same thing, this time using hashref\n\
    print \"\\nHash:\\n\\n\";\n$sth->execute;\nwhile($row = $sth->fetchrow_hashref)\
    \ {\n    print @$row{'name'} . \"\\n\";\n}\n\n# Finalize the statement\n$sth->finish;\n\
    #Disconnect\n$dbh->disconnect;\n```\n\nInternally, the `prepare()` method corresponds\
    \ to the `sqlite3_prepare_v2()` method. Similarly, `execute()` calls the first\
    \ `sqlite3_step()` method. It automatically figures out whether there is data\
    \ to be returned. If there is no data (for example, non-`select` statements),\
    \ it automatically finalizes the query.\n\nThe `fetchrow_array()`, `fetchrow_hashref()`,\
    \ and `fetch()` methods call `sqlite3_step()` as well, returning a single row\
    \ in the result set until the results are exhausted.\n\nAdditionally, you can\
    \ run non-`select` statements in one step using the database object’s `do()` method.\
    \ Listing 8-2 illustrates this using an in-memory database.\n\n*Listing 8-2. The\
    \ `do()` Method*\n\n```perl\nuse DBI;\nmy $dbh = DBI->connect(\"dbi:SQLite:dbname=:memory:\"\
    , \"\", \"\", { RaiseError => 1 });\n$dbh->do(\"create table cast (name)\");\n\
    $dbh->do(\"insert into cast values ('Elaine')\");\n$dbh->do(\"insert into cast\
    \ values ('Jerry')\");\n$dbh->do(\"insert into cast values ('Kramer')\");\n$dbh->do(\"\
    insert into cast values ('George')\");\n$dbh->do(\"insert into cast values ('Newman')\"\
    );\n\nmy $sth = $dbh->prepare(\"select * from cast\");\n$sth->execute;\nwhile($row\
    \ = $sth->fetch) {\n    print join(\", \", @$row), \"\\n\";\n}\n$sth->finish;\n\
    $dbh->disconnect;\n```\n\nThe statement handle object’s `finish()` method will\
    \ call `sqlite3_finalize()` on the query object, if it has not already done so.\
    \ This program produces the following output:\n\n```\nElaine\nJerry\nKramer\n\
    George\nNewman\n```\n\n## Parameter Binding\n\nParameter binding follows the method\
    \ defined in the `DBI` specification. Although SQLite supports both positional\
    \ and named parameters, the Perl interface uses only positional parameters, demonstrated\
    \ in Listing 8-3.\n\n*Listing 8-3. Parameter Binding in Perl*\n\n```perl\nuse\
    \ DBI;\nmy $dbh = DBI->connect( \"dbi:SQLite:dbname=foods.db\", \"\", \"\",\n\
    \                        { RaiseError => 1 });\nmy $sth = $dbh->prepare(\"select\
    \ * from foods where name like :1\");\n$sth->execute('C%');\nwhile($row = $sth->fetchrow_hashref)\
    \ {\n    print @$row{'name'} . \"\\n\";\n}\n$sth->finish;\n$dbh->disconnect;\n\
    ```\n\nThe `execute()` method takes the parameter values defined in `prepare()`.\
    \ Running this against the evolving foods database we’ve used for many of our\
    \ examples returns 73 rows (depending on how much fun you had playing with chocolate\
    \ bobka in previous chapters).\n\n## User-Defined Functions\n\nUser-defined functions\
    \ and aggregates are implemented using private methods of the driver. They follow\
    \ closely to their counterparts in the SQLite C API. Functions are registered\
    \ using the following private method:\n\n```perl\n$dbh->func( $name, $argc, $func_ref,\
    \ \"create_function\" )\n```\n\nHere, `$name` specifies the SQL function name,\
    \ `$argc` specifies the number of arguments, and `$func_ref` specifies a reference\
    \ to the Perl function that provides the implementation. Listing 8-4 illustrates\
    \ an implementation of `hello_newman()` in Perl.\n\n*Listing 8-4. `hello_newman()`\
    \ in Perl*\n\n```perl\nuse DBI;\nsub hello_newman {\n    return \"Hello Jerry\"\
    ;\n}\n# Connect\nmy $dbh = DBI->connect( \"dbi:SQLite:dbname=foods.db\", \"\"\
    , \"\",\n                        { RaiseError => 1 });\n# Register function\n\
    $dbh->func('hello_newman', 0, \\&hello_newman, 'create_function');\n# Call it\n\
    print $dbh->selectrow_arrayref(\"select hello_newman()\")->[0] . \"\\n\";\n$dbh->disconnect;\n\
    ```\n\nIf you provide `-1` as the number of arguments, then the function will\
    \ accept a variable number of arguments.\n\n## Aggregates\n\nUser-defined aggregates\
    \ are implemented as packages. Each package implements a step function and a finalize\
    \ function. The step function is called for each row that is selected. The first\
    \ value supplied to the function is the context, which is a persistent value maintained\
    \ between calls to the function. The remaining values are the arguments to the\
    \ aggregate function supplied in the SQL statement."
