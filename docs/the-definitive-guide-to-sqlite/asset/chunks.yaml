  trans: "\n# 第 6 章 ■ 核心 C API\n\n此示例连接到 `foods.db` 数据库，查询 `episodes` 表，并打印出其中所有记录的所有列。请记住，这是一个简化示例——在调用\
    \ `sqlite3_step()` 时，我们还需要检查其他一些情况，例如错误和繁忙状态，但我们稍后会处理它们。\n\n与 `sqlite3_exec()`\
    \ 类似，`sqlite3_prepare_v2()` 可以接受包含多条 SQL 语句的字符串。然而，与 `sqlite3_exec()` 不同的是，它只会处理字符串中的第一条语句。但是，通过提供\
    \ `pzTail` 输出参数，它确实使您能够轻松地处理字符串中的后续 SQL 语句。\n\n在您调用 `sqlite3_prepare()` 后，如果提供了此参数，它将指向\
    \ `zSQL` 字符串中下一条语句的起始位置。使用 `pzTail`，可以按如下方式在循环中执行给定字符串中的一批 SQL 命令：\n\n```\nwhile(sqlite3_complete(sql)\
    \ ){\n    rc = sqlite3_prepare(db, sql, -1, &stmt, &tail);\n    /* 处理查询结果 */\n\
    \    /* 跳转到字符串中的下一条命令。 */\n    sql = tail;\n}\n```\n\n此示例使用了另一个尚未介绍的 API 函数——`sqlite3_complete()`，它如其名所示。它接受一个字符串，如果其中至少包含一条完整（但不一定有效）的\
    \ SQL 语句，则返回 true，否则返回 false。实际上，`sqlite_complete()` 会查找字符串的分号终止符（并考虑 SQL 中的字面量）。因此，尽管其名称暗示它是某种万无一失的观察员来检查您的语句，但它实际上只是一个方便的工具，用于在\
    \ `sqlite` 命令行中编写多行语句时显示续行提示，以及执行其他类似的有用任务。\n\n## 获取记录\n\n到目前为止，您已经了解了如何通过 `sqlite3_exec()`\
    \ 和 `sqlite3_get_table()` 获取记录和列。相比之下，预处理查询在从数据库记录中获取信息时提供了更多选项。\n\n对于返回记录的语句，可以使用\
    \ `sqlite3_column_count()` 和 `sqlite3_data_count()` 获取结果集中的列数，其声明如下：\n\n```\n\
    int sqlite3_column_count(sqlite3_stmt *pStmt);\nint sqlite3_data_count(sqlite3_stmt\
    \ *pStmt);\n```\n\n`sqlite3_column_count()` 返回与语句句柄关联的列数。您可以在语句句柄实际执行之前调用它。如果查询不是\
    \ `select` 语句，`sqlite3_column_count()` 将返回 0。类似地，`sqlite3_data_count()` 在 `sqlite3_step()`\
    \ 返回 `SQLITE_ROW` 后，返回当前记录的列数。此函数仅在语句句柄具有活动游标时有效。\n\n## 获取列信息\n\n您可以使用 `sqlite3_column_name()`\
    \ 获取当前记录中每列的名称，其声明如下：\n\n```\nconst char *sqlite3_column_name(\n    sqlite3_stmt*,\
    \ /* 语句句柄 */\n    int iCol       /* 列序号 */\n);\n```\n\n类似地，您可以使用 `sqlite3_column_type()`\
    \ 获取每列关联的存储类，其声明如下：\n\n```\nint sqlite3_column_type(\n    sqlite3_stmt*, /* 语句句柄\
    \ */\n    int iCol       /* 列序号 */\n);\n```\n\n此函数返回一个整数值，对应于五个存储类代码之一，定义如下：\n\
    \n```\n#define SQLITE_INTEGER 1\n#define SQLITE_FLOAT   2\n#define SQLITE_TEXT\
    \    3\n#define SQLITE_BLOB    4\n#define SQLITE_NULL    5\n```\n\n这些是 SQLite\
    \ 的原生数据类型，或称为存储类，如第 4 章所述。SQLite 数据库中存储的所有数据都以这五种形式之一存储，具体取决于其初始表示形式和列的亲和性。就我们的目的而言，术语\
    \ *存储类* 和 *数据类型* 是同义词。有关存储类的更多信息，请参见第 4 章的“存储类”和“类型亲和性”部分。\n"
- fmt: "# SQLite核心C API\n\n## 获取列声明类型\n\n你可以使用`sqlite3_column_decltype()`函数获取列在表模式中定义的声明数据类型，该函数声明如下：\n\
    \n```c\nconst char *sqlite3_column_decltype(\n    sqlite3_stmt*, /* statement\
    \ handle */\n    int /* column ordinal */\n);\n```\n\n如果结果集中的列不对应于实际的表列（例如，该列是字面值、表达式、函数或聚合的结果），此函数将返回`NULL`作为该列的声明类型。\n\
    \n例如，假设数据库中有一个表定义如下：\n\n```sql\nCREATE TABLE t1(c1 INTEGER);\n```\n\n然后执行以下查询：\n\
    \n```sql\nSELECT c1 + 1, 0 FROM t1;\n```\n\n在这种情况下，`sqlite3_column_decltype()`将为第一列返回`INTEGER`，为第二列返回`NULL`。\n\
    \n## 获取其他列信息\n\n除了声明类型，你还可以使用以下函数获取列的其他信息：\n\n```c\nconst char *sqlite3_column_database_name(sqlite3_stmt\
    \ *pStmt, int iCol);\nconst char *sqlite3_column_table_name(sqlite3_stmt *pStmt,\
    \ int iCol);\nconst char *sqlite3_column_origin_name(sqlite3_stmt *pStmt, int\
    \ iCol);\n```\n\n第一个函数返回列关联的数据库，第二个返回其所属的表，最后一个函数返回模式中定义的列的实际名称。也就是说，如果你在SQL语句中为列指定了别名，`sqlite3_column_origin_name()`将返回其在模式中定义的实际名称。请注意，只有在编译SQLite时使用了`SQLITE_ENABLE_COLUMN_METADATA`预处理器指令，这些函数才可用。\n\
    \n## 获取列值\n\n你可以使用`sqlite3_column_*xxx*()`函数族获取当前记录中每个列的值，其通用形式如下：\n\n```c\nxxx\
    \ sqlite3_column_xxx(\n    sqlite3_stmt*, /* statement handle */\n    int iCol\
    \ /* column ordinal */\n);\n```\n\n这里的`*xxx*`是你希望数据被表示的数据类型（例如`int`、`blob`、`double`等）。以下是最常用的`sqlite3_column_*xxx*()`函数：\n\
    \n```c\nint sqlite3_column_int(sqlite3_stmt*, int iCol);\ndouble sqlite3_column_double(sqlite3_stmt*,\
    \ int iCol);\nlong long int sqlite3_column_int64(sqlite3_stmt*, int iCol);\nconst\
    \ void *sqlite3_column_blob(sqlite3_stmt*, int iCol);\nconst unsigned char *sqlite3_column_text(sqlite3_stmt*,\
    \ int iCol);\nconst void *sqlite3_column_text16(sqlite3_stmt*, int iCol);\n```\n\
    \n对于每个函数，SQLite将内部表示（列中的存储类）转换为函数名中指定的类型。SQLite使用一系列规则将内部数据类型表示转换为请求的类型。表6-1列出了这些规则。\n\
    \n### 表6-1. 列类型转换规则\n\n| 内部类型 | 请求类型 | 转换 |\n| :--- | :--- | :--- |\n| `NULL`\
    \ | `INTEGER` | 结果为0。 |\n| `NULL` | `FLOAT` | 结果为0.0。 |\n| `NULL` | `TEXT` | 结果为`NULL`指针。\
    \ |\n| `NULL` | `BLOB` | 结果为`NULL`指针。 |\n| `INTEGER` | `FLOAT` | 从整数转换为浮点数。 |\n\
    | `INTEGER` | `TEXT` | 结果是整数的ASCII表示。 |\n| `INTEGER` | `BLOB` | 结果是整数的ASCII表示。\
    \ |\n| `FLOAT` | `INTEGER` | 从浮点数转换为整数。 |\n| `FLOAT` | `TEXT` | 结果是浮点数的ASCII表示。\
    \ |\n| `FLOAT` | `BLOB` | 结果是浮点数的ASCII表示。 |\n| `TEXT` | `INTEGER` | 使用`atoi()`。\
    \ |\n| `TEXT` | `FLOAT` | 使用`atof()`。 |\n| `TEXT` | `BLOB` | 无变化。 |\n| `BLOB`\
    \ | `INTEGER` | 转换为`TEXT`，然后使用`atoi()`。 |\n| `BLOB` | `FLOAT` | 转换为`TEXT`，然后使用`atof()`。\
    \ |\n| `BLOB` | `TEXT` | 如果需要，添加`\\000`终止符。 |\n\n与后面描述的`sqlite3_bind_*xxx*()`函数类似，`BLOB`需要多做一点工作，因为必须指定其长度才能复制它们。对于`BLOB`列，你可以使用`sqlite3_column_bytes()`获取数据的实际长度，其声明如下：\n\
    \n```c\nint sqlite3_column_bytes(\n    sqlite3_stmt*, /* statement handle */\n\
    \    int iCol\n);\n```"
  raw: 'You can obtain the declared data type of a column as it is defined in the
    table’s schema using the **sqlite3_column_decltype()** function, which is declared
    as follows:


    **const char *sqlite3_column_decltype( sqlite3_stmt*, /* statement handle */**


    **int /* column ordinal */);**


    **If a column in a result set does not correspond to an actual table column (say,
    for example, the column is the result of a literal value, expression, function,
    or aggregate), this function will return **NULL** as the declared type of that
    column. For example, suppose you have a table in your database defined as**


    **follows:


    CHAPTER 6 ■ THE CORE C API


    **CREATE TABLE t1(c1 INTEGER);**


    **Then you execute the following query:**


    ****SELECT c1 + 1, 0 FROM t1;**


    **In this case, **sqlite3_column_decltype()** will return **INTEGER** for the
    first column and **NULL** for the second.**


    **In addition to the declared type, you can obtain other information on a column
    using the following functions:


    ****const char *sqlite3_column_database_name(sqlite3_stmt *pStmt, int iCol);**


    **const char *sqlite3_column_table_name(sqlite3_stmt *pStmt, int iCol);**


    **const char *sqlite3_column_origin_name(sqlite3_stmt *pStmt, int iCol);**


    **The first function will return the database associated with a column, the second
    will return its table, and the last function will return the column’s actual name
    as defined in the schema. That is, if you assigned the column an alias in the
    SQL statement, **sqlite3_column_origin_name()** will return its actual name as
    defined in the schema. Note that these functions are available only if you compile
    SQLite with the **SQLITE_ENABLE_COLUMN_METADATA** preprocessor directive.**


    **Getting Column Values


    You can obtain the values for each column in the current record using the **sqlite3_column_
    *xxx*()** functions, which are of the following general form:


    **xxx sqlite3_column_xxx( sqlite3_stmt*, /* statement handle */**


    **int iCol /* column ordinal */);**


    **Here ***xxx*** is the data type you want the data represented in (for example,
    **int**, **blob**, **double**, and so on). These are the most commonly used of
    the **sqlite3_column_ *xxx*()** functions: **int sqlite3_column_int(sqlite3_stmt*,
    int iCol);**


    **double sqlite3_column_double(sqlite3_stmt*, int iCol);**


    **long long int sqlite3_column_int64(sqlite3_stmt*, int iCol);**


    **const void *sqlite3_column_blob(sqlite3_stmt*, int iCol);**


    **const unsigned char *sqlite3_column_text(sqlite3_stmt*, int iCol);**


    **const void *sqlite3_column_text16(sqlite3_stmt*, int iCol);**


    **For each function, SQLite converts the internal representation (storage class
    in the column) to the type specified in the function name. There are a number
    of rules SQLite uses to convert the internal data type representation to that
    of the requested type. Table 6-1 lists these rules.


    CHAPTER 6 ■ THE CORE C API


    *Table 6-1\. Column Type Conversion Rules*


    **Internal Type**


    **Requested Type**


    **Conversion**


    **NULL INTEGER**


    Result is 0.


    **NULL FLOAT**


    Result is 0.0.


    **NULL TEXT**


    Result is a **NULL** pointer.


    **NULL BLOB**


    Result is a **NULL** pointer.


    **INTEGER FLOAT**


    Convert from integer to float.


    **INTEGER TEXT**


    Result is the ASCII rendering of the integer.


    **INTEGER BLOB**


    Result is the ASCII rendering of the integer.


    **FLOAT INTEGER**


    Convert from float to integer.


    **FLOAT TEXT**


    Result is the ASCII rendering of the float.


    **FLOAT BLOB**


    Result is the ASCII rendering of the float.


    **TEXT INTEGER**


    Use **atoi()**.


    **TEXT FLOAT**


    Use **atof()**.


    **TEXT BLOB**


    No change.


    **BLOB INTEGER**


    Convert to **TEXT** and then use **atoi()**.


    **BLOB FLOAT**


    Convert to **TEXT** and then use **atof()**.


    **BLOB TEXT**


    Add a **\000** terminator if needed.


    Like the **sqlite3_bind_ *xxx*()** functions described later, **BLOB**s require
    a little more work in that you must specify their length in order to copy them.
    For **BLOB** columns, you can get the actual length of the data using **sqlite3_column_bytes()**,
    which is declared as follows:


    **int sqlite3_column_bytes( sqlite3_stmt*, /* statement handle */**'
