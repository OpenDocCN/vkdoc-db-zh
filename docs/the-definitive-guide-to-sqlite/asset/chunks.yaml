    ```


    第 3 章 ■ SQL FOR SQLITE


    ■ **注意** 分号被 SQLite 用作命令终止符，向系统发出信号，表示要处理的命令已结束。命令终止符最常与交互式程序相关联，这些程序旨在让用户对数据库执行查询。分号是许多系统中常见的
    SQL 命令终止符，尽管有些系统使用 **\g** 甚至 **go** 这个词。


    命令又由一系列**标记（tokens）**组成。标记可以是字面量、关键字、标识符、表达式或特殊字符。标记由空白（如空格、制表符和换行符）分隔。


    ## 字面量


    字面量（Literals），也称为**常量（constants）**，表示显式值。有三种：字符串字面量、数字字面量和二进制字面量。字符串字面量是一个或多个被单引号包围的字母数字字符。以下是一些例子：


    ```sql

    ''Jerry''

    ''Newman''

    ''JujyFruit''

    ```


    尽管 SQLite 支持使用单引号或双引号来界定字符串值，但我们强烈建议你只使用单引号。这是 SQL 标准，如果你遇到一个严格执行此标准的系统，这将为你节省很多麻烦。如果单引号是字符串值的一部分，它们必须表示为两个连续的单引号。例如，`Kenny''s
    chicken` 应表示如下：


    ```sql

    ''Kenny''''s chicken''

    ```


    数字字面量以整数、十进制或科学记数法表示。以下是一些例子：


    ```sql

    -1

    3.142

    6.0221415E23

    ```


    二进制值使用符号 **x''0000''** 表示，其中每个数字都是一个十六进制值。二进制值必须表示为 2 的倍数个十六进制值（8 位）。以下是一些例子：


    ```sql

    x''01''

    X''0fff''

    x''0F0EFF''

    X''0f0effab''

    ```


    第 3 章 ■ SQL FOR SQLITE


    ## 关键字和标识符


    **关键字（Keywords）**是在 SQL 中有特定含义的词。这些词包括 **select**、**update**、**insert**、**create**、**drop**
    和 **begin** 等。**标识符（Identifiers）**指数据库中的特定对象，如表或索引。关键字是保留字，不能用作标识符。SQL 对关键字和标识符不区分大小写。以下是等效的语句：


    ```sql

    SELECT * from foo;

    SeLeCt * FrOm FOO;

    ```


    默认情况下，SQLite 中的字符串字面量值是大小写敏感的，因此值 **''Mike''** 与值 **''mike''** 不同。


    ## 注释


    SQLite 中的注释由两个连续的连字符（**--**）表示，它会注释掉该行剩余的部分；或者由多行 C 风格符号（**/\* \*/**）表示，它可以跨越多行。这是一个例子：


    ```sql

    -- 这是一行注释

    /*

    这是一条跨越

    两行的注释

    */

    ```


    再次强调，除非你有充分的理由使用 C 风格符号，否则我们建议在你的 SQLite SQL 脚本中坚持使用两个连续连字符的 SQL 标准。


    ## 创建数据库


    表是开始探索 SQLite 中 SQL 的自然起点。表是关系数据库中的标准信息单位。一切都围绕着表展开。表由行和列组成。虽然这听起来很简单，但表带来了各种其他概念，这些概念无法用几段简洁的文字很好地概括。事实上，这几乎需要整章的篇幅。所以，我们要在这里做的是关于表的概要介绍——刚好足够你创建一个简单的表，并在你想的时候删除它。一旦我们完成了这个，本章的所有其他部分就都有东西可依了。


    ## 创建表


    与关系模型一样，SQL 由几个部分组成。例如，它有一个结构部分，用于创建和销毁数据库对象。语言的这一部分通常称为**数据定义语言（DDL）**。类似地，它有一个功能部分，用于对这些对象执行操作（例如检索和操作数据）。语言的这一部分称为**数据操作语言（DML）**。创建表属于
    DDL，即结构部分。


    你使用 **create table** 命令创建表，其定义如下：


    ```sql

    create [temp] table table_name (column_definitions [, constraints]);

    ```


    **temp** 或 **temporary** 关键字创建一个**临时表**。这种表，顾名思义是临时的——它只在你的会话期间存在。一旦你断开连接，它就会被销毁（如果你还没有手动销毁它）。**temp**
    周围的方括号表示它是命令的可选部分。


    每当你看到任何语法在方括号中时，就意味着其中的内容是可选的。此外，管道符号（**|**）表示一个备选（可以理解为单词 or）。例如，以下语法：


    ```sql

    create [temp|temporary] table … ;

    ```


    这意味着 **temp** 或 **temporary** 关键字可以可选地使用。你可以说 **create temp table foo…**，或者你可以说
    **create temporary table foo…**。在这种情况下，它们的意思是一样的。


    如果你不创建临时表，那么 **create table** 会创建一个**基表**。术语**基表**指的是数据库中一个已命名的、持久的表。这是最常见的表类型。

