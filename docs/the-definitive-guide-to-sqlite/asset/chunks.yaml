    **SQLite 权威指南**


    权威指南


    亲爱的读者：


    在企业级计算的世界之外，有一种数据库，它让海量的软件和硬件能够运用关系型数据库的功能，却没有传统数据库管理系统的包袱和成本。


    这个数据库就是 SQLite——一个嵌入式的数据库，其占用空间小得惊人，却能处理规模巨大的数据库。SQLite 配备了一系列强大的功能，可通过多种编程和开发环境使用。它支持
    C、Java、Perl、PHP、Python、Ruby、TCL 等多种语言。


    *《SQLite 权威指南（第 2 版）》*致力于全面介绍这个强大数据库的最新版本。它深入概述了 SQLite 的能力和 API。本书还以 SQLite 为基础，帮助数据库开发新手初次涉足。只需很短的时间，你就能编写出从服务器端浏览器插件到下一个伟大的
    iPhone 或 Android 应用程序等各式各样的程序！


    * 你将学习针对 C、Java、Perl、PHP、Python、Ruby 和 Tcl 的 SQLite 扩展。

    * 你将获得关于 SQLite 内部机制的扎实讲解。

    * 你将探索如何使用 SQLite 开发 iOS（iPhone）和 Android 应用程序。


    SQLite 是全球成千上万产品选择的解决方案，从手机和 GPS 设备到机顶盒和网页浏览器。你几乎每天都在使用 SQLite，却没有意识到它！


    *掌控这个紧凑而强大的工具，在你的应用程序中嵌入复杂的 SQL 数据库*


    诚挚地，


    格兰特·艾伦 和 迈克·欧文斯


