    ## 第四章 ■ SQLITE 的高级 SQL


    如果在 `integer primary key` 后包含关键字 `autoincrement`，SQLite 将对该列使用不同的键生成算法。该算法基本上防止了
    `rowid` 被回收。它保证每次 `insert` 操作都提供新的（非回收的）`rowid`。当创建一个包含 `autoincrement` 约束的列的表时，SQLite
    会在一个名为 `sqlite_sequence` 的系统表中跟踪该列的最大 `rowid`。在后续的所有 `insert` 操作中，它只会使用大于该最大值的值。如果达到了绝对最大值，则
    SQLite 将在后续的 `insert` 操作中返回 `SQLITE_FULL` 错误。以下是一个示例：


    ```

    sqlite> create table maxed_out(id integer primary key autoincrement, x text);


    sqlite> insert into maxed_out values (9223372036854775807, ''last one'');


    sqlite> select * from sqlite_sequence;


    name seq


    ---------- -------------------


    maxed_out 9223372036854775807


    sqlite> insert into maxed_out values (null, ''will not work'');


    SQL error: database is full

    ```


    在这里，我们提供了主键值。然后 SQLite 将此值作为 `maxed_out.id` 的最大值存储在 `sqlite_sequence` 中。我们提供了回绕前的最后一个（最大的）64
    位值。


    在下一次 `insert` 操作中，你使用了生成的默认值，该值必须是单调递增的。这回绕到了 0，于是 SQLite 发出了 `SQLITE_FULL` 错误。


    尽管 SQLite 在 `sqlite_sequence` 表中跟踪 `autoincrement` 列的最大值，但这并不阻止你在 `insert` 命令中为其提供自己的值。唯一的要求是你提供的值在该列中必须是唯一的。以下是一个示例：


    ```

    sqlite> drop table maxed_out;


    sqlite> create table maxed_out(id integer primary key autoincrement, x text);


    sqlite> insert into maxed_out values(10, ''works'');


    sqlite> select * from sqlite_sequence;


    name seq


    ---------- ----------


    maxed_out 10


    sqlite> insert into maxed_out values(9, ''works'');


    sqlite> select * from sqlite_sequence;


    name seq


    ---------- ----------


    maxed_out 10


    sqlite> insert into maxed_out values (9, ''fails'');


    SQL error: PRIMARY KEY must be unique


    sqlite> insert into maxed_out values (null, ''should be 11'');


    sqlite> select * from maxed_out;


    id x


    ---------- ------------


    9 works


    10 works


    11 should be 11


    sqlite> select * from sqlite_sequence;


    name seq


    ---------- ----------


    maxed_out 11

    ```


    在这里，你删除了 `maxed_out` 表并重新创建它，然后插入了一条明确指定 `rowid` 为 10 的记录。接着你插入了一条 `rowid` 小于
    10 的记录，这成功了。你用相同的值再次尝试，由于 `unique` 约束而失败。最后，你使用默认键值插入了另一条记录，SQLite 提供了下一个值——10+1。


    总之，`autoincrement` 防止 SQLite 回收主键值（`rowid`），并在 `rowid` 达到最大的有符号 64 位整数值时停止。添加此功能是为了满足某些需要这种行为的特定应用程序。除非你的应用程序有此类特定需求，否则对于自增列，也许最好只使用
    `integer primary key`。


    与 `unique` 约束类似，`primary key` 约束也可以定义在多个列上。你不必为你的主键使用整数值。如果你选择使用其他值，SQLite 仍会在内部维护
    `rowid` 列，但也会在你声明的主键上放置一个 `unique` 约束。以下是一个示例：


    ```

    sqlite> create table pkey(x text, y text, primary key(x,y));


    sqlite> insert into pkey values (''x'',''y'');


    sqlite> insert into pkey values (''x'',''x'');


    sqlite> select rowid, x, y from pkey;


    rowid x y


    ---------- ---------- ----------

    ```

