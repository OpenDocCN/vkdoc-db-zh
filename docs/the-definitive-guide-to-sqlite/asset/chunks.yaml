- fmt: '# CHAPTER 4 ■ ADVANCED SQL FOR SQLITE


    If you provide a value for every column of a table in ``insert``, then the column
    list can be omitted. In this case, the database assumes that the order of values
    provided in the value list corresponds to the order of columns as declared in
    the ``create table`` statement. Here’s an example:


    ```

    sqlite> insert into foods values(NULL, 1, ''Blueberry Bobka'');

    ```


    ```

    sqlite> select * from foods where name like ''%Bobka'';

    id          type_id     name

    ----------  ----------  ---------------

    10          1           Chocolate Bobka

    413         1           Cinnamon Bobka

    414         1           Blueberry Bobka

    ```


    Notice here the order of arguments. `''Blueberry Bobka''` came after `1` in the
    value list. This is because of the way the table was declared. To view the table’s
    definition, type ``.schema foods`` at the shell prompt:


    ```

    sqlite> .schema foods

    CREATE TABLE foods(

    id integer primary key,

    type_id integer,

    name text );

    CREATE INDEX foods_name_idx on foods (name COLLATE NOCASE);

    ```


    The first column is ``id``, followed by ``type_id``, followed by ``name``. This,
    therefore, is the order you must list values in ``insert`` statements on foods.
    Why did the preceding ``insert`` statement use a ``NULL`` for ``id``? SQLite knows
    that ``id`` in ``foods`` is an autoincrement column, and specifying a ``NULL``
    is the equivalent of not providing a value at all. Not specifying a value triggers
    the automatic key generation. It’s just a convenient trick. There is no deeper
    meaning or theoretical basis behind it. We will look at the subtleties of autoincrement
    columns later in this chapter.


    ## Inserting a Set of Rows


    Subqueries can be used in ``insert`` statements, both as components of the value
    list and as a complete replacement of the value list. When you specify a subquery
    as the value list, you are really inserting a set of rows, because you are inserting
    the set of rows returned by that subquery. Here’s an example that generates a
    set having just one row:


    ```

    insert into foods

    values (null,

    (select id from food_types where name=''Bakery''),

    ''Blackberry Bobka'');

    ```


    ```

    select * from foods where name like ''%Bobka'';

    id          type_id     name

    ----------  ----------  ----------------

    10          1           Chocolate Bobka

    413         1           Cinnamon Bobka

    414         1           Blueberry Bobka

    415         1           Blackberry Bobka

    ```


    Here, rather than hard-coding the ``type_id`` value, I had SQLite look it up for
    me. Here’s another example:


    ```

    insert into foods

    select last_insert_rowid()+1, type_id, name from foods

    where name=''Chocolate Bobka'';

    ```


    ```

    select * from foods where name like ''%Bobka'';

    id          type_id     name

    ----------  ----------  ----------------

    10          1           Chocolate Bobka

    413         1           Cinnamon Bobka

    414         1           Blueberry Bobka

    415         1           Blackberry Bobks

    416         1           Chocolate Bobka

    ```


    This query completely replaces the value list with a ``select`` statement. As
    long as the number of columns in the ``select`` clause matches the number of columns
    in the table (or the number of columns in the columns list, if provided), ``insert``
    will work just fine. Here, this example added another chocolate bobka and used
    the expression ``last_insert_rowid()+1`` as the ``id`` value. You could have just
    as easily used ``NULL`` instead. In fact, you probably should use ``NULL`` rather
    than ``last_insert_rowid()``, because ``last_insert_rowid()`` will return 0 if
    you did not previously insert a row in the current session.


    You could safely assume that this would work properly for these examples, but
    it would not be a good idea to make this assumption in a program.


    ## Inserting Multiple Rows


    There is nothing stopping you from inserting multiple rows at a time using the
    ``select`` form of ``insert``. As long as the number of columns matches, ``insert``
    will insert every row in the result. Here’s an example:


    ```

    sqlite> create table foods2 (id int, type_id int, name text);

    ```


    ```

    sqlite> insert into foods2 select * from foods;

    ```


    ```

    sqlite> select count(*) from foods2;

    count(*)

    --------------------

    418

    ```'
  raw: 'If you provide a value for every column of a table in **insert**, then the
    column list can be omitted. In this case, the database assumes that the order
    of values provided in the value list corresponds to the order of columns as declared
    in the **create table** statement. Here’s an example:


    **sqlite> insert into foods values(NULL, 1, ''Blueberry Bobka'');**


    **sqlite> select * from foods where name like ''%Bobka'';**


    **id type_id name**


    **---------- ---------- ---------------**


    **10 1 Chocolate Bobka**


    **413 1 Cinnamon Bobka**


    **414 1 Blueberry Bobka**


    **Notice here the order of arguments. **''Blueberry Bobka''** came after 1 in
    the value list. This is because of the way the table was declared. To view the
    table’s definition, type **.schema foods** at the shell prompt:**


    ******sqlite> .schema foods**


    **CREATE TABLE foods(**


    **id integer primary key,**


    **type_id integer,**


    **name text );**


    **CREATE INDEX foods_name_idx on foods (name COLLATE NOCASE);**


    **The first column is **id**, followed by **type_id**, followed by **name**. This,
    therefore, is the order you must list values in **insert** statements on foods.
    Why did the preceding **insert** statement use a **NULL** for **id**? SQLite 88**


    **CHAPTER 4 ■ ADVANCED SQL FOR SQLITE


    knows that **id** in **foods** is an autoincrement column, and specifying a **NULL**
    is the equivalent of not providing a value at all. Not specifying a value triggers
    the automatic key generation. It’s just a convenient trick. There is no deeper
    meaning or theoretical basis behind it. We will look at the subtleties of autoincrement
    columns later in this chapter.


    Inserting a Set of Rows


    Subqueries can be used in **insert** statements, both as components of the value
    list and as a complete replacement of the value list. When you specify a subquery
    as the value list, you are really inserting a set of rows, because you are inserting
    the set of rows returned by that subquery. Here’s an example that generates a
    set having just one row:


    **insert into foods**


    **values (null,**


    **(select id from food_types where name=''Bakery''),**


    **''Blackberry Bobka'');**


    **select * from foods where name like ''%Bobka'';**


    **id type_id name**


    **---------- ---------- ----------------**


    **10 1 Chocolate Bobka**


    **413 1 Cinnamon Bobka**


    **414 1 Blueberry Bobka**


    **415 1 Blackberry Bobka**


    Here, rather than hard-coding the **type_id** value, I had SQLite look it up for
    me. Here’s another example: **insert into foods**


    **select last_insert_rowid()+1, type_id, name from foods**


    **where name=''Chocolate Bobka'';**


    **select * from foods where name like ''%Bobka'';**


    **id type_id name**


    **---------- ---------- ----------------**


    **10 1 Chocolate Bobka**


    **413 1 Cinnamon Bobka**


    **414 1 Blueberry Bobka**


    **415 1 Blackberry Bobks**


    **416 1 Chocolate Bobka**


    This query completely replaces the value list with a **select** statement. As
    long as the number of columns in the **select** clause matches the number of columns
    in the table (or the number of columns in the columns list, if provided), **insert**
    will work just fine. Here, this example added another chocolate bobka and used
    the expression **last_insert_rowid()+1** as the **id** value. You could have just
    as easily used **NULL** instead. In fact, you probably should use **NULL** rather
    than **last_insert_rowid()**, because **last_insert_rowid()** will return 0 if
    you did not previously insert a row in the current session.


    CHAPTER 4 ■ ADVANCED SQL FOR SQLITE


    You could safely assume that this would work properly for these examples, but
    it would not be a good idea to make this assumption in a program.


    Inserting Multiple Rows


    There is nothing stopping you from inserting multiple rows at a time using the
    **select** form of **insert**. As long as the number of columns matches, **insert**
    will insert every row in the result. Here’s an example: **sqlite> create table
    foods2 (id int, type_id int, name text);**


    **sqlite> insert into foods2 select * from foods;**


    **sqlite> select count(*) from foods2;**


    **count(*)**


    **--------------------**


    **418**'
  trans: '

    # 第四章 ■ SQLite 高级 SQL


    如果在 `insert` 语句中为表的每一列都提供了值，那么可以省略列列表。在这种情况下，数据库会假定值列表中提供的值顺序与 `create table`
    语句中声明的列顺序相对应。下面是一个例子：


    ```

    sqlite> insert into foods values(NULL, 1, ''Blueberry Bobka'');

    ```


    ```

    sqlite> select * from foods where name like ''%Bobka'';

    id          type_id     name

    ----------  ----------  ---------------

    10          1           Chocolate Bobka

    413         1           Cinnamon Bobka

    414         1           Blueberry Bobka

    ```


    请注意这里的参数顺序。值列表中 `''Blueberry Bobka''` 出现在 `1` 之后。这是由表的声明方式决定的。要查看表的定义，在 shell
    提示符下输入 `.schema foods`：


    ```

    sqlite> .schema foods

    CREATE TABLE foods(

    id integer primary key,

    type_id integer,

    name text );

    CREATE INDEX foods_name_idx on foods (name COLLATE NOCASE);

    ```


    第一列是 `id`，接着是 `type_id`，然后是 `name`。因此，这也必须是你在针对 `foods` 表的 `insert` 语句中列出值的顺序。为什么之前的
    `insert` 语句对 `id` 使用了 `NULL`？SQLite 知道 `foods` 表中的 `id` 是自增列，指定 `NULL` 等同于根本不提供值。不指定值会触发生键的自动生成。这只是一个方便的技巧。其背后没有更深层的含义或理论依据。我们将在本章后面探讨自增列的微妙之处。


    ## 插入一组行


    子查询可以用在 `insert` 语句中，既可以作为值列表的组成部分，也可以完全替代值列表。当指定子查询作为值列表时，你实际上是在插入一组行，因为你插入的是该子查询返回的行集合。下面是一个生成仅包含一行集合的例子：


    ```

    insert into foods

    values (null,

    (select id from food_types where name=''Bakery''),

    ''Blackberry Bobka'');

    ```


    ```

    select * from foods where name like ''%Bobka'';

    id          type_id     name

    ----------  ----------  ----------------

    10          1           Chocolate Bobka

    413         1           Cinnamon Bobka

    414         1           Blueberry Bobka

    415         1           Blackberry Bobka

    ```


    在这里，我没有硬编码 `type_id` 的值，而是让 SQLite 为我查找它。这是另一个例子：


    ```

    insert into foods

    select last_insert_rowid()+1, type_id, name from foods

    where name=''Chocolate Bobka'';

    ```


    ```

    select * from foods where name like ''%Bobka'';

    id          type_id     name

    ----------  ----------  ----------------

    10          1           Chocolate Bobka

    413         1           Cinnamon Bobka

    414         1           Blueberry Bobka

    415         1           Blackberry Bobks

    416         1           Chocolate Bobka

    ```


    这个查询用一个 `select` 语句完全替代了值列表。只要 `select` 子句中的列数与表中的列数匹配（或者与提供的列列表中的列数匹配），`insert`
    就能正常工作。在这个例子中，它添加了另一个巧克力 Bobka，并使用表达式 `last_insert_rowid()+1` 作为 `id` 值。你本可以同样轻松地使用
    `NULL`。事实上，你可能应该使用 `NULL` 而不是 `last_insert_rowid()`，因为如果你在当前会话中之前没有插入行，`last_insert_rowid()`
    会返回 0。


    对于这些例子，你可以安全地假设它会正常工作，但在程序中做出这种假设并不是一个好主意。


    ## 插入多行


    没有什么能阻止你使用 `insert` 的 `select` 形式一次插入多行。只要列数匹配，`insert` 就会插入结果中的每一行。下面是一个例子：


    ```

    sqlite> create table foods2 (id int, type_id int, name text);

    ```


    ```

    sqlite> insert into foods2 select * from foods;

    ```


    ```

    sqlite> select count(*) from foods2;

    count(*)

    --------------------

    418

    ```

    '
- fmt: "# CHAPTER 4 ■ ADVANCED SQL FOR SQLITE\n\n## Creating and Populating Tables\
    \ with Select\n\nThis creates a new table `foods2` and inserts into it all the\
    \ records from `foods`.\n\nHowever, there is an easier way to create and populate\
    \ a table. The `create table` statement has a special syntax for creating tables\
    \ from `select` statements. The previous example could have been performed in\
    \ one step using this syntax:\n\n```\nsqlite> create table foods2 as select *\
    \ from foods;\n```\n\n```\nsqlite> select count(*) from list;\ncount(*)\n--------\n\
    418\n```\n\n`create table` does both steps in one fell swoop. This can be especially\
    \ useful for creating temporary tables:\n\n```\ncreate temp table list as\nselect\
    \ f.name food, t.name name,\n       (select count(episode_id)\n        from foods_episodes\
    \ where food_id=f.id) episodes\nfrom foods f, food_types t\nwhere f.type_id=t.id;\n\
    ```\n\n```\nselect * from list;\nFood      Name       Episodes\n--------------------\
    \  ----------  ----------\nBagels    Bakery     1\nBagels, raisin    Bakery  \
    \   2\nBavarian Cream Pie    Bakery     1\nBear Claws    Bakery     3\nBlack and\
    \ White cook    Bakery     2\nBread (with nuts)    Bakery     1\nButterfingers\
    \    Bakery     1\nCarrot Cake    Bakery     1\nChips Ahoy    Cookies     1\n\
    Chocolate Bobka    Bakery     1\n```\n\nWhen using this form of `CREATE TABLE`,\
    \ be aware that any constraints defined in the source table are not created in\
    \ the new table. Specifically, the `autoincrement` columns will not be created\
    \ in the new table, nor will indexes, `UNIQUE` constraints, and so forth. Many\
    \ other databases refer to this approach as *CTAS*, which stands for `Create Table\
    \ As Select`, and that phrase is not uncommon among SQLite users.\n\nIt is also\
    \ worth mentioning here that you have to be aware of `unique` constraints when\
    \ inserting rows. If you add duplicate values on columns that are declared as\
    \ `unique`, SQLite will stop you in your tracks:\n\n```\nsqlite> select max(id)\
    \ from foods;\nmax(id)\n-------\n416\nsqlite> insert into foods values (416, 1,\
    \ 'Chocolate Bobka');\nSQL error: PRIMARY KEY must be unique\n```\n\n## Updating\
    \ Records\n\nYou update records in a table using the `update` command. The `update`\
    \ command modifies one or more columns within one or more rows in a table. `update`\
    \ has the following general form:\n\n```\nupdate table set update_list where predicate;\n\
    ```\n\n`update_list` is a list of one or more column assignments of the form `column_name=value`.\
    \ The `where` clause works exactly as in `select`. Half of `update` is really\
    \ a `select` statement. The `where` clause identifies rows to be modified using\
    \ a predicate. Those rows then have the update list applied to them. Here’s an\
    \ example:\n\n```\nupdate foods set name='CHOCOLATE BOBKA'\nwhere name='Chocolate\
    \ Bobka';\n```\n\n```\nselect * from foods where name like 'CHOCOLATE%';\nid \
    \   type_    name\n----- ----- ------------------------------\n10    1    CHOCOLATE\
    \ BOBKA\n11    1    Chocolate Eclairs\n12    1    Chocolate Cream Pie\n222   \
    \ 9    Chocolates, box of\n223    9    Chocolate Chip Mint\n224    9    Chocolate\
    \ Covered Cherries\n```\n\n`update` is a very simple and direct command, and this\
    \ is pretty much the extent of its use. As in `insert`, you must be aware of any\
    \ `unique` constraints, because they will stop `update` every bit as much as `insert`:\n\
    \n```\nsqlite> update foods set id=11 where name='CHOCOLATE BOBKA';\nSQL error:\
    \ PRIMARY KEY must be unique\n```\n\nThis is true for any constraint, however.\n\
    \n## Deleting Records\n\nYou delete records from a table using the `delete` command.\
    \ The `delete` command deletes rows from a table. `delete` has the following general\
    \ form:\n\n```\ndelete from table where predicate;\n```\n\nSyntactically, `delete`\
    \ is a watered-down `update` statement. Remove the `SET` clause from `update`,\
    \ and you have `delete`. The `where` clause works exactly like `select`, except\
    \ that it identifies rows to be deleted.\n\nHere’s an example:\n\n```\ndelete\
    \ from foods where name='CHOCOLATE BOBKA';\n```\n\n## Data Integrity"
