    getting a **SHARED** lock but not **RESERVED**, and now you are holding up a connection
    in **RESERVED** from getting to **EXCLUSIVE**. Again, *you don’t know the state
    of the database*. And just using a brute-force method to push your transaction
    through is not necessarily going to work, for you or any other connection. If
    you just keep calling **step()**, 147


