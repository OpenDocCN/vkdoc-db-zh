- fmt: '# Windows 上安装和配置 SQLite


    ## 在 Windows 上安装 SQLite


    要从 Windows shell 的任何目录运行 SQLite，你需要将它复制到一个位于你 Windows 系统路径下的文件夹中。一个适用于所有 Windows
    版本的默认路径是你的根分区上的 `\windows\system32` 文件夹（对于大多数系统是 `C:\`）。


    **注意**：如果你不知道你的 Windows 系统路径值，可以通过多种方式找到它。在命令提示符下，你可以执行这个命令：


    ```

    echo %PATH%

    ```


    这将返回一个由分号分隔的目录字符串——这就是你的路径值。对于喜欢图形界面的用户，你可以从控制面板获取相同的信息。点击“开始” -> “控制面板”。选择“系统”图标。在出现的对话框中，选择“高级”选项卡，然后点击“环境变量”按钮。在对话框下半部分的“系统变量”列表中，双击“Path”条目。这将打开“编辑系统变量”对话框，其中的“变量值”文本框包含了你的路径列表。如果你愿意，可以通过简单地在行尾附加一个分号并键入新路径来向此路径添加其他目录。


    5.  打开命令 shell。你可以通过不同方式完成此操作。使用 Windows “开始”菜单，选择“开始” -> “运行”。在“打开”下拉框中键入 `cmd`，然后点击“确定”（图
    2-1）。这将打开一个 Windows 命令 shell。如果这不起作用，请尝试选择“开始” -> “所有程序” -> “附件” -> “命令提示符”。


    *图 2-1. 打开 Windows 命令 shell*


    ![](index-42_1.png)


    **第 2 章 ■ 入门**


    6.  在 shell 中，在命令行上键入 `sqlite3` 并按 Enter。这应该会启动 SQLite 命令提示符。（如果出现错误，则说明 `sqlite3.exe`
    可执行文件尚未复制到系统路径中的文件夹。请重新检查你的路径，并将程序副本放在路径中的某个位置。）


    当 SQLite shell 出现时，在命令行上键入 `.help`。这将显示一个命令列表及其相关描述，类似于图 2-2 中的列表。键入 `.exit` 以退出程序。你现在已经在系统上安装了一个可用的
    SQLite CLP 副本。


    *图 2-2. Windows 上的 SQLite shell*


    **第 2 章 ■ 入门**


    如果你此时特别渴望使用 SQLite，你可能想直接跳转到“Shell 模式下的 CLP”一节。接下来的几节是为希望编写使用 SQLite 的程序的开发者准备的。


    ## 获取 SQLite DLL


    SQLite DLL 用于编译为动态链接到 SQLite 的软件。这意味着应用程序将在需要 SQLite 功能时在运行时加载 DLL，而不是将 SQLite
    代码嵌入到应用程序本身中。以此方式使用 SQLite 的软件通常包含其自己的 SQLite DLL 副本，并在安装软件时自动安装它。


    如果你计划使用 SQLite 进行开发，使用 DLL 可能是最简单的入门方式。你可以按照以下方式获取 SQLite DLL：


    1.  访问 SQLite 主页 [www.sqlite.com](http://www.sqlite.com)，并选择页面顶部的下载链接。这将带你到下载页面。

    2.  在下载页面上，找到“Precompiled Binaries For Windows”部分。

    3.  定位 DLL zip 文件。此文件的描述将是“This is a DLL of the SQLite library without the TCL
    bindings。” 文件名将采用 `sqlitedll-3_x_y_z.zip` 的形式，其中 `x`、`y` 和 `z` 是次版本号。如果你想要包含 Tcl
    支持，请选择名称为 `tclsqlitedll-3_x_y_z.zip` 的文件。

    4.  下载并解压缩该文件。解压后的内容应包含两个文件：实际的 DLL 文件 (`sqlite3.dll`) 以及另一个名为 `sqlite3.def` 的文件。


    这里提供的 SQLite DLL 是线程安全的，因为它是使用定义的 `THREADSAFE` 预处理器标志编译的。这允许你在多线程应用程序中使用 SQLite
    功能；因此，你可以在多线程程序中使用此 DLL，安全地在多个线程中执行同时操作。'
  raw: 'from any directory in the Windows shell, you need to copy it to a folder that
    is


    in your Windows system path. A suitable default that should work on all


    versions of Windows is the **\windows\system32** folder on your root partition


    (**C:\ for most systems**).


    ■ **Note** If you don’t know your Windows system path value, you can find it in
    several ways. From a command prompt, you can execute this command:


    **echo %PATH%**


    This will return a string of directories separated by semicolons—this is your
    path value. For the graphically inclined, you can obtain the same information
    from the Control Panel. Click Start  Control Panel. Choose the System icon. In
    the resulting dialog box, select the Advanced tab, and click the Environmental
    Variables button. In the System Variables list in the lower half of the dialog
    box, double-click the Path entry. This will open the Edit System Variables dialog
    box, in which the Values text box contains your path list. You can add additional
    directories to this path if you like by simply appending a semicolon to the end
    of the line and typing the new path.


    5\. Open a command shell. You can do this in different ways. Using the Windows


    Start menu, select Start  Run. Type **cmd** in the Open drop-down box, and click


    OK (Figure 2-1). This will open a Windows command shell. If this doesn’t work,


    try selecting Start  All Programs  Accessories  Command Prompt.


    *Figure 2-1\. Opening a Windows command shell*


    ![](index-42_1.png)


    CHAPTER 2 ■ GETTING STARTED


    6.


    Within the shell, type **sqlite3** on the command line, and press Enter. This


    should bring up a SQLite command prompt. (If you get an error, then the


    **sqlite3.exe** executable has not been copied to a folder in your system path.


    Recheck your path, and place a copy of the program somewhere within it.)


    When the SQLite shell appears, type **.help** on the command line. This will


    display a list of commands with their associated descriptions similar to the one


    in Figure 2-2\. Type **.exit** to exit the program. You now have a working copy
    of


    the SQLite CLP installed on your system.


    *Figure 2-2\. The SQLite shell on Windows*


    CHAPTER 2 ■ GETTING STARTED


    If you are especially eager to work with SQLite at this point, you may want to
    skip ahead to the section “The CLP in Shell Mode.” The next few sections are geared
    to developers who want to write programs that use SQLite.


    Getting the SQLite DLL


    The SQLite DLL is used for software compiled to link dynamically to SQLite. This
    means that the


    application will load the DLL at runtime when SQLite features are required, instead
    of embedding the SQLite code in the application itself. Software that uses SQLite
    in this fashion typically includes its own copy of the SQLite DLL and installs
    it automatically with the software.


    If you plan to develop with SQLite, using the DLL is probably the easiest way
    to start. You can obtain the SQLite DLL as follows:


    1\. Go to the SQLite home page, [**www.sqlite.com**, and choose the download](http://www.sqlite.com)
    link at the top of the page. This will take you to the download page.


    2\. On the download page, find the section Precompiled Binaries For Windows.


    3\. Locate the DLL zip file. This file will have the description “This is a DLL
    of the


    SQLite library without the TCL bindings.” The filename will have the form


    **sqlitedll-3_x_y_z.zip**, where **x**, **y,** and **z** are the minor versions.
    If you want Tcl support included, select the file with the name of the form **tclsqlitedll-3_x_y_z.zip**.


    4\. Download and unzip the file. The extracted contents should include two files:


    the actual DLL file (**sqlite3.dll**) together with another file called **sqlite3.def**.


    The SQLite DLL provided here is thread safe, because it was compiled with the


    **THREADSAFE** preprocessor flag defined. This allows you to use SQLite features
    in


    multithreaded applications; you can therefore use this DLL in multithreaded


    programs, performing simultaneous actions in multiple threads safely.'
