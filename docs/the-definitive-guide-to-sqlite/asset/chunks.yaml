  trans: '# SQLite 中的预写式日志


    ## 引言

    预写式日志在更广泛的数据库技术领域并非新事物，但其被集成到 SQLite 中令人惊叹的原因有二。首先，这进一步提升了 SQLite 及其所用数据库的成熟度与健壮性。其次，如此卓越的功能被纳入
    SQLite 后，其代码和生成的二进制文件依然保持如此紧凑精简，着实令人赞叹。


    ## WAL 工作原理

    在传统的操作模式中，SQLite 使用回滚日志来捕获来自 SQL 语句的更改前数据，然后对数据库文件进行更改（这里我们暂不讨论各种缓存和文件系统层，因为它们适用于所有模式）。当使用
    WAL 时，安排则相反。使用 WAL 不是将更改前的原始数据写入回滚日志，而是将原始数据原封不动地保留在数据库文件中。WAL 文件用于记录给定事务发生的数据更改。提交操作变为向
    WAL 写入一条特殊记录，以表明前述更改实际上已完成，并在 ACID 原则下应被认可。


    数据库文件与日志文件之间这种角色的转换，立即改变了事务的性能动态。多个事务无需争夺数据库文件中的相同页面，它们可以同时在 WAL 中记录其数据更改，并能继续从数据库文件中读取未更改的数据。


    ## 检查点

    当人们接触到 WAL 技术时，通常想到的第一个问题是：“但数据最终何时才会被写入`数据库`？”很高兴您问到这一点。显然，一个永不停止的更改流被写入一个不断增长的
    WAL 文件，既无法扩展，也无法承受文件系统故障的不可预测性。WAL 使用检查点功能将更改写回数据库。此过程自动发生，因此开发者无需关心管理和执行检查点及写回数据库的操作。默认情况下，当
    WAL 文件达到 1000 页的更改时，WAL 会触发检查点。这可以根据不同的操作场景进行修改。


    ## 第 11 章 ■ SQLITE 内部机制与新特性


    ### 并发性

    由于更改现在写入 WAL 文件而非数据库文件，您可能想知道这如何影响 SQLite 的并发性。好消息是，答案“压倒性地变得更好！”


    访问启用了 WAL 的数据库的新读者，会启动对 WAL 文件的查找以确定最后的提交记录。此点成为其只读一致性的结束标记，因此他们不会考虑此点之后文件中新的写入。这就是读取成为一致读取的方式——它根本不会注意到其被视为结束标记的提交之后的任何内容。每个读者的访问是独立的，因此可以有多个线程，每个线程对
    WAL 文件中各自不同的结束标记有不同的理解。


    要访问一页数据，读者使用`wal-index`结构扫描 WAL 文件，以确定该页是否存在更改，如果找到则使用最新版本。如果该页不在 WAL 文件中，则意味着自上次检查点以来它未被更改，读者将从数据库文件访问该页。


    `wal-index`结构在共享内存中实现，这意味着所有线程和进程必须能访问相同的内存空间。也就是说，您的程序必须都在同一台机器上执行才能访问启用了 WAL
    的数据库，或者更准确地说，是为了使用`wal-index`。此特性排除了在诸如 NFS 等网络文件系统上操作的可能性。


    至于写入者，由于 WAL 文件的顺序性，他们只需将更改追加到末尾。但请注意，这意味着他们必须依次追加其更改，因此写入者之间仍然可能相互阻塞。


    ### 激活与配置 WAL'
- fmt: '# CHAPTER 11 ■ SQLITE INTERNALS AND NEW FEATURES


    SQLite will still default to the rollback journal method until you decide to switch
    your database to use the WAL. Unlike other `PRAGMA` settings, turning on the WAL
    is a persistent database-level change. This means you can turn on WAL in one program
    or from the SQLite command shell, and all other programs will then be using the
    database in WAL mode. This is very handy because it means you don’t have to alter
    your applications to turn on WAL.


    The setting `PRAGMA journal_mode=WAL` is the command necessary to activate WAL.
    A call to this pragma will return as a string the final journal mode for the database.


    ```

    SQLite version 3.7.3

    Enter ".help" for instructions

    Enter SQL statements terminated with a ";"

    sqlite> PRAGMA journal_mode=WAL;

    wal

    ```


    If the change to WAL is successful, the string `wal` is returned, as shown. If
    for some reason this fails, such as the underlying host not supporting the necessary
    shared memory requirements, the journal mode will be unchanged. For instance,
    on a default database, this means the command will return the string `delete`,
    meaning the rollback journal is still active.


    As well as the `journal_mode PRAGMA`, several API options and related `PRAGMA`s
    are supported to control WAL and checkpoint behavior.


    - `sqlite3_wal_checkpoint()`: Forces a checkpoint (also available as `wal_checkpoint
    PRAGMA`)

    - `sqlite3_wal_autocheckpoint()`: Alters autocheckpoint page threshold (`wal_autocheckpoint
    PRAGMA`)

    - `sqlite3_wal_hook()`: Registers a callback to be invoked when a program commits
    to the WAL.


    With these options, it’s possible to fine-tune WAL and checkpoint behavior to
    suit even the most unusual of applications.


    ## WAL Advantages and Disadvantages


    Naturally, a change such as WAL brings with it its own advantages and disadvantages.
    We think that the advantages are significant, but it’s best to be aware of impact
    so you can form your own judgment.


    Moving to WAL has the following advantages:


    - Readers do not block writers, and writers do not block readers. This is the
    “gold standard” in concurrency management.

    - WAL is flat-out faster in most operating scenarios, when compared to rollback
    journaling.

    - Disk I/O becomes more predictable and induces fewer `fsync()` system calls.
    Because all WAL writes are to a linearly written log file, much of the I/O becomes
    sequential and can be planned accordingly.


    To balance the equation, here are some of the notable disadvantages of WAL:


    - All processing is bound to a single host. That is, you cannot use WAL over a
    networked file system like NFS.

    - Using WAL introduces two additional semipersistent files, `<yourdb>-wal` and
    `<yourdb>-shm`, for the WAL and related shared memory requirements. This can be
    unappealing for those using SQLite databases as an application file format. This
    also affects read-only environments, because the `–shm` file must be writable,
    and/or the directory in which the database exists.

    - WAL performance will degrade for very large (approaching gigabyte) transactions.
    Although WAL is a high-performance option, very large or very long-running transactions
    introduce additional overhead.


    A number of other edge cases are worth investigating if you are thinking of using
    SQLite with WAL-enabled databases in unusual environments. You can review more
    details about these at [`www.sqlite.org/wal.html`.](http://www.sqlite.org/wal.html)


    ## Operational Issues with WAL-Enabled SQLite Databases


    There are a few operational considerations when working with WAL-enabled SQLite
    databases. These are primarily performance and recovery related.


    ### Performance


    We noted earlier that enabling WAL usually translates to better performance. Under
    our disadvantages, we outlined that for very large changes in data, or very long-running
    transactions, a slight drop in performance might result. Here’s the background
    on how this can happen and what to do.'
