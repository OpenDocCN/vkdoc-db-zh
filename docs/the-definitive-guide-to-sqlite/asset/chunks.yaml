    offered to be my technical reviewer and was gentle with his comments and criticisms.
    He taught me a great deal about the latest and greatest features of SQLite, and
    I hope I’ve done him justice in bringing those topics to life in this book.


    Lastly, a big thanks to all my friends and family, who put up with me writing
    yet another book, as well as the crazy antics that go with it.


    xviii


    ## Introduction


    The Definitive Guide to SQLite covers SQLite in a comprehensive fashion, giving
    you the knowledge and experience to use it in a wide range of situations. Whether
    you are a hard-core C developer, are a mobile device aficionado, or are just seeking
    more know-how on the best embedded and small-footprint database engine ever invented,
    this book it for you.


    ### Prerequisites


    This book assumes no prior knowledge of SQLite, though naturally people of all
    experience levels will benefit from the material. SQLite is written in C with
    an extensive C API and also supports many other languages such as Python, Tcl,
    Ruby, and Java. As a database engine, it also makes extensive use of SQL.


    Although the examples in this book will benefit a reader of any skill level, we
    don’t have space to also teach those languages.


    ### How This Book Is Organized


    The book contains 11 chapters, which cover the following broad areas:


    - SQLite introduction, acquisition, and installation

    - Using SQL with SQLite

    - The C API for SQLite'
