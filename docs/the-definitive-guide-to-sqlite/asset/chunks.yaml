    \ SQL DML（数据操作语言）的工作。DML 的核心是 `select` 命令，它拥有查询数据库的唯一命令的独特荣誉。`select` 是迄今为止 SQL\
    \ 中最大且最复杂的命令。`select` 的许多操作源于关系代数，并涵盖了其大部分内容。`select` 语句的能力和复杂性是*巨大的*，即使在像 SQLite\
    \ 这样精简高效的环境中也是如此。别让这吓到你。SQLite 对 `select` 命令的处理非常合乎逻辑，并且它牢固地建立在支撑所有 RDBMS 的底层关系理论之上。\n\
    \n### 关系操作\n\n对于注重理论的人来说，从概念角度思考 `select` 做什么以及为什么这样做是有用的。在大多数 SQL 实现中（包括 SQLite），`select`\
    \ 语句提供了用于获取、混合、比较和过滤数据的“关系操作”。这些关系操作通常分为三类：\n\n*   基本操作\n    *   选择\n    *   投影\n\
    \    *   笛卡尔积\n    *   并\n    *   差\n    *   重命名\n*   附加操作\n    *   交\n    * \
    \  自然连接\n    *   赋值\n*   扩展操作\n    *   广义投影\n    *   左外连接\n    *   右外连接\n    *\
    \   全外连接\n\n基本操作正如其名：基础的。它们定义了基本的关系操作，所有这些操作（除重命名外）都基于集合论。附加操作是为了方便，提供了执行常用的基本操作组合的简写方式。例如，交集可以通过对两个集合取并集，然后从中通过差集移除另外两个并集（每个并集已对两个初始集合中的一个应用了差集）的结果来实现。最后，扩展操作为基础和附加操作增加了功能。例如，广义投影操作为基本投影操作增加了算术表达式、聚合和分组功能。外连接扩展了连接操作，允许从数据库中检索附加信息和/或不完整信息。\n\
    \n在标准的 ANSI SQL 中，`select` 可以执行所有这些关系操作。这些操作映射到 E. F. Codd 在其关系理论原始工作中定义的原始关系运算符（除了\
    \ `divide`）。SQLite 支持 ANSI SQL 中的所有关系操作，但不支持右外连接和全外连接。连接类型可以通过其他基本关系操作的组合来构造，所以不必担心它们的缺失。\n\
    \n所有这些操作都是基于关系（通常称为表）来定义的！它们以一个或多个关系作为输入，并产生一个关系作为输出。这允许操作串联成关系表达式。因此，可以创建任意复杂度的关系表达式。例如，一个选择操作（关系）的输出可以作为另一个\
    \ `select` 语句的输入，如下所示：\n```sql\nselect name from (select name, type_id from (select\
    \ * from foods));\n```\n"
- fmt: 'Here, the output of the innermost `select` is fed to the next `select`, whose
    output is in turn fed to the outermost `select`. It is all a single relational
    expression. Anyone familiar with piping commands in Linux, Unix, or Windows will
    appreciate this behavior. The output of any `select` statement can be used as
    input to yet another statement.


    # CHAPTER 3 ■ SQL FOR SQLITE


    ## select and the Operational Pipeline


    The `select` command incorporates many of the relational operations through a
    series of `clauses` in its syntax. Each clause corresponds to specific relational
    operation. In SQLite, almost all of the clauses are optional, in fact, to a degree
    beyond what standard SQL suggests is desirable. As a user of SQL in SQLite, this
    empowers you to employ only the operations you need to obtain the data you seek.


    A very general form of `select` in SQLite (without too much distracting syntax)
    can be represented as follows:


    ```sql

    select [distinct] heading

    from tables

    where predicate

    group by columns

    having predicate

    order by columns

    limit count,offset;

    ```


    Each keyword—`from`, `where`, `having`, and so on—is a separate clause. Each clause
    consists of the keyword followed by arguments (represented in italics). From here
    on out, we will refer to these clauses simply by name, and you’ll be able to recognize
    our use by the fixed-width font. So, rather than “the `where` clause,” we will
    simply use `where`.


    In SQLite, the best way to think of the `select` command is as a pipeline that
    processes relations. This pipeline has optional processes that you can plug into
    it as you need them. Regardless of whether you include or exclude a particular
    operation, the relative operations are always the same. Figure 3-3 shows this
    order.


    The `select` command starts with `from`, which takes one or more input relations;
    combines them into a single composite relation; and passes it through the subsequent
    chain of operation.


    *Figure 3-3. The phases of `select` in SQLite*


    All clauses are optional with the exception of `select`. You must always provide
    at least this clause to make a valid `select` command. By far the most common
    invocation of the `select` command consists of three clauses: `select`, `from`,
    and `where`. This basic syntax and its associated clauses are as follows: `select
    heading from tables where predicate;`


    The `from` clause is a comma-separated list of one or more tables, views, and
    so on (represented by the variable `tables` in Figure 3-3). If more than one table
    is specified, they will be combined to form a single relation (represented by
    R1 in Figure 3-3). This is done by one of the join operations. The resulting relation
    produced by `from` serves as the initial material. All subsequent operations will
    either work directly from it or work from derivatives of it.


    The `where` clause filters rows in *R1*. The argument of `where` is a `predicate`,
    or logical expression, which defines the selection criteria by which rows in *R1*
    are included in (or excluded from) the result. The selected rows from the `where`
    clause form a new relation *R2*, as shown in Figure 3-3 above.


    In this particular example, *R2* passes through the other operations unscathed
    until it reaches the `select` clause. The `select` clause filters the columns
    in *R2*, as depicted in Figure 3-4. Its argument consists of a comma-separated
    list of columns or expressions that define the result. This is called the `projection
    list`, or `heading` of the result.


    *Figure 3-4. Projection*


    Here’s a concrete example using our example database:


    ```sql

    sqlite> select id, name from food_types;


    id name

    ---------- ----------

    1 Bakery

    2 Cereal

    3 Chicken/Fowl

    4 Condiments

    5 Dairy

    6 Dip

    7 Drinks

    8 Fruit

    9 Junkfood

    10 Meat

    ```'
