    Querying SQLite with SQLiteQueryBuilder


    In the fine tradition of SQLite APIs, the Android SQLite class libraries support
    both database-style objects and statement-style objects issuing queries against
    the database. We’ve already seen the **SQLiteDatabase** object in action. Now
    we’ll look at the complementary class, **SQLiteQueryBuilder**.


    Just as with **SQLiteDatabase**, **SQLiteQueryBuilder** offers a range of methods
    to help compose a valid SQL statement, without the need to provide the various
    SQL reserved words for your clauses. Its key difference is the way the methods
    provide features to directly execute the generated statement against a provided
    **SQLiteDatabase** object, as well as being able to emit a string to pass to a
    **SQLiteDatabase** object for execution under that object’s auspices. First, let’s
    take a look at the methods supporting direct execution of your generated statement:


    **Cursor query(SQLiteDatabase db, String[] projectionIn, String selection,**


    **String[] selectionArgs, String groupBy, String having, String sortOrder)**


    **Cursor query(SQLiteDatabase db, String[] projectionIn, String selection,**


    **String[] selectionArgs, String groupBy, String having, String sortOrder,**


    **String limit)**


    **Those methods look eerily familiar. They are almost exactly identical to the
    **query()** methods of the **SQLiteDatabase** object, with a few exceptions. Rather
    than invoking them on the database object itself, you pass the database object
    as the first parameter (**db**). Many people find this just a case of personal
    preference, but there are use cases where the **SQLiteQueryBuilder** approach
    is helpful. You’ll note the only difference between the two overloaded methods
    is that the second allows for a **limit** clause.


    But wait! What’s that? The careful reader will have spotted one more difference.
    Where has our


    **table** parameter gone? This is one of the key differences when using **SQLiteQueryBuilder**.
