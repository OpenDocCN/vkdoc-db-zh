    ## 总结


    核心 C API 包含了处理 SQL 命令所需的一切，甚至更多。它包含了多种便捷的查询方法，这些方法在不同方面很有用。其中包括 `sqlite3_exec()`
    和 `sqlite3_get_table()`，它们允许你在单个函数调用中执行命令。API 还包含许多实用函数，使你能够确定查询中受影响的记录数、获取 `INSERT`
    语句最后插入的 `ROWID`、跟踪连接上运行的 SQL 命令，以及方便地为 SQL 语句格式化字符串。


    `sqlite3_prepare_v2()`、`sqlite3_step()` 和 `sqlite3_finalize()` 方法通过使用语句句柄，为你提供了对语句执行的极大灵活性和控制力。语句句柄提供了更详细的行列信息、绑定参数的便利性，以及重用已准备语句的能力，从而避免了查询编译的开销。


    SQLite 通过使用事件过滤器提供了多种管理运行时事件的方法。其提交、回滚和更新钩子允许你监控和控制数据库状态的特定变化。


    你可以在行和列发生变化时监视它们，并使用授权器函数来监控和限制查询在编译时可以执行的操作。


    信不信由你，你只看到了 API 的一半！实际上，你看到了大约四分之三，但你很可能会发现下一章——用户定义函数、聚合和排序规则——与本章内容一样实用和有趣。


    # 第 7 章：扩展 C API


    本章是关于教 SQLite 新技巧的。前一章涉及通用的数据库工作；本章则是关于发挥创造力。扩展 API 提供了几种扩展或自定义 SQLite 的基本方法，通过创建用户定义的
    `函数`、`聚合`、`排序规则序列` 和 虚拟表。


    在更低的层次上，还有更多选项可供选择，包括可互换的 VFS、启动时可更改的页面缓存，以及 malloc 和互斥锁实现。我们将在本章中介绍前三个选项：函数、聚合和排序规则序列。


    用户定义函数是映射到你编写的某种实现的 SQL 函数。它们可以从 SQL 中调用。例如，你可以创建一个函数 `hello_newman()`，它返回字符串
    `''Hello Jerry''`，一旦注册，就可以从 SQL 中这样调用：


    ```

    sqlite > select hello_newman() as reply;

    reply

    ------------------

    ''Hello Jerry''

    ```


    这是我们定制的 SQLite 命令行程序的一个特殊版本，其中包含了 `hello_newmon()`。


    聚合是一种特殊形式的函数，工作方式非常相似，不同之处在于它们操作记录集并返回聚合值或在该集合的特定列上计算的表达式。或者它们可能是从多个列计算得出的。SQLite
    内置的标准聚合包括 `SUM()`、`COUNT()` 和 `AVG()` 等。


    排序规则是比较和排序文本的方法。也就是说，给定两个字符串，排序规则将决定哪个更大或者两者是否相等。SQLite 中的默认排序规则是 `BINARY`——它使用
    `memcmp()` 逐字节比较字符串。虽然这种排序规则恰好对英语单词（以及其他使用 UTF-8 编码的语言）效果很好，但对于使用不同编码的其他语言可能效果不佳。因此，SQLite
    提供了构建你自己的用户定义排序规则的能力，以更好地处理那些替代语言。


    本章涵盖了这三种用户定义的扩展设施及其相关的 API 函数。正如你将看到的，用户定义扩展 API 可以被证明是创建扩展 SQLite 的非平凡功能的强大工具。


    本章中的所有代码都包含在你可以从 Apress [网站](http://www.apress.com) 获取的示例中。本特定章节的示例位于 `examples`
    文件夹的 `ch7` 子目录中。我们将在文本中介绍示例时，特别指出对应于这些示例的所有源文件。为了清晰起见，图中的一些错误检查代码已被移除。


    此外，本章中的许多示例使用了一个通用库中的简单便捷函数，该库是为了帮助简化示例而编写的。我们将在文本中介绍这些函数时指出它们并解释其作用。通用代码位于 `examples`
    文件夹的 `common` 子目录中，在构建示例之前必须先构建它。有关构建通用库的详细信息，请参阅 `examples` 文件夹中的 `README` 文件。


    最后，为了消除任何混淆，术语 *存储类* 和 *数据类型* 可以互换使用。你知道 SQLite 在内部使用五种不同的数据类型（或存储类）存储数据。如第 4
    章所述，这些类是 `INTEGER`、`FLOAT`、`TEXT`、`BLOB` 和 `NULL`。在本章中，我们将使用最适合上下文的术语。你通常会看到 *数据类型*
    这个术语，因为它适用范围最广，不同背景的读者更容易理解。当谈论 SQLite 在内部如何处理特定值时，*存储类* 这个术语似乎更合适。无论哪种情况，你都可以将任一术语等同视为描述数据的特定形式或表示。


    ## API


    实现函数、聚合和排序规则的基本方法包括实现一个回调函数，然后在你的程序中注册它。一旦注册，你的函数就可以从 SQL 中使用。函数和聚合使用相同的注册函数和类似的回调函数。


    排序规则序列虽然使用单独的注册函数，但几乎相同，可以被视为用户定义函数的一个特定类别。'
