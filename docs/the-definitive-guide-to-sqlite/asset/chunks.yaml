    OS X, and


    Windows. SQLite Analyzer can be built from the source using the Unix makefile
    provided. From the build directory, issue the following command:


    **make sqlite3_analyzer**


    **You must, however, have Tcl support configured in the build settings because
    SQLite Analyzer uses the Tcl extension to perform most of its work. Refer to “Compiling
    SQLite from Source” for more


    information.


    Other SQLite Tools


    There are many other open source and commercial programs available with which
    to work with SQLite.


    Good graphical, cross-platform tools include the following:


    SQLite Database Browser ([**http://sqlitebrowser.sourceforge.net**): Al](http://sqlitebrowser.sourceforge.net):)lows
    users to manage databases, tables, and indexes, as well as import and export


    them. Users can interactively run SQL queries and inspect the results, as well
    as


    examine a log of all SQL commands issued. It recently received a major upgrade


    to version 2.


    SQLiteman ([**http://www.sqliteman.com**): A](http://www.sqliteman.com):) cross-platform
    program that’s targeted at people managing and administering SQLite databases.
    It allows for


    general management of databases, tables, indexes, and triggers, as well as other


    common management tasks.


    CHAPTER 2 ■ GETTING STARTED


    SQLiteManager ([**www.sqlabs.net/sqlitemanager.php**): A c](http://www.sqlabs.net/sqlitemanager.php):)ommercial
    software package designed for working with and administering SQLite. Users can


    manage database objects, execute queries, and save SQL, as well as create


    reports with flexible report templates. It includes its own high-level scripting


    language to complement its SQL capabilities.


    These are just the cross-platform tools. Many more tools are available that can
    be used with just about any programming, end-user, or management environment.
    You can find more information on


    such packages on the SQLite wiki [(**www.sqlite.org/cvstrac/wiki?p=ManagementTools**](http://www.sqlite.org/cvstrac/wiki?p=ManagementTools)).


    Summary


    No matter what platform you work on, SQLite is easy to install and build. Windows,
    Mac OS X, and Linux users can obtain binaries directly from the SQLite website.
    Users of many other operating systems can also obtain binaries using their native—or
    even third-party—package systems.


    The common way to work with SQLite across all platforms is using the SQLite command-line'
