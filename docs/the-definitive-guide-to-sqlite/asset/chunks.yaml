    `SQLiteOpenHelper` 类位于 `android.database.sqlite` 命名空间中。这是一个辅助类，旨在被您继承，以实现您认为在数据库首次创建、打开或使用时重要的任何任务和操作。\n\
    \n`SQLiteOpenHelper` 有一个构造函数，定义如下：\n\n```\nSQLiteOpenHelper(Context context, String\
    \ name,\n                 SQLiteDatabase.CursorFactory factory, int version)\n\
    ```\n\n其中：\n*   `context` 是应用程序上下文，允许访问给定应用程序的所有共享资源和资产。\n*   `name` 参数包含 Android\
    \ 存储中的数据库文件名。\n*   `factory` 值引入了一个新类 `SQLiteDatabase.CursorFactory`。这是一个工厂类，用于生成\
    \ `cursor` 对象，这些对象充当您在 Android 上针对 SQLite 发出的所有查询的结果集。\n*   `version` 参数是您应用程序特定的数据库版本号（更具体地说，是其模式版本）。不要将其与实际的\
    \ SQLite 版本混淆。如果您的数据库不在指定版本，`SQLiteOpenHelper` 将触发其 `onUpgrade()` 方法。\n\n`SQLiteOpenHelper`\
    \ 的所有方法如下：\n\n```\nsynchronized void close()\nsynchronized SQLiteDatabase getReadableDatabase()\n\
    synchronized SQLiteDatabase getWritableDatabase()\nabstract void onCreate(SQLiteDatabase\
    \ db)\nvoid onOpen(SQLiteDatabase db)\nabstract void onUpgrade(SQLiteDatabase\
    \ db, int oldVersion, int newVersion)\n```\n\n`close()` 方法如其名所示。此方法关闭 `SQLiteOpenHelper`\
    \ 对象内的 SQLite 数据库。\n\n接下来的两个方法，`getReadableDatabase()` 和 `getWritableDatabase()`，执行类似的操作，但有一点区别，您可能从它们的名字就能猜到。`getReadableDatabase()`\
    \ 方法将打开为 `SQLiteOpenHelper` 对象指定的数据库，但以只读方式打开。实际上，任何试图更改数据的数据操作语句都将不被允许。\n\n`getWritableDatabase()`\
    \ 用于打开 SQLite 数据库以进行正常的读/写操作。如果由于某种原因您的数据库无法打开以进行写操作，`getWritableDatabase()` 将以只读数据库的方式打开它（就像调用了\
    \ `getReadableDatabase()` 一样），并抛出一个 `SQLiteException` 类型的异常。您可以通过在数据库对象本身上调用 `isReadOnly()`\
    \ 方法来测试数据库的只读或读/写状态。这是一个布尔值，对于只读数据库返回 true。您稍后可以在一个只读数据库上调用 `getWritableDatabase()`\
    \ 以将其重新打开为读/写数据库。在尚不存在的数据库上调用任何一个方法都会隐式调用辅助对象的 `onCreate()` 方法。否则，您的应用程序首次调用任何一个方法将调用\
    \ `onOpen()`，并可选择地调用 `onUpgrade()`。然后，您的数据库将被缓存供应用程序使用，直到调用 `close()` 方法。\n\n\
    > **注意**：打开大型数据库可能需要一些时间，特别是如果您的 `onOpen()` 或 `onCreate()` 实现中包含复杂逻辑。我们强烈建议，对于真实世界的应用程序，不要从应用程序的启动主线程调用此操作。\n\
    \n最后三个方法——`onCreate()`、`onOpen()` 和 `onUpgrade()`——设计用于您通过子类化来实现所需的行为。`onCreate()`\
    \ 在数据库最初创建时触发，通常用于创建表和使用插入语句加载数据，以使新数据库得以存在。\n\n`onOpen()` 在数据库完成打开时触发。您通常会在此时检查数据库的读/写状态（例如通过\
    \ `isReadOnly()`），以确保在操作数据库之前其处于已知状态。\n\n`onUpgrade()` 方法在从应用程序的角度需要升级数据库时调用（请记住，我们这里讨论的不是\
    \ SQLite 版本；而是您自己的应用程序版本）。您通常从 1 开始为数据库版本编号，并在发布新版本应用程序时将其递增为 2、3，依此类推。您在此方法中编写所需的\
    \ `alter table`、`create table`、`drop table` 和其他语句，以处理数据库模式在应用程序演进过程中的平滑升级。\n\n\
    ## 使用 SQLiteDatabase 类\n\n现在您已经熟悉了在 Android 中启动使用 SQLite 数据库的辅助类，是时候了解核心的 `SQLiteDatabase`\
    \ 类了。`SQLiteDatabase` 对象在概念上很容易理解，与 SQLite C API 中的底层数据库对象非常相似。然而，大量辅助方法和其他工具的实现意味着其内部可能比您预期的要多。\n\
    \n`SQLiteDatabase` 类提供了 50 多个方法，每个方法都有其自身的细微差别和用例。其中许多是基本的辅助方法，用于轻松完成简单任务，如单表的\
    \ select、insert、update 和 delete 语句。与其列出所有方法，我们将介绍最重要的方法子集，并让您在闲暇时探索一些重载方法。您可以随时参考\
    \ `SQLiteDatabase` 类的完整在线 Android 文档：`http://developer.android.com/reference/android/database/sqlite/SQLiteDatabase.html`。\n\
    \n### 打开和关闭 SQLiteDatabase\n\n`SQLiteDatabase` 提供了三种打开数据库的方法和一种关闭数据库的方法。这些方法如下：\n\
    \n```\nvoid close()\nstatic SQLiteDatabase openDatabase(String path,\n       \
    \                            SQLiteDatabase.CursorFactory factory, int flags)\n\
    static SQLiteDatabase openOrCreateDatabase(File file,\n                      \
    \                     SQLiteDatabase.CursorFactory factory)\nstatic SQLiteDatabase\
    \ openOrCreateDatabase(String path,\n                                        \
    \   SQLiteDatabase.CursorFactory factory)\n```\n\n`close()` 方法如其名所示。数据库被关闭，无法再对\
    \ `SQLiteDatabase` 对象（即数据库）执行进一步的查询。\n\n`openDatabase()` 方法是最通用的。它接受一个指向 Android\
    \ 应用程序资产中文件的 `path` 值，以及一个关联的 `factory` 参数，该参数将充当数据库的 `CursorFactory`。最后一个参数是可堆叠的\
    \ `flags` 参数，用于指定打开数据库的选项。四个标志值与打开数据库相关：\n*   `OPEN_READWRITE`：以读写方式打开数据库。\n*\
    \   `OPEN_READONLY`：以只读（仅 select）方式打开数据库。\n*   `CREATE_IF_NECESSARY`：如果数据库文件尚不存在，则首先创建它。\n\
    *   `NO_LOCALIZED_COLLATORS`：打开数据库时不支持 `LOCALIZED` SQLite 排序规则。这些是匹配 Android 设备区域设置的自定义排序规则。\n\
    \n第一个 `openOrCreateDatabase()` 方法接受一个 `File` 对象作为要打开的目标数据库。它没有 `flags` 参数，默认为\
    \ `CREATE_IF_NECESSARY` 的行为。\n\n第二个重载的 `openOrCreateDatabase()` 方法是 `openDatabase()`\
    \ 的简写版本。它的行为几乎完全相同，接受一个 `string` 作为查找数据库文件的路径。它同样没有标志参数，也默认为 `CREATE_IF_NECESSARY`\
    \ 行为。\n\n### 使用 SQLiteDatabase 执行通用查询\n"
- fmt: '# CHAPTER 10 ■ ANDROID DEVELOPMENT WITH SQLITE


    Just as there are numerous ways to compose SQL statements, Android provides a
    wealth of ways to run SQL against your SQLite database. In fact, there are no
    fewer than 16 methods that run general or specific styles of queries against your
    SQLite database. The can be separated into convenience functions that do single-table
    inserts, updates, and so forth, as well as general methods for executing DML and
    DDL. The general methods can be grouped together as shown in this list:


    `void execSQL(String sql)`

    `void execSQL(String sql, Object[] bindArgs)`

    `Cursor query(boolean distinct, String table, String[] columns, String selection,
    String[] selectionArgs, String groupBy, String having, String orderBy, String
    limit)`

    `Cursor query(String table, String[] columns, String selection, String[] selectionArgs,
    String groupBy, String having, String orderBy)`

    `Cursor query(String table, String[] columns, String selection, String[] selectionArgs,
    String groupBy, String having, String orderBy, String limit)`

    `Cursor queryWithFactory(SQLiteDatabase.CursorFactory cursorFactory, boolean distinct,
    String table, String[] columns, String selection, String[] selectionArgs, String
    groupBy, String having, String orderBy, String limit)`

    `Cursor rawQuery(String sql, String[] selectionArgs)`

    `Cursor rawQueryWithFactory(SQLiteDatabase.CursorFactory cursorFactory, String
    sql, String[] selectionArgs, String editTable)`


    Don’t be put off by the number of methods there. You can see that there are basically
    three core types—`execSQL()`, `query()`, and `rawQuery()`, with the latter two
    having variants that use the `CursorFactory` from your `SQLiteOpenHelper()` invocation
    if you choose to use it.


    The two forms of `execSQL()` take a SQL statement as the `sql` parameter, and
    the second variant also accepts an array of bind parameters to bind to the query
    (`bindArgs`). The `execSQL()` methods are used for statements that don’t return
    results, such as `create table`, `insert`, `update`, `alter table`, and so forth.
    The `void` method return type should help you remember this.


    The `query()` and `queryWithFactory()` methods are essentially functions for performing
    lightweight single-table select statements against your database. Take a look
    at the various parameters. You’ll see that they include `table`, `columns`, `orderBy`,
    and so on. In essence, each of these methods allows you to pass the clauses of
    a SQL statement to the relevant method, without having to include the SQL keywords
    themselves.


    The final pair of methods, `rawQuery()` and `rawQueryWithFactory()`, allow you
    to use any string as a SQL select statement, returning the results as a `Cursor`
    object. You’ll notice that each accepts an array of `Strings` named `selectionArgs`.
    Through this parameter, the `SQLiteDatabase` object will replace all question
    mark (`?`) bind parameters in your SQL statement with the `String` values in the
    array, on a positional basis (that is, the first question mark is replaced with
    the first element of the array, and so on).


    ## THE STRANGENESS OF COMPILESTATEMENT


    We’ve avoided discussing one method of `SQLiteDatabase`. That method is the `compileStatement()`
    method. You might think from its name that it would be a very useful, generic
    statement compilation and query preparation tool. In some respects it is, but
    in others, it is a little strange. First, here’s the method signature:


    `public SQLiteStatement compileStatement (String sql)`


    Nothing too strange there. Take a `String` holding the SQL, and return an object
    of type `SQLiteStatement`.


    In fact, as the name suggests, this method compiles a statement and allows it
    to be reused (as per the reset semantics for the underlying SQLite C API). But
    then the strangeness kicks in.


    `compileStatement()`, and for that matter the `SQLiteStatement` object to which
    it is related, can be used only on statements that return a maximum of one result
    row, with a maximum of one result column. In effect, the results of a `compileStatement()`
    call and the data member of a `SQLiteStatement` must be a simple scalar value.
    We can think of situations where this would be useful, such as counting qualifying
    rows in a table or result set. But we can think of a very much larger set of circumstances
    where you want your SQL to work with result *sets*!


    So, now you know about `compileStatement()` and `SQLiteStatement`, but if you’re
    like us, you’ll find yourself rarely using it.


    ## Using Convenience Methods with SQLiteDatabase


    We mentioned 16 methods that can execute queries, but the preceding section covered
    only 8 methods.


    The other 8 methods are convenience methods that allow you to issue insert, update,
    delete, and replace statements against a single database table. These methods
    are as follows:


    `int delete(String table, String whereClause, String[] whereArgs)`

    `long insert(String table, String nullColumnHack, ContentValues initialValues)`

    `long insertOrThrow(String table, String nullColumnHack, ContentValues initialValues)`

    `long insertWithOnConflict(String table, String nullColumnHack, ContentValues
    initialValues, int conflictAlgorithm)`

    `long replace(String table, String nullColumnHack, ContentValues initialValues)`

    `long replaceOrThrow(String table, String nullColumnHack, ContentValues initialValues)`

    `int update(String table, ContentValues values, String whereClause, String[] whereArgs)`

    `int updateWithOnConflict(String table, ContentValues values, String whereClause,
    String[] whereArgs, int conflictAlgorithm)`


    At first glance, the various convenience methods are very easily understood. Decide
    on the action you want to take, nominate the table with the appropriate parameter,
    build a `whereClause`, and provide `whereArgs`. Take a closer look at the `insert()`
    and related methods and, for that matter, the `replace()` methods as well. You’ll
    see a rather strange `String` parameter, `nullColumnHack`. This works in conjunction
    with the `initialValues ContentValue` map. Where the `initialValues` map is empty,
    `nullColumnHack` will provide `NULL` values for columns to prevent the attempt
    to insert no data, which would naturally fail.


    Although these methods at first seem attractive, they are principally designed
    to appeal to the object-oriented developer who prefers simple CRUD-style primitive
    data manipulation. The methods tend to support using the database as just a persistence
    layer and, as already mentioned, leads to failing to do justice to both the power
    and the elegance of a relational database like SQLite. Now that we’ve mentioned
    these methods, we’ll move on in the hopes you’ll use the power of the other methods
    for building and executing queries.


    ## Managing Transactions with SQLiteDatabase


    All of SQLite’s transaction management fundamentals are respected by the Android
    wrapper. Several useful methods are available to start, end, and manage your transactions.


    `void beginTransaction()`

    `void beginTransactionWithListener(SQLiteTransactionListener transactionListener)`

    `void endTransaction()`

    `boolean inTransaction()`

    `void setTransactionSuccessful()`


    Several of these methods come close to needing no explanation. `beginTransaction()`
    starts a SQLite transaction, and `endTransaction()` ends the current transaction
    context for the `SQLiteDatabase` object.'
