  trans: "\n# 第 10 章：使用 SQLite 进行 Android 开发\n\n`setTables()`方法简单地将一个以逗号分隔的表名字符串作为参数。\n\
    \n`SQLiteQueryBuilder`还有一些其他方法以这种方式操作。这些方法包括`setDistinct()`，用于指明 SQL 应使用`distinct`关键字；以及`setProjectionMap(Map<String,\
    \ String> columnMap)`，它控制列的别名列和列消歧。\n\n`SQLiteQueryBuilder`剩余的大部分方法是“构建”方法。这些方法旨在构建查询字符串并将其返回以供其他地方使用，例如通过`SQLiteDatabase`对象或在`SQLiteQueryBuilder`本身中递归使用。\n\
    \n```java\nString buildQuery(String[] projectionIn, String selection, String[]\
    \ selectionArgs,\n                  String groupBy, String having, String sortOrder,\
    \ String limit)\n\nstatic String buildQueryString(boolean distinct, String tables,\
    \ String[] columns,\n                               String where, String groupBy,\
    \ String having,\n                               String orderBy, String limit)\n\
    \nString buildUnionQuery(String[] subQueries, String sortOrder, String limit)\n\
    \nString buildUnionSubQuery(String typeDiscriminatorColumn, String[] unionColumns,\n\
    \                          Set<String> columnsPresentInTable, int computedColumnsOffset,\n\
    \                          String typeDiscriminatorValue, String selection,\n\
    \                          String[] selectionArgs, String groupBy, String having)\n\
    ```\n\n这再次与从`SQLiteDatabase`中看到的方法有极大的相似性。但请注意，有些方法高度专注于联合查询。就个人而言，我们发现自行构建这些查询并使用`SQLiteDatabase`上的`rawQuery()`方法更为简单，但如果你是以编程方式构建联合语句，那么使用`buildUnionQuery()`及提供的相关方法能增强对\
    \ SQL 注入攻击的抵御能力。\n\n关于 Android SQLite 类库的理论知识就介绍到这里。现在，让我们开始创建一个可运行的、基于 SQLite\
    \ 的 Android 应用程序。\n\n## 构建 Seinfeld Android SQLite 应用程序\n\n现在，你已从本章开头拥有了一个正常工作的开发环境，并掌握了\
    \ Android SQLite 类库的使用知识，可以开始构建你的基于 SQLite 的 Android 应用程序了。我们的需求与第 9 章中构建的 iOS\
    \ 应用程序非常相似：\n\n*   构建一个 Android 应用程序，按受欢迎程度显示《宋飞正传》中提到的食物。\n*   对于任何受欢迎的食物，显示其在整个《宋飞正传》系列中被提及的次数。\n\
    *   标明该食物首次出现在哪一集。\n\n再次强调，我们的需求非常简单。我们将使用本章前面已经开发的`myDatabaseHelper.java`类，再加上一点\
    \ Android UI 的魔法。这意味着需要简要介绍一些非 SQLite 的领域，但我们会尽量保持简短。\n\n以下是我们将遵循的步骤：\n\n1.  在\
    \ Eclipse 中创建一个新的 Android 项目。\n2.  将 SQLite 框架添加到项目中。\n3.  将我们的《宋飞正传》`foods.db`添加到应用程序\
    \ assets 中。\n4.  定义将食物数据从 SQLite 映射到我们代码中的类。\n5.  定义在屏幕上呈现我们汇总和详细 SQLite 数据的 UI\
    \ 元素。\n6.  定义我们的 UI 行为。\n7.  启动！\n\n我们开始吧。\n\n![Image](img/index-317_1.png)\n\n\
    ## 创建新的 Android 项目\n\n启动 Eclipse 开始。选择文件(File) → 新建(New) → Android 项目(Project)，你应该会看到如图\
    \ 10-4 所示的新建 Android 项目对话框出现。\n\n*图 10-4. 创建一个新的 Android SQLite 项目*\n\n填写项目名称、应用程序名称和包名称，如图\
    \ 10-3 所示，或者使用你可能会记住的有意义的名称。应用程序名称将是你的应用程序在 Android 上显示的标题。你的包名称应遵循标准的 Java 包命名规则——记住这需要是全局唯一的。\n\
    \n## 将 Seinfeld SQLite 数据库添加到你的项目中\n\n要将`foods.db` SQLite 数据库文件添加到你的项目中，请打开《宋飞正传》项目文件夹，然后打开\
    \ assets 文件夹。默认情况下，此文件夹为空。你可以从操作系统中将`foods.db`文件拖放到 assets 文件夹上，或者选择就地链接数据库文件。我们不推荐链接选项，因为这会使打包包含数据库的应用程序更加困难。\n\
    \n本章后面我们将探讨`adb`实用程序如何让你在数据库被加载到（虚拟或真实）设备上后，仍然能够使用命令行操作你的`foods.db`数据库。\n\n##\
    \ 查询食物表\n\n现在我们需要为我们的《宋飞正传》应用程序添加额外的功能，以查询数据库并返回我们所知道和喜爱的食物。我们还需要将结果“连接”到 Android\
    \ UI 世界中的一个`ListView`，以便我们可以通过 Android 应用程序查看结果并进行操作。\n\n我们的第一个任务是为我们的`myDatabaseHelper`类添加一个方法，以从`food`表中获取所有食物。此代码片段来自示例代码中提供的`myDatabaseHelper.java`文件：\n\
