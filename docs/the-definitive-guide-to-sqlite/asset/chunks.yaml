    - 参数编号的分配方式\n\n## CHAPTER 6 ■ THE CORE C API\n\n对于位置参数，`sqlite3_prepare()`使用从1开始的连续整数值来分配编号。在前面的例子中，第一个`?`参数被分配为1，第二个`?`参数被分配为2。使用位置参数时，你需要自己跟踪哪个编号对应SQL语句中的哪个参数（或问号），并在绑定函数中正确地指定该编号。\n\
