    **end;**


    Now if you try to update the **foods_view**, this trigger gets called. The trigger
    simply takes the values provided in the **UPDATE** statement and uses them to
    update the underlying base tables **foods** and **food_types**. Testing it yields
    the following:


    CHAPTER 4 ■ ADVANCED SQL FOR SQLITE


    **.echo on**


    **-- Update the view within a transaction**


    **begin;**


    **update foods_view set fname=''Whataburger'', tname=''Fast Food'' where fid=413;**


