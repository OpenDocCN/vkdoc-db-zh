    \n```tcl\nputs \"\\n 选择 5 条记录。\"\ndb eval {select * from foods limit 5} values\
    \ {\n    puts \"$values(id) $values(name)\"\n}\n```\n\n前面两个代码片段都产生以下输出：\n\n```\n\
    选择 5 条记录。\n1 Bagels\n2 Bagels, raisin\n3 Bavarian Cream Pie\n4 Bear Claws\n5 Black\
    \ and White cookies\n```\n\n如果你没有提供脚本，`eval` 将返回结果集。结果集作为一个长长的值列表返回，需要你自己确定记录边界。你可以在以下语句中看到这种行为：\n\
    \n```tcl\nset x [db eval {select * from foods limit 3}]\n```\n\n这将返回一个包含六个元素的列表到变量\
    \ `$x` 中：`{1 1 Bagels 2 1 {Bagles, raisin} 3 1 {Bavarian Cream Pie}}`。这对应于三条记录，每条记录有三个字段（`id`、`type_id`\
    \ 和 `name`）。\n\n对于非 `select` 语句，`eval` 返回有关被修改记录的信息，如清单 8-23 所示。\n\n*清单 8-23.\
    \ 在 Tcl 中检查更改*\n\n```tcl\ndb eval begin\nputs \"\\n 更新所有行。\"\ndb eval { update\
