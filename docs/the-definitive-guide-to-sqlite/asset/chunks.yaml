    id** clause in the earlier code, which **id** should SQLite return? To help with
    this type of task, you can qualify column names with their table names to remove
    any ambiguity, as you saw earlier.


    Another useful feature is *aliases*. If your table name is particularly long and
    you don’t want to have to use its name every time you qualify a column, you can
    use an alias. Aliasing is actually a fundamental relational operation called *rename*.
    The rename operation simply assigns a new name to a relation. For example, consider
    this statement:


    CHAPTER 3 ■ SQL FOR SQLITE


    **select foods.name, food_types.name**


    **from foods, food_types**


    **where foods.type_id = food_types.id**


    **limit 10;**


    There is a good bit of typing here. You can alias the tables in the **source**
    clause by simply including the new name directly after the table name, as in the
    following example:


    **select f.name, t.name**


    **from foods f, food_types t**


    **where f.type_id = t.id**


    **limit 10;**


    **Here, the **foods** table is assigned the alias **f**, and the **food_types**
    table is assigned the alias **t**. Now, every other reference to **foods** or
    **food_types** in the statement must use the alias **f** and **t**, respectively.


    Aliases make it possible to do *self-joins*—joining a table with itself. For example,
    say you want to know what foods in season 4 are mentioned in other seasons. You
    would first need to get a list of episodes and foods in season 4, which you would
    obtain by joining **episodes** and **episodes_foods**. But then you would need
    a similar list for foods outside of season 4\. Finally, you would combine the
    two lists based on their common foods. The following query uses self-joins to
    do the trick:


    **select f.name as food, e1.name, e1.season, e2.name, e2.season**


    **from episodes e1, foods_episodes fe1, foods f,**


    **episodes e2, foods_episodes fe2**


    **where**


    **-- Get foods in season 4**


    **(e1.id = fe1.episode_id and e1.season = 4) and fe1.food_id = f.id**


    **-- Link foods with all other episodes**


    **and (fe1.food_id = fe2.food_id)**


    **-- Link with their respective episodes and filter out e1''s season**


    **and (fe2.episode_id = e2.id AND e2.season != e1.season)**


    **order by f.name;**'
  trans: "\n自然连接（*Natural joins*）会基于两个表中名称相同的列进行连接。仅仅是对表进行添加列或删除列的操作，就可能极大地改变自然连接查询的结果。这可能导致非常不可预测的结果，尤其是当你的表结构随时间发生变化时。因此，始终建议显式地定义查询的连接条件，而不是依赖于表结构的隐含语义。\n\
    \n## 推荐语法\n\n在语法上，有多种方式可以指定连接。`foods` 和 `food_types` 的内连接示例展示了如何在 `where` 子句中隐式执行连接：\n\
    \n```\nselect * from foods, food_types where foods.id=food_types.food_id;\n```\n\
    \n当数据库看到列出了多个表时，它就知道会进行连接——至少是交叉连接。这里的 `where` 子句指定了一个内连接。\n\n这种隐式形式虽然相当简洁，但实际上是一种较旧的语法形式，你应该避免使用。\n\
    \n在 SQL 中表达连接的、符合规范（依据 SQL92 标准）的正确方式是使用 `join` 关键字。其通用形式如下：\n\n```\nselect heading\
    \ from left_table join_type right_table on join_condition;\n```\n\n这种显式形式适用于所有连接类型。例如：\n\
    \n```\nselect * from foods inner join food_types on foods.id=food_types.food_id;\n\
    ```\n\n```\nselect * from foods left outer join food_types on foods.id=food_types.food_id;\n\
    ```\n\n```\nselect * from foods cross join food_types;\n```\n\n使用 ANSI 连接语法最重要的原因是，有些查询类型只能通过\
    \ `join` 关键字风格的语法来满足。对于任何形式的外连接——左连接、右连接或全连接——尤其如此。\n\n## 名称与别名\n\n在连接表时，如果两个表有同名的列，就可能产生歧义。如果在之前的代码中，你使用\
    \ `select id` 子句来连接两个都有 `id` 列的表，SQLite 应该返回哪个 `id` 呢？为了帮助处理这类问题，你可以通过表名来限定列名，以消除歧义，正如你之前所见。\n\
    \n另一个有用的特性是 *别名*。如果你的表名特别长，并且不想在每次限定列名时都使用全名，你可以使用别名。别名实际上是一种称为 *重命名* 的基本关系代数操作。重命名操作只是为关系（表）分配一个新名称。例如，考虑以下语句：\n\
    \n第 3 章 ■ SQL FOR SQLITE\n\n```\nselect foods.name, food_types.name\nfrom foods,\
    \ food_types\nwhere foods.type_id = food_types.id\nlimit 10;\n```\n\n这里需要输入很多字符。你可以在\
    \ `from` 子句中为表起别名，只需在表名后直接加上新名称即可，如下例所示：\n\n```\nselect f.name, t.name\nfrom foods\
    \ f, food_types t\nwhere f.type_id = t.id\nlimit 10;\n```\n\n这里，`foods` 表被赋予了别名\
    \ `f`，`food_types` 表被赋予了别名 `t`。现在，语句中所有对 `foods` 或 `food_types` 的其他引用都必须分别使用别名\
    \ `f` 和 `t`。\n\n别名使得 *自连接* 成为可能——即将一个表与它自身进行连接。例如，假设你想知道第 4 季中出现的食物在其他哪些季中也被提及。你首先需要获取第\
    \ 4 季的剧集和食物列表，这可以通过连接 `episodes` 和 `episodes_foods` 表来获得。但接着你还需要第 4 季之外的食物的类似列表。最后，你根据共同的食物将两个列表合并。以下查询使用自连接实现了这个目的：\n\
    \n```\nselect f.name as food, e1.name, e1.season, e2.name, e2.season\nfrom episodes\
    \ e1, foods_episodes fe1, foods f,\n     episodes e2, foods_episodes fe2\nwhere\n\
    \  -- 获取第 4 季的食物\n  (e1.id = fe1.episode_id and e1.season = 4) and fe1.food_id\
    \ = f.id\n  -- 将食物与所有其他剧集关联\n  and (fe1.food_id = fe2.food_id)\n  -- 关联到它们各自的剧集，并过滤掉\
    \ e1 所在的季\n  and (fe2.episode_id = e2.id AND e2.season != e1.season)\norder by\
    \ f.name;\n```\n"
