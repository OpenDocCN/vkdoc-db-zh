    APSW as an Alternative Python Interface


    APSW is written and maintained by Roger Binns. Detailed information on APSW can
    be found at


    [**http://code.google.com/p/apsw/**](http://code.google.com/p/apsw). Although
    APSW and pysqlite share some common capabilities and a very similar syntactical
    style, APSW goes further in providing a range of additional features and API mapping
    points. Rather than repeating very similar Python code samples, we’ll outline
    the key benefits of APSW and allow you to explore them as you want.


    *Support for virtual tables, VFS, blob I/O, backups, and file control*: APSW


    provides comprehensive support for the latest features provided by SQLite, as


    well as database management tasks that aren’t provided through pysqlite’s


    narrower focus on DBAPI conformity.


    *APSW Python Shell*: APSW incorporates an extensible shell that can be used in


    place of the SQLite command interface. This includes great features such as


    color-coded syntax, CSV formatting and handling, strictly correct error


    handling, and additional formatting options for data and messages.


    *Consistent transaction handling*: APSW always performs transactions as you


    would expect, rather than mimicking pysqlite’s attempt to intuitively handle


    them without your involvement.


    There are also a host of other nice little (and even major) features that make
    APSW a joy to work with. You can review all of these capabilities at [**http://apidoc.apsw.googlecode.com/hg/pysqlite.html**.](http://apidoc.apsw.googlecode.com/hg/pysqlite.html)


    Ruby


    The Ruby extension was written by Jamis Buck of 37 Signals and is now maintained
    by a group of


    developers. You can obtain detailed information on the extension as well as the
    source code at


    [**http://rubyforge.org/projects/sqlite-ruby**. The complete documenta](http://rubyforge.org/projects/sqlite-ruby)tion
    for the SQLite 3 extension can be found at [**http://sqlite-ruby.rubyforge.org/sqlite3/**](http://sqlite-ruby.rubyforge.org/sqlite3),
    though the layout is a little daunting.


    Installation


    The extension can be built in two ways: with or without SWIG. The Ruby configuration
    script will automatically figure out whether SWIG is available on your system.
    You should build the extension with SWIG (the C extension), because that implementation
    is more stable. If your operating system uses a well-developed package management
    and repository system (like Debian, Ubuntu, and so on), you’ll also find packages
    available for your system there.


    At the time of this writing, the current version of **sqlite-ruby** is 1.3.1\.
    To build from source, fetch the tarball from [**http://rubyforge.org/projects/sqlite-ruby**.
    Unpa](http://rubyforge.org/projects/sqlite-ruby)ck the tarball, and run three
    setup commands:


