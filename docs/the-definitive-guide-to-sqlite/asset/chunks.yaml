    \ `disconnect` 方法关闭数据库。\n\n## 查询处理\n\n查询也是使用标准的 `DBI` 接口执行的。你可以使用数据库连接句柄的 `prepare()`、`execute()`、`fetch()`\
    \ 或 `selectrow()` 函数。所有这些都在 `DBI` 手册页中有完整记录。清单 8-1 展示了一个使用查询的示例。\n\n*清单 8-1. 在\
    \ Perl 中执行查询*\n\n```perl\nuse DBI;\n# Connect to database\nmy $dbh = DBI->connect(\
    \ \"dbi:SQLite:dbname=foods.db\", \"\", \"\",\n                        { RaiseError\
    \ => 1 });\n\n# Prepare the statment\nmy $sth = $dbh->prepare(\"select name from\
