    \ 6 ■ THE CORE C API\n\n### Named Parameters\n\n第三种参数绑定方法是使用命名参数。你可以使用编号参数来分配自己的编号，而使用命名参数则可以分配字母数字名称。同样，因为编号参数以问号（?）为前缀，你通过给参数名加上冒号（`:`）或at符号（@）来标识命名参数。考虑以下代码片段（摘自`parameters.c`）：\n\
