    ■ **注意**  在此示例中，我们使用了一种新记法来指定 `select` 子句中的列。我们不是仅指定列名，而是使用 `table_name.column_name`
    这种记法。原因在于 `select` 语句中涉及了多个表。数据库足够智能，可以判断出一列属于哪个表——只要该列名在所有表中是唯一的。如果你使用的列名在连接的其它表中也有定义，数据库将无法确定你指的是哪一列，并会返回错误。在实践中，当进行表连接时，始终使用
    `table_name.column_name` 记法以避免任何可能的歧义，这总是一个好主意。这将在“名称与别名”一节中详细说明。


    为了执行连接，数据库会查找这些匹配的行。对于第一个表中的每一行，数据库会在第二个表中查找连接列具有相同值的所有行，并将它们包含在输入关系中。因此，在此示例中，`from`
    子句通过连接两个表的行构建了一个复合关系。


    **foods**


    | id | name              | type_id |

    |----|-------------------|---------|

    | 1  | Bagels            | 1       |

    | 2  | Cereal            | 10      |

    | 3  | Chicken/Fowl      | 49      |

    | 49 | Cheerios          | 2       |

    | 10 | Chocolate Bobka   | 1       |

    | 15 | Chicken (Kenny’s) | 3       |

    | 198| Mackinaw Peaches  | 15      |

    | 203| Papaya            | 15      |

    | 244| JujyFruit         | 15      |

    | 245| Junior Mints      | 15      |

    | 412| Wax Beans         | 15      |


    **food_types**


    | id | name        |

    |----|-------------|

    | 1  | Bakery      |

    | 2  | Cereal      |

    | 3  | Chicken/Fowl|

    | 10 | Chocolate Bobka |

    | 13 | Seafood     |

    | 14 | Soup        |

    | 15 | Vegetables  |


    *图 3-10\. `foods` 和 `food_types` 表的连接*


    后续操作（`where`、`group by` 等）的运作方式完全相同。只是通过表连接改变了输入。事实证明，SQLite 支持六种不同类型的连接。刚才描述的，称为**内连接（inner
    join）**，是最常见的一种。


    ## 内连接（Inner Joins）


    内连接是指通过两个表中两列之间的关系来连接两个表，如前面的例子所示。这是最常见（也可能是最有普遍用途）的连接类型。


    内连接使用关系代数中的另一个集合运算，称为**交集（intersection）**，来查找同时存在于两个集合中的元素。图 3-11 说明了这一点。集合 {1,
    2, 8, 9} 和集合 {1, 3, 5, 8} 的交集是集合 {1, 8}。交集运算通过维恩图表示，显示了两个集合的共同元素。


    *图 3-11\. 集合交集*


    这正是内连接的工作原理，但连接中的集合是关联列的共同元素。假设图 3-11 中的左集合代表 `foods.type_id` 列的值，右集合代表 `food_types.id`
    列的值。给定匹配的列，内连接会查找双方包含相似值的行，并将它们组合起来形成结果行（图 3-12）。注意，此示例假设显示的记录是 `foods` 和 `food_types`
    中唯一的记录。


    ![](img/index-97_1.png)


    *图 3-12\. 食物表连接作为交集*


    内连接只返回满足给定列关系的行，该关系也称为连接条件。它们回答了这样的问题：“在给定以下关系的情况下，B 中的哪些行与 A 中的行匹配？”


    让我们用 SQL 来演示这一点，以便将理论与实际示例对应起来。


    ```sql

    Select *

    From foods inner join food_types on foods.id = food_types.id

    ```


    一旦你想象出正在发生的事情，语法就非常容易理解了。


    ## 交叉连接（Cross Joins）


    想象一下，如果没有连接条件。你会得到什么？在这种情况下，如果两个表没有任何关联，`select` 将产生一种更基本的连接（最基本的），称为**交叉连接（cross
    join）**、笛卡尔连接或笛卡尔积。笛卡尔连接是基本的关系操作之一。它是一种强制性的、几乎无意义的连接，会导致第一个表中的所有行与第二个表中的所有行的组合。


    在 SQL 中，`foods` 和 `food_types` 的交叉连接表示如下：


    ```sql

    select * from foods, food_types;

    ```


    `from` 子句在没有其他内容时，会产生交叉连接。结果如下所示。`foods` 中的每一行都与 `food_types` 中的每一行组合，但关键是，这种组合并非通过关联
    `id` 和 `type_id` 值实现的。


    在交叉连接中，行之间不存在关系；没有连接条件，它们只是被强行组合在一起。


    ```

    1 1 Bagels 1 Bakery

    1 1 Bagels 2 Cereal

    1 1 Bagels 3 Chicken/Fowl

    …

    (6174 rows omitted to save paper)

    …

    412 15 Wax Beans 13 Seafood

    412 15 Wax Beans 14 Soup

    412 15 Wax Beans 15 Vegetables

    ```


    你可能会问自己，这样的交叉连接有什么用途。坦率地说，在使用这种逻辑之前，你应该始终问自己这个问题。你真的想要一个表中的每一行与另一个表中的每一行的笛卡尔积吗？答案几乎总是否定的。


    ## 外连接（Outer Joins）


    剩下的四种连接中有三种称为外连接。内连接根据给定关系在表之间选择行。外连接选择内连接的所有行，再加上关系之外的一些行。这三种外连接类型称为左连接、右连接和全连接。左外连接相对于
    SQL 命令中的“左表”进行操作。例如，在命令中：


    ```sql

    select *

    from foods left outer join foods_episodes on foods.id=foods_episodes.food_id;

    ```


    这里 `foods` 是左表。左外连接偏爱它。它是左外连接中具有重要意义的表。


    左外连接尝试根据连接条件（`foods.id=foods_episodes.food_id`）将 `foods` 表的每一行与 `foods_episodes`
    表的每一行进行匹配。所有这些匹配的行都包含在结果中。


    然而，如果我们在 `foods` 表中注册了一些尚未在剧集中出现的食品，那么 `foods` 表中那些与 `foods_episodes` 不匹配的剩余食品行仍然会被包含在结果中，并且在
    `foods_episodes` 未提供行的位置，它会“提供” `null` 结果。


    右外连接的工作方式类似，只是右表是包含所有行（无论是否匹配）的表。在操作上，左外连接和右外连接是相同的；它们做同样的事情。它们只是在顺序和语法上有所不同。作为
    SQLite 用户，这意味着任何需要右外连接来解决的问题，都可以用左外连接来解决。


    全外连接是左外连接和右外连接的组合。它包含所有匹配的记录，然后是右表和左表中未匹配的记录。目前，SQLite 不支持右外连接和全外连接。然而，如前所述，右连接可以用左外连接替代，而全外连接可以使用复合查询来执行（参见本章后面的“复合查询”部分）。


    ## 自然连接（Natural Joins）


    列表中的最后一个连接称为自然连接。它实际上是一个伪装的内连接，但加入了一些语法和约定。自然连接通过共同的列名来连接两个表。因此，使用自然连接，你可以获得两个表的内连接，而无需添加连接条件。'
- fmt: "Natural joins will join *all* columns by the same name in both tables. Just\
    \ the process of adding to or removing a column from a table can drastically change\
    \ the results of a natural join query. This can produce very unpredictable results,\
    \ especially if your tables’ design change over time. It’s always better to explicitly\
    \ define the join conditions of your queries than rely on the semantics of the\
    \ table schema.\n\n## Preferred Syntax\n\nSyntactically, there are various ways\
    \ of specifying a join. The inner join example of `foods` and `food_types` illustrates\
    \ performing a join implicitly in the `where` clause:\n\n```\nselect * from foods,\
    \ food_types where foods.id=food_types.food_id;\n```\n\nWhen the database sees\
    \ more than one table listed, it knows there will be a join—at the very least\
    \ a cross join. The `where` clause here calls for an inner join.\n\nThis implicit\
    \ form, although rather clean, is actually an older form of syntax that you should\
    \ avoid.\n\nThe politically correct way (per SQL92) to express a join in SQL is\
    \ using the `join` keyword. The general form is as follows:\n\n```\nselect heading\
    \ from left_table join_type right_table on join_condition;\n```\n\nThis explicit\
    \ form can be used for all join types. For example:\n\n```\nselect * from foods\
    \ inner join food_types on foods.id=food_types.food_id;\n```\n\n```\nselect *\
    \ from foods left outer join food_types on foods.id=food_types.food_id;\n```\n\
    \n```\nselect * from foods cross join food_types;\n```\n\nThe most important reason\
    \ for using ANSI join syntax is that there are some query types that can only\
    \ be satisfied by using the `join` keyword-style syntax. This is particularly\
    \ so for any form of outer join—left, right, or full.\n\n## Names and Aliases\n\
    \nWhen joining tables, ambiguity can arise if both tables have a column with the\
    \ same name. If you were to join two tables with an `id` column using a `select\
    \ id` clause in the earlier code, which `id` should SQLite return? To help with\
    \ this type of task, you can qualify column names with their table names to remove\
    \ any ambiguity, as you saw earlier.\n\nAnother useful feature is *aliases*. If\
    \ your table name is particularly long and you don’t want to have to use its name\
    \ every time you qualify a column, you can use an alias. Aliasing is actually\
    \ a fundamental relational operation called *rename*. The rename operation simply\
    \ assigns a new name to a relation. For example, consider this statement:\n\n\
    CHAPTER 3 ■ SQL FOR SQLITE\n\n```\nselect foods.name, food_types.name\nfrom foods,\
    \ food_types\nwhere foods.type_id = food_types.id\nlimit 10;\n```\n\nThere is\
    \ a good bit of typing here. You can alias the tables in the `from` clause by\
    \ simply including the new name directly after the table name, as in the following\
    \ example:\n\n```\nselect f.name, t.name\nfrom foods f, food_types t\nwhere f.type_id\
    \ = t.id\nlimit 10;\n```\n\nHere, the `foods` table is assigned the alias `f`,\
    \ and the `food_types` table is assigned the alias `t`. Now, every other reference\
    \ to `foods` or `food_types` in the statement must use the alias `f` and `t`,\
    \ respectively.\n\nAliases make it possible to do *self-joins*—joining a table\
    \ with itself. For example, say you want to know what foods in season 4 are mentioned\
    \ in other seasons. You would first need to get a list of episodes and foods in\
    \ season 4, which you would obtain by joining `episodes` and `episodes_foods`.\
    \ But then you would need a similar list for foods outside of season 4. Finally,\
    \ you would combine the two lists based on their common foods. The following query\
    \ uses self-joins to do the trick:\n\n```\nselect f.name as food, e1.name, e1.season,\
    \ e2.name, e2.season\nfrom episodes e1, foods_episodes fe1, foods f,\n     episodes\
    \ e2, foods_episodes fe2\nwhere\n  -- Get foods in season 4\n  (e1.id = fe1.episode_id\
    \ and e1.season = 4) and fe1.food_id = f.id\n  -- Link foods with all other episodes\n\
    \  and (fe1.food_id = fe2.food_id)\n  -- Link with their respective episodes and\
    \ filter out e1's season\n  and (fe2.episode_id = e2.id AND e2.season != e1.season)\n\
    order by f.name;\n```"
