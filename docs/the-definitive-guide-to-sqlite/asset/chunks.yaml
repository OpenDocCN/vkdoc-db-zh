- fmt: '# 使用 Eclipse 进行基于 SQLite 的 Android 开发


    ## 安装 Android 开发工具（ADT）


    如果您选择 Eclipse 作为基于 SQLite 的 Android 开发的 IDE，那么除了 Android SDK 起始包外，您还需要下载并安装 Android
    开发工具（ADT）。ADT 扩展了 Eclipse，通过专用的 Android 方面（aspect）允许快速设置新的 Android 项目，并提供了用于创建
    UI、调试以及导出已签名和未签名的 Android 应用程序包（称为 APKs）的附加工具。


    要安装 ADT，请运行 Eclipse，然后选择 `Help > Install New Software`（这是在 Eclipse 3.5 下的菜单路径——在更早的
    Eclipse 版本中，该菜单的名称可能略有不同）。点击 `Add` 以添加一个新的软件仓库，并在弹出的“添加仓库”对话框中输入 Android 开发工具仓库的
    URL。点击 `OK`，然后返回“安装新软件”屏幕。您现在应该能看到开发者工具及其子组件 Android DDMS 和 Android 开发工具，如图 10-1
    所示。


    ![图 10-1：安装 Android 开发工具](index-303_1.png)


    *图 10-1\. 安装 Android 开发工具*


    选中所有复选框，然后点击 `Next` 按钮。系统会要求您同意许可协议，之后您可以点击 `Finish` 来完成 ADT 的安装。


    ## 添加 Android 平台和组件


    设置好 Android SDK 并准备开发 SQLite 应用程序的最后一步，是使用 Android SDK 和 AVD 管理器下载额外的组件到您的环境中。Google
    将完整的 Android SDK 设计为模块化的，因此诸如文档、针对目标版本和手机型号的特定组件以及其他部分都被拆分成单独管理和安装的包。


    您可以选择以下组件：


    *   **SDK 工具**：这是 SDK 的核心部分，在您安装 SDK 起始包时已包含在您的环境中。

    *   **Android 平台**：对于已发布到生产环境的每个 Android 平台版本，都有一个平台可用。您需要至少安装一个平台，以便为基于 SQLite
    的 Android 应用程序提供构建目标。

    *   **SDK 附加组件**：SDK 附加组件是为配合 Android SDK 使用而捆绑的实用附加功能。其中最受欢迎的是 Google API 附加组件，它提供了对众多
    Google 技术（如地图、街景等）的访问。

    *   **Windows 的 USB 驱动程序**：USB 驱动程序是为 Windows 开发者提供的，以便他们可以将应用程序复制到实际设备上运行和调试。只有
    Windows 开发者需要此驱动程序——OS X 和 Linux 不需要特殊驱动程序即可实现此功能。

    *   **示例**：此包包含大量代码片段和 Android 开发示例。

    *   **文档**：此包包含所有 Android SDK 版本的完整 API 文档。


    通过选择 Eclipse 中的菜单项 `Window > Android SDK and AVD Manager` 来开始添加这些组件的过程。管理窗口将会出现，如图
    10-2 所示。


    *图 10-2\. Eclipse 中的 Android SDK 和 AVD 管理器*


    ![图 10-2](index-305_1.jpg)


    ## 创建新的 Android 虚拟设备（AVD）


    在管理器中，您可能会看到一个或多个现有的虚拟设备。让我们专门为我们的 SQLite 开发创建一个新的虚拟设备，因为这将确保我们拥有想要和需要的组件，而没有任何我们不需要的多余附加项。


    在 Android SDK 和 AVD 管理器窗口中，点击 `New` 按钮。您应该会看到“创建新的 Android 虚拟设备（AVD）”对话框出现，如图
    10-3 所示。


    *图 10-3\. 为 SQLite 项目添加新的 Android 虚拟设备*


    您可以为您的虚拟手机取任何喜欢的名字。我们将我们的称为 `SQLite_AVD`。`Target` 字段决定了您希望应用程序针对的 Android SDK
    级别。


    ### Android 与 SQLite 版本


    就 SQLite 而言，包含的底层 SQLite 库版本略有不同。对于 Android 2.1 及更早版本，底层 SQLite 版本是 3.5.9。从 Android
    2.2（即所谓的 Froyo）开始，SQLite 库已更新到版本 3.6.22。


    如果您没有特定的要求，您可以支持最旧可能的 SDK 版本，以针对最广泛的受众。否则，我们建议至少选择最新的主要版本，目前是 2.2。


    SD 卡和皮肤设置对于我们的 SQLite 重点来说并不是真正的考虑因素，因此此时请将它们保留为默认值。虚拟设备的剩余方面涉及该 AVD 将模拟的额外硬件。这包括许多对
    SQLite 开发没有真正影响的东西，例如 GPS 和加速度计设备。但有几个硬件选项值得考虑。


    “缓存分区大小”参数将控制设备上可供应用程序和手机用户使用的板载存储空间比例（相对于 Android 和系统二进制文件而言）。常见手机和平板电脑具有 4GB、8GB
    甚至 16GB 或更多的板载内存，其中很大一部分可用于缓存分区。如果您计划构建具有大型 SQLite 数据库的应用程序，您应该设置此参数，以帮助您保持在应用程序可能遇到的实际设备上限之内。


    “最大虚拟机应用程序堆大小”选项设置了 Android 应用程序在被系统终止之前可以占用的堆内存量的限制。这将在处理在堆上分配的较大项目时影响您的 SQLite
    开发。最可能的罪魁祸首是作为游标对象分配的大型结果集（我们将在本章后面讨论）。默认值为 16MB。如果您知道将在内存有限的设备上工作，可以调整此设置，以便在您的开发设备上捕获任何低内存场景，然后再到达真实设备。


    “设备 RAM 大小”指定了设备上存在的物理内存量。这很少会成为您的限制因素，但对于受约束设备上的 SQLite 开发来说，调低此值以使您的开发设备更接近您未来的目标设备是有用的。默认值为
    96MB。


    当您完成为虚拟设备选择所需的硬件选项后，保存它，它应该会出现在您环境中现有 Android 虚拟设备的列表中。


    ## Eclipse 的替代方案


    对于有 Android 开发经验或寻求跨平台移动开发工具的人来说，除了 Eclipse 之外，还有其他用于 Android 开发（特别是基于 SQLite
    的 Android 开发）的工具。如果您已经熟悉 Android 开发并更喜欢它们而不是 Eclipse，请随意使用以下任何一种或全部工具。


    **PhoneGap**：一个用于构建跨平台移动应用程序的开源开发框架。[www.phonegap.com](http://www.phonegap.com)


    **Appcelerator Titanium**：另一个用于移动应用程序的开源跨平台框架。[www.appcelerator.com](http://www.appcelerator.com)


    这些工具都对 Android 下的 SQLite 开发以及其他平台提供了出色的支持。


    ## Android SQLite 类和接口


    您现在拥有一个可以开发基于 SQLite 的 Android 应用程序的工作环境。下一步是探索 Android 用于包装底层 SQLite C API 的类和接口。


    与其他提供 API 之间一对一映射的 API 和语言绑定不同，Android SQLite API 采用了截然不同的方法。


    ### 使用基本帮助类 SQLiteOpenHelper


    Android 为处理 SQLite 数据库提供的第一个也是最重要的类是 `SQLiteOpenHelper`。'
