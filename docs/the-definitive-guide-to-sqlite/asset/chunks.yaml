  trans: "\n# 第 9 章 ■ 使用 SQLite 进行 iOS 开发\n\n## 步骤 5：访问与查询 SQLite 数据库\n\n当我们的 iSeinfeld\
    \ 应用程序启动时，我们希望它能找到并打开我们的 `foods.db` 数据库。届时，我们便可以运用所有 SQLite C API 来查询、控制及使用该数据库。为了在启动时找到并打开数据库，我们需要扩展项目中自动生成的\
    \ `iSeinfeldAppDelegate` 类。清单 9-4 展示了我们对 `iSeinfeldAppDelegate.h` 文件所做的修改。\n\n\
    ### 清单 9-4. `iSeinfeldAppDelegate.h` 文件\n\n```objective-c\n// iSeinfeldAppDelegate.h\n\
    // iSeinfeld\n//\n// Created by Grant Allen on 9/9/10.\n// Copyright __MyCompanyName__\
    \ 2010. All rights reserved.\n//\n\n@interface iSeinfeldAppDelegate : NSObject\
    \ <UIApplicationDelegate> {\n    UIWindow *window;\n    UINavigationController\
    \ *navigationController;\n    // 你的数据库详情\n    NSString *databaseName;\n    NSString\
    \ *databasePath;\n    // 我们的 iSeinfeld 食物数组，用于存储食物数据\n    NSMutableArray *foods;\n\
    }\n\n@property (nonatomic, retain) IBOutlet UIWindow *window;\n@property (nonatomic,\
    \ retain) IBOutlet UINavigationController *navigationController;\n@property (nonatomic,\
    \ retain) NSMutableArray *foods;\n\n@end\n```\n\n我们已经勾勒出将用于存放 SQLite 数据库路径和名称的成员变量。我们还定义了一个\
    \ `NSMutableArray` 用于存放我们的食物集合。接口定义是直截了当的，但魔鬼在于细节之中。\n\n我们将在 `iSeinfeldAppDelegate.m`\
    \ 文件中扩展应用程序的行为。打开该文件，你会看到大量自动生成的方法，例如 `applicationWillTerminate` 等。我们希望在应用程序启动后注入行为，因此我们将修改\
    \ `applicationDidFinishLaunching` 函数。\n\n```objective-c\n// … 上方省略大量代码\n- (void)applicationDidFinishLaunching:(UIApplication\
    \ *)application {\n    // 设置我们的食物数据库名称\n    databaseName = @\"foods.db\";\n\n\
    \    // 获取文档目录路径并附加数据库名称\n    NSArray *documentPaths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\
    \ NSUserDomainMask, YES);\n    NSString *documentsDir = [documentPaths objectAtIndex:0];\n\
    \    databasePath = [documentsDir stringByAppendingPathComponent:databaseName];\n\
    \    \n    // 检查数据库是否存在，必要时创建\n    [self checkAndCreateDatabase];\n    \n    //\
    \ 查询数据库中的所有食物并填充数组\n    [self readFoodsFromDatabase];\n    \n    // …后续还有更多代码\n\
    ```\n\n我们使用了几个内置功能在项目中查找 `foods.db` SQLite 文件。`NSSearchPathForDirectoriesInDomains`、`NSDocumentDirectory`\
    \ 和 `NSUserDomainMask` 都是 iOS SDK 提供的常量，用于在运行环境中查找路径。在本例中，这些代码行实际上是获取当前应用程序位置（无论其位于何处）的快捷方式。最终，我们将\
    \ `foods.db` 文件的位置存储在 `databasePath` 变量中。\n\n我们的逻辑随后分为处理定位数据库（或从项目中全新创建）的代码和查询数据库的代码。定位数据库的代码并非\
    \ SQLite 特有的，涵盖了简单的文件操作。具体实现请参阅源代码中包含的 `iSeinfeldAppDelegate.m` 文件。\n\n打开数据库并使用我们的\
    \ SQLite API 查询数据是核心所在。我们的 `readFoodsFromDatabase()` 函数正是执行这项工作，现在让我们详细审视它。\n\n\
    ```objective-c\n-(void) readFoodsFromDatabase {\n    // 设置数据库对象\n    sqlite3 *database;\n\
    \    \n    // 初始化食物数组\n```\n"
- fmt: "# CHAPTER 9 ■ IOS DEVELOPMENT WITH SQLITE\n\n```objective-c\nfoods = [[NSMutableArray\
    \ alloc] init];\n```\n\n```objective-c\n// Open the database\nif(sqlite3_open_v2([databasePath\
    \ UTF8String], &database) == SQLITE_OK) {\n    // Setup the SQL Statement and\
    \ compile it for faster access\n    const char *sqlStatement =\n    \"select\"\
    \n    \"  count(foods_episodes.episode_id) popularity,\"\n    \"  min(foods_episodes.episode_id)\
    \ first_seen,\"\n    \"  foods.name\"\n    \" from foods inner join foods_episodes\
    \ on foods.id = foods_episodes.food_id\"\n    \" group by foods.name\"\n    \"\
    \ order by popularity desc, name\"\n    \" limit 50 \";\n\n    sqlite3_stmt *compiledStatement;\n\
    \    if(sqlite3_prepare_v2(database, sqlStatement, -1, &compiledStatement, NULL)\n\
    \       == SQLITE_OK) {\n        // Loop through the results and add them to the\
    \ foods array\n        while(sqlite3_step(compiledStatement) == SQLITE_ROW) {\n\
    \            // Read the data from the result row\n            NSString *aFreq\
    \ = [NSString stringWithUTF8String:\n                (char *)sqlite3_column_text(compiledStatement,\
    \ 0)];\n            NSString *aPop = [NSString stringWithUTF8String:\n       \
    \         (char *)sqlite3_column_text(compiledStatement, 1)];\n            NSString\
    \ *aName = [NSString stringWithUTF8String:\n                (char *)sqlite3_column_text(compiledStatement,\
    \ 2)];\n\n            // Create a new food object with the data from the database\n\
    \            Food *food = [[Food alloc] initWithName:aName\n                 \
    \                     first_episode:aFreq popularity:aPop];\n\n            //\
    \ Add the food object to the foods Array\n            [foods addObject:food];\n\
    \n            [food release];\n        }\n    }\n    // finalize the statement\n\
    \    sqlite3_finalize(compiledStatement);\n}\n\nsqlite3_close(database);\n}\n\
    ```\n\nWorking through that code, you can see some familiar API calls. We start\
    \ with defining a `sqlite3` object named `database`:\n\n```objective-c\nsqlite3\
    \ *database;\n```\n\nAfter defining an array for our foods, we then try to open\
    \ our database using the `sqlite3_open_v2()` API call.\n\n```objective-c\nif(sqlite3_open_v2([databasePath\
    \ UTF8String], &database) == SQLITE_OK)\n```\n\nThe `if` construct should be familiar\
    \ to you regardless of your preferred programming language. And we’re looking\
    \ for the return value `SQLITE_OK` from the `sqlite3_open_v2()` call. This example\
    \ could be straight from Chapter 5, 6, or 7. But note the odd handling of the\
    \ `databaseName` variable, which we’d previously defined in `iSeinfeldAppDelegate`\
    \ to contain our database’s full path and file. Because Objective-C uses `NSString`\
    \ as the base string class but SQLite’s C API uses standard C-style strings/chars,\
    \ we need to cast the `NSString` `databaseName` to a C string so that the SQLite\
    \ API understands the database name that it should open. The built-in `UTF8String`\
    \ option performs this conversion for us.\n\nWith our database open, we then create\
    \ a `sqlite3_stmt` object called `compiledStatement`. This is assigned our query\
    \ text.\n\n```objective-c\nsqlite3_stmt *compiledStatement;\n```\n\nAgain, that’s\
    \ eerily like straight C syntax: the differences with Objective-C are not that\
    \ large once you start working with it. We use `sqlite3_prepare_v2` to prepare\
    \ the statement and `sqlite3_step` to step through the results.\n\nAs we step\
    \ through the results, we retrieve the column data with statements of the following\
    \ form (note this is one line of code, split here for clarity):\n\n```objective-c\n\
    NSString *aName = [NSString stringWithUTF8String:\n    (char *)sqlite3_column_text(compiledStatement,\
    \ 2)];\n```\n\nYou’ll notice an old friend here. The `sqlite3_column_text()` API\
    \ call is used here to retrieve the text of the “name” column in our results.\
    \ We can use any of the `sqlite3_column_xxx()` functions as appropriate. We then\
    \ perform a conversion from the base C `char*` data to an Objective-C `NSString`\
    \ using the complement of the technique we described for `databaseName`. `stringWithUTF8String`\
    \ will convert our `char*` to an `NSString`, and we then assign the result to\
    \ the `aName` variable. A similar process occurs for our other results rows.\n\
    \nFrom here, each `Food` object is added to our `Foods` array, and the process\
    \ continues until our results are exhausted. We clean up by finalizing the compiled\
    \ statement with `sqlite3_finalize()` and closing the database with `sqlite3_close()`.\
    \ Note that we’re only closing the database because we’ve completed the work we\
    \ need to perform for our example. In a more complicated or featureful application,\
    \ you may well leave the database open for further querying and choose to close\
    \ it only under the `applicationWillTerminate` event.\n\n## Step 6: Final Polish\
    \ and Wiring for iSeinfeld\n\nThere are several final wiring and configuration\
    \ steps to have our main application launch the `FoodView` as required when viewing\
    \ the details of our foods. Rather than include yet more code that isn’t SQLite-specific,\
    \ we’ll refer you to the files in the included source code. We’ve liberally sprinkled\
    \ comments through these files so you can see the changes we’ve made. You can\
    \ also diff them against your vanilla files in Xcode to see these changes.\n\n\
    ## iSeinfeld in Action!\n\nThe suspense is over! We’ve written the code, worked\
    \ with our SQLite database, and built a gorgeous user interface to show off at\
    \ the next *Seinfeld* trivia night. You can now run your new application in the\
    \ iOS simulator by choosing Build → Build and Run. This will launch the device\
    \ simulator, such as the iPhone Simulator shown in Figure 9-11.\n\n![Figure 9-11.\
    \ The iSeinfeld SQLite-based application icon in the iOS device simulator](index-295_1.jpg)\n\
    \nGo ahead...click your new application to run it, and see for yourself what happens.\
    \ Our main screen is shown next, in Figure 9-12.\n\n![Figure 9-12. iSeinfeld main\
    \ screen, showing foods from our foods.db SQLite database](index-296_1.jpg)\n\n\
    **Tip** If you want to watch the previous SQLite API calls step through their\
    \ various tasks, set some breakpoints in the `readFoodsFromDatabase` function\
    \ within `iSeinfeldAppDelegate.m`.\n\nChoose any one of the foods listed, and\
    \ the `FoodView` will kick in, controlled by our `FoodViewController`, to display\
    \ the details of the food in question. In Figure 9-13, we see the details for\
    \ Hot Dog—did you know it was the most popular food shown throughout the history\
    \ of *Seinfeld*?\n\n![Figure 9-13. iSeinfeld FoodView screen, showing the details\
    \ for Hot Dog from the database](index-297_1.jpg)\n\nNow, we’ll be the first to\
    \ admit that our graphic design skills don’t set the world on fire. But the key\
    \ to this application is you can see the data from your SQLite database brought\
    \ to life through devices like the iPad and iPhone. Our journey with iSeinfeld\
    \ is at an end. Go ahead and see how many enhancements you can make to your version\
    \ of the application.\n\n## LEARNING ABOUT CORE DATA\n\nThis is a book about SQLite\
    \ and using it for all kinds of problems. But there are times when you really\
    \ want to abstract away the SQLite C API and deal with some more high-level abstraction\
    \ that worries about all of the SQLite details for you. We’ve intentionally steered\
    \ clear of Core Data—the data management abstraction layer available from iOS\
    \ version 3 onward. We didn’t do this because we wanted to tease you or make your\
    \ life more difficult. Rather, we wanted to show you the heart of working with\
    \ SQLite under iOS, rather than hiding it away.\n\nFor those of you interested\
    \ in more abstract management of your SQLite database access and management under\
    \ iOS, you can check out the Core Data documentation at [http://developer.apple.com/library/ios/](http://developer.apple.com/library/ios/).\n\
    \n## Working with Large SQLite Databases Under iOS\n\nThe eagle-eyed will have\
    \ noticed that the query that derives our food frequency for the iSeinfeld app\
    \ includes the following clause:\n\n```sql\nlimit 50\n```"
