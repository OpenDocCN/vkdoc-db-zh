    **if db.errcode() != SQLITE_OK**


    **print db.errmsg(stmt)**


    **end**


    **In general, error handling is not difficult. The way you handle any error depends
    on what exactly you are trying to do. The easiest way to approach error handling
    is the same as with any other API—read the documentation on the function you are
    using and code defensively.


    Formatting SQL Statements


    Another nice convenience function you may see some extensions support is **sqlite3_mprintf()**.
    It is a variant of the standard C library **sprintf()**. It has special substitutions
    that are specific to SQL that can be very handy. These substitutions are denoted
    **%q** and **%Q**, and they escape SQL-specific values. **%q** works like **%s**
    in that it substitutes a null-terminated string from the argument list. But it
    also doubles every single-quote character, making your life easier and helping
    guard against SQL injection attacks (see the sidebar “SQL Injection Attacks”).
    Here’s an example:


    **char* before = "Hey, at least %q no pig-man.";**


    **char* after = sqlite3_mprintf(before, "he''s");**


    **The value **after** produced here is **''Hey, at least he''''s no pig-man''**
    . The single quote in *he’s* is doubled, making it acceptable as a string literal
    in a SQL statement. The **%Q** formatting does everything **%q** does, but it
    additionally encloses the resulting string in single quotes. Furthermore, if the
    argument for


    **%Q** is a **NULL** pointer (in C), it produces the string **NULL** without single
    quotes. For more information, see the **sqlite3_mprintf()** documentation in the
    C API reference in Appendix B.


    **SQL INJECTION ATTACKS**


    If your application relies on any user input with which to construct SQL statements,
    you could be vulnerable to a SQL injection attack. If you are not careful to filter
    user input, it could be possible for someone to craft input that could alter the
    SQL statement, injecting a new SQL statement into the string.


    For example, say your program uses user input to fill in the value of the following
    SQL statement: **select * from foods where name=''%s'';**


    You replace the **%s** with whatever the user supplies. If users have any knowledge
    of your database, they could provide input that can dramatically alter the SQL
    statement. For example, say the user were to provide the following string value
    for the **name** input:


    **nothing'' limit 0; select name from sqlite_master where name=''%**


    CHAPTER 5 ■ SQLITE DESIGN AND CONCEPTS


    After substituting the user’s input into your SQL statement, the new statement
    turns into two statements: **select * from foods where name=''nothing'' limit
    0; select name from**


    **sqlite_master where name=''%'';**


    The first statement will return nothing, and the second will return the names
    of all objects in your database. Granted, the odds of this happening require quite
    a bit of knowledge on the attacker’s part, but it is nevertheless possible. Some
    major (commercial) web applications have been known to keep SQL


    statements embedded in their JavaScript, which can provide plenty of hints about
    the database being used. In the previous example, all a malicious user has to
    do now is insert **drop table** statements for every table found in **sqlite_master**,
    and you could find yourself fumbling through backups.


    Operational Control


    The API includes a variety of commands that allow you to monitor, control, or
    generally limit what can happen in a database. SQLite implements them in the form
    of filters or callback functions that you can register to be called for specific
    events. There are three “hook” functions: **sqlite3_commit_hook()**, which monitors
    transaction commits on a connection; **sqlite3_rollback_hook()**, which monitors
    rollbacks; and **sqlite3_update_hook()**, which monitors changes to rows from
    **insert**, **update**, and **delete** operations.


    ■ **Note** The forthcoming release of SQLite 3.7 will include many new features,
    one of which is the Write Ahead Log (WAL). With this, a further type of hook named
    **wal_hook()** will be implemented. This is a little different to the hooks discussed
    here. More details on WAL will be covered in Chapter 11.


    These hooks are called at runtime—while a command is executed. Each hook allows
    you to register a callback function on a connection-by-connection basis and lets
    you provide some kind of application-specific data to be passed to the callback
    as well. The general use of operational control functions is as follows:


    **def commit_hook(cnx)**


    **log(''Attempted commit on connection %x'', cnx)**


    **return -1**


    **end**


    **db = open(''foods.db'')**


    **db.set_commit_hook(rollback_hook, cnx)**


    **db.exec("begin; delete from episodes; rollback")**


    **db.close()**


    **A hook’s return value has the power to alter the event in specific ways, depending
    on the hook. In this example, because the commit hook returns a nonzero value,
    the commit will be rolled back.**


    **Additionally, the API provides a very powerful compile time hook called **sqlite3_set_authorizer()**.


    This function provides you with fine-grained control over almost everything that
    happens in the


    database as well as the ability to limit both access and modification on a database,
    table, and column basis. This function is covered in detail in Chapter 6.


    CHAPTER 5 ■ SQLITE DESIGN AND CONCEPTS


    Using Threads


    SQLite has a number of functions for using it in a multithreaded environment.
    With version 3.3.1, SQLite introduced a unique operational mode called *shared
    cache mode*, which is designed for multithreaded embedded servers. This model
    provides a way for a single thread to host multiple connections that share a common
    page cache, thus lowering the overall memory footprint of the server. It also
    employs a different concurrency model. Included with this feature are various
    functions for managing memory and fine-tuning the server. This operational mode
    is explained further later in the section “Shared Cache Mode” and in full detail
    in Chapter 6.


    The Extension API


    The extension API in the SQLite C API offers support for user-defined functions,
    aggregates, and collations. A user-defined function is a SQL function that maps
    to some handler function that you implement in C or another language. When using
    the C API, you implement this handler in C or C++. In language extensions, you
    implement the handler in the same language as the extension.'
  trans: "\n# 第五章 ■ SQLITE 设计与概念\n\n之前的例子为了说明查询处理的基本部分而进行了极大的简化。在实际应用中，你总是需要考虑出错的可能性。到目前为止你见过的几乎每个函数都可能遇到某种错误。你需要准备好处理的常见错误代码包括\
    \ `SQLITE_ERROR` 和 `SQLITE_BUSY`。后者错误代码指的是连接无法获取锁时出现的繁忙状态。繁忙状态将在“事务”一节中处理，而模式错误则在第六章详细讨论。\n\
    \n关于一般错误，API 通过 `sqlite3_errcode()` 函数提供最近调用函数的返回码。你可以使用 `sqlite3_errmsg()` 函数获取更具体的错误信息，该函数提供最近错误的文本描述。大多数语言扩展都以某种方式支持此功能。\n\
    \n考虑到这一点，前一个示例中的每个调用都应该使用类似以下代码检查并报告适当的错误：\n\n```\n# 检查并报告错误\nif db.errcode()\
    \ != SQLITE_OK\n    print db.errmsg(stmt)\nend\n```\n\n一般来说，错误处理并不困难。处理任何错误的方式取决于你具体想要做什么。处理错误的最简单方法与其他任何\
    \ API 相同——阅读你所用函数的文档并进行防御性编码。\n\n## 格式化 SQL 语句\n\n你可能会看到一些扩展支持的另一个方便的便利函数是 `sqlite3_mprintf()`。它是标准\
    \ C 库 `sprintf()` 的一个变体。它具有特定于 SQL 的特殊替换符，这些替换符可能非常方便。这些替换符用 `%q` 和 `%Q` 表示，它们会转义特定于\
    \ SQL 的值。`%q` 的工作方式类似于 `%s`，因为它从参数列表中替换一个以 null 结尾的字符串。但它还会将每个单引号字符加倍，让你的生活更轻松，并帮助防范\
    \ SQL 注入攻击（请参阅侧栏“SQL 注入攻击”）。这是一个例子：\n\n```\nchar* before = \"Hey, at least %q\
    \ no pig-man.\";\nchar* after = sqlite3_mprintf(before, \"he's\");\n```\n\n这里产生的\
    \ `after` 值是 `'Hey, at least he''s no pig-man'`。*he's* 中的单引号被加倍，使其可以作为 SQL 语句中的字符串字面量接受。`%Q`\
    \ 格式化执行 `%q` 所做的所有操作，但它还会将结果字符串用单引号括起来。此外，如果 `%Q` 的参数是 `NULL` 指针（在 C 中），它会生成不带单引号的字符串\
    \ `NULL`。更多信息，请参阅附录 B 的 C API 参考中的 `sqlite3_mprintf()` 文档。\n\n## SQL 注入攻击\n\n\
    如果你的应用程序依赖任何用户输入来构建 SQL 语句，则可能容易受到 SQL 注入攻击。如果你不仔细过滤用户输入，有人可能会构造能够更改 SQL 语句的输入，将新的\
    \ SQL 语句注入到字符串中。\n\n例如，假设你的程序使用用户输入来填充以下 SQL 语句的值：`select * from foods where name='%s';`\n\
    \n你将 `%s` 替换为用户提供的任何内容。如果用户了解你的数据库，他们可以提供能够显著改变 SQL 语句的输入。例如，假设用户为 `name` 输入提供以下字符串值：\n\
    \n`nothing' limit 0; select name from sqlite_master where name='%`\n\n将用户的输入替换到你的\
    \ SQL 语句后，新语句变成了两个语句：`select * from foods where name='nothing' limit 0; select\
    \ name from sqlite_master where name='%';`\n\n第一个语句将不返回任何内容，第二个语句将返回数据库中所有对象的名称。诚然，发生这种情况的可能性需要攻击者掌握相当多的知识，但这仍然是可能的。已知一些主要的（商业）Web\
    \ 应用程序将 SQL 语句嵌入其 JavaScript 中，这可以提供大量关于所使用数据库的提示。在前面的示例中，恶意用户现在只需为 `sqlite_master`\
    \ 中找到的每个表插入 `drop table` 语句，你可能就会发现自己忙于翻查备份。\n\n## 操作控制\n\nAPI 包含各种命令，允许你监视、控制或通常限制数据库中可能发生的操作。SQLite\
    \ 以过滤器或回调函数的形式实现它们，你可以注册这些函数以在特定事件发生时被调用。有三个“钩子”函数：`sqlite3_commit_hook()`，用于监视连接上的事务提交；`sqlite3_rollback_hook()`，用于监视回滚；以及\
    \ `sqlite3_update_hook()`，用于监视 `insert`、`update` 和 `delete` 操作对行的更改。\n\n**注意**\
    \ 即将发布的 SQLite 3.7 将包含许多新功能，其中之一是预写式日志（WAL）。借此，将实现一种名为 `wal_hook()` 的进一步类型的钩子。这与这里讨论的钩子有点不同。关于\
    \ WAL 的更多细节将在第 11 章介绍。\n\n这些钩子在运行时——即命令执行时被调用。每个钩子允许你基于每个连接注册一个回调函数，并让你提供某种特定于应用程序的数据，该数据也会传递给回调。操作控制函数的一般用法如下：\n\
    \n```\ndef commit_hook(cnx)\n    log('Attempted commit on connection %x', cnx)\n\
    \    return -1\nend\n\ndb = open('foods.db')\ndb.set_commit_hook(rollback_hook,\
    \ cnx)\ndb.exec(\"begin; delete from episodes; rollback\")\ndb.close()\n```\n\n\
    钩子的返回值有能力以特定方式更改事件，具体取决于钩子。在此示例中，由于提交钩子返回非零值，提交将被回滚。\n\n此外，API 提供了一个非常强大的编译时钩子，称为\
    \ `sqlite3_set_authorizer()`。此函数为你提供了对数据库中几乎所有发生的事情的细粒度控制，以及根据数据库、表和列来限制访问和修改的能力。此函数在第\
    \ 6 章中有详细说明。\n\n## 使用线程\n\nSQLite 提供了许多用于在多线程环境中使用它的函数。从 3.3.1 版开始，SQLite 引入了一种独特的操作模式，称为\
    \ *共享缓存模式*，专为多线程嵌入式服务器设计。此模型提供了一种方式，让单个线程可以托管多个共享公共页面缓存的连接，从而降低服务器的总体内存占用。它还采用了不同的并发模型。此功能附带了各种用于管理和微调服务器的函数。此操作模式将在后面的“共享缓存模式”一节中进一步解释，并在第\
    \ 6 章中详细说明。\n\n## 扩展 API\n\nSQLite C API 中的扩展 API 提供了对用户定义函数、聚合和排序规则的支持。用户定义函数是一个\
    \ SQL 函数，它映射到你用 C 或其他语言实现的某个处理函数。使用 C API 时，你在 C 或 C++ 中实现此处理程序。在语言扩展中，你用与扩展相同的语言实现处理程序。\n"
- fmt: "User-defined extensions must be registered on a connection-by-connection basis\
    \ as they are stored in program memory. That is, they are not stored in the database,\
    \ like stored procedures in larger relational database systems. They are stored\
    \ in your program. When your program or script starts up, it is responsible for\
    \ registering the desired user-defined extensions for each connection that it\
    \ intends to use them.\n\n## Creating User-Defined Functions\n\nImplementing a\
    \ user-defined function is a two-step process. First, you write the handler. The\
    \ handler does something that you want to perform from SQL. Next, you register\
    \ the handler, providing its SQL name, its number of arguments, and a pointer\
    \ (or reference) to the handler.\n\nFor example, say you wanted to create a special\
    \ SQL function called `hello_newman()`, which returns the text `'Hello Jerry'`.\
    \ In the SQLite C API, you would first create a C function to implement this,\
    \ such as the following:\n\n```c\nvoid hello_newman(sqlite3_context* ctx, int\
    \ nargs, sqlite3_value** values)\n{\n    /* Create Newman's reply */\n    const\
    \ char *msg = \"Hello Jerry\";\n    /* Set the return value.*/\n    sqlite3_result_text(ctx,\
    \ msg, strlen(msg), SQLITE_STATIC);\n}\n```\n\nDon’t worry if you don’t know C\
    \ or the C API. This handler just returns `'Hello Jerry'`. Next, to actually use\
    \ it, you register this handler using the `sqlite3_create_function()` (or the\
    \ equivalent function in your language):\n\n```c\nsqlite3_create_function(db,\
    \ \"hello_newman\", 0, hello_newman);\n```\n\nThe first argument (`db`) is the\
    \ database connection. The second argument is the name of the function as it will\
    \ appear in SQL, and the third argument means that the function takes zero arguments.\
    \ (If you provide -1, then it means that the function accepts a variable number\
    \ of arguments.) The last argument is a pointer to the `hello_newman()` C function,\
    \ which will be called when the SQL function is called.\n\nOnce registered, SQLite\
    \ knows that when it encounters the SQL function `hello_newman()`, it needs to\
    \ call the C function `hello_newman()` to obtain the result. Now, you can execute\
    \ `select hello_newman()` within your program, and it will return a single row\
    \ with one column containing the text `'Hello Jerry'`.\n\nAs mentioned in Chapter\
    \ 4, user-defined functions are a handy way to implement specialized domain constraints\
    \ by embedding them in `check` constraints.\n\n## Creating User-Defined Aggregates\n\
    \nAggregate functions are functions that are applied to all records in a result\
    \ set and compute some kind of aggregate value from them. `sum()`, `count()`,\
    \ and `avg()` are examples of standard SQL aggregate functions in SQLite.\n\n\
    Implementing user-defined aggregates is a three-step process in which you register\
    \ the aggregate, implement a step function to be called for each record in the\
    \ result set, and implement a finalize function to be called after record processing.\
    \ The `finalize` function allows you to compute the final aggregate value and\
    \ do any necessary cleanup.\n\nThe following is an example of implementing a simple\
    \ `SUM()` aggregate called `pysum` in one of the SQLite Python extensions:\n\n\
    ```python\nconnection=apsw.Connection(\"foods.db\")\ndef step(context, *args):\n\
    \    context['value'] += args[0]\ndef finalize(context):\n    return context['value']\n\
    def pysum():\n    return ({'value' : 0}, step, finalize)\nconnection.createaggregatefunction(\"\
    pysum\", pysum)\nc = connection.cursor()\nprint c.execute(\"select pysum(id) from\
    \ foods\").next()[0]\n```\n\nThe `createaggregatefunction()` function registers\
    \ the aggregate, passing in the `step()` function and the `finalize` function.\
    \ SQLite passes `step()` a context, which it uses to store the intermediate value\
    \ between calls to `step()`. In this case, it is the running sum. SQLite calls\
    \ `finalize()` after it has processed the last record. Here, `finalize()` just\
    \ returns the aggregated sum. SQLite automatically takes care of cleaning up the\
    \ context.\n\n## Creating User-Defined Collations\n\nCollations define how string\
    \ values are compared. User-defined collations therefore provide a way to create\
    \ different text comparison and sorting methods. This is done in the API by the\
    \ `sqlite3_create_collation()` function. SQLite provides three default collations:\
    \ `BINARY`, `NOCASE`, and `RTRIM`. `BINARY` compares string values using the C\
    \ function `memcmp()` (which for all intents and purposes is case sensitive).\
    \ `NOCASE` is just the opposite—its sorting is case insensitive. The `RTRIM` collation\
    \ works like `BINARY` except that it ignores trailing spaces.\n\nUser-defined\
    \ collations are especially helpful for locales that are not well served by the\
    \ default `BINARY` collation or those that need support for UTF-16. They can also\
    \ be helpful in specific applications such as sorting date formats that don’t\
    \ lend themselves to both lexicographical and chronological order.\n\nChapter\
    \ 7 illustrates implementing a user-defined collation to sort Oracle dates natively\
    \ in SQLite.\n\n## Transactions\n\nBy now you should have a picture of how the\
    \ API is laid out. You’ve seen different ways to execute SQL commands along with\
    \ some helpful utility functions. Executing SQL commands, however, involves more\
    \ than just knowing what’s in the API. Transactions and locks are closely intertwined\
    \ with query processing. Queries are always performed within transactions, transactions\
    \ involve locks, and locks can cause problems if not managed properly. You can\
    \ control both the type and duration of locks by how you use SQL and the way you\
    \ write code.\n\nChapter 4 illustrated a specific scenario where deadlocks can\
    \ arise just by the way that two connections manage transactions through SQL alone.\
    \ As a programmer, you will have another variable to juggle—code—which can contain\
    \ multiple connections in multiple states with multiple statement handles on multiple\
    \ tables at any given time. All it takes is a single statement handle, and your\
    \ code may be holding an `EXCLUSIVE` lock without you even realizing it, preventing\
    \ other connections from getting anything done.\n\nThat is why it is critical\
    \ that you have good grasp of how both transactions and locks work and how they\
    \ relate to the various API functions used to perform queries. Ideally, you should\
    \ be able to look at the code you write and tell what transaction states it will\
    \ be in or at least be able to spot potential problems.\n\nIn this section, we\
    \ will explore the mechanics behind transactions and locks and in the next section\
    \ observe them at work in actual code.\n\n### Transaction Life Cycles\n\nThere\
    \ are a couple of things to consider with code and transactions. First there is\
    \ the issue of knowing which objects run under which transactions. Next there\
    \ is the question of duration—when does a transaction start and when does it end,\
    \ and at what point does it start to affect other connections? The first question\
    \ relates directly to the API. The second relates to SQL in general and SQLite’s\
    \ implementation in particular.\n\nAs you know, multiple statement handles can\
    \ be allocated from a single connection. As shown in Figure 5-2, each connection\
    \ has exactly one B-tree and one pager object associated with it per database.\
    \ The pager plays a bigger role than the connection in this discussion because\
    \ it manages transactions, locks, the memory cache, and crash recovery—all of\
    \ which will be covered in the next few sections. You could just as easily say\
    \ that the connection object handles all of this, but in reality it is the pager\
    \ within it.\n\nThe important thing to remember is that when you write to the\
    \ database, you do so with one connection, one transaction at a time. Thus, all\
    \ statement objects run within the single transaction context of the connections\
    \ from which they are derived. This answers the first question."
