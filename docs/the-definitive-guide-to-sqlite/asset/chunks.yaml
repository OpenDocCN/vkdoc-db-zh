- fmt: "## SQL for SQLite\n\n**创建表的SQL语句如下：**\n\n```sql\nCREATE TABLE foods (\n  \
    \  id INTEGER PRIMARY KEY,\n    name TEXT\n);\n\nCREATE TABLE foods_episodes (\n\
    \    food_id INTEGER,\n    episode_id INTEGER\n);\n```\n\n主表是 `foods`。`foods`\
    \ 表中的每一行对应一个独特的食物项，其名称存储在 `name` 属性中。`type_id` 属性引用 `food_types` 表，该表存储各种食物分类（例如，烘焙食品、饮料或垃圾食品）。最后，`foods_episodes`\
    \ 表将 `foods` 表中的食物与 `episodes` 表中的剧集关联起来。\n\n## Installation\n\n本书附带的示例压缩文件中包含了食物数据库。你可以在\
    \ Apress 网站 ([www.apress.com](http://www.apress.com)) 的 Source Code 部分获取。要创建数据库，首先在解压后的压缩文件根目录中找到\
    \ `foods.sql` 文件。\n\n要从命令行从头创建一个新数据库，请导航到示例目录，并运行以下命令：\n\n```bash\nsqlite3 foods.db\
    \ < foods.sql\n```\n\n这将创建一个名为 `foods.db` 的数据库文件。如果你不熟悉如何使用 SQLite 命令行程序，请参考第2章。\n\
    \n## Running the Examples\n\n为方便起见，本章中的所有 SQL 示例都包含在示例压缩文件根目录下的 `sql.sql` 文件中。因此，你无需手动输入，只需打开该文件并找到你想尝试的\
    \ SQL 即可。\n\n运行本章中较长查询的一个便捷方法是，将它们复制到你喜爱的编辑器中并保存为一个单独的文件，然后你可以从命令行运行该文件。例如，将一个长查询复制到\
    \ `test.sql` 中进行尝试。你只需使用与之前创建数据库相同的方法来运行它：\n\n```bash\nsqlite3 foods.db < test.sql\n\
    ```\n\n结果将打印到屏幕上。这也使得在不重新输入或在 SQLite shell 内编辑的情况下，更容易地试验这些查询。你只需在编辑器中进行更改，保存文件，然后重新运行命令即可。\n\
    \n为了获得最佳的可读性，你可能希望在文件的开头添加以下命令：\n\n```bash\n.echo on\n.mode column\n.headers on\n\
    .nullvalue NULL\n```\n\n这使得命令行程序能够：1) 在执行时回显 SQL，2) 以列模式打印结果，3) 包含列标题，以及 4) 将空值打印为\
    \ `NULL`。本章中所有示例的输出都使用这些特定设置进行格式化。你可能还想为各种示例设置的另一个选项是 `.width` 选项，它设置输出的各自列宽。这些设置因示例而异。\n\
    \n为了更好的可读性，示例以两种不同的格式呈现。对于短查询，我们将展示 SQL 及其输出，就像在 SQLite shell 中显示的那样。例如：\n\n```sql\n\
    sqlite> SELECT *\n   ...> FROM foods\n   ...> WHERE name='JujyFruit'\n   ...>\
    \ AND type_id=9;\n\nid          type_id     name\n----------  ----------  ----------\n\
    244         9           JujyFruit\n```\n\n有时，如前面的示例，为了在印刷页面上提高可读性，我们会在命令及其输出之间添加一个额外的空行。对于较长的查询，我们仅以代码格式显示\
    \ SQL，并通过灰线与结果分隔，如下例所示：\n\n```sql\nSELECT f.name name, types.name type\nFROM foods\
    \ f\nINNER JOIN (\n    SELECT *\n    FROM food_types\n    WHERE id=6) types\n\
    ON f.type_id=types.id;\n\nname                       type\n-------------------------\
    \  -----\nGeneric (as a meal)        Dip\nGood Dip                   Dip\nGuacamole\
    \ Dip              Dip\nHummus                     Dip\n```\n\n## Syntax\n\nSQL\
    \ 的声明性语法读起来很像自然语言。语句以祈使语气表达，以描述动作的动词开头。其后是主语和谓语，如图 3-2 所示。\n\n```sql\nSELECT id\
    \ FROM foods WHERE name = 'JujyFruit';\n```\n\n动词 主语 谓语\n\n*图 3-2. 通用 SQL 语法结构*"
