    Bread (with nuts)\nButterfingers\nCarrot Cake\nChips Ahoy Cookies\nChocolate Bobka\n\
    \n查询编译和执行的第一步是在游标的`execute()`方法中一起完成的。它调用`sqlite3_prepare()`，然后是`sqlite3_step()`。对于修改数据而非返回结果的查询，这会完成查询（除了最终化语句句柄）。对于`select`语句，它会获取结果的第一行。`close()`方法最终化语句句柄。\n\
    \nPySQLite 2 支持迭代器式的结果集，类似于其他 Python 数据库包装器。例如，清单 8-6 可以重写为清单 8-7 所示。\n\n*清单 8-7.\
    \ 为查询使用 Python 化的迭代器*\n\n```python\nfrom pysqlite2 import dbapi2 as sqlite3\n\n\
    con = sqlite3.connect(\"foods.db\")\ncur = con.cursor()\ncur.execute('select *\
    \ from foods limit 10')\n\nfor row in cur:\n    print row[2]\n```\n\n## 参数绑定\n\
    \nPySQLite 支持按位置和按名称进行参数绑定。这也可以使用游标的`execute()`方法完成（我们在清单 8-6 中介绍过）。编译、绑定和执行的第一步都在对`execute()`的一次调用中完成。你通过向`execute()`传递一个元组作为第二个参数来指定位置参数。你通过传递一个字典而不是元组来指定命名参数。清单\
    \ 8-8 说明了两种形式的参数绑定。\n\n*清单 8-8. PySQLite 中的参数绑定*\n\n```python\nfrom pysqlite2\
    \ import dbapi2 as sqlite3\n\ncon = sqlite3.connect(\"foods.db\")\ncur = con.cursor()\n\
