    **HELP FOR INTERACTIVE PROGRAMS**


    SQLite provides two functions that make it easier to work with interactive programs.
    The first is **sqlite3_interrupt()**, which is declared as follows:


    **void sqlite3_interrupt(sqlite3* /* connection handle */);**


    **sqlite3_interrupt()** causes any pending database operation on the given connection
    to abort and return at its earliest opportunity. This routine is design to be
    called in response to a user interrupt action such as clicking a Cancel button
    in a graphical application or pressing Ctrl+C in a command-line program.


    It is intended to make it easier to accommodate cases where the user wants a long
    query operation to halt immediately. For a command-line program, you might put
    this function in a signal handler or an event handler in a graphical application.


    Another function that can be useful for interactive programs is **sqlite3_progress_handler()**.
    It is somewhat related in functionality to the **sqlite3_interrupt()** function,
    but with a few twists. It is declared as follows:


    **void sqlite3_progress_handler( sqlite3*, /* connection handle */**


    **int frq, /* frequency of callback */**


    **int(*)(void*), /* callback function */**


    **void*); /* application data */**


    This function installs a callback function that will be invoked during calls to
    **sqlite3_exec()**, **sqlite3_step()**, and **sqlite3_get_table()**. The intent
    of this function is to give applications a way to provide feedback to the user
    during long-running queries.


    The second argument (**frq**) specifies the frequency of the callback in terms
    of VDBE instructions. That is, the progress callback (provided in the third argument)
    will be called for every **frq** VDBE instruction performed in query execution.
    If a call to **sqlite3_exec()**, **sqlite3_step()**, or **sqlite3_get_table()**
    requires less than **frq** instructions to be executed, then the progress callback
    will not be invoked. The fourth argument is a pointer to application-specific
    data, which is passed back to the progress handler (as its one and only argument).
    If **NULL** is provided for the callback function argument, then the currently
    installed progress handler (if any) is disabled.


    CHAPTER 6 ■ THE CORE C API'
