- fmt: 'SQLite was designed specifically with portability in mind. It compiles and
    runs on Windows, Linux, BSD, Mac OS X, and commercial Unix systems such as Solaris,
    HP-UX, and AIX, as well as many embedded platforms such as QNX, VxWorks, Symbian,
    Palm OS, and Windows CE. It works seamlessly on 32- and 64-bit architectures with
    both big- and little-endian byte orders. Portability doesn’t stop with the software
    either: SQLite’s database files are as portable as its code. The database file
    format is binary compatible across all supported operating systems, hardware architectures,
    and byte orders. You can create a SQLite database on a Linux workstation and use
    it on a Mac or Windows machine, an iPhone, or other device, without any conversion
    or modification. Furthermore, SQLite databases can hold up to 2 terabytes of data
    (limited only by the operating system’s maximum file size) and natively support
    both UTF-8 and UTF-16 encoding.


    # CHAPTER 1 ■ INTRODUCING SQLITE


    ## Compactness


    SQLite was designed to be lightweight and self-contained; one header file, one
    library, and you’re relational—no external database server required. Everything
    packs into less than half a megabyte, which is smaller than many of the web pages
    you’ll visit on any given day.


    SQLite databases are ordinary operating system files. Regardless of your system,
    all objects in your SQLite database—tables, triggers, schema, indexes, and views—are
    contained in a single operating system file. SQLite uses variable-length records
    wherever possible, allocating only the minimum amount of data needed to hold each
    field. A 2-byte field sitting in a `varchar(100)` column takes up only 3 bytes
    of space, not 100 (the extra byte is used to record its type information).


    ## Simplicity


    As a programming library, SQLite’s API is one of the simplest and easiest to use.
    The API is both well documented and intuitive. It is designed to help you customize
    SQLite in many ways, such as implementing your own custom SQL functions in C.
    The open source community also has a created a vast number of language and library
    interfaces with which to use SQLite. There are extensions for Perl, Python, Ruby,
    Tcl/Tk, Java, PHP, Visual Basic, ODBC, Delphi, C#, VB .NET, Smalltalk, Ada, Objective
    C, Eiffel, Rexx, Lisp, Scheme, Lua, Pike, Objective Camel, Qt, WxWindows, REALBASIC,
    and others. You can find an exhaustive list on the SQLite wiki: `www.sqlite.org/cvstrac/wiki?p=SqliteWrappers`.


    SQLite’s modular design includes many innovative ideas that enable it to be full
    featured and extensible while at the same time retaining a great degree of simplicity
    throughout its code base. Each module is a specialized, independent system that
    performs a specific task. This modularity makes it much easier to develop each
    system independently and to debug queries as they pass from one module to the
    next—from compilation and planning to execution and materialization. The end result
    is that there is a crisp, well-defined separation between the front end (SQL compiler)
    and back end (storage system), allowing the two to be coded independently of each
    other. This design makes it easier to add new features to the database engine,
    is faster to debug, and results in better overall reliability.


    ## Flexibility


    Several factors work together to make SQLite a very flexible database. As an embedded
    database, it offers the best of both worlds: the power and flexibility of a relational
    database front end, with the simplicity and compactness of a B-tree back end.
    With it, there are no large database servers to configure, no networking or connectivity
    problems to worry about, no platform limitations, and no license fees or royalties
    to pay. Rather, you get simple SQL support dropped right into your application.


    ## Liberal Licensing


    All of SQLite’s code is in the public domain. There is no license. No claim of
    copyright is made on any part of the core source code. All contributors to this
    code are required to sign affidavits specifically disavowing any copyright interest
    in contributed code. Thus, there are no legal restrictions on how you may use
    the source code in any form. You can modify, incorporate, distribute, sell, and
    use the code for any purpose—commercial or otherwise—without any royalty fees
    or restrictions.


    ## Reliability


    The SQLite source code is more than just free; it also happens to be well written.
    SQLite’s code base consists of about 70,000 lines of standard ANSI C that are
    clean, modular, and well commented. The code base is designed to be approachable,
    easy to understand, easy to customize, and generally very accessible. It is easily
    within the ability of a competent C programmer to follow any part of SQLite or
    the whole of it with sufficient time and study.


    Additionally, SQLite’s code offers a full-featured API specifically for customizing
    and extending SQLite through the addition of user-defined functions, aggregates,
    and collating sequences along with support for operational security.


    While SQLite’s modular design significantly contributes to its overall reliability,
    its source code is also well tested. Whereas the core software (library and utilities)
    consists of about 70,000 lines of code, the distribution includes an extensive
    test suite consisting of more than 45 million lines of test code, which as of
    July 2009 covers 100 percent of the core code. Ask any developer how hard it is
    to be that comprehensive when testing a nontrivial amount of code, and you can
    see why people have rock-solid confidence in the reliability of SQLite.


    ## Convenience


    SQLite also has a number of unique features that provide a great degree of convenience.
    These include dynamic typing, conflict resolution, and the ability to “attach”
    multiple databases to a single session.


    SQLite’s dynamic typing is somewhat akin to that found in scripting languages
    (e.g., `duck typing` in Ruby). Specifically, the type of a variable is determined
    by its value, not by a declaration as employed in statically typed languages.
    Most database systems restrict a field’s value to the type declared in its respective
    column. For example, each field in an integer column can hold only integers or
    possibly NULL. In SQLite, while a column can have a declared type, fields are
    free to deviate from them, just as a variable in a scripting language can be reassigned
    a value with a different type. This can be especially helpful for prototyping,
    since SQLite does not force you to explicitly change a column’s type. You need
    only change how your program stores information in that column rather than continually
    having to update the schema and reload your data.


    Conflict resolution is another great feature. It can make writing SQL, as easy
    as it is, even easier. This feature is built into many SQL operations and can
    be made to perform what can be called lazy updates.


    Say you have a record you need to insert, but you are not sure whether one just
    like it already exists in the database. Rather than write a `SELECT` statement
    to look for a match and then recast your `INSERT` to an `UPDATE` if it does, conflict
    resolution lets you say to SQLite, “Here, try to insert this record, and if you
    find one with the same key, just update it with these values instead.” Now you’ve
    gone from having to code three different SQL statements to cover all the bases
    (i.e., `SELECT`, `INSERT`, and possibly `UPDATE`) to just one: `INSERT OR REPLACE`
    (...). Other relational database systems mimic this aspect of conflict resolution
    with `UPSERT` or `MERGE` statements, but SQLite goes one step further. You can
    build conflict resolution into the table definition itself and dispense with the
    need to ever specify it again on future `INSERT` statements.'
