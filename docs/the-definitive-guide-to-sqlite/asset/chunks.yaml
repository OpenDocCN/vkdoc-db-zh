    output: stdout

    separator: "|"

    width:

    ```


    `.read` 命令是导入由 `.dump` 命令创建的文件的方法。使用先前创建的 `file.sql` 作为备份，我们可以删除现有的数据库对象（`test`
    表和 `schema` 视图）并重新导入，如下所示：


    ```

    sqlite> drop table test;

    sqlite> drop view schema;

    sqlite> .read file.sql

    ```


    ## 格式化


    Shell 提供了许多格式化选项来帮助你，使你的结果和输出整洁有序。最简单的是 `.echo`，它在发出命令后回显最后运行的命令，以及 `.headers`，当设置为
    `on` 时，它会在查询结果中包含列名。可以用 `.nullvalue` 设置 `NULL` 的文本表示。例如，如果你希望 `NULL` 显示为文本字符串
    `NULL`，只需发出命令 `.nullvalue NULL`。默认情况下，这个显示值是一个空字符串。


    可以使用 `.prompt [值]` 更改 Shell 提示符：


    ```

    sqlite> .prompt ''sqlite3> ''

    sqlite3>

    ```


    可以使用 `.mode` 命令以多种方式格式化结果数据。当前的选项有 `csv`、`column`、`html`、`insert`、`line`、`list`、`tabs`
    和 `tcl`，每种方式在不同情况下都很有用。默认是 `.list`。例如，列表模式使用默认分隔符分隔列来显示结果。因此，如果你想以 CSV 格式转储一个表，可以执行以下操作：


    ```

    sqlite3> .output file.csv

    sqlite3> .separator ,

    sqlite3> select * from test;

    sqlite3> .output stdout

    ```


    `file.csv` 文件的内容现在如下所示。


    ```

    1,eenie

    2,meenie

    3,miny

    4,mo

    ```


    实际上，由于 Shell 中已经定义了 CSV 模式，在这个特定例子中使用它同样简单：


    ```

    sqlite3> .output file.csv

    sqlite3> .mode csv

    sqlite3> select * from test;

    sqlite3> .output stdout

    ```


    得到的结果是相同的。区别在于，CSV 模式会用双引号包裹字段值，而列表模式（默认）则不会。


    ## 导出分隔数据


    结合前面关于导出、导入和格式化数据的三个部分，我们现在有一种简单的方法来以分隔形式导出和导入数据。例如，要仅将 `test` 表中 `value` 字段以字母
    `m` 开头的行以逗号分隔值的形式导出到名为 `test.csv` 的文件，请执行以下操作：


    ```

    sqlite> .output text.csv

    sqlite> .separator ,

    sqlite> select * from test where value like ''m%'';

    sqlite> .output stdout

    ```


    如果你想将此 CSV 数据导入到一个结构与 `test` 表相同的相似表（称之为 `test2`）中，请执行以下操作：


    ```

    sqlite> create table test2(id integer primary key, value text);

    sqlite> .import text.csv test2

    ```


    因此，CLP 使得向数据库导入和从数据库导出文本分隔数据变得容易。


    ## 执行无人值守维护


    到目前为止，你已经看到 CLP 以交互方式用于执行任务，例如创建数据库和导出数据。然而，你并不总是想被绑在座位上，一次执行一个 CLP 命令。相反，你可以使用命令模式批量运行
    CLP 命令。然后，你可以使用操作系统的内置调度器来安排这些批处理在你需要的时候运行。


    > **注意** 你可以从命令行交互式地调用 CLP。任何时候你有一系列想要例行调用的命令，使用命令行方法都是有用的。


    实际上有两种方法可以在命令行模式下调用 CLP。第一种是提供一个 SQL 命令，或者也可以是一个 SQLite Shell 命令，例如 `.dump` 和
    `.schema`。任何有效的 SQL 或 SQLite Shell 命令都可以。SQLite 将执行指定的命令，将结果打印到标准输出，然后退出。例如，要从命令行转储
    `test.db` 数据库，请发出以下命令：`sqlite3 test.db .dump`


    为了使其更有用，我们应该将输出重定向到一个文件：


    ```

    sqlite3 test.db .dump > test.sql

    ```


    文件 `test.sql` 现在包含了数据库 `test.db` 的完整的人类可读的 DDL 和 DML 语句集合。类似地，要选择 `test` 表中的所有记录，请执行：


    ```

    sqlite3 test.db "select * from test"

    ```


    在命令行模式下调用 CLP 的第二种方法是将文件作为输入流重定向。例如，要从我们的数据库转储 `test.sql` 创建一个新的数据库 `test2.db`，请执行以下操作：`sqlite3
    test2.db < test.sql`


    CLP 将读取该文件作为标准输入，然后处理并应用其中的所有 SQL 命令到 `test2.db` 数据库文件。


    另一种从 `test.sql` 文件创建数据库的方法是使用 `init` 选项并提供 `test.sql` 作为参数：


    ```

    sqlite3 –init test.sql test3.db

    ```


    CLP 将处理 `test.sql`，创建 `test3.db` 数据库，然后进入 Shell 模式。为什么？因为调用中不包含任何 SQL 命令或输入流。要解决这个问题，你需要提供一个
    SQL 命令或 SQLite Shell 命令。例如：


    ```

    sqlite3 –init test.sql test3.db .exit

    ```


    `.exit` 命令提示 CLP 在命令行模式下运行，并尽可能少做事。总而言之，重定向可能是从命令行处理文件的最简单方法。


    ## 备份数据库


    备份数据库可以通过两种方式完成，具体取决于你期望的备份类型。SQL 转储可能是保留备份的最便携形式。生成它的标准方法是使用 CLP `.dump` 命令，如前一节所示。从命令行，这是这样完成的：


    ```

    sqlite3 test.db .dump > test.sql

    ```


    在 Shell 内部，你可以将输出重定向到外部文件，发出命令，然后将输出恢复到屏幕，如下所示：


    ```

    sqlite> .output file.sql

    sqlite> .dump

    sqlite> .output stdout

    sqlite> .exit

    ```


    同样，导入数据库最容易的方法是提供 SQL 转储作为 CLP 的输入流。'
