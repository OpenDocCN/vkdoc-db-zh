    谓词过滤出 `frequency` 值中包含 *High* 这个词的行。


    在一个 `case` 表达式中，只有一个条件会被执行。如果多个条件都满足，只有第一个会被执行。如果没有条件满足并且没有定义 `else` 条件，`case`
    将返回 `null`。


    大多数关系数据库通过一个名为 `null` 的特殊占位符来支持“未知”或“不可知”的概念。`null` 是缺失信息的占位符，它本身并非一个值。更确切地说，`null`
    是值的缺失：`null` 不是 nothing，`null` 不是 something，`null` 不是 true，`null` 不是 false，`null`
    不是零，`null` 不是空字符串。简而言之，`null` 就是它本身：`null`。并且并非所有人都能就其含义达成一致。你需要学习一些关键的规则和概念，以便掌握在
    SQLite 中使用 `null` 的方法。


    首先，为了在逻辑表达式中容纳 `null`，SQL 使用了一种称为 *三值*（或 *三态*）逻辑的机制，其中 `null` 是真值之一。表 3-2 展示了逻辑
    `and` 和逻辑 `or` 在引入 `null` 后的真值表。


    **表 3-2.** `AND` 和 `OR` 与 `NULL` 的运算结果


    | x | y | x AND y | x OR y |

    | :--- | :--- | :--- | :--- |

    | True | True | True | True |

    | True | False | False | True |

    | True | NULL | NULL | True |

    | NULL | NULL | NULL | NULL |

    | False | False | False | False |

    | False | NULL | False | NULL |


    你可以尝试几个简单的 `select` 语句，亲自看看 `null` 的影响。


    其次，检测 `null` 的存在与否是通过 `is null` 或 `is not null` 操作符完成的。如果你尝试使用任何其他操作符，如等于、大于等等，你会感到震惊，这引出了我们关于
    `null` 的第三条规则。


    第三也是最后一条，永远记住 `null` 不等于任何其他值，甚至不等于另一个 `null`。你无法将 `null` 与一个值进行比较，也没有任何一个 `null`
    比另一个 `null` 更大、更小或以任何方式相关联。这常常让不小心的人措手不及，就像下面的示例语句无法返回任何行一样。


    ```sql

    select *

    from mytable

    where myvalue = null;

    ```


    在 SQLite 中，没有任何东西能等于 `null`，因此这条语句永远不会返回任何数据。既然你已经掌握了基础知识，你会很高兴知道 SQLite 提供了几个额外的函数来处理
    `null`。其中第一个函数是针对我们刚才向你强调的“没有任何东西等于 `NULL`”这一限制的解决方案。从 SQLite v 3.6.19 开始，可以使用
    `is` 操作符来让一个 `NULL` 等于另一个 `NULL`。最基本的形式是，你可以运行一个简单的查询来询问 SQLite `NULL` 是否是 `NULL`：


    ```sqlite

    sqlite> select NULL is NULL;

    1

    ```


    如前所述，除零以外的任何值都意味着“true”，所以 SQLite 很高兴地告诉我们，在这个例子中 `NULL` 确实等同于 `NULL`。但是，请不要过分依赖这一点。SQL
    的三值逻辑可能有些别扭，但它是一个标准，使用 `is` 操作符来绕过它可能会让你在其他系统和编程语言中遇到问题，因为它们期望遵循标准行为。


    `coalesce` 函数是 SQL99 标准的一部分，它接受一个值列表并返回列表中的第一个非 `null` 值。请看下面的例子：


    ```sql

    select coalesce(null, 7, null, 4)

    ```


    在这种情况下，`coalesce` 将返回 7 作为第一个非 `null` 值。这在进行算术运算时也很方便，这样你就可以检测是否返回了 null，然后返回一个有意义的值（比如
