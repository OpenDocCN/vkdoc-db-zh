    possible. If recompilation is impossible (for example, if an object has been dropped
    entirely), the **sqlite3_step()** returns **SQLITE_SCHEMA**. From a locking standpoint,
    the schema change occurs between the time a reader calls **sqlite3_prepare()**
    to compile a statement and calling **sqlite3_step()** to execute it.


    When this happens, the only course of action for you is to handle the change in
    circumstances and start over. Several events can cause **SQLITE_SCHEMA** errors:


    • Detaching databases


    • Modifying or installing user-defined functions or aggregates


    • Modifying or installing user-defined collations


    • Modifying or installing authorization functions


    • Vacuuming the database


    The reason the **SQLITE_SCHEMA** condition exists ultimately relates to the VDBE.
    When a connection changes the schema, other compiled queries may have VDBE code
    that points to database objects that no longer exist or are in a different location
    in the database. Rather than running the risk of a bizarre runtime error later,
    SQLite invalidates all statements that have been compiled but not executed. They
    must be recompiled.


    **TRACING SQL**


    If you are having a hard time figuring out exactly what your program is doing
    with the database, you can track what SQL statements it has executed using **sqlite3_trace()**.
    Its declaration is as follows: **void *sqlite3_trace(sqlite3*, void(*xTrace)(void*,const
    char*), void*);**


    This function is analogous to putting a wiretap on a connection. You can use it
    to generate a log file of all SQL executed on a given connection as well provide
    helpful debugging information. Every SQL statement that is processed is passed
    to the callback function specified in the second argument. SQLite passes the data
    provided in the third argument of **sqlite3_trace()** to the first argument of
    the callback function.


    Operational Control


    The API provides several functions you can use to monitor and/or manage SQL commands
    at compile


    time and runtime. These functions allow you to install callback functions with
    which to monitor and control various database events as they happen.


    Commit Hooks


    The **sqlite3_commit_hook()** function allows you to monitor when transactions
    commit on a given connection. It is declared as follows:


    **178


    CHAPTER 6 ■ THE CORE C API


    **void *sqlite3_commit_hook( sqlite3 *cnx, /* database handle */**


    **int(*xCallback)(void *data), /* callback function */**


    **void *data); /* application data */**


    **This function registers the callback function **xCallback**, which will be invoked
    whenever a transaction commits on the connection given by **cnx**. The third argument
    (**data**) is a pointer to application-specific data, which SQLite passes to the
    callback function. If the callback function returns a nonzero value, then the
    commit is converted into a rollback.


    Passing a **NULL** value in for the callback function effectively disables the
    currently registered callback (if any). Also, only one callback can be registered
    at a time for a given connection. The return value for **sqlite3_commit_hook()**
    is **NULL** unless another callback function was previously registered, in which
    case the previous **data** value is returned.


    Rollback Hooks


    Rollback hooks are similar to commit hooks except that they watch for rollbacks
    for a given connection.


    Rollback hooks are registered with the following function:


    **void *sqlite3_rollback_hook(sqlite3 *cnx, void(*xCallback)(void *data), void
    *data);**


    **This function registers the callback function **xCallback**, which will be invoked
    in the event of a rollback on **cnx**, whether by an explicit **ROLLBACK** command
    or by an implicit error or constraint violation.


    The callback is not invoked if a transaction is automatically rolled back because
    of the database connection being closed. The third argument (data) is a pointer
    to application-specific data, which SQLite passes to the callback function.


    As in **sqlite3_commit_hook()**, each time you call **sqlite3_rollback_hook()**,
    the new callback function you provide will replace any currently registered callback
    function. If a callback function was previously registered, **sqlite3_rollback_hook()**
    returns the previous data argument.


    Update Hooks


    The **sqlite3_update_hook()** is used to monitor all **update**, **insert**, and
    **delete** operations on rows for a given database connection. It has the following
    form:


    **void *sqlite3_update_hook(**


    **sqlite3 *cnx,**


    **void(*)(void *, int, char const*, char const*, sqlite_int64),**


    **void *data);**


    **The first argument of the callback function is a pointer to application-specific
    data, which you provide in the third argument. The callback function has the following
    form:**


    ****void callback ( void * data,**


    **int operation_code,**


    **char const *db_name,**


    **char const *table_name,**


    **sqlite_int64 rowid),**


    **179


