    you are just going to butt heads with the connection that has the **RESERVED**
    lock, and if neither of you backs down, you’ll deadlock.


    ■ **Note** SQLite tries to help with deadlock prevention in this particular scenario
    by ignoring the busy handler of the offending connection. The **SHARED** connection’s
    busy handler will not be invoked if it is preventing a **RESERVED**


    connection from proceeding. However, it is up to the code to get the hint. The
    code can still just repeatedly call **step()** over and over, in which case there
    is nothing more SQLite can do to help.


    Since you know you want to write to the database, then you need to start by issuing
    **begin**


    **IMMEDIATE**. If you get a **SQLITE_BUSY**, then at least you know what state
    you’re in. You know you can safely keep trying without holding up another connection.
    And once you finally do succeed, you know what state you are in then as well—**RESERVED**.
    Now you can use brute force if you have to because you are the one in the right.
    If you start with a **begin exclusive**, on the other hand, then you are assured
    that you won’t have any busy conditions to deal with at all. Just remember that
    in this case you are doing your work in **EXCLUSIVE**, which is not as good for
    concurrency as doing the work in **RESERVED**.


    **LOCKS AND NETWORK FILE SYSTEMS**


    At this point, you should have a good appreciation for what can go wrong when
    a database is shared over a network file system. SQLite handles concurrency by
    placing file locks on the database file. It is very important that these locks
    be both set and released at the right times. SQLite is completely dependent on
    the file system to manage locks correctly for concurrent use. SQLite uses the
    same locking mechanisms regardless of whether it is running on a normal file system
    or network file system. It uses POSIX advisory locks on Unix, Linux, and OS X,
    and the **LockFile()**, **LockFileEx()**, and **UnlockFile()** system calls on
    Windows. These calls are standard system calls and work correctly on normal file
    systems. It is the network file system’s job to emulate a normal file system.
    And unfortunately, this doesn’t always work correctly with some implementations.
    And even if the network file system works correctly, there still other things
    to consider.


    Take NFS, for example. It’s a great network file system. However, many original
    NFS implementations were known to have buggy or in some cases unimplemented locking.
    And with a SQLite database, this can cause serious problems. Without locking,
    two connections can get an **EXCLUSIVE** lock on the same database and write to
    it at the same time, leading to an almost certain database corruption. This is
    not a problem with the NFS protocol in general, but with some implementations
    of it in particular. Thankfully, most modern implementations of NFS have overcome
    these issues, and some implementations—such as


    those from Sun—are now rock-solid.


    NFS can still have issues with locking if one of the clients goes down (taking
    their database lock with it) and does not come back up. For NFSv3, a locked file
    would need administrative intervention to clear it. For NFSv4, there would be
    a timeout period. But how long is the timeout? Thirty seconds? A minute? The real
    issue is not NFS but specific applications of it. Network file systems, even if
    perfectly implemented, are not necessarily going to work exactly like a local
    file system.


    CHAPTER 5 ■ SQLITE DESIGN AND CONCEPTS


    The bottom line is, if you are going to mix concurrency and network file systems,
    there are many issues to consider, even if you are using the best network file
    system out there. It’s not as simple as running on a local file system.


