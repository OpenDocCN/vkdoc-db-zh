    ## 第四章


    ### SQLite 高级 SQL


    你在第三章掌握了 `select` 语句，现在是时候将 SQL 方言的其余部分添加到你的技能中了。本章涵盖 SQLite 实现的剩余 SQL 内容，包括用于修改数据的
    `insert`、`update` 和 `delete` 语句；用于保护数据的约束；以及更高级的主题，如表创建和数据类型。


    ### 修改数据


    与 `select` 相比，用于修改数据的命令相当易于使用和理解。有三种用于修改数据的数据操作语言（DML）命令——`insert`、`update` 和
    `delete`——它们的作用基本如其名称所示。


    ### 插入记录


    使用 `insert` 命令将记录插入表中。`insert` 作用于单个表，既可以一次插入一行，也可以使用 `select` 命令一次插入多行。`insert`
    命令的一般形式如下：


    ```

    insert into table (column_list) values (value_list);

    ```


    变量 `table` 指定要插入的目标表。变量 `column_list` 是一个逗号分隔的列名列表，所有这些列都必须存在于目标表中。变量 `value_list`
    是一个逗号分隔的值列表，对应于 `column_list` 中给出的名称。`value_list` 中的值顺序必须与 `column_list` 中的列顺序相对应。


    #### 插入一行


    例如，使用以下命令向 `foods` 表插入一行：


    ```

    sqlite> insert into foods (name, type_id) values (''Cinnamon Bobka'', 1);

    ```


    此语句插入一行，指定了两个列值。值列表中的第一个值 `''Cinnamon Bobka''` 对应于列列表中的第一列 `name`。同样，值 `1` 对应于
    `type_id`，它在列列表中列第二位。注意 `id` 未被提及。在这种情况下，数据库使用默认值。由于 `id` 被声明为 `integer primary
    key`，它将自动生成并与记录关联（如“主键约束”部分所述）。可以通过简单的 `select` 验证插入的记录，也可以查询为 `id` 使用的值：


    ```

    sqlite> select * from foods where name=''Cinnamon Bobka'';

    ```

    ```

    id          type_id     name

    ----------  ----------  --------------

    413         1           Cinnamon Bobka

    ```


    ```

    sqlite> select max(id) from foods;

    ```

    ```

    MAX(id)

    ----------

    413

    ```


    ```

    sqlite> select last_insert_rowid();

    ```

    ```

    last_insert_rowid()

    -------------------

    413

    ```


    注意，值 `413` 是为 `id` 自动生成的，这是该列中的最大值。因此，SQLite 提供了一个单调递增的值。你可以使用内置的 SQL 函数 `last_insert_rowid()`
    来确认这一点，该函数返回最后自动生成的键值，如示例所示。

