    cascade: Where the parent key is updated, update all child keys to match.


    Where it is deleted, delete all child rows with the key. Pay particular attention
    to


    this option, because cascading deletes can surprise you when you least expect


    them.


    restrict: Where the update or delete of the parent key would result in


    orphaned child keys, prevent (abort) the transaction.


    no action: Take a laid-back approach, and watch changes fly by without


    intervening. Only at the end of the entire statement (or transaction if the


    constraint is deferred) is an error raised.


    Lastly, SQLite supports the **deferrable** clause, which controls whether the
    constraint as defined will be enforced immediately or deferred until the end of
    the transaction.


    Collations


    Collation refers to how text values are compared. Different collations employ
    different comparison methods. For example, one collation might be case insensitive,
    so the strings **''JujyFruit''** and


    **''JUJYFRUIT''** are considered the same. Another collation might be case sensitive,
    in which case the strings would be considered different.


    SQLite has three built-in collations. The default is **binary**, which compares
    text values byte by byte using a specific C function called **memcmp()**. This
    happens to work nicely for many Western languages such as English. **nocase**
    is basically a case-insensitive collation for the 26 ASCII characters used in
    Latin alphabets. Finally there is **reverse**, which is the reverse of the **binary**
    collation. **Reverse** is more for testing (and perhaps illustration) than anything
    else.


    The SQLite C API provides a way to create custom collations. This feature allows
    developers to


    support languages and/or locales that are not well served by the binary collation.
    See Chapter 7 for more information.


    The **collate** keyword defines the collation for a column. For example, the collation
    for


    **contacts.name** is defined as **nocase**, which means that it is case insensitive.
    Thus, if you try to insert another row with a **name** value of **''JERRY''**
    and a **phone** value of **''555-1212''** , it should fail: **sqlite> insert into
    contacts (name,phone) values (''JERRY'',''555-1212'');**


    **SQL error: columns name, phone are not unique**


    **According to **name**’s collation, **''JERRY''** is the same as **''Jerry''**
    , and there is already a row with that value.**


    **Therefore, a new row with **name=''JERRY''** would be a duplicate value. By
    default, collation in SQLite is case sensitive. The previous example would have
    worked had we not defined **nocase** on **name**.


    Storage Classes


    As mentioned earlier, SQLite does not work like other databases when it comes
    to handling data types. It differs in the types it supports and in how they are
    stored, compared, enforced, and assigned. I’ll cover the basics of SQLite storage
    classes next to give you a good working knowledge. In Chapter 11, I will 101


    CHAPTER 4 ■ ADVANCED SQL FOR SQLITE


    address many of the internals of SQLite’s radically different but surprisingly
    flexible approach to data types.


    Internally, SQLite has five primitive data types, which are referred to as *storage
    classes*. The term *storage class* refers to the format in which a value is stored
    on disk. Regardless, it is still synonymous with type, or data type. Table 4-1
    describes the five storage classes.


    *Table 4-1\. SQLite Storage Classes*


    **Name Description**


    **integer**


    Integer values are whole numbers (positive and negative). They can vary in size:
    1, 2, 3, 4, 6,


    or 8 bytes. The maximum integer range (8 bytes) is {-9223372036854775808,-1,0,1,


    9223372036854775807}. SQLite automatically handles the integer sizes based on
    the


    numeric value.


    **real**


    Real values are real numbers with decimal values. SQLite uses 8-byte floats to
    store real


    numbers.


    **text**


    Text is character data. SQLite supports various character encodings, which include
    UTF-8


    and UTF-16 (big and little endian). The maximum string value in SQLite is adjustable
