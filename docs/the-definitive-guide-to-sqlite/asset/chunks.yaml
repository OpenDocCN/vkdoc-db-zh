    \n另一个对交互式程序有用的函数是 `sqlite3_progress_handler()`。它在功能上与 `sqlite3_interrupt()` 有些关联，但有一些不同。声明如下：\n\
    \n```c\nvoid sqlite3_progress_handler(\n  sqlite3*,       /* connection handle\
    \ */\n  int frq,        /* frequency of callback */\n  int(*)(void*),  /* callback\
    \ function */\n  void*           /* application data */\n);\n```\n\n此函数安装一个回调函数，该函数将在调用\
