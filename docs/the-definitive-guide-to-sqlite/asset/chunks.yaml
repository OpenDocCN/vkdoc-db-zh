    an **update**, while **c1** has a **SHARED** lock open. That **SHARED** lock won’t
    be released until **stmt** is finalized after the **while** loop.**


    **Therefore, it is impossible to write to the database within the **while** loop.
    Either the updates will silently fail, or if you have a busy handler, then it
    will only delay the program. The best thing to do here is to use one connection
    for the job and to run it under a single **begin immediate** transaction. The
    new version might be as follows:


    **c1 = open(''foods.db'')**


