  raw: 'The **order by** subquery is run for each row, and the result is associated
    with the given row. You can think of it as an invisible column in the result set,
    which is used to order rows.


    Finally, we have the **from** clause. There may be times when you want to join
    to the results of another query, rather than to a base table. It’s yet another
    job for a subquery:


    **select f.name, types.name from foods f**


    **inner join (select * from food_types where id=6) types**


    **on f.type_id=types.id;**


    **name name**


    **------------------------- -----**


    **Generic (as a meal) Dip**


    **Good Dip Dip**


    **Guacamole Dip Dip**


    **Hummus Dip**


    Notice that the use of a subquery in the **from** clause requires a rename operation.
    In this case, the subquery was named **types**. Subqueries as a source relation
    in the **from** clause are often called *inline* *views* or *derived tables*.


    The thing to remember about subqueries is that they can be used *anywhere* a relational
    expression can be used. A good way to learn how, where, and when to use them is
    to just play around with them and see what you can get away with. There is often
    more than one way to skin a cat in SQL. When you


    understand the big picture, you can make more informed decisions on when a query
    might be rewritten to run more efficiently.


    CHAPTER 3 ■ SQL FOR SQLITE


    Compound Queries


    Compound queries are kind of the inverse of subqueries. A compound query is a
    query that processes the results of multiple queries using three specific relational
    operations: union, intersection, and difference. In SQLite, these are defined
    using the **union**, **intersect**, and **except** keywords, respectively.


    Compound query operations require a few things of their arguments:


    • The relations involved must have the same number of columns.


    • There can be only one **order by** clause, which is at the end of the compound
    query


    and applies to the combined result.


    Furthermore, relations in compound queries are processed from left to right.


    The **union** operation takes two relations, *A* and *B*, and combines them into
    a single relation containing all distinct rows of *A* and *B*. In SQL, **union**
    combines the results of two **select** statements. By default, **union** eliminates
    duplicates. If you want duplicates included in the result, then use **union all**.


    For example, the following SQL finds the single most and single least frequently
    mentioned foods: **select f.*, top_foods.count from foods f**


    **inner join**


    **(select food_id, count(food_id) as count from foods_episodes**


    **group by food_id**


    **order by count(food_id) desc limit 1) top_foods**


    **on f.id=top_foods.food_id**


    **union**


    **select f.*, bottom_foods.count from foods f**


    **inner join**


    **(select food_id, count(food_id) as count from foods_episodes**


    **group by food_id**


    **order by count(food_id) limit 1) bottom_foods**


    **on f.id=bottom_foods.food_id**


    **order by top_foods.count desc;**


    **id type_id name top_foods.count**


    **----- ------- --------- ---------------**


    **288 10 Hot Dog 5**


    **1 1 Bagels 1**


    Both queries return only one row. The only difference in the two is which way
    they sort their results.


    The **union** simply combines the two rows into a single relation.


    The **intersect** operation takes two relations, A and B, and selects all rows
    in A that also exist in B.


    The following SQL uses **intersect** to find the all-time top ten foods that appear
    in seasons 3 through 5: **select f.* from foods f**


    **inner join**


    **(select food_id, count(food_id) as count**


    **from foods_episodes**


    **group by food_id**


    **order by count(food_id) desc limit 10) top_foods**


    **on f.id=top_foods.food_id**


    CHAPTER 3 ■ SQL FOR SQLITE


    **intersect**


    **select f.* from foods f**


    **inner join foods_episodes fe on f.id = fe.food_id**


    **inner join episodes e on fe.episode_id = e.id**


    **where e.season between 3 and 5**


    **order by f.name;**


    **id type_id name**


    **----- ------- --------------------**


    **4 1 Bear Claws**


    **146 7 Decaf Cappuccino**


    **153 7 Hennigen''s**


    **55 2 Kasha**


    **94 4 Ketchup**


    **164 7 Naya Water**


    **317 11 Pizza**'
  trans: '

    `order by` 子查询会为每一行执行，其结果与给定行相关联。你可以将其视为结果集中的一个不可见列，用于对行进行排序。


    最后，我们还有 `from` 子句。有时你可能想要连接到另一个查询的结果，而不是一个基础表。这又是子查询的另一项工作：


    ```sql

    select f.name, types.name from foods f

    inner join (select * from food_types where id=6) types

    on f.type_id=types.id;


    name       name

    ------------------------- -----

    Generic (as a meal) Dip

    Good Dip   Dip

    Guacamole Dip Dip

    Hummus     Dip

    ```


    请注意，在 `from` 子句中使用子查询需要重命名操作。在这个例子中，子查询被命名为 `types`。在 `from` 子句中作为源关系的子查询通常被称为
    `内联视图` 或 `派生表`。


    关于子查询需要记住的一点是，它们可以在任何可以使用关系表达式的地方使用。学习如何、何处以及何时使用子查询的一个好方法就是多加尝试，看看能实现什么效果。在 SQL
    中，解决问题的方法往往不止一种。当你理解了全局图景，就能在考虑如何重写查询以获得更高效率时，做出更明智的决策。


    ### 复合查询


    复合查询在某种程度上是子查询的逆过程。复合查询是一种处理多个查询结果的查询，它使用三种特定的关系操作：并集（union）、交集（intersect）和差集（difference）。在
    SQLite 中，这些操作分别使用 `union`、`intersect` 和 `except` 关键字来定义。


    复合查询操作对其参数有几个要求：


    *   涉及的关系必须具有相同数量的列。

    *   只能有一个 `order by` 子句，位于复合查询的末尾，并应用于合并后的结果。


    此外，复合查询中的关系是从左到右处理的。


    `union` 操作接收两个关系 *A* 和 *B*，并将它们合并成一个包含 *A* 和 *B* 中所有不重复行的单一关系。在 SQL 中，`union`
    合并两个 `select` 语句的结果。默认情况下，`union` 会消除重复行。如果希望结果中包含重复行，请使用 `union all`。


    例如，以下 SQL 语句查找提及频率最高和最低的单一食物：

    ```sql

    select f.*, top_foods.count from foods f

    inner join

    (select food_id, count(food_id) as count from foods_episodes

    group by food_id

    order by count(food_id) desc limit 1) top_foods

    on f.id=top_foods.food_id

    union

    select f.*, bottom_foods.count from foods f

    inner join

    (select food_id, count(food_id) as count from foods_episodes

    group by food_id

    order by count(food_id) limit 1) bottom_foods

    on f.id=bottom_foods.food_id

    order by top_foods.count desc;


    id  type_id name        top_foods.count

    ----- ------- --------- ---------------

    288  10      Hot Dog     5

    1    1       Bagels      1

    ```


    两个查询都只返回一行。它们唯一的区别在于各自对结果的排序方式。`union` 简单地将两行合并成一个单一关系。


    `intersect` 操作接收两个关系 A 和 B，并选择所有在 A 中也存在于 B 中的行。


    以下 SQL 使用 `intersect` 来查找在第 3 到第 5 季中出现过的、有史以来排名前十的食物：

    ```sql

    select f.* from foods f

    inner join

    (select food_id, count(food_id) as count

    from foods_episodes

    group by food_id

    order by count(food_id) desc limit 10) top_foods

    on f.id=top_foods.food_id

    intersect

    select f.* from foods f

    inner join foods_episodes fe on f.id = fe.food_id

    inner join episodes e on fe.episode_id = e.id

    where e.season between 3 and 5

    order by f.name;


    id  type_id name

    ----- ------- --------------------

    4    1       Bear Claws

    146  7       Decaf Cappuccino

    153  7       Hennigen''s

    55   2       Kasha

    94   4       Ketchup

    164  7       Naya Water

    317  11      Pizza

    ```

