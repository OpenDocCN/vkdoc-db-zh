    \n```\nfuzzy@linux $ cpan\ncpan> install DBD::SQLite\n... lots of CPAN install\
    \ messages ...\n```\n\n要在 Linux/Unix 中从源代码安装，请切换到临时目录并执行以下操作：\n\n```\nfuzzy@linux\
    \ $ wget http://search.cpan.org/CPAN/authors/id/A/AD/ADAMK/DBD-SQLite-1.29.tar.gz\n\
