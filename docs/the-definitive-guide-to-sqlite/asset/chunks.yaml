    ## 数据库管理


    既然您已经了解了如何以交互模式和命令行模式调用 CLP，现在让我们看一些使用 CLP 执行常见管理任务的示例。我们将从头开始，从数据库创建说起。


    ### 创建数据库


    让我们从创建一个名为 `test.db` 的数据库开始。在命令行中，通过输入以下内容以 shell 模式打开 CLP：


    `sqlite3 test.db`


    即使我们提供了数据库名称，如果数据库尚不存在，SQLite 实际上并不会立即创建它。SQLite 会推迟创建数据库，直到您真正在其中创建某些内容，例如表或视图。这样做的原因是让您有机会在数据库结构提交到磁盘之前设置各种永久性数据库设置（如页面大小）。


    某些设置（如页面大小和字符编码（UTF-8、UTF-16 等））在数据库创建后不易更改，因此这是您指定它们的机会。我们这里将使用默认设置，因此要真正在磁盘上创建数据库，我们只需创建一个表即可。从
    shell 执行以下语句：


    `sqlite> create table test (id integer primary key, value text);`


    现在您在磁盘上有一个名为 `test.db` 的数据库文件，其中包含一个名为 `test` 的表。如您所见，这个表有两列：


    *   一个名为 `id` 的主键列，它默认具有自动生成值的能力。无论您在何处定义一个类型为 `integer primary key` 的列，SQLite
    都会为该列应用一个函数来创建并应用单调递增的值。也就是说，如果在 `INSERT` 语句中没有为该列提供值，SQLite 将通过查找该列的下一个特定整数值来自动为其生成一个值。

    *   一个简单的文本字段，名为 `value`。


    让我们向表中添加几行数据：


    `sqlite> insert into test (id, value) values(1, ''eenie'');`

    `sqlite> insert into test (id, value) values(2, ''meenie'');`

    `sqlite> insert into test (value) values(''miny'');`

    `sqlite> insert into test (value) values(''mo'');`


    现在将它们查询出来：


    `sqlite> .mode column`

    `sqlite> .headers on`

    `sqlite> select * from test;`


    ```

    id value

    ---------- ----------

    1 eenie

    2 meenie

    3 miny

    4 mo

    ```


    `select` 语句前的两个命令（`.headers` 和 `.mode`）用于稍微改善格式（这些命令以及其他类似命令将在后面介绍）。我们可以看到前两行使用了我们明确指定的
    ID 值。我们还可以看到，对于第 3 和第 4 行，SQLite 为 `id` 列提供了顺序整数值，这些值我们在 `insert` 语句中并未提供。说到自增列，您可能有兴趣知道，可以使用
    SQL 函数 `last_insert_rowid()` 来获取最后插入的自增值：


    `sqlite> select last_insert_rowid();`


    ```

    last_insert_rowid()

    -------------------

    4

    ```


    在我们退出之前，让我们向数据库添加一个索引和一个视图。这些在后续示例中会派上用场：


    `sqlite> create index test_idx on test (value);`

    `sqlite> create view schema as select * from sqlite_master;`


    要退出 shell，请执行 `.exit` 命令：


    `sqlite> .exit`


    在 Windows 上，您也可以使用按键组合 Ctrl+C 来终止 shell。在 Unix 上，您可以使用 Ctrl+D。


    ## 获取数据库模式信息


    有几个 shell 命令可用于获取有关数据库内容的信息。您可以使用 `.tables [pattern]` 来检索表（和视图）的列表，其中可选的 `[pattern]`
    可以是 SQL `like` 运算符能理解的任何模式（如果您不熟悉 `like`，我们将在第 3 章介绍）。


    所有匹配给定模式的表和视图都将被返回。如果未提供模式，则返回所有表和视图：


    `sqlite> .tables`


    ```

    schema test

    ```


    在这里，我们看到了名为 `test` 的表和名为 `schema` 的视图。类似地，可以使用 `.indices [table name]` 打印给定表的索引：


    `sqlite> .indices test`


    ```

    test_idx

    ```


    在这里，我们看到了之前在 `test` 上创建的索引，名为 `test_idx`。可以使用 `.schema [table name]` 获取表或视图的 SQL
    定义或数据定义语言（DDL）。如果未提供表名，则返回所有数据库对象（表、索引、视图和触发器）的 SQL 定义：


    `sqlite> .schema test`


    ```

    CREATE TABLE test (id integer primary key, value text);

    CREATE INDEX test_idx on test (value);

    ```


    `sqlite> .schema`


    ```

    CREATE TABLE test (id integer primary key, value text);

    CREATE VIEW schema as select * from sqlite_master;

    CREATE INDEX test_idx on test (value);

    ```


    更详细的模式信息可以从 SQLite 的主要系统视图 `sqlite_master` 中获取。这个视图是一种简单的系统目录。其模式如表 2-1 所述。


    *表 2-1. SQLite 主表模式*


    | 名称 | 描述 |

    | :--- | :--- |

    | `type` | 对象的类型（表、索引、视图、触发器） |

    | `name` | 对象的名称 |

    | `tbl_name` | 对象关联的表 |

    | `rootpage` | 对象在数据库中的根页索引（起始位置） |

    | `sql` | 对象的 SQL 定义（DDL） |


    查询我们当前数据库的 `sqlite_master` 会返回以下内容（别忘了先使用 `.mode column` 和 `.headers on` 命令手动设置列格式和表头）：


    `sqlite> .mode column`

    `sqlite> .headers on`

    `sqlite> select type, name, tbl_name, sql from sqlite_master order by type;`


    ```

    type name tbl_name sql

    ---------- ---------- ---------- -------------------------------------

    index test_idx test CREATE INDEX test_idx on test (value)

    table test test CREATE TABLE test (id integer primary

    view schema schema CREATE VIEW schema as select * from s

    ```


    我们看到了 `test.db` 对象的完整清单：一个表、一个索引和一个视图，每个对象都有其各自原始的 DDL 创建语句。


    还有一些额外的命令可以通过 SQLite 的 `PRAGMA` 命令（`table_info`、`index_info` 和 `index_list`）来获取模式信息，这些将在第
    4 章介绍。


    > **提示** 别忘了，像 SQLite CLP 这样的大多数命令行工具都会保存您执行过的命令历史记录。要重新运行之前的命令，您可以按向上箭头键来滚动查看之前的命令。在
    Windows 上，您还可以在任何命令提示符窗口中按 `F7` 来查看已输入命令的可滚动列表。


    ## 导出数据


    您可以使用 `.dump` 命令将数据库对象导出为 SQL 格式。如果没有参数，`.dump` 将把整个数据库导出为一系列 DDL 和数据操作语言（DML）命令，适用于重新创建数据库对象及其包含的数据。如果您提供了参数，shell
    会将它们解释为表名或视图名。任何与给定参数匹配的表或视图都将被导出。不匹配的则被忽略。在 shell 模式下，`.dump` 命令的输出默认定向到屏幕。如果您想将输出重定向到文件，请使用
    `.output [filename]` 命令。此命令将所有输出重定向到文件 `filename`。要将输出恢复回屏幕，只需执行 `.output stdout`。因此，要将当前数据库导出到文件
    `file.sql`，您可以按以下步骤操作：

