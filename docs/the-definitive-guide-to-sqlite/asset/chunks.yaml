    1，并为后续参数使用连续的整数值。它将此信息存储在生成的语句句柄（`sqlite3_stmt` 结构）中，该句柄随后将期望在执行前有特定数量的值绑定到给定的参数。如果你没有为参数绑定值，`sqlite3_step()`
    在语句执行时将默认使用 `NULL` 作为其值。


    准备好语句后，你需要将值绑定到它。你使用 `sqlite3_bind_*xxx*()` 函数来完成此操作，其通用形式如下：


    ```c

    sqlite3_bind_xxx( sqlite3_stmt*, /* statement handle */

    int i, /* parameter number */

    xxx value /* value to be bound */

    );

    ```


    函数名中的 `*xxx*` 表示要绑定的值的数据类型。例如，要将一个 `double` 值绑定到参数，你会使用 `sqlite3_bind_double()`，其声明如下：

    `sqlite3_bind_double(sqlite3_stmt* stmt, int i, double value);`


    常见的绑定函数如下：


    ```c

    int sqlite3_bind_int(sqlite3_stmt*, int, int);

    int sqlite3_bind_double(sqlite3_stmt*, int, double);

    int sqlite3_bind_int64(sqlite3_stmt*, int, long long int);

    int sqlite3_bind_null(sqlite3_stmt*, int);

    int sqlite3_bind_blob(sqlite3_stmt*, int, const void*, int n, void(*)(void*));

    int sqlite3_bind_zeroblob(sqlite3_stmt*, int, int n);

    int sqlite3_bind_text(sqlite3_stmt*, int, const char*, int n, void(*)(void*));

    int sqlite3_bind_text16(sqlite3_stmt*, int, const void*, int n, void(*)(void*));

    ```


    通常，绑定函数可以分为两类，一类用于标量值（`int`、`double`、`int64` 和 `NULL`），另一类用于数组（`blob`、`text` 和
    `text16`）。它们的不同仅在于数组绑定函数需要一个长度参数和一个指向清理函数的指针。此外，`sqlite3_bind_text()` 会像 `sqlite3_mprintf()`
    一样自动转义引号字符。使用 `BLOB` 变体的数组绑定函数声明如下：


    ```c

    int sqlite3_bind_blob( sqlite3_stmt*, /* statement handle */

    int, /* ordinal */

    const void*, /* pointer to blob data */

    int n, /* length (bytes) of data */

    void(*)(void*)); /* cleanup hander */

    ```


    API 提供了两个具有特殊含义的预定义清理处理程序值，定义如下：


    ```c

    #define SQLITE_STATIC ((void(*)(void *))0)

    #define SQLITE_TRANSIENT ((void(*)(void *))-1)

    ```


    每个值指定了特定的清理操作。`SQLITE_STATIC` 告知数组绑定函数数组内存驻留在非托管空间中，因此 SQLite 不会尝试清理它。`SQLITE_TRANSIENT`
    告知绑定函数数组内存可能会改变，因此 SQLite 会制作数据的私有副本，该副本在语句结束时自动清理。第三种选择是提供指向你自己清理函数的指针，该函数必须符合以下形式：

    `void cleanup_fn(void*)`

    如果提供，当语句结束时，SQLite 将调用你的清理函数，并传入数组内存。

