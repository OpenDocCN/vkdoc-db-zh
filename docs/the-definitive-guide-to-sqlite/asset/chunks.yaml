- fmt: '# CHAPTER 3 ■ SQL FOR SQLITE


    ## Handling Null in SQLite


    | name | frequency |

    | :--- | :---------- |

    | Kasha | High |

    | Ketchup | High |

    | Hot Dog | Very High |

    | Pizza | High |


    `where frequency like ''%High''`


    `name frequency`


    This query runs a subquery for each row in `foods` that classifies the food by
    the number of episodes it appears in. The result of this subquery is included
    as a column called `frequency`. The `where` predicate filters `frequency` values
    that have the word *High* in them.


    Only one condition is executed in a `case` expression. If more than one condition
    is satisfied, only the first of them is executed. If no conditions are satisfied
    and no `else` condition is defined, `case` returns `null`.


    Most relational databases support the concept of “unknown” or “unknowable” through
    a special placeholder called `null`, which is a placeholder for missing information
    and is not a value per se. Rather, `null` is the absence of a value: `null` is
    not nothing, `null` is not something, `null` is not true, `null` is not false,
    `null` is not zero, `null` is not an empty string. Simply put, `null` is resolutely
    what it is: `null`. And not everyone can agree on what that means. There are a
    few key rules and ideas that you should learn so you can master the use of `null`
    in SQLite.


    First, in order to accommodate `null` in logical expressions, SQL uses something
    called *three-value* (or *tristate*) logic, where `null` is one of the truth values.
    Table 3-2 shows the truth table for logical `and` and logical `or` with `null`
    thrown into the mix.


    **Table 3-2.** `AND` and `OR` with `NULL`


    | x | y | x AND y | x OR y |

    | :--- | :--- | :--- | :--- |

    | True | True | True | True |

    | True | False | False | True |

    | True | NULL | NULL | True |

    | NULL | NULL | NULL | NULL |

    | False | False | False | False |

    | False | NULL | False | NULL |


    You can try a few simple `select` statements to see the effect of `null` yourself.


    Second, detecting the presence or absence of `null` is done using the `is null`
    or `is not null` operator. If you try to use any other operator, such as equals,
    greater than, and so on, you will receive a shock, which leads us to our third
    rule regarding `null`.


    Third and last, always remember that `null` is not equal to any other value, even
    `null` itself. You cannot compare `null` with a value, and no `null` is greater
    than, smaller than, or in any way related to any another `null`. This often catches
    out the unwary when statements like the next example fail to return any rows.


    ```sql

    select *

    from mytable

    where myvalue = null;

    ```


    Nothing can equal `null`, so no data will ever be returned by that statement in
    SQLite. Now that you’ve mastered the basics, you’ll be pleased to know that SQLite
    offers several additional functions for working with `null`. The first of which
    is a workaround for the very limitation of “nothing equals `NULL`” that we’ve
    just drilled in to you. From SQLite v 3.6.19, the `is` operator can be used to
    equate one `NULL` to another. In the most basic form, you can run a simple query
    to ask SQLite if `NULL` is `NULL`:


    ```sqlite

    sqlite> select NULL is NULL;

    1

    ```


    As already mentioned, any value other than zero means “true,” so SQLite is happy
    to tell us that in this instance `NULL` really is the same as `NULL`. But please,
    don’t rely on this heavily. SQL’s trivalue logic may be awkward, but it is a standard,
    and working around it with the `is` operator will likely have you encountering
    problems with other systems and programming languages that expect the standard
    behavior.


    The `coalesce` function, which is part of the SQL99 standard, takes a list of
    values and returns the first non-`null` in the list. Take the following example:


    ```sql

    select coalesce(null, 7, null, 4)

    ```


