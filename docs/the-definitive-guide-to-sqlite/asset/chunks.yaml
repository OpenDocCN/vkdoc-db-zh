- fmt: '# SQLite 比较规则与类型


    表达式`''2.9''`虽然是`text`，但在比较前会被转换为`integer`。因此，列会根据值的实际类型进行解释。如果`''2.is`是一个非数字字符串会怎样？此时
    SQLite 会回退到比较存储类别，其中`integer`和`numeric`类型总是小于`text`：

    ```

    sqlite> select rowid,b,typeof(i),i>''text'' from domain order by b;


    rowid b typeof(i i>''text''

    ----- ----- ------------

    5 NULL null NULL

    1 3.14 real 0

    3 314 integer 0

    2 3.14 real 0

    4 1B blob 1

    ```


    第二条规则简单说明，当比较数字列和非数字列时，SQLite 会尽可能将非数字列转换为数字格式：

    ```

    sqlite> create table rule2(a int, b text);

    sqlite> insert into rule2 values(2,''1'');

    sqlite> insert into rule2 values(2,''text'');

    sqlite> select a, typeof(a),b,typeof(b), a>b from rule2;


    a typeof(a) b typeof(b) a>b

    ---------- ---------- ---------- ----------

    2 integer 1 text 1

    2 integer text text 0

    ```


    列`a`是`integer`，而`b`是`text`。在计算表达式`a>b`时，SQLite 会尝试将`b`转换为`integer`。在第一行中，`b`是`''1''`，可以转换为`integer`。SQLite
    进行转换并比较整数。在第二行中，`b`是`''text''`，无法转换。SQLite 于是比较存储类别`integer`和`text`。


    第三条规则重申，由上下文建立的存储类别按其字面值进行比较。如果看起来像`text`的类型与看起来像`integer`的类型进行比较，那么`text`更大。


    此外，你可以使用`cast()`函数手动转换列或表达式的存储类型。考虑以下例子：

    ```

    sqlite> select typeof(3.14), typeof(cast(3.14 as text));


    typeof(3.14) typeof(cast(3.14 as text))

    ------------ --------------------------

    real text

    ```


    # 伪严格类型


    如果你需要比类型亲和性更强的域完整性，那么`CHECK`约束可以提供帮助。你可以直接使用一个内置函数和一个`CHECK`约束来实现伪严格类型。如前所述，SQLite
    有一个函数可以返回值的推断存储类别——`typeof()`。你可以在任何关系表达式中使用`typeof()`来测试值的类型。以下是一个例子：

    ```

    sqlite> select typeof(3.14) = ''text'';

    0

    sqlite> select typeof(3.14) = ''integer'';

    0

    sqlite> select typeof(3.14) = ''real'';

    1

    sqlite> select typeof(3) = ''integer'';

    1

    sqlite> select typeof(''3'') = ''text'';

    1

    ```


    因此，你可以使用这个函数来实现一个`CHECK`约束，以限制列中允许的可接受类型：

    ```

    sqlite> create table domain (x integer check(typeof(x)=''integer''));

    sqlite> insert into domain values(''1'');

    SQL error: constraint failed

    sqlite> insert into domain values(1.1);

    SQL error: constraint failed

    sqlite> insert into domain values(1);

    sqlite> select x, typeof(x) from domain;


    x typeof(x)

    -- ----------

    1 integer

    sqlite> update domain set x=1.1;

    SQL error: constraint failed

    ```


    这里唯一的限制是，你只能检查 SQLite 的原生存储类别（或可以使用其他内置 SQL 函数实现的类型）。然而，如果你是一名程序员，并且使用支持 SQLite
    用户自定义函数的语言扩展（例如 Perl、Python 或 Ruby），或者直接使用 SQLite C API，你可以实现更精细的函数进行类型检查，这些函数可以从`CHECK`约束中调用。


    # 预写式日志


    随着 SQLite 3.7.0 版本的发布，引入了一种新的用于管理原子事务的可选模型。'
