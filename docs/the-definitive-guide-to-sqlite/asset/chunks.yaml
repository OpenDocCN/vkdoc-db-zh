    \ NULL`约束。为此，人们通常将`default`约束与`NOT NULL`约束结合使用，以便`insert`命令可以安全地使用默认值，同时将`NULL`排除在列之外。\n\
    \n## 检查约束\n\n检查约束允许你定义表达式，以测试值在插入或更新列时是否满足条件。如果值不符合表达式中规定的标准，数据库就会发出约束违反错误。因此，它允许你定义超出`unique`或`NOT\
    \ NULL`的额外数据完整性检查，以适应你的特定应用。一个`check`约束的例子是确保电话号码字段的值至少有七个字符长。为此，你可以将约束添加到`phone`的列定义中，或作为表定义中的独立约束，如下所示：\n\
    \n```\ncreate table contacts\n( id integer primary key,\n  name text not null\
