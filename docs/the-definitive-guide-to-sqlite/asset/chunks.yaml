    that you have created aliases for all column names in the view. This allows you
    to differentiate the respective **id** and **name** columns in each table when
    you reference them from inside the trigger. Now, let’s make the view


    updatable by creating an **UPDATE** trigger on it:


    **create trigger on_update_foods_view**


    **instead of update on foods_view**


    **for each row**


    **begin**


    **update foods set name=new.fname where id=new.fid;**


