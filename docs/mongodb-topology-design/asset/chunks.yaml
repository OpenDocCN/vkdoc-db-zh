  trans: '

    ## 隐藏从节点


    隐藏成员是一种承载数据的节点类型，它们会正常复制数据，但专为分析或数据转储等特殊工作负载而预留。它们可以配置不同的索引，并且通常分配有不同的系统资源。隐藏节点*永远不能成为主节点*，并且*对客户端应用程序*（以及`mongos`路由器）*隐藏*，即使是进行从节点读取。


    应用程序可以直接连接到这些节点执行聚合或分析查询，但绝不应向它们写入数据。由于它们从主节点复制数据，因此可能会返回过时的数据。


    ## 延迟从节点


    延迟成员是一种隐藏成员类型，其复制应用了延迟。


    注意


    在 Ops/云管理器引入*可查询备份*之前，这些节点被用来增加一层针对用户错误的防护。


    假设你的副本集有一个额外的节点，其复制延迟为 2 小时。实际上，它拥有一个 2 小时前的数据库完整副本。现在，如果数据库管理员或应用程序意外删除或损坏了一个完整的数据集合，你就有了一个“实时备份”。通过一些快速的人工干预，可以将应用程序指向此节点，这样你只会丢失一些最近的更改。这是生产环境中的最坏情况，因为如后续步骤所示，存在若干问题：


    1.  你需要在 2 小时的时间窗口内发现、决定并应对数据丢失。

    2.  将延迟成员转换为主节点后，你丢失了两小时的其他更改。

    3.  如果你选择擦除其他节点并从此单一节点开始初始同步，你的应用程序突然就只有数据的单个副本了。

    4.  新主节点现在为应用程序提供服务，同时又是多个复制的同步源，因此负载会显著增加。

    5.  在恢复期间，应用程序和终端用户可能会受到显著的性能影响。


    在图 2-2（左）中，我们看到第四个隐藏节点延迟复制。在发生损坏的情况下（右），延迟节点已被转换为主节点，其他节点正在从这个 2 小时前的数据同步自身。


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig2_HTML.jpg](img/487346_1_En_2_Fig2_HTML.jpg)


    图 2-2


    具有延迟隐藏成员的副本集


    ### 部分恢复


    在仅丢失部分数据，甚至整个集合被删除的情况下，你可以将延迟成员用作干净的数据源。你可以转储该集合并将其恢复回副本集。或者，你可以直接连接到隐藏成员并执行查询以检索单个文档或值。


    注意


    隐藏节点应始终*在*为优化故障转移而设计的拓扑结构*之外*添加。由于它们是延迟的，它们无法参与多数写确认，并且不能成为主节点。


    ## 非投票从节点


    MongoDB 副本集中的非投票成员拥有 0 票，但也必须具有 0 优先级（意味着它自身不能成为主节点）。副本集最多可以有 7 个投票成员（以使选举过程尽可能精简）。然而，一些用例严重依赖读取操作，并且不介意读取稍微过时的数据。对于此类副本集，可以通过添加更多非投票从节点来水平扩展系统。


    注意


    当（i）数据频繁更改或（ii）需要读取最新已确认的数据时，从节点读取不适用于大多数工作负载。


    如图 2-3 所示，通过使用非投票从节点（只要投票节点数量是奇数），你可以拥有一个大型的地理分布式副本集，且节点总数为偶数。*复制链*将用于从其他从节点复制，而不是所有节点都直接从主节点复制。这种链式结构减轻了主节点上的内存和
    I/O 压力，但从节点可能会遭受显著的复制延迟。从从节点读取的应用程序将经历陈旧读取，因此这必须得到用例的支持。


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig3_HTML.jpg](img/487346_1_En_2_Fig3_HTML.jpg)


    图 2-3


    具有多个从节点以扩展读取的副本集


    在表 2-1 中，我们可以看到本章讨论的所有节点类型的概览。


    表 2-1


    不同节点类型摘要


    | 类型 | 设置 | 说明 |

    | --- | --- | --- |

    | 标准 | `{votes: 1, priority: 1}` | 包含数据，可以投票，并且可以成为主节点。 |

    | 仲裁者 | `{votes: 1, priority: 0}` | 无数据，因此不能成为主节点，但可以投票。Atlas 上不可用。 |

    | 隐藏 | `{votes: 1, priority: 0, hidden: true}` | 包含数据，可以投票，但不能成为主节点。对客户端和`mongos`不可见，即使进行从节点读取也不行。
    |

    | 延迟 | `{votes: 1, priority: 0, hidden: true, slaveDelay: 3600}` | 一种特殊类型的隐藏节点，具有复制延迟。它可以帮助选举主节点，但由于没有最新数据，*不能成为主节点*。在分片集群中无用，且
    Atlas 上不可用。 |

    | 非投票 | `{votes: 0, priority: 0}` | 此节点复制数据，但不投票，也不能成为主节点。有助于确保投票节点数量为奇数。 |


    ## 避免故障


    任何复杂系统的鲁棒性都取决于其故障点。最终，系统中的每个组件都会出现故障、需要升级、重启或需要物理搬迁。如果某个组件是其同类中的唯一一个，它就被称为*单点故障*，或称*SPOF*。当它发生故障时，会破坏整个组件间的相互依赖关系，导致应用程序停机。


    为避免此类故障，你应该有多个应用程序在负载均衡器后运行，位于不同的物理机器上，最好在不同的数据中心。域名系统（DNS）查找应有多个名称服务器，这样即使发生互联网级别的故障，也不应阻止用户访问你的应用程序服务器。


    对于你的 MongoDB 数据库，我们建议遵循相同的原则，使用一个包含三个数据承载成员的副本集。这是提供高可用性和多数写确认的最低要求，这样即使单个节点完全丢失，也不会造成数据丢失，也不会导致任何停机或性能影响。


    ### 故障点


    一些常见的故障点包括：


    *   数据中心（断电、网络基础设施故障、火灾等）

    *   物理服务器（电源、CPU、存储设备等）

    *   软件（虚拟机[VM]宿主机、操作系统崩溃）


    通过内部冗余系统，例如多个电源、具有热插拔驱动器的 RAID-10 存储、多个网络接口卡，以及配备备用电源和多个互联网骨干网的数据中心，可以大大降低其中一些故障点的风险。自动化并测试任何故障转移机制对于最小化停机时间至关重要，在理想情况下，可以完全避免停机。

    '
- fmt: '### Reserve capacity


    You will want to plan for any component going offline as the worst possible moment.
    Imagine you have a production workload for a transport provider with 90% of ticket
    sales occurring at 9–10 a.m. and again at 5–6 p.m. every work day. You should
    be provisioning your computing resources for MongoDB nodes so that the primary
    can fail and the replacement primary can handle the same workload.


    All this redundancy comes at a price, and system architects and managers must
    balance the cost of adding redundancy to all these systems. It''s tempting to
    seek clever ways to save money with complex failover strategies with mixed hardware.
    Later, we will explore a few examples and show why deployments with mixed hardware
    resources are undesirable.


    ### Automatic failover


    Rather than rely solely on redundant hardware, MongoDB offers a simpler and cheaper
    approach with software that assumes infrastructure failures happen and has failover
    built-in. By running multiple data-bearing nodes in distinct physical locations,
    it becomes must less important to ensure that every layer in the infrastructure
    is resilient. We can run on much less expensive commodity hardware, with a single
    power supply and single network card, with no backup power or Internet.


    If our replica set can handle one or even two complete data center failures simultaneously
    without data loss, we can save money in infrastructure and provide a database
    system which can self-heal without any disruption to its application at all.


    Most cloud providers include a unified VM interface to customers which appears
    much the same as running a standard Linux OS on commodity hardware. However, under
    the covers most cloud providers have built in many layers of redundancy. For example,
    their network storage solutions are usually built on a RAID-10-style architecture
    which uses multiple physical storage devices to store each chunk of data and which
    scales up almost linearly in terms of `IOPS` (input/output operations per second).


    Warning


    Many cloud providers include storage options with “burst credits.” These can be
    used during workload peaks but will eventually expire. If you see an unexplained
    sudden drop in `IOPS` on a cloud VM, it may be that the credit balance reached
    zero.


    ### Designing for flexibility


    Another good way to build fault-tolerant systems is to follow design principles
    that allow for later flexibility.


    #### DNS not IP


    While it is possible to configure your replica set members and seed lists with
    IP addresses in connection strings (see Figure [2-4](#487346_1_En_2_Chapter.xhtml#Fig4)),
    this can make your deployment brittle. By using an internal DNS server, you can
    give each host in your deployment a logical hostname or alias.


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig4_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig4_HTML.jpg)

    Figure 2-4


    Using IP addresses for configuration results in an inflexible system


    Some organizations will give a host an incremental hostname based on its physical
    location and business unit, for example, `host0003456.mortgages.dc-nyc.bigbank.local`.
    While this is preferable to using an IP address and allows us to quickly see in
    which data center the host resides, it still lacks flexibility.


    If this host formed part of a shard’s replica set, and for some reason the motherboard
    failed completely, this host would need to be replaced. The replacement host would
    have a new hostname, say `host0003587`. Now, manual intervention will be required
    inside the MongoDB deployment for all other members, the `mongos`, and Ops Manager
    to know about the new host location for this node’s role.


    Another approach seen in Figure [2-5](#487346_1_En_2_Chapter.xhtml#Fig5) is to
    give logical naming to the hostname or at least create a CNAME alias to the functional
    hostname in the form `node3.mortgages_prod.mongo.bigbank.local`. In this case,
    a new host can be spun up, the CNAME alias can be pointed to this hostname, the
    `mongod` processes configured, and all components will be able to discover it
    automatically as soon as the DNS cache flushes. For planned migrations, the DNS
    time-to-live (TTL) can be shortened to reduce the cache duration.


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig5_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig5_HTML.jpg)

    Figure 2-5


    Using logical hostnames makes it easier to understand and manage complex deployment;
    it also makes it easier to replace failed hosts


    Note


    For the auto-discovery features of replica set, sharded cluster, and Ops Manager
    agents, each node needs to detect its own “MongoDB hostname” as the host’s fully
    qualified hostname (FQDN). The result of the command `hostname -f` should always
    match the name of the node in configuration. On Linux, this can be achieved by
    running `hostnamectl set-hostname <new_hostname>` or changing the hostname in
    `/etc/hostname` and restarting the host. Failing to check this can mean that a
    `mongod` doesn’t know its own identity.


    ### Auto-discovery


    MongoDB drivers will automatically try to detect all members of a deployment.
    Even if you list only one member of a replica set in the connection URI string,
    a driver will still establish connections to all members to react faster to elections
    and other replica set changes. However, you should always include all known replica
    set members or `mongos` routers in the connection URI in case the listed nodes
    are unavailable when the application first starts.


    ### Planned downtime


    The inherently distributed nature of MongoDB replica sets means that it is perfectly
    normal and expected that nodes will be taken down intentionally from time to time
    for planned maintenance. As long as any maintenance doesn’t take longer than the
    oplog window, a node will automatically catch up any changes upon restart.


    There is no need to reconfigure a replica set for planned downtime. It is better
    to leave configuration in place, so that the node is automatically and instantly
    rejoined to the set once it is restarted.


    Note


    It is strongly recommended to leverage rolling upgrades to keep your MongoDB nodes
    running on the `latest minor release` of the current major version. As with any
    software, occasionally bugs are found that affect stability or security. Avoid
    your deployment being taken offline by a bug that has already been fixed, and
    update quickly.'
