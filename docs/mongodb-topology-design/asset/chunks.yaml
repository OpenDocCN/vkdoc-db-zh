- fmt: '#### Stale reads


    在某些情况下，我们可以通过读取已复制到云中辅助节点的一些稍微陈旧的数据来降低成本。这种数据可能总是有几秒钟的延迟，但在高写入工作负载期间可能会落后更多。（更多内容请参见辅助读取部分。）


    无论如何，具有异步复制的分布式系统的性质意味着，我们永远无法保证辅助节点拥有已经写入主节点的数据。辅助节点根本无法知道主节点已确认但尚未刷新到磁盘的写操作。


    因此，**如果你需要读取最新数据，你必须从主节点读取**，并产生任何相关的带宽费用。


    ### 迁移步骤


    让我们设想一下，我们计划开始将完全本地化的应用程序和集群迁移到云端，以便在完全迁移之前积累管理云基础设施的机构知识和专业技能。


    对于此示例，我们假设一个仅有两个数据中心的双分片集群，因此此次迁移的部分动机是在云端添加第三个数据中心。另一个动机是将一些应用程序服务器移动到可以每天在高峰工作负载期间上下扩展的云基础设施（图
    [8-7](#487346_1_En_8_Chapter.xhtml#Fig7)）。


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig7_HTML.jpg](images/487346_1_En_8_Chapter/487346_1_En_8_Fig7_HTML.jpg)


    图 8-7


    最初，数据和应用程序都在本地


    #### 云辅助节点


    如果我们正在逐步迁移到云，作为第一步，我们有几个不同的选择。一种（如图 [8-8](#487346_1_En_8_Chapter.xhtml#Fig8) 所示）是最初将应用程序保留在本地，并将一些辅助节点移动到云端。默认启用
    `replication chaining`，这些节点将从其副本集中位于 DC1 或 DC2 的其他节点之一进行复制。通过将 `priority` 设置为
    `0`，我们将确保这些节点永远不会成为其副本集中的主节点。如果主节点在云端，来自 DC1 和 DC2 的所有应用程序写入流量都将被路由到云端，而复制流量将返回，从而显著增加云带宽成本。


    在云辅助节点拓扑中，带宽费用将适用于传出的心跳，但传入的 `oplog` 数据是免费的。


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig8_HTML.jpg](images/487346_1_En_8_Chapter/487346_1_En_8_Fig8_HTML.jpg)


    图 8-8


    辅助节点为高可用性提供了第三个位置，但应用程序保留在本地


    #### 云应用程序


    另一个第一步是将一些应用程序移动到云端，通过在停机期间缩减应用程序来节省成本（见图 [8-9](#487346_1_En_8_Chapter.xhtml#Fig9)）。在这个阶段，我们通常会看到内部应用程序保留在本地。这些可能是来自遗留系统的写密集型
    *提取、转换和加载* (ETL) 工作负载，以及内部分析查询工作负载等。


    根据我们的最佳实践，我们将 `mongos` 路由器放置在与应用程序和微服务相同的区域/区域中。


    在这个拓扑中，我们看到我们正在为从 `mongos` 到主节点的写有效负载支付传出带宽费用。用于读取的传出请求数据包通常比返回到云的结果数据小，这使得这些操作很便宜。


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig9_HTML.jpg](images/487346_1_En_8_Chapter/487346_1_En_8_Fig9_HTML.jpg)


    图 8-9


    只有自动扩展的应用程序被移到云端


    #### 完全混合


    自然的下一步是将应用程序和节点都组合在云端（见图 [8-10](#487346_1_En_8_Chapter.xhtml#Fig10)）。与之前一样，`{priority:
    0}` 确保云节点永远不会成为主节点，因为我们假设大部分写操作仍然源自本地应用程序。


    我们需要为从云应用程序传出的任何字节支付带宽费用。然而，在这种情况下，客户端应用程序写入不多，因此云中的 `mongos` 和辅助节点主要*接收*字节，这不会产生费用。


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig10_HTML.jpg](images/487346_1_En_8_Chapter/487346_1_En_8_Fig10_HTML.jpg)


    图 8-10


    允许在云中进行辅助读取的混合拓扑


    #### 非对称分片


    我们将探索的最后迭代包括非对称分片，分片 A 完全位于本地，分片 B 大部分在云端，但所有数据至少有一个副本在本地（图 [8-11](#487346_1_En_8_Chapter.xhtml#Fig11)）。


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig11_HTML.jpg](images/487346_1_En_8_Chapter/487346_1_En_8_Fig11_HTML.jpg)


    图 8-11


    一个高级拓扑，其中一个分片主节点在云端


    通过仔细地将某些数据库“归属”到分片 A 或分片 B，我们可以确保敏感的未分片集合完全位于本地。当由于公司政策或法规，某些数据子集不能存储在云中时，这可能很有用。


    请注意，通过只有两个数据中心，我们在分片 A 中失去了高可用性。但是，如果 DC2 宕机，内部应用程序实际上不会受到影响。


    在云区域中，可以将两个节点放置在不同的可用区（AZ）中以提供所需的冗余。


    #### 数据库结构


    图 [8-12](#487346_1_En_8_Chapter.xhtml#Fig12) 展示了如何在我们的混合集群上部署两个数据库的示例。分片 A 物理上位于本地数据承载节点上，因此虽然它的分片集合（例如
    `sharded1`）会有一半数据在分片 B 中从而在云节点上，但未分片的集合（如 `onprem1` 和 `onprem2`）保证存储在完全受控的本地主机上。默认情况下，没有任何措施可以阻止云上具有足够权限的应用程序查询
    `db1.onprem1` 并将一些机密数据传输到公共云。


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig12_HTML.jpg](images/487346_1_En_8_Chapter/487346_1_En_8_Fig12_HTML.jpg)


    图 8-12


    主要供云使用的数据库可以大部分存储在云中


    一个完全不同的替代方案是使用近期的*字段级加密*（FLE）机制（参见第 [4](#487346_1_En_4_Chapter.xhtml) 章），该机制在官方驱动程序内部对某些字段或子文档进行加密和解密。这意味着没有机密数据会以未加密形式到达数据库，因此要求某些类别的数据只能持久化在本地的合规规则可以得到满足。


    #### 访问控制


    为了完全防止某些数据“泄露”，云上的应用程序可以连接一个只对 `db2` 具有读/写访问权限的用户，因此无权查询 `db1` 中包含的机密数据。


    在清单 [8-1](#487346_1_En_8_Chapter.xhtml#PC4) 中，我们为每个应用程序定义一个用户。面向客户的云应用程序的用户将不被允许访问
    `db1`。


    ```javascript

    // The on-prem application user can access both databases

    db.createUser(

    {

    user: "userPrem",

    pwd: "......"

    roles: [

    { role: "readWrite", db: "db1" }

    { role: "readWrite", db: "db2" }

    ],

    }

    )

    // The cloud application user can only access db2

    db.createUser(

    {

    user: "userCloud",

    pwd: "......"

    roles: [

    { role: "readWrite", db: "db2" }

    ],

    }

    )

    // Listing 8-1

    // Create cloud user which can’t read private db1

    ```


    在 MongoDB 3.6+ 中，你可以使用 `authRestrictions`^([⁹](#fn9)) 进一步将用户账户限制为从特定的 IP 地址或 CIDR
    范围连接。例如，本地账户可能仅对来自本地地址范围的登录有效。在处理高度机密数据时，创建两个完全独立的部署通常更简单、更安全，这些部署可以根据各自的数据增长通过分片进行水平扩展。'
  raw: '#### Stale reads


    In some cases, we can lower costs by reading somewhat stale data that has already
    been replicated to a secondary node in the Cloud. This data could always be several
    seconds delayed but could fall further behind during periods of high write workloads.
    (See the section of secondary reads for more.)


    In any case, the nature of distributed systems with asynchronous replication means
    that we can never guarantee that a secondary has data that has already been written
    to the primary. The secondary just can’t know what writes the primary has acknowledged
    but not yet flushed to disk.


    As a result, **if you need to read the latest data, you must read from a primary**
    and incur any related bandwidth charges.


    ### Migration steps


    Let’s imagine that we plan to start migrating our fully on-prem application and
    cluster to the cloud to build institutional knowledge and expertise in managing
    cloud infrastructure in advance of a complete move.


    For this example, we’ll assume a two-shard cluster in only two data centers, so
    part of the motivation for this migration is to add a third data center in the
    cloud. The other is to move some of the application servers to cloud infrastructure
    that can be scaled up and down each day during peak workloads (Figure [8-7](#487346_1_En_8_Chapter.xhtml#Fig7)).


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig7_HTML.jpg](images/487346_1_En_8_Chapter/487346_1_En_8_Fig7_HTML.jpg)


    Figure 8-7


    Initially both data and applications are on-prem


    #### Cloud secondaries


    If we are moving gradually to the cloud, we have a few different options as first
    steps. One (shown in Figure [8-8](#487346_1_En_8_Chapter.xhtml#Fig8)) is to keep
    the application on-prem initially and move some secondaries to the cloud. With
    *replication chaining* enabled by default, these nodes will replicate from either
    of the other nodes in their replica set in DC1 or DC2\. By setting the priority
    to `0`, we will ensure that these nodes never become primary in their sets. With
    primary nodes in the cloud, all applications’ write traffic from DC1 and DC2 would
    be routed to the cloud, and replication traffic would come back, increasing cloud
    bandwidth costs significantly.


    In a cloud-secondary topology, bandwidth charges will apply to outgoing heartbeats,
    but not incoming oplog data which is free.


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig8_HTML.jpg](images/487346_1_En_8_Chapter/487346_1_En_8_Fig8_HTML.jpg)


    Figure 8-8


    Secondaries provide a third location for high availability, but applications remain
    on-prem


    #### Cloud applications


    Another first step is to move some applications to the cloud, to save money by
    scaling back applications during downtime (see Figure [8-9](#487346_1_En_8_Chapter.xhtml#Fig9)).
    At this phase, we would normally see internal applications remain on-prem. These
    could be write-heavy *extract, transform, and load* (ETL) workloads from legacy
    systems, as well as internal analytics query workloads, among others.


    As our best practice, we have placed `mongos` routers in the same region/zone
    as our application and microservices.


    In this topology, we see that we are paying for outgoing bandwidth from the `mongos`
    to the primary for write payload. The outgoing request packets for reads are usually
    small compared to the result data coming back to the cloud, making these cheap.


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig9_HTML.jpg](images/487346_1_En_8_Chapter/487346_1_En_8_Fig9_HTML.jpg)


    Figure 8-9


    Only auto-scaling applications are moved to the cloud


    #### Fully hybrid


    The natural next step is to combine both applications and nodes in the cloud (see
    Figure [8-10](#487346_1_En_8_Chapter.xhtml#Fig10)). As before, the `{priority:
    0}` ensures the cloud node is never primary since we assume the bulk of the writes
    will still originate from on-prem applications.


    We incur bandwidth charges for any bytes from the cloud applications going out.
    However, in this case the client applications aren’t writing much, and so the
    `mongos` and secondaries in the cloud are mostly *receiving* bytes which incur
    no charges.


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig10_HTML.jpg](images/487346_1_En_8_Chapter/487346_1_En_8_Fig10_HTML.jpg)


    Figure 8-10


    A mixed topology allowing secondary reads in the cloud


    #### Asymmetric shards


    The final iteration we’ll explore includes asymmetric shards, with Shard A completely
    on-prem holding Shard A and Shard B mostly in the cloud but with at least one
    copy of all data on-prem (Figure [8-11](#487346_1_En_8_Chapter.xhtml#Fig11)).


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig11_HTML.jpg](images/487346_1_En_8_Chapter/487346_1_En_8_Fig11_HTML.jpg)


    Figure 8-11


    An advanced topology with one shard primary in the cloud


    By carefully “homing” certain databases on Shard A vs. Shard B, we can ensure
    that sensitive unsharded collections are fully on-prem. This can be useful when
    certain subsets of data cannot be stored in the cloud due to corporate policies
    or regulations.


    Note that we lose high availability in Shard A by having only two data centers.
    However, if DC2 is down, the internal applications would not actually be affected.


    In the Cloud region, the two nodes could be placed in separate AZs to give the
    required redundancy.


    #### Database structure


    Figure [8-12](#487346_1_En_8_Chapter.xhtml#Fig12) shows an example of how two
    databases could be deployed on our hybrid cluster. Shard A is physically located
    on on-prem data-bearing nodes, so while its sharded collections such as `sharded1`
    will have half its data in Shard B and thus on cloud nodes, the unsharded collections
    (such as `onprem1` and `onprem2`) are guaranteed to be stored on fully controlled
    on-prem hosts. By default, there is nothing preventing an application on the cloud
    with sufficient privileges from querying against `db1.onprem1` and transferring
    some confidential data over to the public cloud.


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig12_HTML.jpg](images/487346_1_En_8_Chapter/487346_1_En_8_Fig12_HTML.jpg)


    Figure 8-12


    Databases primarily for the cloud can be stored mostly in cloud


    A completely different alternative is to use the recent *field-level encryption*
    (FLE) mechanism (Chapter [4](#487346_1_En_4_Chapter.xhtml)) which encrypts and
    decrypts certain fields or subdocuments inside the official drivers. This means
    that no confidential data ever reaches the database unencrypted, and therefore
    compliance rules requiring certain categories of data to be persisted only on-prem
    can be satisfied.


    #### Access control


    To fully prevent “leaking” of certain data, the applications on the cloud can
    connect with a user who only has read/write access to `db2` and so is not authorized
    to query the confidential data contained in `db1`.


    In Listing [8-1](#487346_1_En_8_Chapter.xhtml#PC4), we define a user for each
    application. The user for the customer-facing application on cloud will not be
    allowed to access `db1`.


    ```

    // The on-prem application user can access both databases

    db.createUser(

    {

    user: "userPrem",

    pwd: "......"

    roles: [

    { role: "readWrite", db: "db1" }

    { role: "readWrite", db: "db2" }

    ],

    }

    )

    // The cloud application user can only access db2

    db.createUser(

    {

    user: "userCloud",

    pwd: "......"

    roles: [

    { role: "readWrite", db: "db2" }

    ],

    }

    )

    Listing 8-1

    Create cloud user which can’t read private db1

    ```


    You can further limit user accounts to connecting from specific IP addresses or
    CIDR ranges with `authRestrictions`^([⁹](#fn9)) in MongoDB 3.6+. For example,
    the on-prem accounts could only be valid for login from on-prem address ranges.
    When dealing with highly confidential data, it’s often simpler and safer to create
    two completely separate deployments that can each grow horizontally through sharding
    based on their individual data growth.'
  trans: '

    #### 陈旧读取


    在某些情况下，我们可以通过读取已复制到云中辅助节点的一些稍微陈旧的数据来降低成本。这种数据可能总是有几秒钟的延迟，但在高写入工作负载期间可能会落后更多。（更多内容请参见辅助读取部分。）


    无论如何，具有异步复制的分布式系统的性质意味着，我们永远无法保证辅助节点拥有已经写入主节点的数据。辅助节点根本无法知道主节点已确认但尚未刷新到磁盘的写操作。


    因此，**如果你需要读取最新数据，你必须从主节点读取**，并产生任何相关的带宽费用。


    ### 迁移步骤


    让我们设想一下，我们计划开始将完全本地化的应用程序和集群迁移到云端，以便在完全迁移之前积累管理云基础设施的机构知识和专业技能。


    对于此示例，我们假设一个仅有两个数据中心的双分片集群，因此此次迁移的部分动机是在云端添加第三个数据中心。另一个动机是将一些应用程序服务器移动到可以每天在高峰工作负载期间上下扩展的云基础设施（图
    8-7）。


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig7_HTML.jpg](img/487346_1_En_8_Fig7_HTML.jpg)


    图 8-7


    最初，数据和应用程序都在本地


    #### 云辅助节点


    如果我们正在逐步迁移到云，作为第一步，我们有几个不同的选择。一种（如图 8-8 所示）是最初将应用程序保留在本地，并将一些辅助节点移动到云端。默认启用 `replication
    chaining`，这些节点将从其副本集中位于 DC1 或 DC2 的其他节点之一进行复制。通过将 `priority` 设置为 `0`，我们将确保这些节点永远不会成为其副本集中的主节点。如果主节点在云端，来自
    DC1 和 DC2 的所有应用程序写入流量都将被路由到云端，而复制流量将返回，从而显著增加云带宽成本。


    在云辅助节点拓扑中，带宽费用将适用于传出的心跳，但传入的 `oplog` 数据是免费的。


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig8_HTML.jpg](img/487346_1_En_8_Fig8_HTML.jpg)


    图 8-8


    辅助节点为高可用性提供了第三个位置，但应用程序保留在本地


    #### 云应用程序


    另一个第一步是将一些应用程序移动到云端，通过在停机期间缩减应用程序来节省成本（见图 8-9）。在这个阶段，我们通常会看到内部应用程序保留在本地。这些可能是来自遗留系统的写密集型
    *提取、转换和加载* (ETL) 工作负载，以及内部分析查询工作负载等。


    根据我们的最佳实践，我们将 `mongos` 路由器放置在与应用程序和微服务相同的区域/区域中。


    在这个拓扑中，我们看到我们正在为从 `mongos` 到主节点的写有效负载支付传出带宽费用。用于读取的传出请求数据包通常比返回到云的结果数据小，这使得这些操作很便宜。


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig9_HTML.jpg](img/487346_1_En_8_Fig9_HTML.jpg)


    图 8-9


    只有自动扩展的应用程序被移到云端


    #### 完全混合


    自然的下一步是将应用程序和节点都组合在云端（见图 8-10）。与之前一样，`{priority: 0}` 确保云节点永远不会成为主节点，因为我们假设大部分写操作仍然源自本地应用程序。


    我们需要为从云应用程序传出的任何字节支付带宽费用。然而，在这种情况下，客户端应用程序写入不多，因此云中的 `mongos` 和辅助节点主要*接收*字节，这不会产生费用。


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig10_HTML.jpg](img/487346_1_En_8_Fig10_HTML.jpg)


    图 8-10


    允许在云中进行辅助读取的混合拓扑


    #### 非对称分片


    我们将探索的最后迭代包括非对称分片，分片 A 完全位于本地，分片 B 大部分在云端，但所有数据至少有一个副本在本地（图 8-11）。


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig11_HTML.jpg](img/487346_1_En_8_Fig11_HTML.jpg)


    图 8-11


    一个高级拓扑，其中一个分片主节点在云端


    通过仔细地将某些数据库“归属”到分片 A 或分片 B，我们可以确保敏感的未分片集合完全位于本地。当由于公司政策或法规，某些数据子集不能存储在云中时，这可能很有用。


    请注意，通过只有两个数据中心，我们在分片 A 中失去了高可用性。但是，如果 DC2 宕机，内部应用程序实际上不会受到影响。


    在云区域中，可以将两个节点放置在不同的可用区（AZ）中以提供所需的冗余。


    #### 数据库结构


    图 8-12 展示了如何在我们的混合集群上部署两个数据库的示例。分片 A 物理上位于本地数据承载节点上，因此虽然它的分片集合（例如 `sharded1`）会有一半数据在分片
    B 中从而在云节点上，但未分片的集合（如 `onprem1` 和 `onprem2`）保证存储在完全受控的本地主机上。默认情况下，没有任何措施可以阻止云上具有足够权限的应用程序查询
    `db1.onprem1` 并将一些机密数据传输到公共云。


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig12_HTML.jpg](img/487346_1_En_8_Fig12_HTML.jpg)


    图 8-12


    主要供云使用的数据库可以大部分存储在云中


    一个完全不同的替代方案是使用近期的*字段级加密*（FLE）机制（参见第 4 章），该机制在官方驱动程序内部对某些字段或子文档进行加密和解密。这意味着没有机密数据会以未加密形式到达数据库，因此要求某些类别的数据只能持久化在本地的合规规则可以得到满足。


    #### 访问控制


    为了完全防止某些数据“泄露”，云上的应用程序可以连接一个只对 `db2` 具有读/写访问权限的用户，因此无权查询 `db1` 中包含的机密数据。


    在清单 8-1 中，我们为每个应用程序定义一个用户。面向客户的云应用程序的用户将不被允许访问 `db1`。


    ```javascript

    // The on-prem application user can access both databases

    db.createUser(

    {

    user: "userPrem",

    pwd: "......"

    roles: [

    { role: "readWrite", db: "db1" }

    { role: "readWrite", db: "db2" }

    ],

    }

    )

    // The cloud application user can only access db2

    db.createUser(

    {

    user: "userCloud",

    pwd: "......"

    roles: [

    { role: "readWrite", db: "db2" }

    ],

    }

    )

    // Listing 8-1

    // Create cloud user which can’t read private db1

    ```


    在 MongoDB 3.6+ 中，你可以使用 `authRestrictions`^(⁹) 进一步将用户账户限制为从特定的 IP 地址或 CIDR 范围连接。例如，本地账户可能仅对来自本地地址范围的登录有效。在处理高度机密数据时，创建两个完全独立的部署通常更简单、更安全，这些部署可以根据各自的数据增长通过分片进行水平扩展。

