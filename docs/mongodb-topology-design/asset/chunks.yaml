- fmt: '## Co-locating nodes


    Before diving into details, it''s also important to understand the drawbacks of
    co-locating multiple nodes on a single host for production uses. In some circumstances,
    due to budget or administrative limitations, it may be tempting to install multiple
    MongoDB components on a single host or VM. In a sharded cluster, you might plan
    to install a config server node on the same host as a shard member, or with a
    `mongos` router.


    Installing multiple components onto a single host is generally a bad idea as it
    complicates the configuration (several components share the same hostname but
    with different ports) and can make it harder to quickly comprehend logs and diagnostic
    data.


    Another issue is with the WiredTiger cache for data-bearing nodes. By default,
    this special cache reserves almost half the host''s RAM. With two nodes on one
    host, no RAM is left for filesystem cache or the operating system.


    If you must co-locate nodes, you will need to at least set the `storage.wiredTiger.engineConfig.cacheSizeGB`
    configuration option. The preferred approach is to instead use a separate VM for
    each node.


    ## Communications between components


    Since MongoDB is intended as a distributed system, the communication between components
    is a critical issue when planning a deployment.


    ### Connections and heartbeats


    All components in a MongoDB cluster need to be able to communicate with all others,
    to synchronize data, to monitor health and availability, and to react to changes.
    To facilitate this communication, each node, application (via the driver), and
    `mongos` router opens at least one connection to every other component in its
    set to send regular heartbeat messages back and forth. Should one of these heartbeats
    be delayed, it means that a component may be under extremely heavy load. If heartbeats
    are missed completely, this may indicate that the other member is unavailable
    either due to a load or a network issue. If a `primary` node misses a heartbeat,
    a failure mechanism is then triggered with timers counting down until an election
    is called to elect a replacement.


    ### Routing


    MongoDB supports a wide range of possible deployment topologies. To achieve this
    there are a number of different settings and mechanisms to automate routing of
    queries to maximize stability and performance through a special type of `load
    balancing`.


    #### Discovery


    The `server discovery and monitoring` (SDAM) specification defines how all official
    application drivers connect to and monitor complex MongoDB deployments. It specifies
    how drivers adapt to changes in the deployment such as nodes going offline, primaries
    stepping down, and network errors. It helps ensure that all drivers (no matter
    the programming language) will react in a consistent, predictable manner.


    #### Server selection algorithm


    Another specification is the `server selection algorithm` (SSA) which describes
    a sort of intelligent load balancing. The SSA is included in the driver specification
    and is followed by all official MongoDB drivers.


    This algorithm controls how the driver (inside the application space) decides
    where to route an operation to your MongoDB deployment. When working with a replica
    set, this algorithm decides whether a query is sent to the primary or a secondary.
    When communicating with a sharded cluster, it will decide which of multiple `mongos`
    nodes will be used.


    Figure [5-1](#487346_1_En_5_Chapter.xhtml#Fig1) shows the application in DC1 might
    use either `mongos` in the same DC, but will not use the `mongos` in DC2 as the
    latency is too high. The `mongos` in DC1 will route queries to the primary or
    the secondary in DC1 (but not in DC2) depending on the read preference requested.


    ![../images/487346_1_En_5_Chapter/487346_1_En_5_Fig1_HTML.jpg](images/487346_1_En_5_Chapter/487346_1_En_5_Fig1_HTML.jpg)


    Figure 5-1 Server selection in a sharded cluster


    #### Shard routers (mongos)


    Any sharded cluster should contain multiple `mongos` router nodes and `all` should
    be listed in the application''s `connection URI string` (since they are intentionally
    not automatically discovered).


    The primary purpose of multiple nodes is to allow failover should one router node
    fail completely. However, an automatic `performance` mechanism inside the driver
    is also active. This mechanism monitors the `round-trip time` (RTT) latency of
    the pool of `mongos`es. It determines a "window" of acceptable latencies based
    on the best of the `mongos` nodes available. The driver will then route queries
    to any of the `mongos`es within this latency window, effectively distributing
    the workload between them. This distribution can be critical during periods of
    exceptional load to ensure that no single `mongos` is overloaded.


    Tip: If you want to force an application to distribute load equally across all
    `mongos`es, even those with higher latency, then set a high value for `localThresholdMS`
    in the connection string.


    #### Replica set node selection


    According to best practices, your replica set nodes should be distributed over
    multiple data centers, making the latency of geographically close nodes potentially
    very different to distant ones. Since writes will always go to the primary, you
    could use a higher `priority` (in the replica set configuration) to make the primary
    be elected in the same DC as your application servers.


    Although not a default behavior, reads can be performed against secondaries also.
    This is where some clever design can allow for scalable solutions in certain cases.
    MongoDB drivers support an array of read preferences as outlined in Table [5-2](#487346_1_En_5_Chapter.xhtml#Tab2).


    Table 5-2 Replica set read preferences


    | Preference | Notes |

    | --- | --- |

    | `primary` (default) | All read operations are sent to the primary node. |

    | `secondary` | All read operations are sent to secondary nodes. If there is currently
    only a primary available and no secondaries, these operations will stall. Use
    `secondaryPreferred` instead. |

    | `nearest` | The driver will communicate with any nodes (primary or secondary)
    which fall within the lowest round-trip time (RTT) window. |

    | `primaryPreferred` | The driver will read from the primary whenever possible,
    but will fall back to a secondary node if there is no primary available. This
    is recommended for applications which need to function during `network partitions`.
    |

    | `secondaryPreferred` | The driver will read from secondaries whenever possible,
    but will read from a primary if no secondaries are available. This is a more robust
    choice than `secondary`. |


    For all read preference options except `primary`, there is the option for the
    driver to choose among several nodes, and in all cases a `maxStalenessSeconds`
    or `tag set` can be provided to control the selection.


    By specifying an explicit `maxStalenessSeconds` in the Connection URI, the driver
    will exclude any nodes whose `replication lag` is longer than this value. This
    allows clients to safely read from secondaries and despite knowing that they will
    be reading stale data, the documents returned will be at worst only a few seconds
    behind the primary.'
