  trans: '

    ### 分片键与唯一字段


    当分片键不是 `{_id: 1}` 时，可能会出现两个文档具有相同的 `_id` 字段但存在于不同分片上的情况（因为 `_id` 索引的唯一性约束是在每个分片上独立存在的）。


    #### 基于 `_id` 分片


    仅使用主键字段 `_id` 本身通常不是一个好的分片键选择。对 `_id` 字段使用 `ObjectId` 数据类型或使用自增 ID 可能会导致热点分片。`ObjectID`
    的开头几个字节是一个日期/时间戳，因此即使由不同的应用服务器生成，它们的排序顺序也几乎相同。


    虽然整数 ID 通常是递增的，但如果您的应用程序能生成带有随机前缀的 `UUID`，则可以避免热点分片问题。


    有许多更好的选择，例如使用 ID 的哈希值（例如 `{_id: "hashed"}`），这应该能更均匀地将文档分布到各个分片上。


    如果您几乎总是查询其他重要字段，可以使用复合分片键，如 `{country: 1, _id: 1}`，以受益于分片定位优化。


    #### 非唯一分片键值


    分片键没有唯一性要求，并且当多个文档共享同一个分片键值时，也不会立即引发性能问题。


    关于多个文档共享相同分片键值的主要担忧是，最终可能会创建一个 `jumbo chunk`（超大块）。这是指一个无法再拆分且大于最大块大小（默认为 `64MB`）的数据块。由于性能影响，平衡器不会迁移超大块，这最终可能导致分片不均衡。


    ### 基于时间的分片键


    使用存储*当前*日期或*插入*日期的字段作为分片键是一个糟糕的选择，因为它本质上是递增的。如果您是基于不同的日期（如客户的出生日期）进行分片，只要文档不是按此顺序批量加载，可能不会造成问题。


    以当前日期开头的复合分片键，当它是键中的第一个字段时，同样存在问题。因此，像 `{insertDate: 1, custId: 1}` 这样的分片键很可能会导致热点分片。而像
    `{custId: 1, insertDate: 1}` 这样的键则能为基于 `custId` 过滤的查询提供良好的分片定位，但如果客户 ID 值是单调递增的，同样会创建热点分片。


    本章后面，我们将探讨一些通过预拆分技术高效地将数据批量加载到分片集合中的方法。


    ### 哈希分片键


    当以“哈希”方式对集合进行分片时，使用 `numInitialChunks` 将集合预拆分为指定数量的块（例如 1024 个）。在开始导入工作负载之前，让平衡器先迁移这些空块。


    当您加载数据时，随着文档的添加，这些块会被拆分以确保它们保持在块大小限制之内。这种拆分只是更新配置服务器中的元数据，并不实际需要在分片本身上进行 I/O 操作。由于哈希算法保证了良好的分布性，在大多数情况下，即使经过额外的拆分，也几乎不会出现块不平衡，因此不需要通过迁移块来恢复分片间的平衡。


    然而，如果原始值的基数不足，哈希分片键仍然会导致超大块和平衡问题。


    ### 优化键


    即将发布的 MongoDB 版本（4.4 及更高版本）将允许通过添加一个额外字段作为复合分片键来优化现有的分片键。如果当前分片键的选择性不够，并且产生了过大而无法迁移的超大块，这种方法会很有用。


    ### 高级拆分


    在大多数情况下，只要分片键选择得当，MongoDB 的原生行为会自动平衡数据，同时拆分活动块并将其重新分配到各个分片上。


    **注意**


    每当操作分片配置或块时，您应首先通过运行 `sh.stopBalancer()` 来停止任何平衡活动。完成更改后，不要忘记再次使用 `sh.startBalancer()`
    重新启动平衡器。


    在以下部分中，我们将探讨一些手动拆分有益的情况。


    #### 提前拆分


    当您即将向 MongoDB 中的一个新集合加载大量数据时，在加载开始之前**预拆分**集合非常重要。这避免了在操作期间拆分和移动块的开销。文档将直接插入到最终所在的分片上。


    由于平衡是在块级别计算的，因此定义将包含大致相同数量待加载文档的块范围非常重要。我们要避免创建不包含任何文档的块，因为这最终会导致集群在每个分片存储的字节数方面不均衡。


    在图 10-5 中，我们看到一个集群，每个分片上有 20 个块。然而，由于自动拆分算法的特性，原始分片 A 上的块往往每个块包含稍多的文档，这意味着分片 A
    在字节大小上要大 30%。


    ![../images/487346_1_En_10_Chapter/487346_1_En_10_Fig5_HTML.jpg](img/487346_1_En_10_Fig5_HTML.jpg)


    图 10-5


    预拆分可能导致分布不均的块


    #### 手动拆分


    如果分片键/值的分布是预先已知的，并且我们没有使用哈希分片键，那么我们可以通过脚本手动进行预拆分。


    假设我们运行一个学校系统，其中学号是按升序分配的。这不是单字段分片键的好选择，我们将在本示例中探讨一些相关问题。


    之前的数据库包含 200,000 名过去和现在的学生记录，我们想要加载这些数据。我们将定义 100 个块，每个块将包含 2000 个文档。我们可以在空的分片集合
    `students` 上使用以下脚本来实现这个目标：


    ```javascript

    for (var i = 0;  i < 100; i++) {

    sh.splitAt("school.students", { studentId : 2000*i } );

    }

    ```


    如果我们立即意识到第一个学号是从 5000 开始的，我们可以安全地合并前两个相邻的空块：


    ```javascript

    db.adminCommand( {

    mergeChunks: "school.students",

    bounds: [ { studentId : MinKey },

    { studentId : 6000 } ]

    } )

    ```


    请注意，我们永远不能直接删除一个块，因为块的定义范围必须跨越从 `MinKey` 到 `MaxKey`（本质上是从负无穷到正无穷）。


    一旦平衡器移动了块，我们将看到块在可用分片之间均匀分布，如代码清单 10-1 所示的 `sh.status(true)` 输出结果。


    ```javascript

    school.students

    shard key: { "studentId" : 1 }

    unique: false

    balancing: true

    chunks:

    shardA    34

    shardB    34

    shardC    33

    { "studentId" : { "$minKey" : 1 } } -->> { "studentId" : 0 } on : shardA Timestamp(2,
    0)

    { "studentId" : 0 } -->> { "studentId" : 2000 } on : shardC Timestamp(3, 0)

    { "studentId" : 2000 } -->> { "studentId" : 4000 } on : shardB Timestamp(4, 0)

    { "studentId" : 4000 } -->> { "studentId" : 6000 } on : shardC Timestamp(5, 0)

    { "studentId" : 6000 } -->> { "studentId" : 8000 } on : shardC Timestamp(6, 0)

    { "studentId" : 8000 } -->> { "studentId" : 10000 } on : shardA Timestamp(7, 0)

    代码清单 10-1

    sh.status() 的输出，显示新分布的空块

    ```


    现在，我们之前的 `mergeChunks` 命令将会失败，因为该范围内的块位于不同的分片上，无法再轻易合并。

    '
- fmt: "### 预分片哈希分片键\n\n如果我们想确保良好的数据分布，并且知道在所有查询中主要使用特定的`studentId`进行筛选，那么可以基于哈希分片键进行分片，并立即创建1024个初始数据块：\n\
    \n```javascript\ndb.adminCommand( {\n    shardCollection: \"school.students\"\
    ,\n    key: { studentId: \"hashed\" },\n    numInitialChunks: 1024\n} )\n```\n\
    \n请注意，任何基于`studentId`值范围进行筛选，或完全不包含`studentId`的查询或聚合操作，都将在每次操作中命中**所有**分片，无法受益于分片的水平扩展能力。对于这类常见的查询模式，应避免使用哈希分片键。\n\
    \n### 预分片UUID\n\n如果我们需要在UUID或其他随机分布的十六进制值上进行预分片怎么办？UUID中的每个字符可以是`0`–`9`和`a`–`f`，共16种可能的值。\n\
    \n让我们将UUID范围分成1024个数据块。为此，我们至少需要3个十六进制位（`16² = 256`，但`16³ = 4096`），并且我们将把它们放在最高有效位（即最左边的3位）来定义范围。以下脚本将创建这些数据块：\n\
    \n```javascript\n// 为每一位使用for循环\nfor ( var x=0; x < 16; x++ ){\n    for( var y=0;\
    \ y < 16; y++ ) {\n        // 对于最内层循环，我们每次增加2，以获得总共2048次迭代\n        // 我们只使用 z=0,4,8,16\n\
    \        for ( var z=0; z<16; z+=4 ) {\n            // 现在构造UUID，用0填充\n       \
    \     // toString方法接受一个参数来指定进制\n            var prefix = \"\" + x.toString(16)\
    \ + y.toString(16) +\n                         z.toString(16) + \"00000000000000000000000000000\"\
    ;\n            // 创建相应数据块的split命令\n            db.adminCommand( { split : \"school.students\"\
    \ ,\n                               middle : { _id : prefix } } );\n        }\n\
    \    }\n}\n```\n\n### 负载定向\n\n预分片还提供了控制数据流的另一个方面。由于数据块在导入开始前就已定义，你可以快速移动数据块并将特定范围的数据分配给分片，可以手动使用`moveChunk`完成，也可以通过区域分片完成（更多示例请参见第[6](#487346_1_En_6_Chapter.xhtml)章）。\n\
    \n如果你拥有**不对称的分片**，其中一个分片存放近期数据，其他分片存放历史数据，那么你可以确保文档直接导入到目标分片上，无需后续迁移。\n\n### 无预分片的批量加载\n\
    \n如果你无法提前知道数据分布，这里有一些技巧可以高效地批量加载数据，而无需手动预分片。\n\n#### 采样与平衡\n\n一种方法是导入一小部分数据，直到创建了`N`个数据块。现在暂停导入，让平衡器将这些数据块迁移到可用的分片上。如果样本具有代表性，当我们恢复导入时，分片负载应该是分布得相当合理的。\n\
    \n#### 随机化顺序\n\n按分片键排序的数据进行批量加载，注定会带来最差的性能，因为负载会一次集中在一个分片上。避免此问题的一种方法是**随机化**待导入数据相对于分片键的顺序。如果你选择分片键是为了优化应用程序生命周期内的读取和更新，那么通过**不**按升序加载数据，你可以大大减少数据加载阶段的时间。\n\
    \n如果你能随机化从旧系统导出的数据，或按不同字段（例如，学生的姓氏而不是ID）对其进行排序，那么后续的新文档更有可能被发送到不同的分片，从而平滑每个分片的负载并最大化吞吐量。\n\
    \n### 拆分现有分片\n\n假设你有一个两分片的集群，其当前计算资源即将达到上限，而且获得购买必要新硬件的批准需要一段时间。我们最近获批增加两个新的分片。如何高效地实现这一点？\n\
    \n#### 初始加载\n\n在负载很重的系统下，将新分片链接到集群后的最初几个小时将是最关键的，因为除了现有的应用程序工作负载**外**，还有数据块迁移。迁移需要在源分片上进行大量的*读取*I/O，在目标分片主节点上进行大量的*写入*I/O工作负载，随后在目标分片的次节点上产生大量的复制工作负载。\n\
    \n#### 迁移窗口\n\n如果初始迁移可以在应用程序负载的非高峰时段，并以短窗口进行，将会缓解原始分片上的一些压力（详情请参见下文的*限制平衡影响*）。随着时间的推移，随着分片接近平衡状态，可以使用越来越长的迁移窗口。\n\
    \n#### 有丝分裂\n\n在一些分布式数据库系统中，存在*有丝分裂*的概念——将一个现有分片拆分成两个子集。不幸的是，当前版本的MongoDB尚未支持这种方法。\n\
    \n增加分片数量的一个选择是添加新的分片硬件，并让平衡器通过迁移来处理数据的再平衡。如第[6](#487346_1_En_6_Chapter.xhtml)章所述，每对源/目标分片可以并行进行一次迁移。因此，在这种情况下，将有两个到新分片的并行数据块迁移。\n\
    \n### 管理平衡\n\n在你开始决定哪些集合将被分片以及使用什么键之前，首先了解数据是如何实际平衡的会很有用。\n\n#### 主分片\n\n对集群进行分片时，你可以拥有分片集合和未分片集合的组合。每个逻辑数据库有一个单独的**主分片**（与“主”节点完全无关），所有未分片集合都驻留在此。\n\
    \n在图[10-6](#487346_1_En_10_Chapter.xhtml#Fig6)中，我们看到一个分片集群，其中有一个逻辑数据库`db1`，它包含多个集合。只有最大的集合`bigColl1`和`bigColl2`被分片，它们的文档已根据数据块平均分布在各个分片上。\n\
    \n![../images/487346_1_En_10_Chapter/487346_1_En_10_Fig6_HTML.jpg](images/487346_1_En_10_Chapter/487346_1_En_10_Fig6_HTML.jpg)\n\
    \n图 10-6\n\n一个包含一些分片集合的单一数据库\n\n根据未分片集合的大小，你可能会得到一些相当不均衡的分片。在这种情况下，分片A的大小几乎是其他分片的两倍。"
  raw: '#### Pre-split hashed shard key


    If we want to ensure a good distribution, and we know that we will mostly filter
    with a particular `studentId` in all queries, we can shard on a hashed shard key
    and create 1024 initial chunks immediately:


    ```

    db.adminCommand( {

    shardCollection: "school.students",

    key: { studentId: "hashed" },

    numInitialChunks: 1024

    } )

    ```


    Note that any queries or aggregations filtering on a range of `studentId` values
    or not including `studentId` at all will hit **all** shards on every operation
    and will not benefit from the horizontal scaling of shards. For these common query
    patterns, hashed shard keys should be avoided.


    #### Pre-split UUID


    What if we need to pre-split on a UUID or other randomly distributed hexadecimal
    value? Each character in the UUID can be `0`–`9` and `a`–`f`, giving 16 different
    possible values.


    Let’s split our UUID range into 1024 chunks. To do that we need at least 3 hex
    digits (16² = 256 but 16³ = 4096) and we’ll be putting them in the most significant
    digits (i.e., the 3 leftmost) for the ranges. The following script will create
    these chunks:


    ```

    // Use a for loop for each digit

    for ( var x=0; x < 16; x++ ){

    for( var y=0; y < 16; y++ ) {

    // For the innermost loop we will increment by 2 to get 2048 total iterations

    // We only use z=0,4,8,16

    for ( var z=0; z<16; z+=4 ) {

    // Now construct the UUID with zeroes for padding

    // toString method takes an argument to specify the base

    var prefix = "" + x.toString(16) + y.toString(16) +

    z.toString(16) + "00000000000000000000000000000";

    // The split command to creates the appropriate chunk

    db.adminCommand( { split : "school.students" ,

    middle : { _id : prefix } } );

    }

    }

    }

    ```


    #### Directing load


    Pre-splitting gives one other aspect to control data flow. Since the chunks are
    defined before the import starts, you can quickly move around chunks and assign
    certain ranges of data to shards, either manually with `moveChunk` or via zone
    sharding (see Chapter [6](#487346_1_En_6_Chapter.xhtml) for more examples).


    If you have *asymmetric* *shards* with one shard for recent data and other shards
    for historic data, then you can ensure that documents are imported directly onto
    their target shards with no further migration.


    ### Bulk loading without pre-splitting


    If you can’t know the distribution of data in advance, there are a few tricks
    to efficiently bulk loading data that don’t require manual pre-splitting.


    #### Sample and balance


    One approach is to import a small portion of the data until `N` chunks have been
    created. Now pause the import and let those chunks be migrated to the available
    shards by the balancer. If the sample was representative, when we resume the import
    we should have reasonably well-distributed shard load.


    #### Randomize order


    Bulk loading of data sorted by the shard key is guaranteed to give the worst possible
    performance, since the load will hit one shard at a time. One way to avoid that
    problem is to **randomize** the order of the data being imported with respect
    to the shard key. If you have chosen the shard key to optimize for reads and updates
    during the application lifetime, you can greatly reduce the data load phase by
    **not** loading data in ascending order.


    If you can randomize the data that is exported from the legacy system or sort
    it by a different field (e.g., the student’s last name rather than ID), then the
    load is more likely to send subsequent new documents to different shards, smoothing
    out the load on each shard and maximizing throughput.


    ## Split existing shards


    Imagine you have a two-shard cluster which is reaching the limit of its current
    computing resources, and it’s taken a while to get permission to buy the necessary
    new hardware. We recently received approval to add two new shards. How can this
    be achieved efficiently?


    ### Initial load


    With a system under heavy load, the first few hours after linking the new shards
    into the cluster will be the most critical, as there is the existing application
    workload **plus** migration of chunks. The migration requires heavy *read* I/O
    on the donor shards, as well as heavy *write* I/O workload on the recipient shard
    primary, followed by heavy replication workload on the recipient secondaries.


    ### Migration windows


    If the initial migrations can be made during off-peak application workload, and
    in short windows, some of the pressure will be relieved on the original shards
    (See *Throttling balancing impact* below for more details). Over time, longer
    and longer migration windows can be used as the shards come closer to equilibrium.


    ### Mitosis


    In some distributed database systems, there is the concept of *mitosis* – splitting
    up an existing shard into two subsets. Unfortunately, this approach is not yet
    supported by current versions of MongoDB.


    One option for doubling shards is to add the new shard hardware, and let the balancer
    handle the rebalancing of data via migration. As discussed in Chapter [6](#487346_1_En_6_Chapter.xhtml),
    each pair of donor/recipient shards can have a migration in parallel. So in this
    case there will be two parallel migration of chunks to the two new shards.


    ## Managing balancing


    Before you start making decisions about which collections will be sharded and
    with what keys, it’s useful to first understand how data is actually balanced.


    ### Primary shard


    When sharding a cluster, you can have a combination of sharded and non-sharded
    collections. Each logical database has a single **primary shard** (completely
    unrelated to “primary” nodes) where all unsharded collections are homed.


    In Figure [10-6](#487346_1_En_10_Chapter.xhtml#Fig6), we see a sharded cluster
    with a single logical database `db1` which has a number of collections. Only the
    largest collections `bigColl1` and `bigColl2` have been sharded, and their documents
    have been distributed equally across the shards based on chunks.


    ![../images/487346_1_En_10_Chapter/487346_1_En_10_Fig6_HTML.jpg](images/487346_1_En_10_Chapter/487346_1_En_10_Fig6_HTML.jpg)


    Figure 10-6


    A single database with some sharded collections


    Depending on the size of the non-sharded collections, you can get some considerably
    unbalanced shards. In this case, Shard A is almost twice the size of the other
    shards.'
