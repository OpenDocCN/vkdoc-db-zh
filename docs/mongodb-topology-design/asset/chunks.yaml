- fmt: '# Tag sets


    Specifying *tag sets* on particular nodes can be used (i) to specify particular
    physical locations for rudimentary geographical targeting within replica sets
    or (ii) to control specific read workflows when reading from secondary.


    You could, for example, send all analytics workloads to a third faraway data center
    (`DC2`) with high latency leaving the closer nodes in `DC1-a` and `DC1-b` to share
    the normal read workload. Figure 5-2 shows that while writes will always go to
    the primary, read operations will go the `DC2` when the application specifies
    a tag set with `{use: "analytics"}`.


    ![../images/487346_1_En_5_Chapter/487346_1_En_5_Fig2_HTML.jpg](images/487346_1_En_5_Chapter/487346_1_En_5_Fig2_HTML.jpg)

    *Figure 5-2. A replica set with tag sets defined on all nodes*


    Tags can be defined and changed using the `rs.reconfig(...)` method and passing
    an updated configuration document such as the one in Listing 5-1.


    ```

    {

    "_id" : "myRS",

    ...

    "members" : [

    { "_id" : 0, "host" : "mongodb0.bigbank.local:27017", ...,

    "tags": { "dc": "east-1", "use": "prod" }, ... },

    { "_id" : 1, "host" : "mongodb1.bigbank.local:27017", ...,

    "tags": { "dc": "east-2", "use": "prod" }, ... },

    { "_id" : 2, "host" : "mongodb2.bigbank.local:27017", ...,

    "tags": { "dc": "west", "use": "analytics" }, ... }

    ],

    ...

    }

    ```

    *Listing 5-1. Replica set config with region and usage tags*


    To actually use these tags, the application will need to set read preferences
    tags in a specific order for the driver to parse and use. In Listings 5-1 and
    5-2, we see an example that targets node `mongodb2.bigbank.local:27017` since
    that is the only node with a matching `use` tag. If multiple tags are sent by
    the application, each one will be attempted in order with the most overlapping
    chosen first.


    ```

    db.transactions.aggregate([...]).readPref( "secondaryPreferred",

    [ { "use": " analytics " } ] )

    ```

    *Listing 5-2. Aggregation operation using tags to target an analytics secondary*


    # Write concerns


    While writes will always be routed to the primary node, when using a custom *write
    concern* (WC), the driver will wait for other nodes to acknowledge that the write
    has been persisted before reporting a success to the application. For example,
    a write concern of `2` will require the primary and at least one secondary to
    have replicated the write before moving on. This allows the application to choose
    a custom durability for each use case and maximize performance without sacrificing
    the required durability. MongoDB drivers default to a WC of `1`, but a WC of `majority`
    is recommended for all production use cases.


    In Figure 5-3 we see the primary send the **Ack** back to the application as soon
    as one secondary (`3`) has replicated the oplog entry. The other secondary (`2`)
    will replicate as soon as possible, but the application will not wait for it.


    ![../images/487346_1_En_5_Chapter/487346_1_En_5_Fig3_HTML.jpg](images/487346_1_En_5_Chapter/487346_1_En_5_Fig3_HTML.jpg)

    *Figure 5-3. Write concern: 2 requires 2 nodes to acknowledge the change*


    ## Journaling


    An additional option, `j`, allows the application to request the server to wait
    until the write operation has been written to the on-disk journal. If this is
    set to `false`, the write is acknowledged back to the application as soon as the
    change is applied in memory, but not necessarily written to disk. When `false`,
    the application may get a slightly faster response, but risk losing the write
    completely should the host suddenly fail. The default behavior when `j` is unspecified
    will depend on the write concern used and may change between versions.


    **Warning**


    For production deployments, you should never set `{j: false}.` The journal write
    is usually very fast and can be optimized further by placing it on its own separate
    storage volume.


    ## Timeouts


    You can optionally set a `wtimeout` time limit in milliseconds for the write concern.
    If the timeout is exceeded (due to high replication lag, for example), the acknowledgment
    will be reported back to the application as failed. The operation is not terminated
    automatically after this timeout, however, and may eventually succeed on the server
    side.


    This can add significant confusion and complexity to application logic since developers
    may assume the data is lost. It is better to avoid this option and use retryable
    reads and writes instead (discussed later).


    ## Custom durability


    The application can combine write concern with tag sets to control which nodes
    should be acknowledging the write. This can be used to control replication lag
    on certain nodes (i.e., make one secondary have no effective lag at any time)
    or to ensure that two nodes in different data centers persist every write.


    This can be particularly important for configurations with nodes in multiple regions
    (shown in Figure 5-4). Here, we assume that `DC1-a` and `DC1-b` are two buildings
    in the same city, and `DC2` is in a different city. Since *node 2* is in the same
    region as the primary, it will have lower latency and will normally replicate
    faster. In times of network pressure or network instability, you may get an application
    with write concern `2` returning a success to the application, but the remote
    data center lags several minutes behind in its replication. Should the entire
    `DC1` region fail together, those last several minutes of writes will have been
    lost.


    ![../images/487346_1_En_5_Chapter/487346_1_En_5_Fig4_HTML.jpg](images/487346_1_En_5_Chapter/487346_1_En_5_Fig4_HTML.jpg)

    *Figure 5-4. Unstable network leads to distant nodes with unacceptable lag*


    To ensure that the write is replicated to at least two separate regions, we can
    define a custom write concern level called `multi_dc` which requires nodes with
    two different values for the tag `region`:


    ```

    conf = rs.conf();

    conf.settings = {

    getLastErrorModes: { multi_dc : { "region": 2 } }

    };

    rs.reconfig(conf);

    ```


    Then the application can use this custom `multi_dc` write concern for important
    inserts or updates to force updates in both regions:


    ```

    db.collection.update( { _id: 123, status: "Important" },

    { writeConcern: { w: "multi_dc" } } )

    ```


    In this example, it doesn''t matter which of the three nodes is primary at the
    time, we will always replicate the change to both `DC1` and `DC2`.


    # Read concerns


    A related concept is read concern which allows you to control the consistency
    and isolation of read operations from replica sets and shards. For example, a
    system exclusively using write concern `majority`, together with a read concern
    of `majority,` can be sure that the data returned has been acknowledged by a majority
    of the replica set members. In other words, the documents returned by the read
    operation are durable, even in the event of any member failure.'
