  trans: '

    ## 检查清单


    总之，以下是保护 MongoDB 部署应采取的所有步骤的检查清单：


    1.  启用身份验证（并创建具有完成其用例所需的最小权限的 MongoDB 用户），如果可用，请使用 Kerberos 进行外部身份验证。

    2.  通过阻止来自所有非受信 IP/网络的传入连接并阻止所有非关键端口来保护网络基础设施。

    3.  确保主机上的大多数用户只能读取而不能修改 MongoDB 数据或日志文件。

    4.  配置所有组件之间的加密（内部身份验证、复制）以及使用定义明确的 x.509 证书从客户端进行的加密。

    5.  使用文件系统加密或使用定期轮换的主密钥的应用程序级加密来加密静态数据（仅限企业版）。

    6.  将审计日志发送到集中式日志服务器（仅限企业版）。

    7.  编校日志文件，避免将敏感用户数据泄露到日志中（仅限企业版）。

    8.  禁用服务器端 JavaScript。

    9.  强制执行 SELinux。

    10. 在不再需要时（即人员离开团队时）删除用户帐户。

    11. 尽快升级到任何 MongoDB 次要版本，以利用安全修复。

    12. 监控安全警报页面 [`www.mongodb.com/alerts`](http://www.mongodb.com/alerts) 以获取任何更新。


    脚注 1   2


    # 4. 合规性与 GDPR


    > *依赖政府来保护你的隐私，就像要求一个偷窥狂来安装你的百叶窗。*

    >

    > ——约翰·佩里·巴洛，网络自由主义者、政治活动家、电子前沿基金会创始成员


    > *将消费者隐私作为竞争差异化点的企业将赢得更高的客户忠诚度。*

    >

    > ——皮埃尔·南特梅，埃森哲董事长兼首席执行官


    > *数据隐私已不再仅仅是律师们的事情。在领英，我们称之为隐私文化。*

    >

    > ——卡琳达·瑞纳，领英全球隐私主管


    存储海量数据的能力为强大的分析洞察创造了机会。随着世界各地新数据保护法规的出台，它也给公司带来了合规和安全风险，因为数据通常被倾倒到数据湖或数据仓库中，而没有适当的标签、审计或策略执行。


    MongoDB 提供了许多功能来减轻遵守隐私法规（如被遗忘权和导出个人数据权）的部分负担。其他义务，例如在 72 小时内通知用户其数据泄露的要求，则需要定制的
    `业务工作流程` 和 `应用程序端准备`。


    ## 通用数据保护条例


    虽然许多法规，如欧盟的 `通用数据保护条例` (GDPR)，看起来极其复杂，但实际上它们是许多行业最佳实践的法典化。尽管 GDPR 是一部基于欧盟的法律，但它适用于全球任何存储或处理欧盟公民数据的组织。不合规的罚款很高，最高可达
    2000 万欧元或违规组织全球年收入的 4%，以较高者为准。不太严重的侵权行为仍面临一半的罚款。(³)


    在本章中，我们将讨论在现实世界的 MongoDB 部署中存储用户结构化数据时的主要合规性问题。通过正确的设置，现成的 MongoDB 工具可以提供关于存储了什么数据以及如何使用这些数据的可见性和透明度。MongoDB
    Enterprise 和 MongoDB Atlas 包含额外的安全和隐私功能。


    作为世界上最严格、最全面的法律规定，我们将以 GDPR 作为本章大部分讨论的基础，尽管我们也会探讨世界其他地区其他相关法规的显著差异。


    ### 隐私设计


    在运行数据库时，隐私法规范了组织如何收集、存储、处理、保留和共享欧盟公民的个人数据，即使对于处理或存储欧盟公民数据的外国公司也是如此。


    本章重点介绍 MongoDB 拓扑设计如何满足数据保护法规。我们涵盖了大多数法规的基本要求，以及某些 MongoDB 功能如何被用来，例如，根据角色隐藏特定数据，并作为“被遗忘权”的一部分删除用户数据。


    ### 注意事项


    GDPR 要求有明确证据表明组织正在持续进行合规努力。这使得有必要持续监控您的数据处理实践，并充分应对任何新出现的隐私和安全风险，以确保数据保护流程持续有效。


    免责声明


    为确保遵守适用于您所在国家或业务所在国家/地区的任何类似 GDPR 的法律，您应直接审阅相关法律（例如 `GDPR (条例 (欧盟) 2016/679)`），并寻求法律咨询，以便在您的情况下正确应用这些法律。


    ## 数据保护


    从高层来看，GDPR 涵盖了“被遗忘权”、“审查权”以及关于任何数据泄露或处理不当的“知情权”。


    本节将深入探讨一些对于设计、架构或使用 MongoDB 实施数据收集、存储或处理的人员特别关注的问题。


    ### 关键概念


    在深入细节之前，了解一些与全球所有数据保护法规相关的关键概念非常重要。


    `数据控制者` 是指收集、存储和处理关于个人（称为 `数据主体`）以及其他公司数据的组织。`数据处理者` 是指执行处理工作的雇员、承包商或软件工具（如 MongoDB
    或应用程序）。数据控制者有责任确保数据处理者有能力并配置为满足适用合规法规规定的所有隐私和安全要求。


    对于任何拥有国际客户的组织来说，这实际上意味着他们需要遵循每个客户所在地区的法规。如果您的数据库中有欧盟客户，并且您在欧盟运营，那么您需要确保您的数据存储满足所有
    GDPR 要求；否则，您将面临违规和处罚的风险。


    ### 个人身份信息


    `个人数据` 是与可识别的个人相关的任何信息，但不一定识别该个人。另一方面，`个人身份信息` (PII) 是任何可能识别特定个人的数据。表 4-1 显示了哪些类型的数据是个人身份信息，哪些不是。


    表 4-1


    个人数据类型示例及哪些是 PII


    | 个人身份信息 (PII) | 个人数据 (非 PII) |

    | --- | --- |

    | • 全名• 社会保险号码• 驾照号码 | • 设备 ID• IP 地址• Cookie |

    '
- fmt: '## Data privacy and GDPR


    ### Definitions


    There are a lot of legal terms that make up the EU regulations which are used
    in the following section. Table 4-2 defines the most relevant terms.


    Table 4-2: Summary of key concepts and definitions


    | Term | Definition |

    | --- | --- |

    | Entity | A person, legal corporation, organization, public authority, agency,
    or group who controls or processes data. |

    | Data controller | An entity who determines the `purposes` and `means` of processing
    personal data (this can be determined alone, or jointly with another person/company/body).
    |

    | Data subject | An identified or identifiable natural person referenced by identifying
    data values, also known as a `user`. |

    | Data processor (DP) | An entity responsible for processing personal data on
    behalf of a data controller. This person is legally responsible for any breaches.
    In our context, data processors can include IT team leads, application devs, DBAs,
    QA teams, release managers, and DevOps engineers. |

    | Data protection officer (DPO) | A role within an organization whose responsibility
    is to ensure the internal application of the regulations, and protect data subjects
    from being adversely affected by the processing operations. |

    | Personal data | Any information that uniquely identifies an individual (e.g.,
    a mobile phone device ID) and that `relates to` an identifiable individual. Any
    data which is truly anonymous (or fully anonymized) is not included in GDPR or
    any other regulations covered here. |

    | Identifier | Any `types` of data that separately or in combination identify
    an individual, such as • Name • Social security, or tax file number • Location
    data • Username • Birthday |

    | Online identifier | A specific subset of identifier for online data such as
    • IP address • MAC (network card) address • Browser cookie |

    | Related factor | Other details about a personal such as physical or genetic
    data. |

    | Data items | The actual field `values` stored in the database about a person.
    |


    ### Representatives


    The GDPR requires corporations to have a local representative in the EU who is
    legally responsible that the regulations are applied and data protections are
    being followed. This allows that representative to suffer legal consequences should
    data be misused or abused, making it easier to apply fines and penalties.


    ## Data portability


    Data portability is a relatively new requirement in the world of data protection
    regulations and was created in the hope of protecting consumers from *vendor lock-in*.
    The topic is addressed in GDPR Article 20: Right to data portability (Chapter
    3).


    It means that companies must be able to supply or transfer all personal data collected
    about their customers upon request and in a structured, machine readable format.


    With good document design in MongoDB, this requirement can be quite easily met
    in terms of personal data. How easy it is to discover, identify, and collect this
    data may depend on the schema design chosen and the level of validation applied.


    Tip


    `MongoDB Compass`''s "Analyze Schema" functionality can be used to more easily
    find `identifier` fields.


    Exporting any relevant documents in JavaScript Object Notation (JSON) format should
    be sufficient in terms of machine readability.


    A MongoDB `View` (based on an `aggregation pipeline`) could be developed using
    `$lookup` to bring together related documents from other collections, reformat
    certain fields, and exclude others.


    ## Data size


    Historical data collected from customer''s Internet of Things (IoT) devices is
    considered personal data and should be exportable. In this case, you need to be
    able to provide or transfer large volumes of data. Structuring and storing data
    in an efficient, compact way can be important for both storage and bandwidth costs.


    Consider using a *storage aggregation* technique to aggregate older data into
    lower-precision buckets allowing generalization of long-term trends without storing
    exact data. For example, you might retain hourly data points for up to one month
    and then keep only daily averages for up to a year.


    ## Retention of personal data


    GDPR Article 13 (clause 2a) reads as follows:


    > *the controller shall, at the time when* *personal data* *are obtained, provide
    the* *data subject* *with the following further information necessary to ensure
    fair and transparent processing: (a)* ***the period*** *for which the* *personal
    data* *will be stored…*


    This clause requires that the data controller knows *the period for which the
    personal data will be stored* in advance and communicates that to end users. You
    should have at least a policy in place to timestamp data upon collection and a
    means to rotate it.


    ### Automatic removal


    In one approach to automating the removal of old data, each document could have
    a field like `dateCollected` and a `time-to-live (TTL) index` on this collection
    linked to that field to automatically and completely remove documents after 12
    months or so.


    You should be careful about batch deletions since they can have performance implications
    to the replication process, especially for releases before MongoDB 4.0. A large
    batch of operations all occurring in the same few seconds can overwhelm the I/O
    and stall other operations momentarily. Ensure that the date values are granular
    enough to avoid this (a minute-level granularity usually works well). Also, be
    careful when importing or migrating data into MongoDB that you don’t set the date
    field of a large number of documents to the same single placeholder date or to
    the timestamp that the import processes started. This can stall replication as
    described earlier if the TTL index suddenly kicks in 12 months later.


    In Listing 4-1 we see message logs stored with date at the minute granularity
    level, and a time-to-live index which will automatically purge them after one
    year (365 days). Depending on the load of the system, this should create sufficiently
    small batches to avoid risking stalls.


    ```

    db.msglog.insertOne(

    { from: "nic", to: "sophie",

    createDate: ISODate("2019-11-04T20:55"),

    msg: "What’s for dessert?" });

    db.msglog.createIndex(

    { "createDate": 1 },

    { expireAfterSeconds: 365*24*3600 } )

    ```

    Listing 4-1: Time-to-live index to delete data after one year


    ### Custom redaction


    Another option for purging personal data is to use a `cron` job to initiate a
    more fine-grained or custom cleanup of older personal data. For example, you could
    use `$unset` update command to delete certain fields from documents after a predefined
    time period (see Listing 4-2).


    Note


    MongoDB''s Realm serverless platform includes "Scheduled Triggers" which allow
    arbitrary JavaScript functions to purge, trim, or aggregate documents at predefined
    intervals.


    The code in Listing 4-2 performs a sort of "rolling redaction" of collected data,
    purging `PII` fields but leaving other fields in place that can still be data-mined
    later for other trends and correlations without risking exposure of stored personal
    data.


    ```

    db.msglog.insertOne(

    { from: "nic", to: "sophie",

    createDate: ISODate("2019-11-04T20:55"),

    msg: "What’s for dessert?",

    metadata: {

    deviceId: "34-A4-8C-71",

    deviceName: "iPhone XS",

    ip: "123.45.67.89",

    gps: { lat: 48.86, long: 2.349 }

    }});

    db.msglog.update(

    { _id: ObjectId(1234...) },

    { $unset: {metadata: "" } )

    ```

    Listing 4-2: Unset certain metadata when it is no longer necessary'
