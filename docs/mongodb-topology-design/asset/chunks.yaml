  trans: '

    # 可重试写入与读取


    从 MongoDB 3.6 版本开始，各驱动程序能够在某些故障（例如瞬时网络问题或副本集主节点切换）发生时，**一次**重试写入和读取操作。从应用的角度来看，这提高了稳定性，且不会给服务器带来过载的风险。


    对于为 MongoDB 4.2 及更高版本设计的驱动程序，可重试写入已成为默认行为，并可通过连接 URI 的 `retryWrites` 和 `retryReads`
    选项进行控制。


    # 降级测试


    当你开始拥有多个数据中心或更大的集群时，网络问题的可能性会急剧增加。由于存在多个网络交换机和互联网骨干网，故障点很多。虽然 TCP 层会自动重试数据包并绕过故障，因此通常可以避免完全的路由故障，但性能会受到严重影响。


    在构建集群时，模拟此类降级网络环境非常重要，以便正确测试故障切换处理，并确保 MongoDB 集群中的所有组件都经过充分配置和准备，能够优雅地处理此类事件。


    ## 网络饱和


    你可能会遇到这样的情况：网络上的其他工作负载足以使某个特定交换机饱和，从而导致某个子网和分片集群中的少数节点出现极端的数据包延迟。如果受影响的节点承载的是副本集中的从节点，即使是定期的性能下降也可能不明显。


    然而，设想一下：由于当前主节点所在主机进行计划维护而触发了一次选举，其中一个受影响的节点成为了新的主节点。现在，一个分片的主节点受到了这种网络饱和的影响，连接突然因套接字超时而失败。我们该如何诊断和修复这种情况呢？


    ### 诊断


    这里，我们将提及一些可能有用的工具和方法：


    ```

    ping

    ```


    这个常用工具对于确认副本集配置中使用的主机名是否确实解析到预期的 IP 地址并具有有效路由非常有用。在通过虚拟私有云连接的混合本地和云数据中心环境中，这可能是一个特别棘手的问题。


    ```

    netstat -s

    ```


    此命令从本主机视角输出关键网络指标的摘要，包括关于已发送数据包总数以及有多少数据包被延迟或丢失的历史信息。


    如果观察到数据包丢失，下一步是确定数据包丢失开始发生的位置。可以使用 `traceroute`（Linux）或 `tracert`（Windows）检查通往目的地路径上的每一跳。


    ```

    tcpdump -i any -w /tmp/out.file

    ```


    这是一个通用的数据包分析器，也可以捕获通过网络传输或接收的所有 TCP 数据包，并可选择按端口或远程主机 IP 进行过滤。捕获数据后，可以在 `Wireshark`
    中可视化数据，以跟踪流程并调试诸如 TLS 握手或意外断开连接等问题。


    ```

    iftop

    ```


    类似于 `top` 和 `iotop`，此工具按远程主机分组显示当前网络流量摘要。这对于监控初始同步期间的实际峰值带宽或监控复制流量非常有用。


    ### iPerf3


    `iPerf3` 是一个跨平台工具，用于测量 IP 网络上的最大可实现带宽。它可以用于模拟真实的 MongoDB 流量，具有多个同时连接，可设置运行时间并定期报告输出。


    例如，以下命令设置一个客户端和一个服务器，运行一个使用 50K 大小的 TCP 数据包和 15 个并行流的双向测试，测量双向带宽。


    服务器端：`iperf3 -s -f K`


    客户端：`iperf3 -c <服务器 IP> -f K -w 50K -R -P 15 --get-server-output`


    ## 数据包丢失的常见原因


    网络上的数据包丢失可能由多种原因引起。如果你遇到数据包丢失，以下部分描述了一些你可以排查的可能问题。


    ### 链路拥塞


    当过多的流量通过一个已饱和的网络（或单个交换机）时，可能会发生这种情况，结果是一些数据包可能会被丢弃。


    如果无法通过引入更高效的查询、减少分片平衡或改变写入模式以减少操作日志来降低网络压力。


    然而，实际上，增加带宽是最快、最具成本效益的方法。


    ### 错误的协议配置


    偶尔，传输路径上两个网络设备之间的最大传输单元或双工模式不匹配可能导致冲突，并最终导致链路上的数据包丢失。


    双工不匹配通常可以识别，因为它会导致不对称的数据包丢失（即仅在一个方向上），并且数据包丢失是持续的。在现代硬件的大多数情况下，启用双工自动协商将解决不匹配问题。


    ### 错误的防火墙配置


    配置错误的防火墙可能在发生选举之前一直未被发现。想象一个从节点，当主节点位于同一子网时能够从某个主机复制数据，但当选举导致另一个主机成为主节点时，错误配置的防火墙规则导致所有传入数据包被丢弃。由于所有节点都会持续尝试发送健康检查
    ping，你应该已经能在日志中看到警告。


    **注意**

    MongoDB 日志中的任何警告都应认真对待，并尽快纠正。虽然它们可能看起来没有产生任何负面影响，但如果集群状态发生变化，这可能表明了停机的一个根源。


    ### 故障硬件或软件


    还有许多其他不常见的情况可能导致网络性能突然下降，例如交换机过热、电缆故障等。网络交换机拥有自己的处理器，已知其中包含软件错误，这些错误会导致在某些边缘情况下数据包处理或路由失败。


    在其他情况下，感染网络内部机器的恶意软件可能导致流量突然激增，这就像内部拒绝服务攻击一样，影响正常的 MongoDB 流量。


    # 故障排除技巧


    本节介绍在规划复杂部署时的一些技巧，以便在组件随时间增加时，使故障排除和维护更加容易。


    ## 端口


    在构建一个相对简单的分片集群时，会运行许多不同类型的组件，包括配置服务器、`mongos` 路由器和分片 `mongod` 节点。即使每个组件都运行在自己的虚拟机和唯一的主机名上，也强烈建议在整个组织中使用标准化的端口编号方案，如表
    5-3 所示。这使得系统管理员、数据库管理员以及任何第三方监控或支持工具都能快速识别每个节点的角色。


    **表 5-3**

    根据组件角色分配端口的示例


    | 组件 | 进程名 | 端口 |

    | --- | --- | --- |

    | 配置服务器 | `mongod` | 27019 |

    | 独立节点 | `mongod` | 27016 |

    | 分片节点，或副本集成员 | `mongod` | 27018 |

    | 分片路由器 | `mongos` | 27017 |


    如果日志中出现错误消息或通过驱动程序报告给应用程序，仅凭端口号，我们就可以快速判断问题是否与配置服务器或分片节点有关。

    '
- fmt: '### Time zones


    When using data centers in multiple countries, and to simplify troubleshooting
    from logs from multiple different components, it is recommended to set all hosts''
    system clocks to Coordinated Universal Time (UTC).


    Note

    The abbreviation UTC is a compromise solution since the English proposed CUT (for
    "coordinated universal time") and the French TUC (for "temps universel coordonné").


    Some agents and drivers will always log in UTC, so by forcing this time zone setting
    deployment-wide, it makes it much easier to align different components timelines
    in logs to debug any issues.


    On Linux systems, forcing UTC/GMT can be set with


    ```bash

    ln -sf /usr/share/zoneinfo/Etc/UTC /etc/localtime

    systemctl restart rsyslog

    ```


    ## Key takeaways


    This chapter has covered a lot of detail about MongoDB deployments on different
    data center configurations.


    The key takeaways are as follows:


    *   MongoDB components need to be able to communicate with each other to transfer
    data and share health information.

    *   A configuration with three data-bearing nodes across three data centers is
    the recommended topology to maximize availability and redundancy.

    *   Many MongoDB components (including the drivers and `mongos` routers) automatically
    consider round-trip time when choosing where to query data.

    *   It''s important to test any configurations for performance before moving into
    production.


    # 6. Global Topologies


    This chapter continues with a deeper dive on topology recommendations for different
    types of global sharding options depending on whether low latency or data control/sovereignty
    is the priority.


    ## Key concepts


    Before exploring some practical details about different global topologies, let’s
    review our understanding of sharding and `zones` in particular.


    ### Chunks, splitting, and migration


    As you will remember from Chapter [1](#487346_1_En_1_Chapter.xhtml), when sharding
    a collection, documents are broken into chunk ranges based on the shard key, and
    these chunks are distributed across the available shards. Chunks are normally
    capped at 64MB to allow reasonably quick migrations when necessary.


    After many inserts, these chunks will be split into smaller chunks and may be
    migrated from one shard with too many chunks to another shard that has fewer.
    The goal of this subsystem is to equally balance the number of chunks between
    all available shards.


    So even if we start off with one shard having documents with field `country` equal
    to “US”, and another shard having all the documents with value “UK”, there’s no
    guarantee by default that this will remain the case forever .


    ### Shard key


    Chapter [1](#487346_1_En_1_Chapter.xhtml) introduced the shard key as a collection-specific
    setting which defines which fields from the documents will determine the chunk
    range and ultimately to which shard the document will be routed.


    When using a `compound` shard key, the combination of fields determines the chunk.
    When we plan geographic distribution of data on MongoDB, the first field of the
    shard key **must** be the geographic component (country code, zip code, etc.)
    to allow for grouping of chunks.


    Note

    When setting up any type of zone sharding, avoid using hashed shard keys since
    the zone is based on the hashed value of the entire key and so it’s impossible
    to control where ranges of the original value will be. See Chapter [11](#487346_1_En_11_Chapter.xhtml)
    on extreme sharding for more details.


    ## Global sharding


    For any large application with a user base outside a single city or state, it
    becomes important to consider sharding by region. There are numerous reasons for
    this, including reducing the latency (round-trip from application to primary node),
    the cost of bandwidth (usually incurred between data centers/regions even on the
    same cloud provider), and compliance readiness. MongoDB provides the ability to
    design and build a topology which meets all these needs without sacrificing the
    high availability and redundancy which is so essential for most production workloads.


    ### Bandwidth requirements


    Imagine you are running a US-based business with half of the customers residing
    on the east coast and the other half in California. A single replica set, while
    providing high availability, will require that all data is replicated across the
    set with Californian data stored in Virginia and vice versa. The best solution
    is to move to a sharded configuration even if the data size is not approaching
    our 2TB heuristic for shard size.


    In Figure [6-1](#487346_1_En_6_Chapter.xhtml#Fig1), we see a sharded cluster with
    one shard in California and one in Virginia. Each data center has its own application
    server and `mongos` router. The zone sharding has been configured by state so
    that customer data is stored approximately on the shard closest to them.


    ![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig1_HTML.jpg](images/487346_1_En_6_Chapter/487346_1_En_6_Fig1_HTML.jpg)


    Figure 6-1. Sharding to minimize bandwidth requirements


    Using similar DNS routing service available in AWS or other providers, customers
    are also routed to the application server closest to them. In most cases, data
    will be transferred within the data center, although in some cases some queries
    may need to be routed to the other data center. Operations on unsharded collections,
    such as system-wide configuration, may still hit the “remote” shard.


    Note that we leverage the multiple data centers to keep a copy of the config replica
    set in DC2. Remember that the `config` database contains critical mapping data
    for which chunk ranges reside on which shard.


    There are certain downsides with this approach. One is that all three copies of
    the West data are in the same region. This risk can be somewhat minimized by hosting
    each node in a separate availability zone (AZ). Otherwise, region-wide problems
    could take down an entire shard and any unsharded collections stored there.


    ### Low-latency requirements


    The most common reason for global sharding topologies is to minimize latency for
    the end users. On a global scale, the only way to achieve this is to partition
    the data based on the likely location of the customer and allow writes and reads
    via MongoDB nodes in a geographically close data center.


    ## Setting up a zoned cluster


    In this section, we’ll work through an example of using zoning rules on a global
    cluster as its needs change over time.'
  raw: '### Time zones


    When using data centers in multiple countries, and to simplify troubleshooting
    from logs from multiple different components, it is recommended to set all hosts''
    system clocks to Coordinated Universal Time (UTC).


    Note


    The abbreviation UTC is a compromise solution since the English proposed CUT (for
    "coordinated universal time") and the French TUC (for "temps universel coordonné").


    Some agents and drivers will always log in UTC, so by forcing this time zone setting
    deployment-wide, it makes it much easier to align different components timelines
    in logs to debug any issues.


    On Linux systems, forcing UTC/GMT can be set with


    ```

    ln -sf /usr/share/zoneinfo/Etc/UTC /etc/localtime

    systemctl restart rsyslog

    ```


    ## Key takeaways


    This chapter has covered a lot of detail about MongoDB deployments on different
    data center configurations.


    The key takeaways are as follows:


    *   MongoDB components need to be able to communicate with each other to transfer
    data and share health information.


    *   A configuration with three data-bearing nodes across three data centers is
    the recommended topology to maximize availability and redundancy.


    *   Many MongoDB components (including the drivers and `mongos` routers) automatically
    consider round-trip time when choosing where to query data.


    *   It''s important to test any configurations for performance before moving into
    production.


