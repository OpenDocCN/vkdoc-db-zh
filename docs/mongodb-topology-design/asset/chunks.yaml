    ### 网络分区


    当你有一个分布在多个数据中心、通过网络主干连接的数据库时，数据中心之间的连接可能会间歇性甚至长时间故障。我们无论如何都要避免数据损坏或不一致，因此在某些情况下，部署会自动切换到只读模式，以避免同一文档在两个不同地点被同时编辑的情况。


    让我们考虑图 2-9 所示的例子。这里，我们只访问两个数据中心——一个被视为“生产”站点，另一个是“灾难恢复”站点。基于这种设计理念，数据中心 2 中的副节点主要目的是作为灾难恢复的备用节点。可能节点的优先级已被调整，使得数据中心
    1 中的节点具有更高的优先级，从而有效地阻止节点 3 成为主节点。如图所示，网络分区只是断开了一个成员。数据中心 1 中存在一个`quorum`（投票节点的多数），因此不需要选举，主节点也无需更换。


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig9_HTML.jpg](img/487346_1_En_2_Fig9_HTML.jpg)


    图 2-9

    （左）在数据中心 2 中有一个成员的副本集。（右）网络分区断开了数据中心 2 的节点


    现在让我们考虑图 2-10 中有两个应用服务器的例子。它们可能配置了负载均衡器，或者根据某些自定义路由，靠近数据中心 2 的用户使用该应用服务器。如果网络故障将数据中心
    1 与数据中心 2 分区，数据中心 1 内部将发生选举并选出新的主节点。数据中心 2 中的应用仍能从其本地节点读取旧数据，但既不能写入，也无法从主节点接收任何更新。


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig10_HTML.jpg](img/487346_1_En_2_Fig10_HTML.jpg)


    图 2-10

    （左）包含副应用服务器的部署。（右）网络分区意味着副应用服务器只能读取


    ### 硬件故障


    对于副本集的所有其他成员来说，成员节点由于硬件或软件故障而离线，与该节点失去网络访问权限是一样的。图 2-11 显示将发生选举，仍然相互通信的两个节点拥有举行选举的法定人数。应用服务器将自动重新连接到新的主节点，以重试任何待处理的写入。


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig11_HTML.jpg](img/487346_1_En_2_Fig11_HTML.jpg)


    图 2-11

    （左）主节点单独在数据中心 2 中。（右）主机/节点故障将导致选举但不会造成停机


    ### 远程数据中心故障


    另一种常见情况，特别是对于内部应用，是数据库运行在公司数据中心内，但应用程序运行在其他地方——办公室网络或员工的个人电脑上。图 2-12 是一个例子，其中拥有大多数节点的“生产”数据中心
    1 离线了。从应用程序和节点 3 的角度来看，网络分区的实际结果与节点 1 和 2 同时崩溃是一样的。然而，在数据中心 1 内部，主节点保持不变，因为这两个节点仍然可以形成法定人数。如果应用程序当时正在写入更改（即使使用了多数写入关注），问题就会出现。节点
    1 和 2 可能已确认了一些尚未复制到节点 3 的写入。如果应用程序从数据中心 2 的副节点读取，它将错过那些写入。


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig12_HTML.jpg](img/487346_1_En_2_Fig12_HTML.jpg)


    图 2-12

    如果配置了 `primaryPreferred` 读取偏好，远程应用程序将连接到副节点并执行读取


    通过手动干预，我们可以在节点 3 上重新配置副本集，并完全从成员列表中移除节点 1 和 2。这将使节点 3 成为唯一的剩余节点并成为主节点，但一些写入已经丢失，并且当数据中心
    1 重新上线时无法整合这些更改。


    这是为什么 3 数据中心配置更可取的另一个例子。即使整个数据中心宕机也绝不意味着缺乏法定人数，也不需要手动干预。


    ### 存储卷故障


    一个不太常见但更难处理的问题是存储卷出现问题，导致无法及时进行 I/O，但问题又不严重到完全阻止节点运行。想象一下图 2-13 中存储设备的微妙硬件故障。它没有以通常的每秒
    2000 次 I/O 操作（`IOPS`）的容量运行，而是突然只执行 200 `IOPS`（或者停顿然后短时间爆发式工作）。作为副本集的成员，它仍然响应 ping
    并通过所有健康检查。因此没有理由触发选举。相反，副本集现在只能以之前容量水平的 10%来处理传入的写入。


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig13_HTML.jpg](img/487346_1_En_2_Fig13_HTML.jpg)


    图 2-13

    如果其存储变得无响应，存储节点看门狗将使节点离线


    一个部分的解决方案是 `Storage Node Watchdog`（自 MongoDB 4.2 起在社区版中可用）。这是一项可选服务，监控其节点上文件系统的健康状况，并在检测到无响应的文件系统时触发节点关闭。如果此节点是主节点，它还将导致选举发生，从而有效地将处理写入的责任传递给副本集的另一个成员。


    ### 网络性能下降


    由于故障网络导致丢包影响带宽，可能会出现与前面类似的情况（图 2-14）。由于健康检查 ping 最终通过`TCP`重试成功，因此不会触发选举。在 MongoDB
    中，选举在连接中断和应用重试方面会产生开销，因此该算法避免让主节点下台，除非它确信有更合适的候选节点。在这种情况下，需要网络管理员在网络基础设施本身上建立监控和警报。在这种情况下，数据库管理员可能会选择在网络稳定期间触发故障转移或调整成员优先级。


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig14_HTML.jpg](img/487346_1_En_2_Fig14_HTML.jpg)


    图 2-14

    数据中心 1 中的节点经历网络性能下降但仍保持主节点


    ### 共享虚拟机主机


    现在企业在其本地数据中心部署应用程序时使用`VM`主机非常普遍。这增加了一层额外的复杂性，因为嘈杂的邻居可能会窃取资源，或者错误配置可能导致内存使用未达到最优（例如`内存超量使用`或过度的`内存交换`）。除了这些性能问题之外，将同一副本集的多个
    MongoDB 节点共同定位还会合并故障点。例如，在图 2-15 中我们看到大多数节点驻留在单个物理`VM`主机上。如果此主机遭受硬件故障或因紧急维护而被关闭，这两个节点将突然一起故障，副本集将变为只读。


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig15_HTML.jpg](img/487346_1_En_2_Fig15_HTML.jpg)


    图 2-15

    共同位于同一虚拟机主机上的节点增加了联合故障点

    '
- fmt: '### Shared storage area network


    另一个可能出乎意料的故障点是共享网络存储的“倒金字塔”结构。在许多虚拟主机配置中，会有一个通过光纤通道连接的共享存储服务器，但它被多个VM主机共享（图 [2-16](#487346_1_En_2_Chapter.xhtml#Fig16)）。即使每个MongoDB节点拥有独立的物理CPU和内存，一旦SAN发生故障，所有节点也会随之故障。再次强调，使用三个独立的数据中心可以完全避免这种故障场景。


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig16_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig16_HTML.jpg)


    图 2-16

    共享的SAN可能引入一个意外的故障点


    ## Unbalanced hardware


    想象这样一种情况：为了减少延迟，主节点被设计为与应用服务器共同位于第一个数据中心中。该节点被赋予较高的优先级，因此当所有节点都可用时，它应该能赢得选举。由于它需要处理应用程序的读写操作，所以为其分配了更多的内存和CPU。其他节点的资源则较少。位于次要数据中心的节点甚至被赋予优先级0，以确保它永远不会被选为主节点（见图
    [2-17](#487346_1_En_2_Chapter.xhtml#Fig17)）。


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig17_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig17_HTML.jpg)


    图 2-17

    一个副本集，其指定的主节点拥有双倍的内存和CPU资源


    现在，让我们想象一下如果主节点主机发生故障会发生什么。DC1中的次要节点被选为主节点，但它的资源只有旧主节点的一半。它只能将一半的旧缓存装入内存；它将需要做更多的I/O操作来刷新脏缓存并从磁盘加载数据。其影响是写入性能会显著下降到远低于之前水平的一半。应用程序性能很可能会对终端用户产生明显的负面影响。


    在图 [2-18](#487346_1_En_2_Chapter.xhtml#Fig18) 中，我们为DC1中的次要节点分配了相同的资源，现在只有DC2中的节点拥有
    half the resources. Now if the primary fails, the secondary in DC1 will again
    be elected to replace it, and can function the same, but if the application is
    using `majority write concern` to avoid rollbacks, it is now waiting for the only
    other available node to replicate the writes. Since the `oplog` entries must be
    applied in order, any processing lag in the underresourced secondary will now
    make the application wait. In effect, the application is still waiting on a node
    with half the resources to write all the same changes and update all the same
    indexes.


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig18_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig18_HTML.jpg)


    图 2-18

    一个副本集，其中资源不足的次要节点作为备用


    我们已经看到，复制和 `majority write concern` 是避免在生产环境中出现节点资源不平衡的两个主要原因。对于三节点副本集，您的部署容量在发生任何单点组件故障后，受限于最慢节点的计算资源。


    ## Key takeaways


    从本章中，需要记住的关键概念如下：


    *   MongoDB架构的设计旨在优化正常运行时间和恢复能力。

    *   可以通过添加冗余组件并避免基础设施中的单点故障来采取缓解措施以避免故障。

    *   在至少三个数据中心和多个互联网骨干网中部署具有奇数个节点的副本集，可以避免许多故障点。

    *   特殊节点（如隐藏或延迟成员）应仅在至少三个数据承载节点之外部署。

    *   副本集中不可能有多个主节点。因为需要一个法定数量的投票节点才能产生一个主节点，所以分区只有一方能赢得选举。如果投票节点数为偶数，则有可能即使所有节点都在线，双方也无法产生主节点。

    *   应避免并计划消除手动干预。遵循最佳实践，唯一需要手动干预的情况是多个独立故障同时发生时。

    *   应使用滚动维护来升级或更改配置，确保任何时候只有一个节点不可用。

    *   副本集中的所有节点都应配置至少72小时的 `oplog`，以便在周末也能快速恢复并满足SLA。


    # 3. Security


    > *2016年，美国研究公司Cybersecurity Ventures预测，到2021年，网络犯罪每年将给全球造成6万亿美元的损失，高于2015年的3万亿美元。*^([¹](#fn1))


    本章介绍与MongoDB集群设计相关的主要安全特性，包括如何在基础架构层面保护系统、对传输中和静态数据进行加密，以及如何通过应用程序代码和接口防范攻击。


    最后，我们将探讨如何审计集群操作以及混淆日志，以便在不泄露数据库用户数据的情况下进行性能分析。


    ## Local access


    保护任何MongoDB部署的第一步是确保对主机的访问仅限于受信任的用户。由于所有数据最终都存储在文件系统上，恶意系统用户可能损坏、窃取、劫持或破坏本地磁盘上的任何数据。


    每个操作系统都有自己的方法来限制对机器的登录。通常，每个用户都有自己的认证凭据（密码或SSH密钥）并被分配到一个组。`mongod`进程及其二进制文件和数据文件通常以`mongod:mongod`身份运行，这是通过RPM存档在Linux机器上安装MongoDB时的默认设置。


    作为系统管理员，您应始终遵循*最小权限原则*，例如，禁止通过SSH以root身份登录机器，限制`sudo`权限，并记录所有连接尝试（包括成功和失败的）以备后续审计。像OWASP
    ([`www.owasp.org`](http://www.owasp.org)) 这样的安全资源提供了有用的工具和培训来帮助实现这一目标。


    ## Network hardening


    MongoDB在主机上运行后，需要与副本集或分片集群的其他成员进行通信（双向），并且需要接收来自其他可信源（如应用程序和MongoDB Compass等数据探索工具）的某些传入连接。我们稍后会介绍多层安全措施，但最基本的是，我们希望将访问限制在特定端口，并仅限某些远程主机。


    如图 [3-1](#487346_1_En_3_Chapter.xhtml#Fig1) 所示，所有副本集组件和驱动程序都需要能够建立出站连接并与所有其他组件通信，通常是跨数据中心的。


    ![../images/487346_1_En_3_Chapter/487346_1_En_3_Fig1_HTML.jpg](images/487346_1_En_3_Chapter/487346_1_En_3_Fig1_HTML.jpg)


    图 3-1

    副本集中组件建立的连接'
  raw: '### Shared storage area network


    Another possibly unexpected point of failure is the “inverted pyramid” of shared
    network storage. In many cases of virtual host configurations, there is a shared
    storage server connected by fiber channel, but which is shared by multiple VM
    hosts (Figure [2-16](#487346_1_En_2_Chapter.xhtml#Fig16)). Even though each MongoDB
    node has independent physical CPUs and memory, should the SAN fail, all nodes
    will fail also. Once again, having three separate data centers completely avoids
    this failure scenario.


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig16_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig16_HTML.jpg)


    Figure 2-16


    A shared SAN can introduce an unexpected point of failure


    ## Unbalanced hardware


    Imagine a situation where the primary is designed to be co-located in the first
    data center with the application server to reduce latency. This node is given
    a priority so it should win elections when all nodes are available. It’s given
    more memory and CPUs since it will be handling writes and reads from the application.
    The other nodes are given less resources. The node in the secondary data center
    is even given priority 0 to ensure that it never gets elected primary (see Figure
    [2-17](#487346_1_En_2_Chapter.xhtml#Fig17)).


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig17_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig17_HTML.jpg)


    Figure 2-17


    A replica set with a designated primary with double the memory and CPU resources


    Now let’s imagine what happens if the primary host fails. The secondary in DC1
    is elected primary, but it has half the resources of the old primary. It can only
    fit half the previous cache in memory; it will have to do much more I/O to flush
    dirty caches and load data from disk. The effect will be that write performance
    drops to significantly below half the previous level. It is very likely that the
    application performance will suffer noticeably to the end users.


    In Figure [2-18](#487346_1_En_2_Chapter.xhtml#Fig18) we have given the secondary
    in DC1 the same resources, and now only the node in DC2 has half the resources.
    Now if the primary fails, the secondary in DC1 will again be elected to replace
    it, and can function the same, but if the application is using *majority write
    concern* to avoid rollbacks, it is now waiting for the only other available node
    to replicate the writes. Since the oplog entries must be applied in order, any
    processing lag in the underresourced secondary will now make the application wait.
    In effect, the application is still waiting on a node with half the resources
    to write all the same changes and update all the same indexes.


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig18_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig18_HTML.jpg)


    Figure 2-18


    A replica set with an underprovisioned secondary kept as reserve


    We have seen that replication and majority write concern are two major reasons
    to avoid having unbalanced node resources in production. For three-node replica
    sets, your deployment’s capacity is limited by the computing resources of the
    slowest node after any single component failure.


    ## Key takeaways


    From this chapter, the key concepts to remember are as follows:


    *   The MongoDB architecture has been designed to optimize both uptime and recovery.


    *   Mitigation steps can be taken to avoid failure by adding redundant components
    and avoid single points of failure in the infrastructure.


    *   Deploying a replica set with an odd number of nodes in at least three data
    centers with multiple internet backbones should avoid many points of failure.


    *   Special nodes such as hidden or delayed members should only be deployed in
    additional to at least three data-bearing nodes.


    *   It is impossible to have multiple primaries in a replica set. Because a quorum
    of voting nodes is required for a primary, only one side of the partition can
    win an election. With an even number of voting nodes, it is possible for neither
    side to have a primary despite all nodes being online.


    *   Manual intervention should be avoided and planned away. By following the best
    practices, the only time that manual intervention should be required is if multiple
    independent failures occur concurrently.


    *   Rolling maintenance should be used to upgrade or change configuration so that
    only one node is unavailable at any time.


    *   All nodes in a replica set should be configured with an oplog of at least
    72 hours to allow for fast recovery and SLAs to be met even over a weekend.


    # 3. Security


    > *In 2016, Cybersecurity Ventures, a US research firm, predicted that cybercrime
    will cost the world $6 trillion annually by 2021, up from $3 trillion in 2015.*^([¹](#fn1))


    This chapter looks at the main security features related to MongoDB cluster designs,
    including how to secure a system at the infrastructure level, and to encrypt data
    in transit and at rest, and how to protect against attacks via application code
    and interfaces.


    Finally, we look at how to audit cluster actions and to obfuscate logs to allow
    performance analysis without leaking user data out of the database.


    ## Local access


    The first step to securing any MongoDB deployment is to ensure that access to
    the host machine is restricted to only trusted users. Since all data is ultimately
    stored on the filesystem, a malicious system user could corrupt, steal, hold hostage,
    or destroy any data stored on the local disk.


    Each operating system has its own methods to restrict logins to a machine. Normally
    each user would have their own authentication credentials (a password or SSH key)
    and be assigned to a group. The `mongod` process and its binary and data files
    typically run as `mongod:mongod` which is the default when MongoDB is installed
    on a Linux machine via an RPM archive.


    As a sysadmin, you should always follow the *principle of least privilege* *,*
    for example, by disallowing root SSH access into a machine, limiting `sudo` privileges,
    and logging to record all connections attempts both successful and failed for
    later auditing. Security resources like OWASP ([`www.owasp.org`](http://www.owasp.org))
    provide useful tools and training to help.


    ## Network hardening


    Once MongoDB is running on a host, it will need to communicate with other members
    of its replica set or sharded cluster (in both directions) and will need to receive
    certain incoming connections from other trusted sources such as applications and
    data exploration tools like MongoDB Compass. There are many layers of security
    which we will cover later, but at the most basic, we want to restrict access to
    only certain ports and limit to certain remote hosts.


    As shown in Figure [3-1](#487346_1_En_3_Chapter.xhtml#Fig1), all replica set components
    and the driver will need to be able to establish outgoing connections and communicate
    with all other components, usually across data centers.


    ![../images/487346_1_En_3_Chapter/487346_1_En_3_Fig1_HTML.jpg](images/487346_1_En_3_Chapter/487346_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Connections established by components in a replica set'
  trans: '

    ### 共享存储区域网络


    另一个可能出乎意料的故障点是共享网络存储的“倒金字塔”结构。在许多虚拟主机配置中，会有一个通过光纤通道连接的共享存储服务器，但它被多个 VM 主机共享（图
    2-16）。即使每个 MongoDB 节点拥有独立的物理 CPU 和内存，一旦 SAN 发生故障，所有节点也会随之故障。再次强调，使用三个独立的数据中心可以完全避免这种故障场景。


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig16_HTML.jpg](img/487346_1_En_2_Fig16_HTML.jpg)


    图 2-16

    共享的 SAN 可能引入一个意外的故障点


    ## 硬件不平衡


    想象这样一种情况：为了减少延迟，主节点被设计为与应用服务器共同位于第一个数据中心中。该节点被赋予较高的优先级，因此当所有节点都可用时，它应该能赢得选举。由于它需要处理应用程序的读写操作，所以为其分配了更多的内存和
    CPU。其他节点的资源则较少。位于次要数据中心的节点甚至被赋予优先级 0，以确保它永远不会被选为主节点（见图 2-17）。


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig17_HTML.jpg](img/487346_1_En_2_Fig17_HTML.jpg)


    图 2-17

    一个副本集，其指定的主节点拥有双倍的内存和 CPU 资源


    现在，让我们想象一下如果主节点主机发生故障会发生什么。DC1 中的次要节点被选为主节点，但它的资源只有旧主节点的一半。它只能将一半的旧缓存装入内存；它将需要做更多的
    I/O 操作来刷新脏缓存并从磁盘加载数据。其影响是写入性能会显著下降到远低于之前水平的一半。应用程序性能很可能会对终端用户产生明显的负面影响。


    在图 2-18 中，我们为 DC1 中的次要节点分配了相同的资源，现在只有 DC2 中的节点拥有 half the resources. Now if the
    primary fails, the secondary in DC1 will again be elected to replace it, and can
    function the same, but if the application is using `majority write concern` to
    avoid rollbacks, it is now waiting for the only other available node to replicate
    the writes. Since the `oplog` entries must be applied in order, any processing
    lag in the underresourced secondary will now make the application wait. In effect,
    the application is still waiting on a node with half the resources to write all
    the same changes and update all the same indexes. 现在，只有 DC2 中的节点拥有 half the resources.
    如果主节点发生故障，DC1 中的次要节点将再次被选为替代节点，并能发挥相同的作用；但如果应用程序使用 `majority write concern` 来避免回滚，那么现在它需要等待唯一另一个可用节点来复制写入。由于
    `oplog` 条目必须按顺序应用，资源不足的次要节点中任何处理延迟现在都会导致应用程序等待。实际上，应用程序仍然在等待一个资源减半的节点来写入所有相同的更改并更新所有相同的索引。


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig18_HTML.jpg](img/487346_1_En_2_Fig18_HTML.jpg)


    图 2-18

    一个副本集，其中资源不足的次要节点作为备用


    我们已经看到，复制和 `majority write concern` 是避免在生产环境中出现节点资源不平衡的两个主要原因。对于三节点副本集，您的部署容量在发生任何单点组件故障后，受限于最慢节点的计算资源。


    ## 关键要点


    从本章中，需要记住的关键概念如下：


    *   MongoDB 架构的设计旨在优化正常运行时间和恢复能力。

    *   可以通过添加冗余组件并避免基础设施中的单点故障来采取缓解措施以避免故障。

    *   在至少三个数据中心和多个互联网骨干网中部署具有奇数个节点的副本集，可以避免许多故障点。

    *   特殊节点（如隐藏或延迟成员）应仅在至少三个数据承载节点之外部署。

    *   副本集中不可能有多个主节点。因为需要一个法定数量的投票节点才能产生一个主节点，所以分区只有一方能赢得选举。如果投票节点数为偶数，则有可能即使所有节点都在线，双方也无法产生主节点。

    *   应避免并计划消除手动干预。遵循最佳实践，唯一需要手动干预的情况是多个独立故障同时发生时。

    *   应使用滚动维护来升级或更改配置，确保任何时候只有一个节点不可用。

    *   副本集中的所有节点都应配置至少 72 小时的 `oplog`，以便在周末也能快速恢复并满足 SLA。


    # 3. 安全


    > *2016 年，美国研究公司 Cybersecurity Ventures 预测，到 2021 年，网络犯罪每年将给全球造成 6 万亿美元的损失，高于
    2015 年的 3 万亿美元。*^(¹)


    本章介绍与 MongoDB 集群设计相关的主要安全特性，包括如何在基础架构层面保护系统、对传输中和静态数据进行加密，以及如何通过应用程序代码和接口防范攻击。


    最后，我们将探讨如何审计集群操作以及混淆日志，以便在不泄露数据库用户数据的情况下进行性能分析。


    ## 本地访问


    保护任何 MongoDB 部署的第一步是确保对主机的访问仅限于受信任的用户。由于所有数据最终都存储在文件系统上，恶意系统用户可能损坏、窃取、劫持或破坏本地磁盘上的任何数据。


    每个操作系统都有自己的方法来限制对机器的登录。通常，每个用户都有自己的认证凭据（密码或 SSH 密钥）并被分配到一个组。`mongod`进程及其二进制文件和数据文件通常以`mongod:mongod`身份运行，这是通过
    RPM 存档在 Linux 机器上安装 MongoDB 时的默认设置。


    作为系统管理员，您应始终遵循*最小权限原则*，例如，禁止通过 SSH 以 root 身份登录机器，限制`sudo`权限，并记录所有连接尝试（包括成功和失败的）以备后续审计。像
    OWASP ([`www.owasp.org`](http://www.owasp.org)) 这样的安全资源提供了有用的工具和培训来帮助实现这一目标。


    ## 网络加固


    MongoDB 在主机上运行后，需要与副本集或分片集群的其他成员进行通信（双向），并且需要接收来自其他可信源（如应用程序和 MongoDB Compass
    等数据探索工具）的某些传入连接。我们稍后会介绍多层安全措施，但最基本的是，我们希望将访问限制在特定端口，并仅限某些远程主机。


    如图 3-1 所示，所有副本集组件和驱动程序都需要能够建立出站连接并与所有其他组件通信，通常是跨数据中心的。


    ![../images/487346_1_En_3_Chapter/487346_1_En_3_Fig1_HTML.jpg](img/487346_1_En_3_Fig1_HTML.jpg)


    图 3-1

    副本集中组件建立的连接

