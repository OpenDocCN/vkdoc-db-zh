    \ When all nodes are online, drivers would then route traffic for microservice[A]\
    \ (running in DC1) to go to `mongod`[1] and microservice[B] (in both DC2 and DC3)\
    \ to `mongod`[3]. This would mean that `mongod`[1] has a working set of mostly\
    \ `collection`[`A`] documents in its cache and `mongod`[3] caches mostly `collection`[`B`]\
    \ documents. This should result in much less cache churn (and I/O reads) than\
    \ directing reads at random between the two secondaries.\n\nSince all applications\
    \ specify tag sets, this setup also means that `mongod`[2] won’t receive secondary\
    \ read traffic at all. In this example, `mongod`[1] happens to be primary, but\
    \ since no other nodes have a matching `{use: \"msA\"}` tag, a read preference\
    \ of `secondaryPreferred` by microservice[A] will be superseded by the tag match\
    \ and a primary read will be made instead.\n\n![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig2_HTML.jpg](images/487346_1_En_8_Chapter/487346_1_En_8_Fig2_HTML.jpg)\n\
    \nFigure 8-2\n\nUsing different tags to target specific members per application\n\
    \nReplication behavior will always mean that documents modified via the primary\
    \ will be loaded into memory on the secondary and may flush out other cached documents.\n\
    \nMore background details about read preferences, staleness, and tags are covered\
    \ in Chapter [5](#487346_1_En_5_Chapter.xhtml). For exact behavior and syntax,\
    \ refer to the MongoDB documentation online.^([⁸](#fn8))\n\n## Advanced LDAP with\
    \ pools\n\nThe Lightweight Directory Access Protocol (LDAP) is one of the external\
    \ authentication sources (along with Kerberos) supported by MongoDB Enterprise.\
    \ Using LDAP allows you to manage passwords via an existing system such as Windows\
    \ Active Directory.\n\n### Connection management\n\nA simple environment with\
    \ LDAP providing authentication for your MongoDB deployment might only have a\
    \ single LDAP server available. In such a setup (Figure [8-3](#487346_1_En_8_Chapter.xhtml#Fig3)),\
    \ a failure to connect to the LDAP server for any reason (overloaded server, failed\
    \ TLS connection, etc.) should ideally be able to retry the LDAP request. In MongoDB\
    \ 4.0 and earlier, the OpenLDAP/`libldap` library is solely responsible for selecting\
    \ the LDAP server, establishing the connection, and error handling.\n\n![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig3_HTML.jpg](images/487346_1_En_8_Chapter/487346_1_En_8_Fig3_HTML.jpg)\n\
    \nFigure 8-3\n\nExternal auth with a single LDAP server\n\nFrom MongoDB 4.2, a\
    \ number of LDAP enhancements such as connection pooling were added, and these\
    \ greatly improve the performance of LDAP authentication. Originally each connection\
    \ to an LDAP server was opened up as needed and then closed immediately. As discussed\
    \ earlier, opening a new connection can add lag to the process. This improvement\
    \ reuses the pooling algorithms that MongoDB drivers use to keep a pool of connections\
    \ open to service incoming client requests with lower latency."
  trans: '## 关键要点


    从本章中，需要记住的关键概念如下：


    *   配置管理、编排和配置工具复杂且发展迅速，目前没有部署 MongoDB 集群基础设施的单一标准。

    *   由于 MongoDB 是有状态且具备自愈能力的，通常用于应用服务器自动扩展的工具无法轻易挪作他用。

    *   Terraform 是用于本地和多云环境配置的流行工具，而 Ansible 是配置管理的一个良好选择。

    *   对于像 OpenShift 这样的 Kubernetes 基础设施，可以使用官方的企业专属 Operator 插件来配置和管理 MongoDB 集群。

    *   正确监控集群以了解基准性能至关重要，这既是为了在正确的阈值设置警报，也是为了知道何时需要扩展集群。

    *   像 Ops/Cloud Manager 这样的企业工具是自动化和监控大型复杂集群的最佳选择，也可以与现有的监控/告警系统（如 Prometheus
    或 New Relic）或通过 SNMP 进行集成。

    *   为了获得最佳的安全性和稳定性，应及时升级到最新的 MongoDB 次要版本和操作系统次要版本。


    脚注 1 2


    # 8. 特殊用例与配置


    > *显然，记忆存在冗余：你会将相同的记忆存储在大脑的不同部分，以便以不同的速度访问。这个速度取决于使用的频率和知识的重要性。*

    >

    > ——比尔·奈，机械工程师和“科学小子”


    在本章中，我们将介绍一系列生产环境中 MongoDB 特定配置的用例，例如混合本地/云端集群、低延迟应用程序、使用 LDAP 池进行身份验证以及如何存储大型二进制文件。


    ## 通过从节点读取进行扩展


    在大多数情况下，应用程序应从主节点读取和写入，并使用读取偏好 `primaryPreferred`。从节点旨在实现高可用性，通常应专门用于以尽可能小的延迟复制操作日志。它们应随时准备从主节点接管，以避免最终用户可能注意到的应用程序影响。


    ### 读取偏好


    然而，在某些特殊情况下，当读取负载远高于写入负载，并且读取稍微过时的文档不是问题时，使用 `secondaryPreferred` 读取偏好可能是一个有效的方法。读取偏好
    `secondary` 也可以使用，但在极少数情况下，如果副本集只有一个主节点可用（可能是由于紧急的 `rs.reconfig()` 以移除损坏/故障的主机），那么应用程序将看不到可读取的候选成员，并会停滞。


    第三个选项是使用 `nearest` 读取偏好。这将从从节点或主节点读取，但会选择网络延迟最低的节点。如果存在许多分布于多个相对较远的数据中心的应用程序服务器，这可能是有用的。


    在图 8-1 中，我们看到应用程序使用 `nearest` 读取偏好分布在三个数据中心，其中 DC3 较偏远，网络连接不稳定。这导致 DC3 中的从节点复制延迟超过
    90 秒。


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig1_HTML.jpg](img/487346_1_En_8_Fig1_HTML.jpg)

    图 8-1 应用程序在新鲜度限制内从最近节点读取


    ### 限制数据陈旧度


    在某些极端情况下，例如当从节点主机的工作负载配置严重不足时，从节点可能会严重落后于复制。想象一下，您正在执行从节点读取，而在工作负载高峰期，复制延迟了数小时。


    通过在连接 URI 字符串中指定一个 `maxStalenessSeconds` 值（例如 `90`），可以在一定程度上避免这种情况。设置后，驱动程序将从其候选列表中排除任何复制落后主节点超过
    90 秒的从节点。


    在图 8-1 中，我们还看到 DC3 中的应用程序由于这种过度的复制延迟，正确地忽略了本地数据中心的从节点，转而从 DC2 中下一个最近的节点读取。


    请记住，要完全避免 `stale`（陈旧）读取并因此 `maximize consistency`（最大化一致性），请使用 `primary` 读取偏好和
    `majority` 读取关注级别。


    ### 标签集


    读取偏好 `nearest` 和 `secondaryPreferred` 都可以与 `maxStalenessSeconds` 和*标签集*结合使用，以控制哪个节点被用于查询。假设您有一个特定的微服务[A]只从
    `collection`[`A`] 读取，另一个微服务[B]只从 `collection`[`B`] 读取。我们可以在副本集配置中为成员配置标签，指定 `secondaryPreferred`
    读取偏好，并为每个微服务使用不同的标签集值（图 8-2）。当所有节点都在线时，驱动程序会将微服务[A]（运行在 DC1 中）的流量路由到 `mongod`[1]，将微服务[B]（在
    DC2 和 DC3 中）的流量路由到 `mongod`[3]。这意味着 `mongod`[1] 的缓存中主要工作集是 `collection`[`A`] 的文档，而
    `mongod`[3] 的缓存中主要缓存的是 `collection`[`B`] 的文档。与在两个从节点之间随机定向读取相比，这应该会导致缓存抖动（和 I/O
    读取）大大减少。


    由于所有应用程序都指定了标签集，这种设置也意味着 `mongod`[2] 根本不会接收到从节点读取流量。在此示例中，`mongod`[1] 恰好是主节点，但由于没有其他节点具有匹配的
    `{use: "msA"}` 标签，微服务[A]的 `secondaryPreferred` 读取偏好将被标签匹配覆盖，转而执行主节点读取。


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig2_HTML.jpg](img/487346_1_En_8_Fig2_HTML.jpg)

    图 8-2 使用不同标签为每个应用程序定位特定成员


    复制行为总是意味着通过主节点修改的文档将被加载到从节点的内存中，并可能驱逐其他缓存的文档。


    关于读取偏好、数据新鲜度和标签的更多背景细节在第 5 章中介绍。关于确切的行为和语法，请参阅在线 MongoDB 文档^(⁸)。


    ## 高级 LDAP 与连接池


    轻量级目录访问协议（LDAP）是 MongoDB 企业版支持的外部身份验证源之一（与 Kerberos 一起）。使用 LDAP 允许您通过现有系统（如 Windows
    Active Directory）管理密码。


    ### 连接管理


    一个简单的、使用 LDAP 为 MongoDB 部署提供身份验证的环境可能只有一台 LDAP 服务器可用。在这种设置中（图 8-3），由于任何原因（服务器过载、TLS
    连接失败等）无法连接到 LDAP 服务器时，理想情况下应该能够重试 LDAP 请求。在 MongoDB 4.0 及更早版本中，OpenLDAP/`libldap`
    库完全负责选择 LDAP 服务器、建立连接和错误处理。


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig3_HTML.jpg](img/487346_1_En_8_Fig3_HTML.jpg)

    图 8-3 使用单个 LDAP 服务器的外部认证


    从 MongoDB 4.2 开始，增加了一些 LDAP 增强功能，如连接池，这些功能极大地提高了 LDAP 身份验证的性能。最初，每个到 LDAP 服务器的连接都是按需打开并立即关闭的。如前所述，打开新连接可能会增加流程延迟。这一改进复用了
    MongoDB 驱动程序使用的池化算法，以保持一个开放的连接池，用较低的延迟来服务传入的客户端请求。'
- fmt: "### Multiple LDAP servers\n\nMongoDB also supports specifying multiple LDAP\
    \ servers. This can be critical for production deployments that can’t afford any\
    \ downtime due to a failed LDAP request. When the LDAP pool is small and the available\
    \ LDAP server hostnames don’t change, the configuration would be as\n\n```yaml\n\
    security:\n  ldap:\n    servers: ldap1.mycompany.internal:389, \\\n          \
    \   ldap2.mycompany.internal:389, \\\n             ldap3.mycompany.internal:389\n\
    ```\n\nIn Figure [8-4](#487346_1_En_8_Chapter.xhtml#Fig4), we see a configuration\
    \ with three Active Directory servers in a round-robin.\n\n![`../images/487346_1_En_8_Chapter/487346_1_En_8_Fig4_HTML.jpg`](images/487346_1_En_8_Chapter/487346_1_En_8_Fig4_HTML.jpg)\n\
    **Figure 8-4** External auth with a pool of LDAP servers\n\nIn this case, the\
    \ first authentication attempt connected to LDAP Server #1, but this connection\
    \ failed due to a transient network failure. The OpenLDAP library used by the\
    \ LDAP `authz` module will time out after 10 seconds and automatically retry another\
    \ server from its list. This time, it has connected to Server #3 and has successfully\
    \ authenticated the user. The initial error will be logged in the `mongodb.log`,\
    \ but the only impact to the application is that the connection took 10 seconds\
    \ longer to connect than usual.\n\nAs the authentication process only happens\
    \ when a new client connection is opened, and if the application has been correctly\
    \ configured with a connection pool, then new connections will not be established\
    \ regularly. So the risk of such “stalls” will be infrequent even with unstable\
    \ LDAP servers.\n\nThis approach requires listing the hostnames or IP addresses\
    \ of all LDAP servers in the pool. For some large organizations, the LDAP servers\
    \ are managed by a separate team and are subject to change without notice. Therefore,\
    \ it’s not possible to know in advance the hostnames of all the LDAP servers.\n\
    \nOne solution is to create a `CNAME` alias such as `ldap-pool.mycompany.internal`\
    \ in the internal DNS which is configured to return the hostnames of all active\
    \ LDAP servers. However, if you configure your MongoDB nodes with just one entry\
    \ in `servers` such as\n\n```yaml\nsecurity:\n  ldap:\n    servers: ldap-pool.mycompany.internal:389\n\
    ```\n\nthen MongoDB and its OpenLDAP library are not aware of the fact that a\
    \ pool of LDAP servers is available. If the first authentication request to an\
    \ LDAP server fails, it assumes that the LDAP server is down and will not even\
    \ attempt a retry. The fix for such situations (at the time of writing) is to\
    \ specify the same alias multiple times, to force LDAP request retries, that is:\n\
    \n```yaml\nsecurity:\n  ldap:\n    servers: ldap-pool.mycompany.internal:389,\
    \ \\\n             ldap-pool.mycompany.internal:389, \\\n             ldap-pool.mycompany.internal:389\n\
    ```\n\nNow any transient errors in a single LDAP server will seamlessly retry\
    \ without surfacing any error to the application at all.\n\nAs always, you should\
    \ monitor MongoDB logs for any errors and react accordingly to correct infrastructure\
    \ failures before errors start affecting production applications.\n\n### Load\
    \ balancer\n\nThe OpenLDAP library itself doesn’t maintain any state about the\
    \ health of the LDAP servers in the pool. If one server is down or unhealthy,\
    \ authentication attempts may still be routed to this server. MongoDB 4.2 and\
    \ later have basic health checking which tries to avoid unhealthy LDAP servers.\
    \ A better approach is to use a dedicated TCP load balancer which is capable of\
    \ executing LDAP queries as a health check. As shown in Figure [8-5](#487346_1_En_8_Chapter.xhtml#Fig5),\
    \ the MongoDB nodes communicate with the load balancer, which distributes queries\
    \ to healthy LDAP servers.\n\n![`../images/487346_1_En_8_Chapter/487346_1_En_8_Fig5_HTML.jpg`](images/487346_1_En_8_Chapter/487346_1_En_8_Fig5_HTML.jpg)\n\
    **Figure 8-5** A load balancer proxies and distributes LDAP requests\n\nThis load\
    \ balancer will normally distribute requests randomly among the backing LDAP servers.\
    \ Most advanced load balancers will also be able to perform a test LDAP query\
    \ and check the result. Should any of the LDAP servers not respond in a timely\
    \ manner, they will temporarily be removed from the pool. This way, any malfunctioning\
    \ or overloaded LDAP server will be ignored and should not cause MongoDB LDAP\
    \ requests to stall.\n\nLet’s say that the load balancer has a single hostname\
    \ `ldap-lb.mycompany.internal`. As before, we should list the load balancer’s\
    \ hostname several times in `security.ldap.servers` to ensure TCP-level retries.\n\
    \n### Connection timeouts\n\nChoosing the correct timeout values for any sort\
    \ of distributed system can be tricky. This has also been true for MongoDB in\
    \ the past, and in early versions some of the default timeout values were not\
    \ always optimal for large or complex clusters.\n\nThe recommendation for any\
    \ version of MongoDB since version 3.4 is to `use default timeout values for both\
    \ server and driver configuration` unless absolutely necessary. The default timeouts\
    \ have been chosen to be optimal for sharded clusters with multiple `mongos` routers\
    \ and multiple application servers.\n\n**Warning**\n\nDue to previous default\
    \ settings, there are a lot of invalid recommendations still online. Many developers\
    \ and database administrators are tempted to experiment with different combinations\
    \ of values to try and squeeze out some extra performance, or improve stability\
    \ during periods of very heavy load.\n\nOne risk with a low timeout value is that\
    \ it will cause connections for operations that are almost complete to be prematurely\
    \ cut off, leaving the server-side operations to still complete fully. If an operation\
    \ is then retried, the server will now be running two identical impactful operations\
    \ in parallel. If allowed to continue, the application runs the risk of launching\
    \ a type of `denial-of-service attack` on its own database infrastructure.\n\n\
    #### Limit operation time\n\nTo ensure that slow (often erroneous or unexpectedly\
    \ impactful) operations are killed and free up server-side resources correctly,\
    \ use `maxTimeMS` rather than a connection timeout.\n\n`maxTimeMS` specifies a\
    \ cumulative time limit (in milliseconds) for processing operations on a cursor.\
    \ MongoDB does not count network latency between a client and server in this time\
    \ limit. In-progress operations that exceed the `maxTimeMS` will be terminated\
    \ at the next interrupt point when the operation can safely abort."
  raw: '### Multiple LDAP servers


    MongoDB also supports specifying multiple LDAP servers. This can be critical for
    production deployments that can’t afford any downtime due to a failed LDAP request.
    When the LDAP pool is small and the available LDAP server hostnames don’t change,
    the configuration would be as


    ```

    security:

    ldap:

    servers: ldap1.mycompany.internal:389, \

    ldap2.mycompany.internal:389, \

    ldap3.mycompany.internal:389

    ```


    In Figure [8-4](#487346_1_En_8_Chapter.xhtml#Fig4), we see a configuration with
    three Active Directory servers in a round-robin.


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig4_HTML.jpg](images/487346_1_En_8_Chapter/487346_1_En_8_Fig4_HTML.jpg)


    Figure 8-4


    External auth with a pool of LDAP servers


    In this case, the first authentication attempt connected to LDAP Server #1, but
    this connection failed due to a transient network failure. The OpenLDAP library
    used by the LDAP `authz` module will time out after 10 seconds and automatically
    retry another server from its list. This time, it has connected to Server #3 and
    has successfully authenticated the user. The initial error will be logged in the
    `mongodb.log`, but the only impact to the application is that the connection took
    10 seconds longer to connect than usual.


    As the authentication process only happens when a new client connection is opened,
    and if the application has been correctly configured with a connection pool, then
    new connections will not be established regularly. So the risk of such “stalls”
    will be infrequent even with unstable LDAP servers.


    This approach requires listing the hostnames or IP addresses of all LDAP servers
    in the pool. For some large organizations, the LDAP servers are managed by a separate
    team and are subject to change without notice. Therefore, it’s not possible to
    know in advance the hostnames of all the LDAP servers.


    One solution is to create a `CNAME` alias such as `ldap-pool.mycompany.internal`
    in the internal DNS which is configured to return the hostnames of all active
    LDAP servers. However, if you configure your MongoDB nodes with just one entry
    in `servers` such as


    ```

    security:

    ldap:

    servers: ldap-pool.mycompany.internal:389

    ```


    then MongoDB and its OpenLDAP library are not aware of the fact that a pool of
    LDAP servers is available. If the first authentication request to an LDAP server
    fails, it assumes that the LDAP server is down and will not even attempt a retry.
    The fix for such situations (at the time of writing) is to specify the same alias
    multiple times, to force LDAP request retries, that is:


    ```

    security:

    ldap:

    servers: ldap-pool.mycompany.internal:389, \

    ldap-pool.mycompany.internal:389, \

    ldap-pool.mycompany.internal:389

    ```


    Now any transient errors in a single LDAP server will seamlessly retry without
    surfacing any error to the application at all.


    As always, you should monitor MongoDB logs for any errors and react accordingly
    to correct infrastructure failures before errors start affecting production applications.


    ### Load balancer


    The OpenLDAP library itself doesn’t maintain any state about the health of the
    LDAP servers in the pool. If one server is down or unhealthy, authentication attempts
    may still be routed to this server. MongoDB 4.2 and later have basic health checking
    which tries to avoid unhealthy LDAP servers. A better approach is to use a dedicated
    TCP load balancer which is capable of executing LDAP queries as a health check.
    As shown in Figure [8-5](#487346_1_En_8_Chapter.xhtml#Fig5), the MongoDB nodes
    communicate with the load balancer, which distributes queries to healthy LDAP
    servers.


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig5_HTML.jpg](images/487346_1_En_8_Chapter/487346_1_En_8_Fig5_HTML.jpg)


    Figure 8-5


    A load balancer proxies and distributes LDAP requests


    This load balancer will normally distribute requests randomly among the backing
    LDAP servers. Most advanced load balancers will also be able to perform a test
    LDAP query and check the result. Should any of the LDAP servers not respond in
    a timely manner, they will temporarily be removed from the pool. This way, any
    malfunctioning or overloaded LDAP server will be ignored and should not cause
    MongoDB LDAP requests to stall.


    Let’s say that the load balancer has a single hostname `ldap-lb.mycompany.internal`.
    As before, we should list the load balancer’s hostname several times in `security.ldap.servers`
    to ensure TCP-level retries.


    ## Connection timeouts


    Choosing the correct timeout values for any sort of distributed system can be
    tricky. This has also been true for MongoDB in the past, and in early versions
    some of the default timeout values were not always optimal for large or complex
    clusters.


    The recommendation for any version of MongoDB since version 3.4 is to **use default
    timeout values for both server and driver configuration** unless absolutely necessary.
    The default timeouts have been chosen to be optimal for sharded clusters with
    multiple `mongos` routers and multiple application servers.


    Warning


    Due to previous default settings, there are a lot of invalid recommendations still
    online. Many developers and database administrators are tempted to experiment
    with different combinations of values to try and squeeze out some extra performance,
    or improve stability during periods of very heavy load.


    One risk with a low timeout value is that it will cause connections for operations
    that are almost complete to be prematurely cut off, leaving the server-side operations
    to still complete fully. If an operation is then retried, the server will now
    be running two identical impactful operations in parallel. If allowed to continue,
    the application runs the risk of launching a type of *denial-of-service attack*
    on its own database infrastructure.


    ### Limit operation time


    To ensure that slow (often erroneous or unexpectedly impactful) operations are
    killed and free up server-side resources correctly, use `maxTimeMS` rather than
    a connection timeout.


    `maxTimeMS` specifies a cumulative time limit (in milliseconds) for processing
    operations on a cursor. MongoDB does not count network latency between a client
    and server in this time limit. In-progress operations that exceed the `maxTimeMS`
    will be terminated at the next interrupt point when the operation can safely abort.'
  trans: "### 多个 LDAP 服务器\n\nMongoDB 也支持指定多个 LDAP 服务器。这对于因 LDAP 请求失败而无法承受任何停机时间的生产环境部署至关重要。当\
    \ LDAP 池较小且可用的 LDAP 服务器主机名不改变时，配置如下：\n\n```yaml\nsecurity:\n  ldap:\n    servers:\
    \ ldap1.mycompany.internal:389, \\\n             ldap2.mycompany.internal:389,\
    \ \\\n             ldap3.mycompany.internal:389\n```\n\n在图 8-4 中，我们看到了一个包含三个采用轮询方式的\
    \ Active Directory 服务器的配置。\n\n![`../images/487346_1_En_8_Chapter/487346_1_En_8_Fig4_HTML.jpg`](img/487346_1_En_8_Fig4_HTML.jpg)\n\
    **图 8-4** 使用 LDAP 服务器池进行外部认证\n\n在这种情况下，第一次认证尝试连接到了 LDAP 服务器 #1，但由于瞬时网络故障，此连接失败了。LDAP\
    \ `authz` 模块使用的 OpenLDAP 库将在 10 秒后超时，并自动从其列表中重试另一台服务器。这次，它连接到了服务器 #3，并成功认证了用户。初始错误将被记录在\
    \ `mongodb.log` 中，但对应用程序的唯一影响是，连接时间比平时长了 10 秒。\n\n由于认证过程仅在开启新的客户端连接时发生，如果应用程序已正确配置了连接池，那么新连接不会定期建立。因此，即使\
    \ LDAP 服务器不稳定，这种“卡顿”的风险也会很低。\n\n这种方法需要在池中列出所有 LDAP 服务器的主机名或 IP 地址。对于一些大型组织，LDAP\
    \ 服务器由单独的团队管理，并且可能会在不通知的情况下发生变更。因此，不可能预先知道所有 LDAP 服务器的主机名。\n\n一种解决方案是在内部 DNS 中创建一个\
    \ `CNAME` 别名，例如 `ldap-pool.mycompany.internal`，该别名被配置为返回所有活动 LDAP 服务器的主机名。但是，如果您为\
    \ MongoDB 节点配置 `servers` 中只有一个条目，例如：\n\n```yaml\nsecurity:\n  ldap:\n    servers:\
    \ ldap-pool.mycompany.internal:389\n```\n\n那么 MongoDB 及其 OpenLDAP 库并不知道存在一个可用的\
    \ LDAP 服务器池。如果对某个 LDAP 服务器的第一次认证请求失败，它会认为该 LDAP 服务器宕机，甚至不会尝试重试。解决此情况的方法（在撰写本文时）是指定多次相同的别名，以强制进行\
    \ LDAP 请求重试，即：\n\n```yaml\nsecurity:\n  ldap:\n    servers: ldap-pool.mycompany.internal:389,\
    \ \\\n             ldap-pool.mycompany.internal:389, \\\n             ldap-pool.mycompany.internal:389\n\
    ```\n\n现在，任何单个 LDAP 服务器中的瞬时错误都将无缝重试，根本不会向应用程序显示任何错误。\n\n一如既往，您应监控 MongoDB 日志中的任何错误，并做出相应反应，在错误开始影响生产应用程序之前纠正基础设施故障。\n\
    \n### 负载均衡器\n\nOpenLDAP 库本身不维护关于池中 LDAP 服务器健康状况的任何状态。如果某台服务器宕机或不健康，认证尝试仍可能被路由到该服务器。MongoDB\
    \ 4.2 及更高版本具有基本的健康检查功能，试图避免使用不健康的 LDAP 服务器。更好的方法是使用专用的 TCP 负载均衡器，它能够执行 LDAP 查询作为健康检查。如图\
    \ 8-5 所示，MongoDB 节点与负载均衡器通信，负载均衡器将查询分发给健康的 LDAP 服务器。\n\n![`../images/487346_1_En_8_Chapter/487346_1_En_8_Fig5_HTML.jpg`](img/487346_1_En_8_Fig5_HTML.jpg)\n\
    **图 8-5** 负载均衡器代理并分发 LDAP 请求\n\n该负载均衡器通常会随机地将请求分配给后端的 LDAP 服务器。大多数先进的负载均衡器还能够执行测试\
    \ LDAP 查询并检查结果。如果有任何 LDAP 服务器未及时响应，它们将暂时从池中移除。这样，任何发生故障或过载的 LDAP 服务器都将被忽略，并且不应导致\
    \ MongoDB LDAP 请求停滞。\n\n假设负载均衡器只有一个主机名 `ldap-lb.mycompany.internal`。如前所述，我们应在\
    \ `security.ldap.servers` 中多次列出负载均衡器的主机名，以确保 TCP 级别的重试。\n\n### 连接超时\n\n为任何类型的分布式系统选择正确的超时值可能很棘手。过去对\
    \ MongoDB 来说也是如此，在早期版本中，一些默认的超时值对于大型或复杂集群来说并非总是最优的。\n\n对于自 3.4 版以来的任何版本的 MongoDB，除非绝对必要，建议\
    \ `对服务器和驱动程序配置均使用默认超时值`。默认超时值已被选择为对具有多个 `mongos` 路由器和多个应用程序服务器的分片集群是最优的。\n\n**警告**\n\
    \n由于之前的默认设置，网上仍存在大量无效建议。许多开发人员和数据库管理员倾向于尝试不同的值组合，以期挤出一些额外的性能，或在负载非常重的时期提高稳定性。\n\
    \n低超时值的一个风险是，它会导致几乎完成的操作的连接过早被切断，而服务器端的操作仍在完全执行。如果此时重试操作，服务器将并行运行两个相同的、有影响的操作。如果任其继续，应用程序将面临对其自身数据库基础设施发起一种\
    \ `拒绝服务攻击` 的风险。\n\n#### 限制操作时间\n\n为确保缓慢（通常是错误的或意外产生重大影响的）操作被终止并正确释放服务器端资源，请使用\
    \ `maxTimeMS` 而不是连接超时。\n\n`maxTimeMS` 指定了在游标上处理操作的累计时间限制（以毫秒为单位）。MongoDB 在此时间限制内不计算客户端和服务器之间的网络延迟。超过\
    \ `maxTimeMS` 的正在进行的操作将在下一个可以安全中止的中断点被终止。"
- fmt: '### Timeout details


    The `connection timeout` is related to the driver starting/opening a socket connection
    to the MongoDB node. This is the first step in opening a connection and happens
    before the driver attempts to authenticate. As long as a MongoDB node picks up
    the incoming connection, this timeout should not be triggered.


    The `socket timeout` is about monitoring the continuous incoming data flow. If
    the data flow is interrupted for the specified timeout, the connection is regarded
    as stalled/broken. Setting this to a low value (such as 5 seconds) means that
    if no data is sent/requested for that time, then the connection times out and
    is recycled. This can create unnecessary connection churn between the application
    and the MongoDB nodes, which is why no socket timeout is recommended.


    The `max wait` is about how long a driver thread will block to get a connection
    from the connection pool when all existing connections are already in use.


    The `wtimeoutMS` is about how long to wait for a write concern to be handled and
    can be set differently for each write operation depending on required durability.
    This is tied to the replication subsystem and is not related to establishing connections
    between application and MongoDB nodes.


    Table [8-1](#487346_1_En_8_Chapter.xhtml#Tab1) summarizes the default values for
    the different waits and timeouts.


    **Table 8-1** Timeout descriptions and values from the Java driver


    | Setting | Description | Default value |

    | --- | --- | --- |

    | `Connection timeout` | A value of 0 means never timeout. It is used solely when
    establishing a new connection `Socket.connect(java.net.SocketAddress, int)`. |
    10000 (10s) |

    | `Socket timeout` | It is used for I/O socket read and write operations `Socket.setSoTimeout(int)`.
    | 0 (no timeout) |

    | `Max wait` | The maximum wait time in milliseconds that a thread may wait for
    a connection to become available. | 1200000 (120s) |

    | `wtimeoutMS` | Corresponds to the write concern `wtimeout`. `wtimeoutMS` specifies
    a time limit, in milliseconds, for the write concern. | No default |

    | `maxTimeMS` | This is a cursor timeout and not related to the high-level connection
    timeouts mentioned earlier. | No default |


    ## Hybrid cloud models


    Imagine you have a sharded cluster with multiple databases running on-prem in
    two data centers. Your organization has decided that it’s time to test running
    some instances on a public cloud like AWS. Some of the data is more sensitive
    than others, and it has been decided that a small subset of data, all contained
    in one collection, cannot be stored on the cloud. One extreme option could be
    to extract out this data and store it in a separate replica set on-prem.


    We are going to walk through an example moving a portion of data to the cloud,
    but leaving a specific subset of sensitive data in our private data centers.


    ### Managing sensitive data


    Extracting data into a completely new and separate deployment would require significant
    refactoring of existing API calls and application logic. An alternative approach
    could be to use the concept of a `primary shard` for non-sharded databases to
    achieve a hybrid approach. See Chapters [10](#487346_1_En_10_Chapter.xhtml) and
    [11](#487346_1_En_11_Chapter.xhtml) for advanced details about sharding.


    > **Note**: Any sensitive sharded collections will already be distributed across
    *all* shards in the cluster. For the following example, it would first require
    `mongodump`ing and then `mongorestore`ing these collections'' data into new unsharded
    collections.


    ### Considerations


    One of the major motivations for moving to cloud infrastructure is the ability
    to reduce costs overall by scaling up and down (or completely stopping) computing
    resources in the cloud when they’re not currently required.


    #### Bandwidth


    There is one major area where costs can actually increase, and this is in `bandwidth
    charges`. The network connection between on-prem data centers typically has a
    fixed installation and monthly cost independent of actual data transfer. In the
    cloud, by contrast, `outgoing` bytes between Availability zones (AZs) and regions
    are charged by the gigabyte. But `incoming` bytes to the cloud regions are free.
    This means that a `mongos` or a secondary node in the cloud is mostly reading
    data and will not be expensive in terms of bandwidth costs. No major cloud providers
    charge for bandwidth *inside* each availability zone but do charge a small fee
    for bytes between data centers in the same region.


    Figure [8-6](#487346_1_En_8_Chapter.xhtml#Fig6) shows a replica set with two members
    in two different on-prem data centers. There is a third member in the cloud, and
    a hidden nonvoting member in a different AZ in the same cloud region. Replication
    traffic to secondaries in the cloud is `incoming` data from the point of view
    of the cloud provider. Write traffic from a cloud-based `mongos` router to a primary
    on-prem is `outgoing` from the cloud provider’s perspective and so will be charged.


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig6_HTML.jpg](images/487346_1_En_8_Chapter/487346_1_En_8_Fig6_HTML.jpg)


    **Figure 8-6** An example hybrid deployment showing expensive bandwidth


    Many cloud providers also include an initial tier where a certain number of terabytes
    per month are free. The figures in Table [8-2](#487346_1_En_8_Chapter.xhtml#Tab2)
    try to estimate pricing for an average MongoDB cluster. Prices will naturally
    drop over time, but the ratio between outgoing and the intra-region and intra-zone
    charges help explain why a replica set within the same zone can generally be cheaper.


    > **Remember**: Deploying all members of a replica set in a single AZ should be
    avoided since it skips a level of redundancy should that AZ suffer downtime.


    **Table 8-2** Comparison of bandwidth charges (all prices in USD per GB)


    | Internal outgoing traffic | | | |

    | --- | --- | --- | --- |

    |   | Outgoing cost per GB | Between regions | Between AZs |

    | --- | --- | --- | --- |

    | Microsoft Azure | $0.09 | **$0.09** (same rate as outgoing to any other destination)
    | $0.01 |

    | Google Cloud | $0.13 | $0.01 (within US) up to $0.08 (intercontinental), topping
    out at $0.15 to/from Oceania | $0.01 |

    | Amazon EC2 | $0.09 | $0.02 | $0.01 |

    | IBM Cloud | $0.09 | $0.09 | - |

    | Other (e.g., Linode, DigitalOcean) | $0.02 | $0.02 | - |


    > **Note**: None of the listed hosting solutions charge for incoming traffic.


    #### Compression


    In modern MongoDB clusters, `intra-cluster communication` is already compressed
    to minimize bandwidth required, and this also has the pleasant side-effect of
    minimizing bandwidth charges when some data-bearing nodes are eventually moved
    to the cloud. Compression of traffic `between the app and the cluster` (`mongos`
    or primary) must be explicitly enabled via the `compressors` URI parameter or
    equivalent setter.


    #### High availability


    In many cases, organizations have access to two data centers, often designated
    Primary and disaster recovery (DR) sites. As we’ve already learned, a two-location
    topology doesn’t assure high availability should one data center go offline, or
    be partitioned.


    In these cases, some organizations chose to place an arbiter in the cloud to ensure
    that a data-bearing member can be elected primary in the remaining data center.
    However, any application using write concern majority (see Chapter [5](#487346_1_En_5_Chapter.xhtml))
    will stall if either data-bearing member is unavailable.


    The best option is to keep full data-bearing nodes in the cloud and encrypt all
    communications and storage at rest. By optimizing write and update workloads to
    minimize the oplog, we keep the bandwidth charges for replication low.


    #### Data sovereignty


    We also need to consider the `location` of data-bearing nodes when moving to the
    cloud. Corporate policy or industry regulation may require that the “source of
    truth” physically reside on servers fully controlled by the organization and therefore
    on-prem.


