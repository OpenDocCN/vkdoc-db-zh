    \ members for Shard 3 are in our data center, `confidential` data will never be\
    \ stored in the cloud.\n\n![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig9_HTML.jpg](images/487346_1_En_11_Chapter/487346_1_En_11_Fig9_HTML.jpg)\n\
    \nFigure 11-9\n\nA single cluster but with confidential data on-prem\n\nReplica\
    \ set members for Shards 1 and 2 can be a mix of on-prem and cloud hosts like\
    \ in Figures [11-7](#487346_1_En_11_Chapter.xhtml#Fig7) and [11-8](#487346_1_En_11_Chapter.xhtml#Fig8).\n\
    \n## Scaling back a sharded cluster\n\nIn certain situations, you may have initially\
    \ created a multi-shard cluster to prepare for the short-term growth of an application\
    \ prior to big launch. But sometimes the data doesn’t grow as fast as expected\
    \ and some of that hardware can be better served in a different cluster or project.\n\
    \nRemoving shards and freeing up hosts is reasonably straightforward. There are\
    \ three major steps:\n\n1.  Relocate any data on that shard (specifically databases\
    \ “homed” on that shard).\n\n2.  Remove any shard-level configuration referencing\
    \ those shard nodes.\n\n3.  Shut down the nodes.\n\n### Relocating data\n\nLet’s\
    \ imagine a simple example of a three-shard cluster with two databases, each with\
    \ one sharded and one unsharded collection as shown in Figure [11-10](#487346_1_En_11_Chapter.xhtml#Fig10).\
    \ The database `db2` is homed on Shard C, the shard we are about to remove.\n\n\
    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig10_HTML.jpg](images/487346_1_En_11_Chapter/487346_1_En_11_Fig10_HTML.jpg)\n\
    \nFigure 11-10\n\nA shard with homed databases pending draining\n\nBefore Shard\
    \ C can be *drained* of sharded collection data, we first need to choose a new\
    \ location as the primary shard of `db2`. In this case, we should use Shard B\
    \ to store the unsharded collections since Shard A is already home to `db1` and\
    \ this will help keep the shards balanced.\n\n#### Maintenance window\n\nBefore\
    \ starting any changes, we need to make sure that there are **no migrations active**\
    \ and that there are **no read or write operations running** against the unsharded\
    \ collections from `db2`. For safety, it is recommended to use a planned maintenance\
    \ window and completely take down any applications using this database.\n\n####\
    \ Move primary\n\nNow we need to issue the following command via a `mongos`:\n\
    \n```\ndb.adminCommand( { movePrimary : \"db2\", to : \"shardB\" } )\n```\n\n\
    This could take a considerable amount of time as the data needs to be transferred\
    \ and then all the indexes on those unsharded collections are rebuilt on all members\
    \ in the Shard B replica set.\n\n#### Restart all components\n\nDue to a known\
    \ issue with the caching of metadata (up to an including at least version 4.2),\
    \ it is now extremely important to\n\n1.  Restart all `mongos` instances and all\
    \ `mongod` shard members (including the secondary members)\n\n2.  Connect to *all*\
    \ `mongos` instances and *all* `mongod` shard members (including the secondary\
    \ members) and run\n\n    `db.adminCommand({ flushRouterConfig: \"db2\" } )`\n\
    \nTip\n\nCheck [`https://jira.mongodb.org/browse/SERVER-17397`](https://jira.mongodb.org/browse/SERVER-17397)\
    \ for the current best practices for your version of MongoDB.\n\n#### Resume applications\n\
    \nOnly once the router configuration has been flushed on all shard components,\
    \ it is safe to relaunch any applications using this database.\n\n### Remove shard\n\
    \nNow that Shard C is no longer the primary shard for any databases, we can begin\
    \ the removal process.\n\n#### Drain shard\n\nAt this point, the unsharded collections\
    \ have been moved, but there will still be portions of all sharded collections\
    \ stored on Shard C. We will now move off all chunks of data from any database\
    \ on Shard C, by connecting to a `mongos` and issuing the command:\n\n```\ndb.adminCommand(\
    \ { removeShard: \"shardC\" } )\n```\n\nYou can run this command multiple times\
    \ to check the status of the migration until it reports no chunks remaining on\
    \ the shard. Now the collections will be located as per Figure [11-11](#487346_1_En_11_Chapter.xhtml#Fig11).\n\
    \n![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig11_HTML.jpg](images/487346_1_En_11_Chapter/487346_1_En_11_Fig11_HTML.jpg)\n\
    \nFigure 11-11\n\nA shard ready to be removed from the cluster\n\n### Shut down\
    \ shard\n\nThe replica set once comprising Shard C will still be operational but\
    \ empty of any data, and no longer connected to the rest of the cluster’s members.\
    \ These isolated nodes can now be stopped and the hosts reused for other purposes.\n\
    \n## Extremely large clusters\n\nWhen clusters get very large with many chunk\
    \ definitions and complex zoning rules, the size of the data on the config server\
    \ replica set will naturally grow larger.\n\nEach `mongos` keeps a cache of metadata\
    \ about chunk locations and mapping to shards so that they can efficiently route\
    \ queries to individual shards whenever possible. The memory requirements for\
    \ this data will also grow for very large clusters, so `mongos` hosts may need\
    \ to be upsized.\n\n### Config servers\n\nIt’s also important to monitor both\
    \ the disk space and performance of config servers particularly during the balancing\
    \ window or intense data loading to ensure that they can cope with the workload.\n\
    \nFor large clusters, it’s better to run a five-member replica set for the config\
    \ servers to help distribute read load from the `mongos`es and provide additional\
    \ resiliency. You will also need to scale the CPU cores and memory of the config\
    \ servers as the cluster grows, although generally only 2–4 cores would be required.\n\
    \n## Key takeaways\n\nFrom this chapter, the key concepts to remember are as follows:\n\
    \n*   Shard keys can be chosen to optimize read performance for certain queries\
    \ by avoiding “scatter-gather” queries which involve all shards.\n\n*   Splitting\
    \ and migration of data during heavy data import is relatively slow and may mean\
    \ all data hits a hot shard, greatly reducing performance and increasing total\
    \ import time.\n\n*   Chunk ranges can be manually defined and distributed across\
    \ chunks in order to optimize bulk loading of new data with known distribution\
    \ of values.\n\n*   Chunks can be manually moved outside of the normal balancer\
    \ window with a special admin command called `moveChunk`.\n\n*   Unsharded collections\
    \ can be relocated to another shard by using the `movePrimary` command on their\
    \ database.\n\n*   Draining an unneeded shard containing data can be initiated\
    \ with the `removeShard` command.\n\n*   The cost of bandwidth between data centers\
    \ and cloud providers differs greatly and can have a large effect on the total\
    \ cost of running distributed clusters.\n\n*   Network communication between the\
    \ application and `mongod`/`mongos` needs to be explicitly enabled in the connection\
    \ URI.\n\n*   Databases can be homed on specific shards so that the physical location\
    \ of unsharded collections can be controlled for regulatory or cost reasons."
  trans: '### 策略限制


    更复杂的是，由于公司策略或外部法规，有时分片集群中的部分集合甚至整个数据库仍可能无法存储在云端。在这种情况下，仍存在一些复杂的架构，允许集群拥有大量基于云的分片，同时确保某些数据始终保留在本地。


    在图 11-9 中，我们可以看到一个分片集群，其中包含一个机密数据库，其内容必须仅存储在我们自己的数据中心内。只要所有`confidential`集合都是未分片的，它们就会保留在主分片
    Shard 3 上。如果 Shard 3 的所有副本集成员都在我们自己的数据中心内，那么`confidential`数据就永远不会存储在云端。


    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig9_HTML.jpg](img/487346_1_En_11_Fig9_HTML.jpg)


    图 11-9：单一集群，但机密数据保留在本地


    分片 Shard 1 和 Shard 2 的副本集成员可以是本地和云主机的混合体，如图 11-7 和 11-8 所示。


    ## 缩减分片集群规模


    在某些情况下，你可能最初创建了一个多分片集群，以准备应用程序在大型发布前的短期增长。但有时数据增长不如预期快，部分硬件可以更好地用于其他集群或项目。


    移除分片并释放主机是相当直接的。主要有三个步骤：


    1.  迁移该分片上的任何数据（特别是“归属”于该分片的数据库）。

    2.  移除任何引用这些分片节点的分片级配置。

    3.  关闭节点。


    ### 迁移数据


    让我们想象一个简单的例子：一个三分片集群，包含两个数据库，每个数据库有一个分片集合和一个未分片集合，如图 11-10 所示。数据库`db2`归属于 Shard
    C，这是我们要移除的分片。


    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig10_HTML.jpg](img/487346_1_En_11_Fig10_HTML.jpg)


    图 11-10：一个分片，其归属的数据库等待被清空


    在 Shard C 的分片集合数据被清空之前，我们首先需要为`db2`选择一个新位置作为主分片。在这种情况下，我们应该使用 Shard B 来存储未分片集合，因为
    Shard A 已经是`db1`的归属地，这将有助于保持分片的平衡。


    #### 维护窗口


    在开始任何更改之前，我们需要确保**没有活跃的迁移**，并且**没有针对`db2`中未分片集合的读写操作正在运行**。为安全起见，建议使用计划的维护窗口，并完全停止所有使用此数据库的应用程序。


    #### 移动主分片


    现在我们需要通过`mongos`发出以下命令：


    ```

    db.adminCommand( { movePrimary : "db2", to : "shardB" } )

    ```


    这可能会花费相当长的时间，因为数据需要传输，然后这些未分片集合上的所有索引需要在 Shard B 副本集的所有成员上重建。


    #### 重启所有组件


    由于已知的元数据缓存问题（至少到版本 4.2），现在极其重要的是：


    1.  重启所有`mongos`实例和所有`mongod`分片成员（包括辅助成员）。

    2.  连接到*所有*`mongos`实例和*所有*`mongod`分片成员（包括辅助成员），并运行 `db.adminCommand({ flushRouterConfig:
    "db2" } )`。


    提示：请查阅 [`https://jira.mongodb.org/browse/SERVER-17397`](https://jira.mongodb.org/browse/SERVER-17397)
    以获取适用于你 MongoDB 版本的当前最佳实践。


    #### 恢复应用程序


    只有在所有分片组件上都刷新了路由器配置后，才能安全地重新启动任何使用此数据库的应用程序。


    ### 移除分片


    既然 Shard C 不再是任何数据库的主分片，我们就可以开始移除过程。


    #### 清空分片


    此时，未分片集合已被移走，但所有分片集合的部分数据仍将存储在 Shard C 上。我们现在将通过连接到`mongos`并发出以下命令，将 Shard C 上任何数据库的所有数据块移走：


    ```

    db.adminCommand( { removeShard: "shardC" } )

    ```


    你可以多次运行此命令以检查迁移状态，直到它报告该分片上没有剩余的数据块。现在集合的位置将如图 11-11 所示。


    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig11_HTML.jpg](img/487346_1_En_11_Fig11_HTML.jpg)


    图 11-11：一个准备好从集群中移除的分片


    #### 关闭分片


    曾经构成 Shard C 的副本集仍将运行，但已无任何数据，并且不再连接到集群的其他成员。这些被隔离的节点现在可以停止，并且主机可以重新用于其他目的。


    ## 超大集群


    当集群变得非常大，包含许多数据块定义和复杂的分区规则时，配置服务器副本集上的数据量自然也会变得更大。


    每个`mongos`都会缓存有关数据块位置和到分片映射的元数据，以便在可能的情况下高效地将查询路由到各个分片。对于超大集群，此数据的内存需求也会增长，因此`mongos`主机可能需要升级配置。


    ### 配置服务器


    监控配置服务器的磁盘空间和性能也很重要，特别是在平衡窗口或数据密集加载期间，以确保它们能够应对工作负载。


    对于大型集群，最好为配置服务器运行一个五成员的副本集，以帮助分担来自`mongos`的读取负载并提供额外的弹性。随着集群的增长，你还需要扩展配置服务器的 CPU
    核心和内存，尽管通常只需要 2-4 个核心。


    ## 关键要点


    从本章中，需要记住的关键概念如下：


    *   可以选择分片键来优化某些查询的读取性能，避免涉及所有分片的“分散-聚集”查询。

    *   在大量数据导入期间，数据的分割和迁移相对较慢，可能意味着所有数据都写入一个热点分片，从而大大降低性能并增加总导入时间。

    *   可以手动定义数据块范围并在分块之间分布，以优化具有已知值分布的新数据的批量加载。

    *   可以在正常的平衡器窗口之外使用名为`moveChunk`的特殊管理命令手动移动数据块。

    *   可以通过在它们的数据库上使用`movePrimary`命令，将未分片集合重新定位到另一个分片。

    *   可以通过`removeShard`命令来启动清空一个不需要的、包含数据的分片。

    *   数据中心与云提供商之间的带宽成本差异很大，并且会对运行分布式集群的总成本产生重大影响。

    *   应用程序与`mongod`/`mongos`之间的网络通信需要在连接 URI 中显式启用。

    *   数据库可以归属于特定的分片，以便出于法规或成本原因控制未分片集合的物理位置。'
