- fmt: '# Databases


    This section lists every database known on this cluster.


    If the database is listed as `partitioned: true`, then it is sharded. There may
    be some smaller databases that are not partitioned at all, and can have no sharded
    collection.


    Notice that our `customers` database has a `primary` shard listed. The primary
    shard is the location of all unsharded collections and can be considered as a
    “home” shard for that particular database. Any non-sharded collection will exist
    only on that shard. This makes it easy for the `mongos` router to target a particular
    shard for these smaller collections.


    Some basic metadata is also displayed here, such as the shard key and whether
    it has a unique constraint applied. Next, a summary of `chunks` is listed so that
    we can quickly see if each shard has roughly the same amount of data. With no
    zoning, these should be balanced, but in our global cluster, shards linked to
    zones with more documents will be larger.


    ## Check existing zones


    Before we make any more changes, we want to check that our mappings are as we
    expect them to be. We can connect via any `mongos` router to query configuration
    from the `config` database.


    The `shards` collection lists all the shards and which zones are mapped to them.
    The `tags` collection lists all the zones, their ranges, and the tag chosen, such
    as “`IND`”. This is shown in Listings 6-4 and 6-5.


    For example, the following can be run from the Mongo shell.


    ```

    { "_id" : { "ns" : "myDB.customers",

    "min" : { "country" : "IN", "custId" : { "$minKey" : 1 } } },

    "ns" : "myDB.customers",

    "min" : { "country" : "IN", "custId" : { "$minKey" : 1 } },

    "max" : { "country" : "IN", "custId" : { "$maxKey" : 1 } },

    "tag" : "IND" }

    { "_id" : { "ns" : "myDB.customers ", "min" : { "country" : "JP", "custId" : {
    "$minKey" : 1 } } },

    "ns" : "myDB.customers ",

    "min" : { "country" : "JP", "custId" : { "$minKey" : 1 } },

    "max" : { "country" : "JP", "custId" : { "$maxKey" : 1 } },

    "tag" : "Asia" }

    ```


    *Listing 6-5: The tags output shows the ranges and tag*


    ```

    use config;

    db.tags.find();

    ```


    *Listing 6-4: List all configured zone ranges*


    ## Move a zone


    In our case, we want to relocate the entire Asia zone, but not change any of its
    ranges since the country codes have not changed. This remapping of a zone to a
    shard can be done with the following commands:


    ```

    sh.removeShardFromZone("sh-sing", "Asia")

    sh.addShardToZone("sh-india-2", " Asia ")

    ```


    At this point all *Asia* chunks will start being moved to the `sh-india-2` shard.


    ## Drain a shard


    To drain the chunks from a shard, we first issue the `removeShard` command on
    the shard to remove:


    ```

    db.adminCommand( { removeShard: "sh-sing" } )

    ```


    This will start moving any chunks of documents from sharded databases homed on
    *other* shards, but requires manual intervention to re-home databases that exist
    only on this shard. The system cannot automatically decide where to move them.


    The `removeShard` command will return a document telling us the state of the activity
    and if there are any databases blocking the move.


    ```

    {

    "msg" : "draining ongoing",

    "state" : "ongoing",

    "remaining" : {

    "chunks" : NumberLong(45),

    "dbs" : NumberLong(2),

    "jumboChunks" : NumberLong(0)

    },

    "note" : "you need to drop or movePrimary these databases",

    "dbsToMove" : [

    "db2",

    "db3"

    ],

    "ok" : 1

    }

    ```


    *Listing 6-6: The result of removeShard on a database primary*


    In this case, we will need to manually move two databases: `db2` and `db3`. We
    can choose to move both to our first Indian shard with


    ```

    db.adminCommand( { movePrimary: "db2", to: "sh-india-1" })

    db.adminCommand( { movePrimary: "db3", to: "sh-india-1" })

    ```


    The original `removeShard` command will need to be rerun again until the response
    of the `state` value is `"completed"`. At this point, the shard is drained and
    the hosts can be taken offline safely.


    ## Goal state


    Note that in both cases earlier, the configuration “goal state” is updated immediately
    in the metadata, but the chunks themselves may take hours or days to fully migrate
    to satisfy the new configuration. Network bandwidth, other workloads, and the
    balancer window are all factors that may limit the speed at which the target state
    is reached.


    # State-level sharding


    If your business is focused on one or many geographically large countries like
    the United States, China, or Australia having data stored in just a single physical
    location (such as having all data centers in Virginia, US-East), then the latency
    to the other side of the country may be just too high for your use case.


    The solution is to extend this concept of country-level sharding to state level.
    Luckily, this is a matter of using something more than just a country code.'
