    \ starting with a negative infinity value of `custId` for both “US” and “GB” chunks.\n\
    \nNote\n\nIn the following diagrams, -∞ is actually represented internally as\
    \ the special BSON value `MinKey` and ∞ by `MaxKey` .\n\n![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig2_HTML.jpg](images/487346_1_En_6_Chapter/487346_1_En_6_Fig2_HTML.jpg)\n\
    \nFigure 6-2\n\nAn example of zones and their chunks\n\nDefining only two zones\
    \ in our system in this way does not limit us from inserting documents with other\
    \ values for `country` such as for Canada “CA” or France “FR”. It simply means\
    \ that we have no specific zone for documents with these values. We are allowing\
    \ the built-in balancer to define a chunk range and automatically choose a shard\
    \ to store these documents. This happens completely automatically and instantly.\n\
    \nNote that zone ranges may not overlap, and ranges are always inclusive of the\
    \ lower boundary and exclusive of the upper boundary. This makes it obvious to\
    \ all `mongos` routers as to which shard a new document should be inserted.\n\n\
    ### Mapping zones to shards\n\nLet’s imagine that we have three shards available\
    \ in our cluster: one in US-East, one in the EU-West, and one in Singapore. We’re\
    \ mostly concerned with our customers in the United States and the United Kingdom\
    \ at the moment, and we want to make sure that their data is stored inside their\
    \ respective countries. For all other customers, we are happy to have the data\
    \ stored anywhere for now.\n\nNote\n\nA single shard can host multiple zones.\
    \ Furthermore, a zone can be associated with multiple shards.\n\nIn Figure [6-3](#487346_1_En_6_Chapter.xhtml#Fig3),\
    \ we see that customers in the United Kingdom and the United States match our\
    \ zone rules, and those zones are each mapped to one particular shard. The customers\
    \ from India (“IN”) and France (“FR”) could be located on any shard. In fact,\
    \ the chunks for France are likely to be migrated to the Singapore shard since\
    \ that doesn’t have as much data.\n\n![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig3_HTML.jpg](images/487346_1_En_6_Chapter/487346_1_En_6_Fig3_HTML.jpg)\n\
    \nFigure 6-3\n\nExample documents assigned to zones\n\nNow let’s imagine that\
    \ we launch in India, and due to some new regulations in that country (see Chapter\
    \ [4](#487346_1_En_4_Chapter.xhtml) on data compliance regulations), we need to\
    \ keep all Indian customers’ data inside the country. We can do that by adding\
    \ a new zone.\n\n### Adding new zones\n\nWe first need to specify a new zone to\
    \ constrain documents where `{country: \"IN\"}` such as with the following command.\n\
    \n```\nsh.updateZoneKeyRange(\"myDB.customers\",\n{ country: \"IN\", custId: MinKey\
    \ },\n{ country: \"IN\", custId: MaxKey },\n\"IND\");\nListing 6-1\nDefine a new\
    \ zone range named “IND” for India\n```\n\nThe zone itself doesn’t affect the\
    \ migrations yet since we haven’t specified a preference to the balancer for which\
    \ physical shards these zones should be located.\n\nNote\n\nBoth *Ops Manager*\
    \ and the *MongoDB Atlas* managed service provide a user interface to help define\
    \ your zone definitions and assignments.\n\n### Adding new shards\n\nWe now have\
    \ a zone defined for the Indian customer data. Before we can move any data to\
    \ the Indian zone, we must first create our infrastructure there and integrate\
    \ it into the existing sharded cluster. The steps for this are roughly:\n\n1.\
    \  Provision new servers or VMs in multiple data centers inside the target country.\n\
    \n2.  Install dependencies, MongoDB binaries, and storage systems according to\
    \ the production checklists and security best practices.\n\n3.  Build a new replica\
    \ set with an appropriate name, for example, “`sh-india-1`”. This will allow for\
    \ easier management later as our cluster grows.\n\n    **Note** It’s always safest\
    \ to use an automated tool like *Ops Manager* (Enterprise only) or Ansible scripts\
    \ to avoid human error. See Chapter [7](#487346_1_En_7_Chapter.xhtml) for more\
    \ details on deployments and Chapter [5](#487346_1_En_5_Chapter.xhtml) for more\
    \ details on replica set topologies.\n\n4.  Pause the balancer for now, as we\
    \ don’t want it to start immediately moving any chunks to this shard until zones\
    \ are properly configured. From a `mongos` run `sh.stopBalancer( 10*60*1000 )`.\n\
    \n    Here we pause for only 10 minutes because disabling the balancer for longer\
    \ periods can also prevent other normal operations such as chunk splits.\n\n5.\
    \  Now we connect this new unassigned shard into our cluster. From a `mongos`\
    \ run `sh.addShard(\"sh-india-1/node1.dc0.india.bigcorp.com:27123\")`.\n\n6. \
    \ Add the zones. From a `mongos` run `sh.addShardToZone(\"sh-india-1\", \"IND\"\
    )`.\n\n7.  Unpause the balancer allowing chunk migration to start to the new shard:\n\
    \n    From a `mongos` run `sh.startBalancer()`.\n\n    **Note** It’s not possible\
    \ to rename a replica set once it is created, since the name chosen acts like\
    \ a key for members to recognize each other. Therefore, if sets have a specific\
    \ purpose or location, it’s better to give a descriptive name rather than something\
    \ like `rs0`, `rs1`, and so on.\n\n### Gradual balancing\n\nThe balancer process\
    \ has an explicitly low priority in our sharded cluster. We don’t want to impact\
    \ regular workloads by stealing CPU and network resources to quickly balance a\
    \ shard. Shards can be involved in at most one migration at a time, either donating\
    \ or receiving chunks. For example, in a six-shard cluster, you could have up\
    \ to three parallel migrations at a time between pairs of shards.\n\nFor large\
    \ datasets where up to 2TB of data is being moved to a new shard, you may need\
    \ to allow for as long as a week for the data to become fully balanced.\n\n###\
    \ Growing zones\n\nLet’s image that our business has grown strongly in India and\
    \ our original Indian shard is approaching our 2TB data size threshold. We want\
    \ to partition it further to avoid problems in backup and restore times.\n\nWe\
    \ still need to keep our Indian data inside India, so the solution is to deploy\
    \ a *second* Indian shard and balance our data between the two shards. We already\
    \ have a zone definition `\"IND\"` for our Indian documents, so there are less\
    \ steps in growing out:\n\n1.  Provision new servers or VMs in multiple data centers\
    \ inside the target country; install dependencies, MongoDB binaries, and storage\
    \ systems according to the production checklists and security best practices.\n\
    \n2.  Build another replica set with a consistent name, for example, “`sh-india-2`”\
    \ this time.\n\n3.  There is no need to pause the balancer, since existing Indian\
    \ data is already constrained inside the country.\n\n4.  Again we connect this\
    \ new unassigned shard into our cluster\n\n    `sh.addShard(\"sh-india-2/node5.dc1.india.bigcorp.com:27123\"\
    )`.\n\n5.  Link this new shard to the existing Indian zone:\n\n    `sh.addShardToZone(\"\
    sh-india-2\", \"IND\")`\n\n6.  Monitor chunk migration to the 2nd India shard\
    \ with\n\n    `sh.status()`"
  trans: "\n## 定义区域\n\n我们可以将区域想象为管理员定义的、连续的分片键值范围。一个区域最初可能不包含或只包含少量文档块，但在大型生产系统中，可能会存在数百万个块。\n\
    \n在图 6-2 中，我们可以看到为美国客户（国家代码为“US”）和英国客户（根据 ISO 3166-1 标准，国家代码为“GB”代表大不列颠）定义了两个区域。\n\
    \n在此示例中，我们仍然假设客户 ID 字段 `custId` 在整个集群中实际上是唯一的字段，但由于我们使用的是复合分片键，因此对于“US”和“GB”块，都存在一个从\
    \ `custId` 的负无穷大值开始的块区域。\n\n注意：在以下图表中，-∞ 在内部实际上表示为特殊的 BSON 值 `MinKey`，而 ∞ 则表示为\
    \ `MaxKey`。\n\n![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig2_HTML.jpg](img/487346_1_En_6_Fig2_HTML.jpg)\n\
    \n*图 6-2：区域及其块的示例*\n\n以这种方式在系统中仅定义两个区域，并不限制我们插入 `country` 字段为其他值（如加拿大“CA”或法国“FR”）的文档。这仅仅意味着我们没有为这些值的文档设置特定的区域。我们允许内置的均衡器定义一个块范围，并自动选择一个分片来存储这些文档。这个过程是完全自动且即时完成的。\n\
    \n请注意，区域范围不能重叠，并且范围总是包含下边界但不包含上边界。这使得所有 `mongos` 路由器都能清楚地知道新文档应该插入到哪个分片。\n\n##\
    \ 将区域映射到分片\n\n让我们想象一下，我们的集群中有三个可用分片：一个在美国东部，一个在欧盟西部，另一个在新加坡。目前我们主要关注美国和英国的客户，并希望确保他们的数据存储在各自的国家内。对于所有其他客户，我们目前乐意将数据存储在任何地方。\n\
    \n注意：一个分片可以承载多个区域。此外，一个区域可以与多个分片关联。\n\n在图 6-3 中，我们看到英国和美国的客户符合我们的区域规则，这些区域各自映射到一个特定的分片。来自印度（“IN”）和法国（“FR”）的客户可能位于任何分片上。事实上，法国的块很可能会迁移到新加坡分片，因为该分片的数据量较少。\n\
    \n![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig3_HTML.jpg](img/487346_1_En_6_Fig3_HTML.jpg)\n\
    \n*图 6-3：分配到区域的文档示例*\n\n现在，让我们想象一下我们在印度开展业务，并且由于该国的一些新法规（有关数据合规性法规，请参见第 4 章），我们需要将所有印度客户的数据保留在该国境内。我们可以通过添加一个新区域来实现这一点。\n\
    \n## 添加新区域\n\n我们首先需要指定一个新区域来约束 `{country: \"IN\"}` 的文档，例如使用以下命令。\n\n```\nsh.updateZoneKeyRange(\"\
    myDB.customers\",\n{ country: \"IN\", custId: MinKey },\n{ country: \"IN\", custId:\
    \ MaxKey },\n\"IND\");\n```\n\n*清单 6-1：为印度定义一个名为“IND”的新区域范围*\n\n区域本身还不会影响迁移，因为我们尚未向均衡器指定这些区域应该位于哪些物理分片的偏好。\n\
    \n注意：`Ops Manager` 和 `MongoDB Atlas` 托管服务都提供了用户界面来帮助定义区域和分配。\n\n## 添加新分片\n\n我们现在已经为印度客户数据定义了一个区域。在将任何数据移动到印度区域之前，我们必须首先在该国创建基础设施并将其集成到现有的分片集群中。大致步骤如下：\n\
    \n1.  在目标国家境内的多个数据中心配置新的服务器或虚拟机。\n2.  根据生产清单和安全最佳实践，安装依赖项、MongoDB 二进制文件和存储系统。\n\
    3.  构建一个具有适当名称的新副本集，例如“`sh-india-1`”。这将便于我们集群日后的管理。\n    注意：使用自动化工具（如仅企业版可用的 `Ops\
    \ Manager`）或 Ansible 脚本始终是最安全的方式，可以避免人为错误。有关部署的更多详细信息，请参见第 7 章；有关副本集拓扑的更多详细信息，请参见第\
    \ 5 章。\n4.  暂停均衡器，因为我们不希望在区域正确配置之前，它立即开始将任何块移动到该分片。在 `mongos` 上运行 `sh.stopBalancer(\
    \ 10*60*1000 )`。\n    这里我们只暂停 10 分钟，因为长时间禁用均衡器也会阻止其他正常操作，例如块分裂。\n5.  现在，将这个新的未分配分片连接到我们的集群中。在\
    \ `mongos` 上运行 `sh.addShard(\"sh-india-1/node1.dc0.india.bigcorp.com:27123\")`。\n\
    6.  添加区域。在 `mongos` 上运行 `sh.addShardToZone(\"sh-india-1\", \"IND\")`。\n7.  恢复均衡器，允许开始向新分片迁移块：\n\
    \    在 `mongos` 上运行 `sh.startBalancer()`。\n    注意：副本集一旦创建就无法重命名，因为所选名称充当成员相互识别的密钥。因此，如果集合有特定的用途或位置，最好给出描述性名称，而不是\
    \ `rs0`、`rs1` 等。\n\n## 渐进式均衡\n\n均衡器进程在我们的分片集群中具有明确的低优先级。我们不希望为了快速均衡一个分片而占用 CPU\
    \ 和网络资源，从而影响常规工作负载。分片一次最多只能参与一次迁移，无论是捐赠还是接收块。例如，在一个六分片集群中，最多可以同时进行三个分片对之间的并行迁移。\n\
    \n对于大型数据集，当有高达 2TB 的数据要移动到新分片时，可能需要长达一周的时间才能使数据完全均衡。\n\n## 扩展区域\n\n假设我们在印度的业务增长强劲，我们最初的印度分片已接近\
    \ 2TB 的数据大小阈值。我们希望进一步分区，以避免备份和恢复时间出现问题。\n\n我们仍然需要将印度数据保留在印度境内，因此解决方案是部署*第二个*印度分片，并在两个分片之间均衡数据。我们已经为印度文档定义了区域\
    \ `\"IND\"`，因此扩展的步骤更少：\n\n1.  在目标国家境内的多个数据中心配置新的服务器或虚拟机；根据生产清单和安全最佳实践，安装依赖项、MongoDB\
    \ 二进制文件和存储系统。\n2.  构建另一个具有一致名称的副本集，例如这次是“`sh-india-2`”。\n3.  无需暂停均衡器，因为现有的印度数据已经限制在该国境内。\n\
    4.  同样，我们将这个新的未分配分片连接到我们的集群：\n    `sh.addShard(\"sh-india-2/node5.dc1.india.bigcorp.com:27123\"\
    )`。\n5.  将这个新分片链接到现有的印度区域：\n    `sh.addShardToZone(\"sh-india-2\", \"IND\")`。\n\
    6.  使用以下命令监控向第二个印度分片的块迁移情况：\n    `sh.status()`。\n"
- fmt: '### Redistributing zones


    Let’s image that in addition to the country-specific zone definitions for the
    United Kingdom, the United States, and India, we also defined a pan-Asian zone
    to cover all other South-East Asian countries.


    If we didn’t create the “catch-all” Asia zone, then Asian customers could have
    been automatically balanced to physical shards located in the EU or the United
    States, making potentially unacceptable round-trip latencies.


    We can assign multiple ranges to this *Asia* shard as seen in Listing [6-2](#487346_1_En_6_Chapter.xhtml#PC2).


    ```javascript

    sh.updateZoneKeyRange("myDB. customers ",

    { country: "JP", custId: MinKey },  // Japan

    { country: "JP", custId: MaxKey }, "Asia")

    sh.updateZoneKeyRange("myDB. customers ",

    { country: "KO", custId: MinKey }, // Korea

    { country: "KO", custId: MaxKey }, "Asia")

    sh.updateZoneKeyRange("myDB. customers ",

    { country: "TH", custId: MinKey }, // Thailand

    { country: "TH", custId: MaxKey }, "Asia")

    sh.updateZoneKeyRange("myDB. customers ",

    { country: "PH", custId: MinKey }, // Philippines

    { country: "PH", custId: MaxKey }, "Asia")

    ```

    Listing 6-2

    Multiple zone ranges can be assigned to a single zone


    Let’s say that we have cancelled plans to expand into South-East Asia, but we
    still have our data center in Singapore. But as shown in Figure [6-4](#487346_1_En_6_Chapter.xhtml#Fig4),
    now we also have two shards in India. The latency between the legacy customers
    in the rest of Asia is acceptable and so we decide to decommission our Singapore
    shard and move that data to India.


    ![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig4_HTML.jpg](images/487346_1_En_6_Chapter/487346_1_En_6_Fig4_HTML.jpg)


    Figure 6-4

    The "Singapore" shard and its Asia zone will be moved to India


    We need to remember that the *Singapore* shard might contain more than just the
    Asia zone. It may also contain a number of other chunks for customers in countries
    not specified explicitly in any existing zone.


    ### Draining shards


    There are two steps prior to decommissioning the hardware in Singapore:


    1.  Move the zone to a different shard.

    2.  Drain the rest of the Singapore shard, thus forcing any “miscellaneous” chunks
    to be moved elsewhere.


    In Figure [6-5](#487346_1_En_6_Chapter.xhtml#Fig5), we see the *Asia* zone moved
    to the *India-2* shard, and by happy coincidence, our nonzoned customer from France
    was moved to *US-East*.


    ![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig5_HTML.jpg](images/487346_1_En_6_Chapter/487346_1_En_6_Fig5_HTML.jpg)


    Figure 6-5

    The “Singapore” shard is drained prior to decommissioning


    As our business grows in the United States, we decide to add a second shard in
    US-West. You may have noticed that we have no way to map customer from California
    to the West Coast shard and those in New York to the East. Solutions for this
    requirement are covered in “State-level sharding*”* later in this chapter.


    ### Check chunk distribution


    There are a few simple commands that when run through a `mongos`, these will give
    a concise overview of our sharded cluster. The first command is `sh.status()`,
    and the following (Listing [6-3](#487346_1_En_6_Chapter.xhtml#PC3)) is an example
    output for our sharded cluster.


    ```javascript

    mongos> sh.status()

    --- Sharding Status ---

    sharding version: {

    "_id" : 1,

    "minCompatibleVersion" : 5,

    "currentVersion" : 6,

    "clusterId" : ObjectId("5e41c1b7bb6aba86023a5aa8")

    }

    shards:

    { "_id" : "sh-eu-west",

    "host" : "sh-eu-west/:,...",

    "tags" : [ "GBR" ] }

    { "_id" : "sh-india-1",

    "host" : "sh-india-1/:,...",

    "tags" : [ "IND" ] }

    { "_id" : "sh-india-2",

    "host" : "sh-india-2/:,...",

    "tags" : [ "IND" ] }

    {  "_id" : "sh-sing",

    "host" : "sh-sing/:,...",

    "tags" : [ "Asia" ] }

    {  "_id" : "sh-us-east",

    "host" : "sh-us-east/:,...",

    "tags" : [ "USA" ] }

    active mongoses:

    "4.2.3" : 3

    autosplit:

    Currently enabled: yes

    balancer:

    Currently enabled:  yes

    Currently running:  no

    Failed balancer rounds in last 5 attempts:  0

    Migration Results for the last 24 hours:

    2 : Success

    databases:

    {  "_id" : "config",  "primary" : "config",  "partitioned" : true }

    {  "_id" : "myDB",  "primary" : "sh-eu-west",  "partitioned" : true,  "version"
    : {  "uuid" : UUID("b366477f-afa9-4b95-924e-d916cc56d9e8"),  "lastMod" : 1 } }

    myDB.customers

    shard key: { "country" : 1, "custId" : 1 }

    unique: false

    balancing: true

    chunks:

    sh-eu-west    1

    sh-india-2    1

    sh-us-east    1

    { "country" : { "$minKey" : 1 },

    "custId" : { "$minKey" : 1 } } -->>

    { "country" : "IN",

    "custId" : { "$minKey" : 1 } }

    on : sh-us-east Timestamp(4, 0)

    { "country" : "IN",

    "custId" : { "$minKey" : 1 } } -->>

    { "country" : "IN",

    "custId" : { "$maxKey" : 1 } }

    on : sh-india-2 Timestamp(3, 0)

    { "country" : "IN",

    "custId" : { "$maxKey" : 1 } } -->>

    { "country" : { "$maxKey" : 1 },

    "custId" : { "$maxKey" : 1 } }

    on : sh-eu-west Timestamp(4, 1)

    tag: IND  {

    "country" : "IN",

    "custId" : { "$minKey" : 1 } } -->>

    { "country" : "IN",

    "custId" : { "$maxKey" : 1 } }

    ```

    Listing 6-3

    Example output from the `sh.status()` command


    We will go through this `sh.status()` output section by the following section.


    #### Shards


    As the name suggests, the **shard** section lists all the configured shards in
    this cluster. Each shard should list all known nodes in that shard’s replica set
    as a sort of seed list. In reality, this would be something like:


    ```javascript

    sh-india-2/host5.dc1.india.bigcorp.com:27123, host6.dc1.india.bigcorp.com:27123,
    host7.dc1.india.bigcorp.com:27123

    ```


    For the same reasons of high availability, we should really include all nodes
    when configuring the shard in the configuration.


    If `host5` happened to be down when this `mongos` started up and fetched this
    config from the `config` database, it would still be able to connect to the other
    nodes and from their autodetect other parts of the replica set.


    #### Active mongoses


    The **active mongoses** section simply lists the total number of `mongos`es available
    in the deployment and their binary versions.


    Note


    The drivers in your application will only connect to the `mongos`es listed out
    in the Connection URI and will not auto-discover other `mongos`es in the deployment.
    This can be useful to reserve some `mongos`es for special workloads.


    #### Splitter/balancer


    The splitter and balancer are closely related modules in the automation of a sharded
    cluster. The splitter identifies chunks that are too big and splits them into
    two smaller chunks.


    While the overhead of individual splits is pretty small, the result of splitting
    up chunks unnecessarily is more complex metadata and the less efficient routing
    of queries to target shards.


    Note that splits will only be triggered during inserts or updates of documents
    into that particular chunk range. The **autosplit** enabled simply means that
    these splits can occur, even if there are currently no migrations allowed.


    In Figure [6-6](#487346_1_En_6_Chapter.xhtml#Fig6), you may notice that a split
    produces chunks that preserve the bounds of their parent. A split operation never
    requires migration to another chunk, nor can it invalidate zone rules. By extension,
    any data protection regulations that require user documents to exist in a certain
    physical location are not violated.


    ![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig6_HTML.jpg](images/487346_1_En_6_Chapter/487346_1_En_6_Fig6_HTML.jpg)


    Figure 6-6

    A large chunk is split into two child chunks


    Once the chunk has been split into two, the balancer may be triggered if an imbalance
    between the shards is detected. In the `sh.status()` output earlier, we see that
    the balancer is enabled, but it is currently not running since no shards are out
    of balance and all chunks already follow the zone configuration. Should we change
    the zone ranges, the balancer may need to start moving chunks to a new shard to
    match the zone configuration.


    Note


    You should avoid disabling the splitter or balancer for long periods as shards
    may become unbalanced, especially during import workloads.'
  raw: '### Redistributing zones


    Let’s image that in addition to the country-specific zone definitions for the
    United Kingdom, the United States, and India, we also defined a pan-Asian zone
    to cover all other South-East Asian countries.


    If we didn’t create the “catch-all” Asia zone, then Asian customers could have
    been automatically balanced to physical shards located in the EU or the United
    States, making potentially unacceptable round-trip latencies.


    We can assign multiple ranges to this *Asia* shard as seen in Listing [6-2](#487346_1_En_6_Chapter.xhtml#PC2).


    ```

    sh.updateZoneKeyRange("myDB. customers ",

    { country: "JP", custId: MinKey },  // Japan

    { country: "JP", custId: MaxKey }, "Asia")

    sh.updateZoneKeyRange("myDB. customers ",

    { country: "KO", custId: MinKey }, // Korea

    { country: "KO", custId: MaxKey }, "Asia")

    sh.updateZoneKeyRange("myDB. customers ",

    { country: "TH", custId: MinKey }, // Thailand

    { country: "TH", custId: MaxKey }, "Asia")

    sh.updateZoneKeyRange("myDB. customers ",

    { country: "PH", custId: MinKey }, // Philippines

    { country: "PH", custId: MaxKey }, "Asia")

    Listing 6-2

    Multiple zone ranges can be assigned to a single zone

    ```


    Let’s say that we have cancelled plans to expand into South-East Asia, but we
    still have our data center in Singapore. But as shown in Figure [6-4](#487346_1_En_6_Chapter.xhtml#Fig4),
    now we also have two shards in India. The latency between the legacy customers
    in the rest of Asia is acceptable and so we decide to decommission our Singapore
    shard and move that data to India.


    ![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig4_HTML.jpg](images/487346_1_En_6_Chapter/487346_1_En_6_Fig4_HTML.jpg)


    Figure 6-4


    The "Singapore" shard and its Asia zone will be moved to India


    We need to remember that the *Singapore* shard might contain more than just the
    Asia zone. It may also contain a number of other chunks for customers in countries
    not specified explicitly in any existing zone.


    ### Draining shards


    There are two steps prior to decommissioning the hardware in Singapore:


    1.  Move the zone to a different shard.


    2.  Drain the rest of the Singapore shard, thus forcing any “miscellaneous” chunks
    to be moved elsewhere.


    In Figure [6-5](#487346_1_En_6_Chapter.xhtml#Fig5), we see the *Asia* zone moved
    to the *India-2* shard, and by happy coincidence, our nonzoned customer from France
    was moved to *US-East*.


    ![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig5_HTML.jpg](images/487346_1_En_6_Chapter/487346_1_En_6_Fig5_HTML.jpg)


    Figure 6-5


    The “Singapore” shard is drained prior to decommissioning


    As our business grows in the United States, we decide to add a second shard in
    US-West. You may have noticed that we have no way to map customer from California
    to the West Coast shard and those in New York to the East. Solutions for this
    requirement are covered in “State-level sharding*”* later in this chapter.


    ### Check chunk distribution


    There are a few simple commands that when run through a `mongos`, these will give
    a concise overview of our sharded cluster. The first command is `sh.status()`,
    and the following (Listing [6-3](#487346_1_En_6_Chapter.xhtml#PC3)) is an example
    output for our sharded cluster.


    ```

    mongos> sh.status()

    --- Sharding Status ---

    sharding version: {

    "_id" : 1,

    "minCompatibleVersion" : 5,

    "currentVersion" : 6,

    "clusterId" : ObjectId("5e41c1b7bb6aba86023a5aa8")

    }

    shards:

    { "_id" : "sh-eu-west",

    "host" : "sh-eu-west/:,...",

    "tags" : [ "GBR" ] }

    { "_id" : "sh-india-1",

    "host" : "sh-india-1/:,...",

    "tags" : [ "IND" ] }

    { "_id" : "sh-india-2",

    "host" : "sh-india-2/:,...",

    "tags" : [ "IND" ] }

    {  "_id" : "sh-sing",

    "host" : "sh-sing/:,...",

    "tags" : [ "Asia" ] }

    {  "_id" : "sh-us-east",

    "host" : "sh-us-east/:,...",

    "tags" : [ "USA" ] }

    active mongoses:

    "4.2.3" : 3

    autosplit:

    Currently enabled: yes

    balancer:

    Currently enabled:  yes

    Currently running:  no

    Failed balancer rounds in last 5 attempts:  0

    Migration Results for the last 24 hours:

    2 : Success

    databases:

    {  "_id" : "config",  "primary" : "config",  "partitioned" : true }

    {  "_id" : "myDB",  "primary" : "sh-eu-west",  "partitioned" : true,  "version"
    : {  "uuid" : UUID("b366477f-afa9-4b95-924e-d916cc56d9e8"),  "lastMod" : 1 } }

    myDB.customers

    shard key: { "country" : 1, "custId" : 1 }

    unique: false

    balancing: true

    chunks:

    sh-eu-west    1

    sh-india-2    1

    sh-us-east    1

    { "country" : { "$minKey" : 1 },

    "custId" : { "$minKey" : 1 } } -->>

    { "country" : "IN",

    "custId" : { "$minKey" : 1 } }

    on : sh-us-east Timestamp(4, 0)

    { "country" : "IN",

    "custId" : { "$minKey" : 1 } } -->>

    { "country" : "IN",

    "custId" : { "$maxKey" : 1 } }

    on : sh-india-2 Timestamp(3, 0)

    { "country" : "IN",

    "custId" : { "$maxKey" : 1 } } -->>

    { "country" : { "$maxKey" : 1 },

    "custId" : { "$maxKey" : 1 } }

    on : sh-eu-west Timestamp(4, 1)

    tag: IND  {

    "country" : "IN",

    "custId" : { "$minKey" : 1 } } -->>

    { "country" : "IN",

    "custId" : { "$maxKey" : 1 } }

    Listing 6-3

    Example output from the sh.status() command

    ```


    We will go through this `sh.status()` output section by the following section.


    #### Shards


    As the name suggests, the **shard** section lists all the configured shards in
    this cluster. Each shard should list all known nodes in that shard’s replica set
    as a sort of seed list. In reality, this would be something like:


    ```

    sh-india-2/host5.dc1.india.bigcorp.com:27123, host6.dc1.india.bigcorp.com:27123,
    host7.dc1.india.bigcorp.com:27123

    ```


    For the same reasons of high availability, we should really include all nodes
    when configuring the shard in the configuration.


    If `host5` happened to be down when this `mongos` started up and fetched this
    config from the `config` database, it would still be able to connect to the other
    nodes and from their autodetect other parts of the replica set.


    #### Active mongoses


    The **active mongoses** section simply lists the total number of `mongos`es available
    in the deployment and their binary versions.


    Note


    The drivers in your application will only connect to the `mongos`es listed out
    in the Connection URI and will not auto-discover other `mongos`es in the deployment.
    This can be useful to reserve some `mongos`es for special workloads.


    #### Splitter/balancer


    The splitter and balancer are closely related modules in the automation of a sharded
    cluster. The splitter identifies chunks that are too big and splits them into
    two smaller chunks.


    While the overhead of individual splits is pretty small, the result of splitting
    up chunks unnecessarily is more complex metadata and the less efficient routing
    of queries to target shards.


    Note that splits will only be triggered during inserts or updates of documents
    into that particular chunk range. The **autosplit** enabled simply means that
    these splits can occur, even if there are currently no migrations allowed.


    In Figure [6-6](#487346_1_En_6_Chapter.xhtml#Fig6), you may notice that a split
    produces chunks that preserve the bounds of their parent. A split operation never
    requires migration to another chunk, nor can it invalidate zone rules. By extension,
    any data protection regulations that require user documents to exist in a certain
    physical location are not violated.


    ![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig6_HTML.jpg](images/487346_1_En_6_Chapter/487346_1_En_6_Fig6_HTML.jpg)


    Figure 6-6


    A large chunk is split into two child chunks


    Once the chunk has been split into two, the balancer may be triggered if an imbalance
    between the shards is detected. In the `sh.status()` output earlier, we see that
    the balancer is enabled, but it is currently not running since no shards are out
    of balance and all chunks already follow the zone configuration. Should we change
    the zone ranges, the balancer may need to start moving chunks to a new shard to
    match the zone configuration.


    Note


    You should avoid disabling the splitter or balancer for long periods as shards
    may become unbalanced, especially during import workloads.'
  trans: '

    ### 重新分配区域


    假设除了英国、美国和印度的国家特定区域定义之外，我们还定义了一个泛亚洲区域来覆盖所有其他东南亚国家。


    如果我们没有创建这个“全覆盖”的亚洲区域，那么亚洲客户可能会被自动均衡到位于欧盟或美国的物理分片上，从而可能导致不可接受的往返延迟。


    我们可以将多个范围分配给这个*亚洲*分片，如代码清单 6-2 所示。


    ```javascript

    sh.updateZoneKeyRange("myDB. customers ",

    { country: "JP", custId: MinKey },  // 日本

    { country: "JP", custId: MaxKey }, "Asia")

    sh.updateZoneKeyRange("myDB. customers ",

    { country: "KO", custId: MinKey }, // 韩国

    { country: "KO", custId: MaxKey }, "Asia")

    sh.updateZoneKeyRange("myDB. customers ",

    { country: "TH", custId: MinKey }, // 泰国

    { country: "TH", custId: MaxKey }, "Asia")

    sh.updateZoneKeyRange("myDB. customers ",

    { country: "PH", custId: MinKey }, // 菲律宾

    { country: "PH", custId: MaxKey }, "Asia")

    ```

    代码清单 6-2

    可以为单个区域分配多个区域范围


    假设我们已经取消了向东南亚扩张的计划，但我们仍然在新加坡拥有数据中心。但如图 6-4 所示，现在我们在印度也有两个分片。亚洲其他地区遗留客户的延迟是可以接受的，因此我们决定停用新加坡分片，并将数据迁移到印度。


    ![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig4_HTML.jpg](img/487346_1_En_6_Fig4_HTML.jpg)


    图 6-4

    “新加坡”分片及其亚洲区域将被迁移到印度


    我们需要记住，*新加坡*分片可能不仅仅包含亚洲区域。它也可能包含一些未在任何现有区域中明确指定的国家的客户的其他块。


    ### 清空分片


    在停用新加坡的硬件之前，有两个步骤：


    1.  将区域移动到不同的分片。

    2.  清空新加坡分片的其余部分，从而强制将任何“杂项”块移动到其他地方。


    在图 6-5 中，我们看到*亚洲*区域已移至*印度-2*分片，并且幸运的是，我们来自法国的未分区客户被移到了*美国东部*。


    ![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig5_HTML.jpg](img/487346_1_En_6_Fig5_HTML.jpg)


    图 6-5

    “新加坡”分片在停用前被清空


    随着我们在美国业务的增长，我们决定在美西增加第二个分片。你可能已经注意到，我们无法将加利福尼亚的客户映射到西海岸分片，也无法将纽约的客户映射到东海岸分片。满足此需求的方法将在本章后面的“州级分片*”*中介绍。


    ### 检查块分布


    通过运行在`mongos`上的几个简单命令，可以简洁地概述我们的分片集群。第一个命令是`sh.status()`，以下是代码清单 6-3 所示的我们分片集群的示例输出。


    ```javascript

    mongos> sh.status()

    --- 分片状态 ---

    分片版本: {

    "_id" : 1,

    "minCompatibleVersion" : 5,

    "currentVersion" : 6,

    "clusterId" : ObjectId("5e41c1b7bb6aba86023a5aa8")

    }

    分片:

    { "_id" : "sh-eu-west",

    "host" : "sh-eu-west/:,...",

    "tags" : [ "GBR" ] }

    { "_id" : "sh-india-1",

    "host" : "sh-india-1/:,...",

    "tags" : [ "IND" ] }

    { "_id" : "sh-india-2",

    "host" : "sh-india-2/:,...",

    "tags" : [ "IND" ] }

    {  "_id" : "sh-sing",

    "host" : "sh-sing/:,...",

    "tags" : [ "Asia" ] }

    {  "_id" : "sh-us-east",

    "host" : "sh-us-east/:,...",

    "tags" : [ "USA" ] }

    活跃的 mongos 实例:

    "4.2.3" : 3

    自动分裂:

    当前启用: 是

    均衡器:

    当前启用:  是

    当前运行:  否

    过去 5 次均衡尝试失败次数:  0

    过去 24 小时迁移结果:

    2 : 成功

    数据库:

    {  "_id" : "config",  "primary" : "config",  "partitioned" : true }

    {  "_id" : "myDB",  "primary" : "sh-eu-west",  "partitioned" : true,  "version"
    : {  "uuid" : UUID("b366477f-afa9-4b95-924e-d916cc56d9e8"),  "lastMod" : 1 } }

    myDB.customers

    分片键: { "country" : 1, "custId" : 1 }

    唯一: false

    均衡中: true

    块:

    sh-eu-west    1

    sh-india-2    1

    sh-us-east    1

    { "country" : { "$minKey" : 1 },

    "custId" : { "$minKey" : 1 } } -->>

    { "country" : "IN",

    "custId" : { "$minKey" : 1 } }

    位于 : sh-us-east Timestamp(4, 0)

    { "country" : "IN",

    "custId" : { "$minKey" : 1 } } -->>

    { "country" : "IN",

    "custId" : { "$maxKey" : 1 } }

    位于 : sh-india-2 Timestamp(3, 0)

    { "country" : "IN",

    "custId" : { "$maxKey" : 1 } } -->>

    { "country" : { "$maxKey" : 1 },

    "custId" : { "$maxKey" : 1 } }

    位于 : sh-eu-west Timestamp(4, 1)

    标签: IND  {

    "country" : "IN",

    "custId" : { "$minKey" : 1 } } -->>

    { "country" : "IN",

    "custId" : { "$maxKey" : 1 } }

    ```

    代码清单 6-3

    `sh.status()`命令的示例输出


    我们将逐节介绍这个`sh.status()`输出。


    #### 分片


    顾名思义，**分片**部分列出了此集群中所有已配置的分片。每个分片都应列出该分片副本集中所有已知节点作为种子列表。实际上，这类似于：


    ```javascript

    sh-india-2/host5.dc1.india.bigcorp.com:27123, host6.dc1.india.bigcorp.com:27123,
    host7.dc1.india.bigcorp.com:27123

    ```


    出于高可用性的同样原因，我们在配置分片时确实应该包含所有节点。


    如果`mongos`启动并从`config`数据库获取此配置时`host5`恰好宕机，它仍然能够连接到其他节点，并从它们那里自动检测到副本集的其他部分。


    #### 活跃的 mongos 实例


    **活跃的 mongos 实例**部分简单列出了部署中可用的`mongos`实例总数及其二进制版本。


    注意


    你应用程序中的驱动程序只会连接到连接 URI 中列出的`mongos`实例，不会自动发现部署中的其他`mongos`实例。这对于保留一些`mongos`实例用于特殊工作负载可能很有用。


    #### 分裂器/均衡器


    分裂器和均衡器是分片集群自动化中密切相关的模块。分裂器识别过大的块，并将其分裂成两个更小的块。


    虽然单个分裂的开销很小，但不必要地分裂块会导致元数据更复杂，并且查询到目标分片的路由效率降低。


    请注意，分裂只会触发于向该特定块范围插入或更新文档时。**自动分裂**已启用仅仅意味着这些分裂可以发生，即使当前不允许进行任何迁移。


    在图 6-6 中，你可能会注意到分裂产生的子块保留了其父块的边界。分裂操作永远不需要迁移到另一个块，也不会使区域规则失效。因此，任何要求用户文档存在于特定物理位置的数据保护规定都不会被违反。


    ![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig6_HTML.jpg](img/487346_1_En_6_Fig6_HTML.jpg)


    图 6-6

    一个大块被分裂成两个子块


    一旦块被分裂成两个，如果检测到分片之间不平衡，就可能触发均衡器。在前面的`sh.status()`输出中，我们看到均衡器已启用，但当前没有运行，因为没有分片失衡，并且所有块已经遵循区域配置。如果我们更改了区域范围，均衡器可能需要开始将块移动到新的分片以匹配区域配置。


    注意


    你应该避免长时间禁用分裂器或均衡器，因为分片可能会变得不平衡，尤其是在导入工作负载期间。

