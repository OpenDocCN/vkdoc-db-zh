  trans: '

    ## 单数据中心


    在单数据中心拓扑中，我们的选择有限，但可以通过构建包含多于三个成员的副本集来最大化可用性。例如，我们可以使用七个成员来构建副本集。


    我们可以通过将每个节点放置在其独立的物理主机上来增加额外的防护措施。每台主机应放置在独立的机架上，最好在不同的电源回路上，并配备独立的备用电源。


    **警告**


    位于不同虚拟机（VM）但共享同一底层虚拟机主机的节点，若该虚拟机主机发生硬件故障，将会一起失效。


    每台物理主机应具备 `冗余网络`。这可以通过 `网络绑定`（也称为 `链路聚合`）来实现。有多种不同模式可用，包括提供负载均衡的轮询均衡器（round-robin）和仅提供容错的“主备”（Active-Backup）模式。在大多数现代
    Linux 发行版中，可通过 `modprobe` 启用；在 Debian 系统上，可使用 `ifenslave`。你应与网络管理员确认，确保你的网络交换机支持网络绑定。


    避免在 MongoDB 节点的数据卷上使用 `共享网络存储` 解决方案。这种方法意味着所有副本集成员的数据实际上都存储在同一个存储解决方案上。更安全的做法是使用如
    `NVMe` 驱动器这样的快速本地存储，每台主机独立配置。


    `备份` 应尽可能频繁地进行，并以加密状态存储在安全的云提供商处。如果使用 MongoDB 企业版，Ops Manager 可提供带时间点恢复的持续备份。


    你应定期测试从备份中`恢复`，以确认工作流程并确保集群能在恢复时间目标（`RTO`）内恢复。


    然而，总的来说，对于任何生产用例，单数据中心风险过高。区域性电力故障总会导致停机，而火灾则可能轻易导致数据完全丢失。


    ## 双数据中心


    使用两个数据中心时，你有机会让每个数据中心至少保留一个承载数据的节点。在图 5-5 中，我们看到一个分布于两个数据中心的 `PSS` 或 `PS|S`（主-从-从）拓扑。这样，在某个数据中心完全故障的情况下，仍然拥有整个数据库的完整且最新的副本。


    ![../images/487346_1_En_5_Chapter/487346_1_En_5_Fig5_HTML.jpg](img/487346_1_En_5_Fig5_HTML.jpg)


    图 5-5：最佳的双数据中心配置


    在此配置中，如果 `DC2` 完全故障，`DC1` 维持了多数节点，可以继续承载主节点。然而，如果 `DC1` 故障，则只剩下三个节点中的一个，位于 `DC2`
    的剩余节点无法自行选举为主节点并接受写入。因为它不知道是仅仅是 `网络分区`，还是 `DC1` 中已存在主节点，所以它必须保持从节点状态。`DC2` 中的应用程序仍可读取陈旧数据，但如果尝试任何写入操作将会超时。


    ## 双数据中心（外加云仲裁节点）


    如果你只有两个数据中心可用于存储生产数据，你可以使用云提供商上的远程 `仲裁节点` 作为公正的投票者，以避免集群中的“脑裂”情况。


    如果安全策略不允许使用云提供商，则可以使用位于远程地点的第三个私有数据中心，即使它通常因容量较低或高延迟而不适合承载数据节点。


    正如我们在第 1 章讨论的，`仲裁节点` 不会复制或存储任何用户数据。因此，它的网络带宽和存储要求非常低，并且不构成数据保护法规的风险（第 4 章）。它的唯一目的是通过确定哪些承载数据的数据中心当前可从网络其余部分访问，来参与选举。


    所谓的 `PSA`（主-从-仲裁）配置有一个主要问题，即你的应用程序无法在数据中心故障时启用多数写入并继续运行（见图 5-6）。如果任一数据中心不可用，则只剩下一个承载数据的节点，多数写入将一直超时，直到该
    `DC` 恢复。


    ![../images/487346_1_En_5_Chapter/487346_1_En_5_Fig6_HTML.jpg](img/487346_1_En_5_Fig6_HTML.jpg)


    图 5-6：云中的仲裁节点，但不具备安全的多数写入能力


    **警告**


    当承载数据的节点宕机时，仲裁节点会引入许多不良的边缘情况（特别是对于读关注级别 `majority`），在生产环境中应尽可能避免使用。


    一个稍微安全的选择（图 5-7）是使用一个五成员集，写关注级别设为 `3`（而不是 `majority`），并且在每个数据中心有两个承载数据的节点。在这种情况下，当单个承载数据的节点故障时，写关注级别仍允许写入。然而，如果任何一个完整的
    `DC` 故障，我们再次无法安全地向部署中写入数据。


    ![../images/487346_1_En_5_Chapter/487346_1_En_5_Fig7_HTML.jpg](img/487346_1_En_5_Fig7_HTML.jpg)


    图 5-7：一个 `PSSSA` 拓扑，仲裁节点在云中，写关注级别为：3


    这种拓扑结构还有另一个好处。因为一个从节点与主节点位于同一 `DC`，它将具有非常低的延迟，应该能更容易地跟上复制速度。如果主节点突然故障，`mongod`
    通常会先复制写入操作，并且能够比任何远程成员更快地接管主节点角色。


    ### 手动干预


    假设我们有一个 `P|S|A` 拓扑，并且由于该地区的大规模电力故障，两个数据中心之一变得不可用。位于第三个位置的 `仲裁节点` 保留了投票者的法定人数，因此主节点可以保持主节点状态。然而，现在只有一个承载数据的节点可用。任何请求写关注级别为
    `majority` 的写入操作都将被阻塞，等待第二个承载数据的节点确认更改。


    请注意，`仲裁节点` 的 `优先级` 始终为 `0`，因为它没有数据，所以永远不能成为主节点。


    为了本节的目的，让我们考虑一个 `PSA` 副本集的默认配置。


    ```

    {

    "_id" : "rs0",

    "version" : 1,

    "protocolVersion" : NumberLong(1),

    "members" : [

    {

    "_id" : 0,

    "host" : "mongodb0.example.local:27017",

    "arbiterOnly" : false,

    "hidden" : false,

    "priority" : 1,

    "votes" : 1

    },

    {

    "_id" : 1,

    "host" : "mongodb1.example.local:27017",

    "arbiterOnly" : false,

    "hidden" : false,

    "priority" : 1,

    "votes" : 1

    },

    {

    "_id" : 2,

    "host" : "mongodb2.example.local:27017",

    "arbiterOnly" : true,

    "hidden" : false,

    "priority" : 0,

    "votes" : 1

    }

    ],

    "settings" : {

    ...

    }

    }

    ```

    **代码清单 5-3：带仲裁节点的副本集配置示例**


    写入的 `多数` 通常基于集合中 `有投票权的数据承载` 节点数量来计算。通常在 `rs.config` 中为从节点设置 `votes: 0` 是不够的；然而，对于
    `PSA` 拓扑存在一个特例。因此，在这种情况下，你会移除不可用从节点的投票权，但保留该节点作为集合的成员，如下所示：


    ```

    conf = rs.conf();

    conf.members[1].votes = 0;

    rs.reconfig(conf);

    ```


    这将使主节点的投票权得以延续，并允许应用程序的多数写关注请求由单个承载数据的节点来满足。不可用的从节点一旦重新上线，将尝试赶上复制进度。在具有大量写入操作的副本集中，从节点离线时间过长可能无法跟上操作日志（oplog）的变化，需要完全重新同步。


    不要忘记在不可用成员重新上线后 `恢复` 其投票权。

    '
- fmt: '### Reading and latency


    When components are deployed in multiple physical locations, DC to DC latency
    can become a major issue for performance. We firstly want to maintain our fault
    tolerance as much as possible and secondly want to achieve high throughput by
    having low-latency data flows, but thirdly don''t want to waste computing resources
    by having entire components underutilized while the system is in a healthy state.


    Warning


    The counterargument to not reserving any resources on effective standby is that
    when any one component fails, performance will drop.


    When building replica sets with many data-bearing secondary nodes, there are some
    use cases where reading from secondaries becomes a desirable option.


    Let''s imagine the PSSSA (Primary, 3 Secondaries, and Arbiter) deployment in Figure
    [5-8](#487346_1_En_5_Chapter.xhtml#Fig8) which has two application servers active,
    one in each data center.


    ![../images/487346_1_En_5_Chapter/487346_1_En_5_Fig8_HTML.jpg](images/487346_1_En_5_Chapter/487346_1_En_5_Fig8_HTML.jpg)


    Figure 5-8


    A PS|SS|A replica set with applications in two data centers


    #### Nearest preference


    If the `nearest` preference is requested in the connection string, Application
    (1) will read from either `mongod` (1) or (2) since the RTT is 2 and 3 milliseconds,
    respectively, and the nodes in DC2 exceed the latency window. Application (2)
    will tend to read from `mongod` (3) or (4) except if the replication lag exceeds
    `maxStalenessSeconds`. In this case the driver will choose to read from `mongod`
    (1) or (2). If `maxStalenessSeconds` is not specified, only the RTT latency will
    be considered for node selection.


    #### Primary preferred reads


    If, on the other hand, `primaryPreferred` was requested, both Applications (1)
    and (2) will read from `mongod` (1) since it is the current primary. However,
    if the `localThresholdMS` is set to 5 milliseconds, then the primary in DC1 is
    considered too far away, and so `mongod` (3) or (4) will be selected.


    ### Three data center scenarios


    A topology with data-bearing MongoDB nodes distributed evenly across at least
    three data centers is the ideal situation. In Figure [5-9](#487346_1_En_5_Chapter.xhtml#Fig9)
    we can see a topology with optimal redundancy in a PSS topology. Any single data
    center can be lost, while an application is writing with write concern `majority`
    to ensure distributed durability and ensure against data loss. Furthermore, if
    subsequently a second data center also fails, there is still no data loss, but
    some manual intervention would be required to force the remaining data-bearing
    node to accept writes.


    ![../images/487346_1_En_5_Chapter/487346_1_En_5_Fig9_HTML.jpg](images/487346_1_En_5_Chapter/487346_1_En_5_Fig9_HTML.jpg)


    Figure 5-9


    A 3-DC, 3-node topology with optimal redundancy


    Some architects choose topologies with multiple nodes per data center, for example,
    a PS|SS|S topology (see Figure [5-10](#487346_1_En_5_Chapter.xhtml#Fig10)). In
    this case, an entire DC can be lost without affecting availability; however, often
    this design is chosen to allow secondary reads. In this case, however, a loss
    of a data center will also result in a `drop of performance` since less nodes
    will be responding to read requests. For critical applications with strict performance
    targets or clusters which are underprovisioned for their current workloads, this
    can have considerable impact.


    ![../images/487346_1_En_5_Chapter/487346_1_En_5_Fig10_HTML.jpg](images/487346_1_En_5_Chapter/487346_1_En_5_Fig10_HTML.jpg)


    Figure 5-10


    A sharded cluster in 3 DCs with PS|SS|S shards


    A more cost-effective approach is to use one fewer node overall and instead create
    three shards each with three data-bearing members (Figure [5-11](#487346_1_En_5_Chapter.xhtml#Fig11)).
    This has the same redundancy profile should a single data center fail, but gives
    us three shards each with a primary node that can accept writes. Should you choose
    to do secondary reads, you have only six secondaries overall, but each has less
    data and can keep a larger proportion in its memory cache, giving much better
    per-node performance for the same hardware profiles.


    ![../images/487346_1_En_5_Chapter/487346_1_En_5_Fig11_HTML.jpg](images/487346_1_En_5_Chapter/487346_1_En_5_Fig11_HTML.jpg)


    Figure 5-11


    A sharded cluster in three DCs with P|S|S shards


    ### Load and performance testing


    When building a cluster for the first time, and preparing to launch a new application
    with MongoDB, it''s important to always `performance test` to ensure that expected
    performance can be achieved on a small scale. You should also `load test` to ensure
    correct behavior of all components, before moving to production-scale data. This
    section considers a few common situations that can be experienced when testing.


    #### Overloaded connections


    It''s important that any application is able to respond correctly to slow responses
    and timed-out connections. If you get to a point where the shards themselves are
    not able to service incoming operations in a timely manner, then the connections
    will build up on the `mongos`es. By default, a `mongos` will allow up to `64k`
    connections before it starts refusing new connections from an application. Be
    aware that every `1k` connection requires almost `1GB` of RAM in overhead. Therefore,
    if you are running a `mongos` on a VM with limited resources, you are likely to
    hit this limit much earlier. Running on most Linux variants, an Out-of-Memory
    Killer (OOM Killer) will activate and kill the process with the most resident
    memory usage. In a production system, with many `mongos`es, the application will
    then continue routing requests to surviving `mongos`es which may now be even more
    loaded than before, causing a cascading effect.


    #### Timeouts


    Most MongoDB drivers include an option to set a `maxTime` or `maxTimeMS` on query
    operations. This allows the application to set a server-side time limit on any
    operation, for example, `3000` for a 3-second limit. This value is passed to the
    server along with the initial request, and a timer on the server side will automatically
    terminate an incomplete operation after this time and cleanly release server resources.
    This can be very useful to avoid using excessive server resources during unexpected
    load or on an unstable network. If an application drops the connection for some
    reason, or the connection times out due to a very long query, we can be assured
    that its impact on server resources will be limited.


    On the other hand, setting very low connection timeouts can have the opposite
    effect. Imagine the client has set a 3-second timeout on the connection but is
    requesting a complex aggregation pipeline which will take 5 seconds to complete.
    If the application''s connection is auto-closed after 3 seconds, and tries again,
    the server will spend 2 seconds finishing the first pipeline, and at the same
    time, it will start the same pipeline over again as the client re-requested it.
    This has two negative effects: extra load on the server and a potential infinite
    loop as the application keeps trying a heavy operation.


    #### Application back-off logic


    The solution to applications causing server overload is to add `back-off logic`
    into the application. In essence, an application should be able to detect that
    the server is under load and slow down operations. One approach is to use an increasing
    pause between attempts. After an initial failure, the application waits 1 second
    before retrying. If that fails again, it could wait twice as long before trying
    again. This lets the application auto-try without performing a "denial-of-service"
    attack on its own database server.'
