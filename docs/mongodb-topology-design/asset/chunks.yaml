- fmt: '### Framework choice


    The technologies and stacks of DevOps move fast. Many of the frameworks and methodologies
    discussed in this chapter may have changed by the time you read this book. When
    choosing a framework, there are a few issues to consider.


    #### Reuse


    We want to loosely couple our automation components, reusing whatever is already
    available in the products we use (i.e., Enterprise-only tools like `Ops Manager`
    and the `Kubernetes Operator`), and avoid coding our own configuration/scripts
    from scratch.


    #### Avoid lock-in


    In general, we don’t want to overcommit to a particular framework. Even popular
    solutions may stop receiving support, and we could suddenly find that we can’t
    easily upgrade to the newest, most secure operating system because our tooling
    just doesn’t support it.


    We don’t want to lock ourselves into our current infrastructure, be that raw metal,
    `OpenStack`, `OpenShift`, hyperconvergence, and so on.


    We want to maintain the option to move painlessly to a cloud provider, or even
    better, to a multi-cloud configuration where we don’t depend on any one provider.
    This was particularly painful during the Covid-19 epidemic where those reliant
    on `Azure` found that there was simply no capacity available to spin up new compute
    instances.


    ### Multi-cloud topologies


    If you plan to deploy to the cloud and maximize high availability, using multiple
    cloud providers is one option. You could have a European shard with a node in
    `GCP europe-west3`, `Azure Germany West Central`, and `AWS eu-central-1`. This
    would place all nodes in or near Frankfurt, Germany, to reduce latency, but we
    need to be careful about the costs of bandwidth between providers.


    The complexity of multi-cloud DevOps is also higher. Some tools like `Terraform`
    include platform-specific modules which can seamlessly deploy the low-level infrastructure.
    Other tools like `Ansible` may require custom playbooks for certain cloud providers
    who offer customized host images, networking stacks, or firewalls.


    #### Base images


    Each cloud provider offers a somewhat tailored (and optimized) base image for
    each Linux flavor. It’s tempting to use each provider’s image as a foundation,
    since they come with preconfigured optimizations. To avoid lock-in, you could
    instead build your own customized images with HashiCorp’s Packer (`https://packer.io/`)
    or a similar infrastructure-as-code (`IaC`) tool.


    In many cases, it’s better to use `Terraform` to manage any cloud-specific aspects
    of the environment (e.g., security groups, `VPNs`, auto-scaling), although there
    are cloud-specific modules for configuration management tools like `Ansible`.


    ### Virtual machines


    Virtual machines (`VM`) now form the cornerstone of both on-prem and cloud computing
    stacks. By breaking up very large hosts into multiple virtual machines, `MongoDB`
    deployments can be deployed more efficiently but kept separate. This means that
    instability in one `VM`, or one node, should not adversely affect the stability
    of any others even on the same `VM` host.


    Figure [7-1](#487346_1_En_7_Chapter.xhtml#Fig1) shows a single shard cluster spread
    over eight virtual machines deployed on three physical `VM` hosts. Any one physical
    host can fail without affecting the cluster’s operation.


    ![../images/487346_1_En_7_Chapter/487346_1_En_7_Fig1_HTML.jpg](images/487346_1_En_7_Chapter/487346_1_En_7_Fig1_HTML.jpg)

    *Figure 7-1 Virtual machines provide resource separation*


    Most `VM` solutions support the concepts of affinity and anti-affinity. Affinity
    rules require that a group of `VMs` should be deployed on the same `VM` host.
    By contrast, anti-affinity rules can be used to prevent `VMs` for a replica set
    (like 1b, 2b, and 3a) to be deployed on the same host.


    #### Co-location


    The issue of “noisy neighbors” stealing `CPU` and memory resources from other
    `VMs` on the same host can still be a problem in the cloud. On-prem, this can
    normally be configured away by preventing `VMs` from “borrowing” resources from
    other `VMs`. This lets sysadmins provide consistent resources and guaranteed baseline
    performance to all processes in a deployment.


    #### Other benefits


    `VMs` also give a number of other benefits, including the ability to more easily
    resize `VMs` with more computing cores, additional memory resources, and taking
    snapshots of storage volumes.


    ### Containers


    Computing containers are another clever way of separating, delivering, and running
    processes without negatively interacting with others. For `MongoDB` deployments,
    a container would include the data files and the config files necessary for a
    node to start up and reach out to its other cluster members. `MongoDB` binaries
    and other required packages can be shared among all the containers on the same
    host, so they don’t necessarily require additional storage space.


    Like `VMs`, containers keep memory, `CPU`, and `I/O` resources separate and limited,
    making it easier to run multiple `MongoDB` nodes on the same physical host without
    side effects.


    Using `cgroups` in Linux, containers can be configured with resource ceilings,
    meaning that a config server node can use (for example) only `2GB` of `RAM`, but
    a shard member on the same host might be allowed up to `200GB`.


    #### Compared to VMs


    `VMs` require an entire operating system to achieve the same level of resource
    allocation, but of course the overhead of running an entire `OS` inside each `VM`
    client wastes a lot of valuable system host `RAM`.


    In Figure [7-2](#487346_1_En_7_Chapter.xhtml#Fig2) we see an identical cluster
    topology to Figure [7-1](#487346_1_En_7_Chapter.xhtml#Fig1), except that we have
    only three `VMs`. By using containers instead, we can use the host’s memory and
    storage resources more efficiently.


    ![../images/487346_1_En_7_Chapter/487346_1_En_7_Fig2_HTML.jpg](images/487346_1_En_7_Chapter/487346_1_En_7_Fig2_HTML.jpg)

    *Figure 7-2 Containers provide separation without VM overhead*


    Containers are more lightweight, but often more complex to deploy. They also have
    tooling better suited to developers, good for organizations using a continuous
    delivery methodology. Using containers also makes testing more accurate since
    exact containers can be tested and deployed together.


    Virtual machines are likely to remain the base level of system administration
    for at least the near future, as they are the foundation of cloud computing.


    ### Docker


    While alternatives do exist (`VirtualBox` by Oracle, `Vagrant`, and `Wox`, among
    others), Docker is currently the most common and easy-to-use container.


    `Docker` provides strong isolation in terms of memory and networking. Ports from
    these containers need to be explicitly exposed to allow communication to the outside
    world.


    `Docker` images are often deployed across multiple hosts and data centers using
    a container orchestration system such as `Kubernetes`.


    ### Cloud-based container services


    `Amazon Elastic Container Service (ECS)` is a highly scalable container management
    service for managing `Docker` containers on a cluster. `Amazon Elastic Container
    Service for Kubernetes (EKS)` extends this by adding a standards-based `Kubernetes`
    management system for an additional cost.


    Other cloud providers offer similar solutions with `Azure Container Service (AKS)`
    and `Google Kubernetes Engine (GKE)`.'
