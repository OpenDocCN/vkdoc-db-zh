  trans: '### 配置管理


    我们将快速回顾一些最流行的配置管理与自动化工具：`Ansible`、`Puppet` 和 `Chef`。这三款工具都是开源的，应用非常广泛，拥有完善的文档和活跃的社区贡献，同时也提供可选的付费企业版支持。它们还可以与
    `Terraform` 等工具配合使用，在配置之前准备主机基础架构。


    其他值得注意的替代方案是 `SaltStack` 和 `Pulumi`。


    ### Ansible


    `Ansible`（首次发布于 2012 年，于 2015 年被 Red Hat, Inc.收购）是一个自动化平台，允许你以简单、可重复的方式部署和配置你的
    `MongoDB`。它的范式是关于配置简单的规则，这些规则被分组到固定顺序的步骤和模板中，而不是用过程式语言编写脚本。


    它使用 `SSH` 从工作站连接到多台远程机器，无需在远程主机上安装任何特殊代理，仅需使用其自身的 `SSH` 密钥。


    `Ansible` 简单易上手，用户基础广泛，网上有大量示例。也容易将变更纳入源代码控制。然而，测试变更可能比较困难，并且在调试分组到 `playbook`
    中的复杂任务时，可能需要多次运行。


    ### Puppet


    `Puppet`（首次发布于 2005 年）是模型驱动、静态检查的，并且是为系统管理员设计的。它遵循客户端-服务器（或代理-主控）架构。商业版本 `Puppet
    Enterprise` 可通过 `Puppet Labs` 获取。


    `Puppet` 主控服务器将目标机器的当前状态与机器级别的配置详情进行比较，然后向转换层发送指令以执行操作。一个代理会定期检查变更并触发更新。


    一个名为 `puppet/mongodb`^(⁶) 的模块（由 `Puppet Labs` 和开源社区维护）用于管理 `MongoDB` 进程的服务器安装和配置，以及
    `Ops Manager` 的设置。该模块功能先进且完备，包括一个 `mongodb_shard` 提供程序，允许定义分片及其成员。在撰写本文时，它支持 `RHEL/CentOS
    5/6/7`、`Ubuntu 10` 和 `12`，以及 `Debian 6` 和 `7`。


    `Puppet` 比其他一些管理工具（如 `Chef` 和 `Ansible`）稍微复杂一些，但它拥有大量可用于解决数据库管理相关问题的模块。


    ### Chef


    与 `Puppet` 类似，`Chef`（首次发布于 2009 年）会在对 `Chef` 节点进行更改之前，将主机资源与期望状态进行比较。与 `Ansible`
    不同，它需要在每个远程主机上安装 `Chef client`，该主机才能成为 `Chef node`。


    配置被写入 `Chef recipes`，这些 `recipes` 被分组为 `cookbooks` 以便于管理。一个名为 `SC-MongoDB Cookbook`^(⁷)
    的开源 `cookbook` 是 `Chef` 现有最先进的 `cookbook`，目前正处于积极开发中。


    ### 本地部署对比


    前面介绍的三种工具中的任何一种都可以用来准备依赖项并部署复杂的 `MongoDB` 部署。表 7-2 比较了一些关键差异，这可能有助于你根据自己的平台和基础架构偏好在它们之间做出选择。


    表 7-2

    配置管理工具对比


    |   | Ansible | Puppet | Chef |

    | --- | --- | --- | --- |

    | 架构 | 推送配置（来自单个节点） | 拉取（主从式） | 拉取（主从式） |

    | 配置范式 | 声明式（Plays 和 Playbooks） | 过程式（Tasks 和 Plans） | 过程式（Recipes 和 Cookbooks）
    |

    | 更新范式 | 基于步骤 | 幂等且基于状态 | 幂等且基于状态 |

    | 远程要求 | 仅需 SSH 守护进程，无需代理 | 需要主服务器 + Puppet 代理 | 需要主服务器 + Chef 代理 |

    | 安全 | SSH 密钥 + 用户权限 | 证书 | SSL 和共享密钥 |

    | 上手难度 | 简单 | 较难 | 较难 |

    | 复杂任务 | 难以调试 | 功能强大 | 可实现 |

    | 平台 | Python/pip | Ruby/gem | Ruby/gem |

    | 支持的操作系统（远程） | 主控端：带 Python 的 Linux/BSD<br>远程端：任何带 Python 的 POSIX 系统，以及 Windows
    | 主控端：Enterprise Linux, Ubuntu, SUSE<br>远程端：Linux, macOS, Windows, Solaris 等 |
    工作站：RHEL, Ubuntu, Windows, macOS<br>服务器：Enterprise Linux, Ubuntu<br>节点/远程端：AIX,
    Linux, BSD, Windows, macOS |

    | 最适用场景 | 基于预制虚拟机镜像或 Docker 的初始设置 | 经常变化的环境。合规性很重要的场景。 | 经常变化的环境 |


    ### 自动化


    通常，`CM` 工具的目标是在部署新主机和软件堆栈时标准化并避免人为错误。通过一些额外的努力，可以扩展此配置代码，以在数千个节点上拆分、迁移和扩展系统，这些节点运行在不同的底层硬件/云和操作系统上。


    通过了解整个系统和组件之间的依赖关系，可以实现自动化，以一致的方式协调变更，例如，确保同一副本集中的多个节点不会同时被关闭。


    ## 供应与编排


    在配置我们的 `MongoDB` 环境和部署之前，我们可能首先希望自动化主机的供应。在某些情况下，我们可能还需要供应网络基础架构、存储甚至负载均衡器。


    对于大多数部署而言，`Terraform` 目前是“基础设施即代码”领域的赢家，无论是用于供应可复现的本地部署还是云无关的基础架构。


    ### Terraform


    虽然 `Terraform` 也可以执行配置，但目前最好使用像 `Ansible`、`Puppet` 或 `Chef` 这样的专用配置管理工具。像大多数 `CM`
    工具一样，所有 `Terraform` 配置文件都可以轻松进行版本控制。可以使用 `Go` 编程语言创建自定义的 `Provider` 插件。


    虽然可以使用免费的社区版本，但维护者 `HashiCorp` 销售带有支持的企业版本。


    #### 用途


    `Terraform` 监控环境的状态，如果出现任何异常或缺失，它可以自动提供替代资源。这对于需要非常稳定状态的环境来说非常棒。


    #### 云基础设施


    `Terraform` 可以通过标准 API 密钥通过云提供商 API 进行通信，其方式与本地主服务器非常相似。


    #### Atlas 的官方提供程序


    `MongoDB Inc.` 与 `HashiCorp` 合作创建了一个 `official provider`，专为 `MongoDB''s Atlas`
    全托管解决方案设计。目前，还没有用于将 `Terraform` 与非 Atlas 的本地 `MongoDB` 部署一起使用的官方插件。


    虽然可以自己创建自定义或社区提供程序，但构建和测试一个提供程序可能是一项非常复杂的任务。因此，目前仅使用 `Terraform` 进行本地 `MongoDB`
    部署并非理想方法。


    #### 与 Ansible 集成


    `Terraform` 可以调用 `Ansible` 配置（通过 `Packer`），以自动化构建包含 `MongoDB`、依赖包和 `OS` 级别配置文件的机器镜像。`Terraform`
    可以向你的服务器添加特殊标签，供 `Ansible` 查找并相应配置每个服务器。


    另一方面，`Ansible` 也可以被挂钩到工作流程中，调用 `Terraform` 根据已经由 `Ansible` 构建的镜像启动多个计算实例。通常在供应后还需要一些最终步骤来实际部署特定于集群的
    `MongoDB` 配置并启动实例。'
- fmt: '### CloudFormation


    CloudFormation is one of the most popular ways to script the deployment of complex
    services on Amazon’s AWS cloud environment. It allows for both a declarative or
    programmatic approach to model and provision application environments on the cloud
    in a repeatable manner.


    For example, you could define a CloudFormation script to deploy four EC2 computing
    hosts, one for the application and three for a MongoDB replica set. This script
    could ensure that all dependencies and MongoDB libraries are installed via `yum`,
    create a config and keyfile for the MongoDB nodes, and ensure that a replica set
    is initialized once all three nodes are online based on the hostnames allocated.


    Unlike the other tools listed here, it is completely closed sourced and has no
    option for on-prem management.


    ### Kubernetes operator


    For Enterprise customers on any sort of self-managed infrastructure, MongoDB offers
    a custom-built operator using Kubernetes APIs to automate and manage MongoDB clusters.


    `MongoDB Enterprise Operator for Kubernetes` gives you full control over your
    MongoDB deployment from a single Kubernetes control plane. You can use the operator
    with any Kubernetes-compatible service such as OpenShift and Pivotal Container
    Service (`PKS`).


    ### Kubernetes for MongoDB Atlas


    For situations where you are using Kubernetes to deploy applications in fully
    managed platform-as-a-service (`PaaS`) contexts, the MongoDB Atlas Open Service
    Broker can automate your databases on MongoDB’s Atlas service on whichever cloud
    provider is best for your application.


    ## Monitoring


    Continuous and automatic monitoring of the health of the deployment, including
    the detection of anomalies and alerting, is critical to avoid multiple failures
    and application impact.


    ### Evaluating failure


    Depending on the topology and design choices in a MongoDB cluster, there will
    be different levels of failure which require different urgency to repair. If your
    cluster has been well designed, any single component failing should not cause
    application downtime, but you should always react as soon as possible to restore
    failed components.


    ### Performance


    Monitoring the performance and latency of a cluster is one aspect that tends to
    get less attention until something goes wrong. By understanding the `baseline
    performance` of your cluster, and its weekly and hourly trends, you should be
    able to detect abnormal behaviors before they manifest as instabilities or performance
    drops in your application.


    Naturally over time, the size of the database will grow as new users and services
    are added. Monitoring baselines metrics over time allows `capacity planning`.
    If you can predict when the current computing resources will be insufficient,
    you can scale them vertically or horizontally before performance is impacted.


    #### FTDC


    One way to understand performance is by analyzing the `full-time diagnostic data
    capture` (`FTDC`) metrics generated by each `mongod` and `mongos` process and
    stored in a directory called `diagnostic.data` within MongoDB’s `storage.dbPath`.


    The `FTDC` data includes metrics about server, replication, and collection status,
    as well as connection metrics. It also captures valuable host metrics like CPU
    and memory usage, I/O, and network usage. These metrics are designed to provide
    a sort of “black box flight recorder” for telemetry on a deployment to investigate
    when an issue has been observed.


    There will be hundreds of metrics recorded every second, but the format is so
    compact that a week of metrics require only a few hundred megabytes of storage.
    There are numerous tools to extract and read this data, including an official
    open source parsing library written in Go (`https://github.com/mongodb/ftdc`)
    and an analysis tool called Keyhole (`https://github.com/simagix/keyhole`).


    #### Connection capacity


    One example of important metrics captured in `FTDC` (via the `serverStatus` command)
    concerns the number of active vs. currently open (but not necessarily active)
    connections. As each connection takes memory, it’s important to set limits to
    avoid incoming connection storms particularly from microservices or IoT devices
    (see Chapter `8`).


    #### SNMP


    Enterprise MongoDB also supports collecting database metrics directly from each
    node via `SNMP` on both Linux and Windows into other monitoring solutions. Ops
    Manager also supports `SNMP` traps to deliver alerts configured via its Alerts
    interface.


    ### Alerting


    Ideally, someone should be alerted whenever a component fails. To avoid false
    positives, we may want to wait a few minutes before triggering these alerts to
    skip short-lived network failures.


    It also recommended to temporarily disable alerts during planned maintenance windows
    when we expect to be shutting down and restarting nodes such as for server maintenance
    or MongoDB version upgrades.


    There are a number of popular generic alerting tools; some which can be configured
    to check the “liveness” of a MongoDB node by connecting to it on its port, but
    are unlikely to be able to detect the internal health of the node.


    Some monitoring solutions can watch the CPU and memory usage of a process and
    trigger alerts when these exceed certain thresholds. However, these external views
    of a process may simply be observing spikes in workload due to legitimately high
    application traffic.


    ### Prometheus


    Prometheus is an open source, community-driven project, which collects, alerts,
    and stores metrics in a system-agnostic way, and uses its own internal database
    for storage. It utilizes Grafana (an open source dashboard) to display metrics
    in various time series views.


    Since Prometheus is designed as a generic monitoring solution, there is no built-in
    mechanism for monitoring MongoDB, but such functionality is supported via plug-ins
    called `exporters`.


    One such exporter is the open source `mongodb_exporter`, currently maintained
    at `github.com/percona/mongodb_exporter` which responds with metrics to Prometheus
    server calls.


    ### Enterprise tools


    In contrast, the official Enterprise monitoring solutions Ops Manager and Cloud
    Manager have been built by MongoDB Inc. itself to monitor large clusters, record
    metrics, and trigger alerts. They are not only able to connect to each node but
    also `evaluate internal health` to confirm that the node is still able to respond
    to requests.


    Ops/Cloud Manager also records metrics about the load on the node for later analysis
    and visualization. These metrics are available via a comprehensive API for integration
    with other monitoring services like New Relic.


    Alerts configured in Ops/Cloud Manager can be sent through your existing Alerting
    tools, via integrations with PagerDuty, Flowdock, HipChat, Opsgenie, Datadog,
    Slack, and others.'
  raw: '### CloudFormation


    CloudFormation is one of the most popular ways to script the deployment of complex
    services on Amazon’s AWS cloud environment. It allows for both a declarative or
    programmatic approach to model and provision application environments on the cloud
    in a repeatable manner.


    For example, you could define a CloudFormation script to deploy four EC2 computing
    hosts, one for the application and three for a MongoDB replica set. This script
    could ensure that all dependencies and MongoDB libraries are installed via `yum`,
    create a config and keyfile for the MongoDB nodes, and ensure that a replica set
    is initialized once all three nodes are online based on the hostnames allocated.


    Unlike the other tools listed here, it is completely closed sourced and has no
    option for on-prem management.


    ### Kubernetes operator


    For Enterprise customers on any sort of self-managed infrastructure, MongoDB offers
    a custom-built operator using Kubernetes APIs to automate and manage MongoDB clusters.


    *MongoDB Enterprise Operator for Kubernetes* gives you full control over your
    MongoDB deployment from a single Kubernetes control plane. You can use the operator
    with any Kubernetes-compatible service such as OpenShift and Pivotal Container
    Service (PKS).


    ### Kubernetes for MongoDB Atlas


    For situations where you are using Kubernetes to deploy applications in fully
    managed platform-as-a-service (PaaS) contexts, the MongoDB Atlas Open Service
    Broker can automate your databases on MongoDB’s Atlas service on whichever cloud
    provider is best for your application.


    ## Monitoring


    Continuous and automatic monitoring of the health of the deployment, including
    the detection of anomalies and alerting, is critical to avoid multiple failures
    and application impact.


    ### Evaluating failure


    Depending on the topology and design choices in a MongoDB cluster, there will
    be different levels of failure which require different urgency to repair. If your
    cluster has been well designed, any single component failing should not cause
    application downtime, but you should always react as soon as possible to restore
    failed components.


    ### Performance


    Monitoring the performance and latency of a cluster is one aspect that tends to
    get less attention until something goes wrong. By understanding the *baseline
    performance* of your cluster, and its weekly and hourly trends, you should be
    able to detect abnormal behaviors before they manifest as instabilities or performance
    drops in your application.


    Naturally over time, the size of the database will grow as new users and services
    are added. Monitoring baselines metrics over time allows *capacity planning*.
    If you can predict when the current computing resources will be insufficient,
    you can scale them vertically or horizontally before performance is impacted.


    #### FTDC


    One way to understand performance is by analyzing the *full-time diagnostic data
    capture* (FTDC) metrics generated by each mongod and mongos process and stored
    in a directory called `diagnostic.data` within MongoDB’s `storage.dbPath`.


    The FTDC data includes metrics about server, replication, and collection status,
    as well as connection metrics. It also captures valuable host metrics like CPU
    and memory usage, I/O, and network usage. These metrics are designed to provide
    a sort of “black box flight recorder” for telemetry on a deployment to investigate
    when an issue has been observed.


    There will be hundreds of metrics recorded every second, but the format is so
    compact that a week of metrics require only a few hundred megabytes of storage.
    There are numerous tools to extract and read this data, including an official
    open source parsing library written in Go ([`https://github.com/mongodb/ftdc`](https://github.com/mongodb/ftdc))
    and an analysis tool called Keyhole ([`https://github.com/simagix/keyhole`](https://github.com/simagix/keyhole)).


    #### Connection capacity


    One example of important metrics captured in FTDC (via the `serverStatus` command)
    concerns the number of active vs. currently open (but not necessarily active)
    connections. As each connection takes memory, it’s important to set limits to
    avoid incoming connection storms particularly from microservices or IoT devices
    (see Chapter [8](#487346_1_En_8_Chapter.xhtml)).


    #### SNMP


    Enterprise MongoDB also supports collecting database metrics directly from each
    node via SNMP on both Linux and Windows into other monitoring solutions. Ops Manager
    also supports SNMP traps to deliver alerts configured via its Alerts interface.


    ### Alerting


    Ideally, someone should be alerted whenever a component fails. To avoid false
    positives, we may want to wait a few minutes before triggering these alerts to
    skip short-lived network failures.


    It also recommended to temporarily disable alerts during planned maintenance windows
    when we expect to be shutting down and restarting nodes such as for server maintenance
    or MongoDB version upgrades.


    There are a number of popular generic alerting tools; some which can be configured
    to check the “liveness” of a MongoDB node by connecting to it on its port, but
    are unlikely to be able to detect the internal health of the node.


    Some monitoring solutions can watch the CPU and memory usage of a process and
    trigger alerts when these exceed certain thresholds. However, these external views
    of a process may simply be observing spikes in workload due to legitimately high
    application traffic.


    ### Prometheus


    Prometheus is an open source, community-driven project, which collects, alerts,
    and stores metrics in a system-agnostic way, and uses its own internal database
    for storage. It utilizes Grafana (an open source dashboard) to display metrics
    in various time series views.


    Since Prometheus is designed as a generic monitoring solution, there is no built-in
    mechanism for monitoring MongoDB, but such functionality is supported via plug-ins
    called *exporters*.


    One such exporter is the open source `mongodb_exporter`, currently maintained
    at `github.com/percona/mongodb_exporter` which responds with metrics to Prometheus
    server calls.


    ### Enterprise tools


    In contrast, the official Enterprise monitoring solutions Ops Manager and Cloud
    Manager have been built by MongoDB Inc. itself to monitor large clusters, record
    metrics, and trigger alerts. They are not only able to connect to each node but
    also *evaluate internal health* to confirm that the node is still able to respond
    to requests.


    Ops/Cloud Manager also records metrics about the load on the node for later analysis
    and visualization. These metrics are available via a comprehensive API for integration
    with other monitoring services like New Relic.


    Alerts configured in Ops/Cloud Manager can be sent through your existing Alerting
    tools, via integrations with PagerDuty, Flowdock, HipChat, Opsgenie, Datadog,
    Slack, and others.'
  trans: '


    ### CloudFormation


    CloudFormation 是在亚马逊 AWS 云环境中为复杂服务编写部署脚本最流行的方式之一。它支持使用声明式或编程式方法，以可重复的方式在云端建模和配置应用环境。


    例如，您可以定义一个 CloudFormation 脚本来部署四个 EC2 计算主机，一个用于应用程序，三个用于 MongoDB 副本集。此脚本可以通过 `yum`
    安装所有依赖项和 MongoDB 库，为 MongoDB 节点创建配置文件和密钥文件，并确保在所有三个节点根据分配的主机名上线后，初始化一个副本集。


    与这里列出的其他工具不同，它是完全闭源的，没有本地管理的选项。


    ### Kubernetes 操作员


    对于任何在自我管理基础设施上的企业客户，MongoDB 提供了一个使用 Kubernetes API 定制的操作员，用于自动化和管理 MongoDB 集群。


    `MongoDB Enterprise Operator for Kubernetes` 使您可以从单一的 Kubernetes 控制平面全面控制您的 MongoDB
    部署。您可以将此操作员与任何兼容 Kubernetes 的服务一起使用，例如 OpenShift 和 Pivotal Container Service (`PKS`)。


    ### 面向 MongoDB Atlas 的 Kubernetes


    在您使用 Kubernetes 在完全托管的平台即服务 (`PaaS`) 环境中部署应用的情况下，MongoDB Atlas Open Service Broker
    可以在最适合您应用程序的任何云提供商上，自动化您在 MongoDB Atlas 服务上的数据库。


    ## 监控


    持续自动地监控部署的健康状况，包括异常检测和告警，对于避免多点故障和应用影响至关重要。


    ### 评估故障


    根据 MongoDB 集群中的拓扑和设计选择，会有不同级别的故障，需要不同的紧急程度来修复。如果您的集群设计良好，任何单个组件的故障都不应导致应用停机，但您应始终尽快做出反应以恢复故障组件。


    ### 性能


    监控集群的性能和延迟是一个往往在问题出现前较少受到关注的方面。通过了解您集群的 `基线性能` 及其每周和每小时的趋势，您应该能够在异常行为显现为应用不稳定或性能下降之前检测到它们。


    自然，随着时间的推移，随着新用户和服务的添加，数据库的规模会增长。随时间监控基线指标有助于 `容量规划`。如果您能预测当前计算资源何时会不足，就可以在性能受到影响之前对其进行纵向或横向扩展。


    #### FTDC


    了解性能的一种方法是分析由每个 `mongod` 和 `mongos` 进程生成的 `全时诊断数据捕获` (`FTDC`) 指标，这些数据存储在 MongoDB
    的 `storage.dbPath` 内一个名为 `diagnostic.data` 的目录中。


    `FTDC` 数据包括关于服务器、复制和集合状态的指标，以及连接指标。它还捕获有价值的主机指标，如 CPU 和内存使用率、I/O 以及网络使用情况。这些指标旨在为部署提供一种“黑匣子飞行记录仪”式的遥测数据，以便在观察到问题时进行调查。


    每秒钟会记录数百个指标，但其格式非常紧凑，一周的指标只需要几百兆字节的存储空间。有许多工具可以提取和读取这些数据，包括一个用 Go 语言编写的官方开源解析库
    (`https://github.com/mongodb/ftdc`) 和一个名为 Keyhole (`https://github.com/simagix/keyhole`)
    的分析工具。


    #### 连接容量


    `FTDC`（通过 `serverStatus` 命令）捕获的重要指标的一个例子是关于活动连接与当前打开（但不一定活动）的连接数量。由于每个连接都会占用内存，因此设置限制以避免传入的连接风暴非常重要，特别是来自微服务或物联网设备的连接（参见第
    `8` 章）。


    #### SNMP


    企业版 MongoDB 还支持通过 Linux 和 Windows 上的 `SNMP` 直接从每个节点收集数据库指标，并导入到其他监控解决方案中。Ops Manager
    还支持 `SNMP` 陷阱，以通过其告警界面配置的方式发送告警。


    ### 告警


    理想情况下，当某个组件发生故障时，应该有人收到告警。为了避免误报，我们可能希望等待几分钟再触发这些告警，以跳过短暂的网络故障。


    还建议在计划的维护窗口期间暂时禁用告警，例如当我们预期要关闭和重启节点以进行服务器维护或 MongoDB 版本升级时。


    有许多流行的通用告警工具；其中一些可以配置为通过端口连接 MongoDB 节点来检查其“活性”，但不太可能检测节点的内部健康状况。


    一些监控解决方案可以监视进程的 CPU 和内存使用情况，并在超过某些阈值时触发告警。然而，这些对进程的外部观察可能只是因为合法的应用流量高峰而观察到的工作负载峰值。


    ### Prometheus


    Prometheus 是一个开源、社区驱动的项目，它以系统无关的方式收集、告警和存储指标，并使用其自己的内部数据库进行存储。它利用 Grafana（一个开源仪表板）在各种时间序列视图中显示指标。


    由于 Prometheus 被设计为通用监控解决方案，没有用于监控 MongoDB 的内置机制，但此类功能通过称为 `exporters` 的插件得到支持。


    其中一个这样的导出器是开源的 `mongodb_exporter`，目前维护在 `github.com/percona/mongodb_exporter`，它对
    Prometheus 服务器的调用响应指标。


    ### 企业工具


    相比之下，官方的监控解决方案 Ops Manager 和 Cloud Manager 是由 MongoDB Inc. 本身构建的，用于监控大型集群、记录指标和触发告警。它们不仅能够连接到每个节点，还能
    `评估内部健康状况` 以确认节点仍能响应请求。


    Ops/Cloud Manager 还会记录有关节点负载的指标，以供后续分析和可视化使用。这些指标可通过一个全面的 API 获取，以便与 New Relic
    等其他监控服务集成。


    在 Ops/Cloud Manager 中配置的告警可以通过您现有的告警工具发送，通过与 PagerDuty、Flowdock、HipChat、Opsgenie、Datadog、Slack
    等的集成实现。


    '
- fmt: '## Key takeaways


    From this chapter, the key concepts to remember are as follows:


    *   Provisioning, orchestration, and configuration tools are complex and evolving
    quickly, with no single standard for deploying MongoDB cluster infrastructure.

    *   Since MongoDB is stateful and self-healing, the usual tools for auto-scaling
    application servers can’t be easily repurposed.

    *   Terraform is a popular tool for on-prem and multi-cloud provisioning, with
    Ansible a good choice for configuration management.

    *   For Kubernetes infrastructures like OpenShift, an official Enterprise-only
    operator plug-in is available to provision and configure MongoDB clusters.

    *   It’s critical to properly monitor a cluster to understand baseline performance,
    both for setting alerts at the correct threshold and also to know when it’s time
    to scale the cluster.

    *   Enterprise tools like Ops/Cloud Manager are the best choice to automate and
    monitor large, complex clusters as well as to integrate with existing monitoring/alerting
    systems like Prometheus or New Relic or via SNMP.

    *   For best security and stability, you should not wait to upgrade to the latest
    minor release of MongoDB and OS minor releases.


    Footnotes [1](#487346_1_En_7_Chapter.xhtml#Fn1_source) [2](#487346_1_En_7_Chapter.xhtml#Fn2_source)


    # 8. Special Use Cases and Configurations


    > *Apparently, there is redundancy in memory: You store the same memory in different
    parts of your brain for accessing at different speeds. That speed would depend
    on the frequency of use and the importance of the knowledge.*

    >

    > —Bill Nye, mechanical engineer and “Science Guy”


    In this chapter, we cover a series of use cases for specific configurations of
    MongoDB in production, such as hybrid on-prem/cloud clusters, low-latency applications,
    using an LDAP pool for authentication, and how to store large binary files.


    ## Scaling with secondary reads


    In most cases, applications should read and write from the primary node with read
    preference `primaryPreferred`. Secondaries are intended for high availability
    and should normally be dedicated to keeping the oplog replicated with the smallest
    possible lag. They should be ready at any moment to take over from the primary
    to avoid any application impact that end users could notice.


    ### Read preference


    However, in certain special cases, where read load is very high compared to writes,
    and reading slightly out-of-date documents isn’t a problem, using the `secondaryPreferred`
    read preference can be a valid approach. The read preference `secondary` could
    be used also, but in the rare occasion that a replica set has just a primary node
    available (perhaps due to an emergency `rs.reconfig()` to remove corrupted/failed
    hosts), then the application would see no candidate members to read from and stall.


    A third option is to use the `nearest` read preference. This will read from secondaries
    or the primary, but choose among those with the lowest network latency. This could
    be useful if there are many application servers spread out over many data centers,
    which are relatively far apart.


    In Figure [8-1](#487346_1_En_8_Chapter.xhtml#Fig1), we see applications using
    `nearest` read preference distributed in three data centers, of which DC3 is more
    remote and suffers from an unstable network connection. This makes the secondary
    in DC3 lag behind replication by more than 90 seconds.


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig1_HTML.jpg](images/487346_1_En_8_Chapter/487346_1_En_8_Fig1_HTML.jpg)

    Figure 8-1 Applications read from nearest node within staleness limit


    ### Limit staleness


    In certain extreme cases, such as when secondary hosts are drastically underprovisioned
    for the workload, secondaries can fall far behind in their replication. Imagine
    that you are performing secondary reads, and during peak workloads, the replication
    is lagging by several hours.


    This can be avoided to some extent by specifying a `maxStalenessSeconds` of `90`
    in the connection URI string. When set, the driver will exclude from its list
    of candidates any secondary whose replication is more than 90 seconds behind the
    primary.


    In Figure [8-1](#487346_1_En_8_Chapter.xhtml#Fig1) we also see that the application
    in DC3 correctly ignores the secondary in the local data center due to this excessive
    replication lag and instead reads from the next nearest node in DC2.


    Remember that to avoid `stale` reads completely and therefore to `maximize consistency`,
    use `primary` read preference and `majority` read concern.


    ### Tag sets


    Both the read preferences `nearest` and `secondaryPreferred` can be combined with
    `maxStalenessSeconds` and *tag sets* to control which node is targeted for queries.
    Let’s imagine you have a particular microservice[A] which reads only from `collection`[`A`]
    and another microservice[B] that reads only from `collection`[`B`]. We could configure
    tags for the members in the replica set configuration, specify `secondaryPreferred`
    read preference, and use different tag set values for each microservice (Figure
    [8-2](#487346_1_En_8_Chapter.xhtml#Fig2)). When all nodes are online, drivers
    would then route traffic for microservice[A] (running in DC1) to go to `mongod`[1]
    and microservice[B] (in both DC2 and DC3) to `mongod`[3]. This would mean that
    `mongod`[1] has a working set of mostly `collection`[`A`] documents in its cache
    and `mongod`[3] caches mostly `collection`[`B`] documents. This should result
    in much less cache churn (and I/O reads) than directing reads at random between
    the two secondaries.


    Since all applications specify tag sets, this setup also means that `mongod`[2]
    won’t receive secondary read traffic at all. In this example, `mongod`[1] happens
    to be primary, but since no other nodes have a matching `{use: "msA"}` tag, a
    read preference of `secondaryPreferred` by microservice[A] will be superseded
    by the tag match and a primary read will be made instead.


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig2_HTML.jpg](images/487346_1_En_8_Chapter/487346_1_En_8_Fig2_HTML.jpg)

    Figure 8-2 Using different tags to target specific members per application


    Replication behavior will always mean that documents modified via the primary
    will be loaded into memory on the secondary and may flush out other cached documents.


    More background details about read preferences, staleness, and tags are covered
    in Chapter [5](#487346_1_En_5_Chapter.xhtml). For exact behavior and syntax, refer
    to the MongoDB documentation online.^(⁸)


    ## Advanced LDAP with pools


    The Lightweight Directory Access Protocol (LDAP) is one of the external authentication
    sources (along with Kerberos) supported by MongoDB Enterprise. Using LDAP allows
    you to manage passwords via an existing system such as Windows Active Directory.


    ### Connection management


    A simple environment with LDAP providing authentication for your MongoDB deployment
    might only have a single LDAP server available. In such a setup (Figure [8-3](#487346_1_En_8_Chapter.xhtml#Fig3)),
    a failure to connect to the LDAP server for any reason (overloaded server, failed
    TLS connection, etc.) should ideally be able to retry the LDAP request. In MongoDB
    4.0 and earlier, the OpenLDAP/`libldap` library is solely responsible for selecting
    the LDAP server, establishing the connection, and error handling.


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig3_HTML.jpg](images/487346_1_En_8_Chapter/487346_1_En_8_Fig3_HTML.jpg)

    Figure 8-3 External auth with a single LDAP server


    From MongoDB 4.2, a number of LDAP enhancements such as connection pooling were
    added, and these greatly improve the performance of LDAP authentication. Originally
    each connection to an LDAP server was opened up as needed and then closed immediately.
    As discussed earlier, opening a new connection can add lag to the process. This
    improvement reuses the pooling algorithms that MongoDB drivers use to keep a pool
    of connections open to service incoming client requests with lower latency.'
