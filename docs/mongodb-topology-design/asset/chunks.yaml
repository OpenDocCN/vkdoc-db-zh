  trans: '

    ## 扩展性


    虽然传统数据库已增加了分布式和复制实现，但 MongoDB 提供了一对简单却极其灵活的功能——`复制`和`分片`，以创建能够满足几乎所有项目在可用性、性能和成本方面要求的部署方案。


    在 MongoDB 中，复制意味着逻辑操作会在`复制集`（参见图 1-2）的所有数据承载节点之间进行复制。MongoDB 不发送变更增量的二进制版本，而是将变更操作记录在一个幂等的操作日志（称为`oplog`）中，这些相同的操作在从节点上被复制并应用，其过程与在主节点上一致。通过避免`二进制复制`，MongoDB
    不会复制因存储设备故障可能引入的任何基于文件系统的错误。


    ![../images/487346_1_En_1_Chapter/487346_1_En_1_Fig2_HTML.jpg](img/487346_1_En_1_Fig2_HTML.jpg)


    图 1-2


    一个包含三个数据承载节点的复制集


    在一些传统的拓扑结构中，会在第三个数据中心部署一个仲裁器来在网络分区时进行裁决。现在强烈建议避免使用仲裁器，而只部署数据承载节点。


    对于更大的部署，MongoDB 引入了`分片`的概念，如图 1-3 所示。每个`分片`由一个复制集（用于提供冗余）组成，并存储分片集合整个数据的一个子集。这可以被视为一种“多主”部署，其中每个主节点负责特定范围的文档。对于这些`分片集群`，我们还需要引入一个`mongos`路由器，它对应用程序隐藏了复杂性。这个`mongos`独立于分片及其组件运行，并将任何传入的写入操作重定向到当前作为主节点的复制集成员。


    ![../images/487346_1_En_1_Chapter/487346_1_En_1_Fig3_HTML.jpg](img/487346_1_En_1_Fig3_HTML.jpg)


    图 1-3


    一个包含两个分片（每个分片都是一个复制集）的分片集群


    从应用程序的角度来看，`mongos`路由节点的行为几乎与其他任何节点相同。从复制集拓扑迁移到分片集群，只需要应用程序将连接 URI 更新为指向`mongos`路由器，而不是直接指向成员节点。


    ## 复制


    既然我们已经介绍了复制的概念，让我们更深入地探讨一些内部机制，以便了解它们如何受到我们拓扑设计的影响。


    ### 同步


    在复制集中同步一个节点主要有两个阶段：


    1.  `初始同步`：通过网络复制所有数据，并在目标节点上从头重建数据和索引。

    2.  增量 oplog 处理：将已在主节点上执行的`一批更新`应用到从节点的数据上。


    初始同步是一个资源密集型过程，因为网络和存储容量都可能成为瓶颈。这仅在以下情况下发生：


    1.  一个新节点被添加到现有的复制集中。

    2.  一个节点离线时间过长，以至于无法根据可用的 oplog 赶上进度，或者

    3.  存储级别的损坏意味着现有的数据文件不再可信。


    ### 选举


    MongoDB 通过举行选举来决定复制集中的哪个节点成为主节点。系统架构师可以为某些节点设置优先级，但一般来说，拥有最近写入数据的节点会被选为主节点，以在最坏情况下最大限度地减少数据丢失。通过正确使用多数写关注点，可以保证写入永远不会因网络故障而丢失。这将在第
    5 章进一步讨论。


    ### 延迟/陈旧


    因为节点通常位于不同的主机（最好也在不同的数据中心），所以当 oplog 数据通过网络流向每个从节点时，总会存在一些延迟。每个从节点都会尽快应用相同的 oplog
    变更。从写入在主节点上完成到从节点应用相同变更之间的时间称为`复制延迟`。从节点可以通过`复制链式传输`从主节点或另一个从节点拉取 oplog 更新。


    当应用程序使用`多数`进行写入时，它必须等待大多数数据承载节点写入完成后才能继续下一个操作。这种等待的结果是，复制延迟`减少`，但`吞吐量`也会降低。


    应用程序可以选择在没有显式写关注点的情况下写入某些变更。在此模式下，默认使用写关注点值 `1`，应用程序将只等待主节点确认变更，而不等待任何从节点。如果主节点随后发生故障，写入可能永远不会被复制。当该节点稍后重新加入复制集时，这些写入最终会被`回滚`，然后被写入磁盘上的特殊本地`回滚`文件中。之后需要手动干预才能将这些回滚的写入重新整合到数据库中。


    只有在吞吐量比持久性更重要的某些情况下（例如点击日志或“物联网”指标），才应在生产环境中考虑使用 `{w: 1}` 写入。


    ### Oplog 窗口


    默认情况下，每个复制集成员将 oplog 创建为一个固定大小的集合，大小在约 1GB 到 50GB 之间，具体取决于创建时数据卷上的可用磁盘空间量。如果初始大小被证明不足，稍后也可以增加
    oplog 集合的大小。


    `oplog 窗口`是 oplog 中保留的最近变更的`小时数`，通过最旧和最新 oplog 条目的时间戳差异计算得出。这个窗口会随着时间变化，因为它取决于工作负载的繁重程度以及更新操作的紧凑程度。


    复制集中的所有节点都应配置足够大的 oplog 大小，以便在正常负载下至少能保存 72 小时的变更，从而实现快速恢复并满足服务水平协议，即使在周末也能如此。


    ### 读取偏好


    我们介绍了从复制集读取数据时可定制的隔离级别的概念。记住，从节点可能会落后于主节点，如果我们从主节点以外的任何节点读取，就有读取陈旧数据的风险。在可以接受这种情况的情况下，应用程序可以根据表
    1-2 中概述的不同性能和延迟指标选择从其他节点读取。


    表 1-2


    自定义读取偏好以平衡应用程序优先级


    | 目标 | 方法 |

    | --- | --- |

    | 最大化一致性 | 使用 `primary` 读取偏好和 `majority` 读关注点，仅查看永远不会回滚的写入。 |

    | 最大化可用性 | 使用 `primaryPreferred`，在有主节点时获得一致读取，在只有从节点可用时获得陈旧读取。 |

    | 最小化延迟 | 使用 `nearest` 以获得快速的读取响应，但结果可能`陈旧`。 |

    | 目标工作负载 | 使用带标签的 `secondaryPreferred` 以避免对主节点造成压力，并控制使用哪些从节点。 |

    | 保护主节点 | 对特殊的高影响工作负载（例如无索引的聚合）使用 `secondary`，以便主节点`永远不会`过载。 |


    我们将在第 5 章更详细地探讨这些读取偏好的一些实际应用。

    '
- fmt: '### States


    由于副本集的分布式特性，每个节点都可能处于多种状态中，这会影响其自身行为以及应用程序（及其驱动程序）与该节点交互的方式。我们已经提到了与状态相对应的常见角色，例如`PRIMARY`、`SECONDARY`和`ARBITER`。


    理解其他可能的状态非常重要，因为它们会影响部署在灾难恢复期间的行为，此时保持应用程序可运行并能够持续持久地写入变更至关重要。


    **表 1-3：成员可能状态的描述**


    | 状态 | 说明 | 是否可投票？ |

    | --- | --- | --- |

    | `STARTUP` | `mongod`的初始状态，此时它正在读取配置并将必要数据加载到内存中。 | 是 |

    | `PRIMARY` | 节点在线，已赢得选举，并正在接受来自客户端的写入。 | |

    | `SECONDARY` | 节点在线，并正在从主节点复制数据。其数据副本可能有延迟。 | |

    | `RECOVERING` | 节点已加入副本集，但尚未准备好接受读取，因为它当前正在执行一些管理功能。 | |

    | `STARTUP2` | 节点已主动加入副本集，但目前正在通过初始同步从另一成员复制数据。 | |

    | `ROLLBACK` | 该节点曾是主节点，但与副本集断开连接。它已上线，但正在进行`回滚更改`，以便能赶上当前的主节点。 | |

    | `ARBITER` | 此节点维护连接以促进健康检查和选举。 | |

    | `DOWN` | 此节点曾与副本集通信，但停止通信，可能已离线或从网络其余部分隔离。 | `否` |

    | `UNKNOWN` | 此成员从未将其状态告知其他成员。 | |

    | `REMOVED` | 此成员已从副本集中移除，将不再复制数据。 | |


    图 1-4 描绘了不同状态之间最常见的转换。


    ![图 1-4：状态间的常见转换](images/487346_1_En_1_Chapter/487346_1_En_1_Fig4_HTML.jpg)


    ## Sharding


    为了横向扩展写入能力，将数据分片为多个子集，每个子集有自己的主节点，是一种在某些传统数据库中可用的“主-主”拓扑形式。


    在 MongoDB 中，分片是一个应由开发人员和数据库管理员共同做出的设计决策。


    当需要对这些集合进行分片时，我们必须选择一个`分片键`来划分数据。这个分片键必须具有选择性，并且应该是常见查询的一部分，以便`mongos`路由器可以`定位`到确切的分片。例如，如果我们按`{author:
    1, _id: 1}`对书籍集合进行分片，然后查询`{author: 123}`，那么通常所有匹配的文档都将存在于单个分片上。我们要避免`scatter-gather
    queries`（分散收集查询），因为这种查询需要查询集群中的所有分片，然后在路由器上合并结果，这种方法`无法有效扩展`。


    一旦选定了`分片键`并对集合进行了分片，更改分片键就需要手动干预，因为数据现在已分布在集群中。这将在第 10 章和第 11 章中进一步讨论。


    ### Chunks


    为了管理可能拥有数十亿或数万亿文档的集合的分片，有必要将文档分组为逻辑上的`块`。每个块被定义为基于所选分片键字段的一系列值。在图 1-5 中，我们看到一个示例集合，其中四个文档通过`简单分片键`在字段`customer`上进行分片。块
    1 包含`customer`值从负无穷大到但不包括 5 的所有文档。块 2 包含`customer`值为 5 及更高的文档。


    ![图 1-5：文档按块范围分组](images/487346_1_En_1_Chapter/487346_1_En_1_Fig5_HTML.jpg)


    随着时间的推移，文档数量增加，可能有必要将块 1 拆分为两个，如图 1-6 所示。注意，*新块 1A* 的下边界和 *新块 1B* 的上边界与它们的父 *块
    1* 相同。此拆分步骤需要更新`config`数据库上的某些元数据，影响相对较小。迁移是随后的一个独立步骤。


    ![图 1-6：从原始块新拆分出的两个块](images/487346_1_En_1_Chapter/487346_1_En_1_Fig6_HTML.jpg)


    由于我们仅在`customer`上创建了分片键，最小的范围将是单个客户 ID 值。该客户的文档永远无法分布在多个块上，这使得平衡此集群变得更加困难。


    > **注意**：实际上，MongoDB 使用`MinKey`和`MaxKey`而不是负无穷大到正无穷大来标识块边界，因为值可以是任何 BSON 数据类型，而不仅仅是整数。


    ### Choice of shard key


    一个好的分片键对于最大化分片性能以及在未来添加更多分片时保持部署的前瞻性至关重要。它必须：


    1.  具有高基数，以确保随着数据增长，块可以被拆分为更小的块

    2.  存在于大多数查询中，以便`mongos`可以定位到特定的分片

    3.  随机（从而均匀地）将写入分配到所有分片上

    4.  避免使用单调递增的字段


    在图 1-7 中，我们看到字段`productId`上的单个分片键，对于大型电子商务网站来说，这可以是一个好的分片键，只要值不是单调递增的，它就能均匀分布。实际上，大多数好的分片键是`复合的`，包含两个或更多字段，第一个用于定位，第二个确保高基数。


    ![图 1-7：写入均匀分布在各分片上](images/487346_1_En_1_Chapter/487346_1_En_1_Fig7_HTML.jpg)


    也可以在单个字段上定义`哈希`分片键。基于相应的哈希索引，这种类型的分片键可以在更广泛的块范围内均匀分布文档。


    ### Balancer


    平衡器进程致力于在分片之间均匀平衡`块`的数量。根据块边界的划分方式，一些块可能包含比其他块更多的文档。因此，即使每个块的文档数量相等，一些文档也可能比其他文档大，导致每个块的数据大小略有不同。


    ### Shard distribution


    您可以在每个分片集合上运行`db.<collection>.getShardDistribution()`以查看有关分布的元数据。代码清单 1-2 显示了一个包含两个分片的平衡集群。平衡器尝试确保每个分片上的块数量相同，但根据插入模式，一个块中的文档数量以及文档的平均大小可能意味着块之间的数据大小有时会有显著差异。


    ```

    Shard prod-a at prod-a/node-a1.local:27018,node-a2.local: 27018,node-a3.local:
    27018

    data : 512.34Mb docs : 76861 chunks : 26

    estimated data per chunk : 19.71Mb

    estimated docs per chunk : 2956

    Shard prod-b at prod-b/node-b1.local:27018,node-b2.local:27018, node-b3.local:27018

    data : 456.78Mb docs : 79142 chunks : 27

    estimated data per chunk : 16.92Mb

    estimated docs per chunk : 2931

    Totals

    data : 969.12Mb docs : 156003 chunks : 53

    Shard prod-a contains 52.8% data, 49.3% docs in cluster, avg obj size on shard
    : 267b

    Shard prod-b contains 47.2% data, 50.7% docs in cluster, avg obj size on shard
    : 224b

    ```


    **代码清单 1-2：显示平衡分片集群的分片元数据**'
  raw: '### States


    Due to the distributed nature of a replica set, each node can be in any number
    of states which will affect its own behavior and how applications (and their drivers)
    can interact with that node. We have already mentioned the common roles which
    correspond to states such as `PRIMARY`, `SECONDARY`, and `ARBITER` .


    It’s important to understand the other possible states because they can affect
    the behavior of your deployment during disaster recovery efforts when it’s critical
    to keep the application operational and able to continue writing changes durably.


    Table 1-3


    Description of the possible member states


    | State | Notes | Can vote? |

    | --- | --- | --- |

    | `STARTUP` | The initial state of `mongod` as it reads its config and loads necessary
    data into memory. | Yes |

    | `PRIMARY` | The node is online, has won an election, and is accepting writes
    from client. |

    | `SECONDARY` | The node is online and is replicating from the primary. It may
    have a delayed copy of the data. |

    | `RECOVERING` | The node has joined the replica set but is not ready to accept
    reads, as it is currently performing some administrative functions. |

    | `STARTUP2` | The node has actively joined the set, but is currently copying
    data from another member via an initial sync. |

    | `ROLLBACK` | The node was formerly the primary, but was disconnected from the
    set. It is online but is *rolling back changes*, so that it can catch up to the
    current primary. |

    | `ARBITER` | This node maintains connections to facilitate health checks and
    elections. |

    | `DOWN` | This node once communicated with the set, but stopped communicating
    and is likely offline or partitioned from the rest of the network. | `No` |

    | `UNKNOWN` | This member has never communicated its state to the others. |

    | `REMOVED` | This member was removed from the set and will no longer replicate
    data. |


    Figure [1-4](#487346_1_En_1_Chapter.xhtml#Fig4) maps the most common transitions
    between the different states.


    ![../images/487346_1_En_1_Chapter/487346_1_En_1_Fig4_HTML.jpg](images/487346_1_En_1_Chapter/487346_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    Common transitions between states


    ## Sharding


    In order to scale out writes, sharding the data into subsets each with their own
    primary node is a way of creating a form of “master-master” topology available
    in some legacy databases.


    In MongoDB, sharding is a design decision that should be taken in agreement between
    developers and database administrators.


    When it’s time to shard these collections, we have to choose a *shard key* to
    partition the data. This shard key must be selective and should form part of common
    queries so that the `mongos` router can *target* an exact shard. For example,
    if we shard our book collection by `{author: 1, _id: 1}` and we do a query for
    `{author: 123}`, then normally all matching documents will exist on a single shard.
    We want to avoid *scatter-gather queries* which require querying all shards in
    the cluster and then merging results on the router since this approach **does
    not scale** efficiently.


    Once a *shard key* has been chosen and a collection has been sharded, it requires
    manual intervention to change the shard key since the data has now been distributed
    across the cluster. This will be discussed further in Chapters [10](#487346_1_En_10_Chapter.xhtml)
    and [11](#487346_1_En_11_Chapter.xhtml).


    ### Chunks


    In order to manage sharding for collections which may have billions or trillions
    of documents, it is necessary to group documents into logical *chunks*. Each chunk
    is defined as a range of values based on the chosen shard key fields. In Figure
    [1-5](#487346_1_En_1_Chapter.xhtml#Fig5), we see an example collection with four
    documents sharded with a *simple shard key* on field `customer`. Chunk 1 contains
    all documents with `customer` values from effectively negative infinity up to
    but not including 5\. Chunk 2 has documents with `customer` value 5 and higher.


    ![../images/487346_1_En_1_Chapter/487346_1_En_1_Fig5_HTML.jpg](images/487346_1_En_1_Chapter/487346_1_En_1_Fig5_HTML.jpg)


    Figure 1-5


    Documents grouped in chunk ranges


    As the number of documents increases over time, it may become necessary to split
    up Chunk 1 into two, as seen in Figure [1-6](#487346_1_En_1_Chapter.xhtml#Fig6).
    Note that *New Chunk 1A*’s lower boundary and that *New Chunk 1B*’s upper boundary
    are the same as their parent *Chunk 1*. This splitting step requires updating
    some metadata on the `config` database and has relatively low impact. Migration
    is a separate subsequent step.


    ![../images/487346_1_En_1_Chapter/487346_1_En_1_Fig6_HTML.jpg](images/487346_1_En_1_Chapter/487346_1_En_1_Fig6_HTML.jpg)


    Figure 1-6


    Two chunks newly split from an original chunk


    As we have created a shard key on just `customer`, the smallest range would be
    a single customer ID value. Documents for this customer could never be distributed
    over more than one chunk, making it harder to balance this cluster.


    Note


    In reality, MongoDB uses `MinKey` and `MaxKey` rather than negative infinity to
    infinity to identify chunk boundaries since the values may be of any BSON data
    type and not just integers.


    ### Choice of shard key


    A good shard key is critical to maximize sharded performance over time and future-proof
    deployments as more shards are added. It must


    1.  Have high cardinality to ensure chunks can be split into smaller chunks as
    the data grows


    2.  Be present in most queries so that the `mongos` can target specific shards


    3.  Distribute writes randomly (and thus evenly) across all shards


    4.  Avoid fields with monotonically increasing values


    In Figure [1-7](#487346_1_En_1_Chapter.xhtml#Fig7) we see a single shard key on
    the field `productId` which can be a good shard key for a massive ecommerce site
    and will distribute evenly as long as values are not monotonically increasing.
    In reality, most good shard keys are *compound* with two or more fields, the first
    for targeting and the second to ensure high cardinality.


    ![../images/487346_1_En_1_Chapter/487346_1_En_1_Fig7_HTML.jpg](images/487346_1_En_1_Chapter/487346_1_En_1_Fig7_HTML.jpg)


    Figure 1-7


    Writes distributed evenly across shards


    *Hashed* shard keys can also be defined on a single field. Based on a corresponding
    hashed index, this type of shard key can distribute documents evenly over a wider
    chunk range.


    ### Balancer


    A balancer process works to balance the number of *chunks* evenly among the shards.
    Depending on how the chunk boundaries are drawn, some chunks may contain more
    documents than others. So even if the number of documents per chunk is equal,
    some documents may be bigger than others leading to slightly different data size
    per chunk.


    ### Shard distribution


    You can run `db.<collection>.getShardDistribution()` on each sharded collection
    to see metadata about distribution. Listing [1-2](#487346_1_En_1_Chapter.xhtml#PC2)
    shows a balanced cluster with two shards. The balancer tries to ensure the number
    of chunks is the same on each shard, but depending on insertion patterns, the
    number of documents in a chunk and the average size of documents may mean that
    the size of data between chunks can sometimes vary significantly.


    ```

    Shard prod-a at prod-a/node-a1.local:27018,node-a2.local: 27018,node-a3.local:
    27018

    data : 512.34Mb docs : 76861 chunks : 26

    estimated data per chunk : 19.71Mb

    estimated docs per chunk : 2956

    Shard prod-b at prod-b/node-b1.local:27018,node-b2.local:27018, node-b3.local:27018

    data : 456.78Mb docs : 79142 chunks : 27

    estimated data per chunk : 16.92Mb

    estimated docs per chunk : 2931

    Totals

    data : 969.12Mb docs : 156003 chunks : 53

    Shard prod-a contains 52.8% data, 49.3% docs in cluster, avg obj size on shard
    : 267b

    Shard prod-b contains 47.2% data, 50.7% docs in cluster, avg obj size on shard
    : 224b

    Listing 1-2

    Sharding metadata showing a balanced sharded cluster

    ```'
  trans: '

    ### 状态


    由于副本集的分布式特性，每个节点都可能处于多种状态中，这会影响其自身行为以及应用程序（及其驱动程序）与该节点交互的方式。我们已经提到了与状态相对应的常见角色，例如`PRIMARY`、`SECONDARY`和`ARBITER`。


    理解其他可能的状态非常重要，因为它们会影响部署在灾难恢复期间的行为，此时保持应用程序可运行并能够持续持久地写入变更至关重要。


    **表 1-3：成员可能状态的描述**


    | 状态 | 说明 | 是否可投票？ |

    | --- | --- | --- |

    | `STARTUP` | `mongod`的初始状态，此时它正在读取配置并将必要数据加载到内存中。 | 是 |

    | `PRIMARY` | 节点在线，已赢得选举，并正在接受来自客户端的写入。 | |

    | `SECONDARY` | 节点在线，并正在从主节点复制数据。其数据副本可能有延迟。 | |

    | `RECOVERING` | 节点已加入副本集，但尚未准备好接受读取，因为它当前正在执行一些管理功能。 | |

    | `STARTUP2` | 节点已主动加入副本集，但目前正在通过初始同步从另一成员复制数据。 | |

    | `ROLLBACK` | 该节点曾是主节点，但与副本集断开连接。它已上线，但正在进行`回滚更改`，以便能赶上当前的主节点。 | |

    | `ARBITER` | 此节点维护连接以促进健康检查和选举。 | |

    | `DOWN` | 此节点曾与副本集通信，但停止通信，可能已离线或从网络其余部分隔离。 | `否` |

    | `UNKNOWN` | 此成员从未将其状态告知其他成员。 | |

    | `REMOVED` | 此成员已从副本集中移除，将不再复制数据。 | |


    图 1-4 描绘了不同状态之间最常见的转换。


    ![图 1-4：状态间的常见转换](img/487346_1_En_1_Fig4_HTML.jpg)


    ## 分片


    为了横向扩展写入能力，将数据分片为多个子集，每个子集有自己的主节点，是一种在某些传统数据库中可用的“主-主”拓扑形式。


    在 MongoDB 中，分片是一个应由开发人员和数据库管理员共同做出的设计决策。


    当需要对这些集合进行分片时，我们必须选择一个`分片键`来划分数据。这个分片键必须具有选择性，并且应该是常见查询的一部分，以便`mongos`路由器可以`定位`到确切的分片。例如，如果我们按`{author:
    1, _id: 1}`对书籍集合进行分片，然后查询`{author: 123}`，那么通常所有匹配的文档都将存在于单个分片上。我们要避免`scatter-gather
    queries`（分散收集查询），因为这种查询需要查询集群中的所有分片，然后在路由器上合并结果，这种方法`无法有效扩展`。


    一旦选定了`分片键`并对集合进行了分片，更改分片键就需要手动干预，因为数据现在已分布在集群中。这将在第 10 章和第 11 章中进一步讨论。


    ### 块


    为了管理可能拥有数十亿或数万亿文档的集合的分片，有必要将文档分组为逻辑上的`块`。每个块被定义为基于所选分片键字段的一系列值。在图 1-5 中，我们看到一个示例集合，其中四个文档通过`简单分片键`在字段`customer`上进行分片。块
    1 包含`customer`值从负无穷大到但不包括 5 的所有文档。块 2 包含`customer`值为 5 及更高的文档。


    ![图 1-5：文档按块范围分组](img/487346_1_En_1_Fig5_HTML.jpg)


    随着时间的推移，文档数量增加，可能有必要将块 1 拆分为两个，如图 1-6 所示。注意，*新块 1A* 的下边界和 *新块 1B* 的上边界与它们的父 *块
    1* 相同。此拆分步骤需要更新`config`数据库上的某些元数据，影响相对较小。迁移是随后的一个独立步骤。


    ![图 1-6：从原始块新拆分出的两个块](img/487346_1_En_1_Fig6_HTML.jpg)


    由于我们仅在`customer`上创建了分片键，最小的范围将是单个客户 ID 值。该客户的文档永远无法分布在多个块上，这使得平衡此集群变得更加困难。


    > **注意**：实际上，MongoDB 使用`MinKey`和`MaxKey`而不是负无穷大到正无穷大来标识块边界，因为值可以是任何 BSON 数据类型，而不仅仅是整数。


    ### 分片键的选择


    一个好的分片键对于最大化分片性能以及在未来添加更多分片时保持部署的前瞻性至关重要。它必须：


    1.  具有高基数，以确保随着数据增长，块可以被拆分为更小的块

    2.  存在于大多数查询中，以便`mongos`可以定位到特定的分片

    3.  随机（从而均匀地）将写入分配到所有分片上

    4.  避免使用单调递增的字段


    在图 1-7 中，我们看到字段`productId`上的单个分片键，对于大型电子商务网站来说，这可以是一个好的分片键，只要值不是单调递增的，它就能均匀分布。实际上，大多数好的分片键是`复合的`，包含两个或更多字段，第一个用于定位，第二个确保高基数。


    ![图 1-7：写入均匀分布在各分片上](img/487346_1_En_1_Fig7_HTML.jpg)


    也可以在单个字段上定义`哈希`分片键。基于相应的哈希索引，这种类型的分片键可以在更广泛的块范围内均匀分布文档。


    ### 平衡器


    平衡器进程致力于在分片之间均匀平衡`块`的数量。根据块边界的划分方式，一些块可能包含比其他块更多的文档。因此，即使每个块的文档数量相等，一些文档也可能比其他文档大，导致每个块的数据大小略有不同。


    ### 分片分布


    您可以在每个分片集合上运行`db.<collection>.getShardDistribution()`以查看有关分布的元数据。代码清单 1-2 显示了一个包含两个分片的平衡集群。平衡器尝试确保每个分片上的块数量相同，但根据插入模式，一个块中的文档数量以及文档的平均大小可能意味着块之间的数据大小有时会有显著差异。


    ```

    Shard prod-a at prod-a/node-a1.local:27018,node-a2.local: 27018,node-a3.local:
    27018

    data : 512.34Mb docs : 76861 chunks : 26

    estimated data per chunk : 19.71Mb

    estimated docs per chunk : 2956

    Shard prod-b at prod-b/node-b1.local:27018,node-b2.local:27018, node-b3.local:27018

    data : 456.78Mb docs : 79142 chunks : 27

    estimated data per chunk : 16.92Mb

    estimated docs per chunk : 2931

    Totals

    data : 969.12Mb docs : 156003 chunks : 53

    Shard prod-a contains 52.8% data, 49.3% docs in cluster, avg obj size on shard
    : 267b

    Shard prod-b contains 47.2% data, 50.7% docs in cluster, avg obj size on shard
    : 224b

    ```


    **代码清单 1-2：显示平衡分片集群的分片元数据**

