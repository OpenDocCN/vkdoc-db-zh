    # 5. Basic Topologies


    This chapter walks through common deployment topologies depending on the number
    of data centers available. We address the limitations of each topology and how
    to best configure nodes and backups to optimize availability.


    ## Introduction


    Historically, the first experience that most people have with MongoDB is running
    it locally. You can very easily download MongoDB for free and install it on your
    local PC or Mac. With the Mongo shell, a visual tool like Compass or Studio 3T,
    or through some programming UI, you can be writing and reading data from a MongoDB
    server in minutes.


    Local MongoDB instances are fantastic for developers and researchers who want
    to learn or run experiments, but not suitable for any sort of production workloads.
    As we’ve already discussed, one key strength of MongoDB is its distributed nature.
    The real revolution compared to MySQL or other open source databases is how easily
    and flexibly MongoDB can be scaled out to suit your use case.


    If you are servicing an internal application, to internal customers in a single
    location, then a cluster in a single physical location might be just fine. If,
    by contrast, you’re building a startup with a global audience, you want to be
    able to have their data as close as possible to reduce latency and meet compliance
    obligations (Chapter [4](#487346_1_En_4_Chapter.xhtml)).


    Table [5-1](#487346_1_En_5_Chapter.xhtml#Tab1) shows a quick overview of different
    environments and benefits of increasing the number of data centers. Each row adds
    additional benefits over the row above.


    Table 5-1


    A summary of topologies and use cases


    | Environment | Benefits |

    | --- | --- |

    | Single standalone server | Quick start for prototyping, development, and simple
    testing. |

    | Replica set, One data center | Now any single server can fail without the loss
    of data nor any downtime. |

    | Two data centers | Now an entire data center can be lost permanently without
    loss of data. Manual intervention required to restore writes. |

    | Two data centers (plus cloud arbiter) | Now an entire data center can be lost
    without any application downtime, and writes are still possible. |

    | Three data centers | Now an entire data center can be lost and the application
    can continue writing to a majority of nodes, so that data rollbacks can never
    occur. |

    | Geolocated data centers | Now using geolocalized sharding, data can be stored
    close to users to reduce latency and comply with data protection regulations.
    |'
