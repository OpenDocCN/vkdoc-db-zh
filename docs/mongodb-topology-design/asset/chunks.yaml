- fmt: '### Custom write concerns


    Let’s imagine we have settled on our hybrid topology with two data-bearing nodes
    in private data centers and one in the cloud. We’ve prevented the cloud-based
    node from becoming primary, but our application isn’t aware that the two on-prem
    nodes are special. Let’s say that we want to guarantee that when we do an operation
    with write concern `majority,` the two on-prem nodes are the ones that acknowledge
    the write. In case one of the on-prem nodes goes down, the other can immediately
    take over the primary role without first having to catch up on the oplog.


    MongoDB supports custom write concerns for this sort of use case. We will now
    create one called `OnPrem` which will ensure our nodes in `dc1` and `dc2` are
    always included.


    First, we’d need to tag the nodes in each shard’s replica set with a `dc` tag:


    ```

    conf = rs.conf();

    conf.members[0].tags = { "dc": "dc1"};

    conf.members[1].tags = { "dc": "dc2"};

    conf.members[2].tags = { "cloud": "aws-us-east1"};

    rs.reconfig(conf);

    ```


    Then we can create a custom write concern in each replica set:


    ```

    conf = rs.conf();

    conf.settings = { getLastErrorModes: { OnPrem : { "dc": 2 } } };

    rs.reconfig(conf);

    ```


    This creates a custom write concern called `OnPrem` which is satisfied *only*
    when the write is acknowledged on two members with *different* values of the `dc`
    tag.


    Finally, the application can use this custom write concern as follows:


    ```

    db.myCollection.update(

    { id: 123 },

    [ { $set: { value: "abc", lastUpdated: "$$NOW"} ],

    { writeConcern: { w: "OnPrem" } }

    )

    ```


    In our three-member shard, the `OnPrem` write concern means both nodes on-prem
    must acknowledge the write. If either on-prem node is unavailable, any write operations
    which specify this write concern will time out. Adding additional members in DC1
    and DC2 and creating a PS|SS|S topology would provide better fault tolerance.


    ### Internet of Things


    The Internet of Things (IoT) has become a catchphrase for any sort of massively
    distributed system with many small devices, communicating over a network and usually
    collecting data for later collation and analysis.


    There are numerous use case examples and blog posts for large-scale IoT services
    focusing on the required schema design, which are out of scope for this book.
    Typically, sensors and actuators communicate with edge gateways which do initial
    processing and aggregation of incoming data streams and prepare them for storage.


    The main problem from a topology design perspective is the sheer number of connections
    required as shown in Figure [8-13](#487346_1_En_8_Chapter.xhtml#Fig13). Most applications
    with MongoDB drivers will open a pool of connections to the database for reuse.


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig13_HTML.jpg](images/487346_1_En_8_Chapter/487346_1_En_8_Fig13_HTML.jpg)


    *Figure 8-13. IoT devices connecting directly to MongoDB*


    #### Connection management


    For applications running as *microservices*, this pool size (per service/pod/API)
    needs to be tuned right down to avoid overwhelming the primary node or `mongos`
    with open connections. In an Internet of Things scenario where there could be
    potentially millions of devices each connecting to a database to make updates,
    this problem is even worse.


    #### Short-term connections


    For IoT, the simple solution is to not maintain an open connection at all. Instead,
    build up a payload of data into a predefined bucket and only create the `MongoClient`
    object and establish a connection to the database once an hour (or even less frequently)
    to share a summary of that hour’s data. Assuming this data can be inserted in
    a few seconds, several thousand devices would on average only open one connection
    to the cluster at any point in time.


    #### Scaling writes


    For millions of devices, you would probably need to consider sharded clusters.
    This would allow you to split up your data into subsets, each with a primary that
    can accept write operations. This allows scaling out for a high insert/update
    workload.


    If you are expecting to deploy devices around the world and want to ensure low-latency
    write operations to MongoDB deployments, see Chapter [6](#487346_1_En_6_Chapter.xhtml)
    for more details on global topologies and Chapters [10](#487346_1_En_10_Chapter.xhtml)
    and [11](#487346_1_En_11_Chapter.xhtml) for advanced sharding topics.


    ### In-memory storage


    With the advent of the WiredTiger storage engine (default since 3.4), MongoDB
    also added a memory-only storage engine for Enterprise customers. The in-memory
    storage engine doesn’t persist any data to disk and so is suitable for several
    niche use cases where predictable latency is important and data can be read and
    written purely in memory. When configured in a replica set, there’s a low but
    nonzero risk that all nodes could fail simultaneously, resulting in complete data
    loss. Obviously, this is not suitable for any sort of system that needs to persist
    data in the long term. One solution is to deploy a fourth hidden node running
    the normal WiredTiger storage engine which persists data to disk (Figure [8-14](#487346_1_En_8_Chapter.xhtml#Fig14)).
    By keeping this in the same DC as the primary, we can ensure optimal replication
    performance by minimizing network latency.


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig14_HTML.jpg](images/487346_1_En_8_Chapter/487346_1_En_8_Fig14_HTML.jpg)


    *Figure 8-14. An in-memory deployment with one WiredTiger node*


    Since the in-memory storage engine doesn’t flush data to disk, and so has almost
    no I/O requirements, it’s tempting to assume that this engine can process data
    at a higher rather than a normal WiredTiger configuration. Interestingly, in most
    cases the throughput is almost identical, especially in replica sets where network
    latency makes replication the bottleneck.


    Overall, while interesting, this storage engine isn’t widely used as WiredTiger
    is similarly performant and keeps data persistent despite process or server restarts.


    ### Mobile data-bearing nodes


    The MongoDB replication system was designed as a distributed system with automatic
    failover. Writes always occur on the primary and are replicated. Sharding allows
    us to have multiple primary nodes to scale workloads, but each primary has a clear
    “scope” with no overlap and no risk of conflicts.


    Certain use cases call for a type of master-master configuration where two isolated
    nodes both accept writes for the same range of documents, but which require a
    conflict-resolution mechanism.


    In the following texts, we will explore one example of such a system: a mobile
    data-bearing node. By the end we will see that this approach is full of compromises.


    #### Scenario


    Let’s imagine that we are running a motor racing team, and we need to move a complex
    set of equipment from site to site through a racing season. This kit will include
    a mobile rack of computing equipment and a MongoDB database. There is also a factory
    location where the rest of the team tests new equipment and scenarios, which also
    needs access to the same data.


    Some of the racing locations will have a good Internet connection, and others
    may have no Internet connectivity at all.


    As we move from race to race, the mobile computing kit may be offline for several
    weeks at a time. During these periods, the database in the factory needs to be
    online, available, and modifiable.


    To make matters more difficult, the mobile database is a critical component of
    the race preparation, so any downtime is not acceptable. We’ll therefore actually
    carry around two data-bearing nodes for redundancy.


    So the question is: How can we design a topology that gives high availability,
    with two nodes being offline most of the time and allowing writes from two locations?'
