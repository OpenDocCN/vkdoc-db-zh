    -A INPUT -s 12.34.56.78 -p tcp --destination-port 27017 -m state --state NEW,ESTABLISHED
    -j ACCEPT

    -A OUTPUT -d 12.34.56.78 -p tcp --source-port 27017 -m state --state ESTABLISHED
    -j ACCEPT

    Listing 3-2

    Allow only TCP traffic for the active MongoDB port

    ```


    You will need this configuration pair for every host in your deployment, including
    config servers, `mongos` instances, and any host running an application which
    needs to connect to the database.


    In order to make sure that iptables is running, restart it with the following:


    ```

    service iptables restart

    ```


    If your network or hosts support IPv6, you can either configure `ip6tables` also
    or disable IPv6 completely for this host and configure MongoDB to bind only to
    IPv4 network interfaces.


    You could also use `firewalld` as an alternative to `iptables` for newer Linux
    systems. Both utilize the `netfilter` framework for the actual processing of packets,
    but `firewalld` can change configurations on already open connections. For troubleshooting
    connection issues on Linux, `ss -plnt` can be useful for seeing socket statistics.


    On Windows, you can use `netsh` to open up all required ports between all components
    (all MongoDB nodes, shard and config servers, and application). As always, the
    documentation provides step-by-step examples for your version of MongoDB.


    ### Limit interfaces with bindIp


    By default, recent versions of MongoDB default the `bindIp` configuration parameter
    to `127.0.0.1`. This means the `mongod` process only listens to incoming requests
    from the `localhost` interface and ignores any external network interfaces. This
    is fine for testing on a development machine, or running a standalone MongoDB
    on the same cloud server instance as a web server. To accept a request from an
    external client, you would need to also specify the IP address of the interface,
    that is, the IP address assigned to the host by the network which is used for
    routing external traffic by setting:


    ```

    net:

    bindIp: 12.34.56.78

    ```


    If for some reason your host is allocated dynamic IP addresses which change over
    time, you could allow MongoDB to bind to all interfaces by adding:


    ```

    net:

    bindIp: 0.0.0.0

    ```


    or


    ```

    net:

    bindIpAll: true

    ```


    Note


    This could allow incoming connection attempts from the Internet. You should always
    enable authentication before adding external interfaces.


    ### Customize ports


    Another small security enhancement is to run your MongoDB deployment on nonstandard
    ports. In a sharded cluster, by default, data-bearing nodes will run on port 27018
    and `mongos`es on 27017\. By moving these to different ports, naïve malware or
    port scanners may be prevented from detecting running MongoDB instances.


    These can be configured in the config file with


    ```

    net:

    port: 37001

    ```


    ## Filesystem


    On most Linux installs, MongoDB runs as user `mongod` and group `mongod`. Therefore,
    it creates all data files and logs as this same `mongod` user. Both the data files
    and log files path should also be owned by the user and group, and all other users
    should not even have read access.


    Current permissions can be checked by running `ls -l` on your `dbPath`, which
    is typically `/var/lib/mongodb`.


    If you create a keyfile to secure the server, it should also be owned by `mongod`
    and not even have read access by group. This can be achieved by running:


    ```

    chmod 600 /path/to/keyfile

    ```


    Note


    Without file-level encryption, anyone with root access to the host could launch
    a separate `mongod` process with no access control and read the data.


    ## Authentication


    While network-level security is a key factor in securing any database, it forms
    only one part of any secure environment. Connections from known sources still
    need to be limited to prevent compromised hosts accessing data remotely. MongoDB
    supports a myriad of different authentication methods to require new incoming
    connections to identify themselves before performing any database operations.


    ### Passwords vs. keyfiles


    Creating users with rule-based access control (RBAC) in MongoDB deployments is
    highly recommended, and you should create at least one user account as soon as
    you start storing any real data in your database.


    Like most databases, you can create a username and password which can be granted
    access to multiple databases or collections. Users can be restricted to certain
    roles such as “read only” or limited to be able to configure the replica set,
    but cannot see any data at all. You should always follow the principle of “least
    privilege” and only grant roles that this particular user needs to complete their
    use cases.


    Note


    Creating a user account is not enough to require authentication when connecting
    to a MongoDB database. You must also explicitly enable authentication.


    Authentication can be enabled by adding the following lines to the config file
    and then restarting the MongoDB node:


    ```

    security:

    authorization: enabled

    ```


    Access controls can be temporarily disabled by a system administrator by restarting
    the `mongod` process without the `--auth` parameter or `security.authorization`
    config. This can be useful for maintenance and password resets if the admin password
    is lost.


    #### Connecting with passwords


    When connecting to MongoDB from a driver or a data explorer tool like MongoDB
    Compass or the Mongo shell, you need to supply both the username and password
    either via a special field or in the *connection URI* in the form:


    ```

    mongodb://[username:password@]host1[:port1][,...hostN[:portN]][/[database][?options]]

    ```


    When specifying passwords with special characters in the URI, they will need to
    be escaped, and when used on the command line, they should be surrounded by double
    or single quotes.


    One of the problems of using passwords in a deployment is that scripts will need
    to store passwords to connect to MongoDB. This is a security risk since passwords
    exist unencrypted inside script files (and source control) and may appear in the
    process list (e.g., `ps` on Linux) and may be stored insecurely on user’s personal
    computers.


    If your organization has stricter security requirements, you should consider x.509
    certificates (discussed later).'
  trans: '### 使用 iptables 的防火墙


    大多数 Linux 发行版都预装了防火墙系统。我们将介绍最常见的一个：`iptables`。这是一个非常复杂且强大的防火墙系统，但正确配置可能比较困难。Red
    Hat Linux 在图形用户界面中包含了一些辅助工具，并提供了一个向导来帮助生成 `iptables` 规则列表。


    实际上，你可以手动配置防火墙，使用一系列规则来允许仅与 MongoDB 集群的其他成员以及任何应用服务器、开发者机器，甚至最终用户主机之间的连接。


    要允许来自受信任主机的传入连接，你可以在配置文件 `/etc/sysconfig/iptables`（以及 `/etc/sysconfig/ip6tables`）中添加条目，如清单
    3-1 所示。


    ```

    -A INPUT -s 12.34.56.78 -j ACCEPT

    -A OUTPUT -d 12.34.56.78 -j ACCEPT

    清单 3-1

    允许受信任主机 12.34.56.78 的流量通过防火墙

    ```


    这将允许与该受信任主机之间在任何端口上的任何流量（TCP 或 UDP）。为了增强安全性，你还可以将访问限制为仅使用 MongoDB 节点所用端口的 TCP
    流量。此外，你可以限制出站流量仅为从远程主机建立的连接，如清单 3-2 所示。


    ```

    -A INPUT -s 12.34.56.78 -p tcp --destination-port 27017 -m state --state NEW,ESTABLISHED
    -j ACCEPT

    -A OUTPUT -d 12.34.56.78 -p tcp --source-port 27017 -m state --state ESTABLISHED
    -j ACCEPT

    清单 3-2

    仅允许活动 MongoDB 端口的 TCP 流量

    ```


    你需要为部署中的每个主机配置这样一对规则，包括配置服务器、`mongos` 实例以及运行需要连接到数据库的应用程序的任何主机。


    为了确保 `iptables` 正在运行，请使用以下命令重启它：


    ```

    service iptables restart

    ```


    如果你的网络或主机支持 IPv6，你可以同时配置 `ip6tables`，或者完全禁用该主机的 IPv6，并将 MongoDB 配置为仅绑定到 IPv4 网络接口。


    对于较新的 Linux 系统，你也可以使用 `firewalld` 作为 `iptables` 的替代方案。两者都使用 `netfilter` 框架来实际处理数据包，但
    `firewalld` 可以在已建立的连接上更改配置。对于在 Linux 上排查连接问题，`ss -plnt` 命令对于查看套接字统计信息非常有用。


    在 Windows 上，你可以使用 `netsh` 在所有组件（所有 MongoDB 节点、分片和配置服务器以及应用程序）之间打开所有需要的端口。和往常一样，官方文档为你所使用的
    MongoDB 版本提供了逐步示例。


    ### 使用 bindIp 限制接口


    默认情况下，新版本的 MongoDB 将 `bindIp` 配置参数默认设置为 `127.0.0.1`。这意味着 `mongod` 进程仅监听来自 `localhost`
    接口的传入请求，并忽略任何外部网络接口。这对于在开发机器上进行测试，或者将独立的 MongoDB 与 Web 服务器运行在同一云服务器实例上是合适的。要接受来自外部客户端的请求，你需要同时指定接口的
    IP 地址，即网络分配给主机的用于路由外部流量的 IP 地址，通过设置：


    ```

    net:

    bindIp: 12.34.56.78

    ```


    如果由于某种原因你的主机动态分配了随时间变化的 IP 地址，你可以通过添加以下内容让 MongoDB 绑定到所有接口：


    ```

    net:

    bindIp: 0.0.0.0

    ```


    或者


    ```

    net:

    bindIpAll: true

    ```


    注意：这可能会允许来自互联网的传入连接尝试。在添加外部接口之前，你应始终启用认证。


    ### 自定义端口


    另一个小型的安全增强措施是在非标准端口上运行你的 MongoDB 部署。在分片集群中，默认情况下，承载数据的节点将在端口 27018 上运行，而 `mongos`
    在 27017 上运行。通过将这些端口更改为不同的端口，可以阻止简单的恶意软件或端口扫描器发现正在运行的 MongoDB 实例。


    可以在配置文件中通过以下方式进行配置：


    ```

    net:

    port: 37001

    ```


    ## 文件系统


    在大多数 Linux 安装中，MongoDB 以用户 `mongod` 和组 `mongod` 的身份运行。因此，它会以这个相同的 `mongod` 用户身份创建所有数据文件和日志文件。数据文件和日志文件的路径也应由该用户和组所有，其他任何用户甚至不应具有读取权限。


    可以通过在你的 `dbPath`（通常是 `/var/lib/mongodb`）上运行 `ls -l` 来检查当前的权限。


    如果你创建了一个密钥文件来保护服务器，它也应由 `mongod` 所有，并且组用户甚至不应具有读取权限。这可以通过运行以下命令实现：


    ```

    chmod 600 /path/to/keyfile

    ```


    注意：没有文件级加密的情况下，任何对主机具有 root 访问权限的人都可以启动一个没有访问控制的独立 `mongod` 进程并读取数据。


    ## 认证


    虽然网络安全是保护任何数据库的关键因素，但它只是安全环境的一个组成部分。来自已知来源的连接仍然需要加以限制，以防止受损主机远程访问数据。MongoDB 支持多种不同的认证方法，要求新的传入连接在执行任何数据库操作之前进行身份验证。


    ### 密码与密钥文件


    强烈建议在 MongoDB 部署中使用基于角色的访问控制 (RBAC) 来创建用户，并且一旦开始在数据库中存储任何真实数据，你应至少创建一个用户账户。


    像大多数数据库一样，你可以创建一个用户名和密码，该用户可以被授予访问多个数据库或集合的权限。用户可以被限制为某些角色，例如“只读”，或者仅限于能够配置副本集，但根本看不到任何数据。你应始终遵循“最小特权”原则，仅授予该特定用户完成其用例所需的角色。


    注意：仅创建用户账户不足以在连接到 MongoDB 数据库时要求进行认证。你还必须显式启用认证。


    可以通过在配置文件中添加以下行，然后重启 MongoDB 节点来启用认证：


    ```

    security:

    authorization: enabled

    ```


    系统管理员可以通过在不带 `--auth` 参数或 `security.authorization` 配置的情况下重启 `mongod` 进程来临时禁用访问控制。如果忘记了管理员密码，这对于维护和密码重置很有用。


    #### 使用密码连接


    当从驱动程序或像 MongoDB Compass 或 Mongo shell 这样的数据浏览器工具连接到 MongoDB 时，你需要通过特殊字段或在 *连接
    URI* 中以以下形式提供用户名和密码：


    ```

    mongodb://[username:password@]host1[:port1][,...hostN[:portN]][/[database][?options]]

    ```


    当在 URI 中指定包含特殊字符的密码时，它们需要被转义；当在命令行中使用时，它们应被双引号或单引号包围。


    在部署中使用密码的一个问题是，脚本将需要存储密码以连接到 MongoDB。这是一个安全风险，因为密码以未加密的形式存在于脚本文件（和源代码控制）中，可能会出现在进程列表中（例如
    Linux 上的 `ps`），并且可能不安全地存储在用户的个人计算机上。


    如果你的组织有更严格的安全要求，你应该考虑使用 x.509 证书（稍后讨论）。'
- fmt: "### Keyfiles\n\n密钥文件本质上是一个存储在安全文件中的超长密码，由部署中的每个 `mongod` 节点引用。该密钥文件充当组件之间的“共享密言”，使它们在建立副本集或向现有集添加全新节点时能够进行身份验证。\n\
    \n如果没有这个共享密言，黑客可能将他们控制下的新空节点添加到现有副本集，并触发初始同步。他们将借此搭上 MongoDB 复制架构的便车来复制数据库。\n\n\
    这些文件的内容应视为密码，并在文件系统级别限制读取权限。任何获得其内容的人都可以伪造对副本集的访问，因此这是您部署的最低安全措施。\n\n您可以通过如下所示指定路径并重启服务器，来指示\
    \ MongoDB 要求密钥文件进行内部身份验证：\n\n```yaml\nsecurity:\n  keyFile: /path/secure.key\n\
    ```\n\n请注意，设置密钥文件也会自动启用身份验证。\n\n### x.509 证书\n\n比使用密钥文件更优越但更复杂的方法是为您的服务器和客户端组件创建和部署\
    \ x.509 证书。\n\n在撰写本文时，有一个方便免费的站点叫 Let’s Encrypt，它使得生成可用于 MongoDB 的 x.509 证书变得容易，但要求您的主机具有可公开寻址的\
    \ DNS 主机名。这些证书仅持续 90 天，因此您需要编写脚本来自动生成和更新它们。\n\n虽然 x.509 证书可用于保护 MongoDB 集群组件*内部*通信的安全，但稍有不同的证书格式可用于*应用程序*客户端向集群进行身份验证。如果您选择使用此方法，那么每个连接的的不同用户账户都需要为其创建一个唯一的证书，并将用户名嵌入元数据中。\n\
    \n### Client authentication\n\nMongoDB 具有独立的*身份验证*和*授权*子系统。身份验证可以使用内置的身份验证方法（称为加盐质询响应身份验证机制（SCRAM））执行，也可以通过支持轻量目录访问协议（LDAP）或\
    \ Kerberos 的外部身份验证系统执行。使用 SCRAM 时，用户及其凭据以加密形式存储在 `admin` 数据库中（并自动复制到部署中的所有成员）。\n\
    \n授权是在身份验证成功后的后续步骤，MongoDB 将在允许运行命令之前检查经过身份验证的用户的角色和权限。\n\n可以根据需要，在数据库或集合级别授予授权。可以将多个预定义角色的权限相加以达到正确的组合。\n\
    \n注意\n\nx.509 和 Kerberos 集成仅允许身份验证，而授权基于在 `admin` 数据库上创建的权限和角色。MongoDB Enterprise\
    \ 还支持通过 LDAP 进行完整的授权——这样用户和角色都完全在 LDAP 服务器中定义。\n\n#### External authentication\n\
    \nMongoDB 提供了多种类型的外部身份验证方法。截至本文撰写时，支持的方法包括 x.509、LDAP 和 Kerberos。LDAP 是一个标准的目录协议，具有许多开源和商业实现，例如\
    \ OpenLDAP、Windows Active Directory 和 Apache Directory Server。Kerberos 是一个用于大型客户端/服务器系统的行业标准身份验证协议，允许客户端和服务器相互验证对方的身份。在撰写本文时，Windows\
    \ Active Directory 和 Apache Directory Server 支持 Kerberos。\n\n大多数这些方法需要在 `$external`\
    \ 数据库上创建用户，并在 MongoDB 内部定义角色和权限。外部源仅执行身份验证步骤。\n\n使用外部身份验证时，是 MongoDB 服务器与外部身份验证服务通信，而不是应用程序直接通信（图\
    \ [3-2](#487346_1_En_3_Chapter.xhtml#Fig2)）。\n\n![../images/487346_1_En_3_Chapter/487346_1_En_3_Fig2_HTML.jpg](images/487346_1_En_3_Chapter/487346_1_En_3_Fig2_HTML.jpg)\n\
    \n图 3-2\n\n外部身份验证的步骤和通信\n\n表 [3-1](#487346_1_En_3_Chapter.xhtml#Tab1) 列出了支持的身份验证机制及其与身份验证和授权行为的关系。通过\
    \ `--authenticationMechanism` 配置机制的值显示在括号中。请注意，即使使用 Kerberos 身份验证，您仍然可以使用 LDAP\
    \ 授权来将用户映射到角色。\n\n表 3-1\n\n可用的不同身份验证机制\n\n| 机制 | 身份验证 | 授权 |\n| :--- | :--- |\
    \ :--- |\n| SCRAM (`SCRAM-SHA-256`) | 密码在 MongoDB 内部加密 | 权限在 MongoDB 中定义。 |\n\
    | x.509 (`MONGODB-X.509`, external) | 用户已注册，但 MongoDB 中无密码。每个用户都有一个唯一的证书。 |\n\
    | LDAP (`PLAIN`, external) | 客户端发送密码，但密码从不存储在 MongoDB 中。 | 权限在 MongoDB 中定义，或与\
    \ LDAP 协同工作以进行可选的授权（仅限 MongoDB Enterprise）。 |\n| Kerberos (`GSSAPI`, external)\
    \ | 用户已注册，但 MongoDB 中无密码。 |\n\n### Encrypted connections\n\n即使您的所有 MongoDB 节点和应用程序都存在于同一个安全网络中，考虑加密所有通信仍然是一个好主意。这可以防止对进出\
    \ MongoDB 部署的网络流量进行窃听，并使您日后想要迁移时更容易横向扩展。例如，您可能希望逐渐从完全本地部署过渡到部分节点托管在云提供商上的混合解决方案。\n\
    \n对于任何生产用途，您应该已经为 MongoDB 部署考虑采用具有物理分离数据中心的多数据中心配置。即使使用 VPN/VPC，数据中心之间的同步几乎总是依赖于共享的互联网骨干网，因此加密连接对于保持数据安全至关重要。\n\
    \nMongoDB 社区版包含使用 TLS/SSL（传输加密）对*传输中*数据的完整加密。由于加密连接对于安全系统至关重要，最近版本的 MongoDB 默认移除了对较旧、安全性较差的\
    \ TLS 1.0 系统的支持。您可以使用来自官方*证书颁发机构*的任何有效证书，也可以使用 `openssl` 命令行工具从头开始构建自己的*自签名证书*。无论采用哪种方法，数据流都会被加密，但如果没有由第三方证书颁发机构签署的证书进行身份验证，您的通信可能容易受到所谓的*中间人攻击*。\n\
    \n即使您已为内部 MongoDB 通信配置了 TLS，您仍需要通过将 `?ssl=true` 添加到连接字符串来显式启用从应用程序到 MongoDB 的加密。如果您想要求所有客户端都使用\
    \ TLS 才能连接到您的 MongoDB 服务器，可以将此配置添加到您的 MongoDB 配置中：\n\n```yaml\nnet:\n  tls:\n\
    \    mode: requireTLS\n```\n\n注意\n\n在 MongoDB 4.2 及更高版本中，所有配置引用都从 SSL 更改为 TLS，例如：\n\
    \n`net.ssl.mode: requireSSL`\n\n变更为\n\n`net.tls.mode: requireTLS`\n\n在生产环境中，您应该为\
    \ MongoDB 部署中的所有组件使用由*同一证书颁发机构*（无论是组织内部的还是受信任的第三方 TLS 供应商）签署的有效证书。"
  raw: '### Keyfiles


    The keyfile is in essence a very long password stored in a secure file and referenced
    by each mongod node in the deployment. This keyfile acts as a “shared secret”
    between the components and lets them authenticate themselves when establishing
    a replica set, or when adding a brand-new node to an existing set.


    Without this shared secret, it could be possible for hackers to add a new empty
    node under their control into an existing replica set and trigger an initial sync.
    They would then be piggybacking onto the MongoDB replication architecture to make
    a copy of the database.


    The contents of these files should be treated as a password and read access restricted
    at the filesystem level. Anyone with the contents could spoof access to the replica
    set and so this is a bare-minimum security approach for your deployment.


    You can instruct MongoDB to require a keyfile for internal authentication by indicating
    the path as follows and restarting the server:


    ```

    security:

    keyFile: /path/secure.key

    ```


    Note that setting a keyfile will automatically enable authentication too.


    ### x.509 certificates


    A superior but more complex method than using a keyfile is to create and deploy
    x.509 certifications for your server and client components.


    At the time of writing, there’s a convenient free site called Let’s Encrypt that
    makes it easy to generate x.509 certificates that can be used with MongoDB, but
    requires that your hosts have publicly addressable DNS hostnames. These certificates
    only last 90 days, so you will want to script their generation and renewal.


    While x.509 certificates can be used to secure *internal* communication between
    MongoDB cluster components, a slightly different certificate format can be used
    for *application* clients to authenticate themselves with the clusters. If you
    chose to use this method, then each different user account connecting needs to
    have a unique certificate created for it with the username embedded in the metadata.


    ### Client authentication


    MongoDB has separate subsystems for *authentication* and *authorization*. Authentication
    can be performed using a built-in authentication method called Salted Challenge
    Response Authentication Mechanism (SCRAM) or via an external authentication system
    that supports Lightweight Directory Access Protocol (LDAP) or Kerberos. With SCRAM,
    users and their credentials are stored encrypted in the admin database (and replicated
    automatically to all members in a deployment).


    Authorization is a subsequent step after authentication is successful, in which
    MongoDB will check the authenticated user’s roles and privileges before allowing
    a command to be run.


    Authorization can be granted at a database or collection level as required. Multiple
    predefined roles'' permissions can be added together to achieve the right mix.


    Note


    x.509 and Kerberos integrations allow only for authentication, and the authorization
    is based on privileges and roles created on the `admin` database. MongoDB Enterprise
    also supports full authorization via LDAP – so that both users and roles are fully
    defined inside an LDAP server.


    #### External authentication


    There are several types of external authentication methods available with MongoDB.
    As of this writing, supported methods include x.509, LDAP, and Kerberos. LDAP
    is a standard directory protocol with many open source and commercial implementations
    such as OpenLDAP, Windows Active Directory, and Apache Directory Server. Kerberos
    is an industry-standard authentication protocol for large client/server systems,
    allowing both the client and server to verify each other’s identities. At the
    time of writing, Kerberos is supported in Windows Active Directory and Apache
    Directory Server.


    Most of these methods require creating a user on the `$external` database and
    defining roles and privileges inside MongoDB. The external source performs only
    the authentication step.


    When using external authentication, it is the MongoDB server which communicates
    with the external authentication service, not the application directly (Figure
    [3-2](#487346_1_En_3_Chapter.xhtml#Fig2)).


    ![../images/487346_1_En_3_Chapter/487346_1_En_3_Fig2_HTML.jpg](images/487346_1_En_3_Chapter/487346_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    Steps and communication for external authentication


    Table [3-1](#487346_1_En_3_Chapter.xhtml#Tab1) lists the supported auth mechanisms
    and how they relate to authentication and authorization behavior. The value for
    configuring the mechanism via `--authenticationMechanism` is shown in brackets.
    Note that even when using Kerberos authentication, you can still use LDAP authorization
    for mapping users to roles.


    Table 3-1


    Different auth mechanisms available


    | Mechanism | Authentication | Authorization |

    | --- | --- | --- |

    | SCRAM (`SCRAM-SHA-256`) | Password encrypted inside MongoDB | Privileges defined
    in MongoDB. |

    | x.509 (`MONGODB-X.509`, external) | User registered but no password in MongoDB.
    Each user has a unique certificate. |

    | LDAP (`PLAIN`, external) | Client sends password, but password is never stored
    in MongoDB. | Privileges defined in MongoDB or works with an LDAP for optional
    authorization (MongoDB Enterprise only). |

    | Kerberos (`GSSAPI`, external) | User registered but no password in MongoDB.
    |


    ## Encrypted connections


    Even if all your MongoDB nodes and applications exist inside the same secure network,
    it’s still a good idea to consider encrypting all communications. This can prevent
    eavesdropping on network traffic to/from your MongoDB deployment and make it easier
    to scale out should you want to migrate later. For example, you may want to gradually
    transition from a fully on-prem setup to a hybrid solution with some nodes hosted
    on a cloud provider.


    For any production use, you should already be considering a multi-data center
    configuration for your MongoDB deployment with physically separated data centers.
    Even with VPNs/VPCs, you will almost always be relying on shared Internet backbones
    between data centers for keeping these components in sync, and so again encrypted
    connections are critical to keep your data safe.


    MongoDB Community edition includes full encryption for data *in transit* using
    TLS/SSL (transport encryption). Since encrypted connections are critical for a
    secure system, recent versions of MongoDB have removed support for older, less
    secure TLS 1.0 systems by default. You can use any valid certificate from an official
    *certificate authority*, or you can build your own *self-signed certificates*
    from scratch using the `openssl` command-line tool. With either approach, the
    data stream will be encrypted, but without the identity validation of having your
    certificates signed by a third-party certificate authority, your communication
    may be vulnerable to a so-called *man-in-the-middle attack* .


    Even when you have configured TLS for your internal MongoDB communications, you
    need to explicitly enable encryption from your application to MongoDB by adding
    `?ssl=true` to the connection string. If you want to require all clients to use
    TLS to be able to connect to your MongoDB server, you can add this to your MongoDB
    configuration:


    ```

    net:

    tls:

    mode:      requireTLS

    ```


    Note


    In MongoDB 4.2 and later, all configuration references were changed from SSL to
    TLS, for example,


    `net.ssl.mode: requireSSL`


    became


    `net.tls.mode: requireTLS`


    In production environments, you should be using valid certificates for all components
    in the MongoDB deployment which have been signed by the *same certificate authority*
    (either an internal organization-wide one or a trusted third-party TLS vendor).'
  trans: "### Keyfiles\n\n密钥文件本质上是一个存储在安全文件中的超长密码，由部署中的每个 `mongod` 节点引用。该密钥文件充当组件之间的“共享密言”，使它们在建立副本集或向现有集添加全新节点时能够进行身份验证。\n\
    \n如果没有这个共享密言，黑客可能将他们控制下的新空节点添加到现有副本集，并触发初始同步。他们将借此搭上 MongoDB 复制架构的便车来复制数据库。\n\n\
    这些文件的内容应视为密码，并在文件系统级别限制读取权限。任何获得其内容的人都可以伪造对副本集的访问，因此这是您部署的最低安全措施。\n\n您可以通过如下所示指定路径并重启服务器，来指示\
    \ MongoDB 要求密钥文件进行内部身份验证：\n\n```yaml\nsecurity:\n  keyFile: /path/secure.key\n\
    ```\n\n请注意，设置密钥文件也会自动启用身份验证。\n\n### x.509 证书\n\n比使用密钥文件更优越但更复杂的方法是为您的服务器和客户端组件创建和部署\
    \ x.509 证书。\n\n在撰写本文时，有一个方便免费的站点叫 Let’s Encrypt，它使得生成可用于 MongoDB 的 x.509 证书变得容易，但要求您的主机具有可公开寻址的\
    \ DNS 主机名。这些证书仅持续 90 天，因此您需要编写脚本来自动生成和更新它们。\n\n虽然 x.509 证书可用于保护 MongoDB 集群组件*内部*通信的安全，但稍有不同的证书格式可用于*应用程序*客户端向集群进行身份验证。如果您选择使用此方法，那么每个连接的的不同用户账户都需要为其创建一个唯一的证书，并将用户名嵌入元数据中。\n\
    \n### Client authentication\n\nMongoDB 具有独立的*身份验证*和*授权*子系统。身份验证可以使用内置的身份验证方法（称为加盐质询响应身份验证机制（SCRAM））执行，也可以通过支持轻量目录访问协议（LDAP）或\
    \ Kerberos 的外部身份验证系统执行。使用 SCRAM 时，用户及其凭据以加密形式存储在 `admin` 数据库中（并自动复制到部署中的所有成员）。\n\
    \n授权是在身份验证成功后的后续步骤，MongoDB 将在允许运行命令之前检查经过身份验证的用户的角色和权限。\n\n可以根据需要，在数据库或集合级别授予授权。可以将多个预定义角色的权限相加以达到正确的组合。\n\
    \n**注意**\n\nx.509 和 Kerberos 集成仅允许身份验证，而授权基于在 `admin` 数据库上创建的权限和角色。MongoDB Enterprise\
    \ 还支持通过 LDAP 进行完整的授权——这样用户和角色都完全在 LDAP 服务器中定义。\n\n#### External authentication\n\
    \nMongoDB 提供了多种类型的外部身份验证方法。截至本文撰写时，支持的方法包括 x.509、LDAP 和 Kerberos。LDAP 是一个标准的目录协议，具有许多开源和商业实现，例如\
    \ OpenLDAP、Windows Active Directory 和 Apache Directory Server。Kerberos 是一个用于大型客户端/服务器系统的行业标准身份验证协议，允许客户端和服务器相互验证对方的身份。在撰写本文时，Windows\
    \ Active Directory 和 Apache Directory Server 支持 Kerberos。\n\n大多数这些方法需要在 `$external`\
    \ 数据库上创建用户，并在 MongoDB 内部定义角色和权限。外部源仅执行身份验证步骤。\n\n使用外部身份验证时，是 MongoDB 服务器与外部身份验证服务通信，而不是应用程序直接通信（图\
    \ 3-2）。\n\n![../images/487346_1_En_3_Chapter/487346_1_En_3_Fig2_HTML.jpg](img/487346_1_En_3_Fig2_HTML.jpg)\n\
    \n**图 3-2**\n\n外部身份验证的步骤和通信\n\n表 3-1 列出了支持的身份验证机制及其与身份验证和授权行为的关系。通过 `--authenticationMechanism`\
    \ 配置机制的值显示在括号中。请注意，即使使用 Kerberos 身份验证，您仍然可以使用 LDAP 授权来将用户映射到角色。\n\n**表 3-1**\n\
    \n可用的不同身份验证机制\n\n| 机制 | 身份验证 | 授权 |\n| :--- | :--- | :--- |\n| SCRAM (`SCRAM-SHA-256`)\
    \ | 密码在 MongoDB 内部加密 | 权限在 MongoDB 中定义。 |\n| x.509 (`MONGODB-X.509`, external)\
    \ | 用户已注册，但 MongoDB 中无密码。每个用户都有一个唯一的证书。 | 权限在 MongoDB 中定义。 |\n| LDAP (`PLAIN`,\
    \ external) | 客户端发送密码，但密码从不存储在 MongoDB 中。 | 权限在 MongoDB 中定义，或与 LDAP 协同工作以进行可选的授权（仅限\
    \ MongoDB Enterprise）。 |\n| Kerberos (`GSSAPI`, external) | 用户已注册，但 MongoDB 中无密码。\
    \ | 权限在 MongoDB 中定义。 |\n\n### Encrypted connections\n\n即使您的所有 MongoDB 节点和应用程序都存在于同一个安全网络中，考虑加密所有通信仍然是一个好主意。这可以防止对进出\
    \ MongoDB 部署的网络流量进行窃听，并使您日后想要迁移时更容易横向扩展。例如，您可能希望逐渐从完全本地部署过渡到部分节点托管在云提供商上的混合解决方案。\n\
    \n对于任何生产用途，您应该已经为 MongoDB 部署考虑采用具有物理分离数据中心的多数据中心配置。即使使用 VPN/VPC，数据中心之间的同步几乎总是依赖于共享的互联网骨干网，因此加密连接对于保持数据安全至关重要。\n\
    \nMongoDB 社区版包含使用 TLS/SSL（传输加密）对*传输中*数据的完整加密。由于加密连接对于安全系统至关重要，最近版本的 MongoDB 默认移除了对较旧、安全性较差的\
    \ TLS 1.0 系统的支持。您可以使用来自官方*证书颁发机构*的任何有效证书，也可以使用 `openssl` 命令行工具从头开始构建自己的*自签名证书*。无论采用哪种方法，数据流都会被加密，但如果没有由第三方证书颁发机构签署的证书进行身份验证，您的通信可能容易受到所谓的*中间人攻击*。\n\
    \n即使您已为内部 MongoDB 通信配置了 TLS，您仍需要通过将 `?ssl=true` 添加到连接字符串来显式启用从应用程序到 MongoDB 的加密。如果您想要求所有客户端都使用\
    \ TLS 才能连接到您的 MongoDB 服务器，可以将此配置添加到您的 MongoDB 配置中：\n\n```yaml\nnet:\n  tls:\n\
    \    mode: requireTLS\n```\n\n**注意**\n\n在 MongoDB 4.2 及更高版本中，所有配置引用都从 SSL 更改为\
    \ TLS，例如：\n\n`net.ssl.mode: requireSSL`\n\n变更为\n\n`net.tls.mode: requireTLS`\n\
    \n在生产环境中，您应该为 MongoDB 部署中的所有组件使用由*同一证书颁发机构*（无论是组织内部的还是受信任的第三方 TLS 供应商）签署的有效证书。"
- fmt: "### TLS 1.2\n\nSome organizations have strict requirements that TLS 1.2 be\
    \ used to encrypt all connections. If this is the case, you can explicitly disable\
    \ TLS 1.0 and 1.1 in MongoDB, by adding the `disabledProtocols` parameter to any\
    \ MongoDB server with SSL/TLS already enabled:\n\n```yaml\nnet:\n  tls:\n    disabledProtocols:\
    \ TLS1_0,TLS1_1\n```\n\nIn many of the drivers, you can also force TLS 1.2 for\
    \ outgoing application connections. For example, with the Java driver you can\
    \ enforce TLS 1.2 by building a connection with the following code:\n\n```java\n\
    SSLContext sslContext = SSLContext.getInstance(\"TLSv1.2\");\nMongoClientOptions\
    \ options = MongoClientOptions.builder()\n    .sslEnabled(true)\n    .sslInvalidHostNameAllowed(true)\n\
    \    .socketFactory(sslContext.getSocketFactory())\n    .build();\n```\n\n## Encryption\
    \ at rest\n\nBy default, MongoDB stores its data on disk in the form of WiredTiger\
    \ binary files compressed by snappy. If an unauthorized party were to gain access\
    \ to these files (or a backup of them) with no encryption, they could easily launch\
    \ their own local MongoDB process pointing to those files and launch a database,\
    \ with all authentication disabled. Then any MongoDB client could connect to browse\
    \ or query that data.\n\nTo protect against this sort of attack, any MongoDB database\
    \ containing real user data should be encrypting data at rest.\n\nData-at-rest\
    \ encryption can be solved with either of the following approaches:\n\n1.  Encrypt\
    \ the volume\n2.  Encrypt from the application\n\nThe first item can be solved\
    \ with disk encryption on the filesystem. If you are self-hosting on a major cloud\
    \ provider, you should have access to a filesystem-level encryption which leverages\
    \ the built-in master key management services.\n\nAlternatively, all recent enterprise\
    \ Linux versions include full-disk encryption solutions such as Linux Unified\
    \ Key Setup-on-disk-format (or LUKS). This also employs a master key for encrypting\
    \ entire storage volumes or a subset. You should store your MongoDB data files\
    \ on a separate volume to the root partition (to allow targeted performance tuning),\
    \ and this also makes filesystem-level encryption a practical option.\n\nHowever,\
    \ if you don’t want to encrypt at the volume level, then encryption inside the\
    \ database server itself is the other option.\n\nLuckily encryption at rest is\
    \ an optional module for the Enterprise version of MongoDB. This encryption process\
    \ happens completely automatically. Only encrypted data is ever written to disk,\
    \ while unencrypted data is available only inside the host’s memory.\n\n> **Note**\n\
    >\n> Any core/memory dumps when an application crashes may contain unencrypted\
    \ MongoDB data, so be careful when sharing dumps with third parties.\n\nBy configuring\
    \ encryption with an external master key and proper key rotation using a third-party\
    \ Key Management Interoperability Protocol (KMIP)-compatible key management application,\
    \ most data privacy compliance regulations will be satisfied.\n\n### Backups\n\
    \nYou should not forget to ensure that any backups taken are also encrypted and\
    \ stored securely. When using `mongodump` for backups, you could write to an encrypted\
    \ volume. If you are using Ops Manager for backups, then a KMIP-compatible key\
    \ server is required for snapshots to be encrypted.\n\n### Auditing, obfuscation\
    \ of logs\n\nSince MongoDB 2.6, the Enterprise version of MongoDB has included\
    \ an auditing feature. When enabled on the `mongod` or `mongos` instances, this\
    \ allows database administrators to track all key changes to complex deployments.\
    \ These audit logs can be critical when performing a postmortem after any sort\
    \ of security event, or as part of regular compliance checks. In these situations,\
    \ the audit log could show any changes to users’ roles, new users created, or\
    \ unexpected access to production databases.\n\nThere is no equivalent Community\
    \ version of this auditing functionality, although third parties have created\
    \ solutions that replicate some basic features, including filtering output to\
    \ particular users, database, collection, or source location.\n\nThe audit log\
    \ functionality needs to be explicitly enabled in the MongoDB configuration file\
    \ and can be piped to a file, the console, or to a compatible `syslog` destination\
    \ for eventually storage on a centralized log server for added security. Once\
    \ activated it will, by default, record a log entry for every change action by\
    \ any user in the deployment. Filters can also be configured to streamline the\
    \ audit log.\n\nAn example of a simple configuration is shown in Listing [3-3](#487346_1_En_3_Chapter.xhtml#PC15).\n\
    \n```yaml\nauditLog:\n  destination: file\n  format: BSON\n  path: /var/lib/mongodb/auditLog.bson\n\
    \  # Listing 3-3\n  # Enables audit logging in BSON format\n```\n\nStoring the\
    \ audit log on the same filesystem as the node and its data has considerable drawbacks.\
    \ For example, the log file needs to have read/write permissions by the mongod\
    \ process. Should the server be compromised by an external hacker or even a staff\
    \ member with credentials, they could cover their tracks by removing evidence\
    \ from the `auditLog.bson` file or deleting the file completely to make post-mortems\
    \ impossible.\n\nAnother approach would be to pipe auditing logs through syslog\
    \ and install a *log processing system* such as rsyslog which can handle different\
    \ log generating sources and output them into different outputs. This would involve\
    \ setting up a *Rsyslog client* on the MongoDB host machine and a centralized\
    \ *Rsyslog server* which accepts log messages from every host in your deployment\
    \ via an open TCP port. From the MongoDB side, this requires changing the configuration\
    \ settings to\n\n```yaml\nauditLog:\n  destination: syslog\n```\n\n![../images/487346_1_En_3_Chapter/487346_1_En_3_Fig3_HTML.jpg](images/487346_1_En_3_Chapter/487346_1_En_3_Fig3_HTML.jpg)\n\
    *Figure 3-3 Auditing log messages sent to a centralized host*\n\n> **Note**\n\
    >\n> A separate MongoDB deployment is actually a possible output destination for\
    \ `rsyslog` and can be a great option for centralizing logging from complex application\
    \ deployments, but it’s probably better to keep MongoDB audit logs in a completely\
    \ separate architecture to avoid tampering of audit trails.\n\nBy default, log\
    \ files are neither encrypted nor obfuscated, but there is another Enterprise\
    \ feature for redacting possible user data bleeding into the log files. To enable\
    \ this set\n\n```yaml\nsecurity:\n  redactClientLogData: true\n```\n\nin the config\
    \ file, or enable at runtime with\n\n```javascript\ndb.adminCommand(\n  { setParameter:\
    \ 1, redactClientLogData : true | false }\n)\n```\n\n### Proactive security\n\n\
    For any secure network, you should already have in place regular physical and\
    \ environmental security reviews, vulnerability scanning, penetration testing,\
    \ and automatic alerting of abnormal traffic patterns on network of virtual machines.\
    \ This should allow for quick intervention for any security breaches.\n\nMongoDB\
    \ supports most versions for about 2 years after release, with regular security\
    \ patches. You should quickly upgrade to any minor releases (such as from 4.2.8\
    \ to 4.2.9) since these often include security improvements but never introduce\
    \ breaking compatibility changes. You could also consider moving to the latest\
    \ major version upgrade within 6 months of release to benefit from other major\
    \ security and stability improvements.\n\nYou could also monitor [`www.mongodb.com/alerts`](http://www.mongodb.com/alerts)\
    \ where critical alerts and advisories will be posted.\n\n### Server-side JavaScript"
  raw: '### TLS 1.2


    Some organizations have strict requirements that TLS 1.2 be used to encrypt all
    connections. If this is the case, you can explicitly disable TLS 1.0 and 1.1 in
    MongoDB, by adding the `disabledProtocols` parameter to any MongoDB server with
    SSL/TLS already enabled:


    ```

    net:

    tls:

    disabledProtocols: TLS1_0,TLS1_1

    ```


    In many of the drivers, you can also force TLS 1.2 for outgoing application connections.
    For example, with the Java driver you can enforce TLS 1.2 by building a connection
    with the following code:


    ```

    SSLContext sslContext = SSLContext.getInstance("TLSv1.2");

    MongoClientOptions options = MongoClientOptions.builder()

    .sslEnabled(true)

    .sslInvalidHostNameAllowed(true)

    .socketFactory(sslContext.getSocketFactory())

    .build();

    ```


    ## Encryption at rest


    By default, MongoDB stores its data on disk in the form of WiredTiger binary files
    compressed by snappy. If an unauthorized party were to gain access to these files
    (or a backup of them) with no encryption, they could easily launch their own local
    MongoDB process pointing to those files and launch a database, with all authentication
    disabled. Then any MongoDB client could connect to browse or query that data.


    To protect against this sort of attack, any MongoDB database containing real user
    data should be encrypting data at rest.


    Data-at-rest encryption can be solved with either of the following approaches:


    1.  Encrypt the volume


    2.  Encrypt from the application


    The first item can be solved with disk encryption on the filesystem. If you are
    self-hosting on a major cloud provider, you should have access to a filesystem-level
    encryption which leverages the built-in master key management services.


    Alternatively, all recent enterprise Linux versions include full-disk encryption
    solutions such as Linux Unified Key Setup-on-disk-format (or LUKS). This also
    employs a master key for encrypting entire storage volumes or a subset. You should
    store your MongoDB data files on a separate volume to the root partition (to allow
    targeted performance tuning), and this also makes filesystem-level encryption
    a practical option.


    However, if you don’t want to encrypt at the volume level, then encryption inside
    the database server itself is the other option.


    Luckily encryption at rest is an optional module for the Enterprise version of
    MongoDB. This encryption process happens completely automatically. Only encrypted
    data is ever written to disk, while unencrypted data is available only inside
    the host’s memory.


    Note


    Any core/memory dumps when an application crashes may contain unencrypted MongoDB
    data, so be careful when sharing dumps with third parties.


    By configuring encryption with an external master key and proper key rotation
    using a third-party Key Management Interoperability Protocol (KMIP)-compatible
    key management application, most data privacy compliance regulations will be satisfied.


    ### Backups


    You should not forget to ensure that any backups taken are also encrypted and
    stored securely. When using `mongodump` for backups, you could write to an encrypted
    volume. If you are using Ops Manager for backups, then a KMIP-compatible key server
    is required for snapshots to be encrypted.


    ## Auditing, obfuscation of logs


    Since MongoDB 2.6, the Enterprise version of MongoDB has included an auditing
    feature. When enabled on the `mongod` or `mongos` instances, this allows database
    administrators to track all key changes to complex deployments. These audit logs
    can be critical when performing a postmortem after any sort of security event,
    or as part of regular compliance checks. In these situations, the audit log could
    show any changes to users’ roles, new users created, or unexpected access to production
    databases.


    There is no equivalent Community version of this auditing functionality, although
    third parties have created solutions that replicate some basic features, including
    filtering output to particular users, database, collection, or source location.


    The audit log functionality needs to be explicitly enabled in the MongoDB configuration
    file and can be piped to a file, the console, or to a compatible `syslog` destination
    for eventually storage on a centralized log server for added security. Once activated
    it will, by default, record a log entry for every change action by any user in
    the deployment. Filters can also be configured to streamline the audit log.


    An example of a simple configuration is shown in Listing [3-3](#487346_1_En_3_Chapter.xhtml#PC15).


    ```

    auditLog:

    destination: file

    format: BSON

    path: /var/lib/mongodb/auditLog.bson

    Listing 3-3

    Enables audit logging in BSON format

    ```


    Storing the audit log on the same filesystem as the node and its data has considerable
    drawbacks. For example, the log file needs to have read/write permissions by the
    mongod process. Should the server be compromised by an external hacker or even
    a staff member with credentials, they could cover their tracks by removing evidence
    from the `auditLog.bson` file or deleting the file completely to make post-mortems
    impossible.


    Another approach would be to pipe auditing logs through syslog and install a *log
    processing system* such as **rsyslog** which can handle different log generating
    sources and output them into different outputs. This would involve setting up
    a *Rsyslog client* on the MongoDB host machine and a centralized *Rsyslog server*
    which accepts log messages from every host in your deployment via an open TCP
    port. From the MongoDB side, this requires changing the configuration settings
    to


    ```

    auditLog:

    destination: syslog

    ```


    ![../images/487346_1_En_3_Chapter/487346_1_En_3_Fig3_HTML.jpg](images/487346_1_En_3_Chapter/487346_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Auditing log messages sent to a centralized host


    Note


    A separate MongoDB deployment is actually a possible output destination for `rsyslog`
    and can be a great option for centralizing logging from complex application deployments,
    but it’s probably better to keep MongoDB audit logs in a completely separate architecture
    to avoid tampering of audit trails.


    By default, log files are neither encrypted nor obfuscated, but there is another
    Enterprise feature for redacting possible user data bleeding into the log files.
    To enable this set


    ```

    security:

    redactClientLogData: true

    ```


    in the config file, or enable at runtime with


    ```

    db.adminCommand(

    { setParameter: 1, redactClientLogData : true | false }

    )

    ```


    ### Proactive security


    For any secure network, you should already have in place regular physical and
    environmental security reviews, vulnerability scanning, penetration testing, and
    automatic alerting of abnormal traffic patterns on network of virtual machines.
    This should allow for quick intervention for any security breaches.


    MongoDB supports most versions for about 2 years after release, with regular security
    patches. You should quickly upgrade to any minor releases (such as from 4.2.8
    to 4.2.9) since these often include security improvements but never introduce
    breaking compatibility changes. You could also consider moving to the latest major
    version upgrade within 6 months of release to benefit from other major security
    and stability improvements.


    You could also monitor [`www.mongodb.com/alerts`](http://www.mongodb.com/alerts)
    where critical alerts and advisories will be posted.


    ## Server-side JavaScript'
  trans: "\n### TLS 1.2\n\n一些组织有严格的规定，要求使用 TLS 1.2 加密所有连接。如果是这种情况，你可以通过在任何已启用 SSL/TLS\
    \ 的 MongoDB 服务器上添加 `disabledProtocols` 参数来显式禁用 TLS 1.0 和 1.1：\n\n```yaml\nnet:\n\
    \  tls:\n    disabledProtocols: TLS1_0,TLS1_1\n```\n\n在许多驱动程序中，你也可以强制传出应用连接使用\
    \ TLS 1.2。例如，使用 Java 驱动程序，你可以通过以下代码构建连接来强制执行 TLS 1.2：\n\n```java\nSSLContext sslContext\
    \ = SSLContext.getInstance(\"TLSv1.2\");\nMongoClientOptions options = MongoClientOptions.builder()\n\
    \    .sslEnabled(true)\n    .sslInvalidHostNameAllowed(true)\n    .socketFactory(sslContext.getSocketFactory())\n\
    \    .build();\n```\n\n## 静态加密\n\n默认情况下，MongoDB 将其数据以 snappy 压缩的 WiredTiger 二进制文件形式存储在磁盘上。如果未经授权的一方访问到这些文件（或其备份）且没有加密，他们可以轻松启动自己的本地\
    \ MongoDB 进程指向这些文件并启动一个禁用了所有认证的数据库。然后任何 MongoDB 客户端都可以连接以浏览或查询该数据。\n\n为了防止此类攻击，任何包含真实用户数据的\
    \ MongoDB 数据库都应对静态数据进行加密。\n\n静态数据加密可以通过以下两种方法之一解决：\n\n1.  加密卷\n2.  从应用程序加密\n\n\
    第一项可以通过文件系统上的磁盘加密来解决。如果你在主流云提供商上自托管，你应该能够访问利用内置主密钥管理服务的文件系统级加密。\n\n或者，所有近期的企业版\
    \ Linux 发行版都包含全盘加密解决方案，例如 Linux 统一密钥设置磁盘格式（或 LUKS）。这也使用主密钥来加密整个存储卷或其子集。你应该将 MongoDB\
    \ 数据文件存储在与根分区不同的卷上（以便进行针对性的性能调优），这也使得文件系统级加密成为一个实用的选择。\n\n但是，如果你不想在卷级别加密，那么在数据库服务器内部加密是另一个选择。\n\
    \n幸运的是，静态加密是 MongoDB 企业版的一个可选模块。此加密过程完全自动进行。只有加密数据才会被写入磁盘，而未加密数据仅在主机的内存中可用。\n\n\
    > **注意**\n>\n> 应用程序崩溃时的任何核心/内存转储都可能包含未加密的 MongoDB 数据，因此在与第三方共享转储时要小心。\n\n通过使用外部主密钥配置加密，并使用兼容密钥管理互操作协议（KMIP）的第三方密钥管理应用程序进行适当的密钥轮换，可以满足大多数数据隐私合规性法规的要求。\n\
    \n### 备份\n\n你不应忘记确保所有创建的备份也已加密并安全存储。使用 `mongodump` 进行备份时，你可以写入到加密卷。如果使用 Ops Manager\
    \ 进行备份，则需要兼容 KMIP 的密钥服务器才能对快照进行加密。\n\n### 审计、日志混淆\n\n自 MongoDB 2.6 起，企业版 MongoDB\
    \ 已包含审计功能。在 `mongod` 或 `mongos` 实例上启用后，这允许数据库管理员跟踪复杂部署中的所有关键更改。在发生任何安全事件后进行事后分析或作为定期合规性检查的一部分时，这些审计日志可能至关重要。在这些情况下，审计日志可以显示用户角色的任何更改、创建的新用户或对生产数据库的意外访问。\n\
    \n社区版没有此审计功能的等效功能，尽管第三方已创建了一些解决方案，复制了一些基本功能，包括将输出过滤到特定用户、数据库、集合或源位置。\n\n审计日志功能需要在\
    \ MongoDB 配置文件中显式启用，并且可以输出到文件、控制台或兼容的 `syslog` 目标，以便最终存储在集中式日志服务器上以增加安全性。激活后，默认情况下，它将为部署中任何用户的每个更改操作记录一个日志条目。也可以配置过滤器以简化审计日志。\n\
    \n清单 3-3 显示了一个简单配置的示例。\n\n```yaml\nauditLog:\n  destination: file\n  format: BSON\n\
    \  path: /var/lib/mongodb/auditLog.bson\n  # 清单 3-3\n  # 启用 BSON 格式的审计日志记录\n```\n\
    \n将审计日志存储在节点及其数据的同一文件系统上有相当大的缺点。例如，日志文件需要具有 mongod 进程的读/写权限。如果服务器被外部黑客甚至拥有凭据的员工攻破，他们可以通过从\
    \ `auditLog.bson` 文件中删除证据或完全删除文件来掩盖他们的痕迹，从而使事后分析变得不可能。\n\n另一种方法是将审计日志通过 syslog\
    \ 管道输出，并安装一个 *日志处理系统*，例如 rsyslog，它可以处理不同的日志生成源并将其输出到不同的目的地。这需要在 MongoDB 主机机器上设置一个\
    \ *Rsyslog 客户端* 和一个集中式的 *Rsyslog 服务器*，该服务器通过开放的 TCP 端口接受来自部署中每个主机的日志消息。从 MongoDB\
    \ 端，这需要将配置设置更改为\n\n```yaml\nauditLog:\n  destination: syslog\n```\n\n![../images/487346_1_En_3_Chapter/487346_1_En_3_Fig3_HTML.jpg](img/487346_1_En_3_Fig3_HTML.jpg)\n\
    *图 3-3 审计日志消息发送到集中式主机*\n\n> **注意**\n>\n> 一个独立的 MongoDB 部署实际上是 `rsyslog` 的一个可能输出目标，并且可以是集中来自复杂应用程序部署日志的一个很好选择，但最好将\
    \ MongoDB 审计日志保存在完全独立的架构中，以避免审计跟踪被篡改。\n\n默认情况下，日志文件既不加密也不混淆，但企业版还有另一个功能，可以对可能泄露到日志文件中的用户数据进行编辑。要启用此功能，请在配置文件中设置\n\
    \n```yaml\nsecurity:\n  redactClientLogData: true\n```\n\n或者在运行时通过以下命令启用：\n\n\
    ```javascript\ndb.adminCommand(\n  { setParameter: 1, redactClientLogData : true\
    \ | false }\n)\n```\n\n### 主动安全\n\n对于任何安全网络，你应该已经建立了定期的物理和环境安全审查、漏洞扫描、渗透测试以及对网络或虚拟机异常流量模式的自动警报。这应该能够对任何安全漏洞进行快速干预。\n\
    \nMongoDB 在发布后支持大多数版本大约 2 年，并提供定期的安全补丁。你应该快速升级到任何次要版本（例如从 4.2.8 到 4.2.9），因为这些版本通常包含安全改进，但绝不会引入破坏兼容性的更改。你也可以考虑在最新主要版本发布后的\
    \ 6 个月内升级到该版本，以受益于其他重大的安全和稳定性改进。\n\n你还可以监控 [`www.mongodb.com/alerts`](http://www.mongodb.com/alerts)，关键警报和公告将会发布在那里。\n\
    \n### 服务器端 JavaScript\n"
- fmt: '### Input validation and injection attacks


    Since MongoDB is based around JSON documents, there is no risk from traditional
    `SQL` `injection attacks`. However, there is a possibility of `JSON injection
    attacks` especially when running JavaScript/NodeJS web applications (like the
    Mongoose ORM) or APIs. Imagine an API which accepts a JSON document as part of
    a query. If this query were to be passed directly to a MongoDB `find` query, a
    malicious user might be able to use tricks of MongoDB query language to query
    data belonging to other users, known as “object injection.” Known attacks use
    a combination of `$not` and `$ne` to bypass normal checks.


    Imagine that you had a login screen that accepted a web browser input in the form:

    ```

    {user: ''nic'', password; ''123''}

    ```

    And this was passed directly into a query such as

    ```

    db.users.findOne(query)

    ```

    If this `findOne` returned a result, we have authenticated the user and loaded
    their data in one step. Clever approach to reduce a round-trip to the server?
    No. If a hacker were to send instead

    ```

    {user: ''nic'', password: {$ne: ''''}}

    ```

    or

    ```

    {user: ''nic'', password: {$gt: ''''}}

    ```

    this would also return a document to the `findOne` query without the hacker having
    to even attempt to guess my password. Of course, this sort of attack does not
    just apply to reading unauthorized data. Even inserts and updates into a database
    from applications that don’t validate JSON data could be possible.


    Therefore, for application designers accepting JSON documents in API queries,
    it is critical to validate such documents and extract values in their expected
    data type.


    For NodeJS, there are some libraries such as `Joi` which can help. Other options
    include using `JSON.parse`, using an `npm` package like `mongo-sanitize`, or manually
    removing any dollar signs or curly brackets in API input before using the data.


    ### $where operator


    The `$where` operator is an old `find` query feature which lets you pass either
    a string containing a JavaScript expression or a full JavaScript function to the
    query subsystem. Obviously allowing JavaScript commands to be passed to the internal
    JavaScript engine included in MongoDB is dangerous, especially if there’s a risk
    that this could come from unvalidated user input.


    There have been various security improvements and limitations added to restrict
    its impact, but the bottom line is that this is a very dangerous feature and almost
    every original use case can be handled by other more recent, performant, secure
    MongoDB functions.


    Even in the latest versions of MongoDB, this option is enabled by default, but
    we recommend that you disable it in all deployments by adding

    ```

    security:

    javascriptEnabled: false

    ```

    to your configuration file or using the `--noscripting` command-line option. This
    will also disable the old `mapReduce` and `db.collection.group` function – both
    of which can be replaced in your application with the use of the `aggregation
    pipeline`.


    Note


    If you have `SELinux` enabled, you should definitely disable server-side JavaScript
    since attempts to run any operations requiring JavaScript will result in MongoDB
    segmentation fault.


    ### SELinux


    Security-Enhanced Linux (also known as `SELinux`) is a Linux module that provides
    a mechanism for supporting access control security policies, such as mandatory
    access controls. Once enabled, `SELinux` can prevent any individual program/service
    on a Linux host from compromising the entire system by limiting access to certain
    preapproved directories, files, and network ports.


    When setting up MongoDB, you can run `SELinux` in two different modes. `Permissive`
    mode is good for debugging your configuration as it will allow MongoDB to attempt
    all accesses, but will log every attempt. Once you switch `SELinux` into `enforcing`
    mode, it will block any unauthorized access and possibly prevent your MongoDB
    instance from behaving as expected.


    You can check the current mode by running `getenforce` or see a full status with
    `sestatus`. In order to make enforcing the default mode on system start, you will
    normally just need to edit the `/etc/selinux/config` file.


    When MongoDB is installed via the prepackaged RPM files, there are certain standard
    directories used for storing data and log files:


    *   `/var/lib/mongo` (the data directory)

    *   `/var/log/mongodb` (the log directory)


    The default `SELinux` configuration for MongoDB that is included in Red Hat Enterprise
    Linux 7 (and its forks) assumes these same directories, so if you chose to configure
    your MongoDB to store data or logs in a different location, you will have to manually
    update the `SELinux` permissions with a series of commands. For example, if you
    want to store your data in a new partition `/data/mongodb`, you would need to
    run the following commands to allow MongoDB to launch and function correctly:

    ```

    semanage fcontext -a -t mongod_var_lib_t ''/data/mongodb.*''

    chcon -Rv -u system_u -t mongod_var_lib_t ''/data/mongodb''

    restorecon -R -v ''/data/mongodb''

    ```

    Similarly, to use a nonstandard port for binding, you would need to run:

    ```

    semanage port -a -t mongod_port_t -p tcp

    ```

    If `SELinux` prevents your MongoDB instance from starting correctly, it will log
    all details in a custom format into a local `/var/log/audit/audit.log` file. If
    you hit any problems when configuring your MongoDB with `SELinux` enforcing, there
    are a few tools and commands that can help explain the problem based on this `audit.log`.


    `audit2allow` can help generate a new set of `SELinux` policies which you can
    introduce with a higher priority than the defaults to override these included
    policies.


    Alternatively, running

    ```

    sudo sealert -a /var/log/audit/audit.log

    ```

    will activate the `setroubleshoot` client tool and usually give some useful insights
    and recommendations for `SELinux` config changes.


    It’s really worth going to the extra trouble to enable `SELinux` and get your
    MongoDB production instance running in enforcing mode. If possible, stick with
    default ports and directory paths since keeping these standards will also help
    new team members to onboard and simplify any later troubleshooting.


    ### Binary monitoring


    There are a few solutions designed to add an extra layer of protection to critical
    applications running in sensitive enterprises like banks or hospitals. These tools
    manipulate the binary code and replace certain operations (like memory allocation)
    with their own functions. The idea is to monitor and prevent certain vectors of
    attacks. Companies such as `Imperva` have tools that claim to be compatible with
    MongoDB, but my limited experience with these tools is that they can add instability
    and the extra protection promised is hard to quantify.


    ### Certification


    The `ISO/IEC 27000` family of standards helps organizations keep information assets
    secure. `ISO/IEC 27001` in particular specifies a set of best practices and details
    a list of security controls concerning the management of information risks.


    While the 27001 Standard does not mandate specific information security controls,
    the framework and checklist of controls it lays out allow companies to ensure
    a comprehensive and continually improving model for security management.


    Another popular framework is Payment Card Industry Data Security Standard (`PCI
    DSS`). Even if you are not storing credit card data, the core requirements are
    a good checklist of security activities.


    If your data is particularly sensitive, your organization should consider certifying
    your security practices. `MongoDB Inc.`''s certifications and whitepapers for
    `Atlas` are a useful reference at [`www.mongodb.com/cloud/trust`](http://www.mongodb.com/cloud/trust).'
