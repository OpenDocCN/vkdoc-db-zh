    ### 9. 备份与恢复


    本章涵盖与拓扑设计相关的备份决策。我们将探讨 MongoDB 自身的企业工具，用于对分片集群执行时间点恢复，以及使用脚本对地理分布的集群进行快照，并将备份数据保留在数据来源国内以符合
    GDPR 要求。


    #### 目标


    进行备份的主要动机是什么？以下是现实世界中最常见的一些备份用途：


    *   回滚因 `开发人员` 错误而进行的更改。这可能是一个在测试中被遗漏的应用程序错误，并且已经开始在整个部署级别损坏数据。


    *   回滚因 `客户` 错误而进行的更改。在多租户系统中，可能有客户删除了一些数据，然后意识到这些数据仍然需要。有时可能只需要恢复单个数据库或集合。


    *   回滚因 `管理员` 错误而进行的更改。数据库管理员可能意外删除了整个集合，误以为他们连接的是测试/暂存集群。


    *   发生全站灾难，生产数据库和所有服务器已完全丢失。在这种情况下，异地备份对于恢复运营至关重要。


    *   使用生产系统的最新备份来更新暂存或开发数据库，以便可以在真实、近期的数据上进行测试。


    在以上所有情况下，备份都需要反映数据库的一致状态。我们不希望捕获数据文件的快照，其中写入操作仅部分刷写到磁盘，或者写入操作仅部分完成。


    大多数组织会定义一个 `恢复点目标` (RPO) 和一个 `恢复时间目标` (RTO) 以确保业务连续性。RPO 是可能丢失的数据更改的时间量。如果我们每
    12 小时进行一次备份快照，那么最多可能丢失最近 12 小时的数据。RTO 是从灾难发生到数据库能够从备份完全恢复功能所允许的最大时间。某些备份/恢复方法可以比其他方法实现更快的恢复。


    #### 避免恢复


    虽然拥有备份并能够恢复大型、地理分布的分片集群至关重要，但在灾难后使它们重新上线总是很复杂的。我们应尽可能避免人为错误导致此类活动。


    '
- fmt: '# Testing environments


    One way to reduce errors is to have thorough unit and integration testing of the
    application. From a topology perspective, we can help by having proper development
    (`DEV`) and user acceptance testing or staging (`UAT`) environments. These should
    closely match the production (`PROD`) environments in terms of operating system
    version and security configuration and use the same MongoDB versions as production.


    Both `DEV` and `UAT` can have less capacity in terms of CPU and memory resources,
    and the size of test data should be scaled down in a similar ratio from `PROD`.
    The `UAT` environment should match production topology at least in terms of the
    number of shards, config servers, and how collections are sharded.


    For example, as shown in Table 9-1, if you have a `PROD` cluster with 6TB of data
    in three shards, each host having 256GB RAM, you could create a `UAT` environment
    with three shards but only 64GB of RAM per host, and 1/4 the amount of data, so
    about 1.5TB. This should keep a similarly proportional working set in memory to
    more closely match performance impact.


    Table 9-1: An example of scaled `UAT` and `DEV` based on `PROD` sizing


    |   | Topology | Resources | Data |

    | --- | --- | --- | --- |

    | `PROD` | 3-shard cluster | 32 cores, 256GB RAM per host | 6TB total |

    | `UAT/Staging` | 3-shard cluster | 8 cores, 64GB RAM per host | 1.5TB total |

    | `DEV` | single-shard cluster | 8 cores, 32GB RAM per host | 250GB total (1/3
    shards, and 1/2 RAM of `UAT`) |


    > **Note**

    >

    > If you need to achieve very specific performance targets in production, the
    `UAT` environment should match resources exactly and restore recent backups to
    use real data in performance testing.


    ## Catching application errors


    `DEV` environments can be more simplistic in terms of sharding and redundancy.
    You could potentially have only a single-shard with a three-node replica set even
    when `PROD` is a multi-shard cluster with five-node replica sets.


    `DEV` should be able to simulate both replica-set failovers and interactions with
    a `mongos`, so a standalone node is not sufficient. By testing application changes
    first in `DEV`, it should be possible to pick up bugs which could corrupt or delete
    valid data and avoid the need for cluster-wide rollbacks via a restore from backup.


    ## Catching configuration errors


    Major cluster changes like sharding new collections and adding indexes and any
    sort of configuration changes are prone to risks and so should first be run in
    `UAT`. By having the same number of shards in `UAT`, a database administrator
    can test shard tags, zoning, pre-splitting, and migration impact in an environment
    functionally identical to `PROD`.


    # Non-sharded clusters


    Backing up of single-node or single replica sets is relatively straightforward
    since there is a single node taking writes. Sharded clusters are more complex
    since there are multiple primaries accepting writes, and chunks of documents may
    be migrated between shards at any moment.


    > **Note**

    >

    > As we discussed in Chapter 1, a standalone node should never be used in production
    since it provides absolutely no resilience. However, there are cases where MongoDB
    is being used for local development or research, and in those cases, you may want
    to take a snapshot of the data at a particular point in time.


    There are three general approaches for simple backups that apply to standalone
    nodes or replica sets:


    1.  **Stop the node**, and take a copy of all files in the data path, which could
    take minutes or hours.

    2.  **Lock the node** with `db.fsyncLock()`, and take a filesystem snapshot which
    requires a logical volume system like `LVM` and then unlock after a few seconds.

    3.  Keep **all nodes online**, and run `mongodump` to take a copy of the data,
    metadata (but not the indexes themselves), and the `oplog`.


    ## Full copy


    A full copy with the node stopped is the simplest and fastest to restore. If you
    have sufficient disk space to take a full copy of the `dbpath`, you will have
    a snapshot of all data and indexes. If you ever need to roll back to that point
    in time, you can launch a new `mongod` process with the `--dbpath` parameter pointing
    to this data and you have an instant restoration.


    Since the data files are already compressed by default, any additional compression
    of this copy is unlikely to give noticeable additional space savings and will
    only require more time to decompress at restore time, further delaying the restoration.


    ## Taking snapshots


    The next approach is to take a clean filesystem snapshot. This approach requires
    a storage volume using the Linux *Logical Volume Manager* (`LVM`). With `LVM`,
    you can build a large volume group (`VG`) backed by multiple smaller physical
    volumes, optionally with a `RAID` level that gives some additional performance
    and redundancy. Then you can define a logical volume for your MongoDB node’s data
    path, leaving some unallocated space that can be used for snapshots.


    `LVM` allows you to take snapshots of the volume. You can take multiple incremental
    snapshots over time, with only the changed blocks (known as the delta) requiring
    storage space. You could keep 6-hourly or daily snapshots of a node requiring
    only a fraction of the physical storage space as taking full independent copies.


    This same concept is used by *Elastic Block Store* (`EBS`) snapshots on Amazon
    `AWS`. Similar snapshots are also available on all major cloud providers. `EBS`
    snapshots are stored in the same cloud region as the original storage volume.
    If you have created a geopolitically sharded cluster to abide by global data protection
    regulations, your snapshots of customer data will naturally reside within the
    same country/region as the live data. You should still encrypt cloud backups to
    further ensure that `GDPR` and other regulation’s duty of care clauses are satisfied.
    See Chapter 4 for more details on legal regulations.


    ### Flush disks


    The prerequisite step in MongoDB prior to taking a snapshot is very simple. You
    need to connect to the node via Mongo shell or a script and issue `db.fsyncLock()`
    before initiating the snapshot. This ensures that any pending disk flushes are
    made, and the state on disk is perfectly clean, just as if you had performed a
    clean shutdown of the node. However, at this point MongoDB is locked for any new
    write operations, so we want to avoid this for even very short periods in a production
    environment.


    ### Trigger snapshot


    Next, the snapshot can be triggered (but not necessarily completed), and then
    you can immediately issue `db.fsyncUnlock()` with the same Mongo shell. This removes
    the locks and allows writes again. Both `LVM` and `EBS` snapshots can then complete
    in their own time since they will reflect the point in time when the snapshot
    was triggered and the MongoDB data files were in a clean state.


    ### Restoring snapshots


    The major downside of this approach is that **restoring data files can be slow**.
    Since we are taking incremental backups to save space, restoring a particular
    snapshot requires combining the original state with the change deltas. Depending
    on the exact system you use, how often you trigger backups, and how frequently
    you update old documents, this could take anywhere between minutes and hours for
    terabytes of data.


    If you are relying on these backups as a disaster recovery method, you need to
    perform realistic testing of the restore times to ensure that you can retrieve
    a recent backup within the required internal service-level agreement (`SLA`) time
    such as an `RTO`.'
