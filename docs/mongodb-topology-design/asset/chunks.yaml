- fmt: '## Single data center


    In a single data center topology, we have limited options, but we can maximize
    availability by building our replica sets with more than three members. For example,
    we might build our replica sets using seven members.


    We can add extra safeguards by putting each node on its own physical host. Each
    node''s host should be put on its own rack preferably on a different power circuit,
    with separate backup power.


    Warning


    Nodes on different VMs but on the same underlying VM host will fail together if
    a single hardware failure occurs on the VM host.


    Each physical host should have `redundant networking`. This could be achieved
    with `network bonding` (also known as `link aggregation`). There are many different
    modes available, including a round-robin balancer which provides load balancing
    and Active-Backup which provides only fault tolerance. In most modern Linux flavors,
    this can be enabled with `modprobe` and on Debian with `ifenslave`. You should
    confirm with your network administrator to ensure that your network switches have
    support for network bonding.


    Avoid using `shared network storage` solutions for the data volumes on MongoDB
    nodes. This approach means that the data for all replica set members is actually
    storage on the same storage solution. It''s safer to use fast storage like `NVMe`
    drives, local to each host.


    `Backups` should be taken as often as possible and stored on a secure cloud provider
    in an encrypted state. If using MongoDB Enterprise, Ops Manager can provide continuous
    backup with point-in-time restores.


    You should regularly test `restoring` from backups, to confirm the workflow and
    ensure that a cluster can be restored within the recovery time objective (`RTO`).


    In general, however, a single data center is too risky for any production use
    cases. Regional power failure will always cause downtime, and a fire could easily
    cause complete data loss.


    ## Two data centers


    With two data centers, you have the opportunity to keep at least one data-bearing
    node in each data center. In Figure 5-5, we see a `PSS` or `PS|S` (Primary–Secondary–Secondary)
    topology distributed over two data centers. Now in case of a complete data center
    failure, there is a complete up-to-date copy of the entire database.


    ![../images/487346_1_En_5_Chapter/487346_1_En_5_Fig5_HTML.jpg](images/487346_1_En_5_Chapter/487346_1_En_5_Fig5_HTML.jpg)


    Figure 5-5: Best 2-data center configuration


    In this configuration, if `DC2` fails completely, `DC1` maintains a majority of
    nodes and can continue to host the primary. However, should `DC1` fail, only one
    of three nodes is left, and the remaining node in `DC2` cannot elect itself primary
    and accept writes. Since it doesn''t know if there is simply a `network partition`
    and there is already a primary in `DC1`, it must remain a secondary. The application
    in `DC2` can still read the stale data, but will time out if attempting any writes.


    ## Two data centers (plus cloud arbiter)


    If you have access to only two data centers for storing production data, you could
    use a remote `arbiter` on a cloud provider as an impartial voter and to avoid
    "split-brain" in the cluster.


    If a cloud provider is not allowed under your security policy, a third private
    data center in a remote location could be used, even if it is normally not suitable
    for hosting data-bearing nodes due to lower capacity or high latency.


    As we discussed in Chapter 1, an `arbiter` doesn''t replicate or store any user
    data. As such, it has very low network bandwidth and storage requirements, and
    it not a risk for data protection regulations (Chapter 4). Its sole purpose is
    to participate in elections by determining which data-bearing data centers are
    currently reachable from the rest of the network.


    One major problem with a so-called `PSA` (Primary–Secondary–Arbiter) configuration
    is that your application cannot enable majority writes and continue with a data
    center failure (see Figure 5-6). If either data center is unavailable, only one
    data-bearing node remains and majority writes will just time out until the `DC`
    is restored.


    ![../images/487346_1_En_5_Chapter/487346_1_En_5_Fig6_HTML.jpg](images/487346_1_En_5_Chapter/487346_1_En_5_Fig6_HTML.jpg)


    Figure 5-6: An arbiter in the cloud but without safe majority writes


    Warning


    Arbiters introduce a number of undesirable edge cases when data-bearing nodes
    are down (particularly for read concern `majority`) and should be avoided in production
    whenever possible.


    A slightly safer option (Figure 5-7) is to use a five-member set with a write
    concern of `3` (rather than `majority`) and with two data-bearing nodes in each
    data center. In this case, when a single data-bearing node fails, the write concern
    still allows writes. However, should any entire `DC` fail, we again cannot write
    safely to our deployment.


    ![../images/487346_1_En_5_Chapter/487346_1_En_5_Fig7_HTML.jpg](images/487346_1_En_5_Chapter/487346_1_En_5_Fig7_HTML.jpg)


    Figure 5-7: A `PSSSA` topology, with arbiter in the cloud and write concern: 3


    This topology has another benefit. Because one secondary is in the same `DC` as
    the primary, it will have very low latency and should be able to keep up with
    replication more easily. Should the primary fail suddenly, `mongod` will normally
    replicate writes first and be able to take over the primary role faster than any
    remote member could.


    ### Manual intervention


    Let’s assume we have a `P|S|A` topology and that one of the two data centers becomes
    unavailable due to a massive power failure in that region. The `arbiter` in the
    third location has preserved the quorum of voters and so the primary node can
    remain primary. However, now there is only a single data-bearing node available.
    Any writes requested with write concern `majority` will be blocked, waiting for
    a second data-bearing node to acknowledge the change.


    Note that an `arbiter` will always have `priority` of `0` since it has no data
    and so can never be primary.


    For the purposes of this section, let''s consider a default configuration for
    a `PSA` replica set.


    ```

    {

    "_id" : "rs0",

    "version" : 1,

    "protocolVersion" : NumberLong(1),

    "members" : [

    {

    "_id" : 0,

    "host" : "mongodb0.example.local:27017",

    "arbiterOnly" : false,

    "hidden" : false,

    "priority" : 1,

    "votes" : 1

    },

    {

    "_id" : 1,

    "host" : "mongodb1.example.local:27017",

    "arbiterOnly" : false,

    "hidden" : false,

    "priority" : 1,

    "votes" : 1

    },

    {

    "_id" : 2,

    "host" : "mongodb2.example.local:27017",

    "arbiterOnly" : true,

    "hidden" : false,

    "priority" : 0

    "votes" : 1

    }

    ],

    "settings" : {

    ...

    }

    }

    ```

    Listing 5-3: Example replica set configuration with an arbiter


    The `majority` for writes is normally calculated based on the number of `voting
    data-bearing` nodes in the set. Normally setting `votes: 0` for the secondary
    in the `rs.config` is not enough; however, there is a special case for a `PSA`
    topology. So, in this case, you would remove the votes for the unavailable secondary
    node, but keep the node as a member of the set, as follows:


    ```

    conf = rs.conf();

    conf.members[1].votes = 0;

    rs.reconfig(conf);

    ```


    This would give the votes for the primary node to continue and also allow the
    application''s request for majority write concern to be satisfied by the single
    data-bearing node. The unavailable secondary will attempt to catch up replication
    as soon as it comes back online. A secondary offline for any extended period of
    time in a replica set with many write operations may be unable to catch up on
    oplog changes and need a full resync.


    Don''t forget to `restore` voting rights once the unavailable member is back online.'
