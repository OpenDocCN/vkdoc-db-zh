    关于作者 关于技术审阅者


    # 1. 核心概念


    对于来自传统关系数据库管理系统世界，甚至是企业级 Microsoft SQL Server 或 Oracle 的用户来说，MongoDB 提供了一种关于可扩展性和可用性的创新思维方式。本章介绍了
    MongoDB 部署的所有核心概念，并阐述了 MongoDB 节点如何实现高可用性、低延迟复制，以及如何处理意外的基础设施故障。


    > 冗余是模糊的，因为如果什么不寻常的事都没发生，它似乎是一种浪费。然而，不寻常的事情通常会发生。

    > —— 纳西姆·尼古拉斯·塔勒布，学者、风险分析师，《`黑天鹅`》作者


    ## MongoDB 的主要特性


    自计算机时代伊始，存储结构化数据就一直是个问题。最初数据保存在分隔符文件中，最终存储在预定义的数据表中，但最近出现了一个数据库新时代，它以键/值存储、图和复杂的多级文档形式记录数据。这些相对较新的方案在“关系性”上并不逊色于旧的
    SQL 解决方案。MongoDB 允许开发人员以更直观、更灵活的方式，通过 `结构化文档` 来表达关系。


    MongoDB 的另一个优势在于，它从核心设计上就是高效、可扩展且具备冗余性的。通过运行在通用硬件上，企业可以在自己的数据中心构建强大的“大数据”解决方案，并随着应用程序的增长和发展轻松扩展它们。


    如今，大容量、低延迟的存储已相对便宜，数据库设计的整个范式已经改变。SQL 数据库设计侧重于使用 `规范化` 使数据库尽可能小，但这在读取时可能需要将数据
    `连接` 回逻辑块，从而产生巨大的开销。通过将相关数据存储在单个文档中，可能需要更多的磁盘空间，但读取性能得到了极大的优化，无需在读取时进行任何“连接”或其他处理。


    MongoDB 专为高可用性而设计，采用分布式架构，同时仍能保持持久且一致的数据变更。在生产部署中，将有多个 MongoDB `节点`，每个节点都拥有数据的完整副本，并通过
    `复制` 保持同步。MongoDB 采用主/从范式的一种变体，即 `副本集` 中的一个成员被指定为 `主节点`，负责确认任何写操作，其余成员为 `次节点`，维护数据的副本。这些次节点是一种
    `灾难恢复` 备用节点，如果主节点变得不可用，它们将接替主节点的角色。关于拓扑结构和分片的架构选择将在后续章节中详细讨论。


    ## 与“传统数据库”的区别


    Oracle、MySQL 或 Microsoft SQL Server 等传统数据库使用表状范式存储数据——很像电子表格。它们要求系统架构师或开发人员将逻辑数据对象分解为多个表，这不仅增加了软件开发的复杂性，而且在向存储设备的多个不同位置写入变更时，也会产生额外的
    I/O。


    ### 术语对照


    虽然查询、索引和事务等许多概念非常相似，但表 1-1 展示了传统 SQL 数据库与 MongoDB 之间的关键术语和差异。


    表 1-1


    常见 SQL 与 MongoDB 术语对照


    | SQL | MongoDB | 说明 |

    | --- | --- | --- |

    | `Table` | `Collection` | 包含共享相似实体类型的文档，但不必是完全相同的字段集。 |

    | `Row` | `Document` | 一个具有唯一 ID 字段和其他数据字段的实体。 |

    | `Column` | `Field` | 并非所有文档都必须拥有相同的字段。可以向单个文档添加字段，而无需重建任何数据文件。字段可以具有多种数据类型，包括子文档的嵌套数组。
    |

    | `Index` | `Index` | MongoDB 也支持二级索引、部分索引、稀疏索引、地理空间索引、大小写不敏感索引和复合索引。 |

    | `Query` | `Query` | MongoDB 查询被定义为文档。 |

    | `View` | `View` | MongoDB 支持只读视图，并且在 MongoDB 4.2+ 中还支持按需物化视图。 |

    | `Transaction` | `Transaction` | MongoDB 4.2+ 在分片部署中支持多文档事务。 |

    | `Master/slave` | `Primary/secondary` | 与许多系统不同，主节点和次节点的角色是动态的，在维护和网络故障期间会自动响应。
    |

    | `Replication` | `Replication` | MongoDB 使用逻辑操作日志，而非复制二进制数据差异。 |

    | | `Deployment` | 以特定配置协同工作的任何一组 MongoDB 节点。 |

    | | `Cluster` | 包含一个或多个分片、配置服务器和路由器的 MongoDB 部署。 |

    | | `Shard` | 包含数据子集的一组 MongoDB 节点。 |'
- fmt: '## Storage engines


    Like many other popular databases, MongoDB has support for alternative storage
    engines. This was particularly important during the transition from the original
    memory-mapped storage solution (now called `MMAPv1`) to the new WiredTiger storage
    engine which became the default in version 3.2. WiredTiger offers superior concurrency
    features as well as compression, encryption, and other internal functions now
    required for modern MongoDB functionality.


    ### Binary JSON


    While we interact with MongoDB via JSON documents for queries, administrative
    commands, and configuration, the database server itself actually manipulates a
    special binary-encoded format of JSON called `BSON` (“Binary JSON”). This format
    defines a number of data types not available in standard JSON such as `Decimal128`
    (a 128-bit precision decimal) and `Date` (a 64-bit UTC timestamp). An Extended
    JSON format is also available to support expressions like `{"$numberDecimal":"10.99"}`
    and `{"$date":"2019-08-11T17:54:14.692Z"}` for exporting data into human-readable
    format.


    `BSON` also has the benefit of being lightweight, traversable, and efficient.
    The format is very simple and the format specification is open source. It has
    little overhead and so minimizes bytes needed to be transferred or stored. The
    format reserves some bytes to indicate subdocument sizes, making it algorithmically
    efficient to walk complex documents and skip to target fields. Finally, its format
    is easily decoded, encoded, and compressed.


    ### Data files


    Every collection and index requires a WiredTiger file on disk. Most operating
    systems set an upper limit on the maximum number resources available (files, threads,
    memory, etc.) by a single process. Very large deployments with many collections,
    indexes, or active connections can sometimes hit these limits. One common cause
    is a multi-tenant pattern discussed later in this chapter.


    Note: In Unix-type operating systems, file descriptors are used for almost any
    operations that read or write, I/O devices, pipes, and network sockets; too many
    open network connections can also exhaust this limit.


    ## Concurrency


    Like any database which supports high levels of concurrency from many clients
    writing and querying data in parallel, MongoDB uses a multiversion concurrency
    control (MVCC) system which uses snapshot isolation to implement optimistic concurrency
    control. Few operations require global locks and most lock at the document level.
    However, some administrative commands (such as `compact()`) can still lock an
    entire logical database for extended periods, so these should be run in a rolling
    manner to avoid downtime. Some commands (such as `createIndex()`) will lock at
    the collection level, forcing all changes to documents in that collection to be
    queued.


    ## Relationships


    Let’s imagine that we are building a national library platform and we have three
    large collections of documents: (1) books, (2) borrowers, and (3) authors.


    In Figure 1-1, we see both the structured and relational nature of MongoDB documents.
    In `Author` documents, there is a field `books`, with three subfields `id`, `title`,
    and `cover_img`. This lets us reference a `Book` document in another collection
    by `id` but also keeps the title locally since it’s not going to change. If we
    want to render the Author’s bio on the website, this document already has all
    the required values, and so a second round-trip to the database can be avoided.


    ![Figure 1-1: Example documents for our collections](images/487346_1_En_1_Chapter/487346_1_En_1_Fig1_HTML.jpg)


    We see a similar pattern in the `Book` document. The `checkout` array contains
    multiple entries for each borrower who currently has a copy checked out. We represent
    them as an array of subdocuments, with `by` and `date` fields. The `by` value
    references the `Borrower` document’s unique `_id` field. The `Book` document contains
    all the data required to see both how many copies remain in the library system
    and who has checked out books right now.


    In an SQL database, we would need a separate `borrower_history` table to represent
    the many-to-many relationship between borrowers and books.


    ### Referential integrity


    Maintaining valid relationships within a database such as the concept of using
    secondary keys in SQL databases is known as referential integrity. Once again,
    the one-to-many mapping of SQL tables is normally represented in a single document
    in MongoDB, and so the problem of maintaining integrity across multiple tables
    is almost completely avoided. Of course, it is sometimes necessary to express
    and store more complex relationships in MongoDB, and software architects and developers
    need to consider how to keep such relationships consistent in the database.


    While there is no such thing as a foreign key constraint nor cascading deletes
    in MongoDB, most design patterns and object-data mappers (ODMs) make it easy for
    the application to maintain these references.


    In our earlier library example in SQL, if I wanted to delete a person from a `borrower`
    table, the database would need to delete every entry from a `borrower_history`
    table. But we would be deleting valuable historical information.


    In the age of cheap storage, the paradigm has shifted, and we want to keep as
    much data as possible. Rather than actually deleting the `borrower` document,
    in MongoDB we would rather mark the person as inactive by setting a field `active`
    to `false`. Since we are keeping all the borrower history, the problem of foreign
    key constraint violations is avoided too.


    In most cases, it’s up to the application to use a multidocument transaction to
    update both sides of the relationship. In reality this is a much better way to
    code and create application logic, since it keeps everything inside the application
    codebase, rather than having some constraint and validation performed on the database
    side and some on the application side.


    With data protection regulations and the “right to be forgotten” in the European
    Union’s General Data Protection Regulation and other similar regulations, it is
    sometimes necessary to delete user’s data completely. This is discussed in Chapter
    4.


    ## ACID compliance


    ACID stands for atomicity, consistency, isolation, and durability. These four
    characteristics of traditional databases were considered to be the cornerstone
    of any production-ready system and were often used as an argument against MongoDB.
    Historically MongoDB has always provided a flexible approach which allows application
    developers to choose the level of durability and consistency they require and
    lets them balance speed, throughput, and cost.'
  raw: '### Storage engines


    Like many other popular databases, MongoDB has support for alternative storage
    engines . This was particularly important during the transition from the original
    memory-mapped storage solution (now called `MMAPv1`) to the new WiredTiger storage
    engine which became the default in version 3.2\. WiredTiger offers superior concurrency
    features as well as compression, encryption, and other internal functions now
    required for modern MongoDB functionality.


    #### Binary JSON


    While we interact with MongoDB via JSON documents for queries, administrative
    commands, and configuration, the database server itself actually manipulates a
    special binary-encoded format of JSON called BSON (“Binary JSON”). This format
    defines a number of data types not available in standard JSON such as `Decimal128`
    (a 128-bit precision decimal) and `Date` (a 64-bit UTC timestamp). An Extended
    JSON format is also available to support expressions like `{"$numberDecimal":"10.99"}`
    and `{"$date":"2019-08-11T17:54:14.692Z"}` for exporting data into human-readable
    format.


    BSON also has the benefit of being lightweight, traversable, and efficient. The
    format is very simple and the format specification is open source. It has little
    overhead and so minimizes bytes needed to be transferred or stored. The format
    reserves some bytes to indicate subdocument sizes, making it algorithmically efficient
    to walk complex documents and skip to target fields. Finally, its format is easily
    decoded, encoded, and compressed.


    #### Data files


    Every collection and index requires a WiredTiger file on disk. Most operating
    systems set an upper limit on the maximum number resources available (files, threads,
    memory, etc.) by a single process. Very large deployments with many collections,
    indexes, or active connections can sometimes hit these limits. One common cause
    is a *multi-tenant pattern* discussed later in this chapter.


    Note


    In Unix-type operating systems, file descriptors are used for almost any operations
    that read or write, I/O devices, pipes, and network sockets; no many open network
    connections can also exhaust this limit.


    ### Concurrency


    Like any database which supports high levels of concurrency from many clients
    writing and querying data in parallel, MongoDB uses a multiversion concurrency
    control (MVCC) system which uses *snapshot isolation* to implement optimistic
    concurrency control. Few operations require global locks and most lock at the
    document level. However, some administrative commands (such as `compact`) can
    still lock an entire logical database for extended periods, so these should be
    run in a rolling manner to avoid downtime. Some commands (such as `createIndex`)
    will lock at the collection level, forcing all changes to documents in that collection
    to be queued.


    ### Relationships


    Let’s imagine that we are building a national library platform and we have three
    large collections of documents: (1) books, (2) borrowers, and (3) authors.


    In Figure [1-1](#487346_1_En_1_Chapter.xhtml#Fig1), we see both the structured
    and relational nature of MongoDB documents. In **Author** documents, there is
    a field `books`, with three subfields `id`, `title`, and `cover_img`. This lets
    us reference a **Book** document in another collection by `id` but also keeps
    the title locally since it’s not going to change. If we want to render the Author’s
    bio on the website, this document already has all the required values, and so
    a second round-trip to the database can be avoided.


    ![../images/487346_1_En_1_Chapter/487346_1_En_1_Fig1_HTML.jpg](images/487346_1_En_1_Chapter/487346_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Example documents for our collections


    We see a similar pattern in the **Book** document. The `checkout` array contains
    multiple entries for each borrower who currently has a copy checked out. We represent
    them as an array of subdocuments, with `by` and `date` fields. The `by` value
    references the **Borrower** document’s unique `_id` field. The **Book** document
    contains all the data required to see both how many copies remain in the library
    system and who has checked out books right now.


    In an **SQL database**, we would need a separate `borrower_history` table to represent
    the many-to-many relationship between borrowers and books.


    #### Referential integrity


    Maintaining valid relationships within a database such as the concept of using
    *secondary keys* in SQL databases is known as *referential integrity*. Once again,
    the one-to-many mapping of SQL tables is normally represented in a single document
    in MongoDB, and so the problem of maintaining integrity across multiple tables
    is almost completely avoided. Of course, it is sometimes necessary to express
    and store more complex relationships in MongoDB, and software architects and developers
    need to consider how to keep such relationships consistent in the database.


    While there is no such thing as a *foreign key constraint* nor *cascading deletes*
    in MongoDB, most design patterns and *object-data mappers* (ODMs) make it easy
    for the application to maintain these references.


    In our earlier library example in SQL, if I wanted to delete a person from a `borrower`
    table, the database would need to delete every entry from a `borrower_history`
    table . But we would be deleting valuable historical information.


    In the age of cheap storage , the paradigm has shifted, and we want to keep as
    much data as possible. Rather than actually deleting the `borrower` document ,
    in MongoDB we would rather mark the person as inactive by setting a field `active`
    to `false`. Since we are keeping all the borrower history, the problem of foreign
    key constraint violations is avoided too.


    In most cases, it’s up to the application to use a multidocument transaction to
    update both sides of the relationship. In reality this is a much better way to
    code and create application logic, since it keeps everything inside the application
    codebase, rather than having some constraint and validation performed on the database
    side and some on the application side.


    With data protection regulations and the “right to be forgotten” in the European
    Union’s General Data Protection Regulation and other similar regulations, it is
    sometimes necessary to delete user’s data completely. This is discussed in Chapter
    [4](#487346_1_En_4_Chapter.xhtml).


    ## ACID compliance


    ACID stands for *atomicity*, *consistency*, *isolation,* and *durability*. These
    four characteristics of traditional databases were considered to be the cornerstone
    of any production-ready system and were often used as an argument against MongoDB.
    Historically MongoDB has always provided a flexible approach which allows application
    developers to choose the level of durability and consistency they require and
    lets them balance speed, throughput, and cost.'
  trans: '

    ## 存储引擎


    与许多其他流行的数据库类似，MongoDB 支持替代性的存储引擎。这一点在从最初的内存映射存储方案（现称为 `MMAPv1`）过渡到新的 WiredTiger
    存储引擎时尤为重要，WiredTiger 在 3.2 版本中成为默认引擎。WiredTiger 提供了卓越的并发特性，以及压缩、加密和其他现代 MongoDB
    功能现在所需的内部功能。


    ### 二进制 JSON


    虽然我们通过 JSON 文档与 MongoDB 交互，进行查询、管理命令和配置，但数据库服务器本身实际上操作的是 JSON 的一种特殊二进制编码格式，称为
    `BSON`（“二进制 JSON”）。该格式定义了许多标准 JSON 中没有的数据类型，例如 `Decimal128`（128 位精度十进制数）和 `Date`（64
    位 UTC 时间戳）。同时提供了一种扩展 JSON 格式，支持类似 `{"$numberDecimal":"10.99"}` 和 `{"$date":"2019-08-11T17:54:14.692Z"}`
    的表达式，用于将数据导出为人类可读的格式。


    `BSON` 还具有轻量级、可遍历和高效的优点。该格式非常简单，其规范是开源的。它的开销很小，因此可以最小化传输或存储所需的字节数。该格式保留了一些字节来指示子文档的大小，使得遍历复杂文档和跳转到目标字段在算法上是高效的。最后，其格式易于解码、编码和压缩。


    ### 数据文件


    每个集合和索引在磁盘上都需要一个 WiredTiger 文件。大多数操作系统对单个进程可用的最大资源数（文件、线程、内存等）设定了上限。拥有大量集合、索引或活动连接的非常大规模部署有时可能会达到这些限制。一个常见的原因是本章后面讨论的多租户模式。


    注意：在 Unix 类操作系统中，文件描述符几乎用于所有读写操作、I/O 设备、管道和网络套接字；过多的打开网络连接也会耗尽此限制。


    ## 并发性


    与任何支持来自多个客户端并发写入和查询数据的高并发级别的数据库一样，MongoDB 使用多版本并发控制（MVCC）系统，该系统利用快照隔离来实现乐观并发控制。很少有操作需要全局锁，大多数在文档级别加锁。然而，一些管理命令（例如
    `compact()`）仍可能在长时间内锁定整个逻辑数据库，因此应以滚动方式运行这些命令以避免停机。一些命令（例如 `createIndex()`）将在集合级别加锁，强制将该集合中所有文档的更改放入队列。


    ## 关系


    假设我们正在构建一个国家图书馆平台，并且我们有三个大型文档集合：（1）图书，（2）借阅者，以及（3）作者。


    在图 1-1 中，我们看到了 MongoDB 文档的结构化和关系特性。在 `Author` 文档中，有一个 `books` 字段，包含三个子字段 `id`、`title`
    和 `cover_img`。这让我们可以通过 `id` 引用另一个集合中的 `Book` 文档，同时由于标题不会改变而将其保留在本地。如果我们想在网站上呈现作者的简介，这个文档已经包含了所有必需的值，因此可以避免第二次往返数据库。


    ![图 1-1：我们的集合示例文档](img/487346_1_En_1_Fig1_HTML.jpg)


    我们在 `Book` 文档中看到了类似的模式。`checkout` 数组包含多个条目，对应当前借阅了副本的每个借阅者。我们将它们表示为子文档数组，包含 `by`
    和 `date` 字段。`by` 值引用 `Borrower` 文档的唯一 `_id` 字段。`Book` 文档包含了查看图书馆系统中剩余多少副本以及当前谁借阅了图书所需的所有数据。


    在 SQL 数据库中，我们需要一个单独的 `borrower_history` 表来表示借阅者和图书之间的多对多关系。


    ### 引用完整性


    在数据库中维护有效的关系，例如在 SQL 数据库中使用外键的概念，被称为引用完整性。再次强调，SQL 表的一对多映射通常在 MongoDB 中表示为单个文档，因此几乎完全避免了跨多个表维护完整性的问题。当然，有时需要在
    MongoDB 中表达和存储更复杂的关系，软件架构师和开发人员需要考虑如何在数据库中保持这些关系的一致性。


    虽然 MongoDB 中没有外键约束或级联删除这样的概念，但大多数设计模式和对象数据映射器（ODM）使应用程序能够轻松维护这些引用。


    在我们之前 SQL 中的图书馆例子中，如果我想从 `borrower` 表中删除一个人，数据库将需要从 `borrower_history` 表中删除每个条目。但我们会因此丢失有价值的历史信息。


    在存储成本低廉的时代，范式已经转变，我们希望尽可能多地保留数据。在 MongoDB 中，与其真正删除 `borrower` 文档，我们更倾向于通过设置一个字段
    `active` 为 `false` 来将该人标记为非活动状态。由于我们保留了所有的借阅历史，外键约束违反的问题也得以避免。


    在大多数情况下，由应用程序负责使用多文档事务来更新关系的双方。实际上，这是一种更好的编码和创建应用程序逻辑的方式，因为它将所有内容保留在应用程序代码库内部，而不是让一些约束和验证在数据库端执行，另一些在应用程序端执行。


    随着欧盟《通用数据保护条例》及其他类似法规中的数据保护法规和“被遗忘权”的出现，有时需要完全删除用户数据。这将在第 4 章中讨论。


    ## ACID 合规性


    ACID 代表原子性、一致性、隔离性和持久性。传统数据库的这四个特性曾被认为是任何生产就绪系统的基石，并常被用作反对 MongoDB 的论据。历史上，MongoDB
    一直提供灵活的方法，允许应用程序开发人员选择他们所需的持久性和一致性级别，并让他们在速度、吞吐量和成本之间取得平衡。

    '
- fmt: "# MongoDB 的 ACID 特性\n\n### 原子性\n**原子性** 指的是在数据库内执行多个更改时“要么全部成功，要么全部失败”的事务能力。如果更改的某一部分无法执行（例如，因为违反了唯一约束），那么整个事务都应该失败。这在使用独立数据表来表示一对多关系的“关系型数据库”中尤为重要。\n\
    \n在 MongoDB 中，大多数此类关系都记录在单个文档内，文档级别的原子性自最早期版本以来一直是 MongoDB 的核心特性。例如，在代码清单 [1-1](#487346_1_En_1_Chapter.xhtml#PC1)\
    \ 中，我们看到一个示例，它首先检查书籍的可用性，然后才执行借阅操作。如果两个线程同时试图借阅最后一本相同的书，只有一个线程会成功。此外，通过文档级别的原子性，对文档的更新会更改所有字段值，或者一个都不改。\n\
    \n```\ndb.books.findAndModify ( {\n    query: {\n        _id: 123456789,\n   \
    \     available: { $gt: 0 }\n    },\n    update: {\n        $inc: { available:\
    \ -1 },\n        $push: { checkout:\n            { by: \" nic\", date: new Date()\
    \ } }\n    }\n} )\n```\n*代码清单 1-1*\n*文档级别原子性示例：“借阅一本书”*\n\nMongoDB 4.0 引入了针对不同集合（前提是集合未分片）中多个文档的完整事务支持。在\
    \ MongoDB 4.2 中，也支持包含分片集合的复杂事务，这使其能力与任何 SQL 数据库相当，尽管可能只有一小部分用例需要此功能。\n\n### 一致性\n\
    此属性旨在保持数据处于有效状态且免遭破坏。由于 MongoDB 使用 MVCC 来控制文档级别的数据一致性，因此更新文档中多个字段的操作要么完全成功，要么失败。失败可能由诸如*唯一键约束*或*模式验证*违规等情况引起。在内部，MVCC\
    \ 实现了快照隔离保证，确保每个操作总是看到一致的数据快照。自 MongoDB 3.6 起，可以使用因果一致性会话以特定顺序执行因果操作，前提是使用了多数写入和读取。MongoDB\
    \ 4.2 增加了对分片集合中多文档事务的支持，使得在金融交易等关键且复杂操作中确保关系完整性成为可能。\n\n### 隔离性\n在任何数据库中，读取隔离都是一个难以理解的概念，在分布式数据库中尤其如此，因为一些应用程序进程明确选择从可能落后于主节点的辅助成员读取。应用程序可以为特定查询指定\
    \ `local` 读取关注点（很像一个*隔离级别*），以选择在数据在整个分布式集合中完全持久化之前读取数据。这允许更快、更简单的读取操作，但应用程序可能面临读取稍后可能被回滚的数据的风险。\n\
    \n在大多数情况下，应用程序应该从主节点读取以确保获取最新数据。不过，使用*读取关注点* `majority` 将确保只返回已完全持久化的数据。这会带来一些额外的处理开销和延迟惩罚。关于*多数写入*的相应详细信息，请参见第\
    \ [5](#487346_1_En_5_Chapter.xhtml) 章。\n\n在 MongoDB 中，显式*事务*应仅用于关键代码路径，其中多个相关文档必须原子地一起更新。在这种情况下，隔离的工作方式与任何数据库大致相同。在事务提交之前，事务内所做的任何写入对任何其他查询都不可见。\n\
    \n例如，如果您正在处理一个影响同一或不同集合中多个文档的金融事务，那么使用显式的 `start` 和 `commit`/`abort` 步骤的事务可能是合适的。\n\
    \n> **注意**\n> 当事务中止时，事务中所做的所有更改都会被完全丢弃，并且永远对事务外的任何其他进程不可见。\n\n完全的*分布式事务*（影响分片集合）会在处理能力和操作延迟方面产生额外成本，应仅在绝对必要时使用。如果您要一起进行多个不相关的更改，则根本不应使用事务。\n\
    \n#### 批量操作\n为了获得更好的性能，MongoDB 支持批量操作，这些操作可以一起通过网络发送并由服务器更高效地处理。应用程序可以选择使这些批量操作*有序*或*无序*。有序时，任何错误都会取消队列中的后续操作。无序时，服务器将尝试处理所有操作，即使其中一些失败。在这两种情况下，应用程序都会被告知哪些操作失败以及失败原因。这允许灵活的错误处理以及在业务逻辑认为适当时进行重试。在事务外部运行时，批量操作在文档级别是原子且隔离的。\n\
    \n> **注意**\n> 为了避免两个进程可能同时尝试首次插入某个值的情况，您应该在该字段上配置一个*唯一索引*。这将防止重复数据，并且其中一个进程在插入时会收到唯一索引违规，该情况可由应用程序处理。\n\
    \n### 持久性\n在 ACID 范式中，持久性意味着写入操作已被提交到一个程度，即使服务器突然崩溃也不会丢失该操作。\n\n#### 日志与刷盘\nMongoDB\
    \ 使用常见的*预写式日志*文件来帮助确保写入尽快持久化。当客户端向节点发送写入操作时，它首先在内存中应用，然后写入磁盘上的日志，然后大约每 60 秒，内存中排队的所有更改（包括索引）都会刷入磁盘，创建一个持久的*检查点*。\n\
    \n通过首先在内存中排队更改，MongoDB 可以实现更高的吞吐量，因为它可以丢弃任何过时的更改（例如，当同一文档的字段在 60 秒内被更改两次时），然后将所有剩余的\
    \ I/O 操作批量处理在一起。\n\n对于*独立*的 MongoDB 节点，我们可以认为一旦写入日志（至少每 50 毫秒发生一次），写入就是持久的。作为\
    \ `mongod` 启动过程的一部分，它将检查日志并应用在上一个会话期间预先写入那里的任何操作。\n\n对于*副本集*，我们只能认为在写入到大多数节点后，写入才是持久的。此时，如果主节点的存储突然完全故障，拥有此写入的辅助节点将成为主节点，该更改将永远不会丢失。"
  raw: '### Atomicity


    **Atomicity** refers to the ability to perform an “all or nothing” transaction
    of multiple changes inside the database. If one part of the change is not possible
    (e.g., due to violating a unique constraint), then the whole transaction should
    fail. This was particularly important within “relational databases” which used
    separate tables of data to represent one-to-many relationships.


    In MongoDB, most such relationships are recorded inside a single document, and
    document-level atomicity has been a core feature of MongoDB since the earliest
    versions. For example, in Listing [1-1](#487346_1_En_1_Chapter.xhtml#PC1) we see
    an example which first checks the availability of a book and only then performs
    a checkout. If two threads both tried to check out the last copy of the book simultaneously,
    only one thread would succeed. Furthermore, by being atomic at the document level,
    an update to a document will change all field values, or none at all.


    ```

    db.books.findAndModify ( {

    query: {

    _id: 123456789,

    available: { $gt: 0 }

    },

    update: {

    $inc: { available: -1 },

    $push: { checkout:

    { by: " nic", date: new Date() } }

    }

    } )

    Listing 1-1

    An example of document-level atomicity “checking out a book”

    ```


    MongoDB 4.0 introduced full transactions against multiple documents in different
    collections as long as the collection was not sharded. In MongoDB 4.2 complex
    transactions that included sharded collections are also supported, matching the
    abilities of any SQL database, although probably only needed for a small subset
    of use cases.


    ### Consistency


    This property is about keeping the data in a valid state and free from corruption.
    Since MongoDB uses MVCC to control consistency of data at the document level,
    an update to a document that changes several fields will either completely succeed
    or fail. Failures can be caused by situations like a *unique key constraint* or
    *schema validation* violation. Internally, MVCC implements a snapshot isolation
    guarantee which ensures that each operation always sees a consistent snapshot
    of data. Since MongoDB 3.6, causally consistent sessions can be used to execute
    causal operations in a particular order, as long as majority writes and reads
    are employed. MongoDB 4.2 added support for multidocument transactions in sharded
    collections, making it possible to ensure relational integrity in critical and
    complex operations such as financial transactions.


    ### Isolation


    Read isolation is a difficult concept in any database and particularly in distributed
    databases where some application processes are explicitly choosing to read from
    secondary members who may be lagging behind the primary. The application can specify
    a `local` read concern for a particular query (much like an *isolation level*)
    to choose to read data before it has been made fully durable throughout the entire
    distributed set. This allows for faster, less complex read operations, but the
    application may risk reading data that may be later rolled back.


    In most cases, the application should read from the primary to ensure that it
    gets the latest data. Although, using *read concern* *majority* will ensure that
    only data that is fully durable will be returned. This incurs some additional
    processing and latency penalties. See corresponding details about *majority writes*
    in Chapter [5](#487346_1_En_5_Chapter.xhtml).


    In MongoDB, explicit *transactions* should only be used in critical code paths
    where several related documents must be updated together atomically. In this case,
    isolation works much the same as in any database. Any writes that are made inside
    the transaction are not visible to any other query until the transaction is committed.


    For example, if you are processing a financial transaction which affects multiple
    documents in the same or a different collection, then a transaction may be appropriate
    with an explicit `start` and `commit`/`abort` step.


    Note


    When transactions abort, all changes made in the transaction are completely discarded
    without ever being visible to any other process outside the transaction.


    Fully *distributed transactions* (affecting sharded collections) incur an additional
    cost in terms of processing power and latency to an operation and should only
    be used when absolutely necessary. If you are making several unrelated changes
    together, then you should not use transactions at all.


    #### Bulk operations


    For additional performance, MongoDB supports bulk operations which can be sent
    over the wire together and processed more efficiently by the server. The application
    can choose to make these bulk operations *ordered* or not. When ordered, any error
    will cancel subsequent operations in the queue. When unordered, the server will
    try and process all operations even if some of them fail. In both cases, the application
    is told which operations failed and why. This allows for flexible error handling
    and retries if deemed appropriate in the business logic. When run outside a transaction,
    bulk operations are atomic and isolated at the document level only.


    Note


    In order to avoid the particular situation where two processes might simultaneously
    try to insert a value for the first time, you should configure a *unique* *index*
    on that field. This will prevent duplicate data, and one of the processes will
    receive a unique index violation when it inserts, which can be handled by the
    application.


    ### Durability


    In the ACID paradigm, durability means that a write operation has been committed
    to a point where a sudden crash of the server will not lose that operation.


    #### Journal and flushing


    MongoDB uses a familiar *write-ahead* *journal* file to help ensure that writes
    are made durable as soon as possible. When a client sends a write operation to
    a node, it is first applied in memory, then written to the journal on disk, and
    then approximately every 60 seconds all changes queued in memory (including indexes)
    are flushed to disk creating a durable *checkpoint* .


    By queuing changes in memory first, MongoDB can achieve much higher throughput
    since it can discard any obsolete changes (e.g., when the same document’s field
    is changed twice within 60 seconds) and then batch all remaining I/O operations
    together.


    For a *standalone* MongoDB node, we can consider a write durable once it has been
    written to the journal, which should occur at least every 50 milliseconds. As
    part of the `mongod` startup process, it will check the journal and apply any
    operations that were written ahead there during a previous session.


    For *replica sets*, we can consider a write durable only once it has been written
    to a majority of nodes. At this point, if the primary’s storage suddenly fails
    entirely, a secondary with this write would become the primary and the change
    could never be lost.'
  trans: "# MongoDB 的 ACID 特性\n\n### 原子性\n**原子性** 指的是在数据库内执行多个更改时“要么全部成功，要么全部失败”的事务能力。如果更改的某一部分无法执行（例如，因为违反了唯一约束），那么整个事务都应该失败。这在使用独立数据表来表示一对多关系的“关系型数据库”中尤为重要。\n\
    \n在 MongoDB 中，大多数此类关系都记录在单个文档内，文档级别的原子性自最早期版本以来一直是 MongoDB 的核心特性。例如，在代码清单 1-1\
    \ 中，我们看到一个示例，它首先检查书籍的可用性，然后才执行借阅操作。如果两个线程同时试图借阅最后一本相同的书，只有一个线程会成功。此外，通过文档级别的原子性，对文档的更新会更改所有字段值，或者一个都不改。\n\
    \n```\ndb.books.findAndModify ( {\n    query: {\n        _id: 123456789,\n   \
    \     available: { $gt: 0 }\n    },\n    update: {\n        $inc: { available:\
    \ -1 },\n        $push: { checkout:\n            { by: \" nic\", date: new Date()\
    \ } }\n    }\n} )\n```\n*代码清单 1-1*\n*文档级别原子性示例：“借阅一本书”*\n\nMongoDB 4.0 引入了针对不同集合（前提是集合未分片）中多个文档的完整事务支持。在\
    \ MongoDB 4.2 中，也支持包含分片集合的复杂事务，这使其能力与任何 SQL 数据库相当，尽管可能只有一小部分用例需要此功能。\n\n### 一致性\n\
    此属性旨在保持数据处于有效状态且免遭破坏。由于 MongoDB 使用 MVCC 来控制文档级别的数据一致性，因此更新文档中多个字段的操作要么完全成功，要么失败。失败可能由诸如*唯一键约束*或*模式验证*违规等情况引起。在内部，MVCC\
    \ 实现了快照隔离保证，确保每个操作总是看到一致的数据快照。自 MongoDB 3.6 起，可以使用因果一致性会话以特定顺序执行因果操作，前提是使用了多数写入和读取。MongoDB\
    \ 4.2 增加了对分片集合中多文档事务的支持，使得在金融交易等关键且复杂操作中确保关系完整性成为可能。\n\n### 隔离性\n在任何数据库中，读取隔离都是一个难以理解的概念，在分布式数据库中尤其如此，因为一些应用程序进程明确选择从可能落后于主节点的辅助成员读取。应用程序可以为特定查询指定\
    \ `local` 读取关注点（很像一个*隔离级别*），以选择在数据在整个分布式集合中完全持久化之前读取数据。这允许更快、更简单的读取操作，但应用程序可能面临读取稍后可能被回滚的数据的风险。\n\
    \n在大多数情况下，应用程序应该从主节点读取以确保获取最新数据。不过，使用*读取关注点* `majority` 将确保只返回已完全持久化的数据。这会带来一些额外的处理开销和延迟惩罚。关于*多数写入*的相应详细信息，请参见第\
    \ 5 章。\n\n在 MongoDB 中，显式*事务*应仅用于关键代码路径，其中多个相关文档必须原子地一起更新。在这种情况下，隔离的工作方式与任何数据库大致相同。在事务提交之前，事务内所做的任何写入对任何其他查询都不可见。\n\
    \n例如，如果您正在处理一个影响同一或不同集合中多个文档的金融事务，那么使用显式的 `start` 和 `commit`/`abort` 步骤的事务可能是合适的。\n\
    \n> **注意**\n> 当事务中止时，事务中所做的所有更改都会被完全丢弃，并且永远对事务外的任何其他进程不可见。\n\n完全的*分布式事务*（影响分片集合）会在处理能力和操作延迟方面产生额外成本，应仅在绝对必要时使用。如果您要一起进行多个不相关的更改，则根本不应使用事务。\n\
    \n#### 批量操作\n为了获得更好的性能，MongoDB 支持批量操作，这些操作可以一起通过网络发送并由服务器更高效地处理。应用程序可以选择使这些批量操作*有序*或*无序*。有序时，任何错误都会取消队列中的后续操作。无序时，服务器将尝试处理所有操作，即使其中一些失败。在这两种情况下，应用程序都会被告知哪些操作失败以及失败原因。这允许灵活的错误处理以及在业务逻辑认为适当时进行重试。在事务外部运行时，批量操作在文档级别是原子且隔离的。\n\
    \n> **注意**\n> 为了避免两个进程可能同时尝试首次插入某个值的情况，您应该在该字段上配置一个*唯一索引*。这将防止重复数据，并且其中一个进程在插入时会收到唯一索引违规，该情况可由应用程序处理。\n\
    \n### 持久性\n在 ACID 范式中，持久性意味着写入操作已被提交到一个程度，即使服务器突然崩溃也不会丢失该操作。\n\n#### 日志与刷盘\nMongoDB\
    \ 使用常见的*预写式日志*文件来帮助确保写入尽快持久化。当客户端向节点发送写入操作时，它首先在内存中应用，然后写入磁盘上的日志，然后大约每 60 秒，内存中排队的所有更改（包括索引）都会刷入磁盘，创建一个持久的*检查点*。\n\
    \n通过首先在内存中排队更改，MongoDB 可以实现更高的吞吐量，因为它可以丢弃任何过时的更改（例如，当同一文档的字段在 60 秒内被更改两次时），然后将所有剩余的\
    \ I/O 操作批量处理在一起。\n\n对于*独立*的 MongoDB 节点，我们可以认为一旦写入日志（至少每 50 毫秒发生一次），写入就是持久的。作为\
    \ `mongod` 启动过程的一部分，它将检查日志并应用在上一个会话期间预先写入那里的任何操作。\n\n对于*副本集*，我们只能认为在写入到大多数节点后，写入才是持久的。此时，如果主节点的存储突然完全故障，拥有此写入的辅助节点将成为主节点，该更改将永远不会丢失。"
- fmt: '## Scaling


    While traditional databases have added implementations of distribution and replication,
    MongoDB provides a simple yet extremely flexible pair of features called `replication`
    and `sharding` to create deployments that can be tailored to match the availability,
    performance, and cost requirements of almost any project.


    In MongoDB, replication means that logical operations are replicated between all
    the data-bearing nodes in a `replica set` (see Figure [1-2](#487346_1_En_1_Chapter.xhtml#Fig2)).
    Rather than sending a binary version of the change delta, the change operation
    is recorded in an idempotent log of operations (called the `oplog`), and these
    same operations are replicated and applied in the on secondaries as they are on
    the primary. By avoiding `binary replication`, MongoDB will not replicate any
    filesystem-based errors that may be introduced by a faulty storage device.


    ![../images/487346_1_En_1_Chapter/487346_1_En_1_Fig2_HTML.jpg](images/487346_1_En_1_Chapter/487346_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    A replica set with three data-bearing nodes


    In some legacy topologies, an arbiter was deployed in a third data center to arbitrate
    during network partitions. It is now strongly recommended to avoid arbiters and
    instead deploy only data-bearing nodes.


    For larger deployments, MongoDB introduces the concept of `sharding` as illustrated
    in Figure [1-3](#487346_1_En_1_Chapter.xhtml#Fig3). Each `shard` is comprised
    of a replica set (to provide redundancy) and stores a subset of the entire data
    for sharded collections. This could be considered a sort of “multi-master” deployment
    where each primary is responsible for a certain range of documents. For these
    `sharded clusters`, we also need to introduce a `mongos` router which hides the
    complexity from the application. This `mongos` functions separately from the shards
    and their components and will redirect any incoming write operations to whichever
    replica set member is currently the primary.


    ![../images/487346_1_En_1_Chapter/487346_1_En_1_Fig3_HTML.jpg](images/487346_1_En_1_Chapter/487346_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    A sharded cluster with two shards (each being a replica set)


    From the perspective of the application, a `mongos` router node behaves almost
    identically to any other node. Moving from a replica set topology to a sharded
    cluster only requires an application to update the connection URI to point to
    the `mongos` routers rather than the member nodes directly.


    ## Replication


    Now that we have introduced the concept of replication, let’s dive deeper into
    some of the internal mechanisms so that we see how they might be affected by our
    topology design.


    ### Syncing


    There are two main stages for syncing a node in a replica set:


    1.  An `initial sync` where all of the data is copied over the network and the
    data and indexes are rebuilt from scratch on the target node

    2.  Incremental oplog processing where a `batch of updates` already performed
    on the primary is applied to the data on a secondary


    An initial sync is a resource-intensive process as both network and storage capacity
    can be bottlenecks. This should only happen when:


    1.  A new node is added to an existing replica set

    2.  A node has been offline so long that it cannot catch up based on the oplog
    available, or

    3.  Storage-level corruption means that the existing data files can no longer
    be trusted


    ### Elections


    MongoDB decides which node in a replica set becomes the primary by holding an
    election. System architects can set priorities for certain nodes, but in general
    the node that has the most recent writes is elected primary to minimize data loss
    in worst-case scenarios. With proper use of majority write concern, writes can
    be guaranteed to never be lost from network failures. This will be discussed further
    in Chapter [5](#487346_1_En_5_Chapter.xhtml).


    ### Lag/staleness


    Because nodes normally reside on different hosts (and preferably also in different
    data centers), there will always be some delay in replication as the oplog data
    streams over the network to each secondary. Each secondary will apply the same
    oplog changes as fast as possible. The time between when a write is completed
    on the primary and when the secondary applies that same change is called the `replication
    lag`. Secondaries can pull oplog updates from either the primary or another secondary
    via `replication chaining`.


    When the application writes with `majority`, it must wait for a majority of data-bearing
    nodes to write before moving on to the next operation. As a consequence of waiting,
    replication lag `decreases` but `throughput` will also be lower.


    An application can choose to write certain changes without an explicit write concern.
    In this mode by default, a write concern value of `1` is used, and the application
    will wait only for the primary to acknowledge the change but not for any secondaries.
    Should the primary then fail, the write may never get replicated. These writes
    would eventually be `rolled back` when the node later rejoins the replica set
    and will then be written to a special local `rollback` file on disk. Manual intervention
    is then required to reintegrate these rolled back writes into the database.


    Only certain cases when throughput is more important than durability (such as
    hit logs or “Internet of Things” metrics) should consider `{w: 1}` writes in production.


    ### Oplog window


    By default, each replica set member creates the oplog as a capped collection with
    a fixed size between about 1GB and 50GB depending on the amount of free disk space
    available on the data volume at the time. It’s also possible to increase the size
    of the oplog collection later, if this initial size proves insufficient.


    The `oplog window` is the number of `hours` of most recent changes kept in the
    oplog, calculated from the difference in timestamps between the oldest and most
    recent oplog entry. This window will change over time as it is dependent on how
    heavy the workload and how compact the update operations are.


    All nodes in a replica set should be configured with an oplog size sufficient
    for at least 72 hours under normal loads to allow for fast recovery and SLAs to
    be met even over a weekend.


    ### Read preference


    We introduced the concept of customizable isolation levels when reading data from
    replica sets. Remember that secondary nodes may lag behind the primary, and by
    reading from anything but a primary, we risk reading stale data. In cases where
    this is acceptable, the application can choose to read from other nodes based
    on different performance and latency metrics outlined in Table [1-2](#487346_1_En_1_Chapter.xhtml#Tab2).


    Table 1-2


    Custom read preferences to balance application priorities


    | Goal | Method |

    | --- | --- |

    | Maximize consistency | Use `primary` read preference and `majority` read concern
    to only see writes that will never be rolled back. |

    | Maximize availability | Use `primaryPreferred` to get consistent reads when
    there’s a primary and stale reads when only secondaries are available. |

    | Minimize latency | Use `nearest` to get fast read responses, but with possible
    `stale` results. |

    | Target workloads | Use `secondaryPreferred` with tags to avoid pressure on the
    primary, and control which secondaries are used. |

    | Protect primary | Use `secondary` for special high-impact workloads (such as
    aggregations with no index) so that the primary will `never` be overloaded. |


    We will explore some real-world usages of these read preferences more in Chapter
    [5](#487346_1_En_5_Chapter.xhtml).'
