- fmt: "## Defining zones\n\nWe can imagine zones as a contiguous administrator-defined\
    \ range of shard key values. A zone could initially contain no or few chunks of\
    \ documents, but in large production systems, there could be hundreds or even\
    \ millions of chunks.\n\nIn Figure 6-2, we can see two zones defined for the customers\
    \ in the United States (with country code “US”) and customer from the United Kingdom\
    \ (defined with the ISO 3166-1 standard country code “GB” for Great Britain).\n\
    \nIn this example, we are still assuming that the customer ID field `custId` is\
    \ actually a unique field across the cluster, but because we have a compound shard\
    \ key, there is a chunk region starting with a negative infinity value of `custId`\
    \ for both “US” and “GB” chunks.\n\nNote: In the following diagrams, -∞ is actually\
    \ represented internally as the special BSON value `MinKey` and ∞ by `MaxKey`.\n\
    \n![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig2_HTML.jpg](images/487346_1_En_6_Chapter/487346_1_En_6_Fig2_HTML.jpg)\n\
    \n*Figure 6-2: An example of zones and their chunks*\n\nDefining only two zones\
    \ in our system in this way does not limit us from inserting documents with other\
    \ values for `country` such as for Canada “CA” or France “FR”. It simply means\
    \ that we have no specific zone for documents with these values. We are allowing\
    \ the built-in balancer to define a chunk range and automatically choose a shard\
    \ to store these documents. This happens completely automatically and instantly.\n\
    \nNote that zone ranges may not overlap, and ranges are always inclusive of the\
    \ lower boundary and exclusive of the upper boundary. This makes it obvious to\
    \ all `mongos` routers as to which shard a new document should be inserted.\n\n\
    ## Mapping zones to shards\n\nLet’s imagine that we have three shards available\
    \ in our cluster: one in US-East, one in the EU-West, and one in Singapore. We’re\
    \ mostly concerned with our customers in the United States and the United Kingdom\
    \ at the moment, and we want to make sure that their data is stored inside their\
    \ respective countries. For all other customers, we are happy to have the data\
    \ stored anywhere for now.\n\nNote: A single shard can host multiple zones. Furthermore,\
    \ a zone can be associated with multiple shards.\n\nIn Figure 6-3, we see that\
    \ customers in the United Kingdom and the United States match our zone rules,\
    \ and those zones are each mapped to one particular shard. The customers from\
    \ India (“IN”) and France (“FR”) could be located on any shard. In fact, the chunks\
    \ for France are likely to be migrated to the Singapore shard since that doesn’t\
    \ have as much data.\n\n![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig3_HTML.jpg](images/487346_1_En_6_Chapter/487346_1_En_6_Fig3_HTML.jpg)\n\
    \n*Figure 6-3: Example documents assigned to zones*\n\nNow let’s imagine that\
    \ we launch in India, and due to some new regulations in that country (see Chapter\
    \ 4 on data compliance regulations), we need to keep all Indian customers’ data\
    \ inside the country. We can do that by adding a new zone.\n\n## Adding new zones\n\
    \nWe first need to specify a new zone to constrain documents where `{country:\
    \ \"IN\"}` such as with the following command.\n\n```\nsh.updateZoneKeyRange(\"\
    myDB.customers\",\n{ country: \"IN\", custId: MinKey },\n{ country: \"IN\", custId:\
    \ MaxKey },\n\"IND\");\n```\n\n*Listing 6-1: Define a new zone range named “IND”\
    \ for India*\n\nThe zone itself doesn’t affect the migrations yet since we haven’t\
    \ specified a preference to the balancer for which physical shards these zones\
    \ should be located.\n\nNote: Both `Ops Manager` and the `MongoDB Atlas` managed\
    \ service provide a user interface to help define your zone definitions and assignments.\n\
    \n## Adding new shards\n\nWe now have a zone defined for the Indian customer data.\
    \ Before we can move any data to the Indian zone, we must first create our infrastructure\
    \ there and integrate it into the existing sharded cluster. The steps for this\
    \ are roughly:\n\n1.  Provision new servers or VMs in multiple data centers inside\
    \ the target country.\n2.  Install dependencies, MongoDB binaries, and storage\
    \ systems according to the production checklists and security best practices.\n\
    3.  Build a new replica set with an appropriate name, for example, “`sh-india-1`”.\
    \ This will allow for easier management later as our cluster grows.\n    Note:\
    \ It’s always safest to use an automated tool like `Ops Manager` (Enterprise only)\
    \ or Ansible scripts to avoid human error. See Chapter 7 for more details on deployments\
    \ and Chapter 5 for more details on replica set topologies.\n4.  Pause the balancer\
    \ for now, as we don’t want it to start immediately moving any chunks to this\
    \ shard until zones are properly configured. From a `mongos` run `sh.stopBalancer(\
    \ 10*60*1000 )`.\n    Here we pause for only 10 minutes because disabling the\
    \ balancer for longer periods can also prevent other normal operations such as\
    \ chunk splits.\n5.  Now we connect this new unassigned shard into our cluster.\
    \ From a `mongos` run `sh.addShard(\"sh-india-1/node1.dc0.india.bigcorp.com:27123\"\
    )`.\n6.  Add the zones. From a `mongos` run `sh.addShardToZone(\"sh-india-1\"\
    , \"IND\")`.\n7.  Unpause the balancer allowing chunk migration to start to the\
    \ new shard:\n    From a `mongos` run `sh.startBalancer()`.\n    Note: It’s not\
    \ possible to rename a replica set once it is created, since the name chosen acts\
    \ like a key for members to recognize each other. Therefore, if sets have a specific\
    \ purpose or location, it’s better to give a descriptive name rather than something\
    \ like `rs0`, `rs1`, and so on.\n\n## Gradual balancing\n\nThe balancer process\
    \ has an explicitly low priority in our sharded cluster. We don’t want to impact\
    \ regular workloads by stealing CPU and network resources to quickly balance a\
    \ shard. Shards can be involved in at most one migration at a time, either donating\
    \ or receiving chunks. For example, in a six-shard cluster, you could have up\
    \ to three parallel migrations at a time between pairs of shards.\n\nFor large\
    \ datasets where up to 2TB of data is being moved to a new shard, you may need\
    \ to allow for as long as a week for the data to become fully balanced.\n\n##\
    \ Growing zones\n\nLet’s image that our business has grown strongly in India and\
    \ our original Indian shard is approaching our 2TB data size threshold. We want\
    \ to partition it further to avoid problems in backup and restore times.\n\nWe\
    \ still need to keep our Indian data inside India, so the solution is to deploy\
    \ a *second* Indian shard and balance our data between the two shards. We already\
    \ have a zone definition `\"IND\"` for our Indian documents, so there are less\
    \ steps in growing out:\n\n1.  Provision new servers or VMs in multiple data centers\
    \ inside the target country; install dependencies, MongoDB binaries, and storage\
    \ systems according to the production checklists and security best practices.\n\
    2.  Build another replica set with a consistent name, for example, “`sh-india-2`”\
    \ this time.\n3.  There is no need to pause the balancer, since existing Indian\
    \ data is already constrained inside the country.\n4.  Again we connect this new\
    \ unassigned shard into our cluster:\n    `sh.addShard(\"sh-india-2/node5.dc1.india.bigcorp.com:27123\"\
    )`.\n5.  Link this new shard to the existing Indian zone:\n    `sh.addShardToZone(\"\
    sh-india-2\", \"IND\")`.\n6.  Monitor chunk migration to the 2nd India shard with:\n\
    \    `sh.status()`."
