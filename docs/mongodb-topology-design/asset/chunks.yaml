- fmt: '### Data leaks


    There are a few other potential sources of personal data leaking out of the database
    into other locations.


    #### Sharding


    In a sharded cluster, personal data is stored on the shard nodes. Using geolocated
    sharding, you can control where that data goes. In such cases, you should avoid
    choosing a shard key that includes user data fields such as a social security
    number, for example, `{country: 1, ssn: 1}`. In this case, the values will form
    part of the chunk boundaries and will also be recorded in the sharded cluster’s
    `config` database which may physically reside in another jurisdiction.


    #### Logging


    By default, MongoDB will log any queries that take longer than 100ms to complete.
    When logging a query, the complete query including values is recorded in the log
    allowing for convenient reproduction and optimization. However, when queries are
    on personal data fields, these will also be logged to a potentially insecure log
    file.


    In order to avoid these leaks (in exchange for a small performance hit), it’s
    possible to tell MongoDB to redact any field values from the logs by setting `security.redactClientLogData:
    true` in the node configuration file.


    Once this configuration parameter is set, an insert on a document like `{ "name"
    : "Nic", "SSN" : "123-45-6789" }` would result in a log line as shown in Listing
    4-5.


    ```

    2019-10-07T11:10:02.321+0200 I COMMAND [conn2] command test.clients appName: "MongoDB
    Shell" command:

    insert {

    insert: "###", ordered: "###",

    lsid: { id: "###" }, $db: "###" }

    ninserted:1 keysInserted:1 numYields:0 reslen:45

    locks:{ ... }

    Listing 4-5

    Log output with redaction showing all client values as hashes

    ```


    ### Minimize vulnerabilities


    It is tempting to imagine security breaches as an external hacker gaining access
    to a database through a security vulnerability in a network infrastructure or
    some unpatched software. In contrast, some data breaches can be as simple as improperly
    disposing of a hard drive or could be caused by an insider taking an unauthorized
    copy of personal data and selling it to a third party.


    Remember to properly destroy storage devices, limit access to all databases, and
    remove access as soon as someone leaves the organization.


    ## Summary


    Every application that uses a database to store personal data should employ privacy
    by design. To help ensure that your MongoDB database meets or exceeds the requirements
    for data protection regulations around the world, Table 4-3 lists the major issues
    you need to consider.


    Table 4-3

    A summary of GDPR problems and solutions with MongoDB


    | Requirement | Solution |

    | --- | --- |

    | Lawful and transparent | Ask permission, explain what data is stored, and only
    store personal data required for the service provided. Record what permission
    each user has given. |

    | Integrity and confidentiality | Secure access to the live databases with user
    access controls (e.g., LDAP authorization), x509 certificates, encrypted TLS 1.2+
    connections, firewalls, encryption at rest, restricted access to hosts, encrypted
    network storage and backups, and even field-level encryption.Enable auditing on
    MongoDB to monitor any changes in user permissions. Enable alerts for monitoring
    any important changes so data controllers are immediately aware of any concerns.Notify
    both authorities and users directly if any breaches are detected. |

    | Limit to purpose | Ensure data stored is in scope for the permissions given;
    data should be pseudonymized or anonymized, or purged completely. |

    | Limit to time | Data should not be kept longer than necessary and not longer
    than was communicated to users. Use TTL indexes for live data and rolling removal
    of backups of personal data. |

    | Minimize data stored | When data is no longer useful for the service provided,
    it should be trimmed and only required data kept (i.e., to track purchases for
    tax auditing, or guarantees). |

    | Data accuracy | You have a limited window to update, correct, and deliver personal
    data from the subject upon request, so it''s better to keep data well-structured
    and in one logical location. |

    | Protect data in transit | Encrypt communication between MongoDB members and
    with client applications (via official drivers) and TLS certificates. |

    | Manage data location | Use country-level sharding to keep personal data and
    associated backups inside the country of origin. |

    | Protect data at rest | Encrypt data inside the storage engine, or encrypt the
    entire filesystem. |

    | Right to be forgotten | Ensure that both the live database and backups are purged.
    Consider field-level encryption with individual keys per-user. |

    | Limit sensitive information to authorized users | Enable authentication and
    authorization using SCRAM, Kerberos, LDAP, etc.Use views to redact sensitive fields;
    skip certain individual’s data based on criteria like age, country of residence,
    etc.Define access controls to limit access to source collections to a few trusted
    users. |


    # 5. Basic Topologies


    This chapter walks through common deployment topologies depending on the number
    of data centers available. We address the limitations of each topology and how
    to best configure nodes and backups to optimize availability.


    ## Introduction


    Historically, the first experience that most people have with MongoDB is running
    it locally. You can very easily download MongoDB for free and install it on your
    local PC or Mac. With the Mongo shell, a visual tool like Compass or Studio 3T,
    or through some programming UI, you can be writing and reading data from a MongoDB
    server in minutes.


    Local MongoDB instances are fantastic for developers and researchers who want
    to learn or run experiments, but not suitable for any sort of production workloads.
    As we’ve already discussed, one key strength of MongoDB is its distributed nature.
    The real revolution compared to MySQL or other open source databases is how easily
    and flexibly MongoDB can be scaled out to suit your use case.


    If you are servicing an internal application, to internal customers in a single
    location, then a cluster in a single physical location might be just fine. If,
    by contrast, you’re building a startup with a global audience, you want to be
    able to have their data as close as possible to reduce latency and meet compliance
    obligations (Chapter 4).


    Table 5-1 shows a quick overview of different environments and benefits of increasing
    the number of data centers. Each row adds additional benefits over the row above.


    Table 5-1

    A summary of topologies and use cases


    | Environment | Benefits |

    | --- | --- |

    | Single standalone server | Quick start for prototyping, development, and simple
    testing. |

    | Replica set, One data center | Now any single server can fail without the loss
    of data nor any downtime. |

    | Two data centers | Now an entire data center can be lost permanently without
    loss of data. Manual intervention required to restore writes. |

    | Two data centers (plus cloud arbiter) | Now an entire data center can be lost
    without any application downtime, and writes are still possible. |

    | Three data centers | Now an entire data center can be lost and the application
    can continue writing to a majority of nodes, so that data rollbacks can never
    occur. |

    | Geolocated data centers | Now using geolocalized sharding, data can be stored
    close to users to reduce latency and comply with data protection regulations.
    |'
