    arise.


    ## Ops/Cloud Manager


    A much better approach to any of the preceding manual or custom solutions is to
    use the backup solutions built by MongoDB Inc. MongoDB Enterprise licenses include
    the possibility to use *Ops Manager* or *Cloud Manager*. The Cloud Manager backup
    service can also be bought separately. Both tools perform automated backups and
    support features including scheduled snapshots, point-in-time restores, and queryable
    backups. For replica sets, you can restore to any chosen point of time in the
    last 12–24 hours (depending on your chosen configuration) or use one of the daily,
    weekly, or monthly snapshots.


    ### Point-in-time restores


    This feature fully supports sharded clusters too. The backup system injects synchronized
    time markers into the backups of each replica set, allowing you to perform a **consistent**
    sharded cluster restore to a 15-minute granularity.


    Newer versions of MongoDB and Ops/Cloud Manager leverage the native snapshotting
    ability of the WiredTiger storage engine and can save these snapshots into a S3-compatible
    block store. A copy of the oplog still needs to be kept in order to fill in the
    gap from the last snapshot until the exact time desired for the restore.


    ### Other features


    Even if you have a geopolitical sharded cluster, Ops Manager lets you back up
    each shard to a different location to ensure *compliance* as customer data never
    leaves its country of origin.


    You can also launch a temporary cluster from a backup to perform *partial restores*
    . Queryable backups support ad hoc queries and export subsets of a point-in-time
    snapshot of the cluster. This makes it easy to restore a single collection or
    document.


    Ops Manager gives a fast, cost-effective, and powerful restore mechanism which
    covers all major use cases and can be achieved with just a few steps in the UI.'
  trans: '#### 从从节点创建快照


    如果你希望避免应用程序写入被阻塞哪怕几秒钟，你可以选择改为从从节点创建快照。


    此选项可能产生不一致的备份，因为从节点是异步复制的。图 9-3 展示了一个集群，其中分片 B 的负载较小，因此其复制延迟也较小（5-10 秒，而 *分片 A*
    上是 80-90 秒）。首先 *写入 1* 在分片 A 上执行并得到确认。然后 *写入 2* 在分片 B 上执行。当 10 秒后创建快照时，第二次写入会被记录在备份中，但先发生的写入
    1 在此同一备份快照中不会出现。


    ![../images/487346_1_En_9_Chapter/487346_1_En_9_Fig3_HTML.jpg](img/487346_1_En_9_Fig3_HTML.jpg)


    图 9-3


    从从节点创建的、不一致的分片集群备份


    最佳实践是使用写关注 `majority`。这将确保最近的写入被复制到至少一个从节点。你可以连接到每个分片副本集的当前主节点，并运行 `rs.printSlaveReplicationInfo()`
    来获取每个从节点复制落后的秒数报告。通过选择在集群写入活动非常少的时间段，当从节点能够立即复制时，你更有可能获得整个集群的一致快照。


    针对从节点的操作过程与之前针对主节点的几乎相同。改为锁定分片的从节点，但仍然锁定配置服务器的主节点，然后以相反的顺序解锁它们。


    #### 恢复正常操作


    现在所有快照都已完成并且所有节点都已解锁，你可以通过连接到任意一个 `mongos` 并运行 `sh.setBalancerState(true)` 来重新启用均衡器。


    ### 从快照恢复的步骤


    手动从文件系统快照恢复一个分片集群也是一个复杂的过程。恢复阶段的关键点如下。


    #### 关闭集群


    由于我们将用恢复的版本替换磁盘上的数据文件，因此必须完全关闭分片和配置服务器副本集的所有 `mongod` 和 `mongos` 实例。


    #### 恢复配置服务器


    首先恢复配置服务器副本集的快照。根据创建快照时使用的 LVM 或云配置类型，这会有所不同。通常你会将快照挂载到一个临时挂载点，然后复制数据文件以替换现有 `dbPath`
    中的文件。


    然后，通过注释掉配置文件中的 `replSetName` 和 `clusterRole`，将一个配置服务器节点作为独立实例启动。


    一旦该节点启动，使用 Mongo shell 连接到它，并删除 `local` 数据库，因为它包含来自原始节点的特定于实例的数据：


    ```

    use local

    db.dropDatabase()

    ```


    当在具有相同主机名和节点端口的同一集群上恢复时，不需要更改配置。但如果你是作为测试的一部分恢复到不同的主机，或者是为了“迁移”现有集群，你将需要更新 `config.shards`
    集合中的主机名。仔细按照文档操作以确保正确至关重要。


    现在是重启配置服务器副本集的时候了，从一个节点开始。首先，关闭我们作为独立实例启动的 `mongod`。通过取消注释那些行来恢复 `replSetName`
    和 `clusterRole` 设置。


    我们在删除 `local` 数据库时有效地移除了副本集配置。我们现在应该使用以下命令初始化副本集：


    ```

    rs.initiate()

    ```


    这会创建一个包含一个成员的副本集。


    现在我们可以清空 `dbPath` 并启动其他配置服务器节点。然后我们使用 `rs.add(...)` 在已打开的 Mongo shell 连接上将它们添加到集合中：


    ```

    rs.add("config2.bigDB.bigcorp.local:27019")

    rs.add("config3.bigDB.bigcorp.local:27019")

    ```


    然后它们将通过初始同步复制已恢复的数据副本。


    #### 恢复分片


    我们现在需要恢复每个分片的副本集。我们遵循与恢复配置服务器集相同的步骤，但除了删除 `local` 数据库外，我们还需要创建一个临时管理员用户来清理其他一些元数据。我们将
    `mongod` 作为单节点副本集重新启动，并添加任何其他成员，允许它们从分片初始同步数据。详细步骤记录在 *恢复分片集群*^(¹⁰) 在线文档中。


    #### 恢复 mongos 路由器


    最后，启动你的 `mongos` 节点，新恢复的分片集群应该就可以使用了。


    ### 结论


    分片集群备份很复杂，但可以使用开源工具实现。人为错误始终存在风险，因此最好开发尽可能自动化此过程的手册或脚本。备份和恢复都应该定期测试，以确保系统按预期工作，并且在需要时能够尽快完成恢复。


    ## Ops/云管理器


    比上述任何手动或自定义解决方案好得多的方法是使用由 MongoDB 公司构建的备份解决方案。MongoDB 企业版许可证包含使用 Ops Manager 或
    Cloud Manager 的可能性。云管理器备份服务也可以单独购买。这两个工具都执行自动备份，并支持包括计划快照、时间点恢复和可查询备份在内的功能。对于副本集，你可以恢复到过去
    12-24 小时内（取决于你选择的配置）任何选定的时间点，或使用每日、每周或每月的快照之一。


    ### 时间点恢复


    此功能也完全支持分片集群。备份系统将同步的时间标记注入到每个副本集的备份中，允许你执行粒度为 15 分钟的一致分片集群恢复。


    新版本的 MongoDB 和 Ops/云管理器利用 WiredTiger 存储引擎的原生快照能力，并可以将这些快照保存到 S3 兼容的块存储中。仍然需要保留
    oplog 的副本，以填补从上次快照到所需恢复确切时间之间的空白。


    ### 其他功能


    即使你拥有地缘政治的分片集群，Ops Manager 也允许你将每个分片备份到不同的位置，以确保合规性，因为客户数据永远不会离开其原产国。


    你还可以从备份启动临时集群以执行部分恢复。可查询备份支持临时查询，并导出集群时间点快照的子集。这使得恢复单个集合或文档变得容易。


    Ops Manager 提供了一种快速、经济高效且强大的恢复机制，涵盖了所有主要用例，并且只需在 UI 中执行几个步骤即可实现。'
- fmt: '## Key takeaways


    From this chapter, the key concepts to remember are as follows:


    *   Incremental copies of the entire MongoDB data path can be taken using a low-impact
    LVM snapshot feature. Cloud computing storage (like EBS volumes) also provide
    a similar snapshot feature.


    *   Backups of individual nodes can be taken via a `mongodump`, a filesystem-level
    copy, or snapshot as long as nodes are stopped or writes are flushed first.


    *   For GDPR compliance, backups should be kept in the same country as their source
    shards.


    *   Restoring from filesystem snapshots can often be slow due to bandwidth and
    reading from incremental copies.


    *   Restoring from a `mongodump` can also take a long time since indexes are not
    included in the dump and must be rebuilt after the data is restored.


    *   Backing up entire sharded clusters in a consistent state with community tools
    requires a temporary pause in the write-load.


    *   Sharded clusters can be backed up live with no workload impact using Enterprise
    tools like Ops and Cloud Manager.


    *   With Enterprise backup, replica sets can be restored to any point in time
    and sharded clusters to any 15-minute interval in time.


    *   Enterprise tools also allow queryable backups to restore just one collection
    or even a single document from a particular point in time.


    Footnotes [1](#487346_1_En_9_Chapter.xhtml#Fn1_source)


    # 10. Advanced Sharding


    In this chapter, we expand the discussion on sharding by planning for deployments
    with very large datasets or extensive write workloads. We review challenges for
    sharding in these cases and explore methods to avoid or mitigate problems as the
    data grows.


    Since we are working with shards, all examples and commands shown in this chapter
    must always be run through a `mongos` instance and never directly on the shards
    themselves.


    ## Indications for sharding


    There are a few different options for scaling depending on the size of the data
    and the access patterns. If you have a “small” database of less than 2TB of data,
    then a replica set is normally the best topology since it avoids the overhead
    of sharded clusters.


    If your application is `write-heavy` and you are seeing that the primary’s input/output
    operations per second (`IOPS`) are exceeding the storage layer’s capacity, then
    increasing the storage throughput is the best approach to scaling up. If the application
    is doing many `small random reads`, this can mean that there is not a clear working
    set, and in such situations the bottleneck can be both seek times on storage and
    also limited memory.


    MongoDB will cache documents in memory, so if you have a certain set of common
    documents (in our ecommerce example this might be active shoppers and the list
    of the 10k most popular items in the shop), then the memory resources for the
    nodes should be sufficient to keep these documents in the memory cache.


    ## Shard keys


    As we discussed in Chapters [1](#487346_1_En_1_Chapter.xhtml) and [6](#487346_1_En_6_Chapter.xhtml),
    choosing the optimal shard key can be a difficult design decision in balancing
    the needs for equalized data distribution, minimizing balancing operations, and
    maximizing how queries can target a single shard as much as possible.


    ### Hot shards


    If your shard key is configured so that most inserts for a given point in time
    are all routed to the same one shard, then that shard is called the `hot shard`.
    Be careful to avoid `hot shards` because they hurt overall throughput and lead
    to problems with rebalancing.


    #### Effects on throughput


    Routing everything to a single shard removes all the benefits of a sharded cluster
    in that a single primary is processing all the write workload. Ideally, we want
    all writes (inserts, updated, and deletes) to be equally distributed to all shard
    primaries at all times.


    In Figure [10-1](#487346_1_En_10_Chapter.xhtml#Fig1), an application is inserting
    documents with auto-generated `UUID`s which are based on the current time. As
    a result, all of them fall into the range of `533000001` to `B200000` and are
    being sent to Shard B.


    ![../images/487346_1_En_10_Chapter/487346_1_En_10_Fig1_HTML.jpg](images/487346_1_En_10_Chapter/487346_1_En_10_Fig1_HTML.jpg)


    Figure 10-1. All write workload goes to a hot shard


    #### Rebalancing effects


    Not only does a `hot shard` slow down bulk import throughput, but it also requires
    these documents to be migrated elsewhere. As shown in Figure [10-2](#487346_1_En_10_Chapter.xhtml#Fig2),
    for 300GB written to a `hot shard`, the balancer will need to read 200GB again
    from that shard in order to write 100GB to each of the other shards.


    ![../images/487346_1_En_10_Chapter/487346_1_En_10_Fig2_HTML.jpg](images/487346_1_En_10_Chapter/487346_1_En_10_Fig2_HTML.jpg)


    Figure 10-2. Worst-case scenario when importing into a hot shard


    By writing once directly to each shard, the `I/O` impact is only writing 300GB
    in total, as opposed to 500GB writing and 200GB reading. Figure [10-3](#487346_1_En_10_Chapter.xhtml#Fig3)
    shows this best-case scenario.


    ![../images/487346_1_En_10_Chapter/487346_1_En_10_Fig3_HTML.jpg](images/487346_1_En_10_Chapter/487346_1_En_10_Fig3_HTML.jpg)


    Figure 10-3. Best case where each shard receives equal data with no migration


    ### Unique values


    In all `MongoDB` collections, the `_id` field acts like a primary key and always
    has a corresponding index with a unique constraint. This prevents any two documents
    sharing the same `_id` value in a standalone or replica set. When sharding, it’s
    important to understand that unique constraints are `local` to each shard. Imagine
    you created two unique indexes in your collection with


    ```

    db.members.createIndex( { "userName": 1 }, { unique: true } )

    db.members.createIndex( { "uuid": 1 }, { unique: true } )

    ```


    and then sharded with one of those:


    ```

    sh.shardCollection("myDb.members, { "uuid": 1}, true)

    ```


    The third parameter in `shardCollection` here tells the sharding system to maintain
    a unique constraint on this shard key. So now we have ensured that `uuid` values
    are unique both within each shard and at the cluster level.


    However, we have no such constraint on `userName` `at the cluster level`. Imagine
    that two new users signed up simultaneously from two different application servers
    and chose the `same` username. We would effectively see two inserts coming up
    through one or multiple `mongos` instances:


    ```

    db.members.insertOne({ _id: ObjectId(...123),

    uuid: "0123-abcd...", userName: "logikewl", ...)

    db.members.insertOne({ _id: ObjectId(...456),

    uuid: "4567-efab...", userName: "logikewl", ...)

    ```


    As you can see, the auto-generated `_id` value and the application-generated `uuid`
    values are both unique as expected. Since we have sharded on `uuid`, it’s quite
    likely that these two inserts are sent to different shards. Let’s say the first
    goes to Shard A and the second to Shard B (see Figure [10-4](#487346_1_En_10_Chapter.xhtml#Fig4)).
    It’s also likely that there is no other user with that username, and so both inserts
    succeed at the shard level, but we now have two `members` in our system with the
    same username.


    ![../images/487346_1_En_10_Chapter/487346_1_En_10_Fig4_HTML.jpg](images/487346_1_En_10_Chapter/487346_1_En_10_Fig4_HTML.jpg)


    Figure 10-4. Unique constraints at the shard level can be violated


    Note


    The `highly` random nature of the `ObjectId` data types means that it is extremely
    unlikely for the preceding scenario to insert two documents with the same value
    for `_id`.'
