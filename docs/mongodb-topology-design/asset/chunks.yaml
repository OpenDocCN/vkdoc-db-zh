  trans: '# 再平衡集合


    那么，我们如何处理一个不平衡的集群，例如当一个分片的大小是其他分片的两倍时？在某些情况下，最简单的选项可能就是给分片 A 中的主机分配额外的资源。额外的 CPU
    核心和内存应该能让这些主机处理额外的工作负载，为这个未分片的集合提供服务。但最终我们得到了混合的主机类型，这使得管理和扩展变得复杂。


    我们也不希望对非常小的集合进行分片，因为平衡它们的数据和管理这些集合的元数据会有一些额外的开销。不过，最糟糕的缺点是，我们必须将某些查询（那些不包含分片键的查询）路由到*所有*分片，并执行*分散-聚集查询*，其速度与当时最慢的分片一样慢。


    在这种情况下，如果我们选择对 `mediumColl1` 进行分片，我们将从分片 A 迁移 200GB 数据到分片 B 和分片 C 各一份。


    ## 移动主分片


    在您拥有多个逻辑数据库的情况下，MongoDB 会自动将任何新数据库的主分片分配给一个未充分利用的分片。但是，如果您从只有一个分片开始，并随时间推移添加了额外的分片，主分片**不会**自动重新分配到新的分片上。您将让所有未分片的集合都存放在原始分片上。图
    10-7 展示了一个例子，其中新分片每个分片的数据少了 400GB。


    ![../images/487346_1_En_10_Chapter/487346_1_En_10_Fig7_HTML.jpg](img/487346_1_En_10_Fig7_HTML.jpg)


    图 10-7


    一个扩展后的集群，未分片集合位于分片 A 上


    要手动重新平衡未分片集合的负载，您可以使用 `movePrimary` 命令，将特定数据库的主分片重新分配到您选择的分片上。在上面的例子中，可以通过以下命令实现：


    ```

    db.adminCommand( { movePrimary : "db2", to : "shardB" } )

    db.adminCommand( { movePrimary : "db3", to : "shardC" } )

    ```


    ## 额外的分片


    在图 10-8 中，我们看到一个类似的分片集群，但包含两个逻辑数据库。在这个例子中，`db1` 的主分片在分片 C 上，而 `db2` 的主分片存放在分片
    A 上。这里有三个分片集合：`db1.bigColl1`、`db2.bigColl1` 和 `db2.bigColl2`。


    ![../images/487346_1_En_10_Chapter/487346_1_En_10_Fig8_HTML.jpg](img/487346_1_En_10_Fig8_HTML.jpg)


    图 10-8


    一个相对均衡的分片集群


    在这个例子中，我们的分片 A 数据量略高于建议的分片大小阈值，我们应该考虑向此集群添加一个额外的分片。如果我们这样做，这三个大型分片集合将自动均匀分布，并且大约
    0.5TB 的数据将从当前三个分片迁移到新的第四个分片。


    这个迁移过程可能需要几天时间，因为它被赋予了较低的优先级，以确保迁移不会影响正常的应用程序或复制流量。


    # 限制平衡操作的影响


    在向集群添加分片后，我们需要规划和管理由此产生的数据块迁移**工作负载**，以确保它不会对已经负载的集群产生负面影响。


    在**网络**接近饱和、可用容量有限的情况下添加分片时，我们也应小心，尤其是在业务时间内数据中心之间的带宽已经饱和时。


    一个简单的方法是使用**内置的平衡器时间窗口**，它允许您选择一个每天固定的时间窗口，在此期间允许进行数据块传输。


    例如，在代码清单 10-2 中，我们激活了一个每天凌晨 1 点到 6:30（服务器当地时间）的时间窗口，每周七天皆如此。


    ```

    use config;

    db.settings.update(

    { _id: "balancer" },

    { $set: { activeWindow :

    { start : "01:00", stop : "06:30" } } },

    { upsert: true }

    )

    代码清单 10-2

    激活内置的平衡窗口

    ```


    # 周末工作负载


    许多应用程序有特殊的周末工作负载。有些几乎没有用户流量，可以安全地仅在周末运行平衡器。另一些则有特殊的加载、转换或分析工作负载，因此希望完全避免任何平衡操作。对于这些情况，一个外部的
    `cron` 作业或触发器可以使用 Mongo shell 脚本来随意开关平衡器：


    ```

    mongo --uri mongodb://U:P@mongos1.bigcorp.local:27017/config

    --authenticationDatabase admin

    --eval "sh.startBalancer()"

    ```


    同样的方法可以用来停止平衡，使用 `sh.stopBalancer()`。


    注意


    从 MongoDB 4.2 开始，停止平衡器也将停止数据块的自动分裂。当平衡停止时，此更改实际上会停止配置服务器副本集上的几乎所有写入工作负载。


    # 管理存储


    管理员最关心的问题之一是确保不断增长的数据库的主机有足够的存储空间。意外耗尽可能导致停机甚至数据损坏。


    ## 最大存储大小


    在某些情况下，控制每个分片的最大数据量是有用的，允许不对称的分片大小，而无需使用分区显式控制数据块范围。在向现有集群添加新分片时，新的主机通常具有更大、更快的存储设备。我们希望避免填满较旧、较小的分片，因为磁盘空间不足可能导致数据损坏和许多其他问题。


    例如，我们可以通过运行以下命令为我们的分片 A 设置最大大小为 1TB（1,048,576 MB）：


    ```

    config = db.getSiblingDB("config")

    config.shards.updateOne( { "_id" : shardA"},

    { $set : { "maxSize" : 1048576 } } )

    ```


    如果接收数据块会超过此配置的最大存储大小，平衡器将不会考虑将任何分片作为该数据块的接收者。


    ## 确定实际存储大小


    磁盘上的实际使用大小甚至在同一个分片副本集的成员之间也会有所不同。最近进行初始同步或 `compact` 的成员，其实际使用的存储空间可能比长期运行、存储可能严重碎片化的节点小得多。


    WiredTiger 使用一种非覆盖写算法，它实际上不会覆盖旧的文档版本，而是找到一个未使用的块并重新利用它。被删除的文档将打开新的块以供将来可能的重用。由于文档可能保留对文件不同部分的内部引用，就地压缩方法并不总能回收大量空间。


    如果空闲空间是一个严重的问题，并且您最近**删除了**大量文档或添加了更多分片并**迁移了数据**，最好的方法是依次在分片的每个成员上触发*滚动初始同步*。


    要检查每个成员实际使用的存储空间，请遍历所有数据库，然后运行 `db.stats()`，并将 `storageSize`（这是不包括索引的压缩数据文件大小）和
    `indexSize`（这是此数据库上所有集合的所有索引的总和）的值相加。'
- fmt: '## Key takeaways


    From this chapter, the key concepts to remember are as follows:


    *   Sharding is a great way to expand write capacity in a deployment, but a good
    shard key is necessary to avoid excessive rebalancing through migration.

    *   Shard keys should include any unique constraint if that constraint must be
    maintained cluster-wide.

    *   Shard keys starting with incrementing values such as a date, timestamp, or
    `ObjectId` should be avoided since they lead to “hot shards” and rebalancing.

    *   Hashed shard keys can be good at distributing writes equally between shards,
    but make range queries inefficient.

    *   For import workloads (such as migrations from legacy databases), it can be
    more efficient to pre-split chunks and allow them to distribute evenly between
    shards before data loading.

    *   There are other tricks to predistribute chunks to avoid loading data into
    a “hot shard.”

    *   Each database keeps its unsharded collections on a single shard, and it’s
    possible to move these to another shard to fix shard imbalances.

    *   All operations to change shard configuration should be done via a `mongos`,
    with the balancer disabled and during scheduled maintenance windows to avoid unexpected
    application behavior.


    ## 11. Extreme Sharding


    This chapter goes even deeper into sharding specifics and introduces configurations
    that can increase write throughput when faced with hardware constraints. We also
    look at partitioning user data to adhere to data protection regulations, minimize
    costs, and optimize reads across shards.


    ### Review


    In most cases, a sharded cluster without zones or other size restrictions will
    automatically balance chunks of data by migrating them from a “heavy” shard with
    too many chunks to one with fewer chunks.


    #### More shards


    If you start hitting performance issues and have ruled out any application or
    schema design issues, a good option is to add more shards. This will offload data
    from the preexisting shards, lightening their workload and working set size in
    the memory cache.


    A poor choice of shard key leading to hot shards (as described in Chapter 10)
    will not scale regardless of how many shards are added. Adding migration workload
    to a system already in distress will also make short-term performance worse.


    If adding new hosts and shards is not an option, or if the current shards are
    not automatically balancing, then there can be certain manual adjustments made
    to force a more balanced workload.


    #### Advanced chunk splitting


    MongoDB will automatically trigger a split of large chunks during an insert into
    that chunk range or before migrating that chunk. We can force splits if we want
    to make certain chunks artificially smaller. Reasons for doing this might be that
    we are about to import lots of data into that range and want to ensure that the
    inserts will be distributed more equally across all shards.


    Once the split is done (either automatically or manually), the balancer may migrate
    that chunk to another shard. Remember that we can use `sh.status(true)` to see
    exactly where all chunks are currently stored.


    There are two ways to manually split up a chunk:


    *   `sh.splitFind()` finds a chunk and splits it into two roughly equal chunks.

    *   `sh.splitAt()` finds a chunk with a given value and splits *exactly* at this
    point.


    Let’s make this clear with two examples. In Figure 11-1, we split a chunk with
    `sh.splitFind("myDb.customers", {custId: 9000})`. This first finds the chunk containing
    a document with customer ID of `9000` and then splits that chunks into two equal
    parts.


    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig1_HTML.jpg](images/487346_1_En_11_Chapter/487346_1_En_11_Fig1_HTML.jpg)

    Figure 11-1 `splitFind` splits into two roughly equals chunks


    In Figure 11-2, with `sh.splitAt("myDb.customers", {custId: 9000})`, that same
    chunk is split up at that exact value, giving us two chunks of very different
    sizes (600KB vs. 5MB). This might be appropriate if we’re about to import some
    data into that point or need to control the shard of some special customers in
    that range.


    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig2_HTML.jpg](images/487346_1_En_11_Chapter/487346_1_En_11_Fig2_HTML.jpg)

    Figure 11-2 `splitAt` splits exactly at the specified shard key value


    In terms of performance, `splitAt` is lighter weight and should be used in scripts
    when pre-splitting in preparation for data loading. `splitFind` tries to calculate
    the median point of values in the chunk to create equal size chunks. The fetching
    of documents and calculation requires both I/O and CPU.


    ### Shard key scenarios


    When choosing a shard key, there may be competing goals but not all of which can
    be satisfied in all cases. For example, we may want to optimize by reducing the
    *average load* of read queries, or we might want to reduce the *latency* of writes
    by using geolocated shards, or make *writes* of bulk data as fast as possible
    to complete by distributing writes most equally.


    We’ll examine each of these cases and review the best shard key and topology combinations.'
