  trans: '

    ### 超融合基础设施


    （在撰写本书时）另一项相对较新的技术是 `hyperconverged infrastructure`（HCI，超融合基础设施）。这种方法的目标之一是让组织能够构建两个或多个数据中心，并无缝维护所有计算资源的冗余副本。如果一个数据中心突然发生故障，系统将自动在剩余的数据中心中启动所有服务的替换实例。这要求数据中心之间的数据通过
    `storage area network`（存储区域网络）始终能被即时、透明地复制到其他数据中心。


    组织可能会倾向于依赖超融合框架来维持数据库正常运行时间的服务水平目标（SLO），但将 MongoDB 的高可用复制系统与超融合结合使用既存在问题，又过于冗余。


    MongoDB 本身已包含所有数据中心和网络状态感知功能，但它是专门为管理结构化文档而设计的。应用程序可以通过写关注点和读关注点来控制其冗余级别，这提供了比
    HCI 更加细粒度的控制。


    在生产环境中，MongoDB 可以安装在超融合基础设施内部，但应禁用其内置的存储复制功能。MongoDB 将自行处理复制，而来自 HCI 的额外负载和延迟并不能带来任何额外收益。


    此外，如果 MongoDB 集群已针对容错性（参见第 2 章）和全局拓扑（参见第 6 章）进行了正确配置，那么丢失单个数据中心不应影响应用程序。因此，在故障发生后立即启动新的替换节点并非必要，如果该节点需要进行初始同步，还可能增加额外负载。


    ### 生产环境要求


    您所用 MongoDB 版本文档中的 `Production Notes`（生产环境说明）是权威参考，其中说明了如何最佳配置服务器以优化 MongoDB 的稳定性和性能。


    这些说明涵盖了诸如文件系统所需权限、如何设置日志（journal）和日志文件（logs）路径以避免磁盘 I/O 冲突、网络安全、WiredTiger 缓存设置和压缩、内存配置（包括
    NUMA 和禁用透明大页）、为文件系统使用 XFS 和 `noatime`、正确的网络设置（压缩、TCP 保活等）、优化虚拟机（内存交换）以及如何使 SELinux
    正常工作等内容。


    这些设置大多依赖于具体的操作系统和版本、可用硬件以及任何虚拟化环境，因此没有官方预制的虚拟机镜本或脚本来准备环境。需要由系统管理员确保为将要运行 MongoDB
    节点的服务器进行正确设置。


    #### 标准化服务器


    大多数组织选择为其整个集群（配置服务器、`mongos` 实例和分片节点）运行标准化服务器。即使内存和存储设备的规格不完全相同，主机至少应具有完全相同的操作系统版本和安全设置。


    有任意数量的自动化和编排工具可以以标准化、可重复的方式构建、准备和升级服务器，从而轻松替换或添加新服务器，以满足数据库随时间增长的需求，或在硬件故障需要更换时使用。


    操作系统升级也应以经过准备、可控的方式进行，理想情况下只需很少或无需人工步骤即可完成。


    这样，配置至少在整个集群中保持一致，在排除运行在其上的 MongoDB 组件的任何行为或性能变化的故障时，我们可以排除服务器级别的配置错误。


    ### 操作系统选择


    虽然 MongoDB 已被开发为可在多种流行架构和操作系统上以高性能、生产就绪的配置运行，但在生产环境中广泛使用的只有少数几种。这些包括企业级 Linux（Red
    Hat、CentOS、Oracle、SUSE、Ubuntu Server LTS）和 Windows。


    #### 云变体


    对于在自管理云主机上运行的用户，Amazon Linux 等系统也很受欢迎，因为这些镜像已经针对特殊的虚拟存储和网络实现进行了优化配置。不幸的是，它们通常是旧版
    Linux 的分支，配置文件的位置和包含的软件包可能与标准有显著差异。这种差异使得管理混合本地和云环境变得更加困难。


    由于您可以找到大多数企业级 Linux 风味版的官方云镜像，或许最好保持相同的操作系统，但增加特定于云的配置任务，例如将云存储设备配置得与本地硬件 RAID
    不同。


    #### 旧版 RHEL 版本


    一些旧版企业 Linux 可能包含已知的安全或稳定性问题。通常，您应计划在 Red Hat 发布下游版本后一年内升级到最新版本。


    例如，如果您通过操作系统的 OpenLDAP 库使用原生 LDAP，则强烈建议至少使用 RHEL 7.5。在这个版本中，OpenLDAP 切换到了 OpenSSL
    实现，这带来了重要的线程安全性。


    MongoDB 仅为企业版或 LTS（长期支持）版本提供官方软件包。其他操作系统版本的支持生命周期不够长。


    ### 虚拟机


    如果您需要运行多个较小的 MongoDB 节点（例如用于 `mongos` 或配置服务器节点），可能会倾向于将它们共同部署在一台服务器上，或在同一台虚拟机上使用不同端口运行。然而，在排除此类系统的故障时的复杂性以及确保两个进程以最佳方式共享系统资源的难度要大得多。


    更好的做法是首先设置一个虚拟机主机，并部署具有固定资源（即禁用内存气球驱动）的多个虚拟机。


    ### Kubernetes


    然而，对某些组织来说，虚拟机已经过于笨重难以管理。许多企业已将其生产应用程序迁移到基于 Kubernetes 的基础设施上，如 Amazon EKS 和 OpenShift。


    从历史上看，在 Kubernetes 生态系统中，无法部署具有持久存储的 Pod，这些存储无法在某些 Pod 移动或硬件故障后保留，这使其不适合数据库部署。随着
    `PersistentVolumes`（持久卷）和 `StatefulSets`（有状态集）的引入，现在可以移动 Pod 而不会丢失数据或需要执行完整的初始同步。


    #### 操作符


    可以使用 `Kubernetes Operators`（Kubernetes 操作符）将 MongoDB 打包、部署和管理为 Kubernetes 原生应用程序，本质上充当一个自定义控制器。


    MongoDB 企业版许可证包含对 Kubernetes 操作符的访问权限，该操作符与 Ops/Cloud Manager 配合可以部署适当的 `Kubernetes
    Resource Containers`（Kubernetes 资源容器），然后在其上部署 `MongoDB Database Resources`（MongoDB
    数据库资源）。本质上，您可以在 Kubernetes 环境中正确自动化 MongoDB 副本集和分片集群。


    提示


    在 Pod 内部运行应用程序或微服务时，务必在连接字符串中设置 `appName`。此应用程序名称将出现在日志文件中，并且由于 Pod 重新分配时 IP 地址可能会更改，这个唯一的名称有助于将记录的问题追溯回生成它的应用程序。


    ### 工具


    `Infrastructure as code`（IaC，基础设施即代码）是通过机器可读的定义文件或脚本来管理和配置主机的过程，这些文件或脚本易于进行版本控制和测试。它是一种将容易出错的手动配置流程（如运行手册）封装到软件代码中的方法，使实际部署变得精简、可靠且无限可扩展。当今最常见的
    IaC 工具是 Terraform。


    `Continuous configuration automation`（CCA，持续配置自动化）工具可以被视为 IaC 框架的扩展，但也包括在托管主机之上
    `provisioning`（供应）和配置应用程序及服务。

    '
- fmt: '### Configuration management


    We''ll quickly review some of the most popular configuration management and automation
    tools: `Ansible`, `Puppet`, and `Chef`. All three tools are open source, very
    widely used, well documented with great community contributions, but also offer
    optional paid Enterprise support. They can also work with tools like `Terraform`
    to provision the host infrastructure prior to configuration.


    Other notable alternatives are `SaltStack` and `Pulumi`.


    ### Ansible


    `Ansible` (first released in 2012, and acquired by Red Hat, Inc. in 2015) is an
    automation platform that allows you to deploy your `MongoDB` installation and
    configuration in a simple, repeatable manner. Its paradigm is about configuring
    simple rules, grouped in fixed-order steps and templates, rather than coding scripts
    in a procedural language.


    It uses `SSH` to connect from a workstation to multiple remote machines without
    requiring any special agents on the remote hosts, just its own `SSH` keys.


    `Ansible` is simple to get started, with a wide user base and lots of examples
    online. It is also easy to keep changes in source control. However, it''s hard
    to test changes and may require many runs to debug complex tasks grouped into
    `playbooks`.


    ### Puppet


    `Puppet` (first released in 2005) is model-driven, statically checked, and was
    built with systems administrators in mind. It follows a client-server (or agent-master)
    architecture. A commercial version, `Puppet Enterprise`, is available through
    `Puppet Labs`.


    The `Puppet` master compares the current state of the target machine against the
    machine-level configuration details and then sends instructions to the conversion
    layer for action. An agent checks regularly for changes and triggers updates.


    A module called `puppet/mongodb`^([⁶](#fn6)) (maintained by `Puppet Labs` and
    the open source community) manages server installation and configuration of the
    `MongoDB` processes, as well as `Ops Manager` setup. This module has an advanced
    and complete feature set, including a `mongodb_shard` provider which allows definition
    of shards and their members. At the time of writing, it supports `RHEL/CentOS
    5/6/7` and `Ubuntu 10` and `12`, as well as `Debian 6` and `7`.


    `Puppet` is a bit more complex than some other management tools (such as `Chef`
    and `Ansible`), but it has a lot of modules that can be used to resolve issues
    around database management.


    ### Chef


    Like `Puppet`, `Chef` (first released in 2009) compares host resources against
    a desired state before making changes on a `Chef` node. Unlike `Ansible`, it requires
    a `Chef client` to be installed on each remote host in order for that host to
    become a `Chef node`.


    Configuration is written into `Chef recipes` which are grouped together as `cookbooks`
    for easier management. An open source cookbook, `SC-MongoDB Cookbook`^([⁷](#fn7)),
    is the most advanced preexisting cookbook for `Chef` and is currently under active
    development.


    ### On-prem comparison


    Any of the three tools presented can be used to prepare dependencies and deploy
    complex `MongoDB` deployments. Table [7-2](#487346_1_En_7_Chapter.xhtml#Tab2)
    compares some of the key differences which may help choosing between them based
    on your platform and infrastructure preferences.


    Table 7-2

    A comparison of configuration management tools


    |   | Ansible | Puppet | Chef |

    | --- | --- | --- | --- |

    | Architecture | Pushes config (from single node) | Pull (Master-slave) | Pull
    (Master-slave) |

    | Configuration paradigm | Declarative (Plays and Playbooks) | Procedural (Tasks
    and Plans) | Procedural (Recipes and Cookbooks) |

    | Update paradigm | Step-based | Idempotent and state-based | Idempotent and state-based
    |

    | Remote requirements | SSH daemon only, no agent | Master server + Puppet agent
    | Master server + Chef agent required |

    | Security | SSH key + user privileges | Certificate | SSL and shared secrets
    |

    | Getting started | Easy | Harder | Harder |

    | Complex tasks | Hard to debug | Powerful | Possible |

    | Platform | Python/pip | Ruby/gem | Ruby/gem |

    | Supported OSes (remote) | Master: Linux/BSD with Python<br>Remote: any POSIX
    with Python, and Windows | Master: Enterprise Linux, Ubuntu, SUSE<br>Remote: Linux,
    macOS, Windows, Solaris, and many others | Workstation: RHEL, Ubuntu, Windows,
    macOS<br>Server: Enterprise Linux, Ubuntu<br>Node/remote: AIX, Linux, BSD, Windows,
    macOS |

    | Best suited | Initial setup on top of prebuilt VM images or Docker | Regularly
    changing environments. Where compliance is important. | Regularly changing environments
    |


    ### Automation


    Often the goal of `CM` tools is to standardize and avoid human errors when deploying
    new hosts and software stacks. With some additional effort, this configuration
    code can be extended to tear down, move, and scale systems over thousands of nodes,
    running on different underlying hardware/cloud and on different operating systems.


    With awareness of entire systems and dependencies between components, automation
    can be made to orchestrate changes in a consistent way, for example, to ensure
    that multiple nodes from the same replica set aren''t taken down at the same time.


    ## Provisioning and orchestration


    Before we can configure our `MongoDB` environments and deployments, we may first
    want to automate provisioning of the hosts. In some cases, we may also need to
    provision networking infrastructure, storage, and even load balancers.


    For most deployments, `Terraform` is currently the winner in the `infrastructure-as-code`
    space both for provisioning reproducible on-prem as well as cloud-agnostic infrastructure.


    ### Terraform


    While `Terraform` can also perform configuration, it is currently better to use
    targeted configuration management tools like `Ansible`, `Puppet`, or `Chef`. Like
    most `CM` tools, all `Terraform` configuration files can be easily version controlled.
    Custom `Provider` plug-ins can be created in the `Go` programming language.


    While possible to use in a free Community version, the maintainer `HashiCorp`
    sells an Enterprise version with support.


    #### Purpose


    `Terraform` monitors the state of the environment, and if anything is out of order
    or missing, it can automatically provide a replacement resource. This is fantastic
    for environments that require a very steady state.


    #### Cloud infrastructure


    `Terraform` can communicate via cloud provider APIs using standard API keys, in
    much the same way as on-prem master servers.


    #### Official provider for Atlas


    `MongoDB Inc.` in conjunction with `HashiCorp` has created an `official provider`
    that is designed for `MongoDB''s Atlas` fully hosted solution. Currently, there
    is no official plug-in for using `Terraform` with non-Atlas on-prem `MongoDB`
    deployments.


    While it''s possible to create a custom or community provider yourself, this can
    be a very complex undertaking, to build and test a provider. As such, using `Terraform`
    alone for on-prem `MongoDB` deployments is not an ideal approach at this time.


    #### Integration with Ansible


    `Terraform` can call `Ansible` configuration (via `Packer`) to automate the building
    up of machine images with `MongoDB` and dependency packages, and configuration
    files at the `OS` level. `Terraform` can add special tags to your servers for
    `Ansible` to find and configure each one accordingly.


    In the other direction, `Ansible` can also be hooked in to the workflow, calling
    `Terraform` to launch multiple computing instances based on images already built
    by `Ansible`. Often some final steps will be required post-provisioning to actually
    deploy cluster-specific `MongoDB` configuration and launch the instances.'
  raw: '### Configuration management


    We’ll quickly review some of the most popular configuration management and automation
    tools: *Ansible*, *Puppet*, and *Chef*. All three tools are open source, very
    widely used, well documented with great community contributions, but also offer
    optional paid Enterprise support. They can also work with tools like Terraform
    to provision the host infrastructure prior to configuration.


    Other notable alternatives are SaltStack and Pulumi.


    ### Ansible


    Ansible (first released in 2012, and acquired by Red Hat, Inc. in 2015) is an
    automation platform that allows you to deploy your MongoDB installation and configuration
    in a simple, repeatable manner. Its paradigm is about configuring simple rules,
    grouped in fixed-order steps and templates, rather than coding scripts in a procedural
    language.


    It uses SSH to connect from a workstation to multiple remote machines without
    requiring any special agents on the remote hosts, just its own SSH keys.


    Ansible is simple to get started, with a wide user base and lots of examples online.
    It is also easy to keep changes in source control. However, it’s hard to test
    changes and may require many runs to debug complex tasks grouped into *playbooks*.


    ### Puppet


    Puppet (first released in 2005) is model-driven, statically checked, and was built
    with systems administrators in mind. It follows a client-server (or agent-master)
    architecture. A commercial version, Puppet Enterprise, is available through Puppet
    Labs.


    The Puppet master compares the current state of the target machine against the
    machine-level configuration details and then sends instructions to the conversion
    layer for action. An agent checks regularly for changes and triggers updates.


    A module called `puppet/mongodb`^([⁶](#fn6)) (maintained by Puppet Labs and the
    open source community) manages server installation and configuration of the MongoDB
    processes, as well as Ops Manager setup. This module has an advanced and complete
    feature set, including a `mongodb_shard` provider which allows definition of shards
    and their members. At the time of writing, it supports RHEL/CentOS 5/6/7 and Ubuntu
    10 and 12, as well as Debian 6 and 7.


    Puppet is a bit more complex than some other management tools (such as Chef and
    Ansible), but it has a lot of modules that can be used to resolve issues around
    database management.


    ### Chef


    Like Puppet, Chef (first released in 2009) compares host resources against a desired
    state before making changes on a Chef node. Unlike Ansible, it requires a *Chef
    client* to be installed on each remote host in order for that host to become a
    *Chef node*.


    Configuration is written into Chef *recipes* which are grouped together as *cookbooks*
    for easier management. An open source cookbook, *SC-MongoDB Cookbook*^([⁷](#fn7)),
    is the most advanced preexisting cookbook for Chef and is currently under active
    development.


    ### On-prem comparison


    Any of the three tools presented can be used to prepare dependencies and deploy
    complex MongoDB deployments. Table [7-2](#487346_1_En_7_Chapter.xhtml#Tab2) compares
    some of the key differences which may help choosing between them based on your
    platform and infrastructure preferences.


    Table 7-2


    A comparison of configuration management tools


    |   | Ansible | Puppet | Chef |

    | --- | --- | --- | --- |

    | Architecture | Pushes config (from single node) | Pull (Master-slave) | Pull
    (Master-slave) |

    | Configuration paradigm | Declarative (Plays and Playbooks) | Procedural (Tasks
    and Plans) | Procedural (Recipes and Cookbooks) |

    | Update paradigm | Step-based | Idempotent and state-based | Idempotent and state-based
    |

    | Remote requirements | SSH daemon only, no agent | Master server + Puppet agent
    | Master server + Chef agent required |

    | Security | SSH key + user privileges | Certificate | SSL and shared secrets
    |

    | Getting started | Easy | Harder | Harder |

    | Complex tasks | Hard to debug | Powerful | Possible |

    | Platform | Python/pip | Ruby/gem | Ruby/gem |

    | Supported OSes (remote) | Master: Linux/BSD with PythonRemote: any POSIX with
    Python, and Windows | Master: Enterprise Linux, Ubuntu, SUSERemote: Linux, macOS,
    Windows, Solaris, and many others | Workstation: RHEL, Ubuntu, Windows, macOSServer:
    Enterprise Linux, UbuntuNode/remote: AIX, Linux, BSD, Windows, macOS |

    | Best suited | Initial setup on top of prebuilt VM images or Docker | Regularly
    changing environments. Where compliance is important. | Regularly changing environments
    |


    ### Automation


    Often the goal of CM tools is to standardize and avoid human errors when deploying
    new hosts and software stacks. With some additional effort, this configuration
    code can be extended to tear down, move, and scale systems over thousands of nodes,
    running on different underlying hardware/cloud and on different operating systems.


    With awareness of entire systems and dependencies between components, automation
    can be made to orchestrate changes in a consistent way, for example, to ensure
    that multiple nodes from the same replica set aren’t taken down at the same time.


    ## Provisioning and orchestration


    Before we can configure our MongoDB environments and deployments, we may first
    want to automate provisioning of the hosts. In some cases, we may also need to
    provision networking infrastructure, storage, and even load balancers.


    For most deployments, Terraform is currently the winner in the *infrastructure-as-code*
    space both for provisioning reproducible on-prem as well as cloud-agnostic infrastructure.


    ### Terraform


    While Terraform can also perform configuration, it is currently better to use
    targeted configuration management tools like Ansible, Puppet, or Chef. Like most
    CM tools, all Terraform configuration files can be easily version controlled.
    Custom *Provider* plug-ins can be created in the *Go* programming language.


    While possible to use in a free Community version, the maintainer HashiCorp sells
    an Enterprise version with support.


    #### Purpose


    Terraform monitors the state of the environment, and if anything is out of order
    or missing, it can automatically provide a replacement resource. This is fantastic
    for environments that require a very steady state.


    #### Cloud infrastructure


    Terraform can communicate via cloud provider APIs using standard API keys, in
    much the same way as on-prem master servers.


    #### Official provider for Atlas


    MongoDB Inc. in conjunction with HashiCorp has created an *official provider*
    that is designed for MongoDB’s Atlas fully hosted solution. Currently, there is
    no official plug-in for using Terraform with non-Atlas on-prem MongoDB deployments.


    While it’s possible to create a custom or community provider yourself, this can
    be a very complex undertaking, to build and test a provider. As such, using Terraform
    **alone** for on-prem MongoDB deployments is not an ideal approach at this time.


    #### Integration with Ansible


    Terraform can call Ansible configuration (via Packer) to automate the building
    up of machine images with MongoDB and dependency packages, and configuration files
    at the OS level. Terraform can add special tags to your servers for Ansible to
    find and configure each one accordingly.


    In the other direction, Ansible can also be hooked in to the workflow, calling
    Terraform to launch multiple computing instances based on images already built
    by Ansible. Often some final steps will be required post-provisioning to actually
