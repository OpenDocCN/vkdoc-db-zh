    | `{ country: 1,`  `postcode: 1,`  `custId: 1}` | • Subnational zoning possible
    | • Complex metadata and zoning rules |

    | `{ location: 1,`  `custId: 1}` (e.g. Atlas) | • Flexible• Subnational zoning
    easy | • Requires additional field to be calculated and stored |'
  trans: '### 邮政编码


    如果你知道自己的业务永远只会在美国境内运营，那么邮政编码（zip code）可能是一个不错的选择。但如果要支持国际扩张，某种复合地理分片键会更加灵活。


    假设你有这样的文档结构（清单 6-7）：


    ```

    { _id: ObjectId(....),

    custId: 1234567,

    name: "John Smith",

    street: "20 W 34th St",

    city: "New York",

    postcode: "10118",

    state: "NY",

    country: "US"

    ...

    }

    清单 6-7

    一个支持州级分片的文档结构

    ```


    > **注意**

    > 你应该考虑将邮政编码存储为字符串而非数字，因为英国的邮政编码包含大写字母。例如，“SW1A 1AA”是白金汉宫的邮政编码。


    对于前面的文档，使用像 `{ country: 1, postcode: 1, custId: 1}` 这样的分片键，可以初始实现简单的基于国家和地区的分片，随后可以应用更复杂的区域规则将数据划分到更具体的位置。例如：


    ```

    sh.updateZoneKeyRange("myDB.customers",

    { country: "GB", postcode: "SW00 000", custId: MinKey },

    { country: "GB", postcode: "SWZZ ZZZ", custId: MaxKey },

    "UK-London")

    sh.updateZoneKeyRange("myDB.customers",

    { country: "GB", postcode: "SE00 000", custId: MinKey },

    { country: "GB", postcode: "SEZZ ZZZ", custId: MaxKey },

    "UK-London")

    ```

    这将定义一些区域，其数据存放在物理位置位于伦敦或其附近的分片上。在图 6-7（英国）和图 6-8（美国）中，我们可以看到为每个区域指定精确的区域规则将极其复杂。^(⁴)


    ![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig7_HTML.jpg](img/487346_1_En_6_Fig7_HTML.jpg)


    *图 6-7*

    用于次国家分片的英国邮政编码地图


    在同一个部署中，可以设置规则来标记纽约的客户，并将他们定位在位于美国东海岸的硬件上：


    ```

    sh.updateZoneKeyRange("myDB.customers",

    { country: "US", postcode: "00500", custId: MinKey },

    { country: " US", postcode: "00600", custId: MaxKey },

    "US-NY")

    sh.updateZoneKeyRange("myDB.customers",

    { country: "US", postcode: "06390", custId: MinKey },

    { country: "US", postcode: "06390", custId: MaxKey },

    "US-NY")

    sh.updateZoneKeyRange("myDB.customers",

    { country: "US", postcode: "10000", custId: MinKey },

    { country: "US", postcode: "14999", custId: MaxKey },

    "US-NY")

    ```


    如图 6-8 所示，美国邮政编码的纯数字方式，以及按州分组的方式，将使得定义少量区域键范围变得容易得多，同时仍能准确地映射分组。^(⁵)


    ![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig8_HTML.jpg](img/487346_1_En_6_Fig8_HTML.jpg)


    *图 6-8*

    可用于区域分片的美国邮政编码地图


    在英国，两个字母的前缀之间没有逻辑上的地理关联，因此可能需要为每一个前缀定义一个区域键范围。你可以只为高密度区域定义范围，并让所有其他区域的数据存放在一个位于中央数据中心的分片上，该中心到全国所有地区都具有可接受的低延迟。


    ### ISO 3166-2


    从前面可以看出，使用邮政编码进行州级分片很快会变得复杂。一个优越得多的解决方案是使用国际标准化组织（ISO）的 3166-2 标准。该标准为世界上每个国家提供了不同详细程度的正式行政区划代码。


    对于英国，使用顶级行政区划代码 `GB-ENG`、`GB-NIR`、`GB-SCT` 和 `GB-WLS` 分别代表英格兰、北爱尔兰、苏格兰和威尔士，可能就足够了。否则，还可以使用
    27 个二级郡县代码，例如 `GB-OXF` 代表牛津郡。


    对于美国，有所有 50 个州的顶级行政区划代码，以及 `US-DC` 代表哥伦比亚特区，还有其他地区的代码，如 `US-GU` 代表关岛和 `US-PR`
    代表波多黎各。


    在这种方法中，你会添加一个额外的 `location` 字段，生成的文档如下所示：


    ```

    { _id: ObjectId(....),

    custId: 1234567,

    name: "John Smith",

    street: "20 W 34th St",

    city: "New York",

    postcode: "10118",

    state: "NY",

    country: "US"

    location: "US-NY"

    ...

    }

    ```


    然后通过使用分片键 `{ location: 1, custId: 1}`，你可以将客户数据分区到适当的次国家行政区划。


    ### 读取与分散-聚集


    扩展分片集群以处理数据读取的最佳方式是，能够在每次查询中指定分片键的所有值。这样，`mongos` 路由器就可以从包含所需数据的那一个分片请求数据。在我们目前的方法中，我们可能最初只知道
    `custId` 值（例如，来自 Web 或 API 请求），因此必须查询整个集群中的每个分片以寻找匹配项。一旦我们也拥有了国家和邮政编码字段，随后的查询就可以使用所有分片键组成部分进行过滤，并仅定位到一个分片。


    ### MongoDB Atlas


    MongoDB Atlas 是一个完全托管的云数据库。Atlas 处理了在您选择的云服务提供商上部署、管理和修复全球部署的所有复杂性。此服务包括一个友好的界面，可根据业务需求变得复杂时配置和扩展您的部署。


    这个全局分片系统使用了前面讨论的 ISO 3166-2 国家和行政区划代码，并要求一个名为 `location` 的字段与您选择的另一个辅助字段组合使用。


    图 6-9 显示了两个用于高性能全局集群的预定义模板，一个包含三个区域，另一个包含五个区域。这些模板假设分片数量至少与区域数量相同，因此这将需要一个相当大的部署。


    ![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig9_HTML.jpg](img/487346_1_En_6_Fig9_HTML.jpg)


    *图 6-9*

    Atlas 包含预定义的全局分片模板


    在图 6-10 中，我们可以看到一个简单的界面，用于根据所选的分片位置数量定义自定义区域。


    ![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig10_HTML.jpg](img/487346_1_En_6_Fig10_HTML.jpg)


    *图 6-10*

    Atlas 还包含一个用于映射行政区划的界面


    ### 小结


    在本章中，我们通过一些示例探讨了全局集群随时间变化的情况。我们还为不同的全局分片用例探索了一些不同的分片键选项。表 6-1 总结了涵盖的三种分片键模式及其优点。


    *表 6-1*

    全局分片选项总结


    | 分片键 | 优点 | 缺点 |

    | --- | --- | --- |

    | `{ country: 1,    custId: 1}` | • 区域规则简单 | • 无法实现次国家级分区 |

    | `{ country: 1,`  `postcode: 1,`  `custId: 1}` | • 可以实现次国家级分区 | • 元数据和区域规则复杂
    |

    | `{ location: 1,`  `custId: 1}` (例如 Atlas) | • 灵活• 次国家级分区简单 | • 需要计算和存储额外的字段
    |'
- fmt: '## Key takeaways


    From this chapter, the key concepts to remember are as follows:


    *   Zones can be used to control where ranges of chunks are physically located.

    *   Each zone can be defined with multiple ranges, so that we could create a single
    Asian zone with multiple countries.

    *   A zone can be mapped to multiple shards, so that data in a single zone exceeding
    our 2TB limit benchmark can still grow within a single region.

    *   Zones and shards can be added and removed as a deployment grows or the requirements
    change.

    *   Zone-based sharding can be used to ensure `low-latency` round-trips between
    end-user locations and the database or to minimize `bandwidth expenses`.

    *   Geopolitical sharding rules with zones can also be used to ensure that `data
    protection regulations` such as GDPR are satisfied.


    Footnotes [1](#487346_1_En_6_Chapter.xhtml#Fn1_source)   [2](#487346_1_En_6_Chapter.xhtml#Fn2_source)


    # 7. Deployment and Monitoring


    This chapter looks at the most common tools and techniques for automating MongoDB
    deployments in production, on-prem, and in cloud-based self-managed environments.
    We also review different monitoring solutions and tips to help DevOps teams avoid
    issues and react quickly to changes in the deployment.


    ## The DevOps Toolkit


    The DevOps toolkit is still evolving very quickly as cloud providers continue
    to add more features, and large enterprises are moving more of their workloads
    out into the “public cloud”. All details provided are accurate at the time of
    writing.


    ### Goals


    Ideally, our DevOps toolkit should closely mirror our database requirements, namely,
    `scalability` as the deployment grows, `isolation` of components, `durability`
    of data, and `performance`.


    ### Community vs. Enterprise


    MongoDB Inc. (the company behind MongoDB) chose early to make the database an
    open source product partly to drive adoption, but also in the belief that an open
    source database would become more secure, stable, and trusted.


    In order to build a business, the company also built some additional features
    reserved for Enterprise customers. The DevOps tools mentioned in this chapter
    fall into this category. Any licensed customers are free to use these tools on-prem
    or on self-managed cloud infrastructure and also receive unlimited technical support
    to ensure their deployments are online and optimal at all times.


    MongoDB releases follow the common paradigm of even-numbered releases for production,
    and odd numbers for preproduction work. For example, version 4.3 is a preproduction
    release for testing, which is then generally released for production as version
    4.4.


    Minor releases such as 4.4.1 to 4.4.2 include security and performance improvements,
    but never break backward compatibility. You should normally upgrade to any minor
    releases within weeks to benefit from important stability improvements and bug
    fixes. By contrast, major version upgrades should be tested in a UAT environment
    with real data and workloads before upgrading in a production deployment.


    #### Ops/Cloud Manager


    `Ops Manager` is the Enterprise management platform for MongoDB which is designed
    to deploy, monitor, back up, and scale MongoDB deployments on your own infrastructure.
    `Cloud Manager` is almost identical except that the metrics and backups are stored
    and managed by MongoDB Inc., but actual user data never leaves your own infrastructure.
    Table 7-1 shows the differences between Ops and Cloud Manager.


    Table 7-1

    A comparison of Ops and Cloud Manager


    |   | Ops Manager | Cloud Manager |

    | --- | --- | --- |

    | Automates deployments | Yes, on-prem | Yes, on-prem |

    | Monitors deployments | Yes, all metadata and metrics on-prem | Yes, but metadata
    and metrics in the cloud |

    | Backs up deployments | Yes, backups can be all on-prem (using filesystem, blockstore,
    or local S3-compatible store), or to Amazon S3 cloud storage | Yes, backups are
    stored on an Amazon S3 bucket managed by MongoDB the company |

    | Requirements | Automation agents installed on all hosts<br>Replica set to store
    Ops Manager config (AppDB)<br>Replica set to store oplog and blockstore (for backups)<br>Hosts
    for Ops Manager instances (plus optional load balancer) | Automation agents installed
    on all hosts |


    Both tools are able to help manage, reconfigure, grow, and upgrade versions of
    your MongoDB deployments all in a `rolling manner` to avoid downtime. For anything
    more than a single replica set in production, the risk of manually applying updates
    is otherwise too high.


    #### Rolling changes


    When it comes to automating production MongoDB deployments, making rolling changes
    is critical. Since a well-constructed, healthy cluster will have at least one
    node of redundancy, it should be possible to upgrade clusters one node at a time,
    ensuring that all nodes are back online before applying the next changes.


    Making multiple changes at once (e.g., restarting two nodes in a three-node replica
    set) would make a shard become momentarily read-only, blocking an entire application.
    This sort of rolling logic is a foundational feature of Ops/Cloud Manager and
    hard to replicate with off-the-shelf DevOps frameworks and custom scripts.


    ### Challenges


    As anyone in the DevOps world can attest, `automation is hard`. Automation of
    complex, distributed systems without downtime is even harder. We want to guarantee
    that we can perform changes in a repeatable way that is robust and makes it easy
    to keep components on the latest, most stable, and secure versions. The following
    are some particular challenges when managing MongoDB deployments.


    #### Changing states


    MongoDB `clusters are stateful`. Primary and secondary nodes have particular roles
    which can change over time. They also have to persist and sync data. We can’t
    just launch a replacement image into a replica set – that would trigger an initial
    sync – impacting both the sync source and the network. We may need to respect
    data protection regulations, by tightly controlling the location and flow of data.


    #### Security


    We also need to `manage security` in a cluster. This may include creating appropriate
    x.509 certificates to authenticate cluster membership, retrieving master keys
    from a KMIP server, or connecting to Kerberos to authenticate new connections.
    We may need to set up TLS in the right order so that we don’t lock ourselves out
    of the cluster, preventing the completion of changes.


    #### Size and complexity


    Managing large MongoDB deployments manually, and configuring each node manually,
    can introduce a number of risks. These include longer downtime (and possible initial
    sync due to insufficient oplog), or the introduction of configuration errors.
    A mature well-tested automated system should remove or at least greatly reduce
    these risks.


    #### Fault tolerance


    Since MongoDB is already `self-healing`, and once a cluster is correctly configured,
    it shouldn’t require much intervention (manual or automated) until such time an
    upgrade or configuration change is required or hardware needs to be replaced.


    System architects can choose the level of fault tolerance suited to their business
    case. For example, a replica set with five data-bearing members (rather than the
    usual three) can function with up to two members down.'
