    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig2_HTML.jpg](images/487346_1_En_11_Chapter/487346_1_En_11_Fig2_HTML.jpg)


    Figure 11-2


    `splitAt` splits exactly at the specified shard key value


    In terms of **performance**, `splitAt` is lighter weight and should be used in
    scripts when pre-splitting in preparation for data loading. `splitFind` tries
    to calculate the median point of values in the chunk to create equal size chunks.
    The fetching of documents and calculation requires both I/O and CPU.


    ## Shard key scenarios


    When choosing a shard key, there may be competing goals but not all of which can
