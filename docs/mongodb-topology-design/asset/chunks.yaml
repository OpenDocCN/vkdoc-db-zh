    “home” shard for that particular database. Any non-sharded collection will exist
    only on that shard. This makes it easy for the `mongos` router to target a particular
    shard for these smaller collections.


    Some basic metadata is also displayed here, such as the shard key and whether
    it has a unique constraint applied. Next, a summary of `chunks` is listed so that
    we can quickly see if each shard has roughly the same amount of data. With no
    zoning, these should be balanced, but in our global cluster, shards linked to
    zones with more documents will be larger.


    ### Check existing zones


    Before we make any more changes, we want to check that our mappings are as we
    expect them to be. We can connect via any `mongos` router to query configuration
    from the `config` database.


    The `shards` collection lists all the shards and which zones are mapped to them.
    The `tags` collection lists all the zones, their ranges, and the tag chosen, such
    as “`IND`”. This is shown in Listings [6-4](#487346_1_En_6_Chapter.xhtml#PC5)
    and [6-5](#487346_1_En_6_Chapter.xhtml#PC6).


    For example, the following can be run from the Mongo shell.


    ```

    { "_id" : { "ns" : "myDB.customers",

    "min" : { "country" : "IN", "custId" : { "$minKey" : 1 } } },

    "ns" : "myDB.customers",

    "min" : { "country" : "IN", "custId" : { "$minKey" : 1 } },

    "max" : { "country" : "IN", "custId" : { "$maxKey" : 1 } },

    "tag" : "IND" }

    { "_id" : { "ns" : "myDB.customers ", "min" : { "country" : "JP", "custId" : {
    "$minKey" : 1 } } },

    "ns" : "myDB.customers ",

    "min" : { "country" : "JP", "custId" : { "$minKey" : 1 } },

    "max" : { "country" : "JP", "custId" : { "$maxKey" : 1 } },

    "tag" : "Asia" }

    Listing 6-5

    The tags output shows the ranges and tag

    ```


    ```

    use config;

    db.tags.find();

    Listing 6-4

    List all configured zone ranges

    ```


    ### Move a zone


    In our case, we want to relocate the entire Asia zone, but not change any of its
    ranges since the country codes have not changed. This remapping of a zone to a
    shard can be done with the following commands:


    ```

    sh.removeShardFromZone("sh-sing", "Asia")

    sh.addShardToZone("sh-india-2", " Asia ")

    ```


    At this point all *Asia* chunks will start being moved to the `sh-india-2` shard.


    ### Drain a shard


    To drain the chunks from a shard, we first issue the `removeShard` command on
    the shard to remove:


    ```

    db.adminCommand( { removeShard: "sh-sing" } )

    ```


    This will start moving any chunks of documents from sharded databases homed on
    *other* shards, but requires manual intervention to re-home databases that exist
    only on this shard. The system cannot automatically decide where to move them.


    The `removeShard` command will return a document telling us the state of the activity
    and if there are any databases blocking the move.


    ```

    {

    "msg" : "draining ongoing",

    "state" : "ongoing",

    "remaining" : {

    "chunks" : NumberLong(45),

    "dbs" : NumberLong(2),

    "jumboChunks" : NumberLong(0)

    },

    "note" : "you need to drop or movePrimary these databases",

    "dbsToMove" : [

    "db2",

    "db3"

    ],

    "ok" : 1

    }

    Listing 6-6

    The result of removeShard on a database primary

    ```


    In this case, we will need to manually move two databases: `db2` and `db3`. We
    can choose to move both to our first Indian shard with


    ```

    db.adminCommand( { movePrimary: "db2", to: "sh-india-1" })

    db.adminCommand( { movePrimary: "db3", to: "sh-india-1" })

    ```


    The original `removeShard` command will need to be rerun again until the response
    of the `state` value is `"completed"`. At this point, the shard is drained and
    the hosts can be taken offline safely.


    ### Goal state


    Note that in both cases earlier, the configuration “goal state” is updated immediately
    in the metadata, but the chunks themselves may take hours or days to fully migrate
    to satisfy the new configuration. Network bandwidth, other workloads, and the
    balancer window are all factors that may limit the speed at which the target state
    is reached.


    ## State-level sharding


    If your business is focused on one or many geographically large countries like
    the United States, China, or Australia having data stored in just a single physical
    location (such as having all data centers in Virginia, US-East), then the latency
    to the other side of the country may be just too high for your use case.


    The solution is to extend this concept of country-level sharding to state level.
    Luckily, this is a matter of using something more than just a country code.'
  trans: '# 数据库


    本节列出了此集群上已知的所有数据库。


    如果数据库列为 `partitioned: true`，则表示它已分片。也可能存在一些完全没有分区的小型数据库，它们可以没有分片集合。


    请注意，我们的 `customers` 数据库列出了一个 `primary` 分片。主分片是所有未分片集合的存放位置，可以被视为该特定数据库的“归属”分片。任何非分片集合将仅存在于该分片上。这使得
    `mongos` 路由器能够轻松地将这些较小集合的查询定向到特定分片。


    这里还显示了一些基本元数据，例如分片键以及是否应用了唯一约束。接下来，列出了 `chunks`（数据块）的摘要，以便我们可以快速查看每个分片的数据量是否大致相同。在没有设置区域的情况下，这些数据应该是平衡的，但在我们的全局集群中，链接到包含更多文档区域的分片会更大。


    ## 检查现有区域


    在进行更多更改之前，我们希望检查我们的映射是否符合预期。我们可以通过任何 `mongos` 路由器连接，从 `config` 数据库中查询配置信息。


    `shards` 集合列出了所有分片以及映射到它们的区域。`tags` 集合列出了所有区域、它们的范围以及选择的标签，例如“`IND`”。这在代码清单 6-4
    和 6-5 中显示。


    例如，以下命令可以从 Mongo Shell 运行。


    ```

    { "_id" : { "ns" : "myDB.customers",

    "min" : { "country" : "IN", "custId" : { "$minKey" : 1 } } },

    "ns" : "myDB.customers",

    "min" : { "country" : "IN", "custId" : { "$minKey" : 1 } },

    "max" : { "country" : "IN", "custId" : { "$maxKey" : 1 } },

    "tag" : "IND" }

    { "_id" : { "ns" : "myDB.customers ", "min" : { "country" : "JP", "custId" : {
    "$minKey" : 1 } } },

    "ns" : "myDB.customers ",

    "min" : { "country" : "JP", "custId" : { "$minKey" : 1 } },

    "max" : { "country" : "JP", "custId" : { "$maxKey" : 1 } },

    "tag" : "Asia" }

    ```


    *代码清单 6-5：标签输出显示了范围和标签*


    ```

    use config;

    db.tags.find();

    ```


    *代码清单 6-4：列出所有已配置的区域范围*


    ## 移动一个区域


    在我们的案例中，我们希望重新定位整个亚洲区域，但不更改其任何范围，因为国家代码没有改变。将区域重新映射到分片可以通过以下命令完成：


    ```

    sh.removeShardFromZone("sh-sing", "Asia")

    sh.addShardToZone("sh-india-2", " Asia ")

    ```


    此时，所有*亚洲*数据块将开始移动到 `sh-india-2` 分片。


    ## 清空一个分片


    要从分片中清空数据块，我们首先在要移除的分片上发出 `removeShard` 命令：


    ```

    db.adminCommand( { removeShard: "sh-sing" } )

    ```


    这将开始移动位于*其他*分片上的分片数据库中的任何文档数据块，但需要手动干预来重新安置仅存在于此分片上的数据库。系统无法自动决定将它们移动到哪里。


    `removeShard` 命令将返回一个文档，告知我们活动状态以及是否有任何数据库阻碍了移动。


    ```

    {

    "msg" : "draining ongoing",

    "state" : "ongoing",

    "remaining" : {

    "chunks" : NumberLong(45),

    "dbs" : NumberLong(2),

    "jumboChunks" : NumberLong(0)

    },

    "note" : "you need to drop or movePrimary these databases",

    "dbsToMove" : [

    "db2",

    "db3"

    ],

    "ok" : 1

    }

    ```


    *代码清单 6-6：在数据库主分片上执行 removeShard 的结果*


    在这种情况下，我们需要手动移动两个数据库：`db2` 和 `db3`。我们可以选择将它们都移动到我们的第一个印度分片：


    ```

    db.adminCommand( { movePrimary: "db2", to: "sh-india-1" })

    db.adminCommand( { movePrimary: "db3", to: "sh-india-1" })

    ```


    最初的 `removeShard` 命令需要重新运行，直到响应的 `state` 值为 `"completed"`。此时，分片已被清空，可以安全地将主机下线。


    ## 目标状态


    请注意，在上述两种情况下，配置的“目标状态”会在元数据中立即更新，但数据块本身可能需要数小时或数天才能完全迁移以满足新配置。网络带宽、其他工作负载以及均衡器窗口都是可能限制达到目标状态速度的因素。


    # 州/省级分片


    如果您的业务集中在一个或多个地理面积很大的国家，如美国、中国或澳大利亚，而数据仅存储在单一物理位置（例如所有数据中心都在美国东海岸的弗吉尼亚州），那么到该国另一端的延迟对于您的用例来说可能过高。


    解决方案是将这种国家级别的分片概念扩展到州/省级别。幸运的是，这只需要使用比国家代码更细粒度的信息即可。'
- fmt: '### Post codes


    If you know that you would only ever operate inside the United States, then a
    zip code might be a good candidate, but to also support international expansion,
    some sort of compound geographic shard key is more flexible.


    Let’s imagine you have documents like this structure (Listing 6-7).


    ```

    { _id: ObjectId(....),

    custId: 1234567,

    name: "John Smith",

    street: "20 W 34th St",

    city: "New York",

    postcode: "10118",

    state: "NY",

    country: "US"

    ...

    }

    Listing 6-7

    A document structure to support state-level sharding

    ```


    > **Note**

    > You should consider storing zip or post codes as a string rather than numbers,
    since UK postcodes include uppercase letters. For example, "SW1A 1AA" is the code
    for Buckingham Palace.


    In the case of the preceding document, a shard key such as `{ country: 1, postcode:
    1, custId: 1}` would allow both simple country- and region-based sharding initially
    and then later more complex zoning rules to partition data into more specific
    location. For example,


    ```

    sh.updateZoneKeyRange("myDB.customers",

    { country: "GB", zipcode: "SW00 000", custId: MinKey },

    { country: "GB", zipcode: "SWZZ ZZZ", custId: MaxKey },

    "UK-London")

    sh.updateZoneKeyRange("myDB.customers",

    { country: "GB", zipcode: "SE00 000"", custId: MinKey },

    { country: "GB", zipcode: "SEZZ ZZZ"", custId: MaxKey },

    "UK-London")

    ```


    would define some zones to be homed in a shard physically located in or near London.
    In Figures 6-7 (United Kingdom) and 6-8 (United States), we can see that specifying
    exact zone rules for every region would be extremely complex.^([⁴](#fn4))


    ![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig7_HTML.jpg](images/487346_1_En_6_Chapter/487346_1_En_6_Fig7_HTML.jpg)


    *Figure 6-7*

    A postcode map of the United Kingdom for subnational sharding


    In the same deployment, rules could be set up to label New York customers and
    locate them on hardware on the east coast:


    ```

    sh.updateZoneKeyRange("myDB.customers",

    { country: "US", zipcode: "00500", custId: MinKey },

    { country: " US", zipcode: "00600", custId: MaxKey },

    "US-NY")

    sh.updateZoneKeyRange("myDB.customers",

    { country: "US", zipcode: "06390", custId: MinKey },

    { country: "US", zipcode: "06390", custId: MaxKey },

    "US-NY")

    sh.updateZoneKeyRange("myDB.customers",

    { country: "US", zipcode: "10000", custId: MinKey },

    { country: "US", zipcode: "14999", custId: MaxKey },

    "US-NY")

    ```


    As you can see in Figure 6-8, the purely numerical approach of US zip codes, and
    the grouping per state, will make it much easier to define a small set of zone
    key ranges while still accurately mapping groups.^([⁵](#fn5))


    ![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig8_HTML.jpg](images/487346_1_En_6_Chapter/487346_1_En_6_Fig8_HTML.jpg)


    *Figure 6-8*

    A US zip code map which can be used for zone sharding


    In the United Kingdom, there is no logical geographic connection between the two-letter
    prefixes, and so a zone key range might need to be defined for every single prefix.
    You could define ranges for just the high-density areas and allow all others to
    be homed on a shard in a central DC with reasonably low latency to all parts of
    the country.


    ### ISO 3166-2


    As you can see from earlier, using postcodes for state-level sharding quickly
    becomes complex. A far superior solution is to use the International Organization
    for Standardization (ISO) standard 3166-2. This standard provides formal subdivision
    codes for every country in the world to different levels of specificity.


    For the United Kingdom, using the top-level divisions of `GB-ENG`, `GB-NIR`, `GB-SCT`,
    and `GB-WLS` for England, Northern Ireland, Scotland, and Wales, respectively,
    is probably sufficient. Otherwise, 27 second-level county subdivisions are also
    available, such as `GB-OXF` for Oxfordshire.


    For the United States, there are top-level divisions for all 50 states as well
    as `US-DC` for the District of Columbia, as well as codes for other areas like
    `US-GU` for Guam and `US-PR` for Puerto Rico.


    In this approach, you would add an additional `location` field, resulting in documents
    like:


    ```

    { _id: ObjectId(....),

    custId: 1234567,

    name: "John Smith",

    street: "20 W 34th St",

    city: "New York",

    postcode: "10118",

    state: "NY",

    country: "US"

    location: "US-NY"

    ...

    }

    ```


    Then by using the shard key `{ location: 1, custId: 1}`, you can zone customer
    data down to whichever subnational division is appropriate.


    ### Reading and scatter-gather


    The best way to scale a sharded cluster for reading data is to be able to specify
    all values for the shard key in every query. That way, the `mongos` router can
    request the data from the one shard which contains the data. In our approach so
    far, we may initially know only the `custId` value (i.e., from a web or API request),
    and so every shard in the entire cluster must be queried for a match. Once we
    have the country and zip code fields also, subsequent queries can filter with
    all shard key components and target just one shard.


    ### MongoDB Atlas


    MongoDB Atlas is a fully managed cloud database. Atlas handles all the complexity
    of deploying, managing, and healing your global deployments on the cloud service
    provider of your choice. This service includes a friendly interface to configure
    and grow your deployment as the business needs become more complex.


    This global sharding system uses the ISO 3166-2 country and subdivision codes
    discussed earlier and requires a field called `location` be combined with another
    secondary field of your choice.


    Figure 6-9 shows the two predefined templates for performant global clusters,
    one with three zones and another with five zones. These assume at least the same
    number of shards as zones, so this will require a reasonably large deployment.


    ![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig9_HTML.jpg](images/487346_1_En_6_Chapter/487346_1_En_6_Fig9_HTML.jpg)


    *Figure 6-9*

    Atlas includes predefined global sharding templates


    In Figure 6-10 we can see a simple interface to define a custom zone based on
    the number shard locations chosen.


    ![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig10_HTML.jpg](images/487346_1_En_6_Chapter/487346_1_En_6_Fig10_HTML.jpg)


    *Figure 6-10*

    Atlas also includes an interface to map subdivisions


    ### Summary


    In this chapter, we’ve worked through some examples of a global cluster changing
    over time. We’ve also explored some different shard key options for different
    global sharding use cases. Table 6-1 captures the three shard key patterns covered
    and their benefits.


    *Table 6-1*

    Summary of global shard options


    | Shard key | Pros | Cons |

    | --- | --- | --- |

    | `{ country: 1,    custId: 1}` | • Simple zone rules | • No subnational zoning
    possible |

    | `{ country: 1,`  `postcode: 1,`  `custId: 1}` | • Subnational zoning possible
    | • Complex metadata and zoning rules |

    | `{ location: 1,`  `custId: 1}` (e.g. Atlas) | • Flexible• Subnational zoning
    easy | • Requires additional field to be calculated and stored |'
