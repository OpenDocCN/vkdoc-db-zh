  trans: '

    ### 框架选择


    DevOps 的技术和工具栈发展迅速。本章讨论的许多框架和方法在您阅读本书时可能已经发生了变化。选择框架时，有几个问题需要考虑。


    #### 复用


    我们希望自动化组件之间是松耦合的，尽可能复用我们所使用产品中已有的功能（即，像 `Ops Manager` 和 `Kubernetes Operator`
    这样的仅企业版工具），并避免从头开始编写我们自己的配置/脚本。


    #### 避免锁定


    通常，我们不想过度依赖某个特定的框架。即使是流行的解决方案也可能停止获得支持，我们可能会突然发现无法轻松升级到最新、最安全的操作系统，因为我们的工具就是不支持它。


    我们不想将自己锁定在当前的基础设施中，无论是裸金属、`OpenStack`、`OpenShift`、超融合架构等等。


    我们希望保持选择权，以便能无痛地迁移到云提供商，或者更好的是，迁移到多云配置，这样我们就不依赖于任何单一提供商。在新冠肺炎疫情期间，这一点尤其痛苦，那些依赖
    `Azure` 的用户发现根本没有可用的容量来启动新的计算实例。


    ### 多云拓扑


    如果您计划部署到云端并最大化高可用性，使用多个云提供商是一种选择。您可以有一个欧洲分片，其节点分别位于 `GCP europe-west3`、`Azure
    Germany West Central` 和 `AWS eu-central-1`。这将把所有节点都放置在德国法兰克福或其附近，以降低延迟，但我们需要小心计算提供商之间带宽的成本。


    多云 DevOps 的复杂性也更高。一些工具（如 `Terraform`）包含特定于平台的模块，可以无缝部署底层基础设施。其他工具（如 `Ansible`）可能需要为某些提供定制主机镜像、网络堆栈或防火墙的云提供商定制
    Playbook。


    #### 基础镜像


    每个云提供商都为每种 Linux 发行版提供了一定程度定制（和优化）的基础镜像。使用每个提供商的镜像作为基础很有诱惑力，因为它们附带了预配置的优化。为避免锁定，您可以改为使用
    HashiCorp 的 Packer (`https://packer.io/`) 或类似的基础设施即代码 (`IaC`) 工具来构建自己的定制镜像。


    在许多情况下，最好使用 `Terraform` 来管理环境的任何特定于云的方面（例如，安全组、`VPN`、自动扩展），尽管也有用于配置管理工具（如 `Ansible`）的特定于云的模块。


    ### 虚拟机


    虚拟机 (`VM`) 现在构成了本地和云计算堆栈的基石。通过将非常大的主机拆分成多个虚拟机，`MongoDB` 部署可以更高效地部署并保持隔离。这意味着一个
    `VM` 或一个节点的不稳定不应不利地影响同一 `VM` 主机上任何其他节点的稳定性。


    图 7-1 展示了一个跨越八个虚拟机的单分片集群，这些虚拟机部署在三台物理 `VM` 主机上。任何一台物理主机发生故障都不会影响集群的运行。


    ![../images/487346_1_En_7_Chapter/487346_1_En_7_Fig1_HTML.jpg](img/487346_1_En_7_Fig1_HTML.jpg)

    *图 7-1 虚拟机提供资源隔离*


    大多数 `VM` 解决方案都支持亲和性与反亲和性的概念。亲和性规则要求一组 `VM` 应部署在同一台 `VM` 主机上。相比之下，反亲和性规则可用于防止副本集（例如
    1b、2b 和 3a）的 `VM` 被部署在同一台主机上。


    #### 共置


    “吵闹的邻居”从同一主机上的其他 `VM` 窃取 `CPU` 和内存资源的问题在云端仍然可能存在。在本地，通常可以通过阻止 `VM` “借用”其他 `VM`
    的资源来配置解决这个问题。这使得系统管理员能够为部署中的所有进程提供一致的资源和有保证的基线性能。


    #### 其他优势


    `VM` 还提供了许多其他优势，包括能够更轻松地调整 `VM` 大小，增加计算核心、额外内存资源，以及对存储卷进行快照。


    ### 容器


    计算容器是另一种巧妙地隔离、交付和运行进程而不与其他进程产生负面影响的方式。对于 `MongoDB` 部署，一个容器将包含节点启动和联系其其他集群成员所必需的数据文件和配置文件。`MongoDB`
    二进制文件和其他必需的包可以在同一主机上的所有容器之间共享，因此它们不一定需要额外的存储空间。


    像 `VM` 一样，容器保持内存、`CPU` 和 `I/O` 资源的隔离和限制，使得在同一物理主机上运行多个 `MongoDB` 节点变得更加容易，而不会产生副作用。


    在 Linux 中使用 `cgroups`，可以为容器配置资源上限，这意味着一个配置服务器节点可以使用（例如）仅 `2GB` 的 `RAM`，但同一主机上的一个分片成员可能被允许使用高达
    `200GB`。


    #### 与虚拟机比较


    `VM` 需要一个完整的操作系统来实现相同级别的资源分配，但当然，在每个 `VM` 客户端内运行整个操作系统会浪费大量宝贵的系统主机 `RAM`。


    在图 7-2 中，我们看到了与图 7-1 相同的集群拓扑，只是我们只有三个 `VM`。通过改用容器，我们可以更高效地使用主机的内存和存储资源。


    ![../images/487346_1_En_7_Chapter/487346_1_En_7_Fig2_HTML.jpg](img/487346_1_En_7_Fig2_HTML.jpg)

    *图 7-2 容器提供隔离且无虚拟机开销*


    容器更轻量级，但通常部署更复杂。它们也有更适合开发人员的工具，适合采用持续交付方法的组织。使用容器还使测试更加准确，因为可以测试和部署完全相同的容器。


    至少在不久的将来，虚拟机很可能仍然是系统管理的基础级别，因为它们是云计算的基础。


    ### Docker


    虽然确实存在替代方案（Oracle 的 `VirtualBox`、`Vagrant` 和 `Wox` 等），但 Docker 是目前最常见且易于使用的容器。


    `Docker` 在内存和网络方面提供强大的隔离性。这些容器的端口需要明确暴露，以允许与外部世界通信。


    `Docker` 镜像通常使用容器编排系统（如 `Kubernetes`）跨多个主机和数据中心进行部署。


    ### 基于云的容器服务


    `Amazon Elastic Container Service (ECS)` 是一项高度可扩展的容器管理服务，用于在集群上管理 `Docker` 容器。`Amazon
    Elastic Container Service for Kubernetes (EKS)` 通过增加一个基于标准的 `Kubernetes` 管理系统来扩展此功能，需额外付费。


    其他云提供商也提供类似的解决方案，如 `Azure Container Service (AKS)` 和 `Google Kubernetes Engine
    (GKE)`。

    '
- fmt: '### Hyperconverged infrastructure


    Another relatively new technology (as of this book’s writing) is `hyperconverged
    infrastructure` (HCI). One of the goals of this approach is to allow organizations
    to build up two or more data centers and seamlessly maintain redundant copies
    of all computing resources. Should a failure occur suddenly in one data center,
    the system will automatically launch replacement instances of all services in
    the remaining data centers. This requires that data from one data center is instantly
    and transparently replicated to the other data centers through a `storage area
    network` at all times.


    Organizations may be tempted to rely on the hyperconvergence framework for maintaining
    database uptime service-level objectives (SLOs), but mixing MongoDB’s highly available
    replication system and hyperconvergence is both problematic and overly redundant.


    MongoDB already includes all the data center and network state awareness but is
    designed specifically for the control of structured documents. Applications can
    control their level of redundancy through write and read concerns, giving much
    more fine-grained control than HCI.


    In production, MongoDB can be installed inside hyperconverged infrastructures,
    but the built-in storage replication should be disabled. MongoDB will handle replication,
    and the additional load and latency from HCI provides no additional benefit.


    Also, if the MongoDB cluster is correctly configured for fault tolerance (Chapter
    [2](#487346_1_En_2_Chapter.xhtml)) and global topologies (Chapter [6](#487346_1_En_6_Chapter.xhtml)),
    then losing a single data center should not impact an application. Therefore,
    booting up a new replacement node immediately after a failure is just not necessary
    and could add extra load if that node had to initial sync.


    ### Production requirements


    The `Production Notes` in your version of the MongoDB documentation is the authoritative
    reference for how best to configure your server to optimize MongoDB stability
    and performance.


    These notes cover things like what permissions are required on the filesystem,
    how to set up the journal and logs paths to avoid drive I/O conflicts, network
    security, WiredTiger cache settings and compression, memory configuration such
    including NUMA and no transparent HugePages, using XFS and `noatime` for the filesystem,
    correct network settings (compression, TCP keepalives, etc.), optimizing VM (memory
    swapping), and how to make SELinux work.


    Most of these settings are dependent on the exact operating system and version,
    the hardware available, and any virtualized environments, so there are no official
    ready-made virtual images or scripts to prepare the environment. It’s up to the
    system administrator to make sure the servers are set up correctly for the MongoDB
    nodes that will run there.


    #### Standardized servers


    Most organizations choose to run standardized servers for their entire cluster
    (config servers, `mongos` instances, and shard nodes). If not exactly same specs
    in terms of memory and storage devices, hosts should have at least the exact same
    operating system version and security settings.


    Any number of automation and orchestration tools can build, prepare, and upgrade
    servers in a standard, repeatable way to easily replace or add new servers as
    the database needs to grow over time, or hardware fails and needs to be replaced.


    Operating system upgrades should also be made in a prepared, controlled manner
    and ideally require little or no manual steps to complete.


    This way, configuration is at least consistent across the entire cluster, and
    we can rule out server-level misconfiguration when troubleshooting any changes
    in behavior or performance of the MongoDB components running on top.


    ### Operation system choices


    While MongoDB has been developed to run on a number of popular architectures and
    OSes in high-performance production-ready configurations, there are just a few
    which are widely used in production. These include enterprise Linux (Red Hat,
    CentOS, Oracle, SUSE, Ubuntu Server LTS) and Windows.


    #### Cloud variants


    For those running on self-managed cloud hosts, systems like Amazon Linux are also
    popular since these images already have optimized configurations for the idiosyncratic
    virtual storage and network implementations. Unfortunately, they are often forks
    of older versions of Linux, and the location of configuration files and packages
    included can diverge significantly from standards. This difference makes it even
    harder to manage a mixed on-prem and cloud environment.


    Since you can find official images of most enterprise Linux flavors for cloud
    providers, it might be best to keep the same OS, but add cloud-specific configuration
    tasks which configure cloud storage devices different to local hardware RAIDs,
    for example.


    #### Older RHEL versions


    Some older versions of Enterprise Linux can include known security or stability
    issues. In general, you should plan to upgrade to the latest downstream releases
    from Red Hat within a year of release.


    For example, if you are using native LDAP via the operation system’s OpenLDAP
    library, it’s strongly recommended to use at least RHEL 7.5. At this release,
    OpenLDAP switched to an OpenSSL implementation which brings important thread safety.


    MongoDB only provides official packages for Enterprise or LTS (long-term support)
    releases. Other OS releases do not have sufficiently long support lifecycles.


    ### Virtual machines


    If you need to run multiple smaller MongoDB nodes (such as for `mongos` or config
    server nodes), it can be tempting to co-locate these on a single server, or VM
    running on different ports. However, the complexity when troubleshooting such
    systems and the difficulty ensuring that both processes share system resources
    in an optimal way is much harder.


    It’s far better to first set up a VM host and deploy multiple VMs with fixed resources
    (i.e., with memory ballooning disabled).


    ### Kubernetes


    However, for some organizations, VMs are already too cumbersome to manage. Many
    enterprises have moved their production applications to Kubernetes-based infrastructures
    like Amazon EKS and OpenShift.


    Historically, with the Kubernetes ecosystem it wasn’t possible to deploy pods
    with persistent storage which could survive certain pod moves or hardware failures,
    making it unsuitable for database deployments. With the addition of `PersistentVolumes`
    and `StatefulSets`, pods can now be moved without losing data and needing to perform
    a complete initial sync.


    #### Operators


    `Kubernetes Operators` can be used to package, deploy, and manage MongoDB as a
    Kubernetes-native application, essentially functioning as a custom controller.


    MongoDB Enterprise licenses include access to a Kubernetes operator which together
    with Ops/Cloud Manager can deploy appropriate `Kubernetes Resource Containers`
    and then `MongoDB Database Resources` on top. In essence, you can properly automate
    MongoDB replica sets and sharded clusters inside Kubernetes environments.


    Tip


    When running applications or microservices inside pods, always set the `appName`
    in the connection string. This application name will appear in the log files,
    and since the IP addresses can change as pods are redistributed, this unique name
    can help tracking logged issues back to the generating application.


    ### Tools


    `Infrastructure as code` (IaC) is the process of managing and provisioning hosts
    through machine-readable definition files or scripts that can be easily version
    controlled and tested. It is a way of encapsulating error-prone manual configuration
    procedures like run books into software code that makes actual deployment streamlined,
    reliable, and infinitely scalable. The most common IaC tool today is Terraform.


    `Continuous configuration automation` (CCA) tools can be thought of as an extension
    of IaC frameworks, but also the `provisioning` and configuration of applications
    and services on top of the managed hosts.'
