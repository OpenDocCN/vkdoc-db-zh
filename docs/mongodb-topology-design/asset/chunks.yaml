  trans: '# 测试环境


    减少错误的一种方法是对应用程序进行彻底的单元测试和集成测试。从拓扑结构角度来看，我们可以借助建立合适的开发环境（`DEV`）以及用户验收测试或预发布环境（`UAT`）来提供帮助。这些环境应在操作系统版本和安全配置方面与生产环境（`PROD`）尽可能匹配，并使用与生产环境相同的
    MongoDB 版本。


    `DEV` 和 `UAT` 环境在 CPU 和内存资源方面容量可以较小，测试数据的规模也应按与 `PROD` 相似的比例缩减。`UAT` 环境至少应在分片数量、配置服务器数量以及集合的分片方式上与生产环境拓扑匹配。


    例如，如表 9-1 所示，如果你有一个 `PROD` 集群，包含 3 个分片，共 6TB 数据，每台主机有 256GB 内存，你可以创建一个 `UAT` 环境：同样是
    3 个分片，但每台主机仅 64GB 内存，数据量为 `PROD` 的 1/4，即约 1.5TB。这应能保持内存中工作集的比例大致相当，以更接近地匹配性能影响。


    表 9-1：基于 `PROD` 规模调整的 `UAT` 和 `DEV` 环境示例


    |   | 拓扑结构 | 资源 | 数据 |

    | --- | --- | --- | --- |

    | `PROD` | 3 分片集群 | 每台主机 32 核，256GB RAM | 总计 6TB |

    | `UAT/预发布` | 3 分片集群 | 每台主机 8 核，64GB RAM | 总计 1.5TB |

    | `DEV` | 单分片集群 | 每台主机 8 核，32GB RAM | 总计 250GB（分片数为 `UAT` 的 1/3，RAM 为 `UAT` 的
    1/2） |


    > **注意**

    >

    > 如果你需要在生产环境中达到非常具体的性能目标，`UAT` 环境应完全匹配其资源，并恢复近期的备份以使用真实数据进行性能测试。


    ## 捕获应用程序错误


    `DEV` 环境在分片和冗余方面可以更简化。即使生产环境是采用五节点副本集的多分片集群，`DEV` 环境也可以仅使用一个包含三节点副本集的单分片。


    `DEV` 环境应能模拟副本集故障切换以及与 `mongos` 的交互，因此仅使用单节点是不够的。通过首先在 `DEV` 环境中测试应用程序变更，应能发现可能损坏或删除有效数据的错误，从而避免因从备份恢复而导致的集群范围回滚。


    ## 捕获配置错误


    主要的集群变更，如分片新集合、添加索引以及任何类型的配置更改，都存在风险，因此应首先在 `UAT` 环境中运行。通过在 `UAT` 环境中设置与生产相同数量的分片，数据库管理员可以在功能上与
    `PROD` 完全相同的环境中测试分片标签、区域、预分片和迁移影响。


    # 非分片集群


    备份单节点或单个副本集相对简单，因为只有一个节点接受写入。分片集群则更复杂，因为有多个主节点接受写入，并且文档块可能随时在分片之间迁移。


    > **注意**

    >

    > 正如我们在第 1 章讨论过的，单节点绝不应使用于生产环境，因为它完全不提供弹性。然而，在某些情况下，MongoDB 被用于本地开发或研究，此时你可能希望在特定时间点对数据进行快照。


    对于适用于单节点或副本集的简单备份，有三种通用方法：


    1.  **停止节点**，然后复制数据路径中的所有文件，这可能需要几分钟或几小时。

    2.  使用 `db.fsyncLock()` **锁定节点**，并进行文件系统快照（这需要像 `LVM` 这样的逻辑卷管理系统），几秒钟后解锁。

    3.  保持**所有节点在线**，运行 `mongodump` 来复制数据、元数据（但不包括索引本身）以及 `oplog`。


    ## 完全复制


    停止节点进行完全复制是最简单且恢复最快的方法。如果你有足够的磁盘空间来完整复制 `dbpath`，你将获得所有数据和索引的快照。如果你需要回滚到该时间点，你可以启动一个新的
    `mongod` 进程，其 `--dbpath` 参数指向该数据目录，即可立即完成恢复。


    由于数据文件默认已经压缩，对此副本进行任何额外的压缩不太可能带来明显的额外空间节省，并且只会在恢复时需要更多时间进行解压缩，从而进一步延迟恢复。


    ## 采取快照


    下一种方法是获取干净的文件系统快照。此方法需要使用 Linux *逻辑卷管理器*（`LVM`）的存储卷。借助 `LVM`，你可以构建一个由多个较小物理卷支持的大卷组（`VG`），还可以选择提供一定额外性能和冗余的
    `RAID` 级别。然后，你可以为 MongoDB 节点的数据路径定义一个逻辑卷，并留出一些未分配的空间用于快照。


    `LVM` 允许你对卷进行快照。你可以随着时间的推移创建多个增量快照，只有更改的块（称为 delta）需要存储空间。你可以保留节点 6 小时或每日的快照，其占用的物理存储空间仅为完整独立副本的一小部分。


    *弹性块存储*（`EBS`）快照在亚马逊 `AWS` 上使用了相同的概念。所有主流云供应商也提供类似的快照功能。`EBS` 快照存储在与原始存储卷相同的云区域中。如果你创建了地缘分片集群以遵守全球数据保护法规，你对客户数据的快照自然会驻留在与生产数据相同的国家/地区。你仍然应该加密云备份，以进一步确保满足
    `GDPR` 和其他法规的注意义务条款。有关法律规定的更多详情，请参见第 4 章。


    ### 刷新磁盘


    在 MongoDB 中采取快照之前的先决步骤非常简单。你需要通过 Mongo shell 或脚本连接到节点，并在启动快照前发出 `db.fsyncLock()`。这确保任何待处理的磁盘刷新都已完成，磁盘上的状态完全干净，就像你已经干净地关闭了节点一样。然而，此时
    MongoDB 对任何新的写操作都已锁定，因此即使在生产环境中，我们也希望避免这种情况，哪怕只是很短的时间。


    ### 触发快照


    接下来，可以触发快照（但不一定立即完成），然后你可以立即使用同一个 Mongo shell 发出 `db.fsyncUnlock()`。这会解除锁定并允许再次写入。`LVM`
    和 `EBS` 快照随后可以在它们自己的时间内完成，因为它们将反映快照被触发时的时间点，此时 MongoDB 数据文件处于干净状态。


    ### 恢复快照


    这种方法的主要缺点是**恢复数据文件可能很慢**。由于我们采用增量备份以节省空间，恢复特定快照需要将原始状态与更改增量相结合。根据你使用的具体系统、触发备份的频率以及更新旧文档的频率，恢复
    terabytes 的数据可能需要几分钟到几小时不等。


    如果你依赖这些备份作为灾难恢复方法，你需要对恢复时间进行实际测试，以确保能够在内部服务级别协议（`SLA`）要求的时间（例如 `RTO`）内检索到最近的备份。'
- fmt: '### `mongodump`


    当节点写入绝对不能被锁定，或者无法使用 LVM 快照等类似方法时，可以使用 `mongodump` 命令行工具转储节点（或整个集群）的全部数据。此工具连接到一个节点，遍历所有数据库和集合，转储每个文档。默认情况下，它会创建一个
    `dump` 文件夹，其中包含每个集合的 BSON 格式数据文件以及包含任何索引规范的相应元数据文件。请注意，为了速度和紧凑性，`它不会转储索引本身`。这可能会使恢复过程非常缓慢，因为所有索引都需要从头开始重建。由于转储需要将所有文档从磁盘加载并解压缩到内存中，在转储完成之前，会对缓存以及随之而来的整体数据库性能产生相当大的影响。


    #### 操作日志一致性


    转储整个节点可能需要几分钟，有时甚至几小时。你应该选择性地转储一份操作日志副本，并在恢复时应用它，以便获得某个时间点的一致数据版本。否则，你可能在时间点 0（t⁰）先转储了集合
    `aaa`，但在转储进行到 5 分钟（t⁵）时，应用程序对集合 `aaa` 和 `zzz` 中的文档进行了更改。最终的转储将包含对 `zzz` 在 t⁵ 的更改，但不包含对
    `aaa` 的更改，从而导致数据状态不一致。`mongorestore` 中的 `--oplogReplay` 选项允许你将所有集合一致地恢复到 `mongodump`
    使用 `--oplog` 选项完成时的时间点。


    #### 数据子集


    如果整个数据库太大，或者你需要将集群的数据子集转储到不同的存储区域以符合 GDPR 要求，可以使用 `mongodump` 中的 `--query` 选项来过滤数据。例如，如果你想要转储
    `customers` 集合的欧盟数据，可以使用以下命令进行转储：


    ```

    mongodump -d=myDB -c=customers --query=''{ "country":

    { "$in": ["BE", "CZ", "DK", "DE", "EE", ...] }}''

    ```


    #### 读取偏好


    默认情况下，`mongodump` 会从主节点读取数据，以确保转储的是最新数据。但如果你想限制对存储 I/O 和工作集缓存刷新的性能影响，可以指定 `--readPreference=secondary`
    来强制从从节点读取数据。


    #### 用于转储恢复的 `Mongorestore`


    当需要恢复由 `mongodump` 生成的转储时，`mongorestore` 命令将连接到一个集群（无论是否为空），并可以恢复数据，可选择在导入前删除任何现有的集合。


    文档恢复后，此命令会读取包含索引定义的元数据，并着手创建索引。根据索引的复杂性、分布和数据大小，`索引构建可能需要数小时或数天`才能完全完成。在此期间，应用程序的操作性能将受到严重影响。对于任何大型数据集，这种漫长的恢复时间是
    `mongodump`/`mongorestore` 方法的主要缺点。


    #### 将转储恢复到独立节点


    对分片集群进行文件系统快照时，你必须恢复到具有相同分片数的集群。使用 `mongodump`/`mongorestore`，你可以将分片集群转储到一个统一的备份集中，每个集合一个
    BSON 文件。然后，你可以将其恢复到副本集甚至独立节点。这对于使用来自生产环境分片集群的真实数据更新 DEV 和 UAT 环境非常有用。


    ### 副本集


    备份副本集可以通过前面列出的任何适用于独立节点的方法执行。但是，我们现在可以选择从多个节点中进行备份。主节点是拥有最新写入的节点，但我们不想阻止主节点上的写入，因为这会影响生产环境中的任何应用程序。对于手动备份，从节点通常是一个更好的选择，因为如果应用程序默认从主节点读取，那么除了复制之外，从节点没有其他外部工作负载。更好的方法是添加一个额外的隐藏成员用于备份和其他特殊工作负载。我们可以安全地对这个隐藏节点调用
    `db.fsyncLock()` 或干净地关闭它进行长时间操作，而不会以任何方式影响副本集的可用性或应用程序性能。


    ### 延迟成员


    我们在第 2 章中介绍了延迟成员的概念。在某些情况下，这些节点可以用作防止严重人为错误的额外保护。如果没有其他备份可用，如果数据库管理员意外删除了整个集合，或者从每个文档中移除了某个字段，这个延迟成员至少会拥有几个小时前的一致副本。


    如果发生灾难，并且活动成员已经复制了数据删除操作，它们可以被关闭，主节点的操作日志被转储，然后重新启动延迟成员并配置为主节点。图 9-1 显示，操作日志可以通过新的主节点*重放*，直到执行错误操作之前的时刻。


    ![../images/487346_1_En_9_Chapter/487346_1_En_9_Fig1_HTML.jpg](images/487346_1_En_9_Chapter/487346_1_En_9_Fig1_HTML.jpg)


    **图 9-1**

    通过延迟成员恢复


    大多数人为错误不需要采取如此极端的措施。延迟成员也可用于查找和导出被意外删除或修改的数据子集。


    如果你选择这种方法，应该预先创建并彻底测试操作手册和脚本，以便恢复场景能够尽可能顺利地执行，涉及很少或无需手动步骤。


    **注意**


    在 MongoDB Atlas 或使用 Ops/Cloud Manager 备份时，你可以利用*可查询备份*来查询连续备份中的某个时间点，并查找旧文档或值。'
  raw: '### mongodump


    When it’s critical to never lock a node from writes, or there is no possibility
    to use LVM snapshots or similar, you can dump the entire data of a node (or entire
    cluster) using the `mongodump` command-line tool. This tool connects to a node
    and loops through all databases and collections, dumping out every document. By
    default, it creates a `dump` folder with a BSON-format data file for each collection
    and a corresponding metadata file containing the specification of any indexes.
    Note that for speed and compactness, **it does not dump the indexes themselves**.
    This can make the restore very slow as all indexes need to be rebuilt from scratch.
    Since a dump requires all documents to be loaded off disk and unpacked into memory,
    there will be considerable impact on the cache and consequently the overall database
    performance until the dump completes.


    #### Oplog consistency


    The dump of an entire node can take many minutes, and sometimes hours. You should
    optionally dump a copy of the oplog and apply that when restoring so that you
    get a consistent version of the data for a point in time. Otherwise, you may have
    dumped collection `aaa` first at time 0 (t⁰), but at time point 5 minutes into
    the dump (t⁵), the application made changes to documents in collection `aaa` and
    `zzz`. The final dump would include the change at t⁵ to `zzz` but not `aaa`, giving
    an inconsistent state. The `--oplogReplay` option in `mongorestore` allows you
    to restore all collections consistently to the time that the `mongodump` completed
    with the `--oplog` option.


    #### Data subsets


    If the total database is simply too large, or you need to dump separate subsets
    of the cluster’s data to different storage regions to facilitate GDPR compliance,
    you can use the `--query` option in `mongodump` to filter data. For example, if
    you want to dump EU data for the `customers` collection, you could dump with the
    following command:


    ```

    mongodump -d=myDB -c=customers --query=''{ "country":

    { "$in": ["BE", "CZ", "DK", "DE", "EE", ...] }}''

    ```


    #### Read preference


    By default, `mongodump` will read data from primary nodes to ensure the most recent
    data is dumped. But if you want to limit the performance impact on both storage
    I/O and flushing out the working set cache, you can specify `--readPreference=secondary`
    to force the data to be read from a secondary instead.


    #### Mongorestore for dumps


    When it’s time to restore a dump generated by `mongodump`, the `mongorestore`
    command will connect to a cluster (empty or not) and can restore the data, optionally
    dropping any existing collections before importing.


    Once the documents are restored, this command reads the metadata containing the
    index definitions and proceeds to create indexes. Depending on the complexity
    of the index, the distribution, and the size of the data, this **index build can
    take hours or days** to fully complete. During this time, application operation
    performance will be severely impacted. This long restore time is the major drawback
    of the `mongodump`/`mongorestore` approach for any large datasets.


    #### Restoring a dump to standalone


    When taking filesystem snapshots of sharded clusters, you must necessarily restore
    to a cluster with the same number of shards. With `mongodump`/`mongorestore` you
    can dump a sharded cluster into a unified backup set with one BSON file per collection.
    Then you can restore into a replica set or even a standalone node. This can be
    useful for updating DEV and UAT environments with real production data from a
    sharded cluster.


    ### Replica sets


    Backing up a replica set can be performed by any of the methods listed earlier
    for standalone nodes. However, we now have the choice of several nodes from which
    to take the backup. The primary is the node that has the very latest writes, but
    we don’t want to block writes on the primary since it will affect any applications
    in production. A secondary is often a better choice for manual backups since if
    applications are reading from primary anyway (the default), they have no other
    external workload apart from replication. Even better is to add an additional
    hidden member for backups and other special workloads. We can safely call `db.fsyncLock()`
    or cleanly shut down this hidden node for extended periods without affecting the
    replica set availability or application performance in any way.


    ### Delayed members


    We introduced the concept of delayed members back in Chapter [2](#487346_1_En_2_Chapter.xhtml).
    For certain situations, these nodes could be used as additional protection against
    catastrophic human error. With no other backup available, if a database administrator
    accidentally dropped an entire collection, or removed a field from every document,
    this delayed member would at least have a consistent copy from some hours ago.


    Should disaster happen and the live members have replicated the data removal,
    they could be shut down, the primary’s oplog dumped, and the delayed member restarted
    configured as the primary. Figure [9-1](#487346_1_En_9_Chapter.xhtml#Fig1) shows
    that the oplog could be *replayed* through the new primary until the moment before
    the faulty operations were performed.


    ![../images/487346_1_En_9_Chapter/487346_1_En_9_Fig1_HTML.jpg](images/487346_1_En_9_Chapter/487346_1_En_9_Fig1_HTML.jpg)


    Figure 9-1


    Restoration via a delayed member


    Most human errors will not require such extreme measures. The delayed member can
    also be used to find and export a subset of data that was accidentally dropped
    or modified.


    If you chose this approach, you should have a playbook and scripts pre-created
    and thoroughly tested so that the restore scenarios can be performed as smoothly
    as possible with little or no manual steps involved.


    Note


    In MongoDB Atlas or with Ops/Cloud Manager backups, you can utilize *queryable
    backups* to query a point in time in the continuous backup and look up an old
    document or value.'
