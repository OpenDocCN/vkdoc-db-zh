- fmt: '### China


    China has the most Internet users in the world but at the time of writing does
    not yet have single comprehensive data protection `regulation`.


    In March 2018, China’s Standard’s Committee TC260 issued a national `standard`,
    the “Personal Information Security Specification,” which provides guidance on
    the collection, storage, use, sharing, transfer, and disclosure of personal information.


    This standard does not yet result in legal or financial consequences, but national
    legislation is likely to arrive shortly which may require explicit consent for
    using and processing user data. There appears to be no automatic provisions for
    processing as a normal part of a contract between company and customer, so `consent`
    will be stricter than GDPR.


    In terms of MongoDB, you may need to at least maintain an array of different processing
    use cases for each user in the system to be able to track who has given consent
    for which activities.


    ### Russia


    Since Russia has not been short-listed as a country offering an adequate level
    of data protection under GDPR, it is not automatically allowed to transit EU data
    to Russia for even temporary processing. In terms of MongoDB, it is advisable
    to both store and process data inside the EU, or keep separate shards for EU and
    Russian personal data as discussed in later chapters.


    ## Design recommendations


    In this section we will cover some approaches that have been shown to best address
    compliance concerns during the application design phase.


    ### Field-level encryption


    One of the new security features of MongoDB 4.2 is client-side field-level encryption
    (FLE). With support added to the official drivers, this allows applications to
    encrypt certain fields and subdocuments with an external key `prior` to sending
    the data over the wire. The effect is that critical or sensitive user data is
    available only to the application and never reaches the database unencrypted.
    Should an intruder somehow access the live data inside a running `mongod` process
    (such as the exploits known as `Meltdown` and `Spectre`), the field values would
    still be encrypted.


    The application interfaces with an `external key store` (not part of MongoDB)
    to securely manage these keys and adds another level of security but also complexity.
    This approach has the added benefit that backups via `mongodump` or Ops Manager
    backups are also encrypted and secure.


    The keys can be created not only at the database or collection level but even
    on a per-user, per-document basis. This makes it easier to permanently erase user
    data from both the live database and also `all backups`.


    In Figure 4-4 we can see an Application retrieving a per-user key for extracting
    the `data` subdocument from a user profile. This key will be needed for any operation
    on the document for encrypted values. This means that any sort of server-side
    aggregations on this data field (or its subfields) will not be possible since
    they are essentially seen as binary data by the MongoDB query engine.


    ![../images/487346_1_En_4_Chapter/487346_1_En_4_Fig4_HTML.jpg](images/487346_1_En_4_Chapter/487346_1_En_4_Fig4_HTML.jpg)


    Figure 4-4


    The application encrypts the data subdocument


    When using `deterministic encryption`, the client can perform equality queries
    on encrypted field values. On the other hand, `randomized encryption` provides
    stronger confidentiality but limits operations on encrypted fields during queries.


    By discarding the old key for a particular user, it becomes virtually impossible
    to ever decode those encrypted values. As you can see, this can become a very
    convenient way to ensure GDPR and similar compliance regulations’ “right to be
    forgotten” requirements since it instantly and permanently locks all encrypted
    values in both the live database and all backups.


    ### Views


    MongoDB allows us to build a `View` defined as a multistage aggregation pipeline.
    By leveraging a set of different operators, we can transform all documents in
    a collection in a standard way, creating a new virtual collection which can be
    granted broader access within an organization while the original collection with
    full data values accessible only by a trusted few user accounts.


    In Listing 4-3, we see a view that takes both a “vertical” and “horizontal” subset
    of the data available in this collection. The aggregation pipeline first calculate
    customers’ ages from their birthdates, then divides by the number of milliseconds
    in a year to get the age in years.


    The resulting view only includes documents for study participants who are over
    18 and excludes their name, social security number, birthday, and exact street
    address. These views leave fields like `address.postcode` and `address.state`
    so that analytics could still be performed with grouping or visualizations based
    on postcode without any identifiable data possible to be extracted or restored.


    ```javascript

    db.createView(

    "participants_adults_nonpersonal",

    "participants",

    [ { $addFields: {

    age: {

    $divide: [{

    $subtract: [new Date(), "$birthdate"]

    },

    365.25 * 24 * 60 * 60 * 1000]

    }

    }},

    { $match: { age: { $gt: 18 }}},

    { $project: {

    name: 0, ssn: 0, birthdate: 0,

    "address.street": 0, age: 0

    }}

    ])

    ```

    Listing 4-3

    View definition excluding certain personal data


    The `$redact` aggregation pipeline stage is another powerful option that can be
    used in a view to conditionally prune fields from documents based on nesting depth
    or the value of other fields in the same document.


    ### Separate permissions


    The view itself is exposed as if it were a read-only collection. `Role-based access
    controls` (`RBAC`) mean that an individual user or a group can be granted read
    privileges to a view, but have no access to the underlying source collection that
    contains the personal data. The view can safely be shared with a wider audience
    to perform analytics or reporting without risking the exposure of sensitive information.


    For example, in a medical study you could grant a role called `controller` with
    read access to the original `participants` collection so that only trusted users
    can see the full data. In Listing 4-4, we see that another role called `researcher`
    could be granted read access to only the derived view `participants_adults_nonpersonal`.
    These researchers can never see identifying values, but can still manipulate the
    data for their analysis.


    ```javascript

    use admin;

    db.createRole({

    role  : "researcher",

    privileges : [

    {

    resource : {

    db : "app1",

    collection : " participants_adults_nonpersonal" },

    actions  : [ "find" ]

    }

    ],

    roles : []

    })

    db.createUser({

    user : "nic",

    pwd : "securepassword",

    roles : ["researcher "] }

    )

    ```

    Listing 4-4

    Custom role and user who can query this view only'
  raw: '### China


    China has the most Internet users in the world but at the time of writing does
    not yet have single comprehensive data protection *regulation*.


    In March 2018, China’s Standard’s Committee TC260 issued a national *standard*,
    the “Personal Information Security Specification,” which provides guidance on
    the collection, storage, use, sharing, transfer, and disclosure of personal information.


    This standard does not yet result in legal or financial consequences, but national
    legislation is likely to arrive shortly which may require explicit consent for
    using and processing user data. There appears to be no automatic provisions for
    processing as a normal part of a contract between company and customer, so *consent*
    will be stricter than GDPR.


    In terms of MongoDB, you may need to at least maintain an array of different processing
    use cases for each user in the system to be able to track who has given consent
    for which activities.


    ### Russia


    Since Russia has not been short-listed as a country offering an adequate level
    of data protection under GDPR, it is not automatically allowed to transit EU data
    to Russia for even temporary processing. In terms of MongoDB, it is advisable
    to both store and process data inside the EU, or keep separate shards for EU and
    Russian personal data as discussed in later chapters.


    ## Design recommendations


    In this section we will cover some approaches that have been shown to best address
    compliance concerns during the application design phase.


    ### Field-level encryption


    One of the new security features of MongoDB 4.2 is client-side field-level encryption
    (FLE). With support added to the official drivers, this allows applications to
    encrypt certain fields and subdocuments with an external key **prior** to sending
    the data over the wire. The effect is that critical or sensitive user data is
    available only to the application and never reaches the database unencrypted.
    Should an intruder somehow access the live data inside a running `mongod` process
    (such as the exploits known as *Meltdown* and *Spectre*), the field values would
    still be encrypted.


    The application interfaces with an *external key store* (not part of MongoDB)
    to securely manage these keys and adds another level of security but also complexity.
    This approach has the added benefit that backups via `mongodump` or Ops Manager
    backups are also encrypted and secure.


    The keys can be created not only at the database or collection level but even
    on a per-user, per-document basis. This makes it easier to permanently erase user
    data from both the live database and also *all backups*.


    In Figure [4-4](#487346_1_En_4_Chapter.xhtml#Fig4) we can see an Application retrieving
    a per-user key for extracting the `data` subdocument from a user profile. This
    key will be needed for any operation on the document for encrypted values. This
    means that any sort of server-side aggregations on this data field (or its subfields)
    will not be possible since they are essentially seen as binary data by the MongoDB
    query engine.


    ![../images/487346_1_En_4_Chapter/487346_1_En_4_Fig4_HTML.jpg](images/487346_1_En_4_Chapter/487346_1_En_4_Fig4_HTML.jpg)


    Figure 4-4


    The application encrypts the data subdocument


    When using *deterministic encryption*, the client can perform equality queries
    on encrypted field values. On the other hand, *randomized encryption* provides
    stronger confidentiality but limits operations on encrypted fields during queries.


    By discarding the old key for a particular user, it becomes virtually impossible
    to ever decode those encrypted values. As you can see, this can become a very
    convenient way to ensure GDPR and similar compliance regulations’ “right to be
    forgotten” requirements since it instantly and permanently locks all encrypted
    values in both the live database and all backups.


    ### Views


    MongoDB allows us to build a *View* defined as a multistage aggregation pipeline.
    By leveraging a set of different operators, we can transform all documents in
    a collection in a standard way, creating a new virtual collection which can be
    granted broader access within an organization while the original collection with
    full data values accessible only by a trusted few user accounts.


    In **Listing** [**4-3**](#487346_1_En_4_Chapter.xhtml#PC4), we see a view that
    takes both a “vertical” and “horizontal” subset of the data available in this
    collection. The aggregation pipeline first calculate customers’ ages from their
    birthdates, then divides by the number of milliseconds in a year to get the age
    in years.


    The resulting view only includes documents for study participants who are over
    18 and excludes their name, social security number, birthday, and exact street
    address. These views leave fields like `address.postcode` and `address.state`
    so that analytics could still be performed with grouping or visualizations based
    on postcode without any identifiable data possible to be extracted or restored.


    ```

    db.createView(

    "participants_adults_nonpersonal",

    "participants",

    [ { $addFields: {

    age: {

    $divide: [{

    $subtract: [new Date(), "$birthdate"]

    },

    365.25 * 24 * 60 * 60 * 1000]

    }

    }},

    { $match: { age: { $gt: 18 }}},

    { $project: {

    name: 0, ssn: 0, birthdate: 0,

    "address.street": 0, age: 0

    }}

    ])

    Listing 4-3

    View definition excluding certain personal data

    ```


    The `$redact` aggregation pipeline stage is another powerful option that can be
    used in a view to conditionally prune fields from documents based on nesting depth
    or the value of other fields in the same document.


    ### Separate permissions


    The view itself is exposed as if it were a read-only collection. *Role-based access
    controls* (RBAC) mean that an individual user or a group can be granted read privileges
    to a view, but have no access to the underlying source collection that contains
    the personal data. The view can safely be shared with a wider audience to perform
    analytics or reporting without risking the exposure of sensitive information.


    For example, in a medical study you could grant a role called `controller` with
    read access to the original `participants` collection so that only trusted users
    can see the full data. In Listing [4-4](#487346_1_En_4_Chapter.xhtml#PC5), we
    see that another role called `researcher` could be granted read access to only
    the derived view `participants_adults_nonpersonal`. These researchers can never
    see identifying values, but can still manipulate the data for their analysis.


    ```

    use admin;

    db.createRole({

    role  : "researcher",

    privileges : [

    {

    resource : {

    db : "app1",

    collection : " participants_adults_nonpersonal" },

    actions  : [ "find" ]

    }

    ],

    roles : []

    })

    db.createUser({

    user : "nic",

    pwd : "securepassword",

    roles : ["researcher "] }

    )

    Listing 4-4

    Custom role and user who can query this view only

    ```'
  trans: '

    ### 中国


    中国拥有全球最多的互联网用户，但在撰写本文时，尚未出台一部全面统一的数据保护`法规`。


    2018 年 3 月，中国国家标准化管理委员会 TC260 发布了国家标准《信息安全技术 个人信息安全规范》，为个人信息的收集、存储、使用、共享、转移和披露提供了指导。


    该标准目前尚未导致法律或经济后果，但预计国家立法可能很快出台，届时可能要求使用和处理用户数据必须获得明确同意。目前似乎没有针对作为公司与客户合同正常部分的处理行为设定自动许可条款，因此`同意`要求将比
    GDPR 更为严格。


    就 MongoDB 而言，你可能至少需要在系统中为每个用户维护一个不同处理用例的数组，以便能够追踪谁已同意哪些活动。


    ### 俄罗斯


    由于俄罗斯未被列入 GDPR 下提供充分数据保护水平的国家名单，因此自动将欧盟数据传输至俄罗斯进行处理（即使是临时处理）是不被允许的。在 MongoDB 方面，建议将数据存储和处理均置于欧盟境内，或者如后续章节所述，为欧盟和俄罗斯的个人数据保留独立的分片。


    ## 设计建议


    在本节中，我们将介绍一些在应用程序设计阶段已被证明能最好地应对合规性问题的方法。


    ### 字段级加密


    MongoDB 4.2 的一项新安全特性是客户端字段级加密（FLE）。随着官方驱动程序添加了对此的支持，这允许应用程序在数据通过网络发送之前，使用外部密钥`prior`对某些字段和子文档进行加密。其效果是，关键或敏感的用户数据仅对应用程序可用，永远不会以未加密形式到达数据库。即使入侵者以某种方式访问了正在运行的`mongod`进程内的实时数据（例如被称为`Meltdown`和`Spectre`的漏洞），字段值仍将保持加密状态。


    应用程序通过一个`外部密钥存储`（不属于 MongoDB 的一部分）进行交互，以安全管理这些密钥，这增加了一层安全性，但也增加了复杂性。这种方法还有一个额外好处，即通过`mongodump`或
    Ops Manager 进行的备份也是加密和安全的。


    密钥不仅可以基于数据库或集合级别创建，甚至可以基于每个用户、每个文档创建。这使得从实时数据库和`所有备份`中永久擦除用户数据变得更加容易。


    在图 4-4 中，我们可以看到一个应用程序检索每个用户的密钥，用于从用户配置文件中提取`data`子文档。对加密值的任何文档操作都需要此密钥。这意味着无法在此数据字段（或其子字段）上进行任何类型的服务器端聚合，因为
    MongoDB 查询引擎基本上将它们视为二进制数据。


    ![../images/487346_1_En_4_Chapter/487346_1_En_4_Fig4_HTML.jpg](img/487346_1_En_4_Fig4_HTML.jpg)


    图 4-4


    应用程序加密数据子文档


    当使用`确定性加密`时，客户端可以对加密字段值执行相等性查询。另一方面，`随机加密`提供了更强的保密性，但限制了查询期间对加密字段的操作。


    通过丢弃特定用户的旧密钥，实际上几乎不可能再解密那些加密值。正如你所见，这可以成为确保 GDPR 及类似合规性法规的“被遗忘权”要求的一种非常便捷的方式，因为它能即时且永久地锁定实时数据库和所有备份中的所有加密值。


    ### 视图


    MongoDB 允许我们构建一个`视图`，其定义为一个多阶段聚合管道。通过利用一组不同的运算符，我们可以以标准方式转换集合中的所有文档，创建一个新的虚拟集合，该集合可以在组织内获得更广泛的访问权限，而包含完整数据值的原始集合则只允许受信任的少数用户账户访问。


    在代码清单 4-3 中，我们看到一个视图，它获取了此集合中可用数据的“垂直”和“水平”子集。聚合管道首先根据客户的出生日期计算年龄，然后除以一年的毫秒数以得到以年为单位的年龄。


    结果视图仅包含年龄超过 18 岁的研究参与者的文档，并排除了他们的姓名、社会安全号码、生日和确切的街道地址。这些视图保留了像`address.postcode`和`address.state`这样的字段，因此仍然可以进行基于邮政编码的分组或可视化分析，而不会泄露或恢复任何可识别身份的数据。


    ```javascript

    db.createView(

    "participants_adults_nonpersonal",

    "participants",

    [ { $addFields: {

    age: {

    $divide: [{

    $subtract: [new Date(), "$birthdate"]

    },

    365.25 * 24 * 60 * 60 * 1000]

    }

    }},

    { $match: { age: { $gt: 18 }}},

    { $project: {

    name: 0, ssn: 0, birthdate: 0,

    "address.street": 0, age: 0

    }}

    ])

    ```

    代码清单 4-3

    排除某些个人数据的视图定义


    聚合管道阶段`$redact`是另一个强大的选项，可用于视图中，根据嵌套深度或同一文档中其他字段的值有条件地修剪文档中的字段。


    ### 独立的权限


    视图本身被暴露为一个只读集合。`基于角色的访问控制`（`RBAC`）意味着可以为单个用户或组授予对视图的读取权限，但无权访问包含个人数据的底层源集合。该视图可以安全地与更广泛的受众共享以执行分析或报告，而没有暴露敏感信息的风险。


    例如，在一项医学研究中，你可以授予一个名为`controller`的角色对原始`participants`集合的读取权限，以便只有受信任的用户才能看到完整数据。在代码清单
    4-4 中，我们看到另一个名为`researcher`的角色只能被授予对派生视图`participants_adults_nonpersonal`的读取权限。这些研究人员永远无法看到标识性数值，但仍可以操作数据进行分析。


    ```javascript

    use admin;

    db.createRole({

    role  : "researcher",

    privileges : [

    {

    resource : {

    db : "app1",

    collection : " participants_adults_nonpersonal" },

    actions  : [ "find" ]

    }

    ],

    roles : []

    })

    db.createUser({

    user : "nic",

    pwd : "securepassword",

    roles : ["researcher "] }

    )

    ```

    代码清单 4-4

    只能查询此视图的自定义角色和用户

