- fmt: "## Pre-splitting\n\nWhen restoring or importing a large amount of data into\
    \ an empty sharded collection, it is much more efficient to `pre-split chunks`\
    \ if you already know approximately how the values will be distributed. This means\
    \ that the `mongorestore` via the `mongos` will immediately distribute document\
    \ inserts directly across shards. With a well-defined pre-split, the chunks should\
    \ be equally distributed, and there shouldn’t be much for the balancer to redistribute\
    \ over the network after restoring data.\n\nThe command in Listing 1-3 will create\
    \ 16,384 equally sized chunks across all the current shards and will give almost\
    \ perfectly even distribution of new document inserts.\n\n```\ndb.adminCommand({\n\
    \    shardCollection: \"cacheDB.userCache\",\n    key: { _id: 'hashed' },\n  \
    \  numInitialChunks: 16384\n})\n```\n*Listing 1-3: Command to pre-split with a\
    \ hashed shard key*\n\n## Ascending shard keys and hot shards\n\nLet’s imagine\
    \ a slight variation on our first chunk example where the collection stores documents\
    \ about the user account and the shard key includes a version field `v` which\
    \ is usually between 1 and 3 and therefore has low cardinality.\n\nWhen new users\
    \ sign up to this service, they are assigned a `monotonically increasing` customer\
    \ ID number `custId`. In the example shown in Figure 1-8, we see the next customers\
    \ to sign up will get IDs 9433, 9434, and 9435. All of these will naturally fall\
    \ into `Chunk 1000`’s range and will be routed to Shard B. In fact, any of the\
    \ most recent half of our customers will be routed to Shard B for both reads and\
    \ writes, while the oldest (and possibly less active ones) will be routed to Shard\
    \ A. In this scenario we consider Shard B to be a `hot shard` as it is receiving\
    \ a clear majority of the cluster’s workload. This scaling design fails even when\
    \ adding more shards as the chunk with range ending in infinity will receive `all`\
    \ the insert operations.\n\n![../images/487346_1_En_1_Chapter/487346_1_En_1_Fig8_HTML.jpg](images/487346_1_En_1_Chapter/487346_1_En_1_Fig8_HTML.jpg)\n\
    \n*Figure 1-8: A sharded cluster with a hot shard taking all new inserts*\n\n\
    There are several alternatives which will be discussed in Chapters 10 and 11 on\
    \ advanced sharding techniques.\n\n## Architecture choices\n\nNow that we understand\
    \ the major concepts of MongoDB replication and sharding, it’s time to consider\
    \ how to best lay out the underlying infrastructure to most efficiently and cost-effectively\
    \ host our deployment in a scalable and performant manner.\n\nIn many cases when\
    \ we are facing challenges in maximizing performance of a cluster, it’s good to\
    \ think in terms of bottlenecks. The usual bottlenecks are `CPU` processing, available\
    \ `memory`, `storage I/O` capacity, and `network` latency, bandwidth, or congestion.\n\
    \n### Computing resources\n\nMongoDB has been designed to run on commodity hardware\
    \ and doesn’t require any special expensive enterprise-ready hardware. Having\
    \ said that, there are a number of hardware choices for any hosts (virtual or\
    \ otherwise) which can create a good baseline performance.\n\n#### Memory\n\n\
    Firstly, the nodes should have sufficient memory to keep a `working set` of documents\
    \ and indexes in memory. By avoiding a round-trip to the storage device, MongoDB\
    \ is able to service incoming requests and changes extremely quickly. This working\
    \ set is hard to predict in advance, since it represents the documents that are\
    \ actively being accessed and changed in a given period. Simulating workloads\
    \ with real data is the best way to gauge the working set requirements of your\
    \ application.\n\nWhen a request comes in to change a document, or execute a query,\
    \ if the data is already in the WiredTiger storage engine’s memory cache, then\
    \ there is no need to wait for slower storage-layer lookups. Even writes can be\
    \ performed purely in memory in a concurrent manner and will be flushed to disk\
    \ every 60 seconds or so.\n\nIn the evolution of any application, as load increases,\
    \ at some point the working set will expand past the physical memory available\
    \ to the host, and suddenly I/O will become a bottleneck as the cache of document\
    \ in memory “churns” and changes written in memory need to be flushed to disk\
    \ early. It is important to monitor real memory growth and swap usage during peak\
    \ times to detect these limits early and react by increasing memory resources,\
    \ or sharding.\n\n#### Storage\n\nAt the current price per gigabyte, solid-state\
    \ storage (SSD) should be the bare minimum for any new deployment infrastructure.\
    \ Spinning hard drives (HDD) should be avoided at all costs due to the extremely\
    \ high seek latency which will slow down random reads.\n\nMost cloud providers\
    \ offer multiple levels of storage device latency. The `provisioned` input/output\
    \ operations per second (IOPS) storage often provides much lower latency for a\
    \ reasonable additional cost.\n\nAnother way to further reduce storage latency\
    \ and improve throughput is to use the newer NVMe (Nonvolatile Memory Express)\
    \ technology. Some cloud providers even offer local NVMe storage on certain classes\
    \ of virtual machine instances. Note, however, that often these are offered as\
    \ ephemeral drives and `all data may be lost` should the instance ever be stopped\
    \ (either explicitly or due to data center failures). Therefore, be careful to\
    \ have at least one node running on persistent storage to avoid complete data\
    \ loss should all instances be shut down simultaneously.\n\n### Bandwidth and\
    \ latency\n\nDesigning for low latency will be crucial in achieving a high-performance\
    \ distributed database. There are many different hardware options available, and\
    \ manufacturers are working hard to reduce latency and increase bandwidth at each\
    \ level and with each new iteration.\n\nAs we can see in Table 1-4, memory is\
    \ still much faster than persistent storage technologies, but some of the most\
    \ recent SSD storage devices can now compete in terms of bandwidth with older\
    \ memory technologies.\n\n*Table 1-4: Access speeds of different storage (approximate)*\n\
    \n| Category | Seek Latency | Read Bandwidth (Sequential) |\n| --- | --- | ---\
    \ |\n| L1 Cache | 2 ns (2–3 clock cycles) | ~3500MB/s |\n| L2 Cache | 5 ns (~10\
    \ clock cycles) | ~4000MB/s |\n| Memory (DDR4) | 70 ns | ~3000MB/s |\n| Memory\
    \ (DDR3) | 80 ns | ~2000MB/s |\n| SDD with Nonvolatile Memory Express (NVMe) |\
    \ 120,000 ns (0.1 ms) | ~2500MB/s (with 4 lanes) |\n| SSD Storage (SATA 3.0) |\
    \ 500,000 ns (0.5 ms) | ~550MB/s |\n| HDD Storage (SAS/FC) | 12 x 10⁶ ns (13 ms)\
    \ | ~200MB/s |\n| SAN (Fiber Channel, iSCSI) Network Storage | Storage latency\
    \ + additional 200–700 ns | 200MB/s–16GB/s |\n\nWe can conclude that investing\
    \ in the right SSD and memory technologies can easily double the I/O performance\
    \ of your database nodes.\n\nEven though the read bandwidth of memory is no longer\
    \ much higher than SSD storage, the latency is about 1000 times lower. In most\
    \ cases, queries will first read an index, then load and return a small document\
    \ (a few hundred bytes in size) and so the latency is much more important to performance\
    \ than bandwidth.\n\n*Note: Memory performance actually drops with increasing\
    \ size. The latency of 8GB sticks is about 50% slower than 4GB. The cost per GB\
    \ does not scale favorably either.*"
  raw: '### Pre-splitting


    When restoring or importing a large amount of data into an empty sharded collection,
    it is much more efficient to *pre-split chunks* if you already know approximately
    how the values will be distributed. This means that the `mongorestore` via the
    `mongos` will immediately distribute document inserts directly across shards.
    With a well-defined pre-split, the chunks should be equally distributed, and there
    shouldn’t be much for the balancer to redistribute over the network after restoring
    data.


    The command in Listing [1-3](#487346_1_En_1_Chapter.xhtml#PC3) will create 16,384
    equally sized chunks across all the current shards and will give almost perfectly
    even distribution of new document inserts.


    ```

    db.adminCommand({

    shardCollection: "cacheDB.userCache",

    key: { _id: ''hashed'' },

    numInitialChunks: 16384

    })

    Listing 1-3

    Command to pre-split with a hashed shard key

    ```


    ### Ascending shard keys and hot shards


    Let’s imagine a slight variation on our first chunk example where the collection
    stores documents about the user account and the shard key includes a version field
    `v` which is usually between 1 and 3 and therefore has low cardinality.


    When new users sign up to this service, they are assigned a *monotonically increasing*
    customer ID number `custId`. In the example shown in Figure [1-8](#487346_1_En_1_Chapter.xhtml#Fig8),
    we see the next customers to sign up will get IDs 9433, 9434, and 9435\. All of
    these will naturally fall into *Chunk 1000*’s range and will be routed to Shard
    B. In fact, any of the most recent half of our customers will be routed to Shard
    B for both reads and writes, while the oldest (and possibly less active ones)
    will be routed to Shard A. In this scenario we consider Shard B to be a *hot shard*
    as it is receiving a clear majority of the cluster’s workload. This scaling design
    fails even when adding more shards as the chunk with range ending in infinity
    will receive *all* the insert operations.


    ![../images/487346_1_En_1_Chapter/487346_1_En_1_Fig8_HTML.jpg](images/487346_1_En_1_Chapter/487346_1_En_1_Fig8_HTML.jpg)


    Figure 1-8


    A sharded cluster with a hot shard taking all new inserts


    There are several alternatives which will be discussed in Chapters [10](#487346_1_En_10_Chapter.xhtml)
    and [11](#487346_1_En_11_Chapter.xhtml) on advanced sharding techniques.


    ## Architecture choices


    Now that we understand the major concepts of MongoDB replication and sharding,
    it’s time to consider how to best lay out the underlying infrastructure to most
    efficiently and cost-effectively host our deployment in a scalable and performant
    manner.


    In many cases when we are facing challenges in maximizing performance of a cluster,
    it’s good to think in terms of bottlenecks. The usual bottlenecks are *CPU* processing,
    available *memory*, *storage I/O* capacity, and *network* latency, bandwidth,
    or congestion.


    ### Computing resources


    MongoDB has been designed to run on commodity hardware and doesn’t require any
    special expensive enterprise-ready hardware. Having said that, there are a number
    of hardware choices for any hosts (virtual or otherwise) which can create a good
    baseline performance.


    #### Memory


    Firstly, the nodes should have sufficient memory to keep a *working set* of documents
    and indexes in memory. By avoiding a round-trip to the storage device, MongoDB
    is able to service incoming requests and changes extremely quickly. This working
    set is hard to predict in advance, since it represents the documents that are
    actively being accessed and changed in a given period. Simulating workloads with
    real data is the best way to gauge the working set requirements of your application.


    When a request comes in to change a document, or execute a query, if the data
    is already in the WiredTiger storage engine’s memory cache, then there is no need
    to wait for slower storage-layer lookups. Even writes can be performed purely
    in memory in a concurrent manner and will be flushed to disk every 60 seconds
    or so.


    In the evolution of any application, as load increases, at some point the working
    set will expand past the physical memory available to the host, and suddenly I/O
    will become a bottleneck as the cache of document in memory “churns” and changes
    written in memory need to be flushed to disk early. It is important to monitor
    real memory growth and swap usage during peak times to detect these limits early
    and react by increasing memory resources, or sharding.


    #### Storage


    At the current price per gigabyte, solid-state storage (SSD) should be the bare
    minimum for any new deployment infrastructure. Spinning hard drives (HDD) should
    be avoided at all costs due to the extremely high seek latency which will slow
    down random reads.


    Most cloud providers offer multiple levels of storage device latency. The *provisioned*
    input/output operations per second (IOPS) storage often provides much lower latency
    for a reasonable additional cost.


    Another way to further reduce storage latency and improve throughput is to use
    the newer NVMe (Nonvolatile Memory Express) technology. Some cloud providers even
    offer local NVMe storage on certain classes of virtual machine instances. Note,
    however, that often these are offered as ephemeral drives and *all data may be
    lost* should the instance ever be stopped (either explicitly or due to data center
    failures). Therefore, be careful to have at least one node running on persistent
    storage to avoid complete data loss should all instances be shut down simultaneously.


    ### Bandwidth and latency


    Designing for low latency will be crucial in achieving a high-performance distributed
    database. There are many different hardware options available, and manufacturers
    are working hard to reduce latency and increase bandwidth at each level and with
    each new iteration.


    As we can see in Table [1-4](#487346_1_En_1_Chapter.xhtml#Tab4), memory is still
    much faster than persistent storage technologies, but some of the most recent
    SSD storage devices can now compete in terms of bandwidth with older memory technologies.


    Table 1-4


    Access speeds of different storage (approximate)


    | Category | Seek Latency | Read Bandwidth (Sequential) |

    | --- | --- | --- |

    | L1 Cache | 2 ns (2–3 clock cycles) | ~3500MB/s |

    | L2 Cache | 5 ns (~10 clock cycles) | ~4000MB/s |

    | Memory (DDR4) | 70 ns | ~3000MB/s |

    | Memory (DDR3) | 80 ns | ~2000MB/s |

    | SDD with Nonvolatile Memory Express (NVMe) | 120,000 ns (0.1 ms) | ~2500MB/s
    (with 4 lanes) |

    | SSD Storage (SATA 3.0) | 500,000 ns (0.5 ms) | ~550MB/s |

    | HDD Storage (SAS/FC) | 12 x 10⁶ ns (13 ms) | ~200MB/s |

    | SAN (Fiber Channel, iSCSI)Network Storage | Storage latency + additional 200–700
    ns | 200MB/s–16GB/s |


    We can conclude that investing in the right SSD and memory technologies can easily
    double the I/O performance of your database nodes.


    Even though the read bandwidth of memory is no longer much higher than SSD storage,
    the latency is about 1000 times lower. In most cases, queries will first read
    an index, then load and return a small document (a few hundred bytes in size)
    and so the latency is much more important to performance than bandwidth.


    Note


    Memory performance actually drops with increasing size. The latency of 8GB sticks
    is about 50% slower than 4GB. The cost per GB does not scale favorably either.'
  trans: "\n## 预分裂\n\n在将大量数据恢复或导入到一个空的分片集合时，如果你已经大致了解数据的分布情况，采用`预分裂块`的方式会高效得多。这意味着通过`mongos`执行的`mongrestore`操作会立即将文档插入直接分布到各个分片上。通过精心定义的预分裂，块应该被均匀分布，数据恢复后几乎不需要均衡器在网络上进行重新分配。\n\
    \n清单 1-3 中的命令将在所有当前分片上创建 16,384 个大小相等的块，并将使新文档插入的分布近乎完全均匀。\n\n```\ndb.adminCommand({\n\
    \    shardCollection: \"cacheDB.userCache\",\n    key: { _id: 'hashed' },\n  \
    \  numInitialChunks: 16384\n})\n```\n*清单 1-3: 使用哈希分片键进行预分裂的命令*\n\n## 递增分片键与热分片\n\
    \n让我们想象一下第一个分片示例的一个微小变体：集合存储用户账户文档，分片键包含一个版本字段 `v`，该字段通常介于 1 和 3 之间，因此具有较低的基数。\n\
    \n当新用户注册此服务时，他们会获得一个`单调递增`的客户 ID 号 `custId`。在如图 1-8 所示的示例中，我们看到接下来的注册客户将获得 ID\
    \ 9433、9434 和 9435。所有这些自然都将落入 `Chunk 1000` 的范围内，并被路由到 Shard B。事实上，我们最近注册的客户中大约一半的读写操作都将被路由到\
    \ Shard B，而最旧的（可能也是最不活跃的）客户则会被路由到 Shard A。在这种情况下，我们将 Shard B 视为一个`热分片`，因为它接收了集群中的绝大多数工作负载。即使增加更多分片，这种扩展设计也会失败，因为范围以无穷大结尾的块将接收到`所有`插入操作。\n\
    \n![../images/487346_1_En_1_Chapter/487346_1_En_1_Fig8_HTML.jpg](img/487346_1_En_1_Fig8_HTML.jpg)\n\
    \n*图 1-8: 一个热分片接收所有新插入的分片集群*\n\n存在几种替代方案，将在第 10 章和第 11 章关于高级分片技术的部分进行讨论。\n\n##\
    \ 架构选择\n\n既然我们已经理解了 MongoDB 复制和分片的主要概念，是时候考虑如何最好地设计底层基础设施，以最高效、最具成本效益的方式，可扩展且高性能地承载我们的部署了。\n\
    \n在许多情况下，当我们面临最大化集群性能的挑战时，从瓶颈的角度思考是很有帮助的。常见的瓶颈包括 `CPU` 处理、可用`内存`、`存储 I/O` 容量以及`网络`延迟、带宽或拥塞。\n\
    \n### 计算资源\n\nMongoDB 设计为在通用硬件上运行，不需要任何特殊的昂贵的企业级硬件。话虽如此，对于任何主机（虚拟机或其他类型）都有许多硬件选择可以创建良好的基线性能。\n\
    \n#### 内存\n\n首先，节点应具有足够的内存，以将文档和索引的`工作集`保持在内存中。通过避免往返存储设备，MongoDB 能够极快地处理传入的请求和更改。这个工作集很难提前预测，因为它代表了在给定时间段内被主动访问和更改的文档。使用真实数据模拟工作负载是评估应用程序工作集需求的最佳方式。\n\
    \n当收到更改文档或执行查询的请求时，如果数据已经在 WiredTiger 存储引擎的内存缓存中，则无需等待较慢的存储层查找。甚至写操作也可以纯粹在内存中以并发方式执行，并且大约每\
    \ 60 秒会刷新到磁盘一次。\n\n在任何应用程序的演进过程中，随着负载增加，在某个时刻工作集将扩展到超过主机可用的物理内存，此时 I/O 将突然成为瓶颈，因为内存中的文档缓存“抖动”，并且需要提前将内存中的更改刷新到磁盘。重要的是在高峰时段监控实际的内存增长和交换空间使用情况，以便及早发现这些限制，并通过增加内存资源或进行分片来应对。\n\
    \n#### 存储\n\n以当前每 GB 的价格来看，固态存储（SSD）应该是任何新部署基础设施的最低要求。应不惜一切代价避免使用旋转硬盘（HDD），因为其极高的寻道延迟会减慢随机读取速度。\n\
    \n大多数云提供商提供多个级别的存储设备延迟。`预配置`的每秒输入/输出操作次数（IOPS）存储通常以合理的额外成本提供低得多的延迟。\n\n另一种进一步降低存储延迟并提高吞吐量的方法是使用更新的\
    \ NVMe（非易失性内存快速）技术。一些云提供商甚至在某些类别的虚拟机实例上提供本地 NVMe 存储。但请注意，这些通常作为临时驱动器提供，如果实例停止（无论是显式停止还是由于数据中心故障），`所有数据都可能丢失`。因此，请务必至少有一个节点运行在持久性存储上，以避免在所有实例同时关闭时发生完全数据丢失。\n\
    \n### 带宽与延迟\n\n为实现高性能分布式数据库，低延迟设计至关重要。有多种不同的硬件选项可供选择，制造商正在努力在每个层面、每次迭代中降低延迟并提高带宽。\n\
    \n如表 1-4 所示，内存仍然比持久存储技术快得多，但一些最新的 SSD 存储设备现在在带宽方面可以与较旧的内存技术竞争。\n\n*表 1-4: 不同存储介质的访问速度（近似值）*\n\
    \n| 类别 | 寻道延迟 | 读取带宽（顺序） |\n| --- | --- | --- |\n| L1 缓存 | 2 ns（2-3 个时钟周期） | ~3500MB/s\
    \ |\n| L2 缓存 | 5 ns（~10 个时钟周期） | ~4000MB/s |\n| 内存（DDR4） | 70 ns | ~3000MB/s |\n\
    | 内存（DDR3） | 80 ns | ~2000MB/s |\n| 采用非易失性内存快速（NVMe）的 SSD | 120,000 ns（0.1 ms）\
    \ | ~2500MB/s（使用 4 通道） |\n| SSD 存储（SATA 3.0） | 500,000 ns（0.5 ms） | ~550MB/s |\n\
    | HDD 存储（SAS/FC） | 12 x 10⁶ ns（13 ms） | ~200MB/s |\n| SAN（光纤通道，iSCSI）网络存储 | 存储延迟\
    \ + 额外 200-700 ns | 200MB/s-16GB/s |\n\n我们可以得出结论，投资于合适的 SSD 和内存技术可以轻松地将数据库节点的\
    \ I/O 性能提升一倍。\n\n尽管内存的读取带宽不再比 SSD 存储高很多，但其延迟大约低 1000 倍。在大多数情况下，查询会先读取索引，然后加载并返回一个小文档（大小几百字节），因此延迟对性能而言比带宽重要得多。\n\
    \n*注意：内存性能实际上会随着容量增加而下降。8GB 内存条的延迟比 4GB 大约慢 50%。每 GB 的成本增长也不成比例。*\n"
- fmt: '#### Horizontal scaling


    一旦节点的垂直扩展潜力耗尽，并且副本集无法处理应用程序的所有写入请求（或者磁盘上的数据大小已超过约 2TB），那么就该通过分片进行*水平*扩展了。


    > 注意

    >

    > 分片大小的 2TB 推荐限制是基于存储和网络吞吐量的实际限制，以使初始同步和恢复能在可接受的时间范围内完成。


    通过分片，我们可以将负载分散到多个主节点上，并且从那时起，可以根据工作负载或数据的增长，通过添加额外的分片来进一步增加容量。这可能是增加整体内存资源和集群总性能最具成本效益的方式。


    #### Round-trip latency


    在 MongoDB 中，与任何分布式系统一样，一个瓶颈可能是数据包在组件之间发送并获得响应所需的时间。这被称为往返时间（RTT）延迟，它会影响 MongoDB
    集群中许多组件选择路由请求的方式。


    这种延迟通常以毫秒为单位记录，并受到许多因素的限制。任何一对主机之间的物理距离（以及光速）、网络拥堵、所选的网络路径（跳数）以及沿途交换机添加的延迟都是可能增加延迟的常见因素。如果可能，应使用数据中心之间的直接专用光纤连接以尽可能减少此延迟。


    在分片集群中，应用程序通过`mongos`路由节点进行查询，因此存在两组不同的往返，如图 [1-9](#487346_1_En_1_Chapter.xhtml#Fig9)
    所示。在此示例中，我们看到应用程序[1]到同一数据中心内的`mongos`节点的延迟较低。基于此，应用程序[1]中的驱动程序将通过`mongos`[1]和`mongos`[2]分发其查询，而应用程序[2]将所有查询路由到
    DC2 中的`mongos`[3]。但是，如果`mongos`[3]发生故障，应用程序[2]将自动且立即故障转移到 DC1 中可用的`mongos`，因为它们现在代表了最佳的
    RTT。


    ![../images/487346_1_En_1_Chapter/487346_1_En_1_Fig9_HTML.jpg](images/487346_1_En_1_Chapter/487346_1_En_1_Fig9_HTML.jpg)


    图 1-9

    两个数据中心部署中组件之间的延迟


    第二组往返是在`mongos`实例和分片中承载数据的节点之间进行的。默认情况下，读写操作将通过主节点进行。但是，如果应用程序请求`nearest`读取偏好，那么查询将被发送到`mongod`[1]或`mongod`[2]，因为它们的
    RTT 最低，分别为 2 毫秒和 1 毫秒。


    ### Private vs. cloud


    本书的其余部分将重点介绍客户希望构建高性能、高可用性的自管理 MongoDB 部署的情况。直到最近，大多数生产环境中的 MongoDB 部署都部署在公司自己的数据中心——即所谓的"*on-prem*"部署。


    现在，许多大公司发现主要的云提供商（如 AWS、Azure 和 GCP）足够稳定且具有成本效益，他们可以在云上运行虚拟机作为"*self-managed cloud*"服务器。我们有时会比较在本地可能实现的功能与
    MongoDB 自己的称为 MongoDB Atlas 的*完全托管*解决方案。


    ### Logical databases


    与大多数数据库管理系统一样，MongoDB 允许在单个物理部署上存在多个*逻辑数据库*。每个逻辑数据库可以有自己的数据集合以及拥有自定义角色和权限的用户。然而，这些数据库的数据文件仍在同一路径中，因此，对存储卷进行*LVM*（逻辑卷管理器）备份将必然同时备份所有逻辑数据库。


    在所谓的"*multi-tenant*"设置中，单个物理 MongoDB 部署通常有许多数据库，每个数据库对应一个单独的客户。对于某些*SaaS*（软件即服务）产品，每个数据库将有许多几乎相同的小型集合，每个集合都匹配相同的模式。


    ## Key takeaways


    从本章中，需要记住的关键概念如下：


    *   MongoDB 数据库使用称为 BSON 的特殊二进制 JSON 类似格式存储具有各种数据类型的结构化文档。

    *   MongoDB 部署可以是独立节点、副本集或分片集群，其中数据被分解为子集，用于扩展以处理海量数据集。

    *   MongoDB 数据库支持 ACID 合规性，即使对于分片集群上的多文档事务也是如此。

    *   复制机制健壮且异步，可处理自动故障转移。

    *   如果需要，可以调整写入和读取以优先考虑性能而非一致性。

    *   分片集合基于用户定义的分片键进行分布，并通过块迁移来保持分片平衡。

    *   MongoDB 部署可以在本地或自管理的云基础设施上实现自动化。

    *   还提供名为 Atlas 的完全托管 MongoDB 服务，以避免直接管理任何基础设施。


    # 2. Fault-Tolerant Design


    本章更深入地探讨 MongoDB 的容错特性，并介绍一些特殊类型的节点以及它们在生产系统中的使用方式。我们研究了现实世界系统中可能发生的常见错误以及如何减轻它们。


    > *冗余昂贵但不可或缺。*

    >

    > ——简·雅各布斯，城市学家、作家和活动家


    ## Special nodes


    我们已经介绍了 MongoDB 部署中的标准节点类型。这些承载数据的节点通过复制机制保持数据的完整副本，并且如果当前主节点因任何原因发生故障，它们可以随时成为主节点。接下来，我们将讨论一些其他类型的节点，这些节点可以在某些特殊情况下使用。


    在 MongoDB 的早期，在健壮的生产就绪备份解决方案可用之前，以及可靠的 SSD 存储特别昂贵的时候，以下一些类型的节点在生产配置中有其合理的位置。然而，随着更便宜的硬件和更先进的功能（如多数写关注）的出现，以下一些节点现在应避免在生产部署中使用。我们将介绍历史用例和当前的替代最佳实践。


    ### Arbiters


    仲裁者是一种 MongoDB 节点，它加入副本集的唯一角色是参与选举。它们不存储任何用户数据，但会维护副本集元数据的副本，以便知道它们应该连接到哪些成员以及如何安全地进行通信。


    这是少数仍在生产部署中定期使用的“特殊”节点类型之一，但通常仅在可用的不同数据中心少于三个时才需要。这将在关于*基础*和*全局*拓扑的第 [5](#487346_1_En_5_Chapter.xhtml)
    章和第 [6](#487346_1_En_6_Chapter.xhtml) 章中进一步讨论。一些拥有两个数据中心的客户会将单个仲裁者放置在云实例中，因为他们的数据保护策略不允许将用户数据存储在云中。


    在图 [2-1](#487346_1_En_2_Chapter.xhtml#Fig1) 中，我们看到复制发生在数据中心 1 和 2 之间，但只与驻留在云中的仲裁者节点进行健康“ping”通信。


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig1_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig1_HTML.jpg)


    图 2-1

    带有仲裁者的双数据中心架构'
  raw: "#### Horizontal scaling\n\nOnce you have exhausted the vertical scaling possibilities\
    \ for your nodes and your replica set is not able to service all the write requests\
    \ from the application (or the data size on disk has exceeded about 2TB), then\
    \ it’s time to scale *horizontally* with sharding.\n\nNote\n\nThe 2TB recommended\
    \ limit for shard size is based on practical limitations of storage and network\
    \ throughput in order to allow initial syncs and restores to complete within an\
    \ acceptable time span.\n\nWith sharding, we can spread the load across multiple\
    \ primary nodes and from that point on can increase capacity further by adding\
    \ additional shards as the workload or data increases. This can be the most cost-effective\
    \ way to increase overall memory resources and total cluster performance.\n\n\
    #### Round-trip latency\n\nIn MongoDB, like any distributed system, one bottleneck\
    \ can be the time taken to send a packet of data between the components and get\
    \ a response back. Known as round-trip time (RTT) latency, this affects how many\
    \ of the components of a MongoDB cluster chose to route requests.\n\nThis latency\
    \ is usually recorded in milliseconds, and is bounded by a number of factors.\
    \ The physical distance between any pair of hosts (and the speed of light), the\
    \ congestion of the network, the chosen route through the network (number of hops),\
    \ and delays added by switches along the way are common factors which can add\
    \ to latency. If possible, a direct dedicated fiber connection between data centers\
    \ should be used to reduce this as much as possible.\n\nIn a sharded cluster,\
    \ the application queries via a `mongos` router node, and so there are two different\
    \ sets of round-trips as shown in Figure [1-9](#487346_1_En_1_Chapter.xhtml#Fig9).\
    \ In this example, we see that Application[1] has lower latency to the `mongos`\
    \ nodes in the same data center. Based on this, the driver in Application[1] will\
    \ distribute its queries via `mongos`[1] and `mongos`[2], whereas Application[2]\
    \ will route all queries to `mongos`[3] in DC2\\. However, if `mongos`[3] fails,\
    \ Application[2] will automatically and instantly failover to the `mongos` available\
    \ in DC1 since they now represent the best possible RTTs.\n\n![../images/487346_1_En_1_Chapter/487346_1_En_1_Fig9_HTML.jpg](images/487346_1_En_1_Chapter/487346_1_En_1_Fig9_HTML.jpg)\n\
    \nFigure 1-9\n\nLatencies between components in a 2-DC deployment\n\nThe second\
    \ pair of round-trips is between the `mongos` instances and the data-bearing nodes\
    \ in the shard. By default, reads and writes will go via the primary. However,\
    \ if the application requests `nearest` read preference, then queries would be\
    \ sent to either `mongod`[1] or `mongod`[2] since they have the lowest RTTs at\
    \ 2ms and 1ms, respectively.\n\n### Private vs. cloud\n\nThe rest of this book\
    \ will focus on cases where customers want to build high-performance, highly available\
    \ self-managed MongoDB deployments. Until recently most production MongoDB deployments\
    \ were deployed on companies’ own data centers – so-called “*on-prem*” deployments.\n\
    \nMany large corporations now find that the major cloud providers like AWS, Azure,\
    \ and GCP are sufficiently stable and cost-effective that they can run virtual\
    \ machines on the cloud as “*self-managed cloud*” servers. We will sometimes compare\
    \ what is possible on-prem to MongoDB’s own *fully managed* solution called MongoDB\
    \ Atlas.\n\n### Logical databases\n\nLike most database management systems, MongoDB\
    \ allows for multiple *logical databases* to exist on a single physical deployment.\
    \ Each logical database can have its own collections of data and its own users\
    \ with custom roles and privileges. The data files of these databases are still\
    \ in the same path, however, so taking *LVM* (Logical Volume Manager) backups\
    \ of the storage volumes will necessarily back up all logical databases together.\n\
    \nIn the so-called “*multi-tenant”* setups, a single physical MongoDB deployment\
    \ will often have many databases each for a separate customer. For certain *SaaS*\
    \ (software as a service) offerings, each database will have a number of almost\
    \ identical smaller collections each having matching the same schema.\n\n## Key\
    \ takeaways\n\nFrom this chapter, the key concepts to remember are as follows:\n\
    \n*   MongoDB databases store structured documents with a range of data types\
    \ using a special binary JSON-like format called BSON.\n\n*   MongoDB deployments\
    \ can be standalone nodes, replica set, or sharded clusters where data is broken\
    \ into subsets for scaling out for humongous datasets.\n\n*   MongoDB databases\
    \ support ACID compliance even for multidocument transactions on sharded clusters.\n\
    \n*   The replication mechanism is robust and asynchronous, handling automatic\
    \ failover.\n\n*   Writes and reads can be tuned for performance over consistency\
    \ if desired.\n\n*   Sharded collections are distributed based on a user-defined\
    \ shard key and migrated in chunks to keep the shards balanced.\n\n*   MongoDB\
    \ deployments can be automated on-prem or in self-managed cloud infrastructure.\n\
    \n*   A fully managed MongoDB service called Atlas is also available to avoid\
    \ managing any infrastructure directly.\n\n# 2. Fault-Tolerant Design\n\nThis\
    \ chapter delves deeper into the fault-tolerant nature of MongoDB and explores\
    \ some of the special types of nodes and how they should be used on production\
    \ systems. We look at common errors that may occur in real-world systems and how\
    \ to mitigate them.\n\n> *Redundancy* *is expensive but indispensable.*\n> \n\
    > —Jane Jacobs, urbanist, writer, and activist\n\n## Special nodes\n\nWe have\
    \ already covered the standard types of nodes in a MongoDB deployment. These data-bearing\
    \ nodes keep a complete copy of the data via the replication mechanism and can\
    \ become a primary node at any time should the current primary fail for any reason.\
    \ Next, we will discuss some other types of nodes that can be used in certain\
    \ special cases.\n\nIn the early days of MongoDB before robust production-ready\
    \ backup solutions were available and when reliable SSD storage was particularly\
    \ expensive, some of the following types of nodes had a justifiable place in production\
    \ configurations. However, with the advent of cheaper hardware and more advanced\
    \ features such as majority write concern, some of the following nodes should\
    \ now be avoided in production deployments. We will cover the historical use cases\
    \ and the current alternative best practices.\n\n### Arbiters\n\nArbiters are\
    \ a type of MongoDB node that join a replica set with the sole role of participating\
    \ in elections. They do not store any user data, but will only maintain a copy\
    \ of the replica set metadata in order to know which members they should connect\
    \ to and how to communicate securely.\n\nThese are one of the few “exotic” node\
    \ types that are still regularly used in production deployments, but only really\
    \ required when less than three distinct data centers are available. This will\
    \ be discussed further in Chapters [5](#487346_1_En_5_Chapter.xhtml) and [6](#487346_1_En_6_Chapter.xhtml)\
    \ on *basic* and *global topologies*. Some customers with two data centers will\
    \ place a single arbiter in a cloud instance since their data protection policies\
    \ do not allow user data to be stored in the cloud.\n\nIn Figure [2-1](#487346_1_En_2_Chapter.xhtml#Fig1)\
    \ we see that replication occurs between data centers 1 and 2, but only health\
    \ “pings” are communicated with the arbiter node residing in the cloud.\n\n![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig1_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig1_HTML.jpg)\n\
    \nFigure 2-1\n\nA 2-data center architecture with arbiter"
