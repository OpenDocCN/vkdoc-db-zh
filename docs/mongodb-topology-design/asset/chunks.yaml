  trans: '## 核心要点


    从本章中，需要记住的关键概念如下：


    *   分片是扩展部署写入能力的好方法，但需要良好的分片键来避免因迁移导致的过度再平衡。

    *   如果某个唯一性约束需要在集群范围内保持，那么分片键应包含该约束。

    *   应避免使用以递增值（如日期、时间戳或 `ObjectId`）开头的分片键，因为这会导致“热点分片”和再平衡。

    *   哈希分片键能很好地在各分片间均匀分布写入，但会使范围查询效率低下。

    *   对于导入工作负载（例如从旧数据库迁移），在数据加载前预分割数据块并让它们均匀分布在各分片之间可能更高效。

    *   还有其他技巧可以预分布数据块，以避免将数据加载到“热点分片”。

    *   每个数据库将其未分片的集合保存在单个分片上，并且可以将这些集合移动到另一个分片以修复分片不平衡。

    *   所有更改分片配置的操作都应通过 `mongos` 执行，禁用平衡器，并在计划的维护窗口内进行，以避免意外的应用程序行为。


    ## 11. 极限分片


    本章将更深入地探讨分片细节，并介绍在面临硬件限制时可增加写入吞吐量的配置。我们还将研究如何对用户数据进行分区，以遵守数据保护法规、最小化成本并优化跨分片的读取。


    ### 回顾


    在大多数情况下，没有区域或其他大小限制的分片集群会通过将数据块从“繁重”（数据块过多）的分片迁移到数据块较少的分片，来自动平衡数据块。


    #### 增加分片


    如果您开始遇到性能问题，并且已排除任何应用程序或模式设计问题，一个好的选择是增加更多分片。这将从现有分片卸载数据，减轻它们的工作负载和内存缓存中的工作集大小。


    选择不良的分片键导致的热点分片（如第 10 章所述），无论添加多少分片都无法扩展。在系统已经不堪重负的情况下增加迁移工作负载，也会使短期性能变得更糟。


    如果添加新主机和分片不可行，或者当前分片没有自动平衡，则可以进行某些手动调整以强制实现更平衡的工作负载。


    #### 高级数据块分割


    MongoDB 会在向某个数据块范围插入数据或迁移该数据块之前，自动触发大数据块的分割。如果我们想人为地使某些数据块变小，可以强制进行分割。这样做的原因可能是我们即将向该范围导入大量数据，并希望确保插入操作能更均匀地分布在所有分片上。


    分割完成后（无论是自动还是手动），平衡器可能会将该数据块迁移到另一个分片。请记住，我们可以使用 `sh.status(true)` 来查看当前所有数据块的确切存储位置。


    有两种方法可以手动分割数据块：


    *   `sh.splitFind()` 查找一个数据块，并将其大致均等分割成两块。

    *   `sh.splitAt()` 查找具有给定值的数据块，并在此点*精确*分割。


    让我们用两个例子来明确这一点。在图 11-1 中，我们使用 `sh.splitFind("myDb.customers", {custId: 9000})`
    分割一个数据块。这首先找到包含客户 ID 为 `9000` 的文档的数据块，然后将该数据块大致均等地分割成两部分。


    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig1_HTML.jpg](img/487346_1_En_11_Fig1_HTML.jpg)

    图 11-1 `splitFind` 将数据块大致均等分割


    在图 11-2 中，使用 `sh.splitAt("myDb.customers", {custId: 9000})`，同一个数据块在该确切值处被分割，得到两个大小差异很大的数据块（600KB
    对比 5MB）。如果我们即将向该点导入数据，或者需要控制该范围内某些特定客户所在的分片，这可能是合适的。


    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig2_HTML.jpg](img/487346_1_En_11_Fig2_HTML.jpg)

    图 11-2 `splitAt` 在指定的分片键值处精确分割


    就性能而言，`splitAt` 更轻量，应在为数据加载做准备而预分割时的脚本中使用。`splitFind` 会尝试计算数据块中值的中位点以创建大小相等的块。获取文档和计算既需要
    I/O 也需要 CPU。


    ### 分片键场景


    在选择分片键时，可能存在相互竞争的目标，但并非所有目标都能在所有情况下都得到满足。例如，我们可能希望通过降低读取查询的*平均负载*来优化，或者我们可能希望通过使用地理位置分片来降低写入的*延迟*，或者通过最均匀地分布写入来尽可能快地完成批量数据的*写入*。


    我们将研究每种情况，并回顾最佳的分片键和拓扑组合。'
- fmt: '## 读取性能


    确保分片集群快速读取响应的最佳方式是仅查询单个分片。这意味着无需等待最慢的分片，因为不需要对响应进行整理和排序。但是，如何确保我们99%的情况下都能命中单个分片呢？


    假设我们有一个包含所有过去和现在的职业网球选手的数据库。表 11-1 展示了该数据库中一些典型文档可能的样子。


    表 11-1

    大型集合中的两个示例文档


    | `{ _id: 123, userName: "petesampras", country: "US", titles: 64, .... }` | `{
    _id: 124, userName: "bjornborg", country: "SE", titles: 63, .... }` |


    根据这些示例文档，我们可以考虑多个分片键，例如：

    1. `{ userName: 1 }`

    2. `{ _id: “hashed” }`

    3. `{ country: 1, userName: 1 }`


    我们不会考虑简单的`{ country: 1 }`键，因为基于此进行分片可能导致过大的块。这是因为我们最多可能有大约195个块，每个国家一个。


    我们需要对不同的字段组合执行许多查询和聚合操作，但已决定最重要的优化查询是汇总特定国家所有选手的职业生涯冠军数。该查询如下所示：


    ```

    db.players.aggregate([

    { $match: { country: "SE" } },

    { $group: {

    _id: "$country",

    count: { $sum: "$titles" }

    }

    }

    ]);

    ```


    让我们首先考虑使用`{userName :1}`作为分片键，如图 11-3 所示。对于我们的聚合调用，我们仅按`country`字段进行过滤，但由于它不是分片键的一部分，文档可能存在于任何分片上。因此，`mongos`必须查询每一个分片，并在最慢的分片响应后最终对标题进行求和。注意，分片B最终没有任何匹配项，但它仍然必须做一些工作来确定这个负面结果。


    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig3_HTML.jpg](images/487346_1_En_11_Chapter/487346_1_En_11_Fig3_HTML.jpg)


    图 11-3

    分片键强制查询所有分片


    在`{_id: "hashed"}`上分片也会在任何不是精确匹配`_id`字段的查询中命中每个分片。这使得它在优化读取效率时成为最差的选择。


    如果我们改为在`{country:1, userName: 1}`上分片会怎样？在图 11-4 中，我们看到由于我们的分片键以`country`开头，我们可以缩小到包含瑞典国家代码的两个分片。在这种情况下，我们需要等待两个分片响应才能得出最终总和。由于没有以瑞典国家代码“SE”开头的块范围，可以忽略分片A。


    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig4_HTML.jpg](images/487346_1_En_11_Chapter/487346_1_En_11_Fig4_HTML.jpg)


    图 11-4

    分片键对查询更具针对性


    我们能否以某种方式确保仅命中单个分片？可以！我们可以使用区域范围和标签来实现这一点。我们可以为欧洲选手（“EUR”）、美洲选手（“AMER”）和世界其他地区（“ROW”）各分配一个分片。


    我们必须为每一个国家定义一个键范围，例如：


    ```

    sh.updateZoneKeyRange("myDb.players",

    { country: "SE", userName: MinKey },

    { country: "SE", userName: MaxKey }, "EUR")

    ```


    并将欧洲选手与分片A关联：


    ```

    sh.addShardToZone("shardA", "EUR")

    ```


    虽然这对于一个相对较小的数据库来说可能有些过度，但同样的技术可以在多TB的分片集群中为每次查询节省宝贵的毫秒时间。


    ## 写入性能


    假设我们为欧洲纸张销售公司Wernham-Hogg运行一个客户关系管理（CRM）解决方案。我们正在与总部位于美国的公司Dunder Mifflin合并，需要尽可能高效地导入他们的整个客户数据。在分片集群中，这可以通过将写入操作均匀分布到我们的三个分片来实现。


    假设当前的欧洲数据大致如图 11-5 所示分布，分片键为`{country:1, acct:1}`。这是一个简化模型，显示了三个连续的范围，而实际上每个范围内会有许多块。


    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig5_HTML.jpg](images/487346_1_En_11_Chapter/487346_1_En_11_Fig5_HTML.jpg)


    图 11-5

    一个基于国家的分片CRM系统


    虽然这可能不是最佳的分片键，但它支持基于国家的分析、最终的地理分片，并避免了过大的块。不幸的是，这也意味着所有需要导入的带有`{country: "US"}`的新数据都将被发送到分片C，因为它落在`LV`和`ZW`国家代码范围内。


    由于Wernham-Hogg目前CRM中几乎没有基于美国的联系人，因此将只有一个包含这些文档的块。如果我们现在导入100,000个联系人，文档将被插入到那个分片中。随着块的增长，它们将被拆分成多个更小的块。随着更多文档被插入这些子块，它们将被反复拆分。


    如果平衡器已启用，它将尝试在某个分片变得过大时迁移一些块，但由于在后台以低优先级运行，并且面临导入的压力，它没有时间移动许多块，因此导入实际上将局限于单个分片。


    解决方案是什么？我们需要手动预先拆分这些块，并将它们均匀地分布在各个分片上。如果我们已经大致知道Dunder Mifflin数据库中账户名的分布，我们可以从三个大块开始，并手动移动这些块，使得三个分片各有一个块。


    然后在导入过程中，块将自动拆分。由于导入数据的1/3将进入每个分片，因此它们都不需要迁移。


    我们希望将来自美国联系人的传入数据按表 11-2 所示进行分布。


    表 11-2

    期望的数据分布


    | 账户ID值（小写） | 分片 |

    | --- | --- |

    | 起始 | 结束（含） |  |

    | --- | --- | --- |

    | a | m | A |

    | l | q | B |

    | r | z | C |


    为了实现表 11-1 中的分布，我们将使用`sh.splitAt()`函数，并确保我们有三个整齐的块：一个从字母“a”开始直到“mzzzzzzz...”，另一个从“l”开始直到“qzzzzzzzz...”，以及一个从“r”开始的最终块，通过声明四个边界如代码清单
    11-1 所示。


    ```

    sh.splitAt("crm.contacts", {country: "US", acct: "a"});

    sh.splitAt("crm.contacts", {country: "US", acct: "l"});

    sh.splitAt("crm.contacts", {country: "US", acct: "r"});

    sh.splitAt("crm.contacts", {country: "US", acct: "zzzzzzzzz"});

    ```


    代码清单 11-1

    使用精确的拆分点创建四个新块


    然后我们使用`sh.moveChunk()`函数手动移动这些块，通过提供一个示例分片键值，该值对应于将存在于我们刚刚强制创建的这三个块之一中的文档，如代码清单
    11-2 所示。


    ```

    sh.moveChunk("crm.contacts",

    {country: "US", acct: "abc"}, "shardA")

    sh.moveChunk("crm.contacts",

    {country: "US", acct: "man"}, "shardB")

    sh.moveChunk("crm.contacts",

    {country: "US", acct: "sta"}, "shardC")

    ```


    代码清单 11-2

    将新创建的块手动移动到其他分片


    当输出如代码清单 11-3 所示时，我们可以通过`sh.status()`确认块已经迁移。'
  raw: '### Read performance


    The absolute best way to ensure fast read responses in a sharded cluster is to
    only hit one shard. This means no waiting for the slowest shard, since there is
    no need to collate and sort the responses. But, how do we ensure we hit a single
    shard 99% of the time?


    Let’s imagine we have a database of all professional tennis players past and present.
    Table [11-1](#487346_1_En_11_Chapter.xhtml#Tab1) shows what some typical documents
    in that database might look like.


    Table 11-1


    Two sample documents from a large collection


    | `{ _id: 123,  userName: "petesampras",  country: "US",  titles: 64,  .... }`
    | `{ _id: 124,  userName: "bjornborg",  country: "SE",  titles: 63,  .... }` |


    Based on the example documents, we could consider a number of shard keys such
    as


    1.  { userName: 1 }


    2.  { _id: “hashed” }


    3.  { country: 1, userName: 1 }


    We wouldn’t consider a simple `{ country: 1 }` key since sharding on that basis
    could lead to jumbo chunks. That’s because we could at most have about 195 chunks,
    one for each country.


    We will need to perform many queries and aggregations on different combinations
    of fields, but it has been decided that the most important query to optimize is
    to sum the career titles of all players for a particular country. This query would
    look like the following:


    ```

    db.players.aggregate([

    { $match: { country: "SE" } },

    { $group: {

    _id: "$country",

    count: { $sum: "$titles" }

    }

    }

    ]);

    ```


    Let’s first consider using `{userName :1}` as the shard key shown in Figure [11-3](#487346_1_En_11_Chapter.xhtml#Fig3).
    For our aggregate call, we filter only on the `country` field, but since it’s
    not part of the shard key, the documents could exist on any shard. Therefore,
    the `mongos` must query every single shard and then finally sum the titles once
    the slowest shard has responded. Note that Shard B ends up having no matches at
    all, but it still must do some work to determine that negative result.


    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig3_HTML.jpg](images/487346_1_En_11_Chapter/487346_1_En_11_Fig3_HTML.jpg)


    Figure 11-3


    Shard key forces all shards to be queried


    Sharding on `{_id: "hashed"}` would also hit every shard on any query not filtering
    on an exact equality match on the `_id` field. This makes it the worst choice
    when optimizing for read efficiency.


    What if we sharded on `{country:1, userName: 1}` instead? In Figure [11-4](#487346_1_En_11_Chapter.xhtml#Fig4),
    we see that because our shard key starts with country, we can narrow down to two
    shards that contain chunks with the country code of Sweden. In this case we need
    to wait for two shards to respond in order to make a final sum. Shard A can be
    ignored since there are no chunk ranges starting with the country code “SE” for
    Sweden.


    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig4_HTML.jpg](images/487346_1_En_11_Chapter/487346_1_En_11_Fig4_HTML.jpg)


    Figure 11-4


    Shard key is more targeted to the query


    Could we somehow ensure that only a single shard is targeted? Yes! We could use
    zone ranges and tags to achieve this. We could allocate one shard for European
    players (“EUR”), one for players from the Americas (“AMER”), and another for the
    rest of the world (“ROW”).


    We would have to define a key range for each and every country, for example:


    ```

    sh.updateZoneKeyRange("myDb.players",

    { country: "SE", userName: MinKey },

    { country: "SE", userName: MaxKey }, "EUR")

    ```


    and associate European players with Shard A:


    ```

    sh.addShardToZone("shardA", "EUR")

    ```


    While this is probably overkill for a relatively small database, the same technique
    could save valuable milliseconds on every query in a multi-terabyte sharded cluster.


    ### Write performance


    Let’s imagine that we run a customer relationship management (CRM) solution for
    European paper sales company Wernham-Hogg. We are merging with US-based company
    Dunder Mifflin and need to import their entire customer data as efficiently as
    possible. In a sharded cluster, this can be achieved by distributing writes equally
    across our three shards.


    Let’s imagine the current European data is distributed approximately as shown
    in Figure [11-5](#487346_1_En_11_Chapter.xhtml#Fig5) with the shard key `{country:1,
    acct:1}`. This is a simplified model and shows three sequential ranges, whereas
    in reality there will actually be many chunks inside each range.


    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig5_HTML.jpg](images/487346_1_En_11_Chapter/487346_1_En_11_Fig5_HTML.jpg)


    Figure 11-5


    A CRM with country-based sharding


    While this might not be the best shard key, it allows country-based analytics,
    eventual geo-sharding, and avoids jumbo chunks. Unfortunately, it also means that
    all the new data to import with `{country: "US"}` will all be sent to Shard C
    since it falls within the `LV` and `ZW` country code ranges.


    Since Wernham-Hogg currently has almost no contacts in the CRM based on the United
    States, there will be just a single chunk containing those documents. If we were
    to import 100,000 contacts now, documents would be inserted into that one shard.
    As chunks grow they will be split into multiple smaller chunks. As more documents
    are inserted into those subchunks, they will be split over and over.


    If the balancer is enabled, it will try migrating some chunks as that shard grows
    too large, but working in the background with low priority and with the pressure
    of the import, it will not have time to move many chunks, and the import will
    be effectively limited to a single shard.


    The solution? We need to manually split these chunks in advance and distribute
    them evenly across the shards. If we already know roughly the distribution of
    account names from Dunder Mifflin’s database, we could start with three big chunks
    and manually move those chunks so that each of the three shards has one chunk.


    Then during import, the chunks will be automatically split. None of them will
    require migration since 1/3 of the data being imported will go to each shard.


    We would like to distribute incoming data from the US contacts as shown in Table
    [11-2](#487346_1_En_11_Chapter.xhtml#Tab2).


    Table 11-2


    Our desired data distribution


    | Values of account ID (lowercase) | Shard |

    | --- | --- |

    | Start | End (inclusive) |   |

    | --- | --- | --- |

    | a | m | A |

    | l | q | B |

    | r | z | C |


    To achieve the distribution in Table [11-1](#487346_1_En_11_Chapter.xhtml#Tab1),
    we will use the `sh.splitAt()` function and ensure that we have three neat chunks
    starting with the letter “a” until “mzzzzzzz...”, then another chunk starting
    from “l” until “qzzzzzzzz...”, and a final chunk starting with “r”, by declaring
    four boundaries as in Listing [11-1](#487346_1_En_11_Chapter.xhtml#PC4).


    ```

    sh.splitAt("crm.contacts", {country: "US", acct: "a"});

    sh.splitAt("crm.contacts", {country: "US", acct: "l"});

    sh.splitAt("crm.contacts", {country: "US", acct: "r"});

    sh.splitAt("crm.contacts", {country: "US", acct: "zzzzzzzzz"});

    Listing 11-1

    Creating four new chunks with an exact split point

    ```


    We then manually move these chunks with the `sh.moveChunk()` function by providing
    an example shard key value for a document which would exist inside these three
    chunks we just forced as shown in Listing [11-2](#487346_1_En_11_Chapter.xhtml#PC5).


    ```

    sh.moveChunk("crm.contacts",

    {country: "US", acct: "abc"}, "shardA")

    sh.moveChunk("crm.contacts",

    {country: "US", acct: "man"}, "shardB")

    sh.moveChunk("crm.contacts",

    {country: "US", acct: "sta"}, "shardC")

    Listing 11-2

    Manually moving newly created chunks to other shards

    ```


    We can confirm with `sh.status()` that the chunks have been migrated when the
    output looks like Listing [11-3](#487346_1_En_11_Chapter.xhtml#PC6).'
  trans: '## 读取性能


    确保分片集群快速读取响应的最佳方式是仅查询单个分片。这意味着无需等待最慢的分片，因为不需要对响应进行整理和排序。但是，如何确保我们 99%的情况下都能命中单个分片呢？


    假设我们有一个包含所有过去和现在的职业网球选手的数据库。表 11-1 展示了该数据库中一些典型文档可能的样子。


    表 11-1

    大型集合中的两个示例文档


    | `{ _id: 123, userName: "petesampras", country: "US", titles: 64, .... }` | `{
    _id: 124, userName: "bjornborg", country: "SE", titles: 63, .... }` |


    根据这些示例文档，我们可以考虑多个分片键，例如：

    1. `{ userName: 1 }`

    2. `{ _id: “hashed” }`

    3. `{ country: 1, userName: 1 }`


    我们不会考虑简单的`{ country: 1 }`键，因为基于此进行分片可能导致过大的块。这是因为我们最多可能有大约 195 个块，每个国家一个。


    我们需要对不同的字段组合执行许多查询和聚合操作，但已决定最重要的优化查询是汇总特定国家所有选手的职业生涯冠军数。该查询如下所示：


    ```

    db.players.aggregate([

    { $match: { country: "SE" } },

    { $group: {

    _id: "$country",

    count: { $sum: "$titles" }

    }

    }

    ]);

    ```


    让我们首先考虑使用`{userName :1}`作为分片键，如图 11-3 所示。对于我们的聚合调用，我们仅按`country`字段进行过滤，但由于它不是分片键的一部分，文档可能存在于任何分片上。因此，`mongos`必须查询每一个分片，并在最慢的分片响应后最终对标题进行求和。注意，分片
    B 最终没有任何匹配项，但它仍然必须做一些工作来确定这个负面结果。


    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig3_HTML.jpg](img/487346_1_En_11_Fig3_HTML.jpg)


    图 11-3

    分片键强制查询所有分片


    在`{_id: "hashed"}`上分片也会在任何不是精确匹配`_id`字段的查询中命中每个分片。这使得它在优化读取效率时成为最差的选择。


    如果我们改为在`{country:1, userName: 1}`上分片会怎样？在图 11-4 中，我们看到由于我们的分片键以`country`开头，我们可以缩小到包含瑞典国家代码的两个分片。在这种情况下，我们需要等待两个分片响应才能得出最终总和。由于没有以瑞典国家代码“SE”开头的块范围，可以忽略分片
    A。


    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig4_HTML.jpg](img/487346_1_En_11_Fig4_HTML.jpg)


    图 11-4

    分片键对查询更具针对性


    我们能否以某种方式确保仅命中单个分片？可以！我们可以使用区域范围和标签来实现这一点。我们可以为欧洲选手（“EUR”）、美洲选手（“AMER”）和世界其他地区（“ROW”）各分配一个分片。


    我们必须为每一个国家定义一个键范围，例如：


    ```

    sh.updateZoneKeyRange("myDb.players",

    { country: "SE", userName: MinKey },

    { country: "SE", userName: MaxKey }, "EUR")

    ```


    并将欧洲选手与分片 A 关联：


    ```

    sh.addShardToZone("shardA", "EUR")

    ```


    虽然这对于一个相对较小的数据库来说可能有些过度，但同样的技术可以在多 TB 的分片集群中为每次查询节省宝贵的毫秒时间。


    ## 写入性能


    假设我们为欧洲纸张销售公司 Wernham-Hogg 运行一个客户关系管理（CRM）解决方案。我们正在与总部位于美国的公司 Dunder Mifflin 合并，需要尽可能高效地导入他们的整个客户数据。在分片集群中，这可以通过将写入操作均匀分布到我们的三个分片来实现。


    假设当前的欧洲数据大致如图 11-5 所示分布，分片键为`{country:1, acct:1}`。这是一个简化模型，显示了三个连续的范围，而实际上每个范围内会有许多块。


    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig5_HTML.jpg](img/487346_1_En_11_Fig5_HTML.jpg)


    图 11-5

    一个基于国家的分片 CRM 系统


    虽然这可能不是最佳的分片键，但它支持基于国家的分析、最终的地理分片，并避免了过大的块。不幸的是，这也意味着所有需要导入的带有`{country: "US"}`的新数据都将被发送到分片
    C，因为它落在`LV`和`ZW`国家代码范围内。


    由于 Wernham-Hogg 目前 CRM 中几乎没有基于美国的联系人，因此将只有一个包含这些文档的块。如果我们现在导入 100,000 个联系人，文档将被插入到那个分片中。随着块的增长，它们将被拆分成多个更小的块。随着更多文档被插入这些子块，它们将被反复拆分。


    如果平衡器已启用，它将尝试在某个分片变得过大时迁移一些块，但由于在后台以低优先级运行，并且面临导入的压力，它没有时间移动许多块，因此导入实际上将局限于单个分片。


    解决方案是什么？我们需要手动预先拆分这些块，并将它们均匀地分布在各个分片上。如果我们已经大致知道 Dunder Mifflin 数据库中账户名的分布，我们可以从三个大块开始，并手动移动这些块，使得三个分片各有一个块。


    然后在导入过程中，块将自动拆分。由于导入数据的 1/3 将进入每个分片，因此它们都不需要迁移。


    我们希望将来自美国联系人的传入数据按表 11-2 所示进行分布。


    表 11-2

    期望的数据分布


    | 账户 ID 值（小写） | 分片 |

    | --- | --- |

    | 起始 | 结束（含） |  |

    | --- | --- | --- |

    | a | m | A |

    | l | q | B |

    | r | z | C |


    为了实现表 11-1 中的分布，我们将使用`sh.splitAt()`函数，并确保我们有三个整齐的块：一个从字母“a”开始直到“mzzzzzzz...”，另一个从“l”开始直到“qzzzzzzzz...”，以及一个从“r”开始的最终块，通过声明四个边界如代码清单
    11-1 所示。


    ```

    sh.splitAt("crm.contacts", {country: "US", acct: "a"});

    sh.splitAt("crm.contacts", {country: "US", acct: "l"});

    sh.splitAt("crm.contacts", {country: "US", acct: "r"});

    sh.splitAt("crm.contacts", {country: "US", acct: "zzzzzzzzz"});

    ```


    代码清单 11-1

    使用精确的拆分点创建四个新块


    然后我们使用`sh.moveChunk()`函数手动移动这些块，通过提供一个示例分片键值，该值对应于将存在于我们刚刚强制创建的这三个块之一中的文档，如代码清单
    11-2 所示。


    ```

    sh.moveChunk("crm.contacts",

    {country: "US", acct: "abc"}, "shardA")

    sh.moveChunk("crm.contacts",

    {country: "US", acct: "man"}, "shardB")

    sh.moveChunk("crm.contacts",

    {country: "US", acct: "sta"}, "shardC")

    ```


    代码清单 11-2

    将新创建的块手动移动到其他分片


    当输出如代码清单 11-3 所示时，我们可以通过`sh.status()`确认块已经迁移。'
- fmt: '# 分片状态示例


    ```

    databases:

    {  "_id" : "crm",  "primary" : "shardA",  "partitioned" : true,  ... } }

    crm.contacts

    shard key: { "country" : 1, "acct" : 1 }

    unique: true

    balancing: true

    chunks:

    shardA    2

    shardB    1

    shardC    2

    { "country" : { "$minKey" : 1 }, "acct" : { "$minKey" : 1 } } -->> { "country"
    : "US", "acct" : "a" } on : shardA Timestamp(2, 0)

    { "country" : "US", "acct" : "a" } -->> { "country" : "US", "acct" : "l" } on
    : shardA Timestamp(3, 0)

    { "country" : "US", "acct" : "l" } -->> { "country" : "US", "acct" : "r" } on
    : shardB Timestamp(4, 0)

    { "country" : "US", "acct" : "r" } -->> { "country" : "US", "acct" : "zzzzzzzzzzzz"
    } on : shardC Timestamp(4, 1)

    { "country" : "US", "acct" : "zzzzzzzzzzzz" } -->> { "country" : { "$maxKey" :
    1 }, "acct" : { "$maxKey" : 1 } } on : shardC Timestamp(1, 8)

    ```


    ### 分片状态详情


    `Listing 11-3` 展示了数据在所有三个分片上的分布情况。


    我们现在可以开始数据加载了，因为知道写入工作负载将被均匀分布。


    ## 多租户架构


    MongoDB 是构建多租户架构和软件即服务应用程序的一个流行选择。在某些情况下，所选择的设计使用一个**单一数据库**配合分片集合来容纳所有客户的数据。这种模型通常在每个文档中使用一个字段来标识客户或项目。另一些人则选择为每个客户创建一个**新数据库**，并将相同的集合名称和索引重复放入每个数据库中。


    这两种方法在原始的 MMAP 存储引擎上都能很好地工作，该引擎简单地使用原生操作系统功能将内存中的数据结构映射到磁盘上。磁盘上的文件数量随存储的数据量扩展，而与集合或索引的数量无关。


    当引入 WiredTiger 存储引擎时，数据文件的映射方式发生了变化。现在，每个集合在磁盘上存储在一个单独的文件中。每个集合中的每个索引也单独存储。因此，基于第二种模型开发的多租户架构突然之间在磁盘上有了更多的独立文件。


    ### 文件句柄


    想象一个小型的多租户集群，容纳了 24 个租户的数据库，以及一个用于保存系统范围元数据的共享数据库。我们假设每个租户数据库有 32 个集合，平均每个集合有
    3 个索引，即每个数据库有 96 个索引。这需要 128 个文件句柄来加载所有这些集合的数据。如果我们在这个系统上运行一个副本集，在高峰使用期间，我们可能需要多达
    3200 个文件句柄（24 个数据库 × 128 个文件句柄 + 共享的 128 个）。由于每个打开的文件句柄可能占用相当多的内存资源，我们开始遇到一个点：为文件描述符分配给操作系统的内存比用于在内存缓存中保存
    MongoDB 数据的内存还要多。可以想象，一个增长到数千个租户的系统将更严重地受到这种影响。


    在图 [11-6](#487346_1_En_11_Chapter.xhtml#Fig6) 中，我们看到一个示例，其中数据库分布在 6 个分片上。在这种情况下，每个分片中的节点现在只需要打开最多
    640 个文件句柄，相比之下，之前则需要 3200 个。


    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig6_HTML.jpg](images/487346_1_En_11_Chapter/487346_1_En_11_Fig6_HTML.jpg)

    **图 11-6** 使用分片的多租户架构


    ### 虚拟机


    随着虚拟机技术的可用性，我们将受益于将单个大型主机拆分为多个较小的虚拟机。我们实际上并不分片任何集合，而是确保每个数据库的**主分片**均匀分布在各个分片上。随着租户数量的增长，我们可以添加更多分片以将文件句柄总数保持在合理的最大值。


    这种为集群拓扑增加的复杂性并不理想，但使用企业级自动化工具管理一个大型 MongoDB 集群通常比完全重新设计一个多租户 SaaS 应用程序要容易得多。


    ## 混合架构


    随着云计算的日益普及，即使是拥有内部和法规限制的保守企业也在将运营迁移到云端。


    通常，这些云迁移是从现有的本地 MongoDB 节点和应用逐步推出的。第一步通常是将仲裁节点迁移到云端；然后，有时当只有两个完全本地的数据中心可用时，云被用来提供“第三个数据中心”。


    ### 加密


    凭借对传输中和静态加密以及**字段级加密**的内置支持，即使是金融和医疗行业的企业也可以确信云端的数据是安全的，即使他们更愿意将大部分节点保留在他们直接控制的服务器上。


    ### 迁移服务


    下一阶段通常是将某些服务迁移到云端。例如，批处理和分析工作负载可能保留在本地，但面向客户的 Web 或移动服务由于使用模式需要每天快速扩展和缩减数次，因此具有迁移到灵活的云基础设施的强烈成本压力。


    ### 隐藏成本


    将应用程序迁移到云端引入了一个新的成本来源：**云带宽费用**。所有主要的云提供商都对从云计算网络传出的字节收费。他们通常也对可用区之间的数据收费（但费率低得多）。因此，即使在同一地区的多个可用区中分布的副本集也会因复制而产生带宽费用。


    对企业来说，很容易试图寻找一种方法，通过从已经位于同一可用区的节点读取来减少过高的带宽费用。理论上，这可能意味着只需要复制带宽。


    在图 [11-7](#487346_1_En_11_Chapter.xhtml#Fig7) 中，我们看到一种拓扑，其中主节点在本地（因为大部分写入工作负载仍在本地），但云中只有读取副本成员。在某些情况下，基于云的微服务可以从云中的二级节点读取以避免带宽费用，但将面临读取**陈旧数据**的风险。


    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig7_HTML.jpg](images/487346_1_En_11_Chapter/487346_1_En_11_Fig7_HTML.jpg)

    **图 11-7** 主节点仍在本地的混合部署


    或者，如图 [11-8](#487346_1_En_11_Chapter.xhtml#Fig8) 所示，主节点可以位于云端。现在我们可能会因本地应用的写入而产生带宽费用。这些写入随后需要从云端复制回本地的其他副本集成员。默认启用的**复制链**可以用来让数据中心
    2 中的成员从数据中心 1 复制。


    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig8_HTML.jpg](images/487346_1_En_11_Chapter/487346_1_En_11_Fig8_HTML.jpg)

    **图 11-8** 主节点在云端的混合部署


    > **注意**

    > 从应用到 `mongos` 的网络压缩需要通过向连接 URI 添加 `?compressors=snappy` 来显式启用。'
