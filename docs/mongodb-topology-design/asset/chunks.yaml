    : shardA Timestamp(3, 0)

    { "country" : "US", "acct" : "l" } -->> { "country" : "US", "acct" : "r" } on
    : shardB Timestamp(4, 0)

    { "country" : "US", "acct" : "r" } -->> { "country" : "US", "acct" : "zzzzzzzzzzzz"
    } on : shardC Timestamp(4, 1)

    { "country" : "US", "acct" : "zzzzzzzzzzzz" } -->> { "country" : { "$maxKey" :
    1 }, "acct" : { "$maxKey" : 1 } } on : shardC Timestamp(1, 8)

    Listing 11-3

    Sharding status showing chunks on all three shards

    ```


    We can now start our data loading, knowing that the write workload will be evenly
    distributed.


    ## Multi-tenant architectures


    MongoDB is a popular choice for building multi-tenant architectures and software-as-a-service
    (SaaS) applications. In some cases, the design chosen uses a *single database*
    with sharded collections to house all customers’ data. This model typically uses
    a field in each document to identify the customer or project. Others chose to
    create a new *database per customer* and repeat the same collection names and
    indexes into each database.


    Both approaches worked well with the original MMAP storage engine that simply
    mapped an in-memory data structure onto disk using native OS functionality. The
    number of files on disk scaled with the amount of data stored irrespective of
    the number of collections or indexes.


    When the WiredTiger storage engine was introduced, the mapping of data files changed.
    Each collection was now stored in a single file on disk. Every index in each collection
    also was stored separately. Now multi-tenant architectures which were developed
    on the second model suddenly had many more separate files on disk.


    ### File handles


    Let’s imagine a small multi-tenant cluster housing the databases for 24 tenants
    as well as a shared database for keeping system-wide metadata. We’ll assume that
    each tenant database has 32 collections, and on average each collection has 3
    indexes, making 96 indexes in each database. This gives 128 file handles required
    to load data from all these collections. If we are running this system against
    a replica set, during peak usage we could require up to 3200 file handles (24
    databases × 128 file handles + the shared 128). Since each open file handle can
    take considerable memory resources, we start to hit a point where more memory
    is allocated to the OS for file descriptors than for keeping our MongoDB data
    in memory cache. You can imagine that a system that grows to thousands of tenants
    will suffer even more extremely from this effect.


    In Figure [11-6](#487346_1_En_11_Chapter.xhtml#Fig6), we see an example with the
    databases distributed over 6 shards instead. In this case, the nodes in each shard
    now only need up to 640 file handles open, compared to 3200.


    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig6_HTML.jpg](images/487346_1_En_11_Chapter/487346_1_En_11_Fig6_HTML.jpg)


    Figure 11-6


    Multi-tenant architecture with shards


    ### Virtual machines


    With the availability of virtual machine technology, we would benefit from splitting
    up a single large host into multiple smaller virtual machines. We don’t actually
    shard any collections, but ensure that the *primary shard* for each database is
    distributed evenly across the shards. As the number of tenants grows, we can add
    more shards to keep the total number of file handles to a reasonable maximum.


    This added complexity for the cluster topology is not ideal, but it’s often much
    easier to manage a large MongoDB cluster with the Enterprise automation tools
    than it is to completely reengineer a multi-tenant SaaS application.


    ## Mixed architectures


    With the increased popularity of cloud computing, even conservative enterprises
    with internal and legislated restrictions are moving operations to the cloud.


    Often these cloud migrations are rolled out gradually from existing on-prem MongoDB
    nodes and applications. The first step is often moving arbiters to the cloud;
    then sometimes the cloud is used to provide a “third data center” when only two
    fully on-prem data centers are available.


    ### Encryption


    With the built-in support for encryption in transit and at rest and **field-level
    encryption,** even enterprises in the finance and healthcare sectors can be confident
    that data on the cloud is secure, even if they prefer to keep a majority of nodes
    on servers that they control directly.


    ### Migrate services


    The next phase is often moving out certain services to the cloud. For example,
    batch processing and analytics workloads may be kept on-prem, but customer-facing
    web or mobile services which need to be quickly scaled up and down several times
    a day due to usage patterns have a very strong cost-pressure to move to flexible
    cloud infrastructures.


    ### Hidden costs


    Moving applications to the cloud introduces a new cost source: **cloud bandwidth
    charges**. All of the major cloud providers charge for outgoing bytes from the
    cloud computing network. They usually also charge (but at a much lower rate) for
    data between availability zones. So even replica sets spread out over multiple
    availability zones in the same region will incur bandwidth charges for replication.


    For enterprises, it’s tempting to look for a way to reduce excessive bandwidth
    charges by reading from a node which is already co-located in the same zone. In
    theory this could mean only the replication bandwidth is required.


    In Figure [11-7](#487346_1_En_11_Chapter.xhtml#Fig7), we see a topology with primaries
    on-premise (since most of the write workload is still on-prem) but read replica
    members in the cloud. In certain cases, the cloud-based microservices could read
    from the cloud secondaries to avoid bandwidth charges, but will risk reading **stale
    data** .


    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig7_HTML.jpg](images/487346_1_En_11_Chapter/487346_1_En_11_Fig7_HTML.jpg)


    Figure 11-7


    Mixed deployment with primaries still on-prem


    Alternatively, as shown in Figure [11-8](#487346_1_En_11_Chapter.xhtml#Fig8),
    the primaries could be located on the cloud. Now we may incur bandwidth charges
    for writes from the on-prem application. These writes will then need to be replicated
    back from the cloud to the other replica set members on-prem. *Replication* *chaining*
    , which is enabled by default, could be used to make the member in DC2 replicate
    from DC1.


    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig8_HTML.jpg](images/487346_1_En_11_Chapter/487346_1_En_11_Fig8_HTML.jpg)


    Figure 11-8


    Mixed deployment with primaries in the cloud


    Note


    Network compression from applications to the `mongos` needs to be explicitly enabled
    by adding `?compressors=snappy` to the Connection URI.'
