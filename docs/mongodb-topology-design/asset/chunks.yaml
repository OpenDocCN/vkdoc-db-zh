  trans: '

    ## 数据隐私与 GDPR


    ### 定义


    构成欧盟法规的法律术语有很多，这些将在后续章节中使用。表 4-2 定义了最相关的术语。


    表 4-2：核心概念与定义摘要


    | 术语 | 定义 |

    | --- | --- |

    | 实体 | 控制或处理数据的个人、法人团体、组织、公共机构、代理机构或团体。 |

    | 数据控制者 | 决定个人数据处理的`目的`和`方式`的实体（可单独或与他人/公司/团体共同决定）。 |

    | 数据主体 | 由识别性数据值所指向的已识别或可识别的自然人，也称为`用户`。 |

    | 数据处理者 | 代表数据控制者负责处理个人数据的实体。该实体对任何数据泄露承担法律责任。在我们的语境中，数据处理者可包括 IT 团队负责人、应用程序开发人员、数据库管理员、QA
    团队、发布经理和 DevOps 工程师。 |

    | 数据保护官 | 组织内负责确保法规在内部得到应用，并保护数据主体免受处理操作不利影响的角色。 |

    | 个人数据 | 任何能唯一识别个人的信息（例如，移动设备 ID），并且`与`可识别的个人`相关`。任何真正匿名（或完全匿名化）的数据不包含在 GDPR 或本文涉及的其他法规中。
    |

    | 标识符 | 任何单独或组合起来能够识别个人的`类型`数据，例如 • 姓名 • 社会保障号或税务档案号 • 位置数据 • 用户名 • 生日 |

    | 在线标识符 | 标识符的一个特定子集，用于在线数据，例如 • IP 地址 • MAC（网卡）地址 • 浏览器 Cookie |

    | 关联因素 | 关于个人的其他详细信息，如生理或遗传数据。 |

    | 数据项 | 数据库中实际存储的关于某个人的字段`值`。 |


    ### 代表


    GDPR 要求公司在欧盟设有当地代表，该代表承担确保法规得到应用和数据保护得到遵守的法律责任。这使得该代表在数据被滥用或误用时可承担法律后果，便于实施罚款和处罚。


    ## 数据可移植性


    数据可移植性是数据保护法规领域中一个相对较新的要求，其设立是为了保护消费者免受*供应商锁定*的影响。该主题在 GDPR 第 20 条：数据可移植权（第 3
    章）中有所阐述。


    这意味着，公司必须能够在收到请求后，以结构化的、机器可读的格式提供或传输其收集的关于客户的全部个人数据。


    通过 MongoDB 中良好的文档设计，在满足个人数据方面的这项要求可以相当容易。发现、识别和收集这些数据的难易程度可能取决于所选的架构设计和应用的验证级别。


    提示


    `MongoDB Compass`的"分析架构"功能可用于更轻松地找到`标识符`字段。


    以 JavaScript 对象表示法格式导出任何相关文档，在机器可读性方面应该是足够的。


    可以开发一个基于`聚合管道`的 MongoDB`视图`，使用`$lookup`来关联来自其他集合的相关文档，重新格式化某些字段，并排除其他字段。


    ## 数据大小


    从客户的物联网设备收集的历史数据被视为个人数据，应可导出。在这种情况下，你需要能够提供或传输大量数据。以高效、紧凑的结构化和存储数据对于存储和带宽成本都很重要。


    考虑使用*存储聚合*技术将较旧的数据聚合到精度较低的存储桶中，从而在不存储精确数据的情况下概括长期趋势。例如，你可能保留长达一个月的每小时数据点，然后只保留长达一年的日平均值。


    ## 个人数据的留存


    GDPR 第 13 条（第 2a 款）规定如下：


    > *控制者在收集* *个人数据* *时，应向* *数据主体* *提供以下确保处理公平透明所必需的进一步信息：（a）* ***个人数据*** *将被存储的**期限**……*


    该条款要求数据控制者预先知道*个人数据将被存储的期限*，并将其传达给最终用户。你至少应该有一个在收集时为数据加时间戳的策略，以及一个轮换数据的方法。


    ### 自动移除


    在实现自动移除旧数据的一种方法中，每个文档可以包含一个类似`dateCollected`的字段，并在该集合上针对该字段建立一个`生存时间索引`，以便在大约
    12 个月后自动、完全地移除文档。


    你应该谨慎处理批量删除，因为它们可能对复制过程产生性能影响，尤其是在 MongoDB 4.0 之前的版本中。大量操作在几秒钟内同时发生，可能会使 I/O 不堪重负，并暂时阻止其他操作。确保日期值的粒度足够细以避免这种情况（分钟级粒度通常效果良好）。另外，在将数据导入或迁移到
    MongoDB 时，注意不要将大量文档的日期字段设置为同一个占位日期或导入过程开始的时间戳。如果生存时间索引在 12 个月后突然启动，这可能会像前面描述的那样阻止复制。


    在代码清单 4-1 中，我们看到消息日志以分钟粒度级别存储，并有一个生存时间索引，该索引将在一年（365 天）后自动清除它们。根据系统的负载，这应该能创建足够小的批次，以避免停顿风险。


    ```

    db.msglog.insertOne(

    { from: "nic", to: "sophie",

    createDate: ISODate("2019-11-04T20:55"),

    msg: "What’s for dessert?" });

    db.msglog.createIndex(

    { "createDate": 1 },

    { expireAfterSeconds: 365*24*3600 } )

    ```

    清单 4-1：用于一年后删除数据的生存时间索引


    ### 自定义编辑


    清除个人数据的另一个选项是使用`cron`作业来启动更精细或自定义的旧个人数据清理。例如，你可以使用`$unset`更新命令在预定义的时间段后从文档中删除某些字段（参见代码清单
    4-2）。


    注意


    MongoDB 的 Realm 无服务器平台包含"计划触发器"，允许在预定义的时间间隔执行任意 JavaScript 函数来清除、修剪或聚合文档。


    代码清单 4-2 中的代码对收集的数据执行一种"滚动编辑"，清除`PII`字段，但保留其他字段，以便后续可以进行数据挖掘以寻找其他趋势和关联，而不会冒暴露存储的个人数据的风险。


    ```

    db.msglog.insertOne(

    { from: "nic", to: "sophie",

    createDate: ISODate("2019-11-04T20:55"),

    msg: "What’s for dessert?",

    metadata: {

    deviceId: "34-A4-8C-71",

    deviceName: "iPhone XS",

    ip: "123.45.67.89",

    gps: { lat: 48.86, long: 2.349 }

    }});

    db.msglog.update(

    { _id: ObjectId(1234...) },

    { $unset: {metadata: "" } )

    ```

    清单 4-2：当不再需要时取消设置某些元数据

    '
- fmt: '### 被遗忘权


    全球大多数数据合规法规的另一个常见组成部分是用户有权要求删除所有收集到的关于他们的数据。这涉及到与数据可移植性合规类似的许多数据发现技术问题。主要区别在于，数据需要被完全销毁，而不仅仅是导出。为了完全合规，备份中的用户数据也应被清除，或者个人数据的备份保留时间应限制在非常短的时间内。


    > **注意**

    >

    > MongoDB的字段级加密支持允许使用每个用户的密钥来加密个人数据。删除用户的密钥可以有效地销毁对该数据在实时数据库以及所有备份和副本中的访问。更多详情请参见
    "*设计建议*" 部分。


    #### 产品保证


    在某些情况下，你可能仍然需要保留与订单相关的一些个人数据（例如，姓名、账单地址）。这些数据通常出于审计目的和保修要求（例如，退货或产品召回）而需要保留。


    #### 避免使用带日期的集合


    一些架构使用了一种反模式，即对相同类型的数据使用多个集合，并附加日期后缀。例如，旧消息在30天后会被移动到月度集合中。这会产生拥有大量集合的数据库，例如：


    ```

    user_messages

    user_messages_201909

    user_messages_201910

    user_messages_201911

    ```


    这种方法不仅使得对历史数据进行聚合变得更加困难，而且大量的集合仅仅为了管理操作系统内部底层数据文件的文件句柄就需要大量的内存开销。


    ## 数据流


    GDPR 第45条（第1款）引入了一个我们将称之为 "*数据流*" 的概念：


    > *“***向第三国或国际组织传输个人数据***可以进行，前提是[欧洲]委员会已决定该第三国、该第三国内的一个领土或一个或多个特定部门，或所涉国际组织***确保适当水平的保护***。”*


    GDPR 所做的一个重要区分是数据过境与数据传输之间的区别。"*数据过境*" 是指为了处理而临时传输数据副本，可以被认为是“运动中的数据”。而 "*数据传输*"
    则是将持久数据存储永久性地重新定位到另一个物理位置，并且包括备份。


    正如你所想的，数据传输在数据保护方面有着更高的要求，并在 "*数据存储*" 部分有所涉及。


    ### 处理数据


    题为“处理合法性”的 GDPR 第6条允许一个包含地理位置个人数据的分片集群*临时*将一些包含个人数据的文档复制到另一个分片节点进行分析处理，例如在聚合管道中。但是，这仅适用于该远程位置在预先批准的地理位置内。例如，如果你有欧盟客户数据，并且一个集群的物理主机位于俄罗斯，那么甚至将数据过境到那里进行处理也是违规的（参见图
    [4-1](#487346_1_En_4_Chapter.xhtml#Fig1)）。


    ![../images/487346_1_En_4_Chapter/487346_1_En_4_Fig1_HTML.jpg](images/487346_1_En_4_Chapter/487346_1_En_4_Fig1_HTML.jpg)


    图 4-1


    欧盟数据可在美国临时处理，但不能在俄罗斯处理


    为了安全起见，你可以在每个国家配置部署带有`mongos`路由器和应用程序，并在本地执行任何必要的处理。这将在关于特殊配置的第[8](#487346_1_En_8_Chapter.xhtml)章以及关于高级和极限分片的第[10](#487346_1_En_10_Chapter.xhtml)和第[11](#487346_1_En_11_Chapter.xhtml)章中更详细地讨论。


    ### 端到端数据加密


    在所有情况下，GDPR 要求数据必须以安全的方式进行通信，例如，使用最新的 TLS 加密版本和证书颁发机构来防止中间人攻击。


    ## 数据存储


    个人数据存储的安全性和管理是全球大多数法规的主要考虑因素。本节探讨一些技术，用于在数据存储后保持其安全，或在收集期间通过混淆使其安全。


    ### 数据映射


    大多数全球法规要求*数据保护官*（`DPO`）不仅要知道存储了什么数据，还要知道数据存储在**哪里**。例如，如果你在分片集群上存储个人数据，`DPO`必须了解分片键如何影响数据存储在哪些主机和数据中心。


    这一要求还意味着*数据控制者*必须能够跟踪备份中的数据，并能够确认即使在这些数据（例如，“被遗忘权”）方面也符合法规。


    重要的是要维护数据模式的最新文档，并知道哪些集合和字段包含个人数据、数据是什么格式、哪些文档需要在一定期限后清除，以及哪些数据应在特定时间后进行假名化/匿名化。


    在这里，控制者可以使用像`MongoDB Compass`这样的工具进行数据探索和模式发现。识别无效数据值也很重要，因为如果这些字段构成分片键的一部分，它们可能会意外导致个人数据存储在意外的位置。


    ### 审核变更


    MongoDB 企业版支持许多审计功能，这些功能对于保证没有未经授权的数据访问或用户访问权限的更改至关重要。审计子系统会将任何此类更改记录到单独的日志文件中，并允许将这些日志流式传输到安全的远程位置以防止篡改。


    使用`Ops Manager`（随`MongoDB Enterprise Advanced`提供），数据控制器可以在数据库配置发生某些更改时自动即时收到警报。这对于向监管机构证明正在采取一切可能的措施来确保安全处理个人数据至关重要。


    ### 验证


    MongoDB 对 `JSON Schema` 的支持允许数据库管理员为每个集合中的文档指定复杂的模式规则。通过要求某些标识符以特定格式存储（即所有社会安全号码都以相同的字符串格式存储，而不是部分存储为整数），它确保了如果曾有移除请求或需要通知用户有关数据泄露的情况，数据是可被正确发现的。


    模式验证可以仅配置为警告，也可以配置为阻止将失败的操作（如插入和更新操作）。验证不会应用于预先存在的文档。可以使用 `$jsonSchema` 查询操作符来查找任何与最近添加的模式验证规则不匹配的文档。'
  raw: '### Right to be forgotten


    Another common component of most data compliance regulations globally is a right
    for users to demand deletion of all data collected about them. This includes many
    of the same technical problems of data discovery for data portability compliance.
    The major difference is that data needs to be completely destroyed rather than
    just exported. For full compliance, user data in backups should also be purged
    or backup retention for personal data limited to a very short time span.


    Note


    MongoDB’s field-level encryption support allows personal data to be encrypted
    with per-user keys. Deleting a user’s key effectively destroys access to that
    data in the live database as well as all backups and copies. See the “*Design
    recommendations”* section for more details.


    #### Product guarantees


    In some cases, you might still need to retain some personal data associated with
    orders (e.g., first and last name, billing address). This data is often required
    for audit purposes and warrantee requirements (e.g., returns, or product recalls).


    #### Avoid dated collections


    Some architectures use an antipattern with multiple collections for the same type
    of data, appended with a date suffix. For example, older messages are moved into
    a monthly collection after 30 days. This produces databases with huge numbers
    of collections like:


    ```

    user_messages

    user_messages_201909

    user_messages_201910

    user_messages_201911

    ```


    Not only does this approach make it harder to perform aggregations of historical
    data, but a large number of collections requires a significant memory overhead
    just to manage file handles for the underlying data files inside the operating
    system.


    ## Data flows


    GDPR Article 45 (clause 1) introduces a concept we will refer to as *data flows*:


    > ***A transfer of*** ***personal data*** ***to a third country*** *or an international
    organisation* ***may take place*** *where the [European] Commission has decided
    that the third country, a territory or one or more specified sectors within that
    third country, or the international organisation in question* ***ensures an adequate
    level of protection**.*


    One of the important distinctions made by GDPR is the difference between data
    transits and data transfers. A *data transit* is the transmission of a copy of
    data on a temporary basis for processing and can be thought of as "data in motion."
    A *data transfer*, on the other hand, is the permanent relocation of persistent
    data storage to another physical location and includes backups.


    As you can imagine, data transfer has an even higher burden in terms of data protection
    and is covered in the section on “*Data storage*.”


    ### Processing data


    GDPR Article 6 titled "Lawfulness of processing" allows a sharded cluster with
    geolocated personal data to *temporarily* copy some documents with personal data
    to another shard node for analytics processing, such as in an aggregation pipeline.
    However, this only applies if that remote location is in a preapproved location.
    If, for example, you have EU customer data and a cluster with physical hosts in
    Russia, then it would be a violation to even transit data there for processing
    (see Figure [4-1](#487346_1_En_4_Chapter.xhtml#Fig1)).


    ![../images/487346_1_En_4_Chapter/487346_1_En_4_Fig1_HTML.jpg](images/487346_1_En_4_Chapter/487346_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    EU data may be processed temporarily in the United States but not in Russia


    To be safe, you can configure your deployment with `mongos` routers and applications
    in each country and perform any necessary processing locally. This will be discussed
    in more detail in Chapter [8](#487346_1_En_8_Chapter.xhtml) on special configurations
    and Chapters [10](#487346_1_En_10_Chapter.xhtml) and [11](#487346_1_En_11_Chapter.xhtml)
    on advanced and extreme sharding.


    ### End-to-end data encryption


    In all cases, GDPR requires that data is communicated in a secure manner, for
    example, using a recent TLS encryption version with a certificate authority to
    prevent man-in-the-middle attacks.


    ## Data storage


    The security and management of personal data storage is a major consideration
    in most regulations around the world. This section examines some techniques to
    keep data safe once stored or by obfuscating it during collection.


    ### Data mapping


    Most of the global regulations require the *data protection officer* (DPO) to
    not only know what data is stored but also **where** it is stored. For example,
    if you are storing personal data on a sharded cluster, the DPO must be aware of
    how the shard key influences on which hosts and data centers that data is stored.


    This requirement also means that the *data controller* must be able to track data
    inside backups and be able to confirm compliance even in this data (e.g., the
    "right to be forgotten").


    It is important to maintain up-to-date documentation of data schema and know which
    collections and fields contain personal data, what format it is in, which documents
    need to be purged after a certain period, and which data should be pseudonymized/anonymized
    after certain time.


    Here again, controllers can use tools like MongoDB Compass for data exploration
    and schema discovery. It’s also important to identify invalid data values since
    those may accidentally cause personal data to be stored in an unexpected location,
    when those fields form part of the shard key, for example.


    ### Auditing changes


    MongoDB Enterprise edition supports a number of auditing features that can be
    crucial to guaranteeing that there has not been any unauthorized data access,
    nor changes to user access privileges. The auditing subsystem will record any
    such changes to separate logs files and allows streaming these logs to a secure
    remote location to prevent tampering.


    Using Ops Manager (available with MongoDB Enterprise Advanced), data controllers
    can be automatically and instantly alerted whenever certain changes are made to
    a database configuration. This can be critical for demonstrating to regulation
    authorities that all possible measures are being taken to ensure secure handling
    of personal data.


    ### Validation


    MongoDB’s support for *JSON Schema* allows database administrators to specify
    complex schema rules for documents in each collection. By requiring certain identifiers
    to be stored in a specific format (i.e., all social security numbers are stored
    in the same string format and not partly as integers), it ensures that data is
    properly discoverable should there ever be a request for removal, or the need
    to notify users about a data breach.


    Schema validation can be configured just as a warning, or to block inserts and
    update operations which would fail. Validation will not apply to preexisting documents.
    The `$jsonSchema` query operator can be used to find any documents failing to
    match recently added schema validation rules.'
