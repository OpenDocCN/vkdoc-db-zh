  trans: "### 输入验证与注入攻击\n\n由于 MongoDB 基于 JSON 文档，因此不存在传统 `SQL` `注入攻击`的风险。然而，当运行 JavaScript/NodeJS\
    \ Web 应用程序（如 Mongoose ORM）或 API 时，存在 `JSON 注入攻击`的可能性。设想一个 API，它接受 JSON 文档作为查询的一部分。如果此查询被直接传递给\
    \ MongoDB 的 `find` 查询，恶意用户可能会利用 MongoDB 查询语言的技巧来查询属于其他用户的数据，这被称为“对象注入”。已知的攻击会结合使用\
    \ `$not` 和 `$ne` 来绕过常规检查。\n\n假设你有一个登录界面，它接受 Web 浏览器输入，格式如下：\n```\n{user: 'nic',\
    \ password; '123'}\n```\n并且这个输入被直接传递到类似下面的查询中：\n```\ndb.users.findOne(query)\n\
    ```\n如果这个 `findOne` 返回了结果，我们就一步完成了用户认证和数据加载。这是减少一次到服务器往返的巧妙方法吗？不是。如果黑客转而发送：\n\
    ```\n{user: 'nic', password: {$ne: ''}}\n```\n或\n```\n{user: 'nic', password:\
    \ {$gt: ''}}\n```\n即使黑客无需尝试猜测我的密码，这个查询也会向 `findOne` 返回一个文档。当然，这种攻击不仅适用于读取未授权数据。即使是从不验证\
    \ JSON 数据的应用程序进行的数据库插入和更新，也可能存在风险。\n\n因此，对于在 API 查询中接受 JSON 文档的应用程序设计者来说，验证此类文档并以预期的数据类型提取值至关重要。\n\
    \n对于 NodeJS，有一些库如 `Joi` 可以提供帮助。其他选项包括使用 `JSON.parse`，使用像 `mongo-sanitize` 这样的\
    \ `npm` 包，或者在使用数据之前手动删除 API 输入中的任何美元符号或花括号。\n\n### $where 操作符\n\n`$where` 操作符是一个旧的\
    \ `find` 查询功能，它允许你向查询子系统传递一个包含 JavaScript 表达式的字符串或一个完整的 JavaScript 函数。显然，允许将 JavaScript\
    \ 命令传递给 MongoDB 内置的 JavaScript 引擎是危险的，特别是如果存在这些命令可能来自未经验证的用户输入的风险时。\n\n已经增加了各种安全改进和限制来约束其影响，但底线是这是一个非常危险的功能，几乎所有原始用例都可以通过其他更新、性能更好、更安全的\
    \ MongoDB 函数来处理。\n\n即使在最新版本的 MongoDB 中，此选项默认也是启用的，但我们建议你在所有部署中将其禁用，方法是在配置文件中添加：\n\
    ```\nsecurity:\n  javascriptEnabled: false\n```\n或者使用 `--noscripting` 命令行选项。这也将禁用旧的\
    \ `mapReduce` 和 `db.collection.group` 功能——这两者都可以在你的应用程序中通过使用 `聚合管道` 来替代。\n\n注意\n\
    \n如果你启用了 `SELinux`，则绝对应该禁用服务器端 JavaScript，因为任何需要 JavaScript 的操作尝试都将导致 MongoDB\
    \ 段错误。\n\n### SELinux\n\n安全增强式 Linux（也称为 `SELinux`）是一个 Linux 模块，它提供了一种支持访问控制安全策略（例如强制访问控制）的机制。一旦启用，`SELinux`\
    \ 可以通过限制对某些预先批准的目录、文件和网络端口的访问，来防止 Linux 主机上的任何单个程序/服务危及整个系统。\n\n在设置 MongoDB 时，你可以在两种不同的模式下运行\
    \ `SELinux`。`宽容` 模式适用于调试你的配置，因为它将允许 MongoDB 尝试所有访问，但会记录每一次尝试。一旦你将 `SELinux` 切换到\
    \ `强制` 模式，它将阻止任何未授权的访问，并可能阻止你的 MongoDB 实例按预期运行。\n\n你可以通过运行 `getenforce` 来检查当前模式，或使用\
    \ `sestatus` 查看完整状态。为了使强制模式成为系统启动时的默认模式，通常你只需要编辑 `/etc/selinux/config` 文件。\n\n\
    当通过预打包的 RPM 文件安装 MongoDB 时，有一些用于存储数据和日志文件的标准目录：\n\n*   `/var/lib/mongo`（数据目录）\n\
    *   `/var/log/mongodb`（日志目录）\n\nRed Hat Enterprise Linux 7（及其衍生版本）中包含的 MongoDB\
    \ 默认 `SELinux` 配置假设使用相同的目录，因此如果你选择将 MongoDB 配置为在其他位置存储数据或日志，你将需要使用一系列命令手动更新 `SELinux`\
    \ 权限。例如，如果你想将数据存储在新的分区 `/data/mongodb` 中，你需要运行以下命令以允许 MongoDB 正确启动和运行：\n```\n\
    semanage fcontext -a -t mongod_var_lib_t '/data/mongodb.*'\nchcon -Rv -u system_u\
    \ -t mongod_var_lib_t '/data/mongodb'\nrestorecon -R -v '/data/mongodb'\n```\n\
    同样地，要使用非标准端口进行绑定，你需要运行：\n```\nsemanage port -a -t mongod_port_t -p tcp <端口号>\n\
    ```\n如果 `SELinux` 阻止你的 MongoDB 实例正确启动，它会将所有详细信息以自定义格式记录到本地 `/var/log/audit/audit.log`\
    \ 文件中。如果你在配置 MongoDB 并启用 `SELinux` 强制模式时遇到任何问题，有一些工具和命令可以帮助你根据这个 `audit.log` 来解释问题。\n\
    \n`audit2allow` 可以帮助生成一组新的 `SELinux` 策略，你可以以比默认策略更高的优先级引入这些策略来覆盖它们。\n\n或者，运行：\n\
    ```\nsudo sealert -a /var/log/audit/audit.log\n```\n将激活 `setroubleshoot` 客户端工具，通常会提供一些有用的见解和针对\
    \ `SELinux` 配置更改的建议。\n\n付出额外的努力来启用 `SELinux` 并让 MongoDB 生产实例在强制模式下运行是非常值得的。如果可能，请坚持使用默认端口和目录路径，因为保持这些标准也将有助于新团队成员上手并简化任何后续的故障排除。\n\
    \n### 二进制监控\n\n有一些解决方案旨在为在银行或医院等敏感企业中运行的关键应用程序增加额外的保护层。这些工具操作二进制代码，并用它们自己的函数替换某些操作（如内存分配）。其思路是监控和防止某些攻击途径。像\
    \ `Imperva` 这样的公司提供了声称与 MongoDB 兼容的工具，但根据我的有限经验，这些工具可能会增加不稳定性，并且其承诺的额外保护程度难以量化。\n\
    \n### 认证\n\n`ISO/IEC 27000` 系列标准帮助组织保护信息资产安全。特别是 `ISO/IEC 27001`，它规定了一套最佳实践，并详细列出了与信息风险管理相关的安全控制清单。\n\
    \n虽然 27001 标准没有强制要求特定的信息安全控制，但它所建立的框架和控制清单使公司能够确保一个全面且持续改进的安全管理模式。\n\n另一个流行的框架是支付卡行业数据安全标准\
    \ (`PCI DSS`)。即使你不存储信用卡数据，其核心要求也是一个很好的安全活动检查清单。\n\n如果你的数据特别敏感，你的组织应考虑对你的安全实践进行认证。`MongoDB\
    \ Inc.` 为 `Atlas` 提供的认证和白皮书是一个有用的参考，请参阅 [`www.mongodb.com/cloud/trust`](http://www.mongodb.com/cloud/trust)。"
- fmt: '## Checklist


    In summary, here’s a checklist of all the steps that should be taken to secure
    a MongoDB deployment:


    1.  Enable authentication (and create MongoDB users with the least privileges
    necessary to complete their use cases), and if available, use Kerberos for external
    authentication.

    2.  Secure the network infrastructure by blocking incoming connections from all
    but trusted IPs/networks and blocking all noncritical ports.

    3.  Ensure that most users to the host can only read but not modify MongoDB data
    or log files.

    4.  Configure encryption between all components (internal authentication, replication)
    and from clients with well-defined x.509 certificates.

    5.  Encrypt data at rest with filesystem encryption, or application-level encryption
    with a regularly rotated master key (Enterprise only).

    6.  Enable audit logs sent to a centralized log server (Enterprise only).

    7.  Redact log files to avoid leaking sensitive user data into the logs (Enterprise
    only).

    8.  Disable server-side JavaScript.

    9.  Enforce SELinux.

    10. Remove user accounts when no longer required (i.e., when people leave the
    team).

    11. Upgrade to any MongoDB minor releases as soon as possible to take advantage
    of security fixes.

    12. Monitor the Security Alerts page at [`www.mongodb.com/alerts`](http://www.mongodb.com/alerts)
    for any updates.


    Footnotes [1](#487346_1_En_3_Chapter.xhtml#Fn1_source)   [2](#487346_1_En_3_Chapter.xhtml#Fn2_source)


    # 4. Compliance and GDPR


    > *Relying on the government to protect your privacy is like asking a peeping
    tom to install your window blinds.*

    >

    > —John Perry Barlow, cyberlibertarian, political activist, and founding member
    of the Electronic Frontier Foundation


    > *Businesses that make consumer privacy a point of competitive differentiation
    will enjoy greater customer loyalty.*

    >

    > —Pierre Nanterme, Chairman and CEO of Accenture


    > *Data privacy has become something that is not just for the lawyers anymore.
    At LinkedIn we call it a culture of privacy.*

    >

    > —Kalinda Raina, Head of Global Privacy, LinkedIn


    The ability to store humongous amounts of data creates opportunities for powerful
    analytical insights. With the advent of new data protection regulations around
    the world, it also creates compliance and security risks for companies because
    data is often dumped into data lakes or data warehouses without proper labeling,
    auditing, or policy enforcement.


    MongoDB offers a number of features to ease some of the burdens of adhering to
    privacy regulations such as the right to be forgotten and the right to export
    one’s own data. Other obligations such as the requirement to notify users of a
    breach of their data within 72 hours will require a custom `business workflow`
    and `application-side preparations`.


    ## General Data Protection Regulation


    While many regulations, such as the European Union’s `General Data Protection
    Regulation` (GDPR), appear extremely complex, they are in fact a codification
    of many of the industry’s best practices. Despite GDPR being an EU-based law,
    it applies to any organization around the world that stores or processes data
    about EU citizens. Noncompliance penalties are steep and can reach as high as
    €20 million or 4% of the perpetrating organization’s annual global revenue, whichever
    is greater. Less severe infringements still face half that penalty.([³](#fn3))


    In this chapter, we will address the major compliance concerns when storing structured
    data about users in real-world MongoDB deployments. With the correct setup, off-the-shelf
    MongoDB tooling can provide visibility and transparency into what data is being
    stored and how it is being used. MongoDB Enterprise and MongoDB Atlas include
    additional security and privacy features.


    As the world’s strictest and most comprehensive legal regulation, we will use
    GDPR as the basis for most of the discussion in this chapter, although we’ll also
    explore notable differences in other related regulations in other parts of the
    world.


    ### Privacy by design


    When running a database, privacy laws regulate how organizations collect, store,
    process, retain, and share the personal data of EU citizens, and this applies
    even to foreign companies if they process or store data about EU citizens.


    This chapter focuses on how MongoDB topology design can meet data protection regulations.
    We cover the basic requirements of most regulations and how certain MongoDB features
    can be used to, for example, hide certain data based on role and remove user data
    as part of the “right to be forgotten.”


    ### Caveats


    The GDPR requires clear evidence of an organization’s ongoing compliance efforts.
    This makes it necessary to constantly monitor your data processing practices and
    adequately address any emerging privacy and security risks to ensure that data
    protection processes remain effective.


    Disclaimer


    To ensure compliance with any laws like GDPR applicable in your country or countries
    of business, you should review the laws directly (e.g., `GDPR (Regulation (EU)
    2016/679`) and seek legal counsel to apply those laws correctly in your situation.


    ## Data protection


    At a high level, the GDPR covers the “right to be forgotten,” “right to review,”
    and the “right to be informed” about any data leaks or mishandling.


    This section will look deeper at a few issues which are of particular concern
    to those designing, architecting or implementation data collection, storage, or
    processing with MongoDB.


    ### Key concepts


    Before delving into the particulars, it’s important to understand some key concepts
    which relate to all the data protection regulations globally.


    A `data controller` is an organization which collects, stores, and processes data
    on private individuals and other companies, known as `data subjects`. A `data
    processor` is an employee, contractor, or a software tool such as MongoDB or an
    application which performs the processing. It is up to the controller to ensure
    that the processor is capable of and configured to meet all the privacy and security
    requirements laid out by the applicable compliance laws.


    For any organization with international customers, this essentially means that
    they need to follow the regulations for each customer’s home territory. If you
    have EU customers in your database and you operate in the European Union, then
    you need to ensure your data storage meets all the GDPR requirements; otherwise,
    you run the risk of breaches and penalties.


    ### Personally identifiable information


    `Personal data` is any information related to an identifiable individual, but
    does not necessarily identify the individual. `Personally identifiable information`
    (PII), on the other hand, is any data that could potentially identify a specific
    individual. Table 4-1 shows examples of which types of data are personally identifiable
    or not.


    Table 4-1


    Examples of personal data types and which are PII


    | Personally identifiable information (PII) | Personal data (non-PII) |

    | --- | --- |

    | • Full name• Social security number• Driver license number | • Device IDs• IP
    addresses• Cookies |'
