    ### 分片状态详情


    `Listing 11-3` 展示了数据在所有三个分片上的分布情况。


    我们现在可以开始数据加载了，因为知道写入工作负载将被均匀分布。


    ## 多租户架构


    MongoDB 是构建多租户架构和软件即服务应用程序的一个流行选择。在某些情况下，所选择的设计使用一个**单一数据库**配合分片集合来容纳所有客户的数据。这种模型通常在每个文档中使用一个字段来标识客户或项目。另一些人则选择为每个客户创建一个**新数据库**，并将相同的集合名称和索引重复放入每个数据库中。


    这两种方法在原始的 MMAP 存储引擎上都能很好地工作，该引擎简单地使用原生操作系统功能将内存中的数据结构映射到磁盘上。磁盘上的文件数量随存储的数据量扩展，而与集合或索引的数量无关。


    当引入 WiredTiger 存储引擎时，数据文件的映射方式发生了变化。现在，每个集合在磁盘上存储在一个单独的文件中。每个集合中的每个索引也单独存储。因此，基于第二种模型开发的多租户架构突然之间在磁盘上有了更多的独立文件。


    ### 文件句柄


    想象一个小型的多租户集群，容纳了 24 个租户的数据库，以及一个用于保存系统范围元数据的共享数据库。我们假设每个租户数据库有 32 个集合，平均每个集合有
    3 个索引，即每个数据库有 96 个索引。这需要 128 个文件句柄来加载所有这些集合的数据。如果我们在这个系统上运行一个副本集，在高峰使用期间，我们可能需要多达
    3200 个文件句柄（24 个数据库 × 128 个文件句柄 + 共享的 128 个）。由于每个打开的文件句柄可能占用相当多的内存资源，我们开始遇到一个点：为文件描述符分配给操作系统的内存比用于在内存缓存中保存
    MongoDB 数据的内存还要多。可以想象，一个增长到数千个租户的系统将更严重地受到这种影响。


    在图 11-6 中，我们看到一个示例，其中数据库分布在 6 个分片上。在这种情况下，每个分片中的节点现在只需要打开最多 640 个文件句柄，相比之下，之前则需要
    3200 个。


    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig6_HTML.jpg](img/487346_1_En_11_Fig6_HTML.jpg)

    **图 11-6** 使用分片的多租户架构


    ### 虚拟机


    随着虚拟机技术的可用性，我们将受益于将单个大型主机拆分为多个较小的虚拟机。我们实际上并不分片任何集合，而是确保每个数据库的**主分片**均匀分布在各个分片上。随着租户数量的增长，我们可以添加更多分片以将文件句柄总数保持在合理的最大值。


    这种为集群拓扑增加的复杂性并不理想，但使用企业级自动化工具管理一个大型 MongoDB 集群通常比完全重新设计一个多租户 SaaS 应用程序要容易得多。


    ## 混合架构


    随着云计算的日益普及，即使是拥有内部和法规限制的保守企业也在将运营迁移到云端。


    通常，这些云迁移是从现有的本地 MongoDB 节点和应用逐步推出的。第一步通常是将仲裁节点迁移到云端；然后，有时当只有两个完全本地的数据中心可用时，云被用来提供“第三个数据中心”。


    ### 加密


    凭借对传输中和静态加密以及**字段级加密**的内置支持，即使是金融和医疗行业的企业也可以确信云端的数据是安全的，即使他们更愿意将大部分节点保留在他们直接控制的服务器上。


    ### 迁移服务


    下一阶段通常是将某些服务迁移到云端。例如，批处理和分析工作负载可能保留在本地，但面向客户的 Web 或移动服务由于使用模式需要每天快速扩展和缩减数次，因此具有迁移到灵活的云基础设施的强烈成本压力。


    ### 隐藏成本


    将应用程序迁移到云端引入了一个新的成本来源：**云带宽费用**。所有主要的云提供商都对从云计算网络传出的字节收费。他们通常也对可用区之间的数据收费（但费率低得多）。因此，即使在同一地区的多个可用区中分布的副本集也会因复制而产生带宽费用。


    对企业来说，很容易试图寻找一种方法，通过从已经位于同一可用区的节点读取来减少过高的带宽费用。理论上，这可能意味着只需要复制带宽。


    在图 11-7 中，我们看到一种拓扑，其中主节点在本地（因为大部分写入工作负载仍在本地），但云中只有读取副本成员。在某些情况下，基于云的微服务可以从云中的二级节点读取以避免带宽费用，但将面临读取**陈旧数据**的风险。


    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig7_HTML.jpg](img/487346_1_En_11_Fig7_HTML.jpg)

    **图 11-7** 主节点仍在本地的混合部署


    或者，如图 11-8 所示，主节点可以位于云端。现在我们可能会因本地应用的写入而产生带宽费用。这些写入随后需要从云端复制回本地的其他副本集成员。默认启用的**复制链**可以用来让数据中心
    2 中的成员从数据中心 1 复制。


    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig8_HTML.jpg](img/487346_1_En_11_Fig8_HTML.jpg)

    **图 11-8** 主节点在云端的混合部署


    > **注意**

    > 从应用到 `mongos` 的网络压缩需要通过向连接 URI 添加 `?compressors=snappy` 来显式启用。'
- fmt: '### Policy restrictions


    To complicate matters, there can still be certain cases where a selection of collections
    or entire databases from a sharded cluster cannot be stored on the cloud due to
    company policy or external regulations. In such situations, there are still some
    complex architectures that allow a cluster to have a significant number of cloud-based
    shards while keeping certain data always on-prem.


    In Figure [11-9](#487346_1_En_11_Chapter.xhtml#Fig9) we can see a sharded cluster
    with a confidential database whose content must be stored only in our own data
    centers. As long as all `confidential` collections are unsharded, they will remain
    on the primary Shard 3. If all replica set members for Shard 3 are in our data
    center, `confidential` data will never be stored in the cloud.


    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig9_HTML.jpg](images/487346_1_En_11_Chapter/487346_1_En_11_Fig9_HTML.jpg)


    Figure 11-9: A single cluster but with confidential data on-prem


    Replica set members for Shards 1 and 2 can be a mix of on-prem and cloud hosts
    like in Figures [11-7](#487346_1_En_11_Chapter.xhtml#Fig7) and [11-8](#487346_1_En_11_Chapter.xhtml#Fig8).


    ## Scaling back a sharded cluster


    In certain situations, you may have initially created a multi-shard cluster to
    prepare for the short-term growth of an application prior to big launch. But sometimes
    the data doesn''t grow as fast as expected and some of that hardware can be better
    served in a different cluster or project.


    Removing shards and freeing up hosts is reasonably straightforward. There are
    three major steps:


    1.  Relocate any data on that shard (specifically databases “homed” on that shard).

    2.  Remove any shard-level configuration referencing those shard nodes.

    3.  Shut down the nodes.


    ### Relocating data


    Let’s imagine a simple example of a three-shard cluster with two databases, each
    with one sharded and one unsharded collection as shown in Figure [11-10](#487346_1_En_11_Chapter.xhtml#Fig10).
    The database `db2` is homed on Shard C, the shard we are about to remove.


    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig10_HTML.jpg](images/487346_1_En_11_Chapter/487346_1_En_11_Fig10_HTML.jpg)


    Figure 11-10: A shard with homed databases pending draining


    Before Shard C can be drained of sharded collection data, we first need to choose
    a new location as the primary shard of `db2`. In this case, we should use Shard
    B to store the unsharded collections since Shard A is already home to `db1` and
    this will help keep the shards balanced.


    #### Maintenance window


    Before starting any changes, we need to make sure that there are **no migrations
    active** and that there are **no read or write operations running** against the
    unsharded collections from `db2`. For safety, it is recommended to use a planned
    maintenance window and completely take down any applications using this database.


    #### Move primary


    Now we need to issue the following command via a `mongos`:


    ```

    db.adminCommand( { movePrimary : "db2", to : "shardB" } )

    ```


    This could take a considerable amount of time as the data needs to be transferred
    and then all the indexes on those unsharded collections are rebuilt on all members
    in the Shard B replica set.


    #### Restart all components


    Due to a known issue with the caching of metadata (up to and including at least
    version 4.2), it is now extremely important to:


    1.  Restart all `mongos` instances and all `mongod` shard members (including the
    secondary members).

    2.  Connect to *all* `mongos` instances and *all* `mongod` shard members (including
    the secondary members) and run `db.adminCommand({ flushRouterConfig: "db2" } )`.


    Tip: Check [`https://jira.mongodb.org/browse/SERVER-17397`](https://jira.mongodb.org/browse/SERVER-17397)
    for the current best practices for your version of MongoDB.


    #### Resume applications


    Only once the router configuration has been flushed on all shard components, it
    is safe to relaunch any applications using this database.


    ### Remove shard


    Now that Shard C is no longer the primary shard for any databases, we can begin
    the removal process.


    #### Drain shard


    At this point, the unsharded collections have been moved, but there will still
    be portions of all sharded collections stored on Shard C. We will now move off
    all chunks of data from any database on Shard C, by connecting to a `mongos` and
    issuing the command:


    ```

    db.adminCommand( { removeShard: "shardC" } )

    ```


    You can run this command multiple times to check the status of the migration until
    it reports no chunks remaining on the shard. Now the collections will be located
    as per Figure [11-11](#487346_1_En_11_Chapter.xhtml#Fig11).


    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig11_HTML.jpg](images/487346_1_En_11_Chapter/487346_1_En_11_Fig11_HTML.jpg)


    Figure 11-11: A shard ready to be removed from the cluster


    ### Shut down shard


    The replica set once comprising Shard C will still be operational but empty of
    any data, and no longer connected to the rest of the cluster’s members. These
    isolated nodes can now be stopped and the hosts reused for other purposes.


    ## Extremely large clusters


    When clusters get very large with many chunk definitions and complex zoning rules,
    the size of the data on the config server replica set will naturally grow larger.


    Each `mongos` keeps a cache of metadata about chunk locations and mapping to shards
    so that they can efficiently route queries to individual shards whenever possible.
    The memory requirements for this data will also grow for very large clusters,
    so `mongos` hosts may need to be upsized.


    ### Config servers


    It’s also important to monitor both the disk space and performance of config servers
    particularly during the balancing window or intense data loading to ensure that
    they can cope with the workload.


    For large clusters, it’s better to run a five-member replica set for the config
    servers to help distribute read load from the `mongos`es and provide additional
    resiliency. You will also need to scale the CPU cores and memory of the config
    servers as the cluster grows, although generally only 2–4 cores would be required.


    ## Key takeaways


    From this chapter, the key concepts to remember are as follows:


    *   Shard keys can be chosen to optimize read performance for certain queries
    by avoiding “scatter-gather” queries which involve all shards.

    *   Splitting and migration of data during heavy data import is relatively slow
    and may mean all data hits a hot shard, greatly reducing performance and increasing
    total import time.

    *   Chunk ranges can be manually defined and distributed across chunks in order
    to optimize bulk loading of new data with known distribution of values.

    *   Chunks can be manually moved outside of the normal balancer window with a
    special admin command called `moveChunk`.

    *   Unsharded collections can be relocated to another shard by using the `movePrimary`
    command on their database.

    *   Draining an unneeded shard containing data can be initiated with the `removeShard`
    command.

    *   The cost of bandwidth between data centers and cloud providers differs greatly
    and can have a large effect on the total cost of running distributed clusters.

    *   Network communication between the application and `mongod`/`mongos` needs
    to be explicitly enabled in the connection URI.

    *   Databases can be homed on specific shards so that the physical location of
    unsharded collections can be controlled for regulatory or cost reasons.'
