- fmt: '## Restore performance


    It’s important to test, measure, and optimize restore performance as part of any
    disaster planning. To minimize any downtime, we want to keep backups physically
    close to the hosts that will be involved in any restore. When hosting on-prem,
    you will need to balance the requirement of keeping backups off-site, but close
    enough that network performance doesn’t delay data downloading.


    ### Shard size


    One reason that the recommended maximum shard size is 2TB is because after this
    point restoring data hits the capacity limits of most networks. For example, if
    we attempt to replace a single 8TB node via a gigabit connection (in reality ~100
    MB per second), this would take approximately 23 hours just for the data transfer
    time.


    ### Cloud hosting


    The major cloud providers all include a low-cost, long-term file storage solution
    suitable for storing large MongoDB backups. They generally do not publish benchmarks
    let alone guarantees for storage transfer speeds. Restore times will depend on
    the network in between, with compute instances in the same AZ and region being
    much faster than transferring to a private data center. Remember that restoring
    data from cloud storage will also incur bandwidth charges.


    ### Media types


    As we covered in Chapter 1, different media will have drastically different throughput
    rates. Simply copying or downloading large data files will not be highly dependent
    on seek times, so a spinning disk might not be drastically slower than an SSD.
    But when restoring via `mongorestore` and building indexes, the lower seek times
    of SSD could drastically reduce the overall restore time.


    ### Compression


    When restoring from a `mongodump`, the documents are stored in BSON format already
    and can be compressed on disk to reduce storage requirements by using the `--gzip`
    and `--archive` options. When restoring, there will be considerable CPU cycles
    required for decompression.


    ### Index rebuilding


    The associated `.metadata.json` file contains collection options and index definitions,
    and for each collection, the indexes will be rebuilt. Depending on the number
    and complexity of indexes, the distribution of field values, and the amount of
    RAM available, the index build stage could take as long or longer than the entire
    data writing stage.


    ## Sharded clusters


    Sharded clusters are much harder to consistently back up than replica sets because
    there are multiple primaries each performing writes, and which might be under
    various degrees of load. The secondaries will likely suffer from these same workload
    disparities. Figure 9-2 shows a global sharded cluster with individual backups
    for each shard being stored in the same region, but with the config servers data
    backed up to the *Americas* data center.


    ![../images/487346_1_En_9_Chapter/487346_1_En_9_Fig2_HTML.jpg](images/487346_1_En_9_Chapter/487346_1_En_9_Fig2_HTML.jpg)


    Figure 9-2


    A sharded cluster being backed up for GDPR compliance


    ### Replication lag


    In the example above, a secondary from Shard A may be lagging its replication
    by 90 seconds due to a huge load, while Shard B secondaries are only 1 second
    behind their respective primaries.


    Taking a backup from differently lagging secondaries would cause different amounts
    of acknowledged (but not replicated) writes to be missed in the backup. But backing
    up from primaries requires locking which would block writes and is also not acceptable
    in production.


    ### Config servers


    The config servers also need to be backed up. They contain the metadata about
    which shard should contain documents in a particular shard key range. This configuration
    needs to be restored also, so a three-shard cluster can only really be restored
    back into a three-shard cluster, unless a single unified `mongodump` has been
    performed through a `mongos`.


    ### Pending chunk migrations


    At the same time, there may be chunk migrations between the replica sets as part
    of shard balancing operations. A chunk of documents may exist on both the donor
    and recipient shards during migration, only to be cleaned off the donor shard
    later.


    To ensure sharded clusters back up consistently, we need to both stop all balancing
    migrations and lock the config server primary and the primary from each shard
    to flush all writes to disk before taking filesystem-level copies or LVM snapshots.


    Remember that if you want to snapshot from secondaries, you could temporarily
    pause the application’s writes for a few seconds to allow secondaries to catch
    up before snapshotting. Both options will require the application to pause writes
    for a short period.


    ### Geographic sharding


    Each shard replica set may exist inside a geopolitical container which limits
    the transfer of data, including those being kept in encrypted backups. In order
    to avoid violating GDPR or other data protection regulations, we need to keep
    customer data in the same region. This has a positive benefit in that it reduces
    latency and likely increases throughput at restore time.


    The only concern is that metadata from the config server chunk boundaries may
    leak into the config backups. For safety, it’s best to store config server backups
    in the country with the most rigorous regulations.


    ### Backup steps for snapshots


    We will now walk through the backup details to fully understand the complexity
    that is involved. To take a consistent snapshot of a sharded cluster, the following
    steps must be followed.


    #### Stop background operations


    The balancer must be `disabled and inactive` before taking the snapshot. You can
    do this by connecting to a `mongos` and running `sh.stopBalancer()` and then waiting
    for any current migrations to complete. It may take a few minutes for any ongoing
    migrations to cleanly complete. When `sh.getBalancerState()` returns `false`,
    the balancer is now fully inactive and you can continue to the next step.


    #### Shards and config


    As you are taking a separate snapshot of each shard and the config server replica
    set, these snapshots are necessarily separated in time. If any write operations
    are still active in the sharded cluster, those operations may not have been flushed
    to disk when you take the snapshots. To ensure a valid and consistent backup of
    the entire sharded cluster, it is important to stop `all writes` to the cluster
    and `flush all data` to disk using the `db.fsyncLock()` method before taking any
    snapshots.


    #### Snapshot from primary


    For every `shard` in the cluster, connect to the current primary node with a Mongo
    shell connection and run `db.fsyncLock()`. Keep this connection open in a separate
    window so that we can unlock the node again easily.


    Then connect to the primary of the `config server` replica set, and run the same
    `db.fsyncLock()` command, keeping the window open.


    This step will block primaries temporarily from accepting writes from applications.
    It will appear to applications that the primary has suddenly stopped responding
    to any communication. It’s important that this should only be run during designated
    off-peak backup periods.


    Now `trigger the filesystem snapshot` via LVM or the cloud provider storage snapshot
    via the UI or API. Once the snapshot is triggered, you do not need to wait until
    it completes fully.


    We should now run `db.fsyncUnlock()` on the config server first and then all shards,
    in the reverse order that we locked.'
  raw: '### Restore performance


    It’s important to test, measure, and optimize restore performance as part of any
    disaster planning. To minimize any downtime, we want to keep backups physically
    close to the hosts that will be involved in any restore. When hosting on-prem,
    you will need to balance the requirement of keeping backups off-site, but close
    enough that network performance doesn’t delay data downloading.


    #### Shard size


    One reason that the recommended maximum shard size is 2TB is because after this
    point restoring data hits the capacity limits of most networks. For example, if
    we attempt to replace a single 8TB node via a gigabit connection (in reality ~100
    MB per second), this would take approximately 23 hours just for the data transfer
    time.


    #### Cloud hosting


    The major cloud providers all include a low-cost, long-term file storage solution
    suitable for storing large MongoDB backups. They generally do not publish benchmarks
    let alone guarantees for storage transfer speeds. Restore times will depend on
    the network in between, with compute instances in the same AZ and region being
    much faster than transferring to a private data center. Remember that restoring
    data from cloud storage will also incur bandwidth charges.


    #### Media types


    As we covered in Chapter [1](#487346_1_En_1_Chapter.xhtml), different media will
    have drastically different throughput rates. Simply copying or downloading large
    data files will not be highly dependent on seek times, so a spinning disk might
    not be drastically slower than an SSD. But when restoring via `mongorestore` and
    building indexes, the lower seek times of SSD could drastically reduce the overall
    restore time.


    #### Compression


    When restoring from a `mongodump` , the documents are stored in BSON format already
    and can be compressed on disk to reduce storage requirements by using the `--gzip`
    and `--archive` options. When restoring, there will be considerable CPU cycles
    required for decompression.


    #### Index rebuilding


    The associated `.metadata.json` file contains collection options and index definitions,
    and for each collection, the indexes will be rebuilt. Depending on the number
    and complexity of indexes, the distribution of field values, and the amount of
    RAM available, the index build stage could take as long or longer than the entire
    data writing stage.


    ## Sharded clusters


    Sharded clusters are much harder to consistently back up than replica sets because
    there are multiple primaries each performing writes, and which might be under
    various degrees of load. The secondaries will likely suffer from these same workload
    disparities. Figure [9-2](#487346_1_En_9_Chapter.xhtml#Fig2) shows a global sharded
    cluster with individual backups for each shard being stored in the same region,
    but with the config servers data backed up to the *Americas* data center.


    ![../images/487346_1_En_9_Chapter/487346_1_En_9_Fig2_HTML.jpg](images/487346_1_En_9_Chapter/487346_1_En_9_Fig2_HTML.jpg)


    Figure 9-2


    A sharded cluster being backed up for GDPR compliance


    ### Replication lag


    In the example above, a secondary from Shard A may be lagging its replication
    by 90 seconds due to a huge load, while Shard B secondaries are only 1 second
    behind their respective primaries.


    Taking a backup from differently lagging secondaries would cause different amounts
    of acknowledged (but not replicated) writes to be missed in the backup. But backing
    up from primaries requires locking which would block writes and is also not acceptable
    in production.


    ### Config servers


    The config servers also need to be backed up. They contain the metadata about
    which shard should contain documents in a particular shard key range. This configuration
    needs to be restored also, so a three-shard cluster can only really be restored
    back into a three-shard cluster, unless a single unified `mongodump` has been
    performed through a `mongos`.


    ### Pending chunk migrations


    At the same time, there may be chunk migrations between the replica sets as part
    of shard balancing operations. A chunk of documents may exist on both the donor
    and recipient shards during migration, only to be cleaned off the donor shard
    later.


    To ensure sharded clusters back up consistently, we need to both stop all balancing
    migrations and lock the config server primary and the primary from each shard
    to flush all writes to disk before taking filesystem-level copies or LVM snapshots.


    Remember that if you want to snapshot from secondaries, you could temporarily
    pause the application’s writes for a few seconds to allow secondaries to catch
    up before snapshotting. Both options will require the application to pause writes
    for a short period.


    ### Geographic sharding


    Each shard replica set may exist inside a geopolitical container which limits
    the transfer of data, including those being kept in encrypted backups. In order
    to avoid violating GDPR or other data protection regulations, we need to keep
    customer data in the same region. This has a positive benefit in that it reduces
    latency and likely increases throughput at restore time.


    The only concern is that metadata from the config server chunk boundaries may
    leak into the config backups. For safety, it’s best to store config server backups
    in the country with the most rigorous regulations.


    ### Backup steps for snapshots


    We will now walk through the backup details to fully understand the complexity
    that is involved. To take a consistent snapshot of a sharded cluster, the following
    steps must be followed.


    #### Stop background operations


    The balancer must be **disabled and inactive** before taking the snapshot. You
    can do this by connecting to a `mongos` and running `sh.stopBalancer()` and then
    waiting for any current migrations to complete. It may take a few minutes for
    any ongoing migrations to cleanly complete. When `sh.getBalancerState()` returns
    `false`, the balancer is now fully inactive and you can continue to the next step.


    #### Shards and config


    As you are taking a separate snapshot of each shard and the config server replica
    set, these snapshots are necessarily separated in time. If any write operations
    are still active in the sharded cluster, those operations may not have been flushed
    to disk when you take the snapshots. To ensure a valid and consistent backup of
    the entire sharded cluster, it is important to stop **all writes** to the cluster
    and **flush all data** to disk using the `db.fsyncLock()` method before taking
    any snapshots.


    #### Snapshot from primary


    For every **shard** in the cluster, connect to the current primary node with a
    Mongo shell connection and run `db.fsyncLock().` Keep this connection open in
    a separate window so that we can unlock the node again easily.


    Then connect to the primary of the **config server** replica set, and run the
    same `db.fsyncLock()` command, keeping the window open.


    This step will block primaries temporarily from accepting writes from applications.
    It will appear to applications that the primary has suddenly stopped responding
    to any communication. It’s important that this should only be run during designated
    off-peak backup periods.


    Now **trigger the filesystem** **snapshot** via LVM or the cloud provider storage
    snapshot via the UI or API. Once the snapshot is triggered, you do not need to
    wait until it completes fully.


    We should now run `db.fsyncUnlock()` on the config server first and then all shards,
    in the reverse order that we locked.'
  trans: '## 恢复性能


    作为任何灾难恢复计划的一部分，测试、衡量和优化恢复性能至关重要。为了最大程度地减少停机时间，我们希望将备份物理上靠近参与恢复的主机。如果是在本地托管，您需要平衡将备份保存在异地的要求，同时又要确保网络性能不会因数据下载而延迟，所以备份不能离得太远。


    ### 分片大小


    推荐的最大分片大小为 2TB，原因之一是超过这个大小后，恢复数据就会达到大多数网络的容量极限。例如，如果我们尝试通过千兆连接（实际速度约为每秒 100 MB）替换单个
    8TB 节点，仅数据传输时间就大约需要 23 小时。


    ### 云托管


    主要的云提供商都提供低成本、长期的文件存储解决方案，适用于存储大型 MongoDB 备份。它们通常不会公布基准测试，更不用说保证存储传输速度了。恢复时间将取决于中间网络，在同一可用区和区域内的计算实例之间的传输速度要比传输到私有数据中心快得多。请记住，从云存储恢复数据也会产生带宽费用。


    ### 媒介类型


    正如我们在 第 1 章 中介绍的，不同的媒介会有截然不同的吞吐率。简单地复制或下载大型数据文件不会高度依赖寻道时间，因此机械硬盘可能不会比 SSD 慢很多。但是当通过
    `mongorestore` 恢复并构建索引时，SSD 更低的寻道时间可以显著减少整体恢复时间。


    ### 压缩


    从 `mongodump` 恢复时，文档已经以 BSON 格式存储，并且可以使用 `--gzip` 和 `--archive` 选项在磁盘上进行压缩以减少存储需求。恢复时，解压缩将需要相当多的
    CPU 周期。


    ### 索引重建


    关联的 `.metadata.json` 文件包含集合选项和索引定义，并且将为每个集合重建索引。根据索引的数量和复杂性、字段值的分布以及可用的 RAM 量，索引构建阶段可能与整个数据写入阶段一样长，甚至更长。


    ## 分片集群


    分片集群比副本集更难进行一致的备份，因为有多个主节点（primary）在执行写入，并且它们可能处于不同程度的负载下。从节点（secondary）也很可能受到这些相同的工作负载差异影响。图
    9-2 展示了一个全局分片集群，其中每个分片的独立备份存储在同一区域，但配置服务器的数据则备份到 *美洲* 数据中心。


    ![../images/487346_1_En_9_Chapter/487346_1_En_9_Fig2_HTML.jpg](img/487346_1_En_9_Fig2_HTML.jpg)


    **图 9-2**

    为满足 GDPR 合规性而进行备份的分片集群


    ### 复制延迟


    在上面的示例中，分片 A 的某个从节点可能因负载过高而复制延迟了 90 秒，而分片 B 的从节点可能仅落后其各自的主节点 1 秒。


    从具有不同延迟的从节点进行备份，会导致备份中遗漏不同数量的已确认（但未复制）的写入。但是，从主节点进行备份需要加锁，这会阻塞写入，在生产环境中也是不可接受的。


    ### 配置服务器


    配置服务器也需要备份。它们包含关于哪个分片应包含特定分片键范围内的文档的元数据。此配置也需要恢复，因此一个三分片的集群只能真正恢复回一个三分片的集群，除非已经通过
    `mongos` 执行了单一的统一 `mongodump`。


    ### 待处理的分块迁移


    同时，作为分片平衡操作的一部分，副本集之间可能正在进行分块（chunk）迁移。在迁移期间，一个分块的文档可能同时存在于源分片（donor）和目标分片（recipient）上，之后才会从源分片上清除。


    为确保分片集群备份的一致性，我们需要同时停止所有平衡迁移，并在进行文件系统级复制或 LVM 快照之前，锁定配置服务器的主节点以及每个分片的主节点，以将所有写入刷新到磁盘。


    请记住，如果您想从从节点进行快照，可以暂时暂停应用程序的写入几秒钟，让从节点追上，然后再进行快照。两种选项都需要应用程序短时间暂停写入。


    ### 地理分片


    每个分片副本集可能存在于一个地缘政治容器内，该容器限制了数据的传输，包括那些保存在加密备份中的数据。为避免违反 GDPR 或其他数据保护法规，我们需要将客户数据保存在同一区域。这有一个积极的好处，即减少延迟，并可能在恢复时提高吞吐量。


    唯一需要担心的是，来自配置服务器分块边界的元数据可能会泄露到配置备份中。为安全起见，最好将配置服务器备份存储在法规最严格的国家/地区。


    ### 快照备份步骤


    现在，我们将详细介绍备份过程，以充分理解其中涉及的复杂性。要获取分片集群的一致快照，必须遵循以下步骤。


    #### 停止后台操作


    在拍摄快照之前，必须将平衡器（balancer）`禁用并停用`。您可以通过连接到 `mongos` 并运行 `sh.stopBalancer()`，然后等待任何当前迁移完成来实现此目的。任何正在进行的迁移可能需要几分钟才能干净地完成。当
    `sh.getBalancerState()` 返回 `false` 时，平衡器即完全停用，您可以继续下一步。


    #### 分片和配置服务器


    由于您需要对每个分片和配置服务器副本集分别拍摄快照，这些快照在时间上必然是分开的。如果您拍摄快照时分片集群中仍有任何写入操作处于活动状态，这些操作可能尚未刷新到磁盘。为确保整个分片集群的有效和一致备份，在拍摄任何快照之前，必须停止对集群的
    `所有写入`，并使用 `db.fsyncLock()` 方法将 `所有数据刷新` 到磁盘。


    #### 从主节点拍摄快照


    对于集群中的每个 `分片`，使用 Mongo shell 连接到当前的主节点，并运行 `db.fsyncLock()`。在一个单独的窗口中保持此连接打开，以便我们可以轻松地再次解锁该节点。


    然后，连接到 `配置服务器` 副本集的主节点，并运行相同的 `db.fsyncLock()` 命令，保持该窗口打开。


    此操作将暂时阻止主节点接受来自应用程序的写入。对于应用程序来说，主机会表现为突然停止响应任何通信。重要的是，此操作应仅在指定的非高峰备份时段运行。


    现在，通过 LVM 或云提供商存储快照的用户界面或 API `触发文件系统快照`。一旦触发了快照，您无需等待它完全完成。


    我们现在应该先在配置服务器上运行 `db.fsyncUnlock()`，然后在所有分片上运行，顺序与我们锁定时相反。'
- fmt: '#### Snapshot from secondary


    If you want to avoid blocking applications from writing even for a few seconds,
    you could choose to instead take snapshots from secondaries.


    This option can produce an inconsistent backup because secondaries replicate asynchronously.
    Figure [9-3](#487346_1_En_9_Chapter.xhtml#Fig3) shows a cluster with Shard B being
    less loaded, and consequently it has less replication lag (5–10 seconds, vs. 80–90
    seconds on *Shard A*). First *Write 1* is performed against Shard A and acknowledged.
    Then *Write 2* is performed on Shard B. When a snapshot is taken 10 seconds later,
    the second write will be recorded in the backup, but Write 1 which happened first
    will not appear in this same backup snapshot.


    ![../images/487346_1_En_9_Chapter/487346_1_En_9_Fig3_HTML.jpg](images/487346_1_En_9_Chapter/487346_1_En_9_Fig3_HTML.jpg)


    Figure 9-3


    An inconsistent sharded cluster backup from secondaries


    Best practices are already that you use write concern `majority`. This will ensure
    that recent writes are replicated to at least one of the secondaries. You can
    connect to the current primary of each shard replica set and run `rs.printSlaveReplicationInfo()`
    to set a report of how many seconds each secondary is behind in replication. By
    choosing a time of day with very little write activity on the cluster, when the
    secondaries are able to replicate immediately, you are more likely to get consistent
    snapshot of the entire cluster.


    The procedure for secondaries is almost the same as earlier for primaries. Lock
    the shard secondaries instead, but still the config server primary, and then unlock
    them in the reverse order.


    #### Restore normal operations


    Now that all snapshots are complete and all nodes are unlocked, you can re-enable
    the balancer again by connecting to any `mongos` and running `sh.setBalancerState(true)`.


    ### Restore steps from snapshots


    Restoring a sharded cluster from filesystem snapshot manually is also a complex
    procedure. The key points for the restore phase are as follows.


    #### Shut down the cluster


    Since we will be replacing the data files on disk from a restored version, it’s
    important to fully shut down all `mongod` and `mongos` instances for the shards
    and config server replica sets.


    #### Restore the config server


    Restore the config server replica set snapshot first. This will differ depending
    on what kind of LVM or cloud configuration was used to make the snapshot. Normally
    you would mount the snapshot in a temporary mount point and then copy over the
    datafile replacing the files in the existing `dbPath`.


    Then start one config server node as a standalone, by commenting out the `replSetName`
    and `clusterRole` from the configuration file.


    Once that node is up, connect to it with the Mongo shell and drop the local database
    since this contains instance-specific data from the original node:


    ```

    use local

    db.dropDatabase()

    ```


    When restoring over the top of the same cluster with same hostnames and node ports,
    no configuration changes are required. But if you are restoring into different
    hosts as part of a test, or to “lift and shift” an existing cluster, you will
    need to update the hostnames in the `config.shards` collection. It’s important
    to follow the documentation carefully to get this correct.


    It’s now time to restart the config server replica set, starting with one node.
    First, shut down the `mongod` we started as standalone. Revert the `replSetName`
    and `clusterRole` settings by uncommenting those lines.


    We effectively removed replica set config when dropping the `local` database.
    We should now initialize the replica set with


    ```

    rs.initiate()

    ```


    This creates a replica set with one member.


    Now we can wipe the `dbPath` and start up the other config server nodes. We then
    add them into the set by using `rs.add(...)` on the already open Mongo shell connection:


    ```

    rs.add("config2.bigDB.bigcorp.local:27019")

    rs.add("config3.bigDB.bigcorp.local:27019")

    ```


    They will then make a copy of the restored data via an initial sync.


    #### Restore the shards


    We now need to restore each shard’s replica set. We follow the same steps as when
    restoring the config server set, except that in addition to dropping the local
    database, we need to create a temporary admin user to clean up some other metadata.
    We restart the `mongod` as a single-node replica set and add any additional members,
    allowing them to initial sync the data from the shard. Detailed steps are documented
    in the *Restore a Sharded Cluster*^([^(10)](#fn10)) online documentation.


    #### Restore the mongos routers


    Finally, start your `mongos` nodes and the newly restored sharded cluster should
    be ready to use.


    ### Conclusion


    Sharded cluster backups are complex but can be achieved with open source tooling.
    Human error is always a risk, so it’s always better to develop playbooks or scripts
    which automate the process as much as possible. Both backup and restores should
    be tested on a regular basis to ensure that the system is working as expected
    and so that restores can be completed as quickly as possible should the need ever
    arise.


    ## Ops/Cloud Manager


    A much better approach to any of the preceding manual or custom solutions is to
    use the backup solutions built by MongoDB Inc. MongoDB Enterprise licenses include
    the possibility to use Ops Manager or Cloud Manager. The Cloud Manager backup
    service can also be bought separately. Both tools perform automated backups and
    support features including scheduled snapshots, point-in-time restores, and queryable
    backups. For replica sets, you can restore to any chosen point of time in the
    last 12–24 hours (depending on your chosen configuration) or use one of the daily,
    weekly, or monthly snapshots.


    ### Point-in-time restores


    This feature fully supports sharded clusters too. The backup system injects synchronized
    time markers into the backups of each replica set, allowing you to perform a consistent
    sharded cluster restore to a 15-minute granularity.


    Newer versions of MongoDB and Ops/Cloud Manager leverage the native snapshotting
    ability of the WiredTiger storage engine and can save these snapshots into a S3-compatible
    block store. A copy of the oplog still needs to be kept in order to fill in the
    gap from the last snapshot until the exact time desired for the restore.


    ### Other features


    Even if you have a geopolitical sharded cluster, Ops Manager lets you back up
    each shard to a different location to ensure compliance as customer data never
    leaves its country of origin.


    You can also launch a temporary cluster from a backup to perform partial restores.
    Queryable backups support ad hoc queries and export subsets of a point-in-time
    snapshot of the cluster. This makes it easy to restore a single collection or
    document.


    Ops Manager gives a fast, cost-effective, and powerful restore mechanism which
    covers all major use cases and can be achieved with just a few steps in the UI.'
