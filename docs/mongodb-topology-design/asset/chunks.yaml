  trans: '

    ### 读取与延迟


    当组件部署在多个物理位置时，数据中心间的延迟可能成为性能的主要问题。我们首先希望尽可能保持容错能力，其次希望通过低延迟数据流实现高吞吐量，但第三，我们不希望因为整个组件在系统健康状态下利用率不足而浪费计算资源。


    警告


    反对在有效备用状态下不预留任何资源的论点是，当任何一个组件发生故障时，性能将会下降。


    在构建包含许多承载数据的辅助节点的副本集时，某些用例下从辅助节点读取会成为一个理想的选择。


    让我们想象一下图 5-8 中所示的 PSSSA（主节点、3 个辅助节点和仲裁节点）部署，其中有两个应用服务器处于活动状态，每个数据中心一个。


    ![../images/487346_1_En_5_Chapter/487346_1_En_5_Fig8_HTML.jpg](img/487346_1_En_5_Fig8_HTML.jpg)


    图 5-8


    一个 PS|SS|A 副本集，应用程序位于两个数据中心


    #### 最近节点偏好


    如果在连接字符串中请求了 `nearest` 偏好，应用程序（1）将从 `mongod`（1）或（2）读取，因为往返时间（RTT）分别为 2 毫秒和 3 毫秒，并且数据中心
    2（DC2）中的节点超过了延迟窗口。应用程序（2）将倾向于从 `mongod`（3）或（4）读取，除非复制延迟超过 `maxStalenessSeconds`。在这种情况下，驱动程序将选择从
    `mongod`（1）或（2）读取。如果未指定 `maxStalenessSeconds`，节点选择将只考虑 RTT 延迟。


    #### 主节点优先读取


    另一方面，如果请求的是 `primaryPreferred`，应用程序（1）和（2）都将从 `mongod`（1）读取，因为它是当前的主节点。然而，如果 `localThresholdMS`
    设置为 5 毫秒，那么位于数据中心 1（DC1）的主节点就被认为太远了，因此将选择 `mongod`（3）或（4）。


    ### 三个数据中心场景


    将承载数据的 MongoDB 节点均匀分布在至少三个数据中心的拓扑结构是最理想的情况。在图 5-9 中，我们可以看到一个在 PSS 拓扑结构中具有最佳冗余的拓扑。任何一个数据中心都可以丢失，同时应用程序使用写关注点
    `majority` 进行写入，以确保持久性分发并防止数据丢失。此外，如果随后第二个数据中心也发生故障，仍然不会丢失数据，但需要一些手动干预来强制剩余的数据承载节点接受写入。


    ![../images/487346_1_En_5_Chapter/487346_1_En_5_Fig9_HTML.jpg](img/487346_1_En_5_Fig9_HTML.jpg)


    图 5-9


    一个具有最佳冗余的 3-DC（数据中心）、3 节点拓扑


    一些架构师选择每个数据中心多个节点的拓扑，例如，一个 PS|SS|S 拓扑（见图 5-10）。在这种情况下，整个数据中心可以丢失而不影响可用性；然而，选择这种设计通常是为了允许从辅助节点读取。但这样一来，数据中心的丢失也会导致
    `性能下降`，因为响应读取请求的节点会减少。对于具有严格性能目标或当前工作负载资源不足的关键应用，这可能产生相当大的影响。


    ![../images/487346_1_En_5_Chapter/487346_1_En_5_Fig10_HTML.jpg](img/487346_1_En_5_Fig10_HTML.jpg)


    图 5-10


    一个在 3 个数据中心中采用 PS|SS|S 分片的集群


    一种更具成本效益的方法是使用整体少一个节点，而是创建三个分片，每个分片有三个承载数据的成员（图 5-11）。在单个数据中心故障时，它具有相同的冗余特性，但为我们提供了三个分片，每个分片都有一个可以接受写入的主节点。如果您选择进行辅助节点读取，总体上只有六个辅助节点，但每个节点的数据量更少，可以在其内存缓存中保留更大比例的数据，在相同的硬件配置下，提供更好的单节点性能。


    ![../images/487346_1_En_5_Chapter/487346_1_En_5_Fig11_HTML.jpg](img/487346_1_En_5_Fig11_HTML.jpg)


    图 5-11


    一个在三个数据中心中采用 P|S|S 分片的集群


    ### 负载与性能测试


    首次构建集群并准备推出新的 MongoDB 应用程序时，始终进行 `性能测试` 非常重要，以确保在小规模下能达到预期性能。在进入生产规模数据之前，您还应该进行
    `负载测试`，以确保所有组件的行为正确。本节考虑测试时可能遇到的几种常见情况。


    #### 连接过载


    任何应用程序都能正确响应响应缓慢和超时连接非常重要。如果到了分片本身无法及时处理传入操作的地步，那么连接将在 `mongos` 上堆积。默认情况下，`mongos`
    在开始拒绝来自应用程序的新连接之前，最多允许 `64k` 个连接。请注意，每 `1k` 个连接在开销上几乎需要 `1GB` 的 RAM。因此，如果您在资源有限的虚拟机（VM）上运行
    `mongos`，您很可能会更早达到此限制。在大多数 Linux 变体上运行时，内存不足杀手（OOM Killer）将激活并终止占用驻留内存最多的进程。在具有许多
    `mongos` 的生产系统中，应用程序将继续将请求路由到幸存的 `mongos`，这些 `mongos` 现在可能负载更重，从而导致级联效应。


    #### 超时


    大多数 MongoDB 驱动程序包含一个选项，可在查询操作上设置 `maxTime` 或 `maxTimeMS`。这允许应用程序对任何操作设置服务器端时间限制，例如，`3000`
    表示 3 秒限制。此值与初始请求一起传递到服务器，服务器端的计时器将在该时间后自动终止未完成的操作并干净地释放服务器资源。这对于在意外负载或网络不稳定的情况下避免使用过多的服务器资源非常有用。如果应用程序由于某种原因断开连接，或者连接由于非常长的查询而超时，我们可以确信它对服务器资源的影响将是有限的。


    另一方面，设置非常低的连接超时可能会产生相反的效果。想象一下，客户端在连接上设置了 3 秒超时，但正在请求一个需要 5 秒才能完成的复杂聚合管道。如果应用程序的连接在
    3 秒后自动关闭并重试，服务器将花费 2 秒完成第一个管道，同时，由于客户端重新请求，它将重新启动相同的管道。这有两个负面影响：服务器的额外负载，以及应用程序持续尝试重试繁重操作可能导致潜在的无限循环。


    #### 应用程序退避逻辑


    解决应用程序导致服务器过载的方法是在应用程序中添加 `退避逻辑`。本质上，应用程序应该能够检测服务器是否负载过重并减慢操作速度。一种方法是使用递增的暂停间隔。在初始失败后，应用程序等待
    1 秒再重试。如果再次失败，它可以等待两倍的时间再尝试。这使得应用程序能够自动尝试，而不会对自己的数据库服务器执行“拒绝服务”攻击。

    '
- fmt: '# Retryable writes and reads


    In MongoDB 3.6, drivers gained the ability to retry writes and reads **once**
    in case of certain failures (such as a transient network issue or a replica set
    primary failover). This gives stability improvements from the application perspective,
    without the risk of overloading the server.


    Retryable writes was made the default behavior in drivers designed for MongoDB
    4.2 and later and can be controlled with the Connection URI options of `retryWrites`
    and `retryReads`.


    # Degraded testing


    When you start having multiple data centers or larger clusters, the possibility
    of network issues increases dramatically. With multiple network switches and Internet
    backbones, there are many points of failure. Since the TCP layer adds automatic
    retries of packets and routing around failures, it''s often possible that complete
    routing failures can be avoided, but then performance will be severely affected.


    It''s important to be able to simulate such degraded networks when building a
    cluster to properly test failover handling and to ensure that all components in
    the MongoDB cluster are sufficiently provisioned and configured to deal with such
    events elegantly.


    ## Network saturation


    You may have a situation where some other workload on the network is enough to
    saturate a certain switch, which causes extreme packet delays for a certain subnet
    and a few nodes out of a sharded cluster. If the affected nodes are hosting secondaries,
    even regular periods of degradation may not be evident.


    However, let’s imagine an election has taken place due to planned maintenance
    on the current primary’s host and one of the affected nodes becomes the new primary.
    Now a shard primary is affected by this network saturation, and suddenly connections
    are failing with socket timeouts. How do we diagnose and fix such situations?


    ### Diagnosis


    Here, we''ll mention a few approaches and tools that can be useful:


    ```

    ping

    ```


    This common tool can be very useful for confirming that a hostname used in a replica
    set configuration actually resolves to the expected IP address and has a valid
    route. This can be particularly problematic in mixed on-prem and cloud data centers
    connected via a virtual private cloud (VPC).


    ```

    netstat -s

    ```


    This command outputs a summary of key networking metrics from the perspective
    of this host, including historical information about total number of packets sent
    and how many packets have been delayed or lost.


    If packet loss is observed, the next step is to identify where the packet loss
    begins to occur. `traceroute` (Linux) or `tracert` (Windows) can be used to check
    each hop along the path to the destination.


    ```

    tcpdump -i any -w /tmp/out.file

    ```


    This is a common packet analyzer that can also capture all TCP packets being transmitted
    or received over a network, with optional filtering by port or remote host IP.
    Once captured, data can be visualized in `Wireshark` to follow the flow and debug
    issues such as TLS handshakes or unexpectedly dropped connections.


    ```

    iftop

    ```


    Similar to `top` and `iotop`, this tool shows a summary of current network traffic
    grouped by remote host. This can be very useful to monitor actual peak bandwidth
    during an initial sync or to monitor replication traffic.


    ### iPerf3


    `iPerf3` is a cross-platform tool for measuring the maximum achievable bandwidth
    on IP networks. It can be used to simulate realistic MongoDB traffic with multiple
    simultaneous connections, running for a set time with periodic reporting output.


    For example, the following commands set up a client and server and runs a bidirectional
    test with 50k TCP packets and 15 parallel streams, measuring bandwidth in both
    directions.


    Server: `iperf3 -s -f K`


    Client: `iperf3 -c <server IP> -f K -w 50K -R -P 15 --get-server-output`


    ## Common causes of packet loss


    Packet loss on a network can occur for a variety of reasons. If you’re experiencing
    packet loss, the following sections describe some possible problems that you can
    look for.


    ### Link congestion


    This can occur when too much traffic is being pushed through a saturated network
    (or a single switch) with the result that some packets may be dropped.


    If it''s not possible to reduce network pressure by introducing more efficient
    queries, do less shard balancing, or change write patterns to reduce the oplog.


    In reality, however, increasing bandwidth is the fastest and most cost-effective
    approach.


    ### Faulty protocol configuration


    Occasionally, a maximum transmission unit (MTU) or duplex mismatch on two network
    devices in the transfer path can result in collisions and ultimately packet loss
    on the link.


    A duplex mismatch can often be recognized because it causes asymmetric packet
    loss (i.e., in only one direction) and because the packet loss is consistent.
    In most cases with modern hardware, enabling duplex autonegotiation will resolve
    the mismatch.


    ### Incorrect firewall configuration


    An incorrectly configured firewall can remain undetected until an election occurs.
    Imagine a secondary node that is able to replicate from a certain host when the
    primary is in the same subnet, but when an election causes a different host to
    become primary, a misconfigured firewall rule causes all incoming packets to be
    dropped. Since all nodes will continuously attempt to send health check pings,
    you should already see warnings in the logs.


    **Note**

    Any warnings in MongoDB logs should be taken seriously and rectified as soon as
    possible. While they may not seem to be having any negative effects, it may indicate
    a source of downtime should the state of the cluster change.


    ### Faulty hardware or software


    There are a number of other uncommon cases that can cause sudden drops in network
    performance, such as overheating switches, faulty cables, and so on. Network switches
    have their own processors and have been known to contain software bugs which cause
    packet handling or routing to fail during certain edge cases.


    In other cases, malware which has infected machines inside the network can cause
    sudden spikes in traffic which impacts normal MongoDB traffic much like an internal
    denial-of-service (DoS) attack.


    # Troubleshooting tips


    This section introduces a few tips when planning a complex deployment to make
    troubleshooting and maintenance easier as components are added over time.


    ## Ports


    When building out even a relatively simple sharded cluster, there are many different
    types of components that will be running, including config servers, `mongos` routers,
    and shard `mongod` nodes. Even when running each component on its own VM and unique
    hostname, it is strongly recommended to use a standardized port numbering schema
    across the organization as shown in Table 5-3. This allows system administrators,
    DBAs, and any third-party monitoring or support tools to quickly identify the
    role of each node.


    **Table 5-3**

    An example allocation of ports based on role of components


    | Component | Process name | Port |

    | --- | --- | --- |

    | Config server | `mongod` | 27019 |

    | Standalone node | `mongod` | 27016 |

    | Shard node, or replica set member | `mongod` | 27018 |

    | Shard router | `mongos` | 27017 |


    If there is an error message in a log or reported via the driver to the application,
    we can see quickly if it''s related to a config server or a shard node by its
    port number alone.'
