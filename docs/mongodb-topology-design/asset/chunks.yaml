- fmt: '### Pseudonymization


    `Pseudonymized data` is any data that has been obfuscated with original values
    maintained in a separate lookup table, allowing values to be restored to its original
    state and for individuals to be reidentified.


    By contrast, `anonymized data` randomly substitutes values with realistic and
    similar data of the same type but without any correlations, meaning that data
    can never be restored to its original state.


    Pseudonymization is an issue in, for example, patient-related data that has to
    be passed on securely between clinical centers, each with separate databases.
    Certain regulations require special handling of pseudonymized data, whereas fully
    anonymized data is usually exempt from data protection regulations.


    In MongoDB, it’s possible to use `Views` (based on an `aggregation pipeline`)
    to replace all instances of an identifying unique key value (such as a social
    security number) with an artificial identifier. This still allows certain analytics
    such as grouping and cross-collection of references across an entire database
    without exposing the original value.


    When using MongoDB as a source for data analysis or analytics, another approach
    during ingestion is to replace the PII with pseudonyms at “import time” (see Figure
    [4-2](#487346_1_En_4_Chapter.xhtml#Fig2)), meaning that identifiable data is never
    inserted into the database in the first place.


    ![../images/487346_1_En_4_Chapter/487346_1_En_4_Fig2_HTML.jpg](images/487346_1_En_4_Chapter/487346_1_En_4_Fig2_HTML.jpg)

    Figure 4-2

    Sensitive data is anonymized but allows recovery


    A detailed solution to this problem will be presented in the “Views” section later
    in this chapter.


    ### Generalizing data


    Another approach to avoid storing personal data in the first place is to `generalize
    data` during insertion into the database. For example, when setting the `birthdate`
    field, record only the birth year, for `postcode` only store the first few digits,
    and zero out the others to keep general information for bucketing purposes but
    without being able to track back to original users.


    The same approach can be used when storing GPS locations. Alternatively, some
    random “noise” can be added to the value, like certain major handset vendors do
    when collecting metrics on mobile device usage. By changing the value slightly
    to a similar and still valid value, analytics can still be performed without violating
    user privacy.


    ### Encryption at rest


    Part of the generally accepted requirements for data protection is to ensure that
    data is encrypted while stored on disk so that even if files are somehow copied,
    their contents cannot be accessed.


    MongoDB allows native encryption of all data files using the WiredTiger storage
    engine. Alternatively, you could use encryption functionality provided at the
    storage layer, for example, via encrypted `LVM` (Logical Volume Manager) on Linux,
    or using AWS’s encrypted `EBS` (Elastic Block Store) volumes.


    More details about encryption options are covered in Chapter [3](#487346_1_En_3_Chapter.xhtml).


    ### Backups


    Another critical consideration for designing a compliant MongoDB cluster is how
    and where the backups will be stored. At the time of writing, the European Union’s
    `GDPR` is the strictest global regulation, so the simplest approach is to store
    all backups in Europe. This way you can automate a simple nightly `mongodump`
    for your replica set or use MongoDB’s enterprise-level `Ops Manager` tool to create
    continuous backups of your sharded cluster into special backup nodes with storage
    on servers physically located inside the European Union. MongoDB’s hosted `Atlas`
    service also allows you to choose the storage location of continuous backup data,
    to meet your particular requirements.


    As other laws come into effect such as the Personal Information Protection and
    Electronic Documents Act (`PIPEDA`) in Canada and California’s new legislation,
    it will become more difficult to meet all regulations simultaneously. Global clusters
    (explained in Chapter [6](#487346_1_En_6_Chapter.xhtml)) are a special type of
    sharded cluster where users’ data is stored close to their physical location usually
    to minimize latency. This approach also means that their data can be stored in
    the same country (or legislative zone) making it much easier to back up the data
    in compliance (see Figure [4-3](#487346_1_En_4_Chapter.xhtml#Fig3)).


    ![../images/487346_1_En_4_Chapter/487346_1_En_4_Fig3_HTML.jpg](images/487346_1_En_4_Chapter/487346_1_En_4_Fig3_HTML.jpg)

    Figure 4-3

    A sharded cluster with backups of each shard stored “locally”


    ### Regulations around the world


    The European Union’s `GDPR` is by far the most well-known and widely discussed
    data protection regulation that should concern us as database architects and administrators.
    There are many other regulations coming online which may also be of concern, depending
    on the location of your customers, your business, and your industry.


    One common factor in many of the new privacy laws is the concept that the entity
    which controls personal data must be able to legally justify the purpose of collecting
    the data in the first place. In our context, this means that we shouldn’t be collecting
    superfluous metadata that isn’t required by the service being offered.


    ### US healthcare


    The `Health Insurance Portability and Accountability Act` (`HIPAA`) is a regulation
    which targets the US healthcare data industry. The act covers genetic data which
    is sometimes impossible to depersonalize since the exact values are required for
    research but also identify the individual. In this case, encryption of the data
    with secure external keys is critical.


    ### California


    The California Consumer Privacy Act (`CCPA`) of 2018 took effect on January 1,
    2020, and covers the rights of consumers for corporations conducting business
    in the State of California and which holds data on more than 50,000 people. This
    set of regulations shares many of the same goals as `GDPR` and covers many of
    the same issues.


    Although the `CCPA` is **not** modeled after or structured the same way as the
    `GDPR`, it has all the same best practices.


    ### India


    At the time of writing, India is in the process of developing their own version
    of `GDPR` including regulations for the right to access and correct data, the
    right to portability (i.e., export one’s own data), and the right to be forgotten.
    Currently, its powers are less extreme compared to `GDPR`.


    However, the proposed law does impose strict `data localization` rules, mandating
    both the storage and processing of personal data physically inside India. This
    is in stark contrast to `GDPR` which allows temporary `transit` of data outside
    of the EU for processing as long as conditions (such as secure encrypted communication)
    are met.


    This localization requirement would be satisfied by keeping a shard reserved for
    Indian customer data with hosts in an Indian data center. This approach will be
    discussed further at the end of this chapter and in Chapter [11](#487346_1_En_11_Chapter.xhtml)
    on extreme sharding.


    If India’s law finally only requires a “mirror” copy of an entity’s personal data
    to be kept on a server physically in India, then this requirement is easily satisfied
    with a replica set node in an Indian data center.


    ### Canada


    The Personal Information Protection and Electronic Documents Act (`PIPEDA`) and
    the Privacy Act that govern Canada cover many of the same general rights as `GDPR`
    but with less specificity.


    It’s important to note, however, that many `individual provinces` in Canada have
    substantial privacy regulations of their own which are broadly similar to but
    tend to extend and further complicate the national-level regulations.'
  raw: '### Pseudonymization


    *Pseudonymized data* is any data that has been obfuscated with original values
    maintained in a separate lookup table, allowing values to be restored to its original
    state and for individuals to be reidentified.


    By contrast, *anonymized data* randomly substitutes values with realistic and
    similar data of the same type but without any correlations, meaning that data
    can never be restored to its original state.


    Pseudonymization is an issue in, for example, patient-related data that has to
    be passed on securely between clinical centers, each with separate databases.
    Certain regulations require special handling of pseudonymized data, whereas fully
    anonymized data is usually exempt from data protection regulations.


    In MongoDB, it’s possible to use Views (based on an *aggregation pipeline*) to
    replace all instances of an identifying unique key value (such as a social security
    number) with an artificial identifier. This still allows certain analytics such
    as grouping and cross-collection of references across an entire database without
    exposing the original value.


    When using MongoDB as a source for data analysis or analytics, another approach
    during ingestion is to replace the PII with pseudonyms at “import time” (see Figure
    [4-2](#487346_1_En_4_Chapter.xhtml#Fig2)), meaning that identifiable data is never
    inserted into the database in the first place.


