    #### 往返延迟


    在 MongoDB 中，与任何分布式系统一样，一个瓶颈可能是数据包在组件之间发送并获得响应所需的时间。这被称为往返时间（RTT）延迟，它会影响 MongoDB
    集群中许多组件选择路由请求的方式。


    这种延迟通常以毫秒为单位记录，并受到许多因素的限制。任何一对主机之间的物理距离（以及光速）、网络拥堵、所选的网络路径（跳数）以及沿途交换机添加的延迟都是可能增加延迟的常见因素。如果可能，应使用数据中心之间的直接专用光纤连接以尽可能减少此延迟。


    在分片集群中，应用程序通过`mongos`路由节点进行查询，因此存在两组不同的往返，如图 1-9 所示。在此示例中，我们看到应用程序[1]到同一数据中心内的`mongos`节点的延迟较低。基于此，应用程序[1]中的驱动程序将通过`mongos`[1]和`mongos`[2]分发其查询，而应用程序[2]将所有查询路由到
    DC2 中的`mongos`[3]。但是，如果`mongos`[3]发生故障，应用程序[2]将自动且立即故障转移到 DC1 中可用的`mongos`，因为它们现在代表了最佳的
    RTT。


    ![../images/487346_1_En_1_Chapter/487346_1_En_1_Fig9_HTML.jpg](img/487346_1_En_1_Fig9_HTML.jpg)


    图 1-9

    两个数据中心部署中组件之间的延迟


    第二组往返是在`mongos`实例和分片中承载数据的节点之间进行的。默认情况下，读写操作将通过主节点进行。但是，如果应用程序请求`nearest`读取偏好，那么查询将被发送到`mongod`[1]或`mongod`[2]，因为它们的
    RTT 最低，分别为 2 毫秒和 1 毫秒。


    ### 本地部署与云部署


    本书的其余部分将重点介绍客户希望构建高性能、高可用性的自管理 MongoDB 部署的情况。直到最近，大多数生产环境中的 MongoDB 部署都部署在公司自己的数据中心——即所谓的"*本地*"部署。


    现在，许多大公司发现主要的云提供商（如 AWS、Azure 和 GCP）足够稳定且具有成本效益，他们可以在云上运行虚拟机作为"*自管理云*"服务器。我们有时会比较在本地可能实现的功能与
    MongoDB 自己的称为 MongoDB Atlas 的*完全托管*解决方案。


    ### 逻辑数据库


    与大多数数据库管理系统一样，MongoDB 允许在单个物理部署上存在多个*逻辑数据库*。每个逻辑数据库可以有自己的数据集合以及拥有自定义角色和权限的用户。然而，这些数据库的数据文件仍在同一路径中，因此，对存储卷进行*LVM*（逻辑卷管理器）备份将必然同时备份所有逻辑数据库。


    在所谓的"*多租户*"设置中，单个物理 MongoDB 部署通常有许多数据库，每个数据库对应一个单独的客户。对于某些*SaaS*（软件即服务）产品，每个数据库将有许多几乎相同的小型集合，每个集合都匹配相同的模式。


    ## 关键要点


    从本章中，需要记住的关键概念如下：


    *   MongoDB 数据库使用称为 BSON 的特殊二进制 JSON 类似格式存储具有各种数据类型的结构化文档。

    *   MongoDB 部署可以是独立节点、副本集或分片集群，其中数据被分解为子集，用于扩展以处理海量数据集。

    *   MongoDB 数据库支持 ACID 合规性，即使对于分片集群上的多文档事务也是如此。

    *   复制机制健壮且异步，可处理自动故障转移。

    *   如果需要，可以调整写入和读取以优先考虑性能而非一致性。

    *   分片集合基于用户定义的分片键进行分布，并通过块迁移来保持分片平衡。

    *   MongoDB 部署可以在本地或自管理的云基础设施上实现自动化。

    *   还提供名为 Atlas 的完全托管 MongoDB 服务，以避免直接管理任何基础设施。


    # 2. 容错设计


    本章更深入地探讨 MongoDB 的容错特性，并介绍一些特殊类型的节点以及它们在生产系统中的使用方式。我们研究了现实世界系统中可能发生的常见错误以及如何减轻它们。


    > *冗余昂贵但不可或缺。*

    >

    > ——简·雅各布斯，城市学家、作家和活动家


    ## 特殊节点


    我们已经介绍了 MongoDB 部署中的标准节点类型。这些承载数据的节点通过复制机制保持数据的完整副本，并且如果当前主节点因任何原因发生故障，它们可以随时成为主节点。接下来，我们将讨论一些其他类型的节点，这些节点可以在某些特殊情况下使用。


    在 MongoDB 的早期，在健壮的生产就绪备份解决方案可用之前，以及可靠的 SSD 存储特别昂贵的时候，以下一些类型的节点在生产配置中有其合理的位置。然而，随着更便宜的硬件和更先进的功能（如多数写关注）的出现，以下一些节点现在应避免在生产部署中使用。我们将介绍历史用例和当前的替代最佳实践。


    ### 仲裁者


    仲裁者是一种 MongoDB 节点，它加入副本集的唯一角色是参与选举。它们不存储任何用户数据，但会维护副本集元数据的副本，以便知道它们应该连接到哪些成员以及如何安全地进行通信。


    这是少数仍在生产部署中定期使用的“特殊”节点类型之一，但通常仅在可用的不同数据中心少于三个时才需要。这将在关于*基础*和*全局*拓扑的第 5 章和第 6 章中进一步讨论。一些拥有两个数据中心的客户会将单个仲裁者放置在云实例中，因为他们的数据保护策略不允许将用户数据存储在云中。


    在图 2-1 中，我们看到复制发生在数据中心 1 和 2 之间，但只与驻留在云中的仲裁者节点进行健康“ping”通信。


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig1_HTML.jpg](img/487346_1_En_2_Fig1_HTML.jpg)


    图 2-1

    带有仲裁者的双数据中心架构'
- fmt: '## Hidden secondary


    Hidden members are a type of data-bearing node which replicate normally, but are
    reserved for special workloads such as analytics or data dumps. They can be configured
    with different indexes and often have different system resources allocated. Hidden
    nodes can *never become primary* and are *hidden from the client application*
    (and `mongos` routers) even for secondary reads.


    Applications can connect to these nodes directly for performing aggregation or
    analytic queries, but should never write to them. Since they replicate from the
    primary, they may return stale data.


    ## Delayed secondary


    Delayed members are a type of hidden member, with a replication delay applied.


    Note


    Before Ops/Cloud Manager introduced *queryable backups* , these nodes were used
    to add a level of protection against user error.


    Imagine your replica set had an additional node with a 2-hour delay to its replication.
    In effect, it has a complete copy of the database from 2 hours ago. Now if a database
    administrator, or application, accidentally deletes or corrupts a complete collection
    of data, you have a “live backup” available. With some quick human intervention,
    the application could be pointed to this node, and you’ve lost only some recent
    changes. This is a worst-case scenario in production as there are a number of
    issues as seen in the following steps:


    1. You need to discover, decide, and react to the data loss within the 2-hour
    window.

    2. After converting the delayed member to primary, you have lost two hours of
    other changes.

    3. Your application suddenly has a single copy of data if you choose to wipe the
    other nodes and start an initial sync from this solo node.

    4. The new primary is now serving the application and is at the same time the
    sync source for multiple replications, and so will be significantly loaded.

    5. There is likely to be a significant performance impact on the application and
    end user during recovery.


    In Figure [2-2](#487346_1_En_2_Chapter.xhtml#Fig2) (left), we see that a forth
    hidden node replicates with a delay. In case of corruption (right), the delayed
    node has been converted to a primary, and the other nodes are syncing themselves
    from this 2-hour old data.


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig2_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    Replica set with a delayed hidden member


    ### Partial restores


    In cases where only some data has been lost, or even an entire collection has
    been dropped, you could use the delayed member as a clean source. You could dump
    the collection and restore it back into the replica set. Or you could connect
    directly to the hidden member and perform a query to retrieve a single document
    or value.


    Note


    Hidden nodes should always be added *in addition* to a topology designed for optimal
    failover. Since they are delayed, they can’t participate in majority write acknowledgment
    and they can''t become primary.


    ## Nonvoting secondary


    A nonvoting member in a MongoDB replica set has 0 votes but must also have a priority
    of 0 (meaning it cannot itself become a primary). Replica sets can have at most
    7 voting members (to keep the election process as streamlined as possible). Some
    use cases, however, rely heavily on read operations and don’t mind about reading
    slightly stale data. For such replica sets, the system could scale horizontally
    by adding more nonvoting secondary nodes.


    Note


    Secondary reads are not appropriate for most workloads when either (i) data changes
    frequently or (ii) reading the latest acknowledged data is required.


    As shown in Figure [2-3](#487346_1_En_2_Chapter.xhtml#Fig3), you can have a large
    geographically distributed replica set with an even number of nodes in total by
    using nonvoting secondaries (as long as the number of voting nodes is odd). *Replication*
    *chaining* will be used to replicate from fellow secondaries rather than all nodes
    replicating directly from the primary. This chaining relieves memory and I/O pressure
    on the primary node, but secondaries will likely suffer significant replication
    lag. An application reading from secondaries will experience stale reads so this
    much be supported by the use case.


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig3_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig3_HTML.jpg)


    Figure 2-3


    A replica set with many secondaries for scaling reads


    In Table [2-1](#487346_1_En_2_Chapter.xhtml#Tab1) we can see an overview of all
    the node types discussed in this chapter.


    Table 2-1


    A summary of different node types


    | Type | Settings | Comments |

    | --- | --- | --- |

    | Standard | `{votes: 1, priority: 1}` | Contains data, can vote, and can become
    primary. |

    | Arbiter | `{votes: 1, priority: 0}` | No data so can’t become primary, but can
    vote. Not available on Atlas. |

    | Hidden | `{votes: 1, priority: 0, hidden: true}` | Contains data, can vote,
    but can’t become primary. Invisible to the client and `mongos` even for secondary
    reads. |

    | Delayed | `{votes: 1, priority: 0, hidden: true, slaveDelay: 3600}` | A special
    type of hidden node with delayed replication. It can help elect a primary, but
    since it doesn’t have the latest data, *cannot become primary*. Not useful in
    sharded clusters, and not available on Atlas. |

    | Nonvoting | `{votes: 0, priority: 0}` | This node replicates data, but doesn’t
    vote nor can it become primary. Useful to ensure an odd number of voting nodes.
    |


    ## Avoiding failure


    Any complex system is only as robust as its points of failure. Eventually every
    component in a system will break down, require an upgrade, a restart, or need
    to be physically relocated. If the component is the only one of its kind, it is
    known as a *single point of failure,* or *SPOF* . When it fails, it will break
    down the entire interdependence of components, leading to application downtime.


    To avoid these types of failures, you should have multiple applications running
    behind a load balancer, on different physical machines and preferably in different
    data centers. The Domain Name System (DNS) lookup should have multiple nameservers,
    so that even Internet-level faults should not prevent your users reaching your
    application server.


    When it comes to your MongoDB database, we recommend following the same principle
    with a replica set with three data-bearing members. This is the minimum to provide
    both high availability and majority write concerns so that a single node can be
    lost completely with not only no data loss, but no downtime nor any performance
    impact whatsoever.


    ### Points of failure


    Some common points of failure include


    *   Data centers (electricity outage, network infrastructure, fire, etc.)

    *   Physical servers (power supplies, CPUs, storage devices, etc.)

    *   Software (virtual machine [VM] hosts, operating system crashes)


    The risk from some of these points can be greatly reduced with internally redundant
    systems, such as multiple power supplies, RAID-10 storage with hot-swappable drives,
    multiple network interface cards, and data centers with backup power and multiple
    Internet backbones. Automating and testing any failover mechanisms is critical
    to minimize the downtime and, in an ideal world, avoid it completely.'
