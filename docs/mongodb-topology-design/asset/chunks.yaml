    I dedicate this book to my father David who was a pioneer in relational databases
    and founder of Retek. He inspired me to build and experiment and encouraged me
    to pursue a career in information technology and databases.


    Acknowledgments


    I need to send a special thanks to my wife Sophie, daughter Lucie, and son James
    for their constant support and unending patience during the evenings and weekends
    while I wrote this book.


    I also wish to thank my colleagues Wes, Idan, and Clare for additional proofreading
    and feedback and to all my fellow engineers at MongoDB for creating such amazing
    products.


    About the Author About the Technical Reviewer


    # 1. Core Concepts


    For those coming from the world of traditional relational database management
    systems or even enterprise-level Microsoft SQL Server or Oracle, MongoDB presents
    an innovative way of thinking about scaling and availability. This chapter introduces
    all the core concepts of MongoDB deployments and explains how MongoDB nodes achieve
    high-availability, low-latency replication, and handle unexpected infrastructure
    failures.


    > Redundancy is ambiguous because it seems like a waste if nothing unusual happens.
    Except that something unusual happens-usually.

    > —Nassim Nicholas Taleb, scholar, risk analyst, and author of `The Black Swan`


    ## Key features of MongoDB


    Storing structured data has been an issue since the dawn of the computer age.
    Initially kept in delimited files, eventually stored in predefined data tables,
    but more recently a new age of databases has appeared which record data in key/value
    stores, graphs, and complex multilevel documents. None of these relative newcomers
    is any less “relational” than the old SQL solutions. MongoDB allows developers
    to represent relationships, but in a much more intuitive and flexible way with
    `structured documents` .


    The other advantage of MongoDB is that it is built to be efficient, scalable,
    and redundant at its core. By running on commodity hardware, enterprises can build
    powerful “Big Data” solutions on their own data centers and easily scale them
    up as the application grows and evolves.


    Now that high-capacity, low-latency storage is relatively cheap, the entire paradigm
    of database design has changed. SQL database design focused on keeping databases
    as small as possible using `normalization` , but this could have huge costs at
    read time when it was necessary to `join` data back together into logical blocks.
    By storing related data together in a single document, more disk space may be
    required, but read performance is extremely optimized with no need for any “joins”
    or other processing at read time.


    MongoDB has been designed for high availability with its distributed architecture
    while still maintaining durable and consistent changes. In production deployments,
    there will be multiple MongoDB `nodes` each with a complete copy of the data that
    is kept in sync via `replication` . MongoDB uses a variation of the master/slave
    paradigm in that one member of a `replica set` is designated the `primary` and
    is responsible for acknowledging any write operations, and the others are `secondaries`
    and maintain a copy of the data. These secondaries are a sort of `disaster recovery`
    standby and will take over the role of primary should it become unavailable. Architecture
    choices will be discussed in detail in future chapters on topologies and sharding.


    ## Differences to “traditional databases”


    Traditional databases like Oracle, MySQL, or Microsoft SQL Server use a tabular
    paradigm for storing data – much like a spreadsheet. They require system architects
    or developers to decompose logical objects of data into multiple tables requiring
    both additional complexity for software development and also additional I/O when
    writing changes to many different locations on the storage device.


    ### Terminology


    While many concepts like queries, indexes, and transactions are very similar,
    Table 1-1 presents the key terminology and differences between traditional SQL
    databases and MongoDB.


    Table 1-1


    A comparison between common SQL and MongoDB terms


    | SQL | MongoDB | Notes |

    | --- | --- | --- |

    | `Table` | `Collection` | Contains documents sharing a similar entity type, but
    not necessarily the exact same set of fields. |

    | `Row` | `Document` | An entity with a unique ID field and other data fields.
    |

    | `Column` | `Field` | Not all documents must have the same fields. Fields can
    be added to individual documents without rebuilding any data files. Fields can
    have many data types, including nested arrays of subdocuments. |

    | `Index` | `Index` | MongoDB also supports secondary, partial, sparse, geospatial,
    case-insensitive, and compound indexes. |

    | `Query` | `Query` | MongoDB queries are defined as documents. |

    | `View` | `View` | MongoDB supports read-only views and in MongoDB 4.2+ also
    on-demand materialized views. |

    | `Transaction` | `Transaction` | MongoDB 4.2+ supports multidocument transactions
    in sharded deployments. |

    | `Master/slave` | `Primary/secondary` | Unlike many systems, the role of primary
    and secondary is fluid and react automatically during maintenance and network
    failures. |

    | `Replication` | `Replication` | MongoDB uses logical operation logs rather than
    copying binary data deltas. |

    | | `Deployment` | Any group of MongoDB nodes working together in a particular
    configuration. |

    | | `Cluster` | A MongoDB deployment with one or more shards, config servers,
    and routers. |

    | | `Shard` | A set of MongoDB nodes which contain a subset of data. |'
