- fmt: '### Solution


    We’ll walk through a number of examples to better understand the difficulty of
    these requirements. In Figure [8-15](#487346_1_En_8_Chapter.xhtml#Fig15) we see
    a simplistic solution which includes two nodes in the mobile “kit” on different
    hosts to add a level of redundancy and a single node in the factory. Notice that
    the factory node has no priority and so will not become primary. In the mobile
    kit, one node has lower specs (CPU cores, memory) to save on resource costs and
    is given a lower priority so it normally stays as a secondary.


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig15_HTML.jpg](images/487346_1_En_8_Chapter/487346_1_En_8_Fig15_HTML.jpg)


    Figure 8-15: A simplistic approach with a mobile kit


    When the mobile environment is online, we have a pretty standard replica set except
    that we are forcing one mobile node to be primary. This means that the factory
    location can write when the mobile kit has Internet connectivity, but can only
    read data otherwise (see Figure [8-15](#487346_1_En_8_Chapter.xhtml#Fig15), right).


    #### Fixed site redundancy


    While we have mobile redundancy, we cannot afford to even read downtime in the
    factory, so we’ll add a second data-bearing node in the factory. We have to add
    an arbiter to give us an odd number of members. We’ll add the arbiter in the mobile
    kit so that it hosts a majority when the two environments are partitioned (due
    to no Internet).


    Figure [8-16](#487346_1_En_8_Chapter.xhtml#Fig16) shows this new five-member topology
    which has the same limitations for the factory when the two are partitioned or
    the mobile kit is powered down.


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig16_HTML.jpg](images/487346_1_En_8_Chapter/487346_1_En_8_Fig16_HTML.jpg)


    Figure 8-16: A more complex mobile deployment with redundancy


    #### Multi-master


    Now we want to integrate our requirement for a multi-master replica set. At least
    the factory needs to be able to write data temporarily while the mobile environment
    is partitioned. In Figure [8-17](#487346_1_En_8_Chapter.xhtml#Fig17), we have
    restructured our topology to keep an arbiter in the factory and give one node
    a low priority. Now when the two are separated, an election will take place and
    node 1 in the factory will become the primary automatically. In the mobile environment
    some manual intervention is required to force a primary. We either use `rs.reconfig()`
    to remove the entry for the factory arbiter or create a new entry for a mobile
    arbiter. One risky approach would be to make an edit to `/etc/hosts` on all mobile
    hosts that overrides the factory arbiter’s hostname to one running on a mobile
    kit host. Since the arbiter has no state or any data, a `mongod` process running
    in the mobile environment can easily take over this role.


    ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig17_HTML.jpg](images/487346_1_En_8_Chapter/487346_1_En_8_Fig17_HTML.jpg)


    Figure 8-17: A mobile deployment which facilitates multi-master


    Now, we have successfully forced a multi-master setup and created a `split-brain
    cluster`, although the election term mechanism should prevent one of them from
    accepting conflicting writes.


    At this point, if the Internet were restored and the remapping of arbiter hostnames
    was reset, we would have inconsistent data on the nodes in the two environments
    possibly with completely different documents sharing the same `_id` primary key
    value. To avoid corrupting the replica set, and restoring stable replication,
    one set of nodes (either #1 and #2, or #4 and #5) would need their data files
    wiped and an initial sync initialized.


    In reality, this master-master topology will require manual reconfiguration. Data
    loss will occur when the replica set is reunified. MongoDB Realm will offer toolkits
    for implementing offline mobile devices and automatic conflict resolution that
    might satisfy many use cases like this one without any cluster-level customizations.


    ### Key takeaways


    From this chapter, the key concepts to remember are as follows:


    *   While MongoDB does support a number of custom configurations, most of these
    come with various trade-offs.


    *   As with most information technology challenges, custom solutions require balancing
    a set of compromises against business goals.


    *   Using external authentication with Kerberos or LDAP can be scaled with load
    balancing and enabling connection retries.


    *   Hybrid on-prem/cloud clusters can give some useful benefits such as application
    scaling while keeping private data off-cloud.


    *   Internet of Things’ database storage scaling can be achieved by controlling
    and closing connections, as well as increasing write capacity through sharding.


    *   Handcrafted master-master topologies are full of compromises and difficult
    to make resilient. MongoDB Realm introduces a production-ready syncing and conflict-resolution
    system.


    Footnotes [1](#487346_1_En_8_Chapter.xhtml#Fn1_source)   [2](#487346_1_En_8_Chapter.xhtml#Fn2_source)


    ### 9. Backups and Restores


    This chapter covers backup decisions related to topology design. We look at MongoDB’s
    own enterprise tools for performing point-in-time restores of sharded clusters,
    to using scripts to snapshot geographically distributed clusters and retaining
    backup data in the same country of origin to comply with GDPR.


    #### Goals


    What are the primary motivations for taking backups? The following are some of
    the most commons real-world uses of backups:


    *   Roll back a change made due to `developer` error. This is might be an application
    error that was missed in testing and which started corrupting data at the entire
    deployment level.


    *   Roll back a change made due to `customer` error. There could be a customer
    in a multi-tenant system who deleted some data and then realized that it was still
    needed. This can sometimes be just a single database or collection that should
    be restored.


    *   Roll back a change made due to `administrator` error. A DB admin may has accidentally
    dropped an entire collection, thinking that they were connected to a test/staging
    cluster.


    *   There was a site-wide disaster and the production databases and all servers
    have been completely lost. In this case, an offsite backup is critical to restore
    operations.


    *   The latest backup of the production system is used to update a staging or
    development database so that testing can be done on real, recent data.


    In all the preceding cases, the backup needs to reflect a consistent state of
    the database. We don’t want to capture a snapshot of the data files where a write
    was partially flushed to disk, or when a write operation was partially complete.


    Most organizations will define a `recovery point objective` (RPO) and a `recovery
    time objectives` (RTO) to ensure business continuity. The RPO is how much time
    of data changes may be lost. If we take backup snapshots every 12 hours, then
    the most recent 12 hours is the most that could be lost. The RTO is the maximum
    time allowed from a disaster occurring to when the database can be restored to
    full function from a backup. Certain backup/restore approaches will allow for
    much faster restoration than others.


    #### Avoiding restores


    While it is critical to have backups and to be able to restore large, geographically
    distributed sharded clusters, it will always be complex to bring them back online
    after a disaster. We should avoid human error contributing to such activities
    wherever possible.'
