    finds the chunk containing a document with customer ID of `9000` and then splits
    that chunks into two equal parts.


    ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig1_HTML.jpg](images/487346_1_En_11_Chapter/487346_1_En_11_Fig1_HTML.jpg)


    Figure 11-1


    `splitFind` splits into two roughly equals chunks


    In Figure [11-2](#487346_1_En_11_Chapter.xhtml#Fig2), with `sh.splitAt("myDb.customers",
    {custId: 9000})`, that same chunk is split up at that exact value, giving us two
