- fmt: '### Network partition


    When you have a database distributed over multiple data centers connected by a
    network backbone, there is a risk that the connection between the data DCs will
    fail intermittently or even for an extended period. We want to avoid data corruption
    or inconsistency at all costs, so in certain situations the deployment will automatically
    switch to read-only mode to avoid a situation with the same document is edited
    simultaneously in two different places.


    Let’s consider an example illustrated in Figure [2-9](#487346_1_En_2_Chapter.xhtml#Fig9).
    Here, we have access only to two data centers – one is considered a "Production"
    site and the other a "disaster recovery" site. Based on this design philosophy,
    the secondary in DC2 is primarily intended as a reserve for disaster recovery
    purposes. It might be that the priority of the nodes has been adjusted so that
    the nodes in DC1 have a higher priority, effectively preventing node 3 from ever
    becoming the primary. As we can see in the diagram, a network partition simply
    disconnects a single member. A `quorum` (a majority of voting nodes) is present
    in DC1 so an election is not necessary, and the primary does not need to change.


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig9_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig9_HTML.jpg)


    Figure 2-9

    (Left) A replica set with a single member in DC2. (Right) A network partition
    disconnects the DC2 node


    Now let’s consider an example with two application servers in Figure [2-10](#487346_1_En_2_Chapter.xhtml#Fig10).
    These might be configured with a load balancer, or perhaps users near DC2 use
    that application server based on some custom routing. Should a network failure
    partition DC1 from DC2, an election will occur inside DC1 and a new primary elected
    there. The application in DC2 will still be able to read old data from its local
    node, but will neither be able to write nor receive any update from the primary.


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig10_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig10_HTML.jpg)


    Figure 2-10

    (Left) A deployment with a secondary application server. (Right) A network partition
    means the secondary application server can read only


    ### Hardware failure


    To all other members of a replica set, a member node going offline due to a hardware
    or software failure is the same as if that node has lost network access. Figure
    [2-11](#487346_1_En_2_Chapter.xhtml#Fig11) shows that an election will take place,
    and the two nodes still in communication with each other have a quorum to hold
    an election. The application servers will automatically reconnect to the new primary
    to retry any pending writes.


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig11_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig11_HTML.jpg)


    Figure 2-11

    (Left) A primary in alone in DC2. (Right) A failed host/node will cause an election
    but no downtime


    ### Remote DC failure


    Another common scenario particularly for internal applications is that the databases
    run within corporate data centers but that applications run somewhere else – an
    office network or from employees’ personal computers. Figure [2-12](#487346_1_En_2_Chapter.xhtml#Fig12)
    is an example where a "production" data center DC1 with a majority of nodes goes
    offline. From the perspective of the Application and node 3, the effective outcome
    of the network partition is identical to if nodes 1 and 2 crashed simultaneously.
    However, from inside DC1, the primary remains unchanged since those two nodes
    can still form a quorum. The problem arises if the application had been writing
    changes (even with majority write concern) at the same moment. Nodes 1 and 2 could
    have acknowledged some writes that may not yet have replicated to node 3. If the
    application reads from the secondary in DC2, it will miss those writes.


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig12_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig12_HTML.jpg)


    Figure 2-12

    A remote application will connect to a secondary and perform reads if `primaryPreferred`
    read preference is configured


    With manual intervention, we could reconfigure the replica set on node 3 and remove
    nodes 1 and 2 completely from the member list. That would allow node 3 to become
    primary as the only node left, but some writes will have been lost and make it
    impossible to integrate the changes when DC1 comes back online.


    This is another example of why a 3-DC configuration is preferable. Even an entire
    DC down would never mean a lack of quorum and no need for manual intervention.


    ### Storage volume failure


    One less common and harder to handle problem is if there is an issue with the
    storage volume which prevents timely I/O but which is not serious enough to prevent
    the node from functioning at all. Imagine a subtle hardware failure in the storage
    device in Figure [2-13](#487346_1_En_2_Chapter.xhtml#Fig13). Instead of operating
    at its usual capacity of 2000 I/O operations per second (`IOPS`), it suddenly
    is only performing 200 `IOPS` (or is stalling and then working in short bursts).
    As a member of a replica set, it still responds to pings and passes all health
    checks. As such there is no reason to trigger an election. Instead the replica
    set can now only service incoming writes at 10% of its previous capacity level.


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig13_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig13_HTML.jpg)


    Figure 2-13

    The Storage Node Watchdog will take a node offline if its storage becomes unresponsive


    One partial solution is the `Storage Node Watchdog` (which became available in
    the Community version of MongoDB since 4.2). This is an optional service which
    monitors the health of the filesystems on its node and, upon detecting an unresponsive
    filesystem, will trigger a shutdown of the node. In the case that this node is
    the primary, it will also cause an election to take place, effectively passing
    the responsibility of handling writes to another member of the replica set.


    ### Network degradation


    A similar scenario to earlier can occur due to a failing network where some packet
    drops affect bandwidth (Figure [2-14](#487346_1_En_2_Chapter.xhtml#Fig14)). Since
    the health check pings eventually succeed thanks to `TCP` retries, an election
    is not triggered. With MongoDB, elections incur a cost in terms of connection
    churn and application retries and so the algorithm avoids stepping down a primary
    unless it is sure that there is a better candidate. In this case, it’s up to the
    network administrators to set up monitoring and alerts on the network infrastructure
    itself. In such an event, a database administrator may choose to trigger a step-down
    or adjust member priorities while the network is being stabilized.


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig14_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig14_HTML.jpg)


    Figure 2-14

    Node in DC1 experiences degraded network but remains primary


    ### Shared VM hosts


    It is now very common for enterprises to use `VM` hosts when deploying applications
    in their on-prem data centers. This adds an extra level of complexity since noisy
    neighbors can steal resources or misconfigurations can lead to suboptimal memory
    use (such as `memory overcommitment` or excess `memory swapping`). In addition
    to those performance issues, co-locating multiple MongoDB nodes from the same
    replica set can co-join points of failure. For example, in Figure [2-15](#487346_1_En_2_Chapter.xhtml#Fig15)
    we see that a majority of nodes reside on single physical `VM` host. Should this
    host suffer a hardware fault or be shut down for urgent maintenance, these two
    nodes will suddenly fail together and the set will become read-only.


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig15_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig15_HTML.jpg)


    Figure 2-15

    Nodes co-located on the same VM host add a joint point of failure'
  raw: '### Network partition


    When you have a database distributed over multiple data centers connected by a
    network backbone, there is a risk that the connection between the data DCs will
    fail intermittently or even for an extended period. We want to avoid data corruption
    or inconsistency at all costs, so in certain situations the deployment will automatically
    switch to read-only mode to avoid a situation with the same document is edited
    simultaneously in two different places.


    Let’s consider an example illustrated in Figure [2-9](#487346_1_En_2_Chapter.xhtml#Fig9).
    Here, we have access only to two data centers – one is considered a “Production”
    site and the other a “disaster recovery” site. Based on this design philosophy,
    the secondary in DC2 is primarily intended as a reserve for disaster recovery
    purposes. It might be that the priority of the nodes has been adjusted so that
    the nodes in DC1 have a higher priority, effectively preventing node 3 from ever
    becoming the primary. As we can see in the diagram, a network partition simply
    disconnects a single member. A *quorum* (a majority of voting nodes) is present
    in DC1 so an election is not necessary, and the primary does not need to change.


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig9_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig9_HTML.jpg)


    Figure 2-9


    (Left) A replica set with a single member in DC2\. (Right) A network partition
    disconnects the DC2 node


    Now let’s consider an example with two application servers in Figure [2-10](#487346_1_En_2_Chapter.xhtml#Fig10).
    These might be configured with a load balancer, or perhaps users near DC2 use
    that application server based on some custom routing. Should a network failure
    partition DC1 from DC2, an election will occur inside DC1 and a new primary elected
    there. The application in DC2 will still be able to read old data from its local
    node, but will neither be able to write nor receive any update from the primary.


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig10_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig10_HTML.jpg)


    Figure 2-10


    (Left) A deployment with a secondary application server. (Right) A network partition
    means the secondary application server can read only


    ### Hardware failure


    To all other members of a replica set, a member node going offline due to a hardware
    or software failure is the same as if that node has lost network access. Figure
    [2-11](#487346_1_En_2_Chapter.xhtml#Fig11) shows that an election will take place,
    and the two nodes still in communication with each other have a quorum to hold
    an election. The application servers will automatically reconnect to the new primary
    to retry any pending writes.


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig11_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig11_HTML.jpg)


    Figure 2-11


    (Left) A primary in alone in DC2\. (Right) A failed host/node will cause an election
    but no downtime


    ### Remote DC failure


    Another common scenario particularly for internal applications is that the databases
    run within corporate data centers but that applications run somewhere else – an
    office network or from employees’ personal computers. Figure [2-12](#487346_1_En_2_Chapter.xhtml#Fig12)
    is an example where a “production” data center DC1 with a majority of nodes goes
    offline. From the perspective of the Application and node 3, the effective outcome
    of the network partition is identical to if nodes 1 and 2 crashed simultaneously.
    However, from inside DC1, the primary remains unchanged since those two nodes
    can still form a quorum. The problem arises if the application had been writing
    changes (even with majority write concern) at the same moment. Nodes 1 and 2 could
    have acknowledged some writes that may not yet have replicated to node 3\. If
    the application reads from the secondary in DC2, it will miss those writes.


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig12_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig12_HTML.jpg)


    Figure 2-12


    A remote application will connect to a secondary and perform reads if *primaryPreferred*
    read preference is configured


    With manual intervention, we could reconfigure the replica set on node 3 and remove
    nodes 1 and 2 completely from the member list. That would allow node 3 to become
    primary as the only node left, but some writes will have been lost and make it
    impossible to integrate the changes when DC1 comes back online.


    This is another example of why a 3-DC configuration is preferable. Even an entire
    DC down would never mean a lack of quorum and no need for manual intervention.


    ### Storage volume failure


    One less common and harder to handle problem is if there is an issue with the
    storage volume which prevents timely I/O but which is not serious enough to prevent
    the node from functioning at all. Imagine a subtle hardware failure in the storage
    device in Figure [2-13](#487346_1_En_2_Chapter.xhtml#Fig13). Instead of operating
    at its usual capacity of 2000 I/O operations per second (IOPS), it suddenly is
    only performing 200 IOPS (or is stalling and then working in short bursts). As
    a member of a replica set, it still responds to pings and passes all health checks.
    As such there is no reason to trigger an election. Instead the replica set can
    now only service incoming writes at 10% of its previous capacity level.


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig13_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig13_HTML.jpg)


    Figure 2-13


    The Storage Node Watchdog will take a node offline if its storage becomes unresponsive


    One partial solution is the *Storage Node Watchdog* (which became available in
    the Community version of MongoDB since 4.2). This is an optional service which
    monitors the health of the filesystems on its node and, upon detecting an unresponsive
    filesystem, will trigger a shutdown of the node. In the case that this node is
    the primary, it will also cause an election to take place, effectively passing
    the responsibility of handling writes to another member of the replica set.


    ### Network degradation


    A similar scenario to earlier can occur due to a failing network where some packet
    drops affect bandwidth (Figure [2-14](#487346_1_En_2_Chapter.xhtml#Fig14)). Since
    the health check pings eventually succeed thanks to TCP retries, an election is
    not triggered. With MongoDB, elections incur a cost in terms of connection churn
    and application retries and so the algorithm avoids stepping down a primary unless
    it is sure that there is a better candidate. In this case, it’s up to the network
    administrators to set up monitoring and alerts on the network infrastructure itself.
    In such an event, a database administrator may choose to trigger a step-down or
    adjust member priorities while the network is being stabilized.


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig14_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig14_HTML.jpg)


    Figure 2-14


    Node in DC1 experiences degraded network but remains primary


    ### Shared VM hosts


    It is now very common for enterprises to use VM hosts when deploying applications
    in their on-prem data centers. This adds an extra level of complexity since noisy
    neighbors can steal resources or misconfigurations can lead to suboptimal memory
    use (such as memory overcommitment or excess memory swapping). In addition to
    those performance issues, co-locating multiple MongoDB nodes from the same replica
    set can co-join points of failure. For example, in Figure [2-15](#487346_1_En_2_Chapter.xhtml#Fig15)
    we see that a majority of nodes reside on single physical VM host. Should this
    host suffer a hardware fault or be shut down for urgent maintenance, these two
    nodes will suddenly fail together and the set will become read-only.


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig15_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig15_HTML.jpg)


    Figure 2-15


    Nodes co-located on the same VM host add a joint point of failure'
