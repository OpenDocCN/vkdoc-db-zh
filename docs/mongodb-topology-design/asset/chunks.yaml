    \n如果你能随机化从旧系统导出的数据，或按不同字段（例如，学生的姓氏而不是 ID）对其进行排序，那么后续的新文档更有可能被发送到不同的分片，从而平滑每个分片的负载并最大化吞吐量。\n\
    \n### 拆分现有分片\n\n假设你有一个两分片的集群，其当前计算资源即将达到上限，而且获得购买必要新硬件的批准需要一段时间。我们最近获批增加两个新的分片。如何高效地实现这一点？\n\
    \n#### 初始加载\n\n在负载很重的系统下，将新分片链接到集群后的最初几个小时将是最关键的，因为除了现有的应用程序工作负载**外**，还有数据块迁移。迁移需要在源分片上进行大量的*读取*I/O，在目标分片主节点上进行大量的*写入*I/O\
    \ 工作负载，随后在目标分片的次节点上产生大量的复制工作负载。\n\n#### 迁移窗口\n\n如果初始迁移可以在应用程序负载的非高峰时段，并以短窗口进行，将会缓解原始分片上的一些压力（详情请参见下文的*限制平衡影响*）。随着时间的推移，随着分片接近平衡状态，可以使用越来越长的迁移窗口。\n\
    \n#### 有丝分裂\n\n在一些分布式数据库系统中，存在*有丝分裂*的概念——将一个现有分片拆分成两个子集。不幸的是，当前版本的 MongoDB 尚未支持这种方法。\n\
    \n增加分片数量的一个选择是添加新的分片硬件，并让平衡器通过迁移来处理数据的再平衡。如第 6 章所述，每对源/目标分片可以并行进行一次迁移。因此，在这种情况下，将有两个到新分片的并行数据块迁移。\n\
    \n### 管理平衡\n\n在你开始决定哪些集合将被分片以及使用什么键之前，首先了解数据是如何实际平衡的会很有用。\n\n#### 主分片\n\n对集群进行分片时，你可以拥有分片集合和未分片集合的组合。每个逻辑数据库有一个单独的**主分片**（与“主”节点完全无关），所有未分片集合都驻留在此。\n\
    \n在图 10-6 中，我们看到一个分片集群，其中有一个逻辑数据库`db1`，它包含多个集合。只有最大的集合`bigColl1`和`bigColl2`被分片，它们的文档已根据数据块平均分布在各个分片上。\n\
    \n![../images/487346_1_En_10_Chapter/487346_1_En_10_Fig6_HTML.jpg](img/487346_1_En_10_Fig6_HTML.jpg)\n\
    \n图 10-6\n\n一个包含一些分片集合的单一数据库\n\n根据未分片集合的大小，你可能会得到一些相当不均衡的分片。在这种情况下，分片 A 的大小几乎是其他分片的两倍。\n"
- fmt: '# Rebalancing collections


    So how do we deal with an unbalanced cluster such as when one shard is twice the
    size of the others? In some cases, the simplest option may simply be to give additional
    resources to hosts in Shard A. Additional CPU cores and memory should allow these
    hosts to handle the additional workload servicing requests to this unsharded collection.
    But we end up with a mix of host types which is complex to manage and scale.


    We also don’t want to shard very small collections since there is some extra overhead
    of balancing their data and managing the metadata for these collections. The worst
    downside, though, is that we’d have to route certain queries (that don’t include
    the shard key) to *all* shards and perform *scatter-gather queries* which are
    as slow as the slowest shard at the time.


    In this case, if we chose to shard `mediumColl1`, we would migrate 200GB of data
    from Shard A to each of Shard B and Shard C.


    ## Move primary shard


    In situations where you have multiple logical databases, MongoDB will automatically
    assign the primary shard for any new database to an undercommitted shard. However,
    if you started with just a single shard and added additional shards over time,
    the primary shards will **not** be automatically reassigned to the newer shards.
    You will have all unsharded collections homed on the original shard. An example
    is shown in Figure [10-7](#487346_1_En_10_Chapter.xhtml#Fig7) where new shards
    have 400GB less data per shard.


    ![../images/487346_1_En_10_Chapter/487346_1_En_10_Fig7_HTML.jpg](images/487346_1_En_10_Chapter/487346_1_En_10_Fig7_HTML.jpg)


    Figure 10-7


    An expanded cluster with unsharded collections on Shard A


    To manually rebalance the load of unsharded collections, you can use the `movePrimary`
    command to reassign the primary shard for a particular database to a shard of
    your choice. In the preceding example, this can be achieved with the following
    commands:


    ```

    db.adminCommand( { movePrimary : "db2", to : "shardB" } )

    db.adminCommand( { movePrimary : "db3", to : "shardC" } )

    ```


    ## Additional shards


    In Figure [10-8](#487346_1_En_10_Chapter.xhtml#Fig8), we see a similar sharded
    cluster but with two logical databases. In this case, `db1` has its primary shard
    on Shard C, and `db2` has its primary shard homed on Shard A. There are three
    sharded collections: `db1.bigColl1`, `db2.bigColl1`, and `db2.bigColl2`.


    ![../images/487346_1_En_10_Chapter/487346_1_En_10_Fig8_HTML.jpg](images/487346_1_En_10_Chapter/487346_1_En_10_Fig8_HTML.jpg)


    Figure 10-8


    A relatively well-balanced sharded cluster


    In this case, our Shard A is a slightly above the recommended threshold for shard
    data sizes, and we should consider adding an additional shard to this cluster.
    Should we do that, these three large sharded clusters will automatically be distributed
    evenly and approximately 0.5TB will be migrated from the current three shards,
    into the new fourth shard.


    This migration process may take several days as it is given a low priority to
    ensure that migration doesn’t impact normal application or replication traffic.


    # Throttling balancing impact


    We need to plan and manage the chunk migration **workload** that is generated
    after adding a shard to ensure it doesn’t have a negative effect on an already
    loaded cluster.


    We should also be careful when adding shards on a nearly saturated **network**
    with limited free capacity, especially where bandwidth between data centers is
    saturated during business hours.


    One simple approach it to use the **built-in balancer window**, which allows you
    to choose a fixed window every day to allow chunk transfers to occur.


    For example, in Listing [10-2](#487346_1_En_10_Chapter.xhtml#PC10), we activate
    a daily window between 1 a.m. and 6:30 a.m. local server time every day of the
    week.


    ```

    use config;

    db.settings.update(

    { _id: "balancer" },

    { $set: { activeWindow :

    { start : "01:00", stop : "06:30" } } },

    { upsert: true }

    )

    Listing 10-2

    Activate the built-in balancing window

    ```


    # Weekend workloads


    Many applications have special weekend workloads. Some have almost no user traffic
    and could safely have the balancer running only on weekends. Others have special
    load and transform or analytics workloads and so want to avoid any balancing at
    all. For these cases, an external `cron` job or trigger can use a Mongo shell
    script to turn on and off the balancer at will:


    ```

    mongo --uri mongodb://U:P@mongos1.bigcorp.local:27017/config

    --authenticationDatabase admin

    --eval "sh.startBalancer()"

    ```


    The same approach can be used to stop the balancing with `sh.stopBalancer()`.


    Note


    From MongoDB 4.2 stopping the balancer will also halt autosplitting of chunks.
    This change effectively stops almost all write workload on the config server’s
    replica set when balancing is stopped.


    # Managing storage


    One of the biggest concerns for admins is ensuring that hosts for growing databases
    have sufficient storage space. Unexpectedly running out of space can lead to downtime
    and even data corruption.


    ## Maximum storage size


    In some cases, it can be useful to control the maximum amount of data per shard,
    allowing asymmetric shard sizes without having to control chunk ranges explicitly
    with zones. When adding new shards to an existing cluster, the new hosts will
    often have larger, faster storage devices. We want to avoid filling up older,
    smaller shards since running out of disk space risks data corruption and many
    other problems.


    For example, we could set a maximum size of 1TB (1,048,576 MB) for our Shard A
    by running the following:


    ```

    config = db.getSiblingDB("config")

    config.shards.updateOne( { "_id" : shardA"},

    { $set : { "maxSize" : 1048576 } } )

    ```


    The balancer will not consider any shard as a chunk recipient if doing so would
    exceed this configured maximum storage size.


    ## Determining actual storage size


    The actual size on disk will vary even between each member in a shard replica
    set. Members that have been recently initial synced or `compact`ed may have significantly
    smaller real storage space used than nodes that have been running a long time
    which may have severely fragmented storage.


    WiredTiger uses a no-overwrite algorithm which will not actually overwrite the
    old document version, but instead finds an unused block and reuses it. Deleted
    documents will open up new blocks for possible future reuse. Since documents may
    keep internal references to different parts of the file, the in-place compact
    method will not always be able to recover lots of space.


    If free space is a serious issue, and you have recently **deleted** a large number
    of documents or added more shards and **migrated data** away, the best approach
    is to trigger a *rolling initial sync* on every member of the shard one after
    another.


    To check real storage space used for each member, loop through all databases,
    then run `db.stats()`, and add together the values of `storageSize` (which is
    the compressed data files without indexes) and `indexSize` (which is the total
    of all indexes from all collections on this database).'
