- fmt: '### Shard keys and unique fields


    When the shard key is something other than `{_id: 1}`, then you could get a situation
    where two documents have the same `_id` field and exist on different shards (since
    the unique constraint on the `_id` index is per shard).


    #### Sharding on _id


    The “primary” key field `_id` alone is not normally a good choice as the shard
    key. Using the `ObjectId` data type or a custom ID with ascending values for the
    `_id` field can lead to a hot shard. The first bytes of the `ObjectID` are a date/timestamp,
    and so even when generated from different application servers, they will have
    almost identical sort order.


    While integer IDs are often ascending, if your application can generate `UUID`
    with a random prefix, the problem of hot shards can be avoided.


    There are many better options such as using a hash of the ID (e.g., `{_id: "hashed"}`)
    which should distribute documents more evenly across the shards.


    If you are almost always querying on other important fields, you could use a compound
    shard key like `{country: 1, _id: 1}` to benefit from shard targeting optimizations.


    #### Nonunique shard key values


    There is no requirement that shard keys should be unique, and no immediate performance
    concerns when multiple documents share a shard key.


    The major concern about the same shard key value being shared by many documents
    is that eventually you could create a `jumbo chunk`. This is when a chunk is indivisible
    and larger than the max chunk size (`64MB` by default). The balancer will not
    migrate jumbo chunks due to the performance impact and it can eventually lead
    to unbalanced shards.


    ### Time-based shard keys


    Using a field that stores the *current* or *insert* date is a bad choice for a
    shard key because it is essentially incrementing. If you are sharding on a different
    date, like a customer’s date of birth, this might not cause problems as long as
    documents are not bulk-loaded in this order.


    Compound shard keys starting with the current date are also problematic when they
    are the first field in the key. So, a shard key like `{insertDate: 1, custId:
    1}` is likely to lead to a hot shard. A key like `{custId: 1, insertDate: 1}`
    allows good shard targeting for queries filtering on `custId`, but monotonically
    ascending customer ID values would also create a hot shard.


    Later in this chapter, we will explore some techniques for efficiently bulk loading
    data into sharded collections with pre-splitting.


    ### Hashed shard keys


    When sharding a collection as “hashed”, use `numInitialChunks` to pre-chunk a
    collection to a certain number of chunks (say 1024). Let the balancer migrate
    these empty chunks first, before initializing the import workload.


    As you load data, these chunks will be split as documents are added to ensure
    they stay under the chunk size limit. This splitting is a question of updating
    metadata in the config servers and doesn’t actually require I/O on the shards
    themselves. Since the hash algorithm guarantees good distribution, in most cases
    there will be almost no chunk imbalances even after additional splitting, so no
    chunk migrations should be needed to restore balance between shards.


    However, without sufficient cardinality of the original values, a hashed shard
    key will still lead to jumbo chunks and balancing problems.


    ### Refining keys


    Upcoming versions of MongoDB (4.4 and later) will allow refining an existing shard
    key by adding an additional field as a compound shard key. This can be useful
    if the current shard key is not selective enough and gives jumbo chunks that are
    otherwise too large to migrate.


    ## Advanced splitting


    In most cases and with a decent shard key choice, MongoDB’s native behavior will
    automatically balance data while splitting active chunks and redistributing them
    across the shards.


    Note


    Whenever manipulating shard configuration or chunks, you should always first stop
    any balancing activity by running `sh.stopBalancer()`. After making changes, don''t
    forget to restart the balancer again with `sh.startBalancer()`.


    In the following sections, we’ll explore a few cases where manual splitting is
    beneficial.


    ### Split early


    When you are about to load a large amount of data into MongoDB in a new collection,
    it’s important to **pre-split** the collection before starting the load. This
    avoids the overhead of splitting and moving chunks during the operation. Documents
    will be inserted directly onto the final shard.


    As balancing is calculated at the chunk level, it’s important to define chunk
    ranges which will include approximately the same number of documents being loaded.
    We want to avoid creating chunks which will have no documents, since we’ll end
    up with an unbalanced cluster in terms of bytes stored per shard.


    In Figure 10-5 we see a cluster with 20 chunks on each shard. However, due to
    artifacts from the automatic splitting algorithm, chunks on the original Shard
    A tend to have slightly more documents per chunk, meaning that Shard A is 30%
    larger in terms of bytes.


    ![../images/487346_1_En_10_Chapter/487346_1_En_10_Fig5_HTML.jpg](images/487346_1_En_10_Chapter/487346_1_En_10_Fig5_HTML.jpg)


    Figure 10-5


    Pre-splitting can create chunks with uneven distributions


    #### Manual splitting


    If the shard key/value distribution is known in advance and we are not using a
    hashed shard key, then we can manually pre-split with a script.


    Let’s say we run a school system in which student ID numbers are assigned in ascending
    order. This is a not a good choice for single-field shard key, and we’ll address
    some issues as part of this example.


    The previous database contains 200,000 students, past and present, that we want
    to load. We will define 100 chunks, and each chunk will contain 2000 documents.
    We can use the following script to achieve that goal on an empty sharded collection
    `students`:


    ```javascript

    for (var i = 0;  i < 100; i++) {

    sh.splitAt("school.students", { studentId : 2000*i } );

    }

    ```


    If we immediately realize that the first student ID starts at 5000, we can safely
    merge in the first two adjacent empty chunks with


    ```javascript

    db.adminCommand( {

    mergeChunks: "school.students",

    bounds: [ { studentId : MinKey },

    { studentId : 6000 } ]

    } )

    ```


    Note that we cannot ever directly remove a chunk since the range of chunk definitions
    must span all the way from `MinKey` to `MaxKey` (essentially -infinity to +infinity).


    Once the balancer has moved chunks around, we’ll see chunks evenly distributed
    between the available shards, like the result from `sh.status(true)` shown in
    Listing 10-1.


    ```javascript

    school.students

    shard key: { "studentId" : 1 }

    unique: false

    balancing: true

    chunks:

    shardA    34

    shardB    34

    shardC    33

    { "studentId" : { "$minKey" : 1 } } -->> { "studentId" : 0 } on : shardA Timestamp(2,
    0)

    { "studentId" : 0 } -->> { "studentId" : 2000 } on : shardC Timestamp(3, 0)

    { "studentId" : 2000 } -->> { "studentId" : 4000 } on : shardB Timestamp(4, 0)

    { "studentId" : 4000 } -->> { "studentId" : 6000 } on : shardC Timestamp(5, 0)

    { "studentId" : 6000 } -->> { "studentId" : 8000 } on : shardC Timestamp(6, 0)

    { "studentId" : 8000 } -->> { "studentId" : 10000 } on : shardA Timestamp(7, 0)

    Listing 10-1

    Output of sh.status() showing newly distributed empty chunks

    ```


    Now our previous `mergeChunks` command will fail since the chunks inside that
    range are located on different shards and can longer be easily merged.'
