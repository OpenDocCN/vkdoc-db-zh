  trans: '### 容量冗余


    你需要为任何组件在最糟糕时刻离线的情况做好预案。假设你为一个运输提供商处理生产负载，每个工作日的票务销售有 90%集中在上午 9-10 点和下午 5-6 点。你应该为
    MongoDB 节点配置计算资源，确保即使主节点故障，替换的主节点也能处理相同的工作负载。


    所有这些冗余都是有代价的，系统架构师和管理者必须在为系统添加冗余的成本之间进行权衡。人们倾向于寻求用复杂的故障转移策略和混合硬件来节省资金的巧妙方法。稍后，我们将探讨一些例子，并说明为何采用混合硬件资源的部署是不可取的。


    ### 自动故障转移


    除了依赖冗余硬件外，MongoDB 还提供了一种更简单、更便宜的软件方法，它假定基础设施故障会发生，并内置了故障转移功能。通过在不同的物理位置运行多个承载数据的节点，确保基础设施的每一层都具备弹性变得不再那么重要。我们可以在成本低得多的商用硬件上运行，这些硬件仅配备单个电源和单个网卡，无需备用电源或互联网连接。


    如果我们的副本集能够同时处理一个甚至两个完整的数据中心故障而不会丢失数据，我们就能在基础设施上节省资金，并提供一个能够自我修复、完全不会对其应用程序造成任何中断的数据库系统。


    大多数云提供商为客户提供了统一的虚拟机界面，这与在商用硬件上运行标准 Linux 操作系统非常相似。然而，在底层，大多数云提供商已经内置了多层冗余。例如，他们的网络存储解决方案通常建立在
    RAID-10 风格的架构上，该架构使用多个物理存储设备来存储每个数据块，并且在`IOPS`（每秒输入/输出操作）方面几乎呈线性扩展。


    **警告**


    许多云提供商提供的存储选项包含“突发额度”。这些额度可以在工作负载高峰期间使用，但最终会过期。如果你在云虚拟机上看到`IOPS`无故突然下降，可能是因为额度余额已降至零。


    ### 为灵活性而设计


    构建容错系统的另一个好方法是遵循允许未来灵活调整的设计原则。


    #### 使用 DNS 而非 IP


    虽然可以在连接字符串中使用 IP 地址配置副本集成员和种子列表（见图 2-4），但这可能会使你的部署变得脆弱。通过使用内部 DNS 服务器，你可以为部署中的每个主机分配一个逻辑主机名或别名。


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig4_HTML.jpg](img/487346_1_En_2_Fig4_HTML.jpg)

    图 2-4


    使用 IP 地址进行配置会导致系统不灵活


    一些组织会根据主机的物理位置和业务部门为其分配增量主机名，例如`host0003456.mortgages.dc-nyc.bigbank.local`。虽然这比使用
    IP 地址更可取，并且能让我们快速了解主机所在的数据中心，但它仍然缺乏灵活性。


    如果该主机是某个分片副本集的一部分，并且由于某种原因主板完全故障，那么该主机就需要被替换。替换的主机将有一个新的主机名，例如`host0003587`。现在，需要在
    MongoDB 部署内部进行手动干预，以便所有其他成员、`mongos`和 Ops Manager 都能知道此节点角色所在的新主机位置。


    如图 2-5 所示的另一种方法是，为主机名赋予逻辑命名，或者至少为功能性主机名创建一个 CNAME 别名，格式为`node3.mortgages_prod.mongo.bigbank.local`。在这种情况下，可以启动一台新的主机，将
    CNAME 别名指向该主机名，配置`mongod`进程，一旦 DNS 缓存刷新，所有组件都将能够自动发现它。对于计划内的迁移，可以缩短 DNS 生存期以减少缓存持续时间。


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig5_HTML.jpg](img/487346_1_En_2_Fig5_HTML.jpg)

    图 2-5


    使用逻辑主机名使得理解和管理复杂部署更加容易；也使得替换故障主机更加方便


    **注意**


    对于副本集、分片集群和 Ops Manager 代理的自动发现功能，每个节点需要检测其自身的“MongoDB 主机名”作为主机的完全限定域名。命令`hostname
    -f`的输出结果应始终与配置中的节点名称匹配。在 Linux 上，可以通过运行`hostnamectl set-hostname <new_hostname>`或更改`/etc/hostname`中的主机名并重启主机来实现。未能检查这一点可能意味着`mongod`不知道自己的身份。


    ### 自动发现


    MongoDB 驱动程序会自动尝试检测部署的所有成员。即使你在连接 URI 字符串中只列出了一个副本集成员，驱动程序仍然会与所有成员建立连接，以便更快地响应选举和其他副本集变化。但是，你应该始终在连接
    URI 中包含所有已知的副本集成员或`mongos`路由器，以防在应用程序首次启动时列出的节点不可用。


    ### 计划内停机


    MongoDB 副本集内在的分布式特性意味着，节点有时会为了计划内的维护而被有意关闭，这是完全正常且预期的行为。只要任何维护操作不超过 oplog 窗口时间，节点在重启后会自动同步任何更改。


    对于计划内的停机，无需重新配置副本集。最好保留原有配置，这样一旦节点重启，它就能自动且即时地重新加入副本集。


    **注意**


    强烈建议利用滚动升级，让 MongoDB 节点保持在当前主要版本的`最新次要版本`上运行。与任何软件一样，偶尔会发现影响稳定性或安全性的错误。避免你的部署因一个已被修复的错误而下线，并及时进行更新。'
- fmt: '### Multiple routers


    任何用于生产的分片集群在部署中至少应有两个`mongos`路由器节点（参见图[2-6](#487346_1_En_2_Chapter.xhtml#Fig6)）。应用程序应在连接URI字符串中配置所有`mongos`实例以支持故障转移。`mongos`连接到每个分片的方式与应用程序连接副本集的方式大致相同。并且，就像驱动程序发现所有副本集成员一样，`mongos`将通过配置服务器自动发现分片集群中的所有组件。


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig6_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig6_HTML.jpg)


    图 2-6

    具有多个`mongos`节点的高可用部署


    对于具有多个应用程序服务器的部署，一个好的选择是将`mongos`与应用程序服务器同地部署。这减少了`mongos`向应用程序传输数据时的延迟。由于`mongos`通常无状态且不在磁盘上持久化任何数据，可以根据负载需求随时启动和停止。如果你有一个在云“自动伸缩组”内运行的应用程序，它在高峰负载时会启动新的虚拟机，那么你应该在该预构建镜像中包含一个`mongos`，这样你的分片路由器也会自动扩展。


    每个`mongos`将与其他每个`mongos`以及部署中的每个非隐藏节点保持连接。在图[2-7](#487346_1_En_2_Chapter.xhtml#Fig7)中，每个`mongos`将保持9个开放连接，每个连接每个节点大约占用1MB的RAM。想象一个大型部署，有30个`mongos`和10个分片，每个分片有5个节点。在这种部署中，每个`mongos`仅为了持续检查部署中所有组件的健康状态，就要打开近80个连接。因此，我们通常建议一个部署中不要超过30个`mongos`，而是通过增加内存和CPU资源来垂直扩展一个固定大小的`mongos`池。


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig7_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig7_HTML.jpg)


    图 2-7

    显示一个`mongos`开放连接的分片集群


    ### Rolling maintenance


    在计划维护或配置更改期间避免故障的一个重要方法是逐个节点地应用它们。由于设计良好的副本集可以在一个成员离线的情况下运行，我们应该以*滚动方式*执行诸如版本升级等操作。


    一些操作，如索引构建，最好在暂时从集合中分离出的节点上执行。这可以通过停止一个节点，并临时在没有其副本集参数的情况下启动它来实现。该节点仍将保留数据副本，但对应用程序和其他副本集成员不可见。一旦索引构建完成，该节点可以使用其复制参数重新启动并重新加入集合。许多其他操作，如二进制版本升级或某些服务器配置选项（安全、性能等），则需要节点重启。


    虽然这些滚动维护操作可以手动或通过脚本执行，但Ops/Cloud Manager的自动化功能是专门设计来执行这些操作的。更改是逐节点进行的，所有辅助节点首先被更改，并且只有在那时成功后，主节点才会*降级*以进行更改，从而确保写工作负载不受影响。如果集群不健康（例如一个节点已经不可用），自动化将永远不会启动滚动维护。如果先前节点的更改未完成和成功，它也不会为了维护而关闭另一个节点。这避免了不必要地降低副本集的弹性或可用性。


    #### Clean step-down


    *降级*是主节点向副本集的其他成员（以及任何连接的客户端）发出的明确信号，表示将进行选举。它会立即触发选举，并且比在高负载下主节点突然丢失要顺畅得多。有了这个通知，选举可以在几毫秒内发生。如果当选的节点尚未赶上旧的辅助节点，它将在接受任何新写入之前先进行追赶（参见`catchUpTimeoutMillis`设置）。如果在30秒内没有赶上，仍然拥有最新数据的旧主节点将调用新的选举来接管，以确保集合不会阻塞传入的写操作。


    由于应用程序将持有并重试任何待处理的操作，直到新的主节点准备就绪，这意味着对应用程序的影响也非常短暂，并且对最终用户是完全透明的。


    如果没有降级，默认情况下，辅助节点会等待10秒（副本集配置中的`electionTimeoutMillis`设置）再触发选举。这是为了避免由于非常短暂的网络错误或停顿而导致不必要的主节点变更。


    ### Tooling failover


    Ops/Cloud Manager是MongoDB企业版客户可用的自动化、监控和备份工具，为在私有数据中心管理复杂的分片集群提供了关键功能。因此，该工具本身具有类似的冗余和自动故障转移至关重要。


    图[2-8](#487346_1_En_2_Chapter.xhtml#Fig8)展示了一个具备良好冗余的Ops Manager部署示例。任何一个数据中心的丢失都不会导致应用程序停机。Ops
    Manager应用程序本身有一个热备份，因此自动化和监控可以继续自动进行。备份快照保存在本地部署的S3兼容存储解决方案中，该解决方案本身跨多个数据中心进行配置。只有备份守护进程缺乏自动故障转移。如果DC1丢失，需要手动干预来激活DC2中Ops
    Manager实例的备份守护进程。


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig8_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig8_HTML.jpg)


    图 2-8

    使用Ops Manager（仅限企业版）且具备冗余的部署


    ### Failure scenarios


    与任何复杂的分布式系统一样，可能出现许多问题来影响生产数据库的可用性。有了冗余节点，丢失单个服务器或整个文件系统损坏并不意味着数据丢失或数据库不可用。


    然而，如果没有正确的容错设计，一些常见错误可能会导致意外或不理想的状态。'
  raw: '### Multiple routers


    Any sharded cluster used in production should have at least two `mongos` router
    nodes in the deployment (see Figure [2-6](#487346_1_En_2_Chapter.xhtml#Fig6)).
    The application should be configured with all `mongos` instances in the connection
    URI string to support failover. The `mongos` will connect to each shard much the
    same as an application connects to a replica set. And in the same way that the
    drivers discover all replica set members, the `mongos` will auto-discover all
    components in the sharded cluster via the config servers.


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig6_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig6_HTML.jpg)


    Figure 2-6


    Highly available deployment with multiple `mongos` nodes


    For deployments with multiple application servers, a good option is to keep a
    `mongos` collocated with the app server. This reduces latency for cases when a
    `mongos` is piping data to the application. Since the `mongos` is generally not
    stateful and doesn’t persist any data on disk, they can be spun up and down as
    required by load. If you have an application running inside a cloud “auto-scaling
    group” which spins up a new virtual machine during peak load, you should include
    a `mongos` in that prebuilt image, so your shard routers will scale automatically
    too.


    Each `mongos` will maintain a connection with every other `mongos`, as well as
    each nonhidden node in the deployment. In Figure [2-7](#487346_1_En_2_Chapter.xhtml#Fig7),
    each `mongos` will keep 9 connections open, each taking about 1MB of RAM per node.
    Imagine a large deployment with 30 `mongos`es and 10 shards, each with 5 nodes.
    In such a deployment, each `mongos` opens almost 80 connections just to maintain
    a constant health check of all components in the deployment. For this reason,
    we normally recommend to not exceed 30 `mongos`es in a deployment and instead
    vertically scale up a fixed-size pool of `mongos`es with additional memory and
    CPU resources.


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig7_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig7_HTML.jpg)


    Figure 2-7


    Sharded cluster showing the open connections for one mongos


    ### Rolling maintenance


    One important way to avoid failure during planned maintenance or configuration
    changes is to apply them one node at a time. Since a well-designed replica set
    can function with one member offline, we should perform operations such as version
    upgrades in a *rolling manner*.


    Some operations such as index builds are best performed on nodes temporarily separated
    from the set. This can be achieved by stopping a node, temporarily starting it
    without its replica set parameters. This node will still have a copy of the data,
    but will be invisible to the application and the other replica set members. Once
    the index build is complete, the node can be restarted with its replication parameters
    and rejoin the set. Many other operations such as a binary version upgrades or
    certain server configuration options (security, performance, etc.) require a node
    restart.


    While these rolling maintenance operations can be performed manually or via scripts,
    the automation features of Ops/Cloud Manager have been specifically designed to
    perform these operations. Changes are made node by node, with all secondaries
    being changed first, and only if successful at that point, the primary node will
    be *stepped down* before making changes so that the write workload is not affected.
    Automation will never start rolling maintenance if the cluster is unhealthy, such
    as if one node is already unavailable. It will also never take down another node
    for maintenance if the previous node''s changes are not complete and successful.
    This avoids reducing the resilience or availability of a replica set unnecessarily.


    #### Clean step-down


    The *step-down* is an explicit signal by a primary to other members of the replica
    set (and any clients connected) that an election will be taking place. It triggers
    an election immediately and much more smoothly than a sudden loss of a primary
    under heavy load. With this notification, an election can occur in milliseconds.
    If the elected node hasn’t yet caught up to the old secondary, it will first catch
    up before it can accept any new writes (see the `catchUpTimeoutMillis` setting).
    If it hasn’t caught up within 30 seconds, the old primary which is still the most
    up to date will call a new election to take over, to ensure that the set isn’t
    blocking incoming writes.


    Since the application will hold and retry any pending operations until a new primary
    is ready, this means the application impact is also extremely short and completely
    transparent to end users.


    Without a step-down, secondaries will, by default, wait 10 seconds (the `electionTimeoutMillis`
    setting in the replica set configuration) before triggering an election. This
    is to avoid unnecessary changes of primary due to very brief network errors or
    stalls.


    ### Tooling failover


    Ops/Cloud Manager is an automation, monitoring, and backup tool available to MongoDB
    Enterprise customers that provides crucial features for managing complex sharded
    clusters in private data centers. As such, it is critical for this tool to have
    similar redundancy and automatic failover.


    Figure [2-8](#487346_1_En_2_Chapter.xhtml#Fig8) shows an example of an Ops Manager
    deployment with good redundancies in place. Any of the data centers can be lost
    without any application downtime. The Ops Manager application itself has a hot
    backup, so that Automation and monitoring can continue automatically. The backup
    snapshots are kept in an S3-compatible storage solution on-prem which is itself
    configured over multiple data centers. Only the Backup Daemon is lacking automatic
    failover. If DC1 is lost, manual intervention is required to activate a Backup
    Daemon as part of the Ops Manager instance in DC2.


    ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig8_HTML.jpg](images/487346_1_En_2_Chapter/487346_1_En_2_Fig8_HTML.jpg)


    Figure 2-8


    A deployment using Ops Manager (Enterprise only) with redundancy


    ## Failure scenarios


    As in any complex, distributed system, there are many possible problems that may
    arise to affect the availability of a production database. With redundant nodes,
    losing a single server or the corruption of an entire filesystem does not mean
    that data is lost or that a database is unavailable.


    However, there are a number of common errors which without correct fault-tolerant
    design may lead to unexpected or undesirable states.'
