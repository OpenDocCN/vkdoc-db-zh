  **图 8-4** 使用 LDAP 服务器池进行外部认证\n\n在这种情况下，第一次认证尝试连接到了 LDAP 服务器 #1，但由于瞬时网络故障，此连接失败了。LDAP\
  \ `authz` 模块使用的 OpenLDAP 库将在 10 秒后超时，并自动从其列表中重试另一台服务器。这次，它连接到了服务器 #3，并成功认证了用户。初始错误将被记录在\
  \ `mongodb.log` 中，但对应用程序的唯一影响是，连接时间比平时长了 10 秒。\n\n由于认证过程仅在开启新的客户端连接时发生，如果应用程序已正确配置了连接池，那么新连接不会定期建立。因此，即使\
  \ LDAP 服务器不稳定，这种“卡顿”的风险也会很低。\n\n这种方法需要在池中列出所有 LDAP 服务器的主机名或 IP 地址。对于一些大型组织，LDAP\
  \ 服务器由单独的团队管理，并且可能会在不通知的情况下发生变更。因此，不可能预先知道所有 LDAP 服务器的主机名。\n\n一种解决方案是在内部 DNS 中创建一个\
  \ `CNAME` 别名，例如 `ldap-pool.mycompany.internal`，该别名被配置为返回所有活动 LDAP 服务器的主机名。但是，如果您为\
  \ MongoDB 节点配置 `servers` 中只有一个条目，例如：\n\n```yaml\nsecurity:\n  ldap:\n    servers:\
  \ ldap-pool.mycompany.internal:389\n```\n\n那么 MongoDB 及其 OpenLDAP 库并不知道存在一个可用的 LDAP\
  \ 服务器池。如果对某个 LDAP 服务器的第一次认证请求失败，它会认为该 LDAP 服务器宕机，甚至不会尝试重试。解决此情况的方法（在撰写本文时）是指定多次相同的别名，以强制进行\
  \ LDAP 请求重试，即：\n\n```yaml\nsecurity:\n  ldap:\n    servers: ldap-pool.mycompany.internal:389,\
  \ \\\n             ldap-pool.mycompany.internal:389, \\\n             ldap-pool.mycompany.internal:389\n\
  ```\n\n现在，任何单个 LDAP 服务器中的瞬时错误都将无缝重试，根本不会向应用程序显示任何错误。\n\n一如既往，您应监控 MongoDB 日志中的任何错误，并做出相应反应，在错误开始影响生产应用程序之前纠正基础设施故障。\n\
  \n### 负载均衡器\n\nOpenLDAP 库本身不维护关于池中 LDAP 服务器健康状况的任何状态。如果某台服务器宕机或不健康，认证尝试仍可能被路由到该服务器。MongoDB\
  \ 4.2 及更高版本具有基本的健康检查功能，试图避免使用不健康的 LDAP 服务器。更好的方法是使用专用的 TCP 负载均衡器，它能够执行 LDAP 查询作为健康检查。如图\
  \ 8-5 所示，MongoDB 节点与负载均衡器通信，负载均衡器将查询分发给健康的 LDAP 服务器。\n\n![`../images/487346_1_En_8_Chapter/487346_1_En_8_Fig5_HTML.jpg`](img/487346_1_En_8_Fig5_HTML.jpg)\n\
  **图 8-5** 负载均衡器代理并分发 LDAP 请求\n\n该负载均衡器通常会随机地将请求分配给后端的 LDAP 服务器。大多数先进的负载均衡器还能够执行测试\
  \ LDAP 查询并检查结果。如果有任何 LDAP 服务器未及时响应，它们将暂时从池中移除。这样，任何发生故障或过载的 LDAP 服务器都将被忽略，并且不应导致\
  \ MongoDB LDAP 请求停滞。\n\n假设负载均衡器只有一个主机名 `ldap-lb.mycompany.internal`。如前所述，我们应在 `security.ldap.servers`\
  \ 中多次列出负载均衡器的主机名，以确保 TCP 级别的重试。\n\n### 连接超时\n\n为任何类型的分布式系统选择正确的超时值可能很棘手。过去对 MongoDB\
  \ 来说也是如此，在早期版本中，一些默认的超时值对于大型或复杂集群来说并非总是最优的。\n\n对于自 3.4 版以来的任何版本的 MongoDB，除非绝对必要，建议\
  \ `对服务器和驱动程序配置均使用默认超时值`。默认超时值已被选择为对具有多个 `mongos` 路由器和多个应用程序服务器的分片集群是最优的。\n\n**警告**\n\
  \n由于之前的默认设置，网上仍存在大量无效建议。许多开发人员和数据库管理员倾向于尝试不同的值组合，以期挤出一些额外的性能，或在负载非常重的时期提高稳定性。\n\n\
  低超时值的一个风险是，它会导致几乎完成的操作的连接过早被切断，而服务器端的操作仍在完全执行。如果此时重试操作，服务器将并行运行两个相同的、有影响的操作。如果任其继续，应用程序将面临对其自身数据库基础设施发起一种\
  \ `拒绝服务攻击` 的风险。\n\n#### 限制操作时间\n\n为确保缓慢（通常是错误的或意外产生重大影响的）操作被终止并正确释放服务器端资源，请使用 `maxTimeMS`\
  \ 而不是连接超时。\n\n`maxTimeMS` 指定了在游标上处理操作的累计时间限制（以毫秒为单位）。MongoDB 在此时间限制内不计算客户端和服务器之间的网络延迟。超过\
  \ `maxTimeMS` 的正在进行的操作将在下一个可以安全中止的中断点被终止。\n\n\n### 超时详情\n\n`连接超时` 与驱动程序启动/打开到 MongoDB\
  \ 节点的套接字连接相关。这是建立连接的第一步，发生在驱动程序尝试进行身份验证之前。只要 MongoDB 节点接收了传入的连接，此超时就不会被触发。\n\n`套接字超时`\
  \ 是关于监控持续的数据流入。如果数据流在指定的超时时间内中断，则该连接被视为停滞/断开。将此值设置为较低的值（例如 5 秒）意味着如果在此时间内没有数据发送/请求，则连接会超时并被回收。这会在应用程序和\
  \ MongoDB 节点之间产生不必要的连接搅动，这就是为什么不建议设置套接字超时。\n\n`最大等待时间` 是关于当所有现有连接都已在使用时，驱动程序线程从连接池获取连接将阻塞多久。\n\
  \n`wtimeoutMS` 是关于等待写关注被处理的时间长度，可以根据所需的持久性为每个写操作设置不同的值。这与复制子系统相关，与建立应用程序和 MongoDB\
  \ 节点之间的连接无关。\n\n表 8-1 总结了不同等待和超时的默认值。\n\n**表 8-1** Java 驱动程序的超时描述和值\n\n| 设置 | 描述\
  \ | 默认值 |\n| --- | --- | --- |\n| `连接超时` | 值为 0 表示永不超时。仅在建立新连接 `Socket.connect(java.net.SocketAddress,\
  \ int)` 时使用。 | 10000 (10s) |\n| `套接字超时` | 用于 I/O 套接字读写操作 `Socket.setSoTimeout(int)`。\
  \ | 0 (无超时) |\n| `最大等待时间` | 线程等待连接可用的最长时间（毫秒）。 | 1200000 (120s) |\n| `wtimeoutMS`\
  \ | 对应于写关注的 `wtimeout`。`wtimeoutMS` 指定了写关注的时间限制（毫秒）。 | 无默认值 |\n| `maxTimeMS` | 这是游标超时，与前面提到的高级别连接超时无关。\
  \ | 无默认值 |\n\n## 混合云模型\n\n假设你有一个分片集群，其中多个数据库在两个数据中心本地运行。你的组织决定是时候在像 AWS 这样的公有云上测试运行一些实例了。有些数据比其他数据更敏感，因此决定一小部分数据（全部包含在一个集合中）不能存储在云端。一个极端的选择可能是提取出这些数据，并将其存储在本地一个单独的副本集中。\n\
  \n我们将通过一个示例来了解如何将部分数据迁移到云端，同时将特定的敏感数据子集保留在我们的私有数据中心。\n\n### 管理敏感数据\n\n将数据提取到一个全新的、独立的部署中，将需要对现有\
  \ API 调用和应用逻辑进行重大重构。另一种方法可以是使用非分片数据库的 `主分片` 概念来实现混合方法。有关分片的高级详细信息，请参见第 10 章和第 11\
  \ 章。\n\n> **注意**：任何敏感的分片集合已经分布在集群的 *所有* 分片上。对于下面的示例，首先需要 `mongodump` 然后 `mongorestore`\
  \ 这些集合的数据到新的非分片集合中。\n\n### 注意事项\n\n迁移到云基础设施的主要动机之一是，能够在计算资源当前不需要时，通过在云中向上和向下扩展（或完全停止）来整体降低成本。\n\
  \n#### 带宽\n\n有一个主要领域成本实际上可能会增加，那就是 `带宽费用`。本地数据中心之间的网络连接通常有固定的安装费和月度成本，与实际数据传输无关。相比之下，在云中，可用区（AZ）和区域之间的\
  \ `出站` 字节是按千兆字节收费的。但是，到云区域的 `入站` 字节是免费的。这意味着云中的 `mongos` 或辅助节点主要是在读取数据，就带宽成本而言不会很昂贵。没有主要的云提供商对每个可用区\
  \ *内部* 的带宽收费，但会对同一区域内数据中心之间传输的字节收取少量费用。\n\n图 8-6 展示了一个副本集，其两个成员位于两个不同的本地数据中心。第三个成员在云中，还有一个隐藏的非投票成员位于同一云区域的不同可用区中。从云提供商的角度来看，到云中辅助节点的复制流量是\
  \ `入站` 数据。从基于云的 `mongos` 路由器到本地主节点的写入流量，从云提供商的角度看是 `出站`，因此将会被收费。\n\n![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig6_HTML.jpg](img/487346_1_En_8_Fig6_HTML.jpg)\n\
  \n**图 8-6** 展示昂贵带宽的混合部署示例\n\n许多云提供商还包含一个初始层级，其中每月有一定数量的 TB 是免费的。表 8-2 中的数字试图估算一个平均\
  \ MongoDB 集群的价格。价格自然会随着时间的推移而下降，但出站流量与区域内和可用区内流量费用之间的比率有助于解释为什么同一可用区内的副本集通常更便宜。\n\
  \n> **请记住**：应避免将副本集的所有成员部署在单个可用区内，因为这会跳过冗余级别，如果该可用区发生停机。\n\n**表 8-2** 带宽费用比较（所有价格单位为美元/GB）\n\
  \n| 内部出站流量 | | | |\n| --- | --- | --- | --- |\n|   | 每 GB 出站费用 | 区域之间 | 可用区之间 |\n\
  | --- | --- | --- | --- |\n| Microsoft Azure | $0.09 | **$0.09** (与出站到任何其他目的地的费率相同)\
  \ | $0.01 |\n| Google Cloud | $0.13 | $0.01 (美国境内) 至 $0.08 (洲际)，到/来自大洋洲最高 $0.15\
  \ | $0.01 |\n| Amazon EC2 | $0.09 | $0.02 | $0.01 |\n| IBM Cloud | $0.09 | $0.09\
  \ | - |\n| 其他 (例如 Linode, DigitalOcean) | $0.02 | $0.02 | - |\n\n> **注意**：上述托管解决方案均不收取入站流量费用。\n\
  \n### 压缩\n\n在现代 MongoDB 集群中，`集群内通信` 已经被压缩以最小化所需带宽，当一些承载数据的节点最终迁移到云端时，这也带来了最小化带宽费用的愉快副作用。`应用和集群之间`\
  \ (`mongos` 或主节点) 的流量压缩必须通过 `compressors` URI 参数或相应的设置器显式启用。\n\n#### 高可用性\n\n在许多情况下，组织可以访问两个数据中心，通常被指定为主站点和灾难恢复（DR）站点。正如我们已经了解到的，如果一个数据中心离线或被分区，双位置拓扑并不能保证高可用性。\n\
  \n在这些情况下，一些组织选择在云中放置一个仲裁器，以确保剩余数据中心中的一个承载数据的成员可以被选为主节点。然而，任何使用写关注多数（参见第 5 章）的应用程序，如果任一承载数据的成员不可用，将会停滞。\n\
  \n最好的选择是在云中保留完整的承载数据的节点，并对所有通信和静态存储进行加密。通过优化写入和更新工作负载以最小化操作日志，我们保持了复制的低带宽费用。\n\n\
  #### 数据主权\n\n迁移到云端时，我们还需要考虑承载数据节点的 `位置`。公司政策或行业法规可能要求“事实来源”物理上驻留在组织完全控制的服务器上，因此必须在本地。\n\
  \n```javascript\nif (condVar > someVal) {console.log(\"xxx\")}\n```\n\n\n\n####\
  \ 陈旧读取\n\n在某些情况下，我们可以通过读取已复制到云中辅助节点的一些稍微陈旧的数据来降低成本。这种数据可能总是有几秒钟的延迟，但在高写入工作负载期间可能会落后更多。（更多内容请参见辅助读取部分。）\n\
  \n无论如何，具有异步复制的分布式系统的性质意味着，我们永远无法保证辅助节点拥有已经写入主节点的数据。辅助节点根本无法知道主节点已确认但尚未刷新到磁盘的写操作。\n\
  \n因此，**如果你需要读取最新数据，你必须从主节点读取**，并产生任何相关的带宽费用。\n\n### 迁移步骤\n\n让我们设想一下，我们计划开始将完全本地化的应用程序和集群迁移到云端，以便在完全迁移之前积累管理云基础设施的机构知识和专业技能。\n\
  \n对于此示例，我们假设一个仅有两个数据中心的双分片集群，因此此次迁移的部分动机是在云端添加第三个数据中心。另一个动机是将一些应用程序服务器移动到可以每天在高峰工作负载期间上下扩展的云基础设施（图\
  \ 8-7）。\n\n![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig7_HTML.jpg](img/487346_1_En_8_Fig7_HTML.jpg)\n\
  \n图 8-7\n\n最初，数据和应用程序都在本地\n\n#### 云辅助节点\n\n如果我们正在逐步迁移到云，作为第一步，我们有几个不同的选择。一种（如图 8-8\
  \ 所示）是最初将应用程序保留在本地，并将一些辅助节点移动到云端。默认启用 `replication chaining`，这些节点将从其副本集中位于 DC1 或\
  \ DC2 的其他节点之一进行复制。通过将 `priority` 设置为 `0`，我们将确保这些节点永远不会成为其副本集中的主节点。如果主节点在云端，来自 DC1\
  \ 和 DC2 的所有应用程序写入流量都将被路由到云端，而复制流量将返回，从而显著增加云带宽成本。\n\n在云辅助节点拓扑中，带宽费用将适用于传出的心跳，但传入的\
  \ `oplog` 数据是免费的。\n\n![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig8_HTML.jpg](img/487346_1_En_8_Fig8_HTML.jpg)\n\
  \n图 8-8\n\n辅助节点为高可用性提供了第三个位置，但应用程序保留在本地\n\n#### 云应用程序\n\n另一个第一步是将一些应用程序移动到云端，通过在停机期间缩减应用程序来节省成本（见图\
  \ 8-9）。在这个阶段，我们通常会看到内部应用程序保留在本地。这些可能是来自遗留系统的写密集型 *提取、转换和加载* (ETL) 工作负载，以及内部分析查询工作负载等。\n\
  \n根据我们的最佳实践，我们将 `mongos` 路由器放置在与应用程序和微服务相同的区域/区域中。\n\n在这个拓扑中，我们看到我们正在为从 `mongos`\
  \ 到主节点的写有效负载支付传出带宽费用。用于读取的传出请求数据包通常比返回到云的结果数据小，这使得这些操作很便宜。\n\n![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig9_HTML.jpg](img/487346_1_En_8_Fig9_HTML.jpg)\n\
  \n图 8-9\n\n只有自动扩展的应用程序被移到云端\n\n#### 完全混合\n\n自然的下一步是将应用程序和节点都组合在云端（见图 8-10）。与之前一样，`{priority:\
  \ 0}` 确保云节点永远不会成为主节点，因为我们假设大部分写操作仍然源自本地应用程序。\n\n我们需要为从云应用程序传出的任何字节支付带宽费用。然而，在这种情况下，客户端应用程序写入不多，因此云中的\
  \ `mongos` 和辅助节点主要*接收*字节，这不会产生费用。\n\n![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig10_HTML.jpg](img/487346_1_En_8_Fig10_HTML.jpg)\n\
  \n图 8-10\n\n允许在云中进行辅助读取的混合拓扑\n\n#### 非对称分片\n\n我们将探索的最后迭代包括非对称分片，分片 A 完全位于本地，分片 B\
  \ 大部分在云端，但所有数据至少有一个副本在本地（图 8-11）。\n\n![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig11_HTML.jpg](img/487346_1_En_8_Fig11_HTML.jpg)\n\
  \n图 8-11\n\n一个高级拓扑，其中一个分片主节点在云端\n\n通过仔细地将某些数据库“归属”到分片 A 或分片 B，我们可以确保敏感的未分片集合完全位于本地。当由于公司政策或法规，某些数据子集不能存储在云中时，这可能很有用。\n\
  \n请注意，通过只有两个数据中心，我们在分片 A 中失去了高可用性。但是，如果 DC2 宕机，内部应用程序实际上不会受到影响。\n\n在云区域中，可以将两个节点放置在不同的可用区（AZ）中以提供所需的冗余。\n\
  \n#### 数据库结构\n\n图 8-12 展示了如何在我们的混合集群上部署两个数据库的示例。分片 A 物理上位于本地数据承载节点上，因此虽然它的分片集合（例如\
  \ `sharded1`）会有一半数据在分片 B 中从而在云节点上，但未分片的集合（如 `onprem1` 和 `onprem2`）保证存储在完全受控的本地主机上。默认情况下，没有任何措施可以阻止云上具有足够权限的应用程序查询\
  \ `db1.onprem1` 并将一些机密数据传输到公共云。\n\n![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig12_HTML.jpg](img/487346_1_En_8_Fig12_HTML.jpg)\n\
  \n图 8-12\n\n主要供云使用的数据库可以大部分存储在云中\n\n一个完全不同的替代方案是使用近期的*字段级加密*（FLE）机制（参见第 4 章），该机制在官方驱动程序内部对某些字段或子文档进行加密和解密。这意味着没有机密数据会以未加密形式到达数据库，因此要求某些类别的数据只能持久化在本地的合规规则可以得到满足。\n\
  \n#### 访问控制\n\n为了完全防止某些数据“泄露”，云上的应用程序可以连接一个只对 `db2` 具有读/写访问权限的用户，因此无权查询 `db1` 中包含的机密数据。\n\
  \n在清单 8-1 中，我们为每个应用程序定义一个用户。面向客户的云应用程序的用户将不被允许访问 `db1`。\n\n```javascript\n// The\
  \ on-prem application user can access both databases\ndb.createUser(\n{\nuser: \"\
  userPrem\",\npwd: \"......\"\nroles: [\n{ role: \"readWrite\", db: \"db1\" }\n{\
  \ role: \"readWrite\", db: \"db2\" }\n],\n}\n)\n// The cloud application user can\
  \ only access db2\ndb.createUser(\n{\nuser: \"userCloud\",\npwd: \"......\"\nroles:\
  \ [\n{ role: \"readWrite\", db: \"db2\" }\n],\n}\n)\n// Listing 8-1\n// Create cloud\
  \ user which can’t read private db1\n```\n\n在 MongoDB 3.6+ 中，你可以使用 `authRestrictions`^(⁹)\
  \ 进一步将用户账户限制为从特定的 IP 地址或 CIDR 范围连接。例如，本地账户可能仅对来自本地地址范围的登录有效。在处理高度机密数据时，创建两个完全独立的部署通常更简单、更安全，这些部署可以根据各自的数据增长通过分片进行水平扩展。\n\
  \n\n\n### 自定义写关注点\n\n假设我们已经确定采用混合拓扑结构：两个位于私有数据中心的承载数据节点，以及一个位于云端的节点。虽然我们已防止云端节点成为主节点，但应用程序并不知晓这两个本地节点具有特殊属性。例如，我们可能希望确保当使用\
  \ `majority` 写关注点执行操作时，由这两个本地节点确认写入。这样，如果其中一个本地节点宕机，另一个可以立即接管主节点角色，而无需先追赶操作日志。\n\
  \nMongoDB 支持自定义写关注点来满足这类用例。现在我们将创建一个名为 `OnPrem` 的写关注点，以确保始终包含 `dc1` 和 `dc2` 中的节点。\n\
  \n首先，我们需要为每个分片副本集中的节点添加 `dc` 标签：\n\n```\nconf = rs.conf();\nconf.members[0].tags\
  \ = { \"dc\": \"dc1\"};\nconf.members[1].tags = { \"dc\": \"dc2\"};\nconf.members[2].tags\
  \ = { \"cloud\": \"aws-us-east1\"};\nrs.reconfig(conf);\n```\n\n然后，我们可以在每个副本集中创建自定义写关注点：\n\
  \n```\nconf = rs.conf();\nconf.settings = { getLastErrorModes: { OnPrem : { \"dc\"\
  : 2 } } };\nrs.reconfig(conf);\n```\n\n这会创建一个名为 `OnPrem` 的自定义写关注点，*仅*当写入在具有 `dc`\
  \ 标签*不同*值的两个成员上被确认时，该条件才被视为满足。\n\n最后，应用程序可以按如下方式使用此自定义写关注点：\n\n```\ndb.myCollection.update(\n\
  { id: 123 },\n[ { $set: { value: \"abc\", lastUpdated: \"$$NOW\"} ],\n{ writeConcern:\
  \ { w: \"OnPrem\" } }\n)\n```\n\n在我们这个三成员分片中，`OnPrem` 写关注点意味着两个本地节点都必须确认写入。如果任何一个本地节点不可用，任何指定了此写关注点的写入操作都将超时。在\
  \ DC1 和 DC2 中添加更多成员并创建 PS|SS|S 拓扑结构将提供更好的容错能力。\n\n### 物联网\n\n物联网已成为大规模分布式系统的代名词，这类系统包含大量小型设备，通过网络进行通信，通常收集数据以供后续整理和分析。\n\
  \n有许多关于大规模物联网服务的用例示例和博客文章，重点讨论所需的模式设计，这超出了本书范围。通常，传感器和执行器与边缘网关通信，网关对传入的数据流进行初步处理和聚合，并准备存储。\n\
  \n从拓扑设计角度看，主要问题在于所需的庞大连接数量，如图 8-13 所示。大多数使用 MongoDB 驱动程序的应用程序会打开一个到数据库的连接池以供重用。\n\
  \n![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig13_HTML.jpg](img/487346_1_En_8_Fig13_HTML.jpg)\n\
  \n*图 8-13. IoT 设备直接连接到 MongoDB*\n\n#### 连接管理\n\n对于作为*微服务*运行的应用程序，需要将连接池大小（每个服务/Pod/API）精确调优，以避免过多的开放连接压垮主节点或\
  \ `mongos`。在物联网场景中，可能有数百万台设备各自连接到数据库进行更新，这个问题会更加严重。\n\n#### 短期连接\n\n对于物联网，简单的解决方案是根本不维持开放连接。相反，将数据累积到预定义的存储桶中，然后每小时（或更不频繁）仅创建一次\
  \ `MongoClient` 对象并建立数据库连接，以分享该小时的数据摘要。假设这些数据可以在几秒钟内插入，那么数千台设备平均在任何时间点只会打开一个到集群的连接。\n\
  \n#### 写入扩展\n\n对于数百万台设备，您可能需要考虑分片集群。这将允许您将数据拆分为子集，每个子集有一个可以接受写入操作的主节点。这为高插入/更新工作负载提供了横向扩展能力。\n\
  \n如果您预计将在全球部署设备，并希望确保对 MongoDB 部署的低延迟写入操作，请参阅第 6 章了解全球拓扑结构的更多细节，以及第 10 章和第 11 章了解高级分片主题。\n\
  \n### 内存存储\n\n随着 WiredTiger 存储引擎的出现（自 3.4 版起成为默认引擎），MongoDB 还为企业客户添加了纯内存存储引擎。内存存储引擎不会将任何数据持久化到磁盘，因此适用于一些利基用例，其中可预测的延迟至关重要，并且数据可以纯粹在内存中读写。当在副本集中配置时，存在较低但非零的风险，即所有节点可能同时故障，导致数据完全丢失。显然，这不适用于任何需要长期持久化数据的系统。一种解决方案是部署第四个隐藏节点，运行正常的\
  \ WiredTiger 存储引擎，将数据持久化到磁盘（图 8-14）。通过将其与主节点置于同一数据中心，我们可以通过最小化网络延迟来确保最佳的复制性能。\n\n\
  ![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig14_HTML.jpg](img/487346_1_En_8_Fig14_HTML.jpg)\n\
  \n*图 8-14. 包含一个 WiredTiger 节点的内存部署*\n\n由于内存存储引擎不会将数据刷新到磁盘，几乎没有 I/O 需求，人们很容易认为它可以比正常的\
  \ WiredTiger 配置以更高的速度处理数据。有趣的是，在大多数情况下，吞吐量几乎相同，特别是在副本集中，网络延迟使得复制成为瓶颈。\n\n总的来说，虽然有趣，但这种存储引擎并未被广泛使用，因为\
  \ WiredTiger 性能相似，即使在进程或服务器重启后也能保持数据持久性。\n\n### 移动数据承载节点\n\nMongoDB 复制系统被设计为具有自动故障转移功能的分布式系统。写入始终在主节点上发生并被复制。分片允许我们拥有多个主节点来扩展工作负载，但每个主节点都有明确的“范围”，没有重叠，也没有冲突风险。\n\
  \n某些用例需要一种主-主配置类型，其中两个隔离的节点都接受相同文档范围的写入，但这需要冲突解决机制。\n\n在接下来的内容中，我们将探讨此类系统的一个例子：移动数据承载节点。最后我们将看到，这种方法充满了妥协。\n\
  \n#### 场景\n\n假设我们正在运营一支赛车队，我们需要在一个赛季中将一套复杂的设备从一个场地移动到另一个场地。这套设备将包括一个移动计算设备机架和一个\
  \ MongoDB 数据库。还有一个工厂位置，团队的其他成员在那里测试新设备和场景，也需要访问相同的数据。\n\n一些比赛场地可能有良好的互联网连接，而另一些可能完全没有互联网连接。\n\
  \n随着我们从一个比赛移动到另一个比赛，移动计算设备可能一次离线数周。在此期间，工厂中的数据库需要保持在线、可用且可修改。\n\n更困难的是，移动数据库是比赛准备工作的关键组件，因此任何停机都是不可接受的。因此，我们实际上会携带两个数据承载节点以实现冗余。\n\
  \n那么问题是：我们如何设计一个拓扑结构，以提供高可用性，其中两个节点在大部分时间处于离线状态，并且允许从两个位置进行写入？\n\n\n\n### 解决方案\n\
  \n我们将通过几个示例来更好地理解这些需求的难度。在图 8-15 中，我们看到一个简化方案，该方案在移动“工具包”中包含了两个位于不同主机上的节点以增加冗余度，并在工厂中包含一个节点。请注意，工厂节点没有优先级，因此不会成为主节点。在移动工具包中，一个节点的规格较低（CPU\
  \ 核心数、内存），以节省资源成本，并且被赋予较低的优先级，因此它通常保持为辅助节点。\n\n![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig15_HTML.jpg](img/487346_1_En_8_Fig15_HTML.jpg)\n\
  \n图 8-15：使用移动工具包的简化方案\n\n当移动环境在线时，我们拥有一个相当标准的副本集，只是我们强制让一个移动节点成为主节点。这意味着当移动工具包连接互联网时，工厂位置可以写入数据，否则只能读取数据（参见图\
  \ 8-15，右侧）。\n\n#### 固定站点冗余\n\n虽然我们有了移动冗余，但我们无法承受工厂的任何读取停机时间，因此我们将在工厂中添加第二个承载数据的节点。我们必须添加一个仲裁节点以获得奇数个成员。我们将把仲裁节点添加到移动工具包中，以便在两个环境因无互联网而被分区时，它能托管多数票。\n\
  \n图 8-16 展示了这个新的五成员拓扑结构，该结构在两者分区或移动工具包关闭时，对工厂具有相同的限制。\n\n![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig16_HTML.jpg](img/487346_1_En_8_Fig16_HTML.jpg)\n\
  \n图 8-16：一个更复杂、具有冗余性的移动部署\n\n#### 多主节点\n\n现在我们希望整合对多主节点副本集的需求。至少工厂需要能够在移动环境分区时临时写入数据。在图\
  \ 8-17 中，我们重新构建了拓扑结构，将一个仲裁节点放在工厂，并给一个节点较低的优先级。现在当两者分离时，将进行选举，工厂中的节点 1 将自动成为主节点。在移动环境中，需要一些手动干预来强制指定主节点。我们要么使用\
  \ `rs.reconfig()` 删除工厂仲裁节点的条目，要么为移动仲裁节点创建一个新条目。一种有风险的方法是编辑所有移动主机上的 `/etc/hosts`\
  \ 文件，将工厂仲裁节点的主机名覆盖为运行在移动工具包主机上的某个主机名。由于仲裁节点没有状态或任何数据，运行在移动环境中的 `mongod` 进程可以轻松接管此角色。\n\
  \n![../images/487346_1_En_8_Chapter/487346_1_En_8_Fig17_HTML.jpg](img/487346_1_En_8_Fig17_HTML.jpg)\n\
  \n图 8-17：一个支持多主节点的移动部署\n\n现在，我们已成功强制实现多主节点设置并创建了一个 `脑裂集群`，尽管选举任期机制应能阻止其中一方接受冲突的写入操作。\n\
  \n此时，如果互联网恢复并且仲裁节点主机名的重映射被重置，两个环境中的节点数据将可能不一致，可能有完全不同的文档共享相同的 `_id` 主键值。为避免损坏副本集并恢复稳定的复制，需要擦除其中一组节点（节点\
  \ #1 和 #2，或者节点 #4 和 #5）的数据文件并初始化初始同步。\n\n实际上，这种主-主拓扑需要手动重新配置。当副本集重新统一时，将会发生数据丢失。MongoDB\
  \ Realm 将提供用于实现离线移动设备和自动冲突解决的工具包，或许可以满足许多类似此场景的用例，而无需任何集群级别的定制。\n\n## 关键要点\n\n从本章中，需要记住的关键概念如下：\n\
  \n*   虽然 MongoDB 确实支持许多自定义配置，但其中大多数都伴随着各种权衡。\n\n*   与大多数信息技术挑战一样，定制解决方案需要在业务目标和一系列妥协之间取得平衡。\n\
  \n*   使用 Kerberos 或 LDAP 进行外部认证，可以通过负载均衡和启用连接重试来实现扩展。\n\n*   混合本地/云集群可以带来一些有用的好处，例如在保持私有数据不上云的同时实现应用程序扩展。\n\
  \n*   物联网的数据库存储扩展可以通过控制和关闭连接，以及通过分片增加写入容量来实现。\n\n*   手工打造的主-主拓扑充满了妥协，并且难以实现弹性。MongoDB\
  \ Realm 引入了一个生产就绪的同步和冲突解决系统。\n\n脚注 1   2\n\n### 9. 备份与恢复\n\n本章涵盖与拓扑设计相关的备份决策。我们将探讨\
  \ MongoDB 自身的企业工具，用于对分片集群执行时间点恢复，以及使用脚本对地理分布的集群进行快照，并将备份数据保留在数据来源国内以符合 GDPR 要求。\n\
  \n## 目标\n\n进行备份的主要动机是什么？以下是现实世界中最常见的一些备份用途：\n\n*   回滚因 `开发人员` 错误而进行的更改。这可能是一个在测试中被遗漏的应用程序错误，并且已经开始在整个部署级别损坏数据。\n\
  \n*   回滚因 `客户` 错误而进行的更改。在多租户系统中，可能有客户删除了一些数据，然后意识到这些数据仍然需要。有时可能只需要恢复单个数据库或集合。\n\n\
  *   回滚因 `管理员` 错误而进行的更改。数据库管理员可能意外删除了整个集合，误以为他们连接的是测试/暂存集群。\n\n*   发生全站灾难，生产数据库和所有服务器已完全丢失。在这种情况下，异地备份对于恢复运营至关重要。\n\
  \n*   使用生产系统的最新备份来更新暂存或开发数据库，以便可以在真实、近期的数据上进行测试。\n\n在以上所有情况下，备份都需要反映数据库的一致状态。我们不希望捕获数据文件的快照，其中写入操作仅部分刷写到磁盘，或者写入操作仅部分完成。\n\
  \n大多数组织会定义一个 `恢复点目标` (RPO) 和一个 `恢复时间目标` (RTO) 以确保业务连续性。RPO 是可能丢失的数据更改的时间量。如果我们每\
  \ 12 小时进行一次备份快照，那么最多可能丢失最近 12 小时的数据。RTO 是从灾难发生到数据库能够从备份完全恢复功能所允许的最大时间。某些备份/恢复方法可以比其他方法实现更快的恢复。\n\
  \n## 避免恢复\n\n虽然拥有备份并能够恢复大型、地理分布的分片集群至关重要，但在灾难后使它们重新上线总是很复杂的。我们应尽可能避免人为错误导致此类活动。\n\
  \n\n\n## 测试环境\n\n减少错误的一种方法是对应用程序进行彻底的单元测试和集成测试。从拓扑结构角度来看，我们可以借助建立合适的开发环境（`DEV`）以及用户验收测试或预发布环境（`UAT`）来提供帮助。这些环境应在操作系统版本和安全配置方面与生产环境（`PROD`）尽可能匹配，并使用与生产环境相同的\
  \ MongoDB 版本。\n\n`DEV` 和 `UAT` 环境在 CPU 和内存资源方面容量可以较小，测试数据的规模也应按与 `PROD` 相似的比例缩减。`UAT`\
  \ 环境至少应在分片数量、配置服务器数量以及集合的分片方式上与生产环境拓扑匹配。\n\n例如，如表 9-1 所示，如果你有一个 `PROD` 集群，包含 3 个分片，共\
  \ 6TB 数据，每台主机有 256GB 内存，你可以创建一个 `UAT` 环境：同样是 3 个分片，但每台主机仅 64GB 内存，数据量为 `PROD` 的\
  \ 1/4，即约 1.5TB。这应能保持内存中工作集的比例大致相当，以更接近地匹配性能影响。\n\n表 9-1：基于 `PROD` 规模调整的 `UAT` 和\
  \ `DEV` 环境示例\n\n|   | 拓扑结构 | 资源 | 数据 |\n| --- | --- | --- | --- |\n| `PROD` | 3\
  \ 分片集群 | 每台主机 32 核，256GB RAM | 总计 6TB |\n| `UAT/预发布` | 3 分片集群 | 每台主机 8 核，64GB RAM\
  \ | 总计 1.5TB |\n| `DEV` | 单分片集群 | 每台主机 8 核，32GB RAM | 总计 250GB（分片数为 `UAT` 的 1/3，RAM\
  \ 为 `UAT` 的 1/2） |\n\n> **注意**\n>\n> 如果你需要在生产环境中达到非常具体的性能目标，`UAT` 环境应完全匹配其资源，并恢复近期的备份以使用真实数据进行性能测试。\n\
  \n### 捕获应用程序错误\n\n`DEV` 环境在分片和冗余方面可以更简化。即使生产环境是采用五节点副本集的多分片集群，`DEV` 环境也可以仅使用一个包含三节点副本集的单分片。\n\
  \n`DEV` 环境应能模拟副本集故障切换以及与 `mongos` 的交互，因此仅使用单节点是不够的。通过首先在 `DEV` 环境中测试应用程序变更，应能发现可能损坏或删除有效数据的错误，从而避免因从备份恢复而导致的集群范围回滚。\n\
  \n### 捕获配置错误\n\n主要的集群变更，如分片新集合、添加索引以及任何类型的配置更改，都存在风险，因此应首先在 `UAT` 环境中运行。通过在 `UAT`\
  \ 环境中设置与生产相同数量的分片，数据库管理员可以在功能上与 `PROD` 完全相同的环境中测试分片标签、区域、预分片和迁移影响。\n\n## 非分片集群\n\
  \n备份单节点或单个副本集相对简单，因为只有一个节点接受写入。分片集群则更复杂，因为有多个主节点接受写入，并且文档块可能随时在分片之间迁移。\n\n> **注意**\n\
  >\n> 正如我们在第 1 章讨论过的，单节点绝不应使用于生产环境，因为它完全不提供弹性。然而，在某些情况下，MongoDB 被用于本地开发或研究，此时你可能希望在特定时间点对数据进行快照。\n\
  \n对于适用于单节点或副本集的简单备份，有三种通用方法：\n\n1.  **停止节点**，然后复制数据路径中的所有文件，这可能需要几分钟或几小时。\n2.  使用\
  \ `db.fsyncLock()` **锁定节点**，并进行文件系统快照（这需要像 `LVM` 这样的逻辑卷管理系统），几秒钟后解锁。\n3.  保持**所有节点在线**，运行\
  \ `mongodump` 来复制数据、元数据（但不包括索引本身）以及 `oplog`。\n\n### 完全复制\n\n停止节点进行完全复制是最简单且恢复最快的方法。如果你有足够的磁盘空间来完整复制\
  \ `dbpath`，你将获得所有数据和索引的快照。如果你需要回滚到该时间点，你可以启动一个新的 `mongod` 进程，其 `--dbpath` 参数指向该数据目录，即可立即完成恢复。\n\
  \n由于数据文件默认已经压缩，对此副本进行任何额外的压缩不太可能带来明显的额外空间节省，并且只会在恢复时需要更多时间进行解压缩，从而进一步延迟恢复。\n\n###\
  \ 采取快照\n\n下一种方法是获取干净的文件系统快照。此方法需要使用 Linux *逻辑卷管理器*（`LVM`）的存储卷。借助 `LVM`，你可以构建一个由多个较小物理卷支持的大卷组（`VG`），还可以选择提供一定额外性能和冗余的\
  \ `RAID` 级别。然后，你可以为 MongoDB 节点的数据路径定义一个逻辑卷，并留出一些未分配的空间用于快照。\n\n`LVM` 允许你对卷进行快照。你可以随着时间的推移创建多个增量快照，只有更改的块（称为\
  \ delta）需要存储空间。你可以保留节点 6 小时或每日的快照，其占用的物理存储空间仅为完整独立副本的一小部分。\n\n*弹性块存储*（`EBS`）快照在亚马逊\
  \ `AWS` 上使用了相同的概念。所有主流云供应商也提供类似的快照功能。`EBS` 快照存储在与原始存储卷相同的云区域中。如果你创建了地缘分片集群以遵守全球数据保护法规，你对客户数据的快照自然会驻留在与生产数据相同的国家/地区。你仍然应该加密云备份，以进一步确保满足\
  \ `GDPR` 和其他法规的注意义务条款。有关法律规定的更多详情，请参见第 4 章。\n\n#### 刷新磁盘\n\n在 MongoDB 中采取快照之前的先决步骤非常简单。你需要通过\
  \ Mongo shell 或脚本连接到节点，并在启动快照前发出 `db.fsyncLock()`。这确保任何待处理的磁盘刷新都已完成，磁盘上的状态完全干净，就像你已经干净地关闭了节点一样。然而，此时\
  \ MongoDB 对任何新的写操作都已锁定，因此即使在生产环境中，我们也希望避免这种情况，哪怕只是很短的时间。\n\n#### 触发快照\n\n接下来，可以触发快照（但不一定立即完成），然后你可以立即使用同一个\
  \ Mongo shell 发出 `db.fsyncUnlock()`。这会解除锁定并允许再次写入。`LVM` 和 `EBS` 快照随后可以在它们自己的时间内完成，因为它们将反映快照被触发时的时间点，此时\
  \ MongoDB 数据文件处于干净状态。\n\n#### 恢复快照\n\n这种方法的主要缺点是**恢复数据文件可能很慢**。由于我们采用增量备份以节省空间，恢复特定快照需要将原始状态与更改增量相结合。根据你使用的具体系统、触发备份的频率以及更新旧文档的频率，恢复\
  \ terabytes 的数据可能需要几分钟到几小时不等。\n\n如果你依赖这些备份作为灾难恢复方法，你需要对恢复时间进行实际测试，以确保能够在内部服务级别协议（`SLA`）要求的时间（例如\
  \ `RTO`）内检索到最近的备份。\n\n\n### `mongodump`\n\n当节点写入绝对不能被锁定，或者无法使用 LVM 快照等类似方法时，可以使用\
  \ `mongodump` 命令行工具转储节点（或整个集群）的全部数据。此工具连接到一个节点，遍历所有数据库和集合，转储每个文档。默认情况下，它会创建一个 `dump`\
  \ 文件夹，其中包含每个集合的 BSON 格式数据文件以及包含任何索引规范的相应元数据文件。请注意，为了速度和紧凑性，`它不会转储索引本身`。这可能会使恢复过程非常缓慢，因为所有索引都需要从头开始重建。由于转储需要将所有文档从磁盘加载并解压缩到内存中，在转储完成之前，会对缓存以及随之而来的整体数据库性能产生相当大的影响。\n\
  \n#### 操作日志一致性\n\n转储整个节点可能需要几分钟，有时甚至几小时。你应该选择性地转储一份操作日志副本，并在恢复时应用它，以便获得某个时间点的一致数据版本。否则，你可能在时间点\
  \ 0（t⁰）先转储了集合 `aaa`，但在转储进行到 5 分钟（t⁵）时，应用程序对集合 `aaa` 和 `zzz` 中的文档进行了更改。最终的转储将包含对\
  \ `zzz` 在 t⁵ 的更改，但不包含对 `aaa` 的更改，从而导致数据状态不一致。`mongorestore` 中的 `--oplogReplay` 选项允许你将所有集合一致地恢复到\
  \ `mongodump` 使用 `--oplog` 选项完成时的时间点。\n\n#### 数据子集\n\n如果整个数据库太大，或者你需要将集群的数据子集转储到不同的存储区域以符合\
  \ GDPR 要求，可以使用 `mongodump` 中的 `--query` 选项来过滤数据。例如，如果你想要转储 `customers` 集合的欧盟数据，可以使用以下命令进行转储：\n\
  \n```\nmongodump -d=myDB -c=customers --query='{ \"country\":\n{ \"$in\": [\"BE\"\
  , \"CZ\", \"DK\", \"DE\", \"EE\", ...] }}'\n```\n\n#### 读取偏好\n\n默认情况下，`mongodump`\
  \ 会从主节点读取数据，以确保转储的是最新数据。但如果你想限制对存储 I/O 和工作集缓存刷新的性能影响，可以指定 `--readPreference=secondary`\
  \ 来强制从从节点读取数据。\n\n#### 用于转储恢复的 `Mongorestore`\n\n当需要恢复由 `mongodump` 生成的转储时，`mongorestore`\
  \ 命令将连接到一个集群（无论是否为空），并可以恢复数据，可选择在导入前删除任何现有的集合。\n\n文档恢复后，此命令会读取包含索引定义的元数据，并着手创建索引。根据索引的复杂性、分布和数据大小，`索引构建可能需要数小时或数天`才能完全完成。在此期间，应用程序的操作性能将受到严重影响。对于任何大型数据集，这种漫长的恢复时间是\
  \ `mongodump`/`mongorestore` 方法的主要缺点。\n\n#### 将转储恢复到独立节点\n\n对分片集群进行文件系统快照时，你必须恢复到具有相同分片数的集群。使用\
  \ `mongodump`/`mongorestore`，你可以将分片集群转储到一个统一的备份集中，每个集合一个 BSON 文件。然后，你可以将其恢复到副本集甚至独立节点。这对于使用来自生产环境分片集群的真实数据更新\
  \ DEV 和 UAT 环境非常有用。\n\n### 副本集\n\n备份副本集可以通过前面列出的任何适用于独立节点的方法执行。但是，我们现在可以选择从多个节点中进行备份。主节点是拥有最新写入的节点，但我们不想阻止主节点上的写入，因为这会影响生产环境中的任何应用程序。对于手动备份，从节点通常是一个更好的选择，因为如果应用程序默认从主节点读取，那么除了复制之外，从节点没有其他外部工作负载。更好的方法是添加一个额外的隐藏成员用于备份和其他特殊工作负载。我们可以安全地对这个隐藏节点调用\
  \ `db.fsyncLock()` 或干净地关闭它进行长时间操作，而不会以任何方式影响副本集的可用性或应用程序性能。\n\n### 延迟成员\n\n我们在第\
  \ 2 章中介绍了延迟成员的概念。在某些情况下，这些节点可以用作防止严重人为错误的额外保护。如果没有其他备份可用，如果数据库管理员意外删除了整个集合，或者从每个文档中移除了某个字段，这个延迟成员至少会拥有几个小时前的一致副本。\n\
  \n如果发生灾难，并且活动成员已经复制了数据删除操作，它们可以被关闭，主节点的操作日志被转储，然后重新启动延迟成员并配置为主节点。图 9-1 显示，操作日志可以通过新的主节点*重放*，直到执行错误操作之前的时刻。\n\
  \n![../images/487346_1_En_9_Chapter/487346_1_En_9_Fig1_HTML.jpg](img/487346_1_En_9_Fig1_HTML.jpg)\n\
  \n**图 9-1**\n通过延迟成员恢复\n\n大多数人为错误不需要采取如此极端的措施。延迟成员也可用于查找和导出被意外删除或修改的数据子集。\n\n如果你选择这种方法，应该预先创建并彻底测试操作手册和脚本，以便恢复场景能够尽可能顺利地执行，涉及很少或无需手动步骤。\n\
  \n**注意**\n\n在 MongoDB Atlas 或使用 Ops/Cloud Manager 备份时，你可以利用*可查询备份*来查询连续备份中的某个时间点，并查找旧文档或值。\n\
  \n\n## 恢复性能\n\n作为任何灾难恢复计划的一部分，测试、衡量和优化恢复性能至关重要。为了最大程度地减少停机时间，我们希望将备份物理上靠近参与恢复的主机。如果是在本地托管，您需要平衡将备份保存在异地的要求，同时又要确保网络性能不会因数据下载而延迟，所以备份不能离得太远。\n\
  \n### 分片大小\n\n推荐的最大分片大小为 2TB，原因之一是超过这个大小后，恢复数据就会达到大多数网络的容量极限。例如，如果我们尝试通过千兆连接（实际速度约为每秒\
  \ 100 MB）替换单个 8TB 节点，仅数据传输时间就大约需要 23 小时。\n\n### 云托管\n\n主要的云提供商都提供低成本、长期的文件存储解决方案，适用于存储大型\
  \ MongoDB 备份。它们通常不会公布基准测试，更不用说保证存储传输速度了。恢复时间将取决于中间网络，在同一可用区和区域内的计算实例之间的传输速度要比传输到私有数据中心快得多。请记住，从云存储恢复数据也会产生带宽费用。\n\
  \n### 媒介类型\n\n正如我们在 第 1 章 中介绍的，不同的媒介会有截然不同的吞吐率。简单地复制或下载大型数据文件不会高度依赖寻道时间，因此机械硬盘可能不会比\
  \ SSD 慢很多。但是当通过 `mongorestore` 恢复并构建索引时，SSD 更低的寻道时间可以显著减少整体恢复时间。\n\n### 压缩\n\n从\
  \ `mongodump` 恢复时，文档已经以 BSON 格式存储，并且可以使用 `--gzip` 和 `--archive` 选项在磁盘上进行压缩以减少存储需求。恢复时，解压缩将需要相当多的\
  \ CPU 周期。\n\n### 索引重建\n\n关联的 `.metadata.json` 文件包含集合选项和索引定义，并且将为每个集合重建索引。根据索引的数量和复杂性、字段值的分布以及可用的\
  \ RAM 量，索引构建阶段可能与整个数据写入阶段一样长，甚至更长。\n\n## 分片集群\n\n分片集群比副本集更难进行一致的备份，因为有多个主节点（primary）在执行写入，并且它们可能处于不同程度的负载下。从节点（secondary）也很可能受到这些相同的工作负载差异影响。图\
  \ 9-2 展示了一个全局分片集群，其中每个分片的独立备份存储在同一区域，但配置服务器的数据则备份到 *美洲* 数据中心。\n\n![../images/487346_1_En_9_Chapter/487346_1_En_9_Fig2_HTML.jpg](img/487346_1_En_9_Fig2_HTML.jpg)\n\
  \n**图 9-2**\n为满足 GDPR 合规性而进行备份的分片集群\n\n### 复制延迟\n\n在上面的示例中，分片 A 的某个从节点可能因负载过高而复制延迟了\
  \ 90 秒，而分片 B 的从节点可能仅落后其各自的主节点 1 秒。\n\n从具有不同延迟的从节点进行备份，会导致备份中遗漏不同数量的已确认（但未复制）的写入。但是，从主节点进行备份需要加锁，这会阻塞写入，在生产环境中也是不可接受的。\n\
  \n### 配置服务器\n\n配置服务器也需要备份。它们包含关于哪个分片应包含特定分片键范围内的文档的元数据。此配置也需要恢复，因此一个三分片的集群只能真正恢复回一个三分片的集群，除非已经通过\
  \ `mongos` 执行了单一的统一 `mongodump`。\n\n### 待处理的分块迁移\n\n同时，作为分片平衡操作的一部分，副本集之间可能正在进行分块（chunk）迁移。在迁移期间，一个分块的文档可能同时存在于源分片（donor）和目标分片（recipient）上，之后才会从源分片上清除。\n\
  \n为确保分片集群备份的一致性，我们需要同时停止所有平衡迁移，并在进行文件系统级复制或 LVM 快照之前，锁定配置服务器的主节点以及每个分片的主节点，以将所有写入刷新到磁盘。\n\
  \n请记住，如果您想从从节点进行快照，可以暂时暂停应用程序的写入几秒钟，让从节点追上，然后再进行快照。两种选项都需要应用程序短时间暂停写入。\n\n### 地理分片\n\
  \n每个分片副本集可能存在于一个地缘政治容器内，该容器限制了数据的传输，包括那些保存在加密备份中的数据。为避免违反 GDPR 或其他数据保护法规，我们需要将客户数据保存在同一区域。这有一个积极的好处，即减少延迟，并可能在恢复时提高吞吐量。\n\
  \n唯一需要担心的是，来自配置服务器分块边界的元数据可能会泄露到配置备份中。为安全起见，最好将配置服务器备份存储在法规最严格的国家/地区。\n\n### 快照备份步骤\n\
  \n现在，我们将详细介绍备份过程，以充分理解其中涉及的复杂性。要获取分片集群的一致快照，必须遵循以下步骤。\n\n#### 停止后台操作\n\n在拍摄快照之前，必须将平衡器（balancer）`禁用并停用`。您可以通过连接到\
  \ `mongos` 并运行 `sh.stopBalancer()`，然后等待任何当前迁移完成来实现此目的。任何正在进行的迁移可能需要几分钟才能干净地完成。当\
  \ `sh.getBalancerState()` 返回 `false` 时，平衡器即完全停用，您可以继续下一步。\n\n#### 分片和配置服务器\n\n由于您需要对每个分片和配置服务器副本集分别拍摄快照，这些快照在时间上必然是分开的。如果您拍摄快照时分片集群中仍有任何写入操作处于活动状态，这些操作可能尚未刷新到磁盘。为确保整个分片集群的有效和一致备份，在拍摄任何快照之前，必须停止对集群的\
  \ `所有写入`，并使用 `db.fsyncLock()` 方法将 `所有数据刷新` 到磁盘。\n\n#### 从主节点拍摄快照\n\n对于集群中的每个 `分片`，使用\
  \ Mongo shell 连接到当前的主节点，并运行 `db.fsyncLock()`。在一个单独的窗口中保持此连接打开，以便我们可以轻松地再次解锁该节点。\n\
  \n然后，连接到 `配置服务器` 副本集的主节点，并运行相同的 `db.fsyncLock()` 命令，保持该窗口打开。\n\n此操作将暂时阻止主节点接受来自应用程序的写入。对于应用程序来说，主机会表现为突然停止响应任何通信。重要的是，此操作应仅在指定的非高峰备份时段运行。\n\
  \n现在，通过 LVM 或云提供商存储快照的用户界面或 API `触发文件系统快照`。一旦触发了快照，您无需等待它完全完成。\n\n我们现在应该先在配置服务器上运行\
  \ `db.fsyncUnlock()`，然后在所有分片上运行，顺序与我们锁定时相反。\n\n#### 从从节点创建快照\n\n如果你希望避免应用程序写入被阻塞哪怕几秒钟，你可以选择改为从从节点创建快照。\n\
  \n此选项可能产生不一致的备份，因为从节点是异步复制的。图 9-3 展示了一个集群，其中分片 B 的负载较小，因此其复制延迟也较小（5-10 秒，而 *分片 A*\
  \ 上是 80-90 秒）。首先 *写入 1* 在分片 A 上执行并得到确认。然后 *写入 2* 在分片 B 上执行。当 10 秒后创建快照时，第二次写入会被记录在备份中，但先发生的写入\
  \ 1 在此同一备份快照中不会出现。\n\n![../images/487346_1_En_9_Chapter/487346_1_En_9_Fig3_HTML.jpg](img/487346_1_En_9_Fig3_HTML.jpg)\n\
  \n图 9-3\n\n从从节点创建的、不一致的分片集群备份\n\n最佳实践是使用写关注 `majority`。这将确保最近的写入被复制到至少一个从节点。你可以连接到每个分片副本集的当前主节点，并运行\
  \ `rs.printSlaveReplicationInfo()` 来获取每个从节点复制落后的秒数报告。通过选择在集群写入活动非常少的时间段，当从节点能够立即复制时，你更有可能获得整个集群的一致快照。\n\
  \n针对从节点的操作过程与之前针对主节点的几乎相同。改为锁定分片的从节点，但仍然锁定配置服务器的主节点，然后以相反的顺序解锁它们。\n\n#### 恢复正常操作\n\
  \n现在所有快照都已完成并且所有节点都已解锁，你可以通过连接到任意一个 `mongos` 并运行 `sh.setBalancerState(true)` 来重新启用均衡器。\n\
  \n### 从快照恢复的步骤\n\n手动从文件系统快照恢复一个分片集群也是一个复杂的过程。恢复阶段的关键点如下。\n\n#### 关闭集群\n\n由于我们将用恢复的版本替换磁盘上的数据文件，因此必须完全关闭分片和配置服务器副本集的所有\
  \ `mongod` 和 `mongos` 实例。\n\n#### 恢复配置服务器\n\n首先恢复配置服务器副本集的快照。根据创建快照时使用的 LVM 或云配置类型，这会有所不同。通常你会将快照挂载到一个临时挂载点，然后复制数据文件以替换现有\
  \ `dbPath` 中的文件。\n\n然后，通过注释掉配置文件中的 `replSetName` 和 `clusterRole`，将一个配置服务器节点作为独立实例启动。\n\
  \n一旦该节点启动，使用 Mongo shell 连接到它，并删除 `local` 数据库，因为它包含来自原始节点的特定于实例的数据：\n\n```\nuse\
  \ local\ndb.dropDatabase()\n```\n\n当在具有相同主机名和节点端口的同一集群上恢复时，不需要更改配置。但如果你是作为测试的一部分恢复到不同的主机，或者是为了“迁移”现有集群，你将需要更新\
  \ `config.shards` 集合中的主机名。仔细按照文档操作以确保正确至关重要。\n\n现在是重启配置服务器副本集的时候了，从一个节点开始。首先，关闭我们作为独立实例启动的\
  \ `mongod`。通过取消注释那些行来恢复 `replSetName` 和 `clusterRole` 设置。\n\n我们在删除 `local` 数据库时有效地移除了副本集配置。我们现在应该使用以下命令初始化副本集：\n\
  \n```\nrs.initiate()\n```\n\n这会创建一个包含一个成员的副本集。\n\n现在我们可以清空 `dbPath` 并启动其他配置服务器节点。然后我们使用\
  \ `rs.add(...)` 在已打开的 Mongo shell 连接上将它们添加到集合中：\n\n```\nrs.add(\"config2.bigDB.bigcorp.local:27019\"\
  )\nrs.add(\"config3.bigDB.bigcorp.local:27019\")\n```\n\n然后它们将通过初始同步复制已恢复的数据副本。\n\
  \n#### 恢复分片\n\n我们现在需要恢复每个分片的副本集。我们遵循与恢复配置服务器集相同的步骤，但除了删除 `local` 数据库外，我们还需要创建一个临时管理员用户来清理其他一些元数据。我们将\
  \ `mongod` 作为单节点副本集重新启动，并添加任何其他成员，允许它们从分片初始同步数据。详细步骤记录在 *恢复分片集群*^(¹⁰) 在线文档中。\n\n\
  #### 恢复 mongos 路由器\n\n最后，启动你的 `mongos` 节点，新恢复的分片集群应该就可以使用了。\n\n### 结论\n\n分片集群备份很复杂，但可以使用开源工具实现。人为错误始终存在风险，因此最好开发尽可能自动化此过程的手册或脚本。备份和恢复都应该定期测试，以确保系统按预期工作，并且在需要时能够尽快完成恢复。\n\
  \n## Ops/云管理器\n\n比上述任何手动或自定义解决方案好得多的方法是使用由 MongoDB 公司构建的备份解决方案。MongoDB 企业版许可证包含使用\
  \ Ops Manager 或 Cloud Manager 的可能性。云管理器备份服务也可以单独购买。这两个工具都执行自动备份，并支持包括计划快照、时间点恢复和可查询备份在内的功能。对于副本集，你可以恢复到过去\
  \ 12-24 小时内（取决于你选择的配置）任何选定的时间点，或使用每日、每周或每月的快照之一。\n\n### 时间点恢复\n\n此功能也完全支持分片集群。备份系统将同步的时间标记注入到每个副本集的备份中，允许你执行粒度为\
  \ 15 分钟的一致分片集群恢复。\n\n新版本的 MongoDB 和 Ops/云管理器利用 WiredTiger 存储引擎的原生快照能力，并可以将这些快照保存到\
  \ S3 兼容的块存储中。仍然需要保留 oplog 的副本，以填补从上次快照到所需恢复确切时间之间的空白。\n\n### 其他功能\n\n即使你拥有地缘政治的分片集群，Ops\
  \ Manager 也允许你将每个分片备份到不同的位置，以确保合规性，因为客户数据永远不会离开其原产国。\n\n你还可以从备份启动临时集群以执行部分恢复。可查询备份支持临时查询，并导出集群时间点快照的子集。这使得恢复单个集合或文档变得容易。\n\
  \nOps Manager 提供了一种快速、经济高效且强大的恢复机制，涵盖了所有主要用例，并且只需在 UI 中执行几个步骤即可实现。\n\n\n## 关键要点\n\
  \n从本章中，需要记住的核心概念如下：\n\n*   可以使用低影响的 LVM 快照功能对整个 MongoDB 数据路径进行增量副本备份。云计算存储（如 EBS\
  \ 卷）也提供类似的快照功能。\n\n*   只要节点已停止或写入已首先刷写，就可以通过 `mongodump`、文件系统级副本或快照对单个节点进行备份。\n\n\
  *   为符合 GDPR，备份应与其来源分片存储在同一个国家/地区。\n\n*   由于带宽限制以及需要从增量副本中读取，从文件系统快照恢复通常速度较慢。\n\n\
  *   从 `mongodump` 恢复也可能需要很长时间，因为转储中不包含索引，必须在数据恢复后重建。\n\n*   使用社区工具在一致状态下备份整个分片集群需要暂时暂停写入负载。\n\
  \n*   使用 Ops Manager 和 Cloud Manager 等企业工具，可以在线备份分片集群，且对工作负载无影响。\n\n*   借助企业版备份功能，可以将副本集恢复到任意时间点，将分片集群恢复到任意\
  \ 15 分钟间隔的时间点。\n\n*   企业工具还支持可查询备份，以便从特定时间点仅恢复一个集合，甚至单个文档。\n\n脚注 1\n\n"
- "# 10. 高级分片\n\n在本章中，我们通过规划处理海量数据集或极高写入负载的部署，来扩展关于分片的讨论。我们将回顾在这些情况下分片面临的挑战，并探讨随着数据增长避免或缓解问题的方法。\n\
  \n由于我们处理的是分片，本章中展示的所有示例和命令都必须始终通过 `mongos` 实例运行，切勿直接在分片本身上执行。\n\n## 分片的适用场景\n\n\
  根据数据规模和访问模式，有几种不同的扩展选项。如果你的数据库较“小”，数据量小于 2TB，那么副本集通常是首选拓扑，因为它避免了分片集群的开销。\n\n如果你的应用程序是\
  \ `写密集型` 的，并且你发现主节点的每秒输入/输出操作数 (`IOPS`) 超出了存储层的容量，那么增加存储吞吐量是扩展的最佳方法。如果应用程序执行大量 `小型随机读取`，这可能意味着没有明确的活动数据集，在这种情况下，瓶颈可能既在于存储的寻址时间，也在于有限的内存。\n\
  \nMongoDB 会将文档缓存在内存中，因此如果你有一组常见的文档（在我们的电商示例中，可能是活跃的购物者和商店中最受欢迎的 10,000 个商品列表），那么节点的内存资源应足以将这些文档保留在内存缓存中。\n\
  \n## 分片键\n\n正如我们在第 1 章和第 6 章所讨论的，选择最优的分片键可能是一个困难的设计决策，需要在均衡数据分布、最小化平衡操作以及最大化查询尽可能定位到单个分片的需求之间取得平衡。\n\
  \n### 热分片\n\n如果你的分片键配置得使得某个时间点的大多数插入操作都被路由到同一个分片，那么该分片就被称为 `热分片`。务必小心避免 `热分片`，因为它们会损害整体吞吐量，并导致再平衡问题。\n\
  \n#### 对吞吐量的影响\n\n将所有操作路由到单个分片就失去了分片集群的所有优势，因为所有写入负载都由单个主节点处理。理想情况下，我们希望所有写入操作（插入、更新和删除）都能均匀地分布到所有分片主节点上。\n\
  \n在图 10-1 中，一个应用程序正在插入基于当前时间生成的自动生成的 `UUID` 文档。结果，所有这些文档都落在 `533000001` 到 `B200000`\
  \ 的范围内，并被发送到分片 B。\n\n![../images/487346_1_En_10_Chapter/487346_1_En_10_Fig1_HTML.jpg](img/487346_1_En_10_Fig1_HTML.jpg)\n\
  \n图 10-1. 所有写入负载都流向一个热分片\n\n#### 对再平衡的影响\n\n`热分片` 不仅会降低批量导入的吞吐量，还需要将这些文档迁移到其他地方。如图\
  \ 10-2 所示，对于写入 `热分片` 的 300GB 数据，平衡器需要从该分片再次读取 200GB 数据，以便向其他每个分片写入 100GB。\n\n![../images/487346_1_En_10_Chapter/487346_1_En_10_Fig2_HTML.jpg](img/487346_1_En_10_Fig2_HTML.jpg)\n\
  \n图 10-2. 导入到热分片时的最坏情况\n\n如果直接写入每个分片，`I/O` 影响仅为总共写入 300GB，而不是写入 500GB 加上读取 200GB。图\
  \ 10-3 展示了这种最佳情况。\n\n![../images/487346_1_En_10_Chapter/487346_1_En_10_Fig3_HTML.jpg](img/487346_1_En_10_Fig3_HTML.jpg)\n\
  \n图 10-3. 每个分片接收均等数据且无需迁移的最佳情况\n\n### 唯一值\n\n在所有 `MongoDB` 集合中，`_id` 字段充当主键，并始终具有带有唯一约束的相应索引。这可以防止在独立实例或副本集中出现任何两个\
  \ `_id` 值相同的文档。在进行分片时，重要的是要理解唯一约束是每个分片 `本地` 的。假设你在集合中创建了两个唯一索引：\n\n```\ndb.members.createIndex(\
  \ { \"userName\": 1 }, { unique: true } )\ndb.members.createIndex( { \"uuid\": 1\
  \ }, { unique: true } )\n```\n\n然后使用其中一个进行分片：\n\n```\nsh.shardCollection(\"myDb.members,\
  \ { \"uuid\": 1}, true)\n```\n\n这里的 `shardCollection` 中的第三个参数告诉分片系统在此分片键上维护唯一约束。因此，现在我们确保了\
  \ `uuid` 值在每个分片内部以及集群级别都是唯一的。\n\n然而，我们 `在集群级别` 对 `userName` 没有这样的约束。想象一下，两个新用户从两个不同的应用程序服务器同时注册并选择了\
  \ `相同` 的用户名。我们实际上会看到通过一个或多个 `mongos` 实例提交的两个插入操作：\n\n```\ndb.members.insertOne({\
  \ _id: ObjectId(...123),\nuuid: \"0123-abcd...\", userName: \"logikewl\", ...)\n\
  db.members.insertOne({ _id: ObjectId(...456),\nuuid: \"4567-efab...\", userName:\
  \ \"logikewl\", ...)\n```\n\n如你所见，自动生成的 `_id` 值和应用程序生成的 `uuid` 值都如预期那样是唯一的。因为我们是在\
  \ `uuid` 上分片的，这两个插入很可能被发送到不同的分片。假设第一个插入到分片 A，第二个插入到分片 B（参见图 10-4）。也很可能没有其他用户使用该用户名，因此两个插入在分片级别都成功了，但现在我们的系统中有两个具有相同用户名的\
  \ `members`。\n\n![../images/487346_1_En_10_Chapter/487346_1_En_10_Fig4_HTML.jpg](img/487346_1_En_10_Fig4_HTML.jpg)\n\
  \n图 10-4. 分片级别的唯一约束可能被违反\n\n注意\n\n`ObjectId` 数据类型高度随机的特性意味着，上述场景中插入两个 `_id` 值相同的文档的可能性极低。\n\
  \n\n\n### 分片键与唯一字段\n\n当分片键不是 `{_id: 1}` 时，可能会出现两个文档具有相同的 `_id` 字段但存在于不同分片上的情况（因为\
  \ `_id` 索引的唯一性约束是在每个分片上独立存在的）。\n\n#### 基于 `_id` 分片\n\n仅使用主键字段 `_id` 本身通常不是一个好的分片键选择。对\
  \ `_id` 字段使用 `ObjectId` 数据类型或使用自增 ID 可能会导致热点分片。`ObjectID` 的开头几个字节是一个日期/时间戳，因此即使由不同的应用服务器生成，它们的排序顺序也几乎相同。\n\
  \n虽然整数 ID 通常是递增的，但如果您的应用程序能生成带有随机前缀的 `UUID`，则可以避免热点分片问题。\n\n有许多更好的选择，例如使用 ID 的哈希值（例如\
  \ `{_id: \"hashed\"}`），这应该能更均匀地将文档分布到各个分片上。\n\n如果您几乎总是查询其他重要字段，可以使用复合分片键，如 `{country:\
  \ 1, _id: 1}`，以受益于分片定位优化。\n\n#### 非唯一分片键值\n\n分片键没有唯一性要求，并且当多个文档共享同一个分片键值时，也不会立即引发性能问题。\n\
  \n关于多个文档共享相同分片键值的主要担忧是，最终可能会创建一个 `jumbo chunk`（超大块）。这是指一个无法再拆分且大于最大块大小（默认为 `64MB`）的数据块。由于性能影响，平衡器不会迁移超大块，这最终可能导致分片不均衡。\n\
  \n### 基于时间的分片键\n\n使用存储*当前*日期或*插入*日期的字段作为分片键是一个糟糕的选择，因为它本质上是递增的。如果您是基于不同的日期（如客户的出生日期）进行分片，只要文档不是按此顺序批量加载，可能不会造成问题。\n\
  \n以当前日期开头的复合分片键，当它是键中的第一个字段时，同样存在问题。因此，像 `{insertDate: 1, custId: 1}` 这样的分片键很可能会导致热点分片。而像\
  \ `{custId: 1, insertDate: 1}` 这样的键则能为基于 `custId` 过滤的查询提供良好的分片定位，但如果客户 ID 值是单调递增的，同样会创建热点分片。\n\
  \n本章后面，我们将探讨一些通过预拆分技术高效地将数据批量加载到分片集合中的方法。\n\n### 哈希分片键\n\n当以“哈希”方式对集合进行分片时，使用 `numInitialChunks`\
  \ 将集合预拆分为指定数量的块（例如 1024 个）。在开始导入工作负载之前，让平衡器先迁移这些空块。\n\n当您加载数据时，随着文档的添加，这些块会被拆分以确保它们保持在块大小限制之内。这种拆分只是更新配置服务器中的元数据，并不实际需要在分片本身上进行\
  \ I/O 操作。由于哈希算法保证了良好的分布性，在大多数情况下，即使经过额外的拆分，也几乎不会出现块不平衡，因此不需要通过迁移块来恢复分片间的平衡。\n\n\
  然而，如果原始值的基数不足，哈希分片键仍然会导致超大块和平衡问题。\n\n### 优化键\n\n即将发布的 MongoDB 版本（4.4 及更高版本）将允许通过添加一个额外字段作为复合分片键来优化现有的分片键。如果当前分片键的选择性不够，并且产生了过大而无法迁移的超大块，这种方法会很有用。\n\
  \n### 高级拆分\n\n在大多数情况下，只要分片键选择得当，MongoDB 的原生行为会自动平衡数据，同时拆分活动块并将其重新分配到各个分片上。\n\n**注意**\n\
  \n每当操作分片配置或块时，您应首先通过运行 `sh.stopBalancer()` 来停止任何平衡活动。完成更改后，不要忘记再次使用 `sh.startBalancer()`\
  \ 重新启动平衡器。\n\n在以下部分中，我们将探讨一些手动拆分有益的情况。\n\n#### 提前拆分\n\n当您即将向 MongoDB 中的一个新集合加载大量数据时，在加载开始之前**预拆分**集合非常重要。这避免了在操作期间拆分和移动块的开销。文档将直接插入到最终所在的分片上。\n\
  \n由于平衡是在块级别计算的，因此定义将包含大致相同数量待加载文档的块范围非常重要。我们要避免创建不包含任何文档的块，因为这最终会导致集群在每个分片存储的字节数方面不均衡。\n\
  \n在图 10-5 中，我们看到一个集群，每个分片上有 20 个块。然而，由于自动拆分算法的特性，原始分片 A 上的块往往每个块包含稍多的文档，这意味着分片 A\
  \ 在字节大小上要大 30%。\n\n![../images/487346_1_En_10_Chapter/487346_1_En_10_Fig5_HTML.jpg](img/487346_1_En_10_Fig5_HTML.jpg)\n\
  \n图 10-5\n\n预拆分可能导致分布不均的块\n\n#### 手动拆分\n\n如果分片键/值的分布是预先已知的，并且我们没有使用哈希分片键，那么我们可以通过脚本手动进行预拆分。\n\
  \n假设我们运行一个学校系统，其中学号是按升序分配的。这不是单字段分片键的好选择，我们将在本示例中探讨一些相关问题。\n\n之前的数据库包含 200,000 名过去和现在的学生记录，我们想要加载这些数据。我们将定义\
  \ 100 个块，每个块将包含 2000 个文档。我们可以在空的分片集合 `students` 上使用以下脚本来实现这个目标：\n\n```javascript\n\
  for (var i = 0;  i < 100; i++) {\nsh.splitAt(\"school.students\", { studentId :\
  \ 2000*i } );\n}\n```\n\n如果我们立即意识到第一个学号是从 5000 开始的，我们可以安全地合并前两个相邻的空块：\n\n```javascript\n\
  db.adminCommand( {\nmergeChunks: \"school.students\",\nbounds: [ { studentId : MinKey\
  \ },\n{ studentId : 6000 } ]\n} )\n```\n\n请注意，我们永远不能直接删除一个块，因为块的定义范围必须跨越从 `MinKey`\
  \ 到 `MaxKey`（本质上是从负无穷到正无穷）。\n\n一旦平衡器移动了块，我们将看到块在可用分片之间均匀分布，如代码清单 10-1 所示的 `sh.status(true)`\
  \ 输出结果。\n\n```javascript\nschool.students\nshard key: { \"studentId\" : 1 }\nunique:\
  \ false\nbalancing: true\nchunks:\nshardA    34\nshardB    34\nshardC    33\n{ \"\
  studentId\" : { \"$minKey\" : 1 } } -->> { \"studentId\" : 0 } on : shardA Timestamp(2,\
  \ 0)\n{ \"studentId\" : 0 } -->> { \"studentId\" : 2000 } on : shardC Timestamp(3,\
  \ 0)\n{ \"studentId\" : 2000 } -->> { \"studentId\" : 4000 } on : shardB Timestamp(4,\
  \ 0)\n{ \"studentId\" : 4000 } -->> { \"studentId\" : 6000 } on : shardC Timestamp(5,\
  \ 0)\n{ \"studentId\" : 6000 } -->> { \"studentId\" : 8000 } on : shardC Timestamp(6,\
  \ 0)\n{ \"studentId\" : 8000 } -->> { \"studentId\" : 10000 } on : shardA Timestamp(7,\
  \ 0)\n代码清单 10-1\nsh.status() 的输出，显示新分布的空块\n```\n\n现在，我们之前的 `mergeChunks` 命令将会失败，因为该范围内的块位于不同的分片上，无法再轻易合并。\n\
  \n\n\n### 预分片哈希分片键\n\n如果我们想确保良好的数据分布，并且知道在所有查询中主要使用特定的`studentId`进行筛选，那么可以基于哈希分片键进行分片，并立即创建\
  \ 1024 个初始数据块：\n\n```javascript\ndb.adminCommand( {\n    shardCollection: \"school.students\"\
  ,\n    key: { studentId: \"hashed\" },\n    numInitialChunks: 1024\n} )\n```\n\n\
  请注意，任何基于`studentId`值范围进行筛选，或完全不包含`studentId`的查询或聚合操作，都将在每次操作中命中**所有**分片，无法受益于分片的水平扩展能力。对于这类常见的查询模式，应避免使用哈希分片键。\n\
  \n### 预分片 UUID\n\n如果我们需要在 UUID 或其他随机分布的十六进制值上进行预分片怎么办？UUID 中的每个字符可以是`0`–`9`和`a`–`f`，共\
  \ 16 种可能的值。\n\n让我们将 UUID 范围分成 1024 个数据块。为此，我们至少需要 3 个十六进制位（`16² = 256`，但`16³ = 4096`），并且我们将把它们放在最高有效位（即最左边的\
  \ 3 位）来定义范围。以下脚本将创建这些数据块：\n\n```javascript\n// 为每一位使用 for 循环\nfor ( var x=0; x <\
  \ 16; x++ ){\n    for( var y=0; y < 16; y++ ) {\n        // 对于最内层循环，我们每次增加 2，以获得总共\
  \ 2048 次迭代\n        // 我们只使用 z=0,4,8,16\n        for ( var z=0; z<16; z+=4 ) {\n\
  \            // 现在构造 UUID，用 0 填充\n            // toString 方法接受一个参数来指定进制\n      \
  \      var prefix = \"\" + x.toString(16) + y.toString(16) +\n                 \
  \        z.toString(16) + \"00000000000000000000000000000\";\n            // 创建相应数据块的\
  \ split 命令\n            db.adminCommand( { split : \"school.students\" ,\n     \
  \                          middle : { _id : prefix } } );\n        }\n    }\n}\n\
  ```\n\n### 负载定向\n\n预分片还提供了控制数据流的另一个方面。由于数据块在导入开始前就已定义，你可以快速移动数据块并将特定范围的数据分配给分片，可以手动使用`moveChunk`完成，也可以通过区域分片完成（更多示例请参见第\
  \ 6 章）。\n\n如果你拥有**不对称的分片**，其中一个分片存放近期数据，其他分片存放历史数据，那么你可以确保文档直接导入到目标分片上，无需后续迁移。\n\
  \n### 无预分片的批量加载\n\n如果你无法提前知道数据分布，这里有一些技巧可以高效地批量加载数据，而无需手动预分片。\n\n#### 采样与平衡\n\n\
  一种方法是导入一小部分数据，直到创建了`N`个数据块。现在暂停导入，让平衡器将这些数据块迁移到可用的分片上。如果样本具有代表性，当我们恢复导入时，分片负载应该是分布得相当合理的。\n\
  \n#### 随机化顺序\n\n按分片键排序的数据进行批量加载，注定会带来最差的性能，因为负载会一次集中在一个分片上。避免此问题的一种方法是**随机化**待导入数据相对于分片键的顺序。如果你选择分片键是为了优化应用程序生命周期内的读取和更新，那么通过**不**按升序加载数据，你可以大大减少数据加载阶段的时间。\n\
  \n如果你能随机化从旧系统导出的数据，或按不同字段（例如，学生的姓氏而不是 ID）对其进行排序，那么后续的新文档更有可能被发送到不同的分片，从而平滑每个分片的负载并最大化吞吐量。\n\
  \n### 拆分现有分片\n\n假设你有一个两分片的集群，其当前计算资源即将达到上限，而且获得购买必要新硬件的批准需要一段时间。我们最近获批增加两个新的分片。如何高效地实现这一点？\n\
  \n#### 初始加载\n\n在负载很重的系统下，将新分片链接到集群后的最初几个小时将是最关键的，因为除了现有的应用程序工作负载**外**，还有数据块迁移。迁移需要在源分片上进行大量的*读取*I/O，在目标分片主节点上进行大量的*写入*I/O\
  \ 工作负载，随后在目标分片的次节点上产生大量的复制工作负载。\n\n#### 迁移窗口\n\n如果初始迁移可以在应用程序负载的非高峰时段，并以短窗口进行，将会缓解原始分片上的一些压力（详情请参见下文的*限制平衡影响*）。随着时间的推移，随着分片接近平衡状态，可以使用越来越长的迁移窗口。\n\
  \n#### 有丝分裂\n\n在一些分布式数据库系统中，存在*有丝分裂*的概念——将一个现有分片拆分成两个子集。不幸的是，当前版本的 MongoDB 尚未支持这种方法。\n\
  \n增加分片数量的一个选择是添加新的分片硬件，并让平衡器通过迁移来处理数据的再平衡。如第 6 章所述，每对源/目标分片可以并行进行一次迁移。因此，在这种情况下，将有两个到新分片的并行数据块迁移。\n\
  \n### 管理平衡\n\n在你开始决定哪些集合将被分片以及使用什么键之前，首先了解数据是如何实际平衡的会很有用。\n\n#### 主分片\n\n对集群进行分片时，你可以拥有分片集合和未分片集合的组合。每个逻辑数据库有一个单独的**主分片**（与“主”节点完全无关），所有未分片集合都驻留在此。\n\
  \n在图 10-6 中，我们看到一个分片集群，其中有一个逻辑数据库`db1`，它包含多个集合。只有最大的集合`bigColl1`和`bigColl2`被分片，它们的文档已根据数据块平均分布在各个分片上。\n\
  \n![../images/487346_1_En_10_Chapter/487346_1_En_10_Fig6_HTML.jpg](img/487346_1_En_10_Fig6_HTML.jpg)\n\
  \n图 10-6\n\n一个包含一些分片集合的单一数据库\n\n根据未分片集合的大小，你可能会得到一些相当不均衡的分片。在这种情况下，分片 A 的大小几乎是其他分片的两倍。\n\
  \n\n### 再平衡集合\n\n那么，我们如何处理一个不平衡的集群，例如当一个分片的大小是其他分片的两倍时？在某些情况下，最简单的选项可能就是给分片 A 中的主机分配额外的资源。额外的\
  \ CPU 核心和内存应该能让这些主机处理额外的工作负载，为这个未分片的集合提供服务。但最终我们得到了混合的主机类型，这使得管理和扩展变得复杂。\n\n我们也不希望对非常小的集合进行分片，因为平衡它们的数据和管理这些集合的元数据会有一些额外的开销。不过，最糟糕的缺点是，我们必须将某些查询（那些不包含分片键的查询）路由到*所有*分片，并执行*分散-聚集查询*，其速度与当时最慢的分片一样慢。\n\
  \n在这种情况下，如果我们选择对 `mediumColl1` 进行分片，我们将从分片 A 迁移 200GB 数据到分片 B 和分片 C 各一份。\n\n####\
  \ 移动主分片\n\n在您拥有多个逻辑数据库的情况下，MongoDB 会自动将任何新数据库的主分片分配给一个未充分利用的分片。但是，如果您从只有一个分片开始，并随时间推移添加了额外的分片，主分片**不会**自动重新分配到新的分片上。您将让所有未分片的集合都存放在原始分片上。图\
  \ 10-7 展示了一个例子，其中新分片每个分片的数据少了 400GB。\n\n![../images/487346_1_En_10_Chapter/487346_1_En_10_Fig7_HTML.jpg](img/487346_1_En_10_Fig7_HTML.jpg)\n\
  \n图 10-7\n\n一个扩展后的集群，未分片集合位于分片 A 上\n\n要手动重新平衡未分片集合的负载，您可以使用 `movePrimary` 命令，将特定数据库的主分片重新分配到您选择的分片上。在上面的例子中，可以通过以下命令实现：\n\
  \n```\ndb.adminCommand( { movePrimary : \"db2\", to : \"shardB\" } )\ndb.adminCommand(\
  \ { movePrimary : \"db3\", to : \"shardC\" } )\n```\n\n### 额外的分片\n\n在图 10-8 中，我们看到一个类似的分片集群，但包含两个逻辑数据库。在这个例子中，`db1`\
  \ 的主分片在分片 C 上，而 `db2` 的主分片存放在分片 A 上。这里有三个分片集合：`db1.bigColl1`、`db2.bigColl1` 和 `db2.bigColl2`。\n\
  \n![../images/487346_1_En_10_Chapter/487346_1_En_10_Fig8_HTML.jpg](img/487346_1_En_10_Fig8_HTML.jpg)\n\
  \n图 10-8\n\n一个相对均衡的分片集群\n\n在这个例子中，我们的分片 A 数据量略高于建议的分片大小阈值，我们应该考虑向此集群添加一个额外的分片。如果我们这样做，这三个大型分片集合将自动均匀分布，并且大约\
  \ 0.5TB 的数据将从当前三个分片迁移到新的第四个分片。\n\n这个迁移过程可能需要几天时间，因为它被赋予了较低的优先级，以确保迁移不会影响正常的应用程序或复制流量。\n\
  \n### 限制平衡操作的影响\n\n在向集群添加分片后，我们需要规划和管理由此产生的数据块迁移**工作负载**，以确保它不会对已经负载的集群产生负面影响。\n\
  \n在**网络**接近饱和、可用容量有限的情况下添加分片时，我们也应小心，尤其是在业务时间内数据中心之间的带宽已经饱和时。\n\n一个简单的方法是使用**内置的平衡器时间窗口**，它允许您选择一个每天固定的时间窗口，在此期间允许进行数据块传输。\n\
  \n例如，在代码清单 10-2 中，我们激活了一个每天凌晨 1 点到 6:30（服务器当地时间）的时间窗口，每周七天皆如此。\n\n```\nuse config;\n\
  db.settings.update(\n{ _id: \"balancer\" },\n{ $set: { activeWindow :\n{ start :\
  \ \"01:00\", stop : \"06:30\" } } },\n{ upsert: true }\n)\n代码清单 10-2\n激活内置的平衡窗口\n\
  ```\n\n### 周末工作负载\n\n许多应用程序有特殊的周末工作负载。有些几乎没有用户流量，可以安全地仅在周末运行平衡器。另一些则有特殊的加载、转换或分析工作负载，因此希望完全避免任何平衡操作。对于这些情况，一个外部的\
  \ `cron` 作业或触发器可以使用 Mongo shell 脚本来随意开关平衡器：\n\n```\nmongo --uri mongodb://U:P@mongos1.bigcorp.local:27017/config\n\
  --authenticationDatabase admin\n--eval \"sh.startBalancer()\"\n```\n\n同样的方法可以用来停止平衡，使用\
  \ `sh.stopBalancer()`。\n\n注意\n\n从 MongoDB 4.2 开始，停止平衡器也将停止数据块的自动分裂。当平衡停止时，此更改实际上会停止配置服务器副本集上的几乎所有写入工作负载。\n\
  \n### 管理存储\n\n管理员最关心的问题之一是确保不断增长的数据库的主机有足够的存储空间。意外耗尽可能导致停机甚至数据损坏。\n\n#### 最大存储大小\n\
  \n在某些情况下，控制每个分片的最大数据量是有用的，允许不对称的分片大小，而无需使用分区显式控制数据块范围。在向现有集群添加新分片时，新的主机通常具有更大、更快的存储设备。我们希望避免填满较旧、较小的分片，因为磁盘空间不足可能导致数据损坏和许多其他问题。\n\
  \n例如，我们可以通过运行以下命令为我们的分片 A 设置最大大小为 1TB（1,048,576 MB）：\n\n```\nconfig = db.getSiblingDB(\"\
  config\")\nconfig.shards.updateOne( { \"_id\" : shardA\"},\n{ $set : { \"maxSize\"\
  \ : 1048576 } } )\n```\n\n如果接收数据块会超过此配置的最大存储大小，平衡器将不会考虑将任何分片作为该数据块的接收者。\n\n####\
  \ 确定实际存储大小\n\n磁盘上的实际使用大小甚至在同一个分片副本集的成员之间也会有所不同。最近进行初始同步或 `compact` 的成员，其实际使用的存储空间可能比长期运行、存储可能严重碎片化的节点小得多。\n\
  \nWiredTiger 使用一种非覆盖写算法，它实际上不会覆盖旧的文档版本，而是找到一个未使用的块并重新利用它。被删除的文档将打开新的块以供将来可能的重用。由于文档可能保留对文件不同部分的内部引用，就地压缩方法并不总能回收大量空间。\n\
  \n如果空闲空间是一个严重的问题，并且您最近**删除了**大量文档或添加了更多分片并**迁移了数据**，最好的方法是依次在分片的每个成员上触发*滚动初始同步*。\n\
  \n要检查每个成员实际使用的存储空间，请遍历所有数据库，然后运行 `db.stats()`，并将 `storageSize`（这是不包括索引的压缩数据文件大小）和\
  \ `indexSize`（这是此数据库上所有集合的所有索引的总和）的值相加。\n\n## 核心要点\n\n从本章中，需要记住的关键概念如下：\n\n*   分片是扩展部署写入能力的好方法，但需要良好的分片键来避免因迁移导致的过度再平衡。\n\
  *   如果某个唯一性约束需要在集群范围内保持，那么分片键应包含该约束。\n*   应避免使用以递增值（如日期、时间戳或 `ObjectId`）开头的分片键，因为这会导致“热点分片”和再平衡。\n\
  *   哈希分片键能很好地在各分片间均匀分布写入，但会使范围查询效率低下。\n*   对于导入工作负载（例如从旧数据库迁移），在数据加载前预分割数据块并让它们均匀分布在各分片之间可能更高效。\n\
  *   还有其他技巧可以预分布数据块，以避免将数据加载到“热点分片”。\n*   每个数据库将其未分片的集合保存在单个分片上，并且可以将这些集合移动到另一个分片以修复分片不平衡。\n\
  *   所有更改分片配置的操作都应通过 `mongos` 执行，禁用平衡器，并在计划的维护窗口内进行，以避免意外的应用程序行为。\n\n## 11. 极限分片\n\
  \n本章将更深入地探讨分片细节，并介绍在面临硬件限制时可增加写入吞吐量的配置。我们还将研究如何对用户数据进行分区，以遵守数据保护法规、最小化成本并优化跨分片的读取。\n\
  \n## 回顾\n\n在大多数情况下，没有区域或其他大小限制的分片集群会通过将数据块从“繁重”（数据块过多）的分片迁移到数据块较少的分片，来自动平衡数据块。\n\
  \n### 增加分片\n\n如果您开始遇到性能问题，并且已排除任何应用程序或模式设计问题，一个好的选择是增加更多分片。这将从现有分片卸载数据，减轻它们的工作负载和内存缓存中的工作集大小。\n\
  \n选择不良的分片键导致的热点分片（如第 10 章所述），无论添加多少分片都无法扩展。在系统已经不堪重负的情况下增加迁移工作负载，也会使短期性能变得更糟。\n\n\
  如果添加新主机和分片不可行，或者当前分片没有自动平衡，则可以进行某些手动调整以强制实现更平衡的工作负载。\n\n### 高级数据块分割\n\nMongoDB 会在向某个数据块范围插入数据或迁移该数据块之前，自动触发大数据块的分割。如果我们想人为地使某些数据块变小，可以强制进行分割。这样做的原因可能是我们即将向该范围导入大量数据，并希望确保插入操作能更均匀地分布在所有分片上。\n\
  \n分割完成后（无论是自动还是手动），平衡器可能会将该数据块迁移到另一个分片。请记住，我们可以使用 `sh.status(true)` 来查看当前所有数据块的确切存储位置。\n\
  \n有两种方法可以手动分割数据块：\n\n*   `sh.splitFind()` 查找一个数据块，并将其大致均等分割成两块。\n*   `sh.splitAt()`\
  \ 查找具有给定值的数据块，并在此点*精确*分割。\n\n让我们用两个例子来明确这一点。在图 11-1 中，我们使用 `sh.splitFind(\"myDb.customers\"\
  , {custId: 9000})` 分割一个数据块。这首先找到包含客户 ID 为 `9000` 的文档的数据块，然后将该数据块大致均等地分割成两部分。\n\n\
  ![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig1_HTML.jpg](img/487346_1_En_11_Fig1_HTML.jpg)\n\
  图 11-1 `splitFind` 将数据块大致均等分割\n\n在图 11-2 中，使用 `sh.splitAt(\"myDb.customers\", {custId:\
  \ 9000})`，同一个数据块在该确切值处被分割，得到两个大小差异很大的数据块（600KB 对比 5MB）。如果我们即将向该点导入数据，或者需要控制该范围内某些特定客户所在的分片，这可能是合适的。\n\
  \n![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig2_HTML.jpg](img/487346_1_En_11_Fig2_HTML.jpg)\n\
  图 11-2 `splitAt` 在指定的分片键值处精确分割\n\n就性能而言，`splitAt` 更轻量，应在为数据加载做准备而预分割时的脚本中使用。`splitFind`\
  \ 会尝试计算数据块中值的中位点以创建大小相等的块。获取文档和计算既需要 I/O 也需要 CPU。\n\n## 分片键场景\n\n在选择分片键时，可能存在相互竞争的目标，但并非所有目标都能在所有情况下都得到满足。例如，我们可能希望通过降低读取查询的*平均负载*来优化，或者我们可能希望通过使用地理位置分片来降低写入的*延迟*，或者通过最均匀地分布写入来尽可能快地完成批量数据的*写入*。\n\
  \n我们将研究每种情况，并回顾最佳的分片键和拓扑组合。\n\n## 读取性能\n\n确保分片集群快速读取响应的最佳方式是仅查询单个分片。这意味着无需等待最慢的分片，因为不需要对响应进行整理和排序。但是，如何确保我们\
  \ 99%的情况下都能命中单个分片呢？\n\n假设我们有一个包含所有过去和现在的职业网球选手的数据库。表 11-1 展示了该数据库中一些典型文档可能的样子。\n\
  \n表 11-1\n大型集合中的两个示例文档\n\n| `{ _id: 123, userName: \"petesampras\", country: \"\
  US\", titles: 64, .... }` | `{ _id: 124, userName: \"bjornborg\", country: \"SE\"\
  , titles: 63, .... }` |\n\n根据这些示例文档，我们可以考虑多个分片键，例如：\n1. `{ userName: 1 }`\n2. `{\
  \ _id: “hashed” }`\n3. `{ country: 1, userName: 1 }`\n\n我们不会考虑简单的`{ country: 1 }`键，因为基于此进行分片可能导致过大的块。这是因为我们最多可能有大约\
  \ 195 个块，每个国家一个。\n\n我们需要对不同的字段组合执行许多查询和聚合操作，但已决定最重要的优化查询是汇总特定国家所有选手的职业生涯冠军数。该查询如下所示：\n\
  \n```\ndb.players.aggregate([\n{ $match: { country: \"SE\" } },\n{ $group: {\n_id:\
  \ \"$country\",\ncount: { $sum: \"$titles\" }\n}\n}\n]);\n```\n\n让我们首先考虑使用`{userName\
  \ :1}`作为分片键，如图 11-3 所示。对于我们的聚合调用，我们仅按`country`字段进行过滤，但由于它不是分片键的一部分，文档可能存在于任何分片上。因此，`mongos`必须查询每一个分片，并在最慢的分片响应后最终对标题进行求和。注意，分片\
  \ B 最终没有任何匹配项，但它仍然必须做一些工作来确定这个负面结果。\n\n![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig3_HTML.jpg](img/487346_1_En_11_Fig3_HTML.jpg)\n\
  \n图 11-3\n分片键强制查询所有分片\n\n在`{_id: \"hashed\"}`上分片也会在任何不是精确匹配`_id`字段的查询中命中每个分片。这使得它在优化读取效率时成为最差的选择。\n\
  \n如果我们改为在`{country:1, userName: 1}`上分片会怎样？在图 11-4 中，我们看到由于我们的分片键以`country`开头，我们可以缩小到包含瑞典国家代码的两个分片。在这种情况下，我们需要等待两个分片响应才能得出最终总和。由于没有以瑞典国家代码“SE”开头的块范围，可以忽略分片\
  \ A。\n\n![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig4_HTML.jpg](img/487346_1_En_11_Fig4_HTML.jpg)\n\
  \n图 11-4\n分片键对查询更具针对性\n\n我们能否以某种方式确保仅命中单个分片？可以！我们可以使用区域范围和标签来实现这一点。我们可以为欧洲选手（“EUR”）、美洲选手（“AMER”）和世界其他地区（“ROW”）各分配一个分片。\n\
  \n我们必须为每一个国家定义一个键范围，例如：\n\n```\nsh.updateZoneKeyRange(\"myDb.players\",\n{ country:\
  \ \"SE\", userName: MinKey },\n{ country: \"SE\", userName: MaxKey }, \"EUR\")\n\
  ```\n\n并将欧洲选手与分片 A 关联：\n\n```\nsh.addShardToZone(\"shardA\", \"EUR\")\n```\n\n虽然这对于一个相对较小的数据库来说可能有些过度，但同样的技术可以在多\
  \ TB 的分片集群中为每次查询节省宝贵的毫秒时间。\n\n## 写入性能\n\n假设我们为欧洲纸张销售公司 Wernham-Hogg 运行一个客户关系管理（CRM）解决方案。我们正在与总部位于美国的公司\
  \ Dunder Mifflin 合并，需要尽可能高效地导入他们的整个客户数据。在分片集群中，这可以通过将写入操作均匀分布到我们的三个分片来实现。\n\n假设当前的欧洲数据大致如图\
  \ 11-5 所示分布，分片键为`{country:1, acct:1}`。这是一个简化模型，显示了三个连续的范围，而实际上每个范围内会有许多块。\n\n![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig5_HTML.jpg](img/487346_1_En_11_Fig5_HTML.jpg)\n\
  \n图 11-5\n一个基于国家的分片 CRM 系统\n\n虽然这可能不是最佳的分片键，但它支持基于国家的分析、最终的地理分片，并避免了过大的块。不幸的是，这也意味着所有需要导入的带有`{country:\
  \ \"US\"}`的新数据都将被发送到分片 C，因为它落在`LV`和`ZW`国家代码范围内。\n\n由于 Wernham-Hogg 目前 CRM 中几乎没有基于美国的联系人，因此将只有一个包含这些文档的块。如果我们现在导入\
  \ 100,000 个联系人，文档将被插入到那个分片中。随着块的增长，它们将被拆分成多个更小的块。随着更多文档被插入这些子块，它们将被反复拆分。\n\n如果平衡器已启用，它将尝试在某个分片变得过大时迁移一些块，但由于在后台以低优先级运行，并且面临导入的压力，它没有时间移动许多块，因此导入实际上将局限于单个分片。\n\
  \n解决方案是什么？我们需要手动预先拆分这些块，并将它们均匀地分布在各个分片上。如果我们已经大致知道 Dunder Mifflin 数据库中账户名的分布，我们可以从三个大块开始，并手动移动这些块，使得三个分片各有一个块。\n\
  \n然后在导入过程中，块将自动拆分。由于导入数据的 1/3 将进入每个分片，因此它们都不需要迁移。\n\n我们希望将来自美国联系人的传入数据按表 11-2 所示进行分布。\n\
  \n表 11-2\n期望的数据分布\n\n| 账户 ID 值（小写） | 分片 |\n| --- | --- |\n| 起始 | 结束（含） |  |\n| ---\
  \ | --- | --- |\n| a | m | A |\n| l | q | B |\n| r | z | C |\n\n为了实现表 11-1 中的分布，我们将使用`sh.splitAt()`函数，并确保我们有三个整齐的块：一个从字母“a”开始直到“mzzzzzzz...”，另一个从“l”开始直到“qzzzzzzzz...”，以及一个从“r”开始的最终块，通过声明四个边界如代码清单\
  \ 11-1 所示。\n\n```\nsh.splitAt(\"crm.contacts\", {country: \"US\", acct: \"a\"});\n\
  sh.splitAt(\"crm.contacts\", {country: \"US\", acct: \"l\"});\nsh.splitAt(\"crm.contacts\"\
  , {country: \"US\", acct: \"r\"});\nsh.splitAt(\"crm.contacts\", {country: \"US\"\
  , acct: \"zzzzzzzzz\"});\n```\n\n代码清单 11-1\n使用精确的拆分点创建四个新块\n\n然后我们使用`sh.moveChunk()`函数手动移动这些块，通过提供一个示例分片键值，该值对应于将存在于我们刚刚强制创建的这三个块之一中的文档，如代码清单\
  \ 11-2 所示。\n\n```\nsh.moveChunk(\"crm.contacts\",\n{country: \"US\", acct: \"abc\"\
  }, \"shardA\")\nsh.moveChunk(\"crm.contacts\",\n{country: \"US\", acct: \"man\"\
  }, \"shardB\")\nsh.moveChunk(\"crm.contacts\",\n{country: \"US\", acct: \"sta\"\
  }, \"shardC\")\n```\n\n代码清单 11-2\n将新创建的块手动移动到其他分片\n\n当输出如代码清单 11-3 所示时，我们可以通过`sh.status()`确认块已经迁移。\n\
  \n## 分片状态示例\n\n```\ndatabases:\n{  \"_id\" : \"crm\",  \"primary\" : \"shardA\"\
  ,  \"partitioned\" : true,  ... } }\ncrm.contacts\nshard key: { \"country\" : 1,\
  \ \"acct\" : 1 }\nunique: true\nbalancing: true\nchunks:\nshardA    2\nshardB  \
  \  1\nshardC    2\n{ \"country\" : { \"$minKey\" : 1 }, \"acct\" : { \"$minKey\"\
  \ : 1 } } -->> { \"country\" : \"US\", \"acct\" : \"a\" } on : shardA Timestamp(2,\
  \ 0)\n{ \"country\" : \"US\", \"acct\" : \"a\" } -->> { \"country\" : \"US\", \"\
  acct\" : \"l\" } on : shardA Timestamp(3, 0)\n{ \"country\" : \"US\", \"acct\" :\
  \ \"l\" } -->> { \"country\" : \"US\", \"acct\" : \"r\" } on : shardB Timestamp(4,\
  \ 0)\n{ \"country\" : \"US\", \"acct\" : \"r\" } -->> { \"country\" : \"US\", \"\
  acct\" : \"zzzzzzzzzzzz\" } on : shardC Timestamp(4, 1)\n{ \"country\" : \"US\"\
  , \"acct\" : \"zzzzzzzzzzzz\" } -->> { \"country\" : { \"$maxKey\" : 1 }, \"acct\"\
  \ : { \"$maxKey\" : 1 } } on : shardC Timestamp(1, 8)\n```\n\n### 分片状态详情\n\n`Listing\
  \ 11-3` 展示了数据在所有三个分片上的分布情况。\n\n我们现在可以开始数据加载了，因为知道写入工作负载将被均匀分布。\n\n## 多租户架构\n\nMongoDB\
  \ 是构建多租户架构和软件即服务应用程序的一个流行选择。在某些情况下，所选择的设计使用一个**单一数据库**配合分片集合来容纳所有客户的数据。这种模型通常在每个文档中使用一个字段来标识客户或项目。另一些人则选择为每个客户创建一个**新数据库**，并将相同的集合名称和索引重复放入每个数据库中。\n\
  \n这两种方法在原始的 MMAP 存储引擎上都能很好地工作，该引擎简单地使用原生操作系统功能将内存中的数据结构映射到磁盘上。磁盘上的文件数量随存储的数据量扩展，而与集合或索引的数量无关。\n\
  \n当引入 WiredTiger 存储引擎时，数据文件的映射方式发生了变化。现在，每个集合在磁盘上存储在一个单独的文件中。每个集合中的每个索引也单独存储。因此，基于第二种模型开发的多租户架构突然之间在磁盘上有了更多的独立文件。\n\
  \n### 文件句柄\n\n想象一个小型的多租户集群，容纳了 24 个租户的数据库，以及一个用于保存系统范围元数据的共享数据库。我们假设每个租户数据库有 32\
  \ 个集合，平均每个集合有 3 个索引，即每个数据库有 96 个索引。这需要 128 个文件句柄来加载所有这些集合的数据。如果我们在这个系统上运行一个副本集，在高峰使用期间，我们可能需要多达\
  \ 3200 个文件句柄（24 个数据库 × 128 个文件句柄 + 共享的 128 个）。由于每个打开的文件句柄可能占用相当多的内存资源，我们开始遇到一个点：为文件描述符分配给操作系统的内存比用于在内存缓存中保存\
  \ MongoDB 数据的内存还要多。可以想象，一个增长到数千个租户的系统将更严重地受到这种影响。\n\n在图 11-6 中，我们看到一个示例，其中数据库分布在\
  \ 6 个分片上。在这种情况下，每个分片中的节点现在只需要打开最多 640 个文件句柄，相比之下，之前则需要 3200 个。\n\n![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig6_HTML.jpg](img/487346_1_En_11_Fig6_HTML.jpg)\n\
  **图 11-6** 使用分片的多租户架构\n\n### 虚拟机\n\n随着虚拟机技术的可用性，我们将受益于将单个大型主机拆分为多个较小的虚拟机。我们实际上并不分片任何集合，而是确保每个数据库的**主分片**均匀分布在各个分片上。随着租户数量的增长，我们可以添加更多分片以将文件句柄总数保持在合理的最大值。\n\
  \n这种为集群拓扑增加的复杂性并不理想，但使用企业级自动化工具管理一个大型 MongoDB 集群通常比完全重新设计一个多租户 SaaS 应用程序要容易得多。\n\
  \n## 混合架构\n\n随着云计算的日益普及，即使是拥有内部和法规限制的保守企业也在将运营迁移到云端。\n\n通常，这些云迁移是从现有的本地 MongoDB\
  \ 节点和应用逐步推出的。第一步通常是将仲裁节点迁移到云端；然后，有时当只有两个完全本地的数据中心可用时，云被用来提供“第三个数据中心”。\n\n### 加密\n\
  \n凭借对传输中和静态加密以及**字段级加密**的内置支持，即使是金融和医疗行业的企业也可以确信云端的数据是安全的，即使他们更愿意将大部分节点保留在他们直接控制的服务器上。\n\
  \n### 迁移服务\n\n下一阶段通常是将某些服务迁移到云端。例如，批处理和分析工作负载可能保留在本地，但面向客户的 Web 或移动服务由于使用模式需要每天快速扩展和缩减数次，因此具有迁移到灵活的云基础设施的强烈成本压力。\n\
  \n### 隐藏成本\n\n将应用程序迁移到云端引入了一个新的成本来源：**云带宽费用**。所有主要的云提供商都对从云计算网络传出的字节收费。他们通常也对可用区之间的数据收费（但费率低得多）。因此，即使在同一地区的多个可用区中分布的副本集也会因复制而产生带宽费用。\n\
  \n对企业来说，很容易试图寻找一种方法，通过从已经位于同一可用区的节点读取来减少过高的带宽费用。理论上，这可能意味着只需要复制带宽。\n\n在图 11-7 中，我们看到一种拓扑，其中主节点在本地（因为大部分写入工作负载仍在本地），但云中只有读取副本成员。在某些情况下，基于云的微服务可以从云中的二级节点读取以避免带宽费用，但将面临读取**陈旧数据**的风险。\n\
  \n![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig7_HTML.jpg](img/487346_1_En_11_Fig7_HTML.jpg)\n\
  **图 11-7** 主节点仍在本地的混合部署\n\n或者，如图 11-8 所示，主节点可以位于云端。现在我们可能会因本地应用的写入而产生带宽费用。这些写入随后需要从云端复制回本地的其他副本集成员。默认启用的**复制链**可以用来让数据中心\
  \ 2 中的成员从数据中心 1 复制。\n\n![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig8_HTML.jpg](img/487346_1_En_11_Fig8_HTML.jpg)\n\
  **图 11-8** 主节点在云端的混合部署\n\n> **注意**\n> 从应用到 `mongos` 的网络压缩需要通过向连接 URI 添加 `?compressors=snappy`\
  \ 来显式启用。\n\n### 策略限制\n\n更复杂的是，由于公司策略或外部法规，有时分片集群中的部分集合甚至整个数据库仍可能无法存储在云端。在这种情况下，仍存在一些复杂的架构，允许集群拥有大量基于云的分片，同时确保某些数据始终保留在本地。\n\
  \n在图 11-9 中，我们可以看到一个分片集群，其中包含一个机密数据库，其内容必须仅存储在我们自己的数据中心内。只要所有`confidential`集合都是未分片的，它们就会保留在主分片\
  \ Shard 3 上。如果 Shard 3 的所有副本集成员都在我们自己的数据中心内，那么`confidential`数据就永远不会存储在云端。\n\n![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig9_HTML.jpg](img/487346_1_En_11_Fig9_HTML.jpg)\n\
  \n图 11-9：单一集群，但机密数据保留在本地\n\n分片 Shard 1 和 Shard 2 的副本集成员可以是本地和云主机的混合体，如图 11-7 和 11-8\
  \ 所示。\n\n## 缩减分片集群规模\n\n在某些情况下，你可能最初创建了一个多分片集群，以准备应用程序在大型发布前的短期增长。但有时数据增长不如预期快，部分硬件可以更好地用于其他集群或项目。\n\
  \n移除分片并释放主机是相当直接的。主要有三个步骤：\n\n1.  迁移该分片上的任何数据（特别是“归属”于该分片的数据库）。\n2.  移除任何引用这些分片节点的分片级配置。\n\
  3.  关闭节点。\n\n### 迁移数据\n\n让我们想象一个简单的例子：一个三分片集群，包含两个数据库，每个数据库有一个分片集合和一个未分片集合，如图 11-10\
  \ 所示。数据库`db2`归属于 Shard C，这是我们要移除的分片。\n\n![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig10_HTML.jpg](img/487346_1_En_11_Fig10_HTML.jpg)\n\
  \n图 11-10：一个分片，其归属的数据库等待被清空\n\n在 Shard C 的分片集合数据被清空之前，我们首先需要为`db2`选择一个新位置作为主分片。在这种情况下，我们应该使用\
  \ Shard B 来存储未分片集合，因为 Shard A 已经是`db1`的归属地，这将有助于保持分片的平衡。\n\n#### 维护窗口\n\n在开始任何更改之前，我们需要确保**没有活跃的迁移**，并且**没有针对`db2`中未分片集合的读写操作正在运行**。为安全起见，建议使用计划的维护窗口，并完全停止所有使用此数据库的应用程序。\n\
  \n#### 移动主分片\n\n现在我们需要通过`mongos`发出以下命令：\n\n```\ndb.adminCommand( { movePrimary :\
  \ \"db2\", to : \"shardB\" } )\n```\n\n这可能会花费相当长的时间，因为数据需要传输，然后这些未分片集合上的所有索引需要在\
  \ Shard B 副本集的所有成员上重建。\n\n#### 重启所有组件\n\n由于已知的元数据缓存问题（至少到版本 4.2），现在极其重要的是：\n\n1.\
  \  重启所有`mongos`实例和所有`mongod`分片成员（包括辅助成员）。\n2.  连接到*所有*`mongos`实例和*所有*`mongod`分片成员（包括辅助成员），并运行\
  \ `db.adminCommand({ flushRouterConfig: \"db2\" } )`。\n\n提示：请查阅 [`https://jira.mongodb.org/browse/SERVER-17397`](https://jira.mongodb.org/browse/SERVER-17397)\
  \ 以获取适用于你 MongoDB 版本的当前最佳实践。\n\n#### 恢复应用程序\n\n只有在所有分片组件上都刷新了路由器配置后，才能安全地重新启动任何使用此数据库的应用程序。\n\
  \n### 移除分片\n\n既然 Shard C 不再是任何数据库的主分片，我们就可以开始移除过程。\n\n#### 清空分片\n\n此时，未分片集合已被移走，但所有分片集合的部分数据仍将存储在\
  \ Shard C 上。我们现在将通过连接到`mongos`并发出以下命令，将 Shard C 上任何数据库的所有数据块移走：\n\n```\ndb.adminCommand(\
  \ { removeShard: \"shardC\" } )\n```\n\n你可以多次运行此命令以检查迁移状态，直到它报告该分片上没有剩余的数据块。现在集合的位置将如图\
  \ 11-11 所示。\n\n![../images/487346_1_En_11_Chapter/487346_1_En_11_Fig11_HTML.jpg](img/487346_1_En_11_Fig11_HTML.jpg)\n\
  \n图 11-11：一个准备好从集群中移除的分片\n\n#### 关闭分片\n\n曾经构成 Shard C 的副本集仍将运行，但已无任何数据，并且不再连接到集群的其他成员。这些被隔离的节点现在可以停止，并且主机可以重新用于其他目的。\n\
  \n## 超大集群\n\n当集群变得非常大，包含许多数据块定义和复杂的分区规则时，配置服务器副本集上的数据量自然也会变得更大。\n\n每个`mongos`都会缓存有关数据块位置和到分片映射的元数据，以便在可能的情况下高效地将查询路由到各个分片。对于超大集群，此数据的内存需求也会增长，因此`mongos`主机可能需要升级配置。\n\
  \n### 配置服务器\n\n监控配置服务器的磁盘空间和性能也很重要，特别是在平衡窗口或数据密集加载期间，以确保它们能够应对工作负载。\n\n对于大型集群，最好为配置服务器运行一个五成员的副本集，以帮助分担来自`mongos`的读取负载并提供额外的弹性。随着集群的增长，你还需要扩展配置服务器的\
  \ CPU 核心和内存，尽管通常只需要 2-4 个核心。\n\n## 关键要点\n\n从本章中，需要记住的关键概念如下：\n\n*   可以选择分片键来优化某些查询的读取性能，避免涉及所有分片的“分散-聚集”查询。\n\
  *   在大量数据导入期间，数据的分割和迁移相对较慢，可能意味着所有数据都写入一个热点分片，从而大大降低性能并增加总导入时间。\n*   可以手动定义数据块范围并在分块之间分布，以优化具有已知值分布的新数据的批量加载。\n\
  *   可以在正常的平衡器窗口之外使用名为`moveChunk`的特殊管理命令手动移动数据块。\n*   可以通过在它们的数据库上使用`movePrimary`命令，将未分片集合重新定位到另一个分片。\n\
  *   可以通过`removeShard`命令来启动清空一个不需要的、包含数据的分片。\n*   数据中心与云提供商之间的带宽成本差异很大，并且会对运行分布式集群的总成本产生重大影响。\n\
  *   应用程序与`mongod`/`mongos`之间的网络通信需要在连接 URI 中显式启用。\n*   数据库可以归属于特定的分片，以便出于法规或成本原因控制未分片集合的物理位置。\n\
  \n\n"
