  | 延迟 | `{votes: 1, priority: 0, hidden: true, slaveDelay: 3600}` | 一种特殊类型的隐藏节点，具有复制延迟。它可以帮助选举主节点，但由于没有最新数据，*不能成为主节点*。在分片集群中无用，且
  Atlas 上不可用。 |

  | 非投票 | `{votes: 0, priority: 0}` | 此节点复制数据，但不投票，也不能成为主节点。有助于确保投票节点数量为奇数。 |


  ## 避免故障


  任何复杂系统的鲁棒性都取决于其故障点。最终，系统中的每个组件都会出现故障、需要升级、重启或需要物理搬迁。如果某个组件是其同类中的唯一一个，它就被称为*单点故障*，或称*SPOF*。当它发生故障时，会破坏整个组件间的相互依赖关系，导致应用程序停机。


  为避免此类故障，你应该有多个应用程序在负载均衡器后运行，位于不同的物理机器上，最好在不同的数据中心。域名系统（DNS）查找应有多个名称服务器，这样即使发生互联网级别的故障，也不应阻止用户访问你的应用程序服务器。


  对于你的 MongoDB 数据库，我们建议遵循相同的原则，使用一个包含三个数据承载成员的副本集。这是提供高可用性和多数写确认的最低要求，这样即使单个节点完全丢失，也不会造成数据丢失，也不会导致任何停机或性能影响。


  ### 故障点


  一些常见的故障点包括：


  *   数据中心（断电、网络基础设施故障、火灾等）

  *   物理服务器（电源、CPU、存储设备等）

  *   软件（虚拟机[VM]宿主机、操作系统崩溃）


  通过内部冗余系统，例如多个电源、具有热插拔驱动器的 RAID-10 存储、多个网络接口卡，以及配备备用电源和多个互联网骨干网的数据中心，可以大大降低其中一些故障点的风险。自动化并测试任何故障转移机制对于最小化停机时间至关重要，在理想情况下，可以完全避免停机。



  ### 容量冗余


  你需要为任何组件在最糟糕时刻离线的情况做好预案。假设你为一个运输提供商处理生产负载，每个工作日的票务销售有 90%集中在上午 9-10 点和下午 5-6 点。你应该为
  MongoDB 节点配置计算资源，确保即使主节点故障，替换的主节点也能处理相同的工作负载。


  所有这些冗余都是有代价的，系统架构师和管理者必须在为系统添加冗余的成本之间进行权衡。人们倾向于寻求用复杂的故障转移策略和混合硬件来节省资金的巧妙方法。稍后，我们将探讨一些例子，并说明为何采用混合硬件资源的部署是不可取的。


  ### 自动故障转移


  除了依赖冗余硬件外，MongoDB 还提供了一种更简单、更便宜的软件方法，它假定基础设施故障会发生，并内置了故障转移功能。通过在不同的物理位置运行多个承载数据的节点，确保基础设施的每一层都具备弹性变得不再那么重要。我们可以在成本低得多的商用硬件上运行，这些硬件仅配备单个电源和单个网卡，无需备用电源或互联网连接。


  如果我们的副本集能够同时处理一个甚至两个完整的数据中心故障而不会丢失数据，我们就能在基础设施上节省资金，并提供一个能够自我修复、完全不会对其应用程序造成任何中断的数据库系统。


  大多数云提供商为客户提供了统一的虚拟机界面，这与在商用硬件上运行标准 Linux 操作系统非常相似。然而，在底层，大多数云提供商已经内置了多层冗余。例如，他们的网络存储解决方案通常建立在
  RAID-10 风格的架构上，该架构使用多个物理存储设备来存储每个数据块，并且在`IOPS`（每秒输入/输出操作）方面几乎呈线性扩展。


  **警告**


  许多云提供商提供的存储选项包含“突发额度”。这些额度可以在工作负载高峰期间使用，但最终会过期。如果你在云虚拟机上看到`IOPS`无故突然下降，可能是因为额度余额已降至零。


  ### 为灵活性而设计


  构建容错系统的另一个好方法是遵循允许未来灵活调整的设计原则。


  #### 使用 DNS 而非 IP


  虽然可以在连接字符串中使用 IP 地址配置副本集成员和种子列表（见图 2-4），但这可能会使你的部署变得脆弱。通过使用内部 DNS 服务器，你可以为部署中的每个主机分配一个逻辑主机名或别名。


  ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig4_HTML.jpg](img/487346_1_En_2_Fig4_HTML.jpg)

  图 2-4


  使用 IP 地址进行配置会导致系统不灵活


  一些组织会根据主机的物理位置和业务部门为其分配增量主机名，例如`host0003456.mortgages.dc-nyc.bigbank.local`。虽然这比使用
  IP 地址更可取，并且能让我们快速了解主机所在的数据中心，但它仍然缺乏灵活性。


  如果该主机是某个分片副本集的一部分，并且由于某种原因主板完全故障，那么该主机就需要被替换。替换的主机将有一个新的主机名，例如`host0003587`。现在，需要在
  MongoDB 部署内部进行手动干预，以便所有其他成员、`mongos`和 Ops Manager 都能知道此节点角色所在的新主机位置。


  如图 2-5 所示的另一种方法是，为主机名赋予逻辑命名，或者至少为功能性主机名创建一个 CNAME 别名，格式为`node3.mortgages_prod.mongo.bigbank.local`。在这种情况下，可以启动一台新的主机，将
  CNAME 别名指向该主机名，配置`mongod`进程，一旦 DNS 缓存刷新，所有组件都将能够自动发现它。对于计划内的迁移，可以缩短 DNS 生存期以减少缓存持续时间。


  ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig5_HTML.jpg](img/487346_1_En_2_Fig5_HTML.jpg)

  图 2-5


  使用逻辑主机名使得理解和管理复杂部署更加容易；也使得替换故障主机更加方便


  **注意**


  对于副本集、分片集群和 Ops Manager 代理的自动发现功能，每个节点需要检测其自身的“MongoDB 主机名”作为主机的完全限定域名。命令`hostname
  -f`的输出结果应始终与配置中的节点名称匹配。在 Linux 上，可以通过运行`hostnamectl set-hostname <new_hostname>`或更改`/etc/hostname`中的主机名并重启主机来实现。未能检查这一点可能意味着`mongod`不知道自己的身份。


  ### 自动发现


  MongoDB 驱动程序会自动尝试检测部署的所有成员。即使你在连接 URI 字符串中只列出了一个副本集成员，驱动程序仍然会与所有成员建立连接，以便更快地响应选举和其他副本集变化。但是，你应该始终在连接
  URI 中包含所有已知的副本集成员或`mongos`路由器，以防在应用程序首次启动时列出的节点不可用。


  ### 计划内停机


  MongoDB 副本集内在的分布式特性意味着，节点有时会为了计划内的维护而被有意关闭，这是完全正常且预期的行为。只要任何维护操作不超过 oplog 窗口时间，节点在重启后会自动同步任何更改。


  对于计划内的停机，无需重新配置副本集。最好保留原有配置，这样一旦节点重启，它就能自动且即时地重新加入副本集。


  **注意**


  强烈建议利用滚动升级，让 MongoDB 节点保持在当前主要版本的`最新次要版本`上运行。与任何软件一样，偶尔会发现影响稳定性或安全性的错误。避免你的部署因一个已被修复的错误而下线，并及时进行更新。


  ### 多路由器


  任何用于生产的分片集群在部署中至少应有两个`mongos`路由器节点（参见图 2-6）。应用程序应在连接 URI 字符串中配置所有`mongos`实例以支持故障转移。`mongos`连接到每个分片的方式与应用程序连接副本集的方式大致相同。并且，就像驱动程序发现所有副本集成员一样，`mongos`将通过配置服务器自动发现分片集群中的所有组件。


  ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig6_HTML.jpg](img/487346_1_En_2_Fig6_HTML.jpg)


  图 2-6

  具有多个`mongos`节点的高可用部署


  对于具有多个应用程序服务器的部署，一个好的选择是将`mongos`与应用程序服务器同地部署。这减少了`mongos`向应用程序传输数据时的延迟。由于`mongos`通常无状态且不在磁盘上持久化任何数据，可以根据负载需求随时启动和停止。如果你有一个在云“自动伸缩组”内运行的应用程序，它在高峰负载时会启动新的虚拟机，那么你应该在该预构建镜像中包含一个`mongos`，这样你的分片路由器也会自动扩展。


  每个`mongos`将与其他每个`mongos`以及部署中的每个非隐藏节点保持连接。在图 2-7 中，每个`mongos`将保持 9 个开放连接，每个连接每个节点大约占用
  1MB 的 RAM。想象一个大型部署，有 30 个`mongos`和 10 个分片，每个分片有 5 个节点。在这种部署中，每个`mongos`仅为了持续检查部署中所有组件的健康状态，就要打开近
  80 个连接。因此，我们通常建议一个部署中不要超过 30 个`mongos`，而是通过增加内存和 CPU 资源来垂直扩展一个固定大小的`mongos`池。


  ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig7_HTML.jpg](img/487346_1_En_2_Fig7_HTML.jpg)


  图 2-7

  显示一个`mongos`开放连接的分片集群


  ### 滚动维护


  在计划维护或配置更改期间避免故障的一个重要方法是逐个节点地应用它们。由于设计良好的副本集可以在一个成员离线的情况下运行，我们应该以*滚动方式*执行诸如版本升级等操作。


  一些操作，如索引构建，最好在暂时从集合中分离出的节点上执行。这可以通过停止一个节点，并临时在没有其副本集参数的情况下启动它来实现。该节点仍将保留数据副本，但对应用程序和其他副本集成员不可见。一旦索引构建完成，该节点可以使用其复制参数重新启动并重新加入集合。许多其他操作，如二进制版本升级或某些服务器配置选项（安全、性能等），则需要节点重启。


  虽然这些滚动维护操作可以手动或通过脚本执行，但 Ops/Cloud Manager 的自动化功能是专门设计来执行这些操作的。更改是逐节点进行的，所有辅助节点首先被更改，并且只有在那时成功后，主节点才会*降级*以进行更改，从而确保写工作负载不受影响。如果集群不健康（例如一个节点已经不可用），自动化将永远不会启动滚动维护。如果先前节点的更改未完成和成功，它也不会为了维护而关闭另一个节点。这避免了不必要地降低副本集的弹性或可用性。


  #### 干净降级


  *降级*是主节点向副本集的其他成员（以及任何连接的客户端）发出的明确信号，表示将进行选举。它会立即触发选举，并且比在高负载下主节点突然丢失要顺畅得多。有了这个通知，选举可以在几毫秒内发生。如果当选的节点尚未赶上旧的辅助节点，它将在接受任何新写入之前先进行追赶（参见`catchUpTimeoutMillis`设置）。如果在
  30 秒内没有赶上，仍然拥有最新数据的旧主节点将调用新的选举来接管，以确保集合不会阻塞传入的写操作。


  由于应用程序将持有并重试任何待处理的操作，直到新的主节点准备就绪，这意味着对应用程序的影响也非常短暂，并且对最终用户是完全透明的。


  如果没有降级，默认情况下，辅助节点会等待 10 秒（副本集配置中的`electionTimeoutMillis`设置）再触发选举。这是为了避免由于非常短暂的网络错误或停顿而导致不必要的主节点变更。


  ### 工具故障转移


  Ops/Cloud Manager 是 MongoDB 企业版客户可用的自动化、监控和备份工具，为在私有数据中心管理复杂的分片集群提供了关键功能。因此，该工具本身具有类似的冗余和自动故障转移至关重要。


  图 2-8 展示了一个具备良好冗余的 Ops Manager 部署示例。任何一个数据中心的丢失都不会导致应用程序停机。Ops Manager 应用程序本身有一个热备份，因此自动化和监控可以继续自动进行。备份快照保存在本地部署的
  S3 兼容存储解决方案中，该解决方案本身跨多个数据中心进行配置。只有备份守护进程缺乏自动故障转移。如果 DC1 丢失，需要手动干预来激活 DC2 中 Ops Manager
  实例的备份守护进程。


  ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig8_HTML.jpg](img/487346_1_En_2_Fig8_HTML.jpg)


  图 2-8

  使用 Ops Manager（仅限企业版）且具备冗余的部署


  ### 故障场景


  与任何复杂的分布式系统一样，可能出现许多问题来影响生产数据库的可用性。有了冗余节点，丢失单个服务器或整个文件系统损坏并不意味着数据丢失或数据库不可用。


  然而，如果没有正确的容错设计，一些常见错误可能会导致意外或不理想的状态。



  ### 网络分区


  当你有一个分布在多个数据中心、通过网络主干连接的数据库时，数据中心之间的连接可能会间歇性甚至长时间故障。我们无论如何都要避免数据损坏或不一致，因此在某些情况下，部署会自动切换到只读模式，以避免同一文档在两个不同地点被同时编辑的情况。


  让我们考虑图 2-9 所示的例子。这里，我们只访问两个数据中心——一个被视为“生产”站点，另一个是“灾难恢复”站点。基于这种设计理念，数据中心 2 中的副节点主要目的是作为灾难恢复的备用节点。可能节点的优先级已被调整，使得数据中心
  1 中的节点具有更高的优先级，从而有效地阻止节点 3 成为主节点。如图所示，网络分区只是断开了一个成员。数据中心 1 中存在一个`quorum`（投票节点的多数），因此不需要选举，主节点也无需更换。


  ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig9_HTML.jpg](img/487346_1_En_2_Fig9_HTML.jpg)


  图 2-9

  （左）在数据中心 2 中有一个成员的副本集。（右）网络分区断开了数据中心 2 的节点


  现在让我们考虑图 2-10 中有两个应用服务器的例子。它们可能配置了负载均衡器，或者根据某些自定义路由，靠近数据中心 2 的用户使用该应用服务器。如果网络故障将数据中心
  1 与数据中心 2 分区，数据中心 1 内部将发生选举并选出新的主节点。数据中心 2 中的应用仍能从其本地节点读取旧数据，但既不能写入，也无法从主节点接收任何更新。


  ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig10_HTML.jpg](img/487346_1_En_2_Fig10_HTML.jpg)


  图 2-10

  （左）包含副应用服务器的部署。（右）网络分区意味着副应用服务器只能读取


  ### 硬件故障


  对于副本集的所有其他成员来说，成员节点由于硬件或软件故障而离线，与该节点失去网络访问权限是一样的。图 2-11 显示将发生选举，仍然相互通信的两个节点拥有举行选举的法定人数。应用服务器将自动重新连接到新的主节点，以重试任何待处理的写入。


  ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig11_HTML.jpg](img/487346_1_En_2_Fig11_HTML.jpg)


  图 2-11

  （左）主节点单独在数据中心 2 中。（右）主机/节点故障将导致选举但不会造成停机


  ### 远程数据中心故障


  另一种常见情况，特别是对于内部应用，是数据库运行在公司数据中心内，但应用程序运行在其他地方——办公室网络或员工的个人电脑上。图 2-12 是一个例子，其中拥有大多数节点的“生产”数据中心
  1 离线了。从应用程序和节点 3 的角度来看，网络分区的实际结果与节点 1 和 2 同时崩溃是一样的。然而，在数据中心 1 内部，主节点保持不变，因为这两个节点仍然可以形成法定人数。如果应用程序当时正在写入更改（即使使用了多数写入关注），问题就会出现。节点
  1 和 2 可能已确认了一些尚未复制到节点 3 的写入。如果应用程序从数据中心 2 的副节点读取，它将错过那些写入。


  ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig12_HTML.jpg](img/487346_1_En_2_Fig12_HTML.jpg)


  图 2-12

  如果配置了 `primaryPreferred` 读取偏好，远程应用程序将连接到副节点并执行读取


  通过手动干预，我们可以在节点 3 上重新配置副本集，并完全从成员列表中移除节点 1 和 2。这将使节点 3 成为唯一的剩余节点并成为主节点，但一些写入已经丢失，并且当数据中心
  1 重新上线时无法整合这些更改。


  这是为什么 3 数据中心配置更可取的另一个例子。即使整个数据中心宕机也绝不意味着缺乏法定人数，也不需要手动干预。


  ### 存储卷故障


  一个不太常见但更难处理的问题是存储卷出现问题，导致无法及时进行 I/O，但问题又不严重到完全阻止节点运行。想象一下图 2-13 中存储设备的微妙硬件故障。它没有以通常的每秒
  2000 次 I/O 操作（`IOPS`）的容量运行，而是突然只执行 200 `IOPS`（或者停顿然后短时间爆发式工作）。作为副本集的成员，它仍然响应 ping
  并通过所有健康检查。因此没有理由触发选举。相反，副本集现在只能以之前容量水平的 10%来处理传入的写入。


  ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig13_HTML.jpg](img/487346_1_En_2_Fig13_HTML.jpg)


  图 2-13

  如果其存储变得无响应，存储节点看门狗将使节点离线


  一个部分的解决方案是 `Storage Node Watchdog`（自 MongoDB 4.2 起在社区版中可用）。这是一项可选服务，监控其节点上文件系统的健康状况，并在检测到无响应的文件系统时触发节点关闭。如果此节点是主节点，它还将导致选举发生，从而有效地将处理写入的责任传递给副本集的另一个成员。


  ### 网络性能下降


  由于故障网络导致丢包影响带宽，可能会出现与前面类似的情况（图 2-14）。由于健康检查 ping 最终通过`TCP`重试成功，因此不会触发选举。在 MongoDB
  中，选举在连接中断和应用重试方面会产生开销，因此该算法避免让主节点下台，除非它确信有更合适的候选节点。在这种情况下，需要网络管理员在网络基础设施本身上建立监控和警报。在这种情况下，数据库管理员可能会选择在网络稳定期间触发故障转移或调整成员优先级。


  ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig14_HTML.jpg](img/487346_1_En_2_Fig14_HTML.jpg)


  图 2-14

  数据中心 1 中的节点经历网络性能下降但仍保持主节点


  ### 共享虚拟机主机


  现在企业在其本地数据中心部署应用程序时使用`VM`主机非常普遍。这增加了一层额外的复杂性，因为嘈杂的邻居可能会窃取资源，或者错误配置可能导致内存使用未达到最优（例如`内存超量使用`或过度的`内存交换`）。除了这些性能问题之外，将同一副本集的多个
  MongoDB 节点共同定位还会合并故障点。例如，在图 2-15 中我们看到大多数节点驻留在单个物理`VM`主机上。如果此主机遭受硬件故障或因紧急维护而被关闭，这两个节点将突然一起故障，副本集将变为只读。


  ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig15_HTML.jpg](img/487346_1_En_2_Fig15_HTML.jpg)


  图 2-15

  共同位于同一虚拟机主机上的节点增加了联合故障点




  ### 共享存储区域网络


  另一个可能出乎意料的故障点是共享网络存储的“倒金字塔”结构。在许多虚拟主机配置中，会有一个通过光纤通道连接的共享存储服务器，但它被多个 VM 主机共享（图 2-16）。即使每个
  MongoDB 节点拥有独立的物理 CPU 和内存，一旦 SAN 发生故障，所有节点也会随之故障。再次强调，使用三个独立的数据中心可以完全避免这种故障场景。


  ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig16_HTML.jpg](img/487346_1_En_2_Fig16_HTML.jpg)


  图 2-16

  共享的 SAN 可能引入一个意外的故障点


  ### 硬件不平衡


  想象这样一种情况：为了减少延迟，主节点被设计为与应用服务器共同位于第一个数据中心中。该节点被赋予较高的优先级，因此当所有节点都可用时，它应该能赢得选举。由于它需要处理应用程序的读写操作，所以为其分配了更多的内存和
  CPU。其他节点的资源则较少。位于次要数据中心的节点甚至被赋予优先级 0，以确保它永远不会被选为主节点（见图 2-17）。


  ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig17_HTML.jpg](img/487346_1_En_2_Fig17_HTML.jpg)


  图 2-17

  一个副本集，其指定的主节点拥有双倍的内存和 CPU 资源


  现在，让我们想象一下如果主节点主机发生故障会发生什么。DC1 中的次要节点被选为主节点，但它的资源只有旧主节点的一半。它只能将一半的旧缓存装入内存；它将需要做更多的
  I/O 操作来刷新脏缓存并从磁盘加载数据。其影响是写入性能会显著下降到远低于之前水平的一半。应用程序性能很可能会对终端用户产生明显的负面影响。


  在图 2-18 中，我们为 DC1 中的次要节点分配了相同的资源，现在只有 DC2 中的节点拥有 half the resources. Now if the
  primary fails, the secondary in DC1 will again be elected to replace it, and can
  function the same, but if the application is using `majority write concern` to avoid
  rollbacks, it is now waiting for the only other available node to replicate the
  writes. Since the `oplog` entries must be applied in order, any processing lag in
  the underresourced secondary will now make the application wait. In effect, the
  application is still waiting on a node with half the resources to write all the
  same changes and update all the same indexes. 现在，只有 DC2 中的节点拥有 half the resources.
  如果主节点发生故障，DC1 中的次要节点将再次被选为替代节点，并能发挥相同的作用；但如果应用程序使用 `majority write concern` 来避免回滚，那么现在它需要等待唯一另一个可用节点来复制写入。由于
  `oplog` 条目必须按顺序应用，资源不足的次要节点中任何处理延迟现在都会导致应用程序等待。实际上，应用程序仍然在等待一个资源减半的节点来写入所有相同的更改并更新所有相同的索引。


  ![../images/487346_1_En_2_Chapter/487346_1_En_2_Fig18_HTML.jpg](img/487346_1_En_2_Fig18_HTML.jpg)


  图 2-18

  一个副本集，其中资源不足的次要节点作为备用


  我们已经看到，复制和 `majority write concern` 是避免在生产环境中出现节点资源不平衡的两个主要原因。对于三节点副本集，您的部署容量在发生任何单点组件故障后，受限于最慢节点的计算资源。


  ## 关键要点


  从本章中，需要记住的关键概念如下：


  *   MongoDB 架构的设计旨在优化正常运行时间和恢复能力。

  *   可以通过添加冗余组件并避免基础设施中的单点故障来采取缓解措施以避免故障。

  *   在至少三个数据中心和多个互联网骨干网中部署具有奇数个节点的副本集，可以避免许多故障点。

  *   特殊节点（如隐藏或延迟成员）应仅在至少三个数据承载节点之外部署。

  *   副本集中不可能有多个主节点。因为需要一个法定数量的投票节点才能产生一个主节点，所以分区只有一方能赢得选举。如果投票节点数为偶数，则有可能即使所有节点都在线，双方也无法产生主节点。

  *   应避免并计划消除手动干预。遵循最佳实践，唯一需要手动干预的情况是多个独立故障同时发生时。

  *   应使用滚动维护来升级或更改配置，确保任何时候只有一个节点不可用。

  *   副本集中的所有节点都应配置至少 72 小时的 `oplog`，以便在周末也能快速恢复并满足 SLA。


  '
- "# 3. 安全\n\n> *2016 年，美国研究公司 Cybersecurity Ventures 预测，到 2021 年，网络犯罪每年将给全球造成 6 万亿美元的损失，高于\
  \ 2015 年的 3 万亿美元。*^(¹)\n\n本章介绍与 MongoDB 集群设计相关的主要安全特性，包括如何在基础架构层面保护系统、对传输中和静态数据进行加密，以及如何通过应用程序代码和接口防范攻击。\n\
  \n最后，我们将探讨如何审计集群操作以及混淆日志，以便在不泄露数据库用户数据的情况下进行性能分析。\n\n## 本地访问\n\n保护任何 MongoDB 部署的第一步是确保对主机的访问仅限于受信任的用户。由于所有数据最终都存储在文件系统上，恶意系统用户可能损坏、窃取、劫持或破坏本地磁盘上的任何数据。\n\
  \n每个操作系统都有自己的方法来限制对机器的登录。通常，每个用户都有自己的认证凭据（密码或 SSH 密钥）并被分配到一个组。`mongod`进程及其二进制文件和数据文件通常以`mongod:mongod`身份运行，这是通过\
  \ RPM 存档在 Linux 机器上安装 MongoDB 时的默认设置。\n\n作为系统管理员，您应始终遵循*最小权限原则*，例如，禁止通过 SSH 以 root\
  \ 身份登录机器，限制`sudo`权限，并记录所有连接尝试（包括成功和失败的）以备后续审计。像 OWASP ([`www.owasp.org`](http://www.owasp.org))\
  \ 这样的安全资源提供了有用的工具和培训来帮助实现这一目标。\n\n## 网络加固\n\nMongoDB 在主机上运行后，需要与副本集或分片集群的其他成员进行通信（双向），并且需要接收来自其他可信源（如应用程序和\
  \ MongoDB Compass 等数据探索工具）的某些传入连接。我们稍后会介绍多层安全措施，但最基本的是，我们希望将访问限制在特定端口，并仅限某些远程主机。\n\
  \n如图 3-1 所示，所有副本集组件和驱动程序都需要能够建立出站连接并与所有其他组件通信，通常是跨数据中心的。\n\n![../images/487346_1_En_3_Chapter/487346_1_En_3_Fig1_HTML.jpg](img/487346_1_En_3_Fig1_HTML.jpg)\n\
  \n图 3-1\n副本集中组件建立的连接\n\n\n### 使用 iptables 的防火墙\n\n大多数 Linux 发行版都预装了防火墙系统。我们将介绍最常见的一个：`iptables`。这是一个非常复杂且强大的防火墙系统，但正确配置可能比较困难。Red\
  \ Hat Linux 在图形用户界面中包含了一些辅助工具，并提供了一个向导来帮助生成 `iptables` 规则列表。\n\n实际上，你可以手动配置防火墙，使用一系列规则来允许仅与\
  \ MongoDB 集群的其他成员以及任何应用服务器、开发者机器，甚至最终用户主机之间的连接。\n\n要允许来自受信任主机的传入连接，你可以在配置文件 `/etc/sysconfig/iptables`（以及\
  \ `/etc/sysconfig/ip6tables`）中添加条目，如清单 3-1 所示。\n\n```\n-A INPUT -s 12.34.56.78 -j\
  \ ACCEPT\n-A OUTPUT -d 12.34.56.78 -j ACCEPT\n清单 3-1\n允许受信任主机 12.34.56.78 的流量通过防火墙\n\
  ```\n\n这将允许与该受信任主机之间在任何端口上的任何流量（TCP 或 UDP）。为了增强安全性，你还可以将访问限制为仅使用 MongoDB 节点所用端口的\
  \ TCP 流量。此外，你可以限制出站流量仅为从远程主机建立的连接，如清单 3-2 所示。\n\n```\n-A INPUT -s 12.34.56.78 -p\
  \ tcp --destination-port 27017 -m state --state NEW,ESTABLISHED -j ACCEPT\n-A OUTPUT\
  \ -d 12.34.56.78 -p tcp --source-port 27017 -m state --state ESTABLISHED -j ACCEPT\n\
  清单 3-2\n仅允许活动 MongoDB 端口的 TCP 流量\n```\n\n你需要为部署中的每个主机配置这样一对规则，包括配置服务器、`mongos` 实例以及运行需要连接到数据库的应用程序的任何主机。\n\
  \n为了确保 `iptables` 正在运行，请使用以下命令重启它：\n\n```\nservice iptables restart\n```\n\n如果你的网络或主机支持\
  \ IPv6，你可以同时配置 `ip6tables`，或者完全禁用该主机的 IPv6，并将 MongoDB 配置为仅绑定到 IPv4 网络接口。\n\n对于较新的\
  \ Linux 系统，你也可以使用 `firewalld` 作为 `iptables` 的替代方案。两者都使用 `netfilter` 框架来实际处理数据包，但\
  \ `firewalld` 可以在已建立的连接上更改配置。对于在 Linux 上排查连接问题，`ss -plnt` 命令对于查看套接字统计信息非常有用。\n\n\
  在 Windows 上，你可以使用 `netsh` 在所有组件（所有 MongoDB 节点、分片和配置服务器以及应用程序）之间打开所有需要的端口。和往常一样，官方文档为你所使用的\
  \ MongoDB 版本提供了逐步示例。\n\n### 使用 bindIp 限制接口\n\n默认情况下，新版本的 MongoDB 将 `bindIp` 配置参数默认设置为\
  \ `127.0.0.1`。这意味着 `mongod` 进程仅监听来自 `localhost` 接口的传入请求，并忽略任何外部网络接口。这对于在开发机器上进行测试，或者将独立的\
  \ MongoDB 与 Web 服务器运行在同一云服务器实例上是合适的。要接受来自外部客户端的请求，你需要同时指定接口的 IP 地址，即网络分配给主机的用于路由外部流量的\
  \ IP 地址，通过设置：\n\n```\nnet:\nbindIp: 12.34.56.78\n```\n\n如果由于某种原因你的主机动态分配了随时间变化的\
  \ IP 地址，你可以通过添加以下内容让 MongoDB 绑定到所有接口：\n\n```\nnet:\nbindIp: 0.0.0.0\n```\n\n或者\n\
  \n```\nnet:\nbindIpAll: true\n```\n\n注意：这可能会允许来自互联网的传入连接尝试。在添加外部接口之前，你应始终启用认证。\n\
  \n### 自定义端口\n\n另一个小型的安全增强措施是在非标准端口上运行你的 MongoDB 部署。在分片集群中，默认情况下，承载数据的节点将在端口 27018\
  \ 上运行，而 `mongos` 在 27017 上运行。通过将这些端口更改为不同的端口，可以阻止简单的恶意软件或端口扫描器发现正在运行的 MongoDB 实例。\n\
  \n可以在配置文件中通过以下方式进行配置：\n\n```\nnet:\nport: 37001\n```\n\n## 文件系统\n\n在大多数 Linux 安装中，MongoDB\
  \ 以用户 `mongod` 和组 `mongod` 的身份运行。因此，它会以这个相同的 `mongod` 用户身份创建所有数据文件和日志文件。数据文件和日志文件的路径也应由该用户和组所有，其他任何用户甚至不应具有读取权限。\n\
  \n可以通过在你的 `dbPath`（通常是 `/var/lib/mongodb`）上运行 `ls -l` 来检查当前的权限。\n\n如果你创建了一个密钥文件来保护服务器，它也应由\
  \ `mongod` 所有，并且组用户甚至不应具有读取权限。这可以通过运行以下命令实现：\n\n```\nchmod 600 /path/to/keyfile\n\
  ```\n\n注意：没有文件级加密的情况下，任何对主机具有 root 访问权限的人都可以启动一个没有访问控制的独立 `mongod` 进程并读取数据。\n\n\
  ### 认证\n\n虽然网络安全是保护任何数据库的关键因素，但它只是安全环境的一个组成部分。来自已知来源的连接仍然需要加以限制，以防止受损主机远程访问数据。MongoDB\
  \ 支持多种不同的认证方法，要求新的传入连接在执行任何数据库操作之前进行身份验证。\n\n### 密码与密钥文件\n\n强烈建议在 MongoDB 部署中使用基于角色的访问控制\
  \ (RBAC) 来创建用户，并且一旦开始在数据库中存储任何真实数据，你应至少创建一个用户账户。\n\n像大多数数据库一样，你可以创建一个用户名和密码，该用户可以被授予访问多个数据库或集合的权限。用户可以被限制为某些角色，例如“只读”，或者仅限于能够配置副本集，但根本看不到任何数据。你应始终遵循“最小特权”原则，仅授予该特定用户完成其用例所需的角色。\n\
  \n注意：仅创建用户账户不足以在连接到 MongoDB 数据库时要求进行认证。你还必须显式启用认证。\n\n可以通过在配置文件中添加以下行，然后重启 MongoDB\
  \ 节点来启用认证：\n\n```\nsecurity:\nauthorization: enabled\n```\n\n系统管理员可以通过在不带 `--auth`\
  \ 参数或 `security.authorization` 配置的情况下重启 `mongod` 进程来临时禁用访问控制。如果忘记了管理员密码，这对于维护和密码重置很有用。\n\
  \n#### 使用密码连接\n\n当从驱动程序或像 MongoDB Compass 或 Mongo shell 这样的数据浏览器工具连接到 MongoDB 时，你需要通过特殊字段或在\
  \ *连接 URI* 中以以下形式提供用户名和密码：\n\n```\nmongodb://[username:password@]host1[:port1][,...hostN[:portN]][/[database][?options]]\n\
  ```\n\n当在 URI 中指定包含特殊字符的密码时，它们需要被转义；当在命令行中使用时，它们应被双引号或单引号包围。\n\n在部署中使用密码的一个问题是，脚本将需要存储密码以连接到\
  \ MongoDB。这是一个安全风险，因为密码以未加密的形式存在于脚本文件（和源代码控制）中，可能会出现在进程列表中（例如 Linux 上的 `ps`），并且可能不安全地存储在用户的个人计算机上。\n\
  \n如果你的组织有更严格的安全要求，你应该考虑使用 x.509 证书（稍后讨论）。\n\n### Keyfiles\n\n密钥文件本质上是一个存储在安全文件中的超长密码，由部署中的每个\
  \ `mongod` 节点引用。该密钥文件充当组件之间的“共享密言”，使它们在建立副本集或向现有集添加全新节点时能够进行身份验证。\n\n如果没有这个共享密言，黑客可能将他们控制下的新空节点添加到现有副本集，并触发初始同步。他们将借此搭上\
  \ MongoDB 复制架构的便车来复制数据库。\n\n这些文件的内容应视为密码，并在文件系统级别限制读取权限。任何获得其内容的人都可以伪造对副本集的访问，因此这是您部署的最低安全措施。\n\
  \n您可以通过如下所示指定路径并重启服务器，来指示 MongoDB 要求密钥文件进行内部身份验证：\n\n```yaml\nsecurity:\n  keyFile:\
  \ /path/secure.key\n```\n\n请注意，设置密钥文件也会自动启用身份验证。\n\n### x.509 证书\n\n比使用密钥文件更优越但更复杂的方法是为您的服务器和客户端组件创建和部署\
  \ x.509 证书。\n\n在撰写本文时，有一个方便免费的站点叫 Let’s Encrypt，它使得生成可用于 MongoDB 的 x.509 证书变得容易，但要求您的主机具有可公开寻址的\
  \ DNS 主机名。这些证书仅持续 90 天，因此您需要编写脚本来自动生成和更新它们。\n\n虽然 x.509 证书可用于保护 MongoDB 集群组件*内部*通信的安全，但稍有不同的证书格式可用于*应用程序*客户端向集群进行身份验证。如果您选择使用此方法，那么每个连接的的不同用户账户都需要为其创建一个唯一的证书，并将用户名嵌入元数据中。\n\
  \n### Client authentication\n\nMongoDB 具有独立的*身份验证*和*授权*子系统。身份验证可以使用内置的身份验证方法（称为加盐质询响应身份验证机制（SCRAM））执行，也可以通过支持轻量目录访问协议（LDAP）或\
  \ Kerberos 的外部身份验证系统执行。使用 SCRAM 时，用户及其凭据以加密形式存储在 `admin` 数据库中（并自动复制到部署中的所有成员）。\n\
  \n授权是在身份验证成功后的后续步骤，MongoDB 将在允许运行命令之前检查经过身份验证的用户的角色和权限。\n\n可以根据需要，在数据库或集合级别授予授权。可以将多个预定义角色的权限相加以达到正确的组合。\n\
  \n**注意**\n\nx.509 和 Kerberos 集成仅允许身份验证，而授权基于在 `admin` 数据库上创建的权限和角色。MongoDB Enterprise\
  \ 还支持通过 LDAP 进行完整的授权——这样用户和角色都完全在 LDAP 服务器中定义。\n\n#### External authentication\n\
  \nMongoDB 提供了多种类型的外部身份验证方法。截至本文撰写时，支持的方法包括 x.509、LDAP 和 Kerberos。LDAP 是一个标准的目录协议，具有许多开源和商业实现，例如\
  \ OpenLDAP、Windows Active Directory 和 Apache Directory Server。Kerberos 是一个用于大型客户端/服务器系统的行业标准身份验证协议，允许客户端和服务器相互验证对方的身份。在撰写本文时，Windows\
  \ Active Directory 和 Apache Directory Server 支持 Kerberos。\n\n大多数这些方法需要在 `$external`\
  \ 数据库上创建用户，并在 MongoDB 内部定义角色和权限。外部源仅执行身份验证步骤。\n\n使用外部身份验证时，是 MongoDB 服务器与外部身份验证服务通信，而不是应用程序直接通信（图\
  \ 3-2）。\n\n![../images/487346_1_En_3_Chapter/487346_1_En_3_Fig2_HTML.jpg](img/487346_1_En_3_Fig2_HTML.jpg)\n\
  \n**图 3-2**\n\n外部身份验证的步骤和通信\n\n表 3-1 列出了支持的身份验证机制及其与身份验证和授权行为的关系。通过 `--authenticationMechanism`\
  \ 配置机制的值显示在括号中。请注意，即使使用 Kerberos 身份验证，您仍然可以使用 LDAP 授权来将用户映射到角色。\n\n**表 3-1**\n\n\
  可用的不同身份验证机制\n\n| 机制 | 身份验证 | 授权 |\n| :--- | :--- | :--- |\n| SCRAM (`SCRAM-SHA-256`)\
  \ | 密码在 MongoDB 内部加密 | 权限在 MongoDB 中定义。 |\n| x.509 (`MONGODB-X.509`, external) |\
  \ 用户已注册，但 MongoDB 中无密码。每个用户都有一个唯一的证书。 | 权限在 MongoDB 中定义。 |\n| LDAP (`PLAIN`, external)\
  \ | 客户端发送密码，但密码从不存储在 MongoDB 中。 | 权限在 MongoDB 中定义，或与 LDAP 协同工作以进行可选的授权（仅限 MongoDB\
  \ Enterprise）。 |\n| Kerberos (`GSSAPI`, external) | 用户已注册，但 MongoDB 中无密码。 | 权限在\
  \ MongoDB 中定义。 |\n\n### Encrypted connections\n\n即使您的所有 MongoDB 节点和应用程序都存在于同一个安全网络中，考虑加密所有通信仍然是一个好主意。这可以防止对进出\
  \ MongoDB 部署的网络流量进行窃听，并使您日后想要迁移时更容易横向扩展。例如，您可能希望逐渐从完全本地部署过渡到部分节点托管在云提供商上的混合解决方案。\n\
  \n对于任何生产用途，您应该已经为 MongoDB 部署考虑采用具有物理分离数据中心的多数据中心配置。即使使用 VPN/VPC，数据中心之间的同步几乎总是依赖于共享的互联网骨干网，因此加密连接对于保持数据安全至关重要。\n\
  \nMongoDB 社区版包含使用 TLS/SSL（传输加密）对*传输中*数据的完整加密。由于加密连接对于安全系统至关重要，最近版本的 MongoDB 默认移除了对较旧、安全性较差的\
  \ TLS 1.0 系统的支持。您可以使用来自官方*证书颁发机构*的任何有效证书，也可以使用 `openssl` 命令行工具从头开始构建自己的*自签名证书*。无论采用哪种方法，数据流都会被加密，但如果没有由第三方证书颁发机构签署的证书进行身份验证，您的通信可能容易受到所谓的*中间人攻击*。\n\
  \n即使您已为内部 MongoDB 通信配置了 TLS，您仍需要通过将 `?ssl=true` 添加到连接字符串来显式启用从应用程序到 MongoDB 的加密。如果您想要求所有客户端都使用\
  \ TLS 才能连接到您的 MongoDB 服务器，可以将此配置添加到您的 MongoDB 配置中：\n\n```yaml\nnet:\n  tls:\n  \
  \  mode: requireTLS\n```\n\n**注意**\n\n在 MongoDB 4.2 及更高版本中，所有配置引用都从 SSL 更改为 TLS，例如：\n\
  \n`net.ssl.mode: requireSSL`\n\n变更为\n\n`net.tls.mode: requireTLS`\n\n在生产环境中，您应该为\
  \ MongoDB 部署中的所有组件使用由*同一证书颁发机构*（无论是组织内部的还是受信任的第三方 TLS 供应商）签署的有效证书。\n\n\n### TLS\
  \ 1.2\n\n一些组织有严格的规定，要求使用 TLS 1.2 加密所有连接。如果是这种情况，你可以通过在任何已启用 SSL/TLS 的 MongoDB 服务器上添加\
  \ `disabledProtocols` 参数来显式禁用 TLS 1.0 和 1.1：\n\n```yaml\nnet:\n  tls:\n    disabledProtocols:\
  \ TLS1_0,TLS1_1\n```\n\n在许多驱动程序中，你也可以强制传出应用连接使用 TLS 1.2。例如，使用 Java 驱动程序，你可以通过以下代码构建连接来强制执行\
  \ TLS 1.2：\n\n```java\nSSLContext sslContext = SSLContext.getInstance(\"TLSv1.2\"\
  );\nMongoClientOptions options = MongoClientOptions.builder()\n    .sslEnabled(true)\n\
  \    .sslInvalidHostNameAllowed(true)\n    .socketFactory(sslContext.getSocketFactory())\n\
  \    .build();\n```\n\n### 静态加密\n\n默认情况下，MongoDB 将其数据以 snappy 压缩的 WiredTiger 二进制文件形式存储在磁盘上。如果未经授权的一方访问到这些文件（或其备份）且没有加密，他们可以轻松启动自己的本地\
  \ MongoDB 进程指向这些文件并启动一个禁用了所有认证的数据库。然后任何 MongoDB 客户端都可以连接以浏览或查询该数据。\n\n为了防止此类攻击，任何包含真实用户数据的\
  \ MongoDB 数据库都应对静态数据进行加密。\n\n静态数据加密可以通过以下两种方法之一解决：\n\n1.  加密卷\n2.  从应用程序加密\n\n第一项可以通过文件系统上的磁盘加密来解决。如果你在主流云提供商上自托管，你应该能够访问利用内置主密钥管理服务的文件系统级加密。\n\
  \n或者，所有近期的企业版 Linux 发行版都包含全盘加密解决方案，例如 Linux 统一密钥设置磁盘格式（或 LUKS）。这也使用主密钥来加密整个存储卷或其子集。你应该将\
  \ MongoDB 数据文件存储在与根分区不同的卷上（以便进行针对性的性能调优），这也使得文件系统级加密成为一个实用的选择。\n\n但是，如果你不想在卷级别加密，那么在数据库服务器内部加密是另一个选择。\n\
  \n幸运的是，静态加密是 MongoDB 企业版的一个可选模块。此加密过程完全自动进行。只有加密数据才会被写入磁盘，而未加密数据仅在主机的内存中可用。\n\n\
  > **注意**\n>\n> 应用程序崩溃时的任何核心/内存转储都可能包含未加密的 MongoDB 数据，因此在与第三方共享转储时要小心。\n\n通过使用外部主密钥配置加密，并使用兼容密钥管理互操作协议（KMIP）的第三方密钥管理应用程序进行适当的密钥轮换，可以满足大多数数据隐私合规性法规的要求。\n\
  \n### 备份\n\n你不应忘记确保所有创建的备份也已加密并安全存储。使用 `mongodump` 进行备份时，你可以写入到加密卷。如果使用 Ops Manager\
  \ 进行备份，则需要兼容 KMIP 的密钥服务器才能对快照进行加密。\n\n### 审计、日志混淆\n\n自 MongoDB 2.6 起，企业版 MongoDB\
  \ 已包含审计功能。在 `mongod` 或 `mongos` 实例上启用后，这允许数据库管理员跟踪复杂部署中的所有关键更改。在发生任何安全事件后进行事后分析或作为定期合规性检查的一部分时，这些审计日志可能至关重要。在这些情况下，审计日志可以显示用户角色的任何更改、创建的新用户或对生产数据库的意外访问。\n\
  \n社区版没有此审计功能的等效功能，尽管第三方已创建了一些解决方案，复制了一些基本功能，包括将输出过滤到特定用户、数据库、集合或源位置。\n\n审计日志功能需要在\
  \ MongoDB 配置文件中显式启用，并且可以输出到文件、控制台或兼容的 `syslog` 目标，以便最终存储在集中式日志服务器上以增加安全性。激活后，默认情况下，它将为部署中任何用户的每个更改操作记录一个日志条目。也可以配置过滤器以简化审计日志。\n\
  \n清单 3-3 显示了一个简单配置的示例。\n\n```yaml\nauditLog:\n  destination: file\n  format: BSON\n\
  \  path: /var/lib/mongodb/auditLog.bson\n  # 清单 3-3\n  # 启用 BSON 格式的审计日志记录\n```\n\
  \n将审计日志存储在节点及其数据的同一文件系统上有相当大的缺点。例如，日志文件需要具有 mongod 进程的读/写权限。如果服务器被外部黑客甚至拥有凭据的员工攻破，他们可以通过从\
  \ `auditLog.bson` 文件中删除证据或完全删除文件来掩盖他们的痕迹，从而使事后分析变得不可能。\n\n另一种方法是将审计日志通过 syslog 管道输出，并安装一个\
  \ *日志处理系统*，例如 rsyslog，它可以处理不同的日志生成源并将其输出到不同的目的地。这需要在 MongoDB 主机机器上设置一个 *Rsyslog\
  \ 客户端* 和一个集中式的 *Rsyslog 服务器*，该服务器通过开放的 TCP 端口接受来自部署中每个主机的日志消息。从 MongoDB 端，这需要将配置设置更改为\n\
  \n```yaml\nauditLog:\n  destination: syslog\n```\n\n![../images/487346_1_En_3_Chapter/487346_1_En_3_Fig3_HTML.jpg](img/487346_1_En_3_Fig3_HTML.jpg)\n\
  *图 3-3 审计日志消息发送到集中式主机*\n\n> **注意**\n>\n> 一个独立的 MongoDB 部署实际上是 `rsyslog` 的一个可能输出目标，并且可以是集中来自复杂应用程序部署日志的一个很好选择，但最好将\
  \ MongoDB 审计日志保存在完全独立的架构中，以避免审计跟踪被篡改。\n\n默认情况下，日志文件既不加密也不混淆，但企业版还有另一个功能，可以对可能泄露到日志文件中的用户数据进行编辑。要启用此功能，请在配置文件中设置\n\
  \n```yaml\nsecurity:\n  redactClientLogData: true\n```\n\n或者在运行时通过以下命令启用：\n\n```javascript\n\
  db.adminCommand(\n  { setParameter: 1, redactClientLogData : true | false }\n)\n\
  ```\n\n### 主动安全\n\n对于任何安全网络，你应该已经建立了定期的物理和环境安全审查、漏洞扫描、渗透测试以及对网络或虚拟机异常流量模式的自动警报。这应该能够对任何安全漏洞进行快速干预。\n\
  \nMongoDB 在发布后支持大多数版本大约 2 年，并提供定期的安全补丁。你应该快速升级到任何次要版本（例如从 4.2.8 到 4.2.9），因为这些版本通常包含安全改进，但绝不会引入破坏兼容性的更改。你也可以考虑在最新主要版本发布后的\
  \ 6 个月内升级到该版本，以受益于其他重大的安全和稳定性改进。\n\n你还可以监控 [`www.mongodb.com/alerts`](http://www.mongodb.com/alerts)，关键警报和公告将会发布在那里。\n\
  \n### 服务器端 JavaScript\n\n\n### 输入验证与注入攻击\n\n由于 MongoDB 基于 JSON 文档，因此不存在传统 `SQL`\
  \ `注入攻击`的风险。然而，当运行 JavaScript/NodeJS Web 应用程序（如 Mongoose ORM）或 API 时，存在 `JSON 注入攻击`的可能性。设想一个\
  \ API，它接受 JSON 文档作为查询的一部分。如果此查询被直接传递给 MongoDB 的 `find` 查询，恶意用户可能会利用 MongoDB 查询语言的技巧来查询属于其他用户的数据，这被称为“对象注入”。已知的攻击会结合使用\
  \ `$not` 和 `$ne` 来绕过常规检查。\n\n假设你有一个登录界面，它接受 Web 浏览器输入，格式如下：\n```\n{user: 'nic',\
  \ password; '123'}\n```\n并且这个输入被直接传递到类似下面的查询中：\n```\ndb.users.findOne(query)\n```\n\
  如果这个 `findOne` 返回了结果，我们就一步完成了用户认证和数据加载。这是减少一次到服务器往返的巧妙方法吗？不是。如果黑客转而发送：\n```\n{user:\
  \ 'nic', password: {$ne: ''}}\n```\n或\n```\n{user: 'nic', password: {$gt: ''}}\n\
  ```\n即使黑客无需尝试猜测我的密码，这个查询也会向 `findOne` 返回一个文档。当然，这种攻击不仅适用于读取未授权数据。即使是从不验证 JSON 数据的应用程序进行的数据库插入和更新，也可能存在风险。\n\
  \n因此，对于在 API 查询中接受 JSON 文档的应用程序设计者来说，验证此类文档并以预期的数据类型提取值至关重要。\n\n对于 NodeJS，有一些库如\
  \ `Joi` 可以提供帮助。其他选项包括使用 `JSON.parse`，使用像 `mongo-sanitize` 这样的 `npm` 包，或者在使用数据之前手动删除\
  \ API 输入中的任何美元符号或花括号。\n\n### $where 操作符\n\n`$where` 操作符是一个旧的 `find` 查询功能，它允许你向查询子系统传递一个包含\
  \ JavaScript 表达式的字符串或一个完整的 JavaScript 函数。显然，允许将 JavaScript 命令传递给 MongoDB 内置的 JavaScript\
  \ 引擎是危险的，特别是如果存在这些命令可能来自未经验证的用户输入的风险时。\n\n已经增加了各种安全改进和限制来约束其影响，但底线是这是一个非常危险的功能，几乎所有原始用例都可以通过其他更新、性能更好、更安全的\
  \ MongoDB 函数来处理。\n\n即使在最新版本的 MongoDB 中，此选项默认也是启用的，但我们建议你在所有部署中将其禁用，方法是在配置文件中添加：\n\
  ```\nsecurity:\n  javascriptEnabled: false\n```\n或者使用 `--noscripting` 命令行选项。这也将禁用旧的\
  \ `mapReduce` 和 `db.collection.group` 功能——这两者都可以在你的应用程序中通过使用 `聚合管道` 来替代。\n\n注意\n\
  \n如果你启用了 `SELinux`，则绝对应该禁用服务器端 JavaScript，因为任何需要 JavaScript 的操作尝试都将导致 MongoDB 段错误。\n\
  \n### SELinux\n\n安全增强式 Linux（也称为 `SELinux`）是一个 Linux 模块，它提供了一种支持访问控制安全策略（例如强制访问控制）的机制。一旦启用，`SELinux`\
  \ 可以通过限制对某些预先批准的目录、文件和网络端口的访问，来防止 Linux 主机上的任何单个程序/服务危及整个系统。\n\n在设置 MongoDB 时，你可以在两种不同的模式下运行\
  \ `SELinux`。`宽容` 模式适用于调试你的配置，因为它将允许 MongoDB 尝试所有访问，但会记录每一次尝试。一旦你将 `SELinux` 切换到\
  \ `强制` 模式，它将阻止任何未授权的访问，并可能阻止你的 MongoDB 实例按预期运行。\n\n你可以通过运行 `getenforce` 来检查当前模式，或使用\
  \ `sestatus` 查看完整状态。为了使强制模式成为系统启动时的默认模式，通常你只需要编辑 `/etc/selinux/config` 文件。\n\n当通过预打包的\
  \ RPM 文件安装 MongoDB 时，有一些用于存储数据和日志文件的标准目录：\n\n*   `/var/lib/mongo`（数据目录）\n*   `/var/log/mongodb`（日志目录）\n\
  \nRed Hat Enterprise Linux 7（及其衍生版本）中包含的 MongoDB 默认 `SELinux` 配置假设使用相同的目录，因此如果你选择将\
  \ MongoDB 配置为在其他位置存储数据或日志，你将需要使用一系列命令手动更新 `SELinux` 权限。例如，如果你想将数据存储在新的分区 `/data/mongodb`\
  \ 中，你需要运行以下命令以允许 MongoDB 正确启动和运行：\n```\nsemanage fcontext -a -t mongod_var_lib_t\
  \ '/data/mongodb.*'\nchcon -Rv -u system_u -t mongod_var_lib_t '/data/mongodb'\n\
  restorecon -R -v '/data/mongodb'\n```\n同样地，要使用非标准端口进行绑定，你需要运行：\n```\nsemanage port\
  \ -a -t mongod_port_t -p tcp <端口号>\n```\n如果 `SELinux` 阻止你的 MongoDB 实例正确启动，它会将所有详细信息以自定义格式记录到本地\
  \ `/var/log/audit/audit.log` 文件中。如果你在配置 MongoDB 并启用 `SELinux` 强制模式时遇到任何问题，有一些工具和命令可以帮助你根据这个\
  \ `audit.log` 来解释问题。\n\n`audit2allow` 可以帮助生成一组新的 `SELinux` 策略，你可以以比默认策略更高的优先级引入这些策略来覆盖它们。\n\
  \n或者，运行：\n```\nsudo sealert -a /var/log/audit/audit.log\n```\n将激活 `setroubleshoot`\
  \ 客户端工具，通常会提供一些有用的见解和针对 `SELinux` 配置更改的建议。\n\n付出额外的努力来启用 `SELinux` 并让 MongoDB 生产实例在强制模式下运行是非常值得的。如果可能，请坚持使用默认端口和目录路径，因为保持这些标准也将有助于新团队成员上手并简化任何后续的故障排除。\n\
  \n### 二进制监控\n\n有一些解决方案旨在为在银行或医院等敏感企业中运行的关键应用程序增加额外的保护层。这些工具操作二进制代码，并用它们自己的函数替换某些操作（如内存分配）。其思路是监控和防止某些攻击途径。像\
  \ `Imperva` 这样的公司提供了声称与 MongoDB 兼容的工具，但根据我的有限经验，这些工具可能会增加不稳定性，并且其承诺的额外保护程度难以量化。\n\
  \n### 认证\n\n`ISO/IEC 27000` 系列标准帮助组织保护信息资产安全。特别是 `ISO/IEC 27001`，它规定了一套最佳实践，并详细列出了与信息风险管理相关的安全控制清单。\n\
  \n虽然 27001 标准没有强制要求特定的信息安全控制，但它所建立的框架和控制清单使公司能够确保一个全面且持续改进的安全管理模式。\n\n另一个流行的框架是支付卡行业数据安全标准\
  \ (`PCI DSS`)。即使你不存储信用卡数据，其核心要求也是一个很好的安全活动检查清单。\n\n如果你的数据特别敏感，你的组织应考虑对你的安全实践进行认证。`MongoDB\
  \ Inc.` 为 `Atlas` 提供的认证和白皮书是一个有用的参考，请参阅 [`www.mongodb.com/cloud/trust`](http://www.mongodb.com/cloud/trust)。\n\
  \n\n## 检查清单\n\n总之，以下是保护 MongoDB 部署应采取的所有步骤的检查清单：\n\n1.  启用身份验证（并创建具有完成其用例所需的最小权限的\
  \ MongoDB 用户），如果可用，请使用 Kerberos 进行外部身份验证。\n2.  通过阻止来自所有非受信 IP/网络的传入连接并阻止所有非关键端口来保护网络基础设施。\n\
  3.  确保主机上的大多数用户只能读取而不能修改 MongoDB 数据或日志文件。\n4.  配置所有组件之间的加密（内部身份验证、复制）以及使用定义明确的 x.509\
  \ 证书从客户端进行的加密。\n5.  使用文件系统加密或使用定期轮换的主密钥的应用程序级加密来加密静态数据（仅限企业版）。\n6.  将审计日志发送到集中式日志服务器（仅限企业版）。\n\
  7.  编校日志文件，避免将敏感用户数据泄露到日志中（仅限企业版）。\n8.  禁用服务器端 JavaScript。\n9.  强制执行 SELinux。\n\
  10. 在不再需要时（即人员离开团队时）删除用户帐户。\n11. 尽快升级到任何 MongoDB 次要版本，以利用安全修复。\n12. 监控安全警报页面 [`www.mongodb.com/alerts`](http://www.mongodb.com/alerts)\
  \ 以获取任何更新。\n\n脚注 1   2\n\n"
- '# 4. 合规性与 GDPR


  > *依赖政府来保护你的隐私，就像要求一个偷窥狂来安装你的百叶窗。*

  >

  > ——约翰·佩里·巴洛，网络自由主义者、政治活动家、电子前沿基金会创始成员


  > *将消费者隐私作为竞争差异化点的企业将赢得更高的客户忠诚度。*

  >

  > ——皮埃尔·南特梅，埃森哲董事长兼首席执行官


  > *数据隐私已不再仅仅是律师们的事情。在领英，我们称之为隐私文化。*

  >

  > ——卡琳达·瑞纳，领英全球隐私主管


  存储海量数据的能力为强大的分析洞察创造了机会。随着世界各地新数据保护法规的出台，它也给公司带来了合规和安全风险，因为数据通常被倾倒到数据湖或数据仓库中，而没有适当的标签、审计或策略执行。


  MongoDB 提供了许多功能来减轻遵守隐私法规（如被遗忘权和导出个人数据权）的部分负担。其他义务，例如在 72 小时内通知用户其数据泄露的要求，则需要定制的
  `业务工作流程` 和 `应用程序端准备`。


  ## 通用数据保护条例


  虽然许多法规，如欧盟的 `通用数据保护条例` (GDPR)，看起来极其复杂，但实际上它们是许多行业最佳实践的法典化。尽管 GDPR 是一部基于欧盟的法律，但它适用于全球任何存储或处理欧盟公民数据的组织。不合规的罚款很高，最高可达
  2000 万欧元或违规组织全球年收入的 4%，以较高者为准。不太严重的侵权行为仍面临一半的罚款。(³)


  在本章中，我们将讨论在现实世界的 MongoDB 部署中存储用户结构化数据时的主要合规性问题。通过正确的设置，现成的 MongoDB 工具可以提供关于存储了什么数据以及如何使用这些数据的可见性和透明度。MongoDB
  Enterprise 和 MongoDB Atlas 包含额外的安全和隐私功能。


  作为世界上最严格、最全面的法律规定，我们将以 GDPR 作为本章大部分讨论的基础，尽管我们也会探讨世界其他地区其他相关法规的显著差异。


  ### 隐私设计


  在运行数据库时，隐私法规范了组织如何收集、存储、处理、保留和共享欧盟公民的个人数据，即使对于处理或存储欧盟公民数据的外国公司也是如此。


  本章重点介绍 MongoDB 拓扑设计如何满足数据保护法规。我们涵盖了大多数法规的基本要求，以及某些 MongoDB 功能如何被用来，例如，根据角色隐藏特定数据，并作为“被遗忘权”的一部分删除用户数据。


  ### 注意事项


  GDPR 要求有明确证据表明组织正在持续进行合规努力。这使得有必要持续监控您的数据处理实践，并充分应对任何新出现的隐私和安全风险，以确保数据保护流程持续有效。


  免责声明


  为确保遵守适用于您所在国家或业务所在国家/地区的任何类似 GDPR 的法律，您应直接审阅相关法律（例如 `GDPR (条例 (欧盟) 2016/679)`），并寻求法律咨询，以便在您的情况下正确应用这些法律。


  ## 数据保护


  从高层来看，GDPR 涵盖了“被遗忘权”、“审查权”以及关于任何数据泄露或处理不当的“知情权”。


  本节将深入探讨一些对于设计、架构或使用 MongoDB 实施数据收集、存储或处理的人员特别关注的问题。


  ## 关键概念


  在深入细节之前，了解一些与全球所有数据保护法规相关的关键概念非常重要。


  `数据控制者` 是指收集、存储和处理关于个人（称为 `数据主体`）以及其他公司数据的组织。`数据处理者` 是指执行处理工作的雇员、承包商或软件工具（如 MongoDB
  或应用程序）。数据控制者有责任确保数据处理者有能力并配置为满足适用合规法规规定的所有隐私和安全要求。


  对于任何拥有国际客户的组织来说，这实际上意味着他们需要遵循每个客户所在地区的法规。如果您的数据库中有欧盟客户，并且您在欧盟运营，那么您需要确保您的数据存储满足所有
  GDPR 要求；否则，您将面临违规和处罚的风险。


  ### 个人身份信息


  `个人数据` 是与可识别的个人相关的任何信息，但不一定识别该个人。另一方面，`个人身份信息` (PII) 是任何可能识别特定个人的数据。表 4-1 显示了哪些类型的数据是个人身份信息，哪些不是。


  表 4-1


  个人数据类型示例及哪些是 PII


  | 个人身份信息 (PII) | 个人数据 (非 PII) |

  | --- | --- |

  | • 全名• 社会保险号码• 驾照号码 | • 设备 ID• IP 地址• Cookie |




  ## 数据隐私与 GDPR


  ### 定义


  构成欧盟法规的法律术语有很多，这些将在后续章节中使用。表 4-2 定义了最相关的术语。


  表 4-2：核心概念与定义摘要


  | 术语 | 定义 |

  | --- | --- |

  | 实体 | 控制或处理数据的个人、法人团体、组织、公共机构、代理机构或团体。 |

  | 数据控制者 | 决定个人数据处理的`目的`和`方式`的实体（可单独或与他人/公司/团体共同决定）。 |

  | 数据主体 | 由识别性数据值所指向的已识别或可识别的自然人，也称为`用户`。 |

  | 数据处理者 | 代表数据控制者负责处理个人数据的实体。该实体对任何数据泄露承担法律责任。在我们的语境中，数据处理者可包括 IT 团队负责人、应用程序开发人员、数据库管理员、QA
  团队、发布经理和 DevOps 工程师。 |

  | 数据保护官 | 组织内负责确保法规在内部得到应用，并保护数据主体免受处理操作不利影响的角色。 |

  | 个人数据 | 任何能唯一识别个人的信息（例如，移动设备 ID），并且`与`可识别的个人`相关`。任何真正匿名（或完全匿名化）的数据不包含在 GDPR 或本文涉及的其他法规中。
  |

  | 标识符 | 任何单独或组合起来能够识别个人的`类型`数据，例如 • 姓名 • 社会保障号或税务档案号 • 位置数据 • 用户名 • 生日 |

  | 在线标识符 | 标识符的一个特定子集，用于在线数据，例如 • IP 地址 • MAC（网卡）地址 • 浏览器 Cookie |

  | 关联因素 | 关于个人的其他详细信息，如生理或遗传数据。 |

  | 数据项 | 数据库中实际存储的关于某个人的字段`值`。 |


  ### 代表


  GDPR 要求公司在欧盟设有当地代表，该代表承担确保法规得到应用和数据保护得到遵守的法律责任。这使得该代表在数据被滥用或误用时可承担法律后果，便于实施罚款和处罚。


  ## 数据可移植性


  数据可移植性是数据保护法规领域中一个相对较新的要求，其设立是为了保护消费者免受*供应商锁定*的影响。该主题在 GDPR 第 20 条：数据可移植权（第 3 章）中有所阐述。


  这意味着，公司必须能够在收到请求后，以结构化的、机器可读的格式提供或传输其收集的关于客户的全部个人数据。


  通过 MongoDB 中良好的文档设计，在满足个人数据方面的这项要求可以相当容易。发现、识别和收集这些数据的难易程度可能取决于所选的架构设计和应用的验证级别。


  提示


  `MongoDB Compass`的"分析架构"功能可用于更轻松地找到`标识符`字段。


  以 JavaScript 对象表示法格式导出任何相关文档，在机器可读性方面应该是足够的。


  可以开发一个基于`聚合管道`的 MongoDB`视图`，使用`$lookup`来关联来自其他集合的相关文档，重新格式化某些字段，并排除其他字段。


  ## 数据大小


  从客户的物联网设备收集的历史数据被视为个人数据，应可导出。在这种情况下，你需要能够提供或传输大量数据。以高效、紧凑的结构化和存储数据对于存储和带宽成本都很重要。


  考虑使用*存储聚合*技术将较旧的数据聚合到精度较低的存储桶中，从而在不存储精确数据的情况下概括长期趋势。例如，你可能保留长达一个月的每小时数据点，然后只保留长达一年的日平均值。


  ## 个人数据的留存


  GDPR 第 13 条（第 2a 款）规定如下：


  > *控制者在收集* *个人数据* *时，应向* *数据主体* *提供以下确保处理公平透明所必需的进一步信息：（a）* ***个人数据*** *将被存储的**期限**……*


  该条款要求数据控制者预先知道*个人数据将被存储的期限*，并将其传达给最终用户。你至少应该有一个在收集时为数据加时间戳的策略，以及一个轮换数据的方法。


  ### 自动移除


  在实现自动移除旧数据的一种方法中，每个文档可以包含一个类似`dateCollected`的字段，并在该集合上针对该字段建立一个`生存时间索引`，以便在大约 12
  个月后自动、完全地移除文档。


  你应该谨慎处理批量删除，因为它们可能对复制过程产生性能影响，尤其是在 MongoDB 4.0 之前的版本中。大量操作在几秒钟内同时发生，可能会使 I/O 不堪重负，并暂时阻止其他操作。确保日期值的粒度足够细以避免这种情况（分钟级粒度通常效果良好）。另外，在将数据导入或迁移到
  MongoDB 时，注意不要将大量文档的日期字段设置为同一个占位日期或导入过程开始的时间戳。如果生存时间索引在 12 个月后突然启动，这可能会像前面描述的那样阻止复制。


  在代码清单 4-1 中，我们看到消息日志以分钟粒度级别存储，并有一个生存时间索引，该索引将在一年（365 天）后自动清除它们。根据系统的负载，这应该能创建足够小的批次，以避免停顿风险。


  ```

  db.msglog.insertOne(

  { from: "nic", to: "sophie",

  createDate: ISODate("2019-11-04T20:55"),

  msg: "What’s for dessert?" });

  db.msglog.createIndex(

  { "createDate": 1 },

  { expireAfterSeconds: 365*24*3600 } )

  ```

  清单 4-1：用于一年后删除数据的生存时间索引


  ### 自定义编辑


  清除个人数据的另一个选项是使用`cron`作业来启动更精细或自定义的旧个人数据清理。例如，你可以使用`$unset`更新命令在预定义的时间段后从文档中删除某些字段（参见代码清单
  4-2）。


  注意


  MongoDB 的 Realm 无服务器平台包含"计划触发器"，允许在预定义的时间间隔执行任意 JavaScript 函数来清除、修剪或聚合文档。


  代码清单 4-2 中的代码对收集的数据执行一种"滚动编辑"，清除`PII`字段，但保留其他字段，以便后续可以进行数据挖掘以寻找其他趋势和关联，而不会冒暴露存储的个人数据的风险。


  ```

  db.msglog.insertOne(

  { from: "nic", to: "sophie",

  createDate: ISODate("2019-11-04T20:55"),

  msg: "What’s for dessert?",

  metadata: {

  deviceId: "34-A4-8C-71",

  deviceName: "iPhone XS",

  ip: "123.45.67.89",

  gps: { lat: 48.86, long: 2.349 }

  }});

  db.msglog.update(

  { _id: ObjectId(1234...) },

  { $unset: {metadata: "" } )

  ```

  清单 4-2：当不再需要时取消设置某些元数据




  ### 被遗忘权


  全球大多数数据合规法规的另一个常见组成部分是，用户有权要求删除所有收集到的关于他们的数据。这涉及到与数据可移植性合规类似的许多数据发现技术问题。主要区别在于，数据需要被完全销毁，而不仅仅是导出。为了完全合规，备份中的用户数据也应被清除，或者个人数据的备份保留时间应限制在非常短的时间内。


  > **注意**

  >

  > MongoDB 的字段级加密支持允许使用每个用户的密钥来加密个人数据。删除用户的密钥可以有效地销毁对该数据在实时数据库以及所有备份和副本中的访问。更多详情请参见
  "*设计建议*" 部分。


  #### 产品保证


  在某些情况下，你可能仍然需要保留与订单相关的一些个人数据（例如，姓名、账单地址）。这些数据通常出于审计目的和保修要求（例如，退货或产品召回）而需要保留。


  #### 避免使用带日期的集合


  一些架构使用了一种反模式，即对相同类型的数据使用多个集合，并附加日期后缀。例如，旧消息在 30 天后会被移动到月度集合中。这会产生拥有大量集合的数据库，例如：


  ```

  user_messages

  user_messages_201909

  user_messages_201910

  user_messages_201911

  ```


  这种方法不仅使得对历史数据进行聚合变得更加困难，而且大量的集合仅仅为了管理操作系统内部底层数据文件的文件句柄就需要大量的内存开销。


  ## 数据流


  GDPR 第 45 条（第 1 款）引入了一个我们将称之为 "*数据流*" 的概念：


  > *“****向第三国或国际组织传输个人数据****可以进行，前提是[欧洲]委员会已决定该第三国、该第三国内的一个领土或一个或多个特定部门，或所涉国际组织****确保适当水平的保护****。”*


  GDPR 所做的一个重要区分是数据过境与数据传输之间的区别。"*数据过境*" 是指为了处理而临时传输数据副本，可以被认为是“运动中的数据”。而 "*数据传输*"
  则是将持久数据存储永久性地重新定位到另一个物理位置，并且包括备份。


  正如你所想的，数据传输在数据保护方面有着更高的要求，并在 "*数据存储*" 部分有所涉及。


  ### 处理数据


  题为“处理合法性”的 GDPR 第 6 条允许一个包含地理位置个人数据的分片集群*临时*将一些包含个人数据的文档复制到另一个分片节点进行分析处理，例如在聚合管道中。但是，这仅适用于该远程位置在预先批准的地理位置内。例如，如果你有欧盟客户数据，并且一个集群的物理主机位于俄罗斯，那么甚至将数据过境到那里进行处理也是违规的（参见图
  4-1）。


  ![../images/487346_1_En_4_Chapter/487346_1_En_4_Fig1_HTML.jpg](img/487346_1_En_4_Fig1_HTML.jpg)


  图 4-1


  欧盟数据可在美国临时处理，但不能在俄罗斯处理


  为了安全起见，你可以在每个国家配置部署带有`mongos`路由器和应用程序，并在本地执行任何必要的处理。这将在关于特殊配置的第 8 章以及关于高级和极限分片的第
  10 和第 11 章中更详细地讨论。


  ### 端到端数据加密


  在所有情况下，GDPR 要求数据必须以安全的方式进行通信，例如，使用最新的 TLS 加密版本和证书颁发机构来防止中间人攻击。


  ## 数据存储


  个人数据存储的安全性和管理是全球大多数法规的主要考虑因素。本节探讨一些技术，用于在数据存储后保持其安全，或在收集期间通过混淆使其安全。


  ### 数据映射


  大多数全球法规要求*数据保护官*（`DPO`）不仅要知道存储了什么数据，还要知道数据存储在**哪里**。例如，如果你在分片集群上存储个人数据，`DPO`必须了解分片键如何影响数据存储在哪些主机和数据中心。


  这一要求还意味着*数据控制者*必须能够跟踪备份中的数据，并能够确认即使在这些数据（例如，“被遗忘权”）方面也符合法规。


  重要的是要维护数据模式的最新文档，并知道哪些集合和字段包含个人数据、数据是什么格式、哪些文档需要在一定期限后清除，以及哪些数据应在特定时间后进行假名化/匿名化。


  在这里，控制者可以使用像`MongoDB Compass`这样的工具进行数据探索和模式发现。识别无效数据值也很重要，因为如果这些字段构成分片键的一部分，它们可能会意外导致个人数据存储在意外的位置。


  ### 审核变更


  MongoDB 企业版支持许多审计功能，这些功能对于保证没有未经授权的数据访问或用户访问权限的更改至关重要。审计子系统会将任何此类更改记录到单独的日志文件中，并允许将这些日志流式传输到安全的远程位置以防止篡改。


  使用`Ops Manager`（随`MongoDB Enterprise Advanced`提供），数据控制器可以在数据库配置发生某些更改时自动即时收到警报。这对于向监管机构证明正在采取一切可能的措施来确保安全处理个人数据至关重要。


  ### 验证


  MongoDB 对 `JSON Schema` 的支持允许数据库管理员为每个集合中的文档指定复杂的模式规则。通过要求某些标识符以特定格式存储（即所有社会安全号码都以相同的字符串格式存储，而不是部分存储为整数），它确保了如果曾有移除请求或需要通知用户有关数据泄露的情况，数据是可被正确发现的。


  模式验证可以仅配置为警告，也可以配置为阻止将失败的操作（如插入和更新操作）。验证不会应用于预先存在的文档。可以使用 `$jsonSchema` 查询操作符来查找任何与最近添加的模式验证规则不匹配的文档。




  ### 伪匿名化


  `伪匿名化数据`是指那些经过混淆处理，但其原始值保存在一个单独的查找表中的数据。这种处理方式允许将数据恢复到原始状态，并能重新识别出个体。


  相比之下，`匿名化数据`会随机地将值替换为同一类型、真实且相似但没有任何相关性的数据，这意味着数据永远无法恢复到其原始状态。


  伪匿名化在需要安全地在拥有各自独立数据库的临床中心之间传递患者相关数据等场景中是一个问题。某些法规要求对伪匿名化数据进行特殊处理，而完全匿名化的数据通常可以免于数据保护法规的约束。


  在 MongoDB 中，可以使用基于`聚合管道`的`视图`来替换所有标识性的唯一键值（如社会安全号码）为一个人工标识符。这仍然允许进行某些分析，例如分组和跨整个数据库的跨集合引用，而不会暴露原始值。


  当使用 MongoDB 作为数据分析或数据挖掘的数据源时，另一种在数据摄入阶段采用的方法是在“导入时”用伪名替换个人身份信息（PII）（参见图 4-2），这意味着可识别的个人数据从一开始就不会被插入到数据库中。


  ![../images/487346_1_En_4_Chapter/487346_1_En_4_Fig2_HTML.jpg](img/487346_1_En_4_Fig2_HTML.jpg)

  图 4-2

  敏感数据被匿名化但允许恢复


  本章后面的“视图”一节将详细介绍此问题的解决方案。


  ### 数据泛化


  另一种从一开始就避免存储个人数据的方法是在数据插入数据库时进行`数据泛化`。例如，在设置`出生日期`字段时，只记录出生年份；对于`邮编`，只存储前几位数字，并将其余数字置零，以保留用于分桶的一般性信息，但无法追溯到原始用户。


  在存储 GPS 位置时可以使用相同的方法。或者，可以给值添加一些随机的“噪声”，就像某些主要手机厂商在收集移动设备使用指标时所做的那样。通过将值略微更改为一个相似且仍然有效的值，可以在不侵犯用户隐私的情况下进行数据分析。


  ### 静态加密


  公认的数据保护要求的一部分是确保数据在磁盘上存储时是加密的，这样即使文件被复制，其内容也无法访问。


  MongoDB 允许使用 WiredTiger 存储引擎对所有数据文件进行原生加密。或者，您也可以使用存储层提供的加密功能，例如通过 Linux 上的加密 `LVM`（逻辑卷管理器），或使用
  AWS 的加密 `EBS`（弹性块存储）卷。


  有关加密选项的更多细节将在第 3 章中介绍。


  ### 备份


  设计一个合规的 MongoDB 集群的另一个关键考虑因素是备份如何以及存储在何处。在撰写本文时，欧盟的`GDPR`是全球最严格的数据保护法规，因此最简单的方法是将所有备份存储在欧洲。这样，您可以自动为副本集设置每晚的简单`mongodump`，或者使用
  MongoDB 企业级的`Ops Manager`工具，将分片集群的持续备份创建到特殊的备份节点中，并存储在物理位于欧盟境内的服务器上。MongoDB 托管的`Atlas`服务也允许您选择持续备份数据的存储位置，以满足您的特定需求。


  随着其他法律的生效，例如加拿大的《个人信息保护与电子文件法》（`PIPEDA`）和加利福尼亚州的新法规，要同时满足所有法规将变得更加困难。全球集群（在第 6 章中解释）是一种特殊类型的分片集群，其中用户的数据存储在其物理位置附近，通常是为了最小化延迟。这种方法也意味着他们的数据可以存储在同一个国家（或司法管辖区内），从而更容易合规地备份数据（参见图
  4-3）。


  ![../images/487346_1_En_4_Chapter/487346_1_En_4_Fig3_HTML.jpg](img/487346_1_En_4_Fig3_HTML.jpg)

  图 4-3

  一个分片集群，每个分片的备份都存储在“本地”


  ### 世界各地的相关法规


  欧盟的`GDPR`是迄今为止最著名、被讨论最多的数据保护法规，作为数据库架构师和管理员，我们必须关注。根据您的客户、业务和行业的所在地，还有许多其他正在生效的法规也可能需要关注。


  许多新隐私法的一个共同点是，控制个人数据的实体必须能够从法律上证明其最初收集数据的目的是否合理。在我们的语境中，这意味着我们不应该收集所提供服务不需要的、多余的元数据。


  ### 美国医疗保健行业


  《健康保险流通与责任法案》（`HIPAA`）是一项针对美国医疗保健数据行业的法规。该法案涵盖了基因数据，这些数据有时不可能被去身份化，因为研究需要确切的数值，但这些值同时也会识别出个体。在这种情况下，使用安全的外部密钥对数据进行加密至关重要。


  ### 加利福尼亚州


  2018 年的《加州消费者隐私法案》（`CCPA`）于 2020 年 1 月 1 日生效，涵盖了在加利福尼亚州开展业务且持有超过 50,000 人数据的公司关于消费者权利的规定。这套法规与`GDPR`有许多相同的目标，并涵盖了许多相同的问题。


  尽管`CCPA`**不是**以`GDPR`为蓝本或以相同方式构建的，但它包含了所有相同的最佳实践。


  ### 印度


  在撰写本文时，印度正在制定他们自己的`GDPR`版本，包括访问和更正数据的权利、数据可携带权（即导出自己的数据）和被遗忘权等规定。目前，其权力与`GDPR`相比不那么极端。


  然而，拟议的法律确实施加了严格的`数据本地化`规则，要求个人数据的存储和处理都必须物理上在印度境内进行。这与`GDPR`形成鲜明对比，后者允许只要满足条件（如安全的加密通信），数据可以临时`传输`到欧盟以外进行处理。


  通过保留一个专门存储印度客户数据的分片，并将其主机放在印度的数据中心，即可满足这一本地化要求。本章末尾以及关于极端分片的第 11 章将进一步讨论这种方法。


  如果印度的法律最终仅要求将实体个人数据的“镜像”副本存储在物理上位于印度的服务器上，那么使用位于印度数据中心的副本集节点即可轻松满足此要求。


  ### 加拿大


  管辖加拿大的《个人信息保护与电子文件法》（`PIPEDA`）和《隐私法》涵盖了许多与`GDPR`相同的普遍权利，但具体性较低。


  然而，重要的是要注意，加拿大的许多`省级`都有其各自实质性且广泛的隐私法规，这些法规与国家级法规大致相似，但往往有所扩展并进一步使其复杂化。




  ### 中国


  中国拥有全球最多的互联网用户，但在撰写本文时，尚未出台一部全面统一的数据保护`法规`。


  2018 年 3 月，中国国家标准化管理委员会 TC260 发布了国家标准《信息安全技术 个人信息安全规范》，为个人信息的收集、存储、使用、共享、转移和披露提供了指导。


  该标准目前尚未导致法律或经济后果，但预计国家立法可能很快出台，届时可能要求使用和处理用户数据必须获得明确同意。目前似乎没有针对作为公司与客户合同正常部分的处理行为设定自动许可条款，因此`同意`要求将比
  GDPR 更为严格。


  就 MongoDB 而言，你可能至少需要在系统中为每个用户维护一个不同处理用例的数组，以便能够追踪谁已同意哪些活动。


  ### 俄罗斯


  由于俄罗斯未被列入 GDPR 下提供充分数据保护水平的国家名单，因此自动将欧盟数据传输至俄罗斯进行处理（即使是临时处理）是不被允许的。在 MongoDB 方面，建议将数据存储和处理均置于欧盟境内，或者如后续章节所述，为欧盟和俄罗斯的个人数据保留独立的分片。


  ## 设计建议


  在本节中，我们将介绍一些在应用程序设计阶段已被证明能最好地应对合规性问题的方法。


  ### 字段级加密


  MongoDB 4.2 的一项新安全特性是客户端字段级加密（FLE）。随着官方驱动程序添加了对此的支持，这允许应用程序在数据通过网络发送之前，使用外部密钥`prior`对某些字段和子文档进行加密。其效果是，关键或敏感的用户数据仅对应用程序可用，永远不会以未加密形式到达数据库。即使入侵者以某种方式访问了正在运行的`mongod`进程内的实时数据（例如被称为`Meltdown`和`Spectre`的漏洞），字段值仍将保持加密状态。


  应用程序通过一个`外部密钥存储`（不属于 MongoDB 的一部分）进行交互，以安全管理这些密钥，这增加了一层安全性，但也增加了复杂性。这种方法还有一个额外好处，即通过`mongodump`或
  Ops Manager 进行的备份也是加密和安全的。


  密钥不仅可以基于数据库或集合级别创建，甚至可以基于每个用户、每个文档创建。这使得从实时数据库和`所有备份`中永久擦除用户数据变得更加容易。


  在图 4-4 中，我们可以看到一个应用程序检索每个用户的密钥，用于从用户配置文件中提取`data`子文档。对加密值的任何文档操作都需要此密钥。这意味着无法在此数据字段（或其子字段）上进行任何类型的服务器端聚合，因为
  MongoDB 查询引擎基本上将它们视为二进制数据。


  ![../images/487346_1_En_4_Chapter/487346_1_En_4_Fig4_HTML.jpg](img/487346_1_En_4_Fig4_HTML.jpg)


  图 4-4


  应用程序加密数据子文档


  当使用`确定性加密`时，客户端可以对加密字段值执行相等性查询。另一方面，`随机加密`提供了更强的保密性，但限制了查询期间对加密字段的操作。


  通过丢弃特定用户的旧密钥，实际上几乎不可能再解密那些加密值。正如你所见，这可以成为确保 GDPR 及类似合规性法规的“被遗忘权”要求的一种非常便捷的方式，因为它能即时且永久地锁定实时数据库和所有备份中的所有加密值。


  ### 视图


  MongoDB 允许我们构建一个`视图`，其定义为一个多阶段聚合管道。通过利用一组不同的运算符，我们可以以标准方式转换集合中的所有文档，创建一个新的虚拟集合，该集合可以在组织内获得更广泛的访问权限，而包含完整数据值的原始集合则只允许受信任的少数用户账户访问。


  在代码清单 4-3 中，我们看到一个视图，它获取了此集合中可用数据的“垂直”和“水平”子集。聚合管道首先根据客户的出生日期计算年龄，然后除以一年的毫秒数以得到以年为单位的年龄。


  结果视图仅包含年龄超过 18 岁的研究参与者的文档，并排除了他们的姓名、社会安全号码、生日和确切的街道地址。这些视图保留了像`address.postcode`和`address.state`这样的字段，因此仍然可以进行基于邮政编码的分组或可视化分析，而不会泄露或恢复任何可识别身份的数据。


  ```javascript

  db.createView(

  "participants_adults_nonpersonal",

  "participants",

  [ { $addFields: {

  age: {

  $divide: [{

  $subtract: [new Date(), "$birthdate"]

  },

  365.25 * 24 * 60 * 60 * 1000]

  }

  }},

  { $match: { age: { $gt: 18 }}},

  { $project: {

  name: 0, ssn: 0, birthdate: 0,

  "address.street": 0, age: 0

  }}

  ])

  ```

  代码清单 4-3

  排除某些个人数据的视图定义


  聚合管道阶段`$redact`是另一个强大的选项，可用于视图中，根据嵌套深度或同一文档中其他字段的值有条件地修剪文档中的字段。


  ### 独立的权限


  视图本身被暴露为一个只读集合。`基于角色的访问控制`（`RBAC`）意味着可以为单个用户或组授予对视图的读取权限，但无权访问包含个人数据的底层源集合。该视图可以安全地与更广泛的受众共享以执行分析或报告，而没有暴露敏感信息的风险。


  例如，在一项医学研究中，你可以授予一个名为`controller`的角色对原始`participants`集合的读取权限，以便只有受信任的用户才能看到完整数据。在代码清单
  4-4 中，我们看到另一个名为`researcher`的角色只能被授予对派生视图`participants_adults_nonpersonal`的读取权限。这些研究人员永远无法看到标识性数值，但仍可以操作数据进行分析。


  ```javascript

  use admin;

  db.createRole({

  role  : "researcher",

  privileges : [

  {

  resource : {

  db : "app1",

  collection : " participants_adults_nonpersonal" },

  actions  : [ "find" ]

  }

  ],

  roles : []

  })

  db.createUser({

  user : "nic",

  pwd : "securepassword",

  roles : ["researcher "] }

  )

  ```

  代码清单 4-4

  只能查询此视图的自定义角色和用户




  ### 数据泄露


  除了主要风险外，个人数据从数据库泄露到其他位置还有一些其他潜在来源。


  #### 分片


  在分片集群中，个人数据存储在分片节点上。利用基于地理位置的分片，你可以控制数据的存放位置。在这种情况下，应避免选择包含用户数据字段（例如，社会安全号码）的分片键，如
  `{country: 1, ssn: 1}`。因为这样，这些值将构成块边界的一部分，同时也将被记录在分片集群的 `config` 数据库中，而该数据库可能物理上位于另一个司法管辖区。


  ### 日志记录


  默认情况下，MongoDB 会记录任何耗时超过 100ms 才完成的查询。记录查询时，包含具体值的完整查询语句会被写入日志，以便于重现和优化。然而，当查询涉及个人数据字段时，这些信息也会被记录到可能存在安全风险的日志文件中。


  为了避免此类泄露（以牺牲少许性能为代价），可以通过在节点配置文件中设置 `security.redactClientLogData: true` 来指示 MongoDB
  从日志中编辑掉任何字段值。


  一旦设置了此配置参数，对类似 `{ "name" : "Nic", "SSN" : "123-45-6789" }` 文档的插入操作，将产生如代码清单 4-5
  所示的日志行。


  ```

  2019-10-07T11:10:02.321+0200 I COMMAND [conn2] command test.clients appName: "MongoDB
  Shell" command:

  insert {

  insert: "###", ordered: "###",

  lsid: { id: "###" }, $db: "###" }

  ninserted:1 keysInserted:1 numYields:0 reslen:45

  locks:{ ... }

  代码清单 4-5

  经过编辑的日志输出，所有客户端值均显示为哈希值

  ```


  ### 最小化漏洞


  人们很容易将安全漏洞想象成外部黑客通过网络基础设施中的安全漏洞或某个未修补的软件来获取数据库访问权限。相反，一些数据泄露可能简单到是不当处置硬盘驱动器，或者可能是由内部人员获取个人数据的未授权副本并将其出售给第三方造成的。


  请记住，要妥善销毁存储设备，限制对所有数据库的访问，并在人员离开组织时立即撤销其访问权限。


  ## 总结


  每个使用数据库存储个人数据的应用程序都应采用“隐私设计”原则。为帮助确保你的 MongoDB 数据库满足或超过全球数据保护法规的要求，表 4-3 列出了你需要考虑的主要问题。


  表 4-3

  MongoDB 的 GDPR 问题与解决方案摘要


  | 要求 | 解决方案 |

  | --- | --- |

  | 合法且透明 | 请求许可，解释存储了哪些数据，并且只存储提供服务所必需的个人数据。记录每个用户给予的许可。 |

  | 完整性和机密性 | 通过用户访问控制（例如，LDAP 授权）、x509 证书、加密的 TLS 1.2+ 连接、防火墙、静态数据加密、主机访问限制、加密的网络存储备份，甚至字段级加密来保护对实时数据库的访问。在
  MongoDB 上启用审计功能以监控用户权限的任何变化。启用重要更改的监控告警，以便数据控制者能立即知悉任何问题。如果检测到任何违规行为，需同时通知主管机构和用户。
  |

  | 目的限制 | 确保存储的数据在所获许可的范围内；数据应被假名化或匿名化，或者被完全清除。 |

  | 时间限制 | 数据保存时间不应超过必要时长，也不应超过向用户告知的时限。对实时数据使用 TTL 索引，并对个人数据备份进行滚动删除。 |

  | 最小化存储数据 | 当数据不再对所提供的服务有用时，应予以裁剪，仅保留必需的数据（例如，用于税务审计或保修跟踪的购买记录）。 |

  | 数据准确性 | 你有一个有限的时间窗口来根据数据主体的请求更新、更正和提供其个人数据，因此最好将数据保持良好的结构化，并存放在一个逻辑位置。 |

  | 保护传输中的数据 | 对 MongoDB 节点之间以及与客户端应用程序（通过官方驱动程序）的通信进行加密，并使用 TLS 证书。 |

  | 管理数据位置 | 使用国家级分片，将个人数据及其相关备份保留在数据来源国境内。 |

  | 保护静态数据 | 在存储引擎内部加密数据，或加密整个文件系统。 |

  | 被遗忘权 | 确保实时数据库和备份中的数据均被清除。考虑使用基于每个用户独立密钥的字段级加密。 |

  | 限制敏感信息仅授权用户访问 | 启用使用 SCRAM、Kerberos、LDAP 等机制的身份验证和授权。使用视图来编辑敏感字段；根据年龄、居住国等标准跳过特定个人的数据。定义访问控制，将源集合的访问权限限制在少数可信用户。


  '
- '# 5. 基本拓扑结构


  本章将根据可用数据中心的数量，介绍常见的部署拓扑结构。我们将讨论每种拓扑结构的限制，以及如何最优配置节点和备份以优化可用性。


  ## 引言


  历史上，大多数人初次接触 MongoDB 都是在本地运行它。你可以非常轻松地免费下载 MongoDB 并将其安装在你的个人电脑或 Mac 上。通过 Mongo
  shell、像 Compass 或 Studio 3T 这样的可视化工具，或者通过某种编程界面，你可以在几分钟内就开始从 MongoDB 服务器读写数据。


  本地 MongoDB 实例对于想要学习或进行实验的开发人员和研究人员来说非常棒，但不适合任何类型的生产工作负载。正如我们已经讨论过的，MongoDB 的一个关键优势在于其分布式特性。与
  MySQL 或其他开源数据库相比，真正的革命性进步在于 MongoDB 能够如此轻松灵活地进行横向扩展以适应你的用例。


  如果你是为单一地点的内部客户构建内部应用程序，那么位于单一物理位置的集群可能就足够了。相反，如果你正在构建一个面向全球受众的初创公司，你希望能够将用户的数据放置在尽可能接近他们的地方，以减少延迟并满足合规义务（第
  4 章）。


  表 5-1 快速概述了不同环境以及增加数据中心数量带来的收益。每一行都比上一行增加了额外的收益。


  表 5-1

  拓扑结构与用例摘要


  | 环境 | 收益 |

  | --- | --- |

  | 单台独立服务器 | 用于原型设计、开发和简单测试的快速启动。 |

  | 副本集，单数据中心 | 此时任何单台服务器故障都不会导致数据丢失或停机。 |

  | 两个数据中心 | 此时即使整个数据中心永久丢失，数据也不会丢失。需要人工干预以恢复写入。 |

  | 两个数据中心（加上云仲裁节点） | 此时即使整个数据中心丢失，应用程序也不会停机，并且仍然可以进行写入。 |

  | 三个数据中心 | 此时即使整个数据中心丢失，应用程序也可以继续向多数节点写入，因此数据回滚永远不会发生。 |

  | 地理位置数据中心 | 此时利用基于地理位置的分片，数据可以存储在靠近用户的地方，以减少延迟并遵守数据保护法规。




  ## 节点共置


  在深入细节之前，理解在生产环境中将多个节点共置于单台主机上的缺点也很重要。在某些情况下，由于预算或管理限制，可能会倾向于在单台主机或虚拟机上安装多个 MongoDB
  组件。在一个分片集群中，您可能会计划将配置服务器节点与分片成员安装在同一主机上，或者与 `mongos` 路由器安装在一起。


  在单台主机上安装多个组件通常是个坏主意，因为它会使配置变得复杂（多个组件共享相同的主机名但使用不同的端口），并且可能使快速理解日志和诊断数据变得更加困难。


  另一个问题涉及用于承载数据节点的 WiredTiger 缓存。默认情况下，此特殊缓存会保留主机近一半的 RAM。当一台主机上有两个节点时，就没有 RAM 留给文件系统缓存或操作系统了。


  如果您必须共置节点，您将至少需要设置 `storage.wiredTiger.engineConfig.cacheSizeGB` 配置选项。更推荐的方法是改为每个节点使用一个独立的虚拟机。


  ## 组件间通信


  由于 MongoDB 旨在作为一个分布式系统，在规划部署时，组件间的通信是一个关键问题。


  ### 连接与心跳


  MongoDB 集群中的所有组件都需要能够相互通信，以同步数据、监控健康状况和可用性，并对变化做出反应。为了促进这种通信，每个节点、应用程序（通过驱动程序）和
  `mongos` 路由器都会为其集合中的每个其他组件打开至少一个连接，以定期来回发送心跳消息。如果其中某个心跳出现延迟，则意味着某个组件可能承受着极大的负载。如果心跳完全丢失，则可能表明另一个成员由于负载或网络问题而不可用。如果一个
  `主` 节点错过了心跳，则会触发故障机制，计时器开始倒计时，直到召集选举以选出替换节点。


  ### 路由


  MongoDB 支持广泛的可能部署拓扑结构。为了实现这一点，有许多不同的设置和机制用于自动化查询路由，通过一种特殊类型的 `负载均衡` 来最大化稳定性和性能。


  #### 发现


  `服务器发现与监控` (SDAM) 规范定义了所有官方应用程序驱动程序如何连接和监控复杂的 MongoDB 部署。它规定了驱动程序如何适应部署中的变化，例如节点离线、主节点降级以及网络错误。它有助于确保所有驱动程序（无论使用何种编程语言）都能以一致、可预测的方式做出反应。


  #### 服务器选择算法


  另一个规范是 `服务器选择算法` (SSA)，它描述了一种智能负载均衡。SSA 包含在驱动程序规范中，并且所有官方 MongoDB 驱动程序都遵循该规范。


  此算法控制驱动程序（在应用程序空间内部）如何决定将操作路由到您的 MongoDB 部署中的哪个位置。当使用副本集工作时，此算法决定查询是发送给主节点还是从节点。当与分片集群通信时，它将决定使用多个
  `mongos` 节点中的哪一个。


  图 5-1 显示，位于数据中心 1 的应用程序可能会使用同一个数据中心内的 `mongos`，但不会使用数据中心 2 中的 `mongos`，因为延迟太高。数据中心
  1 中的 `mongos` 将根据请求的读取偏好，将查询路由到数据中心 1（而不是数据中心 2）的主节点或从节点。


  ![../images/487346_1_En_5_Chapter/487346_1_En_5_Fig1_HTML.jpg](img/487346_1_En_5_Fig1_HTML.jpg)


  图 5-1 分片集群中的服务器选择


  #### 分片路由器 (mongos)


  任何分片集群都应包含多个 `mongos` 路由器节点，并且 `所有` 节点都应在应用程序的 `连接 URI 字符串` 中列出（因为它们并非设计为自动被发现）。


  拥有多个节点的主要目的是在某个路由器节点完全故障时允许进行故障转移。然而，驱动程序内部的一个自动 `性能` 机制也是激活的。此机制监控 `mongos` 池的
  `往返时间` (RTT) 延迟。它会根据可用的最佳 `mongos` 节点确定一个可接受的延迟“窗口”。然后，驱动程序会将查询路由到此延迟窗口内的任何 `mongos`，从而有效地在它们之间分配工作负载。在负载异常高的时期，这种分配对于确保没有单个
  `mongos` 过载至关重要。


  提示：如果您想强制应用程序在所有 `mongos` 之间均匀分配负载，即使那些延迟较高的节点也包括在内，那么请在连接字符串中将 `localThresholdMS`
  设置为一个较高的值。


  #### 副本集节点选择


  根据最佳实践，您的副本集节点应分布在多个数据中心上，这使得地理上接近的节点与远程节点之间的延迟可能非常不同。由于写入总是发送到主节点，您可以在（副本集配置中）使用更高的
  `priority` 值，以便在与您的应用程序服务器相同的数据中心中选举出主节点。


  虽然不是默认行为，但也可以对从节点执行读取操作。这正是某些巧妙设计可以在特定情况下实现可扩展解决方案的地方。MongoDB 驱动程序支持一系列读取偏好，如表 5-2
  所述。


  表 5-2 副本集读取偏好


  | 偏好 | 说明 |

  | --- | --- |

  | `primary` (默认) | 所有读取操作都发送到主节点。 |

  | `secondary` | 所有读取操作都发送到从节点。如果当前只有主节点可用而没有从节点，这些操作将停滞。请改用 `secondaryPreferred`。
  |

  | `nearest` | 驱动程序将与任何在最低往返时间 (RTT) 窗口内的节点（主节点或从节点）通信。 |

  | `primaryPreferred` | 驱动程序将在可能的情况下从主节点读取，但如果主节点不可用，则将回退到从节点。这对于需要在 `网络分区` 期间运行的应用程序是推荐的。
  |

  | `secondaryPreferred` | 驱动程序将在可能的情况下从从节点读取，但如果从节点不可用，则将从主节点读取。这是一个比 `secondary`
  更稳健的选择。 |


  对于除 `primary` 之外的所有读取偏好选项，驱动程序都可以在多个节点中进行选择，并且在所有情况下都可以提供 `maxStalenessSeconds`
  或 `标签集` 来控制选择。


  通过在连接 URI 中指定明确的 `maxStalenessSeconds`，驱动程序将排除任何 `复制延迟` 超过此值的节点。这允许客户端安全地从从节点读取，并且尽管知道他们读取的是过时的数据，但返回的文档最多只会比主节点落后几秒钟。




  ### 标签集


  在特定节点上指定*标签集*可用于（i）在副本集内为基本的地理定位指定特定物理位置，或（ii）在从节点读取时控制特定的读取工作流。


  例如，您可以将所有分析工作负载发送到一个延迟较高的遥远数据中心（`DC2`），让`DC1-a`和`DC1-b`中较近的节点分担正常的读取工作负载。图 5-2 显示，虽然写入总是会发送到主节点，但当应用程序指定了`{use:
  "analytics"}`的标签集时，读取操作将发送到`DC2`。


  ![../images/487346_1_En_5_Chapter/487346_1_En_5_Fig2_HTML.jpg](img/487346_1_En_5_Fig2_HTML.jpg)

  *图 5-2. 在所有节点上定义了标签集的副本集*


  可以使用 `rs.reconfig(...)` 方法并传递更新后的配置文档（如清单 5-1 所示）来定义和更改标签。


  ```

  {

  "_id" : "myRS",

  ...

  "members" : [

  { "_id" : 0, "host" : "mongodb0.bigbank.local:27017", ...,

  "tags": { "dc": "east-1", "use": "prod" }, ... },

  { "_id" : 1, "host" : "mongodb1.bigbank.local:27017", ...,

  "tags": { "dc": "east-2", "use": "prod" }, ... },

  { "_id" : 2, "host" : "mongodb2.bigbank.local:27017", ...,

  "tags": { "dc": "west", "use": "analytics" }, ... }

  ],

  ...

  }

  ```

  *清单 5-1. 包含区域和用途标签的副本集配置*


  要实际使用这些标签，应用程序需要按照特定顺序设置读取偏好标签，以便驱动程序解析和使用。在清单 5-1 和 5-2 中，我们看到一个针对节点 `mongodb2.bigbank.local:27017`
  的示例，因为这是唯一具有匹配 `use` 标签的节点。如果应用程序发送了多个标签，将按顺序尝试每个标签，重叠最多的标签将优先被选中。


  ```

  db.transactions.aggregate([...]).readPref( "secondaryPreferred",

  [ { "use": " analytics " } ] )

  ```

  *清单 5-2. 使用标签定位分析从节点的聚合操作*


  ## 写关注点


  虽然写入总是会被路由到主节点，但当使用自定义*写关注点*时，驱动程序会等待其他节点确认写入操作已持久化，然后才向应用程序报告成功。例如，写关注点为 `2` 时，要求主节点和至少一个从节点在继续操作之前已复制该写入。这允许应用程序为每个用例选择自定义的持久性级别，并在不牺牲所需持久性的前提下最大化性能。MongoDB
  驱动程序默认的写关注点为 `1`，但对于所有生产用例，建议使用写关注点 `majority`。


  在图 5-3 中，我们看到一旦一个从节点（`3`）复制了操作日志条目，主节点就立即将 **Ack** 发送回应用程序。另一个从节点（`2`）将尽快复制，但应用程序不会等待它。


  ![../images/487346_1_En_5_Chapter/487346_1_En_5_Fig3_HTML.jpg](img/487346_1_En_5_Fig3_HTML.jpg)

  *图 5-3. 写关注点：2 要求 2 个节点确认更改*


  ### 日志记录


  一个额外的选项 `j` 允许应用程序请求服务器等待，直到写入操作已写入磁盘日志。如果此选项设置为 `false`，则一旦更改在内存中应用，写入就会被确认返回给应用程序，但不一定写入磁盘。当设置为
  `false` 时，应用程序可能会获得稍快的响应，但如果主机突然故障，则存在完全丢失该写入的风险。当未指定 `j` 时的默认行为将取决于所使用的写关注点，并且可能在不同版本之间发生变化。


  **警告**


  对于生产环境部署，永远不应设置 `{j: false}`。日志写入通常非常快，并且可以通过将其放置在自己独立的存储卷上进一步优化。


  #### 超时


  您可以选择为写关注点设置一个以毫秒为单位的 `wtimeout` 时间限制。如果超时（例如由于高复制延迟），确认信息将作为失败报告回应用程序。然而，此操作在此超时后不会自动终止，并且可能最终在服务器端成功。


  这可能会给应用程序逻辑带来显著的混淆和复杂性，因为开发人员可能会假设数据已丢失。最好避免此选项，而是使用可重试的读取和写入（稍后讨论）。


  ### 自定义持久性


  应用程序可以将写关注点与标签集结合使用，以控制哪些节点应该确认写入。这可用于控制某些节点上的复制延迟（即，使一个从节点在任何时候都没有有效延迟），或确保不同数据中心中的两个节点持久化每次写入。


  这对于节点分布在多个区域的配置（如图 5-4 所示）尤其重要。这里，我们假设 `DC1-a` 和 `DC1-b` 是同一城市中的两个建筑，而 `DC2` 位于另一个城市。由于*节点
  2* 与主节点在同一区域，其延迟较低，通常复制更快。在网络压力或网络不稳定时期，您可能会遇到应用程序返回写关注点 `2` 成功，但远程数据中心的复制滞后了几分钟的情况。如果整个
  `DC1` 区域一起发生故障，最后几分钟的写入将会丢失。


  ![../images/487346_1_En_5_Chapter/487346_1_En_5_Fig4_HTML.jpg](img/487346_1_En_5_Fig4_HTML.jpg)

  *图 5-4. 不稳定网络导致远端节点出现不可接受的延迟*


  为了确保写入被复制到至少两个独立的区域，我们可以定义一个名为 `multi_dc` 的自定义写关注点级别，该级别要求标签 `region` 具有两个不同值的节点：


  ```

  conf = rs.conf();

  conf.settings = {

  getLastErrorModes: { multi_dc : { "region": 2 } }

  };

  rs.reconfig(conf);

  ```


  然后，应用程序可以在重要的插入或更新操作中使用此自定义的 `multi_dc` 写关注点，以强制在两个区域都进行更新：


  ```

  db.collection.update( { _id: 123, status: "Important" },

  { writeConcern: { w: "multi_dc" } } )

  ```


  在此示例中，当时三个节点中哪个是主节点并不重要，我们总是会将更改复制到 `DC1` 和 `DC2` 两个区域。


  ## 读关注点


  一个相关的概念是读关注点，它允许您控制从副本集和分片读取操作的一致性和隔离性。例如，一个系统如果专门使用写关注点 `majority` 和读关注点 `majority`，就可以确保返回的数据已被副本集的大多数成员确认。换句话说，读取操作返回的文档是持久的，即使在任何成员发生故障的情况下也是如此。




  ### 单数据中心


  在单数据中心拓扑中，我们的选择有限，但可以通过构建包含多于三个成员的副本集来最大化可用性。例如，我们可以使用七个成员来构建副本集。


  我们可以通过将每个节点放置在其独立的物理主机上来增加额外的防护措施。每台主机应放置在独立的机架上，最好在不同的电源回路上，并配备独立的备用电源。


  **警告**


  位于不同虚拟机（VM）但共享同一底层虚拟机主机的节点，若该虚拟机主机发生硬件故障，将会一起失效。


  每台物理主机应具备 `冗余网络`。这可以通过 `网络绑定`（也称为 `链路聚合`）来实现。有多种不同模式可用，包括提供负载均衡的轮询均衡器（round-robin）和仅提供容错的“主备”（Active-Backup）模式。在大多数现代
  Linux 发行版中，可通过 `modprobe` 启用；在 Debian 系统上，可使用 `ifenslave`。你应与网络管理员确认，确保你的网络交换机支持网络绑定。


  避免在 MongoDB 节点的数据卷上使用 `共享网络存储` 解决方案。这种方法意味着所有副本集成员的数据实际上都存储在同一个存储解决方案上。更安全的做法是使用如
  `NVMe` 驱动器这样的快速本地存储，每台主机独立配置。


  `备份` 应尽可能频繁地进行，并以加密状态存储在安全的云提供商处。如果使用 MongoDB 企业版，Ops Manager 可提供带时间点恢复的持续备份。


  你应定期测试从备份中`恢复`，以确认工作流程并确保集群能在恢复时间目标（`RTO`）内恢复。


  然而，总的来说，对于任何生产用例，单数据中心风险过高。区域性电力故障总会导致停机，而火灾则可能轻易导致数据完全丢失。


  ### 双数据中心


  使用两个数据中心时，你有机会让每个数据中心至少保留一个承载数据的节点。在图 5-5 中，我们看到一个分布于两个数据中心的 `PSS` 或 `PS|S`（主-从-从）拓扑。这样，在某个数据中心完全故障的情况下，仍然拥有整个数据库的完整且最新的副本。


  ![../images/487346_1_En_5_Chapter/487346_1_En_5_Fig5_HTML.jpg](img/487346_1_En_5_Fig5_HTML.jpg)


  图 5-5：最佳的双数据中心配置


  在此配置中，如果 `DC2` 完全故障，`DC1` 维持了多数节点，可以继续承载主节点。然而，如果 `DC1` 故障，则只剩下三个节点中的一个，位于 `DC2`
  的剩余节点无法自行选举为主节点并接受写入。因为它不知道是仅仅是 `网络分区`，还是 `DC1` 中已存在主节点，所以它必须保持从节点状态。`DC2` 中的应用程序仍可读取陈旧数据，但如果尝试任何写入操作将会超时。


  ### 双数据中心（外加云仲裁节点）


  如果你只有两个数据中心可用于存储生产数据，你可以使用云提供商上的远程 `仲裁节点` 作为公正的投票者，以避免集群中的“脑裂”情况。


  如果安全策略不允许使用云提供商，则可以使用位于远程地点的第三个私有数据中心，即使它通常因容量较低或高延迟而不适合承载数据节点。


  正如我们在第 1 章讨论的，`仲裁节点` 不会复制或存储任何用户数据。因此，它的网络带宽和存储要求非常低，并且不构成数据保护法规的风险（第 4 章）。它的唯一目的是通过确定哪些承载数据的数据中心当前可从网络其余部分访问，来参与选举。


  所谓的 `PSA`（主-从-仲裁）配置有一个主要问题，即你的应用程序无法在数据中心故障时启用多数写入并继续运行（见图 5-6）。如果任一数据中心不可用，则只剩下一个承载数据的节点，多数写入将一直超时，直到该
  `DC` 恢复。


  ![../images/487346_1_En_5_Chapter/487346_1_En_5_Fig6_HTML.jpg](img/487346_1_En_5_Fig6_HTML.jpg)


  图 5-6：云中的仲裁节点，但不具备安全的多数写入能力


  **警告**


  当承载数据的节点宕机时，仲裁节点会引入许多不良的边缘情况（特别是对于读关注级别 `majority`），在生产环境中应尽可能避免使用。


  一个稍微安全的选择（图 5-7）是使用一个五成员集，写关注级别设为 `3`（而不是 `majority`），并且在每个数据中心有两个承载数据的节点。在这种情况下，当单个承载数据的节点故障时，写关注级别仍允许写入。然而，如果任何一个完整的
  `DC` 故障，我们再次无法安全地向部署中写入数据。


  ![../images/487346_1_En_5_Chapter/487346_1_En_5_Fig7_HTML.jpg](img/487346_1_En_5_Fig7_HTML.jpg)


  图 5-7：一个 `PSSSA` 拓扑，仲裁节点在云中，写关注级别为：3


  这种拓扑结构还有另一个好处。因为一个从节点与主节点位于同一 `DC`，它将具有非常低的延迟，应该能更容易地跟上复制速度。如果主节点突然故障，`mongod` 通常会先复制写入操作，并且能够比任何远程成员更快地接管主节点角色。


  #### 手动干预


  假设我们有一个 `P|S|A` 拓扑，并且由于该地区的大规模电力故障，两个数据中心之一变得不可用。位于第三个位置的 `仲裁节点` 保留了投票者的法定人数，因此主节点可以保持主节点状态。然而，现在只有一个承载数据的节点可用。任何请求写关注级别为
  `majority` 的写入操作都将被阻塞，等待第二个承载数据的节点确认更改。


  请注意，`仲裁节点` 的 `优先级` 始终为 `0`，因为它没有数据，所以永远不能成为主节点。


  为了本节的目的，让我们考虑一个 `PSA` 副本集的默认配置。


  ```

  {

  "_id" : "rs0",

  "version" : 1,

  "protocolVersion" : NumberLong(1),

  "members" : [

  {

  "_id" : 0,

  "host" : "mongodb0.example.local:27017",

  "arbiterOnly" : false,

  "hidden" : false,

  "priority" : 1,

  "votes" : 1

  },

  {

  "_id" : 1,

  "host" : "mongodb1.example.local:27017",

  "arbiterOnly" : false,

  "hidden" : false,

  "priority" : 1,

  "votes" : 1

  },

  {

  "_id" : 2,

  "host" : "mongodb2.example.local:27017",

  "arbiterOnly" : true,

  "hidden" : false,

  "priority" : 0,

  "votes" : 1

  }

  ],

  "settings" : {

  ...

  }

  }

  ```

  **代码清单 5-3：带仲裁节点的副本集配置示例**


  写入的 `多数` 通常基于集合中 `有投票权的数据承载` 节点数量来计算。通常在 `rs.config` 中为从节点设置 `votes: 0` 是不够的；然而，对于
  `PSA` 拓扑存在一个特例。因此，在这种情况下，你会移除不可用从节点的投票权，但保留该节点作为集合的成员，如下所示：


  ```

  conf = rs.conf();

  conf.members[1].votes = 0;

  rs.reconfig(conf);

  ```


  这将使主节点的投票权得以延续，并允许应用程序的多数写关注请求由单个承载数据的节点来满足。不可用的从节点一旦重新上线，将尝试赶上复制进度。在具有大量写入操作的副本集中，从节点离线时间过长可能无法跟上操作日志（oplog）的变化，需要完全重新同步。


  不要忘记在不可用成员重新上线后 `恢复` 其投票权。




  #### 读取与延迟


  当组件部署在多个物理位置时，数据中心间的延迟可能成为性能的主要问题。我们首先希望尽可能保持容错能力，其次希望通过低延迟数据流实现高吞吐量，但第三，我们不希望因为整个组件在系统健康状态下利用率不足而浪费计算资源。


  警告


  反对在有效备用状态下不预留任何资源的论点是，当任何一个组件发生故障时，性能将会下降。


  在构建包含许多承载数据的辅助节点的副本集时，某些用例下从辅助节点读取会成为一个理想的选择。


  让我们想象一下图 5-8 中所示的 PSSSA（主节点、3 个辅助节点和仲裁节点）部署，其中有两个应用服务器处于活动状态，每个数据中心一个。


  ![../images/487346_1_En_5_Chapter/487346_1_En_5_Fig8_HTML.jpg](img/487346_1_En_5_Fig8_HTML.jpg)


  图 5-8


  一个 PS|SS|A 副本集，应用程序位于两个数据中心


  ##### 最近节点偏好


  如果在连接字符串中请求了 `nearest` 偏好，应用程序（1）将从 `mongod`（1）或（2）读取，因为往返时间（RTT）分别为 2 毫秒和 3 毫秒，并且数据中心
  2（DC2）中的节点超过了延迟窗口。应用程序（2）将倾向于从 `mongod`（3）或（4）读取，除非复制延迟超过 `maxStalenessSeconds`。在这种情况下，驱动程序将选择从
  `mongod`（1）或（2）读取。如果未指定 `maxStalenessSeconds`，节点选择将只考虑 RTT 延迟。


  ##### 主节点优先读取


  另一方面，如果请求的是 `primaryPreferred`，应用程序（1）和（2）都将从 `mongod`（1）读取，因为它是当前的主节点。然而，如果 `localThresholdMS`
  设置为 5 毫秒，那么位于数据中心 1（DC1）的主节点就被认为太远了，因此将选择 `mongod`（3）或（4）。


  ### 三个数据中心场景


  将承载数据的 MongoDB 节点均匀分布在至少三个数据中心的拓扑结构是最理想的情况。在图 5-9 中，我们可以看到一个在 PSS 拓扑结构中具有最佳冗余的拓扑。任何一个数据中心都可以丢失，同时应用程序使用写关注点
  `majority` 进行写入，以确保持久性分发并防止数据丢失。此外，如果随后第二个数据中心也发生故障，仍然不会丢失数据，但需要一些手动干预来强制剩余的数据承载节点接受写入。


  ![../images/487346_1_En_5_Chapter/487346_1_En_5_Fig9_HTML.jpg](img/487346_1_En_5_Fig9_HTML.jpg)


  图 5-9


  一个具有最佳冗余的 3-DC（数据中心）、3 节点拓扑


  一些架构师选择每个数据中心多个节点的拓扑，例如，一个 PS|SS|S 拓扑（见图 5-10）。在这种情况下，整个数据中心可以丢失而不影响可用性；然而，选择这种设计通常是为了允许从辅助节点读取。但这样一来，数据中心的丢失也会导致
  `性能下降`，因为响应读取请求的节点会减少。对于具有严格性能目标或当前工作负载资源不足的关键应用，这可能产生相当大的影响。


  ![../images/487346_1_En_5_Chapter/487346_1_En_5_Fig10_HTML.jpg](img/487346_1_En_5_Fig10_HTML.jpg)


  图 5-10


  一个在 3 个数据中心中采用 PS|SS|S 分片的集群


  一种更具成本效益的方法是使用整体少一个节点，而是创建三个分片，每个分片有三个承载数据的成员（图 5-11）。在单个数据中心故障时，它具有相同的冗余特性，但为我们提供了三个分片，每个分片都有一个可以接受写入的主节点。如果您选择进行辅助节点读取，总体上只有六个辅助节点，但每个节点的数据量更少，可以在其内存缓存中保留更大比例的数据，在相同的硬件配置下，提供更好的单节点性能。


  ![../images/487346_1_En_5_Chapter/487346_1_En_5_Fig11_HTML.jpg](img/487346_1_En_5_Fig11_HTML.jpg)


  图 5-11


  一个在三个数据中心中采用 P|S|S 分片的集群


  ### 负载与性能测试


  首次构建集群并准备推出新的 MongoDB 应用程序时，始终进行 `性能测试` 非常重要，以确保在小规模下能达到预期性能。在进入生产规模数据之前，您还应该进行
  `负载测试`，以确保所有组件的行为正确。本节考虑测试时可能遇到的几种常见情况。


  #### 连接过载


  任何应用程序都能正确响应响应缓慢和超时连接非常重要。如果到了分片本身无法及时处理传入操作的地步，那么连接将在 `mongos` 上堆积。默认情况下，`mongos`
  在开始拒绝来自应用程序的新连接之前，最多允许 `64k` 个连接。请注意，每 `1k` 个连接在开销上几乎需要 `1GB` 的 RAM。因此，如果您在资源有限的虚拟机（VM）上运行
  `mongos`，您很可能会更早达到此限制。在大多数 Linux 变体上运行时，内存不足杀手（OOM Killer）将激活并终止占用驻留内存最多的进程。在具有许多
  `mongos` 的生产系统中，应用程序将继续将请求路由到幸存的 `mongos`，这些 `mongos` 现在可能负载更重，从而导致级联效应。


  #### 超时


  大多数 MongoDB 驱动程序包含一个选项，可在查询操作上设置 `maxTime` 或 `maxTimeMS`。这允许应用程序对任何操作设置服务器端时间限制，例如，`3000`
  表示 3 秒限制。此值与初始请求一起传递到服务器，服务器端的计时器将在该时间后自动终止未完成的操作并干净地释放服务器资源。这对于在意外负载或网络不稳定的情况下避免使用过多的服务器资源非常有用。如果应用程序由于某种原因断开连接，或者连接由于非常长的查询而超时，我们可以确信它对服务器资源的影响将是有限的。


  另一方面，设置非常低的连接超时可能会产生相反的效果。想象一下，客户端在连接上设置了 3 秒超时，但正在请求一个需要 5 秒才能完成的复杂聚合管道。如果应用程序的连接在
  3 秒后自动关闭并重试，服务器将花费 2 秒完成第一个管道，同时，由于客户端重新请求，它将重新启动相同的管道。这有两个负面影响：服务器的额外负载，以及应用程序持续尝试重试繁重操作可能导致潜在的无限循环。


  #### 应用程序退避逻辑


  解决应用程序导致服务器过载的方法是在应用程序中添加 `退避逻辑`。本质上，应用程序应该能够检测服务器是否负载过重并减慢操作速度。一种方法是使用递增的暂停间隔。在初始失败后，应用程序等待
  1 秒再重试。如果再次失败，它可以等待两倍的时间再尝试。这使得应用程序能够自动尝试，而不会对自己的数据库服务器执行“拒绝服务”攻击。




  ## 可重试写入与读取


  从 MongoDB 3.6 版本开始，各驱动程序能够在某些故障（例如瞬时网络问题或副本集主节点切换）发生时，**一次**重试写入和读取操作。从应用的角度来看，这提高了稳定性，且不会给服务器带来过载的风险。


  对于为 MongoDB 4.2 及更高版本设计的驱动程序，可重试写入已成为默认行为，并可通过连接 URI 的 `retryWrites` 和 `retryReads`
  选项进行控制。


  ## 降级测试


  当你开始拥有多个数据中心或更大的集群时，网络问题的可能性会急剧增加。由于存在多个网络交换机和互联网骨干网，故障点很多。虽然 TCP 层会自动重试数据包并绕过故障，因此通常可以避免完全的路由故障，但性能会受到严重影响。


  在构建集群时，模拟此类降级网络环境非常重要，以便正确测试故障切换处理，并确保 MongoDB 集群中的所有组件都经过充分配置和准备，能够优雅地处理此类事件。


  ### 网络饱和


  你可能会遇到这样的情况：网络上的其他工作负载足以使某个特定交换机饱和，从而导致某个子网和分片集群中的少数节点出现极端的数据包延迟。如果受影响的节点承载的是副本集中的从节点，即使是定期的性能下降也可能不明显。


  然而，设想一下：由于当前主节点所在主机进行计划维护而触发了一次选举，其中一个受影响的节点成为了新的主节点。现在，一个分片的主节点受到了这种网络饱和的影响，连接突然因套接字超时而失败。我们该如何诊断和修复这种情况呢？


  #### 诊断


  这里，我们将提及一些可能有用的工具和方法：


  ```

  ping

  ```


  这个常用工具对于确认副本集配置中使用的主机名是否确实解析到预期的 IP 地址并具有有效路由非常有用。在通过虚拟私有云连接的混合本地和云数据中心环境中，这可能是一个特别棘手的问题。


  ```

  netstat -s

  ```


  此命令从本主机视角输出关键网络指标的摘要，包括关于已发送数据包总数以及有多少数据包被延迟或丢失的历史信息。


  如果观察到数据包丢失，下一步是确定数据包丢失开始发生的位置。可以使用 `traceroute`（Linux）或 `tracert`（Windows）检查通往目的地路径上的每一跳。


  ```

  tcpdump -i any -w /tmp/out.file

  ```


  这是一个通用的数据包分析器，也可以捕获通过网络传输或接收的所有 TCP 数据包，并可选择按端口或远程主机 IP 进行过滤。捕获数据后，可以在 `Wireshark`
  中可视化数据，以跟踪流程并调试诸如 TLS 握手或意外断开连接等问题。


  ```

  iftop

  ```


  类似于 `top` 和 `iotop`，此工具按远程主机分组显示当前网络流量摘要。这对于监控初始同步期间的实际峰值带宽或监控复制流量非常有用。


  #### iPerf3


  `iPerf3` 是一个跨平台工具，用于测量 IP 网络上的最大可实现带宽。它可以用于模拟真实的 MongoDB 流量，具有多个同时连接，可设置运行时间并定期报告输出。


  例如，以下命令设置一个客户端和一个服务器，运行一个使用 50K 大小的 TCP 数据包和 15 个并行流的双向测试，测量双向带宽。


  服务器端：`iperf3 -s -f K`


  客户端：`iperf3 -c <服务器 IP> -f K -w 50K -R -P 15 --get-server-output`


  ### 数据包丢失的常见原因


  网络上的数据包丢失可能由多种原因引起。如果你遇到数据包丢失，以下部分描述了一些你可以排查的可能问题。


  #### 链路拥塞


  当过多的流量通过一个已饱和的网络（或单个交换机）时，可能会发生这种情况，结果是一些数据包可能会被丢弃。


  如果无法通过引入更高效的查询、减少分片平衡或改变写入模式以减少操作日志来降低网络压力。


  然而，实际上，增加带宽是最快、最具成本效益的方法。


  #### 错误的协议配置


  偶尔，传输路径上两个网络设备之间的最大传输单元或双工模式不匹配可能导致冲突，并最终导致链路上的数据包丢失。


  双工不匹配通常可以识别，因为它会导致不对称的数据包丢失（即仅在一个方向上），并且数据包丢失是持续的。在现代硬件的大多数情况下，启用双工自动协商将解决不匹配问题。


  #### 错误的防火墙配置


  配置错误的防火墙可能在发生选举之前一直未被发现。想象一个从节点，当主节点位于同一子网时能够从某个主机复制数据，但当选举导致另一个主机成为主节点时，错误配置的防火墙规则导致所有传入数据包被丢弃。由于所有节点都会持续尝试发送健康检查
  ping，你应该已经能在日志中看到警告。


  **注意**

  MongoDB 日志中的任何警告都应认真对待，并尽快纠正。虽然它们可能看起来没有产生任何负面影响，但如果集群状态发生变化，这可能表明了停机的一个根源。


  #### 故障硬件或软件


  还有许多其他不常见的情况可能导致网络性能突然下降，例如交换机过热、电缆故障等。网络交换机拥有自己的处理器，已知其中包含软件错误，这些错误会导致在某些边缘情况下数据包处理或路由失败。


  在其他情况下，感染网络内部机器的恶意软件可能导致流量突然激增，这就像内部拒绝服务攻击一样，影响正常的 MongoDB 流量。


  ## 故障排除技巧


  本节介绍在规划复杂部署时的一些技巧，以便在组件随时间增加时，使故障排除和维护更加容易。


  ### 端口


  在构建一个相对简单的分片集群时，会运行许多不同类型的组件，包括配置服务器、`mongos` 路由器和分片 `mongod` 节点。即使每个组件都运行在自己的虚拟机和唯一的主机名上，也强烈建议在整个组织中使用标准化的端口编号方案，如表
  5-3 所示。这使得系统管理员、数据库管理员以及任何第三方监控或支持工具都能快速识别每个节点的角色。


  **表 5-3**

  根据组件角色分配端口的示例


  | 组件 | 进程名 | 端口 |

  | --- | --- | --- |

  | 配置服务器 | `mongod` | 27019 |

  | 独立节点 | `mongod` | 27016 |

  | 分片节点，或副本集成员 | `mongod` | 27018 |

  | 分片路由器 | `mongos` | 27017 |


  如果日志中出现错误消息或通过驱动程序报告给应用程序，仅凭端口号，我们就可以快速判断问题是否与配置服务器或分片节点有关。




  ### 时区


  当使用位于多个国家的数据中心时，为了简化来自多个不同组件的日志故障排除，建议将所有主机的系统时钟设置为协调世界时（UTC）。


  注意

  缩写 UTC 是一个折衷方案，因为英语曾提议使用 CUT（代表“coordinated universal time”），而法语曾提议使用 TUC（代表“temps
  universel coordonné”）。


  某些代理和驱动程序始终会以 UTC 时间记录日志，因此，通过在部署范围内强制使用此时区设置，可以更轻松地在日志中对齐不同组件的时间线，从而调试任何问题。


  在 Linux 系统上，可以通过以下命令强制设置 UTC/GMT：


  ```bash

  ln -sf /usr/share/zoneinfo/Etc/UTC /etc/localtime

  systemctl restart rsyslog

  ```


  ## 关键要点


  本章详细介绍了在不同数据中心配置上部署 MongoDB 的诸多细节。


  关键要点如下：


  *   MongoDB 组件需要能够相互通信以传输数据和共享运行状况信息。

  *   在三个数据中心分布三个数据承载节点的配置是推荐的拓扑结构，以最大限度地提高可用性和冗余性。

  *   许多 MongoDB 组件（包括驱动程序和`mongos`路由器）在选择查询数据的位置时会自动考虑网络往返时间。

  *   在投入生产之前，测试任何配置的性能非常重要。


  '
- "# 6. 全球拓扑结构\n\n本章将继续深入探讨针对不同类型的全球分片选项的拓扑结构建议，具体取决于低延迟还是数据控制/主权是优先考虑的因素。\n\n## 关键概念\n\
  \n在探讨不同全球拓扑结构的一些实际细节之前，让我们回顾一下对分片，特别是`区域`的理解。\n\n### 块、分裂与迁移\n\n正如你在第 1 章中所记得的，当对一个集合进行分片时，文档会根据分片键被分解成块范围，这些块会分布在可用的分片上。块的大小通常被限制在\
  \ 64MB 以内，以便在必要时能够进行相当快速的迁移。\n\n经过多次插入后，这些块会被分裂成更小的块，并且可能会从拥有过多块的分片迁移到拥有较少块的另一个分片。这个子系统的目标是在所有可用分片之间均衡地平衡块的数量。\n\
  \n因此，即使我们开始时一个分片存放`country`字段等于“US”的文档，另一个分片存放所有值为“UK”的文档，默认情况下也无法保证这种情况会永远保持不变。\n\
  \n## 分片键\n\n第 1 章介绍了分片键，这是一个特定于集合的设置，它定义了文档中的哪些字段将决定块的范围，并最终决定文档将被路由到哪个分片。\n\n当使用`复合`分片键时，字段的组合决定了块。当我们规划\
  \ MongoDB 上数据的地理分布时，分片键的第一个字段**必须**是地理组件（国家代码、邮政编码等），以便对块进行分组。\n\n注意\n在设置任何类型的区域分片时，避免使用哈希分片键，因为区域是基于整个键的哈希值来确定的，因此无法控制原始值的范围会落在哪里。更多详细信息请参见第\
  \ 11 章关于极端分片的内容。\n\n## 全球分片\n\n对于任何拥有单一城市或州以外用户群的大型应用程序，按区域考虑分片变得至关重要。这有众多原因，包括降低延迟（从应用程序到主节点的网络往返时间）、带宽成本（即使在同一云服务提供商的不同数据中心/区域之间也会产生）以及满足合规性要求。MongoDB\
  \ 提供了设计和构建满足所有这些需求的拓扑结构的能力，同时不牺牲对大多数生产工作负载至关重要的高可用性和冗余性。\n\n### 带宽要求\n\n假设你经营一家总部在美国的企业，一半客户居住在东海岸，另一半在加利福尼亚州。单个副本集虽然提供了高可用性，但要求所有数据在集合内复制，这意味着加州的数据存储在弗吉尼亚州，反之亦然。最好的解决方案是转向分片配置，即使数据大小尚未接近我们\
  \ 2TB 的分片大小启发式标准。\n\n在图 6-1 中，我们看到一个分片集群，在加利福尼亚州有一个分片，在弗吉尼亚州有一个分片。每个数据中心都有自己的应用程序服务器和`mongos`路由器。区域分片已按州配置，因此客户数据大致存储在离他们最近的分片上。\n\
  \n![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig1_HTML.jpg](img/487346_1_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1. 通过分片最小化带宽要求\n\n使用 AWS 或其他提供商提供的类似 DNS 路由服务，客户也会被路由到离他们最近的应用程序服务器。在大多数情况下，数据将在数据中心内部传输，尽管在某些情况下，某些查询可能需要路由到另一个数据中心。对未分片集合的操作，例如系统范围的配置，仍然可能访问“远程”分片。\n\
  \n请注意，我们利用多个数据中心在 DC2 中保存了配置副本集的一个副本。请记住，`config`数据库包含了关键的映射数据，即哪些块范围位于哪个分片上。\n\n\
  这种方法有一些缺点。一个是西部数据的所有三个副本都在同一个区域。通过将每个节点托管在不同的可用区（AZ）中，可以在一定程度上降低这种风险。否则，区域范围内的问题可能导致整个分片以及存储在那里的任何未分片集合不可用。\n\
  \n### 低延迟要求\n\n全球分片拓扑结构最常见的原因是最大限度地减少最终用户的延迟。在全球范围内，实现这一目标的唯一方法是根据客户的可能位置对数据进行分区，并允许通过地理上靠近的数据中心的\
  \ MongoDB 节点进行写入和读取。\n\n## 设置区域分片集群\n\n在本节中，我们将通过一个示例来说明如何根据全球集群随时间变化的需求，在其上使用区域规则。\n\
  \n\n\n## 定义区域\n\n我们可以将区域想象为管理员定义的、连续的分片键值范围。一个区域最初可能不包含或只包含少量文档块，但在大型生产系统中，可能会存在数百万个块。\n\
  \n在图 6-2 中，我们可以看到为美国客户（国家代码为“US”）和英国客户（根据 ISO 3166-1 标准，国家代码为“GB”代表大不列颠）定义了两个区域。\n\
  \n在此示例中，我们仍然假设客户 ID 字段 `custId` 在整个集群中实际上是唯一的字段，但由于我们使用的是复合分片键，因此对于“US”和“GB”块，都存在一个从\
  \ `custId` 的负无穷大值开始的块区域。\n\n注意：在以下图表中，-∞ 在内部实际上表示为特殊的 BSON 值 `MinKey`，而 ∞ 则表示为 `MaxKey`。\n\
  \n![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig2_HTML.jpg](img/487346_1_En_6_Fig2_HTML.jpg)\n\
  \n*图 6-2：区域及其块的示例*\n\n以这种方式在系统中仅定义两个区域，并不限制我们插入 `country` 字段为其他值（如加拿大“CA”或法国“FR”）的文档。这仅仅意味着我们没有为这些值的文档设置特定的区域。我们允许内置的均衡器定义一个块范围，并自动选择一个分片来存储这些文档。这个过程是完全自动且即时完成的。\n\
  \n请注意，区域范围不能重叠，并且范围总是包含下边界但不包含上边界。这使得所有 `mongos` 路由器都能清楚地知道新文档应该插入到哪个分片。\n\n## 将区域映射到分片\n\
  \n让我们想象一下，我们的集群中有三个可用分片：一个在美国东部，一个在欧盟西部，另一个在新加坡。目前我们主要关注美国和英国的客户，并希望确保他们的数据存储在各自的国家内。对于所有其他客户，我们目前乐意将数据存储在任何地方。\n\
  \n注意：一个分片可以承载多个区域。此外，一个区域可以与多个分片关联。\n\n在图 6-3 中，我们看到英国和美国的客户符合我们的区域规则，这些区域各自映射到一个特定的分片。来自印度（“IN”）和法国（“FR”）的客户可能位于任何分片上。事实上，法国的块很可能会迁移到新加坡分片，因为该分片的数据量较少。\n\
  \n![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig3_HTML.jpg](img/487346_1_En_6_Fig3_HTML.jpg)\n\
  \n*图 6-3：分配到区域的文档示例*\n\n现在，让我们想象一下我们在印度开展业务，并且由于该国的一些新法规（有关数据合规性法规，请参见第 4 章），我们需要将所有印度客户的数据保留在该国境内。我们可以通过添加一个新区域来实现这一点。\n\
  \n## 添加新区域\n\n我们首先需要指定一个新区域来约束 `{country: \"IN\"}` 的文档，例如使用以下命令。\n\n```\nsh.updateZoneKeyRange(\"\
  myDB.customers\",\n{ country: \"IN\", custId: MinKey },\n{ country: \"IN\", custId:\
  \ MaxKey },\n\"IND\");\n```\n\n*清单 6-1：为印度定义一个名为“IND”的新区域范围*\n\n区域本身还不会影响迁移，因为我们尚未向均衡器指定这些区域应该位于哪些物理分片的偏好。\n\
  \n注意：`Ops Manager` 和 `MongoDB Atlas` 托管服务都提供了用户界面来帮助定义区域和分配。\n\n## 添加新分片\n\n我们现在已经为印度客户数据定义了一个区域。在将任何数据移动到印度区域之前，我们必须首先在该国创建基础设施并将其集成到现有的分片集群中。大致步骤如下：\n\
  \n1.  在目标国家境内的多个数据中心配置新的服务器或虚拟机。\n2.  根据生产清单和安全最佳实践，安装依赖项、MongoDB 二进制文件和存储系统。\n\
  3.  构建一个具有适当名称的新副本集，例如“`sh-india-1`”。这将便于我们集群日后的管理。\n    注意：使用自动化工具（如仅企业版可用的 `Ops\
  \ Manager`）或 Ansible 脚本始终是最安全的方式，可以避免人为错误。有关部署的更多详细信息，请参见第 7 章；有关副本集拓扑的更多详细信息，请参见第\
  \ 5 章。\n4.  暂停均衡器，因为我们不希望在区域正确配置之前，它立即开始将任何块移动到该分片。在 `mongos` 上运行 `sh.stopBalancer(\
  \ 10*60*1000 )`。\n    这里我们只暂停 10 分钟，因为长时间禁用均衡器也会阻止其他正常操作，例如块分裂。\n5.  现在，将这个新的未分配分片连接到我们的集群中。在\
  \ `mongos` 上运行 `sh.addShard(\"sh-india-1/node1.dc0.india.bigcorp.com:27123\")`。\n\
  6.  添加区域。在 `mongos` 上运行 `sh.addShardToZone(\"sh-india-1\", \"IND\")`。\n7.  恢复均衡器，允许开始向新分片迁移块：\n\
  \    在 `mongos` 上运行 `sh.startBalancer()`。\n    注意：副本集一旦创建就无法重命名，因为所选名称充当成员相互识别的密钥。因此，如果集合有特定的用途或位置，最好给出描述性名称，而不是\
  \ `rs0`、`rs1` 等。\n\n## 渐进式均衡\n\n均衡器进程在我们的分片集群中具有明确的低优先级。我们不希望为了快速均衡一个分片而占用 CPU 和网络资源，从而影响常规工作负载。分片一次最多只能参与一次迁移，无论是捐赠还是接收块。例如，在一个六分片集群中，最多可以同时进行三个分片对之间的并行迁移。\n\
  \n对于大型数据集，当有高达 2TB 的数据要移动到新分片时，可能需要长达一周的时间才能使数据完全均衡。\n\n## 扩展区域\n\n假设我们在印度的业务增长强劲，我们最初的印度分片已接近\
  \ 2TB 的数据大小阈值。我们希望进一步分区，以避免备份和恢复时间出现问题。\n\n我们仍然需要将印度数据保留在印度境内，因此解决方案是部署*第二个*印度分片，并在两个分片之间均衡数据。我们已经为印度文档定义了区域\
  \ `\"IND\"`，因此扩展的步骤更少：\n\n1.  在目标国家境内的多个数据中心配置新的服务器或虚拟机；根据生产清单和安全最佳实践，安装依赖项、MongoDB\
  \ 二进制文件和存储系统。\n2.  构建另一个具有一致名称的副本集，例如这次是“`sh-india-2`”。\n3.  无需暂停均衡器，因为现有的印度数据已经限制在该国境内。\n\
  4.  同样，我们将这个新的未分配分片连接到我们的集群：\n    `sh.addShard(\"sh-india-2/node5.dc1.india.bigcorp.com:27123\"\
  )`。\n5.  将这个新分片链接到现有的印度区域：\n    `sh.addShardToZone(\"sh-india-2\", \"IND\")`。\n\
  6.  使用以下命令监控向第二个印度分片的块迁移情况：\n    `sh.status()`。\n\n\n\n### 重新分配区域\n\n假设除了英国、美国和印度的国家特定区域定义之外，我们还定义了一个泛亚洲区域来覆盖所有其他东南亚国家。\n\
  \n如果我们没有创建这个“全覆盖”的亚洲区域，那么亚洲客户可能会被自动均衡到位于欧盟或美国的物理分片上，从而可能导致不可接受的往返延迟。\n\n我们可以将多个范围分配给这个*亚洲*分片，如代码清单\
  \ 6-2 所示。\n\n```javascript\nsh.updateZoneKeyRange(\"myDB. customers \",\n{ country:\
  \ \"JP\", custId: MinKey },  // 日本\n{ country: \"JP\", custId: MaxKey }, \"Asia\"\
  )\nsh.updateZoneKeyRange(\"myDB. customers \",\n{ country: \"KO\", custId: MinKey\
  \ }, // 韩国\n{ country: \"KO\", custId: MaxKey }, \"Asia\")\nsh.updateZoneKeyRange(\"\
  myDB. customers \",\n{ country: \"TH\", custId: MinKey }, // 泰国\n{ country: \"TH\"\
  , custId: MaxKey }, \"Asia\")\nsh.updateZoneKeyRange(\"myDB. customers \",\n{ country:\
  \ \"PH\", custId: MinKey }, // 菲律宾\n{ country: \"PH\", custId: MaxKey }, \"Asia\"\
  )\n```\n代码清单 6-2\n可以为单个区域分配多个区域范围\n\n假设我们已经取消了向东南亚扩张的计划，但我们仍然在新加坡拥有数据中心。但如图 6-4\
  \ 所示，现在我们在印度也有两个分片。亚洲其他地区遗留客户的延迟是可以接受的，因此我们决定停用新加坡分片，并将数据迁移到印度。\n\n![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig4_HTML.jpg](img/487346_1_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4\n“新加坡”分片及其亚洲区域将被迁移到印度\n\n我们需要记住，*新加坡*分片可能不仅仅包含亚洲区域。它也可能包含一些未在任何现有区域中明确指定的国家的客户的其他块。\n\
  \n#### 清空分片\n\n在停用新加坡的硬件之前，有两个步骤：\n\n1.  将区域移动到不同的分片。\n2.  清空新加坡分片的其余部分，从而强制将任何“杂项”块移动到其他地方。\n\
  \n在图 6-5 中，我们看到*亚洲*区域已移至*印度-2*分片，并且幸运的是，我们来自法国的未分区客户被移到了*美国东部*。\n\n![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig5_HTML.jpg](img/487346_1_En_6_Fig5_HTML.jpg)\n\
  \n图 6-5\n“新加坡”分片在停用前被清空\n\n随着我们在美国业务的增长，我们决定在美西增加第二个分片。你可能已经注意到，我们无法将加利福尼亚的客户映射到西海岸分片，也无法将纽约的客户映射到东海岸分片。满足此需求的方法将在本章后面的“州级分片*”*中介绍。\n\
  \n### 检查块分布\n\n通过运行在`mongos`上的几个简单命令，可以简洁地概述我们的分片集群。第一个命令是`sh.status()`，以下是代码清单\
  \ 6-3 所示的我们分片集群的示例输出。\n\n```javascript\nmongos> sh.status()\n--- 分片状态 ---\n分片版本:\
  \ {\n\"_id\" : 1,\n\"minCompatibleVersion\" : 5,\n\"currentVersion\" : 6,\n\"clusterId\"\
  \ : ObjectId(\"5e41c1b7bb6aba86023a5aa8\")\n}\n分片:\n{ \"_id\" : \"sh-eu-west\",\n\
  \"host\" : \"sh-eu-west/:,...\",\n\"tags\" : [ \"GBR\" ] }\n{ \"_id\" : \"sh-india-1\"\
  ,\n\"host\" : \"sh-india-1/:,...\",\n\"tags\" : [ \"IND\" ] }\n{ \"_id\" : \"sh-india-2\"\
  ,\n\"host\" : \"sh-india-2/:,...\",\n\"tags\" : [ \"IND\" ] }\n{  \"_id\" : \"sh-sing\"\
  ,\n\"host\" : \"sh-sing/:,...\",\n\"tags\" : [ \"Asia\" ] }\n{  \"_id\" : \"sh-us-east\"\
  ,\n\"host\" : \"sh-us-east/:,...\",\n\"tags\" : [ \"USA\" ] }\n活跃的 mongos 实例:\n\"\
  4.2.3\" : 3\n自动分裂:\n当前启用: 是\n均衡器:\n当前启用:  是\n当前运行:  否\n过去 5 次均衡尝试失败次数:  0\n过去 24\
  \ 小时迁移结果:\n2 : 成功\n数据库:\n{  \"_id\" : \"config\",  \"primary\" : \"config\",  \"\
  partitioned\" : true }\n{  \"_id\" : \"myDB\",  \"primary\" : \"sh-eu-west\",  \"\
  partitioned\" : true,  \"version\" : {  \"uuid\" : UUID(\"b366477f-afa9-4b95-924e-d916cc56d9e8\"\
  ),  \"lastMod\" : 1 } }\nmyDB.customers\n分片键: { \"country\" : 1, \"custId\" : 1\
  \ }\n唯一: false\n均衡中: true\n块:\nsh-eu-west    1\nsh-india-2    1\nsh-us-east    1\n\
  { \"country\" : { \"$minKey\" : 1 },\n\"custId\" : { \"$minKey\" : 1 } } -->>\n\
  { \"country\" : \"IN\",\n\"custId\" : { \"$minKey\" : 1 } }\n位于 : sh-us-east Timestamp(4,\
  \ 0)\n{ \"country\" : \"IN\",\n\"custId\" : { \"$minKey\" : 1 } } -->>\n{ \"country\"\
  \ : \"IN\",\n\"custId\" : { \"$maxKey\" : 1 } }\n位于 : sh-india-2 Timestamp(3, 0)\n\
  { \"country\" : \"IN\",\n\"custId\" : { \"$maxKey\" : 1 } } -->>\n{ \"country\"\
  \ : { \"$maxKey\" : 1 },\n\"custId\" : { \"$maxKey\" : 1 } }\n位于 : sh-eu-west Timestamp(4,\
  \ 1)\n标签: IND  {\n\"country\" : \"IN\",\n\"custId\" : { \"$minKey\" : 1 } } -->>\n\
  { \"country\" : \"IN\",\n\"custId\" : { \"$maxKey\" : 1 } }\n```\n代码清单 6-3\n`sh.status()`命令的示例输出\n\
  \n我们将逐节介绍这个`sh.status()`输出。\n\n#### 分片\n\n顾名思义，**分片**部分列出了此集群中所有已配置的分片。每个分片都应列出该分片副本集中所有已知节点作为种子列表。实际上，这类似于：\n\
  \n```javascript\nsh-india-2/host5.dc1.india.bigcorp.com:27123, host6.dc1.india.bigcorp.com:27123,\
  \ host7.dc1.india.bigcorp.com:27123\n```\n\n出于高可用性的同样原因，我们在配置分片时确实应该包含所有节点。\n\n\
  如果`mongos`启动并从`config`数据库获取此配置时`host5`恰好宕机，它仍然能够连接到其他节点，并从它们那里自动检测到副本集的其他部分。\n\n\
  #### 活跃的 mongos 实例\n\n**活跃的 mongos 实例**部分简单列出了部署中可用的`mongos`实例总数及其二进制版本。\n\n注意\n\
  \n你应用程序中的驱动程序只会连接到连接 URI 中列出的`mongos`实例，不会自动发现部署中的其他`mongos`实例。这对于保留一些`mongos`实例用于特殊工作负载可能很有用。\n\
  \n#### 分裂器/均衡器\n\n分裂器和均衡器是分片集群自动化中密切相关的模块。分裂器识别过大的块，并将其分裂成两个更小的块。\n\n虽然单个分裂的开销很小，但不必要地分裂块会导致元数据更复杂，并且查询到目标分片的路由效率降低。\n\
  \n请注意，分裂只会触发于向该特定块范围插入或更新文档时。**自动分裂**已启用仅仅意味着这些分裂可以发生，即使当前不允许进行任何迁移。\n\n在图 6-6 中，你可能会注意到分裂产生的子块保留了其父块的边界。分裂操作永远不需要迁移到另一个块，也不会使区域规则失效。因此，任何要求用户文档存在于特定物理位置的数据保护规定都不会被违反。\n\
  \n![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig6_HTML.jpg](img/487346_1_En_6_Fig6_HTML.jpg)\n\
  \n图 6-6\n一个大块被分裂成两个子块\n\n一旦块被分裂成两个，如果检测到分片之间不平衡，就可能触发均衡器。在前面的`sh.status()`输出中，我们看到均衡器已启用，但当前没有运行，因为没有分片失衡，并且所有块已经遵循区域配置。如果我们更改了区域范围，均衡器可能需要开始将块移动到新的分片以匹配区域配置。\n\
  \n注意\n\n你应该避免长时间禁用分裂器或均衡器，因为分片可能会变得不平衡，尤其是在导入工作负载期间。\n\n\n### 数据库\n\n本节列出了此集群上已知的所有数据库。\n\
  \n如果数据库列为 `partitioned: true`，则表示它已分片。也可能存在一些完全没有分区的小型数据库，它们可以没有分片集合。\n\n请注意，我们的\
  \ `customers` 数据库列出了一个 `primary` 分片。主分片是所有未分片集合的存放位置，可以被视为该特定数据库的“归属”分片。任何非分片集合将仅存在于该分片上。这使得\
  \ `mongos` 路由器能够轻松地将这些较小集合的查询定向到特定分片。\n\n这里还显示了一些基本元数据，例如分片键以及是否应用了唯一约束。接下来，列出了\
  \ `chunks`（数据块）的摘要，以便我们可以快速查看每个分片的数据量是否大致相同。在没有设置区域的情况下，这些数据应该是平衡的，但在我们的全局集群中，链接到包含更多文档区域的分片会更大。\n\
  \n### 检查现有区域\n\n在进行更多更改之前，我们希望检查我们的映射是否符合预期。我们可以通过任何 `mongos` 路由器连接，从 `config` 数据库中查询配置信息。\n\
  \n`shards` 集合列出了所有分片以及映射到它们的区域。`tags` 集合列出了所有区域、它们的范围以及选择的标签，例如“`IND`”。这在代码清单 6-4\
  \ 和 6-5 中显示。\n\n例如，以下命令可以从 Mongo Shell 运行。\n\n```\n{ \"_id\" : { \"ns\" : \"myDB.customers\"\
  ,\n\"min\" : { \"country\" : \"IN\", \"custId\" : { \"$minKey\" : 1 } } },\n\"ns\"\
  \ : \"myDB.customers\",\n\"min\" : { \"country\" : \"IN\", \"custId\" : { \"$minKey\"\
  \ : 1 } },\n\"max\" : { \"country\" : \"IN\", \"custId\" : { \"$maxKey\" : 1 } },\n\
  \"tag\" : \"IND\" }\n{ \"_id\" : { \"ns\" : \"myDB.customers \", \"min\" : { \"\
  country\" : \"JP\", \"custId\" : { \"$minKey\" : 1 } } },\n\"ns\" : \"myDB.customers\
  \ \",\n\"min\" : { \"country\" : \"JP\", \"custId\" : { \"$minKey\" : 1 } },\n\"\
  max\" : { \"country\" : \"JP\", \"custId\" : { \"$maxKey\" : 1 } },\n\"tag\" : \"\
  Asia\" }\n```\n\n*代码清单 6-5：标签输出显示了范围和标签*\n\n```\nuse config;\ndb.tags.find();\n\
  ```\n\n*代码清单 6-4：列出所有已配置的区域范围*\n\n### 移动一个区域\n\n在我们的案例中，我们希望重新定位整个亚洲区域，但不更改其任何范围，因为国家代码没有改变。将区域重新映射到分片可以通过以下命令完成：\n\
  \n```\nsh.removeShardFromZone(\"sh-sing\", \"Asia\")\nsh.addShardToZone(\"sh-india-2\"\
  , \" Asia \")\n```\n\n此时，所有*亚洲*数据块将开始移动到 `sh-india-2` 分片。\n\n### 清空一个分片\n\n要从分片中清空数据块，我们首先在要移除的分片上发出\
  \ `removeShard` 命令：\n\n```\ndb.adminCommand( { removeShard: \"sh-sing\" } )\n```\n\
  \n这将开始移动位于*其他*分片上的分片数据库中的任何文档数据块，但需要手动干预来重新安置仅存在于此分片上的数据库。系统无法自动决定将它们移动到哪里。\n\n\
  `removeShard` 命令将返回一个文档，告知我们活动状态以及是否有任何数据库阻碍了移动。\n\n```\n{\n\"msg\" : \"draining\
  \ ongoing\",\n\"state\" : \"ongoing\",\n\"remaining\" : {\n\"chunks\" : NumberLong(45),\n\
  \"dbs\" : NumberLong(2),\n\"jumboChunks\" : NumberLong(0)\n},\n\"note\" : \"you\
  \ need to drop or movePrimary these databases\",\n\"dbsToMove\" : [\n\"db2\",\n\"\
  db3\"\n],\n\"ok\" : 1\n}\n```\n\n*代码清单 6-6：在数据库主分片上执行 removeShard 的结果*\n\n在这种情况下，我们需要手动移动两个数据库：`db2`\
  \ 和 `db3`。我们可以选择将它们都移动到我们的第一个印度分片：\n\n```\ndb.adminCommand( { movePrimary: \"db2\"\
  , to: \"sh-india-1\" })\ndb.adminCommand( { movePrimary: \"db3\", to: \"sh-india-1\"\
  \ })\n```\n\n最初的 `removeShard` 命令需要重新运行，直到响应的 `state` 值为 `\"completed\"`。此时，分片已被清空，可以安全地将主机下线。\n\
  \n### 目标状态\n\n请注意，在上述两种情况下，配置的“目标状态”会在元数据中立即更新，但数据块本身可能需要数小时或数天才能完全迁移以满足新配置。网络带宽、其他工作负载以及均衡器窗口都是可能限制达到目标状态速度的因素。\n\
  \n## 州/省级分片\n\n如果您的业务集中在一个或多个地理面积很大的国家，如美国、中国或澳大利亚，而数据仅存储在单一物理位置（例如所有数据中心都在美国东海岸的弗吉尼亚州），那么到该国另一端的延迟对于您的用例来说可能过高。\n\
  \n解决方案是将这种国家级别的分片概念扩展到州/省级别。幸运的是，这只需要使用比国家代码更细粒度的信息即可。\n\n### 邮政编码\n\n如果你知道自己的业务永远只会在美国境内运营，那么邮政编码（zip\
  \ code）可能是一个不错的选择。但如果要支持国际扩张，某种复合地理分片键会更加灵活。\n\n假设你有这样的文档结构（清单 6-7）：\n\n```\n{ _id:\
  \ ObjectId(....),\ncustId: 1234567,\nname: \"John Smith\",\nstreet: \"20 W 34th\
  \ St\",\ncity: \"New York\",\npostcode: \"10118\",\nstate: \"NY\",\ncountry: \"\
  US\"\n...\n}\n清单 6-7\n一个支持州级分片的文档结构\n```\n\n> **注意**\n> 你应该考虑将邮政编码存储为字符串而非数字，因为英国的邮政编码包含大写字母。例如，“SW1A\
  \ 1AA”是白金汉宫的邮政编码。\n\n对于前面的文档，使用像 `{ country: 1, postcode: 1, custId: 1}` 这样的分片键，可以初始实现简单的基于国家和地区的分片，随后可以应用更复杂的区域规则将数据划分到更具体的位置。例如：\n\
  \n```\nsh.updateZoneKeyRange(\"myDB.customers\",\n{ country: \"GB\", postcode: \"\
  SW00 000\", custId: MinKey },\n{ country: \"GB\", postcode: \"SWZZ ZZZ\", custId:\
  \ MaxKey },\n\"UK-London\")\nsh.updateZoneKeyRange(\"myDB.customers\",\n{ country:\
  \ \"GB\", postcode: \"SE00 000\", custId: MinKey },\n{ country: \"GB\", postcode:\
  \ \"SEZZ ZZZ\", custId: MaxKey },\n\"UK-London\")\n```\n这将定义一些区域，其数据存放在物理位置位于伦敦或其附近的分片上。在图\
  \ 6-7（英国）和图 6-8（美国）中，我们可以看到为每个区域指定精确的区域规则将极其复杂。^(⁴)\n\n![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig7_HTML.jpg](img/487346_1_En_6_Fig7_HTML.jpg)\n\
  \n*图 6-7*\n用于次国家分片的英国邮政编码地图\n\n在同一个部署中，可以设置规则来标记纽约的客户，并将他们定位在位于美国东海岸的硬件上：\n\n```\n\
  sh.updateZoneKeyRange(\"myDB.customers\",\n{ country: \"US\", postcode: \"00500\"\
  , custId: MinKey },\n{ country: \" US\", postcode: \"00600\", custId: MaxKey },\n\
  \"US-NY\")\nsh.updateZoneKeyRange(\"myDB.customers\",\n{ country: \"US\", postcode:\
  \ \"06390\", custId: MinKey },\n{ country: \"US\", postcode: \"06390\", custId:\
  \ MaxKey },\n\"US-NY\")\nsh.updateZoneKeyRange(\"myDB.customers\",\n{ country: \"\
  US\", postcode: \"10000\", custId: MinKey },\n{ country: \"US\", postcode: \"14999\"\
  , custId: MaxKey },\n\"US-NY\")\n```\n\n如图 6-8 所示，美国邮政编码的纯数字方式，以及按州分组的方式，将使得定义少量区域键范围变得容易得多，同时仍能准确地映射分组。^(⁵)\n\
  \n![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig8_HTML.jpg](img/487346_1_En_6_Fig8_HTML.jpg)\n\
  \n*图 6-8*\n可用于区域分片的美国邮政编码地图\n\n在英国，两个字母的前缀之间没有逻辑上的地理关联，因此可能需要为每一个前缀定义一个区域键范围。你可以只为高密度区域定义范围，并让所有其他区域的数据存放在一个位于中央数据中心的分片上，该中心到全国所有地区都具有可接受的低延迟。\n\
  \n### ISO 3166-2\n\n从前面可以看出，使用邮政编码进行州级分片很快会变得复杂。一个优越得多的解决方案是使用国际标准化组织（ISO）的 3166-2\
  \ 标准。该标准为世界上每个国家提供了不同详细程度的正式行政区划代码。\n\n对于英国，使用顶级行政区划代码 `GB-ENG`、`GB-NIR`、`GB-SCT`\
  \ 和 `GB-WLS` 分别代表英格兰、北爱尔兰、苏格兰和威尔士，可能就足够了。否则，还可以使用 27 个二级郡县代码，例如 `GB-OXF` 代表牛津郡。\n\
  \n对于美国，有所有 50 个州的顶级行政区划代码，以及 `US-DC` 代表哥伦比亚特区，还有其他地区的代码，如 `US-GU` 代表关岛和 `US-PR`\
  \ 代表波多黎各。\n\n在这种方法中，你会添加一个额外的 `location` 字段，生成的文档如下所示：\n\n```\n{ _id: ObjectId(....),\n\
  custId: 1234567,\nname: \"John Smith\",\nstreet: \"20 W 34th St\",\ncity: \"New\
  \ York\",\npostcode: \"10118\",\nstate: \"NY\",\ncountry: \"US\"\nlocation: \"US-NY\"\
  \n...\n}\n```\n\n然后通过使用分片键 `{ location: 1, custId: 1}`，你可以将客户数据分区到适当的次国家行政区划。\n\n\
  ### 读取与分散-聚集\n\n扩展分片集群以处理数据读取的最佳方式是，能够在每次查询中指定分片键的所有值。这样，`mongos` 路由器就可以从包含所需数据的那一个分片请求数据。在我们目前的方法中，我们可能最初只知道\
  \ `custId` 值（例如，来自 Web 或 API 请求），因此必须查询整个集群中的每个分片以寻找匹配项。一旦我们也拥有了国家和邮政编码字段，随后的查询就可以使用所有分片键组成部分进行过滤，并仅定位到一个分片。\n\
  \n### MongoDB Atlas\n\nMongoDB Atlas 是一个完全托管的云数据库。Atlas 处理了在您选择的云服务提供商上部署、管理和修复全球部署的所有复杂性。此服务包括一个友好的界面，可根据业务需求变得复杂时配置和扩展您的部署。\n\
  \n这个全局分片系统使用了前面讨论的 ISO 3166-2 国家和行政区划代码，并要求一个名为 `location` 的字段与您选择的另一个辅助字段组合使用。\n\
  \n图 6-9 显示了两个用于高性能全局集群的预定义模板，一个包含三个区域，另一个包含五个区域。这些模板假设分片数量至少与区域数量相同，因此这将需要一个相当大的部署。\n\
  \n![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig9_HTML.jpg](img/487346_1_En_6_Fig9_HTML.jpg)\n\
  \n*图 6-9*\nAtlas 包含预定义的全局分片模板\n\n在图 6-10 中，我们可以看到一个简单的界面，用于根据所选的分片位置数量定义自定义区域。\n\
  \n![../images/487346_1_En_6_Chapter/487346_1_En_6_Fig10_HTML.jpg](img/487346_1_En_6_Fig10_HTML.jpg)\n\
  \n*图 6-10*\nAtlas 还包含一个用于映射行政区划的界面\n\n### 小结\n\n在本章中，我们通过一些示例探讨了全局集群随时间变化的情况。我们还为不同的全局分片用例探索了一些不同的分片键选项。表\
  \ 6-1 总结了涵盖的三种分片键模式及其优点。\n\n*表 6-1*\n全局分片选项总结\n\n| 分片键 | 优点 | 缺点 |\n| --- | ---\
  \ | --- |\n| `{ country: 1,    custId: 1}` | • 区域规则简单 | • 无法实现次国家级分区 |\n| `{ country:\
  \ 1,`  `postcode: 1,`  `custId: 1}` | • 可以实现次国家级分区 | • 元数据和区域规则复杂 |\n| `{ location:\
  \ 1,`  `custId: 1}` (例如 Atlas) | • 灵活• 次国家级分区简单 | • 需要计算和存储额外的字段 |\n\n\n## 关键要点\n\
  \n本章需要记住的核心概念如下：\n\n*   **区域**可用于控制数据块范围的物理存放位置。\n*   每个区域可定义多个范围，因此我们可以创建一个包含多个国家的单一亚洲区域。\n\
  *   一个区域可以映射到多个**分片**，这样即使某个区域的数据量超过了我们设定的`2TB`基准限制，仍可在单一区域内增长。\n*   区域和分片可以随着部署规模的扩大或需求的变化而添加或移除。\n\
  *   基于区域的分片可用于确保最终用户位置与数据库之间的`低延迟`往返，或最大限度地减少`带宽费用`。\n*   利用区域实现的地理政治分片规则还可用于确保满足`数据保护法规`（如\
  \ GDPR）的要求。\n\n脚注 1   2\n\n"
- '# 7. 部署与监控


  本章探讨在生产环境、本地环境以及基于云的自管理环境中，自动化 MongoDB 部署最常用的工具和技术。我们还将回顾不同的监控解决方案和技巧，以帮助 DevOps
  团队规避问题并对部署中的变化做出快速反应。


  ## DevOps 工具集


  随着云提供商不断增加新功能，以及大型企业将更多工作负载转移到“公有云”，DevOps 工具集仍在快速发展。本文提供的所有细节在撰写时都是准确的。


  ## 目标


  理想情况下，我们的 DevOps 工具集应紧密契合数据库需求，即：随着部署规模扩大而具备`可扩展性`、`隔离`各组件、确保数据的`持久性`以及优化`性能`。


  ### 社区版与企业版


  MongoDB 公司（MongoDB 背后的公司）早期选择将数据库作为开源产品，部分是为了推动普及，但也坚信开源数据库会变得更加安全、稳定和可靠。


  为了建立业务，公司也为**企业客户**保留并构建了一些额外功能。本章提到的 DevOps 工具就属于此类。任何获得许可的客户均可在本地或自管理的云基础设施上自由使用这些工具，并能获得无限制的技术支持，以确保其部署始终在线且处于最优状态。


  MongoDB 的发布遵循常见范式：偶数版本用于生产环境，奇数版本用于预生产工作。例如，4.3 版是用于测试的预生产版本，之后通常会作为 4.4 版正式发布用于生产。


  次要版本（如从 4.4.1 到 4.4.2）包含安全性和性能改进，但永远不会破坏向后兼容性。通常，您应在几周内升级到任何次要版本，以获得重要的稳定性改进和错误修复。相比之下，主要版本升级应在
  UAT 环境中使用真实数据和工作负载进行测试，然后再在生产部署中进行升级。


  #### Ops/Cloud Manager


  `Ops Manager`是 MongoDB 的企业级管理平台，旨在您自己的基础设施上部署、监控、备份和扩展 MongoDB 部署。`Cloud Manager`几乎与之相同，区别在于其指标和备份由
  MongoDB 公司存储和管理，但实际用户数据永远不会离开您自己的基础设施。表 7-1 展示了 Ops Manager 与 Cloud Manager 之间的差异。


  表 7-1

  Ops Manager 与 Cloud Manager 对比


  |   | Ops Manager | Cloud Manager |

  | --- | --- | --- |

  | 自动化部署 | 是，本地部署 | 是，本地部署 |

  | 监控部署 | 是，所有元数据和指标均在本地 | 是，但元数据和指标在云端 |

  | 备份部署 | 是，备份可全部在本地（使用文件系统、块存储或本地 S3 兼容存储），或备份到 Amazon S3 云存储 | 是，备份存储在由 MongoDB
  公司管理的 Amazon S3 存储桶中 |

  | 要求 | 在所有主机上安装自动化代理<br>用于存储 Ops Manager 配置的副本集（AppDB）<br>用于存储操作日志和块存储（用于备份）的副本集<br>Ops
  Manager 实例的主机（以及可选的负载均衡器） | 在所有主机上安装自动化代理 |


  这两种工具都能以`滚动方式`帮助管理、重新配置、扩容和升级您的 MongoDB 部署版本，以避免停机。对于生产环境中任何比单个副本集更复杂的部署，手动应用更新的风险都太高。


  #### 滚动变更


  在自动化生产环境 MongoDB 部署时，进行滚动变更至关重要。由于一个构建良好、健康的集群至少会有一个冗余节点，因此应该可以一次升级集群中的一个节点，并在应用下一个变更之前确保所有节点都重新上线。


  同时进行多项变更（例如，在三节点副本集中重启两个节点）会使分片暂时变为只读状态，从而阻塞整个应用程序。这种滚动逻辑是 Ops/Cloud Manager 的基础功能，使用现成的
  DevOps 框架和自定义脚本很难复制。


  ### 挑战


  正如 DevOps 领域的任何人都可以证明的那样，`自动化是困难的`。在不中断服务的情况下自动化复杂的分布式系统则更为困难。我们希望保证能够以可重复、稳健的方式执行变更，并易于将组件保持在最新、最稳定和最安全的版本。以下是管理
  MongoDB 部署时面临的一些具体挑战。


  #### 状态变更


  MongoDB`集群是有状态的`。主节点和从节点具有特定的角色，这些角色会随时间变化。它们还需要持久化并同步数据。我们不能只是将一个替换镜像启动到副本集中——那会触发初始同步——影响同步源和网络。我们可能需要通过严格控制数据的位置和流动来遵守数据保护法规。


  #### 安全性


  我们还需要在集群中`管理安全`。这可能包括创建适当的 x.509 证书来验证集群成员身份，从 KMIP 服务器检索主密钥，或连接 Kerberos 以验证新连接。我们可能需要以正确的顺序设置
  TLS，以免将自己锁在集群之外，导致变更无法完成。


  #### 规模与复杂性


  手动管理大型 MongoDB 部署，并手动配置每个节点，会带来一些风险。这些风险包括更长的停机时间（以及可能因操作日志不足而导致的初始同步），或引入配置错误。一个成熟且经过充分测试的自动化系统应该消除或至少大大降低这些风险。


  #### 容错性


  由于 MongoDB 本身具有`自愈能力`，一旦集群被正确配置，除非需要升级、配置变更或更换硬件，否则它应该不需要太多干预（手动或自动）。


  系统架构师可以选择适合其业务案例的容错级别。例如，一个拥有五个数据承载成员（而非通常的三个）的副本集，可以在最多两个成员宕机的情况下继续运行。




  ### 框架选择


  DevOps 的技术和工具栈发展迅速。本章讨论的许多框架和方法在您阅读本书时可能已经发生了变化。选择框架时，有几个问题需要考虑。


  #### 复用


  我们希望自动化组件之间是松耦合的，尽可能复用我们所使用产品中已有的功能（即，像 `Ops Manager` 和 `Kubernetes Operator` 这样的仅企业版工具），并避免从头开始编写我们自己的配置/脚本。


  #### 避免锁定


  通常，我们不想过度依赖某个特定的框架。即使是流行的解决方案也可能停止获得支持，我们可能会突然发现无法轻松升级到最新、最安全的操作系统，因为我们的工具就是不支持它。


  我们不想将自己锁定在当前的基础设施中，无论是裸金属、`OpenStack`、`OpenShift`、超融合架构等等。


  我们希望保持选择权，以便能无痛地迁移到云提供商，或者更好的是，迁移到多云配置，这样我们就不依赖于任何单一提供商。在新冠肺炎疫情期间，这一点尤其痛苦，那些依赖 `Azure`
  的用户发现根本没有可用的容量来启动新的计算实例。


  ### 多云拓扑


  如果您计划部署到云端并最大化高可用性，使用多个云提供商是一种选择。您可以有一个欧洲分片，其节点分别位于 `GCP europe-west3`、`Azure Germany
  West Central` 和 `AWS eu-central-1`。这将把所有节点都放置在德国法兰克福或其附近，以降低延迟，但我们需要小心计算提供商之间带宽的成本。


  多云 DevOps 的复杂性也更高。一些工具（如 `Terraform`）包含特定于平台的模块，可以无缝部署底层基础设施。其他工具（如 `Ansible`）可能需要为某些提供定制主机镜像、网络堆栈或防火墙的云提供商定制
  Playbook。


  #### 基础镜像


  每个云提供商都为每种 Linux 发行版提供了一定程度定制（和优化）的基础镜像。使用每个提供商的镜像作为基础很有诱惑力，因为它们附带了预配置的优化。为避免锁定，您可以改为使用
  HashiCorp 的 Packer (`https://packer.io/`) 或类似的基础设施即代码 (`IaC`) 工具来构建自己的定制镜像。


  在许多情况下，最好使用 `Terraform` 来管理环境的任何特定于云的方面（例如，安全组、`VPN`、自动扩展），尽管也有用于配置管理工具（如 `Ansible`）的特定于云的模块。


  ### 虚拟机


  虚拟机 (`VM`) 现在构成了本地和云计算堆栈的基石。通过将非常大的主机拆分成多个虚拟机，`MongoDB` 部署可以更高效地部署并保持隔离。这意味着一个 `VM`
  或一个节点的不稳定不应不利地影响同一 `VM` 主机上任何其他节点的稳定性。


  图 7-1 展示了一个跨越八个虚拟机的单分片集群，这些虚拟机部署在三台物理 `VM` 主机上。任何一台物理主机发生故障都不会影响集群的运行。


  ![../images/487346_1_En_7_Chapter/487346_1_En_7_Fig1_HTML.jpg](img/487346_1_En_7_Fig1_HTML.jpg)

  *图 7-1 虚拟机提供资源隔离*


  大多数 `VM` 解决方案都支持亲和性与反亲和性的概念。亲和性规则要求一组 `VM` 应部署在同一台 `VM` 主机上。相比之下，反亲和性规则可用于防止副本集（例如
  1b、2b 和 3a）的 `VM` 被部署在同一台主机上。


  #### 共置


  “吵闹的邻居”从同一主机上的其他 `VM` 窃取 `CPU` 和内存资源的问题在云端仍然可能存在。在本地，通常可以通过阻止 `VM` “借用”其他 `VM` 的资源来配置解决这个问题。这使得系统管理员能够为部署中的所有进程提供一致的资源和有保证的基线性能。


  #### 其他优势


  `VM` 还提供了许多其他优势，包括能够更轻松地调整 `VM` 大小，增加计算核心、额外内存资源，以及对存储卷进行快照。


  ### 容器


  计算容器是另一种巧妙地隔离、交付和运行进程而不与其他进程产生负面影响的方式。对于 `MongoDB` 部署，一个容器将包含节点启动和联系其其他集群成员所必需的数据文件和配置文件。`MongoDB`
  二进制文件和其他必需的包可以在同一主机上的所有容器之间共享，因此它们不一定需要额外的存储空间。


  像 `VM` 一样，容器保持内存、`CPU` 和 `I/O` 资源的隔离和限制，使得在同一物理主机上运行多个 `MongoDB` 节点变得更加容易，而不会产生副作用。


  在 Linux 中使用 `cgroups`，可以为容器配置资源上限，这意味着一个配置服务器节点可以使用（例如）仅 `2GB` 的 `RAM`，但同一主机上的一个分片成员可能被允许使用高达
  `200GB`。


  #### 与虚拟机比较


  `VM` 需要一个完整的操作系统来实现相同级别的资源分配，但当然，在每个 `VM` 客户端内运行整个操作系统会浪费大量宝贵的系统主机 `RAM`。


  在图 7-2 中，我们看到了与图 7-1 相同的集群拓扑，只是我们只有三个 `VM`。通过改用容器，我们可以更高效地使用主机的内存和存储资源。


  ![../images/487346_1_En_7_Chapter/487346_1_En_7_Fig2_HTML.jpg](img/487346_1_En_7_Fig2_HTML.jpg)

  *图 7-2 容器提供隔离且无虚拟机开销*


  容器更轻量级，但通常部署更复杂。它们也有更适合开发人员的工具，适合采用持续交付方法的组织。使用容器还使测试更加准确，因为可以测试和部署完全相同的容器。


  至少在不久的将来，虚拟机很可能仍然是系统管理的基础级别，因为它们是云计算的基础。


  ### Docker


  虽然确实存在替代方案（Oracle 的 `VirtualBox`、`Vagrant` 和 `Wox` 等），但 Docker 是目前最常见且易于使用的容器。


  `Docker` 在内存和网络方面提供强大的隔离性。这些容器的端口需要明确暴露，以允许与外部世界通信。


  `Docker` 镜像通常使用容器编排系统（如 `Kubernetes`）跨多个主机和数据中心进行部署。


  ### 基于云的容器服务


  `Amazon Elastic Container Service (ECS)` 是一项高度可扩展的容器管理服务，用于在集群上管理 `Docker` 容器。`Amazon
  Elastic Container Service for Kubernetes (EKS)` 通过增加一个基于标准的 `Kubernetes` 管理系统来扩展此功能，需额外付费。


  其他云提供商也提供类似的解决方案，如 `Azure Container Service (AKS)` 和 `Google Kubernetes Engine (GKE)`。




  ### 超融合基础设施


  （在撰写本书时）另一项相对较新的技术是 `hyperconverged infrastructure`（HCI，超融合基础设施）。这种方法的目标之一是让组织能够构建两个或多个数据中心，并无缝维护所有计算资源的冗余副本。如果一个数据中心突然发生故障，系统将自动在剩余的数据中心中启动所有服务的替换实例。这要求数据中心之间的数据通过
  `storage area network`（存储区域网络）始终能被即时、透明地复制到其他数据中心。


  组织可能会倾向于依赖超融合框架来维持数据库正常运行时间的服务水平目标（SLO），但将 MongoDB 的高可用复制系统与超融合结合使用既存在问题，又过于冗余。


  MongoDB 本身已包含所有数据中心和网络状态感知功能，但它是专门为管理结构化文档而设计的。应用程序可以通过写关注点和读关注点来控制其冗余级别，这提供了比 HCI
  更加细粒度的控制。


  在生产环境中，MongoDB 可以安装在超融合基础设施内部，但应禁用其内置的存储复制功能。MongoDB 将自行处理复制，而来自 HCI 的额外负载和延迟并不能带来任何额外收益。


  此外，如果 MongoDB 集群已针对容错性（参见第 2 章）和全局拓扑（参见第 6 章）进行了正确配置，那么丢失单个数据中心不应影响应用程序。因此，在故障发生后立即启动新的替换节点并非必要，如果该节点需要进行初始同步，还可能增加额外负载。


  ### 生产环境要求


  您所用 MongoDB 版本文档中的 `Production Notes`（生产环境说明）是权威参考，其中说明了如何最佳配置服务器以优化 MongoDB 的稳定性和性能。


  这些说明涵盖了诸如文件系统所需权限、如何设置日志（journal）和日志文件（logs）路径以避免磁盘 I/O 冲突、网络安全、WiredTiger 缓存设置和压缩、内存配置（包括
  NUMA 和禁用透明大页）、为文件系统使用 XFS 和 `noatime`、正确的网络设置（压缩、TCP 保活等）、优化虚拟机（内存交换）以及如何使 SELinux
  正常工作等内容。


  这些设置大多依赖于具体的操作系统和版本、可用硬件以及任何虚拟化环境，因此没有官方预制的虚拟机镜本或脚本来准备环境。需要由系统管理员确保为将要运行 MongoDB
  节点的服务器进行正确设置。


  #### 标准化服务器


  大多数组织选择为其整个集群（配置服务器、`mongos` 实例和分片节点）运行标准化服务器。即使内存和存储设备的规格不完全相同，主机至少应具有完全相同的操作系统版本和安全设置。


  有任意数量的自动化和编排工具可以以标准化、可重复的方式构建、准备和升级服务器，从而轻松替换或添加新服务器，以满足数据库随时间增长的需求，或在硬件故障需要更换时使用。


  操作系统升级也应以经过准备、可控的方式进行，理想情况下只需很少或无需人工步骤即可完成。


  这样，配置至少在整个集群中保持一致，在排除运行在其上的 MongoDB 组件的任何行为或性能变化的故障时，我们可以排除服务器级别的配置错误。


  ### 操作系统选择


  虽然 MongoDB 已被开发为可在多种流行架构和操作系统上以高性能、生产就绪的配置运行，但在生产环境中广泛使用的只有少数几种。这些包括企业级 Linux（Red
  Hat、CentOS、Oracle、SUSE、Ubuntu Server LTS）和 Windows。


  #### 云变体


  对于在自管理云主机上运行的用户，Amazon Linux 等系统也很受欢迎，因为这些镜像已经针对特殊的虚拟存储和网络实现进行了优化配置。不幸的是，它们通常是旧版
  Linux 的分支，配置文件的位置和包含的软件包可能与标准有显著差异。这种差异使得管理混合本地和云环境变得更加困难。


  由于您可以找到大多数企业级 Linux 风味版的官方云镜像，或许最好保持相同的操作系统，但增加特定于云的配置任务，例如将云存储设备配置得与本地硬件 RAID 不同。


  #### 旧版 RHEL 版本


  一些旧版企业 Linux 可能包含已知的安全或稳定性问题。通常，您应计划在 Red Hat 发布下游版本后一年内升级到最新版本。


  例如，如果您通过操作系统的 OpenLDAP 库使用原生 LDAP，则强烈建议至少使用 RHEL 7.5。在这个版本中，OpenLDAP 切换到了 OpenSSL
  实现，这带来了重要的线程安全性。


  MongoDB 仅为企业版或 LTS（长期支持）版本提供官方软件包。其他操作系统版本的支持生命周期不够长。


  ### 虚拟机


  如果您需要运行多个较小的 MongoDB 节点（例如用于 `mongos` 或配置服务器节点），可能会倾向于将它们共同部署在一台服务器上，或在同一台虚拟机上使用不同端口运行。然而，在排除此类系统的故障时的复杂性以及确保两个进程以最佳方式共享系统资源的难度要大得多。


  更好的做法是首先设置一个虚拟机主机，并部署具有固定资源（即禁用内存气球驱动）的多个虚拟机。


  ### Kubernetes


  然而，对某些组织来说，虚拟机已经过于笨重难以管理。许多企业已将其生产应用程序迁移到基于 Kubernetes 的基础设施上，如 Amazon EKS 和 OpenShift。


  从历史上看，在 Kubernetes 生态系统中，无法部署具有持久存储的 Pod，这些存储无法在某些 Pod 移动或硬件故障后保留，这使其不适合数据库部署。随着
  `PersistentVolumes`（持久卷）和 `StatefulSets`（有状态集）的引入，现在可以移动 Pod 而不会丢失数据或需要执行完整的初始同步。


  #### 操作符


  可以使用 `Kubernetes Operators`（Kubernetes 操作符）将 MongoDB 打包、部署和管理为 Kubernetes 原生应用程序，本质上充当一个自定义控制器。


  MongoDB 企业版许可证包含对 Kubernetes 操作符的访问权限，该操作符与 Ops/Cloud Manager 配合可以部署适当的 `Kubernetes
  Resource Containers`（Kubernetes 资源容器），然后在其上部署 `MongoDB Database Resources`（MongoDB
  数据库资源）。本质上，您可以在 Kubernetes 环境中正确自动化 MongoDB 副本集和分片集群。


  提示


  在 Pod 内部运行应用程序或微服务时，务必在连接字符串中设置 `appName`。此应用程序名称将出现在日志文件中，并且由于 Pod 重新分配时 IP 地址可能会更改，这个唯一的名称有助于将记录的问题追溯回生成它的应用程序。


  ### 工具


  `Infrastructure as code`（IaC，基础设施即代码）是通过机器可读的定义文件或脚本来管理和配置主机的过程，这些文件或脚本易于进行版本控制和测试。它是一种将容易出错的手动配置流程（如运行手册）封装到软件代码中的方法，使实际部署变得精简、可靠且无限可扩展。当今最常见的
  IaC 工具是 Terraform。


  `Continuous configuration automation`（CCA，持续配置自动化）工具可以被视为 IaC 框架的扩展，但也包括在托管主机之上
  `provisioning`（供应）和配置应用程序及服务。



  ### 配置管理


  我们将快速回顾一些最流行的配置管理与自动化工具：`Ansible`、`Puppet` 和 `Chef`。这三款工具都是开源的，应用非常广泛，拥有完善的文档和活跃的社区贡献，同时也提供可选的付费企业版支持。它们还可以与
  `Terraform` 等工具配合使用，在配置之前准备主机基础架构。


  其他值得注意的替代方案是 `SaltStack` 和 `Pulumi`。


  ### Ansible


  `Ansible`（首次发布于 2012 年，于 2015 年被 Red Hat, Inc.收购）是一个自动化平台，允许你以简单、可重复的方式部署和配置你的 `MongoDB`。它的范式是关于配置简单的规则，这些规则被分组到固定顺序的步骤和模板中，而不是用过程式语言编写脚本。


  它使用 `SSH` 从工作站连接到多台远程机器，无需在远程主机上安装任何特殊代理，仅需使用其自身的 `SSH` 密钥。


  `Ansible` 简单易上手，用户基础广泛，网上有大量示例。也容易将变更纳入源代码控制。然而，测试变更可能比较困难，并且在调试分组到 `playbook` 中的复杂任务时，可能需要多次运行。


  ### Puppet


  `Puppet`（首次发布于 2005 年）是模型驱动、静态检查的，并且是为系统管理员设计的。它遵循客户端-服务器（或代理-主控）架构。商业版本 `Puppet
  Enterprise` 可通过 `Puppet Labs` 获取。


  `Puppet` 主控服务器将目标机器的当前状态与机器级别的配置详情进行比较，然后向转换层发送指令以执行操作。一个代理会定期检查变更并触发更新。


  一个名为 `puppet/mongodb`^(⁶) 的模块（由 `Puppet Labs` 和开源社区维护）用于管理 `MongoDB` 进程的服务器安装和配置，以及
  `Ops Manager` 的设置。该模块功能先进且完备，包括一个 `mongodb_shard` 提供程序，允许定义分片及其成员。在撰写本文时，它支持 `RHEL/CentOS
  5/6/7`、`Ubuntu 10` 和 `12`，以及 `Debian 6` 和 `7`。


  `Puppet` 比其他一些管理工具（如 `Chef` 和 `Ansible`）稍微复杂一些，但它拥有大量可用于解决数据库管理相关问题的模块。


  ### Chef


  与 `Puppet` 类似，`Chef`（首次发布于 2009 年）会在对 `Chef` 节点进行更改之前，将主机资源与期望状态进行比较。与 `Ansible`
  不同，它需要在每个远程主机上安装 `Chef client`，该主机才能成为 `Chef node`。


  配置被写入 `Chef recipes`，这些 `recipes` 被分组为 `cookbooks` 以便于管理。一个名为 `SC-MongoDB Cookbook`^(⁷)
  的开源 `cookbook` 是 `Chef` 现有最先进的 `cookbook`，目前正处于积极开发中。


  ### 本地部署对比


  前面介绍的三种工具中的任何一种都可以用来准备依赖项并部署复杂的 `MongoDB` 部署。表 7-2 比较了一些关键差异，这可能有助于你根据自己的平台和基础架构偏好在它们之间做出选择。


  表 7-2

