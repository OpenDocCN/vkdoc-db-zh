- fmt: '### Alternative Date Formats


    The recommended format is the `ISO 8601` format, which is a standard that describes
    dates, times, and other related data. For dates, the format is `yyyy-mm-dd`, as
    you see in previous examples.


    The ISO 8601 format also allows you to omit the hyphens:


    ```sql

    SELECT *

    FROM customers

    WHERE dob=''19891109'';       --  Same as ''1989-11-09''

    ```


    However, this is harder to read, so it’s hard to justify. This won’t work in Oracle
    or in SQLite.


    Some DBMSs will allow you to use an alternative format:


    ```sql

    --  PostgreSQL, MSSQL, MySQL/MariaDB only:

    SELECT *

    FROM customers

    WHERE dob=''9 Nov 1989'';

    SELECT *

    FROM customers

    WHERE dob=''November 9, 1989'';

    ```


    However, don’t use the forward slash format `??/??/yyyy`, even if it’s available.
    This is because different countries differ in how to interpret the first two parts,
    with some countries interpreting it as `day/month` and some as `month/day`.


    ```sql

    --  PostgreSQL, MSSQL, MySQL/MariaDB only:

    SELECT *

    FROM customers

    WHERE dob=''9/11/1989'';  --  d/m or m/d ?

    ```


    For SQL:


    *   The DBMS may not agree with your interpretation.

    *   Other users may not be sure how you interpret the two parts.


    We recommend that you always use ISO 8601 format to write the date if possible.
    On the other hand, when displaying the date, it is probably better to use a more
    human-friendly format. You will see how to do this later.


    ### Date Comparisons


    Apart from two dates being the same, you can also make the same sort of comparisons
    as with numbers. However, it is probably better to reword their meanings as in
    Table 3-3.


    **Table 3-3** Reworded Comparison Operators


    | Operator | Meaning |

    | --- | --- |

    | `a = b` | Equal Value |

    | `a < b` | a is **Before** b |

    | `a <= b` | a is **Up To** b |

    | `a > b` | a is **After** b |

    | `a >= b` | as is **From** b |


    Of course, the actual words don’t matter; they are simply more meaningful.


    For example:


    ```sql

    --  Born BEFORE 1 Jan 1980

    SELECT *

    FROM customers

    WHERE dob<''1980-01-01'';

    ```


    You’ll get the older customers:


    | id | familyname | givenname | … | dob | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 474 | Free | Judy | … | 1978-04-01 | … | 2022-06-12 |

    | 523 | Sights | Seymour | … | 1965-01-06 | … | 2022-07-11 |

    | 341 | Idate | Val | … | 1976-06-04 | … | 2022-03-03 |

    | 351 | Tate | Dick | … | 1969-08-03 | … | 2022-03-13 |

    | 121 | Ting | Lil | … | 1964-09-17 | … | 2021-10-06 |

    | 545 | Knife | Jack | … | 1962-09-24 | … | 2022-07-24 |

    | ~ 96 rows ~ |


    ```sql

    --  Born FROM 1 Jan 1980

    SELECT *

    FROM customers

    WHERE dob>=''1980-01-01'';

    ```


    Those who are not older:


    | id | familyname | givenname | … | dob | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 475 | Blood | Drew | … | 1989-12-06 | … | 2022-06-13 |

    | 588 | Skies | Grace | … | 1999-06-28 | … | 2022-08-13 |

    | 422 | Why | Wanda | … | 1999-07-15 | … | 2022-05-05 |

    | 326 | Todeath | Boris | … | 1992-06-16 | … | 2022-02-15 |

    | 191 | Moss | Pete | … | 1995-09-27 | … | 2021-11-19 |

    | 234 | Ering | Nat | … | 1996-02-05 | … | 2021-12-15 |

    | ~ 139 rows ~ |


    As always, `NULL` dates will be omitted from the results: if you don’t know the
    date of birth, you can’t claim that they were born before or from a particular
    date.


    You can also use `BETWEEN`:


    ```sql

    --  Born in the 1980s

    SELECT *

    FROM customers

    WHERE dob BETWEEN ''1980-01-01'' AND ''1989-12-31'';

    ```


    The children of the 1980s:


    | id | familyname | givenname | … | dob | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 475 | Blood | Drew | … | 1989-12-06 | … | 2022-06-13 |

    | 492 | Long | Miles | … | 1989-11-18 | … | 2022-06-21 |

    | 468 | Fer | Connie | … | 1985-09-22 | … | 2022-06-09 |

    | 86 | Byrd | Dicky | … | 1980-06-02 | … | 2021-09-09 |

    | 75 | Tone | Barry | … | 1989-07-18 | … | 2021-09-01 |

    | 306 | Noir | Bette | … | 1987-08-27 | … | 2022-01-28 |

    | ~ 59 rows ~ |


    If you want the others:


    ```sql

    --  Born some other time

    SELECT *

    FROM customers

    WHERE dob NOT BETWEEN ''1980-01-01'' AND ''1989-12-31'';

    ```


    You get the following:


    | id | familyname | givenname | … | dob | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 474 | Free | Judy | … | 1978-04-01 | … | 2022-06-12 |

    | 523 | Sights | Seymour | … | 1965-01-06 | … | 2022-07-11 |

    | 341 | Idate | Val | … | 1976-06-04 | … | 2022-03-03 |

    | 351 | Tate | Dick | … | 1969-08-03 | … | 2022-03-13 |

    | 588 | Skies | Grace | … | 1999-06-28 | … | 2022-08-13 |

    | 422 | Why | Wanda | … | 1999-07-15 | … | 2022-05-05 |

    | ~ 176 rows ~ |


    Note that `BETWEEN` is inclusive: the first and last dates of the range are also
    a match.


    Also note that in all cases, the `NULL` dates of birth are omitted.


    ### Filtering with a Date Calculation


    As with strings, you can use a date calculation to filter your results. For example,
    to find customers over 40 years old (whose date of birth is before 40 years ago):


    ```sql

    --  PostgreSQL, Oracle, MySQL/MariaDB

    SELECT * FROM customers

    WHERE dob<current_timestamp -   INTERVAL ''40'' YEAR;

    --  MSSQL

    SELECT * FROM customers

    WHERE dob<dateadd(year,-40,current_timestamp);

    --  SQLite

    SELECT * FROM customers

    WHERE dob<date(''now'',''-40 year'');

    ```


    This gives customers over 40:


    | id | familyname | givenname | … | dob | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 474 | Free | Judy | … | 1978-04-01 | … | 2022-06-12 |

    | 523 | Sights | Seymour | … | 1965-01-06 | … | 2022-07-11 |

    | 341 | Idate | Val | … | 1976-06-04 | … | 2022-03-03 |

    | 351 | Tate | Dick | … | 1969-08-03 | … | 2022-03-13 |

    | 121 | Ting | Lil | … | 1964-09-17 | … | 2021-10-06 |

    | 545 | Knife | Jack | … | 1962-09-24 | … | 2022-07-24 |

    | ~ 111 rows ~ |


    You’ll see more on date calculations later.


    ### Multiple Assertions


    The `BETWEEN` operation earlier can also be written as:


    ```sql

    --  Born in the 1980s

    SELECT *

    FROM customers

    WHERE dob>=''1980-01-01'' AND dob<=''1989-12-31'';

    ```


    There are now two assertions: `dob >= ''1980-01-01''` and `dob <= ''1989-12-31''`,
    both of which must be true.


    This will give the same results, and it’s likely that, on the inside, SQL has
    performed the same operation. Sometimes, SQL will work out what you mean and find
    its own way of doing it.'
