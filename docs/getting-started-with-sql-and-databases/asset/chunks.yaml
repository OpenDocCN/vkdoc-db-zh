    ```

    --  Born BEFORE 1 Jan 1980

    SELECT *

    FROM customers

    WHERE dob<''1980-01-01'';

    ```


    You’ll get the older customers:


    | id | familyname | givenname | … | dob | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 474 | Free | Judy | … | 1978-04-01 | … | 2022-06-12 |

    | 523 | Sights | Seymour | … | 1965-01-06 | … | 2022-07-11 |

    | 341 | Idate | Val | … | 1976-06-04 | … | 2022-03-03 |

    | 351 | Tate | Dick | … | 1969-08-03 | … | 2022-03-13 |

    | 121 | Ting | Lil | … | 1964-09-17 | … | 2021-10-06 |

    | 545 | Knife | Jack | … | 1962-09-24 | … | 2022-07-24 |

    | ~ 96 rows ~ |


    ```

    --  Born FROM 1 Jan 1980

    SELECT *

    FROM customers

    WHERE dob>=''1980-01-01'';

    ```


    Those who are not older:


    | id | familyname | givenname | … | dob | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 475 | Blood | Drew | … | 1989-12-06 | … | 2022-06-13 |

    | 588 | Skies | Grace | … | 1999-06-28 | … | 2022-08-13 |

    | 422 | Why | Wanda | … | 1999-07-15 | … | 2022-05-05 |

    | 326 | Todeath | Boris | … | 1992-06-16 | … | 2022-02-15 |

    | 191 | Moss | Pete | … | 1995-09-27 | … | 2021-11-19 |

    | 234 | Ering | Nat | … | 1996-02-05 | … | 2021-12-15 |

    | ~ 139 rows ~ |


    As always, NULLs will be omitted from the results: if you don’t know the date
    of birth, you can’t claim that they were born before or from a particular date.


    You can also use `BETWEEN`:


    ```

    --  Born in the 1980s

    SELECT *

    FROM customers

    WHERE dob BETWEEN ''1980-01-01'' AND ''1989-12-31'';

    ```


    The children of the 1980s:


    | id | familyname | givenname | … | dob | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 475 | Blood | Drew | … | 1989-12-06 | … | 2022-06-13 |

    | 492 | Long | Miles | … | 1989-11-18 | … | 2022-06-21 |

    | 468 | Fer | Connie | … | 1985-09-22 | … | 2022-06-09 |

    | 86 | Byrd | Dicky | … | 1980-06-02 | … | 2021-09-09 |

    | 75 | Tone | Barry | … | 1989-07-18 | … | 2021-09-01 |

    | 306 | Noir | Bette | … | 1987-08-27 | … | 2022-01-28 |

    | ~ 59 rows ~ |


    If you want the others:


    ```

    --  Born some other time

    SELECT *

    FROM customers

    WHERE dob NOT BETWEEN ''1980-01-01'' AND ''1989-12-31'';

    ```


    You get the following:


    | id | familyname | givenname | … | dob | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 474 | Free | Judy | … | 1978-04-01 | … | 2022-06-12 |

    | 523 | Sights | Seymour | … | 1965-01-06 | … | 2022-07-11 |

    | 341 | Idate | Val | … | 1976-06-04 | … | 2022-03-03 |

    | 351 | Tate | Dick | … | 1969-08-03 | … | 2022-03-13 |

    | 588 | Skies | Grace | … | 1999-06-28 | … | 2022-08-13 |

    | 422 | Why | Wanda | … | 1999-07-15 | … | 2022-05-05 |

    | ~ 176 rows ~ |


    Note that `BETWEEN` is *inclusive*: the first and last dates of the range are
    also a match.


    Also note that in all cases, the `NULL` dates of birth are omitted.


    ### Filtering with a Date Calculation


    As with strings, you can use a date calculation to filter your results. For example,
    to find customers over 40 years old (whose date of birth is before 40 years ago):


    ```

    --  PostgreSQL, Oracle, MySQL/MariaDB

    SELECT * FROM customers

    WHERE dob<current_timestamp -   INTERVAL ''40'' YEAR;

    --  MSSQL

    SELECT * FROM customers

    WHERE dob<dateadd(year,-40,current_timestamp);

    --  SQLite

    SELECT * FROM customers

    WHERE dob<date(''now'',''-40 year'');

    ```


    This gives customers over 40:


    | id | familyname | givenname | … | dob | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 474 | Free | Judy | … | 1978-04-01 | … | 2022-06-12 |

    | 523 | Sights | Seymour | … | 1965-01-06 | … | 2022-07-11 |

    | 341 | Idate | Val | … | 1976-06-04 | … | 2022-03-03 |

    | 351 | Tate | Dick | … | 1969-08-03 | … | 2022-03-13 |

    | 121 | Ting | Lil | … | 1964-09-17 | … | 2021-10-06 |

    | 545 | Knife | Jack | … | 1962-09-24 | … | 2022-07-24 |

    | ~ 111 rows ~ |


    You’ll see more on date calculations later.


    ## Multiple Assertions


    The `BETWEEN` operation earlier can also be written as


    ```

    --  Born in the 1980s

    SELECT *

    FROM customers

    WHERE dob>=''1980-01-01'' AND dob<=''1989-12-31'';

    ```


    There are now two assertions: `dob >= ''1980-01-01''` and `dob <= ''1989-12-31''`,
    *both* of which must be true.


    This will give the same results, and it’s likely that, on the inside, SQL has
    performed the same operation. Sometimes, SQL will work out what you mean and find
    its own way of doing it.'
  trans: '### 替代日期格式


    推荐的格式是 `ISO 8601` 格式，这是一个描述日期、时间和其他相关数据的标准。对于日期，格式为 `yyyy-mm-dd`，正如你在之前的示例中所见。


    ISO 8601 格式也允许你省略连字符：


    ```sql

    SELECT *

    FROM customers

    WHERE dob=''19891109'';       --  等同于 ''1989-11-09''

    ```


    然而，这样更难阅读，因此很难让人接受。这种格式在 Oracle 或 SQLite 中无效。


    某些数据库管理系统允许你使用替代格式：


    ```sql

    --  仅限 PostgreSQL, MSSQL, MySQL/MariaDB:

    SELECT *

    FROM customers

    WHERE dob=''9 Nov 1989'';

    SELECT *

    FROM customers

    WHERE dob=''November 9, 1989'';

    ```


    但是，即使可用，也不要使用斜杠格式 `??/??/yyyy`。这是因为不同国家对前两部分的解读方式不同，有些国家解读为 `日/月`，有些则解读为 `月/日`。


    ```sql

    --  仅限 PostgreSQL, MSSQL, MySQL/MariaDB:

    SELECT *

    FROM customers

    WHERE dob=''9/11/1989'';  --  d/m 还是 m/d？

    ```


    对于 SQL：


    *   数据库管理系统可能不认同你的解读方式。

    *   其他用户可能不确定你如何解读这两个部分。


    我们建议你在可能的情况下始终使用 ISO 8601 格式来书写日期。另一方面，在显示日期时，使用更人性化的格式可能更好。稍后你将看到如何做到这一点。


    ### 日期比较


    除了两个日期相同之外，你还可以进行与数字类似的比较。不过，最好像表 3-3 那样重新表述它们的含义。


    **表 3-3** 重新表述的比较运算符


    | 运算符 | 含义 |

    | --- | --- |

    | `a = b` | 值相等 |

    | `a < b` | a **在** b **之前** |

    | `a <= b` | a **截至** b |

    | `a > b` | a **在** b **之后** |

    | `a >= b` | a **自** b **起** |


    当然，实际使用的词并不重要；它们只是更具意义。


    例如：


    ```sql

    --  出生日期在 1980 年 1 月 1 日 之前

    SELECT *

    FROM customers

    WHERE dob<''1980-01-01'';

    ```


    你将获得较年长的客户：


    | id | familyname | givenname | … | dob | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 474 | Free | Judy | … | 1978-04-01 | … | 2022-06-12 |

    | 523 | Sights | Seymour | … | 1965-01-06 | … | 2022-07-11 |

    | 341 | Idate | Val | … | 1976-06-04 | … | 2022-03-03 |

    | 351 | Tate | Dick | … | 1969-08-03 | … | 2022-03-13 |

    | 121 | Ting | Lil | … | 1964-09-17 | … | 2021-10-06 |

    | 545 | Knife | Jack | … | 1962-09-24 | … | 2022-07-24 |

    | ~ 96 行 ~ |


    ```sql

    --  出生日期在 1980 年 1 月 1 日 起

    SELECT *

    FROM customers

    WHERE dob>=''1980-01-01'';

    ```


    那些不那么年长的：


    | id | familyname | givenname | … | dob | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 475 | Blood | Drew | … | 1989-12-06 | … | 2022-06-13 |

    | 588 | Skies | Grace | … | 1999-06-28 | … | 2022-08-13 |

    | 422 | Why | Wanda | … | 1999-07-15 | … | 2022-05-05 |

    | 326 | Todeath | Boris | … | 1992-06-16 | … | 2022-02-15 |

    | 191 | Moss | Pete | … | 1995-09-27 | … | 2021-11-19 |

    | 234 | Ering | Nat | … | 1996-02-05 | … | 2021-12-15 |

    | ~ 139 行 ~ |


    和往常一样，`NULL` 日期将从结果中省略：如果你不知道出生日期，就无法声称他们出生在某个特定日期之前或之后。


    你也可以使用 `BETWEEN`：


    ```sql

    --  出生在 1980 年代

    SELECT *

    FROM customers

    WHERE dob BETWEEN ''1980-01-01'' AND ''1989-12-31'';

    ```


    1980 年代出生的孩子们：


    | id | familyname | givenname | … | dob | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 475 | Blood | Drew | … | 1989-12-06 | … | 2022-06-13 |

    | 492 | Long | Miles | … | 1989-11-18 | … | 2022-06-21 |

    | 468 | Fer | Connie | … | 1985-09-22 | … | 2022-06-09 |

    | 86 | Byrd | Dicky | … | 1980-06-02 | … | 2021-09-09 |

    | 75 | Tone | Barry | … | 1989-07-18 | … | 2021-09-01 |

    | 306 | Noir | Bette | … | 1987-08-27 | … | 2022-01-28 |

    | ~ 59 行 ~`


    如果你想获取其他时间段的：


    ```sql

    --  出生在其他时间

    SELECT *

    FROM customers

    WHERE dob NOT BETWEEN ''1980-01-01'' AND ''1989-12-31'';

    ```


    你会得到：


    | id | familyname | givenname | … | dob | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 474 | Free | Judy | … | 1978-04-01 | … | 2022-06-12 |

    | 523 | Sights | Seymour | … | 1965-01-06 | … | 2022-07-11 |

    | 341 | Idate | Val | … | 1976-06-04 | … | 2022-03-03 |

    | 351 | Tate | Dick | … | 1969-08-03 | … | 2022-03-13 |

    | 588 | Skies | Grace | … | 1999-06-28 | … | 2022-08-13 |

    | 422 | Why | Wanda | … | 1999-07-15 | … | 2022-05-05 |

    | ~ 176 行 ~ |


    注意 `BETWEEN` 是包含性的：范围的起始和结束日期也匹配。


    还要注意，在所有情况下，`NULL` 出生日期都会被省略。


    ### 使用日期计算进行过滤


    与字符串类似，你可以使用日期计算来过滤结果。例如，要查找年龄超过 40 岁的客户（其出生日期在 40 年前之前）：


    ```sql

    --  PostgreSQL, Oracle, MySQL/MariaDB

    SELECT * FROM customers

    WHERE dob<current_timestamp -   INTERVAL ''40'' YEAR;

    --  MSSQL

    SELECT * FROM customers

    WHERE dob<dateadd(year,-40,current_timestamp);

    --  SQLite

    SELECT * FROM customers

    WHERE dob<date(''now'',''-40 year'');

    ```


    这会给出年龄超过 40 岁的客户：


    | id | familyname | givenname | … | dob | … | registered |

    | --- | --- | --- | --- | --- | --- | --- |

    | 474 | Free | Judy | … | 1978-04-01 | … | 2022-06-12 |

    | 523 | Sights | Seymour | … | 1965-01-06 | … | 2022-07-11 |

    | 341 | Idate | Val | … | 1976-06-04 | … | 2022-03-03 |

    | 351 | Tate | Dick | … | 1969-08-03 | … | 2022-03-13 |

    | 121 | Ting | Lil | … | 1964-09-17 | … | 2021-10-06 |

    | 545 | Knife | Jack | … | 1962-09-24 | … | 2022-07-24 |

    | ~ 111 行 ~`


    稍后你会了解更多关于日期计算的内容。


    ### 多重断言


    之前的 `BETWEEN` 操作也可以写成：


    ```sql

    --  出生在 1980 年代

    SELECT *

    FROM customers

    WHERE dob>=''1980-01-01'' AND dob<=''1989-12-31'';

    ```


    现在有两个断言：`dob >= ''1980-01-01''` 和 `dob <= ''1989-12-31''`，两者都必须为真。


    这将给出相同的结果，并且很可能在内部，SQL 执行了相同的操作。有时，SQL 会理解你的意思并找到自己的执行方式。'
- fmt: '### AND and OR


    `AND` 操作符通常被称为逻辑操作符，并遵循数学逻辑的规则。


    使用 `AND` 操作符，你还可以实现 `BETWEEN` 的变体：


    ```sql

    --  Inclusive Range (same as BETWEEN)

    SELECT *

    FROM artists

    WHERE born>=1700 AND born<=1799;

    ```


    所有这些查询应该给出相同的结果：


    | id | familyname | givenname | aka | born | died | nationality |

    | --- | --- | --- | --- | --- | --- | --- |

    | 133 | Constable | John | constable | 1776 | 1837 | English |

    | 158 | Shaw | Joshua | shaw | 1776 | 1860 | American |

    | 78 | Turner | Joseph Mallord William | turner | 1775 | 1851 | English |

    | 298 | Hiroshige | Ando | hiroshige | 1797 | 1858 | Japanese |

    | 356 | Gros | Antoine-Jean | gros | 1771 | 1835 | French |

    | 208 | Feke | Robert | feke | 1705 | 1752 | American |

    | ~ 25 rows ~ |


    注意，由于出生年份是离散值，你可以选择如何表达范围。


    `AND` 操作符可以用来组合两个以上的断言。例如：


    ```sql

    SELECT *

    FROM customers

    WHERE state=''VIC'' AND height>170 AND dob<''1980-01-01'';

    ```


    这会得到一个非常有限的组：


    | id | familyname | givenname | state | height | dob |

    | --- | --- | --- | --- | --- | --- |

    | 505 | Singers | Carol | VIC | 170.1 | 1969-07-24 |

    | 406 | Shoes | Jim | VIC | 173.5 | 1970-12-10 |

    | 59 | Field | Lily | VIC | 172.1 | 1972-01-17 |

    | 537 | Rise | Theo | VIC | 176.9 | 1977-10-27 |

    | 300 | Bee | Bill | VIC | 171.3 | 1975-12-21 |

    | 380 | Downe | Bob | VIC | 178.1 | 1976-02-24 |

    | ~ 8 rows ~ |


    在这种情况下，*所有*断言都必须为真。请注意，这里的三个断言彼此独立，不像前面测试同一个值的例子。


    你也可以用 `OR` 操作符组合断言：


    ```sql

    SELECT *

    FROM customers

    WHERE state=''VIC'' OR state=''QLD'';

    ```


    这里，我们得到了来自这两个合并州的客户：


    | id | familyname | givenname | state |

    | --- | --- | --- | --- |

    | 186 | Gunn | Ray | VIC |

    | 475 | Blood | Drew | QLD |

    | 523 | Sights | Seymour | VIC |

    | 588 | Skies | Grace | QLD |

    | 305 | Net | Clara | QLD |

    | 121 | Ting | Lil | QLD |

    | ~ 104 rows ~ |


    `OR` 操作符要求*至少*有一个断言为真。


    与英语不同，`OR` 有效地组合了集合。在英语中，你*可能*说客户来自 `VIC` *和* `QLD`，但我们通常理解为不是同时来自两地。在逻辑中，我们需要说
    `OR`。


    同样，与英语不同，逻辑 `OR` 总是**包含性**的：一个或多个断言必须为真。`OR` 操作失败的唯一情况是所有断言都为假。在英语中，“or”有时是**排他性**的（如“茶或咖啡”）；在逻辑中，情况并非如此。


    当两个断言独立时，你会更清楚地看到这一点。例如：


    ```sql

    --  ALL must be true:

    SELECT *

    FROM customers

    WHERE state=''QLD'' AND dob<''1980-01-01'';

    ```


    这会得到一个有限的组：


    | id | familyname | givenname | state | dob |

    | --- | --- | --- | --- | --- |

    | 121 | Ting | Lil | QLD | 1964-09-17 |

    | 377 | Money | Xavier | QLD | 1969-07-14 |

    | 266 | Blind | Rob | QLD | 1965-12-23 |

    | 524 | Syrup | Mabel | QLD | 1978-03-09 |

    | 28 | Aphone | Meg | QLD | 1963-01-20 |

    | 201 | Soar | Dinah | QLD | 1971-06-09 |

    | ~ 16 rows ~ |


    将 `AND` 改为 `OR`：


    ```sql

    --  ANY (or ALL) must be true:

    SELECT *

    FROM customers

    WHERE state=''QLD'' OR dob<''1980-01-01'';

    ```


    这会得到一个更混合的组：


    | id | familyname | givenname | state | dob |

    | --- | --- | --- | --- | --- |

    | 474 | Free | Judy | NSW | 1978-04-01 |

    | 475 | Blood | Drew | QLD | 1989-12-06 |

    | 523 | Sights | Seymour | VIC | 1965-01-06 |

    | 341 | Idate | Val | NSW | 1976-06-04 |

    | 351 | Tate | Dick | NSW | 1969-08-03 |

    | 588 | Skies | Grace | QLD | 1999-06-28 |

    | ~ 132 rows ~ |


    注意

    *   `OR` 比 `AND` 更宽松。

    *   `OR` 包含了 `AND` 的所有结果。


    你可以将 `AND` 视为更多的过滤，将 `OR` 视为组合结果。如果你熟悉数学集合，`AND` 是多个集合的**交集**（共同部分），而 `OR` 是多个集合的**并集**（全部组合）。


    如果将 `AND` 与 `OR` 混合，事情会变得有点复杂：


    ```sql

    --  Operator Precedence

    SELECT *

    FROM customers

    WHERE state=''QLD'' OR state=''VIC'' AND dob<''1980-01-01'';

    ```


    结果可能不符合你的预期，无论你预期什么：


    | id | familyname | givenname | state | dob |

    | --- | --- | --- | --- | --- |

    | 475 | Blood | Drew | QLD | 1989-12-06 |

    | 523 | Sights | Seymour | VIC | 1965-01-06 |

    | 588 | Skies | Grace | QLD | 1999-06-28 |

    | 305 | Net | Clara | QLD |   |

    | 121 | Ting | Lil | QLD | 1964-09-17 |

    | 545 | Knife | Jack | VIC | 1962-09-24 |

    | ~ 70 rows ~ |


    在算术表达式 `1 + 2 * 3` 中，你知道乘法在加法之前执行。也就是说，乘法优先于加法。


    类似地，在逻辑表达式 `AssertionA OR AssertionB AND AssertionC` 中，`AND` 优先于 `OR`。这意味着前一条语句的结果等同于


    ```sql

    --  Same as: state=''QLD'' OR state=''VIC'' AND dob<''1980-01-01''

    SELECT *

    FROM customers

    WHERE state=''QLD'' OR (state=''VIC'' AND dob<''1980-01-01'');

    ```


    用英语说，意思是组合*一个州的全部*和*另一个州的年长者*。


    如果你本意是让出生日期断言同时应用于两个州，你需要使用括号来改变优先级：


    ```sql

    --  Change Precedence

    SELECT *

    FROM customers

    WHERE (state=''QLD'' OR state=''VIC'') AND dob<''1980-01-01'';

    ```


    现在你将得到来自这两个州的年长客户。


    | id | familyname | givenname | email | … | registered |

    | --- | --- | --- | --- | --- | --- |

    | 523 | Sights | Seymour | seymour.sights523@example.net | … | 2022-07-11 |

    | 121 | Ting | Lil | lil.ting121@example.com | … | 2021-10-06 |

    | 545 | Knife | Jack | jack.knife545@example.com | … | 2022-07-24 |

    | 505 | Singers | Carol | carol.singers505@example.net | … | 2022-06-29 |

    | 377 | Money | Xavier | xavier.money377@example.net | … | 2022-04-02 |

    | 266 | Blind | Rob | rob.blind266@example.net | … | 2022-01-01 |

    | ~ 34 rows ~ |


    一些开发者倾向于无论是否需要，总是包含括号，以使观点更清晰。无论哪种方式，请记住 SQL 有明确定义的解释混合逻辑操作符的方式。'
  raw: '### AND and OR


    The `AND` operator is often called a **logical** operator and uses the rules of
    mathematical logic.


    Using the `AND` operator, you can also implement variations of `BETWEEN`:


    ```

    --  Inclusive Range (same as BETWEEN)

    SELECT *

    FROM artists

    WHERE born>=1700 AND born1699 AND born1699 AND born<=1799;

    ```


    All of these should give the same results:


    | id | familyname | givenname | aka | born | died | nationality |

    | --- | --- | --- | --- | --- | --- | --- |

    | 133 | Constable | John | constable | 1776 | 1837 | English |

    | 158 | Shaw | Joshua | shaw | 1776 | 1860 | American |

    | 78 | Turner | Joseph Mallord William | turner | 1775 | 1851 | English |

    | 298 | Hiroshige | Ando | hiroshige | 1797 | 1858 | Japanese |

    | 356 | Gros | Antoine-Jean | gros | 1771 | 1835 | French |

    | 208 | Feke | Robert | feke | 1705 | 1752 | American |

    | ~ 25 rows ~ |


    Note that since the year of birth is discrete, you have a choice of how you express
    the range.


    The `AND` operator can be used to combine more than two assertions. For example:


    ```

    SELECT *

    FROM customers

    WHERE state=''VIC'' AND height>170 AND dob<''1980-01-01'';

    ```


    This gives you a very limited group:


    | id | familyname | givenname | state | height | dob |

    | --- | --- | --- | --- | --- | --- |

    | 505 | Singers | Carol | VIC | 170.1 | 1969-07-24 |

    | 406 | Shoes | Jim | VIC | 173.5 | 1970-12-10 |

    | 59 | Field | Lily | VIC | 172.1 | 1972-01-17 |

    | 537 | Rise | Theo | VIC | 176.9 | 1977-10-27 |

    | 300 | Bee | Bill | VIC | 171.3 | 1975-12-21 |

    | 380 | Downe | Bob | VIC | 178.1 | 1976-02-24 |

    | ~ 8 rows ~ |


    In this case, *all* of the assertions must be true. Note that here the three assertions
    are independent of each other, unlike the previous examples where they are testing
    the same value.


    You can also combine assertions with the `OR` operator:


    ```

    SELECT *

    FROM customers

    WHERE state=''VIC'' OR state=''QLD'';

    ```


    Here, we have customers from the combined states:


    | id | familyname | givenname | state |

    | --- | --- | --- | --- |

    | 186 | Gunn | Ray | VIC |

    | 475 | Blood | Drew | QLD |

    | 523 | Sights | Seymour | VIC |

    | 588 | Skies | Grace | QLD |

    | 305 | Net | Clara | QLD |

    | 121 | Ting | Lil | QLD |

    | ~ 104 rows ~ |


    The `OR` operator requires *at least* one of the assertions to be true.


    Unlike English, `OR` effectively combines groups. In English, you *might* say
    the customers are from `VIC` *and* `QLD`, but we take that to mean not at the
    same time. In logic, we need to say `OR`.


    Also, unlike English, the logical `OR` is always **inclusive**: one or more assertions
    must be true. The only way to fail the `OR` operation is for everything to be
    false. In English, “or” is sometimes **exclusive** (such as “Tea or Coffee”);
    in logic, this is not the case.


    You will see this point more clearly where the two assertions are independent.
    For example:


    ```

    --  ALL must be true:

    SELECT *

    FROM customers

    WHERE state=''QLD'' AND dob<''1980-01-01'';

    ```


    This gives a limited group:


    | id | familyname | givenname | state | dob |

    | --- | --- | --- | --- | --- |

    | 121 | Ting | Lil | QLD | 1964-09-17 |

    | 377 | Money | Xavier | QLD | 1969-07-14 |

    | 266 | Blind | Rob | QLD | 1965-12-23 |

    | 524 | Syrup | Mabel | QLD | 1978-03-09 |

    | 28 | Aphone | Meg | QLD | 1963-01-20 |

    | 201 | Soar | Dinah | QLD | 1971-06-09 |

    | ~ 16 rows ~ |


    Changing `AND` to `OR`:


    ```

    --  ANY (or ALL) must be true:

    SELECT *

    FROM customers

    WHERE state=''QLD'' OR dob<''1980-01-01'';

    ```


    This gives you a more mixed group:


    | id | familyname | givenname | state | dob |

    | --- | --- | --- | --- | --- |

    | 474 | Free | Judy | NSW | 1978-04-01 |

    | 475 | Blood | Drew | QLD | 1989-12-06 |

    | 523 | Sights | Seymour | VIC | 1965-01-06 |

    | 341 | Idate | Val | NSW | 1976-06-04 |

    | 351 | Tate | Dick | NSW | 1969-08-03 |

    | 588 | Skies | Grace | QLD | 1999-06-28 |

    | ~ 132 rows ~ |


    Note


    *   `OR` is more generous than `AND`.


    *   `OR` includes all the results from `AND`.


    You can think of `AND` as more filtering and `OR` as combining results. If you’re
    familiar with mathematical sets, `AND` is the **intersection** of multiple sets
    (the ones in common), and `OR` is the **union** of multiple sets (all of them
    combined).


    Things get a little complicated if you mix `AND` with `OR`:


    ```

    --  Operator Precedence

    SELECT *

    FROM customers

    WHERE state=''QLD'' OR state=''VIC'' AND dob<''1980-01-01'';

    ```


    The results may not match your expectations, depending on what you were expecting:


    | id | familyname | givenname | state | dob |

    | --- | --- | --- | --- | --- |

    | 475 | Blood | Drew | QLD | 1989-12-06 |

    | 523 | Sights | Seymour | VIC | 1965-01-06 |

    | 588 | Skies | Grace | QLD | 1999-06-28 |

    | 305 | Net | Clara | QLD |   |

    | 121 | Ting | Lil | QLD | 1964-09-17 |

    | 545 | Knife | Jack | VIC | 1962-09-24 |

    | ~ 70 rows ~ |


    In the arithmetic expression `1 + 2 × 3`, you know that you multiply before you
    add. That is, multiplication takes precedence over addition.


    Similarly, in the logical expression `AssertionA OR AssertionB AND AssertionC`,
    `AND` takes precedence over `OR`. The upshot of this is that the result of the
    preceding statement is the same as


    ```

    --  Same as: state=''QLD'' OR state=''VIC'' AND dob<''1980-01-01''

    SELECT *

    FROM customers

    WHERE state=''QLD'' OR (state=''VIC'' AND dob<''1980-01-01'');

    ```


    In English, it means combine *all* of one state with the older ones of another.


    If you really meant to apply the date of birth assertion to both states, you will
    need to change the precedence using parentheses:


    ```

    --  Change Precedence

    SELECT *

    FROM customers

    WHERE (state=''QLD'' OR state=''VIC'') AND dob<''1980-01-01'';

    ```


    Now you will get the older customers from both states.


    | id | familyname | givenname | email | … | registered |

    | --- | --- | --- | --- | --- | --- |

    | 523 | Sights | Seymour | seymour.sights523@example.net | … | 2022-07-11 |

    | 121 | Ting | Lil | lil.ting121@example.com | … | 2021-10-06 |

    | 545 | Knife | Jack | jack.knife545@example.com | … | 2022-07-24 |

    | 505 | Singers | Carol | carol.singers505@example.net | … | 2022-06-29 |

    | 377 | Money | Xavier | xavier.money377@example.net | … | 2022-04-02 |

    | 266 | Blind | Rob | rob.blind266@example.net | … | 2022-01-01 |

    | ~ 34 rows ~ |


    Some developers prefer always to include parentheses whether they need to or not
    to make the point clearer. Either way, remember that SQL has a clearly defined
    way of interpreting mixed logical operators.'
  trans: '

    ### AND 与 OR


    `AND` 操作符通常被称为逻辑操作符，并遵循数学逻辑的规则。


    使用 `AND` 操作符，你还可以实现 `BETWEEN` 的变体：


    ```sql

    --  包含性范围（与 BETWEEN 相同）

    SELECT *

    FROM artists

    WHERE born>=1700 AND born<=1799;

    ```


    所有这些查询应该给出相同的结果：


    | id | 姓氏 | 名字 | 别名 | 出生年份 | 去世年份 | 国籍 |

    | --- | --- | --- | --- | --- | --- | --- |

    | 133 | Constable | John | constable | 1776 | 1837 | English |

    | 158 | Shaw | Joshua | shaw | 1776 | 1860 | American |

    | 78 | Turner | Joseph Mallord William | turner | 1775 | 1851 | English |

    | 298 | Hiroshige | Ando | hiroshige | 1797 | 1858 | Japanese |

    | 356 | Gros | Antoine-Jean | gros | 1771 | 1835 | French |

    | 208 | Feke | Robert | feke | 1705 | 1752 | American |

    | ~ 25 行 ~ |


    注意，由于出生年份是离散值，你可以选择如何表达范围。


    `AND` 操作符可以用来组合两个以上的断言。例如：


    ```sql

    SELECT *

    FROM customers

    WHERE state=''VIC'' AND height>170 AND dob<''1980-01-01'';

    ```


    这会得到一个非常有限的组：


    | id | 姓氏 | 名字 | 州 | 身高 | 出生日期 |

    | --- | --- | --- | --- | --- | --- |

    | 505 | Singers | Carol | VIC | 170.1 | 1969-07-24 |

    | 406 | Shoes | Jim | VIC | 173.5 | 1970-12-10 |

    | 59 | Field | Lily | VIC | 172.1 | 1972-01-17 |

    | 537 | Rise | Theo | VIC | 176.9 | 1977-10-27 |

    | 300 | Bee | Bill | VIC | 171.3 | 1975-12-21 |

    | 380 | Downe | Bob | VIC | 178.1 | 1976-02-24 |

    | ~ 8 行 ~ |


    在这种情况下，*所有*断言都必须为真。请注意，这里的三个断言彼此独立，不像前面测试同一个值的例子。


    你也可以用 `OR` 操作符组合断言：


    ```sql

    SELECT *

    FROM customers

    WHERE state=''VIC'' OR state=''QLD'';

    ```


    这里，我们得到了来自这两个合并州的客户：


    | id | 姓氏 | 名字 | 州 |

    | --- | --- | --- | --- |

    | 186 | Gunn | Ray | VIC |

    | 475 | Blood | Drew | QLD |

    | 523 | Sights | Seymour | VIC |

    | 588 | Skies | Grace | QLD |

    | 305 | Net | Clara | QLD |

    | 121 | Ting | Lil | QLD |

    | ~ 104 行 ~ |


    `OR` 操作符要求*至少*有一个断言为真。


    与英语不同，`OR` 有效地组合了集合。在英语中，你*可能*说客户来自 `VIC` *和* `QLD`，但我们通常理解为不是同时来自两地。在逻辑中，我们需要说
    `OR`。


    同样，与英语不同，逻辑 `OR` 总是**包含性**的：一个或多个断言必须为真。`OR` 操作失败的唯一情况是所有断言都为假。在英语中，“or”有时是**排他性**的（如“茶或咖啡”）；在逻辑中，情况并非如此。


    当两个断言独立时，你会更清楚地看到这一点。例如：


    ```sql

    --  所有条件都必须为真：

    SELECT *

    FROM customers

    WHERE state=''QLD'' AND dob<''1980-01-01'';

    ```


    这会得到一个有限的组：


    | id | 姓氏 | 名字 | 州 | 出生日期 |

    | --- | --- | --- | --- | --- |

    | 121 | Ting | Lil | QLD | 1964-09-17 |

    | 377 | Money | Xavier | QLD | 1969-07-14 |

    | 266 | Blind | Rob | QLD | 1965-12-23 |

    | 524 | Syrup | Mabel | QLD | 1978-03-09 |

    | 28 | Aphone | Meg | QLD | 1963-01-20 |

    | 201 | Soar | Dinah | QLD | 1971-06-09 |

    | ~ 16 行 ~ |


    将 `AND` 改为 `OR`：


    ```sql

    --  任一（或全部）条件必须为真：

    SELECT *

    FROM customers

    WHERE state=''QLD'' OR dob<''1980-01-01'';

    ```


    这会得到一个更混合的组：


    | id | 姓氏 | 名字 | 州 | 出生日期 |

    | --- | --- | --- | --- | --- |

    | 474 | Free | Judy | NSW | 1978-04-01 |

    | 475 | Blood | Drew | QLD | 1989-12-06 |

    | 523 | Sights | Seymour | VIC | 1965-01-06 |

    | 341 | Idate | Val | NSW | 1976-06-04 |

    | 351 | Tate | Dick | NSW | 1969-08-03 |

    | 588 | Skies | Grace | QLD | 1999-06-28 |

    | ~ 132 行 ~ |


    注意

    *   `OR` 比 `AND` 更宽松。

    *   `OR` 包含了 `AND` 的所有结果。


    你可以将 `AND` 视为更多的过滤，将 `OR` 视为组合结果。如果你熟悉数学集合，`AND` 是多个集合的**交集**（共同部分），而 `OR` 是多个集合的**并集**（全部组合）。


    如果将 `AND` 与 `OR` 混合，事情会变得有点复杂：


    ```sql

    --  操作符优先级

    SELECT *

    FROM customers

    WHERE state=''QLD'' OR state=''VIC'' AND dob<''1980-01-01'';

    ```


    结果可能不符合你的预期，无论你预期什么：


    | id | 姓氏 | 名字 | 州 | 出生日期 |

    | --- | --- | --- | --- | --- |

    | 475 | Blood | Drew | QLD | 1989-12-06 |

    | 523 | Sights | Seymour | VIC | 1965-01-06 |

    | 588 | Skies | Grace | QLD | 1999-06-28 |

    | 305 | Net | Clara | QLD |   |

    | 121 | Ting | Lil | QLD | 1964-09-17 |

    | 545 | Knife | Jack | VIC | 1962-09-24 |

    | ~ 70 行 ~ |


    在算术表达式 `1 + 2 * 3` 中，你知道乘法在加法之前执行。也就是说，乘法优先于加法。


    类似地，在逻辑表达式 `AssertionA OR AssertionB AND AssertionC` 中，`AND` 优先于 `OR`。这意味着前一条语句的结果等同于


    ```sql

    --  等同于：state=''QLD'' OR state=''VIC'' AND dob<''1980-01-01''

    SELECT *

    FROM customers

    WHERE state=''QLD'' OR (state=''VIC'' AND dob<''1980-01-01'');

    ```


    用英语说，意思是组合*一个州的全部*和*另一个州的年长者*。


    如果你本意是让出生日期断言同时应用于两个州，你需要使用括号来改变优先级：


    ```sql

    --  改变优先级

    SELECT *

    FROM customers

    WHERE (state=''QLD'' OR state=''VIC'') AND dob<''1980-01-01'';

    ```


    现在你将得到来自这两个州的年长客户。


    | id | 姓氏 | 名字 | 电子邮箱 | … | 注册日期 |

    | --- | --- | --- | --- | --- | --- |

    | 523 | Sights | Seymour | seymour.sights523@example.net | … | 2022-07-11 |

    | 121 | Ting | Lil | lil.ting121@example.com | … | 2021-10-06 |

    | 545 | Knife | Jack | jack.knife545@example.com | … | 2022-07-24 |

    | 505 | Singers | Carol | carol.singers505@example.net | … | 2022-06-29 |

    | 377 | Money | Xavier | xavier.money377@example.net | … | 2022-04-02 |

    | 266 | Blind | Rob | rob.blind266@example.net | … | 2022-01-01 |

    | ~ 34 行 ~ |


    一些开发者倾向于无论是否需要，总是包含括号，以使观点更清晰。无论哪种方式，请记住 SQL 有明确定义的解释混合逻辑操作符的方式。

