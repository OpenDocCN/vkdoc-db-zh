    \ `ASCII` 存储的，这是一种单字节字符编码。例如，字母 `A` 被存储为数字 65。\n\n因为 `ASCII` 是单字节的，它的字符范围有限。如果你需要最基本范围之外的字符，你需要改变它，例如使用字节中的额外位或切换到替代字符集。\n\
    \n现代的数据库管理系统可以使用 `Unicode`，它适用于所有语言和特殊字符。对于传统的 `ASCII` 字符，代码编号是相同的，但 `Unicode`\
    \ 可以使用多字节编码来扩展范围，为每个字符提供自己唯一的代码，而无需与他人竞争。\n\n一些数据库管理系统总是使用 `Unicode`，而一些使用 `ASCII`\
    \ 除非另有指定。示例数据库使用 `Unicode`，但现在这并不重要。接下来的内容对两者都同样适用。\n\n你不能直接对字符串做太多操作。有一件事你可以做，那就是将它连接到另一个字符串：\n\
    \n```sql\nSELECT 'abc' || 'def';  --  标准\nSELECT 'abc' + 'def';   --  仅限 MSSQL\n\
    ```\n\n这个技术术语叫做串联。\n\n如果你在 MySQL/MariaDB 中尝试这个，它可能不工作。在传统模式下，MySQL/MariaDB 将 `||`\
    \ 运算符视为逻辑运算符；在 ANSI 模式下，它应该可以工作。如果你被困在传统模式下，你将需要不同的方法。\n\n有一个常见但非标准的函数叫做 `concat()`：\n\
    \n```sql\nSELECT concat('abc','def'); --  SQLite 不支持\n```\n\n`concat()` 函数在 SQLite\
    \ 中不可用，但它在 MySQL/MariaDB 以及 PostgreSQL、MSSQL 和 Oracle 中可用。如果你在传统模式下运行 MySQL/MariaDB，这是连接字符串的唯一方法。\n\
    \n当然，如果你使用的是 MySQL/MariaDB，你总是可以切换到 ANSI 模式。\n\n除了串联之外，SQL 还包含一系列处理字符串的函数。大致上，它们分为两类：\n\
    \n*   字符函数：提取字符串的某部分或更改字符串中某些字符的函数\n*   格式化函数：将数字和日期转换为格式化字符串的函数\n\n问题是不同的数据库管理系统有自己的字符串函数，所以你会在接下来的内容中看到很多变化。这里的目的不是提供所有可用函数的字典，而是让你了解一下在你的数据库管理系统中可以使用字符串函数做些什么。\n\
    \n## 字符函数\n\n通常，SQL 包含执行以下操作的函数：\n\n*   长度：查找字符串的长度\n*   替换：用另一个字符串替换部分字符串\n*\
    \   查找：在字符串中查找字符或子字符串\n*   修剪：删除前导或尾随空格\n*   更改大小写：在大写和小写之间切换\n*   子字符串：返回部分字符串\n\
    \n以下是这些操作的概述。\n\n### 字符串长度\n\n字符串的长度就是字符串中的字符数。要查找长度，你可以使用\n\n```sql\n--  PostgreSQL,\
    \ MySQL/MariaDB, SQLite, Oracle\nSELECT length('abcde');\n--  MSSQL\nSELECT len('abcde');\n\
    ```\n\n长度为 0 表示它是一个空字符串。\n\n请注意，字符数不一定等于字节数。如果字符串是 `Unicode`，字符可能占用两个或更多字节。\n\n\
    ### 查找子字符串\n\n要查找部分字符串的位置，你可以使用以下方法：\n\n```sql\n--  MySQL/MariaDB, SQLite, Oracle:\
    \ INSTR('值',值)\nSELECT instr('abcdefghijklmnop','m');\n--  PostgreSQL: POSITION(值\
    \ IN '值')\nSELECT position('m' in 'abcdefghijklmnop')\n--  MSSQL: CHARINDEX(值,\
    \ '值')\nSELECT charindex('m','abcdefghijklmnop');\n```\n\n在所有情况下，如果找不到子字符串，结果将是\
    \ `0`。\n\n尽管示例是搜索单个字符，但你也可以搜索多字符子字符串，在这种情况下，你会得到子字符串的位置。\n\n这是我们用来按非字母顺序排序字符串技术的一部分。\n\
    \n### 替换\n\n你可以使用 `replace` 来替换字符串中的子字符串：\n\n```sql\n--  replace(原始文本,搜索文本,替换文本)\n\
    SELECT replace('text with spaces',' ','-')\n```\n\n请注意，搜索子字符串是否匹配大小写取决于数据库排序规则，就像\
    \ `WHERE` 子句一样。\n"
- fmt: '### Change Case


    To change between upper and lower case, there is


    ```sql

    --  PostgreSQL, MySQL/MariaDB, SQLite, Oracle, MSSQL

    SELECT lower(''mIxEd cAsE''), upper(''mIxEd cAsE'');

    ```


    For PostgreSQL and Oracle, you can also capitalize the first letter of each word:


    ```sql

    --  PostgreSQL, Oracle

    SELECT initcap(''mIxEd cAsE'')

    ```


    The other DBMSs don’t have anything quite so convenient.


    ### Trim Spaces


    Sometimes, you get a few stray spaces at the beginning or the end of a string.
    To remove them, you can use `trim()` to remove from both ends or `ltrim()` or
    `rtrim()` to remove from the beginning or end of the string:


    ```sql

    --  PostgreSQL, MySQL/MariaDB, SQLite, Oracle, MSSQL

    SELECT rtrim(ltrim('' abcdefghijklmnop ''))

    --  PostgreSQL, MySQL/MariaDB, SQLite, Oracle, MSSQL>=2017

    SELECT trim('' abcdefghijklmnop '');

    ```


    The `trim()` functions don’t affect any of the spaces inside the string.


    ### Substrings


    A substring is part of a string. The most direct way to extract a substring is


    ```sql

    Substring

    --  PostgreSQL, MariaDB/MySQL, Oracle, SQLite

    SELECT substr(''abcdefghijklmnop'',3,5)

    --  MSSQL

    SELECT substring(''abcdefghijklmnop'',3,5)

    --  Results in: cdefg

    ```


    Here, you specify the original string, the **start** of the substring, and the
    **length** of the substring.


    Some DBMSs offer specialized functions to get the first or last part of a string.
    In some cases, you can use a negative start to get the last part of a string:


    ```sql

    --  Left

    --  PostgreSQL, MariaDB/MySQL, MSSQL

    SELECT left(''abcdefghijklmnop'',5);

    --  Can also use substr(string,1,n)

    --  Right

    --  PostgreSQL, MariaDB/MySQL, MSSQL

    SELECT right(''abcdefghijklmnop'',4);

    --  MariaDB/MySQL, Oracle, SQLite

    substr(''abcdefghijklmnop'',-4)

    ```


    In most cases, you don’t really need to extract part of a string for normal data.
    You will sometimes see extraction used in cases where data has been combined,
    and you need to pull it apart again. However, if the database is built properly,
    this won’t be very often.


    You might also extract parts of a string as part of a formatting process. For
    example, the customer phone numbers are all stored as ten-digit strings, without
    spaces or other formatting characters. While it is always best to store data in
    its purest form, it’s not always at its most readable.


    You can use the following substrings to generate a phone number in a `00 0000
    0000` format:


    ```sql

    --  PostgreSQL, MariaDB/ MySQL

    SELECT

    id, givenname, familyname,

    left(phone,2)||'' ''||substr(phone,3,4)

    ||'' ''||right(phone,4) AS phone

    FROM customers;

    --  Oracle

    SELECT

    id, givenname, familyname,

    substr(phone,1,2)||'' ''||substr(phone,3,4)

    ||'' ''||substr(phone,-4) AS phone

    FROM customers;

    --  SQLite

    SELECT

    id, givenname, familyname,

    substr(phone,1,2)||'' ''||substr(phone,3,4)

    ||'' ''||substr(phone,-4) AS phone

    FROM customers;

    --  MSSQL

    SELECT

    id, givenname, familyname,

    left(phone,2)+'' ''+substring(phone,3,4)+'' ''+right(phone,4) AS phone

    FROM customers;

    ```


    This now gives a more readable phone number.


    | id | givenname | familyname | phone |

    | --- | --- | --- | --- |

    | 474 | Judy | Free |   |

    | 186 | Ray | Gunn | 03 5550 5761 |

    | 144 | Ray | King | 02 7010 6710 |

    | 179 | Ivan | Inkling | 08 7010 1382 |

    | 475 | Drew | Blood | 07 5550 8581 |

    | 523 | Seymour | Sights | 03 7010 3920 |

    | ~ 304 rows ~ |


    You might wonder why the phone number isn’t stored that way. The problem is that
    not everyone enters the phone format the same way, so you’re not sure whether
    the stored value matches the string you’re looking for. By removing all formatting
    altogether, you have a definitive form which you can format later.


    ## Subqueries


    Sometimes, the data you want is in another table. One way of getting that data
    into the current query is to use a **subquery**. You have already seen subqueries
    in Chapter [3](#601766_1_En_3_Chapter.xhtml) on filtering data; here, you will
    use a subquery as a calculated column.


    You can use a subquery if you want to include data from a table in a tableless
    query. For example:


    ```sql

    SELECT (SELECT title FROM paintings WHERE id=123);

    ```


    This will give you the selected title:


    | title |

    | The Harvest Wagon |


    All subqueries appear inside parentheses, as you have seen earlier. Of course,
    in the preceding example, using a subquery this way is pointless, but it makes
    more sense if you’re combining this with other data.


    More realistically, you might use a subquery if you want data from multiple tables.
    For example, suppose you want to include the artist’s nationality with the painting
    details:


    ```sql

    SELECT

    id,

    artistid,

    title, price,

    (SELECT nationality FROM artists

    WHERE artists.id=paintings.artistid)

    AS nationality

    FROM paintings;

    ```


    You now have the artist nationalities:


    | id | artistid | title | price | nationality |

    | --- | --- | --- | --- | --- |

    | 1222 | 147 | Haymakers Resting | 125.00 | French |

    | 251 | 40 | Death in the Sickroom | 105.00 | Norwegian |

    | 2190 | 135 | Cache-cache (Hide-and-Seek) | 185.00 | French |

    | 1560 | 293 | Indefinite Divisibility | 125.00 | French |

    | 172 | 156 | Girl with Racket and Shuttlecock | 195.00 | French |

    | 2460 | 83 | The Procession to Calvary | 165.00 | Flemish |

    | ~ 1273 rows ~ |


    The expression in the `WHERE` clause `artists.id=paintings.artistid` includes
    the table names. We say that the columns are **qualified**. You can write the
    `WHERE` clause without table names, but qualifying column names will help you
    to understand and maintain the query.


    This type of subquery is called a **correlated** subquery: it contains a reference
    to the main query. Among other things, it means that the subquery must be evaluated
    individually for every row of the main query, so there is some performance cost
    involved. Some subqueries, such as those used in Chapter [3](#601766_1_En_3_Chapter.xhtml)
    on filtering data, are noncorrelated: they are independent of the main query,
    are evaluated only once, and so are much less costly.


    As for the actual name of the artist, a subquery in a `SELECT` clause can only
    return *one* value. This will not work:


    ```sql

    SELECT

    id,

    (SELECT givenname, familyname FROM artists

    WHERE artists.id=paintings.artistid),

    title, price,

    (SELECT nationality FROM artists

    WHERE artists.id=paintings.artistid) AS nationality

    FROM paintings;

    ```


    However, you can return a *calculated* value from a subquery:


    ```sql

    --  Standard

    SELECT

    id,

    (SELECT givenname||'' ''||familyname FROM artists

    WHERE artists.id=paintings.artistid) AS artist,

    title, price,

    (SELECT nationality FROM artists WHERE

    artists.id=paintings.artistid) AS nationality

    FROM paintings;

    --  MSSQL

    SELECT

    id,

    (SELECT givenname+'' ''+familyname FROM artists

    WHERE artists.id=paintings.artistid) AS artist,

    title, price,

    (SELECT nationality FROM artists WHERE

    artists.id=paintings.artistid) AS nationality

    FROM paintings;

    --  Not SQLite

    SELECT

    id,

    (SELECT concat(givenname,'' '',familyname) FROM artists

    WHERE artists.id=paintings.artistid) AS artist,

    title, price,

    (SELECT nationality FROM artists WHERE

    artists.id=paintings.artistid) AS nationality

    FROM paintings;

    ```


    We now have the artists’ name as well as nationality:


    | id | title | artist | … | nationality |

    | --- | --- | --- | --- | --- |

    | 1222 | Haymakers Resting | Camille Pissarro | … | French |

    | 251 | Death in the Sickroom | Edvard Munch | … | Norwegian |

    | 2190 | Cache-cache (Hide-and-Seek) | Berthe Morisot | … | French |

    | 1560 | Indefinite Divisibility | Yves Tanguy | … | French |

    | 172 | Girl with Racket and Shuttlecock | Jean-Baptiste-Siméon Chardin | … |
    French |

    | 2460 | The Procession to Calvary | Pieter the Elder Bruegel | … | Flemish |

    |  ~ 1273 rows |


    When selecting more than one value from the same subquery table, you need to use
    multiple subqueries. This can start to get very costly for your performance, and
    you might do better with joining tables instead. You will look at joining tables
    in the next chapter.'
  raw: '#### Change Case


    To change between upper and lower case, there is


    ```

    --  PostgreSQL, MySQL/MariaDB, SQLite, Oracle, MSSQL

    SELECT lower(''mIxEd cAsE''), upper(''mIxEd cAsE'');

    ```


    For PostgreSQL and Oracle, you can also capitalize the first letter of each word:


    ```

    --  PostgreSQL, Oracle

    SELECT initcap(''mIxEd cAsE'')

    ```


    The other DBMSs don’t have anything quite so convenient.


    #### Trim Spaces


    Sometimes, you get a few stray spaces at the beginning or the end of a string.
    To remove them, you can use `trim()` to remove from both ends or `ltrim()` or
    `rtrim()` to remove from the beginning or end of the string:


    ```

    --  PostgreSQL, MySQL/MariaDB, SQLite, Oracle, MSSQL

    SELECT rtrim(ltrim('' abcdefghijklmnop ''))

    --  PostgreSQL, MySQL/MariaDB, SQLite, Oracle, MSSQL>=2017

    SELECT trim('' abcdefghijklmnop '');

    ```


    The `trim()` functions don’t affect any of the spaces inside the string.


    #### Substrings


    A substring is part of a string. The most direct way to extract a substring is


    ```

    Substring

    --  PostgreSQL, MariaDB/MySQL, Oracle, SQLite

    SELECT substr(''abcdefghijklmnop'',3,5)

    --  MSSQL

    SELECT substring(''abcdefghijklmnop'',3,5)

    --  Results in: cdefg

    ```


    Here, you specify the original string, the **start** of the substring, and the
    **length** of the substring.


    Some DBMSs offer specialized functions to get the first or last part of a string.
    In some cases, you can use a negative start to get the last part of a string:


    ```

    --  Left

    --  PostgreSQL, MariaDB/MySQL, MSSQL

    SELECT left(''abcdefghijklmnop'',5);

    --  Can also use substr(string,1,n)

    --  Right

    --  PostgreSQL, MariaDB/MySQL, MSSQL

    SELECT right(''abcdefghijklmnop'',4);

    --  MariaDB/MySQL, Oracle, SQLite

    substr(''abcdefghijklmnop'',-4)

    ```


    In most cases, you don’t really need to extract part of a string for normal data.
    You will sometimes see extraction used in cases where data has been combined,
    and you need to pull it apart again. However, if the database is built properly,
    this won’t be very often.


    You might also extract parts of a string as part of a formatting process. For
    example, the customer phone numbers are all stored as ten-digit strings, without
    spaces or other formatting characters. While it is always best to store data in
    its purest form, it’s not always at its most readable.


    You can use the following substrings to generate a phone number in a `00 0000
    0000` format:


    ```

    --  PostgreSQL, MariaDB/ MySQL

    SELECT

    id, givenname, familyname,

    left(phone,2)||'' ''||substr(phone,3,4)

    ||'' ''||right(phone,4) AS phone

    FROM customers;

    --  Oracle

    SELECT

    id, givenname, familyname,

    substr(phone,1,2)||'' ''||substr(phone,3,4)

    ||'' ''||substr(phone,-4) AS phone

    FROM customers;

    --  SQLite

    SELECT

    id, givenname, familyname,

    substr(phone,1,2)||'' ''||substr(phone,3,4)

    ||'' ''||substr(phone,-4) AS phone

    FROM customers;

    --  MSSQL

    SELECT

    id, givenname, familyname,

    left(phone,2)+'' ''+substring(phone,3,4)+'' ''+right(phone,4) AS phone

    FROM customers;

    ```


    This now gives a more readable phone number.


    | id | givenname | familyname | phone |

    | --- | --- | --- | --- |

    | 474 | Judy | Free |   |

    | 186 | Ray | Gunn | 03 5550 5761 |

    | 144 | Ray | King | 02 7010 6710 |

    | 179 | Ivan | Inkling | 08 7010 1382 |

    | 475 | Drew | Blood | 07 5550 8581 |

    | 523 | Seymour | Sights | 03 7010 3920 |

    | ~ 304 rows ~ |


    You might wonder why the phone number isn’t stored that way. The problem is that
    not everyone enters the phone format the same way, so you’re not sure whether
    the stored value matches the string you’re looking for. By removing all formatting
    altogether, you have a definitive form which you can format later.


    ## Subqueries


    Sometimes, the data you want is in another table. One way of getting that data
    into the current query is to use a **subquery**. You have already seen subqueries
    in Chapter [3](#601766_1_En_3_Chapter.xhtml) on filtering data; here, you will
    use a subquery as a calculated column.


    You can use a subquery if you want to include data from a table in a tableless
    query. For example:


    ```

    SELECT (SELECT title FROM paintings WHERE id=123);

    ```


    This will give you the selected title:


    | title |

    | The Harvest Wagon |


    All subqueries appear inside parentheses, as you have seen earlier. Of course,
    in the preceding example, using a subquery this way is pointless, but it makes
    more sense if you’re combining this with other data.


    More realistically, you might use a subquery if you want data from multiple tables.
    For example, suppose you want to include the artist’s nationality with the painting
    details:


    ```

    SELECT

    id,

    artistid,

    title, price,

    (SELECT nationality FROM artists

    WHERE artists.id=paintings.artistid)

    AS nationality

    FROM paintings;

    ```


    You now have the artist nationalities:


    | id | artistid | title | price | nationality |

    | --- | --- | --- | --- | --- |

    | 1222 | 147 | Haymakers Resting | 125.00 | French |

    | 251 | 40 | Death in the Sickroom | 105.00 | Norwegian |

    | 2190 | 135 | Cache-cache (Hide-and-Seek) | 185.00 | French |

    | 1560 | 293 | Indefinite Divisibility | 125.00 | French |

    | 172 | 156 | Girl with Racket and Shuttlecock | 195.00 | French |

    | 2460 | 83 | The Procession to Calvary | 165.00 | Flemish |

    | ~ 1273 rows ~ |


    The expression in the `WHERE` clause `artists.id=paintings.artistid` includes
    the table names. We say that the columns are **qualified**. You can write the
    `WHERE` clause without table names, but qualifying column names will help you
    to understand and maintain the query.


    This type of subquery is called a **correlated** subquery: it contains a reference
    to the main query. Among other things, it means that the subquery must be evaluated
    individually for every row of the main query, so there is some performance cost
    involved. Some subqueries, such as those used in Chapter [3](#601766_1_En_3_Chapter.xhtml)
    on filtering data, are noncorrelated: they are independent of the main query,
    are evaluated only once, and so are much less costly.


    As for the actual name of the artist, a subquery in a `SELECT` clause can only
    return *one* value. This will not work:


    ```

    SELECT

    id,

    (SELECT givenname, familyname FROM artists

    WHERE artists.id=paintings.artistid),

    title, price,

    (SELECT nationality FROM artists

    WHERE artists.id=paintings.artistid) AS nationality

    FROM paintings;

    ```


    However, you can return a *calculated* value from a subquery:


    ```

    --  Standard

    SELECT

    id,

    (SELECT givenname||'' ''||familyname FROM artists

    WHERE artists.id=paintings.artistid) AS artist,

    title, price,

    (SELECT nationality FROM artists WHERE

    artists.id=paintings.artistid) AS nationality

    FROM paintings;

    --  MSSQL

    SELECT

    id,

    (SELECT givenname+'' ''+familyname FROM artists

    WHERE artists.id=paintings.artistid) AS artist,

    title, price,

    (SELECT nationality FROM artists WHERE

    artists.id=paintings.artistid) AS nationality

    FROM paintings;

    --  Not SQLite

    SELECT

    id,

    (SELECT concat(givenname,'' '',familyname) FROM artists

    WHERE artists.id=paintings.artistid) AS artist,

    title, price,

    (SELECT nationality FROM artists WHERE

    artists.id=paintings.artistid) AS nationality

    FROM paintings;

    ```


    We now have the artists’ name as well as nationality:


    | id | title | artist | … | nationality |

    | --- | --- | --- | --- | --- |

    | 1222 | Haymakers Resting | Camille Pissarro | … | French |

    | 251 | Death in the Sickroom | Edvard Munch | … | Norwegian |

    | 2190 | Cache-cache (Hide-and-Seek) | Berthe Morisot | … | French |

    | 1560 | Indefinite Divisibility | Yves Tanguy | … | French |

    | 172 | Girl with Racket and Shuttlecock | Jean-Baptiste-Siméon Chardin | … |
    French |

    | 2460 | The Procession to Calvary | Pieter the Elder Bruegel | … | Flemish |

    |  ~ 1273 rows |


    When selecting more than one value from the same subquery table, you need to use
    multiple subqueries. This can start to get very costly for your performance, and
    you might do better with joining tables instead. You will look at joining tables
    in the next chapter.'
  trans: '

    ### 更改大小写


    要在大小写之间切换，可以使用


    ```sql

    --  PostgreSQL, MySQL/MariaDB, SQLite, Oracle, MSSQL

    SELECT lower(''mIxEd cAsE''), upper(''mIxEd cAsE'');

    ```


    对于 PostgreSQL 和 Oracle，你还可以将每个单词的首字母大写：


    ```sql

    --  PostgreSQL, Oracle

    SELECT initcap(''mIxEd cAsE'')

    ```


    其他数据库管理系统没有如此方便的功能。


    ### 修剪空格


    有时，字符串的开头或结尾会有一些多余的空格。要移除它们，你可以使用 `trim()` 从两端移除，或者使用 `ltrim()` 或 `rtrim()` 从字符串的开头或结尾移除：


    ```sql

    --  PostgreSQL, MySQL/MariaDB, SQLite, Oracle, MSSQL

    SELECT rtrim(ltrim('' abcdefghijklmnop ''))

    --  PostgreSQL, MySQL/MariaDB, SQLite, Oracle, MSSQL>=2017

    SELECT trim('' abcdefghijklmnop '');

    ```


    `trim()` 函数不会影响字符串内部的任何空格。


    ### 子串


    子串是字符串的一部分。提取子串最直接的方法是


    ```sql

    Substring

    --  PostgreSQL, MariaDB/MySQL, Oracle, SQLite

    SELECT substr(''abcdefghijklmnop'',3,5)

    --  MSSQL

    SELECT substring(''abcdefghijklmnop'',3,5)

    --  结果为: cdefg

    ```


    在这里，你指定了原始字符串、子串的**起始位置**和子串的**长度**。


    一些数据库管理系统提供了专门的函数来获取字符串的开头或结尾部分。在某些情况下，你可以使用负的起始位置来获取字符串的结尾部分：


    ```sql

    --  左侧

    --  PostgreSQL, MariaDB/MySQL, MSSQL

    SELECT left(''abcdefghijklmnop'',5);

    --  也可以使用 substr(string,1,n)

    --  右侧

    --  PostgreSQL, MariaDB/MySQL, MSSQL

    SELECT right(''abcdefghijklmnop'',4);

    --  MariaDB/MySQL, Oracle, SQLite

    substr(''abcdefghijklmnop'',-4)

    ```


    在大多数情况下，对于普通数据，你并不真正需要提取字符串的一部分。有时你会在数据已被合并，需要再次将其拆开的情况下看到提取操作。然而，如果数据库构建得当，这种情况不会很频繁。


    你可能还需要提取字符串的一部分作为格式化过程的一部分。例如，客户电话号码都存储为十位数字字符串，没有空格或其他格式字符。虽然将数据以其最纯粹的形式存储总是最好的，但这并不总是最具可读性的。


    你可以使用以下子串来生成 `00 0000 0000` 格式的电话号码：


    ```sql

    --  PostgreSQL, MariaDB/ MySQL

    SELECT

    id, givenname, familyname,

    left(phone,2)||'' ''||substr(phone,3,4)

    ||'' ''||right(phone,4) AS phone

    FROM customers;

    --  Oracle

    SELECT

    id, givenname, familyname,

    substr(phone,1,2)||'' ''||substr(phone,3,4)

    ||'' ''||substr(phone,-4) AS phone

    FROM customers;

    --  SQLite

    SELECT

    id, givenname, familyname,

    substr(phone,1,2)||'' ''||substr(phone,3,4)

    ||'' ''||substr(phone,-4) AS phone

    FROM customers;

    --  MSSQL

    SELECT

    id, givenname, familyname,

    left(phone,2)+'' ''+substring(phone,3,4)+'' ''+right(phone,4) AS phone

    FROM customers;

    ```


    这现在给出了更具可读性的电话号码。


    | id | 名字 | 姓氏 | 电话 |

    | --- | --- | --- | --- |

    | 474 | Judy | Free |   |

    | 186 | Ray | Gunn | 03 5550 5761 |

    | 144 | Ray | King | 02 7010 6710 |

    | 179 | Ivan | Inkling | 08 7010 1382 |

    | 475 | Drew | Blood | 07 5550 8581 |

    | 523 | Seymour | Sights | 03 7010 3920 |

    | ~ 约 304 行 ~ |


    你可能想知道为什么电话号码没有以这种方式存储。问题在于并非每个人都以相同的方式输入电话格式，因此你不确定存储的值是否与你查找的字符串匹配。通过完全移除所有格式，你就有了一个确定的形式，以后可以对其进行格式化。


    ## 子查询


    有时，你需要的数据在另一个表中。将这些数据获取到当前查询中的一种方法是使用**子查询**。你已经在关于数据过滤的第 3 章中见过子查询；在这里，你将把子查询用作计算列。


    如果你想在无表查询中包含来自某个表的数据，就可以使用子查询。例如：


    ```sql

    SELECT (SELECT title FROM paintings WHERE id=123);

    ```


    这将给你选定的标题：


    | 标题 |

    | The Harvest Wagon |


    正如你之前看到的，所有子查询都出现在括号内。当然，在前面的例子中，以这种方式使用子查询是没有意义的，但如果你将其与其他数据结合使用，它就更有意义了。


    更现实地说，如果你想要来自多个表的数据，可能会使用子查询。例如，假设你想在画作详情中包含艺术家的国籍：


    ```sql

    SELECT

    id,

    artistid,

    title, price,

    (SELECT nationality FROM artists

    WHERE artists.id=paintings.artistid)

    AS nationality

    FROM paintings;

    ```


    你现在有了艺术家的国籍：


    | id | 艺术家 id | 标题 | 价格 | 国籍 |

    | --- | --- | --- | --- | --- |

    | 1222 | 147 | Haymakers Resting | 125.00 | French |

    | 251 | 40 | Death in the Sickroom | 105.00 | Norwegian |

    | 2190 | 135 | Cache-cache (Hide-and-Seek) | 185.00 | French |

    | 1560 | 293 | Indefinite Divisibility | 125.00 | French |

    | 172 | 156 | Girl with Racket and Shuttlecock | 195.00 | French |

    | 2460 | 83 | The Procession to Calvary | 165.00 | Flemish |

    | ~ 约 1273 行 ~ |


    `WHERE` 子句中的表达式 `artists.id=paintings.artistid` 包含了表名。我们说这些列是**被限定的**。你可以不带表名编写
    `WHERE` 子句，但限定列名将有助于你理解和维护查询。


    这种类型的子查询被称为**关联**子查询：它包含对主查询的引用。除其他外，这意味着对于主查询的每一行都必须单独评估子查询，因此会涉及一些性能成本。一些子查询，例如第
    3 章中用于数据过滤的那些，是非关联的：它们独立于主查询，只评估一次，因此成本要低得多。


    至于艺术家的实际姓名，`SELECT` 子句中的子查询只能返回*一个*值。下面的写法是行不通的：


    ```sql

    SELECT

    id,

    (SELECT givenname, familyname FROM artists

    WHERE artists.id=paintings.artistid),

    title, price,

    (SELECT nationality FROM artists

    WHERE artists.id=paintings.artistid) AS nationality

    FROM paintings;

    ```


    但是，你可以从子查询返回一个*计算*值：


    ```sql

    --  标准

    SELECT

    id,

    (SELECT givenname||'' ''||familyname FROM artists

    WHERE artists.id=paintings.artistid) AS artist,

    title, price,

    (SELECT nationality FROM artists WHERE

    artists.id=paintings.artistid) AS nationality

    FROM paintings;

    --  MSSQL

    SELECT

    id,

    (SELECT givenname+'' ''+familyname FROM artists

    WHERE artists.id=paintings.artistid) AS artist,

    title, price,

    (SELECT nationality FROM artists WHERE

    artists.id=paintings.artistid) AS nationality

    FROM paintings;

    --  SQLite 之外

    SELECT

    id,

    (SELECT concat(givenname,'' '',familyname) FROM artists

    WHERE artists.id=paintings.artistid) AS artist,

    title, price,

    (SELECT nationality FROM artists WHERE

    artists.id=paintings.artistid) AS nationality

    FROM paintings;

    ```


    我们现在有了艺术家的姓名以及国籍：


    | id | 标题 | 艺术家 | … | 国籍 |

    | --- | --- | --- | --- | --- |

    | 1222 | Haymakers Resting | Camille Pissarro | … | French |

    | 251 | Death in the Sickroom | Edvard Munch | … | Norwegian |

    | 2190 | Cache-cache (Hide-and-Seek) | Berthe Morisot | … | French |

    | 1560 | Indefinite Divisibility | Yves Tanguy | … | French |

    | 172 | Girl with Racket and Shuttlecock | Jean-Baptiste-Siméon Chardin | … |
    French |

    | 2460 | The Procession to Calvary | Pieter the Elder Bruegel | … | Flemish |

    |  ~ 约 1273 行 |


    当从同一张子查询表中选择多个值时，你需要使用多个子查询。这对于性能来说可能开始变得非常昂贵，你可能最好使用表连接。你将在下一章中学习表连接。

