- fmt: '### Integers


    Mathematically, an integer is a whole number, positive, negative, or zero. You
    can add, subtract, or multiply any two integers, and you will get another integer.
    The problem is when you attempt to divide two integers: sometimes, the result
    is *not* another integer. In the trade, we say that integers are not **closed**
    under division.


    On a normal calculator, which only has one job to do, all numbers are regarded
    as decimals; integers are decimals with `.0` at the end. On a database, whose
    main job is storing and managing data, decimals are more complicated and distinguished
    from integers which are easier to handle.


    The practical upshot of this is when you run the following:


    ```sql

    SELECT 200/7;

    ```


    you may not get what you expect.


    SQLite, PostgreSQL, and MSSQL will give you a result of `28` which is short: `28*7
    = 196`. Treating the calculation as integer-only, any remainder, no matter how
    large, is ignored. MySQL/MariaDB and Oracle, on the other hand, will return a
    decimal result `28.57…`.


    This is also true if you extract real data from a table:


    ```sql

    SELECT

    id, quantity, quantity/3 AS third

    FROM saleitems;

    ```


    In the `saleitems` table, `quantity` is definitely an integer, and the three aforementioned
    DBMSs will truncate the result, while the others return a decimal.


    | id | quantity | third |

    | --- | --- | --- |

    | 2621 | 3 | 1 |

    | 5169 | 1 | 0 |

    | 667 | 1 | 0 |

    | 6905 | 3 | 1 |

    | 886 | 1 | 0 |

    | 6729 | 2 | 0 |

    | ~ 6315 rows ~ |


    You can force the other DBMSs to treat numbers as decimals if you add a `.0` to
    the end:


    ```sql

    SELECT 200/7 AS plain, 200.0/7 as decimalised;

    ```


    It doesn’t matter which number is decimalized as long as at least one is.


    If you’re calculating with column data only, you won’t be able to add the `.0`
    to the end. Instead, you will need to use the `cast()` function to change the
    type from an integer to a decimal. For example:


    ```sql

    SELECT cast(200 as float)/cast(7 as float);

    ```


    The `float` data type is a floating-point decimal (it can have any number of decimal
    places).


    You can also reverse the process by casting the decimal to an integer:


    ```sql

    SELECT cast(6.5 as int);

    ```


    Note that the results vary according to the DBMS:


    *   For PostgreSQL, MySQL/MariaDB, and Oracle, the integer will be rounded using
    the classic 4/5 rule; here, the result will be 7.

    *   For MSSQL and SQLite, the decimal part will be discarded, regardless of how
    large it is. This is called truncating the decimal.


    If you really want to truncate the decimal, some DBMSs have a `floor()` function
    to specifically do the job.


    You will see more on `cast()` later.


    ### Remainder


    If you’re working with integer division, there may be times when you want the
    remainder only. Many DBMSs use the `%` operator for this:


    ```sql

    SELECT 200/7, 200.0/7, 200%7;   --  not Oracle

    ```


    This is *often* called the **modulus** ("mod") operator, though strictly speaking
    it isn’t the true mathematical modulus. The difference is in how negative numbers
    are handled. It really is a **remainder** operator.


    If you try this in Oracle, you will get an error as the `%` is not supported.
    Instead, you should use the `mod()` function:


    ```sql

    --  Oracle

    SELECT 200/7, 200.0/7, mod(200,7) FROM dual;

    ```


    Again, this is not strictly a modulus operation, but a remainder operation. Oracle
    does have a `remainder()` function, but that gives neither the true modulus nor
    the true remainder.


    Why is the remainder operation useful? There are many values which are cyclic,
    such as the day of the week or the month of the year. To work out what day of
    the week it will be in 200 days, you get its remainder (`200%7 = 4`) and add that
    to today. The same with months: get the remainder (`200%12 = 8`) and add that
    to the current month.


    ### Extra Decimals


    When dividing by 7, you will come across a fundamental problem with decimals:
    divisors of anything other than 2 or 5 will result in an infinitely recurring
    decimal. Depending on the DBMS, you can end up with anything from a few to many
    decimal places, but this is (a) never exact and (b) probably more than you want
    anyway.


    Mathematically, the numbers `3`, `3.0`, and `3.00` are the same. However, when
    the numbers are used for analysis, such as in science and statistics, the number
    of decimal places is used to imply accuracy: `3.0` is accurate to the nearest
    tenth (`0.1`), but no guarantees are made for hundredths or further. Six decimal
    places suggest the result is accurate to one millionth.


    You will see this in the `height` calculation:


    ```sql

    SELECT

    id, givenname, familyname,

    height/2.54 as inches

    FROM customers;

    ```


    The result has *many* decimal places due to the arithmetic, but nobody would claim
    that the measurement is any more accurate than to a tenth of an inch.


    The normal solution is to round off the decimal to a few decimal places:


    ```sql

    SELECT

    id, givenname, familyname,

    round(height/2.54,2) as inches

    FROM customers;

    ```


    This gives a more realistic result:


    | id | givenname | familyname | inches |

    | --- | --- | --- | --- |

    | 474 | Judy | Free |   |

    | 186 | Ray | Gunn | 64.49 |

    | 144 | Ray | King | 69.61 |

    | 179 | Ivan | Inkling | 67.05 |

    | 475 | Drew | Blood | 67.32 |

    | 523 | Seymour | Sights | 65.87 |

    | ~ 304 rows ~ |


    The `round()` function rounds off the first number to the set number of places.
    This correctly adjusts the last place if the following is 5 or more: the so-called
    "`4/5`" rule.


    Some DBMSs, such as SQL Server, may still show additional decimal places, even
    though they’re all zero.


    You will see more on this and other functions next.


    ### Mathematical Functions


    Mathematical functions perform more complex operations on numbers. The SQL standard
    has little to say on these functions, so you will find that their availability,
    behavior, and even their name may vary between DBMSs.


    Here are some examples of mathematical functions:


    ```sql

    --  PostgreSQL, MariaDB/MySQL, MSSQL

    SELECT

    pi() AS pi,

    sin(radians(45)) AS sin45,  --  Trigonometry uses Radians

    sqrt(2) AS root2,           --  √2

    log10(3) AS log3,

    ln(10) AS ln10,             --  Natural Logarithm

    power(4,3) AS four_cubed    --  4³

    ;


    --  Oracle

    SELECT

    acos(-1) AS pi,                 --  different

    sin(45*acos(-1)/180) AS sin45,  --  different

    sqrt(2) AS root2,

    log(10,3) AS log3,              --  different

    ln(10) AS ln10,

    power(4,3) AS four_cubed

    FROM dual;

    ```


    As you see in the preceding code, Oracle has a slightly different set of functions,
    and SQLite has none of these at all.


    Also, note that the trigonometric functions don’t use degrees: that would be too
    easy. Instead, they use radians, which involve the value of π (about 3.142…).
    Oracle complicates this by not having a `pi()` or `radians()` function, so this
    is emulated using the `acos()` function.'
  raw: '### Integers


    Mathematically, an integer is a whole number, positive, negative, or zero. You
    can add, subtract, or multiply any two integers, and you will get another integer.
    The problem is when you attempt to divide two integers: sometimes, the result
    is *not* another integer. In the trade, we say that integers are not **closed**
    under division.


    On a normal calculator, which only has one job to do, all numbers are regarded
    as decimals; integers are decimals with `.0` at the end. On a database, whose
    main job is storing and managing data, decimals are more complicated and distinguished
    from integers which are easier to handle.


    The practical upshot of this is when you run the following:


    ```

    SELECT 200/7;

    ```


    you may not get what you expect.


    SQLite, PostgreSQL, and MSSQL will give you a result of `28` which is short: `28*7
    = 196`. Treating the calculation as integer-only, any remainder, no matter how
    large, is ignored. MySQL/MariaDB and Oracle, on the other hand, will return a
    decimal result `28.57…`.


    This is also true if you extract real data from a table:


    ```

    SELECT

    id, quantity, quantity/3 AS third

    FROM saleitems;

    ```


    In the `saleitems` table, `quantity` is definitely an integer, and the three aforementioned
    DBMSs will truncate the result, while the others return a decimal.


    | id | quantity | third |

    | --- | --- | --- |

    | 2621 | 3 | 1 |

    | 5169 | 1 | 0 |

    | 667 | 1 | 0 |

    | 6905 | 3 | 1 |

    | 886 | 1 | 0 |

    | 6729 | 2 | 0 |

    | ~ 6315 rows ~ |


    You can force the other DBMSs to treat numbers as decimals if you add a `.0` to
    the end:


    ```

    SELECT 200/7 AS plain, 200.0/7 as decimalised;

    ```


    It doesn’t matter which number is decimalized as long as at least one is.


    If you’re calculating with column data only, you won’t be able to add the `.0`
    to the end. Instead, you will need to use the `cast()` function to change the
    type from an integer to a decimal. For example:


    ```

    SELECT cast(200 as float)/cast(7 as float);

    ```


    The `float` data type is a floating-point decimal (it can have any number of decimal
    places).


    You can also reverse the process by casting the decimal to an integer:


    ```

    SELECT cast(6.5 as int);

    ```


    Note that the results vary according to the DBMS:


    *   For PostgreSQL, MySQL/MariaDB, and Oracle, the integer will be rounded using
    the classic 4/5 rule; here, the result will be 7.


    *   For MSSQL and SQLite, the decimal part will be discarded, regardless of how
    large it is. This is called truncating the decimal.


    If you really want to truncate the decimal, some DBMSs have a `floor()` function
    to specifically do the job.


    You will see more on `cast()` later.


    ### Remainder


    If you’re working with integer division, there may be times when you want the
    remainder only. Many DBMSs use the `%` operator for this:


    ```

    SELECT 200/7, 200.0/7, 200%7;   --  not Oracle

    ```


    This is *often* called the **modulus** (“mod”) operator, though strictly speaking
    it isn’t the true mathematical modulus. The difference is in how negative numbers
    are handled. It really is a **remainder** operator.


    If you try this in Oracle, you will get an error as the `%` is not supported.
    Instead, you should use the `mod()` function:


    ```

    --  Oracle

    SELECT 200/7, 200.0/7, mod(200,7) FROM dual;

    ```


    Again, this is not strictly a modulus operation, but a remainder operation. Oracle
    does have a `remainder()` function, but that gives neither the true modulus nor
    the true remainder.


    Why is the remainder operation useful? There are many values which are cyclic,
    such as the day of the week or the month of the year. To work out what day of
    the week it will be in 200 days, you get its remainder (`200%7 = 4`) and add that
    to today. The same with months: get the remainder (`200%12 = 8`) and add that
    to the current month.


    ### Extra Decimals


    When dividing by 7, you will come across a fundamental problem with decimals:
    divisors of anything other than 2 or 5 will result in an infinitely recurring
    decimal. Depending on the DBMS, you can end up with anything from a few to many
    decimal places, but this is (a) never exact and (b) probably more than you want
    anyway.


    Mathematically, the numbers `3`, `3.0`, and `3.00` are the same. However, when
    the numbers are used for analysis, such as in science and statistics, the number
    of decimal places is used to imply accuracy: `3.0` is accurate to the nearest
    tenth (`0.1`), but no guarantees are made for hundredths or further. Six decimal
    places suggest the result is accurate to one millionth.


    You will see this in the `height` calculation:


    ```

    SELECT

    id, givenname, familyname,

    height/2.54 as inches

    FROM customers;

    ```


    The result has *many* decimal places due to the arithmetic, but nobody would claim
    that the measurement is any more accurate than to a tenth of an inch.


    The normal solution is to round off the decimal to a few decimal places:


    ```

    SELECT

    id, givenname, familyname,

    round(height/2.54,2) as inches

    FROM customers;

    ```


    This gives a more realistic result:


    | id | givenname | familyname | inches |

    | --- | --- | --- | --- |

    | 474 | Judy | Free |   |

    | 186 | Ray | Gunn | 64.49 |

    | 144 | Ray | King | 69.61 |

    | 179 | Ivan | Inkling | 67.05 |

    | 475 | Drew | Blood | 67.32 |

    | 523 | Seymour | Sights | 65.87 |

    | ~ 304 rows ~ |


    The `round()` function rounds off the first number to the set number of places.
    This correctly adjusts the last place if the following is 5 or more: the so-called
    “`4/5`” rule.


    Some DBMSs, such as SQL Server, may still show additional decimal places, even
    though they’re all zero.


    You will see more on this and other functions next.


    ### Mathematical Functions


    Mathematical functions perform more complex operations on numbers. The SQL standard
    has little to say on these functions, so you will find that their availability,
    behavior, and even their name may vary between DBMSs.


    Here are some examples of mathematical functions:


    ```

    --  PostgreSQL, MariaDB/MySQL, MSSQL

    SELECT

    pi() AS pi,

    sin(radians(45)) AS sin45,  --  Trigonometry uses Radians

    sqrt(2) AS root2,           --  √2

    log10(3) AS log3,

    ln(10) AS ln10,             --  Natural Logarithm

    power(4,3) AS four_cubed    --  43

    ;

    --  Oracle

    SELECT

    acos(-1) AS pi,                 --  different

    sin(45*acos(-1)/180) AS sin45,  --  different

    sqrt(2) AS root2,

    log(10,3) AS log3,              --  different

    ln(10) AS ln10,

    power(4,3) AS four_cubed

    FROM dual;

    ```


    As you see in the preceding code, Oracle has a slightly different set of functions,
    and SQLite has none of these at all.


    Also, note that the trigonometric functions don’t use degrees: that would be too
    easy. Instead, they use radians, which involve the value of π (about 3.142…).
    Oracle complicates this by not having a `pi()` or `radians()` function, so this
    is emulated using the `acos()` function.'
  trans: '### 整数


    从数学上讲，整数是完整的数字，可以是正数、负数或零。你可以将任意两个整数相加、相减或相乘，都会得到另一个整数。问题在于当你尝试将两个整数相除时：有时结果*不是*另一个整数。在行业中，我们说整数在除法运算下不是**封闭**的。


    在普通计算器上，它只有一个功能，所有数字都被视为小数；整数是末尾带`.0`的小数。在数据库上，其主要功能是存储和管理数据，小数处理起来更复杂，且与更容易处理的整数相区别。


    这一点的实际影响体现在你运行以下语句时：


    ```sql

    SELECT 200/7;

    ```


    你可能得不到预期的结果。


    SQLite、PostgreSQL 和 MSSQL 会给你一个 `28` 的结果，这是截短的：`28*7 = 196`。将此计算视为纯整数运算，任何余数，无论多大，都会被忽略。而
    MySQL/MariaDB 和 Oracle 则会返回一个小数结果 `28.57…`。


    如果你从表中提取真实数据，情况也是如此：


    ```sql

    SELECT

    id, quantity, quantity/3 AS third

    FROM saleitems;

    ```


    在 `saleitems` 表中，`quantity` 绝对是一个整数，前述的三个数据库管理系统（DBMS）会截断结果，而其他的则会返回小数。


    | id | quantity | third |

    | --- | --- | --- |

    | 2621 | 3 | 1 |

    | 5169 | 1 | 0 |

    | 667 | 1 | 0 |

    | 6905 | 3 | 1 |

    | 886 | 1 | 0 |

    | 6729 | 2 | 0 |

    | ~ 共 6315 行 ~ |


    如果你在末尾添加一个 `.0`，可以强制其他数据库管理系统将数字视为小数：


    ```sql

    SELECT 200/7 AS plain, 200.0/7 as decimalised;

    ```


    只要至少有一个数是小数形式，具体哪个数被小数化并不重要。


    如果你只使用列数据进行计算，将无法在末尾添加 `.0`。相反，你需要使用 `cast()` 函数将类型从整数更改为小数。例如：


    ```sql

    SELECT cast(200 as float)/cast(7 as float);

    ```


    `float` 数据类型是浮点小数（它可以有任意多的小数位）。


    你也可以反过来，将小数转换为整数：


    ```sql

    SELECT cast(6.5 as int);

    ```


    请注意，结果因数据库管理系统而异：


    *   对于 PostgreSQL、MySQL/MariaDB 和 Oracle，整数将使用经典的 4/5 规则（即四舍五入）进行舍入；这里的结果将是 7。

    *   对于 MSSQL 和 SQLite，小数部分将被丢弃，无论它有多大。这称为截断小数。


    如果你确实想截断小数，一些数据库管理系统有一个专门的 `floor()` 函数来完成这项工作。


    稍后你将看到更多关于 `cast()` 的内容。


    ### 余数


    如果你正在处理整数除法，有时可能只想要余数。许多数据库管理系统使用 `%` 运算符来实现这一点：


    ```sql

    SELECT 200/7, 200.0/7, 200%7;   --  非 Oracle

    ```


    这*通常*被称为**取模**（"mod"）运算符，尽管严格来说它并不是真正的数学取模运算。区别在于如何处理负数。它实际上是一个**取余**运算符。


    如果你在 Oracle 中尝试这个，会因为不支持 `%` 而收到错误。相反，你应该使用 `mod()` 函数：


    ```sql

    --  Oracle

    SELECT 200/7, 200.0/7, mod(200,7) FROM dual;

    ```


    同样，这严格来说不是取模运算，而是取余运算。Oracle 确实有一个 `remainder()` 函数，但它既不返回真正的模数，也不返回真正的余数。


    为什么取余运算有用？有许多值是周期性的，例如星期几或一年中的月份。要计算 200 天后是星期几，你可以取其 `200%7 = 4` 的余数，并将其加到今天。月份也一样：取余数
    `200%12 = 8`，并将其加到当前月份。


    ### 额外的小数位


    当除以 7 时，你会遇到小数的一个基本问题：任何除数（除了 2 或 5）都会导致无限循环小数。根据数据库管理系统，你最终可能会得到几位甚至很多位小数，但这（a）从不精确，并且（b）可能无论如何都超出了你的需要。


    从数学上讲，数字 `3`、`3.0` 和 `3.00` 是相同的。然而，当这些数字用于分析时，例如在科学和统计中，小数位数被用来暗示精度：`3.0` 精确到最接近的十分位（`0.1`），但不保证百分位或更进一步的精度。六位小数暗示结果精确到百万分之一。


    你可以在 `height` 计算中看到这一点：


    ```sql

    SELECT

    id, givenname, familyname,

    height/2.54 as inches

    FROM customers;

    ```


    由于算术运算，结果有*许多*位小数，但没有人会声称该测量值精确到十分之一英寸以上。


    通常的解决方案是将小数四舍五入到几位小数：


    ```sql

    SELECT

    id, givenname, familyname,

    round(height/2.54,2) as inches

    FROM customers;

    ```


    这给出了更现实的结果：


    | id | givenname | familyname | inches |

    | --- | --- | --- | --- |

    | 474 | Judy | Free |   |

    | 186 | Ray | Gunn | 64.49 |

    | 144 | Ray | King | 69.61 |

    | 179 | Ivan | Inkling | 67.05 |

    | 475 | Drew | Blood | 67.32 |

    | 523 | Seymour | Sights | 65.87 |

    | ~ 共 304 行 ~ |


    `round()` 函数将第一个数四舍五入到指定的位数。如果后续数字是 5 或更大，它会正确调整最后一位：即所谓的 "`4/5`" 规则（四舍五入）。


    一些数据库管理系统，如 SQL Server，可能仍然会显示额外的小数位，即使它们都是零。


    接下来你将看到更多关于此函数和其他函数的内容。


    ### 数学函数


    数学函数对数字执行更复杂的操作。SQL 标准对这些函数几乎没有规定，因此你会发现它们的可用性、行为甚至名称在不同数据库管理系统之间可能有所不同。


    以下是一些数学函数的示例：


    ```sql

    --  PostgreSQL, MariaDB/MySQL, MSSQL

    SELECT

    pi() AS pi,

    sin(radians(45)) AS sin45,  --  三角函数使用弧度

    sqrt(2) AS root2,           --  √2

    log10(3) AS log3,

    ln(10) AS ln10,             --  自然对数

    power(4,3) AS four_cubed    --  4³

    ;


    --  Oracle

    SELECT

    acos(-1) AS pi,                 --  不同

    sin(45*acos(-1)/180) AS sin45,  --  不同

    sqrt(2) AS root2,

    log(10,3) AS log3,              --  不同

    ln(10) AS ln10,

    power(4,3) AS four_cubed

    FROM dual;

    ```


    如前面的代码所示，Oracle 有一组稍有不同的函数，而 SQLite 则完全没有这些函数。


    另外，请注意三角函数不使用角度：那太简单了。相反，它们使用弧度，这涉及到 π 的值（大约 3.142…）。Oracle 通过没有 `pi()` 或 `radians()`
    函数使这一点复杂化，因此这是使用 `acos()` 函数来模拟的。'
- fmt: '# Approximation Functions


    There are also functions which give an *approximate* value of a decimal number.
    Here is a sampler:


    ```sql

    SELECT

    --  Not MariaDB/MySQL or Oracle

    200/7 AS integer_result,

    --  All DBMSs

    200/7.0 AS decimal_result,

    --  Oracle: ceil(200/7.0)

    --  SQLite: round(200/7.0 + 0.5)

    ceiling(200/7.0) AS ceiling,

    --  SQLite: round(200/7.0 - 0.5)

    floor(200/7.0) AS floor,

    --  not MSSQL

    round(200/7.0,0) AS rounded_integer,

    --  All DBMSs

    round(200/7.0,2) AS rounded_decimal

    --  FROM DUAL   -- Oracle

    ;

    ```


    Again, there are variations between DBMSs. The first two calculations are for
    comparison, to see what a raw decimal value would look like. Note that the expression
    `200/7` may give a truncated integer, depending on the DBMS.


    The `round()` function rounds off the decimal to the given number of places. If
    the number of places is `0`, then it is the nearest whole number. In most DBMSs,
    you can leave out the `0`.


    The `ceiling()` function always rounds a decimal *up* to the next whole number,
    regardless of how small the fractional part is, while the `floor()` function rounds
    the decimal *down* to the whole number, regardless of how large the fractional
    part is. These functions are not available in SQLite, but are easily emulated.


    # Formatting Functions


    Formatting functions change the *appearance* of a value. Unlike approximation
    and other mathematical functions, the result of a formatting function is not another
    number but is a string; that’s the only way you can change the way a number appears.


    Again, the different DBMSs have wildly different functions.


    As an example, here are some ways of formatting a number as currency with currency
    symbol and thousands separators. In this case, we’re formatting for dollars and
    possibly euros:


    ```sql

    --  PostgreSQL, Oracle

    --  Current Locale

    SELECT to_char(total,''FML999G999G999D00'')

    FROM sales;

    --  Manual Locale

    SELECT to_char(total,''FM$999,999,999.00'')

    FROM sales;

    --  MariaDB/MySQL

    SET SESSION sql_mode = ''ANSI'';

    --  Current Locale

    SELECT ''$''||format(total,2)

    FROM sales;

    --  Manual Locale

    SELECT ''€''||format(total,2,''de_DE'')

    FROM sales;

    --  MSSQL

    --  Current Locale

    SELECT format(total,''c'')

    FROM sales;

    --  Specific Locale

    SELECT format(total,''c'',''nl-NL''))

    FROM sales;

    --  Manual

    SELECT format(total,''€###,###,###.00'',''de-de'')

    FROM sales;

    --  SQLite

    SELECT printf(''$%,d.%02d'',total,round(total*100)%100)

    FROM sales;

    ```


    In all cases, we’re trying to format a number using the local currency or a specific
    alternative. Sometimes, that means adding the currency symbol yourself.


    Note


    - Both PostgreSQL and Oracle have a flexible `to_char()` function which can also
    be used to format dates.

    - MariaDB/MySQL uses the `format()` function which adds thousands separators and
    decimal places; you can also tell it to adjust for different locales.

    - MSSQL has its own `format()` function with its more intuitive formatting codes;
    it also adjusts for locale and can be used to format a date.

    - SQLite only has a generic `printf()` function which may be more familiar to
    programmers; SQLite presumes that you will format data in the host application
    such as PHP or wherever SQLite has been embedded.


    Note that if you do run a number through a formatting function, *it is no longer
    a number*! If all you do is look at it, then that doesn’t matter. However, if
    you have plans to do any further calculations, or to sort the results, then a
    formatted number is likely to backfire on you.


    When all is said and done, formatting is probably something you won’t do much
    in SQL. The main purpose of SQL is to *get* the data and prepare it for the next
    step. Formatting comes last and is often done in other software.


    # Calculating with Dates


    Calculating with dates is notoriously varied between DBMSs. On top of that, a
    date may also include a time component; often, this is referred to as a “datetime”
    or a “timestamp.” Here, we will simply refer to it as a “date.”


    For most operations, DBMSs tend to rely on a function.


    Generally, the three things you want to do with dates are


    - Simple calculations: Calculate the difference between dates and offset dates
    by a certain amount.

    - Extract parts of a date, such as the month or the year.

    - Format the date.


    Here is a rundown on the main calculations you can perform with dates.


    SQLite has a completely different approach to working with dates. That’s partly
    because it doesn’t actually support dates. As a result, SQLite will be missing
    from much of the following discussion. Appendix 3 (Additional Notes) has some
    information on handling dates in SQLite.


    ## Simple Calculations


    One important value you will need to get is the current date and time. In most
    DBMSs, you can use `current_timestamp`:


    ```sql

    SELECT current_timestamp;   --  Oracle: FROM dual;

    ```


    Some DBMSs also have various functions to get the same result, such as `now()`
    for MariaDB or `getdate()` for MSSQL. However, they give the same result. SQLite
    doesn’t have any direct version of this since it doesn’t support dates natively;
    however, when needed, the string `''now''` does the job.


    From there on, it gets complicated. Here are some examples to add 4 months:


    ```sql

    --  PostgreSQL

    SELECT

    date ''2015-10-31'' + interval ''4 months'',

    current_timestamp + interval ''4 months'',

    current_timestamp + interval ''4'' month  --  same

    ;

    --  MariaDB/MySQL

    SELECT

    date_add(''2015-10-31'',interval 4 month),

    date_add(current_timestamp,interval 4 month),

    current_timestamp + interval ''4'' month  --  same

    ;

    --  MSSQL

    SELECT

    dateadd(month,4,''2015-10-31''),

    dateadd(month,4,current_timestamp)

    ;

    --  Oracle

    SELECT

    add_months(''31 Oct 2015'',4),

    current_timestamp + interval ''4'' month,

    add_months(current_timestamp,4) --  also works

    FROM dual;

    --  SQLite

    SELECT

    strftime(''%Y-%m-%d'',''2015-10-31'',''+4 month''),

    strftime(''%Y-%m-%d'',''now'',''+4 month'')

    ;

    ```


    You’ll get something like this, depending on when you run the code:


    | specified | current_timestamp |

    | --- | --- |

    | 2016-02-29 00:00:00 | 2023-07-28 13:15:29.066381+10 |


    The important thing here is that all of the preceding examples are smart enough
    to cope with varying lengths of months; adding 4 months can mean anything from
    120 days to 123 days, but the preceding calculations adjust for that. However,
    if the result goes past the end of the month, all but SQLite will limit it to
    the end of the month; SQLite will move into the next month.'
  raw: '### Approximation Functions


    There are also functions which give an *approximate* value of a decimal number.
    Here is a sampler:


    ```

    SELECT

    --  Not MariaDB/MySQL or Oracle

    200/7 AS integer_result,

    --  All DBMSs

    200/7.0 AS decimal_result,

    --  Oracle: ceil(200/7.0)

    --  SQLite: round(200/7.0 + 0.5)

    ceiling(200/7.0) AS ceiling,

    --  SQLite: round(200/7.0 - 0.5)

    floor(200/7.0) AS floor,

    --  not MSSQL

    round(200/7.0,0) AS rounded_integer,

    --  All DBMSs

    round(200/7.0,2) AS rounded_decimal

    --  FROM DUAL   -- Oracle

    ;

    ```


    Again, there are variations between DBMSs. The first two calculations are for
    comparison, to see what a raw decimal value would look like. Note that the expression
    `200/7` may give a truncated integer, depending on the DBMS.


    The `round()` function rounds off the decimal to the given number of places. If
    the number of places is `0`, then it is the nearest whole number. In most DBMSs,
    you can leave out the `0`.


    The `ceiling()` function always rounds a decimal *up* to the next whole number,
    regardless of how small the fractional part is, while the `floor()` function rounds
    the decimal *down* to the whole number, regardless of how large the fractional
    part is. These functions are not available in SQLite, but are easily emulated.


    ### Formatting Functions


    Formatting functions change the *appearance* of a value. Unlike approximation
    and other mathematical functions, the result of a formatting function is not another
    number but is a string; that’s the only way you can change the way a number appears.


    Again, the different DBMSs have wildly different functions.


    As an example, here are some ways of formatting a number as currency with currency
    symbol and thousands separators. In this case, we’re formatting for dollars and
    possibly euros:


    ```

    --  PostgreSQL, Oracle

    --  Current Locale

    SELECT to_char(total,''FML999G999G999D00'')

    FROM sales;

    --  Manual Locale

    SELECT to_char(total,''FM$999,999,999.00'')

    FROM sales;

    --  MariaDB/MySQL

    SET SESSION sql_mode = ''ANSI'';

    --  Current Locale

    SELECT ''$''||format(total,2)

    FROM sales;

    --  Manual Locale

    SELECT ''€''||format(total,2,''de_DE'')

    FROM sales;

    --  MSSQL

    --  Current Locale

    SELECT format(total,''c'')

    FROM sales;

    --  Specific Locale

    SELECT format(total,''c'',''nl-NL''))

    FROM sales;

    --  Manual

    SELECT format(total,''€###,###,###.00'',''de-de'')

    FROM sales;

    --  SQLite

    SELECT printf(''$%,d.%02d'',total,round(total*100)%100)

    FROM sales;

    ```


    In all cases, we’re trying to format a number using the local currency or a specific
    alternative. Sometimes, that means adding the currency symbol yourself.


    Note


    *   Both PostgreSQL and Oracle have a flexible `to_char()` function which can
    also be used to format dates.


    *   MariaDB/MySQL uses the `format()` function which adds thousands separators
    and decimal places; you can also tell it to adjust for different locales.


    *   MSSQL has its own `format()` function with its more intuitive formatting codes;
    it also adjusts for locale and can be used to format a date.


    *   SQLite only has a generic `printf()` function which may be more familiar to
    programmers; SQLite presumes that you will format data in the host application
    such as PHP or wherever SQLite has been embedded.


    Note that if you do run a number through a formatting function, *it is no longer
    a number*! If all you do is look at it, then that doesn’t matter. However, if
    you have plans to do any further calculations, or to sort the results, then a
    formatted number is likely to backfire on you.


    When all is said and done, formatting is probably something you won’t do much
    in SQL. The main purpose of SQL is to *get* the data and prepare it for the next
    step. Formatting comes last and is often done in other software.


    ## Calculating with Dates


    Calculating with dates is notoriously varied between DBMSs. On top of that, a
    date may also include a time component; often, this is referred to as a “datetime”
    or a “timestamp.” Here, we will simply refer to it as a “date.”


    For most operations, DBMSs tend to rely on a function.


    Generally, the three things you want to do with dates are


    *   Simple calculations: Calculate the difference between dates and offset dates
    by a certain amount.


    *   Extract parts of a date, such as the month or the year.


    *   Format the date.


    Here is a rundown on the main calculations you can perform with dates.


    SQLite has a completely different approach to working with dates. That’s partly
    because it doesn’t actually support dates. As a result, SQLite will be missing
    from much of the following discussion. Appendix 3 (Additional Notes) has some
    information on handling dates in SQLite.


    ### Simple Calculations


    One important value you will need to get is the current date and time. In most
    DBMSs, you can use `current_timestamp`:


    ```

    SELECT current_timestamp;   --  Oracle: FROM dual;

    ```


    Some DBMSs also have various functions to get the same result, such as `now()`
    for MariaDB or `getdate()` for MSSQL. However, they give the same result. SQLite
    doesn’t have any direct version of this since it doesn’t support dates natively;
    however, when needed, the string `''now''` does the job.


    From there on, it gets complicated. Here are some examples to add 4 months:


    ```

    --  PostgreSQL

    SELECT

    date ''2015-10-31'' + interval ''4 months'',

    current_timestamp + interval ''4 months'',

    current_timestamp + interval ''4'' month  --  same

    ;

    --  MariaDB/MySQL

    SELECT

    date_add(''2015-10-31'',interval 4 month),

    date_add(current_timestamp,interval 4 month),

    current_timestamp + interval ''4'' month  --  same

    ;

    --  MSSQL

    SELECT

    dateadd(month,4,''2015-10-31''),

    dateadd(month,4,current_timestamp)

    ;

    --  Oracle

    SELECT

    add_months(''31 Oct 2015'',4),

    current_timestamp + interval ''4'' month,

    add_months(current_timestamp,4) --  also works

    FROM dual;

    --  SQLite

    SELECT

    strftime(''%Y-%m-%d'',''2015-10-31'',''+4 month''),

    strftime(''%Y-%m-%d'',''now'',''+4 month'')

    ;

    ```


    You’ll get something like this, depending on when you run the code:


    | specified | current_timestamp |

    | --- | --- |

    | 2016-02-29 00:00:00 | 2023-07-28 13:15:29.066381+10 |


    The important thing here is that all of the preceding examples are smart enough
    to cope with varying lengths of months; adding 4 months can mean anything from
    120 days to 123 days, but the preceding calculations adjust for that. However,
    if the result goes past the end of the month, all but SQLite will limit it to
    the end of the month; SQLite will move into the next month.'
  trans: '

    # 近似函数


    还有一些函数可以给出一个十进制数的*近似*值。下面是一些示例：


    ```sql

    SELECT

    --  非 MariaDB/MySQL 或 Oracle

    200/7 AS integer_result,

    --  所有 DBMS

    200/7.0 AS decimal_result,

    --  Oracle: ceil(200/7.0)

    --  SQLite: round(200/7.0 + 0.5)

    ceiling(200/7.0) AS ceiling,

    --  SQLite: round(200/7.0 - 0.5)

    floor(200/7.0) AS floor,

    --  非 MSSQL

    round(200/7.0,0) AS rounded_integer,

    --  所有 DBMS

    round(200/7.0,2) AS rounded_decimal

    --  FROM DUAL   -- Oracle

    ;

    ```


    同样，不同的 DBMS 之间存在差异。前两个计算用于比较，以查看原始小数值的样子。请注意，表达式 `200/7` 可能会给出一个截断的整数，具体取决于 DBMS。


    `round()` 函数将小数四舍五入到指定的位数。如果指定位数为 `0`，则四舍五入到最接近的整数。在大多数 DBMS 中，可以省略 `0`。


    `ceiling()` 函数总是将小数*向上*舍入到下一个整数，无论小数部分有多小；而 `floor()` 函数总是将小数*向下*舍入到整数，无论小数部分有多大。这些函数在
    SQLite 中不可用，但很容易模拟。


    # 格式化函数


    格式化函数改变值的*外观*。与近似函数和其他数学函数不同，格式化函数的结果不是另一个数字，而是一个字符串；这是改变数字显示方式的唯一途径。


    同样，不同的 DBMS 有截然不同的函数。


    例如，以下是一些将数字格式化为带货币符号和千位分隔符的货币格式的方法。在这个例子中，我们为美元和可能的欧元进行格式化：


    ```sql

    --  PostgreSQL, Oracle

    --  当前区域设置

    SELECT to_char(total,''FML999G999G999D00'')

    FROM sales;

    --  手动区域设置

    SELECT to_char(total,''FM$999,999,999.00'')

    FROM sales;

    --  MariaDB/MySQL

    SET SESSION sql_mode = ''ANSI'';

    --  当前区域设置

    SELECT ''$''||format(total,2)

    FROM sales;

    --  手动区域设置

    SELECT ''€''||format(total,2,''de_DE'')

    FROM sales;

    --  MSSQL

    --  当前区域设置

    SELECT format(total,''c'')

    FROM sales;

    --  特定区域设置

    SELECT format(total,''c'',''nl-NL''))

    FROM sales;

    --  手动

    SELECT format(total,''€###,###,###.00'',''de-de'')

    FROM sales;

    --  SQLite

    SELECT printf(''$%,d.%02d'',total,round(total*100)%100)

    FROM sales;

    ```


    在所有情况下，我们都试图使用本地货币或特定替代方案来格式化数字。有时，这意味着需要自己添加货币符号。


    注意


    -   PostgreSQL 和 Oracle 都有一个灵活的 `to_char()` 函数，也可用于格式化日期。

    -   MariaDB/MySQL 使用 `format()` 函数，该函数添加千位分隔符和小数位；你还可以让它针对不同的区域设置进行调整。

    -   MSSQL 有自己的 `format()` 函数，其格式代码更直观；它也能适应区域设置，并可用于格式化日期。

    -   SQLite 只有一个通用的 `printf()` 函数，程序员可能更熟悉；SQLite 假定你将在宿主应用程序（如 PHP 或嵌入 SQLite
    的任何地方）中格式化数据。


    请注意，如果你确实对一个数字使用了格式化函数，*它就不再是数字了*！如果你只是看看它，那没关系。但是，如果你计划进行进一步的计算，或者对结果进行排序，那么格式化的数字很可能会适得其反。


    归根结底，在 SQL 中你可能不会做太多格式化。SQL 的主要目的是*获取*数据并为下一步做准备。格式化通常是最后一步，并且经常在其他软件中完成。


    # 日期计算


    日期计算在不同的 DBMS 之间差异是出了名的大。除此之外，日期还可能包含时间部分；通常这被称为“日期时间”或“时间戳”。在这里，我们简单地称其为“日期”。


    对于大多数操作，DBMS 倾向于依赖函数。


    通常，你想对日期做的三件事是：


    -   简单计算：计算日期之间的差异，并将日期偏移一定量。

    -   提取日期的部分，如月份或年份。

    -   格式化日期。


    以下是你可以对日期执行的主要计算的概述。


    SQLite 处理日期的方法完全不同。这部分是因为它实际上不支持日期。因此，接下来的大部分讨论中都不会涉及 SQLite。附录 3（补充说明）包含一些关于在
    SQLite 中处理日期的信息。


    ## 简单计算


    一个你需要获取的重要值是当前日期和时间。在大多数 DBMS 中，你可以使用 `current_timestamp`：


    ```sql

    SELECT current_timestamp;   --  Oracle: FROM dual;

    ```


    一些 DBMS 还有各种函数来获取相同的结果，例如 MariaDB 的 `now()` 或 MSSQL 的 `getdate()`。但是，它们给出的结果相同。SQLite
    没有直接的版本，因为它不原生支持日期；不过，需要时，字符串 `''now''` 可以完成这项工作。


    从这里开始，情况变得复杂。以下是一些添加 4 个月的例子：


    ```sql

    --  PostgreSQL

    SELECT

    date ''2015-10-31'' + interval ''4 months'',

    current_timestamp + interval ''4 months'',

    current_timestamp + interval ''4'' month  --  相同

    ;

    --  MariaDB/MySQL

    SELECT

    date_add(''2015-10-31'',interval 4 month),

    date_add(current_timestamp,interval 4 month),

    current_timestamp + interval ''4'' month  --  相同

    ;

    --  MSSQL

    SELECT

    dateadd(month,4,''2015-10-31''),

    dateadd(month,4,current_timestamp)

    ;

    --  Oracle

    SELECT

    add_months(''31 Oct 2015'',4),

    current_timestamp + interval ''4'' month,

    add_months(current_timestamp,4) --  同样有效

    FROM dual;

    --  SQLite

    SELECT

    strftime(''%Y-%m-%d'',''2015-10-31'',''+4 month''),

    strftime(''%Y-%m-%d'',''now'',''+4 month'')

    ;

    ```


    根据运行代码的时间，你会得到类似这样的结果：


    | 指定日期 | 当前时间戳 |

    | --- | --- |

    | 2016-02-29 00:00:00 | 2023-07-28 13:15:29.066381+10 |


    这里重要的是，前面所有的例子都足够智能，可以处理不同长度的月份；添加 4 个月可能意味着从 120 天到 123 天不等，但前面的计算会为此进行调整。但是，如果结果超出了当月最后一天，除了
    SQLite，其他都会限制在当月最后一天；SQLite 会进入下一个月。

    '
- fmt: '### Age Calculations


    An important calculation is to find the difference between two dates, such as
    to find an age. The problem here is that the true result is usually not a whole
    number of years (or months, or whatever you are measuring). For example, PostgreSQL
    has the `age()` function:


    ```sql

    --  PostgreSQL

    SELECT id, givenname, familyname, dob, age(dob)

    FROM customers;

    ```


    This will give you the ages:


    | id | givenname | familyname | dob | age |

    | --- | --- | --- | --- | --- |

    | 474 | Judy | Free | 1978-04-01 | 44 years 11 mons 2 days |

    | 186 | Ray | Gunn |   |   |

    | 144 | Ray | King |   |   |

    | 179 | Ivan | Inkling |   |   |

    | 475 | Drew | Blood | 1989-12-06 | 33 years 2 mons 28 days |

    | 523 | Seymour | Sights | 1965-01-06 | 58 years 1 mon 28 days |

    | ~ 304 rows ~ |


    However, the result will be something like `38 years 6 mons 7 days`, which is
    pretty good, if you really want that detail. The resulting expression is called
    an `interval`. Intervals are an important part of date calculations with PostgreSQL.


    Much of the time, however, you probably just need the number of years (or months
    or whatever), so the following calculations will probably do:


    ```sql

    --  PostgreSQL

    SELECT

    id, givenname, familyname, dob,

    age(dob) AS interval,

    extract(year from age(dob)) AS samething

    FROM customers;


    --  MariaDB/MySQL

    SELECT

    id, givenname, familyname, dob,

    timestampdiff(year,dob,current_timestamp) AS age

    FROM customers;


    --  MSSQL

    SELECT

    id, givenname, familyname, dob,

    datediff(year,dob,current_timestamp)

    AS age --  but not quite!

    FROM customers;


    --  Oracle

    SELECT

    id, givenname, familyname, dob,

    trunc(months_between(current_timestamp,dob)/12)

    AS age

    FROM customers;


    --  SQLite

    SELECT

    id, givenname, familyname, dob,

    cast(

    strftime(''%Y.%m%d'', ''now'')

    - strftime(''%Y.%m%d'', dob)

    as int) AS age

    FROM customers;

    ```


    You get something like this.


    | id | givenname | familyname | dob | years |

    | --- | --- | --- | --- | --- |

    | 474 | Judy | Free | 1978-04-01 | 44 |

    | 186 | Ray | Gunn |   |   |

    | 144 | Ray | King |   |   |

    | 179 | Ivan | Inkling |   |   |

    | 475 | Drew | Blood | 1989-12-06 | 33 |

    | 523 | Seymour | Sights | 1965-01-06 | 58 |

    | ~ 304 rows ~ |   |   |   |   |


    Note that only PostgreSQL has a built-in function to calculate the age. Oracle
    has the `months_between()` which nearly does the job; this number is divided by
    12, and the `trunc()` function removes the remainder.


    Of the preceding calculations, MSSQL has a simple function which is too simple.
    All it does is calculate the difference between the years, which is way out if
    the date of birth is at the end of the year but the asking date is at the beginning
    of the year. Getting a more correct result takes a lot more work.


    ### Extracting Parts of a Date


    Another technique with dates is to extract parts of the date, such as the day
    or the year. Here again, the different DBMSs vary widely.


    SQLite has a completely different way of working with parts of a date, which we
    won’t be discussing here.


    #### Date Extraction in PostgreSQL, MariaDB/MySQL, and Oracle


    The standard method of extracting part of a date is to use the `extract()` function.
    This function takes the form


    ```

    extract(part from datetime)

    ```


    You can see the `extract()` function in action:


    ```sql

    WITH moonshot AS (

    SELECT

    timestamp ''1969-07-20 20:17:40'' AS datetime

    --  FROM dual   --  (Oracle)

    )

    SELECT

    datetime,

    EXTRACT(year FROM datetime) AS year,        --  1969

    EXTRACT(month FROM datetime) AS month,      --  7

    EXTRACT(day FROM datetime) AS day,          --  20

    --  not Oracle or MariaDB/MySQL:

    EXTRACT(dow FROM datetime) AS weekday,  --  0

    EXTRACT(hour FROM datetime) AS hour,        --  20

    EXTRACT(minute FROM datetime) AS minute,    --  17

    EXTRACT(second FROM datetime) AS second     --  40

    FROM moonshot;

    ```


    Note that Oracle and MariaDB/MySQL don’t have a direct way of extracting the day
    of the week, which can be a problem if, say, you want to use it for grouping.
    However, as you will see later, you can use a formatting function to get the day
    of the week, as well as the preceding values.


    PostgreSQL also includes a function called `date_part(''part'',datetime)` as an
    alternative to the preceding function.


    The date/time `1969-07-20 20:17:40` is when the first human foot trod on the moon.


    #### Date Extraction in Microsoft SQL


    Microsoft SQL has two main functions to extract part of a date:


    *   `datepart(part,datetime)` extracts the part of a date/time as a number.

    *   `datename(part,datetime)` extracts the part of a date/time as a string. For
    most parts, such as the year, it’s simply a string version of the `datepart` number.
    However, for the weekday and the month, it’s actually the human-friendly name.


    You can see these two functions in action:


    ```sql

    WITH moonshot AS (

    SELECT cast(''1969-07-20 20:17:40'' as datetime) AS datetime

    )

    SELECT

    datepart(year, datetime) AS year,       --  aka year()

    datename(year, datetime) AS yearstring,

    datepart(month, datetime) AS month,     --  aka month()

    datename(month, datetime) AS monthname,

    datepart(day, datetime) AS day,         --  aka day()

    datepart(weekday, datetime) AS weekday, --  Sunday=1

    datename(weekday, datetime) AS weekdayname,

    datepart(hour, datetime) AS hour,

    datepart(minute, datetime) AS minute,

    datepart(second, datetime) AS second

    FROM moonshot;

    ```


    Note


    *   `datename(date,year)` just gives a string version of `2013`.

    *   There are three short functions, `day()`, `month()`, and `year()`, which are
    synonyms of `datepart()`.


    #### Extracting a Date from a Datetime


    Something conspicuously missing is the ability to extract a date from a datetime.
    The most direct approach is to `cast` it:


    ```sql

    WITH moonshot AS (

    --  …

    )

    SELECT cast(thetime AS DATE) AS thedate --  1969-07-20 (Not Oracle)

    FROM moonshot;

    ```


    With Oracle, you’ll need a slightly different approach. Casting as a date won’t
    actually remove the time component. Instead, you should use `trunc(thetime)`;
    it won’t look the same, but it will work.


    You will need this technique later when we try to analyze data with dates and
    times.


    ### Formatting a Date


    Formatting a date is all about presenting it in a useful or friendly way. Generally,
    this involves generating a string, since a string is the only way you can control
    which characters result.


    As with numbers, a formatted date is no longer a date. That means if you need
    to do any further calculations or sorting, you may have problems.


    #### Date Formatting in PostgreSQL and Oracle


    For both PostgreSQL and Oracle, you can use the `to_char` function. Here are two
    useful formats:


    ```sql

    --  PostgreSQL

    WITH vars AS (

    SELECT timestamp ''1969-07-20 20:17:40'' AS moonshot

    )

    SELECT

    moonshot,

    to_char(moonshot,''FMDay, DDth FMMonth YYYY'') AS full,

    to_char(moonshot,''Dy DD Mon YYYY'') AS short

    FROM vars;


    --  Oracle

    WITH vars AS (

    SELECT timestamp ''1969-07-20 20:17:40'' AS moonshot

    FROM dual

    )

    SELECT

    moonshot,

    to_char(moonshot,''FMDay, ddth Month YYYY'')

    AS fulldate,

    to_char(moonshot,''Dy DD Mon YYYY'') AS shortdate

    FROM vars;

    ```


    This should give you the following:


    | moonshot | fulldate | shortdate |

    | --- | --- | --- |

    | 1969-07-20 20:17:40 | Sunday, 20th July 1969 | Sun 20 Jul 1969 |


    You’ll notice that there is a slight difference in the format codes between PostgreSQL
    and Oracle.


    You can learn more about the format codes at


    *   PostgreSQL: [`www.postgresql.org/docs/current/functions-formatting.html#FUNCTIONS-FORMATTING-DATETIME-TABLE`](http://www.postgresql.org/docs/current/functions-formatting.html%23FUNCTIONS-FORMATTING-DATETIME-TABLE)

    *   Oracle: [`https://docs.oracle.com/en/database/oracle/oracle-database/21/sqlrf/Format-Models.html`](https://docs.oracle.com/en/database/oracle/oracle-database/21/sqlrf/Format-Models.html%5D)'
