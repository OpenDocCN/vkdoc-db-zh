  trans: "\n\n## 数据类型\n\n哪个排在前面？一月还是二月？如果这看起来像个脑筋急转弯，那它确实就是。答案取决于我们谈论的是日期还是单词。\n\n\
    在 SQL 中，数据有多种类型，但大多数类型都是基于以下三种核心类型的变体：\n\n*   `数字`（Numbers）用于测量或计数。\n*   `日期`（Dates）标记某个时间点。\n\
    *   `字符串`（Strings）是任何杂项文本——它们是字符序列；SQL 也将此称为 `字符型`（`character`）数据。\n\n下表 `sorting`\
    \ 包含不同类型数据的示例：\n\n```sql\nSELECT * FROM sorting;\n```\n\n如果你检查定义该表的 SQL 语句，你会看到以下主要数据类型：\n\
    \n| 列名 | 类型 |\n| --- | --- |\n| id | number |\n| numbervalue | number |\n| datevalue\
    \ | date |\n| stringvalue | string |\n| datestring | string |\n| numberstring\
    \ | string |\n| numbername, fullname, email, firstname, lastname | string |\n\n\
    其中两列，`datestring` 和 `numberstring`，将日期和数字存储为字符串，而非更合适的类型。\n\n数据类型对于确保数据有效性很重要，同时它也决定了排序顺序：\n\
    \n*   数字当然是按 `数字` 顺序排序；负数小于正数。\n*   日期按 `历史` 顺序排序，较早的日期在较新的日期之前。\n\n    请注意，在大多数\
    \ DBMS 中，日期通常以 `yyyy-mm-dd` 格式出现，更准确地称为 `ISO 8601` 格式；Oracle 通常使用不同的格式。你可以使用各种函数来更改格式。\n\
    *   字符串按 `字母` 顺序排序。\n\n    请注意，有些字符串以大写字母开头，有些以小写字母开头。`根据你的 DBMS 和排序规则（collation），它们可能被一起排序或分开排序。`\n\
    \n数据类型影响排序顺序这一事实，是在设计数据库时确保数据类型正确的原因之一。有时，人们会倾向于取巧，将所有数据存储为字符串，因为字符串可以接受任何类型的值。然而，这会导致排序顺序混乱。\n\
    \n例如：\n\n```sql\n--  按数字排序\nSELECT * FROM sorting ORDER BY numbervalue;\n--  按字符串排序\n\
    SELECT * FROM sorting ORDER BY numberstring;\n```\n\n你会看到，字符串版本严格按照字母顺序从左到右排序，而使用了合适数据类型的版本则排序更合理。\n\
    \n| id | numberstring |\n| --- | --- |\n| 3 | 0 |\n| 8 | 1024 |\n| 5 | 16 |\n\
    | 2 | 32 |\n| 1 | -4 |\n| 4 | 4 |\n| 7 | -8 |\n| 6 | 8 |\n\n如果你有一个列，里面全是*本应是*数字的字符串，你可以使用\
    \ `cast` 函数：\n\n```sql\n--  按数字排序\nSELECT * FROM sorting ORDER BY cast(numberstring\
    \ as int);\n```\n\n`cast` 函数将数据类型转换为另一种类型。这里，类型被设置为 `INT`，这是 `INTEGER`（整数）的缩写。数据一旦被转换，就会相应排序。\n\
    \n对日期你也可以做同样的操作：\n\n```sql\n--  按日期排序\nSELECT * FROM sorting ORDER BY datevalue;\n\
    --  按字符串排序\nSELECT * FROM sorting ORDER BY datestring;\n--  按日期排序\nSELECT * FROM\
    \ sorting ORDER BY cast(datestring as date);\n```\n\n使用 `cast()`，你会看到结果按正确的日期顺序排列：\n\
    \n| id | dateString |\n| --- | --- |\n| 1 | 10 Dec 1815 |\n| 4 | 12 May 1820 |\n\
    | 3 | 13 Sep 1819 |\n| 5 | 15 Sep 1890 |\n| 8 | 16 Dec 1775 |\n| 2 | 29 Sep 1794\
    \ |\n| 6 | 30 Jun 1917 |\n| 7 | 7 Nov 1867 |\n\n稍后你会了解更多关于 `cast()` 的内容。\n\n`cast()`\
    \ 函数在面对看起来不像数字的值时往往反应过度。MySQL/MariaDB 和 SQLite 会返回 `0`。SQL Server 有一个 `try_cast()`\
    \ 函数，会返回 `NULL`。Oracle 有一个选项可以在错误时返回某个值。PostgreSQL 和 SQL Server 在使用 `cast()` 函数时会返回致命错误。PostgreSQL\
    \ 没有友好的替代方案，但编写一个函数很容易。\n\n### 大小写敏感性与排序规则\n\n如果你运行以下查询：\n\n```sql\nSELECT * FROM\
    \ sorting ORDER BY stringvalue;\n```\n\n你的结果可能因 DBMS 和数据库的不同而不同。例如：\n\n| id |\
    \ stringvalue |\n| --- | --- |\n| 1 | apple |\n| 6 | Apple |\n| 7 | banana |\n\
    | 5 | Banana |\n| 3 | cherry |\n| 2 | Cherry |\n| 4 | date |\n| 8 | Date |\n|\
    \ ~ 8 行 ~ |\n\n可能影响你结果的一个因素是数据是否被视为大小写敏感，也就是说，大写和小写字母是否被视为相同。DBMS 如何看待大小写字母以及带变音符号的字母，称为\
    \ `排序规则`（`collation`）。\n\n广义上讲，排序规则指的是如何处理同一字母的不同变体。这包括这些变体是否被视为同一字符，如果不是，哪个排在前面。\n\
    \n需要考虑的两种主要变体是：\n\n*   大小写：大写和小写\n*   变音符号：带变音符号的变体，例如法语中的 `e`, `é`, `ê`, `è`\n\
    \n你表中数据的排序方式受以下因素影响：\n\n*   DBMS 的默认排序规则\n*   表或列指定的排序规则（如果有的话）\n*   `ORDER BY`\
    \ 子句后可选的 `COLLATE` 子句\n\n大小写敏感性问题在过滤数据时也很重要，因为它影响字符串是否匹配。\n\n"
- fmt: '## Multiple Columns


    If you attempt to sort by a compound column (one which includes multiple values),
    you will have a few problems:


    ```sql

    SELECT id, firstname, lastname, fullname

    FROM sorting

    ORDER BY fullname;

    ```


    You’ll get a result, but probably not what you want:


    | id | firstname | lastname | fullname |

    | --- | --- | --- | --- |

    | 1 | Ada | Lovelace | Ada Lovelace |

    | 5 | Agatha | Christie | Agatha Christie |

    | 3 | Clara | Schumann | Clara Schumann |

    | 4 | Florence | Nightingale | Florence Nightingale |

    | 8 | Jane | Austen | Jane Austen |

    | 6 | Lena | Horne | Lena Horne |

    | 7 | Marie | Curie | Marie Curie |

    | 2 | Rose | de Freycinet | Rose de Freycinet |


    One of the many problems in combining data is that you can’t sort it properly
    without going through the extra effort of splitting it when the time comes.


    To sort the data properly, you need the name split into parts:


    | id | firstname | lastname | fullname |

    | --- | --- | --- | --- |

    | 8 | Jane | Austen | Jane Austen |

    | 5 | Agatha | Christie | Agatha Christie |

    | 7 | Marie | Curie | Marie Curie |

    | 2 | Rose | de Freycinet | Rose de Freycinet |

    | 6 | Lena | Horne | Lena Horne |

    | 1 | Ada | Lovelace | Ada Lovelace |

    | 4 | Florence | Nightingale | Florence Nightingale |

    | 3 | Clara | Schumann | Clara Schumann |


    ```sql

    SELECT id, firstname, lastname, fullname

    FROM sorting

    ORDER BY lastname, firstname;

    ```


    Back to the real data, you can do the same with details from the `paintings` table,
    where the columns are meant to be distinct:


    ```sql

    SELECT *

    FROM paintings

    ORDER BY price, title;

    ```


    This result makes more sense:


    | id | artistid | title | year | price |

    | --- | --- | --- | --- | --- |

    | 681 | 163 | Amerika (Baseball) | 1983 | 100.00 |

    | 1928 | 237 | Arrangement in Yellow and Grey: Effie Deans |   | 100.00 |

    | 1820 | 188 | Bacchus | 1638 | 100.00 |

    | 2367 | 188 | Battle of the Amazons | 1618 | 100.00 |

    | 2039 | 18 | Bords d’une rivière (Riverbanks) | 1904 | 100.00 |

    | 1269 | 67 | Bouquet of Spring Flowers (Spring Bouquet) | 1866 | 100.00 |

    | ~ 1273 rows ~ |


    Generally, the data is sorted by the first column (`price`); then, if there are
    two or more with the value, it is further sorted by the next column (`title`).
    The next column is sometimes referred to as the *tiebreaker*.


    What happens if there are also duplicates in the next column? There are two possibilities:


    *   If there are more `ORDER BY` columns, then the data is further sorted.


    *   If there are no more `ORDER BY` columns, *there is no guaranteed order*.


    SQL makes no promises about sort order apart from what you have specified in the
    `ORDER BY` clause. If you want to guarantee a distinct sort order, you need to
    finish the `ORDER BY` list with a column guaranteed to be distinct:


    ```sql

    SELECT *

    FROM paintings

    ORDER BY price, title, id;

    ```


    Here, `id` is the last resort; being a primary key, it cannot be duplicated, so
    its order is guaranteed. In some cases, you could also have used a nonprimary
    key column, such as `email` in the `customers` table, since, in that particular
    table, it is also required to be unique.


    ### Interdependence of Columns


    In the preceding example, the two main columns, `price` and `title`, are independent
    of each other.


    There is no technical reason why you can’t sort them the other way round:


    ```sql

    SELECT *

    FROM paintings

    ORDER BY title, price;

    ```


    By and large, the choice is a matter of taste. More accurately, the choice is
    a matter of who wants to know. For example, collectors might prefer to see a list
    in title order, while the sales manager might prefer price order.


    Sometimes, the columns are related.^(^([⁶](#fn6))) For example:


    | id | givenname | familyname | town | state |

    | --- | --- | --- | --- | --- |

    | 234 | Nat | Ering | Bald Hills | NSW |

    | 592 | Camilla | Highwater | Bald Hills | NSW |

    | 342 | Hugh | Morris | Bald Hills | NSW |

    | 91 | Cat | Nip | Bald Hills | NSW |

    | 308 | Noah | Vale | Bald Hills | NSW |

    | 10 | Terry | Fied | Bald Hills | NSW |

    | ~ 304 rows ~ |


    ```sql

    SELECT *

    FROM customers

    ORDER BY state, town;

    ```


    In this case, the `state` would almost always be sorted first, since it is regarded
    as a collection of towns: you generally order large groups before smaller groups.
    Again, you could have sorted the other way round, but most people wouldn’t expect
    that.


    There is an exception to the preceding discussion. Historically, we order people’s
    names by family name first:


    ```sql

    SELECT *

    FROM customers

    ORDER BY familyname, givenname;

    ```


    There is no technical reason for this, as the family name is not necessarily a
    grouping.


    ### Sort Direction on Multiple Columns


    If you are sorting by multiple columns, be aware that each column has its own
    sort direction. For example:


    ```sql

    SELECT *

    FROM paintings

    ORDER BY price, title DESC;

    ```


    The result may be a little confusing:


    | id | artistid | title | year | price |

    | --- | --- | --- | --- | --- |

    | 2121 | 252 | Winter Scene on a Canal |   | 100.00 |

    | 1938 | 135 | Un village (Le village de Maurecourt) |   | 100.00 |

    | 787 | 235 | Untitled (The Hotel Eden) | 1945 | 100.00 |

    | 1960 | 235 | Untitled (Paul and Virginia) | 1948 | 100.00 |

    | 1262 | 334 | The Young Beggar |   | 100.00 |

    | 173 | 355 | The Toreador | 1873 | 100.00 |

    | ~ 1273 rows ~ |


    This reverses the title order, but the main order, price, is still ascending.
    If you include the default `ASC`, it is more obvious:


    ```sql

    SELECT *

    FROM paintings

    ORDER BY price ASC, title DESC;

    ```


    However, nobody writes it this way, and it could give the false impression that
    the `ASC` keyword is actually doing something different. It is better to get used
    to the default behavior.


    If you really want to totally reverse the data, you would need to use `DESC` for
    both columns:


    ```sql

    SELECT *

    FROM paintings

    ORDER BY price DESC, title DESC;

    ```


    This now gives you the expected order.


    | id | artistid | title | year | price |

    | --- | --- | --- | --- | --- |

    | 379 | 111 | Woman with a Yellow Bodice | 1899 |   |

    | 209 | 192 | Woman with a Mandolin | 1760 |   |

    | 461 | 39 | Woman with a Basket |   |   |

    | 1438 | 252 | Winter landscape with a frozen river and figures | 1620 |   |

    | 1281 | 266 | Village Street in Auvers | 1890 |   |

    | 2454 | 266 | Vegetable Gardens in Montmartre | 1887 |   |

    | ~ 1273 rows ~ |


    Note that in this example, the `NULL`s are sorted last.


    Remember, each column has its own independent sort direction.'
