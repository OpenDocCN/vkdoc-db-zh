    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 1222 | 147 | Haymakers Resting | 125.00 | … | 147 | Pissarro | … |

    | 251 | 40 | Death in the Sickroom | 105.00 | … | 40 | Munch | … |

    | 1560 | 293 | Indefinite Divisibility | 125.00 | … | 293 | Tanguy | … |

    | 1836 | 273 | Male and Female | 105.00 | … | 273 | Pollock | … |

    | 575 | 18 | Corner of Quarry | 125.00 | … | 18 | Cézanne | … |

    | 1353 | 67 | Nini in the Garden | 105.00 | … | 67 | Renoir | … |

    | ~ 543 rows ~ |


    Using the older syntax, you would have to append the filter to the existing `WHERE`
    clause:


    ```

    SELECT *

    FROM paintings,artists

    WHERE paintings.artistid=artists.id

    AND price<150;

    ```


    Again, SQL will give the same results using the same process internally, but the
    newer syntax makes your own intentions clear.'
  trans: '## 连接如何工作


    要理解连接，你需要先理解关于表如何关联的一些基本概念。当然，SQL 并非真的要求你理解其内部机制，但如果你不了解，连接操作可能会变得非常棘手。


    在第 2 章中，设计数据库的一些核心要点如下：


    *   一张表包含单一类型对象的数据。因此，例如，`paintings` 表中不应有 `artists` 的详情，而 `books` 表中也不应有 `authors`
    的详情。

    *   多行数据不应相同。因此，例如，同一位画家的两幅画作不应都包含画家的姓名，同一作者的两本书也不应有相同的作者姓名。


    实际上，这两点并非独立，而是同一原则的两种表现形式：一张表描述单一类型的数据。如果你试图包含不相关的数据，最终会导致数据重复。


    正确的解决方案是将相关数据放入其自己的表中，并使用一个 `外键` 将一张表链接到另一张表的 `主键`，如图 6-1 所示。


    ![](img/601766_1_En_6_Fig1_HTML.jpg)


    这两张表分别描绘了画作和艺术家的信息。画作表和艺术家表分别有 8 行和 5 行。画作表的外键与艺术家表的主键相关联。


    图 6-1


    表之间的关系


    当时机到来，下一步就是将这些表连接成一个单一的虚拟表。连接两张表，就是将一张表中的一行复制到另一张表中匹配行的末尾，如图 6-2 所示。


    ![](img/601766_1_En_6_Fig2_HTML.jpg)


    通过连接画作表和艺术家表形成一个表。结果表有 7 行 5 列。列标题是 P K、paintings、F K、P K 和 artists。


    图 6-2


    连接后的表


    然后，你可以使用生成的虚拟表从两张表中读取数据。


    你可能会注意到连接的一些重要特性：


    *   任一张表中都可能缺失某些行。稍后，你将看到如何包含这些缺失的行。

    *   一些关联的行会被复制。如果这是一张真实的表，你会在数据管理上遇到各种问题，但对于虚拟表来说，这完全没问题且很方便。


    还有一个重要特性，你稍后会在 SQL 本身中看到：


    *   仅仅指定要连接的表是不够的；你还需要指定哪一列与哪一列匹配。虽然通常你会将外键连接到主键，但 SQL 允许更复杂的连接。


    一旦连接了表，你就可以使用 `SELECT` 语句从结果中读取数据。


    为了说明这个过程，我们将使用以下连接：


    ```sql

    SELECT *

    FROM paintings JOIN artists ON paintings.artistid=artists.id;

    ```


    你会得到类似这样的结果，包含两张表的所有列：


    | id | artistid | title | … | id | familyname | … |

    | --- | --- | --- | --- | --- | --- | --- |

    | 1222 | 147 | Haymakers Resting | … | 147 | Pissarro | … |

    | 251 | 40 | Death in the Sickroom | … | 40 | Munch | … |

    | 2190 | 135 | Cache-cache (Hide-and-Seek) | … | 135 | Morisot | … |

    | 1560 | 293 | Indefinite Divisibility | … | 293 | Tanguy | … |

    | 172 | 156 | Girl with Racket and Shuttlecock | … | 156 | Chardin | … |

    | 2460 | 83 | The Procession to Calvary | … | 83 | Bruegel | … |

    | ~ 1228 行 ~ |


    具体细节将在后续讲解。现在，我们先看一个包含合并表数据的结果集。


    之前的查询结果阐明了上述所有要点。尤其要注意，一些行缺失了。我们稍后会探讨这个问题。


    ### 连接表


    基本的连接是通过 `JOIN ... ON` 子句实现的：


    ```sql

    SELECT *

    FROM paintings JOIN artists ON paintings.artistid=artists.id;

    ```


    你会注意到一些重复的数据。例如，梵高有 57 幅画作。这意味着你会得到 57 份他的姓名、国籍和日期信息的副本。


    如果这是一张真实表，这将是非常糟糕的设计标志。你有 57 次可能犯错的机会，还可能引入其他差异。这就是为什么将此类数据保存在单独的表中非常重要，在那里数据只输入一次并可以得到妥善维护。


    然而，连接产生的只是一张*虚拟*表：重复的数据便于阅读，且永远不会被存储在任何地方。


    请注意，连接可以用不同的方式书写。因为重点是画作，所以先写 `paintings` 表在视觉上更合理。不过，你也可以以相反的顺序写这两张表：


    ```sql

    SELECT *

    FROM artists JOIN paintings ON paintings.artistid=artists.id;

    ```


    这将产生完全相同的结果，只是列的顺序会不同。


    这同样适用于 `ON` 子句：以哪种顺序书写并不重要，因为匹配结果是一样的。


    目前，你先写哪张表无关紧要。不过，稍后当涉及到 `JOIN` 子句的变体时，你将需要*记住*顺序。


    ### 替代语法


    `JOIN` 关键字并非最初 SQL 标准的一部分。相反，你会使用这种语法：


    ```sql

    SELECT *

    FROM paintings,artists WHERE paintings.artistid=artists.id;

    ```


    也就是说，`JOIN` 被逗号代替，`ON` 被 `WHERE` 代替。


    从技术上讲，发生的是生成了 `paintings` 和 `artists` 所有可能的组合（这称为 `交叉连接`），然后只筛选出画家与画作匹配的那些行。实际上，数据库管理系统从未以这种低效的方式执行。


    这是一种非常古老的语法，你只会看到那些尚未适应新语法的顽固派使用它。在内部，SQL 会使用与 `JOIN` 语法相同的过程生成相同的结果。


    你*应该总是*使用更新的语法：


    *   旧语法会将你标识为顽固派之一。

    *   新语法更灵活，在考察连接类型时你会看到这一点。正如你稍后将看到的，前面的语法仅限于所谓的 `内连接`。

    *   新语法使得使用额外的 `WHERE` 子句筛选器更容易。


    关于最后一点，假设你只想要较便宜的画作。使用 `JOIN` 子句，你可以运行


    ```sql

    SELECT *

    FROM paintings JOIN artists ON paintings.artistid=artists.id

    WHERE price<150;

    ```


    以下是较便宜的画作：


    | id | artistid | title | price | … | id | familyname | … |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 1222 | 147 | Haymakers Resting | 125.00 | … | 147 | Pissarro | … |

    | 251 | 40 | Death in the Sickroom | 105.00 | … | 40 | Munch | … |

    | 1560 | 293 | Indefinite Divisibility | 125.00 | … | 293 | Tanguy | … |

    | 1836 | 273 | Male and Female | 105.00 | … | 273 | Pollock | … |

    | 575 | 18 | Corner of Quarry | 125.00 | … | 18 | Cézanne | … |

    | 1353 | 67 | Nini in the Garden | 105.00 | … | 67 | Renoir | … |

    | ~ 543 行 ~ |


    使用旧语法，你必须将筛选条件附加到现有的 `WHERE` 子句上：


    ```sql

    SELECT *

    FROM paintings,artists

    WHERE paintings.artistid=artists.id

    AND price<150;

    ```


    同样，SQL 在内部会使用相同的过程给出相同的结果，但新语法使你的意图更加清晰。'
- fmt: '# SQL查询：结果选择与连接类型


    ## Selecting the Results


    你可以总是使用`SELECT *`来查看情况：


    ```sql

    SELECT *

    FROM paintings JOIN artists ON paintings.artistid=artists.id;

    ```


    然而，你可能希望更选择性地包含列。例如，你可能会选择画作的`id`、`title`，以及艺术家的`givenname`和`familyname`：


    ```sql

    --  This won''t work:

    SELECT

    id,

    title,

    givenname, familyname

    FROM paintings JOIN artists

    ON paintings.artistid=artists.id;

    ```


    但它还不能工作。


    你得到的错误信息将指向一个`ambiguous`列。在单个表中，不能有两个同名的列，但当你连接两个不同的表时，总是存在这种可能性。


    解决方案是包含表名作为前缀：


    ```sql

    SELECT

    paintings.id,

    title,

    givenname, familyname

    FROM paintings JOIN artists ON paintings.artistid=artists.id;

    ```


    这样现在就能工作了，因为你已经`qualified`了那个麻烦的名称；也就是说，你指明了是哪一个。


    | id | title | givenname | familyname |

    | --- | --- | --- | --- |

    | 1222 | Haymakers Resting | Camille | Pissarro |

    | 251 | Death in the Sickroom | Edvard | Munch |

    | 2190 | Cache-cache (Hide-and-Seek) | Berthe | Morisot |

    | 1560 | Indefinite Divisibility | Yves | Tanguy |

    | 172 | Girl with Racket and Shuttlecock | Jean-Baptiste-Siméon | Chardin |

    | 2460 | The Procession to Calvary | Pieter the Elder | Bruegel |

    | ~ 1228 rows ~ |


    表示法`table.column`被称为限定名，可以看作是列的全名。


    注意，在结果集中，列名仍然是更简单的非限定名。


    虽然，如你所见，只有模糊的名称才需要限定，但你可以限定其余的列：


    ```sql

    SELECT

    paintings.id,

    paintings.title,

    artists.givenname, artists.familyname

    FROM paintings JOIN artists ON paintings.artistid=artists.id;

    ```


    你将得到完全相同的结果。


    事实上，建议你限定所有的列。这是因为：

    *   你可以很容易地看出哪个表拥有原始数据。

    *   更复杂的连接将更容易管理。

    *   如果有人决定在另一个表中添加一个同名的列，你无论如何都需要限定它。


    从这里开始，我们将限定所有名称。


    ## Table Aliases


    如果你打算完全限定每个列名，它很快就会变得非常繁琐。它也使得语句更难阅读，因为你需要费力地浏览多个冗余的表名。你可以通过使用表`alias`来简化语句，它是表的临时昵称。这类似于计算列值时使用的列别名。


    要使用表别名：

    *   使用`AS`关键字为表起别名。

    *   使用别名*代替*原始名称。


    请注意，在Oracle中，你将不得不在*不使用*`AS`关键字的情况下为表起别名。


    例如：


    ```sql

    --  Not Oracle

    SELECT

    p.id,

    p.title,

    a.givenname, a.familyname

    FROM paintings AS p JOIN artists AS a ON p.artistid=a.id;

    --  Oracle, as well as the others:

    SELECT

    p.id,

    p.title,

    a.givenname, a.familyname

    FROM paintings p JOIN artists a ON p.artistid=a.id;

    ```


    如果你不使用Oracle，我们建议你总是使用`AS`来使你的代码更具可读性并减少错误；对于Oracle，你没有这个选项。


    使用表别名有很多原因，但在本例中，纯粹是为了方便。将表名简化为一个字母更容易输入，也*更*容易扫描。


    记住`FROM`在`SELECT`之前被求值，要注意一旦设置了表别名，你就必须在语句的其余部分使用它：你不能将原始名称与别名混合使用。


    ## Developing a Price List


    我们在使用计算时已经开始构建价格列表。使用连接，我们可以轻松地开发一个：


    ```sql

    SELECT

    p.id,

    p.title,

    a.givenname||'' ''||a.familyname AS artist,

    a.nationality,

    p.price, p.price*0.1 AS tax, p.price*1.1 AS total

    FROM paintings AS p JOIN artists AS a ON p.artistid=a.id;

    ```


    你应该得到相同的结果：


    | id | title | artist | price | tax | inc | nationality |

    | --- | --- | --- | --- | --- | --- | --- |

    | 1222 | Haymakers Restin … | Camille Pissarro … | 125.00 | 12.500 | 137.500 |
    French |

    | 251 | Death in the Sic … | Edvard Munch … | 105.00 | 10.500 | 115.500 | Norwegian
    |

    | 2190 | Cache-cache (Hid … | Berthe Morisot … | 185.00 | 18.500 | 203.500 | French
    |

    | 1560 | Indefinite Divis … | Yves Tanguy … | 125.00 | 12.500 | 137.500 | French
    |

    | 172 | Girl with Racket … | Jean-Baptiste-Si … | 195.00 | 19.500 | 214.500 |
    French |

    | 2460 | The Procession t … | Pieter the Elder … | 165.00 | 16.500 | 181.500 |
    Flemish |

    | ~ 1228 rows ~ |


    当然，除了有一些行仍然缺失。


    你也可以添加`p.year`或其他列，无需额外工作，因为它们在连接中总是存在的。


    ## Join Types


    到目前为止，我们忽略了有些行缺失的事实。


    原因很简单。一些画作没有匹配的艺术家，一些艺术家没有匹配的画作。


    要找到未匹配的（匿名）画作，你可以找到`NULL`的`artistid`：


    ```sql

    SELECT *

    FROM paintings

    WHERE artistid IS NULL;

    ```


    这会给你匿名画作：


    | id | title | artistid | … |

    | --- | --- | --- | --- |

    | 1989 | Portrait of Trabuc |   | … |

    | 1179 | The Green Vineyard |   | … |

    | 1774 | The vase with 12 sunflowers |   | … |

    | 625 | Self-portrait |   | … |

    | 908 | Village Street and Stairs with Figures |   | … |

    | 2220 | Noon: Rest from Work (After Millet) |   | … |

    | ~ 45 rows ~ |


    找到未匹配的艺术家则有点棘手，因为匹配只在`paintings`表中定义：

    *   找到那些*确实*有`artistid`的`artistid`画作。

    *   找到其`id`不在上述列表中的艺术家。


    ```sql

    SELECT * FROM artists

    WHERE id NOT IN (

    SELECT artistid FROM paintings WHERE artistid IS NOT NULL

    );

    ```


    这会给你一个我们尚未包含的艺术家列表：


    | id | givenname | familyname | … |

    | --- | --- | --- | --- |

    | 37 | Francisco | de Zurbarán | … |

    | 127 | Pietro | Cavallini | … |

    | 38 | Altichiero | Da Verona | … |

    | 164 | Alonso | Cano | … |

    | 23 | Paul | Klee | … |

    | 338 | Gentile | da Fabriano | … |

    | ~ 19 rows ~ |


    当你连接两个表时，默认情况下，只包含一个表中与另一个表中有匹配行的那些行。在我们的例子中，由于一些画作有`NULL artistid`，SQL无法在`artists`表中为它们找到匹配项。未匹配的画作被排除在外。这被称为`INNER
    JOIN`，是默认的连接方式。


    这并不总是你想要的，所以SQL提供了多种连接类型：

    *   `INNER JOIN`只返回匹配的行。这是默认的。

    *   `OUTER JOIN`类型返回匹配的行以及一些未匹配的行。有三种不同的`OUTER JOIN`类型。

    *   `CROSS JOIN`返回子行和父行的所有可能组合。你很少单独想要`CROSS JOIN`，但它有时用于特殊情况。


    在这里，我们将探讨各种类型的连接。为了使它更容易，我们将在`artists`和`paintings`表的微型版本上运行示例，称为`miniartists`和`minipaintings`。这些是你在图[6-1](#601766_1_En_6_Chapter.xhtml#Fig1)中看到的表。'
  raw: '### Selecting the Results


    You can always use `SELECT *` to see what’s going on:


    ```

    SELECT *

    FROM paintings JOIN artists ON paintings.artistid=artists.id;

    ```


    However, you will probably want to be more selective about which columns to include.
    For example, you might choose the painting’s `id`, `title`, and the artist’s `givenname`
    and `familyname`:


    ```

    --  This won''t work:

    SELECT

    id,

    title,

    givenname, familyname

    FROM paintings JOIN artists

    ON paintings.artistid=artists.id;

    ```


    but it won’t work yet.


    The error message you get will refer to an **ambiguous** column. In a single table,
    you can’t have two columns with the same name, but when you join two different
    tables, there is always that possibility.


    The solution is to include the table’s name as a prefix:


    ```

    SELECT

    paintings.id,

    title,

    givenname, familyname

    FROM paintings JOIN artists ON paintings.artistid=artists.id;

    ```


    This will now work, since you have **qualified** the troublesome name; that is,
    you have said which one.


    | id | title | givenname | familyname |

    | --- | --- | --- | --- |

    | 1222 | Haymakers Resting | Camille | Pissarro |

    | 251 | Death in the Sickroom | Edvard | Munch |

    | 2190 | Cache-cache (Hide-and-Seek) | Berthe | Morisot |

    | 1560 | Indefinite Divisibility | Yves | Tanguy |

    | 172 | Girl with Racket and Shuttlecock | Jean-Baptiste-Siméon | Chardin |

    | 2460 | The Procession to Calvary | Pieter the Elder | Bruegel |

    | ~ 1228 rows ~ |


    The notation `table.column` is referred to as a qualified name and can be thought
    of as the full name of a column.


    Note that in the result set, the column name is still the simpler unqualified
    name.


    Although, as you see, only the ambiguous names need to be qualified, you can qualify
    the rest of the columns:


    ```

    SELECT

    paintings.id,

    paintings.title,

    artists.givenname, artists.familyname

    FROM paintings JOIN artists ON paintings.artistid=artists.id;

    ```


    You will get exactly the same results.


    In fact, it is recommended that you do qualify all of the columns. This is because


    *   You can easily see which table has the original data.


    *   More complex joins will be easier to manage.


    *   If someone has decided to add a column with the same name to the other table,
    you’ll need to qualify it anyway.


    We’ll qualify all names from here on.


    ### Table Aliases


    If you’re going to fully qualify each column name, it gets very tedious very quickly.
    It also makes the statement more difficult to read as you need to trudge through
    multiple redundant table names. You can simplify the statement by using a table
    **alias**, which is a temporary nickname for a table. This is similar to a column
    alias used when calculating column values.


    To use table aliases


    *   Alias the table with the `AS` keyword.


    *   Use the alias *instead* of the original name.


    Note that in Oracle, however, you will have to alias the tables *without* the
    `AS` keyword.


    For example:


    ```

    --  Not Oracle

    SELECT

    p.id,

    p.title,

    a.givenname, a.familyname

    FROM paintings AS p JOIN artists AS a ON p.artistid=a.id;

    --  Oracle, as well as the others:

    SELECT

    p.id,

    p.title,

    a.givenname, a.familyname

    FROM paintings p JOIN artists a ON p.artistid=a.id;

    ```


    If you’re not using Oracle, we recommend that you always use `AS` to make your
    code more readable and to reduce error; with Oracle, you don’t have the option.


    There are many reasons to use table aliases, but in this case, it is purely for
    convenience. Reducing the table name to a single letter is easier to type and
    *much* easier to scan.


    Remembering that `FROM` is evaluated before `SELECT`, be aware that once you set
    a table alias, you are committed to using it for the rest of the statement: you
    cannot mix original names with aliased names.


    ## Developing a Price List


    We have already started building a price list when working with calculations.
    Using joins, we can develop one easily:


    ```

    SELECT

    p.id,

    p.title,

    a.givenname||'' ''||a.familyname AS artist,

    a.nationality,

    p.price, p.price*0.1 AS tax, p.price*1.1 AS total

    FROM paintings AS p JOIN artists AS a ON p.artistid=a.id;

    ```


    You should get the same results:


    | id | title | artist | price | tax | inc | nationality |

    | --- | --- | --- | --- | --- | --- | --- |

    | 1222 | Haymakers Restin … | Camille Pissarro … | 125.00 | 12.500 | 137.500 |
    French |

    | 251 | Death in the Sic … | Edvard Munch … | 105.00 | 10.500 | 115.500 | Norwegian
    |

    | 2190 | Cache-cache (Hid … | Berthe Morisot … | 185.00 | 18.500 | 203.500 | French
    |

    | 1560 | Indefinite Divis … | Yves Tanguy … | 125.00 | 12.500 | 137.500 | French
    |

    | 172 | Girl with Racket … | Jean-Baptiste-Si … | 195.00 | 19.500 | 214.500 |
    French |

    | 2460 | The Procession t … | Pieter the Elder … | 165.00 | 16.500 | 181.500 |
    Flemish |

    | ~ 1228 rows ~ |


    Except, of course, some of the rows are still missing.


    You can also add `p.year` or other columns without extra work as they are always
    present in the join.


    ## Join Types


    We have so far ignored the fact that some of the rows are missing.


    The reason is simple enough. Some paintings don’t have a matching artist, and
    some artists don’t have a matching painting.


    To find the unmatched (anonymous) paintings, you can find the `NULL` artist ids:


    ```

    SELECT *

    FROM paintings

    WHERE artistid IS NULL;

    ```


    This gives you the anonymous paintings:


    | id | title | artistid | … |

    | --- | --- | --- | --- |

    | 1989 | Portrait of Trabuc |   | … |

    | 1179 | The Green Vineyard |   | … |

    | 1774 | The vase with 12 sunflowers |   | … |

    | 625 | Self-portrait |   | … |

    | 908 | Village Street and Stairs with Figures |   | … |

    | 2220 | Noon: Rest from Work (After Millet) |   | … |

    | ~ 45 rows ~ |


    To find the unmatched artists is a bit trickier, since the match is only defined
    in the `paintings` table:


    *   Find the `artistid` paintings which *do* have an `artistid`.


    *   Find the artists whose `id` isn’t in the above.


    ```

    SELECT * FROM artists

    WHERE id NOT IN (

    SELECT artistid FROM paintings WHERE artistid IS NOT NULL

    );

    ```


    This gives you a list of artists whose paintings we haven’t (yet) included:


    | id | givenname | familyname | … |

    | --- | --- | --- | --- |

    | 37 | Francisco | de Zurbarán | … |

    | 127 | Pietro | Cavallini | … |

    | 38 | Altichiero | Da Verona | … |

    | 164 | Alonso | Cano | … |

    | 23 | Paul | Klee | … |

    | 338 | Gentile | da Fabriano | … |

    | ~ 19 rows ~ |


    When you join two tables, by default, only those rows in one table with a matching
    row in the other are included. In our case, since some of the paintings have a
    `NULL artistid`, SQL can’t find a match for them in the `artists` table. The unmatched
    paintings are left out. This is called an **INNER JOIN** and is the default.


    This isn’t always what you want, so SQL provides a number of join types:


    *   The `INNER JOIN` returns *only* the matched rows. This is the default.


    *   The `OUTER JOIN` types return the matched rows as well as some unmatched rows.
    There are three different `OUTER JOIN` types.


    *   The `CROSS JOIN` returns all the possible combinations of child and parent
    rows. You very rarely want the `CROSS JOIN` by itself, but it is sometimes used
    in special cases.


    Here, we’ll explore the various types of joins. To make it easier, we’ll run the
    examples on miniature versions of the `artists` and `paintings` tables, called
    `miniartists` and `minipaintings`. These are the tables you saw in Figure [6-1](#601766_1_En_6_Chapter.xhtml#Fig1).'
  trans: '# SQL 查询：结果选择与连接类型


    ## 选择结果


    你总是可以使用`SELECT *`来查看情况：


    ```sql

    SELECT *

    FROM paintings JOIN artists ON paintings.artistid=artists.id;

    ```


    但是，你可能希望更有选择性地包含列。例如，你可能会选择画作的`id`、`title`，以及艺术家的`givenname`和`familyname`：


    ```sql

    --  这样不行：

    SELECT

    id,

    title,

    givenname, familyname

    FROM paintings JOIN artists

    ON paintings.artistid=artists.id;

    ```


    但它还不能工作。


    你得到的错误信息将指向一个`ambiguous`（模糊的）列。在单个表中，不能有两个同名的列，但当你连接两个不同的表时，总是存在这种可能性。


    解决方案是包含表名作为前缀：


    ```sql

    SELECT

    paintings.id,

    title,

    givenname, familyname

    FROM paintings JOIN artists ON paintings.artistid=artists.id;

    ```


    这样现在就能工作了，因为你已经`qualified`（限定）了那个麻烦的名称；也就是说，你指明了是哪一个。


    | id | title | givenname | familyname |

    | --- | --- | --- | --- |

    | 1222 | Haymakers Resting | Camille | Pissarro |

    | 251 | Death in the Sickroom | Edvard | Munch |

    | 2190 | Cache-cache (Hide-and-Seek) | Berthe | Morisot |

    | 1560 | Indefinite Divisibility | Yves | Tanguy |

    | 172 | Girl with Racket and Shuttlecock | Jean-Baptiste-Siméon | Chardin |

    | 2460 | The Procession to Calvary | Pieter the Elder | Bruegel |

    | ~ 1228 rows ~ |


    表示法`table.column`被称为限定名，可以看作是列的全名。


    注意，在结果集中，列名仍然是更简单的非限定名。


    虽然，如你所见，只有模糊的名称才需要限定，但你可以限定其余的列：


    ```sql

    SELECT

    paintings.id,

    paintings.title,

    artists.givenname, artists.familyname

    FROM paintings JOIN artists ON paintings.artistid=artists.id;

    ```


    你将得到完全相同的结果。


    事实上，建议你限定所有的列。这是因为：

    *   你可以很容易地看出哪个表拥有原始数据。

    *   更复杂的连接将更容易管理。

    *   如果有人决定在另一个表中添加一个同名的列，你无论如何都需要限定它。


    从这里开始，我们将限定所有名称。


    ## 表别名


    如果你打算完全限定每个列名，它很快就会变得非常繁琐。它也使得语句更难阅读，因为你需要费力地浏览多个冗余的表名。你可以通过使用表`alias`（别名）来简化语句，它是表的临时昵称。这类似于计算列值时使用的列别名。


    要使用表别名：

    *   使用`AS`关键字为表起别名。

    *   使用别名*代替*原始名称。


    请注意，在 Oracle 中，你将不得不在*不使用*`AS`关键字的情况下为表起别名。


    例如：


    ```sql

    --  非 Oracle 数据库

    SELECT

    p.id,

    p.title,

    a.givenname, a.familyname

    FROM paintings AS p JOIN artists AS a ON p.artistid=a.id;

    --  Oracle 数据库，以及其他数据库：

    SELECT

    p.id,

    p.title,

    a.givenname, a.familyname

    FROM paintings p JOIN artists a ON p.artistid=a.id;

    ```


    如果你不使用 Oracle，我们建议你总是使用`AS`来使你的代码更具可读性并减少错误；对于 Oracle，你没有这个选项。


    使用表别名有很多原因，但在本例中，纯粹是为了方便。将表名简化为一个字母更容易输入，也*更*容易扫描。


    记住`FROM`在`SELECT`之前被求值，要注意一旦设置了表别名，你就必须在语句的其余部分使用它：你不能将原始名称与别名混合使用。


    ## 开发价格列表


    我们在使用计算时已经开始构建价格列表。使用连接，我们可以轻松地开发一个：


    ```sql

    SELECT

    p.id,

    p.title,

    a.givenname||'' ''||a.familyname AS artist,

    a.nationality,

    p.price, p.price*0.1 AS tax, p.price*1.1 AS total

    FROM paintings AS p JOIN artists AS a ON p.artistid=a.id;

    ```


    你应该得到相同的结果：


    | id | title | artist | price | tax | inc | nationality |

    | --- | --- | --- | --- | --- | --- | --- |

    | 1222 | Haymakers Restin … | Camille Pissarro … | 125.00 | 12.500 | 137.500 |
    French |

    | 251 | Death in the Sic … | Edvard Munch … | 105.00 | 10.500 | 115.500 | Norwegian
    |

    | 2190 | Cache-cache (Hid … | Berthe Morisot … | 185.00 | 18.500 | 203.500 | French
    |

    | 1560 | Indefinite Divis … | Yves Tanguy … | 125.00 | 12.500 | 137.500 | French
    |

    | 172 | Girl with Racket … | Jean-Baptiste-Si … | 195.00 | 19.500 | 214.500 |
    French |

    | 2460 | The Procession t … | Pieter the Elder … | 165.00 | 16.500 | 181.500 |
    Flemish |

    | ~ 1228 rows ~ |


    当然，除了有一些行仍然缺失。


    你也可以添加`p.year`或其他列，无需额外工作，因为它们在连接中总是存在的。


    ## 连接类型


    到目前为止，我们忽略了有些行缺失的事实。


    原因很简单。一些画作没有匹配的艺术家，一些艺术家没有匹配的画作。


    要找到未匹配的（匿名）画作，你可以找到`artistid`为`NULL`的记录：


    ```sql

    SELECT *

    FROM paintings

    WHERE artistid IS NULL;

    ```


    这会给你匿名画作：


    | id | title | artistid | … |

    | --- | --- | --- | --- |

    | 1989 | Portrait of Trabuc |   | … |

    | 1179 | The Green Vineyard |   | … |

    | 1774 | The vase with 12 sunflowers |   | … |

    | 625 | Self-portrait |   | … |

    | 908 | Village Street and Stairs with Figures |   | … |

    | 2220 | Noon: Rest from Work (After Millet) |   | … |

    | ~ 45 rows ~ |


    找到未匹配的艺术家则有点棘手，因为匹配只在`paintings`表中定义：

    *   找到那些在`paintings`表中*确实*存在的`artistid`。

    *   找到其`id`不在上述列表中的艺术家。


    ```sql

    SELECT * FROM artists

    WHERE id NOT IN (

    SELECT artistid FROM paintings WHERE artistid IS NOT NULL

    );

    ```


    这会给你一个我们尚未包含的艺术家列表：


    | id | givenname | familyname | … |

    | --- | --- | --- | --- |

    | 37 | Francisco | de Zurbarán | … |

    | 127 | Pietro | Cavallini | … |

    | 38 | Altichiero | Da Verona | … |

    | 164 | Alonso | Cano | … |

    | 23 | Paul | Klee | … |

    | 338 | Gentile | da Fabriano | … |

    | ~ 19 rows ~ |


    当你连接两个表时，默认情况下，只包含一个表中与另一个表中有匹配行的那些行。在我们的例子中，由于一些画作有`NULL artistid`，SQL 无法在`artists`表中为它们找到匹配项。未匹配的画作被排除在外。这被称为`INNER
    JOIN`（内连接），是默认的连接方式。


    这并不总是你想要的，所以 SQL 提供了多种连接类型：

    *   `INNER JOIN`（内连接）只返回匹配的行。这是默认的。

    *   `OUTER JOIN`（外连接）类型返回匹配的行以及一些未匹配的行。有三种不同的`OUTER JOIN`类型。

    *   `CROSS JOIN`（交叉连接）返回子行和父行的所有可能组合。你很少单独想要`CROSS JOIN`，但它有时用于特殊情况。


    在这里，我们将探讨各种类型的连接。为了使它更容易，我们将在`artists`和`paintings`表的微型版本上运行示例，称为`miniartists`和`minipaintings`。这些是你在图
    6-1 中看到的表。'
- fmt: '### The INNER JOIN


    The default join type is the `INNER JOIN`:


    | id | title | artistid | id | fullname |

    | --- | --- | --- | --- | --- |

    | 1 | The Bathers | 2 | 2 | Pierre-Auguste Renoir |

    | 2 | Starry Night | 1 | 1 | Vincent Van Gogh |

    | 3 | Snowstorm | 3 | 3 | Joseph Turner |

    | 4 | Danseuse | 2 | 2 | Pierre-Auguste Renoir |

    | 5 | Moonlight | 3 | 3 | Joseph Turner |

    | 7 | The Woman of Arles | 1 | 1 | Vincent Van Gogh |

    | 8 | On the Terrace | 2 | 2 | Pierre-Auguste Renoir |


    ```sql

    SELECT *

    FROM minipaintings AS p

    INNER JOIN miniartists AS a ON p.artistid=a.id;

    ```


    The only difference between this and the previous examples is the word `INNER`,
    and you can see that it’s not really doing anything special. Being the default,
    you can leave it out altogether.


    Remember, with an `INNER JOIN`, you can write the tables in either order. You’ll
    get the same results, but the column order may change.


    ### The LEFT OUTER JOIN and RIGHT OUTER JOIN


    An `OUTER JOIN` is used to include unmatched rows. It *always includes* the `INNER
    JOIN`.


    As there are two tables involved, you have a choice of whether to include the
    unmatched rows of the first or second table. If you really want both, you would
    use a `FULL OUTER JOIN`.


    However, you probably want the unmatched rows from the `minipaintings`, that is,
    the rows from the `minipaintings` table which have no matching rows from the `miniartists`
    table. In English, that’s the anonymous paintings.


    As mentioned earlier, you can write the tables in either order. However, when
    it comes to `OUTER JOIN`s, you will need to remember which you wrote first.


    If you want to include the `unmatched` minipaintings table rows, you change the
    `INNER JOIN` to a corresponding `LEFT OUTER JOIN` or `RIGHT OUTER JOIN`.


    If you’re working with SQLite, you’ll find that it doesn’t support `RIGHT JOIN`.
    They recommend you just change the two tables round till you get what you want
    with a `LEFT JOIN`.


    You can still follow the rest of this, but ignore the samples with `RIGHT JOIN`.


    Putting the `minipaintings` table on the left:


    ```sql

    SELECT *

    FROM minipaintings AS p LEFT OUTER JOIN miniartists AS a

    ON p.artistid=a.id;

    ```


    You’ll see that you now get the anonymous painting missing from the inner join:


    | id | title | artistid | id | fullname |

    | --- | --- | --- | --- | --- |

    | 1 | The Bathers | 2 | 2 | Pierre-Auguste Renoir |

    | 2 | Starry Night | 1 | 1 | Vincent Van Gogh |

    | 3 | Snowstorm | 3 | 3 | Joseph Turner |

    | 4 | Danseuse | 2 | 2 | Pierre-Auguste Renoir |

    | 5 | Moonlight | 3 | 3 | Joseph Turner |

    | 6 | The Green Vineyard |   |   |   |

    | 7 | The Woman of Arles | 1 | 1 | Vincent Van Gogh |

    | 8 | On the Terrace | 2 | 2 | Pierre-Auguste Renoir |


    Putting the `minipaintings` table on the right:


    ```sql

    SELECT *

    FROM miniartists AS a RIGHT OUTER JOIN minipaintings AS p

    ON a.id=p.artistid;

    ```


    That is, you select `LEFT` or `RIGHT` depending on whether the table you want
    is on the left or right of the `JOIN` keyword. The `ON artists.id=paintings.artistid`
    clause can still be written either way.


    As with the `INNER JOIN`, the `OUTER` word is also optional, so you can omit it:


    ```sql

    --  minipaintings Table on LEFT

    SELECT *

    FROM minipaintings AS p LEFT JOIN artists AS a

    ON p.artistid=a.id;

    --  paintings Table on RIGHT

    SELECT *

    FROM miniartists AS a RIGHT JOIN minipaintings AS p

    ON paintings.artistid=artists.id;

    ```


    Where there is an unmatched row, the corresponding data will be filled with `NULL`s.


    ### The “Preferred” Outer Join


    In the working sample, we used `OUTER JOIN` to include all of the paintings, but
    not the artists. That’s partly because we’re more interested in the paintings,
    since that’s what we’re selling. It’s also because of the relationship between
    the tables.


    Note that the `minipaintings` table has a foreign key referring to the `miniartists`,
    but not the other way round. We say that there is a `one-to-many` relationship
    between the tables. One artist can have many paintings, or, if you prefer, many
    paintings can reference the one artist.


    Sometimes, we say that the `minipaintings` table is a `child` table, while the
    `miniartists` table is a `parent` table. In SQL, a child table references the
    parent table, but not the other way.


    When you join two tables, you normally want the child outer join. However, you
    can also get the parent outer join:


    ```sql

    --  minipaintings Table on LEFT

    SELECT *

    FROM minipaintings AS p RIGHT JOIN miniartists AS a

    ON p.artistid=a.id;

    --  minipaintings Table on RIGHT

    SELECT *

    FROM artists AS a LEFT JOIN minipaintings AS p

    ON p.artistid=a.id;

    ```


    This will result in the `INNER JOIN` together with unmatched artists. This is
    not commonly required, but can be useful in a few cases.


    First, in this database, you are more interested in the paintings, and you would
    regard the artist information as extra details for the paintings. If, however,
    you were acting as an agent for the artists (which in this case is probably too
    late), you would be more interested in the `miniartists` table, and you might
    then have an interest in the parent outer join earlier.


    Second, you can use this sort of join to find the unmatched artists. For example:


    ```sql

    SELECT a.*

    FROM minipaintings AS p RIGHT JOIN miniartists AS a

    ON p.artistid=a.id

    WHERE p.id IS NULL;

    ```


    This gives you the following:


    | id | fullname |

    | --- | --- |

    | 5 | Leonardo da Vinci |

    | 4 | Ando Hiroshige |


    Here, you are looking for artists with no matching paintings by generating the
    outer join and filtering out the matched paintings. This will get you a similar
    result to the “unmatched artists” earlier.


    ### Some Recommendations on JOINS


    You obviously get a few choices when it comes to writing joins. As long as it
    works, it shouldn’t matter which way you go. However, a good developer will always
    write code which is clear and maintainable.


    Here are some recommendations. In the end, whatever you choose, you should be
    consistent and not keep changing the rules.


    #### (Almost) Always Alias Your Tables


    In a few minor cases, you might throw together a join without aliasing your tables,
    but the minute you start selecting individual columns, it starts to get messy.
    It’s always a good idea to alias your tables.


    #### Which Table Comes First?


    Clearly, we have a choice of which table we write first. How do you decide?


    To begin with, it doesn’t matter, so nothing will break if you decide the other
    way. In practice, however, you’re probably more interested in one table than the
    other.


    If you were an agent for the artists, then you’re more interested in listing the
    artists with their paintings. In this sample, we’re selling paintings so we’re
    more interested in listing paintings with their artists.


    It’s normal to put the table you’re more interested in on the left. That means,
    when it comes to outer joins, you’re more likely to use a `LEFT JOIN`. That’s
    what we’ll use for the most part.


    Remember, SQLite doesn’t even support `RIGHT JOIN`, and they advise you to swap
    tables, if necessary, to use a `LEFT JOIN`. Apparently, nobody misses the `RIGHT
    JOIN`.


    #### Decide Whether You Use INNER and OUTER


    Both `INNER` and `OUTER` are optional, so, in principle, you can do whatever you
    wish. However, we recommend that you pick a rule and stick to it. It can be confusing
    and misleading if you use these keywords sometimes, but not other times.


    In this book, we leave them out, but in reality it’s up to you.'
